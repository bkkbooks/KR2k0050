義宫興慶寺通義坊本髙祖舊宅武德元年為宫貞觀元年為尼寺玉海武德六年四月幸潛龍舊宅改為通義宫置酒髙會會要太清宫天寶二年改西京混元宫曰太清宫唐書玄宗本紀開元二十九年詔兩京及諸州各置元元皇帝廟一所後改為太清宫太清以白石為元元皇帝真像衮冕之服當扆南向玄宗肅宗真容侍立左右雍録望春宫京兆萬年縣有望春宫臨滻水西岸有北望春宫宫東有廣運潭唐書地理志姚南仲代宗時上疏曰王者必據髙明燭幽隱先皇所以因龍首而建望春也姚南仲傳翠微宫一名太和宫武德八年造名太和在終南山貞觀二十一年改翠微宫雍録翠微宫籠山為苑自初裁至於設幄九日而罷功因改名翠微宫正門北開謂之雲霞門視朝殿名翠微殿其寢殿名含風殿并為皇太子搆别宫去臺連延里餘正門西開名金華門內殿名喜安殿册府元龜望賢宫在咸陽縣東數里玄宗幸蜀還京肅宗至望賢宫奉迎德宗西幸又自望賢宫出奉天也雍録萬全一作泉宫永淳元年七月作萬泉宫唐書髙宗本紀儀鳯三年於藍田作涼宫名萬全宫𢎞道元年廢會要華清宫在臨潼縣南雍勝略京兆府昭應縣有宫在驪山下貞觀十八年置咸亨二年始名溫泉宫天寶六載更溫泉曰華清宫宫有湯井為池環山列宫又築羅城置百司及十宅唐書地理志溫泉在驪山與帝都密邇自秦漢隋唐人主皆嘗遊幸惟玄宗特侈蓋即山建宫百司庶府皆行各有寓止自十月往至嵗盡乃還大抵宫殿包括驪山一山而繚牆周遍其外觀風殿有復道可以潛通大明雍録華清宫殿廢已久今所存惟繚垣而已天寶所植松柏遍滿崖谷望之鬱然賈氏談録北門華清宫北向正北門外有左右朝堂門北相對有望仙橋北有左右講武殿長安志津陽門宫北正門之內曰津陽門門外有𢎞文館長安志開陽門宫之東面正門也門外有宜春亭長安志望京門宫之西面正門也門外近南有御交道上嶺通望京樓長安志昭陽門宫之南面正門也今謂之山門門外有登朝元閣路本唐之御輦便路也長安志瑶光樓津陽門之東曰瑶光樓樓南有小湯長安志小湯之西有梨園臨潼縣志飛霜殿瑶光樓南曰飛霜殿寢殿也白少傅以長生殿為寢殿非也長安志御湯九龍殿在飛霜殿之南亦名蓮花湯長安志玄宗幸華清新廣湯池制作宏麗安祿山於范陽以白玉石為魚龍鳬鴈石梁石蓮花以獻雕鐫巧妙殆非人工上大悅命陳於湯中仍以石梁橫亘其上而蓮花才出水際上因幸解衣將入而魚龍鳬鴈皆若奮鱗舉翼狀欲飛去上甚恐遽命撤去而蓮花石至今猶存焉明皇雜録湯泉凡一十八所第一是御湯周環數丈悉砌以白石瑩徹如玉面皆隱起魚龍花鳥之狀四面石坐階級而下中有雙白石蓮泉眼自甕口中湧出噴注白蓮之上賈氏談録玉女殿今名星辰南有玉女殿殿北有虛閣閣下即湯泉二玉石甕湯所出也長安志驪山湯舊説以三牲祭乃得入可以去疾消病不爾即爛人肉俗云始皇遇神女戲不以禮神女唾之生瘡始皇怖謝為出溫泉洗除後人因以為驗三秦記日華門由蓮花湯而西曰日華門門之南曰太子湯臨潼志少陽湯太子湯次西少陽湯長安志尚食湯少陽湯次西尚食湯長安志宜春湯尚食湯次西宜春湯長安志宜春湯有前殿後殿臨潼縣志月華門宜春湯又西曰月華門臨潼縣志笋殿月華門之內有笋殿臨潼縣志殿側有魏溫泉堂碑其石瑩徹見人形影宫中號玻璃碑雍録長湯笋殿北有長湯十六所臨潼縣志宫內除供奉兩湯外而內外更有十六所長湯每賜諸嬪御其修廣與諸湯不侔甃以文瑶密石中央有玉蓮捧湯泉噴以成池又縫綴錦繡為鳬鴈致于水中上時於其間泛鈒鏤小舟以嬉遊焉津陽門詩注芙蓉湯一名海棠湯在蓮花湯西沉埋已久人無知者近修築始出石砌如海棠花俗呼為楊妃賜浴湯豈以海棠睡未足一言而為之乎臨潼縣志七聖殿芙蓉湯北有七聖殿臨潼縣志自神堯至睿宗昭成肅明皇皆立衣衮衣繞殿石榴皆太真所植南有功德院其間瑶壇羽帳皆在焉順興影堂果老藥室亦在禁內長安志宜春亭在開陽門外雍録重明閣今四聖殿北臨髙有重明閣倚欄北瞰縣境如在諸掌閣下有方池中植蓮花池東鑿井每盛夏極甘冷邑人汲之長安志四聖殿重明閣之南曰四聖殿殿東有怪柏雍録長生殿齋殿也有事于朝元閣即齋沐此殿山城內多馴鹿有流澗號鹿飲泉金沙洞玉蘂峰皆玄宗為名洞居殿之左玉蘂峰上有王母祠長安志朝元閣在北山嶺之上基趾最為嶄絶次東即長生殿故基賈氏談録天寶七載十二月玄元皇帝降於朝元閣改為降聖閣册府元龜朝元閣一統志云在驪山唐建遺趾尚存杜常詩曰朝元閣上西風急都入長陽作雨聲潛確類書老君殿朝元閣南有老君殿玉石為像製作精絶長安志鐘樓在朝元閣之東雍録明珠殿長生殿之南近東也雍録觀風樓此時上御觀風樓水光山影相參差津陽門詩樓在宫外東北隅屬夾城而連於內前臨馳道周視山川津陽門詩注鬭雞殿在觀風樓之南雍録按歌臺在鬭雞殿之南臺南臨東繚牆雍録舞馬臺在鬭雞殿之北長安志毬場宜春亭之北門外曰毬場其西曰小毬場長安志連理木丹霞泉在朝元閣之南雍録羯鼓樓在朝元閣東近南繚牆之外長安志龍躍宫唐髙祖舊宅在髙陵縣西十四里武德六年以奉義宫改建髙祖其先本成紀人後魏時王大父熙為金門鎮將戍武川因家焉祖虎伐魏有功封唐國公父昞襲爵生髙祖於長安則龍躍宫或昞别宅抑或髙祖離宫乎德宗改為修真觀中有神堯御容及御井霜柏梁開平中廢但龍泉寺在其旁或因是而名今其地稱李觀所存乃臥龍寺雍勝略遊龍宫在渭南縣西十一里唐開元中修按兩京道里記云取黑龍飲渭名之白樂天有黑龍飲渭賦武平一登驪山詩有日下黑龍川句亦謂此也雍勝略九成宫鳯翔府麟遊縣西五里有九成宫本隋仁壽宫貞觀五年復置更名永徽二年曰萬年宫乾封二年復曰九成宫周垣千八百步並置禁苑及府庫宫寺唐書地理志宫本隋仁壽宫文帝以避暑終於此太宗欲以奉髙祖髙祖惡之不往貞觀五年太宗自修繕以避暑雍録咸亨四年九成宫太子新宫成上召五品以上晏太子宫極歡而罷舊唐書髙宗本紀永安宫貞觀八年置在麟遊縣西雍録玉華宫在坊州宜君縣北四里鳯凰谷貞觀二十年置永徽二年廢為寺唐書地理志太宗建玉華宫於坊州冝君縣之鳯凰谷宫既成正門謂之南風門殿覆瓦餘皆葺之以茅帝以意在清涼務從儉約匠人以為層嵓峻谷元覽遐長於是疏泉抗殿包山通苑皇太子所居南風門之東正門謂之嘉禮門殿名暉和殿其官曹署寺並皆創立微事營造庶物亦擾市取供而折番和雇之費以巨億計矣及帝遊幸敕奉御王孝積於顯道門內起紫微殿十三間文甓重基髙敞宏壯帝見之甚悅册府元龜初有九殿五門而可記其名與處者六其正殿為玉華其上為排雲又其上為慶雲其正門為南風南風之東為太子之居其殿曰耀和門曰嘉禮知其名失其處者一曰金颷門也其西珊瑚谷嘗有别殿存焉雍勝略仁智宫武德七年造在宜君縣雍録武德七年避暑仁智宫唐書韋挺傳興德宫在馮翊縣南三十二里義旗將趣京師軍次於忠武園因置亭子名興德宫屬家令寺元和志慶善宫本名武功髙祖舊第也在武功縣渭水北太宗誕生於此貞觀六年改慶善宫雍録貞觀六年太宗幸慶善宫宴從臣於渭濱上賦詩賞賜閭里有同漢之宛沛焉起居郎吕才播於樂府被之管絃名曰功成慶善樂會要神臺宫華州鄭縣東北三里有神臺宫本隋普德宫咸亨二年更名地理志瓊嶽宫華隂縣西十八里有瓊嶽宫故隋華隂宫顯慶三年更名地理志唐宫闕附考紫微殿貞觀末阿史那社爾平龜兹獻俘於此殿長安志金波門貞觀二十二年敕皇太子聽政於金波門長樂殿長安志中和殿長慶四年二月擊鞠於中和殿唐書敬宗本紀咸泰殿開成中正月望夜帝御咸泰殿然鐙作樂迎三宫太后奉觴進壽唐書蕭后傳永安殿穆宗置也與后妃公主宴樂所長安志會昌殿文宗太和四年幸黎園會昌殿實録保寧殿昭宗宴李繼昭等於保寧殿親製成功曲以褒之長安志清思殿長慶四年四月擊鞠於清思殿唐書敬宗本紀宣和殿寶厯二年九月觀百戲於宣和殿敬宗本紀文思殿龍朔元年命賓客許敬宗等即文思殿集瑶山玉彩唐書太子𢎞傳昭德殿龍紀元年殿東偶獲金龍一長安志雲韶殿此殿嘗考試舉人長安志昭敬殿唐一十八帝御容在也昭宗光化三年有秃鶖鳥鳴於此殿蓋唐祚將終之兆也長安志清思院寶厯中造清思院用銅鏡三千薄金十萬餅唐書薛敬老傳內山亭院取浙西隱士於內山亭院安置長安志仙韶院文宗開成三年改法曲所處為仙韶院唐書百官志望仙臺武宗時命神䇿軍士修望仙樓及廊舍五百間大中八年改為文思院長安志崇玄館天寶中明皇命周尹愔為崇玄館學士值祿山兵亂館宇寖廢至武宗時詔營創置吏鑄印以劉元靜為崇玄館學士號廣成先生入居靈符殿長安志乞巧樓光化三年起造二樓搆飛橋以通往來長安志光政門景運門命婦朝堂文成殿元莫觀含寧殿玉清殿竹樓柿林院臨碧殿壽昌殿元和殿宣光殿宣明殿臨光殿興泰殿德政殿嘉慶殿凝化殿元化門晨暉門寶慶殿百尺樓昭德門升陽殿延嘉門景風門東殿放鴨池野狐落大和殿宣徽殿文思殿含春亭睿武樓延資庫咸寧殿靈臺殿永安宫孝明鄭太后所居左齊藏天諸庫章信門安喜門思元門應乾門紫延院壽春殿延喜樓長樂樓以上俱見長安志陜西通志卷七十二
