body:
  text: 陜西通志卷七十二古迹一宫闕漢唐遺迹賁飾西都南山倚闕渭水穿渠離宫别館復道縈紆長揚墨縷上林筆鋪六爻三內戚里名區荒亭古戍斷碣遺墟溯洄千古陳迹云徂考諸吕繪以補黃圖作古迹志第二十七謹案秦中地居上遊神聖之迹托焉帝王之都在焉考古者博摉廣探豈僅欲掇拾舊聞誇多而逞靡哉誠以立乎今日以溯千載如睹其人如生其世沿迹以求亦理亂得失之林也是故首宫闕宸居也次府第王侯將相朝紳野逸所寄處也次園林其遊覽所在也次郊坰則凡故丘遺迹罔不收也列以圖繪閲之可當卧遊綴以遺聞覽之如披外史若夫故城廢縣有關于建置竒觀勝槩有繫于山川以各有其類槩不録焉宫闕上古合宫在淳化縣北五十里甘泉山賈志黃帝治萬國朝諸侯乃作合宫兼明庭布政於甘泉漢書地理志黃帝接萬靈明庭明庭者甘泉也史記封禪書殷岐陽宫故基在岐山縣東北五十里即周太王由邠遷岐所建今宫廢而土人猶稱之雍勝略按馬志賈志有𡵨陽城蓋即此而異名也臯門在岐陽城內周太王所立馬志乃立臯門臯門有伉詩經大雅應門在臯門內亦周太王立馬志乃立應門應門將將詩經大雅豐宫在鄠縣東五里小豐村賈志既伐于崇作邑于豐詩經大雅正義曰周豐宫周文王宫也在雍州鄠縣史記周本紀注豐在始平鄠縣東有靈臺康王於是朝諸侯左傳杜注文王都豐在鄠縣史記曰文王伐崇侯虎而作豐邑伐崇之後自岐遷都於豐故豐水之西有豐宫也武王改邑於鎬豐宫元不移徙每遇大事皆步自宗周而往以其事告於豐廟雍録周鎬京在長安縣西南三十里豐水東雍勝略考卜維王宅是鎬京維龜正之武王成之詩經大雅武王自豐水居鎬諸侯宗之是為宗周今豐水之東長安之南三十里去豐二十五里鎬池即其故都也帝王世紀自漢帝穿昆明池于是地基構淪禠今無可究水經注諸家皆言自漢帝穿昆明池後鎬京故基淪入於池無復可考獨梁載言十道志曰鎬池一名元址在昆明池北雍録城門匠人營國方九里旁三門周禮考工記天子十二門通十二子考工記注案匠人云營國九里旁三門四面各三門是有十二門鄭注云十二門以通十二子則十二辰也地官疏王宫宫伯掌王宫之士庶子凡在版者掌其政令行其秩敘作其徒役之事授八次八舍之職事周禮天官衛王宫者必居四角四中於徼候便也鄭司農云庶子衛王宫在內為次在外為舍元謂次其宿衛所在舍其休沐之處天官注王宫門阿之制五雉宫隅之制七雉考工記王宫門阿之制五雉謂髙五丈宫隅之制七雉亦謂髙七丈不言宫牆宫牆亦髙七丈也考工記注天子之禮至尊無上其居處則內有六寢六宫外有三朝五門朱子文集臯門鄭司農云王有五門外曰臯門周禮注建臯鼓詢事弊訟朝士掌之三才圖會外朝朝士掌建邦外朝之法左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庶在其後左嘉石平罷民焉右肺石達窮民焉周禮秋官臯門之內外朝也朱子文集庫門天子五門庫門在雉門外周禮天官疏庫門寶藏之所三才圖會玉府玉府掌王之金玉玩好兵器凡良貨賄之藏周禮天官內府內府掌受九貢九賦九功之貨賄良兵良器以待邦之大用周禮天官金玉曰貨物之善者藏之於內府近王掌之以給王用故也天官疏宗廟小宗伯之職掌建國之神位右社禝左宗廟周禮春官庫門內雉門外之左右春官注宫南鄉而廟居左則廟在寢東也朱子全集天府天府掌祖廟之守藏與其禁令凡國之玉鎮大寶器藏焉周禮春官社禝何休云質家右宗廟尚親親文家右社禝尚尊尊若然周人右社禝者地道尊右故社禝在右是尚尊尊之意社禝為尊故鄭注郊特牲云國中神莫大於社周禮春官注雉門閽人掌守王宫之中門之禁周禮天官中門於外內為中若今宫闕門雉門三門也春秋傳雉門災及兩觀天官注魯有三門雉門有兩觀為中門則知天子五門雉門亦為中門有兩觀矣天官疏應門鄭司農云王五門四曰應門周禮注應門建應鼓又曰朝門三才圖會治朝宰夫之職掌治朝之法以正王及三公六卿大夫羣吏之位掌其禁令周禮天官治朝在路門之外司士掌焉宰夫察其不如儀天官注路門鄭司農云王五門五曰路門路門一曰畢門周禮天官注路門者路大也人君所居皆曰路以大為名畢門者從外而入路門為終畢天官疏虎門路寢門也王日視朝於路寢門外畫虎焉地官注路門建路鼓又曰虎門畢門大寢門三才圖會燕朝路門之內燕朝也大儀正其位掌擯相族人朝焉朱子文集君日出視朝退適路寢聽政禮記玉藻周時德澤和洽蒿茂大以為宫柱名曰蒿宫此天子之路寢也大戴禮六寢宫人掌王之六寢之修周禮天官路寢一小寢五天官注天子六寢而六宫在後六官在前所以承施內外之政也禮記昏義注王大寢一小寢五大寢聽政故嚮明而治在前小寢釋服燕息也在後其小寢一寢在中四寢在於四角春居東北夏居東南秋居西南冬居西北土王之月居中朱子文集六宫內宰以隂禮教六宫周禮天官鄭司農云六宫後五前一婦人稱寢曰宫后象王立六宫而居之亦正寢一燕寢五周禮注按元和志云周武王宫即鎬京似即以鎬京為武王宫矣夫鎬京乃其建都之地當日必於其地立王宫為出政治之所元和志即以鎬京為武王宫固有未審而馬馮賈三志皆於王宫闕而不敘竊有未安故兹特採據周禮諸書詳著之亦欲觀一代政治所由出也明堂周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵周禮考工記昔者周公朝諸侯於明堂之位天子負斧依南鄉而立禮記明堂位斧依為斧文屏風於戶牖之間者皇氏云在明堂中央太室戶牖間明堂位疏講學大夫淳于登説明堂在國之陽丙巳之地三里之外七里之內周公祀文王於明堂以配上帝五帝之精大微之庭中有五帝座星玉藻疏明堂所以正四時出教化天子布政之宫也先儒舊説其制不同大戴禮云明堂九室一室有四戶八牖凡三十六戶七十二牖以茅蓋屋上圓下方援神契曰明堂上圓下方八窗四闥考工記云明堂五室稱九室者取象陽數也八牖者隂數也取象八風三十六戶牖取六甲之文六六三十六也上圓象天下方法地八窗即八牖也四闥者象四時四方也五室者象五行也皆無明文先儒以意釋之耳三輔黃圖祇宫穆天子傳云吉日丁酉天子入於南鄭郭璞注云今京兆鄭縣也紀年穆王元年築祇宫於南鄭傳所謂王以是獲沒於祇宫者華州志昭宫春宫范宫三宫俱穆王時作見竹書紀年平陽封宫在􅔛縣故平陽城內郊祀志雍大雨壞平陽宫垣史記武公元年伐彭戲氏至於華山下居平陽封宫雍録云在華山下蓋因史記至於華山之文而誤也賈志羽陽宫在寶雞縣陳倉故城內馬志秦武公作羽陽宫在寶雞縣界嵗久不可究知其處元祐六年正月直縣門之東百步居民權氏濬池得古銅瓦面上隱起四字曰羽陽千嵗篆字隨勢為之不取方正始知為羽陽舊址也其地北負髙原南臨渭水前對羣峰形勢雄壯真勝地也澠水燕談録大鄭宫鳯翔縣南七里有古雍城秦德公所居大鄭宫城也左傳注德公元年初居雍城大鄭宫史記秦本紀髙泉宫在扶風縣東美陽故城雍勝略秦宣太后起長安志虢宫秦宣太后起在岐州虢縣界三輔黃圖棫陽宫在扶風縣東北三十里秦穆公建遺址尚存雍勝略長安志謂棫陽宫為秦昭王起與此異祈年宫即橐泉宫在鳯翔府城內東南隅馬志酈道元注水經曰雍縣中窂與牢同井秦惠公故居所謂祈年宫也孝公又謂之槖泉宫據酈此言則是惠公所都雍縣有祈年至孝公命為槖泉名雖兩出其實一宫也又推酈此言則是祈年槖泉皆在惠公雍都亦不知何人所建獨漢書曰祈年宫惠公所起黃圖祈為蘄且曰穆公所造廟記曰宫在城外而始皇本紀則曰在雍皆以世逺難究其的也雍録後人又於此建祈年觀雍勝略冀闕在咸陽城中馬志秦孝公作咸陽築冀闕徙都之史記秦本紀萯陽宫秦文王所起在鄠縣西南二十三里三輔黃圖師古曰倍陽即萯陽也其音同耳宫名在鄠縣漢書東方朔傳注芷陽宫在灞上秦襄王起馬志秦咸陽城在今咸陽縣東二十里雍勝略自秦孝公至始皇帝胡亥並都此城案孝公十二年作咸陽築冀闕徙都之始皇徙天下髙資富豪於咸陽十二萬户引渭水灌都以象天漢橫橋南渡以法牽牛咸陽北至九嵕甘泉南至鄠杜東至河西至汧渭之交東西八百里南北四百里離宫别館相望聨屬木衣綈繡土被朱紫宫人不移樂不改懸窮年忘歸猶不能遍三輔黃圖秦之咸陽孝公所都也在漢長安西北角故漢書紀髙帝項羽自霸上而入秦都皆曰西上咸陽也惟元和志則曰正東微南是為雍州則東多南少也志蓋審言其詳也古語山南水北曰陽秦之所都若槩舉其凡則在九嵕諸山之南渭水之北名為咸陽其不爽矣若細細推求則秦之朝宫苑殿固在渭北而秦都實跨渭水史記三輔黃圖元和志皆曰始皇都咸陽引渭水灌都以象天漢橫橋南渡以法牽牛此既可見渭之兼在都南矣而猶謂山水皆陽者本秦之朝市宫苑皆在渭北而總命名以此也於是史記水經凡序長樂悉以其地屬之咸陽而於甘泉阿房亦自明命以為咸陽之前殿也則咸陽之名又嘗兼踰渭南也此又不可不知也雍録咸陽宫始皇窮極奢侈築咸陽宫因北陵營殿端門四達以制紫宫象帝居三輔黃圖諸廟及章臺上林皆在渭南秦每破諸侯寫放其宫室作之咸陽北阪上南臨渭自雍門以東至涇渭殿屋復道周閣相屬所得諸侯美人鍾鼓以充入之史記秦始皇本紀按長安志雍録及馬馮諸志皆無此宫三輔黃圖曰始皇築咸陽宫史記始皇三十四年置酒咸陽宫則秦之有咸陽宫也審矣顧長安志雍録等書皆考據精詳何以獨闕也意孝公作咸陽築冀闕此或襲孝公之舊宫而弗改歟然孝公時咸陽宫之名未出也竊謂規模或仍舊而制度則從宏黃圖所謂因北陵營殿即史記所謂作之咸陽北阪者是也因表而出之以俟考訂云阿房宫故基在長安縣西三十里雍勝略始皇帝三十五年以為咸陽人多先王之宫廷小吾聞豐鎬之間帝王之都也乃營作朝宫渭南上林苑中先作前殿阿房東西五百步南北五十丈上可以坐萬人下可以建五丈旗周馳為閣道自前殿直抵南山表南山之巔以為闕為復道自阿房渡渭屬之咸陽以象天極閣道絶漢抵營室也阿房宫未成成欲更擇令名名之乃分作阿房宫或作麗山寫荆蜀地材皆至關中計宫三百史記秦始皇本紀括地志云秦阿房宫亦曰阿城在雍州長安縣西北一十四里按宫在上林苑中雍州郭城西南面即阿房宫城東面也索隱曰此以其形名宫也言其宫四阿旁廣也秦始皇本紀注師古曰阿房者言殿之四阿皆為房也一説大陵曰阿言其殿高若於阿上為房也房或作旁始皇作此殿未有名以其去咸陽近且號阿房阿近也漢書賈山傳注阿城本秦阿房宫以其牆壁崇廣故俗呼為阿城東方朔傳注阿房前殿以木蘭為梁以磁石為門三輔黃圖阿房宫東西三里南北五里庭中可受十萬人車行酒騎行炙千人唱萬人和其外有城名阿城東西北三面有牆南面無牆三輔舊事始皇收天下兵聚之咸陽銷鋒鏑以為金人十二以弱天下之人立於宫門坐髙三丈銘其後曰皇帝二十六年初兼天下改諸侯為郡縣一法律同度量大人來見臨洮其大五丈足迹六尺三輔黃圖磁石門悉以磁石為故專其目四夷朝者有隱甲懷刃入門而脅之以示神亦名却胡門水經注磁石門東西有閣道即阿房宫之北闕門也纍磁石為之著鐵甲入者磁石吸之不得過長安志磁石門即北入之門審求其地則在鎬水趨渭之處故水經主漢城而命其方則曰此阿房之西門若自主阿房而命之則當曰北門也雍録信宫在咸陽縣渭水南賈志始皇帝二十七年作信宫渭南已而更命信宫為極廟象天極自極廟道通驪山作甘泉前殿築甬道自咸陽屬之史記秦始皇本紀興樂宫一名長樂在長安城中馬志秦始皇造漢修飾之周回二十餘里漢太后常居之三輔黃圖甘泉宫古以甘泉名宫者三秦之甘泉在渭南一也漢之甘泉在雲陽縣磨石嶺上二也隋之甘泉在鄠三也秦之甘泉史嘗明言在渭之南而無言其在渭南何地者秦始皇本紀迎太后于雍而入咸陽復居甘泉宫徐廣曰表云咸陽南宫也秦時咸陽跨渭南北則此宫不在渭北之咸陽而在渭南之咸陽也又本紀曰自極廟道通驪山作甘泉前殿自咸陽屬之則甘泉前後必近上林苑即鄠縣也則秦之甘泉與隋之甘泉正同一地安知隋宫不襲秦舊也雍録蘭池宫蘭池在咸陽縣東二十五里有秦蘭池宫雍勝略地理志曰渭城縣有蘭池宫秦始皇微行逢盜於蘭池水經注林光宫秦時宫也故基在甘泉山上雍勝略林光宫胡亥所造從廣各五里在雲陽縣界三輔黃圖林光宫一曰甘泉宫秦起在今池陽縣西北故甘泉縣甘泉山上周回十餘里關中記曲梁宫秦曲梁宫在三原縣西南十五里黃白城內元和志步髙宫故基在渭南縣西南三十里雍勝略步髙宫亦名市丘城三輔黃圖步壽宫在步髙宫西三輔黃圖二宫皆秦時建雍勝略長楊宫在盩厔縣東南三十三里雍勝略長楊宫本秦舊宫宫中有埀楊數畝因為宫名門曰射熊觀秦漢遊獵之所三輔黃圖梁山宫在永壽縣南八十里馬志始皇幸梁山宫從山上見丞相車騎衆弗善也史記秦始皇本紀梁山宫城皆文石名織錦城三秦記望夷宫在涇陽縣東南八里長陵西北臨涇水處馬志二世夢白虎齧其左驂馬殺之心不樂怪問占夢卜曰涇水為祟二世乃齋於望夷宫欲祠涇沈四白馬史記秦二世本紀秦宫闕附考城陽宫始皇母遷於城陽宫長安志曲臺宫秦有曲臺宫鄒陽傳曰秦倚曲臺之宫垂衡天下應劭曰秦皇所居亦不云臺在何地雍録大夏殿始皇造銅人十枚在殿前三輔舊事雲閣二世所造起雲閣欲與南山齊三輔黃圖按秦逞其志宫室之侈前世未有史記始皇令咸陽之旁二百里內宫觀二百七十復道甬道相連漢書賈山傳秦起咸陽而西至雍離宫三百甚矣乎其侈也然世移代易非惟瓦礫無存抑亦名與俱湮今即其尤彰著者考訂補綴列之如右至于名雖未湮而地無可稽或宫不詳其基址或殿未審其附麗猶往往見於他説偹録篇末以俟參質蓋難言之也後倣此例漢長安故城在西安府城西北二十里馬志髙祖七年築長安宫城自櫟陽徙居此城本秦離宫也初本狹小至惠帝更築之髙三丈五尺下濶一丈五尺上濶九尺雉髙三坂周回六十五里城南為南斗形北為北斗形至今人呼漢京為斗城是也漢舊儀曰長安城中經緯各長三十二里十八步地九百七十二頃八街長安志有華陽街章臺街夕隂街香室街尚冠街太常街藁街前街漢書長安有熾盛街九陌三宫九府三廟十二門九市長安志云內六市在道東三市在道西十六橋水泉深二十餘丈城下有池周繞廣三丈深二丈石橋各六丈與街相直三輔黃圖長安城面三門四面十二門皆通達九徑以相經緯三輔決録長安在渭水南隔渭水北對秦咸陽宫漢於其地置未央宫曰長安城因名縣括地志長安城中地皆黑壤今城赤且堅如石如金父老相傳云盡鑿龍首山中土以為城及諸城闕亦然三秦記漢築長安城及營宫殿咸以堙平至今坊市北據髙原南望爽塏視終南如指掌關中記漢都長安其城在渭之南而咸陽之東南也凡漢城之水皆取諸昆明一𣲖自西而東橫亘城南之鼎路門已而東折以注青門水經固謂之漕渠漢明堂圜丘博望苑皆在漕渠之南而吕圖亦具著渠迹暨至清明門外合王渠以入於渭第二枝自都城西面南來第一門名章門者於其旁設為飛渠東向入城注於未央宫之西以為大池是名滄池滄池下流向東而往徑石渠天祿閣桂宫北宫長樂宫皆用此水也未央地勢甚髙而此水能自西面而轉北以行是行於未央山背窪下之處也滄池下流有石渠者礲石為之以導此水自此以往凡水既周遍諸宫自清明門出城是為王渠王渠至清明門外與漕渠合而北入渭也雍録漢城惠帝築後趙石虎亦嘗修之符姚西魏宇文皆都之隋開皇三年都龍首川此城遂廢至今民呼猶曰楊家城長安志圖宣平門一名東都門一名東城門長安城東出北頭第一門曰宣平門民間所謂東都門漢書疏廣太傅受少傅上疏乞骨骸歸公卿大夫為設祖道供張東都門外即此門也三輔黃圖宣平門王莽更名春王門正月亭亦曰東城門其郭門亦曰東都門即逢萌挂冠處也水經注清明門一名籍田門又名凱門又名城東門長安城東出第二門曰清明門一曰籍田門以門內有籍田倉一曰凱門漢宫殿疏曰第二門名城東門莽更名曰宣德門布恩亭三輔黃圖清明門外郭門曰東平門宋敏求志霸城門一名青城門又名青綺門青雀門青門長安城東出南頭第一門曰霸城門三輔黃圖霸城門王莽更名曰仁壽門無疆亭民見門色青又名青城門或曰青綺門亦曰青門門外舊出佳瓜水經注景帝元年有青雀羣飛于霸城門乃改為青雀門更修飾刻木為綺橑雀去因名青綺門述異記覆盎門一名杜門又名下杜門又名端門長安城南出東頭第一門曰覆盎門一號杜門廟記曰覆盎門與洛門相去十三里二百一十步門外有魯班輸所造橋工巧絶世長樂宫在城中近東直杜門其南有下杜城漢書集注云故杜陵之下聚落也故曰下門水經注作下杜門又曰端門北對長樂宫王莽更名曰永清門長茂亭三輔黃圖安門一名鼎路門長安城南出第二門曰安門亦曰鼎路門北對武庫王莽更名曰光禮門顯樂亭三輔黃圖西安門一名便門長安城南出第三門曰西安門北對未央宫一曰便門即平門也古者平便皆同字王莽更名曰信平門誠正亭三輔黃圖章城門一名章門又名光華門亦名便門長安城西出南頭第一門曰章城門三輔舊事曰章門一曰光華門又曰便門王莽改曰萬秋門億年亭三輔黃圖直城門一名直門又名龍樓門長安城西出第二門曰直城門亦曰故龍樓門門上有銅龍本名直門王莽更曰直道門端路亭三輔黃圖雍門一名西城門一名函里門長安城西出北頭第一門曰雍門本名西城門王莽改曰章義門著義亭其水北入有函里民呼曰函里門三輔黃圖洛城門一名髙門又名鸛雀臺門又名杜門利城門客舍門洛門長安城北出東頭第一門曰洛城門又曰髙門漢宫殿疏曰高門長安北門也又曰鸛雀臺門外有漢武承露盤在臺上三輔黃圖北出西頭第三門本名杜門亦曰利城門王莽更名進和門臨水亭其水有客舍故民曰客舍門又曰洛門也水經注厨城門一名廣門長安城北第二門曰厨城門王莽更名建子門廣世亭三輔黃圖厨門其內有長安厨官在事故城曰厨門也如淳曰今名廣門也水經注橫門一名光門長安城北出西頭第一門曰橫門門外有橋曰橫橋三輔黃圖橫門王莽更名霸都門左幽亭如淳曰音光故曰光門其外郭有都門有棘門徐廣曰棘門在渭北孟康曰在長安北秦時宫門也三輔黃圖曰棘門在橫門外按漢書徐厲軍於此又有通門亥門也水經注長樂宫在長安故城中括地志髙帝五年治長樂宫漢書髙帝本紀長樂宫本秦之與樂宫也髙皇帝始居櫟陽七年長樂宫成徙居長安城後太后常居之王莽改為長樂室在長安城中近東直杜門三輔黃圖長樂宫周回二十餘里有殿十四關中記惠帝為東朝長樂及間往來數蹕煩人乃作復道築武庫南詔立原廟史記叔孫通傳長樂者髙帝既以為居又以受朝無異於正宫矣自惠帝後人主皆居未央而長樂常奉母后玉海未央在漢城西隅而長樂乃東隅也秦樗里子百年前已言之李吉甫元和志言兩宫相去止隔一里此一里所即武庫雍録建章未央長樂三宫皆輦道相屬懸棟飛閣不由徑路漢武故事東闕惠帝五鳯三年鸞鳯集長樂宫東闕中樹上漢書惠帝本紀闕在門兩旁中央闕然為道也釋名西闕太子引兵驅四市人至長樂西闕下逢丞相軍合戰漢書劉屈氂傳司馬門未央甘泉長樂四面皆有公車司馬門凡言司馬者宫垣之內兵衛所在司馬主武事故謂宫之外門為司馬門三輔黃圖前殿長樂宫前殿東西四十九丈七尺兩㶦一作序中三十五丈深十二丈三輔黃圖臨華殿在長樂前殿後武帝建三輔黃圖成帝永始四年夏四月長樂宫臨華殿災漢書成帝本紀大厦殿秦作銅人立阿房殿前漢著長樂宫大厦殿前三輔舊事長信宫長秋殿永壽殿永寧一作昌殿長信宫漢太后常居之按通靈記太后成帝母也后宫在西秋之象也秋主信故宫殿皆以長秋長信為名又永壽永寧殿皆后所處也三輔黃圖長樂宫殿前列銅人殿西有長信長秋永壽永昌諸殿水經注黃圖曰長樂殿西有長信宫長秋永壽永寧四殿而水經亦云殿西有長信長秋永壽永昌等殿則長信長秋皆在長樂宫中也長安志别出長信等七宫不以統諸長樂殆傳疑耶雍録鐘室高帝十一年吕后殺韓信於長樂鐘室漢書髙帝本紀師古曰謂懸鐘之室髙帝本紀注未央殿東北二里許鐘室故處也有隙地丈餘草色皆殷赤相傳吕后殺淮隂血漬而然地理志以下諸殿臺池雖統係長樂而其方向位置無可考矣宣德殿通光殿髙明殿見三輔宫殿名在長樂宫中宋敏求志溫室殿或問光溫室省木皆何木也光默然不應漢書孔光傳晉灼曰長樂宫中有溫室殿孔光傳注長定殿建始殿廣陽殿中室殿月室殿神仙殿椒房殿俱見宋敏求志鴻臺長樂宫有鴻臺鴻臺秦始皇二十七年築髙四十丈上起觀宇帝嘗射飛鴻於臺上故號鴻臺漢書惠帝四年長樂宫鴻臺災三輔黃圖酒池廟記曰長樂宫中有魚池酒池池上有肉炙樹秦始皇造漢武帝行舟於池中三輔黃圖酒池北起臺天子於上觀牛飲者三千人關中記武帝作酒池以誇羌胡飲以鐡杯重不能舉皆牛飲太平寰宇記長樂殿之東北有池池北有層臺沼謂是池為酒池非也水經注未央宫在長安故城中近西南隅括地志髙帝七年蕭何治未央宫漢書髙帝本紀未央宫周回二十二里九十五步五尺街道周回七十里臺殿四十三其三十二在外其十一在後宫池十三山六池一山一亦在後宫門闥九十五西京雜記未央宫周旋三十三里街道十七里有臺三十二池十二土山四宫殿門八十一掖門十四宫殿及臺皆疏龍首山土以作之殿基出長安城上非築也關中記未央一名紫微宫三秦記未央者前限未到之辭故漢有未央宫古詩有樂未央詩正義東闕蕭何治未央宫立東闕漢書髙帝本紀文帝七年未央宫東闕罘罳災文帝本紀如淳曰東闕與兩旁罘罳皆災也師古曰罘罳為連闕曲閣也以覆重刻垣墉之處其形罘罳然文帝本紀注未央宫東有蒼龍闕關中記索隱曰東闕名蒼龍史記注北闕師古曰未央殿雖南向而上書奏事謁見之徒皆詣北闕公車司馬亦在北焉是則以北闕為正門而又有東門東闕至於西南兩面無門闕矣蓋蕭何初立宫以厭勝之術漢書髙帝本紀注未央宫北有玄武闕所謂北闕也闕中有閶闔門止車門關中記柏梁臺武帝元鼎二年春起柏梁臺漢書武帝本紀武帝鑄柏梁銅柱郊祀志臺髙二十丈用香柏為殿梁香聞十里三輔故事廟記曰柏梁臺漢武帝造在北闕內道西三秦記曰柏梁臺上有銅鳯名鳯闕宋敏求志武帝作柏梁臺詔羣臣二千石有能為七言詩者乃得上座帝曰日月星辰和四時自梁王以下作詩者二十五人古文苑司馬門元帝初元五年令從官給事宫司馬中者得為大父母父母兄弟通籍漢書元帝本紀應劭曰司馬中者宫內門也師古曰司馬門者宫之外門也衛尉有八屯衛候司馬主衛士徼巡宿衛每面各二司馬故謂宫之外門為司馬門元帝本紀注漢宫衛令諸出入殿門公車司馬皆下不如令罰金四兩玉海按未央宫有東闕北闕而西南無門闕顔師古謂為蕭何厭勝之術是矣至司馬門三輔黃圖及師古俱謂未央四面皆有司馬門乃宫之外門應劭謂為宫內門似有參差細推之則是闕之西南而司馬門有西南闕門之牆四面環宫司馬門之牆乃宫正垣而闕垣在外西京賦所謂徼道外周千廬內附是也故自闕門視之則為宫內門自宫視之則為宫外門矣二説雖異其實同也漢書百官表注師古曰漢書儀云衛尉司在宫內主宫闕之門內衛士於周垣下為區廬西京賦衛尉八屯警夜巡晝注綜曰衛尉周宫外於四方四角立八屯士士則傅宫外為廬舍是則宫牆外闕門內正為衛士區廬地矣端門皇帝入未央宫有謁者十人持戟衛端門曰天子在也足下何為者不得入太尉往諭乃去皇帝遂入漢書周勃傳師古曰殿之正門也周勃傳注立金人於端闈西都賦善曰宫中門謂之闈西都賦注掖門朱虛侯章請卒千人入未央宮掖門漢書吕后紀師古曰非正門而在兩旁若人之臂掖也吕后紀注御覽曰出禁省為殿門外出大道為掖門則不特夾立正門之旁為掖門雖殿門外他出之門皆可名為掖門也漢書薛宣傳宣子况令楊明遮斫申咸於宫門外廷尉直議曰本爭私權雖於掖門外傷咸與凡鬭無異此則殿外有門可出通衢者皆名掖門之證也唐門下北省在日華門名左掖中書北省在月華門名右掖此之日華月華立殿自在宣政殿東西兩廊出門未是宫外而亦以掖名之則是殿門之正門外旁或有門皆為掖門也雍録前殿未央宫前殿東西五十丈深十五丈髙三十五丈營未央宫因龍首以制前殿至孝武以木蘭為棼橑文杏為梁柱金鋪玉戶華榱璧璫雕楹玉磶重軒縷檻青瑣丹墀左磩右平黃金為壁帶間以和氏珍玉風至其聲玲瓏然也三輔黃圖王莽改前殿曰王路堂地皇元年王路堂為風所毁宋敏求志成帝綏和二年鄭通里男子王褒帶劔入北司馬門殿東門上前殿入非常室中漢書五行志如淳曰殿上室名五行志注蘭臺漢百官表御史中丞在殿中蘭臺掌圖籍祕書外督部刺史內領侍御史受公卿奏事西京賦曰蘭臺金馬遞宿迭居按此蘭臺正在殿中石渠天祿皆在殿北雍録宣明殿廣明殿皆在未央殿東三輔黃圖昆德殿玉堂殿皆在未央殿西三輔黃圖鴛鸞殿未央殿東有鴛鸞殿關中記白虎門王莾大置酒未央宫白虎殿勞賜將帥自前殿南下西出椒除白虎門漢書王莾傳服虔曰邪行閣道下者也師古曰除殿陛之道也椒取芬香之名也王莾傳注金馬門金馬門者宦者署門也門旁有銅馬故謂之曰金馬門史記滑稽傳天子擢𢎞對為第一待詔金馬門漢書公孫𢎞傳武帝時相馬者東門京作銅馬法獻之立馬於魯班門外更名魯班門為金馬門公孫𢎞傳注楊雄待詔金門金馬門也宋敏求志金馬門又謂之黃門玉海宦者署宣帝召武待詔宦者署漢書蘇武傳師古曰百官公卿表少府屬官有宦者令丞以其署親近故令于此待詔蘇武傳注百官表有中黃門師古曰謂閽人居禁中在黃門之內給事者也雍録承明廬嚴助為會稽太守數年不聞問賜書曰君厭承明之廬漢書嚴助傳張晏云承明廬在石渠閣外嚴助傳注天祿閣在未央大殿北天祿異獸也即揚雄校書處三輔舊事天祿石渠蕭何造以藏祕書處賢才漢宫閣疏天祿石渠典籍之府西都賦石渠閣在未央大殿之北三輔故事石渠閣蕭何造其下礲石為渠以導水若今御溝因為閣名藏入關所得秦之圖籍成帝於此藏祕書焉三輔黃圖石渠閣礲石為渠以導水以水經約其地望則滄池在未央西南此之為渠必引滄池下流轉北以行成其為渠也水之又北遂轉行乎明光桂宫之間謂之明渠也又益趨東則長樂之有酒池都城東之有王渠皆此水也雍録宣室殿在未央宫前殿正室也淮南子曰周武王殺紂於宣室漢取舊名也漢書文帝受釐宣室夜半前席賈生問鬼神之事即此也三輔黃圖漢書宣帝常幸宣室齋居而決事如淳曰宣室宣布政教之室蓋其殿在前殿之側齋則居之宋敏求志甘露四年未央宫宣室閣災漢書成帝本紀按宣室閣其位置未詳然以理推之必既有殿而閣名即因之以出也當在殿前故附見之承明殿皇太后車駕幸未央承明殿漢書霍光傳未央宫有承明殿著述之所也班固西都賦序云內有承明著作之庭即此三輔黃圖孝文帝躬行節儉其時未央宫無髙門武臺麒麟鳯凰白虎玉堂金華之殿獨有前殿曲臺漸臺宣室溫室承明耳漢書翼奉傳承明殿與石渠相距不逺孝成時客有薦雄文似相如者召雄待詔承明之庭師古曰承明殿在未央宫夫雄自言其待詔之地直曰承明之庭而武帝謂嚴助厭直乃曰承明之廬其云廬者以更直之地言之也曰庭者以受詔作文之地言之也雍録溫室殿昌邑王入朝太后還乘輦欲歸溫室漢書霍光傳溫室在未央宫殿北武帝建冬處之溫暖也三輔黃圖溫室以椒塗壁被之文繡香桂為梁設火齊屏風鴻羽帳規地以罽賓氍毹西京雜記清涼殿清涼殿在未央宫殿北夏居之則清涼也漢書曰清室則中夏含霜此也三輔黃圖髙門殿武帝於未央宫起髙門殿三輔舊事漢書曰汲黯請見髙門注曰未央宫髙門殿也又哀帝時鮑宣諫曰陛下擢臣巖穴誠冀有益毫毛豈欲臣美食大官重髙門之地三輔黃圖鮑宣又言髙門去省户數十步求見出入二年未省玉海玉堂殿解嘲歷金門上玉堂漢書揚雄傳晉灼曰黃圖有大玉堂小玉堂殿揚雄傳注師古曰玉堂殿在未央宫李尋傳注李尋待詔黃門得預入直而曰久汙玉堂之直者言直廬在玉堂外也雄之待詔其解嘲曰登金門上玉堂雄時待詔承明故得由金馬門以上玉堂也則玉堂金馬必相附近也雍録長秋門太子使舍人無且持節夜入未央宫殿長秋門因長御倚華具白皇后漢書戾太子傳按黃圖云后宫殿皆以長信長秋為名此之長秋門戾太子傳云太子使持節入長秋門因長御倚華而白皇后是非持節不得入矣或亦門之在後宫者因皇后而名歟因附識之以俟考訂云內謁者署在未央宫屬少府掌宫中步帳褻物丁孚漢官云令秩千石三輔黃圖椒房殿未央宫有椒房殿三輔宫殿名皇后殿稱椒房以椒塗室主溫暖除惡氣也漢官儀掖庭賜單于待詔掖庭王嬙為閼氏漢書元帝本紀媫妤以下皆居掖庭漢官儀漢掖庭有月景臺雲光殿光華殿鳴鸞殿開襟閣臨池觀不在簿籍皆繁華窈窕之所棲宿焉西京雜記昭陽殿成帝趙皇后居昭陽殿三輔黃圖皇后既立寵少衰而弟絶幸為昭儀居昭陽舍其中庭彤朱而殿上髹漆切皆銅沓冒黃金塗白玉階壁帶往往為黃金釭函藍田璧明珠翠羽飾之自後宫未嘗有焉漢書元后傳昭陽特盛隆於孝成屋不成材牆不露形西都賦昭陽殿在未央宫中織珠為簾風至則鳴如環佩聲窗戶扇多是琉璃皆通照毛髮不得藏椽桷皆刻作龍蛇縈繞其間其中鱗甲分明見者莫不驚栗西京雜記武帝時後宫八區有昭陽飛翔增城合歡蘭林披香鳯凰鴛鸞等殿後有增修安處常寧茝若椒風發越蕙草等殿為十四位三輔黃圖增城舍漢書曰班媫妤居增城舍應劭曰後宫有八區增城第三也宋敏求志椒風舍董賢女弟為昭儀位次皇后更名其舍為椒風以配椒房云漢書董賢傳漸臺未央宫西有滄池池中有漸臺關中記未央宫有漸臺文帝之夢鄧通王莾之死於兵皆在其處建章宫亦有漸臺郊祀志曰建章漸臺髙二十丈名曰泰液長安志疑王莾在未央為漢兵所逼倉卒出避無由得趨建章因疑兩宫各有漸臺此其疑之是也水經未央漸臺在滄池中建章漸臺在太液池中正與漢志所載相合最可據矣黃圖曰舊圖云未央宫有滄池其水滄色故曰滄池此即水經言漸臺之在滄池者也至黃圖曰漸臺在未央宫太液池中則未央似有太液矣而漢志無之則疑黃圖不審也圖又曰未央宫有滄池池中有漸臺王莾死于此則此地本是滄池而誤為太液池也案昭帝紀始元元年黃鵠下建章太液池則太液自在建章甚明而正史之於未央又無太液之文故豫得以議其不審也雍録麒麟殿未央宫有麒麟殿漢書哀帝燕董賢父子於麒麟殿三輔黃圖以下諸殿閣門室其方向位置皆未詳所在金華殿未央宫有金華殿三輔黃圖上方向學鄭寬中張禹朝夕入説尚書于金華殿中漢書敘傳宴昵殿班伯少受詩於師丹大將軍王鳯薦伯宜勸學召見宴昵殿漢書敘傳武臺殿武帝于未央宫起武臺三輔舊事猗蘭殿王美人七月七日旦生武帝於猗蘭殿漢武帝故事景帝夢一赤彘從雲中直入崇芳閣景帝覺而坐閣下果有赤龍如霧來蔽户牖宫內嬪御望閣上有丹霞蓊蔚而起霞滅見赤龍盤回棟間景帝使王夫人移居崇芳閣乃改崇芳閣為倚蘭殿漢武帝內傳白虎殿未央宫有白虎殿三輔黃圖河平四年單于來朝引見白虎殿漢書王商傳曲臺殿后蒼説禮數萬言號曰后氏曲臺記漢書孟卿傳服虔曰在曲臺校書著記因以為名師古曰曲臺殿在未央宫孟卿傳注飛羽殿太后冬饗飲飛羽漢書元后傳師古曰飛羽殿在未央宫中羽或作雨元后傳注敬法殿莽在未央宫朱魚等燒作室門斧敬法闥漢書王莽傳師古曰敬法殿名王莽傳注鳯凰殿通光殿鈎弋殿壽成殿萬嵗殿水延殿壽安殿平就殿宣德殿東明殿俱在未央宫見三輔黃圖神明殿在未央宫見漢武故事延年殿合歡殿四車殿在未央宫見三輔決録宣平殿長年殿在未央宫見漢宫閣記朱鳥堂在未央宫見漢宫殿疏麒麟閣上思股肱之美乃圖畫其人於麒麟閣漢書蘇武傳張晏曰武帝獲麒麟時作此閣遂以為名蘇武傳注麒麟閣亦藏書六典注白虎閣屬車閣堯閣俱在未央官見三輔黃圖織室少府有東織西織令丞河平元年省東織更名西織為織室漢書百官表未央宫有東西織室織作文繡郊廟之服有令史三輔黃圖凌室在未央宫藏氷之室詩豳風七月篇曰納于凌隂三輔黃圖暴室應劭曰暴室者宫人獄也今曰薄室師古曰暴室者掖庭主織作染練之署謂之暴室者取暴曬為名耳或謂薄室者薄亦暴也今俗語云暴曬蓋暴室織務既多因為置獄主治其罪人故往往謂之暴室獄耳然本非獄名應説失之矣漢書宣帝本紀注按三輔黃圖暴室在未央宫郎中府朱虛侯章請卒入未央宫掖門見産廷中逐擊産殺之郎中府吏舍厠中漢書髙后本紀如淳曰百官表令郎中掌宫殿門戶故其府在宫中後轉為光祿勳髙后本紀注四寶祠宣帝以方士言為隨侯劒寶玉寶璧周康寶鼎立四祠于未央宫中漢書郊祀志弄田在未央宫弄田者燕遊之田天子所戲弄耳漢書昭帝紀曰始元元年上耕于鈎盾弄田應劭注云帝時年九嵗未能親耕帝籍鈎盾官宦者近署故往試耕為戲弄成帝建始三年小女陳持弓年九嵗闌入尚方掖門至未央殿鈎盾禁中三輔黃圖青瑣門未央宫有青瑣門三輔黃圖黃門郎屬黃門令日暮入對青瑣門拜名曰夕郎漢舊儀師古曰青瑣門刻為連瑣文而以青塗之也漢書元后傳注作室門成帝為太子初作桂宫上急召太子出龍樓門不敢絶馳道西至直城門得絶乃度還入作室門漢書成帝本紀鈎弋臺在未央宫見三輔黃圖東山臺西山臺釣臺在未央宫見三輔故事路軨廏在未央宫掌宫中輿馬亦曰未央廏漢書曰武帝時期門郎上官桀遷為未央廏令三輔黃圖獸圈九彘圈一在未央宫文帝問上林尉及馮妃當熊皆此處獸圈上有樓觀三輔黃圖北宫惠帝張皇后廢處北宫漢書外戚傳師古曰在未央宫之北外戚傳注北宫在長安城中近桂宫俱在未央宫北周回十里髙帝時制度草創孝成增修之三輔黃圖東交門武帝從董偃遊戲北宫馳逐平樂觀有詔置酒北宫引董君從司馬門入更名東交門漢書東方朔傳前殿北宫有前殿廣五十步珠簾玉戶如桂宫三輔黃圖紫房復道成帝母太皇太后自居長樂宫而帝祖母定陶傅太后在國邸詔問宜當何居光不欲令后與帝旦夕相近即議以為定陶太后宜改築宫大司空何武曰可居北宫上從武言北宫有紫房復道通未央宫傅太后從復道朝夕至哀帝所漢書孔光傳壽宫北宫有神仙宫壽宫張羽旗設供具以禮神君神君來則肅然風生帷帳皆動三輔黃圖太子宫孝成皇帝元帝太子也母曰王皇后元帝在太子宫生甲觀畫堂漢書成帝本紀按太子宫未詳所在三輔黃圖序入北宫今從之桂宫在長安故城中元和志漢武帝造周回十餘里三輔黃圖武帝為七寶牀雜寶案厠寶屏風列寶帳設於桂宫時人謂為四寶宫西京雜記未央宫北即桂宫也舊乘復道用相徑通故渠出二宫之間謂之明渠水經注輦路經營修塗飛閣自未央而連桂宫西都賦鈎陳之外閣道穹窿屬長樂與明光徑北通乎桂宫西京賦龍樓門成帝為太子居桂宫上嘗急召太子出龍樓門漢書成帝本紀張晏曰門樓有銅龍若白鶴飛亷之為名也成帝本紀注鴻寧殿建平三年正月帝太太后所居桂宫正殿火漢書哀帝本紀建平三年正月桂宫鴻寧殿災帝祖母傅太后之所居也五行志明光殿桂宫中有明光殿土山復道從宫中西上城西至建章宫神明臺蓬萊山關輔記未央宫漸臺西有桂宫中有明光殿皆金玉珠璣為簾箔綴明月珠金砌玉階晝夜光明三秦記走狗臺桂宫有走狗臺三輔黃圖商臺避風臺見三輔黃圖明光宫武帝太初四年秋起在長樂宫後南與長樂宫相連屬三輔黃圖成都侯商病欲避暑從上借明光宫漢書元后傳師古曰明光在城內近桂宫元后傳注王莽篡位命孺子為定安公孝平皇后為定安太后改明光宫為定安館定安太后居之長安志建章宫在長安故城西雍勝略太初元年二月起建章宫漢書武帝本紀師古曰在未央宫西今長安故城西俗所稱貞女樓即此宫之闕也武帝本紀注建章宫度為千門萬戶郊祀志建章周回二十餘里關中記柏梁既災越巫陳方建章是經用厭火祥營宇之制事兼未央西京賦三輔舊事關中記皆言建章在城西上林之地東方朔傳曰陛下以城中為小圖起建章長安記曰王莾壞城西苑中建章十餘所取其材為九廟師古曰自建章以下皆在上林苑中關中記上林苑中有宫十二建章其一然建章如此其侈而正史少會正書臨幸則皆從飛閣越城以出也雍録飛閣武帝於未央營造日廣以城中為小乃於宫西跨城池作飛閣通建章宫構輦道以上下三輔黃圖案建章宫在長安城外與未央諸宫隔城相望故跨城而為閣道尤與常異三輔故事曰神明臺在建章宫故垂棟飛閣從宫中西上跨城而出乃達建章也雍録閶闔門一名璧門宫之正門曰閶闔髙二十五丈亦曰璧門漢書曰建章宫南有玉堂璧門三層臺髙三十丈玉堂內殿十二門階陛皆玉為之鑄銅鳯髙五尺飾黃金棲屋上下向風若翔椽首薄以璧玉因名璧門三輔黃圖鳯闕建章前殿度髙未央其東則鳯闕髙二十餘丈史記封禪書索隱曰三輔黃圖云武帝營建章起鳯闕髙二十五丈關中記一名别風闕以言别四方之風西京賦曰閶闔之內别風嶕嶢是也封禪書注俗謂鳯凰闕為貞女樓關輔古語設璧門之鳯闕上觚稜而棲金爵西京賦璧門左鳯闕三輔黃圖閶闔門內東出有析鳯闕一名别風玉海神明臺璧門右神明臺漢書曰建章宫有神明臺廟記曰神明臺武帝造祭金人處上有承露盤有銅仙人舒掌捧銅盤玉杯以承雲表之露以求仙道長安記仙人掌大七圍以銅為之三輔黃圖神明臺髙五十丈常置九天道士百人漢宫閣疏神明臺上有九室俗謂之九子臺而實非也水經注圓闕建章宫門北起圓闕髙二十五丈上有銅鳯凰赤眉賊壞之西京賦圓闕聳以造天若雙碣之相望是也三輔黃圖俗人謂鳯闕為貞女樓古歌辭云長安城西雙員闕上有一雙銅雀宿一鳴五榖生冉鳴五榖熟按銅雀即銅鳯也長安志按史記建章鳯闕髙二十餘丈即西京賦所云設璧門之鳯闕也又關中記建章宫圓闕有金鳯在上故號鳯闕似又以圓闕為鳯闕矣然唐賈至詩云雲帝城雙鳯闕則是鳯闕有二至唐而遺址尚存也意史記所謂鳯闕者俗既呼為貞女樓時或因圓闕有銅雀而亦呼之為鳯闕也名雖同出其實非一也嶕嶢闕廟記曰建章宫有嶕嶢闕薛綜注次門女闕也在圓闕門內二百步長安志井幹樓武帝作建章宫乃立神明臺井幹樓度五十丈輦道相屬史記封禪書神明井幹俱髙五十丈井幹樓積木而髙為樓若井幹之形也井幹者井上木欄也其形或四角或八角漢宫闕疏井幹疊而百層西京賦别風闕髙五十丈對峙井幹樓髙五十丈輦道相屬焉三輔黃圖前殿建章前殿度髙未央漢書郊祀志唐中庭漢書作商中建章宫西則唐中數十里史記封禪書索隱曰詩云中唐有甓鄭玄曰唐堂庭也爾雅以廟中路謂之唐西京賦曰前開唐中彌望廣潒是也封禪書注建章宫西則商中數十里漢書郊祀志如淳曰商中商庭也師古曰商金也於序在秋故謂西方之庭為商庭郊祀志注虎圈建章宫西虎圈漢書郊祀志師古曰於莵亦西方之獸故於此置其圈也郊祀志注太液池建章宫治大池漸臺髙二十餘丈命曰太液池中有蓬萊方丈瀛洲壺梁象海中神山龜魚之屬史記封禪書正義曰臣瓉云太液言象隂陽津液以作池也索隱曰三輔故事云池北岸有石魚長二丈廣五尺西岸有龜二枚各長六尺封禪書注師古曰漸浸也臺在池中為水所浸故曰漸臺三輔黃圖或作瀐字瀐亦浸耳漢書郊祀志注唐中池周回十二里在建章宫太液池南三輔黃圖避風臺太液池有避風臺即飛燕結裾之處關中記涼風臺建章宫北作涼風臺積木為樓髙五十餘丈關中記曝衣閣太液池西有武帝曝衣閣常至七月七日宫女出后衣登樓曝宋卜子陽園苑疏孤樹池太液池西有一池名孤樹池池中有一洲洲上煔樹一株六十餘圍望之重重如車蓋故取為名西京雜記淋池昭帝元始元年穿淋池廣千步東引太液之水池中植分枝荷一莖四葉狀如駢蓋花葉離萎芬馥之氣徹十餘里宫人貴之每遊宴出入必皆含嚼或剪以為衣或折以蔽日以為戲弄帝時命水嬉以文梓為船木蘭為柁刻飛鸞翔鷁飾於船首隨風輕漾畢景忘歸乃至通夜拾遺記鼓簧宫漢宫閣疏云鼓簧宫周匝一百三十步在建章宫西北三輔黃圖竒華宫在建章宫旁四海夷狄器服珍寶火浣布切玉刀巨象大雀師子宫馬充塞其中三輔黃圖駘蕩宫春時景物駘蕩滿宫中也三輔黃圖以下位置皆未詳馺娑宫馺娑馬行疾貌馬行迅速一日之間遍宫中言宫之大也三輔黃圖天梁宫梁至於天言宫之髙也三輔黃圖枍詣宫枍詣木名宫中美木茂盛也三輔黃圖影娥池武帝鑿以玩月其傍起望鵠臺以眺月影入池中使宫人乘舟弄月影名影娥池亦曰眺蟾臺三輔黃圖函德殿神爵元年三月詔曰金芝九莖産於函德殿銅池中漢書宣帝本紀建章宫有函德等二十六殿三輔黃圖北闕髙二十丈建章宫北闕門也廟記鈎弋宫在直門之南漢武故事鈎弋夫人姓趙氏河間人少好酒病卧六年右手鈎卷飲食少望氣者云東北有貴人推而得之見召姿色佳麗武帝披其手得玉鈎而手展乃命所居曰鈎弋宫列仙傳堯母門趙偼妤居鈎弋宫太始元年生昭帝號鈎弋子十四月乃生命所生門曰堯母門漢書趙偼妤傳宜春宫建元三年武帝微行東遊宜春漢書東方朔傳師古曰宜春宫在長安東南説者乃以為在鄠非也在鄠者自是宜春觀耳在長安城西豈得言東遊也郭璞曰在渭南杜縣東東方朔傳注師古曰宜春宫名在杜縣東即今曲江池是其地也上林賦注扶荔宫在上林苑中漢武帝元鼎六年破南越起扶荔宫以植所得竒草異木皆百餘本土木南北異宜嵗時多枯瘁荔枝自交址移置百株于庭無一生者連年猶移置不息後數嵗偶一株稍茂終無華實帝亦珍惜之三輔黃圖明堂武帝初即位嚮儒術以文學為本議立明堂於城南以朝諸侯漢書武帝本紀明堂在長安城西南七里三輔黃圖明堂在長安城外杜門之西關中記儲元宫在漢長安城中賈志馮昭儀與子信都王居儲元宫師古曰在上林苑中長安志宣曲宫在昆明池西孝宣帝曉音律嘗於此度曲因以為名三輔黃圖太乙宫在西安城南五十里太乙山谷中漢元封初南山谷間雲氣融結隂翳成象武帝于此建宫內有种放記陳希夷撰碑賈志櫟陽宫髙祖受命五日一朝太公於櫟陽宫唐書盧懷謹傳豫章宫漢武帝寶鼎二年立豫章宫於昆明池中作豫章亭述異記昭臺宫在上林苑中孝宣霍皇后立五年廢處昭臺宫三輔黃圖長門宫在故長安城東賈志長門宫離宫孝武陳皇后得幸頗妬居長門宫三輔黃圖顧城廟無宿宫竇太主獻長門園如淳曰園在長門長門在長安城東南園可以為館宿處所故獻之上大喜更名竇太主園為長門宫今按漢書長安城無名長門者長安志犬臺宫在上林苑中長安西二十八里漢書江充召見犬臺宫三輔黃圖晉灼曰上林有犬臺宫外有走狗觀師古曰今書本犬臺有作大臺字誤也漢無大臺宫漢書江充傳注黃山宫在興平縣西三十里武帝微行西至黃山宫即此也三輔黃圖右扶風槐里縣有黃山宫漢書地理志在潦水入渭之下渭在宫南玉海池陽宫在涇陽縣西北八里元和志上自甘泉宿池陽宫漢書宣帝本紀池陽宫在池陽南上原之陂有長年陂去長安五十里三輔黃圖長楊宫在盩厔縣東南三十二里雍勝略本秦舊宫至漢修飾之以備行幸宫中有垂楊數畝因為宫名三輔黃圖漏水東北流經長楊宫東水經注長楊樹在長楊宫秋冬校獵其下命武士搏射禽獸天子登此以觀焉三輔黃圖射熊館在長楊宫武帝好自擊熊司馬相如從至上林作賦諫揚雄亦作長楊賦三輔黃圖五柞宫在盩厔縣東南三十八里漢武帝起雍勝略武帝後元二年幸盩厔作五柞宫漢書武帝本紀漢之離宫也宫中有五柞樹因以為名三輔黃圖五柞宫有五柞樹皆連三抱上枝覆蔭數十畝西京雜記青梧觀五柞宫西有青梧觀觀前有三梧桐樹樹下有石麒麟二枚刋其脅為丈字是秦始皇驪山墓上物也頭髙一丈三尺東邉者前左腳折折處有赤血父老謂其有神皆含血屬筋焉西京雜記葡萄宫在盩厔縣境雍勝略葡萄宫在上林苑西十道志元壽二年單于來朝以太嵗厭勝所在舍之上林苑葡萄宫漢書丐奴傳醴泉宫在醴泉縣東南三十里漢宣帝聞泉味如酒因以建宫唐貞觀重修縣因以名賈志步壽宫在耀州東北一里賈志神爵二年正月鳯凰集祋祤於所集得玉寶起步壽宫漢書郊祀志秦亦有步壽宫今按其地與漢異則秦漢各有步壽宫耳三輔黃圖甘泉宫在淳化縣甘泉山上雍勝略齊上李少翁言上即欲與神通宫室被服非象神物不至乃作甘泉宫中為臺畫天地泰一諸鬼神而置祭具以致天神漢書郊祀志甘泉宫一曰雲陽宫周十九里二百二十步有宫十三臺十一武帝常以五月避暑於此八月乃還有銅人二枚在門外關輔記雲陽先生之墟也中有神書鐵劵玉石之記遁甲開山圖甘泉宫在雲陽縣磨石嶺上長安志曰磨石嶺山有甘泉十道志曰甘泉出石鼓西原漢甘泉宫在山上即秦林光宫旁也此取石鼓甘泉以名者也秦之林光至漢猶存漢武元封二年始即磨盤嶺秦宫之側為宫是為漢甘泉矣孟康注郊祀志曰甘泉一名林光師古曰漢於秦林光旁起甘泉宫非一名也師古説是也元封二年以前史之所記文景皆嘗臨幸甘泉不曰甘泉有宫可幸當是秦之林光逺在磨盤嶺上不燼於火而可用也武帝雖别創甘泉一宫而秦之林光如故則謂甘泉宫在林光宫旁者是也雍録雲陽宫記曰甘泉宫北有槐樹今謂之玉槐根幹盤峙三二百年木也耆舊相傳咸以為此樹即楊雄甘泉賦所謂玉樹青蔥者也長安志甘泉宫在甘泉山上今其地尚餘甓瓦甓作流水紋瓦頭有篆字淳化縣志熛闕前熛闕甘泉賦晉灼曰熛闕赤色之闕南方之帝曰赤熛甘泉賦志應門晉灼曰應門正在熛闕之內也甘泉賦注前殿武帝於甘泉宫更置前殿始廣諸宫室有芝生甘泉殿邉房漢宫儀注芝有九莖金色緑葉珠實夜有光乃作芝房之歌史漢舊儀前殿崔巍兮和氏瓏玲甘泉賦晉灼曰以黃金為璧帶含藍田璧瓏玲明見貌也甘泉賦注紫殿漢武帝起紫殿雕文刻鏤黼黻以玉飾之成帝永始四年行幸甘泉郊泰畤神光降於紫殿三輔黃圖武帝設雲帳雲幄雲幕於甘泉紫殿世謂三雲殿西京雜記泰畤殿元康四年三月詔曰乃者神爵五采以萬數集甘泉泰畤殿中及上林苑漢書宣帝本紀通天臺元封二年夏四月作甘泉通天臺漢書武帝本紀師古曰言此臺髙上通於天也漢舊儀曰髙三十丈武帝本紀注通天臺去地百餘丈望雲雨悉在其下去長安三百里望見長安城黃帝以來祭天圓丘處武帝祭太一上通天臺舞八嵗童女三百人置祠祀招仙人祭太一令人升通天臺以候天神天神既下祭所若大流星乃舉烽火而就竹宫望拜上有承露仙人掌擎玉杯承雲表之露漢武故事乃望通天之繹繹直嶤嶢以造天甘泉賦通天臺元鳯間自毁椽桷化為龍鳯從風雨飛去亦曰候神臺又曰望仙臺三輔黃圖望風臺太初二年起甘泉望風臺臺上得白珠如花一枝帝以錦蓋覆之如照月矣因名照月珠洞冥記益壽館延壽館公孫卿言仙人好樓居於是上令長安則作飛亷桂館甘泉則作益壽延壽館使卿持節設具而候神人漢書郊祀志明光宫武帝求仙起明光宫發燕趙美女二千人充之率取二十以下十五以上年滿三十者出嫁之掖庭令總其籍時有死出者隨補之三輔黃圖按雍録漢有明光宫三一在北宫與長樂相連一在甘泉宫中一為尚書奏事之地黃圖于此係之甘泉宫今從之居室衛青嘗從入甘泉居室史記衛將軍傳正義曰按居室署名武帝改曰保宫灌夫繫居室是也衛將軍傳注竹宫甘泉祠宫也以竹為宫天子居中漢舊儀云竹宫去壇三里三輔黃圖招仙閣元鼎元年起招仙閣於甘泉宫西編翠羽麟毫為簾青琉璃為扇懸黎火齊為床其上懸浮金輕玉之磬閣上燒荃靡香屑燒粒許其氣三月不絶進􅝜嵻細棗咋之有膏膏可燃燈洞冥記昆明池靈波殿甘泉宫南昆明池中有靈波殿七間皆以桂為柱風來自香帝既耽於靈怪常得丹豹之髓白鳯之膏磨青錫為屑以蘇油和之照於神壇夜暴雨光不滅有雙蛾如蜂赴火侍者舉麟鬚拂之述異記髙光宫甘泉宫有髙光宫長安志覽樛流於髙光兮甘泉賦服虔曰髙光宫名也樛流曲折也甘泉賦注通靈臺鈎弋夫人既殯香聞十餘里帝哀悼疑其非常人也乃起通靈於甘泉常有一青鳥集臺上往來漢武內傳木園甘泉宫有木園武帝時園也今俗呼為仙草園漢魏宫志壽宫武帝病愈起幸甘泉置壽宫漢書郊祀志洪崖宫旁皇觀儲胥觀弩阹宫俱在甘泉宫見長安志迎風館見漢書石闕觀封巒觀鳷鵲觀露寒觀在甘泉宫外見甘泉賦諸侯邸故基在甘泉山雍勝略黃帝治明庭甘泉也方士多言古帝王都甘泉者其後天子又朝諸侯甘泉甘泉有諸侯邸史記封禪書棠梨宫在甘泉苑垣外雲陽南三十里三輔黃圖師得宫師古曰師得宫在雲陽界漢書注集靈宫集仙宫存仙殿存神殿望仙臺望仙觀俱在華隂縣界皆武帝宫觀名也三輔黃圖華隂集靈宫武帝所造欲懷集仙者王喬赤松子故名殿為存仙端門南向署曰望仙門後漢桓君山集靈宫賦序敷水又北徑集靈宫西張昶華嶽碑稱漢武慕其靈築宫在其後水經注漢宫闕附考鼎湖宫黃圖鼎湖宫在湖城縣界晉灼曰在藍田玉海按湖城今閿鄉縣是而馮賈馬三志俱序之於藍田殆遵晉説也神光宫揚子雲羽獵賦入西園切神光注張晏曰神光宫名玉海招靈閣漢武帝元鼎元年起招靈閣有一神女留一玉叉與帝帝以賜趙媫妤至昭帝元鳯中宫人見此叉光瑩甚異共謀欲碎之明視叉匣唯見白燕直升天去後宫人常作玉叉因名玉燕叉述異記後漢獻帝宫在長安故城中本京兆府舍也長安志獻帝聞關東兵起董卓遷帝都長安見未央等宫遭赤睂之亂宫室廢弛故居京兆府舍帝王世紀晉太極殿晉愍帝之宫在長安南門後姚興重建周地圖記西宫劉曜命起酆明觀立西宫晉書前趙載記太極前殿苻健入長安稱天王大單于繕宗廟社稷置百官僣即皇帝位於太極前殿晉書前秦載記東宫苻健疾苻菁勒兵入東宫將殺苻生時生侍健疾菁回攻東掖門健聞變升端門陳兵執菁殺之晉書前秦載記平朔門苻健置來賓館於平朔門晉書前秦載記雲龍門清河王符法率壯士入雲龍門廢苻生而立苻堅長安志明光殿明光殿者秦苻堅之殿也長安志有人入堅明光殿大呼謂堅曰甲申乙酉魚羊食人悲哉無復遺堅命執之俄而不見晉書前秦載記露堂苻堅將為赦與王猛苻融密議於露堂有大蒼蠅集筆端驅而復來晉書前秦載記明堂苻堅起明堂祀其伯健于明堂以配上帝晉書前秦載記東闕苻堅僣位五年鳯凰集于東闕晉書前秦載記西堂車師前部鄯善王林密馱朝於秦堅賜以朝服引見於西堂長安志徽音堂在惡犬城之外苻氏造也長安志永安宫姚萇宫也長安志按姚氏繼苻秦都長安稱為後秦云東堂薑龕淳于岐郭髙等皆耆儒碩德興每於聼政之暇引龕等於東堂講論道藝錯綜名理晉書後秦載記咨議堂姚興常臨咨議堂聽決疑獄于時號無寃滯晉書後秦載記西宫姚興立姚見子監國入居西宫長安志黃龍門興之宫門也長安志秦王殿在耀州北七十里今遺瓦殿基尚在賈志上有御池泉即古鳯遊鄉也晉泰安元年苻堅將姚萇背堅起兵北地自立為王國號秦秦王殿蓋始于此南三十里入淳化境又有萇按軍厰云耀州志魏孝武帝宫永熙三年髙歡入洛宇文泰迎帝入長安以雍州公廨為宫北史魏孝武帝本紀清暉室魏文帝大統四年祀天於清暉室長安志陽武門文帝大統五年十月於陽武門外縣鼓置紙筆以求得失北史魏文帝本紀憑雲觀大統七年十二月帝御憑雲觀引見諸王敘家人之禮北史魏文帝本紀萬壽殿大統八年十二月行幸華州起萬壽殿於沙苑北北史魏文帝本紀乾安殿按長安志西魏有乾安殿周書閔帝紀會百官於乾安殿班賞各有差周承西魏都邑不改意此殿創自西魏而後周襲之歟後周延壽殿明帝元年九月朝羣臣於延壽殿周書明帝本紀正武殿周明帝武帝並聽訟于正武殿長安志麟趾殿蕭大圜恆以讀詩禮書易為事開麟趾殿招集學士大圜預焉周書蕭大圜傳露門武帝建德三年正月壬戌朝羣臣露門周書武帝本紀保定中置露門學玉海大德殿武帝天和三年八月帝御大德殿集百僚及沙門道士等親講禮記周書武帝本紀咸陽宫宣帝太象二年四月祈雨至咸陽宫周書宣帝本紀醴泉宫武帝天和二年五月行幸醴泉宫周書武帝本紀天成宫西魏太師宇文泰故居泰以同州扼關河之要既專政猶時居州後孝閔帝受魏禪改同州宫明帝有幸同州故宫詩至宣帝大象二年改天成宫賈志長春宫在同州朝邑縣本周武帝作保定五年宇文護築隋開皇中修之玉海髙祖起義兵九月次長春宫唐書髙祖本紀天晴宫栁暗長春杜甫詩雲陽宫北史後周有雲陽宫玉海紫極宫重陽閣大武殿津門露寢右寢崇信殿肅章門會義殿舍仁殿雲和殿思齊殿青城門太極殿天臺正陽宫青門露寢天興宫應門天德殿通道觀軍器監崇義宫連珠殿雲和樓以上皆後周所有俱見長安志內隋大興京城開皇二年六月詔左僕射髙熲等創造新都於龍首山十二月名新都曰大興城三年三月入新都隋書文帝本紀開皇三年置雍州城東西十八里一百一十五步南北十五里一百七十五步東面通化春明延興三門南面啓夏明德安化三門西面延平金光開逺三門北面光化一門里一百六市二地理志隋文帝開皇二年自故都徙其地在漢故城之東南屬杜縣周之京兆郡萬年縣界長安志宇文愷之營隋都也曰朱雀街南北盡郭有六條髙坡象乾卦六爻故於九二置宫殿以當帝王之居九三立百司以應君子之數九五貴位不欲常人居之故置玄都觀及興善寺以鎮其地劉禹錫賦看花詩即此也雍録大興立名之由傳者不一或曰隋文帝嘗封大興故以名或曰宫之太極殿本大興材故因用其名也或曰隋文帝夢洪水浸沒都城故改營大興洪水者髙祖名淵故也數語未知孰是然韋述謂本大興材名者其説近之蓋嘗有僧坐大木下曰此後當為宫殿大木即在大興殿基上也亦如漢髙帝因長安鄉而立為都名也同上皇城亦曰子城東西五里一百一十五步南北三里一百四十步城中南北七街東西五街其間並列臺省寺衛自西漢以後至于宋齊梁陳並有人家在宫闕之間隋文帝以為不便於是皇城之內惟列市府不使雜人居止公私有辨風俗齊肅實隋文新意也長安志大興宫隋文帝建以城名馬志隋都城中正宫以及正殿皆名大興雍録大興殿宫城之正殿也馬志開皇四年宴突厥髙麗吐谷渾使者於大興殿隋書文帝本紀中華殿在大興殿之後馬志昭陽門在大興殿之南開皇二年作初名唐陽門仁壽二年改今名馬志建春門大興宫之南門也後改通訓門馬志大興門大興城之北門也後改乾福門馬志臨光殿開皇元年二月上自相府常服入宫備禮即皇帝位於臨光殿隋書文帝本紀觀德殿開皇二年十月上疾愈享百寮于觀德殿賜錢帛任其自取盡力而出隋書文帝本紀射殿開皇六年九月上素服御射殿召百寮射隋書文帝本紀文思殿開皇十一年春正月皇太子妃元氏薨上舉哀於文思殿隋書文帝本紀嘉則殿開皇十三年二月宴考使於嘉則殿隋書文帝本紀武德殿開皇十九年大射武德殿宴賜百官隋書文帝本紀允武殿大業四年正月百僚大射於允武殿隋書煬帝本紀崇德殿大業五年二月上御崇德殿之西院愀然不悅顧謂左右曰此先帝之所居實用增感情所未安宜于此院之西别營一殿隋書煬帝本紀大業殿大業十二年春正月夜有二大烏似雕飛入大業殿止于御幄至明而去隋書煬帝本紀宣仁門開皇元年三月宣仁門槐樹連理衆枝內附隋書文帝本紀建國門大業六年正月有盜數十人入自建國門隋書煬帝本紀端門街大業六年正月角抵大戲於端門街天下竒技異藝畢集終月而罷帝數微服往觀之隋書煬帝本記以上殿七門二街一皆在大興城中其位置未詳東宫朝堂在皇城內馬志長樂宫京兆郡大興有長樂宫隋書地理志望春宫在西安府城東十里隋文帝建煬帝改名曰長樂宫馬志仙都宫福陽宫俱在長安縣馬志京兆長安有仙都福陽等宫隋書地理志仙林宫在興平縣西十八里隋文帝置