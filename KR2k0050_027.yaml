body:
  text: 陜西通志卷二十七學校辟雍鐘鼓於皇鎬京中天麗日大道昌眀三物四術立範垂型漢更秦弊綿蕝是營講求同異渠閣談經唐開六館雅鄭競鳴卓彼關儒鑰啓西銘朂哉德造樂育觀成作學校志第十國朝陜西西安布政使司所屬五府十二州七十三縣共設儒學九十所膠庠選取師生教養之規詳列焉其課試拔補充貢為學政所通行者不載雍正元年恩詔各省入學額數大學加七名西安府等大學二十一學共廣額一百四十七名中學加五名咸陽等中學二十九學共廣額一百四十五名小學加三名藍田等小學三十七學共廣額一百十一名恩加一次後不為例雍正二年文童廣額蒲城縣舊係大學照府大學例取二十名咸陽同州乾州武功鄠縣興平膚施洛川清澗寶雞城固興安州舊係中學照大學例各取十五名三水商州安定葭州汧陽沔縣舊係小學照中學例各取十二名華隂縣舊係中學潼關衛裁衛籍入華隂照府大學例額取二十名雍正五年改潼關衛為縣華潼二縣文童入學名數照中學例各取十二名鳯翔府學舊係中學照府大學例額取二十名武童廣額咸寧長安蒲城華州鳯翔縣舊係大學照府大學例各取二十名咸陽乾州同州鄠縣膚施岐山城固興安州舊係中學照大學例各取十五名商州藍田神木榆林靖邉舊係小學照中學例各取十二名鳯翔府學舊係中學照府大學例額取二十名雍正十一年禮部覆準陜西學政潘允敏奏請新設榆林府學取進文武童生各十二名定邉懷逺取進文武童生各八名榆林靖邉武童舊額十二名應減四名文童仍取八名同州華州綏德州韓城郃陽清澗三原等州縣照府學額數取進文童各二十名商州澄城華隂醴泉等州縣照大學額數取進文童各十五名米脂武童照大學例取進十五名大清會典學田之設原以供春秋饗祀及贍給貧士之用有舊置者有助給者厯年多寡不一康熙二十二年直省册報陜西西延等處學田五十五頃二十畝租銀一百五十六兩三錢租糧一千二百三十七石九斗衛所學田一頃八畝租麥九石六斗三升六合米九石六斗三升六合雍正五年西鳯漢三府興商華同邠乾耀七州屬册報學田原額并續墾共地五十四頃六十四畝五釐八毫五絲內除南鄭縣陸續開墾外止荒蕪并射圃亭占地二頃三畝九分八釐五毫實在熟地通共五十二頃六十畝七釐三毫五絲惟略陽縣地係岩坡山溝難以計畝學租每年共徴麥榖雜糧一千二十一石九斗八升四合一勺二抄租銀一百五十四兩四錢一分七釐三毫九絲又查報義田案內申報西安府渭南縣學田地七十八畝每年徴麥榖一十一石七斗又西安府咸長二縣并華州潼關縣雍正五年分造報舊時按院置學田地共二百六十一畝四分七釐八毫咸長二縣學租共一百十五石九斗三升二合潼關學租棉花六十斤按以上學田學租入雍正五年奏奏銷又據各屬册報餘俱未入銷西安府府學大學在府治東南即宋金學校舊址元至正間行省平章亷希憲重修學士虞集記眀成化九年巡撫馬文升知府孫仁拓修學士商輅記本朝順治十年提學田厥茂重修有記宋景祐二年侍郎范雍奏昨知永興軍前資寄住官員頗多子弟輩不務肯構惟恣輕薄蓋由别無學校勵業之所致到任後奏建府學兼賜九經書差官主掌每日講授據本府分析見有修業進士一百三十七人在學關中風氣稍變權節度掌書記陳諭管勾乞降敕命令常遵守中書劄子學制大門三間前有譽髦斯士坊門內為泮池儀門內當甬道為魁星樓正中上面為眀倫堂五間兩旁為四齋曰志道曰據德曰依仁曰遊藝各三楹東西號舍各三十六間堂後為尊經閣五間上貯書籍閣旁碑亭二座閣後神器庫六間敬一亭在殿後射圃亭在長安縣學右府志府學文廟嵗久頺敝成化戊子副都御史馬文升巡撫是邦意圖恢拓未果越壬辰秋仲釋奠適大風雨殿廡傾圮乃謀諸巡按蘇盛布政朱英按察宋有文撤而新之令西安知府孫仁出公帑羡餘擴其舊址首建大成殿七間兩廡各三十間次作戟門􅎉星門神厨齋房泮池及殿後漢唐石刻之屬舊覆亭宇咸增新之經始於癸巳春正月至秋八月訖工商輅儒學碑記西安居省會郡一邑二故學三而廟一廟當城南門之東宅巽離中郡學掖而右咸寧邑治在東故學亦東長安邑治在西學亦在西東學之東為啓聖祠廟之後環列古諸石經名刻覆以步欄俗謂碑洞洞後正南面建亭奉敬一針而針之東西各為亭尊制也郡學眀倫堂後特峙尊經一閣典籍藏焉一廟三學宏規壯觀凡學宫鮮其儷郡學宋已居此二邑學則眀成化中建嘉靖間都御史王堯封布政使黃臣知府李文極鹽城夏雷接踵聿新萬厯癸巳淫潦彌時公私垣舍大壞廟學滋甚知縣李得中謀諸長安令沈聽之相與共請諸道府於是工成不日焉郡人周宇記正學書院在府治西南蓋宋橫渠張子倡道之地門人吕大鈞等皆得其傳元許魯齋主學事亦多造就後省臣建議為書院合祀橫渠魯齋及其鄉賢楊元甫而聚徒講學其間入眀百餘年遺址無存至𢎞治九年提學副使楊一清卜地重建大學士李東陽記𢎞治中提學王雲鳯建書樓于正學書院廣收書籍以資諸生誦覽嘉靖中唐龍督學時士學趨詭異乃新正學書院選士羣肄之剗其竒靡而約諸理其所登進者悉為名臣賈志本傳萬厯乙酉許孚逺督關中學禮聘三原王之士多士興起關學編國初巡撫賈漢復重修同州李楷有記關中書院在府治東南眀萬厯三十七年布政汪可受按察李天麟參政熊應占閔洪學副使陳寧段猷顯為馮從吾講學建其講堂額曰允執從吾有記學田按府學廩餼及貧士俱長咸二縣學租內支放不另設學田各府學倣此長安縣學大學舊在縣治西眀成化九年巡撫馬文升議徙府學西萬厯三十七年知縣楊鶴重修改移泮池增置棹楔雲路本朝順治八年知縣樊鴻選訓導張宏業重修有記社學六所嚴家渠周家莊席房村灣村香積寺薑村堡各一區學田三頃四畝五分八釐租一百二十二石九升九合又舊有按院置學田地一頃一十六畝九分二釐九毫徴租四十六石一斗六升咸寧縣學大學舊在縣治西眀成化七年提學副使伍福奏徙府學東按徙時在成化九年知府余子俊修嘉靖十一年知府李文極萬厯十三年知縣李生芳重修郡人府尹王鶴記十八年知縣李得中又修本朝順治十二年知縣余國柱康熙三年知縣黃家鼎增修俱有碑記魯齋書院在咸寧縣治東北續文獻通考延祐元年京兆為故儒臣許衡立魯齋書院降璽書旌之元史仁宗本紀按今廢社學四所新住鎮香胡灣黃渠頭狄寨鎮各一區學田六頃四畝七分三釐二毫租二百五石八升六合又舊有按院置學田地一頃二十九畝五分四釐九毫徴租六十九石七斗六升六合咸陽縣學大學在縣治西眀洪武四年縣丞孔文郁建天順二年知縣賈仁重修參議許彬記正德元年知縣孟統又修教諭孔慶記社學四所一在縣治其三所在賈村雙照等里學田地三十九畝二分租二十石六斗四升興平縣學大學在縣治西眀洪武三年知縣沈訥建成化十年知縣王悰𢎞治九年知縣朱瑄正德間知縣李應陽嘉靖間知縣孔完重修四十年知縣朱文增修武功張鍊記本朝順治十五年知縣徐開熙重建有記學田地一百畝租三十五石臨潼縣學大學舊在縣城北宋咸平中知縣趙恪改建主簿王漢有記元至元二十九年知縣馬忙修韓擇有記至正十五年冬官尚書趙公諒重修太史歐陽元有記眀洪武二年重建長史易謙記成化間知縣劉聰髙垣繼修嘉靖間地震學圮萬厯十二年知縣劉應聘增修尚書溫純記本朝康熙四十二年教諭張鍾因傾圮捐俸徙建於廟東橫渠書院在縣治東南即察院廢址康熙三十七年知縣趙于京建有碑記驪山書院在驪山下即古白鹿書院舊址居善書院在學西取易居賢善俗之義元工部尚書趙公諒建歐陽元有記按今廢社學一在橫渠書院一在驪山書院學田地九十六畝八分租一十七石三斗四升五合髙陵縣學中學在縣治北宋紹聖元年知縣朱革建縣尉吳柔嘉記崇寧四年知縣范棟重修自撰記元中統二年縣丞張鼎更建有記眀洪武六年重修正統間知縣張錦天順間知縣張琦張傑相繼修成化二十年知縣段讓修知縣劉安記𢎞治六年知縣楊舟嘉靖四年知縣鄧興仁修提學副使唐龍記十年知縣楊剛又修本朝順治十年知縣王元捷修十八年邑人李原茂捐資增修進士魚飛漢記康熙十九年知縣張都修有自記五十八年知縣熊士伯又修渭上書院在縣南渭北元延祐初建見學士蕭􅝥撰三原學古書院記按府志眀時髙陵又有涇野書院今並廢社學五所一在縣治西街其四在鄉之店子頭魏村等各里義學三所一在楊官寨一在東馬家村一在河南馬家村雍正七年立學田地一頃一十一畝七分三釐租二十五石一斗三升六合六勺鄠縣學大學舊在縣城外眀洪武七年教諭張紳移建縣西永樂十二年教諭方蘄訓導馮翊撤而新之正統十二年知縣徐純修侍講楊鼎記嘉靖六年知縣康天爵崇禎十一年知縣張宗孟重修本朝順治十一年知縣魏似韓十八年署縣駱鍾麟康熙十七年知縣曹爾弼二十一年知縣康如璉相繼修三十八年知縣朱文卿重修有記渼陂書院在縣治西二曲書院在縣西南三里王心敬延其師李二曲顒講學於此提學髙爾公為之建坊社學在鄉賢祠內義學在縣治西街眀知縣宋廷琦本朝知縣劉文燦合祀祠內學田地三十七畝五分租二十二石五斗社田康熙五十七年督學覺羅逄泰捐置五畝租三石又知縣吳廷芝捐置四畝租六石八斗又官紳士子等共捐置地二畝租三石二斗藍田縣學中學在縣治南眀洪武十年知縣樓璉建正統八年知縣王禧嘉靖六年知縣王科修二十八年巡按程軏增修都御史許宗魯記萬厯間知縣李景登三十年知縣王邦才重修尚書孫丕揚記本朝順治十年知縣蘇就大復修瀛州書院在縣治南唐學士李元通建眀𢎞治時知縣任文獻重修藝閣書院在縣治北五里宋吕大臨建眀知縣任文獻重修按府志吕氏四賢祠後有藝閣寺俗呼吕氏菴𢎞治中提學王雲鳯撤佛像匾曰藝閣書院又有秦關書院知縣梁一道為博士王之士建秦關者之士别號也今廢社學在縣治厚子鎮南大寨故景川泄湖鎮安村等里共五所學田地六十畝租二十二石一斗六升七合二勺涇陽縣學大學在縣治西南宋元祐五年建眀洪武二年知縣張師孟重建天順元年主簿潘敏嘉靖間知縣樊鍾岱朱友達萬厯三年知縣傅好禮崇禎五年知縣梁士淳相繼增修本朝順治五年知縣張應召重修自為記學田地共四十三畝六分四釐四毫五絲租二十六石一斗八升六合七勺三原縣學大學在縣治西北元大德十年鎮人張德眀創建縣尹郭真拓修至正十年縣尹李誠修二十八年左丞陳思道重修侍御董立記眀洪武二年縣丞仰山重建成化十二年知縣李景繁𢎞治四年知縣馬龍萬厯間邑進士溫純修本朝康熙二十一年知縣葉章重修提學葉映榴有記康熙三十五年知縣俞璉增修學古書院在縣治西北元延祐七年邑人李子敬暨弟子𢡟創建蕭􅝥有記府志三原李子敬創學古書院延涇陽程瑁講學其中逺近從遊者百餘人稱恱古先生關學編眀𢎞治元年西安知府徐政重建嘉靖四十四年地震圮四十六年縣丞張九功重修按察使喬世寧撰碑萬厯間巡按傅振商增修有記宏道書院在縣治北眀𢎞治九年建邑人兵科給事王承裕與從遊之士講學於此副使王雲鳯記王端毅致仕康僖以進士侍歸講學