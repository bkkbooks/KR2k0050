知縣王永命以講席久虛改祀杜工部社學在縣城內康熙五十六年提學覺羅逄泰捐銀一十二兩置社學地四畝乾州州學大學在州治東南眀洪武四年建天順四年知州何節修永新劉定之記萬厯天啓間知州賈一敬周應泰修本朝康熙五十六年提學王雲錦知州黃煒修郡人陳其蘊記紫陽書院元楊奐建奐少時夢遊朱子紫陽閣遂建書院因以紫陽名之後廢眀成化四年知州許珙奉提學副使伍福擇地建祠在今州署東義學四所在陸陌鎮等里雍正三年建學田一頃三十畝租四十四石一斗七升武功縣學大學在縣治東宋崇寧二年知縣趙茂曽建有碑記眀洪武二年知縣嚴祀重建正德十四年提學副使何景眀知府劉祥知縣馮瑋增修萬厯九年知縣曹崇朴重修邑人張鍊記本朝康熙二十五年知縣徐竒桂四十八年知縣孫琮重修緑野書院在縣南郭外東舊為緑野亭宋儒張子子厚與武功簿張山甫善武功弟子從子厚遊亭此講學焉眀𢎞治八年沁水李翰以御史巡按至諸生白其事乃謀於提學副使楊一清屬知縣宋學通擴修舊址踰年乃成改曰緑野書院前為子厚祠後建講堂學舍縣志楊公建緑野書院擇士子充於中以訓導趙文傑為之師其規約大率與白鹿睢陽類時西安鳯翔諸生聞風踵至公時坐堂上督勸之渢渢乎道學之流行也禮部尚書吳寬記學田二頃一十四畝租七十八石五斗永夀縣學小學舊在縣治西北元延祐七年建致和元年縣尉宋思義重修治中單鵠有記眀洪武二年重建天順元年知縣郭質重修河東薛瑄有記本朝康熙八年知縣張焜創建于今縣治東永邑文風不振焜因謀建學周回審睇得地二畝許於城之東北隅糾工庀材於康熙八年告成率師生禮拜間忽祥光繞橋門靈鵲集大成殿無不舉手加額是年鄉試諸生任夀羅萬傑俱中式建學之效傳為盛事張焜自記學田三頃一畝五分租銀十三兩一錢三分八釐五毫邠州州學小學舊在州治東南隅宋慶厯中建州守范仲淹有記眀洪武六年判官莫彥榮徙州治西成化十六年知州劉濟重修郡人尚書劉昭記慶厯甲申詔天下建郡縣之學眀年春范仲淹為邠城守署事之三日謁廟隘甚因議改卜於郡之東南隅地址高眀遂以建學并其廟遷焉仲淹自記學田三頃八畝租三十九石五斗六升八合三水縣學中學在縣治東南眀成化十四年知縣楊豫建本朝康熙十年知縣林逄泰重修邑人文倬天有記樂育書院在縣治北眀萬厯中文在中建學田二頃七十一畝七分四釐租二十石八斗五升七合淳化縣學小學舊在縣治南眀洪武二十年徙縣東南隅宣德中知縣邢清重修邑人賈我琪有記正德十五年副使何天衢行縣以學宫逼南城下令署縣事縣丞畢經移置今縣治北光祿卿馬理有遷廟學碑記萬厯五年知縣李朝忠修寧州楊棲鳯記本朝康熙十一年知縣文秉濓二十五年知縣張綸重修俱有碑記又墀內有宋大觀二年八行八刑碑義學一在縣北關一在通潤鎮雍正八年署縣商兆麒建學田一頃三十八畝三分六釐租一十一石二斗二升四合眀萬厯三十二年提學臧爾勸置知縣歐陽暖有記長武縣學小學在縣治西南眀萬厯十二年知縣梁道凝建提學許孚逺記眀萬厯十一年割宜祿為長武邑治既興學宫鼎建左為廟右為眀倫堂兩廡兩齋各如制廟北為啓聖祠戟門之旁為名宦鄉賢祠堂北為尊經閣迤西為敬一亭宫牆之外東為社學西為射圃期月告成諸生籍宜祿改從新學者凡五十有餘人許孚遠記鄜州州學中學在州治西南元至正間知州宋居正建眀洪武六年同知金文徴重建並立碑記天順間知州馮迪成化五年知州馬傑繼修十年知州李瓚修提學伍福有記嘉靖四十年亷訪使王崇古重修都御史楊宗氣有記四十五年知州蘇璜因城北三河暴漲學宫傾圮集議捐修刑部郎中劉仕記崇禎十年副使孔聞謤又修本朝順治十六年河西道許瑤十八年參政李榮宗知州顧耿臣重修洛川縣學中學在縣治西南五十步宋元遺址眀洪武七年知縣朱炳建同知金文徴記成化四年知縣李瓚修提學副使伍福記嘉靖二十五年知縣吉澄增修三十四年地震圮四十年副使王崇古重修按察使喬世寧記泰徴書院在城南崇禎間知縣劉三顧建作臺高二丈許社學六所東北二關二區餘在朱龍鎮鳯棲鎮等里義學在縣治西學田一頃租銀四兩中部縣學小學舊在坊州城眀洪武間建成化初知縣劉潔移建縣治東南𢎞治中知縣鄭源萬厯元年知縣衛汝霖增修崇禎三年兵燬五年知縣姚一麟徙置上城本朝康熙二十五年知縣魏力仁修五十七年知縣杜喬復移建下城舊址有碑記宜君縣學小學在縣治東眀洪武八年知縣金聲建𢎞治間知縣李相增修本朝順治初知縣鄭名康熙五年知縣周之簡四十四年知縣林礦相繼增修綏德州州學大學舊在州城西北金承安四年刺史秦守正移州治東嵯峨山南一百步泰和元年增修有記眀洪武間重建景泰間知州張軾修𢎞治間知州王京增修萬厯九年知州劉思璉重修本朝順治十七年知州王元士重建檢討白乃貞御史艾元復俱有碑記州據形勝襟帶關隴控制靈夏為用武之地又蒞政者率多武人故學者比內郡為少衰承安四年刺史秦守正謁廟廟地汙下廣不盈畝廡序像設不具謀徙而大之眀年得地於州之東南極亢爽遂營新宫從于陳蔡者像之登於堂其六十二子繪于兩廡鑿宫前土山闢其扉臨通衢甫六月而工畢由是境內及旁郡來學者衆金康樂寨知寨劉忠記社學在州治右眀嘉靖間知州靳東齊改建米脂縣學中學舊在縣治上城元至元間主簿馮安國建眀洪武間知縣解彞重修𢎞治九年提學副使楊一清因學基隘令知縣陳奎徙今下城之東高陵吕柟記本朝康熙二十年知縣寧養氣修雍正五年邑紳士重修知縣諸葛永健有記社學在縣治北隅清澗縣學大學在縣治西南一百步眀洪武六年知縣鄒宗彝建洪熙元年教諭陳致中修景泰間知縣張定正德六年知縣馬呈圖嘉靖間知縣王欽隆慶三年知縣阮孝萬厯四十二年知縣陳汝元相繼增修本朝順治四年知縣廖元發修康熙五年知縣江雯重修邑人檢討白乃貞有記義學四所一在縣署北一在駱駝鋪一在田莊鋪一在賀家灣葭州州學中學舊在州治南一里故城內山之陽明成化間副使周鼎令知州劉育改建于山隂𢎞治間知州沈理增修萬厯三十一年知州王汝為重修貢生劉登名有記本朝順治九年知州戴可進重建十六年知州武宏祖康熙三十九年知州賀勳增修張金佩有記社學在州治龍頭岡西義學在州治東南隅康熙十五年知州孫育竒建學田二十五畝零租銀一兩二錢吳堡縣學小學在縣治西南元至正間建眀洪武三年主簿周琛重建十四年知縣范平仲宣德十年知縣袁禮修天順五年知縣郭敏移建廟南成化十年知縣劉儀修嘉靖十九年知縣張弛重修同知趙時寧有記萬厯四十一年知縣盧文鴻仍遷廟西本朝康熙三十七年知縣沈宏勳改建於文廟戟門外社學在文廟前舊敬一亭遺址神木縣學中學在縣治南眀洪武十四年知縣任奉先建正統八年知縣彭佐糜奎重修隆慶六年觀察張守中增修吏部侍郎張四維有記本朝順治八年觀察彭有義知縣程啓朱創修康熙六年觀察馮翊時五十四年觀察羅景相繼捐修學田三垧租九斗府谷縣學小學在縣治東眀洪武十四年知縣齊翺建天順五年知縣秦紘修成化十二年知縣賀昭修訓導都仲良記十六年知縣田璋嘉靖十九年知縣柳聫芳萬厯十四年知縣范學顔相繼修本朝順治八年知縣魏震十四年知縣龔榮遇創修舉人劉無邪記康熙五年知縣楊許玉二十四年知縣徐恆繼修社學在縣治北街真武廟側雍正五年知縣周會賢建坊立學陜西通志卷二十七
