body:
  text: 陜西通志卷四十八帝系一帝王諸王后妃宗室太子粵若稽古周秦漢唐維耀魄寶照灼秦疆乃立廟社乃啓明堂克艱締造紹衣罔康關睢化始龍漦德涼瓜綿椒衍戚畹輝煌聖狂異軌淑慝偕彰永垂法戒地久天長作帝系志第二十三帝王古今都會惟關中最先黃農以上弗可深考周家夙號至治漢唐亦稱一代之盛苐泛覽諸本紀則美不勝書兹特以歷代建都為經帝系為緯自史臣論贊而外不衍一辭云上古五龍氏五龍是謂五姓治在五方司五類布山嶽蓋龍德而正中者也路史中三皇紀今上郡奢延膚施縣有五龍山蓋其出治之所故漢宣帝立五龍仙人祠於膚施本注雲陽氏雲陽氏作是為陽帝厥化混混厥生濛濛都於雍之甘泉循蜚紀甘泉山本亦曰雲陽在馮翊雲陽縣雲陽氏之嘗居路史注有巢氏有巢氏駕六龍從日月是曰古皇龜龍效圖書畀於是文成而天下治其為政也授而弗惡子而弗取天下之民皈仁居於及盤嶺路史禪通紀盤嶺在長安三秦紀云長安城有平原數百里無山川湖水民尚井汲巢居地多井深者五十丈今興平始平原也本注陰康氏隂康氏之時隂凝而易閟人既鬱於內腠理墆著而多重膇得所以利其關節者制為之舞教人引舞以利𨗳之是謂大舞治於華原路史禪通紀州按華原即今耀女皇氏女皇氏太昊氏之女弟少佐太昊正姓氏職婚姻通行媒以重萬民之判是曰神媒太昊氏衰共工作亂於是滅共工氏而遷之治於中皇山之原繼興於麗路史禪通紀山在金之平利上有女媧廟與伏羲山接伏羲山在西城女媧山在平利長安志云驪山有女媧治處又云藍田谷次北有女媧氏谷三皇舊居之所即驪山也本注有熊氏有熊氏小典氏之子王承填而土行色尚黃天下號之黃帝身五十二戰而天下大服乃達四面廣能賢稽功務法秉數乘剛而都於陳路史疏仡紀今寶雞故陳倉姚睦云黃帝都陳倉非宛丘故今隴右黃帝遺迹甚多本注少昊氏少昊青陽氏以處雲陽亦曰雲陽氏以金寶歷色尚白又曰金天氏處於甘泉興郊禪崇五祀正都邑肇車牛作布貨以制國用立史官尊耆老修其方而天下治路史疏仡紀因按以上諸帝世次荒逺莫考其都雍與否秖古史所傳以作是編之外史爾周姓姬氏武王諱發以歲己卯春二月克商即天子位定都鎬在位七年王來自商至於豐乃偃武修文歸馬於華山之陽放牛於桃林之野示天下弗服列爵惟五分土惟三建官惟賢位事惟能重民五教惟食喪祭惇信明義崇德報功垂拱而天下治周書武成成王諱誦武王太子以歲乙酉即位在位三十七年叔向曰成王能明文昭定武烈者也國語康王諱釗成王太子以歲壬戍即位在位二十六年太子晉曰自后稷之始基靖民十八王而康克安之國語昭王諱瑕康王太子以歲戊子即位在位五十一年穆王諱滿昭王太子以歲己卯即位在位五十五年共王諱繄扈穆王太子以歲甲戍即位在位十二年懿王諱囏共王太子以歲丙戌即位在位二十五年孝王諱辟方共王弟以歲辛亥即位在位十五年夷王諱燮懿王太子以歲丙寅即位在位十六年厲王諱胡夷王太子以歲壬午即位在位五十一年宣王諱靖厲王太子以歲癸酉即位在位四十六年宣王承衰邦家多阻懲難思理官人以敘山甫補闕方叔禦侮是用中興恢復周宇摯太常集幽王諱宫涅宣王太子以歲己未即位在位十一年平王諱宜臼幽王太子以歲庚午即位歲辛未東遷於洛后稷居邠太王作周丹開雀録火降烏流三分既有八百不謀蒼兕誓衆白魚入舟成康之日政簡刑措南巡不還西服莫附共和之後王室多故檿弧興謡實傾周祚司馬貞索隱右周自武王元年己卯至平王元年幸未共都鎬三百五十三年按周室中葉有遷都之舉皆在陜境故不詳書而統以鎬京云秦姓嬴氏始皇帝諱政以歲庚辰并天下稱皇帝都於咸陽凡十二年二世皇帝諱胡亥始皇帝少子以歲辛卯秋七月即位在位三年王子嬰始皇帝孫以歲甲午即位乙未出降於漢凡一年周厯已移秦直其位吕政殘虐然以諸侯十三并兼天下極情縱欲三十七年兵無所不加制作令政施於後王蓋得聖人之威始皇既殁胡亥極愚酈山未畢復作阿房以遂前䇿任用趙高殘虐促期雖居形便之國猶不得存子嬰度次得嗣冠玊冠佩華紱車黃屋從百司謁七廟小人乘非位莫不恍忽失守偷安日月獨能長念却慮父子作權近取於户牖之間竟誅猾臣為君討賊吾讀秦紀至於子嬰車裂趙高未嘗不健其決憐其志嬰死生之義備矣班蘭臺集右秦自始皇帝二十六年庚辰至子嬰元年乙未共都咸陽一十六年漢姓劉氏高皇帝諱邦沛人以歲己亥春二月滅楚即皇帝位夏五月定都長安在位八年周秦之間可謂文敝矣秦政不改反酷刑法豈不繆乎故漢興承敝易變使人不倦得天統矣史紀高祖本紀孝惠皇帝諱盈高祖太子以歲丙午夏五月即位在位七年孝惠內修親親外禮宰相優寵齊悼趙隱恩敬篤矣聞叔孫通之諫則瞿然納曹相國之對而心恱可謂寬仁之主遭吕太后虧損至德悲夫漢書惠帝紀氏按惠帝後吕稱制九年所立兩少帝皆非孝惠子也史漢紀傳載之已詳故不書孝文皇帝諱恆高祖仲子以歲辛酉秋九月即位在位二十三年孔子言必世然後仁善人之治國百年亦可以勝殘去殺誠哉是言漢興至孝文四十有餘載德至盛也廪廪鄉改正服封禪矣謙讓未成於今嗚呼豈不仁哉史紀文帝本紀孝景皇帝諱啓孝文帝太子以歲甲申夏六月即位在位十六年孔子稱斯民三代之所以直道而行也信哉周秦之敝罔密文峻而姦軌不勝漢興掃除煩苛與民休息至於孝文加之以恭儉孝景遵業五十六載之間至於移風易俗黎民醇厚周云成康漢言文景美矣漢書景帝紀孝武皇帝諱徹景帝太子以歲庚子春正月即位在位五十四年漢承百王之弊高祖撥亂反正文景務在養民至於稽古禮文之事猶多闕焉孝武初立卓然罷黜百家表章六經遂疇咨海內舉其俊茂與之立功興太學修郊祠改正朔定厯數協音律作詩樂建封禪禮百神紹周後號令文章煥焉可述後嗣得遵洪業而有三代之風如武帝之雄才大略不改文景之恭儉以濟斯民雖詩書所稱何有加焉漢書武帝紀孝昭皇帝諱弗陵武帝太子以歲甲午春二月即位在位十三年昔周成以孺子繼統而有管蔡四國流言之變孝昭幼年即位亦有燕蓋上官逆亂之謀成王不疑周公孝昭委任霍光各因其時以成名大矣哉承孝武奢侈餘敝師旅之後海內虛耗户口減半光知時政之要輕徭薄賦與民休息至始元元鳳之間胸奴和親百姓充實舉賢良文學問民所疾苦議鹽鐵而罷𣙜酤尊號曰昭不亦宜乎漢書昭帝紀孝宣皇帝諱詢武帝曾孫戾太子孫也以歲丁未秋七月即位在位二十五年孝宣之治信賞必罰綜核名實政事文學理法之士咸精其能至於技巧工匠器械自元成間鮮能及之亦足以知吏稱其職民安其業也遭值胸奴乖亂推亡固存信威北夷單于慕義稽首稱藩功光祖宗業垂後嗣可謂中興侔德殷宗周宣矣漢書宣帝紀孝元皇帝諱奭宣帝太子以歲壬申冬十二月即位在位十六年元帝多材藝善史書鼓琴瑟吹洞簫自度曲被歌聲分刌節度窮極幼眇少而好儒及即位徴用儒生委之以政貢薛韋匡迭為宰相而上牽制文義優遊不斷孝宣之業衰焉然寬𢎞盡下出於恭儉號令溫雅有古之風烈漢書元帝紀孝成皇帝諱驁元帝太子以歲戊子夏六月即位在位二十六年成帝善修容儀升車正立不內顧不疾言不親指臨朝淵默尊嚴若神可謂穆穆天子之容者矣博覽古今容受直辭公卿稱職奏議可述遭世承平上下和睦然湛於酒色趙氏亂內外家擅朝言之可為於邑建始以來王氏始執國命哀平短祚莽遂篡位蓋其威福所由來者漸矣漢書成帝紀孝哀皇帝諱欣元帝孫定陶恭王子也成帝立為太子以嵗甲寅夏四月即位在位六年孝哀自為藩王及充太子之宫文辭博敏幼有令聞睹孝成世祿去王室權柄外移是故臨朝屢誅大臣欲強主威以則武宣雅性不好聲色時覽卞射武戲即位痿痺末年寖劇饗國不永哀哉漢書哀帝紀孝平皇帝諱衎元帝孫中山孝王子也哀帝無嗣以歲庚申秋九月入即位在位五年孝平之世政自莽出褒善顯功以自尊盛觀其文辭方外百蠻無思不服休徴嘉應頌聲並作至乎變異見於上民怨於下莽亦不能文也漢書平帝紀孺子嬰宣帝元孫廣戚侯顯子也王莽攝政以歲乙丑冬十二月徵入為平帝後至歲己巳春正月廢為定安公凡三年右漢自高帝漢五年己亥至孺子初始元年己巳共都長安二百一十年晉姓司馬氏孝愍皇帝諱業字彥旗武帝孫吳孝王晏子也初嗣封秦王以歲癸酉夏四月即位於長安丙子冬十一月降於劉曜長安陷在位四年帝之繼皇統也屬永嘉之亂長安城中户不盈百墻宇頺毁蒿棘成林朝廷無車馬章服惟桑版署號而已衆惟一旅公私有車四乘器械多闕運饋不繼巨猾滔天帝京危急諸侯無釋位之志征鎮闕勤王之舉故君臣窘迫以至殺辱云晉書愍帝紀右晉愍帝自建興元年癸酉至四年丙子共都長安四年按愍帝以前漢獻晉惠俱經徙都長安然一則見逼於董卓一則被劫於張方此與明皇幸蜀何異非建都實事也愍帝當洛京傾覆之日正位關中雖立國不久而人心實繫屬於此所當大書以伸大義者也北魏姓元氏孝武皇帝諱修孝文帝孫廣平王懷子也以歲甲寅秋七月自洛陽西都長安凡一年文皇帝諱寶炬孝文帝孫京兆王愈子也初封南陽王以歲乙卯春正月即位在位十七年廢帝諱欽文帝太子以歲辛未春三月即位在位三年恭皇帝諱廓文帝第四子初封齊王以歲甲戌春正月即位丙子冬十二月禪位於周在位三年莊帝而後魏室土崩主祭祀者不殊於寄坐遇黜辱者有甚於奕棋雖以孝武之長祗以速是奔波文帝以剛強之質終以守雌自寶恭帝運終天祿高蹈唐虞各得其時也北史西魏本紀右西魏自孝武帝永熙三年甲寅至恭帝三年丙子共都長安二十三年北周姓宇文氏孝閔皇帝諱覺代武川人安定公泰世子也初封周公以歲丁丑春正月受禪在位一年孝閔承既安之業應樂推之運祡天竺物正位君臨邇無異言逺無異望雖黃初代德太始受終不之尚也然政由寧氏主懷芒刺之疑祭則寡人臣無復子之請以之速禍宜哉周書閔帝紀世宗明皇帝諱育閔帝庶兄初封寧都公以歲丁丑秋九月入即位在位四年世宗寬仁逺度睿哲博聞處代邸之尊實文昭之長豹姿已變龍德猶潛而百辟傾心萬方注意及乎迎宣黜賀入纂大宗禮貌功臣敦睦九族率由恭儉崇尚文儒亹亹乎其有君人之德者矣始則權臣專制政出私門終乃鴆毒潛加享年不永惜哉周書明帝紀高祖武皇帝諱雍明帝弟初封魯公以歲庚辰夏四月入即位在位十八年自東西否隔二國爭強疆埸之事一彼一此高祖英威電發朝政維新內難既除外略方始乃苦心焦思克己勵精勞役為士卒之先居處同匹夫之儉修富民之政務強兵之術五年之間大勳斯集攄祖宗之宿憤拯東夏之阽危盛矣哉其有成功者也若使翼日之瘳無爽經營之志獲申黷武窮兵雖見譏於良史雄圖逺略足方駕於前王者歟周書武帝紀宣皇帝諱贇武帝太子以歲戊戌夏六月即位己亥春二月內禪在位一年高祖識嗣子之非才顧宗祏之至重滯愛同於晉武則哲異於宋宣卒使昏虐君臨姦回肆毒善無小而必棄惡無大而弗為然猶及子而亡幸哉周書宣帝紀靜皇帝諱闡本名衍宣帝太子以歲己亥春二月即位辛丑禪位於隋在位二年靜帝起自幼沖紹兹衰緒內相挾孫劉之詐戚藩無齊代之強隋氏因之遂遷龜鼎嗚呼以太祖之克隆景業未踰二紀不祀忽諸斯蓋宣帝之餘殃非孺子之罪戾也周書靜帝紀右周自閔帝元年丁丑至靜帝大定元年辛丑共都長安二十五年隋姓楊氏高祖文皇帝諱堅𢎞農華陰人以歲辛丑春二月受禪在位二十四年高祖以外戚之尊受託孤之任乘兹機運遂遷周鼎於時蠻夷猾夏荆揚未一劬勞日昃經營四方樓船南邁則金陵失險驃騎北指則單于欵塞雖晉武之克平吳會漢宣之推亡固存比義論功不能尚也七德既敷九歌已洽要荒咸暨尉候無警於是躬節儉平徭賦倉廪實法令行君子咸樂其生小人各安其業人物殷阜朝野歡娛二十年間天下無事區宇之內晏如也但無寬仁之度有刻薄之資暨乎暮年此風逾扇又聽哲婦之言惑邪臣之説溺寵廢嫡託付失所墳土未乾天下已非隋有惜哉迹其衰怠之源稽其亂亡之兆起自高祖成於煬帝所由來逺矣隋書文帝紀煬皇帝諱廣文帝太子以歲甲子秋七月即位在位十三年煬帝爰在弱齡早有令聞昆弟之中獨著聲績於是矯情飾貌肆厥姦回故得獻后鍾心文皇革慮天方肇亂遂登儲兩踐峻極之崇基承丕顯之休命地廣三代威振八紘負其富強之資思逞無厭之欲狹殷周之制度尚秦漢之規摹恃才矜已傲狠明德淫荒無度法令滋章驕怒之兵屢動木土之功不息旌旗萬里徵稅百端猾吏侵漁人不堪命自是海內騷然無聊生矣俄而元感肇黎陽之亂胸奴有雁門之圍天子方棄中土逺之揚越姦宄乘釁蝟毛而起四方萬里簡書相續猶謂鼠竊狗盜不足為虞上下相蒙莫肯念亂遂以萬乘之尊死於一夫之手社稷顛隕本枝殄絶自肇有書契以迄於兹未有若斯之甚也傳曰吉凶由人祅不妄作又曰兵猶火也不戢將自焚觀隋室之存亡斯言信而有徵矣隋書煬帝紀恭皇帝諱侑煬帝孫元德太子之子也初封代王以歲丁丑冬十一月唐公李淵立帝於長安戊寅夏五月禪位於唐在位二年恭帝年在幼沖遭家多難一人失德四海土崩既鍾百六之期躬踐數終之運謳歌有屬笙鐘變響雖欲不遵堯舜之迹庸可得乎隋書恭帝紀右隋自高祖開皇元年辛丑至恭帝義寧二年戊寅共都長安三十八年唐姓李氏高祖皇帝諱淵隴西成紀人以歲戊寅夏五月受禪在位九年唐在周隋之際世雖貴矣然烏有所謂積功纍仁之漸而高祖之興亦何異因時而特起者歟雖其有治有亂或絶或微然其有天下年幾三百可謂盛哉豈非人厭隋亂而蒙德澤繼以太宗之治制度紀綱之法後世有以憑藉扶持而能永其天命歟唐書高祖本紀太宗皇帝諱世民高祖次子以歲丙戍秋八月即位在位二十三年盛哉太宗之烈也其除隋之亂比迹湯武致治之美庶幾成康自古功德兼隆由漢以來未之有也至其牽於多愛復立浮圖好大喜功勤兵於逺此中材庸主之所常為然春秋之法常責備於賢者是以後世君子莫不歎息於斯焉唐書太宗本紀高宗皇帝諱治太宗太子初封晉王以歲己酉夏六月即位在位三十四年大帝往在藩儲見稱長者暨升旒扆頓異明哉虛襟似納於觸鱗下詔無殊於扇暍既蕩情於帷簿遂忽怠於基扄卒致盤維盡戮宗社為墟所謂一國為一人興前賢為後愚廢信矣哉舊唐書髙宗本紀中宗皇帝諱哲高宗太子以歲癸未冬十二月即位在位二十七年按中宗嗣聖元年武氏即遷帝房州十五年始還東都在東宫者八年是中宗在位僅六年耳然帝在房州唐統未絶即以中宗紀年可也故通為二十七年云孝和帝越自負扆遷於房陵﨑嶇瘴癘之鄉契濶幽囚之地遂得生還庸非已力洎滌除金虎再握璿衡不能罪已以謝萬方而更漫遊以隳八政縱艷妻之煽黨信妖女以撓權桓敬由之覆族節愍所以興戈也舊唐書中宗本紀睿宗皇帝諱旦中宗母弟初封相王以歲庚戍夏六月入即位在位三年玄宗皇帝諱隆基睿宗太子以歲壬子秋八月即位在位四十五年睿宗因其子之功而在位不久固無可稱者嗚呼女子之禍於人者甚矣自高宗至於中宗數十年間再罹女禍唐祚既絶而復續玄宗親平其亂可以鑒矣而又敗以女子方其勵精政事開元之際幾致太平何其盛也及侈心一動而溺其所甚愛忘其所可戒至於竄身失國而不悔考其始終之異其性習之相逺也至於如此可不慎哉可不慎哉唐書睿玄二宗本紀肅宗皇帝諱亨初名嗣升更名浚又更名璵又更名紹玄宗太子以歲丙申秋七月即位於靈武在位七年代宗皇帝諱豫肅宗太子以歲壬寅夏四月即位在位十七年天寶之亂大盜遽起天子出奔方是時肅宗以皇太子治兵討賊得其職矣蓋自高祖以來三遜於位以授其子而獨睿宗上畏天戒發於誠心若高祖玄宗豈其志哉代宗之時餘孽猶存平亂守成蓋亦中材之主也唐書肅代二宗本紀德宗皇帝諱適代宗太子以歲己未夏五月即位在位二十六年順宗皇帝諱誦德宗太子以歲乙酉春正月即位在位一年憲宗皇帝諱純順宗太子以歲乙酉秋八月即位在位十五年德宗猜忌刻薄以強明自任恥見屈於正論而忘受欺於姦諛及奉天之難深自懲艾遂行姑息之政由是朝廷益弱而方鎮愈強至於唐亡其患以此憲宗剛明果斷慨然發憤志平僭叛能用忠謀不惑羣議卒收成功自吳元濟誅強藩悍將皆欲悔過而效順當此之時唐之威令幾於復振其為優劣不待較而可知也及其晚節信用非人不終其業而身罹不測之禍嗚呼小人之能敗國也雖聰明聖智茍有惑焉未有不為患者也昔韓愈言順宗在東宫二十年天下陰受其賜然享國日淺不幸疾病莫克有為悲夫唐書德順憲三宗本紀穆宗皇帝諱恆憲宗太子以歲庚子春閏正月即位在位四年敬宗皇帝諱湛穆宗太子以歲甲辰春正月即位在位二年文宗皇帝諱昂穆宗次子初封江王以歲丙午冬十二月入即位在位十四年武宗皇帝諱炎穆宗第五子初封潁王以歲庚申春正月入即位在位六年宣宗皇帝諱忱憲宗第十三子初封光王以歲丙寅春三月入即位在位十三年穆敬昏童失德以其在位不久故天下未至於敗亂而敬宗卒及其身文宗恭儉儒雅出於天性嘗讀太宗政要慨然慕之及即位鋭意於治故太和之初政事修飭號為清明然仁而少斷甘露之事禍及忠良不勝寃憤飲恨而已昔武丁得一傅説為商高宗武宗用一李德裕遂成其功烈然除去浮圖之法而躬受道家之籙服藥以求長年以此見其非明智之不惑特好惡有不同耳宣宗精於聽斷而以察為明無復仁恩之意嗚呼自是而後唐衰矣唐書穆敬文武宣五宗本紀懿宗皇帝諱漼宣宗長子初封鄆王以歲己卯秋八月入即位在位十四年僖宗皇帝諱儇初名儼懿宗第五子封普王以歲癸巳秋七月入即位在位十六年懿僖當唐政之始衰而以昏庸相繼乾符之際歲大旱蝗民愁盜起其亂遂不可復支蓋亦天人之會歟唐書懿僖二宗本紀昭宗皇帝諱曄懿宗第七子初封夀王以歲戊申春三月入即位以歲甲子春正月遷都於洛陽在位十六年昭宗為人明雋初亦有志於興復而外患已成內無賢佐頗亦慨然思得非常之材而用匪其人徒以益亂迹其禍亂其漸積豈一朝一夕哉唐書昭宗本紀右唐自高祖武德元年戊寅至昭宗天祐元年甲子共都長安二百八十七年后妃后妃承乾育聖正位宫闈産自秦封實維內政所自出而亦斯土之光也有則悉登其都秦者不概録上古薑嫄厥初生民時維薑嫄詩經大雅帝嚳上妃有邰氏之女也曰薑嫄氏大戴禮高辛氏上妃有駘氏曰薑原清淨專一而好稼穡衣帝衣履帝履居期而生棄路史疏仡紀駘在始平武功縣左傳杜注古斄城在縣南八里漆村東古有斄氏之國也武功縣志並按邰駘字同周褒姒昔夏后氏之衰也有二龍止於帝庭而言曰余褒之二君夏帝請其漦而藏之比三代莫敢發厲王之末發而觀之漦流於庭化為玄黿入後宫後宫之童妾既齓而遭之既笄而孕無夫而生子懼而棄之宣王時童女謡曰檿弧箕服實亡周國有夫婦賣是器者宣王使執而戮之逃於道見鄉者後宫所棄妖子於路哀而收之遂亡奔於褒褒人有罪請入所棄女子於王以贖罪是為褒姒當幽王三年王之後宫見而愛之竟廢申后以褒姒為后褒姒不好笑幽王欲其笑萬方故不笑幽王為熢燧有寇至則舉熢火諸侯悉至至而無寇褒姒乃大笑幽王恱之為數舉熢火其後諸侯益不至申侯與繒西夷犬戎攻幽王幽王舉熢火徵兵兵莫至遂虜褒姒盡取周賂而去史紀周本紀正義曰括地志云褒國城在梁州褒城縣東二百步古褒國也周本紀注漢景帝皇后王氏王太后槐里人母曰臧兒嫁為槐里王仲妻生男曰信與兩女而仲死長女嫁為金王孫婦生一女臧兒卜筮之曰兩女皆當貴乃奪金氏納之太子宫太子幸之生三女一男男方在身時王美人夢日入其懷以告太子太子曰此貴徵也未生而孝景帝即位王夫人生男先是臧兒又入其少女兒姁兒姁生四男景帝長男榮其母栗姬齊人也立為太子長公主嫖有女欲豫為妃栗姬不許欲豫王夫人王夫人許之長公主日譽王夫人男之美景帝亦賢之又有曩者所夢日符遂廢太子為臨江王卒立王夫人為皇后其男為太子太子襲號為皇帝兒姁早卒太后以元朔四年崩史記外戚世家宣帝皇后王氏孝宣王皇后其先高祖時有功賜爵關內侯自沛徙長陵后父奉光少時好鬬雞宣帝在民間與奉光識奉光有女年十餘歲當適人所當適輒死故久不行宣帝即位召入宫稍進為偼妤上憐許太子蚤失母幾為霍氏所害乃選後宫素謹慎而無子者遂立王偼妤為皇后令母養太子立十六年宣帝崩元帝即位為皇太后成帝即位為太皇太后時成帝母亦姓王氏故世號太皇太后為卭成太后凡立四十九年年七十餘永始元年崩漢書外戚傳元帝昭儀馮氏孝元馮昭儀平帝祖母也元帝即位以選入後宫時父奉世為執金吾昭儀始為長使數月至美人後五年就館生男拜為偼妤內寵與傅昭儀等建昭中上幸虎圈鬬獸後宫皆坐熊佚出圈攀檻欲上殿傅昭儀等皆驚走馮偼妤直前當熊而立左右格殺熊上問何故前當熊對曰猛獸得人而止妾恐熊至御坐故以身當之傅昭儀等皆慙明年夏馮偼妤男立為信都王尊偼妤為昭儀元帝崩為信都太后河平中隨王之國後徙中山是為孝王是歲王薨有一男嗣為王時未滿歲有眚病太后自養視數禱祠解哀帝即位遣謁者張由將醫治中山小王由素有狂易病病發西歸尚書簿責擅去狀由恐因誣言中山太后祝詛上及太后太后即傅昭儀也素常怨馮太后因是遣御史丁元案驗無所得更使中謁者令史立與丞相長史大鴻臚丞雜治立受傅太后指劾奏祝詛謀反大逆責問馮太后無服辭立曰熊之上殿何其勇今何怯也太后還為左右此乃中語前世事吏何用知之是欲陷我乃飲藥自殺詔以諸侯王太后儀葬之漢書外戚傳成帝倢妤班氏孝成班倢妤初入後宫為少使俄而大幸為倢妤居增城舍再就館有男數月失之成帝遊於後庭嘗欲與同輦辭曰觀古圖畫賢聖之君皆有名臣在側三代末主乃有嬖女今欲同輦得無近似上善其言而止自鴻嘉後失寵趙飛燕譖倢妤挾媚道祝詛後宫詈及主上考問班偼妤對曰妾聞死生有命富貴在天修正尚未蒙福為邪欲以何望使鬼神有知不受不臣之訴如其無知訴之何益上憫之賜黃金百斤趙氏姊弟驕妒偼妤恐久見危求供養太后長信宫上許焉倢妤退處東宫作賦自傷帝崩倢妤充奉園陵薨因葬園中漢書外戚傳明帝皇后馬氏明德馬皇后伏波將軍援小女也少喪父兄母藺夫人悲傷發疾后時年十嵗幹理家事敕制僮御內外咨稟事同成人初援征五溪蠻卒於師梁松竇固等因譖之家益失勢數為權貴所侵侮從兄嚴白太夫人求進女掖庭由是入太子宫時年十三奉承陰后旁接同列禮則修備上下安之顯宗即位以后為貴人時后前母姊女賈氏亦選入生肅宗帝令養之后撫育過所生肅宗亦孝性惇篤慈愛無間永平三年遂立為皇后既正位宫闈愈自謙肅常衣大練裙不加緣朔望諸姬主朝請望見后袍衣疏粗以為綺縠就視乃笑后辭曰此繒特宜染色故用之耳六宫莫不歎息帝嘗幸苑囿離宫輒以風邪露霧為戒辭意欵備時楚獄坐繫甚衆后慮其多濫乘間言及帝感悟多所降宥每侍執之際言及政事多所毗補而未嘗以家私干故寵敬日隆肅宗即位尊后曰皇太后建初元年欲封爵諸舅太后不聼明年夏大旱有司上奏宜依舊典太后詔固不許帝復重請太后報曰昔高祖約無軍功非劉氏不侯今馬氏無功於國豈得與隂郭中興之后等耶嘗觀富貴之家祿位重疊猶再實之木其根必傷吾計之熟矣夫至孝之行安親為上今欲先營外封違慈母之拳拳乎時外親有謙素義行者輒假借溫言賞以財位其美車服不軌法度者便絶屬籍遣歸田里於是內外從化被服如一四年崩後漢書后紀章帝皇后竇氏貴人宋氏章德竇皇后扶風平陵人大司徒融曾孫父勳尚東海恭王強女泚陽公主后其長女也建初二年以選例入見長樂宫進止有序風容甚盛肅宗先聞后有才色及見雅以為美馬太后亦異焉后性敏給傾心承接稱譽日聞明年立為皇后寵幸殊特專固後宫初宋貴人生太子慶后疾之因誣廢慶為清河王梁貴人者梁竦女生和帝后養為己子欲專名外家而忌梁氏八年乃作飛書陷竦竦坐誅貴人以憂卒自是宫房惵息后愛日隆和帝即位尊后為皇太后太后臨朝兄憲弟篤景並顯貴擅威權遂密謀不軌發覺被誅九年太后崩未葬梁貴人姊嬺上書陳貴人枉殁之狀太尉張酺司徒劉方司空張奮上奏依光武黜吕太后故事帝手詔曰禮臣子無貶尊上之文恩不忍離義不忍虧案前世上官太后亦無降黜其勿復議於是合葬敬陵後漢書后紀宋貴人宋昌八世孫扶風平陵人也父楊二女皆有才色永平末選入太子宫甚有寵肅宗即位並為貴人建初三年大貴人生慶明年立為皇太子貴人長於人事供奉長樂宫身執饋饌太后憐之太后崩竇皇后寵甚以貴人姊妹並幸慶為太子惡之謀陷宋氏外令兄弟求其纎過內使御者偵伺得失後於掖庭門邀遮得貴人書云病思生菟令家求之因誣言欲作蠱道祝詛以菟為厭勝之術諷掖庭令請加驗實七年帝遂廢慶為清河王出貴人姊妹置丙舍使小黃門蔡倫考實之傅致其事乃載送暴室二貴人同時飲藥自殺帝敕掖庭令葬於樊濯聚慶時雖幼知畏禍言不敢及宋氏和帝時慶常以貴人葬禮有闕每竊感恨竇太后崩慶求上冡致哀帝許之慶子祐立為安帝追諡曰敬隱后又追贈后女弟小貴人印綬後漢書清河王傳順帝貴人竇氏順帝初竇章女年十二能屬文以才貌選入掖庭有寵與梁皇后並為貴人早卒帝追思無已詔史官樹碑頌德章自為之辭後漢書竇章傳桓帝皇后竇氏桓思竇皇后章德皇后從祖弟之孫女也延熹八年選入掖庭為貴人其冬立為皇后永康元年冬帝崩無嗣后為皇太后臨朝定䇿立解瀆亭侯宏是為靈帝時太后父大將軍武謀誅宦官中常侍曹節等矯詔殺武遷太后於南宫雲臺帝以太后有援立之功建寧四年十月朔率羣臣朝於南宫親饋上夀黃門令董萌因為太后訴怨帝深納之供養資奉有加於前熹平元年太后母卒於北景后感疾崩後漢書后紀靈帝皇后宋氏宋皇后扶風平陵人建寧三年選入掖庭為貴人明年立為皇后父酆執金吾封不其鄉侯后無寵而居正位後宫幸姬衆共譖毁初中常侍王甫枉誅勃海王悝及妃宋氏妃即后之姑也甫恐后怨之乃搆言皇后挾左道祝詛帝信之光和元年遂䇿收璽綬后自致暴室以憂死父及兄弟並被誅諸常侍小黃門在省闥者皆憐宋氏無辜共合錢物收葬廢后及酆父子歸宋氏舊塋臯門亭後漢書后紀晉武帝皇后楊氏楊氏武元楊皇后諱豔字瓊芝𢎞農華隂人少聰慧善書姿質美麗間於女工有善相者嘗相后當極貴文帝為世子聘焉甚被寵遇生惠帝武帝即位立為皇后帝以太子不堪奉大統密語后后曰立嫡以長不以賢豈可動乎初賈充妻郭氏賂后求以女為太子妃及議婚帝欲娶衛瓘女后盛稱賈后有淑德上乃聽之后疾見帝素幸胡夫人恐後立之慮太子不安臨終枕帝膝曰叔父駿女男引有德色願陛下以備六宫因悲泣帝許之崩年三十七晉書后妃傳武悼楊皇后諱芷字季蘭小字男引元后從妹以咸寧二年立為皇后婉嫕有婦德美映椒房太康九年后率內外夫人命婦躬桑於西郊太子妃賈氏妒忌帝將廢之后言於帝曰賈公閭有勳社稷賈妃親是其女不足以一青掩其大德后又數誡厲妃妃不知后助已謂后搆之於帝忿怨彌深及帝崩尊為皇太后賈后忌后父駿遂誣駿為亂稱詔誅駿駿既死詔送后永寧宫賈后諷有司奏廢為庶人初太后尚有侍御十餘人賈后奪之絶膳而崩永嘉元年追復尊號咸康七年衛將軍虞潭議上由是太后配食武帝晉書后妃傳成帝皇后杜氏成恭杜皇后諱陵陽京兆人鎮南將軍預曾孫也成帝以后奕世名德咸康二年備禮拜為皇后后少有姿色然長猶無齒及帝納采之日一夜齒盡生七年三月后崩年二十一先是三吳女子相與簮白花望之如素奈傳言天公織女死為之著服至是后崩晉書后妃傳北魏太宗皇后姚氏昭哀皇后姚氏姚興女也興封西平長公主太宗以后禮納之後以鑄金人不成未升尊位然出入居處禮秩如后是後猶欲正位而后謙讓不當泰常五年薨帝追恨之贈皇后璽綬而後加諡魏書皇后傳世祖皇后赫連氏太武皇后赫連氏屈丐女也世祖平統萬納后及二妹俱為貴人後立為皇后魏書皇后傳北周閔帝皇后元氏元皇后魏文帝第五女初封晉安公主帝為略陽公尚焉及踐阼立為后帝被廢后出俗為尼建德初髙祖誅晉國公護上帝尊號為孝閔帝以后為孝閔皇后居崇義宫隋氏革命后出居里第大業十二年殂周書皇后傳宣帝皇后楊氏楊皇后隋文帝長女帝在東宫納為皇太子妃宣政元年立為皇后帝後自稱天元皇帝號后為天元皇后尋册為天元太皇后后性柔婉不妒忌嬪御等咸愛而仰之帝嘗譴后欲加之罪后進止詳間辭色不撓帝大怒遂賜后死逼令引訣后母獨孤氏聞之詣閣陳謝得免帝不豫詔后父入禁中侍疾及大漸劉昉鄭譯等矯詔以后父受遺輔政后初雖不預謀然以嗣主幼沖恐權在他族不利於己聞行此詔心甚悅之後知其父有異圖意頗不平形於言色及行禪代憤惋逾甚文帝內甚愧之開皇六年封為樂平公主又議奪其志后誓不許乃止大業五年殂周書皇后傳唐髙祖皇后竇氏昭儀宇文氏太穆皇后竇氏京兆平陵人父毅在周為上柱國尚武帝姊襄陽長公主后生髮垂過頸三歲與身等讀女誡列女等傳一過輒不忘武帝愛之養宫中異他甥時突厥女為后無寵后密諫曰吾國未靖虜且強願抑情撫接以取合從則江南關東不吾梗武帝嘉納及聞隋髙祖受禪自投牀下曰恨非男子不能救舅家禍毅常曰此女不凡何可妄與人因畫二孔雀屏間請婚者使射二矢隂約中目則許之射者皆不合髙祖最後射中各一目遂歸於帝元貞太后羸老有疾后事之怡謹盡孝工為篇章規誡文有雅體又善書與髙祖書相雜人不辨也崩年四十五帝有天下諡曰穆及祔獻陵尊為太穆皇后唐書本傳宇文昭儀隋左武衛大將軍述女也有寵於髙祖髙祖即位欲立為皇后固辭舊唐書韓王元嘉傳太宗妃楊氏賢妃徐氏吳王恪母曰楊妃楊帝女也大唐新語賢妃徐氏名惠生五月而能言四歲誦論語毛詩八歲好屬文其父孝德試擬楚詞云山中不可以久留詞甚典美自此遍涉經史手不釋卷太宗聞之納為才人其所屬文揮翰立成詞華綺贍俄拜媫妤再遷充容時軍旅亟動宫室互興百姓頗倦勞役上疏諫之太宗善其言優賜甚厚太宗崩追思顧遇之恩哀慕愈甚發疾不自醫謂所親曰吾荷顧實深志在早歿魂其有靈得侍園寢吾之志也因為七言詩及連珠以見志永徽元年卒詔贈賢妃舊唐書本傳徐齊聃湖州長城人世客馮翊姊為太宗充容唐書儒學傳髙宗媫妤徐氏徐堅齊聃子也次姑為髙宗媫妤有文藻舊唐書徐堅傳中宗皇后趙氏庶人韋氏和思皇后趙氏京兆長安人祖綽武德中終右領軍將軍父瓌尚髙祖女常樂公主帝為英王聘后為妃髙宗於公主恩尤隆武后不喜乃幽妃內侍省妃既囚扄鍵牢謹日給飼料衛者候其突煙數日不出披户視之死腐矣神龍元年追諡曰恭皇后唐書本傳中宗將葬定陵議者以韋后得罪不宜祔葬於是追諡后為和思莫知瘞所行招魂祔葬之禮舊唐書本傳庶人韋氏京兆萬年人帝在東宫后被選為妃嗣聖初立為皇后尋與帝處房陵每使至帝輒恐欲自殺后止曰禍福何常無遽及帝復位后居中宫時敬暉等欲盡誅諸武武三思得幸於后卒謀暉等誅之初帝幽廢與后約一朝見天日不相制至是與三思共御牀博戲帝從旁典籌不為忤三思諷羣臣上后號為順天皇后神龍三年節愍太子敗宗楚客率羣臣請加號翊聖於是數改制度寵樹親屬常侍馬秦客光祿少卿楊均皆蒸於后帝遇弒議者咎秦客及安樂公主后大懼引所親議計乃立溫王重茂為皇太子太子即位后臨朝京師大恐傳言且革命臨淄王引兵夜披玄武門叩太極殿后遁入飛騎營為亂兵所殺梟首東市翼日追貶為庶人唐書本傳睿宗皇后竇氏昭成皇后竇氏平陵人抗曾孫也睿宗為相王時為孺人甚見禮異光宅元年立為德妃生玄宗長壽二年為户婢團兒誣譖與肅明皇后厭蠱咒詛正月二日朝則天皇后於嘉豫殿既退而遇害梓宫祕密莫知所在睿宗即位諡曰昭成皇后睿宗崩以帝母之重追尊為皇太后舊唐書本傳玄宗皇后王氏貴嬪楊氏才人莫氏廢后王氏同州下邽人上為臨淄王時納為妃上將起事頗預密謀贊成大業先天元年為皇后后兄守一以后無子懼有廢立𨗳以符厭之事有左道僧明悟為祭南北斗刻霹靂木書天地字及上諱合而佩之曰佩此有子當與則天比事發上親究之皆驗開元十二年秋七月廢為庶人十月卒舊唐書本傳武妃有寵帝密欲廢后后以愛弛不自安承間泣曰陛下獨不念阿忠脫紫半臂易斗麵為生日湯餅耶帝憫然動容阿忠后呼其父仁皎云由是久乃廢當時王諲作翠羽帳賦諷帝未幾卒以一品禮葬後宫思慕之帝亦悔寶應元年追復后號唐書本傳元獻皇后楊氏華州華隂人帝在東宫后以景雲初入宫為良媛時太平公主忌帝宫中左右持兩端纎悉必聞媛方娠帝不自安語侍讀張説曰用事者不欲吾多子奈何命説挾劑以入帝於曲室自煮之夢若有介而戈者環鼎三而三煮盡覆以告説説曰天命也乃止生男是為肅宗帝即位為貴嬪又生寧親公主乃薨肅宗即位上皇自蜀詔有司議上册諡唐書本傳寧王常獵於鄠縣界忽見草中一匱扄銷甚固發視之乃一少女也問所自女言姓莫氏莊居昨夜遇賊劫至此時上方求極色王以莫氏衣冠子女即日表上之具其所由上令充才人才人能為秦聲當時號莫才人囀酉陽雜爼肅宗元妃韋氏皇后張氏韋妃京兆萬年人父元圭兖州都督肅宗為忠王時納為孺人及升儲位為太子妃生兖王僴絳王佺永和公主永穆公主天寶中宰相李林甫不利於太子妃兄堅為刑部尚書林甫羅織起桞績之獄堅連坐得罪兄弟並賜死太子懼上表自理言與妃情義不睦請離婚妃遂削髮被尼服居禁中佛舍西京失守妃亦陷賊至德二年薨舊唐書本傳妃按韋氏係肅宗東宫時元故列於張后之前張皇后本南陽西鄂人後徙家昭應祖母竇氏玄宗母昭成太后妹也昭成為天后所殺玄宗幼為竇姨鞠養景雲中封鄧國夫人恩渥甚隆其子去逸生后天寶中選入太子宫為良娣辨惠豐碩巧中上旨玄宗幸蜀太子與良娣俱從車駕渡渭百姓遮道請留太子良娣贊之太子如靈武時賊陷京師道路多虞每太子次宿止舍良娣必居其前曰恐有倉卒妾自當之大家可由後而出至靈武産子三日起縫戰士衣太子勞之曰産忌作勞安可容易后曰此非妾自養之時須辦大家事乾元元年四月册為皇后寵遇專房干預請謁帝頗不悅寶應元年四月肅宗大漸后與內官朱輝光等謀立越王係矯詔召太子入侍疾中官程元振李輔國知其謀太子入二人以難告元振率禁軍收捕輝光等俄而肅宗崩太子監國遂移后於别殿幽崩舊唐書本傳德宗賢妃韋氏賢妃韋氏戚里舊族也初為良娣貞元四年册拜賢妃性敏淑言動有繩矩帝重之後宫莫不師其行帝崩自表留奉崇陵園元和四年薨唐書本傳憲宗貴妃郭氏懿安皇后郭氏汾陽王子儀之孫父曖尚升平公主實生后憲宗為廣陵王聘為妃生穆宗元和元年進册貴妃八年羣臣三請立為后以歲子午忌報罷穆宗嗣位上尊號皇太后移御興慶宫凡朔望三朝帝率百官詣宫門為壽或歲時慶問燕饗後宫戚里內外婦車騎駢壅帝崩中人有為后謀稱制者后怒曰吾效武氏耶太子雖幼可選重德為輔吾何與外事哉敬宗立號太皇太后江王嗣位是為文宗性謹孝事后有禮武宗喜畋遊他日問后起居從容請曰如何可為盛天子后曰諫臣章疏宜審覽毋拒直言勿納偏言以忠良為腹心此盛天子事也帝還索諫章閲之往往道遊獵事自是畋幸稀宣宗立於后諸子也而母鄭故侍兒有曩怨帝奉養禮稍薄后鬱鬱不聊與一二侍人登勤政樓將自隕左右共持之帝聞不喜是夕后暴崩唐書本紀宣帝追恨先陵商臣之酷即位後誅鋤惡黨無漏網者時郭太后無恙且懷慚懼既崩喪服如故事禮院檢討官王皥抗疏請后合葬景陵配享憲宗廟室疏入上大怒宰臣白敏中詰其事皥曰郭太后是憲宗春宫時元妃汾陽王孫逮事順宗為新婦憲宗厭代之夕事出暗昧不可以暗昧之事黜合食之禮翼日貶句容令大中十三年秋上崩令狐綯為山陵使奏皥為判官皥論懿安合配享憲宗始升祔焉東觀奏記後唐明宗淑妃王氏淑妃王氏邠州餅家子也有美色號花見羞明宗求别室安重誨以告明宗而納之明宗夫人曹氏簡質常避事由是專寵明宗即位立為淑妃宫中之事皆主於妃後宫有生子者命妃母之是為許王從益晉髙祖遷都汴以妃母子俱東置於宫中髙祖皇后事妃如母出帝即位妃母子還洛陽耶律德光北歸留蕭翰守汴州翰欲北去召從益委以中國遂以從益權知南朝軍國事羣臣入謁妃曰吾家子母孤弱為翰所迫禍行至矣漢髙祖擁兵而南從益謀閉城自守妃曰吾家亡國之餘安敢與人爭天下乃遣人上書迎髙祖髙祖遣郭從義先入京師殺妃母子妃臨死呼曰吾家母子何罪何不留吾兒使每歲寒食持一盂麥飯灑明宗墳上聞者悲之五代史唐家人傳宋太祖皇后王氏孝明王皇后邠州新平人彰德軍節度饒第三女周顯德五年太祖聘為繼室后恭勤不懈仁慈御下太祖即位建隆元年八月册為皇后常服寬衣佐御膳善彈箏鼓瑟晨起誦佛書事杜太后得歡心乾德元年崩年二十二宋史后妃傳明愍帝禮妃田氏田氏華隂人崇禎元年選入宫册為禮妃賈志太子太子國之儲副都秦之世失愛失德二者交譏備書之以存鑒其追册者不録周幽王太子伯服幽王嬖褒姒生子伯服幽王欲廢太子太子母申侯女而為后後幽王得褒姒愛之廢申后並去太子宜臼以伯服為太子史記周本紀秦始皇帝太子扶蘇始皇三十七年十月行出遊長子扶蘇以數直諌上使監兵上郡少子胡亥愛請從上許之其年七月始皇帝至沙丘病甚令趙髙為書賜公子扶蘇曰以兵屬蒙恬與喪會咸陽而葬書已封未授使者始皇崩書及璽皆在趙髙所趙髙謂胡亥曰上崩無詔封諸子而獨賜長子書長子至即立為皇帝而子無尺寸之地奈何請為子與丞相謀之髙乃謂丞相斯曰上崩賜長子書立為嗣書未行未有知者所賜書及符璽皆在胡亥所定太子在君侯與髙之口耳事將何如斯曰此非人臣所當議也髙曰皇帝二十餘子皆君所知長子剛毅而武勇信人而奮士即位必用蒙恬為丞相君侯終不懷通侯之印歸於鄉里明矣高受詔教習胡亥數年未嘗見過失可以為嗣君計而定之於是斯乃聽髙髙乃詐為書賜扶蘇曰朕巡天下禱祀名山諸神以延壽命今扶蘇與將軍蒙恬將師數十萬屯邉十有餘年矣無尺寸之功乃以不得罷歸為太子日夜怨望扶蘇為人子不孝其賜劔自裁封其書以皇帝璽遣胡亥客奉書賜扶蘇於上郡使者至發書扶蘇泣入內舍欲自殺蒙恬止扶蘇曰陛下使臣將三十萬衆守邉公子為監此天下重任也今一使者來即自殺安知其非詐復請而後死未暮也使者數趣之扶蘇為人仁謂恬曰父賜子死尚安復請即自殺史記李斯傳漢景帝太子榮臨江閔王榮以孝景前四年為皇太子四歲廢為臨江王四年坐侵廟壖垣為宫上徴榮榮至詣中尉府簿中尉郅都責訊王王恐自殺葬藍田燕數萬銜土置冢上百姓憐之榮最長死無後國除史記五宗世家武帝太子據戾太子據衛皇后生元狩元年立為皇太子年七歲矣少壯詔受公羊春秋又從瑕丘江公受榖梁及冠就宫上為立博望苑使通賔客從其所好多以異端進者元鼎四年納史良娣産子男進號曰史皇孫武帝末衛后寵衰江充用事充與太子及衛氏有隙會巫蠱事起充因此為姦白言宫中有蠱氣遂至太子宫掘蠱得桐木人太子召問少傅石德德懼并誅因謂太子曰上疾在甘泉皇后及家吏請問皆不報上存亡未可知而姦臣如此太子將不念秦扶蘇事耶太子急然德言征和二年七月壬午使客為使者收捕充等白皇帝發兵告令百官曰江充反乃斬充以徇遂部賔客為將率與丞相劉屈氂等戰太子兵敗亡不得上怒甚羣下憂懼不知所出壺關三老茂上書曰皇太子為漢適嗣承萬世之業體祖宗之重親則皇帝之宗子也江充閭閻𨽻臣陛下顯而用之銜至尊之命以迫蹙皇太子太子進則不得上見退則困於亂臣不忍忿忿之心起而殺充恐懼逋逃子盜父兵以救難自免耳臣竊以為無邪心書奏天子感寤太子之亡也東至湖匿泉鳩里發覺吏圍捕太子太子自度不得脫即入室距户自經皇孫二人并遇害久之巫蠱事多不信上知太子惶恐無他意車千秋復訟太子寃上憐太子無辜乃作思子宫為歸來望思之臺於湖天下聞而悲之漢書本傳隋文帝太子勇房陵王勇髙祖長子也髙祖受禪立為皇太子軍國政事皆令參決勇頗好學解詞賦性寬仁和厚率意任情無矯飾之行後冬至百官朝勇勇張樂受賀髙祖知之下詔曰皇太子雖居上嗣義兼臣子而諸方嶽牧正冬朝賀别上東宫事非典則宜悉停斷自此恩寵始衰勇多內寵昭訓雲氏尤稱嬖幸妃元氏薨昭訓專擅內政后彌不平遣人求勇罪過晉王知之始搆奪宗之計因深交楊素後素入侍宴盛言太子不才后遂有廢立之意髙祖使楊素觀勇素還言勇怨望髙祖疑之后因加媒蘖構成其罪於是勇及諸子皆被禁錮部分收其黨與楊素鍛鍊成獄髙祖御武德殿集百官引勇及諸子列於庭命薛道衡宣詔廢為庶人勇再拜泣下既而舞蹈而去乃立晉王廣為皇太子仍以勇付之囚於東宫勇自以廢非其罪頻請見上面申寃屈皇太子遏之於是升樹大呌聲聞於上素奏勇情志昏亂為癲鬼所著不可復收卒不得見髙祖寢疾皇太子姦亂宫闈事聞髙祖扺牀曰枉廢我兒因遣追勇未發使髙祖暴崩偽敕賜庶人死追封房陵王不立嗣隋書本傳李綱開皇末為太子洗馬太子廢文帝召東宫官屬切讓之無敢對者綱對曰太子器非上品性是常人若得賢明之士輔𨗳之足堪繼嗣皇業奈何以弦歌鷹犬之才居其側至令致此此陛下訓𨗳不足豈太子之罪耶辭氣凛然左右皆失色舊唐書李綱傳煬帝太子昭元德太子昭煬帝長子也生而髙祖命養宫中髙祖嘗謂曰當為爾娶婦昭應聲而泣髙祖問其故對曰漢王未婚時恆在至尊所一朝娶婦便則出外懼將違離是以啼耳上歎其有至性煬帝即位幸雒陽宫昭留守京師大業元年遣使者立為皇太子昭有武力能引強弩性謙沖言色恂恂未嘗忿怒所膳不許多品帷席極儉素臣吏有老父母者必問其安否歲時皆有惠賜明年朝雒陽將還京師願得少留帝不許拜請無數體素肥因致勞疾帝令巫者視之云房陵王為祟未幾薨隋書本傳唐髙祖太子建成建成髙祖長子也初封隴西郡公從平長安武德元年立為皇太子時太宗功業日盛髙祖私許立為太子建成密知之乃潛謀作亂劉黑闥反王圭魏徴謂建成曰殿下以地居嫡長爰踐元良秦王勳業克隆威震四海人心所向殿下何以自安今黑闥破亡之餘衆不盈萬加以糧運限絶瘡痍未瘳大軍一臨可不戰而擒也願請討之以立功建成從其計遂請討黑闥擒之時髙祖晚生諸王諸母擅寵建成隂與元吉連結後宫譖訴愈切髙祖惑之太宗懼不知所為李靖李績等勸太宗圖之不許九年突厥犯邉詔元吉率師拒之元吉因兵集將與建成克期舉事長孫無忌等日夜固爭太宗然其計六月三日密奏建成元吉欲殺臣為世充建德報仇髙祖愕然四日太宗將左右九人入至玄武門自衛髙祖召裴寂等欲令窮核其事建成元吉行至臨湖殿覺變即廽馬將東歸宫府太宗隨而射之建成應弦而斃時年三十八太宗即位追封息王諡曰隱以禮改葬十六年五月又追贈皇太子諡仍依舊舊唐書本傳太宗太子承乾恆山王承乾太宗長子也生於承乾殿因名太宗即位為皇太子時年八歲性聰敏太宗居諒暗庶政皆令聽斷每行幸常令居守監國及長好聲色慢遊無度魏王泰有美譽太宗漸愛重之承乾恐有廢立甚忌之有太常樂人美姿容承乾特加寵幸號曰稱心太宗大怒收稱心殺之承乾自此託疾不朝參者數月時左庶子于志寧右庶子孔頴達受詔輔𨗳志寧撰諫苑二十卷諷之頴達又多所規奏太宗並嘉之未幾志寧去職承乾侈縱日甚太宗復起志寧為詹事志寧與左庶子張元素數上書切諫承乾並不納尋與漢王元昌等謀反將縱兵入西宫紇干承基告其事太宗廢承乾為庶人徙黔州十九年卒於徙所葬以國公之禮舊唐書本傳髙宗太子忠𢎞賢燕王忠字正本髙宗長子也舊唐書本傳帝始為太子而忠生宴宫中俄而太宗臨幸詔宫臣曰朕始有孫欲共為樂酒酣帝起舞以屬羣臣在位皆舞賚賜有差永徽初拜雍州牧王皇后無子后舅桞奭説后以忠母微立之必親己后然之請於帝遂立為皇太子后廢武后子𢎞甫三歲許敬宗希后旨建言國有正嫡太子宜同漢劉強故事於是降封梁王俄徙房州刺史忠寖懼數有妖夢常自占事露廢為庶人囚黔州麟德初敬宗誣忠謀反賜死無子明年太子𢎞表請收葬許之唐書本傳孝敬皇帝𢎞髙宗第五子也封代王顯慶元年立為皇太子嘗受春秋左氏傳於率更令郭瑜至楚子商臣之事廢卷而歎曰此事非惟口不可道亦耳不忍聞請改讀餘書瑜請讀禮記從之咸亨二年駕幸東都留太子監國時戴至德張文瓘蕭德昭同為輔弼太子多疾病庶政皆決於至德等太子納右衛將軍裴居道女為妃裴氏甚有婦禮髙宗嘗謂侍臣曰東宫內政吾無憂矣上元二年薨諡為孝敬皇帝葬恭陵舊唐書本傳𢎞仁孝賔禮大臣未嘗有過后將騁志𢎞奏請數怫旨上元二年從幸合璧宫遇鴆薨年二十四天下痛之唐書本傳章懷太子賢字明允髙宗第六子也舊唐書本傳上元二年六月立為皇太子俄詔監國賢處決明審朝廷稱焉時正諫大夫明崇儼以左道為武后所信賢惡之調露中天子在東都崇儼為盜所殺后疑出賢謀遣人發太子隂事廢為庶人開耀元年徙巴州武后得政詔左金吾將軍丘神績迫令自殺年三十四睿宗立追贈皇太子及諡唐書本傳髙宗有八子天后所生三子自為行故睿宗第四長曰𢎞為太子仁明孝悌天后方圖臨朝鴆殺之立雍王賢賢每日憂惕無由敢言乃作黃臺瓜辭令樂工歌之冀天后聞之省悟辭云種瓜黃臺下瓜熟子離離一摘使瓜好再摘令瓜稀三摘猶尚可四摘抱蔓歸賢終為后所逐死黔中舊唐書承天皇帝傳中宗太子重潤重俊懿德太子重潤中宗長子也開耀二年生於東宫內殿髙宗甚悅是歲立為皇太孫開府置官屬及中宗遷房州其府坐廢大足元年為人所搆則天令杖殺時年十九重潤風神俊朗早以孝友知名死非其罪大為當時所悼惜舊唐書本傳節愍太子重俊中宗弟三子也神龍二年秋立為皇太子舊唐書本傳重俊性明果然少法度武三思挾韋后勢將圖逆內忌太子以非韋出數請廢三年七月重俊恚忿率李多祚等矯發左羽林及千騎兵殺三思崇訓并其黨十餘人自率兵趨肅章門斬關入索韋后安樂公主上官昭容所在后挾帝升玄武門召右羽林將軍劉仁景等率留軍千騎百人拒之多祚兵不得進帝據檻語千騎曰能斬賊者有賞於是士倒戈斬多祚重俊亡入終南山為左右所殺詔殊首朝堂獻太廟并以告三思崇訓柩睿宗立加贈諡陪葬定陵唐書本傳睿宗太子憲憲始王永平武后以睿宗為皇帝故立為皇太子睿宗降為皇嗣更册為皇孫與諸王皆出閣開府置官屬唐隆元年進封宋睿宗將建東宫以憲嫡長又嘗為太子而楚王有大功故久不定憲涕泣固讓遂許之玄宗討定蕭岑之難授開府儀同三司徙王寧開元二十九年薨追諡讓皇帝唐書本傳玄宗太子瑛廢太子瑛玄宗第二子也本名嗣謙開元三年正月立為皇太子十年正月加元服又令詣國子學行齒胄禮瑛母趙麗妃本妓人善歌舞玄宗在潞州得幸及武惠妃寵幸麗妃恩漸弛瑛自謂母氏失職嘗有怨望惠妃女咸宜公主降楊洄洄希惠妃旨日求其短譖於惠妃妃泣訴於玄宗玄宗惑其言謀於宰相將廢黜張九齡奏曰太子國本難於動搖今太子既長無過臣待罪左右敢不詳悉玄宗默然事且寢其年李林甫代張九齡為中書令二十五年四月楊洄又搆於惠妃玄宗召宰相籌之林甫曰此陛下家事臣不合參知玄宗意乃決使中官宣詔廢為庶人俄賜死寶應元年詔雪瑛罪追贈皇太子舊唐書本傳憲宗太子寧寧憲宗長子也元和元年封鄧王四年閏三月立為皇太子其年有司將行册禮以孟夏孟秋再卜日臨事皆以雨罷至十月方行册禮六年十二月薨年十九諡曰惠昭舊唐書本傳敬宗太子成美敬宗第五子陳王成美初文宗以莊恪薨大臣數請建東宫開成四年立成美為皇太子典册未具而帝崩仇士良立武宗殺之於邸唐書本傳文宗太子永莊恪太子永文宗長子也母曰王德妃太和四年封魯玉六年十月册為皇太子上即位以晉王謹願欲建為儲二未幾晉王薨不復言東宫事久之有是命中外慶悅開成三年上以太子宴遊敗度不可教導將議廢黜御史中丞狄兼謨雪涕以諌翼日翰林學士六人洎神䇿六軍軍使十六人又進表陳論上意稍解其年薨時傳云德妃寵衰賢妃楊氏恩渥方深懼太子他日不利於己日加誣譛太子不能自明既薨上追悔四年因會寧殿宴小兒緣橦有一夫在下憂其墮地有若狂者上問之乃其父也上感泣顧謂左右曰朕有天下不能全一子遂召樂官劉楚材等責之曰陷太子皆爾曹也立殺之舊唐書本傳昭宗太子裕裕昭宗長子也乾寧四年二月十四日册為皇太子舊唐書本傳帝幸華州韓建奪諸王兵既又殺諸王因請立裕為皇太子劉季述等幽帝東內奉裕即皇帝位季述誅裕匿右軍或請殺之帝曰太子何罪詔還少陽院復為王朱全忠自鳳翔還見王春秋盛標宇軒秀忌之密語崔胤曰王既竊帝矣渠可留公盍啓之胤從容言如全忠意不許帝遷洛他日謂蔣元暉曰德王朕愛子全忠奈何欲殺之言已泣下元暉即擲語全忠全忠恚帝被弒元暉置酒邀王飲九曲池飲酣殺之投尸水中唐書本傳諸王帝王之子展親胙土其有封爵詳各省志者不録惟蚤嵗無祿者合都秦諸帝子計之所傳亦寥寥也為具其世次如左秦始皇帝諸子將閭髙二世陰與趙髙謀行誅諸公子公子將閭昆弟三人囚於內宫議其罪獨後二世使使令將閭曰公子不臣罪當死吏致法焉將閭曰闕廷之禮吾未嘗敢不從賔贊也廊廟之位吾未嘗敢失節也受命應對吾未嘗敢失辭也何謂不臣願聞罪而死使者曰臣不得與謀奉書從事將閭乃仰天大呼天者三曰天乎吾無罪昆弟三人皆流涕拔劍自殺史記秦始皇本紀二世更為法律諸公子有罪輒下髙令鞫治之公子十二人戮死咸陽市公子髙欲奔恐收族乃上書曰先帝無恙時臣入則賜食出則乘輿御府之衣臣得賜之中廄之寶馬臣得賜之臣當從死而不能為人子不孝為人臣不忠無名以立於世臣請從死願葬驪山之足惟上幸哀憐之書上胡亥大悅賜錢十萬以葬李斯傳唐髙祖諸子玄霸智雲玄霸髙祖第三子也舊唐書本傳衛懷王元霸字大德幼辨惠隋大業十年薨年十六無子武德元年追王及諡又贈秦州總管司空以太宗子泰為宜都王奉其祀葬芷陽泰徙封越更以宗室西平王瓊子保定嗣唐書本傳智雲髙祖第五子也舊唐書本傳楚哀王智雲初名稚詮善射工書奕隋大業末從建成寓河東髙祖初建成走太原吏捕智雲送長安為隂世師所害年十四武德元年追王及諡三年以太宗子寬為嗣又贈涼州總管司徒寬早薨國除貞觀二年復以濟南公世都子靈龜嗣唐書本傳玄宗諸子一敏夏悼王一玄宗第九子也母貞順皇后一生而美秀上鍾愛名之為一開元五年孩孺而薨追封諡時車駕在東都葬於城南龍門東岑欲宫中舉目見之舊唐書本傳懷哀王敏玄宗第十五子也幼而豐秀以母惠妃之寵玄宗特加顧念才睟開元八年二月薨追封諡權窆於景龍觀天寶十三載改葬京城南以祔其母敬陵舊唐書本傳代宗諸子遐選均王遐代宗第三子早夭貞元八年追封舊唐書本傳荆王選代宗第十一子早世建中二年正月追封荆王贈開府儀同三司舊唐書本傳宗室本支百世之後天潢之𣲖瓜綿椒衍其或功名自見可式諸宗則類紀於此又或文學武功貴不敵賢而非宗人所可囿者則别紀他類云漢中山王後屈氂劉屈氂武帝庶兄中山靖王子也不知其始所以進征和二年春以涿郡太守屈氂為左丞相封澎侯秋戾太子為江充所譖殺充發兵入丞相府屈氂挺身逃亡其印綬上從甘泉來幸城西建章宫召發三輔近縣兵以丞相兼將太子亦矯制發武庫兵驅四市人凡數萬衆至長樂西闕下逄丞相軍合戰五日太子軍敗南奔明年二師將軍李廣利將兵擊胸奴丞相送至渭橋與廣利辭決廣利曰願早請昌邑王為太子屈氂許諾昌邑王者二師女弟李夫人子也二師女為屈氂子妻故共欲立焉時治巫蠱獄急內者令郭欀告丞相夫人以丞相數有譴使巫祠社祝詛主上有惡言及與二師共禱祠欲令昌邑王為帝有司奏請按驗罪至大逆不道有詔載屈氂厨車以徇要斬東市妻子梟首華陽街漢書本傳河間王後輔劉輔河間宗室也舉孝亷為襄賁令上書言得失召見擢為諫大夫會成帝欲立趙媫妤為皇后先下詔封偼妤父臨為列侯輔上書言昔武王周公承順天地饗魚鳥之瑞然猶君臣祗懼動色相戒今乃觸情縱欲傾於卑賤之女欲以母天下惑莫大焉臣自念得以同姓拔擢不敢不盡死書奏上使侍御史收輔繫掖庭祕獄左將軍辛慶忌等俱上書言輔託公族之親在諫臣之列獨觸忌諱不足深過誠不宜幽囚於掖庭獄上乃徙繫輔共工獄減死罪一等論為鬼薪終於家漢書本傳隋華隂諸宗整嵩豫崇整文帝次弟也與帝同生周明帝時以武元軍功賜爵陳留郡公從武帝平齊力戰而死文帝初居武元之憂率諸弟負土為墳人植一柏四根欎茂整栽者獨黃後大風雨并根失之果終不吉文帝受禪追封諡焉北史隋宗室諸王傳文帝異母弟嵩在周以武元軍功賜爵興城公早卒文帝受禪追封諡焉北史隋宗室諸王傳子崇武元帝族弟也少好學涉獵書記有風儀愛賢好士開皇初拜儀同以車騎將軍恆典宿衛煬帝嗣位纍遷侯衛將軍從幸汾陽宫子崇知突厥必為冦屢請早還京師不納尋有雁門之圍賊退出為離石太守有能名突厥屢冦邉塞胡賊劉六兒復擁衆劫掠郡境子崇請兵鎮遏帝大怒令子崇行長城子崇行百餘里四面路絶不得進而歸太原兵起城中應之城陷為讐家所殺北史隋宗宗諸王傳唐小鄭王房勉夷簡宗閔約湯勉字元卿鄭王元懿曾孫也幼勤經史長而沉雅清峻纍授開封尉至德初從至靈武拜監察御史屬朝廷右武大將管崇嗣於行在朝堂背闕而坐勉劾之肅宗曰吾有李勉始知朝廷尊也纍遷山南西道觀察使故吏前密縣尉王晬勤幹俾攝南鄭令俄為權幸所誣勉飛表上聞遂獲宥歷江西觀察使賊帥陳莊陷江西州縣勉悉平之部人有父病以蠱道為木偶人署勉名姓瘞於隴或以告曰為父禳災亦可矜也捨之大厯二年拜京兆尹兼御史大夫政尚簡肅宦官魚朝恩為觀軍容使仍知國子監事前尹黎幹寫心求媚每朝恩入監具數百人餼以待之及勉蒞職府吏先期有請勉曰軍容使判國子監事勉候太學軍容宜厚具主禮勉忝京尹軍容倘惠顧府廷豈敢不具蔬饌朝恩聞而銜之不復至四年除廣州刺史兼嶺南節度觀察使番禺賊帥馮崇道桂州叛將朱濟時等為亂陷沒十餘州勉討斬之五嶺平在官纍年器用車服無增飾及代歸悉搜家人所貯犀象諸物投江中耆老以為可繼宋璟盧奂十年拜工部尚書滑亳永平軍節度使李忠臣鎮汴州為麾下所逐詔勉移汴州建中四年李希烈寇汴州勉城守纍月救援莫至遂潰圍南奔宋州詔以司徒平章事徴既至優詔復其位他日上謂勉曰人言盧杞姦邪朕何不知對曰天下皆知獨陛下不知所以為姦邪也時人多其正直然自是見疏貞元四年卒贈賻有差勉垣率素淡好古尚竒清亷簡易為宗臣之表舊唐書本傳夷簡字易之鄭王元懿四世孫以宗室子補鄭丞德宗幸奉天朱泚遣使東出關至華候吏李翼不敢問夷簡曰泚必反向發豳隴兵五千救襄城乃賊舊部是將追還耳請驗之翼馳及潼關果得符白於關大將駱元光乃斬賊使收偽符獻行在詔拜元光華州刺史夷簡棄官去擢進士第纍遷山南東道節度使初貞元時取江西兵五百戍襄陽仰給度支後死亡略盡而歲取資不置夷簡奏罷之徙帥劔南召為御史大夫進門下侍郎同中書門下平章事久之請老以檢校左僕射分司東都明年卒夷簡致位顯處以直自間歷三鎮家無産資世謂行已能有終始者唐書本傳夷簡諸弟夷亮夷則夷範皆登進士第舊唐書李宗閔傳宗閔字損之鄭王元懿四世孫擢進士調華州參軍事諸賢良方正與牛僧孺詆切時政相李吉甫惡之補洛陽尉去從藩府辟署裴度伐蔡引為彰義觀察判官蔡平遷駕部郎中知制誥穆宗即位進中書舍人長慶初錢徽典貢舉宗閔託所親於徽李德裕等在翰林白徽取士不以實宗閔坐貶俄復為中書舍人典貢舉所取多知名士世謂之玉筍太和中以吏部侍郎同中書門下平章事引僧孺同秉政德裕所善皆逐之遷中書侍郎久之德裕為相宗閔大沮俄為山南西道節度使李訓鄭注用事罷德裕復召宗閔會楊虞卿以京兆尹得罪極言營解帝怒貶潮州司户參軍事楊嗣復輔政與宗閔善謀引宗閔輔政未及而文宗崩會昌中以澤潞叛得交通狀流封州徙柳州司馬卒宗閔性機警始有當世令名既貴喜權勢崇私黨卒以是敗子琨瓚皆擢進士瓚歷桂管觀察使不善御軍為士卒所逐貶死唐書本傳約汧公勉之子也兵部員外郎雅度簡逺有山林之致在潤州得古鐵一片擊之清越又養一猿名山公月夜泛江登金山鼓琴猿必嘯和曾奉使行陜州硤石縣東愛渠水清流旬日忘發梁武造寺令蕭子雲飛白大書一蕭字約自江淮竭産致歸扁於小亭號曰蕭齋全唐詩話湯宗閔弟宗冉之子也纍官至給事中咸通中踐更臺閣知名於時舊唐書李宗閔傳湯纍官京兆尹黃巢陷長安殺之唐書李宗閔傳恆山王房適之季卿載義適之恆山愍王孫也始名昌神龍初擢左衛郎將開元中纍遷通州刺史以辦治聞按察使韓朝宗言諸朝擢秦州都督徙河南尹政不苛細為下所便玄宗患榖洛歲暴耗徭力詔適之以禁錢作三大防曰上陽積翠月陂自是水不能患進御史大夫二十七年兼幽州長史知節度事適之以祖被廢父象見逐葬禮有闕至是丐陪瘞昭陵闕中詔可遷刑部尚書天寶元年代牛仙客為左相與李林甫爭權不協於是皇甫惟明韋堅裴寬韓朝宗皆適之厚善悉為林甫所搆得罪適之不自安乃求散職以太子少保罷俄貶宜春太守會御史羅希奭隂被詔殺堅等貶所適之懼仰藥自殺唐書本傳季卿適之子弱冠舉明經頗工文詞應制舉登博學宏詞科再遷鄠縣尉肅宗朝纍遷中書舍人以公事坐貶通州别駕代宗即位大舉淹抑徴為京兆少尹尋拜吏部侍郎俄兼御史大夫奉使河南江淮宣慰振拔幽滯進用忠亷時人稱之季卿有宇量性識博逹善與人交襟懷豁如其在朝以進賢為務士以此多之大厯二年卒孫融立性嚴整善吏事貞元十年官至渭州節度使卒舊唐書李適之傳載義字方榖常山愍王之後為幽州屬郡守載義少孤有勇力善挽強角抵劉濟為幽州節度以功遷都知兵馬使寶厯中朱延嗣竊襲父位不遵朝旨載義殺之數其罪以聞敬宗嘉之封武威郡王充幽州節度副大使知節度事未幾李同捷據滄景邀襲父爵載義上表請討同捷以自效纍破賊軍太和三年平滄景䇿勳加平章事四年奚契丹冦邉擊走之就加太保五年為部下楊志誠所逐因入覲改山南西道節度觀察等使兼興元尹七年遷北都留守充河東節度觀察處置等使回鶻每遣使入朝所至強暴邉城長吏不敢制之以法但嚴兵防守至是有回鶻將軍李暢者習中國事益驕恣鞭捶驛吏貪求無已載義因召李暢與語曰可汗使將軍朝貢朝廷饔餼至厚所以禮畨客也茍有不至吏當坐死若將軍部伍不戢載義必殺為盜者遂罷守兵使兩卒司其門虜無敢犯開成二年卒贈太尉舊唐書本傳吳王房峴峴吳王恪孫也長吏治天寶時纍遷京兆尹玄宗歲幸溫湯峴獨無所獻帝異之楊國忠使客摘安祿山隂事諷京兆捕其第得祿山反狀祿山怒上書自言帝懼變出峴為零陵太守峴為政得人心時京師米貴百姓相與謡曰欲粟賤追李峴尋徙長沙至德初拜扶風太守兼御史大夫明年擢京兆尹封梁國公乾元二年以中書侍郎同中書門下平章事於是吕諲李揆第五琦同輔政峴位望最舊事多獨決諲等不平李輔國用權制詔不出中書百司莫敢覆峴頓首帝前極言其惡帝悟稍加檢制輔國由是深銜峴出為蜀州刺史代宗立拜門下侍郎同中書門下平章事故事政事堂不接客自元載為相中人傳詔者置榻待之峴至即敕吏撤榻又奏常參官舉才任諫官憲官者無限員不踰月罷為太子詹事改檢校兵部尚書卒年五十八峴兄峘嶧峘峴同時為御史大夫俱判臺事又合制封公嶧為户部侍郎銀青光祿大夫同居長興里第門列三戟唐書本傳曹王房象古道古象古荆南節度使皋之子元和中自衡州刺史擢安南都護貪縱不法歡州刺史楊清者蠻酋也象古忌其豪召為牙門將常鬱鬱思亂會討賊象古發甲助之授清兵三千清還襲安南殺象古并其家唐書曹王明傳道古象古弟舉進士擢校書郎歷利隋唐睦四州刺史柳公綽鎮鄂嶽為飛譖上聞憲宗欲代之裴度言嗣曹王皋能以江漢兵制李希烈威惠在人今以其子將必有功會道古自黔中入朝乃代公綽元和十二年攻申州破其郛進圍中城守卒夜驅女子登而譟發懸門以出道古衆亂多死李聽守安州道古誣逐之自將出穆陵關士卒驕不能制又度支錢悉以饋權幸其下怨怒戰不力故再入申不能下淮西平召為宗正卿左金吾將軍帝喜服餌道古欲自媚而所善柳泌自謂能為不死藥因宰相皇甫鏄以聞會帝崩穆宗立斥道古為循州司馬終以服丹歐血死唐書曹王明傳蔣王房之芳齊運之芳蔡國公煌之孫也幼有令譽頗善五言詩宗室推之開元末為駕部員外郎天寶十三載安祿山奏為范陽司馬祿山起逆自拔歸西京授右司郎中歷太子右庶子廣德元年吐蕃犯邉遣之芳兼御史大夫使吐蕃被留二年而歸除禮部尚書尋改太子賔客舊唐書蔣王惲傳齊運蔣王惲之孫也為長安令職事修理歷京兆少尹建中末改河中尹李懷光自山東卷甲奔難至河中力疲休兵三日齊運傾力犒設軍人皆悅懷光既反驅兵還保河中齊運不能敵棄城而走除京兆尹時賊據京城李晟軍東渭橋齊運徴募工役版築城壘飛芻挽粟以應晟收復之際頗有力焉改宗正卿兼御史大夫尋正拜禮部尚書兼殿中監齊運無學術不知大體但甘言取信既而被疾歲餘不能朝請朝廷除授往往降中人就宅咨決卒贈尚書左僕射舊唐書本傳寧王房景儉景儉字寬中漢中王瑀之孫也父褚太子中舍景儉貞元十五年進士性俊朗博聞強記自負王霸之略於士大夫間無所屈纍轉忠州刺史元和末入朝時政惡之出為澧州刺史延英辭日景儉自陳已屈穆宗憐之拜倉部員外郎月餘驟遷諫議大夫性既矜誕寵擢之後凌蔑公卿大臣使酒尤甚中丞蕭俯學士段文昌相次輔政訴之貶建州刺史未幾召還復為諫議大夫其年十二月景儉乘醉詣中書謁宰相呼王播崔植杜元頴名面疏其失辭頗悖慢宰相遜言止之旋奏貶漳州刺史未至追還授少府少監竟不得志而卒景儉疏財尚義雖不厲名節死之日知名之士咸惜之景儉弟景儒景信景仁皆有藝學知名於時景信景仁皆登進士第舊唐書本傳陜西通志卷四十八
