body:
  text: 陜西通志卷六十四人物十隱逸周漢陰丈人者楚人也子貢適楚過漢陰見丈人方將為圃畦鑿隧而入井抱甕而出灌搰搰然用力甚多而見功寡子貢曰有械於此挈水若抽其名為橰用力甚寡而見功多丈人作色而笑曰聞之吾師有機械者必有機事有機事者必有機心機心存於胸中則純白不備純白不備則神生不定神生不定者道之所不載也吾非不知羞而不為也子貢瞞然慚俯而不對莊子段干木晉人也少貧且賤乃治清節遊西河師事卜子夏與田子方干木守道不仕魏文侯欲見就造其門干木踰牆而避文侯文侯以客禮待之出過其廬而式其僕問曰干木布衣也式其廬不已甚乎文侯曰干木賢者也不移勢利懷君子之道隱居窮巷聲馳千里吾敢不式乎干木先乎德寡人先乎勢干木富乎義寡人富乎財勢不如德貴財不若義高又請為相不肯後卑已固請見與語文侯立倦不敢息文侯名過齊桓公者蓋能尊段干木敬卜子夏遊田子方故也高士傳秦楊碩華陰人隱居華山仙谷交結名士洞習天文知秦將亡漢當興生八子俱從高祖征伐第八子喜擊殺項羽有功封赤泉亭侯餘皆將軍乃賜碩太史公馬志漢邵平者故秦東陵侯秦破為布衣貧種瓜長安城東瓜美故時俗謂之東陵瓜從邵平以為名也史記蕭相國世家四皓者皆河內軹人也修道潔已非義不動秦始皇時見秦政虐乃共入商洛隱地肺山以待天下定漢高聞而徵之不至高士傳上欲廢太子立戚夫人子趙王如意吕后恐乃使建成侯吕澤劫留侯曰為我畫計留侯曰此難以口舌爭也顧上有不能致者天下有四人四人者年老矣皆以為上慢侮人故逃匿山中義不為漢臣然上高此四人今公誠能無愛金玉璧帛令太子為書卑辭安車因使辨士固請宜來來以為客時時從入朝令上見之上知此四人賢則一助也於是吕后令吕澤卑辭厚禮迎此四人四人至客建成侯所黥布反上病欲使太子將往擊之四人相謂曰凡來者將以存太子太子將兵事危矣乃説建成侯曰君何不急請吕后承間為上泣言吕澤夜見吕后吕后為上涕泣而言如四人意上擊布還愈欲易太子及燕置酒太子侍四人從太子年皆八十有餘鬚眉皓然衣冠甚偉上問曰彼何為者四人前對各言姓名曰東園公用里先生綺里季夏黃公上大驚曰吾求公數嵗公避逃我今公何自從吾兒遊乎四人皆曰陛下輕士善罵臣等義不受辱竊聞太子仁孝恭敬愛士天下莫不延頸願為太子死者故臣等來耳上曰煩公幸卒調護太子四人為壽畢趨去上目送之召戚夫人曰我欲易之彼四人輔之羽翼已成難動矣吕后真而主矣史記留侯世家吕后德之將官爵之四人復入商山吕氏不能留商隱説東園公姓唐名秉字宣明綺里季姓吳名實字子景夏黃公姓崔名廣字少通甪里先生姓周名術字元道號稱四皓鴻書摯峻字伯陵長安人少治清節與太史遷交好峻獨退身修德隱於岍山遷既親貴乃以書勸峻曰遷聞君子所貴乎道者三太上立德其次立言其次立功伏惟伯陵材能絶人高尚其志以善厥身氷清玉潔不以細行荷纍其名固已貴矣然未盡太上之所由也願先生少致意焉峻報書曰峻聞古之君子料能而行度德而處故悔吝去於身利不可以虛受名不可以茍得漢興以來帝王之道於斯始顯能者見利不肖者自屏亦其時也周易大君有命小人勿用徒欲偃仰從容以遊餘齒耳峻之守節不移如此遷為李陵遊説下腐刑果以悔吝被辱峻高尚不仕卒於岍岍人立祠號曰岍居士世奉祀之不絶高士傳楊王孫城固人學黃老之術家纍千金厚自奉養生無所不致病且死令其子曰吾欲裸葬以反吾真必無易吾意死則為布囊盛尸入地七尺既下從足引脫其囊以身親土其子不忍往見王孫友人祁侯祁侯與王孫書王孫曰夫厚葬誠無益於死者而俗人競以相高靡財單幣腐之地下或乃今日入而明日發此真與暴骸於中野何異且裹以幣帛隔以棺槨支體絡束口含玉石欲化不得鬱為枯臘千載之後棺槨腐朽乃得歸土就其真宅由是言之焉用久客曰善遂裸葬漢書本傳成公成帝時人自隱姓名常誦經不交世利時人號曰成公成帝出遊問之成公不屈節上曰朕能富貴人能殺人子何逆朕成公曰陛下能貴人臣能不受陛下之官陛下能富人臣能不受陛下之祿陛下能殺人臣能不犯陛下之法上不能折使郎二人就受政事十二篇高士傳安丘望之長陵人少治老子恬靜不求進宦號曰安丘丈人成帝聞欲見之望之辭不肯見上以其道德深重常宗師焉望之不以見敬為高愈自退損為巫醫於民間著老子章句扶風耿况王汲等皆師事之從受老子終身不仕道家宗焉高士傳張仲蔚者平陵人與同郡魏景卿俱修道德隱身不仕明天官博物善屬文好詩賦常居窮素所處蓬蒿沒人閉門養性不治榮名時人莫識唯劉龔知之高士傳鄭朴字子真谷口人修道靜默世服其清高成帝時大將軍王鳯以禮聘之不屈揚雄盛稱其德曰谷口子真耕於巖石之下名震京師馮翊人刻石祠之至今不絶高士傳時人因子真所居名為鄭泉雲陽宫記衛衡字伯梁南鄭人少師隱士同郡樊季齊以高行聞郡九察孝亷公府州十辟公車三徵不應董扶任安從洛還過見之曰京師天下之市朝也足下猶之人耳何其在遠以虛名屢動徵書若至中國則價盡矣衡笑曰時有險易道有汙隆若樊季齊楊仲桓雖應徵聘何益於時乎茍無所則尼軻恓恓是以君平子真不屈其志其子之徒也哉吾何虛假之有安扶服之敬其言也漢中士女志安陵清者有項仲山飲馬渭水日與三錢以償之三輔決録蔣詡杜陵人為兖州刺史以亷直為名王莽居攝詡以病免官歸鄉里卧不出戶卒於家漢書鮑宣傳詡歸鄉里荆棘塞門舍中有三徑不出惟求仲羊仲從之遊二人不知何許人皆治車為業時人謂之二仲三輔決録楊寶震父華陰人習歐陽尚書哀平之世隱居教授居攝二年與兩龔蔣詡俱徵遂逃遁不知所處光武高其節建武中公車特徵老病不到卒於家後漢書楊震傳井丹字大春郿人少受業太學通五經善談論京師為之語曰五經紛綸井大春性清高未嘗修刺候人建武末沛王輔等五王居北宫皆好賔客更遣請丹不能致信楊侯陰就以外戚貴盛乃詭説五王求錢千萬約能致丹而别使人要劫之丹既至就故為設麥飯蔥葉之食丹推去之曰以君侯能供甘旨故來相過何其薄乎更致盛饌乃食及就左右進輦丹笑曰吾聞桀駕人車豈此邪坐中皆失色就不得已令去輦自是隱閉不關人事後漢書本傳高恢字伯達京兆人少治老子恬虛不營世務與梁鴻善隱於華隂山中及鴻東遊思恢作詩曰鳥嚶嚶兮友之期念高子兮僕懷思想念恢兮爰集兹二人遂不復相見恢髙抗匿耀終身不仕焉高士傳梁鴻字伯鸞平陵人受業大學家貧尚節介博覽無不通而不為章句牧豕於上林苑中曽誤遺火延及他舍鴻乃尋訪燒者問所失悉以豕償之其主猶以為少鴻願以身居作主人許之因為執勤不懈鄰家耆老見非恆人乃共讓責主人而稱鴻長者悉還其豕鴻不受而去歸鄉里勢家慕其高節多欲女之鴻並絶不娶同縣孟氏女擇對不嫁鴻聘之有頃共入霸陵山中以耕織為業詠詩彈琴以自娛仰慕前世高士為四皓以來二十四人作頌因東出關作五噫之歌與妻子居齊魯之間又去適吳依大家臯伯通居廡下為人賃舂每歸妻為具食舉案齊眉伯通異之舍於家鴻潛閉著書十餘篇疾且困告主人曰慎勿令我子持喪歸去及卒伯通等為求葬地於要離冢咸曰要離烈士伯鸞清高可令相近葬畢妻子歸扶風後漢書本傳張楷字公超司𨽻舉茂才除長陵令不至官隱居𢎞農山中學者隨之所居成市後華隂山南遂有公超市五府連辟舉賢良方正不就順帝特下詔曰張楷行慕原憲操擬夷齊前此徵命未至將主者玩習於常優賢不足使其難進歟郡時以禮發遣復告疾不到性好道術能作五里霧時關西人裴優亦能為三里霧自以為不如楷從學之楷避不肯見桓帝即位優行霧作賊事覺被考引楷楷坐繫廷尉詔獄積二年恆諷誦經籍作尚書注後事無驗見原還家後漢書張霸傳韓康字伯休霸陵人常遊名山採藥賣長安市中口不二價者三十餘年有女子從康買藥康守價不移女子怒曰公是韓伯休邪乃不二價乎康歎曰我欲避名乃小女子皆知有我何用藥為遂遁入霸陵山中博士公車連徵不至桓帝時乃備玄纁安車以聘之使者奉詔造康康不得已乃許諾辭安車自乘柴車冒晨先發至亭亭長以韓徵君當過發人修道橋見康柴車幅巾以為田叟也使奪其牛康即釋駕與之有頃使者至奪牛翁乃徵君也使者欲奏殺亭長康曰此自老子與之亭長何罪乃止康因中路逃遁以壽終後漢書本傳丘欣字季春扶風人少有大才自謂無伍傲世不與俗人為羣郡守始召見曰明府欲臣欣邪友欣邪師欣邪明府所以尊寵人者極於功曹所以榮祿人者已於孝亷一極一已皆欣所不用也郡守異之遂不敢屈高士傳馬瑶茂陵人隱於汧山以兔罝為事所居俗化百姓美之號馬牧先生後漢書矯慎傳法真字高鄉扶風郿人學無常家博通內外圖典關西號為大儒弟子負笈嘗數百人性恬靜寡欲不涉人間事太守請見之真乃幅巾請謁太守欲以功曹相屈真曰以明府見待有禮故敢自同賔末若欲吏之真將在北山之北南山之南矣太守不敢復言凡辟公府賢良皆不就同郡田羽薦真會順帝西巡羽又薦之帝虛心欲致前後四徵真曰吾既不能遁形遠世豈飲洗耳之水哉遂深自隱絶友人郭正稱之曰法真名可得而聞身不可得而見逃名而名我隨避名而名我追可謂百世之師者矣共刋石頌之號曰玄德先生年八十九以壽終高士傳樊志張南鄭人博學多通隱身不仕嘗遊隴西時破羌將軍段熲出征西羌請見志張其夕熲軍為羌所圍因留軍中三日不得去夜謂熲曰東南角無羌宜乘虛引出住百里還師攻之可以全勝熲從之果以破賊於是以狀表聞又説其人既有梓慎焦董之識宜輔翼聖朝咨詢竒異於是有詔特徵會病終後漢書本傳三國扈纍字伯重京兆人初平中山東人有青牛先生字方正客三輔曉知星歷風角鳥情纍隨方正遊學人謂之得其術有婦無子三輔亂隨方正入漢中漢中壞隨徙民詣鄴喪其婦至黃初元年又徙詣洛陽遂不復娶婦獨居道側以㼾甎為障施一厨牀食宿其中晝日潛思夜起仰視星宿吟咏內書人或問之閉口不肯言至嘉平中年八九十才若四五十者縣官以其孤老給廩日五升不足食頗行傭以禆糧人與不取食不求美衣敝縕服後病亡魏略劉仲始者長安市儈一為市吏所辱乃感激遂行學問經明行修流名海內後以有道徵不就人歸其高三國魏志裴潛傳注晉楊軻天水人少好易長而不娶學業精微常食粗飲水衣褐縕袍人不堪其憂而軻悠然自得劉曜僭號徵拜太常軻固辭曜亦敬而不逼遂隱於隴山曜後為石勒所擒秦人東徙軻留長安石季龍徵之軻以疾辭迫之乃發後歸秦州晉書本傳今隴州山中有軻遺迹隴州志南宋韋元避吏隱長安南山武帝入關以太尉掾徵不至南史韋睿傳陳馬樞字要理扶風郿人六嵗能讀孝經論語老子及長博極經史尤善佛經及周易老子義梁邵陵王綸為南徐州刺史引為學士綸時自講大品經命樞講維摩老子周易同日發題道俗聽者二千人樞依次剖判開其宗旨然後支分流别轉變無窮綸甚嘉之將引薦於朝廷尋遇侯景之亂綸舉兵援臺乃留書二萬卷以付樞樞肆志尋覽殆將周遍乃喟然歎曰吾聞貴爵位者以巢由為桎梏愛山林者以伊吕為管庫束名實則芻芥柱下之言玩清虛則粃粳席上之説稽之篤論亦各從其好也乃隱於茅山有終焉之志元嘉元年文帝徵為度支尚書辭不應命及鄱陽王為南徐州刺史欽其高尚卑辭厚意令使者邀之前後數反樞不得已乃行王築别館以處之樞惡其崇麗乃於竹林間自營茅茨而居每王公餽餉辭不獲己者率十分受一樞少屬亂離每所居之處盜賊不入依託者常數百家目精洞黃能視暗中物嘗有白燕一雙巢其庭樹馴狎欄廡時集几案春來秋去幾三十年太建十三年卒時年六十撰道覺論二十卷行於世陳書本傳北魏魯祈扶風人遭赫連屈丐暴虐避地寒山教授弟子數百人好方術少嗜欲魏書釋老志杜景字宣明京兆人學通經史州府交辟不就子裕字慶延文學相傳仕齊位止樂陵令齊亡退居教授終於家北史杜銓傳鄭修北海人少隱於岐南几谷中依巗結宇獨處淡然屏迹人事不交世俗耕食水飲皮冠草服雅好經史專意玄門前後州將每徵不至岐州刺史魏蘭根頻遣使致命修暫出見尋還山舍魏書本傳北周韋敻字敬遠杜陵人志尚夷簡淡於榮利弱冠被召拜雍州從事謝疾去前後十見徵辟皆不應明帝即位禮敬愈厚且為詩以貽之敻答詩願謁帝大悅敕有司給河東酒一斗號曰逍遙公時晉公護廣營第宅召敻訪以政事敻仰視其堂歎曰甘酒嗜音峻宇雕牆有一於此未或不亡護不悅識者以為知言武帝嘗與敻夜宴大賜縑帛敻惟取一匹帝以此益重之孝寬為延州刺史敻至州寬以所乘馬及轡勒與敻敻以其華飾笑謂曰舍舊録新非吾志也乘舊馬以歸宣帝在東宫遺敻書問以立身之道敻對曰儉為德之恭侈為惡之大願殿下察之敻少留情著述手自抄録數十卷晚年虛靜惟以體道會真為務宣政元年卒於家武帝遣使祭贈有加周書本傳唐司馬郊字子都隱居華山五十年禽獸日遊目前有如家馴每灌園不食菜心以其傷生意及四時山果熟果大大鳥銜果小小鳥銜俱送郊齋中郊歎曰禽鳥送果甚多但可日料三十顆異日如戒及郊卒百禽聚於庭悲鳴纍日而去獨異志孫思邈華原人通百家説善言老莊獨孤信見其少異之曰聖童也顧器大難為用耳及長居太白山隋文帝輔政以國子博士召不拜密語人曰後五十年有聖人出吾且助之太宗初召詣京師年已老而聽視聰瞭帝歎曰有道者欲官之不受顯慶初復召見拜諫議大夫固辭上元元年稱疾還山思邈於陰陽推步醫藥無不善孟詵盧照鄰等師事之永淳初卒唐書本傳田遊巖三原人永徽時補太學生罷歸入太白山母及妻皆有方外志與共棲遲山水間自蜀歷荆楚愛夷陵青溪止廬其側長史李安期表其才召赴京師行及汝辭疾入箕山居許由祠旁自號由東鄰頻召不出高宗幸嵩山遣中書侍郎薛元超就問其母賜藥物絮帛帝親至其門遊巖野服出拜儀止謹朴帝令左右扶止謂曰先生比佳否曰臣所謂泉石膏盲煙霞痼疾者帝悅因敕遊巖將家屬乘傳赴都拜崇文館學士進太子洗馬裴炎死坐素厚善放還山蠶衣耕食不交當世惟與韓法昭宋之問為方外友云唐書本傳武攸緒則天兄惟良子也恬淡寡欲好易莊周書少變姓名賣卜長安市得錢輒委去唐書本傳高太素商山隱士纍徵不起在山中構道院二十餘間太素起居清心亭下皆茂林秀竹竒花異卉每至一時即有猿一枚詣亭前鞠躬而啼不易其候太素因目之為報時猿其性度有如此開天遺事王休居太白山下日與僧道異人往還每至冬時取溪氷敲其精瑩者煮建茗共賔客飲之開天遺事郭休字退夫太白山隱士有運氣絶粒之術於山中建茅屋百餘間有白雲亭鍊丹洞注易亭修真亭朝元壇集神閣每於白雲亭與賔客看山禽野獸即以槌擊一鐵片子其聲清響山中鳥獸聞之集於亭下呼為唤鐵開天遺事吳筠字貞節華州華陰人通經誼美文詞舉進士不中性高鯁不耐沈浮於世去居南陽倚帝山天寶初召至京師請𨽻道士籍乃入嵩山依潘師正究其術南遊天台觀滄海與其名士相娛樂文辭傳京師玄宗遣使召見大同殿與語甚悅敕待詔翰林獻玄綱三篇帝嘗問道對曰深於道者無如老子五千文其餘徒喪紙札耳復問神仙冶鍊法對曰此野人事非人主宜留意筠每開陳皆名教世務以微言諷天子天子重之羣沙門嫉其見遇而高力士素事浮屠共短筠於帝筠亦懇求還嵩山詔為立道館安祿山欲稱兵乃還茅山因東入會稽剡山大厯十三年卒弟子私諡為宗玄先生唐書本傳韋況斌子萬年人少隱王屋山孔述睿以諌議大夫召薦況為右拾遺不拜未幾以起居郎召半嵗輒棄官去徙家龍門除司封員外郎稱疾固辭元和初授諫議大夫勉諭到職數月乞骸骨以太子左庶子致仕卒况雖世貴而志沖遠不為聲利所遷當時重其風操唐書韋安石傳崔覲城固人以儒自業身耕耨取給老無子乃以田宅資財分給奴婢各為業而身與妻隱南山夫婦嘯詠相視為娛文宗時左補闕王直方薦覲高行詔以起居郎召辭疾不至唐書本傳五代鄭元素華原人少習詩禮避亂南遊居廬山青牛谷高卧四十餘年採薇食蕨絃歌自若構椽剪茅於舍後會集古書至千餘卷南唐書宋鄭雲叟本名遨棄家入少室山聞西嶽有五粒松脂淪入地千歲化為藥能去三尸因居華陰與李道殷羅隱之友善道殷有釣魚之術釣而不餌又能化石為金雲叟目擊其事而不求續世説碧雲洞在嶽之東乃鄭雲叟羅隱之翟士端隱居之所鄭遨南燕人天成中以拾遺詔不起賜號逍遙先生羅隱之新淦縣玉笥山玉梁觀道士來居華山一觴一咏高情自適天福中賜號希夷先生翟士端字表正齊人博通九經祥符中真宗幸汾陰詔不起無疾而逝七日肢體猶溫鄭隱字明處兖之奉符人左臂有黑黶子如北斗狀常居王刁三洞自冬涉春不出人咸異之祥符中真宗祀后土還駐驆驛下賜號貞晦先生又賜歸山歌華嶽全集真宗祀汾陰時召華山隱士鄭隱敷水隱士李寧隱以經術為業遇道士傳辟穀鍊氣之法修習頗驗居華山王刁巖踰二十年冬夏常衣皮裘寧精於藥術老而不衰常以藥施人人以金帛為報輒拒之大中祥符四年賜號貞晦先生上並作詩以賜贈以茶藥繒帛獨隱辭賜物不受宋史方技傳王子華同州人博學能文尤工詩景德中與華山隱者齊人翟士端兗人鄭隱南燕人鄭遨臨江羅隱之等號五高士為一時名流所推重賈志陳摶字圖南亳州真源人不求祿仕以山水為樂居華山雲臺觀又止少華石室每寢處多百餘日不起因世宗好黃白術有以摶名聞者命華州送至闕下從容問其術對曰陛下當以致治為念奈何留意黃白之事乎世宗不之責命為諫議大夫不受太平興國中來朝太宗待之甚厚九年復來朝上益加禮重宋琪等從容問曰先生得玄默修養之道可以教人乎對曰摶山野之人非有方術可傳今聖上龍顔秀異正君臣協心同德興化致治之秋勤作修煉無過於此琪等以其語白上上益重之賜號希夷先生端拱初忽謂其弟子賈德升曰汝可於張超谷鑿石為室吾將憩焉二年七月石室成摶手書表曰臣摶大數已終已於今月二十二日化形張超谷中如期而卒七日肢體猶溫有五色雲蔽塞洞口彌日不散摶好讀易手不釋卷能逆知人意人咸異之宋史本傳華山陳真人隱於睡馮翊寇朝一常事真人得睡之崖略後還鄉惟睡而已郡南劉垂範往謁其從者以睡告垂範坐寢外聞齁鼾之聲雄美可聽退而告人曰冦先生睡中有樂乃華胥調雙門曲也或曰未審譜記何如垂範以濃墨塗紙滿幅題曰混沌譜云即此是也清異録种放字明逸洛陽人沈默好學父嘗令舉進士放辭以業未成父卒與母隱居終南山豹林谷之東明峯以講習為業淳化三年陜西轉運使宋惟幹言其才詔召之放稱疾不起轉居窮僻人迹罕至太宗嘉其節賜以緡錢使養母咸平元年母卒放水漿不入口三日廬於墓側詔賜錢帛米助其喪四年兵部尚書張齊賢言放孝行純至簡朴退靜詔赴闕放辭不起明年齊賢守京兆復請加旌賁即遣供奉官周旺齎詔赴闕九月放至對崇政殿詢以民政邊事放曰明王之治愛民而已餘皆謙讓不對即日授左司諫直昭文館六年春表暫歸山詔許其請將行遷起居舍人十月遣使撫問圖其林泉居處以獻景德元年十月來朝二年擢為右諫議大夫上表乞嵩少養疾許之大中祥符元年判集賢院拜給事中二年四月歸山四年正月復來朝拜工部侍郎放屢至闕下俄復還山人貽書嘲其出處之迹放不答王嗣宗守京兆放乘醉慢罵之嗣宗屢遣人責放不法仍條上其事放遂徙居嵩山八年十一月乙丑忽取前章疏稿悉焚之召諸生會飲酒數行而卒上甚痛悼親製文遣內侍往致祭歸葬終南宋史本傳宋澥長安人有清節不仕與种放魏野遊多篇什酬唱宋史本傳高懌字文悅荆南高季興四世孫幼養於外家通經史百家之書聞种放隱終南山乃築室豹林谷從放受業放竒之不敢處以弟子行與同時張嶤許勃號南山三友會詔舉沈淪知長安寇準薦之辭不起景祐中録國初侯王後懌推其弟欣得官及范雍建京兆府學召懌講授諸生席間嘗數十百人杜衍嘗請賜處士號乃命為大理評事懌固辭仁宗嘉其守號安素處士賜良田五百畝文彥博表其經術該通有高世之行可以勵風俗詔賜第一區嘉祐中除光祿寺丞復固辭夢道士持素書聘為白鹿洞主卒宋史本傳李植字化光京兆人觀察使士衡之孫自幼好道不樂婚宦工畫山水劉原父嘗贊之圖繪寶鑑楊沖遠興元人元符中張浚試吏興元與楊用中别問公往來梁洋其人士有可與遊者乎用中曰楊沖遠可與為師浚至遂與交漢中府志安世通青城山道人本西人其父有謀策為武官數以言干當路不用遂自沈於酒而終世通隱居青城山中不出吳曦反乃獻書於成都帥楊輔曰世通雖方外人竊以為公得曦檄即當還書誦其家世激以忠義因而散金發粟興仗義之師以順討逆誰不願從今悠悠不決所謂婦人女子之悲停囚長智吾恐朝廷之大失望也輔不能從遂東如江陵請吳獵舉兵討曦未幾曦敗獵使蜀薦士以世通為首云宋史本傳按四川通志云安世通本陜西人金嶽行甫字仁老鄜州洛川人在關中最有詩名泰和初有以仁老時病詩達之道陵者道陵大加賞異授以官不就士論高之詩百餘篇佳句甚多中州集元楊恭懿字元甫奉元人力學強記尤深於易禮春秋父殁水漿不入口者五日居喪盡禮宣撫司以掌書記辟不就至元七年與許衡俱被召恭懿不至衡日稱譽恭懿之賢詔遣使召之以疾不起十一年太子下教中書俾如漢聘四皓者以聘恭懿丞相為書致命乃至京師既入見世祖勞其遠來又親詢其鄉里氏族無不周悉十二年侍讀學士圖克坦公履請設取士科詔與恭懿議之恭懿言今欲取士宜敕有司舉有行檢通經史之士試以經藝論策帝善之會北征恭懿遂歸田里十六年詔安西王相敦請赴闕入見詔與太史院改厯十七年進奏曰臣等更造新厯一依前賢定論是日方跪帝命許衡及恭懿起曰無自勞也授集賢學士兼太子院事十八年辭歸二十年以太子賔客召二十二年以昭文館學士召二十九年以議中書省事召皆不行三十一年卒年七十元史本傳員炎字善卿同州人負竒氣不事生産大德二年故人楊紫陽憫其窶用監嵩州酒炎薄之長揖而去嘗遊河朔以詩名詩稿酒瓢外無長物賈志駱天驤字飛卿長安人博涉羣書遊心翰墨樂道丘園不求聞達馬志張同字之美涇陽人自幼好讀書不求聞達以山水文籍自娛雖在布衣邑人待之如公輔馬志第五勝愚字仲學富平人元末不悅仕進鑿洞山中甘貧樂道日與同志優遊於山水間學者稱為第五夫子賈志楊儼字敬夫涉獵經史元末隱陳倉谷中淡然無宦情明初纍徵不起賈志明閻正叔侯伯正俱渭南人泰定中同舉進士正叔授五經博士伯正授太常博士後以世亂棄官隱居田里洪武初並被徵至京深衣幅巾入見以年高辭不願仕明太祖見其鬚眉皓然禮之使歸俱以壽終於家賈志黃奮字熙載華陰人洪武初為博士教世子旋歸常乘牛車賦詩飲酒郭司馬良師事之賈志侯文禮白水人為人質直長厚言動不茍鄉里無少長皆敬憚之有相競輒就質平無不傾服洪武初纍薦不起賈志折鼎獨神木人洪武初以人材薦辟授河南按察司僉事過中部喜曰此地可居乃卜築於縣西之村晦迹高蹈婆娑泉石居人亦莫之知一日官府徵夫役曰往役義也從之役愆期當罰度不能免乃曰君無笞我我河南按察司僉事也尹驚詫禮而歸之自是人莫知其終延安府志李琛寧羌衛人性恬靜樂道工詩文不求聞達年八十餘終馬志郭琦漢中人𢎞治中領鄉薦任河南訓導升解州學正持身清苦教士有方逆瑾聞其名召之琦托疾不應後瑾誅諸應聘者坐纍琦不與焉人服其先見馬志劉價中部人性甘淡泊恬素自守卜隱東莊引水灌竹著書自娛縣令胡熹三造其廬閉戶不納尋逃入西山年至八十卒賈志王生逸其名咸寧雍端惠公泰幼與生同學泰既貴過家往訪之時生已棄學業農矣遇諸塗謂曰雍泰猶念貧賤之交乎如不棄豫當約期過汝泰敬諾至期肅冠帶以俟生布衣􅧑毶背隻雞持瓢酒而至據席正坐泰以兄事之酌飲必跪生受之亦不辭續文獻通考孟彥施綸倪玳俱咸寧人同舉正德八年鄉試時劉瑾以秦人橫作威福彥等皆一上春宫不復再試隱居讀書以終其身賈志高延俊米脂人賦性高邁博學能文以明經選沔縣訓導力辭不赴卜居圁東山谷四圍種鞠讀書彈琴著述甚富米脂志王維藩鄠人神姿清異家苦貧無書從人借讀後竟淹貫嘉靖甲子舉於鄉或勉以就職藩曰入官以行道也其次為祿養親今道既未成而親又不吾待五斗祿將焉用之聞者歎服教授里中為子弟講孝弟之學遇人急難必竭力赴之曰吾非好名實惡夫世之以死生貴賤二其心者後以壽終賈志黃如籥咸寧人高才能文章善聲律隱於終南山自謂太乙逸叟又同里趙時中事父母至孝世味淡泊結廬種竹自號翠微生賈志孫太初年十八入終南山繼入太白山嚼草木居息石崖下時有所得走山最高峰持古松根扣巨竒石以歌慎蒙山棲志太白山人莫知其所自來人問其姓名曰我姓孫一元名問其字曰我字太初問何以稱太白山人曰我秦人也嘗棲太白山之巔於是稱太白山人山人善詩有超逸才嘗出秦四遊南走吳越吳會人爭禮敬山人山人固善説清虛又渥顔飄鬚望之如神仙中人於是愈禮敬山人一日病且革屬其友曰死葬我佳山幸題墓曰明詩人孫一元之墓已而山人蘇起而憤曰幾負我志而吳越人以是覘知山人初無羽化術稍稍疑避而山人顧益説世務用世之士益喜之舉人施侃者雅喜山人而病其放説之居山人然之買田苕溪之傍又説之婚則婚侃妻妹張氏是時建業劉麟霓與吳充陸昆暨山人結社遊號苕溪五隱山人始講吾儒性命之學無何病卒年三十七李夢陽太白山人傳王汝霖字九谷華陰人性孝友博學有文名避迹華陰山之麓以詩賦自娛嘉靖登極詔求隱逸有司纍薦不起台府高其節贈匾旌廬著有松隱漫稿草木靈異録賈志馬天章字季襄三原人少從學於溫恭毅立志端亮孝事孀母善詩賦尤工篆𨽻栖遲衡門不求聞達人謂煙姿霞韻既有田遊巖復有馬季襄實先後輝映云三原志梁文映三原人明經溫恭毅居總憲欲薦於朝文映固辭酣歌退隱人高其節三原志董旭兆長安人讀書彈琴淡於世味草書得二王遺意以布衣終賈志王之翰字宗卿華陰人少司馬之良之兄也之良官南贛巡撫治績卓然之翰獨淡於榮利教授生徒有貧者輒資給之笑傲林泉不治生産時人擬之韋敬遠云子𢎞睿戊午舉人不樂仕進築潄園華麓優遊其間以詩文自娛賈志劉鉦冦永清俱中部人鉦萬厯戊午舉人官保定通判永清天啓辛酉恩選官汾州同知皆以清介耿直不能俯仰隨時挂冠歸里鉦卜居於暖泉谷永清隱於邑東龍灣之陽布衣糲飯彈琴著書以自娛足迹不入城市人並美之鉦子世諫舉明經亦高節不仕賈志張礦張鑣中部人俱舉明經礦任武邑縣知縣不樂為吏即解印歸屏迹自晦終身不出鑣授通判不就官卜居北原貧窘蔬食毫無慍色時稱為兩逸士賈志楊清張暨辰俱宜君人清以恩選赴廷對時魏璫方煽清拂袖西歸隱身不出植花種竹飄飄然有遺世之思暨辰嘗從馮少墟講學見朝政日紊乃杜門晦迹嵗當舉明經不應布袍蔬食窮約終身賈志惠及岐清澗人閉戶讀書不計功名或手持一卷笑傲山水間自謂羲皇上人尤喜施豫弗事産業及貢期不就廷對林泉自適隱居終身清澗志師功凱字雲菴清澗人天性孝友有隱志不求聞達少慕黃老之術居華山以醫活人弗責報夢帝錫以佳嗣果生子遂謝絶人世遍遊名山不返清澗志張曰炳字晦叔同州人知府守訓季子性醇篤好學凡圖緯書數至稗官醫卜靡不綜獵恬於勢利不就有司試或諷之傲然不屑與馬林友善日夕揚扢古文辭郡中風雅一振為文典古華贍卓有矩矱著張晦叔詩集八卷武成考一卷同州志費甲鑄字子范咸寧人為人曠逸不羈植竹築圃以丘壑自怡賔客往來接談忘倦獨不喜談世務事兄甲鏸尤盡禮好吟詠工書畫所著有西湖草行於世賈志于養麟興平嵗貢李景貞洋縣進士闖逆陷長安皆棄家遠遁賈志晉國柱字擎衡長安人少受講於馮恭定以闖變高隱卒之日門人諡曰貞孝先生時同時高隱身不仕者郃陽訓導黨國柱扶風人代州知州黨珫城固人華陰王𢎞學潼關楊賔楊嘗有辭貢文當事者高其義讓賈志魏淵淵字空空隱居華嶽性朴誠恬靜甘淡泊絶口不言世務足不出山者三十餘年後其子以淵淵老三至嶽頂欲迎還就養淵淵決志不歸其子泣請移綿山乃許之終不至家後無疾而卒賈志劉綖中部人力行篤學苦志清修舉明經不仕家貧自甘不受餽遺為廬於沮水之旁教受生徒學者稱為滸西先生中部志流寓周太師疵少師疆武王東觀兵歸居二年太師疵少師疆抱其樂器而奔周史記周本紀寧戚衛人居約時客遊於秦郿有遺迹賈志郿東南有村曰寧曲土厚泉深有流水繞於門庭之間僉曰此齊相寧戚所導水也故宅遺址猶有存者金高褒食水碑記按寧戚飯牛歌全是倦遊歸來語意則流寓秦邦亦當日應有之事今郿縣以堡名寧曲非無自也至縣志云寧戚有相牛經一卷傳之百里奚後奚得此以要秦穆公則近於荒誕矣夷吾晉侯使賈華伐屈夷吾不能守盟而行將奔狄郤芮曰不如之梁梁近秦而幸焉乃之梁左傳晉太子圉為質於秦秦妻之子圉將逃歸謂嬴氏曰與子歸乎對曰子晉太子而辱於秦子之欲歸不亦宜乎寡君之使婢子侍執巾櫛以固子也從子而歸棄君命也不敢從亦不敢言遂逃歸左傳晉公子重耳之及於難也晉人伐諸蒲城蒲城人欲戰重耳不可曰保君父之命而享其生祿於是乎得人有人而校罪莫大焉吾其奔也遂奔狄從者狐偃趙衰顛頡魏武子司空季子狄人伐牆咎如獲其二女叔隗季隗納諸公子公子取季隗生伯倏叔劉以叔隗妻趙衰生盾處狄十二年而行及楚楚子乃送諸秦秦伯納女五人懷嬴與焉奉匜沃盥既而揮之怒曰秦晉匹也何以卑我公子懼降服而囚他日公享之子犯曰吾不如衰之文也請使衰從公子賦河水公賦六月趙衰曰重耳拜賜公子降拜稽首公降一級而辭焉衰曰君稱所以佐天子者命重耳重耳敢不拜左傳記按重耳從亡五人史有先軫無顛頡由余戎王使由余於秦由余其先晉人也亡入戎聞繆公賢故使由余觀秦繆公問內使廖曰鄰國有聖人敵國之憂也由余賢奈何廖曰君為由余請以疏其間留而莫遣以失其期戎王怪之必疑由余君臣有間乃可虜也繆公因與由余曲席而坐傳器而食問其地形與其兵勢終年乃歸由余史記秦本紀晉先蔑奔秦春秋晉襄公卒靈公少晉人以難故欲立長君晉人使先蔑士會如秦逆公子雍秦康公送公子雍於晉多與之徒衛穆嬴日抱太子以啼於朝宣子與諸大夫皆患穆嬴且畏逼乃背先蔑而立靈公敗秦師於令狐先蔑奔秦士會從之先蔑之使也荀林父止之弗聽及亡荀伯盡送其帑及其器用財賄於秦曰為同寮故也士會在秦三年不見士伯其人曰能亡人於國不能見於此焉用之士季曰吾與之同罪非義之也將何見焉及歸遂不見晉人患秦之用士會也使魏壽餘偽以魏叛者以誘士會執其帑於晉使夜逸請自歸於秦秦伯許之履士會之足於朝秦伯師於河西魏人在東壽餘曰請東人之能與夫二三有司言者吾與之先使士會士會辭曰晉人虎狼也若背其言臣死妻子為戮無益於君不可悔也秦伯曰若背其言所不歸爾帑者有如河乃行繞朝贈之以䇿曰子無謂秦無人吾謀適不用也既濟魏人譟而還秦人歸其帑其處者為劉氏左傳四飯缺適秦播鼗武入於漢論語中按朱注云漢漢中此漢在興漢之間即禹貢嶓冢導漾東流為漢處也春秋之末地應屬楚然武避地而去萍蹤無定云入漢者亦猶詩咏伊人在水一方之意未知其稅駕何所安知不為褒沔之遊故與入秦之缺並載之卜商字子夏衛人少孔子四十四歲孔子既沒子夏居西河教授為魏文侯師史記仲尼弟子本傳所居石室在飛浮山當河之中隨水消長為高下賈志扁鵲勃海郡鄭人也姓秦氏名越人視病盡見五藏癥結名聞天下來入咸陽聞秦人愛小兒即為小兒醫隨俗為變秦太醫令李醯自知伎不如扁鵲使人刺殺之至今天下言脈者由扁鵲也史記本傳蘇秦者東周洛陽人也西至秦秦孝公卒惠王方誅商鞅疾辨士弗用史記本傳蘇秦説秦王書十上而説不行黑貂之裘敝黃金百鎰盡資用乏絶去秦而歸戰國䇿太子完頃襄王使太子完入質於秦秦留之數年王病太子不得歸史記春申君傳楚王子質於秦不得歸作思歸歌曰去千乘之家國作咸陽之布衣怨録燕太子丹者故嘗質於趙而秦王政生於趙其少時與丹歡及政立為秦王而丹質於秦秦王遇燕太子丹不善故丹怨而亡歸史記刺客傳燕太子丹質於秦秦遇之無禮不得意欲歸秦王不聽謬言曰令烏頭白馬生角乃可丹仰天歎烏即白頭馬為生角秦王不得已而遣之册府元龜漢陸賈楚人以客從高祖定天下有口辨常使諸侯孝惠帝時吕太后用事陸生自度不能爭乃病免以好畤田地善可家焉有五男乃出所使越得槖中裝賣千金分其子子二百金令為生産陸生常安車駟馬從歌舞鼓琴瑟侍者十人寶劍直百金謂其子曰與汝約過汝汝給吾人馬酒食極飲十日而更所死家得寶劍車騎侍從者一歲中往來過他客率不過再三過數見不鮮無久慁公為也竟以壽終史記本傳司馬季主楚人卜於長安東市宋忠賈誼同輿之市遊卜肆中司馬季主間坐弟子三四人侍方辨天地之道日月之運陰陽吉凶之本二大夫再拜謁司馬季主使弟子延之坐坐定司馬季主復理前語數千言宋忠賈誼瞿然而悟獵纓正襟危坐曰先生何行之汚司馬季主曰騏驥不與罷驢為駟鳯凰不與燕雀為羣賢者亦不與不肖者同列公等喁喁何知長者之道乎於是再拜而辭史記日者列傳灌夫字仲孺潁陰人為中郎將數月坐法去後家居長安長安中諸公莫弗稱之史記灌夫列傳李廣者隴西成紀人為將軍下吏當斬贖為庶人家居數嵗廣家與故潁陰侯孫屏野居藍田南山中射獵嘗夜從一騎出從人田間飲還至霸陵亭霸陵尉醉呵止廣廣騎曰故李將軍尉曰今將軍尚不得夜行何乃故也止廣宿亭下史記本傳司馬相如者蜀郡人也字長卿口吃而善著書常有消渴疾與卓氏婚饒於財其進仕宦未嘗肯與公卿國家之事稱病間居不慕官爵既病免家居茂陵天子曰相如病甚可往從悉取其書若不然後失之矣使所忠往而相如已死史記本傳相如將聘茂陵人女為妾卓文君作白頭吟以自絶相如乃止西京雜記朱買臣字翁子吳人家貧隨上計吏為卒將重車至長安詣闕上書書久不報待詔公車糧用乏上計吏卒更乞丐之邑子嚴助貴幸薦買臣拜中大夫坐事免久之召待詔拜會稽太守初買臣免待詔常從會稽守邸者寄居飯食拜為太守買臣衣故衣懷其印綬步歸郡邸直上計時會稽吏方相與羣飲買臣入室中守邸與共食食且飽有頃長安廄吏乘駟馬車來迎買臣遂乘傳去漢書本傳任安滎陽人少孤貧困為人將車之長安留求事為小吏未有因因占著名數家於武功武功扶風西界小邑也谷口蜀剗道近山安以為武功小邑無豪易高也安留代人為求盜亭父後為亭長邑中人出獵安為分麋鹿雉兔部署老小當壯劇易處衆人皆喜曰任少卿分别平有智略明日復合會會者數百人任少卿曰某子甲何為不來乎諸人皆怪其見之疾也後乃為衛將軍舍人史記田叔傳王吉字子陽琅邪臯虞人少時學問居長安東家有大棗樹垂吉庭中吉婦取棗以啖吉吉後知之乃去婦東家聞而欲伐其樹鄰里共止之因固請吉令還婦里人為之語曰東家有樹王陽婦去東家棗完去婦復還其厲志如此漢書本傳樓護字君卿齊人父世醫也護少隨父為醫長安出入貴戚家護誦醫經本草方術數十萬言長者咸愛重之共謂曰以君卿之材何不宦學乎繇是辭其父學經傳為京兆吏數年甚得名譽護為人短小精辨議論常依名節聽之者皆竦與谷永俱為五侯上客母死送葬者致車二三千兩閭里歌之曰五侯治喪樓君卿舉方正為諫大夫擢天水太守復為廣漢太守漢書本傳蔡順字君仲汝南人少孤事母至孝王莽末中原大亂順奉母西入關遁居華西廣鄉原即今渭南東原也會歲飢順採桑椹供養赤眉賊向關中順遭之賊衆見其桑椹黑赤異器問故順曰黑者供母赤者自食賊驚曰孝子也乃遺米三斗牛一蹄禮之使歸食母西安府志承宫字少子琅邪姑幕人少孤勤學不倦遭天下喪亂遂將諸生避地漢中後漢書本傳孔季彥魯人父臨晉令禧卒於官遂留華陰有答張太常備德君子及楊太尉震大儒之問西安府志蔡雍字伯喈陳留人初雍與司徒劉郃素不相平叔父衛尉質又與將作大匠楊球有隙球即中常侍程璜女夫也璜使人飛章言雍質數以私事請託於郃郃不聽於是詔下雍質於洛陽獄劾棄市事奏中常侍吕強愍雍無罪請之帝有詔減死一等與家屬髠鉗徙朔方楊球使客追路刺雍客感其義皆莫為用又賂其部主使加毒害所賂者反以其情戒雍故每得免居五原安陽縣雍前在東觀與盧植韓説等撰補後漢記因上書自陳奏其所著十意帝嘉其才高會明年大赦乃宥雍還本郡雍自徙及歸凡九月焉後漢書本傳丁蘭河內人寓居平陵後人名其居地曰孝子門馬志李堅曹植鼙舞詩序云漢靈帝鼓吹有李堅者能鼙舞遭世荒亂播越關西隨將軍段煨先帝聞其舊伎下書召堅堅年踰七十云晉書樂志王粲字仲宣山陽高平人曾祖襲祖暢皆為漢三公獻帝西遷粲徙長安左中郎將蔡雍見而竒之時雍才學顯著貴重朝廷常車騎填巷賔客盈坐聞粲在門倒屣迎之粲年即幼弱容狀短小一坐盡驚雍曰此王公孫有異才吾不如也吾家書籍文章盡當與之年十七司徒辟詔除黃門侍郎以西京擾亂皆不就三國魏志本傳青牛先生初平中山東人有青牛先生字正方客三輔曉知星厯風角鳥情常食青葙芫華年似五六十者人或親識之謂已百餘歲矣建安十六年三輔亂南入漢中漢中壞入蜀三國志管志傳注寒貧者本姓石字德林安定人建安初客三輔是時長安有宿儒欒文博者門徒數千德林亦就學始精詩書後好內事於衆輩中最玄默十六年關中亂南入漢中不治産業不畜妻孥嘗讀老子五千文及諸內書晝夜吟咏二十五年漢中破隨衆還長安遂癡愚不復識人食不求味冬夏衣敝布衣體如無所勝目如無所見獨居窮巷小屋無親里人與之衣食不肯取郡縣以其鰥窮給廩日五升食不足頗行乞乞不取多人問其姓字不肯言因號之曰寒貧或素有與相知者往存恤之輒拜跪由是人謂其不癡魏略晉周虓字孟威少有節操歷梓潼太守寧康初符堅將楊安冦梓潼虓遣送母妻為堅將邀而護之虓遂降於安堅欲以為尚書郎虓曰蒙國厚恩以至今日老母見獲失節於此母子獲全秦之惠也雖公侯之貴不以為榮况郎任乎堅乃止太元三年虓潛至漢中堅追得之後徙於太原晉書本傳北魏賀狄干代人登國初道武遣狄干致馬千匹結婚於姚萇會萇死興立止狄干而絶婚干在長安因習讀書史通論語尚書諸經舉止風流有似儒者北史本傳寇讚字奉國上谷人因難徙居馮翊萬年姚泓滅秦雍人千有餘家推讚為主歸順拜魏郡太守魏書本傳胡叟字倫許安定臨涇人少聰慧好屬文以姚氏將衰遂入長安觀風化隱匿名行懼人見知時京兆韋祖思少閲典墳多蔑時彥待叟不足叟拂衣而出祖固留之遂歸主人賦韋杜二族一宿而成時年十八人皆竒其才畏其筆叟孤飄坎壈未有仕路遂入漢中刺史馮翊吉翰頗相禮接授末佐不稱懷未幾入蜀北史本傳遊明根字志遠雅從祖弟廣平任人幼年遭亂為櫟陽王氏奴主使牧羊明根以壺漿倩人書字路邊書地學之長安鎮將竇瑾見之呼問知其姓名乃告雅雅贖之北史遊雅傳馮熙信都人生於長安為姚氐魏母所養以叔父樂陵公邈因戰入蠕蠕魏母攜熙逃避至氐羌中撫育年十二好弓馬有勇幹氐羌皆歸附之魏母見其如此將還長安始就學問從師受孝經論語好陰陽兵法及長遊華陰河東二郡間性泛愛不拘小節人無士庶來則納之後至侍中太師魏書外戚傳李預字元凱太和初歷馮翊太守解郡遂居長安羡古人飱玉法乃採訪藍田躬往攻掘得若環璧雜器形者大小百餘頗有粗黑者亦篋盛以還至而觀之皆光潤可玩乃椎七十枚為屑食之經年云有效驗而世事寢食皆不節又好酒損志及病篤謂妻子曰吾尸體必當有異勿速殯令後人知飱服之妙時七月中旬長安毒熱預停尸四宿而體色不變妻常氏以玉珠二枚唅之因噓其口都無穢氣舉斂於棺堅直不傾北史李先傳薛拔辨孫汾陰人尚文成女西河長公主拔弟子驎駒舉秀才除中書博士始拔尚主有賜田在馮翊驎駒徙居之遂家於馮翊之夏陽北史本傳李昶頓丘臨黃人父遊有才行屬亂奔江左昶於太祖世已當樞要及晉公護執政委任如舊昶以父在江南身寓關右自少及終不飲酒聽樂時論以此稱焉周書本傳檀翥字鳯翔高平人好讀書善屬文能鼓瑟司州牧城陽王元徽以翥為從事非其好也尋謝病客遊三輔周書李昶傳蕭大圜梁簡文帝子也大寶元年封樂梁郡王元帝改封晉熙郡王于謹軍至元帝令大圜兄大封充使請和大圜副焉其實質也出至軍所信宿元帝降魏恭帝二年客長安太祖以客禮待之并賜田宅奴婢牛馬粟帛等俄而開麟趾殿招集學士大圜預焉周書本傳王褒字子淵琅琊臨沂人有重名於江左大軍征江陵元帝出降褒出見柱國于謹謹甚禮之褒曽作燕歌行妙盡關塞寒苦之狀元帝及諸文士並和之競為凄切之詞至此方驗褒與王克劉玨宗懍等數十人俱至長安太祖喜曰昔平吳之利二陸而已今羣賢畢至可謂過之又謂褒及王克曰吾王氏甥也卿等並吾之舅氏當以親戚為情弗以去鄉介意於是授褒克等車騎大將軍儀同三司資餼甚厚褒等亦並荷恩眄忘其羈旅初褒與梁處士汝南周𢎞讓相善及𢎞讓兄𢎞正自陳來聘高祖許褒等通親知音問褒贈𢎞讓詩并致書周書本傳庾信字子山南陽新野人梁元帝即位加散騎常侍來聘於我屬大軍南討遂留長安江陵平陳氏與朝廷通好南北流寓之士各許還其舊國陳氏請信等十數人高祖惟放王克殷不害等信及褒並留不遣世宗高祖雅好文學特蒙恩禮信雖位望通顯常有鄉關之思乃作哀江南賦以致其意周書本傳殷不害字長卿陳郡長平人江陵陷與王褒庾信俱入長安自是蔬食布衣枯稿骨立見者哀之大建七年自周還朝其還也周留其長子僧首因居關中禎明三年京城陷僧首來迎不害道病卒陳書本傳姚察吳興武康人父上開府僧垣知名察於大建初除散騎侍郎左通直報聘於周初梁季淪沒僧垣入於長安至是得與僧垣相見將别之際絶而復蘇見者莫不欷歔陳書姚察傳徐文遠偃師人父徹梁祕書郎尚元帝女安昌公主而生文遠屬江陵陷被虜於長安安貧無以自給其兄休鬻書為業文遠日閲書於肆博覽五經尤精春秋左氏傳舊唐書儒學傳劉行本沛人起家武陵國常侍遇蕭修以梁州北附遂與叔父璠同歸於周寓居京兆之新豐每以諷讀為事隋書本傳隋蕭允字叔佐蘭陵人後主拜光祿大夫及隋師濟江遷於關右是時朝士至長安者例並授官惟允與尚書僕射謝胄辭以老疾隋文帝義之並厚賜錢帛尋以疾卒於長安陳書本傳孔紹安越州山陰人少與兄紹新俱以文詞知名陳亡入隋徙居京兆鄠縣閉門讀書誦古文集數十萬言外兄虞世南歎異之紹新嘗謂世南曰本朝淪陷分從湮滅但見此弟竊謂家族不亡矣舊唐書文苑傳唐盧照鄰范陽人拜新都尉因疾去官處太白山中以服餌為事舊唐書文苑傳照鄰始去新都寓於京城鄱陽公主之廢府時詔徵太白山隱士孫思邈亦居此府思邈時年九十餘視聽不衰照鄰自傷年才強仕而沈疾困憊乃作病梨樹賦册府元龜員半千字榮期齊州人纍封平原郡公樂山水自放開元九年遊堯山沮水間愛其地遂定居卒年九十四即葬焉唐書本傳王維字摩詰太原祁人得宋之問藍田别墅在輞口輞水周於舍下與道友裴迪浮舟往來彈琴賦詩嘯詠終日嘗聚其田園所為詩號輞川集舊唐書本傳維母亡表輞川第為寺唐書本傳摩詰少以詞學知名有高致信佛理藍田南置别業以水木琴書自娛善畫山水人物嘗於清源寺壁畫輞川圖巖岫盤鬱雲水飛動圖畫見聞志是圖蓋維平生得意畫也豫觀唐史暨維集所謂竹館桞浪等皆可考江山雄勝草木潤秀使人徘徊撫卷而忘倦浩然有結廬終焉之想而不知秦之非吾土也物之移人觀者如是劉因輞川圖記杜甫字子美其先自襄陽徙河南甫舉進士不第困長安會祿山亂天子入蜀甫避走三川肅宗立自鄜州羸服欲奔行在為賊所得至德三載亡走鳯翔謁上拜右拾遺時所在冦奪甫家寓鄜彌年囏窶孺弱至餓死因許甫自往省視從還京師出為華州司功參軍關輔飢輒棄官去唐書杜甫傳牛僧孺八代祖𢎞相隋封竒章郡公贈文安侯長安南下杜樊鄉東文安有隋氏賜田數頃書千卷尚存公年十五依以為學數年業就杜樊川集張詢南海人不第後流寓長安以畫自適圖繪寶鑑張䇿字少逸河西燉煌人少好浮圖之説乃落髮為僧居長安慈恩寺黃巢犯長安䇿乃返初服奉父母以避亂邠州王行瑜辟觀察支使晉王李克用攻行瑜策與婢肩輿其母東歸五代史本傳宋吕蕡汲郡人為比部郎中後知巴西縣致仕因葬京兆藍田遂家焉河南通志邵雍洛陽人嘗占籍商洛結廬天柱山商守給天柱山戶帖與之唱和又寓居鳯州嘗登郡樓賦詩而去馬志堯夫遊商愛南秦川風土卜居八年與州守宋郎中友善時以詩酒酬答一日州守延賞牡丹時章惇為商洛令議論縱橫堯夫言見蓓蕾而知花之高下者知花之次也見根蘖而知花之高下者知花之上也因陳天人理數之學章愧服商州志吕希純河南人紹聖初以屯田員外郎分司南京後居金州杜門讀書不以夷險縈心馮志金李懋不知何許人有異術正大間遊京兆行省完顔哈達愛其術金史本傳李汾字長源平晉人系出雁門避亂入關京兆尹子容愛其才招致門下留二年去之涇州謁張公信甫一見即以上客禮之自是遊道日廣關中無一人敢與相軒輊者長源以詩為專門之學其所得如三輔樓臺失歸燕上林花木怨啼鵑等句同輩作七言詩者皆不及也有關中往來詩十數首道其流離世故妻子凋喪道塗萬里奔走狼狽之意雖詞旨危苦而耿耿自信者故在中州集元毛沖蜀人原任普潤縣尹後謝政隱於岐山周公廟談詩論禮不求聞達鄰邑諸向道者多與之遊居數十年還籍岐山志明常存字惟德開平王遇春從子纍功授親軍侍衛指揮洪武初從遇春入關以久在兵間思脫塵網遂謝去寓居蒲城之白堂山賢相鄉西安府志羅性字子理泰和人洪武初中鄉貢進士授德安府同知坐擅用棗木染軍衣為陳寧所劾謫戍西安行槖枵虛怡然就役既至達官貴人咸加敬禮諸生從學甚衆是時四方老師碩儒在西安者數十人吳中鄒奕獨曰合吾輩所讀書庶幾羅先生之半名山藏晉漢臣洪洞人愍王時為紀善慕終南之勝遂卜居江村後升審理卒於王事葬村西賈志石無用字琴月南安人善詩尤工書往來江漢蒲團杖笠片雲孤鶴寓洋之酆都山五雲宫洋縣志俞安期字羡長吳江人寓居京兆詩名重海內著有翏翏閣集雍勝略并纂唐類函諸書賈志祝世喬字子遷江西金溪人方襁褓時父神谷遠遊久未歸世喬年十五獨行尋父歷楚及秦數瀕危殆先是楚有楊某者德神谷療其疾思報之及見世喬亟欲妻以女世喬辭去之西秦西秦山高地寒值嚴冬皸瘃無完膚自分必死久之乃遇父於鞏昌西和道中父子相抱而泣觀者咸為酸感奉父至高陵始卜室焉世喬雖窮途孤旅讀書不輟後以選貢授南康通判佐郡有聲移家𨽻籍咸寧馮少墟集方伎周偃師西域人周穆王西巡將還未及中國有獻工人名偃師王問曰何能偃師曰臣惟命所試然臣已有所造願王先觀之王曰日與俱來吾與若俱觀之翼日偃師謁見王王曰若與偕來者何人耶對曰臣所造能倡者王驚視之趣步俯仰信人也巧夫領其頥則歌合律捧其手則舞應節千變萬化惟意所適王以為實人也與盛姬內御並觀之技將終倡者瞬其目而招王之左右侍妾王大怒立欲誅偃師偃師大懾立剖散倡者以示王皆傅會革木膠漆白黑丹青之所為王諦料之內則肝膽心肺脾腎腸胃外則筋骨支節皮毛齒髮皆假物也合會復如初王試廢其心則口不能言廢其肝則目不能視廢其腎則足不能步王始悅而歎曰人之巧乃可與造化同功乎詔二車載之以歸列子偃師縛草作人能為之走文苑彚􅖿按方伎非秦産者不録但偃師來自遐方入貢之後供奉周京終老於此直省各志既無從收録入之流寓生平術藝又湮沒不彰故特與土著並列於篇自周秦以迄隋唐遠人以方伎傳者凡得五人云商南本黃帝之昆孫以地得姓周初封子男於商精數學周髀衍其説為算經國語曰司商賈志卜徒父秦太卜僖公十五年秦伯代晉卜徒父筮之吉涉河侯車敗詰之對曰大吉三敗必獲晉君其卦遇蠱曰千乘三去三去之餘獲其雄狐夫狐蠱必其君也蠱之貞風也其悔山也歲云秋矣我落其實而取其材所以克也實落材亡不敗何待三敗及韓戰於韓原秦獲晉侯以歸左傳卜招父梁太卜惠公之在梁也梁伯妻之梁嬴孕過期卜招父與其子卜之其子曰將生一男一女男為人臣女為人妾故名男曰圉女曰妾及子圉西質妾為宦女焉左傳伯樂善相馬秦穆公謂曰子之年長矣子姓有可使求馬者乎對曰臣之子皆下材也臣有所與九方臯此其於馬非臣之下也穆公見之使行求馬三月而反報曰已得之矣在沙丘穆公曰何馬對曰牝而黃使人往取之牡而驪穆公不悅謂伯樂曰敗矣子所使求馬者物色牝牡尚弗能知又何馬之能知也伯樂曰若臯之所觀天機也得其精而忘其粗若臯之相馬乃有貴乎馬者也馬至果天下之良馬也列子醫緩秦人成公十年晉侯疾病求醫于秦秦伯使醫緩為之未至公夢疾為二豎子曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之下若我何醫至曰疾不可為也在肓之上膏之下攻之不可達之不及藥不至焉不可為也公曰良醫也厚為之禮而歸之左傳醫和秦人昭公元年晉侯求醫於秦秦伯使醫和視之曰疾不可為也是謂近女室疾如蠱非鬼非食疾心喪志良臣將死天命不祐公曰女不可近乎對曰節之天有六氣降生五味發為五色徵為五聲淫生六疾六氣曰陰陽風雨晦明也分為四時序為五節過則為災陰淫寒疾陽淫熱疾風淫末疾雨淫腹疾晦淫惑疾明淫心疾女陽物而晦時淫則生內熱惑蠱之疾今君不節不時能無及此乎趙孟曰誰當良臣對曰主是謂矣主相晉國於今八年晉國無亂諸侯無闕可謂良矣和聞之國之大臣榮其寵祿任其大節有災祻興而無改焉必受其咎今君至於淫以生疾將不能圖恤社稷祻孰大焉主不能禦吾是以云也趙孟曰何謂蠱對曰淫溺惑亂之所生也於文皿蟲為蠱穀之飛亦為蠱在周易女惑男風落山謂之蠱皆同物也趙孟曰良醫也厚其禮而歸之左傳醫者秦之良醫也為宣王割痤為惠王治痔皆愈張子之背腫請治之曰背非吾背也任子治焉遂愈尸子秦裂裔始皇元年騫霄國獻刻玉善畫工名夷使含丹青以潄地即成魑魅及詭怪羣物之象刻玉為百獸之形毛髮宛若真銘其臆前記以日月工人以指畫地長百丈直如繩墨方寸之內畫四瀆五嶽列國之圖又畫為龍鳯騫翥若飛皆不點睛或點之必飛走始皇嗟曰刻畫之形何得飛走使以淳漆各點兩玉虎一眼睛旬日失之不知所在明年西方獻兩白虎各無一目始皇發檻視之疑是先所失者乃刺殺之檢其胸前果元年所刻玉虎也拾遺記作按歷代名畫記裂夷漢周仁其先任城人以醫見景帝為太子時為舍人積功遷至大中大夫景帝初立拜仁為郎中仁為人陰重不泄常衣弊補衣溺袴故不為潔清以是得幸入卧內於後宫祕戲仁常在旁上時問人仁曰上自察之然亦無所毁景帝再自幸其家家陽陵上所賜甚多然終常讓不敢受也諸侯羣臣賂遺終無所受武帝立為先帝臣重之仁乃病免以二千石祿歸老於家子孫咸至大官漢書本傳棓生安陵卜者袁盎家居多怪乃之棓生所問占漢書袁盎傳按袁盎家安陵棓生秦時賢士善術者也袁盎傳注許博昌安陵人善陸博竇嬰好之常與居處其術曰方畔揭道張張畔揭道方張究屈元高高元屈究張三輔兒童皆誦之法用六箸以竹為之長六分或用二箸博昌又作大博經一篇西京雜記蓋元西域人武帝平西域得胡人善蹴踘者蓋元便捷跳躍帝好而為之羣臣不能諫彈碁經序徐禹長安人武帝元封七年厯紀廢壞乃造漢太初厯元鳯三年太史令張壽王言黃帝調厯漢元年以來用之今陰陽不調更厯之過詔課諸厯疏密長安徐禹治太初厯第一壽王治黃帝調厯皆疏濶又言黃帝至元鳯三年六千餘歲長安單安國安陵杯育治終始言黃帝以來三千六百二十九嵗不與壽王合故厯本之驗自漢厯初起盡元鳯六年三十六歲而是非堅定漢書律厯志古掾曹京兆人學從橫揣摩弄矢搖丸樗蒲之術為都掾史四十餘年善訑謾二千石隨以諧謔皆握其權要而得其歡心趙廣漢為京兆尹黜之終於家京師排戲皆稱古掾曹西京雜記毛延壽杜陵人陳敞平陵人劉白新豐人陽望下杜人樊育長安人並永光建昭中畫手時元帝後宫既多使圖其狀每披圖召見諸宫人競賂畫工錢帛獨王嬙貌麗意不茍求工人遂為醜狀及胸奴求漢美女上按圖召昭君行帝見昭君貌甚悔之而籍已定乃窮其事畫工皆棄市籍其家資皆巨萬毛延壽畫人老少美惡皆得其正陳敞劉白並工牛馬飛鳥衆勢但人物不及延壽陽望樊育亦善畫尤善布色厯代名畫記陽按本傳畫手共六人其一乃洛龔寬也以非秦産故不載丁緩長安巧工常為滿燈七龍五鳯雜以芙蓉蓮藕之竒又作卧褥香爐一名被中香爐本出房風其法後絶至緩始更為之為機環轉運四周而爐體常平可置之被褥故以為名又嘗作九層博山香爐鏤為竒禽怪獸窮諸靈異皆自然運動又作七輪扇連七輪大皆徑丈相連續一人運之滿堂寒顫西京雜記杜夫子杜陵人善奕棋為天下第一人或譏其費日夫子曰精其理者足以大禆聖教西京雜記蒒翁者長安善相馬者也於邊郡求得駿馬騎以入市去來人不見也後勞問之因請觀焉翁曰諸卿無目不足示也桓談新論山子道馮翊人博物志曰漢世馮翊山子道王九真郭凱等善圍棋三國志魏武帝本紀注魏馬鈞扶風人巧思絶世傅玄序之曰馬先生天下之名巧也為博士居貧舊綾機五十綜者五十躡六十綜者六十躡先生患其喪功費日乃皆易以十二躡為給事中與常侍高堂隆驍騎將軍秦朗言及指南車明帝詔先生作之都內有地可為園患無水以灌之乃作翻車令童兒轉之灌水自覆更入更出其巧百倍於常其後人有上百戲者能設而不能動帝問可動否曰可動其巧可益否曰可益受詔作之以大木雕構使其形若輪平地施之潛以水發設為女樂舞象至令木人擊鼓吹簫作山嶽使木人跳丸擲劒緣絙倒立出入自在百官行署舂磨鬭雞變巧百端見諸葛亮連弩曰巧矣未盡善也作之可令加五倍又患發石車敵人之於樓邊懸濕牛皮中之則墮石不能連屬而至欲作一輪縣大石數十以機鼓輪為常則以斷懸石飛擊敵賊使首尾電至嘗試以車輪懸瓴甓數十飛數百步先生之巧雖古公輸般墨翟王爾近漢世張平子不能過也魏志杜夔傳注晉王雕新平人初苻堅即偽位雕陳説圖讖堅大悅以雕為太史令嘗言於堅曰謹按讖云古月之末亂中州洪水大起健西流惟有雄子定八州此即三祖陛下之聖諱也又曰當有草付臣又土滅東燕破白虜氐在中華在表案圖讖之文陛下當滅燕平六州願徙汧隴諸氐於京師三秦大戶置之於邊地以應圖讖之言堅訪之王猛猛以雕為左道惑衆勸堅誅之雕臨刑上疏曰臣以趙建武四年從京兆劉湛學明於圖記謂臣曰新平地古顓頊之墟里名曰雞閭記云此里應出帝王寶器其名延壽寶鼎顓頊有云河上先生為我隱之於咸陽西北吾之孫有草付臣又土應之湛又云吾嘗齋於室中夜有流星大如半月落於此地斯蓋是乎願陛下志之平七州之後出於壬午之年至是新平人得之以獻器銘篆書文題之法一為天王二為王后三為三公四為諸侯五為伯子男六為卿大夫七為元士自此以下考載文記列帝王名臣自天子王后內外次序上應天文象紫宫布列依玉牒版辭不違帝王之數從上元人皇起至中元窮於下元天地一變盡三元而止堅以雕言有徵特贈光祿大夫晉書符堅載記北魏周淡鄠人多方術尤善醫藥為太醫令太宗嘗苦風頭眩淡治得愈由此見寵位至特進賜爵成德侯魏書本傳趙胡京兆人宣武靈皇后胡氏司徒國珍女也産之日赤光四照京兆山北縣有趙胡者善卜相國珍問之胡云賢女有大貴之表方為天地母生天地主勿過三人知也魏書皇后傳王伯達扶風人盧淵年四十嘗詣長安將還諸相餞送者五十餘人别於渭北有相者扶風人王伯達曰諸君皆不如此盧郎雖位不副實然德聲甚盛望踰公輔後三十餘年當制命關右願不相忘後淵果為安南將軍督關右諸軍事相者年過八十詣軍門請見言敘平生未幾拜儀曹尚書魏書本傳隋韋鼎字超盛京兆杜陵人少通脫博涉經史明陰陽逆刺尤善相術仕梁遭父憂哀毁過禮殆將滅性侯景之亂兄昂卒於京城鼎負尸出寄於中興寺求棺無所得鼎哀憤慟哭忽見江中有物流至鼎異之往見乃新棺也因以充殮元帝聞之以為精誠所感侯景平歷中書侍郎陳武帝在南徐州鼎望氣知其當王遂寄孥焉因謂曰後四歲梁其代終天之厯數當歸舜後明公天縱神武繼絶統者無乃是乎帝大喜因而定䇿及受禪拜黃門侍郎轉廷尉卿大建中為聘國主使至德初鼎盡貨田宅寓居僧寺友人問其故答曰江東王氣盡於此矣吾與爾當葬長安期運將及故耳初鼎之聘周也嘗與高祖相遇鼎謂高祖曰觀公容貌故非常人神鑒深遠亦非羣賢所逮歲一周天老夫當委質願深自愛及陳平待遇甚厚高祖命鼎還杜陵鼎考校昭穆自楚太傅孟以下二十餘世作韋氏譜七卷開皇十二年除光州刺史以仁義教導務𢎞清靜部內肅然咸稱其神隋書本傳來和字𢎞順長安人少好相術所言皆驗高祖微時詣和相和謂高祖曰公當王有四海及為丞相拜儀同既受禪進爵為子和同郡韓則嘗詣和相和謂之曰後四五當得大官人初不知所謂則至開皇十五年五月而終人問其故和曰十五年為三五加以五月為四五大官槨也和言多此類著相經四十卷隋書本傳楊伯醜馮翊人好讀易隱於華山開皇初被徵入朝見公卿不為禮無貴賤皆汝之人不能測也高祖召與語竟無所答賜之衣服至朝堂捨之而去嘗有張永樂者賣卜京師伯醜每從之遊永樂為卦有不能決者伯醜輒為分析爻象尋幽入微永樂嗟服自以為非所及也伯醜亦開肆賣卜國子祭酒何妥嘗詣之論易聞妥言倐然而笑曰何用鄭玄王弼之言乎久之微有辨答所説辭義皆異先儒之旨而思理玄妙論者以為天然獨得非常人所及也竟以壽終隋書本傳臨孝恭京兆人明天文算術高祖甚親遇之每言災祥之事未嘗不中上因令考定陰陽書官至上儀同隋書本傳宇文愷字安樂欣弟夏州人家世武將諸兄並以弓馬自達愷博覽書記解屬文多伎藝高祖踐祚詔領營新都副監高熲雖總大綱凡所規畫皆出於愷上建仁壽宫拜仁壽宫監煬帝即位遷都洛陽以愷為營東都副監尋遷將作大匠愷揣帝心宏侈於是東都制度窮極壯麗帝大悅之進位開府拜工部尚書及帝北巡欲誇戎狄愷為大帳其下坐數千人帝大悅又造觀風行殿上容侍衛者數百人離合為之下施輪軸推移倐忽有若神功帝彌悅前後賞賚不可勝紀卒諡曰康隋書本傳何稠字桂林國子祭酒妥之兄子父通善琢玉江陵平隨妥入長安開皇中纍遷大府丞稠博覽古圖多識舊物波斯嘗獻金線綿袍組織殊麗上命稠為之稠錦成踰所獻者上甚悅時中國久絶琉璃作匠人無敢措意稠以緑瓷為之與真不異尋加員外散騎侍郎開皇末桂州俚李光仕為亂詔稠討之以勳授開府仁壽初文獻皇后崩稠與宇文愷參典山陵制度稠性少言善候上旨由是漸見親昵大業初煬帝將幸揚州敕稠討閲圖籍造輿服羽儀送至江都稠於是營黃麾三萬六千人仗及車輿輦輅皇后鹵簿百官儀服依期而就送於江都帝善之以稠守太府卿領少府監遼東之役帝遣稠造橋二日而就初稠制行殿及六合城至是帝於遼左與賊相對夜中施之高麗望見謂若神功稍加至右光祿大夫從幸江都遇宇文化及亂歸於大唐授少府監卒北史本傳唐李淳風岐州雍人父播仕隋棄官為道士號黃冠子以論撰自見淳風幼爽秀通羣書明步天厯算貞觀初以將仕郎直太史局制渾天儀詆托前世得失遷太史丞太宗得祕讖言唐中弱有女武代王以問淳風對曰其兆既成已在宫中又四十年而王夷唐子孫且盡帝曰我求而殺之奈何對曰天之所命不可去也徒使疑似之戮淫及無辜且四十年而老老則仁雖易姓不能絶唐若殺之復生壯者則陛下子孫無遺種矣帝采其言遂止淳風於占候吉凶若節契然當世術家意有鬼神相之非學習可致終不能測也以勞封樂昌縣男撰麟德厯代戊寅厯候者推最密自祕閣郎中復為太史令卒唐書本傳閻讓字立德以字行萬年人父毗為隋殿內少監本以藝進故立德與弟立本皆機巧有思武德初為秦王府士曹參軍遷尚衣奉御製衮冕六服腰輿傘扇咸有典法貞觀初歷將作少匠護治獻陵拜大匠即洪州造浮海大船五百艘遂從征遼攝殿中監規築土山破安市城師還至遼澤淖不可通立德築道為橋梁無留行帝悅賜豫良厚又營翠微玉華二宫擢工部尚書永徽五年領徒四萬治京城卒諡曰康立本顯慶中以將作大匠代立德為工部尚書總章元年拜右相初太宗與侍臣泛舟春苑池見異鳥容與波上悅之詔坐者賦詩而召立本侔狀閣外傳呼畫師閻立本時已為主爵郎中俯伏池左研吮丹粉望坐者羞悵流汗歸戒其子曰吾文辭不減儕輩今獨以畫見名與厮役等若曹慎毋習然性所好雖被屈亦不能罷也既輔政無宰相器時薑恪以戰功擢左相故時人有左相宣威沙漠右相馳譽丹青之嘲諡文貞立德孫知微為豹韜衛將軍武后時突厥默啜請和親后遣知微攝春官尚書護送武延秀聘其女默啜怒非天子子囚延秀挾知微入冦朝廷以知微賣國夷其族子則先以武三思壻免死玄宗在藩時以善割蒙寵開元中有司奏擬供奉姚崇以為則先刑戮家不可留京師詔曰朕在外日嘗驅使宜令供奉唐書本傳尉遲乙僧土火羅國胡人也貞觀初其國王以丹青巧妙薦之闕下今慈恩寺塔前面中間功德義凹垤花西面中間千手千眼菩薩精妙之極光宅寺七寶臺後面畫降魔象千怪萬狀實竒蹤也然其畫功德人物花草皆是外國之象無中華禮樂威儀之德唐畫斷乙僧父跋質那時人以跋質那為大尉遲乙僧為小尉遲畫外國及菩薩小則用筆緊徑如屈鐵盤絲大則灑落有氣槩僧悰云外國鬼神竒形異貌中華罕見要之澄思用筆雖中華道殊然氣正迹髙可與顧陸為友歷代名畫記那羅爾娑婆中天竺人王元榮俘中天竺王阿羅那順詣闕兼得術士那羅爾娑婆言壽二百歲太宗竒之館於金飈門內造延年藥後卒於長安酉陽雜俎馬祿師武功人善相長安主簿蕭璿與縣尉李嶠李全昌同詣求決馬生云三人俱貴達大李少府位極人臣聲名振耀南省官無虛任三入中書小李少府亦有清資得五品以上要官位終卿監蕭主簿晚達亦大富貴從今後十年家有大難兄弟並流唯公與一弟獲全又十年之後方却得官遇大李少府在朝堂日當得引用小李少府入省官時為其斷割後璿離長安任作祕書郎則天既貴皇后王氏破滅蕭璿是其外姻舉家流竄嶺南唯璿與弟瑗配遼東無何有處置流移使出嶺南者俱死唯遼東者獲全兄弟二人因亡命十餘年至神龍初再蒙洗滌其時李嶠作相於街中忽逢璿使人問是蕭祕書耶因謂之曰公豈忘武功馬生之言乎於是擢用時小李少府作刑部員外判還其家蕭公竟歷中外清要定命録韋善俊雒南人武后時長齋奉道法飲其藥者病即愈世稱為藥王賈志楊元禧華陰人為尚舍奉御善醫武后所信愛唐書楊𢎞禮傳附韋慈藏京兆人甄權後以醫顯者京兆韋慈藏唐書甄權傳附裴知古雍州人善樂律為太樂令神龍元年正月享太廟樂作知古密語萬年令元行沖曰金石諧婉將有大慶在唐室子孫乎是月中宗復位人有乘馬者知古聞其嘶曰馬鳴哀主必墜死見新婚者聞珮聲曰終必離訪之皆然唐書李嗣真傳嚴善思朝邑人父延通儒術該曉圖讖善思傳延業舉銷聲幽藪科及第隱居十年武后時擢監察御史方酷吏構大獄以善思為詳審使平活八百餘人原千餘姓長壽中按囚司刑寺罷疑不實者百人來俊臣等誣以罪謫交趾得還是時李淳風死候家皆不效詔善思以著作佐郎兼太史令聖厯二年熒惑入輿鬼后問其占對曰大臣當之是年王及善卒長安中熒惑入月鎮犯天關善思曰法當亂臣伏罪而有下謀上之象歲餘張柬之等起兵誅二張中宗時皇后擅政嘗語姚崇曰韋氏禍且塗地相王所居有華蓋紫氣必位九五公善護之睿宗立語聞召拜右散騎常侍開元十六年卒唐書本傳韋鑒京兆人工龍馬妙得精氣弟鑾工山水松石鑾子鶠工山水高僧竒蟲老松異石筆力徑健風格高舉善小馬牛羊山原俗人知鶠善馬不知松石更佳也咫尺千尋駢柯攢影煙霞翳薄風雨颼飅輪囷盡偃蓋之形宛轉極盤龍之狀歷代名畫記韋偃京兆人寓止蜀川善畫馬韓幹之亞也故杜甫歌云韋侯别我有所適知我憐君畫無敵戲拈秃筆掃驊驑歘見騏驎出東壁好古者收得畫品録定為妙品益州名畫録作按名畫記偃鶠取其世系清晰事迹明淨故用之題名當以偃為正車三華陰人善卜相進士李蒙宏詞及第入京注官至華陰縣官令車三見諸公云此是李蒙宏詞及第欲注官去看得何官車云公意欲作何官蒙云愛華陰縣車云得此官但公無此祿如何衆皆不信及至京畢注華陰縣尉授官相賀於曲江舟上宴會諸公令蒙作序日晚序成史翽先起於蒙手取序看裴士南等十餘人又爭起看序其船偏遂覆沒李蒙士南等並被沒溺而死定命録韋無忝京兆人與其弟無縱以畫稱無忝在明皇朝以畫馬及異獸擅名時外國有以獅子來獻者無忝一見落筆酷似其真百獸望而辟易明皇嘗遊獵一發中兩豝於玄武北門命無忝傳寫之遂為一時英妙之極官至左衛大將軍宣和畫譜法明同州僧善寫貌開元中嘗在內廷畫人物僧蓮儒畫禪王生宣平坊卜者李揆以進士調集京師聞宣平坊王生善易筮往問之王生每以五百文決一局而來者雲集自辰至酉不得次揆時持一縑晨往生於几下取一緘書可十數紙授之曰君除拾遺可發此緘揆藏之至開元中詔揆試文詞其一曰紫絲盛露囊賦二曰答吐蕃書三曰代南越獻白孔雀表揆自午及酉而成翼日授左拾遺旬餘乃發王生之緘視之三篇皆在其中遽命駕往宣平坊訪王則竟不復見矣唐鍾輅前定録滿師西京僧善九宫大理卿王璿嘗問之師云公某月當改官似是中書門下甚近玉階璿自謂黃門侍郎未可得也給舍又已過矣後果改為金吾將軍常侍玉階定命録張萱京兆人善畫人物於貴公子與閨房之秀最工其為花蹊竹榭點綴皆極妍巧以金井梧桐秋葉黃之句畫長門怨甚有思致又能寫嬰兒於大小歲數間定其面目髫稚又貴賤氣調與骨法各别宣和畫譜萱尤長於寫嬰兒其畫婦人以朱暈耳根為别圖繪寶鑒保壽寺本高力士宅天寶九載捨為寺河陽從事李涿性好竒古與僧善嘗至此寺觀庫中舊物忽於破甕中得物如被幅裂汙坌觸而塵起涿徐視之乃畫也因以州縣圖三及縑三十換之令家人裝治大十餘幅訪於常侍桞公權方知張萱所畫石橋圖也玄宗賜力士因留寺中後為鬻畫人宗牧言於右軍尋有小使領軍卒數十人至宅宣敕取之即日進入帝見之大悅命張于雲韶院酉陽雜俎路生長安人賣卜於市有趙自強來選就生卜焉生云公之官若非重日即是重口後又卜生云公官九日不出十二日出至九日宰相果索吏部由厯至十二日敕出為左拾遺拾遺字各有一口又補闕王冕訪卜生云九月當入省官有禮字時禮部員外陶翰在座乃曰公即替人九月陶病請假敕除王禮部員外後又令卜云必出當為倉字官果貶溫州司倉賈志韓幹藍田人少時嘗為酒家送酒王維兄弟未遇每貰酒幹常徵債戲畫地為人馬維精丹青竒其意乃與錢二萬令幹畫十餘年今寶應寺有幹畫尤入神段成式寺塔記韓幹長安人天寶初入為供奉時陳閎畫馬榮遇一時明皇令師之幹不奉詔曰臣自有師今陛下內廄馬皆臣師也明皇益竒之後師曹霸畫馬得骨肉停勻法傳染入縑素弟子孔榮頗得其法圖繪寶鑑幹間居之際忽有一人朱衣玄冠而至曰我鬼使也聞君善圖良馬願賜一匹幹立畫焚之數日因出有人揖而謝曰蒙君惠駿足亦有以酬效明日有人送素縑百匹不知其來幹收而用之獨異志建中初有人牽馬訪醫稱馬患腳以二千求治其馬毛色骨相馬醫未嘗見笑曰君馬酷似韓幹所畫者真馬中固無也因請馬主繞市門一匝馬醫隨之忽值韓幹幹亦驚曰真是吾設色者乃至舍視其所畫馬本腳有一點黑缺方知畫通靈矣馬醫所獲錢用歷數年乃成泥錢酉陽雜俎嘉祐中一貴人使江南攜韓馬一匹行及回渡采石磯風大作三日不可過欲過又大作於是禱於中元水府廟是夕夢神告留馬當相濟翼日詣廟獻之風止乃渡畫史矣按幹係京兆藍田人羣書言之詳名畫記作大梁人并志之以備考賈昌長安宜陽里人生七歲趫捷過人能摶柱乘梁善應對解鳥語玄宗在藩時樂民間清明節鬭雞戲及即位治雞坊兩宫間索長安雄雞金毫鐵距高冠昂尾千數養於雞坊選六軍小兒五百人使教飼民家傾産市雞以償雞直貧者弄假雞帝出遊見昌弄木雞於雲龍門道旁召入為雞坊小兒三尺童子入雞羣壯者弱者勇者怯者水穀之時疾病之候悉能知之雞畏而馴使令如人中謁者王承恩言於元宗召試殿庭即日為五百小兒長天子甚愛幸之金帛之賜日至其家當時號為神雞童八月五日千秋節大合樂於宫中或於洛元會與清明節率皆在驪山至日羣樂具舉六宫畢從昌冠雕翠金華冠錦袖繡袴執鐸拂導羣雞敘立廣場顧盻如神樹毛振翼礪吻磨距抑怒待勝進退有期低昂不失勝負既決隨昌雁行歸於雞坊教猱擾龍之徒歟昌席寵四十年恩澤不渝及亂昌變姓名依佛舍洎建元三年於長安東門外鎮國寺東偏構小舍居之以老陳鴻東城父老傳謝阿蠻新豐人新豐進女伶謝阿蠻善舞上與妃子就按於清元小殿寧王吹玉笛上羯鼓妃子琵琶馬仙期方響李龜年觱篥張野狐箜篌賀懷智拍板自旦至午歡洽異常曲罷妃子命侍兒紅桃取紅粟玉臂支賜阿蠻後上自成都還復幸華清宫從官嬪御多非舊人上命阿蠻舞凌波曲舞罷上凄然垂涕太真外傳馬二娘長安人天寶末長安有馬二娘者善考召兗州刺史蘇詵與馬氏相善初詵欲為子萊求婚盧氏謂馬氏曰盧氏三女未知誰佳幸為致之令其母自閲視馬氏乃於佛堂中結壇考召須臾三女魂悉至馬云大者非不佳不如次者必當為刺史婦乃娶次女天寶末萊至永寧令死於祿山之難其家懲馬氏失言後二京收復有詔贈萊懷州刺史廣異記楊坦楊仙喬並長安人好圖佛寺鬼神坦子爽亦善之歷代名畫記盧楞伽長安人學道於吳道元但才力未及尤善作經變相入蜀名益著乾元初嘗於大聖慈寺畫行道僧顔真卿為之題名時號二絶又嘗畫莊嚴寺三門竊自比道元總持壁一日道元忽見之驚歎曰此子筆力常時不及我今乃相類精爽盡於此矣居一月楞伽果卒圖繪寶鑑作按名畫記楞伽稜伽周昉字景元長安人寓意丹青德宗召畫章敬寺神初落墨時徹去幄帟使往來縱觀之又寺接國門賢愚畢至或言妙處或指摘未至衆目助其得失昉隨所聞改定月餘是非語絶遂下筆成之無復瑕纇當時推為第一昉為諸像精意至於感通夢寐示現相儀傳諸心匠此殆非積習所能致至於傳寫婦女則為古今之冠其稱譽流播往往見於名士詩篇文字中宣和畫譜郭汾陽壻趙縱侍郎嘗令韓幹寫真衆稱其善復請昉寫之二者皆有能名汾陽嘗以二畫張於坐側未能定其優劣一日趙夫人歸寧汾陽問此畫誰也云趙郎復曰何者最似云二者皆似後畫者為佳蓋前畫者得趙郎狀貌後畫者兼得趙郎情性笑言之姿耳後畫者乃昉也汾陽喜曰今日乃決二子之勝負令送錦綵數百匹以酬之昉平生畫牆壁卷軸甚多貞元間新羅人以善價收置數十卷持歸本國圖畫見聞志昉傳家閥閲窮丹青之妙善畫貴遊人物作士女多為穠麗豐肥之態蓋其所見然也圖繪寶鑑邊鸞京兆人攻丹青長於花鳥折枝之妙古所未有貞元中新羅國獻孔雀解舞德宗召於玄武門寫貌一正一背翠彩生動金鈿遺妍若運清聲宛應繁節後於澤潞貌五參連根精妙之極近代折枝花居其首也畫斷終南二叟趙操相國憬孽子性疏狂不慎因盜驢私竄南出啓夏門俄屆南山漸入深遠操繫驢山木獨行二十里忽遇人居有二白髮叟謂操曰汝既至可少留操顧其室內妻妾孤幼不異俗世操甚安焉月餘二叟謂操曰勞汝入都汝所乘驢貨之可得五千用此依吾所約買之而還操出山見其驢尚在貨之果得五千因探懷中所示之書惟買水銀耳操即為交易歸舍二叟以雜藥燒煉俄化為黃金因以此術示之於操自爾半年二叟徐謂操曰汝可歸三年之後當與汝會及家相國薨再宿矣服闋因告别昆仲遊於江湖至今無羈於世從學道者甚衆操終無傳焉集異記段善本長安僧琵琶馬上樂器貞元中有康昆崙第一手遇長安大旱詔移南市祈雨天門街市人廣較勝負鬭聲樂街東有康昆崘琵琶必謂街西無敵遂令昆崘登樓彈一曲新翻羽調其街西亦建一樓東市大誚之及昆崘度曲西市樓上出一女郎抱樂器先云我亦彈此曲兼移在楓香調中及下撥聲如雷其妙入神昆崘驚拜請為師女郎更衣出見乃僧也蓋西市豪族厚賂莊嚴寺僧善本姓段以定東鄽之聲翼日德宗召入令陳本藝乃令教授昆崘段請昆崘彈一調及彈師曰本領何雜兼帶邪聲昆崘驚曰段師神人也段奏曰且遣昆崘不近樂器十年使忘其本領然後可教詔許之後果盡段之藝樂府雜録元載子伯和勢傾中外福州觀察使寄樂妓十人既至半嵗不得送使者窺伺門下有琵琶康昆崘最熟厚遺求通既送妓伯和一試奏盡以遺之先有段和尚善琵琶自製西梁州昆崘求之不與至是以樂之半贈之乃傳焉今曲調梁州是也幽間鼓吹田佐元虢縣人憲宗末年鋭於服餌詔天下搜訪竒士佐元自言有竒術能變瓦礫為黃金自白衣授本縣令册府元龜韓志和倭國人飛龍衛士善雕木作鸞鶴鴉鵲之狀飲啄動靜與真無異以關捩置腹內發之則凌雲奮飛可高三尺至一二百步外方始却下兼刻木作貓兒以捕鼠雀飛龍使異其機巧以事奏上覩而悅之志和更雕踏床高數尺飾以金銀綵繪謂之見龍床置之則不見龍形踏之則鱗鬛爪牙俱出及始進上以足履之龍夭矯若得雲雨上怖畏令撤去志和伏上前曰臣愚昧驚忤聖躬願别進薄技以贖死罪遂於懷中出一桐木合子方數寸中有蠅虎子數不啻一二百其形皆赤云以丹砂啖之故也乃分為五隊令舞涼州上令召樂以舉其曲虎子盤回宛轉無不中節每遇致詞處則隱隱如蠅聲曲終纍纍而退若有尊卑等級志和臂虎子令於上前獵蠅數百步內如鷂捕雀罕有不獲上賜以雜綵銀碗志和出宫門悉轉施他人不逾年竟不知所在杜陽雜編惟瑛京師人吳郡陸賔于舉進士在京師有一僧曰惟瑛者善聲色兼知術數每言事無不驗寶厯二年春賔于欲罷舉歸吳惟瑛謂曰君來嵗成名不必歸矣但取京兆薦送必在高等賔于難之惟瑛曰君成名必以京兆薦送七月六日若食水族必殊等及第矣賔于乃書於牖間日省之數月後因於靖恭北門候一郎官遂回憩從孫聞禮之舍聞禮喜迎曰向有人惠鯉魚方欲烹之賔于素嗜魚但令具羮至者輒盡後日因視牖間所書字則七月六日也遽命駕詣惟瑛且紿之曰將遊蒲關故來訪别惟英笑曰水族已食矣遊蒲關何為賔于因取薦京兆果得殊等明年入省試畢又訪惟瑛惟瑛曰君已登第名籍在十五上下狀首姓李名合曳腳時正月二十四日賔于言於從弟符符書壁間後月餘放榜狀頭李郃賔于名在十六惟瑛又謂賔于曰君當食祿於吳越之分有一事甚速賔于不喻其意及從事於越半年而終前定録趙公祐長安人寶厯中寓居蜀城工畫人物尤善佛像天王神鬼贊皇公鎮蜀之日賔禮待之益州名畫録公祐太和間著畫名溫其公祐子幼而潁秀家學益工筆法臻妙德齊溫其子襲二世之精藝竒蹤逸筆為時推許光化中詔許王建於成都置生祠命德齊畫西平王儀仗殿上畫后妃嬪御皆極精妙昭宗喜之遷翰林待詔圖繪寶鑑常粲長安人咸通中路巖牧蜀粲入蜀巖賔禮甚厚粲畫道釋人物尤得時名喜為上古衣冠不墮近習衣冠益古則韻益勝當時有伏羲畫卦神農播種陳元達鎖諫等圖皆傳世之妙亦詩人諷諌之義也宜後世有傳焉宣和畫譜重引粲子僖宗幸蜀回鑾之日蜀民奏請留御容於大聖慈寺陳敬瑄表進重引御容一寫而成內外官屬無不歎駭謂為僧繇後身尋授殿前翰林待詔賜緋魚袋益州名畫録吕嶤竹虔並長安人工畫佛道人物僖宗朝為翰林待詔廣明中扈從入蜀長安成都皆有畫壁圖畫見聞志趙鄂鄜州人武陵醫士梁新仕至尚醫奉御有朝士詣之梁奉御曰風疾已深請速歸處置家事朝士惶懼䇿馬歸時有鄜州馬醫趙鄂新到京都自榜姓名云攻醫術朝士下馬告之鄂言疾已危與梁生所説同謂曰只有一法請官人喫消梨不限多少咀齕不及捩汁而飲或希萬一朝士以書留質消梨馬上旋齕到家旬日惟喫消梨頓覺爽朗訪趙生感謝又訪梁奉御具言得趙生教也梁公驚異遂召趙生資以僕馬錢帛廣為延譽官至太僕卿北夢瑣言唐時京城有醫人忘其姓名有一婦人從夫南中曽誤食一蟲常疑之由是成疾頻療不損請看之醫者知其所患乃請主人姨妳中謹密者一人預戒之曰今以藥吐瀉但以盤盂盛之當吐時但言有一蝦蟇走去然切不得令病者知是誑紿也其妳僕遵之此疾永除同上王敬傲長安人前翰林待詔能棊善琴風骨清峻敬傲在鄴中數嵗時李山甫文筆雄健名著一方適於道觀中與敬傲相遇山甫曰幽蘭淥水可得聞乎敬傲即應命而奏聲清韻古感動神爽曲終敬傲澘然返袂云憶在咸通王庭秋夜供奉至尊之際不意流離於此因别彈一曲坐客彌加悚敬山甫命酒停絃從容問曰向所操者何曲也王生曰某家習正音奕世傳受常所操弄人衆共知唯稽中散所受之曲人皆謂絶於洛陽東市余得自先人名曰廣陵散山甫由是常目待詔為王中散也後又遊常山是時節帥王鎔年在幼齡初秉戎鉞方延多士以廣令名待詔琴棋亦見禮於賓榻嵗時供給莫不豐厚或揮絃動軫必承禮遇敬傲每戴危冠著高屐優遊嘯詠冬月亦葛巾單衣體無綿纊日醺酣於市人咸異之聞昭宗返正辭歸帝里後不知所終敬傲又能衣袖中剪紙為蜂蝶令飛滿四座或入人襟袖以手攬之即復於故所當時咸疑其有神仙之術耳目記刁光印長安人天復中避地入蜀工畫龍水竹石花鳥貓黃筌孔嵩皆門弟子嘗於大慈寺承天院內窗邉小壁四堵上畫四時花鳥體製精絶後黃居寀重裝飾之亦有圖軸傳於世圖畫見聞志趙元德長安人天復中入蜀雜工佛道鬼神山水屋木遇唐季喪亂之際得隋唐名手畫樣百餘本故所學精博有漢高祖過豐沛盤車講學豐稔圖傳於世忠義元德子事孟蜀為翰林待詔雖從父訓宛若生知蜀後主嘗令其畫關將軍起玉泉寺閣作地架一座垂昂疊拱向背無失蜀主命匠氏較之無一差者其精妙如此嘗與高道興黃筌輩畫成都寺壁甚多圖畫見聞志作按元德一本德元馬處謙扶風人病瞽父俾其學易以求衣食嘗於安陸鬻筮自給有一人謁筮謂馬生曰子之筮未臻其妙我有祕法能從我學之乎馬生隨往受星算之訣凡一十七行因請其爵里乃云胡姓恬名誡之曰子有官祿終五十二嵗幸勿道我行止於王侯之門馬生得訣言事甚驗趙匡明棄荆入蜀因隨至成都王先主嘗令杜光庭密問享夀幾何對曰主上受元陽之氣四斤八兩果七十二而崩四斤八兩即七十二兩也官至中郎金紫亦五十二而殞北夢瑣言強紳鳳州人妙於三戒尤精雲氣屬王氏初并秦鳳張黃於通衢強公指謂孫光憲曰悠悠梁蜀後何為哉於時蜀兵初攻岐山謂其旦夕屠之強曰秦王非四海之主雖然死於牖下乃其分也蜀人終不能尅秦而秦川亦成丘墟矣後秦王令終王氏絶祚果叶強生言有鹿盧蹻術自云老耄矣無人可傳其書藏在深隱處古杉樹中因與孫光憲偕詣開樹皮發蠟緘取出一通絹書選吉辰以授為強嫗止之謂孫少年慮致發狂俟三年方議可否北夢瑣言李靄之華隂人工畫山水寒林有江鄉之思鄴帥羅中令厚禮之為建一亭為援毫之所名金波亭時號金波李處士也有賣藥修琴歸山圖野人荷酒寒林并山水卷軸傳於世圖畫見聞志靄之畫貓尤工蓋畫貓者必在花下靄之獨畫在藥苗間豈非幽人逸士所寓耶宣和畫譜五代廣微者華州僧也知術數末帝在河中廣微嘗密謂房皓曰相公極貴然明年有大厄極危如得濟此凡事不可言明年果有楊彥溫之變册府元龜張濛岐州瞽者自言知術數不龜不筮言事太白山神其神祠元魏時崔浩廟時事否泰人之休咎濛於神傳吉凶之言房皓酷信之末帝在岐陽皓引濛謁見聞帝語乃駭然曰非人臣也令皓詢其時即傳神語曰三珠併一珠驢馬沒人驅嵗月甲寅午中興戊巳土皓請解曰神言豫不知也長興四年五月府廨諸門無故自動濛見皓未交言先問皓衙署小異勿怪不出三日有恩命其夜報至封潞王及帝被疑除鎮甚懼再三質濛濛備保無恙及帝入洛受太后册宰相讀文惟應順元年嵗次甲午四月庚午朔帝回視房曰張濛神言不亦異乎帝令皓共術士解三珠一珠事言三珠三帝也驢馬無人驅失主也帝即位以濛為將作少監同正賜金紫册府元龜孟繼瑜長安醫工帝留守時暴疾以醫效乃攝任洎帝起兵鳳翔繼瑜在長安謁見從至洛屢進方藥年內改諸寺少卿翰林諸醫莫得為比册府元龜陳立京兆人家世為醫後唐明宗朝為太原少尹集平生驗方七十五首并修合藥法百件號曰要術刋石置於太原府之左以示於衆病者賴焉册府元龜關同一名穜長安人畫山水早年師荆浩晚年筆力過浩逺甚尤喜作秋山寒林與村店野渡幽人逸士漁市山驛使見者不復有市朝抗塵走俗之狀蓋其脫略毫楮深造古淡如詩中淵明琴中賀若非畫工所能知當時郭忠恕亦神仙中人亦師事同故筆法不墮近習同於人物非所長於山間作人物多求胡翼為之故同所畫村堡橋彴色色備有翼因得以附名於不朽也宣和畫譜關畫木葉間用墨揾時出枯梢筆蹤徑利學者難到圖畫見聞志支仲元鳳翔人工畫人物有老子誡徐甲蕭翼賺蘭亭商山四皓等圖傳於世圖畫見聞志仲元多畫道家與神仙像亦物外人也又喜作碁圖松下林間對棋者率有思致宣和畫譜仲元畫人物極工筆法師顧陸緊細有力清潤不俗宋高宗題作晉六朝者多仲元所作圖繪寶鑑朱繇長安人工畫佛道酷類吳生雒中廣愛寺有文殊普賢像長夀寺并河中府金真觀皆有畫壁圖畫見聞志畫道釋皆以道子為法獨繇不惟妙造其極而時出新意動人耳目國朝武宗元嘗在雒見其所畫壁云文殊隊中舊有善財童子豫酷愛其筆法玩之月餘不忍去今遂失其童子所在信其畫亦神矣弟子趙裔亦知名宣和畫譜杜子瓌華隂人精意道釋因畫圓光自謂得意非丹青家所及每詫於流輩曰我作圓光時心遊海上遐想日出扶桑滄滄涼涼其狀若此故脫略筆墨使妍淡無迹宜他人所不能到也論者以為信然子瓌研吮丹粉尤得其術故綵繪特異宣和畫譜杜齯龜秦人避地居蜀事王衍為翰林待詔博學強識善畫佛像人物始師常粲後舍舊學自成一家故筆法凌轢流輩粲亦莫能接武也敬安齯龜子事孟蜀為翰林待詔生平妙於佛像尤能傅彩益州名畫録載為杜子瓌子未知孰是圖繪寶鑑蓋按齯龜父子周旋二蜀五代時人也黃休復名畫録以為避祿山亂者誤李處士關右人石晉時能畫馴狸復能補端硯百碎者賫歸旬日即復舊如新琢成略無瑕纇世莫得其法珍珠船張及之京兆人畫犬馬花鳥頗工作犬得敦龎之狀無搖尾乞憐態圖繪寶鑑跋異汧陽人工畫佛道鬼神洛中福先寺有畫壁圖畫見聞志施璘字仲寶藍田人工畫竹有生意為當時絶技圖繪寶鑑衛賢長安人事江南李後主為內供奉工畫人物臺閣初師尹繼昭後服膺吳體有望賢宫滕王閣盤車水磨等圖圖畫見聞志賢畫高崖巨石則渾厚可取而皴法不老林木雖徑挺而枝梢不稱其本論者少之妙處亦人稀及圖繪寶鑑杜韜京兆人少為富商師衛賢深得其要賢後延為東榻所畫與賢伯仲圖繪寶鑑宋麻衣道者錢若水為舉子時見陳希夷於華山希夷曰明日當再來若水如期往見有一老僧與希夷擁地罏坐僧熟視若水久之不語以火箸畫灰作做不得三字徐曰急流中勇退人也若水辭去希夷不復留後若水登科為樞密副使年才四十致政希夷初謂若水有仙風道骨意未決命老僧觀之僧云做不得故不復留老僧麻衣道者也希夷素所尊禮云聞見前録范寬一名中正字中立華原人風儀峭古進止踈野常往來京洛喜畫山水始學李成既悟乃歎曰吾與其師於人者未若師諸物吾與其師於物者未若師諸心於是居終南太華岩隈林麓之間覽其雲煙慘淡風月隂霽難狀之景默與神遇一寄筆端千巖萬壑恍然如行山隂道中天下皆稱寬善與山傳神宜與關李並馳方駕也關中人謂性緩為寬中立不以名著以俚語行故世傳范寬山水宣和畫譜范畫林木或側形如偃蓋别是一種風規畫屋既質以墨籠染後世目為鐵屋圖畫見聞志寬始師李成又師荆浩山頂好作密林水際作突兀大石黃懷玉華原人有足疾時人目為跛子學范寬頗有其格樹木皴剝人物清灑然大約失之工圖繪寶鑑劉翼耀州呼為劉評事學范寬有自得處不知者以為寬筆畫繼趙光輔耀州人太宗朝為畫院學士工畫佛道人物兼精蕃馬筆鋒徑利名刀頭燕尾張翼者一名鈐豳人善畫蕃馬及人物師趙光輔得其筆法圖畫寶鑑史序字正倫京兆人善推步厯算太平興國中補司天學生雍熙二年廷試中選者二十六人序為之首命知算造又知監事後纍遷夏官正修儀天厯上之又嘗纂天文厯書為十二卷以獻賜金紫俄權監事大中祥符三年卒序慎密勤職在監三十年未嘗有過宋史本傳許道寧京兆人性跌宕不羈畫山水法李成獨造其妙可與營丘抗衡亦工傳神每見人寢陋者必戲寫貌於酒肆識者皆笑之為其人毆擊至碎衣敗面竟不悛後遊太華見其峰巒崷崒始有意於山水清潤高秀濃纎得法不愧前人矣杜祁公帥長安道寧恃其技犯公公怒捕之時种叔誼守環州道寧乃往投誼杜公聞之笑曰道寧真善自為謀者乃貽書种公俾善遇之在環嵗餘乃歸環學從祀弟子乃道寧所作筆也豫舅吳順圖有道寧畫終南積雪圖八幅真絶品也亡於兵火惜哉長安涼榭大屛面亦道寧所作殊竒偉墨莊漫録河按圖畫見聞志道寧長安人山水家法作間人考宋張士遜有詩曰李成絶世范寬老惟有長安許道寧其為秦人無疑矣成宗道長安人工畫人物兼善刻石凡長安壁傳吳筆皆臨摹上石其迹細如絲髮而不失精神體段有所集吳生三清像與左右侍衛宛如吳作或云因能勒石後轉而為畫也又改武洞清長沙羅漢三元皆能捨短求長自出新意過於長沙逺矣畫繼陶裔鄠人工畫花竹翎毛形製設色亞於黃筌為圖畫院祗候祥符中畫御座屏扆稱旨尋改翰林待詔圖畫見聞志李隱五原人工畫山水大中祥符末營會靈觀命隱寫五嶽山形於璧及畫山水於五殿屏扆觀其危峰疊嶂逺水踈林可謂盡美圖畫見聞志甘風子關右人佯狂垢汚恃酒好罵酒酣耳熱大呌索紙以細筆作人物頭面動以十數然後放筆如草書法以就全體頃刻而成妙合自然多畫列仙之流題詩其後傳觀既畢往往毁裂而去好事者藏匿一二豪富求之唾罵不與或經年不落一筆故流傳者絶少一日忽别素與遊者歸則薰浴題頌擲筆而逝畫繼龍章櫟陽人工畫佛道人物兼工傳寫尤善畫虎曾有貨藥人楊生檻中養一虎章因就視寫之故畫虎最臻形似子淵有父風圖畫見聞志李宗成鄜畤人工畫山水寒林學李成破墨潤媚取象幽竒林麓江臯尤為盡善有風雨江山拜月圖四時山水松柏寒林等圖傳於世圖畫見聞志王易鄜州人工佛道人物學鄰李元濟圖畫寶鑑曾若虛隴州道士善醫尤得針砭之術里有寡婦再適人遘疾且卒經日而心間尚暖家人因奔詣若虛哀祈往救既至引針針之即時而蘇良久乃能語曰始者夢故夫為一物刺中其足不能履步由是獨行忽若夢覺郡人詣若虗詢之若虛曰向之所針乃黃帝針八邪穴也西齋話記雷宗道商州人工雜畫尤長於佛像山水似郭熙圖繪寶鑑寧濤華隂敷水人師范寬多作關右風景其巧過寬而渾厚藏蓄不及也樓觀人物纎悉畢呈失於大顯畫繼久中濤子也兼畫人物深得出俗之態筆意不減其父但多平逺道路之景不起峰頂同上蒙亨華州人初為僧兵火後偶其兄從軍遂置軍中學其鄉人寧濤得典型也同上邠州父老唐羯鼓曲今惟邠州父老能之有大合蟬滴滴泉之曲豫在鄜延時尚聞其聲涇原承受公事楊元孫因奏事回有旨令召此人赴闕元孫至邠而其人已死羯鼓遺音遂絶沈存中筆談鳳翔老尼冦萊公好柘枝舞會客必舞柘枝每舞必盡日時謂之柘枝顛今鳳翔有一老尼猶萊公柘枝妓云當時柘枝尚有數十遍今日所舞柘枝比當時十不得二三老尼尚能歌其曲好事者往往傳之夢溪筆談老麻關中人熙寧間以花鳥稱非蜀之居禮也畫繼侯封邠人工畫山水寒林始學許道寧不能踐其老格然而筆墨調潤自成一體亦郭熙之亞圖畫見聞志李希成華州人慕李成遂命名初入圖畫院能自晦以防忌嫉比已補官始出所長衆雖睥睨無及矣畫繼胡竒長安人長於蘆雁何丞相文縝家有四幅圖可觀畫繼張衍長安人年八十以術遊士大夫門章子厚蔡持正官州縣時許其為宰相蒲傳正薛師正未顯皆以執政許之紹聖初伯溫官長安因論范忠宣公命衍曰范丞相命甚似其父文正公僅作參知政事耳伯溫又問時為監司者張藝叟陸孝叔邵仲恭吳子平數公命衍曰皆帶職正郎員外郎耳取進於此即不可獨仲恭數促其後藝叟為侍郎孝叔待制未幾皆謫官孝叔帥熙子平帥秦尋卒仲恭邯鄲移常州卒年五十五三公皆直龍圖無一不如衍言者衍病伯溫見之則曰數已盡某日當死凡家事悉處之矣已而果然邵伯溫聞見前録劉浩居華隂愛作雪驢水磨故事人物多布敘景致意象幽逺筆法輕清畫繼張通鄜延人畫仙佛古今畫鑑王沖隱名持字正叔長安人長於翎毛學崔白顔魯公鹿脯帖後有題跋妙於筆法蓋其人也嘗於邵氏見竹棘雪禽二軸極清雅上題云正叔為伯起作伯起名振其兄也畫繼賀正延安人出自戎籍畫人物山水古木怪松得郭熙筆法圖繪寶鑑宣和初建寶正宫一時名手畢呈其技有忌正者推為講堂照壁正亦不辭日醉酒於門衆工皆畢中使促正正以幕圍壁揮却其徒不數日成作雪林高八尺觀者歎賞衆工斂袵畫繼符道隱長安人畫山水寒林古今畫鑑雍巘字幼山興元人善山水作岩崖枯木雲氣墨梅佳畫繼田玘鄜州人作泥孩兒名天下態度無窮效之不能及一對至直十縑一牀至三十千一牀者或五或七也小者二三寸大者尺餘無絶大者豫家舊藏一對卧者有小字云鄜州田玘製紹興初避地東陽山中歸則亡之矣老學庵筆記虞學士伯生亦有記言其精絶古今書蕉金陳道輔京兆人好寫墨竹自號夜江散人圖繪寶鑑元蘭公和尚涇陽人嫻儒經有才力巧於射藝金元間賊遍起蘭公以射藝救人者甚衆雲陽志王𢎞毅字子逺淳化人唐王圭裔也總角通詩書善屬文元兵克汴避難習醫後歸元管勾太醫院事治疾如神年四十即求退隱谷口之文川結廬溪上夀七十五而終淳化縣志胡瓚字元禮京兆人官至衡州路同知善畫墨竹圖繪寶鑑雷祥白水人能醫善陶所造磁器精工絶人世所謂雷公器是也土人間掘得祥遺器形製古質色緑沉隱秀或微作花墳起以手摩挲復勻潔無凸窪方之宣哥諸窰不啻過之賈志邉武字伯京京兆人善墨戲花鳥圖繪寶鑑明劉純字宗厚洪武中居咸寧博學工文辭喜吟咏深明醫道作醫經小學等書賈志郭伯郁郿縣人精通天文厯數善讖緯之術任欽天監春官正名重京師洪武十七年清類天文分野書成頒賜秦晉諸王有漏刻博士元統欲推衍大統厯積分之數乃言曰皇上承運以來厯雖以大統為名而積分猶授時之數然授時厯法以至元辛巳為厯元至今洪武甲子積一百四年以厯法推之得三億七千一十九萬九千七百七十五分經云大約七十年而差一度每嵗差一分五十杪辛巳至今年逺數盈漸差天度擬合修改蓋七政之源有遲疾順逆伏見不齊其理深奧實難推演臣聞磨勘司令王道亨有師郭伯郁者陜西郿縣人精明九數之理深通厯學之源若得此人推大統厯法庶幾可成一代之制蓋天道無端惟數可以推其機天道至妙因數可以明其理是理因數顯數從理出可相依而不可相違臣等職在觀占推步以驗民時誠不敢以膚淺之學自用願得博聞洽見之人任之上是其言賈志張徵字以周三原人精通方脈天順間舉為太醫院醫生術屢取效尋授御醫院判三原志齊惠咸寧人咸寧處士郭理不與人茍合與遊者人人嚴憚惠喜奕人有篤病當奕不肯廢見處士來即罷奕應病者病者得惠醫皆生凡病者因其奕皆來趨處士惠之醫與處士之方正渢然遍關中康對山集王金字芝山西安人年十七遇道人墮水救歸嚴事之已道人㩦入終南授以竒祕試輒驗時屬世廟好方伎金以白衣召見為言三元大丹稱旨歷官太常出入禁闥二十年世廟賓天廷議金等進藥不謹論刑新鄭高文襄再疏申雪得減戍閩海後數年歸依文襄以居遂為鄭人李空同夢陽與交厚贈以芝山子辭云河南通志郭文英韓城人少為人牧羊以户匠乏人至京抵役久之以巧力聞見知世廟每一工竣則序勞晉秩纍階至工部右侍郎賜二品服文英聰慧善詼諧嘗會諸搢紳談及發科經書輒笑自謂不佞起家木經衆為絶倒韓城志李萬庫渭南人世號金針李同州丁牧母以哭夫喪明越十年遇金針雙眸復炯炯時馬文莊公為文紀事而丁牧贈詩云十年春色暗中度一旦看花識春暮呼兒呼婦覷容顔恍惚猶疑夢中寤自萬庫殁其術不傳渭南志管澤字子民咸寧學生父楫正德中進士官山左巡撫􅊩任五月翕然稱治未幾以疾歸澤躬侍湯藥因精研岐黃應手輒效逺近求醫者甚衆由是以醫名聞關輔所著有後垣元機效方藏於家賈志大元禪師名現本漢中人後駐錫西山潭柘寺精素難脈理及八法神針諸症針下即瘳於傷寒胎産起死恆多宫禁大璫戚里貴人皆尊事之續文獻通考梁時元涇陽人善寫山水得石田筆意涇陽志張碧山涇陽人精於八法神針能起疲癃袁了凡習術於其門涇陽志王尚德西安右衛人幼敏慧博覽經史過目不忘善詩賦尤精醫術秦肅王疾諸藥弗瘳徵德至進藥一七而愈王曰神醫也遂奏請授迪功郎秦藩醫正兼宜川郃陽兩王府教授事教子孫七人入庠以夀終賈志路從廣字一元澄城人初任安邑改司儀封河務去積水開沃池歷寶慶通判致政歸惟挾一鶴素精繪事一時目為關中鸞同有畫譜行世澄城志天啓丙寅從廣任臨清嘗於關廂壁間畫虎崇禎中有諷經道士至夜三鼓時見虎雙眸炯然從壁而下抖擻跳躍若將攫人道士愕然不知所措急取劚柴斧格之倐忽躍上乃壁間畫虎也遲明説其事州人觀者如堵迄今臨摹其圖者甚衆競貴售之同上梁世鰲字化宇渭南人少力學弗售見李伯時西園雅集圖而悅之殫精竭思十年伎成寫照宛似遊長安轟動貴人漸聞大內值上念太后令老內侍口授形容而筆之圖成酷肖上感動懸之內殿朝夕禮焉授鰲武英殿中書洵異數也縣志柴定向字少池涇陽人善識風水能於數十里外望地氣知休咎嘗過學宫見育才坊廢請於縣令曰此坊復建必科第蔚興次年丙子果中鄉榜十人為祋祤太學生王中伯公卜地其山峰峻拔占者以為不利向曰此將軍山也當有以武成名者後果驗年九十七嵗髮色如童涇陽志王某秦人嘗為商結隊偕發忽剪徑賊至衆潰亂王笑曰行耳我在欲何為者叱馭前進冦至近皆僵立不動若有膠其脛者駭汗瞪立而已王行逺冦轉動得逸去蓋以祕術拘制之也又嘗宿旅店主人應對稍忤時邸中有妓女數輩王怒遽捉一妓投井中衆號客殺人有知其術者勸主人前謝王意解呼妓使出則固在室中也曠園雜志本朝王扆字公輔朝邑人父經商南中溺死徒跣千里求尸不得自以終天抱痛絶意仕進性嗜山水遂以畫名得右丞家法家貧每乘興潑墨自給鄉人李楷雷于霖極器重之薑鎮蒲城人親喪廬墓六載幼習醫夢關帝君授以盧扁之術遂神名聞關中雜傳商崇侯虎帝謂文王詢爾仇方同爾兄弟以爾鉤援與爾臨衝以伐崇墉詩大雅崇侯虎譖西伯於殷紂曰西伯積善纍德諸侯皆嚮之將不利於帝紂乃囚西伯於羑里閎夭之徒患之乃求竒怪物獻之紂紂大悅乃赦西伯曰譖西伯者崇侯虎也西伯於是伐崇侯虎作豐邑自岐下而徙都豐史記周本紀正義曰崇國在豐鎬之間詩云既伐于崇作邑于豐是也周本紀注周暴公何人斯刺暴公也暴公為卿士而譖蘇公故蘇公作是詩以絶之詩小雅暴蘇皆畿內國名毛傳漢朱建楚人為淮南王黥布相初布欲反時問建建諫止之布不聽漢既誅布聞建諫之高祖賜號平原君家徙長安為人辨有口刻亷剛直行不茍合義不取容辟陽侯行不正欲知建建不肯見及建母死貧未有以發喪辟陽侯乃奉百金祱列侯貴人以辟陽侯故往賻凡五百金久之人或毁辟陽侯惠帝欲誅之辟陽侯困急欲見建建辭曰不敢見君建乃求見孝惠幸臣閎孺説曰君所以得幸帝天下莫不聞今辟陽侯幸太后道路皆言君讒欲殺之今日辟陽侯誅旦日太后含怒亦誅君君何不言帝出辟陽侯閎孺從其計果出辟陽侯孝文時淮南厲王殺辟陽侯以黨諸吕故孝文聞其客朱建為其䇿使吏捕欲治遂自剄文帝聞而惜之曰吾無殺建意也乃召其子拜為中大夫使胸奴單于無禮罵單于遂死胸奴中漢書本傳趙禹斄人以佐史補中都官用亷為令史以刀筆積勞稍遷為御史上以為能至大中大夫與張湯論定諸律令作見知吏傳得相監自此始張湯者杜人其父為長安丞出湯為兒守舍還而鼠盜肉父怒笞湯湯掘窟得鼠及餘肉劾鼠掠治傳爰書訊鞫論報并取鼠盜肉具獄磔堂下父見之視其文辭如老獄吏大驚遂使書獄父死後湯為長安吏給事內史為寧成掾調茂陵尉武安侯為丞相徵湯為吏薦之天子補御史治陳皇后巫蠱獄深竟黨與於是上以為能遷大中大夫與趙禹共定諸律令務在深文拘守職之吏已而禹遷中尉徙少府湯為廷尉兩人交歡禹為人亷倨舍毋食客公卿相造請禹禹終不報謝務在絶知友賓客之請孤立行一意而已見文法輒取亦不覆案求官屬隂罪湯為人多詐舞智以御人治淮南衡山反獄皆窮根本遷御史大夫會渾邪等降漢大興兵伐胸奴縣官空虗湯承上指請造白金及五銖錢籠天下鹽鐵排富商大賈出告緡令鉏豪強兼并之家舞文巧詆以輔法百姓不安其生騷動縣官所興未獲其利姦吏並侵漁於是痛繩以罪自公卿以下至庶人咸指湯會人有盜發孝文園瘞錢丞相青翟朝與湯約俱謝湯念獨丞相以四時行園湯無與也不謝上使御史案其事湯欲致其文丞相見知丞相患之三長史皆害湯合謀曰吾知湯隂事使吏捕案湯左田信等曰湯欲奏請信輒先知之居物致富與湯分之天子使使簿責湯湯不服於是上使趙禹責湯禹讓湯曰君所治夷滅者幾何人矣今人言君皆有狀天子欲令君自為計何多以對簿為湯乃自殺史記酷吏傳杜周南陽杜衍人徙茂陵少言重遲而內深刺骨為廷尉其治大抵放張湯善候伺上所欲擠者因而陷之上所欲釋久繫待問而微見其寃狀二千石繫者新故相因不減百餘人郡吏太府舉之廷尉一嵗至千餘章章大者連逮證案數百小者數十人逺者數千里近者數百里會獄吏責如章告劾不服以掠笞定之於是聞有逮證皆亡匿獄久者至更數赦十餘嵗而相告言大抵盡詆以不道以上廷尉及中都官詔獄逮至六七萬人吏所增加十有餘萬後為執金吾遂捕桑𢎞羊衛皇后昆弟子刻深上以為盡力無私遷御史大夫周久任事列三公兩子夾河為郡守家資纍巨萬治皆酷暴惟少子延年行寬厚云漢書本傳田延年字子賓先齊諸田徙陽陵以材略給事大將軍幕府霍光重之遷長史出為河東太守姦邪不敢發入為大司農會昌邑王嗣立淫亂霍將軍與公卿議廢之莫敢發言延年按劍廷叱羣臣即日議決宣帝即位以決疑定䇿功封陽成侯先是茂陵富人焦氏賈氏隂積炭葦諸物昭帝大行用度未辦延年奏言商賈或豫收方上不祥器物冀其疾用欲以求利非民臣所當為請沒入縣官奏可富人亡財者皆怨出錢求延年罪初大司農取民牛三萬兩為僦載沙便橋下送致方上車直千錢延年上簿詐增僦直車二千凡六千萬盜取其半焦賈兩家告其事下丞相府議霍將軍召問延年抵無是事將軍曰即無事當窮竟延年自刎死漢書本傳田廣明字子公鄭人以郎為天水司馬遷河南都尉以殺伐為治郡國盜賊並起遷為淮陽太守嵗餘故城父令公孫勇與客胡倩等謀反詐稱光祿大夫從車騎數十言使督盜賊止陳留傳舍廣明發兵皆捕斬焉上以廣明連擒大姦徵入為大鴻臚擢兄雲中為淮陽太守昭帝時廣明將兵擊益州還徙衛尉後出為左馮翊治有能名宣帝初立為御史大夫嵗餘以祁連將軍將兵擊胸奴出塞至受降城受降都尉前死喪在堂廣明召其妻與姦既出不至質引軍空還下太僕杜延年簿責廣明自殺闕下兄雲中為淮陽守亦敢誅殺吏民守闕告之坐棄市漢書本傳陳遵字孟公杜陵人祖遂元帝時為廷尉遵舉能治劇補郁夷令與扶風相失自免去槐里大賊趙朋霍鴻等起遵為校尉擊朋鴻有功遵嗜酒每大飲賓客滿堂輒關門取客車轄投井中雖有急終不得去遵大率常醉然事亦不廢略涉記傳贍於文辭性善書與人尺牘主皆藏去以為榮請求不敢逆所到衣冠懷之惟恐在後凡三為二千石王莽敗客池陽更始至長安大臣薦遵為大司馬護軍使胸奴單于欲脅詘遵陳利害為言屈直單于大竒之會更始敗遵留朔方為賊所敗時醉見殺漢書本傳原涉字巨先祖父武帝時以豪傑自陽翟徙茂陵涉父為南陽太守涉父死讓還南陽賻送行喪冡廬三年由是顯名京師舉能治劇為谷口令谷口聞其名不言而治先是涉季父為茂陵秦氏所殺涉自劾去官欲報仇谷口豪傑為殺秦氏亡命嵗餘逢赦出郡國豪傑及長安五陵諸為氣節者皆歸慕之涉自以先讓賻送得名而令先人墳墓儉約非孝也乃大治起冢舍費用皆卭富人身衣服車馬才具妻子內困專以賑施貧窮赴人之急為務涉上冡奴買肉乘涉氣斫傷屠者茂陵守令尹公知涉名豪欲以示衆勵俗新豐人王遊公素嫉涉説尹公墮壞涉冢舍涉遂劫遊公父及子斷兩頭去涉性似郭解外溫仁謙遜而內隱好殺王莽末兵起諸王薦涉能得死士莽召見拜鎮戎大尹長安敗更始將軍申屠建請涉相見大重之故茂陵令尹公壞涉冡舍者為建主簿涉使客刺殺主簿欲亡去建遣兵徼取涉於車上遂斬涉哀平間郡國處處有豪傑其名聞州郡者霸陵杜君敖池陽韓幼孺馬嶺繡君賓西河漕中叔皆有退讓之風中叔子少遊復以俠聞於世云漢書本傳吕布字奉先九原人丁原屯河內以布為主簿甚見親待董卓誘布殺原并其兵以為騎都尉稍遷至中郎將卓行止常以布自衛嘗小失卓意卓拔手戟擲之布拳捷得免由是隂怨卓王允時密謀誅卓因告布使為內應許之乃刺殺卓李傕等攻長安布戰敗奔袁術復去從張楊於河內楊諸將欲圖之布懼投袁紹布將士多暴橫紹患之布歸張楊道經陳留太守張邈與陳宫等迎布為兖州牧據濮陽郡縣多應之曹操引軍擊布盡收諸城布東奔劉備時備與袁術相拒術欲引布擊備乃與布書送米二十萬斛布大悅即勒兵襲下邳備敗走布恚術運糧不至乃迎備屯小沛術懼為子求婚於布布遣女沛相陳圭恐徐揚合從為難未已往説布布乃絶婚術怒遣大將張勳等與韓暹楊奉連勢攻布布用圭策與暹奉書許破術兵悉以軍資與之遂共擊勳等於下邳大破之建安三年布復從術攻劉備於沛操自將擊布布欲降宫等阻之曹軍壅沂泗以灌其城三月布乃降見曹曰明公所患不過於布今服矣令布將騎明公將步天下不足定也操命緩布縛備曰不可明公不見布事丁原董卓乎遂縊殺之後漢書本傳李休字子朗有智略張魯前為鎮北將軍休為司馬家南鄭時漢中有甘露降子朗見張魯精兵數萬人有四塞之固遂建言赤氣久衰黃家當興欲魯舉號魯不聽會魯敗太祖以其勸魯內附賜爵關內侯歷上黨巨鹿二郡守拜儀郎子勝少遊京師雅有才智與曹爽善爽輔政徵為洛陽令纍遷滎陽太守河南尹勝前後所宰守未嘗不稱職後遷荆州刺史魏略勝出為荆州刺史詣宣王宣王稱疾困篤勝不能覺謂之信然宣王收爽勝伏誅夷三族魏志曹爽傳孟他扶風人靈帝時中常侍張讓專朝政讓監奴典護家事他仕不遂乃盡以家財賂監奴奴與共結親積年家業為之破奴慙問他所欲他曰欲得卿曹拜耳奴許諾時賓客求見讓者或纍日不得通他甫到衆奴皆迎車百拜徑將他車獨入衆人悉驚異他與讓善爭以珍物遺他他得之盡以賂讓讓喜他又以蒲桃酒一斛遺讓讓即拜涼州刺史他生達後入蜀三輔決録注達副法正迎先主先主因念達留屯江陵蜀平以達為宜都太守建安二十四年命達從秭歸北攻房陵房陵太守蒯祺為達兵所害達將進攻上庸恐難獨任乃遣劉封自漢中乘沔水下統達軍與達會上庸太守申耽舉衆降封與達忿爭奪達鼓吹達恚遂表辭先主率所領降魏魏文帝善之以達領新城太守遣襲封封走還成都三國蜀志劉封傳魏申儀拜魏興太守太和中儀與孟達不和數上言達有二心於蜀達反儀絶蜀道使救不到達死魏略咸熙元年達子興為護督軍徙還扶風三國蜀志劉封傳注晉楊佺期華隂人漢太尉震之後曾祖凖太常自震至凖七世有名德祖林有才望父亮終梁州刺史以貞幹知名佺期沉勇果徑而兄廣及弟思平等皆強獷粗暴自云門户承籍江表莫比時人每排抑之恆慷慨切齒欲因事際以逞其志佺期少仕軍府領衆屯城固苻堅將潘猛拒守康回壘佺期擊走之拜河南太守苻堅將竇衝攻皇天塢佺期擊之纍戰皆捷進號龍驤將軍以疾去職荆州刺史殷仲堪引為司馬仲堪與桓玄舉衆應王恭軍事一委佺期朝廷以佺期為都督梁雍秦三州諸軍事雍州刺史仲堪玄皆有遷換於是俱還尋陽結盟不奉詔朝廷復仲堪本職乃各還鎮佺期仲堪與桓玄素不穆佺期欲與仲堪襲玄仲堪內疑苦止之不得舉隆安三年桓玄舉兵討佺期先攻仲堪仲堪急召佺期佺期曰江陵無食可來見就共守襄陽仲堪紿之曰比來收集已有儲矣佺期率衆赴焉既至仲堪惟以飯餉其軍佺期大怒不見仲堪明日乘艦出戰玄拒之不得進會玄諸軍至佺期退走餘衆盡沒佺期與兄廣俱死弟思平從弟尚保孜敬俱逃劉裕起義始歸國歷位州郡孜敬為人剽鋭果於行事為梁州刺史經襄陽見魯宗之侍衛皆佺期之舊憤見辭色宗之參軍劉千期於座面折之因大怒抽劍刺千期立死宗之表而斬之思平尚保後亦以罪誅楊氏遂滅晉書本傳宋魯爽郿人祖宗之雍州刺史宋武帝討劉毅宗之會江陵自以非武帝舊𨽻有自疑之志北奔入姚氐病卒父軌隨父入姚氐武帝定長安軌北奔魏魏以軌為荆州刺史爽少有武藝軌死代為荆州刺史粗中使酒數有過失太武怒將誅之爽懼密懷歸南計次弟秀小字天念頗有意略仕魏以軍功為中書郎與爽俱來奔文帝以爽為司州刺史秀為滎陽潁川太守孝武帝即位爽謀反左將軍薛安都刺殺之南史本傳杜幼文驥子杜陵人太宗初以軍功為驍騎將軍封邵陽縣男後以發太尉廬江王禕謀反事拜黃門侍郎出為梁南秦二州刺史廢帝元徽中為散騎常侍幼文所蒞貪橫家纍千金女伎數十人絲竹晝夜不絶與沈勃孫超之居止接近常相從又與阮佃夫厚善廢帝不能平於是率宿衛兵誅幼文等宋書杜驥傳北魏冦彌萬年人為尚書郎為陽城王徽所親愛永安末徽避爾朱兆脫身南臺歸命於彌彌不納遣人加害時論深薄之魏書冦讃傳北齊孫騰字龍雀石安人少而質直明解吏事魏正光中北方擾亂間關危險得達秀容屬爾朱榮建義隨榮入洛尋為髙祖都督府長史髙祖為晉州騰為長史髙祖平鄴授騰相州刺史天平初入為尚書左僕射內外之事騰咸知之時西魏遣將冦南兖詔騰為南道行臺率諸將討之騰尫怯無威略失利而還又除司徒武定中使於青州括浮逃户口遷太保騰早依附高祖契濶艱危勤力恭謹深見待信及髙祖置之魏朝寄以心腹遂志氣驕盈與奪由已求納財賄不知紀極在鄴與髙嶽髙隆之司馬子如號為四貴非法專恣騰為甚焉武定六年薨北齊書本傳隋宇文欣字仲樂本朔方人徙京兆幼而敏慧年十二能左右馳射驍捷若飛髙祖龍潛時與欣情好甚協及為丞相恩顧彌隆尉回作亂以欣為行軍總管進臨相州斬獲略盡直趨鄴下回軍大敗及平鄴城以功加上柱國是後每參帷幄出入卧內禪代之際欣有力焉欣既佐命功臣頻經將領有威名於當世上由是微忌焉以譴去官隂圖不軌謀泄伏誅隋書夲傳蘇威字無畏綽子武功人周文帝時襲爵美陽縣公隋文帝受禪徵拜太子少保俄兼納言初威父綽以國用不足為征稅法頗稱為重歎曰所為者正如張弓非平世法也後之君子誰能弛乎威至是奏減務從輕典時髙熲與威同心協贊政刑大小無不籌之遷吏部尚書兼祭酒律令格式多威所定拜尚書右僕射國子博士何妥奏威朋黨復言威以曲道任其從父弟徹肅等罔冒為官上令按之事皆驗免威官爵未幾復拜納言仁夀初拜右僕射時天下大亂威知帝不可匡正甚患之屬帝問盜賊事宇文述曰盜賊少威曰臣非職司不知多少但患其漸近帝不悅裴藴希旨奏威典選濫授人官於是除名其年從幸江都宇文化及弒逆以威為開府儀同化及敗歸李密密敗歸東都王世充僭署太師威自以隋室舊臣遭逢喪亂所經之處皆與時消息以求容免太宗平王世充威請謁見稱老病不能拜上遣人數之曰公隋朝宰輔政亂不能匡救致令品物塗炭君弒國亡見李密世充皆拜伏舞蹈今既老病無勞相見入長安至朝堂請見又不許終於家威行己清儉然每至公議惡人異已無大臣體所修格令章程頗傷煩碎論者以為非簡久之道大業末年尤多征役至於論功行賞威每承望風旨輒寢其事時羣盜蜂起郡縣有奏聞者又訶詰使人令減賊數故出師攻討多不尅捷由是遂致敗亂為物議所譏隋書本傳唐侯君集三水人太宗在藩引入幕府數從征伐建成元吉之誅也君集之策居多貞觀四年遷兵部尚書參議朝政君集出自行伍素無學術及被任遇方始讀書典選舉定考課並有時譽髙昌王麴文泰遏絶西域詔以君集為交河道行軍大總管討之遂平其國君集初破髙昌未奏請輒配沒無罪人又私取寶物有司請推其罪詔下獄中書侍郎岑文本疏奏乃釋君集殊怏怏尋與諸功臣同畫像凌煙閣時庶人承乾在東宫恐有廢立數問以自安之術君集遂贊承乾隂圖不軌及事發被收羣臣爭請誅之太宗謂君集曰與公長訣矣遂斬之籍其家舊唐書楊纂字續卿𢎞農族父華隂人大業時第進士髙祖度河上謁長春宫遷纍侍御史後為吏部侍郎有俗才抑文雅進黠吏度時舞數以自進終户部尚書唐書楊𢎞禮傳羅藝字子延襄陽人家京兆之雲陽父榮隋監門將藝剛愎不仁勇攻戰大業中自稱幽州總管宇文化及至山東遣使招藝藝斬使者為煬帝發喪時竇建德髙開道亦遣使於藝藝謂官屬曰建德等皆劇賊不足共功名唐公民望所係王業必成吾決歸之武德二年奉表以地歸詔封燕王藝弟監門將軍夀以兵從請入朝帝厚禮之拜左翊衛大將軍藝負其功不少屈秦王左右嘗至其營藝疻辱之時突厥橫放籍藝威名詔以本官鎮涇州太宗即位進開府儀同三司藝內懼乃圖反稱密詔入朝治中趙慈皓統軍楊岌謀誅藝藝敗左右斬之夀時為利州都督亦反誅唐書本傳豆盧欽望萬年人祖寬隋梁泉令髙祖定關中率豪姓進欵擢纍殿中監子懷讓左衛大將軍欽望纍官越州都督擢尚書左僕射平章軍國重事居宰相積十餘年方易之三思等怙勢宣蒸窺間王室觖冀非常不能有所裁抑獨謹身自全卒年八十唐書本傳姚璹字令璋思廉孫萬年人少孤力學永徽中舉明經第補太子宫門郎遷中書舍人武后時擢夏官侍郎坐從弟敬節叛貶桂州長史后方以符瑞自神璹取山川草樹名有武字者以為上應國姓裒類以聞后大悅擢文昌左丞證聖初加秋官尚書明堂火后欲避正殿應天變璹奏此人火非天災也不宜避正殿貶常禮后乃更御端門大酺燕羣臣與相娛樂遂造天樞著已功德命璹督之功費浩廣見金不足乃斂天下農器并鑄以功賜爵一級坐纍下遷益州長史始蜀吏暴貪璹擲發之無所容貸后聞降璽詔慰勞浮屠理中謀據劍南有密告者詔璹按其獄疑似捕逮株聫數千人道路寃譟拜地官冬官二尚書久之致仕卒唐書姚思廉傳韋巨源與安石同系萬年人有吏幹武后時纍遷夏官侍郎同鳳閣鸞臺平章事其治委碎無大體神龍初以吏部尚書同中書門下三品時要官缺執政以次用其親巨源秉筆當除十人楊再思得其一餘皆諸宰相近屬再思喟然巨源曰時當爾爾士大夫莫不解體尋遷侍中貝州大水刺史宋璟議免其租巨源以為蠶桑可輸由是河朔人多流徙者景龍二年韋后自言衣笥有五色雲巨源勸中宗宣布天下帝從其言因是大赦巨源見帝昏惑乃與宗楚客等推據祥妖隂導韋氏行武后故事俄遷尚書左僕射仍知政事帝方南郊巨源請后為亞獻而自為終獻及臨淄王平諸韋亂兵殺之唐書本傳竇懷貞始平人少詭激仕纍清河令有治狀神龍中進左御史大夫兼檢校雍州長史會嵗除中宗夜宴近臣謂曰聞卿喪妻今繼室可乎懷貞唯唯俄而禁中寶扇障衛有衣翟衣出者乃韋后乳媪王所謂莒國夫人者故蠻婢也懷貞納之世謂媪壻為阿㸙時懷貞每謁見奏請輒自署皇后阿㸙人或謂為國㸙軒然不慚以自媚於后又附宗楚客安樂公主等以取貴位韋后敗斬妻獻其首貶濠州司馬景雲初以殿中監召再遷侍中方太平公主干政懷貞日詣主第刺取所欲睿宗為金仙玉真二公主營觀諫者交疏不止惟懷貞勸成之躬護役作弟維鍌諫曰公位上衮當思輔天子而計較瓦木厠身工匠間使海內何所瞻仰不答督繕益急時語曰前作后國㸙後為主邑丞言事公主如邑官屬也玄宗受禪進左僕射與太平公主謀逆既敗投水死然生平所得俸祿悉散親族敗時惟米數石而已性諂詐宦者用事尤所畏奉或見無鬚者誤為之禮從子兢舉明經為郪令百姓德之唐書本傳祝欽明字文思始平人擢明經為東臺典儀拜著作郎為太子率更令中宗在東宫欽明兼侍讀授太子經中宗復位擢國子祭酒同中書門下三品進禮部尚書封魯國公桓彥範崔玄暉袁恕已敬暉等皆從受周官大義朝廷尊之以匿親忌日為御史中丞蕭至忠所劾貶申州刺史入為國子祭酒景龍三年天子將郊欽明與國子司業郭山惲隂迎韋后意謬立議后當助天子祀天神祭地祇帝果用其言以皇后為亞獻帝與羣臣宴欽明自言能八風舞帝許之欽明體肥醜據地搖頭睆目左右顧盼帝大笑吏部侍郎盧藏用歎曰是舉五經掃地矣景雲初侍御史倪若水劾奏欽明等腐儒無行以諂佞亂常不宜在朝乃貶饒州刺史欽明於五經為該淹自見坐不孝免無以澡祓乃阿附韋氏圖再用又坐是見逐諸儒羞之後入為崇文館學士卒唐書本傳王璵方慶六世孫咸陽人少為禮家學玄宗在位久推崇老子道好神仙事廣修祠祭靡神不祈璵上言請築壇東郊祀青帝天子入其言擢為祠祭使璵專以祠解中帝意有所禳祓大抵類巫覡漢以來葬喪皆有瘞錢後世里俗稍以紙寓錢為鬼事至是璵乃用之肅宗立纍遷太常卿又以祠禱見寵乾元三年拜同平章事乃奏置太一壇勸帝身見九宫祠帝嘗不豫太卜建言祟在山川璵遣女巫乘傳分禱天下名山大川巫皆盛服中人護領所至干託州縣賂遺狼籍卒贈開府儀同三司唐書本傳元載字公輔岐山人天寶初䇿髙第補新平尉纍遷户部侍郎李輔國妻載宗女也因相締昵拜同中書門下平章事代宗立輔國勢愈重數言其才進拜中書侍郎未幾判天下元帥司馬盜殺李輔國載與其謀復結中人董秀刺取密旨探微揣端無不諧契魚朝恩驕橫震天下與載不叶乃乘間奏誅朝恩初四鎮北庭行營節度使寄治涇州大厯八年吐蕃冦邠寧議者謂涇州不足守載嘗在西州具知河西隴右要領乃言於帝曰國家西境極於潘原吐蕃防戍乃在摧沙堡而原州界其間草薦水甘舊壘存焉請徙京西軍戍原州乘間築作二旬可訖是為斷西戎脛朝廷髙枕矣田神功沮短其議帝疑不決載智略開果久得君以為文武才略莫已若外委主書卓英倩內劫婦言縱諸子關通貨賄京師要司及方面皆擠忠良進貪猥開南北二第室宇奢廣帳帟什器名姝異伎雖禁中不逮帝深戒之載卒謷然不悛會李少良上書詆其醜載奏殺少良道路目語帝積怒大厯十二年收載賜自盡妻王及子伯和仲武季能並賜死發其祖父冢斫棺棄尸籍其家董秀卓英倩悉論死英倩弟英璘家金州州人緣以授官者百餘豪制鄉曲聚無賴以伺變恃載權牧宰莫敢問載敗盜庫兵據險叛詔發兵討捕刺史孫道平禽殺之唐書本傳楊炎字公南天興人祖哲以孝行稱父播舉進士退居求志炎文藻雄蔚豪爽尚氣父喪廬墓終喪為司勳員外郎遷中書舍人元載與炎同郡炎又元出也親重無比會載敗坐貶道州司馬德宗即位拜門下侍郎同平章事初定令有租賦庸調法開元承平久不為版籍百役並作賦斂之司數四莫相統攝權臣巧吏託進獻為贓盜者動萬萬計故課免於上而賦增於下炎疾其弊乃請為兩稅法户無主客以見居為簿人無丁中以貧富為差其田畝之稅則以大厯十四年墾田之數為凖而均收之夏稅盡六月秋稅盡十一月嵗終以户賦增失進退長吏而尚書度支總焉天下利之炎素德元載思有以報之復議城原州節度使段秀實謂方農事不可興功炎怒追秀實為司農卿又以劉晏劾載己坐貶乃出晏忠州用庾凖為荆南節度使誣晏殺之朝野側目李正已表請晏罪炎乃遣腹心分走諸道聲言宣慰而實自辨言晏往嘗傅會姦邪帝自惡之帝聞使中人復其言於正已還報信然帝意銜之盧把秉政罷為尚書左僕射其子𢎞業賕賂狼籍杞按之並得他過貶崖州司馬賜死初炎矯厲志節頗得名既傅會元載忮害根中不能自止睚眥必讐果於用私終以此及禍唐書本傳竇參字時中刑部尚書誕四世孫平陵人學律令為人矜嚴悻直以蔭纍為萬年尉同舍當夕直者聞親疾惶遽參為代之會失囚京兆按直簿劾其人參曰彼往參當坐乃貶江夏尉人皆義之進大理司直按江淮獄入為御史中丞德宗數召見語天下事或決大議帝器之俄以中書侍郎同中書門下平章事領度支鹽鐵使參無學術不能稽古立事惟樹親黨多所詗察四方畏之於是淄青李納厚饋參外示嚴畏實賂帝親近為間左右爭毁短參申參族子也為給事中參特愛之每議除授多訪於申申或泄之以招權賂所至人目之為喜鵲帝聞戒參曰卿他日必為申所纍不如出之以掩物議參曰臣無強子姪申雖踈屬臣素親之不忍逺出請保無他犯帝曰而雖自保如外言何參固陳丐初陸贄與參不平吳通元兄弟與贄軒輊不得申舅嗣虢王則之與通微等善遂共譖贄帝得其姦逐申為道州司馬貶參郴州别駕宣武劉士寧餉參絹五千湖南觀察使以狀聞帝怒貶參歡州司馬賜死於雍州而杖殺申唐書本傳韋渠牟萬年人少慧悟涉覽經史初為道士復為僧興元中韓滉鎮浙西奏授試祕書郎纍轉四門博士貞元十二年四月德宗誕日御麟德殿召渠牟及道士萬參成沙門談延等十二人講論儒道釋三教渠牟枝詞遊説捷口水注上謂其講耨有素聽之意動數日轉祕書郎旬日遷右補闕嵗終遷右諌議大夫延英奏事率漏下五六刻上笑語欵狎往往外聞渠牟形神佻躁無士君子器志尚不根道德頗張恩勢以招趨嚮上既偏聼浮薄率背本衒進以附渠牟遷太府卿又轉太常卿卒舊唐書本傳于頔字允元後周太師謹七世孫蔭補千牛纍遷湖州刺史部有湖陂異時溉田三千頃久廞廢頔行縣命修堤閼嵗獲粳稻蒲魚無慮萬計州地庳濕薄葬者不掩柩頔為坎瘞枯骨千餘人賴以安未幾改蘇州為政有績然暴橫少恩俄遷大理卿為陜虢觀察使益自肆峻罰苛懲官吏惴恐參軍姚峴不勝虐自沈於河貞元十四年拜山南東道節度使時吳少誠叛頔率兵自唐州戰吳房朗山取之禽其將李粲又勝之濯神溝於是請升襄州為大都督府廣募戰士儲良械􅏌然有專漢南意公斂私輸持下益急而慢於奉上俄擅以兵取鄧州天子未始誰何初襄有髹器天下以為法至頔驕蹇故方帥不法者號襄樣節度憲宗立權綱自出頔稍懼願以子尚主帝許之遂入朝拜司空同平章事時宦者梁守謙幸於帝頗用事有梁正言者與頔子敏善敏因正言厚賂守謙求頔出鎮久不報敏怒其紿責所饋誘正言奴支解之家童上變詔頔貶恩王傅子敏竄雷州至商山賜死次子季友奪二官正及方免官久之拜户部尚書又坐季友居喪荒宴削金紫光祿大夫鬱鬱不得意卒方長慶時通豪俠欲事河朔以䇿干宰相元稹而李逢吉黨謀傾執政乃告稹結客刺裴度事下有司驗無狀方坐誅唐書本傳杜亞字次公京兆人肅宗在靈武上書論當世事擢校書郎再遷諫議大夫遷給事中常衮惡之出為江西觀察使德宗立召還亞意必任台宰倍道進與人語皆天下大政或以事祈謁輒相然可帝知不悅罷為陜虢觀察使興元初拜淮西節度使至則治漕渠引湖陂築防庸入之渠中以通大舟夾堤田因得溉灌人皆悅賴然雅意丞弼厭外官往往不親事日夜召賓客言噱流連方春南民為競渡戲亞欲輕駛乃髤船底使篙人衣油綵衣沒水不濡觀沼華邃費皆千金自是府財耗竭貞元中罷歸以檢校吏部尚書留守東都病風痺且廢猶欲固寵奏墾苑中為營田可減度支嵗稟詔許之先是苑地可耕者皆留司中人及屯士占假亞計窘更舉軍帑錢與甸人至秋取菽粟償息輸軍中貧不能償者發囷窖略盡流亡過半又賂中人求兼河南尹帝審其妄賜還卒唐書本傳王遂俌孫咸陽人好興利操下以嚴纍遷鄧州刺史會兵宿淮西亟財賦藉遂幹強拜宣歙觀察使蔡已平師東討李師道為檢校左散騎常侍兼御史大夫始調兵食嵗三百萬俄而賊誅遂簿羡資百萬以獻帝髙其能即拜遂沂兖海觀察使遂資褊刻杖撲皆踰制盛夏治署舍墻垣程督慘峭禆校王辨殺之自知留事帝拜辨開州刺史至徐州械送京師斬東市監軍上遂所製杖出示於朝為戒云唐書王琳傳韋執誼京兆舊族幼有才及進士第對䇿異等授右拾遺年踰冠入翰林為學士便敏側媚得幸於德宗帝誕日皇太子獻畫浮屠像帝使執誼贊之太子賜以帛執誼到東宫謝太子卒見無所藉言乃曰君知王叔文乎美才也執誼由是與叔文善順宗立以疾不親政事叔文用事乃擢為尚書左丞同平章事叔文與王伾居中竊命執誼奉行因迷奪朝權執誼既為所引然外迫公議欲示天下非黨與者乃時時異論相可否密謝叔文曰不敢負約欲共濟國家事爾叔文數為所梗遂成仇怨憲宗受內禪貶執誼為崖州司户參軍死唐書本傳杜元頴如晦五世孫貞元末及進士第以右補闕為翰林學士敏文辭憲宗特所賞歎穆宗以元頴多識朝章尤被寵拜同平章事甫再期出為劍南西川節度使敬宗驕僻元頴每欲中帝意以固幸乃巧索珍異獻之踵相躡於道斂取苛重至削軍食以助裒畜又給與不時戍人寒飢於是人人咨苦戎備不修太和三年南詔乘虛襲戎雋等州遂入成都大掠數日去由是斥為循州司馬死貶所唐書杜如晦傳韋綬字子章萬年人有至性然好不經喪父鑱臂血寫浮屠書建中末為長安尉朱泚亂羸服走奉天拜華隂令三遷職方郎中穆宗為太子綬入侍讀遷諫議大夫方太子幼綬數為俚言以悅太子他日侍太子為帝道之帝怒曰綬當以經義輔導太子而反語此朕何賴焉外遷虔州刺史穆宗立召為尚書右丞集賢院學士出入禁中怙寵甚俄為山南西道節度使入辭乞賜錢二百萬官子元弼太常丞帝以舊恩許之綬耄而貪不能事軍政綱維亂弛卒諡謬醜唐書本傳令狐滈綯子華原人避嫌不舉進士綯輔政滈與鄭皓為姻家怙勢驕偃通賓客射取四方貨財皆側目無敢言懿宗嗣位數為人白發其事綯因丐滈與羣進士試有司詔可是嵗及第長安尉纍遷詹事府司直湮厄不振死唐書令狐楚傳附五代敬翔字子振馮翊人少工書檄為館驛巡官太祖與蔡人戰汴郊翔謀畫多中太祖欣然謂得翔之晚太祖奉昭宗自岐還長安昭宗召翔與李振升延喜樓勞之拜翔太府卿太祖即位以翔為金鑾殿大學士翔深沉有大略從太祖用兵三十餘年細大之務必關之翔亦盡心勤勞晝夜不寢自言惟馬上乃得休息太祖崩友圭立以李振代翔為崇政使莊宗入汴詔赦梁羣臣振邀翔欲俱入見翔夜止髙頭車坊將旦左右報曰崇政李公入朝矣翔歎曰李振謬為丈夫矣復何面目入梁建國乎乃自經而卒五代史本傳韋震字東卿萬年人初名肇為人強敏有口辨事梁太祖為都統判官昭宗幸石門太祖遣震由虢略間道奉表行在昭宗賜名震太祖已破兖鄆遂攻吳大敗於清口太祖懼諸鎮乘間圖已乃諷杜洪鍾傳王師範錢鏐等薦已為元帥且兼求領鄆州昭宗初不許震強辨敢大言語數不遜昭宗卒許梁以鄆州太祖遂兼四鎮表震鄆州留後昭宗遷洛震入為河南尹六軍諸衛副使以病瘖守太子太保致仕太祖受禪改太子太傅末帝即位加太師卒五代史本傳劉景巖延州人為丹州刺史晉髙祖起兵太原唐廢帝調民七出一卒為義兵延州節度使楊漢章發鄉民赴京師將行景巖遣人激怒之義兵亂殺漢章迎景巖為留後晉髙祖即位即拜景巖節度使景巖從事熊皎為人多智隂察景巖跋扈難制因語景巖以為邉地不可以久安為陳保名享利之䇿言邠涇多善田其利百倍宜多市田射利以自厚景巖信之嵗所獲甚多景巖使皎朝京師皎乃言景巖不宜在邊可徙之內地乃移景巖邠州又徙武勝景巖乃悟皎為賣已開運三年景巖罷武勝以太子太師致仕居華州契丹犯京師以周密鎮延州景巖乃還故里而州人逐密立髙允權允權妻劉氏景巖孫女也允權妻嵗時歸省景巖謂曰髙郎一縣令而有此州其可保乎允權意惡之乃誣其反而殺之長子行琮德州刺史亦被誅次子行謙允權婦翁也為奏言非劉氏子遂免不誅五代史本傳姚顗字百真長安人少蠢不修容止舉進士事梁為中書舍人唐莊宗滅梁貶復州司馬已而以為散騎常侍兼吏部尚書左丞廢帝擇宰相拜顗同平章事顗為人仁恕不知錢帛數御家無法在相位齷齪無所為唐制吏部分為三銓尚書曰尚書銓侍郎二人曰中銓東銓天成中詔三銓合為一顗為相復分為三選人多不便之往往遮宰相喧訴不遜顗無如之何晉髙祖立罷為户部尚書卒五代史本傳楊思權邠州新平人事梁為控鶴軍使莊宗滅梁以為甲夾馬都指揮使明宗時秦王從榮為河東節度使使思權為北京步軍都指揮以佐佑之從榮素驕多不法時宋王從厚為河南尹謙恭好禮明宗遣人語從厚之善以諷勉之從榮謂思權曰我將廢矣奈何權曰公有甲士而思權在何患也乃勸從榮募死士以為備明宗召思權還京師後為羽林都指揮使將兵戍興元潞王從珂反鳳翔興元張虔釗會兵討賊思權攻城西破兩關城從珂登城呼外兵告以已非反者軍士反逐虔釗思權因呼其衆曰潞王真吾主也即擁軍士入城降從珂乃出紙於懷中曰願志臣姓名以為驗從珂即書曰可邠寧節度使廢帝立即拜思權靜難軍節度使後為左衛上將軍卒五代史本傳趙瑩字元暉華隂人為人純厚美風儀事梁將康延孝為從事晉髙祖為保義軍節度使以瑩掌書記自是徙鎮常以瑩從髙祖將起兵瑩勸髙祖無反髙祖即位纍拜中書出為晉昌節度是時出帝童昏馮玉等用事以瑩柔弱易制復引為相契丹滅晉瑩從出帝北徙虜中為太子太保子易則易從當其北徙與易從俱易則留事漢官刑部郎中五代史本傳蘇逢吉長安人漢髙祖鎮河東父悅為髙祖從事逢吉常代悅作奏記悅言之髙祖髙祖以為節度判官高祖性剛嚴賓佐稀得請見逢吉獨入終日侍立髙祖書閣中兩使文簿盈積莫敢通逢吉輒取內懷中伺高祖色可犯時進之高祖多以為可以故甚愛之然為人貪詐無行喜為殺戮高祖嘗生日遣逢吉疏理獄囚祈福謂之靜獄逢吉入獄無輕重曲直悉殺之以報曰獄靜矣高祖建號拜同平章事時制度草創逢吉素不學問隨事裁決出其意見不施德政時天下多盜逢吉草詔下州縣凡盜所居本家及鄰保皆族誅由是殺人滋濫嘗從髙祖征鄴數使酒辱周太祖太祖恨之隱帝立太祖起兵官軍敗逢吉自殺於民舍五代史本傳宋竇貞固字體仁白水人父專後唐左諫議大夫貞固能屬文同光中舉進士授河東節度推官時晉祖在藩以貞固亷介甚重之及即位擢為户部員外郎就拜中書舍人少帝即位遷禮部尚書知貢舉舊制進士夜試繼以三燭長興二年改令晝試貞固以晝晷短難盡士材奏復夜試擇士平允時論稱之改刑部尚書漢祖入汴貞固率百官見於滎陽西初營宗廟帝以姓自漢出遂襲國號尊光武為始祖並親廟為五詔羣臣議貞固上言陛下重興漢祚伏請立髙曾祖禰四親廟更立始祖在四廟之外尊髙皇帝光武皇帝為始祖法文王武王不遷之制用歷代六廟之規庶合典禮漢祖從之論者以為非禮拜司徒門下侍郎平章事隱帝即位加司徒楊邠史𢎞肇王章樹黨恣橫專權凌上貞固但端莊自持不能規救周祖兵起貞固遂詣周祖周祖登位加兼侍中俄罷相守司徒封沂國公世宗即位以范質為司徒貞固遂歸洛陽齒為編民宋初貞固詣范質求任東宫三少質不為奏乃還洛病困自為墓志卒宋史本傳王易簡字國寶萬年人性介特寡合曾祖朏劍州刺史祖逺連州刺史父貫唐州刺史易簡少好學工詩梁乾化中舉進士召為右拾遺上書忤旨出為鄧州節度推官後唐同光中為魏王府記室參軍明宗即位周帥羅周恭辟為掌書記府罷退居華隂作小隱詩二十首秦王從榮聞而重之召為祠部員外郎晉初拜御史中丞吏部侍郎判吏部銓晉祖在大梁臺省湫隘易簡奏舉故事得元省錢二百萬繕治省署及造器物周初遷禮部尚書俄改刑部判兵部顯德四年致仕宋初加少保卒子景讓進士及第至尚書郎宋史本傳蘇曉武功人父瓚仕後唐歷祕書少監長興初曉辟鄧州從事漢祖鎮太原表為觀察使歷屯田郎中宋乾德三年出為淮南轉運使建議𣙜蘄黃舒廬夀州茶置十四場規其利嵗八百餘萬緡開寶三年改西川轉運使仍掌京城市征擢拜左諫議大夫七年監在京啇稅九年卒曉深文少恩當時號為酷吏及卒無子有一女甚鍾愛亦先曉卒人以為深刻所致宋史本傳崔嶧字之才長安人進士及第知遂州建議瞿塘峽置關如劍門以察姦人徙提點刑獄嘉陵江嵗調民丁治堤堨嶧更用州兵代役文州蕃卒數剽攻邊户嶧請守臣嵗時行邉益募勇壯伺其發一切捕擊之後無復內冦就除河東轉運使會更錢法潞州民大擾推其首惡誅之人心遂定後遷集賢院學士知河中府嶧所至貪姦比老益甚至河中請老以刑部侍郎致仕卒宋史本傳王陶字樂道萬年人第進士嘉祐初為監察御史裏行神宗立拜御史中丞郭逵以簽書樞密宣撫陜西詔令還都陶言韓琦置逵二府至用太祖故事出師劫制人主琦必有姦言惑亂聖德願罷逵陶始受知於琦帝初臨御陶料必易置大臣欲自軌重位故視琦如仇力攻之帝徙陶為翰林學士出知陳州入權三司使吕公著言其反覆不可近以東宫舊臣加觀文殿學士帝薄其為人不復用元豐三年卒陶微時苦貧寓京師其友薑愚氣豪樂施一日大雪念陶奉母寒荷一鋪剗雪行二十里訪之陶母凍坐日高無炊煙愚亟解所衣錦裘質錢買酒肉薪炭又捐數百千為之娶陶既貴尹洛愚老而喪明往謁之意陶必念舊哀已陶對之邈然但出尊酒而已愚大失望歸而病死聞者益薄其為人宋史本傳姚古兕子五原人以邊功官纍熙河經略靖康元年金人逼京城古與种師中俱勤王种師道與古子平仲先已率兵入衛兩家子弟各不相下平仲恐功獨歸种氏乃夜劫斡里雅布營反為所敗尼雅滿陷隆德府以古為河東制置种師中副之古總兵援太原師中援中山河間諸郡古進兵復隆德府威勝軍扼南北關師中與金人戰互有勝負太原圍不解師中進師平定乘勝復夀陽榆次朝廷數使人趣師中戰約古及張灝兩軍齊進而二人失期不至師中敗而死金人迎古于盤陀古兵潰退保隆德中丞陳過庭奏古罪不可恕詔安置廣州宋史姚兕傳劉延慶保安軍人世為將家數從西伐立戰功積官至鄜延路總管遷節度從北伐以宣撫都統制督兵十萬渡白溝延慶行軍無紀律郭藥師叩馬諫不聽至良鄉遼將蕭幹帥衆來延慶與戰敗績遂閉壘不出藥師曰幹兵不過萬人今悉力拒我燕山必虛願得竒兵五千倍道襲取令公子三將軍簡師為後繼延慶許之藥師先入燕城幹舉精甲三千巷戰三將軍光世渝約不至藥師失援敗走延慶營於盧溝橋南明旦見火起以為敵至燒營而奔相蹂踐死者百餘里自熙豐以來所儲軍實殆盡燕人作賦及歌誚之靖康之難延慶分部守京城城陷引秦兵萬人奪開逺門以出為追騎所殺宋史本傳光世字平叔延慶次子初以蔭補三班奉職纍升鄜延路鈐轄康王即位以功加檢校少保命討李成執其謀主陶子思加檢校太保殿前都指揮使苗劉為亂素憚光世遷淮南制置使張浚在平江馳書諭以勤王不從吕頥浩遣使説之乃引兵會韓世忠破之命為江東宣撫使受杜充節制光世言受充節制有不可者六帝怒詔毋入光世殿門光世始受命隆祐太后在南昌議者謂金人自蘄黃渡江陸行二百里可至命光世移屯江州為屏蔽光世既至日置酒高會金人自黃州渡江凡三日無知者比金人至遂遁授浙西安撫大使知鎮江府光世言安撫控制一路若但守鎮江則他郡有警不可離任望别除守臣光世專充安撫使從便置司時光世慮金人必過江故預擇便地帝覺之止許增辟通判金兵留淮東光世畏其鋒楚州被圍已百日帝手札趣光世援楚者五竟不行但遣王德酈瓊將輕兵以出時奏殺獲而已授檢校太傅張浚言其沈酣酒色不恤國事乞賜罷斥光世引疾罷宋史本傳金鄭建充字仲實其先京兆人占籍鄜州仕宋纍官知延安府事天會七年來降仍知延安府宋劉光烈來攻建充擊破之遷京兆府路兵馬都監敗宋曲端於彭原高昌宗據延安為宋守建充擊之盡復城邑復知延安軍府事朝廷以地賜宋為宋環慶路經略安撫副使仍知寧州天眷復取陜西仍以為經略安撫使知慶州從破甘谷城改平涼尹時營建南京宫室大發河東陜西材木浮河而下筏工多沉溺有司不敢以聞乃誣以逃亡錮其家建充白其事錮者得釋建充性剛暴常畜猘犬十數奴僕有罪既笞已復嗾犬齒之骨肉都盡郡省部文移有不應法度輒置之坐下或即毁裂由是在位者銜之軍胥李換誣充藏甲欲反死於獄中長子訴亦死焉金史本傳明吕震字克聲臨潼人洪武中鄉舉入太學朝廷行天下則壤均賦震承檄之兩浙報命稱任使擢山西按察僉事入為户部主事尋出為北平按察僉事成祖潛邸恭順有勞及即位纍擢刑部尚書轉禮部命兼領户兵二部事震深中寡言當其獨坐深念以手指刮眉毛則必有精思密計諸官屬相誡無敢白事主事尹昌隆白震事震獨坐不應少選復前震怒拂衣起曰君自行之何以問為昌隆不得請有語以公舊事東宮皇太子素重公何不取令旨行之昌隆從其計震怒奏昌隆上為下昌隆獄尋赦復官後數年谷王謀反以王嘗保奏昌隆為長史坐昌隆與謀下公卿雜問昌隆力辨震折之夷其族仁宗朝加太子太保宣德元年病面疽宛轉病呼曰尹相尹相家人問故曰尹昌隆守而欲殺我震竟死名山藏王命字子將同州人嘉靖己酉舉人慷慨有膽略乙卯嵗凶地震盜賊所在鈔掠命時宅憂糾宗守望其弟弗良即勒令自盡於是威望大著州使君聞之就命問計因假之事權命乃墨衰仗劍巡行鄉聚訪緝大小偷或梃或刺死者枕藉道路以目盜賊雖少戢然中多濫及無辜亦有斃於睚眥者後銓知蔚州不久卒官同州志陜西通志卷六十四
