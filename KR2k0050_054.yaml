body:
  text: 陜西通志巻五十四名宦僚佐將弁僚佐漢張元字君夏河内河陽人建武初舉明經遷陳倉縣丞清淨無欲專心經書方其講問乃不食終日及有難者輒為張數家之説令擇所安諸儒皆伏其多通著録千餘人元初為縣丞嘗以職事對府不知官曹處吏白門下責之時右扶風瑯邪徐業亦大儒也聞元諸生試引見之與語大驚曰今日相遭眞解矇矣遂難問極日後漢書儒林傳郭基京兆督郵永平初東平王蒼以至戚輔政開東閣延英雄班固奏記説蒼曰京兆督郵郭基孝行著於州里經學稱於師門政務之績有絶異之效如得及明時秉事下僚進有羽儀奮翮之用退有把梁一介之死後漢書班固傳北魏李思穆字叔仁隴西狄道人為京兆内史在郡八年頗有政績魏書李寳傳分按内史本秦官掌治京師漢時三輔未設置左右内史者是也此内史與秦漢時不同只是僚佐耳崔長文字景瀚清河鄃人少徙於代正始中雍州撫軍府長史以亷愼稱魏書崔光傳栁慶字更興河東解人孝武八年遷大行臺郎中領北華州長史尋兼雍州别駕廣陵王元欣魏之懿親其甥孟氏屢為凶横或有告其盜牛慶捕推得實趣令就禁孟氏殊無懼容乃謂慶曰今若加以桎梏後復何以脱之欣亦遣使辨其無罪孟氏繇此益驕慶於是大集僚吏盛言孟氏依倚權戚侵虐之狀言畢便令笞殺之此後貴戚斂手不敢侵暴有賈人持金二十斤詣京師交易寄人停止常自執管鑰無何失之謂是人所竊郡縣訊問主人遂自誣服慶聞乃召問賈人曰頗與人同宿乎曰無與人同飲乎曰日者曾與一沙門再度酣宴醉而晝寢慶曰主人非盜也彼沙門乃盜耳即遣吏捕得盡獲所失之金十二年詔以慶為計部郎中别駕如故有胡家被刼莫知賊所被囚繫者甚多慶以賊徒既衆似是烏合既非舊交必相疑阻可以詐求之乃作匿名書榜官門曰我等共刼胡家徒侣混雜終恐泄露若聽先首免罪便欲來告慶乃復施免罪之榜居二日廣陽王家奴面縳自告榜下因此推窮盡獲黨與慶之守正明察皆此類也世宗時為雍州别駕領京兆尹周書本傳魏按本傳失書帝年號以前後事推之當是大統間也北周樂運字承業南陽淯陽人性方直未嘗求媚於人天和初起家夏州總管府倉曹叅軍建德二年除萬年縣丞抑挫豪右號稱彊直高祖嘉之特許通籍事有不便於時者令巨細奏聞仍超拜京兆郡丞周書顔之儀傳附隋長孫熾洛陽人建德二年授雍州倉城令尋轉盩厔令頻宰二邑考績連最及高祖受禪攝長安令與大興令梁毗俱為稱職然毗以嚴正稱熾以寛平顯為政不同部内各化尋遷雍州贊治隋書本傳梁毗字景和安定烏氏人開皇初轉大興令遷雍州贊治直道而行無所迴避北史本傳髙構字孝基北海人遷雍州司馬以明斷見稱坐事左遷盩厔令甚有能名上善之復拜雍州司馬北史本傳韓則南陽人開皇中為延州長史甚有惠政隋書高構傳附榮毗字子諶北平無終人開皇中以華隂多盜賊妙選長吏楊素薦為華州長史世號為能素田宅多在華隂左右放縱毗以法繩之無所寛貸毗因朝集素謂之曰舉卿適以自罰也毗答曰奉法一心但恐累公所舉時晉王在揚州宻占京師消息遣張衡於旅次置馬坊以畜牧為辭實給私人也州縣莫敢違毗獨遏絶其事上聞而嘉之北史本傳裴藴河東聞喜人歴洋州刺史有能名大業初考績連最拜京兆贊治發擿纎毫吏民懾憚隋書本傳骨儀天竺胡人性剛鯁開皇初為御史煬帝嗣位遷尚書左司郎於時朝政漸亂貨賄公行而儀勵志守節介然獨立帝嘉其清苦超拜京兆郡丞公方彌著時京兆内史頗行詭道輒為儀所執正北史隂壽傳附唐張行成字德立定州義豐人擢制舉乙科改陳倉尉高祖謂吏部侍郎張鋭曰今選吏豈無才用特達者朕將用之鋭言行成調富平主簿有能名唐書本傳雲得臣武德七年為治中自龍門引河溉田六千餘頃馬志盧莊道擢甲科授長安尉太宗將録囚徒京宰以莊道幼年懼不舉欲以他尉代之莊道不從曰但閒暇不之省也時繫囚四百餘人令丞深以為懼翼日太宗召囚莊道乃徐狀以進引諸囚入莊道評其輕重畱繫月日應對如神太宗驚異即日拜監察御史大唐新語李義琰隴西人貞觀中為華隂縣尉縣忽失一人莫知所在其父兄疑讐家所害詣縣陳情義琰案之不能決夜中執燭委細窮問據案俛首不覺死人即至猶帶被傷之狀云某乙打殺置於某所井中公可早驗不然恐被移向他處不可尋覔義琰即親徃果如所陳而讐家始具欵伏當時聞見者莫不驚歎法苑珠林劉仁軌字正則尉氏人轉陳倉尉部人折衝都尉魯寜者豪縱犯法縣莫敢屈仁軌約不再犯而寜横暴自如仁軌榜殺之州以聞太宗曰尉而殺吾折衝可乎對曰寜辱臣臣故殺之帝以為剛直擢咸陽丞貞觀十四年校獵同州時秋斂未訖仁軌諌曰今兹澍澤霑足百榖熾茂収纔十二常日贅調已有所妨又供獵事繕橋治道役雖簡省猶不損數萬少延一旬使場圃畢勞陛下六飛徐驅公私交泰璽書褒納唐書本傳鄭儋為高陵縣尉平居亷静號曰雲翁賈志劉延祐彭城人擢進士補渭南尉有吏能治第一李勣戒之曰子春秋少而有美名宜稍自抑無為出人上延祐欽納白孔六帖薛鼎蒲州汾隂人高宗時為山南道副大使開屯田以實倉廩舊志裴琰之永徽中為同州司户叅軍年甚少不主曹務州刺史李崇義内輕之鐫諭之曰同三輔吏事繁子盍求便官毋留此琰之唯唯吏白積案數百崇義讓使趣斷琰之曰何至逼人乃命吏連紙進筆為省決一日畢與奪當理而筆詞勁妙崇義驚曰子何自晦成吾過耶由是名動一州號霹靂手白孔六帖王珣字伯玉并州祁人天授初及進士第應制科遷藍田尉以拔萃擢長安尉因進見武后召問刑政嘉之唐書王方翼傳盧齊卿幽州涿人長安初為雍州叅軍武后詔長史薛季昶擇僚吏堪為御史者季昶訪於齊卿曰長安尉盧懐愼李休光萬年尉李乂崔湜咸陽丞倪若水盩厔尉田崇璧新豐尉崔日知季昶用其言後皆為通顯巨人唐書盧承慶傳陸大同為雍州司田時安樂公主韋温等侵百姓田業大同盡斷還之長史懼謀出大同會將有事南郊時已十月長史乃舉牒令大同廵縣勸田疇冀搖動其案也大同判云南郊有事北陸已寒丁不在田人皆入室此時勸課切恐煩勞長史益不悦尋復為雍州司倉長吏新興王晉附會太平多阿黨大同終不從因謂大同曰公何不别求好官大同曰某但守公直素無廊廟之望惟以雍州判佐為好官晉不能屈大唐新語裴冕字章甫河東人以廕調渭南尉王鉷為京畿採訪使表署判官明鋭果於事衆號稱職鉷雅任之唐書本傳元結後魏常山王遵十五代孫舉進士第為山南西道節度叅謀募義士於唐鄧汝蔡䧏劇賊五千瘞戰死露胔于泌南名曰哀丘又叅山南東道來瑱府時有父母隨子在軍者結説瑱給以衣食瑱納之瑱誅結攝領府事唐書本傳郎士元字君胄中山人舉進士詔試中書補渭南尉有政名為右拾遺賈志李憕并州汶水人舉明經高第自武功尉以政尤異遷主簿為長安尉天寳初舉美政唐書本傳陸贄字敬輿蘇州嘉興人第進士中博學宏辭調鄭尉罷歸以書判拔萃補渭南尉徳宗立遣黜陟使庾何等十一人行天下贄説使者請以五術省風俗八計聽吏治三科登雋乂四賦經財實六德保罷瘵五要簡官事時皆韙其言遷監察御史唐書本傳李夷簡為鄭縣丞涇軍之亂有使走騾東去甚急夷簡入白刺史曰聞京城有故此使必非朝命請執問之果朱泚使於朱滔者國史補李程字表臣襄邑恭王神符五世孫擢進士調藍田尉縣有滯獄十年程单言輒判京兆狀最遷監察御史唐書本傳張造貞元中渭南尉度支欲砍取兩京道中槐樹造車更栽小樹先符牒渭南縣尉張造造批其牒曰近奉文牒令伐官槐若欲造車豈無良木恭惟此樹其來乆遠東西列植南北成行輝映秦中光臨關外不惟用資行者抑亦曾䕃學徒拔本塞源雖有一時之利深根固蒂須存百代之規况神堯入關先駐此樹元宗幸嶽見立豐碑山川宛然原野未改且邵伯所憩尚自保全先皇舊逰寜宜翦伐思人愛樹詩有薄言運斧操斤情所未忍付司具狀牒上度支使仍具奏聞遂罷造尋入臺國史補陳南仲潁川人貞元十八年為武功丞邑人宜之號為簡靖馬志強循字季先鳯州人仕累雍州司士叅軍華原無泉人畜多渴死循教人渠水以浸田一方利之號強公渠詔書褒予甚厚歴大理少卿唐書姜師度傳附張署貞元中舉進士博學宏詞為校書郎㝷為武功尉治有政績擢監察御史馬志王緯字文卿并州太原人舉明經以書判入等厯長安尉居官以清白稱唐書本傳郭行餘擢累京兆少尹嘗値尹劉栖楚不肯避栖楚捕導從繫之行餘移書曰京兆府在漢時有尹有都尉有丞開元時諸王為牧故尹為長史司馬即都尉丞耳今尹總牧務少尹副焉未聞道路間有下車望塵避者故事猶在栖楚不能答白孔六帖劉潼字子固曹州南華人歴京兆少尹山南有劇賊依山為剽宣宗怒欲討之宰相崔鉉曰此陛下赤子迫於饑寒弄兵山谷間不足討請遣使喻之詔潼馳徃潼挺身直叩其壘曰有詔赦爾罪盜皆列拜潼就館而降唐書劉晏傳薛公達播子寳鼎人擢進士第佐鳯翔軍㑹帥不文嘗集射設的髙數十尺令曰中者酬錦與金一軍莫能中公達執弓矢揖曰請為公歡射三發連中衆大呼笑帥不喜乃自免去唐書薛播傳五代邉蔚初仕後唐為華州記室莊宗伐蜀大軍出於華下時華方闕帥詔令蔚權領軍府事供億軍需甚有幹濟之稱冊府元龜叚思恭澤州晉城人以門廕奏署鎭國軍節度使官開運初出為華商等州觀察支使劉繼勲節度同州辟為掌書記繼勲入朝㑹契丹入汴軍士喧譟請立思恭為州帥思恭諭以禍福拒而弗從乃止宋史本傳宋种詡洛陽人初為吏部令史調補長安主簿清白勤愼卒於官邸馬志周渭字得臣昭州恭城人乾德中通判興州州領罝口砦多戍兵監軍敖狠縱其下為暴居民苦之渭馳徃諭以禍福斬其軍校衆皆懾服詔書嘉奬命兼本砦鈐轄開寳元年鳯州七房冶主吏盜隱官銀擇渭徃代周嵗羨課數倍賜緋魚宋史本傳何晝永新人開寳五年登進士第官鳯翔觀察推官以政事名西江人物志裴莊字端己閬中人以明經登第為高陵縣主簿本府召權司理掾轉運使雷德驤以威望自任嘗廵按至境官屬皆出迎候莊獨視事本局徐謁道周德驤稱其有守徙權忻州録事叅軍宋史本傳錢若水字澹成一字長卿河南新安人雍熈中舉進士釋褐同州觀察推官聽決明允郡治頼之宋史本傳若水為同州推官有富民家小女奴逃亾不知所之奴父母訟於州命録事鞫之録事嘗貸錢富民不獲乃劾富民父子共殺女奴棄屍水中遂失其屍富民不勝榜楚自誣服具上州官審覆無反異若水獨疑之留其獄數日不決一旦詣州屏人言曰若水所以留其獄者宻使人訪求女奴今得之矣知州驚曰安在若水因宻使人送女奴於知州所知州乃垂簾引女奴父母問曰汝今見汝女識之乎曰安有不識因出示之父母泣曰是也乃引富民父子悉破械縱之其人號泣曰㣲使君某滅族矣知州曰推官之賜也其人傾家貲飯僧為若水祈福知州欲奏論其功若水固辭曰若此當置録事於何地耶知州歎服名臣言行録田況字元均其先京兆人後徙居信都況從夏竦辟為陜西經畧判官叅都總管諸將悉兵擊賊况極言其不可乃止又言所以給邉者十四事多見聽用隆平集尹洙字師魯河南人天聖二年進士趙元昊反夏竦開府永興軍洙為通判賊大舉兵冦涇原洙時在慶州得涇原求救書即移文慶帥率其部將劉政鋭兵數千人便道走鎮戎未至賊引去竦奏洙為專徙通判濠州安陽集李素通判邠州事州人以素少年高科始不以吏事期之素鋭精為治所處畫皆出人意表吏民大驚㑹夏虜冦西鄙劉平石元孫戰没邉人恟懼邠州城惡吏民謀内徙以避之時州無守將素攝州事即發民治州城僚吏固争以事當言上待報素曰虜將至何暇顧文法為身計耶且我實為之有罪不爾累乃親度材庀用賦功董役不三旬而畢仁宗聞而嘉之下詔佗州守備當完曰視邠為比温公集胡俛字公謹共城人舉進士高第時西方用師詔舉三路守令轉運使吕覺以俛聞召見為彰化軍節度推官知梁泉縣盜發輒得秩滿為著作佐郎簽書商州判官雞肋集劉几字伯壽洛陽人第進士通判邠州邠地鹵民病遠汲几浚渠引水注城中復興客曰自郭汾陽城此州茍外水可釃何待今日無為虚費勞人也几不答未幾水果至鑿五池於通逵民大便利宋史劉温叟傳胡瑗字翼之泰州海陵人范仲淹經畧陜西辟丹州推官宋史本傳涖政之暇以經術隨其賢愚訓之士多賴其造就凡見者即識為安定先生弟子舊志王獵字得之長垣人范仲淹薦為藍田主簿府使之掌學諸生有犯法者獵自責數以為教之不至屏出之府帥意其私捕生下獄獵前白曰此特年少不率教爾致于理不足以益美化恐適貽士類辱帥悟而喜曰吾慮初不及此即釋生而待獵加敬宋史本傳張㫖字仲微懐州河内人元昊反通判府州州依山無外城㫖將築之州將曰吾州據險敵必不來㫖不聽城垂就冦大至乃聯巨木補其罅守以強弩中外不相聞者累日人心震恐庫有雜綵數千叚㫖矯詔賜築城卒卒皆東望呼萬歲賊疑救至州無井民取河水以飲賊斷其路㫖夜開門率兵撃賊小却以官軍壁兩傍使民出汲復以渠泥覆積草賊望見以為水有餘督居民乘城力戰賊死傷者衆隨解去以功遷都官員外郎宋史本傳司馬里夏縣人字昭遠進士通判鄜州州武人不法里平居與之歡甚臨事正色力爭不可假借性亷静質直所至有惠政宋史司馬池傳楚建中字正叔洛陽人第進士主管鄜延經畧機宜文字夏人來正土疆徃莅其事衆暴至兩騎傳矢引滿向之建中披腹使射曰吾不憚死騎即去衆服其量元昊歸欵建中請築安定黑水八堡以控東道夏人果來聞有備不敢入宋史本傳王宗元皇祐中任商州酒税有詩名終守清節琴樽自娯吏民畏之賈志周沆益都人皇祐中趙元昊擾西陲詔舉近臣可通判陜西者丞相富弼以沆名聞通判鳯翔府去二十餘年民猶思之司馬光撰神道碑蘇軾字子瞻眉州睂山人簽書鳯翔府判官關中自元昊叛民貧役重岐下歲輸南山木栰自渭入河經砥柱之險衙吏踵破家軾訪其利害為修衙規使自擇水工以時進止自是害減半宋史本傳程顥字伯淳河南人中進士第調京兆府鄠縣主簿令以其年少未知之民有借其兄宅以居者發地中藏錢兄之子訴曰父所藏也令曰此無證佐何以決之顥曰此易辨爾問兄之子曰爾父藏錢幾何時矣曰四十年矣彼借宅居幾何時矣曰二十年矣即遣吏取十千視之謂借宅者曰今官所鑄錢不五六年即遍天下此錢皆爾未居前數十年所鑄何也其人遂服令大竒之南山僧舍歲傳佛首放光逺近男女聚觀晝夜雜處為政者畏其神莫敢禁止顥始至詰其僧曰吾聞石佛嵗現光有諸曰然曰俟復見必先白吾職事不能徃當取其首就觀之自是不復有光矣府境水害倉卒興役諸邑率皆狼狽惟顥所部飲食茇舍無不安便時盛暑泄痢大行死亾甚衆獨鄠人無死者所至治役人不勞而事集嘗謂人曰吾之董役乃治軍法也當路者欲薦之多問所欲先生曰薦士當以才之所堪不當問所欲再朞以避親罷伊川文集明道先生行狀朱光庭字公掞偃師人擢第調萬年主簿數攝邑事人以明鏡稱又從呂大防於長安幕府五路出師討西夏雍為都會事倚以辦宋史朱景傳張山甫偃師人熈寜間除武功主簿時朱光庭簿萬年程伯淳簿鄠縣三子者齊名關中號三傑焉馬志鮮于侁字子駿閬州人從何郯辟簽書永興軍判官萬年令不任職繫囚累百府使徃治數日空其獄宋史本傳司馬旦字伯康夏縣人以父任厯鄭縣主簿鄭有婦藺訟奪人田者家多金錢市黨買吏合為奸謾十年不決旦取案一閲情偽立見黜吏十數輩寃者以直又井元慶豪欺鄉里莫敢誰何旦擒致於法時旦年尚少上下易之自是驚服宋史司馬池傳王睦汴人華隂尉為官亷㓗清愼不忍鞭朴而心性明敏馬志焦稹河東人政和間為高陵縣主簿能佐其令李公為政以忠信為本嘗為李公作不欺堂記馬志張汝明字舜文廬陵人徙眞州登進士第厯華隂主簿華隂修岳廟費鉅財窘汝明嚴與為期民德其不擾相與出力佐役如期而成他廟非典祀者則毁而懲其人滯州縣二十年未嘗干進徽宗擢監察御史宋史本傳張瓛崇寜間以承務郎監商州酒税權知髙陵縣管勾學事兼管勾勸農公事嘗礱石建八行八刑條碑賈志仇悆字泰然益都人大觀三年進士授邠州司法讞獄詳恕多所全活宋史本傳司馬朴字文季夏縣人調晉寜軍士曹叅軍通判不法轉運使王似諷朴伺其過朴曰下吏而陷長官不惟亂常人且不食吾餘矣不敢奉教似賢而薦之宋史司馬池傳張甫為華州推官日用倉粟惡吏當追賠錢數百萬轉運使李絃以吏屬甫甫乃令斗米舂之可棄者十纔二三又試之亦然吏遂得弛繫所賠錢纔數十萬而已絃因薦甫遷職亷平録石昉字德輝樂平人宣和進士授隴州司工曹事靖康元年之官明年金兵入陜官吏失守惟隴守劉化源誓死不去檄昉權倅與昉畫地分守力不支金兵執之勒令受職不可盡室二十三人驅之北去拘置邠州洪皓留北與昉時相聞左右二帝於五國城與化源俱以不屈死西江人物志魏彦明開封人通判延安府建炎二年金人陷府東城而西城猶堅守自是金兵專圍西城初受圍時彦明與權府事劉選分地而守彦明當東壁空家貲以賞戰士金人晝夜攻城閲十有三日城陷彦明坐城樓上金人併其家執之諭使速降彦明曰吾家食宋禄犬輩使背吾君乎婁室怒殺之詔贈中大夫宋史本傳唐文若字立夫眉山人登進士第召對便殿高宗特㫖通判洋州洋西鄉縣産茶亘陵谷八百餘里山窮險賦不盡括使者韓球將增賦以市寵園户避苛斂轉徙饑饉相藉文若力爭之賦迄不增宋史本傳蹇彛潼川通泉人嘉定二年進士通判金州端平三年北兵攻蜀彛堅守被擒不屈而死其子永叔復力戰城破舉家死焉弟維之紹定五年進士利州都統王宣辟行叅軍事亦迎敵力戰而死宋史本傳金喬君章平陽人正隆中任蒲城縣丞有異政碑賈志李完字道全馬邑人登進士第調澄城主簿有遺愛民為立祠金史本傳馬舜卿名肩龍以字行宛平人正大四年薄逰鳳翔德順州將愛申以書招舜卿舜卿欲徃鳯翔總管以敵兵甚強德順不可守勸勿徃舜卿曰愛申平生未嘗識我一見為知己我知德順不可守我徃必死然以知己故不得不死也乃舉行槖付族父明之為死别冐險而去既至不數日受圍城中義兵七八千而已州將假舜卿鳯翔總管判官守禦一以委之凡受攻百日食盡乃陷軍中募生致之不知所終時年五十三詔贈某官配食褒忠廟中州集張彀字伯英許州臨潁人大定二十八年進士改同州觀察判官時出兵備邉州徴箭十萬限以鵰鴈羽爲之其價翔躍不可得彀曰矢去物也何羽不可節度使曰當須省報彀曰州距京師二千里如民急何萬一有責下官身任其咎一日之間價減數倍尚書省竟如所請金史本傳韓玉字温甫相人明昌五年進士大安三年夏人陷邠涇陜西安撫司檄玉以鳯翔總管判官為都統府募軍旬日得萬人與夏人戰敗之夏人解去當路忌其功驛奏玉與夏冦有謀朝廷疑之使使者覘其軍先是華州李公直以都城隔絶謀舉兵入援玉恃其兵為可用亦欲為勤王之舉公直軍行有日京兆統軍謂公直據華州反遣都統楊珪襲取之寘極刑公直曽為書約玉其書為安撫所得及使者覘玉軍且疑預公直之謀即實其罪玉道出華州被囚死士論寃之金史本傳馬慶祥字瑞寜本名竒爾濟蘇先世自西域徙家淨州天山大安初拜鳯翔府路兵馬都總管判官元光元年冬十一月聞大將䝉古布哈將攻鳯翔行省檄慶祥與治中胥謙分道清野遇大兵圍數匝欲降之不屈而死元帥郭仲元輿其尸以歸葬鳯翔普門寺東詔贈恒州刺史諡忠愍胥謙及其子嗣亨亦不屈死謙贈彰化軍節度使嗣亨贈鳯翔府判官禎州金勝堡提控僕散胡沙亦死贈銀青榮禄大夫正大二年哀宗詔褒死節士習禮言思等為立褒忠廟金史本傳元商衡曹州濟隂人僉陜西行省員外郎以戰死元史商挺傳張泰來餘姚人商州學正博通古今能詩文作新士類為儒職冠賈志杜震商州學正質性自然布衣蔬食泊如也教人作文先以正心地為本後學宗之馬志元本武陟人至正間進士除邠州判官攝褒城安塞二縣尹俱有治績萬姓統譜不按邠州志職官載明呉雲字友雲宜興人洪武初以校書郎改渭南丞有善政續藏書友雲洪武二年為渭南丞時中原初定事皆草創雲至攝縣事躬行儉約振廢滯納流亾鋤強暴恤孤㷀均徭宥罪城池廟署拓治一新三年頺風丕變擢刑部郎中渭南縣志李叔正字克正江西靖安人洪武初遷渭南丞同州蒲城爭地累年不决行省以委叔正单騎至其處召兩造至前立談而决縣田無定額乃即里社丈量立法宻而用刑嚴奸慝讋服廣輿記洪道保安縣丞洪武二年齎印到任招撫人民始立縣事賈志王惟允江西新淦人洪武初任南鄭丞招安人民開設縣事賈志潘謹浙江錢塘人洪武初以儒士任洋縣丞撫字勤勞善政流聞祀名宦洋縣志蔣良輔洪武中任隴州學正教養有方厯官知府祀名宦鳯翔府志邢冕新鄉人洪武中任麟遊丞公正亷勤古之遺愛賈志方孝孺字希直一字希古浙江海寧人洪武二十五年擢漢中府學教授日與諸生講明聖學世法録李驥四川新繁人國子生洪武中任城固典史公平有為任滿士民不忍其去詣部保留馬志宣義昭洪武中商州學正時方草創人未知學義昭補綴經籍親授句讀教事粗舉賈志夏安禮廬陵人洪武初澄城主簿時關陜初附民多癘疫旱暵相仍安禮事神治民有善政由是時和年豐民咸戴之澄城縣志金文徴南直呉縣人洪武中鄜州同知興舉廢墜政尚寛仁民稱頌之賈志江英江津人監生洪武末任寳雞丞亷平自守終始不渝導民引水灌田民永賴焉祀名宦寳雞縣志鄒昱永樂初任漢中府同知勤愼有為政聲大振明一統志解鏘棲霞人監生永樂中三原教諭九年考滿保留復任教訓有方士登賢書捷南宫者皆其力也三原縣志復揚清永樂間任扶風典史籍其民為上中下三等均役莫不從令貧無牛種者即為假貸秩滿士民詣闕乞留乃陞禄復任雍大記徐永逹字志道歸德人舉人永樂中寳雞教諭訓迪有方任滿生徒奏留之擢翰林編修歴山西按察使賈志郭忠江南徐州人吏員宣德中任三原丞熟於吏治為政公平士民感德陞秦州同知馬志牛紳河南尉氏人為城固訓導日以課士為樂城固乆乏科目宫墻傾壊紳力請上臺捐貲改建是科果有魁鄉榜者尉氏縣志張尹字商任河南魯山人正統中髙陵教諭有孝行能以身教人生徒有貧窘者麥粟周之九年轉長安諭馬志周儀山西孝義人舉人正統中鄠縣教諭與諸生約雞鳴來學雞未鳴儀衣冠而待諸生奮勵由是多能記誦鄠有城隍㑹聲伎繁豔觀者塞途諸生無一敢延竚者則其教可知矣秩滿陞保寧府教授馬志劉亮洛陽人由鄉貢登宣德庚戌乙科授陜西華州訓導條格嚴整尤勤訓迪嘗再攝渭南縣學兩學生皆父事之成材者甚衆正統癸亥遷澄城教諭俗戇直難訓亮用剛克畢就矩矱尋改三原諭愛其士多秀敏講授不輟其教以明理飭行為本不專文藝學者皆畏服懐麓堂集郭文廣定襄人任宜君主簿清勤慈恕時轉輸雖繁民沾其澤卒於官贈縣尹賈志王純廣陵人商州教諭質實簡黙甘澹泊諸生餽奉未嘗輕受以道義誨人責之力行不徒為章句之學賈志康拯正統間任耀州學正惟嚴毅以勤率士五夜即升堂令諸生互課有不如程者戒責不少假由是士多有成馬志康按賈志作極誤潘敏宿遷人景泰中以材胥任涇陽主簿亷以持身謙以接士開修水利増新廟學士民咸仰之賈志高瑄霸州人景泰間郿縣典史愛民好士興水利築城垣政績顯著祀名宦􅔛縣志陳秀澤州人為西鄉尉才力甚裕厯任九載民不忍捨比歸攀轅泣留漢中府志王斆壽陽人天順初舉人任渭南教諭性狷潔一介不取訓誨嚴明有條舉止莊重不茍雞鳴即升坐敷教風雨寒暑無間諸生畏敬一生以新茄數十餽王王怒曰弗勤爾學乃以是啖我邪懲以夏楚如其茄數遣之後遷中牟知縣賈志明輔巴縣人舉人天順初蒲城教諭有師範善教能詩陞國子學録王思安大行人舉人天順初蒲城訓導與明輔同時敷教有方輿論與輔並宜祠祀賈志楊潤河津人舉人天順中任涇陽教諭教條嚴整篤於訓迪禮度謹飭為一時掌教最厯陞國子監丞葢不忝文清薛公之門云馬志劉端寧鄉人舉人成化中西安府同知明曉水利留心民事修治渠堰人被其澤既去民恒思之馬志李文祥字天瑞麻城人進士以風義自持謫咸寧丞上官有欲門見之者文祥卻立不進曰庭叅有禮此非其所及召還關中父老擁道泣送監司有所餽遺悉謝不受名山藏文祥上新政疏激切大學士萬安銜之令吏部除文祥咸寧縣丞剛正有為安罷擢南京工部主事舊志王賔沁水人監生成化中咸陽教諭禮度謹飭約束嚴明為關輔儒官最賈志王馴襄垣人成化中任渭南丞有力敢任事諸尊官過渭南氣焰薫灼者馴獨以己當之雖驛遞亦頼焉馬志徐存敬雙流人成化中渭南典史勤敏有材幹厯任十一年去之日百姓赴京保留之馬志辛儒直𨽻固安人西鄉主簿勤敏有為邑之茶徒聚衆刼掠儒率兵擒𠞰陣亾士民哀之祀名宦漢中府志髙儔字宗伊瀘州人𢎞治初舉人髙陵教諭博雅端正勤於訓誨鄰縣名士皆來就學教人以六德冠婚喪祭鄉射相見皆為條約一時禮讓文物煥然可觀陞武定同知賈志聶相臨朐人任涇陽縣丞敦厚有禮人敬愛之臨民遇有寃苦者輒為淚下後陞崇信知縣前後陞縣者惟相一人賈志邢彪字德威曲沃人監生𢎞治初三原縣丞衣布茹蔬珍綺不御每下鄉収糧勘事惟裹乾糗自隨分毫不以擾人罷職貧不能歸擇咸寧陋室居之玩誦經籍泊如也祀名宦三原縣志呂子固解州人𢎞治初以舉人為富平諭賦性剛正立教有方每晝課諸生於明倫堂至夜秉燭廵視漏下二鼓始休晨興又考校之一時成材多者稱子固第一富平縣志趙珍臨潁人舉人𢎞治時為盩厔諭性剛毅訓士嚴肅以禮經設教後盩厔士有以曲臺業相繼魁省闈者皆其薪傳也盩厔縣志馬龍字文祥齊東人進士授給事中忤㫖謫岐山丞𢎞治二年廵撫薦知縣事歴任四年政教兼舉陞汝寧府同知士庶立去思碑祀名宦三原縣志毛憲絳州人正德中由三氏學授任西安府教授師道尊嚴言行不茍謁上司無諂容嘗曰士子讀書處事只求一箇是且令諸生宿號舍而親夜行廵之其貧而好學者必捐俸助給一時陶成最多後陞韓府長史馬志趙昂開州人監生正德初三原主簿平居接物藹如也一有干謁則屹不可動士君子以有道稱之當路委以政事所在厎績陞博興知縣馬志初按賈志又載正德三原主簿趙鼎開州人陞博平知縣考三原志有趙昂無趙鼎疑即趙昂一人而誤作兩人也附志於此劉佑安陽人監生正德初任澄城教諭持身不茍立教有方七年妖賊李午陷落川屯兵彭衙漸逼澄城居民多逃佑設法守禦保全後病歸士民遮留賈志劉仁瀘州人正德時由舉人為盩厔諭能古文詞時督學以古學程關中遴其才拔直正學書院恬淡自好訓士多所成就盩厔縣志張儒山西趙城人監生正德中渭南縣丞仁厚亷謹不事鞭朴人弗忍欺有長者風賈志羅賢蓬溪人正德舉人歴官漢中府通判鄢藍賊薄城賢仗節入壘諭以禍福賊解去總兵官楊洪逼撓賊衆遽加侵辱賢以節死撫按上其事贈本府知府録其子四川通志張志寧定州人由歲貢任漢隂諭教育有方人知向學諸生婚喪不能舉者每義助之漢隂縣志謝茂實富順人武功教諭性嚴重笑語不茍雞鳴而起寒暑風雨無少怠時士習尚俠重武自是畏憚不敢肆馬志趙文傑内江人正德末武功訓導甘貧好學寒暑不易初至時察諸生可教者盡心開迪敢後者痛責之故諸生皆知向學賈志李用中山東人舉人西安府同知嘉靖中城富平流曲堡用中督之時邉患甚急百姓尚狃目前百堵廢墜用中痛懲怠者自巨室始仍出粟以賑窮人始就版築奮迅趨事不數月而五堡訖工遂為永利富平縣志朱光霽字克明䝉化人嘉靖間舉人同知西安府時修復河套百務填委酬應各有次第署華州朝邑蒲城所至有惠政賈志光霽陞西安府同知織造璫故事皆跪拜光霽曰吾膝豈易屈人者乎璫聞獨降階迎見每署郡邑獄中多所平反人甚德之尋乞致仕撫按監司皆勉留不辭去明史竊李嘉禄禹州人舉人知郿縣強明敏辨能以法約束吏人承事者兢兢救過徃上官公使多􅑀勢藐易所部嘉禄不假詞色公役無不懾服好督勵諸生數詣學宫講説經義一時文教彬彬陞西安府通判賈志喬瑞霍州人嘉靖丙戌進士西安府推官決疑獄多所平反執法抗秦藩歸侵田設法賑荒民免死徙厯官山東右叅政賈志余良弼巴陵人舉人遷延安郡丞修城堡申斥堠軍政肅然兩膺寵命卒於任湖廣通志楊根字伯深祥符人嘉靖辛卯舉人為鳯翔推官奉法惟謹嘗攝隴州議丁糧里逓多便於民隨御史按部惟剔大蠧巨姦餘悉不問遷延安同知調度兵馬収支芻餉繕修城堡稽核功罪無不倚辦以病致仕祥符縣志蔡禎環縣人解元天性至孝以家貧就禄為宜川教諭每食必供甘㫖於親嘗危坐與諸生課講務以善道淑人馬志趙鑑河南尉氏人宜川丞為政嚴明有豪民素結官府横行遇鑑歛跡生員劉述以妻死被誣鑑力出之尉氏縣志張縉安陽人嘉靖中任鳯翔府推官亷明公恕訊鞫多所平反姦弊悉除鳯翔府志郭太元綿州人監生嘉靖中郿縣教諭道趣洒然蔚為士望祀名宦鳯翔府志趙相即墨人監生嘉靖中郿縣教諭持身不茍敷率有方捐俸以濟貧却贄以遠利鳯翔府志齊大鵬黄岡人嘉靖中隴州同知正直亷明仁慈勤愼催徴不擾里甲一清尤能釐奸剔弊祀名宦隴州志張良知安邑人以知州任漢中府同知修山河堰甚有勞績漢民享其利賈志傅希孟字仲道蒲州人舉人嘉靖間知同州性簡素質直去家不兩舍知交絶跡嘗奉檄度田履畆按覈不攜庖饌第齎市餅而已氷蘖之操三年如一日遷漢中府同知同州志逯嵐清豐人嵗貢任郃陽丞好文藝長官喜迎悦嵐獨持正不阿以此銜之遂解任去載所植園蔬以行曰食吾力也士民至今以為美談賈志唐學顔富順人為郃陽尉口不譚非義遇嵗祲禱雨散粥愛民如不及竟以勞瘁卒於官士民惜之郃陽縣志王翰德陽人貢士任韓城教諭時韓士棄舉業不肄翰聚而督課之文教丕振賈志沈瑋大興人監生嘉靖間韓城主簿奮身殺賊而死贈韓城知縣廕一子賈志劉達字達夫上元人貢生與謝與槐張秋渠稱金陵三才子任華州學正課士最稱得人崇尚氣節士風一振賈志呉嘉祥眉州人舉人署華州學正負亷節好督率諸弟子員誦讀秦漢古文辭治一經者俾博及他經而尤加意修行之士官至行太僕寺卿華州志黄瑶把縣人嘉靖間教諭白水慧中秀外剛方不阿時同僚有索束脩辱士者瑶正色曰儒官以禮義教人而計利辱士乎即麾士令去祀名宦白水縣志葉夢熊字男兆廣東歸善人嘉靖乙丑進士拜主事轉餉關中己丑擢左僉都御史廵撫陜西廣東通志夢熊以御史左遷郃陽丞在縣事不便民者悉與摘剔甄才俊諸生設局督課一時人文蔚起治化大行同州志潘達字劇驂京山人萬厯甲午鄉薦同知西安所轄遼濶俗多頑梗達單車撫循礦賊屏迹湖廣通志楊允中遵化人字印南以庶常改監察御史左遷西安府同知壬午歲凶嘯聚者甚衆允中單車夜馳集千百長團練調度不五旬而渠魁就擒境内以安趙資山陽知縣壬午之變有保障功賈志趙按山陽志不載資姓氏故世次無考馬賈二志又俱列景泰名宦然景泰中縣治未設其誤可知今因傳云壬午之變姑附楊傳存考王大智號濬宇玉田人萬厯時進士任西安司李嘗庭扑冢宰孫丕揚壻丕揚聞而喜曰有擔當人也擢吏部主事畿輔志王明福河南府人西安同知分署潼關以明允著稱嘗署道事潼倉斗級著大履帶納户糧名曰船鞋明福一見知其弊即杖之於通衢官置劣考自是収糧得平潼關衞志史邦直字中厚樂陵人西安府撫民同知耿介清貞動準道義屬吏承風皆以亷明任事德教大行㑹􅉰賊之亂衆議主𠞰邦直堅持不可身率兩騎馳諭之賊皆感泣請降因殱其魁餘悉散秦民安堵擢河南僉事賈志劉一鳴保寧人任涇陽訓導温恭恬静録貧士名於壁間即有餽弗受未幾卒官無以為歛其清如此賈志徐三仁青陽人任醴泉縣丞邑丁向多混徴積胥因縁為弊三仁一一覈實為勒碑垂示百姓感其均平賈志郭世禄字介軒山西威遠衞人萬厯間任醴泉諭體莊心敬教人以德行為重著有戒士勸學諸訓修兩廡櫺星門鐫石於廟去之日諸生書情深義重四字送之賈志范之齊山東樂陵人舉人萬厯時為漢中推官法令嚴明常慮民遭欺枉察訪不避寒暑一時豺虎屏跡漢中府志蔚宙山西蔚州人貢士萬厯中韓城縣丞性狷介周知民瘼韓舊無逋賦大祲後始有之其弊有三一逃負二攬侵三詭寄而詭寄為甚韓多山陵户田萬畆業者數十百人而税多籍之一人之下輸將彼此觀望因以後期宙為區分糧各異籍雖父子兄弟既異籍即不相逮自此輸者恐後積逋以清韓城縣志劉波字澄源隴州人受業于馮仲好有學行由貢生為盩厔訓導日與諸生講學不輟或有言非其時者波曰吾以盡吾職他何計焉諸生益信從之馮少墟集吉永祚輝縣人鳯縣主簿七年四月已謝事將歸賊至知縣棄城遁或勸之去不可乃倡義拒守力屈城陷北面再拜曰臣雖小吏既食君禄不敢以謝事逃死見賊大罵被殺二子士樞士模皆死教諭李之蔚鄉紳魏炳俱不屈死續表忠記夏建中開平衞人崇禎八年遷扶風丞時流冦薄城建中至畫戰守方畧甚具朝夕乘城親犯矢石月餘力不支死之事聞贈旗守衞經厯妻女皆投井死又甯汝環濰縣人董時和陽武人甯以扶風丞署隴州篆董以扶風丞署麟遊篆冦陷城皆遇害舊志何宗孔通州人紫陽典史崇禎八年城陷死之紫陽縣志孟宗孔階州人為漢隂諭崇禎八年城陷死節贈國子監助教祀名宦漢隂縣志宋之傑字萬特開平衞人功貢天性英明任事果決初任咸陽丞署鎭安山陽二縣復其城崇禎九年秋署扶風篆募丁壯修城池造火器為戰守具旋建衙署復驛站招逃亾墾荒蕪延諸生之有文行者教民間子弟諸廢具舉十年陞本縣知縣十三年歲饑盗賊蜂起又練鄉勇躬自勦滅之鄰邑咸倚重焉以功陞本府判賈志張文學崇禎時為洋縣尉時巨冦頻至文學力為捍禦城頼以全祀名宦漢中