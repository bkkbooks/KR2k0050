袁經清苑人府谷訓導楊威膚施人以上俱載舊志仍録之本朝衣璟如字玉京棲霞人順治己丑進士任漢中府推官先是呉三桂駐漢中兵民錯處豪猾依倚為奸百姓患之璟如蒞政嚴明見者竦然相戒曰各自愛無犯衣君令蒞任數月令行禁止奸吏震懾尤長於聽斷雖狡獪譎辨詞渉兩端獄稽數載者以片言折之咸稽首屈服馮臯彊字立中永濟人順治乙未進士同知漢中府呉逆之變大兵進討臯彊隨征至沔縣陷賊中導之降不從授以僞職憤然曰我王臣也何以此汚我賊冀其終為己用也釋勿殺乆之復刼以威嘆曰睢陽常山彼何人哉當勿令二公笑我賊知不可奪乃幽之古寺中歴五載意氣自如暨奮威將軍王進寳師下漢中始免總督哈占疏其節於朝奉㫖録用臯彊以老乞歸卒劉澤霖直𨽻人貢生順治十六年任漢中府同知初吳逆駐漢逆黨重利剥民及是移駐雲南索逋甚急質民子女號泣遍野澤霖挺身執法為逮治其尤者仍率屬捐金贖男婦數百口民始安堵尤留心水利南鄭舊有栁邉堰為擁沙所衝堤不能固澤霖疏鑿得宜復沿邉栽栁障沙迄今永頼茹珍浙江山隂人初仕為陜西藩幕值採木梁洋廵撫賈漢復知珍才俾督艘北上刻期報竣滇逆告變蔓延關隴以幹畧擢判西安同官嫉其能有大役僉曰非茹判不可諸臺使欲集事輒命珍於時禁旅雲屯需藁日鉅萬厰不能給制府以為憂珍毅然與諸大帥約期以三日因馳赴涇干復循渭而南東抵潼關遍召巨室豪家泣諭國恩當報宜先輸草束以佐軍興後當倍償厥直一時舟車麕至芻茭山積諸大帥皆驚羡接待逾常禮先是隴渭之交乆當賊衝堡民多受迫脅或疑其欵冦欲屠之時大軍駐寳雞適珍督運至鳯翔聞之乃夜走軍中涕泣言諸堡無叛狀遂獲免賊平八旗兵分駐西安㑹逃旗之禁方嚴乃别立廨舍令丞倅理其事三月而更謂之直季珍迭三四直平反居多以疾丐歸卒汪化鰲字魚君江南涇縣人抜貢康熈八年任漢中府同知凡郡中水利屯糧及茶鹽諸政皆稱職再攝縣事省刑息訟禁耗羨絶苞苴聽斷無留獄十三年吳逆踞漢南逼受僞職鰲不從窘辱備至後復給僞劄令知白河縣事勒令之任鰲拊膺嘆曰吾不能以身報國敢偷生旦夕耶遂自經士民傷之共斂葬於漢中城南之連水河譚吉璁字舟石嘉興人由監生康熙九年任榆林城堡同知為政清惠有古良吏風十四年朱龍叛璁與副使髙光祉總兵許占魁進勦邉境以寧制府上其功賜忠藎可嘉匾額以榮之榆林古上郡地明代因冦患始為重鎮良將勁旅星羅碁布而鎮志未立一切方畧制度但錯見陜志中陜志統二省三邉限於尺幅不能詳也璁苦心搜訪逐類編輯東西千八百里凡一名一物無不訂正是非叙述本末志乘之精詳未有如延綏鎮者韓北城山東人由貢生任鳯翔通判時呉逆未靖蜀餉孔亟北城有心計不憚險遠徃來頻數軍餉得無後期且詰奸禁暴匪類潜踪境内安之趙煥文懐寧人任白水縣典史康熙十七年大將軍圖海下平凉給劄令招撫遠近至棧口遇賊不屈死之二十二年贈河南封丘縣主簿胡覲賔奉天承德人任華州州判任理有聲署渭南縣事明斷果决累年疑獄無不剖晰又署長安縣事理煩治劇恢恢有餘大府重之命兼攝華州及興平縣事治行卓犖允稱良吏每念華下風氣寖薄捐金修補小華山峰以壯形勝楊廷桂字月丹寳雞人康熙戊午登賢書二十四年授武功教諭比至任申明學規釐正士習倣安定蘇湖教法立賢良政事文章學術四科隨材造就髙下悉中矩矱教士以四子書為主有問業者娓娓不倦晨夕肅衣冠坐堂上率教則禮之不率教則誘進之在任數年諸生競知向學會以憂歸里論者惜焉韓奕字克振滿洲籍鄜州人康熙三十八年任榆林城堡同知居官清介饒有政績開水利建學宫作士恤民諸廢必舉癸未冬車駕西巡嘉其能擢臨洮守軍民攀轅者以萬計將弁晉周處字子隱義興陽羨人少仕吳入洛遷新平太守撫和戎狄叛𦍑歸附雍王美之遷御史中丞梁王彤違法處深文按之氐人齊萬年反朝臣惡處強直使𨽻夏侯駿西征萬年聞之曰周府君昔臨新平我知其才兼文武若專斷而來不可當也如受制於人此成擒耳既而梁王彤為征西大將軍都督關中諸軍事處知彤必當陷已自以人臣盡節不宜辭憚悲慨即路志不生還時賊屯梁山有衆七萬駿逼處以五千兵擊之處將戰軍人未食彤促令速進而絶其後繼處知必敗賦詩曰去去世事已策馬觀西戎藜藿甘粱黍期之克令終言畢而戰自旦及暮斬首萬計弦絶矢盡播系不救左右勸退處按劍曰此吾効節授命之日何退為且古者良將受命凶門以出葢有進無退也今諸軍負信勢必不振我為大臣以身殉國不亦可乎遂力戰而没晉書本傳北魏賀抜勝神武尖山人少有志操善騎射北邉莫不推其膽畧廣陽王元深在五原為破六汗賊所圍晝夜攻戰召勝為軍主勝乃率募二百人開東城門出戰斬首百餘級賊遂退軍數十里廣陽以賊稍却因抜軍向朔州勝常為殿以功拜統軍周書本傳隋趙仲卿天水隴西人開皇中拜朔州總管於時塞北盛興屯田仲卿總統之微有不理者仲卿輒召主掌撻其胷背或解衣倒曳於荆棘中時人謂之猛獸事多克濟由是収穫嵗廣邉戍無餽運之憂隋書本傳唐陽惠元平州人為京西兵馬使鎮奉天朱泚反自河朔赴難解奉天圍詔營便橋李懷光反奪其軍惠元走奉天懐光遣將馳騎追及於好畤惠元被髪呼天血流出眥袒裼戰而死二子晟暠皆及害唐書本傳興元元年六月故神策京西兵馬使簡較工部尚書兼御史大夫陽惠元贈右僕射仍賜絹百疋惠元男故尚食奉御晟贈殿中監故左衞兵曹叅軍暠贈邠州刺史褒死難也冊府元龜侯仲莊字仲莊蔚州人為神策京西將德宗幸奉天遷左衞將軍為防城使修壘堞晝夜執戈徼循從幸興元殿軍駱谷授防禦招討使帝還都復鎮奉天幾二十年卒贈洪州都督唐書李光弼傳附王忱為盩厔鎮將清苦肅下秋毫不犯國史補李景畧幽州良鄉人大厯末客河中闔門讀書李懐光為朔方節度使署巡官五原將張光殺其妻以貲市獄前後不能决景畧覈實論殺之累轉侍御史豐州刺史豐州當囘紇通道前刺史軟柔每虜使至與抗禮時梅録將軍入朝景畧欲折之因郊勞前遣人謂曰可汗新没欲弔死者乃坐髙壠待之梅録俯僂前哭景畧撫之於是虜容氣沮索不敢抗自此囬紇使至皆拜於庭威名顯聞拜天德軍西受降城都防禦使窮塞苦寒邊户勞悴景畧節用約己與士同甘蓼鑿咸應永清二渠溉田數百頃儲禀器械畢具威令肅然聲雄北疆囘紇畏之卒於屯贈工部尚書唐書本傳五代侯益汾州平遙人明宗時為商州刺史蜀軍冦金州益率鎮兵襲撃大破之詔賜襲衣名馬加西面行營都巡檢使宋史本傳宋石保興字光裔浚儀人雍熙初李繼遷入鈔徙銀夏綏府都巡檢使嘗巡罨子砦並黑水河趣谷中夏人知之以數千騎據險渡河求戰保興所部不滿二千人乃分短兵伏於河滸俟其半渡急擊之斬首百餘追北數十里優詔褒美淳化五年為永興軍鈐轄改夏綏麟府州鈐轄至道二年徙延州都巡檢使兼署州事改本路副都部署與范重召等五路討賊有岌伽羅膩數族率衆來拒保興選敢死士數百人銜枚夜撃殱之自是吳移越移諸族歸降還至烏白池賊又為方陣來拒保興麾衆出入陣中㑹乘馬中流矢挺身持滿易騎奮呼且行且鬭凡三日四十二戰賊遂引去咸平五年以疾歸京師卒宋史石守信傳侯延廣汾州平遙人太平興國初出䕶延州軍兼縁邊巡檢善撫士卒下樂為用㑹西北戎入冦邊人擾亂求可使徼廵者近臣言延廣將家子習邊事無出其右遷同鄜坊延丹縁邊都巡檢使戎人聞延廣至不敢復亂叛卒劉渥嘯聚亾命㓂耀州富平縣謀入京兆其勢甚盛延廣率兵數百自間道追之㑹渥於富平西十五里渥素憚延廣傳言我草間求活視死如鴻毛侯公家世富貴奈何與亾卒爭一旦之命延廣怒因撃之挺身與渥鬭大樹下斷渥右臂渥脱走後數日為追兵所獲渥素號驍勇至是為延廣所殺羣盜喪氣稍稍自歸關右以定上嘉之擢拜崇儀使宋史侯益傳慕容德豐字日新太原人太平興國二年知慶州兼邠寧都巡檢嘗破小遇族奪名馬數十匹居任九年以簡静為治邊鎮安之宋史慕容延釗傳曹光實雅州百丈人太平興國五年李繼捧入朝以光實為銀夏綏麟府豐宥州都巡檢使繼捧弟繼遷逃入蕃落為邊患光實乘間掩襲至地斤澤俘斬甚衆破其族帳獲繼遷母妻及牛羊萬計繼遷僅免使人紿光實請降期於葭蘆川光實信之從數百騎徃伏兵起遂遇害宋史本傳盧斌開封人端拱中為永興軍華州巡檢時大賊侯和尚劉渥刼興平櫟陽殺捕賊官二人斌率兵掩襲且追且鬭薄南山渡渭水扺鳯翔復至耀州擒斬並盡以勞改供奉官召還面加奬慰宋史本傳李繼周延州金明人祖計都父孝順皆為金明鎮使繼周嗣掌本族太平興國三年東山蕃落集衆冦清化砦繼周率衆敗之淳化四年遷殿直明年討李繼遷命開治塞門鴉兒兩路又招降族帳首領二十餘人率所部入夏州敗蕃將數千於石堡砦以功轉供奉官繼周以阿都關塞門盧關等砦最居邊要遂規修築砦城有磨盧家媚咩拽藏等族居近盧關未嘗内順繼周夜率所部徃襲焚之斬首俘獲甚衆至道二年大軍討西夏命為延州路踏白先鋒㑹繼遷邀戰於路繼周戰却之咸平三年復為先鋒入賊境焚積聚殺人畜獲器甲凡六十餘萬授供備庫使領金明縣兵馬都監新砦解家河盧關路都巡檢五年蕃騎入鈔繼周逐之景德元年夏人圍麟州繼周受詔撃之大中祥符二年卒詔其子士彬管勾部族事士用為巡檢都監宋史本傳曹璨字韜光眞定靈壽人為綏銀夏麟府等州鈐轄契丹入冦屢戰有功諸將多欲窮追璨慮有伏力止之至道初復為鄜延路副都部署充麟府濁輪副部署出蕃兵邀繼遷俘馘甚衆璨習知韜畧善撫士卒兼著威愛宋史曹彬傳張思均邢州沙河人至道中改鄜延巡檢使㑹葺石堡砦撃冦走之未幾冦逼保安軍與曹璨徃援追躡五十餘里至木場冦乃遁去宋史本傳謝德權字士衡福州人補殿前承㫖遷陜西巡檢咸陽浮橋壞轉運使宋大初命德權規畫乃築土實岸聚石為倉用河中鐵牛之制纜以竹索由是無患宋史本傳張昭遠字持正滄州無棣人知邊畧為鄜延路兵馬都鈐轄築堡成平川宋史本傳張佶字仲雅本燕人後徙華州渭南初名志言後改焉遷著作佐郎監三白渠知涇陽縣咸平初擢陜西轉運副使賜緋魚至延安遇夏人入冦親督兵撃敗之徙麟府路鈐轄夏人來冦佶率兵與戰親射殺酋帥俘獲甚衆餘黨遁去詔書褒之賜錦袍金帶又為鄜延鈐轄徙邠寧路鈐轄兼知邠州佶勇敢有方畧其總戎䕶塞以威名自任宋史本傳張煦字輔暘開封人知保安軍咸平中夏人冦邊為邠寧環慶路鈐轄兼巡檢安撫都監累躡㓂入賊中掩殺甚衆有詔嘉奬宋史本傳盧鑑字正臣金陵人授三班奉職監坊州酒税以右班殿直為鄜延路走馬承受公事李繼遷㓂邊與總管王榮敗走之又與鈐轄張崇貴撃賊焚其積聚斬首級而還擢本路兵馬都監復出蕩賊帳獲牛馬萬計徙鳯翔秦隴階成等州提㸃賊盜公事尋為都巡檢使宋史本傳曹瑋字寳臣眞定靈壽人天禧三年德明冦柔遠砦以瑋為華州觀察使鄜延路副都總管委乞骨咩大門等族聞瑋至歸附者甚衆拜鎮國軍節度觀察留後復華州觀察使知永興軍改彰武軍節度使卒宋史曹彬傳馬懐德字得之祥符人景祐二年為延州東路巡檢數以少撃衆徙青澗城監押入賊境焚二寨親射殺其酋主又率蕃漢兵焚蕩賊五十寨三百餘帳斬獲百餘級虜獲畜産萬計又以兵數千敗賊四萬騎於僕射谷徙鄜延東路巡檢都監破賊青化押班吃當三寨殺虜其人物甚衆元昊納欵與國子博士髙良夫㑹西人畫地界時用兵久人民流散懐德招輯有方經畧使梁適奉請推其法諸路詔從之隆平集劉平字士衡開封人景德三年登進士第累擢鄜延路副都總管兼鄜延環慶兩路同安撫使寳元初元昊攻保安軍自土門路入冦知延州范雍書召平趨土門既又有告賊兵數萬趨金明圍延州雍復召二帥還軍救延州平督騎兵先發步卒繼進及鄜延駐泊都監内臣黄德和等兵至歩騎萬餘結陣東行至三川口遇賊殺賊鐵騎六七百人薄暮賊復以輕兵來戰官軍少却黄德和遂走追之不止遣軍校以劍遮士卒得千餘人轉鬭三日夜衆寡不敵遂被執平不復食仍數罵賊遂遇害延州吏民詣闕訴平戰没賜平家信陵坊第一區贈平節度使子孫咸賜官平剛直任俠善弓馬知邊事特志常輕賊又衆因德和而潰遂至陷没聞者傷之隆平集郭遵開封人乾興中徙延州西路都巡檢使元昊冦延州遵以禆將屬劉平遇敵馳馬入陣殺傷數十人敵出驍將楊言當遵遵揮鐵杵破其腦復持鐵槍進所向披靡會黄德和引兵先潰敵戰益急遵奮撃期必死又持大矟横突之敵知不可敵使人持大絭索立髙處迎遵馬輒為遵所斷因縱遵使深入攅兵注射之中馬踠仆地被殺特贈果州團練使宋史劉平傳附任福字祐之其先河東人後徙開封元昊反命知隴州擢秦鳯路馬歩軍副總管詔陜西增城壘器械福受命四十日而戰守之備皆具以忻州團練使為鄜延路副總管管勾延州東路蕃部事宋史本傳夏隨字君正并州榆次人元昊反為鄜延路副都總管元昊為書及錦袍銀帶投境上以遺金明李士彬且約與同叛候人得之諸將皆疑士彬獨隨曰此行間爾士彬與羌世仇若有私約通贈遺豈使衆知耶乃召士彬與飲厚撫之士彬感泣後數日果撃賊斬首獲羊馬自效宋史夏守恩傳許懐德字師古祥符人元昊冦邊為鄜延路副總管夏人三萬騎圍承平砦懐德率勁兵千餘人突圍破之夏人乃去屠金明縣復進圍延州懐德夜遣禆將以步騎千餘人出不意撃之斬首二百級遂解延州遷鳯州團練使專領延州東路茭村一帶公事宋史本傳王信字公亮太原人以功遷鄜延巡檢康定初戰三川以所部兵薄賊斬首數十級徙鄜延路兵馬都監始至之夕部衆號數萬傅城軍吏氣懾信領勁兵二千夜出南門與戰失其前鋒因按軍不動遲明潛上東山整軍乘勢而下撃走之獲首級馬牛居多遷鈐轄兼經畧安撫招討都監宋史本傳周美字之純靈州囘樂人少以材武稱元昊反陜西用兵經畧使夏竦薦其材擢延州兵馬都監夏人既破金明諸砦美請於經畧使范仲淹曰夏人勢必復來金明當邊衝今不亟完將遂失之仲淹因屬美復城如故數日賊衆數萬薄金明陣於延安城北三十里美領衆二千力戰抵暮乃徙軍山北多設疑兵夏人望見以為救至即引去既而復出艾蒿砦夜鬭不解美使人持一炬從間道上山四面大譟賊懼走遂築萬安城而還改東路都巡檢使敗敵於金湯城元昊大入據承平砦美以西兵出芙蓉谷大破敵未幾敵復畧土塠砦美迎撃於野家店追北至拓䟦谷大敗其衆還築柵于葱梅官道谷以據敵路令士卒益種營田嵗収榖六千斛復率衆由㕔子部西濟大理河屠劄萬多移二百帳焚其積聚以歸除鄜延路兵馬都監又破敵於無定河乘勝至綏州殺其酋豪焚廬帳因城龍口平砦敵以精騎數千來襲美從百餘騎馳撃破之加本路鈐轄遂為副總管自陜西用兵諸將多不利美前後十餘戰平族帳二百焚二十一招種落内附者十一族復城堡甚多在軍中所得禄賜多分其麾下有餘悉饗勞之及死家無餘貲宋史本傳狄青字漢臣汾州河西人寳元初趙元昊反以青為延州指揮使時偏將屢為賊敗士卒多畏怯青行常為先鋒凡四年前後大小二十五戰中流矢者八破金湯城畧宥州屠􅮭咩歲香毛奴尚羅慶七家口等族燔積聚數萬収其帳二千三百生口五千七百又城橋子谷築招安豐林新砦大郎等堡皆扼賊要害嘗戰安邊被創甚聞㓂至即挺起馳赴衆爭前為用臨敵被髪帶銅面具出入賊中皆披靡莫敢當經畧使韓琦范仲淹一見竒之待遇甚厚張玉字寳臣保定人以六班散直𨽻狄青麾下築青澗招安砦遇夏兵三萬有馳鐵騎挑戰者玉單騎持鐵簡出鬭取其首及馬軍中因號曰張鐵簡孫節開封人以才勇補右侍禁與狄青同在延州數攻破敵砦有功宋史本傳郭諮字仲謀趙州平棘人舉進士累遷鄜延路兵馬鈐轄許置弩五百募土兵教之既成經畧使夏安期言其便詔立獨轅弩軍以西上閣門使知潞州宋史本傳曹琮字寳章真定靈壽人仁宗時知邠州元昊反拜同州觀察使乆之兼同管勾涇原路兵馬定國軍節度觀察留後劉平石元孫敗關輔震恐琮欲誘吐蕃犄角圖賊得西川舊賈使諭意沙州鎮王子遣使奉書願率首領為朝廷撃賊帝善琮策改陜西副都總管經畧安撫招討副使拜歩軍副都指揮使與夏竦屯鄜州還為馬軍副都指揮使以疾卒諡忠恪琮小心謹畏御軍整嚴死時家無餘貲宋史曹彬傳郭恩開封人累戰功積官并代鈐轄管勾麟府軍馬事初夏人嵗侵屈野河地至耕穫時輒屯兵河西以誘官軍經畧使龎籍戒邊將勿與戰月餘食盡去如是屢矣是嵗正月出屯三月始去并州通判司馬光行邊至河西知麟府州武勘與光議乘虜去别創二堡據其地使不得耕功畢則廢横戎臨塞二堡徙兵實新堡籍從光議遂築二堡恩與武勘走馬承受内臣黄道元徃按視之諜者言虜兵屯沙黍浪十五里不絶恩欲止道元怒以言逼恩恩遂夜率步騎千四百人循屈野河北行比明遇賊自旦戰及食時恩與道元皆陷賊恩死之贈觀察使子弟並贈秩或賜官給恩舊俸三年隆平集竇舜卿字希元相州安陽人辟府州兵馬監押夏人犯塞舜卿欲襲撃舉烽求援於大將王凱凱弗應舜卿度事急提州兵出戰勝之明日經畧使問狀凱懼要以同出為報舜卿驩然相許不自以為功宋史本傳劉紹能字及之保安軍人世為諸族巡檢夏人圍大順城紹能為軍鋒毁其柵至奈王川邀撃於長城嶺熙寧中又敗夏人於破囉川皆策功最累遷鄜延兵馬都監紹能世世邊將為敵所忌每設疑以間之帝獨明其不然手詔云紹能戰功最多忠勇第一此必夏人畏忌為間害之計耳紹能奉詔感泣嘗坐讒逮對按驗卒無實守邊圉四十七年大小五十戰以皇城使簡州團練使卒宋史本傳折繼世雲中人繼祖弟少從軍為延州東路廵檢嵬名山内附繼世先知之遣其子克懃報种諤諤用是取綏州繼世以騎歩萬軍於懷寧砦入晉祠谷徃銀川分名山之衆萬五千户居於大理河夏人來攻再戰皆捷諤逮繫獄以兵付之而行遂同名山守綏州録功領忠州刺史説韓綘城囉兀以撫横山因畫取河南之策綘以為然以果州團練使卒宋史折德扆傳曲珍字君玉隴干人為綏德城監押提孤軍拒冦斬其大酋加閣門祗候擢鄜延鈐轄進副總管從种諤攻金湯永平川斬二千級珍善撫士卒忠樸好義本於天性宋史本傳燕達字逢辰開封人為延州巡檢戍懐寧砦夏人三萬騎薄城戰竟日不决達所部止五百人躍馬奮撃所向披靡擢鄜延都監數帥兵深入敵境九戰皆勝元豐中遷金州觀察使加歩軍都虞候改馬軍超授副都指揮使以訓閲精整數被詔奬宋史本傳王凱為鄜州都監累有戰功斬獲甚衆夏人圍麟州乘城拒鬭晝夜三十一日始解去舊志胡田字雲從奉新人元豐間叅鄜延副總管曲珍軍事敗夏人於金湯以功進忠訓郎左殿班直人物志劉昌祚字子京真定人永興軍鈐轄徙知延州時永樂方陷士氣不振昌祚先修馬政合軍中校技撃優者乃給馬自義合至德靖砦綿亘七百里堡壘疏宻不齊烽燧不相應昌祚度屯戍險易地望遠近事力強弱立為定式上諸朝夏人㓂塞門安遠砦出師拒之殺其統軍葉悖麻咩吪埋二人葢始謀攻永樂者圖其形以獻帝喜遣近侍勞軍宋史本傳陳淬字君鋭興化軍莆田人紹聖初挾策西遊時呂惠卿帥鄜延淬戎服徃見惠卿問相見何事淬曰大丈夫求見大丈夫又何事惠卿器之補三班奉職與西人接戰於烏原手殺十餘人擒其砦主奉為左班殿直鄜延路兵馬都監宋史本傳折可適雲中人克行從子鄜延郭達薦試廷中補殿侍𨽻延州從种諤出塞遇敵索鬭斬其首取馬而還益知名米脂之役與夏人戰三角嶺得級多又敗之於蒲桃谷東兵乆不得食藉藉軍門或欲掩殺以為功可適曰此饑耳非叛也單馬出詰之曰爾輩何不為父母妻子念而甘心為異域鬼耶皆囬面聲喏流涕謝再生各遣歸𦍑夏人十萬入冦可適先得其守烽卒姓名詐為首領行視呼出盡斬之烽不傳因巻甲疾趨大破之於尾丁磑囬次檉楊溝正午駐營敵軍來可適所部纔八千轉戰至髙嶺迺從間道趨洪德設伏邀其歸路敵至伏發衝之其國母踰山而遁焚棄輜重衆相蹈藉赴厓澗死者如積論前後功至皇城使宋史折德扆傳張藴字積之開封將家子也從軍為小校厯知綏德懷寧順寧軍等六城儲粟至三十萬斛將兵取宥州破夏人於大吳神流堆宥州監軍引鐵騎數千趨松林堡藴諜知之頓兵長城嶺以待戒諸部曰賊遠來氣盛少休必困困而撃之必捷果以勝歸夏人冦順寧藴置伏陿中約聞呼則起俘斬數百人獲馬械甚衆累遷皇城使宋史本傳史吉延州指揮夏人猝至塞主押監引兵欲匿山中候敵去復歸吉曰如城中百姓芻糧何吉不敢從塞主押監慙懼而返卒以完城賈志陳安石字子監相州安陽人提㸃陜西刑獄攝帥鄜延能用諜者敵動静輒先聞嘗勅邊民戒嚴既而數萬騎奄至無所獲而去璽書嘉之宋史陳貫傳曲端字正甫鎮戎人歴秦鳯路隊將夏人入冦統制李庠捍禦駐兵栢林堡斥堠不謹為夏人所薄兵大潰端力戰敗之整軍還宋史本傳曲端在陜西甚有威望張魏公宣撫首擢用之金人萬户羅索與薩里罕等冦邠州端擊敗之至白店原又大敗之薩里罕乘髙望師懼而號哭金人因目之為啼哭郎君鶴林玉露程迪字惠老開封人父博古部鄜延兵戰死永樂迪以門廕得官經畧制置使唐重以敵迫近留迪提舉軍馬措置民兵以為備金人自同州渡河或勸迪還蜀迪不從乃詣种氏諸豪謀率衆保險俟其勢稍衰出竒撃之轉運使桑景詢知其謀以告唐重掲榜許民擇險自固㑹前河東經制使傅亮建議當守不當避重從之以亮為制置副使去者悉還既而金兵益迫重乃以迪提舉永興路軍馬措置民兵令迪行視南山諸谷將運金帛徙治其中因召土豪集民兵以補軍籍㑹應募者衆亮語重曰人心如此奈何望風棄去重大然之即檄諸司聽亮節制金人近城迪又欲選兵迎戰使老稚得趨險尚可活十萬人亮執議城守金人四面急攻迪率諸司及統制偏禆以下東鄉會盟誓不與敵俱生慷慨嗚咽同盟皆感泣城破亮出降衆潰迪率其徒行狥於衆曰敵讐我矣降亦死戰亦死弩力與鬭憤怒大呼士皆感奮多所斬殺迪冐飛矢持短兵接戰身被創幾徧絶而復蘇猶厲聲叱戰不已遂死之麾下士舁置空室中比屋皆燼室獨不火及斂容色如生詔贈明州觀察使諡忠愍宋史唐重傳附劉宣為秦鳯路兵馬都監金人入關陜宣遣蠟書宻與吳玠相約且率金將任拱等以所部歸朝有告之者金人取宣縷劈之家屬配曹州宋史本傳牛皓福津人為武功大夫川陜宣撫後軍中部將紹興五年金薩里罕與慕洧欲犯秦川宣撫副使吳玠遣諸校分道伺之皓至瓦吾谷與金將呼珊遇皓所部步卒不滿二百乃下與戰謂其徒曰吾所以舍馬者欲與若等同死也力戰死有承信郎高萬且罵且戰與宣撫司隊官秦元薛琪張亨皆死於陣後皓贈翊衞大夫贈萬等三官宋史本傳曹友聞字允叔同慶栗亭人登寳慶二年進士授利州駐劄御前諸軍統制北兵破沔州擣大安友聞遣摧鋒統制王資踏白軍統制白再興趨鷄關隘左軍統制王進據陽平關友聞登溪嶺指揮甫畢兵突至遂遣進及遊奕部將王剛出戰又親率帳兵及背嵬軍突出左右馳射兵退友聞謂忠義總管陳庚及當可曰敵必旋兵攻鷄關隘宜急援之既而果以歩騎萬餘攻隘庚以騎兵五百直前決戰當可將歩兵左右翼並進王資白再興又自隘出戰蹀血十餘里兵乃解去特授友聞兼沔州駐劄兼管闗外四州安撫權知沔州節制本府屯戍軍馬明年友聞引兵扼仙人關諜聞北兵大至友聞語萬曰國家安危在此一舉衆寡不敵豈容浪戰惟當乘高據險出竒匿伏以待之北兵入興元制置使趙彦訥檄友聞控制大安以保蜀口友聞議為以寡撃衆非乘夜出竒内外夾撃不可乃遣萬友諒引兵上鷄冠隘多張旗幟示敵堅守友聞選精鋭萬人夜渡江宻徃長溪設伏約曰敵至内以鳴鼔舉火為應外呼殺聲北兵果至萬出逆戰身被數創令諸軍舉烽友聞親率精兵三千人疾馳至隘下先遣保㨗軍統領劉虎帥敢死士五百人衝前軍前軍不動元兵伏三百騎道傍虎衆銜枚突戰㑹大風雨淖濘深没足内外兩軍皆殊死戰血流二十里黎明元兵益増友聞血戰愈厲與弟萬俱死軍盡没贈龍圖閣學士賜廟褒忠諡曰節宋史本傳金富察和珍安春水人天㑹六年從羅索攻京兆以所部兵累與宋人接戰皆先登有功七年取邠州遇宋人二十餘萬我軍右翼少却時和珍為左翼千户摧鋒陷陣敵遂敗去敗張浚富平復有功授隴州防禦使鳯翔尹卒金史本傳和尼完顔部人睿宗定陜西和尼為都統進攻涇州王開山以兵拒歸路邀戰再撃再敗之遂降京兆鳯翔諸縣金史羅索傳沃濟宗室瑪琦子從攻陜西為右翼都統攻城破敵皆與有功師還正授謀克遷華州防禦使屬闗中歲饑盜賊充斥沃濟募兵討平之部以無事郡人列狀丐留金史瑪琦傳圖克坦喀齊喀上京速蘇海水人皇統二年為隴州防禦使以兵十五人敗宋兵二百於髙陵以兵八百人敗宋兵三千五百於鳯翔以二謀克拒饒風關宋兵二千來奪其闗口奮撃敗之諸軍乃過險再徙延安尹是時關陜以西初去兵革百姓多失業喀齊喀守之以靜民多還歸者大定二年為陜西路統軍使未幾改元帥右都監表陳伐宋方畧詔許以便宜從事轉左都監破宋兵於華州隴商等州府一十六盡復之陜西平詔書奬諭賜以玉帶金史本傳富珠哩阿嘍罕隆州布爾噶山人累擢陜西路統軍使兼京兆尹陜西軍籍有闕舊例用子弟補充多不堪用阿嘍罕於伊勒希旗鼓手内選補軍人以春牧馬經夏不収飼瘠弱多死阿嘍罕命以時収秣之死損者少仍春秋督閲軍士騎射以嚴武備終南采漆者節其期限檢其出入以防奸細上謂宰相曰阿嘍罕所至稱治陜西政績尤著用之雖遲亦可得數年力也金史本傳色埓黙名鼎字國器必爾罕世襲明安年二十以善戰知名鎮商州威望甚重敬賢下士有古賢將風初至商州一日搜伏於大竹林中得歐陽修子孫并其族屬鄉里三千餘人皆縱遣之宋史本傳烏庫哩慶壽河北西路明安人歴同知延安府貞祐四年遷元帥右監軍兼陜西統軍使駐兵延安敗夏人於安塞堡戰於鄜州之倉曲谷有功金史本傳珠嘉托羅海上京人貞祐七年秋改授小關子元帥屯商州大吉口九年春從行省叅政圖克坦烏登將潼關兵入援至商山遇雪元兵邀撃之士卒凍餒不能戰而潰托羅海被執不屈援佩刀自殺金史本傳楊沃衍一名沃呼賜姓烏凌阿朔州静邊官莊人貞祐三年奉㫖屯涇邠隴三州沃衍分其軍九千人為十翼五都統親統者十之四興定元年詔陜西行省伐宋沃衍將兵至岐山堡斬首四百級生獲十人馬二百疋甲伏不勝計㝷復得散關詔遷官一階三年武休關之㨗沃衍功居多詔特遷一官元光二年春北兵遊騎數百掠延安而南沃衍率兵追之戰於野猪嶺獲四人而還俄而兵大至駐德安寨復撃走之未幾元兵攻鳯翔還道出保安沃衍遣提控完顔查剌破於石樓臺前後獲馬二百符印數十詔有司論賞時元兵聲勢益振行省檄沃衍清野不從曰若清野明年民何所得食遂使民畢麥事初元兵破西夏長驅而至關輔千里洶洶不安沃衍與部將劉興格率兵徃來邠隴間屢戰屢勝故元兵猝不能東下金史本傳完顔綽哈鳯翔萬户元光二年四月丁丑以死節贈懐遠大將軍授刺史職金史宣宗本紀任福為沔城縣軍官宣宗時元兵下沔城福死之續文獻通考元王㑹字彦嘉新野人至正間為富平守禦時郵亭供費浩繁人甚苦之㑹易以市㕓俾得息肩又疏永潤濵河諸渠灌田旱不為虐遇雨山水溢輒壞良田教民築堤賴以無患賈志明耿忠江南鳯陽人洪武九年詔統鳯陽軍萬餘人屯戍關内而駐控武功號令嚴明士毋敢易暇日問俗廣教民興禮讓學校城郭皆所議置旋師之日父老送者萬計武功縣志忠鎮陜西率謫戍人及延慶騎士繕城守時軍衞草創宻邇䝉古忠招來降撫恩威兼施不為擾害人賴以安雍大記姚厚其先興化人永樂二年上以潼關要地調掌衞事命每嵗正旦入朝且許乘傳徃來是年冬秦王入朝夜至關呼門甚急厚曰深夜不得啓也王怒止關外至京泣訴於上曰姚指揮慢朝廷夜不容臣入關上微哂未浹旬適厚至朝正旦上顧左右曰姚指揮鎻鑰臣也賜寳鈔奸細撤伏臘假僧過關厚獲斬之言官交論厚不當先誅奸細上曰誅奸細則軍威大振指揮是也十八年四月卒上悼惜之苑洛集湯引勣字公讓東甌襄武王曽孫成化初充叅將守禦延綏孤山堡無城戍卒不習戰丁亥八月敵大掠子女而東率麾下百餘人邀於境上力戰死列朝詩集張鎮鳯陽定遠人延安衞指揮使膂力絶人每戰必捷生擒剌麻台被賊圍射落馬支解之賈志劉潮榆林人以都指揮僉事協守延綏有文武材延綏鎮志田忠西安左衞指揮亷潔不阿𢎞治間御史李興於朔日隂試其守曰官亷直者勿跪忠輒起獨立未幾興單騎至其家四壁蕭然乃嘆息而去西安府志𫝊瑛綏德衞指揮使成化元年設鎮立堡命瑛督工清亷自持二年以功陞都指揮僉事八年守定邊有功授都指揮同知以紅鹽池之㨗陞都指揮使二子釗鐸釗廕瑛爵屢立戰功正德初命統延綏義軍徃來破敵有良將風鐸長於謀勇詞翰兼優以平洛川叛賊授都指揮數以寡勝衆一門孝友尤為當時所稱賈志閻文靈壁人延安衞指揮使知兵法累立戰功馬志孫隆江南和州人延安衞指揮同知性清儉不事産業謀勇過人邊功顯著累官至叅將延安府志雲海西安指揮使正德中領歩卒三百勦賊㑹於二州埡賊衆若林卒皆股慄海以忠義激之遂死戰援兵不至數戰失利手刄十餘賊而死毅廟嘉其忠命於常祭外再祀之嵗以為常興安州志李勲綏德衞指揮歴陞都指揮同知充右叅將分守延綏素嫻將畧知險要恩威並著延安府志李懷信山西大同人任定邊副將知勇兼優每戰功先士卒斬馘無算西邊倚重延綏鎮志杜希茂榆林人鎮靖叅將時值饑荒居民流離無以復業希茂百計招勸市牛給種開懇邊外沃地勞來備至復欵結北人并無侵掠數年後遂大稔延綏鎮志殷尚賢北直天津人襲父職充遊擊將軍駐延安時内盜外訌四野洶洶遊擊為一時創設兵皆市人不習練尚賢厲志忠武身先士卒嚴刁斗多間諜而叅以遁甲孤虛諸法屢殱黠敵諸鎮之兵延安稱強賈志辛忠和州人延安衞千户少遊郡庠知兵法遇敵輒有功累陞都指揮同知延安府志彭清綏德人任延綏副總兵分守黄甫川敵擾邊清征討有功陞都督僉事佩總兵印以清謹見稱舊志王威綏德衞人鎮守延綏勇畧過人敵不敢犯一門多將材死於王事舊志魏祥榆林叅將嘉靖十四年吉囊入榆林古北口祥出兵禦敵力戰而死續文獻通考劉梅延綏副總兵嘉靖三十二年北人入邊梅出戰死之續文獻通考楊璘嘉靖中任神木叅將統兵至胡勝家墕對敵奮不顧身矢盡絃絶力戰死立祠延綏鎮志任繼業西安衞指揮使萬厯中任漢中守備茶徒作亂大肆焚掠繼業率兵勦之山路險峻賊突至兵盡散走繼業力戰死漢中府志史見萬厯中任神木營叅將時定邊大舉入犯見應援馬蓮井力戰不克歎曰今日可以報主矣遂殁於陣賜祭建愍忠祠延綏鎮志崔嵩榆林衞指揮使歴官叅將器宇豪邁膽勇過人能以寡敵衆初守定邊㸃軍數千人一目即終身不忘每戰陣見不用命者輒呼其名曰囬營行法由是軍士畏威莫不盡力嘗有敵持酒肴至城下呼曰汝太師敢與吾對酌乎嵩即單騎出城挺兠鍪下馬據行床與之對酌如識平生敵出妓歌舞以為笑樂敵竟嵩任未嘗一至定邊嵩以此知名一日以百騎出遇敵騎千餘嵩謂其下曰敵衆我寡一走即成擒矣乃據髙崗下馬解鞍以示暇逸敵欲乘其不意見軍甚整不敢躡而去延綏鎮志曹文詔山西大同人膂力絶人賊咸憚之崇禎二年以援京師有功補延綏東路副總兵其冬土賊王嘉𦙍聚衆為亂攻陷木𤓰園堡渡河掠菜園溝文詔撃却之追斬之於陽城陞臨洮總兵官延綏鎮志崇禎八年流冦髙應祥張獻忠等率賊數十萬刼掠州郡破隴州扶風鳯翔趨郿縣文詔同孫守法協力撃之於盩厔南山下大破之生擒髙應祥獻俘京師獻忠遁入蜀舊志閻調化商州人武進士署商防守事崇禎六年冬流冦入洛奉檄率標兵禦之縣東南賊衆薄壓橋嶺調化麾兵以進賊繞出其背遂執焉賊愛其驍勇拘係三日誘之使降調化憤罵不屈而死雒南縣志史大勲長安人崇禎七年秋以守備率兵防洛時值亂罕知守禦大勲悉教以乘陴之法賊抵縣大勲督兵迎之無不一當百者大勲馬蹶易卒馬戰甚力賊繞山圍之馬復蹶被執急顧二卒曰吾家世受國恩無䧏理爾速告縣令賊必直侵邑城可依吾法固守賊遂殺大勲直趨縣令聞卒言移關廂民入城嚴守夜未半賊薄城下攻之不克焚西關而去後守禦一如大勲指賊衆環攻不能克城遂獲全雒南縣志曹雲梯寧羌衞鎮撫崇禎八年冦陷城雲梯分守東角樓殺賊數人被執罵賊死舊志徐大行寧羌衞指揮崇禎十年闖賊䧟城大行守東角樓持刄殺賊衆寡不敵被執大行執刀大罵匿印不與鞭笞百端至斷其手刀乃墜剜其心肉罵不絶遂死事聞贈䘏舊志王履泰寧羌衞指揮同知崇禎八年冦夜半陷城履泰堅守敵臺隻身與戰殺賊十餘人賊莫敢攖乃圍之數重天明焚敵樓履泰從敵樓躍下復與賊戰力不能支遂死賈志范于殷山東人武進士崇禎九年任漢中守備多力善射喜談忠孝節烈事逐賊至經瓦舖殺數騎矢盡被執罵賊不屈死漢中府志楊亷臨潼人崇禎十一年任漢中守備負膽氣沉黙少言與賊戰於漁渡壩死之漢中府志彭述謨山西鎮西衞百户任木𤓰園守備有膂力崇禎十三年土賊閻三海倡亂潜夜刼營堡城陷死之延綏鎮志劉光先榆林安邊堡人歴陜西督標副將崇禎十六年冬逆闖入關西安破光先轉戰至渭水上賊遣人欲説降之不聽集麾下士卒從容為説大義即自沉於河而死妻王氏聞難亦投井死一家死難者五十餘人子自昌以居季父家獲免紀忠碑崔爾達西安右衞指揮西安城陷投井死後加恩䘏續表忠記尤翟文定邊副將勇敢善戰臨敵不事刁斗賊素知其名及圍城時翟文屬其徒千人開南門出戰賊為辟易顧見翟文所將盡歩卒因招聚復進翟文力戰殁延安府志劉廷傑綏德人進士為延綏撫標叅將以防冦駐綏德設武備謹斥堠不辭勞怨已而闖賊至廷傑囬鎮激以大義遂與榆林諸將士固守未幾城陷被執賊謂之曰若能降仍以若為大將廷傑怒目曰為朝廷守城者我也寧死不貽君父羞賊怒支解之父彛鼎聞之嘆曰吾有子矣延安府志按師中之寄固以節鎮為主而阨要守險碁布星羅亦實惟將弁是賴其事蹟彪炳者列傳如右若明陜西都司費銘失其籍延綏都指揮僉事李永定榆林人延安衞都指揮劉傑失其籍周誠順義人張鵬定遠人雖賢聲未冺然事蹟已不能詳僅留姓氏以備考云本朝惠應詔永平人前薊遼督標副將順治元年英王畧地西徇應詔首先歸誠二年正月招降延寧甘固諸營堡嗣因西安㑹省要地留守重任督撫合疏請以副將管城守事西安洊經冦禍軍實乆虛芻糧器械焚棄殆盡應詔視事閲月壁壘一新又闖逆所掠子女露宿風栖啼號遍野應詔収問鄉貫行移郡邑俾得各歸桑梓遠近歡聲如雷是年冬賀珍餘孽復熾圍西安應詔悉力固守三年正月率兵擊賊城下大敗之賊始遁㝷陞成都總兵官以収潼川綿州功授二等阿達哈哈番世襲四次仰九明河州人順治八年任紫陽路遊擊時邑多冦患九明出竒計屢敗之冦負固山中又掘地搗巢賊悉就縛民害遂除陞蔚州營叅將王國宗韓城志作王宗國寧夏人神道嶺把總駐防郃陽葺營壘省供億軍伍晏然其子惠閭閻甚於愛惜士馬邑人德之勒石以誌不忘魯仁圻㑹稽人以守備署興鎮右營把總又署漢鳯營千總康熙十三年吳逆兵至城陷被執不屈死事聞贈威烈將軍賜祭塟廕一子劉士英河間人官定邊營守備朱龍之亂弁兵皆降附士英不屈賊怒下士英獄已而令出與家人計議士英至家乃積薪舉火悉取衣貲投火中家人從之遂自剄未絶復擲身入火死妻妾郭氏李氏俱死之偏圖正白旂滿洲人康熙十三年以勇敢揀選赴陜西軍前効力授都司僉書是年冬賊犯三原總督哈占檄圖徃勦之遇賊於頭寨斬其魁李長腿餘皆潰去十四年春王輔臣叛圖隨揚威將軍阿彌達征之克瓦雲驛復涇州俱力戰殺賊甚衆獲其偽總兵一人又敗賊於靈臺取陶家堡四月别隨副都統鄂克濟等赴寧州開通糧運賊將郭永福等逆戰兵甚盛圖先登陷陣連敗之功最多八月與大軍會於平凉賊將髙鼎據南山期入城與輔臣合圖與統領夯竒奪取南山鼎無所歸走華亭遇定西將軍孫思克遂降十月復華亭縣論功授陜西督標右營遊撃十五年二月總督哈占檄圖救山陽夜於乾溝峪遇賊圖力戰破之遂入山陽還至商州又敗賊將李茂榮於三岔口商洛稍定是年五月撫遠大將軍檄圖領兵屯北虎山墩以絶固原糧運之赴平凉者圖防守甚嚴賊不敢過平凉城中食盡王輔臣遂自縛歸罪大將軍上其功陞授潼關副將是時興漢尚未克復奉㫖令圖仍留督標遇缺另補以資援勦是年十月大將軍給圖總兵官劄令其規取興安賊將楊文端領衆三千餘在鎮安聞圖將至即遁去圖尚未至興安大將軍以舊縣關地險要且當賊衝復檄圖領兵即在關駐劄防禦十六年夏補授督標中軍副將仍駐舊縣關十七年大兵由關山入圖為軍鋒至小嶺與賊戰圖奮勇陷陣奪其三營遂復香泉等處十八年十月大將軍令圖總統緑旂官兵攻取興安至兩河關賊阻河結營自固圖出其不意策馬徑渡連破其七營斬獲無算賊衆一時解散賊將韓晉卿望風遁走遂復興安併収取漢隂石泉䧏其偽將軍一人總兵二人圖雖以勇敢力戰立功然所至能留心地方在舊縣關時適歲祲饑甚圖捐貲糴穀散賑全活頗多尤為難得云後隨勇畧將軍趙良棟収復滇蜀功尤著厯陞西寧總兵雲南提督鑲白旂都統五十五年卒賜祭塟予諡立碑張國彦京衞人幼習韜畧善騎射登武進士累功擢波羅營副將康熙十四年朱龍據定邊延郡州縣營堡望風響附國彦移書延綏鎮總兵許占魁約共固守賊欲攻鎮城以波羅未下畏國彦議其後乃悉衆赴波羅城陷國彦死之陳紀範葢州人由鑲白旗佐領任西鳯協副將康熙五十七年七月調兵征藏十六日紀範率督標兵出西寧二十一日遇賊準噶兒被圍紀範力戰自辰至申殺傷甚衆㑹日暮後軍不繼紀範單騎突圍中鳥銃傷脅墜馬復騰起大呼殺賊賊大至遂遇害陜西通志巻五十四
