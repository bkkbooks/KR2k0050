  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0050_WYG_049-1a, image: WYG0554/WYG0554-0021c.png}
body:
  text: 陜西通志巻四十九帝系二公主宦官外戚公主凡都秦之世帝姬皆秦産也而列傳始於唐書周隋而上缺焉今撮其事蹟顯著者以覘一代之化始云周武王女大姬鄭子産曰我先王庸以元女大姬配胡公左傳元女武王之長女也杜注單子曰陳我大姬之後也國語武王封舜後媯滿於陳是為胡公妻以元女大姬婦人尊貴好祭祀用史巫漢書地理志穆王女叔㛗天子殯盛姬於轂丘之廟命王女叔㛗為主天子東征舍於五鹿叔㛗思哭是曰女㛗之丘穆天子傳叔㛗穆王之女也郭璞注漢髙帝女魯元髙祖長女魯元公主為趙王敖后史記張耳傳齊悼惠王入朝孝惠皇帝與王讌飲行家人禮呂太后怒王懼上車太息内史參乘問其故王具以語内史内史曰魯元公主太后之女大王之弟也大王封國七十餘城而公主湯沐邑少大王誠獻十城為公主湯沐邑太后必大喜是亡十城而得六十城也王曰善至邸上奏獻十城為公主湯沐邑太后果大悦受邑厚賜而歸之新序惠帝二年冬十月齊王來朝獻城陽郡以益魯元公主邑尊公主為太后漢書惠帝紀文帝女長公主竇皇后女嫖為長公主后以建元六年崩遺詔盡以東宫金錢財物賜長公主嫖史記外戚世家帝姑館陶公主號竇太主堂邑侯陳午尚之午死主寡居年五十餘矣近幸董偃始偃年十三隨母出入主家左右言其姣好主召見曰吾為母養之至年十八而冠出則執轡入則侍内以主故諸公接之號曰董君安陵爰叔者爰盎兄子也與偃善為畫求見上之䇿令主稱疾疾愈起謁上以錢千萬從主飲上臨山林主道入就坐坐未定上曰願謁主人翁主下殿徒跣頓首謝曰妾無狀負陛下陛下不致之法頓首死罪有詔謝主起之東廂自引董君前伏殿下主廼贊館陶公主胞人臣偃昧死再拜謁因叩頭謝上為之起是時董君見尊不名稱為主人翁飲大驩樂於是董君貴寵天下莫不聞董君至年三十而終後數歲竇大主卒與董君㑹𦵏於霸陵漢書東方朔傳景帝女陽信隆慮南宫王皇后長女為平陽公主漢書外戚傳平陽侯曹夀尚武帝姊陽信長公主衞青為侯家騎從平陽主建元二年青姊子夫得入宫幸上元朔元年以有男立為皇后封青為長平侯五年拜大將軍青既貴而平陽侯夀有惡疾就國長公主問列侯誰賢者左右皆言大將軍主笑曰此出吾家常騎從我奈何左右曰於今尊貴無比於是長公主風白皇后皇后言之上廼詔青尚平陽主衞青𫝊如淳曰本陽信長公主也為平陽侯所尚故稱平陽主衞青傳注尚按漢書夏侯嬰傳嬰曾孫頗平陽公主主隨外家姓號孫公主是漢有兩平陽主而此則主之虚號彼則主之實封也因未載為何帝之女附誌於此王皇后女次南宫公主次隆慮公主漢書外戚傳隆慮公主子昭平君尚帝女夷安公主隆慮主病以金千斤錢千萬為昭平君豫贖死罪上許之隆慮主卒昭平君日驕醉殺主傅獄繫内官以公主子廷尉上請請論左右人人為言前又入贖陛下許之上曰吾弟老有是一子死以屬我於是為之垂涕歎息良乆曰法令者先帝所造也用弟故而誣先帝之法何面目入髙廟乎乃可其奏東方朔傳武帝女當利鄂邑天子見欒大大悦拜為五利將軍封樂通侯以衞長公主妻之更命其邑曰當利公主史記封禪書索隱曰衞長公主是衞后長女也非如帝姊曰長公主之例封禪書注後元二年二月立昭帝為太子太子即皇帝位姊鄂邑公主益湯沐邑為長公主共養省中元鳳元年長公主共養勞苦復以藍田益長公主湯沐邑漢書昭帝紀昭帝始立年八歲帝長姊鄂邑蓋長公主居禁中共養帝蓋主私近子客河間丁外人上聞之不絶主驩有詔外人侍長主外戚傳上官桀因帝姊鄂邑蓋主内安女後宫為皇后桀父子徳長公主主近幸河間丁外人桀安欲為外人求封幸依國家故事以列侯尚公主者光不許又為外人求光禄大夫欲令得召見又不許長主大以是怨光桀等乃謀令長公主置酒請光伏兵格殺之事發蓋主自殺霍光傳宣帝女館陶敬武于定國子永以列侯為御史大夫尚館陶公主施施者宣帝長女成帝姑也賢有行永以選尚焉漢書于定國傳薛宣為丞相封髙陽侯子况以事徙敦煌初宣為侯時敬武長公主寡居上令宣尚焉及宣免歸故郡公主留京師宣卒主上書願還宣𦵏延陵秦可况私從敦煌歸長安㑹赦因留與主私亂元始中莽自尊為安漢公主又出言非莽莽治况發其罪使使者以太皇太后詔賜主藥主遂飲藥死白太后云主暴病薨太后欲臨其䘮莽固争乃止漢書薛宣傳隋髙祖女蘭陵蘭陵公主字阿五髙祖第五女也性婉順好讀書髙祖於諸女中特所鍾愛適河東栁述諸姊並驕倨主獨折節遵婦道事舅姑甚謹髙祖大悦由是述漸見寵遇初晉王廣欲以主配其妃弟蕭瑒後適述晉王不悅及述用事彌惡之髙祖崩述徙嶺表煬帝將改嫁之主以死自誓表請免主號與述同徙帝不從主憂憤而卒時年三十二臨終上表曰昔共姜自誓著美前詩鄎媯不言傳芳往喆妾雖負罪竊慕古人生既不得從夫死乞𦵏於栁氏帝覽之愈怒𦵏主於洪瀆川資送甚薄朝野傷之隋書列女傳煬帝女南陽南陽公主煬帝長女也美風儀有志節年十四嫁於許國公宇文述子士及以謹肅聞及宇文化及弑逆主隨至聊城化及為竇建徳所敗士及自濟北歸唐時隋代衣冠並在建徳引見之莫不惶懼失常惟主神色自若自陳國破家亡不能報怨雪恥淚下盈襟聲辭不輟情理切至觀聴者咸肅然敬異焉尋請為尼及建徳敗將歸西京復與士及遇於東都主不與見士及請復為夫妻主拒之曰我與君讎家今恨不能手刃君者但謀逆之日察君不預知耳因呵令速去士及固請之主怒曰必欲就死可相見也士及知不可屈乃拜辭而去隋書列女傳唐髙祖女平陽丹陽髙宻安定長廣常樂平陽昭公主太穆皇后所生下嫁柴紹初髙祖兵興主居長安紹曰尊公將以兵清京師我欲往恐不能偕奈何主曰公行矣我自為計紹詭道走并州主奔鄠發家貲招南山亡命得數百人以應帝賊何潘仁壁司竹園殺行人稱總管主遣家奴馬三寳喻降之共攻鄠别部賊李仲文向善志丘師利等各持所領㑹戲下因畧地盩厔武功始平下之乃申法誓衆禁剽奪逺近咸附勒兵七萬威震闗中帝渡河紹以數百騎並南山來迎主引精兵萬人與秦王㑹渭北紹及主對置幕府分定京師號娘子軍武徳六年薨唐書本傳公主髙祖第三女也京城平封平陽公主六年薨將𦵏詔加前後部羽葆鼔吹大輅麾幢班劍四十人虎賁甲卒太常奏議以禮婦人無鼔吹髙祖曰鼔吹軍樂也往者公主舉兵以應義旗親執金鼔有克定之勲周之文母列於十亂公主功叅佐命非常婦人所匹遂特加之以旌殊績仍令所司按諡法明徳有功曰昭諡公主為昭舊唐書柴紹傳髙宻公主下嫁長孫孝政又嫁段綸永徽六年薨遺命吾𦵏必令墓東向以望獻陵冀不忘孝也唐書本傳長廣公主始封桂陽下嫁趙慈景為華州刺史討堯君素戰死更嫁楊師道聰悟有思工為詩豪侈自肆晚稍折節以夀薨唐書本傳丹陽公主下嫁薛萬徹萬徹惷甚公主羞不與同席者數月太宗聞笑焉為置酒悉召他壻與萬徹從容語握槊賭所佩刀陽不勝遂解賜之主喜命同載以歸唐書本傳安定公主始封千金下嫁温挺挺死又嫁鄭敬元唐書本傳則天將革命誅殺宗屬諸主惟千金公主以巧媚善進奉獨存抗疏請以則天為母因得曲加恩寵改邑號為延安大長公主加實封賜姓武氏以子克又娶魏王武承嗣女内門參問不限早晚見則盡歡舊唐書薛懷義傳常樂長公主夀州刺史趙瓌妻髙祖第七女和思皇后之母也舊唐書太宗諸子傳趙瓌徙夀州越王貞將舉兵遺瓌書假道瓌將應之主進使者曰為我謝王與其進不與其退若諸王皆丈夫不應淹乆至是我聞楊氏篡周尉遲逈乃周出猶能連突厥使天下響震况諸王國懿親宗社所託不捨生取義尚何須耶人臣同國患為忠不同為逆王等勉之王敗周興劾瓌與主連謀皆被殺唐書本傳太宗女襄城臨川南平城陽長樂合浦北景晉陽東陽新城襄城公主下嫁蕭鋭性孝睦動循矩法帝勅諸公主視為師式有司告營别第辭曰婦事舅姑如父母異宫則定省闕止葺故第門列雙㦸而已鋭卒更嫁姜簡永徽二年薨髙宗舉哀於命婦朝堂遣工部侍郎丘行淹馳驛弔祭陪𦵏昭陵唐書本傳南平公主下嫁王敬直以累斥嶺南更嫁劉元意唐書本傳王珪子敬直尚南平公主禮有婦見舅姑之儀近代公主出降此禮皆廢珪曰今主上欽明動循法制吾受公主謁見豈為身榮所以成國家之美耳遂與其妻就席而坐令公主親執筓行盥饋之道禮成而退是後公主下降有舅姑者皆備婦禮自珪始舊唐書王珪傳長樂公主下嫁長孫沖唐書本傳文徳皇后所生長樂公主太宗特所鍾愛將出降勅所司資送倍於長公主魏徴諫曰謂長主者良以尊於公主也若令公主之禮有過長主理恐不可太宗退而告后后歎曰嘗聞陛下重魏徴今聞其諫乃能以義制主之情可謂正直社稷之臣矣願陛下詳之因請遣中使齎帛五百疋詣徴宅賜之舊唐書后妃傳北景公主始封巴陵下嫁柴令武坐與房遺愛謀反同主賜死顯慶中追贈主廟於墓四時祭以少牢唐書本傳東陽公主下嫁髙履行髙宗即位進為大長公主韋正矩之誅主坐婚家斥徙集州又坐章懷太子累奪邑封以長孫無忌舅族故武后惡之垂拱中並二子徙置巫州唐書本傳臨川公主韋貴妃所生下嫁周道務主工籀𨽻能屬文髙宗立上孝徳頌帝下詔褒答永徽初進長公主恩賞卓異永淳初薨唐書本傳城陽公主下嫁杜荷坐事誅又嫁薛瓘初主之婚帝使卜之繇曰二火皆食始同榮末同戚請晝婚則吉馬周諫曰朝謁以朝思相戒也講席以晝思相成也燕飲以昃思相歡也婚合以夜思相親也故上下有成内外有親動息有時吉凶有儀今先亂其始不可為也夫卜所以決疑若黷禮慢先聖人所不用帝乃止麟徳初瓘歴左奉宸衞將軍主坐巫蠱斥瓘房州刺史主從之官咸亨中主薨而瓘卒雙柩還京師唐書本傳合浦公主始封髙陽下嫁房元齡子遺愛主帝所愛故禮異他壻主負所愛而驕元齡卒主導遺愛異貲既而反譖之帝痛讓主乃免自是稍疏外主怏怏㑹御史劾盗得浮屠辨機金寳神枕自言主所賜初浮屠廬主之封地㑹主與遺愛獵見而悦之具帳其廬與之亂更以二女子從遺愛私餉億計至是浮屠殊死殺奴婢十餘主益望帝崩無哀容又浮屠智勗迎占禍福恵𢎞能視鬼道士李晃髙醫皆私侍主主使掖庭令陳元運伺宫省禨祥步星次永徽中與遺愛謀反賜死顯慶時追贈唐書本傳晉陽公主字明達幼字兕子文徳皇后所生未嘗見喜愠色帝有所怒責必伺顔徐徐辨解故省中多䝉其惠后崩時主始孩及五歲經后所游地哀不自勝帝諸子惟晉王及主最少故親畜之王每出閣主送至䖍化門泣而别王勝衣班於朝主泣曰兄今與羣臣同列不得在内乎帝亦為流涕主臨帝飛白書下不能辨薨年十二帝閱三旬不常膳日數十哀因以癯羸羣臣進勉帝曰朕知悲哀無益而不能已亦不知其所以然因詔有司簿主湯沐餘貲營佛祠墓側唐書本傳新城公主晉陽母弟也下嫁長孫詮詮以罪徙巂州更嫁韋正矩正矩遇主不以禮俄而主暴薨髙宗詔三司雜治正矩不能辨伏誅以皇后禮𦵏昭陵旁唐書本傳髙宗女義陽太平髙安義陽公主蕭淑妃所生下嫁權毅唐書本傳義陽宣城二公主以母得罪幽於掖庭垂三十年不嫁孝敬見之驚憫遽奏出降則天大怒即日以衞士二人配二公主大唐新語髙安公主義陽母弟也始封宣城下嫁潁州刺史王朂天授中朂為武后所誅神龍初進册長公主開府置官屬薨開元時𤣥宗哭於暉政門遣大鴻臚持節赴弔京兆尹攝鴻臚䕶喪事唐書本傳公主頃歲奉嘗覩髙宗畫像感咽於地遂成心疾而終蘇頲撰髙安公主碑太平公主則天皇后所生后愛之傾諸女擇薛紹尚之紹死更嫁武承嗣㑹承嗣小疾罷婚后殺武攸暨妻以配主主方額廣頤多隂謀后嘗謂類我而主内與謀外檢畏終后世無他訾預誅二張功增號鎮國與相王衞王成王長寧安樂二公主給衞士環第持兵呵衛僭肖宫省神龍時與長寧安樂宜城新都定安金城凡七公主皆開府置官屬視親王主三子崇簡崇敏崇行皆拜三品韋后上官昭容用事自以謀出主下憚之主亦自以軋而可勝故益横𤣥宗將誅韋氏主與秘計將立相王未有以發其端主顧温王可刼以為功乃入見王曰天下事歸相王此非兒所坐乃掖王下取乘輿服進睿宗睿宗即位主權震天下加實封至萬户三子封王餘皆祭酒九卿主每奏事漏數徙乃得退所言皆從有所論薦或躐進至侍從旋踵將相朝廷大政事非闗決不下不朝則宰相就第咨判天子畫可而已主侍武后乆善䇿人主㣲指先事逢合無不中𤣥宗以太子監國使宋王岐王總禁兵主恚乘輦至光範門召宰相白廢太子於是宋璟姚元之請出主東都帝不許詔主居蒲州居四月太子表追還京師時宰相七人五出主門下又左羽林大將軍常元楷知羽林軍李慈皆私謁主主内忌太子乃有逆謀先天二年與尚書左僕射竇懷貞侍中岑羲中書令蕭至忠崔湜等謀廢太子使元楷慈舉羽林兵入武徳殿殺太子懷貞羲至忠舉兵南衙為應太子得其姦前一日梟元楷慈於北闕下執羲至忠至朝堂斬之主聞變亡入南山三日不出賜死於第諸子及黨與死者數十人崇簡素知主謀苦諫主怒搒掠尤楚至是復官爵賜氏李唐書本傳中宗女宜城永泰定安安樂長寧成安宜城公主始封義安郡主下嫁裴巽巽有嬖姝主恚斷巽髪帝怒斥為縣主巽左遷乆之復故封神龍元年與長寧新寧義安安樂新平五郡主皆進封唐書本傳定安公主始封新寧郡主下嫁王同皎同皎得罪神龍時又嫁韋濯濯即韋皇后從祖弟以衞尉少卿誅更嫁太府卿崔銑主薨王同皎子請與父合𦵏給事中夏侯銛曰主義絶王廟恩成崔室逝者有知同皎將拒諸泉銑或訴於帝乃止銛坐是貶唐書本傳長寧公主韋庶人所生下嫁楊眘交造第東都又取西京髙士亷第左金吾衛故營合為宅右屬都城左頫大道作三重樓以憑觀築山浚池帝及后數臨幸置酒賦詩東都廢永昌縣主匄其治為府以地瀕洛築障之崇臺蜚觀相聯屬無慮費二十萬魏王泰故第東西盡一坊瀦沼三百畆泰薨以與民至是主匄得之亭閣華詭埓西京内倚母愛寵傾一朝與安樂宜城二主后媦郕國崇國夫人争任事賕謁紛紜東都第成不及居韋氏敗斥眘交絳州别駕主偕往開元十六年眘交死主更嫁蘇彦伯唐書本傳永泰公主以郡主下嫁武延基大足中忤張易之為武后所殺帝追贈以禮改𦵏號墓為陵唐書本傳安樂公主帝遷房陵而生解衣以褓之名曰裹兒姝秀辨敏后尤愛之下嫁武崇訓帝復位光艶動天下侯王柄臣多出其門嘗作詔箝其前請帝署可帝笑從之又請為皇太女與太平等七公主皆開府而主府官屬尤濫皆出屠販納貲售官降墨勅斜封授之故號斜封官主營第及安樂佛廬皆憲寫宫省而工緻過之嘗請昆明池為私沼帝曰先帝未有以與人者主不悦自鑿定昆池延袤數里司農卿趙履温為繕治累石肖華山隥彴横邪回淵九折以石瀵水又為寳罏鏤怪獸神禽間以璖貝珊瑚不可涯計崇訓死主素與武延秀亂即嫁之是日假后車輅自宫送至第帝與后御安福門臨觀翌日大㑹羣臣太極殿主被翠服出嚮天子再拜南面拜公卿公卿皆伏地稽首帝御承天門大赦因賜民酺三日奪臨川長公主宅以為第旁撤民廬怨聲囂然第成禁藏空殫假萬騎仗内音樂送主還第崇訓子方數歲拜太常卿封鎬國公實封户五百時主與長寧定安三家厮臺掠民子女為奴婢左臺侍御史袁從一縳送獄主入訴帝手詔喻免臨淄王誅庶人主方覽鏡作眉聞亂走至右延明門兵及斬其首追貶為悖送庶人睿宗即位詔以二品禮𦵏之唐書本傳成安公主字季姜始封新平下嫁韋捷捷以韋后從子誅主後薨唐書本傳睿宗女凉國金仙鄎國玉真凉國公主字華莊始封仙源唐書本傳公主與多於仙源稱長於凉國故丞相太原温彦博曾孫曦僉諧是圖歴選伊尚開元十二載八月遇疾薨於京邸永嘉里第上徹懸乆悼臨次增涕京尹䕶䘮羣司藏事其年仲冬陪𦵏於橋陵蘇頲撰凉國長公主碑鄎國公主始封荆山下嫁薛儆又嫁鄭孝義唐書本傳鄎國長公主者睿宗之第七女也母曰崔貴妃免懷之歲天奪聖善不食三日哀比成人及乎玊筓耀首油軿在馭錫之美地邑以荆山求之令族嬪於薛門開元繼明恩由已進封鄎國長公主食邑一千二百户其後君子晨歌夫人晝哭未亡為稱生意盡矣朝制斷恩改降鄭氏均養七子庥廕二宗汾隂之室忘亡滎陽之黨相慶開元十三年二月薨春秋三十有七有詔光禄卿孟温禮監䕶䘮𦵏京兆尹熊延休副焉窀穸之禮一如凉國長公主故事張說撰鄎國長公主碑金仙公主始封西城縣主景雲初進封太極元年與玉真公主皆為道士築觀京師以方士史崇元為師唐書本傳玉真公主字持盈始封崇昌縣主俄進號上清元都大洞三景師天寳三載上言曰先帝許妾捨家今仍叨主第食租賦誠願去公主號罷邑司歸之王府𤣥宗不許又言妾髙宗之孫睿宗之女陛下之女弟於天下不為賤何必名繫主號資湯沐然後為貴請入數百家之産延十年之命帝知主意乃許之薨寳應時唐書本傳上皇自蜀還京居興慶宫肅宗自夾城中起居上皇時召伶官奏樂持盈公主往來宫中李輔國嘗隂候其隙而間之上元元年上皇嘗登長慶樓與公主語劒南奏事官過朝謁上皇令公主及如仙媛作主人輔國因持盈待客乃奏云南内有異謀矯詔移上皇居西内送持盈於玉真觀舊唐書宦者傳𤣥宗女萬安廣寜晉國太華新昌新平楚國夀安萬安公主天寳時為道士開元新制長公主封户二千帝妹户千率以三丁為限皇子王户二千主半之左右以為薄帝曰百姓租賦非我有士出萬死賞不過束帛女何功而享多户耶使知儉嗇不亦可乎於是公主所禀不給車服後咸宜以母愛益封至千户諸主皆增自是著于令主不下嫁亦封千户有司給奴婢如令唐書本傳晉國公主始封髙都下嫁崔惠章貞元元年與衞楚宋齊宿蕭鄧紀郜國九公主同徙封唐書本傳新昌公主下嫁蕭衡唐書本傳蕭嵩之子衡尚新昌公主嵩夫人賀氏入觀拜席𤣥宗呼為親家母禮儀甚盛舊唐書蕭嵩傳楚國公主始封夀春下嫁吳澄江上皇居西内獨主得入侍興元元年請為道士詔可賜名上善唐書本傳廣寧公主董芳儀所生下嫁程昌裔又嫁蘇克貞薨大厯時唐書本傳天寳十載正月望夜楊家五宅夜遊與廣寧公主騎從爭西市門楊氏奴揮鞭及公主衣公主墮馬駙馬程昌裔扶公主因及數撾公主泣奏之上令殺楊氏奴昌裔亦停官舊唐書后妃傳太華公主貞順皇后所生下嫁楊錡薨天寳時唐書本傳貴妃再從兄錡侍御史尚武惠妃女太華公主以母愛禮遇過於諸公主賜甲第連於宫禁舊唐書后妃傳新平公主常才人所生幼智敏習知圖訓帝賢之下嫁裴玪又嫁姜慶初慶初得罪主幽禁中薨大厯時唐書本傳夀安公主下嫁蘇發唐書本傳𤣥宗禁中嘗稱阿瞞亦稱鴉夀安公主曹野那姬所生以九月誕遂不出降常令衣道服主香火小字蟲娘上呼為師娘為太上皇時代宗起居上曰汝在東宫甚有令名因指夀安蟲娘為鴉女汝後與一名號及代宗在靈武遂令蘇澄尚之封夀安酉陽雜爼徳按文宗開成二年以夀安公主降成節度使王元逵乃絳王悟女非帝主也不録又按蘇發雜爼作蘇澄疑有誤肅宗女蕭國郜國和政蕭國公主始封寧國下嫁鄭㢲又嫁薛康衡乾元元年降回紇英武威逺可汗乃置府二年還朝貞元中讓府屬更置邑司唐書本傳乾元元年秋七月丁亥詔寧國公主出降甲午肅宗送公主至咸陽礠門驛公主泣而言曰國家事重死且無恨上流涕而還及至昆伽闕可汗册公主為可敦蕃人歡欣曰唐天子貴重將真女來二年夏四月可汗死其牙官都督等欲以公主狥𦵏公主曰我中國法壻死即持䘮朝夕哭臨三年行服今回紇娶婦須慕中國禮若依本國法何須萬里結婚然公主亦依回紇法𠢐面大哭竟以無子得歸舊唐書回紇傳和政公主章敬太后所生生三歲后崩養於韋妃性敏惠事妃有孝稱下嫁栁潭安禄山陷京師寧國公主方嫠居主棄三子奪潭馬以載寧國身與潭步日百里潭躬水薪主躬㸑以奉寧國初潭兄澄之妻楊貴妃姨也勢幸傾朝公主未嘗干以私及死撫其子如所生從𤣥宗至蜀郭千仞反𤣥宗御元英樓諭降之不聴潭率折衝張義童等殊死鬬主彀弓授潭潭手斬賊五十級平之肅宗有疾主左右勤勞詔賜田以女弟寳章主未有賜固讓不敢當阿布思之妻𨽻掖庭帝宴使衣綠衣為倡主諫曰布思誠逆人妻不容近至尊無罪不可與羣倡處帝為免出之自兵興財耗主以貿易取竒贏千萬贍軍及帝山陵又進邑入千萬代宗初立屢陳人間利病國家盛衰事廣徳時吐蕃再入寇主方姙入語備邊計潭固止主曰君獨無兄乎入見内殿翼日免乳而薨唐書本傳郜國公主始封延光下嫁裴徽又嫁蕭升升卒主與彭州司馬李萬亂蜀州别駕蕭鼎灃陽令韋惲太子詹事李昇皆私侍主家乆之姦聞徳宗怒幽主他第杖殺萬斥鼎惲昇嶺表貞元四年又以厭蠱廢六年薨子位坐以蠱祝囚端州佩儒偲囚房州前生子駙馬都尉裴液囚錦州主女為皇太子妃帝畏妃怨望將殺之未發㑹主薨太子屬疾乃殺妃以厭災諡曰惠唐書本傳代宗女齊國長林華陽趙國嘉豐新都齊國昭懿公主崔貴妃所生始封平下嫁郭曖大厯末寰内民訴涇水為磑壅不得溉田京兆尹黎幹以請詔撤磑時主及曖家皆丐留帝曰吾為蒼生若可為諸戚倡即日毁由是廢者八十所薨元和時贈虢國賜諡穆宗立復贈封唐書本傳李端工詩大厯中與錢起等文詠倡和號大厯十才子時郭曖尚昇平公主賢明有才思尤喜詩人而端等多在曖門下毎宴集賦詩公主坐視簾中詩美者賞百縑曖因拜官㑹十子曰詩先成者賞時端先獻警句云薰香荀令偏憐小傅粉何郎不解愁主即以百縑賞之錢起曰李校書誠有才此篇宿搆也願賦一韻正之請以起姓為韻端即襞牋而獻曰新開金埓教調馬舊賜銅山許鑄錢曖曰此愈工也起等始服舊唐書李虞仲傳曖嘗與公主琴瑟不調曖罵公主倚乃父為天子我父嫌天子不作公主恚奔車奏之上曰他父實嫌天子不作否則社稷豈汝家有也因泣下但命公主還尚父拘曖自詣朝堂待罪上召而慰之曰不痴不聾不作阿家翁小兒女閨幃之言安用聴錫賚以遣之尚父杖曖數十因話録華陽公主韶悟過人帝愛之視帝所喜必善遇所惡曲全之大厯七年以病丐為道士號瓊華真人病甚囓帝指傷薨追封唐書本傳獨孤貴妃生華陽公主公主薨上嗟悼數日不視朝宰臣等因中使吳承倩附奏言修短常理以社稷之重宜節哀視事上始聴朝大厯十年五月貴妃薨追諡曰貞懿皇后命宰臣常衮為哀册文㫖悽悼覽者惻然公主先𦵏於城東地卑濕至是徙𦵏祔於莊陵之園故哀詞云招帝子於北渚從母后於東陵舊唐書后妃傳嘉豐公主下嫁髙怡與普寧公主同降有司具册禮光順門以雨不克罷薨建中時唐書本傳長林公主下嫁衞尉少卿沈明貞元二年具册禮徳宗不御正殿不設樂遂為故事薨元和時唐書本傳趙國莊懿公主始封武清貞元元年徙封嘉誠下嫁魏博節度使田緒徳宗幸望春亭臨餞厭翟敝不可乘以金根代之公主出降乘金根車自主始薨元和時贈封及諡唐書本傳緒子季安母㣲賤公主畜為己子故寵異諸兄年數嵗充魏博節度副大使緒卒時季安年纔十五軍人推為留後朝廷因授魏博節度營田觀察處置等使季安幼守父業懼嘉誠之嚴粗修禮法及公主薨遂自恣舊唐書田承嗣傳新都公主貞元十二年下嫁田華具禮光順門五禮由是廢唐書本傳徳宗女韓國鄭國魏國燕國韓國貞穆公主幼謹孝帝愛之始封唐安將下嫁秘書少監韋育而朱泚亂從至城固薨加封諡唐書本傳公主上之長女昭徳皇后所生聰敏仁孝上所鍾愛及薨上悲悼尤甚詔所司厚其𦵏禮姜公輔諫曰克復京城公主必須歸𦵏今於行路且宜儉薄以濟軍士徳宗怒謂陸贄曰唐安夭亡不欲於此為塋壠令造一磚塔安置功費甚㣲不合闗宰相論列贄對曰宰相論事但問理之是非豈論事之大小若造塔為是役雖大而作之何傷若造塔為非費雖小而言者何罪帝怒不已乃罷公輔為左庶子舊唐書姜公輔傳魏國憲穆公主始封義陽下嫁王士平主恣横不法帝幽之禁中錮士平於第乆之門下客蔡南史獨孤申叔為主作團雪散雪辭狀離曠意帝怒捕南史等逐之幾廢進士科薨追封及諡唐書本傳鄭國莊穆公主始封義章下嫁張孝忠子茂宗薨加贈及諡唐書本傳張孝忠為義武軍節度朝廷以其子茂宗尚義章公主孝忠遣其妻鄧國夫人入朝執親迎之禮以公主幼待年十三㑹茂宗母亡遺表請終嘉禮即日起復授左衞將軍同正駙馬都尉諫官蔣乂等請待終制然後賜婚徳宗不納竟以義章公主降茂宗舊唐書張孝忠傳燕國襄穆公主始封咸安下降回紇武義成功可汗置府薨元和時追封及諡唐書本傳回紇使使者請和親詔咸安公主下嫁又詔使者合闕達于見公主於麟徳殿使中謁者齎公主畫圖賜可汗明年可汗遣其妹迎主且納聘上書恭甚帝盡建延安公主官屬視王府以嗣滕王湛然為昏禮使右僕射闗播䕶送册拜公主為智慧端正長夀孝順可敦回紇傳順宗女漢陽潯陽襄陽漢陽公主莊獻皇后所生始封徳陽郡主下嫁郭鏦辭歸第泣不自勝徳宗曰兒有不足耶對曰思相離無他恨也帝亦泣永貞元年與諸公主皆進封戚近爭為奢詡主獨以儉常用鐵簪畫壁記田租所入文宗尤惡流侈因主入問曰姑所服何年法也今之弊何代而然對曰妾自貞元時辭宫所服皆當時賜未嘗敢變元和後數用兵悉出禁藏纎麗物賞戰士由是散於人間内外相矜狃以成風若陛下示所好於下誰敢不變帝恱詔宫人視主衣製廣狹徧諭諸主且勅京兆尹禁切浮靡主嘗誨諸女曰先姑有言吾與若皆帝子驕盈貴侈可戒不可恃開成五年薨唐書本傳襄陽公主始封晉康縣主下嫁張克禮唐書本傳李元本生於貴族輕薄無行初襄陽公主縱恣不法常遊行市里有士族子薛樞薛渾者俱得幸於主尤愛渾每詣渾家謁渾母行事姑之禮渾與元本遂相誘掖亦得幸於主出入主第克禮不勝其忿上表陳聞乃召主幽於禁中以元本功臣之後得減死杖六十流象州樞渾亦從輕杖八十長流崖州舊唐書李寳臣傳潯陽公主崔昭儀所生太和三年與平恩邵陽二公主並為道士嵗賜封物七百匹唐書本傳憲宗女梁國安平岐陽永安臨真太和真源梁國惠康公主始封普寧帝特愛之下嫁于季友元和中徙永昌薨詔追封及諡將𦵏度支奏義陽義章公主𦵏用錢四千萬有詔減千萬唐書本傳岐陽莊淑公主懿安皇后所生下嫁杜悰帝為御正殿臨遣由西朝堂出復御延喜門止主車大賜賓從金錢開第昌化里疏龍首池為沼后家上尚父大通里亭為主别館貴震當世然主事舅姑以禮聞所賜奴婢偃蹇皆上還丐直自市悰為澧州刺史主與偕從婢乗驢不肉食州縣供具不受姑寢疾藥糜不嘗不進開成中悰自忠武入朝主疾侵曰願朝興慶宫雖死於道不恨道薨唐書本傳杜司空悰自忠武軍節度使出澧陽宏詞李宣古者數倍遊讌戲謔侮慢杜不能容使卧於泥中欲辱之檟楚公主聞之不待穿履奔救之曰尚書在飲筵而舉人細過待士如此那得平陽之譽乎遂遣人扶起李秀才於東院沐浴更衣却赴中座公主傳㫖京兆公請為詩冀彌縫也後二子裔休儒休皆以進士登科人謂非其母賢不成其子雲溪友議臨真公主始封襄城下嫁衞洙薨咸通時唐書本傳真源公主始封安陵下嫁杜中立唐書本傳初文宗欲以真源臨真二公主降士族謂宰相曰民間婚姻不計官品而上閥閱我家二百年天子顧不及崔盧耶詔宗正卿取世家子以聞中立及校書郎衞洙得召見禁中尚主杜兼傳安平公主下嫁劉異薨乾符時唐書本傳上親妹安平公主下嫁駙馬都尉劉異上命宰臣與一方面中書擬平盧節度使上謂曰朕只有一妹時欲見之平盧去京夐逺卿别思之宰臣乃奏邠寧節制近於平盧仍許公主歲時乗傳入京異將赴鎮安平入辭以異姬人從安平左右皆宫人帝盡記之忽見别姬問安平曰此誰也安平曰劉郎聲音人上恱安平不妬喜形於色顧左右便不令與宫娃同處上之甄别防閑纎㣲不遺如此東觀奏記永安公主長慶初許嫁回鶻保義可汗㑹可汗死止不行太和中丐為道士詔賜邑印如潯陽公主故事且歸婚貲唐書本傳元和八年回紇請和親乆未之許穆宗即位乃封第十妹為太和公主出降回紇穆宗御通化門臨送儀衛甚盛長慶二年閏十月金吾衞大將軍胡鉦等送公主至自回紇開成初黠戞斯破回紇得公主令達干等送至塞上烏介途遇逹干等被殺公主却歸烏介可汗乃質公主同行南渡大磧至天徳界奏請天徳城與公主居舊唐書回紇傳石雄𨽻振武劉沔軍為裨將㑹昌初回鶻冦天徳詔命沔為招撫回鶻使沔謂雄曰回鶻離散不足驅除國家以公主之故不欲急攻我輩捍邉但能除患專之可也公可選驍健乗其不意徑趨敵帳彼以疾雷之勢不暇枝梧必棄公主亡竄事茍不捷吾自繼進亦無患也雄自選勁騎夜發馬邑徑趨烏介之牙時敵帳逼振武雄入城見氊車數十從者皆衣朱碧類華人令諜者訊之曰此公主帳也雄喻其人曰國家兵馬欲取公主至此乃夜穴城為十餘門遲明城上立旗張炬火於諸門縱牛畜鼓譟從之直犯烏介牙帳可汗惶駭莫測率騎而奔遂迎公主還太原石雄傳定安公主始封太和下嫁回鶻崇徳可汗㑹昌三年來歸主次太原詔使勞問至京師詔百官迎謁再拜故事邑司官承命答拜有司議邑司官卑不可當羣臣請以主左右上媵戴鬢帛承拜兩襠持命又詔神䇿軍四百具鹵簿羣臣班迓主乘輅謁憲穆二室欷歔流涕退詣光順門易服褫冠䥖待罪自言和親無狀帝使中人勞慰復冠䥖乃入明日主謁太皇太后進封長公主遂廢太和府唐書本傳穆宗女安康安康公主為道士乾符四年以主在外頗擾人詔與永興天長寧國興唐四主還南内唐書本傳國按永興天長寧三主皆敬宗女興唐文宗女也宣宗女萬夀廣徳萬夀公主下嫁鄭顥下詔先王制禮貴賤共之萬夀公主奉舅姑宜從士人法舊制車輿以鐐金釦飾帝曰我以儉率天下宜自近始易以銅主毎進見帝必諄勉篤誨曰無鄙夫家無干時事又曰太平安樂之禍不可不戒故諸主祇畏帝遂詔夫婦教化之端其公主縣主有子而寡不得復嫁唐書本傳宣宗屬念萬夀公主蓋武皇世有保䕶之功也駙馬鄭尚書之弟顗嘗危疾上使訊之使廻上問公主視疾否曰無何在曰在慈恩寺看戲塲上大怒且歎曰我怪士大夫不欲與我為親良有以也命召公主公主走輦至立階下不視乆之主大懼涕泣辭謝上責曰豈有小郎病乃親看他處乎立遣歸宅畢宣宗之世婦禮修飾幽閒鼓吹廣徳公主下嫁于琮初琮尚永福公主主與帝食怒折匕筯帝曰此可為士人妻乎更許悰尚主悰為黄巢所害主泣曰今日誼不獨存賊宜殺我巢不許乃縊室中主治家有禮法嘗從悰貶韶州侍者纔數人郤州縣饋遺凡内外冠婚䘮祭主皆身答勞疏戚咸得其心為世聞婦唐書本傳懿宗女衞國衞國文懿公主郭淑妃所生始封同昌下嫁韋保衡咸通十年薨帝自製挽歌羣臣畢和又許百官祭以金貝寓車廞服火之及𦵏帝與妃坐延興門哭以過柩仗衞彌數十里冶金為俑怪寳千計實墓中追封及諡唐書本傳宣宗希冀遐齡無儲嗣懿宗藩邸嘗懷危慄郭美人誕育一女未踰月卒適懿宗傷感之際皇女忽言得活登極後鍾愛之封同昌公主降韋保衡恩澤無比北夢瑣言咸通九年同昌公主出降宅於廣化里仍罄内庫寳貨以實其宅至於房櫳户牖無不以珍異飾之又以金銀為井欄藥臼食櫃水槽釜鐺盆甕之屬仍鏤金為笊籬箕筐製水精火齊琉璃玳瑁等牀悉搘以金龜銀螯又琢五色玉器為什合百寳為圎案又賜金麥銀米共數斛堂中設連珠之帳却寒之簾犀簟牙席龍罽鳯縟又有鷓鴣枕翡翠匣神絲繡被又帶蠲忿犀如意玉又有琴瑟幕紋布巾火蠶綿九玉釵逮諸珍異不可具載自漢至唐公主内降之盛未有也上毎賜御饌湯物道路相屬其饌有靈消炙紅虬脯其酒有凝露漿桂花醑其茶則緑華紫英之號公主薨𦵏於東郊上與淑妃御延興門出内庫金玉駝馬鳳凰麒麟各髙數尺以為威儀其衣服玩具一物已上皆至一百二十舁以絳羅多繡絡金銀瑟瑟為帳幕者亦各千隊繁華輝煥二十餘里杜陽雜編昭宗女平原平原公主積善皇后所生帝在鳳翔以主下嫁李茂貞子繼偘后謂不可帝曰不爾我無安所是日宴内殿茂貞坐帝東南主拜殿上繼偘族兄弟皆西向立主徧拜之及帝還朱全忠移茂貞書取主還京師唐書本傳外戚漢有扶風之竇唐如京兆之韋締好天家皆與國相終始綜其行事固得失之林也而王氏之在元城武氏之在文水者以非秦産不與焉漢竇廣國字少君竇長君其兄竇皇后其姊也少君年四五歲時家貧為人所畧賣傳十餘家至宜陽從其家之長安聞皇后新立家在觀津姓竇氏廣國去時雖小識其縣名及姓上書自陳召見果是乃厚賜田宅金錢封公昆弟家於長安絳侯灌將軍等曰吾屬不死命且懸此兩人兩人所出㣲不可不為擇師傅賓客於是選長者士之有節行者與居竇長君少君由此為退讓君子不敢以尊貴驕人孝景帝立封廣國為章武侯長君前死封其子彭祖為南皮侯呉楚反時竇太后從昆弟子嬰任俠自喜以軍功為魏其侯史記外戚世家竇嬰字王孫孝文皇后從兄子喜賓客孝文時為吳相孝景即位為詹事梁孝王朝因燕飲是時上未立太子酒酣上從容曰千秋萬歲後傳王太后驩嬰進曰天下者髙祖天下父子相傳漢之約也上何以得傳梁王太后由此憎嬰因病免吳楚反上察諸竇無如嬰賢乃拜為大將軍守滎陽監齊趙兵七國破封為魏其侯游士賓客爭歸之武帝即位嬰為丞相舉謫諸竇宗室無行者除其屬籍以故毁日至乃罷免嬰六年竇太后崩嬰益疏不用諸公稍自引而怠傲惟灌夫相得驩甚丞相蚡與夫有隙劾灌夫前事得棄市罪嬰為請莫能解乃竊出上書立召入具告言灌夫醉飽事不足誅上曰東朝廷辯之嬰東朝盛推夫善因言蚡短太后怒曰我在也而人皆藉吾弟令我百歲後皆魚肉之乎上謝曰俱外家故廷辯之於是上使御史簿責嬰所言灌夫頗不讐劾繫都司空廼有飛語為惡言聞上以十二月晦論棄市渭城漢書本傳王仲王皇后父也槐里人生男信與兩女而仲死景帝封信為蓋侯武帝追尊王仲為共侯槐里起園邑二百家長丞奉守漢書外戚傳鄒陽為人有智畧梁事敗孝王恐誅齎以千金令求方畧解罪於上陽至長安因客見王長君長君者王美人兄也後封為蓋侯陽留數日乘間而請曰竊聞長君弟得幸後宫天下無有而長君行迹多不循理今梁王恐誅如此則太后怫鬰泣血無所發怒臣恐長君危於累卵長君曰奈何陽曰長君誠能為上言之得無竟梁事太后厚徳長君入於骨髓而長君之弟幸於兩宫金城之固也長君曰諾乘間入言之事果得不治鄒陽傳田蚡田勝皆王皇后同母弟也王太后母曰臧兒臧兒者故燕王臧荼孫也為槐里王仲妻仲死更嫁長陵田氏生男蚡勝景帝崩太子為皇帝尊太后母臧兒為平原君封蚡為武安侯勝為周陽侯蚡勝貪巧於文辭平原君卒從田氏𦵏長陵置園比共侯園史記外戚世家田蚡王皇后同母弟也生長陵為中大夫辯有口學盤盂諸書王皇后賢之武帝即位蚡封為武安侯新用事卑下賓客欲以傾諸將相六年為丞相蚡以肺腑為相入奏事所言皆聴薦人或起家至二千石權移主上治宅甲諸第田園極膏腴市買郡縣器物相屬於道前後羅鐘鼓立曲旃後房婦女以百數諸珍物狗馬玩好不可勝數元光四年夏蚡取燕王女為夫人太后詔列侯宗室皆往賀酒酣灌夫罵坐蚡怒劾灌夫前事諸灌氏皆得棄市罪春蚡疾上使視鬼者瞻之曰魏其侯與灌夫共欲殺之竟死漢書田蚡傳公孫賀北地義渠人賀祖父昆邪景帝時為隴西守以將軍擊吳楚有功封平曲侯著書十餘篇賀少為騎士從軍數有功自武帝為太子時賀為舍人及武帝即位遷太僕賀夫人君孺衞皇后姊也賀由是有寵元光中為輕車將軍後以車騎將軍從大將軍青出有功封南窌侯後遂代石慶為丞相自公孫𢎞後丞相比坐事死石慶數被譴初賀引拜為丞相不受印綬頓首涕泣曰臣誠不任宰相左右問其故賀曰主上賢明臣不足以稱從是殆矣賀子敬聲代賀為太僕敬聲以皇后姊子驕奢不奉法征和中擅用北軍錢千九百萬發覺下獄時詔捕陽陵朱安世不得賀自請逐捕安世以贖敬聲罪上許之果得安世安世者京師大俠也聞賀欲以贖子笑曰丞相禍及宗矣安世遂從獄中上書告敬聲與陽石公主私通且上甘泉當馳道埋偶人祝詛有惡言下有司案驗賀窮治所犯遂父子死獄中漢書本傳王商字子威涿郡蠡吾人也徙杜陵商父武武兄無故皆以宣帝舅封侯商少為太子中庶子以肅敬敦厚稱父薨商嗣侯擢為諸曹侍中中郎將元帝時至右將軍光禄大夫時定陶共王愛幸幾代太子商為外戚重臣擁佑太子頗有力焉成帝即位徙為左將軍帝元舅大司馬大將軍王鳳顓權行多驕僭商議論不能平鳳鳳知之亦疏商建始三年秋京師民無故相驚言大水至長安中大亂天子親御前殿召公卿議大將軍鳳以為可令吏民上長安城以避水商獨曰此必訛言也不宜令上城重驚百姓有頃長安中稍定問之果訛言上於是壯商之固守數稱其議明年代匡衡為丞相商為人多質有威重容貌絶人河平四年單于來朝引見白虎殿丞相商坐未央廷中單于前拜謁商商起離席與言單于仰視商貌大畏之遷延却退天子聞而歎曰此真漢相矣初鳳怨商使人上書言商閨門内事下其事司𨽻先是皇太后嘗詔問商女欲以備後宫商以病對不入及商以閨門事見考更欲内女為援乃因新幸李倢伃家白見其女大中大夫蜀郡張匡上書以為姦謀不可測度詔收丞相印綬商發病歐血薨諡曰戾侯有司奏商罪過未決請除國邑有詔長子安嗣爵為樂昌侯至長樂衛尉光祿勲元始中王莽誅不附已者安見被以罪自殺國除漢書本傳張臨家杜陵平原侯勃薨子臨嗣臨亦謙儉每登閣殿歎曰桑霍為我戒豈不厚哉臨尚敬武公主薨子放嗣鴻嘉中上欲遵武帝故事與近臣游宴放以公主子開敏得幸取皇后弟平恩侯許嘉女上為放供張充以乘輿服飾號為天子取婦皇后嫁女大官私官並供其第兩宫使者冠蓋不絶賞賜以千萬數放為侍中中郎將與上卧起寵愛殊絶嘗從為微行出遊鬬雞走馬長安中積數年上諸舅皆害其寵白太后太后甚以過放時數有災異議者歸咎放等丞相宣御史大夫方進奏放驕蹇縱恣奢淫不制不宜宿衞上不得已左遷放為北地都尉數月復徴入侍中太后以放為言出為天水屬國都尉歲餘徴放歸第視母公主疾主瘳出放為河東都尉後復徴放為侍中嵗餘遣就國成帝崩放思慕哭泣而死漢書張湯傳馮參字叔平上黨潞人徙杜陵奉世子也學通尚書少為黄門郎給事中宿衞十餘年參昭儀少弟竟寧中以王舅出補渭陵食官令以病免官綏和中封參為宜鄉侯參之國上書願至中山見王太后行未到而王薨王病時上奏願貶參爵以闗内侯食邑留長安上憐之下詔還參京師以列侯奉朝請五侯皆敬憚之丞相翟方進亦甚重焉數謂參物禁太甚今五侯至貴與之並列宜少詘節而君侯盛修容貌以威嚴加之非所以自益也參性好禮儀終不改其恒操頃之哀帝即位帝祖母傅太后用事追怨參姊中山太后陷以祝詛大逆之罪參以同産當坐謁者承㫖召參詣廷尉參自殺且死仰天歎曰參父子兄弟皆備大位身至封侯今被惡名而死姊弟不敢自惜傷無以見先人於地下死者十七人衆莫不憐之漢書馮奉世傳逡按馮氏父子兄弟才品卓然奉世以武功顯野王立以治績聞參矜嚴好禮皆不由女寵以進乃姊弟非辜横罹毒焰不由女寵以進而實由女寵以亡參之遇視父兄有足悲者故獨以外戚著於篇班況舉孝亷為郎積功勞至上河農都尉大司農奏課連最入為左曹越騎校尉成帝之初女為偼伃致仕就第貲累千金徙昌陵昌陵後罷占數于長安漢書叙傳學按班氏如侍中昆弟俱有風節可觀東京而後文武功尤極一門之盛況因女氏入宫占籍長安實扶風始遷祖也故書入外戚云杜業延年之孫緩之子也業有材能以列侯選為太常數言得失不事權貴後坐法免官哀帝即位上書言王氏世權日乆又言宜為恭王立廟京師所言皆合指施行復為太常㑹司𨽻奏業選舉不實坐免官復就國發病死業成帝初尚帝妹潁邑公主主無子薨業家上書求還京師與主合𦵏不許漢書杜周傳年按杜氏初徙茂陵至延復徙杜陵竇融字周公扶風平陵人七世祖廣國孝文皇后之弟封章武侯融早孤居攝中為強弩將軍封建武男家長安中王莽末拜波水將軍莽敗降更始為張掖屬國都尉撫結雄傑懷集遠人得其歡心更始敗河西吏人推融行河西五部大將軍事光武即位遂決䇿東向建武五年夏遣長史劉鈞奉書獻馬帝賜融璽書授融為涼州牧㑹隗囂反融乃與五郡太守共上疏請師期帝深嘉美之賜融外屬圖及太史公五宗外戚世家魏其侯列傳詔報曰每追念外屬孝景皇帝出自竇氏定王景帝之子朕之所祖昔魏其一言繼統以正長君少君尊奉師傅修成淑徳施及子孫此皇太后神靈上天祐漢也將軍所讓隗囂書非忠孝慤誠孰能如此今關東已定大兵悉西將軍其抗厲威武以應期㑹融被詔即將兵入金城因大兵未進引還八年夏車駕西征隗囂融率步騎數萬與大軍㑹遂共進軍囂衆大潰帝髙融功封融為安豐侯弟友為顯親侯遣還鎮及隴蜀平詔融奏事京師拜為冀州牧又遷大司空融自以非舊臣一旦入朝在功臣右數辭讓爵位帝不得已乃䇿免融二十三年行衛尉事弟友為城門校尉兄弟並典禁兵友卒融長子穆尚内黄公主代友為城門校尉穆子勲尚泚陽公主友子固亦尚湼陽公主顯宗即位融從兄子林為䕶羌校尉自祖及孫官府邸第相望京邑奴婢以千數親戚功臣中莫與為比永平二年林以罪誅帝數下詔切責融融惶恐乞骸骨詔令歸第養病聴上衛尉印綬穆等交通屬託干亂政事帝怒盡免穆等官㑹融卒年七十八諡曰戴侯帝以穆不能修尚常令謁者一人監䕶其家居數年謁者奏穆怨望帝令將家屬歸本郡惟勲以主壻留京師穆捕繫死平陵獄勲亦死洛陽獄十四年封勲弟嘉為安豐侯奉融後固字孟孫少以尚公主為黄門侍郎好覽書傳喜兵法顯宗即位遷中郎將帝欲遵武帝故事擊匈奴通西域以固明習邉事拜奉車都尉出屯涼州明年率酒泉敦煌張掖甲卒及羌戎萬二千騎出酒泉塞至天山擊呼衍王斬首千餘級呼衍王走追至蒲類海留吏士屯伊吾廬城時諸將惟固有功加位特進明年復出玉門擊西域遂破白山降車師在邉數年羌戎服其恩信肅宗即位以公主修勅慈愛累世崇重加號長公主増邑三千户徴固為大鴻臚復為衛尉固乆厯大位性謙儉愛人好施士以此稱之卒諡曰文侯後漢書本傳馬廖馬防馬光扶風茂陵人伏波將軍援之子也寥字敬平少以父任為郎明徳皇后既立拜虎賁中郎將顯宗崩為衞尉時皇太后躬履節儉事從簡約廖慮美業難終上疏長樂宫勸成徳政太后深納之廖性質誠畏慎盡心納忠不屑毁譽有司連據舊典奏封廖等累讓建初四年遂受封為順陽侯每有賞賜輒辭讓京師以是稱之子豫為步兵校尉太后崩馬氏失勢豫投書怨誹又防光奢侈好樹黨與有司奏免豫遣寥防光就封後詔還廖京師永元四年卒和帝以廖先帝之舅厚加賵賻諡曰哀侯防字江平永平十二年與弟光俱為黄門侍郎肅宗即位拜防中郎將稍遷城門校尉建初二年金城隴西羌反拜防行車騎將軍事將兵擊破之還拜車騎將軍貴寵與九卿絶席光自越騎校尉遷執金吾四年封防潁陽侯光許陽侯防數言政事多見採用子鉅為常從小侯六年正月鉅當冠特拜黄門侍郎肅宗自臨冠之防兄弟貴盛奴婢各千人已上資産巨億多聚聲樂賔客奔凑刺史守令多出其家嵗時賑給鄉閭故人莫不周給防又多牧馬畜賦歛羌戎帝數加譴勅由是權勢稍損賔客亦衰八年因兄子豫怨謗有司奏防兄弟奢侈踰僭悉免就國詔曰舅氏一門俱就國封四時陵廟無助祭先后者朕甚傷之其令許侯思愆田廬有司勿復請以慰朕渭陽之情光為人小心周宻帝特親愛之乃復位特進子康黄門侍郎竇憲誅憲奴誣光與憲逆自殺家屬歸本郡本郡復殺康而防及廖子遵皆坐徙封丹陽防後以江南下濕乞歸本郡卒子鉅嗣為長水校尉永初七年鄧太后詔諸馬子孫還京師復紹封光子朗為合鄉侯後漢書本傳竇憲字伯度融曾孫也父勲被誅建初二年女弟立為皇后拜為郎稍遷侍中虎賁中郎將弟篤為黄門侍郎憲恃宫掖聲勢遂以賤直請奪沁水公主園田後發覺帝召憲切責使以田還主雖不繩其罪亦不授以重任和帝即位太后臨朝憲以侍中内幹機宻出宣詔命肅宗遺詔以篤為虎賁中郎將篤弟景瓌並中常侍於是兄弟皆在親要之地齊王子都鄉侯暢來弔國憂得幸太后憲懼分宫省之權遣客刺殺暢事覺太后怒閉憲内宫憲懼誅自求擊匈奴以贖死㑹南單于請兵北伐乃拜憲車騎將軍發兵出塞明年與北單于戰於稽落山大破之遂登燕然山刻名勒功紀漢威徳而還詔拜憲大將軍是時篤為衛尉景瓌皆侍中奉車駙馬都尉明年詔封憲冠軍侯篤郾侯景汝陽侯瓌夏陽侯憲不受封遂將兵出鎮凉州明年復擊北人於金㣲山大破之憲既負重勞陵肆滋甚帝慮其為亂㑹班師還京師詔收憲大將軍印綬更封為冠軍侯及篤景瓌皆遣就國帝以太后故不欲名誅憲為選嚴能相督察之憲篤景到國皆廹令自殺瓌以素自修不被逼廹徙封羅侯初竇后之譖梁氏憲等豫有謀焉永元十年梁棠兄弟徙九真還路由長沙逼瓌令自殺鄧后臨朝詔諸竇前歸本郡者與安豐侯萬全俱還京師後漢書本傳宋楊扶風平陵人也以恭孝稱於鄉閭不應州郡之命楊姑即明徳馬后之外祖母也馬后聞楊二女皆有才色迎而訓之永平末選入太子宫肅宗即位並為貴人建初三年大貴人生慶立為皇太子徴楊為議郎褒賜甚渥後竇皇后誣譖貴人母子遂廢慶為清河王二貴人同時自殺於是免楊歸本郡郡縣因事復捕繫之楊友人前懷令山陽張峻左馮翊沛國劉均等奔走解釋得以免罪楊失志憔悴卒於家和帝時慶上言外祖母王年老遭病下土無醫藥願乞詣洛陽療疾於是詔宋氏悉歸京師除慶舅衍俊蓋暹等皆為郎安帝立封衍為盛鄉侯又追封諡宋楊為當陽穆侯楊四子皆為列侯食邑各五千户宋氏為卿校侍中大夫謁者郎吏十餘人後漢書清河王傳耿襲茂陵人弇弟牟平侯舒之子也舒卒襲嗣尚顯宗女隆慮公主襲卒子寳嗣寳女弟為清河孝王妃安帝立以妃為甘園大貴人帝以寳元舅之重使監羽林左車騎位至大將軍與中常侍樊豐帝乳母王聖等譖廢皇太子及排陷太尉楊震議者怨之寳弟子承襲公主爵為林慮侯位至侍中安帝崩閻太后以寳等阿附嬖倖共為不道䇿免寳及承遣就國寳自殺大貴人數為耿氏請陽嘉三年詔封寳子箕牟平侯恒為陽亭侯承為羽林中郎將貴人薨大將軍梁冀從承求貴人珍玩不能得冀怒奪其封承恐遂亡匿於穰數年冀推迹得之族其家後漢書耿弇傳班始超長子雄之子也尚清河孝王女隂城公主主順帝之姑貴驕淫亂與嬖人居帷中而召始入使伏牀下始積怒遂拔刃殺主帝大怒腰斬始後漢書班超傳竇章字伯向安豐侯萬全少子也少好學有文章與馬融崔瑗同好更相推薦永初中三輔遭羌冦章避難東國家於外黄躬勤孝養講讀不輟太僕鄧康聞其名欲與交章不肯往康以此益重焉遂薦為校書郎順帝初章女選入掖庭為貴人擢章羽林郎將遷屯騎都尉章謙虛下士收進時輩甚得名譽是時梁竇各有賓客交構其間章推心待之故得免於患貴人殁帝禮待之無衰中子唐有俊才官虎賁中郎將後漢書本傳竇武字游平安豐戴侯融元孫父奉定襄太守武少以經行著稱延熹八年長女選入掖庭為貴人拜武郎中其冬貴人立為皇后武遷越騎校尉封槐里侯明年拜城門校尉在位多辟名士清身疾惡禮賂不通兄子紹為虎賁中郎將性疏簡奢侈武上書求退紹位又自責不能訓導當先受罪由是紹更遵節莫敢違犯時國政多失内官專寵帝崩武入白太后徴立靈帝拜武為大將軍論定䇿功封聞喜侯武既輔朝政常有誅剪宦官之意數白誅曹節等太后猶豫未忍武乃奏免黄門令魏彪以所親小黄門山氷代之使氷奏長樂尚書鄭䬃送北寺獄䬃辭連及曹節王甫氷即奏收節等時武出宿歸府長樂五官史朱瑀盗發武奏因夜召所親喢血共盟誅武等節聞之白帝御徳陽前殿拜王甫黄門令持節至北寺獄收氷殺之出鄭䬃使持節捕收武等武馳入步兵營與紹共射殺使者召㑹北軍五校士數千人屯都亭下詔少府周靖與中郎將張奐率五營士討武王甫出與奐等合明旦悉軍闕下與武對陣營府素畏服中官於是武軍稍稍歸甫武紹皆自殺收捕宗親賓客悉誅之徙武家屬日南武府掾桂陽胡騰獨殯殮行䘮武孫輔時年二歲節等捕之急騰逃輔於零陵界以為己子使聘娶焉後舉桂陽孝亷建安中荆州牧劉表辟為從事使還竇姓表卒曹操定荆州辟丞相府從征馬超為流矢所中死後漢書本傳耿援羽林左監顯之子也尚桓帝妹長社公主為河陽太守後曹操誅耿氏惟援孫𢎞存焉後漢書耿弇傳魏張緝馮翊髙陵人既之子東莞太守嘉平中女為皇后徴拜光禄大夫位特進妻向為安都鄉君與中書令李豐同謀誅三國志張既傳魏畧曰緝字敬仲太和中為温令㑹諸葛亮出緝上便宜詔以問中書令孫資資以為有籌畧遂召拜騎都尉參征蜀軍軍罷入為尚書郎以稱職為明帝所識緝性矜躁數為國家陳擊吳蜀形勢緝與李豐通家又居相側近豐被收事與緝連遂收送廷尉賜死獄中其諸子并誅張既傳注李豐中書令結后父光禄大夫張緝謀以夏侯𤣥輔政豐内握權柄子尚公主與緝俱馮翊人故緝信之嘉平六年二月當拜貴人豐等欲因御臨軒諸門有陛兵誅大將軍以元代之大將軍㣲聞其謀請豐相見豐往即殺之事下有司廷尉請論如法詔書齊長公主先帝遺愛原其三子死命於是豐緝皆夷三族三國志夏侯尚傳魏書曰初豐以身處機宻息韜又以列侯給事中尚齊長公主有内外之重心不自安緝嘗病創卧豐遣韜省病韜屛人語緝曰韜尚公主父子在機近大將軍秉事嘗懷深憂君侯雖有后父之尊安危未可知皆與韜家同慮者也韜父欲與君侯謀之緝黙然良乆曰同舟之難吾焉所逃此大事不捷即禍及宗族韜往報豐宻語黄門監蘇鑠等皆許諾豐復宻告緝緝遣子邈與豐相結同謀起事魏畧曰豐字安國故衞尉李義子也豐仕歴三朝不以家計為意韜尚公主豐常約勅不得有所侵取得賜輙施親族死後有司籍其家家無餘積夏侯尚傳注晉楊文宗武元皇后父也其先事漢四世為三公文宗為魏通事郎襲封蓩亭侯早卒以后父追贈車騎將軍諡曰穆晉書外戚傳楊駿字文長𢎞農華隂人以后父超居重任自鎮軍將軍遷車騎將軍封臨晉侯帝自太康以後天下無事始寵后黨請謁公行駿及珧濟勢傾天下時人有三楊之號及帝疾篤后奏帝以駿輔政遂當寄託之重惠帝即位進太傅大都督假黄鉞録朝政慮左右間已以其甥段廣張邵為近侍之職又多樹親黨皆領禁兵弟珧濟數相諫止駿不能用殿中中郎孟觀李肇素不為駿所禮隂搆駿於賈后賈后令肇報楚王瑋求入朝瑋至觀肇乃啓帝作詔廢駿以侯就第東安公繇率殿中兵四百人討駿尋而殿中兵出燒駿府駿逃於馬厩殺之親黨皆夷三族永寧初詔曰舅氏失道宗族隕墜其以蓩亭侯楊超為奉朝請騎都尉以慰蓼莪之思焉珧字文琚位尚書令衛將軍素有名稱得幸於武帝以兄貴盛知權寵不可居自乞遜位前後懇至終不許珧初以退讓稱晚乃合朋黨構出齊王攸自是素論盡矣珧臨刑稱寃當時皆謂宜為申理而賈氏族黨待諸楊如讐促行刑者遂斬之濟字文通歴鎮南征北將軍遷太子太傅濟有才藝與兄珧深慮盛滿與諸甥李斌等共切諫駿駿遂疏濟後與諸兄俱見害難發之夕東宫召濟濟謂裴楷曰吾將何之楷曰子為保傅當至東宫濟好施乆典兵馬所從四百餘人皆秦中壯士欲救濟濟已入宫莫不歎恨晉書本傳杜乂字𢎞理成恭皇后父鎮南將軍預孫性純和美姿容有盛名於江左襲封當陽侯辟公府掾為丹陽丞無男生后而乂終妻裴氏嫠居養后以禮自防甚有徳音咸康初追贈紫金光禄大夫諡曰穆封裴氏為髙安鄉君孝武時進廣徳縣君裴氏夀考百姓號曰杜姥初司徒蔡謨甚器重乂嘗言於朝曰恨諸君不見杜乂也其為名流所重如此晉書外戚傳北魏姚黄眉興之子太宗昭哀皇后之弟姚泓滅黄眉來歸太宗厚禮待之尚陽翟公主拜駙馬都尉世祖即位拜太常卿卒贈隴西王諡曰獻黄眉寛和温厚希言得失世祖悼惜之魏書外戚傳宿石朔方人赫連屈丐弟文陳曾孫也天興二年文陳歸闕太祖嘉之以宗女妻焉祖若豆根太宗時賜姓宿氏父㳫干世祖時從征平凉有功賜爵漢安男後從討蠕蠕戰殁石年十三襲爵又改爵義陽子嘗從獵髙宗親欲射虎石叩馬諫引帝至髙原上後虎騰躍殺人詔曰石為忠臣後有犯罪勿坐尚上谷公主拜駙馬都尉進爵太山公為北中道都大將卒諡康魏書本傳韋崇京兆杜陵人閬從子司徒從事中郎髙祖納其女為充華嬪除南潁川太守不好發摘細事常云何用小察以傷大道髙祖聞而嘉賞遷洛以崇為司州中正復為河南邑中正以平直見稱出為鄉郡太守又除華山太守卒魏書韋閒傳北齊楊愔字遵彦𢎞農華隂人兒時風度深敏及長能清言美音制人士莫不敬異孝莊幽崩潛竄累載屬齊神武至信都投刺引見即署行臺郎中轉太行臺右丞於時霸圖草創文檄教令皆自愔出遷給事黄門侍郎武定末超拜吏部尚書天保初遷尚書右僕射尚太原長公主即魏孝静后也又改封華山郡公徙尚書令濟南嗣業任遇益隆推誠體道時無異議乾明元年為孝昭帝所誅愔早著聲譽風表鑒裁為朝野所稱自尚公主後衣紫羅袍金鏤大帶遇李庶謂曰我此衣服都是内裁見子不能無愧及居端揆經綜機衡神無滯用自天保五年已後維持匡救實有賴焉文宣大漸以常山長廣二王位地親逼深以後事為念愔受遺輔政二王乃伏家僮數十人於録尚書後室愔被拳杖亂毆血流率髙歸彦賀抜仁斛律金擁送御前一目已出遂斬之太皇太后臨愔䘮哭曰楊郎忠而獲罪以御金為一眼親内之曰以表我意愔子獻天和皆尚帝姑北史楊播傳北周韋世康京兆杜陵人孝寛兄夐之子也幼沉敏有器度年十嵗州辟主簿尚周文帝女襄樂公主從武帝平齊授司州總管長史時東夏初定百姓未安世康綏撫之士庶胥悦入為司㑹中大夫尉遲逈之亂隋文帝謂世康曰汾絳舊是周齊分界恐生搖動今以委公授絳州刺史闔境清肅世康性恬素好古不以得䘮干懷在州有止足之志轉吏部尚書選用平允請托不行以母憂去職開皇十三年復拜吏部尚書前後多所進拔稱為亷平嘗因侍宴乞骸骨上曰冀與公共理天下今之所請深乖本望於是出拜荆州總管為政簡静百性愛恱卒於州諡曰文北史本傳韋孝寛子諶年十歲魏文帝欲以女妻之寛辭以兄子世康年長帝嘉之遂以妻世康周書韋孝寛傳滕王瓚字恒生一名慧文帝之弟也仕周以武元軍功封竟陵郡公尚周武帝妹順陽公主美姿容好書愛士甚有時譽號楊三郎武帝甚親愛之平齊之役諸王咸從留瓚居守文帝作相瓚恐為家禍隂有圖帝計及受禪立為滕王拜雍州牧後坐事以王就第瓚妃宇文氏素與獨孤皇后不平至是鬰鬰不得志隂有呪詛帝命出之瓚不忍離絶固請帝不得已從之宇文氏竟除屬籍由是恩禮更薄開皇十一年暴薨北史隋宗室諸王傳文按瓚係隋文母弟以既列王封不入宗室又因宇主壻之故搆釁宫闈遂至棣萼失歡故特以北周外戚著於篇竇毅字天武扶風平陵人熾兄子也深沉有器度魏孝武初起家為員外散騎侍郎時齊神武擅朝慨然有殉主之志孝武西遷遂從入闗擒竇泰復𢎞農戰沙苑皆有功累授驃騎大將軍開府儀同三司保定三年拜大將軍太祖時突厥許納女於我齊人亦重幣求婚狄欲有悔朝廷以毅地兼勛戚素有威重乃命為使及至齊使亦在突厥猶有貳志毅抗言正色以大義責之累旬乃定朝議嘉之隋開皇初拜定州總管累居藩鎮咸得民和薨於州諡曰肅毅温和謹慎尚太祖第五女襄陽公主特為朝廷所委信雖任兼出入未嘗有矜惰之容時人以此稱之子賢字託賢志業通敏少知名周書竇熾傳隋竇榮定熾子也沉深有器局周文帝見而竒之授平東將軍從戰北芒以功拜上儀同從平齊加上開府拜前將軍其妻則隋文帝長姊安成長公主也文帝與之情契甚厚榮定亦知帝有人君之表尤相推結及受禪坐事除名公主曰天子姊乃作田舍兒妻尋拜右武侯大將軍上數幸其第恩錫甚厚突厥冦邉為行軍元帥數挫其鋒突厥請盟而去進爵安豐郡公歲餘拜右武衞大將軍帝欲以為三公榮定上書固辭乃止及卒贈陳國公諡曰懿北史竇熾傳韋夀字世齡父孝寛周上柱國鄖國公夀以貴公子早有令譽周武帝親征髙氏拜京兆尹委以後事以父軍功拜儀同三司封滑國公俄以父䘮去職髙祖受禪起令視事尋遷恒毛二州刺史有治名開皇十年卒諡曰定仁夀中髙祖為晉王廣納其女為妃以其子保巒嗣隋書本傳唐竇威字文蔚扶風平陵人太穆皇后其從兄弟女也家世貴子弟皆喜武力獨威尚文内史令李徳林舉秀異授秘書郎不調者十年蜀王秀辟為記室威以秀多不法謝疾去秀廢府屬皆得罪威獨免髙祖入闗召補大丞相府司録叅軍威乃裁定制度帝曰威今之叔孫通也武徳元年授内史令每論政事得失必陳古為諭帝嘗引入卧内謂曰昔周有八柱國吾與公家是也今我為天子而公為内史令事固有不等耶威懼謝曰臣家在漢再為外戚至元魏有三皇后今陛下龍興臣復以姻戚進懼不克任帝笑曰公以三后族夸我耶闗東人與崔盧婚者猶自矜大公世為帝戚不亦貴乎後寢疾帝臨問卒諡曰靖威從兄子抗字道生父榮定母隋文帝姊安成公主也抗以帝甥蚤貴入太學釋褐千牛備身累轉梁州刺史將之官文帝幸其第酣宴如家人禮母卒數號絶詔宫人節哭嵗餘為岐州刺史轉幽州總管所至以寛恵聞抗與髙祖少相狎及楊元感反抗謂髙祖曰元感為我先耳李氏名在圖籙天所啟也髙祖曰公無妄言煬帝遣抗出靈武連䕶長城聞髙祖已定京師喜曰此吾家壻豁達有大度真撥亂主也因歸長安髙祖見之喜握手曰李氏果王何如因置酒為樂以兄呼之宫中稱為舅後從秦王平薛舉功第一又從征王世充東都平册勲於廟賜女樂一部卒贈司徒諡曰宻唐書本傳抗弟慶性和厚工草𨽻大業末為南郡太守為盜賊所害慶弟璡亦工草𨽻頗解鐘律歴潁川南郡扶風太守北史竇熾傳宇文士及字仁人京兆長安人父述隋右衞大將軍開皇末以述勲封新城縣公尚煬帝女南陽公主為尚輦奉御從幸江都兄化及謀逆以主壻忌之弗告已弑帝乃封蜀王初士及為奉御髙祖任殿中少監雅自欵結及從化及至黎陽化及兵日蹙士及勸歸命不從詭求督饟俄而歸帝時士及女弟為昭儀有寵由是見親禮從秦王平宋金剛録功復隋舊封以宗室女妻之遷王府驃騎將軍王即位拜中書令以本官檢校凉州都督時突厥數入冦士及欲立威鎮燿邉鄙每出入盛陳兵衛又痛折節下士或告其反訊無狀召為殿中監改蒲州刺史政尚寛簡人皆宜之擢右衛大將軍復為殿中監卒諡曰恭黄門侍郎劉洎曰士及居家侈肆不可謂恭乃改曰縱唐書本傳竇誕抗第三子也隋仁夀中起家為朝請郎義寧初辟丞相府祭酒封安豐郡公尚髙祖女襄陽公主從太宗征薛舉為元帥府司馬轉太常卿髙祖諸少子荆王元景等未出宫者十餘王國司家事皆令誕主之出為梁州都督貞觀初召拜右領軍大將軍莘國公復拜宗正卿太宗嘗與之言昏忘不能對詔誕可光禄大夫還第卒諡曰安舊唐書竇威傳楊師道恭仁少弟𢎞農華隂人也隋末自洛陽歸國授上儀同尋尚桂陽公主超拜吏部侍郎貞觀七年代魏徴為侍中性周慎謹宻未嘗洩漏内事退朝後必引當時英俊宴集園池文㑹之盛當時莫比雅善篇什又工草𨽻酣賞之際援筆直書有如宿搆太宗每見師道所製必吟諷嗟賞之十三年轉中書令太子承乾逆謀事洩師道妻前夫之子趙節與承乾通謀師道㣲諷太宗冀活之由是罷知機宻轉吏部尚書師道貴家子四海人物未能委練所署用多非其才而深抑貴勢親黨以避嫌疑時論譏之太宗嘗謂侍臣曰師道性行純善而情實怯愞未甚更事緩急不可得力二十一年卒贈并州都督子豫之尚巢刺王女夀春縣主居母䘮與永嘉公主淫亂為主壻竇奉節所擒具五刑而殺之舊唐書楊恭仁傳薛萬徹本燉煌人後徙京兆咸陽萬均之弟也歸髙祖授車騎將軍事隐太子太子誅與數十騎亡之南山秦王數使貸諭乃出從李靖討突厥以功歴右衞將軍蒲州刺史副李勣擊薛延陀戰磧南為先鋒斬首三千級獲馬萬五千改左衞將軍尚丹陽公主加駙馬都尉貞觀二十二年以青丘道行軍總管帥師伐髙麗次鴨淥水以竒兵襲大行城斬敵將所夫孫遂傅泊汋拔其城萬徹在軍中副將裴行方言其怨望李勣曰萬徹位大將軍親主壻而内懷不平罪當誅詔除籍徙邉㑹赦還永徽二年授寧州刺史入朝與房遺愛昵甚遺愛曰若國有變當與公共輔荆王謀洩下獄誅唐書薛萬均傳蘇朂京兆武功人瓌從父也武徳中為秦王府文學館學士貞觀中尚南康公主拜駙馬都尉累遷魏王泰府司馬朂博學有美名甚為泰所重因勸泰請開文學館引才名之士撰括地志後歴吏部郎太子左庶子卒舊唐書蘇瓌傳喬知之同州馮翊人父師望尚髙祖女廬陵公主拜駙馬都尉官至同州刺史知之與弟偘備並以文詞知名知之尤稱俊才所作篇咏時人多諷誦之則天時遷左司郎中有侍婢曰窈娘美麗善歌舞為武承嗣所奪知之因作綠珠篇以寄情宻送婢婢感憤自殺承嗣大怒因諷酷吏羅織知之偘開元初為兖州都督備預修三教珠英長安中卒於襄陽令舊唐書文苑傳杜荷杜陵人如晦子也尚城陽公主賜爵襄陽郡公授尚乘奉御貞觀中與太子承乾謀反坐死舊唐書杜如晦傳韋𤣥貞初為普州參軍以女為皇太子妃擢拜豫州刺史中宗嗣位妃為后及帝降為廬陵王𤣥貞配流欽州而死后母崔氏為欽州首領甯承兄弟所殺𤣥貞有四子洵浩洞泚亦死於容州及中宗復位追贈𤣥貞為上洛郡王遣使迎𤣥貞及崔氏䘮柩歸京師又遣廣州都督周仁軌率兵斬甯承兄弟以其首祭於崔氏及柩至上與后登長樂宫望䘮而泣加贈𤣥貞為酆王諡文獻舊唐書外戚傳髙宗大漸顧命裴炎輔少主既而中宗欲以后父韋元貞為侍中炎不可中宗不恱謂左右曰我讓國與元貞豈不得何為惜侍中炎懼遂與則天定䇿廢中宗幽於别所大唐新語韋温者中宗廢后從父兄也初試吏坐贓斥神龍初擢宗正卿遷禮部尚書封魯國公弟湑自洛州户曹參軍事連拜左羽林大將軍曹國公湑子捷尚成安公主温從弟濯尚定安公主並拜駙馬都尉捷為右羽林將軍景龍三年温同中書門下三品遥領揚州大都督湑初兼修文館學士時熒惑乆留羽林后惡之湑從至温泉后毒殺之以塞變帝崩后專政畏有變勅温盡總内外兵守省中又以從子播捷從弟璿髙嵩分領左右羽林軍元宗兵夜起將軍葛福順攻元武門斬播璿髙嵩梟首以狥后死遲旦斬温分捕諸韋子弟無少長皆斬唐書外戚傳崔無詖京兆長安人本博陵舊族父從禮中宗韋庶人之舅景龍中衞尉卿時中書令蕭至忠才位素髙甚承恩顧勅亡先女㝠婚韋庶人亡弟無詖婚至忠女后為女家中宗為兒家供擬甚厚時人為之語曰皇后嫁女天子娶婦及庶人敗至忠女亦死無詖坐累乆貶開元中為益州司馬㑹楊國忠為新都尉因事引用之累轉滎陽郡太守安禄山率衆南向無詖召募拒之及賊陷滎陽無詖及官吏盡為賊所擄舊唐書忠義傳周仁軌京兆萬年人后母族也為并州長史殘酷嗜殺戮異日見堂下有斷臂惡之送於野數昔往視故在是月韋后敗使者誅仁軌刑人舉刀仁軌承以臂墮地乃悟唐書外戚傳竇孝諶刑部尚書誕之子昭成皇后父也則天時歴潤州刺史長夀二年后母龎氏被酷吏所陷誣與后呪詛不道孝諶左遷羅州司馬卒子希瑊希球希瓘並流嶺南神龍初隨例雪免景雲年追贈孝諶太尉豳國公元宗即位加贈太保希瑊等以舅氏甚見優寵希瑊累遷太子少傅豳國公尋卒希球官太子賓客封冀國公開元二十七年卒諡曰靖希瓘初賜爵畢國公後改名􅞓元宗以早失太后尤重外家􅞓兄弟三人皆國公食實封􅞓子鍔又尚元宗女永昌長公主而兄弟皆貪鄙過自封殖􅞓又甚之卒贈司徒􅞓從父弟維鍌好學以撰著為業時宗族咸以外戚崇飾輿馬維鍌獨清儉自守官至水部郎中卒撰吉凶禮要二十巻行於世舊唐書外戚傳楊眘交本名璬思訓孫也少襲爵觀國公尚中宗女長寧公主預誅張易之有功賜實封五百户舊唐書楊恭仁傳中宗之在春宫也妙簡才地將降天孫公以選尚長寧郡主累遷左衛郎將神龍元祀中興在運預聞大䇿克樹休勲貴主宜家既増湯沐列侯傳國復錫山川至是始襲觀國公拜駙馬都尉累遷秘書監坐事左出巴州刺史復左轉鄜亳許絳四州别駕公性明敏有器韻不恃貴而傷義不怙寵而廢公奉以周旋加之撝挹雖在降出無他悔恡此公之以道終始者也張九齡撰楊眘交墓誌王仁皎元宗王庶人父也景龍中官至長上果毅元宗即位以后父歴將作大匠太僕卿遷開府儀同三司封祁國公仁皎不預朝政但厚自奉養積子女財貨而已卒贈太尉官供𦵏事柩車既發上於望春亭遙望之令張說為其碑文元宗親書石焉舊唐書外戚傳子守一與后孿生帝㣲時與雅舊後詔尚清陽公主從討太平主有功由尚乘奉御遷殿中少監累進太子少保襲父爵被遇良渥后廢貶栁州别駕至藍田賜死唐書外戚傳韋堅字子全京兆萬年人姊為惠宣太子妃妹為皇太子妃中表貴盛故仕最蚤由秘書丞歴奉先長安令有幹名見宇文融楊眘矜父子以聚歛進乃運江淮租賦所在置吏督察以佐國稟歲終增鉅萬擢陜郡太守水陸運使堅乃壅渭為堰絶㶚滻而東注永豐倉下復與渭合初滻水銜苑左有望春樓堅於下鑿為潭以通漕二年而成帝為升樓詔羣臣臨觀豫取洛汴宋山東小斛舟三百首貯之潭篙工柁師皆為吳楚服每舟署某郡以所産陳其上堅跪取諸郡輕貨上於帝惠宣妃亦出寳物供具帝大恱名潭曰廣運堅進兼江淮租庸轉運處置等使又兼御史中丞封韋城縣男堅妻姜皎女李林甫舅子也初甚昵比既見其寵惡之堅亦銳於進又與左相李適之善林甫授堅刑部尚書奪諸使以楊眘矜代之堅失職稍怨望隴右河西節度使皇甫惟明數於帝前稱堅才林甫知之惟明故為忠王友王時為皇太子矣正月望夜惟明與堅宴集林甫奏堅外戚與邉將私且謀立太子有詔訊鞫林甫使眘矜等文致其獄帝貶堅縉雲太守籍其家堅諸弟訴枉帝大怒太子懼表與妃絶復貶堅江夏别駕未幾長流臨封郡弟蘭氷芝子諒皆謫去嵗中遣監察御史羅希奭就殺之唐書本傳郭曖華州鄭縣人子儀第六子年十餘歲尚代宗第四女昇平公主昇平年亦與曖相類大厯中恩寵冠於戚里曖檢校左散騎常侍朱泚亂為賊所逼欲授偽官曖辭以居䘮被疾既而與公主皆奔奉天徳宗喜從駕至山南改太常卿同正員貞元中皇孫廣陵郡王納曖女為妃曖卒贈尚書左僕射妃生穆宗皇帝穆宗即位詔贈曖太傅子釗鏦銛舊唐書郭子儀傳代宗獨孤妃薨贈貞懿皇后將𦵏汾陽王在邠州以子尚主之故欲致祭遍問諸從事皆云古無人臣祭皇后之儀汾陽曰此事須栁侍御裁之時侍御掌汾陽書記奉使在京師以書急召之既至説祭事初亦對如諸人既而曰禮緣人情令公勲徳不同常人且國姻戚自令公始亦謂得宜汾陽曰正合子儀本意侍御草祭文首稱駙馬都尉郭曖父中叙特恩許致祭之意辭簡禮備汾陽覽之大喜因話錄釗代宗朝以外孫為奉禮郎累官至左金吾大將軍改邠寧節度使入為司農卿憲宗寢疾宦䜿妄議廢立穆宗問計於釗答曰殿下為太子當旦夕視膳何外慮乎時稱得元舅體穆宗即位為河陽三城節度使徙河中尹領晉綘慈隰節度敬宗立又帥劍南東川太和中南蠻冦蜀杜元頴不能禦詔釗兼領西川節度釗貽書蠻首􅓕巔曰元穎數侵吾圉我以是報乃與釗修好約無犯天子嘉之即拜西川節度使以疾請代為太常卿卒贈司徒鏦字利用尚徳陽郡主詔為主營第長興里順宗立主進封漢陽公主擢鏦檢校國子祭酒駙馬都尉自景龍後外戚多為檢校官不治事宰相薦其才不當以外戚廢乃拜右金吾將軍封太原郡公恭遜折節不以富貴加人性周畏有諌於上退必毁稿家人子弟無知者别墅在都南尤勝塏穆宗嘗幸之置酒極歡改太子詹事充閑廄宫苑使卒贈尚書左僕射唐書郭子儀傳昇平公主生子三人女二人長為皇太后今上即位皇太后昆弟皆寵錫尊官君最少自汾州刺史入為殿中監尚西河公主歲餘改宫苑閑廄使長慶三年暴疾卒太后聞之驚悼悲哀使者自中宫出按問發疾之狀月餘乃解沈亞之撰郭銛墓誌釗子仲文仲恭仲詞開成二年詔仲文襲太原郡公給事中盧𢎞宣奏釗妻沈公主女代宗皇帝外孫其子仲詞尚饒陽公主使仲文承嫡則沈當黜且仲詞亦不得尚主乃詔仲詞襲封仲文以太皇太后故置不問仲恭歴詹事府丞亦尚金堂公主唐書郭子儀傳杜悰京兆萬年人佑子式方之第三子也以䕃三遷太子司議郎元和九年選尚岐陽公主岐陽憲宗長女郭妃所生自頃選尚多於貴戚或武臣節將之家於時上頗重學士遂令宰臣選尚文雅之士可居清列者初於文學後進中選擇皆辭疾不應惟悰願焉累授忠武軍節度使開成初入為工部尚書判度支屬岐陽公主薨乆而未謝文宗怪之户部侍郎李班對曰近日駙馬為公主服斬衰三年士族之家不願為國戚者半為此也乃詔行杖周永為通制㑹昌中拜中書侍郎同中書門下平章事大中初出鎮西川俄復入相加司徒太傅邠國公舊唐書杜佑傳悰通貴日乆門下有術士李某悰待之厚悰任西川節度使馬植罷黔中赴闕至西川術士一見宻於悰曰相公將有禍非馬中丞不能救悰驚信發日厚幣贈之仍令吏為植於都下買宅生計無闕植感悰不知其㫖俄而作相懿安皇太后崩悰懿安子壻也忽一日内榜子檢責宰相元載故事植喻㫖翼日上前萬端營救植素辨博能回上意事遂寢又杜何博士悰之子也仕蜀無他才止以貴公子享俸禄恥其官卑詣執政陳啓自述門閥執政愍而慰之東觀奏記韋保衡字藴用京兆人父慤字端士太和初登第大中四年拜禮部侍郎選士頗得人領節度使卒保衡咸通五年登進士第累拜起居郎十年正月尚懿宗女同昌公主公主郭淑妃所生妃有寵出降之日傾宫中珍玩以為贈送尋以保衡為翰林學士拜中書舍人兵部侍郎不期年以本官平章事保衡恃恩權素所不恱者必加排斥自起居郎至宰相二年之間階至特進扶風縣開國侯食邑二千户十一年八月公主薨恩禮漸薄咸通末淮徐盗起竟得罪賜死舊唐書本傳宋王繼勲彰徳節度饒之子孝明皇后同母弟也性凶率無賴以后故為内殿供奉官領虎捷左右廂都虞候權侍衞步軍司事所為多不法㑹新募兵千餘將遣出征繼勲縱令掠人子女京城紛擾上聞遣捕斬百餘人人情始定時后已崩上追念后故不之罪也乾徳四年復為部曲所訟詔解兵柄奉朝請繼勲怏怏專以臠割奴婢為樂一日天雨墻壞羣婢突出訴寃上命中使詰之盡得繼勲所為不法事詔削奪官爵勒歸私第開寳三年命分司西京繼勲殘暴愈甚強市民間子女備給使小不如意即殺食之而棺其骨棄野外洛民苦之不敢告太宗在藩邸頗聞其事及即位乃斬繼勲洛陽市其後家寓西洛潁陽孫惟徳不能自立丐食以給真宗聞而憫之授汝州司士參軍宋史外戚傳王詵字晉卿全斌之後家京兆能詩善畫尚蜀國長公主官至留後宋史王全斌傳宦官宦官出入宫闈供掃除之役延及漢唐或至手握大權口舍天憲則任用者之失也各史多不詳其邑里兹掇其秦産者附於帝系之末周景監閹人也史記正義公孫鞅西入秦因寵臣景監求見孝公孝公既見衞鞅語事良乆罷而怒景監曰子之客妄人耳安足用耶景監以讓衞鞅鞅曰吾說公以帝道其志不開悟矣後五日復求見鞅未中㫖罷而孝公復讓景監景監亦讓鞅鞅曰吾説公以王道而未入也請復見鞅鞅復見孝公孝公善之而未用也罷而去孝公謂景監曰汝客善可與語矣鞅曰吾説公以霸道其意欲用之矣誠復見我我知之矣衛鞅復見孝公公與語數日不厭景監曰子何以中吾君吾君之驩甚也鞅曰吾以強國之術説君君大説之耳商君傳北魏孫小字茂翹咸陽石安人父瓚為赫連屈丐所殺小没入宫刑㑹魏平統萬遂徙平城内侍東宫以聰識有智畧稱未幾轉西臺中散每從征伐屢有戰功多獲賞賜世祖幸瓜步慮有北冦乃除留臺將軍車駕還都遷給事中領駕部課理有方畜牧蕃息出為并州刺史州内四郡百餘人詣闕頌其政化後遷冀州刺史所在清約當時牧伯無能及也魏書閹官傳王遇字慶時本名他惡馮翊李潤鎮羌也自晉世已來恒為渠長父守貴為郡功曹卒遇坐事腐刑為中散遷内行令中曹給事中遷散騎常侍安西將軍出為華州刺史幽后之前廢也遇頗言其過及後進幸髙祖遣御史馳驛免遇官世宗初兼將作大匠未幾拜光禄大夫復奪爵廢后馮氏之為尼也公私罕相供恤遇往來祇謁不替舊敬每有薦奉后皆受而不讓遇性巧強於部分北都方山靈泉道俗居宇及文明太后陵廟洛京東郊馬射壇殿文昭太后墓園太極殿及東西兩堂内外諸門制度皆遇監作雖年在耆老朝夕不倦與少壯者均其勞逸又長於人事競於營利卒於官遇為文明太后所寵前後賜奴婢數百人他物稱是號富室魏書閹官傳唐陳忠盛字懷泰潁川許昌人今家於長安祖守節父文叔俱内常侍忠盛先天嵗解褐補内侍省掖庭局監尋轉内僕丞内僕令秩滿遷内侍伯内謁者監加朝散大夫以天寳十三年薨於私第子仙甫拜内謁者監裴士淹撰内侍陳忠盛碑韋某京兆人父楚皇任内給事中武徳使判宫闈令事某髫年參内侍省出入門閤情志專良開元十年解褐授内府局丞尋充市舶使每宣諭諸道敷揚詔㫖人皆恱服天寳初拜朝議郎判宫闈令知本局事五年加朝散大夫内謁者監以才藝敏悟時望歸美尋加朝議大夫拜内給事中乾元元年終於私第嗣子守内侍省上柱國賜紫金魚袋守宗次内侍省内侍伯守堅次内侍省宫教博士守幹于肅撰内給事韋某碑袁思藝華州人特承恩顧然力士巧宻人恱之思藝驕倨人䟽之十四載置内侍省内侍監兩員秩正三品以力士思藝對任之元宗幸蜀思藝走投禄山舊唐書宦官傳孫常楷京兆涇陽人釋褐内侍伯遷文林郎内謁者監賜緋魚袋轉朝議郎内給事上柱國特加朝散大夫擢授内常侍貞元五年卒常楷性慈惠尤深象教歸全之日恍如先知召群子受理命奄然而終猶子朝議大夫内侍省内給事上柱國充慶州監軍榮義于邵撰内常侍孫常楷碑貞元十五年孫榮義為右軍中尉怙寵驕恣貪利冒寵之徒多附麗之舊唐書宦官傳榮義歴右武衞大將軍贈揚州大都督唐書宦者傳程元振京兆三原人少以宦人直内侍省遷内射生使飛龍廄副使張皇后謀立越王元振發其姦立太子是為代宗拜右監門衞將軍知内侍省事再遷驃騎大將軍邠國公盡總禁兵不踰歲權震天下在輔國右凶决過之裴冕與元振忤貶施州來瑱守襄漢有功元振嘗諉屬不應因誣殺瑱同華節度使李懷讓被搆憂甚自殺素惡李光弼數媒蝎以疑之廣徳初吐蕃党項内侵帝出居陜京師陷於是太常博士栁伉上疏言陛下欲存宗廟社稷獨斬元振首馳告天下帝顧公議不與乃下詔盡削元振官爵放歸田里帝還元振自三原私入京師舍司農卿陳景詮家圖不軌御史劾按長流溱洲行至江陵死時又有駱奉先者亦三原人歴右驍衞大將軍數從帝討伐尤見倖廣徳初監僕固懷恩軍恃恩貪甚懷恩不平既而懼其譖遂叛事平擢奉先軍容使永泰初以吐蕃數驚京師始城鄠以奉先為使累封江國公監鳳翔軍大厯末卒唐書宦者傳焦希望涇陽人歴明威將軍贈洪州都督唐書宦者傳貞元十二年六月特立䕶軍中尉中䕶軍以帥禁軍以内謁者監焦希望為左神䇿中䕶軍舊唐書宦官傳希望寓籍於京兆府之涇陽弱冠選侍彤闈守内府局同正丞授承務郎帝在春宫每加信任泊正宸極除給事同正賜金印紫綬益見親重命監射生軍事貞元五年詔以射生軍為神威軍加内常侍同正兼謁者監十三年制加中䕶軍累遷内侍省内侍同正兼内常侍吳通㣲撰内侍焦希望碑文按舊唐書設中䕶軍年分與碑不合彭獻忠字琦夫京兆三原人父令俊行内侍省内謁者監獻忠以建中三年入侍徳宗嘉其敏厚器任異等貞元三年授内府局丞四年授内謁者監十一年授朝請大夫十六年特加金紫二十年加内侍省内侍仍賜上柱國充教坊使元和元年封襄武縣開國男充飛龍使二年加右武衛將軍三年授左神䇿軍副使加雲麾將軍其年奉詔充淄青道宣慰使六年遷知内侍省事充弓箭庫使十月遷左領軍大將軍充左神䇿軍䕶軍中郎將十二年春以勤瘁遘疾薨張仲素撰中尉彭獻忠碑曹知慤耀州人僖宗時宦者黄巢陷長安知慤歸里中傾家募壯士以拒巢嘗數遣壯士入長安乘夜撓巢軍巢軍數夜驚疑其下有叛者忽忽無固志諸軍乘此遂平長安㑹知慤私議諸扈從者無功欲待其入闗分别去留以示賞罰諸扈從者聞之大懼乃共為蜚語言知慤且為變㑹田令孜忌其功遂矯㫖令王行瑜襲擊殺之耀州志五代張居翰字徳卿故唐掖庭令張從玫養子昭宗時為范陽軍監軍與節度使劉仁恭相善天復中大誅宦者仁恭匿之以免後梁兵攻仁恭仁恭遣居翰從晉王攻梁潞州以牽其兵晉取潞州以居翰為昭義監軍莊宗即位與郭崇韜並為樞宻使崇韜專政居翰黙黙而已魏王破蜀王衍朝京師行至秦川而明宗軍變莊宗東征慮衍有變遣人馳詔魏王殺之詔書已印畫居翰發視之詔書言誅衍一行居翰謂殺降不祥乃以詔傅柱揩去行字改為一家時蜀降人與衍俱東者千餘人皆獲免莊宗遇弑居翰見明宗求歸田里天成三年卒於長安五代史宦官傳末按居翰邑里未詳但傳既云歸田又云卒於長安則秦人可知矣明成敬字思恭耀州人永樂甲辰進士選庶吉士改晉府奉祠宣徳時以晉府事府官悉論死敬議長流敬自以遺累子孫乞就死宣廟憐之下腐刑不死景帝在郕邸以典寳侍講讀既即位入内府為太監親信任事不招權不乞恩上嘗欲官其親屬數問其親屬在京者幾人敬對親屬俱在籍且田夫不可以官未幾又問又對如初上益多其讓及卒遣官䕶䘮修墳給𦵏祭一時以為殊遇耀州志李本朝邑人正統間為御用監太監賚蟒玉歴四朝年八十乞身遣中使送歸私第卒賜諭祭同州志張福朝邑人正統間以内侍歴掌司設監雅被寵遇同州志王新朝邑人𢎞治間給事御馬監適駕前馬逸人莫敢攖新馳控就列上壯之陞少監賜蟒玉後與夀寧侯張鶴齡廷爭事拳毆夀寧謫南京火者同州志麻俊三水人内官監太監𢎞治五年命修造米鹽油蠟等庫三水分縣建治皆其力也邠州志劉瑾興平人故姓淡純帝時領教坊見幸敬帝初擯茂陵司香其後得侍東宫為太子所恱太子即位為毅帝時瑾掌鐘鼓司朝夕與其黨八人者為狗馬鷹犬歌舞角觝以娛帝帝狎焉劉健謝遷李東陽連疏請誅之皆留中户部尚書韓文等繼之司禮太監王岳范亨徐智等從中應之帝勉許之八人夜繞帝前泣搶地瑾進曰今左班官敢譁無忌者由司禮監無人也有則惟陛下耳帝於是立遷瑾為司禮監瑾夜傳命榜笞岳享智逐之南尋矯詔殺於途於是内揣帝意外日以深文誅求諸臣使莫敢進言帝喜謂瑾可任悉委之瑾選官校百餘四出察事作大枷枷及三品以下官員坐事罰米動百千石委科道官查盤逺歲錢榖雖浥損者悉鉤索令償又倍之科道還報以叅劾多而賄賂重者為稱職不則繫撻隨至其内外章奏無大小先白瑾乃敢奏奏至不復干涉内閣持歸私第撰偽㫖付外益用其親故布列要地變易吏兵二部選法任情陞罷又以事籍没故大臣家收謫其妻孥日夜簡括天下庫藏増益諸邉屯田賦稅以肥私家海内騷然以有寘鐇之變而卒及於禍先是寘鐇之變詔太監張永與故都御史楊一清討之未至而寘鐇已擒八月永至自寧夏獻俘賜宴比夜瑾先退永出䟽宻白反狀上悟執瑾明日降奉御閒住之鳳陽瑾常引四方術士出入其家妄稱其姪劉二漢者當大貴以是有反心太監孫和等私造衣甲弓弩遺瑾瑾受之竊竊有不軌圖初上尚未有意誅瑾及籍其家上大怒曰瑾果反乃以付獄獄上命無覆奏凌遲之并二漢論斬名山藏宦官雜記張瑜陜西人𢎞治乙丑四月孝廟不豫大璫瑜與劉瑾同閈主御藥得㫖召醫以院判劉文泰御醫髙廷和進兩人者素與交結謂上疾易治效且獲賞竟以誤投致劇且晏駕舉朝痛憤奏下三人獄皆論斬是秋已赴市而瑜黨於瑾瑾傳㫖取還仍幽於獄為法曹論駁不得脫瑾怒逐閔少保張都憲楊大理免瑜等出獄簮雲樓雜說門朝棟臨潼人幼事李盡忠神宗李妃之族黨也恃椒房之勢多所凌侮魏監忠賢數為所困熹宗嗣位忠賢竊柄大肆報復盡忠死近侍匿弗出嗣得毛監者引進給事掖廷晉乾清宫近侍賜蟒玉浸貴顯忠賢頗識之姑置不問朝棟喟然歎曰忘主仇而與共事非仁者事也即日謝病歸里潛居秦邸者二十年鼎革以來築圃於戲水之西蒔菊花數十種兼植雜卉閉門自賞復修黄白之學又二十餘年卒願學堂集袁禄興平人官人數司房甲申變後痛心冦禍遂屏居於華旋祝髪為浮屠居蟠龍嶺寺後居州城之西郊人髙其義謂所居為袁公庵華州志葛景盩厔人司禮太監小心畏慎中外稱為長者盩厔志按景世次無考陜西通志巻四十九
