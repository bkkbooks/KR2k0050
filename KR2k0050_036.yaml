僻處夫馬工料銀兩照數扣除報部康熙三十三年十二月兵部咨準陜屬衝驛新增夫馬工料銀一萬五千二百一十五兩三錢六分零僻驛裁減夫馬工料銀七千四百七十六兩四錢四分零除新減銀兩改入起運外新增銀兩應於本州縣裁留銀撥給再有不敷即將附近州縣撥給永為定例康熙四十年五月兵部覆準榆林至神木沿邉安設塘站馬六百三十匹交與榆林靖邉神木三處同知分𣲖專管加意喂養仍令榆林神木二道兼轄管理不時查驗如公務完畢撤塘之日將馬匹仍歸原驛又題覆邉塘安設夫馬應需工料各州縣撥協額銀仍解藩庫令榆林靖邉神木三處同知按季赴領康熙四十五年十月部覆準康熙三十六年陜西安設邉塘共抽調各州縣驛馬六百三十匹今僻驛馬六十四匹無容撤回將各堡額驢裁去二百三十六頭易馬一百十七匹次衝僻遞裁馬一百二十匹調赴邉塘將衝驛馬換回二百三十七匹酌量分還將此項三百零一匹並原調馬三百二十九匹仍留邉塘以足六百三十匹之數應差康熙五十六年兵部題覆安塘營馬匹責令榆林靖邉神木三廳管轄母致疲瘦俟撤塘日仍將原收營驛馬匹照數交還又陜甘所屬驛馬舊例倒斃牽領茶馬補給今茶馬既停應照各省依時價給銀買補雍正七年部覆題準陜省三川干谷文安石嘴義合河西六驛裁汰驛丞歸附近州縣管理又潼關遞運所歸潼關驛管理停口遞運所歸長武縣管理各裁去大使閏七月寧逺大將軍嶽鍾琪奏準口內口外共需安站馬二千一十四匹內調撥陜省衝僻驛馬一千三百七匹時值軍興凡衝塗道站差事俱煩除偏驛調撥之馬母庸即補外其衝驛調撥馬匹應請於軍需項下發銀買補雍正八年七月部覆準陜西沿邉一帶東自府谷縣石嘴頭西至定邉營止共安正站九處腰站二十處每一正站安馬三十匹一腰站十七匹共六百一十匹喂養草料銀兩照從前軍需例每匹日支銀八分五釐俟凱旋日仍照原額支銷雍正九年五月署陜督查郎阿題準衝驛缺馬業經買補其稍衝於僻遞所存驛馬不敷馳送陜省請於買補馬二百三十八匹照二馬一夫之例令各州縣驛募補供差又題準軍興之際一切軍需運送絡繹除原額車驢夫役之外凡有不敷俱係另雇民間腳力轉運每多賠墊嗣後運送軍需軍裝等項除各驛額設車輛夫驢應付外或有不敷照每一百三十斤每百里給價銀一錢五分之例動用正項錢糧令地方官雇募運送據實報銷雍正十年正月咨準抽調內地馬一百九十匹協撥榆神靖三處塘站辦理軍務應差沿邉正站九處每站原馬三十匹今每站添撥十匹腰站二十處每站原馬一十七匹今每站添撥五匹俟軍務完日仍著調回原驛厯代附考周遺人凡國野之道十里有廬廬有飲食三十里有宿宿有路室路室有委五十里有市市有候館候館有積周禮地官秦法十里一亭亭有長主亭之吏也亭謂停留行旅宿食之館漢書髙帝本紀師古注亭有兩卒一為亭父掌開閉掃除一為求盜掌逐捕盜賊應劭注漢制十里一亭亭有長十亭一鄉鄉有三老有秩嗇夫遊徼皆秦制也漢書百官表孝景時鄭當時為太子舍人每五日洗沐常置驛馬長安諸郊史記汲鄭傳王溫舒為河內太守令郡具私馬五十匹為驛自河內至長安史記王溫舒傳昭帝元鳯二年六月詔頗省乘輿馬及苑馬以補邉郡三輔傳馬漢書昭帝本紀安帝元初三年秋築馮翊北界候塢五百所漢書西羌傳驛馬三十里一置卒皆赤幘絳韝後漢書輿服志西魏大統十四年置東陽驛在縣東十三里東陽谷側縣西十三里杜化驛亦大統十四年置在杜化川兩京道里記隋開皇十六年置滋水驛在咸寧縣東北三十里兩京道里記唐制凡驛馬給地四頃蒔以苜蓿凡三十里有驛驛有長京四面關有驛道者為上關無驛道者為中關唐書百官志館驛之制於千里之內尤重自萬年至於渭南其驛六其蔽曰華州其關曰潼關自華而北界於櫟陽其驛六其蔽曰同州其關曰蒲津自灞而南至於藍田其驛六其蔽曰商州其關曰武關自長安至於盩厔其驛十有一其蔽曰洋州其關曰華陽自武功西至於好畤其驛三其蔽曰鳯翔其關曰隴關自渭而北至於華原其驛九其蔽曰坊州自咸陽而西至於奉天其驛六其蔽曰邠州由四海之內總而合之以至於關由關之內束而會之以至於皇都唐栁宗元集諸牧監凡在牧之馬皆印配諸軍及充傳送驛者以出字印並印左右頰唐六典太宗貞觀中初稅草以給諸間而驛馬有牧田唐書食貨志則天聖厯元年敕滋水驛去都亭驛路逺馬多死損中間置長樂驛東去滋水一十三里西去都亭驛一十三里兩京道里記玄宗開元九年正月敕自今以後幸溫湯應須置頓使及諸史等去京既近並令行從官便充不得更乘傳驛册府元龜十五年四月敕兩京都亭驛出使人母淹留二十五年五月御史鄭審檢校兩京館驛今驛門前十二辰堆即審創焉唐會要二十六年正月制長安萬年兩縣各與本錢一千貫收利供驛仍付雜驛册府元龜天寶十五載六月乙未上至咸陽望賢驛置頓舊唐書思賢頓即望賢宫也在咸陽東數里李義山詩集憲宗元和八年傳言回鶻入冦因請起夏州至天德復驛候十一區以通緩急唐書李吉甫傳十四年栁公綽為京兆尹時河朔復叛朝廷用兵補授行營諸將朝令夕改驛騎相望公綽奏曰幽鎮用兵使命繁併館遞匱乏鞍馬多闕又敕使行李人數多無限約其衣緋紫乘馬者二三十匹衣黃衣者不下十匹驛吏不得恃劵牒隨口即供驛馬既盡遂奪路人鞍乘衣冠士庶驚擾恐嗟逺近宣傳行李將絶伏望聖慈聊為定限乃下中書條奏人數册府元龜敬宗寶厯二年二月鳯翔置驛三曰渭陽通蜀安途山南新置斜谷路創驛三曰垂泉武興右界唐會要裴度為興元觀察使奏修斜谷路及創造館驛畢自京師抵漢中列郵傳於駱谷久矣而艱難阻險人嘗病之度既到鎮因訪故老熟其利害遂決請移路於斜谷橋梁館宇刻期而就人心大愜册府元龜文宗開成元年二月以飛龍馬二百匹賜京兆府充給諸驛册府元龜宋諸路驛傳每二十五里置一遞役卒十有二人軍興以來凡通蜀道者皆增斥堠遞九里一置玊海仁宗至和二年修陜西蕃馬驛羣牧司每季􅊾沿路郡縣察視之邉州巡檢兵校聽自市馬官償其直宋史兵志冬利州路轉運使李虞卿以蜀道青泥嶺舊路髙峻請開白水路自鳯州河池驛至長舉驛五十里有半以便公私之行具上未報即預畫材費以待知鳯州河池縣事殿中丞王令圗首建路議路去縣地且十五餘里部屬陜西即移文令圗通幹其事明年秋七月奏可十二月諸功告畢作閣二千三百九間郵亭營屋剛院三百八十三間減舊路三十三里廢青泥一驛除郵兵驛馬一百五十六人騎嵗省驛廪鋪糧五千石畜草一萬束宋雷簡夫新開白水路記孝宗淳熙十五年侍衛步軍都虞候梁師雄言乞令沿路都統司分定驛程各差素有心力將官一貟從各司量給盤費責令與諸州軍所委官同共提點自岩昌至興州十五驛屬興州都統司自大桃至漢隂十五驛屬興元府都統司自衡口至干平十三驛屬金州都統司餘驛俱屬别域各令所差將官往來用心巡視務要館舍草料應辦齊整違從提點將官申所差將官嵗一更替如見實有勞效即支犒賞從之文獻通考元世祖時自燕京至開平府復自開平府至京兆始驗地里逺近人數多寡立急遞站鋪每十里或十五里二十五里則設一鋪元史兵志至元二十二年四月給陜西行省鋪馬劄子一百二十六道元史兵志二十三年六月設陜西等路諸站總管府從三品世祖本紀二十七年正月增給陜西行省鋪馬聖旨五道兵志仁宗皇慶二年四月增給陜西行臺鋪馬聖旨八道元史兵志明宗致和元年六月賑陜西臨潼華隂二十三驛鈔一千八百錠元史明宗本紀文宗至順元年冬十月以奉元驛馬瘠死命陜西省給鈔三千錠補市之元史文宗本紀陜西行中書省所轄八十一處陸站八十處馬七千六百二十九匹水站一處船六隻元史兵志明見設水馬驛陜西西安府京兆驛咸陽縣渭水驛興平縣底張驛白渠驛臨潼縣新豐驛三原縣建忠驛渭南縣豐原驛華州華山驛華隂縣潼津驛潼關驛耀州順義驛同官縣漆水驛乾州威勝驛武功縣邰城驛永壽縣永安驛邠州新平驛宜祿驛鳯翔府東河橋驛鳯翔縣岐陽驛岐山縣岐周驛寶雞縣陳倉驛扶風縣鳯泉驛漢中府南鄭縣漢陽驛褒城縣馬道驛鳯縣松林驛寧羌州陽平驛黃壩驛沔縣金牛驛順政驛延安府金明驛榆林驛魚河驛甘泉縣撫安驛保安縣園林驛延川縣文安驛延長縣干谷驛清澗縣奢延驛石嘴岔驛鄜州鄜城馬驛三川驛張村驛隆益鎮驛中部縣翟道驛宜君縣雲陽驛綏德州青陽驛義合驛米脂縣銀川驛葭州吳堡縣河西驛見設遞運所陜西西安府西安遞運所灞橋遞運所咸陽縣咸陽遞運所興平縣底張村遞運所臨潼縣新豐遞運所渭南縣渭南遞運所華州羅紋橋遞運所華隂遞運所潼關遞運所乾州遞運所永壽縣蒿店遞運所底窖鋪遞運所邠州遞運所停口遞運所宜祿遞運所鳯翔府舊有東河橋遞運所萬厯十年改為驛漢中府舊有寧羌州鳯縣安山各遞運所隆慶四年革明會典太祖洪武八年定馬夫免糧則例陜西驛免三分之一續文獻通考宣宗宣德四年令陜西所屬驛站并有操備馬衛所行各布政司都司量𣲖軍夫采打秋青草就本處收貯聽支明會典憲宗成化二年令各驛及遞運所馬牛夫甲軍每人納草八十束俱於本驛遞上納續文獻通考孝宗𢎞治十四年市民馬户俱係浙江並直𨽻蘇松等府市居人民編發陜西等處緊要驛分當站續文獻通考武宗正德十二年議準各處畨夷進貢回還兵部出給儉字勘合付伴送人等定與每站程限不許稽遲有違將伴送人提問陜西都司陸路二千六百五十里計四十三站限八十六日明會典世宗嘉靖三十二年令榆林驛馬冬春給與草料夏秋牧放四十三年以後題準陜西所屬驛遞五年一編明會典神宗萬厯三年議準陜西西安延安鳯翔漢中各府驛遞民支改為官支其編審支直等銀應該一倍倍半二倍者每嵗照糧均𣲖俱要先期完解如春季分應用者於上年冬季終解到夏季分應用者於本年春季終解到明會典愍帝崇禎時王㺬奏掣牛站疏略曰臣邑扶風有平涼協濟牛站銀查賦册並未開載祗因先年彼中凶荒偶值邉警報急運用軍需暫行借助每年約七千餘兩今平涼僻處一隅近來公差多不經行北路凡三邉及洮岷蜀漢黔滇等處皆取道扶風鳯翔各縣車馬絡繹不絶今别邑不協濟扶風而扶風反協濟别府此事之枉不得平者卷查隴州汧陽鳯翔三處未被兵之先已將協銀掣回扶風今日連遭兵荒其苦特甚至路通蜀漢黔滇比之汧隴尤為衝劇日者伏覩詔書軫念秦疆發帑賑濟眷此窮氓諒聖慈所矜憫者懇祈敕下撫按查明將扶風縣協濟平涼府牛站銀照依汧隴等州縣例一併豁免庶凋瘵可起萬世永戴皇仁之浩蕩矣扶風縣志陜西通志卷三十六
