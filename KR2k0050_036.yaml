body:
  text: 陜西通志卷三十六驛傳置郵設館賓旅如歸皇華原隰四牡騑騑濟蒲槎穩入棧磴危封人候吏征夫所依斧資餼牽銼秣縶維既戒繹騷亦嚴廢弛虎符合節羽􅊾交馳往來迅駛職有攸司作驛傳志第十四國朝陜西布政使司所屬驛遞馬三千一百七匹原額馬三千三百三十九匹雍正七年調協甘省馬五百四匹內退回寶雞縣馬三十四匹外又雍正九年買補馬二百三十八匹馬夫一千五百六十三名半原額馬夫一千六百七十九名半除雍正七年調協甘馬實裁馬二百三十二匹馬夫一百一十六名夫馬工料站支銀一十萬五千三百一十三兩九錢一分七釐五絲八忽八微五纎七塵二渺八漠六沙原額銀一十一萬二千五百一十一兩四錢六釐五亳八絲三忽四微一纎三塵八渺六沙內除雍正七年裁解甘馬實裁銀七千一百九十七兩四錢八分九釐五毫二絲四忽五微五纎六塵五渺二漠遇閏加增州縣遞馬銀一千三百六十九兩七錢五分三釐二毫六絲六忽三微二纎五塵原額銀一千七百一十一兩二分七釐六毫內除雍正七年調協甘馬裁州縣遞馬遇閏加增銀三百四十一兩二錢七分四釐三毫三絲三忽六微七纎五塵榆葭邉塘安站馬除邉堡驢二百三十六頭易馬一百一十七匹外調撥各州縣馬五百一十三匹馬夫二百五十六名半工料銀一萬四千九百一十七兩二錢九分九釐六毫三絲二忽一微遇閏加增銀五百二十兩九錢六分九釐二毫五絲此項仍係各州縣徴解驛道分發邉塘雍正八年添設邉塘共二十九處馬六百零八匹原額邉塘二十五處共馬六百三十匹內除榆林驛留馬八匹歸德堡留馬一十四匹遞送往來公文外並神木縣紅栁灘二腰站各安馬十六匹較他腰站各少一匹十年正月抽調內地馬一百九十匹協撥邉塘供應軍務每正站添馬十匹腰站添馬五匹此項夫馬俟大捷後即撥回原驛凡一切工料銀兩仍係各州縣解道分發邉塘所扛夫三千一百八十五名嵗支工食銀四萬一千九百六十五兩三錢二分一釐五毫四絲九忽一微六纎五塵五渺一漠遇閏加增銀一千二百五十六兩四分九釐按所扛夫銀兩銀奏册統入夫馬工料內雍正十年裁減所扛夫五百八十四名裁工食銀六千二百九十兩五錢六分八釐零裁閏月銀五百七十二兩九錢二分九釐零鋪遞共七百一十五處鋪司兵共二千六百二十九名每年支工食銀共六千九百八十七兩二錢五分三釐二毫八絲六忽零雍正十一年增設遞運所所夫閏月工食銀二千八十兩五錢驛站東路西安府咸寧縣京兆驛在城知縣管理東至臨潼縣五十里至新豐驛七十里馬五十六匹馬夫三十三名嵗支銀二千五百三十九兩六錢縣馬十匹嵗支銀二百二十六兩遇閏加遞馬銀五十二兩二錢四分九釐五毫雍正十年撥邉塘馬五匹按撥邉塘馬銀仍係各州縣解支故槩不贅敘後倣此臨潼縣新豐驛縣東二十里知縣管理東至渭南縣八十里馬八十四匹馬夫四十五名嵗支銀三千七百四十八兩四錢縣馬五匹嵗支銀一百一十三兩遇閏加遞馬銀二十六兩一錢二分四釐七毫五絲雍正十年撥邉塘馬五匹渭南縣豐原驛在城知縣管理東至華州五十里馬八十四匹馬夫四十五名嵗支銀三千七百四十八兩四錢縣馬五匹嵗支銀一百一十三兩遇閏加遞馬銀二十六兩一錢二分四釐七毫五絲雍正十年撥邉塘馬五匹華州華山驛在城知州管理東至華隂縣七十里馬八十四匹馬夫四十五名嵗支銀三千七百四十八兩四錢州馬五匹嵗支銀一百一十三兩遇閏加遞馬銀二十六兩一錢二分四釐七毫五絲雍正十年撥邉塘馬五匹華隂縣潼津驛在城知縣管理東至潼關縣四十里馬八十四匹馬夫四十五名嵗支銀三千七百四十八兩四錢縣馬五匹嵗支銀一百一十三兩遇閏加遞馬銀二十六兩一錢二分四釐七毫五絲雍正十年撥邉塘馬五匹潼關縣潼關驛在城驛丞管理東至黃河接山西省界馬一百八匹馬夫五十七名嵗支銀四千七百八十六兩八錢雍正七年裁解甘馬十匹九年買補馬十匹又十年撥邉塘馬八匹東北路西安府七十里至髙陵縣髙陵縣北至富平縣五十里馬四十匹馬夫二十名嵗支銀一千四百二十三兩遇閏加遞馬銀四十一兩八錢八釐內撥邉塘馬十匹夫五名雍正七年裁馬二十匹九年買補十匹實裁十匹馬夫五名裁銀三百五十二兩裁遇閏銀一十兩四錢五分二釐又十年撥邉塘馬二匹富平縣東至蒲城縣九十里馬三十匹馬夫十七名嵗支銀九百八十五兩七錢六分五釐遇閏加遞馬銀一百九兩八錢內撥邉塘馬十匹馬夫五名馬雍正七年裁馬十六匹九年買補六匹實裁十匹夫五名裁銀三百二十七兩二錢三分二釐五毫裁支直銀五兩裁遇閏銀三十六兩六錢又十年撥邉塘馬二匹蒲城縣東北至澄城縣五十里正北至白水縣五十里東南至同州七十里馬三十匹馬夫十七名嵗支銀九百五十二兩七錢九分二釐遇閏加遞馬銀九十三兩九錢二分四釐內撥邉塘馬十匹馬夫五名兩雍正七年裁馬十六匹馬夫八名裁銀四百八十八五分九釐七毫三絲二忽七微九纎五塵五渺二漠裁支直銀八兩裁遇閏銀五十二兩九分二釐二毫五絲六忽又十年撥邉塘馬一匹澄城縣東北至郃陽縣四十里馬七匹馬夫三名半嵗支銀二百三十一兩六錢四分四釐三毫三絲九忽九微四纎六塵三渺二漠遇閏加遞馬銀二十七兩八分四釐內撥邉塘馬四匹馬夫二名至雍正七年裁馬一匹九年買補一匹郃陽縣東北至韓城縣九十里馬七匹馬夫四名嵗支銀二百四十兩八錢九分一釐四毫遇閏加遞馬銀五十兩四錢內撥邉塘馬四匹馬夫二名雍正七年裁馬一匹九年買補一匹韓城縣東至黃河接山西省界二十五里馬