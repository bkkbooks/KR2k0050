body:
  text: 陜西通志卷二十九祠祀二漢中府社稷壇在府城西北明洪武五年建嘉靖十七年知府陳璣修本朝康熙二十年知府滕天綬清理壇基另築繚垣立碑記附郭不置餘州縣如制府册風雲雷雨山川壇在府城南附郭不置餘州縣如制賈志文廟在府治西南康熙二十六年知府滕天綬捐俸新葺殿宇法物器數靡不備置雍正元年改啓聖祠為崇聖祠追封孔子五代王爵附郭不置餘州縣如制府册先農壇在東郊附郭不置餘州縣如制府册關帝廟在府治西雍正三年追封三代公爵供奉後殿歲春秋祀以太牢各縣如制餘廟在郡治者有九府册文昌祠在府治西南一在府治南二里元延祐中建按馮志有元延祐三年加封制郡城舊有文昌祠因傾圮止存前右殿二門一明隆慶中知府翟濤重修令南鄭知縣李梓董其事為拜殿一為寢宫二為桂香閣髙百尺左右有魁星等祠東西有道院樹以坊門繚以垣牆周圍計一百二十七丈金碧輝煌樓觀之勝帶江漢而俯漢山見翟濤記府志八蠟廟在府治西南二里附郭不置餘州縣如制賈志旗纛廟在漢中衛治東明洪武十四年建萬厯三十一年守備溫編改建于西教場之東府志城隍廟在府治西南一里明洪武五年知府費震建萬厯間知府李有實崔應科相繼增修附郭不置餘州縣如制府志郡厲壇在府城北郊附郭不置餘州縣如制州縣曰州厲邑厲鄉保曰鄉厲賈志名宦祠在學宫左各州縣學如制府志鄉賢祠在學宫右各州縣學如制府志忠義孝弟祠在學宫內雍正元年建各州縣如制府册節孝祠在學宫外雍正元年建各州縣如制府册南鄭縣漢髙祖祠在漢水相傳髙祖遊憩于此後立祠祀之甚靈賈志東嶽廟在府治北二里賈志康熙三十八年修縣册真武廟在府治北一里賈志崇禎己亥年王堯民重修有碑記府志馬神廟在縣治漢陽驛賈志酇侯廟在府堂東祀漢相國蕭何明洪武十五年知府李恭讓建明一統志武侯廟在城南二里明萬厯元年重建本朝康熙十二年修縣志淮隂侯祠在縣南八十里米倉山明一統志二郎廟一在府治東三里一在府治西二里賈志二相祠在府城內宋嘉定間丁焴帥興元建祠祀宋張浚虞允文魏了翁作記明一統志方正學祠在府治西南祀明方孝孺萬厯間知府項思教建春秋致祭徐用檢有記府志三公祠在縣西舊為藍公祠祀都御史藍章武功康海記後因都御史原傑吳道宏相繼撫鄖招撫流移皆有功漢中紳民公請並祀故名三公祠春秋致祭賈志草塘寺在府治南一里唐貞觀年修本朝順治八年重修縣志法華寺在府北一里五代時蜀廣政二十四年建府志大厯寺在城北四十里宋大中年建馬志本朝康熙五十五年修縣册乾明寺在城西三十里中梁山宋淳熙八年新羅國僧來從海東居此建寺馮志西按賈志作府治三十里誤內有池水冬夏不涸時出雲雨見怪物今亡賈志本朝順治年修縣志龍潭寺在城南六十里昔有二龍鬭於此故名賈志宋嘉定元年建本朝順治十三年修縣志石堰寺在城北三十七里王子山下宋嘉定十三年建馬志寶峰寺在城西北四十里元至正年建本朝順治六年修按馬志作寶峰觀誤萬壽寺在府治西南一里賈志明洪武十六年建本朝康熙四十二年修縣册鐵佛寺在府北六十里天台山下明正統十四年建馬志城西南十里又有鐵佛殿本朝雍正九年修縣册勝水寺在城東南十五里泉從佛坐下流出甘冽不涸故名明嘉靖年建縣志正宗寺在府治西府志康熙十九年漢興道楊鳯起建縣册湧泉寺在府北七十里天台山上有湧泉故名馬志天臺寺在府北七十里天臺山馬志明萬厯甲寅年修縣志鐵香爐寺在城北三十里相傳漢王焚香處府志靜明院在府治東二里明洪武八年建院北有甎塔馮志本朝康熙五十九年修縣册玉井觀在城東北十里宋嘉泰元年建馬志本朝順治十二年修縣志髙峯觀在城北二十里明崇禎年修縣志青龍觀在城北四里明崇禎十四年修縣志九仙觀在城東五十里本朝康熙五十九年修縣册褒城縣關帝廟一在東門內明萬厯二十三年建一在雞頭關俯臨石門回瞰龍江據天險之雄勝其青橋馬道二驛俱有廟縣志酇侯廟在縣治南八十里流珠堰側相傳堰為侯所築故廟祀之府志惠逺侯廟在縣治東南一里山河堰之左舊名山河廟宋政和間始賜是額馬志慶厯中知縣竇充有碑明嘉靖二十九年直指劉崙副使齊宗道知縣張庚議修并肖像今春秋祀典猶存府志相傳山河惠逺等堰為漢相曹參所建引水灌田後人樂利立廟祀之縣志淮隂侯廟一在縣南一百二十里孤雲山一在縣西南一百三十里仙臺山馬志靈澤廟在縣南五十里玉泉北宋嘉定三年封神為孚濟侯賜廟額靈澤其加封之牒尚存略云本縣山道村有泉名碧玉方畝平地深廣五七丈琉璃色泉自下吐不溢不竭派流如溝渠溉田數千畝泉北有龍神祠慶元元年夏六月大旱前知興元府張浚禱于神大雨次年夏復旱又祈禱有錦文小蛇雙首浮水面雨隨至禾麥大熟加修祠宇嘉定三年久缺雨雪採訪靈迹祈禱十二月十二日碧玉泉隂晦俄而雷雨大至嘉定四年敕賜是額府志延慶寺在縣東十里俗呼打鐘寺漢曰臨江唐貞觀中始賜是額明洪武初僧妙智重修府志崇慶寺在縣西二十五里牛頭山下為唐僧洪哲道場馮志俗呼為牛頭寺唐貞觀間法融師立府志寺後二里有千佛洞二十里為牛首前庵又十里為中庵又二十里為後庵皆古今名剎縣志寶積院在縣西南六十里俗呼石窟寺唐大中年建後賜是額府志福嚴寺在縣西南九十里即金華寺中有龍骨塔昔老僧嚴公於後洞得龍牙龍角龍骨數十夜夢一巨人縞衣告曰此山神龍所依因樵牧汙穢龍已去矣今德人住此龍當復來今洞中之骨其蛻也嚴公即建塔取龍骨瘞之賈志寺前有仙人真身洞并龍骨塔銘府志孤山寺在縣東南二十五里明洪武八年建寺前後漢水龍江為之映帶府志觀音寺在縣西南七十里明正統二年建賈志海秀寺在縣南二十里賈村壩宋咸平二年建本朝雍正九年修縣册沙岐寺在縣南七十里霄停壩宋嘉定三年建舊名西遊院明洪武年修縣志雙溪寺在縣南八十里石窟壩即宋乾道時松梁關地以崖燕二水相合故名縣志金泉寺在縣西南三十里雍齒壩相傳建自宋朝有千年古柏金泉自下出焉縣志順天寺在縣西南二十里明正德二年修相傳有老道居此又名老道寺縣志髙臺寺在縣南六十里髙臺壩雍正庚戌年修縣册成化觀在縣西北九十里雲夢山漢時建初為雲霧寺宋慶元五年修改今名前有巨石鐫觀山擊虎四大字明憲宗時道士李永惠奉敕重修縣志虛谷庵在長林鎮距城二十里康熙四十二年修縣册附古寺開山寺在城北一里賈志四川寺在縣北一百三十里四川山中馬志城固縣黃帝廟在縣西南二十里明一統志坐落安家渡康熙十年重修縣册漢王廟在縣東十里漢髙帝初封王於此因祀明一統志彭祖廟在少年山口祀商大夫彭祖馬志伍子胥廟在縣北百丈堰元至正元年建明洪武十四年重修天順間復修有記明一統志關帝廟在縣治大東門明洪武八年建嘉靖四十四年邑令楊守正重修有記縣志張子房祠在縣北十里子房山賈志一廟在縣西北十里斗山馬志一在城東關康熙四十年修縣册女郎廟在女郎山祀張魯女賈志魯女浣衣山下有白霧蒙身因有孕恥之自殺將死謂婢曰我死剖腹視之婢如言得龍子一雙送之漢水後有龍至墓前成溪其下有女郎廟搗衣砧縣志楊將軍祠在縣北一十五里宋紹興二十九年建祀總管楊從義從事郎袁勃記略云將軍鳯翔天興人靖康應募從吳玠立功晉爵安康郡開國侯乾道二年授提舉台州崇道觀介梁洋間居焉卒葬于城固水北村府志祠有宋山南道陳渤撰記馬志四按縣志載楊將軍廟即此蒲縣尹祠即縣尹蒲唐廟在縣西二十里元至正間建馬志嚴因寺在縣治南一里唐僖宗乾符六年建馬志大安寺在縣治西南三十里唐昭宗大順中建縣志本朝康熙四十六年重修縣册蕙香院即寶山寺在縣東北十五里寶山唐開禧時建宋嘉定至明正德年屢加修葺殿閣雄麗稱為一邑之鎮縣志杜陽院在升仙口距城三十里創自唐朝其地左環壻水右近伏牛岡阜盤旋林麓幽邃形勢規模為一方之勝境明𢎞治年修有碑記縣志妙嚴寺在斗峰之巔距城四十里宋嘉祐八年詔賜今額乾道中增葺有碑記縣志隂平寺在縣西南三十里馬志明永樂中建縣志雞鳴寺在大角寨距城六十里明隆慶二年建縣志普恩寺在杜家營距城五里明萬厯元年建黃九成撰記縣册新馬院坐落東原公距城二十里明萬厯年建本朝順治七年至康熙九年兩次加修縣册廣利院在斗山後灣距城二十里順治二年重建縣志邯鄲寺在邯鄲村距城三里順治十五年修縣志七星寺在賀家橋距城十里康熙三十三年修縣册經邑院在杜家營距城十八里康熙四十八年修縣册禪定院在東原公距城三十五里康熙五十九年修縣册唐仙觀在縣東北二十五里馬志王莽居攝二年名靈壽宫因後漢唐公昉升仙故易今名府志本朝康熙四十三年修縣册白鶴觀在縣西十里老君山唐僖宗幸漢南見白鶴翔舞其上因建是觀府志唐廣明元年建有進士王之儀碑馬志宋寶慶二年重修馮志奉真觀在縣治斗山唐竇真人得道處賈志明成化二十年建縣志集靈觀在縣治南元大德八年建明萬厯七年修縣志扁鵲觀在文川口距城五十里明時建縣志天慶觀在西原公距城三十里明嘉靖二十年建縣志上圓觀在寧家灣距城三十里順治七年修縣志玉皇觀在丁家村距城十五里康熙十年修縣志沖虛觀在方家營距城三十里康熙三十二年修縣册洋縣關帝廟在縣城西北縣志留侯祠在縣西四十里雲山上即子房山相傳留侯辟榖從赤松子遊處一在酆都山縣志蔡公祠在縣東二十五里漢黃門蔡倫造紙追封龍亭侯卒葬于此祠在墓前縣志二公祠在縣東關舊祀漢龍亭侯蔡倫以明原傑吳道宏附為三公祠後移蔡公祠於其墓前兹祠遂正祠原吳二都御史名二公祠康熙八年知縣柯棟改建縣志渭門廟在縣東一百二十里黃金峽下祀河神府志楊公祠在縣城西宋知洋州事安康郡侯楊從義築壻水為堰至今名楊填堰灌洋城二邑田故祀縣志環珠廟在縣東八十五里明𢎞治三年建縣志聖母廟一在祈子山一在兩角山祈嗣禱雨咸應康熙五十一年大旱知縣鄒溶禱于祈子山廟即雨有記縣志附古祠廟靈濟廟在縣北五里祀漢王章剛直敢言曽劾王鳯官京兆尹宋世血食於此寧宗嘉泰初賜額靈濟封普潤侯有碑記馬志昭澤廟在縣北七十里八里洞前歷代祈雨感應碑識其事馬志靈潤廟在縣東四十五里蒿平山腹有靈湫旱禱有應宋慶元中賜額靈潤馬志智果寺在縣西三十里唐儀鳯中建敕賜藏經宋元間屢修寺有牡丹兩株髙可丈餘縣志開明寺在縣治南一里古法輪院唐開元中建宋慶元元年重修中植古柏八株根節礧砢刺史文同留題筆勢飛動明洪武二十四年為叢林有浮屠髙十三層府志寺為歷代朝賀習儀之所宋慶元元年撥賜田三百四十畝明正德間重修有碑記醴泉寺在縣南十六里即龍血禪師卓錫處唐開元中建元中統三年更名開化縣志有浮屠唐和凝有詩馬志天寧寺在縣治東四里唐乾符中建明萬厯年修縣志池南寺在縣西二十五里唐時建本朝康熙四十年修縣册髙堰寺在縣東三十里唐時建縣志浮石寺在縣西南二十里唐時建明正德年修縣志妙因院在縣西北二十里宋乾德中建縣志崇勝院在