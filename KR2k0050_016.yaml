body:
  text: 陜西通志卷十六關梁一天險難升大川利涉崤函褒隴鞬閉攸攝跨渭卧虹浮灞映月三輔握樞肆張門闕壯志棄繻良才作楫凡賦西征莫由飛越擊柝招舟官司是設百二雄圖鎮撫毋忽作關梁志第七西安府長安縣郭杜鎮在城南三十里縣册賈里鎮在縣南三十五里縣册黃良鎮在縣南四十里縣册薑村鎮在縣南五十里縣册子午鎮在縣南五十五里縣册宋景祐三年置以南山子午谷名宋敏求長安志長安子午鎮金史地理志附古子午關張儀曰秦一軍塞午道鮑氏曰北山是子南山是午顔師古曰今京城直南山有谷通梁漢道者名子午谷戰國䇿注長安正南山名秦嶺谷名子午三秦記王莽通子午道因置此關元和志王莽以皇后有子通子午道從杜陵直抵終南風土紀唐廣德二年吐蕃既去亡軍逃卒猶竄伏南山子午等五谷為患南山西接岐山界東抵虢州界谷之大者有子午駱谷斜谷藍田衡嶺五谷通鑑胡注梁王神念以舊路沿山避水橋梁多毁别開乾路更名子午道即此路是也舊道在今金州安康縣界語曰山水險阻黃金子午魏張郃由子午欲攻漢中曹真從子午南入漢中桓溫伐秦命司馬勛出子午道漢平帝正始五年王莽通子午道從杜陵直絶南山徑漢中因置關宋於子午谷口置陽嶺寨西城路置渭門寨分水寨皆備禦之要地理通釋今俱廢府志俱按子午谷口之陽嶺寨駱谷口之石佛堡在洋縣乃二谷出漢中之南口也杜角鎮在城南五十五里縣册杜角鎮在縣南四十五里宋敏求長安志西乾河鎮在縣西南三十五里縣册東乾河鎮在縣西南四十里縣册終南有甘河鎮金史地理志即按甘河疑乾河三橋鎮在縣西二十里縣册縣境有三橋乾河斗門賈里黃良薑村馬坊等鎮縣志斗門鎮在城西三十五里縣册馬坊鎮在縣西四十五里縣册附縣境古隘莎城鎮在長安城南近郊之地胡三省注乾寧二年上出啓夏門趣南山宿莎城鎮通鑑今廢宋敏求長安志第五橋在縣南二十里沈橋里縣册韋曲之西有華嚴寺寺西北有雁鶩陂陂西北有第五橋賈志不識南塘路今知第五橋杜工部集第五橋在韋曲之西與沈家橋相近以姓得名張禮遊城南記注梁家橋在縣西南四十里通鄠縣跨灃水上邑人梁化鳯建雍正九年修府圖三橋在縣西二十里縣志唐興元元年上自興元還長安李晟戎服謁見於三橋唐書李晟傳乾寧二年上幸石門李克用遣騎三千駐三橋為備禦通鑑皂河石橋在縣西北一十五里縣册南灃店渡在縣西四十五里灃水上宋敏求長安志北灃店渡在縣西四十里灃水上宋敏求長安志中橋渡在縣西北二十五里中渭橋所宋敏求長安志中渭橋柱今水落猶見一二髙陵縣志附古中渭橋本名橫橋架渭水上橋對橫門故名括地志漢髙后八年代王至渭橋蘇林曰在長安故城東三里索隱曰咸陽宫在渭北興樂宫在渭南秦通兩宫之間作渭橋史記文帝紀注文帝行出中渭橋有人從橋下過驚乘輿馬索隱曰渭橋有三所一在城西北咸陽路曰西渭橋一在東北髙陵路曰東渭橋其中渭橋在故城之北張釋之傳注渭水貫都以象天漢橫橋南渡以法牽牛三輔黃圖潘嶽賦騖橫橋而旋軫關中記秦作渭水橫橋西征賦注渭水經長安縣北水上有梁謂之渭橋秦制也亦曰便門橋橋廣六丈南北二百八十步六十八間七百五十柱一百二十二梁南北有隄激立石柱柱南京兆立之柱北馮翊立之有令丞各領徒一千五百人橋之北首壘石水中故謂之石柱橋後董卓入關遂焚此橋魏武帝遂更造橋三丈六尺水經注晉永和十二年秦主生發三輔民治渭橋通鑑劉裕入關又燬之後魏重造貞觀十年移於今所元和志連橫門抵禁苑南馳終嶺商洛北走滇池鄜畤喬潭中渭橋記舊止名渭橋因西有便門橋東有東渭橋故加中以别之水經注又名為便門橋亦取通渭南北往來皆便也雍録附縣境古橋渡橫橋在長安城下有池周繞廣三丈深二丈石橋各六丈與街等三輔黃圖長安城北出西頭第一門曰橫門水經注漢都城北橫門外别有橫橋子初以為三橋之數已而考黃圖則此橫橋乃跨池為橋池即城壕不跨渭也不在三橋之數因中橋亦名橫橋慮其混淆故具言之雍録崔公橋後魏崔亮於渭水為橋以利百姓名崔公橋潛確類書飲馬橋漢時七里渠有飲馬橋長安圖潘嶽西征賦戾飲馬之陽橋陽謂橋之陽也文選注城東八里飲馬橋夏侯嬰冡在橋南三十里水經注青門橋王渠水經楊橋下即青門橋也長安城東出第三門名霸城門民見門色青又名青城門亦曰青門水經注內家橋之西有沈家橋以姓得名張禮遊城南記注下杜城有丈八溝沈家橋賴家橋馬志赤欄橋與第五橋相近隋開皇三年引香積厨水自赤欄橋經第五橋入城馬志水邊楊柳赤欄梁孫蕡詩下馬橋在建福門北胡三省注唐薛元賞為京兆命左右擒神策將軍俟於下馬橋通鑑段留渡在縣東北二十六里宋敏求長安志長安以船渡者三中橋嘉麥嘉麥渡在咸陽假留雍録咸寧縣霸橋鎮在縣東二十里宋敏求長安志明置遞運所於此府志髙橋鎮在縣東南二十五里縣册引駕回鎮在縣東南四十五里縣册杜曲鎮在縣南微東三十里縣册三趙鎮在縣南微東三十里縣册王曲鎮在縣南三十五里縣志鳴犢鎮在縣東南四十五里縣册鎮西原下有鳴犢泉故名武宗獵於太白原即鎮西原也宋敏求長安志咸寧鳴犢鎮金史地理志在兩川口有漢武鳴犢泉馬志新住鎮在縣北微東三十里縣册亦曰新築鎮府志附縣境古隘九曲寨在縣東北舊志唐興元初李晟屯東渭橋泚將張光晟屯九曲寨相拒十餘里唐書朱泚傳狄寨在縣東南四十里縣志曲牢堡在縣南舊志晉太和十六年登攻後秦將金榮於范氏堡克之遂渡渭水攻後秦京兆太守韋範於假氏堡不