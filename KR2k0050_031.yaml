body:
  text: 陜西通志巻三十一選舉二舉人宋按宋進士僅存什一而省薦更無幾今據各志所有編入不涉附㑹索述延安人王邦臣洋州人李薦華州人論九齡華州人王獻耀州人劉彧耀州人張財淳化人張紳淳化人周經金孫彦輝孫伯亨孫扆解元俱高陵人任時亨王哲王大禮伍時武俱富平人史學延安人宋元佐郃陽人王國賔王寀俱耀州人吕濵惠敦書李珽邢贄張執禮江安張從謙俱淳化人元按元史選舉志皇慶二年十一月詔以皇慶三年八月天下郡縣興其賢者能者此即設科舉人之始董立咸寧人經元趙公諒臨潼人至治年魏紹開解元魏思明魏思曽魏希智俱高陵人張雲翼鄠人李誼至正辛夘程仲二俱藍田人王博文杜徳機張世衡程忠程恕俱涇陽人張遜至順中馮義俱渭南人馬好古劉光美王希哲俱富平人趙璧醴泉人至正中任惟孝任惟良魏志張炳袁克忠張國臣俱延安人按延安府志任惟孝等六人不詳科分不分甲乙附此俟考史亮洋州人至正中謝謙郃陽人至正中楊建中澄城人郝鼎臣韓城人趙質元振大徳中郭鎬党英馮翼俱蒲城人秦賁張惟一廉惟芳俱耀州人張桂榮同官人同恕奉元人經魁官學士按賈志入宋誤張緝張顯俱武功人張正臣張道儒俱米脂人明按明代舉人馬志載至嘉靖間止馮志載自𢎞治己酉科始賈志前後統載而洪武後𢎞治前仍未叙清科分兹據各府州縣志中搜考洪武以後分别科分𢎞治以後悉照原榜其新増者俱經確考補入洪武三年庚戌鄉試按明㑹典洪武三年詔設科取士以今年八月為始又按鄉試額數洪武三年定額陜西四十名趙鑄渭南人進士趙松渭南人進士王夏郃陽人進士韓規中部人進士洪武四年辛亥鄉試按明㑹典洪武四年詔各行省連試三年自後三年一舉著為定例馬煥高陵人鄭州知州盧敏渭南人刑科給事洪武五年壬子科馬國英渭南人進士洪武十年丁巳科雷澤華州人江西道御史洪武十七年甲子科按明㑹典洪武十七年定舉人不拘額數吕震臨潼人解元官尚書謝謙進士任勵進士曹宗本江西道御史王恂長清知縣劉禧莒州知州吳真沁源教諭陳祥知縣賈彬知府俱長安人趙昇咸寧人董勵興平人寧府紀善墨麟兵部侍郎吳範刑部主事俱高陵人崔敬鄠縣人進士程濟藍田人唐府長史范原耀州籍三原人進士王昱耀州籍三原人進士張山三原人進士郭文渭南人御史趙遜渭南人釣州知州婁兟醴泉人蜀府長史彭泰鳯翔人進士吳偉南鄭人左布政趙義商縣人進士王勵雒南人王璉雒南人代府長史孫釋保定同知韓恕王朴進士李昌進士楊韜孫恕保定同知俱同州人楊仲貞朝邑人教授周成韓城人進士郭良華隂人兵部尚書張景芳淳化人同知張習鄜州人交阯省僉事洪武二十年丁夘科按歴科名次無攷序依憲綱而榜首仍標於前爾朱欽富平人解元進士同清五經博士杜忠信俱長安人劉傑梓潼教諭薛平金鄉知縣陳器主事俱咸寧人姬冕福建左布政魏儀徐州衞知事楊武兵科給事俱興平人馬貫蕭鼎懐慶知府俱高陵人楊鵬三原人禮部郎中裴珩嚴州教授楊泰原武知縣俱渭南人杜玉富平人筠連教諭徐芳醴泉人丁丑進士任和延長人主事劉冕鳯翔縣人知府楊棐南鄭人員外楊子忠張守約進士俱同州人洪武三十三年庚午科宋規臨潼人解元知縣吳助納溪知縣嚴恭吏科給事于忠長樂知縣孔彦岳池知縣俱咸寧人劉珪興平人山東左布政甯威盩厔人甲戌進士王恪富平人聊城知縣郭易周衍進士俱延長人張迪鳯翔人進士何潤長史劉蔚通判俱南鄭人唐彝倫朝邑人如臯知縣李革澄城人知縣屈炳白水人海州同知趙春劉思忠浙江布政俱乾州人任泰亨淳化人光禄署丞洪武二十六年癸酉科董威同州人解元助教伍福大理知縣趙濬宿州同知韓敏青州知府俱長安人黄謙海康知縣張敏刑部主事鄭敏陳端刑部郎中陶哲戸部主事劉源知縣俱咸寧人陳英臨潼人武强教諭楊仁鄠縣人劉恕戸部郎中譚璘封邱教諭趙讓長子教諭俱渭南人何昇富平人鳯陽知府甄儀麟遊人兵部左侍郎王敏汧陽人御史陳介南鄭人知州劉𢎞道鳯縣人御史石真同州人楊恭朝邑人陜西布政田仁韓城人進士孫沂華州人襄城知縣李清蒲城人河南左㕘政祁淵順義知縣習賢通判舊作席宋廣平大理卿張敬徳一作徳敬俱乾州人洪武二十九年丙子科按各代舉人未詳科分者彚附於尾科末後倣此皇甫壽通判畢舉同知俱長安人鄭銘翼城教諭王崧撫州知府俱咸寧人鬲鼎新臨潼人進士張健三原人永寧知縣李信盩厔人陸川知縣劉瑛渭南人唐縣教諭薛昺渭南人襄城教諭宋獻安塞人景節延安定人御史程順延安定人三河知縣趙美延長人知縣田原鳯翔縣人彭庭敬寶雞人侍郎周茂周舉俱鳯縣人卜奯畧陽人進士李義商縣人寛河衞知事李鼐知府王理進士俱同州人李濟進士樊冕進士俱朝邑人焦禋華州人進士王勉蒲城人太常寺卿馬驥知縣一作馬騤楊儼廣西御史俱白水人任用鄜州人虞衡員外張本岐山人解元以下附王引宗咸寧人進士翟麟浙江㕘政張仲祥知府俱興平人郇端張訥檢討俱高陵人楊貫左庶子李庸廣東道御史劉楫御史俱鄠縣人張徳藍田人雲南道御史張斆涇陽人知縣盧剛膚施人牛亨保安人劉迪推官張治工副俱岐山人張輗寶雞人進士徐伯徹知縣一作伯轍郭璧教諭冉興先强昌趙偉教授李榮俱扶風人田原鳯縣人進士白元素御史雷震教諭任錦御史趙守義馬志作冦姓屈伸俱商州人李真兵部主事屈怡進士楊圭運判李庸永年教諭俱郃陽人崔裕華州人進士姚永廣東㕘議白膺光禄署正張彬王恭光禄署正馮允浙江道俱華隂人郭林乙丑進士吳宗魯主事俱蒲