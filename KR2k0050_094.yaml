body:
  text: 陜西通志巻九十四藝文十論説辨考題跋祝祭弔誄雜著過秦論一漢賈誼秦孝公據殽函之固擁雍州之地君臣固守以窺周室有席巻天下包舉宇内囊括四海之意幷吞八荒之心當是時也商君佐之内立法度務耕織脩守戰之具外連衡而鬭諸侯於是秦人拱手而取西河之外孝公既没惠王武王䝉故業因遺策南兼漢中西舉巴蜀東割膏腴之地北收要害之郡諸侯恐懼㑹盟而謀弱秦不愛珍器重寳肥美之地以致天下之士合從締交相與為一當是時齊有孟嘗趙有平原楚有春申魏有信陵此四君者皆明知而忠信寛厚而愛人尊賢重士約從離衡并韓魏燕楚齊趙宋衛中山之衆於是六國之士有寗越徐尚蘇秦杜赫之屬為之謀齊明周最陳軫昭滑樓緩翟景蘇厲樂毅之徒通其意吳起孫臏帶佗兒良王廖田忌廉頗趙奢之倫制其兵嘗以十倍之地百萬之衆叩闗而攻秦秦人開闗延敵九國之師逡巡遁逃而不敢進秦無亡矢遺鏃之費而天下諸侯已困矣於是從散約解争割地而賂秦秦有餘力而制其敝追亡逐北伏尸百萬流血漂鹵因利乘便宰割天下分裂河山彊國請服弱國入朝施及孝文王莊襄王享國日淺國家無事及至始皇續六世之餘烈振長策而御宇内吞二周而亡諸侯履至尊而制六合執棰柎以鞭笞天下威振四海南取百越之地以為桂林象郡百越之君俛首係頸委命下吏乃使䝉恬北築長城而守籓籬却匈奴七百餘里胡人不敢南下而牧馬士不敢彎弓而報怨於是廢先王之道焚百家之言以愚黔首墮名城殺豪俊收天下之兵聚之咸陽銷鋒鑄鐻以為金人十二以弱天下之民然後踐華為城因河為津據億丈之城臨不測之谿以為固良將勁弩守要害之處信臣精卒陳利兵而誰何天下已定秦王之心自以為闗中之固金城千里子孫萬世帝王之業也秦王既没餘威振於殊俗陳涉甕牖繩樞之子甿𨽻之人遷徙之徒才能不及中人非有仲尼墨翟之賢陶朱猗頓之富躡足行伍之間而崛起阡陌之中率罷散之卒將數百之衆轉而攻秦斬木為兵揭竿為旗天下雲集響應贏糧而景從山東豪俊遂並起而亡秦族矣且夫天下非小弱也雍州之地殽函之固自若也陳涉之位非尊於齊楚燕趙韓魏宋衛中山之君鉏耰棘矜非錟於鉤㦸長鎩也適戍之衆非抗於九國之師深謀逺慮行軍用兵之道非及鄉時之士也然而成敗異變功業相反也試使山東之國與陳涉度長絜大比權量力則不可同年而語矣然秦以區區之地千乘之權招八州而朝同列百有餘年矣然後以六合為家殽函為宫一夫作難而七廟墮身死人手為天下笑者何也仁義不施而攻守之勢異也過秦論二前人秦并海内兼諸侯南面稱帝以養四海天下之士斐然鄉風若是者何也曰近古之無王者久矣周室卑㣲五霸既没令不行於天下是以諸侯力政彊侵弱衆暴寡兵革不休士民罷敝今秦南面而王天下是上有天子也既元元之民兾得安其性命莫不虚心而仰上當此之時守威定功安危之本在於此矣秦王懷貪鄙之心行自奮之智不信功臣不親士民廢王道立私權禁文書而酷刑法先詐力而後仁義以暴虐為天下始夫并兼者髙詐力安定者貴順權此言取與守不同術也秦離戰國而王天下其道不易其政不改是其所以取之守之者異也孤獨而有之故其亡可立而待借使秦王計上世之事並殷周之跡以制御其政後雖有淫驕之主而未有傾危之患也故三王之建天下名號顯美功業長久今秦二世立天下莫不引領而觀其政夫寒者利裋褐而饑者甘糟糠天下之嗸嗸新主之資也此言勞民之易為仁也鄉使二世有庸主之行而任忠賢臣主一心而憂海内之患縞素而正先帝之過裂地分民以封功臣之後建國立君以禮天下虚囹圄而免刑戮除去收帑汚穢之罪使各反其鄉里發倉廩散財幣以振孤獨窮困之士輕賦少事以佐百姓之急約法省刑以持其後使天下之人皆得自新更節修行各愼其身塞萬民之望而以威徳與天下天下集矣即四海之内皆讙然各自樂安其處惟恐有變雖有狡猾之民無離上之心則不軌之臣無以飾其智而暴亂之奸止矣二世不行此術而重之以無道壞宗廟與民更始作阿房宫繁刑嚴誅吏治刻深賞罰不當賦斂無度天下多事吏弗能紀百姓窮困而主弗收恤然後姦偽並起而上下相連䝉罪者衆刑戮相望於道而天下苦之自君卿以下至於衆庶人懷自危之心親處窮苦之實咸不安其位故易動也是以陳涉不用湯武之賢不藉公侯之尊奮臂於大澤而天下響應者其民危也故先王見始終之變知存亡之機是以牧民之道務在安之已天下雖有逆行之臣必無響應之助矣故曰安民可與行義而危民易與為非此之謂也過秦論三前人秦并兼諸侯山東三十餘郡繕津闗據險塞脩甲兵而守之然陳涉以戍卒散亂之衆數百奮臂大呼不用弓㦸之兵鉏耰白梃望屋而食横行天下秦人阻險不守闗梁不闔長㦸不刺强弩不射楚師深入戰于鴻門曾無籓籬之艱於是山東大擾諸侯並起豪俊相立秦使章邯將而東征章邯因以三軍之衆要市於外以謀其上羣臣之不信可見於此矣子嬰立遂不寤藉使子嬰有庸主之才僅得中佐山東雖亂秦之地可全而有宗廟之祀未當絶也秦地被山帶河以為固四塞之國也自繆公以來至於秦王二十餘君常為諸侯雄豈世世賢哉其勢居然也且天下嘗同心并力而攻秦矣當此之時賢知並列良將行其師賢相通其謀然困於阻險而不能進秦乃延入戰而為之開闗百萬之徒逃北而遂壞豈勇力智慧不足哉形不利勢不便也秦小邑并大城守險塞而軍髙壘毋戰閉闗據扼荷㦸而守之諸侯起於匹夫以利合非有素王之行也其交未親其下未附名為亡秦其實利之也彼見秦阻之難犯也必退師安土息民以待其敝收弱扶疲以令大國之君不患不得意於海内貴為天子富有天下而身為禽者其救敗非也秦王足已不問遂過而不變二世受之因而不改暴虐以重禍子嬰孤立無親危弱無輔三主惑而終身不悟亡不亦宜乎當此時也世非無深慮知化之士也然所以不敢盡忠拂過者秦俗多忌諱之禁忠言未卒於口而身為戮没矣故使天下之士傾耳而聽重足而立箝口而不言是以三王失道忠臣不敢諫智士不敢謀天下已亂奸不上聞豈不哀哉先王知壅蔽之傷國也故置公卿大夫士以飾法設刑而天下治其强也禁暴誅亂而天下服其弱也五伯征而諸侯從其削也内守外附而社稷存故秦之盛也繁法嚴刑而天下振及其衰也百姓怨而海内畔矣故周王序得其道而千餘年不絶秦本末並失故不長久由此觀之安危之統相去逺矣野諺曰前事不忘後事之師也是以君子為國觀之上古驗之當時㕘以人事察以盛衰之理審權勢之宜去就有序變化應時故曠日長久而社稷安矣徙戎論節晉江統漢都長安闗中之郡號曰三輔禹貢雍州宗周豐鎬之舊也及至王莽之敗赤眉因之西都荒毁百姓流亡建武中以馬援領隴西太守討叛羌徙其餘種於闗中居馮翊河東空地而與華人雜處數歲之後族𩔖蕃息既恃其肥彊且苦漢人侵之永初之元騎都尉王𢎞使西域發調羌氐以為行衛於是羣羌奔駭互相扇動二州之戎一時俱發覆没將守屠破城邑鄧隲之征棄甲委兵輿尸喪師前後相繼諸戎遂熾至於南入蜀漢東掠趙魏唐突軹闗侵及河内及遣北軍中候朱寵將五營士于孟津距羌十年之中戎夏俱斃任尚馬賢僅乃克之此所以為害深重累年不定者雖由禦者之無方將非其才亦豈不以冦發心腹害其肘腋疢篤難療瘡大遲愈之故哉自此之後餘燼不盡小有際㑹輒復侵叛馬賢狃忲終於覆敗段熲臨衝自西徂東雍州之戎常為國患中世之冦惟此為大漢末之亂闗中殘滅魏興之初與蜀分隔疆場之戎一彼一此魏武皇帝令將軍夏侯妙才討叛氐阿貴千萬等後因拔棄漢中遂徙武都之種於秦川欲以弱冦强國扞禦蜀人此盖權宜之計一時之勢非所以為萬世之利也今者當之已受其弊矣夫闗中土沃物豐厥田上上加以涇渭之流溉其舄鹵鄭國白渠灌浸相通黍稷之饒畝號一鍾百姓謡詠其殷實帝王之都毎以為居未聞戎狄宜在此土也非我族𩔖其心必異戎狄志態不與華同而因其衰弊遷之畿服士庶翫習侮其輕弱使其怨恨之氣毒於骨髓至於蕃育衆盛則坐生其心以貪悍之性挾憤怒之情候隙乘便輒為横逆而居封域之内無障塞之隔掩不備之人收散野之積故能為禍滋蔓暴害不測此必然之勢已驗之事也當今之宜宜及兵威方盛衆事未罷徙馮翊北地新平安定界内諸羌著先零罕开析支之地徙扶風始平京兆之氐出還隴右著隂平武都之界廩其道路之糧令足自致各附本種反其舊土使屬國撫夷就安集之戎晉不雜並得其所上合往古即叙之義下為盛世永久之規縱有猾夏之心風塵之警則絶逺中國隔閡山河雖為冦暴所害不廣是以充國子明能以數萬之衆制羣羌之命有征無戰全軍獨剋雖有謀謨深計廟勝逺圖豈不以華夷異處戎夏區别要塞易守之故得成其功也哉難者曰方今闗中之禍暴兵二載征戍之勞老師十萬水旱之害薦饑累荒疫癘之災札瘥夭昏凶逆既戮悔惡初附且欵且畏咸懷危懼百姓愁苦異人同慮望寧息之有期若枯旱之思雨露誠宜鎭之以安豫而子方欲作役起徒興功造事使疲悴之衆徙自猜之冦以無榖之人遷乏食之虜恐勢盡力屈緒業不卒羌戎離散心不可一前害未及弭而後變復横出矣答曰羌戎狡猾擅相號署攻城野戰傷害牧守連兵聚衆載離寒暑矣而今異𩔖瓦解同種土崩老幼繫擄丁壯降散蕩居離析不能相一子以此等為尚挾餘資悔惡反善懷我徳惠而來柔附乎將勢窮道盡智力俱困懼我兵誅以至於此乎曰無有餘力勢窮道盡故也然則我能制其短長之命而令其進退由已矣夫樂其業者不易事安其居者無遷志方其自疑危懼畏怖促遽故可制以兵威使之左右無違也迨其死亡散流離逷未鳩與闗中之人戸皆為讐故可遐遷逺處令其心不懷土也夫聖賢之謀事也為之于未有理之于未亂道不著而平徳不顯而成其次則能轉禍為福因敗為功恤困必濟遇否能通今子遭弊事之終而不圖更制之始愛易轍之勤而得覆車之軌何哉且闗中之人百餘萬口率其少多戎狄居半處之與遷必須口實若有窮乏糝粒不繼者故當傾闗中之穀以全其生生之計必無擠于溝壑而不為侵掠之害也今我遷之傳食而至附其種族自使相贍而秦地之人得其半穀此為濟行者以廩糧遺居者以積倉寛闗中之逼去盗賊之原除旦夕之損建終年之益若憚暫舉之小勞而忘永逸之𢎞䇿惜日月之煩苦而遺累世之冦敵非所謂能開物成務創業垂統崇基拓迹謀及子孫者也三良論唐李徳裕秦穆之殺三良詩人刺之矣春秋譏之矣今不復議惟三良許之以死而前代無議何也且臣道莫顯於咎繇孝友莫盛於周公咎繇尚不殉於舜禹二后周公尚不殉於文武二王三良詎可許之死乎如三良者所謂殉榮樂也非所謂殉仁義也可與梁丘據安陵君同譏矣焉得謂之百夫特哉昔荀息許晉獻言繼之以死君子尤歎斯言之玷不可為也况得以生同榮樂死共埃塵以為忠乎晏平仲言君為社稷死則死之斯言得之矣自周漢迄於巨唐殺身成仁代有髦傑莫不顯一身之義烈未有繫一國之存亡唯紀信乘黄屋以誑楚赴丹熖而存漢數千年間一人而已漢祚四百由此而興余謂漢祖封建紀氏宜在蕭曹之上報徳未稱良可悲也秦論宋何去非兵有攻有守善為兵者必知夫攻守之所宜故以攻則克以守則固當攻而守當守而攻均敗之道也方天下交臂相與而事秦之彊也秦人出甲以攻諸侯盖將取之也圖攻以取人之國者所謂兼敵之師也及天下攘袂相率而叛秦之亂也秦人合卒以拒諸侯盖將却之也圖拒以却人之兵者所謂救敗之師也兼敵之師利於轉戰救敗之師利於固守兵之常勢也秦人據殽函之阻以臨山東自穆公以來常雄諸侯卒至於并天下而王之豈其君世賢耶亦以得乎形便之居故也二世之亂天下相與起而亡秦不三歲而為墟以二世之不道顧秦亦何足以亡然而使其知捐背叛之山東嚴兵拒闗為自救之計雖以無道行之而山西千里之區猶可歲月保也不知慮此乃空國之師以屬章邯李由之徒越闗千里以搏㓂而為鄉日堂堂兼敵之師亦已悖矣方陳勝之首事而天下豪傑爭西嚮而誅秦也盖振臂一呼而帶甲者百萬舉麾一號而下城者數十又人皆山林倔起之匹夫其存亡勝負之機取决於一戰其鋒至鋭也而章邯之徒不知固守其所以老其師乃提孤軍棄天險渡漳踰洛左馳右騖以嬰四合之鋒卒致于敗而沛公之衆揚袖而入空闗雖二世之亂足以覆宗天下之勢足以夷秦而其亡遂至於如此之亟者用兵之罪也夫秦役其民以從事於天下之日久矣而其民被二世之毒未深其勇於公鬭樂於衛上之風聲氣俗猶在也而章邯之為兵也以攻則不足以守則有餘周文常率百萬之師搏于戲下矣章邯三擊而三走之卒殺周文使其不遂縱以搏敵而坐闗固守為救敗之師闗東之土雖已分裂而全秦未潰也或曰七國之反漢也議者歸罪於吳楚以為不知杜成臯之口而漢將一日過成臯者數十輩遂至於敗亡今豪傑之叛秦而罪二世之越闗搏戰何也嗟夫務論兵者不論其逆順之情與夫利害之勢則為兵亦疎矣夫秦有可亡之形而天下之衆亦鋭於亡秦是以豪傑之起者因民志也闗東非為秦役矣漢無可叛之釁而天下之民無志於負漢則七國之起非民志矣天下皆為漢役者也以不為秦役之闗東則二世安得即其地而疾戰其民以方為漢役之天下則漢安得不趨其所而疾誅其君此戰守之所以異術也昔者賈誼司馬遷皆謂使子嬰有庸主之才僅得中佐則山西之地可全而有卒取失言之譏於後世彼二子者固非宜於事機者也亦惜夫秦有可全之勢耳雖然彼徒有可全之勢而不知至於子嬰而秦之事去矣雖有太公之佐其如秦何哉坑冶論明任慶雲坑冶周官丱人掌金玉錫石之地而為之厲禁以守之若必將取之則物其地而授之巡其禁令唐徳宗時户部侍郎韓洄建議山澤之利宜歸王者由是𨽻鹽錢使開成間復以山澤之利歸於州縣刺史選吏主之其後諸州牟利以自殖天下不過七萬緡不能當一縣之茶税宋興金銀銅鐵鉛錫之貨凡諸産金地有五曰商饒歙撫南安産水銀地有四曰秦商階鳳産硃砂地有三曰商宜富順而商皆居其一太祖三年詔曰古者不貴難得之貨後代始及山澤上加侵削下益抗敝每念兹事深疾於懷未能捐金于山豈忍奪民之利宜減三分之一太宗至道二年有司言秦商鳳階諸山内出銅丱定州諸山出銀礦宜設官署掌其事上曰地不愛寳當與衆庶共之不許皇祐中中書備對礦冶之數商州額貢金三十九兩至神宗熙寧元年詔天下寳貨坑冶不發而負歲課者蠲之四年以商州所産㣲薄詔罷貢金夫以天地自然之利顯畀坑冶如雲南之大理浙江之處州山西之盂縣諸處十礦九銀賦之有定額課亦易辦有益於民而無損於治故曰利者義之和也奈何後世爭奪積成蠧敝檢踏之吏從而殃民有力之家悉務辭遜致坑源廢絶礦條湮閉間有出備工本為官開後元佃之家方施工用財未享其利而譁徒交脅甚至黥配佑籍寃無以訴此坑冶所以失陷也商州地近三輔産礦之名易著自昔歳額之貢率至逋負所産㣲細少則必爭爭則羣起而為盜故開則未見其利而為害滋甚至厪九重專官以禁治之而害猶未巳也商州等五州縣産金之地其盜在鎭安者易發易捕盖有藩臬以綂御之也在洛南者易發難捕如松朶山王家庵離縣北不下百五十餘里去州又一百里逺難以制近寡難以制衆嵩盧竊礦之徒反宻邇其界一呼而衆一二百人及商州察知齊緝兵夫勦之抗敵拒捕則已為時十數日矣彼處官民分隔兩省民方幸其得利官任之不禁主客之形異而利害頓殊吾商牽牛之厄方罹詰捕之擾也正徳以來三次攻破州縣起於嵩盧嵩盧若在統制之下月有稽嵗有考斥􅕤有驚職任有歸則礦竊之禍吾知免夫風俗論康海夫天下之勢其所可見者常出庸人之所喜也庸人之所喜也故天下莫有强焉宋人貴雞豚而四境盡塒苙戎人尚酪乳而部落盡苜蓿觀諸庸人之所喜而天下之勢可見矣故國之治亂視風俗之淳漓風俗之淳漓視斯民之好尚夫邰以后稷開國其風俗淳然無偽也乃至於後尚鬭使氣不肯順理豪傑者至於把持治吏鄉人皆相推畏髙之又習侈善享無豐歉之節日日擊鼓聚㑹靡有厭飫好蕩之人得分銀尺布則置酒弗計蔬饌召倡優子女彈絃跕躧不辟長老時節遊衍女子率冶容妖服佔佔自見或又好爽快為賢多言習禮送死奢靡擬諸王侯壻奠婦翁至於傾産甚者禮佛飯僧謂有益於死者而於今不易也昏禮爭財至相搆訟貧者入贅無異厮僕或又以女易女謂之換親而騰説是非多至離異父或愛子私為營産身死未寒兄弟魚肉不蕩貲廢業不已也嗚呼今之闗中猶古之闗中也而今之民俗非古之民俗也然則從而新之豈不由於上作哉過秦論楊愼有問於楊子曰孟子有言不仁而得天下者未之有也秦以不仁而得天下矣孟子之言其不驗乎曰秦自孝公用商鞅富强之術而闗中之力雄自惠文用張儀離横之謀而諸侯之勢弱自昭襄用范睢逺交近攻之策而規取天下之計得至李斯兼併之説用天下皆秦矣然為臣者功成而身喪為君者業成而國亡其强也斯所以為弱其智也斯所以為愚嗚呼悲夫秦自始皇二十六年庚辰六王初畢四海始一雄圖既溢武力未畢方架黿鼉以為梁巡海右以送日俄而祖龍魂斷於沙丘鮑魚腥聞乎四極矣胡亥越十七兄而篡立方欲極耳目窮心志而閻樂之戈已及於望夷矣子嬰討賊方平肉未及下咽酒未及濡脣親朋未及盡相勞而赤帝眞人已翔乎灞上矣計始皇之餘分閏位僅十二年胡亥僅二年子嬰僅四十六日不啻石火之一敲電光之一瞥吹劍之一吷左蝸之一戰南槐之一夢也須臾之在億千稊米之於大塊實似之雖得猶不得也孔子曰雖得之必失之秦之謂矣以孟子之言合孔子之言觀之聖賢之論卓乎不可無何嘗不驗乎哉愛蘇亭説陳棐扶風城南數武有山曰飛鳳山之上有亭舊題曰逺愛相傳蘇長公軾之所書今不存余曰山去城里許非逺也山之亭仰面即可見舉足即可登可愛甚近也而名曰逺愛者長公之寄興於逺耳余更題為愛蘇亭昔蘇公之所愛者山亭也今人之所以愛此山亭者以曾經蘇公之所愛也山亭經蘇公之所愛而山之可愛益增是今人之所以愛此山亭者實愛蘇公也更名愛蘇誰曰不宜雖然陳子既愛蘇公之所愛其繼而來者又焉知無愛陳子之所愛者乎愛陳子之所愛即愛蘇公之愛而愛蘇公之説益明矣因為愛蘇亭説杜甫川説張廷玉晉顧愷之遊㑹稽人問山水之美答曰千巖競秀萬壑爭流而山川覽勝輒見于詩歌宜莫如杜工部甫人謂不由萬里路不讀萬巻書不可解杜則自襄陽徙河南洎避亂鄜坊卜居成都繇梓州下峽至荆南居耒陽不啻萬里遊闗以北為延州山競峨眉川流燕尾聨嵐含暉稱邊境之腹裏一勝槩故嘉嶺山自范仲淹知延州得名杜甫川以子美避亂一過士人至今日呼之苐子美所過不能無詩今考甫集六十巻及秘府舊藏人家所有大小集無至延州詩何邪子美自白水攜家客居三川觀水漲十二韵題短崖石室有長天夜散千山月逺水霞收萬里雲句今其字跡尚存比在鄜州有蘇端薛復筵簡薛華歌有贈髙式顔有彭衙行有得舍弟消息有月夜有遣興為家鄜州洛交羌村有憶驥子有一百五日對夜月至鳳翔謁肅宗復歸羌村有晚行口號有過宜君玉華宫有北征有獨步歸行有羌村三首有塞蘆子夫三川鄜州羌村皆延屬皆有詩北去延有㡬胡以杜甫名川而無詩未至胡以杜甫也既至胡以杜甫川不杜甫詩也彭衙行曰少留同家窪欲出蘆子闗塞蘆子曰延州秦北户曰蘆闗扼兩冦今按夢弼云延州乃秦北門去州百八十有里門山或云蘆子盖兩山峙立如門形若葫蘆由此而觀今郡北蘆闗嶺即蘆子闗彼地險阻可守子美且稔知之而延州猶經歴未到邪延州其所必至而川杜甫詩不杜甫非延于甫有情甫于川無情有情莫如兹川詩其佚之也三百篇如由庚南陔等什所佚多矣嗚呼此一川流悠悠漠漠似有徳君子所必觀焉而川西去未三十里地名花原頭其山髙五里從廣二十里千餘年來土人種牡丹㡬徧至採為薪故名花原得譜牡丹為延州紅使子美至此川而過花原當必有詩乃不得與萬里草堂百花爭妍猥與海棠寂寞也有遺憾哉黄四娘家花滿蹊千古流傳延之花原種牡丹者為誰又不得比于黄四娘苕蹊胡元任不有言乎齊魯大臣二人而史失其名黄四娘者獨何人哉託此詩以得不朽世間幸不幸𩔖如此終南太白説劉紹周終南山横亘闗中南面起秦隴徹藍田凡雍岐郿鄠長安萬年逺且八百里而延袤峙崌其南者皆此一山也故韓愈南山詩曰西南雄太白突起莫間簉藩都配徳運分宅占丁戊逍遙越坤位詆訐陷乾竇如闗中記謂終南山之總名太乙山之别號此其例也水經註武功終南引杜預為據而曰此山亦名中南亦名太白其曰終南固無間乎武功與萬年至云太白則舊𨽻武功為冬夏積雪望之皓然故名雍錄謂古圖志無言太白即太乙者惟長安志萬年炭谷有太乙祠始可命為太乙而非武功之太白則古文以終南為太乙者殆誤認武功太白而莫或正之耳其山髙大出物產夏書曰終南惇物秦詩曰終南何有有條有梅惇厚也厚物者即東方朔所謂玉石金銀銅鐵豫章檀柘百王可以取給萬民可仰足者也是自堯禹周漢皆謂終南饒物産不當别有一山自名厚物班志引古文而以太乙為終南垂山為厚物也誤矣盖以太乙太白為終南則可而分太乙太白終南為三則不可故李吉甫在元和間核闗中終南所歴而著諸郡縣自郿鄠武功至長安萬年皆著終南且曰在某縣某方㡬里則太白專屬縣境太乙專屬萬年而南山在闗中者統名曰終南云褒斜同谷説前人古今志褒斜者皆謂南北同谷惟何氏雍大記不然謂自秦入蜀有三谷四道西南曰褒谷南曰駱谷從洋入東南曰斜谷從郿入其棧道有四出從成和階文出者為沓中隂平道鄧艾伐蜀由之從兩當出者為故道漢髙帝攻陳倉由之從褒鳳出者為今連雲棧道漢王之南鄭由之從成固洋縣出者為斜駱道武侯屯渭上由之此四道三谷余未履其地但就其所分疏求之夫既以駱谷為南則斜谷當在西南且斜駱二谷地望各異何得槩稱一道為武侯屯渭所經由耶盖褒谷在蜀漢西北不得為自秦入蜀之路若從秦川言則南曰駱谷在盩厔西南為郿則斜谷耳乃訛西南曰東南將以郿在盩厔之東乎哉故程大昌述髙帝之入闗也正月羽封沛公為漢王都南鄭封秦將章邯為雍王都廢丘四月漢王入蝕中至南鄭蝕中不見他書以地望言闗中南面礙山不可直達其有微徑可達漢中者惟子午闗在長安南次西有駱谷闗又西則褒斜也此蝕中非駱谷則子午耳若大散則在西南不與咸陽對出非其地矣其年五月漢王引兵襲雍則自褒斜出盖雍之陳倉也漢兵既出章邯走廢丘遂定雍縣東圍廢丘邯自殺復遣樊噲周勃引兵下郿安得謂駱谷在南而斜谷又在東耶又按鄭氏地理畧當蜀魏時陳倉東北十五里為郿城亮攻陳倉不拔又攻郿不能克乃引還國志雖無其文而漁仲博雅必有所本則髙帝後亮亦攻陳倉及郿而不獨屯渭上由斜駱道矣盖駱谷出扶風隔南山中有三嶺一曰沈嶺近芒水在盩厔一曰衙嶺一曰分水嶺固郿斜谷水所從出以入渭者也乃知斜駱二谷在南山中其脉勢實相聨接縁本著末則郿與盩厔皆有駱谷而雍大記乃統稱斜駱道云所以記事者又有元僖西幸由斜谷之説見次柳氏舊聞及張氏耆舊傳昭陵乾陵説范文光文光居邠嘗走長安道過谷口問太宗祠人不識為太宗也漫應曰唐王祠即今昭陵人亦應之曰唐王陵私心怪之以為帝也何王之有然過奉天問乾陵人亦不知有髙宗也亦應之曰武則天陵范子曰光今而後知小民之口勝史氏之筆多矣太宗雖帝要其功業著於為王時當隋季之亂出之膏火震以風雷一時奉唐家者獨此王耳故至今王之也實當年有以傳此名也然則人心所屬衆譽所歸雖帝王位號赫著人間斯民固有不從其尊者矣若夫金輪氏淫毒竊攘使異世下一坏之土且專其名君子聽之猶有禍心之惡焉然髙宗實不能夫特稱之曰則天陵所以愧後世之夫不能有其妻者雖掘地及泉骨可埋而名不許嘻其甚矣考亭涑水大儒秉筆然定不敢易帝而王去帝而后而小民直與之直奪之百世千秋萬人一舌先正謂春秋史外傳心豈知史外傳口民言可畏過者思之潼闗連城説楊端本昔人謂泥丸東封函谷闗今日之潼闗鎖鑰西秦謂即古之函谷者非耶然入闗有三道潼入闗之正道也商之武闗入闗之孔道也昔漢祖破秦由此入咸陽朝邑古臨晉地自夏陽至闗平曠百里大河易渡漢祖往來闗中嘗由臨晉而七國謀反亦欲兵由此入是又入闗之隙道也五泉先生云一方不戒三險俱失誠哉是言也然武闗萬山險阻一將偏師可以無虞朝邑雖曰平曠百里命將建營於中路設巨礟數十南北巡守則大河即天塹也至潼闗之守則禁坑最為要地昔黄巢從禁坑破闗明逆闖李自成亦由禁坑陷闗豈非一方不戒而失三險之明驗乎盖疎忽地理之要而十二連城之廢也古設十二連城於禁溝之西由南郊以抵山麓計三十里而十二城是三里一城也每城設兵百人而於中城益其兵多設火器矢砮連絡呼應疾若風雨即有百萬之衆豈能超越而飛渡耶故守闗而不守禁溝者守猶勿守也守禁溝而不建十二連城者守猶未善也是猶一室之内杜門塞竇以妨鳥雀之入而忘閉其牖也是以闗予敵非所以固圉也守闗者察地理之形勢謀封疆之萬全周歴山川曠覽古昔鑒觀成敗其於建連城以控禁溝控禁溝以固闗亦計謀而重慮之乎太華仙掌辨唐王涯西嶽太華華之首峰有五崖比壑破巖而列自下逺而望之偶為掌形舊俗土記之傳者皆曰昔河自積石出而東流既越龍門遂彌南馳者千數百里折波左旋將走東溟連山塞之壅不得去有巨靈於此力擘而剖其中跖而北者為首陽絶而南者為太華河自此洩茫洋下馳故其掌跡猶存巨靈之跡也余聞而惑之乃往觀曰誕哉此説乎夫所謂神者非人也其動無聲其形無跡若形而無象若氣而無色拔山剖澤而不見其作鼓風奔水而不見其力視不可察名不能及故推而謂之神茍有聲可聞形可見非神之所為則皆人力之能及也烏有神之作力而有人跡乎且夫髙天厚地聳山流川者神之所為也所言開山導河亦神也神之所以神者有作而無悖一成而不易烏有始塞而復達之始連而復絶之始不知終是不為神矣且此靈之運為何古乎在太初開闢之始乎為陶唐洪水懷山襄陵之際乎以為開闢之始也宜當胚渾之先天地未位萬象茫昧尚無定歸當止一河之壅抑而一靈與其道借有其事自為而著悠悠乎年代之眇沒其誰也克傳以為陶唐洪水之際乎則禹奠百川宜在禹貢乃曰導河積石至於龍門南至於華隂東至於底柱皆禹功之所致以達於海豈天地大異之若此而典記不以為文哉天設四瀆宜有以通不當始遏其流滯撓其和氣及其汩亂而後理也且山谷之作此形何則不有危險相薄髙深相敵乃有鋭而出者為虎牙偶而背者為熊耳角而巘者為牛首冠而峭者為雞頭必以形之類形而必加説則雞牛熊虎之象其亦有作乎余嘗覽張平子賦西京至巨靈髙掌厥跡猶存之辭以為該聞精達常以是惑使不語怪神之㫖何所述明暨覩其形而咨之果謬悠而無據也將假文神事以飾其辭與為思而有闕與因辯其由而述之以告山下四皓辨宋羅泌揚雄云美行園公綺里季夏黄公角里先生代之所謂四皓者園公一綺里季二夏黄公三角里先生四也遭秦苛政避地商之藍田山中漢髙招之以皇帝善嫚士不至迨帝為戚姬故欲易太子髙后以留侯計致之太子以定四老人之力也既去弗復見後俱葬于安陵太白所謂蕪沒四墳連者百姓義而祠之今京兆藍田軹及上洛啇東巓俱有祠廟或云為秦博士世亂乃隱故園稱陳留風俗傳云園公為秦博士避地南山漢祖之起禮聘不就惠帝立以為司徒圏公者園公也其本圏姓而崔氏所贊亦謂四皓為秦博士然質之傳四皓當秦在時已入商洛深山不見其為博士且漢世無司徒元夀二年始制大司徒公亦何自為之此稱謬也雖然四皓之名言者不一如圏公在史記以來漢書法言諸所記載俱作圏公洽聞記作郭園公贊與仙傳拾遺又以為東園公角里先生在孔安國秘記及漢紀仙傳作角蠡而魏子作禄里是特音相假耳至綺里季之與夏黄公則畢文簡特以綺里季夏為一黄公為一盖以逸少淵明子美有黄綺之語非也按仙傳拾遺云綺里季東園公角里先生夏黄公與張良為雲霞之友間二子而言之而夏黄公在崔氏譜老子中經皆謂之夏里黄公則不得云綺里季夏矣又元和姓纂亦有夏里綺里禄里三姓夏里云出四皓河内軹人則文簡之説正為失之往歲啇於人有得四皓神胙机者乃有綺里季與角里之神坐則夏黄公之自為名益可知也神胙刻更有圏公神坐及圏公神坐机字正作圏而顔師古正俗引圏稱之自叙亦云圏公之後則知圏之為正抑復考之四皓姓諱有大異者在陳留志則圏公名庾而字宣明襄邑人始居園中因號園公或云姓國名秉與軹人角里先生綺里季夏里黄公為友秉庾字轉是亦稱園公爾故風俗通云四皓園公本亦園者夏里黄公姓崔名廓字少通齊人隱居夏里爰號夏里黄公姓崔氏而角里先生則後泰伯之後姓周名術字元道京師謂之霸上先生角里亦其號爾淵明亦嘗引此則非不知黄綺之實者四皓之刻始見於黄伯思董逌繼見𨽻纂為不誤也三輔舊事云惠帝為四皓作碑於隱所則知神胙机俱當時所刻者或云圏公姓韋韋口聲也國口意也殆廋辭云風俗通云圏援也從國袁聲今市語韋氏為園家武功邰􅔛辨明劉紹周􅔛為武功地有斜谷水太白山余綜其實不然按元和志邰在渭水南為漢􅔛縣地西南二十里有故邰城有后稷姜嫄祠羅泌路史亦云考五代都雍總圖其説以渭為經歴秦水大散陳倉至武功受斜谷水東為邰縣又東逕雍雍今府治也其邰平陽􅔛俱傍渭水南而北與雍岐周相直然漢地理志右扶風有邰􅔛武功各為縣邰下註周后稷所封􅔛下註有成國渠為右輔都尉治武功有太乙山垂山皆在縣東惟斜谷水出衙嶺山北至􅔛入渭有斜水祠不言武功即邰為后稷封域而唐志以邰為􅔛縣地水經註武侯駐􅔛使孟琰據武功水東唐書地理志及胡氏三省註温公通鑑俱謂􅔛有東西原為武侯所據地則知縣東南有太白山又南為武功山此山之水則為武功水經流縣境今失其稱名定處耳故地理家但括全境以􅔛即武功并有其山水云至漢永平八年始自渭水南徙武功於故邰城尚在今縣東北四十八里與唐志路史合惟隋徙武功於中亭川則距今治逺七十里頗不干涉矣鄭樵述地理畧謂渭水東過隴州汧源受汧水又東過鳳翔􅔛縣受斜谷水并太白山皆在今縣境内故康太史志武功謂武功太白兩山斜谷水屬􅔛若據今武功縣以言邰􅔛并欲求所謂武功太白山及斜谷水何從得焉則知世以􅔛為武功者盖據古地望而非可槩於今也平陽封域辨前人按魏書地形志太平真君六平分雍置周城𨽻平秦改􅔛曰平陽𨽻武都武都者虢也與􅔛平陽同域者也史記秦寧公徙平陽世紀曰􅔛之平陽亭徐廣曰􅔛有平陽鄉故通鑑前編本經世書直作寧公徙􅔛是也乃括地志云平陽故城在岐山西四十六里為寧公徙都處有平陽鄉有平陽聚胡氏註岐山縣亦云武徳七年移治龍尾城在平陽故城東北凡兩見則何也按都雍圖説瀕渭水南自西而東由邰及平陽始及漢􅔛縣地直北則為雍與岐周又按秦都世次自周東遷始有岐西或官邑在􅔛或徙居平陽或居封宫卒𦵏平陽皆此一地也至徳公復徙居雍則平陽在今縣境西濵渭當岐西南此與或言武公葬宣陽聚東南者合而雍又越渭在平陽周城西北矣胡氏註通鑑於元載請割􅔛虢稱後魏於􅔛置平陽周城二縣西魏復改平陽為􅔛城後周廢􅔛入周城盖周城界雍􅔛間可以言分雍置周城亦可言於􅔛置周城平陽也則括地志以平陽在岐山西盖魏王泰正就武徳七年後言之與魏志胡註未始相悖獨雍錄收秦雜宫以平陽封宫屬華山下則隔越六七百里斯為不審的耳大昌新安人其所述雍錄如以邰在平陽西北類多不可據雍韓考張士佩韓何昉乎昉於周左氏傳曰邘晉應韓武之穆也而史伯亦云應韓武王之子宣王時賢其裔而禮之故尹吉甫有韓奕之詩焉其一章曰奕奕梁山維禹甸之有倬其道韓侯受命王親命之纘戎祖考無廢朕命夙夜匪懈䖍共爾位朕命不易幹不庭方以佐戎辟其二章曰四牡奕奕孔脩且張韓侯入覲以其介圭入覲于王王錫韓侯淑旂綏章簟笰錯衡元袞赤舄鉤膺鏤鍚鞹鞃淺幭鞗革金厄其三章曰韓侯出祖出宿于屠顯父餞之清酒百壺其殽維何炰鼈鮮魚其蔌維何維筍及蒲其贈維何乘馬路車籩豆有且侯氏燕胥其四章曰韓侯取妻汾王之甥蹶父之子韓侯迎止于蹶之里百兩彭彭八鸞鏘鏘不顯其光諸娣從之祁祁如雲韓侯顧之爛其盈門其五章曰蹶父孔武靡國不到為韓姞相攸莫如韓樂孔樂韓土川澤訏訏魴鱮甫甫麀鹿噳噳有熊有羆有貓有虎慶既令居韓姞燕譽其六章曰溥彼韓城燕師所完以先祖受命因時百蠻王錫韓侯其追其貊奄受北國因以其伯實墉實壑實畝實籍獻其貔皮赤豹黄羆繹斯詩也韓盖侯伯之國也及大夫韓武子萬食采于韓原乃為邑武子後獻子厥從封姓為韓氏是為韓厥獻子後宣子徙居州州蘇忿生之州邑也宣子後貞子徙居平陽貞子後康子與趙襄子魏桓子共敗知伯分其地地益大大於諸侯康子後景侯立六年與趙魏俱得列為諸侯列侯後哀侯立元年與趙魏分晉國二年滅鄭因徙都鄭韓分晉得南陽郡及潁州之父城定陵襄城潁陽潁隂長社陽翟郟東接汝南西接𢎞農得新安宜陽及陳鄭之國而初所食采之邑曰韓原者乃為魏分焉魏之分也界自髙陵以東盡河東河内南有陳留汝南及開封而開封中原地號大梁而韓原時曰少梁盖以界秦戍守重之也韓原有龍門龍門雍州之域也直鄭則豫州之域也豫之韓大國也人多知之雍之韓始則國而終則邑也人鮮察焉故余稽諸經傳悉為著之俾地各昭昭免夫混淆之用也豳谷考文翔鳯不窋自邰竄戎翟之間為慶州寧州於南北朝為邠州公劉城在州西大似所謂京髙丘者但弗入豳谷之隩而塜固在邠州三水之間矣宜其國為近朱子詩傳豳在三水按篤公劉一詩其山川全合陟則在巘則石門即豳山豳山名亦水名也而寧豳間更無他巘所謂降而在原者信謂此逝彼百泉則諸隰谷之原泉不啻百又奚以三川之細而名之南岡則邑翠屏巖也半川殆其立國之野所謂京而邑之川即師水是謂京山師水地中有水曰師豳雖九谷之總名而其建國之大川宜顓稱豳水九原槩壁數百尺而水伏其地中師象也所謂土厚水深者正謂此北山北耳皇澗即唐川之訛也可夾而居者也過澗即炭泉訛也梁渠源於半川之後而其下流為炭泉獨南轉而過其國宜為過澗炭泉之名見丹淵集可溯不可夾也唐以南邠州為邠州其以州左右小溪當二澗者誤髙辛氏不都豳奈何邠城而有篤生后稷之隘巷葢衝郵之吏飾而表之以重地而亦弗問邰邠之不相涉邠州盖所謂度其夕陽者詩稱涉渭不稱涇豈其國於涇之畔而曾弗之齒耶同官有漆至耀州而合沮又安知所祠哭秦之姜女不即爰及姜女之訛乎而淳化之姜嫄亦當為太姜之里盖謂太姜實源於此耳其以為姜嫄者亦誣盖史之以嫄代源而表飾之以重地者也永夀為唐漆縣求其漆而弗得近始詢得于九嵕之隂細甚又不當率西之道其建邑盖誤以率西之滸為漆沮而遂以名而吏又因縣以飾實之亦豈果有兩漆沮如雍錄諸説謂詩書不相協乎書稱涇屬渭汭漆沮既從同耀之水實入渭而清碧如漆也詩止云率西滸不言漆奈何强而傳之其云自土沮漆亦非謂豳隩果在沮漆間盖道其遐僻之界而陶復固自在谷中也乃為善説詩西滸盖即今大峪底窖諸水而必以為率漆沮而西也宜其裂詩書而二之寧州眞寧盖北豳豳之脈淳化盖南豳豳之腓同官耀州盖東豳邠州永夀盖西豳豳之腋三水盖中豳豳之腹而寧州眞寧三水皆立豳谷中谷九而原隰錯故謂之豳淳化往即三水縣宋始自為淳化縣元始併入淳化而我朝始各自為縣也自寧州城以北原即直北而淳化城以南川即直南無所為艮山坤水者不為豳同耀邠永并在九谷外則一經一緯之豳吾邑實據其隩區矣班叔皮之自長都之安定也北征賦所謂郇邠邑鄉者吾邑也杜少陵之自鳳翔之鄜延也北征詩所謂木末水濵者吾邑也許氏不諳地而以汃水歸之扶風縣是以豳為岐也汃盖豳邠同而水表之豳字兩豕分附山者豕水象也分附者子午嶺分水以東西也邠盖八字分而西立邑於其水際故邠目之也凡分則象八分從八從刀故自分水嶺以西則為邠也是邠之為言文也亦分也分隂分陽而後可錯以成文九谷分壤地而為原隰故分文之兩義兼也汃盖外八而中一之象此九原九隰之所以為豳為邠也華嶽題名跋宋歐陽修華嶽題名自唐開元二十三年訖後唐清泰二年實二百一年題名者五百一人再題者又三十三人錄為十巻往往當時知名士也或兄弟同遊或子姪並侍或僚屬將佐之咸在或山人處士之相攜或奉使奔命有行役之勞或窮髙望逺極登臨之適其富貴貧賤歡樂憂悲非惟人事百端而亦世變多故開元二十三年歳在丙午是歳天子耕耤田賜大赦羣臣方頌太平請封禪盖有唐極盛之時也清泰二年歳在乙未廢帝篡立之明年也是歳石敬塘以太原反召契丹入自鴈門廢帝自焚於洛陽而晉髙祖入自太原五代極亂之時也始終二百年間或治或亂或盛或衰而往者來者先者後者雖窮達夀夭參差不齊而斯五百人者卒歸於共盡也其姓名歳月風霜剝裂亦或在或亡其存者有千仞之山石爾故特錄其題刻毎撫巻慨然何異臨長川而歎逝者也同州題顔魯公祠像唐重重既摹公之像於蒲繪而祠之又訪得此石本狀貌老矣公以乾元元年自同徙蒲至奉使時垂三十年氣節不衰而狀貌非昔也乃刻石而寘於祠室俾觀者有考焉鄉射禮直節序例明何景明予視學漢中至金州集漢隂平利紫陽四學師生將行射焉問其禮不知也乃使學官草具其儀予稍稍為説其文辭義意畧去恢複輯其節理實近可行者為之先屬范推官紳肄於東城之圃而予與吕憲使克中往觀焉憲使曰予在漢中盖修其器矣未究其禮也謂紳曰其悉布兹景明曰語曰禮失而求之野古禮亡不可見者何可勝道哉然鄉射之禮學校尚或習之予由鄠郿抵鳳漢攷之於學既已無聞而有司並其器亡之往往督使旋修舉行之斑白之老有相與環堵駭視者矣嗟夫古人揖坐旋辟之容與夫修於其鄉而一日不可缺者至使人以為曠世聞見之事風俗於古豈不邈哉題王安道遊華山圖王世貞遊太華山者往往至青柯坪而止至韓退之登其巓不能下慟哭與家訣其語聞於人人而仙掌蓮花間永絶縉紳先生之跡僅為樵子牧豎所有洪武中吾州王履安道獨能以知命之歳挾策冒險凌絶頂探幽宅與羽人靜姝問答歸而筆之記若詩又能託之畫而天外三峰髙竒曠奥之勝盡矣畫冊凡四十絶得馬夏風格天骨遒爽書法亦純雅可愛安道没歸之里人武氏而失其四後於長干酒肆見之宛然延津之合也傾槖金購歸為武家雅語垂二百年而吾友人李憲使攀龍復能登其巓所至書吾姓名於石而吾又託友人王㕘政道行刻石蓮花峰今年夏復從武侯所借觀安道畫冊及詩記磅礴累日太華既兩有吾名姓而吾胸中又具一太華矣是何必減三君子耶為大粲笑識其末書遊南山詩巻後馬理終南故周都之山也其美冠天下今在盩厔予居北山之陽相距甫百里乃不得一至焉往歳渼陂王子滸西康子約予同遊予時病卧復不能獲如約徒翹首南望詠殷雷之章歌斯干之篇而已邇者信陽何子試士過盩厔適我闗中二三君子尋盟終南乃不期而集於是相與陟崇覽勝暢情於杯酌之間興感於俯仰之際於是一唱一和得詩凡若干篇亦嘉㑹也予時在都下又不及與他日歸年友王子明叔寄詩於予且謂當有言其上予展巻而讀之恍若履髙峰之巓南眺漢川北瞰秦隴左峨􅖭右太行隨目之所如而呈奇獻秀錯乎其前亦一快矣然予不能無感焉竊惟西周盛時終南之靈能使夫周召奏績鳳麟在野故詩人極詠之故二南二雅之樂不遺終南若樛木􅔬木著王化之美嘉魚有臺致得賢之樂騶虞靈臺辟雍極位育太平之盛是也故斯樂也薦諸宗廟朝廷之上以養性情育人材感天地格鬼神無弗通焉此終南之遇也及周之衰天方薦瘥而終南失靈詩人家父之徒咸怨焉於是正道廢邪説興而靈臺辟雍之墟化而為老氏授受之所此終南之不遇也自是以來佛氏者又往往據之斯又不遇也間有賢人君子遊歌其間而采葛之情考槃之興居多要非雅南之盛則斯山遇之猶不遇也嗚呼終南其衰矣夫兹登臨諸君為人具瞻有終南之徳適當我國家風化之美君臣交泰之際而嘉魚有臺之奏斯其時也則夫唱和之詩特其兆耳他日經正民興邪説不作雅南復殷薦之盛而終南當自有遇也誰謂其終衰矣夫誰謂其終衰矣夫鐫輞川圖跋來復右丞之於輞川盖神情大半寄之者也輞川之締搆盛於一時繪而傳之者至流布千古而鹿苑滋峪之舊跡率淪沒于狐兔莽荻之間莫可尋覔闗中所鐫圖又拙陋不堪摩娑往來慿弔者有對夕陽而咨嗟爾沈澤腴明府以博雅通儒來宰藍田政暇訪其遺槩清樽髙詠若與右丞揖讓已則索不佞家藏郭忠恕所繪圖邀晉人郭漱六氏摹臨勒石精巧生動㡬奪忠恕傳輞川之神令人想像右丞不可磨滅之風流也余惟繪此圖者不知㡬十百種而余家所藏似善蒞兹土者不知人代㡬更而至沈明府之身始成此一段雅事名蹟名繪名賢名手賞集一時豈偶然乎遊杏灣詩引前人杏花灣𨽻涇陽然距余邑十里距涇陽四十里地本名方南魯橋無今名今名余與友人同遊所命也土人種杏多至數千株春初花開逺近爛漫如張錦幄邑清河經其右稍上則潴隁灌田渠決五流周囘樹下散輒復合沿流皆杏過他木半蔽虧深窅目不能直覩故言灣也此地相傳久不知經㡬刼豪富復廢為荒壄如劉希夷黄昏鳥飛之歎自余輩遊賞城中人漸一二繼其盛歳益輿馬之跡肴觴之費土人始詫笑近亦多取醉花跗水涯矣居常言雖粧㸃花神不能無雕琢渾樸然仲長之禽魚許瑾之裀子猷之竹少陵之花溪襄陽之霸陵王裴之輞川韓孟之西郊觀其寓意托興似不直在躭宴樂恣吟眺間濫觴為之去之益逺曾覩貴客𨗳絳帽人張葢穿游若俗子酗鬭横折余輩亦歳成故事應接匆雜囊草多虚俱為花辱又賞者喜華土人利實樹大實稀合抱之林率成樵爨邇來景物已減什五矣至夫同遊之人間厠非侣酬和諸賢槩多散處毎倒尊結伴伐木聽鸎之想頓起花時一大恨耳庚戌從燕抵家見王氏昆季詩知從華下迂道訪遊遂同社友含素舍弟馭仲即席成吟意興品識不卓然軼疇衆而遐追耶二君蓮洲先生嗣與太史先生嗣爾釐爾伸皆佳公子也其季父信卿闗輔聞士與余善恨未來一遊異時亦訂約焉君家叔姪欲收我灣頭春色乎其以所有十丈蓮易之樂城十景跋陳繼儒漢中左控三秦右跨西蜀中纒襄楚為闗隴一大都會而斗山天柱挾褒斜之險瀉嶓冢之奇遂擅秦漢以來名勝第一往董宗伯𤣥宰以樂城十景諸什見示余亦續以巴吟輒惋怛終不得杖笻一履其畔新歳張侍御奉命督學三吳儼然琅函之臨拜而歴視即疇昔𤣥宰與余賡歌樂城圖也層巒叠嶂緜亘映帶宜有偉人毓靈今侍御以斗岱間出之姿崇廣勵古文之治而於家鄉風景攜入几案時時披對李鄴侯為相而有煙霞之骨公之謂也余謂古來艷稱神異流傳遐禩者莫如岐陽石鼓出於周宣中興蒐獵之際此種奇古已不得不遜闗中為最何况山谿林泉出於聞見之外一經名手指㸃恍然東坡與可復出乎維風約題辭馮從吾孔子曰禮與其奢也寧儉夫由儉入奢易由奢入儉難秦中風俗雅稱近古乃今則奢極矣流波靡涯後將何極撫臺拱陽孫公憂之乃為維風約意在崇儉其有砥柱迴瀾之思乎夫奢費而儉省奢勞而儉逸喜省而惡費喜逸而惡勞人之常情乃竟由儉入奢何也彼盖誤以奢為厚而以儉為薄以奢為敬而以儉為慢耳然喜厚而惡薄喜敬而惡慢又人之常情此所以由儉入奢而無所底止也不知人之相與貴眞不貴偽貴久不貴暫儉則眞而可久其厚其敬孰大乎是彼奢則以套數相加以淫巧相競可暫而不可久是奢乃所以為薄為慢也而人奈何反以為厚為敬也知厚薄敬慢不在此則由奢入儉自不待辭之畢矣思深哉公之為此約也願與秦人士共守之或曰今天下風俗亦奢極矣寧止秦中子何私一秦而止與秦人士守之也與哉雖公之天下可也書李將軍戰勝圖左懋第崇禎六年十有二月黄河冰堅賊擾鄉寧無食夜踏冰由船窩渡任家嶺者千人任家嶺韓城地也李將軍先遣禆將以百騎馳射賊賊亦還射傷相當將軍親以三百騎往射之賊大傷走余時騎往勞軍望黑旄頭立山巓兵環髙崖向河而陣至則偕將軍地上坐虎皮裀與語崖下即將軍射賊處也七年二月賊乃踏冰由老雞坡渡道河清川以南老雞坡河清川皆宜川地與韓界也將軍恨之余亦恐宜雒間饑民附賊多且難制將軍以健兒五百持十日糧日夜行百二十里至澄城界牛角相李得賊所在戰斬百六十級而還奪其掠婦女五十餘人各歸其家牛馬百以饗士余甚壯之將軍名英榆林衛人己巳紀事詩題辭王濤己巳之變髙陵僵尸横野豺狼爭人骨而晝啼書生膽搖搖欲墮也乃其礪劍從軍死不旋踵怒氣薄豐隆英魂繞列缺則有李亨秦光祖焉玉顔可碎香魂不朽春花含其怨態秋雨咽其悲聲則有羅姚馬楊潘五烈婦投筆請纓破家享士章縫化為櫜鞬筆墨移於鋒壘則有陳繼泰焉至若旁邑切纓冠之救則大將軍虒子阿龍也黄石之畧家傳猿臂之射習慣寳刀拔而神泣京觀築而骨枯又何雄武足重哉畧為紀錄系以古體各取表實無分殿最然予更有異者潘烈婦娥娥女郎耳拔刀破面投崖自隕亦既難矣乃予方握管而聲響錚錚落案頭則誰為為之後有觀者可以興矣修志徵考引梁禹甸緬惟採風問俗不廢歌謡攷古論今攸資載籍故振興鉅典卓有深懷而纂輯遺休貴夫博覽長安為秦雍之首邑帝王之故都形勝奥區人文淵藪漢及隋唐是為西京大畧附見不煩耑譜自宋次道先生特為一書馮恭定公復加紹述煌煌邑乘爭光班史暨遭李變續熾秦煙而舊刻已空於烈焰新志尚掣于兵戎識者慨焉是非樞院大人遊心太上無以重不朽於將淪㣲賴藝林君子雅志斯文何由望足徵於既往若甸乾槁無華支離鮮暇每欲望洋秋水其如窮轍名山是用敬延宿碩以編摩期不煩而不簡綜理縹緗以蒐剔俾無餙而無遺條分縷晰璧合珠聫法嚴㫖于春秋陋私評于月旦肯如太白神遊天姥荒唐寧俟邠卿夢說孫嵩高義第思阿房甘露固錯見於文章醴水南山原不改乎登涉披詞足攷循迹易求至夫驗消長於版圖用參治亂紀災祥於事物爰測幾㣲上第名賢蔚為世美忠猷苦節炳爾邦華嶽靈川媚孕貫雕夢鷟之英星景雲慶來㩦鶴懸鱗之牧正氣時存於婦孺逸行間出於緇黄不無人恃爵傳豈乏名由德顯賢豪代起故實時增因革殊宜流風迭變凡此數十年之行烈詎在一二人之見聞斷帙蠧編塵封稗乘金書寳篆縢扄名言念先正之垂傳早已心貽今日使後學之紬繹宛然身際當時不極巖搜穴探奚昭人傑地靈九成之樂非一器之音殘則非全樂不得不借美於一音千金之裘豈一狐之腋而一腋虧則非完裘不可不歸功於一腋布聞有志諒辱同心罄厥珍藏襄兹盛舉暫供諸賢流覽旋容不佞完歸毋獨秘諸帳中敢請公之柱下御製脩西嶽廟碑文恭跋鄂海往歲聖駕西廵狩至於華嶽皇仁廣大軫念蒼生特發帑金重脩嶽廟臣海奉承休命卜吉鳩工丹雘維新雲霞絢綵竣事而後恭請御書匾額并御製碑文䝉恩報可廼於今年六月初四日頒賜到臣臣拜手稽首祗受訖隨命工鐫刻擇日懸匾樹碑匾曰露凝仙掌其字方廣三尺壯偉奇傑籠罩萬家龍躍天門而虎卧鳳闕也日月照臨而星斗不敢並其光也風雲雷雨交發互作而草木為之蒼翠山川為之振動也天威咫尺儼在目前萬古以來空前軼後豈羲獻輩所敢望乎從此永鎮山河焜燿天地微獨增榮嶽廟而已至于碑文一道聖意深醇帝典王謨統歸陶鑄伏念皇上以聖神文武之德子惠元元六合一家恩同怙恃而視西陲也更重其深仁厚澤加德于三秦父老子弟者尤巍煥而難名維西嶽為成物之主職司秋令皇上諄諄為此盖以祝雨暘之時若祈年穀之順成户積倉箱家餘盖藏為陜東西數千里百姓介景福于無窮也况坤元兌澤薄海内外咸有萬物待養之功則為陜東西數千里計即為九州以内億萬萬生人計皇恩如此為臣子者可不知所以報哉惟是帝德如天感逾覆載自當有左右記註秉國史者書之而省志實與國史相表裏盖志者史之基也臣謹將御製碑文刋入陜西通志俾秦闗百二與有千秋萬世之光焉且使皇上天地生成之德永永㒺極秦人頂戴傳之世世子孫綸綍昭埀鏤心刻腑與華嶽同其不朽可也御製平定朔漠碑文恭䟦鄂海欽惟我皇上道高五帝功邁三王日照月臨永奠萬年之寳厯天覆地載長綿億世之球圖大仁與大勇咸昭聖武與聖文偕懋固已六合以内悉荷生成四海而遙皆歸化育矣詎有厄魯特噶爾丹者性本凶頑計尤陰狡鼓其螳臂頓忘撫字深恩肆彼狼心直敢侵凌與國屢宣丹綍仍怙前非固宇宙所不容抑神人所共憤我皇上為億兆生民主一夫不獲時軫聖懷豈容小醜㺯兵遂致邊氓失業於是告之天地告之聖祖奮我六師親勞萬乘運籌决勝悉稟睿筭之神奇拉朽摧枯盡出帝心之淵密龍旂所向芝草旋生虎旅所屯靈泉自湧由是大憝既剪餘孽全消永清沙漠之塵風霆萬里重立燕然之石竹帛千年凡此鴻勲經臣目覩豐功偉績並日月而長存聖德神威鎮山河而永奠尤以事闗軍國應埀久逺特允羣臣之請爰頒御製之文勒石辟雍分輝直省臣思京師者四方之表率太學者萬國之典型况此西陲壤臨邊塞乃翠華行幸之地又義旗經過之方功徳巍巍與天㒺極秦人頂祝尤切瞻依臣已重勒貞珉布昭聖武而又念陜西通志乃千萬年史筆所闗封域山川於是乎在厯朝勲業於是乎書聖訓煌煌合當列之首簡以示尊天王大一統之義謹以所頒御製壽之棗梨典冊有光聲靈不朽從此秦闗嶻嶪永垂雲漢之英華華嶽嶙峋長覩日星之炳燿則金甌永固億載無疆而玉燭常調八方有慶矣祠漢武帝祈雨文唐沈亞之維長慶三年正月己巳櫟陽尉沈亞之承命于大京兆以歲旱用乾肉清醪恭祀於漢武皇帝之祠下因巫人以達其祝語嗚呼陰陽水旱其司惟神五行六氣神得而均如愆作災神何為仁惟神昔帝漢日何祥不臻雍熙滂洋甘露麒麟人何為澤亦仰如春氣配高明殁為神君非不漏誅屈抑不伸今者獻陽始歲亢而為屯草木蔽萌塞脉沈津不烝不洩逾于十旬雨師恡傲尸違不賔潛深踞高枯此下人風伯囂戯簸陶濃塵潰為凝霾坌若頹雲鴻混突渤上䝉無垠掩蔽光明以垢春晨彼風伯雨師皆神所司處位不職荒役不祗神假之權使之胡為上帝如怒其殃孰罹神明胡不督其稽察其欺壞法者戮後期者笞然後隂凑陽䒱雨膏以時發生有涯農力有施今官庶併誠䖍䖍于祠集于宮室鼔舞彈吹神其聽之無敢茍祈祭終南太白湫文宋范純仁比歲不雨被邊之民流離莩亡所不忍視今夏驕亢復甚焦灼涓禱羣望曾莫我助是用逺邀靈液以祈濡澤神既戾止遽獲嘉應旱稼復蘇優渥沾足皆神所賜敢不竭誠敢不腆禮以謝神貺惟聰明正直尚終沛施以庶乎有秋也尚饗鳳翔太白山祈雨文蘇軾維西方挺特英偉之氣結而為此山惟山之陰威潤澤之氣又聚而為湫潭缻罌罐勺可以雨天下而况於一方乎乃者自冬徂春雨雪不至西方之所恃以為生者麥禾而已今旬不雨即為凶歲民食不繼盜賊且起豈惟守土之臣所任以為憂亦非神之所當安坐而熟視也聖天子在上凡所以懷柔之禮莫不備至下至於愚夫小民奔走畏事者亦豈有他哉凡皆以為今日也神其盍亦鑒之上以無負聖天子之意下以無失愚夫小民之望告封太白山明應公祝文前人天作山川以鎮四方俾食於民以雨以暘惟公聰明能率其職民以旱告應不踰夕帝謂守臣予嘉乃功惟新爵號往耀其躬在唐天寳亦賜今爵時惟術士探符採藥謂為公榮實為公羞中原顚覆神不顧救今皇神聖惟民是憂民既飽溢曾無禱求衮衣煌煌赤舄繡裳捨舊即新以佑我民祭西嶽華山西鎮吳山文明太祖維神磅礴西土為是方之嶽鎭古者帝王必知神有所司故載在祀典為民祈福今予統中國兼撫四夷前者為利罕腦兒伯顔密邇中國屢撫不服告神用討已行絶滅自陜西迤北民無兵禍之憂但方今河州東南西南吐蕃川藏等洮州三副使頴素子雖以子入侍於心將欲抗拒朕心有所不安特告神知命將率兵前行進討惟神鑒之祭黄帝橋陵洪武四年朕生後世為民於草野之間當有元失馭天下紛紜乃乘羣雄大亂之秋集衆用武荷皇天后土眷祐遂平暴亂以有天下主宰庶民今已四年矣君生上古繼天立極作蒸民主神功聖徳垂法至今朕興百神之紀考君陵墓於此然相去年歲極逺觀經典所載雖切慕於心奈稟生之愚時有古今民俗亦異仰惟聖神萬世所法特遣官奠祀修陵聖靈不昧其鑒納焉祭告陜西境内山川城隍神永樂九年今陜西三司奏境内軍民多患疫癘死亡者衆未厎寧息朕君臨天下凡物失所皆朕之憂故拳拳夙夜寢食弗安維神職司隂陽助國為民禦災捍患萬冀神靈鑒予誠悃聞於上帝賜以𢎞休使疫癘潛消咸增康泰無天閼之虞有和平之樂特遣官致香幣牲醴詣神所祭告陜西災疫禱西嶽華山正統十年六月國家崇重方嶽歲嚴秩祀所祈黙運神化庇佑民生邇者陜西西安等府縣沴氣為災時疫大作死者相枕病者未已聞之惻然深咎於衷惟神表奠兹土民所恃賴覩此災沴能不疚心兹特遣官齎香幣以告於神尚冀體上帝好生之心鑒朕憫元元之意𢎞闡威靈禦災捍患民物獲安全之福神亦享無窮之祀因用兵災荒禱西嶽成化九年四月近者陜西地方累被達賊侵擾或刦掠財物或殺擄人口其為慘酷有不忍言朝廷不得已命將出師為民除害奈征戍日乆轉輸浩繁饑饉洊臻死亡相枕興言及此良用惻然惟神受職於天典司此土民困極矣心其安乎是用特遣廷臣敬執香幣逺叩祠下竭誠祈禱伏望神靈感通幹旋造化俾歲時豐稔賊冦殄除疫癘潛消軍民安妥庶副上帝好生之德慰朕憂憫之誠惟神鑒之謹告大旱地震祭禱西嶽文成化二十年十月朕奉天命子育萬民所冀歲稔時和災患不作惟神是賴兹者陜西大旱地道震驚民饑荒流離死亡者衆守臣以告朕心惻然惟神廟食此土作鎭一方見此困窮寧不矜憫用是特遣大臣逺詣祠下潔齋備儀為民請命伏望神明大彰顯應潛幹化機時暘雨雪用消凶沴變歉歲為豐年躋貧閻于夀域庶稱朕奉天子民之意中心懇切惟神鑒知謹告地震泉湧禱華山𢎞治十四年四月以上並御製文去年七月以來陜西地方肅州莊浪等處天鼓鳴響地震有聲已非一次今年正月元日至十七日西安延綏慶陽地震不已而朝邑一縣被災尤甚地裂泉湧水流成渠揺倒房屋壓死人畜以千百計顧兹災異必有其由奏報來聞惕然惶懼夙夜循省寢食靡寧惟神奠此一方民所仰賴特致香帛用告䖍誠尚祈翊輔皇祗潛消災沴俯慰民望永祚邦家不勝禱懇之至祈雪華山文𢎞治八年冬十月楊一清頃者闗中告旱詔修祀事以禱於神清承乏撫臣職當將事屬在西徼奔走愆期聖誠所動遽獲感通秋雨優渥來牟宿種此神之惠敢不以報然必冬雪應候則蝗蝻遁跡春雨時至則苗稼敷榮嗣是以往民有衣食秋毫皆神力是賴敢不以祈念兹闗陜之民外供三邊比自塞有驚塵歳無全稔哀哀顚連日甚一日不意今年麥夏穀秋兩無収穫自闗以西流離載道匪直天時欠順而地道亦復不寧誰其召之靜言增惕維今皇上嗣大厯服之初恩澤覃布庶政肅清意者小大僚吏慢神虐民奸法奸紀之所致與審如是神聰明正直莫之能違當徑罰厥躬不當濫及百姓謹用率屬致齋􅅹誠以告維神受命於天永奠西土民之休戚神實聞之尚克靈承帝休幹旋化機轉禍為福豈徒斯人之幸亦神之光謹告地震告災華山隆慶二年張祉惟聖尊居西服化贊乾坤此方利澤咸仰靈芬惟今地震特甚於秦近省死傷幾五千人禮宜備祀言官以聞上用驚惻遣致明禋祉有蓄念敢附以申皇天視聽皆自我民上初御宇誠敬寛仁惟宜召祥感戾無因縁祉棄材復玷冠紳政無興革念徒紛紜孤民之望為天之嗔地震未寢亢旱相仍罪在於臣遺憂於君罪在於人致瀆於神奉命將事感懼交殷惟天降鑒惟神區分凡有割罰宜祉之身轉災為祥以慰居民謹告南山祝文席增光瞻彼南山奇峰插天出雲降雨材木生焉其福我蒸黎者盖萬億斯年昊天不造亂越王家荆吳晉豫其盜如麻灞滻灃涇既覩千羣之飲馬褒斜漢沔旋驚萬騎之吹笳燕子傍誰飛久矣洒新亭之淚蘆花和我老誠哉動有道之嗟邦國殄瘁寤寐難安魯連之不帝秦蹈乎東海司空之值危亂入於王官仰芳踪其未逺撫深谷而盤桓去彼塵垢適我煙巒有酒盈尊蕉黄荔丹已而已而維山之湄方者似義圓者似智溫其如仁鎭靜若癡斜者如倚恍雨中之折角頃者如醉宛高卧乎東籬悠哉悠哉維山之隈或俯或仰半壁半苔有凹而曲有峻而壘或孤危陡峭如大臣正色垂紳剛毅而難犯或嵬崖㠑巍如古人經憂履險百折而不囘於是躡石磴入雲峰踞絶頂俯幽宮登彼南山兮有泉涓涓文川武鄉思我柏年眺昔日之勝跡想㢘讓之潺潺登彼南山兮有竹叢叢既清以貧思我文同撫篔簹之修竹千畝在其胸中登彼南山兮有木蓁蓁辭召却聘思我子真挹釣臺於江上収谷口之殘春登彼南山兮有石嵸嵸躬耕而引思我卧龍望定軍之煙樹懷梁甫於隆中已矣乎吾舍此安歸乎何以食之烹芝採薇沆瀣為飲兮朝霞為餐惟此山是依何以服之紉蘭佩香芰荷為衣兮芙蓉為裳惟此山是翔何以居之枕石漱流虹蜺為帶兮綠蘿為幃惟此山是之何以友之聽鶯狎鷗木石為羣兮麋鹿與遊惟此山是求噫噫折腰五斗米慙無松菊之榮葢頭一把茅聊作龜魚之主風月嘗閒不必買山充隠猿鶴易怨肯教林澗貽羞敢布夙衷山靈昭鑒久旱禱告華山本朝湯斌惟神體含金德位列兑方功配兩儀澤潤萬類惟兹闗輔實處神宮牆之下雨暘寒燠咸賴神休乃自去歲三冬無雪入春恒暘轉亢雲興斯飇塵霾晝曀麥苗洊槁百姓無所歸命夫休咎徵事祥異從人良由斌等奉職無狀或政乖刑濫而獄有寃民或吏墨兵驕而里盈怨氣或單丁獨户窮苦重其租徭或鰥夫孤兒死亡莫之振救以故感動天威召致災𤯝然神目孔明官之不職宜明賜誅殛奈何舍其有罪而殃我羣黎今斌䖍率僚屬蚤夜步禱數月於兹矣呼神莫應籲天㒺聞下民何知遂疑神聽不聰而欲别求媚于滛昏之鬼夫山魅澤怪神之所宜屏斥而滛昏之祀明王之所禁也若三日不雨民奔走于淫昏之鬼斌不能止也倘氣運否極而通偶與雨會則民必歸靈于鬼魅將淫祠日甚左道日興雖告以名山大川澤被生民其誰信之惟神念官吏士民悔過之誠敷奏上帝屏風伯搖雨師雲奔電趨貽我來牟使農夫饁婦知嶽瀆明神果能闔闢陰陽吐納風雨將益堅其畏信之心而淫昏之鬼自不能惑我民者是神之眷佑斯民不但錫以有年之慶兼賫以正徳之福仰戴神庥永之無既謹告馬汧督誄并序晉潘岳惟元康七年秋九月十五日晉故督守闗中侯扶風馬君卒嗚呼哀哉初雍部之内屬羌反未弭而編户之氐又肆逆焉雖王旅致討終於殄滅而蜂蠆有毒驟失小利俾百姓流亡頻於塗炭建威䘮元於好畤州伯宵遁乎大谿若夫偏師禆將之隕首覆軍者盖以十數剖符專城紆青拖墨之司奔走失其守者相望於境秦隴之僭鞏更為魁既已襲汧而館其縣子以眇爾之身介乎重圍之裏率寡弱之衆據十雉之城羣氐如蝟毛而起四而雨射城中城中鑿穴而處負户而汲木石將盡樵蘇乏竭芻蕘罄絶於是乎發梁棟而用之􅙏以鐵鏁機闗既縱礧而又昇焉爨陳焦之麥柿梠桷之松用能薪芻不匱人畜取給青煙傍起櫪馬長鳴凶醜駭而疑懼乃闕地而攻子命穴浚壍寘壺鐳瓶甒以偵之將穿響作因焚穬火薰之潛氐殱焉乆之安西之救至竟免虎口之厄全數百萬石之積文契書於幕府聖朝疇咨進以顯秩殊以幢盖之制而州之有司乃以私𨽻數口穀十斛考訊吏兵以檟楚之辭連之大將軍屢抗其疏曰敦固守孤城獨當羣冦以少禦衆載厯寒暑臨危奮節保穀全城而雍州從事忌敦勲効極推小疵非所以褒奬元功宜解敦禁劾假授詔書遽許而子固已下獄發憤而卒也朝廷聞而傷之策書曰皇帝咨故督守闗中侯馬敦忠勇果毅率勵有方固守孤城危逼獲濟寵秩未加不幸䘮亡朕用悼焉今追贈牙門將軍印綬祠以少牢魂而有靈嘉兹寵榮然潔士之聞穢其庸致思乎乃若下吏之肆其噤害則皆妬之徒也嗟乎妬之欺善抑亦貿首之讐也語曰或戒其子慎無為善言固可以若是悲夫昔乘丘之戰縣賁父御魯莊公馬驚敗績賁父曰他日未嘗敗績而今敗績是無勇也遂死之圉人浴焉有流矢在白肉公曰非其罪也乃誄之漢明帝時有司馬叔持者白日於都市手劍父讐視死如歸亦命史臣班固而為之誄然則忠孝義烈之流慷慨非命而死者綴辭之士未之或遺也天子既已策而贈之㣲臣託乎舊史之未敢闕其文哉乃作誄曰知人未易人未易知嗟兹馬生位末名畀西戎猾夏乃奮其奇保此汧城救我邊危彼邊奚危城小粟富子以眇身而裁其守兵無加衞墉不增築婪婪羣狄豺虎競逐鞏更恣睢潛時官寺齊萬虓闞震驚台司聲勢沸騰種落煽熾旌旗電舒戈矛林植彤珠星流飛矢雨集惴惴士女號天以泣爨麥而炊負户以汲累卵之危倒懸之急馬生爰發在險彌亮精貫白日猛烈秋霜稜威可厲懦夫克壯霑恩撫循寒士挾纊蠢蠢虎狼阻衆陵寡潛隧密攻九地之下愜愜窮城氣若無假昔命懸天今也惟馬惟此馬生才博智贍偵以瓶壺􅗇以長塹鍤未見鋒火以起焰薰尸滿窟掊穴以歛木石匱竭萁稈空虚瞷然馬生傲若有餘􅙏梁為礧秫松為芻守不乏械櫪有鳴駒哀哀建威身伏斧鑕悠悠烈將覆軍喪器戎釋我徒顯誅我師以生易死疇克不二聖朝西顧闗右震惶分我汧庾化為冦糧實賴夫子思謩彌長咸使有勇致命知方我雖未學聞之前典十世宥能表墓旌善思人愛樹甘棠勿翦矧乃吾子功深疑淺兩造未具儲𨽻盖鮮孰是勲庸而不獲免猾哉部司其心反側斵善害能醜正惡直牧人逶迤自公退食聞穢鷹揚曾不戢翼忘爾大勞猜爾小利茍莫開懷于何不至慨慨馬生硠硠髙致發憤囹圄没而猶眡嗚呼哀哉安平出奇破齊克完張孟運籌危趙獲安汧陽賴子猶彼談單如何吝嫉揺之筆端傾倉可賞矧云私粟狄𨽻可頒况曰家僕剔子雙龜貫以三木功存汧城身死汧獄凡爾同圍心焉摧剝扶老攜幼街號巷哭嗚呼哀哉明明天子旌以殊恩光光寵贈乃牙其門司勲頒爵亦兆後昆死而有靈庶慰寃魂嗚呼哀哉弔茂陵文明方孝孺祗明祀而言旋兮指槐里以西征停䇿憩於道傍兮覩高丘之崢嶸即故老而記之兮惟漢武皇之茂陵整冠裳而疾趨兮踵遺廟以屏營凄風起於叢棘兮鼪鼯嘯於幽塋慨惟心之靡託兮悲曼志之無成惟君皇之御極兮遘炎靈之方熾陋堯禹為未足尊兮畀祖武而弗肻繼内瘠民以自殖兮外威靈乎遐裔騁車轍於八荒兮侯神人於海澨建千門於萬户兮殫土木之奢麗羨軒轅之騰化兮永傲睨乎斯世何盛業之易隳兮洪謨鬱而難宣雖暫弱於戎胡兮生民疲弊而不痊奇禍機於巫蠱兮妃嗣丁毒而銜寃諒逞心於屠滅兮抑天道之致然闢土疆之宏廓兮曾𤣥宮之莫固赫兵革之繁庶兮委守衛於草露城闕之崇敞兮永斷礎而無所後宮之韶冶兮僅或傳其冢墓像祁連以旌武兮想壯魄之已腐嗚呼哀哉形必有盡兮孰不有亡匪君皇之獨然兮尚奚為隱憫而迴遑惟祈生之已甚兮或妖誑而過望謂長年而卒老死兮斯足垂戒於昏荒明固有所不達兮智固有所短偉才畧之英邁兮哲與愚其相半賴聖表而黙出邪兮兼善悔而能斷雖人恫而財竭兮終克免乎危亂悼往者之無知兮尚來者之可諫感盛衰而相襲兮仰昊天而求歎誄劉烈士文有序本朝顧咸正崇禎歲在癸未十一月西安府同州儒學生劉醉白名長庚聞闖賊之難焚衣冠訣親友手刃妾雷氏并幼女而自經於讀書樓越一年甲申延安府推官顧咸正聞其事而義之猶未詳也順治二年乙酉夏徵於其所謂州守及州之人始得其詳於是仰天椎心痛哭遣使賻其家設雞黍祭其墓下而為文以告曰嗚呼天柱折乎地維裂乎物胥而妖孽乎閨閣胥而娼衣冦胥而竊乎嗚呼公何為者生孑孑乎公何為者死烈烈乎嗚呼而繞指猗我鐵也而淤泥猗我雪也賊地矢不可轍也賊粟矢不可囓也賊刃矢不可掇也鬌髢者女猗矢不可紲也縞綦者妾猗矢不可湼也廿載儒冠我蕝也萬巻詩書我茢也五畝祠地我稅也數武園樓我穴也寡妻孤兒我玦也仁人君子我碣也公經紀既畢於是怒目如炬浩歌數闋引取利刃霜飛電掣呼妾與女今日永訣左手提其頭顱右手决其骨節愛女伏闌干而斷魂少姬整襟袂而濺血人皆號咷公獨咥咥乃引領受繩端拱氣絶四體冰僵一腔火熱日月忽而昏霾風雨慘其悲咽嗚呼公死乎其未死乎余觀世人不死而死䛕莾頌操口波舌綺其言也鬼㺅冠䑕裳盲揖瞎跪其行也鬼辭樓下閣貢妻獻子其家也鬼羊狠狐媚剜肉吸髓其官也鬼嗟嗟青天白晝鬼何纍纍百千萬年臭穢青史父不敢父子不敢子如是等鬼一死永死孰如我公死而不死英英氣魄濯濯神理怒則風雷喜則霖雨二祖列宗式鑒伊邇凡有心者誰不興起嗟余孤臣視公有泚所恃此心不媿生死書公之事血涙盈紙願後死者勉旃雪恥獲之翼之惟公是視長庚在天華華其紫公耶非耶死乎不死迢迢千秋請視余誄弔秦公子扶蘇文譚吉璁維輓周之天醉錫金策於強秦剪鶉首而是宅滅六國而無垠爰去泰而著皇示一統之威神遂坑儒而焚籍放典則而不遵何公子之直諫能奮士而信人乃北監於上郡爰䝉難而遘屯辭三軍以加劍咸折骨而銷魂雲靉靆而慘淡水潺湲而嗚咽尊仲尼於日月揭大道於乾坤啟赤帝之過魯奠太牢以明禋宜誦法於萬世豈當代之稱仁覩穹窿之遺寢一霑洒於城闉石鼓文周宣王􅏶車既工􅏶馬既同􅏶薛音我馬志本音吾讀作我􅏶車既古文好􅏶馬既􅥹籀文􅥹音陶北野良馬君子員員邋邋員斿邋鄭作獵君子指從獵諸臣員員衆多而有禮儀也獵獵旌旗揺動貌員斿旌上贅旒馬志員通作爰斿通作游當讀作君子爰獵爰獵爰游麀鹿同速君子之求讀作關與彎同酋馬志作􅓒音條弓弓兹㠯寺諸家皆作時􅏶敺古文驅其畤音止土高處也薛作孫施作時其來音亦行聲也一曰不行貌音憲走貌蘇作煙塵也音臺即鄭作敔與禁籞之籞同即時麀鹿音即側行也其來大古文垐音茨大道也我敺其欉音卜叢生曰樸其來音獨走貌古文射其􅢢同豜蜀蘇作屬按蜀亦獸名右一鄭作丙文薛作辛文􅊈水名出扶風􅊈縣殹讀作繄語助聲沔沔一作泛泛㞼讀如蒸進也通作被音彼淖一作潮淵淖淵水之深處古文鰋鯉處之君子古文漁之澫澫通作漫漫又通作有見詛楚文古文鯊其斿音散叶跚帛古文泊字水淺處魚􅛼􅛼讀作皪音力白貌其同俎一作葅氐鮮氐通作底言泊中之魚皪皪然潔白登之于俎甚鮮也黃帛泊其鄭即鯾字又有鄭今作鮒又有􅤺鄭作鮊音白鮊鱎也其石本作今作䏠也鄭作豆孔庶羉之羉謨官反施綱也音鐸相如賦怵奔走也籀文洋字今作澣音搏其魚佳通作維可通作何佳維鱮佳維鯉可何㠯橐同棕之佳維楊及柳右二鄭作甲文蒒作戊文田車既安鋚音條轡首同勒馯馯同駻馬高六尺也六古文師既簡左驂旛旛旛旛輕舉貌右驂騝騝紀偃反壯健貌􅏶以隮于原石本作古原字􅏶戎止今作陸宮車其寫寫舍也秀同繡弓時麋豕孔庶麀鹿雉兔其邍又有㫋鄭作紳其戎鄭作奔又作走大車出各讀作洛亞字典同惡又古孝經作惡獸白古文澤白澤獸名執而無射君子逌同攸樂右三鄭作丁文薛作丙文籀文帥彼鑾車音忽疾也㩽同策眞讀作塡如秀繡弓孔碩彤矢同鏃四馬其寫六轡驁驁徒鄭作馭孔庶薛作廓鄭作騎古文宣博一作搏搏無騎字通作輶車載古文道如如章徒從整布如文章然邍古原字溼通作隰陰陽􅢷􅢷同趣六馬射之籀文族一作今作徐又有貙如虎獸鹿如􅴩同兕台讀作怡爾多賢迧同陣一云同徇禽奉雉􅏶兔薛作鹿允異右四鄭作戊文薛作丁文我來自東霝音零雨古文流一作迄悞湧盈盈同渫君子既古文涉馬流􅊈􅊈殹洎音計凄㞼士古文駕言卥古文西䢜籀文歸舫一作方舟自薛作廓鄭作鄠徒一作即駢字湯湯一作逴逴佳維通舟㠯籀文道字或陰或陽极薛作枝鄭作楫深㠯户出于水一方㞼止其奔其敔今作禦且蘇作阻其逌同攸叓古文事字右五鄭作辛文薛作壬文猷乍籀文作下同邍原乍周導遄音傳我􅯊籀文辭攸除帥阪田音鳩草之相糾者為世里希㣲蘇音徼逌鄭作攸薛作罟木名古文栗柞棫其拔音佩古文㯶音杲木也又同桕蘇作庸鳴條條山楸亞箬其薛作華何為所斿薛作憂鄭作䕫水盩引擊也又地名導同㫖􅖨同幽同晤右六鄭作乙文薛作庚文同御嘽嘽音㬮語聲也而師旅眞同塡會同又繹㠯左戎音章行遽貌弓矢孔庶滔滔一本滔滔上有左驂二字是古熾字夫寫矢具隻即奪字茻古文舉㧘音自也積禽其石本作按旴音訏日始旦也薛作肝鄭作䏏或羣或友悉率左右燕樂天子嗣王始同振音貞復古我來攸止右七鄭作壬文薛作甲文彼走䮺䮺音齊鄭音劑馬麃晢晢蘇作華雉㲋音綽似兔而大太多庶㣲我師氏憲憲文武可何其一之右八鄭作庚文薛作已文􅏶水既古文淨􅏶既平􅏶行既止嘉則里天子永寧同寧日佳維丙申旭日杲杲􅏶其雱籀文旁道椉馬既迧陣敇字之訛夏康康王作肅肅彼四黄左驂䮯䮯左驂音速㦸㠯弈女汝不執德旛籀文翰音黎薛作霧一作霍猋斿施施音宜旗動貌公謂大來余及如兹邑害曷同不余及右九鄭作癸文薛作乙文吳通作虞人㥕古文惔一作亟即亟朝夕儆惕載􅒾載北勿奄勿伏一作伐即嵒字一作若而出奇進古文獻用特格同藝祖告于大祝禘嘗受古文享致其方同藝寓中囿孔庶麀鹿邍溼既坦疆理疃疃大田不􅊧君子可求又有謀又有始周爰止于是右十鄭作己文薛作癸文章按周宣王狩于岐山之陽所刻石鼓文十大抵紀田漁之事猶雅有吉日車攻之類也宋時薛尚功鄭樵各為之音釋王厚之考正而集録之施宿又訂以籀文辨證訓釋亦綦詳矣而參差亦由兹起今採集衆說㕘以馬豀田馮少墟諸志雖間有闕文疑義不能強通而存其大畧可備經史之遺矣遇樵後漢黃憲徵君入秦倚歌于渭橋有負薪者過而問曰子何人斯倚歌于渭水之梁乎徵君對曰甫漢室之徵君也弔古于秦悲而倚歌非汝所測也負薪者曰吾秦人也以負薪為職凡秦之名山廣谷遺基故苑吾皆得而樵焉子以弔古于秦以釋厥志吾為子肆言可乎今日暮重闗渭水東流秦嶺蒼然鳥憩雲木有廬在焉請與子偕歸以薪為榻舉瓦觴飡鬼草聊以娛子懷也夫秦四塞之壤也雖偏鎭于西隅而國之形勢實為天下雄固帝霸之業也若夫盤互而秀于南者則終南太乙焉嶐嶐乎陰于西極而東望潼闗者則華嶽焉東注乎咸陽則灃水之所導也其境有蘭池阿房之宮咸陽之南周之鎬京也茫茫四陵南北相望秦宮所營灃其鬱焉豈惟涇水之望陵哉疑有誤西北極乎豳國而奕奕者其梁山也絪縕而蒼蒼内有離宫别館昆明西陂輦道紆曲而相屬者秦之上林也鬱然起于鄠之南者有紫閣峰焉其周之靈臺廢也久矣横亘乎藍田者有秦嶺焉霸水之所出嶢闗之所鎮也限于北漢之陲匈奴倚垣而窺者秦之長城紫塞也扞蔽乎朔方而胡笳戰馬之所集者其賀蘭之山乎聲下龍門景入太華而浩蕩者黄河也積雪千里而瀑布之􅐯漾者則太白焉荆山峙于河則大禹鑄鼎之墟也若夫太液曲江之池樂遊細柳之原驪山之温泉新豐之枌社隴山之九坂長安之章臺又有博望西郊芙蓉未央長樂建章甘泉之宮不可勝數其近而羅列者皆鍾秀于雍州其逺而環帶者皆隱耀于闗中也鄠人對唐韓愈鄠有以孝旌門者乃本其自於鄠人曰彼自剔股以奉母疾瘳大夫以聞其令尹令尹以聞其上上俾聚土以旌其門使勿輸賦以為後勸邑大夫常曰他邑有是人乎愈曰母疾則止于烹粉藥石以為是若夫毁傷支體以為養在教未聞有如此者茍不傷於義則聖賢當先衆而為之也其不幸因而致死則毁傷滅絶之罪有歸矣其為不孝得無甚乎茍合孝道亦不當旌門盖生人之所宜為曷足為異乎既以一家為孝是辯一邑里皆無孝矣以一身為孝是辯其祖父皆無孝矣使或陷于危難能固其忠孝而不茍生於逆亂以是而死者乃旌表其門閭爵禄其子孫斯為勸已矧非是而希免輸者乎曾不以毁傷為罪滅絶為憂不腰於市而已黯於政况復旌其門擬冊邠王文唐劉禹錫維某年月日皇帝若曰朕讀詩至邠風見古公亶父之跡然後知王業之難仰惟我高祖太宗之櫛沐風雨以啟天下是用兢惕若墜泉谷邠之舊地積德之餘俗厚而忠人悦其上王於兹土克𢡟賢戚兹爾第四子某質重性和神清氣茂威儀儼若恬淡寡言介然風規坐鎮流俗固可將吾勤儉宣化邠郊錫爾白杜藩於西土是用命使某官某乙持節冊命爾為邠王往欽哉宜聽朕命於戲播種者后稷公劉之業善繼者古公亶父之志積德行義國人戴之詩有七月之章非惟王業艱難亦俗阜化成之風也爾其曰夜思之誕以温柔之教無奪農時使獨戴周徳以忝余一人之命書褒城驛壁孫樵褒城驛號天下第一及得寓目視其沼則淺混而茅視其舟則離敗而膠庭除甚蕪堂廡甚淺烏覩其所謂宏麗者訊於驛吏則曰忠穆公嘗牧梁州以褒城控二節度治所熊節虎旗馳驛奔軺以去以來轂交蹄劘由是崇侈其驛以示雄大盖當時視他驛為壯且一歲賔至者不下數百輩茍夕得其庇饑得其飽皆暮至朝去者寧有顧惜心耶至如棹舟則必折篙破船碎鷁而後止漁釣則必枯泉汩泥盡魚而後止至有飼馬於軒宿隼於堂凡所以汙敗室廬糜毁器用官小者其下雖氣猛可制官大者其下益暴横難禁由是日益破碎不與曩類某曹八九輩雖以供饋之隙一二力治之其能補數十百人殘暴乎語未既有老甿笑於前且曰舉今州縣皆驛也吾聞開元中天下富蕃號為治平踵千里者不褁糧長子孫者不知兵今者天下無金革之聲而户口日益破疆場無侵削之虞而墾田日益寡生民日益困財力日益竭其故何哉凡與天子共治天下者刺史縣令而已以其耳目接於民而政令速於行也今朝廷命官既已輕任刺史縣令而又促數於更易且刺史縣令逺者三歲再更故州縣之政茍有不利於民可以出意革去者其在刺史則曰我即去何用如此當愁醉醲當饑飽鮮囊帛匱金笑與秩終嗚呼州縣者真驛耶矧更代之隙黠吏因縁恣為奸欺以賣州縣者乎如此而欲望生民不困財力不竭户口不破墾田不寡難矣哉予既揖退老甿條其言書於褒城驛壁戲檄曲江水伯文樊鑄主張於地之血脉者豈不曰水伯乎爾自獸為身面為人控牽兩龍窟宅百谷億有祀矣故斁倫於元氣之液弄權於坤輿之竅所云老而不死是謂之賊伊我謂爾有是夫何者三載二月春服既成冠者五六人才子六七人皆簸揚文精開闔武庫游嬉春晝沿洄江干興飛壯心舞曵齒胄皆貸白龜之德不負赤鯉之本爾為陰發暴殄潛生毒痡簣禍階於沙岸垣死府於花島如數子者皆載垂堂之誡爾始若懸流三十仞跳沬四十里固應尊而不親釁豈相及爾岸不崪屼流不唐突設人所倚之福陷爾孔易之誘俾水衒貫堅之功沸聲其如蜩螗捫空呼天迄死不救倐恣化魚之惡誰下拜牛之惠溺我國寳豈明時棄珠之泉沈彼綵船實元夜藏舟之壑與夫覩右山四耳之獸夢潁川一角之人置于大江未匹斯甚使揭竿求父之子投牋請弟之兄奏箜篌傷妻之夫厲波濤徇壻之婦罹其凶害不忍荼毒並告無辜于上下神祇行哭失至于爾安乎爾今肆行賊虐者豈不謂性與習成乎何哉曩者溺孫興公於後湖之中淪炎帝女於東海之上化鼈於黄氏之母為魚於厯陽之郡爾應恃以舊㨗蔓其後圖殊不知事不欲數數斯辱矣惡貫已滿天命誅之然今厯視而自昔為過之所或天涯或地岊起於侯甸之外且非輦轂之下豈比今日俯九門臨四達使哀聲悲響上及聰聽爾誰欺欺天乎然曲江者南峙仙閣北距靈宮足可效赤水産黄帝之珠胡為殲蒼生竊司命之契況之人也皆編中䓙俗游無何鄉所冀猛火烈山而莫焚大浸稽天而不溺既遇爾省括捨之中縱使飯術解漂之餌山經不沈之木豈可免爾之圖乎兹中江自首創至於今時數千年子更代易主島流波耗纔可接腋於井蛙詎持頤於海鼈爾之所處豈不狹隘乎人之所賞豈有舳艫乎逮天寳載我皇恢土徳以博之竇澤流以濬之積潤下之波瀾用濟川之舟檝豈不謂幸於爾也爾何滿以致溢凶以自斃使彼都人士自此之後懼爾同失神之海惡爾甚探手之湯匪徒歇爾盛事過自掇也雖悔可追然靈莫尊於君人時莫美於陽春君固愛人種德乘春宥罪省囹圄去桎梏爾奚得恃宅無聞括守有曲襲不辜於止獄之候繫餘殃於積慶之家僕謂數子呌天曹訴地府黜爾主職在於斯須不然僕見欲上書於承明廬徵菑近速周處擊劍長逐臂波深搜爾居遁逃則焦僥東請長臂者灑漉之又於雄棠北使長股者憑踐之不然邀離朱以視之命宋定以縛之然後調馬梅扇獸炭是烹是醢以報東門爾儻若混空隱形和水匿象則使牛曵蛇尾絶其本根縱逢山見彘毛終難必復矣僕亦宜念五六日至於旬時恐爾有詞曰予不誡視成不令而行故矢在弦上垂而未發儻能易轍僕則既往不咎若為刻舟爾則何辭以對徐察爾變惟審圖之拜嶽言陳黯黯自闗東隨計來闕下經華嶽祠有巫𨗳以祈謁乃徹盖整衣馨爐瀝觴頫拜而前緘黙而退王曰客是行也務名邪官邪胡為乎有祈禮而無詞神之肸蠁而答盍舒乃誠曰余其來拜以嶽長羣山猶人之有聖賢草木之有松蘭百川之有河海鱗羽之有虬鸞屹屹崇崇干霄柱空載國祀典宜人攸宗拜之思盡乎余之敬詞之黯懼乎神之聰且神視果高而聽果深必福其善而禍其淫余行合乎神也必照而臨如欺乎神也祈之乎何心巫兮余言無妄兮為妄言者之箴登華㫖沈顔嘗讀李肇國史譜云韓文公登華嶽之巓顧視其險絶恐跌墜不可下乃發狂痛哭而欲縋遺書為訣且譏好奇之過也如是沈子曰吁何不論文公之㫖耶夫仲尼之悲麟悲不在麟也墨翟之泣絲泣不在絲也且阮籍縱車於途窮輒大慟豈始慮不至耶盖假事諷時致意於此爾前賢後賢道豈相逺文公憤趨榮貪位之人若陟懸崖險不能止㑭至身危踣蹶然後歎不知稅駕之所焉可及矣悲夫文公之㫖㣲沈子㡬晦乎重修園池披錦亭上梁文宋南勝刦火洞然不貸池亭三十景春風暫寓種成桃李㡬千家雖横湖多花竹之奇獨披錦據園林之秀自丹淵去後誰為主已歎荒凉况異邦何處得此花畧宜盼睞莫使鸎慵蝶懶虚度三春縱教鴻去燕來葺成一日判府安撫郎中主盟勝事著意幽尋為思宮錦之淋瀝忽對亭顔而解頤雲斤月斧重修畫棟珠簾露萊風枝依舊朱脣翠袖喚囘景象增賁名園植萬年棟宇之林出五鳳文章之手咽笙簧於繡帳不妨我去君獨留促環珮於蓬萊更囑花須連夜發式形儼語用舉修梁梁之東亭下花光晚漲紅但願花隂千里共家家錦幄貯春風梁之西萬緑千紅巧幛幃少綴胸中雲五色爛裁宮錦織天機梁之南翠袖朱脣酒半酣試向蓬萊高處望一邊花氣與天參梁之北勾引韶華歸花國只解花時醉錦幃不知此日東君力梁之上華屋亭亭圍錦帳袖中攜取五雲機歸去蓬瀛飾方丈梁之下冉冉飛雲凌棟畫但願他年助我儀遍訪遺基著高榭伏願上梁以後豐年多暇樂事并來相繼雲斤足四老當年之詠大開錦帳破一城和氣之春鼓鼙悉變於笙歌隴畝若安於亭榭仙人去後留落花流水之春太守謂誰記飲酒作亭之曰夢遊西嶽文明太祖猗西嶽之高也哉吾夢而往去山近將百里忽覩穿雲抵漢巖崖燦爛而五光正遙望間不知其所以俄而已昇峰頂畧少俯視見羣巒疊障拱䕶週迴蒼松森森遮巖映谷朱崖突兀而凌空其豺狼野鳥黄猿狡兔畧不見其蹤峭然潔淨蕩蕩乎巒峰吾將週遊嶽頂忽白鶴之來雙驀異香之繚繞管絃絲竹之聲雜然而來天意試仰觀見河漢之輝輝星辰巳布吾之左右少時一神跪言曰愼哉上帝咫尺既聽斯言方知西嶽之高柱天之勢如此於是乎誠惶誠恐稽首頓首再拜瞻天愈覺神殊氣爽體健身輕俄聞風生萬壑雷吼諸峰吾感天之造化必民獲年豐遂舉手加額豁然而夢覺於戲朝乃作思夜必多夢吾夢華山樂遊神境豈不異哉張子諸儒評本朝王心敬横渠先生氣質剛果學力堅苦前無所依旁無與輔超然入孔孟之門而見宗廟之美百官之富嗚呼卓矣至如西銘大㫖淵乎通古大人之學知禮成性粹乎會吾夫子之心大化雖未敢遽許而在吾道宗傳中𢎞毅二字自不愧焉呂與叔與叔呂先生清明沈潛在諸昆中尤為粹美而其折節好學舍已從人深潛之思湛定之性即程門亦推先覺焉向在孔門未知其與二冉如何要之亦漆雕諸賢之流亞與李二曲二曲李先生學無師傅年未弱冠獨從宋明諸儒中窮探宗傳故其所自得于心者體用兼該内外不遺盖于諸儒中獨為不立異同超然獨會者耳然于指示初學則恒從程門體認未發一訣教之入見性之門而必合語黙出處辭受取予一無或茍以為立身之實則先生既從生平之所自得者舉以語人亦折衷學術親切之路而使之確然不迷也故全集所言多出此㫖而至于揭悔過自新為功課盡性無欲為究竟以反身為讀書之要領以名節為衞道之藩籬則聖門宗傳益覺切近而明白矣况其清操峻節挺然以身樹名教之坊而屹為一代師法則尤所為行與教俱以身衞道者哉陜西通志卷九十四
