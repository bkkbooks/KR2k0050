如雍正七年之引至雍正八年六月内清查奏銷十月解部部議應如該御史所請著為定例奉㫖依議陜屬一體遵行雍正七年部頒引捌千㭍百道因河東舊例毎名揭存叄引為解安引以壹百壹拾㭍引而支壹百貳拾引之鹽今毎名添足叁引以符壹百貳拾引為一名之數陜屬一府七州照例増添雍正八年河東巡鹽御史碩色於請墾荒畦案内題稱河東行鹽定額其間有額銷不敷州縣詳請餘引以濟民食是有餘引必有餘鹽乃可經久行銷部議應如該鹽政所請將河東所開無商荒畦出産鹽斤於雍正八年為始在於添發餘引内搭配行銷辦課可也㫖依議陜屬一府七州照例行銷雍正八年題明邠州所屬長武縣照鳳課例改食小池鹽仍銷河東引増額引捌百肆道其原額陸百陸拾引輪坐加増令陜省能銷鹽州縣作餘引行銷雍正八年於遵㫖查議案内西安府所屬髙陵縣減額引壹千叄百壹拾捌道輪坐加増令陜省能銷鹽州縣作餘引行銷歴代鹽法秦鹽鐵之利二十倍於古漢書食貨志漢朔方郡朔方金連鹽澤青鹽澤皆在南沃野有鹽官上郡龜兹屬國都尉治有鹽官西河郡富昌有鹽官北地郡弋居有鹽官五原郡城宜中部都尉治原髙西部都尉治田辟有鹽官漢書地理志宣帝時蓮勺縣有鹽池縱橫十餘里其鄉人名為鹵中漢書宣帝本紀武帝徙貧民闗以西及充朔方以南新秦中七十餘萬口衣食皆仰給縣官於是縣官大空而富商大賈或蹛財役貧冶鑄煮鹽財或累萬金而不佐國家之急一大農上鹽鐵丞孔僅咸陽言山海天地之藏皆宜屬少府陛下不私以屬大農佐賦願募民自給費因官器作煮鹽官與牢盆浮食竒民欲擅管山海之貨以致富羡役利細民其沮事之議不可勝聽敢私鑄鐵器煮鹽者釱左趾没入其器物史記平凖書獻帝建安初關中百姓流入荆州者十餘萬家及聞本土安寜皆企望思歸而無以自業於是衛顗議為鹽者國之大寳自喪亂以來放散今宜如舊置使者監賣以其直益市犂牛百姓歸者以供給之勤耕積粟以豐殖闗中逺者聞之必多競還於是魏武遣謁者僕射監鹽官移司𨽻校尉居𢎞農流人果還關中豐實晉書食貨志魏嘉平四年關中饑宣帝表興京兆鹽池以益軍實晉書食貨志唐京兆府京兆郡富平有鹽池澤同州馮翊郡朝邑小池有鹽奉先有鹵池二大中二年其一生鹽華州華隂郡櫟陽有煮鹽澤鹽州五原郡土貢鹽夏州朔方郡朔方有鹽池二唐書地理志鹽池皆𨽻度支蒲州安邑解縣有池五總曰兩池歳得鹽萬斛以供京師鹽州五原有烏池白池瓦池細項池安北都䕶府有湖落池嵗得鹽萬四千斛以給振武天徳食貨志解鹽之行於陜西者栁宗元言西出秦隴崔敖言西距隴坂河東鹽法志順宗永貞元年十一月度支奏久雨車輦不通京師鹽貴請糶出貯庫鹽二萬石冊府元龜憲宗元和五年五月度支奏鄜坊邠寜諸軍將士等請同當處百姓例食烏白兩池鹽從之冊府元龜元和六年閏十二月户部侍郎判度支盧坦奏河中兩池顆鹽勅文只許於京畿鳳翔等州界内糴貨比來因循兼越興鳳等六州臣移牒勘責得山南西道觀察使報其果閬兩州鹽本土户人及巴南諸郡市糴又供當軍士馬尚有懸欠若兼數州自然闕絶又得興元府諸耆老狀申訴臣今商量河中鹽請放入六州界糴貨從之舊唐書食貨志文宗時奉天鹵池生水柏以灰一斛得鹽十二觔利倍鹻鹵因是盜采灰一斗比鹽一斤論罪唐書食貨志太和二年三月丁巳朔度支奏京兆府奉先縣鹵池側近阪泊池井有水柏柴燒作灰煎鹽等臣勘案先據兩池𣙜鹽使申長慶三年二月十五日於奉先縣界捉獲水柏柴灰四十石六斗二升數内取一石煎得鹽一十二斤一兩使司恐是盜刮鹻土妄稱是水柏柴灰重收採水柏柴三十斤燒得灰二斗二升煎得鹽二斤一十二兩縁從前未有明勅禁斷百姓故有抵犯伏以柏柴灰比曾煎試比𩔖鹻土煎鹽所収鹽分數較多其鹻土有勅條禁止其水柏柴灰亂法甚於鹻土不可因循臣今商量從今以後捉獲盜採水柏柴灰重一十二斤即計鹽一斤犯灰一斗即計鹽一斤四兩並凖兩池例八斤計折同犯刮鹻土煎鹽節級科罰所冀鹽法齊一𣙜課免虧從之冊府元龜僖宗光唘元年宦官田令孜請以二池領屬鹽鐵佐軍食河東節度使王重榮固争乃徙重榮兖海節度使重榮不奉詔令孜遣朱玫進討戰於沙苑敗績帝幸鳯翔鹽政彚纂宋秦鳳以東皆食解鹽至道中陜西食顆鹽者則京兆鳳翔府同華耀乾商邠寜儀渭鄜坊丹延秦隴鳳州保安軍安邑解池通商陜西顆末鹽皆以五斤為斗顆鹽之直每斤自四十四至三十四錢有三等凡通商州軍在陜西者為西鹽河東鹽法志太宗時鄭文寳建議以為銀夏之地千里不毛但以販青白鹽為命請禁之許商人販安邑解縣兩池鹽於陜西以濟民食官獲其利而戎益困乃詔自陜以西有敢私市者皆抵死募告者差定其罪行之數月犯者益衆闗隴民無鹽以食境上騷擾上知其事遣知制誥錢若水馳傳視之悉除其禁召諸族撫諭之乃定宋史鄭文寳傳真宗時陜西轉運使張象中言安邑縣兩池鹽見貯三億餘萬斤尚虞遺利請申條約帝曰過求羡餘當慮有時而闕不許隆平集咸平中度支使梁鼎言陜西沿邊解鹽請勿通商官自鬻之詔以鼎為陜西制置使又以内殿崇班杜承睿同制置陜西青白鹽事承睿言鄜延等州洎禁青鹽之後令商人入芻粟運解鹽於邊貨鬻其直與青鹽不至相懸是以民食賤鹽須至畏法而蕃部青鹽難售今聞運解鹽於邊欲與内地同價邊民必冒法圖利却入蕃界私販青鹽是助邊資而結民怨矣繼又有上疏言其不便者鼎請候至邊部幹運及乘傳至解池即禁土商販旋運鹽赴邊公私大有煩費而邊民頓無入市物論紛擾於是命判鹽鐵勾院林特知永興軍張永詳議以為公私非便請復舊商販詔切責鼎罷度支使又咸平以來聽商人輦鹽過河西麟府州濁輪砦貿易官為下其價予之宋史食貨志仁宗天聖四年五月復陜西永豐渠以通解鹽宋史仁宗本紀天聖八年上書者言陜西禁鹽得利㣲而為害博兩池積鹽為阜其上生木合抱數莫可校請聽通商平估以售可寛百姓之力乃詔罷三京二十八軍州𣙜法聽商賈入錢若金銀京師𣙜貨務受鹽兩池自是商賈流行文獻通考天聖以來兩池通商州軍並邊秦延保安募人入中芻粟以鹽償之陜西亦有鬻鹻為鹽者然其利薄明道初詔廢河中府鹻塲禁民鬻鹽以侵池鹽之利康定元年淮南提㸃刑獄郭維言川峽素不産銀而募人以銀易鹽又鹽酒塲主者以銀折歳課故販者趨京師及陜西市銀以歸而官得銀復輦至京師公私勞費請聽入銀京師𣙜貨務或陜西並邊州軍給劵受鹽於川峽詔行之既而入銀陜西者少議鹽百斤加二十斤予之並募入中鳳翔永興㑹西方用兵又召入芻粟並邊商賈利之西方既無事猶入中如故䕫州轉運使蔣賁以為入中十餘年虚費䕫鹽計直二十餘萬緡今陜西用池鹽之利軍儲有備請如初詔許之慶厯二年禁永興同華耀州軍商鹽官自輦運以衙前主之又禁商鹽私入蜀置折博務於永興鳳翔聽人入錢若蜀貨易鹽趨蜀中以售久之兵民輦運不勝其苦州郡騷然所得鹽利不足以佐縣官之急並邊務誘人入中芻粟皆為虚估大耗京師錢幣太常博士范祥闗中人也熟其利害常謂兩池之利甚博而不能少助邊計者公私侵漁之害也倘一變法歳可省度支緡錢數十百萬乃畫䇿以獻是時韓琦為樞宻副使與知制誥田况皆請用祥策四年詔祥馳傳與陜西都轉運使程戡議之而戡議與祥不合祥尋亦遭喪去八年祥復申其説乃以祥為陜西提㸃刑獄兼制置解鹽事使推行之其法舊禁鹽地一切通商聽鹽入蜀罷九州軍入中芻粟令入實錢償以鹽視入錢州軍逺近及所指東西南鹽第優其值東南鹽又聽入錢永興鳳翔授以要劵即池驗劵按數而出盡弛兵民輦運之役又以延慶保安地近烏白池奸人私以青白鹽入塞侵利亂法乃募人入中池鹽予劵優其估還以池鹽償之以所入鹽官自出鬻禁人私售峻青白鹽之禁行之數年黠商貪賈無所僥倖闗中之民得安其業公私便之皇祐元年侍御史知雜何郯復言改法非是明年遣三司户部副使包拯馳視還言行之便田况為三司使請久任祥俾専其事擢祥權陜西轉運使至和元年命轉運使李恭代之並邊復聽入芻粟以當實錢而虚估之弊滋長劵值亦從而賤嘉祐三年三司使張方平及包拯請復用祥於是復以祥總鹽事宋史食貨志陜西路顆鹽有定課歳為錢二百三十萬緡舊法官自搬運置務拘賣兵部員外郎范祥始為鈔法令商人就邊郡入錢四貫八百售一鈔至解池請鹽二百斤任其私賣得錢以實塞下省數十郡搬運之勞異日輦車牛驢以鹽役死者嵗以萬計冒禁抵罪者不可勝數至此始免行之既久鹽價時有低昻又於京師置都鹽院陜西轉運司自遣官主之使鹽價有常而鈔法有定數行之數十年至今以為利也夢溪筆談韓琦以陜西解鹽自改法以來議者多以為不便惟太常博士范祥所論最為精宻公請令祥與三司講經久之利朝廷遂遣三司副使魚周詢同祥至陜西相度利害周詢還具言祥法可行三司亦請如祥議轉運司言恐失范宗傑前所得之課公言宗傑前法官自鬻而吏苦輦載之役於邊儲無補祥之新法使商旅入緡於沿邊而得鹽沿邊芻糧以見錢而糴不勞民而其利溥願必行之時議者雖未一而其後卒用祥法韓忠獻家傳殿中侍御史趙祐嘗鞫獄陜西既畢以其道所見利疚聞凡切於事者六其五陜西𣙜鹽較通商時民不為便祐言始改法盡收客鹽官貿之已盡則必配民輦致或衙前督運多破産又户無髙下給食厯貧食圭撮官不圭撮貿為病請通商如舊其六陜西令户運糧至延州保安軍又不許飛脚齎貨就糴其地祐言陜虢以西米斗錢五百五六百此但輸直以五六榖價臣聞沿邊入粟甚耗中都錢今解鹽以席計猶四百萬請入粟皆償鹽且稍潤之則逺民紓中都實事多施行雞肋集元昊聚兵西鄙並邊入中芻粟者寡縣官急於兵食調發不足因聽入中芻粟予劵趨京師𣙜貨務受錢若金銀入中他貨予以池鹽由是羽毛筋角膠漆鐵炭瓦木之𩔖一切以鹽易之猾商貪吏表裏為奸至入椽木二估錢干給鹽一大席為鹽二百二十斤虚費池鹽不可勝計鹽直益賤販者不行公私無費青白鹽出烏白兩池西羌擅其利自李繼遷判禁毋入塞未幾罷已而復禁乾興初嘗詔河東邊人犯青白鹽禁者如陜西法慶厯中元昊納欵嵗請入十萬石售縣官仁宗以其亂法不許自范祥議禁八州軍商鹽重青白鹽禁而官鹽估貴土人及蕃部犯青白鹽者益衆往往犯法抵死而莫肯止至和中詔蕃部販青白鹽抵死者止投海島羣黨為民害者上請嘉祐赦書稍遷配徙者於近地自是禁法稍寛食貨志包拯言臣奉勅徃差陜西與轉運司并范祥面議鹽法利害縁臣前任本路轉運使備知前來鹽法自慶厯二年因范宗傑擘畫禁𣙜之後差役兵士車牛及逐州衙前等搬運鹽席往諸州官自置塲出賣以致兵士逃亡死損公人破蕩家業比比皆是所不忍聞其衙前估計家業每直一貫者即管認搬鹽兩席雖家業已竭而鹽數未足嗟怨之聲盈於道路前後臣僚累言不便乞復舊法通商以救闗中凋敝有司執議終不施行昨因范祥再有唘請兼葉清臣曾知永興軍見其為患之甚因乞依范祥擘畫用通商舊法令客人於沿邊入納見錢收糴軍糧免虚擡貴價入中斛斗於𣙜貨務大支官錢兼寛得諸般差役勞擾此乃於國有利於民無害理甚灼然乞朝廷詳酌指揮又言臣近奉勅差往陜西相度鹽法自入陜西界沿路訪聞民間恐朝廷改法頗甚憂畏葢以前來禁𣙜之後差役人力搬運鹽席不堪其苦臣因諭以朝辭日面奉徳音所議鹽法只要便人况聖上䘏念闗中生靈必不忍重困人力羣情無不感悦臣今與本路轉運及制置解鹽司同議且乞依新法施行兼為客人疑惑未肯入中已牒逐司告示訖其有未便事件雖有減損即不虧官委是公私利便陜西自有解鹽之利若盡以付與令計置糧草一二年後可全减𣙜貨務毎歳見錢銀絹等五千七百萬貫包孝肅奏議皇祐二年復入錢京師法視舊錢數稍増予鹽而并邊入中先得劵受鹽者河東陜西入芻粟直錢十萬止給鹽直七萬皇祐中權罷西監鬻鹽時議者請募商人入芻粟麟府州火山軍予劵償以鹽從之食貨志神宗熙寜初總鹽事范祥卒以轉運副使薛向繼之詔淮南轉運使張靖究陜西鹽馬得失靖指向欺隠狀王安石右向靖竟得罪擢向為江淮等路發運使諫官范純仁言賞罰失當因數向五罪向任如初乃請即永興軍置賣鹽塲又以邊費錢十萬緡儲永興軍為鹽鈔本繼又増二十萬宋史食貨志熙寜中以永興鳳翔等二十五州為陜西入納糧草交引地分河東鹽法志熙寧七年中書議陜西鹽鈔多出虚鈔而鹽益輕以鈔折兑糧草有虛抬邊糴之患請用交子法使其數與見錢相當可濟緩急詔以皮公弼熊本宋廸分領其事趙瞻制置又以内藏錢二百萬緡假三司遣市易吏行四路請買鹽引仍令秦鳳永興鹽鈔嵗以百八十萬為額熙寧八年大理寺丞張景温提舉解鹽皆官自賣未幾復用商人議以商金通商同華令提舉解鹽司運鹽貨鬻鹽價既増民不肯買乃課民買官鹽於是民間騷怨召陜西轉運司皮公弼入議公弼極言官賣不便於是同華陜府聽通商其入不及官賣者官復自賣元豐元年三司户部副使陳安石為河東都轉運使安石請犯西北青白鹽者以皇祐敕論罪首從皆編配又青白入河東犯者罪至流所歴官司不察者罪之食貨志哲宗元祐元年户部及陜西制置解鹽司議延原保安等八州軍皆禁𣙜官自鬻以萬五千五百席為額聽商旅入納於八州軍折博務算給交引一如范祥舊法其出賣鹽錢以給鹽運司糴買從之文獻通考陜西民多以朴硝私煉成顆謂之倒硝頗與解鹽相亂紹聖三年制置使孫路以聞詔犯者減私鹽法一等坐之元符元年永興軍櫟陽涇縣同華等州軍官仍自賣鹽而禁官司於折博務買解鹽販易規利俄以水壞解池聽同華等州私土鹽鬻於本路宋史食貨志徽宗崇寜元年蔡京議更鹽法陜西鹽鈔毋得下五千五百私減者坐徒徙之罪蔡京建言末鹽施行未久收息及二百萬緡如通至陜西其利必倍議遣韓敦立等分路提舉崇寜二年利洋興漢興元府等州並通行東北鹽鹽鈔法之行積鹽於解池積錢於京師𣙜貨務積鈔於陜西沿邊諸郡商賈以物斛至邊入中請鈔以歸物斛至邊有數倍之息惟患無回貨故極利於得鈔徑請鹽於解池而解鹽通行地甚寛或請錢於京師毎鈔六千二百登時給與但輸頭子等錢數十而已崇寜間蔡京始變法俾商人先輸錢請鈔赴産鹽郡授鹽鈔法遂廢商賈不通邊儲失備崇寜四年詔陜西舊鈔易東南末鹽毎百緡用見錢三分舊鈔七分宋史食貨志孝宗淳熙十一年以京西轉運副使江溥言金州帥司置塲拘賣商鹽髙價科賣致商旅坐困民食貴鹽詔金州依法聽商人從便買賣不得置塲拘摧宋史食貨志光宗紹熙時楊輔為總計請罷利州西路興州鹽店宋史食貨志金主亮貞元初蔡松年為户部尚書始復鈔引法鈔合鹽司簿之符引㑹司縣批繳之數七年一釐革之解鹽觔二百有五十為一席席五為套鈔引則與陜西路轉運司同鬻其輸粟於陜西軍營者許以公牒易鈔引河東鹽法志世宗大定二十五年令解鹽行陜西續文獻通考章宗泰和元年十一月陜西路轉運使髙汝礪言舊制捕告私鹽者計斤給賞錢皆徴於犯人然監官獲之則充正課巡捕官則不賞巡捕軍則減常人之半免役弓手又半之是罪同而賞異也乞以司縣巡捕官不賞之數及巡捕弓手所減者皆徴以入官則罪賞均矣詔從之金史食貨志宣宗貞祐四年七月烏庫哩慶夀言鹽乃官物有司陸運至河復以舟逹京兆鳳翔以與商人貿易而陜西行部毎石復邀糴二斗是官物而自糴也乞彼此一聽民便則公私皆濟上從之興定二年盧進建言綏德之嗣武城義合克戎寨近河地多産鹽請設鹽塲管勾一員歳獲十三萬餘斤可輸錢二萬貫以佐軍三年詔用其言設官鬻鹽給邊金史食貨志興定三年三月詔運解鹽入陜西以濟調度命胥鼎兼領其事金史宣宗本紀興定三年四月罷募民運解鹽入陜西續文獻通考興定四年李復亨言以河中西岸解鹽舊所易粟麥萬七千石充關東之用尋命解鹽不得通陜西以北方有警河禁方急也金史食貨志元世祖中統二年初立陜西轉運司仍置解鹽司於路村元史食貨志中統四年以解鹽引一萬五千道和中陜西軍儲續文獻通考至元三年諭陜西以所辦鹽課赴行制國用使司輸納鹽引令制國用使司給降四年立陜西轉運司元史食貨志至元十七年十一月丁卯詔陜西諸塲増撥竈户丗祖本紀至元二十三年改立陜西都轉運司兼辦鹽酒醋竹等課至元二十九年減大都鹽課一萬引入京兆鹽司添辦是年五月又革京兆鹽司一止存鹽運司食貨志成宗元貞元年陜西行省増羡鹽鈔一萬二千五百餘錠大徳元年免陜西鹽户差税續文獻通考大徳二年六月壬戌申嚴陜西運司私鹽之禁元史成宗本紀仁宗皇慶四年解州鹽池為水所壞命懷孟等處食陜西紅鹽後以地逺改食滄鹽而仍輸課陜西民不堪命免之續文獻通考延祐三年以池為雨所壞陜西之民改食常仁紅鹽五年免今嵗陜西鹽課延祐六年改陜西運司為河東解鹽等處都轉運鹽使司直𨽻中書省十月罷陜西行省所委巡鹽官六十八貟添設通判一貟别鑄分司印二元史食貨志順帝至元二年九月御史臺准陜西行臺咨備監察御史特穆爾布哈建言近䝉委巡歴奉元東道至元元年各州縣户口額辦鹽課其陜西運司官不思轉運之方毎年預期差人分道賫引遍散州縣甫及旬月杖限追鈔不問民之無有竊照運司之例皆運官召商發賣惟陜西等處鹽司近年散於民户且如陜西行省食鹽之户該辦課二十萬三千一百六十四錠有餘於内鞏昌延安等處認定課鈔一萬六千二百七十一錠慶陽環州鳳翔興化等處嵗辦課一萬七千九百八十五錠其餘課鈔先因闗陜旱饑民多流亡准中書省咨至順三年鹽課十分為率減免四分於今三載尚有虧負葢因户口凋殘十亡八九縱或有復業者家産已空邇來歳頗豐收而物價甚賤得鈔為艱本司官皆勒有司徴辦無分髙下一概給散少者不下二三引毎一引收價三錠富家無以應辦貧民安能措畫糶終歳之糧不酬一引之價緩則輸息而借貸急則典鬻妻子縱引目到手力窘不能裝運止從各處鹽商勒價收買舊債未償新引又至民力有限官賦無窮又寜夏所産韋紅鹽池不辦課程除鞏昌等處循例認納乾課從便食用外其池隣接陜西環州百餘里紅鹽味甘而價賤解鹽味苦而價貴百姓私相販易不可禁約以此參詳河東鹽池除撈鹽户口食鹽外辦課引數今復宜從運官設法募商興販但遇行鹽之處諸人毋得侵擾韋紅鹽法運司毎歳分輪官吏監視聽民採取立法抽分依例發賣毎引收價鈔三錠自黃河以西從民食用通辦運司元額課鈔因時夾帶至黃河東南者同私鹽法罪之陜西興販解鹽者不禁如此庶望官民兩便而課亦無虧矣又據陜西漢中道肅政亷訪使胡通奉所陳云陜西百姓許食解鹽近流移漸復正宜安輯而鹽吏不察民瘼止以恢辦為名不論貧富散引收課或納錢入官動經嵗月猶未得鹽葢因地逺脚力艱澁今後若令大河以東之民分定課程買食解鹽其以西之民計口攤課任食韋紅之鹽則官不被擾民無蕩産之禍矣且解鹽結之於風韋紅之鹽産之於地東鹽味苦西鹽味甘又豈肯舍美而就惡乎使陜西百姓一槩均攤解鹽之課令食韋紅之鹽則鹽吏免巡禁之勞而民亦受惠矣本臺詳所言鹽事冝從省部定擬具呈中書省送户部議之本部議云陜西行臺所言鹽事宜從都省選官前赴陜西與行省行臺及河東運司官一同講究是否便益明白咨呈三年都省移咨陜西行省仍􅎥委河東運司正官一員赴省一同再行講究三月初二日陜西行省官及李御史運司同知郝中順㑹鞏昌延安興元奉元鳳翔邠州等官與總帥汪通議等俱稱當從御史特穆爾布哈及亷使胡通奉所言限以黃河為界令陜西之民從便食用韋紅二鹽解鹽依舊西行紅鹽不許東渡其咸寜長安録事司三處未散者依已散州縣一體斟酌認納乾課與運司已散食鹽引價同見納乾課辦鈔七萬錠通行按季輸納運司不須散引則民不受害而課亦無虧郝同知獨言運司毎嵗辦課四十五萬錠陜西該辦二十萬錠今止認七萬錠餘十三萬錠從何處恢辦議不合而散本省檢照運司逐年申報文冊陜西止辦七萬三千六十餘錠郝遂稱疾不出其後訖無定論户部叅照至順二年中書省嘗遣兵部郎中井朝散與陜西行省官一同講究以涇州白家河永為定界聽民食用仍督所在軍民官嚴行禁約毋致韋紅二鹽犯禁侵課中書如所擬行之元史食貨志明太祖洪武間河東行鹽地方屬陜西者西安漢中延安鳳翔四府鹽政彚纂靈州花馬池二池之鹽自來不費人力煎熬下秋晴暖水面皚皚如雲如霜隨取隨足何孟春鹽法疏英宗正統三年奏准召商納馬中鹽支給不敷者河東陜西運司於廣東海北鹽運司兑支世法録代宗景泰三年奏准陜西運司鹽課提舉司年終𩔖解但開客商某於某年月日支出官鹽若干發賣某行鹽地方及某月日繳到及已繳若干未繳若干其有沉匿在庫通同庫役人等轉賣影射私鹽者照私鹽榜例問罪續文獻通考憲宗成化九年差御史一貟巡視河東運司并陜西靈州大小二池鹽課其陜西所屬闗内關南關西河西等道各分巡官帶管鹽法者悉聽節制鹽政彚纂成化十七年奏准西安府人民不許興販靈州鹽課世法録成化二十一年閏四月以山陜饑甚廣開納中鹽例明㑹典武宗正徳間因延綏邊費不貲户部議將河東鹽引増作五錢鹽政彚纂正徳八年令陜西巡撫等官今後不許指以户鹽名目不候本部奏有明文輙便開中如違聽本部并巡鹽御史奏治續文獻通考世宗嘉靖四年令陜西各府州縣衛所将河東行鹽地方翻刋大字告示張掛曉諭但遇客商將官鹽越境貨賣及奸人興販本地自煎私鹽查照律例從重問發明會典嘉靖八年議准大池増三萬三千六百二十六引毎引二錢五分卧引銀一錢鹽政彚纂嘉靖九年令延綏西路及寧夏管糧僉事分管靈州大小二池明㑹典嘉靖十三年二月户部題該户科都給事中管懷理等題為議處邊儲事臣等竊惟國初設立鹽法専為邊儲故使之入粟歸邊下塲支鹽官無科取商獲重利不費轉輸而邊倉積實謂之飛輓今則開中不時米價湧貴而易糴之難勢豪大家賣窩買窩而報中之難官司科罰吏胥浸漁而輸納之難定價太髙反過本直而取利之難及至給引下塲又被官吏留難棍徒轄害挨單守支動以數年而支掣之難至於行鹽地方私鹽盛行民皆買賤官鹽又復壅滯而發賣之難有此六難故商人有傾家蕩産妻子不相見者矣商人離親戚棄墳墓備資本出於千里之外非以重義也惟以計生息之利以資身家耳今求利未得而害反隨之欲望正課之行豈可得乎正課不行私鹽自盛議者不得已而權為區處乃設餘鹽之例如兩淮報中正鹽一引許帶餘鹽二引正鹽在邊納粟餘鹽在塲納價故商人猶肯一二報中甘受正鹽之害以趨餘鹽之利殊不知餘鹽一行雖每歳易銀百數十萬兩而無益邊儲則猶徒也鹽法何自而行乎臣等以為今欲通鹽法須先處餘鹽必多減正價大抵正鹽賤則私販自息私販息則正鹽自行此不易之定論也今雖不可知而祖宗時八分二斗之制宜斟酌開中毎正鹽一引定價五錢或四錢餘鹽一引定價二錢五分或二錢俱令在邊照時上納粟米料豆草束毎年差給事中或御史一貟赴邊趂時開中禁革一應買窩占中等弊正鹽給與引目餘鹽給與小票正鹽下塲支給餘鹽徑自收買正鹽一引許中餘鹽三四引或五六引務以盡收竈丁餘鹽為止若或未盡再添一二倍亦無不可如此正鹽價輕既有以利乎商人餘鹽盡收又有以利乎貧竈國課不集而自足私鹽不禁而自止邊儲日見富厚糧餉日見充積可不動内帑而用無不裕矣圖書編屯鹽議嘉靖三十四年奏准陜西行鹽地方毎鹽二百斤為一引毎引收銀四錢五分一切掛號截角支放其收貯銀兩於年終解送花馬池管糧衙門交收専備防秋兵馬支用明㑹典嘉靖三十五年題准將二池鹽毎引定價四錢鹽八石額課新増三七掣支餘鹽銀二錢五分收納鹽政彚纂穆宗隆慶元年題准將大小二池納價餘鹽等銀聽延寜二鎮客兵支用明㑹典隆慶二年山西巡撫趙睿條奏河東課少利㣲宜定議陜西延鳳所屬法禁久弛退引多繳者比照折直會選富民為積鹽舗户聽其承買轉販所至地方官仍查覆引目户部覆奏從之河東鹽法志隆慶四年議准河東運司延安府地方改食池鹽邠隴汧永麟逰五處仍食解鹽世法録漢中延安二府改食池鹽河東鹽法志西延鳳漢明初均食解鹽因宋至道之舊制隆慶四年延安始改食靈鹽嗣雖漢中改食大池而關南西夏相隔雲棧粒鹽未往空包課累明末鳳翔亦改小池定例仍銷河東之額引隆慶五年題准花馬大小二池鹽毎引照鹽八石四倍河東令各商報納毎引増銀一錢二分共五錢二分其卧引銀一錢二分西路斗底銀一錢五分共増課銀七千有竒鹽政彚纂神宗萬厯五年題准將定邊道庫貯鹽大池者解延綏其新増延安府課銀三千二百二十一兩原議解河東運司就近改解延綏即將該鎮應發主兵銀扣補宣府抵河東額課萬厯六年嵗辦陜西鎮鹽課銀七萬一千四百六十四兩明會典國初召商中鹽量納糧料實邊不煩轉輸而食自足謂之飛輓後因積納數多價直亦賤興利之臣遂改議上納折色行之既久習以為常彼時改折糧料有餘而價亦賤計以所入為贏利未為不可近來糧料不足而價亦騰貴徒煩轉糴邊用索矣大率鹽一引納銀五錢先時可糴米一石今多不過三四斗或二三斗故商人所納數倍於前而國初之所資以餉軍者實無所増於舊彼此虧費其弊益滋是故多得銀不如少得米省和糴之擾也杜浸尅之弊也慰待哺之望也漸墾邊地以致殷富也一舉四善具焉説者又謂間曽開納本色召商不至葢向者上納本色時商自募民耕種塞下而得榖為易又塞下之積甚多而價輕又無戎虜之患今則耕種廢矣塞下之積虚矣榖價騰湧强虜出没勢不安居商人安得糧料應召募乎欲復本色非減斗頭利商人使商人趨利而開墾邊地不可也然必遲之四五年而後得其利河東之鹽惟在天時非苦雨水深而鹽不結則池涸水乾而鹽不生是産鹽之利不易也鹽不易生而課銀不減是以商與竈丁俱困而國與民俱病也且河東之鹽多苦不可食轉之於秦官派之而定其價民出其直而鹽歸於無用是行鹽之地固病之者也嘗按花馬池一帶皆有産鹽之地此鹽出之於土即為鹽根自成為鹽是不必須之於天時者也為今之計莫如改河東之鹽於花馬池一路即移河東西分司居之將河東發陜西鹽引二十二萬有餘約銀之萬餘兩免其徴派即令商人照河東價銀三錢二分糴買糧草施之平延諸郡以供三邊之費扣其銀兩數目即以太倉發陜西年例銀徭發山西以補陜西原派鹽課之數如此不更便乎事雖更張實無紛亂於國計民生所為禆益者葢不淺矣况此鹽一開則延平之際商賈輻輳齊民貿易雖㐫荒猝至可以不患也國家之設六邊其初雖仰給鄰省之常賦然鹽法所補不少今鹽法任其大壞極弊而莫之省憂其又何説哉頃嵗以來所司以商人困敝不得利改議毎鹽一引止令輸粟一斛若銀則四錢有半此誠通商惠工之術安邊足用之道其何不善之有奈何法立姦生利不歸商賈之家而顧以充豪猾之槖聞之邊人言毎嵗户部開納年例其文書未至則内外權豪之家徧持書札預托撫臣撫臣畏勢而莫之敢逆其勢重者與數千引次者亦一二千引其餘多寡各視其勢之大小而為之差次名為買窩賣窩每占鹽一引則可不出大同之門坐収六錢之息至於躬身轉販真正商人茍非買諸權豪之家丁丐諸貴倖之僕𨽻則一引半緡曽不得而自有夫一引白得銀六錢積而千引則可坐致六百金萬引則可得六千金以㳺手游俠之人不移跬歩而坐致千金之利至於商賈負販勞筋苦骨乃為人奴役其支鹽也則有伺候需索之苦至其行鹽貿易也又率為餘鹽之賈所苦人情何樂於此而為之乎此邊人耳目所共聞見所以失人心而召禍變虧國計而積耗蠧皆由此道也嘗細求其故其弊之所以不可反者葢縁比年巡撫都御史習知其地與時不可久處則日夜圖維遷轉既不免曲意以奉人加以時有喪敗踣躓之失又毎務彌縫而懼人之議其後故以重利㗖人至於負累商人虧損國計非惟不知恤而亦不暇恤雖其撫治仕宦之家與其舉人監生生員之室無不人人得與歡心甚至以之賞伶人犒樂工而亦莫之恤焉豈不可為痛恨也伏望勅下該部查議將前開納事冝改屬巡按御史務令召募正商上納而増其課額即毎引可得米九斗如令納銀亦不失一兩之入著令沿邉之人無問車芻石粟皆得詣吏上納則彼號稱商人者既無勢豪之占據既已樂從而彼所謂勢豪者知其無利亦自將舍置而不願如此而商不輻輳財不饒裕請伏誣妄之戮若御史仍前所云不能為國家增課祛弊以濟時艱許吏部都察院及兩京科道叅奏糾劾重承法典其於邊計雖未必遽充當亦稍有補助要之屯田鹽法政實相成鹽法通故佃田益力屯田舉故商賈可依望即令屯田官痛革窩奸廣募正商稍益常課詣吏上納者即備客兵行糧勿歸户部添置農官而兩法兼舉職不勝願望但増改鹽課於前須盡減餘鹽於後自先年御史秦鉞巡鹽兩淮謬増餘鹽希圖恩賞商人大失其資今雖裁減尚或未盡乞議盡減以便客商通鹽法圖書編萬厯四十一年鳳翔府改食花馬小池河東鹽法志馬湖峪之鍋鹽原為明會典所無葢縁起於萬厯四十三年其先本屯地也在延安府米脂縣境磽鹻難耕屯丁刮土淋煎行賣綏榆等處辦糧外願備廩生銀三百餘兩以厚斯文又每鹽一石請票照行納税六分抵補花馬大池缺課崇禎二年直指李應期察造事蹟榆林監司始議按鍋計鹽定票定税歸入奏銷迄今乃有歳額云鹽政彚纂愍帝時寜夏延綏二鎮鹽引積滯者多率置之無用之地宜撥寜夏一萬引延綏五千引加派遼東用充兵馬支費遼東撫臣張學顔奏呉甡疏臣奉命巡方鳳翔府推官錢國用為臣條析漢鳳運鹽之累徴調煩興毎歳正供外有加派遼餉銀有新増遼餉銀有空賠解池鹽課銀自瑞藩分封漢中又有加派贍田銀加派瑞鹽折色銀運鹽脚價銀秦民窮窘至極而復有運鹽一役情若倒懸安可不急為寛解者查得瑞藩每年食解鹽除折色一千引外本色三百引又外加走滷鹽四十引每引六百六十斤共計二十二萬四千四百斤每一百斤為一包共計二千二百四十四包又續發火食鹽每年三十九引每引重二百斤共計七千八百斤每一百斤為一包共計七十八包照河東折色事例每包僅值銀一兩二錢通計值銀二千七百八十六兩四錢以上本色并走滷火食三項除公派僱船僱夫僱騾等項銀一千五百四十兩四錢二分外又有沿途損壞摃架䕶席補賠銀有路費銀有買免員役鞭朴銀有雨濕消折補賠銀有領鹽交鹽官差催督使費銀有朋幇夫役工食騾頭草料銀自晉至漢總計運鹽一包約外費銀十數兩通共約外費二萬三千餘金又有里長什甲因攀報牛車騾夫鬬毆告狀官府追呼終嵗不斷通計運鹽外費較鹽價不翅倍蓰什伯且自寶雞而南路經雲棧山髙石險路窄硤曲懸崖絶壁危橋潺水跋渉艱難去歳霪雨連綿水溢堤斷運鹽至此無論車騾勢不能通即空人徒行猶且難之况負背鹽包越嶺攀磴而走辛苦萬千言念及此令人憫惻雖然使瑞藩而必須解鹽也即歴諸艱而致之亦分所當然臣何敢妄陳惟是漢中接壤川蜀而望蒲解在千七百里之外晉鹽味苦價貴而路逺川鹽味甘價亷而路近案查甘肅撫臣白貽清為關南道時曾以改本為折易買川鹽奏唘奉令㫖贍鹽一節便於本不便於折為食用計也今據貴道唘稱恐推輓轉運之間為奸賊竄伏之地萬一詐冒夫役變生不測如近日秦晉陷城墮堡等事亦是計安地方至慮本藩宜共封疆寜不惻惻動懷但本色三百四十引業奉欽依何敢擅折須與撫按商酌題請明㫖方可遵行至於易買之説查得漢人雖納晉課實食川鹽本藩仍效漢人暗買則虧體明買則違禁不買則坐困事𩔖觸藩迹同掩耳地方官果能有兩便之圖本藩何難為轉圜之聽敬此敬遵案行本府覆議日久今經道府呈請鑿鑿言之然不如令㫖所稱奸賊竄伏變生不測又暗買傷體明買違禁不買坐困之語尤為懇切臣竊籌之若不開買鹽之路何以塞運鹽之途欲食川鹽未奉聖㫖則為私鹽而違功令然川路逺近平險臣未悉知因再四訪求有謂四川保寜府為頓鹽之所射洪蓬溪等縣産鹽最多查各縣産鹽地方陸路運至保寜府逺者不過三四百里近者二三百里自保寜府上船十日可至陽平關乃寜羌州所轄繇陸路二日可到沔縣再一日到漢中即由陸路運至漢中共計一十五站通算七百四十里各商販賣川鹽俱由水路查晉鹽至漢中水陸共計一千七百里以川晉相較則晉逺九百餘里且皆山險棧道此逺近平險之異算也又有謂易食川鹽自保寜載至陽平船價之省於脚價者十數倍又從陽平僱夫抵沔縣仍用舟載不一日至漢中矣相時而行兩月即可竣事則改折解鹽易買川鹽之説斷斷其可行矣合無仰祈將瑞藩本色鹽三百四十引并火食三十九引俱自崇禎五年為始照前引折色事例各按年起解瑞府量食用多寡聽其給票委官易買川鹽不復累民公私兩便倘謂漢中係祖制河東行鹽之地恐地方刁棍借名私販則請特頒明旨止許瑞府改運川鹽嚴禁輯鹽官兵不許奸徒借此混行私販而民間供晉課食解鹽如舊可也又疏言臣奉命巡方久痛心於鳳翔派納鹽課之苦臣查鹽法之壞自萬厯四十一年鳳守張柟之以意増減始柟解人也因解商折閲累不願赴而議召靈商遂改食靈鹽然雖食靈鹽仍納解課久之靈商又以折閲累不願赴而議召鳳商夫鳳無商也僉富户充之故有每解引一道支靈鹽三石之議謂不如是則鳳人不赴也府道與鳳民有成議矣及申報鹽臣鹽臣持舊額上請駁減二石仍令照解鹽每引一石例而鳳商之以折閲累也更甚有司束於功令勢不得不議僉派議私幇甚有傾貲納課不願領引到池僦脚即行私鬻者有運至府屬價踊售艱引遲獲譴者有户丁逃亡飛灑包賠者查自鳳至靈千二百里羊腸峻坂車馬難馳而脚價盤費守候支鹽與夫驗引盤鹽催諸收課解課壩夫工食等項總計不下三兩毎引正課三錢三分三釐較之平凉慶陽兩府距靈池道近且平毎引價止一錢一分又就近納寜鎮充各軍月餉無解納逺渉之費以視鳳翔何啻徑庭同是秦民胡為一體之中徧有集菀集枯之嘆耶母怪乎二萬之逋課終不可得而問也且累日久則課日逋受病又不獨在臣矣臣洞悉其苦厯查舊案自萬厯四十二年至今當事者日議加増二石而未得一當也臣正欲為一方請命頃見鹽臣王與引疏請毎引加鹽一石另給一票驗行部覆奉旨鹽斤以意増減引票粘行殊非成法且前時駁減至三分之二必有定議何又僉派病民紛更無已還遵前旨查酌明確具奏欽此臣莊誦之仰見聖明洞灼民隠惟恐其病之也夫鳳民食解鹽解商納解課與平慶每引一錢一分領鹽一石此祖制也成法也自張柟令鳳屬改食靈鹽代納解課是紛更也至駁減三分之二是眉睫茍且之見原無定議所以虧國病商逋課病國僉派病民二十年來紛更之無已也今即不能倣祖制令解商辦課以釋鳳民之苦獨不能倣平慶成例每引一錢一分支鹽一石鳳屬每引三錢三分二釐加鹽二石以為經久可行之道乎不然昔減二石今止増一石正明㫖所謂以意増減也何可著為令甲如謂引票並行未免混淆今若照平慶事例加鹽二石合無於頒發鳳屬解引之内每引明註三石觔數似亦直截可行之法也伏乞垂念鳳民二十餘年之苦累俯順輿情勅下該部覆議上請允將鳳屬毎解引一道准支靈鹽三石自崇禎五年為始將領發鳳屬解引明註三石責令有司召集鳳商辦課不許僉派里甲永為成法以杜紛更或謂鹽多流販西安則在道府州縣嚴行禁輯如有故違聽撫按叅處如是則裕國安民計無便於此矣柴庵奏議延綏巡撫凃宗濬言邊鹽壅滯餉匱可慮疏云延鎮兵馬雲屯惟賴召買鹽引接濟軍需嵗有常額往時召集山西商人承認淮浙二鹽輸糧於各堡倉給引前去江南投司領鹽發賣鹽法疏通邊商獲利二百年來未聞壅滯及至於今商人苦稱邊鹽不通引積無用其情甚苦其詞甚哀細詢其故葢縁江南鹽官失政恣肆漁獵弊竇多端如邊鹽每引每包重止五百五十斤例也而彼鹽每引每包重至二千五百斤人情孰不欲利誰肯舍多而就少乎是彼得利四倍而邊鹽利少無人承買其困一也邊鹽堆積三四年發賣亦例也而彼鹽朝中暮鬻無容堆積人孰不急於趨利孰肯舍速而就緩乎是彼獲利捷徑而邊鹽遲滯無人承買其困二也鹽誌開載商鹽必挨單順序候鹽院委官盤掣而後發賣彼鹽不登單目任意中發既免守候之艱又無掣盤之費人皆樂趨所以邊鹽壅滯引不得售其困三也且彼鹽發賣執有小票聨艚販運江浙吳楚之間何處不到夫行鹽之地有方食鹽之人有限彼之餘鹽既已盛行雖有邊鹽尋無買主其困四也先年鹽法通行或邊商安於故土不樂逺渉則有南商來邊收買鹽引引亦無壅今小票便而得利廣孰肯馳驅數千里遐荒之路而貿引乎近年以來塞上無南商之跡矣邊商廹於官刑納粟中引無人承買齎之江南株守累月盤纒罄盡雖減價而不得售其困五也邊方淮鹽毎引官價五錢并在彼加納餘價共七錢五分今江南價銀止得四錢四分是虧折本銀三錢一分邊方浙鹽每引官價銀三錢五分今江南價銀止得一錢六分是虧折本銀一錢九分然皆强而後售共計淮浙二十二萬六千餘引虧短價銀五萬七千餘兩四五年間不能周轉及至還鄉債主逼索變産賠償其困六也如此六蠧率由私鹽遍行小票通而官引滯所以山西之商忿折貲本盡歸原籍土著之商力窮難支逃亡過半止餘見在數家號呼告退新鹽引目節行催𣲖并無一人承認三路鹽糧所藉以佐軍儲者盡化烏有司餉者日夜皇皇束手無策邊事至此深可寒心夫三軍之為國家効力者恃有此月餉耳月餉之所以充足者恃有此鹽商耳今南方鹽法阻滯商鹽不行鹽引不售鹽商不願赴邊納糧中引則軍餉無所復出三軍枵腹荷戈何以責之竭力以禦意外之虞哉伏乞勅下户部從長酌議務使鹽法疏通邊餉充足無狃目前之近永貽社稷之安熟數利害覆請施行延綏鎮志錢法國朝大清會典順治元年置寳泉局鑄順治通寳錢每文重一錢令陜西省延綏鎮開爐鼔鑄令布政司總理就近道㕔官分管順治二年總督孟喬芳題請西安原有錢法同知一貟司鑄局宜令開鑄資軍需鑄錢每文重一錢二分毎十文准銀一分舊錢毎十四文准銀一分順治三年令延綏鎮鼓鑄五年停止延鎮局順治十年題准鑄造制錢背鑄一釐兩字户部添一户字陜西添陜字户部則例康熙八年户部題為請㫖以定各省錢爐事查各省鎮爐座先因錢賤臣部於康熙元年具題奉㫖停止於康熙六年浙督趙廷臣條議内稱各省爐座仍令照舊鼓鑄以補國用臣部議覆照該督所請各省爐座俱照順治十七年例仍頒發様錢選擇爐役如式鼔鑄奉㫖通行在案今查陜西等省俱已開鑄惟廣東等省原未開爐相應請勅各該督撫開爐於民有益無益應開若干座詳查妥議康熙九年四月户部侍郎嚴正矩疏稱鼔鑄爐座已經臣部具題將陜西等處㨿該撫疏稱停止應准停止大清會典康熙十九年差官往陜西臨潼等處開採銀礦康熙二十二年停陜西等處開採歴代錢法附考周太公為周立九府圜法黃金方寸而重一斤錢圜函方輕重以銖漢書食貨志秦惠文王立二年初行錢史記秦紀贊秦秦中一國之幣為三等黃金以鎰名為上幣銅錢識曰半兩重如其文為下幣史記平凖書漢興為秦錢重難用更令民鑄錢史記平凖書漢書食貨志曰鑄莢錢索隠曰顧氏案古今注云秦錢半兩徑寸二分重十二銖莢錢重三銖錢譜云文為漢興平凖書注漢中郡沔陽有鐵官漢書地理志孝文時莢錢益多輕更鑄四銖錢其文為半兩令民縱得自鑄錢漢興七十餘年府庫餘貨財京師之錢累巨萬貫朽而不可校史記平凖書武帝建元以來用少縣官往往即多銅山而鑄錢民亦盜鑄不可勝數錢益多而輕有司言曰金有三等黄金為上白金為中赤金為下今半兩錢法重四銖而姦或盜摩錢質而取鋊錢益輕薄漢書食貨志許慎云鋊銅屑也摩錢漫面取其屑更以鑄錢食貨志乃更請鑄五銖錢周郭其質令不可得摩取鋊食貨志禁苑有白鹿乃以白鹿皮方尺縁以藻繢為皮幣直四十萬史記平凖書元鼎二年令京師鑄鐘官赤側文獻通考公卿請令京師鑄鐘官赤側一當五賦官用非赤側不得行史記平凖書如淳曰以赤銅為其郭也今錢見有赤側者不知作法云何索隠曰鐘官掌鑄赤側之錢平凖書注悉禁郡國無鑄錢専令上林三官鑄錢既多而令天下非三官錢不得行諸郡國所前鑄錢皆廢銷之輸其銅三官平凖書漢書百官表水衡都尉武帝元鼎二年初置掌上林苑屬官有上林均輸鐘官辦銅令然則上林三官其是此三令乎平凖書注自孝武元狩五年三官初鑄五銖錢至平帝元始中成錢二百八十億萬云云漢書食貨志初大農筦鹽鐵官布多置水衡欲以主鹽鐵及楊可告緡錢上林財物衆乃令水衡主上林上林充滿史記平凖書桑𢎞羊為大農幹天下鹽鐵請置大農部丞數十人分部主郡國各往往置均輸鹽鐵官令逺方各以其物相灌輸置平凖於京師受天下委輸漢書食貨志汲黯為右内史後免官隠於田園居數年會更五銖錢民多盜鑄錢史記汲黯傳徐廣曰元狩五年行五銖錢汲黯傳注會五銖錢白金起民為姦京師尤甚乃以義縱為右内史史記義縱傳縣官以鹽鐵緡錢之故用稍饒矣益廣關置左右輔漢書食貨志光武時長安鑄錢多奸巧京兆尹閻興署主簿第五倫為督鑄錢掾領長安市倫平銓衡民悦服時長安市未有秩又鑄錢官奸宄所集無能整齊理之者興署倫督鑄錢掾領長安市其後小人争訟皆云第五掾所平市無姦枉冊府元龜近華山有人掘得數斗錢皆徑四分好亦二分已上周迴皆無錯鑢處其文只有半王字仍未成就此則五銖之漸也泉志獻帝作五銖錢有四道連於邊縁識者尤之曰豈京師破壞此錢復出也及董卓劫駕西幸長安悉壞五銖錢盡取長安及洛陽銅人飛亷之屬以充鼓鑄時人以為秦始皇見長人於臨洮乃鑄銅人卓臨洮人也興毁不同㐫訛相𩔖晉書食貨志初平二年悉椎破銅人鐘簴及壞五銖錢更鑄為小錢大五分無文章肉好無輪郭不磨鑢於是貨輕而物貴榖一斛至數十萬自是後錢貨不行後漢書董卓傳北魏延昌三年春有司奏長安驪山有銀鑛二石得銀七兩又漢中舊有金户千餘家常於漢水沙淘金年終總輸後臨淮王彧為梁州刺史奏罷之魏書食貨志北齊神武遷鄴已後百姓私鑄體制漸别遂各以為名有雍州青赤梁州生厚錢隋書食貨志北周武帝保定元年七月鑄布泉之錢時梁益之境雜用古錢河西諸郡用西域金銀之錢而官不禁建徳三年六月更鑄五行大布錢以一當十大收商估之利與布錢並行四年七月又以邊境之上人多盜鑄乃禁五行大布不得出入四關布泉之錢聽入而不聽出隋書食貨志隋髙祖受周禪鑄新錢背面肉好皆有周郭文曰五銖而重如其文每錢一千重四斤二兩是時錢既新出百姓咸私有鎔鑄三年四月詔四面諸關各付百錢為様從闗外勘様相似然後得過様不同者即壞以為銅入官十年奸狡私鑄雜以錫錢乃下惡錢之禁京師邸肆之上令立榜置様為凖不中様者不入於市京師以惡錢貿易為吏所執有死者數年之間私鑄頗息隋書食貨志延安郡金明有冶官地理志唐髙祖入長安民間行綫環錢其製輕小凡八九萬纔滿半斤武徳四年鑄開元通寳徑八分重二銖四参積十錢重一兩得輕重大小之中其文以八分篆𨽻三體唐書食貨志商州上洛郡有洛源監錢官洛南有金有銅有鐵唐書地理志髙祖入關鑄開元通寳其文給事中歐陽詢製詞及書時稱其工字含八分及篆𨽻三體其詞先上後下次左後右讀之自上及左迴環讀之其義亦通流俗謂之開元通寳錢鄭䖍會粹云詢初進蠟様日文徳皇后搯一甲跡故錢上有搯文每兩二十四銖則一錢重二銖半以下古秤比今秤三之一也則今錢為古秤之七銖以上古五銖則加重二銖以上文獻通考文按通考依據舊唐書食貨志原查新唐書及網鑑亦俱云開元通寳則迴環讀法自係俗見後人多循流忘源故特附考睿宗先天之際兩京錢益濫開元初宰相宋璟請禁惡錢行二銖四參錢毁舊錢不可用者唐書食貨志先天元年九月諫議大夫楊虚受以京中用錢惡貨物踴貴上疏曰伏見市井用錢不勝濫惡有加鐵錫即非公鑄虧損正道夷亂平人城外此錢並不任用中京且猶若是逺郡夫何以堪易曰何以聚人曰財故交易而退各得其所詩曰京邑翼翼四方是則國家優尚寛典吏人慢法銅錫亂雜偽錢轉多政刑漸失扵科條明罰未加於守長有殊禁人為非矣日中為市聚天下之貨而錢無准的物價騰踴乾没相乘盈虚失度又非各得其所矣帝京三市人雜五方淫巧競馳侈偽成俗至於商賈積滯富豪藏鏹兼并之家歳増儲蓄貧素之士日有空虚公錢未益於時須禁法不當於代要四方無所取則矣夫作法於凉其弊猶貪容奸於非弊將若之何其惡錢臣望官為博取納鑄錢州京城並以好錢為用書奏付中書門下詳議以為擾政不行冊府元龜𤣥宗開元二十四年置錢監兩京用錢稍善其後錢又漸惡詔出銅所在置監鑄開元通寳錢京師庫藏皆滿天下盜鑄益起京師權豪嵗取之兩京錢有鵞眼古文綫環之别每貫重不過三四斤至剪鐵而緡之宰相李林甫請出絹布三百萬匹平估収錢物價踴貴訴者日萬人兵部侍郎楊國忠欲招權以市恩揚鞭市門曰行當復之明日詔復行舊錢天寳十一載又出錢三十萬緡易兩市惡錢出左藏庫排斗錢許民易之國忠又言錢非鐵錫銅沙穿穴古文皆得用之是時増調農人鑄錢非所習内作判官韋倫請厚價募工由是役用減而鼓鑄多天下鑪九十九洋州三每鑪歳鑄錢三千三百緡唐書食貨志肅宗乾元元年户部侍郎第五琦以國用未足幣重貨輕乃請鑄乾元重寳錢徑一寸毎緡重十斤以一當十與開元通寳參用及琦為相又鑄重輪乾元錢一當五十每緡重十二斤與三品錢並行法既屢易物價騰踴斗米至七千初有虚錢京師人人私鑄并小錢壞鐘像犯禁者愈衆鄭叔清為京兆尹數月搒死者八百餘人上元元年減重輪錢以一當三十開元舊錢與乾元十當錢皆以一當十碾磑鬻受得為實錢虚錢交易皆用十當錢由是錢有虚實之名文獻通考代宗廣徳二年以劉晏顓領轉運租庸鑄錢鹽鐵轉輸至上都永泰二年分天下財賦鑄錢常平轉運鹽鐵置二使京畿闗内以京兆尹判度支第五琦領之諸道鹽鐵轉運使劉晏以江嶺諸州任土所出皆重粗賤弱之貨輸京師不足以供道路之直於是積之江淮易銅鉛薪炭廣鑄錢歳十餘萬緡輸京師劉晏為户部侍郎兼勾當度支轉運鹽鐵鑄錢使江淮粟帛田襄漢越商於以輸京師唐書食貨志徳宗相楊炎嵗斂錢九百五十餘萬緡以供京師唐書食貨志建中元年九月户部侍郎韓洄上言江淮錢監歳共鑄錢四萬五千貫輸於京師度功用轉送之費毎貫計錢二千是本倍利也今商州有紅崖冶出銅益多又有雒源監久廢不理請増工鑿山以取銅興洛源錢監置十爐鑄之嵗計出錢七萬二千貫度功用轉送之費貫計錢九百則利浮本也其江淮七監請罷從之舊唐書食貨志貞元初駱谷散關禁行人以一錢出者十年州縣禁錢不出境商賈皆絶浙西觀察使李若初請通錢往來而京師商賈齎錢四方貿易不可勝計詔復禁之唐書食貨志憲宗以錢少復禁用銅器時商賈至京師委錢諸道進奏院及諸軍諸使富家以輕裝趨四方合劵乃取之號飛錢京兆尹裴武請禁與商賈飛錢者搜索諸坊十人為保元和四年京師用錢緡少二十及有鉛錫錢者捕之非交易而錢行衢路者不問元和六年自京師禁飛錢家有滯藏物價寖輕判度支盧坦兵部尚書判户部主事王紹鹽鐵使王潘請許商人於户部度支鹽鐵三司飛錢每千錢増給百錢然商人無至者復許商人敵貫而易之然錢重帛輕如故憲宗為之出内庫錢五十萬緡市布帛每疋加舊估十之一唐書食貨志元和十二年四月勅泉貨之設古有常規將使輕重得宜是資斂散有節必通其變以利於人今繒帛轉賤公私俱弊宜出現錢五十萬貫令京兆府揀擇要便處開塲依市價交易選清强官吏切加勾當仍各委本司先作處置條件聞奏必使事堪經久法可通行又勅近日布帛轉輕見錢漸少皆縁所在壅塞不得通流宜令京城内自文武官僚不問品秩髙下并公郡縣主中使等下至士庶商旅寺觀坊市所有私貯見錢並不得過五千貫如有過此許從勅出後限一月内任將市别物收貯如錢數校多處置未了任於限内於地界州縣陳狀更請限縱有此色亦不得過兩個月若一家内别有宅舍店舗等所貯錢並許計同在此數其兄弟本來異居曽經分析者不在此限如限滿後有違犯者白身人等宜付所司决痛杖一頓處死其文武官及公主等並委有司聞奏當重科貶戚屬中使亦具名銜聞奏其賸貯錢不限多少並勒納官數内五分取一分充賞錢止於五千貫此外察獲及有人論告亦重科處分并量給告者時京師里閭區肆所積多方鎮錢王鍔韓𢎞李惟簡少者不下五十萬貫於是競置第宅以變其錢多者竟里巷傭僦以歸其直而髙貲大賈多依倚左右軍官錢為名府縣不得窮驗法竟不行舊唐書食貨志元和十四年六月勅應屬諸軍諸使有犯時用錢每貫除二十文足陌内欠錢有鉛錫錢者宜令京兆府枷項收禁牒報本軍本使府司差人就軍看决二十如情狀難容復有違拒者仍令府司聞奏冊府元龜元和末民間墊陌有至七十者鉛錫錢益多吏捕犯者多屬問軍諸使謼集市人强奪毆傷吏卒京兆尹崔元略請犯者本軍本使涖决帝不能用詔送本軍本使而京兆府遣人涖决食貨志穆宗即位京師鬻金銀十兩亦墊一兩糴米鹽百錢墊七八京兆尹栁公綽以嚴法禁止之尋以所在用錢墊陌不一詔從俗所宜内外給用毎緡墊八十唐書食貨志武宗勅鑄錢之所各以本州郡名為背文於是京兆府以京字在穿上藍田縣以藍字在穿右興元府以興字在穿上泉志淮南節度使李紳請天下以縣名鑄錢京師為京錢大小徑寸如開元通寳交易禁用舊錢唐書食貨志會昌五年鑄開元錢時有勅令鑄錢所各加本郡州號名為背文京京兆興鳳翔藍藍田又節度使李紳請背加昌字以表年號玉海昭宗末京師用錢八百五十為貫每百纔八十五唐書食貨志後唐明宗天成元年五月商州奏當管水銀五窟乞依舊管係冊府元龜宋坑冶金産商州銀産鳳州有監秦隴興元有三務鐵産鳳翔同州有冶鳳耀坊州有務水銀産商鳳二州有場朱砂産商州有場宋史食貨志太祖開寳九年二月庚辰以鳳州七房銀冶為開寳監宋史太祖本紀太宗至道二年有司言鳳州山銅礦復出採鍊大獲而皆良焉請置官署掌其事太宗曰地不愛寳當與衆庶共之不許宋史食貨志真宗天禧末鐵錢有三監興州曰濟衆宋史食貨志仁宗慶厯五年軍興陜西移用不足始用知商州皮仲容議采洛南縣紅崖山青銅置阜民監鑄錢既而陜西都轉運使張奎知永興軍范雍請鑄大銅錢與小錢兼行大錢一當小錢十又請因晉州積鐵鑄小錢及奎徙河東又鑄大鐵錢亦以一當十助闗中軍費未幾三司奏罷河東鑄大鐵錢而陜西復采儀州竹尖嶺黃銅置博濟監鑄大錢宋史食貨志文彦博知永興軍起居舍人母湜鄠人也至和中湜上言陜西鐵錢不便於民乞一切廢之朝廷雖不從其鄉人多知之争以鐵錢買物賣者不肯受長安為之亂民多閉肆僚屬請禁之彦博曰如此是愈使民間擾惑也乃召絲絹行人出其家縑帛數百疋使賣之曰納其直者盡以鐵錢勿以銅錢也於是衆知鐵錢不廢市肆復安天禄識餘慶厯中勅江南鑄大銅錢而江池饒儀虢又鑄小鐵錢悉輦致關中數州錢雜行大約小銅錢三可鑄當十大銅錢一以故民間盜鑄者衆錢文大亂公私患之慶厯末葉清臣為三司使與學士張方平等上陜西錢議曰闗中用大錢本以縣官取利太多致奸人私鑄比年以來縣官雖有折當之虚名乃受虧損之實害捄弊不先自損則法未易行請以江南儀商等州大銅錢一當小錢三小鐵錢三當銅錢一且罷官所置爐自是奸人稍無利猶未能絶濫錢其後詔商州罷鑄青黃銅錢又令陜西大銅錢大鐵錢皆以一當二盜鑄乃止時興元府西縣増置濟逺監後廢嘉祐四年興州鑄錢三萬緡宋史食貨志陜西每銅錢一貫用鐵錢一貫三十文可換後因常平司指揮諸州勿出銅錢諸司遂效之民間相傳鐵錢將不用矣家家収蓄銅錢輕用鐵錢由是錢賤而物加貴王鞏隨手雜録英宗治平中増復諸州阬冶商州金冶秦鳳商隴銀冶鳳翔鐵冶商州錫冶皆置吏主之宋史食貨志神宗熙寜初薛向鑄鐵錢於陜西民不便用神宗欲罷之王安石固争詔畿内并罷其行於四方如故熙寜初以邊費錢十萬緡儲永興軍為鹽鈔本繼又増二十萬四年詔陜西行蜀交子法罷市鈔或論其不便復舊熙寜初同華二州積小鐵錢凡四十萬緡詔賜河東以鐵償之熙寜時興州濟衆監嵗増七萬二千餘緡陜西三銅錢監各嵗増五萬緡又詔鳳翔府斜谷置監已而所鑄錢青銅夾錫脆惡易毁罷之熙寜時詔商虢洛南増三監耀鄜權置兩監通永興華舊監以給改鑄永興鄜耀去鐵冶逺聽改鑄一年罷商雒南華最近鐵冶聽久置鄜州等五監候罷改鑄并其工作歸永興等四監専鑄大錢所鑄大鐵錢約補及所廢偽錢及可以待交子所用而止宋史食貨志陜西鑄折二錢洓水記聞熙寜四年陜西轉運使皮公弼言頃歳西邊用兵始鑄當十錢後兵罷多盜鑄者仍以當三減作當二行之至今銅費相當盗鑄衰息請以舊銅鉛盡鑄當二錢從之其後折二錢遂行天下文獻通考熙寜四年行交子於陜西而罷永興軍鹽鈔塲文彦博言其不便㑹張景憲出使延州還亦謂可行於蜀不可行於陜西未幾竟罷紹聖以後界率増造以給陜西沿邊糴買及募兵之用少者數十萬緡多者或至數百萬緡宋史食貨志熙寜五年二月壬戌詔罷陜西遞運銅錫熙寜八年二月甲子増陜西錢監改鑄大錢神宗本紀熙寜八年中書奏陜西鹽鈔利害大抵謂買鈔本錢有限而出鈔過多買不盡則鈔賤而糴貴故出鈔不可無限今當立額永興路八十一萬五千秦鳳路一百三十八萬五千永興軍遣官買鈔嵗支轉運司錢十萬緡食貨志熙寜八年陜西轉運使皮公弼又請鑄鐵折二從之諸路鑄錢總二十六監永興軍華州錢監各鑄二十萬貫計六十萬貫文獻通考九年詔御史劾陜西官吏止三司額外出鈔元豐五年户部以鈔多難售嵗給陜西軍儲鈔二百萬裁其半然鈔多卒不能平價元豐以後西師大舉邊用匱缺徐州置寳豐下監嵗鑄折二錢二十萬緡轉移陜府於時同渭秦隴等州錢監廢置移徙不一宋史食貨志哲宗嗣位復申錢弊闌出之禁陜西行鐵錢至陜府以東即銅錢地民以鐵錢換易有輕重不等之患元祐六年乃議限東行有税物者以十分率之止許易二分人毋得過五千宋史食貨志元祐八年秋七月戊寅令陜西沿邊鐵錢銅錢悉還近地八月庚午詔陜西復鑄小銅錢哲宗本紀元祐八年命商旅願於陜西内郡入便銅錢給㨿請於别路者聽仍定加饒之數食貨志元祐中杜純移陜西路轉運使時方患陜西幣輕貨重純屢陳嵗給本路諸司鹽鈔實為飛錢然西州有來商無還貨又鐵錢不出境獨鈔無脚税朝至國夕為錢既以備本路夏秋糴而商賈貝非以兩時至則鈔歸兼并家不貴售不出若鈔留京師賣錢貯之而别為公據與本路凡入榖若錢者給之至京師歸以鈔錢則貨幣平不行雞肋集元祐末定鈎致之法議者謂陜右所用折二鐵錢止當一小銅錢即折二銅錢盡歸陜西不直般運費廣猝難鈎致且與鐵錢一等慮鐵錢轉更加輕乃令折二銅錢寛所行地聽行於陜西一路紹聖元年户部尚書蔡京奏岑水場銅額寖虧而商虢間苖脉多陜民不習烹採久廢不發請募南方善工詣陜西經畫擇地興冶於是以許天唘同管幹陜西坑冶事宋史食貨志陸詵提㸃陜西刑獄時鑄錢法壞議者欲變大錢當一詵言民間素重小銅錢而賤大鐵錢他日以一當三猶輕之今減令均直大錢必廢請以一當二則公私所損無幾而商賈可以通行兼盜鑄者計其直無贏將必自止從之陸詵傳紹聖初鐵錢寖輕元符二年詔陜西悉禁銅錢在民間者永興帥臣陸師閔言既揀毁私錢禁銅罷冶則物價當減願下陜西州縣凡有市買並凖度銅錢之直以平其價詔用其言而豪賈富家多不便元符三年許天唘罷領阬冶以其事歸之提刑司初新舊阬冶合為一司而漕司兼領天唘為同管幹欲専其事慮有所牽制乃請川陜京西路阬冶自為一司許檢束州縣刺舉官吏而漕司不復兼阬冶至是中書奏天唘所領首末六年總新舊銅止收二百六萬餘斤而兵匠等費繁多故罷之食貨志徽宗嗣位通判鳳州馬景夷言陜西自去年罷使銅錢續追官措置錢法未聞有深究錢弊輕重灼見利害者銅錢流注天下雖千百年未嘗有輕重之患獨鐵錢局於一路所可通交易有無者限以十州之地欲無滯礙安可得乎宜弛其禁界許鄰近陜西等路通行折二錢乃詔銅鐵錢聽民間通行而銅錢止用糴買建中靖國元年陜西轉運副使孫傑以鐵錢多而銅錢少請復鑄銅錢候銅鐵錢輕重稍均即聽兼鑄宋史食貨志建中靖國四年閏二月甲申置陜西監鑄當二夾錫鐵錢徽宗本紀崇寜元年前陜西轉運判官都貺請權罷陜西鑄鐵錢崇寜二年許天唘為陜西轉運副使請鑄當十錢五月始令陜西以嵗所鑄小平錢増料改鑄當五大銅錢以聖宋通寳為文食貨志崇寜二年二月初令陜西鑄折十銅錢並錫錢文獻通考崇寜四年蔡京議令解鹽新鈔止行陜西詔陜西舊鈔減落價踰五十者論以法崇寜五年詔鈔法用之民信已久飛錢裕國其利甚大比考前後法度頗究利害其别為號驗給解鹽換請新鈔先以五百萬緡赴陜西河東止給糴買聽商旅赴𣙜貨務換請東南鹽鈔又詔陜西作當五通寳錢所鑄未多旋復詔當十錢行於陜西始禁陜西鐵錢行於興元府等界崇寜時設鑄錢院所鑄銅錢通行諸路而陜西係鐵錢地禁之大觀元年詔改四川交子務為錢引務陜西河東皆以舊錢引入成都換易故四川有壅遏之弊河陜有道路之艱豪家因得以損直斂取乃詔永興軍更置務納換陜西河東引仍遣大臣二人監之大觀二年以鐵錢猥多禁陜西鐵錢入蜀八月提舉陜西坑冶司改併入轉運司大觀四年詔許陜西鐵錢入蜀仍舊盡釋其禁侍御史毛注言朝廷自昔謹三路之備糧儲豐溢惟鈔法流通上下交信陜西解鹽鈔支請解鹽鈔至則給不復滯留當時商旅皆悦争運糧草入於邊郡自崇寜來鈔法屢更人不敢信大觀中張商英為相議變通損益令内府錢移用以革錢鈔物三等偏重之弊陜西給鈔五百萬緡宋史食貨志政和元年二月乙巳詔陜西復鑄夾錫錢夏四月乙卯罷陜西鑄夾錫錢徽宗本紀政和元年詔陜西舊行使鐵錢地並依元豐年大鐵錢折二公私通行夾錫錢同之毋得分别見存鐵錢毋改更鑄夾錫詔陜西鈔依鈔面實價輒増減者以違制論未幾復以陜西通行鹽鈔舊雖約以銅錢六千為鈔面然鈔貴則入粟増多鈔平則入粟減少若限以六千陜西惟行鈔錢是鹽鈔一席得六千鐵錢斛斗矣深損公家其隨時増減聽之政和二年蔡京復得政條奏鑄夾錫錢精善請復鑄如故不論何路所鑄並聽通行陜西政和三年尚書省言陜西路坑冶已遣官吏提轄措置川路金銀坑冶興廢慮失利源詔令陜西措置官兼行川路事九月措置陜西坑冶蔣彛奏本路坑冶收金千六百兩他物有差詔輸大觀西庫彛増秩官屬各減磨勘年政和四年罷鼓鑄夾錫錢悉輦椿關中尋詔陜西外餘路並罷政和六年川陜路各置提轄措置坑冶官政和時關中錢甚輕夾錫欲以重之其實與鐵錢等物價日増患甚於當十童貫宣撫陜西以詔亟平物價錢即經略鄜延抗疏言詳考詔㫖謂鐵錢復行與夾錫並用慮姦民妄作輕重欲維持推行俾錢物相值非欲以威力脅致百姓頓減物價於一兩月之間今宣撫司裁損米糓布帛金銀之價殆非人情詔即妄有建明毁辱使命謫置偏州尋亦罷行夾錫錢且禁裁物價重和元年罷京西鑄夾錫錢繼以闗中糴買用之通流復命鼓鑄専給關中夾錫行小民往往以藥㸃染與銅錢相亂食貨志欽宗靖康元年罷政和敕陜西路用銅錢斷徒二年配千里法初蔡京主行夾錫錢詔鑄於陜西亦命轉運副使許天唘推行其法以夾錫錢一折銅錢二每緡用銅八斤黒錫半之白錫又半之宋史食貨志髙宗紹興九年六月戊寅置錢引務於永興軍八月己巳命陜西復行鐵錢宋史髙宗本紀金主亮天徳二年毛碩充陜西轉運使以陜右邊荒賦入甚薄市井交易商賈不通請視汴京燕京例給交鈔通行朝廷從之金史毛碩傳正隆二年十月括民間銅鍮器陜西南京者輸京兆食貨志正隆三年二月壬辰京兆初置錢監海陵本紀正隆三年京兆置錢監一曰利用文曰正隆通寳輕重如宋小平錢而肉好字文峻整過之與舊錢通用食貨志世宗大定元年用吏部尚書張中彦言命陜西路叅用宋舊鐵錢四年寖不行詔陜西行户部並兩路通檢官詳究其事皆言民間用錢名與鐵錢兼用其實不為凖數公私不便遂罷之金史食貨志章宗明昌四年上諭宰臣曰或言鐵錢有破損當令所司以銅錢償之者叅知政事胥持國不可曰如陜西市易亦有用銀市薑麻若舊有鐵錢宜姑收貯以備緩急遂令有司籍鐵錢及諸無用之數貯於庫八月提刑司言陜西所降交鈔多於見錢使民艱於流轉宰臣以聞遂令本路𣙜税及諸名色錢折交鈔官兵俸許錢絹銀鈔各半之若錢銀數少即全給交鈔承安四年三月又以銀鈔阻滯令陜西銀鈔從便餘路並許収銀鈔各半續文獻通考泰和六年四月陜西交鈔不行以見錢十萬貫為鈔本與鈔相易復以小鈔十萬貫相叅用之七年十一月命陜西路院務諸税及諸科名錢並以鈔三分為率一分納十貫例者二分五貫例者餘並収見錢金史食貨志宣宗貞祐三年五月權西安軍節度使烏凌阿與言闗陜軍多供億不足所仰交鈔則取於京師徒成煩費乞降板就造便金史食貨志元世祖至元二十四年冬十月立陜西寳鈔提舉司元史世祖本紀順帝至正十八年二月中書省臣奏以陜西軍旅事劇務殷去京師道逺供費艱難請就陜西印造寳鈔為便遂分户部寳鈔庫等官置局印造元史順帝本紀明太祖洪武二十六年各處鑪座錢數陜西三十九座半毎歳鑄錢二千三百三萬六千四百文續文獻通考陜西通志巻四十一
