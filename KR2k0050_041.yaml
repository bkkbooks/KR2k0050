  text: 陜西通志巻四十一鹽法錢法附鑄山煑海國用權衡黒龍花馬池水凝晶埽紅戎帳熬波堡營召商實粟藉以强兵我朝正莢運納維平暨乃刀幣如泉流行陋彼㑹鈔弗事冶阬政先食貨溥惠秦氓作鹽法志第十八國朝産鹽花馬大池坐落榆林府定邊縣地方距府六百里距縣城二十里周圍一十六里舊志云圍二十七里本西秦牧地即土治鹽故名花馬池原𨽻甘省靈州明嘉靖九年總制王瓊以大池去靈州逺且宻邇延綏奏改屬延綏鎮鹽場堡每年二月間於池内開治壩畦引水入池灌畦風起波生日晒成鹽用力極易唯天旱少水或雨水過溢所産差少爛泥池在大池西南十五里周廣十二里波羅池在大池西南二十里周廣十里連環池在大池西南三十里東南角屬定邊周廣十餘里西北角屬慶陽紅崖池在大池西南三十五里周廣十里娃娃池在大池西南四十里周廣八里此六池唯大池有海眼九處可以開治壩畦其五池無海眼亦無壩畦産鹽無定三眼泉坐落綏徳州西九十里刮土煎鹽額設鹽鍋一百八十五面馬湖峪坐落米脂縣北四十里産鹽河灘周廣約三里刮土煎鹽額設鹽鍋二百九十一面永樂倉坐落魚河堡康家灣之南河灘周廣五十里刮土煎鹽額設鹽鍋三百八十五面以上三處産鹽即古碎金驛鹽也積久廢弛沿及明季因馬湖峪等處鹻土磽薄五榖不生議令屯丁刮土淋水煎鹽計鍋起票徴税名曰鍋票税本朝因之花馬小池在寜夏鎮靈州惠安堡詳見甘省志解池在山西安邑縣詳見河東鹽法志按以上二處産鹽不在陜省本境而為陜省食鹽之處故􅘦其所自附録於此食鹽西安府屬十四縣食解池鹽延安府屬八縣食花馬大池鹽鳳翔府屬一州七縣食花馬小池鹽認銷河東引漢中府屬一州八縣原食花馬大池鹽雍正三年題准改食花馬小池鹽仍認銷大池引榆林府榆林縣所屬魚河堡食本地永樂倉土鹽靖邊定邊二縣食花馬大池鹽餘各營堡俱食口外夷鹽不領引納課興安州一州並所屬六縣食解池鹽商州一州並所屬四縣食解池鹽同州一州並所屬四縣食解池鹽華州一州并所屬三縣食解池鹽耀州一州并所屬二縣食解池鹽乾州一州并所屬二縣食解池鹽邠州一州并所屬三水淳化二縣食解池鹽長安一縣原食解池鹽雍正八年題准照鳳課例改食花馬小池鹽仍認銷河東引鄜州一州并所屬三縣食花馬大池鹽綏徳州食本州所屬三眼泉土鹽米脂縣食本縣所屬馬湖峪土鹽清澗縣食花馬大池鹽葭州一州并所屬三縣食口外夷鹽不領引納課引額西鳳二府興商同華耀乾邠七州嵗領河東額引加増引共拾貳萬零壹百貳拾道毎引掣鹽貳百肆拾斤毎壹百貳拾引為一名延漠二府屬榆林府所屬靖邊定邊二縣鄜州一州綏徳州所屬清澗一縣歳額領花馬大池引共叄萬玖千肆百道毎引鹽貳百斤榆林府所屬魚河一堡綏徳州一州并所屬米脂一縣嵗額領鹽票共貳萬零陸百陸拾肆張毎票鹽壹百斤各府州縣分銷引額西安府屬嵗額銷河東引伍萬㭍千零拾叄道内長安縣額引陸千捌百壹拾壹道咸寜縣額引㭍千捌百伍拾㭍道咸陽縣額引貳千貳百㭍拾捌道興平縣額引貳千道臨潼縣額引叄千捌百道髙陵縣額引壹千㭍百伍拾伍道鄠縣額引壹千㭍百肆拾貳道藍田縣額引叄千陸拾道涇陽縣額引伍千陸百叄拾肆道三原縣額引叄千伍百道盩厔縣額引叄千肆百㭍拾伍道渭南縣額引㭍千貳百陸拾伍道富平縣額引伍千貳百叄拾陸道醴泉縣額引貳千陸百道商領商繳延安府屬歳額銷花馬大池引㭍千㭍百㭍拾陸道内膚施縣額引捌百陸拾肆道安塞縣額引壹千捌道甘泉縣額引㭍百貳拾道安定縣額引捌百陸拾肆道保安縣額引壹千捌道宜川縣額引壹千貳百玖拾陸道延川縣額引壹千壹百伍拾貳道延長縣額引捌百陸拾肆道係榆林道彚文赴部領繳發各縣辦課鳳翔府屬歳額認銷河東引壹萬陸千叄百道内鳳翔縣額引壹千陸百伍道岐山縣額引貳千玖百玖拾㭍道扶風縣額引伍千捌百壹拾叄道郿縣額引壹千捌百壹拾捌道寳雞縣額引叄千貳百捌拾壹道汧陽縣額引壹百貳拾玖道麟逰縣額引陸拾捌道隴州額引伍百捌拾玖道係知府領引分發各州縣經徴繳引漢中府屬嵗額認銷花馬大池引貳萬伍千道内南鄭縣額引貳千伍百㭍拾捌道褒城縣額引壹千伍百叄拾道城固縣額引肆千叄百拾陸道洋縣額引玖千貳百陸拾玖道西鄉縣額引叄千捌道鳳縣額引㭍百叄拾捌道寜羌州額引玖百肆拾肆道沔縣額引壹千壹百拾陸道畧陽縣額引壹千伍百壹道係知府彚文赴部領繳發各州縣辦課榆林府屬靖邊定邊二縣歳額銷花馬大池引壹千肆百肆拾道内靖邊縣額引伍百叄拾伍道定邊縣額引玖百零伍道係榆林道彚文赴部領繳發各營堡辦課榆林縣所屬魚河堡歳額銷永樂倉鹽票玖千貳百肆拾張在榆林道㕔衙門刷領興安州屬歳額銷河東引貳千零貳拾貳道内本州額引捌百肆拾捌道平利縣額引壹拾道洵陽縣額引肆百道白河縣額引拾貳道紫陽縣額引壹百道石泉縣額引貳百伍拾貳道漢隂縣額引肆百道商領商繳商州屬歳額銷河東引貳千陸百捌拾道内本州額引壹千叄百道鎮安縣額引貳百捌拾道雒南縣額引陸百道山陽縣額引叄百道商南縣額引貳百道商領商繳同州屬歳額銷河東引壹萬捌千捌百陸拾㭍道内本州額引叄千道朝邑縣額引肆千玖百叄拾伍道郃陽縣額引伍千壹百叄拾貳道澄城縣額引貳千捌百道韓城縣額引叄千道商領商繳華州屬歳額銷河東引壹萬貳千伍百零壹道内本州額引叄千壹百玖拾肆道華隂縣額引貳千肆拾伍道蒲城縣額引㭍千壹百貳拾玖道潼關縣額引壹百叄拾叄道商領商繳耀