body:
  text: 陜西通志卷二十二職官三金陜西行尚書省按金史宣宗本紀貞祐三年置行省於陜西所屬官屬史無可考陜西行元帥府都元帥掌征伐之事兵罷則省都元帥左副元帥右副元帥左監軍右監軍左都監右都監經歷都事知事檢法陜西宣撫使司泰和六年置節制陜西八年改為安撫司又按本紀元光二年設京兆南山安撫司宣撫使副使陜西統軍司天德二年置正隆末升為都統府大定五年復罷府降為統軍司統軍使督領軍馬鎮攝封陲統軍使副統軍使判官大定九年置知事知法二員女直漢人各一陜西按察司本提刑司承安四年改置貞祐三年罷止委監察採訪使一員監察採訪使副使承安四年置判官二員大定二十九年置知事明昌元年增置陜西司農司興定六年陜西置行司農司設官五員正大元年陜西設大司農司卿正大元年陜西置卿少卿丞卿以下迭出巡案察官吏臧否陜西東路轉運司轉運使同知副使都勾判官户籍判官支度判官鹽鐵判官都孔目官知法京兆府延安府鳯翔府府尹同知少尹判官府判推官知事都孔目官女直司漢人司知法三員女直一漢人二女直教授醫正醫工八人以上官屬各府皆同京兆總管府延安總管府即彰武軍鳯翔總管府葭州總管府掌統諸城隍兵馬甲仗皆以府尹兼領都總管同知都總管同知副都總管總管判官府判官推官知法以上官屬各總管府皆同京兆總管府節鎮兵馬都指揮掌巡捕盜賊延安總管府節鎮兵馬都指揮鳯翔總管府節鎮兵馬都指揮副都指揮二員指揮使軍使以上各都指揮皆有京兆兵馬都鈐轄鳯翔兵馬鈐轄掌巡捕盜賊京兆鳯翔各一員惟京兆稱都鈐轄同州節度使掌鎮撫諸軍防刺總判本鎮兵馬之事兼本州管內觀察使事各州皆同乂按章宗本紀承安四年詔同州節度使罷兼陜西副統軍華州節度使後降防禦保大軍節度使治鄜州靖難軍節度使治邠州同知節度使通判節度使節度判官觀察判官知法教授司獄以上官屬各節度使皆同商州華州隴州防禦使掌防捍不虞禦制盜賊餘同府尹商州華州𨽻京兆路隴州𨽻鳯翔路同知防禦使判官知法教授司軍軍轄兼巡捕使以上官屬各防禦使皆同商州乾州耀州刺史俱𨽻京兆路掌同府尹兼治州事商州後升防禦丹州保安軍綏德州坊州葭州刺史俱𨽻鄜延路以按貞元四年韓城為楨州置刺史尋廢同知判官司軍知法軍轄兼巡捕使以上官屬各刺史皆同都巡檢使諸防禦州刺史州皆置副都巡檢使縣令中縣而下置丞以主簿與尉通領巡捕事下縣則不置尉以主簿兼之丞主簿尉知鎮京兆府子午鳴犢乾祐零口孟店毗沙渭城井河粟邑秦渡商州上洛灃陽乾州薛祿草北長寧同州沙苑并藍朝邑新市延祥汙谷夏陽寺前良輔耀州黃堡龍橋華州赤水關西敷水素化新市荆姚鳯翔府武城陽平岐陽馬迹隴州安化新興吳山延安府樂盤丹州雲岩保安州靖邊永和鄜州三水坊州玉華邠州亭口清泉各鎮各置一員知城保安州金湯綏德州嗣武各城皆置一員知堡延安府安定安寨保安州圈林綏德州開光各堡皆置一員知寨延安府永平萬安招安保安州德靖順寧平戎綏德州暖泉義合清邉臨夏白草米脂懷寧鎮邉綏平克戎邠州常寧各寨各置一員縣按金史百官志諸知鎮城堡寨其設公使皆與同惟驗户口置司吏鄜延邊將鳯翔邊將鄜延九員鳯翔十六員掌提控部保將輪番巡守邊境正將副將部將隊將京兆府司竹監管勾官掌􅘥養竹園採斫之事轄監兵百人京兆府耀州三白渠公事規措官掌灌溉民田點檢渠堰官掌點檢啓閉涇陽等縣渠堰草場使京兆鳯翔各一員掌儲積受給之事明昌三年敕下邽置武定倉櫟陽置粟邑鎮倉各設倉草都監以縣官兼領之副使潼關關使兼譏察官掌關禁譏察姦偽及管鑰啓閉副譏察掌任使之事興定元年設大慶關管勾河橋官兼譏察事同管勾陜西提舉譏察使南遷置副使秦藍兩關提舉南遷後置同提舉行尚書省布薩端貞祐三年以尚書左丞相兼都元師行尚書省巴古拉貞祐四年胥鼎貞祐年楊貞興定元年以户部郎中權陜西六部尚書承立興定四年完顔哈達正大元年行尚書省於京兆完顔薩布正大六年以丞相行尚書省於關中圖克坦烏登天興元年鈕祜祿烏展天興二年博索元光元年行元帥府完顔仲元泰和中鳯翔元帥慶善努興定元年以保大節度行帥府事於鄜州瓜爾佳實倫隆安人興定三年行帥府事於葭州承裔興定四年行元帥府於鳯翔完顔閭山蓋州猛安人興定年行陜西元帥府博索興定年為元帥左都監行帥府事於鳯翔赫舍哩鶴夀河北西路人行元帥於鄜州實哷鼎自夀泗元帥轉鎮商州孟攀鱗約赫德正大七年左副元帥屯京兆納哈塔和碩天興元年宣撫使薩里罕天會元年陜西經略宣撫使完顔和索哩貞祐三年宣撫副使圖克坦鎰章宗時完顔綱泰和七年宣撫副使達希布泰和中安副使承裕泰和中烏庫哩楊珠泰和中安撫副使完顔阿里巴斯大安時陜西路宣撫副使完顔蘇哷正大時為同華安撫使布薩端崇慶時統軍使圖克坦喀齊喀大定二年舒穆嚕榮大定二年烏庫哩哈沙大定寺瓜爾佳清臣桓都人大定十二年襄承安時承裕泰和六年完顔贇鳯翔統軍完顔弼泰和時完顔固嘉努貞祐三年保安都統烏庫哩慶夀明安人貞祐四年駐延安富察伊埒圖貞祐時完顔哈達貞祐時舒穆嚕仲溫貞祐時充羅世暉興定元年綏德都統按察使烏凌阿竒珠明安人大定末布薩揆上京人章宗時完顔綱泰和時伊喇霖承安時東路轉運使傅慎微秦州人權轉運使程輝皇統中毛碩甘陵人天德二年左泌貞元時楊仲武保安人大定三年賈鉉博平人大定時轉運副使賈益通州人大定時丁偉仁宛平人董師中承安