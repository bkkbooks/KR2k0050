body:
  text: 陜西通志卷六疆域一省府州縣圖天府名邦幅員式廓冀豫荆梁壤連繡錯屏衛中原隔閡沙漠近服遵循逺疆啓拓聚米布碁井里城郭支祈效摉章亥奮蹻四塞雄圖西陲鎖鑰大化覃敷帡幪永託作疆域志第三上遊為鳳翔謹按西安面臨終南背據涇渭其西自隴坻踞汧渭其西北介梁岐涇渭之間為乾左阻石門踞涇上遊為邠其北界秦山跨漆沮者為耀自子午嶺東跨洛為鄜又北界橫山東瀕河為延安自橫山北接套地為榆林其東北界梁山控帶河洛為同又循河而北為綏德又東北抵套為葭其西南自嶓冡至太白之陽跨漢為漢中其南居終南之陽為興安其東自秦嶺至于太華在嶽之隂為華其東南在嶽之陽為商此陜東疆域之大凡也陜西通志卷六
