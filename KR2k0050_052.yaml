body:
  text: 陜西通志巻五十二名宦三勅使監司牧守勅使漢趙過為搜粟都尉過能為代田一畝三甽嵗代處故曰代田其耕耘下種田器皆有便巧率十二夫為田一井一屋故畮五頃用耦犁二牛三人一嵗之收常過縵田畝一斛以上善者倍之過使教田太常三輔大農置工巧奴與從事為作田器二千石遣令長三老力田及里父老善田者受田器學耕種養苗狀民或苦少牛亡以趨澤故平都令光教過以人輓犁過奏光以為丞教民相與庸輓犁率多人者田日三十畝少者十三畝以故田多墾闢過試以離宫卒田其宫壖地課得穀皆多其旁田畝一斛以上令命家田三輔公田是後三輔太常民皆便代田用力少而得穀多漢書食貨志汜勝之成帝時為議郎劉向别録使教田三輔有好田者師之徙為御史漢書藝文志來歙字君叔南陽人建武五年拜中郎將八年春與征虜將軍祭遵襲畧陽因保其城隗囂盡鋭攻之帝大發闗東兵自將上隴囂衆潰圍解於是置酒髙㑹勞賜歙班坐絶席在諸將之右詔使留屯長安悉監䕶諸將後漢書本傳北周薛善字仲良汾隂人太祖欲廣置屯田以供軍費除司農少卿領同州夏陽二十七屯監又於夏陽諸山置鐵冶復令善為冶監每月役八千人營造軍器善親自督課兼加慰撫甲兵精利而皆忘其勞苦焉論功賜爵龍門縣子周書本傳郭榮字長榮太原人周宇文䕶引為親信以功授大都督䕶以稽胡數為寇亂使榮綏集之榮於上郡延安築周昌𢎞信廣安招逺咸寧等五城以遏其要路稽胡由是不能為寇隋書本傳隋崔仲方字不齊博陵人少有文武才畧隋文帝受禪進位上開府授司農少卿令發丁三萬於朔方靈武築長城東至黄河西拒綏州南至勃出嶺綿厯七百里明年復令仲方發丁十萬於朔方已東縁邊險要築數十城以遏寇北史崔挺傳開皇三年奉令築直羅城又嘗開渠溉田人皆德之舊志唐狄仁傑字懷英并州太原人髙宗授侍御史使岐州亡卒數百剽行人道不通官捕繫盜黨窮訊餘曹紛紛不能制仁傑乃明開首原格出繫者稟而縱之使相曉皆自縳歸帝嘆其達權宜唐書本傳宋王㳂字聖源大名館陶人中進士第遷監察御史天聖五年安撫闗陜減諸縣秋税十二三宋史本傳王堯臣字伯庸應天虞城人陜西用兵為體量安撫使將行請曰故事使者所至稱詔存問官吏將校而不及於民自元昊反三年於今為甚請以詔勞來仍諭以賊平蠲租賦二年仁宗從之使還上言陜西兵二十萬分屯四路然可使戰者止十萬敵衆入寇常數倍官軍彼以十戰一我以一戰十故三至三勝由衆寡不侔也涇原近賊最當要害請益團土兵以二萬屯渭州為鎮戎山外之援萬人屯涇州為原渭聲勢二萬屯環慶萬人屯秦州以制其衝突又論延州鎮戎軍渭州山外三敗之由皆為賊先據勝地誘我將帥不能據險擊歸而多倍道趨利遂致掩覆願勅邊吏度逺近立營砦量敵奮擊毋輕出時韓琦徙秦州范仲淹降耀州堯臣言二人不當置散地又薦种世衡狄青有將帥才明年再安撫涇原又請徹潼闗樓櫓皆報可宋史本傳金蘇保衡字宗尹雲中天成人布薩忠義伐宋保衡行戸部於闗中兼糾察許以便宜黜守令不法者十餘人邠守傅慎微忤用事者被讒搆下獄且死保衡力救之得免金史本傳馮璧字叔獻正定人承安二年進士四年調鄜州録事明年伐蜀行部檄充軍前檢察帥府以書檄委之及還遷一官貞祐三年改大理丞與臺官行闗中劾奏姦贓之尤者商州防禦使宗室重福等十數人權貴側目四年遷刑部郎中闗中旱詔璧審理寃獄時河中帥阿古岱以棄城罪當死繫同州獄待報璧曰河中重地朝議擬為駐蹕之所以彼宗室勲貴故使鎮之一旦有警遽焚蕩而去此而不誅三尺法無用矣竟以無寃上之金史本傳元巴濟拉上都宜興人至大四年陜西延安諸翼衞探馬赤爭草地訟者二百餘起命往究之悉正其罪元史巴圖爾傳明王彰字文明鄭州人洪武末領鄉薦永樂五年擢禮部右侍郎遷戸部陜西疫遣祀華嶽還奏陜西民鬻賣男女以償逋租甚可憫念詔悉蠲逋官給楮幣贖所鬻人名山藏羅汝敬吉水人宣宗即位進工部侍郎命理陜西屯田劾貪暴守將經度占田均與細民立輓運法置河渠吏名山藏永按江西林志汝敬名肅與此不同考登科録樂甲申進士有羅汝敬葢以字行也王佐海豐人宣德初為戸部右侍郎經理陜西糧儲疏言軍衞倉弊百端請改隸有司天下稱便名山藏尹旻字同仁山東歴城人正統戊辰進士擢通政司左參議天順辛巳王師有事於陜西旻出總軍餉有白金綵幣之賜懷麓堂集時阿羅入寇延綏旻奏敵退河開軍馬衆多供輸困極乞罷兵以息民從之馮志李衍隆慶州人景泰辛未進士為戸部右侍郎轉左成化二十一年奉勅總督三邊軍儲兼賑饑民齋心禱雨所至響應又引渭水為渠以利民人全活甚衆名山藏朱瑄字廷璧鄞人成化己丑進士兵部郎中陜饑專勅往賑宥出輕盜給與穀種牛具勸課流民所活六十餘萬名山藏顔頤壽湖廣人以大理少卿委查延慶諸務時劉瑾立法查糧各邊衞屯田欲有增益及查軍欲三丁抽一為正軍又以官銀散給軍民毎四錢責運邊糧一石每二分五釐責納邊草一束賦重法嚴人不堪命頤壽不肯阿徇一切以寛大處之忤瑾意取囘送者扳轅不及咸望車塵拜祝賈志李如圭澧州人𢎞治己未進士累遷右僉都御史奉命賑延綏疏荒政十餘便宜行之存活數萬人湖廣通志蔡國熙永年人嘉靖乙未進士明代自嘉靖間設榆林戸部郎中總理延寧糧儲後因延綏糧多奏屬延綏國熙初任邊儲冒漏詭詐百端國熙隨事清刷夙弊悉蠲兵民歡洽又以其暇創立書院㑹合生徒研窮理學接引後進加以藻鑒一時士類濟濟張我繩邯鄲人鄉進士以戸部郎司餉延寧適嵗大祲我繩多方處給惠洽三軍去後建祠迄今尸祝不衰延綏鎮志金煉山東武定人進士督延綏糧儲事時軍饟苦不給煉力請度支嚴檄郡國飛輓麕至給散以時賈志按農曹督餉自國熙始專理延綏張金兼理延寧附見可也蕭廩字可發萬安人嘉靖進士隆慶三年擢御史出覈陜西四鎮兵食斥將吏隱占卒數萬人歸伍明史藁鮑道明字行之南直歙縣人嘉靖戊戌進士給事中㑹御史奏延綏失事巡撫都御史以捷聞命以兵科給事中莅視之徧閲敵出入並人畜多寡按軍府部署方畧較諸將程期論罪輕重覆首功虛實策賑濟防禦諸便宜議上報可聞者謂千鈞一發賈志牛惟炳字承庵曲周人萬厯甲戌進士選給事中陜西荒旱惟炳以封王入境見餓殍枕籍即馳疏請賑發銀五十萬差官賑濟畿輔志陳良知山東莒州人舉人任延寧糧儲郎中釐剔侵牟以時給放清苦恬淡稱一時廉吏賈志顧言江隂人萬厯壬辰進士以戸部郎督延寧糧儲往時以縣官不給大司農每發金錢不能如額如期以致師不宿飽言獨力請之司農雅重言輒如其請額盈期早軍皆果腹言性廉明出納之際吏不敢緣以為奸時進青衿士講解經術學者仰若山斗以憂去延安府志王家禄黄岡人舉人戸部員外郎榆林督餉逆闖臨城家禄拊循士卒分調芻糧乗騎下城聞賊入即拔一卒小刀自刎未殊衆扶上馬或來吿曰賊已有約降者不死家禄于馬上唾之曰吾丈夫也豈降賊者耶更策馬至上帝廟前索所佩刀剄死延綏鎮志按勅使雖無專寄然勞勩克著地方實受其福明大理少卿永興曹璉御史金華章聰又皆以參贊軍務至延綏軍民賴之亦一時之選也監司五代馬全節字大雅大名元城人歴金州防禦使廢帝時蜀人攻金州州兵纔數百全節散家財與士卒堅守蜀人去五代史本傳宋張暉幽州大城人宋初遷華州團練使在郡有治狀建隆二年朝議伐蜀遷鳯州團練使兼縁邊巡檢壕砦橋道使暉盡得山川險易密疏陳之太祖大悦乾德二年大軍西下暉督兵開大散闗路躬撫士卒且役且戰人忘其勞宋史本傳鄭文寶字仲賢福建寧化人授陜西轉運副使許便宜從事㑹嵗歉誘豪民出粟三萬斛活饑民八萬六千口累徙河東轉運使㑹繼遷圍麟州令乗傳晨夜赴之圍解復任陜西轉運使宋史本傳王承美豐州人開寶二年授豐州牙内指揮使改豐州刺史太平興國七年與契丹戰斬獲以萬計擒其節度使韋太以獻明年契丹來寇又擊敗其衆萬餘追北至青冢百餘里斬獲益衆以功授本州團練使淳化二年來朝令歸所部控子河汊自是諸蕃嵗修貢禮頗效忠順景德初遷本州防禦使初承美内屬給奉同蕃官例至是特詔月增五萬尋請於州城置孔子廟詔可之初承美養其長孫文玉為子及卒其本族首領上言文玉曉達軍政請令襲任下蕃漢議議同以為知州事宋史本傳王禹偁字元之濟州人進士太宗時謫商州團練副使惟種蔬自給賈志薛顔字彦囘河中萬泉人遷河東轉運使徙陜西河中浮橋歳為水所敗顔即北岸釃上流為支渠以殺水怒因取渠水溉其旁田民頗利之坊州募人鍊礬嵗久課益重至有破産不能償者顔奏罷坊礬則晉礬當大售後如其策仁宗即位知耀州部有豪姓李甲結客數十人號没命社少不如意則推一人以死鬭之積年為鄉人患莫敢發顔至大索其黨會赦免特杖甲流海上餘悉籍於軍宋史本傳曹儀字晉臣以祖彬䕃補右班殿直累擢至耀州觀察使初儀知邠州有吿弓箭手都校李文扆將叛者朝廷命儀察之文扆習知蕃漢事邊人多畏伏其後帥府以為腹心李父瑋在邠亦所委用儀明其不反益信任之邊人莫不感悦隆平集包拯廬州人除陜西轉運使奏罷斜谷務造船材木十萬及罷七州河樁竹索十萬隆平集明鎬字化基密州安丘人中進士第知同州未逾月會元昊寇延州起為陜西轉運使虜破金明砦既去議修復其城帥臣擁兵不即進鎬以百餘騎自督將士一月而成又常閲同州廂軍得材武者三百餘人教以強弩奏為清邊軍號最驍悍其後陜西河東頗倣置之鎬所至安靜有體而遇事不茍為世所推重宋史本傳張存字誠之冀州人舉進士為陜西轉運使黄德和之誣劉平也存奏言平與敵接戰自旦至暮殺傷相當因德和引卻以致潰敗延州孤壘非平解圍其城必不守身既陷没而又為讒狡所困邊臣自此無復死節矣朝廷始遣文彦博按治由是平得直而德和誅宋史本傳范祥字晉公邠州三水人進士及第自乾州推官稍遷殿中丞厯知華州提舉陜西銀銅坑冶鑄錢祥曉達財利建議變鹽法後人不敢易稍加損益人輒不便提㸃本路刑獄累遷提舉陜西緣邊青白鹽改制置解鹽使卒嘉祐中包拯言祥通陜西鹽法行之十年嵗減𣙜貨務使緡錢數百萬其勞可録宋史本傳李叅字清臣鄆州須城人厯知興元府陜西轉運使部多戍兵苦食少叅審訂其闕令民自隱度麥粟之贏先貸以錢俟穀熟還之官號青苗錢經數年廩有羨糧朝廷患邊費益廣叅建議輦錢邊郡以平估糴權罷入中法比其去省𣙜貨錢千萬計召為鹽鐵副使宋史本傳熊本字伯通鄱陽人慶厯進士河湟初復以本為秦鳯路轉運使奏省官百四十員減浮費數十萬東都事畧蔣之竒字穎叔常州宜興人擢進士第厯陜西副使經賦入以給用度公私用足比其去庫緡八十餘萬邊粟皆支二年宋史本傳杜純字孝錫濮州鄄城人元祐中移陜府西路轉運使入對賜服金紫闗隴控邊務繁純計度不勞閲牒訴立判情法皆當吏驚私相視曰一筆盡矣雞肋集劉韐字仲偃崇安人第進士調提舉陜西平貨司河湟兵食不繼韐延致部長出金帛易粟就以餉軍公私便之遂為轉運使夏人來言願納款謝罪皆以為詐韐曰兵興累年中國尚不支况小邦乎彼雖新勝其衆亦疲懼吾再舉故款附以圖自安此情實也密疏以聞詔許之會再請者至韐戒曰朝廷方事討伐吾為汝請無若異時邀嵗幣軼疆塲以取威怒夏人聽命西邊遂安宋史本傳郭忠孝字立之河南人登進士第靖康初為永興軍路提㸃刑獄措置保甲得勝兵三萬金人犯永興與唐重分城而守城陷死之贈大中大夫宋史本傳趙開字應祥普州安居人登第指陳𣙜茶買馬五害朝廷是其言擢進士提舉陜西茶馬事使推行之建炎二年大更茶馬之法比及四年茶引收息至一百七十餘萬緡買馬踰二萬匹宋史本傳李蘩字清叔崇慶晉原人第進士知興元府安撫利州東路漢中久饑劔外和糴在州者居多蘩嘗匹馬行阡陌間訪求民瘼有老嫗進曰民所以饑者和糴病之也泣數行下蘩感其言奏免之民大悦梁洋間繪像祠之宋史本傳陳咸蜀人字逢儒淳熙二年進士第利州路轉運判官吴曦叛臣於金闗外四州繼没人情大駭咸留大安軍督糧檄其守楊震仲振流民備四州盜衆稍安曦既誅安丙奏以咸總蜀賦從之金州地險咸增饋米以實之人皆曰金州之險金人不可向何益之為咸曰敵至而慮無及矣未幾金人犯上津守賴以固宋史本傳安丙字子文廣安人吴曦僣號丙與楊巨源李好義等謀誅之朝廷加丙知興州安撫使飭將士以攻為守威聲甚著又以沔州都統司權太重請分置副都統詔從之宋史本傳陳貫字仲通相州安陽人舉進士擢利州路轉運使嵗饑出職田粟賑饑者又帥富民令計口占粟悉發其餘宋史本傳髙稼字南叔卭州蒲江人嘉定七年進士桂如淵鎮蜀辟通判沔州尋知洋州日夜為守禦計以洋居平地無一卒以守議移金州帥司軍千人駐洋州李心傳為言諸朝不報及鳯州破置制司始從稼請調金州兵赴之而兵不時至漢中陷梁洋之民數十萬盡趨安康稼乃移屯黄金渡收散卒招忠義以制置司之命致故將陳昱於安康委以收復之任而自假節制軍馬督諸軍繼進北兵迫大安稼亟命趨沔自至西縣援之如淵遲疑不決俄報砦窠七方之師皆潰稼率遺民集保甲分布間道以保巴山未幾制置使趙彦呐以參議官辟之制置司近漢中稼言漢中蕩無藩籬宜經理仙人原以為緩急視師之地彦呐以委稼稼至原繕營壘峙芻糧庀器甲開泉源守禦之規㒺不備具會召還彦呐奏留稼知沔州利州提㸃刑獄兼參議官乃葺理創殘招集流散民皆襁負來歸北兵自鳯州入遂擣河池至西池谷自白水闗入六股株距沔六十里沔無城依山為阻北兵大至衆皆潰遂下沔州城既陷衆擁稼出戸稼叱之不能止兵騎四集圍之遂死焉詔進稼七官為正議大夫龍圖閣直學士諡曰忠宋史本傳金傅慎微字幾先其先秦州沙溪人後徙建昌慎微遷居長安宋末登進士宗弼取河南地起為陜西經畧使尋權同節度使事明年陜西大旱饑死者十七八以慎微為京兆鄜延路經濟使許以便宜慎微募民入粟得二十餘萬石立養濟院飼餓者全活甚衆改同知京兆尹權陜西諸路轉運使復修三白龍首等渠以溉田募民屯種貸牛及種子以濟之民賴其利金史本傳布薩揆本名臨喜其先上京人章宗即位升陜西提刑司舉剛直明斷獄無寃滯禁戢家人百姓莫識其面金史本傳元商挺字孟卿曹州濟隂人其先本姓殷氏避宋諱改焉楊惟中宣撫闗中挺為郎中兵火之餘八州十二縣戸不滿萬皆驚憂無聊挺佐惟中進賢良黜貪暴明尊卑出淹滯定規程主簿責印楮幣頒俸禄務農薄税通其有無期月民乃安誅一大猾羣吏咸懼且請減闗中常賦之半明年惟中罷廉希憲來代陞挺為宣撫副使丙辰徵京兆軍需布萬疋米三千石帛三千段械器稱是輸平凉軍期迫甚郡人大恐挺曰他易集也運米千里妨我蠶麥郿長王姓者平凉人也挺召與謀對曰不煩官運僕家有積粟請以代輸挺大悦載價與之他輸亦如期世祖即位改宣撫為行中書省挺為僉行省事九年立皇子䝉果勒為安西王立王相府以挺為王相十四年詔王北征挺曰延安民兵數千宜使李呼喇濟練習之以備不虞未幾圖嚕叛以延安兵應敵果獲其力元史本傳許衡字仲平河内人世祖出王秦中思所以化秦人乃召衡為京兆提學秦人新脱於兵欲學無師聞衡來人人莫不喜幸來學郡縣皆建學校民大化之世祖南征乃還懷學者攀留之不得從送之臨潼而歸元史本傳馬亨字大用邢州南和人亨從世祖征雲南留為京兆𣙜課所長官京兆藩邸分地也亨以寛簡治之不事掊克凡五年民安而課裕中統元年遷陜西轉運使時阿藍答兒等叛亨與廉希憲商挺合謀誅劉太平等悉定闗輔尋建行省命亨兼陜西行省左右司郎中時興元蓄糧五萬石欲轉餉大安軍計傭直萬緡衆推亨往時丁内艱以攝省府事強起之至則以兵官丁産均其役不閲月而事集無勞民傷財之嘆四年遷陜西五路廉訪都轉運使元史本傳田季字策卿京兆人至元初為金洋觀察副使應事合程度吏民畏懷撫慰校卒尤加恩厚馬志姚燧字端甫洛陽人至元七年為秦王府文學未幾授奉議大夫兼提舉陜西等路學校十七年除陜西漢中道提刑按察司副使録囚延安逮繫詿誤皆縱釋之人服其明決元史本傳暢師文字純甫南陽人至元二十四年遷陜西漢中道巡行勸農副使置義倉教民種藝法改僉陜西漢中道提刑按察司事時更提刑按察司為肅政廉訪司就僉本道肅政廉訪司事黜奸舉才咸服其公大德二年入為國子司業七年出為陜西行中書省理問官決滯獄不少阿徇元史本傳賽音布哈大德間為興元路勸農使夙興視事日晏忘歸祁寒暑雨不少休暇黜刻薄之吏嚴侵擾之罰德惠淪洽任滿歸民攀轅泣留為立去思碑賈志明陳觀字廷賔莆田人明初舉遺逸擢陜西參政陜産金歸時兒孫從容問金礦何狀觀驚曰吾待罪藩僚幸無遺汝曹戍籍足矣况金是問哉及卒妻子貧甚福建通志吴印盂縣人為鐘山寺僧太祖竒之為蓄髮授室以為山東布政久之徙陜西名山藏印才識卓異旬宣稱之後久任不還子孫因家焉馬志志按印初任山東布政馬謂印以寺僧郎補陜西布政誤師逵字九達山東東阿人自國子生擢御史陞陜西按察使旬日間決淹獄千餘人以丁憂去官名山藏王英江南崑山人貢生任監察御史陞陜西按察使以簡靜為治不事苛察賈志吴福浙江鄞縣人進士厯官禮部員外郎陞參政先是寧夏鹽池禁嚴民有一斗粟易鹽三兩者福奏許民納鹽課官為量給民甚便焉漢中牛山草竊出没福遣吏詭為樵夫持招檄抵其巢諭以禍福渠魁與脅從語曰吴公素稱長者必不欺我歸復業者三千餘人馬志何廣字公逺華亭人以明經累遷陜西按察副使精於律例時變亂成法者當大辟法家因仍凡政令改易輒以附議廣嘆曰若是則大辟者接踵矣此但為改律令者言也學士解縉聞而善之江南通志陳智字孟機湖廣咸寧人永樂丙戌進士擢陜西按察使翦猾理滯囹圄為空闗中饑岷州有造寺之役智疏止之湖廣通志王暹字景陽進士浙江會稽人厯官陜西按察司副使專督糧餉陞右布政使綜理繁劇庶務畢舉奉勅勸濟得米一百五十餘萬石嵗用居額賦之一公私賴以交濟丁母憂去任吏民請留遣官邀諸途奪情復任九載秩滿應遷朝論難其代仍俾守原職以慰陜民賈志謝孚字以誠當塗人永樂丙戌進士除御史陞陜西副使所在有聲中貴有事經咸陽所至望塵迎謁孚獨長揖不少屈不終事而罷遂致仕歸江南通志陳正倫江西吉水人永樂進士累遷陜西按察使豪猾斂跡不敢以故智自逞楊文貞最重之稱為畏友西江人物志劉韶浙江餘姚人進士授陜西左參政先是陜有逋賦積嵗不能輸有司峻刑督之韶至慨然曰民困故不能輸又峻刑督之耶與其僚分行郡縣緩期勸誘之民皆感激假貸爭輸恐後陜不産碙砂而嵗有課額窘不能償咸至破家韶奏罷之洪渠水溢為民患韶設法置堰民賴以安馬志鄧棨字孟擴江西南城人永樂中進士以薦陞陜西按察使居陜十年不攜家人子弟嵗滿當詣京師吏民父老涕泣攀贈名山藏陳琰江南揚州人任陜西左參政馬志時秦府有羊三千寄牧民間每嵗徵羔千餘不勝其擾琰至上疏言秦府有軍校牧地宜自牧供用不宜擾民朝廷從之雍大記夏希純名寧以字行江西豐城人永樂進士歴陞陜西右參政振綱紀恤民隱調度邊餉覈斷民田皆井然有法西江人物志年富字大有懷逺人永樂中舉人英宗初陞陜西右參政薦都指揮馬麟李榮可屬兵事為陜人上疏乞罷織駝毼之役皆得施行富峻厲敢為人號閻王時三邊士馬衆盛供費浩繁民苦轉輸豪猾因縁為奸利廷推富總理邊儲富至酌逺近定徵科鉤考出入豪猾亡所為奸正統九年陞河南右布政名山藏巡歴郡邑察民隱革奸弊興學勸農尤嫉贓吏雍大記富按世法録本姓嚴籍訛為年湯性方字行素廣東花縣人舉永樂甲午鄉薦正統初阿台多爾濟勒巴數為邊患上命兵部尚書王驥行邊以性方才畧可用遷陜西行軍副使從驥及侍郎柴車僉都羅亨信等禦敵塞外調度有方每遇功賞必覆騐而後行無冒濫者以親老吿歸廣東通志林時字學敏莆田人永樂進士厯陜西按察僉事寧夏甘涼地寒少布嵗發鳯延等府粟以餉卒時奏聽民與卒自相對輸大布一端抵粟一斛中布三端抵二斛至今便之福建通志尹鏜浙江平陽人舉人永樂中陞陜西按察副使值闗中旱民多流離鏜舉朱文公救荒四政行之民賴全活馬志韓士竒山西繁峙人任陜西分巡闗内道擒逆賊定山等五百餘人誅其渠首五十七人餘脅從者皆釋以薦陞本司副使馬志鄺埜字孟質宜章人永樂九年進士十六年石州人吿變擢陜西按察副使勅埜以便宜會官軍勦滅埜至察吿者乃反獄亡命者妄言冀脱死聞上止弗問誅誣者而己宣德四年陜右大饑檄行諸郡縣曰此莫非吾赤子有分土無分民令移粟相賑焉埜久留陜不遷轉刑簡政清陜人甚德之五年以外艱去明史竊本傳埜端介清謹其按察陜西也嘗以俸市一絨褐寄父父貽書責埜何處得此褐者得毋以不義汚我乎埜自是益勵清操廉平録饒安字用中江南崇仁人永樂進士由庶吉士出為陜西僉事三秦故艱於水安為開便河十餘里導水至城下民皆德之勢豪占軍田四千九百餘頃奪以還屯西江人物志張楷浙江慈谿人永樂甲辰進士宣德間陞陜西按察僉事尋陞副使同王驥巡邊上安邊十二事多見采用名山藏莊觀字居正南直歙縣人舉人正統初擢陜右提學僉事秦疆遼濶觀嵗一躬莅必得實才以故八郡士子爭先奮勵崇向禮教秩滿例得陞大學士王文時以都憲出鎮闗中特奏陞本司副使仍董學政賈志白圭字宗玉北直南宫人進士歴陞陜西按察副使舊多滯獄比至鞫得其情悉斷遣之民有掠官糧為食者有司置之法惻然曰民饑至此不幸也若拘於法不勝死矣杖而釋之賈志何自學江西金谿人宣德進士由刑部主事厯陞陜西按察使繫囚纍纍自學審閲旬日囹圄一空屢任法司洞識大體時論稱之西江人物志梁覲字廷實山東東平人正統鄉魁授御史按陜西尋擢陜西副使控制要害懷來撫輯民得安業漢中人感德祠之萬姓統譜許彬字道中山西寧陽人進士天順間左遷陜西參政彬侃然任事毎於諸司濡忍不前者奮意行之賈志胡靖字汝寧江西德興人進士授御史轉陜西僉事時值寇亂邊務方殷靖措置嚴密境内寧謐西江人物志魯能字千之廣東新會人景泰甲戌進士官陜西布政使闗陜重地戎馬十數萬糧餉百需皆取給於藩司能有心計所歴山川阨塞屯堡要害儲積多寡兵馬強弱無不周知創會計堂出納損益咸得其當自是備邊休民皆能力也廣東通志楊璧字應奎當塗人景泰甲戌進士除陜西參政鑿延安河溉田七千餘頃毁寶雞尼庵焚内史異術人皆服其持正江南通志王朝逺名漢以字行江西進賢人景泰進士授御史陞陜西按察副使尋陞按察使嵗饑奏免税糧及弛茶鹽諸禁民賴全活江西林志謝綬字維章景泰進士由郎署參政陜西築堤引流民受其利江西林志梁璟山西崞縣人天順甲申進士以兵科給事中擢陜西右參政徧履所部詢民疾苦察郡縣吏職得牧民體進右布政敷惠勤事在陜前後十五年民皆稱之馬志胡欽北直慶雲人陜西參政分守延慶嘗與巡撫馬文升相度險阻考按遺跡增築馬嶺木鉢等城葫蘆泉石等堡洞為禦敵安民之計賈志孫仁字世榮南直貴池人進士初知西安府治行異等遷陜西右參政所部涇陽縣舊有洪口堰山髙水下不利灌溉仁命鑿山引流人咸利之尋晉右布政時流民移聚漢中渙無所統都憲原公奉詔撫安之仁共贊其事加意輯寧後陞右副都御史巡撫寧夏賈志朱英字時傑郴陽人正統十年進士為陜西參政成化七年遷左布政用均徭法民便之名山藏戴珊字廷珍浮梁人天順八年進士成化中奉勅督南畿學政陞陜西按察副使仍專督學居陜日久待士益親士亦愛慕之名山藏珊成化間為陜西按察司副使提學敦本興化凡試士能以文藝占器識珊所至有聲績而學政尤著闗中耆舊至今道之不衰雍大記珊督學陜西遐陬僻壤未嘗不到修古聖賢祠廟增秩祀典聞民間節孝事即奏旌其門懷麓堂集婁謙字克讓江西上饒人進士提學副使立教以務本為先時汪直勘事至陜謙絶不與接修復三原正學書院王端毅稱其見道分明知所當務賈志羅明字時昭福建南平人成化丙戌進士厯陞陜西副使治漢中漢中多深山茂林為逋逃藪明奏立白河縣安輯之尋以嵩洛竊發銀礦因誣連平民論死者四十餘人明為辨雪止坐三人遷本省按察使值嵗饑人相食明力求拯濟條救荒二十事上之多所施行賈志朱漢字景雲髙安人成化進士厯陞陜西副使兵備漢中風裁凛然奸貪斂手盜賊屏迹民至今懷之嵗時報祀西江人物志張淮湖廣襄城人進士巡按陜西清慎剛介請託不行後陞陜西布政雖事稱繁劇而剖決如流馬志淮歴御史巡陜西值嵗祲全活甚衆開金州赤崩灣灌田千餘頃居民稱利襄城志王雲鳯字應韶山西和順人成化甲辰進士任陜西提學副使馬志設四科以取士曰求道曰讀書曰學文曰治事士皆興起建書樓於正學書院廣收書籍藏之以資諸生誦覽取人首名節次文辭斥逺貪殘之徒進拔中正之士禁止僧道師巫之術其學政嚴厲不少姑息士始不堪而終直其法累官都御史雍大記𢎞治己未冬雲鳯陞陜西僉事提督學政至則學校肅清三秦風動辛酉陞副使整飭洮河邊備甲子復改提學闗中士子相賀曰王先生復來後學得依歸矣於是益自策勵吕涇野集燕忠字良臣薊州人進士以御史出按陜西風聲凜凜贓吏望風解綬執政以所親被摧折病其苛察遷陜西按察副使尋轉陜西按察使發奸摘伏如巡按時禁和買之弊裁省里甲支費三之一民有水王之謠進左布政使以簡靜為治劉瑾柄國附者瀾倒陜故鄉土尤所屬意忠獨無饋遺干謁瑾雖銜之卒莫能害及寧夏變作經畫有素食足而民不勞賈志劉道立字成已杞縣人進士初授朝邑令有刺客殺人而逃誣及無辜已成獄矣覆勘疑之忽若有神附耳言曰景陽殺人奈何寃及他人耶道立遣人密伺果得所謂景陽者一訊立服邑中號為神明以治行最召拜監察御史時劉瑾虐焰傾中外獨毅然不屈尋陞陜西僉事以剛正不善俯仰百姓畏愛而當途嫉之累疏乞休歸賈志宋璉字汝器北直清苑人舉人以御史按闗中墨吏皆望風去釋被劉瑾誣陷者數百人因諫被譴歸後起湖廣僉事調榆林却餘金萬計給軍士榆林人甚戴之賈志李昆山東髙密人進士正德初以按察副使分巡漢中時流寇嘯聚掠漢中勢焰甚熾昆督兵討之至西鄉僉曰不宜遽進昆曰賊過河不可當矣乘其半渡擊之親冒矢石至瓦房溝大破之斬首千餘賊遁去賈志盛應期字思徵江南吴縣人進士累官陜西左布政鎮守宦官廖鑾漁奪民財侵盜官帑有司莫敢問應期以法剪其羽翼廖不懌思中之檄督造絨罽費且巨萬應期按籍知廖前侵費數萬乃持數以示廖廖惶恐跪謝遂不敢復造時武廟將蹕榆林衆洶洶議加賦應期持不可請於正賦内以丁糧為差出米銀若干聽准來嵗賦入數民不知勞扈從諸倖氣焰薫炙撫監重臣無敢吐氣應期獨暇整不為懾請求皆裁以法時司徒李承勛在行間嘆曰承勛自謂男子乃今知不逮矣上亦亟稱為良佐才後陞右副都御史巡撫四川賈志李承勛字立卿湖廣嘉魚人進士歴官陜西布政使敦本務實率以儉約下和買之令禁無名之役一時弊政盡革賈志安惟學山西臨汾人進士任陜西左布政使勤厲敏給日無滯事所在下人不能為奸賈志何景明字仲黙河南信陽人進士授中書舍人陞陜西提學副使教人先德行道誼條約精密時知府有不受約束者語之曰君子不以作人為事但與俗吏伍耶其人頓服有同知臨盩厔加刑生員之父生員救之坐以擅入公門罪乃檄而數之曰子救父死且不避乃以不應罪之耶生員獲免當大比方伯移檄減舊額以節費報之曰國家求賢本意似不如是竟不從取士於書院日論説六經嘗曰縁枝葉忘尋本根此末學之弊馬志陜西邊絶河湟縁邊數縣路出塞外舊時提學難之皆調試諸生先生曰如此是棄之矣竟往試如他縣藍田大旱其山上有泉先生登山投祭文泉中須臾大雨商州學地狹旁有王母祠大官家廟州人神其祠先生顧謂守官俱毁之大官家亦不敢怒陜西屬所試諸生竒者悉取正學書院親自督教間出俸錢贍所不給闗中得人於時為盛竟以學政勤勞得心疾吿歸行李蕭然至家卒何大復行狀朱應登字升之寶應人舉進士楊一清掌銓政擢陜西提學副使一清故嘗督學闗中創有正學書院以造多士應登拔士之髙等者作養其中英賢雲集凡數百人風教大行人材聿興視一清時尤盛明史竊本傳張禴北直平谷人正德七年由進士任潼闗兵憲時值李午之亂禴率兵𠞰賊斬首百四十有竒擒百五十人延恩祠記建東西重門都元敬集闗設兵道自禴始潼闗衛志陳鼎山東登州人進士正德中以陜西右參議撫治商洛時礦賊馬隆聚衆刼掠聲振三輔鼎率官兵討平之擢副使兵備延綏撫禦有方陞浙江按察使賈志陸杰字元望浙江平湖人進士歴遷陜西鄜延兵備副使賊兵大入杰督兵出戰斬戮甚多寇數嵗不敢近邊賈志張仕隆河南安陽人進士嘉靖初為闗南副使時漢中為民害者有五狼八犬一虎一彪之謠隆按得其實即寘於法問民疾苦嚴禁科索一時墨吏望風解組山南礦徒為盜召其首諭以禍福諸盜解散又開紅花堰溉田興學課藝科第始盛卒於官士民思之漢中府志張原明字孟復河南儀封人正德中進士厯陜西右布政使壬辰闗輔大饑公督理賑濟間闗秦隴間數月衣履俱穿活人以數萬計事聞賜兼金綵幣勞之改浙江未幾再進陜左使闗中人慶若更生年餘疏乞歸儀封縣志劉麟字元瑞上元人進士正德中西安知府居官清簡時都御史陳壽咸寧知縣何亮號三廉累官陜西右參政屬闗内饑敵數入掠朝遣貴臣督兵議軍餉將加賦秦民諸司莫敢持麟曰不可靖邊本以為民今若此恐内難作亦同寇也貴臣變色曰憂民者獨參政耶適陜西有赴闕陳訴者命下麟具陳不便議乃得寢於是覈侵漁括逋負邊用得不乏擢雲南按察使賈志徐萬璧四川大竹人嘉靖癸未進士歴官陜西兵憲上籌邊奏議邊境賴以保障有罪囚不應死與御史爭之不得投劾歸養四川通志葛守禮字與立山東德平人嘉靖進士陞陜西右布政轉左秦王以牧地故利民田立石壟上民爭訟不決守禮仆壟石田復歸民名山藏孟霦山西澤州人進士任陜西督糧道明敏廉介剛柔交濟督儲有方每師行糧餉充裕臺體肅然賈志陳儒字𢡟學錦衣衛人進士厯官陜西右參政庚子秋敵入原州儒以兵從尚書劉天和督戰擒斬甚衆欽賜銀幣郃陽令以炮烙刑誣服盜罪枉死者五六輩前按察使直之令嗾御史劾按察使落職儒執令下獄令復乞幸臣祈免儒笑曰吾得正國法雪民寃足矣寧殺人媚人耶獄成令罷黜誣者得釋詔復前按察使官而御史以失法降外任賈志王湘字大清濟寧人進士遷陜西按察副使妖徒李一正聚衆吏莫能制湘授方畧遂殱之賈志薛應旂字仲常南直武進人嘉靖十四年進士兵備鄜延去延之日軍民父老號呼攀援襁屬於道車不能前名山藏汪尚寧南直歙縣人進士任潼闗兵備副使風采最著先是鄞縣周相任兵備葺潼闗廟學山隂何鼇任兵備建潼闗南北水闗歴久傾圮尚寧至復修舊蹟並建東西城樓去之日行李蕭然祀名宦潼闗衞志聶豹江西永豐人兵備潼闗有直節時閹官在闗𣙜税為地方患豹揭叅被逮是日玉皇觀風穴白晝飛沙障天人驚異之祀名宦潼闗衛志邊詢任丘人進士兵備潼闗法紀嚴峻揭叅暴横衞弁七十人時羅侍郎清丈屯田擾民詢力抗之又濬河夫役工食以闕官半俸餘糧給之民戴其德潼闗衞志范懋和四川富順人由進士兵備潼闗嚴除蠧役出贖金建城舖五十一所時韓邑山寇蒲渭桀盜華洛礦徒悉就蕩平暇則校課諸生祀名宦潼闗衛志張大用四川岳池人嘉靖中進士陜西按察司僉事奉勅長城建鎮朔樓工成陞副使有太監壞鹽法立劾罪之一道肅然四川通志李臨陽四川江津人性貞亮由進士擢陜西按察使去之日士民遮道送之士大夫為著貞惠録四川通志李攀龍字于麟山東歴城人嘉靖甲辰進士擢視陜西學政攀龍謂陜右西京也乃教諸生以秦漢之文古學興焉賈志攀龍鄉人殷至為巡撫以檄致攀龍使屬文攀龍不懌曰副使而屬視學政非而屬也且文可檄致耶即上疏乞骸骨拂衣東歸明史竊本傳李承式字敬甫雲中人嘉靖時兵備榆林倣古握竒六花諸法為圓機陣圖因山川形勢步騎離合首尾相應竒正相生采諸武經為弢鈐集要授諸生誦之大泌山房集孫應鼇字由甫如臯人進士督學闗中以濂洛之學自任莅政舉大體不親細務教士務實効不為虛名當時號稱得士賈志楊錦字尚絅山東益都人進士以户部郎任靖邊兵備副使創建龍圖書院威名流著子邦憲字孝徵萬厯進士亦以户部郎出知西安府有異績擢闗内兵備副使陜東大治轉補神木及榆林兩道以計擒巨盜麻四等擢左布政使延綏鎮志王世懋字敬美太倉人進士以文望推為陜西提學副使士風翕然一變凡忠孝節義搜録顯揚與士相砥礪試未竣請吿歸生儒以未竟其學為憾後遷太常寺卿賈志朱炳如字仲南湖廣衡州人進士陜西布政使寛仁有度滓塵不染張江陵當國上計入都不為贄張意不悦久之不調遂請吿去賈志許孚逺字孟中浙江德清人嘉靖壬戌進士授主事歴陞陜西提學先德行而後文藝以身範訓多士考校肅然著有四書䝉引易經䝉引秦人寶之賈志蘇濬字君禹福建晉寧人萬厯丁丑進士任商洛撫治叅議問民疾苦釐蠧清寃議行條鞭節省萬計創書院建文屏譚經校藝指示法程由是科第鵲起時礦徒趙天知等千餘嘯聚濬潜抵巢穴擒其魁士民歌頌祠書院商州志房守士山東齊河人進士任榆林道兵備副使榆俗故侈守士慨然曰不可長也下令長袖髙髻者罰㒺赦一時斂華歸實朔朢召耆老氓庶陳説孝義時詣學宫鳩集弟子員之秀者而課其藝時斗米十錢為置備荒倉至今賴之延綏鎮志蕭應宫江南常熟人進士兵備潼闗有清操南山礦徒以千金乞開礦應宫立斃杖下礦徒解散盜源以絶祀名宦潼闗衞志陳長祚福建長樂人進士以布政使兵備榆林操堅氷蘖尤悉心邊務厲兵秣馬增城浚隍每入都御史劉敏寛幕畫便宜靡不竒中報三大捷朝廷賜白鏹焉賈志王愛錦衣衛籍任丘人萬厯三十三年由進士分巡河西潔已率屬時承平日久蠧政日滋愛力除城社整輯兵士境内肅然鄜州志常守信磁州人進士備兵潼闗慈良廉潔時值嵗荒力請上臺潼倉本色折銀六錢仍以闕官半俸銀賑饑遷湖廣憲副士民涕泣遮留後有胡其俊者孝感人亦潼闗兵使值嵗荒照守信事例屯田請折每石六錢韓城撫賊賞錢千緡與俊有嫌者誣俊得賊賄酬賊千金命錦衣衛逮訊闗人泣送後得昭雪闗人竟有赴原籍候之者其德惠入人如此潼闗衞志洪翼聖字季鄰歙縣人萬厯戊戌進士四十一年任陜西提學副使嚴介自持不通交際津要咸望而自却陞光禄寺卿賈志尹伸字弱生富順人進士初知西安府廉明耿介臺省皆嚴憚之後為督學教士嚴峻請謁不行賈志劉應遇湖廣麻城人舉人崇禎二年以商州副使任闗南道時常義張板子犯漢計陷大安鎮樓櫓悉焚應遇以撫餌賊賊許之應遇曰賊受撫髙卧不虞我兵至也命遊擊解文英急乘之抵壘賊驚潰應遇宥二渠以示信兵燹後民耗什九應遇撫民訓士不倦漢人士立祠祀之漢中府志李若梓四川南充人陜西兵備道時流寇猖獗斬渠魁神一元擒普天飛以勞瘁致疾遷河南布政卒四川通志張允登漢州人進士萬厯中任咸陽令有古循良風厯陞鄜州道咸陽縣志允登崇禎四年備兵鄜州流寇陷中部夜遣敢死士銜枚疾馳至城下殺賊甚多出次甘泉降寇刼餉銀而叛允登勒兵巷戰死之士民無不流涕延安府志郭景嵩葭州兵備道崇禎間厯年饑荒流寇蝟起四年十二月甘泉賊不沾泥張存孟陷葭州景嵩死之葭州志葉廷桂號青來商丘人天啟壬戌進士崇禎五年為闗内道屢破賊渠神一魁等斬首各萬餘又圍流賊李老砦等於中部城腕中流矢足被鉛石督衆愈力卒破之遷靖逺道又破礦盜數百人又轉河西道參政修城池招降逃亡賊渠紅狼等四十人河南通志孔聞謤曲阜聖裔進士崇禎七年任河西道凡八年吏治嚴明官民憚服建修學宫以課士興才為務兵燹之餘文風克振賈志劉宇揚四川綿竹人舉人崇禎時以户部郎中任闗南道時漢中巨寇羣起兼以饑饉宇揚辦餉辦賑晝夜乗城督守者一年危疆獲安兵荒後多方撫懷以勞卒於官䘏贈太僕寺卿柩歸百姓哭泣走送者十日漢中府志吕大器四川遂寧人進士崇禎十一年以吏部郎出為闗南副使闗南夙號盜藪招募鄉勇以俸金鑄錢為射的中即賞之人皆競奮陽平闗為秦蜀咽喉遣工繕葺寇聞逺遁演武之暇尤重課文遴孝廉及青衿之雋者月較三藝以是兵火相仍不廢絃誦時兵寇比劇為患渠帥弗能禁大器獨治主兵者使之氣懾兵不敢譁漢民以靖陞寧夏巡撫張兆曾雲南人舉人崇禎十一年以隴右參議署分巡闗南道道上聞軍婦哭聲詢之曰貪弁科役酷貪無措耳下車按實禠其職時巨蠧私相謂曰曾代庖官五日京兆耳曾不少貸旬餘公署肅清漢中府志賈鴻洙字孔瀾北直清苑人進士由户部郎厯陞陜西提學叅政為政持大體廉而平教士如子弟衡文片善皆録故士無冒榮茍進者賈志馮敬舒字圓衷浙江慈谿人天啟二年進士厯陞陜西按察使李自成耽視秦中與撫軍合力防禦者嵗餘遷山西右布政使寧波府志周士竒鄖陽人由選貢授褒城令時流寇蜂起士竒堵禦有方調南鄭令陞知綏德州值賊衆數萬攻城士竒率城中壯士夜襲之擒其渠帥百姓被賊焚掠者悉發倉粟賑之陜督上其功遂以西安同知擢商洛道右叅議監總兵左良玉軍毎懲束士卒之不法者軍中肅然湖廣通志郭應響字希聲福清人萬厯丙午解元擢兵備榆林道經鄜延適前道某為賊害於甘泉人人震恐督撫久廉應響名強留之署應響欣然受命以鄜為三秦咽喉一發擒斬賊魁無筭賊因欲甘心於鄜糾衆三千餘間道潜入應響聞警仗劍出署四顧無鋭卒可呼乃急領家丁六七人詣北門而賊已集獨力與抗尚手刄三賊衆寡不敵竟以身殉事聞贈太常寺卿予祭𦵏䕃䘏諡忠烈福建通志劉三顧山東海豐人舉人崇禎初知洛川性嚴介有邊才固封疆緝盜賊尤崇文教尋陞知府時賊益猖獗所至攻陷三顧練勇壯繕城塹多方設備率衆守禦間出民兵殱其渠魁又請減練餉民賴以甦陞監軍道畫策設伏毎戰輒捷總制洪承疇倚為左右手延安府志楊彤庭鹽山人崇禎十五年由舉人分巡河西保障一方捐俸創修西山寨最稱險固州人賴之鄜州志喬遷髙山西定襄人山西志載喬遷髙綏冦紀畧紀事本末咸作喬元柱今從省志由進士厯知府署潼闗道事監總督孫傅庭軍孫于河南失利退守潼闗遷髙分捍南城城陷挺身巷戰大呼曰我監軍道喬遷髙也力殺數賊而死子諸生象觀同妻史氏俱自縊續表忠記黄絅字季侯光州人進士厯陞陜西按察使絅生平清介自矢讀書至忠孝大節輒呼浮大白擊節嗟嘆及膺寇難誓以身許國西安破義不受辱自沈於井妻王氏同殉後贈太常寺卿諡忠烈續表忠記黄世清字澄海山東滕縣人進士崇禎十二年任商洛撫治叅議癸未十月十二日闖寇李自成分十萬衆寇商世清與士民決意堅守越十五日城陷執世清欲官之厲聲大罵賊怒殺之商州志以按紀事本末李自成十月戊辰陷商州世清不屈死之考戊辰十月初八日也與州志異都任字𢎞若祥符人萬厯間進士備兵榆林時賊勢甚熾所至崩潰任以延綏重鎮預為守禦計適舊撫去鎮將倡逃人鮮固志任涕泣勸諭勉以忠義賊遣人誘降即斬之以徇賊數萬薄城下百道攻擊任隨機摧之復簡壯士夜斫其營賊大潰斬首數百級賊益憤攻圍愈急有為賊作内應者城遂陷任率衆巷戰力屈被執賊帥曰若固好男子茍降無憂富貴也任怒罵不絶遂遇害賈志崇禎十六年十一月李自成陷延安發金數萬招榆林諸將以大寇繼之備兵副使都任及故總兵王世顯侯世禄侯拱極尤世威惠顯等斂各堡精鋭推世威為長乙未賊四面環攻城上強弩叠射賊死屍山積更發大炮擊之賊稍却死者數萬人賊攻益力逾旬不克賊以衝車環城穴之城崩數十丈賊擁入城遂陷副使都任闔家自焚死尤世威縱火焚其家口揮刃突戰死諸將各率所部巷戰殺賊千計賊大至殺傷殆盡無一降者闔城婦女俱自盡諸將死事者數百人紀事本末按監司以承流宣化為事尤直省要職也元有陜西僉事杜思敬失其籍明有陜西布政使宋禮洛陽人譚溥昌邑人李祥河間人王勣稷山人陳道番禺人田彭馬邑人王儼華容人劉曰材南昌人楊最射洪人叅政蔣瑤歸安人陜西按察使劉迪沂州人石璞江南華亭人張邦教蒲州人劉不盈清苑人梁鼎賢河南人分守道王士嘉武城人楊善歸安人陶銓絳州人王嵩汲縣人王鑾襄城人劉景寅南溪人蔡天祐睢州人易瓚福寧人黄鄉益都人邵錫安州人謝存儒蒲圻人胡建長垣人譚棨涪州人李延康長治人姚九功襄垣人張芉南充人劉天衢廣濟人劉致中延津人李𢎞道襄陵人李天麟山東武定人周思敬麻城人吴顯漳浦人習孔化廬陵人分巡道宋性德州人于守禮萊陽人孟準遼州人孫逢吉渾源人徐竒石門人金濂江南山陽人毛思義陽信人徐文華四川嘉定人羅善安福人秦文臨海人吕和寧波人丁致祥武進人隂武鄉内江人隂東暘汲縣人李維禎京山人李橒鄞縣人蕭察汝陽人萬自約太原人趙健涇縣人徐順明杞縣人趙楫浙江山隂人邢雲路安肅人袁謙西充人寗化龍直隸新安人詹思謙常山人黄和兖州人馮盛明涿州人張維世太康人李春茂陽城人髙邦佐襄陵人錢天錫沔陽人顧大章常熟人張國銳侯官人包起鳯南陽人録其姓氏凡以補前傳所不及云本朝袁生芝良鄉人崇禎丙子舉人順治三年官商雒道山冦賀遥期攻商州生芝設守甚力時協守者為總兵金某賊宣言有縳獻金總兵者即解圍去城中惶惑生芝集諭士民鼓以大義堅守踰月城陷生芝自縊死父某亦戰死闔門被害者三十二人事平䘏廕有加馮如京代州人恩貢順治二年官靖邊兵備副使時巨冦黄色俊以闖孽嘯聚進逼靖邊如京料民兵得數百人登城固守伺間出竒擊之賊大敗遂乗勝擣巢滅賊而還事聞賜賚有加王希舜遼陽人貢生順治四年任西安知府五年陞分巡河西道寛簡愛民知無不為王永強作亂仗節不屈死之事聞褒䘏贈廕楊可經直隸通州人拔貢順治二年任漢中知府聞賀冦將犯境與同知董應徵推官原體䝉協謀固守預備芻糧以待冦至軍儲既足血戰匝月城卒無恙四年可經陞商洛道副使應徵代為知府應徵正定人體䝉陽城人應徵後陞本省糧道體䝉亦官知府夏廷印廣寧人官神木副使以清恪名順治五年髙有才之變慷慨赴難死於府谷事聞贈太僕寺卿石鳯臺陽城人天啟乙丑進士初授韓城令調停驛站民力獲紓順治六年擢闗西分守道䕶理陜西巡撫事時冦黨未靖鳯臺多方防禦省㑹獲安其生平宦蹟秦省居多凡所設施必寛嚴相濟允稱古之遺愛張國泰字大來直隸新城人崇禎癸酉舉人順治六年任商洛道㑹杆賊何士升盤據洛南出没州東横肆刦掠國泰親𠞰之陣擒賊黨雷登髙士升走伯牙山國泰誓衆圍之旬日士升從間道走匿盡獲其頭畜子女以歸八年國泰以陞任去内鄉許宸繼之遣材官李政持檄招撫時士升與王友合營負固不下宸用間諜計俾友縳士升以獻置之法州境始寧宸内陞通政司參議田厥茂字心耕蒲州人順治丙戌進士七年以參議道督學陜西絶苞苴嚴請託公明大著西安書院中舊有正學名臣二祠兵燹後祗存遺蹟厥茂志存復古購隙地重建在任三載表揚忠節名教賴以維持後陞福建布政使于時躍奉天人順治八年任陜西按察使明允如神每聽斷兩造對鞫片言承伏有于不落店之謠一時豪強斂跡官吏各相戒勿犯法劉景雲深州人順治丙戌進士十一年以兵部郎中授闗南道時方革餉司以餉事歸道景雲出納惟允召買之役調劑得宜漢南咸被其澤隨擢廣西參政秦才管南陵人順治丁亥進士十二年以僉事道督學陜西正文體恤士𩔖識拔皆名宿先後登春秋榜甚衆試乾州適母訃至痛哭絶粒而卒婁應奎寧逺州人拔貢順治十二年為闗南道才畧優長心術愷惻時鎮臣派民供糧養馬應奎條奏興民被害狀甚悉得㫖飭禁州民感佩遷靖邊副使陳爌字公朗孟津人順治丙戌進士歴官山東右布政使順治十五年陞陜西左布政使十六年入覲條奏五事大畧言秦民之困宜加軫恤而延安地畝折正一事尤屬要務延屬土瘠民貧舊例四五畝折内地一畝起科自興屯道白士麟暨同知髙應選督墾荒地按畝報加五倍前賦爌疏入得減延民頌之先爌父中丞名惟芝者嘗為延之洛川令爌因深悉延民之苦及任秦藩遂得其志在任三年省事寧人與民休息以積勞卒官湯斌字潛菴睢州人順治己丑進士任潼闗兵備道兵燹後人鮮知學斌至葺文廟舉鄉飲朔朢宣講聖諭誨誘諄切民皆向化嵗旱䖍禱甘霖立應㑹二麥歉收民願以米代輸州縣吏格於成例斌力為申請兵民兼濟潼闗介秦豫之交民有種鄰壤田者仍服本省役豫民恃斌為鄉人欲使秦民充豫省徭役斌嚴斥之悉令如舊豪猾害民廉實輒斃杖下馭兵尤嚴整有法尋擢江西嶺北道仕至工部尚書雍正十年入賢良祠錢受祺字介之錢塘人順治壬辰進士十八年任商洛道清操率屬撫慰殘黎民得休息時鄖陽未靖鄖撫檄商洛運軍需貯洵陽以待軍行受祺支應有法各屬咸賴焉葉映榴字蒼巗江南上海人順治辛丑進士歴任陜西提學道訓士以立品為主毎按部虛公考校被落者悉無怨言三秦士子經明行修風氣日上後督糧三楚值夏逢龍作亂死之勅贈工部右侍郎諡忠節祀名宦祠髙光祉寧晉人進士康熙六年擢榆林道整飭邊疆興屯立學兵民安之十四年朱龍變起五月自定邊進逼榆林光祉倡率紳士共結忠義社晝夜乗城協力堅守賊覘知守禦完固撤兵逺遁孤城得全八月以陞任去有紀功碑具載其事楊三知字筠伯良鄉人順治丙戌進士康熙十一年補神木道滇黔煽亂邊將朱龍應之人情洶洶三知方代覲歸行次保德或曰事急矣公無渡河三知不聽既抵署日夜為守禦計無何守將孫崇雅潛通賊賊至執三知於城上逼取勅印不與賊擁之至署三知急趨井旁擲身入折左肱幾殞賊急縋人負之出復甦三知知不能死遂大罵賊賊閉之一室誘之降不從賊怒遂遇害其妻與妾及二女俱赴井死時神木知縣孫世譽正紅旗人賊執欲降之不可因羈深室中大兵將至遂為賊所殺事聞贈三知光禄寺卿世譽布政司叅議胡昇猷字允大丁亥進士順天大興籍浙江山隂人由部屬累任監司廉幹有聲康熙十一年轉漢興道十三年吴逆變起時昇猷已陞江蘇按察使因軍興奉特㫖仍留原任漢中既為川省咽喉又係吴逆舊駐之所賊黨遍布人心皇皇昇猷慷慨振勵以死自誓并以吴逆之罪神人不容殱滅立至鐫石布吿兵民於是咸知大義無不感奮從命固守數月以力竭城陷被執械致成都獄中賊黨誘説百端必欲降之不從篐腦椎脛備極毒脅昇猷亦終不少屈曰吾唯有辦一死以報朝廷而已幽囚六年及勇畧將軍趙良棟入成都始得出事聞即授為四川按察使洊陞至刑部尚書孔興釪曲阜人康熙庚戌進士十九年任潼商道甫下車即赴畧陽督造運艘運糧陽平闗調度得宜不勞民而事集嵗大饑興釪罄囊糴粟計口散賑全活甚夥潼民多叢奸健訟興釪廉得之立寘於法葺學宫建義學註釋聖諭刋刻頒行民知向化自奉極約人不敢干以私嘗署藩篆氷操益勵二十二年卒官貧不能殮僚屬爭致賻歸其襯許孫荃字四山合肥人康熙庚戌進士歴户部郎中出督陜西學政廉明審慎風尚一新丁卯秋闈中式者皆兩試前茅士孫荃行部所至凡遇前賢名蹟必捐貲修復力為表章其後裔之賢者悉拔置膠庠以示鼓勵四方遊士以貧故留滯秦中所在為置公養一時名宿如郿縣李栢朝邑王建常扶風張子瞻渭南劉懿宗淳化宋振麟咸式廬遣幣講布衣之好李顒屢辭徵命居貧教授孫荃欲買田以贈知顒義勿受檄盩厔學博代購之不以吿並刻其所著書行世陜西地亘三邊孫荃征車遍厯懷人覽古一一寄之於詩太史李因篤為論定得如千巻名曰華嶽集論者謂闗中學使前有敬菴後有四山稱二許云李時謙大興人順治辛丑進士康熙三十一年以叅議任陜西糧道值嵗歉時謙悉心籌畫賑濟有方民懷其惠西安多徵糧積弊時謙莅任斗斛俱準部式出納無絲毫羨餘性勤慎尤甘淡泊僕從數人皆不勝清苦而去卒之日貧無以殮同官為致賻歸襯焉金培生奉天正白旗人康熙四十年由鳯翔知府擢潼商道四十二年車駕西巡培生修繕帳殿平治輦路指揮悉當其督修嶽廟及築城浚隍諸大工經營井井事無不集尤體恤士卒莅潼三載果於釐奸慎於決獄日以興教化勵風俗為己任四十四年遷閩臬去牧守周虞子羔晉文公問於咎犯曰誰可使為西河守者咎犯對曰虞子羔可也公曰非汝之讐也對曰君問可為守者非問臣之讐也羔見咎犯而謝之曰幸赦臣過得為西河守咎犯曰薦子者公也怨子者私也吾不以私事害公説苑吴起衛人魏文侯以起善用兵廉平能得士心乃以為西河守以拒秦魏文侯卒起事其子武侯武侯浮西河而下中流顧而謂起曰美哉山河之固此魏國之寶也起對曰在德不在險若君不修德舟中之人盡敵國也武侯曰善即封起為西河守甚有聲名史記本傳起治西河之外王錯譖之于魏武侯武侯使人召之起至於岸門止車而休望西河泣數行下其僕曰公視舍天下若舍屣今去西河而泣何也起雪泣而應之曰子弗識也君誠知我而使我畢能秦必可亡而西河可以王今君聽讒人之義而不知西河之為秦也不久矣魏國從此削矣起果去魏入荆而西河畢入秦吕覽漢田叔趙陘城人為趙王張敖郎中隨敖至長安敖進言叔等十人上召見與語拜郡守叔為漢中守十餘年漢書本傳叔為漢中守既餽軍餉又致名材立宫室帝嘉之漢中府志李廣隴西人為邊郡太守徙上郡皆以力戰為名匈奴大入上郡天子使中貴人從廣勒兵擊匈奴中貴人將騎數十縱見匈奴三人與戰三人還射傷中貴人殺其騎且盡中貴人走廣廣曰是必射雕者也乃從百騎往馳三人令其騎張左右翼身自射彼三人者殺其二人生得一人果射雕者也已匈奴有數千騎見廣以為誘騎皆驚上山陣廣騎皆大恐欲馳還廣曰吾去大軍數十里今走匃奴追射我立盡今我留匈奴必以我為大軍誘之必不敢擊我廣令諸騎曰前前未到匈奴陣二里所止令曰皆下馬解鞍彼以我為走今解鞍以示不走用堅其意於是敵騎不敢擊有白馬將出䕶其兵廣上馬奔射殺白馬將復還其騎中解鞍令士皆縱馬臥㑹暮敵兵終不敢擊引而去廣乃歸其大軍居久之武帝立廣以上郡太守為未央衞尉史記本傳賈宗字武孺南陽冠軍人少有操行多智畧建初中為朔方太守舊内郡徒人在邊者率多貧弱為居人所僕役不得為吏宗擢用其任職者與邊吏叅選轉相監司以摘發其姦或以功次補長吏故各願盡死匈奴畏之不敢入塞後漢書賈復傳鄭勤漢中太守永初四年三月先零羌冦褒中漢中太守鄭勤戰殁後漢書安帝本紀崔實字子正涿郡人明於政體吏才有餘為五原太守五原土宜麻枲而俗不知織績民冬月無衣積細草臥其中見吏則衣草而出實至官斥賣儲峙為作紡績織絍綀緼之具教之民得以免寒苦是時㓂騎連入雲中朔方殺畧吏民一嵗至九奔命實整厲士馬嚴烽堠冦不敢犯常為邊最後漢書崔駰傳鄭渾字文公河南開封人遷左馮翊時梁興等畧吏民五千餘家為冦鈔諸縣不能禦皆恐懼寄治郡下議者以為當移就險渾曰興等破散竄在山阻今當廣開降路宣喻恩信而保險自守此示弱也乃聚吏民治城郭為守禦之備發民逐賊獲十以七賞百姓大恱皆願捕賊多得婦女財物賊之失妻子者皆還求降渾責其得他婦女然後還其妻子於是轉相冦盜黨與離散出者相繼乃使諸縣長吏各還本治以安集之興等懼將餘衆聚鄜城渾率吏民前登斬興及其支黨前後歸附四千餘家由是山賊皆平民安産業太祖征漢中以渾為京兆尹渾以百姓新集為制移居之法勤稼穡明禁令由是民安於農盜賊止息及大軍入漢中運轉軍糧為最又遣民田漢中無逃亡者太祖益嘉之三國志本傳吕乂字季陽南陽人少孤諸葛亮連年出軍調發諸郡多不相救又募兵五千人詣亮慰喻檢制無逃竄者徙為漢中太守兼領督農供給軍糧亮卒之後士伍亡命奸巧非一又防禁開喻勸導漏脫自出者萬餘三國志本傳魏楊阜字義山天水冀人太祖以阜為武都太守劉備取漢中逼下辨太祖以武都孤逺欲移之恐吏民戀土阜威信素著前後徙民氐使居京兆扶風天水界者萬餘户徙郡小槐里百姓襁負而隨之為政舉大綱下不忍欺在郡十餘年徵拜城門校尉三國志本傳顔斐字文林濟北人京兆太守推誠惠愛治身清白為良二千石三國志倉慈傳斐為京兆太守到官令屬縣整阡陌樹桑果是時民多無車牛斐課民以閒月取車材使轉相教匠作車無牛者令畜猪狗賣以買牛始者民以為煩一二年間家有丁車大牛又起文學聽吏民欲讀書者復其小徭於是風化大行京兆與馮翊扶風接界二郡道路穢塞田疇荒萊人民飢凍而京兆開明豐富常為雍州十郡最青龍中司馬宣王在長安立軍市而軍中吏士多侵侮縣民斐以白宣王宣王召軍市候便于斐前杖一百自是之後軍營郡縣各得其分後數嵗遷平原太守吏民啼泣遮道車不得前稽平田十餘日乃出界東行至崤疾困遂卒京兆聞之皆流涕為立碑於今稱頌魏畧晉吉挹字祖沖馮翊蓮勺人少有志節孝武初苻堅陷梁益桓豁表挹為魏興太守尋加輕車將軍領晉昌太守以拒堅之功拜員外散騎侍郎苻堅將韋鍾攻魏興挹遣衆拒之斬七百餘級加督五郡軍事鍾率衆欲趣襄陽挹又邀擊斬五千餘級鍾怒迴軍圍之挹又屢挫其銳其後賊衆繼至力不能抗城將陷引刀欲自殺其友止之曰且茍存以展他計為計不立死未晚也挹不從友人逼奪其刀㑹賊執之挹閉口不言不食而死晉書本傳馬敦守隴州羌氐犯隴敦固守孤城以少禦衆奮節全城雍州從事忌其功劾之下獄死後追贈牙門將軍潘岳為之誄隴州志歐陽建字堅石世為冀方右族雅有思理才藻美贍厯馮翊太守甚得時譽晉書本傳王連為扶風太守劉曜攻陳倉連率衆背城而陣為曜所敗死之晉書劉曜載紀武茂字季夏沛國竹邑人以德素稱為上洛太守清直方正聞於朝野晉書武陜傳南宋蕭承之字嗣伯南蘭陵人少有大志才力過人元嘉十年蕭思話為梁州刺史承之為其府司馬漢中太守氐帥楊難當冦漢川梁州刺史甄法䕶棄城走思話至襄陽不進承之輕車前行攻氐偽魏興太守薛健於黄金山尅之黄金山張魯舊戍南北險固健既潰散承之即據之薛健退屯下桃城立柴營承之引軍與對壘健與偽馮翊太守蒲旱子悉力出戰承之大破之健等閉營自守思話繼至賊稍退承之進至峨公山為沙州刺史吕平大衆所圍建武將軍蕭汪之平西督䕶段蚪等至表裏奮擊大破之難當又遣息和領步騎萬餘人夾漢水兩岸攻逼承之相拒四十餘日賊皆衣犀甲刀箭不能傷承之命軍中斷槊長數尺以大斧搥其後賊不能當乃焚營退承之追至南城連戰皆捷梁州平詔承之可龍驤將軍隨府轉寧朔司馬太守如故元嘉二十四年卒梁土民思之於峨公山立廟祭祀南齊書髙帝本紀南齊柳慶逺字文和河東解人齊初為魏興太守郡遭暴水流漂居民吏請徙民祀城慶逺曰天降雨水豈城之所知吾聞江河長不過三日斯亦何慮命築土而已俄而水過百姓服之梁書本傳梁庾域字司大新野人長沙宣武王為梁州以為録事參軍帶華陽太守時魏軍攻圍南鄭州有空倉數十所域封題指示將士云此中粟皆滿足支二年但努力堅守衆心以安虜退以功拜羽林監梁書本傳北魏索敞字巨振敦煌人補扶風太守在位清貧未幾卒官諡獻魏書本傳張應不知何許人延興中遷京兆太守所在清白得吏民之忻心焉魏書本傳髙忱字士和允子勃海蓨人位長安太守為政寛惠百姓安之北史髙允傳梁祐北地人景明初北地太守清身率下甚有治稱為平西將軍京兆内史卒官魏書裴叔業傳附柳僧習河東人景明初遷北地太守為政寛平氐羌恱愛魏書裴叔業傳附江文遥恱之子濟陽考城人永平初為咸陽太守勤於禮接終日坐㕔事至者見之假以恩顔屏人密問於是民所疾苦大盜姓名姦猾吏長無不知悉郡中震肅姦刼息止治為雍州諸郡之最魏書江悦之傳閻慶引不知何許人為東秦州敷城太守在政五年清勤厲俗頻年饑饉慶引常以家粟千石賑恤貧窮民賴以濟部民楊寶龍等一千餘人申訟美政有司奏慶引有子愛百姓之義魏書本傳髙幹渤海蓨人字干奴白水太守以廉平著稱魏書髙湖傳宇文測字澄鏡太祖族子大統八年行綏州事每嵗河氷合後突厥即來冦掠先是常預遣居民入城堡以避之測至皆令安堵如舊乃於要路數百處並多積柴仍逺斥候知其動靜是年十二月突厥從連谷入冦去界數十里測命積柴之處一時縱火突厥謂有大軍至懼而遁走自相蹂踐委棄雜畜及輜重不可勝數測徐率所部收之分給百姓自是突厥不敢復至測因置戍兵以備之十年徵拜太子少保周書本傳北周髙賓渤海蓨人有文武幹用世宗初除咸陽郡守政存簡惠甚得民和世宗聞其能賜田園於郡境周書裴文舉傳劉志𢎞農華隂人髙祖隆宋武帝平姚泓以宗室首望召拜馮翊郡守後避地河洛因家汝潁志性方重兼有武畧魏永熙二年除廣州别駕孝武西遷志舉廣州歸國髙祖嗣位拜刑部中大夫時蓮勺界内數有羣盜攻刼行旅郡縣不能制乃以志為延壽郡守督之志示以恩信羣盜相率請罪志表陳其狀詔並免之自是郡界肅清冦盜屏息周書裴果傳唐蕭瑀字時文南蘭陵人隋時為河池郡守部有鈔賊萬人吏不制瑀募勇士擊降之悉捐貲畜賜有功又擊走薛舉衆數萬髙祖入京師招之挈郡自歸唐書本傳常達陜州陜人從髙祖征伐拜隴州刺史時薛舉方強達敗其子仁杲斬首千級舉遣將仵士政紿降伺隙刼之歸賊舉指其妻謂達曰識皇后乎答曰彼癭老嫗何所道舉奴張貴又曰亦識我否達瞋目曰若乃奴耳貴忿舉笏擊其面達不為懾亦拔刀逐之趙𢎞安為蔽捍乃免仁杲平帝見達勞曰君忠節正可求之古人為執士政殺之賜達布帛三百段以達事授史官唐書本傳趙慈景隴西人帝美其姿故妻之帝起兵或勸亡去對曰毋以我為命且安往吏捕繫於獄帝平京師為華州刺史討堯君素戰死贈秦州刺史諡曰忠唐書長廣公主傳梁禮為鄜州刺史封鄜城郡公武德二年梁師都侵延州禮力戰没於陣冊府元龜李懷逺字廣德邢州栢仁人徙同州刺史治尚清簡累遷鸞臺侍郎唐書本傳姚崇字元之陜州峽石人睿宗立為同州刺史先天二年𤣥宗講武新豐故事天子行幸牧守在三百里者得詣行在時帝亦密召崇崇至帝方獵渭濱即召見咨天下事衮衮不知倦唐書本傳成大琬為同州刺史先天二年太上皇命有司頒賞諸州朝集使有善政者遂以大琬為陜州刺史賜物一百段冊府元龜姜師度魏人開元初遷同州刺史於朝邑河西二縣界就古通靈陂擇地引洛水及堰黄河灌之以種稻田凡二千餘頃内治屯十餘所收獲萬計尋遷將作大匠舊唐書本傳張廷珪河南濟源人第進士補白水尉開元初為沔州刺史在官有威化唐書本傳崔隱甫貝州武城人開元九年自華州刺史遷太原尹人吏刋石頌其美政舊唐書本傳隱甫所至潔介自守明吏治在職以彊正稱唐書本傳隱甫華州刺史吏民畏愛庭無滯訟馬志馬燧字洵美汝州人李抱玉守鳯翔表燧隴州刺史西山直吐蕃其上有通道敵常所出入者燧聚石種樹障之設二門為譙櫓八日而畢敵不能暴唐書本傳陸璪蘇州吴人字仲采舉明經補長安尉以清幹稱累遷西河太守屬邑多虎前守設檻穽璪至徹之虎不為暴唐書陸元方傳裴寛聞喜人遷東海太守徙馮翊其為政務清簡所莅人愛之唐書裴漼傳蕭賁馮翊太守至德二載安慶緒陷馮翊郡賁死之唐書肅宗本紀吕日將乾元元年為鳯州刺史嘗敗党項羌于三嗟谷馬志房琯字次律河南人乾元元年為邠州刺史始邠以武將領刺史綱目廢弛即治府為營吏攘民居相淆讙琯至一切革之人以便安政聲流聞唐書本傳蕭􅞥上元二年為鳯州刺史奴刺党項羌來冦􅞥死之馬志髙郢字公楚衞州人父伯祥為好畤尉安禄山陷京師將誅之郢尚幼解衣請代賊義并貸之寶應初及進士第為華州刺史政尚仁靜初駱元光自華引軍戍良原元光卒軍入神策州仍嵗餉其糧累刺史不敢白郢奏罷之唐書本傳李國臣河西人本姓安賜姓李大厯八年為鹽州刺史吐蕃敗渾瑊於黄菩原將畧汧隴國臣謂人曰敵乘勝必擾京師我趨秦原彼當反顧乃引兵登安樂山鳴鼓而西日行三十里吐蕃聞之自百里城囘軍踰險瑊因擊敗之唐書李光弼傳蕭復字履初改同州刺史嵗歉州有京畿觀察使儲粟復輒發以貸人有司劾治詔削階停刺史或弔之復曰茍利於人胡責之辭久乃拜兵部侍郎唐書蕭瑀傳裴向字傃仁聞喜人建中初李紓為同州刺史奏署判官李懷光叛河中使其將趙貴先築壘於同州紓奔奉天向領州務獨詣貴先壘開諭之貴先乃降同州得不陷累為櫟陽渭南令奏課皆第一擢户部員外郎唐書本傳李佐為商州刺史德宗貞元二年以能政特賜金紫冊府元龜鄭賈為金州刺史貞元十二年以賈有能政加簡較司勲郎中冊府元龜郭鋒麟州刺史賈志貞元十七年七月吐蕃陷麟州刺史郭鋒死之唐書德宗本紀李西華貞元中為商州刺史商州西至藍田東至内鄉七百餘里山阻重沓小遇暴雨則隔絶行旅或露居糧絶旬日不止則往往僵仆西華置牆立廬又徧山通偏路以避盛水自是行李不滯冊府元龜崔琮字君濟博陵人自長安令擢同州刺史嵗歉設里倉三百所賑救俗𦵏尚奢靡以致久暴骸骨琮戒諭懇至俗為頓易凡豪奪鄉惸隂持吏失朋搆訟獄者盡置以法郡城自兵後復隍殆盡琮大興版築民皆恱使忘勞不旬月城成賈志琮德宗時為同州刺史郡人多患風疾琮製藥以療之曰鎮風丹今碑尚存馬志袁滋字德深蔡州郎山人為華州刺史政清簡流民至者給地居之名其里曰義合專以慈惠為本未嘗設條教民愛向之有犯令時時法外縱舍得盜賊或哀其窮出財為償所亡召為左金吾衛大將軍以楊於陵代之滋行耆老遮道不得去於陵使喻曰吾不敢易袁公政人皆羅拜乃得去莫不流涕白孔六帖李汧公鎮鳯翔屬邑民因耨田得馬蹄金一甕送於縣署宰邑者慮公藏主守不嚴置於私室信宿重開視之皆為土塊以狀聞府遣吏按其事宰邑者莫能自白遂以易金伏罪時袁相公滋在幕中疑此事汧公曰非判官莫探情偽袁相曰諾因俾移獄府中按問乃令閱甕間三十五塊詰其初獲者即本質在焉遂於列肆索金鎔瀉與塊形等既成秤其半已三百斤矣詢其擔負人力二農工舁至縣境計其負金大數非二人以竹擔可舉明其即路金已化土矣於是羣情大豁宰遂獲雪劇談録李愬洮州臨潭人字元直有籌畧善騎射為坊州刺史以治異等加金紫光禄大夫唐書李晟傳韋繼均坊州刺史有善政民懷之不忘賈志姜公輔愛州日南人第進士為翰林學士嵗滿當遷以母老賴禄而養求兼京兆户曹叅軍事公輔有髙材毎進見敷奏詳亮德宗器之唐書本傳永貞初為金州刺史有政畧嘗奏置石泉縣舊志崔駢坊州刺史興水利以便民當時賴之馬志崔戎字可大博陵安平人舉明經調藍田主簿累拜給事中出為華州刺史吏以故事置錢萬緡為刺史私用戎不取及去召吏曰籍所置錢享軍遷兖海沂密觀察使民擁道不得行乃休傳舍民至抱持取其靴時詔使尚在民泣詣使請白天子匄戎還使許諾戎戒其下衆曰留公而天子怒不過斬吾二三老人則公不去矣戎夜單騎去民追不及乃止唐書本傳李文恱為鹽州刺史元和十四年冬吐蕃党項圍攻州城欲陷之恱防拒凡二十七日乃退十五年六月加金紫光禄大夫冊府元龜孔戣宣聖裔華州刺史奏革弊政疏救無辜帝咸嘉之舊志王凝并州晉陽人字成庶舉明經進士為商州刺史驛道所出吏破産不能給而州有治賦羨銀常㩁直以優吏奉凝不取則以市馬故無横擾人皆慰悦唐書王翊傳兀元字微之河南人出為同州刺史急吏緩民收羨財千萬以補亡户逋租復遷御史大夫賈志李景温字德已并州文水人徙華州刺史以美政聞唐書李景讓傳史憲忠建康人字元貞為隴州刺史增亭鄣徙客館於外戎諜無所伺唐書史孝章傳王龜字大年揚州人為同州刺史牙將白約素暴横嘗譁言月廩薄以動士心為亂龜捕殺之人皆震慄白孔六帖崔偉字堯封中和二年為金州刺史黄巢亂偉保守封疆民賴以安興安州志崔刺史克治厥政恪謹人神中和三年黄巢凌刼州縣有太白山人云掘破牛山賊當自敗於是發丁萬人掘之有石桶一中栖黄腰獸上横一劍獸見劍自撲而死巢至秋果敗中原克平元黄理仙崔忠惠王廟記韓建字佐時許州長社人從楊復光攻黄巢於長安巢已破復光亦死建無所屬乃以麾下兵西迎僖宗於蜀僖宗還長安建為潼闗防禦使華州刺史華州數經大兵户口流散建少賤習農事乃披荆棘督民耕植出入閭里問其疾苦是時天下已亂獨建撫緝兵民荆南成汭時冒姓郭亦善緝荆楚當時號為北韓南郭五代史本傳五代翟光鄴字化基濮州鄄城人事唐至耀州團練使周太祖入立出知永興軍卒於官光鄴臨政務以寛靜休息為意病亟戒左右無久留以煩軍府既卒州人上書乞留𦵏立祠不許五代史本傳光鄴權知京兆前政有煩苛之事一切停罷百姓便之冊府元龜王祚并州祁人從晉歴周為隨州刺史移刺商州以俸錢募人開大秦山砦梯路行旅感其惠顯德初置華州節度以祚為刺史宋史王溥傳宋尹憲并州晉陽人太宗即位擢為殿直充延州保安軍使太平興國四年䕶府州屯兵與鄜州三族改䕶夏州兵轉供備庫使殺戮三汊醜奴莊岌加羅膩葉十四族及誘其渠帥屢降詔書褒美雍熙初詔就知夏州攻破李繼遷之衆于地斤澤繼遷遁走俘獲四百餘帳奏請于所部抽移諸帳别置騎兵號曰平砦以備其用詔從之宋史本傳安守忠字信臣并州晉陽人乾德中蜀平太祖知逺俗苦苛虐南鄭為走集之地故特命守忠知興元府以撫綏之雍熙二年徙夏州毎戎犯邊戰無不捷録功就拜濮州團練使守忠謹慤淡薄為治簡靜所至藩郡樂施予豐宴犒且喜與士大夫遊從時論多與之宋史本傳翟守素濟州任城人開寶中麟府内屬戎人爭地不決因致擾亂命守素馳往撫喻守素辨其曲直戎人悦服遷商州團練使雍熙二年改知延州四年改知鳯翔府淳化中夏帥趙保忠上言其弟繼遷誘戎人為冦宜求援師詔守素率兵屯夏州守素性謹慎寛仁容衆所至有治績凡斷大辟雖罪狀明白仍徧詢寮寀僉同而後決屬吏有過不面折必因公宴援往事之相類者言其獲咎以微警之宋史本傳韓崇訓字知禮磁州武安人以貝冀等州都巡檢權知麟州雍熙中李繼遷冦夏州崇訓領兵赴援大敗之徙監夏州軍咸平二年再知麟州又敗繼遷於城下以勞擢邠寧環慶清逺軍都巡檢使宋史韓重贇傳李欣字公愉莆田人太平興國間進士厯知耀州時闗輔盜賊充斥欣陳討捕之策踰月悉平福建通志柳開字仲塗大名人淳化三年知邠州時調民輦送趣環慶已再運民皆蕩析産業轉運使復督後運民數千人入州署號訴開貽書轉運使曰開近離環州知芻糧之數不增大兵可支四年今蠶農方作再運半發老幼疲弊畜産困竭奈何又苦之不罷開即馳詣闕下白於上前卒罷宋史本傳程德元字富錫滎澤人善醫術淳化中李順冦蜀以德元知鳯州兼領鳯城等州兵馬事有戰功後入朝真宗命坐撫勞訪以邊事賈志周審玉開封人咸平初知鳯翔府有桑門乗傳而西以市木為名威動府縣審玉曰此必有所倚而為也因按詰之盡得其奸狀杖其背械送闕下宋史本傳折惟昌雲中人知府州咸平二年河西黄女族長䝉異保及惟昌所部啜訛引趙保吉之衆入冦麟州萬户谷進至松花砦惟昌與從叔海超弟惟信率兵赴戰㑹保吉兵衆不敵惟昌臂中流矢墜馬攝弓起得禆將馬突圍出海超惟信没焉九月保吉黨萬私保移埋復來冦惟昌敗走之又破言泥族拔黄砦焚其器甲車帳俘斬甚衆以功領富州刺史景德元年與王萬海等破賊砦䕶芻糧抵麟州明年拜興州刺史大中祥符七年命河東民運糧赴麟州當出兵為援惟昌力疾領步騎屯寧逺砦冒風沙行疾卒弟惟忠字藎臣惟昌卒以惟忠知府州兼麟府路都巡檢使領普州刺史進簡州團練使卒惟忠知兵事天聖中契丹與夏國㑹兵境上聲言嫁娶惟忠覘得其實率麾下往備之戒士卒毋輕動一夕風霾有騎走營中以為冦至惟忠堅卧不動徐命擒之得數逸馬葢虜所縱也子繼宣嗣州事寶元中繼宣坐黜擢其弟繼閔嗣州事繼閔字廣孝慶厯中元昊兵攻麟州不克進圍州城城險且堅東南有水門厓壁峭絶阻河賊縁厓腹微徑魚貫而前城中矢石亂下賊轉攻城北士卒復力戰賊死傷甚衆遂引去繼閔以城守勞特遷宫苑使自元昊反繼閔招輯歸業者三千餘户皇祐二年卒以其弟繼祖嗣州事繼祖字應之臨政二十餘年韓絳發河東兵城囉兀繼祖為先鋒深入敵帳降部落户八百加解州防禦使卒宋史折德扆傳崔立字本之清河人咸平二年進士知耀州事耀民氣豪喜訟號難治始至繫囚滿獄公為區判善惡勸阻明白境内以清代歸民走漆沮二水之次邀公呼曰吾之父母今焉往至羣臥灘石上使公馬不得前翌日繇間道乃得去安陽集梁鼎字凝正益州華陽人太平興國八年進士甲科淳化中度支判官建議興三白渠遷江南轉運副使徙陜西咸平四年西鄙未寧建議陜西禁解池鹽所在官鬻詔從之以鼎為制置使景德初知鳯翔府鼎磊落尚氣有介節居官峻厲名稱甚茂宋史本傳韓億字宗魏正定靈壽人舉進士知洋州有大校李甲以財豪於鄉里誣其兄之子為他姓賂里嫗之貌類者使認之為己子又醉其嫂而嫁之盡奪其奩槖之富嫂姪訴於州甲賂獄吏嫂姪被笞掠反自伏受杖而去積十餘年洎億至又出訴公察其寃因取前後案牘視之皆未嘗引乳醫為証一日盡召其黨立庭下出乳醫示之衆皆伏罪子母復歸如初辜録韓縝字玉汝億仲子嘉祐五年知洋州有惠政洋人作襲美堂以表之洋縣志酷按宋史韓縝本傳言縝暴與洋志頗異張中庸真宗時知洋州政事精明人號水晶燈龍舊志許逖祥符間為興元守府有堰溉田萬頃世傳蕭何所為逖迺治木石修之堰成嵗大豐歐陽永叔為記其事馬志趙積字表微宣城人知同州徙鳯翔京兆府宋史本傳積知鳯翔以寛大存心人不敢干以私萬姓統譜張宗誨字習之曹州寃句人為永興軍兵馬鈐轄又徙鄜延路兼知鄜州元昊冦延安劉平石元孫敗没鈐轄黄德和遁還延州不納又走鄜州宗誨曰軍奔將無所歸激之則為亂矣乃納之拘德和以聞是時鄜城不完且無備傳言冦兵至人心不安宗誨乃嚴斥候籍入而禁出使老幼併力守禦之敵亦自引去領興州防禦使復徙永興鈐轄兼知邠州以秘書監致仕宋史張齊賢傳薛向字師正河中萬泉人為邠州司法叅軍夏人叛秦中治城侍御史陳洎行邊向詣洎陳三弊言今板築暴興吏持斧四出伐木無問井閭丘隴民不敢訴必不得已宜且葺邊城函闗秦東塞今西鄉設守是為棄闗内乎三司貸龍門富人錢以百年全盛之天下一方有警即稱貸於民非義也洎上其説悉從之邠守貪沓欲因事為邪并治于城立表于市以撤屋冀得賂免向力爭罷之知鄜州大水冒城郭沈室廬死者相枕郡卒戍延安詣主將求歸視弗得皆亡奔至則家人無存者聚謀為盜民大恐向遣吏曉之曰冒法以赴急人之常情不聽若輩歸此武將不知變之過也亟往收溺尸貰汝擅還之罪衆泣謝一境乃安權陜西轉運副使制置解鹽鹽足支十年而嵗調畦夫數千向奏損其數兼提舉買馬監牧沙苑養馬嵗得駒三百而費錢四千萬占田千頃向請斥閒田予民收租入以市之為陜西轉運使凡將漕八年所入鹽馬芻粟數萬民不益賦其課為最宋史本傳劉謙字漢宗開封人知邠州鬭訟曲直皆區處當理前守者多強市民物以飾㕑𫝊謙獨無所撓邠人愛之宋史本傳劉湜字子正徐州彭城人知耀州富平有盜人子女既就擒陽死伺間逸去捕得復陽死守者以報湜趣焚其屍拜監察御史宋史本傳司馬池字和中夏縣人知鳯翔有疑獄上讞大理輒復下掾屬惶懼池曰長吏者政事所係乃獨承其罪岐陽鎮巡檢夜飲富民家所部民執之俾為文約不敢復督士卒而後釋其縳池捕首惡誅之巡檢坐廢入為侍御史知雜言陜西用兵無宿將劉平好自用必誤大事卒如其言隆平集趙師民字周翰青州臨淄人舉進士第累除龍圖閣直學士知耀州帝自寫詩寵行目以儒林舊德師民性慈恕勤於吏治政有惠愛嘗奏蠲陜西旱租宋史本傳州民有犯鐵禁者師民曰奪其利而罪之是㒺民也一切弗問馮志盧士宏字子髙新鄭人知洋州圭田多虛籍士宏考校令隨實以輸自部使者而下皆十損七八文彦博包拯以廉能薦宋史本傳魯有開字元翰參知政事宗道從子知金州有蠱獄當死者數十人有開曰欲殺人衷謀之足矣安得若是衆耶訊之則誣天方旱獄白而雨宋史本傳陳希亮字公弼青神人中進士第知鄠縣老吏曹腆侮法以希亮年少易之希亮視事首得其罪腆叩頭出血願自新希亮戒而捨之卒為善吏巫覡嵗斂民財祭鬼謂之春齋否則有火災民訛言有緋衣三老人行火希亮禁之民不敢犯火亦不作毁淫祠數百區勒巫為農者七十餘家及罷去父老送之出境泣曰公去我緋衣老人復出矣移知鳯翔倉粟支十二年主者以腐敗為憂嵗饑希亮發十二萬石貸民有司懼為擅發希亮身任之是秋大熟以新易舊官民皆便于闐使者入朝縱其徒入市掠飲食民户皆晝閉希亮聞之曰譯者教之也乃使教練使持符吿譯者曰入吾境有秋毫不如法吾且斬若取軍令狀以還使者至羅拜庭下無一人譁者遷太常少卿宋史本傳楊繪字元素綿竹人進士上第知興元府吏請攝穿窬盜庫縑者繪視蹤跡不類人所出入呼戲沐猴者詰於庭一訊具伏府中服其明在郡獄無繫囚宋史本傳李及字幼幾其先范陽人後徙鄭州舉進士擢知隴州初置提㸃刑獄内出及與張綱二人名付中書明日以綱使河北及使陜西特遷一官還判三司磨勘司出知鳯翔府徙延州及資質清介所治簡嚴喜慰薦下吏而樂道人之善宋史本傳李師中字誠之楚丘人舉進士鄜延龎籍辟知洛川縣民有罪妨其農時者必遣歸令農隙自詣吏令當下者榜于民或招父老諭之租稅皆先期而集民負官茶值十萬緡追繫甚衆師中為脫桎梏語之曰公錢無不償之理寛與汝期可乎皆感泣聽命令鄉置一匱籍其名許日輸所負一錢以上輒投之書簿而去比嵗終逋者盡足官移諸鎮粟於邊已而反之盛冬大雪勞且費至賤售予兼并家師中令過縣願輸者聽躬坐庾門執契以須數日得萬斛使下其法於他縣常出鄉亭見戎人雜耕皆兵興時入中國人藉其力往往結為婚姻久而不歸師中言若輩不可雜處言之經畧使并索旁郡者徙居絶塞龎籍為樞密副使薦其才召對轉太子中允知敷政縣權主管經畧司文字夏人以嵗賜緩移邊曰願勿逾嵗暮詔吏報許師中更牒曰如故事樞密院劾為擅改制書師中曰所改者郡牒耳非制也朝廷是之薄其過遷直史館知鳯翔府种諤取綏州師中言西夏方入貢叛狀未明恐彼得以藉口徒啟其釁端也鄜延路覘知西夏駐兵綏銀州檄諸路當牽制師中疏論牽制之害時諸將皆請行師中曰不出兵罪獨在帥非諸將憂也既而此舉卒罷師中在官不貴威罰務以信服人至明而恕去之日民遮道擁泣馬不得行宋史本傳武戡嘉祐二年知麟州州自慶厯以來夏人盜耕屈野川兔毛川莫能禁勘建議築二堡禦之由是州西五十里之内賊不敢種舊志畢仲游雲中人士安曾孫知耀州值嵗大旱仲游先民之未饑揭喻境内曰郡賑施與平糴若干萬碩實虛張其數富室知有備亦相勸發廩凡民就食者十七萬九千口無一人去其鄉宋史本傳李壽朋字延老豐縣人慶厯初進士厯知鳯翔府括蕪田三萬頃縱民耕種擇其壯者使習兵司馬光薦其能江南通志程珦字伯温河南人知鳯州事鳯當川蜀之衝軺傳旁午毁譽易得為守者相承務豐㕑傳主吏多至破産公裁減幾半曰是足以為禮未為薄也㑹漢中不稔饑民自褒斜山谷而出公教於路口為糜粥以待之所濟甚衆伊川文集太中家傳文同字與可梓州人以文學知名歴知興元府漢中沃腴俗饒財同先治庠序擇行藝之秀者掌之風諭境内遣子弟就學暇日躬閲訓導于是向學者多有盜雜居闤闠同使捕詰之叩頭伏發其藏皆穿窬所得也士民毎出游常苦秦隴惡少從褒斜間道往來剽竊吏不能禁同治之盜不敢犯城固民頑逋租不以時入人苦鄉徭代輸破産同督勵之革其弊歴度支司封員外郎徙知洋州始築郡城有惠政多題咏賈志李興為耀州刺史有戰功詔賜玉鵲帶金器賈志劉涇字巨濟簡州楊安人舉進士知咸陽縣遷知坊州宋史本傳涇有學行專以仁厚為政土産龍鬚席涇惟常貢外不以奉權貴舊志苗繼宣慶厯初知麟州事趙元昊圍城凡三十七日城中無井水竭乃拍泥以塗藁積備火箭所射元昊望見塗積解圍去初被圍時繼宣募得通引官王吉求援於外吉髠髮衣羽服挾弓矢賫糗糧詐為羌人夜縋城而出遇賊問則以羌語答之兩晝夜得出賊寨外詣府州吿急府州遣兵救之吉復間道入城逮圍解詔除吉奉職本州刺史舊志折克行字遵道繼閔子也夏人冦環慶种諤拒之使以兵三千䕶餉道戰於葭蘆川先登斬級四百降户千馬畜萬計擢知府州大酋咩保吴良以萬騎來攝克行度賊未度隘縱擊大破之師還自劾釋不問王中正出塞克行先拔宥州毎出必勝夏人畏之太原孫覽議城葭蘆諸將議多不合召克行問策即頓兵吐渾河約勒部伍為深入狀敵疑不敢動既訖役詔河東進築八砦通道鄜延延帥遣秦希甫來共議克行請兩路并力以逺者為先希甫不可上卒用克行策克行在邊三十年善拊士卒戰功最多羌人呼為折家父宋史折德扆傳种誼字壽翁世衡子知鄜州夏人犯延安趙卨使誼統諸將敵聞誼至皆潰去延人謂得誼勝精兵二十萬宋史种世衡傳張守約字希參濮州人知邠州有惠愛可紀宋史本傳張居熙寧四年以崇儀副使知麟州州城井泉不足軍民汲於城外沙泉前郡守欲築城包之而土多沙礫不果居令鑿去舊土築之城成人以為便舊志程之邵字懿叔眉州眉山人知鳯翔府民負債無以償自焚其居而紿曰遺火有主藏吏殺四婢人無知者之邵發摘岐人傳誦宋史本傳韓晉卿字伯修密州安丘人以五經中第知同州奏課第一宋史本傳梁彦通字貫之鄆州須城人神宗朝煕河用師吏相繼以不才免選通判永興軍事始至大軍已趨靈武諸郡皆督夫負糧從軍且受數矣使者隂諭指夫增負若干彦通曰已受數又重之是必壯者逃弱者踣即詣中軍言之初猶不從爭久乃定鄜州支使石蒼舒冒取俸給積數千百緡使者屬彦通治蒼舒猶簧鼓自辨彦通不為搖竟坐贓去自是寖益有聲累遷右朝議大夫紹聖二年西鄙進築諸城而潼闗控陜衝難守臣詔以彦通知華州事時鄜延修城調七州保甲華在調中衆聳懼彦通召諸令以意慰遣且版示衆曰旬浹之役近在邊隅不與頃嵗入界同也衆乃趨命屬嵗不登米斗錢五百彦通括廩得數十萬斛平價踰半開門坐府躬視糴糴者踵入老幼癃寡皆得食所活以萬計民頌其惠事聞朝廷詔使者閲實使者奏如民言即召對將顯用而疾卒雞肋集張綸字公信潁州汝隂人正拜乾州刺史綸有材畧所至興利除害宋史本傳錢即字中道吴越王諸孫第進士辟鄜延幕府崇寧中為陜西轉運判官王師復銀州轉餉最徽宗召對願勅邊臣先為不可勝以待釁瀚海地皆舄鹵得之無所用帝然之除知延安府童貫宣撫陜西時長安百物踴貴錢幣益輕貫欲力平之計司承望風旨取市價率減什四違者重置于法民至罷市又行均糴法賤入民粟而髙金帛估以賞下至募兵射士之授田者咸被抑配闗内騷然即屢抗章極陳其害貶永州團練副使然糴害亦寢宋史錢惟演傳鄭驤字潛翁信之玉山人元符進士大觀中擢京兆府等路提舉常平驤按格為常平總目十巻頒之所部時陜右大稔驤奏乞以所部本息乘時廣糴得米六十萬斛髙宗初知同州兼沿河安撫使金將婁宿犯同州及韓城驤遣兵拒險擊之師失利金人乗勝徑至城下通判以下皆遁去驤曰所謂太守者守死而已翼日城陷赴井死贈通議大夫樞密院學士諡威愍賜廟愍節宋史本傳徐徽言字彦猷衢之西安人靖康初知晉寧軍同知樞密院事聶昌出河東為金人所刼以便宜割河西三州隸西夏晉寧軍民大恐曰棄麟府豐晉寧豈能獨存徽言曰此使人矯詔耳遂率兵進取三州金人益備克胡砦吴堡津遣守領為九州都統與晉寧對壘徽言出竒兵襲逐之金人忌徽言欲速拔晉寧以除患建炎二年冬自蒲津涉河圍之徽言出兵縱擊遂斬羅索貝勒之子當是時環河東皆陷獨晉寧屹然孤墉横當強敵與金人鏖河上大小數十戰所殺過當金進攻數敗不得志圍之益急城中水乏絶儲偫寖罄鎧仗空敝徽言得衆心裒折槊斷刃以死固守一夕禆校李位石斌隂約羅索啟外郭納金兵徽言決戰門中格殺甚衆退嬰牙城以守金人攻之不已徽言置妻子室中積薪自焚仗劍坐堂上慷慨語將士我天子守土臣義不見衊敵手因拔佩刀自擬左右持之急金兵至挾徽言以去羅索得徽言所親説徽言具冠韍見金帥徽言斥去羅索就見徽言慢罵不已金人知不可屈遂射殺之贈晉州觀察使諡忠壯再贈彰化軍節度使子岡同死事云宋史本傳祁昻晉寧軍統制與徐徽言同被執賈志引刀欲自刺金人擁至軍前不屈而死贈成忠郎團練使宋史徐徽言傳王彦字子才上黨人張浚宣撫川陜奏為前軍統制浚欲大舉彦以為不可曰陜西兵將上下之情未通若少不利則五路俱失不若且固根本浚不然其言俄知金州時賊桑仲直擣金州白土闗衆號三十萬彦勒兵設伏以待賊見官軍少蟻附搏戰彦執幟一麾士殊死鬭賊敗走紹興元年李忠反攻金州諸闗闗陷彦退屯秦郊令將士盡伏山谷間焚秦郊積聚偽若遁者彦募敢死士易麾幟設竒以待賊至官軍迎戰大敗之追襲至秦嶺遂復乾祐縣以歸又有王闢董貴祁守中阻兵窺蜀小者猶數萬彦悉討平之三年薩里罕入金州彦遣兵至漢隂縣與劉豫將周貴戰大敗之復金邵隆紹興六年知商州理商虢十年披荆榛招流散藩籬北鄙商虢為金兵所掩旋即恢復會和議成割商畀金常怏怏改知金州時以兵出敵境秦檜恨之徙叙州馬志楊從義鳯翔天興人初補進武校尉權天興縣尉初吴玠檄從義領兵進復鳯翔悉降其衆不戮一人得米二千餘斛軍不乏食士卒感悦遂檄從義知天興事紹興改元轉秉義郎遷副將初鳯翔有流民數萬在境内或疑其反側悉拘於山谷間從義矜其無辜皆縱之後岐雍大歉流民復入闗就食從義納之所活甚衆又創營田四十屯以減饋運軍食充足紹興五年辟知洋州兼管内安撫司事尤以愛民為本州有楊填等八堰久廢不治從義皆葺之溉田五千餘頃復税五千餘石又增營田十四屯公私以濟後興隆三年復知洋州兼職如故洋人聞其來相賀曰復為吾邦舊使君矣老稚歡迎不絶於路後上疏請歸遂家于洋之崇道觀下封開國侯城洋兩縣民立祠世祀祀名宦舊志李師顔髙宗朝守耀州金兵入境城陷率所部來歸棄其家屬時人服其忠義馬志楊震仲字革父成都府人登淳熙二年進士辟興元府通判權大安軍吴曦叛素聞震仲名馳檄召之震仲辭疾不行時軍教授史次秦亦被檄謀於震仲震仲曰大安自武興而來為西蜀第一州若首從其招則諸郡風靡矣顧力不能拒義死之教授非城郭臣且有母在未可死脱去為宜因屬次秦曰吾死以匹絹纒身斂以小棺足矣曦遣興州都統司機宜郭鵬飛代震仲趣其行益急鵬飛宴震仲終飲不見顔色歸舍然燭獨坐夜漏至三鼓呼左右索湯比至震仲飲毒死矣次秦如其言斂而寘於蕭寺闔郡為之流涕自震仲死蜀之義士感慨奮發始有協謀誅逆者明年曦伏誅蜀帥安丙楊輔以聞贈朝奉大夫直寶謨閣吴獵宣諭西蜀為之請廟與諡名其廟旌忠諡曰節毅宋史本傳史次秦眉山人及進士第吴曦招次秦甚遽次秦遷延固遜郭鵬飛迫之行乃以石灰桐油塗兩目末生附子傅之比至目益腫次秦母年髙而賢聞次秦為曦所招即命家人以疾篤馳報且曰恐病不足取信以訃聞可也曦乃聽還曦誅蜀帥上其事改秩利路主管文字宋史楊震仲傳和彦威守金州元兵入蜀遣守饒風闗不攻而過彦威提兵五千從金州箐口十八谷詣長安搗其虛及元兵自鳯州出彦威始由上路歸後諸路殘破彦威守孤城堅壁立元兵數攻不下明年大隊從谷中奄至百道攻城金州陷彦威死之舊志金鄭彦文大定中刺北豳後移守乾州路當衝迎餞旁午加之諸邑租庸征賦公務鞅掌民紛訴諜吏鈐紙尾幾不勝聽彦文剖析決遣咸得其宜作思政堂自撰記馬志宗道本名八十上京司屬司人章宗即位除陜西路統軍使以鎮靜得軍民心特遷三階兼知京兆府事時夏旱俾長安令取太白湫水步迎于逺郊及城而雨是嵗大稔人以為精意所感刋石紀之金史本傳穆延盡忠天雄人太和中知乾州乾素名難治盡忠賓禮賢能發摘奸伏吏民神明其政比年旱蝗飛蔽天境内禾稼未嘗少傷諸縣土賊作亂盡忠設鄉兵嚴闗防髙城壘濬池隍戰具繕完無不精鋭賊聞風解散武曦撰德政碑完顔閭山葢州明安人明昌二年進士貞祐三年知京兆府事充行省參議官四年知鳯翔府事興定元年冬詔陜西行省伐宋閭山權元帥右都監參議諸軍事宋兵千餘人伏吴寨谷閭山率騎兵掩擊敗之追襲十五里殺三百餘獲牛羊以千計金史本傳李芳字執剛大興人承安二年進士厯乾坊兩州刺史精於吏事累以廉能進秩中州集𤓰爾佳實倫隆安人貞祐中知延安府兼鄜延路兵馬都總管金史本傳深沈有謀能得士心温德赫達傳完顔仲元本姓郭氏中都人貞祐四年商州經畧使權元帥右都監上書曰陜西一路最為重地潼闗禁坑及商州諸隘俱當預備可選精兵分地戍之其後乃置秦藍守禦元光元年知鳯翔府事鳯翔被圍仲元身先士卒諭諸將士曰凡有竒功者即承制超擢及危急乃輒注四品以下延扎哈瑪爾力戰功最輒授通逺軍節度使圍解奏請擅除拜之罪宣宗嘉其功皆許之金史本傳慶山神木人守延州夏人自天會初與金議和八十餘年未嘗交兵及為元兵所攻求救於金金主新立不暇遣兵夏人遂侵葭州慶山擊敗之而去賈志鈕祜禄斡出仕至楨州刺史被行省牒徙州人于金勝堡已而大兵至斡出拒戰中流矢病創臥花帽軍張提控言兵勢不可當宜速降斡出曰吾曹坐食官禄可忘國家恩乎但當力戰而死耳至夜張提控引數人持兵仗以入脅斡出使出降斡出曰聽汝所為吾終不屈也遂殺之執其妻子出降初楨州人遷金勝堡多不能至軍事判官王謹收遺散之衆别屯周安堡周安堡不繕完樓堞置戰守之具兵至謹拒戰十餘日内潰被執不屈而死詔斡出謹各贈官六階升職三等金史本傳年按楨州今韓城縣金貞祐三以韓城縣為楨州元完顔石住從太宗攻下鳯翔同州有功賜號巴圖爾佩銀符為同州管民達嚕噶齊元史本傳布延布哈喀木尼人授乾州達嚕噶齊加意民瘼務用安靜凡獄辭情偽必參伍證信期於平允婚田訟牒紛紜布哈決其宿滯者數十事温言詰驗皆見其情訟以衰息甘肅兵食吿乏州當運米二千斛以布哈督治之邊用給而人不吿勞至於崇學校禮賢能課農桑訓勤儉有古循吏風既去民為立去思碑賈志吕彧字伯充河内人至元三十年華州知州勸農興學具有成效及代民爭留之元史本傳度宗顯至正間為沔州守政治有聲興廢舉墜風俗丕變境内肅然民為立碑紀績賈志雅格為同州達嚕噶齊值久旱禱雨祝神曰得雨蘇民願以己女給侍左右雨果隨注霑足少霽報女暴死州民感其德遂以遺體塑像於後殿至今尚存毎嵗本州享祭必有雨應馬志東良惠鞏昌人至正末以總管守商州值紅巾亂令二子挈家一居華州一居朝邑及城陷良惠死之商州志畢浩以義兵屯葭州通秦寨遂兼知州事恤孤賑乏境内無擾他郡人亦來歸附民為立政績碑于烏龍鎮馬志明許敬洪武初知鳯翔府寛惠廉勤民皆仰慕祀名宦鳯翔府志費震洪武初為漢中知府開設府治招撫流民德及一郡人稱頌之明一統志震江西鄱陽人洪武初以賢良徵擢漢中知府時嵗歉盜起震發倉儲十餘萬貸民俾秋熟遷倉盜皆釋甲來歸即令占宅自為保伍得數千家至秋大熟民悉還前粟上聞而嘉之後以事被逮上曰震良吏釋之為牧民者勸廣輿記胡惟俊洪武初知華州時兵燹後生理未復野多曠土官舍惟存廢基惟俊招流亡給耕具又伐木陶瓦鑿石以建諸公署越二年華民漸殷後徵太僕卿行無一錢賈志髙永安杞縣人洪武中知耀州創豐盈倉積粟至數萬石會饑發賑百姓德之重修鼓樓建社學義倉及桑棗園民賴為業永樂初卒官賈志蔡祥洪武中知隴州清慎愛民州人稱頌祀名宦明一統志衡岳字世瞻西平人以鄉舉入太學洪武三十五年知西安府内艱去起補慶陽守居官約己惠民常禄外餽遺一無所取永樂十年入覲以言事忤㫖謫戍交阯慶陽西安二郡民詣闕請貰岳以終其惠不報明史竊劉燾字尚載太湖人國子生洪武末知西安府有政績慈祥愷悌不施鞭扑有不善者但勸諭之人皆悦服肅王聞其賢特書霜月軒以贈之西安府志范斌榆次人舉人永樂中知華州性仁恕撫字得宜然不畏強禦有犯法者必不貸後以憂去州民赴闕保留加參議俸復知華州卒於官賈志劉同許州人監生永樂中知邠州農政大舉賦税無虧吏畏民懷聲譽赫然方輿勝覽何榮忻州人監生宣德末知邠州為政寛猛得宜方輿勝覽陳蚪永豐人正統中刑部員外郎知延安府任滿軍民保留陞陜西參政仍知府事馬志王瑾安肅人宣德己酉舉人咸陽知縣興學勸農鋤強植善丁外艱歸民不忍其去請於朝特旨起復及秩滿新尹來代民復請於朝特旨加六品秩仍留之後二載陞延安知府九載秩滿軍民請留晉三品秩畿輔志延按賈志王瑾由膚施令陞安守與畿輔志稍異錢茂律字大吕臨海人舉人景泰初守同州志趣髙潔才華穎敏政清澤洽增設學舍至百八十楹嘗勒居官箴於石人以比甘棠云賈志王鑑太原人以御史左遷膚施令厯知延安府為政寛和民皆德之上言乞勅撫按分巡等官以時行邊從之延安府志羅諭永寧人天順中知延安府修延利渠築城垣徙府學設延豐倉數十所隨都御史余子俊築東西二路邊城又嘗教民樹藝紡績有治行延安府志侯瓚雄縣人進士成化初知鳯翔府百度具舉陞山西參政祀名宦鳯翔府志許拱兖州人舉人成化初知乾州令行禁止道不拾遺有德政碑馬志鄧真息縣人成化七年知耀州質直任事與民吏相親愛開漆水退灘二渠修故通城渠人咸利焉九年百姓奏留詔加四品服俸又三年致仕去時預備倉米穀積至十餘萬石賈志張本濟潛江人進士成化中知鳯翔府公正清謹百度咸舉士民歌頌祀名宦鳯翔府志陳俊字秀依新淦人舉人成化中知隴州潔己愛民去任民思慕之祀名宦鳯翔府志鄭福深州人成化十三年知金州修學課士築堤修闗驅虎患疏河洪績最將去百姓奏留之增秩參議復任三年民為立祠興安州志隂子淑内江人成化間以進士知金州平易近情正婚𦵏均徭役教民禮讓風俗丕變興安州志孫昌榆次人成化中知商州時初改州城官署壇壝皆昌創立莅任最久惠愛及民一時良吏以昌稱首陞從四品俸去任之日民立碑頌德馬志伍性榮縣人進士成化十五年知華州才識明達政先大體遇事迎刃立決不逾月州治肅然嵗饑賑䘏活民州人賴之賈志陳仲秩巴縣人成化進士知華州莅政精明專以德治杖人止示辱而已太夫人有賢德毎臨政輒聽於屏後決事失平即擊屏以警之故尤多仁恕云賈志劉濟郟縣人舉人成化間知乾州興利除害以教化為首務而躬行先之未一月法制備具人心大悦闗中饑甚民率逋逃濟獨止乾民計口廩支倉儲弗繼則益以官帑多方措置民賴以活驛使往來恃威鞭撻濟嚴立程法傳無滯客王璽撰碑記梁萬鍾字天賜温江人進士成化末知同州才具機敏勤於民事時闗中饑萬鍾發倉賑貸又勸富民輸粟煮粥多所濟活賈志崔陞安陽人孝宗即位知延安府立規畫節浮費省遊宴清疆場覆徵税平徭役鋤強横招流移墾荒實廩見宜川知縣馬鞍價值百金按之獲其貪狀遂黜之延人杜文祥笑陞貧陞知而不問有發其殺人事者罪不至死陞亦生之君子稱其似韓稚圭在郡七年擢四川參政馬志嚴永濬字宗哲華容人𢎞治中知西安府時遣中官造文罽百姓苦之永濬因旱災上疏切諫不納賈志𢎞治八年任西安知府剛明峻直制行端方下車首詢民瘼修舉文物吏民畏服雍大記李延壽新城人御史調延安府廉明仁恕百姓流移者衆乃作招撫詩六章使人下縣歌詠百姓相踵歸業逺近歌曰太守李君政通神明欲雨得雨欲晴得晴嘗課教耕織建學正俗士民仰賴陞河南右參政賈志王彦竒雲陽人知延安府清白剛方𢎞治末官軍駐兵於郡多求索擾彦竒嚴禁之民賴以安嵗大荒出預備倉粟十萬石并庫銀三萬餘兩賑救之奏免其税全活者甚衆又興學校作人材正風俗廣儲蓄釋寃滯恤孤獨建橋梁治水患通商賈弭盜賊文章政事名盛一時陞參政延民保留仍知府事馬志伍箕安福人𢎞治進士知華州清恕愛民幾于刑措及審户役民感其寛更委編審商洛官至苑馬寺卿賈志劉錦蠡縣人𢎞治中舉人華州知州屬商山多虎患錦授民捕擒之法屢獲虎民賴以安山東盜起將逼潼闗錦以武畧巡守盜聞之不敢近闗華州志田天澤應州人正德初知耀州會武宗幸榆中自撫按三司太監皆馳往榆中天澤諸供應甚簡太監索重賄亦不與或令備供頓所需澤度駕必不至弗厚為備百姓得無科擾賈志楊一鈞鄰水人進士正德中以户部郎中知漢中府時蜀盜大作兵行漢中軍餉日以萬計征斂無時民皆惶懼一鈞從容經畫饋給常裕民不知困役不知勞撙節愛養民賴以安賈志陳孜寧國人正德間知寧羌州賊攻城孜盡力堅守遂獲全賈志謝豸蒲州人舉人正德中知寧羌州時藍鄢之亂甫平豸愛養拊循作士勸農鋤強扶弱為一時循良之冠漢中府志桑溥濮州人進士知華州勸善懲惡民翕然丕變城北積水萬頃溥相視開惠民渠州及華隂之民俱頼其利華州志竇明武鄉人進士知鳯翔府存心民瘼勤於撫字士民建祠祀之鳯翔府志劉涇字叔清懷慶衛人進士守鳯翔屬邑以羨金三千進公笑曰世豈有受羨金劉次山哉尋以外艱去懷慶府志趙時犍為人舉人知耀州以才堪治劇改乾州嘉靖初州民樊紳作亂先期以妖術惑衆多與符授偽官衆從之期某夕舉火城内諸妖為内應復召四方賊黨俾各起兵如漢張角故事至夕有人白於時時即登城為禦妖黨皆環侍左右將試刃於時紳尚未至時應之從容無懼色姑紿其衆使外禦明旦搜得佩偽符官數人斬之頃紳衆至門時令投偽官屍城下紳乃退走至鳯縣為人所擒隴右闗南悉平馬志李暹滑縣人嘉靖初知隴州政事精明廣儲倉粟增修公館嵗大饑活者甚衆馬志趙鯤字宇南壽張人嘉靖已丑進士知漢中府大盜胡海珠依山險為冦父子相繼四十餘年鯤下車即選練民兵躬率捕緝境内悉平賈志劉啟東字伯陽羅山人舉鄉試第一嘉靖八年以能治劇調知同州在官清勤百務畢具前學舍傾圮諸生多散啟東激勸義民新之生徒復聚簿書之暇輒身往督勵爭務博洽精詣之學擢西安同知同州志葉修南昌人進士嘉靖中知漢中府博學清操愛民好士修城不擾課業有程賈志何尚德猗氏人嘉靖中以舉人知興安厯四載清廉如一日省刑薄斂開渠築堤嵗積穀千石備賑餘贖鍰七百兩盡登報焉興安州志蕭廷傑字元功瀘州人嘉靖間進士知商州約己裕民初任即申革大支小支廩給以甦里甲兩院通行各道裁革興學造士以和介稱商州志邵烱安州人舉人知商州嚴於馭下以禮待士調礦有法徵收得體移建名宦鄉賢二祠擢陞同知士民祀之賈志梁恩字子承巴陵人進士嘉靖中知同州同故無郵使者多迂道至民苦供億恩禁弗應嗣後遂絶諸臺有徵於州者輒以不便民白免至逢怒弗改也居四載陞西安郡丞賈志間仲宇字定夫代州人舉人任同州知州下車剔弊舉廢數月而治巨盜劉漢聚衆肆掠悉疏捕置法民喜形於謠去之日行李蕭然賈志楊綵字質甫京衛人進士嘉靖中知華州年少美風儀初至吏民皆易之至決政事如老吏與士大夫交以道義接有請託者即絶之乙卯地震時綵丁内艱民蜂起掠食綵下令開諭復勸借富家粟以賑窮乏民無敢犯令者後遷刑部員外賈志朱茹字以彚瀘州人嘉靖間進士知華州時地震後部議須才者安撫災傷茹至接下甚謙莅政甚嚴建華山書院以教士修治沙河尤為郡要陞工部員外郎華州志陳應鄰字仁甫京衛人嘉靖進士知華州至誠惻怛實心教養省嵗役費不擾里甲緩於催科民應之反過於督罰者以操守正大能服人心陞工部員外華州志許際可固始人舉人由户部主事遷知華州清操自矢一塵不染實心愛民摘奸如神接遇士大夫坦易謙沖而履正守法人皆欽服賈志髙崇字企之壽張人舉人嘉靖間知華州才猷練達政事無巨細必按法以行或有挾奸行欺者每善察其情偽以輕重置之法時稱嚴正賈志甘為霖富順人進士嘉靖間知華州莅政平恕獄無繫囚政多清暇觴詠賦詩以内召去賈志李廷寶曲沃人嘉靖中知耀州會年饑地震廷寶一切與民休息裁省供應里甲便之性閎大能容舉事務長厚不近名即有犯者輒不與校以是士民益相親耀州志蘇璜堂邑人舉人嘉靖末知鄜州繁劇立辦公庭肅然奸胥豪右悉伏匿不敢動學宫敝隘修理易置仕至湖廣按察司僉事鄜州志陳曄字光宇諸城人進士隆慶中以工部郎左遷知同州清操特立識斷英敏常乘挽車循行田野境内震粟劉官營大盜盤據累嵗莫敢誰何􅖙出不意提兵𠞰擒之居數月復擢南刑部郎中賈志丁有周字克宗武陵人隆慶舉人以國子助教出知同州才儁機警持政廉平往例新生入庠醵金饗使君周曰吾送子弟就師而為我治具不倒施耶自攜樽觴博士三爵而别三年論最擢户部員外郎賈志曹璜字伯玉益都人知西安府府事蝟集游刃有餘教民以孝弟力田士習民俗翕然丕變遷湖廣提學賈志邊有猷字克壯封丘人萬厯甲戌進士補西安守西安合屬所上賦金以鉅萬計例有耗羨充公費有猷手自登記悉佐公帑絲毫無所與會劉哱叛郵報洶洶或勸有猷宜亟歸其孥有猷曰吾家人動城中人俱動矣乃厲氣巡城妻劉氏立宅内井傍亦慷慨誓死賊平以憂去封丘志馬呈秀字君實江都人萬厯甲辰進士知延安賊入境親督兵捕擊擒其渠魁招復流民萬户墾荒田數萬畝卒祀名宦江南通志王在臺字肇區文水人萬厯癸丑進士以户部郎中出守漢中政先教化一遵文翁之治時瑞藩監尉多奪民田在臺力禁之又𠞰滅常板子等賊後陞任去攀轅者以萬計賈志鄒嘉生號靜長武進人萬厯丙辰進士知西安府德澤旁洽比嵗有登甲子夏雨少愆期嘉生齋禱甫一日密雲沱雨逺近沾足民感而異之生員蔡國禎家有祟兄嫂妻女相繼病死蔡計無所出奔府控之嘉生毅然曰何物么麽敢作厲乎齋三日躬詣城隍神前力請誅邪是夜蔡生家夢一朱衣神控騎儼臨若鞫罪狀自是祟息祝萬齡撰異政碑記沈自彰字芳揚大興人萬厯中進士知鳯翔府持己以廉化民以德親行阡陌舉賢興利好讀書講學與鄉先生張雞山訪問講論不輟嵗旱步禱大雨立霈陞太常少卿罷官貧甚授徒自給鳯翔孝廉公車至京謁見日午不舉火覘之方使人鬻衣取酒食治客具室中一無所有賈志崔應科登封人進士知漢中府修堰濬渠築城葺廟鼓舞文士尤多成立賈志潘文太原人萬厯中知漢中府才幹明敏案無塵積斷獄片言立決每月朔日與諸士講程朱業名流多出其門礦賊俞士乾聚衆數千肆為吞噬文設策招安令充牙兵未一載殺人如故文以計擒之一日殱焉漢始獲安賈志程三樂重慶人舉人萬厯間知城固與郡伯潘文合招礦徒俞士乾等旋就擒斬人咸稱其謀畫漢中府志曹景暘字子升應天人都察院都事阿子也嘉靖乙卯舉鄉薦少宰魏公學曾金州人也為州求良牧得之喜久之有間景暘於少宰者少宰曰曹君廉而不劌寛而有制先教化後刑罰政立而民懷之殆古循吏乎轉西安丞以病歸江南通志張極寧晉人舉人萬厯中知商州才猷敏健法令嚴明修廢舉墜葺書院築文屏山筆峰皆其力賈志王以孚達州人知商州子民禮士政令寛平捐俸以易學租後以其資築龍山塔移雲路浚泮池宫牆一新商州志龔錞澧州人舉人萬厯中知商州愛民禮士改收頭支使議紙户召募裁舖司兵銀蠲免逃亡尤甦民困賈志羅文俊長治人舉人知同州無苛政嵗省徭賦九百金賈志髙登明字公野翼城人萬厯舉人知同州明習吏事持法平允不設什排不遣一𨽻而賦完訟清民皆樂業有壞姙婦胎脇所仇者登明曰澆風不可長也下令禁諭俗為之易徭賦有可節者為裁七百餘金三年陞保定府同知同州志鄭璧字子良内江人萬厯進士以憲僉左遷知同州約己愛民下車盡罷一切私徵蒐剔奸蠧病民者嵗省數千金時議行條鞭璧奏記極言不便而尤不便於同謂同民貧且力農利用布粟不便輸金也遂不果行後數年其言果驗民感服三年以察廉内陟同州志白鋐寶豐人由貢生知鄜州廉明多所建樹不便於民者力請於上官去之嵗入羨餘悉充公用延安府志王標字的明太原人天啟六年由舉人為華州牧有能吏聲發姦摘伏吏胥莫敢犯法催科不煩督責輸納恐後晉鞏昌府貳尹華州志胡爾純山東費縣人隴州知州崇禎八年流冦攻隴爾純竭力固守吏目王錫兖以城降爾純不屈自縊死贈光禄卿舊志林文蔚掖縣人以舉人知漢中府當大兵四集供應芻糈咄嗟立辦更除巨蠧為郡害者境内一清漢中府志周應泰湖廣人嵗貢崇禎間知寧羌州時巨冦陷城以匿印詈賊遇害吏部尚書李長庚奏請賜𦵏漢中府志鄧承籓號覺斯桂林人崇禎十年由舉人為華州牧治甚有聲嘗因冦變冬月煮粥以饘守者又因大旱民灌溉種植承籓巡行載數百萬緡勞民之力田而勤者庚辰饑饉頻仍承籓發倉賑救又諭富者以推食之義全活甚衆尋擢臨江府同知華州志唐時明字爾極固始人舉人崇禎末知鳯翔府癸未冬李自成既敗孫傅庭遂破潼闗圍長安三日克之全陜大震所至州縣望風響應獨時明繕城濬隍設櫓盾為戰守具值東征敗卒過郡大掠而西民遂無固志未幾自成僭號傳檄至時明慨然曰吾孤城新蹂於兵戰具一空安能挫方張之敵惟有一死報天子耳遂自縊死賈志周文煒江南人崇禎癸未署商篆多惠政時奉上檄派徵民運銀二千八百兩煒憐商叠罹兵火極力申銷之州人尸祝及十月李自成破商州被執不屈厲聲大罵賊割其舌煒怒目噀血喉中猶作罵賊狀賊以鐵鋤煆赤納其口磔其屍一子亦被執見父屍痛哭憤詈賊亦殺之商州志韓東明安肅縣舉人知邠州城陷從容著衣冠望闕拜畢辭家廟赴井死畿輔志孫愈賢河南滎澤人由貢士知鄜州為人剛斷杜絶干請不畏強禦一時豪右斂跡客兵數萬來屯城中八日強取民禾飼馬愈賢悉治以法鄜人獲安鄜州志按漢宣帝云與我共此民者其惟良二千石乎牧守一官自昔惟重其宦績顯著者既列傳如右而舊志所採美不勝書如唐新平郡守韓盛失其籍扶風郡守房琯河南人興元府尹許尹興州刺史鄭公達沔州刺史劉遂清俱失其籍宋知商州韓孝先知邠州龍鐲知麟州訾虎俱失其籍元知商州盧信李益王珪俱失其籍知耀州木八刺沙回紇人知隴州汪福安失其籍明西安守趙祐長垣人曹恩德州人袁一鳯宜春人陳之龍宜春人陳其赤崇仁人延安守趙楫濟寧人栗登巴縣人李涵遷安人洪濟逺江陵人党馨益都人王國瑚猗氏人許明陛把縣人李含樸房山人鳯翔守扈暹元氏人仇益汾西人成文山西山隂人紀繡利津人熊應元南昌人漢中守郭欽金鄉人曹子徽公安人張芉四川人張欽通州人李𤾉正定人由禮門杞縣人李有實黄縣人項思教臨海人李景登遼東人李日儼安邑人馮上賓獲嘉人知商州温和王敏郭綸俱失其籍李騰芳長沙人鄧琦洛陽人楊純巴陵人劉承學壽光人陳潞來安人李石嶺澧州人蔡應齊定興人楊儒魯江西興國人知同州楊景行鄱陽人齊整代州人秦銘南陵人安亨臨汾人李旻益都人張􅕔信陽人李洪新河人郭顯和泰和人李際春安陽人知華州楊勝賢閬中人郭鎡濟寧人知耀州魏必興鳯陽人任奎鹽山人李文熙石首人知乾州馬漢臣洛陽人賈麟翼城人張才山東人何節萬安人安珝邢臺人王鳯阜城人王鯨祥符人晏子綸茂州人秦志臨汾人杜槃臨縣人陳維清源人李維祐徐州人賈光大杞縣人王楫膠州人梁𢎞化内江人知邠州廖伯裴新喻人毛鵬霄西平人蔣璿四川人柳榮汾州人王文潞州人髙慶陵縣人劉濟趙州人張鐸永清人徐經武清人萬化太原人劉昇萊陽人金汝聲南直人馮迪南直山陽人周寧睢州人劉濬鹽山人孫侃平定州人杜蕙任邱人知綏德仇敬曲沃人靳東齊順義人王大節大名人韓文卿襄陽人張鸞騰驤衛人張鱕壽陽人盧友竹三河人知葭州賈熙載直隸人吴養洽安邑人秦丹髙郵人鄭廷英南川人知隴州劉璋媯州人劉玘失其籍譚溥銅梁人張琦失其籍吴璽保寧守禦所人文應麟廣西興安人知寧羌州張簡弋陽人梁成巴縣人王儒澤州人萬世讓巴陵人李應元雅州人王一鳴齊東人鍾湛靈澤州人熊嶽秀河南人寗笏河内人録其官守以示靡遺本朝曲良貴棗強貢生知興安順治三年流冦陷城殉難時同殉者有州判侯嘉𦙍失其籍宋從心杞縣舉人順治五年知延安府六年王永強據榆林檄至延安從心與守備萬廷貴集衆誓死守因共碎其檄永強兵至大怒籍其家執從心至城隍廟不屈遂遇害廷貴死於獄妻某氏亦罵賊而死李芳澂永年人由選貢任漢中府通判賀珍冦漢中闗南道胡全才誓衆固守芳澂佐理兵餉軍儲充裕冦退擢知鄜州值王永強變起州民奔竄一空暨賊至芳澂密遣人齎蠟書赴省請救為賊邏者所得賊怒急攻之城破不屈而死王廷用奉天人順治二年任華州知州剛斷明決為民興利除弊時冦亂甫定差糧煩苦廷用申請臺司計闔州糧石毎里十甲均輸差糧勞佚無偏薛所習孟縣人順治五年由選貢知商州兵燹後悍僕多凌其主所習隨事痛懲之名分始肅明季加派三餉因循未遑議改所習詳請豁免商民建祠祀之秦宗堯奉天義州人順治六年知華州甫下車鼎新文廟以作士風山右姜瓖之變華當東西孔道宗堯悉力支應轉輸不擾山冦盤踞西南原石脆山出没無常宗堯率民兵直搗賊窟盡殱之死事者十有一人州境以寧會内召天下賢守令十六人各賜衣一襲宗堯與焉劉正任邱人恩貢初授代州知州順治九年改商州商自明季為盜藪正一意招徠與民休息倡修龍駒寨通商惠工設戍防守由是農桑大興盜賊屏跡又創五經社講學課文科名鵲起如周蒲璧盧運熙皆社中翹楚也莅商三載商洛道許宸好操切與舉人某搆釁欲中以危法正不從仍大書署齋壁曰殺人媚人吾何心哉或吿許許怒遂拂衣歸胡有德奉天鐵嶺人由明經厯知華州為政慈惠明決順治甲午大旱累禱弗應具文城隍神深自刻責須臾風雨驟至秋禾有成嘗憫所屬寒士嵗給穀至數百石華人至今思之李文盛奉天人知華州仁慈廉潔順治丙申大水河堤潰決淹没民田數萬頃文盛冒雨防䕶晝夜修築累旬不返濱河居民至今戴德勿衰嘗相度河身髙下欲别開渠達渭以免水患後去官寢其事王章錦州人為興安州牧方莅任軍興旁午鎮臣重派民間出糧牧馬州民大困章請於臺司立禁之州故無校士館士苦調考章為捐俸建造茅麓山積為盜藪十七年會兵進𠞰軍需麋至章咄嗟立辦又協餉鄖陽鄖撫檄州人起運章曰吾知秦餉不知楚餉卒不應馬雲階奉天鑲藍旗人康熙元年知邠州厯有惠政戊申己酉間邠大荒雲階百方安集不致失所馮昌奕蒲州人進士擢華州知州下車即繕葺文廟改考院規制大興學校文風丕變麗譙樓櫓次第修飭華屬舊苦里差及徵收耗羨詞訟株連各弊昌奕至悉禁除之值編審昌奕核實申請丁糧一清華民輸賦故無花名赤厯昌奕詳請更造以杜中飽小華山為一郡之鎮萬厯中鑿峰建廟形家謂不利於華昌奕親陟山巔相址鳩工伐石砌臺然後形勢復完于翔漢奉天正白旗人監生康熙十三年任隴州知州先是吴逆賊將蔡元攻隴前牧翁世庸被執城陷未幾貝勒王率兵克復賊西遁復遶踞闗山頂塞路守險總督哈占等率兵屯咸宜闗相持不下翔漢供億彌年士馬無譁人民安堵考績擢鳯翔知府休養瘡痍多方調䕶軍民倚重楊佐國荆門州人由進士授咸寧令康熙十四年報最擢知商州甫莅任逆冦圍城城中震恐佐國率士民死守賊投以偽劄佐國登陴罵賊焚劄衆心益奮越七日大兵至圍始解奸民張名貴隂通賊愚民多脅從佐國力請於制府寘名貴於法餘得釋民尸祝之滕天綬奉天遼陽人廕生康熙二十五年任漢中知府天綬諳練精敏雅意修復首壇廟次樓櫓次倉厫又次學舍吏宇整飭一新漢南自蕭相居守後水利素饒愚民爭利致多聚訟天綬親厯南褒城洋諸邑相視地形築堤建閘且勒禁鐫石俾啟閉有期蓄洩有界自是爭端永杜漢中洊經兵火自前守馮達道後郡志未修者三十餘年天綬設館授餐分篇彚句成新志二十四巻最稱詳盡達道武進人進士順治十三年任漢中知府能以文學佐吏治張彦璘徐州人貢監康熙三十九年任隴州知州申革陋規不畏強禦四十一年因轉運西餉郡邑疲於奔命璘力請協濟隴民疾苦獨甦陞平凉司馬民立坊以誌愛焉朱琦字又韓婁縣人康熙四十五年任鳯翔知府政無巨細皆手自裁決郡民雷學義坐死罪繫獄琦廉其寃狀白免之岐民金六女父斃命已半載不得其主名琦偵得之俱伏辜寶民張進忠妻李氏以誤傷鄰婦命偕女坐大辟琦為減等毎聽訟辨訴盈庭片言立判其餘嚴保甲勸農桑禁私派減市㕓徭役免坍地科差俱得請以次舉行後因罣誤去官士民立祠祀之王渭鼎武昌縣人由舉人擢寧羌知州州境有虎患渭鼎至遂弭值嵗旱禱雨輒應又捐俸修南棧諸險後攝沔篆而卒陜西通志巻五十二
