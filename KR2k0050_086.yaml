body:
  text: 陜西通志卷八十六藝文二奏疏諌除上林苑漢東方朔臣聞謙遜靜慤天表之應應之以福驕溢靡麗天表之應應之以異今陛下纍郎臺恐其不髙也弋獵之處恐其不廣也如天不為變則三輔之地盡可以為苑何必盩厔鄠杜乎奢侈越制天為之變上林雖小臣尚以為大也夫南山天下之阻也南有江淮北有河渭其地從􅊈隴以東商雒以西厥壤肥饒漢興去三河之地止霸産以西都涇渭之南此所謂天下陸海之地秦之所以虜西戎兼山東者也其山出玉石金銀銅鐵豫章檀柘異類之物不可勝原此百工所取給萬民所仰足也又有粳稻梨栗桑麻竹箭之饒土宜薑芋水多蛙魚貧者得以人給家足無飢寒之憂故酆鎬之間號為土膏其賈畝一金今規以為苑絶陂池水澤之利而取民膏腴之地上乏國家之用下奪農桑之業棄成功就敗事損耗五榖是其不可一也且盛荆棘之林而長飬麋鹿廣狐兔之苑大虎狼之虛又壞人塜墓發人室廬令幼弱懷土而思耆老泣涕而悲是其不可二也斥而營之垣而囿之騎馳東西車騖南北又有深溝大渠夫一日之樂不足以危無隄之輿是其不可三也故務苑囿之大不恤農時非所以強國富人也夫殷作九市之宫而諸侯畔靈王起章華之臺而楚民散秦興阿房之殿而天下亂糞土愚臣忘生觸死逆盛意犯隆指罪萬當死不勝大願願陳泰階六符以觀天變不可不省乞種麥限田章董仲舒春秋他穀不書至於麥禾不成則書之以此見聖人於五穀最重麥與禾也今關中俗不好種麥是嵗失春秋之所重而損生民之具也願陛下幸詔大司農使關中民益種宿麥令母後時况古者稅民不過什一其求易共使民不過三日其力易足民財內足以養老盡孝外足以事上共稅下足以畜妻子極愛故民説從上至秦用商鞅之法改帝王之制除井田民得賣買富者田連阡陌貧者無立錐之地又顓川澤之利管山林之饒荒淫越制踰侈以相髙邑有人君之尊里有公侯之富小民安得不困又加月為更卒已復為正一嵗屯戌一嵗力役三十倍於古田租口賦鹽鐵之利三十倍於古或耕豪民之田見稅什五故貧民常衣牛馬之衣而食犬彘之食重以貪暴之吏刑戮妄加民愁無聊逃亡山林轉為盜賊赭衣半道斷獄嵗以千萬數漢興循而未改古井田法雖難卒行宜小近古限民名田以贍不足塞并兼之路鹽鐵皆歸於民去奴婢除専殺之威薄賦斂省繇役以寬民力然後可善治也訟王尊書公乘興往者南山盜賊阻山橫行剽劫良民殺奉法吏道路不通城門至以警戒步兵校尉使逐捕暴師露衆曠日煩費不能禽制二卿坐黜羣盜寖強吏氣傷沮流聞四方為國家憂當此之時有能捕斬不愛金爵重賞關內侯寬中使問所徵故司𨽻校尉王尊捕羣盜方略拜為諫大夫守京輔都尉行京兆尹事尊盡節勞心夙夜思職卑體下士厲奔北之吏起沮傷之氣二旬之間大黨震壞渠率效首賊亂蠲除民反農業拊循貧弱鉏耘豪強長安宿豪大猾東市賈萬城西萭章箭張禁酒趙放杜陵楊章等皆通邪結黨挾養姦軌上干王法下亂吏治并兼役使侵漁小民為百姓豺狼更數二千石二十年莫能禽討尊以正法按誅皆伏其辜姦邪銷釋吏民説服尊撥劇整亂誅暴禁邪皆前所稀有名將所不及雖拜為真未有殊絶褒賞加於尊身今御史大夫奏尊傷害隂陽為國家憂無承用詔書之意靜言庸違象恭淹天原其所以出御史丞楊輔故為尊書佐素行隂賊惡口不信好以刀筆陷人於法輔常醉過尊大奴利家利家捽搏其頰兄子閎拔刀欲剄之輔以故深怨疾毒欲傷害尊疑輔內懷怨恨外依公事建畫為此議傳致奏文浸潤加誣以復私怨昔白起為秦將東破韓魏南拔郢都應侯譖之賜死杜郵吳起為魏守西河而秦韓不敢犯讒人間焉斥逐奔楚秦聽浸潤以誅良將魏信讒言以逐賢守此皆偏聽不聰失人之患也臣等竊痛傷尊修身潔已砥節首公刺譏不憚將相誅惡不避豪強誅不制之賊解國家之憂功著職修威信不廢誠國家爪牙之吏折衝之臣今一旦無辜制於仇人之手傷於詆欺之文上不得以功除罪下不得蒙棘木之聽獨掩怨讐之偏奏猥被共工之大惡無所陳怨訴罪尊以京師廢亂羣盜並興選賢徵用起家為卿賊亂既除豪猾伏辜即以佞巧廢黜一尊之身三期之間乍賢乍佞豈不甚哉孔子曰愛之欲其生惡之欲其死是惑也浸潤之譖不行焉可謂明矣願下公卿大夫博士議郎定尊素行夫人臣而傷害隂陽死誅之罪也靜言庸違放殛之刑也審如御史章尊乃當伏觀闕之誅放於絶人之域不得茍免及任舉尊者當獲選舉之辜不可但已即不如章飾文深詆以訴無罪亦宜有誅以懲讒賊之口絶詐欺之路唯明主參詳使白黑分别論罷昌陵劉向臣聞易曰安不忘危存不忘亡是以身安而國家可保也故賢聖之君博觀終始窮極事情而是非分明王者必通三統明天命所授者博非獨一姓也孔子論詩至於殷士膚敏祼將於京喟然歎曰大哉天命善不可不傳於子孫是以富貴無常不如是則王公其何以戒慎民萌何以勸勉蓋傷微子之事周而痛􅎋之亡也雖有堯舜之聖不能化丹朱之子雖有禹湯之德不能訓末孫之桀紂自古及今未有不亡之國也昔髙皇帝既滅秦將都雒陽感寤婁敬之言自以德不及周而賢於秦遂徙都關中依周之德因秦之阻世之長短以德為效故常戰栗不敢諱亡孔子所謂富貴無常蓋謂此也孝文皇帝居霸陵北臨厠意悽愴悲懷顧謂羣臣曰嗟乎以北山石為椁用紵絮斫陳漆其間豈可動哉張釋之進曰使其中有可欲雖錮南山猶有隙使其中無可欲雖無石椁又何戚焉夫死者無終極而國家有廢興故釋之之言為無窮計也孝文寤焉遂薄葬不起山墳易曰古之葬者厚衣之以薪藏之中野不封不樹後世聖人易之以棺槨棺槨之作自黃帝始黃帝葬於橋山堯葬濟隂丘壠皆小葬具甚微舜葬蒼梧二妃不從禹葬會稽不改其列殷湯無葬處文武周公葬於畢秦穆公葬於雍槖泉宫祈年館下樗里子葬於武庫皆無丘壠之處此聖帝明王賢君智士逺覽獨慮無窮之計也其賢臣孝子亦承命順意而薄葬之此誠奉安君父忠孝之至也夫周公武王弟也葬兄甚微孔子葬母於防稱古墓而不墳曰丘東西南北之人也不可不識也為四尺墳遇雨而崩弟子修之以告孔子孔子流涕曰吾聞之古者不修墓蓋非之也延陵季子適齊而反其子死於嬴博之間穿不及泉斂以時服封墳掩坎其髙可隱而號曰骨肉復歸於土命也魂氣則無不之也夫嬴博去吳千有餘里季子不歸葬孔子往觀曰延陵季子於禮合矣故仲尼孝子而延陵慈父舜禹忠臣周公弟弟其葬君親骨肉皆微薄矣非茍為儉誠便於體也宋桓司馬為石槨仲尼曰不如速朽秦相呂不韋集知略之士造春秋亦言薄葬之義皆明於事情者也逮至吳王闔閭違禮厚葬十有餘年越人發之及秦惠文武昭莊襄五王皆大作丘壠多其瘞藏或盡發掘暴露甚足悲也秦始皇帝葬於驪山之阿下錮三泉上崇山墳其髙五十餘丈周回五百有餘石槨為遊館人膏為燈燭水銀為江海黃金為鳬雁珍寶之藏機械之變棺槨之麗宫館之盛不可勝原又多殺宫人生薶工匠計以萬數天下苦其役而反之驪山之作未成而周章百萬之師至其下矣項籍燔其宫室營宇往者咸見發掘其後牧兒亡羊羊入其鑿牧者持火照求羊失火燒其藏槨自古及今葬未有盛如始皇者也數年之間外被項籍之災內罹牧豎之禍豈不哀哉是故德彌厚者葬彌薄知愈深者葬愈微無德寡知其葬愈厚丘壠彌髙宫廟甚麗發掘必速由是觀之明暗之效葬之吉凶昭然可見矣周德既衰而奢侈宣王賢而中興更為儉宫室小寢廟詩人美之斯干之詩是也上章道宫室之如制下章言子孫之衆多也及魯莊公刻飾宗廟多築臺囿後嗣再絶春秋刺焉周宣如彼而昌魯秦如此而絶是則奢儉之得失也陛下即位躬親節儉始營初陵其制約小天下莫不稱賢明及徙昌陵增埤為髙積土為山發民墳墓積以萬數營起邑居期日迫卒功費大萬百餘死者恨於下生者愁於上怨氣感動隂陽因之以飢饉物故流離以十萬數臣甚惛焉以死者為有知發人之墓其害多矣若其無知又安用大謀之賢知則不説以示衆庶則苦之若茍以説愚夫淫侈之人又何為哉陛下慈仁篤美甚厚聰明疏達蓋世宜𢎞漢家之德崇劉氏之美光昭五帝三皇而顧與暴秦亂君競為奢侈比方丘壠説愚夫之目隆一時之觀違賢知之心亡萬世之安臣竊為陛下羞之唯陛下上覽明聖黃帝堯舜禹湯文武周公仲尼之制下觀賢知穆公延陵樗里張釋之之意孝文皇帝去墳薄葬以儉安神可以為則秦昭始皇增山厚藏以侈生害足以為戒初陵之橅宜從公卿大臣之議以息衆庶議復三郡虞詡臣聞子孫以奉祖為孝君上以安民為明此髙宗周宣所以上配湯武也禹貢雍州之域厥田惟上且沃野千里穀價殷積又有龜兹鹽池以為民利上郡龜兹縣有鹽官即今榆林府地水草豐美土宜産牧牛馬銜尾羣羊塞道北阻河山乘厄據險因渠以溉水舂河漕用功省少而軍糧饒足故孝武皇帝及光武築朔方開西河置上郡皆為此也而遭元元無妄之災衆羌內潰郡縣兵荒二十餘年夫棄沃壤之饒損自然之財不可謂利離河山之阻守無險之處難以為固今三郡未復安定北地上郡園陵單外而公卿選懦容頭過身張解設難但計所費不圖其安宜開聖德考行所長請取漢中法正曹操一舉而降張魯定漢中不因此勢以圖巴蜀而留夏侯淵張郃屯守身遽北還此非其智不逮而力不足也必將內有所逼故耳今䇿淵郃才略不勝國之將帥舉衆往討則蜀可克克之之日廣農積穀觀釁伺隙上可以傾覆冦敵尊奬王室中可以蠶食雍涼廣拓境土下可以固守要害為持久之計此蓋天以與我時不可失也諫用兵南鄭魏劉資昔武皇帝征南鄭取張魯陽平之役危而後濟又自往拔出夏侯淵軍數言南鄭直為天獄中斜谷道為五百里石穴耳言其深險喜出淵軍之辭也又武皇帝勝於用兵察蜀賊栖於山巖視吳虜竄於江湖皆撓而避之不責將士之力不爭一朝之忿誠所謂見勝而戰知難而退也今若進軍就南鄭討亮道既險阻計用精兵又轉運鎮守南方四州遏禦水賊凡用十五六萬人必當復更有所發興天下騷動費力廣大此誠陛下所宜深慮夫守戰之力力役參倍但以今日見兵分命大將據諸要險威足以震懾強冦鎮靜疆埸將士虎睡百姓無事數年之間中國日盛吳蜀二虜必自罷斃請追贈魏興太守吉挹晉桓沖故輕車將軍魏興太守吉挹祖朗西臺傾覆隕身守節挹世篤忠孝乃心本朝臣亡兄溫昔伐咸陽軍次灞水挹攜將二弟單馬來奔録其此誠仍加擢授自新野太守轉在魏興久處兵任委以邉戌疆埸歸懷著稱所蒞前年狡氐縱逸浮河而下挹孤城獨立衆無一旅外摧凶鋭內固津要虜賊舟船俘馘千計而賊并力攻圍經歷時月會襄陽失守邉情沮喪加衆寡勢殊以至陷沒挹辭氣慷慨志在不辱仗刃推戈期之以隕將吏持手用不即斃遂乃杜口無言絶粒而死挹參軍史頴近於賊中得還賫挹臨終手疏并具説意狀挹之忠志猶在可録若蒙天施垂曲宥之恩則榮加枯朽惠隆泉壤矣請西都關中奏北周王思政髙歡之心行路所共知矣洛陽四面受敵非用武之地關中有崤函之固一人可禦萬夫且士馬精強糧儲委積進可以討除逆命退可以保據關河宇文夏州糾合同盟願立功效若聞車駕西幸必當奔走奉迎藉天府之資因已成之業一二年間習戰陳勸耕桑修舊京何慮不克請車駕還京唐郭子儀臣聞雍州之地古稱天府左控隴蜀右扼崤函前有終南太華之險後有清渭濁河之固神明之奧王者所都地方數千里帶甲十餘萬兵強士勇雄視八方有利則出攻無利則入守此用武之國非諸夏所同秦漢因之卒成帝業其後或處之而泰去之而亡前史所書不唯一姓及隋氏季末煬帝南遷河雒丘墟兵戈亂起髙祖倡義亦先入關唯能剪滅姦雄底定區宇以至於太宗髙宗之盛中宗玄宗之明多在秦川鮮居東雒間者羯胡搆亂九服分崩河北河南盡從逆命然而先帝仗朔方之衆慶緒奔亡陛下藉西土之師朝義就戮豈惟天道助順抑亦地形使然此陛下所知非臣飾説近因吐蕃凌逼鑾駕東巡蓋以六軍之兵素非精練皆市肆屠沽之人務挂虛名茍備征賦及驅以就戰百無一堪亦有潛輸貨財因以求免又中官掩蔽庶政多荒遂令陛下振蕩不安退居陜服斯蓋關於委任失所豈可謂秦地非良者哉今道路云云不知信否咸謂陛下已有成命將幸雒都臣熟思其端未見其利夫以東周之地久陷賊中宫室焚燒十不存一百曹荒廢曾無尺椽中間畿內不滿千户井邑榛棘豺狼所嘷既乏軍儲又鮮人力東至鄭汴達於徐方北自覃懷徑於相土人煙斷絶千里蕭條將何以奉萬乘之牲餼供百官之次舍矧其土地狹厄才數百里間東有成臯南有二室險不足恃適為戰場陛下奈何棄久安之勢從至危之䇿忽社稷之計生天下之心臣雖至愚竊為陛下不取且聖旨所慮豈不以京畿新遭剽掠田野空虛恐糧食不充國用有闕以臣所見深為不然昔衛文公小國之臣諸侯之主耳遭懿公為狄所滅始廬於漕衣大布之衣冠大帛之冠元年革車三十乘季年三百乘卒能恢復舊業享無疆之休況明明天子恭儉節用茍能黜素餐之吏去冗食之官抑竪刁易牙之權任蘧瑗史鰌之直薄征弛力恤隱逮鰥委諸相以簡賢任能付老臣以練兵禦侮則黎元自理盜賊自平中興之功旬月可冀卜年之期永永無極矣願時邁順動回鑾上都再造邦家維新庶政奉宗廟以修薦享謁陵寢以崇孝思臣雖隕絶死無所恨鑾駕將還宫闕論發日狀節陸贄褒斜峻阻素號畏途緣側徑於巔巖綴危棧於絶壁或百里之內歷險且千或一程之中涉水數四若遇積雨滯浸羣峯澍流巨石崩奔訇殷相繼深谷瀰漫往來不通悉非功力之所支籌略之所遏斯須之頃跬步之間倉黃遘殃皆不可測匹夫單騎尚且過防況萬乘時行千官景從而可以蹈不存之險冒無禦之災乎如或磴路潨崩閣道淹圯環衛之儀少闕屬車之馬微驚縱有億徒何所為用陛下欲無駭慮其可得乎又或霪滯更深溪澗皆溢徑路既絶傳送無由連山萬里進退不可一日乏食將如之何陛下欲無軫憂固亦難矣人主舉措宜圖萬全必先事以防危不臨危而求幸幸而獲濟貽愧已深不幸罹災追悔何及孔子曰欲速則不達誠哉是言臣今非敢阻陛下欲速之情但頗以不達為慮耳言邉事宋宋琪臣頃任延州節度判官經涉五年雖未嘗躬造夷落然嘗令蕃落將和斷公事嵗無虛月蕃部之事熟於聽聞大約黨項吐蕃風俗相類其帳族有生户熟户接連漢界入州城者謂之熟户居深山僻逺橫過冦略者謂之生户其俗多有世讐不相來往遇有戰鬬則同惡相濟傳箭相率其從如流雖各有鞍甲而無魁首統攝並皆散漫山川居常不以為患黨項界東自河西銀夏西至靈鹽南距鄜延北連豐會厥土多荒隙是前漢呼韓邪所處河南之地幅員千里從銀夏至青白兩池地惟沙磧俗謂平夏拓拔蓋蕃姓也自鄜延以北多土山柏林謂之南山野利蓋羌族之號也從延州入平夏有三路一東北自豐林縣葦子驛至延川縣接綏州入夏州界一正北從金明縣入蕃界至蘆關四五百里方入平夏州南界一西北歷萬安鎮經水安城出洪門至宥州四五百里是夏州西境我師如入夏州之境宜先招致接界熟户使為鄉道其強壯有馬者令去官軍三十五里踏白先行緣此三路土山柏林溪谷相接而復隘狹不得成列躡此鄉道可使步卒多持弓弩搶鋸隨之以二三千人登山偵邏俟見坦途寧靜可傳號勾馬遵路而行我皆嚴備保無虞也長興四年夏州李仁福死有男彛超擅稱留後當時詔延州安從進與李彜超換鎮彛超據夏州固不奉詔朝廷命邠州藥彥稠總兵五萬送從進赴任時頓兵城下議欲攻取軍儲不繼遽命班師而振旅之時不能嚴整失戈棄甲遂為邉人之利臣又聞黨項號為小蕃非是勍敵若得出山布陳止勞一戰便可蕩除深入則饋運艱難窮追則窟穴幽隱莫若緣邉州鎮分屯重兵俟其入界侵漁方可隨時掩擊非惟養勇亦足安邉凡烏合之徒勢不能久利於速鬬以逞兵鋒莫若持重守疆以挫其鋭彼無城守衆乏餱糧威賞不行部族分散然後密令覘其保聚之處預於麟府鄜延寧慶靈武等州約期會兵四面齊進絶其奔走之路合勢擊之可以剪除無噍類矣仍先告語諸軍擊賊所獲生口資畜許為已有彼為利誘則人百其勇也靈武路自通達軍入青岡峽五百里皆蕃部熟户向來使人商旅經由並在部族安泊所求賂遺無幾謂之打當亦如漢界逆旅之家宿食之直也此時大軍或須入其境則鄉道踏白當如夏州之法況彼靈州便是吾土芻粟儲蓄率皆有備緣路五七程不煩供饋止令逐都兵騎褁糧輕齎便可足用諺語所謂磨鐮殺馬劫一時之力也旬浹之餘固無闕乏矣攻守方略疏陳執中元昊乘中國久不用兵竊發西陲以遊兵困徑卒甘言悅守臣一旦連犯亭障延安幾至不保此蓋范雍納詭説失於戒嚴劉平輕躁喪其所部上下紛攘逺近震駭自金眀李士彬族破而並邉籬落皆大壞塞門金眀相距二百里宜列修三城城兵千人益募弓箭手冦大至則退保小至則出鬭選閣門祗候以上為塞主都監以諸司使為蘆關一路都巡檢以兵二千屬之使為三寨之援熟羌居漢地久者委邉臣拊存之反覆者破逐之至於新附黠羌如涇原康奴滅臧大蟲族久居內地常有叛心不肆剪除恐終為患今軍須之出民已愁歎復欲遍修城池如河北之制及夏須成使神運之猶恐不能民力其堪此乎陜西地險非如河北惟涇州鎮戎軍勢稍平易若不責外守而勞內營非䇿之上也宜先並邉城池其次如延州之鄜同環慶之邠寧不過五七處量為營葺則科率減民力蘇矣今賊勢方張宜靜守以驕其志蓄鋭以挫其鋒增土兵以備守禦省騎卒以減轉餉然後徐議蕩平改張制度更須主張將臣橫議不入則忠臣盡節而捐軀矣論西事劄子范仲淹臣聞兵家之事在先觀虛實之勢實則避之虛則攻之今緣邉城塞有五七分之備而關中之備無三二分若昊賊知我虛實必先脅邉城不出戰則深入乘關中之虛小城可破大城可圍或東阻潼關隔兩川貢賦緣邉懦將不能堅守則朝廷不得髙枕矣為今之計莫若且嚴邉城使永久可守實關內使無虛可乘西則邠州鳳翔為環慶源渭之聲援北則同州河中府扼鄜延之要害東則陜府華州據黃河潼關之險中則永興為都會之府各須屯兵三二萬人若冦至使邉城清野不與大戰關中稍實豈敢深入復命五路修攻取之備張其軍聲分彼賊勢使弓馬之徑無所施牛羊之貨無所集三二年間彼自困弱待其衆心離叛自有間隙則行天討此朝廷之上䇿也又聞邉臣多請五路入討臣竊計之恐未可以輕舉也太宗朝以宿將精兵北伐西討艱難嵗月終未收復緣大軍之行糧車甲乘動彌百里敵騎輕捷邀擊前後乘風揚沙一日數出進不可前退不可息水泉不得飲沙漠無所獲此所以無功而有患也况今承平嵗久中原無宿將精兵一旦興深入之謀擊難制之敵臣謂國之安危未可知也然則漢唐之時能拓疆萬里者蓋當時授任與今不同既委之以兵又與之稅賦而不求速效故養猛士延謀客日練月計以待其隙進不俟朝廷之命退不觀有司之責觀便乘勝如李牧之守邉可謂善破敵者惟陛下深計而緩圖之乞救濟陜西飢民前人臣等竊見陜西永興軍同耀華州陜府等處今夏災旱得雨最晚民間秋稼甚無所望官中倉廩亦無積貯若不作擘畫即百姓大段流移殍亡者衆兼軍食闕絶臨時轉運不及臣等欲乞朝廷速降指揮委本路都轉運使孫沔速相度上件州軍向去救濟飢民及辦給軍食有何次第如難為擘畫即便於黃河內搬輦自京以來斛斗往彼應副仍速行相度沿路如何計綱即不至艱阻事狀聞奏候到乞朝廷早賜施行請權罷陜西州軍科率包拯一鳯翔府斜谷造船務每年造六百料額船六百隻方木物料等自來分擘與秦隴鳯翔府諸處採買應付慶厯六年七年材料等共三十二萬見欠七萬有零慶厯八年材料等共二十一萬七千有零全欠一斜谷務又打造咸陽陜府橋腳船四十四隻合用材料共三萬一千有零見配買次一修河樁橛共四十五萬一千六百五十二條係七州科買一上京材木共九萬三千一百五條各係大料木植十四州科買一採斫澶州河中府纜索竹一百五十萬三千八百二十竿見差人司竹監斫次一買上供肉羊兔千口係十九州軍一買紫草一萬斤係十州軍一買紅花四千斤係六州軍右具如前臣勘會鳯翔府造船場每年額船六百隻其方木料并是本府并隴州量支官錢收買及於秦州採斫所差衙前例各賠錢一二千貫前後人户破蕩家産不少每戶錮身者不下三兩人經年未得了當時準三司牒買修河樁橛四十三萬餘條亦於永興等七州軍配買比之常嵗多兩倍已上并河中府澶州要纜索竹一百五十萬竿見差人司竹監斫次今又準三司牒採買上件材木九萬三千條有零亦是分配永興等十四州收買緣並係大料木植只是秦州出産又聞深入畨界採斫至難其餘不産州軍須至差衙前分買况陜西州軍一年之內三五次各是大段科配兼又錢法改更之後民間即目大段不易若稍不行寬恤則疲困之民無保全之望雖詳省中書劄子住九年十年科買又只聞説肉羊紫草紅花之類並是小可物色亦易為應付所有逐年買造船場材木物料及樁橛等最為大害乞賜詳酌指揮權與蠲免請罷同州韓城冶户前人臣近聞同州韓城縣鐵冶務自來定占七百餘户內二百餘户厚有物力此見充里正人户並各髙強只以冶户為名經今五十餘年影占州縣諸般差役其冶户內係第一等者每户逐年共給冶務諸般所出錢不過三貫文外更别無所費況官中所得鐵貨只及十餘萬斤仍官支買炭并工匠錢三百餘貫更差専監使臣一員兼體問得本縣人户以冶務全占却上等力役及致下等人户差役頻併供應不前若將上件鐵數據等第均在本縣人户上每約納官鐵嵗不過十斤至二三十斤況本處見賣每斤價錢二十四五文每户嵗納官鐵約費三五百文雖自來官禁烹煉彼中私賣甚多令百姓取便烹煉必然鐵價轉下兼令赴本縣送納於民至便又減省得監官一員只令本縣令佐専管給納仍得二百餘户兼充重難役次頗甚均濟臣在任日方欲行遣屬以移任欲乞下本路轉運司選差清幹官員往彼相度施行論夏人納鹽易茶前人臣伏見西虜再遣楊守素詣闕請命而朝旨方議納其誠欵此亦安民禦邉之長䇿也風聞道路云元昊欲嵗納青鹽貿易茶貨然未審虛實緣元昊數州之地財用所出並仰給於青鹽自用兵以來沿邉嚴行禁約者乃困賊之一計爾今若許以嵗進數萬石必恐禁法漸弛姦謀益熾不惟侵奪解鹽課利亦慮浸成大敝關防或未能制若稍行捉捕則棄前恩結後怨此亦必然之勢也議者復欲令運於關東支用或許客人禆販則又不免配率車乘轉成騷擾固朝廷所宜慎重此舉如不獲已則不若於前來許賜帛繒茶貨數量與增加亦可以弭亡厭之求兼此劇賊猖狂難保沿邊塞柵備禦之具亦不可少懈論麟州事宜劄子歐陽修臣昨奉聖旨至河東與明鎬商量麟州事緣臣未到間鎬已先有奏議尋再凖樞密院劄子備録鎬等所奏令臣更切同共從長相度臣遂親至河外相度利害與明鎬等再行商議乞那減兵馬人數可以粗減兵費已具連署奏聞此外臣别有短見合盡條陳其利害措置之説列為四議如後一曰辨衆説臣竊詳前後臣僚起請其説有四或欲廢為寨名或欲移近河次或欲抽兵馬以減省饋運或欲添城堡以招輯蕃漢然廢為寨而不能減兵則不若不廢茍能減兵而省費則何害為州其城堡堅完地形髙峻乃是天設之險可守而不可攻其至黃河與府州各才百餘里若徙之河次不過移得五七十里之近而棄易守難攻之天險以此而言移廢二説未見其可至如抽減兵馬誠是邉議之一端然兵冗不獨麟州大弊乃在五寨若只減麟州而不減五寨與不減同凡招輯蕃漢之民最為實邉之本然非朝廷一時可自為必須委付邉臣許其久任漸推恩信不限嵗年使得失不繫於朝廷之急而營緝如其家事之専方可收其逺效非二年一替之吏所能為也臣謂減兵添堡之説近之而未得其要二曰較存廢今河外之兵除分休外尚及二萬大抵盡河東二十州軍以贍二州五寨為河外數百邉户而竭數百萬民財賊雖不來吾已自困使賊得不戰疲人之䇿而我有殘民斂怨之勞以此而思則似可廢然未知可存之利今二州五寨雖云空守無人之境然賊亦未敢據吾地是尚能斥賊於二三百里外若麟州一議移廢則五寨勢亦難存兀爾府州便為孤壘而自守不暇是賊可以入據我城堡耕牧我土田夾河對岸為其巢穴今賊在數百里外沿河尚費於防秋若使夾岸相望則泛舟踐氷終嵗常憂冦至沿河內郡盡為邉戍以此而慮則不可不存然須得存之之術三曰減寨卒臣勘會慶厯三年一年用度麟州用糧七萬餘石草二十一萬餘束五寨用糧一十四萬餘石草四十餘萬束其費倍於麟州於一百二十五里之地列此五寨除分兵歇泊外尚有七千五百人别用二千五百人負糧又有并欣等十州軍百姓輸納外及商旅入中往來其冗長勞費不可勝言逐寨不過三五十騎巡綽伏路其餘坐無所為蓋初建五寨之時本不如此寨兵各有定數建寧置一千五百人其餘四寨各止三百至五百今之冗數并是後來增添臣謂今事冝稍緩不比建寨之初然且約舊數尚不至冗費臣請只於建寧留一千人置一都巡檢其鎮川中堠百勝三寨各留五百其餘寨兵所減者屯於清寨堡以一都巡檢領之緣此堡最在近東隔河便是保德軍屯兵可以就保德軍請糧則不煩輸運過河供饋若平日路人宿食諸寨五百之卒巡綽有餘或些小賊馬則建寧之兵可以禦捍若賊數稍多則清寨之兵不失應援蓋都不去百里之內非是減兵但那移就食而已如此則河外省費民力可紓四曰委土豪今議麟州者存之則困河東棄之則失河外若欲兩全而不失莫若擇一土豪委之自守麟州堅險與兵二千其守足矣况所謂土豪者乃其材勇獨出一方威名既著敵所畏服又能諳敵情偽凡於戰守不至乖謀若委以一州則自視州如家繫已休戚其戰自勇其守自堅又其既是土人與其風俗情接人賴其勇亦喜附之則蕃漢之民可使漸自招集是外能捍賊而戰守內可輯民以實邉省費減兵無所不便比於命吏而往凡事仰給於朝廷利害百倍也必用土豪非王吉不可吉見在建寧寨蕃漢依吉而耕於寨側者已三百家其材勇則素已知名况其官序自可知州一二年間視其後效茍能善守則可世任之使長為捍邉之守右臣所陳乃是大計伏望聖慈特賜裁擇若可以施行則紓民減費之事容臣續具條列取進止通進司上皇帝書節前人臣聞今為西計者皆患漕運之不通臣以為但未求之耳今京師在汴漕運不西而人之習見者遂以為不能西不知秦漢隋唐其都在雍則天下之物皆可致之西也山川地形非有變易於古其路皆在昔人可行今人胡為而不可漢初嵗漕山東粟數十萬石是時運路未修其漕尚少其後武帝益修渭渠至漕百餘萬石隋文帝時沿水為倉轉相運置而關東汾晉之粟皆至渭南運物最多其遺倉之迹往往皆在然皆尚有三門之險自唐裴耀卿又尋隋迹於三門東西置倉開山十八里為陸運以避其險卒泝河而入渭當時嵗運不減二三百萬石其後劉晏遵耀卿之路悉漕江淮之米以實關西後世言能經財利而善漕運者耀卿與晏為首今江淮之米嵗入於汴者六百萬石誠能分給關西得一二百萬石足矣今兵之食汴漕者出戍甚衆有司不惜百萬之粟分而及之其患者三門阻其中爾今宜浚治汴渠使嵗運不阻然後按求耀卿之迹不憚十許里陸運之勞則河漕通而物可致且紓關西之困使古無法今有可為尚當為之况昔人行之而未逺今人行之而豈難哉耀卿與宴初理漕時其得尚少至其末年所入十倍是可久行之法明矣此水運之利也臣聞漢髙祖之入秦不由東關而道南陽過酈析而入武關曹操等起兵誅董卓亦欲自南陽道丹析而入長安是時張濟又自長安出武關奔南陽則自古用兵往來之徑也臣嘗至南陽問其遺老云自鄧西北至永興六七百里今小商賈往往行之初漢髙入關其兵十萬夫能容十萬兵之路宜不甚狹而險也但自洛陽為都行者皆趨東關其路久而遂廢今能按求而通之則武昌漢陽郢復襄陽梁洋金商均房光化沿漢之地十一二州之物皆可漕而頓之南陽自南陽為輕車人輦而遞之募置遞兵為十五六鋪則十餘州之物日日入關而不絶沿漢之地山多美木近漢之民仰足而有餘以造舟車甚不難也前日陛下深恤有司之勤內賜禁錢數十萬以供西用而道路艱逺輦運逾年不能畢至至於運裝輸送多苦秋霖邊州已寒冬服尚滯於路其艱如此夫使州縣綱吏逺輸京師轉冒艱滯然後得西豈若較南陽之旁郡度其道里入於武關與至京師逺近等者與其尤近者皆使直輸於關西京師之用有不足則以禁帑出賜有司者代而充用其迂曲簡直利害較然矣此陸運之利也論復置豐州劄子司馬光臣等伏見國家復置豐州故城仍差人知州此誠河西險要之地修之甚便然其地勢孤絶外迫冦境嚮者王氏知州之時所部蕃族甚衆有永安來逺保寧三寨皆以蕃族守之慶厯初拓跋元昊攻陷州城州民及三寨蕃族盡為所虜掃地無遺今州城之中但有丘墟瓦礫環城數十里皆草莽林麓而已若建以為州則須復設外寨備置官吏廣屯兵馬多積芻糧皆應調發內地之民以奉之勞費甚大此所謂徇虛名而受實弊也頃年朝廷欲修豐州城河東經略司嫌其單外乃於其南數十里築永寧堡其地窪下居兩山間疏惡難守令既修豐州則永寧堡深在腹內無所復用臣等以為不若遷永寧堡於豐州故城其兵馬芻糧不須增益但擇使臣有材略者使守之不必假以知州之名仍召募蕃漢之民使墾闢近城之田俟民物繁庶皆如其舊然後升以為州亦未晚也取進止言陳述古劄子治平二年正月前人臣竊聞陜西都轉運使陳述古昨因巡邊妄奏稱邉鄙寧靜不足為慮後因權涇原路經略司事聞副總管劉几稱西人點集將謀入冦請出兵防禦述古恐與前奏相違因此怒几奏稱不協軍情張皇生事擅移几知鳯翔府數日之間西人果大舉犯邉殺掠弓箭手及熟户蕃部述古亦不即時發兵救援致陷沒數千戶近者雖知朝廷已差臺官勘述古罪狀然竊聞所坐止於擅移劉几及奏狀有不實之處若以文吏議之罪不至重若以國計言之為害實深何則國家承平日久人不習戰雖屯戍之兵亦臨敵難用唯弓箭手及熟户蕃部皆生長邉陲習山川道路知西人情偽材氣勇悍不懼戰鬬從來國家賴之以為藩蔽今述古知西人欲來侵擾而自避翻覆之辜順成欺罔之謀抑遏將官不許救護遂以數千户生民委於虎口使父子流離骨肉塗炭豈惟已陷沒者深可哀痛臣恐自今以後諸路弓箭手皆不敢於極邉居止熟户蕃部皆有叛國從賊之心以此觀之其害豈小哉况述古出於門蔭材氣庸鄙自歷官以來所至之處縱恣胸臆殘虐吏民不顧憲典輕侮王命驕暴狠狡天下共知屢會坐事黜降旋復收用叨竊名位一朝至此誠過其分量故天奪之魄舉措乖謬駭人視聼陷敗民命挫辱國威內外之人無不憤疾臣聞舜誅四凶而天下服如述古平生所為亦可以謂之凶人矣陛下縱不欲明加斧鉞以謝邊民亦當投之荒裔以禦魑魅庶使封疆之臣少加警懼取進止乞罷刺陜西義勇第四劄子前人臣近日已三次上言乞罷刺陜西義勇事未蒙朝廷采納臣欲止而不言則不忍坐視一路之民橫受困苦而自圖一身之安又恐遷延日久則無及於事是以不敢避斧鉞之誅繼上封奏為陛下極陳其害臣比日以來熟思此事誠於民有世世之害於國無分毫之利何謂於民有世世之害臣竊見河北陜西河東自景祐以前本無義勇凡州縣諸般色役並是上等有物力戶人支當其鄉村下等人户除二稅之外更無大段差徭自非大飢之嵗則溫衣飽食父子兄弟熙熙相樂自寶元慶𩔶之間朝廷因趙元昊叛亂契丹壓境遂於三路鄉村人戶之中不問貧富等第但有三丁之家即揀一丁充鄉弓手及強壯其時西邊事宜尤急尋將陜西一路鄉弓手盡刺面充保捷指揮正軍其河北河東事宜稍緩遂只將鄉弓手及強壯刺手背充義勇自此三路之人始騷然愁苦矣其河北河東之民比於陜西雖免離家去鄉戍邉死敵之患然一刺手背之後則終身拘綴或欲逺出幹事糴賤販貴或遇水旱凶荒欲分房逐熟或典賣田産欲浮遊作客皆慮官中非時點集不敢東西又當差點之際州縣之吏寧無乞覔教閲之時人員教頭寧無斂掠是於常時色役之外添此一種科徭也若果如議者之言無害於民則民皆樂從官中何必更刺其手背以防逃竄乎以此觀之義勇為害於兩路之民已可知矣况陜西於慶厯年中民家已各喪一丁刺充保捷流落不歸今又取其次丁刺充義勇不亦甚乎朝廷近年分命朝臣遍往諸路減省諸般色役至於弓手壯兵解子驛子之類州縣所不可闕者亦皆減放謂之寬恤民力今乃無故一旦刺一路之民十有餘萬以為義勇何朝廷愛之於前而忍之於後憫之於小而忘之於大乎且今日既籍之後則州縣義勇皆有常數每有逃亡病死州縣必隨而補之則義勇之身既羈縻以至老死而子孫若有進丁又不免刺為義勇是使陜西之民子子孫孫常有三分之一為兵也臣故曰於民有世世之害也何謂於國無分毫之利太祖太宗之時未有義勇至於正軍亦不及今日十分之一然而太祖取荆湖平西川下廣南克江南太宗取兩浙克河東一統天下若振稿拾遺此豈義勇之力也哉蓋由民政修治軍令嚴肅將帥得人士卒精練故也康定慶厯之間趙元昊負纍朝厚恩無故逆命侮慢不恭侵犯邉境朝廷竭天下之力以奉邊鄙劉平任福葛懷敏之師相繼覆沒士卒死者動以萬數正軍不足益以鄉兵外府不足繼以內帑民力困極財物殫盡終不能出一旅之衆涉甌脫之地以討其罪而不免含垢忍恥假以寵名誘以重賂僅得無事當是之時三路新置鄉兵共數十萬何嘗得一人之力乎以此觀之義勇無用亦可知矣賈誼有言曰前車覆後車戒康定慶厯禦戎之䇿國家當永以為戒今乃一一檢當時體例而行之是後車又將覆也有難臣者必曰古之兵皆出民間豈民兵可用於古而不可用於今乎臣則對曰三代之時用井田之法以出士卒車馬居則為比閭族黨州鄉行則為伍兩卒旅師軍為之長者皆鄉大夫也唐初府兵各有營府不屬州縣有將軍郎將折衝果毅以相統攝是以令下之日數萬之衆可以立具無敢逃亡避匿者以其綱紀素備故也今鄉兵則不然雖有軍員節級之名皆其鄉黨族姻平居相與拍肩把袂飲博鬬毆之人非如正軍有階級上下之嚴也若安寧無事之時州縣聚集教閲則亦有行陳旗鼓關弓彍弩坐作呌噪真如可以戰敵者彼若聞胡冦大入邊兵已敗邊城不守胡騎殺掠蹂踐卷地而來則莫不迎望風聲奔波迸散其軍員節級將鳥伏鼠竄自救之不暇豈有一人能為縣官率士卒而待冦乎以臣觀之此正如兒戲而已安有為國家計驚騷一路之民使之破家失業而為兒戲之事乎臣故曰於國無分毫之利也凡此利害之明有如白黑伏望陛下不以臣愚賤而忽其言少留聼察其刺陜西義勇事早賜寢罷則一方幸甚取進止諫征西疏熙寧四年正月前人臣以不材誤承朝廷委用待罪長安兼領一路十州兵民大柄朝辭之日伏蒙陛下面諭凡邊防事機及朝廷得失有所聞見令一一奏聞臣受命以來且愧且懼所愧者聖恩深厚責任至重所懼者智識淺短無以堪稱夙夜疚心不敢寧居臣自入境以來見流移之民道路相望詢訪閭里皆云今夏大旱禾苗枯瘁河渭以北絶無所收獨南山下稍有所存而入秋霖雨經月不霽禾雖有穗往往無實雖有實往往無米雖有米率皆細黑一斗之粟舂簸之後不過得米三四升穀價踊貴民間纍年困於科調素無積蓄不能相贍以此須至分房減口就食西京襄鄧商虢等州或傭賃客作或燒炭採薪或乞丐剽竊以度朝夕當此之際國家惟宜鎮之以靜省息諸事減節用度則租稅自輕徭役自少逋負自寬科率自止四患既除民力自足民財自饒閭里自安流亡自還固不待陛下憂勤於上宰相劬勞於下然後人人得其所也茍或不然國家雖欲輕租稅寬逋負其所費之財何由可得雖欲少徭役止科率其所營之事何由可成四患不除雖日下恩澤之詔民猶不免於流移轉死也蓋欲止沸者莫若絶薪欲安民者莫若省事此目前之驗非難知也臣到官以來伏見朝廷及宣撫等司指揮分義勇作四畨欲令以次於緣邉戍守選諸軍驍鋭及募閭里惡少以為竒兵造乾糧皺飯布囊力車以備餽運悉取嵗賜秉常之物散給緣邉諸路又竭內地府庫甲兵財物以助之且以永興一路言之所發人馬甲八千副錢九萬貫銀二萬三千兩銀碗六千枚其餘細瑣之物不可勝數動皆迫以軍期上下相驅急於星火官吏狼狽下民驚疑皆云國家將以今春大舉六師長驅深入以討秉常之罪臣以疏賤不得預聞廟堂之議未知兹事為虛為實昨者親承德音以方今邉計唯宜謹嚴守備俟其入冦則堅壁清野使之來無所得兵疲食盡可以坐收其弊臣退而思念聖謀髙逺深得王者御戎狄之道實天下之福及到關中乃見凡百處置皆為出征調度臣不知有司在外不諭聖意以致有此張皇將陛下默運神算不令愚賤之臣得聞其實也臣不勝惶恐晝則忘食夜則廢寢心寒股栗竊為陛下危之夫兵者凶器聖人不得已而用之自古以來國家富強將良卒精因人主好戰不已以致危亂者多矣况今公私困竭將愚卒懦乃欲驅之塞外以捕狡悍之虜其無功必矣豈惟無功兼後患甚多不可盡言也若朝廷初無出征之意則何為坐散府庫之財疲生民之力訖無分毫之事萬一將來虜騎入冦府庫已竭民力已困將何以禦之臣先任御史中丞日朝廷將興綏州之役臣會上言國家先當舉百職修庶政安百姓實倉庫選將帥立軍法練士卒精器械八事皆備然後可以征伐四夷今此八事未有一者勝於曩時而况關中飢饉十室九空為盜賊者紛紛已多縣官倉庫之積所餘無幾乃欲輕動大衆橫挑猛敵此臣之所大懼也或者又云國家未討秉常先欲試兵誅一小族若果如此猶為不可何則今者竭關中之財力大興師衆乃捨有罪之強冦誅無辜之小種勝之不武不勝為笑將無以復號令戎狄矣此二䇿者皆為不可伏望陛下深鑒安危之機消之於未萌救之於未形速下明詔撫諭關中之民以朝廷不為出征之計其義勇更不分番於緣邊戍守亦不選募竒兵凡諸調發為餽運之計者悉令停罷愛惜內地倉庫之儲以備春深調救飢窮之人如此豈惟生民之幸亦社稷之福也條列陜西利害疏九條選四范純仁臣前次上殿親奉德音以臣曾任陜西令臣具陜西利害聞奏臣才識淺拙慚無長䇿上禆聖猷謹具管見條列如左一陜西有沙苑等處監牧草地七八千頃自來養馬别無增息虛占良田今來陜西四塞之地不通漕運若得彼中自出榖食則屯聚大兵易為供贍今乞罷陜西監收將上件地開為營田募民耕種一頃嵗收公私無慮二百石則嵗可得一百五十餘萬石以助關右兵民之食為利不細其所得芻稚自可秣馬以助軍計一方今陜西苦於城寨太多及冗兵冗官為害又朝廷時有試中武藝等人並與班行殿侍送沿邉指使城寨多則分却兵糧冗官多則坐耗邊用及班行等各懼替歸本班難得差遣故人人皆思僥幸以為身謀交搆邊事無所不至今乞將間慢城寨冗官冗兵檢會臣前來劄子委帥臣監司減省其試中武藝等人即乞且送陜西內地易得糧草處差使緩急旋行勾抽不惟惜得軍儲兼免妄生邉事一解鹽之法是為邉備根本近因法壞朝廷雖曾遣張靖體量亦不能深究利病朝廷以未見弊源重於更制臣恐三二年間糧草亦更虧少今乞檢會臣前來劄子令轉運司通管公共講求長久之法庶幾范祥時糧草之數漸可復補一邊人好食西界青鹽雖嚴禁所不能止販者多是邊上強人事敗悉遭逺配邊上強人漸少甚非中國之利今乞於沿邊置𣙜場以茶并雜貨博易青鹽盡收入官與解鹽同賣仍通入解鹽課額其合用茶乞自朝廷賜與其他雜貨即令解鹽司管認如此則不惟省刑愛人亦可以固戎心息邊患乞追贈張載疏張舜民臣伏視鳯翔府橫渠鎮居住故崇文院校書張載學際天人誠動金石義之所在白創可蹈心有不厭萬鍾何加口如不能言體若不勝衣議論感激凜如秋霜雖萬軍之將不足言其勇也平居與人言退然若不知讀書者坐而講貫剖判是非談辨如流雖滔滔江漢不足方其廣也著書萬言名為正蒙隂陽變化之端仁義道德之理死生性命之分治亂國家之經罔不究通方之前人其孟軻揚雄之流乎如荀况輩不足望於載也關中學者靡然就之謂之橫渠先生一登其門言行皆知孝悌仁義有如夙成雖去載千里之逺十年之久不敢一蹈非義常若載之臨其前後左右也自此西土學者灑然知先聖賢之學乃知鄉者誦説之富組繡之文特小道爾在熙寧中纍薦朝廷召至闕下授以崇文院校書未幾以疾辭歸熙寧末年再至闕下神宗方將任用使行其所言其疾再作謁告西歸死於道路當時議者以謂載身逢明天子緣飾禮文修明治具之時再至朝廷竟不能伸其一言以終此載之短薄則不幸也有士如此當年不能興舉舉於老疾垂死之時治國者亦不得無慊然於心也載之死於今十有五年中外臣僚猶録其平生以言於朝廷者略以十數或乞賜田或録其子或乞降諡然天聽髙邈未蒙響答今載止有一妻一子衣食不足寄託親友日來月往人情憒煩飢寒之憂其勢甚迫若不上告朝廷何所赴訴且君子平日修身謹行固不為其身之與子孫也朝廷褒賢録善豈特為其賢者之後乎如孟軻荀卿揚雄於今千有餘年學者徒能讀誦其書而已至於禮貌寂寥孰肯來括本朝一旦列之封爵血食廟堂使後世觀之賢於孟軻荀卿揚雄乎賢於本朝乎故知臣今日之言非為載也伏乞朝廷檢會纍次臣僚奏陳於録子賜田追諡三者之間凡可以厚載者舉一而足庶使褒賢之典獨見於本朝為善之風不墜於今日乞選親賢為京兆牧唐重關中百二之勢控制陜西六路捍蔽川陜四路今蒲解失守與敵為鄰關中固則可保秦蜀十路無虞緣逐路帥守監司各有占護不相通融昨范致虛會合勤王之師非不竭力而將帥各自為謀不聼節制乞選宗親賢明者充京兆牧或置元帥府令總管秦蜀十道兵馬以便宜從事應帥守監司並聼節制緩急則合諸道之兵以衛社稷不惟可以禦敵亦可以救郡縣瓦解之失矣請復把胡魯陜西行省金爪爾佳德新臣伏見知河中府把胡魯廉直忠孝公家之利知無不為實朝廷之良臣也去嵗兵入延安胡魯遣將調兵城賴以完不為無功今哈達敏珠爾各授世封而胡魯改知河中府竊謂方今用人之時使謀略之臣不獲展力緩急或失事機誠宜復行省之任使與承裔共守京兆令合達買住捍禦延安以藩衛河南則內外安矣論鹽法元特穆爾近蒙委巡歷奉元東道至元元年各州縣戶口額辦鹽課其陜西運司官不思轉運之方每年豫期差人分道齎引遍散州縣甫及旬月杖限追鈔不問民之無有竊照諸處運司之例皆運官召商發賣惟陜西等處鹽司近年散於民户且如陜西行省食鹽之户該辦課二十萬三千一百六十四錠有餘於內鞏昌延安等處認定課鈔一萬六千二百七十一錠慶陽環州鳯翔興元等處嵗辦課一萬七千九百八十五錠其餘課鈔先因關陜旱飢民多流亡準中書省咨至順三年鹽課十分為率減免四分於今三載尚有逋負蓋因戶口凋殘十亡八九縱或有復業者家産已空邇來嵗頗豐收而物價甚賤得鈔為艱本司官皆勒有司徵辦無分髙下一槩給散少者不下二三引每引收價銀三錠富家無以應辦貧民安能措畫糶終嵗之糧不酬一引之價緩則輸息而借貸急則典鬻妻子縱引目到手力窘不能自運止從各處鹽商勒價收買舊債未償新引又至民力有限官賦無窮又寧夏所産韋紅鹽池不辦課程除鞏昌等處循例認納乾課從便食用外其池鄰接陜西環州百餘里紅鹽味甘而價賤解鹽味苦而價貴百姓私相販易不可禁約以此參詳河東鹽池除撈鹽戶口食鹽外辦課引數今後宜從運官設法募商興販但遇行鹽之數諸人毋得侵擾韋紅鹽法運司每嵗分輸官吏監視聼民採取立法抽分依例發賣每引收價鈔三錠自黃河以西從民食用通辦運司元額課鈔因而夾帶至黃河東南者同私鹽法罪之陜西興販解鹽者不禁如此庶望官民兩便而課亦無虧矣請陜西兼食韋紅鹽疏胡通陜西百姓許食解鹽近脫荒歉流移漸復正宜安輯而鹽吏不察民瘼止以恢辦為名不論貧富散引收課或納錢入官動經嵗月猶未得鹽蓋因地逺腳力艱澀今後若因大河以東之民分定課程買食解鹽其以西之民計口攤課任食韋紅之鹽則官不被擾民無蕩産之禍矣且解鹽結之於風韋紅之鹽産之於地東鹽味苦西鹽味甘又豈肯舍其美而就其惡乎使陜西百姓一槩均攤解鹽之課合食韋紅之鹽則鹽吏免巡禁之勞矣請從祀諡法疏節明張邦俊臣竊惟國於天地必有與立大典是也大典者何則從祀與諡法是也是故生明聖賢之道歿分爼豆之光此從祀之典為理學名臣而設也生竭報國之忠歿蒙易名之榮此諡法之典為盡忠名臣而設也兩者皆重典也典重則馭世者不得屑越以輕之固不可濫有所豫使巨典被於匪人以開天下徼幸之門亦不可靳於所豫使潛德沉而不耀以阻君子為善之路總之期於人不負典典不負人以合於至當之歸而已臣關中人也其先哲有當於兩大典者臣得於師友之所闡揚記載之所考稽業已知之稔矣臣生於先哲表樹之鄉而不為前哲以播揚之是臣有負於臣鄉之先達也臣當此講求大典之時而不求其人以充之實之是臣有負於國家之盛典也用是輒敢效區區之愚舉其所知為皇上陳之中有應堪從祀者臣僅得一人焉吕柟是已關中又有應堪補諡者除鼎彛重望朝野具瞻如原任都御史溫純方在新議自當不吝榮施以表全德臣亦不敢混而入於補諡之例也其應補諡者雍泰諸臣是已臣謹録其生平大槩人各一欵開載於後以便睿覽應從祀者原任南京禮部右侍郎諡文簡吕柟應補諡者原任南京戶部尚書雍泰原任總制三邉兵部尚書魏學曾原任吏部左侍郎盛納原任南京吏部尚書兼學士王用賓原任南京光祿寺卿馬理原任南京右都御史胡嘉謨原任吏科給事中張原原任兵科給事中裴紹宗原任兵部左侍郎鄒應龍原任南京國子監祭酒王維楨以上或繼往開來續千聖之道胍或奉公潔已立萬年之臣標或折檻殿廷共仰朝陽鳴鳯或抽毫藝苑咸誇瑞世人龍勳業與日月爭光芳名垂乾坤不朽均之不愧大典而為盛世增輝者也備陳災變疏節馬懋才臣奉差事竣道經臣鄉延安府自去嵗一年無雨草木枯焦八九月間民爭採山間蓬草而食其粒類粳皮其味苦而澀食之僅可延以不死至十月以後而蓬盡矣則剝樹皮而食諸樹惟榆樹差善雜他樹皮以為食亦可稍緩其死殆年終而樹皮又盡矣則又掘山中石塊而食其石名青葉味腥而膩少食輒飽不數日則腹脹下墜而死民有不甘於食石以死者始相聚為盜而一二稍有積貯之民遂為所劫而搶掠無遺矣有司亦不能禁治間有獲者亦恬不知畏且曰死於飢與死於盜等耳與其坐而飢死何若為盜而死猶得為飽死鬼也最可憫者如安塞城西有糞場一處每晨必棄二三嬰兒於其中有涕泣者有呌號者有呼其父母者有食其糞土者至次晨則所棄之子已無一而又有棄之者矣更可異者童稚輩及獨行者一出城外更無蹤影後見門外之人炊人骨以為薪煮人肉以為食始知前之人皆為其所食而食人之人亦不數日面目赤腫內發燥熱而死矣於是死者枕藉臭氣薰天縣城外掘數坑每坑可容數百人用以掩其遺骸臣來之時已滿三坑有餘而數里以外不及掩者又不知其幾矣小縣如此大縣可知一處如此他處可知幸有撫臣嶽和聲拮據獨苦以弭盜而兼之拯救捐俸煮粥以為之率而道府州縣各有所施以拯濟然粥有限而飢者無窮杯水車薪其何能濟乎臣仰窺皇上宵衣旰食無念不為民生慮無刻不為安民計若不急救此一方遺黎恐死者死矣為盜者為盜矣見有之民旦夕莫必其命西北疆域幾成無人之區矣伏祈敕下該部從長計議或發賑濟或蠲加派或姑減其分數或緩待之秋成惟在皇上急為渙汗耳然臣猶有説焉國初每十户編為一甲十甲編為一里今之里甲寥落户口蕭條已不復如其初矣况當九死一生之際即不蠲不減民亦有呼之而不應者官司束於功令之嚴不得不嚴為催科如一户止有一二人勢必令此一二人而賠一户之錢糧一里止有一二户勢必令此一二户而賠一甲之錢糧等而上之一里一縣無不皆然則見在之民止有抱恨而逃飄流異地棲泊無依恆産既亡懷資易盡夢斷鄉關之路魂消溝壑之填又安得不相率而為盜者乎此處逃之於彼彼處復逃之於此轉相逃則轉相為盜此盜之所以遍秦中也臣目覩此光景心幾痛裂知皇上亦必惻然動念當事諸臣自有籌畫然蚤一日則救數千萬之生靈遲一日則斃數千萬之性命惟皇上速加之意也大抵總秦地而言慶陽延安以北飢荒至十分之極而盜賊則稍次之西安漢中以下盜賊至十分之極而飢荒則稍次之緣係異常災變從來所未經見者不敢不據實以聞邉地有司減俸行取疏吳甡臣於去年六月具縣令親民之官殘邑尤宜得人一疏奉有兵荒邉地有司果著有實效準減俸行取以示鼓勸之旨仰見我皇上體恤邉吏如此其至也臣時以此勸勉有司其不肖者自為暴棄天地雖大不能施雨露之恩則亦已耳其賢能者竭蹶黽勉幸有成效而臣差將竣出關有日矣不及此時遵奉溫綸申明前説不但有負諸臣亦且負皇上體恤邉吏德意是以惴惴不敢自寧臣謹列諸有司之狀以暢言減俸之旨可乎延慶之為吏者大荒四年羣盜如毛四野焚燬一望蕭條止數孤城壁立而城以內多者千家少者數百家田地荒蕪不治課稅既停緡算復絶官無俸錢役無工食其賢者自辦資斧以糊其口孑然一身日抱印牘夜宿雉堞在戎馬烽火之中與鳩形鵠面為伍非獨無居官之榮亦且鮮生人之樂如中部保安安塞合水等縣煨燼之餘縣官棲止民房出騎欵段力不能具輿臺其艱苦至此即令亷如伯夷誰為蜚聲譽於當道之前者不幸冦至姦從內應命危如線即或僅以身免而國法俱在誰敢徇之不逮繫司敗則戍伍鬼薪狼狽一身窮歸無路臣每目擊心恫為之隕涕同為朝廷司牧綰半通之綬受一命之寄而苦樂異趣一至於此今二三賢能幹濟之吏從千苦萬難中竭力支撑保障危城可不謂循良卓軌哉而乃不得與腹裏有司爭一日之遇豈不可為太息乎惟朝廷之上垂鑒異苦憫其賢勞加以不次之擢開以減俸之例使知今日盡瘁異日尚有清華一路庶鼓舞忘倦以爭自濯袚勉收後效不然彼處安席膴者坐致美遷此茹荼食苦者久困枳棘徒以灰豪傑之心而令海內之士裹足不入秦耳臣以為宜敕下吏部覆議遵照明旨今後兵荒邉地如延安慶陽等府各州縣凡知推不論科貢但有實效應行取者減俸一年以三年四月為期即與截取考選科道部屬其同知知州等官以三年為滿即加優擢與以善地庶勞逸均而無獨賢之歎乎且不獨此也人皆視邉地為畏途故擇地而蹈者規避不前今知有減俸之例考選優擢之榮則賢者爭思奮勵於功名之路矣銓司知聖天子加意邉吏必多方遴選授以老練甲科精力孝廉而吏治從此一新收拾殘疆為生聚教訓之圖則保障之功循良之績民生與封疆俱嘉賴之矣且有司仰承風旨勉勵服官有司即將百姓即兵固圉禦侮綢繆必力其考選而為言路也則虜賊情形封疆利害得以所見聞者條議入告不至遙揣懸度以拾紙上之談其考選而在戶兵部者知糧芻虛實兵馬強弱將領勇怯及一切險隘防禦之術不致按圖循套以塞茍且之責而經濟事業亦舉從此出矣在朝廷特行一激勸之法而邉地已受無疆之福然則邉吏減俸之説豈第為諸有司計也哉伏乞皇上垂念邉吏之苦特賜鼓舞非獨延慶也雖著為令行之各邉郡州縣可矣公奏𠞰冦疏衛胤文四月以來流賊自蜀返漢分掠鳯西等府攻破平利洵陽白河紫陽鳯縣鎮安雒南永壽山陽同官興安州隴州麟遊汧陽涇州崇信隆德成縣漳縣兩當文縣秦安等州縣二十一處而衛所巡司驛遞尚不與焉此外城池雖未失而村鎮焚掠靡有孑遺者又不下百十餘處與已失者無以異載在撫按疏揭中俱歷歷可按也近按臣傅永淳與臣手書云即今強賊無數盤踞邠乾鳯隴之間全望督師拯救而督臣自漢南至鳯翔所發兵馬俱為賊困標下兵馬止百三十名無兵可發蓋因一行招撫將原帶兵馬散者散矣止者止矣虛實盡在賊中故一舉而莫可制臣等讀之未畢心膽俱寒伏思流賊之用撫也在大𠞰之後彼勢屈而力窮將匍匐以乞命我乃寬一面網為招安計則可耳若我兵既微我將既怯其視流賊也多寡既不相如強弱又甚相懸絶坐視殺掠萬狀竟爾莫展一籌不得已遍處招誘欲以撫之一著茍且結局彼流賊者當其就撫時則面撫而心叛逮其既撫後則旋撫而旋叛此臣鄉􅏤午辛未間當事諸臣用之而貽害無窮者今其可再試耶若再試之而仍然不效乃復朦朧推卸以欺我皇上至於地方將盡為賊有百姓盡為賊殺其禍安所底止哉嗟乎秦地皇上之版圖也秦民皇上之赤子也欲救秦疆非抹殺撫之一字純用𠞰法不可欲用𠞰法非用大兵大餉不可祈念三秦今日景象萬分危急倘稍遲救援事將有不忍言者敕下督撫調發延寧甘固之兵委二三智勇大將合力夾𠞰至於前蒙皇上準留地方餉銀若其留者即可徵解夫豈無救急需臣等亦何事纍章呼籲以煩聒天聽也奈三秦西自邠乾南自漢興北自涇陽三原遍地皆賊道路俱梗煙火絶斷文移不通田園廬舍變為丘墟將於何處覔餉乎並望或敕户部或發帑金急措三四十萬以濟軍費以責成功更乞責令巡按御史詳查失事地方的係何官責任功罪果否相凖並查某處失陷在未招安前某處失陷在已招安後某處為受撫之賊某處為未受撫之賊或先激變而後焚劫或先焚劫而後激變塘報係何月日軍民果否相安據實回奏欽聼聖裁則撫與𠞰之利害昭然明白而流賊猶可滅秦事猶可為矣撫臣不宜數易疏衛楨固臣惟官必久任而後可以責成效蓋為恩足以洽人則人知慕威足以服人則人知畏凡官皆然而撫臣為尤甚撫臣有地方専責民情軍機皆其職掌一二月中能悉地方之利病乎能習兵將之耳目乎能知某地之險易能知某餉之措處乎勢不得不需之嵗月臣鄉經兵荒之餘全藉賢撫臣曲盡經畫不謂當事者以傳舍置也丁啓睿後推王裕心矣才告到任而輒換謂裕心不賢也推者何心謂裕心賢耶換者又何心皆令人不解新撫汪喬年清足自立公足服人謂可藉手撫殘黎而又奪之去矣謂三邉為要地豈腹裏非要地乎謂喬年才大必邉方始展驥足三輔多事叛兵降冦勢亦岌岌獨不可見才乎謂改督便用之𠞰冦宛南密邇商雒能保冦不入秦乎謂一時乏才督撫之任原並重移撫就督將撫臣遂可輕乎喬年而後倐來倐轉又不知其幾變也司衡鑑者謂某人宜仗鉞一方某人宜總督軍務胸中應有多人而臨事周章滋議盈庭臣甚惑之且也官屢易則人情囂熱功名者得營競以圖升轉厭苦難者亦得别遷以遂規避最不便也已成之事臣不敢求易但祈皇上嚴飭該部於臣鄉撫缺必選才望素著者久任責成勿使秦之百姓疲於迎送秦之兵將漫無適從誤地方而褻官方也臣不勝激切待命之至請本色入由單疏本朝李鵬鳴臣鄉西安所屬錢糧舊例皆徵折色自國初大兵駐省所需糧草取給於涇渭南北十六州縣每年本折兼徵而由單所載止有折色原數無本色新額每徵本色其數目不預定也上司陸續檄催州縣節次𣲖徵隨時價為低昂年年盈縮不同其間裒多益寡官吏雖能了然而百姓不知也究竟軍中所得芻糗未嘗溢額而民間輸納終難明晰朦混之弊恐不能免臣思駐防兵馬原有定數則糧草亦有定數既不以豐歉為增減安得以貴賤為多少乃不額定徵收而必遊移為之豈良法美意乎請敕撫臣嚴檄藩司酌議估定米豆草束價值核實十六州縣原額地糧若干每糧一石每年應徵折色幾分為數若干應徵本色幾分為數若干將銀數與米豆草束之數逐欵分列刋入由單仍於本户名下注明應納細數使百姓預先明晰然後按數徵收可以杜吏胥混𣲖之端可以清里排包攬之弊民力既裕軍需無誤矣請會𠞰備餉第二疏白如梅秦豫兵馬會𠞰楚冦令楚中預備糧芻久已奉有俞旨前因該省督撫於部文到後又移咨令臣多撥興安民夫赴鄖運米事屬難行臣復具疏上聞矣今於本年十二月初八日復準該督撫各移疏揭到臣臣閲疏中之言大槩有五總屬諉卸一云馬匹草料折銀三萬兩收貯鄖陽兵到房縣支領自賣一云各省官兵自有原帶餉乾隨帶進𠞰之處預辦支給一云速撥秦豫民夫赴鄖負米一云房竹一通亦必須秦豫人夫協同背負一云興安等處糧餉有餘撥供出關之兵免楚省繞道之難臣就其説敢為皇上細陳之秦豫長征之馬原需芻豆以資飽騰然到房縣然後支銀易買如地方荒殘無可買處支銀亦屬無用既有賣草賣料之家即可為供草供料之衆該省司道不言實備徒存折草料之空名未云有濟也又云兵馬餉乾隨帶進𠞰之處預辦支給是矣此日用楚之糧草他日仍以秦兵之餉乾解補未嘗令楚自備兵馬到楚正所謂進𠞰之處預備支給不責之楚省責之誰乎如謂房竹隔絶楚人不能逺供秦兵何以責令秦人往負楚糧秦人既可往楚人即可來餉道未嘗阻絶不問可知矣如房竹既通師駐鄖地自當鄖人供給何以仍欲秦夫協濟是始終以秦夫為卸擔之路即此一語楚省之有意故推昭然易見矣興安緣與冦鄰凋殘殊甚秦省糧無可買臣是以遣撫民同知麻琠齎銀一萬兩前往襄陽召買軍需蚤已移知鄖撫正以興安為極窮之地襄鄖為多米之鄉故不憚逺冒風波載糧異域今謂興安有糧可以供出關之兵免楚省繞道之難是止諳楚之情形而興安之凋敝總未計矣不特此也臣於本月初六日據興安鎮臣于奮起報稱鄖襄兵馬盡撤赴荆夷合力於東南山寨各小股是鄖襄一帶全無進𠞰房竹巨冦之兵官民無事儘可備糧以飽客兵乃一味諉卸夫豈同舟共事之誼且秦豫兵馬指日出關楚省不遵部行蚤為措備反令臣於十餘日之內運三萬衆之糧供應於數百里之外神運鬼輸尚且不能臣猶夫人也能雨粟湧金乎惟是楚藩司劉顯貴糧道吳執忠敢違俞旨多方推調獨不思兵馬一到枵腹可虞是誰之過歟同為朝廷臣子同任朝廷封疆臣萬不敢自生畛域恕己刻人但揆情度勢難易攸分臣不得不再疏剖明伏乞皇上下部速議敕令楚省督撫遵照前旨蚤辦糧料草束庶士馬飽騰可望賊冦掃蕩有期矣第三疏前人官兵會𠞰楚冦必由興安白土關聚集前進應用糧料草束最為急需臣於奉旨日即移會陜西撫臣併行布政司備辦去後屢據該司呈報措發分守關南道銀一萬三千兩分巡關南道銀一萬一千兩撫治商洛道銀一萬兩各就本地多方買運仍委督糧道韓志道馳赴漢興一帶就近督催又因興地荒殘不能多買再委西安府撫民同知麻琠帶銀一萬兩赴湖省鄖襄産糧處所買運赴白土關接濟誡諭責成極其嚴切然買糧既苦運糧尤艱今據道詳內稱興安州所請民夫腳價銀兩最為懇切臣批該司確議亦復諄諄呈請良以興屬逼近賊巢百姓原少兼之山路﨑嶇負送艱難不得不量給腳價以示鼓舞查十六年曾經議及腳價旋以奉旨停𠞰未有成議但從前鞏屬秦徽各州縣運送川糧有給過腳價之例似應照例量給責成速運又慮買價之外無銀可發合無就於發去買運銀內通融支給其漢中商洛兩道所屬買運腳價并湖廣買糧雇船之費亦應各照道里一例查給統俟事完日造册呈報彚題銷算事在緊急不得不然惟念前發各銀除給腳價則召買糧料草束自是有限臣雖嚴檄藩司多方搜措恐無米之爨終難源源應手再繹部文內云將原撥元年兵餉欵內照數隨營解運備買糧料草束等項固屬定例第秦省鎮協營路官兵額餉每年半本半折非如他省餉銀外月有加米三斗如在本處戍防本折兼支自足糊口今抽調逺征越山渡嶺道路迢遙斷不能逺攜本色長驅𠞰冦即就折色而論地方豐歉不同米糧貴賤各異欲以用兵地方以一兵原餉買足一兵食用萬萬不能况節年重撥未撥不敷之餉積至一百二十九萬有竒雖經臣於本年十月初六日密疏具題請撥至今未見部覆當此會𠞰屆期兵食極宜多備必餉銀充裕然後召買有賴無奈司庫如洗點金無術臣仰屋莫措憂心若焚今因該司詳請腳價不得不迫切並陳於皇上之前也密陳防邉要務疏前人邉垣為內外之防部議通行修葺奉有俞旨凡屬臣工敢不祇遵立督告成以仰副我皇上綢繆未雨之至計臣接準部咨隨即備行各該鎮將等官各照該管疆界作速修舉并移各該巡撫及各邉道就近督催務期早竣聼候特遣重臣巡閲仍行飭催間除坍塌無多已報鳩工者不計外其餘有稱年逺頽圮已盡物料無資可動者有稱邉長工程甚大操作無人可役者甚至有稱沙土埋沒隨扒隨積山水衝塌基址無存萬難施力者臣思封疆重務豈容借詞推諉復嚴飭舉行而各鎮道之呈請如故不得不行令估議批據藩司彚詳統計秦境邉垣自延綏而寧夏而固原而甘肅西寧延袤五千餘里并要隘敵樓墩臺鋪舍等項傾廢應修者大率過半在昔葺補之制雖無案可稽而明季按汛各有屯軍更班應役専力邊墻逮天啓年間班軍裁撤暨我朝定鼎迄今已共四十餘載修葺之舉缺焉不講今一旦而欲修數十年之未修葺千百里之未葺良匪易易往日設有専工何憂不舉今則軍已盡裁矣往日有坍即築不難為力今則坍者數多矣往日年年興工人心相安今則無事日久一經督責共駭聼睹矣且各處邉垣依山傍水地峻則工料難前流急則衝激可慮加之風沙不測落成為艱况舊例小修則動支部額大修則并發帑金當此軍興費繁之際時絀恐難舉贏將専責之兵修而各鎮營士卒已經抽調赴楚會𠞰以及分汛設防存營者無多抑或濟以民力而此巖疆殘黎久罹冦虐蕩析無遺加之飢荒疫死見在者幾何雖驅全陜之兵民以供版築竭三秦之賦稅以備物料責功於旦夕亦必不得之數也臣思時已及春遣員不逺催舉則不能議停則不敢兹據該司册估約用人夫七千八百七十五萬五千一百有竒需費銀米五百三十餘萬此外未據報到估計者尚不與焉工大費繁臣不敢不據實直陳以俟睿裁覆查黃甫川煙稅疏前人臣思稅課一項必舊有商集貨市自可遞年徵稅以佐國用查黃甫川委係褊小邉隅偶因先年茶商順帶之黑煙希圖墊納茶課乃緣坐稅又致罄本賠納隨即星散前撫臣張中第目擊其艱故有每包徵銀一分之請蓋兾其稅輕或可招商復來不意迄今商貨兩絶杳無一至非惟遞年之稅課無望而從前之逋欠亦萬難追徵矣今經臣查駁該道􅈦營路各官僉稱無商無貨甘心具結夫孰無身家功名之念而代商隱稅自干罪戾耶且黃甫川逼近殺虎口地方若果有商有貨道路之萬耳萬目共覩共聞自所難掩前撫臣林天擎必不敢兩請題豁於先今撫臣賈漢復亦必不敢繼請蠲免於後也此項煙稅委係無徵仰懇皇上俯念邉隅之賠苦為難屢查之情確非謬特賜蠲免在朝廷不致徒懸稅額之空名而地方臣民可免追徵逋課之實纍矣秦地折正宜仍舊額疏賈漢復看得秦省之最荒殘者莫甚於延安府而延安府之最荒殘者莫甚於洛川宜川延川三縣也蓋其地處萬山之中土脈磽薄民力艱難與腹裏地方大不相同故舊例洛川之地每八畝四分折正一畝宜川延川之地每四畝折正一畝誠以邉陲瘠地難與沃野肥壤并論耳在昔折正之時正賦尚難取盈不意順治十年後興屯道白士麟興屯同知髙應選督墾荒地墾一畝即報一畝將三縣所墾荒地俱未折正而洛川又有餘荒不清之糧悉𣲖於興屯之內重纍殘黎按數輸納官畏考成而嚴比民若剜肉以醫瘡然物力有限嵗嵗難完有扣各州縣官役俸食助解者有道府􅈦縣各官變産捐賠以副考成者茍且補苴以濟一時今則官無常賠之力束手聼參屢被降革民無可剜之肉敲撲益嚴逃亡益甚節據各縣申報或父子偕奔或兄弟散離甚有全家全戶扶老攜幼棄鄉背井者其流離困苦之狀真耳不忍聞目不忍見者也臣雖疊檄撫綏無術可施若再不為折正恐丁逃纍户户逃纍甲甲逃纍里而三縣之糧不惟荒者勢必難徴將熟者亦轉而為荒矣臣非不知錢糧重需司農仰屋但據各縣及司府詳文纍纍盈案情詞迫切民不聊生臣安忍坐視不為籲題代民請命耶倘蒙皇上睿鑒俯照舊例折正則民無包賠之苦孰無故土之思從此招徠生聚庶可漸望起色矣請豁邠州包賠地糧疏前人看得邠州乃山坡之區也地非膏腴民鮮蓋藏辦納國課在昔為難兼罹兵燹之後死亡相繼荒榛滿目所在二三孑遺皮骨僅存應輸錢糧每多督催不前查節年又揑報開墾地九百五十五頃二十畝三分零起徴糧六千三百六十四石一斗四升零以紙上之虛數為應得之正賦民受敲撲官受參罰究無分毫實濟嗟此殘黎以見存之丁辦成熟之糧終嵗辛勤尚苦難支奚堪冒虛墾之名賠無地之糧哉若不亟請蠲除將見存者盡逃熟者并荒州治漸隳額賦愈不可問矣臣身任地方目擊最真不敢緘默懇乞皇上垂憐邠民重困原與别邑不同俯將前項包賠地糧立賜豁除庶存遺不致逃亡殘黎可望起色矣遵諭陳言疏前人伏讀恩詔內一欵順治十六十七十八年催徵不得各項舊欠錢糧著照蠲免十五年以前錢糧一體蠲免大哉王言普天之下率土之濱咸登春臺矣臣愚以為催徵不得之錢糧不止順治十六十七十八年為然也敢推廣恩詔蠲免之條為我皇上詳陳之夫各省錢糧俱有定額自當照數全完何年年追徵年年必有拖欠豈盡有司之催科不力百姓之頑梗不輸歟揆厥所由各有不得不拖欠之勢臣不敢逺舉即如臣屬鳯翔府之岐山等縣延安府之中部等縣漢中府之西鄉等縣西安府之澄城等縣或冦亂頻仍熟地久成草萊或殺戮靡遺哀鴻未能爰止甚或興屯清丈荒蕪揑為熟田或山坡瘠磽虛畝未經折正有司畏考成之嚴即心切民瘼者不能不加鞭笞以致見丁包賠虛丁熟田包賠荒田包賠不起展轉四方此一經拖欠則年年難完之由也除臣一面嚴行司道府縣清查另疏外以臣屬見聞如此推之各省如臣屬者諒有同然兹者皇恩普及順治十八年以前舊欠既經蠲免黃童白叟踴躍歡呼自然好義終事力圖輸將竊恐康熙元二三年舊欠如前項虛賠等弊仍然追呼枉受鞭撲同此百姓既不能償十八年以前之夙逋又安能完元二三年之懸額煢煢小民有淚堪灑無肉可剜鬻妻賣子流離載道勢所必至與其百姓徒受無辜之纍國家未獲分毫之用合無廣沛皇仁將元二三年拖欠錢糧敕下該部詳加查核如已徵在官者照數追解果實拖欠在民必不能完者俱照康熙四年三月初五日詔赦順治十六七八三年拖欠錢糧之例槩行蠲免在九重不過豁紙上之虛數在百姓則可受無窮之實惠將見萬姓歡呼於下和氣徵應於上矣請支兵丁加米疏前人看得秦省各鎮營兵丁月餉之外又給加米此從來舊例也嗣該前任督臣題準每年半本半折兼支本色用市斗關領因而減去加米在各鎮營本折兼支者自無異議唯興安一鎮直支折色原無本色其鎮標三營以及興安協守白土紫陽之兵將領到餉銀發民召買維時民既苦於供運兵不免於􅏤呼是兵與民交困矣隨經前任分守關南道參議婁應奎詳請前任撫臣馬之先題請部覆俞允六營之兵每月仍照舊準給加米三斗折銀四錢令各兵自買以資食用其漁渡舊縣并漢中協守漢鳯陽平略陽寧羌七營路緣向有興屯本色可支故未議及今屯兵已撤屯糧全無而各兵應領月餉全支折色兼以興漢地方兵多糧少價值較他處騰貴所領一月之餉銀不足半月之食用啼飢號寒情實可憫切思各營路均一鎮兵也戍守同支折同而加米有無則不同難免向隅之悲所以該鎮有此援例之請耳當兹國用匱詘司農仰屋臣非不知增餉為難第漢興一帶密邇賊巢分防堵禦在在為然豈可令其枵腹荷戈而不為三軍請命耶懇乞皇上俯念巖疆戍卒之苦一視同仁將漁渡等七營路照依鎮標東協之例每兵每月準給加米三斗折銀四錢亦令其自買以資糊口庶雨露均霑而敵愾可鼓矣請分轄以肅郵鹺疏前人看得秦省鎮防滿漢兵馬日需糧料草束派催支放總係督糧道管理量入度出酌盈劑虛剔倉蠧核漏巵其事不為不繁其任不為不重也今驛傳道奉裁而通省驛鹽事務統歸兼攝且勿論一人精力有限肆應機宜難周即人皆明敏事悉刃解計西安以達甘寧文移往返動需數月而夫馬錢糧鹽引課稅豈能一一盡皆清楚毫無侵蝕逋欠乎駁查批核即隨呼隨應似亦不能察姦弊於數千里之外也萬一師出倉卒沿途之供應軍前之急需又皆糧道所親身料理不容他委者糧草驛鹽勢難兼顧更如欽件不能依限結勘合不能救急用是又誤事之明驗也今藩臬二司暨各道議以驛鹽事務照依巡撫分轄地方就近料理公事乃克有濟俱各從地方起見似亦近理但事屬分理職掌併應歸某道兼攝俱非臣等所敢議也請蠲拖欠銀疏前人看得西延鳯三府屬順治十七年分未完民糧銀七千二百三十三兩九錢七分三釐零未完糧九百三十七石一斗九升五合零或因揑報開墾而包賠無力或因戶口凋殘而辦納無人空懸銀糧之數終無完報之期節年官民受纍情實堪憐所當照數豁免以廣皇仁者也請蠲廢藩民欠雜疏前人看得廢藩地內額征自順治十二年起至十五年止未完本折各項錢糧該前部臣交單逐一清察實欠在民業經題請蠲免訖尚有各年隨徵綿花布油柿子未邀併請者蓋緣部差止查本折正項而未及雜項故也兹奉上諭覆查拖欠錢糧而綿花布油柿子雖部單未開悉屬王土所産之物百姓應納之數或地被崩壓或人經死亡有人而無地可耕有地而無人承墾所以節年逋欠虛懸紙上實實催徵不得似應照數請豁以廣皇仁者也延屬丁徭疏楊素藴明季天下之亂起於西北臣鄉延屬實首被其害李自成張獻忠等縱橫流毒草餘年老稚殺戮少壯虜掠傷心慘目已不忍言繼崇禎十三年天災流行父子相食幾無遺類計此方之民半死於鋒鏑半死於飢饉今日存者實百分之一皆出萬死而就一生者是以原野蕭條室廬荒廢自宜君至延綏南北千里內有經行數日不見煙火者惟滿目蓬蒿與虎狼而已計非休息生聚費國家數十年培養之力必不能復元氣而措安全乃今積困大害更有萬倍於他處者丁徭是也臣緘默不言則疾苦壅於上聞惟有日朘月削趨死亡而已矣臣宦直𨽻即以直𨽻之錢糧較直𨽻地畝丁糧總名曰條鞭起解存留通融支放每丁銀不過一錢二分是以百姓樂輸而易完延屬則不然地畝所出者多曰大糧人丁所出名曰條鞭大糧以供起解額徵猶有定數條鞭備存留官役之俸薪工食出其中師生廩餼出其中此猶曰必不可已之經費甚至各上司提册催號之使費出其中各差役需索供應之繁亦出其中而本州縣驛遞城守諸務又種種出其中嗟嗟百孔千瘡何一非此晨星落落半死亡之膏血哉故每丁每嵗有費至三兩者有費四兩者較之一錢二分之額徵其相去寧止倍蓰夫延安處萬山之中土地寒薄收穫有限數年來金生粟死成米數石僅能易銀一兩且人復皆賦資愚魯不善治生商賈又别無舟車經營運用之方株守本業積蓄幾何即罄上戶之産尚不足供終嵗三丁之費而况鵠面鳩形啼飢號寒者乎是以淳朴者鬻賣男女以償其姦滑者非攜家逺徙則挺而走險耳每見開徵之期父子蹙額夫妻愁歎相率捐親戚棄墳墓者纍若喪家之狗失巢之鳥進無所依退無所據流離瑣尾良可惻然即官其地者覩顚連光景亦皆有死之心無生之樂然事勢所迫補救無術惟有飲泣太息而已矣若不早破除此弊恐非盡延安之民驅於樂土盡延安州縣胥為荒丘不止也伏祈皇上痛念此一方子遺敕下該部行令彼處撫按道府力加釐正額定欵項丁少費多不敢望如一錢二分之輕亦宜曲為調劑去無益俾不至重困難支則奄奄殘黎庶漸有起色乎告急請兵疏俞亮切神木副將孫崇雅久蓄叛志為賊聲援迎賊入城肆行淫掠殺害道臣戮及縣官欲圖不軌調臣繳印伏念臣讀書學古世守忠孝臣子大義講之有素位卑無兵不能滅賊內省諸心已負重罪豈肯從逆以背天恩但邉堡無兵更值調盡臣雖逆知此賊無謀以逆順禍福勸諭軍民共相堅守然一路惶惶人心盡變孤立無援呼天莫應孤山去神木百三十里朝發夕至若一有失榆林道絶黃河失險恢復甚難今特差臣弟􅏤戌科進士俞京前來請兵臣忍死以待伏望皇上速發大兵以解倒懸以救萬民請豁濱河地糧永禁現役馬頭疏劉蔭樞秦豫濱河衝坍田地宜行核豁查黃河在秦者由龍門出山南至潼關將三百里髙原田地常無水患獨堐下濱河灘地東西相望逺者三十里近者將二十里除河水經流之地原無錢糧其去河稍逺之處俱照中地起科河之在豫者自滎澤出山東至虞城將五百里堤內中地常無水患惟堤外南北相望逺者二十里近者十餘里除河水經流之地原無錢糧其去河稍逺者俱照下地起科河性激怒常好灣曲而行一經掃刷動至數里坍入水中是地既去而糧仍存也有司各官以分數計之不及十分之一又漸次衝坍與衝決不同不敢具文報災督撫坐鎮省會何由周知臣思我皇上一行蠲賑動至數百千萬豈忍濱河百姓獨有向隅祈敕督撫細行查核量為豁減賠纍去而室家安皆皇仁之推廣也一在秦現役馬頭當永行禁革查督催正項錢糧有催頭糧長民樂自應此海內所同也獨秦省自故明以來催頭糧長之外有現役馬頭名色每里分為十甲十年一輪周而復始時行時止莫可稽考三逆變亂而後軍興旁午接濟一時勢所必需然此時所辦者皆公事也事平之後相沿未革不肖有司巧為侵漁彼不立私派之名而令民間自派每里報殷實大戶數人常在衙前供役假辦公之名為濟私之計現役馬頭均令辦應臣查别省州縣正項之外亦有必需差徭然皆為數無幾闔縣公應民不為苦獨秦省十甲輪流是一年辦十年之事一人應十人之役故民當應役之年計其所費倍於正賦皇上軫念秦民災傷百法拯救地方大吏三令五申時行禁飭其稍知愛鼎者自行約束而貪墨不肖者猶陽奉而隂違也臣查定例內州縣官私行徵𣲖與上司各官不行糾察者載在條例處分甚嚴但法猶器也器具而不用久而必敝法立而不行久而必玩祈敕下督撫嚴加申飭將從前積習永行斷絶則橫索去而民樂業皆皇仁之推廣也臣亦知臣所言者皆有定例遵行在案但伏讀恩詔煌煌謂現行事例不便於民者令督撫詳察具奏仰見我皇上明燭萬里知現行之例誠有宜因時而變通者也再請通豁雜項錢糧佛倫竊惟秦省西鳯地方災荒致厪皇上軫念將康熙三十二年地丁銀米并從前積欠未完錢糧通行蠲豁從此被災殘黎得以安業者皆我皇上生全之矣臣蒙特簡畀以川陜重寄凡有關於災黎休戚事宜敢不據實入告以圖副皇上惠愛元元之至意臣查西延鳯漢四府并興安州康熙三十二年尚有課程銀一千八百六十三兩零匠價銀二千九百一十八兩零學租糧一千二百三十七石九斗零租銀一百五十四兩零棉花六十斤以及無額牲畜地稅等銀以上係雜項不在蠲豁之內但課程匠價銀兩皆出於商賈匠役至於學租與夫牲畜地稅等銀皆征輸於民不惟商賈寥寥且匠役即係災黎今我皇上浩蕩洪恩將節年積欠并三十二年正賦俱已蠲豁若又徵此雜稅等項不肖官員既無應征正賦不無借端混徵纍民之弊前項雜稅等銀為數無多合無再邀皇恩槩行蠲豁庶被災百姓得以均沾實惠而官役混徵之弊亦可杜絶矣兵糧請照舊斗支給疏朱植仁代稿博濟欽惟我皇上體天育物凡兵民日用以及大小事宜無不經營睿慮措置咸宜去嵗秋間特奉諭旨念民間所用升斗大小不同令部臣較鑄平凖通行頒發使普天畫一率土均平此實皇上之大政不易之章程查各省收糧倉斗大槩相同惟陜省倉斗較别省獨大故各屬民糧俱照依陜省舊用倉斗交納亦即以此倉斗支放兵丁百姓交納為常不覺其苦兵丁日用無缺俱已深荷天恩今以部頒新斗以陜省舊斗較量一石計短少三斗如以此新斗收受即以此新斗放給兵丁則十分之中已減其三分兵馬糧料不無艱窘不足之慮況陜甘兵馬較他省最多倘有行走全賴士馬飽騰臣遵奉諭旨將私派雜差重耗等項嚴行禁革惟收糧浥爛折耗額外多收者未能盡絶今將此耗糧亦永行禁革百姓交糧令照舊斗之數以新斗交收支給兵糧亦照舊斗之數以新斗量給則耗糧革絶百姓即已沾沐皇上𢎞恩自是樂輸恐後而陜甘滿漢十餘萬兵丁亦俱仰沐聖主格外深恩矣查勘渭河并募江南船工水手疏鄂海伏惟我皇上軫念民依籌畫地方至詳且悉向因山陜不通河道間遇荒歉挽運艱難時時上厪聖懷多方賑恤去嵗駕幸西安路經晉豫省方問俗之餘相度山川形勢以汾渭兩河直與黃河相通而河南府居於各省之中水路四達截留漕糧積儲備用倘山陜需糧即可修造船隻由黃挽運若三門船不能上亦可造船剝運由汾渭以抵山陜我皇上聖明洞照睿略淵深凡有可以利民生籌積貯無不處置盡善纎悉無遺所以創萬年經久之模而不為一時權宜之計也除遵旨查勘三門情形已經會疏題報外臣考諸記載渭河源流綿長一千九百里發源於臨洮府渭源縣之鳥鼠同穴山不過山澗細流直至鳯翔府寶雞縣之到底地方始成平川自到底東流至華隂縣之三河口投入黃河古所稱秦川八百里者是也向可通行船隻利濟甚普今皆湮廢但查咸陽以東現有買賣煤米往來客船而咸陽以西行船絶少恐有淤墊臣仰體皇上疏通河道禆益商民之至意自會勘三門回署即輕裝減從前赴寶雞則由陸路自寶雞回省則水陸間行一路查一勘惟寶雞至郿縣一百四十餘里雖河面甚寬水勢亦不甚溜但水落之時重載難行而郿縣以東河深水平行走重船並無阻塞臣查渭河西至鳯翔東至潼關由渭入黃由黃入汾則可抵山西之平陽即或三門水溜客商不敢冒險而汾渭兩河可通船隻者幾二千里然往來之行旅商賈多捨水路而就陸路者皆因陜西船隻方頭平底無柁無篷而水手又不善於操舟順流尚可日行五六十里逆流則挽拽而上止可日行二三十里舟行遲滯多費時日不如陸路利便所以舟行者甚少臣思河路行走必船隻快利水手熟練商民便於往來方能疏通河路臣同督臣博濟當酌量捐資於江南等省雇覔造船良工並熟練水手量水性以造船裝柁置篷使本地匠人士民學習演試如果利便可行令民船亦照式修造倘陜西收歉需用河南積儲糧石之時即可將商民船隻雇覔挽運並可不必另行造船且汾渭之河路疏通漸次或可通黃俾商旅人民均沾利澤以仰慰聖天子愛養元元之至意請減丁銀疏嶽鍾琪臣查陜省地方自我皇上御極以來比年豐收從前逃荒之民到處皆漸次復業而惟延安府屬則復業者甚少細加察訪皆因丁銀重纍不特已逃者不敢來歸抑且現在者皆云思去臣等不勝驚駭因逐一檢查通省丁條糧額乃知其弊在明朝時額則定例之過重非本朝體恤之不至也查賦役全書內開延安府屬原額人丁一十五萬二千有零順治七年奉旨免過逃亡七萬七千有零順治十一年又奉旨免過續逃丁六千八百有零及康熙六十年內八年十六年二十二年陸續奉旨又免過水淹逃亡殺傷及包賠人丁共一萬有餘是本朝之聖聖相承恩施無已亦可謂蠲貸之施至切至極矣而地方終無起色荒蕪終不盡開者總因明時初定丁額之際不知是何詭弊延安府則竟有每丁至四五錢以至七八錢及一兩以外者臣初閲之時猶疑丁銀較重或其糧則少輕及查其田地征糧科則則又皆彼此相若無甚懸殊夫同為盛世之民同為丁徭之賦而獨此一方多一丁即多四五六七錢或一兩以外之纍胼胝小民實難堪此况荒年逃亡之丁又責令未逃者賠納無怪乎逃者不敢歸而在者皆思去臣以為此時若將逃丁逐一清出仰請照前豁免則聖主隆恩自邀俞允但丁銀之重例不減則逃者難免而未逃者似不能堪欲流民復業終不可得不如將延安府屬各州縣民屯丁銀但照每丁二錢科則則凡有過二錢者皆與減免除中部神木二縣外合十七州縣民屯共應銀一萬四百七十兩二錢較之現今十七州縣嵗征丁銀二萬三千三百六十餘兩止減去銀一萬二千八百九十兩有零而現在之民共相樂業逃亡之民聞風自必漸歸即外來之民聞風自樂就墾將來五年編審按丁漸加諒此一萬有零之丁銀自亦不難仍復而於國賦固可無虧於地方尤可漸闢邉地遐荒實有禆益也倘蒙恩允某州縣應免丁銀若干之處俟部文至日檄行布政司轉發該府州縣查明造具編册另疏具題改設水利通判疏查郎阿臣查西安府屬涇陽縣之龍洞鄭白等渠水勢流行向為涇陽醴泉三原髙陵臨潼五縣灌溉之利因歷年久逺修濬失宜遂致渠道淤塞堤岸坍圮雍正五年督臣嶽鍾琪欽遵諭旨動給正項銀兩委員築濬伏查龍洞鄭白等渠之右山徑逺迤山間衆泉涓溢轉滙入渠若使渠深堤固則水利之功十居其七又從前開鑿龍洞引涇入渠為利甚溥但涇水漲發濁而多泥每於冬春之間水落泥澄引涇灌田甚屬有益再於水漲後田苗暢茂之時用水甚廣酌引灌溉亦稱利便如遇水勢泛濫田苗初生之後涇水衝入渠內不特渠腹受淤抑且禾苗被壓是涇水止可隨時酌用非四時俱可咸資曾悉心咨詢於龍洞之口建閘數座俾蓄泄得宜以資樂利第思水利所關緊要凡濬修啓閉各民户受水時日皆須大員専理查西安府管糧通判原管慶豐等倉糧石今倉糧統歸西安糧鹽道經管而倉房折運省城改作積貯倉厫通判一官並無所司之事若將西安府管糧通判改為水利通判専管龍洞鄭白等渠水利除地方事務不許干預外其涇陽醴泉三原髙陵臨潼五縣內民户受水時日堤渠修濬事宜以及閘座啓閉令通判不時親往經理如有姦民勢豪盜水霸占並有關於渠政利弊者俱令通判稽察整飭倘地方官徇庇阻撓即行揭報參處再通判向駐省城去龍洞一日有餘中間相隔涇渭二河夏秋河水陡發往來不便今擇於涇陽縣屬之王橋鎮地方在龍洞之東南相去止三十餘里與各渠咫尺相鄰一切稽查甚屬便易應將通判移駐於彼所需衙署酌估蓋給其書役原有額設足供差遣不必另有增益至原領通判關防係管糧字樣今改為水利通判應另鑄水利通判關防換給似屬允協陜西通志卷八十六
