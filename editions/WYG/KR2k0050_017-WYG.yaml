body:
  text: 陜西通志巻十七關梁二興安州歸安鎮在州北五里即今香獐壩州册周顯德五年李玉至長安或言蜀歸安鎮在長安南三百餘里可襲取也玉信之蜀兵據險要之敗沒通鑑胡注歸安鎮在乾祐縣南一百二十里宋敏求長安志附州境古闗隘東津闗即老君闗在州東四里漢江北盤河闗在州西南三百里通四川界今廢搆坪闗在州西南四百里通四川界今廢寺溪闗在州西南四百里通四川界今廢西津闗在州西四里漢江南鐵嶺闗即越嶺闗在州西九十里州册横亘巨川與天馬對峙古所謂鐵嶺闗也州志州迤西為越嶺崒嵂萬山中脊高路狹東接荆鄖南通蜀道西連興漢明崇禎初闗南道蕭丁泰扼險為守建闗門一敵樓二左右築墩臺貯砲石弓弩於上洪如鐘修闗記木竹碥闗在州北一百三十里接鎮安界險峻白馬闗在州東北三十里古墓嶺爛柴闗在州東北七十里通鎮安商州州志輿地紀勝州有龍回闗今無攷舊志水寨在舊州城南漢江北州志後唐清泰初蜀將全師郁冦金州㧞水寨防禦馬全節拒却之元和志漢水去金州城百步故唐置水寨以備蜀通鑑胡注吉挹壘在州西南九里魏山上三面陡絶北通一道即吉挹城州志晉太和三年秦梁州刺史韋鐘圍魏興太守吉挹於西城杜佑曰金州西城縣南九里吉挹於峻山築壘今其山曰魏山通鑑胡注烏溝堡在州北三百里燕子嶺接鎮安界道途險逺昔設戍守今廢秦郊鎮在州西三十里州志距郡城二十里路坦夷宋史王彦傳衡口鎮在州西七十五里蓋衡水合月河之口即今之恒口舖州册西城縣有衡口鎮九域志仁夀橋在州東門外州志康熙三十二年漢水暴漲薄郡城橋壊知州王希舜議先甃隄岸次築池橋以障之命郡幕魯仁埰率里老鳩工築仁夀橋易木以石甃寛可並車方軌劉應秋修橋記喬遷橋在新城東門外跨陳家溝水州志靜寧橋在東闗南街州志長春橋在州東一里長春堤上州志甎橋在州東五里州志向明橋在州南門外州志安康橋在州故城南一百步本安康郡之名賈志州南門曰安康由平利達蜀楚舊築土橋成化甲辰濠水衝决郡守鄭福壘石為六洞旁障以木圍砌以甎因門以名之有記魯得之修橋記萬厯十一年大水壊三十二年守道李天麟重建改名會源橋以陳家溝水與施家溝水會流故名馬志木竹橋在州南五里通平利大路郡方伯劉卿建州志遇仙橋在州城南七里香溪洞澗水上相傳知州鄭福遇仙人對奕處州志安堵橋在新西門外跨施家溝水州志按萬歴十二年移築新城門四東喬遷南阜民西安堵北拱辰四面有池池各有橋順治四年復修舊城門四東仁夀南向明西康阜北拱辰各有橋後壊修木橋惟南石橋如故蓋諸橋各因城門而名也康阜橋在州西門外順治十七年知州王章建木橋康熙三十二年大水橋壊總鎮萬永祺命中軍遊擊胡愷重建甃以石州志虹橋跨城西壕康熙三十二年總鎮萬永祺建州志萬春橋在州西四里萬春堤州志義橋在州西三十里秦郊鎮西明成化間里人募修壊於水康熙三十三年生員羅尚綸重建州志一名通濟橋舊志拱辰橋在新城北門外跨陳家溝水州志神灘渡在州東四十五里漢江上官船一隻州志附州境古橋渡元白橋在州東五里今廢流水渡在州西南九十里漢江上官船一隻今廢西津渡在州西三里漢江上官船二隻今廢中津渡在州城東北隅漢江上官船二隻今廢石梯渡在州東三十里江濱石崖連亘渡處鑿為磴如梯故名官船二隻今廢杜家壩渡在州西南九十里恒口渡在州西七十里恒河上越河渡在州西八里越河上黄洋渡在州東三十里黄洋河上今俱廢州志平利縣白土闗在縣東一百五十里擂鼓臺山南北亘峙闗當其脊縣册外接楚地有分防把總漢中府志建炎四年桑仲乘勢西㓂直搗金州白土闗彦擊敗之宋史王彦傳鄖闗在縣東南一百五十里與湖北竹谿縣交界縣冊漢水又東逕鄖鄉縣故城南即長利縣之鄖鄉地理志鄖有闗李竒以為鄖子國水經注狗脊闗在縣西五十里狗脊嶺交興安州界縣志八里岡營在縣東六十里白土路駐劄縣册連線寨在縣東一百五十里三面壁立盤曲至巔十五里與洵陽縣分界下有連線洞髙八尺濶一丈賈志紅軍寨在縣東南六十里縣志藥婦寨在縣東南八十里縣志碧天寨在縣東南一百二十里極險峻縣志秋河汛在縣東南一百八十里南通蜀地今設塘汛盤查縣志金雞寨在縣東南二百里自金毛闗平地突起一山髙百丈周環有水明正德間𠞰流冦常屯兵於此賈志九龍寨在縣南六百里山連八里岡俗呼為蠻王寨舊址猶存寨後三里有九龍洞因名賈志香子寨在縣西南七十里縣志鳯山塘在縣西四十里舊有税課司署址猶存今設塘盤查縣志附縣境古闗隘武陵闗在縣東南二百七十里源溪闗在縣東南五百里接四川大寧界小闗子闗在縣南五十里地連鎮坪為秦蜀楚之交金毛闗在縣南二百里文材闗在縣南四百五十里峭壁百仭梯徑險絶天救寨在縣東南一百五十里極險峻舊志越河橋在縣西門外壕上弔橋以越水由此入於灌溪故名縣志附縣境古橋木瓜溝橋在縣西十里跨灌溪河上今廢縣志洵陽縣琵琶闗縣南六十里縣册七里闗在縣南一百五十里接竹山界為秦楚要衝以銅錢闗孤山難守移鎮於七里溝闗名因之今有守備營縣志附縣境古闗隘閭闗在縣東一百四十里明置巡檢司今裁壤堞尚存即隋黄土縣故城旬闗在縣南洵水上縣志酈商别將攻旬闗西定漢中師古曰漢中旬水上之闗也今在洵陽縣史記髙帝本紀南陽西通鄖闗正義曰宛西無鄖闗蓋鄖當為狥狥水上有闗在金州洵陽縣是也狥亦作郇與鄖相似也貨殖傳注南蔽䕫陜西接梁洋為控扼之地地理通釋秦惠文王始置西城縣於洵水上置