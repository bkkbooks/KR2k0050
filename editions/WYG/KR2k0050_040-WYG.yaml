body:
  text: 陜西通志巻四十水利二鳯翔府鳯翔縣古渠堰附雍水在府城西橫水在府城東鄧水在府城北十里東湖在府城東一里以上諸水可資灌溉賈志今無灌溉利縣冊岐山縣斜谷河渠在縣南一百五十里一名石頭河其水灌溉稻田甲於他處縣志頻年冲刷河低田髙現今所灌無幾縣冊古渠堰附湋渠在縣東古渠圖武帝時闗中有湋渠漢書溝洫志如淳曰水出韋谷本志注湋水源出岐山縣東北六里韋谷東南流入扶風界寰宇記今渠淤塞無考縣冊昇原渠在縣東自寳雞流入又東流入扶風縣界通濟渠在縣東三十里引渭水自寳雞縣流入又東流入郿縣界古渠圖通潤渠見石刻今俱堙塞無考縣冊寳鷄縣髙泉渠在縣東北八十里賈志虢縣東北有髙泉渠如意元年開引水入縣城唐書地理志今現灌田八十餘畝縣冊汧陽河渠在縣東三十里引汧水灌田五十畝縣冊金陵河渠在縣東五十里引金陵河水灌田六十畝縣冊清澗河渠在縣南五十里引清澗河水灌田六十畝縣冊隨據縣冊此三水俱易泛漲其堤堰隨衝築沿河上下皆可開渠無定處也古渠堰附成國渠在縣東又東流入郿縣界古渠圖如淳曰成國渠在陳倉漢書溝洫志注青龍元年司馬懿穿成國渠魏志成國故渠魏衛臻征蜀所開也其瀆上承汧水於陳倉水涇注昇原渠在縣東縣圖虢縣西北有渠引汧水至咸陽垂拱初運岐隴木入京城唐書地理志陳倉東渠咸亨二年於縣東南開渠引渭入昇原渠通船至京故城元和志故城即古長安城漢惠帝所築本注寳鷄縣東有渠引渭水入昇原渠通長安故城唐書地理志通濟渠明叅政謝綬開引渭水在縣東閻家營作堰又東流入岐山界縣冊磻溪水在縣東南八十里温泉在縣東南四十里二水可資灌溉賈志今無灌溉利縣冊扶風縣柳堤在縣南門外城數被湋水衝激眀知縣黃鉉築堤植桞以障水今桞剪伐殆盡而堤尚存縣志古渠堰附成國渠引渭水自郿縣來又東流入武功界古渠圖今縣東南有龍渠寺相傳為成國渠故道縣志湋渠引湋水自岐山縣界流入古渠圖昇原渠自岐山縣界流入又東流入武功界縣冊通濟渠引渭水自郿縣流入又東流入武功界縣冊扶現今無水利其稍稍救旱者不過漆湋滸之退灘耳舊志載有槐芽柿林等泉今皆在郿界與扶無與也縣志郿縣石榴廟渠在縣南三十里引斜谷水縣冊郿侯梅君禱雨太白山因㝷視泉源度地勢髙下得斜谷關水可以曲引於石麓廟堡之前後左右乃諭鄉城民合力抉浚功竣分為四渠二渠因也從而擴大之二渠創也以東西名是年左右附渠地皆有秋黃虞斜谷關水利碑記今現灌田一頃五十餘畝縣冊金渠鎮渠在縣東南二十里引洪溝河水至寗曲堡縣冊紅按洪溝即寗曲河一名河自赤谷發源寗曲俱係砂石不能鑿井康熙八年知縣梅遇捐俸募工鑿石開甽以通水路自寗曲以上為居民食水自寗曲而下灌坂下田數百頃寗渠民居成集遂興市集名曰金渠集縣志郿地北鄰渭岸南接山麓田園借谷水以灌溉者不少而赤谷水居民尤頼以生活自春秋時齊相寗戚僑寓於此見土厚沙深不能鑿井相傳騎牛拖鞭開其源以濬其流焉金興定明成化嘉靖間賢有司各盡力䟽通渠隘流緩食德者少康熙七年邑令梅侯捐俸糾工鑿石數十丈昔之引此水者至寗曲而止不能下注號曰神水今則直達河底入渭方之寗相為倍神矣楊季昌寗曲水利碑記赤谷河流甚大折入寗曲金渠者僅衣帶耳水之來徑率為山石所梗夏旱則竭邑侯梅公遇尋視赤谷河曰是不可烈而鑿之耶乃親立渠上指麾鐇钁無何洪流湧入利益者千餘家金渠鎮因之興集市是水之流也始上下營頭歴洪水磨尹家村仝家村棗林村雙廟村陳家村吳家社岳家村金家莊東荘金渠鎮寗曲一十三村渠廣四尺深三尺杜多􅓨金渠寗曲水利碑記寗曲水今灌金渠鎮田百餘畝下流淤塞縣冊一灣泉在縣東北一里灌田六十餘畝縣冊清逺泉在縣東北十里灌田一百餘畝縣冊崖下泉在縣北一里灌田十餘畝縣冊閃電池在縣北十里灌田一百餘畝縣冊紅崖泉在縣西五里逼近渭河無灌溉利縣冊五眼泉在縣西六里灌田三十六畝縣冊觀音泉在縣西南十里灌田十餘畝縣冊一碗泉在縣西南十二里今無水縣冊清湫泉在縣東二十五里灌田十餘畝縣冊槐芽泉在縣東三十里灌田三百餘畝縣冊柿林泉在縣東四十里灌田二百餘畝縣冊龍舞泉在縣東六十里灌田百餘畝縣冊古渠堰附成國渠在縣東北又東流入武功界古渠圖闗中有成國渠漢書溝洫志成國渠首渭東北至上林苑入䝉蘢渠地理志青龍元年開成國渠自陳倉至槐里晉書食貨志成國故渠上承汧水於陳倉東逕郿水經注承按漢志成國渠首受渭而晉書及水經注皆言汧水葢漢渠止引渭而魏時重開乃兼引汧水於陳倉也成國渠在郿縣東北九里受渭水以溉田元和志成國渠經流甚逺而就縣境言之當是渭北通濟渠成化時循跡開之耳縣志井田渠在縣東宋儒張橫渠開渠凡二東渠發源大振谷筒瓦溝經流萬家源董家村謝家村汶家村營上堡至横渠鎮止西渠發源湯谷華岩泉經流潼關寨馬超寨紙溝嘴曹家村于豆堡齊家堡梁家灣嚴家莊至横渠鎮合東渠交滙祠後又北三里入渭縣冊康熙八年知縣梅遇率同里士民遡流窮源㝷其故道廣為溝洫遂復東西二渠約可溉地數百頃縣志今復壅塞縣冊孔公渠在縣西南引斜谷水環城抱郭東流入渭現今深陷難以䟽通縣圖郿塢舊引斜谷水通流縣城歴皇統饑饉人煙凋㪚懸隔六十餘載明昌七年邑宰孔公天監首議行之見道士楊洞清問及水利乃偕至谷口剜苔剔蘚披尋故道計度貲力大具工役功成順流而下汲飲灌溉無復向日艱虞强造孔公渠水利碑記通濟渠在縣北明