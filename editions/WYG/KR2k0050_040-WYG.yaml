里明户部主事王尚友就原下立堰蓄水灌田縣志原下昔有泉水今涸縣冊三水河淳化河在縣北姜源河在縣西北可資灌溉賈志今無灌溉利縣冊鄜州古渠堰附吉子灣水在州北五里許可資灌溉賈志今無灌溉利州冊雒川縣古渠堰附仙宫河在縣南四十五里黄梁河在縣東七十里聿津河在縣南一百二十里廂西河在縣西北八十里四水俱可灌溉馮志今無灌溉利縣冊中部縣古渠堰附上善泉在縣東北七里有上善泉開成二年刺史張怡架水入城以紓逺汲四年刺史崔駢復增脩之民獲其利唐書地理志今廢縣冊宜君縣古渠堰附七里店水在縣西四十里姚渠川水在縣西七十里玉華川水在縣西三十里姚曲川水在縣西南一百里諸水可資灌溉賈志今無灌溉處縣冊綏德州古渠堰附石井在州北十里舖前石山下昔人引流灌田州志龍泉在州東三十里其水自石龍口湧出居民引以灌田賈志今無灌溉利縣冊米脂縣流金堰在縣南文屏山下明正德中延安府知府羅諭教民作堰引水種稻民獲其利馮志在縣南河中天啓時知縣孫䋲武重修縣志南河小水源在城東石溝内西南流灌溉城附郭地康熙六十年榆林道楊文廣捐貲建修縣志古渠堰附溥惠河在縣南明成化時鑿引入城民便之賈志今廢縣冊清澗縣古渠堰附霍公渠在縣西半里故蹟已堙石巖下猶鐫霍公渠三字縣志清邑人素不諳水利邑令霍文玉於邑之南疃開南渠西疃開西渠引巨浸之派平其磽确迤邐相屬極其所注民人利之名曰霍公渠明白璧記葭州永利河渠在州北髙家堡明正德初居民引入堡周行灌溉又灌堡西稻田數十頃州志髙家堡川中田永利河水灌之延綏志古渠堰附葭蘆河在州西南大會川小會川在州北三水俱可資灌溉賈志今無灌溉利州冊吳堡縣古渠堰附王家渠馬家渠呼家渠今俱堙廢無考縣志清河溝在縣西二十里黃河水濁至此獨清延綏鎮志可資灌溉賈志今無灌田處縣冊神木縣王堤縣城西有河曰窟野時有泛漲之患本朝順治十六年神木道王廷諫築堤禦之名王堤康熙二年大水衝沒十二年神木道楊三知重修雍正元年水復漲溢舊堤咸潰知縣胡增煐帮築石堤百十餘丈號胡公堤縣志古渠堰附兎毛河渠石壑子渠皆灌神木河西田昔叅將王効所引㝷廢柏油堡水在縣西溉柏油堡田延綏鎮志今無灌溉利縣冊府谷縣古渠堰附清水營水黃甫川水俱在縣東北可茂稻粱而行水之法未盡其利延綏鎮志陜西通志巻四十
