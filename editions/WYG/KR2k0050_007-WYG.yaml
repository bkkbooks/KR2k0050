body:
  text: 陜西通志巻七疆域二形勝附陜西布政司治在京師西南二千六百五十里東至河南閿鄉縣界三百五里西至秦州清水縣界六百三十里南至四川太平縣界一千三十里北至榆林邊墻一千三百九十六里按舊志多載廣袤若干里蓋即合東至西至而成東西相距之里數合南至北至而成南北相距之里數如自閿鄉至清水東西合計九百三十五里即廣數也自太平至榆林邊墻南北合計二千四百二十六里即袤數也讀者合觀自能知之故不復贅至於府州之境循例似宜先列廣袤但如華之蒲城中隔西安屬之渭南耀之白水中隔華州屬之蒲城繡錯之處殊難以不聨屬者强計里數也兹亦從畧玩圖自明東南至河南淅川縣界六百二十里西南至四川廣元縣界一千三百八十五里東北至山西河曲縣界一千八百六十里西北至慶陽府徵寜縣界三百二十里領五府十二州七十三縣形勝秦四塞之國被山帶渭東有闗河西有漢中史記蘇秦傳北有甘泉谷口之固南有涇渭之沃巴漢之饒右隴蜀之山左闗崤之險荆軻傳秦形勝之國帶山河之險懸隔千里持㦸百萬秦得百二焉地形便利其以下兵於諸侯譬猶居高屋之上建瓴水也高祖本紀金城千里天府之國留侯世家三輔南有江漢北有河渭汧隴以東商雒以西厥田肥饒所謂陸海東方朔傳東有函谷蒲津西有散闗隴山南有嶢山武闗北有蕭闗黄河史記正義踐華為城因河為池賈誼過秦論東溝大河南阻高山西采雍梁北鹵涇垠揚子法言被山帶河四塞以為固漢書婁敬傳左據函谷二崤之阻表以終南太華之山右界褒斜隴首之險帶以洪河涇渭之川衆流之隈汧湧其西華實之毛則九州之上腴焉防禦之阻則天地之隩區焉班固西都賦左有崤函重險桃林之塞綴以二華巨靈贔屭高掌逺蹠以流河曲厥跡猶存右有隴坻之隘隔閡華戎岐梁汧雍陳寳雞鳴在焉於前則終南太一隆屈崔崪隱轔鬱律連岡乎嶓冡抱杜含鄠欱灃吐鎬於後則高陵平原據渭踞涇澶漫靡迤作鎮於近其逺則有九􅉄甘泉涸隂沍寒廣衍沃野厥田上上實為地之奧區神臯張衡西京賦右隴蜀左崤函襟憑終南太華之隂背負清渭濁河之固地方數千里帶甲十餘萬兵强士勇用武之國秦漢所以成帝業也郭子儀奏議自萬年至於渭南其蔽曰華州其闗曰潼闗自華而北界於櫟陽其蔽曰同州其闗曰蒲津自灞而南至於藍田其蔽曰商州其闗曰武闗自長安至於盩厔其蔽曰洋州其闗曰華陽自武功而西至於好畤其蔽曰坊州自咸陽而西至於奉天其蔽曰邠州由四海之内總而合之以至於闗由闗之内束而㑹之以至於王都柳柳州文集夫秦四塞之國也雖偏鎮於西隅而國之形勢實為天下雄固帝霸之業也鴻書潼闗制全陜之命漢中實楚蜀之衝朱思本輿地總圖説闗中形勝西自崑崙發脉落於三輔長河自西北而南華嶽諸山自西而東㑹於潼闗水口闗鎖之密結搆之巧天下莫並韓苑洛集太乙峙其南豐鎬出其西華嶽鎮其東龍首乗其北周環八水襟帶三川形勝實甲於天下顔敏重修藩司公􅅟記西安府最要治在布政司西東至華州界一百六十里西至武功縣界一百四十五里南至鎮安縣界一百六十里正南微西至石泉縣界四百三十里於按長安縣南境舊説祗以鎮安之西北為界故止一百六十里若微西取子午谷道抵五郎闗雖非坦途亦屬封域何可竟置不論故凡係補入而里數懸絶者皆此𩔖也玩圖可互證北至耀州界一百七十八里東南至商州界二百里西南至洋縣界三百六十里東北取高陵路至蒲城縣界二百一十里西北至永壽縣界二百里領一十四縣形勝蕩蕩乎八川分流相背而異態司馬相如上林賦九􅉄嶻嶭太一巃嵸南有元灞素滻湯井温谷北有清渭濁涇蘭池周曲浸決鄭白之渠漕引淮海之粟潘岳西征賦憑山河之形勢宅田里之上腴陸宣公奏議天府惟雍神臯作京當四海之㑹同在三輔而尤劇常衮撰孟皥京兆尹制京兆府挾灃灞據函崤得百二方千里唐𩔖函終南太乙為天地肺腑之區氣之所蟠以森以毓左􅅷第集長安縣最要附郭在府治西偏東與咸寧分治西至咸陽縣界二十五里南至鎮安縣界一百六十里正南微西至石泉縣界四百三十里北至涇陽縣界三十里西南至縣界四十里西北至咸陽縣界三十里編户四十九里按舊志所載疆域里數或治或界紛錯互見致有異同兹於府州分域祗列界限而州縣専封則先列四至八到與隣邑接壤之里數而後附以四鄰距治之里數庶幾為界為治一覽瞭然西至咸陽縣治五十里北至涇陽縣治七十里西南至鄠縣治七十里形勝長安界在舊岐豐之左攬結太乙終南之氣夙稱神臯陸海李華然縣志序為雍秦之首邑帝王之故都形勝奥區梁禹甸縣志序終南峙其前渭流遶其後縣志咸寧縣最要附郭在府治東偏東至臨潼縣界四十五里西與長安分治南至舊縣闗鎮安縣界二百五十里北至高陵縣界三十里東南至藍田縣界五十里東北至高陵縣界三十五里編户六十六里東至臨潼縣治五十里東南至藍田縣治九十里東北至高陵縣治七十里南至鎮安縣治三百四十里形勝居㑹城之左百二名邦實據上游几終南屏渭水帶五岡襟三川滻灞左纒滈潏右抱白鹿豐梁護其東鳯棲神禾環其南金鑾銅人闗其北千峯擁玉案以遥迎兩雁來伭都以近侍代為帝都世稱天府縣志咸陽縣要治在府西少北五十里東至長安縣界二十五里西至興平縣界二十五里南至鄠縣界二十里北至涇陽縣界三十八里東南至長安縣界二十五里西南至盩厔縣界三十里東北至涇陽縣界四十里西北至醴泉縣界四十里編户十里東至長安縣治五十里西至興平縣治五十里南至鄠縣治五十五里東北至涇陽縣治五十里西北至