body:
  text: 陜西通志巻四建置第三北魏自劉石跨擅更相侵食魏孝昌之際潼崤以西烟火斷絶至永安末官司文部散棄者多州郡創改隨而注之不知則闕自莊明攻伐既廣啟土逾衆一地屢封不可備舉故總以為郡其淪陷諸州據永熈綰籍無者不録地形志雍州雍州治長安領郡五地形志増郡二太武破赫連昌復於長安置雍州元和志京兆郡後漢屬司𨽻魏改屬雍州領縣八地形志晉為京兆郡兼置雍州後魏亦然通考長安姚萇改長安曰常安後魏書姚萇傳後魏復為長安長安縣志杜二漢曰杜陵晉曰杜城後改杜縣地形志杜陵後魏為杜城在下杜東今在萬年東南十五里路史年按宋萬今咸寧鄠晉屬始平郡真君七年分屬京兆地形志山北山北縣姚興置寰宇記山北城在西安府東南五十里魏分長安藍田二縣地置以在終南山北而名咸寧縣志新豐後魏新豐自陰槃寄理之後移理於故城東三十里零水側寰宇記臨按新豐今潼霸城郡治地形志今按周書王羆京兆霸城人即此在咸寧東後魏京兆治此陰槃真君七年併新豐太和十一年復地形志魏太和九年自新豐故城移理於今昭應東三十二里冷水西戲水東司馬故村寰宇記云按陰槃在今臨潼東地形志太和十一年復寰宇記云九年移理恐有悞藍田真君七年併霸城太和十一年復地形志韋按後魏書彪傳孝莊末為藍田太守胡氏鑑注亦云後魏置藍田郡是置郡非自後周始也馮翊郡漢為左馮翊後改馮翊郡領縣六地形志一増夏封縣晉馮翊郡領重泉粟邑二縣俱後魏省髙陸晉屬京兆魏明帝改屬馮翊地形志魏高陸治在今高陵縣西南一里後魏移居今所通典今按高陸即高陵頻陽後魏馮翊郡領頻陽縣地形志年按耀州志景明元罷頻陽萬年晉屬京兆後魏屬馮翊地形志萬年城在臨潼縣東北禹貢錐指蓮芍馮翊郡領蓮芍縣地形志姚萇廢太和三年復置屬延夀郡寰宇記形按蓮芍在渭南縣北七十里地志與寰宇記二説互異廣陽景明元年置地形志宣武帝分萬年為廣陽縣通典廣陽故城在渭河北臨潼縣志里按臨潼縣志臨潼東北七十舊有廣陽鎮或云即古廣陽縣鄣太和二十二年置地形志後魏孝文帝分萬年置鄣縣通典渭水東逕鄣縣西今臨潼縣東北有鄣縣故城禹貢錐指扶風郡真君七年併始平郡入焉領五縣地形志陽按除美一縣見後好畤郡治後漢晉罷後復地形志好畤在乾州東七里明一統志始平魏於茂陵縣置始平郡領始平縣真君七年郡廢永安元年又移縣於今縣東北十五里始平故城此城遂廢寰宇記永安元年移扶風於文學城十道志按始平在今興平南槐里晉屬始平地形志真君七年自始平城徙槐里縣於今縣西二十五里槐里故城此城遂廢寰宇記盩厔後漢晉罷後復真君七年併武功屬焉地形志延夀郡後魏置延夀郡通鑑注未按延夀郡縣地形志載今増入夏封下邽縣後魏避道武諱改為夏封元和志魏初移於雄霸城寰宇記渭按雄霸城在今南縣北渭南郡後魏孝明帝於今渭南縣東南四里置渭南郡及南新豐縣元和志未按渭南郡縣地形志載今増入南新豐渭南縣本漢新豐地後魏孝明帝置南新豐縣元和志咸陽郡領縣五地形志苻堅於咸陽縣東北長陵城置咸陽郡後魏太和二十年移郡於涇水北寰宇記石安咸陽郡領石安縣石勒置有安陵城地形志今按石安咸陽靈武前漢屬北地後漢廢晉復置真君七年分屬焉地形志鄉按咸陽志縣東有靈武靈武宜在其地池陽郡治晉屬扶風後屬咸陽郡地形志陽按池陽在今涇縣西北寧夷後魏咸陽郡領寧夷縣地形志醴按寧夷今泉涇陽真君七年併石安景明二年復屬咸陽郡地形志苻秦置涇陽縣今縣東南故城是也禹貢錐指北地郡領七縣地形志増縣一後魏明帝時改北地郡為北雍州北史後魏自今華原縣北祋祤故城徙北地郡於華原縣通川故城又徙北地郡於宜君縣界義亭故城於此置北雍州按永安元年又於三原縣界置北雍州永熈二年自三原縣永安故城徙北雍州於今華原縣西宋敏求長安志富平真君八年罷泥陽弋居屬焉有北地城地形志泥陽真君七年併富平景明元年復地形志宣武時復泥陽耀州志耀按泥陽即今州弋居真君七年併富平後復地形志廢按縣後雲陽魏司馬宣王罷雲陽縣後魏别立雲陽縣元和志雲陽在涇陽縣北三十里今雲陽鎮是也鎮東有舊城址葢初置甘泉山前在淳化界後徙仙法村再徙今處涇陽縣志銅官真君七年置地形志苻秦於祋祤城東北銅官川置䕶軍後魏置銅官縣通典孝莊帝永安元年屬宜君郡宋敏求長安志地按銅官故城在今縣東南十里又形志無宜君郡土門漢頻陽地後魏别立土門縣以頻山有二土門狀似門故曰土門元和志景明元年省頻陽縣析同官置土門縣屬北地郡宋敏求長安志土門縣在富平縣東北六十里馬志宜君真君七年置有宜君水地形志前秦苻堅於祋祤故城置宜君䕶軍太武改為宜君縣元和志三原本漢池陽縣苻秦置三原䕶軍後魏太武七年改置三原縣屬北地郡孝昌三年毛鴻賓立義栅捍賊永安元年置北雍州又割三原為建忠郡以旌其功元和志建忠郡治清水谷即今舊縣周地圗記永安故城即後魏北雍州城在縣北五十五一作十五里寰宇記縣按三原地形志未載今増入岐州太和十一年置領郡三地形志鳳翔府晉為秦國後魏太武於州理東五里築雍城鎮文帝改鎮為岐州元和志平秦郡太延三年置領縣三地形志魏扶風郡後魏置平秦郡後魏亦有扶風郡非今地通典府按平秦今鳳翔又晉有隴關隃糜陳倉三縣俱後魏廢雍晉屬右扶風後屬平秦郡地形志扶風雍縣後魏置平秦郡五代志翔按雍今鳳府周城真君六年置地形志周城縣在岐山縣南後魏建岐山縣志真君置周城縣𨽻平秦郡郿縣志世按後魏書雀寛傳祖時拜岐陽令似又有岐陽縣横水真君十年分周城置地形志故城在府東南三十里以近横水而名鳯翔府舊志按縣後廢武都郡太延三年置領縣三地形志在按髙車一縣未詳所外増縣二虢縣漢幷於雍後魏立為武都郡寰宇記虢虢縣後魏立武都郡隋地理志今按地形志無虢縣増入平陽真君六年置地形志扶風郿縣舊曰平陽隋地理志晉郿縣姚秦號曰郿城真君六年改曰平陽郿縣志今按平陽郿縣宛川陳倉後魏曰宛川隋地理志後按晉有陳倉宛川二縣或魏廢陳倉入宛川地形志未載今増入南由渭水逕南由縣北水經注本漢汧縣地後魏孝明帝於縣西南由谷口置縣因谷為名元和志州按南由在隴西南一百里一作南田武功郡領縣二地形志太和十一年分扶風置武功郡屬岐州即漢武功縣地通鑑注美陽晉屬扶風真君七年罷郡屬焉地形志後魏太和十一年移縣於故斄城中又改武功為美陽縣仍於此置武功郡寰宇記美陽故城在武功西七里章懷太子注漠西太和十一年分好畤置地形志後魏於漠水西置縣因名漠西寰宇記後魏漠西縣在乾州西北寰宇記東秦州後魏初於汧源縣界置東秦州於故汧城孝昌三年為万俟隗奴所破永熈元年於今州理南八里復置東秦州寰宇記未按東秦州並一郡二縣地形志俱載今據諸志増入録郡一隴東郡後魏於今汧源縣界置隴東郡寰宇記録縣二汧陰永熈元年復置東秦州於州理置汧陰縣寰宇記按汧陰即隴州長蛇本漢隃糜縣地後魏孝昌二年於長蛇川置長蛇縣屬東秦州元和志南按長蛇縣在隴州東一百一十里脩城郡屬南秦州領四縣地形志省按除平洛等三縣在西又脩城亦作修武廣長郡治太和四年置地形志西漢水自㑹口東南逕脩城道南水經注畧按脩城郡在今陽西北南岐州領郡三地形志在按除廣業二郡西省西漢屬武都郡通考南岐志云有周之興鸑鷟至於岐翺翔至於南岐後魏置南岐州於此漢中府志固道郡延興四年置地形志故道縣自永嘉後没於氐羌後魏變文為固置固道郡元和志不按地形志空立郡名領縣今増縣一梁泉舊曰故道後魏置縣曰凉泉尋改曰梁泉隋地理志本漢故道縣地太和元年置取縣西梁泉為名元和志梁泉在鳳縣東一里今改為山川壇賈志東益州治武興領郡七地形志在按除仇池四郡西省武興王楊紹先僣稱大號傅竪眼攻武興克之遂滅其國以為武興鎮復改鎮為東益州北史氏傳武興漢武都郡之沮縣也宋立東益州通鑑注武興郡領縣四地形志在按除景昌三縣西省晉為楊茂搜所據其後為梁所滅置武興蕃王國通考後魏為武興郡通鑑注武興州郡治地形志昇明元年以楊文度為畧陽太守鎮武興宋書順帝本紀漢沮縣地後魏改為畧陽縣通鑑注楊茂搜分王武興後魏為武興縣又僑立畧陽郡畧陽縣雍勝畧槃頭郡屬東益州領縣二地形志未按除武世一縣詳所在漢水東南於槃頭郡與濁水合又濁水南逕槃頭郡東水經注槃頭故城在長舉縣南三里因水盤曲為名寰宇記萇舉本漢沮縣地後魏分置長舉縣元和志長舉在沔州北八十里魏太武置以長舉城為名寰宇記嘉陵江經長舉縣南十里元和志為按長舉本作萇後改長在畧陽北落叢郡屬東益州領縣二地形志在按除武都一縣西省本漢沮縣地後魏宣武於此置落叢郡因落叢山為名元和志明水本漢沮縣地後魏置鳴水縣因谷為名元和志鳴水縣在畧陽縣西一百一十里後魏於此置落叢郡及鳴水縣賈志水按地形志後魏置明水縣至隋始改鳴元和志云後魏置鳴水羌又寧誤宋齊後魏俱為晉夀縣地梁州蕭衍梁秦二州正始中改置領郡五地形志康按除安一郡見後又増郡一宋梁州更置秦州理南鄭齊及梁初多因之後魏得漢中亦曰梁州通考晉昌郡屬梁州領縣三地形志後魏正始中置興勢縣復自石泉移晉昌郡於縣因晉舊名也廢帝三年改為灙城郡寰宇記灙按魏紀正始三年趙遐破梁軍於城是廢帝之前已名灙城龍亭龍亭故城在今興道縣東寰宇記龍亭廢縣在洋縣龍亭山與真符縣廢址相連賈志縣按真符在洋東十里興勢後魏正始中分成固於今理西北二十里興勢山置興勢縣寰宇記興勢廢縣在洋縣東北二十三里賈志郡按興勢治南城涔水東北流逕成固南城北水經注郡按地形志晉昌冇南城縣盖後魏於此置縣也南城在今成固南後廢褒中郡屬梁州領縣三地形志褒城縣東至興元府三十三里當斜谷大路後魏於此置褒中郡元和志褒中晉屬漢中後罷永平四年復屬褒中郡地形志按褒中今褒城縣武鄉延昌元年置地形志武鄉谷在南鄭縣東北三十一里寰宇記㢘水南鄭有古㢘水城在縣西南七里圗經魏正始中自漢中移此漢中記㢘水縣在褒城縣南九十里漢中府志後按縣廢漢中郡領縣三地形志後魏置梁州及漢中郡通考梁天監三年夏侯道遷以州郡入魏通典西按宋漢中太守領上庸縣未詳所在南鄭宋孝武大明時梁州治南鄭秦州亦治南鄭鄭樵通志魏置梁州於南鄭通鑑注梁按宋書元嘉二年劉道禄為南秦二州刺史南秦州即秦州漢陰屬漢中郡有胡城地形志漢水東過南鄭縣南水南即漢陰城水經注縣按漢陰在今南鄭南後廢城固後魏正始中城固縣移居壻鄉即今理周地胥圖記鄉在城固縣東北六里賈志華陽郡屬梁州領縣三地形志華陽郡梁置華州通鑑注古白馬氐之境劉宋取其地置華陽郡城曰白馬城漢中府志華陽後魏華陽郡治華陽縣有蕭何城地形志齊華陽縣屬華陽郡南齊州郡志縣按華陽在今沔東沔陽蜀以沔陽為漢城後魏屬華陽郡華陽國志晉屬漢中後屬華陽郡地形志沔陽故城在今沔縣東南十里禹貢錐指嶓冢梁州之西縣本