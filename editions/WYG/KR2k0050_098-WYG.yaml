body:
  text: 陜西通志巻九十八拾遺一博古風稚閒適語林丘索義例麗土則書羣分𩔖聚採掇靡餘天府地胏漢唐故區捜神洞㝠亡是子虛可喜可愕捭闔紛拏侯鯖狐腋雜佩瓊琚廣蒐六籍恣我獵漁或資談麈或佐記珠作拾遺志第三十二博古陽虛山石刻二十八字係倉頡遺筆按倉頡古字刻陽虛山石室李斯止識八字曰上帝垂命皇辟迭王其餘二十字斯不能識商州志雒按陽虚山在南縣倉頡冡碑大篆書在左馮翊利陽亭南道旁聞人牟凖衛覬碑文漢宣帝擊盤石於上郡䧟石室中得一人裸而被髪反縳械一手足以問羣臣莫能知劉向曰此貳負之臣也昔貳負殺窫窳帝梏於疏屬之山帝問所出曰見山海經野客叢談苻堅太元七年新平郡獻玉器初堅即位新平人王彫上書曰新平古顓頊之墟里名曰雞閭記云此里應出帝王寳器其曰延夀寳鼎至是新平人得之以獻晉書苻堅載記扶風田者見河岸土崩钁之得一銅器狀如盂高八寸圍徑六寸乳周其體中有古文莫能辨識醫師席姓出千錢易之徧詢博古家曰此殷之乳彛也古文為祖丁二字觚賸政和間李朝孺為陜西轉運遣人於鳯翔府破商比干墓得銅盤徑二尺餘中有欵識二十六字墨莊漫錄係按何比干漢平陵人此或何墓云商者誤毛伯敦銘皇祐中長安民得於渭上銘曰毛伯内門立中庭右祝􅌏王呼内史冊命􅌏王曰􅌏昔先王既命汝作邑今惟亂商乃命錫廣川書䟦史記武王克商毛叔鄭奉明水銘謂鄭者毛叔鄭也伯者爵也敦乃武王時器六一題䟦歐文忠曰十鼓之文可見者四百六十五字不可識者過半即韓歌所謂牧童敲火牛礪角年深豈免有闕訛者也其可曉者有曰我車既攻我馬既同者車攻語也有曰其魚維何維魴及鯉何以摽之惟楊及栁則兼記田漁也凡數語可讀者蘇文忠所謂衆星錯落僅名斗者也雍錄右石鼓文周宣王之獵碣也唐自貞觀以來蘇朂李嗣真張懐瓘竇泉竇䝉徐浩咸以為史籕筆蹟虞世南歐陽詢禇遂良皆有墨妙之稱杜甫八分小篆歌叙歴代書亦厠之倉頡李斯之間其後韋應物韓愈稱述為尤該至歐陽修作集古錄始設三疑以韋韓之說為無所考據後人因其疑而増廣之岐陽石古文有謂為周宣王獵碣者惟董程二氏以左傳成有岐陽之蒐證之皆鑿鑿有據其畧云考之書天子大蒐會諸侯施命令非常事也史不得無書若宣王蒐岐即周史失之列國不得並逸胡後世無聞焉則為成王信矣郭宗昌周岐陽石皷文䟦又鼓有十因其石之自然粗有鼓形字刻於其旁石質堅頑𩔖今人為碓磑者其初散在陳倉野中韓吏部為博士時請於祭酒欲以數槖馳輿致太學不從鄭餘慶始遷之鳳翔孔子廟五代之亂又復散失司馬池知鳳翔復輦至於府學而亡其一皇祐四年向傳師捜訪而足之王厚之䟦岐陽石鼔文後張仲器嘉祐中原父在長安獲二古器於藍田形制皆同有葢而上下有銘詩曰張仲孝友葢周宣王時人也六一題䟦商雒鼎銘原父得之終南上雒其銘云惟十有四月既死霸王在下都雝公作􅳛鼎用追享丁於皇目考用气麋壽萬年無疆子子孫孫永寳用雝公不知為何人原父謂古丁寧通用蔡君謨謂十有四月者何原父亦不能言也六一題䟦既按十有四句月死句伯牙山州東百里俗呼白鴉山嘗於風起雲來時隠隠聞絲絃聲覔之不得崇禎初好事者陟其巔得斷碣於敗葉中鐫伯牙二字大如斗意牙嘗游觀至止故琴韻鏗然迄今未絶商州志李保季得鼎於長安耕者其銘曰集作尊鼎萬壽無疆子子孫孫永寳用康廣川書䟦終南古敦銘蘇軾為鳳翔府判官得古器於終南山下其形制與今三禮圖所畫及人家所藏古敦皆不同其銘有寳尊敦之文遂以為敦耳六一題䟦旅匜銘此器𩔖觚但容受勝耳昔人得於萬年涸中廣川書䟦劉原父既得鼎韓城遺余以其銘而太嘗博士楊南仲能讀古文篆籕為余以今文寫之而闕其疑者原父在長安所得古竒器物數十種亦自為先秦古器記為余釋其銘以今文而與南仲時有不同故並著二家所解以俟博識君子六一題䟦太宗時長安民耕地得甗初無識者其狀下為鼎三足上為方甑中設銅箄可以開閤製作甚精有銘在其側學士句中正工於篆籕能識其文曰甗也遂藏於秘閣六一題䟦鬻簋銘曰叔髙父作鬻簋其萬年子子孫孫永寳用原父在長安得此簋於扶風簋容四升其形外方内圓而小楕之似龜有首有尾有足有甲有腹今禮家作簋亦外方内圓而其形如桶但於其葢刻為龜形與原父所得真古簋不同六一題䟦曰按廣川書䟦云先秦古器有鬻簋或以火亨鬻也考其文當為旅古有八簋旅陳於席謂之旅龔伯尊彛臨江劉原父得於長安制形𩔖敦而大其重若干其容若干附耳為竒獸口圜上周以回文下畫為雲氣以禮考之罍也廣川書䟦潞國文公守京兆得鼎其銘曰惟正月初吉丁亥王子呉擇其吉金自作㱃其麋壽無疆子子孫孫永寳用之廣川書䟦宣帝時美陽得鼎獻之中有刻書曰王命尸臣官此栒邑尸主事之臣栒邑即邠地賜爾旂鸞黼黻琱戈尸臣拜手稽首曰敢對揚天子丕顯休命此鼎所以褒賜大臣大臣子孫刻銘其先功藏之宫廟也冊府元龜秦武公作羽陽宫在寳雞縣界元祐六年正月直縣門之東百歩居民權氏濬地得古筩銅瓦五皆破一獨完面徑四寸四分面隠起四字曰羽陽千嵗篆字渑水燕談録詛楚文有三告巫咸文在鳳翔東坡鳳翔八觀詩嘗紀其事舊在府廨徴歸御府述秦穆公與楚成王相好及熊相倍十八世詛盟之罪以史記世家年表考之秦自穆公十八世至恵文王與楚懷王同時此詛為懷王也王厚之書詛楚文後秦昭和鐘銘慶厯中葉清臣守長安所得上之大樂攷之音中大吕銘云不顯朕皇祖奄有下國十有二公自非子至成公十有二世是鐘為成公作東觀餘論秦始皇得藍田玉製為璽八面正方螭紐命李斯篆文以魚鳥刻之其文曰受天之命皇帝壽昌或曰受命于天既壽永昌賈志秦傳國璽以藍田水蒼玉為之取水德魚蟲鶴蟮蛟龍皆水族物大畧取此義以扶水德書史隋開皇二年長安人穿地得金版有銘云始皇時量器白孔六帖秦度量銘二按顔氏家訓隋開皇二年之推見長安官庫中所藏秦鐵稱權傍有鐫銘二載之家訓文同嘗遊長安買得二物其上刻二銘其一銅鍰上有銘循環刻之乃前一銘也其銅方版可三四寸許所刻乃後一銘也與家訓所載正同余意秦時兹二銘刻於器物者非一也六一題䟦秦始皇二十一年長狄十二見於臨洮長五丈餘以為善祥鑄金人十二以象之各重二十四萬斤坐之宫門之前謂之金狄皆銘其胸云皇帝二十六年初兼天下以為郡縣正法律同度量大人來見臨洮身長五丈足六尺李斯書也故衛恒叙篆曰秦之李斯號為工篆諸山及銅人銘皆斯書也漢自阿房徙之未央前俗謂之翁仲矣地皇二年王莽夢銅人立惡之念銅人銘有皇帝初兼天下文使尚方工鐫滅所夢銅人膺文後董卓毁其九為錢其在者三魏明帝欲徙之洛陽重不可勝至霸水西停之漢晉春秋或言金狄泣故留之石虎取置鄴宫苻堅又徙之長安毁其二為錢其一未至苻堅亂百姓推置陜北河中水經注趙龍圖師民自耀過同說祋祤廟疑祋祤亦是一兵器其秦禱兵之所乎江隣幾雜志瓦作楚字者秦瓦也秦作六國宫室用其國號以别之長安志商人堌中得敦銘曰秦公作敦其制簋也廣川書䟦咸陽志曰泰山碑秦相李斯書跡妙時古為世所重鄭文寳模刋石於長安故都國子學今在文廟石皆剥落唯二世詔一面稍見學古編漢中府治月臺東南隅有璞石如鼓而方髙二尺六寸圍八尺脰間作四獸面有剖露㾗審視之真碧玉也制似罍相傳楚漢間物隴蜀餘聞興平古廢丘地項羽封章邯為雍王都此萬厯四十三年土人於地中得一金印龜紐方寸許文曰雍王章邯印隴蜀餘聞長安中有耕者得陶器於古墓中形如卧蠒口與足出蠒腹之上下其色黝黑光潤如玉呼為蠒瓶大者容數斗小者僅容數合養花成實或云三代秦以前物癸辛雜識四皓没恵帝為之製文立碑而四皓碑目獨見於任昉文章縁起故特表出之天禄識餘劉原父在長安有獲玉印遺之者其文曰周惡夫印公曰此漢侯印尚存於今耶古亞惡通用史記盧綰之孫他人封亞谷侯漢書作惡谷是矣避暑録話致和中仕闗中於同官蒲氏見漢印文云輯濯丞印文竒古非𨽻非篆輯讀如楫濯讀如櫂葢船官也上林有船官楫櫂有令丞此葢丞官也嬾真子漢郊祀志武帝甘泉作益壽延壽館太史公作益延壽觀近歲雍耀間耕夫有得古瓦其首作益延壽三字瓦徑尺字書竒古即此觀當時瓦也東觀餘論漢瓦形製古妙瓦頭皆古篆盤屈隠起其文有長樂未央長生無極漢並天下萬壽無疆上林儲胥等字淳化志漢武帝幸甘泉坂馳道有蟲蟠而覆地赤如生肝頭目悉具東方朔曰蟲名怪哉憤氣之所生也此必秦故獄處上曰何以去之朔對曰凡積憂者得酒而解以酒灌之當消於是取蟲置酒中須㬰麋爛東方朔傳漢武帝鑿昆明池極深悉是灰墨以問東方朔朔曰可試問西域胡後漢時有憶朔言者乃以灰墨問之胡人云天地大刼將盡則刼燒此刼燒之餘摯虞決疑要注昭帝始元元年於藍田覆車山鑄一鼎髙三尺受五斗刻其文曰宜君王和四方調滋味去腥傷小篆書三足古今刀劍録前漢谷口銅甬劉原父在長安時得之其前銘云谷口銅甬容十斗其下滅兩字始元四年左馮翊造其後銘云谷口銅甬容十斗重四十斤甘露元年十月計掾章平左馮翊府下滅一字原父以今權量校之容三斗重十五斤六一題䟦宋宇文伯修藏一古鼎欵識曰輦酌宫香祖筆記蓮勺宫博山爐下檠銘一漢五鳳中造宣帝本紀云困於蓮勺鹵中注云縣也不云有宫葢秦漢離宫不可勝數史不能備載也六一題䟦宣帝甘露元年於華山仙掌鑄一鼎髙五尺受四斗擬承甘露刻其文曰萬國伏貽長久鑄神鼎承天酒三足小篆書又建章宫銅人生毛以為美祥作一金鼎埋之本宫古今刀劍録紹聖初先人官長安於漢髙祖廟前民家得一白玉奩髙尺餘遍刻雲氣龍鳳葢為海中神山足為饕餮實三代寳器邵博聞見後録宣和五年余來闗中與田仲方㑹長安因示余龍桮考其制有龍首其旁刻飾雜有花草蟲獸足分𩔖巵其識曰互考之古字當讀為亞鎗漢制東宫給龍頭鎗則此器也其曰亞者亦非一當有序而陳者廣川書䟦漢西都時南宫寢殿内有醇儒王史威長葬銘曰明明哲士知存知亡崇隴原亹非寧非康不封不樹作靈乘光厥銘何依王史威長晉張華博物志僕於闗中王毖君求家見一古物似玉正如中指上有四字乃正月剛卯也漢人以正月卯日作佩之與陳湯所謂强漢者同義嬾真子予於闗中得一銅匜其背有刻文二十字曰律人衡蘭注水匜容一斗始建國元年一月癸卯造皆小篆律人當是官名沈括筆談辛繕隠居華隂光武徴不至有大鳥髙五尺五色備而多青棲繕槐樹旬時不去𢎞農太守以聞詔問百僚太史令蔡衡對曰凡象鳳者有五多赤色者鳳多青色者鸞多黄色者凰多紫色者鵷多白色者鵠此鳥多青乃鸞也上善其言鴻書潼闗西道北行有楊震碑通典漢郃陽令曹全碑萬厯初郃陽舊城掘得此碑中平二年造碑文𨽻書遒古不減卒史韓勑等碑無一字缺壞石墨鐫華曹全碑修孔廟時欲移置於至聖殿前碑屹然不可動人以為神故仍立於外又有十三字漢碑亦於夏陽故址掘得者葢斷碣僅十三字耳亦八分書弗可句讀筆畫古勁過於曹碑康熙七年署縣事郭丞得之識為漢物砌之曹全碑傍余訪求之不知何往僅見其墨搨云宰莘退食録張昶八分碑在華隂今華山所存漢碑凡四懷瓘書斷鄭縣城南山北有五部神廟東南向華岳廟前有碑後漢光和四年鄭縣令河東裴畢字君先立水經注漢西岳華山廟碑漢魏碑例不著書刻人姓名獨此題郭香察書洪适𨽻釋云東漢循王莽禁無雙名郭香察書者察蒞他人之書又唐徐浩古迹記以為蔡中郎書按碑文云京兆尹勑監都水椽覇陵杜遷市石遣書佐香察書但書雖遒勁殊不𩔖中郎且市石察書皆著其名而獨無中郎名不可曉石墨鐫華政和初人於陜西發地得木竹簡一瓮皆漢世討羗戎馳檄文書若今吏案行遣皆草書然斷續不綴屬惟鄧隲永初二年六月一篇成文爾東觀餘論漢李翕析里橋郙閣銘在略陽相傳為蔡邕書碑文醳散闗之􅢉漯徙朝陽之平􅏫歐陽公以為疑楊用修謂醳古與釋通漯借作濕􅏫與燥同解作去濕就燥之義又碑中太守李君諱翕字伯都今版本皆作李會唯鄭樵畧曰李翕與碑合石墨鐫華華山下有漢魏文帝廟廟有石闕數碑一碑是建安中立漢鎮逺將軍叚煨更修祠堂碑文漢給事黄門侍郎張㫤造㫤自書之元帝又刋其二十餘字二書存重名傳於海内水經注司馬子長廟前有碑永嘉四年漢陽太守殷濟瞻仰遺文大其功德遂建石室立碑樹柏水經注蔡邕鐫刻七經著於石碑兵火既遭碑亦損缺隋開皇六年自鄴京載入長安置於秘書内省議欲補緝立於國學㑹亂遂廢營造之司用為柱礎貞觀初魏徴始收聚之十不一存廣川書跋河東李員居長安延夀里元和初室西隅有微聲鏗然俄有吟歌者云色分藍葉青聲比磬中鳴七月初七夜吾當示汝形至秋六日夜雨隤堂北垣明日得一缶僅尺餘製用金形狀竒古隠然有文皆小篆書乃崔子玉古磬銘也宣室志漢水東逕胡城南義熈十五年城上有宻雲細雨五色昭章人謂之慶雲休符當出雲霽乃覺城崩半許淪水出銅鐘十二枚刺史索邈送洛陽歸宋府水經注笋殿側有魏温泉堂碑其石瑩徹見人形影號頗黎碑長安志興平一道觀中有星隕石如半柱滿其上皆繫痕豈果繫於空中邪旁有石記西晉時隕聞見後録雷煥得豐城劍張華以華隂赤土送煥拭劍倍益精明續博物志劉原父在長安有得古鐡刀以獻製作極巧下為大環以纒龍為之而其首𩔖鳥人莫有識者原父曰此赫連勃勃所鑄龍雀刀也問之乃种世衡築青澗城掘地所得正夏故疆也避暑録語後魏豆盧恩碑在咸陽恩墓前隸書令尹王公家瑞求得之予摹一紙多不堪讀而王公所刻金石遺文尚存强半葢從碑下錄之耳石墨鐫華後魏周惠達碑視豆盧碑稍完隸書碑首大魏故司空匡穆周公之碑銘篆書十二字宛然如新按史傳與碑畧同碑具當時贈諡而史無之史但云開皇初追贈蕭國公云石墨鐫華隋安喜公李使君碑奉天鄊人掘得此碑樹之上官村廟前隸書亦自遒逸而碑頗完海陵公賀若誼碑正書方整精健在興平縣文廟宋人磨其隂刻夫子廟記而此文止存十三一縣令苦貴人摹搨使捶去之常醜奴墓志醜奴始平人為都督滎澤令大業元年卒志在興平崇寧寺為童子摩娑幾平智永真草千字文大觀間刻皇甫誕碑于志寧撰歐陽詢書俱在西安府學李淵為子世民祈疾䟽在鄠縣草堂寺石墨鐫華大業四年藍田令王曇於藍田山得一玉人長三尺四寸著大領衣冠幘詔問羣臣莫有識者崔頤答曰謹按漢文以前未有冠幘即是文帝以來所制作也嵩髙山廟記云有神人以玉為形像長數寸或出或隠出則令世延長隋書崔廓傳貞觀元年太宗命閻立本圗寫功臣二十四人於凌烟閣御製賛詞令禇遂良書焉宋游師雄得其本於蒲華間行部過九成宫見遺石頗多遂命邑令閻上功刻於縣庠今舊刻止存七人麟逰縣志唐太宗蘭亭用玉石刻之文宗朝舒元輿作牡丹賦刻之碑隂熈寧間薛紹彭聞公厨有石用以鎮肉取視之乃刻牡丹賦於碑隂者遂易之以歸長安大觀中詔取置宣和殿續文獻通考太宗𦵏文徳后御製刻石文并六馬像賛皆立陵後歐陽詢書髙宗又詔殷仲容别題馬賛於石座此宋游景叔所題云得之唐陵園記者是也景叔云詢書不復見獨殷書存余兩度觀之西第一四蹄端立有馬圉撫膺拔箭人馬相如鼻語東第一西第二則三蹄立而前左一足作跑勢如索水草有嘶聲餘三絶塵而奔香鬃錦帶飄飄怒起猶想見其籋雲掣電時也其石髙可四尺馬軀可三尺雖半刻而稜稜露骨西第三石已仆五馬亦多斷裂然氣不彫喪趙子函乃疑非唐時物謬矣昭陵志駿石居後殿左右下一坎兩行列數石人皆不全此貞觀中擒服諸番君長頡利等十四人之像琢石列之北司馬門内兩旁有土阜中為甬路遺跡可尋陵圖所云六駿馬刻石於北闕下即此地葢九􅉄三面峭削惟正北稍平衍故表闕刻石俱置於此昭陵志余經行墓雖纍纍然或土存石缺或石存畫缺如長孫無忌墓文俱失在劉洞西村徒存無字碑髙士廉碑字稍存墓亦烏有即文皇后碑止有龜趺卧側耳余徧求之獲二十一碑於房𤣥齡得五百餘字禇遂良書髙士廉得三百餘字許敬宗撰趙模書段志𤣥得八百餘字張引蘭陵公主馬周各得六百餘字公主碑李義甫撰馬碑許敬宗撰􅎋仲容分書姜遐許洛仁各得九百餘字姜碑侄郕公晞撰書孔頴達字及千于志寧撰阿史那忠崔敦禮各得字七百餘崔碑于志寧撰于立政書豆盧寛字止四百李義甫撰然四碑㸃畫多殘餘薛收張阿難監門將軍王君各百餘字徒存形似惟唐儉有字千一百乙速孤行有字千四百劉憲撰白義晊分書李衛公有字千五百許敬宗撰王知敬書李勣有字千八百髙宗御製御書乙速孤昭字至二千五百餘苗神客撰釋行滿書又一碑字可百五六十能辨前有蘭陵公主字中有詔蘭陵殆有二碑殊不可曉凡不註撰書姓氏者無考余摩娑展玩𩔖為一帙名曰昭陵碎墨大抵唐人書即方圓踈密不同而運轉結搆法多相𩔖惜㭬氏不全昭陵志聖教序並記分刻二碑於慈恩寺塔下分東西兩龕置之書法遒健然用筆輕細後署永徽四年書同州序記并書一碑遒逸婉媚波拂處虬如鉄線後署龍朔三年書按玉海太宗製聖教序髙宗為太子又述記并勒碑置慈恩寺浮圗永徽四年禇遂良書則寺塔本似是真蹟而同州本反勝何也李英公陪𦵏昭陵碑文髙宗製並書行草神逸機流後半尤縱横自如碑首御製御書四字大𩔖禇登善萬年宫即九成宫改名髙宗幸而銘之書之行草尤為勁拔碑隂云奉勅中書門下見從文武三品以上并學士并聴自書官名後列從官五十餘人長孫無忌李勣禇遂良軰皆與焉書名大小不倫然皆有法即契苾賀蘭亦不草草九成宫醴泉銘歐書皇甫君遒勁此碑婉潤宋趙子固謂率更化度醴泉為楷法第一今巍然獨存者醴泉耳化度寺在朱雀街今無復蘭若之迹不知碑亡在何時孔子廟堂碑評者謂虞永興如層臺緩步髙謝風塵又如行人妙選罕有失詞觀此碑果不虗也賈躭相公云孔子廟堂碑青箱至寳今碑已經五代翻刻尚爾則當時可知但碑已斷泐在西安府學石墨鐫華興平石觀音像吳道子所畫昭陵故物也農人得之地中見一方石遂移送女家供砧衣既而祥光照屋拂拭之乃觀音像下有數十字并吳道子名俗人不解搨盛飾以金視為家珍興平志蘇許公瓌景雲元年𦵏於武功碑𨽻書剥蝕過半書法猶有漢魏遺意考文苑英華盧蔵用撰序張説撰銘今碑後猶有范陽張説字述聖紀碑立乾陵今倒仆折為數段止存兩段耳據金石錄武后製中宗書字法遒健深得歐虞遺意石墨鐫華西安府學宫唐宋之碑林立俗稱碑洞長安縣有景龍鐘銘為唐睿宗書因去洞逺而搨者必塞其内空縁梯而上乃可椎刷故罕傳於世然文體古雅書法遒媚極可愛也觚賸京兆闤闠間有唐國子監存焉其間石經乃開成中鐫刻唐史載文宗時太學勒石而鄭覃與周墀等校定九經文字上石及覃以宰相兼祭酒於是進石碑九經一百六十巻即今之石經是已明皇注孝經碑及建學碑則立之中央顔禇歐陽徐栁之書逮偏旁字源之𩔖則分布於庭之左右如入東序𢎞璧琬琰爛然盈目咸寧縣志唐顔氏家廟碑李氷陽篆額顔真卿撰書争坐位書藳顔真卿撰行書尚書馮宿碑王起撰栁公權書邠國公功徳銘楊承和撰書元秘塔碑裴休撰栁公權書不空禪師碑嚴郢撰徐浩書道因禪師碑李儼撰歐陽通書楚金禪師碑沙門飛錫撰吳通微書大智禪師碑嚴挺之撰史惟則書隆闡禪師碑浄住寺文賢像銘李陽冰先塋記三墳記張旭斷碑千文肚痛帖草書心經懷素蔵真律公帖聖母帖草書千文題名石柱俱在西安府學石墨鐫華呉岳碑自首至座七段明皇八分書為黄巢所焚摧剥僅可辨當時日書三字發三驛刻工亦然畫墁録華嶽碑𤣥宗自書御製碑文碑髙五十餘尺闊丈餘厚四五尺其隂刻扈從太子王公已下官名制作壮麗鐫琢精巧開元傳信記唐虞公温彦博碑岑文本撰歐陽詢書在醴泉縣惜碑已殘後世不復見涼國公主碑蘇頲撰明皇御書在蒲城縣公主先嫁薛伯陽再嫁温彦博曽孫曦史遺曦不書而碑不言伯陽石墨鐫華大安國寺睿宗為相王時舊邸也即尊位乃建道塲嘗施一寳珠令鎮常住庫開元十年寺僧造功徳開櫃物閱将貨之見函封曰此珠直億萬開之狀如片石赤色夜則微光髙數寸有西域胡人見珠大喜使譯問價僧曰一億萬胡人曰珠價誠直億萬然胡客久納錢四千萬市之僧問胡從何來胡曰吾大食國人貞觀初通好來貢此珠後吾國常念之此水珠也毎軍行休時掘地二尺埋珠於其中水泉出可給數千人故軍行常不乏水胡人命掘土蔵珠有頃泉湧其色清冷流汎僧取飲之方悟靈異胡人乃持珠去鴻書唐田仁晼徳政碑蘇靈芝書蘇武功人生開寶間書與胡霈然齊名唐集右軍殘碑已斷缺棄西安城南隍中王生堯惠輩見之以語郡守舁置頖宫碑為大將軍吳文立𢎞福寺大雅集右軍書觀其筆法去聖教逺甚應是集字者不及懐仁而碑中有開元九年字疑又從聖教序諸刻中摹集非右軍真蹟也昭仁寺碑在長武朱子奢撰無書者姓名觀其筆法大𩔖廟堂廟堂豐逸此稍瘦勁廟堂五代重勒此伯施真蹟也夢真容碑按碑開元帝夢老子真容求得之中南樓觀今中南樓觀有此碑蘓靈芝書華岳精享碑開元帝遣蘇頲禱雨華山有應而建也作者為主簿咸廙書者為御史劉升今觀其𨽻古遒逸有漢人遺意述聖頌碑在華隂縣岳廟中達奚珣撰序吕向撰頌并書不著年月今碑已裂趺尚存如山上存二字大可徑四寸許分𨽻不减太山銘姜嫄公劉廟碑在邠州張獻甫為節度作廟髙郢撰張誼書誼于書家不甚著此書不及王縉而畧似栁公權石墨鐫華長安府錄㕔前石幢即郎官題名石也張長史書序張君作字詭怪顛倒不可名狀至為楷法整若軍陣畫墁録天寳三載五月十五日揚州進水心鏡青瑩耀日背有盤龍勢如生動元宗異之七載秦中大旱詔葉法善於内庫閲此鏡曰鏡龍真龍也上幸凝隂殿詔法善祠鏡龍忽見梁棟及鏡龍口鼻有白氣須臾滿殿遂徧城内甘雨大澍唐鏡龍記白鶴觀碑按觀故址在宜川縣南三里有倒碑俗號碑子衚衕碑文剥落不可讀約略其詞乃明皇夢李耳云吾汝始祖命近臣訪我於東北五百里外當授汝符瑞覺後乃遣五兵尚書牛仙客如夢求之惟肖即此地起觀制𩔖興慶宫碑倒二百年五代勸農使立之復倒五百年土蝕其半延安府志長安任中宣家素蓄寳鏡謂之飛精識者謂是三代物後有八字近籕篆云水銀隂精百鍊成鏡云啇山樵者石下得之龍成録宣政間長安人牧牛於野一日大雪視牛卧處獨不積異而掘之得石匣刻曰開元祭地黄琮啟之得琮形如今制白色美玉其中方寸許作新粟也暌車志沈監運得異石於葉石林之廢圃有刻曰採菱渡其陽字二行背有印文復刻摩詰詩於下方云採菱渡頭風急策杖林中日斜杏樹壇邉漁父桃花源裡人家此輞川舊物立於採菱渡者陳眉公秘笈常樂坊趙景公寺有嵌七寳字多心經小屏風盛以寳函上有襍色珠及白珠駢甃亂目安禄山亂宫人蔵於寺中屏風十五牒三十行寺塔記唐美原夫子廟碑縣令王嵒撰並書嵒天寳時人字書竒怪初無筆法而老逸不羈時有可愛書中狂士也六一題跋郭敬之家廟碑在今陜西布政司御題額顔魯公撰并書敬之汾陽忠武王父也碑隂具述汾陽兄弟子孫始知汾陽兄弟九人皆列大位不止史所稱幼明一人而已碑真書隂作行書多寳佛塔感應碑魯公正書舊在興平千佛寺移立西安府學雲麾將軍碑北海書雖剥蝕過半而存者其鋩鎩凛然碑在蒲城李思訓𦵏處段行琛碑書法遒逸豐美書者為張増按碑行琛者忠烈公秀實父忠烈公汧陽人碑在汧陽完好可搨西平忠武李晟碑在髙陵縣王墓前裴晉公撰栁誠懸書已磨泐不可讀都元敬錄其文止缺數字石墨鐫華蒲城胡珦神道碑韓文公撰胡証書在尉廏支槽近置於夫子廟江陵㡬雜志鳯翔府岐陽鎮法門寺塔下層有石芙蕖工製精妙毎一葉上刻一施金錢人姓名殆數千人宫女姓名為多如曰張好好李水水之𩔖與慈恩寺塔塼上所書同聞見後錄華州王氏掘地得石一片云員外郎瑯琊顔真卿書又有云都官郎中東海徐浩篆其餘數十字則不成文不知何碑石墨鐫華長安故宫闕前有唐肺石宋時尚在其制如佛寺所擊響石而甚大可長八九尺形如垂肺亦有欵識但漶漫不可讀天禄識餘朝士黄秉少居長安逰驪山值道士理故宫石渠石下得折玉􅁫刻為鳯首已破缺然製作精巧後人不能為也夢溪筆談唐李元諒昭徳懋功碑李元諒者駱元光賜姓名也以朱泚之亂能鎮定華州將徙治隴右華州人感之行軍司馬董叔經請於天子立碑述頌也張濛撰韓秀弼分書咸陽原有無畏不空禪師墓有塔記作於開元二十五年書法似顔平原已經再刋亡其筆意寂照和尚碑在咸陽西馬跑泉地中武功康子秀䜿於道傍其後王咸陽移之城中寺以碑有安國寺字遂改名寺為安國按碑叚成式撰文僧無可書成式文筆自竒此文尤竒無可賈島從弟其書法出栁誠懸而優孟者石墨鐫華王忠嗣神道碑唐元載撰王縉書在渭南縣東南廣鄉原北官道南雍勝畧長安菩提寺僧廣祝李林甫功徳冀獲厚襯簾下出綵篚香羅帊籍一物如朽釘長數寸僧歸大失所望携至西市示於胡商曰此寳價值一千萬遂與之僧訪其名曰此寳骨也酉陽雜爼唐大遍覺禪師塔銘𤣥奘據史卒於顯慶六年銘云卒於麟徳元年先𦵏滻東後移樊川北原開成四年劉軻撰文僧建初書行草秀勁有法基公塔銘基公者尉遲敬徳之從子也度為僧譯經於慈恩寺卒於永淳中太和間始建塔李𢎞度銘之書者亦建初然其筆法少遜元奘塔銘石墨鐫華唐石鼔經咒以石為鼔而週刻尊勝經咒書遒健有法鼔下作石山山上作天王鬼神以戴之在醴泉縣趙村廣濟寺後石墨鐫華馮翊嚴生甞逰峴山得一物狀若彈丸色黒而大有光視之潔徹若輕氷後逰長安于春明門逄一胡人言衣槖中有竒寳願得一見生以示胡人捧之喜願以三十萬為價曰此乃吾國清水珠置於濁水冷然洞徹自亡此寳吾國井泉盡濁國人俱病故越海踰山来中夏求之即命注濁水於缶以珠投之俄而澹然清瑩􅊏毫可辨生以珠與胡獲價而去太平廣記李德裕任中書常飲常州惠山井泉自毗至京置逓舖有僧謁德裕曰京都一眼井與惠山寺泉脈相通在昊天觀後德裕乃以惠山一甖昊天一甖雜以八瓶都十瓶暗記出處僧因啜嘗惠山寺與昊天餘八乃同味德裕竒之當時停其逓運芝田録扶風縣西南有三寳村故老傳云建村時有胡僧曰地有寶氣此交趾之寳數有三焉因以三寳名村開成元年有牧䜿望見西原下炯然有光里人夜尋其光相與植表以識之明日窮表之下得一金龜長二寸許製度竒妙又得寳劍一長二尺有四寸又得古鏡一徑一尺餘里人遂持以詣縣時縣令沛國劉隨發硎其劍澹然若水利如切玉其鏡背文跡繁會有異獸環繞鏡鼻乃命磨瑩其清若水時陳君節度岐隴得而愛之因有其寳由是人無知者宣室志唐周公祠靈泉碑泉湧出大五小七觀察崔珙奏狀勒石事在大中間石前刻奏狀中刻宣宗批答後刻珙謝表文詞婉至有盛世風書亦遒健有法濟安侯廟記在華州昭宗在富平韓建迎之至華自華歸長安褒建而及於城隍神記為諫議大夫李巨川撰拾遺栁懐素書文固諛詞而楷則嚴整武安君廟記廟在今咸陽東古杜郵壁間記唐乾符五年重修正書遒勁亦有歐法李輔光墓志巨雅正書清勁有聖教遺意在咸陽東北近涇石墨鐫華祭顔杲卿並十三姪文真卿行書祭伯父濠州刺史文稿真卿行書金蘭帖歐陽率更真書凡六十字俱在陜西西安府學羽林大將軍臧懐亮碑李邕行書遒媚圓健可愛在三原縣臧氏墓上一行禪師塔碑明皇御製文八分御書在㶚橋東原上㨶衣篇僧彦修草書在西安府學上京薦福寺碑韓擇木八分書史惟則篆額在西安府景風街仁王寺中贈榮州刺史碑唐張頌行書在三原縣北墓上唐元度十八體書在西安府香城寺中蘭亭詩序褚遂良臨本後有延陵之印在同州學中格古要論唐宗聖觀碑歐陽詢撰序陳叔達撰銘在盩厔縣將軍臧懐恪碑顔真卿撰書在三原縣靈應頌碑戴璇撰序劉同昇撰頌戴伋書在盩厔縣顔真卿奉使題字在同州華岳題名碑在華隂縣淄川公李孝同碑諸葛思楨書祝府君碑子欽明撰李劍州廣業碑于大猷碑在三原縣贈池州刺史馮公碑崔尚撰郭謙光書在咸陽縣臨淮武穆王李光弼碑顔真卿撰張少悌書在富平縣契苾明碑婁師德撰殷元祚書在咸陽縣昭告華隂碑韓賞撰韓擇木書在華隂縣圭峰禪師碑裴休撰書在鄠縣杜順和尚碑杜殷撰董景仁書在長安開佛寺御史臺精舍碑崔湜撰梁升卿書在西安府學法門寺重修塔廟碑薛昌撰王仁恭書在扶風縣順陵碑武三思撰相王旦書在咸陽縣今亡宗聖觀主尹文操碑員半千撰在盩厔縣浄業禪師塔銘畢彦雄撰在香積寺石幢燃燈功德碑在香積寺陳居士殘碑武功人耕而獲斷碑首題曰大唐𨽻川陳居士塔銘石墨鐫華有按三原北原上于志寧臧希晏墓碑俱唐人書而金石諸録俱闕故附識於此宋譯三藏聖教序碑太宗御製沙門曇勝書勸慎刑碑趙逈撰盧經書清浄獲命得道經龎仁顯書摩利支天并隂符經袁正已書郭忠恕三體隂符經篆書千字文序陶穀撰皇甫儼書篆書千字文夢瑛篆袁正已𨽻書夢英十八體書偏旁篆書夢英夫子廟堂碑刻僧彦修草書抄高僧傳序陶穀撰夢英書僧正已書偈語碑贈夢英大士詩僧正䝉書俱在西安府學石墨鐫華宋同州龍興寺塔碑寺建自隋而重修於宋開寳之末碑内有云府主連帥太師者有曰通揔隴右公者有曰觀風譙郡夏侯公者皆不可考作碑者名岵而不言其姓書者并無姓名書法率更方整有之遒逸不及也石墨鐫華宋修周武王廟碑盧多遜撰孫崇望行書開寳六年建廟近王陵今廢圮碑不知何時移咸陽城中石墨鐫華鳯州遁跡山景德二年軍人楊起入一洞穴中有石架鏡圍五寸背鑄水族囘環有銘三十二字曰錬形神冶瑩質良工當眉寫翠對臉傳紅如珠出匣似月停空綺窓繡幌俱含影中方取鏡而聞後有風雨聲既出穴鏡存而匣已爛矣學齋佔􅖶清和觀在同州儒學西北宋為神霄玉清萬夀宫萬厯間於觀南掘得銅章方二寸餘其文曰同州玉清萬夀宫印型鑄甚工文深寸許同州志楊褒皇祐中宿華州西隂寺夜間見光煜然視之石也意其隠玉使工割之得玉徑數寸光采粲然玉人驚曰至寶也會朝廷求玉琢鎮國寶褒獻之遂為璽渑水燕談録自炭谷口行十餘里磴道之半有司馬温公𨽻書二十八字曰登山有道徐行則不困擇平稳之地而置足則不跌人莫不知之鮮能慎遊城南記張浮休云盜夜發咸陽原上古墓有火光出用劍擊之鏗然以墜視之白玉簾也有中官取以作算籌浮休亦得一二聞見後録宋普濟禪院碑在汧陽于侍御永清始獲之亟稱賞以為不减聖教序書者為僧善儁其年大中祥符石墨鐫華某到醴泉改塟少師求得少師緑玉枕於四翁汝和家伊川家世舊聞長安慈恩寺塔有唐新進士題名雖妍􅎀不同皆髙古有法宣和初本路漕栁瑊集而刻之石亦為竒玩嬾真子修内司十七帖宋淳熙中刻於關中續文獻通考興安州南三里蜀漢西城郡也宋慶元五年寧宗御書枕戈二大字以賜郭倪刻於石賈志王仲至帥長安日壊一古塜有碧甆器容水一斛中有白玉嬰兒高尺餘水不耗散如新汲者玉嬰兒為仲至取去聞見後録土人掘得雷祥遺器形製古質色緑沉隠秀或微作花墳起以手摩挱復勻潔無凸窪跡白水縣志宋復唯識廨院碑藍田故龍泉寺也有洪集者與姚氏共復之而為之碑書或正或行或草或兼一二筆小篆分𨽻其草又時作渴筆極竒怪遒偉似魯公誠懸而時復出入但記者書者闕其姓名獨刻者張遒姓名無恙賜西岳廟乳香碑正書亦有栁誠懸筆意游師雄墓志張舜民撰書者為邵䶵清圓秀勁大足名家樞宻趙瞻碑瞻盩厔人卒塟城南四里碑仆而泐僅有數十字可辨觀其書法勁健石墨鐫華應夢寺後有石相傳以為殞星必不可動一胡僧見之曰此文星也里諸生祭而掘之遂徙之寺前後里人郭玉柱於東鄉得一石亦曰文星置之星聚書院醴泉縣志朝邑舊治在西原耕者徃徃得瓦缶一人得古鏡其背銘曰買得秦王鏡判不惜千金非關欲照膽持此自明心朝邑縣志澄城鄭某嘉靖間掘得一陶枕製頗工緻中央有刻云天聽寂無聲云云兩旁對云賣酒樓頭風織綾梭畔雨瀟瀟不知何謂吟則康節筆也澄城縣志玉盆在褒城縣北八里水中乃石生成不費斧鑿光潔如玉内有玉盆二大字仍鐫唐詩曰石硜盆琢玉川激水拖藍賈志千金寶要者宋學士郭思按唐孫真人千金方纂要也宣和六年思刻于華州公署明正統八年華州知州劉整重刻予得之珍如拱璧因刻耀州真人洞前云隆慶六年秦王守中識千金寳要序風雅天作周祭岐山配以大王文王之詩申培詩説襄公伐戎初命為秦伯國人榮之賦車轔詩傳蒹葭君子隠於河上秦人慕之而作是詩詩説終南戒襄公也能取周地始為諸侯受顯服大夫美之故作是詩以勸戒之詩小序穆公卒塟雍秦之良臣子輿氏三人從死秦人哀之為作黄鳥之詩史記秦本紀百里奚為秦相作樂所賃澣婦自言知音呼之援琴撫弦而歌曰百里奚五羊皮臨别時烹伏雌炊扊扅今日富貴忘我為因問之乃其妻云事文𩔖聚秦康公母晉獻公女文公遭驪姬之難未反而秦姬卒穆公納文公康公時為太子贈送文公於渭陽念母之不見也我見舅氏如母存焉作渭陽之詩毛詩序襄公十四年夏諸侯之大夫從晉侯伐秦及涇不濟叔向見叔孫穆子穆子賦匏有苦葉叔向退而具舟左傳昭王在隨申包胥如秦乞師立依於庭墻而哭秦哀公為之賦無衣左傳秦始皇陵在驪山北於渭北諸山運取大石故其歌曰運石甘泉口渭水為不流千人一唱萬人相鈎關中記古丈夫者秦時驪山役夫毛女秦宫女並以計得脱入山大中初有陶太白尹子虚者採藥入芙蓉峯遇之一古服儼雅一鬟髻綵衣相與傾壺而飲飲盡古丈夫折松枝叩壺而吟毛女和之曰誰知古是與今非閒躡青霞繞翠㣲簫管秦樓應寂寂彩雲空惹薜蘿衣又毛女正美贈華山遊人詩曰曾折寒枝為寳櫛又編栗葉代羅襦有時却問秦宮事笑撚山花望太虚全唐詩司馬相如為上林子虚賦意思蕭散不復與外事相關控引天地錯綜古今忽然而睡煥然而興幾百日而後成西京雜記漢武始穿昆靈之池泛翔禽之舟自造歌曲使女伶歌之時日已西傾凉風激水女伶歌聲甚遒因賦落葉哀蟬之曲拾遺記昭帝元始元年穿淋池廣千步時命水嬉遊宴以文梓為船木蘭為柂隨風輕漾畢景忘歸使宫人歌曰秋素景兮泛洪波揮􅊏手兮折芰荷凉風凄凄揚棹歌雲光開曙月低河萬歲為樂豈云多帝乃大悦拾遺記漢苑中有栁狀如人號曰人栁一日三起三倒李商隠賦云不比禁中人栁終朝剰得三眠侯鯖録漢傳毅扶風茂陵人永平中於平陵習章句因作廸志詩漢詩評漢時有短簫鐃歌之樂其曲有艾如張上之回戰城南將進酒及魏受命改將進酒為平關中言曹公征馬超定關中也北齊受東魏禪武成帝時漢上之回改名定關隴言神武遣侯莫陳悦誅賀㧞岳定關隴平河外漢北欵秦中附也後周宣帝時改漢艾如張為迎魏帝言魏武西幸太祖奉迎宅關中也改漢戰城南為尅河苑言太祖俘斬齊十萬衆於河苑神武脱身至河單舟走脱也冊府元龜陳安善撫將士及死隴上人思之為作壯士之歌曰隴上壯士有陳安軀幹雖小腹中寛愛養將士同心肝䯀驄文馬鐵鍜鞍七尺大刀奮如湍丈八蛇矛左右盤十盪十決無當前戰始三交失蛇矛棄我䯀驄竄岩幽為我外援而懸頭西流之水東流河一去不還復奈何劉曜聞而嘉傷命樂府歌之通鑑注永興二年四月苻堅如龍門五畤八月自臨晉登龍門至韓原觀晉魏顆鬼結草坑秦軍之處賦詩而歸前秦録苻堅分四帥子弟三千户配長樂公丕鎮鄴親送於㶚上流涕而别趙整援琴而歌曰阿得脂阿得脂博勞舊父是仇綏尾長翼短不能飛逺徙種人留鮮卑一旦緩急語阿誰堅笑而不納十六國春秋陸覬與范蔚宗相善自江南寄梅一枝詣長安與蔚宗因贈以詩云折梅逢驛使寄與隴頭人江南無所有聊贈一枝春桂林記周滅齊以後主歸長安為詩曰龍樓絶行跡鳯闕永無因獨知明月夜遥想鄴城人五代新聞武功縣南唐髙祖故宅貞觀六年幸之賞賜閭里同漢沛宛帝懽甚賦詩命起居郎吕才被之管絃為功成慶善樂賈志京城内金吾曉暝傳呼以戒行者馬周獻章始置街鼓俗號鼕鼕有道人裴翛然戲為渭川歌詞曰遮莫鼕鼕鼓須傾湛湛盃金吾倘借問報道玉山頺大唐新語貞觀中蜀人李義甫八嵗時以神童至京師太宗在上林苑便對有得烏者上賜義甫義甫即時進詩曰日裏颺朝彩琴中伴夜啼上林如許樹不借一枝棲上笑曰朕今以全樹借汝閒居筆記唐元奘禪師往西域房前有松其枝西偃忽一日枝東偃弟子曰師歸矣果然李洞送僧歸南海詩長安却囘日松偃舊房前正用此事全唐詩話慈恩寺與􅅤元殿正相值建塔始置十層後减為七層盧照鄰詩云十層碧瓦揺虚空四十門開面面風畫墁録按二句本章八元詩誤作照鄰大足元年幸京師同州刺史蘇瓌進聖主還京樂舞御行宫樓觀之賜以束帛令編於樂府冊府元龜神龍以來杏園宴後皆於慈恩塔下題名同年中推一善書者紀之他時有將相則朱書之及第後知聞或遇未及第時題名處則為添前字故昔人有詩云曾題名處添前字送出城人乞舊衣摭言唐神龍之際京城正月望日盛飾燈影之㑹金吾弛禁特許夜行王主之家馬上作樂以相誇競文士皆賦詩以紀其事作者數百人惟中書侍郎蘇味道吏部員外郭利貞殿中侍御史崔湜三人為絶唱杜陽雜爼武后遊龍門命羣臣賦詩先成者賞錦袍左史東方虬既拜賜坐未安宋之問詩復成文理兼美左右莫不稱善乃就奪袍衣之隋唐佳話中宗景龍中凡天子饗會游豫宰相及學士得從春幸棃園並渭水祓除則賜細柳圏辟厲夏宴蒲萄園賜朱櫻秋登慈恩浮圖獻菊花酒稱壽冬幸新豐歴白鹿觀上驪山賜浴湯池給香粉蘭澤帝有所感即賦詩學士皆屬和唐書李適傳中宗正月晦日幸昆明池賦詩羣臣應制百餘篇殿前結綵樓命昭容選一篇為新翻御製曲從臣悉集其下須臾紙落如飛各認其名而懷之惟沈宋二詩不下移時一紙飛墜競取而觀乃沈詩也評曰二詩工力悉敵沈詩落句詞氣已竭宋詩云不愁明月盡自有夜珠來猶陡健軒舉全唐詩話景龍中中宗嘗遊興慶池侍宴者逓起歌舞並唱迴波詞方便以求官爵給事中李景伯亦起舞歌曰迴波詞持酒巵㣲臣職在箴規侍宴既過三爵諠譁竊恐非儀于是罷宴大唐新語昆明池漢武所穿中宗朝安樂公主請焉帝不可主不悦因别掘一池號曰定昆池既成中宗往觀令公卿賦詩李黃門日知詩云但願暫使居者逸無使時傳作者勞隋唐佳話開元時李嶠等作桃花詩帝令擇二十篇入樂府謂之桃花行珍珠船元公稹為御史鞫獄梓潼時白尚書在京遊慈恩小酌花下為詩寄元曰花時同醉破春愁醉折花枝當酒籌忽憶故人千里去計程今日到梁州時元果及褒城亦寄夢遊詩曰夢君兄弟曲江頭也向慈恩院裡遊驛吏喚人排馬去勿驚身在古梁州千里神交若合符契本事詩開元中詩人王昌齡髙適王之渙齊名一日共詣旗亭小飲忽有梨園伶官十數人登樓會讌俄有妙伎四輩尋續而至昌齡等私相約曰我輩各擅詩名可宻聽諸伶所謳若詩入歌詞多者為優俄一伶唱曰寒雨連江夜入吴平明送客楚山孤洛陽親友如相問一片氷心在玉壺昌齡引手畫壁曰一絶句尋又一伶謳曰開篋淚霑臆見君前日書夜臺何寂寞猶是子雲居適引手畫壁曰一絶句尋又一伶謳曰奉帚平明金殿開强將團扇共徘徊玉顔不及寒鴉色猶帶昭陽日影來昌齡又引手畫壁曰二絶句之渙自以詩名已久因謂諸人曰此輩潦倒樂官所唱皆巴人下里之詞耳因指諸伎中最佳者曰待此子所唱如非我詩即終身不敢與子爭衡矣須臾次至雙鬟發聲則曰黄河逺上白雲間一片孤城萬仭山羗笛何須怨楊桞春風不度玉門闗之渙即揶揄二子曰田舍奴我豈妄哉因大諧笑諸伶不喻其故皆起詣曰諸郎君何此嗢噱昌齡等話其事諸伶競拜乞俯就筵席三子從之歡醉竟日唐詩紀事開元中禁中初重木芍藥即今牡丹得四本紅紫淺紅通白者移植於興慶池東沉香亭前會花方繁開上乘月夜召太真妃以歩輦從詔特選棃園子弟中尤者得樂十六色李龜年手捧檀板押衆樂前欲歌之上曰賞名花對妃子焉用舊歌詞為遂命李龜年持金花箋宣賜翰林學士李白進清平調詞三章白承㫖猶苦宿酲未解因援筆賦之龜年以詞進上命棃園弟子約畧調撫􅁝竹遂促龜年以歌太真持玻璃七寶杯酌西涼州蒲萄酒笑領歌意唐詩紀事開元時髙太素起商山六舘曰春雪未融舘清夏晚雲舘中秋午月舘冬日方出舘暑簟清風舘夜階急雨舘各製一銘玉壺氷開元中有程脩己者善畫得進謁𤣥宗會莫春内殿牡丹開上問脩己曰今京邑傳唱牡丹詩誰為首出對曰聞公卿間多吟賞中書舍人李正封詩曰國色朝酣酒天香夜染衣上聞之嗟賞移時松忩雜記開元末裴士淹得白牡丹一窠植於長興私第天寶中為都下所賞當時有白給事宅看牡丹詩曰長安年少惜春殘爭認慈恩紫牡丹别有玉盤承露冷無人起就月中看酉陽雜爼予嘗秋日客咸陽寶􅁫樓上漢諸陵在晚照中有歌太白樂遊原詞者一坐悽然而罷邵博聞見後録天寶二年韋堅引滻水抵苑東望春樓下為潭以通江淮運船上幸望春樓觀新潭堅以新船數百艘徧榜郡名各陳縣中珍貨於船頭陜尉崔成甫著錦半臂居前船唱得寶歌曰得寶𢎞農野𢎞農得寶耶潭裡舟船閙揚州銅器多三郎當殿坐聼唱得寶歌使美婦百人盛飾而和之通鑑驪山多飛禽名阿濫堆明皇御玉笛採其聲翻為曲子名播於逺近人競以笛效吹故張祜詩云紅樹蕭蕭閣半開玉皇曾幸此宫來至今風俗驪山下村笛猶吹阿濫堆碧雞漫誌明皇幸蜀初入斜谷霖雨彌日棧道中聞鈴聲帝方悼念貴妃採其聲為雨淋鈴曲以寄恨時棃園弟子惟張野狐一人善箄篥因吹遂傳于世碧雞漫誌長安春時盛於遊賞園林樹木無閒地故學士蘇頲應制云飛埃結紅霧遊葢飄青雲帝覽之加賞焉遂以御花親挿頲巾上時人榮之開天遺事長安民郭行先有女紹蘭適巨商任宗為賈湘中數年音信不逹蘭見雙燕戲於梁間長吁淚下語燕欲慿附書於壻燕子飛鳴上下似有所諾遂飛泊膝上蘭乃吟詩云我壻去重湖臨􅆤泣血書殷勤慿燕翼寄與薄情夫小書其字繫於足上燕遂飛而去時任宗正在荆州忽見一燕飛鳴泊於肩有書繫足上解而視之乃妻所寄也宗感而泣下遂歸出詩示蘭後張説傳其事開天遺事天寶十三載太子賔客賀知章還鄉遣左右相以下祖别於長樂坡上賦詩贈之事文𩔖聚唐崔䕶清明獨遊都城南得村居叩門求飲有女子啟闗以盂水至獨倚小桃柯而屬意殊厚崔䕶爾後絶不復至來嵗清明徑往尋之門庭如故而扄矣因題詩於左扉云去年今日此門中人面桃花相映紅人面至今何處去桃花依舊笑春風後數日復往聞其中哭聲叩門有老父出曰君非崔䕶耶君殺吾女女笄未嫁自去年來常惝惚如有所失比日與之出歸見左扉字入門遂病絶食死崔大感痛請入哭之曰䕶在斯䕶在斯須臾開目半日復活老父大喜以女歸之本事詩鄭廣文學書而病無紙知慈恩寺有柿葉數間屋遂借僧房居止日取紅葉學書嵗久殆徧後自寫所製詩並畫同為一巻封進𤣥宗御筆書其尾曰鄭䖍三絶尚書故實杜子美嘗駐車同官有縣古槐根出官清馬骨髙之句留置壁間同官志李白遊慈恩寺寺僧用水牌刷以吴膠粉捧乞新詩白為題訖僧獻𤣥沙鉢緑英梅檀香筆格蘭縑袴紫瓊霜海墨㣲言髙徳卿詩曰事去君王可奈何荒墳三尺馬嵬坡歸來枉為香囊泣不道生靈淚更多金章宗詔録馬嵬詩得五百餘首付詞臣品第德卿等詩在髙等堅瓠集馬嵬佛堂楊妃縊所邇後才士經過賦詠以道其幽怨不可勝紀皆以翠翹香鈿委於塵泥紅凄碧怨令人傷悲雖調苦詞清無迯此意也丞相鄭畋為鳯翔從事日題詩曰終是聖朝天子事景陽宫井又何人觀者以為真輔國之句闕史唐人詠馬嵬事劉禹錫云官軍誅佞幸天子捨妖姬白樂天詩曰六軍不發爭奈何婉轉蛾眉馬前死豈特不曉文體亦失事君之禮老杜北征詩曰憶昨狼狽初事與古先别姦臣竟葅醢同惡隨蕩析不聞夏商衰中自誅褒妲乃明皇鍳夏商之失畏天悔禍賜妃子死官軍何預焉事文類聚王右丞嘗於清源寺壁畫輞川圖巖岫盤鬱水雲飛動自製詩曰當世謬詞客前身應畫師不能舍餘習偶被時人知圖畫見聞誌唐中宗四年上已袚褉於渭濵賦七言詩賜細柳圏李乂應制詩此日欣逢臨渭賞昔年空道濟汾詞沈佺期詩寶馬香車清渭濵紅桃碧桞褉堂春皇情尚憶垂竿佐天瑞先呈捧劍人景龍文舘記郭曖宴客有婢鏡兒善彈箏姿色絶代李端在坐時竊寓目屬意甚深曖覺之曰李生能以彈箏為題賦詩娱客吾當不惜此女李即席口號曰鳴箏金粟柱素手玉房前欲得周郎顧時時誤拂絃曖大稱善徹席上金玉酒器並以鏡兒贈李釵小志王易簡蕭希甫榜下及第名居榜尾不看榜歸華山尋就山釋褐授華州幕官後拜拾遺又辭歸留詩曰汩没朝叅愧不才誰能低折向塵埃青山得去且歸去官職有來且自來郡閣雅言徳宗九月詔羣臣宴曲江自為詩敕宰相擇文人􅆳和李泌等請羣臣皆和帝自第之以劉太真李紓等為上鮑防于邵等次之張滿等為下與擇者四十一人白孔六帖鄜州東百里有水名相思河傳舍曰相思舖令狐楚詩曰誰把相思號此河塞垣車馬徃來多只應自古征人淚灑向空川作碧波詩話總龜吕渭遷禮部侍郎中書省有古柳建中末枯死徳宗自梁還復榮茂人以為瑞柳渭令貢士賦之白孔六帖平曾謁華州李相不遇吟曰老夫三日門前立珠箔銀屏晝不開詩巻却抛書袋裡譬如閒看華山來摭言長安西端正樹去馬嵬一舍之程乃唐徳宗幸奉天覩其蔽芾錫以美名後有文士經過題詩逆旅曰昔日偏沾雨露榮徳皇西幸賜嘉名馬嵬此去無多地合向楊妃冡上生太平廣記宣陽坊奉慈寺司農少卿楊敬之小女年十三以六韻詩題此寺自稱闗西孔子二十七代孫字徳鄰警句云日月金輪動旃檀碧樹秋塔分鴻雁翅鐘挂鳯皇樓事聞因見勅賜衣酉陽雜爼驪山下逍遥别業葢韋嗣立所建賦詩勒石在焉一夕忽失碑字換墨題云曉星明滅白露㸃秋風落葉故址頹垣冷烟衰草前朝宫闕長安道上行客依舊名利深切改變容顔消磨今古隴頭殘月閑居筆記晉國公裴度討淮西題名於華嶽廟之闕門後司空圖題詩紀之曰嶽前大隊赴淮西從此中原息皷鼙石闕莫教苔蘚上分明認取晉公題摭言賈島字閬仙元和中元白尚輕淺島獨變格入僻雖行坐寢食吟咏不輟嘗跨驢張葢横截天街時秋風正涼黄葉可掃島忽吟曰落葉滿長安求聨句不可得因唐突大京兆劉栖楚被繫一夕而釋之摭言又島在京師一日於驢上得句云鳥宿池邉樹僧敲月下門始欲著推字又欲著敲字引手作推敲勢韓退之權京兆尹車騎方出賈不覺行至三節左右擁至尹前具對所得詩句退之曰敲字佳因為布衣交唐宋遺史貞元末有布衣於長安中遊酒肆吟咏丐酒人以為狂嘗吟云有形皆朽孰不知休吟春景與秋時爭如且醉長安酒榮華零悴總奚為全唐詩許渾寄題商洛王隱士居詩云近逢商洛客知爾住南塘草閣平春水柴門掩夕陽尋蜂收野蜜隨麝拾生香更憶前年别松花滿石床事文𩔖聚李賀以詩歌謁韓吏部吏部時為國子博士分司送客歸極困門人呈巻解帶旋讀之首篇雁門太守行曰黒雲壓城城欲摧甲光向日金鱗開却援帶命邀之唐詩紀事白尚書應舉初至京以詩謁顧著作顧覩姓名熟視白公曰米價方貴居亦弗易乃披巻首篇曰咸陽原上草一嵗一枯榮野火燒不盡春風吹又生即嗟賞曰道得箇語居即易矣幽閒鼓吹白樂天一舉及第詩曰慈恩塔下題名處十七人中最少年時年二十七摭言又樂天及第時贈長安妓阿軟絶句緑水紅蓮一朶新千花萬草無顔色香山集寶厯中楊相嗣復具慶下繼放兩榜大宴新昌里第諸生翼坐元白俱在賦詩唯楊汝士詩後成最佳元白嘆伏汝士醉歸曰我今日壓倒元白其詩警句云文章舊價留鸞掖桃李新隂在鯉庭摭言白樂天楊桞詞云一樹春風萬萬枝嫩於金色軟於絲永豐東角荒園裡盡日無人屬阿誰及宣宗朝樂工唱此詞上問永豐在何處左右具以對因命使取永豐柳兩株於禁中香奩雜録喬彛京兆府解試時有二試官彛日午扣門試官令引入則已醺醉視題曰幽蘭賦彛不肯作遂改渥洼馬賦曰此可矣奮筆斯須而成警句云四蹄曵練翻瀚海之驚瀾一噴生風下湘山之亂葉便欲首送京兆曰喬彛崢嶸甚以解副薦之可也幽閒鼓吹陜州廉使盧渥在舉塲甚有時稱曾于滻水逆旅遇宣宗㣲行意其貴人斂身逥避帝揖與相見乃自稱進士盧渥帝請詩巻䄂之乗驢而去他日對宰臣語及盧渥令主司擢第宰相問渥與主上有何階縁渥乃具陳因由時亦不以為忝北夣𤨏言唐人餞别多唱渭城即王右丞渭城朝雨浥輕塵詩也毎句皆再唱而第一句不叠故曰陽闗三叠白香山詩云相逢且莫推辭醉聼唱陽闗第四聲註云第四聲勸君更進一杯酒也若秋澗集所云就中儘是銷魂處不待聼歌第四聲乃西出陽闗無故人句也堅瓠集曲江亭子幸蜀之後皆燼於兵火惟尚書省亭子存焉進士開讌常寄其間既撤饌則移樂泛舟公卿家傾城縱觀鈿車珠幕櫛比而至摭言杜牧弱冠制䇿登第名振京邑嘗與同年城南逰覽至文公寺有禪僧獨坐問杜姓字以告又云修何業旁人以累㨗誇之顧而笑曰皆不知也杜嘆訝因題詩曰家住城南杜曲傍兩枝仙桂一時芳山僧都未知名姓始覺空門興味長本事詩楊敬之撰華山賦李太尉毎置坐右行坐諷詠北夣𤨏言同州白樓令狐楚作賦刻其上隋唐佳話相國綮善詩或曰相國近為新詩否曰詩思在覇橋風雪中驢子上此何以得之全唐詩話韋莊㓜時常在華州下邽縣僑居多與隣巷諸兒會戲及廣明亂後再經舊里追思往事但有遺跡因賦詩以記之太平廣記唐末羅虯兄弟俱有文名時號三羅虯登科從事坊州有營妓紅兒先為郡將所嬖虯亦悦之郡將不能容虯棄官去然於紅兒猶不忘也擬諸美物作比紅兒詩百首事出摭言邵博聞見後録元稹為御史奉使東川宴於褒城驛竇明府㕔虞鄉黄丞犯令逃去再使東川至褒城驛黄丞餽酒艤舟稹與同酌作詩贈黄曰昔年曾痛飲黄令困飛觥席上當時走馬前今日迎迤邐七盤路坡蛇數丈城花疑褒女笑棧息武侯征一種埋幽石空聞千載名本事詩聶夷中字坦之咸通中為華隂尉體國憂民其詩曰二月賣新絲五月糶新榖醫得眼前瘡剜却心頭肉我願君王心化作光明燭休照綺羅筵只照迯亡屋仁民之情勃不可禦華隂縣志長安南山下書生作小圃蒔花木一日有犢車麗女來飲於庭邀書生同席既去作詩云相思無路莫相思風裡楊花只片時惆悵深閨獨歸處曉鶯啼斷緑楊枝詩婉約可愛全唐詩話僖宗幸蜀有詞人於馬嵬驛題詩云馬嵬烟桞正依依重見鑾輿幸蜀歸泉下阿蠻應有語這囬休更泥楊妃抒情詩崔魯華清宫詩曰障掩金雞蓄禍機翠華西拂蜀雲飛珠簾一閉朝元閣不見人歸見雁歸又曰草遮囬磴絶鳴鑾雲樹深深碧殿寒明月自來還自去更無人倚玉闌干楊太史慎謂此詩精練竒麗逺出李義山杜牧之上鴻書咸陽郭氏殷室也有蒼頭曰捧劍嘗望水眺雲不遵驅策忽題詩一篇曰青鳥銜蒲萄飛上金井欄美人恐驚去不敢巻簾看儒士聞而競勸以為協律之詞其後將竄復留詩曰珍重郭四郎臨行不得别曉漏動離心輕車冐殘雪欲出主人門零涕暗嗚咽萬里隔闗山一心思漢月雲谿友議五代之亂干戈日尋鄭雲隱於華山與羅隱終日怡然對飲有酒詩二十章好事者繪為圖以相貺遺酒譜王仁裕嘗從事漢中巴山有採捕者獻猿兒憐其小而慧􅃛名曰野賔呼之則聲聲應對經年壯盛頗亦為患於是頸上係紅綃一縷題詩曰放爾丁寧復故林舊來行去好追尋月明巫峽堪憐靜路隔巴山莫厭深棲宿免勞青嶂夢躋攀應愜碧雲心三秋果熟松梢健任抱髙枝徹曉吟使人送之孤雲兩角後罷職入蜀行次嶓冡有巨猿於道畔古木之間垂身下顧紅綃彷彿從者曰此野賔也呼之聲聲相應立馬移時不覺惻然遂繼之一篇曰嶓冡祠邊漢水濵此猿連臂下嶙峋漸來子細窺行客認得依稀是野賔月宿免勞覊絏夢松餐非復稻粱身數聲腸斷和雲呌識是前年舊主人王氏見聞長安市中有襤褸道人日入市飲酒問姓名不答詩云酒盡君莫沽壺傾我當發城市多囂塵還山㺯明月消閒清史張乖崖布衣時素善陳摶嘗因夜話謂摶曰某欲分先生華山一半住得無摶曰餘人則不可先輩則可後尹蜀乗傳過華隂寄詩曰性愚不肯林泉住强邀清流擬致君今日星馳劍南去囬頭慚愧華山雲青箱雜記又乖崖自成都召還寄陳摶詩云人世大抵重官榮見我西歸夾路迎應被華山髙士笑天真䘮盡得浮名侯鯖録文正祖唐公有詩贈華山陳希夷王侍郎帥陜嘗刻石傳世逸上一聨云曾逢毛女話何事應見巨靈開此山過庭録常得志京兆人博學善屬文官至秦王記室及王薨過故宫為五言詩辭理悲壯甚為時人所重冊府元龜韓魏公為陜西開府李師中過陜席間命為官妓賈愛卿賦之李曰願得貔貅十萬兵犬戎巢穴一時平歸來不用封侯印只問君王乞愛卿閒居筆記太宗時宋太素自翰苑謫鄜州司馬詩云鄜州軍司馬也好畫為屏又云官為軍司馬身是謫仙人筆記吴昊華州人嘗累舉不第負氣倜儻有縱横材嘗與州人張元薄遊塞上觀覽山川有經畧西鄙意張有鷹詩云有心待搦月中兎更向白雲頭上飛欲謁韓范二帥耻自屈乃刻詩石上使人拽之市而笑其後姚嗣宗者亦闗中人與張吴相友善題詩崆峒寺云南粤干戈未息肩五原金皷又轟天崆峒山叟渾無語飽聼松聲春晝眠范文正公廵邊見之大驚又有踏破賀蘭石掃清西海塵大開雙白眼只見一青天之句後不知所之清夜録欲掛衣冠神武門先尋水竹渭南村卻將舊斬樓蘭劍買得黄牛教子孫余舊見此詩於闗右壁間愛之不知何人詩也東坡題䟦嗣按此亦闗中姚宗詩李挺之之才慶厯中韓中令宣撫河東委以秦鳯鑄鐵錢事行次鳯州為絶句云去年三月洛城逰今日尋春到鳯州欲托雙魚附歸信嘉陵江水不東流西溪叢話曾子宣丞相元豐間帥慶州未至召還至陜府復還慶州往來潼闗夫人魏氏乃作詩戲丞相云使君自為君恩厚不是區區愛華山老學庵筆記冦萊公典陜日與魏野同逰僧寺萊公舊日留題處皆用碧紗籠之野詩則塵䝉其上時從行官妓之黠慧者以紅䄂拂之野顧萊公笑詠曰世情冷暖由分别何必區區較異同但得常將紅䄂拂也應勝似碧紗籠堅瓠集蜀楊尚書玢致政歸長安舊居為人侵占子弟欲白於官以白玢玢批紙尾云四隣侵我我從伊畢竟須思未有時試上含元殿基望秋風秋草正離離厚徳録長安北禪寺石笋鄭天休資政題十字云春到不擇地石旁花自開刋之侯鯖録惠崇逰長安詩有人逰曲江少草入未央深之句江隣幾雜志邵伯温子文為陜西宣撫司書寫機宜文字與路鈐李君交往甚熟後十餘年子文與李氏邂逅長安而李君已殁適值其妻生辰命子姪宴子文於書舍遣舊婢出舞子文感愴宿昔即席作詞云翻翻繡袖上紅裀舞姬猶是舊精神坐中莫怪無歡意我與將軍是故人諸子得之入呈其母皆感泣不自勝過庭録華州以華山得名城中乃不見華山而同州見之故華人毎曰世間多少不平事却被同州看華山張芸叟守同嘗用此語云我到左馮今一月何曾得見好孱顔葢同州亦登髙乃見之爾老學庵筆記景祐末元昊叛夏鄭公出鎮長安梅聖俞送詩云亞夫金鼓從天落韓信旌旗背水陳時獨刻公詩於石劉貢父詩話黄子思云余嘗守咸陽縣廨後臨渭河汀嶼中連嵗秋有孤雁棲於葭葦中今嵗冬深不復至矣感而為詩題亭壁云天寒霜落雁來棲嵗晚川空雁不歸江海一身多少事清風明月我沾衣侯鯖録宋髙宗養鸚鵡數百一日問之曰思鄉否鸚鵡曰思鄉遂遣還隴山後數年有使臣過隴山鸚鵡問曰上皇安否使臣曰已崩矣皆悲鳴不已使臣賦詩曰隴口山深草木荒行人到此斷肝腸耳邊不忍聼鸚鵡猶在枝頭説上皇閒居筆記華隂道有宗澤石刻詩二首一云菅茅作屋幾家居雲碓風帘路不紆坡側杏花溪畔柳分眀摩詰輞川圖鴻書麻仲英有俊才七嵗能詩隨侍官鄜州宋翰林白方謪官鄜聞而召之坐賦詩十篇宋大稱賞翌日宋以浣溪牋李庭珪墨諸葛氏筆遺之乃贈以詩曰宣毫歙墨川牋紙寄與麻家小秀才七嵗能吟天骨異前生應析桂枝來渑水燕談録种放别業在終南山性嗜酒躬耕種􅐕以自釀所居有林泉之勝尤為幽絶真宗聞之遣中使擕畫工圖之放詩云幽居帝畫看渑水燕談録長安有妓女曹文姬尤工翰墨為闗中第一號為書仙有任生者投之詩曰玉皇前殿掌書仙一染凡心謪九天莫怪濃香薰骨麗雲衣曾惹御爐烟麗情集鳯州當秦蜀之衝以柳手酒三絶名世風塵一起號為邊鄙者四十年淳熈初太守傳子平為詩於壁云珍珠不見小槽紅遐想柔荑嫩剥葱惟有萬條羅帶緑年年依舊舞春風舊鳯州志潘逍遥嘗至陜觀華山留題云髙愛三峰挿太虛昻頭吟望倒騎驢傍人大笑從他笑終擬全家向上居時魏仲先居陜有贈逍遥詩云從此華山圖籍上更添潘閬倒騎驢都穆南濠詩話彭公永福州人紹興間登第次子演嘗宿甘泉店因閒歩至一官舍梁上有紅絲羯鼓縚數條垂於地一老人杖而守之曰此開元興慶宫也二百年中至此者十二人皆有留題請書一絶演即題云長安宫闕半蓬蒿塵暗虹梁羯鼓縚惟有水天明月夜一條空碧見秋毫尚友録樂天絶句作眼前景語往往入妙如上得藍輿未能去春風敷水店門前似出率易而風趣非雕琢所及予過其地憶白詩亦為之流連不發香祖筆記臨潼縣華清宫朝元閣題詠甚多惟陳文惠公二韻尤為絶唱曰朝元髙閣逈秋毫無隱情浮雲忽以蔽不見漁陽城青箱雜記王履字安道崑山人洪武十六年秋七月游華山作圖四十幅記四篇詩一百五十首自有華山以來游而能圖圖而能記記而能詩窮覽太華之勝古今一人而已列朝詩集朱進父先生詩中獨好少陵先後與王京兆子臯秦太僕仲受康明府子秀張布衣致卿等結社吟咏闗中風雅寖昌無何有青藜社諸王孫詩益著先生季弟季量從子子斗皆工詩子仲宗叔信季通皆能世其家學來陽伯文集李開先奉使銀夏訪康徳涵王敬夫於武功鄠社之間賦詩度曲引滿稱壽二公恨相見晚作塞上曲一百首又通集古人塞上詩為一編列朝詩集三原王承裕七嵗作屋隙詩曰風來桌上響月到枕邊明見聞録燃藜集所載雙烈詩云一為涇陽劉澤􅄎妻李氏一為三原馬建徳妻秦氏天上有明月清光常皎潔巖下有蒼松不畏繁霜烈闗輔有完人志氣傲氷雪歸劉才一旬長途遇盗竊白刅甘如飴紅顔冷於鐵避冦平古鄉荒村騰餘孽全身歸馬門崩崖灑腔血天上月雖明弦望有盈缺巖下松亦青精氣有銷歇何如二完人千秋存大節又為李可貞妻王氏作池陽節孝詩云氏上有衰翁艱難茹薇蕨氏下無兒孫一身獨孤孑操作奉晨昏食飲得無闕終年未亡人既孝而復節北風驚破帷茫茫泣秋月遺聞録蘇生紫授邠州刺史時上郡劉石生避難居邠之公劉崖刺史行部至崖於壁上得石生公劉墓詩四首大驚援土人往候其門石生善言九經所為詩歌宏放有西京之遺受祺堂文集明韓令左懋第將去韓徘徊太史公墓上愴然曰山川俱有離别之色因賦詩有云海涯此後深相憶藜色和烟身裏看韓城縣志康徳涵既免以山水聲妓自娱間作樂府小令使二青衣被之絃索歌以侑觴西登吴嶽北陟九􅉄南訪經䑓紫閣東躡太華歌其所製之詞飄然欲仙嘗生日邀名妓百人為百年會酒闌各書小令一闋命送諸王邸曰此差勝錦纒頭也列朝詩集顧大猷江都人嘗逰秦中賦詩弔古訪問康王遺妓召置坐中青衫白髪歌殘曲道故事風流慷慨長安少年至今傳之列朝詩集孫太初年十八入終南繼入太白山嚼草木居息大石厓上時有所得赤脚散髪走最髙峰持古松根叩巨竒石以歌山棲志郃陽明有悟旻髙僧也善詩有句云啼鳥歇時山寂寂野花開處月蒼蒼郃陽縣志正徳初闗中盛傳朝議欲起三原王端毅公秦左史汝南强景明上詩有云八十耆年一品官歸來清節雪霜寒又云三公事業三槐傳留取完名久逺看讀書鏡渭城蕭登榮備衛秦藩請平流冦屢歴艱苦王嘉之有云義在豈辭寒夜雪賊存何意故園春其孫𢎞士復輕財敦義一時名士競為詩歌以美之録其一不愧人間七尺男千家烟火待分甘朝來厨下無餘粒且向隴頭問耐菴耐菴𢎞士號也遺聞録羽仙不知何許神女降韓城解公孫某樓上善詞賦傾刻立就行草尤雄秀其詩云萬叠芙蓉列翠屛曉聞杰閣誦元經振衣直上凌霄漢倚劔平臨壓斗星風引簫聲來碧落雲連海氣散青㝠仙盤乞得蓮花露天半飄飄共御泠韓城縣志澄城孫嘉士閉户讀書夜半忽聞人語云天有五星兮晦明不一地有五嶽兮髙卑不齊草木兮夭喬鳥獸兮走飛人生造化兮一定而不可移開户視之惟有山谷泬㵳凉風響答而已澄城縣志府谷李玉衡國瑾為國學典簿日取國學經史板摩挱讀之手𤓰盡黑久而淹貫為世名儒著有石花魚賦甚佳筠廊偶筆閒適秦后子有寵於桓其母曰弗去懼選出奔晉后子享晉侯造舟於河十里舍車自雍及絳歸取酬幣終事八反左傳秦始皇置離宫延曼三百里各宫皆有鐘鼓帷幔美人於其中而不移有經年不識天子者此離宫之始也鴻書文帝居覇陵北臨厠指新豐路示慎夫人曰此走邯鄲道也因使慎夫人鼓瑟上自倚瑟而歌史記張釋之傳漢武帝乗鬱金楫泛積翠池自吹縹玉笛珍珠船武帝嘗以吸花絲錦賜麗娟命作舞衣春暮宴於花下舞時故以袖拂落花滿身舞態愈媚謂之百花舞五陵效之花寮小史昆明池中有戈船樓船各數百艘樓船上建樓櫓戈船上建戈矛四角悉垂幡旄旍葆麾葢照灼涯涘又有豫章船一艘載千人酉陽雜爼上林苑中廣長三百里天子春秋獵射苑中取禽無數其中離宫七十所容千乗萬騎漢舊儀薛宣為左馮翊日至休吏賊曹掾張扶獨不肯休坐曹治事宣出教曰義禮貴和人道尚通日至吏以令休所由來久掾宜從衆扶慚冊府元龜韓嫣好彈嘗以金為丸所失日有十餘長安語曰苦饑寒逐金丸京師兒童毎聞嫣出彈輙隨之望丸之所落拾焉西京雜記長安五陵人柘木為彈真珠為丸以彈鵲鳥西京雜記成帝河平二年悉封舅大將軍王鳯庶弟譚等五人同日封故世謂之五侯爭為奢侈百姓歌之曰五侯初起曲陽最怒壞絶髙都長安里名竟連外杜土山漸䑓西象白虎漢書王商傳敞為京兆無威儀時罷朝會遇走馬章䑓街使御史驅自以便面拊馬又為婦畫眉長安中傳張京兆眉嫵漢書張敞傳哀帝為董賢起大第於北闕下重五殿洞六門柱壁皆畫雲氣華蘤山靈水怪或衣以綈綿或飾以金玉南門三重署曰南中門南便門南上門東西各三門隨方面題署亦如之樓閣䑓榭轉相連注山池玩好窮極雕麗茂陵少年李亨好馳駿狗逐狡獸或以鷹鷂逐雉兎皆為之佳名楊萬年有猛犬名青駮買之百金茂陵富人袁廣漢藏鏹巨萬家僮八九百人於北邙山下築園東西四里南北五里激流水注其内搆石為山連延數里養白鸚鵡紫鴛鴦氂牛青兕竒獸怪禽委積其間積沙為洲嶼激水為波潮其中致江鷗海鶴孕雛産鷇延蔓林池竒樹異草靡不俱植屋皆徘徊連屬重閣脩廊行之移晷不能遍也後沒為宫園鳥獸草木皆移置上林苑中按北邙山在今興平茂陵文固陽善馴野雉為媒用以射雉毎以春月為茅障以自翳用觟矢射之日連百數茂陵輕薄者化之皆以雜寶錯厠翳障以青州蘆葦為弩矢輕騎妖服追隨於路以為歡娱西京雜記韋師錫世為韋曲人逺祖夐後周時居此蕭然自適與族人處元等為放逸之友時人慕其閒素號為逍遥公明帝貽之詩曰香動秋蘭佩風飄蓮葉衣逰城南注周天元行幸同州增候正前驅戒道為三百六十重自應門至於赤岸澤數十里間幡旗相蔽音樂俱作又令虎賁持鈒馬上稱警蹕改同州宫為天成宫庚子至自同州詔天䑓侍衛之官皆着五色及紅紫緑衣以雜色為縁名曰品色衣周書宣帝紀後周金州李遷哲累世雄豪為鄉里所率服性復華侈能厚自奉養妾媵至有百數男女六十九人縁漢千餘里間第宅相次姬人之有子者分處其中各有僮僕閹宦守之遷哲毎鳴笳導從往來其間縱酒讌飲盡生平之樂子孫叅見或忘其年名者披簿以審之周書李遷哲傳李客師衛國公靖季弟也少任俠以馳射為事貞觀初拜右武衛將軍年老致仕退居昆明之别業四時從禽無暫休息京城并南山至灃水鳥獸皆識之毎出則鳥鵲之𩔖千萬為羣随逐噪之時臨昆明池鳬雁亦皆散去冊府元龜太宗酷好法書有大王真蹟三千六百紙率以一丈二尺為一軸寶惜者獨蘭亭為最一日附耳語髙宗曰吾千秋萬嵗後與吾蘭亭將去也及奉諱之日用玉匣貯之藏於昭陵尚書故實西京懷徳坊南門之東有鄒鳯熾家巨富家男女婢僕錦衣玉食服用器物皆一時驚異嘗因嫁女邀請朝士往臨禮席賔客數十夜擬供帳偹極華麗及女郎將出侍婢圍繞綺羅珠翠垂釵曵履尤艶麗者至數百人衆皆愕然不知誰是新婦矣獨異志初則天世長安城東隅民王純家井溢浸成大池數十頃號隆慶池相王子五王列第於其北望氣者言常鬱鬱有帝王氣比日尤盛上幸隆慶池結綵為樓宴侍臣泛舟戲象以厭之通鑑天授二年臘卿相等詐稱上苑花開請幸武則天許之乃遣使宣詔曰明朝逰上苑火急報春知花須連夜發莫待曉風吹於是凌晨名花瑞草咸發羣臣咸服其異焉卓異記韋嗣立營搆别業於驪山鳯凰原鸚鵡谷有重崖洞壑飛流瀑水中宗幸焉封嗣立逍遥公名其所居曰清虛原幽棲谷長安志唐中宗好擊毬由是風俗相尚駙馬武崇訓楊慎交灑油以築毬塲通鑑崇寧坊西南隅長寧公主宅盛加雕飾朱樓綺閣一時絶勝又有山池别院山谷虧蔽勢若自然中宗及韋后數遊此第流連彌日賦詩飲宴韋氏敗公主隨夫為外官遂奏為觀詞人名士竟入遊賞西京記景龍四年八日立春上令侍臣迎春内出彩花樹人賜一枚令學士賦詩文昌雜記樂逰園漢宣帝所立唐太平公主於原上置亭遊賞其地四望寛敞毎三月上巳九月重陽士女遊戲就此祓禊登髙幄幕雲布車馬填塞綺羅耀日馨香滿路朝士詞人賦詩翼日傳於京師西京記𤣥宗自臨淄郡王為潞州别駕乞歸京師會春暮豪家數輩盛酒饌遊於昆明池上戎服臂鷹直突會前諸子軰頗有難色忽一少年持酒船唱令曰宜以門族官品備陳之酒及於上上大聲曰曾祖天子父相王某臨淄郡王也諸少年聞之驚走上因連飲三銀船徐乘馬去松忩雜記景雲元年上御梨園毬塲命文武三品以上抛毬及分朋㧞河韋巨源唐休璟衰老隨絙踣地久之不能興上及皇后妃主臨觀大笑通鑑睿宗御安福門外作燈輪髙二十丈衣以錦綺飾以金銀燃燈五萬盞望之如花樹宫女千數耀珠翠施香粉又妙簡長安女千餘人衣服花釵稱是於燈輪下踏歌三日朝野僉載開元二年九月宴京師耆老於含元殿賜九十以上几杖八十鳩杖婦人亦如之賜於其家白孔六帖開元二十三年正月御五鳯樓錫宴命三百里内刺史縣令帥所部音樂集於樓下各較勝負開天遺事洛人宋單父能種藝術凡牡丹變易千種紅白間色上皇召至驪山植花萬本色様不同賜金千餘兩内人呼為花師龍城録上於華清宫新廣一湯制度宏麗安禄山以白玉為魚龍鳬雁仍以石梁及石蓮花以獻雕鐫巧妙殆非人工上命陳於湯中至解衣將入而魚龍鳬雁皆若奮鱗舉翼狀欲飛動上遽命撤去蓮花今猶存明皇雜記天寶初寧王日侍好聲樂風流藴藉諸王弗如也至春時於後園中紉紅絲為繩宻綴金鈴繫於花梢每有烏鵲翔集則令園吏掣鈴索以驚之葢惜花之故也諸宫皆效之開天遺事申王毎醉即使宫婢將錦綵結一兠令宫妓輩擡舁歸寢宫本宫呼曰醉輿毎至冬月風雪苦寒之際使宫婢宻圍於坐以禦寒氣自呼為妓圍開天遺事楊國忠於冬月常選婢妾肥大者行列於前令遮風謂之肉障以炭屑用蜜揑塑成雙鳯冬月則燃於爐中先以白檀木鋪於底毎至伏日取堅氷令工人鏤為鳯獸之形或飾以金鐶綵帶置之雕盤中令送與王公大臣開天遺事楊國忠既遥領劍南毎十月帝幸華清宫五宅車騎皆從家别為隊隊一色俄五家隊合爛若萬花川谷成錦國忠導以劔南旌節遺鈿墮舄狼藉于道香聞數十里貴妃外傳明皇時楊國忠賜第京師其子弟春時移名花植木檻中下設輪脚輓以綵絙所至自隨號移春檻花寮小史王維居輞川宅宇既廣山林亦逺而性好温潔地不容浮塵日有十數掃除者使兩童專掌縳帚而有時不給洛陽要記王維為尚書右丞於藍田南輞口置别業引輞水激流於草堂之下漲深潭於竹中浮輕舟遶溪洞彈琴朗詠嘗飯十數名僧以𤣥談為樂室中惟有茶鐺藥臼經案䋲床而已維退朝之後嘗焚香獨坐三十年孤居一室便絶塵累冊府元龜學士許慎選放曠不拘小節多與親友結宴於花圃中未嘗具帷幄設坐具使僮僕輩聚落花鋪於坐下慎選曰吾自有花裀何消坐具開天遺事唐宫中毎至秋時妃妾以金籠閉蟋蟀寘枕函畔夜聼其聲長安庶民之家皆效之開天遺事鬭蛩之戲始於天寳間長安富人鏤象牙為籠而畜之萬金之資付之一喙負暄雜録唐人逰賞曲江莫盛於中和上已節故杜少陵有麗人行事文類聚曲江池本秦時隑州唐開元中疏鑿為勝境南即紫雲樓芙蓉苑西即杏園慈恩寺花卉環周烟水明媚都人逰賞盛於中和上已節即錫宴臣寮會於山亭賜太常教坊樂池備綵舟唯宰相三使北省官翰林學士預焉傾動皇州以為盛觀松忩雜記長安毎嵗諸陵寒食薦餳粥雞毬等又薦雷子車至清明尚食内園官小兒於殿前鑚火先得火者進上賜絹三疋金椀一口都人並在延興門看内人出城灑掃車馬喧閙新進士則於月燈閣置打毬之宴或賜宰臣以下酴醿酒即重釀酒也輦下嵗時記曲江大會先牒教坊請奏上御紫雲樓垂簾觀焉時或擬作樂則為之移日勅下後人置皮袋例以圖障酒器錢帛入其中逢花即飲曲江春逰録右教坊在光宅坊左教坊在延政坊右多善歌左多工舞教坊記唐進士杏花園初會謂之探花宴擇少俊二人為探花使徧逰名園若他人先折得花二人皆受罰摭言韋綬為集賢院學士九月九宴羣臣曲江綬請集賢院學士得别一會帝從之唐書韋綬傳長安進士鄭愚劉參等十數輩毎春時選妓三五人乘小犢車詣名園曲沼藉草躶形去其巾㡌呌笑喧呼謂之顛飲開天遺事長安富家子劉逸李閑衛曠家世巨豪而好接待四方之士毎暑伏中各於林亭内植畫柱以錦綺結為涼棚設坐具召長安名妓間坐逓相延請為避暑之會時人無不愛羡開天遺事長安有平康坊妓女所居之地京都俠少萃集於此兼毎年新進士以紅箋名紙遊謁其中時人謂此坊為風流藪澤開天遺事曲江池入夏則菰蒲葱翠柳隂四合碧波紅蕖湛然可愛好事者賞芳辰玩清景聨騎擕觴亹亹不絶劇談録長安自昭應縣至都門官道左右村店民當大路市酒量錢數多少飲之亦有好施者與行人解乏號為歇馬杯開天遺事長安貴家子弟毎至春時逰宴供帳於園圃中隨行載以油幕或遇隂雨以幕覆之盡歡而歸開天遺事曲江貴家遊賞則剪百花裝成師子互相送遺師有小連環欲送則以蜀錦流蘇牽之唱曰春光且莫去留與醉人看曲江春宴録霍定與友生遊曲江以千金求人竊貴侯亭榭中蘭花挿㡌兼自持往綺羅叢中賣之士女争買抛擲金錢曲江春宴録長安富民王元寶楊崇義郭萬金等國中巨豪也各以延納四方多士競於供送毎科塲文士集於數家時人目之為豪友元寶毎至冬月大雪之際令僕夫自本家坊巷口掃雪為逕路躬親立於坊巷前迎揖賔客就本家具酒炙宴樂之為暖寒之會又嘗以金銀疊為屋壁上以紅泥泥之於宅中置一禮賢堂以沉檀為軒檻以碔砆甃地面以錦文石為柱礎又以銅線穿錢於後園花徑中貴其泥雨不滑也常於寢帳床前雕矮童二人捧七寶博山爐自暝焚香徹曉其驕貴如此開天遺事王元寶起髙閣以銀鏤三稜屏風代籬落宻置香槽自花鏤中出號􅅤薰閣清異録貟半千莊在焦戴川北枕白鹿原蓮塘竹逕酴醿架海棠洞㑹景堂花塢藥畦碾磨麻稻諺曰上有天堂下有貟莊樹萱録唐京省入伏假三日一開印公卿近郭皆有園池以至樊杜數十里間泉石占勝布滿川陸至今基地尚在省寺皆有山池曲江各置船舫以擬嵗時遊賞諸司農寺山池為最船惟户部為最畫墁録逸人王休居太白山毎至冬時取溪氷敲其精瑩者煮建茗共客飲之開天遺事大厯中張紅紅與其父歌於衢路丐食過將軍韋青所居青聞其喉音寥亮即納為姬有樂工自撰歌即古長命西河女也加减節奏頗有新聲侑歌於青青召紅紅於屛風後聽之歌罷青入問紅紅如何云已得矣青出云有女弟子久會歌此非新曲也即令隔屏風歌之一聲不失樂工大驚異遂請相見欽伏不已尋逹上聼翊日召入宜春院樂府雜録唐尹氏女性識敏慧善歌因重陽與羣女戲登南山文峰同輩命之歌乃顰眉緩頰怡然一曲聲逹數十里故耆舊云尹氏之歌聞於長安野史徳宗非時召拜吴湊為京兆尹便令赴上湊疾驅諸客至府已列筵矣或問曰何速吏曰兩市日有禮席舉鐺釡而取之故三五百人饌常可立辦國史補唐貞元中有乞者解如海其手自墮足自脛而脱善擊毬樗蒲戲又善劔舞丹丸挾二妻生子數人至元和末猶在長安戲塲中日集數千人觀之獨異志舊史稱杜佑城南樊川有桂林亭卉木幽䆳佑日與公卿宴集其間元和七年佑以太保致仕居此牧之之賦亦曰予之思歸兮走杜陵之西道巖曲泉深地平木老隴雲秦樹風髙霜早周䑓漢園斜陽衰草遊城南注崔斯立為藍田縣丞庭有老槐四行南墻鉅竹千梃水㶁㶁循除鳴斯立痛掃溉對樹二松日哦其間韓愈藍田縣丞㕔筆記長安貴遊尚牡丹三十餘年矣毎春莫車馬若狂以不就翫為耻元和末韓令公至長安私第有之遽命斸去曰吾豈效兒女也國史補唐柳宗元與劉禹錫同年及第題名於慈恩塔談元茂秉筆慈恩題名起自張莒本於寺中閒逰而題其同年人因為故事豪話録唐雁塔題名石刻凡留題姓名僧道士庶前後不一非止新進士也䑕璞文宗太和九年二月發神䇿軍一千五百人脩掏曲江如諸司有力要于曲江置亭館者給與閒地七月勅造紫雲樓綵霞亭於曲江芙蓉園北上好為詩毎誦杜甫曲江行云江頭宫殿鎻千門細柳新蒲為誰緑乃知天寶以前曲江四岸皆有行宫䑓殿有司廨署思復昇平故事故為樓殿以壯之舊紀會要文宗朝有内人鄭中丞善胡琹中丞即宫官也内庫二琵琶號大小忽雷鄭嘗彈小忽雷偶以匙頭脱送崇仁坊南趙家脩理時梁厚本有别墅在昭應西臨河岸忽見一物浮過長五六尺許上以錦綺纒之令家僮接得即秘器也發視乃一女郎粧餙儼然以羅領巾繫其頸解領巾伺之口鼻有餘息即移入室中經旬乃能言云是内弟子鄭中丞昨以忤㫖縊殺投於河中遂垂泣感謝厚本即納為妻因言其藝及所彈琵琶今在南趙家厚本賂樂匠購得之毎至夜分方敢輕彈後遇良夜飲於花下酒酣不覺朗彈數曲洎有黄門放鷂子私於墻下聼之曰此鄭中丞琵琶聲也翊日逹上聼文宗方追悔至是驚喜即命宣召乃赦厚本罪仍加錫賜焉樂府雜録李徳裕宅在安邑坊嘗邀朝士宴語時畏景赫曦及列坐開樽煩暑都盡良久覺清颷爽氣凛若髙秋及出户則烈日焦灼問之此日以金盆貯水漬白龍皮置於座末劇談録大中元年正月敕自今放進士榜後杏園任依舊宴集所司不得禁制冊府元龜咸通中同昌公主大㑹韋氏族於廣化里暑氣將盛公主命取澄水帛以水醮之掛於南軒良久滿座皆思挾纊澄水帛長八九尺似布而細明薄可見其中有龍涎故能消暑也韋氏諸家好為葉子戯夜則公主以紅琉璃盛夜光珠捧立堂中光明如晝焉公主有疾召術士米實為法燈乃以香蠟燭遺之燭方二寸上被五色文巻而爇之竟夕不盡郁烈之氣可聞於百歩餘烟出其上即成樓閣殿䑓之狀或云蠟中有蜃脂故也杜陽新編乾符四年新進士曲江春讌有温定者久困塲籍坦率自恣至其日䝉衣肩與金翠之飾夐出於衆侍婢皆稱是徘徊於柳隂之下俄頃諸公自露棚移樂登鷁首既而謂是豪貴其中姝麗必矣因遣促舟而進莫不注視或肆調謔定乃於簾間垂足膝脛極偉而長毳衆忽覩之皆掩袂廽舟避之或曰此必温定也摭言京輦自黄巢退後脩葺殘毁時定州王氏俗號王酒胡居於上都巨富納錢三十萬貫助脩朱雀門僖宗詔令重脩安國寺畢親降車輦乃扣新鐘十撞捨錢一萬貫曰有能捨一千貫者即撻一搥王酒胡逕上鐘樓連打一百下便於西市運錢十萬入寺中朝故事宋真宗祀汾隂還駐蹕華隂因登亭望蓮花峰忽憶种放居是山亟令中貴人裴愈召之時放稱疾不應召上笑而止因問愈曰放在家何為愈對曰臣到放所居時會放在草㕔中看畫水牛二軸上顧謂侍臣曰此髙尚之士也畫圖見聞志王元沖欲登蓮花峰約寺僧到峰頂當起烟為信翌日僧候至午果有烟起留二旬乃下僧問之云峰頂有池蓞菡盛開可愛其中又有破鐵舟焉山棲志嘉祐九年蘇軾逰盩厔南溪醉後解衣濯足因咏韓公山石之篇忘其在百里之外盩厔縣志又盩厔有玉女洞飛泉甘冽蘇子瞻過此汲兩瓶去恐後復取為從者所紿乃破竹作劵使寺僧藏之以為往來之信戯曰調水符書蕉吕大忠大臨嘉祐間因汲公為澄城令相與至縣尋春匱谷酌惰公泉題名石壁至今為邑人所重同州志華隂楊褒好古博物家雖貧尤好書畫竒玩家姬數人布裙糲食而歌舞絶妙燕談録池陽楊爾恪庵居䟽食不與世相聞吟咏之外略無餘事遺聞録石安蕭𢎞略好讀書暇則灌園治蔬嘯咏渭上性孝友毎愛誦兄弟同居忍便安之詩以風鄉里遺聞録康徳涵王敬夫同里同居同放逐沜東鄠杜之間相與過從談讌徴歌以相娱樂敬夫將填詞以厚貲募國工杜門學按琵琶三絃習諸曲盡其技而後出之徳涵尤妙於歌彈酒酣搊彈按歌更起為壽老樂工擊節自謂弗如列朝詩集語林齊景公問孔子曰昔秦穆公國小處僻其覇何也對曰秦國雖小其志大處雖僻行中正身舉五羖爵之大夫起累紲之中與語三日授之政以此取士雖王可也其覇小矣孔子家語羊客問子思曰古之帝王中分天下使二公治之謂之二伯周自后稷封為王者後子孫據國至太王王季文王此固為諸侯矣焉得為西伯乎子思曰吾聞諸子夏殷王帝乙之時王季以功九命作伯受珪瓉秬鬯之賜故文王因之得專征伐此以諸侯為伯猶周召之以君為伯也孔叢子樗里子多智號智囊諺曰力則任鄙智則樗里水經注楚國龔舍初隨楚王朝宿未央宫見赤蜘蛛四面縈羅網有蟲觸之退而不能出舍乃嘆曰吾生亦如是耳仕宦人之羅網也豈可淹嵗於是掛冠而退金樓子史記渭川千畆竹其人與萬户侯等李頎望秦川詩秋聲萬户竹正用此意全唐詩話樓䕶谷永俱為五侯上客長安號云谷子雲筆札樓君卿喉舌西京雜記蔣栩歸杜陵荆棘塞門終身不出時人諺曰楚國二龔不如杜陵蔣翁􅄞康髙士傳闗東鄙語云人聞長安樂出門向西笑侯鯖録成帝時王吉為京兆尹先是京兆有趙廣漢張敞王章王尊至駿皆有能名故京師稱曰前有趙張後有三王漢書王吉傳楊震明經博覽無不窮究諸儒為之語曰闗西孔子楊伯起東觀漢紀更始𦵏覇陵更始尚書僕射鮑永歸世祖累遷司𨽻校尉行縣經更始墓遂下拜哭盡哀而去帝問公卿大中大夫張湛曰仁者行之宗忠者義之主也仁不遺舊忠不忘君行之髙者帝乃釋水經注馬援轉遊隴漢間常謂賔客曰丈夫為志窮當益堅老當益壯因處田處牧至有牛馬羊數千頭榖萬斛冊府元龜杜林字伯山與馬援同鄉里素相親厚援從南方還林馬適死援令子持馬一匹遺林曰朋友有車馬之饋可具以偹乏林受之居數月林遣子奉書曰將軍内施九族外有賔客望恩者多林父子兩人食列卿禄嘗有盈今送錢五萬援受之謂子曰人當以此為法是杜伯山所以勝我也林位司空冊府元龜馬援為人明晳鬚髪眉目如畫閑於進退尤善述前事毎言及三輔長者至閭里少年皆可觀聼皇太子諸王聞者莫不屬耳忘倦冊府元龜趙岐娶扶風馬敦女宗姜敦兄子融外戚豪家岐嘗鄙之與其友書曰馬季常雖有名當世而不持士節三輔髙士未曾以衣􅅂拂其門冊府元龜趙温子柔為京兆郡丞歎曰大丈夫當為雄飛焉能雌伏遂棄官而去東觀漢記張湛為左馮翊後告歸平陵望寺門而歩主簿進曰明府位尊徳重不宜自輕湛曰禮下公門式路馬孔子于鄉黨恂恂如也父母之國所宜盡禮何謂輕哉冊府元龜陳遵張竦俱免官歸長安遵嘗謂竦曰足下諷誦經書苦身自約不敢差跌而我放意自恣浮湛俗間官爵功名不减於子而差獨樂顧不優耶竦曰人各有性長短自裁子欲為我亦不能吾而效子亦敗矣雖然學我者易持效子者難將吾常道也漢書游俠傳樂廣少與𢎞農楊準相善準之二子曰喬曰髦皆知名於世準使先詣裴頠頠性𢎞方愛喬有髙韻謂準曰喬當及卿髦少减也又使詣廣廣性清淳愛髦有神檢謂準曰喬自及卿然髦亦清出準笑曰我二兒之優劣乃裴樂之優劣也晉書樂廣傳韋夐髙尚不仕時兄孝寛為延州總管夐至州與孝寛相見將還孝寛以所乘馬及轡勒與夐夐笑謂孝寛曰昔人不棄遺簮墜履者惡與之同出不與同歸吾之􅍾行雖不逮前烈然捨舊録新亦非吾志也乃乘舊馬以歸冊府元龜摯瞻曾作四郡太守大將軍户曹叅軍復出作内史摯氏世本曰瞻京兆人父育凉州刺史瞻善屬文起家著作郎中朝亂依王敦為户曹參軍厯安豐新蔡西陽太守年始二十九嘗别王敦敦謂瞻曰卿年未三十已為萬石亦太蚤瞻曰方於將軍少為太蚤比之甘羅已為太老世説新語韋誕書如龍威虎振劍㧞弩張張伯英書如漢武帝愛道馮虛欲仙袁昻古今書評李冏厯位度支尚書太和二十一年孝文幸長安問以咸陽山河險固秦漢舊都勸帝去洛陽都之後孝文引見冏笑謂曰昔婁敬一説漢祖即日西駕尚書以西京説朕不廢東轅當是獻可理殊所以今古相反冏曰昔漢祖起於布衣欲藉險自固婁敬之言符於本㫖今陛下徳洽四海事同隆周是以愚臣獻説不能上動帝大悦北史李順傳范柏年漢中人嘗見宋明帝言及廣州貪泉曰梁州中惟有文川武鄉亷泉讓水帝問卿宅何在曰臣所居亷讓之間南史胡諧之傳楊愔小名秦王華隂人㓜䘮母詣舅源子恭子恭問讀何書曰誦詩子恭曰誦至渭陽未邪愔便號泣感噎子恭亦對之歔欷子恭後謂愔父津曰嘗謂秦王不甚察慧從今已後更欲刮目視之冊府元龜文中子之韓城自龍門闗先濟賈瓊程元後闗吏仇璋止之曰先濟者為誰吾視其顙頺如也重而不亢目燦如也澈而不瞬口敦如也闞而不張鳯頸龜背鬚垂至腰參如也與之行俯然而色卑與之言泛然而後應浪驚柂旋而不懼是必有異人者也程元曰子知人矣是王通者也賈瓊曰吾二人師之而不能去也仇璋曰夫杖一徳乗五常扶三才控六藝吾安得後而不往哉遂捨職從於韓城中説宇文化及右翊衛大將軍述之子也好乗肥挾彈馳騖道中長安謂之輕薄公子冊府元龜馬三寶奉平陽公主遁於司竹及義兵濟河以衆數萬詣軍後領平道軍將嘗從幸司竹帝顧謂三寶曰是汝建英雄處耶衛青大不惡冊府元龜蕭瑀陳叔逹於龍昌寺看李花相與論李有九標謂香雅細淡潔宻宜夜月宜緑鬢宜泛酒承平舊纂尉遲敬徳為鄜州都督上謂敬徳曰朕欲以女妻卿何如敬徳謝曰臣雖不學聞古人富不易妻此非臣所願也綱鑑補上嘗語及闗中山東人意有同異殿中侍御史張行成曰天子以四海為家今有東西之異示人以隘上善其言厚賜之太宗實録楊烱華隂人以文辭知名海内稱為王楊盧駱亦號四傑烱曰吾愧在盧前耻居王後唐書文藝傳張説謂人曰楊盈川之文如懸河注水酌之不竭既優於盧亦不减王耻居王後則信然愧在盧前則為謙矣唐新語劉迅字㨗卿厯京兆功曹叅軍事迅寢疾房琯聞憂不寐曰㨗卿有不諱天理欺矣陳郡殷寅名知人見迅歎曰今黄叔度也劉晏毎聞其論曰皇王之論盡矣上元中避地安康卒隋唐嘉話渭南尉劉延祐弱冠政事為畿縣最李勣謂曰足下春秋甫爾遽擅大名宜稍自貶抑無為獨出人右也鴻書潘師正居逍遥谷髙宗問所須對曰茂松清泉臣所願也事文類聚田㳺巖入太白山髙宗幸其門謂曰先生此中佳否答曰臣所謂泉石膏肓煙霞痼疾事文類聚太平公主選薛曜之子紹尚焉紹兄顗以公主寵盛深憂之族祖户部郎中克構曰帝甥尚主國家故事茍以恭慎行之亦何傷然諺曰娶婦得公主無事取官府不得不為之懼也通鑑竇從一為雍州刺史謟附權貴太平公主與寺僧爭碾磑雍州司户李元紘判歸寺僧從一懼命元紘改判元紘大書判後曰南山可移此判無動通鑑長壽二年裴子餘為鄠縣尉同列李隱朝程行諶皆以文法著稱子餘獨以詞學知名或問雍州長史陳崇業三人優劣孰先崇業曰譬之春蘭秋菊俱不可廢嘉話録宋璟與蘇瓌子頲同時為相頲除紫薇侍郎平章事時璟歎曰吾與蘇家父子同時為相至於寛厚博物僕射亦有之若正直賢明則頲過其父推此而論繼代為相有之如頲與其父同秉衡者古無所聞璟初與其父比肩又與其子同列如璟年髙徳重久居台位又無其比卓異記宋清賣藥於長安市人有急難傾財救之長安言人有義聲賣藥宋清唐國史補陸象先為同州刺史有家僮遇參軍不下馬參軍欲賈其事鞭背見血曰卑吏犯公請去兖公謂曰奴見官人不下馬打也得不打也得官人打了去也得不去也得參軍不測而退國史補太液池岸有竹數十叢牙筍未嘗相離宻宻如栽帝呼之為義竹開天遺事唐張彖為華隂尉歎曰丈夫有凌雲葢世之志拘於下位若立身於矮屋中使人擡頭不得遂拂衣長往鴻書唐盧藏用始隱於終南山中宗朝累居要職道士司馬承禎睿宗朝至京將還藏用指終南山謂之曰此中大有佳景處何必逺承禎徐答曰以僕所觀乃仕宦㨗徑藏用有慚色唐新語郭令公出見脩宅者謂曰好築此墻勿令不牢築者釋錘對曰數十年來京城逹官墻皆是某所築祗見人自改換墻今見存令公聞之愴然動心封氏見聞録憲宗久親政事忽問京兆尹幾員李相吉甫對曰京兆尹三員一員大尹二員少尹以為善對國史補憲宗時裴垍為相嘗有故人自逺詣之垍資給優厚從容欵狎其人乘間求京兆判司垍曰公才不稱此官不敢以故人之私傷朝廷至公唐書裴垍傳左軍中衛吐突承璀盛修安國寺奏立聖徳碑先構碑樓請勑學士撰文且言臣已具錢萬緡欲酬之上命李綘為之綘言堯舜禹湯未嘗立碑自言聖徳惟秦始皇於廵逰所遇刻石髙自稱述未審陛下欲何所法上命曵倒碑樓通鑑李華含元殿賦初成蕭頴士見之曰景福之上靈光之下唐國史補韋蘇州如園客獨繭暗合徽音杜牧之如銅丸走坂駿馬注坡白樂天如山東父老課農桑言言事事皆著實敖陶孫詩評天街兩畔槐樹俗號為槐衙曲江池畔多柳亦號為柳衙意謂其成行列如排衙也中朝故事李白登華山落雁峰曰此處呼吸之氣想通帝座恨不擕謝朓驚人詩來搔首問青天耳山居雜録聖厯二年吏部侍郎鄭果注韓思復為太常博士元希聲京兆士曹嘗謂人曰今年掌選得韓元二子吏部不負朝廷矣唐會要盧思道常曉醉於省門見從姪賁賁曰阿父何處飲來凌晨嵬峩思道曰長安酒二百價不嵬峩何嵬峩談藪裴晉公午橋庄小兒坡茂草盈里晉公毎使數白羊散於坡上曰芳草無情賴此粧㸃窮幽記裴度臨終告門人曰吾死無所繫但午橋莊松雪嶺未成軟碧池中魚尾未長漢書未終為可恨耳春雪箋明道在鄠縣政聲流聞當路欲薦之朝而問其所欲對曰夫薦士者皆視才之所堪不問志之所欲伊洛書張詠少時謁華山陳圖南遂欲隱居陳曰公方有官職未可議此其勢如失火家待君救火豈可不赴宋名臣言行録邵伯恭侍郎守長安既去以書抵親識曰自去長安唯酥梨笋時復在念過庭録韓琦范仲淹在兵間久名重一時號令嚴明愛撫士卒諸羗來者推誠撫接咸感恩威邊上謡曰軍中有一韓西賊聞之心膽寒軍中有一范西賊聞之驚破膽天下稱為韓范綱鑑補元豐庚申嵗予行至雍華間闗西學者相從者六七人予以千錢掛馬鞍比就舍則亡矣僕夫曰非晨裝而忘之則渉水而墜之矣予不覺嗟曰千錢可惜坐中一人者曰水中囊中可以一視人亡人得又何嘆乎予曰人得之乃非亡也吾嘆乎有用之物若沉水中則不復為用矣至雍以語與叔與叔曰誠善矣然觀先生之言則見其有體而無用也予因書而識之遺金閒志曲端吴玠建炎間有重名於陜西西人為之語曰有文有武是曲大有謀有勇是吴大筆記王端毅恕厯仕四十五年凡上三千餘䟽皆忠直剴切葢憂世之志如范希文濟世之才如司馬君實直諫如汲長孺惠愛如鄭子産劉昌懸笥𤨏探張潜華州人生而頴秀長益自負不凡𢎞治壬子䆳菴楊公督學闗中徧試諸生謂闗中有三才子葢慶陽李獻吉洵陽張光世其一公也其年秋三人同舉而獻吉發解云渼坡續集長安諸生馮仲好為第一仲好瘠則甚矣而文氣雄萬夫余嘗登太華之山削成而四方其山骨立草木不蕃然蔽虧日月吐納風雲中原萬里可俯而窺仲好之人與文將無似之大泌山房集三原王康僖公講學其父端毅公督之朝邑韓苑洛講學其父蓮峰老人督之康僖公之門人為馬谿田苑洛之門人為楊斛山當其時家庭之間藹若洙泗師弟之際不愧伊洛此吾鄉前輩所以為盛馮少墟疑思録王端毅之事功楊斛山之節義吕涇野之理學李空同之文章足稱國朝闗中四絶馮少墟池陽語録明耀州胡茂却客讀書作天上曲一百首藏於家予得之有云天風䬃䬃吹鳳毛華葢前頭引翠旄暫憇崑崙寛眼界居然五岳似秋毫讀之可以想其蕭散不羣之致遺聞録王敬夫如狐禪鹿仙亦自縱横王允寧如下邑工琢玉器非不竒貴痕跡宛然又如王子師學華相國在形迹間所以愈逺許伯誠如通津郵資用本少供億不虛喬景叔如江東秀才文弱都雅而氣不壯王鳯洲文評王敬夫如漢武求仙欲根正染時復遇之終非實境康徳涵如靖康中宰相非不處貴恇擾粗率無大處分馬仲房如衛尉屯西宫斥堠精嚴甲仗雄整而士乏樂用之氣王舜夫如敗鐵網取珊瑚用力堅深得寶自少孫太初如雪夜偏師間道入蔡又如鳴蜩伏蚓聲振月露體滯泥壤喬景叔如清泉放溜新月掛樹然此景殊少不耐縱觀許伯誠如賈胡子作獨逰隨事揮散無論中節王允寧如馬服子陳師自作竒正不得兵法又如項王嘔嘔未了忽發喑嗚王鳯洲詩評陜西通志巻九十八
