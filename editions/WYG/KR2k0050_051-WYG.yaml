body:
  text: 陜西通志巻五十一名宦二節鎮下王景萊州掖人晋天福初授耀州團練使臨政不尚刻削民有訟必面詰之不至大過即諭而釋去周廣順中鎮鳯翔世宗即位加兼中書令先是秦鳯陷蜀州旁蕃漢户詣闕請收復世宗命景與向拱率兵出大散闗進討連陷砦柵遂命景為西面行營都部署大破蜀軍建隆二年來朝太祖復以為鳯翔節度西面緣邊都部署四年卒追封岐王謚元靖宋史本傳折德扆世居雲中父從阮鎮府州署德扆馬步軍都校廣順間世宗建府州為永安軍以德扆為節度使時從阮鎮邠寧父子俱領節鎮時人榮之顯德中德扆率師攻下河市鎮入朝以其弟德愿權總州事世宗以其素得蕃情厚加賜賚而遣之乾德元年敗太原軍於城下擒其將楊璘二年卒贈侍中子御勳御卿德扆卒御勳權知府州事開寳二年以為永安軍留後九年改泰寧軍節度御卿知府州淳化三年凡四遷為府州觀察使五年拜永安軍節度使契丹入㓂大敗之于子河􅆜其大將韓德威僅以身免歳餘御卿被病韓德威諜知之率衆來侵御卿力疾出戰德威聞其至不敢進㑹疾甚其母宻遣人召歸御卿曰世受國恩邊㓂未滅御卿罪也今臨敵棄士卒自便不可死於軍中乃其分也為白太夫人無念我忠孝豈能兩全言訖泣下翊日卒上聞悼惜乆之贈侍中以其子惟正為洛苑使知州事宋史本傳年按府州改設軍府分宋史與五代史不同兩存之以傳疑可也張美字元珪清河人拜定國軍節度縣官市木關中同州歲出緡錢數十萬以假民長吏十取其一謂之率分錢歲至數百萬美獨不取未幾他郡有詣闕訴長吏受率分錢者皆命償之宋史本傳趙賛字元輔幽州薊人宋初鎮延州受宻㫖許便宜行事將及州境乃前後分置步騎綿綿不絶林莽之際逺見旌旗所部羌渾來迎無不懾服開寳四年改鎮鄜州卒賛御衆有方畧吏民畏服宋史本傳王顯字德明開封人淳化三年知永興軍徙延州時夏臺㓂擾顯上疏謂宜謹屯戍固城壘積芻糧然後遴選才勇付以邊任則禦備有素時制沿邊糧斛不許過河西河西青鹽不得過界販鬻犯者不以多少處斬顯請犯多者依法自餘别為科斷以差其罪宋史本傳永按宋史地理志京兆府本永興軍節度知軍舊領興軍路安撫使延安府本彰武軍節度知軍舊領鄜延路經畧安撫使故並入節鎮張齊賢曹州寃句人字師亮知永興軍時閤門祗候趙賛以言事得幸提㸃闗中芻糧所為多豪横齊賢論列其罪卒抵於法宋史本傳田重進幽州人淳化五年知延州重進以武勇知名而在鎮專務以仁厚及人不令擾百姓舊志張詠濮州鄄城人鎮永興有父老訴牛舌為人所割詠詰之爾於鄰仵誰氏最隙訴者曰有甲氏嘗貸粟於某家不遂搆怨之深詠遽遣去戒云至家徑解其牛貨之父老如教翌日有百姓訴殺牛者詠謂之曰爾割某氏牛舌以償貸粟之怨而反致訟耶其人遂伏罪春明退朝録陳若拙字敏之幽州盧龍人知永興軍府時隣郡歲饑前政拒其市糴若拙至則許貿易民賴以濟又移知鳯翔府宋史陳思譲傳孫全照字繼明莫州清苑人為鄜延路都廵檢使淳化五年率兵與李繼隆克綏州因與張崇貴等同戍守之俄䕶屯兵於夏州兼知州事遷延州監軍兼阿都闗盧闗路都廵檢事咸平五年將城綏州以為綏州路鈐轄既調兵夫二萬餘全照言其非便乃罷景德三年為邠寧環慶都部署趙德明納欵朝議減西鄙戍兵令屯近地因徙全照知永興軍府宋史孫行友傳孫僅字隣幾蔡州汝陽人咸平元年進士同知審官院永興孫全照求代真宗思擇循良宰相言僅嘗倅京府諳民政乃命知永興軍府僅純厚長者為政頗寛祥符元年加比部員外郎代還孫何傳馬知節字子元幽州薊人咸平時徙知延州兼鄜延駐泊部署邊冦將至方上元節遽命張燈啟闗累夕晏樂冦不測即引去宋史馬全義傳向敏中字常之開封人太平興國五年進士明辯有畧遇事敏速凡二邊道路斥堠走集之所莫不周知咸平四年知永興軍景德初命為鄜延路緣邊安撫使俄還京兆眞宗幸澶淵賜敏中宻詔盡付西鄙許便宜從事敏中視政如常日㑹大儺有告禁卒欲倚儺為亂者敏中宻使麾兵被甲伏廡下明日盡召賔僚兵官置酒命儺入至堦伏出盡擒之果各懐短刅即席斬焉邊蕃遂安時舊相出鎮不以軍事為意帝聞之曰大臣出臨四方惟敏中盡心於民事二年又以敏中為鄜延路都部署兼知延州委以經畧宋史本傳李廸字復古其先趙郡人徙家濮深厚有噐局舉進士第一唃厮羅叛帝憂闗中召對長春殿進集賢院學士知永興軍城中多無賴子弟喜犯法廸奏取其甚者部送闕下徙陜西都轉運使宋史本傳王嗣宗字希阮汾州人大中祥符間知邠州兼邠寧環慶路都部署城東靈應公廟傍有山穴羣狐處焉妖巫挾之為人禍福民甚信向水旱疾疫悉禱之民語為之諱狐音前此長吏皆先謁廟然後視事嗣宗毁其廟燻其穴得數十狐盡殺之淫祀遂息宋史本傳周起字萬卿淄州鄒平人知永興軍有風烈數賜書褒諭宋史本傳陳堯咨字嘉謨閬中人知永興軍長安地斥鹵無甘泉堯咨疏龍首渠注城中利之宋史本傳李諮字仲詢新喻人知永興軍衣冠子弟恃䕃無賴者諮悉杖之境内肅然宋史本傳李若谷字子淵徐州豐人以右諫議大夫知延州州有東西兩城夾河秋夏水溢岸輙圯役費不可勝紀若谷乃制石版為岸押以巨木後雖暴水不復壊官倉依山而貯榖少若谷使作露囤囤可貯二萬斛他郡多取法焉若谷治民多智慮愷悌愛人其去多見思宋史本傳若谷知延州夏人遣使來前守多延之堂上若谷獨廡下飲食之隆平集髙良夫判延州撫恤軍民時稱能吏仁宗降敕褒之賈志杜衍字世昌越州山隂人擢進士甲科知乾州陳堯咨安撫陜西以衍賢徙權知鳯翔府及罷歸二州民邀留境上曰何奪我賢太守也遷知永興軍民有晝亡其婦者為設方畧立捕得殺人賊發所瘞屍并得賊殺他人婦屍二秦人大驚寳元二年復知永興軍時方用兵民苦調發吏因縁為姦衍區處計畫量道里逺近寛其期㑹使民得次第輸官比他州費省錢過半宋史本傳鄭戬字天休蘇州吳縣人舉進士知永興軍建言凡行軍所須願下有司相緩急析為二等非急罷去先是衙吏輸木京師浮渭泛河多漂沒既至則斥不中程徃徃破家不能償戬奏歲減二十餘萬又奏罷括糴以勸民積粟長安故都多豪惡戬治之尚嚴人皆惕息未幾為陜西四路都總管兼經畧安撫招討使宋史本傳范雍字伯純河南人中進士第歴陜西都轉運使改知永興軍歲饑疫雍為賑恤元昊反拜振武軍節度使知延州因言延州最當賊衝地濶而砦柵疎近者百里逺者二百里土兵寡弱又無宿將為用請益師不報元昊引兵數萬至城下雍堅守城得不䧟遷知永興軍兼轉運司事初完永興城或言其非便詔止其役雍匿詔而趣成之明年賊犯定川邠岐之間皆恐而永興獨不憂宋史本傳龎籍字醇之單州武城人及進士第元昊反為陜西體量安撫使除陜西都轉運使文彦博鞫黄德和獄未上詔籍同案籍言德和退怯當誅劉平力戰而沒宜加恤其子孫進龍圖閣直學士知延州俄兼鄜延都總管經畧安撫緣邊招討使明年改延州觀察使力辭換左諫議大夫自元昊陷金明承平塞門安逺栲栳砦破五龍川邊民焚掠殆盡籍至稍葺治之戍兵十萬無壁壘皆散處城中畏籍莫敢犯法金明西北有渾州川土沃衍川尾曰橋子谷冦出入之隘道使部將狄青將萬餘人築招安砦於谷旁數募民耕種收粟以贍軍悉復所亡地築十一城及開癿名平戎道通永和烏仁闗更東西陣法為方陣頗損益兵械元昊既臣召為樞宻副使籍曉律令長於吏事治民頗有惠愛宋史本傳籍在延州軍行出塞使因糧於敵馬芻皆自刈之還畀其直民無飛輓之勞及去民遮道而泣曰公用兵數年未嘗以一事煩民雖以一子為香祝之猶不足報也宋名臣言行録韓琦字稚圭相州安陽人舉進士第二趙元昊反琦論西師形勢甚悉即命為陜西安撫使進樞宻直學士副夏竦為經畧安撫招討使琦畫攻守二䇿入奏仁宗欲用攻䇿執政者難之琦言元昊雖傾國入冦不過四五萬人吾逐路重兵自守勢分力弱遇敵輙不支若併出一道鼓行而前乘賊驕惰破之必矣乃詔鄜延涇原同出征既還營元昊來求盟琦曰無約而和者謀也命諸將戒嚴敵果犯山外琦悉兵付大將任福令自懐逺城趣德勝砦出敵後如未可戰即據險置伏要其歸及行戒之至再又移檄申約茍違節度雖有功亦斬福竟為敵誘沒於好水川竦使人收散兵得琦檄於福衣帶間言罪不在琦琦亦上章自劾獨奪官知秦州慶歴二年為陜西四路經畧安撫招討使屯涇州琦與仲淹在兵間乆名重一時人心歸之朝廷倚以為重故天下稱為韓范東兵從宿衞來不習勞苦琦奏增土兵以代戍建德順軍以蔽蕭闗鳴沙之道方謀取横山規河南而元昊稱臣召為樞宻副使元昊邀索無厭琦陳其不便條所宜先行者七事又陳救弊八事帝悉嘉納遂宣撫陜西討平羣盗張海郭邈山禁卒羸老者汰之盡修鄜延城障須敵悉歸所侵地乃許和歸陳西北四䇿以為當今以和好為權宜戰守為實務宋史本傳公駐延安忽有人夜攜匕首至卧門遽褰幃帳公起坐問曰誰何曰來殺諫議又問曰誰遣汝來曰張相公遣某來盖是時張元夏國正用事也公復就枕曰汝攜予首去其人曰某不忍願得金帶足矣遂取帶而去明日亦不治此事俄有守陴卒報城櫓上得金帶者納之時范純祐亦在延安謂公曰不治此事為得體蓋行之則沮國威今乃受其帶是墮賊計中矣公歎曰非琦所及麈史范仲淹字希文蘇州吳縣人舉進士第元昊反知永興軍改陜西都轉運使㑹夏竦為陜西經畧安撫招討使進仲淹龍圖閣直學士以副之延州諸砦多失守仲淹自請行遷户部郎中兼知延州先是詔分邊兵總管領萬人鈐轄領五千人都監領三千人冦至禦之則官卑者先出仲淹曰將不擇人以官為先後取敗之道也於是大閲州兵得萬八千人分為六各將三千人分部教之量賊衆寡使更出禦賊時塞門承平諸砦既廢用种世衡䇿城青澗以據賊衝大興營田且聽民得互市以通有無又以民逺輸勞苦請建鄜城為軍以河中同華户稅租就輸之春夏徙兵就食省糴十之三明年詔諸路入討仲淹曰正月塞外大寒我師暴露不如俟春深入賊馬瘦人饑勢易制也鄜延宻邇靈夏西𦍑必由之地苐按兵觀釁臣稍以㤙信招來之若不效當舉兵先取綏宥據要害屯兵營田為持久計則茶山横山之民必挈族來歸矣帝皆用其議仲淹又請修承平永平等砦稍招還流亡定堡障通斥堠城十二砦於是羌漢之民相踵歸業元昊答書不遜仲淹對來使焚之降知耀州進參知政事㑹邊陲有警與富弼請行邊於是以仲淹為河東陜西宣撫使麟州新罹大㓂言者多請棄之仲淹為修故砦招還流亡三千餘户蠲其稅罷𣙜酤予民又奏免府州商稅河外遂安仲淹為政尚忠厚所至有恩邠州民皆畫像生祠事之宋史本傳仲淹領延安閲兵選將日夕訓練又請戒諸路養兵蓄銳毋得輕動夏人聞之相戒曰無以延州為意今小范老子腹中自有數萬甲兵不比大范老子可欺也名臣傳仲淹帥邠延威德著聞夷夏聳服熟户蕃部率稱為龍圖老子至元昊亦以此稱之燕談張亢字公夀宋人天禧三年甲科寳元初元昊反闗内大震充鄜延路鈐轄兼知鄜州未幾改充本路都鈐轄駐延州慶厯元年秋賊入破麟府間諸堡寨圍府州事聞命亢為并代都鈐轄専管勾鄜府軍馬公事亢馳至府城城中不敢啟闗亢入即大啟諸所塞門縱民出入視禁旅尚數千人皆無鬬志乃募執役下軍之敢戰者得數百人使擊賊至暮爭持賊首以獻亢躬自犒奬取錦袍以衣之連數日皆獲賊如前賞於是禁旅悉慚奮擊賊大破之軍始復振乃修復賊所破諸堡寨有寧逺寨者据麟府之中最號險要賊出兵爭之亢命虎翼軍執萬勝軍旗幟為陣以挑賊賊素知萬勝軍罷軟果犯之虎翼軍萬弩齊發短兵繼前又遣驍將出賊後夾攻之賊奔潰自此不敢復出不踰月而五寨立二州始通復奏曰今五寨所通麟府徃來之一徑耳若更增并邊諸柵以相維衛則河外安矣議未下契丹渝盟河朔大警朝廷使為瀛帥居數月夏人與契丹有隙大戰黄河外范文正公被詔宣撫特還亢并代路副都總管兼㳂邊安撫事范公至河外親按形勢利害乃奏用亢前議仍以亢總其事詔可之凡建寨十四於是蕃漢歸者數千户歲減戍兵萬人省轉輸萬萬計久之徙官卒上思其勞優贈以官麟府蕃漢民皆繪像祀之安陽集薛儀判鄜州張亢患州城大而處勢卑難以待敵欲遷就伏龜山計功數十萬時虜乘勝深入州無役兵欲以戰士築之衆咸以為難儀獨以為可亢喜曰薛君謂之可事無不成矣役始興而亢病失音儀外備冦敵内董役事人不知張亢之病也城成民至今賴之温公集程琳字天球博野人知永興軍判延州為陜西安撫使元昊死諒祚立方幼三大將分治其國議者謂可因此時以節度使啖三將使各有所部分以弱其勢琳曰幸人之䘮非所以柔逺人不如因而撫之既而遣使冊命夏人方圍慶陽琳曰此可緩慶陽之難矣具禮弊賜予之數移報之果喜即日迎冊使慶陽圍亦解夏人以五百户驅牛羊扣邊請降言契丹兵至衙頭國中亂願自歸琳曰彼詐也拒不受已而賊果以騎三萬臨境上以捕降者為辭琳諜知之閉壁倒旗戒諸將勿戰賊疑有備遂引去宋史本傳夏安期字清鄉竦子江州德安人元昊納款罷兵命徃陜議邊費奏省吏員汰兵五萬人擢陜西都轉運使徙知延州州東北阻山無城郭虜嘗乘之安期至即大築城時方暑躬自督役不踰月而就元昊請畫疆界朝廷遣使以問安期安期對曰此不足煩王人衙校可辦也議遂决宋史夏竦傳文彦博字寛夫汾州介休人及進士第宋史本傳至和中知永興軍起居舍人毋湜鄠人也上言乞廢陜西鐵錢朝廷雖不從其鄉人多知之爭以鐵錢買物賣者不肯受長安為之閉肆寮屬請禁之彦博曰如此是愈使惑擾也乃召絲絹行人出其家縑數百匹使賣之日納其直盡以鐵錢於是衆知鐵錢不廢市肆復安馮志曹穎叔字秀之亳州譙人初名熙進士及第提㸃陜西路刑獄知鳯翔府累遷陜西都轉運使自慶歴鑄大錢行陜西民盗鑄不已三司上𣙜鐵之議穎叔曰鐵錢輕而貨重不可久行况官自𣙜鐵乎請罷鑄諸郡鐵錢以三鐵錢當銅錢之一從之進知永興軍卒於官宋史本傳程戡字勝之許州陽翟人寳元初擢陜西都轉運使進拜鄜延路經畧安撫使判延州州夾河為城雉堞頗卑小敵上九州臺則下瞰城中戡調兵夫大增築之宋史本傳戡在延州横山豪長請以兵乘塞而自以其屬取靈夏歸中國戡奏言諒祚數悖慢而多殺戮人人離心今其豪長如此可許之時大臣重事不從戡乆在帥閫號習邊事隆平集陳堯佐字希元閬州閬中人進士及第以試秘書省校書郎知朝邑縣㑹其兄堯叟使陜西發中人方保吉罪保吉怨之誣堯佐以事降本縣主簿徙下邽累遷知永興軍徙同州復徙永興軍初太后遣宦者起浮屠京兆城中前守姜遵盡毁古碑碣充塼甓用堯佐奏曰唐賢人墓石今十亡七八矣子孫深刻大書欲傳之千載廼一旦與瓦礫等誠可惜也其未毁者願勅州縣完䕶之宋史本傳葉清臣字道卿蘇州長洲人知永興軍浚三白渠溉田踰六千頃宋史本傳劉敞字原父臨江新喻人知永興軍大姓范偉為奸利冐同姓户籍五十年持府縣短長數犯法敞窮治其事偉伏罪長安中讙喜宋史本傳薛奎字宿藝絳州正平人舉進士第一為陜西轉運使趙德明言延州蕃落侵其地黒林平下詔按驗奎閲郡籍德明嘗假道黒林平移文錄示之德明遂伏改户部郎中知延州趙元昊每遣使至京師請奉予吏因市禁物隱闗算為姦利奎廉得狀請留蜀道縑帛於闗中轉致給之宋史本傳郭逵字仲通其先自邢徙洛治平二年出領陜西宣撫使神宗即位徙鎮鄜延种諤受嵬名山降取綏州夏人遂殺楊定朝論以邊釁方起欲棄綏逵曰虜既殺王官而又棄綏不守見弱已甚且名山舉族來歸當何以處既而夏人欲以塞門安逺二砦來易朝廷許之逵曰此正商於六百里之䇿也非先交二砦不可與乃寢其請夏人又求以亡命景詢易名山逵曰詢庸人也何所輕重受之則名山不得不還自是蕃人無復敢向化矣逵詢得殺楊定者姓名諜告將斬之於境以謝罪逵曰是且梟死囚以紿我報曰必執李崇貴韓道喜來夏人言殺之矣逵命以二人狀貌物色詰問敵情得乃執獻之神宗嘗訪八陣遺法逵為帝論其詳在延安時使以敎兵久不就逵擇諸校習金鼔屯營者六十四人使人敎一隊頃刻而成尤善用偏禆每至所部令人自言所能暇日閲按之故臨陣者皆盡其技宋史本傳沈括字存中錢塘人以龍圖閣待制出知延州至鎮悉以别賜錢為酒命㕓市良家子馳射角勝有軼羣之能者自起酌酒以勞之邊人歡激越歲得徹札超乘者千餘皆補中軍義從威聲雄他府朝廷出宿衛師來戍賞賚至再不及鎮兵括以為衛兵雖重而無歲不戰者鎮兵也不均且召亂乃藏敕書而矯制賜緡錢數萬以驛聞詔報之曰此右府頒行之失非卿察事機必擾軍政自是事不暇請者皆得專之种諤師次五原糧餉不繼殿直劉歸仁率衆南奔居民怖駭括出東郊問曰副都管遣汝歸取糧主者為何人曰在後即諭令各歸屯未旬日潰卒盡還括出按兵歸仁至括曰汝歸取糧何以不持軍符歸仁不能對斬以徇宋史本傳孫永字曼叔趙人擢進士第神宗即位擢天章閣待制安撫陜西民景詢外叛詔捕送其孥勿以赦原永言陛下新御極曠澤流行惡逆者猶得虧除今緣坐者弗宥非所以示信也歴陜西都轉運使時邊用不足以解鹽市馬别為一司外臺不得與永奏曰鹽馬國之大計使主者專其柄既無統𨽻茍為非法孰從而制之加龍圖閣直學士宋史本傳司馬光字君實夏縣人寳元初中進士甲科神宗初以端明殿學士知永興軍宣撫使下令分義勇戍邊選諸軍驍勇士募市井惡少年為竒兵調民造乾糒悉修城池樓櫓闗輔騷然光極言公私困敝不可舉事京兆一路皆内郡繕治非急宣撫之令皆未敢從若乏軍興臣當任其責於是一路獨得免宋史本傳趙卨字公才卭州依政人第進士郭逵宣撫陜西辟掌機宜文字种諤擅納綏州降人數萬朝廷以其生事議誅諤反故地歸降人以解仇釋兵又徙逵帥鄜延卨移書執政請存綏州以張兵勢先規度大理河川建堡寨畫稼穡之地三十里以處降者若棄綏不守則無以安新附之衆朝廷從之活降人數萬熙寧初夏人誘殺知保安軍楊定等既而請和朝廷欲因使納塞門安逺二砦而還綏州卨言綏實形勢之地宜存綏以觀其變計之得也神宗然之遷提㸃陜西刑獄韓絳宣撫陜西河東兵西討卨言大兵過山界皆砂磧乏水草又無險隘可以控扼今若乘兵威招誘山界人户當先經畫山界控扼之地然後招降不爾勞師逺攻未見其利絳納种諤之䇿遂城囉兀以卨權宣撫判官加知延州夏自失綏意未能已卨揣知其情奏言夏使請和必欲畫綏界願聽本路經畧司分畫明年遂用卨䇿以綏為綏德城初鄜延地皆荒瘠占田者不出租賦倚為蕃蔽寳元用兵後凋耗殆盡其曠土為諸豪所有卨因聽自募丁家使占田充兵諸豪感服歸募悉補亡籍又檢括境内公私閒田得七千五百餘頃募騎兵萬七千卨以異時蕃兵提空簿漫不可考因議湼其手屬歲饑卨分蕃兵願刺手者貸常平榖一斛於是人人願刺因訓練以時精銳過於正兵神宗聞而嘉之復帥延安元祐初梁乙埋數擾邊卨知夏將入侵檄西路將劉安李儀以輕兵襲洪州夏遂入貢既而以重兵壓境諸將亟請益戍兵為備卨徐諭之曰苐謹斥堠無為冦先因遣人詰夏夏兵遂去宋史本傳呂公綽神宗時知永興軍待僚屬謙恭遇吏民仁厚雍大記种諤字子正延帥陸詵薦知青澗城夏將嵬名山部落在故綏州其弟夷山先降諤使人因夷山以誘之賂以金盂名山小吏李文喜受而許降名山未知也諤悉起所部兵長驅而前圍其帳名山驚援槍欲鬬夷山呼曰兄已約降何為如是文喜因出所受金盂示之名山投槍哭遂舉衆從諤而南得豪領三百户萬五千兵萬人遂城綏州韓絳宣撫陜西用為鄜延鈐轄徙鄜延副總管上言夏主秉常為其母所囚可急𢷬其巢穴帝以為經畧安撫副使諸將悉聽節制諤率本路并畿内七將兵攻米脂未下夏兵八萬來援諤禦之無定川伏兵發斷其首尾大破之降守將令介訛遇㨗聞帝大喜遣中使諭奬後知延州卒諤善馭士卒臨敵出竒敵畏其敢戰故數有功宋史种世衡傳曾公亮字明仲泉州晉江人舉進士甲科熙寧三年拜司空明年判永興軍先是慶卒叛既伏誅而餘黨越佚自陜以西皆警備閱義勇益邊兵移内地租賦人情騷然公亮一鎮以靜次第奏罷之專務裁抑冗費長安豪喜造飛語聲言營卒怨減削謀以上元夜結外兵為亂邦人大恐或勸毋出游公亮不為動張燈縱觀與賔佐竟夕乃歸居一歲還京師宋史本傳吳中復字仲庻興國永興人進士及第歴永興軍河北行青苖法使者至將先下州縣中復檄之曰歛散自有期今先事擾之何也拒不聼且以報安撫司韓琦疏諫青苖錄其語以上闗内大旱民多流亡中復請加賑恤執政惡之遣使徃視謂為不實削一階提舉玉隆觀宋史本傳王舉元正定人進士知永興軍夏人屯境上長安從事來㑹兵涇原戒勿輕舉大將賈舜卿銳意請行不聼舉元曰不過三日敵去矣至期果去神宗以細劄諮攻守䇿舉元請省官減戍益備去兵勿營亭障輿論不合遂引疾求解徙陳州未行而卒畿輔志范純粹仲淹子字德孺元豐中為陜西轉運判官時五路出師伐西夏高遵裕以劉昌祚後期欲按誅之昌祚憂患卧病其麾下皆憤焉純粹恐兩軍不恊致生他變勸遵裕徃問昌祚疾其難遂解神宗責諸將無功謀欲再舉純粹奏闗陜事力單竭公私大困若復加騷動根本可憂異時言者必職臣是咎臣寧受盡言之罪於今日神宗納之宋史范仲淹傳純粹守延安嘗大閱百姓入敎塲觀者皆集俄而騎出兩翼圍之命觀者皆列坐五人結一保已而有十許人皆無保呼使前問故叩頭曰夏國之人也復問曰爾國使爾來覘我乎曰然因令坐帳前而後閱試技藝迨暮而畢復呼問之曰吾之兵不亦精乎曰然曰歸語爾主吾在此有以相待欲為冦者幸早來飲食而遣之世言文公三子各得其父一體盖長子忠宣得其德量中子右丞純禮彛叟得其文學德孺得其將畧也邊人至今畏服焉却掃編賈逵藁城人𨽻拱聖為卒遷秦鳯路鈐轄徙并代路專主管麟府軍馬熟户散處邊闗苦於㓂畧逵差度逺近聚為二十七堡次第相望自是害息畫鐵為的激種豪使射皆成勁兵一夕烽火屢發左右白當起逵卧不應旦而謂人曰此必妄也脱有警可夜出乎徐問之果邊人燭遺物也復徙秦鳯遷馬軍副都指揮使總鄜延兵延州舊有夾河兩城始元昊入㓂據險城幾不能守逵相伏龍山九州臺之間可容窺覘請於其地築堡障與城相望延人以為便宋史本傳李清臣字邦直魏人中皇祐五年進士第元祐初知永興軍兼永興軍路安撫使治尚夷易不務竒聲近效而民亦不敢犯雍人為之立祠雞肋集錢即字中道吳越王諸孫第進士辟鄜延幕府崇寧中為陜西轉運判官王師復銀州轉餉最徽宗召對願敕邊臣先為不可勝以待釁瀚海地皆舄鹵得之無所用帝然之除知延安府童貫宣撫陜西時長安百物踴貴錢幣益輕貫欲力平之計司承望風㫖取市價率減什四違者重置於法民至罷市又行均糴法賤入民粟而髙金帛估以償下至募兵射士之有田者咸被抑配闗内騷然即屢抗章極陳其害貶永州團練副使然糴害亦寢宋史錢惟演傳陶節夫字子禮鄱陽人第進士崇寧初遷陜西轉運副使徙知延安府招降𦍑有功築石堡等四城石堡以天澗為隍可趨者惟一路夏人窖粟其間以千數既為宋有其帥驚曰漢家取我金窟堝亟發鐵騎來争節夫分部將士遮禦之斬獲統軍以下數十百人擢顯謨閣待制龍圖閣直學士方議城銀州諜告夏人已東節夫料必西趨涇原遣裨將耿端彦疾驅至銀州五日城成夏人果從涇原至則城備已固遂遁去進樞宻直學士歴知永興軍卒宋史本傳夏炎字長卿真定獲鹿人政和中知永興初陜西行鐵錢幣益輕蔡京設法盡歛之更鑄夾錫錢幣稍重京去相轉運使李譓陳敦復見所歛已多遽請罷鑄鐵錢既復行其輕加初自闗以西皆罷市民不聊生炎獨一切弛禁聽從其便宋史賈昌朝傳劉法鄜延帥有材畧時論名將必以法為首後沒於兵士大夫惜之馬志孔平仲臨江新喻人字義甫登進士第徽宗立提舉陜西路刑獄帥鄜延宋史本傳徽宗時自陜西轉運使徙知延安府以經術餙吏事待𦍑人以威信甚有治狀舊志唐重字聖任眉州彭山人大觀三年進士知同州金人已陷晉絳將及同重度不能守乃縱州人使出自以殘兵數百守城以示必死金人疑有備不復渡河詔擢天章閣待制高宗即位以天章閣直學士知京兆府尋兼京兆府路經畧制置使重前在同州凡三上疏大元帥府乞早臨闗中以符衆望暨至永興又六上疏皆以車駕幸闗中為請并條奏闗中防河事宜大意謂虢陜殘破解州河中已䧟同華州沿河邊面亘六百餘里本路無可戰之兵乞增五路兵馬十萬以上委漕臣儲偫以守闗中章凡七八上復上疏乞選宗親賢明者充京兆牧或置元帥府令總管秦蜀十道以便宜從事帥守監司並聼節制則不惟可以衛敵亦可救郡縣瓦解之失不報金將羅索渡河陷韓城縣時京兆餘兵皆為經置使錢蓋調赴行在金兵圍城城中兵不滿千固守踰旬外援不至城䧟重以親兵百人血戰諸將扶重去重曰死吾職也戰不已衆潰重中流矢死贈資政殿學士諡恭愍宋史本傳楊宗閔代州崞縣人契丹亡將小博囉招合雜羗十餘萬破豐州攻麟府諸城宗閔領本道兵馬屢摧敗之俘其父母妻子宋史楊震傳為永興路總管與唐重同守永興金人䧟城迎戰死之宋史楊存中傳張浚字德逺漢州綿竹人中進士第髙宗除浚知樞宻院事謂中興當自闗陜始慮金人或先入陜取蜀則東南不可保遂慷慨請行詔以浚為川陜宣撫處置使得便宜黜陟抵興元金人已取鄜延驍將羅索貝勒引大兵渡渭攻永興諸將莫肯相援浚至即出行闗陜訪問風俗罷斥姦贓搜攬豪傑諸將惕息聽命時烏珠在淮西浚懼其復擾東南謀牽制之遂决䇿治兵合五路之師以復永興金人大恐急調烏珠等由京西入援大戰於富平涇原帥劉錡身率將士薄敵陣殺獲頗衆㑹環慶帥趙哲擅離所部望塵驚遁諸軍皆潰浚斬哲以殉退保興州命呉玠聚兵扼和尚原大散闗以斷敵來路紹興元年金將烏嚕攻和尚原呉玠乘險擊之金人大敗拜浚檢校少保定國軍節度使浚在闗陜三年訓新集之兵當方張之敵以劉子羽為上賓趙開為都轉運使呉玠為大將故闗陜雖擾而全蜀安堵且以形勢牽制東南江淮亦賴以安宋史本傳盧法原字立之湖州德清人紹興元年起川陜等路宣撫處置副使進宣撫副使金人攻闗輔叛將史斌陷興州諸郡多應法原命諸將堅壁衆以為怯未幾河東經制使王爕以乏食班師法原開闗納之與爕同破斌復興州方巨盗充斥秦隴叛兵窺蜀法原極意拊循嚴為備禦傳檄諸路人心稍安視山川險阻分地置將前後屢㨗上所倚重卒於軍宋史盧知原傳吳玠字晉卿隴千人建炎四年為秦鳯副總管兼知鳯翔府時兵火之餘玠勞來安集民賴以生九月金人驟至玠軍大潰收散軍保和尚原積粟繕兵列柵為死守計鳯翔民感其遺惠夜輸芻粟助之玠償以銀帛民益喜輸者數年紹興元年金將烏嚕哲庫出散闗和尚原玠命諸將更戰金人大敗沒立攻箭筈闗玠復擊退之居母䘮起復兼陜西諸路都統制金烏珠㑹諸道兵十餘萬攻和尚原玠以竒兵絶其糧道設伏於神坌縱兵夜擊大敗之三年薩里罕入興元未幾北歸玠遣兵邀於武休闗掩擊其後軍墮澗死者以千計盡棄輜重去四年敵大入攻僊人闗玠敗之授川陜宣撫副使四月復秦鳯隴三州玠與敵對壘且十年常苦逺餉勞民屢汰冗員節浮費益治屯田歲收至十萬斛又調戍兵命梁洋守將治褒城廢堰民知灌漑可恃願歸業者數萬家九年卒於僊人闗贈少師諡武安宋史本傳劉子羽字彦修崇安人張浚宣撫川陜辟子羽參議軍事富平戰不利浚移治閬州子羽請獨留河池調䕶諸將以通内外聲援許之明年呉玠以秦鳯經畧使戍河池王彦以金均房鎮撫使戍金州二鎮皆飢興元帥臣閉糴二鎮病之彦玠皆願得子羽守漢中浚承制拜子羽利州路經畧使兼知興元府子羽至漢中通商輸粟二鎮遂安是冬金人犯金州三年王彦失守子羽焚興元退守三泉縣西蜀大震子羽遺浚書言已在此金人必不南先是子羽預徙梁洋之積至是金人深入餽不繼又腹背為子羽玠所攻死傷十五六亟遁去子羽出師掩擊墮溪澗死者不可勝計餘兵不能自拔者悉降浚雖衂師卒全蜀子羽之功居多四年坐富平之役與浚俱罷宋史本傳州按興元本利路屬府建炎南渡後興元為川陜要衝以知府兼本路經畧安撫使遂領節鎮之任後分利州路為東西路孝宗時以興元帥兼領二路則其任彌重矣至於川陜宣撫雖駐興元此又使相重臣分陜之寄文臣如張浚胡世將武臣如呉玠呉璘非止帥興元一路也王庻字子尚慶陽人舉進士第髙宗即位除鄜延經畧使兼知延安府累立戰功進龍圖閣待制節制陜西六路軍馬東京留守宗澤承制以庻權陜西制置使㑹金人大入庻調兵自沿河至馮翊據險以守金人先已乘氷渡河犯晉寧侵丹州又渡清水河破潼闗秦隴皆震庻傳檄諸路㑹期討賊金人併兵㓂鄜延庻在坊州聞之夜趨鄜延以遏其衝金人詭道陷丹州遂陷延安以失律自劾罷張浚自富平敗歸始思庻可用乃召之庶至力陳撫秦保蜀之䇿勸浚收熙河秦鳯之兵扼闗隴為後圖浚不納紹興五年起復知興元府庶以士卒單寡籍興洋諸邑强壯兩丁取一三丁取二號義士日閱於縣月閱於州厚犒之不半年有兵數萬陞徽猷閣直學士宋史本傳胡世將字承公常州晉陵人登進士第紹興九年宣撫川陜時闗陜初復朝廷分軍移屯熙秦鄜延諸道明年金人陷同州入長安諸路皆震乃遣大將呉璘田晟出鳯翔郭浩出奉天不數日璘㨗於石壁及扶風金人不敢度隴分屯之軍得全師而還十一年朝廷復用兵㑹母䘮命起復遂復隴州破岐下諸屯又取華虢兵威稍振未幾致仕卒宋史本傳呉璘字唐卿隴千人紹興元年箭筈闗之戰璘功居多超遷綂制和尚原軍馬及烏珠深入陣分合三十餘璘隨機而應金人大敗烏珠中流矢遁十年薩里罕入長安趨鳯翔璘隨胡世將在河池遣姚仲拒於石壁砦敗之詔同節制陜西諸路軍馬璘以書遺金將約戰金呼紐郎君以三千騎衝璘軍璘擊走之呼紐入扶風復攻㧞之薩里罕怒甚自戰百通坊列陣二十里璘遣姚仲力戰破之授鎮西軍節度使十四年朝議析利州路為東西路以璘為西路安撫使時和議方堅而璘治軍經武常如敵至二十一年以守邊安静拜少保三十一年兼陜西河東招討使孝宗受禪命兼陜西河東路宣撫招討使乾道元年詔仍領宣撫使改判興元府璘至漢中修復褒城古堰溉田數千頃民甚便之子挺字仲烈髙宗差利州東路前軍同統制璘卒起復金州都綂改利州東路總管淳熙元年改興州都統軍中自置互市以來羗馬西路騎兵遂雄天下四年除知興州利州西路安撫使郡東北有二谷水挺作二堤扞之紹熙二年水發挺既賑被水者復增築長堤民頼以安宋史本傳郭浩字充道隴千人建炎二年權主管鄜延路經畧安撫時二敵交侵鄜延東皆金人西北即夏境其屬朝廷者惟保安一軍德静一砦浩間道之德静置司招收散亡與敵對壘一年敵不能犯張浚經畧陜西移知鳯翔府寓治寳雞縣又退保和尚原金人抵原下浩與吳玠隨方捍禦第功遷正任防禦使紹興元年金人破饒風嶺盗梁洋入鳯州攻和尚原浩與吳璘徃援斬獲萬計遷邠州觀察使徙知興元府饑民聚米倉山為亂浩討平之徙知金州金州殘弊特甚户口無幾浩招輯流亡開營田以其規置頒示諸路他軍以匱急仰給朝廷浩獨積贏錢十萬緡以助户部朝廷嘉之九年充陜西宣諭使知金州十一年金人内侵浩遣禆將設伏破之十四年分利州為東西路以浩為金房開逹州經畧安撫使屯金州仍建帥府十五年卒諡恭毅宋史本傳楊政字直夫原州臨涇人建炎間從吳玠擊金人九戰九㨗紹興元年金人趨和尚原攻箭筈闗政引兵大破之十月金兵十萬自寳雞列柵至原下吳玠以政綂領將兵擊之獲萬户首領三百餘人甲士八百六十人二年陞隴州團練使選知鳯州十年徙興元㑹金人渝盟政建迎敵之䇿兼川陜宣撫副使司都統制偕統制楊從義刼金人於鳯翔府城南砦敗之獲戰馬數百遂帥師趨寳雞渭水上以拒敵衝凡大戰七斬獲甚多十一年秋金合軍五萬來攻政引兵夜入隴州界趨吳山與金人對壘又敗金萬户通檢於寳雞擒之和議成帝召政還軍民諸部使者借留十三年還鎮十四年分利州為東西路政屯興元府政守漢中十八年六堰乆壊失灌溉之利政為修復漢江水决為害政築長堤捍之凡利於民者不敢以軍旅廢休兵十餘年將士上下安之宋史本傳虞允文字彬甫隆州仁夀人充川陜宣諭使陛辭言金亮既誅新主初立彼國方亂天相我恢復也和則海内氣沮戰則海内氣伸上以為然允文至蜀與吳璘議經畧中原璘進取鳯翔復鞏州金治兵爭陜西新復州郡蜀士欲棄之允文持不可孝宗受禪朝議欲盡棄陜西允文再上疏言恢復莫先於陜西陜西五路新復州郡又係德順之存亡一旦棄之則窺蜀之路愈多利害至重前後凡十五疏隆興元年入對言今有八可戰以笏畫地陳其利害乾道三年拜四川宣撫使金洋興元歸正人二萬遮道訴繫縲之苦允文分給官田俾咸執業宋史本傳晁公武徐州人乾道三年知興元府事兼安撫使束吏愛民百廢具舉庭無滯訟稱為良吏賈志劉甲字師文龍游人淳熙二年進士程松為四川宣撫使吳曦副之以甲知興元府利東安撫使曦獻四州於金金人破大散闗甲告急於朝乞下兩宣撫司恊力扞禦松謀遁甲固留不可遽以便宜檄甲兼沿邊制置曦遣王越趙觀以書致甲甲援大義拒之募二兵持帛書遣參知政事李璧告變曦僣位甲遂去官安丙等誅曦詔趣還任除宣撫使金自鶻嶺闗劄金崖進屯八里山甲分兵進守駐饒風以待之金人知有備引去明年罷宣撫司合利東西為一帥治興元進知興元府利州路安撫使節制本路屯駐軍馬嘉定七年卒於官宋史本傳金羅索字斡里延完顔部人太祖使羅索取陜西下同華二州克京兆府獲宋制置使傅亮遂克鳯翔丹州破臨真進克延安府降綏德軍及静邊懐逺等城寨十六宋安撫使折可求以麟府豐三州及堡寨九降於羅索遂破晋寧軍并降鄜坊二州於是羅索守延安延安鄜坊州皆殘破人民存者無幾羅索置官府輯安之京兆府叛羅索復討平之遂攻乾州州降進克邠州軍於京兆睿宗與張浚戰於富平宗弼左翼軍已却羅索以右翼力戰軍勢復振張浚軍遂敗睿宗曰力疾鏖戰以狥王事遂破巨敵雖古名將何以加也天㑹八年薨贈金源郡王諡莊義金史本傳盧克忠貴德州鳯集人天德間同知保大軍節度使綏德州軍卒數人過鄜城求宿民家是夜有賊剽主人財而去有司執假宿之卒繫獄榜掠誣服克忠察其寃獨不肯署未幾果得賊假宿之卒遂釋金史本傳布薩端本名齊勤中都路和爾和必喇明安人貞祐三年以左丞相行省陜西端雖癃老凡朝廷使至必逺迓宴勞不懈故讒搆不果行初同華舊屯陜西軍皆𨽻陜州宣撫副使永錫端奏潼闗之西皆陜西地請此軍𨽻行省緩急可使朝廷從之興定四年朝廷以知臨洮府事承裔行元帥府於鳯翔端奏隴外十州介宋夏之間與諸番雜處今承裔移居鳯翔恐一旦有警援應不及乞令承裔行元帥府於鞏州若以鳯翔宻邇宋界則本路屯兵已多但令總管攝行帥事與京兆鞏相為首尾足以備緩急矣從之是歲薨贈延安郡王金史本傳巴古拉貞祐四年知京兆府事兼本路兵馬都總管興定元年授陜西路統軍使兼前職四年權尚書右丞左副元帥行尚書省元帥府於京兆時陜西歲運糧以助闗東民力寖困巴古拉言以舟楫自渭入河順流而下庻可少紓民力從之時以為便五年正月朝議欲復取㑹州巴古拉上言計月當費米三萬石草九萬稱轉運丁夫十餘萬人今農事將興沿邊常費已不暇給豈可更調十萬餘人以餉此軍止宜令承裔軍䕶民耕稼俟敵意怠然後取之詔從之三月上言陜西州郡置帥府者九部衆卒不過三四千長校猥多虛糜廪給延安鳯翔邊隅重地固當仍舊德順等處宜皆罷去制可是年西北兵三萬攻延安巴古拉遣元帥完顔哈逹元帥納哈邁珠禦之遂保延安元光元年正月罷知河中府事二年正月上諭宰臣曰陜右兵將退當審後圖右丞巴古拉深悉彼中利害其與共議之尋遣徃陜西與行省薩布哈逹從宜規畫焉金史本傳尼瑪哈富勒呼中都路明安人明昌五年進士貞祐四年為陜州宣撫副使兼西安軍節度使元兵取潼闗戍卒皆潰富勒呼禦戰兵敗死焉金史本傳内族慶善努名承立字獻甫興定元年以功進保大軍節度使行帥府事於鄜州二年五月夏人率步騎三千由葭州入㓂慶善努以兵逆之戰於馬吉峰殺百餘人斬酋首二級生擒數十人獲馬三十餘匹三年四月夏人據通秦寨慶善努遣提控納合邁珠討之夏人以步騎二萬逆戰邁珠擊敗之夏人由葭蘆川遁去斬首八百級俄而復攻寨據之慶善努率兵與戰斬首五千級復其寨詔賜慶善努金帶一將士賞賚有差四年四月破夏兵於宥州斬首千餘級圍神堆府援兵大至復擊走之金史本傳完顔額爾克為同州節度使宣宗興定時元兵取同州額爾克死之續文獻通考完顔禄錦中都路額特赫格們明安人除保大軍節度使興定五年鄜州破禄錦自投崖下死焉贈特進知延安府事詔陜西行省訪其子孫以聞金史本傳赫舍哩鶴夀河北西路山春猛安人權元帥左都監行元帥府於鄜州興定五年十月鄜州破鶴夀與數騎突出城追及之鶴夀據土山力戰而死諡果勇金史本傳鈕祜禄資祿本姓張氏咸平府人興定五年遙授隴安軍節度使俄改金安軍詔曰陜西行省奏軍官闕員卿乆在行陣御下有法舊𨽻士卒多在京兆今正防秋闗河要衝悉心備禦將兵救鄜州閏十二月鄜州破被執不肯降遂死贈銀青榮禄大夫中京留守元光元年言事者謂資祿褒贈尚薄詔錄其二子烈山林泉陞職一等陜西行省軍中用之金史本傳完顔霆本姓李氏中都寳坻人興定五年改定國軍節度使兼同知京兆府事元光元年陜西行省博索奏京兆南山宻邇宋境官民遷避其間者無慮百萬人可遣官鎮撫庻幾不生他變宣宗以為然十月霆以本官為安撫使守同知歸德府惟宏大司農丞郭浩為副使分䕶百姓之遷南山者元光二年卒金史本傳完顔哈逹名瞻字景山興定二年知延安府事兼鄜延路兵馬都總管三年夏人犯通秦合逹出兵擊之四年為元帥右都監屯延安十月夏人攻綏德州哈達將兵敗之五年五月知延安府事兼前職十一月夏人攻安塞堡哈達夜襲其營夏人大潰元光元年權參知政事行省事於京兆未幾真拜北兵既破葭州哈達率兵復取之正大二年陜西旱甚哈逹齋戒請雨雨澍是歲大稔民立石頌德延安既殘毁哈達招集散亡助其耕墾自是延安之民稍復耕稼之利金史本傳元石天應字瑞之興中永德人太祖時從穆呼哩征陜右攻葭州㧞之因説穆呼哩曰此州當金夏之衝居人健勇倉庫豐實宜命將守之多造舟楫以備不虞穆呼哩然之表授陜西河東路行臺兵馬都元帥以勁兵五千留守葭蘆遂造舟楫建浮橋先是葭守王公佐収合餘燼將圖復故地及見橋成遂潰去於是分兵四出悉定葭綏之地元史本傳田雄字毅英北京人𨽻穆呼哩麾下從攻鄜坊綏葭諸州有功太宗時從攻興元又破楨州雷家堡授鎮撫陜西總管京兆等路事時闗中苦於兵革郡縣蕭然雄披荆􅁄立官府開陳禍福招徠四山堡砦之未降者獲其人皆慰遣之由是來附者日衆雄乃敎民力田京兆大治事聞賜金符元史本傳亷希憲字善甫博囉哈雅子世祖以京兆分地命希憲為宣撫使京兆控制隴蜀諸王貴藩分布左右民雜羌戎尤號難治希憲講求民病抑强扶弱暇日從名儒若許衡姚樞輩諮訪治道首請用衡提舉京兆學校敎育人材為根本計國制為士者無𨽻奴籍京兆多豪强廢令不行希憲至悉令著籍為儒有民妻與卜者厭詛其夫殺之獄成僚佐皆言方大旱卜者宜减死希憲議當伏法已而大雨立應世祖即位併京兆四川為一道以希憲為宣撫使劉太平和嚕海入京兆謀為變希憲至宣布詔㫖安諭六盤未幾斷事官告琿塔哈已反約劉太平和嚕海同日俱發希憲得報遣萬户劉哈瑪爾等掩捕劉太平和嚕海及其黨悉置獄㑹有詔赦至希憲命絞太平等於獄尸於通衢方出迎詔人心遂安乃遣使自劾帝深善之别賜金虎符使節制諸軍詔以為中書右丞行秦蜀省事元史本傳楊惟中字彦誠𢎞州人世祖以太弟得開府專封拜乃奏遷陜右四川宣撫使諸軍帥横侈病民郭千户者尤甚惟中戮之以徇闗中肅然元史本傳賽音迪延齊沙木斯鼎一名烏瑪喇囘囘人至元元年置陜西五路行中書省出為平章政事蒞官三年增户九千五百六十五軍一萬二千二百五十五鈔三百三十一錠屯田糧九萬七千二十一石中書以聞詔賞銀五千兩仍命陜西五路大小官屬並聽節制八年命行省事於興元元史本傳沙木斯字得之其先大食國人後家真定至元二年拜陜西行臺監察御史即上封事十條皆一時羣臣所不敢言者戚里有執政陜西行省者恣為非道沙木斯發其罪而按之輙棄職夜遁有詔勿逮問然猶杖其私人元史本傳趙炳字彦明惠州灤陽人至元九年授京兆路總管兼府尹皇子安西王開府於秦詔治宫室悉聽炳裁製王府吏卒横暴擾民者即建白繩以法自是豪猾歛戢有㫖以解州鹽賦給王府經費歲久積逋二十餘萬緡有司追理僅獲三之一民已不堪炳宻啟王遽命免徴㑹王北伐詔以京兆一年之賦充軍資炳復請曰所徵逋課足佐軍用可貸歲賦以蘇民力令下秦民大悦元史本傳李德輝字仲實通州潞縣人憲宗割京兆𨽻世祖潛藩擇廷臣能理財賦者俾調軍食以德輝為使時汪世顯兵數萬仰哺德輝乃募民入粟陸挽興元水漕嘉陵未期年而軍儲充羡至元七年安西王鎮闗中奏以德輝為輔遂改安西王相至則視瀕涇營牧故地可得數千頃起廬舍疏溝澮假牛種田具於貧民二千家屯田其中歲得粟麥芻藁萬計元史本傳張雄飛字鵬舉琅琊臨沂人遷同知京兆總管府事宗室公主有家奴逃渭南民間為贅壻主適過臨潼識之捕其奴與妻及妻之父母皆械繫之盡沒其家貲雄飛與主爭辯辭色俱厲主不得已以奴妻及妻之父母家貲還之惟挾其奴以去元史本傳李呼喇濟一名庭玉隴西人至元十四年授延安路管軍招討使圖嚕叛於六盤山呼喇濟以延安路軍㑹巴爾斯台趙炳及總帥府兵於六盤敗圖嚕俘其孥還授京兆延安鳯翔三路管軍都尉兼屯田守衛事二十三年以老病乞歸元貞二年入覲授陜西等處行中書省右丞議本省公事卒諡襄敏元史本傳許扆字君黼一名和爾果斯絳州曲沃人成宗即位遷陜西行中書省右丞時闗中饑議發倉粟賑之同列以未得請於朝不可和爾果斯曰民為邦本今饑餒如此若俟命下無及矣擅發之罪吾當獨任之不以累公等遂大發粟不數日命亦下明年旱禱於終南山而雨歲以大熟民皆畫像祀之元史許國楨傳王利用字國賔通州潞縣人大德二年改安西興元兩路總管其在興元减職田租額站户之役於他郡者悉除之民甚便焉有婦毒殺其夫問所從來吏敎婦指為富商所貨利用曰家富而貨毒藥豈人情乎訊之果寃元史本傳田滋字榮甫開封人大德十年拜陜西行省參知政事時陜西不雨三年道過西嶽因禱曰滋奉命來叅省事而西安不雨者三年民饑而死滋將何歸願神降甘澤以福黎庻到官果大雨滋即開倉以麥五千餘石給小民無種者俾來歲收成以償官民大恱未幾以疾卒於位元史本傳趙世延字子敬居雲中北邊大德十年除安西路總管安西故京兆省臺所治號稱㑹府前政壅滯者三千牘世延既至不三月剖決殆盡陜民饑省臺議請於朝賑之世延曰救荒如救火願先發廩以賑朝廷設不允世延當傾家財若身以償省臺從之所活者衆元史本傳王琚字仲瑗濟南鄒平人大德間為縣令與伯顔帖木兒共疏涇渠後遷陜西諸道行御史臺監察御史上言於豐利渠上更開石渠渠成民頼之涇陽縣志阿爾哈雅輝和爾氏集賢大學士圖烈之子至治初出為平章政事歴陜西省有惠政元史本傳滿濟勒噶台黙爾吉特人泰定四年拜陜西行臺治書侍御史闗陜大饑賑貸有不及者盡出私財以周貧民所活甚衆元史本傳奈曼台穆呼哩五世孫天厯二年遷陜西行省平章政事闗中大饑詔募民入粟予爵四方富民應命輸粟露積闗下初河南饑告糴闗中闗中民遏糴至是闗吏乃河南人修宿怨拒粟使不得入奈曼台杖闗吏而入其粟時入闗粟雖多而貧民乏鈔以糴奈曼台取官庫未燬昏鈔得五百萬緍識以省印給民行用俟官給賑饑鈔如數易之先時民或就食他所多毁墻屋以徃奈曼台諭之曰明年歲稔爾當復還其勿毁民由是不敢毁及明年還皆得安堵如初元史本傳張養浩字希孟濟南人天歴二年闗中大旱饑民相食特拜陜西行臺中丞既就道遇餓者則賑之死者則𦵏之道經華山禱雨嶽祠泣拜不能起天忽隂翳一雨二日及到官復禱於社壇大雨如注水三尺乃止禾黍自生秦人大喜時斗米直十三緡民持鈔出糴稍昏即不用詣庫換易則豪猾黨蔽易十與五累日不可得民大困乃檢庫中未毁昬鈔文可騐者得一千八十五萬五千餘緍悉以印記其背又刻十貫五貫給散貧乏命米商視印記出糶詣庫騐數以易之於是吏弊不敢行到官四月未嘗家居止宿公署夜則禱於天晝則出賑饑民終日無少怠每一念至即撫膺痛哭遂得疾不起卒年六十闗中之人哀之如失父母至順二年贈陜西等處行中書省平章政事諡文忠元史本傳多爾濟勒巴字惟中穆呼哩七世孫拜中書平章政事陜州危急因出為陜西行臺御史大夫中途聞商州陷武闗不守即兼程至奉元而賊已至鴻門吏白涓日署事不許曰賊勢若此尚何顧隂陽拘忌哉即就署督諸軍復商州乃修築奉元城壘募民為兵出庫所藏銀為大錢射而中的者賞之由是人皆為精兵金商義兵甚精銳列其功以聞賜勅書褒奬之其軍遂盛而國家獲其用金州由興元鳯翔逹奉元道里㢠廻逺乃開義谷創置七驛路近以便未幾左遷闗中人遮道涕泣曰生我者公也何遽去我而不留乎多爾濟勒巴慰遣之不聽乃從間道得出元史本傳王思誠字致道兖州磁陽人中進士第至正十二年為陜西行臺治書侍御史十七年春紅巾陷商州奪七盤進據藍田縣距奉元一舍思誠㑹豫王阿喇特納實哩及省院官於安西王邸衆洶懼無言思誠曰陜西重地天下之重輕繫焉察罕特穆爾河南名將賊素畏之宜遣使求援此上䇿也乃移書察罕特穆爾得書大喜遂提輕兵五千倍道來援思誠犒軍於鳯凰山還定守禦九事夜宿臺中未嘗解衣既而援兵破賊思誠請於朝宜命察罕特穆爾專守闗陜詔從之元史本傳察罕特穆爾字廷瑞系出北庭家河南為穎州沈丘人至正十六年僉河北行樞宻院事十七年賊陷商州直趨長安至灞上三輔震恐陜西省臺來告急察罕特穆爾即領大衆入潼闗長驅而前與賊遇戰輙勝殺獲以億萬計賊餘黨皆散潰走南山入興元朝廷嘉其功授陜西行省左丞未幾賊陷秦隴窺鳯翔察罕特穆爾即先分兵入守鳯翔城而遣諜者誘賊圍鳯翔賊果來圍之數十重察罕特穆爾自將鐵騎晝夜馳二百里徃赴比去城里所分軍張左右翼掩擊之城中軍亦開門鼔譟而出内外合擊斬首數萬級餘黨遁還闗中悉定進陜西行省右丞兼陜西行臺侍御史察罕特穆爾益務練兵訓農以平定四方為己責拜陜西行省平章政事仍兼同知行樞宻院事便冝行事元史本傳僧格實哩為陜西行臺御史守官家洞及明大將軍徐逹遣兵攻之勢窮不屈與妻俱投崖死賈志明常遇春濠之定逺人為左副將軍西渡闗下奉元路西逼鳯翔其平章李思齊率所部十餘萬衆奔臨洮鳯翔下世法錄遇春平奉元鳯翔所至望風歸服不妄殺一人令將士所過無得搶掠秦人德之為立祠賈志馮勝初名國勝更名宗異最後名勝定逺人從大將軍北討西趣潼闗其將張德欽等來逆戰大敗之遂奪潼闗守焉復西下華州拜右副將軍詔渡河發陜西取鳯翔遂渡隴俄復為右都督再以右副將軍同大將軍出西安分兵狥畧陽禽元平章蔡琳遂入沔州又遣别將繇鳯翔入連雲棧合攻興元克之論功封宋國公明年出鎮陜西修城隍簡士馬又明年出塞後還鎮陜西改河南世法錄耿炳文濠人名山藏洪武初鎮守陜西修築涇陽洪堰又濬渠十萬三千餘丈雍大記沐英字文英定逺人洪武九年鎮闗西威望大著名山藏郭敦字仲厚山西堂邑人鄉舉累官陜西左叅政端重有威僚屬敬畏累進户部尚書鎮守陜西邊陲晏然其出闗僅跨一騾攜老蒼頭自隨賈志沈福字應隆石康人永樂乙未進士廵按陜西時有布商被殺投屍塘中不可蹤跡一日福方視事見蛇盤轉昻首若有所訴福曰蛇告我矣令人隨蛇所之果得謀商者置之法人以為神廣東志魏源字文淵江西建昌人永樂進士除御史廵按陜西西安大疫奏言諸府倉粟積一千九十餘萬石足支十年今民疫妨農請輸鈔代兩稅之半從之明史藳陳鎰字有戒吳人永樂十年進士擢副都御史鎮陜西得便宜行事寛洪清慎悉民疾苦不作聲色專務安輯凡練兵屯田水利鹽法事有經畫薦按察使王文副使金濓入内臺正統元年上疏請定輸粟贖罪法在陜十餘年敎興政理每入朝民必遮道送不忍舍比還歡迎父老或走數程乆旱鎰至必雨乆雨鎰至必霽世法錄鎰守陜西正統末以左都御史按行通州鎰所至有聲績而闗中尤著每行部人有疾病誓得為鎰一舁肩輿輙愈鎰出則老稚歡呼爭前舁之鎰笑弗却也至是陜大饑陜父老上書願得鎰至以慰雲霓之望詔鎰徃賑之鎰至陜民舉手加額曰今復何幸得見我慈父爺爺也竣事還賜玉帶金幣羊酒景泰中卒諡僖敏陜人廟祀之若肹蠁然明史竊徐瑄字子敬南直嘉定人正統中擢右僉都御史廵撫延綏嚴斥堠繕甲兵督屯種修學校虜入㓂四戰皆㨗以丁艱奪情遂上疏致仕萬姓統譜王禎邳州人右府都督正統中鎮守延綏於榆林建設城鎮及沿邊墩臺衛堡倉塲控制邊鄙延綏鎮志王翺字九􅆏鹽山人永樂十三年進士英宗初鎮守陜西威惠著聞名山藏馬恭唐縣人由舉人除陜西道監察御史正統八年奉命徃陜西廵邊尋又奉命協贊延綏等處軍務九載任滿陞都察院右僉都御史仍理前事景泰二年以殺賊功陞右副都御史㳟在邊十餘年軍政修明下人恱服四年以老疾致仕畿輔志耿九疇字禹範盧氏人永樂末進士景泰三年鎮守陜西威望益著邊將請添兵臨洮諸衛下九疇議九疇言邊城士卒不少倘將帥善馭之一可當百不然徒冗食耳復言今邊民春夏出田秋冬移入塞夫民春夏田而秋冬塞何以邊將為請有民移者罪之明年轉右副都御史仍鎮其地守臣逮耀州民三百餘謂其倡妖悉坐死罪九疇曰狂民妄言實非反也悉减死論天順初召至京特陞右都御史名山藏初六部卿佐使外文移不得徑下按察使以故偃蹇不受約九疇首奏下之雍大記廵按雍大記作天順間撫陜西誤劉廣衡字克平萬安人永樂末進士景泰初歴左副都御史鎮守陜西請遇災傷毋俟勘報即除其賦庶有司不得借覆核隂行科率從之居官以亷節稱明史藳李裕字資德江西豐城人景泰進士授御史廵按陜西上安邊八事明史藳項忠字藎臣淅之嘉興人正統七年進士天順年擢陜西按察使值歲饑發廩給民不待報所活萬計丁内艱軍民詣闕借留者幾千人詔起復以大理寺卿召借者再至改右副都御史廵撫其地成化元年㓂犯延綏忠禦之戰屢㨗㓂遁西安水多鹵宋渠久廢忠開渠三十里又鑿涇陽鄭白故渠溉田七萬頃二年土畨摩囉歡入㓂忠提督軍務與彰武伯楊信禦之㓂復遁三年召還掌院事懐麓堂集王槩字同節江西廬陵人天順中以右副都御史廵撫陜西設法救荒全活數萬人流民歸業遷大理卿馮志黄紱字用章封邱人廵撫延綏嘗行部見軍婦片布遮下體乃歎曰兵之貧至此乃驅之戰守耶於是令預支米三月㑹詔毁庵寺紱使汰尼給配鰥軍人悦及去尼有攜子女拜送道路者賈志楊信字文實六合人幼武勇天順元年陞都督同知鎮延綏路明年博囉摩囉歡入塞擊退之明年又入寧夏塞信合武平伯陳友兵來擊遂遁去四年封彰武伯食禄千石與世劵萬姓統譜張欽睢寧人留守右衛指揮僉事以都督僉事總兵延綏慶陽諸路有柴溝之㨗賜白金綵幣進都督同知專守延綏敵復入安邊營欽連戰有功特勅佩將軍印延綏鎮志馬文升字負圖河南鈞州人景泰二年進士成化四年特拜文升廵撫陜西世法錄時漢中流民李鬍子倡妖言挾衆叛潼闗軍餘火蝎兒蒲城民王彪鑄山行刼文升悉捕滅之虜牧河套文升築城堡募士授兵皆徙去延綏旱設法轉給芻粟條陳時事若禦戎䇿上嘉納之名山藏文升廵撫陜西奉公伸法亡所撓枉奸猾弊治者悉鏟發無隱貸經畧諸邊有方而威惠行於吏民雍大記朱永字景昌河南夏邑人成化初虜阿羅㓂延綏永以平虜將軍與左都御史王越擊之擒斬首虜數多虜馬牛羊甲械以萬計降勅即軍中予世侯留鎮三邊它虜復屯栁榆莊諸處出沒為患永復與戰敗之克獲多賜金幣良厚名山藏王越字世昌濬縣人景泰辛未進士擢右副都御史成化庚寅奉命出延綏至崖窯川擒賊四十餘人斬首加百遷左副都御史又於黄草梁擒賊五人斬首百二十進右都御史癸巳進左都御史出延綏韓家塢斬首二百八十餘庚子封威寧伯充總兵官鎮延綏尋罷𢎞治丁巳特加太子太保總制甘肅寧夏延綏軍務鎮守廵撫而下悉聽節制加太保卒公久膺帥寄歴西北諸鎮身經百戰於邊徼險易敵情誠偽將士之强弱勞逸皆歴歴在胸臆每出竒取㨗謀定後發同事者莫測所向李東陽撰墓誌成化九年越偵知敵老弱巢紅鹽池率輕騎晝夜馳三百餘里襲擊之斬獲甚衆敵自據套以來無歲不深入殺掠人畜至數千百萬至是敵内失其孥相與悲泣渡河北去患少弭世法錄秦紘字世纓單人景泰中進士知府谷縣日與將官講兵料敵廵撫都御史徐廷璋薦陞葭州知州成化十九年以副都御史撫陜西秦府旗尉横苦民捕論不貸秦王怒入奏紘逮下詔獄命内臣尚亨籍紘家黄絹一疋故衣數事而已亨太息以聞上歎嗟良久曰紘官不小貧至是乎立釋之賜鈔萬貫𢎞治十五年起尚書兼都御史總制三邊修邊闗腹裏城堡闗隘萬四千一百九處所剷崖三千七百餘里正德初還致仕名山藏鄭時舒城人景泰辛未進士名山藏成化中為都御史廵撫陜西值西安諸郡大饑人食草木時奏請江南湖襄糧及内帑銀數十萬以濟既至命布政司等官分投給賑各盡其方饑民全活者甚衆流移安堵闗陜以寧特賜璽書奬勞尋以極論弊政謫貴州叅政起行日長安老幼莫不號泣聲動天地逺近奔走相送皆以手爭杠其輿盡境而還雍大記張敷華字公實安福人舉天順八年進士𢎞治八年廵撫陜西時邊民愁困逃亡田荒不治居民代賦甚苦敷華請酌五年為期有人佃種則輕其賦無者量給見在人户暫為代納又請開鹽引茶斤並納草納米之途以廣儲積邊人頼焉終南山有妖僧張金峰聚徒立號誘男婦燒香多被廹脅敷華宻令父老以拜佛為名直入生擒之既平賜勅奬諭名山藏許進字季升其先長安人後居靈寳成化二年進士孝宗四年遷陜西按察使九年進右副都御史廵撫陜西亷察守令臧否軍民利病上下肅然令藩臬廵所部府十日州縣三日籍記行事憑而稽之先是張敷華撫陜有名至是闗中人謠曰明鏡張許重光名山藏進廵撫陜西力格彊禦不為勢怵馭下有權吏民無不神明其政雍大記余子俊字士英青神人景泰二年進士天順初知西安府西安故劇府兼邊事旁午子俊酬酢治辦六年為闗中冠名山藏子俊知西安府歲饑發廩出貸仍措畫如數償之西安水多鹵宋龍首渠久廢或議引潏河水自丈八頭置牐入城以洩於隍積滓既久城且壊子俊因丈八之制開新渠貫城中經漢故城逹於渭以免公私之患人稱為余公渠都御史項忠上其治行賜勅旌異擢右叅政督三邊軍務遷右布政使轉左使擢右副都御史廵撫延綏相度邊地每徒行數十里盡得形勢上疏請於沿邊墩臺之隙築墻建堡又於界至之隙因山剗削其髙若城每二三里則為敵臺崖砦連比不絶又於中空築短墻横一斜二如偃月狀以為偵敵避射之所自清水營之紫城砦至寧夏之花馬池東西延袤二千里凡為堡十有二壕墻崖砦八百有竒小墩七十邊墩十五又移定邊安邊二營於近地或以為棄地可惜子俊謂二營就險可守兼利耕牧省轉輸費是地未嘗棄也又請置榆林衛取逋兵當勾及謫戍南土者之子孫益之凡内邊曠地皆墾為屯田歲獲數萬石立武學以敎子弟之俊秀者軍中器用鉅細畢具率範鉄為之識以歲月蔬果之類亦隨宜敎藝時加廵省自是敵過城下必囓指相顧莫敢近轉左副都御史進右都御史移鎮陜西陳弭盗安民數事涇陽有舊堰不利灌溉每治輙壊子俊鑿山開道溉田千餘頃又鑿南山道直抵漢中以便饋餉召拜兵部尚書懐麓堂集原傑山西陽城人撫治商洛左副都御史成化間巨㓂王彪倡亂漢南流民依聚猖獗特遣傑親履其地招撫流移傑安集之餘議建鄖陽撫院析商縣東為商南南為山陽陞商為州專設撫治道奉璽書監臨屬於鄖撫民始安堵比去士民請留特加尚書商州志按鄖撫兼轄興商鄖撫有事闗興商者入陜宦吕雯字天章北直安州人癸酉舉人廵撫延綏有警雯曰敵既深入宜堅壁待之彼無所獲必因而歸歸則以勁兵邀其後可以得志果如其言既又築邊城㓂不得近山陜饑榆林獨稔民流集者甚衆雯恐生變多方活之民恃以安賈志零按馬志作吕與此異熊繡字汝明其先豐城人占籍道州登成化二年進士出按陜西有布政于璠贓跡顯著棄官夜遁繡追璠急璠誣奏繡他事璠所親當路力主謪繡知清豐陜民詣闕訴寃者數百人居數年陜大祲鳯翔缺知府繡抵鳯翔㑹天旱行禱岐山之下應期雨至先時廵陜辨一疑獄其人一聞繡至持祀像入謁𢎞治初累陞右副都御史廵撫延綏名山藏范瑛字俊彦進士廵按陜西專理茶禁先是三邊缺馬廷議欲資茶以市馬瑛謂禁太嚴則利盡刀錐以病商太弛則利歸權勢以病國乃斟酌行之於是官茶行而邊馬足賈志李祥臨淮人以都督僉事鎮守延綏忠勇絶倫謀畧出衆每遇敵為士卒先累建竒功有驍將風軍中服其勇敢以其面黒呼為黒太師延綏鎮志岳嵩舒城人渉獵經史襲延安衛指揮僉事以知勇累立竒功遷延綏鎮守總兵與都御史余子俊協謀修邊有功延綏鎮志蕭禎字彦祥泰和人進士歴官廵撫陜西右副都御史得便宜行事陜西當凶荒之餘民初復業禎加意安輯乃内務蓄積外為備禦兵民晏然歲當録囚得可矜疑者悉置輕典奏上囚多免死是時一禆帥犯法素有聲勢為請托者多卒論如律復以平㓂功有文綺寳鈔之賜官至尚書賈志李興河南嵩縣人進士𢎞治中廵按陜西威力風行奸盗屏息儀賔樊某毆父諸司莫敢問興亷得之縳至階下杖死其他鋤强戢暴皆類此賈志時有叅將郭鏞怙勢違法害人諸司皆畏之間有劾奏者郭即令人刼於道并其奏章奪之興乃宻奏其罪按誅於市百姓稱快時省城諸郡王府多列通衢居民乗騎徃來貿易過者不下王即杖之興具奏言未便請自今令民勿下上從之雍大記黄寳長沙人成化進士擢都御史廵撫陜西時潼闗大饑城堡多圮寳肅紀律清壁壘豫餽餉逺烽燧秦地以寧以忤劉瑾歸湖廣通志楊一清字應寧雲南安寧州人成化八年進士𢎞治四年補陜西提學副使歲試必遍八府三邊建書院以㧞各學之俊秀躬督敎令讀朱子白鹿洞規修禮噐樂噐弦歌盈於西土所識㧞士如吕柟康海李夢陽之倫稱許為大魁為聞人皆如其言當是時宗室不能奪生員之婚撫按不能撓課試之權為國朝提學之最一清留滯闗中八載復以其暇講究邊事明史稿本傳𢎞治中擢左副都御史督理陜西馬政一清條上所宜及易置馬吏輙得施行十七年北人潛伏河套兵部尚書劉大夏薦一清兼廵撫陜西經畧防禦明年設都御史總制陜西延綏甘肅寧夏軍務開府固原命一清為之尋進右都御史正德元年冬敵復擁衆入套一清揚兵以待之敵渡河北遁一清謂河套即古朔方地唐張仁愿築三受降城以絶㓂警今宜因險而墻之上疏議修築上可其奏劉瑾憾一清不先白已阻尼之其年告休家居一清多才好問有謀善斷邊事旁午疏占指授悉中機宜所居止時演習營陣曰武侯衛公未嘗廢也時告諭諸將無事時常如有事隄防有事時常如無事鎮静故其總邊無所廢夫安化王寘鐇反徵拜陜西總制既行視邊堡訪求營衛部領賢否更置之罷邊軍繁重科差清革鎮守太監若總兵而下所私役軍人軍將所據草灘湖地悉令還官均其屯田之賦凡有征調軍士全隊而出無占隱者又請調延綏寧夏陜西三邊兵分道驅逐河西賊出境然後修沿邊舊守墩臺城堡以圖永久自劉瑾用邊糧浥爛罪先後守臣守臣不復積貯軍儲坐空一清多方召糴公私稍備尋召為户部尚書調吏部入内閣致仕世宗四年虜大入闗隴即家拜兵部尚書兼左都御史提督陜西三邊温詔褒美比之趙充國馬援郭子儀故相行邊自一清始名山藏洪鍾字宣之錢塘人進士𢎞治六年川賊藍廷瑞鄢本恕等聚衆徃來㓂暴川陜騷動勅鍾總督川陜同廵撫林俊勦捕鍾渉歴險阻深入賊巢運謀設竒躬冐矢石前後斬獲招降以十數萬擒其渠魁二十八人露布以聞加鍾太子太保賜玉帶賈志藍章字文繡山東即墨人進士以右僉都御史廵撫陜西忤逆瑾左遷通判瑾敗復撫陜時蜀鴇賊㓂掠漢中章選將練兵殱其首惡餘黨悉平以功陞右副都御史賈志陳壽字本仁遼東寧逺衞籍新淦人進士累官右副都御史廵撫延綏㑹㓂分兵入掠躬親甲胄為將卒先遇㓂鏖戰擒獲八十有餘未幾火篩脫羅干諸部糾衆大至先以百餘騎誘戰諸將請赴之壽自出帳擁左右數十騎據牀飲食如無事敵望見疑之遂引去既而諸路將領擊㓂皆大㨗斬首數千級賈志壽亷名甚著粗衣糲食如寒士廵撫延綏創火篩有功時同事諷壽註子弟於戰籍壽曰吾子弟未諳弓馬豈可欺罔以邀爵賞乎時論多其賢亷平錄正德九年以都御史廵撫陜西下車旬日即出榜諭衆利病之原罔不悉具仍令長安父老面陳得失量斗斛平市價禁有司官市民物時劇盗數十剽掠良民命捕之盗賊屏息又下令曰遭䘮者不許停柩婚嫁不許索財人皆遵之夏大旱令各街巷開渠以通隂氣减刑殺清寃獄齋心誠禱天乃大雨歲大熟時勢豪中官廖堂煽虐歲貢毡帳縻費鉅萬民苦於科削夀連疏劾罷之遷南京刑部侍郎瀕行秦中老少相與爭送遮留雍大記張安大同人𢎞治十三年以都督僉事鎮守延綏為人多謀畧嘗遇敵以單騎却之人服其勇延綏鎮志王廷相字子衡儀封人𢎞治十五年進士正德中廵按陜西憲度益振鎮守太監廖鑾煽虐闗中廷相隨事禁革鑾殊誓恨名山藏張璿字仲齊晋州人正德戊辰進士授御史廵按茶馬時逆瑾煽虐凡官秦地者競納交其親族璿一切拒之總兵曹雄與瑾聨姻其子入京過西安衆趨承恐後璿獨不為禮雄子銜之毁於瑾使人伺察者三卒無所得畿輔志才寛字汝栗北直遷安人成化中進士初任西安知府後以副都御史廵撫陜西改兵部尋兼副都御史總制三邊好野戰不拘陣畧值火篩在套率師由興武營擊之斬首數十級狃勝深入忽中流矢卒於陣事聞廕子百户錦衣衛世襲賈志寛𢎞治中知西安府惠民禮下其治坦濶遇事裁决如響不較小過民思慕之雍大記有民失金於食店急白寛寛仰見鷹飛又有蜘蛛墜案曰店中必有姓朱名英者得其金詰得其人果出金以給失者至今民謠曰才寛斷朱英西安府志周廷徵字公賢麻城人𢎞治己酉舉人以敎諭擢御史按陜西時安化王寘鐇反廷徵斷以先發後聞之義調榆林副總叅遊時源等分布要害仍授楊英以計為書宻逹仇鉞擒寘鐇何錦等械送京師而都御史楊一清太監張永兵始至張以功不由己乃追還寘鐇别自報㨗又盡奪寧夏將士功給事中郗䕫懼而自盡寧夏幾至再變廷徵又為撫定而白其功於朝㝷陞九江兵備副使湖廣通志張泰字世亨肅寧人進士歴任陜西自臬藩至廵撫俱以亷能見稱陞都察院右副都御史總制陜西三邊軍務行部過蘭疏西郭故道以興水利復開小渠以利城居者餘悉由東郭出以達於川甫彌月隍塹周滿人沾其利賈志張文明字應金山西陽曲人正德辛未進士丁丑按陜西發中官廖鑾貪横捕其黨二十四人寘於法明年武宗西幸上書切諫指斥權倖謂江彬有可斬十罪大忤朝貴謫電白縣典史賈志王杲汶上人正德甲戍進士授監察御史廵視陜西㑹歲歉詔遣二中貴人分守蘭靖杲上言强邊饑歲民救死不贍若額外設官必增𣲖困民乞取囘内廷供掃除職庻合祖制總兵官趙文貪墨恇怯杲列文所犯狀文竟罷鎮累官户部尚書名山藏李獻洛陽人進士廵按陜西茶馬檄漢中府不許開送地畝茶以杜科擾侵漁之弊馬志冦天叙字子惇榆次人正德三年進士嘉靖中廵撫陜西歲大饑悉心賑濟㑹織造太監至御史謂闗中疲敝請天叙㑹疏停止天叙曰遽言上未必聽遲至秋冬極言此中旱災請賑濟上必惻然則太監可召回也至秋冬以陜饑上聞請停止織造上果召回太監名山藏安國綏德衛人武狀元為榆林副將以功陞都督同知鎮守有文武才號令簡易人自不犯尤善撫恤將士延安府志劉文字道顯慶陽衛指揮使以功鎮延綏民望旌旗所駐如父母至及其去也扶轂涕泣充塞道路每諸將晨謁畢即召入閣中計事人獻所長至臨陣授畫獨其人知之故所向成功且忠信亮易上下咸親雖古良將弗如也尋以疾卒於鎮諡武襄延綏鎮志李鉞字䖍甫河南祥符人進士嘉靖壬午春以兵侍兼僉都御史行邊敵入延綏設伏邀擊之斬首百餘級或請以㨗聞曰偶勝耳惡足為功鎮廵奏㨗璽書嘉之賈志周金字子庚武進人正德戊辰進士以僉都御史廵撫延綏㑹大同殺都御史報至金乃開門召諸將吏軍卒盡入環列庭下謂之曰若輩知大同殺都御史乎衆曰知之金曰若輩以殺之為得已耶非得已耶衆叩頭曰狂賊自取族耳尚何道金曰不然邊人勞苦甚矣而又虐使之是趣之殺也假令上下素相愛若父子彼將倚以為命縱授之刃使殺焉其誰忍乎衆大歡呼叩頭退當是時以片言解上下疑阻自謂得應機之知云馮志王憲字惟綱山東東平人𢎞治中進士嘉靖五年以兵部尚書兼都察院右都御史總制陜西三邊軍務簡静嚴肅將士凛然不敢犯時邊外部衆千餘由花馬池入犯黒水苑憲調榆林各路兵戰於細溝堡斬首三百餘級五日四㨗加太子太保廕子錦衣衛百户馬志王瓊字德華山西太原人進士嘉靖七年以兵部尚書兼右副都御史總制陜西三邊軍務八年套虜入冦統兵三萬出花馬池禦之斬首六十餘級拜吏部尚書馬志陳璘字邦瑞陽曲人𢎞治癸丑進士拜御史遷陜西苑馬少卿馬大蕃息時少師楊公一清總制三邊疏薦之遷布政司叅政監督軍餉於是邊儲大足遷右副都御史廵撫延綏時邊警特甚璘繕城堡利噐械足倉廪募兵選將㓂入輙斬獲屢賜金幣時總兵柳勇參將李永定把總許國卜雲交結中貴縁為姦利邊人目為四害璘劾罷之三軍稱快㑹江彬導上北廵駐蹕延綏三閲月彬黨横甚璘執大體酌時宜彬黨莫能害有成獄彬持之亦不聼邊人呼為真都御史云苑洛集唐龍字虞佐浙江蘭谿人進士以監察御史陞陜西按察副使提督學校時士學趨詭異乃新正學書院選士羣肄之剗其竒靡而約諸理其所登進悉為名臣嘉靖十年塞外吉囊擁衆十五萬入據河套諳達衆號四十萬亦出沒邊徼全陜戒嚴特陞兵部尚書兼副都御史總制三邊明年秋敵以精騎三千潰鎮逺闗入薄平逺城乃督梁震王効等分左右哨馳至柳門夾擊破之敵浮河而遁吉囊自將十萬騎入營花馬池乃令曰侵延綏張鳯主之寧夏固原王効劉文主之其折衝批亢則委之梁震部分已定敵從青沙峴入延安文率所部迎戰伏起乘之敵大敗於時王効敗敵於興武營梁震敗敵於乾溝二旬間凡三㨗龍於三邊四鎮山川地形險阨歴歴如指諸掌為圖置座隅坐而籌之咸中機要動必有功在邊四年朝廷倚重賈志賈啟湖廣黄岡人進士任陜西苑馬寺卿後以右副都御史廵撫延綏練逹治體尤通相地觀象之術賈志王儀字克敬北直文安人進士擢御史廵按陜西值闗中饑疏請發公庾暨羡金分屬賑之漢中守素貪黠儀論其狀黜之秦府人虐奪民田場利亡筭王為之窟儀歸田於民府中自此斂戢賈志劉天和字飬和其先南昌人徙麻城正德三年進士授御史廵按陜西陜西鎮守中官廖堂煽虐人不堪命天和語其弟曰我徃治之必得罪則製囚衣以行既至悉縳堂舍人寘之法堂佯謝誣奏天和違㫖坐逮捕長安吏民慟哭天和車前後枳不得發壯者至掊梃行求堂欲捶殺之堂斂避良久益隂求刺客圖天和長安吏民豪者張傑王倫數十人嚙臂盟途䕶之天和所過舍為周諦其舍有無姦匿所止同卧起食為先嘗之至下錦衣良久降金壇丞嘉靖初陞山西提學副使尋改陜西一再陞以都察院右僉都御史督理陜軍餉楊一清薦為廵撫久之以副都御史廵撫如故則廵行山谷中召父老問所疾苦除罷之平漢中賊有功以母憂去十三年以兵部侍郎拒敵三邊居四歲前後與敵戰二十七合得敵首數千級先是天和諜知敵將大入集諸將以所賜金為牛酒饗士出二劔陳堂皇指左劍曰將不用命者徇此右劍曰卒不用命者徇此及期敵果入邊帥醉不備敵登陴天和聞之夜馳八十里至花馬池乃引而西天和召醉帥立斬之與延綏將周尚文追擊敵大破之天子即軍中加天和太子太保名山藏楊守禮字秉節山西蒲州人總督三邊軍務凡二歲最首功四百餘級降數千人加太子太保賈志任忠山東登州人進士廵撫陜西時三邊多所徵索忠移文令藩司酌量以義與之民受其利軍用亦足臨民寛惠御吏嚴威自守儉約卒於官以清白稱馬志趙廷瑞字信臣開州人進士嘉靖己亥廵撫陜西時諳達阿布哈率衆渡河住牧套中與總督劉天和商定方畧師大㨗進兵部右侍郎秦藩輔國將軍秉縱家奴責債動擊平民劾論之自是宗藩斂跡賈志張􅙆字鵠舉南直泰興人舉人以右副都御史廵撫延綏榆林孤懸塞外於九邊獨稱難守􅙆至即舉邊務之最急者條上十餘事上悉嘉納著為永規敵兵兩入兩敗之加右司馬仍錫金幣延綏鎮志張子立字原禮山東黄縣人進士以御史歴陞延綏廵撫修城堡開紅石硤以通水利民庻攸賴用兵西夏失利遂被逮士民號泣遮道中使亦泣下延人為立碑於學宫馬志周尚文陜西西安後衛指揮同知𢎞治正德中數出塞逐虜有功進指揮使歴陞征西將軍鎮守延綏與廵撫都御史賈起不恊方坐譴奪職㑹虜吉囊入㓂鋒甚銳總督尚書劉天和檄起之遂有黒水苑之戰自已至申凡三合軍氣乃振三鎮斬獲四百餘級陞尚文都督同知嘉靖十九年也名山藏浦鋐字汝噐山東登州人正德丁丑進士嘉靖二十年廵按陜西時楊爵以建言廷杖下詔獄鋐上疏申救被逮秦民䕶送至京被杖血肉淋漓見者不忍正視鋐坦然無一怨悔曰救爵乃盡按陜一事耳死何憾焉聞者泣下七日竟死賈志翁萬達字仁夫其先莆田人徙揭陽嘉靖五年進士二十二年陞陜西左右布政名山藏時藩祿不給聚訟盈庭萬逹裁處允宜人皆歡悦明年擢廵撫陜西簡將帥去貪庸廣客兵儲偫蓄修噐械固險要謹斥堠明賞罰西北邊備屹不可犯賈志曹邦輔字子忠山東定陶人嘉靖壬辰進士出撫陜西㑹敵入延綏殺掠甚衆邊臣匿不以聞邦輔上疏奏劾大將以下七人咸論如法秦宗人有殺人獄數年不决一訊而服奏正憲典賈志曾銑字子重江都人嘉靖八年進士二十五年秋敵犯陜西三邊督撫一時被逮總督難其人上以屬銑遂兼程徃時敵十萬騎由寧塞突入銑曰敵糾衆來當攻其所必救遂命中軍參將李珍率勁卒搗其巢穴斬獲百十一有竒竿以示敵敵大懼遁去銑復計曰醜衆頻年内侵如蹈無人之境今驟聞巢穴有急倉皇遁去不料我師邀其前也親督將士由新安邊外直趨定邊撃之黎明敵見大將旗鼔相顧錯愕遂大潰奪獲馬器無筭銑不以㨗聞御史勘功始奏銑績且有功不伐尤邊臣所難詔以銀幣重賞之明年復出塞征討賞銀幣有加銑感知遇益思圖報念套人為中國患乃上疏議復套因條為八事上令銑督同各邊撫鎮協心圖議務求長䇿嗣上方畧復條上十八事銑知上倚注方深晝夜講求演成行師機宜列為八圖次第其説上之於是領兵入套攻搗斬首二十七級生擒托克托呼一人餘斃矢石者甚衆獲馬牛駝及械器以千計敵十萬騎自寧塞入犯延安保安諸處銑遣叅將珍夜出塞刼其營帳斬首百餘級自是敵聞銑來皆嚙指多移營渡河矣時仇鸞為總兵驕恣悖逆隂洩事機銑劾其違法詔械繫鸞㑹嚴嵩父子方謀傾夏言鸞因重賂世蕃并揑危言搆銑羅織成獄天下寃之隆慶初詔贈尚書諡襄愍名山藏王以旂字士招江寧人正德辛未進士累官兵部尚書陜西總督曾銑倡議復套被逮命以旂代之入闗亟罷郡縣軍需停造器具又嚴盗馬之罰禁刼營之弊敵入波羅堡及高家堡皆督師敗之俘獲無筭修完延安等處城堡墩臺卒於固原諸鎮軍民為罷市者數日贈少保諡襄敏賈志張珩字佩玉山西石州人正德間進士授監察御史廵按陜西所至貞憲釐弊奬亷黜貪時稱名御史萬姓統譜珩陞右僉都御史撫延綏值歲饑躬茹疏糲一老妾供炊歛公私所有以飽士士見珩癯咸勸加飡至相對流涕後為兵部右侍郎總督三邊軍務卒諡襄敏延安鎮志任傑西安人總兵寧夏以才望調延綏賞罰明信謀勇兼長為敵所憚尤能制驕作懦實名將云延綏鎮志謝蘭字與德代州人進士陞右副都御史廵撫陜西上安攘方畧各有條理居常覈軍實恤民隐丁未秦隴大饑嘯聚山巖劍閣道阻蘭請帑賑恤擒治渠魁餘即解散督臣議復東勝蘭力言不可謂挑禍殃民恐貽西顧憂時朝議未定蘭矢以去就爭之未幾督臣得罪議遂寢人重其强毅有執云賈志賈應春字東陽正定人嘉靖癸未進士初任咸寧令善恤民隐有循良之譽歴陞陜西叅政值潼洛開採礦砂利微費鉅甚者山原無礦勒坐條鞭礦甲礦夫横被箠楚又織造絨疋為物善蛀黄蘆土鹻陪墊困窮皆疏聞祈罷三十二年以兵部侍郎兼僉都總督三邊時敵大舉入犯鄜延躬率師衝擊敵大衂甲寅延綏泥溝紅井二戰皆㨗凡四年斬獲千餘級賑恤瘡痍最首功召為兵部尚書賈志石永字壽卿北直威縣人進士歴陞陜西按察使持憲明慎民以乂安陞僉都廵撫延綏飭將練兵革冗役禁包占懲負販養勇敢謹間諜有黠㓂犯灰條溝前後斬首級獲駝馬器械甚衆賈志陳鳯延綏總兵嘉靖三十六年三月虜㓂延綏鳯死之賜贈廕祠死所名山藏康朗字用晦惠安人嘉靖乙未進士晉僉都御史開府鄖陽適漢中降􅉰激變屢師無功朗持檄諭之令束身來歸待以不死􅉰羅拜加額曰鄖院仁而有信必不我欺遂解去福建通志劉淮以都督僉事鎮守榆林淮忠勇有謀亷介自守讀書為文時稱儒將賈志程軏字信甫山東臨清人進士監察御史擢陜西副使歴布政進右副都御史四十年夏總督防秋令總兵曹世忠中軍金輅千總王節把總陳源殿敵襲陳源源戰死輅等弃弗援敵遂東掠安邊定邊西至螺山全陜大震軏論罷壬戍春以原官為三邊總督自陳源戰後士氣委靡公私匱竭軏以亷約率勵將士為文祭死事者哭而賑恤之軍復振敵入塞軏遣總兵趙岢吳鼎等迎擊之十月復薄清水營軏命總兵許經戰却之前後斬首八百餘級㨗上賚白金文綺趙岢等皆廕錦衣廵撫孫慎廕官生軏獨未陞廕以嚴嵩阻也賈志喻時光州人進士以副都御史為陜西總督吉囊等入㓂時遣總兵趙岢率兵迎擊斬首大㨗獲馬駝牛羊數千後復薄清水營時遣兵戰郤之邊功甚著陞兵部右侍郎賈志戴才字子需滄州人嘉靖甲辰進士晉副都御史撫陜西尋陞總督才凡三蒞陜熟其利弊舉劾咸當其人㑹套衆欵闗乞貢市報可而吉能者諳達支屬也援例以請下才議才言敵東西各為雄長通貢宜隨套衆若互市則甘肅開市已久不宜令混入以滋禍階延寧二鎮頗為近敵亦不宜因市起釁互市第可行之宣大不可槩陜西也卒主延寧二市且疏改延綏市於紅山闇門之外自才蒞事無一敢譁於市者賈志王遴字繼津覇州人進士嘉靖四十五年以右僉都御史廵撫延綏賦性鯁介釐奸剔蠧一時饕餮將吏凛凛改絃㑹東路兵燹後因之歲惡民多流徙遴造舟糴晉粟食之始得存活又念中路清平孤險請增將樹兵衛之後敵果萬騎薄城下以有備去又築中河至保寧大邊及鎮郛邏城仍請增府同知一員專職城堡皆永利實政賈志郭琥字宗器永昌人以功晉延綏總兵官佩鎮西將軍印大司馬王遴撫延綏氣槩髙一時琥持體不少遜遴初銜之已察琥忠勇亷幹遂親厚琥勁骨猿臂善騎射不知書而以意作檄頗中肯綮持身潔與人恭在軍鎮肅軍民不擾賈志楊鉁字希尹邢臺人嘉靖己未進士廵按陜西戍卒軍需歲給發吏多乾沒為奸凡遇稽覈則詭文避罪鉁亷知其弊凡諸姦欺者皆按論如法邊儲一清賈志郜光先山西長治人進士任延綏右副都御史老成簡重文武率嚴憚之綢繆邊事不遺餘力築雄石硤以東大邊三十里保寧至波羅大川口五十二里有金城之固以功陞大司馬延綏鎮志張守中字大石山西聞喜人舉人以右僉都御史廵撫延綏甫下車即抑豪横懲貪墨肅紀綱戒滛侈惟修實政不事鋪張若鎮城暨諸邊堡城垣衙宇學宫倉厰皆躬蒞其所規畫指示殫力經營時軍民禔福奸宄斂跡賈志沈楠字汝林仁和人進士廵按陜西下車問民疾苦延見藩臬諮吏治得失及部中豪不法興亷去墨威暴澤枯孳孳弗逮又閔延綏兵馬入衛疲勞分辦花馬池鹽課利害方欲條上以疾卒櫬發白衣冠送者如堵賈志張瀚字子文杭州人進士擢潼闗治兵使套人深入烽火逹於白水瀚即移兵駐縣敵不敢入轉陜左右轄擢廵撫都御史終南饑民屯聚欲亂瀚慰撫之輙投戈散去後謝歸未幾起原官再撫闗中神宗即位召入為吏部尚書賈志羅鳯翔蒲州人萬厯初任陜西廵撫體恤民隐蘇息商困止入衛兵馬以省繹騷修繕城池以為不虞之備為政先於自治以風其下故不嚴而威賈志王世揚字孝甫廣平人進士以御史按視茶馬值歲祲蠲贖鍰二千金復疏請茶課二千金賑之甘肅故以蕃為蔽蕃與狄鬨世揚卵翼約束烽燧頓消歲增駃騠四百七十騎省樁朋金五千有竒遷理卿仍兼御史閲視延綏世揚故諳九塞詭讕咸為次第閲實馬如初市他所設施皆百年至計最後條十事上嘉納之下所司覆著為令賈志王汝梅安肅人進士萬厯九年任延綏右副都御史時值大饑邊餉告匱汝梅竭力救荒蠲租請賑生活者數萬人凡作養士氣培植民生區畫殆盡西陲以安賈志梅友松四川内江人歴陞延綏廵撫嚴守備勤訓練諸番懾服晉都御史兼兵侍總督三邊條上十二事皆報聞無何歸里當世以邊才論薦者首先屈指云四川通志賈待問字學叔北直威縣人隆慶戊辰進士初知咸寧縣案牘山積迎刃而解嘗清并兼之稅五十餘頃治聲流聞擢給事中賈志待問歴陞太子少保右都御史廵撫陜西值神宗銳意𣙜採中貴挾權横恣待問不避怨嫌力為節制民頼以安在陜七年外讋强敵内保遺黎以勞瘁卒於官賜祭𦵏贈太子太保兵部尚書畿輔志姚三讓字崇謙永年人進士以御史出按陜西按部務大體不為𤨏屑所至不寒而栗即諸王國人屏氣相下事竣移疾歸賈志姚繼可字光父襄城人進士以副使兵備定邊命郡邑衛所修築簡練警塵遂息尋遷左布政使時闗中災疹頻仍糧餉徴發無虛日繼可拮据應辦軍民兩利改撫陜西屢著碩畫賈志麻貴大同人萬厯中延綏總兵簡練軍士信賞必罰用降卒為鄉導善伺敵間而乗之嘗卧病聞警輙起夜出師俘馘甚衆已又窮追之殱其渠魁又分軍為九自以大軍獨當一面大㨗延安府志顧其志字太冲長洲人隆慶辛未進士歴陜西叅政尋轉陜西左布政使礦稅二璫肆横其志痛加裁抑歴官右副都御史總督三邊清郵傳撤闗梁禁告訐翦亡命奏止礦稅織造隂發二璫之惡上意動撤之江南通志萬厯三十四年稅監梁永樹黨布虐其志捕惡黨置之法紀事本末劉葵字効忠順天通州人進士任延綏右僉都御史剛明嚴斷人不敢犯簿書悉自裁之所用皆公市行户不擾而懐奸挾詐之徒無所逞一時豪横斂跡地方肅然賈志余懋衡字持國􅄔源人萬厯壬辰進士為御史廵按陜西劾稅璫梁永永窘賄庖人以蠱進懋衡瀕死夢神示方得解上為撤永並罷天下礦税閲視固延兩鎮條上十事上嘉納為令江南通志王見賔山東濟南人進士任延綏廵撫沉毅多竒畧每籌畫邊務能集思廣益知人善任故動有成績延安府志孫維城山東丘縣人進士累官僉都御史萬厯辛丑廵撫延綏時秋霜害稼地方艱食維城憂形於色多方賑貸全活甚衆總兵時以苞苴入每裁抑之士以事至輙降色加禮敎以為善邊人洗心滌慮稱所未有卒於官聞者莫不墮淚賈志涂宗濬江西南昌人進士廵撫延綏刋聖學源流修學宫剏書院建文塔置學田增廪餼改武庠周悉偹至又葺堠臺創鎮志俱稱不朽延綏鎮志黄嘉善山東即墨人進士自寧夏廵撫總制陜西三邊軍務矢志安攘甘延兩鎮累報竒㨗朝廷稱有社稷功更修廟學置學田以養士人才蔚興詔進兵部尚書賈志劉敏寛山西安邑人進士以右僉都御史廵撫延綏簡書總制陜西三邊軍務所至簡兵蒐乘備儲糈繕城堡而料敵又先見如神自撫至督共計㨗三十有竒為人慷慨有大畧與諸將吏推心置腹更喜與諸生譚道論文榆人感德立生祠以祀之賈志馬從聘字起莘靈夀人萬厯己丑進士延綏廵撫閣部數推上俱不當上㫖因疏舉從聘詔可時西鄙屢有警從聘核兵簡餉繕器增堠率同鎮臣杜松獲大㨗者三上手詔嘉與勅本兵察叙丙辰以病請章五上乃許歸畿輔志金忠士南直休寧人進士任榆林兵備有軍功特簡僉都御史廵撫延綏聚糒積芻隂備不虞敵入套忠士宻與大將軍杜文煥計議率精兵破之邊功甚著以積勞卒於任榆人立祠祀之賈志龍遇竒字紫海江西永寧人萬厯進士廵按陜西時秦中多寃獄繫於理者數十年不得釋遇竒閲故牘多所平反宥無辜數百人著三秦慎讞恤疑錄江西志髙𢎞圖山東膠州人進士廵按陜西時秦藩校尉金鉤潘福肆惡虐民𢎞圖亷得其狀治以重法藩校歛跡秦人樂業賈志范復粹山東黄縣人進士廵按陜西御史為政端亷洞逹民隱全秦頌其神明方莅任值大旱一禱獲雨民即稱焉賈志王承恩號錫宇西寧人崇禎二年以臨洮總兵勤王收復四城晉左都督調任延鎮四年七月賊首上天龍馬老虎獨行狼掠鄜州列三營於太平原承恩擊破之上天龍等以二千人降賊滿天星等自合水叛去攻中部承恩帥師徃討斬獲賊首萬餘級生擒二千餘衆㨗聞加太子太保十一月賊首譚雄陷安塞不沾泥張存孟等䧟安定承恩克安塞斬五百餘級即進剿安定賊潛走綏德混天猴等䧟甘泉殺知縣郭永圖河西兵備副使張允登戰死洪承疇遣承恩分剿之五年十月承恩敗安塞遺賊於西川吳堡賊首喬六自斬其魁以降餘遁走延綏稍寧尋以華州兵潰謫去延綏鎮志陳竒瑜山西保德人進士崇禎五年以陜西左布政推廵撫延綏清介有守在藩司時有羡金二萬時延鎮大饑夗者枕藉竒瑜盡以賑濟全活無筭六年十二月賊盡入山西兼走河南延綏賊首鑽天嘯開山斧獨據永寧闗阻險數年不下竒瑜假總督檄發兵七千抵延川潛師疾走賊不虞大兵至倉皇奔潰擊賊首一座城并斬之進兵部右侍郎總督陜西山西河南湖廣四川軍務延綏鎮志賊按畿輔志云竒瑜為總制時聼就撫至於失機誠為非計但據延綏鎮志載其廵撫延綏賑饑破賊功在斯民未可畧也故並志之以見功罪不相掩之義傅永淳字熙宇靈夀人天啟進士擢侍御史按秦廵撫都御史李喬者懦不知兵徵諸將不如約永淳列狀劾之按部郃陽賊數萬薄城下永淳率士民堅守七十餘日賊少懈乃宻檄邊兵五千人夜入賊旦復來攻永淳開門令城中兵突出外伏亦起夾擊轉戰三日大破之斬首千餘級奪囘婦女資畜無筭都御史陳竒瑜賜劍督兵三十萬專辦賊竒瑜入闗賊西走棧道馳漢中㑹霖雨浹月永淳謂竒瑜曰賊鎧漬械敝進勦之功正在今日竒瑜不能用賊更隂賄竒瑜左右求撫竒瑜許之永淳上章力主剿兵部卒從撫議賊從容出棧道與官兵歡飲數日忽鼓噪而西破鳯隴汧陽諸郡縣竟不可制永淳痛哭拜疏劾其溺職玩㓂疏入上怒詔逮竒瑜擢永淳太僕少卿畿輔志練國事字君豫永城人萬歴丙辰進士廵撫陜西㓂大起國事入闗料精銳汰冗濫躬歴行陳者五年晉㓂逸入秦總督陳竒瑜主招撫國事馳書論不宜解嚴狀賊果乘懈猖獗兵部更以其罪坐國事謫戍廣西河南通志張伯鯨江南楊州人進士任延綏餉儲亷介自矢遇旱䖍禱歲饑捐賑活人甚衆延人叩閽保陞榆林道又陞延撫歴官二十年視民如子延綏畫像祀之賈志柯元伯龍巖人崇禎辛未進士擢御史廵按陜西茶馬時秦中流㓂蹂􅏳商人咸失資引元伯至設法流通軍民頼之福建通志汪喬年號歲星浙江遂安人由進士督學三秦校士必焚香告天誓無所私故所㧞俱一時寒士又負才武膂力絶人念四方多故常休沐里居輙馳騎習弓刀擊刺寢處風露中不自暇逸十四年四月奉命撫秦諜報自成將叩闗西入急跨馬傳箭疾驅至商洛部署粗定總督傅宗龍訃至仰天歎曰傅公死討賊無人矣繼聞總督之命方簡兵儲糧未集而兵部催出闗檄踵至曰兵疲糧乏而當方張之㓂我自知以肉餧猛虎然不容不出以持中原心師進遂敗死之勅建忠烈祠櫬歸途中數遇賊從吏謂曰此死節清官陜西總督都御史汪公柩也若輩欲尸祝之請留不然槖中無物可取也皆愕然羅拜去續表忠記金毓峒北直完縣人崇禎甲戍進士以御史出按陜西時孫傅庭治兵闗中吏民苦征繕日夜望其出闗稍得蘇息而天子亦屢督之毓峒獨謂兵未夙練未可輕戰抗疏争之不納師果盡覆十六年冬期滿得代甫出境而賊入闗續表忠記孫傅庭字白谷代州振武衞人進士魁岸多大畧秦撫甘學濶不能討賊乃推邊才用傅庭崇禎九年三月受代傅庭涖秦嚴徵發期㑹一從軍興法又清理屯地籍壯丁為軍量徵屯課以濟軍需賊渠闖王高迎祥最强柘養坤最衆傅庭設方畧陣擒迎祥於盩厔之黒水峪檻車獻俘京師帝大悦為告廟行賞飬坤降而復叛亦追斬之諸賊望風瓦解威名大起洪承疇以秦督兼勦務㑹李自成與洪督相持於邊過天星等數十部又犯涇陽三原傅庭擊之楊家嶺黄龍山大破之賊引而北犯延安延安地瘠而荒不能留諒賊反走之路輕重布伏賊折而南𫝊庭大張旗幟鳴鼓角以邀之賊一日夜奔三百里至職田庄遇伏而敗復走寳雞取棧道再中伏大敗折而走隴州闗山道又為伏兵所挫盡解甲降無一遁者又逐賊邠寧間身自䧟陣獲其渠魁軍聲益振豫賊馬進忠馬光玉驅宛雒之衆箕張而西傅庭擊之賊還走又設伏於潼闗原曹變蛟逐賊入伏自成盡亡其卒以十八騎潰圍遁秦中少安十一月京師有警召傅庭入援加兵部侍郎賜劍楊嗣昌中之遂逮問下獄長繫三年賊益横嗣昌自縊公論大白十五年三月自成再圍開封帝出傅庭於獄命將禁旅往援河南秦帥賀人龍心不為國家用總督傅宗龍汪喬年皆為所䧟帝改傅庭督闗中而宻授計斬人龍人龍部卒萬餘無敢譁者朝議趣傅庭星馳救汴傅庭請稍展其期帝不聼不得已出師十月汴城䧟援師亦敗傅庭上書自劾詔令圖功自贖傅庭歸陜力主固守潼闗扼京師上㳺且以我軍新集不欲速戰而闗中歲饑餉告匱士大夫不樂其在秦咸上書迎帝意催戰帝亦望其亟奏蕩平晉尚書鑄督師七省印授之催戰益急傅庭頓足歎曰吾固知戰未必㨗然大丈夫豈能再對獄吏乎疏報師期識者危之十六年八月出師潼闗九月兵敗賊乘勝破潼闗華隂追及於渭南十月初六日傅庭與監軍副使喬遷髙躍馬大呼而歿於陣從騎俱散𫝊庭屍竟不可得續表忠記馮師孔字若魯原武人初授刑曹恤刑陜西釋疑獄一百八十餘人咸頌其平崇禎十五年四月詔舉邊才兵部侍郎張鏡心以師孔應詔吏部嚴核者再吏部亦亟稱其才凡六領兵偹咸在衝邊兵益練名益起遂擢僉都御史代蔡官治廵撫陜西時總督孫𫝊庭方奉新命大舉討賊師孔助調兵食拮据勞瘁𫝊庭出闗盡以西安之卒行師孔方募兵修􅊀而傅庭為大雨所詘敗報至賊於十六年十月初七日長驅入潼闗不數日直抵西安師孔厲將士率吏民分城拒守而自守東門天寒勸秦王給兵士人一棉衣勿聽城守者傳飱皆結為氷不可食半多僵卧城頭勢已岌岌王叅將内應城遂陷秦王被執師孔投井死時十月十三日也續表忠記李昌齡號玉川鎮番人任延綏總兵數有戰功以抗直不合於時軍政落職因家焉崇禎十六年闖賊直趨潼闗陷西安府遣偽將李過劉芳亮北畧榆林城中洶洶時昌齡在旅舍或告之趣亡昌齡曰我叨列大臣莫非國土去將焉之果此城不守當與之存亡耳未幾李過等至綏德遣賊將黄色俊來説降於是榆林道副使都任督餉户部王家祿中協副總兵惠顯與各營諸將集議死守共推昌齡宿將知兵署領鎮事昌齡乃瀝血誓師分汛以守復出統銳衆以戰頗多斬獲賊甚恨之督攻愈急城陷士女皆登屋巷戰刀楯之聲不絶至諸將之在圍中或被傷或自盡或為賊縳無一人降者昌齡檻送西安罵賊不屈磔於市延安府志按節鎮當國家重寄非宏才碩望莫膺斯任其賢者各具專傳次則勲庸未著亦詳其姓氏而爵里亦附見焉明三邊總制柴昇内鄉人李士翺山東人沈應時河南人徐元泰宣城人鄭洛安肅人李汶任邱人姚鏌慈谿人舊志作餘姚人誤王崇古蒲州人田樂任丘人廵撫陜西楊璿無錫人徐舟永豐人王一言内江人宋有文資縣人王珝永平衛人丘鼐貴溪人鮑象賢歙縣人唐時英曲靖人曹金祥符人李應選江夏人廵撫延綏徐廷璋羅山人陸矩阜城人王鋭遷安人盧祥東莞人劉忠濮州人金獻民綿州人張宏正定人萬潮進賢人賈仁元萬泉人陳其學登州人楊守謙長沙人鄭汝璧縉雲人廵按陜西御史陳衡永新人張鑑建昌人馮誠浮梁人蔡愈清保昌人劉城鄱陽人方佑桐城人張玉吳橋人楊縉聞喜人李瀚沁水人曹珪黄岡人喻茂堅豐城人卞偉宜賔人朱觀崑山人姚一元長興人陳文煥臨川人盛汝謙桐城人方新青陽人陳薦祁陽人畢懋康歙縣人錢守亷信陽人王倓商城人廵視茶馬御史楊以誠宜春人張銓沁水人延綏總兵張傑順天人陳煇延安人吳江綏德衛人西陲保障諸人殆不無少補云本朝孟喬芳滿洲鑲紅旗人順治二年以兵部侍郎總督川陜是年賀珍作亂鳯翔平涼所屬並遭殘害省城被圍喬芳發卒大敗之追至漢中復敗之漢南悉定三年李鷂子反同州屬邑盡陷㑹王師西下喬芳合兵蕩冦左輔以寧五年米􅉰子破河州蘭州臨洮窺鞏昌諸部飛騎告警喬芳寂無調發謂使者曰無恐汝歸時度吾軍當破賊矣使者謝去比至則援師四集冦焰俱消六年王永強與府谷賊髙有才連兵以叛同華震動喬芳飛檄趣吳三桂濟師彚勦復延安下府谷永强有才以次撲滅喬芳叠經冦禍旌麾所指每尅期告㨗國初秦地甫平民心未靖其保䕶安集實喬芳力也晉本部尚書太子太保十二年卒於官祭𦵏踰常典諡忠毅雍正十年祀賢良祠王正志字灝夫靜海人順治二年以右僉都御史廵撫延綏時邊塞初附正志多方綏輯兵民乂安五年冬大同姜瓖變起瓖故榆林人也譌言謂姜兵且至六年正月正志檄調延安叅將王永彊同總兵沈文華駐兵防河永彊夙父事正志故正志任之然恃勇素䟦扈二月永彊勾神木賊高有才襲榆林因率兵夜至城下聲言姜逆分兵過河將歸守延安遂入駐凱􅁔樓及曙正志議城守永彊偵知有才兵至即倡衆開城延賊正志聞變知不免急走凖提寺死之時户部郎中朱予昇以督餉至榆林亦死之沈文華奉天義州人順治三年以都督同知充延綏總兵官六年正月文華因姜瓖之變自鎮城移兵駐黄河防賊西犯檄延安叅將王永彊以兵協防清水營及黄甫川諸路㑹神木賊田秉德張秀首亂推廢將髙有才為主大肆焚刼二月永彊忽撤兵走榆林文華知永彊有異志率兵追襲至神木陷有才伏中為所得死之石維崑字輿瞻清苑人順治丙戍進士授庻常轉御史五年廵按陜西值河西􅉰叛勢甚熾維崑叱馭西廵選兵䇿將亂遂克定未幾以罣悞左遷尋復職十六年再按陜西所至却供帳斥豪猾恤㷀賑孤綱紀整肅積勞嘔血而卒馬之先字勉吾奉天鑲藍旗人順治九年以右副都御史廵撫陜西治尚清淨吏習民安十一年總督宣大十二年晉兵部尚書總制三邊之先素諳邊事興屯訓士斟酌盡善性勤敏雖軍需旁午咄嗟立辦在任二年積勞成疾卒秦民為之罷市事聞賜祭𦵏金礪奉天鑲紅旗人順治十一年以兵部侍郎總督陜西豁逹有逺識時值軍務倥偬文移絡繹礪一覽洞悉摘發隱伏動合機宜且節制有體嚴紀律明賞罰人人畏威懐德未幾請告歸卒賜祭𦵏張瑃字伯珩陽城人崇禎癸未進士順治十七年以右副都御史廵撫陜西㑹制府李國英以才望特膺簡命入川辦冦瑃獨肩全陜重任裁决悉中機宜先是臨鞏鎮移駐西寧仍自臨鞏給餉瑃請以西寧額賦給之不足乃令臨鞏協濟又請以提標移駐臨鞏邊防益固時西南方宿重兵部議畝加一分名曰練餉瑃謂縁邊賦額不以畝計若畝加一分則外賦浮於正供不可即抗章請免奸民朱君應偽稱明裔潛勾諸畨又王鳯貴等挾妖術隂結竹谿山冦瑃授計將佐悉擒之舊例寧甘延三撫臣只握兵柄不與民事瑃力陳不便割所𨽻臨鞏慶延平五郡一切刑名錢榖俾得一體專决其能持政體多此類白如梅滿洲鑲白旗人康熙元年以兵部尚書出督陜西時鄖冦猖獗秦豫三方㑹剿興安與鄖接壤轉輸不給如梅請軍至楚地即需楚餉秦運以白土闗為界立報可又請罷臨鞏練餉捐黄甫烟稅咸得允行邊墻袤五千餘里廢自明季如梅宻陳事冝邊防克固更念吏治民生相為表裏因詳列擾民十害飭行所屬并勒石垂示賈漢復字膠侯滿洲籍曲沃人歴官河南廵撫康熙元年調撫陜西秦隴當兵燹之餘漢復一意綏輯嚴保甲清郵置免逋欠急捐賑民困以蘇又以暇進父老詢疾苦如白土闗止運宜川縣緩征清邠州賦額重定延安府地畝制前後飛章入告皆報可三年秋廵視漢南覩雲棧崎嶇乃自煎茶坪抵雞頭闗剔險披隘盡成坦途秦中夙號都㑹自明季荒殘之後文獻蔑如漢復以其暇日延致名流搜羅掌故閲五載而通志告成㑹纂修大清一統志部議飭行直省各修通志以秦豫二志為式先是漢復撫河南成河南通志二志皆漢復所手定故士論尤歸之在任八年以内召去莫洛滿洲正紅旗人康熙六年總督陜西九年以陞任去十三年吳逆叛命西陲震動聖祖命洛以閣部經畧闗中洛至即招募義勇收攬豪俊以期大舉秋八月出師陜西提督王輔臣為前行洛率大軍以繼其後時兵多新集又師期過廹儲偫未周方入棧霖雨彌旬山徑阻絶日行不數里將士有逸去者洛開誠撫諭稍復引還十二月抵寧𦍑有逃兵自盤龍山來者備言乏糧狀軍心洶洶入白洛洛反覆諭之始定先是提標兵素驕悖洛恒趣督之至是遂羣起而囂輔臣不能制於是㢠廻戈向洛洛一軍星散兵至洛神色自若曰吾受國恩不能効尺寸以報死吾分也遂端坐而及於難事聞詔治祭𦵏如禮哈占滿洲正藍旗人性沉毅有文武才康熙十二年以工部侍郎出督川陜值吳逆倡亂黔蜀雲擾占從容指畫三秦晏然十八年夏五月賊將王屏藩據漢中冬十月大兵三路進取漢興奮威將軍王進寳出寳雞振武將軍鄂克濟哈勇畧將軍趙良棟出畧陽占與撫逺大將軍圖海出大泥峪遂進駐舊縣闗以待濟師㑹諜報進寳兵已克武闗占謀於大將軍曰武闗已㧞中路兵可直搗漢中漢中若下興安諸處可傳檄而定也何老師為哉遂鼔行至鎮安復進攻兩河闗克之長驅搗興安抵漢中與進寳兵㑹明年大兵入蜀奉詔駐漢中理餉飛芻輓粟軍得無乏未幾賊帥胡國柱等犯瀘州蜀中大震占分兵倍道赴援又手書馳諭將士人懐固志屢戰克㨗賊乃遁二十年復率兵由永寧進薄滇南次交水聞滇㨗班師駐成都二十一年歸西安初占奏立火器營於西安選屯軍二千人練習其後摧鋒䧟銳所向有功因仍其制而以專官領之又二年入為兵部尚書至是歴十二年矣國朝秦督之久惟占與孟喬芳二人圖海滿洲正黄旗人康熙十五年王輔臣叛據平凉以海為撫逺大將軍討之海勦撫並用平凉以寧十八年賊將王屏藩據漢中陳君極引兵出寳雞時海駐兵鳯翔賊乗夜攻西山堡甚急海星馳赴之圍乃解仍分兵守紅崖堡以張軍勢賊列陣山岡誘戰我師分道出敵各大㨗已而賊復來海伏兵邀賊歸路再戰再破之自是賊不能越寳雞而東冬十月王師進取興漢海從大泥峪進薄鎮安賊方據兩河闗闗去鎮安百里時河橋未就有司無以應海即軍中選精兵禦敵餘悉令伐木山中一夕浮梁成我師畢渡㑹風雪大作燕嶺龍川一帶賊恃險不設守海大喜曰此李愬入蔡州時也立遣竒兵從間道走兩河闗後乘髙急攻下之轉戰而前與奮威將軍王進寳兵㑹漢中全秦自此無警海性沉毅未嘗為兵家言而運籌决勝雅與古合又善撫士卒同甘苦以是人樂為用所向多成功師還晉中和殿大學士兼吏部尚書卒贈少保兼太子太傅諡文襄尋追封一等公雍正二年奉勅配享太廟九年加封忠逹公十年入祀賢良祠費雅逹康熙十八年五月授漢中鎮總兵先是十四年八月漢中失守官兵退屯南山之麓雅逹至約束軍士沿山村堡民不知兵十一月大兵復漢中雅逹帥師征進居民爭挈壺漿囊糗糒以送之博濟滿洲鑲白旗人康熙三十一年任西安將軍西安地居省㑹百貨駢集四門故有抽物陋規濟嚴禁旗兵毫無染指四十二年特簡川陜總督濟為政不事𤨏屑官吏肅清兵民安堵尤加意學校以振興斯文為己任民間子弟可敎者盡廩給之俾入書院肄業極一時人文之盛席爾逹滿洲鑲紅旗人康熙三十八年以兵部尚書署理川陜總督時自督撫以下例有州縣規禮吏胥因縁為奸科斂里民爾逹蒞任即嚴禁州縣徵收重耗又以上司不受餽遺則無瞻顧之心而里民之私𣲖始可盡除特疏請於朝勒石各衙門以垂永禁又河西歲歉爾逹單騎騐視發粟賑濟全活頗衆四十年以吏部尚書内召離任覺羅華顯滿洲正紅旗人康熙三十九年以内閣學士出為陜西廵撫四十年總督川陜秦蜀地廣山深邊防遼逺華顯修築營堡選習士馬軍政一新秦民夙苦私𣲖華顯嚴飭禁革民得息肩州縣徵收令里甲封投正項羡餘一無所問性清約屏絶餽遺下至日用薪蔬概不煩民四十三年卒官次年奉㫖祀名宦祠諡文襄殷泰滿洲鑲紅旗人以軍功擢甘肅提督康熙四十八年調總督川陜蒞事不尚虗文令行禁止人莫敢犯四十九年大計兩省官吏苞苴不行舉劾悉當五十年以公事入蜀道經鳯漢所至問民疾苦父老以雞酒相餉泰輙倚車慰勞并集衆勸諭官民絮語無間一時谿山村落中若不知其為制府也卒賜祭葬諡清端陜西通志巻五十一
