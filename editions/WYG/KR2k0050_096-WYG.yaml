body:
  text: 陜西通志巻九十六藝文十二五言律六言律七言律秋日翠㣲宫唐太宗秋光凝翠嶺凉吹肅離宫荷疎一葢缺樹冷半帷空側陣移鴻影圓花釘菊叢攄懷俗塵外髙眺白雲中望終南山同前重巒俯渭水碧嶂插遥天出紅扶嶺日入翠貯巖烟叠松朝若夜複岫缺疑全對此恬千慮無勞訪九仙驪山寓目中宗四郊秦漢國八水帝王都閶闔雄里閈城闕壯規模貫渭稱天邑含岐實奥區金門披玉館因此識皇圖過大哥宅探得歌字𤣥宗魯衞情先重親賢愛轉多冕旒豐暇日乘景暫經過戚里申髙宴平臺奏雅歌復尋為善樂方念保山河惟此溫泉是稱愈疾豈予獨受其福思與兆人共之乘暇巡遊乃言其志同前桂殿與山連蘭湯湧自然陰崖含秀色溫谷吐潺湲績為蠲邪著功因養正宣願言將億兆同此共昌延隴頭水盧照隣隴阪髙無極征人一望鄉關河别去水沙塞斷歸腸馬繫千年樹旌懸九月霜從來共嗚咽皆是為勤王奉和人日宴清暉閣宴羣臣遇雪應制宗楚客􅆼窕神仙閣參差雲漢間九重中葉啟七日早春還太液天為水蓬萊雪作山今朝上林樹無處不堪攀春日芙蓉苑侍宴應制宋之問芙蓉秦地沼盧橘漢家園谷轉斜盤徑川迴曲抱原風來花自舞春入鳥能言侍宴瑶池夕歸途騎吹繁梨園亭子侍宴應制崔湜年光陌上發香輦禁中游草緑鴛鴦殿花明翡翠樓寳杯呈露酌仙館雜風流今日陪歡豫皇恩不可酬春日宴樂游園賦韻得接字王勃帝里寒光盡神臯春望浹梅郊落晚英柳甸驚初葉流水抽竒弄崩雲灑芳牒清尊湛不空暫喜平生接甘露一作泉殿侍宴應制李嶠月宇臨丹地雲牕網碧紗御筵陳桂醑天酒酌榴花水向浮橋直城連禁苑斜承恩恣歡賞歸路滿烟霞蓬萊三殿侍宴奉勅詠終南山應制杜審言北斗挂城邊南山倚殿前雲標金闕迥樹杪玉堂懸半嶺通佳氣中峯繞瑞烟小臣持獻夀長此戴堯天奉和九日幸臨渭亭登髙應制得月字韋元旦雲物開千里天行乘九月絲言丹鳳池斾轉蒼龍闕㶚水歡娯地秦京游俠窟欣承解慍詞聖酒黄花發奉和幸望春宫送朔方軍大總管張仁亶李適地限驕南牧天臨餞北征解衣延寵命横劍總威名豹畧恭宸㫖雄文動睿情坐觀膜拜入朝夕受降城奉和聖製登驪山髙頂寓目應制蘇頲仙蹕御層氛髙髙積翠分巖聲中谷應天語半空聞豐樹連黄葉函關入紫雲聖圖恢㝢縣歌賦少一作小横汾奉和聖製溫泉言志應制張説溫谷媚新豐驪山横半空湯池薰水殿翠木暖烟宫起疾逾仙藥無私合聖功始知堯舜徳心與萬人同奉和聖製登驪山矚眺應制前人寒山上半空臨眺盡寰中是日巡遊處晴光逺近同川明分渭水樹暗辨新豐巖壑清音暮天歌起大風夜宿七盤嶺沈佺期獨遊千里外髙卧七盤西山月臨窗近天河入户低芳春平仲緑清夜子規啼浮客空留聽褒城聞曙雞咸陽覽古前人咸陽秦帝居千載坐盈虚版築林光盡壇場霤聽疎野橋疑望日山火𩔖焚書惟有驪峯在空聞厚葬餘奉和聖製登驪山髙頂寓目應制趙彦昭皇情遍九垓御輦駐昭回路若隨天轉人疑近日來河看大禹鑿山見巨靈開願扈登封駕常持薦夀杯奉和九日幸臨渭亭登髙應制得餘字蕭至忠望幸三秋暮登髙九日初朱旗巡漢苑翠帟俯秦墟寵極茰房遍恩深菊酎餘承歡何以答萬億奉宸居奉勅送吕補闕往西嶽勒碑得雲字孫逖刻石記天文朝推谷子雲篋中緘聖札巖下揖神君語别梅初艷為期草欲薰往來春不盡離思莫氛氲奉和登㑹昌山應制前人巖磴列雲旗吾君訪道時乾行萬物覩日馭六龍遲望逺迴天顧登髙動睿詞願因山作夀長保㑹昌期從駕溫泉宫徐安貞神女調溫液年年待聖人試開臨水殿來洗屬車塵暖氣隨明主恩波浹近臣靈威自無極從此獻千春終南山王維太乙近天都連山接海隅白雲迴望合青靄入看無分野中峯變陰晴衆壑殊欲投人處宿隔水問樵夫過香積寺前人不知香積寺數里入雲峯古木無人逕深山何處鐘泉聲咽危石日色冷青松薄暮空潭曲安禪制毒龍送楊長史由棧道入川前人褒斜不容幰之子去何之鳥道一千里猿聲十二時官橋祭酒客山木女郎祠别後同明月君應聽子規輞川閒居前人一從歸白社不復到青門時倚簷前樹逺看原上村青菰臨水拔白鳥向山翻寂寞於陵子桔橰方灌園終南别業前人中嵗頗好道晚家南山陲興來每獨往勝事空自知行到水窮處坐看雲起時偶然值林叟談笑無還期題潼關樓崔顥客行逢雨霽歇馬上津樓山勢雄三輔關門扼九州川從陜路去河遶華陰流向曉登臨處風烟萬里愁觀華嶽祖詠西入秦關口南瞻驛路連彩雲生闕下松樹到祠邊作鎮當官道雄都俯大川蓮峯徑上處彷彿有神仙與鄠縣羣官泛渼陂岑參萬頃浸天色千尋窮地根舟移城入樹岸濶水浮村閒鷺驚簫管潛虯傍酒樽暝來呼小吏列火儼歸軒雪後與羣公過慈恩寺前人乘興忽相招僧房暮與朝雪融雙樹濕紗闇一燈燒竹外山低塔藤間院隔橋歸家如欲嬾俗慮向來消晚至華陰皇甫曽臘盡促歸心行人及華陰雲霞仙掌出松柏古祠深野渡氷生岸寒川燒隔林溫泉看漸近宫樹晚沈沈與鄠縣源大少府宴渼陂得寒字杜甫應為西陂好金錢罄一餐飯抄雲子白𤓰嚼水精寒無計迴船下空愁避酒難主人情爛漫持答翠琅玕陪鄭廣文遊何將軍山林十首山林在韋曲西墖坡前人不識南塘路今知第五橋名園依綠水野竹上青霄谷口舊相得濠梁同見招平生為幽興未惜馬蹄遥百頃風潭上千章夏木清卑枝低結子接葉暗巢鶯鮮鯽銀絲膾香芹碧澗羮翻疑柁樓底晚飯越中行萬里戎王子何年别月支異花開絶域蔓草匝清池漢使徒空到神農竟不知露翻兼雨打開拆漸離披旁舍連髙竹疎籬帶晚花碾渦深没馬藤蔓曲藏蛇詞賦工無益山林跡未賒盡拈書籍賣來問爾東家賸水滄江破殘山碣石開綠垂風折筍紅綻雨肥梅銀甲彈箏用金魚換酒來興移無灑掃隨意坐莓苔風磴吹陰雪雲門吼瀑泉酒醒思卧簟衣冷欲裝綿野老來看客河魚不取錢只疑淳朴處自有一山川棘樹寒雲色茵陳春藕香脆添生菜美陰益食簞凉野鶴清晨出山精白日藏石林蟠水府百里獨蒼蒼憶過垂柳渚走馬定昆池醉把青荷葉狂遺白接䍦刺船思郢客解水乞吳兒坐對秦山晚江湖興頗隨牀上書連屋階前樹拂雲將軍不好武稚子總能文醒酒微風入聽詩靜夜分絺衣掛蘿薜凉月白紛紛幽意忽不愜歸期無奈何出門流水注回首白雲多自笑燈前舞誰憐醉後歌祗應與朋好風雨亦來過重過何氏五首前人問訊東橋竹將軍有報書倒衣還命駕髙枕乃吾廬花妥鶯捎蝶溪喧獺趁魚重來休沐地真作野人居山雨尊仍在沙沉榻未移犬迎曾宿客鴉䕶落巢兒雲薄翠微寺天清皇子陂向來幽興極步屣過東籬落日平臺上春風啜茗時石闌斜㸃筆桐葉坐題詩翡翠鳴衣桁蜻蜓立釣絲自今幽興熟來往亦無期頗怪朝參嬾應耽野趣長雨抛金鎻甲苔卧緑沈槍手自移蒲柳家纔足稻粱看君用幽意白日到羲皇到此應常宿相留可判年蹉跎暮容色悵望好林泉何日沾微禄歸山買薄田斯懷恐不遂把酒意茫然驪山前人驪山絶望幸花蕚罷登臨地下無朝燭人間有賜金鼎湖龍去逺銀海雁飛深萬嵗蓬萊日長懸舊羽林温泉即事皇甫冉天仗星辰轉霜冬景氣和樹含溫液潤山入繚垣多丞相金錢賜平陽玉輦過魯儒求一謁無路獨如何奉和聖製次瓊嶽應制韋濟陸海披晴雪千旗獵早陽嶽臨秦路險河遶漢垣長路行通鳷鵲離宫接建章都門信宿近歌舞從周王望終南竇牟日愛南山好時逢夏景殘白雲兼似雪清晝乍生寒九陌峯如墜千門翠可團欲知形勝盡都在紫宸看登秦嶺司空曙南登秦嶺頭回首始堪憂漢􅇅青門逺商山藍水流三湘遷客去九陌故人遊從此思鄉淚雙垂不復收登咸陽北寺樓張籍髙秋原上寺下馬一登臨渭水西來直秦山南向深舊宫人不住荒碣路難尋日暮涼風起蕭條多遠心過華清宫李賀春月夜啼鴉宫簾隔御花雲生朱絡暗石斷紫錢斜玉椀盛殘露銀燈㸃舊紗蜀王無近信泉上有芹芽馬戴居華山因寄賈島玉女洗頭盆孤髙不可言瀑流蓮嶽頂河注華山根絶雀林藏鶻無人境有猿秋蟾纔過雨石上古松門曲江白居易細草岸西東酒旗搖水風樓臺在花杪鷗鷺下烟中翠幄晴相接芳洲夜暫空何人賞秋景興與此時同入潼關張祜都城三百里雄險此迴環地勢遥尊嶽河流側讓闗秦皇曾虎視漢祖昔龍顔何處梟兇輩干戈自不閒秋日赴􅊴題潼闗驛樓許渾紅葉晚蕭蕭長亭酒一瓢殘雲歸太華疎雨過中條樹色隨山過河聲入海遥帝鄉明日到猶自夢漁樵行次潼闗題驛後軒前人飛閣極層臺終南此路迴山形朝􅊴去河勢抱闗來雁過秋風急蟬鳴宿霧開平生無限意驅馬任塵埃商於新開路貞元七年上雒郡刺史李西華開新道七百餘里李商隱六百商於路﨑嶇古共聞蜂房春欲暮虎穽日初曛路向泉間辨人從樹杪分更誰開㨗徑速擬上青雲商山早行溫庭筠晨起動征鐸客行悲故鄉雞聲茅店月人迹板橋霜槲葉落山路枳花明驛墻因思杜陵夢鳧雁滿迴塘秋宿慈恩寺遂上人院李頻滿閣終南色清宵獨倚欄風髙斜漢動葉下曲江寒帝里求名老空門見性難吾師無一事不似在長安過四皓廟前人東西南北人髙跡自相親天下已歸漢山中猶避秦龍樓曾作客鶴氅不為臣獨有千年後青青廟木春題汧湖二首選一許棠偶得湖中趣都忘隴坻愁邊聲風下雁楚思浪移舟靜極亭連寺涼多島近樓吟遊終不厭還似曲江頭雕陰道中前人五月綏州北途程少欝蒸馬依羶草聚人抱濁河澄蹟固長城壘寃深太子陵往來經此地悲苦有誰能夏州道中前人茫茫沙漠廣漸逺赫連城堡逈烽相見河移浪旋生無蟬嘶折柳有寇似防兵不耐飢寒迫終誰至此行題鄭侍御藍田别業張喬秋山清若水吟客靜於僧小徑通商嶺髙窗見杜陵雲霞朝入鏡猿鳥夜窺燈許作前峯侣終來寄上層終南山前人帶雪復銜春横天占半秦勢竒看不定景變寫難真洞逺皆通嶽川多更有神白雲幽絶處自古屬樵人遊華山雲際寺一作遊少華山甘露寺前人少華中峯寺髙秋衆景歸地連秦塞起河隔晉山微晚來蟬相應涼天雁並飛殷勤記巖石秪恐再來稀金州客舍方干巻箔雲峯暮蕭條未掩闗江流嶓冢雨帆入漢陰山落葉欹眠後孤砧倚望間此情偏耐醉難遣酒罇閑沙苑鄭谷茫茫信馬行不似近都城苑吏猶迷路江人莫問程聚來千嶂出落去一川平日暮客心速愁聞雁數聲題興善寺前人寺在帝城陰清虚勝二林蘚侵隋畫暗茶助越甌深巢鶴和鐘唳詩僧倚錫吟烟莎後池水前跡杳難尋自註十才子詩集多有興善寺後池之作今寺在池無每用追嘆終南山王貞白千山凝黛色列翠滿長安地去捜揚近人謀隱遯難水穿諸苑過雪照一城寒為問紅塵裏誰同駐馬看商山前人商山名利路夜亦有人行四皓臥雲處千秋疊蘚生晝燒籠澗黒殘雪隔林明我待酬恩了來聽水石聲宿鳳翔天柱寺窮易元上人房李洞天柱暮相逢吟思天柱峯墨研青露月茶吸白雲鐘卧語身粘蘚行禪頂拂松探元為一决明日去臨卭題終南隱者室僧齊已終南山北面直下是長安自埽青苔室閑歌白石看風吹窗樹老日曬竇雲乾時向圭峯宿僧房瀑布寒過秦嶺後周孟貫古今傳此嶺髙下勢崢嶸安得青山路化為平地行蒼苔留虎跡碧樹障溪聲欲過一回首踟蹰無限情再歸秦川宋寇準阮路何方盡西歸興未勞河流經陜狹山色入秦髙返照明秋壘孤村接暮濤還如丁令至故里滿蓬蒿登麟州城樓張詠莫問戎庭苦髙欄是夕攀時清官事少邊靜戍