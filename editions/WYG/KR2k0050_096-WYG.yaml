小洞幽何用别尋方外去人間亦自有丹丘南原望漢宫司空曙荒原空有漢宫名衰草茫茫雉堞平連雁下時秋水在行人過盡暮烟生西陵歌吹何年絶南陌登臨此日情故事悠悠不可問寒禽野水自縱横華清宫感舊王建塵到朝元邊使急千官夜發六龍回輦前月照羅衫淚馬上風吹蠟燭灰公主粧樓金鎻澁貴妃湯殿玉蓮開有時雲外聞天樂知是先皇沐浴來長安春遊楊巨源鳳城春報曲江頭上客年年是勝遊日暖雲山當廣陌天清絲管在髙樓蘢葱樹色分仙閣縹緲花香汎御溝桂壁朱門新邸第漢家恩澤問鄼侯途次華州陪錢大夫登城北樓春望因覩李崔令狐三相國唱和之什翰林舊侣繼踵華城山水清髙鸞鳳翔集皆忝宿眷遂題此詩劉禹錫城樓四望出風塵見盡闗西渭北春百二山河雄上國一雙旗節委名臣壁中今日題詩處天上同時草詔人莫恠老郎呈濫吹宦途雖别舊情親送王十八歸山寄題仙遊寺白居易曾於太白峯前住數到仙遊寺裏來黑水澄時潭底出白雲破處洞門開林間暖酒燒紅葉石上題詩拂緑苔惆悵舊遊那復到菊花時節羨君迴華頂李紳欲向仙峯煉九丹獨瞻華頂禮仙壇石標琪樹凌空碧水挂銀河映月寒天外鶴聲隨絳節洞中雲氣隱琅玕浮生未有從師地空誦仙經想羽翰登長安慈恩寺塔盧宗回東方曉日上翔鸞西轉蒼龍拂露盤渭水寒光揺藻井玉峯晴色墮朱闌九重宫闕參差見百二山河表裏觀暫輟去蓬悲不定一凭金界望長安題慈恩寺塔章八元十層突兀在虚空四十門開面面風却怪鳥飛平地上自驚人語半天中迴梯暗踏如穿洞絶頂初攀似出籠落日鳳城佳氣合滿城春樹雨濛濛咸陽城東樓許渾一上髙樓萬里愁蒹葭楊柳似汀洲溪雲初起日沉閣山雨欲來風滿樓鳥下綠蕪秦苑夕蟬鳴黄葉漢宫秋行人莫問當年事故國東來渭水流九成宫李商隱十二層樓閬苑西平時避暑拂虹霓雲隨夏后雙龍尾風逐周王八駿蹄呉嶽曉光連翠巘甘泉晚景上丹梯荔枝盧橘霑恩幸鸞鵲天書濕紫泥行至金牛驛寄興元渤海尚書前人樓上春雲水底天五雲章色破巴牋諸生個個王恭柳從事人人庾杲蓮六曲屏風江雨急九枝燈檠夜珠圓深慚走馬金牛路驟和陳王白玉篇潼闗河亭薛逢重岡如抱嶽如蹲屈曲秦川勢自尊天地并功開帝宅山河相凑束龍門櫓聲嘔軋中流渡柳色微茫逺岸村滿眼波濤終古事年來惆悵與誰論過潼闗溫庭筠地形盤曲帶河流景氣澄明是勝遊十里曉雞闗樹暗一行寒雁隴雲愁片時無事溪泉好盡日凝眸嶽色秋麈尾角巾應曠望更嗟芳靄隔秦樓過新豐前人一劍乘時帝業成沛中鄉里到咸京寰區已作皇居貴風月猶含白社情泗水舊亭春草遍千門遺瓦古苔生至今留得離家恨雞犬相聞落照明過五丈原前人鐵馬雲騅乆絶塵柳隂髙壓漢營春天髙殺氣騰闗右夜半妖星照渭濵上國臥龍空悟主中原逐鹿不因人象牀寳帳無言語從此譙周是老臣馬嵬驛前人穆滿曽為物外遊六龍經此暫淹留返魂無驗青烟滅理血空生百艸愁香輦却歸長樂殿曉鐘還下景陽樓甘泉不復重相見誰道文成是故侯咸陽懐古劉滄經過此地無窮事一望凄然感廢興渭水故都秦二世咸陽秋草漢諸陵天空絶塞聞邊雁葉盡孤村見夜燈風景蒼蒼多少恨寒山半出白雲層秋日登醴泉縣樓前人閒上髙樓時一望緑蕪寒野靜中分人行直路入秦樹鴈截斜陽背塞雲渭水自流汀島色漢陵空長石苔紋秋風髙柳出危葉獨聽蟬聲日欲曛寄鄠杜李遂良處士髙駢小隱堪忘世上情可能休夢入重城池邊寫字師前輩座右題名律後生吟社客歸秦渡晚醉鄉漁去渼陂晴春來不得山中信盡日無人傍水行曲江春望羅鄴故國東歸澤國遥曲江晴望憶漁樵都緣北闕春先到不是南山雪易消㙐影玉樓開組繡歡聲丹禁奏雲韶雖然未得陪鴛鷺亦酹金觴祝帝堯渼陂鄭谷昔事東流共不回春深獨向渼陂來山前别業依稀在雨裏梨花寂寞開却展漁絲無野艇舊題詩句没蒼苔澘然四顧難消遣祗有佯狂泥酒盃少華甘露寺前人石門蘿徑與天隣雨桂風篁逺近聞飲澗鹿喧雙派水上樓僧蹋一梯雲孤烟薄暮闗城没逺色初晴渭曲分長欲然香來此宿北林猿鶴舊同羣過九成宫呉融鳳輦東歸二百年九成宫殿半荒阡魏公碑字封蒼蘚文帝泉聲落野田碧草斷霑仙掌露緑楊猶憶御爐烟昇平舊事無人説萬疊青山但一川汧陽閣韋莊汧水悠悠去似絣逺山如畫翠眉横僧尋野渡歸吳嶽雁帶斜陽入渭城邊靜不收蕃帳馬地貧惟賣隴山鸚牧童何處吹羌笛一曲梅花出塞聲過渼陂懐舊前人辛勤曾寄玉峯前一别雲溪二十年三徑荒涼迷竹樹四隣凋謝變桑田渼陂可是當時事紫閣空餘舊日烟多少亂離無處問夕陽吟罷涕澘然綏州作前人雕陰無樹水南流雉堞連雲古帝州帶雨晚駞鳴古戍望鄉孤客倚髙樓明妃去日花應笑蔡琰歸時髩已秋一曲單于暮烽起扶蘇城上月如鉤咸陽懐古前人城邊人倚夕陽樓城上雲凝萬古愁山色不知秦苑廢水聲空傍漢宫流李斯不向倉中悟徐福應無物外遊莫怪楚吟偏斷骨野烟踪跡似東周題華嚴寺木塔南唐張泌六街晴色動秋光雨霽憑髙只自傷一曲晚烟浮渭水半橋斜日照咸陽休將世路悲塵事莫指雲山認故鄉回首漢宫樓閣暮數聲鐘鼔自微茫再遊韋曲山寺後周譚用之鵲簷烟斷玉巢欹罨入春塘太白低馬踏翠開垂柳寺人耕紅破落花泥千年勝槩咸陽上幾代荒涼繡嶺西碧吐紅芳舊行處豈堪回首草凄凄咸陽懐古劉兼髙秋咸鎬起霜風秦漢荒陵樹葉紅七國鬭雞方賈勇中原逐鹿更爭雄南山漠漠雲常在渭水悠悠事旋空立馬舉鞭遥望處阿房遺址夕陽東登商州南城樓望山宋王禹偁西接藍田東武闗有唐名郡數商顔二千石盡非吾道一百年來負此山自註云自唐末至今百餘年無文臣為刺史重叠曉嵐新雨後參差春雪夕陽間惟供遷客風騷興醉望吟看不暫閒華嶽韓琦兩行脩竹夾雲根引入蓮峯山下村病骨驚魂安氣母幽亭淑景壓山蓀金琟逺望千灘出玉漏聲喧萬馬奔坐嘆空勞無計處却尋歸路日黄昏送秋馬上始見終南前人終南頻月晦峯巒一雨民心萬事寛救徹旱苗充嵗望洗開山色與人看半天横示全秦壯積雪髙連太白寒欲識衆多欣幸意送秋歌舞滿長安過武闗胡宿津亭歌闋戒棠舟五兩風來不暫留西北浮雲連魏闕東南初日滿秦州層城渺渺人傷别芳草萋萋客倦遊平樂舊歡收不得更憑飛夢到瀛洲宿終南山下百墖院蘇舜欽驅馬山前訪古蹤僧居瀟灑隔塵籠遶庭石鼈谷澗水入戸鳴鴟堆上風無限老松秋色裏數聲疎鐸月明中村雞坐聽三號徹去去前朝氣味同送李中舍襲之宰南鄭梅堯臣莫問褒中道路難襄陽直上幾重灘蒼烟古柏漢髙廟落日荒茆韓信壇出水䱹頭一絲挂穿虹雨脚兩橋殘土風大抵如南國期㑹先時俗自安和韓侍中上巳日㑹興慶池范純仁故堤髙柳緑􅆴􅆴花萼遺基映柳南啼鳥解招遊客醉落花時有戲魚銜舟擕羅綺添春色山破雲烟出曉嵐後㑹陪公應更樂行看廟勝掃妖欃華山謁希夷邵雍仙掌峯巒峭不收希夷去後遂無儔能斟時事髙抬手善酌人情畧撥頭畫虎不成心向在悲麟無應淚横流寤來不必多言語贏得清閒第一籌春日登大像閣富弼拂衣瀟灑倦塵寰走馬登臨未問禪匝野亂流縈古堞挿雲髙閣逼遥天山含暮色連青稼柳帶春容矗翠烟獨凭危欄不成句敢同當日善遊仙周公廟蘇軾吾今那復夢周公尚喜秋來過故宫翠鳳舊依山突兀清泉長與世窮通至今遊客傷離黍故國諸生詠雨濛牛酒不來烏鳥散白楊無數暮號風樓觀前人鳥噪猿呼晝閉門寂寥誰識古皇尊青牛乆已辭轅軛白鶴時來訪子孫山近朔風吹積雪天寒落日淡孤村道人應怪遊人衆汲盡階前井水渾种將軍諤米脂川大㨗王珪神兵十萬忽乘秋西磧妖氛一夕收匹馬不嘶榆塞外長城自起玉闗頭君王别繪凌烟閣將帥今輕定逺侯莫道無人能定國紅旗行去取涼州潼闗道中晁補之塵土長安古道深潼闗依舊接桃林使君總馬來何後道士青牛去莫尋春半河山猶寂寞日長坑阪正﨑􅋂平生冷笑元龍誤老覺求田負寸心遊終南雜詠三首選一李騊入門脩竹聳琅玕坐乆香風拂畫欄春色正穠雙檜靜朝光初上一峯寒翠縈虚室塵襟濶冷逼疎窓夜夢殘物外閑心殊未愜殷勤重上白雲端草堂秋夜思南鄭軍中陸游五丈原頭刁斗聲秋風又到亞夫營昔如埋劍常思出今作閒雲不計程盛事何由觀北伐後人誰可繼西平眼昏不禁陳編得挑盡殘燈不肯明恩封渭南伯唐詩人趙嘏為渭南尉當時謂之趙渭南後來亦將以予為陸渭南乎戲作長句前人老向人間乆倦遊君恩乞與渭川秋虛名定作陳驚座好句真慚趙倚樓棧豆十分霑病馬烟波萬里着浮鷗就封他日輕裘去應過三峯處處留次擇之韻聊紀秦事朱熹不知四海已揚湯舞殿歌䑓樂未央五帝威神等牛馬六王子女盡嬪嬙仙心乆已攀姑射辯口從教泣華陽行客詎明千古意虚疑霞佩響琳瑯長安懐古呉激佳氣猶能想欝葱雲間雙闕峙蒼龍春風十里㶚陵樹曉月一聲長樂鐘小苑花開紅漠漠曲江波漲碧溶溶眼前疊嶂青如畫借問南山共幾峯題五丈原武侯廟郝居中籌筆無功事可哀長星飛墮蜀山摧三分豈是平生志十倍寧論葢世才壞壁丹青仍白羽斷碑文字只蒼苔夜深老木風聲惡尚想褒斜萬馬來過華州王世昌拔地三峯冷翠微落嵓飛瀑噴珠璣吟鞭落拓騎驢過戰刃韜藏牧馬歸十丈玉蓮秋不謝半楞掌月晝還飛地靈人傑無遺逸未分蟠螭老布衣華清故宫馮延登寵貴羊羔退曲江華清霧閣對雲窓層巒未了霓裳舞遷客俄驚羯鼔腔簷際疎星疑曉鏡天邊晴樹認髙幢遊人尚喜風流在白石涵波皂莢雙上清宫三首選一李汾憶昔秋風從茂陵詞臣忝預漢公卿瑶池宴罷西王母翠輦歸來北斗城石馬嘶殘人事改刧灰飛盡海山平唯餘太液池邊月伴我驂鸞上玉京岐陽三首選一元好問眈眈九虎䕶秦闗懦楚孱齊几上看禹貢土田推陸海漢家封檄自天山北風獵獵悲笳發渭水蕭蕭戰骨寒三十六峯長劍在倚天仙掌惜空閒登灝靈門曉望張輅灝靈宫閟隱岧嶤清曉空濛瑞靄飄千古金城存祀典累朝寳册刻瓊瑶蓬萊天際終須到仙掌雲間遠見招詩客憑欄興難盡跨鸞安得上層霄長安方回客從函谷過南州畧説長安舊日愁仙隱有峯存紫閣僧居無寺問紅樓蘭亭古瘞藏狐貉椒壁遺基牧馬牛萬古不隨人事改獨餘清渭向東流華嶽張翔雲開華嶽欝嵯峨飛翠時來近玉珂鶴駐松崖秋積雪龜巢蓮井曉無波山中酒熟憑花勸馬上詩成倩鳥歌欲採靈芝尋未得石盆瑶草占春多潼闗鄒𢎞道踐華因河立户樞潼闗天險載黄圖眈眈虎視秦扄鑰欝欝龍蟠漢國都共説建瓴天上落幾看寃骨草間枯不知周召親分陜曾恃山川四塞無華清宫劉仲殷金粟堆前鳥弄風朝元閣上晚鳴鐘美人粉黛埋黄土湯殿潺湲響玉淙自昔詩人悲黍稷當時太液笑芙蓉不須重作髙唐賦蜀道巫山十二峯華山明秦康王志􅤎萬仞巍峩出自然巨靈手擘是何年三峯秀出雲霄外一掌髙擎日月邊李白問天登絶頂陳摶傲世隱危巔何當穩步長梯上摘取峯頭玉井蓮仙掌秦簡王成泳巨靈伸臂向洪崖雲際分明一掌開捧出海天紅日近挽將蓬島列仙來翠光閃爍縈朱草玉笋聨翩繡綠苔隔斷紅塵渾不到擎天功業陋三台渭陵殷奎炎精八葉已中衰千載荒陵竟屬誰寢殿有垣悲躑躅苑門無地覓罘罳祥開沙麓溝中絶禍變蹭􅱼土未夷颯颯涼風吹客髩不堪興感立多時咸陽懷古熊鼎立馬平原望故宫闗河百二古今雄南山雙闕阿房近北斗連城渭水通龍去野雲收王氣鶴巢陵樹起秋風英雄事業昭前哲看取秦皇漢武功第一闗王履裂石為闗似洞門天慳神秀此相分不曾臨澗先眠石未暇登峰且看雲鳥哢只從中界斷松聲耑許上方聞誰人更似周徵士不怕鍾山孔氏文行經華陰谷宏雲開太華倚三峯積翠遥連渭水東逺塞鴈聲寒雨外離宫草色暮烟中秦闗日落行人少漢畤天陰古戍空寂寂武皇巡幸處祠前木葉起秋風登終南茅大方一上終南望眼空長安景物畫圖中花間鶯避春城仗林杪僧歸曉寺鐘渭水東流來鳥䑕呉山西下走蛟龍我生自信通仙骨便欲同乘列子風橋山張三丰披雲履水謁橋陵翠柏烟含玉露輕袞冕霞飛天地老文章星煥海山清巍巍鳳闕迎仙島渺渺龍車駐帝城寂寞瑶臺遺漢武一輪皓月古今明經華嶽廟李賢華嶽巍巍勢獨雄層霄削出翠芙蓉紅光映日仙人掌黛色連天玉女峰絶頂泉飛千尺練懸崖根固萬年松四時賴爾興雲雨歴代尊崇祀典隆過鳳縣薛瑄莫道西行蜀道難老來深喜縱遐觀山從太白連岷嶺水號嘉陵出散闗石積層崖知地厚路登絶巘覺天寛驅兵過此思諸葛大節常留宇宙間擬唐長安春望黄閏南山晴望鬱嵯峨上路春香御輦過天近帝城雙闕逈日臨仙仗五雲多鶯聲盡入新豐樹柳色遥分太液波漢主離宫三十六樓䑓處處起笙歌咸陽懐古徐震阿房宫殿對南山閣道縈迴霄漢間覇業終隨烽火盡遊魂俄載屬車還三千童女空浮海十萬貔貅已入闗留得當年遺恨在長城血淚土猶斑長安道李朂層城迢遞入雲賒處處春風面面花長樂鐘聲催漏箭新豐樹色擁行車妖姬舞榭留明月貴主妝樓結綺霞日暮薌塵連九陌鑾輿傳幸五侯家祀雞臺伍福秦師畋得石如雞千載相傳作縣題覇業烟消山崒嵂祀臺神去草萋迷人行古道車還住花落東風鳥自啼只有當時清夜月至今光彩照前溪説經臺繫牛柏馬文升塵海仙家第一宫崢嶸臺殿詫秦工五千道徳言猶在百二河山勢自雄煉藥爐寒虚夜月繫牛柏老動秋風穹碑屹立斜陽外夜夜龍光貫彩虹馬融讀書石室前人扶風家世漢通儒不重椒房重道腴盧鄭又從髙第列郭嚴敢望後塵無春圍絳帳人如玉月滿荒臺樹有烏況是臨江遺廟在春風十里悵蘼蕪孤山堡楊一清簇簇青山隱戍樓暫時登眺使人愁西風畫角孤城曉落日晴沙萬里秋甲士解鞍休戰馬農兒持劵買耕牛回思未築邊墻日曾得清平似此不出連雲棧前人雞頭闗下石􅒎牙傍險憑髙此駐車一水縈紆通漢沔萬峰迴合控褒斜雲中板閣燒難絶谷口篔簹翠欲遮蜀道秦闗俱莫論如今四海正為家長安懐古王越渭水橋邊獨倚闌望中原是古長安斬蛇赤帝留神劍墮淚銅仙泣露盤宫錦為帆天外落霓裳成隊月中看不堪回首風塵後北斗城荒鴈塔寒晚渡咸陽馬中錫野色蒼茫接渭川白鷗飛盡水連天僧歸紅葉林間寺人喚斜陽渡口船表裏山河猶往日變遷朝市已多年漁翁不管興亡事獨坐秋風釣石邊曉發甘泉前人肩輿清曉發甘泉風雪遥連塞外天野店客敲門問酒土窰人隔水炊烟山無草木還多石地産氊裘不衣綿試叩征夫前路去戍鴉聲裏是延川登潼闗城樓柬諸指揮王傳層城樓閣枕山阿落日登臨感慨多虎豹當闗通紫氣魚龍吹浪見黄河百年鎻鑰神京路一劍風塵猛士歌北徼狼烟猶報警元戎何以淨干戈大秦寺前人終南佳氣鬱蒼蒼瑞草名花滿徑香道徳五千留望鼔樓䑓十二壯仙鄉鶴歸晴院松陰靜龍過秋潭雨氣涼欲問長生還未信重陽宫殿已斜陽子午谷王雲鳳馬前銅笛數聲頻柳底行沿漢水濵且喜晚炊來子午曾經春雨憶庚申採茶路曲穿林女放瀨聲髙蕩槳人却恨妖容幾喪國荔枝飛騎不沾塵潼闗李夢陽咸東天險設重闗閃日旌旗虎豹間隘地黄河吞渭水炎天白雪壓秦山舊京想像千官入餘恨逡巡六國還滿眼非無棄繻者寄言軍吏莫嗔顔華州作何景明秋城雨色靜微塵過陜山河望轉新天上嶽蓮開二華雲中闗樹引三秦追遊少小還今日浪跡乾坤任此身乘興更攀仙掌去未知登覽共何人輞川前人飛泉萬壑通藍水仄徑千峰入輞川野老那知旌節到世人空作畫圖傳黿鼉岸坼深無地雞犬林開忽有天即此買山堪避俗桃源何必訪神仙讀書石室王綸埜寺山岡石洞紆人傳曽是馬融居地深只隔秦人樹嵗乆仍藏禹穴書紺宇鐘連清梵寂碧蘿烟裊絳紗虚當年借問横經者前列生徒孰起予紫雲樓康海危樓逈對二峰孤哀壑平連萬頃蕪摩詰畫圖空掩映伯陽道徳豈虚無方西澗谷漢馳道直北河山周故都風土不殊人事異誰將緜瓞問司徒玉女洞前人當年鶴背誰同去此洞空留玉女名勝跡我來徒極目髙峰雲去正含情千秋不改龍潭色午夜猶聞玉佩聲惆悵夕陽歸去晚滿溪春浪鬱琮琤陳摶王九思華山隱士羨圖南髙臥於今尚有龕花鳥多情誰作主雲霞無恙夢猶酣玉峰臨路空勞望銕索懸崖不可探我欲東尋劉禹錫結茅同住碧巉巖含元殿故基管楫唐家雙闕大明宫廢址嵬然城角東世代已非陵谷變山河依舊市朝空盈堆瓦礫農耕遍無數牛羊野牧通過客不須此惆悵未央長樂總蒿蓬同兄登二郎山馬汝驥丹梯百丈繞雲松秀出綏州第一峰地接石城屯虎豹水交沙窟蘊魚龍風迴絳節時朝斗日晏黄冠自叩鐘捫棘踐苔聨步上回看萬井翠烟重入闗望華山何棟新解兵機罷鎮回重尋精舍白雲隈攀梯直上仙人掌度索還登玉女臺峰勢𩔖蓮皆北拱河流如練自西東乘風為問希夷子十丈荷花甚日開未央宫前人秦火纔燃楚已東鄼侯重築未央宫終南山色横門外清渭濤聲繞禁中壯麗豈緣誇後世悲歌猶恐似新豐千年王氣難消歇荒址猶含返照紅華山趙時春丹崖蒼壁勢崚嶒鳳翥龍盤幾萬層福地風雲靈氣合洞天宫闕斗光凝仙人掌上千嵓雪玉女峰前九月氷翠蓋紅蕖人不見玉壺朱紼興難乘拜將壇張潮不見將軍空古臺空謀相國為雄才五年籌策數言定萬里煙塵百戰開猛士計成誇善將大風歌起動悲哀閒亭獨倚江城外惆悵斜暉滿綠苔武侯廟前人丞相遺蹤不可尋漢南沔水氣蕭森雲霞樹繞旌旗色風雨江傳鼔吹音據鼎三分非本計出師二表見初心獨憐星隕荒祠廟千古忠懷激素襟上郡李攀龍髙城窈窕四山開西北浮雲睥睨迴鼓角疑從天上落軺車真自日邊來防秋尚借秦人策射石猶傳漢吏才聞道朝廷思猛士羽書飛過赫連臺太華山四首選一前人華頂岧嶤四望開正逢蕭瑟氣悲哉黄河忽墮三峰下秋色遙從萬里來北極風塵還郡國中原日月自樓臺君王儻問仙人掌願上芙蓉露一杯遊終南山王鶴勢拔羣山淨擁螺聲傳空谷聽樵歌紫芝滿地雲常䕶翠壁撐天雨乍過虎豹洞深千嶂合蛟龍潭古萬年多靈蹤望徹迷前路斷壁懸崖盡薜蘿磻溪宫張鍊丹厓迴遶翠微宫十度溪橋一徑通雙鶴歸巢元圃暗三花過雨石壇空林梢落月聞啼鳥磯上浮雲想釣翁聖主即今懐隱逸還應有夢到非熊楊知江招飲鳳翔東湖亭許孚遠使君開讌鳳城東亭隱湖心一鑑空萬疊青山春雨外數聲啼鳥暮林中封疆正履岐周舊勲業何如旦奭雄釃酒臨流千古意坐來鄙吝已消融壺口劉子誠西出崑崙東入瀛口雖禹鑿未能平湧為萬島排空勢捲作千雷震地聲映日霓虹浮瑞馬趂雲風雨起神鯨奔騰今古宣元氣聖主當陽正待清弔太史公墓葉夢熊大河東去勢茫然司馬殘碑記漢年狐史是非懸白日龍門踪跡已浮烟玉書神䕶空遺穴石室雲藏有剩編國士漂零同感慨一杯和淚滴重泉遊青柯坪溫純削成絶壁倚危梯剛到山腰眼界迷為近天門尋白帝故從鳥道拄青藜銜盃欲並峰蓮吸得句先擕玉女題正好乘風凌絶頂歸來恐作舊人啼雙槐王九皋疇將二樹留花縣明道先生手自栽豈是陶潛叢五柳寧同王氏植三槐千尋老幹天機發萬丈靈根地脈來酷似甘棠遺去後至今餘蔭覆琴臺明道為鄠縣主簿時所植今雙槐尚存在縣署儀門外遊龍門張維新一自荒山劃禹門洪河西北下崑崙無人不頌平成徳有峽猶瞻疏鑿痕浪拍桃花天際捲魚驚雷火水中翻仙舟況是陪元禮不道乘槎五色源鄜城春望李維禎西來山勢劇縱横殘雪流澌試火耕一徑寒烟通古戍幾枝衰柳帶春城彎弓月倚欄杆上結陣雲扶睥睨行笑殺黄蛇鄜衍口餘腥猶染曼胡纓金鎻闗即事王崇古牡丹川北兜零發柳樹坪西羽箭稠分陜獨憐金鎻夜抱闗猶記玉門秋征人倚堞烟雙峽病戍籌邊月半樓稍喜嫖姚整戎幕荒村拂曙聽啼鳩三川谷口前人三川晴月古今同萬里歸雲澗壑空飄泊當年憐杜老凄其異代憶陳公磨巖舊識山靈䕶弔古新傳草聖工錦水秦山均覊旅天涯千載一歸鴻吳嶽邢雲路巖巖呉嶽勢何雄極目秦闗指顧中二華東來連太白千峰西下接崆峒鸚藏古樹言成賦鳳翥髙岡曲度桐恠是五靈通灝氣芙蓉五朶插蒼穹秋日登西城望終南諸峰康萬民岸幘憑欄眺逺峰氤氳佳氣散芙蓉欲登瀛海三山島安得仙人九節笻紫塞夜寒歸候鴈昆明秋老隱游龍家貧性僻惟躭酒痛飲能追五柳踪望橋山黄帝宫王邦俊山前紫氣使車臨山下黄陵帝闕深終古橋門環逝水當時翠蹕御層岑漢臺曉落碧雲色秦柏晴垂玉砌陰千載龍髯勞想像鼎湖何處欲追尋孟姜女祠在同官王淑抃貞心苦節凛清秋雲樹蒼茫洞壑幽􅁫影不緣風日減同官志云龕中石隙祠人以燭燎之則有金􅁫出見手痕常傍岸沙浮又云經澮水漲手拍南厓而哭今岸崩徙跡仍不滅望夫臺上千行淚追騎山前萬縷愁又云秦追騎將及忽山峯轉移追者乃反試看澗邊東逝水而今猶帶哭聲流又云女至宜君山渴甚痛哭地湧甘泉今名哭泉華山登眺張銓獨上髙樓倚檻看岧嶤太華碧雲端蓮峰直界青天斷仙掌髙擎白日寒百代登封隆上祀千秋險隘抱長安平生剰有探竒志只待秋風生羽翰茂陵趙崡黄山歴盡見孤城城上樓髙眼倍明芳樹寢園今北望暮雲宫闕舊西京芙蓉晝冷仙翁露苜蓿春閒宛馬聲回首長楊誇獵地何人得似子雲名望華山文翔鳳自禮西皇逺度闗年年塵土上愁顔三峰彩翠垂天外兩眼清波照世間矯掌仙人擎月露倒盆玉女櫛煙鬟心花已作青蓮瓣直向雲臺更問山七盤坡王旌行盡一盤又一盤七盤都盡到平顛樵擕秦嶺薪芻過客為長安名利還半積半消沙路雪乍陰乍晴晚峰天盤桓回首生離思髙處臨風一悵然登祈仙臺陳䝉育百戰勞勞倦莫支東封西祀苦奔馳軒轅疑有生人徳漢武空懸遺世思春斷金盤仙掌露香殘王母碧桃枝荒臺木末煙雲外不盡凄凉猿鶴悲三川杜甫草堂田龍問柳尋花到草堂急呼村酒酹詩王乾坤無處容衰老風雅何人到盛唐春雨三川驅瘦馬秋風一劍寄空囊鄜州旅食崢嶸日南北音書共渺茫發咸陽次醴泉懐古龍膺原沙莽莽凍雲流極目偏増異代愁苔蝕碑陰圖紫燕槐蟠屋角幻蒼虬灰飛秦燼空歸漢瓦解唐墟倏易周莫訝醴泉泉已竭銅駝荆棘幾千秋遊輞川陳文燭人間何處避干戈幽勝無如此地何水盡山頭人跡少雲生樹杪鳥聲多良田數頃浮青靄怪石千峰長緑蘿況是知心有裴迪風流肯許右丞過登西嶽廟萬夀閣本朝宋琬咸京西望接平蕪下界陰晴乍有無九曲流從星宿海五陵烟鎻帝王都蓮華弄影空青落瀑布當窓雪練鋪咫尺三峰聊徙倚不須探笈索真圖登華山絶頂王鐸層層天上撫蒼松靈異陰森若有逢薦璧三峰驅孽鬼撥雲一杖跨茅龍星衢寒暑繇元籥陸海興亡幾暮鐘更向崑崙西眺望空濛無盡是芙蓉咏華山八首選一陳爌咫尺天門萬仞連遥瞻古道石梁邊層臺挂雪峰中練老樹擎風峪底絃未識上方依去鳥欲尋飛刹捫來烟黄河紫塞穿圍入自昔名山界大川曲江賈漢復長安城外曲江池文物風流萃一時樓傍紫雲涵倒影堤牽錦纜遶遊絲烟花半入鄒枚賦魚鳥空傳韋杜詞細柳青蒲今不見夕陽人唱黍離離賈大司馬修棧詠党崇雅憶昔崔巍棧道難千峰環峙白雲端參差峻嶺迷髙日俯仰重闗枕急湍煉石誰能旋大造移山今喜闢竒觀羨君才力誠名世削盡懸崖路萬盤題王玉質手蓉閣東蔭商阿閣髙含嶽頂霞幽人面嶽讀南華借來霄漢千尋掌搴得芙蓉十丈花屋裏峰巒流雨雪床頭雲氣走龍蛇神仙若訪樓居侣定降烏衣巷口家發細柳原寄榆林許大將軍髙副使鍾朗驛路花開津樹低春深沙曲草萋萋懷人三月迷紅雨奉使經年畏紫泥匹馬即今趨柳塞雙魚何日到榆溪雞鳴西望愁心逺千里邊烽靜鼓鼙扶風經伏波祠孟堅故里許之漸雄風三輔表黄圖按部扶風春草蕪銅柱有村悲故劍著書通里景鴻儒環山百雉今荒邑帶水千畦屬奥區眺首茂陵銜落日秦川渺渺正躊蹰㶚岸秋日孫爾思曲溪遥帶晚霞流水國蘆鄉易到秋動泬寥天碪較苦度滄凉月鴈知愁詩情舊植黄公柳黄明府於㶚岸築隄障水樹柳其上東西十餘里畫景新添青翰舟㶚舊無舟楫近始創為之咫尺烟波千古事鴟夷何必五湖遊望驪山樊英遥望驪山翠靄間幾回如向畫圖看泉通逺近蓮花暖雲鎻東西繡嶺寒形勝嵳峩臨渭水煙嵐縹緲接長安感懐更上朝元閣落日蒼茫獨倚欄登靖邊城黄元驥危樓雉堞曉雲平谿水東流雨後聲北望旌旗揺玉帳西連鼓角動金明藁砧昔斷深閨夢刁斗空憐逺戍兵秦月漢闗人不見風沙蕭瑟若為情吳山楊時薦天外芙蓉五朶開崔嵬山勢亦雄哉鳳凰巢上雲初聚鸚鵡峰前雨欲來望輦幾思通帝座㑹仙何必羨蓬萊數重烟霧封巒嶂雅興空擕謝􅄚回沉香亭故址彭年輦路青青燕麥齊鏤空斷礎枕蒿藜綵雲天外留歌舞斜日宫門動鼓鼙絶調幾人撡賦筆新粧何處問香泥徘徊野寺欄杆北清磬蕭然雜午雞望蒼頡墓陳上年支峰綴壑嶺頭分欲往從之隔暮雲陽武荒臺空漢草彭衙舊壘失秦軍石牛蘇長難為紀鐵土籐消不受焚反覺五陵多晚照蒼然獨有北山墳遊百塔寺王𢎞度谷口逶迤百塔深望中烟樹費招尋荒岡骨閉千年跡斷碣文留一代心僧老那知思往事客來猶自續髙吟憑闌舒嘯情何極滈水蒼茫隔暮陰謁蘇子卿墓王又旦荒原下馬讀殘碑知是當年屬國祠千古鴻名聞朔漠一坵黄壤接邊陲山臨落照羊來下路入西風鴈去遲此日茂陵蕪没盡可憐宰樹尚南枝萬夀閣在西嶽廟許孫荃千尋閣勢倚蒼穹縹緲真成白帝宫檻外三峰剛對華望中八水直趨潼虚疑玉女明星見實有青牛紫氣通應得祠官度報賽灝靈西極本無窮未央故址前人平原禾黍送西風野草連天有故宫鶯語樹猶通太液雞聲村欲問新豐依稀玉殿秋山外寂寞銅駝暮靄中却憶崛興無尺土黄圖還帶夕陽雄沔縣謁諸葛忠武侯祠王士禎天漢遙遙指劍闗逢人先問定軍山惠陵草木氷霜裏丞相祠堂檜柏間八陣風雲通指顧一江波浪急潺湲遺民衢路還私祭不獨英雄血淚斑鳳翔府前人城邊汧渭兩交流隴蜀中分第一州西雍横當斜谷路南山髙接杜陵秋雌鳴尚憶秦人覇星隕難銷漢相愁形勢依然身萬里扶風歌罷拂吳鈎漢武帝通天臺址前人通天臺畔望咸京秋入晴川雨半晴御宿不來仙掌散宫車已往露盤傾神光遙指虚無影渭水長流日夜聲此去西風茂陵路祗應腸斷沈初明咸陽早發前人日照長陵小市東依然踪跡逐飛蓬未央宫闕悲歌裏鄠杜鶯花淚眼中已見銅人辭漢月空留石馬卧秋風多情最有咸陽草和雨和煙嵗嵗同望嶽李因篤太華三峰列峻屏晴霄飛翠下空溟曉雲東抱闗河紫秋氣西來天地青玉女盆中寒落黛仙人掌上接明星亂餘林壑懐遺客縹緲幽棲賦采苓題頻陽王將軍廟碑五首選一王翦廟在富平前人山居滂沛灝靈偏美應為霖自昔傳將軍廟額曰美應侯避暑灣西遮虎阜聞雷廟左帶龍泉千家爼豆兼秋報四野桑麻接暮煙欲問崇褒何代始村翁不記漢唐年陜西通志巻九十六
