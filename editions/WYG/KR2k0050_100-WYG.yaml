body:
  text: 陜西通志巻一百拾遺三權竒滑稽神異鑒戒權奇秦晉戰於韓原秦獲晉侯以歸穆姬聞晉侯將至以太子罃𢎞與女簡璧登臺而履薪焉使以免服衰絰逆且告曰若晉君朝以入則婢子夕以死夕以入則朝以死唯君裁之乃舍諸靈臺左傳楚攻魏張儀曰不如與魏以勁之魏戰勝復聴於秦必入西河之外不勝魏不能守王必取之王用儀言魏兵罷敝恐畏秦果獻西河之外戰國策列士傳曰秦昭王㑹魏王魏王不行使朱亥奉璧一雙秦王大怒置朱亥虎圈中亥瞋目視虎目眥皆裂血出濺虎虎不敢動水經注戎使由余觀秦繆公退問内史廖曰孤聞鄰國有聖人敵國之憂也今由余賢奈何廖曰戎王處僻匿未聞中國之聲君試女樂以奪其志為由余請以疎其間留而莫遣以失其期戎王怪之必疑由余君臣有間乃可虜也繆公曰善令廖以女樂二八遺戎王戎王受而悅之由余數諫不聴遂降秦史記秦本紀闗中長安樊仲子槐里趙王孫長陵髙公子西河郭公仲雖為俠而逡遜有退讓君子之風史記游俠傳季布者楚人也弟季心氣葢闗中長事袁絲弟畜灌夫籍福之屬嘗為中司馬中尉郅都不敢不加禮少年多時時竊籍其名以行當是時季心以勇布以諾著聞闗中史記本傳母鹽氏闗中人吳楚兵起長安中列侯封君行從軍旅賫貸子錢家子錢家以為闗東成敗未決莫肯與唯母鹽氏出捐千金貸其息什之三月吳楚平一嵗之中則母鹽氏息十倍用此富闗中史記貨殖傳段紀明久為邊將威震西土其後賈詡察孝㢘為郎以疾病去官西還至汧道遇叛氐同行數十人皆為所執翊曰我段公外孫也汝别埋我我家必厚贖之詡實非段甥假以愳氐氐果不敢害與盟而送之其餘悉死冊府元龜太祖征劉備先遣逵至斜谷觀形勢道逢水衡載囚人數十車逵以軍事急輒竟重者一人皆放其餘太祖善之三國志賈逵傳楊忠華隂人小名奴奴召居帳下嘗從太祖狩於龍門忠獨當一猛獸左挾其腰右拔其舌太祖壯之北臺謂猛獸為揜于因以字之周書楊忠傳唐柴紹之弟某有材力輕趫迅捷踊身而上挺然若飛十餘歩乃止太宗令取趙公長孫無忌鞍韉仍先報無忌令其守備其夜見一物如鳥飛入宅内割雙􅌱而去追之不及又遣取丹陽公主鏤金函枕飛入内室以手撚公主面上舉頭即以他枕易之而去至曉始覺嘗著吉莫靴走上磚城且至女墻手無攀引又以足蹈佛殿柱至簷頭捻椽覆上越百尺樓閣了無障礙太宗奇之曰此人不可處京邑出為外官時人號為壁龍天中記李靖為岐州刺史人或告其謀反髙祖命御史按之謂曰靖反且實便可處分御史知其誣同行數驛佯失告狀驚懼鞭撻行典乃祈求於告事者曰李靖反狀分明親奉進㫖今失告狀幸救某命更請狀告事者乃疏狀於御史驗與本狀不同即日還以聞髙祖大驚御史具奏請不坐鴻書馬周初入京至霸上逆旅數公飲酒不顧周周市斗酒濯足衆異之眉公秘笈中書舎人郭正一破平壤得一髙麗婢名玉素極殊艷令専知財物庫正一夜須漿水粥玉素乃毒之而進正一急曰此婢藥我索土漿甘草服之良久乃解覔婢不得并失金銀器物十餘事錄奏勅令長安萬年捉不良脊爛求賊鼎沸三日不獲不良主帥魏昶有策略取舍人家奴選年少端正者三人布衫籠頭至街縛衛士四人問十日内已来何人覔舍人家衛士云有投化髙麗留書遣付舍人捉馬奴書見在檢云金城坊中有一空宅更無語不良往金城坊空宅並搜之至一宅封鎻甚密打鎻破開之婢及髙麗並在其中拷問乃是投化髙麗共捉馬奴藏之奉敕斬於東市朝野僉載上藩邸時戱游城南有書生延上過其家家貧止一驢書生殺驢備饌與語磊落不凡問其姓名乃王琚也自是上每游韋杜必過琚家諮議及韋氏專制密言於琚曰亂則殺之又何疑也上遂納琚謀戡定禍難累拜中書侍郎實預配享開天傳信記李相夷簡未登第時為鄭縣丞涇軍之亂有使走驢東去甚急夷簡入白刺史曰聞京城有故此使必非朝命請執問之果朱泚使於朱滔者國史補李汧公鎮鳳翔屬邑民因耨田得馬蹄金一瓮送於縣署宰邑者慮公藏主守不嚴置於私室信宿重開視之皆為土塊以狀聞府遣吏按其事宰邑者莫能自白遂以易金伏罪時袁相公滋在幕中疑此事汧公曰非判官莫探情偽袁相曰諾因俾移獄府中按問乃令閱瓮間得三十五塊詰其初獲者即本質在焉遂於列肆索金鎔瀉與塊形等既成秤其半已三百斤矣詢其負擔人力二農工舁至縣境計其負金大數非二人以竹擔可舉明其即路金已化土矣於是羣情大豁宰遂獲雪劇談録開元中吳郡士人入京應明經至京閒步曲坊逢二少年揖士人而過色甚恭後數日又逢二人揖之請行士人強隨之至其處舍宇極整升堂列筵甚盛及午見一女子乘車至容色甚佳二人羅拜女亦不答揖客入宴酒數巡女子捧盃問士人曰聞君有妙技肯賜觀乎士人遜謝曰某但能着靴於壁上數步女曰請試之士起行於壁上不數步而下女乃顧坐中諸少年各令呈技有行於壁上者有手緣椽行者少頃女子起辭士人出驚惶不安又數日途中復見二人曰欲假駿騎可乎士人許之至明日聞宫苑中失物掩捕其賊惟收得馬驗問馬主遂收士人入内勘問驅入小門吏自後推之倒落深坑仰望屋頂惟見一孔深夜悲惋之極忽見一物如鳥飛下覺至身乃人也以手撫士曰毋驚某在無慮也聴其聲則向女子也用絹重縛士人胸膊訖以絹頭繫女身聳然飛出宫城去門數十里乃下劍俠傳韓翃少負才名天寳末舉進士居長安隣有李將軍妓栁氏李每至必邀韓同飲一日酒酣謂韓曰秀才當今名士柳氏當今名色以名色配名士不亦可乎韓懇辭李卒投之韓來嵗成名淄青節度侯希逸奏為從事以世方擾不敢以柳自隨置于都下期至而迓之連三嵗不果迓後翊隨侯希逸入朝尋訪不得已為畨將沙吒利所刧翊悵然不能割一日淄青大校置酒邀韓座人曰韓員外風流談笑未嘗不適今日何慘然耶韓具話之有虞侯將許俊年少被酒起曰俊嘗以義烈自許願得貟外手筆數字當立致之韓與之俊乃急裝乘一馬牽一馬而馳逕趨沙吒利之第會吒利出即以白曰將軍墜馬且不救遣取柳夫人柳驚出即以韓札示之挾上馬絶馳而去座未罷以柳氏授韓曰幸不辱命時吒利初立功代宗方優借大懼禍作闔坐同見希逸白其故希逸扼腕奮髯曰此我往日所為事俊乃能爾乎立修表上聞深罪沙吒利代宗御批曰沙吒利宜賜絹二千疋柳氏却歸韓翊外史章臺柳傳唐彭先覺叔祖博通膂力絶倫嘗於長安與狂士魏𢎞哲宋令文馮師本角力博通堅卧命三人奪其枕三人力極牀脚盡折而枕不動嘗與家君同飲會暝獨持兩牀降階就月於庭酒俎之𩔖略無傾瀉御史臺記徳宗初登勤政樓外無知者望見一人衣緑乘驢至樓下仰視久之俛而東去上立遣宣示京尹命以物色求之尹召萬年捕賊官李錡使促求訪李尉佇立思之曰必得出召幹事於春明門外數里内應有諸司舊職事伎藝人悉搜羅之而緑衣者果在其中詰之對曰某天寶教坊樂工也上皇時數登此每來鴟必集樓上號隨駕老鴟某自罷居城外更不復見今羣鴟盛集又覺景光宛如昔時心知聖人在上悲喜且欲泣下以此奏聞勅盡收此輩李尉亦為京尹擢用後至郡守因話錄郭晞在邠州縱士卒為暴節度使白孝徳患之涇州刺史段秀實自請補都虞孝徳從之既署一月晞軍士十七人入市取酒以刃刺酒翁壞釀器秀實列卒取十七人首注槊上植市門晞一營大譟盡甲孝徳震恐召秀實曰奈何曰無傷也請往解之孝徳使數十人從行秀實盡辭去選老躄者一人持馬至晞門下甲者出秀實笑且入曰殺一老卒何甲也吾戴吾頭來矣晞出秀實讓之曰副元帥勲塞天地當念終始今常侍恣卒為暴行且致亂亂則罪及副元帥郭氏功名存者幾何言未畢晞再拜叱左右解甲散還伍柳宗元段太尉逸事狀有江節者其母避瘧於村西禄田寺金剛下因假寐感而生節節有神力入長安行到東渭橋橋邊有石獅子重千斤節指而告人曰吾能提此而擲之人不信節遂提獅子投之丈餘衆駭異遂賂請節又提而致之故地尋薦入禁軍補神䇿軍將嘗對御俯身負一石碾置二丈方木于碾上上又置一床上坐龜兹樂人一部奏曲終下無壓重之色徳宗甚寵惜之歙州圗經貞元中有韋自東嘗遊太白山棲止段將軍莊段素知其壯勇一日眺望山谷段將軍曰昔二僧居山頂聞樵者說僧為怪物所食又聞人說有二夜义亦無人敢窺自東怒曰今夕必挈夜义首至門下遂仗劍奮衣捫蘿躡石至精舍見佛堂内細草茸茸似有巨物偃寢四壁多掛野彘𤣥熊或庖炙之餘自東度夜义未至遂拔栢樹徑如碗為杖扃其戸以石佛拒之夜未分夜义挈鹿而至怒其扃鐍大呌以首觸門折石佛而踣於地自東以栢樹撾其腦死而拽之入室又闔其扉頃之復有夜义繼至亦哮吼觸扉復踣于戸閾又撾之亦死遂掩關烹鹿而食及明斷二夜义首示段段大駭曰真周處之儔矣太平廣記唐韋行規少遊京西暮止店中既而欲兼程歸第老人曰勿夜行此地多盜韋云某留心弧矢無虞也因行數里天晚有人尾之韋叱不應連發矢中之不退矢盡韋懼䇿馬行有頃風雷驟至韋下馬負大樹見空中雷電相逐漸偪樹杪韋乃投弧拜乞命風雷漸息韋顧樹枝葉剪擊盡矣行李胥失遂返前店老人笑曰客勿恃弓矢須知劍術引韋入後院指行李曰聊相試耳又出桶板一片昨夜之箭悉中其上韋請學其術不許劍俠傳義成監軍薛盈珍欲奪節度使姚南仲軍政乃遣小吏程務盈乘驛誣奏南仲罪牙將曹文洽亦奏事長安知之晨夜兼行追及務盈于長樂驛按長樂驛唐時在富平境與之同宿中夜殺之沈盈珍表於厠中自作表雪南仲之寃且首專殺之罪亦作狀白南仲遂自殺明旦門不啟驛吏排之入得表狀於文洽尸旁上聞而異之徴盈珍入朝通鑑唐大厯中有崔生者其父為顯僚與蓋天之勲臣一品者熟生時為千牛父使往省一品疾生少年容貌如玉一品忻然命坐與語時三妓居前以金甌貯緋桃擘之沃以甘酪而進一品命衣紅綃妓者擎一甌與生食辭去一品命紅綃送出院時生囘顧妓立三指又反掌者三然後指胷前小鏡子云記取生歸恍然凝思日不暇食時家有崑崙奴磨勒顧謂曰郎君心中有恨何不報老奴生具告之又白其隠語磨勒曰立三指者宅中十院歌姬此第三院耳反掌三者數十五胸前小鏡子十五夜月圎如鏡令郎來耳磨勒笑曰後夜乃十五夜請深青絹兩疋為郎君製束身之衣一品宅有猛犬當為郎君撾殺之洎十五夜三更與生衣青衣遂負而踰十重垣至第三院繡戸不扃金釭微明惟聞妓長嘆而坐生搴簾而入姬躍下榻執手曰郎君有何神術而能至此生具告磨勒之謀姬召入以金甌酌酒而飲之徐白生曰賢爪牙既有神術何妨為脫狴牢所願既伸雖死不悔磨勒曰此亦小事耳遂負生與姬飛出峻垣十餘重守禦者及旦方覺一品大駭曰此必俠士挈之無更聲聞姬隠崔生家二載花時駕小車遊曲江為一品家人誌認白之一品召崔生詰其事懼不敢隠遂言奴磨勒一品曰他事不問某須為天下人除害命甲士五十人嚴持兵仗使擒磨勒磨勒持匕首飛出髙垣瞥若翅翎疾同鷹隼攢矢如雨莫能中之頃刻不知所向後十餘年有人見磨勒賣藥於洛陽市容顔如舊崑崙奴傳黎幹為京兆尹時曲江禱雨獨有老人不避黎怒杖背二十如擊鞔革黎疑非常人命老坊卒尋至蘭陵里入小門大言曰我今日困辱甚可具湯也坊卒反白黎黎因敝衣至其處曰向迷丈人物色罪當十死老人驚起曰誰引君來此即具酒設席語及養生術言約理辯因曰老夫有一技請為尹設遂入良久紫衣朱鬕擁劍長短七口舞於庭中迭躍揮霍攙光電激有短劍二尺餘時時及黎之袵食頃擲劍植地揖黎而入黎歸臨鏡方覺鬚刜落十餘翌日復往室已空矣酉陽雜俎張松夀為長安令時昆明池側有刧殺奉勅十日内須獲賊夀至行刧處尋蹤緒見一老婆于樹下賣食以從騎䭾入縣供以酒食經三日還以馬送舊坐處令一腹心人看有人共婆語即捉来須㬰一人来問明府若何為推遂即被布衫籠頭送縣一問具承賍並獲時人以為神明朝野僉載興元兵亂殺李絳以尚書右丞温造為山南西道節度使造至褒城遇興元都將衛志忠征蠻歸造密與之謀誅亂者以兵八百人為牙隊五百人為前軍入府分守諸門造視事享將士於牙門造曰吾欲問新軍去留之意宜悉使来前既勞問命坐行酒志忠宻以牙兵圍之既合唱殺新軍八百餘人皆死其手殺絳者斬百段通鑑唐王仙客尚書劉震之甥少孤隨母歸外氏與震之女無雙幼相狎愛劉氏疾且死召震以仙客為託無令無雙歸他姓仙客䕶䘮歸葬襄鄧服闋抵京值涇原兵反驚走歸襄陽三年後知尅復京師乃入京訪舅氏消息遇舊使蒼頭塞鴻乃聞尚書受偽官與夫人皆處極刑無雙已入掖庭惟所使婢采蘋在金吾將軍王遂中宅乃厚價贖之稅屋與鴻蘋居尋為富平縣尹知長樂驛累月忽報中使押領内家三十人徃園陵備灑掃氊車十乗下驛中訖仙客恐無雙在焉因令塞鴻為驛卒烹茗於簾外夜深忽聞簾下語曰塞鴻汝爭知我在此耶鴻曰郎君見知此驛疑娘子在此令鴻問訊無雙曰明日我去後汝於東北舍閣子中紫褥下取書送郎君其書後云常見敕使說富平古押衙人間有心人今能求之否仙客尋訪古押衙見於村野凡所願必力致之一年未開口古生忽曰察郎君意將有求於老夫老夫乃一片有心人也仙客泣拜以實告古生仰天以手指腦數四曰此事大不易然與郎君試求不可旦夕便望半嵗無消息一日謂仙客曰宅中有人識無雙否仙客以采蘋對古生端相喜曰暫借三五日後累日忽傳有髙品過處置園陵宫人仙客心甚異之是夕更深聞扣門甚急及開門乃古生領一篼子入謂仙客曰此無雙也今死矣後日當活仙客抱入閣子中獨守之至明遍體有暖氣至夜方愈古生曰比聞茅山道士有藥術服之立死三日却活某使人求一丸采蘋假作中使以無雙逆黨賜此藥令自盡至陵下託以親故百縑贖其尸道路郵傳皆厚賂必免漏泄處置訖老夫為郎君自刎門外有擔子十人馬五匹絹二百疋五更挈無雙便發變姓名浪跡以避禍言訖舉刃仙客救之頭已落矣並尸蓋覆訖潛奔蜀下峽終老襄鄧間唐薛調撰憲宗元和八年上以用兵事委武元衡李師道所養客請密往刺之元衡入朝出所居靖安坊東門有賊自暗中突出射殺之取其顱骨而去又入通化坊擊裴度傷其首墜溝中度氊帽厚得不死傔人王義自後抱賊大呼賊斷義臂而去京城大駭賊遺紙於金吾及府縣曰毋急捕我我先殺汝詔中外所在搜捕神策將軍王士則等告王承宗使張宴等殺元衡李師道客竟潜匿亡去通鑑京國豪士潘將軍在光徳坊有玉念珠貯以繡囊玉合一日啓囊亡珠主藏者密話於王超超他日過勝業里北街有女子年十七八衣裳襤褸著木履道側值少年蹴踘接送髙數丈超異之因結為甥舅見其累日不爨設殽則水陸異珍吳中初進洞庭橘恩賜宰臣女以二枚贈超超甚疑嘗從容謂曰潘將軍失念珠知否微笑曰從何知超曰若可得當厚酬女子曰舅詰旦於慈恩寺塔院相候超往女子已至謂超曰少頃仰觀塔上當有所見語訖而走疾若飛鳥忽舉手示超歘然攜念珠下曰便可將還超送詣潘備金帛為贈明日訪之已空室矣劇談録唐文宗嘗寳白玉枕乃徳宗朝于闐國所貢也置寢殿中一旦忽失所在上驚駭移時下詔都城索賊有龍武蕃將王敬𢎞常蓄少僕神彩俊利一日敬𢎞於威逺軍會宴有侍姬善鼓胡琴四座酒醉因請度曲辭以樂器非妙須常御者彈之時中漏已傳求之不及頃之小僕以繡囊將琵琶而至敬𢎞驚異時失枕搜捕嚴急宴罷敬𢎞問曰汝殆俠士耶小僕曰非有此但能行耳因言偷枕者田膨郎也勇力過人且善超越茍非折其足雖千兵萬騎亦將奔走自兹再宿候于望仙門伺便擒之是時涉旬無雨塵埃頗甚跬步間人不相見膨郎與少年數軰連臂將入軍門小僕執毬杖擊折其左足仰而言曰我偷枕来不怕他人惟懼子耳既此相值豈復多言於是上得賊甚喜引膨郎臨軒詰問具陳常在宫内往来遂令凡内外囚繫悉原赦之劍俠傳京兆尹薛元賞常詣李石第聞石方坐㕔事與一人爭辯甚喧使覘之云有神策軍將訴事元賞趨入責石曰相公綱紀四方近不能制一軍將何以鎮服四夷即趨出上馬命左右擒軍將俟於下馬橋至則已解衣跪之矣其黨訴於仇士良士良遣宦者召之元賞曰屬有公事遂杖殺之乃白服見士良士良知軍將已死無可如何乃呼酒與元賞歡飲而罷通鑑咸通中張季𢎞勇而多力嘗雨中經勝業坊有村人驅驢負薪適當其道季𢎞怒捉驢四足擲過水渠數步觀者驚駭後泊商山逆旅有老嫗愁憤吁歎季𢎞問之曰有新婦悖徳制之不可季𢎞笑曰當為主人除之日暮婦人負薪歸季𢎞召而謂曰我在長安即聞汝倚氣力不承事阿家婦曰只如某年此事豈是新婦不是每言一事輒引手於季𢎞所坐盤石上以中指畫之隨手作痕深可數寸季𢎞汗落神駭劇談録陳子昂初入京不為人知有賣胡琴者以千緡市之衆驚問曰余善此樂皆曰可得聞乎曰明日可集宣陽里如期偕往則酒肴畢具置胡琴於前食畢捧琴語曰蜀人陳子昂有文百軸馳走京轂不為人知此樂賤工之役豈宜留心舉而碎之以其文軸遍贈會者一日之内聲華溢京都酉陽雜俎張乖崖布衣時客長安旅次聞鄰家夜聚哭甚悲訊之其家無他故乖崖力叩之主人遂以實告曰某在官不慎嘗私用官錢為家僕所持欲娶長女拒之則畏禍從之則女子失身所以舉家悲泣乖崖明日至門首候其僕出即曰我白汝主人假汝至一親家僕遲遲強之而去出城使導馬前至崕間即疏其罪僕倉皇間以刃揮墜崕中歸告其鄰曰盛僕已不復來矣速歸汝鄉後當謹於事也聞見後録宋元符年間衆人宿岐山縣客邸明日一人亡其首無血官捕殺者踰年竟不得或云俠客氣劍中人無血聞見後録鄧弼字伯翊秦人也以力雄人鄰牛方鬬不可劈拳其脊折仆地市門石鼓十人舁弗能舉兩手持之行一日獨飲娼樓蕭馮兩書生過其下急牽入共飲弼自據中筵酒酣解衣箕踞拔刀置案上兩生素聞其酒狂欲起走弼止之曰弼亦粗知書四庫書從君問即不能答當血是刃兩生遽摘七經數十義問之弼歴舉傳䟽復詢歴代史上下三千年纚纚如貫珠兩生相顧慘沮不敢再有問弼索酒披髪跳叫曰吾今日壓倒老生矣泰定間徳王執法西御史臺弼造書請謁閽卒不為通弼曰若不聞闗中有鄧伯翊耶連擊踣數人聲聞於王令隸人捽入弼盛氣曰公奈何不禮壯士王曰爾自號壯士解持矛鼓譟前登堅城乎曰能百萬軍中可刺大將乎曰能王顧左右曰姑試之問所須曰銕鎧良馬各一雌雄劍二王即命給予陰戒善槊者五十人馳馬出東門外然後遣弼往王自瞻觀弼至衆槊並進弼虎吼而奔人馬辟易五十步已而烟塵障天但見雙劍飛舞雲霧中連斫馬首墮地血涔涔滴王撫髀歎曰誠壯士誠壯士命酌酒勞弼弼立飲不拜由是聲振一時宋濂鄧弼傳榆林堡之敗總旗江通所領十人通乗良馬善走餘九人馬不能及通曰余走則脱餘皆不免人手吾不忍也乃下馬背相倚而立命九人曰不可不死中求生時天暑十弓惟二弓可射通視其來攻處則射之内六人中賊矢通曰傷者母坐坐則賊乘隙而攻吾俱死矣傷者立如令賊不敢逼皆得免歸醫閭漫記近有二賈路迷誤入終南山猿啼虎嘯意其必死望烟炊而進得草廬有老嫗訝之曰爾何来吾兒勇且武遇之則死宜速去二賈求哀老嫗不得已而止之俄有一勇士以鐵杖擔一虎一鹿而歸嫗語之二賈為通姓氏具告以失路艱辛之狀勇士憐之遂出酒肉為餉了無害意明旦二賈告行勇士送之半途而返且曰勿語吾姓名恐見知也莘野纂聞秦中王某為商結隊偕發忽剪徑賊至王叱馭前進寇近皆僵立不動若膠其脛王行逺寇乃得轉動逸去蓋以秘術制之也曠園雜志明涇陽郭光緯兄光經早卒遺一子光緯撫之值嵗荒度勢不能俱存乃自舍其次子攜姪並長子就食他方以全兩門宗祀郢上劉元勲記其事至比之鄧伯道云涇陽縣志滑稽范睢至秦秦王見之離宫睢佯為不知永巷而入其中王来宦者怒逐之曰王至睢謬曰秦安得王獨有太后穰侯耳王微聞其言乃屏左右跪而請教睢因説曰臣居山東時聞齊之有田文不聞其有王也聞秦之有太后穰侯華陽髙陵涇陽不聞其有王也夫擅國之謂王能利害之謂王制殺生之威之謂王今太后擅行不顧穰侯出使不報華陽涇陽等擊斷無諱髙陵進退不請四貴備而國不危者未之有也為此四貴者下乃所謂無王也臣聞善治國者乃内固其威而外重其權穰侯使者操王之重決制於諸侯剖符於天下政適伐國莫敢不聽戰勝攻取則利歸於陶國弊御於諸侯戰敗則結怨於百姓而禍歸於社稷詩曰木實繁者披其枝披其枝者傷其心大其都者危其國尊其臣者卑其主今自有秩以上至諸大吏下及王左右無非相國之人者見王獨立於朝臣竊為王恐萬世之後有秦國者非王子孫也昭王聞之大懼史記列傳優旃者秦倡朱儒也善爲笑言然合於大道始皇議欲大苑囿東至函谷闗西至雍陳倉優旃曰善多縱禽獸於其中寇從東方來令麋鹿觸之足矣始皇以故輒止二世欲漆其城優旃曰善主上雖無言臣固將請之漆城雖百姓愁費然佳哉漆城蕩蕩寇來不可上即欲就之易為漆耳顧難為蔭室於是二世笑之以其故止史記滑稽傳齊助楚攻秦惠王患之張儀南見楚王曰大王茍能閉關絶齊臣請使秦王獻商於之地方六百里楚王大恱使人絶齊張儀知楚絶齊也乃見使者曰從某至某廣從六里使者曰臣聞六百里不聞六里儀曰儀固小人安得六百里戰國策武帝時有殺上林鹿者下有司收殺之東方朔時在旁曰是固當死者三使陛下以鹿殺人一當死天下聞陛下重鹿賤人二當死匈奴有急須鹿觸之三當死帝黙然赦之曼倩傳漢武帝時上林獻棗上以杖擊未央殿檻呼朔曰叱叱先生来来先生知此䈄裏何物朔曰上林獻棗四十九枚上曰何以知之朔曰呼朔者上也以杖擊檻兩木林也朔來來者棗也叱叱者四十九也上大笑賜帛十疋齊民要術漢武游上林見一好樹問東方朔朔曰名善哉帝陰使人浴其樹後數嵗復問朔朔曰名為瞿所帝曰朔欺人矣名與前不同何也朔曰夫大為馬小為駒長為雞小為雛大為牛小為犢人生為兒長為老且昔為善哉長為瞿所長少死生萬物敗成豈有定哉帝乃大笑小說王吉居長安其東家有棗樹埀吉庭中吉婦取啖吉吉知而去婦東家聞欲伐其樹鄰里止之因請吉還婦為之語云東家棗熟王吉婦去東家棗完婦去復還漢書王吉傳王莽簒位後復上符命者莽盡誅時揚雄校書天祿閣使者欲收雄雄恐乃從閣自投幾死京師為之語曰惟寂寞自投閣爰清靜作符命漢書揚雄傳李廣屏居藍田山中射獵嘗夜還至亭霸陵尉醉呵止廣曰故李將軍尉曰今將軍尚不得夜行何故也漢書李廣傳更始在長安所授官爵或膳夫庖人長安為之語曰竈下養中郎將爛羊胃騎都尉爛羊頭闗内侯東觀漢記丁邯京兆陽陵人也為漢中太守妻弟為公孫述將邯收妻繫南鄭獄免冠徒跣自陳詔曰漢中太守妻乃係南鄭獄誰得搔其背垢者懸牛頭賣馬脯盜跖行孔子語以邯服罪決録注周天官選人沈子榮誦判二百道試日不下筆人問之榮曰今日誦判無一相當有一道蹟同人名又别至來年選判水磑又不下筆人問之曰我誦水磴乃是藍田今問富平如何下筆聞者莫不撫掌朝野僉載秦王俊為尚書俊妃崔氏生男隋主喜頒賜羣臣直秘書内省李文博素貧人往賀之文博曰賞罰之設功過所存今王妃生男於羣臣何事乃妄賞也通鑑楊素闗中人侯白山東人關中謂水為霸山東言擎將去為搩音其列反刀去素嘗戲白曰山東固多仁義借一而得兩曰若為得兩答曰有人從其借弓者乃曰搩刀去豈非借一而得兩白應聲曰闗中人亦甚聰明問一而知二素曰何以得知白曰有人問北来多雨渭水漲否答曰霸長豈非問一知二素於是服其辯捷啟顔録釋元康入京見一法師盛集徒衆講經譏康無生徒康為之解曰甘桃不結實苦李壓低枝太宗聞之詔入安國寺講全唐詩話貞觀中尹伊嘗為坊州司戸尚藥局牒省索杜若省符下坊州供送伊判之曰坊州本無杜若天下共知省符忽有此科應由謝脁詩誤華省曹郎如此判豈不畏二十八宿向下笑人大唐新語文徳皇后既葬太宗於苑中作層觀以望昭陵嘗引魏徴同登使視之徴熟視之曰臣昏眊不能見上指視之徴曰臣以為陛下望獻陵若昭陵則臣固見之唐書魏徵傳化度寺貞觀中有僧裴元智戒行修謹宛是修行人使之守藏盜去黄金極多寢房壁上有詩曰將肉遣狼守置骨向狗投自非阿羅漢誰能免得偷靈異小録永徽元年上出獵遇雨問諫議大夫谷那律曰油衣若為則不漏對曰以瓦為之必不漏上恱綱鑑補唐長孫元同幼有機辯永徽中在京會宴衆因曰醴泉去京不逺百姓遂行蠱毒須逺配流一人乃曰若令配流處還有百姓此人復行蠱毒元同即云若令元同安置必令得所諸人問之答曰但行蟲毒人並送與莫離支作食手衆皆歡笑啓顔録髙宗時閻立本善畫為右相姜恪以邊將立功為左相時人語云左相宣威沙漠右相馳譽丹青全唐詩話雛駱駝長安人其子昉與蕭佺駙馬遊時人語曰蕭佺駙馬子雛昉駱駝兒非闗道徳合只為錢相知全唐詩話唐内謁者監仇士良請以開府蔭其子千牛給事中李敏中判云開府階誠宜蔭子謁者監何由有兒士良慙恚綱鑑補陸餘慶轉洛川長史善論事而謬於判決人嘲云說事則喙長三寸判事則手重五斤全唐詩話竇懷貞為京兆尹神龍之際京尉由墨勑入臺者不可勝數或謂懷貞曰縣官相次入縣事多辦否懷貞對曰倍辦於往時問其故曰好者總在僥倖者去故也聞者皆大噱大唐新語𤣥宗為太子王琚至長安見之至庭中故徐行宦者曰殿下在簾内琚曰何謂殿下今獨有太平公主耳上遽召見與語通鑑𤣥宗嘗登苑北樓望渭水見一醉人臨水卧問左右是何人左右不知將遣使問之黄幡綽曰臣知之此是年滿令吏上曰爾何以知對曰更一轉入流上大笑松窗雜録宋璟為相朝集使往往齎貨入京師將還多遷官璟奏一切勒還璟又疾負罪而妄訴不已者悉付御史臺治之人多怨之會天旱優人作魃狀戯於上前問魃何為出對曰負冤者三百餘人相公悉以繫獄故不得不出耳上心以為然罷璟世史𩔖編唐天寳初𤣥宗遊華清宫劉朝霞獻駕幸温泉賦詞調倜儻雜以俳諧其賦首云若夫天寳二年十月後兮臘月前辦有司之供具命駕幸於温泉青一隊兮黃一隊熊蹋胸兮豹拏背珠一團兮繡一團玉鏤珂兮金鏤鞍其後述聖徳云遮莫你古來千帝豈如我今代三郎其自叙云今日是千年一遇叩頭莫五角六張上覽而奇之將加殊賞命朝霞改去五角六張字奏云臣草此賦若有神助自謂文不加㸃筆不停綴不願改之上聞顧左右曰真窮薄人也遂授春宫衛佐而止焉開天傳信記裴休㢘察宣城未離京值曲江池荷花盛發同省閣名士遊賞自慈恩寺各屏左右隨以小僕歩至紫雲樓見數人坐於水濱裴與朝士憩其旁中有黄衣半酣軒昂自若指諸人笑語輕脫裴意稍不平揖而問之吾賢所任何官率爾對曰喏郎不敢新授宣州廣徳令及問裴曰押衙所任何職裴效之曰喏郎不敢新授宣州觀察使於是狼狽而去同坐亦皆奔散朝士撫掌大笑不數日布至京華後於銓司訪之曰有廣徳令請換羅江矣宣皇在邸聞是說與諸王每為戯談松窻雜録魏奉古初任為雍州尉九日公宴有客草序五百言奉古曰此舊文也授筆倒書之徐笑曰適覽記之耳尚友録京城流俗僧道常爭二教優劣總章中興善寺為火所焚東明觀道士李榮詠詩曰道善何曽善言興且不興如來燒赤盡惟有一羣僧全唐詩話元次山自叙遊長安中與丐者友或以友丐為太下者然世有丐顔色於人丐名位於人者不此之羞而羞與丐者伍耶清暑筆談元和中長安有沙門善病人文章尤能捉語意相合處張籍頗恚之冥捜得句曰長因送人處憶得别家時徑往誇揚乃曰此應不合前輩意也僧笑曰此有人道了也籍曰向有何人僧冷吟曰見他桃李發思憶後園春籍因撫掌大笑摭言元和中令狐楚鎮三峯時及秋賦牓云特置五塲試蓋詩歌文賦帖經為五盧𢎞正獨詣華試自謂獨步已試兩塲馬植下解狀既而植試登山採珠賦略曰文豹且異於驪龍採斯踈矣白石又殊於老蚌割莫得之楚服其精當遂奪𢎞正狀頭後𢎞正自丞郎使判鹽鐵俄而為植所據𢎞正以手札戱植曰昔日華元曾遭毒手今來鹺務又中老拳太平廣記韋慶本女選為妃詣明堂謝而慶本兩耳先巻朝士多呼為巻耳長安令杜松見而賀之曰僕固知足下女得妃慶本曰何以知之松曰巻耳后妃之徳也羣居解頤崔沆及第年為主罸録事同年盧彖俯近闗讌堅請假往洛下拜慶既而淹緩久之及同年讌於曲江亭子彖以雕幰載妓微服鞚縱觀於側遽為團司所發沆判之略曰深攙席帽密映氊車紫陌尋春便隔同年之面青雲得路可知異日之心摭言劉行敏令長安有崔生飲酒歸犯夜武侯執縛五更初猶未解行敏至街逢之與解縛因戯詠之曰崔生犯夜行武候正嚴更幞頭拳下落髙髻掌中擎杖迹胸前出繩文腕後生愁人不惜夜隨意曉參横全唐詩話唐三原縣令閻元一為人多忘曽至州於主人舍坐州佐史前過以為縣典也呼欲杖之典曰某是州佐也一慙謝而止須㬰縣典至一疑其州佐也執手引坐典曰某是縣典也又愧而止曽有人傳其兄書者止於階下俄而里胥白録人到一索杖遂鞭送書人數下其人不知所以訊之一曰吾大錯顧直典向宅取杯酒㬉瘡良久直典持酒至一既忘其取復忘其被杖者因賜直典飲之朝野僉載唐道士程子霄登華山上方偶有顛仆郎中宇文翰致書戯之曰不知上得不得且怪懸之又懸諧噱録唐有内大臣學作别紙言語鳳翔節度使寄柴數車回書謝云䝉惠也愚若干盧氏雜説㑹昌毁寺時有蘇監察者巡撫兩街諸寺見銀佛一尺已下者多袖之歸人謂之蘇揑佛或問温庭筠云將何對好遽曰無過蜜陀僧尚書故實長慶四年上欲幸驪山湯泉拾遺張權輿伏紫宸殿下叩頭諌曰昔周幽王幸驪山為犬戎所殺秦始皇葬驪山國亡𤣥宗宫驪山而禄山亂先帝幸驪山享年不永上曰驪山若此之凶邪我宜一往以驗彼言十一月庚寅幸温湯即日還宫謂左右曰彼叩頭者之言安足信哉通鑑馮翊之東窟谷有隠士趙存者自云父諱君乘嘗事兖公陸象先言兖公之量非可測度為馮翊太守小軍等多名族子弟以象先性仁厚於是與府寮共約戯賭一人曰我能旋笏於㕔前硬努眼眶衡揖使君唱喏而出其人便為之象先視之如不見又一叅軍曰吾能於使君㕔前墨塗其面著碧衫子作神舞一曲慢趨而出羣寮皆曰不可其二叅軍便為之象先亦如不見其第三叅軍又曰吾能於使君㕔前作女人梳粧學新嫁女拜舅姑四拜則如之何衆曰不可其第三叅軍遂施粉黛髙髻笄釵女人衣疾入深拜四拜象先乂不以為怪弟景融大怒曰家兄為三輔刺史今乃為天下笑具象先徐語景融曰是渠參軍兒等笑具我豈為笑哉乾􅍧子李克助為大理卿昭宗在華州鄭縣令崔鑾有民告舉放絹刺史韓建令計以為贓奏下二旬定罪御史臺奏罪當絞大理寺數月不奏建問李尚書崔令乃親情耶何不奏李克助云俾公之政也韓云崔令犯贓奈何言我之過李云聞公舉放數將及萬矣韓曰我華州節度華民我民也李曰華民乃天子民非公之民若爾即鄭縣民乃崔令之民也建服其論乃捨崔罪聞奇録唐末劉訓京師春遊賞牡丹訓邀客賞花乃繫水牛在前指曰此劉氏黑牡丹也潜確𩔖書馮道鎮同州有酒務吏乞以家財修夫子廟道以付判官判官素滑稽書絶句於判後云荆棘森森遶杏壇儒官髙貴盡偷安若教酒務修夫子覺我慚惶也大難道有愧色出俸修之香祖筆記向相延州詩云四時常有烟棚合三月猶無菜甲生又有人嘲同州詩云三春花發惟樗樹二月鶯啼是老鴉癸辛雜識李克用破黃巢收復長安時年二十八於諸將最少而功第一諸將皆畏之克用一目微眇時人謂之獨眼龍綱鑑補陳希亮嘉祐中知鳳翔東坡初擢制科簽書判官事吏呼蘇賢良公弼怒曰府判官何賢良也杖其吏聞見後録蘇子瞻任鳳翔府節度判官章子厚為商州令二人同遊南山抵仙遊潭下臨絶壁萬仞岸甚狹横木架橋子厚推子瞻過橋書壁子瞻不敢過子厚平歩以過用索繫樹躡之上下神色不動以漆墨濡筆大書石壁上曰章惇蘇軾來遊子瞻拊其背曰子厚必能殺人子厚曰何也子瞻曰能自拚命者能殺人子厚大笑漫笑録石蒼舒字叔才雍人也蓄圗書甚富文潞公帥長安借褚遂良聖敎序墨跡一觀因令子弟臨一本休日宴僚屬出二本令坐客别之客盛稱公者為真反以叔才所收為偽叔才笑啟鄭公云今日方知蒼舒孤寒玉照新志張元一作源本華陰布衣嘗以詩干韓魏公公不納遂投西夏迨王師失律於好水川元題詩於界上寺云夏竦何曾聳韓琦未是奇滿川龍虎輦猶自說兵機其不遜如此清波雜志司馬温公為西京留臺或不張蓋自持扇障日程伊川謂曰公出無從騎市人或不識有未便者公曰某惟求人不識耳事文𩔖聚同州澄城縣有九龍廟然止一妃耳土人云馮瀛王之女也夏縣司馬才仲戲題詩云身既事十主女亦妃九龍過客讀之者無不一笑嬾真子程伯淳遊終南山山僧云晏元獻公來獼猴滿山戲為一絶曰聞說獼猴性頗靈相車來便滿山迎鞭羸到此何曾見始覺毛蟲更世情明道文集劉貢父知長安妓有茶嬌者以色慧稱貢父惑之被召造朝茶逺送之貢父為夜宴痛飲有别詩曰畫堂銀燭徹宵明白玉佳人唱渭城唱盡一杯須起舞闗河風月不勝情至闗永叔直出道迓貢父貢父適酒病永叔戲之曰非獨酒能病人茶亦病人鴻書太學生相聚各言物産以相嘲難東魯生曰一山一水一秀才甲天下矣闗中生曰何山曰泰山曰只有天在上更無山與齊當在華山下矣又何水曰東海曰黃河之水天上來東流到海不復迴乃屬河之委矣又秀才誰也曰孔子曰文王我師也周公豈欺我哉孔子文王之弟子也相與一笑是稱文譚鴻書郭文英韓城人明嘉靖中以大匠工師至工部右侍郎賜二品服聰慧善詼諧㑹諸縉紳談及發科經書輒笑自謂不佞起家木經衆為絶倒韓城縣志王給事崇為陜西主考出題四罪而天下咸服及考察汪鋐以其指已與羅峰也為羅峰誦之欲去崇羅峰曰彼自出題耳爾非四凶安得即與招認項甌東松窓録李自成據秦府大集士子考試出題曰道得衆則得國士子私相謂曰仍不離盜賊二字延綏志神異二華之山本一山也當河河水過之而曲行河神巨靈以手擘開其上以足蹈離其下中分為兩以利河流今觀手跡於華嶽上指掌之形跡在脚跡在首陽山下故張衡西京賦稱巨靈贔屭髙掌逺蹠以流河曲是也搜神記金星之精墜於終南圭峯之西因號為太白山其精化為白石狀如美玉時有紫氣覆之録異記禹鑿龍闗之山亦謂之龍門至一空巖深數十里幽暗不可復行有獸狀如豕銜夜明之珠其光如燭又見一神蛇身人面禹因與神語即示禹八卦之圗列於金板之上又探玉簡授禹長一尺二寸以合十二時之數使量度天地禹即執持此簡以平定水土拾遺記渭水石柱橋舊有忖留神像此神嘗與魯班語班令其出忖留曰我貌狠醜卿善圖物容我不能出班拱手與言曰出頭見我忖留乃出首班於是以脚畫地忖留覺之便還没水故置其像於水唯背以上立水上水經注秦伯出狩至於咸陽天震大雷有火下化為白雀銜籙集於公車尚書中候武都故道有怒特祠上生梓樹文公使人伐之輒有大風雨樹創隨合有一人傷足不能行卧樹下聞有鬼語樹神曰秦若使人披髮以朱絲繞樹赭衣灰坌伐汝汝得不困耶樹神無言明日病人語文公如其言伐樹斷中有一青牛出走入豐水中其後牛出豐水中使騎擊之不勝有騎墮地復上髮解牛畏之入不出故秦自是置髦頭騎録異傳秦始皇起雲明臺窮天下之珍木搜四方之巧工有二人騰虚緣木揮斤斧於空中子時起工午時已畢秦人謂之子午臺鴻書秦始皇大苑中多枉死者橫道有鳥狀如烏銜草覆死人面當時起坐自活始皇遣使齎草問鬼谷先生答云此東海祖洲不死草生瓊田中名為養神芝一株可活一人十洲記秦始皇時有王道平長安人少與同村唐叔偕女誓為夫婦尋道平被差征伐九年不歸其父母見女長成逼嫁他姓遂悒怏而死經三年道平還詢知往墓所悲號女魂自墓出問平何自而來本與君誓為夫婦為父母逼嫁結恨致死然念君夙願不忘妾身未損可以再生道平乃啓墓門捫看之其女果活隨道平歸他姓聞之驚怪申訴郡縣録狀奏上斷還王道平為妻搜神記春秋後傳曰使者鄭客入函谷闗至平舒道見華山有素車白馬謂鄭客安之答曰之咸陽曰吾華山君願托書致鎬池君子之咸陽過鎬池見一大梓下有文石取以欵扣梓當有應者客行至鎬池取石扣梓應曰喏鄭客如睡覺而見宫闕若王者之居焉謁者出受書入水經注武帝好微行於長安城西夜見一螭遊於路董謁曰昔末喜以金簪貫玉螭腹為戲今螭腹餘簪痕得非此耶洞㝠記漢武宴於未央宫忽聞人語云老臣負自訴不見其形良久見架上一老翁長八九寸僂步至前帝問曰叟所訴者何翁仰看屋俯視帝足忽不見帝駭懼問東方朔朔曰其名為藻兼水木之精也陛下頃來頻修宫室斬伐其居故來訴耳仰看屋而後視足願陛下宫室足於此帝乃息役述異記秦驪山墳破行者見金鳬向南飛寳鼎元年張善為日南太守郡民有得金鳬以獻者善考其年月即始皇墓金鳬賈志神仙傳曰山中衛叔卿常乘雲車駕白鹿見漢武帝帝將臣之叔卿不言而去武帝悔求得其子度世令追其父度世入華山見父與數人博於石上勑度世還水經注宣帝以皁蓋車賜霍光至夜車轄上金鳳凰輒亡去至曉乃還後南郡黃君仲羅鳥得鳳凰入手即化成紫金守車人上云夜車轄上鳳凰飛去不返恐為人所得光甚異之後數日君仲詣闕上鳳凰帝疑之置承露盤上俄而飛去帝使人尋之直入光家止車轄上乃知信然齊諧記漢中有鬼神欒侯常在承塵上能知吉凶甘露中蝗大起所經處禾稻輒盡太守遣使告欒侯侯謂吏曰蝗蟲小事輒當除之言訖翕然飛出吏髣髴其狀𩔖鳩聲如水鳥吏還具白太守即果有衆鳥億萬來食蝗須㬰皆盡列異傳劉向校書天祿閣專精覃思夜有老人着黃衣植青藜杖登閣而進見向暗中獨坐誦書老人乃吹杖端烟燃向請問姓名云我是太乙之精天帝聞卯金之子有博學者下而觀焉乃出懐中竹牒有天文地圗之書授向遂不見拾遺記張魯仕漢為漢中太守隠身學道曹操遣將攻漢中魯以手板畫地成河怒濤洶湧兵不得渡操將復率水兵將至岸魯又以手版畫河中輒聳一峯髙千餘丈兵不能進尚友録張魯之女曾浣衣於山下有白霧濛身因而孕焉恥之自裁將死謂其婢曰我死後可破腹視之婢如其言得龍子一雙遂送於漢水既而女殯於山後數有龍至其墓前成豀道家雜記漢楊寳年九嵗至華陰山北見一黃雀為鴟梟所搏墜於樹下取歸置巾箱中百日毛羽成一夕三更有黃衣童子曰我西王母使者為鴟梟所搏君仁愛見拯乃以白環四枚與寳曰令君子孫清白位至三公當如此環搜神記漢末闗中亂有發前漢時宫人塚者猶活既出復如舊郭后愛念之常置左右問當時宫内事了了有次第山陵雜記魏景初中咸陽縣吏王臣家有怪其母夜寢聞竈下有呼聲曰文約何以不來頭下枕應曰我見枕不能往汝可來就我飲至明乃飯臿也即聚燒之其怪遂絶捜神記晉扶風楊道和夏於田中值風雨至桑樹下霹靂下擊之道和以鋤格折其肱遂落地不得去唇如丹目如鏡毛角長三尺餘狀如六畜頭似獼猴搜神記隴西有辛道度者游學至雍城西見一宅有青衣女子在門道度詣門下求食女子入吿俄出引道度入見一女曰我秦閔王女今日君來願為夫婦經三宿女曰不可久居乃取金枕送出未逾數歩惟有一塜道度至秦以枕貨於市適秦妃出遊見枕疑之道度具以實吿妃悲泣遣人發塚啓柩始信之歎曰此是我婿也遂封道度為駙馬都尉賜金帛車馬令還本國搜神記載按法苑珠林王志任女事與此畧同不重載𢎞農鄧紹嘗八月旦入華山採藥見一童子執五綵囊子柏葉上露皆如珠滿囊紹問曰用此何為答曰赤松先生取以明目言訖便失所在續齊諧記郄方囘葬婦於驪山治墓多平夷古墳後壞一塚構制甚偉器物殊盛塚發聞鼓角聲蘇頲壠上記魏興李宣妻樊氏義熙中過期不孕而額上有創兒穿之以出長為將幽明録苻堅為赦與左僕射猛右僕射融密議於露堂有一大蒼蠅入自牖間鳴聲甚大集於筆端驅而復来久之乃去俄而長安街巷里民相吿曰官今大赦有司以聞堅驚謂融猛曰事從何泄推窮之咸言有一小人衣黑大言於市曰官今大赦須㬰不見堅歎曰其向蒼蠅乎十六國春秋南徐一士子從華山畿往雲陽見客舍有女子年十八九恱之無因遂感心疾母問其故具以啟母母為至華山尋訪見女具說女聞感之因脫蔽膝令母密藏於席下卧之當已少日果差忽舉席見蔽膝持而泣之氣欲絶謂母曰葬時車從華山度母從其意比至女門牛不肯前須㬰女粧㸃沐浴竟出歌曰華山畿君既為儂死獨活為誰施君若見憐時棺木為儂開棺應聲開女入抱之遂活兩家相慶配為夫婦誠齋雜記王胡長安人叔死數載元嘉二十三年忽形見還家責胡以家事不理罰胡五杖傍人及鄰里並聞其語及杖聲又見杖瘢而不見其形唯胡獨得親接俄而辭去太平廣記延州刺史獨孤陀有婢曰徐阿尼事猫鬼能使之殺人云每殺人則死家財物潛移於畜猫鬼家隋書陀傳云陀嘗索酒其妻曰無錢可酤陀因謂阿尼曰可令猫鬼向越公家為我足錢也阿尼咒之猫鬼便向其家通鑑注長安懿徳禪院内有大石臼重五百斤隋末鄠縣沙門法通自南莊致此法通初極尫劣夢人遺三䭾筋使噉之適噉一筋遽覺試舉大石臼不以為困有寺僧行戡稱有力通竊其所服袈裟舉堂柱而壓之行戡見而驚異盡力莫能取通徐舉柱而取衆駭為神助西京記杜子春周隋間人少落拓徒行長安中一老人與錢三百萬一二年間稍稍而盡復來前期處得錢一千萬又一二年間貧過舊日復遇老人與三千萬子春曰吾得此人間之事可立感叟深惠唯叟所使老人曰吾心也子治生畢來嵗中元見我於老君雙檜下子春及期往老人遂與登華山雲臺峯入四十里餘見空屋嚴潔中有藥爐紫熖光發玉女九人環爐而立青龍白虎分據前後老人持白石三丸酒一巵遺子春食之訖戒曰慎勿語雖尊神惡鬼皆非真實但當不動不語一心念吾所言言訖而去道士適去有一人稱大將軍親衛數百仗劍張弓直入呵問皆不對怒而去俄而猛虎毒龍哮吼拏攫子春神色不動既而大雨晦暝流電吼雷若山川開破波及坐下子春端坐不顧未頃而將軍者復來執其妻令取剉碓妻呌哭竟不顧將軍曰此賊妖術已成斬之斬訖見閻羅王苦無不嘗心念道士之言亦似可忍王令作女生宋州為啞女有盧進士迎為妻生男聰慧盧抱兒與之言不應盧大怒以兒頭撲石而碎血濺數步子春愛生忘約不覺失聲云噫嘻聲未息身坐故處道士亦在前初五更矣見熖火起屋室俱焚道士歎曰措大悞余向使子無噫聲吾藥成子亦上仙仙才難得也指路使歸續𤣥怪録髙祖將封東嶽華山道士李播淳風父也遣劉仁軌問播播曰待問泰山府君遂令呼之良久府君至拜謁甚恭播曰唐皇帝欲封禪如何對曰合封其後帝遂封禪稗海隴西李義琰貞觀中為華州縣尉縣忽失一人莫知所在其父兄疑讐家所害詣縣陳情義琰案之不能決夜中執燭委細窮問據案俯首不覺死人即至猶帶被傷之狀云某乙打殺置於某所井中公可早驗不然恐被移向他處不可尋覔義琰即親往果如所陳而讐家始具欵伏當時聞見者莫不驚歎法苑珠林俗說務本坊西門是鬼市或風雨曛晦皆聞其喧聚之聲秋冬夜多聞賣乾柴云是枯柴精也又或中秋望夜聞鬼吟云六街鼔絶行人歇九衢茫茫空有月有和者云九衢生人何勞勞長安土盡槐根髙嵗時記房𤣥齡杜如晦微時嘗偕之秦宿敷水店夜深對食忽見兩黒毛手出燈下乃各以一炙置手中有頃復出若掬又各斟酒與之遂不復見食訖就寢聞街中連呼王文昻忽一人應於燈下呼者曰東村延神酒食甚豐汝去否對曰吾已醉飽被界吏差直二相䝉賜酒肉故不得去續𤣥怪録負琴生遊長安日在酒市負一琴弄必凄切感人李太白聞之就酒對飲因請作一調弄太白不覺愴然生曰琴音傷人心不知爾亦傷心耶且曰君骨凡肉異非真仙也但一貴人亦貴不久同醉而囘後數日太白復於長安南大樹下見之方欣喜欲就問忽然而滅古今書抄疑仙傳鄭又𤣥性憍率假尉唐興官罷因入長安褒城逆旅有一童子十餘嵗狀貌秀而慧謂又𤣥曰我與君故人省之乎又𤣥曰忘之矣童子曰我太清真人也上帝以爾有道氣使我生於人間與汝為友將授汝神仙之訣而汝輕果髙傲終不得道言訖忽不見神仙感遇傳太宗時李淳風奏北斗七星當化為人明日至西京市飲酒帝使人候之有胡僧七人入自金光門至西京酒肆飲酒使者宣勅七人笑曰此必淳風小兒言也忽不見國史異纂貞觀中玉潤山悟真寺僧夜於藍溪忽聞有誦法華經者聲自地中發以標表其所明日窮表下得一顱骨在積壤中其骨槁然獨唇吻與舌鮮潤遂以石函置於千佛殿下自是後每夕常有誦經聲在石函内長安士女觀者千數後新羅僧竊石函去宣室志孫思邈隠居終南山時大旱西域僧請於昆明池結壇祈雨凡七日縮水數尺池龍化為老人詣宣律和尚求救曰弟子昆明池龍也胡僧利弟子腦將為藥命在旦夕宣公曰可求孫先生至思邈石室求救孫謂曰我知昆明池有仙方三千首能與予予將救汝老人曰此方上帝不許妄傳今急矣固無所恡有頃捧方至思邈曰爾苐還無慮胡僧也自是池水忽漲溢岸胡僧羞恚而死酉陽雜俎儀鳳中柳毅於涇陽見婦人牧羊道畔怪而問之曰洞庭龍君小女也問牧羊何用曰非羊也雨工也雷霆之𩔖毅後配此女開元中猶在異聞録有人遊終南山一乳洞洞深數里乳旋滴瀝成飛仙狀洞中已有數十眉目衣服形製精巧一處至􅆎以上其人因手承潄之經年再往見其像已成矣當手承處衣缺三寸不就酉陽雜俎汧陽郡有張四郎廟上元中有韋氏子客汧至廟解鞍以憩見廟中有二屐子乃結草而成色白制度極妙生收貯槖中及至郡郡守舍生於館亭中生以所得屐致於前而寐明日已亡所在食頃乃於館亭瓦屋上得之如是者三生僕乃竊於隙中伺之夜將半展忽化為白鳥飛於屋上韋生命取焚之乃飛去宣室志則天初稱周方具告天文有吏人見大周字上有兩仙童長二三寸執刀剗削斯須失去周字人知唐必復興鳳池編萬嵗元年長安道中有羣盜晝伏夜動行人往往遭殺後有道士宿逆旅謂衆曰此當是怪深夜持一古鏡潛伺之俄有一隊少年至兵甲完具齊呵責道士曰何不顧生命道士以鏡照之少年棄兵甲奔走逐之約五七里少年盡入一大穴中道士守之至曙却復逆旅召衆發掘有大䑕百餘走出遂盡殺之其患乃絶瀟湘録開元中長安裴氏子於延平門外莊居嘗有一老父求漿裴子待之甚謹積數年别去後三年復至裴子願從學老父遂將西去至太白山下有石壁老父以杖叩之須㬰開乃一洞天老父引入留宿食以胡麻飲麟脯仙酒裴告歸老父送之謂曰後二十年天下當亂此是太白左淹洞至時可來此比至安史亂裴氏全家隠洞中數年復出兄弟數人皆至大官原化記開元中吳人陸生貢舉在京常自駕其驢驢走生追至終南山下見一徑直上生随至一處有人家見驢繫樹下生叩門一老人延生入見華堂邃宇林亭池沼葢仙境也將辭老人曰君當處此願之乎生拜謝老人曰授學合獻一女今授君一術求之令取一青竹如人長授之曰持此入城中朝官家投竹取女慎勿入權貴家生持杖入城誤入户部王侍郎宅入閣見一女臨鏡晨粧生投杖攜女而去比下階顧見竹已化作女形殭卧在床會侍郎下朝聞女亡時葉天師在朝奔遣邀屈天師至取水噴呪死女立變為竹又持刀禁呪遶宅尋索果於門側得生生被擒遂被拷訊令錮項領從人至山下生向山慟哭見老人杖策而下以杖畫地遂成一水取水噀之黑霧數里食頃而散已失陸生所在原化記開元中有士人從洛陽道見一女子容服鮮麗謂云已非人昆明池神之女欲送書一封池西有斜柳樹君可叩之若呼阿青當有人出士人入京送書池上果有此樹叩之喚阿青俄見㓜婢從水中出得書甚喜曰久不得小娘子消息延士人入謂曰君後日可暫至此如期果有女子從水中出持真珠一笥以授士人王銍小名録開元初有巴人好伐樹作板一日百餘輩自褒中出至太白廟前松栢百餘株各大十數圍羣巴見之喜伐至二十餘株忽一老人拄杖至前曰此神樹不宜伐羣巴不聴老人曰我太白山神也亦不聴又曰不止且有禍當俱死無益也羣巴益不輟作老人登山呼斑子俄數虎踵至噬巴人殆盡僅餘五六人老人曰以汝心善故耳宜速去其倒樹至天寳末尚存廣異記𤣥宗東封次華陰見岳神迎謁帝問左右莫見遂召諸巫問神安在老巫阿馬婆奏云在路左朱鬒紫衣迎候陛下帝顧笑之仍勅阿馬婆勅神先歸帝至廟見神槖鞬俯伏殿庭東南大柏之下又召阿馬婆問之對如帝所見帝加禮敬令阿馬婆致意而旋尋詔先諸岳封為金天王帝自製碑文以寵異之開天傳信記鍾馗唐武徳中應舉不第觸階死後明皇晝寢夢一小鬼盜玉笛上叱之忽有大鬼破帽藍袍角帶提小鬼刳其目擘而啖之上問對曰臣終南進士鍾馗不第而死䝉㫖賜袍帶葬之誓除天下虛耗帝悟感命吳道子圗其像儼然如夢中所見述異志明皇召張果賜酒曰臣有弟子能飲俄一小道士自殿簷下年十六七美風姿善談笑帝賜飲一斗不醉又逼飲之酒忽從頂出仆地化一酒榼乃集賢院中物也珍珠船天寳初嚴安之為萬年縣捕盜官亭午有中使黄衣乘馬自門馳入宣勅曰城南十里某公主墓見被賊刧宣使往捕之安之即領所由並器杖往掩捕見六七人方穴地道纔及埏門一時擒獲令求中使不得至縣乃召賊訊其事賊曰纔開墓至第一門有盟器勅使數人黃衣勅使騎馬内一人揖狀如走勢幞頭角亦如風吹直豎眉目悉皆飛動安之思前勅使狀乃盟器勅使耳咸寧志王度至長安程雄家雄新受寄一婢頗端嚴名曰鸚鵡度疑其精魅引鏡逼之化為老狸而死異聞録貴妃以水精屏遺楊國忠上刻前代美人可三寸許服玩雜用衆寳國忠置之樓上常偃息其下一日屏上諸女悉下各通名珍珠船長安有僧賣一小猿虢國夫人聞之問其由僧曰此小猿收養纔半年會人言語資用頗乏故鬻之夫人曰留此我當養之後半載貴妃遺夫人芝草夫人喚小猿令看翫小猿倒地化為一小兒容貌端妍年可十四五夫人甚異呵而問之小兒曰我本姓袁隨父入山採藥一日不覺變為猿我父棄我被此僧收養自受恩育甚欲述懐抱於夫人恨不能言今不期却變人身夫人奇之遂安於小室使侍婢常供飼藥食忽一日小兒與婢俱化為猿夫人令人射殺之其小兒乃木人耳大唐傳奇興元城固縣有韋氏女兩嵗能語自然識字好讀佛經至五嵗一縣所有經悉讀遍至八嵗忽清晨薫衣靚粧黙存牖下視之已蛻衣而失竟不知何之酉陽雜俎王姥兒犯殺人罪訪一行求救一行心計渾天寺中命空其室徙大瓮於中又密選奴二人授以布囊曰某坊有廢園從午至昬當有物入來其數七可盡掩之奴悉獲而歸一行令寘瓮中朱題梵字詰朝召至便殿𤣥宗問曰太史奏昨夜北斗不見是何祥也曰天將大警於陛下也莫若大赦天下𤣥宗從之又其夕太史奏一星見凡七日而復酉陽雜俎處士劉平善吐納之術能夜中視物安禄山厚幣致於門下平見禄山左右常有鬼物數十殊形詭狀持鑪持蓋以為導從平心異之及禄山朝覲與平俱至輦下行之華陰縣值葉天師投龍於西嶽平見二青衣童子乘虚而至所衞禄山魑魅皆棄鑪投蓋狼狽而行平因知禄山為邪物所輔遂逃入華山劇談録邠公杜悰一日之費皆至萬錢西京李容見人牧羊遍滿山谷詰自何來曰自鄜夏來供相公食轉首並無所睹五色線唐天寳末禄山作亂梨園弟子有笛師者竄終南山谷中有蘭若因而寓居清宵朗月援笛而吹嘹唳之聲滿山谷俄有物虎頭人形着白袷單衣自外而入笛師驚懼下階愕眙虎頭人曰美哉笛乎可復吹之如是累奏五六曲乃咍嘻大鼾師懼覺乃抽身走出得上髙樹枝葉陰宻能蔽人形其物覺後不見笛師因大懊歎曰不早食之被其逸也乃立而長嘯須㬰有虎十餘頭悉至狀如朝謁虎頭云適有吹笛小兒乘我之寐因而奔竄可分路四逺取之言訖各散去五更後復來云各行四五里求之不得會月落斜照忽見人影在髙樹上虎頭視笑曰謂汝雲行電滅而乃在兹遂率諸虎攫取既不可及虎頭復跳身亦不至遂散去少間天曙行人稍積笛師乃遁去鴻書至徳二載安禄山之亂哥舒翰與賊將崔乾祐戰見黃旗軍數百隊官軍疑為賊賊亦疑為官軍相持久之忽不見是日昭陵内石馬皆汗流昭陵志至徳中有調選同州督郵者姓崔㤀其名出春明門見一青袍人乗馬出因相揖偕行徐問何官青袍云新受同州督郵崔云某新受此官君豈誤乎青袍笑而不答去同州數十里至斜路中有官吏拜迎青袍謂崔生曰君為陽道録事我為陰道録事路從此别豈不相送耶崔生異之即與連轡入斜路遂至一署青袍至㕔與崔生同坐通胥徒僧道等訖次通詞訟獄囚崔生大驚謂青袍曰吾妻何得至是青袍即避案後令崔生與妻言妻云被追至此已數日崔生即祈求青袍因令吏促放崔生妻崔生請囘青袍餞送崔生至同州問妻云病七八日都不記陰道見崔生言𤣥怪録黑髭老君在京左街光天觀帳幄嚴備不知所置年月唐代宗嘗夢為二青童所召混元聖祖命皇帝從遊海外夢中隨二童至老君所帝著綘紗衣平天冠執玉立老君後遊洲島海嶽無不備到歴記隊從儀衛一無遺忘既覺命畫工圖之宣示京師求訪其像於光天觀所驗部仗人物與所夢同勑塑御容乘五色雲從老君後選髙徳道士七人住持刻石以紀其事道教靈驗記大厯中進士竇裕下第將之成都至洋州無疾卒嘗與吴興沈生善生調補金堂令至洋州舍於館亭夜半俄見一丈夫自門歩來吟且嗟曰家依楚水岸身寄洋州館望月獨相思塵襟淚痕滿生見甚𩔖竇裕特起與語未及遂不見歎曰竇君豈為鬼耶明日行未數里有殯在路前識曰進士竇裕生驚馳問館吏曰有進士竇自京遊蜀至此暴亡道左殯宫是也即致奠拜泣而去宣室志大厯中有吕生者自會稽上虞尉調集於京師僑居永崇里一夕就寢俄有一嫗容服潔白長二尺許於室之北隅緩步而來漸迫其榻吕生叱之遂退去至北隅乃亡明日又見嫗在北隅下將前且退若有所懼生又叱之遂沒生黙念曰是必怪也即命劍置其榻下是夕果來生以劍揮之嫗忽上榻以臂揕生久之又有一嫗上榻復以臂揕生遽覺一身凛然若霜又以劍亂揮俄為十餘嫗各長寸許環走四垣俱至榻前翕然合為一嫗與始見者不異生懼甚嫗笑曰吾之來戲君耳非敢害也言畢退於北隅而沒明日吕生於北隅發之得一瓶可受斛許貯水銀甚多生方悟嫗乃水銀精也宣室志大厯中有士人莊在渭南妻柳氏莊居一子年十二夏夜三更後忽見一老人白衣兩牙出吻外漸近床前有婢熟眠因扼其喉咬然有聲攫食之須㬰骨露乃舉起飲其五臟見老人口大如箕子方呌一無所見婢已骨矣數月後柳氏露坐有胡蜂遶其首以扇擊墜地乃胡桃也取翫之遂長如拳驚顧之際已如盤矣嚗然分為兩扇空中輪轉聲如分蜂忽合於柳氏首碎首齒着於樹其物飛去竟不知何怪酉陽雜俎李泌興元五年三月薨是月中使林逺於藍闗逆旅遇泌單騎常服言暫往衡山話四朝之重遇慘然久之而别逺到長安方聞其薨徳宗聞之尤加愴異鄴侯外傳興元元年朱泚亂有閻敬立為段秀實告密使潛出鳳翔夜抵太平舊館有二皁衫人控轡至㕔皁衫人通曰知館官前鳳州河池縣尉劉俶敬立見之問曰此館甚荒蕪何也俶云館卒並散逃此皆某家奴權且應奉耳良久敬立與俶同飡甚飽畜僕等皆如法敬立問俶别假一馬至四更俶又具饌令所借馬被䭾而行東方似明有吏迎拜曰前館無人大使何以宿及問所送僕馬俱已不見所䭾輜重已却廻百歩置路側館吏曰昔有河池縣尉劉少府殯宫在彼館後久已頽毁敬立却迴驗之廢館墻後有古殯宫木馬廢堠冥器數人而已博異記進士楊禎家於渭橋以居處繁雜頗妨肄業乃詣昭應縣借石甕寺文殊院居旬餘有紅裳既夕而至容色姝麗徐步於簾外歌曰涼風暮起驪山空長生殿鏁霜葉紅朝来試入華清宫分明憶得開元中禎曰歌者誰耶紅裳又歌曰金殿不勝秋月斜石樓冷誰是相顧人褰帷弔孤影禎拜迎於門既即席問禎之姓氏禎具告禎祖父親族曾遊石甕寺者無不熟識禎異之曰可聞姓氏乎對曰某燧人氏之苗裔也漢明帝時十四代祖封長明公開元初帝封某為西明夫人昨聞足下有幽陰之志願一欵顔自是晨去暮還禎乳母潛伏佛榻觀之自隙而出入西幢澄澄一燈因撲滅之後遂絶紅裳者纂異記貞元中韋自東以壯勇聞有道士煉丹於太白山石洞中數有妖魔擊散藥爐邀自東仗劒相䕶有巨虺及美女至自東並以劍擊退後有道士駕鶴而来勞自東曰妖魔已盡丹將成矣自東釋劍禮之俄而突入藥爐爆烈無餘全唐詩話上都務本坊貞元中有掘地遇一石函發之見物如絲滿函飛出於外驚視之忽有一人起於函被白髮長丈餘振衣而起出門失所在蓋太陰鍊形日將滿人必露之酉陽雜俎貞元中什邡尉申屠澄赴官至真符縣東投茅舍中有老父及嫗一女年十四五態甚閒麗與之訂婚後生一男一女秩滿歸秦及過妻家不復有人於故衣中見一虎皮妻大笑曰此物尚在耶披之即變為虎哮吼而去全唐詩話貞元中望苑驛西有百姓王申構茅屋數椽夏月常饋水漿於人有兒十三令伺客有女子求水衣碧襦白幅巾自言家在此南十餘里夫死無子將適馬嵬訪親王申妻戲曰既無親能為我作新婦乎女笑曰願執井竈王申即日賃衣貰禮為新婦及半夜王申妻夢子披髮訴曰食將盡矣還睡復夢如初申與妻秉燭呼其子不應戸牢如鍵乃壊門闔有物圎目鑿齒體如藍色衝人而去其子惟餘骨髮酉陽雜俎祁鳳居長安平康里晝寢夢一美人自西楹來執巻且吟視其首篇曰春陽曲鳳即從東廡下几上取彩箋傳春陽曲其詞曰長安少女玩春陽何處春陽不斷腸舞袖弓腰渾忘却羅幃空帯九秋霜鳳尋覺昏然無所記及更衣襟袖間得其辭驚視復省所夢事在貞元中唐任蕃夢遊録貞元中進士獨孤遐叔家於長安崇賢里新娶白氏女家貧不第將遊劍南與其妻訣曰遲可周嵗歸矣逾二年乃歸至鄠縣西天色已暝路隅有佛堂遐叔止焉忽聞墻外相呼聲有公子女郎十數輩步月徐來有一女郎憂傷憔悴風韻若似遐叔之妻窺之大驚乃就堦間捫磚飛擊磚纔至地俏然一無所有遐叔悵然悲惋謂其妻死矣平明疾走入門妻卧猶未興良久說夢中聚言語與遐叔所見並同任蕃夢遊録鄭馴貞元中進士擢第調補門下典議第三十五莊居在華陰縣南五六里與渭橋判官髙叔讓中外相厚丐髙為設膾食其夜暴卒時方暑不及候其家人即為具棺椁衾襚斂之題𡨕器童背一曰鷹兒一曰鶻子馬有青色者題曰撒豆驄十數日柩歸華陰别墅時邑客李道古遊虢川半月矣未知馴死囘至潼關西永豐倉路忽逢馴自北來車僕甚盛呼二童鷹兒鶻子參李大郎又指所乘馬曰兼請看僕撒豆驄乃相與並轡頃到華陰岳廟東馴曰自此徑路歸矣李曰且相隨至縣馴固不肯過岳廟須㬰李至縣問吏吏曰鄭三十五郎今月初向渭橋亡柩昨夜歸莊李曰我適與鄭偕自潼闗來一縣人吏皆曰不虚李乃大驚後人往往於京城鬧處即逢行李僕馬不異李之所見而不復有言河東記唐故兵戸尚書蕭昕為京兆尹京師大旱時天竺僧不空三藏居於靜住寺善以持念召龍興雲雨昕於是詣寺謂三藏為結壇致雨三藏乃命其徒取樺木皮尺餘鑽小龍於上轉呪震舌呼祝呪者食頃即以鑽龍授昕曰可投曲江中投訖亟還昕如言投之旋有白龍纔尺餘揺鬛振鱗自水出俄而身長數丈狀如曳素倐忽亘天昕鞭馬疾驅未及數十步雲物凝晦暴雨驟降比及永崇里道中之水已若決渠矣宣室志古有豢龍氏長安有豢龍戸觀水即知龍色目有無懿皇朝上言龍池中走失兩條往闗東尋訪於東都魏王池中見之取而歸闕經華州時李訥為華州刺史聞得龍來命就公府視之則於一小瓶子中倒於盆内乃二細鰍魚也訥曰何以為驗其人鑿穴寸許注水其間收鰍投水内相趂旋轉尾觸穴四隅隨觸而陷水亦暴漲逡巡穴已數尺濶其人諮訥曰恐穴更廣即難制也遂搦入瓶中攜歸輦下鴻書貞元二年李晟復京師朱泚以千餘人西走昏忽迷路問於田父曰豈非朱太尉耶源休止之曰漢皇帝田父曰天不長凶地不生惡蛇不為龍䑕不為虎天網恢恢去將安適泚怒將殺之忽失所在杜陽雜編李生貞元中下第歸途次商洛會漢南節度入覲為導騎所迫時日暮馬劣見荆棘之深有殯宫在焉生遂投匿其中既而風月澄霽彷彿見一女子粧飾嚴麗至殯宫南言曰金華夫人奉白崔女郎今夕風月好可以肆目穴中應曰屬有貴客寄居吾不忍去其女子乃去生明日至逆旅問之是博陵崔氏女隨父宦遊而歿遂藁葬焉生感之致奠而去宣室志博陵崔書生住長安永樂里先有舊業在渭南貞元中嘗因清明節歸渭南行至昭應北歇馬於古道左見一女似失路於松柏間遂令以僕馬送纔數百步忽見長年青衣駐立以俟邀郎君至莊取北行一二里到一樹林屋室甚盛一青衣出傳主母命邀崔入宅既見從容敘言某王氏外甥女欲侍君子巾櫛住三日讌遊歡洽王氏常呼其姨曰王姨忽一家大驚曰有賊至其妻推崔生於後門出纔出唯芫花半落松風晚清草露沾衣而已見童僕以鍬鍤發掘一墓穴已至櫬中見銘記曰後周趙王女王姨之墓棺柩儼然崔生感之急為掩瘞博物志貞元末渭南縣丞盧佩性篤孝其母病􅆎脚曉夜痛楚佩即棄官奉母歸長安寓長樂里將欲竭産求國醫王彦伯日往祈請忽見一白衣婦人姿容絶麗乘駿馬從一女僮來謂佩曰觀君顔色憂沮似有所待佩具以情告婦人曰妾有薄技庶不減王彦伯佩驚喜入白母遂引至母前婦人纔舉手侯之母已能自動一家歡躍婦人曰此猶未也當要進一服藥非止除痼疾亦永睂夀母曰未知何階上答婦人曰但許奉九郎巾櫛則可遂於女僮手取所持小粧奩中藥一刀圭以和進母母入口諸苦頓平佩即納為妻每十日一歸本家唯乘舊馬倐忽往來略無踪跡一旦伺其將出佩潛窺之見乘馬出延興門馬行空中佩又隨至城東墓田中巫者陳設酒殽瀝酒祭地即見婦人下馬就接而飲之其女僮隨後收拾紙錢載於馬上即變為銅錢又見婦人以䇿畫地巫者遂指其處為穴事畢即乘馬而囘佩心甚惡之歸具告母自是婦人不復歸佩家使女僮傳語佩曰妾以君孝行有感故為若婦今既見疑便當永訣矣佩問今安在女僮曰娘子是地祗管京兆府三百里内人家䘮葬所在長須在京城中作生人妻娘子終不失所但嗟九郎福祐太薄盧佩第九也河東記王維為岐王畫一石有天然之致數年益精彩一旦風雨中雷電交作屋宇俱壊不知所以後見軸空乃知畫石飛去憲宗朝髙麗遣使言㡬年月日大風雨中飛一奇石下有王維字印王不敢留遣使奉獻上命羣臣以維手跡較之無毫髮差謬酉陽雜俎長安安業唐昌觀舊有玉蘂花其花每發若瓊林瑶樹唐元和中有女子年可十七八衣緑繡衣垂雙髻容色婉婉從以二女而冠三小僕皆丱髻黃衫端麗無比以白角扇障面直造花所異香芬馥聞數十步外觀者疑出自宫掖莫敢逼視佇立良久令女僕取花數枚而出將乘馬顧謂黃衫者曰曩有玉峰之期自此行矣舉轡百餘步有輕風擁塵隨之而去須㬰塵滅望之已在半空方悟神仙之遊餘香不散者經月餘時嚴休復元微之劉禹錫白居易俱作玉蘂院真人降詩劇談録元和中博陵崔㲄僑居長安延福里嘗讀書牖下忽見一僮長不盡尺謂曰幸寄君硯席可乎㲄不應已而上榻拱立於袖中出一小幅文書致㲄前細字如粟歴然可辨詩曰昔荷䝉恬惠尋遭仲叔投夫君不指使何處覔銀鈎覽訖笑曰既願相從無乃後悔耶其僮又出一詩曰學問從君有詩書自我傳須知王逸少名價動千年又曰吾無逸少之藝雖得汝安所用俄而又投一篇曰能令音信通千里解致龍蛇運八行惆悵江生不見賞應緣自負好文章㲄戲曰恨汝非五色者其僮笑趨北垣入一穴中㲄發其下得一大筆因取書鋒銳如新亦無他怪宣室志華陰縣七級趙村有村正常夜度橋見小兒聚火為戲村正知其魅射之若中木聲火即滅聞啾啾曰射着我阿連頭村正上縣迴尋之見破車輪六七片有頭杪尚銜其箭酉陽雜俎韓侍郎愈有從子姪自江淮來年甚少曰某有一藝恨叔不知因指階前牡丹曰叔要此花素紫黃赤惟命韓遂給所須試之乃掘窠四面深及其根賫紫鑛輕粉朱紅治其根牡丹本紫及花發色紅白每朶有一聯詩字色紫分明乃是韓出官時詩雲横秦嶺家何在雪擁藍關馬不前十四字韓大驚異酉陽雜俎外按仙傳拾遺作韓甥事僧無可言近傳有白將軍者嘗於曲江洗馬忽然驚起前足有物色白如衣帶縈繞數匝遽令解之血流數升白異之遂封紙帖中藏於衣箱一日送客至滻水出示諸客客曰盍以水試之白以劍畫地成竅置蟲於中沃盥其上少頃蟲蠕而長竅中泉湧倐忽自盤若一席有黑氣如香烟徑出簷外衆懼曰必龍也遂急歸未數里風雨驟至大震數聲酉陽雜俎裴璞杜陵韋元方外兄也任邠州新平縣尉元和五年卒於官長慶初元方下第將客於隴右出開逺門數十里抵偏店見前武吏躍馬而來騎從數十真裴璞也元方驚喜拜之曰兄去人間復效武職何也璞曰吾為陰官職掌武事故武飾耳元方曰何官曰西川掠剰使職司人剩財而掠之元方曰何謂剩財璞曰數外之財即為剩故掠之或令虚耗或索横事或買賣不及償價子之逢吾亦是前定合得白金二斤過此遺子又當復掠故不敢厚人生有命以道靜觀無復躁撓勉之哉鴻書張庾元和十三年居長安昇道里南街十一月八日夜忽異香滿院俄聞履聲漸近數青衣推門而入曰步月逐勝不必樂遊原只此院小臺藤架可矣遂引少女七八人容色艷絶服飾華麗宛若豪貴家庾走避堂中垂簾望之諸女徐行直詣藤下須臾陳設牀榻雕盤玉樽盃杓皆奇物八人環坐絲管方動命一青衣傳語曰秀才能暫出為主否乃閉門拒之庾度此坊南街盡是墟墓若非妖狐乃是鬼物潛取搘牀石徐開門突出望塵而擊正中臺盤紛然而散庾逐之奪得一盞及明視之乃一白角盞奇不可名院中香氣數日不歇盞後忽墮地遂不復見庾明年進士上第續𤣥怪録穆宗有事於南郊將謁太清宫長安縣主簿鄭翦主役見白衣老人云此下有井正值皇帝過路汝速實之翦使修之則古井也驚顧之際已失老人所在䕶軍中尉劉𢎞規奏之帝命韋處厚撰記柳公權書於實井之上名曰聖瑞感應紀唐統紀進士趙合太和初遊五原夜聞沙中女子悲吟曰雲鬟消盡轉蓬稀埋骨窮荒失所依云云問之自陳姓李家奉天城南小李村遭黨羌撾殺於此倘能歸骨必有以報合收骨攜至奉天訪小李村葬之明日見女來謝曰吾大父有衍參同契續混元子能窮之龍虎之丹不日成矣合受之究其𤣥微得度世全唐詩太和二年長安城南韋曲慈恩寺塔院月夕忽見一美婦人從三四青衣遶塔言笑甚有風味囘顧侍婢曰白院主借筆硯來於廊柱上題詩曰黃子陂頭好月明忘却華筵到曉行烟收山低翠黛橫折得荷花逺恨生題訖院主執燭將視之悉變為白鶴沖天而去書迹至今尚存河東記馮翊屬縣夏陽有瀵泉太和中有趙生者尉於夏陽與友步月泉上見一人貌甚黒被緑袍自水中流沿泳吟詩曰夜月明皎皎綠波空悠悠久之入水沒明日又至泉所有神祠曰瀵水神入廟見偶人被緑袍者前所見水中人也全唐詩話開成末永興坊王乙掘井過常井一丈餘無水忽聴下有人語及雞甚喧鬧近如隔壁井匠懼不敢掘白孔六帖會昌開成中含元殿換一柱軍士下盩厔山塲購懸重賞有工人遇一巨材徑將袤丈其長百餘尺正中其選歘有一狂士遶材惋咨聴其所說須當中鋸解至二尺見驗矣解一尺八寸但訝霏色紅殷至二寸血流矣急命千百推曳渭流下聴其人云深山大澤實生龍蛇此材中是巨蟒更十年當出樹杪而去若為殿柱後必載此殿而之他國吁可畏也言訖失人太平廣記杜陵韋氏子家於韓城有别墅在邑北十餘里開成四年自邑中遊焉日暮見一婦人素衣自北而來謂韋曰妾居邑北里今為里胥所辱將訟於官幸吾子與紙筆書其事即約韋坐田野衣中出一酒巵曰瓢中有酒願與吾子盡醉韋方舉巵會有獵騎從西來引數犬婦人望見東走數十步化為狐韋大恐視手中巵乃一髑髏酒若牛溺之狀宣室志道士張謹者嘗客遊華陰市中賣𤓰者買食之旁有老父謹覺其飢取以遺之累食百餘謹知其異奉之愈敬將去謂謹曰吾土地神也感子之意有以相報因出一編書曰此禁狐魅術也宜勤行之謹嘗獨行忽有二奴詣謹自稱曰徳兒歸寳願侍左右謹納之凡書囊符法皆付歸寳負之將及闗倐忽不見既而徳兒亦不見所齎之物皆失時關禁嚴急客行無驗不敢東度因止於田家遂為耕夫疲苦備至憩大樹下仰見二兒曰吾徳兒歸寳也汝為奴苦否此符法我之書也今喜再獲吾豈無情於子乎因擲行李還之大笑而去稽神録進士祖價詠之孫也落第後嘗遊商山中夕至一空佛寺價與僕夫投宿價獨翫月忽有一人自殿後出揖價共坐價烹茶待之此人云今夕偶相遇後會難期輒賦三兩篇以述懷遂朗吟云家住驛北路百里無四鄰往來不相問寂寂山家春又吟南岡夜蕭蕭青松與白楊家人應有夢逺客已無腸又吟白草寒露裏亂山明月中是夕苦吟罷寒燭與君同夜久遂揖而退至明日問鄰人云此前後數里並無人居但有書生客死者葬在佛殿後南岡上價度其詩乃知是鬼為文弔之而去會昌解頤録咸通九年春華陰縣南十餘里一夕風雨暴作有龍移湫自逺而至先是崖壠髙亞無貯水之所此夕小山從東西直亘南北峯巒草樹一無所傷碧波迴塘湛若疏鑿劇談録咸通丁亥嵗隴西李夷遇為邠州從事有僕李約常自京還邠早行倦憩古槐下時有一父皤然偃而曳杖亦來同止謂約曰老夫欲至咸陽而蹣跚不能行若能負我乎約不應父請之不已約曰可登背父欣然而登約陰以所得哥舒棒自後束之而趨時及開逺門東方明矣父數請下約束之愈急父求哀請命約不答忽覺背輕有物墜地視之乃敗柩板也三水小牘陳季卿者江南人舉進士至長安十年不歸一日於青龍寺訪僧不值憩於大閣有終南山翁亦候僧偶坐久之壁間有寰瀛圖季卿尋江南路太息曰得此歸不悔無成翁曰此何難乃折堦前竹葉置圗上渭水中謂陳曰注目於此如願矣季卿熟視即渭水波濤洶洶涌一舟甚大恍然登舟行次禪窟寺題詩云霜鐘鳴時夕風急亂鴉又望寒林集此時輟棹悲且吟獨對蓮花一峯立明日次潼闗又作詩題之末句云已作羞歸計獨勝羞不歸踰旬至家兄弟妻子迎見甚喜信宿謂其妻曰我試期已迫不可久留乃復進棹作詩别其妻云酒至添愁飲詩成和淚吟飄然而去倐忽復至渭水徑趨青龍寺山翁尚擁褐而坐僧猶未歸季卿謝曰豈非夢耶翁曰他日自知經月家人來訪具述所以題詩皆在異聞實錄許棲岩岐陽人曾舉進士習業昊天觀朝祝靈仙以希長生一日市馬欲入蜀日加芻秣瘦削益甚卜之道流遇乾之九五道流以為龍馬云比登途歴險與馬俱墜棲岩計窮乃去鞍任馬所之至一崖洞乘以入迥異塵界見一道士卧石上二玉女侍稱為太乙真君云乃詰棲岩曰汝亦好道乎棲岩以老莊黄庭對曰三景之中何得對以其精甚真息之以踵但却以思夀無窮真君曰去道近矣可教也飲以石髓復邀入别室見頴陽尊師棲岩熟視乃卜馬道士並謂真君當東遊十萬里乃偕從東海西龍山赴會畢歸洞中半月求還家真君曰汝飲石髓夀當千嵗仍令乘馬以還曰此吾洞中龍也因怒傷稼謫以負荷子有仙骨得值不然此太白洞天瑶華上宫何由至乎至人間仍放之渭曲既别逡巡已達虢縣則無復故居問鄉人世代已六十年出洞時二玉女託買虢縣田婆鍼乃市之繫馬鞍解放化龍而去大中末棲岩復入太白山太平廣記長安楊氏宅恒有青衣婦人不知由來每詆之迥無畏避一日悉取諸女囊中襟衣暴置庭前女不勝忿呼神巫設壇驅逐莫能止乃徙家避之會所親素有膽使獨止其宅夜婦人至所親留之寢宿匿其所曳緑履求之不得狼狽而去取履視之則羊蹄也尋之至宅東寺中見長生青羊雙蹄無甲贖而殺之其怪遂絶廣異記進士宋洵下第南歸兄波為石泉令洵以縣邑喧雜於縣東葺一山居未畢役者聞石中有婦人語云宋三郎來矣及洵居之因月夜於書堂側屣步又聞石中云宋三郎來矣駐步聴之石門忽開見婦人數輩再拜笑曰請三郎入來洵欲走為數軰所擒入石門遂閉僕夫急穿石求之終不能得聞奇録太原掌書記姚康成奉使汧隴假邢君才舊宅二更後月色如練廊房内聞音樂之聲曰今三人可各賦一篇取樂康成推門求之則皆失矣尋其處惟見有鐵銚破笛秃黍穰帚而已全唐詩話唐時舉子下第不歸僦居長安寺刹謂之過夏有人請乩仙忽飛筆題詞塵上云淒凉天氣凄凉院宇凄凉時候孤鴈叫斜月寒燈伴殘漏落盡梧桐秋影瘦鑑古畫眉難就重陽又近也對黄花依舊後書過夏子題此蓋玉樓賫志者也竹溪雜録鄭昌圗登第嵗居長安夜後納凉於庭夢為人毆擊擒出春明門外至石橋上乃得解遺其紫羅履一隻奔及居而寤甚困床前果失一隻履旦令人於石橋上追尋得之玉泉子參軍黄仁濬自言壬子嵗罷汧陽主簿至鳳翔城有文殊寺寺中土偶數十軀忽自揺動狀如醉人食頃不止觀者如堵稽神錄扶風馬震居長安平康坊聞扣門往看見一賃驢小兒云適有夫人賃驢至此入宅未還賃價其家實無人來且付錢遣之經數日聞扣門又如此乃置人於門果有婦人乘驢來漸近識之乃是震母亡十一年矣葬於南山震驚號奔出已見下驢被人覺不暇隠滅震逐之入馬廏中而立馬生遂牽其裾卒然而倒乃白骨耳衣服儼然而體骨具足細視之有赤脈如紅線貫穿骨間馬生號哭舉收斂之往南山驗其墳域如故發視棺中已空矣馬生遂别卜遷窆之續𤣥怪録雲花寺有聖畫殿長安中謂之七聖畫初殿宇既製寺僧將施彩飾有七少年詣寺來謁曰某善畫願輸工可乎寺僧難之少年曰某不納直茍不可師意即圬其壁未晚也許之七人果挈綵繪將入且曰從此去七日泥錮吾門無使有纎隙不然則不能施其妙矣僧從其語凡六日閴無有聞僧曰此必怪也遂發其封戸既啟有七鴿翩翩望空飛去其殿中綵繪儼若四隅唯西北墉未盡其餙後畫工來見之大驚曰真神妙之筆也於是無敢繼其色者宣室志岐人于凝者常往來邠涇間忽見馬首南顧鼻息恐駭凝隨向觀之百步外有枯骨如雪箕踞荒塜上眼鼻通明背肋枝節可數凝即跨馬前逼枯骨乃竦然挺立凝心悸馬亦驚走遂馳赴旅舍凝即說之適有涇卒十餘洎逆旅少年軰凝為之導俄至其處端坐如故久之枯骸歘然自起徐南去衆各恐讋凝亦鞭馬而迴集異記岐州王祐常開館舍以待往來有一道士謁祐自稱華山道士攜一張琴負一壺藥來求寄泊纔曙辭去祐令人潜偵之見道士化一大鹿西走不知所之瀟湘録大唐中有路氏子性好奇廬於太白山嘗有老僧叩門路君延坐與語久之僧曰檀越好奇請觀我𤣥妙之踪言訖即出一合子徑寸餘其色黑而光既啟即以身入俄化為鳥飛沖天宣室志僧令因於子午谷過山往金州見一竹輿先行有女僕服縗從之令因窺之乃一婦人首而蛇身婦人曰不幸業重身忽變化上人何乃窺之問其僕曰欲送秦嶺之上送及秦嶺亦不見婦人之首遂入林中矣聞奇録驪山下有一白狐驚撓山下人不能除乾符中忽一日突入温泉自浴須㬰之間雲蒸霧湧狂風大起化一白龍昇天而去後三年忽有一老父每夜哭於山前人問其故老父曰狐龍死故哭爾我狐龍之子也人又問曰狐何為化為龍老父曰此狐象西方之正氣而生故色白不與衆遊不與近處託於驪山下千餘年後偶合於雌龍上天知之遂命為龍亦猶人間自凡而成聖耳言訖而滅奇事記唐長安昝規家貧兒女六人盡幼無計撫養其妻謂規曰存活無路欲自賣身以濟君及兒女如何規允之數日有一老父及門規言妻欲自賣之意老父曰我家藍田今欲賣君妻奉錢十萬規許之老父送錢便挈妻去仍謂規曰或兒女思母但攜至山下訪我當令相見經三載後兒女皆死又貧乏規思老父言因往訪之俄見一野寺老父命規入設食出妻相見妻聞兒女皆死號泣氣絶老父怒擬謀害規規懼走出囘顧已失宅所在見其妻死古塚前其塜傍有穴規發塚見一老狐走出乃知其妻為老狐所買奇事記唐坊州中部縣令長孫甲者其家篤信佛道一日齋次舉家見文殊菩薩乘五色雲從日邊下須臾至齋所其家供養數十日其子心疑之求道士為設禁遂擊殺一狐令家奉馬一匹錢五十千後數十日復有菩薩乘雲來至家人敬禮如故其子復延道士禁呪如前菩薩問道士汝讀道經知有狐剛子否答云知之菩薩云狐剛子者即我也我得仙来已三萬嵗我子孫為汝所殺寧宜活汝因杖道士一百畢謂令曰子孫無狀至相勞擾當令君永無災橫以此相報顧謂道士可即還馬及錢言訖飛去廣異記博陵崔敏㲄性不懼鬼為華州刺史岳祠旁有人夜聞廟中喧呼及視庭燎甚盛兵數百人陳列受勅云當與三郎迎婦又曰崔使君在州勿妄飄風暴雨皆云不敢既出遂無所見廣異記昭宗初年鳳翔釋寗師者忽暴終三日而蘇云𡨕中游歴入一門見數殿各有榜一殿署云李克用於牖間窺有一黒龍眇一目中立鐵柱連鎻擊之次一殿署云朱全忠乃青鞟白額虎鎻繫如初次署曰王建黃金牀上卧一白兔次署曰李茂貞具冠冕如王者左右數侍女焉次署曰楊行宻牕牖卑暗不能細瞻問侍者曰此怪狀者何耶曰將來王者也判官謂使者曰好送師囘遂蘇事聞於官皆以為妄其後一皆符合初師為冥司所攝也一判官云和尚夀在而無禄召吏檢之只有乾荷葉三石因令著於簿寗自此每斷厚食惟荷葉湯而已岐下號入𡨕和尚鴻書朱梁時有士人自雍之邠月夜行至曠野忽聞有車騎聲少頃漸近士人避於道旁見三騎冠帶如王者士人躡之因言曰今奉命往邠州取三數千人未知以何道取試為籌之其一曰當以兵取又一曰兵取君子小人俱罹其禍宜以疫取同行者深以為然既車騎漸逺士人至邠州則部民大疫死者甚衆玉堂閒話盩厔吏魁召士人訓子弟士素有蛀牙一日復作左腮掀腫遂張口卧忽聞有聲發於齦齶若切切語言人馬喧鬨漸次出口外痛頓止至半夜却聞蚤來之聲仍云小都郎囘活玉窠也似呵喝狀頰上蠢蠢然直入口彈指頃齒大痛具吿主人勸呼符祝士人從之痛已腫消竟不知何怪陶榖清異録道家書載希夷初隠武當有五老人來聴講易謂希夷曰吾輩日月池中龍也此非君所棲令其閉目凌空馳風及張目已在華山石上又謂希夷之睡乃五龍蟄法葢龍所授也都穆游華山記陳希夷曽當春日於華山水邊石上閒步偶筮遇需上爻謂弟子賈得昇曰當有不速之客三人少頃見三仙至筮述長安富民楊氏家有鬼物為怪召僧衆作梵唄以袪之俄有物攖其道具或投於屋或棄於井羣僧惶懼而去乃至𢷬衣砧石亦自空中騰起三三兩兩相逐而落中庭遇物凌觸而物無所損翊聖保徳真君傳同州北境良輔鎮即唐鄭魏公莊也嘉祐中出城看夜义既至野次見之如人形狀正如圗畫髮朱皮如螺蚌腰着豹皮禈觀者畧數千人常以大樹庇身累日乃不復見畫墁録謝翺舉進士寓居長安昇道里一日晚南行百步眺終南峰見一騎自西馳來近乃雙鬟因駐謂翺曰郎非見待耶願郎歸所居入見堂中設茵毯張帳帟錦繡輝映頃之有金車至門一美人入門與翺相見曰聞此地有名花故來與君一醉耳即命酒逓酌夜䦨謂翺曰聞君善為詩願見贈翺因命筆賦詩美人求絳箋寫詩答之筆札甚工遂顧左右撤帷帟命燭登車翺送至門未數十步而沒宣室志宋時同州有白蛇為害知者皆不敢出守政和間有宰相壻某到官張樂會僚忽視娼皆衣白家人知中妖騎報相君白徽宗詔虚靜張天師來治問得蛇所結壇作法飛符良久風雷四起俄白氣滃於天際火從穴發漸及壇畔有大蛇至遂飛劍殺之已又斬如柱楹者二十許賈志房寅韓城人善呪禁之術墓在文嶺之陽宋真宗病疽諸醫藥之不效一夕夢一神人以水噀之者數四頓覺體輕如無病者帝問何人對曰臣家韓城居槐柏相纜處帝每憶夢中事欲作祀未果一夕復夢神人至復詰其姓氏家居歴歴陳之已而不見詔訪所居果得之因勅建廟以祀香火日盛澄郃諸邦亦皆建祀疾病痛楚禱輒響應韓城志褒女者漢中人也居漢沔間幼好道既笄浣紗於濜水上雲雨晦㝠若有所感而孕父母責之憂患而終謂其母曰死後願以牛車載送西山之上言訖而終父母置之車中未及駕牛其車自行踰沔漢二水直上濜口平元山頂家人追之但見五雲如葢天樂駭空幢節導從其女昇天而去邑人立祠祭之水旱祈禱俱驗濜口山頂雙轍迹存集仙録華嶽張超谷巖石下有僵尸齒髮皆完春時遊人多以酒灑口中呼為卧仙好事者作木榻以薦之嘉祐中有石方十餘丈自上而下正塞巖口豈仙者蛻山靈䕶之耶陳襄文昌雜録華陰令王真妻趙氏燕中富人女少適真洎隨之任近半年忽有一少年每伺真出輒至氏室因戲誘私之忽真自外入見少年與氏飲酌歡笑真大驚訝趙氏不覺自仆氣絶少年化一大蛇奔突而去真乃令婢扶掖起氏亦化蛇奔突隨入華山久之不見瀟湘録鄜延長吏有大竹凌雲可三四圍伐之見二仙翁對云平生深根勁節惜為主人所伐言畢乘雲而去幽怪録建炎初石泉縣民楊廣得疾絶惡見人自隙窺之時捽所藉稻藁食之日數尺乃死斂畢棺中忽有聲若蹋者啟之則一驢躍出嘶鳴甚壯衣帽如蟬蛻然家人縶之隙屋中一日其子婦持草飼驢忽跳齧婦背流血婦忿怒取剉草刀刺之立死廣妻遂訴縣稱婦殺翁縣遣修武郎王直臣往驗之備得其事清尊録李徳逺紹興中與福州姚知縣同邸時姚之舊友賈縣丞名詡字虞仲所居相去百步必過姚夜話李因得識之賈長安人談驪山宫闕故都井邑之事滚滚可聴又嘗為縉雲丞説鬼仙英華事蹟尤有依據又二年李與同僚唐信道語怪唐具述英華李應答如響唐曰君何知之以所聞告唐駭曰得非長身多髯者乎曰然陜西人乎曰然是人自縉雲罷即死其兄葬之某處吾送之􅉎于今十年安得如君所云李方懼徐思未嘗白晝來其坐嘗去燈逺知乃鬼爾異聞總録金天會戊申有紅巾十萬攻城危甚忽大兵至破賊統兵烏嚕大王憩兵同州界八魚井見老翁馳白馬汗如流詣軍門吿急莫知為誰忽有人曰城隍廟塑馬迄今有汗同州志陜西某縣一老嫗住莊村間日有道流乞食與之無吝色曰二十年後當有難今以鐵簡授汝至時急投諸火言訖而去久之嫗之女長而且美一日有曰大王者騎從甚都借宿嫗家遣左右謂曰聞得異人鐵簡可出示否嫗平日數為他人借觀因造一偽物而以真者懸腰間遂用偽獻留不還曰汝可呼汝女行酒以疾辭大王怒便欲為姦嫗思道流之説計嵗數又合乃解鐵簡投酒竈火内既而電掣雷轟擊死獼猴數十其一甚鉅所齎器用悉金銀寳玉赴告有司籍入官庫台哈布哈為西臺御史日閱其案曰鬼贓輟耕録西安有蝎魔寺塑大蝎於楣相傳明初有女子素不慧病死復生遂以文史知名時有布政䘮儷遂娶之月餘布政方視事使閽人入廨見老蝎伏榻上輾轉間又成好女子已而忽失所在是夕人定乃出拜燈下曰身本蝎魔得罪𡨕道賴大士救免因假女屍幸獲侍左右覬公建一蘭若報大士之徳今醜迹已彰幸公哀憐布政頷之女子遂隠他日乃命所司建寺郎瑛續庚巳編闗按今為鐵旗竿帝廟在滿城中近東門香溪洞在興安州南二十里成化中知州鄭福聞洞中有胡濙題訪之行三里許峽峪如門迤􅆔而進小庵在焉二人對奕化白雲飛去遺石局數十碁子推之動取之不下賈志成化二十一年郃陽民王興左拇甲出龍先是甲内見紅紋如線紆曲每雷雨輒旋動小苦興數欲剔去之後夢一男子形容甚異謂興曰余乃龍也謫托君體三日後當去幸勿訝至期雷雨大作自牖出其手有龍裂甲飛去賈志蟾宫吸月亭在斗山後時有白氣亘天土人多見之明孝廉方策偕友讀書斗山寺間偶步山麓忽見重門洞開視其額有蟾宫吸月亭字遂入有一女子以茗飲之方謂如此清異之處當與友共遊置茗於几急出呼友至已迷矣漢中府志明扶風馬孺子與羣兒戲郊亭上忽有奇女墮地羣兒駭且恱之稍狎焉女怒曰帝以吾心侈大怒而謫來七日當去遂入居佛寺講室及期取杯水飲之嘘成雲氣五色因取裘反之化為白龍迴翔登天而去扶風縣志嘉靖十二年褒人於㢘水之隈飲牛見一物如牛鷹嘴肉翅自深潭盤旋而出其聲如雷以翅裹牛入水衆用瓦石擊之遂深入牛乃出漢中府志蒲城羅秀才館邑之東偏遇一僧毰毸披髮貌甚奇古生問從來笑而不答邀至館授以一餐僧曰明日俟我於東嶽神祠如期而赴良久僧至時已昬黑僧乃於袖出圎紙吹上屋梁忽成皎月向祠東壁以手指畫門豁然開長鬚數人從壁門出布設坐錦屏繡縟海錯山珍備具酒再行僧曰寂寂無以娛賓可命妓能歌舞者來俄見十六麗姝亦出自壁門纎謳乍發雅樂齊鳴咸呈妙技羅目眩神駭逡巡求退僧舉袖一揮妓僕器物俱隠入壁中梁月隨人移照嶽祠外譙樓鼓聲已三嚴矣僧仍於袖出一木龍令羅乘之倐長數丈千林萬壑瞬息而過僧呼曰可下矣下則一海島茅庵也庵外白虎張口向羅僧叱之羅悽怖求歸僧傾小藥丸如豆斷庭前細竹數寸贈羅曰君歸後殷邦十五年鬼井奇祲用此乃免羅祇受假寐少頃依然身在嶽祠門外天甫向曉悵惘囘書館竹葉藥猶在掌中閲三年奇旱羅貧困取藥偶向屈戌磨之藥化火發融為黃金又以竹節畫地成圏輒得胡餅一枚啖至三枚再劃則不成矣日以為常次年稔遂失竹枝所在殷邦蓋謂嘉靖十五即七八兩年鬼井乃秦分也觚賸嘉靖二十四年别駕王濯征未第時同二三友人丙夜過秦邸見一巨人從東柵來髙三丈餘至蕭墻東南隅扶墻内望若有太息聲越明年一宗室出門又見一巨人從北着白衣白幘耳有髙二丈餘兩目炯炯火光射地望南去咸寧志宜君楊筠湄締婚中部劉氏未娶而劉殀筠湄書齋夜讀有女子碧襦紅裳欵戸曰妾即君之婦劉氏也誼托絲蘿理無幽顯故逺叩書幃自此及夕即來踰嵗乃絶筠湄詢以科名口占四語云中舉中進士做官做御史督學在山西巡撫江南止其後一一皆驗觚賸長安明時五隅頭有葉姓老翁鬚已皓然一道人過之化齋葉仰視日近巳曰非其時矣道人乃舒右手抹翁右頰尋鬚而下曰美哉鬚遂飄然而行少時侍婢見右畔鬚純黑而半面肉色亦嫩如少年後翁得上夀鬚容卒不變長安縣志嘉靖三十九年永夀城西武亭河岸穴中出白霧俄然結成人馬形有乘馬者有步行者宛然如生皆雄傑可畏至盤道山北散為有翼螻蟻永夀縣志温韜發諸陵惟乾陵風雨不可發嘉靖戊戌先君作吏隴西道出乾州土人云過則天陵如有謾語輒以雷雨報之先君弗信為一詩詆之行不數里雷雨大作仲兄再過其地復賦一詩詆之中道亦遭風雨千年虐熖死而不亡何偉然廣快書崇禎甲戌澄城闗帝廟有畫虎道士諷經至夜三鼓見虎雙眸炯然從壁而下若將噬人道士取斧格之虎上壁忽不見二申野録吉給諫時為諸生讀書城隍廟偶暮歸忽聞門下有人言去得否徐伺之乃二泥鬼言也須㬰二鬼下臺東向行時因尾之一鬼曰勿髙言吉解元在後尋至一人家叩門即開以納次日往訊主人言有女得疾每起鼓後如魅魘狀至五更方甦時令取硃紙書吉解元在此五字貼床頭女尋愈後時果發解長安縣志米脂諸生賀時雨貢生艾詔詣督師汪喬年上書請發李自成祖墳為厭勝計喬年以聞報可事下知縣邊大綬親臨發掘及開有大蛇十數皆長丈餘囘旋其中枯骸成漆色生毛髮赤蟻數斛盡焚棄之延綏志崇禎末蒲城人屈曼為縣𨽻嘗中途醉卧夜半見古槐間有少年書生仰月呼吸俄而口吐一珠色赤於火以手承弄曼踉蹌而前奪取吞嚥書生怒爭不已既而曰假汝經年仍當歸我隨失所在曼吞珠後體甚飃忽咸謂曼得隠形術適御史巡蒲録諸訟牒怨家重賂曼徑入堂掣牒左右無見者御史覺階前有半體人案牒翻翻自動心甚駭異急以所佩印重按之忽得人手其全體遂現立命箠斃掩埋逾夕其地墳起成一小穴若有物出入狀葢書生取珠為之觚賸明末少華峰有龍出玉皇殿泥龍内坐山道人及張天錫見之華州志鑒戒秦孝公用商君嘗臨渭論囚渭水盡赤孝公卒太子立發吏捕商君商君亡至闗下欲舍客舍主人不知其是商君也曰商君之法舍人無驗者坐之商君喟然歎曰嗟乎為法之弊至此哉史記商君傳郭解軹人徙入闗闗中賢豪知與不知聞其聲爭交驩解殺楊季主楊季主家上書人又殺之闕下上聞乃下吏捕解解亡置其母家室夏陽身至臨晉出闗久之得解遂族郭解史記游俠傳趙廣漢為京兆尹好用世吏子孫新進少年者專厲强壯蠭氣見事風生以私怨論殺男子榮畜人上書言之事下丞相御史按驗廣漢疑丞相夫人殺侍婢欲以脇丞相乃將吏卒入丞相府召夫人跪庭下受辭收奴婢十餘人去丞相上書自陳上惡之下廣漢廷尉竟坐􅆎斬漢書本傳減宣為左内史其治米鹽事小大皆闗其手自部署縣名曹實物官吏令丞弗得擅揺動以重法繩之居官數年廢為右扶風坐怨成信漢書曰成信宣吏信亡藏上林中宣使郿令格殺信吏卒格信時射中上林苑門宣下吏抵罪以為大逆當族自殺史記酷吏傳王温舒者陽陵人為御史督盜賊殺傷甚多遷河内太守捕郡中豪猾相連坐千餘家上書請大者族小者死流血十餘里其好殺伐行威如此嵗餘㑹宛軍發詔徴豪吏温舒匿其吏華成及人有變告温舒他姦利事罪至族自殺史記酷吏傳扶風人士孫奮居富而性吝梁冀以乘馬遺之從貸錢五千萬奮以三千萬與之冀大怒乃告郡縣認奮母為其守藏婢云乃盜白珠十斛紫金千斤以叛遂收考奮兄弟死於獄中悉沒貲財億七千餘萬後漢書梁冀傳董卓既死當時日月清淨微風不起旻璜等及宗族老弱悉在郿皆還為其羣下所斫射卓母年九十走至塢門曰乞脫我死即斬首袁氏門生故吏改殯諸袁死於郿者斂聚董氏尸於其側而焚之暴卓尸於市卓素肥膏流浸地草為之丹守尸吏冥以為大炷致卓臍中以為燈光明達旦如是積日後卓故部曲收所燒者灰并以一棺棺之葬於郿卓塢中金有二三萬斤銀八九萬斤珠玉錦繡奇玩雜物皆山崇阜積不可知數英雄記李傕等葬董卓於郿葬日大風雨霆震卓墓流水入藏漂其棺木後漢書董卓傳王如新豐人初為州武吏時闗中荒殘潛結無賴諸少年乘夜襲破山簡杜㽔軍於是馮翊嚴凝長安侯脫等各率其黨攻城殺令以應之未幾衆至四五萬自號大將軍領司雍二州牧歸王敦卒為敦所誅晉書本傳皇初中姚興給事黃門侍郎古成詵每以天下是非為己任時京兆韋髙慕阮籍為人居母䘮彈琴飲酒詵聞而泣曰吾當私刃斬之以崇風教遂持劍求髙髙懼逃匿終身不敢見詵姚興載記魏葢吳反杏城闗中騷動帝西伐至於長安先是長安沙門種麥寺内御騶牧馬於麥中帝入觀馬沙門飲從官酒從官入其便室見大有弓矢矛楯出以奏聞帝曰此非沙門所用當與葢吳同謀規害人耳命有司案誅一寺閱其財産大得釀酒具及州郡牧守富人所寄藏物葢以萬計又為曲室與貴室女私亂帝既怒沙門非法崔浩時從行因進其說詔誅長安沙門焚破佛像勅下四方令一依長安故事魏書釋老志杜陵人韋伯昕學尚有壮氣自以才智優於裴植常輕之延昌末告植謀為廢黜植坐死後百餘日伯昕亦病卒臨亡見植爲祟云魏書裴叔業傳燕榮華陰人性剛嚴有武藝仕周從武帝伐齊以功授開府儀同三司隋文帝受禪徴為武候將軍除幽州總管榮性嚴酷嘗按部道次見叢荆堪為箠命取之輒以試人人或自陳無咎榮曰有罪當免及後犯將撾之人曰前被杖許有罪宥之榮曰無過尚爾况有過耶榜捶如舊每巡省管内聞人吏妻有美色輒舍其室而淫之暴縱日甚元𢎞嗣除幽州長史懼辱固辭上知之勅榮𢎞嗣杖十已上罪皆奏聞榮遣𢎞嗣監納倉粟颺得一糠一粃罰之毎笞不滿十一日中或至三數如是歴年怨隙日搆遂收付獄絶其糧𢎞嗣飢抽衣絮雜水咽之其妻詣闕稱寃上遣考功侍郎劉士龍馳驛鞫問奏榮毒虐又贓穢狼藉徴還京賜死先是榮家寢室無故有蛆數斛從地噴出未幾榮死於其處北史酷吏傳王文同頻陽人開皇中以軍功拜儀同煬帝嗣位出為恒山郡贊務有一豪猾每持長吏長短文同下車聞其名而數之因令剡木為木橛埋之於庭出尺餘四面各埋小橛令其人踣心於木橛上縛四支於小橛以棒打其背應時潰爛郡中大駭及帝征遼東令文同巡察河北諸郡北至河間召郡官人小有遲違者輒覆面於地捶殺之求沙門相聚講論及共為佛會者數百人文同以為聚結惑衆盡斬之又悉裸僧尼驗有淫狀非童男女者數千人復將殺之郡中士女號哭於路諸郡驚駭各奏其事帝聞大怒遣使馳鎻之斬於河間北史本傳魚俱羅馮翊下邽人初煬帝在藩俱羅弟贊以左右從累遷大都督帝嗣位拜車騎將軍贊性凶暴虐其部下令左右炙肉遇不中意以籤刺其眼有温酒不適者立斷其舌帝以贊藩邸之舊不忍加誅令自為計贊飲藥而死隋書魚俱羅傳大業中京兆獄卒失其名酷暴諸囚囚不堪其苦而獄卒以為戯樂後生一子頤下肩上有若肉枷無頸數嵗而死廣古今五行記隋大業末有道者居太白山煉丹砂有成弼者給侍甚久一日以家艱辭去道者遺丹十粒令一粒化赤銅十斤足辦葬事弼還如言襄事復入山求丹不與乃持刃刧之斷手刖足顔色不變并斬其首解衣見肘後有赤囊開之則丹也弼喜持之下山忽聞呼弼聲囘顧乃道者也曰吾不期與子至此子受丹神必誅汝終如吾矣言已不見弼既得丹多變黄金家大富則為人告云有姦弼自列能成黃金唐太宗召試有驗因授五品官令造金凡造數萬斤而丹盡因求去帝令列其方弼訴不知帝謂其詐遂令斷手刖足斬首如道者云廣異記武徳四年赦王世充為庶人與兄弟子姪處蜀以防夫未􅇱置雍州廨舍獨孤機之子修徳帥兄弟至其所矯稱勅呼鄭王世充與兄世惲趨出修徳等殺之其餘兄弟子姪等於道亦以謀反誅武徳二年獨孤機兄弟為世充所殺故修徳報仇通鑑注李密字元䆳其先襄平人父寛隋上柱國遂家長安密趣解雄逺多策畧以蔭為千牛備身謝病去感厲讀書以蒲韉乘牛挂漢書一帙角上行且讀時賊翟讓聚黨萬人密以策干讓讓分兵與密號蒲山公推為盟主建號魏公密殺讓心稍驕武徳元年王世充悉衆決戰密軍潰歸闗中髙祖拜光禄卿封邢國公殊怨望髙祖詔以本兵就黎陽招撫故部曲王伯當為副馳至稠桑驛有詔復召密密大懼謀叛伯當止之不從熊州副將盛彦師擊斬之唐書本傳那羅邇娑婆寐帝那伏國人也貞觀二十二年右衞率長史王元策破帝那伏國得之自言夀三百嵗云有長生之術太宗深加敬禮造延年之藥發使天下採諸奇藥異石有藥名畔茶位水出山中石臼内有七種色或熱或冷能消草木金鐵人手入水即銷爛欲取之以駱駝髑髏沈於石臼以水轉注瓠蘆中每有此水處即有石桂似人形守之若彼山人傳道出此水者即死又有藥名咀賴羅在髙山石崖腹有石孔孔前有一小樹其葉青綠狀如黎杏石孔中有大毒蛇守之人不得到欲取此樹為藥以大方頭箭射取枝葉葉下便有鳥銜將飛去即以衆箭射鳥而取其葉詭異之事𩔖多如此徒延嵗月術卒不就終死於長安冊府元龜白鐵余者延州稽胡也先於深山中埋一銅佛像經數年草生其上詔鄉人曰吾昨夜山下過見有佛光於是卜日設齋以出聖佛及期集數百人命於非所藏處斸不得則詭曰諸人不至誠布施佛不可見是日男女爭施捨百餘萬即於埋處斸之得銅佛鄉人以為聖人逺近相傳莫不欲見宣言曰見聖佛者百病即愈計百里老小士女皆就之乃緋綾為袋數十重盛佛像人來觀者去其一重一囘布施獲千萬乃見其像如此矯偽一二年鄉人歸伏遂作亂自稱光王署置官屬設長吏為患數年命將軍程務挺討斬之朝野僉載薛萬均弟萬徹徹按薛萬咸陽人髙宗永徽二年授寧州刺史入朝與房遺愛昵甚因曰我雖病足坐置京師諸輩猶不敢動遺愛曰若國有變當與公共輔荆王謀洩下獄誅唐書薛萬均傳附杜如晦次子荷杜按杜氏陵人性暴詭不循法尚城陽公主官至尚乘奉御封襄陽郡公承乾謀反荷曰琅邪顔利仁善星數言天有變宜建大事陛下當為太上皇請稱疾上必臨問可以得志及敗坐誅臨刑意象軒驁唐書杜如晦傳周興萬年人少習法律自尚書吏積遷秋官侍郎屢決制獄文深峭妄殺數千人天授中人告興與丘神勣謀反詔來俊臣鞫狀興未知被告方對俊臣食俊臣曰囚多不服奈何曰易耳内之大甕熾炭周之何事不承俊臣曰善命取甕具熾火徐謂興曰有詔按君請嘗之興駭汗叩頭服罪唐書本傳來俊臣萬年人凶險不事生産妄告密引見則天以為忠累遷侍御史按制獄少不會意者必引之前後至族千餘家則天於麗景門别置推事院令俊臣等按鞫俊臣造告密羅織經一巻皆有條貫支節布置事由每鞫囚無輕重多以醋灌鼻禁地牢中或盛之甕中以火遶炙之並絶其粮至有抽衣絮以噉者每有赦令俊臣必先遣獄卒盡殺重囚然後宣示由是告密之徒紛然道路諸武及太平公主恐懼共發其罪乃棄市國人無少長皆怨之競剮其肉斯須盡矣舊唐書酷吏傳來子珣萬年人永昌初上䟽擢左臺監察御史后倚以按獄多徇后㫖故賜姓武字家臣既誣雅州刺史劉行實弟兄謀反誅得遷游擊將軍常衣錦半臂自異俄流死唐書來俊臣傳附唐則天初京兆人李全聞家富於財性好殺戮猪羊驢犢皆烹宰於前常與諸子取鳥雀以刀齊刈其頭即放飛看其飛得近逺逺者為勝近者為負以此戲樂在家極嚴殘婢妾及奴客少有事或懸開其心或剜去其目其妻初生一子自眼上䀹有皮埀下至於鼻從額已後又有一片皮垂至於頸有似人着帽焉後生一子牙爪如虎口似鷹吻又生一子從項至腰有縫撥看見其心肺五臟生而俱死其兄亦好鷹犬弋獵性又殘忍酷毒其妻生男項上有肉枷鳥獸魚鱉形或無眼鼻者數矣廣古今五行記周侍御史侯思止醴泉賣餅食人也羅告准例酬五品於上前索御史上曰卿不識字對曰獬豸豈識字但為國觸罪人而已遂授之凡推勘殺戮甚衆更無餘語唯謂囚徒曰不用你書言筆語止還我白司馬若不肯來俊即與你孟青横遭苦楚非命者不可勝數白司馬者北邙山司馬坂也來俊者中丞來俊臣也孟青者將軍孟青棒也後坐私蓄錦朝堂決殺之朝野僉載張易之兄弟驕貴强奪莊宅奴婢姬妾不可勝數昌期於萬年縣街内行逢一女人壻抱兒相逐昌期馬鞭撥其頭巾女婦罵之昌期顧謂奴曰横䭾將來壻投匭三四狀並不出昌期捉送萬年縣誣以他罪決死之昌儀常謂人曰丈夫當如此今時千人推我不能倒及其敗也萬人擎我不能起俄而事敗兄弟俱斬朝野僉載天受年彭城劉誡之粗險不調凌上忽下恐嚇財物從萬年縣尉常彦瑋索錢一百千云我是劉果毅當與富貴彦瑋進狀告之上令二給事先入彦瑋房中下簾坐牕下聴之有頃誡之及盧千仭至坐談彦瑋引之說國家短長無所忌諱給事一一紙筆抄之以進上怒令金吾捕捉親問之具承遂腰斬誡之千仞處絞授彦瑋侍御史朝野僉載崔湜為襄州刺史請别開南山新路以趣商州役工數萬死者十三四仍嚴錮舊道不許人行其新路每經夏潦摧壓踣陷行旅艱辛僵仆相繼後湜流嶺表俄誅戮於路山南人先苦湜所役競以磚瓦投擲其尸應時盡碎而商州奏請復依舊路冊府元龜景雲中西京霖雨六十餘日有一胡僧名寳嚴自云有術能止雨設壇塲讀經呪其時禁屠家寳嚴用羊二十口馬二疋以祭祈讀經五十餘日其雨更盛於是斬逐胡僧其雨遂止朝野僉載相王誅逆韋崔日用將兵杜曲誅諸韋畧盡綳子中嬰孩亦揑殺之朝野僉載京兆尹崔日知處分長安萬年及諸縣左降流移人不許暫停有違晷刻所由決杖無何日知貶歙縣丞被縣家催求與妻子别不得朝野僉載楊虞卿為京兆尹市里有三王子力能揭巨石遍身圗劄前後合抵死數四皆匿軍以免會有過楊令所由數人捕獲閉闗杖殺之判云刺劄四肢口稱王子何須訊問便合當辜酉陽雜俎王旭侍中珪孫神龍初遷累左臺侍御史每治獄囚皆逆服制獄械率有名曰驢駒拔橛犢子懸等以怖下又縋髮以石脅承之時監察御史李嵩李全交皆嚴酷與旭埒京師號三豹里閭至相詛曰若違教值三豹宋王憲官屬納希虬兄為劍南令坐贓旭奉使臨訊見其妻美逼亂之囚殺其夫納贓數百萬希虬泣訴於王王為上聞詔劾治獲姦贓不貲貶龍州尉恚而死唐書本傳按王旭郿縣人王涯有再從弟沐家於江南貧且老聞涯為相跨驢詣之欲求一簿尉留長安二嵗始得一見涯待之殊落寞久之沐因嬖奴以道所欲涯許以微官自是旦夕造門以俟命及涯家被收沐適在其第與涯俱腰斬舒元輿有族子守謙愿而敏元輿愛之從元輿者且十年一日忽以非罪怒之日加譴責奴婢軰亦薄之守謙求歸元輿亦不留悲嘆而去夕至昭應聞元輿收族守謙獨免通鑑天寳中御史大夫王鉷有罪賜死縣官簿錄鉷太平坊宅數日不能遍宅内有自雨亭從簷上飛流四注當夏處之凛若髙秋又有寳鈿井欄不知其價他物稱是封氏見聞録長安城中有豪民楊崇義者妻劉氏與隣舍兒李弇私通崇義一日醉歸劉氏與李弇同謀而害之埋於枯井中其時僕妾軰並無所覺惟有鸚鵡一隻在堂前架上洎殺崇義之後其妻遂經府陳詞言其夫不歸竊慮為人所害府縣官吏莫究其弊後來縣官等再詣崇義家檢校鸚鵡忽然聲屈曰殺家主者劉氏李弇也官吏遂執劉氏及李弇備招情欵府尹具事案奏聞明皇歎訝久之封鸚鵡為綠衣使者開元天寳遺事鳳州城南有明相寺佛數尊皆飾以金亂後有貧民刮金鬻而自給迨至時寧金綵已盡於是遍身生癬癢不可忍必須以物自刮皮盡至肉肉盡至骨而死王琰㝠祥記長安完盛時有一道術人稱得丹砂之妙顔如弱冠自言三百餘嵗京都人甚慕之至於輸貨求丹横經請益者門如市肆時有朝士數人造其地飲啜方酣有閽者報曰郎君從莊上來欲叅覲俄見一老叟鬢髮如銀昏耄傴僂趨前而拜拜訖叱入中門徐謂坐客曰小兒愚騃不肯服食丹砂以至於是都未及百嵗枯槁如斯坐客愈更神之後有人私詰道者親故乃云傴僂者即其父也好道術者受其誑惑如欺嬰孩矣玉堂閒話元載結中人董秀厚啖以金使刺取密㫖帝有所屬必先知之探微揣端無不諧契故帝任不疑魚朝恩誅載益矜肆外委主書卓英倩李待榮内刧婦言縱諸子闗通貨賄擠忠良進貪猥城中開南北二第室宇奢廣當時為冠近郊作觀榭帳帟什器不徙而供膏腴列墅疆畛相望名姝異伎雖禁中不逮帝盡得其狀李少良上書詆其醜狀載怒殺少良帝積怒大厯十二年詔收載賜死唐書本傳元載寵姬薛瑶英母趙姢本岐王愛妾後出為薛氏妻生瑶英及載納為姬善為巧媚載惑之怠於庶務瑶英父兄與趙娟出入賄賂號為闗節天下齎寶貨求大官職無不指薛為梯媒載死瑶英自為俚妻矣杜陽雜編元載於萬年縣佛堂子中謁主官乞一快死主者曰相公今受些子汚泥不怪也乃脫穢襪塞其口而終嘉話錄華山道士明思逺勤修道籙三十餘年常教人金水分形之法並閉氣存思師事甚衆永泰中華州虎暴思逺云虎不足畏但閉氣存思令十指頭各出一獅子虎即去思逺兼與人同行欲暮於谷口行逢虎其伴驚懼散去唯思逺端然閉氣存思俄爲虎所食其徒明日於谷口相尋但見松蘿及雙履耳辨疑志李廣𢎞小字軟奴自稱嵩山僧或詐云王孫與其黨王昌至京師有董昌者導廣𢎞舍於資敬寺尼智因董昌又令妖人唐郛言廣𢎞當大貴郛又誘射生將韓欽緒李政諫南珍霞及神䇿將魏循李傪前越州參軍李昉明經陸降於廣𢎞所皆行君臣之禮各有署置廣𢎞通於智因許以為妃又云嶽瀆為我擇十月十日庚寅舉行魏循李傪上變令中官捕之三司覆驗連坐死者百人冊府元龜上都市肆惡少率髠而膚劄備衆物形狀恃諸軍張拳强刧至有以蛇集酒家捉羊甲擊人者京兆尹薛元賞上言白令里長潛捕約三十餘人悉杖殺屍於市市人有㸃青者皆炙滅之時大寧坊力者張幹劄左膊曰生不怕京兆尹右膊曰死不畏閻羅王又有王力奴以錢五千召劄工可胷腹為山亭院池樹草木鳥獸無不悉具公悉杖殺之酉陽雜俎元和初天水趙雲客遊鄜畤過中部縣縣寮有讌吏擒一囚至罪不甚重官寮願縱之雲醉因勸加刑杖之二十累月雲出塞行及蘆子闗道逢一人要之過其居命酒偶酌既而問曰君省相識耶前某月日於中部值君某遭罹橫罪與君素無讐隙為君所勸因被重刑雲遽起謝之其人曰吾望子久矣乃令左右拽入一室有大坑深三丈餘中惟貯酒糟數十斗剥去其衣推雲於中飢食其糟渴飲其汁昏昏幾一月乃出之使人􅕚額挼捩肢體手指肩髀皆改舊提出風中倐然凝定至於聲韻亦改以為賤隸會其弟為御史出案靈州獄雲以前事密䟽示之其弟告於觀察使李銘由是發卒討尋盡得姦人而覆滅其黨臨刑亦無隠匿云前後如此變改人者數代矣獨異記温韜京兆華原人少為盜後事李茂貞為華原鎮將茂貞以華原縣為耀州韜為刺史梁太祖圍茂貞於鳳翔韜以耀州降梁即以韜為節度使韜在鎮七年唐諸陵在境内者悉發之取其金寶昭陵最固韜從埏道下見宫室制度閎麗不異人間中為正寢東西廂列石床床上石函中為鐵匣悉藏前世圗書鍾王筆迹紙墨如新韜悉取之遂傳人間惟乾陵風雨不可發後求徙他鎮遂徙忠武莊宗滅梁韜來朝莊宗待韜甚厚郭崇譛曰此刧陵賊罪不可赦莊宗遽遣還鎮明宗入洛流徳州賜死五代史本傳西京咸宜觀女道士魚𤣥機字幼微長安里家女也色傾國喜讀書屬文尤致意吟咏咸通初從冠帔於咸宜或載酒詣之必鳴琴賦詩間以謔浪其詩有雲情自鬱爭同夢仙貌長芳又勝花一女僮曰綠翹亦明慧有色一日機為隣院所邀迨暮方歸綠翹曰適某客來知鍊師不在而去客乃機素相暱者意翹與之私及夜張燈扃戸命翹入卧内訊之裸而笞百數既委頓請盃水酹地曰無天則無所訴若有誰能抑我言訖絶於地機坎後庭瘞之自謂無人知者有問翹者則曰春雨霽逃矣客有宴於機室者因溲於後庭當瘞上見青蠅數十集於地驅去復來詳視之如有血痕且腥客既出竊語其僕僕歸復語其兄其兄為府街卒嘗求金於機機不顧卒深銜之聞此遽至觀門覘伺見偶語者乃訝不覩綠翹之出入街卒復呼數卒攜鍤具突入𤣥機院發之而綠翹貌如生卒遂録𤣥機京兆府吏詰之辭伏朝士多為言者府乃表列上至秋竟戮之三水小牘有處子姓文不記其名居漢中以燒煉為業有富商李十五郎者積貨甚多為文所惑三年之内家財罄空恥之自經又有蜀中大將屯兵漢中者亦為所惑華陽坊有成太尉新造一第未居言其空淨遂求主者賃以燒藥因火發焚其第延其一坊掃地而盡文遂夜遁欲向西取桑林路東趨斜谷以脫身出門便為猛虎所逐不得西去遂北入王子山虎隨之不離跬步既窘迫遂攀枝上樹以帶自縛於喬柯之上虎遶樹咆哮及曉官司捕逐者及樹下虎乃徐去遂就樹擒之斬於燒藥之所王氏見聞長安城西明寺鐘寇亂之後有貧民偷其銅袖鎚鏨往竊鑿之日獲一二斤鬻於闤闠如是經年其家忽失所在市銅者亦訝其不來後官欲徙鐘於别寺見寺鐘平墮在閣上及仆之見盜鐘者抱鎚鏨儼然坐於其間即已乾枯矣玉堂閒話偽蜀王宗信鎮鳳州有角觝人蘇鐸者委之巡警嘗與宗信之左右孫延膺不協宗信因暇日登樓望見蘇鐸錦袍束帶似逺行人之狀宗信訝之鐸本岐人也延膺因譛曰蘇鐸雖受公畜養其如包藏禍心久欲逃去宗信大怒立命擒至先斷舌臠肉然後斬之及延膺作逆其被法之狀一如鐸焉儆戒録臨潼縣驛前有俚婦三子皆售諸過客二為正使一為郎官正使者一田一劉郎官者縣人田升卿也田登第嫡父自陳升卿大怒聞公決杖元祐中升卿坐市易錢不明配流廣南人謂無親之報畫墁録劉原父晚年病日月兒女皆不能認人言永興中多發塚墓求古物致此暇日記武功典史張儀儀封人刻薄狡險善虐其民取之及骨髓及語百姓吾為吏㢘士大夫不知也即有弗㢘我安敢昧城隍當使我父子同日橫死不踰年果父子同日死壯兵祗候儀宅者是夜未寐見二長鬚人皂衣持鎖突入儀寢兵以為同事者俄傳儀子死兵亟尋持鎻者内無有也乃儀亦暴死日中武功志張獻忠號八大王延安衛柳樹澗人為府快手不得志去從神一魁領紅旗為先鋒有力多詭同夥咸尊事之㸃燈子清澗人趙四兒也紫金梁者即王自用一名王和尚老囘囘者即馬守應皆綏徳人也過天星者張天綝也綏徳人惠登相者亦號過天星清澗人也曹操者羅汝才也延安人多智而狡賊中號之為曹操延綏志按諸賊旋相殄滅李自成小字磑生米脂人居於懷逺堡之李繼遷寨二十一嵗應募銀川馬夫夜失道有雙狼引之行給事劉懋上言裁減驛跕自成復無聊里中推為里長值催科甚迫縣令笞之加以杻自成脫去竄入王左掛子苗美隊中號八隊闖將自成身不甚長髙顴深䪼鴟目鷹鼻反膺巨肩後髮際如蠆聲似豺而語甚遲緩逺望之猶俗所畫鍾馗也性慘酷鉗鑿鎚鋸不離左右斫足剖心日以為常後南奔辰州往邨落中求食邨民擊之不知所終延綏志姜瓖榆林人明崇禎間掛鎮朔將軍印鎮大同李自成之亂瓖投賊自成敗來歸仍命為大同總兵官内懷反側順治五年冬院府各官出城閱粮瓖乘虛舉兵朔渾望風奔潰我師雲集立復朔渾等處遂圍大同六年秋賊黨勢窮内潰斬瓖首出降山西通志陜西通志巻一百
