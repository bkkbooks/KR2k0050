body:
  text: 陜西通志巻五建置四唐隋氏改州為郡髙祖受命改郡為州自隋季䘮亂權置州郡倍於開皇大業之間貞觀元年悉令併省始於山河形便分為十道曰闗内道曰山南道開元二十一年又分天下為十五道曰京畿闗内道山南東道山南西道舊唐書地理志凡州郡縣無所更置者皆仍隋舊唐書地理志按通典京畿道領京兆華隂馮翊扶風新平等郡闗内道領延安榆林五原朔方等郡而新舊唐書不分列京畿道仍以闗内道統諸郡今仍之關内道古雍州之境京兆至綏銀等州東距河西抵隴坂南據終南之山北邊沙漠又開元中以近畿之州同華岐蒲為四輔唐六典上都初曰京城天寳元年曰西京至德二載曰中京上元二年復曰西京肅宗元年曰上都唐書地理志天授二年置鴻宜鼎稷等州制云京兆之地一州獨治事多擁滯宜令雍州管内析置五州文苑英華京兆府京兆郡隋京兆郡武德元年改雍州天授元年改京兆郡其年復舊開元元年改雍州為京兆府舊唐書地理志京兆郡領縣二十唐書地理志屬按天祐中仍以奉先𨽻同州唐京兆即隋大興城宋敏求長安志萬年周萬年縣隋改大興武德元年復為萬年乾封元年分置明堂縣理永樂坊長安三年廢天寳七年改為咸寧乾元元年復名萬年元和志長安乾封元年分置乾封縣理懐真坊長安三年廢元和志置按文苑英華作總章元年析二縣無元和志異皇城南大街曰朱雀街東萬年縣領之西長安縣領之舊唐書地理志城内為京縣唐六典咸陽隋廢縣武德二年復分涇陽置初治鮑橋其年移治杜郵舊唐書地理志武徳二年徙白起堡六年又徙便橋西北即今縣宋敏求長安志興平隋始平縣天授二年隸稷州大足元年還雍州景龍四年送金城公主於此因改金城至德二年改興平縣舊唐書地理志景龍四年改金城移治馬嵬故城復還故治改為興平尋復為金城今又為興平括地志雲陽武德元年析置石門縣三年以石門温秀置泉州貞觀元年州廢省温秀更石門曰雲陽雲陽曰池陽八年省雲陽更池陽曰雲陽天授二年以雲陽置鼎州大足元年州廢唐書地理志武德二年移雲陽於縣南十五里治水衝城寰宇記雲陽鎮在涇陽縣北三十里即舊雲陽縣長街鎮在涇陽縣北五十里即故鼎州涇陽縣志涇陽隋縣天授二年𨽻鼎州大足元年還雍州舊唐書地理志三原武德四年移治清父南故任城改為池陽六年又移故所改置華池縣仍分置三原縣屬北泉州貞觀二年廢三原仍改華池為三原縣屬雍州天授元年改𨽻鼎州大足元年隸京兆府舊唐書地理志志按北泉州新唐作泉州清父南雍大記作清水谷渭南武德元年𨽻華州五年還𨽻雍州天授二年析渭南慶山置鴻門縣以渭南慶山等縣置鴻州尋省鴻門大足元年州廢開元二十五年更置唐書地理志天授中於零口置鴻州渭南縣志昭應隋新豐縣治古新豐城北埀拱二年改為慶山縣神龍元年復為新豐天寳二年分新豐萬年置會昌縣七載省新豐縣改會昌為昭應治温泉宫北舊唐書地理志昭應在驪山下慶山在東北臨潼縣志髙陵隋縣天授二年𨽻鴻州大足元年還雍州舊唐志武德元年析置鹿苑縣貞觀元年省唐書地理志鹿臺城在縣南二十五里有果園名鹿苑唐置縣賈志同官屬宜州貞觀十七年改屬雍州天授二年改屬宜州大足元年還屬雍州舊唐書地理志富平隋縣天授二年隸宜州大足元年還𨽻雍州舊唐書地理志開元間徙富平縣於義亭城即舊縣地在今富平東北十里賈志藍田武德二年析置白鹿縣三年更曰寧民又析藍田置玉山縣貞觀三年皆省唐書地理志寧民故城在藍田西南三十二里玉山故城在縣東四十三里今名萬金堡宋敏求長安志鄠京兆郡領鄠縣唐書地理志奉天文明元年析醴泉置乾寧二年以縣治乾州及覃王出鎮又以畿内之好畤武功盩厔醴泉𨽻之唐書地理志奉天縣文明元年以管乾陵分醴泉置天授二年𨽻稷州大足元年還雍州舊唐書地理志唐乾寧二年改置乾州以在長安西北隅故名賈志好畤故上宜武德二年析醴泉置好畤貞觀八年廢上宜入岐陽二十一年省好畤岐陽復置上宜又更上宜曰好畤唐書地理志好畤武德二年置屬雍州三年改隸稷州貞觀元年復屬雍州天授二年改隸稷州大足元年還屬雍州舊唐書地理志唐置好畤縣於漠谷東南今奉天西北六里隋太子莊陵城是宋敏求長安志武功武德三年以武功置稷州又析始平置扶風縣貞觀元年州廢省扶風天授二年復置稷州大足元年州廢唐書地理志武功大足元年屬雍州舊唐書地理志武德三年置稷州因后稷所封為名貞觀元年廢州以縣屬京兆元和志醴泉武德九年析置温秀縣後省醴泉貞觀十年析雲陽咸陽復置唐書地理志天授元年改隸鼎州大足元年還雍州舊唐書地理志醴泉城在縣北十里即古仲橋城貞觀十一年置今為泔北鎮温秀嶺在縣東北四十里武德元年析置温秀縣賈志華原義寧元年以華原置宜君郡武德元年曰宜州貞觀十七年州廢以華原隸雍州垂拱二年更華原曰永安天授二年復置宜州大足元年州廢神龍元年復永安曰華原天祐二年李茂貞墨制以縣置耀州唐書地理志華原在耀州北五里馮志美原舊宜州土門縣貞觀十七年廢咸亨二年又置改為美原縣天授二年又屬宜州大足元年還屬雍州舊唐志天祐二年李茂貞墨制以縣置鼎州唐書地理志富平縣東北六十里有美原故城唐改土門為美原即此耀州志華州華陰郡上輔義寧元年析京兆郡之鄭華陰置垂拱二年曰大州神龍元年復故名上元二年又更名大州寳應元年復故名乾寧四年曰興德府光化三年復為州縣四唐書地理志鄭開皇四年縣移於廢華州城唐武德四年自州城移於州東一里興元元年