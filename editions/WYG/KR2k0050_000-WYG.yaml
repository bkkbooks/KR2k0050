  text: 陜西通志
  hash: sha256:37c7eb068fd2a96eeea20e72be29b93a50d62eb1985e6c05abd103450dd57ecf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0050_WYG_000-1a, image: WYG0551/WYG0551-0001a.png}
body:
  text: 進表吏部尚書署理陜西總督印務併辦軍需事件臣劉於義户部尚書總理陜西巡撫並一切軍需事務臣史貽直陜西巡撫臣碩色等恭承勅㫖纂修陜西通志今已成書共一百巻謹奉表上進者臣於義等誠惶誠恐稽首頓首上言伏以誕敷文命遂成禹貢之篇肇啓姬宗爰有職方之紀故楚之良史能讀八索九邱魯有聞人頗采鄭書周語馬遷網羅百代乃作八書班固囊括羣言初為十志周官外史之掌四方之志乗可稽漢家太史之藏列郡之計書咸在秘府雖有兩京之記而山川風土尚畧而不詳開元即有十道之圖而文物聲明悉闕而不備盖厯代之方輿雜録大都多私撰之書而百家之郡國圖經未盡奉明廷之勅是既無以備累朝之掌故并不足以定一省之章程惟生際夫昌期方躬逢乎盛典欽惟皇帝陛下道冠百王治隆千聖至誠而臨寶祚乾健離明大徳以育羣生巽風兑澤聖教光昭於四表日星雲物嘉祥史不勝書天威震疊乎八埏烏弋黄皮絶域人知嚮化乃頒明詔復沛恩綸謂本朝列聖相承厚澤深仁已淪浹於遐邇而薄海羣黎徧徳風謡物土須簡䇿以編摩爰命廷臣纂大清一統之志因勅大吏脩直省通志之書而臣等忝任秦疆職司監輯伏念雍州天府尤九州之上腴龍首神臯為萬方之綱領歴井捫參之境被服於皇化者百餘年襟梁跨益之墟沐浴於聖恩者十三載山則終南太華胥效其靈水則清渭洪河長流其澤龍興虎視實周秦之故都璇館瑶臺多漢唐之名蹟展也河山之固秦得百二焉誠哉陸海之饒富居什六矣連衢甲第昔稱七相而五公編籍丁黄今號三男而二女數千村烟火士食舊徳而農服先疇十萬井提封荷鍤成雲而决渠降雨莘莘爼豆荷聖人之教育尚有辟雍鐘鼓之風濟濟冠裳䝉天子之生成依然棫樸菁莪之盛涇汭之田上等而任土作貢厥有球琳琅玕汧渭之馬成羣而物産孔多何止竹林檀柘彼都人物不徒以城南韋杜相推列郡官師豈獨以京兆趙張稱最以至家敦仁讓而比屋可封野盡干城而名将多出制度不無沿革凡典禮之大悉凛於王章風尚或有推移雖藝術之微一遵乎天憲此皆皇恩之髙厚實浩蕩於五郡十州所以方志之詳明遂燦著乎宏綱鉅目臣等未能數典罔識闕疑恭承寶訓之煌煌敬以冠諸緗素伏讀聖謨之秩秩跽而授之雕鐫蒐討圖編足以識大而識小校讐亥豕庶乎徵獻而徵文擬之三輔黄圖規模差備律以長安宋志凡例加嚴比及三年每撫寅衷而兢惕釐為百巻謹呈乙夜以覽觀伏願玉燭常調金甌永奠鴻藻經天而緯地御撰日新元符邁五而登三皇圖天煥則東鶼西鰈萬年同軌而同倫北燮南諧九譯來王而來享矣謹按星野一巻建置四巻疆域二巻山川六巻城池公署各一巻關梁封爵各二巻職官四巻貢賦三巻學校一巻祠祀二巻選舉四巻兵防二巻驛傳一巻屯運水利各二巻鹽法茶馬各一巻物産二巻風俗一巻祥異二巻帝系二巻名宦五巻人物十五巻陵墓古蹟經籍各二巻紀事七巻徳音二巻藝文十三巻拾遺三巻刋刻告成臣等曷任瞻天仰聖激切屏營之至謹奉表隨進以聞雍正十三年二月初一日吏部尚書署理陜西總督印務併辦軍需事件臣劉於義經筵講官戸部尚書總理陜西巡撫並一切軍需事務加四級臣史貽直陜西巡撫臣碩色謹上表陜西通志凡例一秦省為歴代都㑹地居上㳺西京之盛莫可殫述比來承流宣化拱衞神京休養生息百年於兹五府十州極豐亨樂利之象通志一書正以鼔吹休明揚扢鴻業也使專尚簡貴則典章制度未免紀載疎略何以昭示不朽兹於上下古今蒐羅考訂分為三十二𩔖列為百巻未敢云取多用𢎞或不至因陋就簡一陜志為秦地紀載之書而於朝廷六典制度靡不殫究吏之職官户之貢賦鹽錢禮之學校祠祀選舉兵之兵防驛逓工之城池闗梁水利皆有闗於政事者也然非符檄考覈巻案徵信不敢濫登庶幾有禆於留心經濟者爾一事闗制度典章為直省通行遵奉者已經詳載大清㑹典非秦志所宜專書如訓飭士子文月吉講讀鄉飲賔興祀典樂章表箋以及律例改定條欵俱不敢載一往古事迹尤為居今所必稽但慮世逺言湮傳聞異同於是廣捜四庫摭拾舊聞務求徵信所有採錄原書每條登注尋覽者因流遡源可以知所自矣古書日就散佚或今本所無而昔賢所引如謝承後漢書晉陽秋之類尚仍故名酈注雖逸者亦稱水經注是也一舊志成於康熙初年前撫臣賈漢復之手賈嘗撫豫再撫秦其所撰兩省通志朝議取為他省程式但國家當奕葉重光之後深仁厚澤浹洽區宇其間政化多隨時隨地以為因革損益在㑹典已經再修今日之執簡而書者何敢從略而馬谿田馮仲好舊志均有可取故補葺較多於刪削焉一分𩔖無義叙次無倫著述家所弗取此志原本史裁折衷諸說離為三十二𩔖首星野言地必本於言天也王者繼天出治度地居民必先分疆畫野故次之以建置建置定而疆域分於是封山濬川築城鑿池治事之廨宇立焉險阨之闗梁設焉皆建置中所有事也立國以治民封建在先郡縣在後故封爵職官次之有土斯有財咸則三壤所以成賦厚生必正徳敬敷五教所以明倫故貢賦學校次之事神以治隂求賢以治陽幽明之别也故祠祀選舉又次之安内以文徳攘外以武功兵防其要也置郵興屯皆武備所當修舉者也故兵防之後次以驛傳屯運屯運以裕盖藏溝洫以備旱潦水利者農政所資也一曰食二曰貨鹽錢茶馬物産皆民生所以利用者也皇極之建必乂以三徳稽疑之用必驗於庶徵俯察五方之風氣仰觀五行之休咎天人之際相為感應者也故受之以風俗又受之以祥異從來人存政舉都此土而主治者帝王蒞此土而佐治者牧伯沐浴教化鍾毓靈秀産於此土之賢皆可傳述者也乃人亡事往抔土依然世逺年湮遺踪宛在故帝系名宦人物之後又受之以陵墓古蹟至於古今名山石室之藏人雖往而言不朽也歴代治亂得失之林事雖逺而功可遡也故受之以經籍又受之以紀事鴻文典冊仁政尤先徳音所以昭本朝之盛藝文所以揚歴代之休也其餘碎金雜俎諸𩔖所不及志者亦俱收並採雖稗野巵言在所不棄故受之以拾遺終焉一分𩔖三十有二多師前人規格其中有附者取其相近如形勝之於疆域有合者取其相因如闗隘與津梁屯田與漕運有併者取其相屬如人物中包忠節孝義流寓釋道方技列女數種盖彼亦人物中人無庸另為區别也如經籍表作述之功紀事垂古今之鍳徳音宣朝廷之徳特為増類以備叅攷一各𩔖之中條件甚多叙次龎雜無由醒目故史志中自漢以下咸析小目如經籍則分經史子集禮儀則分吉凶軍賔嘉是也今名宦人物藝文經籍選舉風俗物産古蹟拾遺各以其所包者析之而仍標目於下以便流覽一各𩔖中有因時起例與通體㣲異者即於本類下注明或有考究異同訂證舛錯闕疑傳疑之處俱於本條下加按字以别於原書之本注一龍門首闢史法創為年表之例縱横指畫事理包舉後有作者靡不效之兹於建置封爵亦倣其例庶幅􅊷廣袤世系相承上下數千載歴歴如在目前一古地理書多為圖經魏書直謂之地形志則可知畫沙聚米非繪事弗明也兹於各𩔖若山川水利古蹟兵防驛逓作圖歸於本𩔖而於建置疆域尤加詳焉盖古來沿革不一不獨郡邑名稱屢更即城郭關河逺近疎密逈不相侔繪圖以補表之所不逮則前代一覽無餘再合以本朝疆域尤瞭如指掌矣一疆域繪圖限於尺幅不能詳備今照皇輿圖首列通省總圖祗載府州縣及名山大川其次作五府十州圖載山川闗驛鎮營道路又次二州七十三縣各作一圖有城池泉渠祠宇橋渡古蹟陵墓鎮店鋪逓分界悉列焉其地形之方員斜銳長短凹凸如其本形離之各成方幅界不踰域合之即成總圖間不容髪雖或山川阻深塗徑迂折而大槩已較然矣一凡山川廨宇闗梁祠廟河渠陵墓古蹟必以今州縣治為凖而首掲其所在之方向里數然後援引故實發明訂正庶幾眉目朗如故雖有近代之書可徑列經史之前不嫌倒置又慮所引之書各代州郡建治不同於今因而方向里數與今逈别故又於建置中作列朝地圖考覽者從此互訂則牴牾適相符合矣一山川等𩔖固當先標其所在之方向里數而有不可以方向里數計者如山則有巔有麓洞峪深入甚逺坡逕聨接則又甚近是里數不可定也川則有曲流有環遶出山或在西南流衍或在東北方向亦不能定也故考之志冊間有不符至於疆域之四至八到廣袤里數更難畫一盖郡邑地形百出方員欹鋭凹凸鈎環加以髙山深谷四面八隅不能咸備而分界之處多在通達之衢未必適當其方位且舊志所載道里有自治起者有自城起者有以隣界止者有以隣治止者参差不齊故不獨里數不侔而方向亦多錯出不知營城邑設官守當以治為凖分壤地辨封疆當以界為止今疆域一𩔖先載治距所𨽻之里數次載四正四隅分界里數若以兩界各至治若干里合算則隣邑至治之里數已寓於中矣嘗見元和志式有至某界正東㣲南㣲北之說甚為得解今所標者雖不能作章亥履勘而或治或界偏左偏右必折衷至確乃敢登載其形有不齊者倣照元和志式庶幾詳備云一職官選舉題名舊志祗詳於明代今蒐輯羣書及金石刻各依官制科分増錄以備稽考其或有創設特遣之官官制所無及無科目可考者槩附一代之末一舊例各類叙次多分府州但如人物一種古書紀載有泛稱秦入者既未便强屬何郡而古今地名沿革不一未必盡如今之分界又方技隱逸釋道諸𩔖中多有異域他省之人更難附屬是以按代編次而同時者則略以地叙云一名宦人物列傳採錄各史原文一字不敢妄増如原文内有地名在前人名居後或世系里居不詳於本傳而别見他傳者俱用小字旁注以别原文一史家之體彰癉並行誌則隱惡揚善亦忠厚之意也然而好惡之公不容偏廢使前愆烱鑒常懸心目未必不收懲創之益故於列傳用歐陽史例别為雜傳以外之而拾遺中更標徵應鑒戒二目以寓儆惕之義焉一秦中自周秦漢唐建國於此凡宫廷事宜俱闗天下之大非專屬畿輔也故自周官周禮下至漢唐朝官不入職官名宦館庠遊學不入流寓禁軍不入兵制至若宫苑遺墟久成古蹟銀潢戚畹分封畿甸又不得泛視為公家言而槩置弗錄也一紀事一𩔖仿照綱目編年大書巡狩㑹盟征伐諸大政以存統御之權餘分閏位莫不包舉然如彼此戰争闗乎疆宇則從其重者專載一朝之下如蜀魏南北朝宋金元若僭據秦土仍以正統為㫁故自秦漢以降凡僭竊之制度如莽之改官不入官制改邑不入沿革苻秦石趙之臣不列題名不入名宦人物之類不書其分統者不用此例一歴代名篇佳什争鳴藝苑美不勝收兹惟取其有闗於斯土之政事文章人心風俗者嚴其程格以定去存至於投贈諛詞並當擯斥或所言止於一鄉一邑者亦自有州縣誌在兹弗槩及一藝文以有闗通省及連數郡邑者始登其他可資各類考訂者則皆節採要語入各𩔖中如遊覽入山川慿弔入古蹟陵墓營建入學校祠祀公署著作入經籍奏議入貢賦鹽錢兵防驛逓盖典制重於翰墨也一古人陳迹稗官紀載極繁凡有闗於人情風土嗜好歌謠可以廣見聞資法戒者固為採風所不廢至於畸行遺言談天說鬼原始要終歴代傳述為兹土之故實亦必博採以助談叢其他侮慢鄙䙝有妨風化者雖係斯土槩不濫登一御製徳音官制錢糓兵屯建置有闗典章者理宜尊崇本朝而以歴代附考於後若祥異紀事人物藝文拾遺諸𩔖則仍以古今世次順叙㣲有不同一省志向例俱分郡邑但有界限劃然必應分者如城池闗梁學校祠祀水利陵墓之類有統屬聫貫必應合者如星野之言天文封爵之論世次職官選舉之題名兵防鹽法之制度紀事徳音祥異之編年帝系之紀傳經籍藝文之分類是也有綴旒於冕宜先合而後分者如建置疆域貢賦屯運以省總冠前而以郡邑額分之有若網繫綱應分𩔖而不分地者如物産人物風俗拾遺之類有一經一緯分合兼用者如山川之名山大川各自繪圖撰考是也各隨其宜不能强同一誌宜詳密而省誌亦宜得體如里甲街市坊表之臚列下僚之題名掾史之額設存留之細數廨舍之間架渠堰之受水人物中鄉曲之善士祠宇中羅列之姓名槩不濫收以侵郡縣志之詳備也一地誌以地為經以代為緯地所不屬則徑闕之如三國之吳六朝之陳與北齊宋時之遼諸類中槩不及之雖其時招集人民僑治他郡而襲故名者封爵建置悉為辨正一興漢二屬地接荆梁前代分𨽻他州郡星野兼入翼軫但所躔之度甚㣲徵應自在全蜀全楚兹不具錄至古刺史郡守治不在境内而屬邑在境内如𢎞農武都者職官題名未敢槩登而於名宦則仍書之盖當日勢分所臨既及其地而惠澤所流亦不可冺固善善欲長之義也一陜甘昔合今分新設府州亦係舊時營堡故於疆域里數賦役額數皆不襲用舊説而以今冊為凖其職官中統轄之大僚如總督駐西安學政駐三原均入陜志提督駐固原入甘志至前代之鹽學藩臬糧驛各道俱駐省城兼治全陜及但有叅政副使等銜而不能强分者悉入陜志一漢有五原九原唐有安北都䕶宋有天徳軍金元有豐雲二州咸入版章明世中衰棄河套地如甌脱延綏遂為邊境我朝聲教誕被屬國降王願為保塞祖宗撫綏荒服仍令駐牧套中今車書一統梯航所至㒺不奉圖入告况近在塞垣之下乎凡套中山川城砦古蹟俱得附榆葭各州縣以𩔖而見云一陜省幅􅊷極廣如𢎞農跨陜豫之郊興元控雍梁之野以至綏葭昔為趙地鳯興向屬武都其間山川人物舊志尚多混淆或因一時失檢分晰未清或因志在誇多獵取傅㑹遂至以訛襲訛遺誤後來今於河南湖廣山西四川甘省分界各州縣山川必究其脈絡人物必詳其世系古蹟必核其時地合者收之不必舊志之所有不合者去之不必舊志之所無也陜西通志職名監修字位過密無法显示臣查郎阿吏部尚書署理陜西總督印務幷辦理軍需事件臣劉於義字位過密無法显示臣史貽直工部左侍郎世襲拖沙喇哈番加四級前署理陜西巡撫印務臣馬爾泰巡撫陜西等處地方贊理軍務都察院右副都御史紀錄一次臣碩色提督陜西學政内閣學士兼禮部侍郎臣王蘭生提調臣楊馝陜西西安等處承宣布政使司布政使加一級又加三級臣程仁圻陜西西安等處提刑按察使司按察使紀錄二次臣何師儉編輯字位過密無法显示臣沈青崖採訪署理陜西西安等處布政使司督理糧儲道臣偉璱陜西布政使司分守潼商道僉事臣張正瑗陜西按察使司分巡榆葭道副使臣王凝陜西按察使司分巡延綏鄜道叅議臣朱一鳯陜西按察使司分巡漢興道副使臣姚培和原任西安府知府臣王紹文西安府知府臣烏靈阿延安府知府臣徐洹瀛鳯翔府知府臣馮慶長漢中府知府臣朱閑聖榆林府知府臣王大士興安州知州臣鮑遐齡商州知州臣王如玖同州知州臣董權文華州知州臣王徳地耀州知州臣朱紹峒乾州知州臣王以觀署邠州知州臣李肖筠鄜州知州臣李如沆署綏徳州知州臣董朝鼎署葭州知州臣程材傳分編西安府咸陽縣知縣臣馮運棟西安府署渭南縣知縣臣梁成武延安府署宜川縣知縣臣劉國泰鳯翔府寶雞縣知縣臣錢界鳯翔府署郿縣知縣臣喬履信漢中府署城固縣知縣臣王邦光興安州署白河縣知縣臣唐效堯同州署蒲城縣知縣臣沈華耀州署同官縣知縣臣楊繹邠州署三水縣知縣臣文魁學習進士臣李之蘭學習進士臣冷崇學習進士臣古灃訂正綏徳州署清澗縣知縣臣王起鵬舉人臣胡淦監生臣申存寅監生臣楊煜曽廩生臣支期分校西安府富平縣教諭臣白塘鳯翔府麟逰縣教諭臣馬國鎮舉人揀選知縣臣李清佐舉人揀選知縣臣崔昭廩生臣劉紹攽廩生臣解含章繕錄舉人臣單潔監生臣張國棟生員臣李允寛生員臣王秦生員臣趙佩琇生員臣王家隲生員臣上官一収掌西安府署照磨所照磨臣張元龍西安府長安縣縣丞臣羅之晉校刋西安府咸寧縣知縣臣陳齊賢西安府署長安縣知縣臣王端繪圖布衣臣張謙欽定四庫全書史部十一陜西通志目錄地理𩔖三都會郡縣之屬巻一星野巻二建置一圖表巻三建置二考巻四建置三考巻五建置四考巻六疆域一圖巻七疆域二考形勝附巻八山川一圖考巻九山川二西安巻十山川三延安鳯翔巻十一山川四漢中榆林巻十二山川五興安商同巻十三山川六華耀乾邠鄜綏葭邊外巻十四城池巻十五公署巻十六闗梁一巻十七闗梁二巻十八封爵一上古至北魏巻十九封爵二北周至明巻二十職官一漢至隋巻二十一職官二唐五代宋巻二十二職官三金元明巻二十三職官四本朝文職武職巻二十四貢賦一本朝民地丁巻二十五貢賦二本朝民地丁更名地丁課程巻二十六貢賦三歴代田賦户役課程經費巻二十七學校巻二十八祠祀一寺觀附巻二十九祠祀二寺觀附巻三十選舉一徵薦諸科進士巻三十一選舉二舉人上巻三十二選舉三舉人下貢生館學生巻三十三選舉四武科将材封䕃掾吏巻三十四兵防一本朝兵制巻三十五兵防二歴代兵制軍儲塞垣邊防巻三十六驛傳巻三十七屯運一本朝屯地屯丁倉庾轉運事例巻三十八屯運二歴代屯田漕運巻三十九水利一圖考巻四十水利二考巻四十一鹽法錢法附巻四十二茶馬巻四十