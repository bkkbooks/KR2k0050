body:
  text: 欽定四庫全書陜西通志巻八十五藝文一御製詔誥羲畫倉書開天載道綺麗餘波筆精墨妙買賦長門金馬待詔昆明紙飛玉尺衡較被之管絃清平新調砭愚訂頑翼經垂斆郁郁彬彬南山隠豹衷諸大雅視為典要作藝文志第三十一祭告西嶽華山文順治八年四月初七日惟神穹窿豫鎮聳峙蓮峯萬品賴成羣生仰盛朕誕膺天命祇荷神休特遣專官用伸殷薦惟神鑒焉祭告西鎮吳山文順治八年四月初七日惟神毓秀五峯建維三輔瞻岐帶渭育物福民朕誕膺天命祇荷神休特遣專官用伸殷薦惟神鑒焉祭告橋陵文順治八年四月初七日自古帝王受天明命繼道統而新治統聖賢代起先後一揆功徳載籍炳若日星明禋大典亟宜肇隆敬遣專官代將牲帛神其鑒享祭周文王陵文順治八年四月初七日自古帝王受天明命繼道統而新治統聖賢代起先後一揆功徳載籍炳如日星朕誕膺天眷紹纉丕基景慕前徽圗追芳躅明禋大典亟宜肇隆敬遣專官代將牲帛爰修殷薦之誠用展儀型之志伏惟格歆尚其鑒享祭吳山文康熈六年八月惟神毓秀五峯建維西隴瞻岐帶渭育物福民朕躬親政務祇荷神庥特遣專官用申殷薦惟神鑒焉祭漢文帝陵文康熈七年五月俱凡在陜諸陵祭文同自古歴代帝王繼天立極功徳並隆治統道統昭垂奕世朕受天眷命紹纉丕基庶政方新前徽是景明禋大典亟宜肇修敬遣專官代將牲帛爰昭殷薦之忱聿備欽崇之禮伏惟格歆尚其鑒享祭告吳山文康熈二十一年三月惟神凝位金天建維隴首屏翰西土配嶽稱尊朕祇承神祐疆域蕩平特遣專官用申殷薦惟神鑒焉祭漢文帝陵文康熈二十一年四月在陜諸陵祭文同自古帝王受天顯命繼道統而新治統聖賢代起先後一揆成功盛徳炳如日星朕誕膺眷祐臨制萬方掃滅兇殘廓清區宇告功古后殷禮肇稱敬遣專官代將牲帛爰修禋祀之誠用展景行之志仰企明靈尚其鑒享祭告吳山文康熈二十七年十二月惟神秀峙五峯雄標三輔襟􅊈帶隴配岳西陲朕纉承祖宗丕基䖍恭明祀茲以皇祖妣孝莊仁宣誠憲恭懿翊天啓聖文皇后神主升祔太廟禮成特遣專官用申秩祭惟神鑒焉祭告橋陵文康熙二十七年十二月同周文武及漢唐諸陵文自古帝王受天明命御厯膺圖時代雖殊而繼治同道後先一揆朕承眷佑臨制萬方稽古禮文肅修祀事茲以皇祖妣孝荘仁宣誠憲恭懿翊天啓聖文皇后神主升祔太廟禮成特遣專官代將牲帛䖍修禋祀之典用抒景行之忱仰冀明靈鑒茲誠悃祭漢文帝陵文康熙三十五年正月在陜諸陵文同自古帝王繼天出治道法兼隆莫不慈惠嘉師覃恩遐邇朕勤恤民依永期殷阜邇年以來郡縣水旱間告年穀歉登蚤夜孜孜深切軫念用是專官秩祀為民祈福冀靈爽之黙贊溥樂利於羣生尚鑒精忱俯垂歆格祭告吳山文康熙三十六年八月惟神秀峙五峯位尊二隴名稱喬嶽地鎮金天朕以勦除狡㓂三履遐荒期掃邉塵乂安中外今者祇承神祐塞北永清用告成功專官秩祀惟神鑒焉祭告漢文帝陵文康熙三十六年八月在陜諸陵文同自古帝王受天景命制治綏猷必禁暴除殘以乂安黎庶緬懐往烈道實同符朕欽承帝祉臨御九圍茲以狡㓂跳梁親征漠北蕩滌㓂氛廓清邉徼永消兵革以與普天率土樂育太和敬遣專官代將牲帛昭告古先哲后䖍修禋祀式彰安攘之模用展景行之志仰企明靈俯垂鑒饗祭吳山文康熙四十二年四月惟神位奠金天功齊華嶽威靈丕赫作鎮西方朕祇承休命統馭寰區夙夜勤勞殫思上理歴茲四十餘載今者適届五旬海宇昇平民生樂業見輿情之愛戴沛下土之恩膏特遣專官䖍申秩祀尚憑靈貺益錫蕃禧祐我國家共登仁夀神其鑒焉祭橋陵文康熙四十二年五月同周文武漢唐諸陵文俱自古帝王繼天立極出震承乾莫不道洽寰區仁週遐邇朕欽承丕緒撫馭兆民思致時雍常殷惕厲歴茲四十餘載今嵗適届五旬宵旰兢兢無敢暇逸漸致民生康阜世運昇平頃因黄淮告成親行廵歴再授方畧善後是期覩民志之歡欣滋朕心之軫恤遄回鑾馭大沛恩膏用遣專官敬修祀典冀黙贊郅隆之治益𢎞仁夀之休尚鑒精忱俯垂昭格西廵祭告周文王陵文康熙四十二年十一月在陜諸陵文同朕勤求上理撫育羣生廵行雖歴東南咨訪未經西土茲因觀風閱武察吏安民不憚氷霜涖止秦省稽前代之陵寝皆宻邇於長安惟帝徳在生民功存當代芳型昭著令譽長垂披覽簡編恒深緬想遣專官而展祭列爼豆以將誠靈其鑑知來歆來格平定朔漠告成太學碑康熙四十三年三月二十一日維天盡所覆海内外日月所出入之區悉以畀予一人自踐阼迄今蚤夜殫思休養生息冀臻熙皥以克副維皇大徳好生之意庶幾疆域無事得以偃兵息民廼厄魯特噶爾丹阻險北陲困此一方人既荼毒塞外輒狡焉肆其凶逆犯我邉鄙虐我臣服人用弗寧夫蕩㓂所以息民攘外所以安内邉冦不除則吾民不安此神人所共憤天討所必加豈憚一人之勞弗貽天下之逸於是斷自朕心躬臨朔漠欲使悔而革心故每許以不殺彼怙終不悛我師三出絶塞朕皆親御以行深入不毛屢渉寒暑勞苦艱難與偏裨士卒共之迨彼狂授首脅從歸誠荒外君長來享闕下西北萬里灌燧銷烽中外乂謐惟朕不得已用兵以安民既告厥成事廼蠲釋眚災潔事禋望為億兆祈昇平之福而廷臣請紀功太學垂示來茲朕勞心於邦本嘗欲以文徳化成天下顧茲武畧廷臣僉謂所以建威消萌宜昭斯績於有永也朕不獲辭考之禮王制有曰天子將出征受成於學出征執有罪反釋奠於學以訊馘告而泮宫之詩亦曰矯矯虎臣在泮獻馘又禮王師大獻則奏愷樂大司樂掌其事則是古者文事武事為一折衝之用具在樽爼之間故受成獻馘一歸於學此文武之盛制也朕嚮意於三代故斯舉也出則告於神祇歸而遣祀闕里茲允廷臣之請猶禮先師以告克之遺意而於六經之指為相符合也爰取思樂泮水之義為詩以銘之以見取亂侮亡之師在朕有不得已而用之之實或者不戾於古帝王伐罪安民之意云爾銘曰巍巍先聖萬世之師敬信愛人治平所基煌煌聖言文武道一禮樂征代自天子出朕臨域中逾茲三紀嘗見羮墻寤寐永矢下念民瘼上承帝謂四海無外盡𨽻侯尉維彼兇醜凟亂典常既梗聲教遂窺我疆譬之於農患在螟螣秉畀不施將害稼穡度彼游魂險逺是怙震以徳威可往而取朕志先定龜筮其依屬車萬乘建以龍旂祝融􅆖鸞風伯戒途宜暘而暘利我樵蘇大野水涸川瀆効靈泉忽自涌其甘如􅌬設為犄角一出其西一出其東中自將之絶域無人獸羣受掩五日窮追彼狂走險大殱於路波血其孥翦其黨孽俘彼卒徒衆烏晝號單馬宵遁恐乆駐師重為民困慎固戌守還轅於京自夏徂冬雨雪其零載馳載驅我行止在蠢茲窮㓂昏惑不悔我邉我氓以休以助爰寧其居爰復其賦藩落老稚斯恬斯嬉嵗晏來歸春與之期春風飄翩揚我斾旓我今于邁如渉我郊言秣我馬狼居胥山登髙以眺閔彼彈丸天降兇罰孤雛就羈三駕三㨗封狼輿尸既腊梟獍既獮􅉘貙大漠西北解甲棄殳振旅凱入澤霈郊卜明禋肆赦用迓景福昔我往矣在泮飲酒陳師鞠旅誓屈羣醜今我來思在泮獻功有赫頌聲文軌來同採芹採藻頌興東魯車攻馬同亦鐫石鼓師在安民非出得已古人有作昭示此㫖緬維虞廷誕敷文徳聖如先師戰慎必克惟兵宜戢惟徳乃綏億萬斯年視此銘詞重修西嶽廟碑文康熙四十四年六月天地定位山嶽效靈體發育之能贊生成之徳尊踰四瀆秩視三公祀典之於五嶽禮綦重矣矧華山峻峙雍州雄踞西土辨方維酉兆嵗事於有秋盛徳在金助氣機之始肅興雨則膏流河渭出雲而氣接恒嵩尤宇宙之奥區神祇之靈府也嶽廟當華隂衢道基址崇宏棟梁巍煥明禋肸蠁降格居歆國家之邀福迓禧以大庇我陜東西數千里之蒼黔者於是乎在而年嵗寖乆則傾圮澷漶不能無虞朕於癸未冬省方西廵莅止少華之麓矚雲臺望仙掌靈蹤勝蹟髣髴於烟嵐翠靄間而西連隴坂東接函關土俗民風停車坐悉秋露凝而勤收穫商飈起而謹盖藏年穀屢豐閭閻日阜自非神庥曷克臻此於是入祠展謁遣祭致䖍特命所司鳩工載葺不興一役輪奐丕新蓐收之别館増輝少昊之下都彌絢自今以始達精忱於玉帛陳黍稷之馨香黙祐潛孚嘉祥翕集佐坤靈以作成萬物𢎞兑澤而利濟羣方豈有量哉爰勒豐碑用垂奕䙫廣仁寺碑康熙四十四年十一月初一日朕存心天下睠顧西陲惟茲關隴之區實切封疆之重嵗當癸未特舉時廵省方設教訓吏寧人已責除租行慶布徳引年賜帛奨學興賢所過山川聖哲祠域遣修祀事用殫精禋凡所以裨邦政厚民生者靡弗致勤焉又以運際承平無忘武備簡稽將士整飭戎行發内帑之金錢普軍中之頒給爰於演武之塲躬親校閱之典以建威銷萌之義有觀徳習禮之風顧念乆安長治務在因俗宜民若乾竺之傳言雖殊尚而利濟之道指有同歸閱武之頃周覽地形相其爽塏命創招提即大賚之餘貲為䨇林之小築厥工匪侈逾載告竣斯役也經營適協乎輿情銖黍不煩夫民力將使黄山巖岫秀比靈山渭水波濤凝如定水洪河浪息渡法海之津梁華嶽雲開通耆闍之轍跡五陵六郡之衆迴向香城外蕃屬國而遥羣遊净土賁神光之常䕶上以祝慈夀於無涯助王化之遐宣下以錫民庥於有永其亦朕綏懐寰宇順導烝黎之至意也歟於是題廣仁之額標括三乘書多寳之碑昭垂奕葉云爾祭告吳山文康熙五十二年五月惟神秀秉金天功齊華嶽靈威有赫作鎮西方朕纘受鴻圖撫臨區宇殫思上理夙夜勤求惟日孜孜不遑暇逸茲御極五十餘年適當六旬初屇所幸四方寧謐百姓乂和稼穡嵗登風雨時若維庶徴之協應爰羣祀之䖍修特遣專官式循舊典冀益贊雍熈之運尚永貽仁夀之休俯鑒精誠用垂歆格祭漢文帝陵文康熈五十二年六月在陜諸陵文同自古帝王繼天出治建極綏猷莫不澤被生民仁周寰宇朕躬膺寳厯仰紹前徽夙夜孜孜不遑暇逸茲御極五十餘年適當六旬初屇所幸四方寧謐百姓乂和稼穡嵗登風雨時若維庶徴之協應爰羣祀之䖍修特遣專官式循舊典冀益贊雍熈之運尚永貽仁夀之休俯鑒精誠用垂歆格祭告吳山文康熈五十八年三月維神三輔稱雄五峯競秀儲精少昊作鎮奥區朕纘承祖宗丕基䖍恭明祀茲以皇妣孝惠仁憲端懿純徳順天翼聖章皇后神主升祔太廟禮成特遣專員用申秩祭惟神鑒焉祭漢文帝陵文康熈五十八年三月在陜諸陵文同自古帝王受天景命建極綏猷垂萬世之經常備一朝之典禮朕欽承帝祉臨御九圍夙夜惟寅敬将祀典茲以皇妣孝惠仁憲端懿純徳順天翼聖章皇后神主升祔太廟禮成特遣專官代將牲帛用展苾芬之敬聿昭禋祀之䖍仰冀明靈尚其歆享祭告吳山文雍正元年二月惟神秀秉金天功齊華嶽靈威有赫作鎮西方朕纉受丕基新承景命竊念皇考膺圖以來百靈效順四海從風坐享昇平六十餘載茲當嗣位之始宜隆祀享之儀特遣專官䖍申昭告惟冀時和嵗稔物阜民安淳風徧洽乎寰區厚徳長敷於率土尚其歆格鑒此精誠祭漢文帝陵文雍正元年二月同在陜諸陵祭文自古帝王繼天出治建極綏猷莫不澤被生民仁周海宇惟我皇考峻徳鴻勲嫓美前古顯謨承烈垂裕後昆朕以𣺌躬纉膺大寳當茲嗣位之始宜修享祀之儀特遣專官䖍申昭告惟冀時和嵗稔物阜民安淳風徧洽乎寰區厚徳常敷於率土尚其歆格鑒此精誠祭橋陵文雍正二年正月俱周文武成康漢唐陵同自古帝王體天立極表正萬邦愷澤遍於寰區仁風及於奕禩朕丕承大統遥契曩徽茲於雍正元年十一月二十五日恭奉聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信功徳大成仁皇帝主配享圜丘禮成特遣專官䖍申昭告惟冀永贊修和之治益昭安阜之庥鑒此精誠尚其歆格平定青海告成太學碑雍正三年五月十七日我國家受天眷命撫臨八極日月所照罔不臣順遐邇乂安兆人䝉福乃有羅卜蔵丹津者其先世固始汗自國初稽首歸命當時使臣建議畀以駐牧之地其居雜番羌宻近甘凉我皇考聖祖仁皇帝眷慮深逺每厪於懐既親御六師平定朔漠威靈所加青海部落扎什巴圖兒等震讋承命聖祖仁皇帝用沛殊恩封為親王兄弟八人咸賜爵禄羈縻包容示以寛大而狼心梟性不可以徳義化包藏異志朕紹登寳位優之錫賚榮其封號尚冀革心輯寧部衆而羅卜藏丹津昏謬狂悖同黨吹拉克諾木齊阿爾布坦温布藏巴札布等實為元惡謂國家方𢎞浩蕩之恩不設嚴宻之備誕敢首造逆謀廹脅番羌侵犯邉城反狀彰露用不可釋於天誅遂命川陜總督太保公年羮尭為撫逺大将軍聲罪致討以雍正元年十月師始出塞自冬渉春屢破其衆凡同叛之部落戈鋋所指應時摧敗招降數十萬衆又降其貝勒子公台吉等二十餘人朕猶憫其蠢愚若悔惡思愆束手來歸尚可全宥而怙惡不悛負險抗違乃决翦滅之計以方畧宻付大将軍羮尭調度軍謀簡稽将士用四川提督岳鐘琪為奮威將軍於仲春初旬禡牙徂征分道深入搗其窟穴電掃風驅捜剔巖阻賊徒蒼黄糜潰窮蹙失據羅卜藏丹津之母及逆謀渠魁悉就俘執擒獲賊衆累萬牲畜軍械不可數計賊首逃遁我師踰險窮追獲其輜重人口殆盡羅卜藏丹津孑身易服竄匿荒山殘喘待斃自二月八日至二十有二日僅旬有五日軍士無乆役之勞内地無轉輸之費克奏膚功永清西徼三月之朔奏凱旋旅鐃皷喧轟士衆訢喜四月十有二日以倡逆之吹拉克諾木齊等三人獻俘廟社受俘之日臣民稱慶伏念聖祖仁皇帝威靈震於遐方福慶流於奕葉用克張皇六師殄滅狂賊行間将士亦由感激湛恩厚澤為朕踴躍用命斯役也芟夷凶悖綏靖番羌俾烽燧永息中外人民胥享安阜實成先志以懋有丕績廷臣上言稽古典禮出征而受成於學所以定兵謀也獻馘而釋奠於學所以告凱㨗也宜刋諸珉石掲於太學用昭示於無極遂為之銘曰天有雷霆聖作弧矢輔仁而行威逺寧邇維此青海種類實繁錫之茅土列在藩垣被我寵光位崇禄厚負其險阻禍心潛搆恭惟聖祖慮逺智周睠念荒服綏撫懐柔朔野既清西陲攸震爵號洊加示之恩信如何兇狡造謀逆天皷動昏憝冦侵於邉惟彼有罪自干天罰桓桓虎貔爰張九伐王師即路冬雪初零日耀組練雷響鼙鉦蠢茲不順敢逆戎旅奮張螳臂以當齊斧止如山嶽疾如雨風我戰則克賊壘其空彼昏終迷曽不悔戾當翦而滅斯焉决計厲兵簡将往搗其巢踰歴嶔嶇坦若坰郊賊棄其家我縶而獲牛馬谷量器仗山積蹇兔失窟何所逋逃枯魚遊釜假息煎熬師以順動神明所福旬日凱歸不疾而速殪彼逆謀懸首藁街獻俘成禮金皷調諧西域所瞻此惟雄特天討既申羣酋惕息槖戈偃革告成辟雍聲教遐暨萬國來同惟我聖祖親平大漠巍功煥文邁桓軼酌流光悠乆視此銘辭繼志述事念茲在茲黄河并序河源發於塞外流經萬里餘始由中土入海曩曽遣使探流窮源河之為利為害莫不洞悉近以巡省邉隅駐蹕湖灘河朔一水瀠洄自西北來流不甚濁而波緩岸隘而土堅白草蕭蕭黄沙彌望其中環抱約地千二百餘里草豐水美便於畜牧明𢎞治間淪於外夷地逼秦境時相寇擾故諸臣每言不宜棄此衆議紛然人多不察恒惜其言之未用然使當日即用其言加兵塞外揆理度勢豈遂能驅而逺之亦必徒勞士馬耳朕嘗以收復河套之論謂其心忠於國則可謂其灼見事機言之可行則未然也國家威徳所布龍荒大漠與河套盡入版圗諸䝉古嵗修賮貢奉職惟謹非務徳意綏柔詎兵力之所可制耶故臨流増思詩示永乆洪流逺且長迢遥踰塞垣旋繞幾曲折沙雜波濤渾漸下漸開拓建瓴勢迅奔所經雖綿邈脈絡自有根東南藉輓輸䟽瀹煩討論昔嵗省隄防淮濟親臨軒今茲歴大荒羽衛成雲屯峻嶒兩岸間天寒落漲痕氷澌斷更續皛皛耀朝暾此中地沃饒水草佳且繁昔人議收復斯舉誠難言觀俗撫幽遐老㓜争攀援殊方亦蒼赤咸施沭浴恩期令歸化意來者如河源晝夜入滄海包括彌乾坤十一月三日泛舟黄河流凌始下舟行之頃河水瑩潔波浪忽平黄濤何洶洶寒至始流凌解䌫風猶𦂳移舟浪不興威行宜氣肅恩布覺陽升化理應多洽囂氛頃刻澄脱脱城土墉四面築何堅地壓長河尚屹然國計思清荒服外早將糧粟實窮邉氷渡并序時河氷未合師行之頃忽報可渡次早行如平地雲深卓萬騎風勁響千旗半夜河氷合安然過六師鄂爾多斯行圍雉兔甚多地敞沙平河外天合圍雉兔日盈千籌邉正欲勞筋骨時控雕胡左右弦曉寒念將士長河凍結朔風攅帶甲横戈未即安每見霜華侵曉月最憐將士不勝寒河套西望往代存虚議今為我外藩河環沙磧暖境濶草灘繁錯落延綏接迷離朔漠吞時巡曽不到特示撫柔恩出塞沿邉山行岡嶺崎嶇黄沙彌望因自榆林鎮取道塞外沙淺途平水草咸便且十二日之程減半得達安邉堡書以記之森森萬騎歴駝城榆林鎮一名駝城沙塞風清磧路平冰泮長河堪飲馬月來大野照移營郵籖紀地旬餘驛羽轡行邉六日程天下一家無内外烽銷堠罷不論兵渡黄河潼關駐蹕星源來晉甸天險峙秦關波湧方舟速威明古戍閒萬民瞻鳯輦百職集鵷班冬省經茲地移風先化頑入陜西境世逺山河在漢唐史有存風光移萬户景物換千門歎昔當殷鑑疇今廣湛恩從來秦隴地莫使競心繁望華山一月風霜塵土中忽看翠盖擁三峯漢廷金掌今應笑惟有華巔並古松渭河見終南山渭水自縈紆秦川喜清曠山勢何岧嶤經過絶塵坱馬首見層巒直挿青霄上雲際有飛泉朝光明畫嶂石險登臨難心寒不可量太乙本仙源天都聊騁望嵗嵗松柏林遐睇心神暢問俗戒征途便欲慰幽訪冬至抵西安遥祝皇太后萬夀葭管初囬日景長西巡行幸抵披香願將唐句南山夀遥捧蓬萊萬里觴長安行河山天險古金湯都邑規模溯漢唐陸海膏腴本沃壤秦風慓悍稱巖疆每因睠念勞中夜忍使時巡後一方逺幸衝寒訪民隠終南太華遥相望豳岐不乏耕織業漆沮尚存蒐狩塲重農藏富屢詔諭雨暘時若歌豐穰雄兵超距賈餘勇野老謳吟多宿糧要令遐陬沾湛露詎以無事弛邉防大閱三軍訓甲士來朝諸部趨蕃王蠲租恤下恩未巳共躋仁夀樂且康渭水氷消囬暖律南山烟靄動初陽停鑾懐古還披巻宵旰勤求意不忘西安偶作八水源秦隴山河輔帝京此方文武職須教盡和平回鑾至華隂欲登華山因風霧所阻踟蹰風霧阻蓮峰未識雲臺止水溶秦地山川聊一望方輿􅅵畝盡三農兵民擁道心隨仗文武攀轅淚滿容涼徳何能衢壤樂皆因嵗乆慶時雍大閱賜陜西固原鎮西鳯協副將臣康㤗南苑風髙水潦收旋催羽對肅貔貅九天鼓吹鳴金鐲萬乘旌旄擁翠虬馬足過時殘雪盡巒峰逥處朔雲浮宣威端在承平日自昔經邦有大猷擊匈奴詔文帝三年漢書漢與匈奴約為昆弟無侵害邉境所以諭遺匈奴甚厚今右賢王離其國將衆居河南地非常故往來入塞捕殺吏卒敺侵上郡保塞蠻夷令不得居其故陵轢邉吏入盗甚驁無道非約也其發邉吏車騎八萬詣髙奴遣丞相灌嬰將擊右賢王徙請作昌陵大匠詔成帝永始二年同前前將作大匠萬年知昌陵卑下不可為萬嵗居奏請營作建置郭邑妄為巧詐積土増髙多賦斂繇役興卒暴之作卒徒䝉辜死者連屬百姓罷極天下匱竭常侍閎前為大司農中丞數奏昌陵不可成侍中衛尉長數白宜早止徙家反故處朕以長言下閎章公卿議者皆合長計首建至䇿閎典主省大費民以康寧閎前賜爵關内侯黄金百觔其賜長爵關内侯食邑千户閎五百户萬年佞邪不忠毒流衆庶海内怨望至今不息雖䝉赦令不宜居京師其徙萬年敦煌郡下關中諸將璽書光武後漢書制詔大司馬虎牙建威漢中捕虜武威將軍虜兵猥下三輔驚恐栒邑危亡在於旦夕北地營保按兵觀望今偏城獲全敵兵挫折使耿定之屬復念君臣之義征西功若丘山猶自以為不足孟之反奔而殿亦何異哉今遣大中大夫賜征西吏士死傷者醫藥棺殮大司馬以下親弔死問疾以崇謙讓追賜朱勃子穀詔明帝同前告平陵令丞縣人故雲陽令朱勃建武中以伏波將軍爵土不傳上書陳状不顧罪戾懐旌善之心有烈士之風詩云無言不讐無徳不報其以縣見穀二千斛賜勃子若孫勿令詣闕逺謝追祠太尉楊震詔順帝同前故太尉震正直是與俾匡時政而青蠅㸃素同茲在藩上天降威災眚屢作爾卜爾筮惟震之故朕之不徳用彰厥咎山崩棟折我其危哉今使太守丞以中牢具祠魂而有靈儻其歆享賜郭淮詔魏嘉平二年三國魏志昔漢川之役幾至傾覆淮臨危濟難功書王府在關右三十餘年外征㓂虜内綏民夷比嵗以來摧破廖化禽虜句安功績顯著朕甚嘉之今以淮為車騎將軍儀同三司持節都督如故賜夏侯道遷詔北魏世宗魏書將軍前識機運已投誠欵而中逢猜間致有播越復翻然風返建茲殊效忠貫古烈義動遐邇漢鄭既開勢翦庸蜀混同之畧方自斯始擒凶掃惡何快如之想餘黨悉平西南清盪經算淹朔當有劬勞所請軍宜别勅又賜道遷璽書同前卿忠義夙挺期委自昔中有事因以致乖舛知能乘機豹變翻然改圗奨率同心萬里投順逺舉漢中為開蜀之始洪規茂畧深有嘉焉今授卿持節散騎常侍平南將軍豫州刺史豐縣開國侯食邑一千户并同義諸人尋有别授王師數道絡繹電邁遣使持節散騎常侍都督征梁漢諸軍事鎮西将軍尚書邢巒指授節度卿其善建殊效稱朕意焉勞同州刺史達奚武璽書北周髙祖北周書公年尊徳重弼諧朕躬比以隂陽僭序時雨不降命公求祈止言廟所不謂公不憚危險遂乃逺陟髙峯但神道聰明無幽不燭感公至誠甘澤斯應聞之嘉賞無忘於懐今賜公雜綵百疋公其善思嘉猷匡朕不逮念坐而論道之義勿復更煩筋力也移都城於龍首山詔隋文帝隋書朕祇奉上元君臨萬國屬生人之敝處前代之宫常以為作之者勞居之者逸改創之事心未遑也而王公大臣陳謀獻䇿咸云羲農以降至於姬劉有當代而屢遷無革命而不徙曹馬之後時見因循乃末代之晏安非往聖之宏義此城從漢以來彫殘日乆屢為戰塲舊經喪亂今之宫室事近權宜又非謀筮從龜占星揆日不足建皇王之邑合大衆所聚論變通之數稽幽顯之符同心固請情詞深切然則京師百官之府四海歸向非朕一人之所獨有茍利於物其可違乎且殷之五遷恐人盡死是則以吉凶之土制長短之命謀新去故如農望秋雖暫劬勞其究安宅今區宇寧一隂陽順序安安以遷勿懐胥怨龍首山川原秀麗卉物滋阜卜食相土宜建都邑定鼎之基永固無窮之業在斯公私府宅規模逺近營搆資費隨事條奏褒長安令李朝隠制唐睿宗册府元龜夫不吐剛而謟上不茹柔而黷下者君子之事也踐霤必繩登車無屈者正人之務也中大夫行長安縣令李朝隠見義不回強直自遂亟聞佳勝累著能名近者品官入宦有干儀式遂能責之以禮繩之以􅄽但宧豎之流多有憑恃柔寛之代必弄威權每觀載籍嘗為嘆息朕規戒前古勤求典憲能副朕意實在斯人虞延持皇后之客梅陶鞭太子之傅古稱遺直復見於今思欲旌其美行遷以重職為時當閱户政在養人宜加一階用表剛烈褒魏知古諫獵渭川手詔先天元年冬舊唐書朕頃向温泉觀省風俗時因暇景掩渭而畋方開一面之羅式展三驅之禮躬親校獵聊以前禽豈意卿有箴規輔予不逮今賜物五十段用申勸奬幸新豐及同州敕蘇頲勅虞之四朝且編區㝢漢之三輔本同京師善於古者考於今發乎邇者應乎逺若順豫之事缺則紊於王制巡遊之典備則慮於人勞朕受命膺期勵精設教幸乾坤幽贊風雨咸若百物既阜三農已登同穎薦於宗廟穭穗生於郡國我無大桀實欣於嵗取人有小康未果於時邁但左翊之地近入黄圖新豐之邑甫鄰青綺山川宫館咫尺相望欲過灞亭而渉經沙阜而臨渭見彼耆耋問其疾苦察長吏之政恤黎甿之寃盖所以展義陳詩觀風問俗始自畿甸化於天下宜以今月二十五日幸長春宫停五日縁頓所須並令所司支備一事以上不得干擾州縣發日唯量將飛騎萬騎行更不須别遣兵馬及妄有科喚朕此行之處不得進奉在路有稱寃苦州縣不能䟽决者委御史金吾收状為進各勉所職副朕意焉幸長安制前人門下觀俗省方所以愛人治國尊崇廟貌所以事神享親欽若㫺典此言大哉朕祗膺鴻業積念咸秦去嵗欲幸洛京已發成命旋屬重營太廟因將中止誠以其繩則扳功且未即展鈴效駕信弗可違終肆覲於東方恒載馳於西土流晷不駐通喪永畢象居始成如在増慕朕之前志日夕匪遑故可以詩陳肅雝禮極禋祀神明之奥時惟雍州稼穡有年莫若關輔王假用吉后來其蘇實獲我心俾從人欲可以今年十月取北路幸長安所司凖式路在節省無得勞費主者施行幸西京制張九齡勑朕所時邁皆順物情頃屬關輔無年遽爾東幸固非為已將以息人今百穀既成庶務皆省而五陵所奉誠在京師安可更留周南有闕時薦宜以來年正月七日取南路幸西京所司凖式應行幸所須務從節減所申明為條例勿使勞煩授宋璟兼京兆尹制蘇頲勅惟雍設都實難其理尹京鎮俗不易其才御史大夫上柱國廣平郡開國公宋璟天假直清時歸方正端莊以立奸慝遷於望風果斷而行綱維成於不日衣冠所重人吏攸欽俾承彈糾之餘乃綜浩穰之劇可兼京兆尹餘如故授蕭璿京兆尹制同前黄門九牧之重列為州伯四方之則求於京兆或匪其才莫膺茲任左散騎常侍上柱國東郡留守蕭璿體峻而整氣剛而直慎必兼清文能飾吏慈惠可以應務嚴明可以訓人故當權豪革心貴戚斂手三王迭拜况其甫嗣家聲二鮑相承未若累光朝奨休命斯允僉言所屬可京兆尹勲如故授賈至京兆尹制常衮門下方外甫定惟新制度必於根本源流正之以丕式於十有三牧縣内之御萬邦所瞻將自中刑外致一其政化若獨任辦吏何以模楷故前代尹京多用經術之士翟方進雋不疑皆首叅此選稱於轂下今亦因其制而進用也正議大夫行尚書兵部侍郎信都縣開國男賜紫金魚袋賈至髙文典册合於韶雅五經大義㑹於宗極識畧精技輔之以仁全節致命形於危難歴階要重澹然虚懐宗伯以和神人夏官以糾邦國乆於叅貳多所發揮省理持綱亦既詳審朝有大議訪求所得於公卿大夫之間舉漢魏名臣之奏不失其政有補於時加以經務大才堪任煩劇艱虞一紀曠廢百度有司失職京邑尤甚頻有賑救差可條緝今京府九卿率由舊典大變風俗以明朝綱統尹之重益難其任仗賢立政叅領南臺懋乃休績慎乃出令以懲強猾以惠困窮舉能其官則理稱匪其人則敗端本靖末爾其誡之可守京兆尹兼御史大夫散官勲封賜如故授辛徳謙丹延團練使制同前勅上郡北地義渠故國臨制戎狄屏於關中當此襟要難於鎮守前朔方留後左廂兵馬使同節度副使開府儀同三司試太常卿兼御史中丞單于副都䕶充振武軍使上柱國辛徳謙山西出将代有勲業長才偉畧主之以忠峻節用斷服之以禮頃者職貳留府朔垂分鎮横絶大漠堅守孤城能詳武經載討軍實推以恩信濟其威懐士卒知方羌夷服化休有茂績著於北邉用觀勞臣俾膺重任委以藩事捍茲戎疆列在儲寀之右叅於憲臺之長中外兼榮服我嘉命可試太子詹事兼御史大夫持節都督延州諸軍事兼延州刺史充丹延兩州都團練使守捉使散官勲封如故授韋覃萬年縣令徐演長安縣令制同前勅朝議郎行尚書工部員外郎賜緋魚袋韋覃朝奉郎行尚書倉部員外郎上柱國賜緋魚袋徐演等器行純備文以彰之尤通政體必本經術直道以進當官而行執憲字人早揚厥職自叅俊茂之選各舉彌綸之要遵我風化始於京兆素稱雄劇今則倉廩空虛戎車未寧兵食屢調嵗有倍征之重用過經費之數公私抗蔽人户離逷雖難理之任又屬艱虞而制事之宜亦有工拙苟或貞介純白端誠奉公恭敬以仁明察以斷不虐鰥寡不阿貴強以茲撫馭庶有蘇息擇才而授政豈逺哉俾爾化神皋之俗分司𨽻之路考其能否當有遷黜勉思誡勅以副憂勤覃可守萬年縣令演可守長安縣令散官勲賜俱如故備朔方詔大厯九年册府自古聖帝明王之臨御也莫不法乾坤之覆載體山川之受納立徳於太上還淳於至道清净無事保合太和濟於羣生洽於四海豈垂意兵革勞心戰争也盖有徳化之所不綏招懐之所未諭不式王命毒流生人故有除暴禁淫之師安人止戈之武則神農黄帝尭舜禹湯之所不免也朕君臨萬邦十有三載薄徳内愧中夜再興至如易簡寛仁恭黙元淡素懐所慕終食豈忘然自承統已來屬當多難伊川有盜國之孽朔野有叛君之將江湖海島伏戎數輩其在右武安能解嚴所以請於宗廟親授經畧誅詰姦宄摧殄暴強三年之間方内底定此皆皇天佑我烈祖羣后戴予一人是用集大勲於國家保萬姓於區夏豈朕寡薄能及此邪每思偃兵姑務柔逺將息馬以論道期舞干而修徳而西戎負約間嵗犯邉朕嘗棄細過庶𢎞大體疆臣兵吏亟請長驅屢有誡勅不令掩襲兼約遊騎不許擒生即或誤執亦使還遣固以亭育之義豈限窮荒撫綏之恩寧殊逺邇故布文告以訓之敘舅甥以睦之彼亦嘗遣聘臣來修舊好玉帛之禮以至於上國熢燧之候已及於近郊長其無厭昧於事大去冬踰我關隴入我郇邠驅人之馬牛掠人之士女朕許其通好本在人安乘此不虞飜貽我詐每一興念悼於厥心豈朕不叶於親鄰有負於恩信猶期懲艾未忍討除今大閱甲兵以増扞禦且𢎞不戰之道用舉備邉之常所以然者念其載勤欵疏求繼嘉姻事或由衷義從割愛因之寧逺豈復顧私當罷四方之師永全二國之好倘更侵冒必示威刑宜令子儀以上郡北地四塞五原義渠稽胡鮮卑諸部馬歩五萬衆嚴㑹栒邑克壯舊軍抱玉以晉之髙都韓之上黨河湟義從汧隴少年凡三萬衆横絶髙壁斜界連營馬璘以西域前庭車師後部兼廣武之戎下蔡之徭凡三萬衆據於朝那遏當路之塞忠誠以盧龍桞城洎在北平漢東諸鎮江黄申息之師凡三萬衆屯於回中張大軍之援忠誠以武落别校右地奇鋒凡二萬衆出岐陽而北㑹希讓以三輔太常之徒六郡良家之子自渭上而西合汴東淄青河陽幽冀總四萬衆分列前後魏成徳昭義永平總六師衆大舒左右朕内整禁旅親誓諸將資以千金之費錫以六牧之馬戎裝戰器軍用邉儲各有司存素皆精辦咨爾将相文武宣力之臣夫師克在和善陣不戰各宜保據經界屯據要衝斥候惟明首尾相應若能悔過何必勞人如或不然自當伐罪然後眷求統一以致諸部進取之宜俟於後命各敬爾守無黷武經賞罰之科國有明典宣示中外知朕意焉授髙重同州刺史兼防禦使制李虞仲勅漢號左馮翊分理浩穰近者非清名顯秩不在茲選正議大夫行給事中上柱國渤海縣開國男食邑三百户賜紫金魚袋髙重沉厚守道貞介操身以禮法為踐履之途以學行為游泳之地堅金不耗止水無波穆然士風休有美論屬者侍周禁署駁議𤨏闈重席有戴憑之名通經得陳邵之美侍從之暇傅益𢎞多移於牧人宜有善政吾以商原故地豐水攸同襟帶山川接畛甸服掌離宫之管鑰領近關之式遏俾揚風化思得兼材爾宜提舉政經蘇息物力清静率下以奉詔條用答寵榮勿替休問可使持節同州諸軍事同州刺史充本州防禦長春宫等使散官勲封賜如故李晟鳯翔隴西節度兼涇原副元帥制陸贄周之元老以分陜為重漢之丞相以憂邉見稱故方岳克寧疆埸不聳安人保大致理之端今所以重煩上台作鎮西土奉天定難功臣司徒兼中書令充神䇿軍節度鄜坊丹延等州觀察處置等使仍充京畿渭北鄜州華州兵馬副元帥上柱國合川郡王李晟勵清剛之操體博大之徳適時通變而大節不奪虚受廣納而獨斷自明奉法以身推功以下衆無犯命人用樂從懐徳畏威令行禁止誓羣帥於危疑之際駐孤軍於板蕩之中氣凌風雲誠動天地一皷而兇徒懾北再駕而都邑廓清師皆如歸人不知戰再安社稷功格皇天而明識秉彛清風激俗雅尚恬曠為謙有光朕以汧隴近郊扶風右地川阜連亘抵於回中保障名城藩屏王室所屬誠重付之元臣兼二將之甲兵崇十連之元帥宣威耀武罷警息兵俾予仰成時乃丕烈可兼鳯翔尹充鳯翔隴右節度營田觀察處置等使仍充鳯翔隴右涇原節度管内諸軍及四鎮北亭行營兵馬副元帥改封西平郡王功臣本官兼官如故渾瑊京畿金商節度使制前人王者之制安不忘危𢎞其道則文武齊致教其人則農戰兼務故雖縣内不可去兵况宻邇㓂虞干紀稔慝都邑郊甸騷然靡寧聿求信臣特建戎號濟人夷難允屬勲賢京畿渭北節度使兵部尚書行在左都虞候渾瑊忠貞博厚温恭簡肅持重不撓好謀而成居業克敦其詩書受賜每陳於廊廡能推誠而撫下不伐已以拒人委任中外咸著聲績夷險一貫隠然殿邦朕越在郊坰偪於兇醜授之師律式是戎昭侍衛増嚴斥候無爽檢身齊衆同士伍之勞苦敦陣整旅壯行列之威容静以伐謀動而制勝臨危勵節予有賴焉王圻之内沃壤千里綿亘商嶺屏於南門觀風靖人詰禁誅暴俾爾兼領用孚於休可京畿渭北渭南節度觀察處置等使餘並如故改梁州為興元府升洋州為望州詔前人自昔多虞順時而動古公避狄兆永祚於岐下髙帝徙蜀建雄圗於漢中王蹟所興子孫是奉覩遷居於遐阻知致君之艱難矧天下為家不常厥邑王者所至四方㑹同崇號設都於是乎在朕遭罹冦難播越梁岷烝庶煩於供億武徒勤於捍衛凡百執事各奉厥司人皆競勸物以豐給嘉乃成績予懐不忘今大憝已除京邑甫定將旋法駕展敬園陵眷於是邦復我興運宜其崇大以示將來古者天子省方則問百年䘏百姓以頒慶賜以茂勲勞用𢎞布澤之恩式慰來蘇之望宜改梁州為興元府其署置官資望一切與京兆河南府同南鄭縣升為赤縣諸縣並升為畿縣見在州縣官各令終考秩至考滿日放選依本資處分耆夀與板授五品官仍並賜緋先已賜緋並賜紫典正等各賜勲五轉百姓除先減放税錢外更給復一年洋州宜升為望州見任州官亦並令終考秩並諸縣官等各減兩選無選可減者各加三階應山南西道節度下將士除扈從迎駕已經改官者餘並即與甄敘嗚呼古先哲王東征西怨顧予不徳重於勤人撫心咎已良増愧嘆宣示有衆明知朕懐甄奬陷賊守節官詔前人沮勸二柄國之大綱奬善懲違固不可廢頃者賊臣搆亂京邑震騷惟茲土人奔竄無所或從其誘脅遂染汚名或守以純誠竟全貞節昨所司奏議但舉刑章坐累者各已條疏守節者並未甄異忠正而不報豈朕意焉應在京百司及京兆府長安萬年兩縣去年十月三日見在職事官在城陷於賊中潛藏不受逆命並諸色前資官被偽署官爵頻遭廹脅首末不出事跡昭著衆所明知者並委御史臺訪察勘覆其事勿容虚濫仍限今月内具名銜事跡聞奏五品已上及常叅官已受替者委中書門下與處分六品已下各減三選不拘考例聽集其未得資被替非時放選仍稍優與處分如已喪亡者並與追贈使恩加存殁以稱朕懐授唐朝臣振武節度論惟明鄜坊觀察使制前人分命使臣統臨方岳弛張之道盖亦從宜近甸無虞則但亷風俗邉陲式遏則兼假旌旄名制雖殊委任俱重膺是選命莫非勲賢開府儀同三司檢校兵部尚書兼鄜州刺史鄜坊丹延等州節度觀察處置等使平樂郡王唐朝臣嘗總偏師遘於多難仗義率衆臨危不回保全關衝抗絶兇逆守而能固出則有功每急病而讓夷嘗以寡而敵衆竟殱大憝克集茂勲炳然真心堅若金石洎息師旋歸按俗頒條軍旅慰安流庸悦附奉天定難功臣開府儀同三司檢校工部尚書兼左金吾衛大將軍充右街使上柱國建康郡王論惟明釋位勤王有赴難之節捍城禦㓂有持危之功奉主忘身棄家從國赴自郊甸載踰巴梁險阻艱難靡不陪扈忠義所在死生以之乆司禁戎益茂勲績器質敦實識度寛敏通明吏職練達武經本之以純良輔之以才術俾居藩翰僉謂汝諧朕以北控單于國之巨鎮彼方戎帥沉錮是嬰卧䕶邉軍已淹寒暑憫其盡瘁難以重煩爰咨信臣更踐厥職朝臣可依前檢校兵部尚書兼單于大都督䕶御史大夫充振武綏銀鄜勝等州節度營田處置押藩落等使惟明可依前檢校工部尚書兼鄜州刺史御史大夫充鄜坊丹延等州都防禦觀察處置等使餘並如故授李思讓延州節度使制韓儀門下夫息亂以静濟道者權當底定干戈之時乃更易節旄之任寧辭改作式貴叶宜不移将相之榮别奉蕃宣之寄用光勲傑爰舉寵章具官某氣薄雲天志堅金石藴翦起之雄勇負㓂賈之智謀誠明可以伏鬼神義烈可以貫風雨累代以勲勞報國狥節忘生一門以忠孝承家推心濟物功銘鐘鼎誓著山河每逢多難之秋必奮安危之用昨以邠岐動衆畿甸匪寧授以統臨錫之鈇鉞舉旄効命投袂連行備聞靡盬之誠克抱盡敵之意朕念兵革繁興十有八載蒸黎板蕩邑里洞虚為人父母之心深慙凉徳拯國艱危之運惟有責躬爰議罷兵用安率土又念昨者邠人不令潛持兩端有悞軍機遂成退守復臨彼土自不懐安雖欲撫寧諒難輯睦是乃換雙旌之雄重割兩郡之膏腴成一家千里之封列三鎮十連之貴勉思勤竭膺我寵靈授盧士玫權知京兆尹制元稹勅朕日出而御便殿召丞相已下計事而大京兆得在其中非常吏也誠以為海内法式自京師始輦轂之下盗賊為先尹正非人則賢不肖阿枉奏覆隔塞則上下不通假之恩威用讋豪右具官盧士玫自居郎署執政者言其温重不回守法專固副内史事物議歸之日者景陵將建龜筮有時予心怛然懼不克濟爾嘗倅職應其供求和而不同儉而不隘竣於己事朕甚嘉焉試命元僚亦既不撓今圓丘甫及慶澤將施摽攘椎埋必有幸生之者案牘卒吏亦當因縁為奸公費則多而利不下究惟是數者爾司其憂為爾正名無恡操剸可權知京兆尹餘如故授唐慶萬年縣令制前人勅朝議郎守尚書比部郎中賜緋魚袋唐慶輦轂之下豪黠剽輕擾之則獄市不容緩之則囊槖相聚是以前代惟京令得與御史丞分進道路以其捕逐之急也執事言爾慶頃𣙜束池鹵生息倍稱布露飴散於羅落之間而盗賊終不敢近推是為理真吾所求之劇令也無或畏避以艱􅑏􅄔可守萬年縣令餘如故吉旼可守京兆府渭南縣令制前人勅前河南府登封縣令吉旼畿邦之宰任得其人盖有以乂我黎庶足以張吾京師也自輦轂在鎬􅈆洛務輕長令之善康東人者往往移𨽻内史今京兆尹季同以旼有幹蠱之稱流聞於西遂陳換縣之求無替字人之術可守京兆府渭南縣令韋珩等可京兆府美原等縣令制前人勅韋珩等昔先王眚災肆赦則殊死已降無不宥免而受賄枉法者獨不在數常常罪之以此防吏吏猶有豪奪於人者朕甚憫焉日者覃懐有過籍之賦使吾百姓無聊生於下非珩等為吾發覺則吾終不得聞東人之疾苦矣今美原藍田皆吾畿内之邑爾其為吾養理生息以惠困窮使天下長人之吏知朕明用亷激貪之意焉授銀州刺史劉頗河中府河西縣令制前人勅劉頗朕以自鄜而北民悍政繁彌為難理乃詔執事求所以綏懐控壓之者皆曰頗在茲選且言其伐蔡之役嘗參事於懐汝之師部分弛張允叶軍政遂命試領州郡事衆果寧阜邉人宜之連帥以聞議請甄奨河西近邑擇吏惟精無恡牛刀為我烹割可依前件答京兆府二十四縣耆夀謝賑貸表白居易朕勤求人隠慎䘏農功念播殖之時必資首種慮懸磬之日多乏見糧將便公私宜從斂散卿等名登庶老業守先疇各勉農人以副朕意所謝知張平叔可京兆少尹兼知府事制前人勅商州刺史張平叔為人亷直為政簡惠前後歴府掾邑宰郡守而去思來暮之謡繼聞於人聽焉及副鹽鐵官刺商雒部㑹課報政亦甲於他官自貞元已來用三科取士奉詳明政術可以理人之詔而得其名有其實者幾何人哉平叔居其一也能効若是何用不臧故事内史缺未補間亞尹得行大京兆事試可而即真者往往有之故其選任日益難重爾宜稱所舉慎厥職無堕大以勤小無急弱以緩強夕念朝行遵吾約束可京兆少尹知府事張正甫可同州刺史制前人勅馮翊吾左輔也分理浩穰率先風化故其選次任内史一等而冠四方岳牧之首焉宜求吏課髙位望重者分部共理以夾輔京師尚書右丞賜紫金魚袋張正甫自登臺閣為人讜直物論時望敬而重之及領藩部為政寛簡將吏黎庶信而愛之所謂朝廷正臣郡國良吏常有惠政加於是邦迨茲五年去思猶在故輟臺轄再委郡符宜敬服新命増修舊政俾吏畏如夏日人歸如流水慎於終始典於厥官可持節同州諸軍事守同州刺史充本州防禦使散官勲如故除閻巨源充邠寧節度使制前人門下華夷要地實為蕃漢鈇鉞重柄必授忠賢况乎犄角諸軍金湯中夏有坐甲䕶邉之旅任切於拊循有引弓犯塞之虞寄深於備禦内作心腹外張爪牙苟非信臣不在茲選奉天定難功臣開府儀同三司檢校尚書右僕射兼羽林軍統軍御史大夫上柱國定襄郡王食邑一千三百户閻巨源備知敵態明練兵符永惟頗牧之能宜授郇邠之寄長南宫而遷左揆壯西郊而委中權既圗前勞且佇來効於戲十聨之帥可以觀政萬夫之長可以樹勲勉𢎞令猷副我休命可檢校尚書左僕射使持節邠州諸軍事兼邠州刺史御史大夫充邠寧慶等州節度管内支度營田觀察處置等使功臣散官勲封並如故授李遜京兆尹制前人勅近嵗京兆長吏數遷誠不便時抑有其故或鈐鍵不謹吏縁為姦或鉤距太煩人受其弊既非中道皆不得已而罷之宜求恬智寛猛相濟者親諭斯㫖使乆於其職以息吾人浙江東道觀察使御史中丞李遜十年以來連守四郡或紛擾之際或荒饉之餘威惠所加罔不和輯賞其殊績擢在大藩自臨㑹稽一如舊政况省科禁以便俗通津梁以息征動遵詔條深副朝㫖江南列鎮良帥則多集課程功爾為稱首而内史之選乆難其人今予所求唯爾可使雖表率州部其委非輕然尹正京師所資尤急宜輟材於浩穰佇觀政於輦轂望爾有成無替厥命可依前件除裴向同州刺史制前人馮翊之地宻邇郊畿分内史之政叅京師之化俾善所職其在得人京兆少尹裴向器藴利用學通政事乆試吏治頗著良能累守大郡入亞天府奉上撫下皆有可稱左輔之重爾膺其選况征賦猶重人庶未康實望良才與之共治勉副所舉往修厥官可同州刺史授薛伾鄜坊觀察使制前人勅鄜畤延安抵於中部羌人部落散在其間強悍成風易擾難理宜選寛明之使通知邉事者委以符節而糾綏之右金吾將軍薛伾服勤戎職練達吏道出入中外綿歴嵗年能一乃心以宣其力自加寵遇再執金吾徼廵有嚴夙夜匪懈在公若是何用不臧況為人沉静外和内肅按俗守封是其所能宜輟務於誰何俾宣風於亷察庶乎勞徠諸部綱紀列城奉詔條以安人參戎索以訓旅欽承厥命往復乃官仍踐冬卿式光重寄可檢校工部尚書充鄜坊等州觀察使王公亮可商州刺史制前人勅尚書司門郎中王公亮茂於學精於文文學之外有㭊毫刜鐘之用自佐戎律領郡符持憲為郎皆稱厥職吾前命劉遵古張平叔為商州刺史繼有善政人用乂安今爾代之守而弗失況商土瘠商人貧可以静理而阜安不宜改張而趨數以爾精敏當自得中可商州刺史授韋正貫京兆尹制文苑英華勅權知京兆尹韋正貫詩不云乎京邑翼翼四方是則故趙張邉延馳名兩漢而不疑兼以儒學取重當時斯任也吾豈易哉爾敷用政術列為殊科再昇文字之途一舉雲霄之路近者拔於郡府以尹京師有抑強扶弱之心得通變適時之用煦若春日肅如秋霜干將淬而投刄皆虚騏驥馳而追風自逺重以郊天盛禮發號鴻恩訖事而物力安舒設禁而㓂攘帖息是用嘉乃成效寵之正名爾其奉上思盡臨事思權轄健吏而惠窮人簡簿書而提綱目處劇勿紊居閒勿遺俾椎剽絶跡於九衢枹鼓息鳴於五夜克揚顯績用繼前修勅軍司協助京縣捕盗太和四年册府如聞近日京城頻有冦賊府縣所由至少防制實難須假軍司共為捕察宜令左右神䇿各差人與府縣計㑹如有盗賊同力追擒仍具所差人數姓名並所配防界牒報京兆府應捕獲賊並先送府縣推問如有諸軍諸使勘騐知情狀如實是殺人及強盗罪跡分明不計贓之多少聞奏訖牒報本司便付京兆府決殺其餘即各牒送本司令准百姓例之罪科決待府司添補所由人力稍足即别條流其外縣有軍鎮處亦准此處分捕盗止法頭首勅開成三年同前輦轂之下法在肅清奸盗竊發理難容捨親仁坊今月五日賊依前委京兆府左右街使鳯翔邠涇金商同華等州切加捕逐如獲頭首准法科斷其餘支黨一切不問於戲唯此凶災是彰非徳情敢忘於罪已惠所貴於及人施令布和期於蘇息凡厥臣庶宜體朕懐答鳯翔節度使崔珙手詔大中初鳯翔府志省所奏當府周公祠舊有泉水枯竭十一月中因風泉水五處一時湧出又有七處見出并畫圗進上事具悉朕聞致理之代地出醴泉盖以澤可濟時徳推上善徴諸傳記最為休祥朕以虚庸敢膺元貺披圗見瑞省表増慚豈惟菲徳致之亦卿循良所感臨軒嘉嘆至於再三今賜名潤徳泉想宜知悉授崔珙鳯翔節度使制同前門下乃眷岐陽襟􅊈擁漢古稱右輔以扶助王圻今為别京以屏翰戎落再煩元老往撫舊邦實資經國之謀尚副安邉之寄守太子少保崔珙禀粹嶽靈挺生國戚門容駟馬族盛八龍胸襟洞開智畧輻赴早以茂業踐於台衡宣力致君有犯無隠符叔敖之喜愠同伯玉之巻懐洎服休天朝保釐洛邑誠明之道華皓不踰能全素履之貞雅得大臣之體方叔之猷克壯師尹之望攸歸朕以保塞禦戎深圗良算餽軍艱食常在勞懐於是渇王商之儀形佇營平之籌畫伏蒲之奏前席忘疲既符咨嶽之求宜舉齋壇之典自閫以外爾實專之斷以宏才庶集吾事勉敷恩信務洽閭閻且慰恩思善圗政柄峻􅁄槐之禮命寵茅社之侯封服我徽章敬茲有土授髙承恭振武麟勝等軍節度使制玉堂遺範門下㝢縣乂安戎羌即叙雖亭障無虞於侵軼而卒乘難廢於訓齊况乎保固邉方控臨塞地将付戎律是擇良才銀青光禄大夫充右街使上柱國渤海郡開國公食邑三千户髙承恭爾先父勤勞王家式遏邉陲戡定庸蜀事存竹帛功銘鼎彛惟爾承恭克荷堂構學通奇正業擅機謀寛𢎞得大將之風質厚有端人之操早升朝序累踐寵榮擁緹騎以徼巡勤彰夙夜建油幢以鎮撫績著公忠嗣乃家聲為余爪士朕以單于田地境接外蕃備紫塞之風煙屏黒山之㓂盗是用錫以旄節俾作翰垣於戲張奐守節却酋長之金鐻陳泰惟公緘豪右之寳貨遂得戎羌稽顙部落歸心行之非難勉企前哲㒺遺訓誡負我知人仍兼八座之崇式重三軍之任保茲終始懋乃嘉猷可檢校刑部尚書兼安北都䕶御史大夫充振武麟勝等軍州節度觀察處置等使散官勲封如故答兩省諫幸華清詔大中十年正月舊唐書朕以驪山近宫貞聖廟貌未嘗修謁自謂闕然今屬陽和氣清中外事簡聽政之暇或議一行盖崇禮敬之心非以盤遊為事雖申勅命兼慮勞人卿等職備禁闈志勤奉上援經據古列狀獻章載陳懇到之辭深睹盡忠之節已允來請所奏咸知授韓建華州節度制楊矩門下越自去秋狩於太華萬乘所至兆人是歸而大無不周細無不具其間舉重典振條綱封畿肅清宫闕斷度㒺有廢事其故何哉吾有誠臣社稷之福今馮翊近藩襟帶河渭撫馭惟謹煙塵不驚将次廓清爰考前績官占蔽志吾何疑焉具官某星緯炳靈山河間氣理先正本謀必應機知義安居士皆盡力厚生利用人得保家閭閻則咸仰吏師軍旅則共推良将范宣子尤先興讓成安君止用作謀以標式大朝凖繩列鎮一受命則表章十上以得請為期一推心則忠孝兩全以奉公為本總是全徳實吾偉人今者沙澤之陽疆理相接厲階斯搆改作是宜俾兼統制之權允竚撫綏之惠爾當視同如華濟猛以寛則吾坦然人俟安一敬服丕命以孚於休答李克用請還京並飭討邠寧詔乾寧二年舊唐書昨延王迴言卿憂時體國執禮輸忠接遇之間周旋盡節備知肺腑識我恩榮静惟尊主之心果契知臣之分朕欲取今月二十四日却復都城冀寧兆庶倚我勲徳有若長城速伸翦盪之謀以慰黔黎之望李茂貞封岐王加尚書令制吳融門下夫天有星辰為之綱所以保乎乾健地有山嶽為之鎮所以定乎坤柔故王者話夾輔之臣資股肱之任安危所係動静是憑其在周也則姬公盡心於經營其在漢也則綘侯竭力於匡贊惟天所相何代無才厥生英賢為我柱石拯茲艱運樹彼洪勲欲示褒旌爰加徽數具官某三光結粹一氣融精合鸞鳯之正音動諧律吕有麒麟之逸足逈出塵埃抱鐵石於寸心棲雪霜於勁節倜儻恢廓深沉温雅允為王國之楨實禀生人之秀自岐陽振跡隴右成功虬騰周翰之間鶚立漢壇之上弓鳴霹􅋬劔躍蜿蜒指揮而川陸可迴叱咤而風雲立變一居右輔累復皇都殊庸已煥於旂常嘉頌早傳於金石昨妖興肘腋釁起宫闈而能憤激衷腸宻施籌畫致禁軍之􅆛虎戮當路之豺狼安宗社於綴旈復乘輿如反掌人祗共慶華夏同歡既而仗瑞節以來朝秉桓圭而展敬静與之語簡而有常動叶生知克符中道披肝露膽皆本於至誠言發涕零必期於盡瘁感通天地激動人臣得不嘉乃奇功申茲異渥表爾優崇南省統率六宗尊大西郊封超五等在當時而難舉非盛烈而莫當傑立羣倫光流萬代勉膺朝奬敬答天休可守尚書令兼侍中仍封岐王餘官勲並如故授孫儲邠州節度使制裴廷裕門下惟彼邠郇連近咸鎬雜華夏羌渾之俗有公劉后稷之風地控三州境延千里撫茲疲俗允屬名臣某官磊落喬松晶明片玉以雍睦作理家之本用詩書為干禄之基信厚難窺端莊不倚動皆顧行王逺每恥於妄言志切導人季路罕聞於宿諾明鏡利劒髙謝塵埃止水秋山居為圭表自抜於侯府選在明庭心惟業官舉不避事廣明中盗侵關輔兵滿京師恭惟先皇帝逺幸右蜀爾則佐彼上相首誅助桀之人贊我元勲大挫吠尭之黨爾後一麾出牧雙節升壇安人得賢太守之風訓兵盡真将軍之令龔黄並駕管樂齊肩疊是功庸宜増顯貴睠乃巨屏素號名藩爰自前朝必求名帥郭子儀以山河之誓戡定多虞白敏中以廊廟之尊經營薄伐近則洊興喪亂方苦流亡將欲戢彼干戈保其生聚朕意念人惟爾所宜静以撫封儉而植已弔彼凋殘之後𢎞其惠愛之仁副我殷憂佇爾蘇息大司空貴秩左光禄崇階亦遣進封皆勸為理茍孤委任其如法何勅冀王關西招討開平五年册府邠岐未滅關隴多虞宜擇親賢總茲戎重應關西同雍華鄜延夏等六道兵馬並冀王收管指揮凡有抽差選甲西面都招討使仍别奏聞庶合機權以寧邉鄙修奉關西陵寝詔後唐清泰元年册府列聖陵寝多在關西中興已來未暇修奉宜令京兆河南鳯翔等府耀州乾州奉陵諸縣其陵園有所闕漏本處量差人工修奉仍人給日食祭告下太常宗正寺參詳奏聞賜西京作坊使知麟州王慶民奬諭勅書宋仁宗歐陽修勅王慶民省所奏准樞宻院劄子節文以臣撰成麟府二州絹圗一面並序目二册詣闕上進事具悉古之用兵者必因地形制方畧然後可以䇿勝敗之算運奇正之謀爾以材武之資有敏明之識自膺簡寄出守邉封而能周知山川險易之形歴覧亭障屯防之要列為凡目粲爾條陳不惟指掌於披圗足以因時而制變遽茲來上深契乃忠省閱以還歎嘉曷已放茲奨諭想宜知悉任守信遥郡刺史鄜延路駐泊兵馬鈐轄詔前人國家自靈夏不賓邉隅多警議者率以謂用兵之道任將宜專恩信不乆則無以得士心山川不習則不可圗勝算自兵宿於野乆而無功此殆將帥數易之患也茍有能者無遽奪焉以爾具官任守信選以敏才臨於戎事肅軍捍㓂宣力有聞遽以飛章自言滿嵗顧乆親於矢石豈不念於勤勞然而士卒之樂既汝安羌人之情惟汝熟雖欲代汝實難其人所宜旌以郡章仍臨舊部體茲委寄服我茂恩賜判永興軍韓琦詔時琦乞相州王安石卿當國家之多難任社稷之憂實能忠勤以濟勲績方均逸豫適此外虞煩我元功良非得已亦惟體國義不辭勞今雖尚謀經武之時非有蒐兵伐罪之事坐臨諸帥固可優游何必舊邦乃能休養勉綏居息以副倚毗除程戡安武軍節度使再判延州制王珪周禮命卿司馬掌國征之事漢儀遣帥將軍專閫制之權自非謀經帷幄之咨名厭疆陲之難則何以稽圗而受社賜律以臨戎茲疇舊政之良式協師虞之望具官程戡體忠誠之度蹈夷雅之風進搴藝文之華仕階名秩之膴方先朝之籲俊更三府之告猷左右六年夙夜一節肆纂休於皇序適留寄於邉衝空深寤寐之思且重安危之倚上金城之方畧猶知充國之彊習闕里之絃歌還見祭遵之佚就付兩河之節薦綏西土之封既衍食於爰田復倍輸於真户風聲雖舊寵數維新於戲制邉疆者備不可遽忘守方隅者勢不可數易盖威素伸則敵情懾信乆著則士心懐尚堅壯圗往服渥命陜西轉運使制曽鞏分部而使兼地數千里治兵與民與夫征賦之出入自陜以右則又與疆場之事其於寄屬必惟其人察於在廷無以易爾夫使督課明而政事舉經畫當而財用足吏與士皆悦而勸兵與民皆贍而靖爾之任也其尚起哉奏議郎景思誼授東上閣門使鄜延第一副將前人勅具官某西討之兵有陳戰之功者朕無不録爾能致其材武奮擊黠羌克敵摧鋒屢以㨗報疇庸較實宜有異恩介上閣之使名貳連營之將領茲為奬抜盖匪常科尚勵壯謀益思來效可朝請郎權發遣陜西運副葉康直可朝奉大夫再任承議郎權發遣陜西運副李察可朝奉郎再任制王震朕惟西土弗靖爾則在行靡征不從日月逾邁典䕶邦計實繄厥勞練達邉機毋易爾舊宜加寵陟申即故封有功見知其説毋斁謝卿材陜西轉運使制蘇軾治邉者不計財惟邉之所用治財者不䘏民惟財之為富此古今之通患也朕知汝材智可倚忠厚可信故以西方之政責成於汝往與帥守者謀之惟適厥中以民為本諭秦王府文武官勅明太祖王府設官本古之道惟文章之士以匡王之性體務欲端方朕封諸子頗殊古道内設武臣盖欲藩屏國家備侮禦邉閒中助王使知時務所以出則為將入則為相因靖江府官與指揮耿良不和甚有欺凌指揮之意於是令武相若有警出則為將䕶衛指揮副之歸則不管軍馬錢糧刑名其軍情事務文武議之但閒中則導王以善其中書省草茅行移是致錯朕㫖意難為聽命者今後如勅施行定西嶽華山神號詔洪武三年華嶽集磅礴中國之西叅穹靈秀生同天地形勢巍然古昔帝王登之察地利以安生民故祀之曰華山於敬則誠於禮則宜自唐始加神之封號歴代相因至今曩者元君失馭海内鼎沸生民塗炭予起布衣承上天后土之命百神隂祐削平暴亂正位稱尊職當奉天地享鬼神以依時統一人民法當式古今寰宇既清特修祀儀因神有歴代之封號予起寒微詳之再三畏不敢效盖神與穹壤同始靈鎮西方其來不知嵗月幾何神之所以靈人莫能測其職必受命於上天后土為人君者何敢與焉予懼不敢加號特以西嶽華山名其名依時祀神惟神鑒之陜西通志巻八十五
