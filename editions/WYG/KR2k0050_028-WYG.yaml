body:
  text: 陜西通志巻二十八祠祀一寺觀附五禮首吉國事攸隆泰壇鄜畤等於郊宫几筵榱桷崇德報功雲旂風駕萬福来同維彼二氏闡教闗中鳩摩譯義柱下遺蹤仙梵境界金碧蘢葱牖民覺世用召和豐作祠祀志第十二西安府社稷壇在府城東康熙四年知府葉承祧建附郭不置各縣如制雍正三年定每嵗祭社稷壇祭品羊一豕一帛一鉶一籩四豆四簠二簋二刋圖通行府冊風雲雷雨山川壇在府城西北知府葉承祧建各縣如制賈志文廟在府治東南建自宋元至元中亷希憲修明正綂間知府孫仁益增拓之正殿七間兩廡各十七間廡南為厨舎東西各二間前為儀門稍南為碑亭二兩司府縣官㕔東西相向又南為宰牲所前為􅎉星門門前為泮池跨以石橋萬厯庚子巡按李思孝建橋前為太和元氣坊左右碑亭二永壽王府中尉惟㶭建坊前為屏東西二坊曰賢闗曰聖域廟左為啓聖祠本朝康熙二十三年十月初一日御題匾曰萬世師表至雍正元年改啟聖為崇聖祠追封孔子五代王爵祀以太牢四年三月初八日御題匾曰生民未有各學如制府冊先農壇在東郊各縣如制耤田四畝九分耤田後建壇髙二尺一寸寛二丈五尺壇後正房三間配房各一間壇廟耤田之外週圍繚垣門南向每嵗仲春擇日致祭祭品與社稷壇同雍正五年為始陜西四府十州屬准銷建設銀共肆千伍百貳拾壹兩叁錢陸分㭍釐零府冊闗帝廟在滿城舞生壇雍正三年追封闗帝三代公爵供奉後殿嵗春秋廟祀以太牢各縣如制府冊龍王廟雍正五年七月内奉上諭龍神専司各省雨澤地方守土大臣理應䖍誠供奉朕特造各省龍神大小二像可著該省督撫迎請供奉本地䖍誠展祀欽此隨迎請福秦順應龍神大小二像立廟宇供奉在府治西南府冊文昌祠在府治中街賈志八蜡廟在府治南各縣如制賈志旗纛廟在都司舊署旁一在西關大教場賈志城隍廟在府治西明代累修有碑記本朝雍正初火燬隨移秦府木植改建各縣如制又附近省城别立廟一在河池寨去城二十五里順治十三年修有記一在唐家寨去城二十里康熙十八年建一在王曲鎮去城三十里府志郡厲壇在府北五里各縣如制曰邑厲鄉保曰鄉厲府志名宦祠在學宫左各縣學如制府志鄉賢祠在學宫右各縣學如制府志忠義孝弟祠在學宫内雍正元年建各縣如制府冊節孝祠在學宫外雍正元年建各縣如制合四府十州建立忠義節孝祠宇准銷銀叁千壹伯肆拾壹兩陸錢零府冊賢良祠在長安九府街雍正十年奉勅建署巡撫兵部尚書史貽直撰記府冊長安縣禹王廟在縣治西四十里為豐水而建賈志五嶽廟在縣治東南禱雨輒應嵗乆傾圮明正統九年都御史陳鎰增修本廟碑記本朝尚書白如梅重修有記縣志東嶽廟在縣治西南賈志西嶽廟在縣治西賈志明成化十七年住持蘇元靖重修有記縣志代按古封西嶽廟在華隂縣歴典禮詳載華隂本廟下闗帝廟在城内西五臺及鐵爐水池等坊金光落晁郭杜等里鎮縣冊元君廟在縣北三十里馮黨里創自唐代本朝康熙六十年重修縣冊太白廟在縣西郭外明崇禎間旱禱屢應撫軍使者汪喬年重修本廟碑記本朝總督尚書白如梅繼修有記縣志長按太白山綿亘最惟鳯翔府郿縣為就近故山湫神廟在郿厯代封典故蹟詳見郿縣本廟下龍王廟在南城外創自明景泰元年有記本朝雍正元年重修縣冊雷神廟在城北明萬厯四十五年重修咸寜趙民俊有記縣冊二郎廟在西闗廂明𢎞治二年建廟後有泉旱禱輒應嘉靖庚申鄉民徐溢等二十餘人以禱雨復新祠宇本邑知縣某撰碑記二按五府十州多載有二郎廟但二郎有秦蜀郡太守李氷子二郎佐父治水有功元至順六年加封為英烈昭恵靈顯仁祐王見續文獻通考宋大將李顯忠子二郎明正統中勅號波海廟祀保安安定安塞等縣見延安府志今二郎神廟散見於西鳯府州縣者疑皆蜀守二郎府君廟在城西四十里祀唐相崔珏武德三年民懐其德為之建祀太宗夢與神遇遂封號曰府君之神宋大中祥符三年祈嗣有應加封地曹判官遣使致祭元延祐二年封為䕶國西齊王建廟始於長安因祀焉明𢎞治五年監察御史蘇州知府孟俊有靈應碑記其一在城西二十里崔家莊縣志終南山祠唐文宗開成二年建賈志開成二年四月辛酉詔終南山興雲必雨若當晴霽雖宻雲他至竟不霑霈况兹山北面闕庭日當恩顧修其望祀寵數宜及令中書門下差官設奠宣告恩禮擇立廟處所以聞八月乙未長安令杜慥奏准詔置終南山祠宇畢己酉冊南山為廣恵公冊府元龜恭定祠祀明工部尚書諡恭定馮從吾以門人党還醇等配南京光禄卿文翔鳯有記賈志附古壇廟泰一壇元光二年從亳人繆忌奏立泰一壇於長安城東南郊按禮樂志武帝祀太一甘泉在京西北王應麟辨太一與泰一不同賈志唐圜丘在長安明德門東南一里賈志黄帝壇百神壇赤帝壇並在縣南安化門外白帝壇縣西開化門外夕月壇縣西開逺門外雨師壇縣西金光門外宋敏求長安志社壇在縣西南五里光德坊賈志黑帝壇在府治北大倉畔賈志雷公壇在府城北元武門外賈志司中司命壇在開逺門外賈志漢太上皇廟在城中香室街酒池北三輔黄圖髙帝廟在長安故城安化門裏大道東隋遷都移廟於皇城開福門外頒政坊有題詩闗中記括地志云髙廟在長安西北十三里渭南史記正義門按渭南與安化微異祀漢髙帝於長陵蕭何配以一太牢而無樂隋書禮儀志原廟惠帝為朝長樂宫數蹕煩民築複道武庫南叔孫通曰此髙帝月出遊衣冠之道奈何乗宗廟道上行哉帝懼曰急壊之通曰人主無過舉願為原廟於渭北衣冠月出遊之益廣宗廟大孝之本上乃詔有司立原廟漢書叔孫通傳原再也髙祖已有廟在長安城中本傳註孝恵廟闗中記曰恵帝廟在髙廟之西府志長安縣休祥坊有顧成廟宋敏求長安志景帝廟號德陽武帝廟號龍淵玉海孝昭廟二廟内武昭子孫分葬其中府志昭帝廟號徘徊玉海宣帝皇考廟漢書元康元年立皇考廟益奉明園户為奉明縣府志樂遊廟闗中記曰宣帝許后葬長安縣樂遊里立廟於曲江池北名曰樂遊廟府志孝元廟元帝廟號長壽玉海漢書曰王莽壊孝元廟更為文母太后起廟獨留故殿為文母暮食堂府志孝成廟帝王世紀曰成帝廟名池陽府志太祖朝嘗詔脩先代帝王祠廟令太常禮院重定配享功臣檢討儀相畵様給付漢髙帝以蕭何配文帝以周勃陳平劉章宋昌配景帝以周亞夫竇嬰申屠嘉晁錯配武帝以公孫宏衛青霍去病金日磾配宣帝以丙吉魏相霍光張安世配以上並祀在長安揮麈前録渭陽五帝廟漢書曰文帝十五年齊人新垣平望氣言長安東北有神氣成五采於是詔作渭陽五帝廟廟記曰五帝廟在長安東北府志光武至長安見宫闕盡廢宗廟為墟乃徙都洛陽取十廟合於髙祖作十三室太常卿一人别治長安主知髙廟事三輔故事唐安上門街東太廟先天中置中宗廟讓皇帝廟開元年建崇恩廟神龍時建長安志唐髙祖廟以河間王孝恭殷開山劉政㑹淮南王神通配揮麈前録武成王廟在太平坊修德坊興聖廟天寳二載建元獻皇后廟乾元元年立永陽坊有恭僖貞獻二太后廟恵昭太子廟元和八年置文敬太子廟貞元中徙置永和坊有隱太子廟節愍太子廟在待賢坊嘉㑹坊有莊穆公主廟常安坊有章懐太子廟胡祅祠武德四年立長安志秦樗里子廟在府衙西畔馬志安平公祠在指揮街隋宇文愷有遷都功故廟食馬志汾陽王家廟在舊府城北榭乃其故宅馬志石門山神廟在縣西十三里石炭堰神廟在縣西南四十里貞元年置河伯廟在縣北二十六里雍侯廟在於府城北街長安志西平郡王廟新說唐李晟官至太尉中書令贈西平郡王勅立廟宇今在慈恩寺西南一里貞元八年立廟碑尚存馬志冦莱公祠在舊京兆掖庭街西有冦萊公園亭為寺今在貢院之後祠中有石刻詩馬志開平忠武王廟在縣治西常遇春以開陜功命有司立廟嵗時致祭續文獻通考正統元年建馬志三臺寺在縣北二十里有小碣上書係古漢城基名曰西髙廟東漢明帝創建明萬厯壬寅年修本朝康熙十二年巡撫杭愛重修提學許孫荃有詩縣冊福勝寺在城西南十里漢時創建厯唐宋元明嵗乆剥落本朝康熙五十六年重修本寺碑記燉煌寺在城北十八里晉時有燉煌菩薩曽譯法華經於此寺後燉煌入滅遂為塔以龕其靈骨及舎利至隋重建本朝順治間塔圮露舎利靈骨時復為函以􅄟之仍葺其寺縣志金皇統五年住僧政公重建大定二年賜額勝嚴禪院明正統間住僧了菴與其徒性福繼修成化十一年住僧性恵覺成二人増修本寺碑記莊嚴寺在城西南十二里木塔寨隋文帝為獻后立為禪定寺唐武德年改今名馮志殷令名題額南門外壁白蕃神尹琳畵中門東西盧稜迦畵兩壁甚大厯代名畵記本朝康熙十七年僧靈菴五十二年僧巨目相繼増修縣志鐵塔寺在城西三里本唐章懐太子宅咸亨四年捨為寺賈志明天順元年住持俊公創修長安韓温有記縣志崇禎七年重修其城西南四十里馬王村另有鐵塔寺嘉靖四十一年建縣志靈感寺唐宣律師修行處有净土壇景龍中建賈志本永興王府中家佛堂原為西明寺貞觀末改今名本寺碑記明萬厯年三次重修寳塔縣志香積寺在城南子午谷正北神禾原上郭子儀收長安曾陣於此唐神龍二年建王維有詩馮志宋太平興國三年改為開利寺舊有香積堰水入城中遭朱泚亂壊龍首香積以決其流宋時龍首堰復香積堰廢馬志寺離城三十五里前有大小塔二縣志清教寺唐中宗時建賈志温國寺在城南四十里潏水岸賈志本隋薛國公長孫覽妻鄭氏捨宅置名實際寺唐開元十五年大徳進法師立為道場建塔改為温國寺馮志明𢎞治壬子住持智全繼脩都御史管楫記净土院尹琳畵三門内呉畵鬼神厯代名畵記明嘉靖三十三年住持周安重脩有記縣志本朝雍正十年興工脩葺縣冊觀音寺在城内廣濟坊唐天寳二年建府志明正德十五年重脩尚書劉璣記一在城西二十里董蘇里隋時建明宣德元年脩一在城西二十里馬家寨本朝順治十四年建縣志感業寺在古長安城西北即武后為尼處賈志離城二十里明萬厯十二年重脩本寺碑記百塔寺在城南五十里許縣志本唐僧信行塔院大厯二年間慕信行者皆窆於信行塔之左右故名百塔馮志百塔寺唐相裴公所施之地明萬厯十九年秦藩捐貲増脩張芬碑記翠微寺在城西南終南山上馬志本唐太和宫武德八年建貞觀十年廢二十年太宗厭禁内煩熱命將作大匠閻立本再葺改為翠微宫元和元年廢為翠微寺宋張茂中遊城南記萬壽寺在長安古城霸城門外一里許本梁蕭芩宅隋文帝立為延興寺寺東院蕭琮之堂捨入寺唐中宗改為永泰寺大中六年改為萬壽寺刺史劉枇撰記馬志甘露寺在城南五十里唐杜牧之有詩縣志華藏寺在得辛坊即唐保壽寺因性方和尚造經於此改今名賈志大明寺在北門外馬志寺創於北周天和四年隋更卜遷於皇城北墉外明嘉靖丙申再葺後地震大圮隆慶戊辰僧元德以善信所施度規制而重新之參議陳綬碑記琉璃寺在城西三十里創自唐代明成化丁亥邑令李經捐俸興脩本寺碑記安慶寺在西闗廂創自唐代本朝康熙二十年南昌熊士濵脩建本寺碑記西五臺在城西北隅是臺基於唐創於宋屢葺於明有禱必應六月大㑹嵗以為常爰於康熙戊戌捐俸重脩由三天門拾級而升層臺紺閣環列左右最髙處為大士殿登殿四望目收一郡之勝總督鄂海記安衆寺在城内西