body:
  text: 陜西通志巻七十五經籍第二子類集類子類子之類凡十七曰儒家類曰道家類曰法家類曰名家類曰墨家類曰縱横家類曰農家類曰雜家類曰小說家類曰天文類曰五行類曰蓍龜類曰厯筭類曰兵書類曰雜藝術類曰類事類曰醫書類按舊志子類有神農黄帝書數種今考神農二十篇劉向謂出於李悝及商君所說黄帝素問陳氏謂出於後世依託其他諸書疑皆偽造者居多兹槩從闕焉太公二百三十七篇周吕望撰後世之言兵及周之隂權皆宗太公為本謀史記齊世家謀八十一篇言七十一篇兵八十五篇漢書藝文志吕望為周師尚父本有道者或有近世又以為太公術者所増加也藝文志注李靖曰謀所謂陰謀不可以言窮言不可以兵窮兵不可以財窮此三門也李衛公問答老子曰將欲翕之必固張之將欲奪之必固與之此陰謀之言也范蠡用之以取吳張良本之以滅項而言兵者尚焉此太史公入道家然隂謀之術申商韓非之所本也文王之德之純太公見而知之丹書敬義之訓武王得於師尚父隂謀傾商之說陋矣玉海按此二百三十七篇出於班史藝文志而隋經籍志不載於六韜外另有太公隂謀及隂符鈐録等九種考漢藝文志如劉向所序六十七篇注云新序說苑世說列女傳頌圖皆不細標其目疑此或依其例而以隂謀及隂符鈐録等書括於二百三十七篇之中歟抑彼或多後儒依託歟兹不盡載六韜六巻吕望撰周史六弢六篇漢書藝文志師古曰即今之六韜也葢言取天下及軍旅之事弢字與韜同也藝文志注晁氏曰周吕望撰分文武龍虎豹犬六目兵家權謀之書也元豐中以六韜孫子吳子司馬法黄石公三畧尉繚子李衛公問對頒行武學令習之號七書讀書志按康熈中武學七書祗存孫吳司馬法三種餘俱黜九章筭術包犧氏始畫八卦作九九之數以合六爻之變黄帝神而明之引而伸之建厯紀協律吕記稱𨽻首作數其詳未之聞也周公制禮有九數九章是矣劉徽九章筭經序老子道德經二巻李耳撰晁氏曰李耳撰以周平王四十二年授闗尹喜凡五千七百四十有八言八十一章言道德之㫖予嘗學焉通其大㫖而悲之葢不幸居亂世憂懼者所為之書乎不然何求全之甚也讀書志闗尹子九巻尹喜撰陳氏曰周闗令尹喜葢與老子同時啓老子著書言道德者按漢志有闗尹子九巻而隋唐及國史志皆不著録意其書亡久矣徐藏子禮得之於永嘉孫定首載劉向校定序末有葛洪後序未知孫定從何傳授殆皆依託也序亦不類向文文獻通考按抱朴子老子西逰遇闗令尹喜於散闗彊令之著書耳不得已為著道德一經散闗在今鳯翔縣南皇甫士安髙士傳云平王東遷闗以捍移人以職徙尹喜候氣非此而往逕由兹焉今鳳翔志有授經臺在縣南尹喜既見老子授五千言退而書道德經後常居此合之抱朴子似非無據舊志但列闗尹子而不及道德經故今並列焉神妙行軍法一巻陣圖一巻秦將軍郿人白起撰白起者郿人也善用兵事秦王封武安君史記本傳商子五巻商君公孫鞅撰晁氏曰秦公孫鞅撰鞅衛之庶孽好刑名之學秦孝公委以政遂致富强後以反誅鞅封於商故以名其書本二十九篇今亡者三篇太史公既論鞅刻薄少恩又讀開塞書謂與其行事相類卒受惡名有以也讀書志明世論十五篇漢車騎從事杜陵杜篤撰太史公萬嵗厯一巻萬嵗厯祠二巻俱太史令龍門司馬談撰太史公素王妙論二巻太史令龍門司馬遷撰太史公素王妙論曰諸稱富者非貴其身得志也乃貴恩覆子孫澤及鄉里也黄帝設五法布之天下用之無窮葢世有能知者莫不尊親如范子可謂曉之矣管子設輕重九府行伊尹之術則桓公以霸范蠡行十術之計二十一年之間三致千萬再散與貧七畧云司馬遷撰史記正義云二巻今僅見此語於太平御覽玉海新序十巻漢宗室光禄大夫劉向撰漢劉向撰成帝時典校秘書因採載戰國秦漢間事為三十巻上之其二十巻今亡崇文總目漢興六藝皆得於散絶之餘世無復明先王之道以一之者諸儒茍見傳記百家之言皆恱而向之故先王之道為衆說之所蔽闇而不明欝而不發而怪竒可喜之論各師異見皆自名家向之序此書於今最為近古雖不能無失然逺自舜禹而次及周秦以來之嘉言善行亦往往而在也要在慎取之而已本書曾鞏序說苑二十篇劉向撰劉向所序說苑二十篇崇文總目云今存者五巻臣從士大夫間得之者十有五篇與舊為二十篇正其脫謬疑者闕之本書原序九章重差一巻說老子四篇俱劉向撰三統厯一巻漢宗室侍中劉歆撰劉氏三統厯譜考步日月五星之度有意其推本之也漢書列傳賛女誡一巻扶風曹世叔妻班昭撰序曰鄙人愚暗受性不敏䝉先君之餘寵頼母師之典訓年十有四執箕箒於曹氏於今四十餘載矣戰戰兢兢常懼黜辱以増父母之羞益中外之累夙夜劬心勤不告勞而今而後乃知免耳吾性疏頑教道無素恒恐子榖負辱清朝聖恩横加猥賜金紫實非鄙人庶幾所望也男能自謀矣但傷諸女方當適人而不漸訓誨不聞婦禮懼失容他門取耻宗族閒作女誡七章願諸女各寫一通庶有補益裨助汝身去矣其朂勉之本書原序元測一巻扶風馬融撰老子二巻長陵三老母丘望之注老子指趣三巻母丘望之撰禦寇論太常長陵趙岐撰延熹九年匈奴烏桓鮮卑反叛公卿舉岐擢拜并州刺史岐欲奏守邊之策未及上㑹坐黨事免因撰次以為禦㓂論後漢書本傳釋問七篇三國蜀漢中陳述撰杜氏體論四巻魏幽州刺史京兆杜恕撰杜氏曰以為人倫之大綱莫重於君臣立身之基本莫大於言行安上理民莫精於理治勝殘去殺莫善於用兵夫禮也者萬物之體也萬物皆得其體無有不善故謂之體論杜氏新書恕又著興性論一篇葢興於為已魏志本傳梁有篤論四巻杜恕撰亡隋書經籍志老子訓註大司農闗中董遇撰遇善治老子魏畧善文五十巻甄正論三巻俱晉征南將軍杜陵杜預撰典林二十三巻京兆韋謏著謏善著述伏林三千餘言演為典林二十三篇述作及集記凡數十萬言皆深博有才義晉書本傳傅子一百二十巻司𨽻校尉泥陽傅𤣥撰𤣥撰論經國九流及三史故事評斷得失各為區别名為傅子為内外中篇凡有四部六録合百四十首數十萬言行於世元初作内篇成子咸以示司空王沉沉與𤣥書曰省足下所著書言富理濟經綸政體存重儒教足以塞楊墨之流遁齊孫孟於往代毎開巻未嘗不嘆息也晉書本傳今存二十三篇餘皆缺書目泥洹經三十巻新豐沙門智猛天竺沙門曇摩羅䜟等譯晉元熈中新豐沙門智猛策杖西行到華氏城得泥洹經及僧祗律東至髙昌譯泥洹為二十巻後有天竺沙門曇摩羅䜟復齎胡本來至西河沮渠䝉遜遣使至髙昌取猛本欲相叅騐未還而䝉遜破滅姚萇𢎞始十年猛本始至長安譯為三十巻隋書經籍志苻子二十巻員外散騎侍郎長安苻朗撰苻朗字元達堅之從兄子也耽玩經籍手不釋巻每談虚語𤣥不覺日之將夕著苻子數十篇行於世亦老莊之流也晉書苻朗載記實相論二巻姚秦國師沙門鳩摩羅什撰姚興迎羅什待以國師之禮羅什雅好大乘志在敷演常歎曰吾若著筆作大乘阿毗曇非迦旃子比也今深識者既寡將何所論惟為姚興著實相論二巻興奉之若神晉書本傳金剛般若經一巻鳩摩羅什譯晁氏曰後秦僧鳩摩羅什譯唐僧宗宻僧知恩宋思元仁賈昌朝王安石五家注予弟公愬日誦三過予靳之曰汝亦頗知其義乎對曰知之其義明萬物皆空故古人謂以空為宗也予曰金剛者堅固不壞之義也萬物之空何以謂之金剛復曰六如偈其言明甚獨奈何因語之曰汝之過正在以有為法同無為法以真空同頑空耳張湛曰身與萬物同有其有不有心與太虚同無其無不無庶幾如此哉讀書志妙法蓮花經觀世音普門品鳩摩羅什譯余自少讀普門品雖未能深解其意然嘗以意測之曰此佛氏之寓言也昔唐李文公問藥山禪師曰如何是惡風吹船飄落鬼國師曰李翺小子問此何為文公拂然怒形於色師笑曰發此瞋恚心便是黒風吹船飄入鬼國也吁藥山可謂啓發人矣以是推之則知利慾熾然即是火坑貪愛沉溺便是苦海一念清浄烈熖成池一念警覺船到彼岸災患纒縳隨處而安我無畏怖如械自脫惡人侵凌待以横逆我無忿嫉如獸自奔讀是經者則知補陀大士真實為人非浪語者西山真氏䟦老子二巻鳩摩羅什注肇論四巻姚秦僧洪肇撰晁氏曰姚秦僧洪肇撰師羅什規模莊周之言以著此書物不遷不真空湼槃無知般若無名四論傳燈云肇後為姚興所殺讀書志道覺論二十巻陳扶風馬樞撰樞字要理博極經史尤善佛經及周易老子義撰道覺論二十巻行於世陳書本傳象經一巻周武帝撰佛性論七經論俱尚書武功蘇綽撰綽字令綽少好學博覽羣書尤善筭術著佛性論七經論行於世周書本傳隋髙祖新譔兵書三十巻二儀十簿經一巻四海類聚單方十六巻俱煬帝御撰相經三十巻丞相長安來和撰象經一巻三十六科鬼神感應等大義九巻俱國子祭酒西城何妥撰欹器圖三巻地動銅儀經一巻九宫五墓一巻遁甲録十巻遁甲立成法一巻陽遁甲用局法一巻元辰經十巻元辰厄百九巻百怪書十八巻録命書二十巻九宫龜經一百一十巻太一式經三十巻孔子馬頭易卜書一巻風角鳥情二巻俱儀同京兆臨孝恭撰序志一巻唐太宗御撰唐金鏡書一作述一巻太宗御撰貞觀二年正月庚午著金鏡述以示侍臣實録爰述金鏡窮神盡聖便物以言應言以行苞括治體抑揚辭令張藴古大寳箴太宗思隋氏失道皇運開基因而序之以明誡謹神筆書石命工刻之以賜皇太子末云明鏡不逺於焉自鑒太平御覽帝範四巻太宗御撰序曰汝以幼年偏鍾慈愛義方多闕庭訓有乖擢自維城之居屬以少年之位未辨君臣之禮節不知稼穡之艱難余毎思此為憂今自軒昊以降迄於周隋經天緯地之君纘業承基之主興亡治亂其道煥然所以披鏡前蹤博採史籍聚其要言以為近誡云爾文苑英華晁氏曰貞觀末著此書以示髙宗且曰修身治國備載其中其末頗以泰侈自咎戒髙宗俾勿效己讀書志二帝三藏聖教序一巻太宗髙宗唐書藝文志唐天訓四巻髙宗御撰顯慶二年六月上製元首前星維城股肱誡次著股肱論令許敬宗等注釋名曰天訓㑹要麟閣詞英六十巻髙宗勅撰臣範唐藝文志作軌二巻則天武皇后撰天后臣範序云想周朝之十亂爰著十章思殷室之兩臣分為兩巻文苑英華晁氏曰唐則天皇后武氏撰範或作軌武氏稱制時嘗詔天下學者習之尋廢本十篇今缺其下五篇讀書志紫樞要録十巻百僚新誡五巻青宫紀要三十巻少陽政範三十巻列藩正論三十巻維城典訓二十巻俱武后撰訓紀雜載十巻武后撰采青宫紀要維城典訓古今内範内範要略等書為雜載云唐書藝文志開元訓誡𤣥宗御撰開元二十五年八月甲子帝制訓誡六篇以示諸王其㫖葢明君臣父子之義齋祭稼穡之事忠王璵等上表請宣付史館及示百僚許之宰臣奏聖謨垂訓輝映千古望宣布中外手詔諭曰周公誡伯禽曰無以魯國驕人朕方聖雖慙豈忘誡子聊示庭訓何足宣布玉海開元御集誡子書一巻唐書藝文志按此訓誡即御集誡子書也明皇老子注二巻疏一巻𤣥宗御撰自製序曰朕承寡薄常感斯文恐失無為之理每因清宴輒扣𤣥闗隨意所得遂為箋註豈成一家之說但備遺闕之文文苑英華晁氏曰唐𤣥宗撰天寳中加號元通道德經世不稱焉又頗増其辭如兒貴食母作兒貴求合於母之類貴食母者嬰兒未孩之義諸侯之子以大夫妻為食