思邈撰晁氏曰唐孫思邈撰思邈博通經傳洞明醫術著用藥之方診脈之訣針灸之穴禁架之法以至導引養生之要無不周悉後世或能窺其一二未有不為名醫者然議者頗恨其獨不知傷寒之數云讀書志千金翼方三十巻孫思邈撰晁氏曰思邈著千金方復綴集遺軼以羽翼其書成一家之言林億等謂首之以藥録次之以婦人傷寒小兒養性辟榖退居補益雜病瘡癰色脈針灸而禁經終焉者皆有指意云讀書志陳氏曰其末兼及禁術用之多騐文獻通考千金食治孫思邈撰李時珍曰唐孫思邈撰千金備急方三十巻采摭素問扁鵲華佗徐之才等所論補養諸說及本草闗於食用者分米榖菓菜鳥獸蟲魚為食治附之亦頗明悉本草綱目養生要録一巻枕中素書一巻攝生真録一巻馬隂二君内傳一巻太清真人煉雲母訣二巻氣訣一巻燒煉秘訣一巻龍虎通元訣一巻龍虎亂日篇一巻幽傳福壽論一巻㑹三教論一巻龍虎篇一巻龜經一巻五兆筭經一巻龜上五兆動揺經訣一巻福禄論三巻千金髓方二十巻神枕方一巻醫家要妙五巻退居志一巻真氣銘一巻五藏旁通明鑑圖一巻針經一巻玉涵方三巻千金月令一巻千金養生論一巻養性延命集二巻養性雜録一巻養生銘禁經二巻五臟旁通導養圖一巻芝草圖三十巻太常分藥格一巻崔氏産鑑圖一巻攝生月令圖一巻六氣導引圖一巻侍膳圖一巻坐照論並五行法一巻金鏁子訣一巻内外神仙中經秘宻圖一巻黄帝神竈經三巻丹經訣要一巻神仙修養法一巻以上俱孫思邈撰思邈京兆華原人通百家說善言老子莊周於隂陽推歩醫藥無不善孟詵盧照隣等師事之唐書本傳辨正論八巻闗中僧法琳撰晁氏曰唐釋法琳撰潁川陳良序云法琳姓陳闗中人著此書窮釋老之教源極品藻之名理宣和中以其老子語焚毁其第二第四第五第八凡五巻序文亦有剪棄者讀書志破邪論二巻甄正論三巻俱法琳撰晁氏曰唐釋法琳撰已上三書皆經宣和焚毁藏中多闕故録之晁氏讀書志按破邪甄正二論昭德讀書記以為宣和焚毁藏中多闕然愚嘗於邨寺經藏中見其全書破邪論專詆傅奕而並非毁孔孟所謂詖淫邪遁之詞無足觀者甄正論譏議道家如度人經璇璣停輪處以為璇璣無停輪之理使停輪至七日七夜則宇宙顛錯而生人之類滅矣無極曇誓天及龍變梵度天處以為曇與梵二字出自佛書佛法未入中國之前經傳中並無此二字豈有天帝名號而剽竊佛書字義乎又如河上公道德章句序言漢文帝駕詣河上公問道而河上公一躍騰雲帝知是神人下輦稽首從受章句二巻以為漢史記車駕每出必書何獨不書駕詣河上公問道之事且孝文好黄老言立渭陽五帝廟則因新垣平平一方士其說至卑陋帝尊寵之而史亦備述之河上公之事竒偉如此何獨見遺於班馬乎乃羽人道士輩自創此說此論頗當意必借筆於文學之士沙門輩恐不能道也文獻通考大唐京寺録傳十巻僧彦琮撰諌苑二十巻燕國公髙陵于志寧撰佛教賞罰三寶法一巻安養蒼生論一巻三徳論一巻入道方便門二巻衆經目録五巻鏡諭論一巻無礙縁起一巻十種讀經儀一巻無盡藏儀一巻發戒縁起二巻法界僧圖一巻十不論一巻懴悔罪法一巻禮佛儀式二巻俱新豐僧元琬撰按唐藝文志注元琬姓楊氏新豐人修身要覽十巻章懷太子賢撰春秋要録十巻君臣相起發事三巻俱章懷太子賢撰九鏡射經一巻射訣一巻檢校太子詹事京兆韋韞撰陳氏曰唐檢校太子詹事韋韞撰制弓矢法三篇射法九篇又叙其學射之初有張宗者授之訣為射訣文獻通考中樞龜鏡一巻許國公武功蘇瓌撰初瓌謂子頲有公輔之器因以宰相事業訓之凡二十七條宋開府見之請號曰龜鏡書目諌林二十巻續世說新書十巻神仙後傳十巻園庭草木疏二十一巻王氏神通記十巻新本草四十一巻針灸服藥禁忌五巻袖中備急要方三巻嶺南急要方二巻藥性要訣五巻俱廣州都督咸陽王方慶撰四分律疏二十巻長安僧惠滿撰大乘要句三巻新豐僧空藏撰博聞竒要二十巻武功徐闉撰開元武功縣人徐闉上詔試文章留集賢院校理唐書藝文志外臺秘要方四十巻給事中郿人王燾撰珪孫燾性至孝為徐州司馬母有疾彌年不廢帶視絮湯劑數從髙醫㳺遂窮其術因以所學作書號外臺秘要討繹精明世寶焉唐書本傳晁氏曰燾在臺閣二十年久知𢎞文館得古方書數千巻因述諸病症候附以方藥符禁灼灸之法凡一千一百四門天寶中出守房陵及太寧郡故以外臺名其書孫兆以燾謂鍼能殺生人不能起死人取灸而不取鍼譏其為醫之蔽予獨以其言為然讀書志陳氏曰其書博采諸家方類如肘後千金世尚多有之至小品深師崔氏許仁則張文仲之類今無傳者猶間見於此書云文獻通考外臺要畧十巻王燾撰神仙可學論一巻道士華陰吳筠撰晁氏曰唐吳筠撰嵇康謂神仙不可以學致筠意不以為然故演修習之方以勉學仙之士云讀書志兩同書一巻吳筠撰陳氏曰不著名氏中興書目云唐吳筠撰唐藝文志同但入小說類采孔老為内外十篇名祝融子兩同書祝融者謂鬻子為諸子之首也文獻通考按唐宋藝文志皆稱筠撰惟崇文總目云羅隐撰形神可固論一巻著生論一巻明真辨偽論一巻心目論一巻𤣥門論一巻諸家論優劣事一巻辨方正惑論一巻宋藝文志作辨方士惑輔正除邪論一巻元綱論一巻復淳化論一巻道釋優劣論一巻俱吳筠撰筠通經誼美文辭𨽻道士籍入嵩山依潘師正究其術卒弟子諡宗元先生文章深詆釋氏唐書本傳天文事序議一巻長安韓滉撰老子道徳經四巻唐宗室協律郎李約注古今國典一百巻㑹要四十巻俱武功蘇冕撰南華通微十巻鳯翔元載撰太白還丹篇一巻陳氏曰稱清虛子太白山人唐貞元時文獻通考孫子注二巻左補闕萬年杜牧撰自序曰孫武所注十三篇太約用仁義使機權魏武帝所為注解十不釋一予因取武書備為其注曹之所注亦盡存之分為上中下巻後之人有讀武書予解者因而學之猶盤中走丸丸之走盤横斜圓直計於臨時不可盡知其必可知者是知丸不能出於盤也本書原序晁氏曰牧以武書大畧用仁義使機權曹公所注十不釋一因備注之世謂牧慨然最喜論兵欲試而不得者其學能道春秋戰國時事甚博而詳知兵者有取焉讀書志理道要訣十巻宰相萬年杜佑撰陳氏曰唐宰相杜佑君卿撰凡三十三篇皆設問答之辭末二巻記古今異制葢於通典中撮要以便人主觀覽文獻通考管子指畧二巻杜佑抄國史志唐杜佑抄管氏書為指畧序稱房喬所注而舊録皆作尹知章文句無復小異今本房𤣥齡注有經言外言内言短語區言雜篇輕重玉海意林三巻戸部尚書扶風馬總撰晁氏曰唐馬總㑹元撰初梁庾仲容取諸家書術數雜記凡一百七家抄其要語為三十巻總以其繁畧失中増損成三軸前有戴叔倫楊伯存兩序讀書志子抄百十有七家仲容所取或數句或一二百言是有以契其意入其用而他人不可共享者也馬總意林一遵庾目多者十餘句少者一二言比子抄更為取之嚴録之精且約也戴叔倫序其書曰上以防守教之失中以補比事之闕下以佐屬文之緒有疏通廣博潔浄符信之要無僻放拘刻譤蔽邪蕩之患陸機曰傾羣言之􅄋液潄六藝之芳潤是庶幾焉髙氏子抄意樞二十巻馬總撰六帖三十巻刑部尚書渭南白居易撰晁氏曰唐白居易撰以天地事物分門類為聲偶而不載所出書曽祖父秘閣公為之注行於世世傳居易作六帖以陶家缾數千各題名目置齋中命諸生采集其事類投缾内倒取之抄録成書故所記時代多無次序云讀書志白樂天取凡書精語可備詞賦制文采用者各以門目類粹而總名其書為六帖既不自釋所以名後人亦無辨偶閱唐制其時取士凡六科别其所試條件毎一事名一帖其多者明經試至十帖而說文極於六帖白之書為應科第設則以帖為名其取此矣程氏衍繁露八漸通真議一巻白居易撰栁氏小說舊聞六巻華原栁公權撰元聖蘧廬二巻亳州刺史京兆李繁撰晁氏曰唐李繁撰繁學於江西僧道一敬宗時嘗與丁公著陸亘入殿中抗佛老講論唐虞韓愈稱其家多書一覽終身不忘太和中舒元輿誣其濫殺不辜繫獄知且死著書十六篇以明禪理自謂臨死生而不懼賢於顔回在陋巷不改其樂嗚呼可謂賢矣而史載其生平行事甚醜獨何歟讀書志樂善録十巻司牧安驥方一巻司牧安驥集三巻俱唐宗室司馬李石撰西京巢氏水氣論一巻不著名續曹大家女訓十二篇薛䝉妻京兆韋氏撰廣人物志十巻鄉貢進士京兆杜周士撰陳氏曰唐鄉貢進士京兆杜周士撰叙武德至貞元選舉薦進人物事實凡五十五科文獻通考蘇氏演義十巻武功進士蘇鶚撰陳氏曰唐光啓進士武功蘇鶚徳祥撰考究書傳訂正名物辨證訛謬有益見聞尤梁谿以家藏本刻之當塗文獻通考杜陽雜編三巻蘇鶚撰晁氏曰唐蘇鶚字徳祥撰家武功杜陽川雜録廣徳以至咸通時事讀書志獨行方十二巻玉壺備急方一巻俱嶺南節度京兆韋宙撰劉公嘉話録一巻義武軍節度京兆韋絢撰晁氏曰唐韋絢撰劉公謂禹錫絢字文明執誼子也咸通中節度義武幼從學於禹錫録其話言讀書志戎幙閒談一巻韋絢撰晁氏曰唐韋絢撰太和中為李徳裕從事記徳裕所談讀書志賔客佳話一巻佐談十巻俱韋絢撰夣雋一巻周公解夣一巻俱宰相華原栁燦撰魏氏要畧二十巻澄城魏謩撰三水小牘三巻皇甫牧撰陳氏曰唐皇甫牧遵美撰天祐中人三水者安定屬邑也文獻通考華嚴經百門義海兩巻長安僧法藏撰晁氏曰唐僧法藏撰長安崇福寺僧也分十章讀書志華嚴奥㫖一巻法藏撰大唐京寺録巻亡法琳别傳二巻俱僧法藏撰晁氏曰唐僧法藏撰又曰妄盡還源觀凡六門讀書志玉泉筆端三巻又别一巻陳氏曰不著名氏有序中和三年作末有䟦云扶風李昭徳家藏之書也即故淮海相公孫又稱黄巢陷洛之明年䟦亦不知何人别一本號玉泉子比此本少數條而多五十二條無序䟦録其所多者為一巻文獻通考月波洞中記一巻晁氏曰序稱唐任逍遥得之於太白山月波洞石壁上凡九篇相形術也讀書志後畫録一巻僧彦宗撰晁氏曰唐僧彦宗撰品長安名畫凡二十七人讀書志本草性事類一巻京兆醫工杜善方撰禹錫曰京兆醫工杜善方撰不詳何代人凡一巻以本草藥名隨類解釋附以諸藥制使畏惡相反相宜解毒者本草綱目黄庭五臟六腑圖一巻太白山見素女子胡愔撰九室指元篇一巻宋華山隱士陳搏撰搏好讀易手不釋巻自號扶揺子著指元篇八十一章言導養及還丹之事宋史本傳希夷先生龜鑑一巻陳搏撰陳氏曰陳搏圖南撰劉康國注館閣書目作人倫風鑑文獻通考清異録二巻翰林學士新平陶穀撰晁氏曰稱翰林學士陶榖撰凡天文地理花木飲食器物毎事皆制為異名新說其為書始似雲仙散録而語不類國初人葢假託也讀書志儀天厯十六巻太子洗馬京兆史序撰史序字正倫善推步厯筭補司天學生又知監事修儀天厯上之宋史本傳天文厯書十二巻乾坤寳典四百五十五巻乾坤總録五巻俱史序撰補政忠言十篇太常博士華州趙湘上䝉書十巻長安种放撰兵書十五巻工部侍郎中部楊偕撰偕字次公性剛而忠樸尤喜古今兵法有兵書十五巻宋史本傳正䝉書十巻著作郎長安張載撰晁氏曰張載子厚撰張舜民嘗乞追贈載於朝云横渠先生張載著書萬餘言名曰正䝉陰陽變化之端仁義道徳之理死生性命之分治亂國家之經罔不究通方之前人其孟軻揚雄之流乎此書是也初無篇次其後門人蘇昞等區别成十七篇又為前後序又有胡安國所傳篇為一巻末有行狀一巻讀書志藍田吕氏曰先生晚自崇文移疾西歸終日危坐一室左右簡編俯而讀仰而思有得則識之或中夜起坐取燭以書其志道精深未始須臾息亦未嘗須臾忘也熈寧九年秋集所立言謂之正䝉出示門人曰此書予厯年致思之所得其言殆與前聖合大要發端示人而已其觸類廣之則吾將有待於學者文獻通考西銘集解一巻張載撰藍田吕大臨等解陳氏曰張載作訂頑砭愚二銘後更曰東西銘其西銘即訂頑也大抵發理一分殊之㫖有趙師俠者集吕大臨胡安國張九成朱熹四家說為一篇刻之興化軍龜山楊氏曰西銘理一而分殊知其理一所以為仁知其分殊所以為義所謂分殊猶孟子言親親而仁民仁民而愛物其分不同故所施不能無差等耳或曰如是則體用果離而為二矣曰用未嘗離體也以人觀之四支百骸具於一身者體至其用處則首不可以加屨足不可以納冠葢即體而言分已在其中矣文獻通考信聞紀一巻張載撰晁氏曰張載撰雜記經傳之義辨釋老之失讀書志尉繚子注一巻張載撰晁氏曰張載撰其辭甚簡蚤年喜談兵後謁范文正文正愛其才勸其學儒載感悟始改業此殆少作也讀書志語録三巻雜述一巻俱張載撰吕氏老子注二巻秘書省正字藍田吕大臨撰晁氏曰吕大臨撰其意葢以老氏之學合有無謂之𤣥以為道之所由出葢至於命矣其言道體非獨智之見孰能臻此求之終篇謬於聖人者葢寡但不當以聖智仁義為可絶棄耳讀書志南還録二巻吏部侍郎新平張舜民撰晁氏曰張舜民芸叟撰舜民元豐中從軍攻靈州師還謫授郴州監酒即日之官記途中所厯並其詩文文獻通考雜記一巻畫墁録一巻俱張舜民撰捜神秘覽三巻壑源茶録一巻俱京兆章炳文撰唐語林八巻長安王讜撰陳氏曰長安王讜正甫撰以唐小說五十家倣世說分門三十五又益十七為五十二門中興書目十一巻而闕記事以下十五門又云本亦止八巻而門目皆不闕文獻通考紹聖安邊策衛尉少卿武功游師雄撰哲宗數訪邊防利病師雄具慶厯以來邊臣施置之臧否朝廷謀議之得失及方今禦敵之要凡六十事名曰紹聖安邊策上之宋史本傳本草廣一作衍義二十巻通直郎華隂冦宗奭撰晁氏曰冦宗奭編以本草二部著撰之人或執用已私失於商確併考諸家之說叅之事實覈其情理證其脫誤以成此書讀書志陳氏曰其書援引辯證頗可觀采文獻通考時珍曰冦宗奭撰以補註及圖經二書叅考事實覈其情理援引辯證發明良多東垣丹溪諸公亦專信之但以蘭花為蘭草巻丹為百合是其誤也書及序例凡三巻平陽張魏卿以其說分附各藥之下合為二書本草綱目師友談記一巻華州李廌撰晁氏曰李廌方叔撰多記蘇子瞻范純夫及四學士所談論故曰師友讀書志德隅堂畫品一巻李廌撰陳氏曰李廌方叔撰趙令畤德麟官襄陽行槖中諸畫方叔皆為之品評元符元年也文獻通考水心鏡一百六十七巻光禄大夫延安韓彦直撰彦直字子温嘗摭宋朝事分為類目名水心鏡為書百六十七巻禮部尚書尤袤修國史白於朝下取是書以進光宗覽之稱善宋史本傳永嘉橘録一巻韓彦直撰陳氏曰知温州韓彦直撰世忠長子也文獻通考天經十九巻同州進士王及甫撰陳氏曰同州進士王及甫撰不知何人其書定是非協同異由博而約儒者之善言天者也文獻通考通幽子靈台隱秘寳符一巻扶風隱者宋史藝文志補妬記一巻京兆王績編晁氏曰古有妬記久而忘之不知何人輯傳記中婦人嚴妬事以補亡讀書志陳氏曰稱京兆王績編不知何時人古有宋虞之妬記等久不傳故補之自商周而下迄五代史傳所有妬婦皆載之末及神怪雜說文論等最後有治妬二方尤可笑也文獻通考侯子雅言華隂侯仲良撰韓子十巻槩言二十五篇硯纂八巻比見記三巻俱元叅議奉元楊奐撰辛巳厯集賢學士奉元楊恭懿撰恭懿字元甫奉元人至元十六年詔於太史院改厯十七年三月進奏曰臣等徧考自漢以來厯書四十餘家精思推算舊儀難用而新者未備故日行盈縮月行遲疾五行周天其詳皆未精察今權以新儀木表與舊儀所測相較得今嵗冬至晷影及日躔所在與列舍分度之差大都北極之髙下晝長則夜短參以古制創立新法推算成辛巳厯雖或未精然比之前改厯者附㑹元厯更日立法全踵故習顧亦無媿然必每嵗測騐積改至三十年庶盡其法可使如三代日官世專其職測騐良久無改嵗之事矣元史本傳靖川語録明三原馬貴撰薛思菴野録三巻金華府同知渭南薛敬之撰序曰思菴之學以存心為宗㫖以求静力行為工夫所著野録皆從身心體騐中流出凡天地鬼神之奥人倫物理之常靡不研窮究極而尤歸重此心切近精實不詭於洙泗濓洛之㫖可謂知所本矣本書馮從吾序洙泗言學録道學統基俱薛敬之撰先生嗜道若飴老而彌篤又好静坐思索凡有所得即以劄記所著道學統基諸書其言多有補於名教云闗學編進修筆録談録草堂語録三泉堂漫録厚鄉録動静圖說漫語俱南京戸部尚書三原王承裕撰性理發微吳江縣丞涇陽馬珵撰張大器語録保定廵撫咸寧張鼎撰張鼎字大器少受學於河東薛文清日勤勵於聖賢之學諸子百家雖靡不研究而一秉於濓洛闗閩之㫖文清公深器重之闗學編正䝉㑹稿戸部尚書咸寜劉璣撰武經類編淮揚總漕西安衛楊宏撰無逸篇一巻宦裔警鑒一巻俱四川副使西安謝朝宣撰醫經小學壽親養老補遺傷寒治例俱咸寧劉純撰兵法綱目一巻養浩論一巻俱蘇州同知朝邑王􅈟撰宋四子抄釋南京禮部右侍郎髙陵吕柟撰涇野先生語録吕柟撰序曰涇野先生語録言言皆自躬行心得中流出最透悟最精實可與西銘正䝉並傳不朽余自髫年即嗜好不離第原録嵗久板且漫漶因僣為訂正而以先生傳附於後燦然成一完録矣舊名内篇今更題曰涇野先生語録志實也按台東郊畢公鋟梓以廣其傳本書馮從吾序諭解州畧一巻吕柟撰序曰諭解州畧乃涇野先生所撰輯以道乎解梁士民者也其言信而直其事簡而畧猶衣食切於人不可缺解人親炙之久宜乎風俗丕變至於今不能忘也本書胡大器序正䝉拾遺苑洛語録俱兵部尚書朝邑韓邦竒撰邦竒天禀髙明學問精到明於數學大類邵堯夫而論道體乃獨取張横渠所著有苑洛語録諸書傳世闗學編珍珠船二巻墅談二巻清涼經一巻俱鴻臚少卿咸寧胡侍撰友山浪談一巻山西僉事朝邑王朝雍撰武經註解副將長安張我英撰後垣𤣥機妙方咸寧管澤撰秦闗全書藍田舉人王之士撰長安馮從吾編序曰王秦闗先生理學醇儒也其學以盡性無欲為宗近裡着已甘貧苦節世共髙之先生冡嗣持先生著作數種乞余訂正乃命門人輩編次以歸之而以文簡公粹語及飛泉公語録列於前見先生學問淵源所自其曰先師遺訓先君遺訓者先生所自命也其他諸録皆躬行心得之言足以羽翼聖賢扶持名教非世之騁空譚而尠實用者可比云本書馮從吾序按全書内多載之士語録以其為儒家者流故不歸集部越中述傳四巻兵備道渭南南逄吉撰序曰王文成公講學東南從逰者幾半天下闗中則有南元善元貞昆季二先生録公語幾數萬言藏之家塾元貞先生孫子興太史倣蘇季明校正䝉例離為四篇曰立志格物從政教人總題曰越中述傳曰是所以致良知也本書馮從吾序老子斷註戸部郎臨潼趙統撰被褐子五巻按察使朝邑王學謨撰宗極論一巻韓城衛王道撰困言四巻左叅政西安周宇撰忍字測三巻周宇撰序曰槐村先生闗中躬行君子也􅇓心問學而於聲律字學尤為士大夫所山斗冢嗣淑逺出先生忍字測三巻示予予受而讀之喟然曰道葢在此乎遂代為校讐付剞劂氏觀此編其於先生生平問學思過半矣本書馮從吾序一中十巻見物四巻一中大原二巻醫談一巻俱兩淮運使咸寧李蘇撰閒懶子一巻朝邑監生王朝雍撰觀宇觀宙天經天雅天典天引天朔天極俱長沙别駕三水文在中撰各三十六帙十二友記一巻驛傳道朝邑王嗣美撰序曰余丁亥嵗承乏河東案牘之暇自以年暮於世間一切都無所嗜惟是日用擕帶之物如影之隨形頃刻離之不得然皆雅淡無俗物其中滋味愈玩愈長以此為盍簮之助爰為之記本書自序三魔記一巻王嗣美撰序曰余素負山林癖沉酣泉石浸入膏肓圖水石而仰宗炳之卧逰畢婚嫁而追向平之雅志故著有十二友以訂寒素迨案牘之暇再記三魔總之忘情塵界歸於𤣥適􅂓以陶寫性靈卒吾嵗月云爾本書自序崇雅三約十議書一巻申明教化書一巻澄道四脈俱王嗣美撰日省近言同州馬樸撰序曰馬敦若日省近言讀之近在耳目之前逺達寰宇之廣顯寓形色之常淵入性命之奥味之而雋徵之而信殆追嫓薛敬軒之粹言矣本書盛以𢎞序闗中四先生要語四巻工部尚書長安馮從吾輯題曰涇野先生語録故二十七巻苑洛先生語録故六巻海内傳誦已久至谿田先生語録止存數則於嵯峨書院志中斛山先生語録附刻於遺稿後人多未幾知余讀其語録慨焉有慕因彚録其言之尤要者分為四巻以便觀省本書馮從吾題辭學翼馮從吾撰序曰講學第一要令人啓信必啓信而後可與言也既信矣使不防忌則一傅衆咻不免方信而忽疑故又當防忌既防忌矣使不正趨則佛老之說得混其中故又當正趨趨正矣使不明源則源頭未透不過支離口耳之學故又當明源源明矣若不勵功雖有所窺總屬虚見故又當勵功勵功矣道體無窮功夫亦無盡一息尚存此志不容少懈也故以詣極終焉余標此六目而各採宋元及明諸儒粹言以實之凡我同志尚􅇓心於斯云本書自序澗陸語畧共學講語典學堂㑹語榆介講語俱光禄少卿渭南史記事撰濟隂綱目總督三邊臨潼武之望撰序曰嘗見王宇泰所輯女科準䋲廣搜博採古今悉備然一切雜病亦復槩收不無駢枝贅疣之弊因於公事之暇手為蒐集汰去諸雜症而專以婦人所獨者彚為一書分門别類於綱之下各繫以目焉本書自序醫幟疹科武之望撰錢來山房叢書百巻華陰張毓翰撰九極篇光禄少卿三水文翔鳳撰太微經文翔鳯撰序曰西極太青文子鏤心鳥跡之中織辭魚網之上夫既洞性命之奥區極才思之神臯矣乃衙官太𤣥驅役􅇓虚其協於卦爻者有六十四卦三百八十四爻名曰太微太微有四經十二賛十六圖六十四緯四表凡一百篇其道以作聖而恢王窮神而合天而一切天綱地紀人極物華之全無不準其建都立官制軍行師之法盡本於参兩錯綜之數不覺矍然於易理之深明也本書賈鴻洙序癡醒子三十巻太子太保渭南南企仲撰致曲言二巻兵部員外岐山張舜典撰序曰心虞以理學鳴闗中輯其學之所得題曰致曲言葢自言其聞見知次之意因以朂人俾從誠入不至大而無當若河漢而無極也剖六藝之同異析諸子之乖離不執於一不疑於二其言極醇無疵獨契正學之微以視當世得失之林殊矣本書王嗣虞序明德録張舜典撰大六壬兵機百煉金輞川龎居珍撰臆論一巻東昌府别駕翟事心撰養生日録四川僉事盩厔王三聘撰六緯質難七巻左通政蒲城李應策撰閒中今古六巻咸寧秦可貞撰象罔一得二巻椎輪始草俱咸寧王紹徽撰老子解川東道鳯翔袁楷撰草木靈異録華隂王汝霖撰竒器圖說三巻續竒器圖說一巻按察僉事涇陽王徵撰序曰闗西王公竒器圖說一書採輯者為巻三創置者為巻一葢公贍智宏材披天根而潄地軸所製自行車自行磨已足㕍行武侯而虹吸鶴飲之偹旱潦輪壺之傳刻漏水銃之滅火災連弩之禦大敵代耕之省牛馬因風趁水之不煩人力其有禆於飛輓轉運軍旅農商瑣細米鹽小大悉備逸勞相萬矣則公之書固非常偉業是胡可以不傳也因手繪而授之梓本書武位中序兩理畧百字解心了丹厯代發䝉道說俱僉事涇陽王徵撰念祖録一巻尚友録養正録就正録書紳篇俱樂昌知縣咸寧楊復亨撰珊瑚林主事咸寧韓在撰敦倫庸言訓書規則畧俱郟縣知縣三原張善治撰克己藥言龍安府同知盩厔楊楠撰臆編一巻耀州李㑹心撰别世言一巻國朝朝邑雷于霖撰引曰栢林翁行年七十有五兩足痿痺一綫殘喘寸靈之中絶不作一室之慮獨此善脉相資善氣相延者耿耿然不置諸懷形器雖枯靈明猶存故為别世之言别世言引太極圖說一巻雷于霖撰序曰吾之為是說也析元公之圖印我心之同總以一極二五者貫通於天地人物之間曰真曰精不越此中正仁義要使覽之者定以妙合静以凝成誠以審感動之機有善而無惡敬以嚴修悖之介有吉而無㓙純仁精義徹始終而無二齊生死為一致也本書自序西銘續生篇一巻雷于霖撰序曰西銘者横渠夫子續大生之徳而作也予自志學之年一見是篇若獲固有今七十二嵗造物者將息我也卧床一載思吾生有盡吾生生之心無盡遂於伏枕飲藥之中勉作註釋五千三百餘字期與天下萬世仁人孝子共續此大生之徳於永永不窮也本書自序四言烏哺一巻雷于霖撰性理三解吳橋知縣王越撰自新録一巻富平惠靇嗣撰引曰余念學問之道不日長進即日消亡竊虞其銳始怠終虚延嵗月未有真修實證故凡一切閱厯偶有所觸發輒筆之於􅁽以自騐功力之淺深云本書自序存言一巻蒲城楊仕顯撰引曰余於古先聖賢之嘉言輒樂為之記案頭積累千條時或紛錯之後細讀幾條不覺耳聰目明己丑春被兵火盡歸烏有庚寅南逰舟中猶識數欵偶筆記之門弟唐天則梓以傳本書自序傷寒辨證四巻三原陳堯道撰序曰素中少負異質勵精學古出其緒餘旁通於醫上遡軒岐下迄來兹無論内難金匱甲乙諸經以及華原河間東垣丹溪諸集靡不抉微捜奥即近代如吳郡之醫案㑹稽之類經雲間之微論三山之救正之類亦莫不洛誦瀾翻至横口竪筆畧無留難雖委巷繩樞必往或勸其自重曰令病病者又病貧吾不忍也手編傷寒辨證一書折𠂻諸家參伍衆論彌縫其闕失而匡救其不逮析疑訂訛綱提臚列覽者較若列眉曠然發䝉所以康世利民非徒以其文已也本書石朗序痘科辨證二巻陳堯道撰序曰治痘之家各有成書不過解毒補托二端而已然痘疹應氣運而為虚實若辨證一或不審則解毒補托總無是處余自丙戌集有痘科辨證亦覺條分縷析今取舊書増補之大約治法機權不自我操止以痘瘡為主必先嵗氣而明辨夫虛實寒熱解毒之中寓有升發之義實為心得之妙也本書自序日省録四巻刑部侍郎涇陽王承烈撰序曰日省録者涇干王遜功先生録所自得語也大之隂陽造化博之人倫物理精之身心性命以及吾儒異端所以異同離合之故罔弗究論而晰其淵源焉本書康吕賜序秋水堂遺論一巻咸陽貢士張調燮撰序曰先生采格言於先正發奥義於獨識言近而指逺詞約而理博可以持身亦可以涉世可以窮理亦可以盡性本書張雲翮序就正録二巻鄠縣張正撰序曰擇中語録純粹以精言不過辭意切實而不詭僻良由其殫力精究故能深入理窟有此實落學問也本書馮㻺序正學書一巻儆覺録二巻俱樂亭知縣富平來埏撰南阿語録五巻武功康吕賜撰二程語録寶鑑淳化貢生宋振麟輯性理纂要二巻􅃫翔教授咸陽王明弼撰序曰朱子於太極通書西銘諸書皆精明瑩白而千載之秘盡洩但大全一書議論繁多初學未易觀覽弼誦味之下妄加節畧間附己見務取貫通録成二巻題曰性理纂要以便省觀云本書自序江漢書院講義十巻文獻攬要十二巻荒政考二巻俱鄠縣王心敬撰集𩔖集之𩔖凡三曰楚辭𩔖曰别集𩔖曰總集𩔖按集𩔖頗繁其為宋元以前者皆雜採諸書自明以來散見郡縣志中作者既多純雜亦異其書未徵到者或散逸無存或瑕瑜不掩兹葢不濫入云漢髙祖傳十三篇髙祖與大臣述古語及詔策也漢書藝文志注髙祖歌詩二篇大風歌亦名三侯之章文中子大風安不忘危其霸心之存乎鴻鵠歌朱文公以為卒章意象蕭索非復三侯比矣玉海髙祖手詔一巻孝文傳十一篇文帝所稱及詔策漢書藝文志注武帝集二巻號令文章煥焉可述後世得遵洪業而有三代之風漢書武帝本紀賛上所自造賦二篇漢書藝文志師古曰武帝也藝文志注司馬遷集一巻龍門人司馬遷賦八篇漢書藝文志蕭望之賦四巻杜陵人官太子太傅劉辟疆賦八篇漢宗室官宗正張敞集一巻茂陵人官京兆尹劉徳賦九篇漢宗室韋𤣥成集二巻杜陵人官至丞相谷永集五巻長安人官諫議大夫劉向集五巻漢宗室光禄大夫杜鄴集二巻茂陵人官凉州刺史劉歆集五巻漢宗室班婕妤集一巻成帝宫人黄門書者假史王商賦十三篇杜陵人博士弟子杜參賦二篇師古曰劉向别録云臣向謹與長杜尉杜參校中秘書劉歆又云參杜陵人以陽朔元年病死死時年二十餘漢書藝文志注待詔馮商賦九篇陽陵人左馮翊秦歌詩三篇左馮翊史路恭賦八篇梁鴻集二巻平陵逸士鴻博覽無不通而不為章句入霸陵山中詠詩書彈琴以自娱仰慕前世髙士而為四晧以來二十四人作頌過京師作五噫之歌適吳􅇓閉著書十餘篇後漢書本傳馮衍集五巻京兆杜陵人衍幼有竒才所著賦誄銘說問交德誥慎情書記說自序官録說策五十篇肅宗甚愛其人後漢書本傳王隆集二巻馮翊雲陽人官新汲令王隆能文章所著詩賦銘書凡二十六篇後漢書本傳杜篤集一巻杜陵人官車騎從事篤博學不修小節所著賦誄吊書讃七言女誡及雜文十八篇後漢書本傳班彪集三巻安陵人拜徐令彪才髙而好述作所著賦論書記奏事合九篇後漢書本傳傅毅集五巻茂陵人官車騎司馬神雀賦一巻傅毅撰毅博學習章句肅宗召文學之士以毅為蘭臺令史文雅顯於朝廷著詩賦誄頌祝文七激連珠凡二十八篇後漢書本傳班固集十七巻安陵人官元武司馬離騷叙賛三篇班固撰固九嵗能屬文誦詩賦長博貫載籍九流百家之言無不窮究所著典引賔戲應譏詩賦銘誄頌書文記論議六言在者凡四十一篇後漢書本傳曹大家集二巻扶風曹世叔妻班昭撰班固幽通賦一巻班昭注班彪女名昭博學髙才有節行法度和帝令皇后諸貴人師事焉號曰大家所著賦頌銘誄問注哀辭書論上疏遺令凡十六篇子婦丁氏為撰集之後漢書本傳賈逵集二巻平陵人官侍中逵作詩頌誄書連珠酒令凡九篇後漢書本傳蘇順集二巻霸陵人官郎中順和安間以才學見稱隱處求道所著賦論誄哀辭雜文凡十六篇後漢書本傳誄書論四篇扶風曹衆撰三輔多士扶風曹衆伯師有才名著誄書論四篇後漢書蘇順傳竇章集二巻平陵人官大鴻臚章好學有文章與馬融崔瑗同好更相推薦後漢書本傳馬融集五巻茂陵人官南郡太守融才髙博洽不拘儒者之節所著賦頌碑誄書記表奏七言琴歌對策遺令凡二十一篇後漢書本傳李固集十巻南鄭人官太尉固好學究覽墳籍結交英賢有志之士為太尉叅録尚書事所著章表奏議教令對策記名凡十一篇弟子趙承等共論固言迹以為德行一篇後漢書本傳戹屯歌二十二章太常長陵趙岐傳中常侍唐衡兄玹為京兆虎牙都尉岐數為貶議玹深毒恨延熹元年玹為京兆尹岐懼禍逃難四方匿姓名賣餅北海市中時安丘孫嵩年二十餘逰市見岐察非常人載以俱歸嵩先入白母曰出行乃得死友迎入上堂饗之極歡藏岐腹壁中數年岐作戹屯歌二十二章後漢書本傳擬前代連珠書四十章趙岐傳張奐集二巻酒泉人徙華隂奐所著銘頌書教誡述志對策章表二十四篇後漢書本傳趙壹集二巻漢陽西縣人趙壹字元叔著賦頌箴誄書論及雜文十六篇後漢書本傳楊修集二巻華隂人官丞相主簿修字德祖好學有俊才所著賦頌碑讃詩哀辭表記書凡十五篇後漢書本傳韋誕集三巻三國京兆人仕魏光禄大夫誕字仲將有文才善屬辭章善書有名文章叙録傅㢲集二巻北地泥陽人仕魏侍中尚書傅嘏集二巻北地泥陽人仕魏尚書僕射傅𤣥集五十巻晉北地泥陽人官司𨽻校尉𤣥博學善屬文雖顯貴而著述不廢文集行於世晉書本傳杜預集二十巻杜陵人官征南將軍預博學多通明於興廢之道後為司𨽻校尉加位特進晉書本傳摰虞集十六巻長安人官秘書監衛尉卿虞少事皇甫謐才學博通著述不倦晉書本傳流别集三十巻摰虞撰虞撰古今文章𩔖聚區分為三十巻名曰流别集各為之論辭理愜當為世所重晉書本傳建安之後辭賦轉繁衆家之集日以滋廣晉代摰虞苦覽者之勞倦於是採擿孔翠芟剪繁蕪自詩賦下各為條貰合而編之謂為流别隋書經籍志傅咸集三十巻北地泥陽人官司𨽻校尉咸好屬文論雖綺麗不足而言成規鑒潁川庾純常嘆曰長虞之文近乎詩人之作矣晉書本傳文章駮論中書監泥陽傅祗撰祗早知名以才識明練稱著文章駮論十餘萬言晉書本傳傅暢集五巻北地泥陽人官秘書丞織錦㢠廻文詩一巻苻秦扶風竇滔妻武功蘇蕙作記曰滔鎮襄陽斷其音問蘇氏悔恨自傷因織錦㢠廻文五采相宣瑩心耀目其錦縱横八寸題詩二百餘首計八百餘言縱横反覆皆成章句其文㸃畫無缺才情之妙超古邁今名曰璇璣圖蘇氏笑而謂人曰徘徊宛轉自成文章非我佳人莫之能解遂齎致襄陽滔省覽錦字感其妙絶因具車徒盛禮邀迎蘇氏歸於襄陽恩好愈篤天后織錦㢠廻文記㢠廻文詩八巻蘇蕙撰韋瞻集十巻雍州秀才隋煬帝集五十五巻文章總集五千巻煬帝勅選隋煬帝㑹虞世南等四十人選文章自楚詞迄大業共為一部五千巻名文章總集又擇能書二千人為御書生分畨鈔書珍珠船楊素集十巻華隂人官太尉素好學研精不倦多所通涉善屬文工草𨽻嘗以五言詩七百字贈畨州刺史薛道衡詞氣宏㧞風韻秀上為一時盛作有集十巻隋書本傳何妥文集十巻西城人官國子祭酒韋鼎詩一巻京兆人太宗集三巻陳氏曰唐太宗皇帝本集四十巻館閣書目但有詩一巻六十九首而已今此本第一巻賦四篇詩六十五首後二巻為碑銘書詔之屬而訛謬頗多世所傳太宗之文見於石刻者如帝京篇秋日效庾信體詩三藏聖教序皆不在又晉書紀傳論稱制曰者四皆太宗御製也今獨載宣武二紀論而陸機王羲之傳論不預焉宣紀論復重出其他亦多有非太宗文雜厠其中者非善本也文獻通考髙宗集八十六巻垂拱集一百巻金輪集十巻俱則天皇后武氏撰中宗集四十巻􅌖宗集十巻𤣥宗集巻亡張說曰藝總六經漢光之學也文通三變魏祖之才也縁情定制五禮之本也洞音度曲六樂之宗也聖於翰墨蒼頡之妙也玉海德宗御集巻亡劉禹錫曰貞元中天子之文章煥乎垂光慶霄在上萬物五色舊紀天才秀茂文思雕華灑翰金鑾無媿淮南之作屬辭鈆槧何慚隴底之書文雅中興􅞅髙前代玉海竇威集十巻岐州人官内史令威字文蔚貫覽羣家言世胄子弟多喜武力威獨尚文諸兄詆為書癡髙祖入闗典禮湮缺威多識朝延故事乃裁定制度帝曰今之叔孫通也唐書本傳楊師道集十巻華隂人官工部尚書師道清警有才思善草𨽻工詩每與名士燕集歌詠自適帝見其詩為擿諷嗟賞後賜宴帝曰聞公每酣賞捉筆賦詩如宿構者試之師道再拜少選輒成無所竄定一坐嗟伏唐書本傳顔之推稽聖賦一巻岐陽李淳風注袁朗集十四巻長安人官給事中于志寧集四十巻髙陵人封燕國公續文選十三巻𢎞文館學士華隂孟利貞撰顔師古集六十巻萬年人官秘書監師古字籕其少博覽精訓故學善屬文唐書本傳令狐徳棻集三十巻華原人蕭徳言集三十巻長安人盈川集二十巻盈川令華隂楊烱撰晁氏曰唐楊烱華隂人顯慶六年舉神童授校書郎終婺州盈川令烱博學善屬文與王勃盧照隣駱賔王以文辭齊名海内稱王楊盧駱四才子亦曰四傑烱自謂吾愧在盧前恥居王後張說曰盈川文如縣河酌之不竭恥王後信愧盧前謙也集本三十巻今多逸亡讀書志李適集十巻萬年人官工部侍郎蘇瓌集十巻武功人官左僕射顔元孫集三十巻萬年人姚璹集七巻萬年人官尚書璹字令璋少力學才辯掞邁唐書本傳蘇許公集二十巻名頲武功人封許國公晁氏曰唐蘇頲廷石也武功人頲幼敏悟一覽五千言輒覆景龍後與張說以文章顯時號燕許李德裕謂近世詔誥惟頲序事外為文章韓休為序集本四十六巻今亡其半矣讀書志喬知之集一巻馮翊人官右侍郎陳氏曰唐右侍郎喬知之天授中為酷吏所陷死集中有緑珠怨葢其所由以致禍也文獻通考喬備集六巻馮翊人知之弟苑咸集巻亡京兆人開元末上書拜司經校書中書舍人貶漢東郡司戸參軍復起為舍人永陽太守唐書藝文志蘇源明前集三十巻武功人官秘書少監源明工文辭有名天寳間雅善杜甫鄭䖍唐書本傳元載集十巻岐山人劍南集節度華隂嚴武撰顔真卿文一巻萬年人晁氏曰真卿博學工辭章進士登制科代宗時為太子太師使李希烈為希烈所害世謂真卿忤楊國忠李輔國元載楊炎盧杞拒安禄山李希烈廢斥者以至於死而不自悔天下一人而已學問文章往往雜於神仙浮屠之說不皆合於理而所為乃爾者葢天性然也讀書志陳氏曰真卿之推五世孫師古曽姪孫按館閣書目嘉祐中宋敏求惜其文不傳乃集其刻於金石者為十五巻今本序文劉敞所作乃云吳興沈侯編輯而著沈之名劉元剛刻於永嘉為後序則云劉原父所序即宋次道集其刻於金石者也又不知何據元剛復為之年譜益以拾遺一巻多世所傳帖語且以行狀碑傳為附録魯公之裔孫裕自五代時官温州與其弟綸祥皆徙居永嘉樂清本朝世復其家且時褒録其子孫有登科者文獻通考吳興集十巻臨川集十巻盧集十巻俱顔真卿撰于邵集四十巻萬年人厯官侍郎王氏神道銘二十巻廣州都督咸陽王方慶撰竇拾遺集一巻左拾遺扶風竇叔向撰陳氏曰唐左拾遺扶風竇叔向撰包何為序羣庠牟鞏皆其子也文獻通考李泌集二十巻京兆人封鄴縣侯序曰鄴侯李泌字長源七嵗見丞相始興張公九齡張駭其聰異授以屬辭之要許以輔相之業洎始興殁不六十載公果至宰相封侯有文集二十巻其習嘉遯則有滄浪紫府之詩其在王廷則有君臣賡載之歌或依隱以玩世或主文以譎諌步驟六義發揚時風觀其辭者有以見上之任人始興之知人者已凡詩三百篇誌表記賛序議述又百有二十其五十篇缺獨著其目云本書梁肅序龍池集百三十篇左拾遺蔡孚獻開元二年六月左拾遺蔡孚獻龍池集王公卿士以上凡百三十篇請付太常寺其詞合音律者為龍池樂章以歌聖德從之初帝在藩與宋玉等居於興慶里時人謂為五王子宅及景龍末宅内神池涌出汛灔清瑩流之不竭中有龜龍逰焉故羣臣歌之􅁽府元龜李峴詩一巻京兆人官戸部侍郎吳筠宗元先生集十巻華隂人序曰先生諱筠字貞節華隂人生年十五篤志於道隱於南陽天寳初𤣥纁鶴版徵至京師請度為道士宅於嵩丘十三年詔入大同殿又詔居翰林累章乞還以禽魚自況藪澤為樂得請未幾盜泉汙於三川羽衣虛舟泛然東下棲匡廬登㑹稽浮河息天柱隱機埋照順吾靈龜有時放言以暢天理且以園公歌詠於紫芝𢎞景怡說於白雲故屬詞之中尤工比興觀其自古王化詩與大雅吟步虚詞逰仙雜感之作或遐想理古以哀世道或磅礴萬象用宜環樞稽性命之紀達人事之變大率以嗇神挫銳為本至於竒采逸響琅琅然若駕雲璈而凌倒影崑閬松喬森然在目門弟子有邵冀元者自先生化去二十五年𩔖其文章請傳永久其有遥迋卓詭之論猶不列於此編本書權徳輿序韋蘇州集十巻蘇州刺史京兆韋應物撰陳氏曰唐韋應物京兆人天寳時為三衛後作洛陽丞京兆府功曹知滁江二州召還或媢其進媒蘖之出為蘇州刺史詩律自沈宋以後日益靡嫚鎪章刻句揣合浮切雖音韻諧婉屬對麗宻而閒雅平淡之氣不存矣獨應物之詩馳驟建安以還得其風格云韓子蒼曰蘇州少以三衛郎事𤣥宗豪縱不羈𤣥宗崩始折節務讀書故其逢楊開府詩曰少事武皇帝無頼恃恩私身作里中横家藏亡命兒朝持摴蒱局暮竊東鄰姬司𨽻不敢捕立在白玉墀一字都不識飲酒肆頑癡云云然余觀其人為性髙潔鮮食寡欲所居掃地焚香而坐與豪縱者不𩔖其詩清深妙麗雖唐詩人之盛亦少其比又豈似晚節把筆學為者豈蘇州自序之過歟徐師川云韋蘇州詩人多言其古淡乃是不知言自李杜以後古人詩法盡廢惟蘇州有六朝風致最為流麗文獻通考李約詩一巻唐宗室官協律郎司空文明集三巻名曙京兆人官虞部郎中陳氏曰唐虞部郎中京兆司空曙文明撰别本一巻才數篇文獻通考李程表狀一巻唐宗室宰相李程集一巻李程擢進士宏辭賦日五色造語警拔士流推之唐書本傳竇常集十八巻京兆人官國子祭酒常字中行大厯中及進士第不肯調客廣陵多所著論杜佑鎮淮南署為參謀厯朗䕫江撫四州刺史國子祭酒唐書本傳南薫集三巻竇常撰晁氏曰唐竇常撰集韓翃至皎然三十人約三百六十篇凡三巻其序云欲勒上中下則近於褒貶題一二三則有等差故以西掖南宫外臺為目人各係名係賛讀書志竇鞏詩一巻京兆人竇氏聨珠集五巻竇常與弟牟羣庠鞏撰陳氏曰唐褚臧言所序竇氏兄弟五人詩各有小序曰國子祭酒常中行國子司業牟貽周容管經畧羣丹列婺州刺史庠胄卿武昌節度使鞏友封皆拾遺叔向子也五人惟羣以處士薦入諌省庠以辟舉餘皆進士科容齋洪氏隨筆曰竇氏聨珠序云五竇之父叔向當代宗朝善五言詩名冠流輩時屬正懿皇后山陵上注意哀挽即時進三章内考首出傳諸人口有命婦羞蘋葉都人挿柰花禁兵環素帟宫女哭寒雲之句可謂佳唱而畧無一首存於今荆公百家詩選亦無之是可惜也予嘗得故吳良嗣家所抄唐詩僅有叔向六篇皆竒作念其不傳於世今悉録之叔向字遺直仕至左拾遺出為溧水令唐書亦稱其以詩自名云文獻通考奏議集三十巻戸部尚書扶風馬總撰馬總字㑹元篤學雖吏事倥偬書不去前論著頗多唐書本傳韋貫之集三十巻萬年人官工部尚書韋武集十五巻萬年人官京兆尹表奏十巻令狐楚撰晁氏曰唐令狐楚字慤士撰楚相憲宗為文善於牋奏自為序云登科後為桂并四府從事掌牋奏者十三年始遷御史綴其藁得一百六十三篇自號曰白雲孺子讀書志斷金集一巻令狐楚編次晁氏曰唐李逢吉令狐楚自未第至貴顯所唱和詩也後逢吉卒楚編次之得六十餘篇裴夷直為之序讀書志漆匳集一百三十巻梁苑文𩔖三巻雜詩一巻俱令狐楚撰彭陽唱和三巻令狐楚與劉禹錫唱和僧廣宣與令狐楚唱和集一巻白氏長慶集七十一巻刑部尚書下邽白居易撰晁氏曰唐白居易樂天也唐史云太原人居易詩中自序生於鄭州滎陽貞元十七年進士中拔萃科元和初制策一等調盩厔尉入翰林為學士太和初遷刑部侍郎㑹昌初以刑部尚書致仕居易於文章精切然最工詩初頗以規諷得失及其多更下偶俗好當時士人争傳鷄林賈國相率篇易一金與元微之酬唱故號元白與劉禹錫齊名號劉白在杭州自𩔖詩藁分諷諭閒適感傷雜律四𩔖前集五十巻有元稹序後集二十巻自為序紀又有續後集五巻今亡三巻予嘗謂樂天進退以義風流髙矣與劉禹錫逰人謂之劉白而不陷八司馬黨中與元稹逰人謂之元白而不陷北司黨中又與楊虞卿為姻家而不陷牛李黨中嗚呼叔世有如斯人之彷彿者乎獨集後載聞李崖州貶二絶句其言淺俗似幸其禍敗者余固疑非樂天之語及以編年書考之崖州貶時樂天殁將踰年或曰浮屠某作也讀書志按唐書本傳居易其先葢太原人北齊時五兵尚書建有功賜田韓城子孫家焉又徙下邽據此則白氏世為陜人晁氏引唐史所云太原人固自其先世言之即詩中自序生於鄭州滎陽特自述其所生之地非遂家於滎陽也金針詩格三巻白居易撰晁氏曰唐白居易撰居易自謂與劉禹錫元稹皆以詩知名撮詩之體要為一格病得針而愈詩亦猶是也故曰金針集讀書志元白繼和集一巻元稹白居易三州唱和集元稹白居易崔元亮劉白唱和集三巻劉禹錫白居易元和制策三巻元稹獨孤郁白居易白行簡集二十巻下邽人官主客員外郎韋處厚集七十巻萬年人官中書侍郎平章事序曰按公未為近臣以前所著詞賦讃論記述銘志皆文士之詞也以才麗為主自入為學士至宰相以往所執筆皆經綸制置財成潤色之詞也以識度為宗觀其發徳音福生人沛然如時雨褒元老論功臣穆然如景風命相之􅁽和而莊命將之誥昭而毅薦賢能其氣似孔文舉論經學其博似劉子駿發十難以摧言利者其辨似管夷吾本書劉禹錫序韋温集十巻萬年人官吏部侍郎温字𢎞育日誦書數千言十一舉兩經及第唐書本傳李廓集一巻唐宗室官節度使陳氏曰唐寧武節度使李廓撰程之子也文獻通考沈亞之集十巻長安人官殿中丞御史内供奉晁氏曰唐沈亞之字下賢長安人元和十年進士終郢州掾亞之以文字得名常逰韓愈門李賀杜牧李商隱俱有擬下賢詩亦當世名輩所稱許云此本之後有景文宋公題字稱得之於端明李學士編次無倫葢唐本也予頗愛其能造語然其本極舛誤頗正是之且裒其遺闕者數篇及賀牧商隱三詩附於後讀書志樊川集二十巻外集一巻左補闕史館修撰京兆杜牧撰晁氏曰唐杜牧牧之也京兆人太和二年進士為詩清致豪邁人號小杜以别甫云臨終自為墓誌悉焚所為文其甥裴廷翰集其藁編次其文樊川葢杜氏所居外集皆詩也讀書志陳氏曰牧佑之孫在天台録集外詩一篇别見詩集𩔖未知是否牧才髙俊邁不羈其詩豪而艶有氣槩非晚唐人所及也文獻通考魏謩集十巻澄城人韋渠牟詩集十巻京兆人官諌議大夫序曰京兆韋君年十一常賦銅雀臺絶句右拾遺李白見而大駭因授以古樂府之學且以懷竒軼拔為己任至弱冠乃喟然曰四始五際今既逺矣㑹情靈者因於物象窮比興者在於聲律遂苦心藻慮儷辭比事纎宻清巧度越羣倫嘗著天竹寺六十韻魯郡文忠公序引而和之使畫工圖於仁祠摘句配境偕為勝絶又於江南著卧疾二十韻晉國忠肅公手翰以美之曰卓爾獨立其在韋生乎其為名臣宗公所稱賞如此所著凡三百篇以𩔖相從獻酬唱和因亦編次且以聖誕日麟徳殿三教講論詩為首凡十巻云本書權徳輿序栁仲郢集二十巻華原人官刑部尚書渭南集三巻渭南尉趙嘏撰晁氏曰唐趙嘏承祐也㑹昌四年進士終渭南尉杜紫微讀其早秋詩云殘星幾㸃雁横塞長笛一聲人倚樓因謂之趙倚樓云讀書志行義集十巻武功蘇鶚撰令狐綯疏表一巻華原人津陽門詩一巻鄭嵎撰晁氏曰唐鄭嵎字賔先大中五年進士津陽即華清宫之外闕嵎開成中過之聞逆旅主人道承平故實明日馬上裁刻成長句一千四百言自有序云讀書志陳氏曰或作愚者非也愚嘗為嶺南節度好着錦半臂非此鄭嵎文獻通考投知小録三巻工部侍郎京兆秦韜玉撰晁氏曰唐秦韜玉字中明京兆人有辭藻工歌吟險而好進為田令孜所善僖宗幸蜀令孜引為工部侍郎中和二年賜進士第編入春榜讀書志翁承贊集二巻京兆人官諌議大夫陳氏曰諌議大夫京兆翁承贊撰乾符二年進士文獻通考李洞詩一巻唐宗室晁氏曰唐李洞字才江慕賈島為詩銅鑄其像事之如神時人多誚其僻澁不貴其竒峭唯吳融稱之昭宗時不第逰蜀卒讀書志陳氏曰與張喬同時稱餘杭明經潘熙載編文獻通考句圖一巻李洞撰韓偓詩二巻香奩集一巻京兆人官兵部侍郎晁氏曰唐韓偓致光京兆人龍紀元年進士累遷諌議大夫翰林學士昭宗幸鳳翔進兵部侍郎承㫖朱全忠怒貶濮州司馬榮懿尉天祐初挈族依王審知而卒香奩集沈括筆談以為和凝所作凝既貴惡其側艶故詭稱偓著或謂括之言妄許彦周詩話髙秀實言元微之詩麗而有骨韓偓香奩集麗而無骨李端叔意喜韓偓詩誦其序云咀五色之靈芝香生九竅咽三危之瑞露美動七情讀書志石林葉氏曰偓在閩所為詩皆手自寫成巻嘉祐間裔孫奕出其數巻示人龎頴公為漕取奏之因得官詩文氣格不甚髙吾家僅有其詩百餘篇世傳别本有名香奩集者唐書藝文志亦載其辭皆閨房不雅馴或謂江南韓熈載所為誤以為偓文獻通考杜壽域詞一巻京兆杜安世撰陳氏曰京兆杜安世壽域撰未詳其人文獻通考浣花集五巻僣蜀吏部侍郎平章事京兆韋莊撰晁氏曰偽蜀韋莊字端己仕王建至吏部侍郎平章事集乃其弟藹所編以所居即杜甫草堂舊址故名偽史稱莊有集二十巻今止存此讀書志採𤣥集一巻韋莊集又𤣥集三巻韋莊集序曰沙之汰之始辨辟寒之寶載雕載琢方成瑚璉之珍故頷下採珠難求十斛管中窺豹但取一斑自國朝大手名人以至今之作者或百篇之内時紀一章或全集之中微徵數首但掇其清詞麗句總其紀得者才子一百五十人誦得者名詩三百首昔姚合所撰極𤣥集一巻傳於當代已盡精微今更採其𤣥者勒成又𤣥集三巻本書自序諌疏牋表四巻諌草一巻俱韋莊撰韋藹詩一巻京兆人莊弟三峰寓言髙陽集釣潭集二巻俱宋華山隱士陳搏撰搏讀經史百家之言一見成誦輒無遺忘頗以詩名有三峰寓言髙陽集釣潭集詩六百餘首宋史本傳丁年集十巻京兆李澣撰兄濤編澣幼聰敏慕王楊盧駱為文章澣卒濤編之為丁年集宋史本傳陶榖集十巻新平人官吏部侍郎榖十餘嵗能屬文强記嗜學博通經史諸子佛老咸所總覽多蓄法書名畫善𨽻書為人雋辨宏博宋史本傳楊礪文集二十巻鄠縣人官樞宻副使礪為文尚繁無師法每詩一題或數十篇在翰林制誥迂怪見者哂之有文集二十巻宋史本傳楊希閔集二十巻馮翊人希閔屬文善緘尺趙普守西洛府中牋疏皆希閔所為有集二十巻宋史楊克譲傳宋湜文集二十巻長安人官樞宻副使湜器識冲逺好學美文辭善談論飲謔曉音律妙於奕棋筆法遒媚書帖之出人多傳之有文集二十巻宋史本傳韓丕詩三巻華州鄭人种明逸集六巻工部侍郎長安种放撰晁氏曰种放長安人隱終南之豹林谷咸平中召授左司諌累遷工部侍郎放通經史七嵗能屬文不喜釋氏嘗裂佛書以製帷帳著嗣禹說在朝有所啓奏時無知者楊億譏其循黙真宗乃出其議十三篇以示輔臣晚年頗嗜酒盛輿服壮不娶無子集乃族孫說所編范㢲為之序首載真宗詔書及御製詩十首讀書志陳氏曰淳化中李介序之於九江名江南小集凡二巻館閣書目别有正集十巻云大畧與此同文獻通考冦忠愍詩三巻萊國公華州㓂準撰晁氏曰㓂準字平叔華州人篤學喜屬文尤長詩什多得警句在相位論議忠直不顧身謀仇邪媒蘖以謫死集有范雍叙共二百四十首野水無人渡及江南春二首皆在獨到海只十里之詩已亡其全篇矣讀書志巴東集三巻㓂準撰陳氏曰巴東集三巻公初以匠作監丞知巴東縣自擇其詩百餘篇且為之序今刻於巴東文獻通考楊偕集十巻中部人師頏集十巻闗右人官郎中冠鳳集十二巻龍圖閣學士京兆李仲容撰仲容舉進士甲科天聖中以起居郎知制誥久之兼龍圖閣學士自集制草為冠鳳集宋史本傳漆水集十巻朝散大夫邠州史天常撰楊樂道集二十巻龍圖閣學士知諫院神木楊畋撰序曰公所為文莊厲謹潔𩔖其為人而尤好為詩其詞平易不迫而能自道其意讀其書咏其詩視其生平之大節如此所謂善人之好學而能言者也本書王介甫序趙懿簡集三十巻同知樞宻院盩厔趙瞻撰晁氏曰趙瞻字大觀盩厔人少善為古文慶厯五年登進士第治平中為侍御史論濮邸事及貶元祐中終於同知樞宻院諡懿簡學春秋著書十巻其他文不皆竒也讀書志崇文集十巻郿人張載撰晁氏曰張載字厚之京師人後居鳳翔之横渠鎮學者稱曰横渠先生吕晦叔薦之於朝命校書崇文未幾詔按獄浙東既歸卒讀書志輞川集五巻奏議十巻寳文閣直學士藍田吕大忠撰晁氏曰吕大忠字晉伯藍田人汲公之兄皇祐中進士除檢詳樞宻院吏房文字累遷寶文閣直學士三帥秦鳳晉伯博極羣書為文尚理致有益於用章奏皆親為文讀書志汲公文録二十巻文録掇遺一巻尚書左僕射藍田吕大防撰晁氏曰大防既拜相嘗分其俸之半以録書故所藏甚富其在翰林書命典麗議者謂在元絳之上云讀書志誠徳集三十巻宣義郎藍田吕大鈞撰晁氏曰吕大鈞和叔嘉祐進士大防仲弟也師張厚之贍學博文無所不該其文非義理不發讀書志玉溪集二十五巻玉溪别集十巻秘書省正宇藍田吕大臨撰晁氏曰吕大臨字與叔汲公季弟也登進士第厯秘書省正字從程正叔張厚之學通六經尤精於禮解中庸大學等篇行於世嘗賦詩云學如元凱方成癖辭𩔖相如始近俳獨倚聖門無一事願同囘也坐心齋正叔可之讀書志朱子曰吕與叔文集煞有好處他文字極是實說得好處如千兵萬馬飽滿伉壯朱子語録畫墁集一百巻奏議十巻吏部侍郎新平張舜民撰晁氏曰張舜民芸叟邠州人慶厯中范仲淹帥邠見其文異之用温公薦為諌官仕至吏部侍郎後羈置房陵政和中卒其文豪重有理致而最刻意於詩晚年為樂府百餘篇自序稱年逾耳順方敢言詩百世之後必有知音者云讀書志濟南集二十巻華山李廌撰陳氏曰鄉貢進士華山李廌方叔撰又號月巖集東坡知貢舉得試巻以為方叔也置之首選已而不然賦詩有生平漫說古戰塲過眼還迷日五色之句後竟不第文獻通考潏水堂集四十巻集英殿修撰長安李復撰陳氏曰集英殿修撰長安李復履中撰元豐二年進士博學有氣節其為熈河漕有㫖造戰艦戰車復議奏者之謬以為兒戲遂罷其議時論韙之文獻通考蘭泉老人集金華州防禦使蒲城張建撰澹軒遺稿戸部郎京兆史肅撰錦溪集武功杜佺撰還山集一百二十巻元叅議乾州楊奐撰楊奐讀書厭科舉之學以濓洛諸儒自期博覽强記真積力久猶恐不及作文務去陳言以蹈襲為恥江漢趙復序稱其志其學粹然一出於正即其文可以得其為人闗學編龍溪詩集參政郃陽支渭興撰秋谷集侍講學士漢中李盂撰補暇集蜀道憲副長安宋規撰􅇓齋遺稿大學士髙陵楊恭懿撰勤齋文集右諭德奉元蕭􅆽撰榘菴集二十巻侍讀學士奉元同恕撰漫泉集明蒲城趙晉撰今亡其詩文散見蒲城文獻録中馬志玉山樵隱詩稿咸陽李叔方撰月山集富平張敏撰今有存者散見元人詩文集中馬志鷃菴集吏部尚書富平張紞撰今亡三原王端毅公恕嘗拾其遺文為鷃菴拾遺集馬志從亡隨筆一巻翰林院編修朝邑程濟撰靖川集三原馬貴撰王端毅公奏議十五巻吏部尚書三原王恕撰序曰公出入内外五十年其文章存者甚多而奏議最盛自為大理左寺副至南京兵部尚書者六巻兵部尚書王公獻為御史時刻於蘇州御史程啓充為知縣時復刻於三原其在吏部者九巻藏之公子太常卿承裕所知縣王成章從諸生求得之合前六巻者刻之播之四方詔後世焉本書王九思序王端毅文集十六巻詩集十四巻諌議録一百巻俱王恕撰助費稿二十巻奏議五巻浮生出處圖一巻俱太子少保咸寧楊鼎撰休亭稿十巻參議渭南南釗撰屈公奏議一巻都御史華隂屈直撰興革條例奏同州王鉞撰北原集順天廵撫中部劉聰撰正誼菴詩集六巻奏議五巻俱戸部尚書咸寧雍泰撰息齋文集翰林學士咸寧楊時暢撰自在稿侍郎咸寧張鼎撰南山漫興詩集圭峰集俱叅政盩厔王傅撰闗西奏議十八巻大學士楊一清撰序曰奏議少師大學士䆳庵楊公先後涖闗西經略疏也𢎞治中孝皇用廷臣議勅公以御史中丞督馬政嗣改撫全陜未幾授鉞總制三邊正德中以大學士謝事歸今上以大司馬兼御史大夫起復總制奏議事𩔖三茶馬廵撫總制巻十八凡一百九十四章大抵皆籌邊䇿也先已板行然各為一帙侍御劉公裒而為一復刋之葢期逖流遐布風斯世也本書韓邦奇序田疇百咏集歸來稿俱同知渭南薛敬之撰無逸賦一巻龍渠文稿八巻險賦一巻詩話一巻俱按察使咸寧謝朝宣撰奏議二巻左叅議同州尚衡撰石臺集嘉議大夫清澗劉蘭撰東谷詩集左叅政華州張潜撰康德瞻集四巻武功康阜撰序曰武功康德瞻七嵗能詩歌十五為騷賦十九嵗死其詩歌騷賦典則不詭曲盡情理庶幾乎金石之音而菽粟之味焉然世無知者君子悼惜之弟太史德涵校刻以傳本書王九思序東峯咏稿一巻北都集一巻南都集一巻俱太僕寺少卿清澗劉介撰西澗詩集叅政三原秦偉撰容堂奏疏容堂雜稿自考録俱淮揚總漕西安楊宏撰對山集四十五巻修撰武功康海撰孝宗臨御求賢策士得公列置第一朝野快睹是時信陽何仲黙闗中李獻吉王敬夫號為海内三才而公尤推獨步當時語曰李倡其詩康振其文學士尊為標的公殁之六年中丞東厓翁公捜其集付西安守六泉吳公刻之以傳本書張治道序沜東樂府二巻康海撰星軺集辛巳集考經堂集庚寅集諌垣奏草三泉堂漫録俱戸部尚書三原王承裕撰涇野文集三十八巻南京禮部侍郎髙陵吕柟撰正嘉間以理學倡闗中者曰吕仲木學者稱涇野先生先生學有本原其枝葉流𣲖發為文章外足於象内足於意文不滅質聲不浮律以道鳴以學鳴匪直以文已也本書李楨序涇野别集吕柟撰涇野吕公既捐舘舍其子太學畇以公别集寄余有賦頌諸體詩則十六七洋洋乎風雅之遺道義之英華其與公說經諸書並傳於世無疑也曰别集者葢標紀簡帙之次爾本書王九思序十四逰記二巻吕柟撰十四逰記者涇野先生政暇逰山隨所至而記之者也前六篇在解州作而條山黄河之勝具見之矣後八篇在南都作而鍾阜長江之靈具見之矣傳曰仁者樂山知者樂水世有樂得其物不樂得其道者將亦有所悟乎大器遂梓之以傳曰將使逰者知所儆也其詩亦附刻於後本書胡大器序康子寛集五巻武功文學康􅕬撰序曰康子寛集渼陂王先生選之以刻者也凡五巻巻以𩔖分詩以體𩔖激而不迫燦而不襍殆闗中之才焉本書張治道序渼陂集十六巻吏部文選司郎中鄠縣王九思撰序曰予觀渼陂先生之集其叙事似司馬子長而不屑屑於言語之末其議論似賈太傅而能從容於抑揚之際至其因懷陳放寄景道情則出入乎風雅選騷之間而振迅於開元天寳之右可謂當世之大雅斯文之巨擘矣本書康海序渼陂續集王九思撰序曰渼陂續集者渼陂先生垂老之作也先生齒德既髙踐履純篤凡所酬應罔不協道若集中嘆禹夫之貨殖善鶴夫之生農惜瀛也之宦成戒渼也之土木槩可見矣外則論學論師諸書牝晨孤兒諸吟隕霜警火諸賦葢拳拳於希聖學古移風易俗之意也本書翁萬達序碧山樂府八巻王九思撰序曰山人舊不為此體自罷夀州後始為之其才情之妙可以超絶一世矣余往來鄠杜間茍有所得則命童子彚輯之其聲雖托之近體而其意則悠然與上下同流宕而弗激迫而弗怒讀其曲想其意比之聲和之譜可以知其所懷矣本書康海序輞川文集步聲集病齋詩習堂稿俱左叅政藍田榮察撰天地正氣編蟬噪録南逰小稿庸玉録俱給事中盩厔王元凱撰小浄稿雲林稿俱同州舉人尚班爵撰西坡詩文集戸部尚書咸寧劉儲秀撰平田集山東廵撫咸寧􅩌楫撰燕石稿二巻山西僉事朝邑王朝雍撰友山少負詩名篇出輒為人傳誦今覆而按之近體𩔖孟襄陽歌行𩔖岑嘉州古詩有晉魏之遺如出塞曲曰人生豈不重君命良非輕賊巢偶成曰十年糜厚禄一死答君恩其壯氣直節有吞氊褁革之風意者其漸涵於駟鐵無衣之風而興焉者乎本書劉垓序苑洛集二十二巻南京兵部尚書朝邑韓邦竒撰叙曰大司馬韓公苑洛先生文集二十二巻廵撫大中丞樵邨賈公取付省中刻之以表憲一方本書孔天𦙍序五泉集二巻山西㕘議朝邑韓邦靖撰序曰汝慶韓邦靖朝邑人也與其兄汝節同舉進士後十年汝慶以山西叅議卒汝節彚其詩文若干巻藏於家笥予痛汝慶光已肆而弗長用將䆒而忽窒幸猶有此可以表見來世讀其詩思其人泝其志汝慶可謂弗死矣臨潼趙伯一氏刻而傳焉本書康海序屈安人集二巻韓邦靖妻屈氏撰胡䝉谿集四巻續集一巻俱咸寧胡侍撰大微前後集嘉靖集俱主事長安張治道撰谿田文集十一巻光禄卿三原馬理撰序曰副墨不云乎馬理文章景明詩當代斯文可讓之谿田先生文名赫著厥惟舊哉顧草牘散帙久未鋟梓景行者多遐思焉三原令張文熈彚稿成帙直指安節吳先生命受之梓本書雒遵序郝節婦遺稿三原馬理女節婦身既㷀孤又少稔谿田先生貞懿之教故於吟花嘲月流連光景之詩不忍形之楮墨而獨存弔亡愴别之音以自見篇中非悲夫則憶子牢騷欝憤若終身無以解憂亦可以想見其性情哀怨之正矣本書來復序黄花集七巻右給事中三原張原撰序曰予以罪謫新添厯牂牁夜郎之墟履羅甸鬼方之域凡兩閱月而後始達流離毒苦殆以萬狀間有餘閒率爾成句觸物感懷因事暢情實非作意為之也兒維德時侍行見即録之寖成巨帙持以請名予憶居京時每夢黄菊花今兹騐於黄花之詩乎因以黄花名之用紀一時之異焉本書自序少華山人文集十五巻詩集十五巻陵下集四巻别集前集十五巻後集九巻續集十五巻歸田集二十巻再休稿六巻酒狂餘唱一巻以上俱都御史咸寧許宗魯撰彭衙集按察僉事水王謳撰謳字舜夫風神散朗負氣任俠有髙才而無貴仕故多煩促噍殺之音五言隱秀時可尋味七言專力學杜古體多率易而乖音節今體每纒綿而乏神理然視闗中同時許伯誠馬仲房之倫則已超乘而上矣列朝詩集劉豹林詩集太僕少卿長安劉序撰少洛集四巻運使王光濟撰王三渠集十四巻太子太保咸寧王用賓撰靈陂詩草一巻朝邑進士雷子質撰西元集禮部侍郎綏德馬汝􅂹撰黄河水曰仲方詩整練似法顔謝隊仗森然雖求之聲律未見其深亦不失為髙流也列朝詩集太華詩集督府奏疏水部填雲以上俱都御史長安何棟撰介一集二巻知榆次縣事蒲城雷雨撰渭北集華陰趙儒撰潼谷集八巻知潞安府事朝邑王三省撰序曰潼谷先生於世味泊然無所好唯喜讀書其伊欝侘傺之情激昻怫㥜之感洸洋幽𣺌之思嘽緩滯滛之樂輙於文於詩發之不規規襲屈宋曹劉左遷之所己言而抒所自得則無所不詣焉本書王道行序懷南漫稿四巻擬宫詞一巻藝贊三巻俱陜州牧商州任慶雲撰白閣山人遺稿奏議俱兵備道鄠縣王九峯撰楊忠介公集十三巻監察御史富平楊爵撰序曰斛山公與椒山先生稱嘉靖二楊封事數千言侃侃正論不為危詞矯激如後生狂嘷以峻要聲譽今讀五事之奏退謟瑞罷雷壇斥方士如保姆慎防幼儲嚴塞欲開之嗜公言實左劵耳系孫雲玖距公百二十年出公遺稿讐梓而公言益日星河獄矣本書李光春撰石臯集四巻耀州左思忠撰序曰石臯子有詩成輒以寄余余觀其思深而才俊興逺而語清悠然唱嘆之音也其體裁則始學昭明選詩盛唐諸公乃後流覽於古今而定則於杜甫葢曰杜子有風人之遺云是可以見志傳世矣本書喬世寧序闗洛集藍田舉人王之士撰樂府一巻蒲城趙孟暘撰温恭毅公集三十巻左都御史三原温純撰有文翔鳳序渭上稿二十五巻渭上續稿十一巻俱叅議渭南南軒撰太乙山人詩稿五巻湖南僉憲武功張鍊撰序曰古邰張杲者諌苑太乙公嗣也出所刻公詩示余余受而讀之意趣暢超風神遒峻葢公為康太史甥少而能文雅志於詩太史每與渼陂王公見而擊節稱為漢卿樂天之儔云本書闗廷防序雙溪樂府二巻張鍊撰序曰家有洲田在漆浯二水間築垣成墅植栁成林栁陰構草亭亭兩液出雙泉㑹流亭除觱沸澄瑩意甚愛之因開别沼種蓮分畦種稻以餘丘植葭菼魚鳥飛躍悠然佳境也時時招客過此隨波泛羽拂石圍碁云胡不樂樂而有言言而成聲教數童子被之管絃用暢性情意之膚舛詞之蕪諺非所恤也本書自序東陵集兵部主事渭南劉鳳池撰少陵純音十巻知府渭南南大吉撰姜泉集十四巻訂正㑹稽三賦三巻俱渭南南逢吉撰驪山集十二巻戸部郎中臨潼趙統撰南崖稿代州牧華州楊孟芳撰石疊集六巻富平李宗樞撰序曰石疊家食時即以文名至服官而文益著今讀其集若四言古詩則取則乎風雅五言古詩則憲章乎漢魏七言古詩則掇英乎王楊五七言律則集美乎岑杜遒然並駕前驅乃其文則薈叢左史綴續禮經詞聿采乎遷固理不詭於周孔斯啜膏腴而得其㫖趣者與是可以傳矣本書許宗魯序中南山人集十巻覆瓿集十巻中南樂府二巻俱員外咸寧李汝蘭撰可山集徽府左長史華州王堯弼撰南岡漫稿十二巻叅議渭南薛騰蛟撰西溟詩集四巻知髙邑縣事朝邑王傅撰序曰朝邑王雁峯家世稱詩習為弓冶其為詩也於體無所不偹而韻致才情超然塵􅅽之表譬如春城楊栁濯濯風流秋水芙蓉亭亭獨照逺之追開元大厯之風近之步洪正先進之矩矣本書龍膺序存笥稿三十八巻國子祭酒華州王維楨撰序曰華州槐野王子為文法司馬遷詩法漢魏其為近體法盛唐尤宗杜氏少陵居常好深沉之思務引於繩墨必結搆中度而後修辭常曰文章不朽盛事無所發明何以徵後世既即世竊恐其所著書不存今得其遺書故為之裒次得若干巻曰存笥稿則王子所自名云爾本書孫陞序司成遺翰四巻王維楨撰序曰司成公存笥稿凡三刻生平著作所存足傳者盡出矣獨書翰則當時酬應諸作故獨是遺爾顧存諸巾笥傳之子孫恐有流軼滅沒之懼猶子承祚謀授之梓顧念手澤依然未忍棄置亦猶陳衣裳藏劍履者爾本書王庭諌序左華集左華文集辛未集丙子集辛巳集癸未集俱西華知縣華州張光孝撰槐邨集二十四巻委巷録十四巻園與目㳺一巻俱主事咸寧周宇撰馬文莊公文集二十巻大學士同州馬自强撰序曰先生學問經術要為根蔕古人以求身心實際及行世傳逺不茍隨俗骩骳其為文章杼柚胸中氣餘神斂涵涵然若磅礴萬物而不見一物者意有所出即泚筆疾書盡掃蹊徑而空之又若一言而足當數千百言者故奏對之辭莊碑表之辭典記序之辭鬯投贈之辭真本之志氣正大積而山輝澤媚各闡元倪非顓顓學問所至也本書王錫爵序假我集按察副使綏徳郝汝松撰丹山集武鄉知縣膚施趙仕撰長春圃稿秀巖詩稿俱布政使華州王廷詩撰定敏軒集吏部左侍郎潼闗盛訥撰三撫奏議四巻兵部侍郎渭南孟重撰孫丕揚集富平人官吏部尚書按程希洛輯張綋李宗樞楊爵及丕揚稿為頻陽四先生集稱丕揚著作甚富謙不欲梓因拾其門人之私録者刻之但張李楊既標専集於前故頻陽集不復重入丕揚雖無專集行世亦未可聼其湮沒無傳因識於此亦以見有善之必録云爾伭育子集二十巻兩淮運使咸寧李蘇撰諌苑奏議二􅁽四川廵撫三原雒遵撰丘隅集十九巻按察使耀州喬世寧撰序曰三石子喬世寧文不作漢以後語詩不作唐以後語洗剽敓繁陋之習一裁於造化性情之真其傳也必逺集曰丘隅詩云緜蠻黄鳥止於丘隅小丘三石子隱居所也其命意抑又澹且逺矣本書孫應鰲序硯魚集二十巻太僕卿咸寧秦可大撰黙齋集叅政潼闗葛大紀撰皇華集見徽堂集俱御史長安王鶴撰鄒蘭谷疏草兵部侍郎長安鄒應龍撰吏隱堂集御史三原昝如思撰杖履三篇知横州事宜川劉子諴撰雙荆詩集咸寧管霑撰邢舜羽詩集榆次令咸寧邢鳳毛撰馬慥集四巻同州人官尚寳卿公餘草一巻兵偹道朝邑王嗣美撰序曰含翁少善聲律之學老而彌精篇出人輒驚服本書杜齊芳序予告録一巻王嗣美撰抱甕丈人稿左布政華州郭性之撰三廵奏議漕運奏疏俱大理少卿華州劉士忠撰雙溪奏議陜西廵按頴川張德徵撰序曰陜西奏議者雙溪張子所著也嘉靖已庚間雙溪廵按陜西遇大政事必奏議聖主俞允批處而後行陜西之八郡三邊以及四鎮之急務罔不釐舉其内雖有獄訟錢榖數條獨於條畫邊防之事為詳葢以當其地也又於區處宗室之事為詳葢以當其遇也本書吕柟序廣川集八巻棗强知縣渭南南憲仲撰王道純文集長安人官按察使張惇物集二巻襄陽教諭耀州張䝉訓撰序曰惇物詩文集各一巻葢喬三石先生所選其子太僕君思緜刻之以傳者也先生詩冲逺古雅大𩔖陶孟文亦質而當物簡而有體譬諸太羮𤣥酒周鼎商彛咀之有餘玩之不厭謂足繼西京之響非耶本書何洛文序逺志堂集十四巻南京右通政耀州喬因阜撰序曰從逰之士請刻余之集余竊自料余之集不可傳示於人於是序而刻之藏於逺志堂中以此覆瓿張帟足矣本書自序醉緑館集禮部尚書耀州王圖撰四六雕蟲同州馬樸撰序曰敦若自敕表詞賦叙記書疏狀議判案之𩔖莫非四六體裁各稱風範若一精工而能古雅髙華而能清虗平易而能神竒兼六朝唐宋之美非思窮八荒書窮萬巻者未易辦也本書李維楨序元􅅢堂文集五十巻集杜詩五巻俱禮部尚書渭南南師仲撰撫宣疏草二巻戸部尚書渭南張經世撰西臺奏草二巻順天府丞渭南楊光訓撰馮恭定公集二十二巻續集四巻工部尚書長安馮從吾撰序曰仲好坐廢二十餘年無幾微牢騷不平之氣而益湛思於學脈寤寐洙泗折𠂻濓洛雖一禀承於先覺而獨證獨創自為一家之書今所刻語録記序詩歌尺牘雜著十餘萬言是已本書董其昌序孫太保奏草二十四巻部院奏草一巻俱太保渭南孫瑋撰蘭露堂稿二巻西臺奏疏二巻按鹽摘疏一巻俱都御史渭南劉芳撰華山客集十巻通判渭南賈璵撰聼溪山房集大岳行吟集捫蝨散談俱興安州劉紹基撰按興安州志紹基十嵗通經書十二能文章十九嵗沒人稱為神童云漫公詩集四巻山西左布政使朝邑王於陛撰序曰漫公以氣節發為文章皆開元大厯風味不涉中晚蹊徑深得詩人風雅之致云本書孫陞序后軒詩草一巻兵偹道蒲城王元命撰夏垣奏草二巻給事中咸寧曹代之撰嶼浮閣詩文集三原舉人温日知撰海印樓詩文集三原温自知撰諌垣疏草僉事潼闗孫振基撰松門稿經筵講官華州王庭譔撰嚴石齋稿宻雲教授華州張士鵬撰竹韻菴詩集沁源知縣華州張士鵾撰敵秋集青箱别業集俱沔縣廣文涇陽郭鼎藩撰逆旅集大同廵撫三原焦源溥撰鷄􅏓集二巻鹽運使朝邑王皥如撰君子堂集幽居草九騷諸篇淳化生員葛大受妻文氏撰拾翠閣草三水文毓鳳妻羅氏撰效顰草一巻山西道副使張繼孟撰序曰公豪邁為詩磊落倜儻簡南臺執法週遭澤國沿江海遵海淮東南大滙入公流覽中故其詩文益閎肆博洽録若干篇付之剞劂曰效顰草本書王在晉序留臺奏議三十巻張繼孟撰青箱集六巻致爽堂詩二巻晉政略二巻撫閩疏四巻三晉摘稿二巻軍中小簡二巻俱尚書渭南南居益撰見山堂集二十巻續集二巻兩政拙續澗陸洞文集救荒補遺二巻按楚書檄聞善録從政尺牘欵愚甫日程隨筆小𩔖俱光禄卿渭南史記事撰扣缶集鷄肋編海防要疏俱總督陜西軍事臨潼武之望撰魏恭襄文集十巻太子太保涇陽魏學曽撰魏確菴先生以亮軌峻猷為當代名卿其所叙述論著務當實中窽不為巵言媚致故投贈之詞即其人之韋絃紀列之詞皆為國之衡鏡言之則有徴而措之可底績葢根茂而實繁膏沃而光曜豈竄竊餖飣靡㬅虚恢者所能及哉本書盛以𢎞序紫氣亭集十二巻鳳毛館帖四巻俱尚書潼闗盛以𢎞撰雲起閣詩草十八巻嘉魚知縣三原來復撰序曰宜公屈首窮經旁涉風雅其雲起閣詩草讀之習習風生一種清芬澹逺之氣襲人本書陳肇曽序叢筀齋詩集十六巻三原來臨撰序曰叢筀齋詩集葢三原來馭仲之所作也馭仲神觀爽邁弱冠即以大雅自任於古樂府諸體無所不擬擬輒肖而才情致度復能發舒其所自得至五七言近體取材六朝而定宗於唐慷慨沉欝居然燕許之遺新都畢孟侯付梓以傳焉本書原序黌宫補漏二巻摹真藻四巻俱蒲城李應策撰塞上草鎩翮草遊薊草俱都督僉事富平楊定國撰南逰稿一巻武功張汲撰増讀織錦囬文詩一巻武功康萬民撰何鳴髙曰自斯圖之出也閱厯千載讀者數家由一二百至起宗之三千餘首盡乎技矣無沴又増四千餘首合之葢幾乎八千不但起宗諸子於分緡繅繭之不可及即若蘭氏七襄抛梭時亦未必其組繹若是也無沴尚有自製一詩字纔滿百詩能過萬不知古今文士孰可相當生平著述粗踰牛腰獨恨淪落不偶誰之咎也本書原序逸園詠懷詩一巻吏部郎武功耿志煒撰序曰張子襄貽我詩一􅁽披函讀之乃和阮步兵咏懷詩也予懷耿耿亦若有引而動者自是犬吠鷄鳴都成韻譜山耕水耨舉是標題不覺次其韻亦復如是語無詮次􅂓借以寄吾欣慨云爾本書自序逸園新詩一巻耿志煒撰序曰孟諸清骨澹性得之天然年來結廬山中遨盪於雲林烟壑之間亦復翩躚但有㑹心處輒成吟咏至於榻邊水月枕上松風鳥語花飛皆為韻譜視向者簮袚中韻語更覺瀟灑飛流余既彚為一帙復請梓之以廣其傳題曰逸園新詩逸園即孟諸結廬處也本書康萬民序中丞奏疏防江疏草俱右副都御史馬鳴世撰因應掇存一巻耀州李景沆序序曰飲公屢試弗售殫精六典洞窺九流發為序記詩歌詞賦調炳朗而思沉語葩麗而致逺雖多應世絶無因人一語其存笥浩瀚充棟僅掇什一付梓宇宙當有知音者曷論遇不遇云本書宋師襄序謷天齋詩存一巻耀州文學李㑹心撰序曰公長甫襁褓見典􅁽輒諾諾若語交謂有夙慧舞象補弟子員塵視一切數戰棘闈不售竟死其父飲公偶檢篋帙得遺稿若干泣曰是物也可以存吾兒也請夀梓少許了此一段血痕云本書闗燫序衛紫岫文集四巻兵部右侍郎韓城衛引文撰序曰集中奏疏論議制誥序志碑銘書啓賦頌文不一體皆清壯可誦其中奏疏數篇有陸敬輿風規抑且言言雪涕恤乎見愛君憂國之忱良可悲也本書吳曹直序逸老草堂朝邑王鑰撰衛紫嵐奏疏一巻廵撫真定韓城衛槙國撰序曰崇禎十四年紫嵐以推官考選召對謂平冦為足國第一義迨廵視真定諸郡視國如家視民如子每起一草聲淚俱下讀至夜有鬼哭書無人行之語聶夷中之詩鄭監門之圖不足云矣而其大者在以無逸是圖進君徳以用賢養民規輔臣若夫糾劾悍帥控制驕兵痛陳俵馬津米之害皆闗彼時政務之大字字從忠孝血性中流出不襲古人帋上陳言本書魏裔介序樵山堂集國朝中書涇陽張恂撰有濤聲存稿種竹編祝鷄稿上下寓草尊聞篇灰餘苦言為丹草上下九種繡佛齋詩餘張恂撰序曰穉恭張子墨妙藻翰雅己樹幟藝壇或偶製填詞典麗清綺啼鶯喃燕寵栁嬌花含情正復不淺國風仲子喻私離騷美人自居葢兼之也本書馮御輦序憗齋存稿四巻翰林院檢討清澗白乃貞撰序曰清澗白蕋淵詩歌古文辭雲散烟涵逈出塵表直追踪崆峒對山所謂王仲宣藻勝一時不能不使鍾繇王朗閣筆也本書程邑序灞上集二十巻咸寧孫爾思撰序曰灞上集者孫北溟先生手自彚編所著述而成集也先生茹古含今於載籍無所不窺暇則步池亭花竹間吟咏推􅒱幾於斷髭噦心乃以孝廉淹滯青氊益肆力學問從事詩文不少輟積八九年集成自騷辭樂府五七言古以至近體排絶無所不具有閎肆瑰竒者有深微玹逺者有優柔敦厚者有典麗精工者有慷慨悲壯者有清逸淡婉者可以􅞅然樹幟於藝林矣本書張志尹序軺香集按察司臨潼王孫蔚撰唐詩固說昆陽小草鳬舟集宜休草臨髙知縣華州史流芳撰篷窻雜詠十巻三原劉汸撰汸博學多文西安府志學古堂集三原韓詩撰銅壺集四巻蒲城王凝祚撰序曰王君岑興㑹所至偶有所得輒鐫之簡􅁽漸積成帙持以問世倘所謂窮愁著書者耶本書李馥蒸序栩栩居詩一巻提學道富平田本沛撰序曰田公以文章名世視學入閩出所作詩以示蕃因得字比而句櫛之其宏聲鉅響若黄鍾大吕相應於簨簴髙閒若碧澗寒泉相應於幽谷至其賦事吟物又若顧長康為人物寫照毫髪無遺因序而授梓以傳焉本書林之蕃序栢林集朝邑雷于霖撰繼述堂詩文臨汾丞武功張封編輯評曰闗中稱世閥者胥推有邰張氏詩文炳耀先後重光公慎伯仲表章前徽曩者佐尹臨汾治行詩畫見重當􅂗余為贈一律云徳傳氷蘖芳聲逺政􅄎金莖惠露多三晉雲烟隨筆灑九天珠玉對松哦僉以為不虛美今並識此亦以公慎繼述之善顯揚之懿不第在鐫詩文一事已也本書牛衍慶評覆瓿集四巻蒲城舉人原永貞撰序曰余于詩史之妙苦未有得暇日應酬間有序文數篇狂吟數首豈敢自居作者之列兒文彩拾掇散簡偶集為巻余曰是可以覆瓿也遂題曰覆瓿集本書自序東園詩選一巻扶風張培撰序曰東園負磊落瑰偉之才其為詩若有所藴蓄於中往往托之比興諸什不逞其才人莫窺其津岸者其意念深矣本書翁世庸序雪石堂詩四巻中部劉爾撰序曰雪石堂詩草劉敬又之所作也其為人學博才贍志趣髙逺於詩秉翰操牘成於頃刻若不經思而創意造語􅞅絶不羣即一題數十篇卒未嘗抱膝苦吟為慘淡經營之態也本書楊素藴序紫沙集四巻陽信知縣朝邑王鏷撰序曰王翼治風雅人也忘懷憂喜放情詩酒其精神意氣總聚於詩云本書王鉞序中嵓集詩一巻文一巻淳化貢生宋振麟撰序曰子楨素負介不能驩世俗又日閉門著書其牢騷感憤之氣盡發為詩文其為詩慷慨悲壯不屑屑字句間其文古奥深堅自成一家而能不爽古人之步本書李因篤序受祺堂詩集三十五巻翰林院檢討富平李因篤撰序曰富平李天生闗中豪傑也為人豁達慷慨自負其竒一吐之於詩其詩原本風騷出入古歌謡樂府而以少陵為宗意象蒼莽才力雄贍既與杜㝠合而章法句法講之尤精嘗慨世争新鬭巧日趨於衰颯故寧拙毋纎寧樸毋艶寧厚毋漓乍讀之不甚可喜而沉吟咀味意思深長與夫翡翠蘭苕繁絃促節者相去霄壤矣樂昌令田少華梓之以行本書潘耒序受祺堂文集十五巻李因篤撰漢詩評十巻李因篤撰䟦曰漢詩索解不易亦從無有解之者解之自吾友李太史子德始發䝉啓昧如𤣥奘鳩摩之譯龍藏暗室一燈千年朗徹其惠後學勝於匡生多矣本書康乃心䟦願學堂集二十巻知南康府事臨潼周燦撰序曰星公之文質而髙古簡而委折皆斟酌於義理足以扶正指遏邪說余謂星公有造乎道而得其至者以此本書黄與堅序黄湄詩集十巻給事中郃陽王又旦撰序曰幼華才髙而氣雄心虚而善下其論獨能破流俗之說汎濫於唐宋諸名家上溯騷選以成一家之言故其詩毎變益上足以行逺而傳後無疑也本書王士真序黄湄奏議一巻王又旦撰溉堂集三原孫枝蔚撰序曰孫枝蔚豹人秦之焦穫人甲申李自成作亂結同里惡少年殺賊後走廣陵學賈三置千金一日自悔且恨曰丈夫當讀數千萬巻書耳何至齷齪學富家為於是僦居於揚州之董相祠旁閉戸日讀書間為詩而自曼聲以歌既歌詩而家漸落詩益工歌益甚而家益大落詩數十巻為溉堂集溉堂者孫子僦居處也本書陳維崧序溉堂詞一巻孫枝蔚撰序曰孫豹人先生以溉堂詞一巻示予讀之有飛揚䟦扈之氣嶔﨑厯落之思噌吰鏜鎝之音渾脫瀏灕之勢此先生本色也本書尤侗序溉堂續集孫枝蔚撰序曰豹人以詩文名天下垂三十年予往見其溉堂初集古詩非漢魏律非盛中唐則不作其所以似古人者漸濡陶冶若丹烏之藏物初非出於依傍而後有既出其溉堂續集示余讀之則自宋以下皆有之矣衝口而出揺筆而書磅礴奥衍不可窺測然豹人年五十浮客揚州不能力耕田以自養長年刺促乞食於江湖傷逝悲來較甚往昔故其詩别有所以為工者而豹人亦不自知也本書魏禧序二曲集盩厔李顒撰序曰先生㑹粹羣儒之說而折𠂻之以獨見其大要以尊徳性為本體道問學為工夫兼盡姚江考亭之㫖可以知其修已立教之大凡矣本書鄭重序應用録一巻富平惠靇嗣撰谷口山房詩集朝邑李念慈撰序曰屺瞻秦人也自秦之晉南逰江淮所遇山川景物寄興屬懷情隨景移觀其羈旅無􅂓不平之作葢秦風而兼乎吳楚者耶本書施閏章序艾陵文鈔十六巻涇陽雷士俊撰論曰伯籲一生盡得力於曽子固之文惟論傳二體獨不學曽論步三蘇傳宗史漢如房兵部傳卓然班馬名篇如梁子武畫扇記却又似韓本書周斯論艾陵詩鈔二巻雷士俊撰序曰雷子美才博學生平文章與王巖齊名世稱雷王云間為詩歌有山榛隰苓之意㫖深詞婉本之性情與世之競浮響趨纎靡者天壤雷子殁員子庸菴出槖金梓之本書李沂序彌清閣集郃陽生員史繼魯妻雷氏撰氏聰頴博涉書史工八分書能詩著有彌清閣集暮年盡焚棄之曰詩文非婦人事播之於人非所宜也今存其詩二古文一其雁字詩熏風無奈祝融火寒雁一聲天地清不羡上林𫝊漢信羡他筆筆寫孤貞元宵哭夫詩去年燈火共元宵為我窻前拂翠翹佳節依然人不見一輪明月冷迢迢文不及詳載然筆致甚老今之作者鮮能及焉宰莘退食録砭身集五巻蒲城劉鳴珂撰序曰伯容有志聖賢之道隨處體認心有所得輒付之楮積久成書五巻其意大約以正心誠意為指歸而其於天人理欲王霸儒釋朱陸之分辨之極精葢庶幾乎可以登程朱之堂焉本書王修序新増璿璣詩讀法一巻蒲城劉玉珂撰序曰璿璣圖詩自苻秦迄唐宋元明率以二百餘首了之啓宗道人因五彩分七圖讀法得詩三千七百五十二首今因其法求之有退句退字法錯法綜法有旋讀排讀藏頭連足互排互旋法信手拈來頭頭皆是又得八千有竒其致可云無窮矣本書自序鈍翁率意稿郃陽生員李穆撰予得鈍翁遺稿殘編蠧食之餘繙閱再四知其抱負宏偉非特文章之士惜其以諸生老故即其文為之傳又擇其論古之意髙識快筆發人所未發足為千秋龜鑑者以附於後庶不負其生平所學云宰莘退食録鶴雪堂詩文集廣東按察司咸陽劉元勲撰宜夏軒雜著貴州廵撫韓城劉蔭樞撰序曰宜夏軒雜著者黔大中丞劉喬南自居諌垣以迄撫黔中間數年所為隨事即景徵實寓義之作也今讀其應制一疏於戎政利害瞭若列掌讀其平北一頌於神功赫濯昭如雲漢宜夏軒之仍其故名有譽以為憂之戒逰黄巖之三以自責有需以賊事之悔美漢祖之從善如流傷流俗之守財如命酒泉可以奪伯倫之頌堂聨足以奪戒石之藴至河渠一記逺想禹功繫心民瘼公之文乎公之人與道也本書孫勷序梧垣奏議一巻劉蔭樞撰清逺堂詩集提督咸陽殷化行撰序曰提帥殷熈如平居手不釋巻喜作詩文精於翰墨攄懷紀事有所撰述多手書之久而成編每一篇中必有傑思警語自抒胸臆不襲陳言固不屑屑雕章琢句而佳處直追古人本書潘耒序厯任奏疏四巻殷化行撰序曰余自濫膺節鉞厯臺灣襄陽寧夏以迄於兹所任多邊海形勝之疆適有運濟出塞弭盜綏蠻諸役其間隨事因時有所奏報鞠躬撡翰之頃亦必殫此忠誠加之敬慎言出芻蕘辭又鄙拙徒以嵗月滋久裒然成帙爰手次其前後庶以自考生平抒竭之梗槩云爾本書自序思誠録韓城貢生賈締芳撰序曰締讀書有所感悟或與親友往來之楮筆咸識之於􅁽非曰言之遂當要以備異日之省察云本書自序梧村詩集溧水知縣咸陽劉企向撰艾悔齋遺稿蒲城雷亨坤撰序曰伊嵩才大而思敏卓犖不可一世與二三知己分韻唱和商畧風雅每一篇出超超雋上本書李公門序白石堂詩集棲霞知縣韓城程必昇撰序曰程昕之究心詩學積稿成帙俊逸之氣樸人眉宇字句清新俱自性情發越而天趣在筆墨之外本書王㑹圖序白石堂文集程必昇撰古愚齋詩稿五巻蒲城副榜雷䥵撰序曰劍華貧酷幾刺骨慷慨悲歌其所為詩率皆以謫仙之才行工部之法昌黎之竒變玉川之鬼怪兼而有之矣本書張勅典序古愚齋文集雷䥵撰豐川集二十五巻鄠縣王心敬撰序曰豐川著書立言悉發宋明大儒所未發余為梓其書工既竣因志其端云本書原序豐川集續編二十三巻又續集五十巻仕學編六巻歸善知縣咸寧孫能寛撰序曰孫子為三秦名士蚤嵗以選㧞貢成均其仕歸善也勤撫字慎催科除陋規興學校善政未能縷悉大抵皆行其所學耳因出其涖任之所著述裒輯成帙名曰仕學編本書葉適序又篆豐記二巻孫子涖海豐所著本書陳王猷序崇祀考畧四巻續考畧一巻能寛著序曰孔廟位次各郡邑往往不一孫子因詳考家語史記暨先儒列傳前後東西一準闕里誌次序並各綴以封爵事蹟裒成一集本書王承烈序又雍正二年加封孔子五代王號享祀聖宫復増入從祀先儒一人兩廡増入從祀先儒二十六人孫子更考據五王諸賢儒行實依禮部所頒位次續成考畧一巻本書王心敬序陜西通志巻七十五
