body:
  text: 陕西通志巻五十八人物四勇略上周樗里子名疾秦惠王弟滑稽多智秦人號曰智囊爵右更使伐曲沃取其城地伐趙擄將軍莊豹抜藺明年助魏章攻楚敗楚將屈匄取漢中地秦封號爲嚴君武王立逐張儀魏章樗里子為相以車百乗入周周迎之甚敬昭王元年樗里子伐蒲還擊皮氏卒史記本傳頓弱秦人謂秦王曰山東之戰國有六韓天下之咽喉魏天下之胸腹王資臣萬金而遊聽之韓魏入其社稷之臣於秦即韓魏從而天下可圗也秦王曰善乃資萬金使遊韓魏入其將相四國畢從國䇿陳軫秦人齊助楚攻秦惠王患之使張儀見楚王曰大王能閉闗絶齊臣請使秦王獻商於之地六百里楚王大恱羣臣皆賀陳軫後至獨不賀楚王曰不榖得商於之地六百里諸大夫皆賀子獨不賀何也軫對曰臣見商於之地不可得而患必至也王曰何也對曰秦所以重王以王有齊也今地未可得而齊先絶是西生秦患北絶齊交兩國兵必至矣楚王不聽使受地於秦張儀出見使者曰從某至某廣從六里使者報楚王王大怒欲伐秦軫曰伐秦非計也王不如賂之一名都與之伐齊是我亡於秦而取償於齊也王不聽舉兵伐秦大敗於杜陵齊伐楚陳軫謂楚王曰王不如以地東解於齊西講於秦秦王謂軫曰子秦人也棄寡人事楚今齊楚相伐或謂救之便或謂救之不便子獨不可以忠為子主計以其餘為寡人乎軫曰王獨不聞夫管與之說乎有兩虎争人而鬭管莊子將刺之管與止之曰虎者戾蟲人者甘餌今兩虎争人而鬬小者必死大者必傷子待傷虎而刺之則是一舉而兼兩虎也無刺一虎之勞而有刺兩虎之名齊楚今戰戰必敗敗王起兵救之有救齊之利而無伐楚之害計聽知覆逆者惟王可也國䇿司馬錯秦人與張儀争論於惠王前司馬錯欲伐蜀張儀曰不如伐韓王曰請聞其說對曰下兵三川以臨二周此王業也今夫蜀西僻之國而戎狄之長也敝民勞衆不足以成名得其地不足以為利臣聞争名者於朝争利者於市今三川周室天下之市朝也而王不争焉顧争於戎狄王業逺矣錯曰不然欲富國者務廣其地欲強兵者務富其民欲王者務博其徳今夫蜀西僻之國也戎狄之長也取其地足以廣國得其財足以富民繕兵故拔一國而天下不以為暴利盡四海諸侯不以為貪是我一舉而名實兩附而又有禁暴正亂之名今周天下之宗室也韓周之與國也二國並力合謀以因乎齊趙而求解乎楚魏臣所謂危不如伐蜀之完也惠王曰善卒起兵伐蜀十月取之國䇿錯孫蘄事武安君白起與武安坑趙長平軍還而與之俱賜死杜郵𦵏於華池蘄孫昌為秦王鐵官昌生毋懌毋懌為漢市長毋懌生喜喜為五大夫卒𦵏髙門漢書司馬遷傳犀首隂晉人名衍姓公孫氏相魏義渠君朝於魏犀首謂義渠君曰中國無事秦得燒掇焚扞君之國有事秦將使重幣事君之國其後五國伐秦㑹陳軫謂秦王曰義渠君者蠻夷之賢君也不如賂之以撫其志秦王曰善乃以文繡千純婦女百人遺義渠君義渠君致羣臣而謀曰此公孫衍所謂邪乃起兵襲秦大敗秦人李伯之下史記張儀傳公子池三國攻秦入函谷昭王欲割河東而講召池問之對曰講亦悔不講亦悔王曰何也對曰王割河東以講三國雖去王必曰惜矣三國且去吾特以三城從之此講之悔也王不講三國入函谷咸陽必危王又曰惜矣吾愛三城而不講此不講之悔也王曰均吾悔也寧亡三城而悔無危咸陽而悔也寡人決講矣以三城講於三國兵乃退戰國䇿白起郿人善用兵事秦昭王為左庶長擊韓之新城為左更攻韓魏於伊闕斬首二十四萬抜五城遷為國尉渉河取韓安邑以東到乾河為大良造攻魏取城六十一與客卿錯攻垣城拔之攻趙拔光狼城攻楚拔鄢鄧五城眀年拔郢燒夷陵遂東至竟陵遷為武安君因取楚定巫黔中郡攻魏拔華陽走芒卯斬首十三萬與趙將賈偃戰沉其卒二萬於河中攻韓陘城拔五城斬首五萬攻南陽太行道絶之伐韓之野王野王降秦使王齕攻韓上黨上黨民走趙因攻趙趙使亷頗將堅壁待秦秦相應侯使人行反間趙因使趙括代亷頗秦乃隂使武安君為上將軍趙括至擊秦軍秦軍佯敗趙軍逐勝造秦壁堅拒不得入秦竒兵二萬五千絶趙軍後又五千騎絶趙壁間趙軍分為二糧道絶秦出輕兵擊之趙卒不得食四十六日括自搏戰秦軍射殺括括軍四十萬降武安君盡坑殺之韓趙恐使蘇代厚幣說應侯言於秦王罷兵秦復發兵攻趙武安君稱疾楚使春申君及魏公子將兵數十萬攻秦軍秦王彊起武安君稱病篤於是免為士伍遷隂宻自殺武安君死非其罪秦人憐之鄉邑皆祭祀焉史記本傳王翦頻陽人少好兵事秦始皇十一年攻趙閼與破之拔九城二十八年攻趙遂拔趙盡定趙地為郡眀年攻燕遂定燕薊而還翦子賁擊荆荆兵敗還擊魏遂定魏地始皇問李信吾欲攻取荆度用幾何人李信曰不過二十萬問翦翦曰非六十萬不可始皇使李信伐荆荆人大破李信軍始皇自馳如頻陽謝翦翦曰不得已用臣非六十萬人不可始皇曰聽將軍計於是王翦將兵六十萬東擊荆荆悉國中兵以拒秦翦堅壁不肯戰日休士洗沐親與士卒同食乆之軍中投石超距翦曰士卒可用矣荆數挑戰秦不出引而東翦舉兵追之大破荆兵至蘄南殺其將軍項燕乗勝畧定荆地城邑為郡縣因南征百越之君而王翦子王賁與李信破定燕齊地始皇并天下王氏功為多二世之時王翦及子賁已死陳勝反秦秦使王翦孫王離擊趙項羽救趙虜王離史記本傳漢重泉人李必駱甲習騎兵可為騎將漢王欲拜之必甲曰臣故秦民恐軍不信臣願得大王左右善騎者傅之廼拜灌嬰為中大夫令李必駱甲為左右校尉擊楚騎於滎陽東大破之史記灌嬰傳魏尚槐里人文帝時為雲中守軍市租盡以饗士卒出私養錢五日一殺牛以饗賔客軍吏舎人匈奴逺避不近雲中之塞敵一入尚帥車騎擊之所殺甚衆漢書馮唐傳蘇建杜陵人以校尉從大將軍衛青擊匈奴封平陵侯以將軍築朔方後以衛尉為遊擊將軍從大將軍出朔方後一嵗以右將軍再從大將軍出定襄亡歙侯失軍當斬贖為庶人其後為代郡太守卒官有三子嘉為奉車都尉賢為騎都尉中子武最知名漢書本傳張騫城固人為人強大有謀能渉逺為武帝開西域五十二國窮河源南至絶逺之國拜校尉從討匈奴有功遷衛尉博望侯至今方外開通騫之功也漢中士女志按博望雖不以武功顯然奉使殊方宣揚威命開邉拓境之功不在武臣下也自騫而後歴代使臣皆倣此趙食其祋祤人武帝立十八年以主爵都尉從大將軍斬首六百六十級元狩三年賜爵闗内侯漢書霍去病傳辛慶忌字子正少以父任為左校丞随常恵屯田烏孫赤谷城與歙侯戰䧟陣郤敵惠奏其功拜侍郎遷校尉將吏士屯焉耆國還為謁者元帝初補金城長史轉校尉遷張掖太守徙酒泉所在著名成帝初遷左曹中郎將至執金吾坐子殺趙氏左遷酒泉太守嵗餘大將軍王鳯薦慶忌通於兵事復徵為執金吾數年坐小法左遷丞相司直後拜散騎給事中嵗餘徙為左將軍慶忌居處恭儉遭世承平匈奴西域親附敬其威信年老卒官長子通䕶羌校尉中子遵函谷闗都尉少子茂水衡都尉出為郡守皆有將帥之風慶忌狄道人徙昌陵昌陵罷留長安漢書本傳馮奉世字子明潞人徙杜陵武帝末以良家子選為郎昭帝時失官前將軍韓増奏以為軍司空令先是漢數使西域多辱命増舉奉世持節送大宛諸國客至伊修城時莎車攻刼南道鄯善以西皆絶不通奉世與其副嚴昌計以為不亟擊之則莎車日強其勢必危西域遂以節諭告諸國因發其兵南北道合萬五千人進擊莎車攻拔其城莎車王自殺傳其首詣長安諸國悉平威振西域遂西至大宛大宛敬之得其名馬象龍而還上甚悦以為光禄大夫水衡都尉右將軍常惠薨奉世代為右將軍永光二年秋隴西羌反詔遣奉世將萬二千人以將屯為名到隴西天子大發兵六萬餘人以助十一月羌大破斬首數十級餘走出塞明年二月奉世還京師更為左將軍漢書本傳王遵字子春霸陵人少豪俠有才辨與隗囂舉兵數勸囂遣子入侍囂不從故去焉八年來歙襲得畧陽公孫述助囂攻畧陽使遵持節監大司馬呉漢遵知囂必敗而與牛邯舊故以書喻之邯歸命洛陽於是囂大將皆降囂恚憤死漢書隗囂傳萬修字君㳺茂陵人更始時為信都令與太守任光都尉李忠共城守迎世祖拜為偏將軍封造義侯及破邯鄲拜右將軍從平河北建武二年更封槐里侯與揚化將軍堅鐔俱擊南陽未尅而病卒後漢書本傳耿弇字伯昭茂陵人父况為王莽朔調連率王莽敗更始立况自以莽所置不自安弇奉奏詣更始以求自固聞光武在盧奴乃馳北上謁因從光武北至薊㑹薊中亂光武南馳弇走昌平就况説况約彭寵發兵弇與㓂恂景丹合軍而南擊王郎斬首三萬級定二十二縣遂及光武於廣阿光武以為偏將軍從拔邯鄲時更始徴代郡太守趙永况勸永詣光武光武遣永復郡而代令張曅據城叛光武以弇弟舒為復胡將軍擊􅁮破之更始立光武為蕭王令罷兵時光武居邯鄲宫弇請間説光武乃拜弇為大將軍北發幽州兵擊銅馬髙湖赤眉青犢又追尤來大槍五幡於元氏弇常將精騎為軍鋒輒破走之光武即位拜建威大將軍攻厭新賊大破之建武二年封好畤侯三年延岑攻南陽弇與戰於穰大破之斬首三千級岑遁走弇從幸舂陵四年詔弇進攻漁陽弇與朱祐王常等擊望都故安西山賊十餘營皆破之時祭遵劉喜拒彭寵寵遣弟將匈奴二千餘騎經軍都舒襲破其衆况復與舒攻寵取軍都五年寵死天子嘉况功使光禄大夫持節迎况封牟平侯遣弇擊富平獲索賊大破之進討張歩先擊祝阿進定濟南拔臨淄城張歩兵號二十萬弇示弱以盛其氣出戰自旦及昏大破之弇豫置伏以待縱擊八九十里僵尸相屬齊地悉平六年西拒隗囂八年從上隴明年與來歙分徇安定北地諸營堡皆下之弇兄弟六人皆垂青紫當代以為榮及况卒諡烈侯少子霸襲况爵十三年増弇户邑年五十六永平元年卒諡曰愍侯子忠嗣忠以騎都尉擊匈奴於天山有功後漢書本傳耿國字叔慮弇弟建武四年初入侍光武拜黄門侍郎七年拜駙馬都尉厯頓丘陽翟上蔡令所在吏人稱之徵為五官中郎將時烏桓鮮卑屢㓂外境國素有籌䇿數言邉事帝器之及匈奴薁鞬日逐王比自立為呼韓邪單于欵塞稱藩願扞禦北邊議者皆以夷狄情偽難知不可許國獨以為宜如孝宣故事受之令東扞鮮卑北拒匈奴帝從其議立比為南單于由是烏桓鮮卑保塞自守中國少争二十七年代馮勤為大司馬又上言宜置度遼將軍左右校尉屯五原以防逃亡永平元年卒官顯宗後置度遼將軍左右校尉如其議焉後漢書耿弇傳景丹字孫卿櫟陽人更始立為上谷長史王郎起丹將兵南歸世祖拜為偏將軍號奉義侯從擊王郎將兒宏等于南䜌丹等縱突騎擊大破之追奔十餘里死傷者縱横丹還從征河北世祖即位拜丹為驃騎大將軍建武二年定封櫟陽侯秋與呉漢耿弇等從擊破五校于羛陽降其衆五萬人㑹陜賊蘇况攻破𢎞農生獲郡守丹時病帝以其舊將欲令強起領郡事丹不敢辭乃力疾拜命將營到郡十餘日薨子尚嗣徙封余吾侯尚卒子苞嗣苞卒子臨嗣臨無子國絶永初七年封苞弟遽為監亭侯後漢書本傳班超字仲升平陵人有志節為官傭書常輟業投筆嘆曰丈夫當立功異域以取封侯安能乆事筆研間乎後竇固出擊匈奴以超為假司馬將兵别擊伊吾戰於蒲類海多斬首級而還使西域鄯善王廣奉禮甚備後忽懈超曰此必有北國使來夜將吏士奔敵營順風縱火斬其使鄯善王震怖納子為質固上功以超為軍司馬令遂前功時于寘王廣徳匈奴遣使監䕶其國超至于寘廣徳素聞超在鄯善誅滅北使大惶恐即攻殺匈奴使者而降超龜兹王建攻破疏勒立龜兹人兠題為王超遣使刼縛兠題立故王兄子忠為王肅宗即位詔徴超超至于寘王侯號泣抱馬脚不得行乃更還疏勒建初三年率疏勒康居于寘兵一萬人攻姑墨石城破之欲因此叵平諸國上疏請益兵平陵人徐幹願佐超五年以幹為假司馬將千人就超先是莎車降於龜兹而疏勒都尉番辰亦反超與幹擊番辰破之八年拜超為將兵長史幹為軍司馬明年疏勒王忠反超攻忠後三年忠與龜兹謀遣使詐降詣超超叱吏縛忠斬之明年發于寘諸國兵復擊莎車莎車降明年龜兹姑墨温宿皆降乃以超為都䕶徐幹為長史超乃期大㑹諸國王於是西域五十餘國悉皆納質明年詔封超定逺侯超乆在絶域上疏願入闗超妹昭亦上書請超乃徵超還卒長子雄累遷屯騎校尉㑹羌冦三輔詔雄將五營兵屯長安就拜京兆尹後漢書本傳耿秉字伯初國子好將帥畧以父任為郎數上言兵事永平中拜謁者僕射十五年拜駙馬都尉十六年與奉車都尉竇固等伐北匈奴虜皆奔走不戰而還十七年詔秉與固合兵出白山擊車師車師有前後王廷相去五百餘里固欲攻前王秉議先赴後王固計未決秉奮身而起衆軍遂進斬首數千級收馬牛十餘萬頭後王惶恐走出門脱帽抱馬足降秉將以詣固其前王亦歸命遂定車師而還明年秋肅宗即位拜征西將軍遣案行涼州建初元年拜度遼將軍視事七年匈奴懷其恩信徵為執金吾章和二年復拜征西將軍副竇憲擊北匈奴大破之封美陽侯永元二年代桓虞為光禄勲明年夏卒諡曰桓侯子冲嗣官漢陽太守後漢書耿弇傳耿䕫字定公秉弟少有氣決永元初為竇憲假司馬北擊匈奴轉騎都尉三年復出河西為大將軍左校尉將精騎八百出居延塞直奔北單于廷於金㣲山斬閼氏名王已下五千餘級單于脫亡封粟邑侯遷遼東太守元興元年貊人㓂郡界䕫擊斬其渠帥永初三年南單于反使䕫率鮮卑及諸郡兵屯鴈門單于遣薁健日逐王三千餘人遮漢兵䕫擊其左令鮮卑攻其右虜敗走追斬千餘級建光中拜度遼將軍時鮮卑攻殺雲中太守成嚴圍烏桓校尉徐常於馬城䕫與幽州刺史龎參救之追敵出塞而還後坐法免卒於家後漢書耿弇傳耿恭字伯宗國弟廣之子慷慨多大畧有將帥材永平十七年劉張出擊車師請恭為司馬破降之以功為戊己校尉屯後王部金蒲城恭移檄烏孫大昆彌已下皆遣子入侍明年北單于遣左鹿蠡王二萬騎擊車師遂攻金蒲城恭乗城搏戰以毒藥傅矢射之中者視創皆沸大驚解去恭以疏勒城傍有澗水可固乃引兵據之七月匈奴復來擁絶澗水恭於城中穿井十五丈不得水吏士渇乏恭乃整衣服向井拜禱有頃泉奔出乃令吏士揚水示敵敵以為神明遂引去車師畔與匈奴共攻恭恭厲士衆擊走之後數月食盡煮鎧弩食其筋革單于遣使招恭恭擊殺之炙諸城上單于大怒益兵圍恭不能下肅宗即位遣秦彭王䝉發兵七千餘人㑹車師降䝉等欲引還先是恭遣軍吏范羌迎兵士寒服随王䝉軍出塞羌固請迎恭乃分兵二千人從山北至城中開門相持泣明日俱歸時尚有二十六人至玉門唯餘十三人恭至雒陽拜為騎都尉秋金城隴西羌反恭將五校士屯枹罕數與羌戰燒何羌等十三種皆降監營謁者奏恭不憂軍事免官卒於家子溥為京北虎牙都尉溥子宏曅並為郎曅字季遇順帝初為烏桓校尉時鮮卑冦縁邉曄率烏桓及諸郡卒出塞討擊大破之鮮卑震怖詣遼東降自後頻出輒克獲遷度遼將軍後漢書耿弇傳班勇字宜僚超子少有父風永初元年西域反以勇為軍司馬與兄雄俱出敦煌迎都䕶及西域甲卒而還因罷都䕶元初六年敦煌太守請出兵擊匈奴復取西域勇上議宜復置䕶西域副校尉居敦煌又宜遣西域長史屯樓蘭西當焉耆龜兹徑路南彊鄯善于寘心膽北扞匈奴東近敦煌於是從勇議延光二年以勇為西域長史出屯栁中明年正月勇至樓蘭龜兹王白英詣勇降因發兵擊走匈奴伊蠡王于伊和谷前部始復開通還屯田栁中四年秋發兵擊後部王軍就大破之永建元年更立後部故王子為王又使别校誅東且彌王更立其種人為王於是車師六國悉平其冬勇擊匈奴呼衍王呼衍王亡走是後車師無復虜跡後擊焉耆勇以後期徵下獄免卒於家後漢書班超傳程苞字元道南鄭人光和二年上計吏時巴郡板楯反軍旅數起征伐頻興天子患之訪問益州計吏考以方畧苞對言板楯忠勇立功先漢為帝義民羌入漢中輒䝉其力東征南戰世有功勞由不料恤以致叛亂非有僭盜能相羣殺兵臨之未必卒得不如但選明敏太守恩信懐服自然安定矣天子從之卒如其言後在道卒漢中士女志張奂字然明酒泉人舉賢良擢拜議郎永夀元年遷安定屬國都尉初到職南匈奴左薁鞬等㓂美稷東羌應之奐壁唯二百許人聞即勒兵屯長城收集兵士詔誘東羌共擊薁鞬等連戰破之郡界以寧遷使匈奴中郎將時休屠各及朔方烏桓同反奐乃潜誘烏桓隂與和通遂使斬屠各渠帥襲破其衆諸敵悉降延熹元年鮮卑冦邉奐率南單于襲之斬首數百級遷度遼將軍數載間幽并清浄九年為䕶匈奴中郎將鮮卑出塞去永康元年東羌先零㓂闗中冬羌岸尾摩蟞等鈔三輔奐擊大破之三州清定賜除並不受願徙屬𢎞農華隂始為𢎞農人建寧元年振旅而還遷拜大司農光和四年卒年七十八後漢書本傳馬騰字夀成茂陵人馬援後父字子碩為天水蘭干尉騰性賢厚靈帝末為軍行事典領部衆討賊有功拜軍司馬遷征西大將軍初平中拜征東偏將軍是時西州少榖騰自表軍人多乏求就榖於池陽遂移屯長平岸頭而將王丞等恐騰為已害乃攻騰營時騰近出無備遂破走西土㑹三輔亂不復來東與鎮西將軍韓遂結為兄弟始甚相親後轉以部曲相侵又更為讐敵騰攻遂遂走合衆還攻騰殺騰妻子連兵不解建安初徵騰還屯槐里轉拜為前將軍假節封槐里侯北備山戎東備白騎待士敬賢矜救民命三輔甚賴之十五年徵為衛尉騰自見年老遂入宿衛初曹公為丞相辟騰長子超不就及騰之入因詔為偏將軍使領騰營又拜超弟休奉車都尉休弟鐵騎都尉徙其家屬皆詣鄴惟超獨留典畧馬超字孟起茂陵人父騰徵為衛尉超為偏將軍封都亭侯領騰部曲與韓遂等相結進軍至潼闗曹公單馬㑹語超隂欲突前捉曹曹將許禇瞋目盼之超乃不敢動曹用賈詡謀離間超遂軍以大敗超走保諸戎率諸戎擊隴上郡縣皆應之殺凉州刺史韋康據冀城有其衆自稱征西將軍領并州牧督涼州軍事康故吏民楊阜等合謀擊超超奔漢中依張魯聞先主圍劉璋於成都宻書請降先主遣人迎超超將兵徑到城下城中震怖璋即稽首以超為平西將軍先主為漢中王拜超為左將軍章武元年遷驃騎將軍領涼州牧進封斄鄉侯卒從弟岱位為平北將軍進爵陳倉侯三國蜀志本傳魏張既字徳容髙陵人舉茂材除新豐令治為三輔第一袁尚拒太祖於黎陽遣郭援髙幹與闗中諸將合從既說馬騰等將兵㑹擊斬援首幹降後幹復反太祖使既西徵馬騰等引兵破之騰子超反既從太祖定闗右以既為京兆尹從征張魯别從散闗討叛氐代收其麥以給軍食文帝初置涼州以鄒岐為刺史盧水寇反帝以既代之既進軍顯美夜藏精卒為伏使千餘騎挑戰陽退寇争奔之因發伏截其後斬首獲生以萬數封西鄉侯蘇衡反既與夏侯儒撃破之黄初四年薨追諡肅侯三國魏志本傳梁杜崱杜陵人父懐珤少有志節梁天監中累有軍功後又立功南鄭位梁秦二州刺史大同初魏軍復圍南鄭懐珤命第三子嶷二百人與魏前鋒戰於光道寺流矢中其目失馬敵人交矟將至嶷斬其一騎而上馳以歸嶷膂力過人使馬善射一日中戰七八合所佩霜明朱弓四石餘力斑絲纒矟長二丈五同心敢死士百七十人每出殺傷數百人敵人憚之號為杜彪懷珤卒諡曰桓侯嶷位西荆州刺史崱嶷弟也以膽勇稱太清二年歸元帝元帝以為武州刺史隨王僧辯東討侯景至巴陵景遁加侍中進爵為公仍隨僧辯追景至石頭景敗崱入據臺城景平加散騎常侍江州刺史齊將郭元建攻秦州僧辯令崱赴援大破之元建遁王琳長史陸納等反帝徵崱與王僧辯討之及納等戰於車輪大敗之納等降又與僧辯西討武陵王於硤口旋鎮遘疾卒諡曰武兄嵩岑嵸岌嶷巚岸及弟㓜安並知名岸字公衡太清中與崱随岳陽王詧攻荆州同歸元帝帝以為北梁州刺史岸請以五百騎襲襄陽詧夜遁歸襄陽岸等知詧至遂奔其兄南陽太守巚於廣平詧遣將攻拔之獲巚岸等斬於襄陽幼安性至孝寛厚雄勇過人與兄崱同歸元帝帝以為西荆州刺史與王僧辯討河東王譽於長沙平之又助徐文盛東討侯景至貝磯大敗景將任約斬其儀同叱羅子通湘州刺史趙威方等仍進軍大舉漢口别攻武昌景度蘆洲上流以壓文盛幼安與衆軍大敗之㑹景䧟郢州人情大駭文盛遁歸衆軍大敗幼安降景景殺之龕岑之子也少驍勇善用兵與諸父歸元帝帝以為鄖州刺史與王僧辯東討河東王譽又随僧辯下繼徐文盛軍至巴陵聞侯景西上乃與僧辯等守巴陵景圍之數旬不尅而遁遷定州刺史及衆軍至姑孰景將侯子鑒逆戰龕擊之大敗子鑒遂至於石頭景親㑹戰龕與衆軍大破之論功為最又與王僧辯降陸納平武陵王及魏平江陵齊納貞陽侯明以紹梁嗣以龕為震州刺史呉興太守遷散騎常侍鎮南大將軍龕僧辯壻也陳文帝銜之切齒及僧辯敗龕據吳興以拒之頻敗陳文帝軍部將杜泰私通於文帝說龕降龕然之其妻王氏曰霸先讐隙如此何可求和因出私財賞募復大敗文帝軍後杜泰降文帝文帝遣人負龕出項王寺前斬之王氏因截髮出家杜氏一門覆矣南史本傳康絢字長明藍田人少俶儻有志氣曽祖因為苻堅太子詹事祖穆為姚萇河南尹絢伯元隆父元撫相繼為華山太守絢仕齊為華山太守梁武起兵絢舉郡以應天監元年除竟陵太守累遷太子右衛率甲仗百人直殿内時堰淮水以灌夀陽假絢節都督淮上諸軍事并䕶堰作役人及戰士十四年魏遣將楊大眼揚聲決堰絢命諸軍撤營露次以待之遣其子恱挑戰斬魏咸陽王府司馬徐方興魏軍小却十五年四月堰成絢開湫東注又縱反間於魏魏人信之鑿山深五丈開湫北注水日夜分流湫猶不减其月魏軍竟潰而歸水之所及夾淮方數百里魏夀陽城戍稍徙頓於八公山尋除司州刺史領安陸太守絢在州大修城隍號為嚴整普通元年除衛尉卿未拜卒諡曰壯子悦嗣南史本傳馬仙琕字靈馥郿人父伯鸞宋冠軍司馬仙琕少以果敢聞永元中累有戰功出為南汝隂譙二郡太守㑹夀陽新陷魏將王肅侵邊仙琕力戰克之以功遷寧朔將軍義師起四方多響應髙祖使人説之仙琕斬以徇持兵於江西日鈔運漕建康城陷號哭經宿解兵歸髙祖天監四年王師北討仙琕每戰勇冠三軍當其衝者莫不摧破與諸將議口未嘗言功遷南義陽太守累破山蠻郡境清謐遷都督司州諸軍事十年朐山民殺琅邪太守以城降魏詔仙琕討之魏徐州刺史盧昶以歩騎十餘萬赴焉仙琕與戰累破之昶遁走仙琕縱兵乗之魏衆免者十一二收兵糧牛馬器械不可勝數振旅還京師遷太子左衛率進爵為侯十一年遷豫州刺史領南汝隂太守仙琕在邉境常單身潜入敵庭伺知壁壘村落險要處所故戰多克㨗士卒亦甘為用髙祖雅愛仗之在州四年卒諡曰剛子嚴夫嗣梁書本傳張齊馮翊人少有膽氣為歴陽太守吏治甚修天監二年遷天門太守四年魏將王足㓂巴蜀以齊為輔國將軍救蜀未至足退走齊進戌南安七年遷巴西太守十年郡人姚景和聚合蠻蜑抄斷江路攻破金井齊討景和於平昌破之十一年進假節都督益州外水諸軍十二年魏將傅竪眼㓂南安齊率衆拒之竪眼退走十四年遷巴西梓潼二郡太守是嵗葭萌人任令宗殺魏晉夀太守以城歸欵益州刺史翻陽王遣齊帥衆三萬督南梁州諸軍迎令宗十五年魏東益州刺史元法僧遣子景隆來拒齊帥南安太守皇甫諶及宗範逆擊之大破魏軍於葭萌屠十餘城魏將邱突王穆等皆降齊在益部累年討擊蠻獠身無寧嵗十七年遷持節智武將軍南梁州刺史普通四年卒諡曰壯梁書本傳陳韋載字徳基杜陵人沈敏有器局起家梁邵陵王法曹參軍侯景之亂王僧辯東討元帝以載為假節都督太原髙唐新蔡諸軍事率三郡兵自焦湖出柵口與僧辯㑹於梁山景平除冠軍將軍尋授義興太守髙祖誅王僧辯遣周文育輕兵襲載載嬰城自守髙祖遣載族弟􅞪賫書喻載以誅僧辯意并奉梁敬帝勅勅載解兵載以衆降髙祖以其族弟􅞪監義興郡引載恒置左右與之謀議徐嗣徽任約等引齊軍濟江據石頭城髙祖問計於載載曰齊若分兵先據三吳路時事去矣今急於侯景舊壘築城以通東道轉輸命輕兵絶其糧道則齊將之首旬日可致髙祖從其計永定元年除和戎將軍通直散騎常侍二年進太子右衛率天嘉元年以疾去官卒於家􅞪字子羽少有志操以仁孝著稱髙祖為南徐州刺史召為征北參軍尋監義興郡遷驍騎將軍領朱衣直閣尋出為宣城太守天嘉二年預平王琳之功封清源縣侯大建中卒官子宏字徳禮有文學厯官至永嘉府諮議參軍陳書本傳魯悉達字志通郿人起家梁南平王中兵參軍侯景之亂悉達招集晉熙等五郡盡有其地使其弟廣達領兵随王僧辯討侯景景平授江州刺史髙祖遣趙知禮授征西將軍送鼓吹女樂悉達受之不就髙祖遣沈泰襲之不能克齊遣慕容紹宗來攻鬱口諸鎮悉達與戰敗齊軍紹宗僅以身免王琳欲圖東下以悉達制其中流頻遣使招誘悉達終不從琳乃連結於齊齊遣髙岳助之相持嵗餘㑹禆將梅天養等引齊軍入城悉達勒麾下數千人濟江歸髙祖授平南將軍北江州刺史封彭澤縣侯世祖即位進號安左將軍遷呉州刺史遭母憂哀毁過禮因遘疾卒諡曰孝侯子覽嗣悉達弟廣達字遍覽少慷慨志立功名侯景之亂與兄悉達聚衆保新蔡梁元帝承制授假節壯武將軍晉州刺史景平加員外散騎常侍髙祖受禪授征逺將軍東海太守尋除假節信武將軍新蔡太守随呉明徹討周迪於臨川每戰功居最仍代兄悉達為呉州刺史授都督南豫州諸軍事南豫州刺史大建初與儀同章昭達入峡口拓定安蜀等州鎮時周氏將圗江左大造舟艦於蜀并運糧青泥廣達將兵掩襲縱火焚之以功増封仍還本鎮五年衆軍北伐畧淮南舊地廣達與齊軍㑹於大峴大破之進克北徐州授都督北徐州諸軍事徐州刺史入為右衛將軍十二年都督郢州諸軍事後主即位入為安左將軍二年授安南將軍拜侍中改封綏越郡公及賀若弼進軍鍾山廣達率衆於白土崗南置陣躬擐甲胄手執桴鼔率勵敢死冒刄而前殺傷甚衆及弼攻敗諸將乗勝至宫城廣達猶督餘兵苦戰不息㑹日暮乃解甲面臺再拜慟哭士卒皆涕泣於是就執依例入隋廣達愴本朝淪覆遘疾不治尋以憤慨卒陳書本傳北魏韋珍閬族弟杜陵人父尚安西府從事珍少有志操髙祖初蠻首桓誕歸欵令珍與誕招慰蠻左自懸瓠西入三百餘里至桐栢山窮淮源宣揚恩澤招降七萬餘户置郡縣而還以奉使稱㫖除左將軍樂陵鎮將賜爵霸城子蕭道成民謝天葢自署司州刺史欲以州内附為道成將崔慧景攻圍詔珍渡淮援接珍破慧景擁降民七千餘户内徙表置城陽剛陵義陽三郡以處之詔珍移鎮北陽蕭頤遣陳顯達率衆來㓂珍凴城拒戰殺傷甚衆相持旬有二日夜開城門掩擊之賊遂奔潰以功進爵為侯後車駕征樊郢既平以珍試守魯陽郡及髙祖崩除中散大夫尋加鎮逺將軍太尉諮議參軍永平元年卒諡曰懿子纉字遵彦聰敏明辯為博士李彪所稱髙祖每與名徳沙門談論往復纉掌綴録無所遺漏夀春内附王肅出鎮揚州請纉為長史帶梁郡太守永平三年卒朏字遵顯少有志業年十八辟州主簿遷秘書郎中稍遷左軍將軍南郢州刺史田夷啟稱朏父珍往任荆州恩洽夷夏乞朏充南道别將領荆州驍勇共為腹背詔從之未幾行南荆州事肅宗末除東徐州刺史尋遷東安將軍加散騎常侍蕭衍遣其潁州刺史田麤喜來㓂朏於石羊岡破斬之永安二年卒諡曰宣子鴻中書舎人弟道植中兵參軍魏書韋閬傳楊播字延慶華隂人髙祖結中山相曽祖珍上谷太守祖真河内清河太守父懿廣平太守有稱績除洛州刺史母王氏文明太后之外姑播以外親進比部給事中詔播廵行北邉髙祖親送及户戒以軍畧與平陽王頤出漠北擊蠕蠕大獲而還除左將軍随車駕南討至鍾離師囘詔播領歩騎為衆軍殿時春水初長賊衆大至播以諸軍渡淮未訖賊衆圍播乃為圓陣以禦之身自搏擊斬殺甚多相拒再宿水勢稍减播領精騎三百厯其舟船大呼曰今我欲渡能戰者來賊莫敢動遂擁衆而濟髙祖壯之尋除右將軍後從駕討崔慧景蕭衍於鄧城破之進號平東將軍景明初使恒州贍恤寒乏授華州刺史延昌二年卒於家諡曰壯魏書本傳楊椿字延夀播弟性寛謹授中部曹折訟公正髙祖嘉之後為梁州刺史初楊集始降於蕭鸞至是規復舊土椿貽書集始開以利害遂領其部曲來降武都氐楊㑹反假椿節冠軍將軍與軍司户羊祉討破之秦州羌呂茍兒涇州屠各陳瞻等聚衆反詔椿為别將討之賊入隴守蹊自固乃緩師不進隂簡精卒銜枚夜襲斬瞻加安東將軍正光五年除雍州刺史時涇岐及豳悉已陷賊扶風以西非復國有椿乃鳩募内外得七千餘人遣兄子侃率以防禦詔以本官加侍中為行臺普泰元年為􅈛朱天光所害弟頴本州别駕子叔良新安太守頴弟順兾州刺史子辯東雍州刺史辯弟仲宣有風度才學為正平太守有能名就加安西將軍還京之日兄弟與父同遇害弟測朱衣直閣亦同時見害測弟稚卿大昌中為尚書右丞魏書楊播傳楊津字羅漢順弟本名延祚少以器度見稱延昌末拜右衛將軍孝昌初加散騎常侍以本官行定州事賊帥鮮于修禮起博陵定州圍急津開門出戰斬賊帥一人殺賊數百賊退人心稍安加鎮軍將軍北道行臺賊帥薛修禮杜洛周􅋊掠州境津貯積柴粟修理戰具賊毎來攻機械競起又於城中廣作地道潛兵湧出置爐鑄鐵持以灌賊賊遂畏楊公鐵星津與賊帥元洪業等書令圗賊帥毛普賢洪業等感悟修禮普賢由此而死既而杜洛周圍城津盡力捍守葛榮以司徒說津津大怒斬其使以絶之􅈛朱榮死以津為都督驃騎大將軍北道大行臺委以討胡而􅈛朱仲逺已陷東都普泰元年亦遇害於洛諡曰孝穆津有六子長子遁字山才性恬退年近三十方為主簿莊帝北廵奉詔慰勞山東永安末遷征東將軍亦被害於洛諡曰恭定播家世純厚並敦義讓昆季相事有如父子播剛毅椿津恭謙一家之内男女百口緦麻同㸑庭無間言世隆誣其為逆遣歩騎夜圍其宅天光亦同日收椿於華隂無少長皆遇害籍其家播族弟鈞祖暉洛州刺史父恩河間太守鈞頗有幹用拜恒州刺史轉懷朔鎮將所居以強濟稱後為七兵尚書北道行臺卒長子暄尚書郎暄弟穆華州别駕穆弟儉北雍州刺史儉弟寛黄門郎魏書楊播傳楊侃字士業播子好計畫襲爵華隂伯侃叔椿為雍州刺史請為録事參軍府州之務多所委決後蕭寳夤據州反僕射長孫稚討之除侃為行臺左丞軍次𢎞農侃白稚北取蒲坂飛棹西岸潼闗之賊必望風潰散諸處既平長安自克稚從之長安平建義初為東雍州刺史州罷除都督鎮潼闗屬元顥内逼詔率衆駐大梁侃召發村民多縛筏間以舟檝令數百里中皆為渡勢侃等遂於馬渚楊南渡破之顥南走以功進爵濟北郡開國公万俟醜奴䧟東秦圍岐州扇誘巴蜀􅈛朱天光西伐詔侃為闗右慰勞大使普泰初為天光所害魏書楊播傳張元亮漢中人便弓馬善戰鬭以勲封撫夷縣開國子遷龍驤將軍魏書江悦之傳士孫天與扶風人以勲封莫西縣男武功太守魏書江悦之傳李忻榮漢中人擊尹天寳戰歿子建為清水子魏書江悦之傳魏按張元亮與士孫天與李忻榮皆以梁州附梁華陽太守尹天寳圍城亮等皆有戰功周陸通字仲明呉郡人曾祖載從宋武帝平闗中按續文獻通考云載留鎮闗中後家長安通好學有志節文帝引為帳内督賀拔岳為侯莫陳悦所害時有傳軍府已亡散者文帝憂之通以為不然問至果如所䇿自是愈見親禮從擒竇泰復𢎞農沙苑之役力戰有功又從解洛陽圍軍還趙青雀反於長安文帝將討之以人馬疲敝不可速行通進曰青雀等詐言大軍敗績東㓂將至今兵雖疲敝精鋭猶多以明公之威率思歸之衆何慮不平文帝深納之因從平青雀功進爵為公進儀同三司九年髙仲宻以地來附通從若干惠戰於芒山衆軍皆退惟通率所部力戰至夜乃還授驃騎大將軍遷大司冦通性柔謹清慎自守建徳元年轉大司馬薨弟逞起家羽林監累遷驃騎大將軍開府儀同三司幹識詳明所在著績進爵為公天和三年齊遣斛斯文略來聘詔逞為使報之逞善辭令敏而有禮齊人稱焉為宜州刺史有惠政東宫初建授太子太保卒子操嗣周書本傳王羆字熊羆京兆人除殿中將軍稍遷雍州别駕後以軍功封定陽子除荆州刺史梁使曹義宗圍荆州堰水灌城不沒者數板城中糧盡羆乃煮粥與將士均令食之出戰不擐甲胄三年義宗方退進封霸城縣公莊帝時南秦數叛以羆行南秦州事擊捕反者孝武西遷進車騎大將軍除華州刺史嘗修州城未畢梯在城外神武遣韓軌司馬子如從河東宵濟襲羆比曉乗梯入城羆尚卧未起聞閣外洶洶便袒身露髻徒跣持一白棒大呼而出戰破之軌遁走沙苑之役神武至城下不敢攻河橋之戰王師不利羆召城中戰士固守軍士皆無異心徵拜雍州刺史未幾鎮河東卒於官諡曰忠子慶逺為直閣大將軍北史本傳扶猛字宗畧黄土人其種落號白獸蠻猛仕梁位南洛北司二州刺史封宕渠縣男魏廢帝元年以衆降周文厚加撫納復爵縣男羅州刺史令從開府賀若敦南討信州敦令猛直道白帝所由之路人迹不通猛乃梯山捫葛備歴艱阻遂入白帝城撫慰人夷莫不悦附以功進開府儀同三司俄而信州蠻反從賀若敦平之進爵臨江縣公後從田𢎞破漢南諸蠻進位大將軍卒北史本傳蘇椿字令欽綽弟武功人性亷慎沉勇有決斷魏正光中闗右賊亂椿應募討之受盪冦將軍以功累遷中散大夫賜爵美陽子大統初拜鎮東將軍金紫光祿大夫賜姓賀蘭氏後除帥都督行𢎞農郡事椿當官強濟特為周文帝所知十四年置當州鄉師乃令椿領鄉兵其年破槃頭氐有功除散騎常侍加大都督十六年征随郡軍還除武功郡守進爵為侯位驃騎大將軍開府儀同卒子植嗣北史蘇綽傳韋瑱字世珍杜陵人曽祖度惠魏中書侍郎祖千雄略陽郡守父英代郡守瑱幼聰敏起家雍州治中遷郢州刺史入為行臺左丞從復𢎞農戰沙苑加左光祿大夫又從戰河橋進爵為子大統八年齊神武侵汾絳瑱從太祖禦之軍還除蒲州總管府長史頃之以望族領鄉兵進車騎大將軍瑱雅性清儉兼有武略公私安静夷夏懷之授侍中驃騎大將軍開府儀同三司卒諡曰惠子峻位至車騎大將軍儀同三司峻弟師蒲州總管府中郎行河東郡事周書本傳杜杲字子暉杜陵人祖建魏輔國將軍父皎武都郡守杲有當世幹略起家奉朝請累遷修城郡守屬鳯州人仇周貢等搆亂攻逼修城杲信洽於民部内無畔者尋開府趙昶諸軍進討杲率郡兵與昶合勢遂破平之入為司㑹上士初陳文帝弟頊為質於梁及江陵平遷長安陳人請之太祖許而未遣至是欲歸之命杲使焉陳文帝大悦即遣使報聘并賂黔中數州地以杲奉使稱㫖進都督更往分界陳人於是以魯山歸我帝乃拜頊柱國大將軍詔杲送之還國杲還朝廷嘉之授大都督治小納言復聘於陳大象二年加開府儀同大將軍進爵為侯隋開皇二年除西南道行臺兵部尚書尋卒子運大象末宣納上士周書本傳王子直字孝正杜陵人父琳東雍州長史子直性節儉有幹能起家奉朝請除太尉府水曹參軍梁人圍夀春臨淮王元彧率軍赴援子直以本官參彧軍事與梁人戰斬其軍主夏侯景超梁人乃退永安初拜鴻臚少卿魏孝武西遷封山北縣男大統初漢熾屠各阻兵於南山太祖令子直率歩騎討破之除尚書左外兵郎中進車騎將軍四年從太祖解洛陽圍經河橋戰兼尚書左丞出為秦州總管府司馬時凉州刺史宇文仲和據州逆命子直從隴右大都督獨孤信討平之吐谷渾㓂西平以子直兼尚書兵部郎中出隴右經畧之大破渾衆於長寜川進車騎將軍左光禄大夫轉并州長史魏廢帝元年拜使持節大都督行𤓰州事子直性清靜務以徳政化民西土悅附魏恭帝初拜黄門郎卒於位子宣禮柱國府參軍事周書本傳竇熾字光成平陵人父略平逺將軍熾性嚴明有謀畧膂力過人永安元年􅈛朱榮破葛榮榮别帥韓婁據薊城不下以熾為都督討之熾手斬婁以功拜揚烈將軍魏孝武即位梁主遣元樹入㓂攻䧟譙城熾率竒兵破之進爵上洛縣伯時帝與齊神武搆隙以熾有威重拜閣内大都督從帝西遷與髙金龍戰千秋門敗之大統元年以從駕功别封真定縣公從擒竇泰復𢎞農破沙苑皆有功又從李弼討白額稽胡破之髙仲宻來附率兵從太祖援之東魏據邙山大破之追至石濟而還遷車騎大將軍十三年進使持節驃騎大將軍開府儀同三司涇州刺史魏恭帝元年茹茹㓂廣武熾率兵分討度河至麴使川追及與戰大破之保定元年進封鄧國公宣政元年兼雍州牧隋文帝初為相國百官皆勸進熾自以累代受恩不肯署牋時人髙其節開皇四年薨諡曰恭子茂嗣周書本傳王悦字衆喜藍田人少有氣幹太祖初定闗隴悦募鄉里從軍屢有戰功大統元年除平東將軍封藍田縣伯四年東魏將侯景攻圍洛陽悦又率鄉里千餘人從軍斬獲居多十四年授雍州大中正加衛將軍從大將軍楊忠征随郡安陸並平之時懸軍深入悦度路程節減糧食至諸軍匱乏分給之太祖聞而嘉焉尋拜京兆郡守遷大行臺尚書又領所部兵從達奚武征梁漢武令悦説其城主楊賢悦貽之書賢遂降悦説武率輕騎七百徑趣白馬其將梁深以城降梁州平即以悦行刺史事孝閔踐阼拜使持節驃騎大將軍開府儀同三司大都督進爵河北縣公悦性儉約不營生業雖出入榮顯家徒四壁而已世宗手勅勞勉之保定元年卒於位子康嗣周書本傳毛遐字鴻逺三原人曾祖天愛定州刺史始昌子傳至遐四世不絶正光中蕭寳夤討闗中諸賊以遐為府長史寳夤敗還長安三輔騷擾遐因辭還北地與弟鴻賔聚鄉曲豪傑東西畧地氐羌多赴之共推鴻賔為盟主既而賊帥宿勤買奴自號京兆王遐與鴻賔縱兵追擊七栅皆平後寳夤搆逆謀遐知之乃寄書與鴻賔索馬迎接復於馬祇柵建旗鼔以拒寳夤攻其將盧祖遷禽之詔授遐南幽州刺史又攻破其將侯終徳寳夤知内外勢異輕騎走巴中孝武帝入闗稍遷驃騎大將軍儀同三司卒弟鴻賔狀貌頗異昆季之中尤輕財好施及賊起常與遐一守一戰後拜岐州刺史明帝以鴻賔兄弟所定處多乃改北地郡為北雍州三原縣為建中郡以旌其兄弟後􅈛朱天光自闗中還洛鴻賔領鄉中壯武二千人以從拜西兖州刺史羈寓倦㳺之輩四座常滿鴻賔資給衣食與已悉同轉南青州刺史未幾徵還孝武帝與齊神武有隙令鴻賔鎮潼闗車駕西幸漿糗乏絶鴻賔奉獻酒食迎於稠桑武帝把其手曰寒松勁草所望於卿仍留守潼闗後神武來㓂見禽至并州憂恚卒弟鴻顯位散騎常侍遐乳母所産也遐養之為弟因姓毛氏勁悍多力後随諸兄戰鬭多先鋒陷陣大統四年為廣州刺史鎮東陽陷東魏卒北史本傳宇文貴字永貴其先昌黎人徙居夏州正光末破六汗拔圍夏州刺史源子雍嬰城固守以貴為統軍救之前後數十戰軍中咸服其勇後從􅈛朱榮擒葛榮於㵚口加别將又從元天穆平邢杲轉都督元顥入洛從􅈛朱榮焚河橋力戰有功加征虜將軍大統三年潁州刺史來降東魏遣堯雄攻潁貴與雄合戰馬中矢乃短兵歩鬭雄大敗走師還進侍中驃騎大將軍羌人傍乞鐵忽與渭州民鄭五醜扇惑諸羌同反太祖令貴與豆盧寧史寧討之擒斬鐵忽及五醜朝廷美其功立碑以紀其績孝閔帝踐阼進位柱國武成初與賀蘭祥討吐谷渾軍還進封許國公厯遷太保天和二年薨諡曰穆子善嗣善弟忻驍勇絶倫有將帥才畧位至上柱國進封英國公忻弟愷少好學雜藝多通襲祖爵安平郡公起家右侍上士位至上開府周書本傳王雅字度容新囶人少沈毅木訥寡言有胆勇善騎射周文聞其名召入軍以功賜爵居庸縣子從擒竇泰於潼闗沙苑之戰雅擐甲出戰所向披靡周文壯之又從戰邙山時諸將皆退雅獨拒之敵人見其無繼歩騎競進左右奮擊斬九級敵衆稍退雅乃還周文嘆曰王雅舉身悉是胆也進爵為伯累遷驃騎大將軍開府儀同三司明帝初除汾州刺史人庶悦附自逺至者七百餘家卒於夏州刺史子世積嗣北史本傳李遷哲字孝彦安康人少有識度慷慨善謀畫起家文徳主帥大同二年除安康郡守大統十七年太祖遣達奚武等畧地山南遷哲率所部拒戰軍敗遂降即拜車騎大將軍封沌陽縣伯魏恭帝初直州人樂熾等為亂太祖以遷哲信著山南令往經畧熾等或降或獲尋並平蕩仍與敦南出徇地梁巴州刺史牟安民惶懼請降其子宗徹等猶據琵琶城遷哲攻而尅之軍次鹿城城主遣使請降遷哲謂其詐梁果於道左設伏遷􅈒進擊破之自此降欵相繼軍還除直州刺史仍令與田𢎞討信州凡下十八州拓地三千里及旋軍令遷􅈒留鎮白帝世宗三年進位大將軍四年詔率金上諸州兵鎮襄陽建徳二年進爵安康郡公三年卒諡壯武子洛嗣周書本傳陽雄字元畧上洛邑陽人祖斌位上庸太守雄起家奉朝請累遷至都督積射將軍從于謹攻盤頭柵復從李逺經沙苑陣並力戰有功封安平縣侯後入洛陽戰河橋解玉壁圍迎髙仲宻援侯景並預有戰功從大將軍宇文虬攻克上津遷通直散騎常侍大都督進儀同三司陳將侯方兒潘純陁㓂江陵雄從豆盧寧擊走之除洵州刺史威惠相濟夷夏安之又置平州以雄為刺史加驃騎大將軍除通洛防主雄處疆埸務在保境息民接待敵人必推誠仗信入為京兆尹尋進位大將軍遷江陵總管四州五防諸軍事改封魯陽縣公宣政元年卒於鎮子長寛嗣官儀同大將軍周書本傳侯植字仁幹其先上谷人髙祖恕為北地太守子孫因家於三水父欣秦州刺史植容貌竒偉武藝絶倫仕魏為義州刺史甚有政績後從周文破沙苑戰河橋進大都督凉州刺史文仲和據州作逆植從開府獨孤信討禽之封肥城縣公從于謹平江陵進驃騎大將軍開府儀同三司孝閔踐祚進爵郡公時帝冲㓜晉公䕶執政隂忌之植懼不免禍遂以憂卒諡曰節北史本傳郭彦陽曲人其先從宦闗右遂居馮翊太祖辟為西尚書佐大統十二年進大都督車騎大將軍時岷州羌人鐵忽等㓂擾西服彦從宇文貴討平之從于謹伐江陵進驃騎大將軍開府儀同三司孝閔帝踐阼出為澧州刺史齊南安城主馮顯宻遣使歸降宇文貴令彦率兵應接齊人先令顯送糧南下彦懼其衆不從命於路邀之顯因得自拔衆果拒戰並擄獲之以南安無備夜至城下詐稱顯歸門者開門彦引兵而入遂有其城進懷徳縣公以南安懸逺尋令班師除蒲州總管府長史保定四年從尉遲迥攻洛陽以彦鎮豫州天和元年除隴右總管府長史四年卒於位周書本傳楊寛華隂人少有大志尚武藝弱冠除奉朝請以功拜行臺郎中孝莊踐阼拜通直散騎侍郎領河南尹丞邢杲反寛從上黨王元天穆討平之就拜通直散騎常侍爾朱兆陷洛陽囚執孝莊寛自成臯奔梁聞孝莊崩發哀盡禮梁武義之尋禮送還朝孝武初改受驃騎將軍給事黄門侍郎時夏州戍兵數千據兖州反詔寛節度諸軍討平之孝武與齊神武有隙召募騎勇廣増宿衛以寛為閣内大都督專總禁旅從孝武入闗兼吏部尚書録從駕勲進爵華山郡公大統十六年朝議經畧漢川梁蕭循固守南鄭寛從大將軍達奚武討之梁遣楊乾運率兵救循寛等邀擊之軍至白馬與乾運合戰破之世宗初拜大將軍從賀蘭祥討吐谷渾破之封宜陽縣公保定元年薨贈華陜虞上潞五州刺史諡曰元子紀嗣官至上儀同大將軍周書本傳楊紹字子安華隂人祖興魏新平郡守父國中散大夫紹少慷慨有志畧屢從征伐力戰有功永安中授廣武將軍直盪别將大統四年出為鄜城郡守性恕直有威惠百姓安之稽胡屢為抄竊紹率郡兵討之疋馬先登破於黙泉之上累遷大都督車騎大將軍復從達奚武征漢中時梁蕭循固守梁州紹以計誘之城降以功授輔國將軍中散大夫又從于謹圍江陵流矢中股力戰不衰事平進驃騎大將軍開府儀同三司除衡州刺史孝閔帝踐阼進位大將軍保定二年卒諡曰信周書本傳王傑金州直城人本名文達髙祖萬國魏燕州刺史父巢榆中鎮將傑少有壯志以功名自許善騎射太祖竒其才擢揚烈將軍加都督嘗曰王文達萬人敵也復潼闗破沙苑争河橋戰邙山皆以勇敢聞累遷開府儀同三司從于謹圍江陵時柵内有人善長矟登者多為所斃傑射之應弦而倒登者乃得入遂拔之孝閔踐阼進爵張掖公河州刺史建徳初除涇州總管傑所歴州府咸以忠恕為心為百姓所慕宣帝即位拜上柱國薨諡曰威子孝仙位開府儀同大將軍周書本傳楊乾運字元邈興勢人父天興齊安康守乾運少雄武為鄉閭所服孝昌初除安康守梁州民皇甫圎叛漢中陷乾運亦入梁梁大同元年除西益潼刺史武陵王蕭紀稱尊號拜梁州刺史時紀與湘東王繹争帝乾運兄子略勸乾運送欵闗中太祖宻賜乾運鐵劵持節大將軍梁州刺史乾運遂降子端拜梁州刺史略以歸附功拜車騎大將軍頻從征討建徳末位至儀同大將軍周書本傳楊荐字承畧寧夷人父寳昌平郡守荐性亷謹魏永安中随􅈛朱天光入闗討賊封髙邑縣男文帝臨夏州補帳内都督及平侯莫陳悦使荐入洛請事孝武除荐直閣將軍大統十六年大軍東討文帝恐蠕蠕乗虛㓂掠乃遣荐往諭和好進使持節驃騎大將軍開府儀同三司加侍中周孝閔帝踐阼仍使突厥結婚突厥弟陁頭可汗與齊通和説其兄背先約謀以荐等送齊荐知其意乃正色責之可汗慘然良乆然後發遣我女乃令荐先報命仍請東討以奉使稱㫖遷大將軍保定四年又納幣於突厥還行小司馬又行大司徒從陳公純等逆女於突厥進爵南安郡公天和三年遷總管梁州刺史後以疾卒北史本傳于實字賔實謹子京兆人少和厚以軍功封萬年縣子累遷尚書除渭州刺史恭帝二年羌東念姐反大將軍豆盧寧討之踰時不剋又令實往遂破之孝閔踐阼授户部中大夫天和二年延州蒲州賊郝三郎反遣實討平之除延州刺史進凉州總管開皇元年薨諡曰安北史于謹傳趙文表其先天水人後徙南鄭父江性方嚴有度量厯官驃騎大將軍昌國縣伯文表少修謹志存忠節魏恭帝元年從田𢎞征山南復從平巴州信州除梁州長史生獠懷不軌文表討平之遷蓬州刺史政尚仁恕進爵為公拜呉州總管子海襲爵周書本傳隋賀婁子幹字萬夀本代人随魏氏南遷世居闗右子幹少以驍武知名尉迥作亂子幹從韋孝寛討之每戰先登及破鄴進位上開府開皇元年吐谷渾㓂凉州子幹以行軍總管從上柱國元諧擊之功最髙祖慮邉塞未安即令鎮凉州明年突厥冦蘭州子幹率衆至可洛峐山阻川為營賊軍不得水數日人馬甚敝縱撃大破之冊授上大將軍徵拜工部尚書其年突厥復犯塞以行軍總管從竇榮定擊之斬首千餘級髙祖優詔勞勉吐谷渾復㓂邊子幹馳驛至河西發五州兵掠其國二旬而還俄而虜㓂洮岷二州子幹勒兵赴之賊聞遁去髙祖以子幹曉習邊事授榆闗總管嵗餘拜雲州刺史後數年突厥遣使請降並獻羊馬詔以子幹為行軍總管出西北道應接之還拜雲州總管以母憂去職朝廷以榆闗重鎮非子幹不可起視事卒官諡曰懷子幹兄詮亦有才器至北地太守隋書本傳蘇沙羅字子粹孝慈兄子扶風人父順周眉州刺史沙羅仕周釋褐都督後從韋孝寛破尉迥以功授開府儀同三司封通泰縣公開皇初冉駹羌作亂率兵擊破之後數載從史萬嵗擊西㸑累戰有功進位大將軍尋檢校益州總管長史㑹越嶲人王奉舉兵作亂沙羅從段文振討平之賜奴婢百口卒於家隋書蘇孝慈傳史萬嵗杜陵人父静周滄州刺史萬嵗少英武善騎射好讀兵書平齊之役其父戰歿萬嵗襲爵太平縣公尉迥亂萬嵗從梁士彦擊之每戰先登以功拜上大將軍平陳之役又以功加上開府及髙智慧等作亂江南萬嵗率衆二千踰嶺越海攻䧟溪洞前後七百餘戰轉鬭千餘里還拜左領軍將軍南寧夷㸑翫復叛萬嵗皆擊破之度西洱河入渠濫川破其三十餘部擄獲男女二萬餘口諸夷大懼遣使請降以功進位柱國開皇末突厥頭達可汗犯塞漢王諒與萬嵗出馬邑道頭達聞之懼而引去萬嵗馳追百餘里乃及大破之楊素害其功㑹窮東宫黨與上問萬嵗所在楊素見上方怒因曰萬嵗謁東宫矣上大怒命左右㩧殺之萬嵗為將不治營伍令士卒各随所安無警夜之備敵亦不敢犯臨陣對敵應變無方號為良將隋書本傳劉方長安人性剛決有胆氣仕周以戰功拜上儀同髙祖為丞相方從韋孝寛破尉迥於相州開皇三年從衛王爽破突厥於白道進位大將軍仁夀中交州人李佛子作亂上詔方為行軍總管進兵臨佛子佛子降尋授驩州道行軍總管經畧林邑軍至海口林邑王梵志遣兵守險方擊走之師次闍黎江賊據南岸乗象四面而至方以弩射象因攻破之俘馘萬計進至大緑江賊據險為柵又擊破之至其國都林邑王梵志棄城奔海刻石紀功而還方在道遇患卒帝甚傷惜之贈上柱國盧國公子通仁嗣隋書本傳王世積新囶人父雅周使持節開府儀同三司世積容貌魁岸腰帶十圍風神爽拔有傑人之表在周有軍功拜上儀同封長子縣公髙祖為丞相尉迥作亂從韋孝寛擊之每戰有功拜上大將軍髙祖受禪進封宜陽郡公髙熲美其才能甚善之授蘄州總管平陳之役以舟師自蘄水趣九江與陳將紀瑱戰於蘄口大破之以功進位柱國後數嵗桂州人李光仕作亂世積以行軍總管討平之進位上柱國遼東之役世積與漢王並為行軍元帥至栁城遇疾疫而還拜凉州總管令騎士七百人送之官未幾其親信安定皇甫孝諧有罪吏捕之亡抵世積世積不納由是有憾因徼幸上變由是被徵入朝按其事竟坐誅隋書本傳李徹字廣達巖緑人父和開皇初為柱國徹性剛毅有器幹多武藝大冡宰宇文䕶引為親信累遷儀同三司武帝時從皇子征吐谷渾以功賜爵同昌縣男從帝拔晉州復從破齊師於汾北下髙壁拔晉陽擒髙湝於兾州俱有力焉髙祖受禪加上開府突厥沙鉢畧犯塞上令衛王爽為元帥以徹為長史遇虜於白道掩擊大破之沙鉢畧屈膝稱藩未幾沙鉢畧為阿拔所侵上䟽請援以徹為行軍總管率精騎赴之阿拔聞而遁去開皇十年進位柱國後突厥犯塞徹復領行軍總管擊破之髙熲得罪徹素與熲善上賜宴遇鴆而卒隋書本傳杜整字皇育杜陵人祖盛魏直閣將軍潁川太守父闢渭州刺史整少有風槩九嵗丁父憂哀毁骨立事母以孝聞及長驍勇有膂力好讀孫呉兵法魏大統末襲爵武郷侯髙祖受禪加上開府進封長廣郡公開皇六年突厥犯塞以整為行軍總管至合川無兵而還宻進取陳之策上善之於是以行軍總管鎮襄陽尋病卒諡曰襄子楷嗣官至開府整弟肅少有志行開皇初為通直散騎常侍北地太守隋書本傳龎晃字元顯榆林人父虬周驃騎大將軍晃少以良家子補州都督周太祖既有闗中署晃大都督後遷驃騎將軍轉車騎將軍髙祖踐阼加上開府進爵為公河間王𢎞擊突厥晃以行軍總管出賀蘭山擊賊破之斬首千餘級遷原州總管仁夀中卒官子長夀頗知名官驃騎將軍隋書本傳杜彦雲中人父遷徙家於豳彦性勇果善騎射仕周左侍上士擊陳將吳明徹於土州破之又擊叛蠻進平郢州賊帥樊志以戰功拜大都督賜爵永安縣伯從韋孝寛擊尉迥於相州每戰有功封襄武縣侯開皇初進爵為公平陳之役以行軍總管渡江擊南陵城拔之擒其守將許翼進位柱國賜子寳安爵昌陽縣公髙智慧作亂復從楊素討之别解江州圍智慧餘黨屯聚溪洞彦水陸兼進斬其渠帥賊李陁擁衆數千據彭山彦襲擊破之斬陁傳其首又擊徐州宜豐二洞悉平之拜洪州總管甚有治名嵗餘徵拜雲州總管突厥來冦彦輒擒斬之北夷畏憚不敢至塞拜朔州總管突厥復㓂雲州以彦素為突厥所憚復拜雲州總管未幾以疾徵還卒隋書本傳于仲文義兄子京兆人字次武父實周大左輔仲文性倜儻有大志為固安太守聰察明斷累勲授儀同三司東郡太守尉迥作亂遣將檀讓誘致仲文仲文拒之迥遣宇文威攻之仲文大破威衆迥又遣將復攻仲文自度不支棄妻子潰圍遯達於京師迥屠其三子一女髙祖見之進位大將軍領河南道行軍總管軍至東倪塢與迥將劉子昻等相遇進擊破之軍次蓼隄讓擁衆數萬仲文以羸師挑戰偽北讓軍頗驕於是遣精兵左右翼擊之大敗讓軍進攻梁郡擊曹州檀讓以餘衆屯城武仲文選精騎襲之拔城武迥將席毗羅十萬衆屯沛縣其妻子在金鄉仲文詐為毗羅使者謂金鄉城主曰檀讓明日到金鄉賞將士仲文簡精兵偽建迥旗幟遂取金鄉毗羅來薄官軍仲文結陣設伏毗羅軍大潰河南悉平進位柱國明年拜行軍元帥擊胡斬首千餘級至䕶軍川與虜遇可汗見軍容齊肅不戰而退後突厥犯塞仲文大破賊而還煬帝即位從帝討吐谷渾進位光禄大夫遼東之役髙䴡出兵掩襲輜重仲文大破之東至薩水宇文述以兵餒退歸師遂敗績帝大怒繫仲文仲文憂恚發病卒隋書本傳史祥字世休朔方人父寧周少司徒祥少有文武才幹仕周爵武遂縣公髙祖踐阼領交州事頗有惠政伐陳之役從王世積以舟師出九江道與陳人合戰破之進拔江州進位上開府後以行軍總管從晉王廣擊突厥於靈武破之仁夀中率兵屯𢎞化以備胡煬帝即位漢王諒作亂帝以祥為行軍總管軍於河隂乆不得濟祥乃令軍中修攻具簡精鋭於下流潜渡於是其衆大潰祥縱兵乗之殺萬餘人進位上大將軍從征吐谷渾祥率衆出間道擊虜破之俘男女千餘口進位左光禄大夫拜燕郡太守被賊髙開道所圍城䧟送祥於涿郡卒於塗有子義隆永年令祥兄雲字世髙弟威字世武並有幹局隋書本傳魚俱羅下邽人身長八尺膂力絶人從晉王廣平陳以功拜開府楊素率兵擊突厥路逢俱羅奏與同行及遇賊俱羅與數騎奔擊瞋目大呼出左入右往返若飛以功進位柱國拜豐州總管以交通内臣坐除名未幾越嶲飛山蠻作亂詔俱羅白衣領將討平之大業九年重征髙麗以俱羅為碣石道軍將及還江南劉元進作亂詔俱羅將兵向㑹稽諸郡逐捕之戰無不㨗然賊勢寖盛敗而復聚朝廷發使案驗大理司直梁敬正奏俱羅師徒敗䘐於是斬東市隋書本傳薛世雄字世英本汾隂人其先寓居闗中父囘開皇初封舞隂郡公領漕渠監世雄年十七從周武帝平齊開皇時數有戰功累遷車騎將軍煬帝嗣位番禺夷獠相聚為亂詔世雄討平之世雄性亷謹行軍破敵秋毫無犯與突厥啟民可汗連兵擊伊吾伊吾初不設備聞世雄已度磧大懼請降李宻逼東都詔世雄率幽兾精兵擊之軍次河間欲討竇建徳建徳自選精鋭數百夜來襲之於是大敗慚恚病卒時六十三隋書本傳閻毘盛樂人祖進魏本郡太守父慶周上柱國寧州總管毘七嵗襲爵石保縣公及長儀貌矜嚴頗好經史煬帝嗣位自洛口開渠達於涿郡以通漕運毘督其役及征遼東以本官領虎賁郎將典宿衛時衆軍圍遼東城帝令毘詣城下宣諭賊弓弩亂發所乗馬中流矢毘顔色不變辭氣抑揚卒事而去㑹楊𤣥感作逆帝班師從至髙陽暴卒隋書本傳唐劉文静字肇仁世居武功倜儻有器畧大業末為晉陽令與晉陽宫監裴寂善髙祖鎮太原文静深自結俄坐李宻姻屬繫獄秦王私入視之文静挑言曰上南幸盜賊蜉結真主取而用之一朝召號十萬衆可得鼓而入闗王業成矣王乃隂部署賔客恐唐公不從文静謀因裴寂開説唐公私可乃起兵以文静為司馬文静請與突厥連和從之尋拒屈突通於潼闗與其將桑顯和苦鬭文静以竒兵從後掩之顯和敗績進光禄大夫魯國公唐公踐位授民部尚書文静自以才能逺過裴寂而寂居其上意不平㑹文静妾兄上變遂下吏秦王以文静首決非常宜全宥帝素䟽忌之寂又言文静權詭猜險恐為後憂遂殺之貞觀三年追復官爵子樹義襲魯國公唐書本傳李髙遷岐州人客太原唐公引致左右執髙君雅等有功以右三統軍從下霍邑圍長安力戰遷左武衛大將軍江夏郡公檢校西麟州刺史突厥㓂馬邑髙滿政請救詔髙遷督兵助守後歴資州刺史卒唐書本傳李安逺夏州人父徹隋上柱國雲州刺史安逺襲爵城陽公後補正平令兵起攻絳州安逺嬰城拒守唐公素與安逺善及拔絳撫慰其家授右翊衛統軍復從破屈突通進上柱國右武衛大將軍數從秦王征討積功累封至廣徳郡公奉使吐谷渾安逺與約和吐谷渾乃請為互市邉場利之隠太子將亂隂使誘動安逺介無貳志秦王益親重貞觀初嘗命統邏騎都下督盜賊厯潞州都督懐州刺史皆以幹用顯卒諡曰安唐書本傳公孫武達櫟陽人以豪俠稱為隋驍果兵興武達從秦王討劉武周苦戰功多累遷秦府右三軍驃騎封清水縣公貞觀初為肅州刺史突厥入㓂武達以精兵二千人與戰虜稍却復殊死鬭薄之張掖河潜命上流度兵虜已半濟乃兩岸夾擊斬溺殆盡璽書勞之遷左監門將軍鹽州突厥叛詔武達趨靈州追及賊斬其帥可邏拔扈進封東萊郡公終右武衛大將軍陪塟昭陵諡曰壯唐書本傳張長遜櫟陽人精馳射在隋以平陳功累遷五原郡守義兵起以郡降拜安化郡公徙封范陽時梁師都薛舉請突厥兵南渡河長遜矯作詔與莫賀咄設以伐其謀㑹唐使亦至突厥兵不出武徳元年討薛舉不待命輒引兵㑹賜錦袍金甲入朝授右武衛將軍徙息國公檢校益州行臺厯遂䕫二州總管貞觀十一年卒唐書本傳張平髙綏州人為隋鷹揚府校尉戍太原遂預謀議從唐公平京城累授左領軍將軍封蕭國公貞觀初為丹州刺史坐事以右光禄大夫還第卒唐書本傳屈突通其先昌黎人後家長安仕隋為虎賁郎將擢左武衛將軍涖官正勁有法其弟葢為長安令亦以方嚴顯通大業中與宇文述共破楊𤣥感以功遷左驍衛大將軍秦隴盜起授闗内討捕大使安定人劉迦論反衆十餘萬通發闗中兵擊之候其無備夜簡精卒襲破之斬迦論並首級萬餘築京觀於上郡南山髙祖起代王遣通守河東髙祖濟河通自武闗趨藍田以援長安至潼闗阻劉文静兵不得進相持月餘留桑顯和保潼闗率兵將如洛既行而顯和降通遂被禽送長安帝曰忠臣也釋之授兵部尚書蔣國公為秦王行軍元帥長史從平薛仁杲時賊珍用山積諸將争得之通獨無所取從討王世充竇建徳來援秦王分麾下兵以屬通俾與齊王圍洛世充平論功第一拜陜東道大行臺鎮東都貞觀初為洛州都督進左光禄大夫卒諡曰忠子夀襲爵太宗幸洛思通忠節銓以少子拜果毅都尉終瀛州刺史銓子仲翔神龍中復守瀛州唐書本傳劉𢎞基池陽人大業末隂事髙祖又察太宗資度非常益自託兵將舉𢎞基募士得二千人從攻下西河宋老生敗棄馬投塹𢎞基斬其首拜右光禄大夫師至蒲引兵先濟河下馮翊為渭北道大使西徇扶風衆至六萬南度渭次長安故城隋將衛文昇來拒𢎞基逆擊擒甲士千餘馬數百京師平功第一授右驍衛大將軍劉武周犯太原從秦王屯栢壁以勁卒二千由隰州趨西河躡賊歸路及宋金剛遁走率騎尾之介休與王合擊大破之累封任國公從擊劉黒闥還除井鉞將軍貞觀初授衛尉卿改封䕫國太宗征遼召為前軍大總管戰駐蹕山有功累加封户卒諡曰襄子仁實襲封唐書本傳竇徳明徳元兄平陵人師事陳留王孝逸通知文史漢王諒反遣將攻黎陽徳明年十八募士五千擊賊破之以功擢累齊王府屬長安平謁髙祖拜考功郎中從擊王世充厯常愛二州刺史唐書竇威傳殷開山名嶠鄠人為隋大谷長髙祖兵起召補大將軍掾從攻西河為渭北道元帥長史時闗輔羣盜驁力自張開山招慰皆下與劉𢎞基破衛文昇兵賜爵陳郡公遷丞相府掾以吏部侍郎從秦王討薛舉為舉所敗除名頃之從平仁杲復爵位兼陕東道行臺兵部尚書遷吏部從討王世充以功進爵鄖國公征劉黒闥道病卒王哭之慟諡曰節唐書本傳竇軌字士則威兄子平陵人父恭仕周為雍州牧軌性剛果有威髙祖起兵軌募衆千餘人迎謁長春宫帝大悦使略地渭南下永豐倉從平京師為大丞相諮議參軍稽胡賊掠宜春詔軌討之斬首千級獲男女二萬赤排羌與鐘俱仇冦漢中拜秦州總管連戰有功餘黨悉降遷益州道行臺左僕射黨項吐谷渾㓂松州軌進軍臨洮擊走其衆屯田松州明年還蜀軌既貴益嚴酷然能自勤苦每出師臨敵身未嘗解甲其下有不用命即誅由是蜀盜悉平行臺廢授益州都督貞觀元年詔授右衛大將軍洛州刺史周洛間因隋亂人不土著軌下令諸縣有㳺手末作者按之由是威信大行民皆趨本弟琮有武幹大業末犯法亡命太原依髙祖大將軍府建引為統軍從平西河破霍邑授紫金光禄大夫從劉文静擊屈突通於潼闗敗其將桑顯和通遁去琮以輕騎追獲於稠桑進兵下陜縣拔太原倉遷左領軍大將軍武徳初為右屯衛大將軍時將圗洛陽詔琮留守陜䕶餉道王世充將羅士信數以兵鈔絶琮使人說降東都平檢校晉州總管從隠太子平劉黒闥以功封譙國公卒諡曰敬唐書竇威傳丘行恭和子郿人善騎射大業末與師利聚兵萬人保郿城人多依之羣盜不敢窺境後原州奴賊圍扶風行恭率五百人詣營奴帥長揖行恭手斬之乃率其衆與師利迎秦王於渭北拜光禄大夫累從戰伐功多遷左一府驃騎錫勞甚厚隠太子誅以功擢左衛將軍貞觀中從侯君集平髙昌封天水郡公進右武侯將軍髙宗立遷大將軍冀陜二州刺史致仕卒諡曰襄陪葬昭陵初從討王世充太宗與諸騎相失惟行恭從賊騎追及流矢著太宗馬行恭囘射之發無虛鏃賊不敢前遂下拔箭以已馬進太宗歩執長刀大呼導之斬數人突陣而還貞觀中詔鑿石為人馬象拔箭狀立昭陵闕前以旌武功云唐書本傳李子和蒲城人本郭氏為隋左翊衛以罪徙榆林大業末自稱永樂王有騎兵二千南連梁師都北事突厥武徳元年獻欵授靈州總管襲師都寧朔城克之又伺突厥虚實隂以章聞為敵邏騎所獲於是子和危畏南徙詔内延州故城五年從平劉黒闥有功賜姓拜右武衛將軍顯慶初轉黔州都督乞骸骨許之進光禄大夫卒唐書本傳龎玉涇陽人事隋為監門直閣李宻據洛口玉以關中銳兵屬王世充擊之百戰不䘐世充歸東都秦王東徇洛玉率萬騎降髙祖以隋舊臣禮之玉魁梧有力明軍法授領軍武衛二大將軍出為梁州總管巴山獠叛玉梟其首餘黨四奔屬縣玉下令軍中曰非盡賊不反賊營斬渠長以降召為監門大將軍太宗以耆厚令主東宫兵雖老不怠小大之務無不親卒帝為廢朝唐書龎堅傳薛萬均本燉煌人後徙咸陽大業末以材武為羅藝所厚善與藝歸欵髙祖授上柱國永安郡公竇建徳㓂范陽萬均教藝羸兵阻水以誘之自以精騎匿城左建徳師度水邀半度擊之大敗其衆明年建徳以二十萬騎來攻萬均率死士百人出地道掩擊其背衆驚潰去柴紹討梁師都以萬均為副斬其驍將敵陣讙乗之俘殺相藉突厥走遂圍師都賊斬師都降從李靖討吐谷渾軍次青海萬均以百騎行前與敵遇單騎馳突斬數千級追奔至積石山大風折旗萬均曰敵且來乃勒兵俄而敵至萬均直前斬其將衆遂潰追至圗倫磧乃還遷本衛大將軍又副侯君集擊髙昌進潞國公弟萬淑以戰功歴暢武道行軍總管萬備以尚輦奉御從伐髙麗將軍契苾何力中槊萬備單馬進救何力獲免歴左衛將軍唐書本傳劉世讓字元欽醴泉人仕隋為徵仕郎髙祖入長安以湋川歸授通議大夫時唐弼餘黨冦扶風世讓自請安輯得其衆數千因授安定道行軍總管率兵二萬拒薛舉舉平授彭州刺史俄領陜東道行軍總管獨孤懐恩有逆謀世讓亡歸白發之封𢎞農郡公竇建徳援王世充世讓率騎出黄沙嶺襲洛州突厥入㓂詔以兵屯鴈門世讓馳騎八百赴之保武州城壞立柵完拒可汗來説世讓叱之敵引去授廣州總管帝問備邉䇿答曰突厥數南㓂恃有馬邑如使勇將屯崞城厚儲金帛以招降者數出竒兵畧城下踐禾稼不踰嵗馬邑可圗帝乃使馳驛經畧世讓至馬邑髙滿政以地來降突厥縱反間帝不察因誅之貞觀初突厥降者言世讓無逆謀乃原其妻子唐書本傳韋雲起萬年人隋開皇中以明經補符璽直長大業初改謁者契丹冦營州詔雲起䕶突厥兵討之啟民可汗以二萬騎受節度雲起離為二十屯既入境使突厥紿契丹引而南過賊營百里夜還陣掩擊之獲契丹男女四萬拜治書御史髙祖入闗授司農卿陽城縣公武徳初進上開府儀同三司判農圃監突厥入㓂詔總􅃎寧以北九州兵禦之得一切便宜改益州行臺兵部尚書時僕射竇軌奏生獠反兾得集兵以威衆雲起數持掣由是始隙雲起弟事隠太子太子死軌疑雲起有變隂設備遂殺之孫方質光宅初為地官尚書嘗屬疾武承嗣兄弟往候方質據床自若或曰倨見權貴且速禍答曰吉凶命也丈夫豈能折節近戚以茍免耶俄為酷吏所䧟流死唐書本傳蘇烈字定方武邑人後徙始平父邕當隋季率里人為本郡討賊定方驍悍有氣決從父戰數先登䧟陣邕卒代領其衆破劇賊張金稱楊公卿追北數十里自是賊不舎境鄉黨賴之貞觀初為匡道府折衝從李靖襲突厥頡利為前鋒去賊一里許見牙帳馳殺數百人頡利遁去餘黨悉降再遷左衛中郎將與程名振討髙麗破之拜右屯衛將軍從程知節征賀魯定方馳𢷬賊營賊衆大潰擢伊麗道行軍大總管復征賀魯斬首數萬級賊大奔明日振兵後進賀魯西走定方領新附兵絶其後㑹大雪吏請少休定方曰敵恃雪方止舎謂我不能進若縱使逺遁則莫能禽遂勒兵進至雙河距賀魯所百里下令陣而行薄金牙山定方縦擊破其牙下數萬人縳賀魯以還由是修亭障列蹊隧定疆畛問疾收胔唐之州縣極西海矣髙宗臨軒定方戎服奉賀魯以獻䇿功拜左驍衛大將軍邢國公㑹都曼叛詔定方為安撫大使定方選精卒襲之都曼驚戰遂大敗走馬保城師進攻之都曼計窮遂面縳降䓤嶺以西遂定遷左武衛大將軍出為神丘道大總管率師討百濟自城山濟海直趨真都城王義慈降定方所滅三國皆生執其王未幾為遼東道行軍大總管破髙麗圍平壤拜涼州安集大使定吐蕃吐谷渾乾封二年卒諡曰莊唐書本傳崔敦禮字安上祖仲方隋禮部尚書其先博陵著姓魏末徙咸陽敦禮博渉書傳以節義自將武徳中官通事舎人善辭令進止嘗持節召廬江王瑗瑗已舉兵執之脅問朝廷事敦禮不為言太宗壯之除左衛郎擢中書舎人遷兵部尚書詔撫輯囬紇鐵勒部姓㑹薛延陀㓂邉與李勣合兵破之置祁連州處其餘衆囘紇吐迷度為下所殺詔往綏定立其嗣而還敦禮通知四夷情偽少慕蘇武為人屢使突厥前後建明允㑹事機永徽四年拜侍中進中書令以乆疾不任事更拜同中書門下三品卒諡曰昭弟餘慶位亦至兵部尚書唐書本傳楊𢎞禮字履莊華隂人隋尚書令素弟之子髙祖即位以素有功於隋詔𢎞禮襲清河郡公除太子通事舎人太宗征遼東拜兵部侍郎駐驆之役領歩騎二十四軍跳出賊背所向摧靡帝自山下望其衆謂許敬宗曰越公兒郎故有家風還拜中書侍郎遷司農卿為崑丘道副大總管破處宻殺焉耆王降馺支部獲龜兹于闐王凱旋㑹帝崩大臣疾之下遷涇州刺史永徽初追論其功遷勝州都督改太府卿卒諡曰質唐書本傳和逢堯岐山人武后時舉進士髙第擢監察御史突厥黙啜請尚公主逢堯以御史中丞攝鴻臚卿報可黙啜遣貴近頡利來曰詔送金鏤鞍具乃塗金使者不可信雖得公主猶非實請罷和親欲馳去左右色動逢堯呼其人謂曰送鞍具欲安且久不以金為貴可汗貴金不貴信耶黙啜聞因備禮以見逢堯説曰天子思與可汗通舊好可汗當嚮風慕義襲冠冕取重諸蕃黙啜信之為斂髮紫衣南面再拜稱臣遣子入朝逢堯擢户部侍郎唐興奉使者稱逢堯唐書本傳杜希望佑父萬年人重然諾所交㳺皆一時俊傑為安陸令都督宋慶禮表其異政開元中署靈州别駕闗内道度支判官自代州都督召還屬吐蕃攻勃律勃律乞歸李林甫方領隴西節度拜希望鄯州都督知留後馳傳度隴破烏莽衆斬千餘級進拔新城擢鴻臚卿置鎮西軍希望引師部分塞下吐蕃懼遺書求和希望報曰受和非臣下所得專敵悉衆争壇泉希望大小戰數十俘其渠魁至莫門焚積蓄卒城而還時軍屢興府庫虚寡希望居數嵗芻粟金帛豐餘希望愛重文學門下所引如崔顥等皆名重當時唐書杜佑傳蕭嵩壦子長安人開元初擢中書舎人姚崇稱其逺到歴宋州刺史遷尚書左丞十四年以兵部尚書領朔方節度使㑹吐蕃陷𤓰州囬紇又殺凉州守將王君㚟河隴大震徙嵩河西節度使判涼州事嵩表裴寛郭虚已牛仙客置幕府以建康軍使張守珪為𤓰州刺史完樹陴塢懐保邊人於時悉諾邏恭禄威憺諸部吐蕃倚其健噬邊嵩乃縱反間示疑端賛普果誅之使悉末明攻𤓰州守珪拒甚力虜引卻㑹鄯州都督張志亮破賊青海西嵩又遣副將杜賔客與吐蕃戰祁連城下斬一將虜哭震山谷露布至帝大悦授嵩同中書門下三品十七年進兼中書令遥領河西節度在公慎宻人莫見其際久之進太子太師固請老見許天寳八載卒子華謹重方雅有家法嗣爵天寳末為兵部侍郎禄山亂䧟賊逼守魏州華間道奉表欲舉魏以應為賊所執㑹崔光逺得魏州破械出之有詔即授刺史擢河中晉絳節度使上元初同平章事李輔國用事求宰相華拒之輔國怨貶華為峽州司馬卒唐書蕭瑀傳賈師順岐人悉諾邏并兵攻城使早降師順不可賊數日又説師順曰明府不降吾衆且還宜有以贈我師順請脱士卒衣􅃭悉諾邏知無有乃夜撤營去毁瓜州師順開門收器械復完守備吐蕃果使精騎還襲見有備乃去以功遷鄯州都督隴右節度使師順岐州人終左領軍將軍唐書王君㚟傳郭晞華州人善騎射從征伐有功復兩京戰最力出竒兵破賊累進鴻臚卿河中軍亂子儀召首惡誅之支黨猶反仄晞選親兵晝夜警以備非常姦人不得發以功拜殿中監吐蕃囘紇入㓂加御史中丞領朔方軍援邠州與馬璘合軍擊敵破之敵復來陣涇水北子儀遣晞率徒兵五千騎五百襲敵晞以兵寡不進須暮賊半濟乃擊斬首五千級加御史大夫子儀固讓乃止居父喪值朱泚亂南走山谷賊舁致之欲汙以官佯瘖不答賊露兵脅之不動數以城中事貽書李晟既而奔奉天天子還改太子賔客累封趙國公卒唐書郭子儀傳馬璘扶風人少孤讀漢馬援傳至丈夫當死邊野以馬革褁尸歸慨然曰使吾祖勲業墜地乎開元末挾䇿從安西節度府以竒勞累遷金吾衛將軍至徳初王室多難統精甲三千赴鳯翔肅宗委以東討初戰渭南以百騎破賊五千衆從李光弼攻洛陽史朝義衆十萬陣北邙山璘率部士五百薄賊屯出入三反衆披靡賊遂潰明年吐蕃冦邊詔璘移軍援河西懐恩之叛璘間闗轉鬭至鳯翔敵圍已合璘突入縣門不解甲出戰背城陣敵潰率輕騎追之斬數千級擢御史大夫永泰初拜四鎮行營節度南道和蕃使俄檢校工部尚書北庭行營邠寧節度使大厯八年吐蕃内㓂渾瑊戰宜禄不利璘設伏潘原與瑊合擊破之俘級數萬進檢校尚書右僕射明年入朝進扶風郡王十一年卒於軍諡曰武唐書本傳李抱玉本安興貴孫世居河西為人沈毅有謀尤忠謹禄山亂守南陽斬賊使至徳二載上言恥與逆臣同姓詔賜姓徙籍京兆擢陳鄭潁亳節度使史思明已破東都自謂無前李光弼壁河陽拒之使抱玉守南城賊急攻抱玉縱竒兵表裏俘殺甚衆賊乃捨去封欒城公代宗立徙涼國公進司徒吐蕃入冦帝次陜羣盜徧南山五谷間詔抱玉討賊不閲旬五谷平詔抱玉權鳯翔隴右節度使乆之加山南西道副元帥節度使屯盩厔抱玉在鎮禁暴安人為將臣之良卒諡昭武從父弟抱真沈慮而斷抱玉屬以軍事授汾州别駕僕固懐恩反陷焉挺身歸京師遷陳鄭澤潞留後徳宗嗣位領昭義節度使田悦反圍邢洺詔抱真救之敗悦於雙岡又破之臨洺進圍魏悦大敗㑹朱滔王武俊救悦抱真退保魏興元初進義陽郡王朱滔圍貝州抱真遣客説武俊武俊猶豫抱真自造其壁約為昆弟旦日合戰大破滔進檢校司空貞元初卒子緘匿喪其屬元仲經詭抱真令請已節付緘天子遣使者馳入軍詔以事屬大將王延貴䕶緘赴東都贈抱真太保唐書本傳來瑱永夀人父曜著名西邊終右領軍大將軍瑱畧知書尚名節崖然有大志天寳初充招討使安禄山反拜汝南太守未行改潁川賊攻潁川瑱手射賊皆應弦仆前後俘殺甚衆以功加防禦使徙山南東道節度使瑱能撫訓士舉動安重賊不得侵改淮南西道節度兩京平封潁國公上元二年春破史思明餘黨於魯山俘賊渠又戰汝州獲馬牛槖駝凡兩戰斬首萬級入朝拜兵部尚書同平章事時程元振疾瑱告與巫祝言不順帝怒下詔賜死籍其家廣徳元年追復官爵唐書本傳辛雲京金城人客籍京兆世為將家雲京有膽決積功遷特進太常卿史思明屯相州雲京以鋭兵四千襲㵚陽追破其衆授開府儀同三司加代州都督鎮北兵馬使授太原尹進封金城郡王雲京治謹於法下有犯雖絲毫不貸及賞功亦如之故軍中畏而信囘紇恃舊勲每入朝所在暴鈔至太原畏不敢惕息數年太原大治加檢校尚書右僕射同平章事大厯三年檢校左僕射卒諡忠獻從弟京杲信安王禕節度朔方京杲與弟旻以䇿干禕評咨加異後從李光弼出井陘督趫盪先驅戰嘉山尤力肅宗異之召見曰黥彭闗張之流乎累遷鴻臚卿代宗立封庸國公遷左金吾大將軍進晉昌郡王厯湖南觀察使後為工部尚書致仕朱泚盜京師以老病不能從西嚮慟而卒贈太子少保旻亦從光弼定恒趙後署太原三城使史思明屯相軍及滏陽旻逆擊走之東都䧟退守河陽卒於屯唐書本傳楊朝晟字叔明夏州朔方人興行間以先鋒功授甘泉府果毅建中初從李懐光討劉文喜涇州斬獲多加驃騎大將軍李納㓂徐州從唐朝臣往討常冠軍懐光赴難奉天屬朝晟兵千人下咸陽賜實封百五十户懐光反賊黨張昕守邠州大索軍實多募士欲潜歸之朝晟父懐賔夜以數十騎斬昕及同謀者朝晟泣見懐光懐光縶之懷光平帝原朝晟為㳺瓌都虞候吐蕃犯邉㳺瓌自將守寧州軍亂朝晟謀誅首惡二百餘人加御史大夫貞元九年城鹽州發卒䕶境朝晟屯木波堡為邠寧節度使朝晟請城方渠合道木波以遏吐蕃路帝納其䇿已城吐蕃悉衆至度不能害乃引去復城馬嶺而歸開地三百里十七年卒於屯唐書本傳韋臯字城武萬年人擢監察御史張鎰節度鳯翔以侍御史知隴州行營留事徳宗狩奉天朱泚部將牛雲光謀刼以臣泚遇泚奴使臯所以御史中丞授臯臯偽受泚詔明日置酒大㑹奴雲光至伏甲盡殺之泚復使他奴拜臯節度使臯亦斬之縱一人使報泚帝聞授臯隴州刺史置奉義軍拜節度使寵其功士氣益壯又馳使吐蕃與連和隴坻遂安貞元初為劍南西川節度使初雲南蠻羈附吐蕃臯計得雲南則斬吐蕃右支乃間使招徠之稍稍通西南夷又明年雲南欵邊求内屬絶吐蕃盟五年臯與蠻共破吐蕃於臺登屯柵以次降定九年天子城鹽州䇿吐蕃且來撓詔臯出師牽之以為檢校尚書右僕射於是西山八國部長皆因臯請入朝乃遣幕府崔佐時由石門趣雲南南詔復通詔臯統押近界諸蠻西山八國雲南安撫使俄進同平章事十三年復嶲州吐蕃擾邉臯輒破却之賛普怒遂北掠靈朔破麟州帝詔臯深入以撓虜十月大破吐蕃遂圍維州吐蕃釋靈朔兵使論莽熱率衆十萬來救師伏以待生禽莽熱獻諸朝帝悦進檢校司徒兼中書令南康郡王製紀功碑褒賜之順宗立王叔文等干政臯上表請皇太子監國又上牋太子暴叔文伾之姦且勸進㑹大臣繼請太子遂受禪是嵗卒諡忠武臯治蜀二十一年其功烈為西南劇善拊士臯沒蜀人徳之見其遺像必拜弟平與臯斬朱泚使者間走奉天上功擢萬年尉唐書本傳趙植隠祖奉天人徳宗出狩變倉卒羽衛單寡朱泚攻城急植率家人奴客以死拒守獻家財勞軍帝嘉之賊平渾瑊引在幕府累擢鄭州刺史鄭滑節度使李融奏以自副融疾病委以軍政大將宋朝晏火其營夜為亂植列卒不動頃之遲明而潰捕斬皆盡優詔嘉慰累擢嶺南節度使終於官唐書趙隠傳孫惟最徳昭父五原人有才略黄巢䧟長安惟最率鄉里子弟得義兵千人南攻巢於咸陽州將壯其所為益以兵二千以破賊功拜右金吾大將軍朱玫亂京師僖宗幸興元惟最率兵擊賊累遷鄜州節度使留京師宿衛鄜州將吏詣闕請惟最之鎮京師民數萬與神䇿軍復遮留不得行改荆南節度使卒五代史孫徳昭傳陜西通志巻五十八
