body:
  text: 陜西通志巻三十選舉一徵薦諸科進士司徒造士三物賓興菁莪置聚而上升與共爵祿麗網斯𢎞力田孝弟實應名稱自艷科甲榮比瀛登曲江雁塔丹桂紅綾並用諸途豈繄無能當宁廣攬利見時乗作選舉志第十三徴薦漢按徵薦中有以諸科中選者仍分載本科各朝倣此鄧先城固人景帝時辟城陽中尉韋賢平陵人武帝徴為博士谷永長安人舉為太常丞李㝷平陵人以王根薦待詔黄門云敞平陵人辟大司徒掾郭伋茂陵人哀平間辟大司空府施讐長陵人以梁丘賀薦為博士朱雲平陵人以薦為博士鄭崇平陵人以傅喜薦為僕射杜周杜衍人徙茂陵以薦為廷尉史杜延年周子以霍光薦擢給事中何恢平陵人擢為關都尉馬衍杜陵人廉丹辟為掾馬援茂陵人辟為掾宣秉雲陽人更始徵為侍中孔奮茂陵人建武初竇融請署曹掾王遵杜陵人光武召拜大中大夫鮑恢扶風人建武中辟都官従事杜林平陵人建武中徵侍御史班固安陵人永平初召為蘭臺令史馬嚴茂陵人永平十五年召拜長史傅毅茂陵人建初中召為蘭臺令史廉范杜陵人辟公府第五倫長陵人鮮于褒薦為主簿法雄郿人辟大傅張禹府何敞平陵人元和中辟大尉宋由府樂恢長陵人召署户曹史杜欽杜陵人王鳯奏為武庫令賈逵平陵人以劉復薦為郎馬融茂陵人永初四年召為校書郎竇章平陵人以鄧康薦為校書郎韋貌平陵人安帝時徵拜議郎蘇順霸陵人徴拜郎中李郃南鄭人召署户曹史韋豹杜陵人安帝徵拜議郎楊秉華隂人順帝時辟侍御史耿紀茂陵人辟公府趙岐長陵人永興二年辟司空掾劉寛華隂人桓帝時辟為司徒長史第五頡長陵人辟公府侍御史楊賜華隂人辟大將軍梁冀府張奐酒泉人徙華隂辟梁冀府楊彪華隂人熹平中徵拜議郎韋著杜陵人靈帝時徴拜東海相脂習京兆人中平中辟大醫令趙戩長陵人辟公府為選部郎宋果扶風人辟公府侍御史射堅扶風人辟公府黄門侍郎祝龜南鄭人劉焉辟授葭萌長魏隗禧京兆人召署軍謀掾傅嘏泥陽人陳群辟為掾魯芝郿人州辟主簿晉傅暢泥陽人選侍講東宫為秘書丞梁吉翂蓮勺人辟本州主簿北魏鄧彥海延安定人武帝擢著作郎韋閬杜陵人太武初徵為太守韋朏京兆人辟州主簿梁祚北雍州人辟秘書中散杜銓京兆人徵為中書博士薛端夏陽人高乾辟為叅軍皇甫璠三水人永安中辟州都督王羆京兆人以崔亮舉為長史于謹洛陽人徙高陵元纂辟為叅軍楊播華隂人擢為中散楊津華隂人年十一嵗除官北周蘇綽武功人召為行臺郎中郭彦馮翊人辟為西曹書佐薛乾福夏陽人辟武安郡司倉書佐薛裕夏陽人辟為丞相參軍事杜叔毗杜陵人宇文䕶辟為㕘軍皇甫誕三水人畢王擢為參軍杜杲杜陵人以薦為脩城郡守屬韋世康杜陵人年十嵗州辟主簿韋師萬年人宇文䕶辟為記室王子直杜陵人州辟主簿楊素華隂人宇文䕶辟中外記室楊尚希𢎞農人擢為國子博士隋王珪郿人開皇十三年召為太常韋鼎杜陵人文帝召拜儀同三司顔師古萬年人仁壽中李綱薦為尉李圓通涇陽人擢授叅軍事韋仁壽萬年人辟屬郡司法書佐張祥京兆人以薦為并州司馬杜淹杜陵人以高孝基薦為承奉郎祝素琚大白山人乾元初徵諫議大夫唐杜楚客萬年人貞觀初召為給事袁承序長安人辟為侍讀韋挺萬年人以王珪薦為御史中丞韋纁萬年人以兄純薦為御史杜曉萬年人辟為廵官姚簡萬年人徵為𢎞文館學士顔允南長安人達奚珣薦為補闕馬彛扶風人辟曹王臯幕府王紹萬年人顔真卿奏為武康尉崔覲城固人節度鄭餘慶辟為參佐韓洄長安人擢判度支權徳輿畧陽人辟試秘書郎韋渠牟萬年人貞元中以韓滉表試校書郎桞燦雍州人顔堯引為直學士權有方畧陽人推擇為兵曹參軍嚴澈華隂人元和中李進賢辟判官陶彦謙豳州人辟為刺史竇叔向始平人以薦為左拾遺竇羣叔向子以韋夏卿薦為左拾遺郭曜華州人辟為都尉屈圖南洛川人宣命光禄少卿趙存約奉天人辟署興元李絳府桞子華華原人辟嚴武劍南府令狐通華原人李吉甫薦授贊善後梁陶渙宜禄人辟為刺史後唐任圜三原人李嗣昭辟觀察支使蘇曉武功人長興初辟為鄧州従事後晉冦相渭南人開運中辟為王府參軍楊克讓馮翊人劉繼勲辟為曹掾後漢蘇逢吉長安人高祖召為節度判官宋种誼長安人辟知岷州李澣萬年人秦王従榮召至幕中雷簡夫郃陽人以杜衍薦授校書郎蘇昞武功人元祐末以呂大忠薦為博士折可適府谷人以薦為經畧司屬楊仲武保安人劉行徊清澗人任泰亨清澗人按延志三人俱徵薦王文郁麟州人韓琦薦為祗候金張建蒲城人明昌初舉授絳州教官雷琯坊州人以薦従事史館高世顯宜禄人以薦辟起家元吕戜河内人徙關中許衡舉為伴讀蕭􅝥北海人徙奉元至治末徵右諭張冲咸寧人徴拜翰林侍讀宋書咸寧人以薦授武功監稅楊恭懿高陵人至元中辟授學士賀人傑鄠人召入宿衛哈喇布哈渭南人辟為従事郎李元渭南人至元中辟為將仕佐郎薛永渭南人元貞初以薦補學士竇復初三原人選為京兆少尹李孟漢中人以楊吉薦為翰林學士蒲道源眉州人徙興元徵入翰林康廷瑞武功人辟為興化訓導屈巴延洛川人以薦任四川通判屈仲真洛川人以薦任同知屈有恒洛川人以薦任郿邑教諭屈斌忠洛川人以薦官郎中屈敏洛川人以薦任本邑知縣王仲榮洛川人以薦官鳯翔招討王仲顔洛川人以薦舉任坊州守王秀洛川人以薦監鄜城縣事王顔和洛川人以薦任本縣事高慶宜禄人起自薦辟張翥晉寧人至正初召為國子助教明李貞咸寧人以薦為知縣馬煥高陵人辟為御史李誼藍田人元舉人辟為國子學錄吕履藍田人徵為御史吕祗履子徵為潛山