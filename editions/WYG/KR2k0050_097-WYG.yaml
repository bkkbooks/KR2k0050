body:
  text: 陜西通志巻九十七藝文十三五言排律六言絶句七言排律七言絶句五言絶句詩餘途經華嶽唐𤣥宗飭駕去京邑鳴鑾指洛川循途經太華迴蹕暫周旋翠㟧留斜影懸崖凝夕烟四方皆石壁五位配金天彷彿看髙掌依稀聽子先終當銘嵗月従此寄靈仙早渡蒲關同前鐘鼔嚴更曙山河野望通鳴鑾下蒲坂飛斾入秦中地險闗逾壯天平鎮尚雄春來津樹合月落戍樓空馬色分朝景雞聲逐曉風所希常道泰非復棄繻同首夏花萼樓觀羣臣宴寧王山亭囘樓下又申之以賞樂賦詩同前今年通閏月入夏展春輝樓下風光晚城隅宴賞歸九歌揚政要六舞散朝衣天喜時相合人和事不違禮中推意厚樂處感心微别賞陽臺樂前旬暮雨飛兄弟同遊興慶宫作同前代邸青門右離宫紫陌陲庭如過沛日水若度江時綺觀連雞岫朱樓接雁池従來敦棣萼今此茂荆枝萬葉傳餘慶千年志不移憑軒聊曯目輕輦共追隨務本方従訓相輝保羽儀時康俗易漸徳薄政難施鼓吹迎飛葢絃歌送羽巵所希覃率土孝弟一同規幸鳯泉湯同前西狩觀周俗南山歴漢宫薦鮮知路近省斂覺年豐隂谷含神爨湯泉養聖功益齡仙井合愈疾醴源通不重鳴岐鳯誰矜陳寶雄願將無限澤霑沐衆心同駕幸三㑹寺上官昭容釋子談經處軒臣刻字留故臺遺老識殘簡聖皇求駐蹕懐千古開襟望九州四川縁塞合二水夾城流宸翰陪瞻仰天杯接獻酬太平詞藻盛長願託鴻休早渡分水嶺盧照隣丁年遊蜀道斑鬢向長安徒費周王粟空彈漢吏冠馬蹄穿欲盡貂裘破轉寒層氷横九折積石凌七盤重溪既下潄峻峰亦上干隴頭聞戍鼓嶺外咽飛湍瑟瑟松風急蒼蒼山月團傳語後來者行路誠獨難和許侍郎遊昆明池李百藥神池望不竭滄波接遠天儀星似河漢落葉𩔖虞泉年深平館宇道泰偃戈船差池下鳬雁掩映生雲烟浪花開已合風文直且連税馬金堤外横舟石岸前羽觴傾緑蟻飛日落紅鮮積水浮深智明珠曜雅篇大鯨方逺撃沈灰獨未然知君嘯儔侶短翮徒聨翩九成宫初秋應詔劉褘之帝囿䟽金闕仙臺駐玉鑾野分鳴鳥岫路接寶雞壇林樹千霜積神功四序寒蟬急知秋早鸎踈覺夏闌怡神紫氣外凝眄白雲端舜海辭波發空驚遊聖難奉和幸長安故城未央宫應制宋之問漢皇未息戰蕭相乃營宫壯麗一朝盡威靈千載空明聖悵前跡置酒宴羣公寒輕綵仗外春發幔城中樂思迴斜日歌詞繼大風今朝天子貴不假叔孫通奉和晦日幸昆明池應制前人春豫靈池㑹滄波帳殿開舟凌石鯨度槎拂斗牛迴節晦蓂全落春遲栁暗催象溟看浴景燒刼辨沈灰鎬飲周文樂汾歌漢武才不愁明月盡自有夜珠來奉和幸長安故城未央宫應制李嶠舊宫賢相築新苑聖君來運改城隍變年深棟宇摧後池無復水前殿久成灰莫辨祈風觀空傳承露杯宸心千載合睿律九韶開今日聨章處猶疑上栢臺奉和聖製途經華嶽應制蘇頲朝望蓮華嶽神心就日來晴觀五千仭仙掌拓山開受命金符叶過祥玉瑞陪霧披乗鹿見雲起馭龍回偃樹枝封雪殘碑石冒苔聖皇惟道契文字勒巖隈敬和崔尚書大明朝堂雨後望終南山見示之作前人奕奕輕車至清晨朝未央未央在霄極中路視咸陽委曲漢京近周迴秦塞長日華動涇渭天翠合岐梁五丈旌旗色百層枌橑光東連歸馬地南指鬬雞塲晴壑照金戺秋雲含璧璫由余窺霸國蕭相奉興王功役隠不見頌聲存復揚權宜珍搆絶聖作寳圖昌在徳期巢燧居安法禹湯冢卿才順美多士賦成章價重三臺俊名超百郡良焉知掖垣下陳力自迷方興慶宫酺宴應制張説千齡逢啓聖萬域共來威慶接郊禋後酺承農事稀御樓横廣路天樂下重闈鸞鳳調歌曲虹霓動舞衣合聲雲上聚連歩月中歸物睹思無外神和道入微鎬京陪樂飲柏臺奉文飛徒竭秋雲影何資春日暉奉和聖製途經華嶽應制前人西嶽鎮皇京中峰入太清玉鑾重嶺應緹騎薄雲迎霽日懸髙掌寒空𩔖削成軒遊㑹神處漢幸望仙情舊廟青林古新碑緑字生羣臣願封岱還駕勒鴻名扈從出長安應制沈佺期漢宅規模壯周都景命隆西賔讓東主法駕幸天中太史占星應春官奏日同旌門起長樂帳殿出新豐翕習黄山下紆徐清渭東金麾張畫月珠􅎻戴松風是節嚴隂始寒郊散野蓬薄霜沾上路殘雪繞離宫賜帛矜耆老褰旒問小童復除恩載洽望秩禮新崇臣忝承明召多漸獻賦雄昆明池侍宴應制前人武帝伐昆明穿池習五兵水同河漢在館有豫章名我后光天徳􅂷衣文教成黷兵非帝念勞物豈皇情春仗過鯨沼雲旗出鳳城靈魚銜寶躍仙女廢機迎栁拂旌門暗蘭依帳殿生還如流水曲日晚棹歌清奉和幸新豐温泉宫應制武平一秦王登碣石周后襲崑崙何必在遐逺方稱萬㝢尊我皇順時豫星駕動軒轅雄㦸交馳道清笳度國門回輿長樂觀校獵上林園行漏移三象連營總八屯旌搖鸚鵡谷旗轉鳳凰原絶壁蒼苔古靈泉碧溜温參差開水殿􅌄窱敞巖軒豐邑模猶在驪宫迹尚存烟松銜翠幄雪逕繞花源侍従推元草文章召虎賁深仁浹夷夏洪造溢乾坤謬忝王枚列多漸雨露恩奉和聖製早渡蒲津闗應制張九齡魏武中流處軒皇問道回長堤春樹發髙掌曙雲開龍負王舟渡人占仙氣來河津㑹日月天仗役風雷東顧重闗盡西馳萬國陪還聞股肱郡元首詠康哉和吏部崔尚書雨後大明朝堂望南山前人迢逓終南頂朝朝閶闔前朅來青綺外髙在翠微先雙鳳鶱為闕羣龍儼若仙還如到元圃更是謁甘泉夜雨塵初滅秋空月正懸詭容紛入望霽色宛成妍東極華隂踐西彌嶓冡連奔峰出嶺外瀑布落雲邊漢帝宫將苑商君陌與阡林華鋪近甸烟靄繞晴川既庶仁斯及分憂政已宣山公啓事罷吉甫頌聲傳濟濟金門步洋洋玉樹篇徒歌雖有屬清越豈同年奉和幸三㑹寺應制寺傳蒼頡造書䑓鄭愔鳥籕遺新閣龍旂訪古臺造書臣頡往觀籍帝羲來睿覽山川匝宸心宇宙該梵音隨駐輦天歩接乗杯舊苑經寒露殘池問刼灰散花將捧日俱喜聖慈開㤙勅尚書省寮宴昆明池同用堯字張嘉貞靈沼初開漢神池舊浴堯昔人徒習武明代此聞韶地脉山川勝天恩雨露饒時光牽利舸春淑覆柔條芳醖酲干日華牋落九霄幸承歡賫重不覺醉歸遙長安早春張子容開國維東井城池起北辰咸歌太平日共樂建寅春雪盡黄山樹氷開黒水津草迎金埒馬花伴玉樓人鴻鴈看無數鶯歌聽欲頻何當桂枝擢還及栁條新奉和聖製早渡蒲津闗徐安貞仙掌臨秦甸虹橋闢晉闗兩都分地險一曲度河灣路得津門要時稱古戍閑城花春正發岸栁曙堪攀後乗猶臨水前旌欲換山長安迴望日宸御六龍還奉和聖製於望春亭觀褉飲應制王維長樂青門外宜春小苑東樓開萬井上輦過百花中畫鷁移仙仗金貂列上公清歌邀落日妙舞向春風渭水明秦甸黄山入漢宫君王來袚禊灞滻亦朝宗送李太守赴上洛前人商山包楚鄧積翠靄沈沈驛路飛泉灑闗門落照深野花開古戍行客響空林板屋春多雨山城晝欲隂丹泉通虢畧白羽抵荆岑若見西山爽應知黄綺心降聖閣天寳七載改朝元閣為降聖閣儲光羲一山盡天苑一峰開道宫道花飛羽衛天鳥游雲空玉殿俯元水春旗搖素風夾門小松柏覆井新梧桐自昔大仙下乃知元化功神皇作桂館此意與天通登總持寺浮屠孟浩然半空躋寶塔晴望盡京華竹遶渭川遍山連上苑斜四門開帝宅阡陌俯人家累刼從初地為童憶聚沙一窺功徳見彌益道心加坐覺諸天近空香送落花過四皓墓李白我行至商洛幽獨訪神仙園綺復安在雲羅尚宛然荒凉千古跡蕪沒四墳連伊昔鍊金鼎何年閉玉泉隴寒惟有月松古漸無烟木魅風號去山精雨嘯旋紫芝髙咏罷青史舊名傳今日併如此哀哉信可憐重經昭陵杜甫草昧英雄起謳歌厯數歸風塵三尺劍社稷一戎衣翼亮真文徳丕承戢武威聖圖天廣大宗祀日光輝陵寢盤空曲熊羆守翠微載窺松柏路還見五雲飛華清宫皇甫冉驪岫接新豐岧嶤駕翠空鑿山開秘殿隠霧蔽仙宫絳闕猶棲鳳雕梁尚帶虹温泉曽浴日華館舊迎風肅穆瞻雲輦沈深閉綺櫳東郊倚望處瑞氣靄濛濛歸馬華山白行簡牧野功成後周王戰馬閑驅馳休伏皁飲齕任依山逐日朝仍去隨風暮自還氷生疑隴阪葉落似榆闗躞蹀仙峰下騰驤渭水灣幸逢時偃武不復鼓鼙間春色滿皇州裴夷直寒銷山水地春遍帝皇州北闕晴光動南山喜氣浮夭紅粧暖樹急緑走陰溝思婦開香閣王孫上玉樓氛氲直城北駘蕩曲江頭今日靈臺下翻然却是愁華清宫三十韻杜牧繡嶺明珠殿層巒下繚墻仰窺丹檻影猶想赭袍光昔帝登封後中原自古强一千年際㑹三萬里農桑几席延堯舜軒墀接禹湯雷霆馳號令星斗煥文章釣築乗時用芝蘭在處芳北扉閑木索南靣富循良至道思元圃平居厭未央鈎陳裹巖谷文陛厭青蒼歌吹千秋節樓臺八月涼神仙逺縹緲環珮碎丁當泉煖涵窗鏡雲嬌惹粉囊嫩嵐滋翠葆清渭照紅妝帖泰生靈夀歡娯嵗序長月聞仙曲調霓作舞衣裳雨露徧金穴乾坤入醉鄉玩兵師漢武迴手倒干將鯨鬛掀東海胡牙掲上陽喧呼馬嵬血零落羽林槍傾國留無路還魂怨有香蜀峰横慘淡秦樹逺微茫鼎重山難轉天扶業更長望賢餘故老花萼舊池塘徃事人誰問幽襟淚獨傷碧簷斜送日殷葉半凋霜迸水傾瑤砌疎風罅玉房塵埃羯鼓索片段荔枝筐烏啄摧寒木蝸涎蠧畫梁孤烟知客恨遙起泰陵傍朱坡前人下杜鄉園古泉聲繞舍啼靜思長慘切薄宦與乖暌北闕千門外南山午谷西倚川紅葉嶺連寺緑楊堤迥墅翹霜鶴澄潭舞錦雞濤驚堆萬軸舸急轉千溪眉㸃萱芽嫩風條栁幄迷岸藤捎虺尾沙渚印麑蹄火燎緗桃塢波光碧繡畦日痕絙翠巘陂影墮晴霓蝸壁蘭班蘚銀筵荳冦泥洞雲生片段苔徑繚高低偃蹇松公老森嚴竹陣齊小蓮娃欲語幽笋稚相攜漢館留餘趾周臺接故蹊蟠蛟岡隠隠斑雉草萋萋樹老籐紆組巖深石啓閨侵窻紫桂茂拂面翠禽棲有計冠終挂無才筆謾題自塵何太甚休笑觸藩羝華清和杜舎人張祐五十年天子離宫舊粉墻登封時正泰御宇日初長上位名先實中興事憲章舉戎輕甲胄餘地取河湟道帝𤣥元祖儒封孔子王因縁百司署藂㑹一人湯渭水波搖緑秦山草半黄馬頭開夜照鷹眼利星芒下箭朱弓滿鳴鞭皓腕攘畋思獲呂望諫祗避周昌兎跡貪前逐梟心不早防幾添鸚鵡勸頻賜荔枝甞月鎖千門靜天髙一笛凉細音搖翠佩輕歩宛霓裳禍亂根潛結昇平意遽忘衣冠逃犬虜鼙鼓動漁陽外戚心殊迫中途事可量雪埋妃子貌刃斷禄兒腸近侍煙塵隔前蹤輦路荒益知迷寵佞惟恨喪忠良北闕尊明主南宫遜上皇禁清餘鳳吹池冷映龍光祝夀山猶在流年水共傷杜鵑魂厭蜀蝴蝶夢悲莊雀卵遺雕栱蟲絲罥畫梁紫苔侵壁潤紅樹閉門芳守吏齊鴛瓦耕民得翠璫歡康昔時樂講武舊兵塲暮草深巖靄幽花墜徑香不堪垂白叟行折御溝楊商於李商隠商於朝雨霽歸路有秋光背塢猿收果投巖麝退香建瓴真得勢横㦸豈能當割地張儀詐謀身綺季長清渠州外月黄葉廟前霜今日看雲意依依入帝鄉監試蓮花峰劉得仁太華萬餘重岧嶤只此峰當秋倚寥泬入望似芙蓉翠拔千尋直青危一朶穠氣分毛女秀靈有羽人蹤倒影侵闗路流香激廟松塵埃終不及車馬自憧憧華嶽薛能簇簇復亭亭三峰卓杳冥每思窮本末應合記圖經發地連宫觀衝天接井星河微臨巨勢秦重戴竒形太古朝羣后中央擘巨靈隣州猶映檻幾縣恰當庭鶴毳壇風亂龍漦洞水腥望遙通北極上徹見東溟客翫晴難偶農祈雨必零度闗無暑氣過路得愁醒羽客時應見霜猿夜可聽頂懸飛瀑峻崦合白雲青混石猜