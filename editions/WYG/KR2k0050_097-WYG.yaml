不知更上荷花最深處玉樓金殿影參差華清宫前人水氣朦朧暖畫梁一回開殿滿山香宫娃幾許輕歌舞白首翻令憶建章雪二首司空曙樂遊春苑望鵞毛宫殿如星樹似毫漫漫一川横渭水太陽初出五陵高題嘉陵驛武元衡悠悠風斾繞山川山驛空濛雨似烟路半嘉陵頭已白蜀門西上更青天石甕寺在驪山權徳輿石甕靈泉勝寶井汲人迴挂青絲綆厨烟半逐白雲飛當畫老僧來灌頂遊太平公主山莊韓愈公主當年欲占春故將臺榭壓城闉欲知前面花多少直到南山不屬人次潼闗先寄張十二閣老使君張賈前人荆山已去華山來日出潼闗四扇開刺史莫辭迎候逺相公親破蔡州迴漢苑竹王涯二月春風遍柳條九天仙樂奏雲韶蓬萊殿後花如錦紫閣堦前雪未消題秦嶺歐陽詹南下斯須隔帝鄉北行一歩掩南方悠悠烟景兩邊意蜀客秦人各斷腸自南山却赴京師石臼嶺頭即事寄嚴僕射前人鳥企蛇蟠地半天下窺千仭到浮烟因高囬望沾恩處認得梁州落日邊華清宫張籍温泉流入漢離宫宫樹行行浴殿空武帝舊時人欲盡青山空閉御墻中馬嵬賈島長川幾處樹青青孤驛危樓對翠屏一自上皇惆悵後至今來徃馬蹄腥白侍郎洞在鎮安前人一山未盡一山迎百里都無半里平宜是老僧遙指處只堪圖畫不堪行奉誠園馬司徒舊宅元稹蕭相深誠奉至尊舊居求作奉誠園秋來古巷無人掃樹滿空墻閉㦸門長樂坡送人賦得愁字白居易行人南北分征路流水東西接御溝終日坡前恨離别謾名長樂是長愁羅敷水前人野店東頭花落處一條流水號羅敷芳魂艷骨知何處春草茫茫墓亦無曲江池上雍裕之殷勤春在曲江頭全藉羣仙占勝遊何必三山待鸞鶴年年此地是瀛洲責商山四皓蔡京秦末家家思逐鹿商山四皓獨忘機如何鬚髪霜相似更出深山定是非再宿武闗李渉逺别秦城萬里遊亂山高下出商州闗門不鎖寒溪水一夜潺湲送客愁出藍田闗寄董使君陸暢萬里烟蘿錦帳間雲迎水送度藍闗七盤九折難行處盡是龔黄界外仙過華清宫三首選一杜牧長安回望繡成堆山頂千門次第開一騎紅塵妃子笑無人知是荔枝來晚秋潼闗西門作張祜日落寒郊煙物清古槐隂黒少人行闗門西去華山色秦地東來河水聲渭城曲王維渭城朝雨浥輕塵客舍青青柳色新勸君更進一杯酒西出陽闗無故人華清宫四首選一前人紅樹蕭蕭閣半開上皇曽幸此宫來至今風俗驪山下村笛猶吹阿濫堆阿䳰湯前人日照宫城紅樹芳緑窗燈影在彫梁金輿未到長生殿妃子偷尋阿䳰湯華山王母祠李商隠蓮華峰下鎖彫梁此去瑤池地共長好為麻姑到東海勸栽黄竹莫栽桑咸陽前人咸陽宫闕鬱嵯峩六國樓臺艷綺羅自是當時天帝醉不闗秦地有山河嘉陵江薛逢備問嘉陵江水湄百川東去爾西之但教清淺源流在天路朝宗㑹有期冷日過驪山趙嘏冷日微烟渭水愁翠華宫樹不勝秋霓裳一曲千門鎖白盡梨園弟子頭馬嵬坡鄭畋肅宗回馬楊妃死雲雨雖亡日月新終是聖明天子事景陽宫井又何人駱谷曉望韓琮秦川如畫柳如絲去國還家一望時公子王孫莫來好嶺花多是斷腸枝華清宫三首選一崔櫓門横金鎖悄無人落日秋聲渭水濵紅日下山寒寂寂濕雲如夢雨如塵退朝望終南李拯紫宸朝罷綴鵷鸞丹鳳樓前駐馬看惟有終南山色在晴明依舊滿長安紫閣峰邵謁壯國山河倚空碧迴拔煙霞侵太白緑崖下視千萬尋青天只據百餘尺湯泉陸龜䝉暖殿流湯數十間玉渠香細浪回環上皇初解雲衣浴珠櫂時敲琴瑟山青門胡曽漢皇提劍滅咸秦亡國諸侯盡是臣惟有東陵守高節青門甘作種𤓰人温泉羅鄴一條春水潄莓苔幾繞元宗浴殿回此水貴妃曽照影不堪流入舊宫來焚書坑羅隠千載遺踪一窖塵路旁耕者亦傷神祖龍筭事渾乖角將謂詩書活得人仙掌前人掌前流水駐無塵掌下軒車日日新謾向山頭高舉手何曽招得路行人曲江春望唐彦謙杏艷桃光奪晚霞樂遊無廟有年華漢朝冠葢皆陵墓十里宜春漢苑花驪山李洞春日遲遲春草緑野棠開盡飄香玉繡嶺宫前鶴髪翁猶唱開元太平曲灞上紇干著鳴鞭晚日禁城東渭水晴烟灞岸風都傍柳隂回首望春天樓閣五雲中無定河陳祐無定河邊暮笛聲赫連臺畔旅人情函闗歸路千餘里一夕秋風白髪生題鄜州相思鋪令狐楚誰把相思號此河塞垣車馬往來多只因自古征人淚灑向空川作逝波聞种山人表謝急徵不赴二首選一王禹偁表讓皇家買酒錢上令京兆府賜山人酒錢讓而不受醉鄉歸去更陶然吾君若問徵君意自有東臯種黍田别丹水前人曽經爛漫濯吾纓忍别潺湲月夜聲便入紅塵染詩思吟魂猶合數年清温泉王素妃子當時已塵土華清今日盡荒凉後人不管唐成敗猶自嚴扄道御湯御愛山前人當日䝉塵歴險難得逢蒼翠喜開顔吾皇高拱巖廊下只愛生靈不愛山過華山懐白雲陳先生張詠性愚不肯林泉住强要清流擬致君今日星馳劍南去回頭慚愧華山雲過青泥嶺余靖老杜休誇蜀道難我聞天險不同山青泥嶺上青雲路二十年來七往還雲臺觀韓琦仙掌峰前羽客家玉虚宫殿倚雲霞最高頂上誰曽到得見蓮開十丈花戯題仙掌前人三峰晴曉碧相挨仙掌分明出霧開莫向巍峩􅃷高手也曾先得桂枝來麟州范仲淹宣恩來到極西州城下羌山隔一流不見耕桑見烽火願封丞相冨人侯眉夀堂勸農前人烹葵剥棗古年豐莫管時殊俗自同太守勸農農勉聽從今再願詠豳風過下馬陵蘇舜欽下馬陵頭草色春我來懐古一沾巾陵邊又有纍纍冢應是當年取酒人南岐州邵雍鳳州十二大峰崇峙立嵯峩宇宙中不與巫山高下論敢同四嶽列郡雄再登大像閣富弼萬古泥陽舊帝畿苦教行客淚沾衣舊遊水石應牢落落盡餘花猶未歸雲際山程顥南藥東邊白閣西登臨身共白雲齊上方頂上朝來望陡覺羣峰四面低天漢臺和文與可洋州園池三十首選一蘇軾漾水東流舊見經銀河左界上通靈此臺試向天文覔閣道中間第幾星聞种諤米脂川大㨗前人聞説將軍取乞銀將軍旗鼓捷如神應知無定河邊柳得共中原雪絮春中梁山寺徐積上方梯磴繞巖頭誰説孤高更起樓直望漢江三百里一條如線下洋州驪山靈泉觀李埏山原繚繞水縈紆繡嶺屏風列左隅更上朝元最高處饒君都看渭川圖朝元閣杜常行盡江南數十程曉風殘月入華清朝元閣上西風急都入長楊作雨聲過郿縣懐古二首蔣頴叔蜀相揚聲欲取郿闗中形勢已全窺當時不是長星隕席捲中原未可知據險先取五丈原駐兵分闢渭南田諸軍未得全無事天下竒才始信然過漢中陸游雲棧屏山日月遊馬蹄初喜踏梁州地連秦蜀川原壯水下荆揚日夜遊馬嵬真山民三郎掩面馬嵬坡生死恩深可奈何瘞土驛旁何足恨潼闗戰處骨埋多鳯州歌汪元量鳳州南去是南岐大散横盤勢更危躍馬紫金河畔路萬枝楊柳撒金絲翠微寺金趙秉文南山常愛退之詩未説雲烟潤色之要看山光如潑黛更須留待雨晴時南山深鎖翠微宫寺在南山十里東祗怪朝來衫袖濕不知身在翠微中過楊太尉墳前人直道從來自不容斷碑千載尚塵封潼闗闗下墳三尺清節高於太華峰慈恩寺塔酈權慈恩石塔半公卿時遇聞人為指名龍虎榜中休着眼一篇俚賦誤平生過驪山陳規豐鎬無由問故基三章只見黍離詩而今多少華清石都與行人刻艷詞客有自闗輔來言秦民之東徙者餘數十萬口攜持負戴絡繹山谷間晝餐無糧糒夕休無室廬饑羸暴露濵死無㡬間有為秦聲冩去國之思者余聞之悲不可禁乃為作商歌十章倚其聲以紓予懷十首選二折來灞水橋邊栁盡向商於道上栽明年三月花如雪㑹有好風吹汝回行人十步九盤桓叢壑縈迴行路難忽到商顔最髙處一時回首望長安驪山二首選一伊喇霖蒼苔徑滑明珠殿落葉林荒羯鼓樓渭水都來細如綫若為流得許多愁磻溪李汾封侯輸與曲如鈎冷坐磻溪到白頭老婦厨中莫彈鋏白魚留待躍王舟興慶夜月喬扆花萼樓傾有故基行人空讀火餘碑可憐興慶池邊月曽伴寧王玉笛吹四皓元趙孟頫白髪商顔四老翁紫芝歌罷聽松風半生不與人間事亦墮留侯計術中鳯鳴崗仇聖耦和鳴千古詠西周喚起春風遍九州一自岐陽留語後碧梧烟冷不勝秋楊妃墓馬祖常漢廟衣冠照碧燐唐陵翁仲作黄塵馬嵬坡上棠梨樹猶占秦園幾日春驪山二首選一前人玉女泉邊翠藻多石池涵影媚宫娥可憐繡嶺啼春鳥猶似梨園弟子歌甘泉故宫朱徳潤漢郊五畤答鴻禧草木甘泉夜色移昨日長安道旁過故宫無奈黍離離天台山九成宫故墟董雄飛玉立巉巉止斷崖昔日題此作天台蟠根誰似山頭栝曾見隋唐池館來過華山明解縉謫臣西來登華嶽黄河東去一秋毫可憐閒却擎天手萬里雲霄日月高奉命訪張三丰到香溪祠胡濙枝頭小鳥語間闗野逕無人自往還扶杖香溪臨絶壁石橋空聽水潺潺送韓汝慶還闗中何景明華嶽雲臺萬里情高秋落日照秦城黄河一線通滄海身在仙人掌上行漢中歌前人漢王昔日定三秦壯士東歸意氣新旌旗暗度陳倉口父老重迎灞水濵潼闗王廷相天設潼闗金陡城中條華嶽拱西京何時帝劈蒼龍峽放與黄河一線行扶風道中十首選二康海鳳城原是美陽城秦后離宫跡已平細草不知龍輦去城邊日日喚愁生杏林東望望隋陵覆斗巃嵸隠地形香火莫悲陵邑吏河山空倚少微星終南篇王九思經臺西峙五臺東白閣隂森紫閣融郡山羅列重雲外圭峰拱立碧天中驪山張原烽火空餘百尺臺華清宫殿已成灰兩家失國由妃子落日行人謾自哀咸陽懐古馬理咸陽原上望秦中渭水依然帶故宫指鹿臂鷹人惡説青山惟愛茹芝翁下馬陵前人三尺孤墳禁苑頭王侯至此下驊騮兒童為問縁何事千載真儒在此坵闗西雜詠程誥千年迴磴絶鳴鑾太乙祈靈有漢壇一夜悲風銅柱折仙人垂淚下金盤阿房宫胡侍六王纔畢鮑魚回赤帝兵從軹道來雲閣曲連三百里野風吹作楚人灰西廵曲頓鋭飛輪撃水日三千咫尺長安在日邊試向茂陵髙處望未央前殿列銅仙答寄延綏王中丞慎微王世貞中丞繡斧下青霄十萬軍聲靜不囂何限五陵春草色莫容戎馬向秦驕華嶽雲臺觀二首選一喬世寧太華三峰凌紫烟雲臺猶自隔仙壇卧看虹飲星池水笑指雲間玉井蓮孟姜女祠在同官縣傅振商遙瞻絶塞暮雲間萬死尋夫豈望還招得遺魂従舊骸千秋同對女迴山前題楊巍列女山頭猶有廟秦人塞上已無城經過莫聽漆河水猶似當年痛哭聲太乙峰張錬坐對雲山幾萬重中間秀出玉芙蓉四時鬱鬱浮佳氣知是終南第一峰蘇武節義臺前人蘇家門館冠當時祗剰荒臺傍水湄欲向耕人尋往事西風吹鴈黍離離烟霞洞鄭子貞隐處在醴泉縣谷口趙崡流水柴門曲曲斜青山有洞鎖烟霞野人不識當年事笑道隣無姓鄭家隋公泉在澄城路車蹟古隋皇可漫傷清流猶帶粉脂香獨憐一脉甘霖水不潤蒼生照曉妝潼闗候門劉璽萬古河山天府雄秦時地利漢時功要知鎖鑰提防處不在晨昏啟閉中漢隂灌臺本朝尹任郭外臺空徑就荒雨餘草色自芬芳當年假使憑橰桔千載誰傳抱甕鄉太史祠晚照王又旦雲中墮下三重嶺天上流來九折河水面紅霞搖不定晴空一㸃是羲和橋陵許孫荃黄帝乗龍去不還衣冠留此塟空山仙臺縹緲青霄上古栢森森翠靄間沙苑前人百里周垣抱曲堤青青豐草映回谿不知天廏今何處惟見春風長蒺藜長武孝子灘張緄千古芳名孝子灘峰巒環繞水漫漫行人莫向前村望滿樹烏哺噪影寒望見望山二首選一王士禎蒲阪南來問釣船風陵塠上隔風烟黄河一曲流千里太華居然落眼前雨宿嶽廟萬夀閣前人松蜕龍鱗不記年驚人老鶴起松巔扶笻未到希夷峽先對三峰一夜眠驪山懐古八首選三前人鸚鵡何年問上皇野棠風折繚絙長銷魂此日朝元閣親試華清第二湯内殿傳呼菊部頭梨園弟子按梁州善才零落龜年老渭水猶明羯鼓樓鳳凰原下鹿槽旁虢國夫人有賜莊無數青山學眉黛當年誰入合歡堂馬嵬懐古二首前人何處長生殿裏秋無情清渭入東流香魂不及黄旛綽猶占驪山土一丘巴山夜雨却歸秦金粟堆邊草不春一種傾城好顔色茂陵終傍李夫人華清宫四首選二康乃心開元天子幸温泉萬乗旌旗擁渭川一自馬嵬鈴雨後華清清夢杳如年按歌臺上新聲歇羯鼓樓邊夕照紅莫向行人頻問古杏花零落舊離宫秦莊襄墓前人莊襄塚並白雲齊眺眎長安萬井低誰指韓生傳古墓教人錯認灞陵西楊妃粉呉呈祥海棠不受鉛華染虢國猶然淡掃眉玉骨已消泉下土後人何事檢黄泥昆明池王心敬滄池漭沆古城邊盡道昆明鑿漢年武帝旌旗何處是石鯨空傍月華眼晨過咸陽前人厯盡瀕河嶺幾層秦家城闕杳無徵徒餘纍纍北原上不是唐陵即漢陵憶秦娥樂遊原唐李白簫聲咽秦娥夢斷秦樓月秦樓月年年柳色灞陵傷别樂遊原上清秋節咸陽古道音塵絶音塵絶西風殘照漢家陵闕漁家傲秋思宋范仲淹塞下秋來風景異衡陽鴈去無留意四面邊聲連角起千障裏長煙落日孤城閉濁酒一杯家萬里燕然未勒歸無計羌管悠悠霜滿地人不寐將軍白髪征夫淚華清引蘇軾平時十月幸蓮湯玉甃瓊梁五家車馬如水珠璣滿路旁翠華一去掩方牀獨留烟樹蒼蒼至今清夜月依舊過繚墻西河一百四字三叠周美成長安道瀟洒西風時起塵埃車馬晚遊行灞陵烟水亂鴉棲鳥夕陽中參差霜樹相倚到此際愁似葦冷落闗河千里追思唐漢昔繁華斷碣殘記未央宫闕已成灰終南依舊濃翠對此景無限愁思遶天涯秋蟾如水轉使客情如醉想當時萬古雄名盡作往來人凄凉事酹江月秋夕興元使院作用東坡赤壁韻胡世將神州沈陸問誰是一范一韓人物北望長安應不見抛却闗西半壁塞馬晨嘶胡笳夕引贏得頭如雪三秦往事只數漢家三傑試看百二山河奈君門萬里六師不發朝議主和閫外何人回首處鐵騎千羣都滅富平之敗拜將臺欹懐賢閣杳空指衝冠髪欄杆拍遍獨對中天明月朝中措金密璹襄陽古道灞陵橋詩興與秋高千古風流人物一時多少雄豪霜清玉塞雲飛隴首風落江臯夢到鳳凰臺上山圍故國周遭水龍吟從商帥國器獵同裕之賦王渥短衣匹馬清秋慣射虎南山下西風白水石鯨鱗甲山川圖畫千古神州一時勝事賔僚儒雅快長堤萬弩平岡千騎波濤巻魚龍夜落日孤城鼓角笑歸來長圍初罷風雲慘淡貔貅得意旌旗閑暇萬里天河更須一洗中原兵馬看櫜鞬嗚咽咸陽道左拜西還駕驀山溪張信甫山河百二自古闗中好壯嵗喜功名擁征鞍雕裘繡帽時移事改萍梗落江湖聽楚語厭蠻歌往事知多少蒼顔白髪故里欣重到老馬省曽行也頻嘶冷烟殘照終南山色不改舊時青長安道一回來須信一回老望海潮從軍舟中作忻元禮地雄河嶽疆分韓晉潼闗高壓秦頭山倚斷霞江吞絶壁野烟縈帶滄洲虎斾擁貔貅看陣雲截岸霜氣横秋千雉嚴城五更殘角月如鈎西風曉入貂裘恨儒冠誤我却羡兠鍪六郡少年三朝老將賀蘭烽火新收天外嶽連樓想斷雲横曉誰繞歸舟剰着黄金換酒羯鼓醉涼州風流子題温泉布薩汝弼三郎年少客風流夢繡嶺蠱瑤環看浴酒發春海棠睡暖笑波生媚荔子漿寒况此際曲江人不見偃月事無端羯鼓數聲打開蜀道霓裳一曲舞破潼闗馬嵬西去路愁來無會處但淚滿闗山賴有紫囊泣進錦襪傳看歎玉笛聲沈樓頭月下金􅁫信杳天上人間幾度秋風渭水落葉長安玉樓春送程大尹鵬述職明王九思雪峰萬叠長安路禁苑到時冬欲暮功能纔奏尚書聞名姓早從仙桂注繡衣映日看丰度玉斧飛霜來鄠杜門墻桃李已成隂又見春風吹雨露念奴嬌沙苑懐古王三省黄沙漠漠更何處在坰驌驦廏屋塠阜纍纍尋常有落日牛羊亂牧緑柳縱横黒闥戰處遙想龍蛇逐殘基斷礫倒盡周垣遺築一望衰草連天荒陂邊鷗鷺驚飛還啄寒日狂風行人迷路衫䄂遮雙目野烟淺水巨魚肯此潛伏江城子登華山本朝張恂朝來爽氣畫圖中石磴窮索垂龍避世何深樓閣挂危峰過得青柯坪以上竒最絶與天通仙人掌上許誰同石脂濃水溶溶回首紅塵千斛縱無容探取驚人詩在否搔首問拍蒼穹沁園春華清懐古孫爾思欲訪驪山開元遺事華清故宫歎長生殿裏獨留寒月朝元閣上又起西風仙樂無聲龍去盡霜霰依然飛滿空添長恨是花開桃李葉落梧桐回思唐運方隆正曲奏霓裳猶未終乍漁陽鼙鼓一聲動地白衣紅袖各自西東烏呌延秋鈴鳴棧道驛騎紅塵何處紅空腸斷温泉錦浪千古冲瀜浣溪沙春日遊黄公栁堤前人來往朱輪輾畫橋春雲靄靄水迢迢浪花深帶酒帘搖青帝郊中烟一縷黄公堤上柳千條鶯兒又作殢人嬌洞仙歌題香溪洞劉應秋壺天不逺松月長如曉發磵騰山覔瑤草見橋梁放鶴洞府流丹歎舊時幾許遊人盡老殘棋半局爛柯無人到誰解得茶杯火棗相傳鄭太守訪吕仙輟碁烹茗剥棗以欵之惟有孤蓬喬木石磴溪流長在也數聲啼鳥任重門臺榭作坵墟憑片片白雲清風自掃陜西通志巻九十七
