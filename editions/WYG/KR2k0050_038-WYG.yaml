body:
  text: 陜西通志巻三十八屯運二附考歴代屯田漕運屯田漢武帝元鼎六年上郡西河等處開田官斥塞卒六十萬人戍田之漢書食貨志師古曰開田始開屯田也本志注後漢世祖建武四年馬援家屬隨隗囂質子恂歸雒陽居數月而無它職任援以三輔地曠土沃而所將賓客猥多乃上書求屯田上林苑中帝許之後漢書馬援傳順帝永建四年僕射虞詡上疏曰雍州厥土惟上且沃野千里穀稼殷積夫棄沃壤之饒損自然之財不可謂利書奏帝乃復三郡激河浚渠為屯田省内郡費計歲一億文獻通考後主建興十二年亮悉大衆由斜谷出據武功五丈原與司馬宣王對於渭南亮以前者數出皆以運糧不繼使已志不伸乃分兵屯田為乆駐之計耕者雜於渭濱居民之間而百姓安堵軍無私焉蜀志諸葛亮傳晉武帝初扶風王駿為鎮西將軍都督雍梁等州勸督農桑與士卒分役已及僚佐並將帥軍士等人限田十畝具以表聞詔遣普下州縣使各務農事晉書扶風王駿傳北魏太祖登國九年春三月使東平公元儀屯田於河北五原至於稒陽稒陽在榆林衛東北塞外魏書太祖本紀唐𤣥宗開元八年同州刺史姜師度派洛灌朝邑河西二縣閼河以灌通靈陂收棄地二千頃為上田置十餘屯帝幸長春宫嘉其功詔褒美唐書姜師度傳九月詔曰昔史起溉漳之䇿鄭國鑿涇之利自兹厥後聲塵缺然同州刺史姜師度識洞於微智研未兆匪躬之節所懐必罄奉公之道知無不為頃職大農首開溝洫歲功猶昩物議紛如縁其忠欵可嘉委任仍舊暫停九列之重假以六條之察白藏過半續用斯多食乃人天農為政本朕故兹巡省不憚祁寒將申勸䘏之懐特冒風霜之弊今原田彌望􅅵澮連屬由来榛棘之所遍為秔稻之川倉庾有京坁之饒關輔致畝畬之潤本營此地欲平人民百姓未閑三農虚棄以官令開發冀令遞相教誘功既成矣思與之共其屯田内先有百姓挂籍之地比来召作主亦量准頃田割還其官屯熟田如同州有貧下欠地之户自辦工力能營種者准數給付餘地且依前官取師度以功特加金紫光禄大夫賜帛三百疋册府元龜二十九年十一月十七日勅新豐朝邑屯田令長春宫使檢校會要天寳八年屯田收榖關内得五十六萬三千八百一十石通典天下諸州屯關内道二百五十八六典徳宗建中三年宰相楊炎請置屯田於豐州受降城地發關輔民鑿陵陽渠以增溉京兆尹嚴郢嘗從事朔方知其利害以為不便疏奏不報郢又奏五城舊屯其數至廣以開渠之糧貸諸城約以冬輸又以開渠功直布帛先給田者據估轉穀如此則關輔免調發五城田闢比之浚渠利十倍也時楊炎方用事郢議不用而陵陽渠亦不成唐書食貨志貞元三年募戍卒屯田京西上問李泌以復府兵之䇿對曰今歲卒戍京西者十七萬人計歳食粟二百四萬斛今粟斗直錢百五十為錢三百六萬緡國家比遭饑寒經費不充就使有錢亦無粟可糴未暇議復府兵也上曰然則亟減戍卒歸之如何對曰陛下誠用臣言可不減戍卒不擾百姓糧食皆足府兵亦成上曰果能如是何為不用對曰此須急為之過旬日則不及矣上問其計泌曰吐蕃久居原蘭之間以牛運糧糧盡牛無所用請發左藏惡繒染為綵纈因党項以市之計十八萬疋可致牛六萬餘頭命諸冶鑄農器糴麥種分賜沿邊軍鎮募戍卒耕荒田而種之約麥熟倍償其種其餘據時價五分増一官為糴之来春種禾亦如之關中土沃久荒所收必厚戍卒獲利耕者浸多糴價必賤名為増之而實比今歳所減多矣且邊地官多闕請募人入粟以補之可足今歲之糧上皆從之因問曰卿言府兵亦集如何對曰舊制戍卒三年而代今既因屯田致富則安於其土必不思歸及其將滿下令有願留者即以所開田為永業家人願来者本貫給長牒續食而遣之不過數畨則戍卒皆土著乃悉以府兵之法理之是變關中之疲敝為富强也上喜曰如此天下無復事矣泌曰未也臣能不用中國之兵使吐蕃自困上曰計將安出對曰臣未敢言之俟麥禾有效然後可議也既而戍卒應募願耕屯田者什五六名臣奏議憲宗元和中以韓重華為振武京西營田和糴水運使募人為十五屯每屯百三十人人耕百畝就高為堡東起振武西逾雲州極於中受降城凡六百餘里列栅二十墾田三千八百餘頃歲收粟二十萬石省度支錢二千餘萬緡唐書食貨志文宗太和四年六月左右神䇿軍奏當軍於鳯翔扶風縣營田採造寳雞縣採造斜谷南山吴山寳雞扶風營田共四所各請鑄印並可之册府元龜太和末邠寧節度使畢諴募士開營田歲收三十萬斛省度支錢數百萬緡唐書食貨志宋仁宗天聖四年陜西用兵詔轉運使度隙地置營田以助邊計又假同州沙苑監牧地為營田而知永興軍范雍括諸郡牛頗煩擾未幾遂罷宋史食貨志慶歴元年九月置陜西營田務仁宗本紀范仲淹大興屯田於陜西文獻通考皇祐元年詔減陜西兵屯内地以省邊費通鑑陜西興置營田本欲助邊以寛民力除沿邊空閒膏腴地土可以開墾外其近裏州縣官吏不能體朝廷之意將逺年瘠薄無人請佃逃田抑勒近隣人户分種或令送納租課自来人户租佃官地每畝出課不過一二斗今勒令分種每畝須收數斗致貧户輸納不前自用兵以来人户科率勞弊已業尚多荒廢實無餘力更及營田所出租課多包虚送納况今歳灾旱尤甚理當優䘏臣等欲乞陜西近裏州軍營田一切廢罷如原係租田令依舊額出課如逺年瘠薄逃田税重無人佃者即減定税額召人請佃范文正公集神宗熙寧五年知延州趙卨乞根括閒田及募弓箭手詔如其請行之時陜西曠土多未耕屯戍不可撤逺方有輸送之勤卨請募民耕以紓朝廷憂詔下其事經畧安撫使郭逵言懐寧砦新得地百里已募弓箭手無閒田可耕卨又言之遂括得地萬五千餘頃募漢蕃兵幾五千人為八指揮詔遷卨官賜金帛宋史食貨志初鄜延地皆荒瘠占田者不出租賦倚為藩蔽寳元後用兵凋耗殆盡其曠土為諸酋所有卨因詔問曰徃時汝族户若干今皆安在對大兵之後死亡流散其所存止此卨曰其地存乎酋無以對卨曰聽汝自募丁家使占田充兵若何吾所得者人耳田則吾不問也諸酋皆感服歸募悉補亡籍又簡括境内公私閒田得七千五百餘頃募騎兵萬七千神宗聞而嘉之趙卨傳元豐五年知太原府呂惠卿嘗上營田疏曰今葭蘆米脂裏外良田不啻一二萬頃夏人名為真珠山七寳山言其多出禾粟也若耕其半則兩路新砦兵費已不盡資内地况能盡闢之乎前此所以不敢進耕者外無捍衛也今於葭蘆米脂相去一百二十里間各建一砦又其間置小堡鋪相望則延州之義合白草與石州之吴堡尅明以南諸城砦千里邊面皆為内地而河外三州荒閒之地皆可耕闢以贍軍用又通葭蘆之道於麟州之神木其通堡砦亦如葭蘆米脂之法而横山膏腴之地皆為我有矣七年惠卿雇五縣耕牛發將兵外䕶而耕新疆葭蘆吴堡間膏腴地號木瓜園者凡得地五百餘頃麟州豐州地七百三十頃弓箭手與民之無力及異時兩不耕者又九百六十頃惠卿自謂所得極厚可助邊計乞推之陜西八年樞密院奏去年耕種木瓜園凡用將兵萬八千餘人馬二千餘匹費錢七千餘緡穀近九千石糗糒近五萬斤草萬四千餘束又保甲守禦費緡錢千三百米石三千二百役耕民千五百雇牛千具皆彊民為之所收禾粟蕎麥萬八千石草十萬二千不償所費又借轉運司錢穀以為子種至今未償増入人馬防拓之費仍在年計之外慮經畧司来年再欲耕種乞早約束詔諭惠卿毋蹈前失河東進築堡砦自麟石鄜延南北近三百里地土悉募廂軍配卒耕種免役食貨志高宗紹興五年十二月詔吴玠於梁洋成鳯等州措置官莊屯田六年九月以川陜宣撫吴玠於興元洋州治廢堰營田六十莊計田八百五十四頃歳收二十五萬石以助軍儲賜詔奬諭焉宋史食貨志吴玠平蜀以軍儲不繼治褒城堰為屯田民謂不便因郭大中言約中其數使民自耕而歲入多於屯田續文獻通考七年玠與敵對壘常恐逺餉勞民屢節浮費益治屯田歲收十萬斛又調戍兵命梁洋守將治堰民知灌溉可恃願歸業者數萬家宋史吳玠傳金宣宗元光元年正月壬辰詔徙中京唐鄧商虢許陜等州屯軍及諸軍家屬赴京兆同華就糧屯金史宣宗本紀元初海内既一内而各衛外而行省皆立屯田以資軍餉陜西等屯則因地之宜而肇為之未嘗遺其利續文獻通考渭南縣屯田一千二百二十二頃有竒臨潼縣屯田一千二十頃有竒涇陽縣屯田一千二十頃有竒盩厔縣屯田九百四十三頃有竒鳯翔縣屯田九十頃有竒延安路屯田四百八十餘頃元史地理志世祖中統二年十月詔鳯翔府種田户隷平陽兵籍毋令出征務耕屯以給軍餉十二月命陜西行中書省給綏徳州等處屯田牛種農具三年十月詔鳯翔府屯田軍隷兵籍屯田鳯翔至元元年八月發萬户舒穆嚕濟濟哩所部千人赴商州屯田元史世祖本紀六年十二月帝命察球爾率兵徃鳯州等處立屯田總管府俊竒傳七年以李徳輝為安西王相徳輝至視瀕涇營牧故地可得數千頃起廬舍疏溝澮假牛種田具與貧民二千家屯田其中歲得粟麥蒭藁萬計續文獻通考十一年初立陜西河渠營田使司安置屯田長安志圗説正月以安西王府所管編民二千户立櫟陽涇陽終南渭南屯田十五年十二月鴨池等處招討使竒徹所領南征新軍不能自贍者千人命屯田於京兆十八年冬十月命安西王府協濟户及南山隘口軍於安西延安鳯翔六盤等處屯田増陜西營田糧十萬石元史世祖本紀陜西等處萬户府十九年二月以盩厔南係官荒地發歸附軍立孝子林張馬村軍屯二十年以南山把口子巡哨軍人八百户於盩厔之杏園莊屯田為户孝子林屯三百一户張馬村屯三百一十三户杏園莊屯二百三十三户為田孝子林二十三頃八十畞張馬村七十三頃八十畞杏園莊一百一十八頃三十畞貴齊延安總管府十九年以拘收贖身放良穆爾齊及漏籍户計於延安路特黙齊草地屯田為户二千二十七為田四百八十六頃兵志二十三年陜西行省言延安置屯田鷹坊總管府其和斯巴哈軍逃散者皆入屯田今復供秦王阿南達所部阿黒達實飼馬及輸他賦有㫖皆罷之其不悛者罪當死二十四年六月以陜西邠乾及安西屬縣閒田立屯田總管府置官屬秩三品元史世祖本紀至元二十八年陜西屯田四十八終南九屯懷數屯皋平屯忠力屯曲泉屯樂成屯利澤屯奉上屯欒村屯安化屯渭南一十六屯懷徳屯懷仁屯豐濟屯善􅂟屯潤澤屯永便屯皂角屯亭利屯信陵屯嚴應屯南金屯安陽屯安慶屯南永壽屯北永壽屯邰陽屯涇陽九屯豐閏屯里仁屯昭義屯富安屯永昌屯廣備屯仁受屯安信屯華原屯櫟陽九屯歸厚屯安仁屯安業屯豐樂屯萬全屯廣盈屯阜盈屯大有屯安陵屯平涼五屯今隷甘省共户四千八百九十二地五千六百六十四頃一十二畝六分零内荒閒地一千六百八十七頃九十七畝二分零農器二千二百三十三副八分五釐牛二千二百零九具一隻九分每牛一具以十二分為率撥地二頃納粟麦五十石内大麥二十石小麥二十石粟十石草一百束牛一隻者地數以下皆減半牛三隻以上各隨其分數以増之長安志屯田圖説二十九年三月樞密院臣奏延安鳯翔京兆三路籍軍三千人僧格皆罷為民今復其軍籍屯田六盤從之元史世祖本紀二十九年以安西王所管編民立櫟陽等處屯田又立鳯翔屯田三十年更為民屯為户鳯翔一千一百二十七户櫟陽七百八十六户後存六百五十户涇陽六百九十六户後存六百五十八户終南七百七十一户後存七百一十三户渭南八百一十一户後存七百六十六户為田鳯翔九十頃一十二畞櫟陽一千二十頃九十九畞涇陽一千二十頃九十九畞終南九百四十三頃七十六畝渭南一千二百二十二頃三十一畞兵志三十年商挺為安西王相許楫言京兆之西荒野數千頃宋金皆嘗置屯如募民立屯田歲可得穀給王府之需挺以其言入對三年屯成果獲其利續文獻通考武宗至大元年陜西屯糧九萬三千六百七十九石二斗九升一合六勺草三十一萬三千七百九十束長安志圖説四年十一月辛丑命延安鳯翔安西軍屯田紅城者還陜西屯田元史武宗本紀順帝至正二年陜西屯糧數除優免事故逃亡等户外共七萬二千六百五十九石七斗八升二合三勺四抄内大麥二萬六千七百二十五石二斗零四合小麥二萬六千六百八十二石五斗一升八合七勺四抄粟一萬七千二百九十七石四斗八合白米八百一十四石五斗二升四合糜子一百五十五石零四升五合九勺粳米五十石八斗八升二合糯米九百三十四石一斗九升九合七勺草二十九萬一千五百一十三束長安志圖説二十二年正月仍命察罕特穆爾屯糧於陜西元史順帝本紀明太祖洪武四年詔陜西等屯田三年後每畝收租一斗二十年令陜西屯軍五丁抽一税糧照民田例又令屯軍種田五百畝者歲納糧五十石續文獻通考二十六年定凡屯種合用牛隻設或不敷即便移文取索若官廏數多差人發遣如果路途窵逺此間地方出産可以收買務在公私兩便就給官價民間買用其孳生數目每歲年終通報陜西都使共牛二萬七千四百六十七隻水牛四十六隻黄牛二萬六千六百八十三隻犏牛七百三十八隻明會典陜西都司並所屬衛所屯田共二萬九千四百四十四頃二十二畝零圖書編成祖永樂五年令陜西按察司増置僉事二員盤量屯糧明會典宣宗宣徳二年令巡按陜西監察御史兼理屯田明會典四年令陜西都司並直隷衛所開墾田土每畝歲納舊鈔三十貫菜地每畝果樹每十株歲納舊鈔五十貫候鈔法通止世法録英宗正統元年奏准陜西旗軍餘丁所種屯田五十畝之外每畝納糧五升續文獻通考二年添設陜西按察司僉事一員提督屯田令陜西每軍正糧免上倉止徵餘糧六石明㑹典四年命陜西沿邊空閒之處許官軍户下人丁儘力耕種免納籽粒續文獻通考五年閏十一月題准取延安綏徳二衛屯田餘丁及本處守備軍餘於寨堡附近給田耕種量納草束以備補助俱聽協贊軍務副使陳斌提督比較世法錄七年減延綏等處屯田軍籽粒每百畝歲納六石者止納四石又減延綏等處屯田籽粒每百畝歲納八石十年添設陜西按察司副使一員専一提督水利及屯田明㑹典憲宗成化二年令陜西都行二司各衛所軍士餘丁不該輪班在營者每人採草一百二十束各於官場上納續文獻通考六年令陜西延綏等處屯田每軍百畝徵草二束九年令榆林以南招募軍民屯田每一百畝於鄰堡上納籽粒六石明㑹典都御史余子俊奏築邊牆開設榆林衛墾屯田以守邊子俊受命至延綏相度邊地東起清水營紫城砦西至花馬池每二三里為敵臺砦崖連比不絶又於中空築短牆横一斜二如黻月狀以為偵敵避箭之所凡為堡十二崖砦八百有竒墩九十有五凡兩月而功畢又請即榆林堡置衛以逋兵當勾及戍南土者之子孫益之凡内邊曠土皆墾為屯田歲獲數萬石登壇必究十三年五月户部尚書楊鼎等㑹議邊方事宜延慶綏三衛原有屯田一萬一百餘頃每軍一名該地一頃共納籽粒五萬六千餘石穀草七萬九千餘束以供邊用年乆多弊乞行陜西都布按三司各堂上官親詣其地勘量明白編成册本送官備照每屯軍給與印信繇帖收執上從之世法録孝宗𢎞治四年三月先是陜西榆林衛有土兵以助軍有户丁屯種以養兵其後户丁有逃回原籍者苦官司勾擾之累議者欲聽從其便勿令勾擾下鎮巡等官議謂土兵户丁耕守兩便彼此相資若逃者不究恐邊務漸廢宜將逃歸者免原籍本户糧差一年在屯逋租亦暫蠲之待秋成後有司仍遣還衛屯種其衞所但令移文原籍查取勿輒遣人勾擾户部覆奏從之世法録武宗正徳時顔頤夀以大理少卿委查延慶諸務時劉瑾立法查糧各邊衞屯田欲有增益及查軍欲三丁抽一為正軍又以官銀散給軍民每四錢責運邊糧一石每二分五釐責納邊草一束賦重法嚴人不堪命頤壽不阿徇風㫖顧一切以寛大處之邊方賴以䕃庇賈志世宗嘉靖初陜西軍衛户一十五萬五百五十四口三十五萬二千九百六十三屯地一十二萬二千三百五頃六十三畝一分五毫屯糧九萬六千六百三十二石三斗九升一勺二抄屯草八十五萬九千六百九十三束西安府軍衛户一萬五千七百六十八口三萬九千九百一屯地二萬七千二百三十九頃九十七畝三分四釐八毫屯糧一十六萬九千一百九十一石五斗六升一合九勺屯草二十萬六千一百九十一束地畝銀二千六百五十九兩九錢潼關衛户七千八百四十口一萬六千七百屯地二千七百二十九頃六十一畝三分一釐二毫五絲屯糧一萬六千三百七十七石六斗七升八合七勺五抄七撮地畝銀二百四十八兩五分鳯翔府官軍户八百二十六口二千一百二十屯地一千九十三頃五十一畝六分七釐屯糧八千五百九石六升五合屯草一萬三千五百一束地畝銀一百四十六兩五錢漢中府軍衛户九百二十六口三千六十七屯地一千七十五頃一十三畝三分五釐八毫屯糧六千四百五十石八斗一合四勺五抄屯草七千三百八十二束地畝銀九十六兩寧羌州軍衛户一千八百五十三口一萬二千五百一十三屯地二千三百七十一頃七十一畝一分屯糧一萬四千二百三十石二斗六升七合屯草二萬一千三百四十五束地畝銀二百三十七兩一錢七分沔縣軍衛户一百五十九口三百五十八屯地二百六十二頃五十五畝八分六釐屯糧一千五百七十五石三斗五升二合屯草二千三百六十三束地畝銀二十三兩一錢二分延安府軍衛户二千七百八十一口四千三百四十屯地三千五十三頃八十三畆屯糧一萬四千三百三十石屯草二萬一千二百八十三束地畝銀五百九十八兩八錢七分綏徳州軍衛户一萬七千五百口二萬六千五百五十屯地六千六百九十八頃四十畝屯糧一萬七千八百一十四石屯草二萬七百八十二束地畝銀二百九十六兩九錢一分榆林衛户屯丁五千五口百七十三屯地二萬七千九百六十五頃屯糧三萬三千五百六十八石屯草五千束地畝銀五百五十九兩三錢馬志十三年題准陜西地方如有屯田為軍職人等買種代種者悉照紅牌事例問罪續文獻通考穆宗隆慶元年陜西都御史楊巍奏屯田給種徵税别無差役不得比民田詔蠲之例宜行各邊如舊輸納詔可續文獻通考神宗萬厯十一年議准陜西延鎮丈出荒田但不在屯田舊額之内者俱聽軍民隨便領種永不起科各邉但有屯餘荒地堪墾者俱照例行世法録萬厯末榆林衛屯田除荒地一千八百四十二頃零實存地三萬六千一百一十七頃二十九畝零増糧六千八百六十一石五斗零其實徵糧四萬一千四百二十石四斗三升零増均徭銀一千八百五十二兩四錢零増九釐銀一百四十兩五錢延綏鎮志興安州屯田二百五十一頃七十七畝屯糧二千四百三十三石九斗屯草三千六十六束賈志熹宗天啓初新定雜項陜西衛所屯田等銀共九萬七千八百二十五兩四錢二分二釐五毫一絲八忽四㣲世法録漕運倉庾附夏雍州浮于積石至于龍門西河㑹于渭汭夏書禹貢正義曰地理志云積石山在金城河關縣西南羌中龍門山在馮翊夏陽縣北胡渭曰按漢河關縣在今陜西西寧衛西南塞外夏陽今西安府韓城縣也雍之西北境逺近不同各從其便以至龍門不盡由積石其曰浮於積石者舉逺以該近耳㑹於渭汭者言出渭之舟逆流而上與浮河之舟相㑹於渭水之北今韓城縣北龍門山南是其地也渭汭在河之西岸華隂朝邑韓城之地皆是也東與蒲州榮河分水此言雍之貢道故特以西岸言之韓汝節云今蒲州舜所都也渭水之北今朝邑縣南境渭水至此東入河折而北三十里即蒲州故舟皆㑹於渭北今按北船出龍門至榮河縣北汾水入河處便當東轉泝汾無縁更順流而下至朝邑與南船㑹也且禹告成當堯時帝都平陽距蒲阪三百餘里韓城北連龍門東對汾口南北貢船相㑹當在其間曷為引蒲州以證乎禹貢錐指公劉乃積乃倉乃裹餱糧于橐于囊詩經大雅公劉為夏人迫逐之故不忍鬬其民乃裹糧食於囊橐之中棄其餘而去箋漢高祖初酈生説齊王曰蜀漢之粟方船而下史記酈食其傳索隠曰方船謂並舟也本傳注劉敬説帝都關中張良曰關中阻三面而守獨以一面東制諸侯諸侯安定河渭漕輓天下西給京師諸侯有變順流而下足以委輸敬説是也留侯世家二年蕭何守關中計户口轉漕給軍漢與楚相守滎陽數年軍無見糧蕭何轉運關中給食不乏蕭相國世家七年二月蕭何治未央宫立太倉漢書高祖本紀高帝時漕轉山東粟以給中都官歲不過數十萬石史記平凖書索隠曰説文云漕水轉穀也一云車運曰轉水運曰漕中都猶都内也皆天子之倉府以給中都官者即今太倉以積官儲者也平凖書注長安西渭北石徼西有細栁倉東有嘉倉三輔黄圖如淳曰長安圖細栁倉在渭北近石徼漢書文帝紀注武帝建元中漢興七十餘年太倉之粟陳陳相因充溢露積於外居官者以為姓號漢書食貨志貨殖傳倉氏庾氏是也志注元光中大司農鄭當時言異時關東漕粟從渭中上度六月而罷而漕水道九百餘里時有難處引渭穿渠起長安旁南山下至河三百餘里徑易漕度可令三月罷而渠下民田萬餘頃又可得以溉此損漕省卒而益肥關中之地得穀天子以為然令齊人水工徐伯表悉發卒數萬人穿漕渠三歲而通通以漕大便利史記河渠書天子既益置左右輔諸官益新置多徙奴婢衆下河漕度四百萬石索隠曰度猶運也及官自糴乃足平凖書人有上書欲通褒斜道正義日括地志云褒谷在褒城縣北五十里斜水源出褒城縣西北九十八里衙嶺山漢書溝洫云褒水通沔斜水通渭皆以行船及漕事下御史大夫張湯湯阿其事因言抵蜀從故道正義曰括地志云鳯州兩當縣本漢故道縣也在州西五十里故道多阪回逺今穿褒斜道少阪近四百里而褒水通沔斜水通渭皆可以行船漕漕從南陽上沔入褒褒之絶水至斜間百餘里以車轉從斜下下渭如此漢中之穀可致山東從沔無限正義曰無限言多也山束謂河南山南江南淮南等便於砥柱之漕天子以為然拜湯子卬為漢中守發數萬人作褒斜道五百餘里道果便近而水多湍石不可漕河渠書元封元年置平凖於京師都受天下委輸索隠曰大司農屬官有平準令丞者以均天下郡國輸斂貴則糶之賤則買之平賦以相凖輸歸於京都故命曰平準桑𢎞羊請令吏得入粟補官及罪人贖罪令民能入粟甘泉各有差以復終身不告緡他郡國各輸急處而諸農各致粟山東漕益歲六百萬石一歲之中太倉甘泉倉滿邊餘穀民不益賦而天下用饒於是𢎞羊賜爵左庶長黄金百斤平凖書宣帝本始四年正月詔丞相以下至都官令丞入穀輸長安倉助貸貧民漢書宣帝本紀五鳯中歲數豐穰穀至石五錢農人少利大司農中丞耿壽昌善為算能商功利得幸於上奏言故事歳漕關東榖四百萬斛以給京師用卒六萬人宜糴三輔𢎞農河東上黨太原郡穀足供京師可以省關東漕卒過半天子從其計漕事果便夀昌白令邊郡皆築倉以穀賤時増其價而糴以利農穀貴時減價而糶以贍貧民名曰常平倉民便之上乃下詔賜夀昌爵關内侯食貨志安帝元初二年虞詡為武都太守先是運道艱險舟車不通驢馬負載僦五致一廣雅曰僦賃也言用五石賃而致一石也詡乃自將吏士按行川谷由沮至下辨數十里皆燒石剪木開漕船道以人僦直雇借傭者於是水運通利歲省四千餘萬後漢書虞詡傳後主建興九年諸葛亮復出祁山始以木牛運十年休士勸農於黄沙作流馬木牛十一年冬使諸軍運米集於斜谷口治斜谷邸閣邸閣倉廩之名十二年春二月悉大衆由斜谷出始以流馬運蜀志北魏明帝正光末三門都將薛欽上言計京西水次汾華二州並各郡年常綿絹及貲麻皆折公物雇車牛送京道險人敝費公損私畧計華州一差官酬絹八疋三丈九尺别有私民雇價布六十匹餘州郡逺近應不減今求車取雇絹三匹匹市材造船計船一艘舉十三車車取三匹合有三十九匹雇作手并匠及船上雜具食直足以成船計一船剰絹七十八匹布七百八十疋又租車一乘官格四十斛成載私民雇價逺者五斗布一疋近者一石布一疋凖其私費一車布逺者八十匹近者四十匹造船一艘計舉七百石凖其雇價應有一千四百匹今取布三百匹造船一艘並船上覆治雜事計一船有剰布一千一百匹華州去河不滿六十里令計程依舊酬價車送船所船運公私兩便詔從之魏書食貨志隋文帝開皇三年以京師倉廩虚議備水旱詔於蒲陜等水次十三州募運米丁衞州置黎陽倉洛州置河隂倉陜州置常平倉華州置廣通倉轉相灌注漕關東及汾晉之粟以給京師又於河西勒百姓立堡營田積穀京師置常平監隋書食貨志四年詔曰京邑所居五方輻輳重關四塞水陸艱難大河之流波瀾東注百川海濱萬里交通雖三門之下或有危慮但發自小平陸運至陜還從河水入渭川上流控引汾晉舟車来去為益殊廣而渭川大小水力無常流淺沙深即成阻閡計其途逺數百而已動移氣序不能徃復泛舟之役人亦告勞朕君臨區宇興利除害公私之弊情所愍之故東發潼關西引渭水因藉人力開通漕渠量事計功易可成就巳令工匠巡歴渠道觀地理之宜審終乆之義一得開鑿萬代無毁可使官及私家方舟巨舫晨昏運漕沿泝不停旬日之功堪有億萬誠知時當炎暑動致疲勞然不有暫勞安能永逸宣告人民知朕意焉初帝每憂轉運不給柱國于仲文請決渭水開渠漕帝然之使仲文總其事又命郭衍為開渠漕大監宇文愷部率水工鑿渠引渭水經大興城北即今長安城也東至於潼關漕運三百餘里名曰廣通渠轉運通利關内賴之册府元龜五年命司農丞王亶發廣通之粟三百餘萬石以拯關中十六年正月詔丹延綏銀等州社倉並於當縣安置時百姓承平日久雖數遭水旱而户口歲増諸州調物每歳河南自潼關河北自蒲阪達於京師相屬於路晝夜不絶者數月隋書食貨志煬帝大業十三年義師入長安發永豐倉賑饑百姓方蘇息隋書食貨志永豐倉在華隂縣東三十五里渭河口義寧元年因倉置監元和志唐都長安而關中號稱沃野然其土地狹所出不足以給京師故常轉漕東南之粟高祖太宗之時用物有節而易贍水陸漕運歲不過二十萬故漕事簡自高宗以後歲益増多而功利繁興民罹其弊唐書食貨志高祖武徳八年水部郎中姜行本請於隴州開五節堰引水以通運漕詔許之册府元龜太宗貞觀二十二年七月開斜谷道水路運米以至京師册府元龜高宗永徽六年京東西二市置常平倉咸亨三年關中饑監察御史王師順運晉絳之粟於河渭之間增置渭橋倉會要咸亨三年於岐州陳倉縣東南開渠引渭水入昇原渠通船栰於京故城冊府元龜中宗時崔湜建言山南可引丹水通漕至商州自商鑱山出石門抵北藍田可通輓道中宗以湜充使唐書崔湜傳𤣥宗開元二年華州華隂置永豐倉臨渭倉唐書地理志潼關渭南亦皆有倉六典楊慎矜主長安倉唐書楊慎矜傳五年刺史樊忱鑿敷水使通渭漕地理志七年勅關内道置常平倉文獻通考十二年八月同州旱出永豐倉米十五萬石減價糶通鑑姜師度為陜州刺史以永豐倉米運將别徵三錢計以為費一夕忽云得計立注樓從倉建槽直至於河長數千丈而令放米其不快處具大把推之米皆損耗多為粉末兼風激揚凡一函失米百石而動即千萬數遣典庾者償之家産皆竭復遣輸户自量至有償數十斛者甚害人方停之朝野僉載十八年裴耀卿條上漕事便宜有云河隂栢崖太原永豐渭南諸倉節級轉運水通則舟行水淺則寓於倉以待舟無停留而物不耗失此甚利也𤣥宗初不省二十一年耀卿為京兆尹京師雨水穀踊貴𤣥宗將幸東都復問耀卿漕事耀卿請罷陜陸運而置倉河口使江南漕舟至河口者輸粟於倉而去縣官雇舟分入河洛置倉三門東西漕舟輸其東倉而陸運以輸西倉復以舟漕避三門之險𤣥宗以為然乃於河隂置河隂倉河西置栢崖倉三門東置集津倉西置鹽倉鑿山十八里以陸運自江淮漕者皆輸河隂倉自河隂西至太原倉謂之北運自太原倉浮渭以實關中𤣥宗大悦拜耀卿為黄門侍郎同中書門下平章事兼江淮都轉運使以鄭州刺史崔希逸河南少尹蕭炅為副使益漕晉絳魏濮邢貝濟博之租輸諸倉轉而入渭凡三嵗漕七百萬石省陸運傭錢三十萬緡唐書食貨志十九年以監察御史莅太倉其後以殿中侍御史上一人為監太倉使百官志二十四年於京城内大置常平倉六典注二十五年牛仙客為相有彭果者獻䇿廣關輔之糴京師糧廩益羨食貨志唐都關中轉漕東南東南之粟必先至東都然後浮河渭以入關中是以其至也甚難故開元以前歲若不登天子嘗移蹕就食於東都自牛仙客獻䇿和糴然後始免此行文獻通考天寳元年長安令韋堅為陜郡太守兼水陸轉運使治漢隋運渠起關門抵長安通山東租賦乃絶灞滻並渭而東至永豐倉與渭合又於長樂陂瀕苑牆鑿潭於望春樓下以聚漕舟堅因使諸州各掲其郡名陳其土地所産寳貨諸竒物於栿上先時民間唱俚歌曰得體紇那邪其後得寳符於桃林於是陜縣尉崔成甫更得體歌為得寳𢎞農野堅命舟人為吴楚服大笠廣袖芒屩以歌之成甫又廣之為歌辭十闋自衣闕後緑衣錦半臂紅抹額立第一船為號頭以唱集兩縣婦女百餘人鮮服靚粧鳴鼓吹笛以和之衆艘以次輳樓下天子望見大悦賜其潭名曰廣運潭是歲漕山東粟四百萬石唐書食貨志八年和糴米數關内道五十萬九千三百四十七石諸色倉糧太倉七萬一千二百七十石永豐倉八萬三千七百二十石正倉糧關内道一百八十二萬一千五百一十六石義倉糧關内道五百九十四萬六千二百一十二石常平倉糧關内道三十七萬三千五百七石文獻通考歲以錢六十萬緡賦諸道和糴斗増三錢每歲短遞輸京倉者百餘萬斛米賤則少府加估而糴貴則賤價而糶唐書食貨志天寳中每歳運米二百五十萬石入關大歴後水陸運米四十萬石入關元和志肅宗至徳初軍於彭原第五琦請以江淮租傭市輕貨泝江漢而上至洋川令漢中王瑀陸運至扶風以助軍上從之通鑑綱目肅宗末年河南尹劉晏為户部侍郎兼勾當度支轉運鹽鐵鑄錢使江淮粟帛由襄漢越商於以輸京師及代宗出陜州關中空窘於是盛轉輸以給用唐書食貨志代宗廣徳二年凡漕事皆決於劉晏晏即鹽利顧傭分吏督之隨江汴河渭所宜未十年人人習河險江船不入汴汴船不入河河船不入渭江南之運積揚州汴河之運積河隂河船之運積渭口渭船之運入太倉歲轉粟百一十萬石無升斗溺者唐書食貨志晏歲輸始至天子大悦遣衞士以鼓吹迓東渭橋馳使勞曰卿朕鄼侯也凡歳致粟四十萬斛自是關中雖水旱物不翔貴矣劉晏傳大歴元年九月帝御安福門樓觀新漕渠初京兆尹黎榦以京城木炭價重具以利便陳於帝前請自南山谷口鑿渠通於城内至薦福寺東街北抵景鳯延喜門入於苑濶八尺深一丈以運木炭至是榦潛貯􅔓船楫師以為水戲冀悦於帝久之竟無成功册府元龜八年以關内豐穰減漕十萬石度支和糴以優農唐書食貨志十一月庚子詔京官職田一切官為收糴令度支估以聞度支奏估直五萬貫詔加至八萬貫以寵百官册府元龜徳宗建中四年朱泚圍奉天經月城中資糧俱竭侍御史万俟著開金商運路轉江淮財賦以至奉天諸道貢賦繼至用度始振通鑑王紹為常州從事包佶領租庸鹽鐵亦以紹為判官時李希烈阻兵江淮租輸所在艱阻將移運路自潁入汴紹奉佶表詣闕屬徳宗西幸紹乃督縁路輕貨趣金商路倍程出洋州以赴行在徳宗親勞苦之謂紹曰六軍未有春服我猶衣裘紹俯伏流涕奏曰包佶令臣間道進奉數約五十萬帝曰道路回逺經費懸急卿之所奏豈可望耶後五日而所督繼至帝深賴焉册府元龜陸贄論度支令京兆府折税市草束狀畧曰謹檢京兆府應徵地税草數每年不過三百萬束其中除留供諸縣館驛及鎮軍之外應合入城輸納惟二百三十萬而已百姓搬運已甚艱辛嘗逼春農僅能得畢今若更徵一千萬束仍令並送入城即是一年之間併徵三年税草計其所加車脚則又四倍常時物力有窮求取無藝其為騷怨理在不疑甸服且然四方安仰臣等又勘度支京兆比来雇車估價及所裁多少大率每一車載一百二束每一里給傭錢三十五文百束應輸二束充耗今京畿諸縣去城近者七八十里逺者向二百里設今逺近相補通以五里為程則雇車載草百束悉依官司常估猶存錢三千五百文即是一束之草惟計搬運已當三十有五文買草本價又更半之而度支曽不計量自我作估徑以胸臆斟酌限為二十五文謂之加徵則法度廢隳謂之和市則名實乖反儻可其奏人何以觀豈知官自置場要便收市欲少市則平其估以節費欲多市則優其價以招人買賣既和貧富俱便有餘者趨加饒易售之利不足者免轉求貴賃之資比之抑徵故不同等幸有舊制足可遵行何必舍易而即難棄利而從害陛下若以軍廏之中馬畜漸衆度支所營藁蒭漸可供給當年或慮水旱不虞别須蓄積為備今屬嵗稔亦是其時但要收斂有方不宜科配致擾若度置併市延齡必復辭難須有區分使之均濟望委京兆億勾當别和市草五百萬束以充貯備名臣奏議貞元初關輔宿兵米斗千錢太倉供天子六宫之膳不及十日禁中不能釀酒以飛龍駝負永豐倉米給禁軍陸運牛死殆盡徳宗以給事中崔造敢言為能立事用為相造乃奏諸道觀察使刺史選官部送兩税至京師増江淮之運浙江東西歲運米七十五萬石復以兩税易米百萬石江西湖南鄂岳福建嶺南米亦百二十萬石詔浙江東西節度使韓滉淮南節度使杜亞運至東西渭橋倉陜虢觀察使李泌為入渭船方五板輸東渭橋太倉米至凡百三十萬石遂罷南路陸運唐書食貨志二年十月度支奏京兆同華鄜坊丹延等州府秋夏兩税青苗等物悉折糴粟麥所在儲積以備軍食京兆兼給錢收糴每斗於時估外更加十錢納於太倉詔可其奏自是每歳行之贍軍十一月度支奏請於京兆府折明年夏秋税錢二十二萬四千貫文又請度支給錢添成四十萬貫令京兆府今年内收糴粟麥五十萬石以備軍食詔從之册府元龜四年九月詔京兆府於時價外加估和糴差清強官先給價直然後貯納續令所司自搬運載至太倉並差御史訪察有違勅文當重科貶先是京畿和糴多被抑配或物估踰於時價或先斂而後給直追集停擁百姓苦之及聞是詔皆忻便樂輸文獻通考貞元初吐蕃刼盟諸道兵十七萬戍邊月給粟十七萬斛皆糴於關中八年宰相陸贄以關中穀賤請和糴可至百餘萬斛計諸縣船車至太倉穀價四十有餘米價七十則一年和糴之數當轉運之二年一斗轉運之資當和糴之五斗減轉運以實邊儲存轉運以備時要江淮米至河隂者罷八十萬斛河隂米至太原倉者罷五十萬太原米至東渭橋者罷二十萬以所減米糶江淮水灾州縣斗減時五十以救之京城東渭橋之糴斗増時三十以利農以江淮糶米及減運直市絹帛送上都帝乃命度支増估糴粟三十三萬斛然不能盡用贄議唐書食貨志十六年十月勅京兆府今年和糴粟一百萬數内宜減三十萬册府元龜順宗永貞元年李㢲為諸道轉運鹽鐵使自劉晏後江淮米至渭橋寖減矣至㢲乃復如晏之多唐書食貨志㢲莅職一年較所入如晏最多之年明年過之又明年増百八十萬緡李㢲傳憲宗即位之初有司以嵗豐熟請畿内和糴當時府縣配户督限有稽違則迫蹙鞭撻甚於税賦號為和糴其實害民唐書食貨志元和中翰林學士白居易論和糴狀曰以臣所觀若有司出錢開場自糴比於時價稍有優饒利之誘人人必情願且本請和糴只圖利人人若有利自然願来利害之間可以此辨必不得已則不如折糴折糴者折青苗税錢使納斛斗免令賤糶别納現錢在於農人亦甚為利况度支比来所支和糴價錢多是雜色匹段百姓又須轉賣然後將納税錢至於給付不免侵偷貨易不免折損所失過本其弊可知今若量折税錢使納斛斗既無賤糶麥粟之費又無轉賣匹段之勞利歸於人美歸於上由是而論則配户不如開場和糴不如折糴亦甚明矣名臣奏議元和五年尚書嚴礪以興州自長舉北至於青泥山又西抵成州過栗亭州踰寳井堡崖谷峻阻十里百折深泥積水相輔為害若是者綿三百里而餘自長舉而西可以導江而下二百里而至乃即山僦工轉巨石撲大木焚以炎火沃以食醯畚鍤之下易甚朽壤厥功既成咸如其素栁宗元興州江運記節度使李吉甫築平津堰以洩有餘防不足漕流遂通然漕益少江淮米至渭橋者纔二十萬斛諸道鹽鐵轉運使盧坦糴以備一歲之費省冗職八十員自江以南補署皆剸屬院監而漕米亡耗於路頗多刑部侍郎王播代坦建議米至渭橋五百石亡五十石者死唐書食貨志九年四月詔出太倉粟九十萬石開六場糶之會要穆宗長慶元年三月勅春農方興種植是切其京西京北和糴使宜勒停先是度支以邊儲無備請置和糴使經年無序徒擾邊人故罷之册府元龜四年詔於關内關外折糴和糴一百五十萬石用備饑歉文獻通考文宗太和初歲旱河涸掊沙而進米多耗抵死甚衆秦漢時故漕興城堰東達永豐倉咸陽縣令韓遼請疏之自咸陽抵潼關三百里可以罷車輓之勞宰相李固言以為非時文宗曰茍利於人隂陽拘忌非朕所顧也議遂決堰成罷輓車之牛以供農耕關中賴其利唐書食貨志開成初歲漕江淮米四十萬斛至渭橋倉者纔十三舟檝僨敗吏乘為姦冒没百端劉晏之法盡廢户部侍郎裴休為使分遣官詢按其弊乃命在所令長兼董漕褒能者謫怠者由江抵渭舊歳率雇緡二十八萬休息歸諸吏勅巡院不得輒侵牟著新法十條人以為便居三年粟至渭橋倉百二十萬斛無留壅裴休傳元年閏五月己卯帝御紫宸殿謂宰相曰京兆府請開場收麥何如李固言曰但優饒百姓則易糴今年百姓雖放兩税亦須聽其收貯自為嵗計但情願出糶即加於時價收之鄭覃曰不强其所不欲加價收糴人自樂輸册府元龜宣宗大中六年五月勅自收關隴便討党項邊境生人皆失活業連屬艱食遂不寧居兼軍儲未得殷豐所在多贍助今年京畿及西北邊稍似時熟即京畿人家競搬運斛斗入城收為蓄積致使邊塞粟麥依前踴貴兼省司和糴亦頗艱難其弊至深須有釐革其京西北今年夏秋斛斗一切禁㫁不得令入京畿兩界六月勅禁㫁京兆北斛斗入京如聞百姓多端以麫造麯入城貿易所費亦多切宜所在嚴加覺察不得容許册府元龜懿宗咸通中宰相晉國公王鐸為丞郎時李駢判度支每年江淮運米至京水陸脚錢斗計七百京國米價每斗四十議欲令江淮不運米但每斗納錢七百鐸曰非計也若於京國糴米必耗京國之食若運米關中自江淮至京兼濟無限貧民也時糴米之制業已行竟無敢沮其議者都下官糴米果大貴未經旬而度支請罷以民無至者故也於是識者乃服鐸之察事矣鐸卒以此大用聞竒録後唐明宗天成元年四月制曰先縁漕運京師租庸司每借私船今既分兵就食停淤漕運其諸河渡私船並仰却付本主如有滯留許本主論告二年九月洋州脩魏門倉一百間充貯轉運下峽斛㪷長興元年十月鳯州奏開脩唐倉湖田路通鳯翔饋運册府元龜宋真宗咸平中鄭文寳徙河東轉運使先是麟府屯重兵皆河東輸餽雖地里甚邇而限河津之阻上嘗訪使邊者言河裁濶數十步乃詔文寳於府州定羌軍經度置浮橋人以為便宋史鄭文寳傳景徳三年於陜西立常平倉食貨志正月戚綸上封事請於陜西等置常平以逐州户口多少量留上供錢一二萬貫小州或一二千貫付司農寺係帳委輸運司並本州選募職州縣官清幹者一員専掌其事每年秋夏加錢收糴遇貴減價出糶以三年為界所有錢穀羨利止委本寺與掌會要大中祥符初陜西諸州菽粟自黄河三門沿流入沛以達京師置發運司領之宋史食貨志時連歲登稔乃令陜西等處增糴靡限常數文獻通考陜西等闕兵食州縣括民家所積糧市之謂之推置取上户版籍酌所輸租而均糴之謂之對糴皆非常制麟府州以轉餉道逺遣常參官就置場和糴宋史食貨志仁宗天聖初河中府同華州請免支移帝以問輔臣曰西鄙宿兵非移用民賦則軍食不足特詔量減支移宋史食貨志天聖中李若谷知延州官倉依山而貯穀少若谷使作露囤囤可貯二萬斛他郡多取法焉李若谷傳舊制陜西糴穀歳預給青苗錢至天聖中罷不復給食貨志康定元年范仲淹兼知延州以民逺輸勞苦請建鄜城為軍以同華州中下户租税就輸之春夏徙兵就食可省糴十之三通鑑綱目注嘉祐間陳希亮知鳯翔倉粟支餘十年主者以腐敗為憂歲饑希亮發十二萬石貸民有司懼為擅發希亮身任之是秋大熟以新易舊官民皆便宋史陳希亮傳歐陽修漕河議畧曰臣嘗至南陽問其遺老云自鄧西北至永興六七百里今小商賈徃徃行之初漢高入武關其兵十萬夫能容十萬兵之路宜不甚狹而險也但自洛陽為都行者皆趨東闗其路久而遂廢今能按舊而通之則武昌漢陽郢復襄陽梁洋金商均房光化沿漢之地十一二州之物皆可漕而頓之南陽自南陽為輕車人輦而遞之募置遞兵為十五六舖則十餘州之物日日入關而不絶沿漢之地上多美木近漢之民仰足而有餘以造舟車甚不難也前日陛下深恤有司之勤内賜金錢數十萬以供西用而道路艱逺輦運踰年不能畢至至於軍裝輸送多苦秋霖邊州已寒冬服尚滯於路其艱如此豈若較南陽之旁郡度其道里入於武關與至京師逺近等者與其尤近者皆使直輸於關西其迂曲簡直利害較然此陸運之利也歐陽文忠集英宗治平二年由京西陜西河東運薪炭至京師薪以斤計一千七百一十三萬炭以秤計一百萬宋史食貨志神宗熙寧二年王安石謂當令發運司度米貴州郡折錢變為輕貨儲之陜西要便州軍用常平法糶糴為便詔如安石議宋史食貨志詔出内藏庫百萬緡分賜河北諸州増糴常平倉及陜西路遣官提舉四年十月十六日以帛七十萬匹為陜西常平糴本五年四月詔以麟府豐三州尤為貧乏宜如蔡天申所請置常平倉會要六年詔鄜延路經畧司支封樁錢於河東買橐駝三百運沿邊糧草七年命輔臣議更與陜西並塞芻糧之法令轉運司増舊糴三分以所糴虧羨為賞罰仍遣吏按視而陜西和糴或以錢茶銀綢絹糴於弓箭手元豐四年遣李元輔變運川陜四路司農物帛中書言物帛至陜西擇省様不合者貿易糴糧儲於邊期以一年畢京西轉運司均調鄧州夫三萬每五百人差一官部押赴鄜延饋運計自入陜西界至延州程數日支米錢三十柴菜錢十文陜西都轉運司於諸州差雇車乘人夫所過州交替人日支米二升錢五十至沿邊止運糧出界止差廂軍李稷為鄜延漕臣督運詔許斬知州以下乏軍興者民苦搬運多散走所殺至數千人道斃者不在焉於是文彦博奏言關陜人户昨經調發不遺餘力死亡之餘疲瘵已甚為今之計正當勞来將士安撫百姓全其瘡痍使得蘇息明年優詔嘉答初西帥無功議者慮朝廷再舉自是帝大感悟申飭邊臣固境息兵關中以蘇六年發義勇保甲給陜西邊用非機速者並作小綱數排日遞送陜西路義倉以今年秋料為始民輸税不及斗免輸宋史食貨志哲宗即位詔陜西麟府州計五嵗之糧宋史食貨志元祐中杜紘為大理卿因言陜西常窘兵食若養兵唐鄧間以備西戍徑商於距邊畧與陜西内州軍道里等平土易運用以飛輓利甚博事下本道議者不逹遂寢雞肋集徽宗初邢恕奏乞下熙河路打造船五百隻於黄河順流放下至㑹州西小河内藏住熙河路漕使李復奏竊知邢恕欲用此船載兵順流而下取興州契勘㑹州之西小河鹹水其濶不及一丈深止於一二尺豈能藏船黄河過㑹州入韋精山石峽險窄自上乘流直下高數十尺船豈可過至西安州之東大河分為六七道散流謂之南山逆流數十里方再合逆溜水淺灘不勝舟載此聲若出必為夏國侮笑事遂寢潏水集朱子曰邢恕之䇿果如李復之言可謂妄矣然禹貢所言雍州貢賦之路亦曰浮於積石至於龍門西河會於渭汭則古来此處河道固通舟楫如恕䇿矣復之言乃如此何也復集中記事甚多此條與禹貢相關故録之以備㕘考云朱子全集崇寧五年詔陜西錢重物輕委轉運司措置以銀絹絲綢之類博糴斛斗以平物價結糴崇寧初蔡京行於陜西盡括民財以充數五年以星變講修闕政罷陜西結糴對糴政和元年勸糴均糴童貫宣撫陜西議行之以人户家業田土頃畝均敷上等則所均斗斛數多下等數少鄜延經畧使錢即言勸糴非可以久行均糴先入其斛斗乃給其直於有斛斗之家未有害也坊郭之人素無斛斗必須外糴轉有煩費疏奏坐貶又於陜西建四都倉西安州曰裕邊自夏人叛命諸路皆謀進築陜以西保甲皆運糧宣和七年河北河東陜西三路租税薄不足以供兵費屯田營田歳入無幾糴買入中之外歲出内藏庫金帛及上京𣙜貨務緡錢皆不啻數百萬選使臣軍大將河北船運至乾寧軍河東陜西船運至河陽措置陸運或用鋪兵廂軍或發義勇保甲或差雇夫力車載駝行隨道路所宜河北地里差近西路回逺又涉磧險運致甚艱宋史食貨志欽宗靖康元年十月詔曰一方用師數路調發軍功未成民力先困京西運糧每石六斗用錢四十貫陜西運糧民間倍費百餘萬緡聞之駭異今歲四方豐稔粒米狼戾但可逐嵗増價收糴不得輕搬運以稱恤民之意宋史食貨志高宗建炎二年詔陜西等及三綱輸送行在宋史食貨志紹興初吴玠以秦鳯經畧使戍河池王彦以金均房鎮撫使戍金州二鎮皆饑興元帥臣閉糴二鎮病之玠彦皆願得劉子羽守漢中張浚乃承制拜子羽利州路經畧使兼知興元府子羽至漢中通商輸粟二鎮遂安劉子羽傳四年川陜宣撫吴玠運米一十五萬斛至利州率四十餘千致一斛飢病相乗道死者衆食貨志胡世將以樞密直學士出為四川安撫制置使宣撫吴玠以軍無糧奏請踵至世將既被命入境約玠㑹議蜀之饟運溯嘉陵江千餘里半年始達於是奏用轉搬摺運之法軍儲稍充公私便之胡世將傳陕按宋南渡後餉大約皆取給於川中孝宗時員興宗上奏畧曰臣竊見陜西運茶之制一十里為鋪鋪有兵兵日有程月有給茍不如式則罪罰隨之國家逐年收西馬之利皆鋪兵之力也誠能倣運茶之法以運軍糧自興利至魚關水路自便無可議者若陸輦自河池至成岷過長道遂至大水此一路也自兩當至鳯翔過黄牛遂至大散此又一路也登涉山險運糧之夫常困死於是茍能措置當以十五里為鋪鋪置五十兵一路置鋪不過六十矣鋪兵日再徃来一運七斗再運為一碩有四矣六十鋪之兵月運二千一百碩鋪計兵月給之費兼取之民人計二碩而碩計五千不過三萬緡以民間雇夫之費凡六十有三萬緡鋪兵比之月減六十萬緡矣蓋鋪兵以三鍾而致一鍾民間以六十鍾而致一鍾利害豈不相逺乎名臣奏議金章宗明昌三年八月勅陜西屯軍儲糧之縣倉糧不拘成數續文獻通考十二月勅華州下邽縣置武定殖倉京兆櫟陽縣置粟邑鎮倉各設倉草都監一人兼領之金史章宗本紀宣宗興定元年八月以户部郎中楊貞權陜西行六部尚書收給潼陜軍馬之用奏糴販糧濟河者之半以寛民從之金史食貨志四年博和哩行尚書省元帥府於京兆時陜西嵗運糧以助關東民力寖困和哩上言若以舟楫自渭入河順流而下庶可稍紓民力從之時以為便博和哩傳元光元年六月造舟運陜西糧由大慶關渡以抵湖城宣宗本紀元世祖至元四年命沔州等處中納官糧續還其直續文獻通考文宗天厯二年奉元路命所在官設置常平倉元史文宗本紀明太祖洪武六年冬十二月浚開封漕河明年春轉漕粟於陜西續文獻通考十七年六月户部言潼關衞見儲軍餉可給三年其餘米五十二萬四千二百七十二石宜運貯西安府倉鳯翔衛見儲軍餉可給三年其餘米十四萬六千零四石宜運貯鞏昌府倉從之世法録二十九年以陜西各府州縣民轉運邊餉道逺於驛道有軍民處置倉各就近地計程接遞明㑹典英宗正統五年三月鎮守陜西都督同知鄭銘奏西安府倉貯糧二十二萬四千九百六十石有竒河南等府又輸棉布二十五萬而倉庾不足露積於外臣恐其久而浥瀾且難於防守請令所司増置倉房從之世法録天順中延綏用兵日久户部尚書楊鼎上疏曰阿勒楚爾住牧河套日入寇掠殆今三年請師古人自黄河轉運為便倉法且言三門之上有小河可通延綏如以所運糧草各貯水次泝流儧運庶幾不乏且可順帶解鹽數十萬以充淮課則國利大有増益詔悉從之然以衆議竟沮不行三才圖㑹憲宗成化七年十二月余子俊奏請勅户部以銀十萬兩運五萬於陜西變易五萬於榆林准折仍行山西河南附近州縣或借撥或儧運或置辦料豆各萬石穀草各一百五十萬束俱納榆林一帶倉場庶不臨期失措户部議遣官分運十六萬兩仍行山西布政司以明年分該運大同等邊夏税内預撥五萬石抵斗納糧馬草五十萬束河南倣此草加十萬運赴延綏俱准該年之數從之十年巡撫陜西都御史馬文升奏上足食養民事宜陜西數嵗荒歉倉廩空虛所有納粟之例頗為便宜蓋納粟冠帶不食俸治事而有司得粟賑民乞仍行之以紓目前之急詔從之十三年五月户部尚書楊鼎等㑹議張鵬丁川所言邊方事宜一延安邊糧坐派陜西山西河南嵗委老人大户運納徃徃乘機作弊次年方到宜嵗委陜西布按二司堂上官一員督運限年終完報過期住俸一延安府廣有倉收見糧料四十餘萬草束三百餘萬止大使副使各一員官少事繁宜増設廣儲一倉銓選大使副使各一員分管收支議上俱從之世法録孝宗𢎞治中吏部尚書倪岳論邊漕畧曰今關陜所需皆山西河南所給而三方之地俱近黄河其間雖有三門析津龍門之險然昔漢唐糧餉由此而通即今鹽船木筏徃来無滯且以今户部所計山西米豆必令運貯榆林及保徳州縣諸倉河南米豆必令運貯潼關衞及陜州諸倉其諸州衛地皆瀕河可通舟楫踵徃古故跡而行免當今陸運之害公私之利奚啻萬萬也况今河道當潼關之北數十里接連渭河可通陜西及鳯翔鞏昌渭河西流數十里接連洛河可通延安及北上源可通邊堡渭河西流三百餘里接連涇河可通慶陽又龍門之上舊有小河徑通延綏倘加修濬必可行舟此宜簡命水部之臣示以必行之意相度地形按求古跡某處避險可以陸運某處可立倉以備倒運某處可造船以備裝運淤塞悉加導滌漕河務在疏通毋憚一時之勞而失永久之利如是則不但三方之困可紓雖四方之物亦無不可致矣世法録倪文毅公傳世宗嘉靖八年題准西安等府應解甘肅錢糧免其民運每糧一石徵脚價一錢連糧折銀布交收府庫候收銀至二萬兩布至二千疋分守道委官一員沿途遞運十一年題准陜西布政司如遇起運三邊錢糧照依舊例夏税每石徵銀九錢秋糧每石徵銀一兩依期起解明㑹典三十三年議准延綏所屬糧儲酌處本色收貯以備不虞將鳯翔府定擬本色二分折色八分西安府本色四分折色六分延安府折色七分本色三分漢中府照舊折色解赴綏徳州廣盈倉交收續文獻通考巡撫延綏都御史王遴經理黄河運道疏曰臣所撫屬如東路神木府谷及大柏油以至黄甫川諸堡皆道路阻絶人烟稀少商販不至而府谷一縣治之中逃亡殆盡存者僅三十餘家其他可知也即各軍領去官銀一時無從糴買當圖多方拯救似難循襲故常以臣之愚計之禦邊莫先於足兵募兵莫先於足食而足食之計惟有理河運廣為儲蓄而已若黄甫川清水營木瓜園孤山鎮羌永興六堡則皆近河者也臣舊為岢嵐副使時嘗一通河運以濟偏頭關支儲而晉之興臨保徳秦之葭州吴堡舟皆直達於邊近者止隔二三十里逺者不過五六十里如京運間支通倉事例也當時謂臣所舉出於尋常心思之外咸以為便臣愚謂今日足食以濟府谷一縣黄甫川六堡之急計莫有善於此者蓋府谷黄甫川等處地勢稍南尤便於偏頭關耳合無容臣量造運船二三十隻每隻約載五六十石一面動發官銀於山西興臨保徳各積粟地方易買仍行之彼處撫按衙門轉行府州縣官員當念恤鄰之義勿得遏糴自便一面聽臣行文陜西布政司將撫屬葭州吴堡縣應解本鎮錢糧改納本色俱聽臣運赴府谷縣量蓋倉厫收貯以濟一縣六堡之急蓋府谷為總㑹之處去河止隔一里無盤剥之費黄甫川清水營去河止二十五里因而穵運及之亦無冦鈔之擾惟孤山去府谷四十里鎮羌永興木𤓰園去府谷六十里雖跋涉稍逺若乘時放之及量為運送較之商販不至糴買不出者亦大有間也或者謂船多恐敵縁之而渡貽害河東然造船非自今日始也各處渡口官造渡船甚多民間亦有裝載柴米船隻節年未聞窺伺之者况臣前任岢嵐所造船隻因破此議止堪渡人不堪渡馬羣情始釋此見在尤可考者也延綏鎮志穆宗隆慶元年十月延綏撫臣王遴奏本鎮黄甫川運河已通漕粟見貯府谷縣倉乞頒降印記一顆責令本縣典史主之又運船水手臨河僱覔非經久之計請於葭州神木府谷吴堡米脂綏徳等州縣均徭内増編比常役少加優異以恤其勞報如議續文獻通考神宗萬厯中陜西歲荒司農欲移京粟萬石餘由漕運達河南更陸運以給之户部郎中邢孔陽上書司農曰移粟之役是以三千鍾而致一石有害於豫無濟於秦何若馳一吏糴粟關内京粟航至中州糶之以其鏹補關内借支之數是萬夫不勝者一吏代之足矣司農從其議畿輔志陜西通志巻三十八
