body:
  text: 陜西通志巻七十四經籍第一經類史類金馬白虎著述之府收拾秦灰諸儒心苦遷固史英鄭賈經腴掞藻摛華音釋訓詁照灼藜光析為四部二氏九流典冊圖譜緗帙牙籖彪炳今古毋曰西陲專尚雄武作經籍志第二十八經類經之𩔖凢十有一曰易類曰書類曰詩類曰禮類曰樂類曰春秋類曰孝經類曰論語類孟子附曰䜟緯類曰經解類曰小學類按各史藝文志皆以孟子入子類惟陳氏書錄及文獻通考始以論孟並入經類今從之周易二篇文王繫彖辭周公繫爻辭周文王作卦辭謂之周易周公又作爻辭隋書經籍志卦辭文王爻辭周公馬融陸績等並同此說周易䟽其卦本伏羲所畫其辭則文王周公所繫故繫之周以其簡袠重大故分為上下兩篇文王所繫以斷一卦之吉凶所謂彖辭也周公所繫之辭以斷一爻之吉凶所謂爻辭也朱子本義周書三十二篇周文王國號後武王因以為有天下之號書凢三十二篇書經註周書七十一篇漢書藝文志周史記師古曰周時誥誓號令也葢孔子所論百篇之餘也今之存者四十五篇矣藝文志注逸按此七十一篇即周書也周南十一篇召南十四篇文王徙都於豐而分岐周故地以為周公旦召公奭之采邑且使周公為政於國中而召公宣布於諸侯江沱汝漢之間莫不從化至於武王發又遷於鎬遂克商而有天下武王崩成王誦立周公相之制禮作樂乃采文王之世民俗之詩被之筦弦以為房中之樂而又推之以及於鄉黨邦國所以著明先王風俗之盛而使天下後世之脩身齊家治國平天下者得以取法焉詩經朱註秦風十篇秦初伯益佐禹治水有功賜姓嬴氏其後中潏居西戎以保西陲六世孫大駱生成及非子非子事周孝王養馬汧渭之間孝王封為附庸而邑之秦至宣王時犬戎㓕成之族宣王遂命非子曾孫秦仲為大夫誅西戎不克見殺及幽王為西戎犬戎所殺平王東遷秦仲孫襄公以兵送之王封為諸侯遂有周西都至元孫徳公又徙於雍詩經朱註豳風七篇公劉修復后稷之業相土地之宜而立國於豳之谷焉傳至武王遂有天下武王崩成王立年幼不能莅阼周公旦以冡宰攝政乃述后稷公劉之化作詩一篇以戒成王謂之豳風而後人又取周公所作及凡為周公而作之詩以附焉詩經朱註小雅七十八篇大雅三十一篇鄭氏曰小雅大雅周室居西都時詩也小雅自鹿鳴至菁莪篇大雅自文王至巻阿篇為正經小雅六月大雅民勞之後皆謂之變雅毛詩箋周頌三十一篇周公相武王成王天下既平作為樂章薦之郊廟所謂周頌也詩經朱註周禮十二巻周官經六篇漢書藝文志王莽時劉歆置博士師古曰即今之周禮也亡其冬官以考工記充之藝文志注周禮是的當之書然其間必有末世添入者如盟詛之屬必非周公之意不可以此病周公之法又不可以此病周禮經學理窟晁氏曰漢武帝時河間獻王開獻書之路得周官有五篇失冬官一篇乃募以千金不得取考工記以補其闕至孝成時劉歆校理秘書始得序列著於録略為群儒排弃歆獨以為周公致太平之跡永平時杜子春初能通其讀鄭衆鄭興亦嘗傳受言皆引之以参釋異同云讀書志儀禮十七篇周禮儀禮發源是一理有始終分為二部並是周公攝政太平之書周禮為末儀禮為本本則難明末則易曉是以周禮注者多門儀禮所注後鄭而已儀禮註䟽賈公彦序爾雅釋詁一篇張揖曰昔在周公纘述唐虞宗翼文武克定四海勤相成王六年制禮以導天下著爾雅一篇以釋其義爾雅疏周公諡法一巻不著撰人名氏諡法始於周學者録之因託以名篇崇文總目晁氏曰其序曰維周公旦太公望因嗣王發建功於牧野及終將葬乃制諡計一百九十餘條讀書志石鼓詩岐陽石鼓初不見稱於前世至唐人始盛稱之韋應物以為周文王之鼓至宣王刻詩韓退之直以為宣王之鼓在今鳳翔孔子廟中鼓有十先時散棄於野鄭餘慶置於廟而亡其一皇祐四年向傳師求於民間得之乃足其文可見者四百六十五不可識者過半予所集録文之古者莫先於此歐陽脩集古録跋史籒十五篇太史籒著周宣王太史作大篆十五篇建武時亡六篇矣漢書藝文志注說文叙曰與古文或異艾軒林氏曰大篆出於史籒戰國以來俱用之唐元度曰秦焚詩書惟易與史籒得全王莾之亂此篇亡失建武中獲九篇章帝時王育為作解說所不通者十有二三晉世此篇廢今畧傳字體而已玉海子夏易十巻魏文侯師卜子夏撰設教西河此書篇第畧依王式決非卜子夏之文又其言近而不篤然學者尚異頗傳習之崇文總目晁氏曰舊題卜子夏撰唐藝文志子夏書已亡今此書約王弼註為之者止雜卦景迂云張弧偽作讀書志詩序卜子夏與毛萇合作大序是子夏作小序是子夏毛公合作卜商意有未盡毛公更足成之釋文舊說先儒相承謂毛詩序子夏所創毛公及敬仲又加潤益隋書經籍志徐整云子夏授高行子困學記問詩集序二巻翼要十巻俱卜子夏撰小篆秦著作郎下邽程邈作師古曰篆書謂小篆葢秦始皇使程邈所作也漢書藝文志注𨽻書程邈作𨽻書亦程邈所獻主於徒𨽻從簡易也漢書藝文志注趙氏明誠曰庾肩吾云𨽻書今之正書也張懷瓘六體書論亦云𨽻書者程邈造字皆真正亦曰真書自唐以前皆謂楷字為𨽻至歐陽公集古録誤以八分為𨽻書自是舉世凡漢時石刻皆目為漢𨽻玉海石渠議奏百五十五篇漢太子太傅杜陵蕭望之等奏甘露三年三月詔諸儒講論五經同異太子太傅蕭望之等平奏其議上親稱制臨决焉漢書宣帝本紀書議奏四十二篇禮議奏三十八篇春秋議奏三十九篇論語議奏十八篇五經雜議十八篇藝文志魯論安昌侯說二十一篇安昌侯蓮勺張禹撰師古曰張禹也漢書藝文志注傳魯論者常山都尉龔奮長信少府夏侯勝丞相韋賢魯扶卿前將軍蕭望之安昌侯張禹皆名家張氏最後而行於世漢書藝文志張禹本授魯論晚講齊論後遂合而考之刪其煩惑除去齊論問王知道二篇從魯論二十篇為定號張侯論當世重之馬融為之訓隋書經籍志孝經安昌侯說一篇張禹撰孝經者孔子為曾子陳孝道也漢興長孫氏博士江翁少府后倉諫大夫翼奉安昌侯張禹傳之各自名家漢書藝文志周易卜筮一巻杜陵田何傳五經通義九巻五經雜義七巻五經要義五巻俱漢宗室光禄大夫劉向撰尚書洪範五行傳論十一巻劉向撰成帝即位向數奏封事遷光禄大夫帝元舅平陽侯王鳳為大將軍秉政依太后專國權兄弟七人皆封為列侯時數有大異向以為外戚貴盛鳳兄弟用事之咎而上方精於詩書觀古文詔向領校中五經秘書向見尚書洪範箕子為武王陳五行陰陽休咎之應乃集合上古以來厯春秋六國至秦漢符瑞災異之記推迹行事連傳禍福著其占騐比類相從各有條目凡十一篇號曰洪範五行傳奏之漢書本傳春秋左氏刪茂陵孔竒撰春秋説城門校尉茂陵孔嘉撰古文尚書二十九篇司空扶風杜林傳林少好學時稱通儒京師士大夫咸推其博洽河南鄭興東海衛宏皆長於古學嘗師事劉歆興既遇之欣然言曰林得興等固諧矣使宏得林且有以益之及宏見林闇然而服濟南徐廵師事宏後皆更受林學林前於西州得漆書古文尚書一巻常寶愛之雖遭艱困握持不離身出示宏等曰林流離兵亂常恐斯經將絶何意東海衛子濟南徐生復能傳之是道竟不墜於地也古文雖不合時務然願諸生無悔所學宏廵益重之於是古文遂行冊府元龜後漢扶風杜林傳古文尚書同郡賈逵為之作訓馬融作傳鄭𤣥亦為之注然其所傳唯二十九篇又雜以今文非孔舊本隋書經籍志蒼頡訓纂一篇蒼頡故一篇俱杜林撰蒼頡多古字俗師失其讀宣帝時徴齊人能正讀者張敞從受之至外孫之子杜林為作訓故並列焉漢書藝文志梁有蒼頡二巻後漢杜林注亡隋書經籍志左氏條例二十一篇平陵賈徽撰賈逵父徽從劉歆授左氏春秋兼習國語作左氏條例二十一篇後漢書賈逵傳尚書古文同異三巻侍中平陵賈逵撰肅宗降意儒術特好古文尚書逵數為帝言古文尚書與經傳爾雅訓詁相應詔令撰歐陽大小夏侯尚書古文同異逵集為三巻帝善之復令撰齊魯韓詩與毛氏異同後漢書本傳梁有毛詩雜議難十巻漢侍中賈逵撰亡隋書經籍志毛詩譜鈔一巻詩頌誄書一巻賈逵撰周禮解詁賈逵撰馬融傳云杜子春永平之初年且九十能通其讀頗識其説鄭衆賈逵徃受業焉衆逵洪雅博聞又以經書記轉相證明為解逵解行於世衆解不行禮䟽左氏國語解詁五十一篇賈逵撰賈逵尤明左氏傳國語為之解詁五十一篇永平中上䟽獻之顯宗重其書寫藏秘舘後漢書本傳春秋左氏長經二十巻賈逵章句春秋外傳國語二十巻賈逵注春秋釋訓一巻春秋左氏經傳朱墨列一巻春秋三家經本訓詁十二巻以上俱賈逵撰逵弱冠能誦左氏傳及五經本文以大夏侯尚書敎授雖為古學兼通五家穀梁之說所著經傳義詁及論難百餘萬言學者宗之後世稱為通儒後漢書本傳宋有三家經二巻亡隋書經籍志白虎通徳論十巻蘭䑓令史扶風安陵班固撰後漢班固撰章帝建初四年詔諸儒會白虎觀講論五經同異詔集其事凡十四篇崇文總目續揚雄訓纂篇十三章班固撰臣復續揚雄作十三章漢書藝文志韋昭曰臣班固自謂也作十三章後人不别疑在蒼頡下篇三十四章中漢書藝文志注在昔篇一巻太甲篇一巻典引篇俱班固撰難左氏義四十一事侍中扶風季育撰李育渉獵古學嘗讀左氏傳雖樂文采然謂不得聖人深意前世陳元范升之徒更相非折而多引圖讖不據理體於是作難左氏義四十一事後漢書本傳周易章句十巻尚書十一巻周官禮十二巻儀禮義䟽見二巻儀禮義䟽六巻䘮服經傳一巻俱南郡太守茂陵馬融撰馬融字季長扶風茂陵人有俊才初京兆摯恂以術敎授隱於終南融從其學博通經籍為世通儒後漢書本傳梁有馬融注周易一巻亡梁有毛詩十巻孝經二巻俱馬融注亡隋書經籍志忠經十八章馬融撰自序曰忠經者葢出於孝經也仲尼說孝者所以事君之義則知孝者俟忠而成之所以答君親之恩明臣子之分忠不可廢於國孝不可弛於家孝既有經忠則有闕故述仲尼之說作忠經焉本書原序孟子章句十四巻太常長陵趙岐註晁氏曰岐字臺卿為章指析為十四篇其序云軻戰國時以儒術干諸侯不用退與公孫丑萬章之徒難疑答問著書七篇三萬四千六百八十五字秦焚書以其書號諸子故得不冺絶又為外書四篇其書不能洪深似非孟子本真也按韓愈以此書為弟子所會集與岐之言不同今考其書載孟子所見諸侯皆稱諡如齊宣王梁惠王滕定公滕文公魯平公是也夫死然後有諡軻無恙時所見諸侯不應皆前死且惠王元年至平公之卒凡七十七年軻始見惠王目之曰叟必已老矣決不見平公之卒也後人追為之明矣則岐之言非也荀子載孟子三見齊王而不言弟子問之曰我先攻其邪心揚子載孟子曰夫有意而不至者有矣未有無意而至者也今書皆無之則其散佚也多矣岐謂秦焚書得不冺絶亦非也或曰豈見於外書耶若爾則岐又不當謂其不能洪深也讀書志尚書記難度遼將軍華陰張奐撰張奐字然明酒泉人少逰三輔師事太尉朱寵學歐陽尚書初牟氏章句浮辭繁多冇四十五萬餘言奐減為九萬言後徙屬𢎞農華陰以黨罪禁錮閉門不出著尚書記難三十餘萬言後漢書本傳春秋左氏傳解魏郎中京兆寛撰左氏朱墨别異大司農闗中董遇撰遇善左氏傳更為作朱墨别異人有從學者遇不肯敎而云必當先讀百徧言讀書百徧而意自見從學者云苦渇無日遇言當以三餘或問三餘之意遇言冬者嵗之餘夜者日之餘陰雨者晴之餘也由是諸生少從遇學無傳其朱墨者魏略周官論評十二巻晋御史中丞泥陽傅𤣥撰春秋左氏經傳集解三十巻征南將軍京兆杜預撰晁氏曰晋杜預元凱集劉子駿賈景伯父子許惠卿頴子嚴之注分經之年與傳之年相附故題曰經傳集解其發明甚多古今稱之然其敝則棄經信傳如成公十三年麻隧之戰傳載秦敗績而經不書以為晋直秦曲則韓役書戰時公在師復不湏告克獲有功亦無所諱於左氏之例皆不合不曰傳之繆而猥稱經文闕漏其尤甚者至如此讀書志春秋釋例十五巻杜預注晁氏曰晋杜預注凡四十部集左傳諸例及地名譜第厯數皆顯其同異從而釋之發明尤多昔人稱預為左氏忠臣而預自以為有傳癖觀此尤信讀書志陳氏曰唐劉蕡為之序文獻通考凡五十三例崇文總目梁有服䖍杜預音三巻亡隋書經籍志春秋左氏傳評二巻春秋世譜七巻䘮服要集議三巻俱杜預撰禮通論商洛隱士董景道撰景道三禮之議專尊鄭氏非駁諸儒延廣鄭㫖晋書本傳春秋義章三十巻華陰徐遵明著明堂圖議二巻釋疑一巻隋工部尚書京兆宇文愷撰明堂議表曰臣占日揆星採崧山之秘簡披汶水之靈圖訪通議於殘亡購冬官於散逸總集衆論勒成一家昔張衡渾象以三分為一度裴秀輿地以二寸為千里臣之此圖用一分為一尺推而演之冀輪奐有序而經搆之㫖議者殊途或以綺井為重屋或以圓楣為隆棟各以臆說事不經見今録其疑難為之通釋皆出證據以相發明隋書本傳樂志十五篇通議大夫武功蘇䕫撰䕫小字伯尼博覽羣書尤以鐘律自命與沛國公鄭鐸國子博士何妥議樂因而得罪議寢不行著樂志十五篇以見其志隋書本傳周易講疏十三巻孝經義疏三巻五經大義五巻封禪書一巻樂要一巻以上俱國子祭酒西城何妥撰九絃琴譜二十巻唐宗廟用樂儀六巻琴譜六巻俱唐太宗御撰樂書要録十巻字海一百巻俱武后撰凡武后所著書皆元萬頃范履氷苖神客周思茂胡楚賔衛業等譔唐書藝文志周易大衍論三巻𤣥宗皇帝撰唐月令一巻𤣥宗皇帝刪定晁氏曰唐明皇刪定李林甫等注序謂吕氏定以孟春日在營室不知氣逐閏移節隨斗建於是重有刪定俾林甫同陳希烈等八人為之解國朝景祐初改從舊文由是别行讀書志初禮記月令篇第六即鄭注唐明皇改黜舊文附益時事號御刪月令升為首篇集賢院别為之注厥後學者傳之而釋文義疏皆本鄭注遂有别注小䟽者詞頗卑鄙淳化初判國子監李至請復行鄭注詔兩制二館祕閣集議史館脩撰韓丕張佖胡旦條陳唐本之失請如至奏餘皆請且如舊便以宣讀時令大中祥符中龍圖閣待制孫奭又言其事羣論復以改作為難遂罷宋三朝國史藝文志孝經註一巻𤣥宗皇帝撰取王肅劉劭虞翻韋昭劉炫陸澄六家之說参倣孔鄭舊義今行於太學崇文總目開元文字音義三十巻𤣥宗皇帝撰開元二十三年三月二十七日頒示公卿㑹要義微㫖逺文省理該表𨽻以訓今存篆以証古衆釋大備取証於前脩片言旁通去嫌於翻字信文思之精一學術之明凖張九齡賀御撰文字音義狀𤣥宗撰其序云古文字惟說文字林最有品式因備所遺缺首定𨽻書次存篆字凡三百二十部合為三十巻今止存二十五巻書目韻英五巻𤣥宗皇帝撰天寶十四年四月内出御撰韻英五巻付集賢院繕冩行用㑹要上以自古用韻不甚區分陸法言切韻又未能釐革乃改撰韻英仍舊為五巻舊韻四百三十九新加一百五十一合五百八十韻一萬九千一百七十七字分析至細廣開文路兼通用韻以示宰臣等上表陳賀付諸道令諸郡傳寫集賢注記金風樂一巻𤣥宗皇帝撰唐𤣥宗撰葢琴曲名崇文總目御集春秋左氏列國經傳三十巻文宗皇帝撰文宗每對群臣深言經學太和九年乙巳朔以御集春秋左氏列國經傳三十巻宣付史舘玉海周易正義十四巻唐中書侍郎萬年顔師古等受詔撰燕國公髙陵于志寧等考正晁氏曰唐國子祭酒孔頴達與顔師古于志寧等同撰蘇徳融趙𢎞智審覆序稱江南義疏十有餘家辭尚虚誕皆所不取唯王弼之學獨冠古今以弼為本採諸說附益之讀書志馬按唐儒學傳稱頴達與顔師古司才章王恭王琰撰五經義訓百餘篇號義贊詔改為正義雖包貫異家為詳博然其中不能無謬冗馬嘉運駁正其失永徽中于志寧髙季輔就加増損始布天下據此則五經正義皆為師古等同撰乃世但稱孔疏而藝文志惟周易稱師古同撰其餘諸經皆不列其名意師古僅受詔撰周易正義而不及他經歟抑唐史紀事之舛謬歟今亦惟載周易而其餘槩不濫入云急就篇注一巻顔師古撰叙曰其源出於小學家漢司馬相如作几將篇史游景慕擬而廣之元成之間列於秘府文亦清靡義闕經綸至於包括品類錯綜今古詳其意趣實有可觀幼學相承猶競習之既無良師祗增僻謬師古家傳蒼雅尤精訓故舊得皇象鍾繇衛夫人王羲之所書篇本備加詳覈凡三十二章又見崔浩劉芳所注未善遂為解訓皆據經籍遺文先達舊指字有難識隨而音之别理兼通亦即並載本書原序匡繆正俗八巻顔師古撰唐秘書監顔師古撰采先儒及當世之言参質訛繆而矯正之未終篇而師古没其子始上之詔録藏秘閣崇文總目晁氏曰師古以世俗之言多謬誤故質諸經史刋而正之永徽中子揚庭上之讀書志陳氏曰莆田鄭樵有刋繆正俗八巻汪玉山亦言揚庭表以為藁草纔半部帙未終則是書初非定本也今前後乖剌極多玉山集中所辨甚詳文獻通考五禮要記三十八巻祭酒萬年韋叔夏撰家禮十巻盈川令華陰楊烱撰禮經正義十巻廣州都督咸陽王方慶撰禮雜問答十巻王方慶撰王綝字方慶以字顯博學練朝章著書二百餘篇尢精三禮學者有所咨質酬復淵詣故門人次為雜禮答問唐書本傳寶章集十巻王方慶集武后嘗就求羲之書方慶奏十世從祖羲之書四十餘番太宗求之先臣悉上送今所存惟一軸並上十一世祖導十世祖洽九世祖珣八世祖曇首七世祖僧綽六世祖仲寶五世祖騫高祖規曾祖褒并九世從祖獻之等凡二十八人書共十篇后御武成殿徧示羣臣詔中書舍人崔融序其代閥號寶章集復以示方慶士人隆其寵唐書本傳王氏八體書範四巻王氏工書狀十五巻俱王方慶撰太𤣥幽贊十巻京兆貟俶進開元四年京兆童子貟俶進唐書藝文志開元禮京兆義羅十巻不著撰人名氏據開元已有義鑑申衍其說今此又網羅其遺墜云崇文總目干禄字書一巻萬年顔元孫撰從子真卿書元孫貞觀中刋正經籍因録字體數紙以示讎校楷書時號顔氏字様真卿參校成一巻名曰干禄字書以四聲為次具俗通正三體以經史所用為正世之所行為俗三者之間為通凡三體本書顔真卿序韻海鏡源三百六十巻刑部尚書顔真卿撰真卿在湖州與存及陸鴻薦等討摭古今韻字所原作數百篇唐書蕭存傳大厯十二年十一月二十五日刑部尚書顔真卿撰韻海鏡源三百六十巻表獻之詔付集賢院㑹要筆法一巻顔真卿撰五禮精義十巻太常博士萬年韋􅊮撰韋􅊮撰首載唐禮參引古義申釋其文崇文總目五禮緯書二十巻韋􅊮撰月令一篇太常京兆韋縚奏縚開元時歷集賢脩撰光禄卿遷太常初帝詔嵗率公卿迎氣東郊至三時常以孟月讀時令於正寢二十六年詔縚奏月令一篇朔日於宣政殿側設榻東向置案縚坐讀之諸司官長悉升殿坐聴嵗餘罷唐書本傳衛元嵩元包十巻秘書少監武功蘇源明作傳包之為書也廣大含𢎞三才悉備然文字竒詭音義譎怪紛而不釋隱而不明秘書少監武功蘇淵明洗心澄思為之脩傳解紛以釋之索隱以明之帝王之道昭然著見有以見理亂之兆有以見成敗之端本書李江序春秋通一巻太傅長安韓滉撰滉字大沖善治易春秋著通例及天文事序議各一篇唐書本傳秋按藝文志僅載春通一巻周易集注一百巻中書侍郎岐山元載撰九經要句一巻工部侍郎萬年李適撰琴說一巻唐宗室工部尚書李勉撰勉字元卿善鼓琴有所自制天下寶之樂家傳響泉韻磬勉所愛者唐書本傳三傳異同三巻諭䝉書十四篇俱醴泉令京兆馮伉撰東杓引譜一巻唐宗室協律郎李約撰唐協律郎李約勉子撰約患琴家無角聲乃造東杓引七拍有麟聲繹聲以備五音崇文總目禮閣新儀二十巻京兆韋公肅撰六經法言二十篇翰林侍講學士萬年韋處厚撰韋處厚穆宗立為翰林侍講學士處厚以帝沖怠不向學與路隋合易書詩春秋禮孝經論語掇其粹要題為六經法言二十篇上之冀助省覽帝稱善並賜金幣唐書本傳長慶二年四月癸未翰林侍讀學士章處厚路隋撰五經法言二十巻上之㑹要疑按此五經法言即六經法言也尚書二十四箴諫議大夫華原柳仲郢撰仲郢幼嗜學長工文著尚書二十四箴為韓愈咨賞唐書本傳春秋三氏異同義著作郎華原柳璞撰仲郢子易緼解户部侍郎萬年韋顗撰韋顗通陰陽象緯所著易緼解推演始終有深誼唐書本傳春秋纂例丹陽主簿闗中啖助撰啖助字叔佐趙州人徙闗中善為春秋考三家短長縫綻補闕號集傳凡十年乃成復攝其綱條為例統其言孔子修春秋意以為夏政忠忠之敝野商人承之以敬敬之敝鬼周人承之以文文之敝僿救僿莫若忠故春秋以權輔用以誠㫁禮而以忠道原情云又言幽厲雖衰雅未為風逮平王之東人習餘化茍有善惡當以周法正之故㫁自平王之季以隱公為始所以拯薄勉善捄周之弊革禮之失也助門人趙匡陸質其髙弟也助卒質與其子異裒録助所為春秋集註總例請匡損益質纂會之號纂例唐書本傳周易開元闗一巻武功蘇鶚撰晁氏曰唐蘇鶚撰自序云五代祖晋官至吏部侍郎學兼天人嘗製八卦論為世所傳遭亂遺墜而漏簡尚有存者鶚乃畧演其㫖於此讀書志論語樞要十巻户部尚書扶風馬總撰先天圖宋華山隱士陳摶撰伏羲八卦次序圖伏羲八卦方位圖伏羲六十四卦次序圖伏羲六十四卦方位圖四圖皆出於邵氏葢邵氏得之李之才挺之挺之得之穆脩伯長伯長得之華山希夷先生陳摶圖南者所謂先天之學也朱子本義易龍圖一巻陳摶撰序曰龍馬始負圖出於伏羲之代在太古之前今存已合之位或疑之以陳其未合之數耶於仲尼三陳九卦之義探其㫖所以知之且龍圖本合則聖人不得見其象所以天意先未合而陳其象聖人觀象而明其用是龍圖者天散而示之伏羲合而用之仲尼黙而形之今畧述其梗槩焉本書自序春秋經解義例二十巻春秋論二十巻俱光禄大夫盩厔趙瞻撰毛詩大義三巻武功蘇子才撰皇祐中武功蘇子才采鄭譜孔疏僅二百條分為三巻玉海横渠易說十巻崇文院校書長安張載撰晁氏曰其解甚畧繫辭差詳讀書志載字子厚嘗坐虎皮講易京師聽從者甚衆一夕二程至與論易次日語門人曰比見二程深明易道吾所弗及汝軰可師事之撤坐掇講與二程語道學之要渙然自信宋史本傳書說一巻詩說一巻禮說三巻俱張載撰横渠張氏祭禮一巻張載撰宣議郎藍田呂大鈞附說陳氏曰張載子厚撰末有呂大鈞和叔説數條附焉讀書志朱子曰横渠所制禮多不本諸儀禮有自杜撰處朱子語録横渠春秋說一巻張載撰晁氏曰張子厚為門人雜說春秋其書未成讀書志横渠孟子解二十四巻張載撰晁氏曰張子載撰並孟子統說附於後讀書志經學理窟一巻張載撰序曰此横渠夫子之微言而門人之所記也故曰經學理窟若以為衆理之所聚其淵若窟而出無窮也嘗細玩其辭說其於天下之理若指黑白而較堅脆言不虚越而理皆深造見之行事無弗達矣按察副使山陰成質夫刻之屬海序諸其首本書康海序周易古經二巻丞相藍田呂大防録晁氏曰其序曰彖象所以解經始各為一書王弼專治彖象以為註乃分於卦爻之下學者於是始不見完經而文辭次第貫穿之意亦缺然不屬因按古文而正之凡十二篇别無解釋讀書志呂氏家祭禮一巻呂大防與弟大臨撰朱子曰與叔集諸家禮補儀以儀禮為骨朱子語録呂氏鄉儀一卷鄉約一巻俱呂大鈞撰按宋史列傳呂大防嘗為鄉約而陳氏及宋史藝文志皆稱吕大釣撰與列傳互異呂氏易章句一卷秘書省正字藍田吕大臨撰晁氏曰呂大臨與叔撰其解甚畧有統論數篇讀書志芸閣禮記解十六卷吕大臨撰晁氏曰吕大臨與叔撰與叔師事程正叔禮學甚精博中庸大學尤所致意也讀書志陳氏曰按舘閣書目作一巻止有表記冠昏鄉射燕聘義䘮服四制凡八篇今又有曲禮上下中庸緇衣大學儒行深衣投壺八篇此晦庵朱氏所傳本刻之臨漳射垜書坊稱芸閣吕氏解即其書也讀書目始别載之文獻通考編禮三巻吕大臨編晁氏曰吕大臨編三巻以士䘮禮為本取三禮附之自始死至祥練各以𩔖分其施於後學者甚惠尚恨所編者五禮中凶禮而已讀書志吕與叔論語解十巻吕大臨解晁氏曰與叔雖程正叔之徒解經不盡用其師說讀書志大學一巻中庸一巻俱吕大臨註孟子講義十四巻吕大臨撰考古圖十巻吕大臨撰晁氏曰吕大臨與叔裒諸家所藏三代秦漢尊彛鼎敦之屬繪之於幅而辨論形制文字讀書志陳氏曰其書作於元祐七年所紀自御府之外凡三十六家所藏古器物皆圖而録之讀書志吕大臨考古圖十巻有黑白兩様黑字者後為有韻圖中欠璊玉彘白字者博山鑪上誤畫作人手學古編易學一巻同州王湜撰晁氏曰王湜同州人早濳心於康節之學其序云康節有云理有未見不可强求使通故愚於觀物篇之所得既推其所不疑又存其所可疑亦以先生之言自慎不敢輕其去取故也讀書志論語説一巻華陰侯仲良撰侯仲良字師聖華陰人二程先生舅氏無可之孫朱文公稱其學清白勁直闗學編三禮說小學標題論俱元太子右諭徳奉元蕭􅆽撰􅆽字惟斗奉元人為文立意精深一以洙泗為本濓洛考亭為據稱為一代醇儒元史本傳四書註郃陽岳崧撰玩易意見二巻明太子太保三原王恕撰易書義理深奥諸儒訓釋不一宋伊川先生既為之傳晦菴先生又為之本義固已訓釋明白依文尋理間有不愜於心者乃以已意言之非敢自是願與學者商酌焉本書自序尚書意見一巻詩經意見一巻禮記意見一巻春秋意見一巻經集格言二巻以上俱王恕撰中庸講義三原隐士馬貴撰五經聨語參議長安蕭謙撰禮記集傳爾雅便言俱金華同知渭南薛敬之撰槐堂禮俗三巻知懐寧縣事咸寧胡汝楫撰禹貢節要光禄少卿盩厔王元正撰易說二十四巻易占經緯四巻書說二十巻毛詩未喻一巻俱兵部尚書邑韓邦竒撰朝啓䝉意見一巻韓邦竒撰序曰易自朱晦菴氏為之本圖書原卦畫明蓍䇿考變占於是乎易之先後始有其序而理數辭象之功懋矣竒也誦而習之有所得則識之於冊有弗悟則自為之說將以就有道焉本書自序洪範圖解一巻韓邦竒撰序曰宋蔡九峯氏因律吕之變悟洛書之㫖乃推數而贊之辭由占以致其用泄大禹之神藏發箕子之妙用而範之為範總於稽疑其功懋矣數辭未畢而蔡子卒鰲峯氏補其缺辭而訓釋之其義復明而考占未備今以洪範傳燈之秘著之篇末以示讀範之士云本書自序苑洛志樂十二巻韓邦竒撰序曰苑洛於樂苦心精思或脱悟於載籍之舊或神會於心得之精或見是於羣非之中於是有志樂之作宏綱細目一節萬變信手拈來觸處皆合始刻之日九鶴飛舞苑洛之庭者久之識者以為是書感通所致云本書楊繼盛序律吕直解韓邦竒撰序曰戰國嬴秦之間律吕幾絶漢儒著論馬遷班固為之宗而固尤得其正蔡西山氏上宗班固斟酌馬遷以下諸儒論議著為律吕新書亦略明備矣然理雖顯而文隱數雖著而意深余為之直解僉憲西蜀王公刻之濮州尚書崑山周公為御史時刻之平陽都憲蒲田方公為布政時刻之杭州州幕洪洞岳君浦刻之同州本書自序禮記臆說五巻知太原府事邠州閻讓撰四書因問七巻周易說翼四巻尚書說要五巻毛詩說序六巻春秋說志五巻禮問四巻俱侍郎髙陵吕柟撰先生之學以立志為先慎獨為要忠信為本格致為功論者謂闗中自横渠張子後惟先生為集大成云闗學編詩樂圖譜吕柟撰詩樂圖譜者取詩經周南闗睢以至商頌𤣥鳥可歌之詩八九十篇被之八音以為圖譜者也夫此詩樂自周室盛時奏於郊廟朝廷頌聲大著漢唐以來俗樂聿興新聲代作而三代之雅音絶響矣明興以來脩明禮樂一時俊髦罔不思奮柟仰承徳意率其僚僮司業課藝諸士習行儀禮内有用樂之處選知音監生衛良相等取前詩篇目每歌詠諧之音律未及期年良相等皆能定圖畫譜每一用之渢渢乎有古音之遺本書自序四書註疏周易贊義尚書疏義詩經刪義周禮註解春秋脩義俱光禄寺卿三原馬理撰馬理字谿田研究五經指意多出人意表為反身循理之學以曾子三省顔子四勿為約學者以先生為得闗洛真傳云闗學編周禮集說補二巻兵部尚書咸寧劉儲秀撰古今韻一巻懷慶知府咸寕許宗魯撰易畧二巻易圖集覽一巻樂律發明一巻俱知陜州事商州任慶雲撰周易講說一巻盧氏訓導朝邑張珤撰四書儀式兵部尚書涇陽魏學曾撰周易辨録御史富平楊爵撰序曰予久䝉幽繫憂患警愓之念即夙夜而恒存也困病中日讀周易以自排遣愚䝉管見則必書之以備遺亡嵗月既久六十四卦之說畧具矣因名曰周易辨録繫辭曰困徳之辨也吾以騐吾心之所安力之所勝何如耳若以為實有所得而求法於古人焉所不敢也本書自序中庸解楊爵撰論語䝉讀一巻論語近說一巻俱尚書三原王承裕撰四書端䝉中庸大指六書賦洪武正韻玉鍵俱尚書韓城張士佩輯易箋學庸大㫖俱推官潼闗張大龍撰學易寡過録吏部郎韓城衛先範撰易經析義敎諭雒南張元吉撰大易圖象易傳詩傳俱藍田舉人王之士撰之士字欲立七八嵗即知學授以毛詩輒解後治大戴禮兼通易濳心理窟毅然以道學自任闗學編正俗鄉約正世要言俱王之士撰之士謂居鄉不能和俗如先正和叔何乃立鄉約設科糾勸身先不倦藍田美俗復興闗學編易說二巻渭南文學裴貞撰書傳折𠂻六巻毛詩附說十巻俱叅政渭南薛騰蛟撰五經集録禹貢註解小學集註俱僉事盩厔王三聘撰字學大全三十二巻王三聘集昔人謂文字之學有三一體製一訓詁一音韻夫篇海體製也四聲音韻也訓詁固嘗刋行而切韻貫珠雜法各自為帙猶未克一然字須篇以聚之韻以協之法以通之而其學始全兹刋也主韓氏五音篇韻終以切韻貫珠集附焉統名曰字學大全凡三十二巻本書自序四書約正五經約正俱咸寧嵗貢劉仕毅撰四書大全五經大全俱咸寧嵗貢劉仕明撰奥山詩義應州知州岐山徐衡撰尚書遺㫖二巻横州知州宜川劉子諴撰字考啓䝉十六巻三百篇叠字一巻俱主事咸寧周字撰家禮纂要十六巻富順知縣咸寧秦可貞撰袖韻註秦可貞撰石墨鐫華八巻盩厔舉人趙岫撰序曰子函深心嗜古博求逺購時跨一蹇掛偏提注濃醖童子負錦囊榻工擕楮墨從周畿漢甸足跡迨遍每得一碑親為拭洗椎榻精緻内之行簏遇勝景韻士輒出所擕酒把臂欣賞得佳句即投簏中如此三十餘年所藏二百五十餘種其間漢唐名書多歐趙諸子未見者裝潢堅確巻帙絢爛每一冊後必親裁一跋考據精詳推勘深至使六書之學昭若日星豈但嘉惠後人臨池之藝已耶本書康萬民序婚䘮泊隄一巻左通政蒲城李應䇿撰四書說胡傳發明俱蒲城舉人單允昌撰四書疑問五巻讀易夣覺九巻尚書疑問五巻毛詩序考十巻春秋事考大成禮樂三巻律吕輯寧儉約仁里約俱光禄少卿渭南史記事撰書經解四書解俱學正延長董芬撰四書㑹同易經㑹同禹貢洪範考釋禮記通考俱磁州同知渭南李頴栗撰左氏臆說經筵講官華州王庭譔撰易經心解沅陵知縣華州張三汲撰易通韻畧俱濮州知州盩厔任澄清撰春秋刪補傳註四巻諭俗約言左布政商州邵可立撰四書彦講八巻三原趙鉅撰鉅少留心聖學所著四書彦講剴切詳明識者賞之西安府舊志易揆尚書補註四書弋言俱川東道鳳翔袁楷撰春秋刪補註疏吏部尚書咸寧王紹徽撰經書說約論孟叅看俱主事安定白鍾靈撰四書詩經訓故户部主事華州王庭諫撰學庸辨按察僉事涇陽王徴撰四書抉微四書典詩經繡俱乾州貢士趙天一撰五經性理䟽國朝安定白爾愉撰易經摘要十二巻渭南舉人劉懿宗撰易經要畧四巻四書求是六巻俱渭南進士楊自謙撰孝經神授篇一巻蒲城雷于霖撰四書五經正字提學道蒲城李馥蒸撰論孟正義八巻知呉橋縣事朝邑王鉞撰四書五經說清澗舉人白壽辰撰易經存言十巻蒲城楊仕顯撰念溪著易存言凡十巻今讀其書先撮古今疑義確為辨訂繼按上下經次序逐卦分部發明象解尤有特見皆從先軰諸名家中校讐磨勘而以已見獨斷之故其說竒而不詭創而仍因惟期從象見理繇古覽今以不謬於四聖之心傳故溯其源流察其本末令人一見瞭然本書范檉序大學直解一巻兩論輯說十巻五經要義十巻律吕圖說二巻小學句讀記俱朝邑王建常撰中庸撮言二巻華隂王宜亨撰序曰公本前哲之傳聞彚諸家之講義發揮精微其言微而顯宏而肆可謂悉聖賢之義矣本書江允汭序存存齋四書說十二巻渭南劉懿撰大中正義三巻榆林敎授朝邑劉峒撰四書反身録四巻盩厔李顒撰鄠縣王心敬録禮記約言咸寧王應井撰周易集解安化教諭咸寧雷壯撰崇禮堂四書精㫖蒲城副榜雷䥵撰小學人物考十二巻蒲城原永貞撰序曰原炎洲性質醇厚學問淵博生平著述甚富而小學人物考一書尤為有功聖學於小學中人物姓名里居名象度數無不研之精而辨之確積二十年方成書分十二巻本書雷䥵序詩韻釋畧五巻三原梁應圻撰唐以詩取士一代才俊盡束於聲韻一途兢兢如守三尺弗敢失也余笥中藏有上海潘氏本箋註明晰每為友人索觀苦不給因授諸木公之同調大槩鮮所更易但脱漏者稍稍補葺舛錯者悉為改定雖意義未能詳盡抑亦可謂十得八九矣本書自序春秋琴譜韓城文學衛朝陽撰字學同文韓城監生衛執榖撰周易蓄疑貴州廵撫韓城劉䕃樞撰春秋蓄疑十一巻劉䕃樞撰先生以為是經之作筆削都有深意不可穿鑿附會先儒徃徃泥傳而不信經故於事理多所不合因著蓄疑一書精心深思接先聖心源逈非前此説春秋者所可及也本書孫勷序易說十巻尚書質疑二十四巻詩說纂三十巻禮記纂二十四巻春秋解三十巻四書說八巻俱鄠縣王心敬撰周易九圖䟽義二巻蒲城劉鳴珂撰家禮寧儉二巻俱鄠縣王心敬撰學易寤言八巻臨潼劉秉儁撰序曰先君子註易八巻名學易寤言後夜雨屋傾簡策多殘其學易寤言八巻巻各為策首策二策三策及六七八策盡被屋壓浸汚斷壞不可復識止得四巻五巻於斷壁倚木間而四巻缺坎離五巻缺咸恒遯餘卦雖存亦多殘損而下經倍甚因命子弟抄録其殘編中可因前後語尋繹者妄為補葺不可者遂缺焉本書劉曾序周易解翼十巻乾州上官章撰跋曰闇然之學易也學之數十年有得輒録中年即以注易名遍搜諸縉紳學士故家大族得秘府藏易百餘種大肆精力讀之擷其英華如是者十餘年然後汩汩然得於心而應於手也逐年有得逐年知非故數十易而稿始成其大㫖以繫辭為指歸其細注以八宫經綸錯綜為脉絡其於天道人事剛柔變化之道言言精鑿暸若指掌云本書上官汝恢跋易象一巻鳳翔教授咸陽王明弼撰序曰人事顯而易見天道𣺌而難知至伏羲周文始洩之於易然猶言天道也未言人事也孔子著為彖象以及繫辭由天道而推之人事俾學者曉然於天人之一致奉之以脩身寡過而漸臻乎窮神知化之㣲弼也事易有年潛心玩易不揣愚昧姑取卦象妄加詮解非敢曰即是而見聖學之心亦庶幾勉求知乎聖學之功云爾本書自序史類史之類凡十三曰正史類曰編年類曰别史類曰史鈔類曰故事類曰職官類曰傳記類曰儀注類曰刑法類曰目録類曰譜牒類曰地理類曰霸史類按史為紀事之書陜人所作固不容湮没而其他考地理紀形勝與一切有闗兹土之籍雖非陜人著作亦必表章之以備典故云秦紀秦大夫岐州公孫枝撰秦紀不載日月其文畧不具然戰國之權變亦有可頗采者史記六國表公孫支書而藏之秦䇿於是出扁鵲傳史記一百三十巻漢太史令龍門司馬遷撰自序曰小子弗敏悉論先人所次舊聞弗敢闕紬史記石室金匱之書網羅天下放失舊聞王迹所興原始察終見盛觀衰論考之行事畧推三代録秦漢上記軒轅下至於兹著十二本紀既科條之矣並時異世年差不明作十表禮樂捐益律厯改易兵權山川鬼神天人之際承敝通變作八書二十八宿環北辰三十輻共一轂運行無窮輔拂股肱之臣配焉忠信行道以奉主上作三十世家扶義俶儻不令已失時立功名於天下作七十列傳凡百三十篇五十二萬六千五百字本書原序晁氏曰漢太史令司馬遷叙其父談書創為義例起黄帝迄漢武獲麟之嵗遷没後缺景武紀禮樂律書三王世家漢興以來將相年表日者龜䇿傳靳蒯列傳等十篇元成間褚少孫追補及益以武帝後事辭㫖淺鄙不及遷書逺甚讀書志出闗士心一巻博望侯城固張騫撰漢武内傳二巻晁氏曰不題撰人記王母降讀書志續太史公七篇陽陵馮商撰韋昭曰馮商受詔續太史公十餘篇在班彪别録商字子髙師古曰七畧云商陽陵人治易事五鹿充宗後事劉向能屬文後與孟栁俱待詔頗序列傳未卒病死漢書藝文志注飛燕外傳一巻河東都尉伶𤣥撰茂陵卞理藏晁氏曰伶𤣥撰茂陵卞理藏之金縢漆樞王莽之亂劉恭得之傳於世晋荀朂校上讀書志陳氏曰稱漢河東都尉伶𤣥子于撰自言與揚雄同時而史無所見或云偽書也然通徳擁髻等事文士多用之而禍水滅火一語司馬公載之通鑑矣文獻通考戰國策十三巻漢宗室光禄大夫劉向録漢䕶左都水使者光禄大夫劉向録舊號或曰國策或曰國事或曰短長或曰事語或曰長書或曰脩書向以戰國時㳺士輔所用之國為之策謀宜為戰國策凡十二國三十二篇繼春秋以後記楚漢之興總二百五十年事今篇巻亡缺第二至十三十一至三闕又有後漢高誘註本二十巻今缺第一第五第十一至二十止存八巻崇文總目古列女傳八巻續列女傳一巻劉向撰晁氏曰漢劉向撰睹趙衛之屬起微賤踰禮制以為王敎由内及外乃采詩書所載賢妃貞女及嬖孽亂亡者序次為列女傳凡八篇以戒天子前有王回序其略曰此書有母儀賢明仁智貞慎節義辨通嬖孽等篇而各頌其義圖其狀總為卒篇傳如太史公記頌如詩之四言而圖為屏風然世所行向書乃分傳每篇上下並頌為十五巻其十二傳無頌三傳同時人五傳其後人通題曰向譔題其頌曰向子歆撰與漢史不合故崇文總目以陳嬰母等十六傳為後人所附予以頌考之每篇皆十五傳耳則凡無頌者宜皆非向所奏書不特自陳嬰母所斷也圖云畫之屏風而史有頌圖在八篇莫得而考以向所序書多散亡獨此幸存而完復為他手竄疑於其真故并録其目而以頌證之刪為八篇號為古列女傳餘十二傳其文亦雅奥可喜故又以時次之别為一篇號續列女傳公武按隋經籍志有劉向列女傳十五巻又有劉歆列女傳頌又有項原列女後傳今回刪此書為八篇以合史漢得之矣至於疑頌非歆作葢因顔籒之言爾則未必然也十二傳豈項原所作耶讀書志七畧别録二十巻世本二巻列士傳二巻俱劉向撰列仙傳二巻劉向撰陳氏曰漢劉向撰凡七十二人每傳有贊似非向撰西漢人文章不爾也舘閣書目三巻六十二人崇文總目作二巻七十二人與此合文獻通考七畧七巻漢宗室侍中劉歆撰漢興大收篇籍廣開獻書之路迨孝武世書簡缺脱於是建藏書之策置寫字之官下及諸子傳説皆充秘府至成帝時書頗散亡使謁者陳農求遺書於天下詔光禄大夫劉向校經傳諸子詩賦步兵校尉任宏校兵書太史令尹咸校術數侍醫李柱國校方技每一書已向輒條其篇目撮其指意録而奏之會向卒哀帝復使向子歆卒父業於是總羣書而奏其七畧故有輯畧有六藝畧有諸子畧有詩賦畧有兵書畧有方技畧漢書藝文志大凡三萬三千九十巻隋書經籍志前漢書一百巻蘭䑓令史扶風班固撰班彪以司馬遷作史記太初以後闕而不録乃採繼前史遺事傍貫異聞作後傳數十篇彪卒子固以彪所續前史未詳乃濳精研思欲就其業有人告固私改作國史詔下京兆獄盡取其家書固弟超詣闕上書言固所著述意顯宗甚竒之除蘭臺令史與前睢陽令陳宗長陵令尹敏司𨽻從事孟異共成世祖本紀固又撰功臣平林新市公孫述事作列傳載記二十八篇奏之帝乃使終成前所著書固採纂前記綴集所聞以述漢書起元髙祖終於孝平王莾之誅十有二世二百三十年綜其行事旁貫五經上下治道為春秋表志傳凡百篇當世甚重其書學者莫不諷誦焉冊府元龜晁氏曰後漢班固續司馬遷史記撰十二帝紀八年表十本志七十列傳凡八十餘萬字固既瘐死書頗散亂章帝令其妹曹世叔妻昭就東觀校輯内八表天文志皆其所補也讀書志西域傳班固撰班固記諸國風土人俗皆已詳備前書撰建武以後其事異於昔者以為西域傳皆安帝命班勇所記云冊府元龜漢武故事二巻晁氏曰世言班固撰唐張柬之書洞㝠記後云漢武故事王儉造讀書志列女傳注十五傳扶風曹世叔妻班昭撰隋書崇文總目皆稱十五篇曹大家注以頌義考之葢大家所注離為十四與頌義凡十五篇益陳嬰母及東漢以來梁鴻妻十有六事非劉向書本然也曽鞏目録序三輔決録七巻衞尉卿長陵趙岐撰趙岐為衞尉多所述作著三輔史録傳於時序曰三輔者本雍州之地世世徙公卿大夫吏二千石及髙貲皆以陪諸陵五方之俗雜會非一國風不但繫於詩之秦豳也其為士好髙尚義貴於名行其俗失則趨勢進權惟利是視余以不才生於西土耳能聽而聞故老之言目能視而見衣冠之疇心能識而觀其賢愚嘗以元冬夢黄髪之士姓元名明字子真與余寤言言必有中善否之間無所違依命操筆者書之近從建武以來暨於斯今其人既亡行乃可書玉石朱紫繇此定矣故謂之史録岐恐時人不盡其意故隱其書惟以示同郡嚴象冊府元龜龍山史記注華陰張昶撰沈休文有龍山史記注張昶著昶後漢末大儒而世亦不稱譽余少時江南李育之來訪余求進此文後為火所焚更不復得豈斯文天欲秘者耶柳宗元龍城録益部耆舊傳三國蜀漢中陳述撰漢中陳述字申伯博學多聞著益部耆舊傳及志三國志李譔傳女記十巻律本二十一巻盟會圖俱晋征南將軍杜陵杜預撰晋令四十卷杜預賈充撰畿服經一百七十巻秘書監衛尉卿長安摯虞撰晋世摯虞依禹貢周官作畿服經其州郡及縣分野封略事業國邑山陵水泉鄉亭城道里土田民物風俗先賢舊好靡不具悉隋書藝文志三輔決録注解會計典録二巻決疑要註一巻晋官書文章志四巻俱摯虞撰族姓昭穆記十巻摯虞撰虞以漢末喪亂譜傳多亡失雖其子孫不能言其先祖撰族姓昭穆十巻上䟽進之以為足以備物致用廣多聞之益晋書本傳晋諸公叙讚二十二巻百官名十四巻晋公卿禮秩故事九巻晋厯二巻俱秘書丞泥陽傅暢撰洛陽圖一巻懷州刺史華陰楊佺期撰西京雜記二巻散騎常侍丹陽葛洪撰洪家世有劉子駿漢書一百巻無首尾題目但以甲乙丙丁紀其巻數先公傳云歆欲撰漢書編録漢事未得締構而亡故書無宗本止雜記而已失前後之次無事類之辨後好事者以意次第之始甲終癸為十帙帙十巻合為百巻洪家具有其書試以此考校班固所作殆是全取劉氏有小異同耳并固所不取不過二萬許言今抄出為二巻名曰西京雜記以禆漢書之闕後洪家遭火書籍都盡此兩巻在洪巾箱中常以自隨故得猶在劉歆所記世人罕有縱復有者多不備足見其首尾参錯前後倒亂亦不知何書罕能全録恐年代稍久歆所撰遂殁并洪家此書二巻不知出所故序之云爾本書原跋晁氏曰晋葛洪撰江左人或以為吳均依託為之讀書志敏按康熙初布政使顔刻于西安有序見藝文闗中記一巻葛洪撰陳氏曰晋葛洪稚川撰所載殊簡略文獻通考三輔故事二巻晋世撰隋書經籍志遊行外國傳一巻新豐沙門智猛撰秦記十一巻宋殿中將軍裴景仁撰梁雍川主簿席惠明注後漢書音二巻梁通直卽杜陵韋撰漢水記五巻尚書左丞頴川庾仲雍撰漢書續訓二巻北平咨議㕘軍杜陵韋稜撰西京新記六十巻梁宗室蕭賁撰三輔黄圖三巻不著撰人名氏晁氏曰按經籍志有黄圖一巻記三輔宫觀陵廟明堂辟雍郊畤等即此書也不著撰人名姓其間頗引劉昭漢志然則出於梁陳間也讀書志陳氏曰按唐志一巻今分上下巻載秦漢間宫室苑囿甚詳多引用應劭漢書解而如淳顔師古復引此書為據意漢魏間人所作然中興書目以為崇文總目及國史志不載疑非本書也程氏雍録辨之尤詳文獻通考政按康熙初布使顔敏刻於西安有序見藝文邇儀四巻陳茂陵馬樞撰魏國統二十巻後魏秘書令泥陽梁祚撰西京記三巻後周驃騎大將軍薛寘撰薛寘河東汾陰人撰西京記引據該洽世皆稱其博聞焉周書本傳大統式三巻武功蘇綽撰東都圖記二十巻東宫典記七十巻俱隋尚書京兆宇文愷撰漢書決疑十二巻萬年顔㳺秦撰韋氏譜十巻京兆韋鼎撰華山精舍記一巻張光録撰晋書一百三十巻唐太宗御撰太史令扶風李淳風等分著晁氏曰貞觀中以何法盛等十八家晋史未善詔房喬等與褚遂良許敬宗再加撰次乃據臧榮緒書增損之後又命李淳風李義甫李延壽等十三人分掌著述敬播等四人考正類例西晋四帝五十四年東晋十一帝一百二年又胡羯氐羌鮮卑割據中原為五涼四燕三秦二趙夏蜀十六國共成帝紀十志二十列傳七十載記三十例出于播天文律厯淳風專之喬以宣武紀陸機王羲之傳論上所自為故曰制㫖又總題御撰焉讀書志凌煙閣功臣贊一巻太宗御撰女則要録十巻長孫皇后撰后嘗采古婦人事著女則十篇及崩宫司以聞帝為之慟示近臣曰后此書可用垂後唐書本傳御銓定漢書八十七巻髙宗與郝處俊等撰高宗實録一百巻兆人本業記三巻述聖記一巻列女傳一百巻孝女傳二十巻古今内範一百巻内範要略十巻保傅乳母傳七巻鳳樓新誡二十巻紫宸禮要十巻俱則天皇后武氏撰唐六典三十巻𤣥宗御撰晁氏曰唐𤣥宗撰李林甫張說等注以三公三師三省九寺五監十二衛等列其職司官佐叙其品秩以擬周禮雖不能悉行於世而諸司遵行殆將過半觀唐會要請事者徃徃援據以為實韋述以為書雖成而竟不行過矣然識者謂自唐虞至周有六官而無寺監自秦迄陳有寺監而無六官獨此書兼之故官皆複重也讀書志梁書五十六巻散騎常侍萬年姚思亷撰晁氏曰唐姚思亷撰六本紀五十列傳唐貞觀三年詔思㢘同魏徴撰思亷梁史官察之子推其父意又採謝吳等所記以成此書徴惟總論而已筆削次序皆出思亷思亷名簡以字行讀書志陳書三十六巻姚思亷撰晁氏曰唐姚思亷撰六本紀三十列傳其父察在陳嘗刪撰梁陳事未成陳亡隋文帝問之察以所論載每一篇成輒上之未訖而值察且死屬思亷繼其業貞觀中與梁書同時上之其書世以罕傳多脫誤讀書志南豐曾氏曰唐興武徳五年高祖以自魏以來五百餘嵗世統數更史氏放逸乃詔論次而思亷遂受詔為陳書久之猶不就貞觀三年遂詔論譔於秘書内省十年正月壬子始上之觀察等之為此書歴三世傳父子更數十嵗而後乃成葢其難如此然及其既成與宋魏齊梁等書世亦傳之者少故學者於其行事之迹亦罕得而詳也而其書亦以罕傳則自秘府所藏徃徃脫誤嘉祐六年始詔校讎使可鏤板行之天下而臣等言梁陳等書缺獨舘閣所藏恐不足以定著願詔京師及州縣藏書之家悉上之先皇帝為下其事至七年冬稍稍始集臣等相校至八年七月陳書三十六篇者始校定可傳其疑者亦不敢損益時各䟽於篇末其書舊無目録列傳名氏多闕謬因别為目録一篇使覽者得詳焉本書曾鞏序漢書注一百二十巻中書侍郎萬年顔師古撰陳氏曰師古以太子承乾之命總先儒注解服䖍應劭而下二十餘人刪繁補畧裁以已說遂成一家世號杜征南顔秘監為班史忠臣文獻通考鄭氏曰顔師古解漢書所以得忠臣之名者以其盡之矣漢書未經顔氏之前凡幾家一經顔氏之後後人不能易其說縱有措辭易說之者如朝月曉星不能有其明也夾漈書目南部煙花録一巻顔師古撰晁氏曰唐顔師古撰載隋煬帝時官中秘事僧志徹得之於宫閣筍筆中一名大業拾遺記讀書志王會圖巻亡獬豸記一巻安興貴家傳巻亡靖亂安邦記一巻以上俱顔師古撰隋書八十五巻志三十巻顔師古等撰顔師古孔頴逹于志寕李淳風韋安仁李延壽與令狐徳棻敬播趙𢎞智魏徴等譔唐書藝文志晁氏曰唐魏徴等撰紀五列傳五十五長孫無忌等撰志三十初詔顔師古孔頴達脩述徴總其事序論皆徴自作復又詔于志寧李淳風韋安仁李延壽同脩五代史志無忌上之詔編第入隋書人亦號五代史志天文律厯五行三志淳風獨作文獻通考法象志七巻太史令岐山李淳風撰淳風明歩天厯筭以將仕郎直太史局置渾天儀詆摭前世得失著法象書七篇上之唐書本傳典章文物志李淳風撰隋方志圖李淳風刋定李淳風刋定隋方志圖頗為詳悉所注郡邑多依用其後州縣改𨽻管屬不同但據山河以分耳舊唐書天文志周書五十巻秘書丞華原令狐徳棻等撰晁氏曰唐令狐徳棻等撰本紀八列傳四十二初周有柳虯隋牛洪各有撰次率多牴牾貞觀中徳棻請撰次乃詔與陳叔逹唐儉共成之先是蘇綽秉周政詞令多准尚書牛𢎞為史尤務清言徳棻因之以成是書故多非實録仁宗時出太清樓本合史舘秘閣本又募天下書而取夏竦李㢲家本下舘閣正是其文字其後林希王安國上之讀書志髙宗後脩實録三十巻令狐徳棻等撰陳氏曰按志令狐徳棻撰止乾封劉知幾續成之故號後修書本三十巻闕十一巻文獻通考皇帝封禪儀六巻武徳貞觀兩朝史八十巻凌烟閣功臣故事四巻令狐家傳一巻俱令狐徳棻撰西征記巻亡檢校司農京兆韋𢎞機撰𢎞機仕貞觀時為左千牛胄曹參軍使西突厥冊拜同俄設為可汗會石國叛道梗三年不得歸裂裾録所過諸俗物産為西征記比還太宗問外國事即上其書帝大悅唐書本傳後漢書音義二十七巻東都記二十巻俱韋機撰按藝文志韋機後漢書音義二十七巻東都記二十巻西征記巻亡韋機别無所見據列傳稱西征記為𢎞機作而𢎞機嘗于髙宗時為司農少卿主東都營田苑則東都記應即其主營田日記事之書漢書音義當並出其手以避追諡孝敬帝諱不稱𢎞也故以二書並附於此後漢書一百巻章懷太子賢注舊紀儀鳳元年十二月丙申皇太子賢上所注後漢書賜物三萬段玉海列藩正論三十巻章懷太子賢撰時政記四十巻文昌左丞同平章事萬年姚璹撰永徽後左右史惟對仗承㫖仗下謀議不得聞璹以帝王謨訓不可闕記請仗下所言軍國政要責宰相自撰號時政記以授史官從之時政有記自璹始唐書本傳漢書紹訓户部尚書萬年姚班撰班曾祖察嘗撰漢書訓纂而後之注漢書多竊取其意為已說班著紹訓以發明舊義云唐書本傳歴古創置儀五巻禮樂集十巻俱刑部尚書萬年顔真卿撰華山記一巻范陽徵士盧鴻撰唐書一百三十巻工部侍郎萬年韋述撰唐韋述撰初吳兢撰唐史自創業訖於開元凡一百一十巻述因兢舊本更加筆削刋去酷吏傅為紀志列傳一百一十二巻至徳乾元以後史官于休烈又增肅宗紀二巻而史官令狐峘等復於紀志傳後隨篇增緝而不加巻帙今書一百三十巻其十六巻未詳撰人名氏崇文總目集賢注記二巻韋述撰晁氏曰唐集賢學士韋述撰述在集賢四十年天寶丙申摭置院始未及院中故事修撰書史之次及孝明時學士名氏頗善序事讀書志續七志韋述等分撰馬懷素奏述與諸儒即秘書續七志五年而成唐書本傳馬懷素以自齊以前舊籍王儉七志已詳請採近書篇目及前志遺者續儉志以藏秘府詔可即拜懷素秘書監召尹知章韋述等二十二人分部撰次玉海開元譜二十巻韋述撰述好譜學見柳沖所撰姓族系譜每私寫懷之還舍則又繕録故於百氏源𣲖為詳乃更撰開元譜二十篇唐書本傳百家𩔖例二巻韋述撰工部侍郎韋述撰又以大唐縉紳進姬周十八姓大唐相門甲族八十六家附其後中興書目宰相甲族一巻韋述等撰晁氏曰唐韋述蕭頴士等撰自王方慶而下十有四家讀書志兩京新記五巻韋述撰開元中撰西京始於開皇東都起於大業宋敏求演之為長安志十巻河南志二十巻玉海唐春秋三十巻高宗實録三十巻御史臺記十巻東封記一巻集賢書目一巻學士院雜撰目一巻兩京道里記三巻史例一巻以上俱韋述撰南宫故事十二巻宫卿舊事一巻文貞公事録一巻尚書考功簿五巻尚書考功狀績簿十巻尚書科配簿五巻五省遷除二十巻王氏女記十巻王氏王嬪傳五巻續妬記五卷魏元成傳一巻郭元振傳一巻三品官祔廟禮二巻古今儀集五十巻王氏家牒十五巻家譜二十巻王氏著録十巻九􅉄山志十巻俱廣州都督咸陽王方慶撰唐𤣥宗實録一百巻岐山元載撰晁氏曰唐元載等撰起即位盡上元三年凡五十年安史之亂𤣥宗起居注亡大厯中史官令狐峘裒掇詔策備一朝之遺闕開元天寶間君臣事多漏略讀書志陳氏曰題元載撰葢左拾遺令狐峘所為而載以宰相監脩也史稱事多漏略拙於取棄不稱良史峘徳棻五世孫也文獻通考唐肅宗實録二十巻元載撰晁氏曰唐元載等撰起即位盡後元年凡六年陳氏曰亦元載監脩不見史官姓名讀書志汾陽王家傳十巻陳雄撰晁氏曰唐陳雄撰雄本汾陽王郭子儀僚吏後又從事渾瑊幕府故傳不名第九巻録行狀第十巻録副佐三十三人大將二十七人曰忠武將佐略讀書志唐代宗實録四十巻左拾遺華原令狐峘撰晁氏曰唐令狐峘撰起寶寧元年壬寅止大厯十四年己未凡十七年讀書志令狐峘撰代宗實録四十巻雖勤苦然多遺漏不稱良史至元和二年其子丕為太僕寺丞進峘所撰代宗實録四十巻詔付史舘贈峘工部尚書叙事用舍咸不當而又多於漏略名臣如房琯不立傳直䟽如顔真卿略而不載冊府元龜陸氏宗系碣一巻令狐峘撰開元禮義釋二十巻博士萬年韋彤撰元和格敕三十巻畧陽權徳輿等集刪定制敕三十巻長安許孟容等集開元後禮二十巻京兆韋渠牟撰唐嶲州圖檢校尚書萬年韋臯撰舊紀貞元十三年五月丙戍朔韋臯收復嶲州畫圖來上玉海西南夷事狀二十巻西戎記二巻俱韋臯撰通典二百卷宰相萬年杜佑撰自序曰夫理道之先在乎行教化教化之本在乎足衣食易稱聚人曰財洪範一曰食二曰貨夫子曰既富而且教斯之謂矣夫行教化在乎設職官設職官在乎審官材審官材在乎精選舉制禮以端其序立樂以和其心此先哲王致治之大方也故職官設然後興禮樂焉教化􅈥然後用刑罰焉列州郡俾分領焉置邉防遏戎敵焉是以食貨為之首選舉次之職官又次之禮又次之樂又次之刑又次之其次州郡又次之邉防末之或覽之者庶幾知篇第之㫖也本書原序晁氏曰先是劉秩採經史自黄帝迄天寶末制度沿革廢置議論得失倣周禮六官法為政典三十五篇佑以為未盡因廣之參以新禮為二百篇世推該洽三十六年成書徳宗時上之讀書志外典職官記十卷文宗朝備問一巻賔佐記一巻俱杜佑撰翰林院故事一卷學士京兆韋執誼撰貞元二年學士韋執誼撰述貞觀以來翰林建置沿革記云自立此院連飛繼鳴者逾三十人因以官秩名氏次叙為故事今是書名氏皆缺書目邠志三巻侍御史凌凖撰陳氏曰唐殿中侍御史凌準宗一撰邠軍即朔方軍也此本從旴江晁氏借録其末題云文忠脩唐史求此書不獲今得於忠憲范公之孫伯髙其中尚舛誤當訪求正之紹興乙丑晁公酇文獻通考路按宋史藝文志有隋邠志三巻唐徳宗實録五十巻侍讀學士萬年韋處厚等同脩元和二年二月詔撰徳宗實録五年十月庚辰宰臣裴垍與史官蔣武韋處厚等五人撰五十巻上之㑹要翰林學士記一巻韋處厚撰長慶元年韋處厚撰記得人之意書目太和國記二十巻韋處厚撰柳氏自備録三十巻刑部尚書華原柳仲郢撰仲郢嘗手鈔六經司馬遷班固范蔚宗史皆一鈔魏晋及南北朝再又𩔖所鈔他書凡三十篇號柳氏自備唐書本傳京兆杜氏家譜一巻史略三十巻東齋籍二十巻閒居録三十巻俱太子賔客京兆杜信撰奉天録一巻趙元一撰陳氏曰唐趙元一撰起建中四年涇原叛命終興元元年克復神都文獻通考徳宗幸奉天録一巻崔光庭撰奉天紀一巻徐岱撰通厯十巻户部尚書扶風馬總撰晁氏曰唐馬總撰纂太古十七氏中古五帝三王及刪取秦漢三國晋十六國宋齊梁陳元魏北齊後周隋世紀興㓕粗述其君賢否取虞世南略論分繫於末以見義焉讀書志陳氏曰書本十巻止於隋代今書直至五代增五巻者後人所叙也文獻通考唐年小録八巻馬總撰陳氏曰唐户部尚書扶風馬總會元撰記唐以來雜事分為七門末巻為雜録舊有一本略甚後有程文簡本傳之始為全書文獻通考唐天祚長厯著作郎華原柳樸撰樸述天祚長厯斷自漢武帝紀元為編年以大政大祥異侵叛戰伐隨著之閠位者附見其左嘗謂杜征南春秋後序述紀甲厯為得實自餘史家皆差蔣系以為然唐書本傳正閏位厯三巻柳樸撰衣冠盛事一巻武功蘇特撰史記名臣䟽三十四巻京兆竇羣撰回鶻道里記宗正少卿萬年李晟撰大唐說纂四巻亳州刺史京兆李繁撰藝文志有李繁大唐說纂四巻今罕得其書予家有之凡所紀事率不過數十字極為簡要新史大抵采用之其忠節一門曰武后問石泉令王方慶曰朕夜夣雙陸不勝何也曰葢謂宫中無子意者恐有神靈儆夫陛下因陳人心在唐之意后大悟召廬陵王復儲位新史載其說通鑑去之似為可惜容齋隨筆北荒長君録三巻李繁撰相國鄴侯家傳十巻李繁撰晁氏曰唐亳州刺史李繁撰繁鄴侯泌之子也太和中以罪繫獄當死恐先人功業不傳乞廢紙拙筆於獄吏以成傳藁戒其家求世間人潤色之後竟不果宋子京謂其辭浮侈云讀書志唐文宗實録四十巻御史中丞澄城魏謩撰晁氏曰唐魏謩撰起即位盡開成五年凡十四年宣宗大中八年史官蔣偕牛叢王諷盧吉同脩讀書志開成承詔録二巻唐宗室行軍司馬李石撰晁氏曰唐李石撰石與鄭覃李固言相文宗録當時延英奏對事讀書志定戎闗圖隴州防禦使薛逵奏大中六年隴州防禦使薛逵奏移築故闗改為定戎闗功畢謹畫圖進上勅㫖新置闗城得其要害形於圖畫頗見公忠宜依所奏㑹要諸道山河地名要略九巻吏部侍郎京兆韋澳撰一名處分語一名新集地理書宋史藝文志續唐厯二十巻韋澳撰零陵録一巻尚書同平章事京兆韋宙撰唐武宗實録一巻京兆韋保衡撰晁氏曰唐韋保衡撰武宗以後實録皆亡今止有會昌元年正月二月讀書志陳氏曰按唐志惟有武宗實録三十巻其後皆未嘗修纂更五代武録亦不存邯鄲書目惟有一巻而已文獻通考扶風竇氏血脉家譜一巻國子博士竇澄之撰貞陵遺事二巻中書舍人華原令狐澄撰陳氏曰唐中書舍人令狐澄撰所記十七事文獻通考皇王寶運録十巻岐國公京兆韋昭度撰制表䟽一巻學士承㫖同平章事華原令狐綯撰續貞陵遺事一巻吏部侍郎華原柳玭撰陳氏曰玭所續十四事文獻通考柳氏序訓一巻柳玭撰晁氏曰唐柳玭叙其祖公綽已下内外事跡以訓其子孫讀書志金鑾宻記一巻一作三巻韓學士承㫖萬年偓撰晁氏曰唐韓偓撰偓天復元年為翰林學士從昭宗西幸朱温圍岐二年偓因宻記其謀議及所聞見事止於貶濮州司馬予嘗謂偓有君子之道四焉唐之末南北分朋而忘其君偓崔𦙍門生獨能棄家從上一也其時縉紳無不交通内外以獵取爵禄偓獨能力辭相位二也不肯草韋貽範起復麻三也不肯致拜於朱温四也詩曰風雨如晦雞鳴不已偓之謂矣而宋子京薄之奈何一本釐天復二年三年各為一巻首尾詳畧頗不同互相讎校凡改正千有餘字云讀書志史通析微十巻諫議大夫同平章事華原柳璨撰晁氏曰唐柳璨炤之撰璨以劉子元史通誣妄聖哲評湯之徳為偽迹論桀之惡為厚誣謗周公云不臣褒武庚以狥節其甚至於彈劾仲尼因討論其舛謬共成五十篇蕭統云論則析理精微故以為名乾寧四年書成唐史云璨公綽族孫少孤貧好學著史通析微時或稱之起布衣至於相不四嵗按唐紀璨相在天祐改元則書成猶未仕也讀書志補注正閏位厯三巻姓氏韻畧六巻俱柳璨撰陵園記一巻陳氏曰唐宗正丞李失其名撰光化元年序文獻通考翰林志一巻學士馮翊楊鉅撰陳氏曰唐學士馮翊楊鉅文碩撰雜記院中事例及文書格式其祠祭祝版社稷宗廟上至天地用伏惟尚享岳瀆而降只曰尚享此例今人皆莫之知則施之尊卑無别矣鉅宰相收之子其為學士在昭宗時文獻通考秦中嵗時記一巻膳部郎中趙郡李綽撰陳氏曰唐膳部郎中趙郡李綽撰綽别未見此據中興書目云耳其序曰緬思庚子之嵗薦周戊辰之年庚子唐廣明元年戊辰梁開平三年也又曰偶記昔年皇居舊事絶筆自嘆横襟出涕然則唐之舊臣國亡之後感傷疇昔而為此書也按朱藏一紺珠集曾端伯𩔖說載此書有杏園探花使端午扇市嵗除儺公儺母及太和八年無名子詩數事今皆無之豈别一書乎文獻通考咸鎬故事一巻京兆韋慎㣲撰陳氏曰韋慎微撰其書與前大同小異末巻却有神鬼大者號儺公母一語按舘閣書目秦中嵗時記一名咸鎬嵗時記文獻通考輦下嵗時記一巻李綽撰晁氏曰唐李綽撰綽經黄巢之亂避地蠻隅偶記秦地盛事傳之晚學讀書志蜀程記一巻峽程記一巻俱僣蜀吏部侍郎京兆韋莊撰朱梁興創遺編二十巻梁宰相同州敬翔撰陳氏曰梁宰相敬翔子振撰自廣明巢賊之亂朱温事跡訖於天祐弑逆大書特書不以為媿也其辭亦鄙俚文獻通考後唐明宗實録三十巻唐中書侍郎同平章事長安姚顗監脩陳氏曰監修姚顗史官張昭逺撰清泰三年上文獻通考晉高祖實録三十巻出帝實録二十巻俱漢同州竇貞固監脩漢竇貞固隱帝時為相乾祐二年貞固上言臣伏睹上自昊軒下及隋唐歴代帝王享國年月莫不裁成信史載在明文或編修只自於本朝或追補亦從於來者曾無漏略咸有排聫蹤跡相尋源流可别五運生成之道於是乎彰明一時褒貶之書因兹而昭著者奉兹鈆槧賞以油緗同傾獻扶之心上副成書之命所撰晉高帝實録三十巻少帝實録二十巻謹詣東上閣門呈進􅃯貞固等羣書睹奥直筆記言成一代之文明繼百王之盛典豈特洪纎靡漏抑亦褒貶有彰將播無窮永傳不朽歎重褒美頃刻不忘冊府元龜陳氏曰監脩竇貞固史官賈偉王伸竇儼等撰周廣順元年上貞固字體仁同州人相漢至周罷歸洛陽國初卒文獻通考漢高祖實録十七巻長安蘇逢吉監修陳氏曰監修蘇逢吉史官賈偉等撰乾祐二年上書本二十巻今闕末三巻中興書目作十巻文獻通考桂苑叢談一巻馮翊子子休撰晁氏曰題云馮翊子子休撰雜記唐朝雜事僖昭時當是五代人李邯鄲云姓嚴讀書志陜西聚米圖經五巻宋閣門通事舍人雄州趙珣撰陳氏曰閣門通事舍人雄州趙珣撰珣父振博州防禦使久在西邊珣訪得五路徼外山川道里康定二年為此書韓魏公經畧言於朝詔取其書召見執政吕許公宋莒公言用兵以來策士之言以千數無如珣者擢涇原都監定川之敗死焉珣勁特好學恂恂𩔖儒者人皆惜之文獻通考孝行録三巻推官京兆胡訥撰陳氏曰京兆胡訥撰始得此書不知訥何人也所記多國初人已而知其為安定先生翼之之父仕為寧海節度推官文獻通考民表錄三巻胡訥撰晁氏曰胡訥撰録國朝循吏善政李淑以為雖淺俗亦可備廣記云天聖中偕賢惠録上之讀書志賢惠録二巻胡訥撰晁氏曰胡訥撰國朝賢惠之女後一巻瑗嗣成之讀書志賢按宋藝文志胡訥孝行録三巻又民表録三巻又惠録二巻文獻通考於民表賢惠二録誤作胡納撰今據藝文志改正漢書答問五巻史記牴牾論五巻唐春秋五十巻俱光禄大夫盩厔趙瞻撰西山别録一巻趙瞻撰趙瞻知威州以威茂雜夷獠險甚而難守不若合之而建郡汶川因條著其詳玉海長安志二十巻宋敏求演凡廢興遷徙及宫室城郭坊市茅舍縣鎮鄉里山川津梁亭驛廟寺陵墓之名數與古先之遺迹人物之俊秀守令之良能花卉之殊尤靡不備載考之韋述所記其詳十餘倍真博物之書也熈寧九年趙彦若序玉海京兆金石録六巻北平田槩纂陳氏曰北平田槩纂元豐五年王欽臣為序自為後序皆記京兆府縣古碑所在覽之使人慨然文獻通考元祐分疆録三巻直龍圖閣京兆㳺師雄撰陳氏曰直龍圖閣京兆㳺師雄景叔撰元祐初議棄西邉四寨執政召師雄問之對曰先帝棄之可也主上棄之則不可且示弱反益邉患争之甚力不聼卒棄之四寨者葭蘆米脂安疆也夏人以事出望外萌侵侮之心連年犯順皆如師雄所料此書前三巻記當時論辨本末後一巻行實不知何人作也是嵗師雄被命行邉請以便宜行事夏人與鬼章謀冦熙河師雄說劉舜卿出師种誼遂破洮州禽鬼章以獻其功偉矣元祐諸老固欲休兵息民師雄言既不行功復不賞始以專反熙豐失於偏滯終成紹述之禍亦有以也師雄治平二年進士文獻通考宼萊公遺事一巻陳氏曰不知何人作文獻通考萊公勲烈一巻華陰寇宗奭編晁氏曰寇宗奭編宗奭凖曾孫也編集仁宗祭準文及贈誥墓碑傳誌贊詩等為此書讀書志張浮休使遼録二巻吏部侍郎新平張舜民撰晁氏曰元祐甲戌春被命為囘謝大遼弔祭使鄭介為副録其徃返地里及話言也舜民字芝叟自號浮休居士讀書志郴行録一巻張舜民撰雍行録鄠縣主簿程顥撰㳺城南記一巻張禮撰晁氏曰張禮撰禮秦人元祐中與陳明㣲自長安城南探竒訪古以抵樊川因次為之記讀書志吕氏前漢論三十巻藍田吕大忠撰晁氏曰吕大忠晉伯撰予得其本於銅梁令吕肇脩撰汲陵諸孫也讀書志長安圖記一巻丞相藍田㠯大防撰陳氏曰丞相汲公吕大防知永興軍以為正長安故圖著其說於上今信安郡有此圖而别録其說為一篇文獻通考雍録十巻龍圖閣學士休寧程大昌撰序曰宋龍圖學士程文簡公之所著也以渭為經而五代都地隨列渭旁其雜相考會則悉本之潘岳闗中記與三輔黄圖六典長安志及吕圖閣圖所以述雍之故蹟大小靡遺矣明知西安府李文極刻之以傳本書康海序西夏須知一巻延州守劉温潤撰晁氏曰劉温潤守延州日編録偽境雜事陳氏曰凡十五條目讀書志華山記一巻陳氏曰不知名氏文獻通考史記注一百巻金咸陽蕭貢撰蕭貢好學讀書至老不倦有注史記一百巻金史本傳天興近鑑三巻正統書六十巻俱元亷訪使奉元楊奐撰正統八例楊奐撰楊奐著奐奉元人學者稱紫陽先生以耶律楚材薦拜河南亷訪使其八例曰得曰傳曰襄曰復曰與曰陷曰絶曰歸續文獻通考遼史三巻雲陽志二巻俱涇陽隱士程瑁撰九州志太子右諭徳奉元蕭􅆽撰後大理寺志六巻明大理少卿乾州宋欽撰楊氏族譜一巻户部侍郎咸寧楊鼎撰漕河通志吏部尚書三原王恕撰金華鄉賢志金華同知渭南薛敬之撰通鑑管見吳江縣丞涇陽馬珵撰文獻録三巻知太原府邠州閻讓撰漕運志總漕西安楊宏撰雍大記三十六巻提學信陽何仲黙撰大復子雍大記其為體裁者三以擬於疆域者屬之攷擬於人代者屬之記以成諸修立者屬之志憫時彰㣲著言以斷寓發褒諷仿取遷固序贊附列述以兼作之法葢善於記矣憲僉辰陽周公宗化命校録畢刋本書炅序王氏族譜一巻吏部文選郎中鄠縣王九思撰後裔王士謹王心敬等續脩序曰大家世族五世之後不能言其先祖者皆是也渼陂子有憂之焉此王氏族譜之所由作也上推所自以及其所生所以昭其系也摭拾遺行不為溢美所以昭其徳也體貎有述窀穸有地所以敦其思也援昔據今開諭懇切所以昭其訓也王氏子孫讀是譜者其亦知所勉乎本書康海序武功志三巻翰林脩撰武功康海撰夫志者記也記其地理風俗人物之事也武功志余先君子長公葢嘗述之然縣官掌故弗嚴人匿之矣余於是卒成先人之志畧序撰之凡七篇本書自序史約南京禮部右侍郎髙陵吕柟撰解州志吕柟撰志凡二十二篇本書自序高陵縣志吕柟撰序曰𢎞治辛酉余忝鄉舉即事斯志徃來京師篋載以行入翰林後垂三十餘年斯編麤就徐侯宗義請加諸梓門人楊九式校書劉岸又手圖三幅志益章章本書自序陜西通志四十巻光禄寺卿三原馬理撰序曰是志也出谿田先生之手分四綱衍二十八目總四十巻本書趙延瑞序商略八巻知陜州事商州任慶雲撰序曰商自建設𨽻號弗一志無成書任子思繩徃而牖來逺稽於墳典博採於譜牒咨詢於故老參訂於儒紳數月而志成名曰商畧刋繁挈要祛浮覈實駸駸乎班馬之遺也本書童承叙序渭南志十八巻知金華府事渭南南大吉撰序曰瑞泉先生慨邑故志訛駮亡紀文獻曷徴乃博摭籍傳洞窺今古錯綜檃括作渭南縣志圖二巻表四巻攷五巻傳七巻凡十八巻志成嘉靖二十一年本書李宗樞序紹興志南大吉撰王氏家乘十二卷知潞安府事朝邑王三省撰序曰前烈弗彰不可謂孝用是外咨耆耋内蒐巻軸稍次第之曰王氏乘焉乃自始祖以下咸次其代為家譜一巻曰紀世録封典誥勅之文為一巻曰紀恩録行狀志表祭文哀誄輓詩為三巻曰紀遺録適情亭集大梁諸友之詩靈隱圖為一巻曰紀逰録去思遺愛諸篇為一巻曰紀思録士大夫致薦諸詩文為二巻曰紀與録青羊諸贊頌為二巻曰紀變至若潼谷一區竊以自號或亦歌之詠之綴之末簡為一巻曰紀志庶幾先世之遺不至散失無紀云本書自序大婚禮彚紀左都御史三原温純撰序曰明興大婚禮僅一再舉以故典章闕畧即會典所載亦難盡據純役本寺會今上舉大婚禮葢茫然拮据無所日與其僚壽光岳君麻城周君取故牘存者采酌而質以會典既三舉六禮幸彬彬當上意焉本書自序周氏族譜户部主事咸寧周宇撰李氏族譜一巻兩淮運使咸寧李蘇撰嘉善志宣州志俱僉事咸寧倪璣撰訂正通鑑前編二十五巻左㕘議渭南南軒撰洓水通鑑新安綱目皆自威烈以後而金氏又等而上斷之唐虞兹前編所由名也苐庖羲氏萬世文字鼻祖不宜闕如不載渭上先生弗安於𠂻也于是以庖羲氏而來循例新安犂然為綱目前編年八袠而書得就其所釐解率根極理道又皆發前人未發于洓水新安足鼎立而禆助仁山氏者良非眇尠矣本書楊光訓序闗中文獻志五十巻南氏族譜五巻俱南軒撰續渭南縣志十二巻南軒撰序曰初余世父瑞泉公撰渭南志義例倣之史遷評者稱其有良史才溯厥絶筆今越五十年矣時事民生官聨文獻倐忽即成古今不有紀載恐竟湮没余詳考百家衆氏博詢里中長老并舊志所載僣加增削附以管見即事分𩔖為目一十有二總成一編本書自序萸亭記事三邉人物列傳理學名臣傳大河志俱西華知縣華州張光孝撰玉堂日記工部侍郎潼闗盛訥撰涇野行實録髙陵劉銑髙阡輯三逰記一巻紀事勒文一巻續朝邑志二巻俱左叅政朝邑王學謨撰太常考八巻御史朝邑雷士楨撰西京逰覽志一巻秦氏族譜一巻秦氏二大支詳譜一巻秦氏橋梓年譜一巻富順志十巻俱咸寧舉人秦可貞撰來氏族譜三原來宴聲撰序曰來氏吾邑故家也自都御史公憲副公郡丞公相繼以忠直治行聞族以此益大兹譜又當實不溢一語葢曰明昭穆正支𣲖令後世可傳信云爾本書温純序增訂闗中文獻志八十巻渭南志二十五巻俱尚書渭南南師仲撰五臺山志一巻按察使耀州喬世寧撰序曰五臺山州城外東山也自孫公以攝養永年乃後道家者率託諸孫公而五臺益著名其山事蹟甚多余頃輯州志不能盡著因附撰五臺山志備載其事蹟諸渉詭誕者稍加辨証傳焉亦可為卧遊之資也本書自序喬氏族譜一巻喬世寧撰序曰喬氏自金元以來稱繁盛大族矣顧文獻之事闕焉譜至今未成也徃余聞祖父談先世事余頗記其故實及余不譜後將何述焉然余又竊笑今人務虚恢鮮實益重為世俗指議故不敢誇謾其辭亦欲以傳信當世且令子孫者以是彷彿先人云本書自序闗學編四巻工部尚書長安馮從吾撰序曰闗學編者侍御史馮仲好集闗西之為理學者也其為孔子弟子者四人學無所考於宋得九人於金得一人於元得八人於明得十五人諸附見者不與焉皆述其學之大畧為小傳授受源委可推求也本書李維楨序宋元明儒考畧馮從吾撰馮氏族譜一巻馮從吾撰序曰馮氏譜取法廬陵世經人緯𩔖史氏年表或以諱或以名間述一二行實粤自始祖逮於今兹而旁及外家一洗魏唐牽合之陋而徃徃於尺幅隻字間敦本闡幽義指具備是可以風矣本書陸夢履序馮氏家乘一巻馮從吾輯序曰余為余族譜而先世之載多散逸不傳族長老又莫能悉於是謀諸伯氏敬吾輯家塾所藏誥勅及志傳諸遺文得僅存者若干篇彚次成帙爰付殺青公諸族衆庶使後之子孫有所籍以考証云本書自序世編良鄉知縣華州張士鵾撰洞庭記諭涇陽郭鼎藩撰介休志史抄四巻榆次志俱光禄卿渭南史記事撰世㨗刪閏録史畧臆評俱鹽運使鳳翔程雲翼撰南巡西巡録藍田志輞川志俱御史藍田榮華撰闗中陵墓志二巻東郡祁光宗撰雍勝畧宣府巡撫三原焦源清撰神廟實録三卷左都御史渭南劉芳纂瀑園志六巻年譜四巻俱工部尚書渭南南居益撰昭陵志内江范文光撰雍勝畧二十四巻江南李應祥撰序曰頃入闗中自公多暇輶軒戾止杖履繼之撫槩河山慨興人代始結軫於長安俟轍環於海寓適余友羨長至自湟中相與賞會罔非解頥凡所經過有如指掌於是古今同證邑野合謀委巷諏譚荒城諮度手披心測眥決神馳靡不相厥方隅揣其原隰審諸沿革析以興亡故實並陳詩歌摘附有信則存有疑則缺有訛則辨有勝則收爰著此編名曰勝畧本書自序陜西通志三十五巻刑部員外郎咸寧王紹先與弟紹徽同邑周宇長安馮從吾仝撰序曰陜西通志缺弗修者六十年百原李公以臺使者按闗中爰稽故牒慨焉有作者之思遂重其事於邦薦紳周槐村民部馮少墟侍御王光庭比部比部乃畢寒暑寢食以狥之周馮二公亦多所屬定編摩有序佹及成書而比部用積勞殁其弟給諌君𢎞庭過金陵紀厥遺文踵而成之勒為三十五巻本書汪道亨序光宗實録四巻刑部侍郎朝邑王之寀纂鳳原文獻考監軍道商州牛維曜撰西安府志咸寧縣志俱吏部尚書咸寧王紹徽撰子史録古今事物考盩厔縣志終南仙境志俱僉事盩厔王三聘撰李氏世遺録三巻左通政蒲城李應策撰繕黄實政録漳州府知府渭南張延撰丁祭考議二巻郃陽􅑔浤撰孔廟正祀考學正扶風蘇體撰撰年號録國朝提學道蒲城李馥蒸撰陜西通志二十八巻朝邑縣志四巻洛川縣志二巻齊雲遊記一巻俱知寶應縣事朝邑李楷撰姬宗世譜録鄠縣奉祀生員姬籙續序曰沛然於丙寅春入都奏請致祭祖陵及至鄠縣祭王季祖陵因思鄠縣為元聖退老告終之地豈無公族世居者乎乃訪之邑侯李公以姬姓諱籙者對遂為先容見之出其家譜印証為七十四代孫乃執籙手囑曰尊尊親親祖訓固昭昭在也尚其恪守以無忝家聲本書東野沛然序南陽府志宜川貢士劉漢客撰闗中文獻畧長安舉人任温撰王氏續乘四巻朝邑王元濬撰學政記畧河南提學韓城陳朝君撰使交紀事一巻知南康府事臨潼周燦上序曰是編敦詩說禮闡戴仁蹈義之實學於殊域且紀其道里沿革民物風俗以及羽毛卉木之微可為輶軒採風之盛事云本書吳興祚序闗學編增補十二巻鄠縣王心敬撰陜西通志巻七十四
