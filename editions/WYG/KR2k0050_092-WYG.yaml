body:
  text: 陜西通志巻九十二藝文八記二増修華清宫記元商挺始余從先大夫宦遊長安道過華清因讀古今名賢石刻其興廢沿革之迹畢陳於目前重樓延閣層臺邃沼雖不逮承平盛時䂓模制度宛然固在迨兵燹之餘居民播遷所在宫觀例隨灰刼華清亦不免莽為薉區矣嵗癸丑復過故宫意謂蕩然無復向日及見屋宇修整階序廓大為殿者八曰三清曰紫㣲曰御容曰四聖曰三官曰列祖曰真武曰玉女為閣者二曰朝元曰沖明為湯者二曰九龍曰芙蓉鐘鼓有樓靈官有臺星壇雲室蔬圃水輪以次而具丹堊藻繪燦然一新若初未毁而又有加焉者詰其故主㑹趙志古輩合辭言曰先師清平老人趙志淵自洛川還過驪山西顧彷徨憫宫室之彫廢慨然以修復為事乃命其徒剪榛棘礱柱礎陶瓴甓勤垣墉於是四方道侣各執其藝來㑹宫下鼓舞欣躍咸願薦力土木之功以時竟舉斜傾者起之腐敗者易之破缺者完之漫漶者飾之又得太傅伊喇公總管田公輸貲助役相與翼成稍稍興葺僅見倫叙事未竟不幸厭世志古等才謭力綿大懼不任以墜宗緒自是脅不霑席食不甘味饑寒疾苦不以累業者逾十五年始克有成敢以記請庶徵石書辭俾永傳焉余謂秦中名山水多矣可取者惟華清為最闢門可以瞰清渭登髙可以臨商於髙甍鉅棟綿亘盤鬱寒藤老樹䝉絡揺綴而漢唐之離宫別館咸在焉斯則華清之竒觀也又況東西奔走實當衝要而往來大小畢慰其意此誠與時遷徙應物變化無所往而不宜者也向非清平𤣥應感人何能新宫宇還舊觀非志古竭力盡悴曷能勤堂構紹宗風而喑無一言是使師弟之功泯然而不傳也聊推次營造始末刻諸石用紀嵗月云時中統二年九月念五日商挺記重修奉元路廟學記虞集集聞之兹土也昔者周公嘗治而教之矣禮樂其具也出之於宗廟朝廷之上行之乎學校井田之間因其秉彛好德之懿而詠歎夫天命之不已因夫卦畫示人之藴而發揮乎變通之無窮致嚴於閨門袵席之㣲而推至乎天地神明之著致察乎時物衣食之末而究極乎輔成化育之功耕祿之均施之四海而無不準也祭祀之達傳之子孫而無不保也三代以降人文莫過焉世降俗易仲尼猶有不復夢見之歎而況於千載之下乎漢唐之遺迹無復有者又何有於教之可言耶昔者程子得周子之傳而起於洛邵子在焉横渠張子特起於關中其學一原也而尤有意於制作之事焉程子之言有關雎麟趾之意而後可以行周官之法度此周公之遺意而張子之志也與正䝉之書學者受讀訂頑之銘推極乎事親事天之誠而程子以為其修辭之不可及其智勇之所造非振古之豪傑孰能與於此而其言曰貧富不均教養無法雖欲言治皆茍而已議與學者買田畫井正其疆界不失公家之賦而立斂法廣儲蓄救災恤患厚本抑末以見先王之遺意而當今可行也又曰今欲以正經為事自古聖賢莫不由此而始逺者大者有所未及而可於家庭見之又曰學者且須識禮可以滋養德性集義養氣蓋有所據依即有常業可以見諸行事其端緒可見如此方是時關洛相望表裏經緯孟子以來亦未有盛於此時者其為言曰衣被天下後世至於今賴之詠歌周南者不亦歸而求之有餘師乎世祖皇帝初年覃懐文學許文正公上書與師友講明於斯文矣儒者之效遂大見於當時而至元大德之間猶有守志勵操之士髙蹈深隠於其鄉朝廷不愛尊爵顯位以延致之以表式於四方聞其風而及其門者亦多矣未必其寂然也夫其風氣四塞之地土厚而水深其生人也質直而忠厚是以文王周公之教易行焉仲尼所以賛諸易詠諸詩載之於書者莫究其事至於關洛諸君子而大明焉舍此無以為教矣學於斯者思周公之為治以極於孔子之道因横渠之學而博通乎濓洛之原則化行俗美賢才衆多豈不於吾雍學而見之乎詩曰南山有臺北山有萊樂只君子邦家之基不有聖賢之遺訓則斯焉取斯請以諸大夫君子而與其都人士講焉始入華山至西峯記明王履寓長安之踰年新豐丘丈來偶談登華山所得且慫惥余遂諾焉時暑溽期秋初偕余再登七月十有八日至丘丈所而丈適病餘尚困命其外孫沈生相余騎驢行并以日夜越二日暮抵華隂遞運所託宿焉大使黄某具酒肴待因以所登難易為問曰官此六年去山僅數里懼弗勝興作隨止聞遊者及青柯坪仰瞻多自沮而退以故卒不敢往遣其僕慣登者二人導余翌日早食畢行近山口泉聲琅然稍入殿角出灌木中僕曰此玉泉院也至院外觀希夷先生塑像熟睡如生立清樾中風泠泠來鬢鬚動揺而塵垢之面如濯諸道士出迎具茶果言緣險難甚草木交㦸不可以禮服贈余一杖謂扶到青柯坪而止以上則不可杖矣於是冠履外服等悉留院中唯幅巾短衣行縢草履而已沈生健善步跣以行二僕前道旁山對開神意飛動未遽行且覽其槩於時宿雲在嶺羣峭未出餘烟自旁山上騫朝陽射其端壁立之妙荏苒可得風觸壁一鳴翏翏焉而往調調焉而不知其所窮余善畫相契時深遂凝立四人已及逺呼予且趣急登而安知予之所得不在急也地多樲棘且蘙薈不見路二僕予離輒誤岐之他相錯稍不謹視則觸面􅇢髪跼且蹐杖攀以進予素不善步驟登累息不能制必竢定始行予時以紙筆自隨遇勝則貌故行視四人愈遲四人常先若猶豫然然沈生知予見予䇿亦䇿予憩亦憩予僮雖不解畫頗解吾癖遇竒樹竒石即報亦頗慧貌不能盡者俾記之及澗而斧斤聲雜蟬鳴鳥哢中出輟䇿聽之謌伐木丁丁鳥鳴嚶嚶詩以過泉淙淙然如琴如筑如佩環不少休其停滙處澄澈如鏡㣲漣動揺日影上壁中多紅白礫予盥頮清寒透骨試嘗焉甚甘美憶嚮年飲吾鄉陽山泉不知去此幾十倍澗北絶徑處實如柚者下垂僮以為橘越險而擷之蜇口畧不可食棄去峛崺西轉至小石洞洞外平石如枰中可㕘坐恨不攜本道輩絃琴于兹以寫幽抱既而坐枰上書所賦詩而東巖方洞適與之對意靈詭内􅅗遂相率以入僕曰此希夷匣耳蓋其𦵏處也棘梗道不得近因疑匣為函恐指所盛蛻者而俗謂之匣與辰巳許及上方峯峯直立鐵鎖下垂望峯端漫不辨何似但峯腰雜樹倒懸斜倚而幽意可人鏁兩畔多小坎從下達上深可二寸僅容履端蓋登則緣鏁以託足者僕曰上有道士王友巖居之不下峯唯玉泉一二道士時裹糧往食之鏁盡處乃石罅號西天門北峯蓋唐𤣥宗妹金仙公主駕鶴昇仙之地而門則𤣥宗覓金仙以鑿焉者也從門入屈曲以上盤折數峯頂始及友巖所居南望連山不知止於何所上無雜草唯細辛一方不多産予雖揺中而憚險弗敢進坐峯根娑羅樹下瞻悵者久之由峯根北折度狹徑容僅一人徑外則壑谷類也地不生草皆敗葉所覆行葉上不知窊隆躡空輒仆予誤躡徑側一失脚幾墮厓下偶旅跡幽翳中古藤鬱屈可畏正躡樹根進葉卒然鳴疑以為蛇也注視者久樵人適從上來予問青柯坪逺近不對唯放謌倡答而去出樹外石突突立中豁若斧劈然僕曰此第一關也鄉兵亂時民逃入山壘石絶此遂全予視關内尚亂石旁聚無數關右二黒石虎踞因坐摹之忽不知四人所在厲聲呼不應跡之半里所則皆坐澗邊投石于澗中以戯此處水深路絶當驀澗賴澗石㕘錯不逺躐過既過回視其澴瀯衍漾砯衝之態而吾意適永不能以遽釋幾失吾主澗外瀑布正懸南崖端下激樹幹飛沫成雨㸃因風容與久而後墜又百餘步則第二關也類天作亦似人為視第一關壯雖不逮而險則過之關中隂風勁甚不可留促步出返顧所來則一青靄爾復登頓冥宻以行詰屈數百折見平綠靄然林端既至青柯坪也山恰半從入山來悉﨑崟側塞夷者唯此草長過人岡之上有神祠焉礎餘瓦缺像設多壊祠旁小室中敝竈猶存知舊有所主也日正午少饑初擬假爨於此不意荒寂若是幸持𤓰果餅脯分食之汲祠畔井止渇日漸熱足軟不可支卧祠前石階上適二道士自上下問焉蓋玉泉之侣從西峯還也與之語雖無所竒亦善遺世者自山口至此其石之奔突倚伏出林翳樹者殊形詭觀殆不能以物擬祠西南則始攀鎖處也置杖草間聞松風飀然此以下皆雜木無松以上則純松矣蟬鳥遂絶詩人謂山深無鳥聲信然鏁曳危石上僕先進予亦攀過路縈紆并石根極隘瑟縮以行路斷接以木行則揺少選一峯前障不甚峻上大下小所謂巘也無草樹黒黄白相間上有赤白二圓形僕曰日月巖也豈生成者歟復行餘二百步直岩嶄立有短橛閣崖罅為級如梯鎖旁垂問之乃百尺橦也橦直絳切自下突上之義蓋聞之山中道士云級每腐或缺掇級以上先輕躡試之然後置足過此又有類是而愈長者千尺橦也缺腐亦然縱僕輩欲援何以為力既上凡石之如嶠如扈如巋如岊者眩視不可數抵前崖逕忽斷崖峻削無可為徑者即崖腹綴小木如杓當絶谷之上凡三接始及徑鎖亦横綴崖腹余目焉跡未及而先痿矣遣四人前度慮逼吾後以振也余趦趄握鏁寸進之閉聽壹視步歇半木伊軋鳴東野登閣尚稱脚脚踏墜魂吾今何稱哉因自咎以親肢履此險其孝安在昌黎慟哭遺書以訣者即此非與半時許乃得過問諸僕僕曰老君離垢也信仙凡之隔如是復斗折道松林中翳不見日毛髪為之聳然沈生謁山神祠有禱懼蒼龍嶺之迅風也既至老木赤立惟東南一枝僅存㣲有葉根亂布石上若萬小蛇攅綴蝡動余駭焉貌其大較因思平日畫樹雖搜竒獵怪致巧寧得似此所謂畫不神於所倣而神於所遇也然而望蜿蜒入雲勢未知何以處此嘗聞登者言度嶺慎勿旁視視則惡風至危不可度嶺凡兩折中突旁殺如背色正黒鏁當背上并鏁皆小坎亦猶上方峯所託足者二僕先示所以登余匍匐踵其後以式大喘不自禁四面布伏嶺背竊窺其旁則深不見底安知其幾千仞但松頭濈濈出没蒼烟中萬峯羅拱向背髙低斜正起伏若翠浪洶湧相後先秀不可狀風䬃爾有聲衆籟齊作沓盪奔激逺近胥應憶登者言遂膽掉股栗不能動去上折無幾視若天淵然風稍止尋進而僕已過上折矣余强勉盡一折日少昃愈熱余裸上體猶流汗不止行上折覺稍便漸熟故也自嶺下仰觀將謂頂絶無復過此及嶺端則峯頭挿雲尚不知有幾里由是筋骨如蛻喘促弗暇出一語倚樹息四人則相語角健若賈勇於余者時雲方滃然進退開合若相與相背往來四峯端悠颺不已余神凝其間忘所以事事者僕輩弗是喻促以西峯尚逺勿稽遂作以行至此則少土皆徑於石鏁縱横罕無鏁者又越五六險始及鎮嶽宫宫在西峯頂東諸神列坐不辨誰何松罅間金壁參差與日争炫者嶽帝廟也廟後松極森邃風一振之掩苒之形紆徐之韻由松端倐爾東騖接之既泯忽又如在余行遲常殿四人已及廟笑語未竟而曼聲速余至則烹茶熟矣道士王老師欵坐廟之前則其居也四壁蕭然余意其以一身而處於荒冷僻絶之區無所畏無所悔者非有得其能爾耶茶罷徐叩所有則平平焉耳迺知其不得於見道而得於寡欲也牕在西壁隙有光啓牕而其居則庋之懸崖之上俯瞰峻谷不見所極唯松頂麻萃斜距牕二丈許峯壁峻拔自峻谷直上霄外畧無突陷真所謂削成者壁上一松寄之璺間根直下如懸死蛇枝稍正拂牕手可接松實纍纍余投以斷甓弗中墜下觸石且墜且觸聲如從甕中來良久始息至是則頹陽向㣲霞彩漸發倚牕望西北平田無際荒烟莽然中有渭水委蛇如龍日光射水中金閃爍不敢正視居之南乃大岡頗類龜背色墨殊粗岡之下羣峯如攅劒如束筍無一渾然者予將摹之而嵐靄迷漫弗果東望玉女峯殿正在峯頂雪壁爍日殿旁有物似人非人往還松樹間逺不可辨岡稍南大跡一岡上深可三寸長四尺餘旁鐫巨靈足三字竊謂力能擘山其足跡僅如此得㣲不能載其形乎且東峯掌形自峯端達峯底假使所傳果然則如彼之大手而配以如此之小足有是理耶東則東峯玉女峯昆季相倚唯南峯嶻焉獨出姪視三峯薄暮不及往遂宿焉風怒號御裌猶冷視蒼龍嶺裸體其寒暑之異迺爾哉南峯記前人拂旦起王道士出華山記相示自峰厓洞谷池潭外其宫觀古跡等不可計道士雖老而兵餘湮毁不甚識又龍鍾弗能余偕故無以攷食已纎雲不痕旭日初吐露未晞具行縢草屨以適南岡外皆松林也裁入笙簧盈耳既不見天寧復有露但葉聲隨足悉屑可聽屈盤行林中迤邐漸髙境意交至弗暇接將謂地昇恍不記自西峯來也松皆合抱森若筍擢蓋以險而存非如他木之得全於擁腫也寒不生陵苕唯蘿薜青青以與松永神則有之而樵斤不及余感其得所棲焉于吾中永依依不能去行二三里稍疲坐松根養力而四人已在石梁外髙唱曰南峯至矣起而前僕曰此希夷避詔巖也余凡行以目昏不敢流盼竟不知已達巖底因仰首怪狀可愕巖上覆如屋似蜂窠然頗類太湖石或類濤波蕩潏所為淡黒津津焉余坐觀不厭自謂不世竒逢細貌之僅得髣髴西南角一罅明透可側身入余命僮掖入之及罅半見罅外樹梢動揺日影流罅中明闇稍分上滴瀝如雨隂氣挾罅風撲人巾服皆潤下濕不敢進僮曰壁有鐫字四行不識字不辨余眊亦不之識俄罅外喧聲意游者相與僮曰吾之伴三人也僮因呼其名答在朝元洞待由是自巖底北旋嶢兀中度小𣙜又度架枝代𣙜者三若波舟之所揺蕩古松一根扳卧壑上閼道勃窣踰松上過得真武祠遂入謁龜蛇在前記晦翁謂其本北方𤣥武宿非實有此神蓋其教中設為形像以神之耳余謂乾魚朽木題以大王居士便能威福此何足怪從祠畔上磴扶石䦨轉峯角皆石版布道䦨外臨絶谷試㣲瞰怵然神􅋏噤㾕不可當閉目低首倚壁始定峯南面上下壁削亘東西皆䦨也異焉伏石版下覘蓋鑱壁成堮以疊石置䦨面之中窽石以入則所謂朝元洞也深可四丈廣近之髙又倍焉純白如雪中設三清像諸神旁䕶凡供奉之具咸備余問故於主者岳師師曰昔賀老師營此四十年雖鑿焉而不敢碎石下墜墜則雷動龍􅅗故也自爾且鑿且運不勝其勞功未就而師亡繼以其徒甫就洞外西數步師又穴石版鏁以下達西折則師之避静處也沈生等躍然往觀予不敢從倚䦨待二時許還生曰穴之下則鏁雙垂鏁盡則版道也穴道相距不知幾十丈石杙挿壁以當其中鎚鏁下至石杙少息復縋至版道又少息然後攀鏁西行數十步始及避静處回視版道則載之銅杙之上而銅杙則挿之峻壁之中外雖有䦨木久多腐以鏁是賴掩其振揺石杙一銅杙十七竟不知作時於何所置足䦨之外下見松頂如灌莽在沓冥中師去此幾時其室其爨所猶在然非慿土慿于塊石之突崖耳室畔石窪亦不深水則滿豈師藉是以食飲者與室之西則別巖也巖類俛首形遥覆室上上鐫全真巖三大字赤色以實之雖知人所為然上不可下下不可上其履虚而作之耶何其神也吾版道之初躡也知有版道而已奚暇他及既至而得其所以危是心也始不知止於何地我輩壯年恃力不少怯今精奪於此矣去洞沿故路東行降八九折緣磴復升巨石錯峙石分處如甈下視類井底黝不見物然兩木倚石可下問之僕僕曰安真人肉身所沈生率三人下觀余坐石上及還談真人坐石龕不壊具衣履如生人抑坐逝處耶躋石以望見峯巔羣松如沃峯背類覆盂麄散如礪可縱步四人争先若飛余至此已疲甚足不吾許殆及巔憩龍潭旁掬潭水頮面潭有三深者不過二三尺僕言雖大旱此弗枯竊意龍􅅗淵深恐未必在此然神物故不可以常理推也誌雖稱頂有池生千葉蓮覓之不見不知當時騎茅龍天飛者其由此非歟最髙處一松孑立余倚松望信乎諸峯羅列似兒孫矣雲適生從玉女峯東峯兩間出倚風作嬾態欻突然北涌似巔崖狀既而復還漸幔於松巔不動如憩而山北所見皆漫漶不可識意彼或仰瞻吾固在雲表也青蓮居士謂呼吸氣想通帝座非此而何既下又東行至龍神祠祠之外小碑一辭翰具美有道渙而為氣氣運而為精精變而為神神化而為靈等語因愛而再誦忽祠畔二小鳥下上峯壁不鳴青灰色頗類鶺鴒尾稍短不知其何名岳師曰此鳥相與久矣飯熟則乞食於我食已即去或置粟掌中亦躍以就啄師年八十五矣兩目俱昩然往來祠洞兩間陟降如睹非有道者與不然安得人鳥相忘如此東峯記前人由祠北降而東取道松間忽有物行松上大如鼠尾芃芃然聞人聲矍視不復動僕輩拊掌激之越樹去行二里所至山祠入觀焉山水畫滿壁頗似范寛家法而渾不及范余笑曰此中著此畫作者固無足責命之者誰歟老君殿中居楊師迓余余謁之再拜因思吾夫子謂見之猶龍口張而不能嗋吾安敢不拜師出果茗松花粉供余并以萬年松數十本為贈蓋巻栢之屬而不屈者雖有松栢名不過石上小草耳巻栢亦以萬嵗見稱於本草則知二物固皆槁而不死大松蔽峯頂清悄幽閒殆不可為情然過青柯坪來松弗他雜唯白楊一二間之毎風韻松林楊葉作䇿䇿聲如按如節彼吹竹彈絲敲金擊石者其近歟余偃仰是間意風味未減貞白殿之東則東峯盡處也下望平野襟懐灑然逺近諸山相闖于烟蕪雲樹之表黄河隠顯東迤如帶潼關岡壟積蘇於河濵遐覽未周雲倐隂漸黒平野皆晦予疑雨東向立風颯然自西南來萬松皆鳴松實交墜日斜透雲罅出雲影漸北逝遂散余與沈生磔松實啖之索苦茗於師以助其勝俄林中有聲若隕物然予怪而覘之僕輩乃在松杪摘實以亂擲也於是俾沈生囊頓以備騎驢疲困之用稍南一煬突出松底下磴迹之得石室焉曠朗可容四五十人都竈湢所等舉不敝迺知居者固盛於昔今唯一人者荒涼無養故爾禽聲不上青柯坪雖因於髙寒而亦因於無養也聞是峯可翫日於天未明之際而糧少不敢居唯問師仙掌何在師指在峯側而玉女峯可迫觀於是别去玉女峯記前人降而西可二里許東折漸上時正午稍熱渇且饑遂團坐松隂中食所攜新棗至是無磴多倚木枝根石間危且弗固因枝根為級皮脫滑不可登五人相與援推以進凡二十餘處既盡則玉女峯頂也嘗聞女道楊氏名妓也少年入山今耄矣初食松皮八年始火食或絶火則枵腹坐偶大雪不粒者七日亦無恙竟日夜弗卧余心敬焉因訪之石室中尸坐如寐見予起相見具客主禮笑曰此山罕聞人聲或聞之林中則指以為異君何來之異耶余以所癖所偶為對就問其入山時才三十有七嵗今已七十三矣乃自云一生無疾觀其顔雖非丹而精神粲然步甚健固知其有所養也初見未敢叩引余步松間風來激峯壁直下如箭㝷穿于林中松葉皆沸鳴度壑而去相與立隒端目送其披靡者因指西峯東面窊隆如蓮花謂余曰此正所謂西嶽蓮花峯也安有峯頭池井之産予疑焉未之決至玉女殿道玉女所由觀洗頭盆蓋石上一圓坎耳水紺碧不乾集仙錄稱有五十臼不知何據殿右觀韓姑姑遺蛻遣僮撤所障亂甓啓棺蓋視之卧棺中如初殁者楊氏曰殁幾三十年矣唯槁不腐以杖摘其足亦不僵有道者乃如是蓋楊氏師也大石如龜殿正坐龜上而楊氏石室則藉龜腹為之覆余問以昨之所不能辨迺楊氏采薪以虞雨雪之或及也由殿前踰石梁北眺崇岡廓然貍豸不能進岡半有大璺焉楊氏曰唐𤣥宗禱雨抛簡處也下通黄河雖未必果然恐或有自復旋至石室前指以迫觀仙掌所在余與四人循東峯北行斯須林斷豁然乃東峯之西北壁而玉女峯之東北巖也巖西努如鳥喙距東峯不逺上豐下縮瞰即魄褫努處山松一生附巖側不見根出巖上者三之一中無鱗而光僕曰此捨身樹也游者抱樹轉數匝則獲福予僮聞即抱之轉不休峻遏乃止巖正當仙掌可察遂坐憶王涯仙掌辨謂峯有五崖比壑破巖而列自下逺望偶為掌形俗傳則曰巨靈擘剖掌跡猶存余因思之所辨又似得於傳聞使果見之寧作是語不然則亦逺望而已未嘗如吾之近觀也殊不知膏出於璺溜以漸淡黄㣲白間之黒壁中上則五岐下則片屬岐者如指屬者如掌復有細溜無數雜五岐間逺望之則惟見其大者故五岐如指耳寧有崖比豁破巖而列哉由此觀之俗傳固非涯辨亦未為是且膏所溜處比比皆有豈惟此掌為然山石本黒其或淡黄㣲白者皆膏之所溜使然也此掌外唯日月巖最多其次則東峯西壁近於楊氏之石室者其色其狀與此掌溜痕絶無少殊但彼不類物形故不以為異而不稱耳雖歴代碩儒其詩賦諸作舉同然一辭於巨靈之擘而不之䆒何也然則天下古今貴耳賤目訛以承訛者安知其幾多耶將暮假榻楊氏石室中坐定㣲請所有則答以待盡而已再請亦然余知其弗襮弗强也歘有光如燈度室前松林中僕輩驚指楊氏徐掩其户曰與爾何預豈記所謂昭明者歟此亦可見楊氏之有定力矣北牖漸明余出望月然隠於東峯未之見乃與沈生步殿前以待之二更許光射萬松中碎影滿地風颸颸然自歴三峯來松聲殊絶無他音清固不勝寂亦難處因退寢夜過半大聲疊陣如濤雷然孔隙皆唱喁明處寖黒知雲風欲釀雨也然僅攜三日糧遂懼數視聽竟不得翕目迨曉風幸息曙光復來趣具飯下山至都土地祠僕還指南峯端如練者曰水簾洞也以昨之弗知少立祠畔以聽杳不得所聞誦徐凝惡詩一噱而去午及青柯坪覓所置杖亡矣然降比登頗易步可與四人敵因思宫殿林木得全於上者險是賴耳然不知鐵鏁之所經始路何以識人何以登也鬼與仙與皆不可測已余學畫餘三十年不過紙絹者展轉相承指為某家數某家數以剽其一二以襲夫畫者之名安知紙絹之外其神化有如此者始悟筆墨之不足以盡其形丹碧之不足以盡其色然是游也亦非紙絹相承之故吾矣箕踞石上若久客還家而不能以遽出也三步回頭五步坐迺於我乎見之雖知毛女峯鄰於上方而不識其處僕言王刁三洞山外之西及玉泉院則日已在西南隅矣弗果往午飯已熱如炙假籧篨卧院前亭上繞亭皆泉聲咫尺不辨人語因憊竟睡去二時許始醒諸道士索留題爰口占書希夷像之壁間以出嗚呼生大華之方由大華之側古及今安知幾許然愛焉者亦每以艱險自畫而不之遂雖少陵枕藉關中亦望焉而止耳天下竒絶處固有係乎緣偶不偶也郄詵謂山行洗盡五年塵土腸胃吾塵土五十年不意中得此行雖遘一遺十而秀拔之神雄峙之觀亦足以暢夫一生之拳跼矣昔人言會心處不必在逺竊意未得至此恐未可謂之㑹心余子平之累已向畢而遐蹈未能者以母氏之頽暮故也掇其大都以志竒遇巡撫陜西都察院題名記楊一清今天下藩省重地朝廷勅遣内臺重臣以臨蒞之謂之巡撫巡撫之職凡有司政務若錢穀士馬若刑名若賦役農桑水利之類悉聽剸裁文臣自方伯監司武臣自連帥偏禆而下咸奉法令遵受約束事有益於兵民得承制以便宜從事不拘文法焉可謂重矣陜西古稱秦中天府四塞之國内領八郡綿亘數千里北接沙漠西控羌戎為四方根本樞要之地若延綏寧夏甘肅三鎮雖俱宿重兵各有内外重臣仗節握符開府其地然饋餉供億率仰給内郡至於屯戍之兵統領之將多自陜西調遣三鎮不得專焉是其為任又非他省巡撫比矣凡巡撫闕人吏部請于上于廷臣及方嶽中舉才行素著者二人以聞而親簡其一用之比嵗陜西巡撫闕人則又多自他省巡撫有勲績負時望者改命而來蓋難之也𢎞治戊午都察院右副都御史汝南熊公自巡撫山東移鎮于兹顧瞻行臺宏麗靚深稽閱庶務察凡所以安内全外者規畫井井纎細備具嘆曰前任經理之功大矣求其名位世次之詳不可悉得爰命有司稽之籍牒詢之父老礱貞石將刻之乃進提學副使楊一清而屬之以文惟㕔事有石題名有記非古也而後世行之於政治不為無助列賢不肖有觀戒之義焉識寛猛弛張繁簡先後得損益之宜焉邦人之去思士林之仰止率于是乎在而豈徒哉按陜西巡撫宣德間吉水羅公汝敬以工部侍郎始授兹任正統間姑蘇陳公鎰束鹿王公文皆以右御史出入更代而鹽山王公翺慈谿張公楷繼之其在景泰則有若萬安劉公廣衡平定耿公九疇其在天順有若廬陵王公槩至于西蜀陳公玠嘉興項公忠鈞陽馬公文升青神余公子俊常熟程公宗長子阮公勤舒城鄭公時皆成化間相繼而來者也重慶賈公奭泰和蕭公楨束鹿王公宗彛安成張公敷華靈寶許公進則自𢎞治間相繼而來者也維今熊公實繼許公後蓋自羅公而下所及知者凡二十一人或以惠愛聞或以風力顯或以討叛樹勲烈或以修築城塹疏通水利著勞效進位尚書者已十二人位兼保傅者五人為冢宰者一人為大司馬者三人而今在朝者方來所進固未涯也其無聞於世者纔一二人爾嗚呼可謂盛哉夫惟天下之重地當用天下之正人夫惟天下之正人斯受天下之重任之數公者咸以正人被簡擢臨重地其卒當天下之重任而有餘力也宜矣繼自今巡撫于兹者宜何如紹承之哉國家設郡縣以統民設衛所以統兵慮其不職也而領之以三司復慮三司之不職也而糾之以巡按又以巡按嵗代不常且官有常職未免為文法所制勢有所格柄有所不專于是乎有巡撫都御史之設焉今之民與兵皆創傷困憊之餘愁苦之狀有不忍言者郡縣不能為之所望之三司三司不能為之所望之巡按又望之巡撫至巡撫則止矣巡撫不能為之所民將復誰望哉故為巡撫者知為朝廷愛養兵民而已政有為民病者我得而釐之事有為民利者我得而興之諸司百執事有剝民財窮民力殘民肌體以行若私者我得而除之宿奸鉅盜慿藉以逞為民大蠧者我得而發之坐一堂之上有兵有刑有挺有刃有斧鉞有華衮有陽春有霜雪其未來也以無心待之其已來也以至公將之不詭不隨不矯不亢不撓不奪為之在我者盡吾心焉而毁譽榮辱成敗利鈍皆有所不計嗚呼為巡撫者不當如是邪抑此皆數公所嘗行而已效焉者余將致忠告于後來意無出此故承熊公命于題名之石極言之公名翀字騰霄舉己丑進士四獻祠重修記張士佩古之邦獻没世祠于梓里禮也蓋一以欽崇前哲而型範在焉一以風厲後進而教化在焉故鏡燭治體者率重之然必材犖而庶政咸績民皥而四境乂安亷髙而經費弗匱乃能注及典禮墜舉𢎞曠也藍田之北故有四獻祠祀正愍公昆仲嵗久祠圮壖削幾半邑令王君慨焉力復之更飭棟宇増拓簷榱且東建簠簋之庫西創燕胙之堂前為儀門而儀門左右為黄冠之室蓋司香司帚者也前復為大門三楹匾曰四獻祠垣周祠外瓦覆垣顛工始萬厯己亥嵗孟夏以庚子嵗季秋工訖予兒惟俶適得其門歸述𢎞碩皆永圖也蓋懲前修未再紀輒多就圮爾按史吕正愍公名大防字㣲仲以左僕射同范純仁相垂簾聽政者八年能使元祐之治隆比嘉祐而厥兄直學士大忠字進伯知代州曰契丹使求代北地神宗將從之大忠曰彼遣一使來即與地五百里若使魏王英弼來求關南則何如神宗曰卿是何言也劉沆曰大忠之言社稷大計願熟思之厥弟宣義郎大鈞字和叔從横渠學中乙科能踐履師說衰麻𦵏祭冠婚膾飲慶弔一本于禮關中化之為從事日以剛直折种諤卒脫轉運使之禍厥弟秘書省正字大臨字與叔學於伊川通六經尤邃于禮元祐中為太學博士遷秘書正字范祖禹薦其好學修身如古人可備勸學未及用而卒據此則四公之獻彰彰矣然和叔鄉約今為令甲而與叔選舉論奈之何施行有待乎其論畧曰為國之要不過得人以治其事今任人以事不問其才之所堪如此而欲事治未之有也今欲立士䂓以養德厲行更學制以量才進藝定試法以區別能否修辟法以與能備用嚴舉法以覈實得人制考法以責任稽功此善治之論也今去宋逺矣取人而用不問其可任何事猶之宋也焉得繹及選舉之論而為取士必得之制乎取士必得則薄海内外善治班班矣然則四公者立德立言立功萃一門而傳百世宋因之代稱多賢于國増重矣豈特光秦中獻藍田已哉祠協典禮王令拓為修建有以也夫有以也夫祠依墳墳廣廿畝祠廣十有四畝而墳祠之壖祭田寓焉王令名邦才字汝用號西皋河南盧氏人遊龍門記吕柟龍門在秦晉之間萬山之㑹禹治水竭力之地形勝甲於海内久懐遊覽而未獲内濵子曰天下之美不努力一至惰違不可補他日谷泉子西巡亦猶是興也乃四月之初實齋王子以隨谷泉子之清澗也先自安邑至河津以俟二公明日谷泉子自萬泉至又明日予自解州猗氏至又明日内濵子自運城至是日雨甚内濵子陟降懸坡跋涉泥潦不倦也既且集二公曰如來日霽天貺佳期矣來日者月五日也果霽於是實齋王子先往龍門予繼往以同俟二公道過辛村謁卜子祠召其雲裔撫問焉有題詩北至清澗風大作從者曰俗傳食豕肉詣禹廟必風予未諾然以懾寒入福聖寺加衣兼錄途中作風滋甚反袂䝉面衝風而往過神前村始至龍門山麓乃緣棧道步屧而升一吏外持以防惴墮既謁禹像風益焚輪起撼松栢騰砂礫上蔀天日下掩河汾肅肅然森森然正若蛟變虎嘯而禹在殿上使羣怪持雷斧秉神斤以闢龍門也然實齋席設亦無豕肉王子曰俗傳於義無害亦可從未幾二公亦經卜子祠而至既拜禹升殿有攜尊從者置之神几内濵子曰禹惡㫖酒可避之東下谷泉曰禹所惡於酒者㫖也此酒不足以當禹惡酒行移時食且舉風息食有饅頭飣其饀者豕又不風不知俗傳者何也土人又曰此地日有潮風蓋兩山夾立而大河中出嵐氣縈􅂞空洞薄觸即颼颼無所於散此或其真云若乃食豕犯諱厚誣聖人於經無取焉食既乃游觀四壁金碧丹青十三彫謝蓋自六籍羣史四書諸子凡言禹事者無不開方絢識且筆精意逺非時人可到殿記在元貞年間此壁之圖必其並興關中人稱岐山周公廟畫殆不過是也既而進謁後寢見塗山氏像止二嬪侍側而冠裳樸質猶可想見古風出廟西南乃捫青蘿緣曲磴以上望河樓即谷泉所改吞吐雲雷樓也在龍門東闑之上蓋梁山中斷而東峙者也前臨中流上作石室旋柱其外以為傳廊室塑十閻羅像俗言至此絶險之地與死為隣也樓外俯黄流凌白雲孤山直對其前而雷首中條𣺌𣺌冥冥乍見乍没皆入望眸從人舉爵者三而風又作不可留乃附僕背蹴蹬而下二公先過流丹亭實齋王子比至河堧以觀遡舟予謂斯樓不可無識也乃獨上寫一絶於石室東壁而下二公使人召予至流丹亭北倚石崖其南半懸中流栢柱斜度其下上用板棚鑿板如井口以汲流即取勺水於滄海也亭匾則白巖喬公小篆谷泉子甚羨取焉下亭乃從内濵子比就實齋王子於河堧路西即河其東皆怪石層崖崒嵂﨑嶇不可以步而内濵飄裔如飛予力追不能及至堧則西山東轉北遮河流不見來處灘環望四面皆山如人院落其前則兩山拱峙正若龍門有煤舟自北絡繹而來棹歌漁唱不可殫圖此其為禹穴乎或曰龍門之外河洲之上青草萋萋黄沙瑩瑩視河之髙不過咫尺若遇秋水泛溢雖百里之漲千尋之濤不能浸一坏土焉是則禹穴者也内濵子曰禹古今之大智而乃喪身于此乎谷泉子曰會稽亦有禹穴云在其河之堧方欲即舟北行以求所謂元流三汲浪者或曰在金門五七十里或曰在吉州百餘里不能往徘徊悵望而西方孤雲與寒雨驟至乃即挽僕南返蓋天下竒觀不欲人盡覩而風雨幻忽雲雷時出亦此山之神粧㸃修飾以聳來者之瞻乎然斯遊也不可謂不索其隠而得其竒矣故既歸夜夢猶在此山之上明日以告二公二公曰子可作龍門風雨遊記遂分題為四韻一詩關中書院記馮從吾余不肖偕諸同志講學寶慶古刹有年矣嵗己酉十月朔日右丞汪公憲長李公憲副陳公學憲段公聨鑣會講同志幾千餘人相與講心性之㫖甚具驩然日晡始別瀕行諸公謂余曰寺中之會第可蹔借而難垂久逺當別有以圖之明日即以寺東小悉園檄咸長兩邑改為關中書院延余與周淑逺諸君子講學其中而汪公復為書院置公田延綏撫臺凃公聞而嘉之以俸餘増置焉講堂六楹諸公匾曰允執蓋取關中中字意也左右各為屋四楹皆南向若翼東西號房各六楹堂後假山一座三峯聳翠宛然一小華嶽也堂前方塘半畝䜿亭于中砌石為橋偏西南不數武掘井及泉引水注塘并覆以亭二門四楹大門二楹舊開于南緣隣官署冠蓋紛遝深山野人不便厠跡因改于西巷境益岑寂且不失吾顔氏陋巷家法也西巷地基乃用價易民居大門外復搆屋南北相向各三楹門北隙地復搆小屋數楹仍居數家以供洒掃之役前後稍為修葺未及數月煥然成一大觀矣松風明月鳥語花香令人有春風舞雩之意而劉郡丞孟直復為八景詩以壯之一時同志川至雲集吾道庶幾興起而余愧不足以當之也一日講畢諸生請曰自昔書院剙建皆有記而當道諸公盛舉又不可泯焉不彰也先生得無意乎余唯唯因進諸生諗之曰我關中形勝甲于天下羲文武周後先崛起弗可尚矣自横渠後理學名儒代不乏人蓋文獻之邦而學問之藪也吾輩生于其後何可無髙山景行之思且書院名關中而匾其堂為允執蓋借關中中字闡允執厥中之秘耳夫中之一字自堯始發之所謂堯得統於天者此也然中與不中雖見于事而實根於心舜又恐人求中于事而不知求中於心故曰人心惟危道心惟㣲惟精惟一允執厥中其㫖㣲矣然危㣲精一之辨莫詳于子思中庸一書蓋中之為德庸德也中之為言庸言也喜怒哀樂中節子臣弟友盡道是也于此一一中節一一盡道直至中和致而位育臻然後可以合無聲無臭之妙然後可以語盡性至命之學嗚呼豈易言哉夫喜怒哀樂中節固也若必待已發而後求中節子臣弟友盡道固也若必待既感而後求盡道則晚矣故必當一念方動之時而慎之而後能中節盡道也此慎獨之說也故曰其要只在謹獨雖然又必待念起而後慎之則亦晚矣故必當一念未起之時而慎之而後能中節盡道也此戒慎不睹恐懼不聞之說也故曰静中看喜怒哀樂未發氣象一念未起則涵養此心一念方動則㸃檢此心于此惟精于此惟一庶乎有不發發皆中節有不感感皆盡道矣嗚呼豈易言哉然人多不肯用戒慎之功者何蓋亦未知本體責任不容諉耳且天命之謂性非命之甘食恱色如告子所稱正命之使我位天地命之使我育萬物也我能位育則性盡而能復天之命我不能位育則性失而無以復天之命可不畏哉命如君命父命師命然君命父命師命皆著於聲臭而惟天命不著于聲臭故曰上天之載無聲無臭天之命我者如此其重而又無聲臭之可即念及于此喜怒哀樂雖欲不中節不敢也子臣弟友雖欲不盡道不敢也獨雖欲不慎不睹不聞雖欲不戒慎恐懼不敢也孔子曰畏天命又曰小人不知天命而不畏也彼不畏者原不知耳若知之豈敢不畏哉知本體之難諉自知功夫之當盡而或又謂本體原自現成用功即落意說是謂天地本位萬物本育而我不必位育之也棄天䙝天甚矣其如天命何嗚呼位天地育萬物聖人此天命凡人亦此天命上而天子此天命下而庶人亦此天命無聖凡貴賤無弗同者今吾輩自天生以來俱各命之以位育之性俱不容不講危㣲精一之學即汲汲皇皇異日猶未知能復天之命否也而尚敢暇逸為哉上帝臨汝無貳爾心願共勉之諸生􅋏然曰今而後始解允執之義矣敢不努力以毋負上天所以命我之意于是次其語書之以為記巡撫延綏都察院題名記姚鏌延綏在秦時為上郡歴代以來皆為邊塞地而黄河以南則時亦有擾於干戈者我髙皇帝再造區夏盡復秦漢之故境河南地皆國家所有時議者不能因河為塞乃就近地設榆林莊等十八寨屯兵戍之正統初火篩遂渡河朝廷始遣都指揮同知一員監察御史一員議控制焉於是展作榆林城立石為界増置屯堡置墩臺以偵伺其備亦漸以飭矣旋又去御史不設以陜西副使代之正統三年又去副使不設以鎮守陜西右副都御史陳公鎰往來提督之繼者為右僉都御史王公翺大臣之行邊者自二公始已而更革不常正統十二年復擢前任榆林監察御史馬公恭為右僉都御史叅賛軍務始專制延慶二府軍民事馬公前後凡七年以老去乃以右僉都御史陸公矩蒞焉俄又以大理寺左少卿曹公璉更為之皆駐綏德以控邊陲亦未有定設也天順初河套失守乃就榆林建都察院命徐公瑄為右副都御史身臨邊制之改叅賛為巡撫去綏德而駐榆林於内地則間一歴焉自是專以都御史為之矣歴成化來未有改者至余公子俊建議於朝大為指畫再拓榆林城添置公署相度形勢東西列營堡共三十有六屯軍四萬有餘士馬精彊甲於西陲榆林始號為重鎮矣𢎞治間復用都御史陳瑶議以延慶州縣盡屬於陜西之巡撫而延綏巡撫專責之巡邊事權已不無稍異敕諭猶以巡撫延綏為名者仍其舊也夫上下數十年來大臣從事於此設置固不必同其為都御史者蓋十之九也顧未有記其名以示後人非缺典乎夫都御史臺官之長也明初專以司糾察申理寃抑其職獨雄於諸曹其後用為巡撫則於事無所不理而所謂糾察與申理者固在也及用之以彈壓邊鎮則地方之安危盡繫之得其人則一邊盡治外安邊疆内奠軍民其於鎖鑰之寄視内地愈重矣居是官者得不思所以自厲哉古之人有功業彪著其榮名足以歆艷後世者世之人聞其名輒想其人不能自己是人有賢否而名之輕重繫焉可不慎歟是碑所記二十有七人其聲績卓然名世者正不少蒞此者當自得其人為觀戒焉榆城舊有都察院已頽壊不可居予視事之二月為稍改作以新其規于是志其沿革自陳公鎰而下其姓名咸勒之碑隂使後此者可續而書亦世有徵焉太華山記李攀龍經曰太華之山削成而四方其髙五千仞其廣十里蓋指華中削成而四方者爾四方之外未之盡華山也自縣南十里入谷逶迤上二十里抵削成北方壁下乃谷即西南出不可行行東北大霤中霤中一峽裁容人左右穿受不滿足穿受手如决吻人上出如自井中者千尺曰千尺橦北不至十步復得一峽百尺人上出如前峽曰百尺峽則東南行厓往往如覆墩出人穿其穹中行穹中穿如仄輪牙也厓絶為橋者二所東北徑雲臺峯東南得大阪可千尺人從其罅中躡銜上阪窮為棧五步顧見罅中如一耦之􅎌新發諸耜矣罅中穿如峽中峽中銜如罅中峽中之繘垂罅中之繘倚皆自汲也棧北得厓徑丈人仄行於穿手在決吻中左右代相受踵二分垂在外足已茹則齧膝也足已吐是以趾任身也北不至十步厓乃東折得路尺許於厓剡中人並厓南行耳如屬垣者二里剡窮復西出厓上行則積穿三丈有厓從北來踆北厓上複髙三丈自踆首南行厓如前剡中屬耳甐耳矣三里而近為蒼龍嶺嶺廣尺有咫長五百丈厓東西深數千仞人莫敢睨視是酈生所稱搦嶺須騎行者矣雖今得拾級行哉足欲置之置先嘗一足于級上置也然後更置一足其所置足猶若置入石中者猶人人不自固匍匐進也余夫善載腐肉朽骨者乎至級窮得厓踆焉髙二丈一隅西北出入從其隅上南一里得厓又盡磝不可以穿繘自汲也是皆所謂懸度矣不至百步西北冒大石出厓下西南上二里得松林五樹稱五將軍厓上者不見杪厓下者不見本從縣中望見松如樹菼也西一里有大石如百斛囷不知何來客於此横道而處踰之為穿徑二十所西南百步得巨靈掌掌在削成東北方壁上不盡壁五丈許人不得至掌二丈許掌形覆其拇北引如三尋之㦸從縣中望見掌即五指參差出壁上也又西北百步詣削成四方上矣西南望削成四方中東北望所從上削成道道從東北隅出二十里是錞于雲臺峯猶杓之在斗矣削成上四方顧其中汚也上宫在汚中西北玉井在上宫前五尺許水出於其上􅅗於其下東北淫大坎中凡二十八所北注壁下壁下注道中一穴北出水從上冪之也四壁之穴各在一摶上宫東南上三里許得明星玉女祠含神霧稱明星玉女持玉漿乃祠在大石上大石長十丈許祠前輒拆拆下有穴穴有石石如馬折南五丈坎如盆者五所如臼者一所水方澹澹也下從祠東南峽中行二里得池二所大如輪東南行三里望見衛叔卿之博臺在別巔為埒不盡厓尺中如砥可坐十人厓南北繘纚纚也欲度者先握繘自懸厓中乃跖厓自汰令就繘不得繘還跖厓自汰得而後釋所自懸繘也此即秦昭王使人施鉤梯處也西南上三里許得一箭如括曰天門門西出為棧而銅柱陿不能尺長二十丈棧窮穿井下三丈竅旁出復西行為棧而銅柱一池在石室中不可涸也天門旁有臺如叔卿之臺南望三公山三峯如食前之豆是白帝之所觴百神也從上望壁下大谿谿肆無景即日中窈窈爾久之一山出其末若鏃矢頃即失之矣是為南峯南峯削出南壁上東峯出東南隅壁上西峯出西北隅壁上從下望之五千仞一壁矣攀龍曰余既達削成四方中不復知天不可及矣余夫善載腐肉朽骨者乎及俯三峯望中原見黄河從塞外來下窺大壑精氣之所出入又未嘗不爽然自失也華山記袁宏道凡山之名者必以骨率不能倍膚得三之一竒乃著表裏純骨者唯華為然骨有態有色黯而濁病在色也塊而獰病在態也華之骨如割雲如堵碎玉天水煙雪雜然綴壁矣方而削不受級不得不穴其壁以入壁有罅才容人隂者如井陽者如霤如井者曰橦曰峽如霤者曰溝皆斧為銜以受手足銜窮代以枝受手者不没指受足者不盡踵鐵索累千尋直垂下引而上如粘壁之鼯壁不盡罅時為懸道巨巒折折相逼若故為亘以嘗者横亘者綴腹倚絶厓行足垂磴外如面壁如臨淵如屬垣撮心于粒焉知鬼之不及夕也長亘者搦其脊匍匐進危磴削立千餘仞廣不盈背左右顧皆絶壑唯見深黒吾形􅤢􅤢如負甕自視甚贅然㣲風至揺揺欲落苐恐身之不為石矣夫人所慿仗者手足而督在目方其在罅目著暗壁升則寄視于指也降則寄視于踵也目受成焉耳罅盡而厓目乃為祟眩于削為栗眩于深為掉眩于仄為喘愚者不然心不至目故也今乃知嶮之所以劇矣余衣不蔽腰下著窮袴見影乃笑登厓下望攀者如猱側者如蟹伏者如蛇折者如鷂山之乃至此自恨無虎頭寫真筆也踰仙掌壁折入石弄北旋上石滑而不級為東峯過坪躡厓道尊特而中斷為南峯度峯足蜿蜒上石葉上覆而横裂為西峯南峯踞兩峯之上如人危坐而雙引其膝下有土徑異樹交絡峽水鳴其間峯嶺各有池如臼如盆如破甕鮮碧澄澈古松覆之西峯石多璺乍視如未穏南峯之背有静室垂雙鏁鏁盡為鐵杙以承板道東峯南下為衛叔卿博臺鏁對懸拓厓自達皆竒嶮華山後記前人從玉泉院至青柯坪東西皆石壁澗水縈洄出踰張超谷壁乃峭至希夷峽石忽具態摩雲綴日壓叠而上行大石纍纍卧澗中水不得直去則躍舞飛鳴與山争竒于一罅之内至青柯坪西峯斗絶出諸山忽若屏息竒者平髙者俯若童子之見嚴師不知其氣之㣲也西峯之竒在水簾洞逺視見竇下有丹石瀑布羃之千尺橦而上大竒則大嶮小竒則小嶮寸寸焉如弱夫之挽勁弓至蒼龍嶺千仞一脊仄仄如蛻龍之骨四匝峯巒映帶秀不可狀遊者至此如以片板浮顛浪中不復謀目矣然其竒可直一死也若日月巖前方石峭壁直上止嶮耳無他竒也踰嶺路絶折身反度其嶮更甚而不名者厓不甚脩也過五將軍樹度橋至通天門嶮乃盡山自仙人拇始為嶽嶽以内若自為天地者諸星曜平視得人間之半其地㣲膚長松檜汚處齊雲臺峯頂雲臺直北當入㠉時猶千霄諸峯之在雲臺下者猶矗矗也南上即落雁峯千山環之如羽林執㦸兒山皆竒峭鋒鍔林林一峯直背如輪若與峯争秀渭水東行與黄河合下見樹影東峯即玉女峯也祠玉女者乃峯之一臂所謂洗頭盆亦渇而淺而東峯有之圓滑深潔錫以盤名亦稱西峯最幽奥石態生動有石葉如蓮瓣覆厓顛其下有龜却立昂首如欲行蓋葉上物也是即所謂蓮花峰矣玉井在峯足二十八潭圓轉而下瀑布上流也恨不於雨後觀之山壁樹如錯繡鳥語從隙中來云無鳥者誤洞少天成然整潔可居廬舍亦有而黄冠不至嵗一至以館香客耳山靈之寂寞無侣可知矣遊驪山記前人驪之山鬱然而青而其水浩浩然鳴九衢也古栢森森然翳東西嶺故宫遺址多不可識山下之民有雪頷而杖者作而前曰民雖耄猶髣髴憶之指其巋然而墳者曰是舉火臺褒女之所笑也指其温然而澄澈者曰是蓮花湯明皇妃子之所浴也問山下之故壘曰是嘗錮三泉而閉七曜者始皇帝之地市也余倚松四顧蒼茫久之乃披荒榛踞危石楚聲而歌曰涓涓者流與山俱逝兮空潭自照影不至兮吁嗟乎兹祟三世兮歌竟浴于長湯遂登老氏宫極于臺東過石甕寺休焉稍倦假寐僧榻忽有丈夫峩冠脩髯揖余而言曰吾子失言夫山奚能祟使吾幸而遇嚴匡諸君子豈不亦嘉遯之藪吾子謂九叠之屏七里之灘何遽出吾上耶又使吾所遭者為宣城孤山輩騷壇之士艷稱久矣吾豈復戎吾姓也余蘧然覺自悼言之失也復喟然嘆曰異哉天子之貴不能與匹夫争榮而詞人墨客之隻詞有時為山川之九錫也異哉今之處士誰能入山而為水石所倚重哉吾當北面事之游牛山香溪洞記劉閣金州境内多名山丁亥秋九日與白菴出萬春堤三里所至牛山山之下有忠惠王祠唐刺史崔偉能慈惠澤民中和三年黄巢作亂太白山人者蹐門獻計曰公毋患也一發牛山則巢滅矣掘之得一石桶黄腰獸棲之而置劍其上獸見劍自殺巢果敗公由是得道宋嘉泰中封忠惠王元紅巾起樹隂旗殄賊相傳所掘山在五十里外此其行祠然山亦嶻嶪可觀二里所至漢江泛舟江源出嶓􅜗山嘗至石泉紫陽諸縣皆兩崖峭拔壁立水流其間數百里至鄖西始見平原舟中對酌聞髙鳥聲雜出叢薄樵歌與漁唱互答頗發吟興江中有安康石翳沙磧見則嵗饑余竊窺之石粼粼見波底顧謂白菴曰果然吾輩憂也罷酒升輿五里許至心山山有異草風吹之不偃無風乃自揺漢陽厥守漢中過而異之棄官修道於此復二里所至魏山三面險絶惟北小徑可捫葛而升晉吉挹督䕶梁州秦韋鍾來冦挹嬰壘急口岐山固三年不可下固知兹山之阻可壘也又三里渡香溪溝入崇山中有石洞相傳吕洞賓郭尚竈傳道兹洞洞前有石棋枰及子人不敢取胡尚書濙詩鑱石壁令從者芟棘通道前後推挽二人並詣其巔山約百仞近眺西北巖巒亘疊白菴嘆曰焉得褰裳一并討乎余因指燕子嶺謂白菴曰往劇盜淡文省巢據兹山距邑二百八十里余提兵往撲之七十里經鳯凰山其山盤二十里中有十二層崖甚竒以戎事不暇登又三里經桃林異之而亦不暇問至燕子嶺滅賊訖暫詣山中草菴有老比丘自稱元時人頭白而顔紅問其年不記也詰其度牒則曰有出視之紙厚方可七尺許字如縈蚓盤蛇䝉古書也見余跏趺坐驗其牒與年等縱之回軍至桃林旁圍髙中低而夷草舍置中垤石澗泉繞舍左右流一道人年可九十餘而色不槁問之曰採桃實自給耳左右耳語曰道人頗豐積余因戯之曰聞道人甚饒可餉諸兵一飱乎曰非都竈不給具食其他則可留宿明發人具折供二千人無漏者歸而復召二人皆不知所往矣夫秦政暴毒逺在鼎州且避亂入桃花洞況關陜近切湯火能無幽遁萬山如桃源客者乎則燕嶺鳯山固有希心異人而求不死之鄉如老比丘道人者疑不與之談接者尚多也乃與白菴慿髙逺覽東則鄖襄諸山南則劍閣子午谷西則終南棧道北則商顔秦嶺或笋植天表或丹青一抹撒豆積黛隠約蒼霧間目眦盈溢神情敞朗倘能標長組履不借盡凌雲磴以弔四皓諸葛武侯之遺跡而後歴青城峨嵋藉葛陂之龍以與朱桃椎封君達諸公翺翔埃􅅽之外可乎白菴曰榮願系人逺心莫暢相與嘘唏者久之金飈動林玉蟾掛樹乃命歸輿從陸入東關至治燈火且爛門矣遊白沙泉記劉士龍泉莫勝于終南而鄠為最泉莫勝于鄠而西南鄉為最泉莫勝于鄠之西南鄉而白沙泉為最蓋泉亦難言矣貌不難于澄而味難于甘神不難于寂而韻難于活惟白沙泉則具有之色如銀而加湛味如飴而加冽其奮而上湧者如湯沸如波騰其翻而漚汎者如珠噴如璣躍溢而為流其清激而雋快者如哀玉出聲霜鐘遞響滋而為草其葱鬱而浮動者如鏡窺錄鬟風牽翠帶每風辰月夕晴日雪朝或孤往或偕游流連忘歸率以為常即人事紛錯書債糾纒未有不極力擺撥而偷閒一至者也聲色味俱佳耳目口皆適而深領之則肺腸都濯魂夢亦清我輩受益于泉者多矣因與克甫商所以酧泉者為泉加䕶惜焉白璧砌而青玉䦨毋為頑石所辱也癭瓢汲而定甆貯毋為穢器所褻也戰茗取足于靈液潄濯不得輕試也標格欲稱其清容塵俗不得少著也又為泉加㸃綴焉芝蘭叢種松竹環列而惡草不容託常木不容䕃也白鷗睡其旁朱魚戯其中而俗禽不容浴凡鱗不許泳也架築無貴于華整蓋頭一把取足庇風雨而已招呼無及于猥雜識韻一人取足供笑語而已泉主我賔我歌泉答而泉之常清者不受溷常静者不受喧也泉受益于我輩者亦不少矣是泉于我輩相遇交相益而相酧也亦千百世一段佳語也陜西都察院題名記本朝吕雲藻天子御宇百度維新設官分職一準諸舊此陜西都御史臺之建猶昔也秦中重地都御史重臣雖三鎮各有擁旄節者而征發調遣咸於内地取裁則都御史在長安者視三鎮為尤重然在他時吏之臧否民之休戚兵之汰練芻粟之贏詘繄惟責之方伯監司連帥偏裨都御史於中酌其可受其成焉今乃迥于前不侔矣鼎定方新獻琛納上者雲集幽遐阻深不無梗化既宣仁風亦時勤義問鞠蜀漢之旅則秦其孔道也士馬飽騰非取辦于民罔濟民亦疲極幾不聊生若第如昔之責方伯監司連帥偏裨而已不將軍民交病耶則察其肥瘠節宣其底滯㑹通其隂陽權時之宜非大中丞苦心調劑則不可清興秦中都御史有二乙酉之始為雷公雷公以移疾去繼之者為今黄公黄公至而征調愈繁饋餉愈棘築鑿搬運之工愈益熾公乃以沈機閒神應之民有畝棲兵無譁伍不苛督方伯監司連帥偏裨一切皆自為裁度暇日以都御史題名屬藻記藻以礱貞石示來兹昭勸懲也黄公精白籌國儉以自奉寛大以佐軍興而民不坐困斯記所謂有勸無懲者詩云文武吉甫萬邦為憲殆公之謂與重修周文王武王陵記江山秀皇上御極之八年山秀初抵關中令兹渭水兩閱月我太保大宗伯王公特膺簡命祀古帝王陵甚盛典也咸封之北維周文考寧王二陵毓於斯數千年來邑令之所主祀焉恭閱邸報疾趨畢郢髙原隆厥儀文見其殿宇頹廊廡缺龍門鳯户走狐狸而狀荒涼雖周原膴膴依稀帝子之鄉而野處蕭蕭寧復王風之舊山秀愀然曰予何人也食大聖之鄉任其彫殘而忽夫整頓本源安在而令王道凌替若斯也遂命鳩工克期即舉時有儒生進而誨之曰二王之陵其在前朝幾經修建往者不可問猶憶萬厯初年前令修此申文上臺曽經題疏所費數千金吾子為此恐力薄不勝其任也予曰不然國家設官分職一邑之山川社稷即賴斯人主之者弗潔為之者奚功庸庸若輩適足以貽羞子黎耳予有俸薪願言竭力上不告於王公大人下不資於窮簷孑遺爰集工人誓之曰今者盛舉而願之乎刀幣惟予貨食惟予金碧惟予梓材惟予手足竭蹷爾共勷之衆報曰可風雷之勢晷不留停甫滿三旬而神功告竣抑孔邇之靈猶在人心與不然何㨗之甚也由是而登其殿榱題翼翼然升其堦規模赫赫然環觀華廡翠影屯雲也棲遲茂林綠隂翳日也重門洞闢壯渭水之竒觀也百堵皆興象周邦之鞏固也豈惟殘缺之舊蔚然改觀其於予以人事神之悃亦克有濟云後之君子昭明緝熙闡揚聖烈慿弔前王之美業大其式廓増其輪奐予日望之矣石門記王國瑋走三千里到汧閱歴山川竒勝目眩心揺乃始望洋而驚適適然嘆天地之大也顧山不孤放水不遂往凡名山大川每相附麗匡廬也附乎彭蠡姑胥也附乎震澤鍾山牛首也附乎大江羅浮武彞也附乎渤海故凡言山必兼言水以其為物不二也秦饒于山嗇于水即水亦多漫衍迅削與山不相親比夫人一身膚骨營血相附不離而後氣韻生動丰采離披發之清和潤澤望而知為靈秀焉山其骨也土石相間夷衍綿沓其膚也水則其營衛血澤也秦地百二雄甲天下如崆峒太白龍門少華諸山膾炙人口余恨未盡寓目其他峻削蟠曲髙並蒼天深極幽谷固多竒勝哉然骨或稜露膚或皴笨呆重童枯對之悶頓每懐南中江山之秀思得放舟湖上弄水江邊觀競渡于天中望濤氣于八月言念徒殷祇勞夢寐耳公餘偶暇尋訪禹蹟因縱視城頭門其山石對立膚色皆青瑩潤澤不枯且層叠起卧蜿蜒垂下俯臨深潭有金山半壁之勢汧暉二水匯奔極猛到峽口鎖束若扼吭逆留之水不得快志往遂乃怒激奔騰兩相射激若兵挺擊撞回復鬨鬭經數遭乃去去則鳥奔獸軼衝石翻岸若武夫悍卒醉怒决張不可拘縛益以淫雨暴漲川水迸發則洶湧怒號驚聞數里聲光所激則全乎江濤飛立之勢矣對岸羣山聳翠攅叠迴翔山腰一抹空濶旋繞各饒秀致日暮鴉歸逺樹鷺落沙汀烟霧迷離夕陽返照頗有南中景況此則山水相遭有聲有韻有景有色所謂骨與膚衛相附而成采也夫山水豈必髙深取其足以寄適性情暢發天懐而已予坐斗大城中日苦奔走必求華嶽太行瞿唐孟門逞極大觀而後快志無論時不我假㑹不適逢且抛却目前侈想逺大不令一拳一勺笑我誕妄哉蘇子云山水無常主閒者便是主人予與石門若米顛袖中石嵌空玲瓏時相玩弄仍恐傳舍吏一朝攫去此塊然者將不復為我有今既有之又偷得餘閒云胡不愛且賞也因咏懐數首聊以寄興且厚有所託于石門以待後之蒞兹土者潼關樓刻詩記湯斌潼關古桃林地也太華峙其西崤函踞其東泰山迴合萬峯刺天河渭屈盤千壑奔㑹崖谷岡嶺環抱叢倚道路狹峻車馬如束真天造竒險為秦閫閾且南控武關之隘北扼蒲津之阻握函夏之樞紐鏁川隴於堂奥漢唐以來莫不倚為巨鎮以資藩屏兵火之後城垣傾圯樓櫓半缺廢址荒煙過者為之躊躇而悽愴順治十三年斌奉命飭兵兹土自顧庸菲不足當斯重寄恒惴惴自恐仰賴朝廷德威遐被數千里外如在輦轂之下故承乏三年兵强吏馴士習民安乃謀寮屬重建城樓貲皆蠲俸役罔妨農工既成集古人過關題詠之詞自唐明皇以下凡一帝十有八人為詩二十九首刻於東門樓壁嗚呼當明皇停鑾關上與侍從唱和其時君臣樂豫海㝢清寧登嵩躡岱勒石銘功可謂極盛未幾而漁陽變起雄師告潰關塞失守六龍西幸豈山河之險不足恃與抑成敗之故皆自於人也孟子曰地利不如人和吳起曰在徳不在險有國家者修德以懐逺和人以守國則雍容樽爼偃戈休甲彼放牛歸馬之盛此非其故墟哉後之君子登斯樓也眺山川之雄勝覽昔人之詠歌古今興衰之感制治保邦之要亦可以慨然而思矣賈大司馬修棧記党崇雅康熈三年秋九月尚書奉天子命巡視漢南城垣渡渭入棧喟然曰是昔魏武所謂五百石穴者也行人騎畜經其地者大則有性命之虞小亦有顛仆之患自五丁粗開山徑以後數千年於兹矣降至明季逆闖横肆秦蜀梗塞羊腸一線僅供猿狐出没幸天佑皇清我世祖章皇帝仗義提兵出無辜於水火之中奠元元於袵席之上爰登大寶傳及聖明天下一統而西服朝宗勢必以棧道為咽喉顧乃深洞隘窄使億萬年皇華馳驛之路弗克共遊蕩平余心滋戚務使巉岈盡削闢成坦途庶幾無負鎮撫之任雖然吾不忍以逸人者勞人必也計口授食計食授錢乃克有成功因捐金募工指授方畧進關南巡使范公而謀之迺命㕘戎李君司李曽君耑董其事於是修險凡五千二百丈有竒險石路凡二萬三千八十九丈有竒險土路凡一千七百八十一丈有竒修偏橋一百一十八處計一百五十七丈去偏橋而壘石以補之者自江面至岸髙三丈許共長六十五丈二尺凡十五處修水渠一百四十五道煅石三十二處共一百五十六丈六尺去當路山根大石二百八十九處壘修木欄杆一百二十三處凡九百三十八丈有竒合營兵驛夫民夫各匠積六萬九千八十三工是役也不三月而告竣成功之速若有神助夫自有雲棧以來閱歴數千載其間豈無豪傑自命之士痛惜行路之難思欲平險為易然皆逡巡不敢施功者以雲棧地連雍梁二郡寶鳯褒三邑綿亘六百里髙者出層霄下者臨無地置足靡所舉手何從乃欲寸寸而治之尺尺而易之歎綦難也尚書公獨不以為難奮焉圖之一舉而二郡三邑六百里蛇盤狙􅍻之區無尺寸不坦若康莊誠不朽盛事也且雲棧去京兆數百里尚書公開府尊重設非奉勅南巡必不逺歴棧是查城之役天實假之以令尚書公竟億萬年未竟之業也夫人之勲業存乎志量澤及一時猶戛戛難之尚書公一巡行間體忠君愛國之心開萬古蕩平之績其志慮為何如乎余老矣不能復遊褒斜深幸億萬年未竟之業賴尚書公克底厥成又喜尚書公功德之隆與天地同其悠久而余以野老頌揚嘉績載名其上榮莫大焉因記其事而刻諸石一置雞頭關一置煎茶坪志功所自始與所自成也尚書公姓賈諱漢復字膠侯别號静菴山西曲沃人范公諱發愚河南河内人李君諱承恩北直大興人曾君諱王孫浙江秀水人龍門遊記前人予經伊闕人盡稱龍門竊嘗疑之龍門在予鄉詎有二哉獨以未得至少梁為憾夫逺在他方而負竒詭靈異之名者尚足以奔走天下之人近在咫尺往往多棄之不一省覽予陋矣丙午之春自河津而西急思龍門望見羣山即求其罅以當之山勢綿亘連而不斷北為鄉寧西為韓城渾渾茫茫不見所謂門者或謂門以兩岸對峙為義如秦之長門吳之天門越之石門水貫其中而可以涉可以亂可以沿溯者皆可以稱之行二十餘里乃見黄河瀰漫灝淼之光洶湧怒號之聲迅疾注下之狀肅而畏之已而至于門之左以瞻門右之阜河束如帶似可超躍志述其廣八十步蓋冰凍時安流凝沍人或履而過之不必引量江之絲矣嘆曰為地紀之咽喉百川之伯長蛟虬之都㑹風雨之萃藪者非此門也耶門未闢則懐山襄陵之洚水壅于上門既鑿則砥柱巨靈之竒蹤呈于下㣲但是也溯於積石壺口俾四瀆之冠冕安其職散于徒駭馬頰亦俾九河之本支奏其功天地平成有如此門人皆曰禹之大智異于昏墊故能然嗟乎神哉謁禹廟成禮危峻而壁削者其山也拾級而聚足者其磴也懸棧而偪仄者其閣道也垂繘而用汲者其飛樓也鐘鼔鏜􅝅音徹天際古木堅疎翠流烟外老碣十朋層峯萬叠有礟手將以象雷霆予亟止之無使焦尾爆鰓者驚怖而坎遁輿人促予行榜人亦艤舟以待曰及此未風而渡無誤乘于風伯之浪也登舟回視禹廟已若在天上水雖砥平其深乃不可測舟子以竹篙鈎石吻而逆之上行少頃可渡則款乃合力倐而西岸岸有巨石上有禹廟不再登神不可數凟故也予于龍門夢想者數十年今始一慰甚且釋慚焉後之君子有來遊者其知河之濵垂老而好遊者乎聖駕西巡恭建萬夀亭碑記鄂海欽惟皇上乘乾御極秉道綏猷備聰明睿智之資兼五帝三王之學文治丕昭武功赫濯固已措萬方于磐石之安鞏社稷于金甌之固矣於時深仁廣被至德𢎞敷萬國民心咸懐望幸維此秦民向罹災祲實䝉拯濟賴以生全於康熈四十二年春合詞籲臣恭請聖駕西巡以遂就日瞻雲之願我皇上俯念輿情允答民望於是年冬十月聿頒詔㫖陜西巖疆重地乘此冬令農隙之際觀覽民風詢察吏治簡閱禁旅整飭軍營實為要務用是輕裝減從諏吉西巡凡往返供億皆取給於宫府纖毫不累百姓即有市易亦飭所司依時給直沿途官吏禁借名科索及與扈從官妄行餽送有不恪遵生事擾民者以軍法從事天語遥頒歡聲動地臣等聞命之下偕陜省文武大吏預期星馳十一月朔有五日恭迓聖駕於山西之平陽界越十二日鑾輿入潼關億萬臣民趨迎道路黄童白叟瞻拜天顔獻菓捧漿者駢肩累跡十三日駕抵渭南較閱軍士褒賞有加焉十四日上至零口小獵鳴弦激羽中必叠雙十五日駕抵西安自斜口至城東門旌旗耀日鼓吹溢途士女分行香烟四十餘里不絶是日也太和之氣洋溢宇宙風和景明深冬如春天心人意蓋交暢而僉符矣十七日駕幸演武塲大閱皇上親御戎衣設鵠樹侯連發五矢無不應弦洞的一時文武大小諸臣滿漢官軍及塞外來享之苦苦腦兒王貝勒台吉俄爾多斯貝子台吉輩莫不欽仰聖天子智勇天錫神武光昭懽忭舞蹈咸呼萬嵗於是聖心喜恱温言奬勸各將士實心盡職出大庖芳饌綠酒瓊酥飲勞之以示慈惠頒天府文錦貂裘錦韉名馬彤弓盧矢賜予文武諸臣各有差而行間介士賞賚餉銀復以百萬計云二十一日特頒恩詔秦省為天下要地曩嵗荒旱所司未經奏報朕訪聞得實多方籌畫運米拯救分行蠲賑秦民始得少蘇自三十二年遣皇長子致祭華山以來雨暘時若年穀豐登兹見百姓歡迎載道且知今嵗有秋地方文武官吏能恪勤奉職滿漢軍士亦皆訓練有方朕心甚慰凡巡幸所至必大沛恩膏今將陜西甘肅所屬康熈四十二年以前各項積欠銀米草豆錢糧盡行蠲免玉音宣布萬姓歡騰復優恤在籍老臣禮問山林逸士厚施粟帛頥養髙年將士曽致命行陣者賑其家室其子弟有才能英異者越次錄用凡行慶施惠恤忠勸節之典靡不備至而我皇上道藝兼綜八體六書駕唐軼晉詩聨題額超聖入神於閱武蒞政之餘親染宸翰普賜羣臣人人如獲重寶數日之内萬幾之勞而精神萬倍綽有餘裕蓋無逸作所行健法天自開闢以來所未嘗有也二十二日聖駕回鑾臣民遮道跪泣如赤子之戀父母途次絡繹至潼關不忍捨去臣等恭送聖駕目擊秦人瞻依眷戀忭舞之誠并滿漢大小臣工軍民人等頌祝皇恩永久不忘之意臣等叙其大槩敬勒貞珉樹之萬夀亭左仰見皇上聖神文武昭示億千萬世與南山華嶽地久天長同為無極不獨西安履任諸臣受恩深重各宜公忠亷潔咫尺天威務盡竭力致身之義即三秦老少士女霑被鴻恩為臣者當相勉於忠為子者當相勉於孝兄弟當相篤以恩室家當相安於順擊壤歌風無忘帝德此則臣等惓惓勒石之㣲意也御書亭記在咸陽縣前人嘗聞之帝德如天凡物之得乎天者厚栽培滋長順其時而不失乃得以永存斯民之被乎帝徳者深安恬頥養遂其性而不撓則每多夀考故必聖人在上老老之政日興夫然後逺陬僻野黄耉駘背期頥耄耋之人皆得以優游盛世而長為太平之幸民今上御極四十有七年恩週禹甸化溥堯衢凡在含生負性之倫皆獲親䝉膏澤而於養老之典尤加意焉屢嵗以來宇内老民受賜粟帛者以億萬計直省大吏莫不仰承德意覆育羣黎余奉簡命來關中自弼教宣化以至於今十有餘年矣曩嵗恭遇聖天子西巡耳提面命指授撫綏之術總總林林益䝉庥而向化比年間余諮度閭閻搜羅草澤每見皤顔皓齒必嘉惠無已以體皇仁養老之至意而於咸陽西北原蘇家莊古寺得老民李姓生於前萬厯二十年歴今百又十五嵗其世系亦不以語人詢之寺中老人皆云數十年前見老民行動一如今日童顔鶴髪脣若塗朱齒落重生飲啖如少壯人言笑同兒戲時此陶唐氏之民含餔鼓腹歌衢擊壤所謂不識不知順帝之則者非歟時戊子春天子聞而召見之賚金帛不受乃御書長年人瑞四字錫以歸之猗歟休哉老民生長於窮荒寂寞之地茍不得見知於世亦山澤之臞耳一旦寵邀宸翰輝映林泉老民實賴以不朽此天之篤生老民加以帝徳之淪浹得長有此年嵗以符太平之應彼嘉禾芝草卿雲醴泉皆未可同日而語也余因為搆亭於寺之前鏤御書為之額時川陜總督齊公新受命來西安與余率司道各捐俸如干命咸陽令丞同鳩工庀材而驛使者董其成焉不日厥工告竣計亭三楹亭後東西各三楹舊殿及宇舍則葺而新之若門庭若墻垣皆稱是蕭寺岑寂煥然改觀逺近紳士人民蹌蹌濟濟不絶於道皆能播揚休美聖恩所暨浩蕩無涯夫豈偶然哉落成之日余躬率僚屬頌聖天子無疆之德因爰筆夀之石云修西嶽廟并修山記前人皇上御極之四十二年文德武功蟠天際地猶且堯咨舜儆宵旰不遑軫念秦人被災之後唯恐匹夫匹婦不得其所于是翠華西邁聿舉時巡臣海乃馳詣華山修理山路蓋聖天子所過之地百靈協應河嶽懐柔倘山路﨑嶇不足以容萬乘則非人臣敬事之禮於是由山趾而上至青柯坪其偪仄處皆為展拓其有水處皆為架橋其不平處皆為修整由青柯坪而上則危崖峭壁突兀凌空愈出愈竒愈行愈險予皆周詳審視相度經營險者平之窄者擴之逆者順之腐者新之迂逺者使之徑直峻削者使之紆徐外則輔以䦨干使人不至于心悸内則疏通泉路使人不知有泥濘之苦髙髙下下不可勝數而最大者凡有數處曰千尺橦曰百尺峽曰犁溝曰擦耳崖曰蒼龍嶺曰金天洞所謂千尺橦百尺峽者皆上下􅈝直並無階級舊惟穿石受履用鐵索牽挽而上一失足即有顛仆之恐予命工鑿石為級并造木梯佐之犁溝在山之傍崖最險最峻予命工修理一與千尺橦相似擦耳崖俯臨大壑深不見底所行道止寛尺許過此者面山挽索不敢俯視予命工鑿入數尺䕶以䦨干較前有兩倍之濶蒼龍嶺聳立天際兩傍懸崖萬丈無可倚傍人過此若從魚背上行即韓文公痛哭處也予命工重為修理闌干壯偉階級分明人始無心驚目眩之患金天洞亦横空突立攀躋不易予命工鑿成階級并以木梯助之過此即南峯頂上矣皇上行次華嶽為萬民祈福欲親至山頂特薦馨香臣以道險啓奏乃命三殿下登山詣廟代致悃誠特發帑金數千兩重修嶽廟維華嶽秉正秋之令其色也白其行也金在易曰兊正秋也萬物之所說也蓋濟火之燥則亢陽剛烈之氣得以制其威涵水之精則東方長養之機得以培其本億萬生民之命於此行養焉維皇上覆載生成徳洋恩溥時刻以生民為念故賜金修造感格神明所以祝萬寶之告成培化工之源本仁心惻怛隨處周流正自古帝王所未有南峯頂故有嶽廟然䂓制狹小且嵗久剝落臣海恭承聖天子之丕顯休命廓而大之庀匠氏構新材丹雘垣墉煥然改色内自大殿外至大門金碧輝煌焜燿天地殿上及兩廡前此從無畫廊今皆炳炳烺烺丹青燦爛自余之奉㫖修廟始也立廟門之外澄空萬里一望無涯俯視渭河如帶迴抱山下門外青松拱立皆千百年物環繞祠宇葱葱鬱鬱大者如蛟龍騰攫噴薄風雨廟後有仰天池蒸發雲霞吞吐日月晴嵐翠色元氣滃然是山雖有三峯然南峯獨為峻拔顧視東西二峯乃如培塿華隂白帝廟亦修造一新氣象靚深䂓模宏敞逺近贍禮皆舉手加額感激聖天子為民祈福之意予于是禀君命思所以謀國之心對山靈思所以事神之敬而皇上民胞物與宇宙一家不獨為陜左陜右請命西嶽且將統六合而康阜之則秦人之父老子弟宜如何報也海内之蒼生百姓又宜如何報也惟當生生世世頂頌皇恩祝國祚與華嶽同長聖夀與南山並永庶幾少盡臣子涓埃報國之義廟成而後予特疏恭請匾額并請御製碑文䝉恩報可為太華萬萬年生色因次第其事載之華隂志中所以紀君德告成功而且述守土臣感恩圖報之意云陜西通志巻九十二
