body:
  text: 陜西通志巻九十藝文六頌贊箴銘甘泉宫頌漢王褒甘泉山天下顯敞之名處也前接大荆後臨北極左撫仁鄉右望素域其宫室也仍嶻嶭而為觀攘抗岸以為階壅波瀾而鱗坻馳道列以逶迤覽餘閣之靡麗覺堂殿之巍巍徑落莫以差錯編玳瑁之文㮰鏤螭龍以造牖采雲氣以為􅎝神星羅於題鄂虹蜺往往而繞榱縵倐忽其無垠意能了之者誰竊想聖主之優㳺時娛神而欵縱坐鳳皇之堂聽和鸞之弄臨麒麟之域驗符瑞之貢詠中和之歌讀太平之頌司𨽻校尉犍為楊世頌王升惟坤靈定位川澤攸同澤有所注川有所通斜谷之川其澤南隆八域所達益域為充髙祖受命興於漢中道由子午由散入秦建定帝位以漢抵焉後以子午塗路澁難更隨圍谷復通當先凡此四道垓鬲屯艱至於永平其有四年詔書開塗鑿通石門中遭元并西裔虐殘橋梁斷絶子谷復循上則懸峻窟曲深巔下則入窅碩寫輸開平阿源泥常䕃鮮晏水石相距利磨确曙臨危搶碭履尾心寒空興輕騎遮礙弗前惡蟲狩虵蛭毒䗿未秋截霜稼苖春殘終年不登匱餧之患卑者楚惡尊者弗安愁苦之歎焉可具言於是明知故司𨽻校尉犍爲武陽楊君厥字孟文深執忠伉數上奏請有司議駁君遂執爭百僚咸從帝用是聽廢子由斯得其度經功飭爾要敞而晏平清涼調和烝民乂寜至建和二年仲冬上旬漢中太守犍為武陽王升字稚紀涉歴山道推序本原嘉君明智美其仁賢勒石頌德以明厥勲其辭曰君德眀眀炳煥彌光刻過拾遺厲清八荒奉魁承杓綏億衙疆春宣靈雪秋敗苦霜無偏蕩蕩貞雅以方寜靜烝庻政與乾剛輔主匡君修禮有常咸曉地理知世紀綱言必忠義匪石厥章恢𢎞大節讜而益眀探往卓令謀合朝情醳艱自安有勲有榮禹鑿龍門君其繼蹤上順升極下達川潼自南自北四海攸通君子安樂士庶悦雍商人咸熙農夫永同春秋記異余亦紀功垂深億載世世歎誦又曰明哉仁知豫識難易原度天道安危所繫勤勤竭誠榮名休麗京兆樊惠渠頌并序蔡邕洪範八政一曰食周禮九職一曰農有生之本於是乎出貨殖財用於是乎在九土上沃為大田多稔然而地有埆塉川有墊下溉灌之便行趨不至明哲君子創業農事因高卑之宜驅自行之勢以盡水利而富國饒人自古有焉若夫西門起鄴鄭國行秦李氷在蜀信臣治穰皆此道也陽陵縣東其地衍隩土氣辛螫嘉穀不植草萊焦枯而涇水長流漑灌維首編戸齊氓庸力不供牧人之吏謀不假給蓋常興役猶不克成光和五年京兆尹樊君諱陵字德雲勤恤人隱悉心政事茍有可以惠斯人者無聞而不行焉遂諮之郡吏申於政府僉以為因其所利之事者不可已者也乃命方畧大吏麴遂令伍瓊揣度計慮揆程經用以事上聞付在三府司農遂取財於豪富借力於黎元樹柱累石委薪積土基跂工堅體勢强壯折湍流欵曠陂會之於新渠䟽水門通窬瀆灑之於畞畞清流浸潤泥潦浮游昔日鹵田化為甘壤稉黍稼穡之所入不可勝筭農民熙怡悦豫相與謳談疆畔斐然成章謂之樊惠渠云其歌曰我有長流莫或遏之我有溝澮莫或達之田疇斥鹵莫修莫釐饑饉困悴莫恤莫思乃有樊君作人父母立我􅅵畝黄潦膏凝多稼茂止惠乃無疆如何勿喜我壤既營我疆斯成泯泯我人旣富且盈為酒為釀蒸彼祖靈貽福惠君壽考且寜温泉頌北魏元萇夫駕輕烟勒麟鳳馳及奔星走攀流月蟬變羽化之民食霞吸露之士斯蓋有道存焉自非人世之所覼縷至若泥行水驟血食之夫興没自天去來非已寸陰危於朝露百齡迅於滅電一物不諧則肬贅以生庻事不康則風火以敗故聖人闕百姓之多疚撰藥石以濟之造化愍蒼生之鴆毒設甘餌以救之蓋温泉者乃自然之經方天地之元醫出於渭河之南泄於驪山之下淵華玉徹闕清闕靈感超異畯闕不測無樵薪之㸑而揚湯沸於楚鑊無闕之闕而寒暑調於夏鼎髙唐之雲朝發於水􅎠巫山之雨夕收於淵際青林碧草含露而匝岸香風蕙闕列錦而環渚於是左湯谷右濛氾南九江北闕海千城萬國之民懐疾枕疴之客莫不宿粻而來賓療苦於闕水但上無尺棟下無環􅉹悠悠君子我將安泊孤忝發軫咸池分條紫漢道屬昇平弱年斆仕旣歷通顯朝望已隆爰自常伯出居分陜地居陸海之饒禄享封君之至而報天之效無聞恤民之譽安在每思傾闕獨闕深闕以為斯泉天實置之而人畧未備廼剪草開闕因林搆宇邃舘來風清簷駐月望想烟露遲羽衣之或碩願言闕因茲以蕩穢廼作頌曰皇皇山靈愍我蒼生浴彼温泉於此麗川其水克神克神克聖濟世之醫救民之命其聖伊何排霜吐旭其神伊何吞肬去毒無藉烟炭誰假樵木湛若虞淵沸如湯谷東枕華山西拒咸陽連疇接畛墟落相望彩林爭翠菉樹成行香風旦起文靈夕張陂彼麗山望想千里廼作高堂鴻飛鳳起三輔之英五都之士慕我芳塵爰居爰止其聲旣逺金華屑柱春山九轉目送羣羊手闕白犬控鵠來思俟我於堂而篇内原缺二十字賜華原隱士孫思邈頌唐太宗鑿開徑路名冠太醫羽翼三聖調和四時降龍伏虎拯衰救危巍巍堂堂百代之師乾元殿頌并序王勃臣聞鵬霄上廓瓊都開紫帝之庭鼇紀下清珍埜闢黄靈之舘兼山配極照鸞闕於霞標薦水涵元湛驪宫於霧壑斯則神徵語怪功潛鳥跡之初理涉非經道昧鶉居之始授鳳書而稽碧落仙構罕存按龜籙而質黄圖金模間起粤若風移處闇增巢恢火運之機業據嚮明上棟括河圖之奥三堦布政詠匪日於靈臺百堵陳詩頌斯干於考室亦有黄軒瞰月樵門頽九洛之功璿闥排烟牧野構三河之酷御燕臺而臨北極缺王度於祈招列雲閣而拒南山隕黄謨於軹道然則卑宫喪禮采椽輕四海之尊豐屋延災柏梁非萬乘之有雖因時立事奢儉殊流而𢎞道在人興亡迭運靈光末造不窺九室之榮景福宏規猶擁三方之亹聞風舊史逮曹馬而無譏觀跡故􅇕歷周隋而未得自我唐太陵遷構均五方於鶴几之前中埜凝圖調六氣於虬牀之下坐圭臺而清俯仰晷緯齊明臨鼎邑而重威靈風雷合響得元功於大壯其至在兹乎我大唐雞渾製極樹神宰而制山河鶴䜟裁儀闢太虚而有天地黄精吐瑞潛龍苞象帝之基紫氣徵祥鳴鳳呈眞王之表髙祖太武皇帝虹星湛色開寳胄於金壺蛟電凝隂發皇明於石紐白蛇宵斷行移海岳之符蒼兕晨驅坐遘雲雷之業屬東隣委馭扇虐政於叢祠北拱隳尊紊皇圖於寳極蜚鴻集野瞻烏鮮投足之因青犢嘯風羣鹿無擇音之所天街五裂截鯨浦而飛芒地紐三分觸鰲山而按節元虬在御埽圻甸而廓星都黄鳥分麾動扶揺而駭雲陣鑣宫杖鉞跨高陌而登元轡野韜戈陟圮壇而擁號皇圖不恃聖人追巻領之風神器無私才子奉褰裳之運太宗皇帝雲房揖契壓麟璽於庭軒雷渚翔英擾龍鈴於周鎬八龍亨運抗鴛邸而杖朱髦十亂恢基臨鶴州而擁黄鉞唐雲秘族潛開白水之徵代景廻輪光踐丹丘之運權輿象緯削茅社而建瓊祧草昧風雲席羅圖而創璿厯紫庭合粹括宇宙於宸襟丹扆凝尊運陶鈞於寳思摛碧霄而鍊石上清耀魄之宫詔寰海而捐珠俯睇陽侯之室功驅偃伯頓鶚視於華封道被來王靜龍吟於武庫元樞上運卜年開累聖之符丹竈昇遐遺範敞謀孫之畫皇帝陛下椒庭襲慶曜璿蕚於霞莊蘭殿分休湛珠衡於月館道凝瓊鎭下蒼掖而照重熙業峻銅樓憑紫軒而揖羣后環四瀛於舜抱漏蟻覃津栖十景於堯衿巢螟荷照上元開籙寳龜定皇邑之模下武崇基飛龍錫帝臺之構貞明啟運齊玉鏡於鸞門易簡成功偃銅符於鶴仗懷降尊於襄野太階忘七起之勞念負重於焦原巾席托三危之險臨翠媯而則道天孕時成坐元扈而披圖神超物妙星潯縱淑曳珠紱於銅臯雲野䟽祥抗瓊枝於桂浦素蟾登慶六虚充牝馬之貞丹雀御林二雅合闗雎之好璿宫夜靜居龍幰而調元金房晨開御鴛階而緝化芝庭揖訓逺清和鳳之儀蘭珮承風競峻當熊之節皇太子承雲紫座翌八柱於乾維湛粹青衢揖三樞於地户黄離踵曜太陽分銑樹之輝蒼震薦音少海控銀河之色鶴筌飛奏想丹駕於瓊山鮑爼捐芳齒元冠於寳序彤闈問䜿禮崇監撫之威黼席興賢義極君親之愛若乃東門䘏引叠仙構於熊山西苑承家𨗳靈波於鴈沼桐珪作瑞鳳毛曜丹穴之英茅壤分維麟距冠元丘之俊巽宫延粹開朱柱於娥臺兌野流芬疏芝蘭於别館頻隈毓範雲扄分戚里之驩覃嶼凝規星閣絶郎官之請雕龍命職縱跳澤而驤鱗翠鷃調司順義飈而撫翼月軒宵佇虞谿降璿緯之精震帳晨披姜水洞金韜之賾飛鶴書而抽海狀桂壑於是投綸轉麟斾而揖山容松澗由其削衽軒圖瑞矞泛花綬於雞林農紀祥炎濯蘭纓於鳳水仙臺俶務三珪銓棘序之風天秩調邦六府燮槐衢之典金門獻納縱麟筆於苔牋石舘論思覈龜章於竹槧淹中訪禮蹲龍揚璧水之波稷下談經飛兎躍環林之秀詞庭吐鳳翫鳥跡於春黌書帳翻螢閱蟲文於夏閣杏花千畝紺轅照磨蜃之功桑柘三宫元紱降親􅁞之禮圜丘上闢奉蒼璧於靈壇方澤下凝列黄琮於寳墠朱絃翠瓚履霜懷四饗之尊複霤重檐涓日正三綱之首五靈奔慶冠虵澤於黄樞六祀銜欣颺麟煙於紺席遺弓積慕䖍深太廟之儀執豆推恩道振明堂之禮瑶山廣樂備逸調於宫懸洞庭仙奏納遺歌於帝府九韶分唱后䕫清桂序之音六變同和飛鳳掌梧軒之律樽爼折旋之數苞舉隂陽堂庭節奏之規彌綸宇宙靈襟索隱控風伯於詞林睿想鈎深詔天吳於筆海神窮獨照傍探赤水之珍思洽幾深迥寫丹谿之韻金壇紫露映銀籕而翻華白雪瑶林藻瓊章而吐絢蟬機撮化銅渾將九聖齊懸虬箭司更銀漏與三辰合運爽鳩分職素雲頹鳥喙之祥神獬闗司元水照龍顔之則黄沙鞠草剗叢棘而遷訛丹石滋苔仰甘棠而息訟融臯再稔方聞外户之謡昧谷千箱坐溢康衢之奏百城煙峙望秋露而乘風千室雲開合霄霆而組化彤幃獨選熊轓下蘆雁之祥墨綬分賢犀檢降槐鸞之祉筠驂佇信髦士剖竹而相尋葦杖霑仁鮐叟攀輪而不暇龍虵可踐野人豐荷杖之驩雞犬相聞城尉輟鳴桴之響五雲抽潤湛芳氣於璿臺六府咸殷唱豐歌於銅闕不戒而畀東户恩周動植之津博施而舉南風化偃胎萌之㝢神謀備豫儼七萃於丹樞邃畧防微肅千廬於紫衛元戎握節黄公授犀闕之圖帝座聞鼙𤣥女薦龍庭之䇿赬柯捭刄中權决勝於兩階白羽俄麾善陣推亡於四表朱匡反景之域削虵弭於文㮰黑山眀月之鄉委龍琛於武帳錦軒星騖控乾絡而觀風繡服霞驚浹神紘而問俗川浮没羽鯨谿靜丹浦之虞陸薦飛毛熊巘動青雲之偵銀闗驟雨望紫陌而趨恩鐵恍馳風計彤闈而􅅹思赤馬文猿之實叢積乎郊虞紈牛露犬之貢滿盈乎儲邸青丘畫野不踰征賦之鄉蒼水奉圖未盡提封之貫且夫緯武經文宏業也含幽育明至誠也混齊六合大功也規模百代昌數也故能襲九空而寜庻物劃千里而統諸侯休徵象德而動嘉符觸類而至風揚晷洽藻乾慶於芳年水節河謙藹坤正於明渚瑶枝結慶泉埃蕩玉蓋之文瓊液浮甘天酒綴金莖之色黄麰紫脱凑仙頴於中畿翠萐丹蓂叠靈株於上序駢眸候日漾影䝉池比翰翻風栖光理木祥飛井絡震鱗題瑞朔之元祉絢新郊枵獸紀和年之敘具靈篇之絶貺究先諜之殊休天人之際交矣皇帝之道備矣由是三靈物覩扣蘭禁而棲誠九服子來詠蒿宫而騁力去奢去甚不矜黄屋之隆匪樸匪雕方順丹墀之請宸規相宅考周舊於靈都睿覽思和獲秦餘於正殿羣臣列陛奏蕭相之遺模天子臨軒採荀卿之故事炎洲八桂簉仙栱於林衡岱􅅵五松委靈材於梓匠衢宫記範萬機抗九五之尊海孽移琛千欒省十家之費飛㢘巻靄徹煙極而浮甍屏翳收津劃星􅇕而置􅈏瑶階百雉光懸寳露之壇瓊壁萬尋影綷崇霞之閣拖虹梁而四注星漢􅃜於上榮叠雲棟而三休寒暑隔於中霤雕􅎝鶴企沓勢分規繡桷虬奔殊形别起圎璫布藻罄羽璧於狼泉方鏡披蓮孕化璣於蜃浦芝樓對幄重傳五日之風芸閣列錢彩鍜三旬之霧文疏罩迥隂兎息肩於綺寮翠幌籠霄陽烏鎩翼於珠網豐隆按節下複橑而司階列缺施鞭低叢楹而假道温房佇幸煦芳景於佳辰涼室乘閑凜徂飈於火序金鋪夕照若帝圃之輝瓊英寳綴晨懸類阿房之聚銀燭煙丘碧桂翊珉陛而披香雨岫頳筠夾璿流而颺影九衢翻翠雜仙卉於中逵四照霏紅間靈葩於右墄神禽率舞光浮肆夏之軒瑞鳥相鳴響叶鈞天之樂鈎陳宿列儼雙碣於丹霄綺徼霞周闢千門於紫露爾其左扄嵩鎭申侯降太室之正前枕莘郊伊尹發空桑之秀揭熊山而北眺貝闕猶存覩龜溜而西分瓊臺易接總交中宇廓川陸而疏畿竟想善隣揆風霜而建野然則因秦構極祖宗耀金䇿之符作洛恢基我后創璿居之始援天引聖隔代重暉横紫都而可襲配元宫而非逺故能使神光夜燭鏡麟趾於文除仙渰晨華委鸞章於繡礎靈爻宻發八方昭大有之和寳篆潛開六合啟同人之會兩儀交慶虚碧墠而翹旌萬㝢披歡指蒼車而候蹕雖青蒲頌德東朝獻龍鳳之圖而丹極鳴謙南􅆕動貂羊之詔百神推䇿望璆徑而䖍誠三讓奉符顧瑶壇而肅事龜書吐瑞按五校而分營鳳䇿揚輝翔八鸞而節步帷宫霧轉列芝蓋於中天帳殿星離軔蒲輪於大野紫鱗充饋若大帝之共臨素鶴翻華類羣仙之廣晏花開瑞雪委瓊饌而調芳綵絢祥雲夾珠旗而曳影功推三祖銀繩勒東岱之威業峻一人金筴奉南山之壽道旣成矣元符集矣代旣貞矣元勲緝矣運三辰而虚玉柄風兌渙其中孚懸五禮而偃金科雷坎光其作解奔烽舉爵溢仙酒於中衢叠鼓分餚浹宸輝於下里吞九重而上運控八聖而遐征翔赤驥而睇風區吟翠虬而掩霄甸隱隱轟轟雷動天驚囘輿斜眄而降乎乾元之殿司宫庀職肅坻堮而神行掌舎廵方煥岩廊而洞啟赤若朱螭負漢而輝横海之鱗黙若蒼鵬架壑而振垂天之翮千官曉次傃銀牓而端簪萬户宵披候瓊膏而肅帶靈戈列陛天官具三揖之儀雲輅充庭宗伯横九賓之禮瑶鯨戒響懸猛􅒶於端闈銅狄分形肅嚴扄於左序排紫微而立極宸儀冠明后之三俯黄道而披軒仙厯用乾元之九蕩蕩乎何聖人之無外巍巍乎而神功之不窮也臣勃席芳十步企景三冬雖承宣室之談猶窘靈臺之影仙壇逺秘已多謝於祥鶼大厦初成復攀榮於賀雀􅁣深梁甫終乖捧日之歡恩極甘棠未動凌雲之價神圖不測固流絢於丹縢微志可存庶鐫芳於翠琬敢獻頌曰紫扄垂耀黄樞鎮野銀樹霜披珠臺月寫嚮明立極横神廓社大壯摛爻斯干韻雅其一鶉居化没徂訛道長瓊構霞明璜軒露敞棄人崇欲違天蠧象南巢不救東隣長往其二瑶緘考懿金板藏功道凝茅屋業盛蒿宫龍階察祲鶴閣調風推訪華禮酌儉思沖其三懸釐結叠傳翼生災千甍嶺接萬栱星開爭圖絢侈福極凶來風寒碣館露慘蘇臺其四十館瑩秦金房砥室千間架漢韜雲閟日濟惡承危同亡異術傾輈未逺遺墟繼出其五龍川結禍鶴塞稱符塵驚八極霧􅃤三都穹廬寳極􅄢幕璿樞司宫墜典掌舎淪圖其六蒼衢毓祉丹丘表聖鳳矯仙樞龍廻寳命道凝金冊功馳玉鏡紫氣抽華黄輝叠映其七神稽鶴䜟迹播雞渾重光累極翼子謀孫經天緯象就日提元鸞軒湛粹鳳几裁尊其八祥抽紫􅍓業照彤管珍雀朝翻仙蟾夜滿丹墟獻跡青臺墜卵椒閫儀風芝閨奏􅍁其九登三建緒明兩開儀龍譙霧鬱鴛禁霞披浪分璿渚景俊瑶枝黄扉曉列丹轂宵移其十龜文獵彦麟旌放逸桂客攀榮松賓改律紫鴛開紀丹虬聳秩縱壑摶飈登山奉日其十一功融棘序道備槐庭不仁者逺惟道斯行煙揺墨綬電轉朱軿境懷春翟野散秋螟其十二鄭竹分科燕棠輟諷銅機化極珠囊業洞禮貴丹虬樂調朱鳳珠坰獻寳綿鄉委貢其十三龍闗靜柝鶴塞投弦歌呈豹尾舞進鳶肩銅撓月斥鐵鋼星懸繩幽架險驛霧馳煙其十四霧壇凝紫河宫湛碧翠萐翻飈丹蓂候魄霜均雹散連珠契璧蘤蓋籠霏花衢墜液其十五年和政美化極風調靈臺軫詠考室興謡循圖訪典去泰捐雕道存南面謙屈東朝其十六望雲裁構籠霄建宇方鏡星離圓璫月聚梓匠傾思林衡授矩畫栱栖煙文軒架雨其十七芝房叠翠桂廡流丹霞張萬户霧集千欒重扄駐燠洞牖栖寒神加有叙貺入無端其十八帝圖臨御黄僚萃止電㦸揮霜雲旌拒晷紫宫可逼黄街易履鳳礎騰文麟庭抗禮其十九珠泥暢績銀繩鬱契鶴嶺雲明龍壇景惠道超千古功推下濟惟帝惟天惟天惟帝其二十龍池聖德頌張九齡臣聞昔者元德升聞皇天眷命元聖有作上帝何言而必見意於休徵忘象於幽贊惟兹降鑒若曰專精道周萬物者其神尤功濟生人者其祥大粤若古始肇有君臣巢燧之前寂寥無紀書契之後炳煥可觀若乃鬼神睢盱品彚紛錯性命未正吉凶不定而太昊氏將通其德則河為之出圖人食未粒鳥獸是茹時不耕稼器無耒耜而神農氏將敎其本則天為之雨粟􅃖尤不道炎帝不制銅鐵鑄兵豺狼横厲而軒轅氏將禁其暴則天爲之降𤣥女洪水方割下民昏墊堯德莫能彌厥災舜功不能除其害而夏后氏將厎其績則洛為之出書自兹以降蓋三千歲矣其間木火更王雲物告符有若狼銜鉤魚躍舟素靈出黄星見豈不以湯德有慙武善未盡漢道旣雜魏方亦偏唯以一至之應且為興王之兆則未有天錫貞符聖受休命逺與大禹相續超與上皇比崇如我國家之盛者焉惟龍池蓋天之所以祚聖即今上卜居之舊里京師爽塏之地傍無竇澤中忽檻泉非常而靈液涓流無機而神池浸廣榮光休氣若烟若雲所未曾有則此之出雖清可以鑑而深不見底鱗介瑰詭於牣其中時莫知其所然日徒見其有異中宗採識者之議壓王氣而來逰聖上處或躍之時出飛龍而合應臨淄始封也邸第在焉上黨歴試也靈符紹至天其以是永命我唐圖象丁寜有所底止其若兹也夫成數有時而否至理無代而亡固在乎大聖之生也乘運而作鼓天下之動安天下之危故將順成功自古之啟佑之也如彼克定多難自天之協贊之也如此初中宗違代后黨窺隙大盜狃於得志羣慝起而擅朝若綴旌旒然當此時也天與若不取鬼謀若不協則我祖宗之業無乃將墜而億兆之命亦猶倒懸皇上感之提劍而起雷霆一奮妖沴以清内難旣衰外虞有謐推戴太上照臨萬邦實天之爲與人更始系皇統維乾綱决綻補壞蕩瑕滌穢而乃闕典咸備舊章悉舉處窮盡達在困必通品物資以再生寰區為之一變然後反華偽於樸還澆醨於醇以大道為源以至仁為根動推是心以御於事人見德而興行神享誠而介福故不任於刑罰亦不在於禱請大造化成元猷充塞有如陽春播澤觸類皆滋泰山起雲無逺不備雖昆蟲草木與蠻貊要荒樂其所生安其所習在牛羊而勿踐有干戈而載戢又况於衣冠華夏禮樂邦家而不形於斯須不彰於漸漬者也夫然何教非德何化非經何能事之不舉何醇精之未極周溥洋溢成平緝熙至於太和莫不允若體包天地之大事出皇王之表豈擎跪曲拳盡禮極力將用彦聖不啻其口所能稱誦於吾君所可殆庻於至德且往者之有開也天感精以降聖聖敬命以奉天此誠有元則欽明文思及兹報本必嚴祗齋慄靈慶以屬之神化以答之與初相明其微乃著紛綸先兆非篤信歟由是言之統天者人合符者聖而美德序命殊尤卓絶豈多乎哉至於古之興王必有所感五帝更尚五運傍通土者黄中之精於金為母水者善利之物於土爲妃茍應期而有來必合德而為表是則然矣天其或者亦阜育羣化發揮蕃祉始告以聖有明徵終成乎帝之神冊因其立象之本會以相乘之數則載祀六百厯紀千年變而通之胡可量也宗子宗正卿褒信郡王燦若干人伯父伯兄仲叔季弟聚族相與詣闕上言天意昭著固已久矣人事符合亦云至矣而一德是建太階旣平靈臺靈沼赫赫明明天之為大雖莫能名王之在鎬豈無頌聲上初克讓抑而未許至累請乃曰俞哉史臣不敏敢獻頌曰體侔天地阜育羣化茫茫元昊載凝載薄在帝庖義繼天而作浩浩洪水包山襄陵舜亦命禹夏氏以興龍圖龜書二主是膺湯武以下夫何足徵於爍巨唐乘運而起纘禹之統系堯之紀五聖在天丕命曾孫髙視河洛同符混元亦有黄龍出於靈沼明明穆穆天子之表倬彼東井昭彰於天沈精降液下為靈泉靈泉有泚其深無底泌之洋洋其甘如醴清德之鑑柔道之體洪源濬規實天所啟濯濯靈泉洞㝠皇祗滋液流衍化為神池曰止曰行唯聖之作匪鱣匪鮪唯龍之躍植物斯生動物斯樂天根有見曾是不涸靈有休氣紛紛郁郁如山之苞如雲之簇潛龍在下瞻烏在屋兆云其吉周爰咨詢旣契我龜又叶我人鎬雖舊京其命維新蜿蜒黄龍神池自出靈化惚怳噴雲沃日告帝之符其儀孔佶或潛於泉或見在田與時順動亦應於天克配我皇無得稱焉旌儒廟碑頌賈至觀象考厯本乎天辨方正位稽乎地體元御極先乎敎敎之大莫大於儒旌儒有祠新典也昔秦滅羲軒之制廢唐虞之則大搜學徒竭索儒黨懷書奉檄鱗集麏至然後罪九流之異論尤百氏之殊術殺無辜滅有道寃骸積於坑谷流血淬於泉壤蹈仁義而死者不可勝紀開元末天子在驪山之宫登集靈之臺考圖騐地周覽原隰見鄉名坑儒頹塹猶在慷然感亡秦之敗德哀先儒之道喪乃詔有司作是新廟牲幣有數以時饗祀因祠命鄉號曰旌儒人神和悦怨氣銷散於戲秦皇帝以神武邁古併吞六合掃天下以一篲剪羣雄如衆草建官罷侯大權在己自軒轅以降平一宇宙未有若斯之武也夫戡亂以武守成以文文以正崇武以權勝秦皇知權之可以取不知正之可以守向使天下旣定守正崇儒遵六經之謨訓用三代之文質則黄軒盛美湯武𢎞業不若也觀夫坑焚之意乃欲蓋先王之能事竊作者之鴻名黈衆耳以前聞逞私慾於當代此儒之所忌秦之所志悲夫儒以恭儉為宗秦則疲弊生人極力宫室儒以道德柔逺秦則竭耗中國勞師四荒儒以宥過議賢秦則刻法峭刑賊虐諫輔儒以述先好古秦則師心徇智播棄墳典夫如是則秦不得不滅儒不得不坑勢使然也今天子矯覆車之前軌崇明祠於後葉秦之所廢我之所興斯區夏無疆之休子孫萬代之福也昔武王封比干之墓則招諫之道勸矣普文表綿上之田則志過之名立矣漢髙䕶信陵塚則尊義之風著矣夫激揚大敎廟食衆賢上興天地之經次以存顛覆之鑒下以絶厲災之𤯝建一祠而三德具焉鯫臣不敏敢作頌曰於維先王設敎崇儒乃作六經為代典謨降及夫子三千其徒再揚清風文在兹乎天喪斯文道有通塞實生暴秦反道敗德竊善攘美師心徇惑焚書坑儒萬古悽惻牢落千祠微茫九原驪山之北坎窞猶存草樹無顔愁雲晝昏時聞夜哭知有寃魂帝在華清登髙訪古憫然頹塹悲涼榛莽上感亡秦覆車遺武下哀羣哲饗祀無主爰降嘉詔聿修清祠饋之牲牢奠酹以時幽幽廟門肅肅靈儀㝠寞求食長無餒而粤自漢初迄於隋閏亦有令主敦儒尚訓闕典罔崇斯文莫振昭昭神理長懷幽憤我后濬哲聰明文思敷𢎞大敎咸秩神祗鬼無妖災人不癘疵俾爾蒼生福壽無期小臣作頌敢繼刪詩京兆尹張公德政碑頌并序王維雲從龍風從虎氣應也聖人作賢人輔德同也君臣同德天地通氣以康九有以遂萬類惟皇御極二十載光格四表至於海隅日出越小大邦蠻貊師長罔不欽於成憲以承天休然天子猶日省三接列辟日聽萬方輿頌懼人有未化賢有未登故敭側陋兼乎十等選宗室及乎九族任事以觀材積時以觀行乃得我賢京兆焉夫京兆號為難理清靜病於不給刀筆拘於守文或以軟弱廢或以賊殺劾把宿負淺為丈夫用鈎距蓋非長者我則異於是大道難名大理無法閉闗於任數巧筭不能知堅壁於畫一善政不能下摧宿豪如薙草無愠色視大權如歴塊無傲容百司之吏總一德以咸服五方之人雜異教而同理受命之始先聲已振黠吏惡少聞風族行及乎鳴騶詣府登堂坐定縣尹掾史以次上謁守正之人其志髙含章之人其詞大見容色而聞號令小人慼而君子泰日者櫟陽男子閭里為豪借客報仇聚人為盜或白日手刄或黄塵袖鎚政寛則以身先諸偷操急則以事中長吏貳過不已萬計自脱公命吏縛之立死鈴下於是人入闇室若遇大賔焉前年不登人顇太甚野無遺糠路有委骨天子不忍征於不粒賦於無衣六軍從衞以臨東諸侯息闗中也帝曰咨天其降威人罔畏罪台恐冦盜乃邑矧曰蕩析離居惟爾克濟撫兹西土公拜稽首思塞休命布慈惠之政不以利淫震雷霆之威其或宥過饔人減雙雞之膳圉人省五馬之秣陶不獻服圬不塓舘自身已往振廩同食雖人煙不動道殣相望不思濫以茍生咸守敎以就死是不可能也先是王公或專南山之利司農涸昆明之池收赤岸澤將為田以便官至是悉奏罷之舟漁衡麓之守廢蒲荷薪蒸之産入自郊徂邑室有魚飱斬陰伐陽市多山木人得以贍惟涇有防比歲多决近縣疲於力役他山遺於度材公命刮朽壤填巨石辨大水去編菅其始告勞乃終有慶匠石日減功萬藏史日省錢億農始學耒女始安織於是鮐背黄髪之􅂄曰我有田疇鍾秉其畞我有子弟顔閔其行鄉黨以睦惸失其獨道路有禮汰無與爭酒先養老賄不問吏旣無吠狗亦無姦人臨年餘資竊䝉惠化其曷以臻茲君子曰此天子至公内舉不避親錫汝明尹張公之力也夫公於國爲外戚於帝為外弟重組累印珥香貂者七葉奉車駙馬乘朱輪者十人勝衣則綺襦紈袴通籍則玉墀青𤨏動則兩驂如舞坐則五鼎成列文軒楚製素女趙舞而公儼兮其若容淡兮其無味心在四敎語稱七德目視六籍口誦九歌懷君子令德之忠保詩人錫類之孝悌有過於共被慈有踰於含食惡衣以居公服不敢降也屈體下士王綱不敢替也協二姓之好以正人倫傍無嬖御分一人之憂以審官政下多英傑若夫皇帝敬問之詔御札自書天王賜命之衣上宫所製勞勤則中使接武計議則走馬來朝豈惟衆臣重其經術為吏雜以儒雅而已且公之德升聞於天非一朝一夕之漸也亦以稱職於累官著聲於所在其丞祕書也闕文遺簡多在大家深為子孫之藏宻有緘縢之固公不憚權貴或抵或誘盡歸天閣官書備焉其牧郢人也人有不若德戮之不為暴人有不保居撫之不爲諂存者考其事壯其食以畜之行者緝其宫藝其樹以待之此邦之人旣優他邦之人又至焉未盈一歳遂增萬户其守汾也仍歳大旱郡祠介推雖屢舞僊僊而靈應未若公命束藴取火伐樹寘薪釃酒而祝曰有功於人祀為明神無德而祿禍亦覆餗自絳以來人實祀子純犠大璧不敢愛必以薦也童兒季女不敢黷必以敬也神旣靡答人將安仰若亭午而雨則樹其鷺羽執此騂毛不然者火燎將至焮天爍地靈衣且為煨燼豐屋將為茂草爾其圖之言未畢而雲興拜未起而雨降周於闔境不入他郡雖封疆咫尺而彼竭我盈嘻若記能事載盛德渭川之竹不足簡終南之木不足軸夫訓人至於禮義曰德安人免於阽危曰功德者上賞於上下頌於下長老孜孜願刋於石以予學於舊史來即我謀且維與人編戸與人爲伍與人出入與人言語知風俗之淳弊識敎化之原本屬辭媿文書事蓋實詞曰五代相韓七葉侍漢及我聖朝亦生邦翰大道無形貞蠱以幹含章不耀在割能斷情偽萬端吾道一貫帝選賢尹無以易張金印紫綬京兆之章佩我鳴玉冠我兩梁天子休命拜手以將寛而愛人立滅暴强明明天子哀此南畝將息西人遂覲東后我敎我訓我鎮我守茫茫三秦則罔餬口守死以義徇生不茍王曰外弟視人不佻何以寵之手書以詔何以問之賜衣而朝俾人華胥致君帝堯刻石作頌永世彌昭修華嶽廟頌李商隱夫華嶽者正西之宗鎭正基周秦之墟仰䕃二井之曜協金德以王生含素靈而養物其狀也則削成萬仞秀出雲漢芝草植於其庭醴泉流於其下連帶崗阜跨抱原野谷之所潤則土為神區膏雨所降則澤沾萬里斯乃風雲之所官府物類之所歸藏盡精靈之至極窮山嶽之壯麗是以神明居其宅遊仙萃其宇往世以來莫不崇之故配天之美載在虞書宗秩之禮列於祭典大唐應期承天受命紹重基於萬世闡皇風於五葉敬神炳靈祈之以信而神降之福衆祥並應致治太平災害不作自非誠之所感孰能臻此開元元年九月戊戍遣元舅侍中太宰征東大將軍遼西王遼西常英冠軍將軍禮曹尚書河内公河内荀尚立節将軍安定侯直勤侯尼須薦以三特建立殿廟造作碑闕庶使眀神永安其居夫有一善之行尚稱之於時立惠於物猶詠之於世况至公配之於兩儀仁澤濟之於生民稽之於義容可已乎遂命史臣為之頌曰奕奕西嶽實曰華山基洞水府峻極於天跨原抱阜苞谷懐川幽壑澄潤虚岫揚烟峭㟧空籠茂林重邃吐納風雲殖生萬類體靜兼仁惠有攸利神明是居逰仙是庇巖以崇宗谷以虚受則天之髙擬地之厚澤潤無窮體實長乆功配兩儀德均徽猷朝咨上宰建兹靈宇正以凖繩參以規矩材用不愆顯章有厚庻幾神居永寜其所李懋功昭德頌張濛聖唐九葉皇帝平内盜攘外敵建中興永圖以崇王業乃命潼闗鎭國軍節度使檢校尚書右僕射兼御史大夫華州刺史武康郡王李元諒整兵隴右分鎭京西朝野訴以為宜軍州翕而益重復我洮罕期在於茲且謂分星辰之精山河之靈彧穆英明為國而生者也於是行軍司馬御史中丞董叔經以州人感公救其塗炭荷公拯其瘥厲露表羣言贊於雲隄曰臣聞鼓天下之大節莫先於忠義却天下之大難莫出於才能奏勲庸播金石以為天下表莫盛於碑版然則陛下宗臣元諒雄傑英勇沈斷明謀虎身之望夙成龍額之封果及武齊七德而克用為模文有九功而能舉為法故炳燭方郡粃稗韓彭桓桓然殉國之功皆可揭而昌言也昔陛下薄狩郊甸爰幸巴梁虵虺畜而患生豺狼飽而害作内奰宫闕黨與譸張何望之墾掘咸林敬釭窺覷蒲坂同逆相扇傾陷巨州元諒時以散員副戎闗鎮無一㕓之土無一旅之衆感憤而發招輯白徒斬賊使於潼津破賊將於敷谷乘勝連擊遂克城池閭閻載安室家相慶此其殉國之功一也勇而重閉以備不虞創續墉堤是徵板􅆬廻環裹於修郭延袤臷於通衢冀防馳突之鋒庶窒搜牢之掠四封輻輳不震不驚益凶䜿東顧之憂壯義夫西討之勢此其殉國之功二也州之器備自昔其空乃剔鑊鼓為兵撤氊彯為甲剡蒿揉為弩載簀鞏為排嚴約誓於五申肅部隊於三令勞逸斯共甘苦必分德以𨗳其懷刑以齊其力義以啟其憤忠以發其誠由是士皆嚮方樂公戰矣此其殉國之功三也藉馬蒐乘補卒濟師始編簿者二千終載書者一萬進次昭應稟命於副元帥之軍列屯興泰分援於尚可孤之壘元凶恃衆犯我中營或靡矜而來或掉鞅而去因其去也霆激飈衝分翼夾馳邀覈其陣血鬭滻川之水屍膏灞岸之田狡勢迷窮不能復振此其殉國之功四也蒼茫御苑横矗長雲摧百堵而洞開擁三軍而徑入姚令言望旗而隤張光晟棄甲而奔彀騎爭追若燎於藪賊泚憂迫躬率全軍驅其恟恟之徒揮我堂堂之衆一鼓而北竄死眞寜氛祲廓而黄道清腥穢消而彤庭肅頓師章敬都邑晏如迎大駕復於咸秦還大兵散於隂晉此其殉國之功五也李懐光阻河拒命竊弄戈鋋北連絳臺南抵黄巷選朔方之健將保朝邑之離宫陛下特詔攻圍重鞠戎旅總於經畧丕冐平涼或犄擊其救兵或邀絶其餫卒力殫命窘因乃求降未殱當道之豺且碟吠籬之犬此其殉國之功六也進屯河縣接邏官橋雖竹纜已焚而水口將渡大憝知窘猶懐鬭心乘時出奇幸於有勝遲明遇伏卒以無歸恚慼窮城因絞中閤三條以謐三輔斯寜此其殉國之功七也戍羌不道俶擾西陲驟掠邠涇深入鹽夏狃其横猾溽暑仍留茍不用權若何攘暴廼勵我鷹揚之旅乘其馬瘠之時張皇軍形緩俘令逸然後排烽結隊加竈翻營師未逾於洛源冦已還於河典此其殉國之功八也婪婪藩戎匿詐求和重違修好之言用許尋盟之約諸軍畢會是獨沈凝陳其不誠請以為備且曰古者諸侯相見兵衛不撤警也今敵人反覆未可以端拱待之乃距平凉二十里所柵為壁塹為壕設晉師敖前之伏修楚臣勁後之殿練鋭三千涉涇式遏旣而升壇將㰱果以惡來聲若河翻勢如山進望我旗鼔驚眙而還禦侮之道旣𢎞折衝之威亦著此其殉國之功九也良原縣間在涇隴西壓窮邊罹彼烟塵剪除荆棘事未經啟宻令興功遂發軫而遽行即建標而特起恢其制度峻以規模役不二旬隱然岳立乃修廬井乃闢田疇商旅載通流庸偕附烽堠交於塞表保障連於峽右雖周築虎牢漢憑馬邑遏式亂畧曾何足云此其殉國之功十也朝廷所以降丕命䇿髙勲重位以崇之豐爵以榮之歌鐘以樂之邸宅以寜之自建中以來衛社稷之臣秉旄鉞之將除宰輔董閫外其孰能疇匹於此哉況明允豪賢勤於理要清庶以康黎獻簡恤以裕公私推信誠𢎞敬讓薄九賦勵三農抑浮窳之風興㢘正之教一年而人知禁二年而人知惠三年而人知愛四年而人知誦夫然又安可使懋功昭德沈隱無聞者歟願聽華人篆之樂石制曰可於是􅂄壽茘非升古沙門釋僧會道士逰方外等千乃心萬乃口喜從所欲祈我筆端乃約奏章以纂成績公本姓安氏武威姑臧人蓋黄軒帝孫降居安息髙陽王裔留宅姑臧僕射元魏之肱股武衞巨唐之牙爪世濟其貴公又昌明而弱歲羈孤感於知己某某之族從駱統之姓鎭潼闗者五年矣旣申武節克建戎勲天子以敦淳可親誠明可信更名錫氏以昭實焉書所謂踐修厥猷靈承多寵者矣若夫校功王府譔德侯家雖馮異揚言已傳徽於昔歲而吉甫作頌庶𢎞美於今辰詞曰洸洸武康兮有䖍秉鉞即戎臨敵兮原火烈烈隊如星兮陣如雪進如流兮止如臷轉電激兮衝風發壞苑垣兮復宫闕旣東征兮又西伐鼙鼓雄兮才氣傑滌昬霾兮掃妖孽河瀆清兮渭源澈功旣成兮恩亦結倚鐵防兮賚金穴華山麗兮敷水澨惠汪濊兮威凜冽庻甿安兮羣盜絶舞稚童兮歌大耋城窣雲兮營偃月望麾幢兮想旌節樹豐碑兮頌英哲詞不媿兮勲不滅河瀆廟頌節宋陳振惟此洪河自大觀以來變濁為清者畧有三焉乾寜保平率以累日惟二年冬見於同州之韓城郃陽其袤百里其乆彌月詔遣尚書臣張勱持祝往祭旣抵其野訪故祠得破屋一區風凌雨剝頹圯殆甚懼不足以尊顯靈德上副一人誠報之意故已事而還請新廟貌詔可其奏旣賜幣劵以經其用又出大農之錢以助其不足鳩工飭材一不在民庀事於政和元年秋八月之壬寅落成於二年春正月之甲子凡為屋之楹三十有四堂崇以延門嚴以閌有廡如掖有屏如植籩豆之設有位侍衞之列有所輪奐丹雘儼無不肅乃賜靈源為號因命擇詞臣而記其事部使者猥以屬臣振臣振不敢以荒菲辭竊惟洪範之數兆於五行五行之證原於五事嘗以傳記考之河千歲一清其應在人君壽考天下治安今接歲三清應益昭著自非睿聖撫運溥博淵泉通乎髙深何以及此是宜有以鋪張閎休揚厲偉蹟而詔乎無窮也如臣鼃壇之陋顧安能識咸寜之太和而調達之姑以區區之見述其萬一而預榮焉臣謹拜手稽首而為之頌曰皇帝臨御十有三年禮制樂作典章粲然道德之妙格於皇天景星慶雲膏露醴泉諸福之物克臻其全大觀之初濁河三清乾寜保平郃陽韓城有泓其澄有光其榮詔遣臣勱報祭惟精乃新其宫靈源其名郡縣奔走累月而成神歆其𩔖旣安且寜皇帝有道山川受職􅡋符來貺惟神之錫皇帝有道受福無疆神之聽之德音不忘簿領臣振預榮釐事作為聲詩垂千萬禩瑞麥頌有序明劉基天厭元德九州麋沸羣猾並作黎民惶惶奔走無路皇帝提三尺劒奮起草萊指顧之間豪傑景附矛鋒所向戰克攻取皇帝心知天意之有在爰舉有衆以與萬姓請命一征而取荆襄再征而清浙江三征而閩海率從四征而席巻全齊五征而定周及梁遂取秦晉舉燕趙東西南朔海外之邦莫不望風遣使奉朔稱臣拜伏闕庭於是民獲所歸上下神祗咸有依託慶雲甘露洊奏禎祥帝心謙抑每讓不居洪武三年五月陜西寳雞縣進瑞麥一莖五穗者一本三穗者三本兩穗者十有餘本蓋自兵興以來王保保據周宋李思齊張思道據秦燕晉趙齊梁之間大豪小猾或憑城郭或聚山寨皆假元為名分割境土擅兵相攻於是燕晉周齊之地彌數千里連歲無雨百穀不生民相殺食且盡今年夏四月王師奏捷於蘭州河漠掃平闗隴底定乃天降甘雨滋為嘉瑞和氣致祥不亦昭哉周頌有曰綏萬邦屢豐年天命匪懈傳者謂商之季年比歲旱荒武王克紂受命而天下遂獲豐年由今觀之信非誣矣漢謡以麥穗兩岐歌其太守之美政則是兩岐之麥所希有而况於三岐以至五岐者哉頌聲之作弗可缺也頌曰神雀赤烏其羽不可以爲儀紫芝甘露其實不可以療飢豈若五穀之為瑞可以厚民之生豐國之資者哉元失其鹿天下共逐紛紛擾擾强食弱肉皇天震怒誕命眞主肅将天威以靖區宇騎士如雲猛將如龍發縱指示悉出帝衷遂定西北居民攸奠品物咸殖爰有嘉麥一本五岐在葉萋萋結實離離旣濟旣平先百穀成擢穎揚芒金枝翠英溥彼原田滃若雲煙望之油油即之芊芊其種伊何降自穹昊其瑞伊何豐年之兆豐年穰穰頌聲洋洋其始至今奕世無疆瘞希夷骸得雷雨頌張光孝遡彼眞源挺生神哲渦水神媪識公超絶維唐長興公出應時人亦弗耦公志則悲唐末大亂元元塗炭世旣無援公乃浩歎奮志行㳺經綸欲攄陳橋帝起公笑墜驢矯矯公心窺道之奥引風長㳺謝世紛藻九室之嵒以幽以靈辟穀煉氣蟬蛻其形五龍之仙喜公談易公亦龍德授術比迹載卜華山龍蟄駐顔野花啼鳥玉峽雲闗公名震世人睇以慕辭官於周優游敦素素節逈出不染塵氛達觀静理長卧白雲宋帝屢辟公志不移禮數優渥爰頌希夷緬思我公行藏芬苾憂民以股守中協吉方其山隱形與天髙屢聞革命顰蹙焦勞伯溫有述非淺丈夫盛德大業數舛其途匪直仙姿耽於獨善希天之運肖天之彦嗟幾千載峽藏道骸雲雨應葬吾黨乃諧反覆憶公公安所遇卓矣天人誰希髙歩萬壽閣頌本朝鄂海臣聞聖神御世應五百歲之昌期天地凝庥輔億萬年之永祚故瑶星貫月紫電環樞感瑞氣於姚墟繞靈光於華渚莫不太和翔洽寶厯綿長自昔有徵於今為盛蓋皇古遞傳之道法必至聖始集其精華而山川吸納之嘉祥至美今日獨當其美備欽惟皇帝陛下心涵太極質秉純乾參贊髙深契長生於軒䇿經綸宇宙彚諸福於箕疇德兼聖神文武之全道集堯舜禹湯之統乘六符而啟運包六合以為家河色千年列宿拱北辰之象山聲萬嵗層霄絢南極之光率土騰歡普天誌喜長春令節欣逢三月十八之嘉辰萬壽傳觴恭值四十二年之鞏厯龍旂時邁豹尾西來膏雨滂沱原澤與秦川並永惠風鼓盪恩光偕華嶽同長爰合秦人頂德之誠共構聖主祝年之地層樓鳳舞遥連紫氣於晴空髙閣翬飛時吐紅雲於春晝仰模宸極雄瞻百二山河聳立薇垣拱䕶億千星斗臣海荷恩深重忝守封疆輒傾葵心永延椿歲乃拜手稽首而作頌曰天佑聖皇丕承厯服德配乾坤功參化育山川永奠日月貞恒一人有慶五老來廷惟聖格天惟天眷聖萬禩千齡一心基命道超邃古氣轉洪鈞允文允武乃聖乃神精一執中建其有極旰食宵衣至誠不息天錫皇帝齊聖廣淵昊軒媯姒德總其全對越郊壇必親必敬鳳輦雲隨龍旂星映祖功宗德昭事維䖍耿光大烈繼述千年藹藹慈闈雝雝天子問寢燈前扶輪花裏皇帝之孝錫及萬民薄海内外各親其親皇帝之仁我民我子賜復蠲租恩同怙恃皇帝之武赫濯聲靈翕張魁柄震盪風霆皇帝之明重光炳耀如日當中幽微畢照更開講幄授几儒臣微言大義月窟天根丙夜垂神六經百氏寳冊瑶編丹書綠字學山煙秀筆海波澄天經地緯玉振金聲睿藻輝煌宸章絢爛天日晶明雲霞璀璨闢門取士溢格遴才四方從欲澤滿春臺乃切其咨翠華西幸河嶽懐柔百靈協應秦人忭舞載道謳吟聖恩髙厚泰華千尋帝曰念哉予民父母推食解衣必先黄耉太和洋溢元氣氤氲四靈輻輳萬福嶙峋白叟黄童拜手稽首願祝華封永延聖壽天開地闢鳥革翬飛光浮日月氣吐虹霓有似宸居儼然北極悠乆同天大年千億煙凝椿葉雨灑梨花蓮生碧渚鶯舞晴沙玉李含香金桃藴液瑞啟黄雲丹成絳雪騶虞在囿鸑鷟鳴郊祥光薈萃爰産神堯德本生知功侔帝造風動時雍熙熙皥皥羣臣虎拜祝我聖人長綿寳祚過億萬春子子孫孫永霑君澤子孝臣忠順帝之則終南山色東澗西􅈆聖人御宇億萬斯年法正贊漢楊戲翼侯良計料世興衰委質於主是訓是諮暫思經筭覩事知幾文王贊魏曹植於赫聖德實惟文王三分有二猶服事商化加虞芮傍開四方王業克昭武嗣遂光武王贊前人桓桓武王繼世滅殷咸任尚父且作商臣功冒四海救世濟民天下宗周萬國是賔成王贊前人成王繼武賢聖保傅年雖㓜穉岐嶷有素初疑周公終焉克悟旦奭佐治遂致刑措太華贊晉郭璞華嶽靈峻削成四方爰有神女是挹玉漿其誰逰之龍駕雲裳文王見吕尚贊北周庾信言歸養老垂釣西川岸止磻石溪惟小船風雲未感意氣怡然有此相望於兹幾年秦穆公飲盜駿馬贊前人駿馬遇盜秦王不嗔先傾美酒翻畏傷人鄰兵向國窮冦侵秦於時大盜還作功臣樊噲見項王贊前人樊噲將軍漢王車右不憚鋒刄何辭斗酒灞上屯軍鴻門固守持謝范增惟留玉斗朱雲折檻贊前人上書直諫有怙眀君先求斬馬遂請龜文身摧欄檻義烈風雲應從御史翻賴將軍蒲津橋贊唐張説易曰利涉大川濟乎難也詩曰造舟為梁通乎險也域中有四瀆黄河居其長河上有三橋蒲津是其一隔秦稱塞臨晉名闗闗西之要衝河東之輻輳必由是也其舊制横絙百丈連艦千艘辮修笮以維之繫圍木以距之亦云固矣然每冬冰未合春沍初解流澌崢嶸塞川而下如礎如臼如堆如阜或摐或掍或磨或切綆斷航破無歲不有雖殘渭南之竹仆隴坻之松敗輒更之罄不供費津吏咸罪縣徒告勞以為常矣開元十有二載皇帝聞之曰嘻我其慮哉乃思索其極敷祐於下通其變使人不倦相其宜授彼有司俾鐡代竹取堅易脆圖其始而可久紓其終而就逸無疆惟休亦無疆惟恤於是大匠蕆市百工獻藝賦晉國之一鼔法周官之六齊飛㢘煽炭祝融理爐是鍊是烹亦錯亦鍛結而為連鎻鎔而為伏牛偶立於兩岸襟束於中潬鎻以持航牛以繫纜亦將厭水物奠浮梁又疏其舟間畫其鷁首必使奔澌不突積凌不隘新法旣成永代作則原夫天意有四旨焉濟人仁也利物義也順事禮也圖逺智也仁以平心義以和氣禮以成政智以節財心平則應諧百神矣氣和則感生萬物矣政成則乂文之經矣財節則豐武之德矣故天將儲其禎地將阜其用人將盈其力聖皇之道乾乾翼翼觀藝而無窮詠功而無極杜葉公如晦贊吕温穆穆葉公奇姿粹靈藴元和氣為大國楨乘時恢能唐室大開故人相擕直上太階更為隂陽迭作日月佐明四海贊育萬物王度是欽如玉如金德音愔愔萬有千古永稱房杜如周申甫劉䕫公𢎞基贊前人䕫公崢嶸金虎之精應時而生與運俱行總帝元戎震唐天聲瞋目張膽前無金城别建龍節中分虎旅啟行萬里乗氣一鼓劒揮雷霆斾巻風雨先馳咸陽鎮定天府天府旣定唐集大命入揚王庭出權兵柄薄伐獫狁朔風不競徂征島夷東海如鏡義始忠卒元勲之盛殷鄖公開山贊前人温温殷公初若懦夫銅印試吏褎衣為儒大風驅雲忽與之俱遭逢眞宰參造化謨天地既闢厥功有赫從王襲行佐帝光宅逺展驥足髙揮鳳翮以永終譽垂於竹帛李衞公靖贊前人有隋之末羣盜熾􅅡金精下射猛毅感激李公矯矯從此奮跡躍於中原王者則獲壯士不死唐威載赫帝曰汝傑致天之罰手付金鉞俾往式遏不庭則殺如飈發發如火烈烈摧枯爍雪應鼓如截逺若荆巫險若江湖莫不率從莫不震恭車書混同氛祲蕩空衞侯之功功則維何威明惠和策勇駕智長驅仁義仁義曠蕩帝王之將萬古曷瞻鐵山巉巉王珪贊前人隋氏不君忠賢莫用桐生朝陽有集維鳳拾彼頽厦鬱為新棟路車元衮開國有宋武德之暮羣孽内蠧巍巍宋公聳節高步不吐不茹不來不去屹崛中立為天一柱從容而言社稷遂安持式秉純光輔三君激濁揚清知人知身其道至廣莫我敢羣其境至大不容纎塵雪霜倚空冰壺照人淮南節度灞陵公杜佑寫眞贊苻載碩德昂昂智圓德方武庫矛㦸禮容珪璋神氣端凝風儀髙張晴天鶴立秋水龍驤拓旄淮南俗阜民康休聲四塞入覲天王天王虚懐待公廟堂始終進退赫然有光後人來斯環遶長廊以此淨域便為甘棠四皓贊李華時濁代危賢人去之商洛深山鸞潛鳳飛漢以霸興皇王道衰玉帛雖至先生不歸吾非固然可動而起龎睂皓髪來䕶太子至尊動容奪嫡心已四賢暫屈天下定矣返駕南山白雲千里漢三髙士贊選一陸龜䝉摯先生恂伯陵之孫學通五經居於渭濵弟子累百馬融服勤以子妻之師而益親融為大儒恂乃知人和帝之世公卿以聞季直才氣宜當輔臣公車就徵禮備元纁守道不至終為逸民張横渠贊宋朱熹早悦孫吳晚逃佛老勇撤臯比一變至道精思力踐妙契疾書訂頑之訓示我廣居蒲城崔朝請去思贊金張建振振崔公聿來自東字我邦人如嫗如翁民或有訟公與折衷察見情偽斷適輕重歲或愆陽公心不遑禱則􅗈霈賜我豐穰公出於畝熙熙童叟餉其作勞撻彼㳺手公詣縣庠士子翺翔談書詠詩文風載揚凡此數者得之輿議序而贊之無一字愧澄城師節婦賜諡贊郭黻伊雷之妻曰師其氏守義終養安貞一紀不幸被誣明心以死悠悠蒼天不諒人只名動朝廷恩光閭里賜以美諡筆之信史既端婦則亦告君子馬援贊明方孝孺矯矯馬公惟志之偉志在功名氣不少萎貧堅老壯公言則然懐奇藴樸罕識其賢雲乎鬱鬱雷乎震震紫色鼃聲炎輝斯盡公晦於時爰牧爰蓄飈氛九縣顧瞻安之曰述曰囂狼貪豕飽鄙不少留聿求漢道來觀真主應對疏通謂帝大度髙祖則同遂委臣質遂効臣節聚米討羌得以蕩越四方底平人懐安娛公不晏佚許國以軀滔滔武陵蠢蠢雜種梗化撓邊負險恃勇公曰茲役老臣馳驅堅請於行秉節舒舒不驚不亟既安且式試兵臨卿蠻即摧辟扼於壺頭匪公之尤天少須假孰測厥猷公雖没世因則成事乃招乃來羣蠻無二云胡巧夫䜛言朋興豈不暫翳事乆則明迄茲千載有顯愈赫名徹聽聞功載史冊茲纂其詞為示無極云敞贊前人人之趨勢皆若可託觀於生死乃見厚薄朝以為師暮則背之人實易誑心其可欺嗚呼云子志剛氣烈曷以知之赫然大節妻子在後鐵鑕在前所見者義吾何恤焉吾身可恤師其可負視彼更名大䑕之伍道䘮民散俗益壊媮面恭背違犬䑕所羞不於其難矧徇其死我獨何人嗚呼云子李氏慶餘贊有引温純李氏姑王婦温蓋吾邑所稱雙節者云王稱未亡人時年二十有八耳當其時伯子生甫八年仲子二年季子猶然在娠其後三子以王力竟成立而王亦以節著聞里中温蓋余從姑也蚤失仲子獨撫其歲餘子汝正亦成立嘉靖中督學某公檄縣旌王匾其􅎝然未有聞之當宁者蓋閭閻隱行不上聞類如此汝正舉孫所親各持牛酒為姑負圖往賀蓋曰汝正蚤舉孫皆姑婦餘慶云余為揚扢俟觀風者採焉贊曰惟古立孤曰趙宣客嬰為其難煜煜史策王實比德家用阜昌有美三鳳奕葉芬芳仲婦曰温從一於李婦復依姑雙節並美嬰以丈夫興趙猶難矧茲閨閤鵠立雲端食報持劵充閭有慶耳孫繩引積德之證豈天故奪二夫君令内行彰乂故昌二夫君後令世知天道報應之常也耶王端毅像贊張元楨昂昂乎大河喬嶽之英落落乎㧞地凌霄之器所攀者聖賢必居之安而資之深所重者君親必俯不怍而仰不愧凜乎嚴霜勁鐵有定見有定守煥乎晴空白日好心事好心地前朝之羣雌孤雄敢言人不敢言敢為人不敢為新朝之天下大老係宗祏之一安一危係君子之一進一退其高標雅望足以鎭􅏽邪棼然之操其義膽忠肝足以勵頑懦靡然之志於戲此眞聖明世之偉人吉人正人天地間之英氣間氣正氣孫一元贊顧璘宦達無施愧彼塵鞅山間考槃乃嘉髙尚龍笛吟風鶴瓢酌月皎皎太初江湖之傑馮少墟像贊朱之蕃穆如春風瞻有道之儀容淵然太冲窺含德之心胸澹泊無營者其純素之衷慷􅁣發䝉者其啟牖之公同志景從鬱起一代之儒宗邁往立隆身維百世之頽風蔬水鼎鐘浮雲舒巻於太空霧豹雲龍虚㳺渾合於鴻濛若少墟翁者殆間氣之所鍾而障狂瀾於注東者歟青牛樹贊有序本朝達禮善昔老子騎青牛度函谷闗闗吏尹喜遥瞻紫氣修敬伏謁強老子著書文成五千訖今為千萬世修道者所欽式其意以守雌為主得退一步法非燕齊迂怪家言也老子嘗繫青牛於華隂廟樹自周歴秦漢以至於今數千年矣而樹巍然獨存雖枝葉凋殘其老幹嘗濯濯有生氣余屢次函谷往往摩娑竟日不忍捨去因作詞以贊之道德之祖厥惟老􅖫致虚守靜無慾不貪函闗紫氣玉潤珠涵著書為經千載是探文成五利術敝而顚揆之老氏霄壤判然青牛西去龍德淵潛蒼蒼古樹尚留人間洊經兵火蘚剥苔斑獨餘鐵幹生氣中含老蛟伏地長虹亘天至人寄跡萬古薪傳可追杏席異彼瞿曇柱下守禮孔子問焉因人重物逺邇同瞻雍州牧箴漢揚雄黑水西河横截崑崙邪指閶闔畫為雍垠上侵積石下礙龍門自彼氐羌莫敢不來庭莫敢不來匡每在季主常失厥緒侯紀不貢荒侵其宇陵遲衰微秦據以戾興兵山東六國顛沛上帝不寜命漢作京隴山徂疆列為西荒南排勁越北啟彊胡并連屬國一䕶攸都蓋安不忘危盛不諱衰牧臣司雍敢告贅衣上林苑令箴前人茫茫大田芃芃作穀山有征陸野有林麓平原汚藪禽獸攸伏魚鱉以時芻蕘咸殖國以殷富民以家給昔在帝羿其田盤逰弧矢是尚而射夫封狐不顧於愆卒遇後憂蓋以田獵三驅不可過差麀鹿攸伏不如德至衡臣司虞敢告執指闗都尉箴崔瑗茫茫九州規為闗津唐堯積德三代修仁越季不軌爰失厥人聖賢不用頑嚚是親漢潰武闗項破函谷秦王子嬰縊為禽僕尉臣司闗敢告並轂溫泉箴唐張説東山少連曰𤣥㝠氏之子曰壬夫安祝融氏之女曰丁芊俱學水仙是為温泉之神焉帝命之救萬靈盪滯結腑藏達膚腠泄下人多賴上帝是崇有飛㢘氏之佚女妬之常欲大慁其功故入温泉必齋以洗心戒以防患恕以利物含生之疾我願除祓二神嘉之吹湯激邪珠連漚漯潏汩揚華此其效也若入温泉僻心穢行惡言淫形居食失節動出躁輕二神醜之不匡人命飛㢘佚女以裾􅗓人是走疰芒風瘍眩齵之病夫有意之醫照合神聖無恒之醫身為慾使莫之益傷之者至矣是以君子慎其微也西嶽華山堂闕碑銘并序漢張昶易曰天地定位山澤通氣然山莫尊於嶽澤莫盛於瀆山嶽有五而華處其一瀆有四而河在其數其靈也至矣聖人廢興必有其應故泰山石立中宗繼統太華授璧秦胡絶緒白魚入舟姬武建業寶珪出水子朝喪位布五方則處其西列三條則居其中若廣袤奇蠱山經有紀矣是以帝王廵狩親五嶽而告至覲方后而考禮故經有望秩之禋典有生殖之祀蓋所以崇山川而報功也四海一統天子秉其禮諸侯立政彊國攝其祭奉其邑曰華隂也乆矣乃紀於禹貢而分秦晉之境奉鄙晉之西則曰隂晉邊秦之東則曰寜秦邑旣遷徙禮亦如之二國力爭以奉以祭其城險固基址猶存故老之言未殞於民也逮至大漢受命克亂不愆不㤀舊名是復率禮不越故祀是尊厯葉增修䖍恭又備一禱三祀終歲而四以迄於今而世宗又經集靈之宫於其下想喬松之儔是遊是憩郡國方士自逺而至者充巖塞崖鄉邑巫覡宗祀乎其中者盈谷溢谿咸有浮飄之志愉悦之色必雲霄之路可升而越果繁昌之福可降而致也故殖財之寶黄玉自出令德之珍卿相是毓匪惟嵩高降生申甫此亦有焉天有所興必先廢之故殷宗周宣以衰致盛是時也王業中缺大化凌遲郡縣旣毁財匱禮乏庭廟傾壊壇場蕪穢祭祀之禮頗有缺焉於是鎭逺將軍領北地太守閿鄉亭侯段君諱煨字忠明自武威占此土憑託河華二靈是興故能以昭烈之德享上將之尊銜命持重屯斯寄國討叛柔服威懷是示羣凶旣除郡縣集寜家給人足户有樂生之歡朝釋西顧之慮而懷闗中之恃雖昔蕭相輔佐之功功冠羣后弗以加也遂解甲休士陣而不戰以逸其力修飾享廟壇場之位地荒而復闢禮廢而復興又造祠堂表以參闕建神路之端首觀壯麗乎孔徹然后旅祀祈請旣有常處雖雨霑衣而禮不廢於是邑之士女咸曰宜之乃建碑刻石垂示後裔其辭曰於穆堂闕堂闕昭明經之營之不日而成匪奢匪儉惟徳是程匪豐匪約惟禮是榮䖍恭禋祀黍稷芬馨神且醉止降福穰穰郙閣銘蔡邕惟斯析里處漢之右谿源漂疾横注於道涉秋霖漉盆溢深溝濤汲滂沛激揚絶道漢水逆瀼稽滯商旅路當二州經用所沮沮縣甚乆或給州府休謁往還恒失日晷行旅咨嗟郡縣所苦斯谿旣然郙閣尤甚憑崖鑿石處隱定柱臨深長淵三百餘丈接木相連號為萬柱過者愕啼載乘為下常事迎布遭遇隤約人物俱墮沈没洪淵酷烈為禍自古迄今莫不創楚於是太守漢陽河陽李君諱會字伯都以建寜三年二月辛巳到官思惟惠利有以綏濟聞此為難其日久矣嘉念髙帝之開石門元功不朽乃俾官椽下翔讐審改解危殆即便求隱析里大橋於爾乃造校致故堅故巧雖百魯班亦莫擬象又醳散闗之漸漯從朝陽之平􅏫減西閣就安寜之石道禹𨗳江河以靖四海經紀厥績艾康萬里勒石示後乃作頌曰降此惠君克明峻德允武允文恭儉尚約化流若神教民如均精通皓穹三納符銀所歴垂勲香風有隣仍致瑞應豐稔以樂行人怡欣慕君靡已乃詠新詩曰川兑之間髙山崔嵬兮水流蕩蕩地旣墝确兮與禹為隣析分告緒業兮至於困貧危危累卵兮聖朝憫憐救傾兮全育孑遺劬勞曰稷兮惟惠勤勤充庻兮百姓歡欣僉曰太平兮文翁復存石門銘并序魏王逺此門蓋漢永平中所穿經數百載世代綿㢠廻戎夷逓作乍開乍閉通塞不恒自晉氏南遷斯路廢矣其崖岸崩淪澗閣湮圮南北各數十里車馬不通者乆之攀蘿捫葛然後可至皇魏正始元年漢中獻地褒斜始開至於門北一里西上鑿山為道峭岨盤迂九折無以加徑途窒礙行者苦之梁秦初附實仗才賢朝難其人裒簡良牧三年詔假節龍驤將軍梁秦二州刺史秦山羊公建旟嶓􅜗撫境綏遐盖有叔子之風焉以天險難升轉輸艱阻表求自廻萬以東開創道路釋負擔之勞就方軌之逸詔遣左核令賈三徳領徒一萬人將帥百人共成其事三德巧思機發情解意㑹雖元凱之梁河德衡之損躡未足以偶其奇起至正四年十一月十日訖永平二年正月畢工閣廣四丈路廣六丈皆塡谿棧壑砰險梁危自㢠廻萬至谷口三百餘里連輈併轡而進往哲所不工前賢所輟思莫不疏而通焉王生履之可無臨深之歎葛氏若存幸息木牛之勞於是蓄産爐鐵之利紈綿罽毼之饒充牣川内四民富貴百姓息肩壯矣自非思埒班爾籌等張蔡忠公􅁯私何能成其事哉乃作銘曰龍門斯鑿大禹所彰兹巖乃穴肇自漢皇道由國中以宣四方其功伊何旣逸且康去深去阻匪閣匪良西帶汧隴東控樊襄河山雖險漢德是強昔為畿甸今則闗疆永懐古烈跡在人亡不逢殊績何用再光水眺收皛林望幽長夕凝晚露晝涵曙霜秋風夏起寒鳥春傷穹窿髙閣有車轔轔成夷古道駟牡其駰千載絶軌百兩更新敢刋巖曲以紀鴻塵溫湯銘北周王褒挺此温谷驪岳之隂白礜上徹丹砂下沈華清駐老飛流瑩心谷神不死川德愈深終南山義谷銘并序庾信周保定二年歲次壬午七月己巳朔大冡宰晉國公䕶鑿石闗之谷下南山之材維公匡濟彞倫𢎞敷庻績燮理餘暇披閱山經以為終南敦物日月虧蔽杶幹栝柏椅桐梓漆年代蘊積於何不有乃謀山澤之官兼引衡虞之匠東出藍田則控灞乘滻西連子午則據涇浮渭􅉽别八溪流分九谷銅梁四柱石闕雙聳青綺春門溝渠交映綠槐秋市舟檝相通蓄之則為屯雲泄之則為行雨青牛文梓白鶴貞松運以寘宫崇斯雲屋千櫨抗殿龍首干雲萬頃踈苖蟬鳴再熟川后讓德山靈景從豈如運石甘泉纔通櫟陽之殿穿渠穀水直繞金墉之城將事未勞為功實重國富人殷方傳千載因功立事敢勒山阿銘曰寥廓上浮崢嶸下鎭壁立千丈峰横萬仞桂月危懸風泉虚韻乘輿嶺阪舉鍤雲根八溪分注九谷通源北涵桐井南浮石門模象大壯規繩百堵膠葛九成徘徊千柱桂棟凌波柏梁乘雨疏川奠谷落實催柯事均刋木功侔鑿河玉華宫山銘唐髙宗順請峒山鐫芳金石道光軒駕聲流姬迹引此崇嚴介通帝宅峻侔銅柱祥韜金碧飲渭南通鳴岐西格炎生肇授彤暑初融髙明叶序卜揆裁宫鳳標銜露鳥跂捫空丹谿繚繞璇樹玲瓏逕分餘雲嶺界斜虹流花縟景清籟嘶風波移控鯉雲飛御鶴沈沈松嶝萋萋蘭幄霧宿重巒寒生洞壑峰髙鳥路月對林垂交藤散綠懸鏡成規鵷歸繞蕣鳳下標椅崖依注蘚池涵巻葹廣運堯心式昭夏諺端靈養白申歌秘殿菌閣流霜椒臺凝霰玉榮則賞瑶池肆宴福壽無疆華封斯薦景龍觀銘并序睿宗原夫一氣凝眞含紫虚而搆極三清韞秘控碧落而崇因雖大道無為濟物歸於善貸而妙門在於希聲景龍觀者中宗孝和皇帝之所造也曾城寫質閬苑圖形但名在騫林而韻停鐘虡朕翹情八素締想九𤣥命彼鼓延鑄斯無射考虞倕之懿法得晉曠之宏規廣召鯨工逺徵鳬匠耶溪集寳麗壑收珍驚風雨之辰節昏明之候蜚㢘扇炭屏翳營爐翥鶴呈姿蹲熊發狀角而不震侈而克揚庻其曉散靈音鎮入鵷鸞之殿夕騰仙韻恒流鳷鵲之闈聾俗聽而咸痊迷方聞而永悟洪鈞式啟寶字攸􅒢其銘曰紫宸御厯青元樹因傾嚴集寶竭府收珍杜䕫聿應張永規陳形包九乳儀昭萬鈞上資七廟傍延兆人風嚴韻急霜重音新歴茲千歲從今萬春縣玉京而薦福侣銅史而司晨三受降城碑銘并序吕温夏后氏遏洪水驅龍蛇能禦大菑以活黔首周宣王城朔方逐獫狁能捍大患以安中區若非髙岸峻防重門擊柝雖有盛徳曷觀成功然則持璿璣而弛張萬象昊穹之妙用扼勝勢以擒縱八極王者之宏圖道雖無外權則有備變化消息存乎其人三受降城者皇唐之勝勢也昔秦不量力北築長城右扼臨洮左馳碣石生人盡去不足乘障兩漢之後頽為荒丘退居河滸歴代莫進矯亡秦之弊則可矣盡中國之利則未然唐興因循未暇經啟有拂雲祠者在河之北地形雄坦控扼樞會虜伏其下以窺域中禱神觀兵然後入冦甲不及擐􅋓如其來鯨一躍而吞舟虎數步而擇肉塞草落而邊甿懼河氷堅而羽檄走爰自受命至於中興國無寜歲景龍二年黙啜强暴凟隣搆怨掃境西伐漢南空虚朔方大總管韓國公張仁愿躡機而謀請築三城奪據其地跨大河以北嚮制胡馬之南牧中宗詔許横議不撓於是留及𤓰之戍斬姦命之卒六旬雷動三城岳立以拂雲祠為中城東西相去各四百里過朝那而北闢斥堠迭望幾二千所損費億計減兵萬人分形以據同力而守東極於海西窮於天納陰山於寸眸拳大漠於一掌驚塵飛而烽火燿孤雁起而刁斗鳴涉河而南門用晏閑韓公猶以為未也方將建大斾提金鼓馳神笇鞠虎旅看旄頭明滅與太白進退小則貢琛賮受厥角定保塞一隅之安大則倒狼居竭瀚海空苦塞萬里之野大畧方運元勲不集天其未使我唐無北顧之憂乎厥後賢愚迭任工拙異勢剛者黷武柔者敗律城隳險固冦得凌軼或驅馬飲河而去或控弦摩壘而旋吾知韓公不瞑目於地下矣今天子誕敷文徳茂育羣生戢兵和親北狄右袵然而軍志有受降如敵大易有安不忘危崇墉言言其可㢮柝亦宜鎮以元老授之廟勝俾述舊職而恢遺功外勤撫綏内謹經畧使其來不敢仰視去不敢反顧永讋猛氣無生禍心聳威馴恩禽息荒外安固萬代術何加焉敢勒銘城隅庻儆復隍而光烈不昧銘曰韓侯受命志在朔易北方之强制以全䇿亘漠横塞揭兹雄壁如三鬭龍躍出大澤並分襟帶各閉風雷俯視隂山仰看昭回一夫登陴萬里洞開日晏秋盡纎塵不來時惟韓侯方運神妙觀釁則動乃誅乃弔廓平窮荒盡日所照天乎未贊不䇿清廟我聖耀德罷扄北門優而柔之用息元元曷若完守推亡固存于襄于夷永裕後昆佷石銘皇甫湜佷石蒼蒼驪山之傍鑱朴礲瘢嶷然四方昔秦皇帝謀之不臧也七十萬人兹焉惶惶發石北山言礎於墳若有憑依屹住中逵淫刑蹙廹人力無施故老相傳以佷名之自昔太古不封不樹有葛於溝有薪於野後聖有作緣情不忍為之棺槨其在唐虞則惟􅑆木噫嘻暴秦虐用其人墳而象山下錮三泉窮珍惣奇力瘁則殫驅逐而前如刈草菅天毒其衷神憤其凶謫戍一呼九州風從棘梃溪荆指麾崤潼險阻不闔干戈倒鋒尸露於刼隧燔於童蓬顆無依不十年中禹塟會稽不改其行聖德洋洋厥饗乆長至於漢劉釋之有言中如可欲猶隙南山矧私其身以盡其人視兹佷石烱戒千春棧道銘并序歐陽詹秦之坤蜀之艮連髙夾深九州之險也隂谿窮谷萬仞直下犇崖峭壁千里無土亘隔呀絶巉巉㝠㝠麋鹿無谿猿猱相望三代而往蹄足莫之能越秦雖有心蜀雖有情五萬年間夐不相接且秦之與蜀也人一其性物同所宜嗜欲無餘門敎化無餘源可貿遷可親昵擘析地脉睽離物理豈造化之意乎天實凝清而成地實凝濁而形當其凝也如鎔金下鑄騰雲上浮空隙有所不周廻翔有所不合澄結既定竅缺生乎其中西南有漏天天之竅缺也於斯有兹地地之竅缺也天地也者將以上覆下幬含蓄萬靈可通必使而通者也苟有可通而未通聖賢代其工而通之故有為舟以濟川為梯以踰山惟兹地有川不可以舟涉有山不可以梯及粤有智慮以全元造立巨衡而舉追氏縋懸纑以下梓人猿垂絶㝠鳥傍危岑鑿積石以全力梁半空於木棚斜根玉壘旁綴青泥截斷岸以虹矯繞翠屏而龍踠堅勁膠固雲横砥平總庸蜀之通途繞岐雍之康莊都邑之能步山川之無脛若水决防如鴻嚮陽南之北之踵武湯湯躋峩峩以自若臨蒼蒼而不懼繇是贄幣以遥達人神以㑹同稽禮樂之短長量威力之汙隆可王者王可公者公而相次以風或曰受琢之石長存可構之材無窮易刓代蠧斯道也未始有終嗚呼為上懐來在乎德為下昭德在乎義德義之如今日則或人之言有孚其反之則石雖存恐不為琢材雖多恐不為構想夫往昔有時而有有時而無是用惕惕天下􅃖􅃖知聖賢創物之意之人寡明德義固物之道之人稀敢陳兩端之要銘諸斯道之左庶主德義者存今之所履踵武湯者荷古人之攸作為銘曰天覆地燾本亦備設大象難全或漏或缺損多益寡聖賢代工彼惟有缺與無缺同維北曰秦維南則蜀地缺其間坤維不續斗起斷岸屹為兩區秦人路絶蜀火煙孤天實不通賢斯有造鑽堅剡勁無蹊以道若川匪舟若陸匪車緣危轉虚步驟交如構雖在功存亦由德項怫劉怒從完以踣隋落我營自顛而植地非革勢財不易林培植之致惠怨之心勿謂斯道不恒勿謂斯道可乆禮不以禮可有而無恭不以恭可無而有創之之意如彼固之之理若兹彼知不易兹而易知勒銘道左其同我思磻溪銘梁肅至人無心與道出處處則土木出則雷雨惟殷道絶粤有尚父爰宅於幽盤桓草莽天地闔闢隂陽運行明極而昏昏極而明遇主水濵謀泰八紘牧野桓桓一麾而平惟彼日月得天而光惟彼聖賢得時而彰獨夫昏迷我乃豹藏文武作周我乃鷹揚故曰大道無體大人無方運用變通至虛而常作銘磻溪今古茫茫仙掌銘并序獨孤及隂陽開闢元氣變化洩為百川凝為崇山山川之作與天地並疑有眞宰而未知尸其功者有若巨靈贔屭攘臂其間左排首陽右拓太華絶地軸使中裂折山脊為兩道然後𨗳河而東俾無有害留此巨跡於峰之顛後代揭厲於𤣥蹤者聆其風而駭之或謂恢詭不經存而不議及以為學者拘其一域則惑於餘方曾不知創宇宙作萬象月而日之星而辰之使輪轉還繞箭馳風疾可駭於俗有甚於此者徒觀其陰隲無朕未嘗駭焉而巨靈特以有跡駭世世果惑矣天地有官隂陽有藏鍛鍊六氣作為萬形形有不遂其性氣有不達於物則造物者取元精之和合而散之財而成之如埏埴鑪錘之為瓶為缶為鈎為􅁄規者矩者大者細者然則黄河華嶽之在六合猶陶冶之有瓶缶鈎􅁄也巨靈之作於自然蓋萬化之一工也天機㝠動而聖功啟元精宻感而外物應故有無跡之跡介於石焉可以見神行無方妙用不測彼管窺者方循跡而求之揣其所至於巨細之境則道斯逺矣夫以手執大象力持化權指揮太極蹴踏顥氣立乎無間行乎無窮則捩長河如措杯擘太華若破塊不足駭也世人方以禹鑿龍門而𨗳西河為神奇可不為大哀乎峩峩靈掌纎指如畫隱轔磅礴上揮太清逺而視之如欲捫青天以掬皓露攀扶桑而捧白日不去不來若飛若動非至神何以生此唐興百三十有八載余尉於華隂華人以為紀􅙜嵫勒之􆅫頌嶧山銘燕然舊典也元聖舊跡豈帝者廵省代國之不若歟其古之闕文以俟知言歟仰之歎之琢玉爲志其詞曰天作髙山設險西方至精未分川壅而傷帝命巨靈經啟地脉乃眷斯顧髙掌逺跖砉如剖竹騞若裂帛川開山破天動地拆黄河太華自此而闢神返虚極跡掛石壁跡豈我名神非我靈變化翕忽希夷杳㝠道本不生化亦無形天何言哉山川以寜斷鼇補天世未覩焉夸父愚公莫知其蹤屹彼靈掌懸諸巃嵸介二大都亭亭髙聳霞赩煙噴雲抱花捧百神依憑萬峰朝拱長於上古以閱羣動下視衆山蜉蝣蠛蠓彼邦人士永揖遺烈瞻之在前如揭日月三川有竭此掌不滅潼闗甲銘并序孫樵潼户呀東翼㢘敞南有𤣥甲數十札焉委於前楹澀塵飄風綴斷革樵過而誚之且曰此國之閫也是小欲遏冦偷大欲遏諸侯今者闗禁弛而不譏守甲存而不完將何抑天下心而割天子憂耶闗吏笑而進曰借如潼之甲可以燭日潼之旗可以絳天戰鞞晝驚警柝夜鳴吾曹將擺堅荷鍛投死地之不暇又安得與客合繻而東合繻而西哉今上君臨萬邦號令所加風清日明理為太和如此則闗之禁何為而申嚴闗之甲何為而繕堅𤣥宗四十二年闗中之兵其屯如雲孽冦西來叱而闢之守甲其不完耶古之善守天下者展禮以防之闡樂以和之明刑以齊之修政以固之則其守在四海之外何以闗為而况完其甲乎是天下愈安而其禁愈弛天下愈平而其甲愈弊耳樵將去之且銘其甲云潼闗之甲完吾孰與安潼闗之甲敝吾孰與濟甲乎甲乎理與爾謀亂與爾謀無俾工爾修四皓銘一首李華天靜地一黙成四時人妙其用三靈推移遯蜕秦禍出扶漢危道不可屈南山採芝抱和全黙皆享期頤山下水濵四墳纍纍悚慕元風徘徊古祠秦坑儒谷銘司空圖秦術戾儒厥民斯酷秦儒旣坑厥祀隨覆天復儒讐儒祀而族秦坑儒耶儒坑秦耶藍田闗銘有序皮日休六年皮子副諸侯貢士之薦入京程至藍田闗覩山形闗勢廻抱於天秀欲染眸危將驚魄意將造物者心是而加力耶不然者何壯觀若斯之盛也易曰王公設險以守其國信矣哉若為天下之樞機萬世之閫閾者非兹關而莫守也因陳其規是為藍田闗銘天輔唐業地造唐闗千巖作鎻萬嶂為拴難圗其形莫狀其秀雙扉未開天地如斗軋然畫啟人流如濟似畫秦國鋪於馬底嶮不可侵惟王之心矧夫茲闗獨可規臨武闗銘宋胡旦南條東走自雍而荆呀為武闗作捍秦城秦城東顧六國無主漢氏西來子嬰為虜彼此鯨鯢更相豺虎吁嗟强秦曾無守禦秦而為漢漢復如秦劉氏不綱莽賊造新嚴嚴武闗前人後人我開則興我閉則亂一開一閉古今同貫王者邦畿守在四夷禮義干櫓道德藩籬逺人不服文德來之化旣無外何以闗為修唐憲宗陵廟碑銘趙孚伊昔有唐元和聖帝明在進賢敏於去弊進賢者何惟求康濟去弊者何不務奢麗逺佞退邪如日除翳納言招諫若金用礪四海歸仁萬方感惠救衰亂時成治平世中興明主廟號憲宗聖文立德神武成功兩河五紀地據冦戎四郊一旦民復皇風戢兵禁暴務穡勸農國有賑貸時無困窮恤刑議獄去濫推公孝治其始王道其終我宋無運兮功冠百王禮神為民兮化安萬方欽帝德業兮刋碑建廟福我生靈兮地乆天長西銘張載横渠學堂雙牖右書訂頑左書砭愚伊川曰是起爭端改訂頑曰西銘砭愚曰東銘乾稱父坤稱母予茲藐焉乃混然中處故天地之塞吾其體天地之帥吾其性民吾同胞物吾與也大君者吾父母宗子其大臣宗子之家相也尊髙年所以長其長慈孤弱所以幼其幼聖其合德賢其秀也凡天下疲癃殘疾惸獨鰥寡皆吾兄弟之顚連而無告者也於時保之子之翼也樂且不憂純乎孝者也違曰悖徳害仁曰賊濟惡者不才其踐形惟肖者也知化則善述其事窮神則善繼其志不愧屋漏為無忝存心養性為匪懈惡旨酒崇伯子之顧養育英才潁封人之錫𩔖不弛勞而底豫舜其功也無所逃而待烹申生其恭也體其受而歸全者參乎勇於從而順令者伯奇也富貴福澤將厚吾之生也貧賤憂戚庸玉汝於成也存吾順事没吾寜也東銘前人戲言出於思也戲動作於謀也發於聲見乎四支謂非己心不明也欲人無已疑不能也過言非心也過動非誠也失於聲謬迷其四體謂已當然自誣也欲他人已從誣人也或謂出於心者歸咎為己戲失於思者自誣為已誠不知戒其出汝者歸咎其不出汝者長傲且遂非不智孰甚焉龍骨塔銘㳺國佐邈神龍兮去何之蜕龍骨兮見於斯巨人夢兮審前知休徵告兮豈吾欺建浮屠兮澗之􅎠固磐石兮􅄻厜㕒㥲人蒞兮境毋隳嗟若龍兮歸何時浮山仙蜕嵓銘金馬揚堯水浮山迄今幾年夫人靈耀孰開厥先作鎮兹地澤潤民編石中之蜕孰知其然惟古至人體道虚元神疑㒺測通達以圎委虵一化盧牟八埏出入金石弗間天淵物若留礙其天守全屠維之歲荒落是躔律協夷則氣遇中元日御甲午仙蜕出焉人耶神耶胡能究旃智數詎詰强名云仙乃擇令辰乃薦吉蠲改卜所兆旣固且完貞石有泐岸谷有遷兹嵓之蜕尚永其傳按皇統己巳增修靈應夫人廟鑿巨石深丈餘得枯骸一軀印於石内幾若同體邑令馬揚題其岩曰仙蜕為製碑銘重修唐太宗廟碑銘唐慶天地開基孰與闢之日月昏翳孰與廓之必有允聖生而救時赫赫太宗龍鳳之姿仗義特起號命六師妖氛掃蕩僭竊芟夷子來億兆領絜綱維法律匪任仁義誕施民富而安俗恬而嬉三辰不忒萬物咸熙千祀蒸嘗禮孰敢違迄我鉅金庻邦緝綏大甸齊服百神具依顯允監軍歴按封圻敬謁廟下棟宇弗支公乃慨然明詔是惟吏承其命官辨其資民不告勞金碧相輝神其居歆來止來儀於斯萬年福我黔黎周公廟潤德泉碑銘元孔克任紐謐軸旋匪色音兮蒸而降騰澤淫淫兮鬱而壅底為沴祲兮體信逹順懵莫諶兮彼岐肇姬氣滃浡兮公旦有神芒以芴兮祠東有井或潤竭兮問諸遺老詢故實兮斯泉見否理亂乘兮屯膏發華以類徵兮微通元兆厥有憑兮瞢闇誰極予汝銘兮潼闗銘明陳棐嶻嶪崇山湯湯大河山居河滸河近山阿鎻天中樞控地九域玉闗門户金城險塞西通汧隴東接函崤秦居百二以拱帝郊大城似鐵戰格靡列重兵偃隆塵清氛滅爾恒作屏我願輸忠矢志㒺渝盡瘁鞠躬山比不揺河比不染坎亦直前剝亦弗貶我銘闗石尤佩諸身罔師棄繻願學書紳山河靡改予行靡易庻幾夙夜令聞不墜弔忠泉銘明長安令吳從義殉節處本朝方學舜在天日星在地河岳正氣所鍾歸我先覺士鮮砥節降天否剝冦焰如焚彼斮彼剭公死也良井泉為香天綱以立地維以張悼彼􅌤顔豈不云亡聞公義烈阻焉自喪先生之風山髙水長與都人士共誌不忘漢丞相忠武侯諸葛孔明墓祠碑銘滕天綬赤帝創業新莽簒嬰肇造光武漢室中興繼以靈獻身播國屯中原割裂鼎足三分篤生孔明南陽卧龍梁父擁吟抱道隆中頻顧草廬一德符同奄有荆益名號實公蜀主吞吳時無法正主上東行莫能諫聽天意靡常廢興㒺定永安徂絶千秋抱恨宗臣孔明奉厥後昆矢志中原誓復故京出師二表泣血驚神文以寜内武以赫靈偉哉張輔立論孔優樂毅非比伊吕是儔福祚忽移大命不猶志决身殱哲人不留空山遺廟草木䝉茸綸巾想像事業虚空松杉零落伏臘猶同肅衣瞻拜純德髙風日月不磨忠臣不滅百年萬祀永觀厥烈勒此貞珉大書深刻著兹臣道昭示來葉陜西通志巻九十
