興故城是也寰宇記安按西城今興州晉興晉興縣魏立曰平陽晉太康元年更名宋書州郡志晉興屬魏興郡後改為永樂置晉昌郡雍勝畧石按晉興今泉晉地理志桓温平蜀立晉吕郡領長樂寧都吉陽等十縣長樂今石泉寧都今漢隂吉陽今平利餘未詳所在安康漢水東歴敖頭魏興安康縣治水經注二漢安陽縣屬漢中漢末省魏復立屬魏興晉武帝太康元年更名宋書州郡志安陽城在漢隂縣西二十里賈志漢按安康即安陽縣錫漢水東逕魏興郡之錫縣故城北春秋之錫穴地也故屬漢中水經注太康二年魏興郡移理錫縣今豐利縣界東魏興城是也寰宇記河按錫縣在今白東南洵陽金州洵陽後漢省晉復置屬魏興郡輿地廣記洵陽縣後漢省晉太康四年復立宋書州郡志上亷屬上庸郡晉書地理志州按上庸郡屬荆本漢西城縣地晉於今平利縣南川置上亷縣取上亷水為名寰宇記上亷城在平利縣東平利縣舊志上郡魏武省上郡朔方五原雲中晉書地理志魏省上郡至晉陷戎狄其後屬赫連勃勃元和志地按上郡屬并州晉理志未載今採衆説補之又貳城三城即苻姚等所置之縣也故並録之三城赫連勃勃以朔方牧鎮三城晉書地理志龍昇元年勃勃攻秦三城以北諸戍十六國春秋膚施縣有三城後魏地形志臨河本漢髙奴縣地晉立為臨河縣尋廢寰宇記延水縣北十五里臨河故城是也元和志延按臨河在今川縣定陽苻生夀光二年姚㐮屯杏城遣姚蘭扇動定陽羌兵十六國春秋杏城赫連勃勃以秦州鎮杏城晉書地理志姚萇置杏城在中部西通典鄜城姚㐮屯杏城遣姚蘭扇動鄜城羌兵十六國春秋按鄜城在洛川東南洛川本漢鄜縣後秦姚萇於此置洛川縣元和志長城三川縣本漢翟道縣地苻堅時於長城原置長城縣屬長城郡元和志西按長城縣在鄜州南六十里貳縣太元十一年苻纂據杏城貳縣晉書載記義熙五年姚興撃夏王勃勃至貳城通鑑貳城當在杏城西北通鑑注今按貳城當在中部西北黒城在臨真縣東二十五里赫連勃勃置寰宇記黒城在甘泉縣東一百七十里雍勝畧統萬城赫連龍昇七年於奢延水之北黒水之南改築大城名曰統萬城今夏州治也水經注夏州晉為朔方郡晉亂後赫連勃勃建都於此通典林按夏州在今榆府懷逺縣界朔方姚興以勃勃為安北將軍五原公使鎮朔方十六國春秋逺按朔方在今懷縣北太城柔然獻馬於秦濟河至大城勃勃掠取之十六國春秋大城縣後漢屬朔方郡魏晉省通鑑注林按太城在今榆府北五原孝武太元十年劉顯奔五原通鑑秦按鑑注五原本郡魏晉廢代來城劉衛辰為西單于屯代來城十六國春秋按代來城在榆林府北右魏晉録州二郡十一縣暨城七十六其於漢三輔地每多析置魏氏之初漢中魏興得失靡常上郡朔方棄之荒外晉氏雖都闗中不常厥邑渡江之後遂為劉石苻姚迭據矣其潛置郡縣後世因之者亦並附見庶得遡所縁起爾陜西通志巻三
