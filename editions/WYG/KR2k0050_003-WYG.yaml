body:
  text: 陜西通志巻三建置第二本朝附釋名陜西布政司國初因明之舊左右布政使司領八府一州康熈二年右布政移治甘省左布政仍駐西安領西延鳯漢四府興安一州雍正三年改西安府屬商同華耀乾邠六州延安府屬鄜綏葭三州直𨽻陜西布政司九年又改榆林衛為府共領五府十州治西安府釋名陜西宋路名明因以名省蓋取公羊傳自陜以西召公主之之義西安府明領州六縣三十一本朝因之又增領衛一雍正二年潼闗衛廢三年改商同華耀乾邠六州為直𨽻州撥縣十七分𨽻之府領縣十四釋名西安明府名本元安西路明改西安府即元安西義長安西安府治釋名長安漢縣名秦為長安邑漢以名縣三輔黄圖云長安本秦鄉名咸寧治府東偏與長安為東西附郭釋名咸寧唐縣名本萬年天寳初改咸寧郭子章云蓋取書萬國咸寧之義咸陽明屬西安府本朝因之釋名咸陽西魏縣名本周咸陽邑秦自孝公以下皆都之三輔黄圖云山南曰陽水北曰陽其地在九嵕山南渭水北山水皆陽故名咸陽興平明屬西安府本朝因之釋名興平唐縣名至徳初置興平軍尋改為縣從軍名也臨潼明屬西安府本朝因之釋名臨潼宋縣名本昭應祥符初避昭應宫名改為臨潼以城西臨潼水為名髙陵明屬西安府本朝因之釋名髙陵秦縣名孝公置縣後為髙陵邑郭子章云縣南有奉政原髙四五丈髙陵之名所由昉也藍田明屬西安府本朝因之釋名藍田秦縣名獻公置縣後為藍田邑元和志云羙玉為藍縣出羙玉故曰藍田史記索隠云因藍田山為名也涇陽明屬西安府本朝因之釋名涇陽苻秦縣名本嬴秦涇陽邑苻秦以名縣三原明屬西安府本朝因之釋名三原後魏縣名元和志云以地有豐原孟侯白鹿三原也郭子章云以地有東西中三原也志説非是鄠明屬西安府本朝因之釋名鄠秦縣名古扈國秦改為鄠王伯厚云扈鄠一也盩厔明屬西安府本朝因之釋名盩厔漢縣名圗經云山曲曰盩水曲曰厔故名渭南明屬西安府本朝因之釋名渭南西魏縣名漢為渭南郡西魏文帝以名縣以縣在渭水之南也富平明屬西安府本朝因之釋名富平晉縣名晉徙北地郡富平縣於懐徳城用其舊名也醴泉明屬西安府本朝因之釋名醴泉隋縣名元和志云縣有後周醴泉宫因以為名按縣東南有醴泉周以名宫隋以名縣延安府國初因明之舊領州三縣十六雍正三年以延安所屬州縣山多地廣去府遼逺改鄜綏葭三州直𨽻陜西布政司撥八縣分𨽻三州府領縣八釋名隋延安郡宋以名府元和志謂以界内延水為名是也膚施明為延安府附郭本朝因之釋名膚施戰國趙邑名秦昭王以名縣在今綏徳界隋大業初始置於延安界因舊名也安塞明𨽻延安府本朝因之釋名安塞元縣名本宋安塞堡縣從堡名也甘泉明𨽻延安府本朝因之釋名甘泉唐縣名寰宇記云以其泉甘羙為名縣志云有甘泉在縣南五十里天寳初改縣名甘泉因此安定明𨽻延安府本朝因之釋名安定元縣名本宋安定堡因以名縣保安明𨽻延安府本朝因之釋名保安元縣名本宋保安軍金以名州元以名縣郭子章云與安塞安定皆取安寧之義宜川明𨽻延安府本朝因之釋名宜川宋縣名本後魏義川太平興國中改名避太宗匡義諱也延川明𨽻延安府本朝因之釋名延川隋縣名元和志後魏文安隋改延川以吐延川為名延長明𨽻延安府本朝因之釋名延長唐縣名延水經延長入河故以名縣鳯翔府明領一州七縣分𨽻闗西道康熈十年裁𨽻陜西布政司仍領州一縣七釋名鳯翔唐府名雍勝畧云至徳初置鳯翔府取鳯鳴岐山之義鳯翔明為鳯翔府附郭本朝因之釋名鳯翔唐縣名本雍縣唐改鳯翔義與府同岐山明屬鳯翔府本朝因之釋名岐山隋縣名明一統志云本後周三龍縣隋移治岐山南遂改為岐山因山名也寳雞明𨽻鳯翔府本朝因之釋名寳雞唐縣名元和志云乾元初改陳倉為寳雞以昔有陳寳鳴雞之瑞故名之扶風明𨽻鳯翔府本朝因之釋名扶風唐縣名貞觀初以扶風名縣仍漢右扶風名也郿明𨽻鳯翔府本朝因之釋名郿周邑名秦以名縣毛萇云文公所營是也麟遊明𨽻鳯翔府本朝因之釋名麟遊隋縣名義寧初獲白麟于廢仁夀宫因置縣汧陽明𨽻鳯翔府本朝因之釋名汧陽後周縣名寰宇記云以縣在汧水之陽而名隴州明𨽻鳯翔府本朝因之釋名隴州西魏州名元和志魏改東秦為隴州因山為名漢中府屬陜西布政司府志云明漢中府領州一縣八本朝因之釋名漢中明府名秦為漢中郡常璩曰郡因水名也明以名府府志云郡臨漢水之陽南面漢山故名漢中南鄭明為漢中府附郭本朝因之釋名南鄭周邑名秦以名縣耆舊傳云鄭恒公遺民南奔漢中故以南為稱府志云桓公都鄭其民徙河南者為新鄭奔漢中者為南鄭褒城明𨽻漢中府本朝因之釋名褒城隋縣名郭子章云周褒國漢置褒中縣隋改名褒城城固明𨽻漢中府本朝因之釋名城固秦縣名方輿勝覽云始城而冀其鞏固之意也西鄉明𨽻漢中府本朝因之釋名西鄉晉縣名寰宇志云蜀南鄉晉改西鄉府志云與䕫之東鄉對故名鳯明𨽻漢中府本朝因之釋名鳯明縣名方輿勝覽云鸑鷟嘗鳴於岐翺翔至南而集焉是以西岐曰鳯翔南岐曰鳯州至明降州為縣因其舊名寧羌州明𨽻漢中府本朝因之釋名寧羌明州名郭子章云本戰國白馬氐東境成化中設寧羌取輯寧氐羌之義沔明隷寧羌州後𨽻漢中府本朝因之釋名沔明縣名本漢沔陽以沔水為名也元自畧陽移沔州來治明降為縣不易其名畧陽明𨽻寧羌州後𨽻漢中府本朝因之釋名畧陽宋縣名府志云用武之地曰畧象山之南曰陽故以為名按畧陽漢縣也在今鞏昌界後魏僑置畧陽郡縣于此趙宋遂以名縣沿漢舊也榆林府明置榆林衛𨽻陜西都司本朝改屬榆林道雍正九年改榆林衛為榆林府𨽻陜西布政司領縣四釋名榆林府因明榆林衛舊名也本漢榆溪塞水經注所謂諸次水東逕榆林塞是也明因塞置衛遂取名焉榆林本明東路雙山堡屬神木道中路常樂保寧歸徳魚河四堡屬榆林道本朝因之雍正九年並五堡置榆林縣為榆林府治釋名榆林縣本榆林堡地義與府同懐逺本明中路懐逺波羅響水威武清平五堡屬榆林道本朝因之雍正九年併五堡置懐逺縣屬榆林府釋名懐逺本明懐逺堡縣因堡名也靖邉本明西路靖邉寧塞鎮羅鎮靖龍州五堡屬靖邉道本朝裁靖邉道改屬榆林道雍正九年併五堡置靖邉縣屬榆林府釋名靖邉本明靖邉堡蓋取綏靖邉疆之意縣因堡名也定邊本明西路定邊鹽塲磚井安邊栁樹澗五堡屬靖邊道本朝裁靖邊道屬榆林道雍正九年併五堡置定邊縣屬榆林府釋名定邊本明定邊堡蓋取底定邊疆之意縣因堡名也興安州明領六縣𨽻陜西布政司徙治趙臺山下國初復徙舊城即今治也仍領縣六釋名興安明州名續通考云明初為金州萬厯十年改興安州因徙置錫佳名也平利明隷興安州本朝因之釋名平利唐縣名舊唐書云後周於平利川置吉陽縣武徳初改曰平利縣以川名也洵陽明隷興安州本朝因之釋名洵陽戰國楚邑名寰宇記云漢舊縣以在洵水之陽而名白河明隷興安州本朝因之釋名白河明縣名縣志云成化中置白河堡以白石河為名尋改為縣紫陽明隷興安州本朝因之釋名紫陽明縣名郭子章云正徳壬申立紫陽堡癸酉升縣縣南紫陽灘旁有三洞乃紫陽真人所居縣名本此石泉明隷興安州本朝因之釋名石泉西魏縣名寰宇記云以縣北石泉為名或云今有石泉在縣治南漢隂明隷興安州本朝因之釋名漢隂唐縣名本漢安陽至徳初改漢隂縣志云舊治漢江南紹興初徙治新店按水南曰隂初治漢南故名漢隂後徙漢北而仍名漢隂者襲舊名而悞也商州明隷西安府領四縣國初因之雍正三年升商州直隷陜西布政司仍以四縣隷州釋名商州後周州名賈志云商本山名在州東南故名按史記殷本紀契封于商商國名也周秦為商於地故漢以名縣後周以名州鎮安明隷西安府商州國初因之雍正三年州改直隷鎮安仍屬州釋名鎮安明縣名本唐安業縣地景泰初重置更名郭子章云縣南門外有鎮安河蓋縣因水名也雒南明隷西安府商州國初因之雍正三年州改直𨽻洛南仍屬州釋名雒南隋縣名寰宇記云開皇初改拒陽為雒南以在洛水之南為名明以光宗諱洛改為雒南山陽明隷西安府商州國初因之雍正三年州改直隷山陽仍屬州釋名山陽明縣名賈志云以在山之陽故名縣志云在北山之南豐水之北故名商南明隷西安府商州國初因之雍正三年州改直隷商南仍屬州釋名商南明縣名本後魏南商縣地成化間置縣曰商南郭子章云以縣在商州之南也同州明隷西安府領縣五國初因之雍正三年以同州直隷陜西布政司又以同之白水割隷耀州州領縣四釋名同西魏州名州志云以城南九龍泉九源同流故名按路史云春秋地圗云同州為國則州之名同亦沿國舊名也朝邑明隷西安府同州國初因之雍正三年同州改直𨽻州朝邑仍屬焉釋名朝邑西魏縣名本南五泉西魏改朝邑元和志云以北據朝坂故以為名郃陽明隷西安府同州國初因之雍正三年同州改直隷州郃陽仍屬焉釋名郃陽漢縣名本有莘國詩所謂在洽之陽也春秋晉為合陽邑漢以名縣水經注云城南有郃水縣取名焉澄城明隷西安府同州國初因之雍正三年同州改直隷州澄城仍屬焉釋名澄城後魏縣名本春秋北徴地漢置徴縣後魏為徴城縣通典云徴澄音相近故名元和志徴澄同聲後人悞為澄韓城明隷西安府同州國初因之雍正三年同州改直隷州韓城仍屬焉釋名韓城隋縣名本周韓侯國雍勝畧云隋置韓城縣以古韓城為名華州明隷西安府領縣二國初因之雍正三年改華州為直隷州仍領縣二五年改潼闗衛為縣並隷州領縣三釋名華西魏州名南有少華山東連大華故州以取名焉華隂明隷西安府華州國初因之雍正三年縣屬直隷華州釋名華隂漢縣名本禹貢華隂地寰宇記云漢改華隂以在太華之隂故名蒲城明隷西安府華州國初因之雍正三年縣屬直隷華州釋名蒲城西魏縣名本南白水西魏改蒲城寰宇記云以縣東故蒲城為名也或云以縣東有蒲池即小蒲川潼闗明設潼闗衛隷南京中軍都督府國初改隷西安府雍正二年裁潼闗衛歸併同華等州五年以輸納不便照甘省改衛為縣之例設縣專理就近屬華州釋名潼闗本後漢闗名故明以名衛本朝以名縣因闗舊名也耀州明隷西安府領同官一縣國初因之雍正三年升耀州為直隷州又撥同州之白水來隷領縣二釋名耀州唐末李茂貞州名郭子章云州東十五里有鑑山年豐則山中有光耀如鑑州以是名同官明隷西安府耀州國初因之雍正三年州改直隷縣仍屬之釋名同官後周縣名元和志云苻秦於銅官川置銅官䕶軍後魏改置銅官縣周除金作同縣因川名也白水明隷西安府同州國初因之雍正三年耀州改直隷州以同州白水接壤於耀故撥隷焉釋名白水秦縣名雍大記云秦置白水縣以縣臨白水也元和志後魏置白水縣南臨白水因以為名乾州明隷西安府領二縣國初因之雍正三年以乾州直隷陜西布政司仍領二縣釋名乾唐州名乾寧二年置乾州雍大記云在長安西北隅故名武功明隷西安府乾州國初因之雍正三年升乾州為直隷州武功仍屬焉釋名武功秦縣名元和志云縣境有武功山斜谷水亦曰武功水是縣以山水立名也永夀明隷西安府乾州國初因之雍正三年升乾州為直隷州永夀仍屬焉釋名永夀唐縣名武徳二年於永夀原西置永夀縣因原而名邠州明邠州隷西安府領三縣國初因之雍正三年以邠州直隷陜西布政司仍領縣三釋名邠唐州名元和志云豳公劉所居之地後魏置豳州開元中以豳與幽字相渉改為邠字三水明隷西安府邠州國初因之雍正三年州改直隷三水仍屬焉釋名三水後魏縣名漢有三水縣屬安定郡後魏重置於今邠州界沿漢舊名也元和志云以縣有羅川谷三泉並流故以為號淳化明隷西安府邠州國初因之雍正三年州改直隷淳化仍屬焉釋名淳化宋縣名縣志云宋太宗改元淳化立縣之始即以為名長武明隷西安府邠州國初因之雍正三年州改直隷長武仍屬焉釋名長武明縣名縣志云萬厯初置長武縣取縣西長武故城為名鄜州明隷延安府領三縣國初因之雍正三年以鄜州直隷陜西布政司仍領縣三釋名鄜後魏州名本秦鄜衍文公於其地作鄜畤漢為縣後魏以名州郭子章云以地有鄜水故名洛川明隷延安府鄜州國初因之雍正三年州升直隷縣仍屬州釋名洛川後秦縣名元和志云姚萇置洛川縣以縣界有洛川水為名中部明隷延安府鄜州國初因之雍正三年州升直隷縣仍屬州釋名中部後秦縣名漢渠搜中部都尉治此姚興始置縣從中部都尉之舊也宜君明隷延安府鄜州國初因之雍正三年州升直隷縣仍屬州釋名宜君後魏縣名苻秦置宜君䕶軍太武改縣地形志云縣有宜君水因取名焉綏徳州明隷延安府領米脂一縣國初因之雍正三年以綏徳州直隷陜西布政司又撥延安府之清澗縣隷州領縣二釋名綏徳金州名本後魏綏州宋為綏徳城金升為州因城舊名也米脂明隷延安府綏徳州國初因之雍正三年州改直隷縣仍屬焉釋名米脂金縣名本宋米脂城以地有米脂水沃壌宜粟其米汁淅之如脂故以名城金升為縣因宋舊名也清澗明隷延安府國初因之雍正三年升綏徳為直隷州以縣境接壌於州故撥隷焉釋名清澗金縣名本宋清澗城建康初种世衡因寛州舊壘築之賜名清澗以縣西有清澗河也大定末始升為縣葭州明隷延安府領三縣國初因之雍正三年以葭州直隷陜西布政司仍領縣三釋名葭金州名以州臨葭蘆川也川在州西五里岸多葭蘆故以名州呉堡明隷延安府葭州國初因之雍正三年州改直隷縣仍屬州釋名呉堡金縣名本宋呉堡寨縣從寨名也神木明隷延安府葭州國初因之雍正三年州改直隷縣仍屬州釋名神木元縣名本宋神木寨也郭子章云縣西十五里楊家城内有神松三株枝柯相連故曰神木府谷明隷延安府葭州國初因之雍正三年州改直隷縣仍𨽻州釋名府谷五代唐縣名文獻通考云唐末置府谷鎮後唐升府谷為縣縣從鎮名也右本朝陜西録司一府五直隷州十州縣共七十三自明以縣屬於州州縣又均統於府如西安一府所轄至三十有七屬隷太廣化理難周又潼闗榆林守土蒞民職同縣府而名仍衛所亦屬未協至本朝雍正三年法唐虞肇州之典使凡府州縣統轄適均如西安六州延安三州俱改直隷以分蒞諸縣又改潼闗衛為縣升榆林衛為府分二十堡為四縣以隷之使一省之中大小相維輕重同得合成運掌之治至郡縣釋名雖無闗大體然盩厔因乎山水膚施沿乎國邑鳯翔麟逰本乎祥瑞闡釋其義可以考命名所由使覽者不惑故並附見云夏商昔顓頊創制九州為雍梁舜分十二州為雍梁豫夏復為九州禹貢曰黒水西河惟雍州東距西河即龍門之河華陽黒水惟梁州孔安國以為東距華山之南通典殷因於夏無所變改漢書地理志武丁之地西不過氐羌北不過朔方漢書賈捐之傳雍州舜置十二牧雍其一也通典東崤西漢南商北居庸四山之所擁翳故曰雍括地志鎬帝辛三十六年西伯使世子發營鎬竹書紀年安按鎬在長西南三十里以下國邑郡縣非更置徙治者其方位逺近不重注亳湯起於亳史記六國表契封於商後世遷於亳即西亳京兆杜縣有亳亭鄭樵通志亳在杜南路史咸按杜即今寧郢史記正義周書云惟周王季宅郢郢故城在雍州咸陽東二十一里周之郢邑也地理通釋見按郢一作程辨程下畢帝辛六年文王初禴於畢竹書紀年畢在咸陽西北地理通釋雞閭新平地古顓頊之墟里名曰雞閭晉書苻堅載記按新平今邠州麗㚿媧氏立治於中皇山之原繼興於麗長安志云驪山有女媧治處又臨潼東二十四里有故麗城商酈國路史平按中皇山在利縣戲炎帝後姜姓之國今新豐有戲亭是也路史在按戲亭臨潼東南三十里扈啟與有扈戰於甘之野尚書序趙孟曰夏有觀扈左傳鄠縣本夏扈國故鄠城在縣北二里元和志崇輿地志鄠縣古崇國也鄠縣志夏有扈國商為崇國通考商之崇扈今永興鄠北二十里有故城路史豐既伐于崇作邑于豐詩經大雅文王伐崇作豐邑自岐下徙都史記周本紀周豐宫文王宫也在鄠縣東三十五里括地志渡按即今秦鎮甘在鄠北啟扈戰於此路史駱縣父之國京兆宜夀縣有駱谷故盩厔地路史郝商郝國太昊弟郝骨氏後右扶風盩厔也路史郝按駱同地但先後異時橋姬姓國黄帝子孫守橋山者路史中按橋山在部北翟帝乙十七年西伯伐翟竹書紀年翟按周時延安以北皆為境商末之翟亦應在其地西河后啟征西河竹書紀年夏世侯伯有西河國后啟征之路史即按禹貢西河自龍門以下皆是正義所謂丹同二州也岐古有岐伯黄帝至岐見岐伯引載而歸是也路史亶父自豳遷岐改國號曰周詩注疏太王邑岐山之下文王亦治焉地理通釋郮郮故國黄帝後封在岐山之陽所謂周原膴膴者玉篇周文作邑於豐乃分岐邦地為周公旦采地東謂之周詩注疏召召畿内采地奭始食於召故曰召公史記索隠文王分岐邦地為召公奭采地西謂之召詩注疏程孔氏曰周書稱文王在程作程典皇甫謐云文王徙宅於程蓋謂此也曹氏曰文王既勝宻湏度鮮原於岐山之陽定程邑而都焉詩地理考文王城在隴州呉山廢縣東四十五里明一統志處按諸志俱謂程即郢合為一但程在岐陽郢在咸陽東相去絶逺故分編之陳倉渭水東逕陳倉縣西應劭曰黄帝都陳在此營氏開山圖曰伏羲生成紀徙治陳倉非陳國所建也水經注陳黄帝後姬姓國今寳雞故陳倉有陳山路史姜炎帝後姜姓國扶風美陽有姜氏城路史岐水東逕姜氏城南為姜水帝王世紀曰炎帝神農氏長於姜水水經注杜夏世侯伯漢杜陽縣地路史詩自土沮漆齊詩作自杜言公劉避狄而來居杜與漆沮之地詩地理考杜邑在麟遊縣麟逰縣志微微商後今岐之郿縣路史阮殷有阮國在岐渭間詩有侵阮徂共之辭通鑑注阮商諸侯國在岐渭之間氏族畧莘莘姒姓夏禹後世本啟封支子於莘唐世係表鯀按呉越春秋娶有莘氏女古已有莘國河水逕郃陽城東故有莘邑為太姒之國詩云在郃之陽又曰纉女維莘謂此也水經注郃陽南二十里古莘國郡縣志芮虞芮質厥成詩經大雅西伯初聽虞芮訟杜預云馮翊臨晉芮鄉在朝邑西南路史荼荼䣝也殷時舊姓郃陽䣝城是路史李氏曰同州䣝谷詩地理考華堯觀於華華封人祝之莊子有虞氏為豫州之域舜分十二州豫州華山通鑑注國按潼闗縣古桃林地後漢郡志云黄帝置𢎞農郡潼關縣亦故𢎞農地蕃渭水東逕巒都城北故潘邑殷契之所居世本曰契居蕃闞駰曰蕃鄭西今巒城是矣水經注州按蕃在今華西定定國商後渭水南有定城述征記去潼闗三十里路史彤商彤伯地即彤城歴代紀事年表鄭縣西有故彤城華州舊志即按鄭縣今華州華原隂康氏治於華原路史耀按華原今州也陽武古國有陽武路史史記倉頡居陽武在今白水縣東北十八里陽武村賈志彭衙舊志謂衙在商以老彭封得名白水縣志白按彭衙在今水縣邰國名炎帝後姜姓所封帝嚳元妃邰氏女也生棄為后稷復封於邰説文故斄城在武功縣西南二十二里括地志后稷封邰夏支庶受爵曰子國於此郿縣志雲陽雲陽山在馮翊雲陽縣少昊居之路史今按雲陽在淳化甘泉黄帝接萬靈明廷明廷者甘泉也史記封禪書少昊處甘泉路史今按甘泉在淳化䣛夏䣛國在乾之永夀漢之䣛縣路史豳禹貢雍州之地周之先公劉所居詩大雅云篤公劉于豳斯館是也元和志古公立薫育侵之乃去豳史記周本紀古豳地在三水縣西南三十里有豳城在龎川水西蓋公劉之邑豳谷也寰宇記京依其在京詩經大雅京地名鄭箋以京為周地小别名則京是周所都之邑詩注疏邠按京在今州渠搜河水自朔方東轉逕渠搜故城北禹貢之所云渠搜矣水經注成湯北發渠搜通鑑外紀渠搜在廢夏州北禹貢錐指東按渠搜在今懐逺縣北河套中朔方堯舜地不過數千里北朔方朔南暨聲教通典帝乙三年王命南仲城朔方竹書紀年邉按朔方在今靖東北昆夷夏之衰不窋竄戎狄之間國語豳國西近戎北近狄韋昭注夏桀之亂大夷入居邠岐之間成湯攘而伐之後漢書西羌傳昆按史記地理圖虞夏以來薫鬻玁狁在黄河北夷雖居邠岐終非境土故不入圖梁州梁州東據華山之南孔氏書傳華山之南今華隂之西南上洛漢中洋川安康皆是鄭樵通志南鄭縣東南百八十里有梁山大山四圍其中三十里許甚平或云古梁州治也通鑑注舜置十二州梁州其一也西方金剛其氣强梁故曰梁通考褒褒夏后氏後夏有褒君路史褒國在褒城縣東三里許駱駝坪賈志西分命和仲宅西書經尭典西國和仲所宅今興元西縣路史氐西戎氐羌咸戴舜之功史記五帝本紀自彼氐羌莫敢不來王詩經商頌白馬氐今興武等州地蓋岐隴而南漢川以北皆氐云路史寧按即鳯沔羌地饒世本曰舜居饒内在漢中西城縣或言嬀墟在西北舜所居也水經注饒國有虞氏後今西城有姚墟或謂舜生於此路史姚方漢水東逕錫縣故城北又東歴姚方蓋舜後枝居是處故地留姚稱也水經注白按姚方在今河縣金金提國帝堯世有金道華種蘭唐韵云周附庸金州也路史興按金州即今安州錫商錫國御姓錫時之先今鄖鄉有錫穴路史白按即今河縣上洛上洛夏氏侯伯商州上洛郡是也路史丹丹水城在商州城南一里吕氏春秋堯有丹水之戰以服南蠻疑即丹朱所封者賈志堯使子朱處於丹淵為諸侯丹是其國也漢書律厯志朱之國今朱虚有丹山丹水出焉路史商丹水自上洛逕商縣南契始封此魯連子曰在太華之陽皇甫謐闞駰並以為上洛郡商縣也水經注商州東八十里商洛縣古之商國括地志武闗西北一百二十里有商城謂故邑也盛𢎞之荆州記右夏商二代兼及上古録州二國邑五十四夫塗山之㑹萬國雍梁二州封建殆不止此然歴年既乆經史闕如靡究其詳僅録其可考者著於篇又如唐之丹虞之饒夏之西商之彭衙間有謂在他境者然諸説相沿諒非無自疑以傳疑不敢廢也故並録之周后稷始封邰公劉徙邑於豳太王徙邑於岐山之陽南有周原始改號曰周王季徙程按程一作郢文王徙都於豐成王卜洛邑復還豐鎬世本曰懿王居犬丘平王徙洛帝王世紀自陜以西召公主之公羊傳成王地西不過氐羌北不過朔方漢書賈捐之傳髙陵以東今馮翊之南境華隂之東境屬魏雲中五原之境今榆林九原屬趙通典雍州周禮西曰雍州蓋并禹梁州之地周自武王都於鄷鎬雍州為王畿平王東遷以岐鄷之地賜秦襄公為秦地晉書地理志職方九州周之制也無禹貢之梁雖無梁州而雍豫之間是也周禮注周之九州與禹貢不同者周都雍不可不廣故合雍梁為一州地理通釋鎬鎬水上承鎬池於昆明池北周武王之所都也詩云考卜維王宅是鎬京自漢帝穿昆明池於是地基搆淪禠今無可究水經注武王自豐徙都鎬是為宗周今豐水之東長安