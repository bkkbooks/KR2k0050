body:
  text: 陜西通志巻七十九紀事第四周明帝二年夏六月帝如昆明池秋九月帝如同州六月辛未幸昆明池九月丁未幸同州過故宅賦詩十月辛酉還宫周書明帝紀武成元年延州稽胡叛擊破之髙琳武成初除延州刺史從柱國盧豆寜討稽胡郝阿保劉桑德等破之周書髙琳傳武帝保定元年丹綏銀州作亂討平之是年丹州綏州銀州部内與蒲川賊同反以達奚震辛威討平之延綏鎮志冬十一月帝如岐陽十一月丁巳狩於岐陽十二月壬午至自岐陽周書武帝紀二年春閏正月洛州民謀亂伏誅洛州民周共妖言惑衆假署將相事發伏誅周書武帝紀冬十月治兵十月辛亥帝御大武殿大射公卿列將皆㑹戊午講武於少陵原周書武帝紀縣按咸寕志少陵原在今南四十里三年秋九月帝如同州九月丙戌幸同州十有二月辛卯至自同州周書武帝紀四年冬十月帝如沙苑十月丁卯幸沙苑勞師癸酉還宫周書武帝紀五年春二月帝如岐州二月壬申行幸岐州周書武帝紀天和元年秋七月築屯兵列城冬十一月如新城七月戊寅築武功郿斜谷武都留谷津坑諸城以置軍人十一月丙戌行幸武功等新城十二月庚申還宫周書武帝紀二年延州賊作亂于實率衆討平之天和二年延州蒲川賊郝三郎等反遣實率衆討平之斬三郎首獲雜畜萬餘頭乃除延州刺史周書于謹傳附三年二月帝如武功夏五月帝如醴泉宫冬十月治兵十一月帝如岐陽二月丁卯幸武功丁亥還宫五月庚申行幸醴泉宫秋七月戊午至自醴泉宫十月丁亥上親率六軍講武於城南京邑觀者輿馬彌漫數十里諸蕃使咸在焉十一月甲辰行幸岐陽十二月丁丑至自岐陽周書武帝紀四年夏五月帝如醴泉宫五月庚戌行幸醴泉宫七月辛亥至自醴泉宫周書武帝紀五年夏四月帝如醴泉宫四月甲寅行幸醴泉宫七月乙卯至自醴泉宫周書武帝紀冬十二月齊遣兵冦邊置防守齊將斛律明月冦邊於汾北築城自華谷至於龍門周書武帝紀六年秋九月築塞上列城五稽胡數為冦亂使榮綏集之榮於上郡延安築周昌𢎞信廣安招逺咸寧等五城以遏其要路稽胡由是不能為冦隋書郭榮傳冬十月治兵十一月帝如散闗十月壬寅上親率六軍講武於城南十一月丁巳行幸散闗十二月己丑還宫周書武帝紀建徳元年冬十一月治兵十二月帝如斜谷十一月丙午上親率六軍講武於城南庚戌行幸羌橋集京城以東諸軍都督以上頒賜有差乙卯還宫十二月壬申行幸斜谷集京城以西諸軍都督以上頒賜有差丙戌還宫周書武帝紀二年春二月詔皇太子贇撫廵西土二月甲寅詔皇太子贇撫廵西土三月己卯皇太子於岐州獲二白鹿以獻詔答曰在德不在瑞周書武帝紀冬十一月治兵十一月辛巳帝親率六軍講武於城東癸未集諸軍都督以上五十人於道會苑大射帝親臨射宫大備軍容周書武帝紀三年春二月帝如雲陽宫二月乙卯行幸雲陽宫三月辛酉至自雲陽宫周書武帝紀秋七月帝如雲陽宫衛王直舉兵反司武尉遲運拒討之敗走七月庚申行幸雲陽宫乙酉衛王直在京師舉兵反欲突入肅章門司武尉遲運等拒守直敗率百餘騎遁走戊子至自雲陽宫周書武帝紀帝幸雲陽令運以本官兼司武與長孫覽輔太子居守俄而衛剌王直作亂率其黨襲肅章門覽懼走行在所運時偶在門中直兵奄至不暇命左右乃手自闔門直黨與運争門斫傷運手指僅而得閉直既不得入乃縱火燒門運懼火盡直黨得進乃取宫中材木及牀等以益火更以膏油灌之火勢轉熾直不得進乃退運率留守兵因其退以擊之直大敗而走尉遲運傳八月帝如雲陽宫九月如同州八月丙申行幸雲陽宫九月庚申幸同州十一月甲戌至自同州周書武帝紀四年春正月帝如同州正月癸酉行幸同州三月丙寅至自同州周書武帝紀秋七月帝如雲陽宫七月丙辰行幸雲陽宫丁卯至自雲陽宫周書武帝紀冬十月帝如同州十月甲午行幸同州十二月庚午至自同州周書武帝紀五年春正月帝如同州夏四月再幸同州六月帝如雲陽宫正月癸未行幸同州三月壬寅至自同州四月乙卯行幸同州五月壬辰至自同州六月丁巳行幸雲陽宫八月乙卯至自雲陽宫周書武帝紀六年夏五月帝如雲陽宫五月癸巳行幸雲陽宫六月丁未至自雲陽宫周書武帝紀宣政元年夏五月帝北伐次雲陽宫突厥入冦五月己丑帝總戎北伐發闗中公私驢馬悉從軍癸巳帝不豫止於雲陽宫丙申詔停諸軍事周書武帝紀秋八月帝如同州是年六月武帝崩宣帝即位八月壬申行幸同州十月癸酉至自同州周書宣帝紀宣帝大象元年秋八月帝如同州八月庚申行幸同州壬申還宫周書宣帝紀冬十一月帝如温湯遂如同州十一月乙未幸温湯戊戌行幸同州壬寅還宫周書宣帝紀二年春三月帝如同州三月辛卯行幸同州增候正前驅戒道為三百六十重自應門至於赤岸澤通鑑赤岸澤在長安北同州南數十里間幡旗相蔽鼓樂俱作又令武賁持鈒馬上稱警蹕以至於同州改同州宫為天成宫庚子至自同州周書宣帝紀遣兵屯潼闗宣帝崩髙祖以楊尚希督宗室兵三千人鎮潼闗隋書楊尚希傳隋髙祖開皇元年冬十月帝如岐州十月壬辰行幸岐州十二月庚子至自岐州隋書文帝紀二年夏六月作新都開皇二年六月詔左僕射髙熲將作大匠劉龍鉅鹿郡公賀婁子幹太府少卿髙龍乂等創造新都隋書髙祖紀初帝嫌臺城制度窄小宫内多鬼妖夜與髙熲蘇威二人定議遷都通直散騎常侍庾季才旦而奏曰臣仰觀天象俯察圖記龜兆允襲必有遷都且堯都平陽舜都冀土是知帝王居止世代不同而漢營此城經今八百嵗水皆鹹鹵不甚冝人願陛下協天人之心為遷徙之計帝愕然謂熲等曰是何神也朕自今已後信有天道矣是時太師李穆上表改都邑帝曰天道聰明已有應徴太師民望復抗此請是則可矣遂發詔施行册府元龜冬十月突厥入冦詔屯兵咸陽以備之初帝初立待突厥禮薄突厥大怒千金公主傷其宗祀覆滅日夜言於沙鉢畧請為周室復讐沙鉢畧謂其臣曰我周之親也今隋主自立而不能制復何面目見可賀敦乎乃悉發五可汗控弦之士四十萬伐隋入長城帝患之勅縁邊修保障詔太子勇屯兵咸陽以備之通鑑馮昱叱李長乂李崇皆為虜所敗於是縱兵來冦上郡延安六畜咸盡隋書突厥傳十二月新都成十二月丙子名新都曰大興城隋書髙祖紀三年春遷於新都三月丙辰雨常服入新都五月乙巳梁太子琮來賀遷都隋書髙祖紀秋九月帝如城東九月壬子幸城東觀稼榖隋書髙祖紀四年春正月梁王來朝二月帝如隴州九月帝如灞上正月壬申梁王蕭巋來朝二月乙巳上餞梁王於灞上庚戌幸隴州突厥可汗阿史那玷率其屬來降九月乙丑幸灞水觀漕渠賜督役者帛各有差隋書髙祖紀七年春二月帝如醴泉宫二月壬申車駕幸醴泉宫隋書髙祖紀冬十月帝如同州十月庚申行幸同州以先帝所居降囚徒隋書髙祖紀十一月帝如馮翊十一月甲午幸馮翊親祠故社父老對詔失㫖上大怒免其縣官而去隋書髙祖紀是行也内史李德林以疾不從勅書追之與議伐陳之計及還隋主馬上舉鞭南指曰待平陳之日以七寳裝嚴公使自山以東無及公者綱目八年冬十一月帝如定城誓師十月命晉王廣秦王俊清河公素皆為行軍元帥以伐陳十一月丁卯車駕餞師乙亥行幸定城陳師誓衆隋書髙祖本紀三按述征記定城去長安十里九年夏四月帝如驪山四月己亥幸驪山勞旋師也册府元龜十二年秋七月帝如昆明池七月壬戌幸昆明池其日還宫隋書髙祖紀秋八月帝如龍首池八月乙亥幸龍首池癸巳制宿衛者不得輙離所守隋書髙祖紀十三年春正月帝如岐州正月壬戌行幸岐州二月丁亥至自岐州隋書髙祖紀二月作仁壽宫二月丙子詔楊素營仁夀宫於岐山之北素奏宇文愷封德彛為土木監於是夷山堙谷以立宫殿崇臺累榭宛轉相屬役使嚴急丁夫多死覆以土石因而築之死者以萬數通鑑在按明一統志仁夀宫今麟遊縣西秋七月帝如昆明池七月丁巳幸昆明池隋書髙祖紀十五年春三月帝如仁夀宫仁夀宫成三月丁亥幸之時天暑役夫死者相次於道楊素悉焚除之帝不悦及至見制度壯麗大怒曰楊素為吾結怨天下素聞之慮獲譴封德彛曰公勿憂俟皇后至必有恩詔明日帝果召素入對后勞之曰公知吾夫婦老無以自娱盛飾此宫豈非忠孝賜賚甚厚通鑑冬十一月帝如温湯十一月辛酉幸温湯乙丑至自温湯隋書髙祖紀十六年冬十月帝如長春宫十月己丑幸長春宫十一月壬子至自長春宫隋書髙祖紀所按長春宫周時建在同州十七年春二月帝如仁夀宫二月庚寅幸仁夀宫九月甲申至自仁夀宫隋書髙祖紀十八年春二月帝如仁夀宫二月甲辰幸仁夀宫九月辛卯至自仁夀宫十二月自京師至仁夀宫置行宫十有二所隋書髙祖紀十九年春二月帝如仁夀宫冬十月徙突厥染干於五原二月甲寅幸仁夀宫隋書髙祖紀突厥染干尚宗女安義公主患雍虞閭抄畧請徙五原從之突厥傳仁夀二年春三月帝如仁夀宫三月己亥幸仁夀宫九月丙戌至自仁夀宫隋書髙祖紀四年春正月帝如仁壽宫七月煬帝即位正月甲子幸仁夀宫隋書髙祖紀帝將避暑於仁夀宫術士章仇大翼諫曰是行恐鑾輿不返帝大怒繫之長安獄期還而斬之通鑑煬帝大業三年夏四月帝北廵四月丙申車駕北廵狩己亥次赤岸澤六月辛巳獵於連谷連谷縣名屬勝州戊子次榆林郡甲辰上御北樓觀漁於河以宴百僚八月壬午車駕發榆林啓民可汗飾廬清道以候乗輿帝幸其帳啓民奉觴上夀宴賜極厚皇后亦幸義成公主帳隋書煬帝紀車駕北廵至榆林遂欲出塞耀兵徑突厥中恐啓民驚懼先遣公孫晟諭㫖啓民奉詔因召所部豪長咸集於是發榆林北境開為御道長三千里廣百步啓民及義成公主來朝行宫令宇文愷為大帳其下可坐數千人以宴啓民及其部落諸長駭悦通鑑四年春三月帝如五原三月乙丑車駕幸五原因出塞廵長城隋書煬帝紀行宫設六合板城載以槍車每頓舍則外其轅以為外圍内布鐵芰次施弩牀以繩連機人來觸繩則弩機旋轉向所觸而發通鑑五年春三月帝西廵三月己巳車駕西廵乙亥幸扶風舊宅九月癸未車駕入長安隋書煬帝紀帝出臨津闗渡黄河至西平陳兵講武大獵於㧞延山將擊吐谷渾自西京及西北諸郡皆轉輸塞外或遇冦鈔死亡不達及車駕東還山路險隘魚貫而出風雪晦冥文武饑餒沾濕士卒凍死者大半後宫妃主或狼狽相失與軍士雜宿山間通鑑六年春正月京城大索正月癸亥朔旦有盜數十人皆素冠練衣焚香持華自稱彌勒佛入自建國門監門者皆稽首既而奪衛士仗將為亂齊王暕遇而斬之於是都下大索與相連坐者千餘家隋書煬帝紀三月築大興城三月丁丑發丁男十萬城大興隋書煬帝紀冬十二月扶風妖人作亂討平之十二月丁亥扶風人向海明舉兵作亂稱皇帝建元白烏遣太僕卿楊義臣擊破之隋書煬帝紀桑門向海明於扶風自稱彌勒佛出世潛謀逆亂人有歸心者輙獲吉夢繇是人皆惑之三輔之士翕然稱為大聖因舉兵反衆至數萬官軍擊破之五行志十年春二月扶風人唐弼舉兵反扶風人唐弼舉兵反衆十萬推李𢎞芝為天子自稱唐王隋書煬帝紀夏五月延安賊劉迦論舉兵反將軍屈突通討斬之屈突通仕隋大業中以功遷左驍衛大將軍秦隴盗起授闗内討捕大使安定人劉迦論反衆十餘萬據雕隂通發闗中兵擊之初不與戰軍中意其怯揚言旋師而潛入上郡賊未之覺引而南去通七十里舍分兵狥地通候其無備夜簡精甲襲破之斬迦論幷首級萬餘築京觀於上郡南山擄老弱數萬口唐書屈突通傳十二年秋七月馮翊郡反秋七月戊辰馮翊人孫華自號總管舉兵為盜隋書煬帝紀十三年春二月朔方郎將梁師都反引突厥冦邊梁師都朔方人仕隋鷹揚府郎將大業末罷歸結徒起為盜殺郡丞唐世宗據郡自稱大丞相聯兵突厥因畧定雕隂𢎞化延安自為梁國僭皇帝位建元永隆始畢可汗遺以狼頭纛號大度毗伽可汗解事天子遂導突厥兵居河南地㧞鹽川郡唐書梁師都傳三月流人郭子和據揄林反翊衛郭子和坐事徙榆林會郡中大饑子和潛結敢死士十八人執郡丞數以不恤百姓斬之開倉賑施自稱永樂王南連梁師都北附突厥始畢以子和為平陽天子子和固辭不敢當乃更以為屋利設綱目秋八月唐師次龍門遂下韓城任瓌隋仁夀中為韓城尉未幾罷髙祖討捕於汾晉承制署河東縣户曹義師起瓌至龍門請見髙祖曰今主政殘酷兵役不止天下之人思見拯亂與之息肩公天付神武仗順而起軍令嚴明所下城邑無秋毫之犯闗中兵起者跂踵而待􅅛在馮翊久悉其人情願為一介使入闗宣布威靈以收左輔繇梁山濟河直趨韓城逼郃陽狥朝邑蕭造文吏勢當自下次招諸賊然後鼔行而前據永豐積粟雖未得京師闗中固已定矣髙祖曰是吾心也廼授銀青光禄大夫遣陳演夀史大奈步騎六千趨梁山以瓌及薛獻為招慰大使髙祖謂演夀曰閫外事與任􅅛籌之既而賊孫華白元度等果降且具舟於河以濟師􅅛行説下韓城與諸將進擊飲馬泉破之拜左光禄大夫留戍永豐倉唐書任􅅛傳髙祖至河東屈突通拒守不下三輔豪傑歸義者日有千數髙祖將先定京師猶豫未决寂進曰今通據蒲闗若不先下前有京城之守後有屈突之援此腹背受敵敗之道也未若攻蒲州下之而後入闗太宗曰不然兵法尚權權在於速冝乗機早渡以駭其心我若遲留彼則生計且闗中羣盗所在屯結未有定主易可招懐賊附兵强何城不克屈突通自守賊耳不足為虞髙祖兩從之留兵圍河東而引兵入闗舊唐書裴寂傳九月唐師濟河次長春宫遣建成守潼闗世民狥渭北九月丙辰馮翊太守蕭造以郡來降戊午華隂令李孝嘗以永豐倉來降庚申髙祖率軍濟河舍於長春宫三秦士庶至者日以千數髙祖禮之幷過所望人皆喜悦丙寅遣隴西公建成司馬劉文静屯永豐倉兼守潼闗以備他盗太宗率劉𢎞基長孫順德等前後數萬人自渭北狥三輔所至皆下唐書髙祖紀屈突通引兵趣長安劉文静等拒却之髙祖濟河通大懼乃留鷹揚郎將堯君素守蒲將自武闗趨藍田以援長安至潼闗阻劉文静兵不得進唐書屈突通傳段志𤣥從劉文静拒屈突通於潼闗文静為桑顯和所襲軍且潰志𤣥率壯騎馳賊殺十餘人中流矢忍不言突擊自如唐兵復振段志𤣥傳柴紹妻李氏及李神通等起兵應唐師於渭北闗中羣盜降於唐髙祖從父弟神通起兵於鄠柴氏婦髙祖女也亦起兵於司竹皆與世民會郿賊丘師利李仲文盩厔賊何潘仁向善思冝君賊劉炅等皆來降因畧定鄠杜壬申髙祖次馮翊乙亥燉煌公世民屯阿城隴西公建成自新豐趨灞上丙子髙祖自下邽以西所經隋行宫籞苑悉罷之出宫女還其家唐書髙祖紀義兵將起公主與紹並在長安遣使召之紹謂公主曰尊公將掃清多難紹欲迎接義旗同去則不可獨行則恐罹後患為計若何公主曰君冝速去我一婦人易可藏隐當别自為計矣紹即行公主乃歸鄠縣莊所遂散家資招引山中亡命得數百人起兵以應髙祖時有巨賊何潘仁聚衆於司竹園隋志盩厔冇司竹園自稱總管未有所屬公主遣家僮馬三寳説以利害潘仁攻鄠縣陷之三寳又説羣盜李仲文向善思丘師利等各率衆數千人來會時京師留守熲遣軍討公主三寳潘仁屢挫其鋒公主畧地至盩厔武功始平皆下之每申明法令示兵士無得侵掠逺近奔赴者甚衆得兵七萬人公主令間使以聞髙祖大悦及義軍渡河遣紹將數百騎趨華隂傍南山以迎公主公主領精兵萬餘與太宗軍會於渭北與紹各置幕府號曰娘子軍舊唐書平陽公主傳淮安王神通大業末亡命入鄠南山舉兵應太原約司竹賊帥何潘仁連和進與平陽公主兵合自署闗中道行軍總管從平京師唐書淮安王傳時左親衛段綸娶淵女亦聚徒於藍田得萬餘人遣使迎淵綱目冬十月唐師圍長安十月辛巳次長樂宫有衆二十萬隋留守衛文昇等奉代王侑守京城髙祖遣使諭之不報乃圍城下令曰犯隋七廟及宗室者罪三族唐書髙祖紀京兆内史衛文昇年老聞淵軍至憂懼成疾獨將軍隂世師郡丞骨儀奉代王侑乗城拒守淵如永豐倉勞軍賑饑民進屯馮翊世民所至吏民及羣盜趨之如流世民收其豪俊以備僚屬營於涇陽勝兵九萬李氏將精兵萬餘會世民於渭北隰城尉房𤣥齡謁世民於軍門世民一見如舊識署記室叅軍引為謀主𤣥齡罄竭心力知無不為淵命劉𢎞基殷開山分兵西畧扶風有衆六萬南渡渭水屯長安故城城中出戰𢎞基逆擊破之世民引兵趣司竹軍令嚴整秋毫不犯遣使白淵請期日赴長安淵命建成選倉上精兵歸長樂宫世民帥新附諸軍北屯長安故城延安上郡雕隂皆請降淵引軍西行十月至長安諸軍皆集合二十餘萬淵命各依壘壁毋得入村落侵暴遣使至城下諭衛文昇等不報命諸軍進圍城綱目十一月唐師入長安是月恭帝即位改元義寜十一月丙辰克京城命主符郎宋公弼收圖籍約法十二條遥尊隋帝為太上皇立代王為皇帝甲子髙祖入京師至朝堂望闕而拜隋帝授髙祖假黄鉞使持節都督内外諸軍事大丞相録尚書事進封唐王唐書髙祖紀姚思亷仕隋代王侍讀髙祖定京師府僚皆奔亡獨思亷侍王兵將升殿思亷厲聲曰唐公起義本安王室若等不宜無禮衆眙却布列階下帝義之聽扶王至順陽閣下泣辭去觀者歎曰仁者有勇謂此人乎姚思亷傳李靖為馬邑丞髙祖擊突厥靖察有非常志自囚上急變傳送江都至長安道梗髙祖已定京師將斬之靖呼曰公起兵為天下除暴亂欲就大事以私怨殺誼士乎秦王亦為請得釋引為三衛李靖傳唐叅軍竇軌及稽胡戰於黄欽山破之時稽胡兵五萬餘人掠宜春軌討之次黄欽山水經注清水出雲陽縣之石門山東南流逕黄欽山西賊乘髙縱火王師小却軌斬其部將十四人㧞隊中小帥代之軌自率數百騎殿後令之曰聞鼓聲有不進者自後斬之既聞鼓之士卒争先赴敵賊射之不能止因大破之斬首千餘級掠男女二萬口舊唐書竇軌傳十二月薛舉侵扶風唐王遣秦公世民擊敗之薛舉攻扶風太宗擊敗之斬首萬餘級唐書太宗紀仁杲冦扶風汧源賊唐弼拒不得進初弼立李𢎞芝為天子有衆十萬舉遣使招弼弼殺𢎞芝從舉仁杲聞弼無備襲之盡奪其衆弼以數百騎走軍益張號二十萬將窺京師會髙祖入闗遂留攻扶風秦王擊破之斬首數千級逐北至隴還唐書薛舉傳河池太守蕭瑀以郡降唐唐以瑀為禮部尚書封宋國公時榆林漢陽諸郡相繼皆降於唐綱目周按河池郡後魏置南岐州後改曰鳯州隋改河池郡劉文静大破屈突通於潼闗追降之通至潼闗為劉文静所遏相持月餘通令桑顯和夜襲文静詰朝大戰義軍不利縱兵破二栅惟文静一栅獨存顯和兵復入栅而戰者徃復數焉文静為流矢所中義軍氣奪垂至於敗顯和以兵疲傳餐而食文静因得分兵以實二栅又有遊擊數百騎自南山來擊其背三栅之兵復大呼而出表裏齊奮顯和軍潰僅以身免盡併其衆勢彌蹙或説通降通泣曰吾歴事兩主受人厚禄安可逃難有死而已每自摩其頸曰要當為國家受人一刀耳勞勉將士未嘗不流涕人亦以此懐之髙祖遣其家僮召之通命斬之通聞京師平家屬盡没乃留顯和鎮潼闗率兵東下通適進路而顯和降文静遣竇琮等與顯和追之擒通送長安髙祖曰何相見晚耶授兵部尚書封蔣國公舊唐書屈突通傳唐髙祖武德元年夏四月張長遜以五原郡降是年即隋恭帝義寜二年五月髙祖即位改元武德張長遜以平陳功累遷五原郡通守遭亂附突厥突厥號為割利特勒義兵起以郡降即拜五原太守安化郡公唐書張長遜傳初長遜以中原大亂舉郡附突厥時啓民可汗之子號莫賀咄設建牙直五原之北薛舉遣使與莫賀咄設謀入冦莫賀咄設許之唐王使都水監宇文歆賂莫賀咄設且為陳利害止其出兵又説莫賀咄設遣張長遜入朝以五原之地歸之中國莫賀咄設從之長遜以五原郡降通鑑秋七月秦王長史劉文静等與薛舉戰於髙墌敗績薛舉進逼髙墌遊兵至於豳岐秦王世民深溝髙壘不與戰會世民得瘧疾委軍事於長史劉文静司馬殷開山且戒之曰舉懸軍深入食少兵疲若來挑戰慎勿應也俟吾疾愈為君等破之開山退謂文静曰王慮公不能辦故有此言耳賊聞王有疾必輕我冝耀武以威之乃陳於髙墌西南恃衆而不設備舉潛師掩其後壬子戰於淺水原八總管皆敗士卒死者什五六大將慕容羅李安逺劉𢎞基皆没世民引兵還長安文静等皆坐除名通鑑長按髙墌城在今武縣北榆林賊帥郭子和來降子和同州蒲城人為隋左翊衛以罪徙榆林大業末子和與死士十八人執丞王才斬之自號永樂王建元丑平號其父為太公以弟子政為尚書令子端子升為左右僕射有騎兵二千武徳元年獻欵授靈州總管金河郡公唐書李子和傳八月遣秦王世民伐薛舉郝瑗言於薛舉曰唐兵新破闗中騷動宜乗勢取長安舉然之會有疾而止舉卒太子仁杲立居於折墌城一統志云折墌城在宜禄廢城北五里以秦王世民為元帥擊薛仁杲通鑑九月薛仁杲陷隴州隴州刺史常達擊薛仁杲於冝禄川通鑑注宜禄川在豳涇二州之間斬首千餘級仁杲屢攻達不能克乃遣其將仵士政以數百人詐降達厚撫之士政伺隙以其徒刦達擁城中二千人降於仁杲達見仁杲詞色不屈仁杲壯而釋之奴賊帥張貴謂達曰汝識我乎達曰汝逃死奴賊耳貴怒欲殺之人救之得免通鑑冬十月岐州鄜州賊邵江海降武德元年十月岐州鄜州邵江海自號新平王遣隴州刺史叔孫老擊之江海率其衆來降册府元龜十一月秦王世民破薛仁杲於淺水原降之太宗疾間復屯於髙墌城相持六十餘日舉死仁杲率其衆求戰太宗按軍不動久之仁杲糧盡衆稍離叛太宗曰可矣乃遣行軍總管梁實栅淺水原仁杲將宗羅擊實太宗遣將軍龎玉救實玉軍幾敗太宗率兵出其後羅㬋敗走太宗追之至其城下杲降師還髙祖遣李宻馳傳勞之於豳州宻見太宗不敢仰視退而歎曰真英主也唐書太宗本紀十二月朱粲冦啇州戰敗之鄭元璹及朱粲戰於商州敗之唐書髙祖紀帝如周氏陂髙祖武德元年十二月乙酉如周氏陂丁亥至自周氏陂唐書髙祖紀在按明一統志周氏陂髙陵縣羌豪旁仚地叛入南山伏誅初羌豪旁仚地以所部附薛舉及薛仁杲敗仚地來降留長安仚地不樂率其衆數千叛入長安南山自南山諸谷出漢川隋改漢中為漢川郡所過殺掠武侯大將軍龎玉擊之為仚地所敗行至始州掠女子王氏與俱醉卧野外王氏㧞其佩刀斬首送梁州唐改漢川郡為梁州其衆遂潰詔賜王氏為崇義夫人通鑑賊冦涇陽討捕使王師仁擊走之王師仁為討捕使武德元年突厥八千人掠涇陽師仁擊走之册府元龜鄜州刺史梁禮叛將軍藺興粲擊敗之藺興粲為驍騎將軍武德元年鄜州刺史梁禮叛擊破之俘斬千餘人册府元龜賊陷盩厔將軍趙欽擊破之趙欽為驃騎武德元年賊帥吕寳生衆七千人破盩厔縣欽擊之斬首百餘級册府元龜二年春二月將軍何潘仁等及司竹賊戰死之