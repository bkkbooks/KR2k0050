七年幸樓觀以太牢祭隋文帝陵十二月丁卯幸躍龍宫戊辰校獵於髙陵庚午至自髙陵册府元龜功按慶善宫在武躍龍宫在髙陵八年夏四月帝如鄠六月幸太和宫四月甲申幸鄠縣獵於甘谷作太和宫丙戌至自鄠六月甲子如太和宫七月丙午至自太和宫唐書髙祖紀按太和宫在長安城南五十里冬十月帝如周氏陂十一月如宜州十月辛巳幸周氏陂校獵於北原壬午如躍龍宫十一月辛卯如宜州校獵於西原庚子講武於同官癸丑獵於華池北原十二月辛酉至自華池唐書髙祖紀十二月庚辰臘帝曰臘獵以供宗廟朕當躬其事以申孝享之誠於是車駕廵狩於鳴犢泉之野是日宴從官賚物綵帛各有差册府元龜九年春三月帝如昆明池八月太宗即位三月庚寅幸昆明池習水戰壬辰至自昆明池唐書髙祖紀帝如周氏陂丙午如周氏陂乙卯至自周氏陂唐書髙祖紀秋八月突厥入冦帝帥六師次於渭突厥受盟而還七月頡利自將十萬騎襲武功京師戒嚴攻髙陵尉遲敬德與戰涇陽獲俟斤烏没啜斬首千餘級頡利遣謀臣執失思力入朝以覘我因夸説曰二可汗兵百萬今至矣太宗曰我與可汗當面約和爾則背之且義師之初爾父子身從我賜遺玉帛多至不可計何妄以兵入我都畿自誇盛彊耶今我當先戮爾矣思力懼請命蕭瑀封德彛諫帝不如禮遣之帝不許繫於門下省乃與侍中髙士亷中書令房𤣥齡將軍周範馳六騎幸渭上與可汗隔水語且責其負約其衆見帝皆驚下馬羅拜俄而衆軍至旗鎧光明部隊静嚴因大駭帝與頡利按轡即麾軍却而陣焉蕭瑀以帝輕敵叩馬諫帝曰我思熟矣非爾所知也夫突厥掃地入境以我新有内難謂不能師我若闔城彼且大掠吾境故我獨出示無所畏又盛兵使知必戰不意我能沮其始謀彼入吾地既深懼不能返故與戰則克和則固制賊之命在此舉矣是日頡利果請和許之翌日刑白馬與頡利盟便橋上突厥引還蕭瑀曰頡利之來諸將多請與戰陛下不聽既而果自退其䇿奈何帝曰突厥衆而不整君臣唯利是視可汗在水西而酋帥皆來謁我我醉而縛之其勢易甚又我勅長孫無忌李靖潛師幽州以須若大軍躡其後伏邀諸前取之反覆掌爾然我新即位為國者要在安静一與彼校殺傷必多彼敗未及亡懼而修德與我為怨其可當耶今卧械巻鎧啗以玉帛彼志必驕驕則亡之端也故曰將欲取之必固與之瑀再拜曰非臣愚所逮也唐書突厥傳武德末年突厥至渭水橋控弦四十萬太宗初親庶政驛召衛公問䇿時發諸州軍未到長安居人勝兵不過數萬敵人精騎騰突挑戰日數十合帝怒欲擊之靖請傾府庫賂以求和潛軍邀其歸路帝從其言敵兵遂退於是據險邀之乃棄老弱而遁獲馬數萬匹玉帛無遺焉隋唐嘉話太宗貞觀元年春正月燕郡王李藝冦豳州統軍楊岌討斬之正月辛丑李藝據涇州反藝之初入朝也恃功驕倨秦王左右至其營藝無故毆之上即位藝内不自安詐稱奉宻勅勒兵入朝引兵至豳州豳州治中趙慈皓馳出謁之藝入據豳州詔長孫無忌為行軍總管討之慈皓聞官軍將至密與統軍楊岌圖之事洩囚慈皓岌在城外覺變勒兵攻之藝衆潰將奔突厥左右斬之傳首長安通鑑二年夏四月遣兵討梁師都朔方人殺之以降太宗以師都寖危乃諭以書使歸不從詔夏州長史劉旻司馬劉蘭經畧之有得其生口者輙縱遣令為反間離其君臣之計頻選輕騎踐其禾稼有李正寳辛獠兒者皆其名將謀執師都事洩來降太宗遣右衛大將軍柴紹殿中少監薛萬均擊之又使劉旻劉蘭率勁卒直據朔方東城以逼之頡利可汗遣兵來援師都紹逆擊破之進屯城下師都兵勢日蹙其從父弟洛仁斬師都詣紹降以其地為夏州舊唐書梁師都傳四年春正月李靖破突厥頡利於鐵山走之四年正月靖屯惡陽嶺夜襲頡利頡利窘走保鐵山兵猶數萬令執失思力來陽為哀言謝罪請内屬帝詔鴻臚卿唐儉將軍安修仁等持節慰撫靖知儉在敵所敵必安乃襲擊之盡獲其衆頡利得千里馬獨奔沙鉢羅唐書突厥傳河按鐵山今榆林府套内二月帝如温湯秋九月如隴州冬十二月如鹿苑二月己亥幸温湯賜從官帛有差丙午至自温湯九月己卯如隴州十月辛丑校獵於貴泉谷賜將士帛有差甲辰校獵於魚龍川親自射鹿獻獲於太安宫十一月甲子至自隴州十二月甲辰獵狩於鹿苑見野人多藍縷遣侍中王珪賑賜貧人焉乙巳至自鹿苑册府元龜髙按武德元年分京兆之陵置鹿苑縣五年春正月帝如昆明池冬十二月如温湯貞觀五年正月癸酉大蒐於昆明池蕃夷君長咸從帝謂髙昌王麴文泰曰丈夫在世樂事有三耳天下太平家給人足一樂也草淺獸肥以禮田狩弓不虛發箭不妄中二樂也六合大同萬方咸寜張樂髙宴上下歡洽三樂也今日王可從禽明當歡讌耳丙子至自昆明池親獻禽於太安宫册府元龜十二月壬寅幸温湯癸卯獵驪山賜新豐髙年帛戊申至自温湯唐書太宗紀六年春三月帝如九成宫貞觀六年三月戊辰幸九成宫發使存問髙年鰥寡舊唐書太宗本紀馬周上疏曰臣竊惟太上皇春秋已髙陛下宜朝夕視膳今所幸宫去京三百餘里太上皇情或思感而欲即見陛下何以赴之今行本為避暑然則太上皇尚留熱所而陛下自逐凉處温凊之道臣竊未安然勅書既出願示速返之期以開衆惑馬周傳按九成宫即隋仁夀宫髙祖更名萬年宫在今麟遊縣秋閏八月帝如岐州九月如慶善宫貞觀六年閏八月帝在岐州皇太子來朝丙申宴東宫官屬賜帛各有差乙巳宴岐州父老賜帛各有差册府元龜九月己酉幸慶善宫十月乙卯至自慶善宫唐書太宗紀慶善宫上生時故宅也因宴賦詩被之管絃命曰功成慶善樂使童子八佾為九功之舞大宴會與破陣舞偕奏於庭同州刺史尉遲敬德預宴有班在其上者敬德怒曰汝何功坐我上任城王道宗諭解之敬德拳毆道宗目幾眇上不懌而罷謂敬德曰朕欲與卿等共保富貴然卿居官數犯法乃知韓彭葅醢非髙祖之罪也敬德由是始懼而自戢通鑑在按慶善今武功縣南七年夏五月帝如九成宫冬十二月如芙蓉園五月癸未如九成宫十月庚申至自九成宫十二月甲寅幸芙蓉園丙辰獵於少陵原少陵原在長安城南戊午至自少陵原唐書太宗紀帝從太上皇幸未央宫戊午從上皇置酒故漢未央宫上皇命突厥頡利可汗起舞又命南蠻豪長馮智戴詠詩既而笑曰一家自古未有也帝奉觴上夀曰今四方入臣皆陛下教誨非臣智力所及昔漢髙祖亦從太上皇置酒此宫妄自矜大臣所不取也上皇大悦殿上皆呼萬歳通鑑八年春三月帝如九成宫三月庚辰如九成宫十月甲子至自九成官唐書太宗紀冬十月作永安宫上屢請上皇避暑九成宫上皇以隋文帝終於彼惡之十月營永安宫為上皇清暑之所未成而上皇寢疾不果居通鑑名按永安宫在西安府治東北五里初永安改曰蓬萊又改曰大明十二月治兵十二月丁卯從太上皇閲武於城西唐書太宗紀十二年春二月帝如長春宫冬十月如始平二月甲戍如長春宫乙亥獵於河濵閏二月丙戍至自長春宫十月己卯獵於始平乙未至自始平唐書太宗紀十三年春正月帝如三原謁獻陵夏四月如九成宫正月乙巳拜獻陵賜宿衛陵邑郎將三原令爵一級丁未至自獻陵四月戊寅如九成宫十月甲申至自九成宫唐書太宗紀突厥結社率反伏誅初突利可汗之弟結社率入朝為中郎將久不進秩隂結故部落四十餘人作亂夜襲御營折衝孫武開等率衆奮擊久之乃退馳入御廏盜馬北走追獲斬之綱目冬十二月帝如咸陽校獵十二月壬辰獵於咸陽癸巳至自咸陽唐書太宗紀十四年春二月帝如温湯冬閏十月如同州二月壬午幸温湯辛卯至自温湯唐書太宗紀閏十月乙未幸同州甲辰狩於堯山庚戌輿駕還宫册府元龜劉仁軌為櫟陽丞上將幸同州校獵仁軌上言今秋大稔民收穫者十纔一二使之共承獵事治道葺橋動費一二萬功實妨農事願少留鑾輿旬日俟其畢務則公私俱濟上賜璽書嘉納之通鑑十二月帝如樊川校獵十二月壬辰臘校獵於樊川遇大雪其夜解圍乙巳輿駕還宫册府元龜十六年冬十一月帝如武功岐陽十二月如温湯十一月丙辰上獵於武功壬戌獵於岐山之陽遂幸慶善宫庚午至自慶善宫唐書太宗紀十二月癸卯幸温湯甲辰獵於驪山上登山見圍有斷處顧謂左右曰吾見其不整而不刑則墮軍法刑之則是吾登髙臨下以求人之過也乃託以道險引轡入谷以避之乙巳還宫通鑑十七年冬十二月如温湯十二月庚申幸温湯庚午至自温湯唐書太宗紀十八年春正月帝如鍾官城夏四月如九成宫貞觀十八年正月乙未幸鍾官城庚子幸鄠縣壬寅幸温湯二月己酉幸靈口村落偪側問其受田丁三十畝遂夜分而寢憂其不給詔雍州録尤少田者並給復移之於寛鄉乙卯還宫册府元龜四月辛亥幸九成宫壬子至太平宫在今鄠縣東南三十里乙未至顯仁宫在今郿縣八月甲子還京師通鑑十九年冬十二月薛延陀入冦大敗之遣兵戍勝州帝詔思力屯金州道領突厥扞薛延陀延陀兵十萬冦河南鑑注北河之南即朔方新秦之地思力示羸不與确賊深入至夏州乃整陣擊敗之追躡六百里會毗伽可汗死耀威磧北而歸唐書執失思力傳多彌可汗冦邉帝遣江夏王道宗都督薛萬徹與左驍衛大將軍阿史那社尒屯勝州執失思力與突厥掎捔塞下敵知有備乃去回鶻傳二十年秋八月帝如涇陽遂踰隴庚午車駕至涇陽回紇等十一姓各遣使入貢乞置官司上大喜壬申幸漢甘泉宫丙戌踰隴山九月丙戌車駕還京師通鑑二十一年夏四月作翠㣲宫五月帝如翠㣲宫夏四月乙丑營太和宫於鍾南之上改為翠㣲宫五月戊子幸翠㣲宫舊唐書太宗本紀上幸翠㣲宫冀州進士張昌齡獻翠㣲宫頌上愛其文命於通事舍人裏供奉通鑑秋七月作玉華宫七月庚子建玉華宫於宜君縣之鳯凰谷庚戌至自翠㣲宫舊唐書太宗本紀二十二年春正月帝如温湯二月如玉華宫正月戊戌幸温湯癸卯御製温湯碑以示羣臣戊申還宫二月乙亥行幸玉華宫三月丙戍至自玉華宫册府元龜貞觀末稍治宫室百姓勞怨惠上疏極諫言翠㣲玉華等宫雖因山藉水無築搆之苦而工力和僦不謂無煩帝善其言優賜之唐書太宗賢妃徐惠傳二十三年夏四月帝如翠㣲宫四月乙亥幸翠㣲宫唐書太宗紀髙宗永徽四年冬十月帝如温湯十月庚子幸温湯乙巳至自温湯唐書髙宗紀五年春二月帝如萬年宫遂如鳯泉二月戊午幸萬年宫乙丑次鳯泉湯九月丁酉至自萬年宫唐書髙宗紀髙宗幸萬年宫山水暴至夜突𤣥武門宿衛皆散走仁貴曰當天子緩急安可懼死遂登門大呼以警宫内帝遽出乘髙俄而水入帝寢帝曰賴卿以免始知有忠臣也賜以御馬唐書薛仁貴傳按括地志鳯泉温湯在岐州郿縣冬十月築長安郭城十月癸卯築京師羅郭起觀於九門唐書髙宗紀六年春正月帝如醴泉謁昭陵正月壬申拜昭陵陵所宿衛進爵一級癸酉以少牢祭陪葬者甲戌至自昭陵唐書髙宗紀龍朔二年春三月帝如同州三月癸丑如同州四月庚申至自同州唐書髙宗紀夏四月作蓬萊宫四月辛巳作蓬萊宫通鑑冬十月帝如温湯十月丁酉幸温湯皇太子監國丁未至自温湯唐書髙宗紀麟德元年春二月帝如萬年宫二月戊子發京師幸福陽宫癸卯至萬年宫八月丙子至自萬年宫便幸舊宅停七日壬午還蓬萊宫册府元龜總章元年春二月帝如九成宫二月戊寅幸九成宫八月癸酉至自九成宫唐書髙宗紀二年夏四月帝如九成宫四月己酉如九成宫九月壬寅如岐州十月丁巳至自岐州唐書髙宗紀上幸九成宫冬十月車駕還京仍西廵校獵自麟遊西北遶岐梁歴普潤隋志普潤縣名大業初置屬扶風郡丁巳還長安文獻通考咸亨元年帝如九成宫四月庚午幸九成宫八月丁巳至自九成宫唐書髙宗紀四年夏四月帝如九成宫咸亨四年四月丙子發京師幸九成宫十月庚子發九成宫乙巳至京師册府元龜上元元年冬十一月帝如華山校獵咸亨五年十一月丙午朔車駕發京師己酉畋於華山之曲武原册府元龜儀鳯元年四月帝如九成宫四月戊午幸九成宫冬十月乙未至自九成宫唐書髙宗紀二年春正月帝如司竹園正月庚辰幸司竹園即日還宫册府元龜三年夏五月帝如九成宫五月壬戌如九成宫九月辛酉至自九成宫唐書髙宗紀𢎞道元年夏四月綏州步落稽作亂討平之綏州步落稽白鐵余埋銅佛於地中乆之草生其上紿鄉人曰吾於此數見佛光集衆掘地果得之因曰得見聖佛者百疾皆愈逺近附之數年歸信者衆遂謀作亂據城平縣故扯在延安府宜君縣西北稱皇帝置百官攻綏德大斌二縣殺官吏焚民居遣右武衛將軍程務挺與王方翼討之擒鐵余餘黨悉平通鑑武后神功元年春正月突厥冦勝州邉兵擊破之正月癸亥突厥黙啜冦勝州平狄軍副使安道買敗之唐書武后紀中宗景龍二年春三月築三受降城初朔方軍與突厥以河為境時黙啜悉衆西擊突騎施仁愿請乘虛取漠南地於河北築三受降城首尾相應絶其南冦路六旬而三城就相距各四百餘里皆據津要自是突厥不敢踰山牧馬朔方益無冦嵗捐費億計减鎮兵數萬初建三成也不置壅門曲敵戰格或曰邊城無守備可乎仁愿曰兵貴攻取賤退守冦至當併力出拒敢囘望城者斬何事守備退忸其心哉唐書張仁愿傳三年冬十二月帝如温湯景龍三年十二月甲午幸新豐之温湯庚子幸兵部韋嗣立莊舍宴賜甚厚特奉谷為幽栖谷是月幸驪山乙巳至自温湯册府元龜兵部尚書韋嗣立景龍中中宗與韋后幸其莊封嗣立為逍遥公又改其居鳯凰原為清虛原鸚鵡谷為幽栖谷隋唐嘉話四年夏四月帝如隆慶池六月睿宗即位改元景雲初武后之世長安城東民家井溢浸成大池數十頃號隆慶池相王子五王列第於其北望氣者言常鬰鬰有帝王氣比日尤盛上幸池宴侍臣以厭之通鑑𤣥宗先天元年冬十月帝如新豐校獵先天元年十月癸卯從太上皇幸新豐獵於驪山之下命從官宴設摴蒲焉賜帛各有差十二月癸卯帝幸新豐之温湯便獵於渭川册府元龜開元元年帝如驪山治兵先天二年十月癸卯親講武於驪山之下徴兵二十萬旌旗連亘五十餘里戈鋋金甲照耀天地列大陣於長川坐作進退以金鼓之聲節之三軍出入號令如一帝親擐戎服持沉香大鎗立於陣前威振宇宙長安士庶奔走縱觀填塞道路册府元龜二年秋七月作興慶宫九月庚寅作興慶宫唐書𤣥宗紀東按興慶宫在西安府治南五里帝如温湯及長春宫戊戌幸温湯十月戊午至自温湯唐書𤣥宗紀三年冬十月帝如郿十一月如温湯十月癸亥如郿甲子如鳯泉湯十一月己卯至自鳯泉湯乙酉幸温湯甲午至自温湯唐書𤣥宗紀四年春二月帝如温泉湯冬十二月如温湯二月丙辰幸温泉湯丁卯至自温泉湯唐書𤣥宗紀七年冬十月帝如温湯開元七年十月辛卯幸新豐之温湯癸卯至自温湯册府元龜八年夏六月朔方突厥降户謀作亂長史張説慰安之突厥降户僕固都督勺磨及􅎤跌部落散居受降城側朔方大使王晙言其隂引突厥謀陷軍城誘僕勺磨等於受降城伏兵殺之㧞曵固同羅諸部聞之皆忷懼并州長史張説引二千騎持節即其部落撫慰之由是遂安通鑑冬十月帝如長春宫八年十月辛卯幸長春宫壬午畋於華州之下邽庚寅遂幸温泉十一月辛卯至自長春宫册府元龜九年春正月帝如温湯開元九年正月甲寅幸新豐之温湯乙亥至自温湯册府元龜夏四月蘭池胡冦夏州遣兵討之蘭池州胡康待賔誘諸降户同反夏四月攻陷六胡州宋白曰六胡州在夏州徳静縣有衆七萬進逼夏州命朔方大總管王晙隴户節度使郭知運討之通鑑秋七月王晙擊康待賔擒斬之秋七月己酉王晙大破康待賔生擒之殺其衆萬五千人辛酉集四邊豪長腰斬待賔於西市先是待賔潛與党項通謀攻銀城連谷杜佑曰銀城連谷皆漢圁隂縣地據其倉庾張説將步騎萬人揜擊大破之追至駱駝堰党項更與待賓戰衆潰走説安集党項使復其居業因奏置麟州一統志云麟州本漢五原西河二郡地元改為神木縣連谷縣故址在神木縣北一十里以鎮撫党項餘衆通鑑冬十二月帝如温湯十二月乙酉幸新豐之温湯壬辰至自温湯唐書𤣥宗紀十年秋八月京兆人權梁山反伏誅以宋璟守西京王志愔為揚州長史帝幸東都詔留守京兆京兆人權梁山妄稱襄王子與左右屯營官謀反自稱光帝夜犯長樂門入宫城將殺志愔志愔踰垣走而屯營兵悔更斬梁山等自歸志愔慙悸卒唐書王志愔傳權梁山謀反勅河南尹王怡馳傳徃按牢械充滿久未决乃命璟為京留守復其獄平縱數百人宋璟傳九月朔方節度大使張説討康待賔餘黨平之四月己亥張説持節朔方軍節度大使九月張説敗康願子於木盤山執之唐書𤣥宗紀康待賔餘黨康願子反自稱可汗張説至朔方發兵討擒之其黨悉平徙殘兵五萬餘口於許汝等州空河南朔方千里之地先是縁邊戍兵常六十餘萬説以時無彊㓂奏罷二十餘萬使歸農上以為疑説曰臣久疆場具知其情將帥茍以自衛及役使營私而已若禦敵制勝不必多擁冗卒以妨農務上乃從之通鑑十一年冬十月帝如温湯初作宫十二月如鳯泉湯十一年十月丁酉幸新豐之温湯置温泉宫甲寅至温泉宫十二月甲午幸鳯泉湯詔有司萬事自備不得干擾百姓戊申至自鳯泉湯册府元龜十五年十二月帝如温泉宫十一月丁卯獵於城南十二月乙亥幸温泉宫丙戌至自温泉宫唐書𤣥宗紀十六年冬十月帝如温泉宫十二月如温泉宫十月己卯幸温泉宫乙丑至自温泉宫十二月丁卯幸温泉宫丁丑至自温泉宫唐書𤣥宗紀十七年冬十一月帝行謁諸陵十二月如温泉宫十一月丙申拜橋陵戊戌拜定陵己亥拜獻陵壬寅拜昭陵乙巳拜乾陵戊申至自乾陵唐書𤣥宗紀開元中有事五陵有司以鷹犬從姚崇子奕曰非禮也奏罷之白孔六帖十二月辛酉幸温泉宫壬申至自温泉宫唐書𤣥宗紀十八年夏四月築郭城四月乙卯築京師外郭唐書𤣥宗紀冬十月帝如鳯泉湯十一月如温泉宫十月庚寅幸岐州之鳯泉湯癸卯至自鳯泉湯册府元龜十一月丁卯幸温泉宫丁丑至自温泉宫唐書𤣥宗紀二十一年春正月帝如温泉宫冬十月如温泉宫正月丁巳幸温泉宫丁亥至自温泉宫十月庚戌幸温泉宫己未至自温泉宫唐書𤣥宗紀二十三年冬十二月命畿内舉賢守令賜帛各有差開元二十三年十二月命十道採訪使舉賢刺史縣令以隴州刺史武崇節京兆府髙陵縣令裴廽京兆府盩厔縣令戴休琔京兆府奉先縣令李知止京兆府涇陽縣令韋伯祥等聞上降書宣慰刺史賜帛八十匹縣令五十匹勅之曰卿等各能用心副朕所委今兹嵗會風政有歸是用激揚以勵清操册府元龜二十四年夏五月醴泉人劉志誠反伏誅醴泉妖人劉志誠作亂驅掠路人將趣咸陽村民走縣官焚橋斷路以拒之其衆遂潰數日悉擒斬之通鑑二十五年冬十一月帝如温泉宫十一月壬申幸温泉宫乙酉至自温泉宫册府元龜二十六年冬十月帝如温泉宫十月戊寅幸温泉宫壬辰至自温泉宫唐書𤣥宗紀二十七年冬十月帝如温泉宫十月丙寅幸温泉宫十二月辛丑至自温泉宫唐書𤣥宗紀二十八年春正月帝如温泉宫正月癸巳幸温泉宫庚子至自温泉宫唐書𤣥宗紀夏五月立𤣥元皇帝廟二十八年五月帝謂宰臣曰朕在藩邸有宅在積善里東南隅宜於此地置𤣥元皇帝廟及崇𤣥學文獻通考冬十月帝如温泉宫十月甲子幸温泉宫辛巳至自温泉宫唐書𤣥宗紀二十九年春正月帝如温泉宫正月癸巳幸温泉宫庚子至自温泉宫唐書𤣥宗紀夏四月迎𤣥元皇帝像於盩厔二十九年四月上夣𤣥元皇帝云吾像在京城西南百餘里遣使求得之於盩厔迎置興慶宫文獻通考冬十月帝如温泉宫十月丙申幸温泉宫十一月辛酉至自温泉宫唐書𤣥宗紀天寳元年春二月祠𤣥元皇帝廟正月甲寅陳王府參軍田國秀言𤣥元皇帝降於丹鳯門通衢二月辛卯享𤣥元皇帝於新廟唐書𤣥宗紀冬十月帝如温泉宫十月丁酉幸温泉宫十一月己巳至自温泉宫唐書𤣥宗紀二年春正月作昇仙宫正月乙卯作昇仙宫丙辰加號𤣥元皇帝曰大聖祖三月壬子享於𤣥元宫改𤣥元宫曰太清宫唐書𤣥宗紀冬十月帝如温泉宫十月戊寅幸温泉宫十一月乙卯至自温泉宫唐書𤣥宗紀三載春正月帝如温泉宫冬十月帝如温泉宫正月辛丑幸温泉宫二月庚午至自温泉宫十月甲午幸温泉宫十一月丁卯至自温泉宫唐書𤣥宗紀四載冬十月帝如温泉宫四載十月戊戌幸温泉宫十二月至自温泉宫唐書𤣥宗紀五載冬十月帝如温泉宫五載戊戌幸温泉宫十一月乙巳至自温泉宫六載冬十月帝如華清宫六載十月戊申幸華清宫十二月癸丑至自華清宫唐書𤣥宗紀十月幸驪山温泉改温泉宫曰華清宫通鑑𤣥宗廣温泉為華清宫環宫所置百司區署以琯資機算詔總經度驪山䟽巖剔藪為天子遊觀唐書房琯傳十二月築會昌城置百司王公第舍十二月壬戌發馮翊華隂民夫築會昌城置百司王公各置第舍土畆直千金通鑑自開元來每嵗十月臨幸温泉嵗盡乃歸以新豐去泉稍逺即於湯所置會昌縣又置百司及公卿邸第焉元和志七載冬十月帝如華清宫天寳七年十月庚戌幸華清宫辛酉還宫册府元龜唐明皇常嵗十月幸華清宫春乃還而諸楊湯沐館在宫東垣連蔓相照帝臨幸必徧五家白孔六帖八載夏六月謁太清宫六月丙寅謁太清宫加上𤣥元皇帝號曰聖祖大道𤣥元皇帝唐書𤣥宗紀天寶八載六月太白山人李渾上言有神人言金星洞内有版石記聖皇福夀之符命御史中丞王鉷入仙遊谷求而獲之以獻帝御勤政樓受焉册府元龜冬十月帝如華清宫十月乙丑幸華清宫九載正月己亥至自華清宫唐書𤣥宗紀九載冬十月帝如華清宫天寶九載十月庚申幸華清宫改驪山為昌山十二月乙亥還宫册府元龜十載春正月謁太清宫天寶九載十月太白山人王元翼上言𤣥元皇帝降見言寶仙洞中有妙寶真符詔刑部尚書王倕等獲之十載正月壬辰獻於太清宫册府元龜冬十月帝如華清宫十月壬子幸華清宫十一載正月丁亥至自華清宫唐書𤣥宗紀十一載夏四月京兆人邢縡謀反伏誅京兆人王鉷權寵日盛領二十餘使鉷弟户部郎中銲凶險不法召術士任海川問我有王者之相否海川懼亡匿鉷恐事洩捕得杖殺之王府司馬韋會話之私庭鉷又使長安尉賈季隣收會縊殺之銲所善邢縡與龍武萬騎謀作亂有告之者上以狀面授鉷使捕之鉷意銲在縡所先遣人召之乃命季隣等捕縡縡帥其黨格鬭會髙力士引集軍至擊斬縡捕其黨皆擒之國忠以狀白上曰鉷必預謀上以鉷恩遇深不應同逆乃命特原銲不問然意欲鉷表請罪之使國忠諷之鉷不忍上怒會陳希烈極言鉷大逆當誅勅希烈與國忠鞫之於是任海川韋會等事皆發獄具鉷賜自盡銲杖死於朝堂通鑑十二載冬十月帝如華清宫十月戊寅幸華清宫十三載正月丙午至自華清宫唐書𤣥宗紀楊國忠與虢國夫人居第相隣晝夜徃來無復期度或並轡走馬入朝不施障幕道路掩目三夫人將從幸華清宫會於國忠第車馬僕從充溢數坊錦繡珠玉鮮華奪目國忠謂客曰吾本寒家一旦縁椒房至此未知税駕之所然終不能致令名不若且極樂耳上在華清宫欲夜出遊龍武大將軍陳元禮諫曰宫外即曠野安可不備不虞上為之引還通鑑十三載冬十月帝如華清宫天寳十三載十月乙酉幸華清宫十二月戊午還宫册府元龜十四載冬十月帝如華清宫天寶十四載十月庚寅幸華清宫十一月丙子還宫册府元龜十二月封常清討安禄山敗績髙仙芝退保潼闗禄山反榮王為元帥仙芝副之領飛騎彍騎及朔方等兵出禁財募闗輔士五萬繼封常清東討詔監門將軍邊令誠監軍次陜郡而常清敗仙芝引兵趨潼闗會賊至甲仗資糧委於道路既至潼闗勒兵繕守具士氣稍稍復振賊攻闗不得入唐書髙仙芝傳常清戰敗奔陜語髙仙芝曰賊鋭甚難與争鋒潼闗無兵一夫奔突則京師危不如急守潼闗仙芝從之封常清傳詔監軍邉令誠斬髙仙芝封常清於潼闗以哥舒翰為兵馬副元帥守潼闗監軍邊令誠數以事干仙芝不從令誠入奏事云常清以賊揺衆仙芝棄地數百里又盜减軍士糧賜上大怒遣令誠齎勅即軍中斬仙芝常清初常清既敗三遣使陳賊形勢上皆不之見乃自馳詣闗至渭南勅削其官爵令還軍自効常清草遺表曰臣死之後望陛下不輕此賊無忘臣言令誠至潼闗先引常清宣勅示之常清以表附令誠上之常清既死令誠乃謂仙芝曰大夫亦有恩命仙芝遽下令誠宣勅仙芝曰我遇賊而退死則宜矣謂我盜减糧賜則誣也時士卒在前大呼稱枉其聲震地遂斬之隴右節度使哥舒翰病廢在家上藉其威名且素與禄山不協召見拜兵馬副元帥將兵八萬并仙芝舊卒號二十萬軍於潼闗翰用法嚴而不恤士卒皆懈弛無鬭志通鑑十五載春正月賊兵冦潼闗是月肅宗即位改元至德安禄山遣子慶緒攻闗翰擊走之唐書哥舒翰傳夏六月哥舒翰及賊戰敗績賊陷潼闗或説翰曰禄山本以誅國忠故稱兵今若留卒三萬守闗悉精鋭渡滻水誅君側此漢挫七國計也翰猶豫未發謀頗露國忠大駭入見帝曰兵法安不忘危大兵在潼闗而無後殿萬一不利京師危矣既募牧兒三千人日夜訓練以劍南列將分統之又募萬人屯灞上使腹心杜乾運為帥翰疑圖已表請乾運兵𨽻節下因詭詔乾運計事至軍即斬首梟牙門并其軍國忠愈恐翰亦不自安數奏言禄山不得人心請持重以敝之待其離隙可不血刃而擒賊將崔乾佑守陜郡仆旗鼓羸師以誘戰國忠謬説帝趨翰出潼闗復陜洛使者頂背相望翰窘慟哭出闗戰既敗翰引數百騎絶河還營羸兵裁八千至潼津收散卒復守闗乾佑進攻於是火㧞歸仁等紿翰出闗翰失守華隂馮翊上洛郡官吏皆潰唐書哥舒翰傳帝西廵以崔光逺守西京翰麾下來告急上不時召見及暮平安火不至上始懼壬辰召宰相謀之楊國忠首唱幸蜀之䇿上然之甲午上御勤政樓下制云欲親征聞者皆莫之信以崔光逺為京兆尹充西京留守既夕命龍武大將軍陳𤣥禮整比六軍乙未黎明上獨與貴妃姊妹皇子妃主皇孫及親近宦官宫人出延秋門妃主皇孫之在外者皆委之而去上過便橋楊國忠使人焚橋上曰士庶各避賊求生奈何絶其路留髙力士使撲㓕乃來至咸陽日向中上猶未食民争獻糲飯雜以麥豆皇孫軰争以手掬食之須臾而盡猶未能飽有老父郭從謹進言曰禄山包藏禍心固非一日有告其謀者陛下徃徃誅之使得逞其奸逆致陛下播越臣猶記宋璟為相數進直言天下賴以安自頃以來在廷之臣以言為諱闕門之外陛下皆不得而知草野之臣必知有今日久矣但九重嚴邃區區之心無路上達事不至此臣何由得睹陛下之面而訴之乎上曰朕之不明悔無所及慰諭而遣之命軍士散村落求食夜將半乃至金城金城縣本始平縣中宗景龍二年送金城公主延吐蕃至此更名金城縣令亦逃縣民皆走驛中無燈人相枕藉而寢貴賤無以復辨通鑑帝次馬嵬丁酉至馬嵬驛將士饑疲皆憤怒陳𤣥禮以禍由楊國忠欲誅之會吐蕃使者二十餘人遮國忠馬訴以無食軍士呼曰國忠與蕃謀反追殺之以槍揭其首於驛門外並殺韓國秦國夫人上聞諠譁杖屨出驛門慰勞軍士令收隊軍士不應上使髙力士問之𤣥禮對曰國忠謀反貴妃不冝供奉願陛下割恩上入門倚杖傾首而立久之髙力士曰貴妃誠無罪然將士已殺國忠而貴妃在陛下左右豈敢自安願陛下審思之將士安則陛下安矣乃命力士引貴妃於佛堂縊殺之於是始整部伍為行計國忠妻子及虢國夫人走陳倉縣令薛景仙誅之通鑑韋諤歴京兆府司録參軍國忠死軍聚不解陳𤣥禮請殺貴妃以安衆帝意猶豫諤諫曰臣聞以計勝色者昌以色勝計者亡今宗社震驚陛下棄神器奔草莽唯割恩以安社稷因叩頭流血帝悟賜貴妃死軍乃大悦擢諤御史中丞為置頓使乘輿將行帝心向蜀未言諤曰今兵少不能捍賊還京非萬全計不如至扶風徐圖去就帝問於衆衆然之遂至扶風乃決西幸唐書韋諤傳戊戌帝發馬嵬留太子東討賊戊戌發馬嵬父老遮道請留上令太子宣慰父老父老曰至尊既不肯留某等願帥子弟從殿下東破賊取長安若殿下與至尊皆入蜀使中原百姓誰為之主須臾衆至數千人太子不可涕泣䟦馬欲西建寜王倓與李輔國執鞚諫廣平王俶亦勸太子留父老共擁太子馬不得行上總轡待太子久不至使人偵之還白狀上曰天也乃分後軍及飛龍廄馬從太子又使送東宫内人於太子通鑑承天皇帝倓始王建寜英毅有才畧善騎射禄山亂典親兵扈車駕渡渭百姓遮道留太子太子使喻曰至尊播遷吾可以違左右乎倓進説曰叛人亂常四海崩分不因人情圖興復雖欲從上入蜀而散闗以東非國家有夫大孝莫若安社稷殿下當募豪傑趨河西收牧馬今防邊屯士不下十萬而光弼子儀全軍在河朔與謀興復䇿之上者廣平王亦贊之於是議定太子北過渭兵仗濫惡士氣崩沮日數十戰倓以驍騎數百從每接戰常身先血殷袂不告也太子或過時未食倓涕泗不自勝三軍皆屬目唐書承天皇帝倓傳天寶末𤣥宗幸蜀輔國侍太子扈從至馬嵬乃獻計分兵北如朔方以圖興復册府元龜肅宗為皇太子𤣥宗幸蜀留上在後宣諭百姓賊追至渭北便橋已斷水瀑漲無舟楫上號令水濵百姓歸者三千餘人渭水可涉又遇潼闗散卒誤以為賊與之戰士衆多傷乃收其餘衆北上軍既濟其後皆溺上喜以為天之佑時從上惟廣平建寜二王及四軍將士纔二千人自奉天而北夕次永夀百姓遮道獻牛酒有白雲起西北長數丈如樓閣之狀議者以為天子之氣自是紫雲擁帝所乘馬聚散不時鴻書安禄山陷長安禄山遣孫孝哲安神威西攻長安會哥舒翰守潼闗為乾佑所敗賊不謂天子能遽去駐兵潼闗十日乃西時行在已至扶風於是汧隴以東皆没於賊禄山未至長安士人皆逃入山谷東西駱驛二百里宫嬪散匿行哭將相第家委寶貨不貲羣不逞争取之累日不能盡又剽左藏大盈庫百司帑藏竭乃火其餘禄山至怒乃大索三日民間財貲盡掠之府縣因株根牽連勾剥苛急百姓愈騷禄山怨慶宗死乃取帝近屬自霍國長公主諸王妃妾子孫姻壻等百餘人害之以祭慶宗羣臣從天子者誅㓕其宗虜性得所欲則肆為殘虐人益不附諸大將欲有咨決皆因嚴莊以見御下少恩雖腹心雅故皆為仇敵郡縣相與殺守將迎王師前後反覆十數城邑墟矣長安相傳太子西來矣人聞輙東走闤里至空都畿豪傑殺賊吏自歸者無虛日賊斬刈懲之不能止又賊將𩔖慓勇無逺謀日縱酒嗜聲色財利車駕佹得入蜀終無追躡之患唐書安禄山傳帝次扶風己亥次扶風軍士各懐去就咸出醜言陳𤣥禮不能制上患之會益州貢春綵十萬匹上命悉置於庭召諸將諭之曰卿等國家功臣陳力久矣朕之優􅅄常亦不輕叛人背恩事須廻避甚知卿等不得别父母妻子言發涕流曰朕須幸蜀路險人多恐難供承今有此綵宜分取各圖去就朕自有子弟中官相隨便與卿等訣别衆咸俯伏涕泣曰死生願從陛下上曰去住任卿自此背亂之言稍息舊唐書𤣥宗紀帝次散闗辛丑發扶風郡是夕次陳倉壬寅至散闗分部下為六軍穎王璬先行夀王瑁等分統六軍前後左右相次舊唐書𤣥宗紀西按散闗今在寶雞縣南帝至河池以隴公瑀為梁州都督丙午至河池郡唐書𤣥宗紀陳倉令薛景仙復扶風戊申扶風人康景龍等殺賊宣慰使薛總等二百餘人陳倉令薛景仙率衆收扶風郡守之由是闗輔豪右皆謀殺賊賊故不敢侵軼舊唐書肅宗紀九月詔以房琯為招討西京兵馬元帥房琯至德初抗䟽自請將兵以誅冦孽收復京師肅宗望其成功許之詔加持節招討西京兼防禦蒲潼两闗兵馬元帥王思禮副之南軍入於宜夀中軍入於武功北軍入於奉天册府元龜賊入汧隴隴右採訪使郭英乂破之賊將髙嵩擁兵入汧隴英乂偽勞之且具饗既而伏兵發盡掠其衆唐書郭英乂傳冬十月房琯及賊戰於陳濤斜敗績十月庚子次便橋辛丑中軍北軍遇賊陳濤斜戰不利琯欲持重有所伺中人邢延恩促戰故敗癸卯率南軍復戰遂大敗初琯用春秋時戰法以車二千乘繚營騎歩夾之既戰賊乘風譟牛悉髀栗賊投芻而火之人畜焚燒殺卒四萬血丹原野殘衆才數千不能軍琯還走行在見帝肉袒請罪帝宥之唐書房琯傳按括地志陳濤斜在咸陽縣東十二月郭子儀率回紇擊同羅於榆林河北破之十二月戊午回紇至帶汗谷與郭子儀軍合辛酉與同羅及叛人戰於榆林河北大破之斬首三萬捕掠一萬河曲皆平子儀還軍洛交通鑑州按注洛交郡本鄜上郡天寶元年更郡名肅宗至德二載春二月帝至鳯翔二月戊子上至鳯翔旬日隴右河西諸鎮皆會江淮庸調亦至洋川漢中長安人聞車駕至從賊中自㧞而來者日夜不絶通鑑闗西兵馬使郭英乂及賊戰於武功敗績闗内節度使王思禮軍武功兵馬使郭英乂軍東原王難得軍西原賊將安守忠等冦武功郭英乂戰不利矢貫其頤而走王難得望之不救亦走思禮退軍扶風賊遊兵至大和闗去鳯翔五十里鳯翔大駭戒嚴通鑑朔方節度使郭子儀擊賊於潼闗破之二月朔方節度使郭子儀大破賊將崔乾祐於潼闗舊唐書肅宗紀正月二十八日使宗子懐文潛募郭俊茍文俊入河東搆忠義與大軍期約以翻城公乃進軍出洛交分兵收馮翊二月十一日郭俊等俟大軍將至舉火尅斬幽檀勁卒千人崔乾運尋縋而免乾祐先置兵於城北廢府遂以三千兵攻城自領馬歩五千伏於闗城中公使旰及僕固懐恩等先擊之賊大破遽焚橋我軍蹈之而㓕乾祐棄闗城尋白涇嶺而逸汾陽家傳賊陷同州刺史蕭蕡死之子儀襲下潼闗及同州盛兵潼闗以守之賊將李歸仁來救子儀大戰死者萬餘人退守河東歸仁遂攻陷同州州守蕭蕡死之盡屠城中唐厯夏四月兵馬副元帥郭子儀及賊戰於清渠敗績郭子儀詔還鳯翔進司空充闗内河東兵馬副元帥率師趨長安次潏水上守忠等軍清渠左大戰王師不利委杖奔子儀收潰卒保武功唐書郭子儀傳子儀赴鳯翔李歸仁以勁卒五千邀之於三原北子儀使懐恩及王昇陳廻光等伏兵於白渠留運橋以待之伏發歸仁大敗而走又從子儀戰於清渠不利舊唐書僕固懐恩傳六月將軍王去榮擅殺富平令曲宥之將軍王去榮以私怨殺本縣令當死上以其善用礮勅免死以白衣於陜郡効力通鑑王去榮殺富平令杜徽肅宗惜去榮才詔貸死至諫曰聖人誅亂必先示法令崇禮義將軍去榮以朔方偏禆提數千士不能整行列挾私怨殺縣令有犯上之逆或曰去榮善守陜新下非去榮不可守臣謂不然李光弼守太原程千里守上黨許叔冀守靈昌魯炅守南陽賈賁守雍丘張廵守睢陽初無去榮未聞賊能下也以一能而免死彼弧矢絶倫劍術無前者恃能犯上何以止之若捨去榮誅將來是法不一而招罪人也律令者太宗之律令陛下不可以一士小材廢祖宗大法帝詔羣臣議太子太師韋見素文部郎中崔器等皆以為法者天地大典王者不敢專也帝王不擅殺而小人得擅殺者是權過人主開元以前無敢專殺尊朝廷也今有之是弱國家也太宗定天下陛下復鴻業則去榮非至德罪人乃貞觀罪人也其罪祖宗所不赦陛下可易之耶唐書賈至傳秋閏八月賊冦好畤李光進敗之閏八月甲寅安慶緒冦好畤渭北節度使李光進敗之唐書肅宗紀賊冦鳯翔遣兵敗之司馬王伯倫戰没閏八月辛未賊將冦鳯翔崔光逺行軍司馬王伯倫判官李椿率衆捍賊至中渭橋殺賊守橋衆千人追擊入苑中時賊大軍屯武功聞之燒營而去伯倫與賊血戰而死李椿力窮被執然自是賊不敢西侵舊唐書肅宗紀九月元帥廣平王俶率諸軍克復西京至德二載九月以廣平郡王為天下兵馬元帥率朔方安西囘紇南蠻大食等兵二十萬以進討百官送於朝堂過闕而下步出木馬門然後復騎以安西北庭行營節度使李嗣業為前軍朔方河西隴右行營節度使郭子儀為中軍闗内行營節度使王思禮為後軍屯於香積寺敗賊將安守忠斬首六萬級賊將張通儒守長安聞守忠敗棄城走遂克京城乃留思禮屯於苑中代宗率大軍以東唐書代宗紀廣平王收長安嗣業統前軍陣於香積寺賊首李歸仁擁精騎薄戰王師注矢逐之走未及營賊大出掩追騎還蹂王師於是亂不能陣嗣業謂子儀曰今日不蹈萬死取一生則軍無𩔖矣即袒持長刀大呼出陣前殺數十人陣復整步卒二千以陌刀長柯斧堵進所向無前歸仁匿兵覘左營軍勢王分回紇鋭兵擊其伏嗣業出賊背合攻之自日中至昃斬首六萬餘級填澗壑死幾半賊東走遂平長安李嗣業傳郭子儀從元帥廣平王率蕃漢兵十五萬收長安李嗣業為前軍元帥為中軍子儀副之王思禮為後軍陣香積寺之北距灃水臨大川彌亘一舍賊李歸仁領勁騎薄戰官軍囂嗣業以長刀突出斬賊數十騎乃定回紇以騎兵繚賊背夾攻之斬首六萬級生擒二萬賊帥張通儒夜亡陜郡翌日王入京師老幼夾道呼曰不圖今日復見官軍王休士三日遂東郭子儀傳回紇請助討禄山以太子葉䕶身將四千騎來帝命廣平王見葉䕶約為昆弟葉䕶大喜使首領達千等先到扶風見子儀犒飲三日葉䕶辭曰國多難我助討逆何敢食固命乃留既行日賜牛四十角羊八百蹄米四十斛香積之戰陣灃上賊詭伏騎於王師左襲我僕固懐恩回紇馳之盡剪其伏乃出賊背與鎮西北庭節度李嗣業夾㢁之賊大敗進收長安回紇傳兵馬副元帥郭子儀克華隂子儀引蕃漢兵追賊至潼闗斬首五千級克華隂郡獻俘百餘人勅皆斬之監察御史李勉諫曰今元惡未除為賊所汙者半天下聞陛下龍興咸思洗心以承聖化今悉誅之是驅之使從賊也上遽使赦之通鑑冬十月車駕入長安九月癸卯收西京甲辰㨗書至行在百僚稱賀即日告㨗於蜀上皇遣裴冕入京啓告郊廟社稷十月癸亥上自鳯翔還京遣太子太師韋見素入蜀迎上皇丙寅至望賢宫丁卯入長安士庶涕泣拜忭曰不圖復見吾君上亦為之感惻九廟為賊所焚上素服哭於廟三日入居大明宫是日上皇發蜀文武脅從官免冠徒跣朝堂待罪禁之府獄令中丞崔器劾之舊唐書肅宗紀十二月迎上皇至長安上皇至自蜀上至望賢宫奉迎上皇御宫南樓上望樓辟易下馬趨進蹈舞稱慶上皇下樓上匍匐捧上皇足涕泗嗚咽不能自勝遂扶侍上皇御殿親自進食自御馬以進上皇上馬又躬攬轡而行止之而後退上皇曰吾享國長久吾不知貴見吾子為天子吾知貴矣上乘馬前導自開元門至丹鳯門旗幟燭天綵栩夾道士庶舞忭路側曰不圖今日再見二聖百僚班於含元殿上皇御殿左相百辟稱賀畢上皇詣長樂殿詣九廟主即日幸興慶宫上請歸東宫上皇遣髙力士再三諭譬而止舊唐書肅宗紀上元元年春正月党項羌冦邊遣兵分討之党項等羌吞噬邊鄙將逼京畿乃分邠寜為鄜坊節度以邠州刺史桑如珪鄜州刺史杜冕領之分道招討而以郭子儀領两道節度留京師假其威名以鎮之綱目夏六月鳯翔節度使崔光逺破党項於普潤上元元年六月鳯翔節度崔光逺奏破涇州隴州等界羌渾党項等十餘萬衆又於普潤縣界破党項四千餘衆斬二千級生擒一百餘人收獲駝馬牛羊器械等不可勝數册府元龜秋九月命郭子儀出鎮邠州黨項遁走或上言天下未平不冝置郭子儀於散地命出鎮邠州党項遁去汾陽家傳十二月党項掠美原同官十二月丙子党項冦美原同官大掠而去通鑑二年春二月羌冦鳯州刺史蕭􅞥死之二月己未奴刺党項羌冦寶鷄焚大散闗冦鳯州刺史蕭􅞥死之鳯翔尹李鼎敗之唐書肅宗紀寶應元年建卯月羌冦梁州四月代宗即位寶應元年建卯月羌渾奴剌冦梁州壬申鄜州刺史成公意及党項戰敗之唐書肅宗紀建辰月奴剌冦梁州建辰月甲午奴剌冦梁州唐書肅宗紀秋九月羌冦鳯州刺史擊破之九月戊子鳯州刺史吕日將及党項羌戰於三絶谷敗之唐書代宗紀代宗廣德元年春三月羌冦同州郭子儀敗之三月甲子党項羌冦同州郭子儀敗之於黄堆山唐書代宗紀秋七月吐蕃入大震散闗廣德元年七月吐蕃大冦河隴入大震闗舊唐書代宗紀冬十月吐蕃入冦逼京師詔郭子儀禦之車駕東幸十月辛未吐蕃犯京畿冦奉天武功盩厔等縣自司竹園渡渭循南山而東舊唐書肅宗紀吐蕃陷涇州獲刺史髙暉暉遂與蕃為鄉導引賊深入京畿掠奉天武功濟渭而南縁山而東渭北行營兵馬使吕日將逆戰於盩厔自辰至酉殺蕃軍數千然其徒多隕賊將逼京師君上計無所出詔子儀為闗内副元帥出鎮咸陽子儀自相州不利李光弼代掌兵柄及徴還朝廷部曲散去及是承詔部下惟二十騎强取民間蓄産以助軍至咸陽蕃軍已過渭水其日天子避狄幸陜州子儀聞上避狄雪涕還京至則車駕已發射生將王獻忠從駕㳂路遂以四百騎叛仍逼豐王以下十王欲投於賊子儀入開逺門遇之詰豐王等所向遂援送行在郭子儀傳吐蕃入長安副元帥郭子儀擊走之長安平子儀退趨商州髙暉導蕃入長安立廣武王承宏為帝改元擅作赦令署官吏衣冠皆南奔荆襄或逋棲山谷亂兵因相攘鈔道路梗閉光禄卿殷仲卿率千人壁藍田選二百騎度滻或紿蕃曰郭令公軍且來吐蕃大震會少將王甫與惡少年伐鼓譟苑中蕃驚夜引去子儀入長安髙暉東奔至潼闗守將李日越殺之吐蕃留京師十五日乃走唐書吐蕃傳子儀遣六軍兵馬使張知節烏崇福羽林軍使長孫全緒等將兵萬人為前鋒營於韓公堆盛張旗幟鼓鞞震山谷全緒遣禁軍舊將王甫入長安隂結少年豪俠以為内應一日齊擊鼓於朱雀街蕃軍惶駭而去大將李忠義先屯兵苑中渭北節度使王仲升守朝堂子儀以大軍續進至滻西射生將王撫自署為京兆尹聚兵二千人擾亂京城子儀殺之詔子儀權京城留守舊唐書郭子儀傳鄜延節度判官段秀實説節度使白孝德引兵赴難孝德即日大舉南趣京畿與蒲陜商華合勢進擊通鑑吐蕃寇鳯翔鎮西節度使馬璘敗之吐蕃寇邊詔璘移軍援河西懐恩之叛璘引還間闗轉鬭至鳯翔陣圍已合節度孫志直嬰城守璘令士持滿外向突入縣門不解甲出戰背城陣寇潰率輕騎追之斬數千級漂血丹渠唐書馬璘傳冬十二月車駕入京師十二月甲午至自陜州唐書代宗紀子儀為京城留守程元振説帝都洛陽帝可其計子儀奏曰雍州古稱天府右隴蜀左崤崡襟憑終南太華之險背負清渭濁河之固地方數千里帶甲十餘萬兵强士勇真用武之國秦漢所以成帝業也後或處而泰去而亡者不一姓故髙祖先入闗定天下先帝興朔方誅慶緒陛下席西土戮朝義雖天道助順亦地勢則然比吐蕃憑陵而不能抗者臣能言其畧夫六軍皆市井人竄虛名逃實賦一旦驅以就戰有百奔無一前又宦豎掩迷庶政荒奪遂令陛下徬徨暴露越在陜服斯委任失人豈秦地非良哉今咸謂且都洛陽洛陽自大盜以來焚埃畧盡百曹榛荒寰服不滿千戸井邑如墟豺狼羣嘷千里蕭條亭舍不烟何以奉萬乗牲餼供百官次舍哉且地狹阨裁數百里險不足防適為鬭場陛下意者或以京畿新罹剽蹂國用不足乎臣願陛下斥素餐去冗食抑閹寺任直臣薄征弛役䘏隐撫鰥委宰相以簡賢任能付臣以訓兵禦侮則中興之功日月可冀惟時邁亟還見宗廟謁園陵再造王家以幸天下帝得奏泣謂左右曰子儀固社稷臣也朕西決矣乘輿還子儀頓首請罪帝勞曰用卿晚故至此乃賜鐡劵圖形凌煙閣唐書郭子儀傳築城於鄠築城於鄠縣及中渭橋屯兵以備吐蕃以駱奉先為鄠縣築城使遂將其兵通鑑放廣武王承𢎞於華州代宗廣徳元年十月吐蕃盜入長安邠王守禮之孫廣武王承𢎞竊尊號及京城平鑾輿自陜州還京師十二月丙申放廣武王承𢎞於華州一切不問册府元龜𢎞按唐書宗室傳世系表俱云承係邠王守禮子此云孫者疑誤二年春三月羌冦同州郭子儀遣將擊破之党項羌冦同州郭子儀使開府儀同三司李國臣擊之曰彼得間則出掠官軍至則逃入山宜使羸師居前以誘之勁騎居後以覆之國臣與戰於澄城北大破之斬首捕獲千餘人通鑑秋八月僕固懐恩引回紇吐蕃入冦詔郭子儀出鎮奉天懐恩誘吐蕃囘紇党項數十萬入冦朝廷大恐詔郭子儀屯奉天帝問計所出對曰無能為也懐恩本臣偏將雖慓果然素失士心今能為亂者誅思歸之士刦與俱來且皆臣故部曲素以恩信結之彼忍以刃相向乎帝曰善唐書郭子儀傳吐蕃冦邠州節度使白孝德敗之懐恩誘吐蕃進掠涇邠祭來填墓渡涇水邠寜節度使白孝德禦之覆其陣懐恩泣曰曩者皆為我子反為人致死於我唐書僕固懐恩傳冬十月吐蕃冦奉天郭子儀禦之遁去十月丙寅吐蕃冦邠州丁卯冦奉天京師戒嚴唐書代宗紀蕃冦邠州先驅至奉天諸將請擊之子儀曰客深入利速戰彼下素徳我吾緩之當自攜貳因下令敢言戰者斬堅壁待之賊果遁去唐書郭子儀傳朔方兵馬使郭晞擊吐蕃於邠西敗之十月辛未夜郭晞遣馬步三千人於邠州西斬賊營殺千餘人生擒八十三人俘大將四人十一月乙未懐恩及吐蕃等自潰實録賊至邠州營於北原攻其東門不尅横陣於南原請戰晞等與之連戰大破之追奔數十里涉涇而還汾陽家傳時郭子儀為副元帥在蒲子晞以檢校尚書領行營節度使屯邠州士放縱不法孝德不敢劾秀實以狀白孝德請為都虞侯俄而晞士十七人入市取酒刺酒翁壊釀器秀實列卒取之斷首置槊上植市門外一營大譟盡甲孝徳恐召秀實曰奈何秀實曰請辭於軍乃解佩刀選老躄一人持馬至晞門下甲者出秀實笑且入曰殺一老卒何甲也吾戴吾頭來甲者愕眙因曉之曰尚書固負若屬耶副元帥固負若屬耶奈何欲以亂敗郭氏晞出秀實曰副元帥功塞天地當務始終今尚書恣卒為暴使亂天子邊罪且及副元帥郭氏功名其與存者有幾晞再拜曰公幸敎晞願奉軍以從即叱左右皆解甲令曰敢讙者死秀實宿軍中且與俱至孝徳所謝唐書段秀實傳十一月節度使李抱玉討南山五谷賊平之廣徳中吐蕃入冦帝次陜羣盜徧南山五谷間東拒虢西抵岐椎剽不勝計詔太子賔客謝景仙為南山五溪谷防禦使引兵招捕久不克更詔抱玉討賊抱玉盡得賊株柢遂分兵守諸谷使牙將李崇客精騎四百襲之賊帥髙玉脱身走城固山南西道張獻誠擒以獻悉索支黨斬之不閱旬五谷平唐書李抱玉傳永㤗元年春二月羌冦富平二月戊寅党項羌冦富平焚定陵寢殿舊唐書代宗紀三月遣兵戍奉天吐蕃遣使請和詔元載杜鴻漸與盟於興唐寺㑹要云興唐寺在大寜坊太平公主為天后立上問郭子儀吐蕃請盟何如對曰吐蕃乘我不虞而來國不可守矣乃相繼遣河中兵戌奉天通鑑秋九月囘紇吐蕃同時入冦召郭子儀屯涇陽九月甲辰吐蕃冦醴泉奉天党項羌冦同州渾奴剌冦盩厔京師戒嚴己酉屯於苑郭子儀屯於涇陽丁巳同華節度使周智光及吐蕃戰於澄城敗之唐書代宗紀懐恩説吐蕃回紇黨項羌渾剌奴等三十萬掠涇邠蹂鳯翔入醴泉奉天京師大震於是帝命李忠臣屯東渭橋李光進屯雲陽馬璘郝廷玉屯便橋李抱玉屯鳯翔周智光屯同州杜冕屯坊州天子自將屯苑中急召子儀屯涇陽郭子儀傳冬十月囘紇及郭子儀盟於涇陽而還吐蕃遁去十月己未吐蕃至邠州與囘紇冦邊辛酉冦奉天癸亥冦同州乙丑冦興平丁卯囘紇党項羌請降唐書代宗紀子儀屯涇陽軍纔萬人而冦圍已合乃使李國臣髙昇魏楚玉陳廻光朱元琮各當一面身自率鎧騎二千出入陣中回紇怪問是為誰報曰郭令公驚曰郭令公存乎懐恩言天可汗棄天下令公即世中國無主故我從以來公今存天可汗存乎曰天子萬夀囘紇悟曰彼欺我乎子儀使諭之曰昔回紇涉萬里戡大憝助復二京我與若等休戚同之今乃棄舊好助叛臣一何愚彼背主棄親於囘紇何有回紇曰本謂公云亡不然何以至此今誠存我得見乎子儀將出左右諫戎狄野心不可信子儀曰虜衆數十倍今力不敵吾將示以至誠左右請以五百騎從又不聽即傳呼曰令公來虜皆持滿待子儀以數十騎出免胄見其大酋曰諸君同艱難久矣何忽亡忠義而至是邪囘紇捨兵下馬拜曰果吾父也子儀即召與飲遺錦綵結歡誓好如初因曰吐蕃本吾舅甥國無負而來棄親也馬牛被數百里公等若倒戈乘之若俛取一芥是謂天賜不可失且逐戎得利與我繼好不兩善乎㑹懐恩暴死無所統一遂許諾吐蕃疑之夜引去唐書郭子儀傳囘紇首領羅達干等率其衆二千餘騎詣涇陽請降子儀許之合胡禄都督等與宰相磨咄莫賀達干宰相噋莫賀達于宰相䕶都毗伽將軍宰相揭拉裴羅達干宰相梅録大將軍羅達干平章事海寜達干等子儀先執杯合胡禄都督請咒子儀咒曰大唐天子萬萬嵗囘紇可汗亦萬萬嵗若起負心背盟約者身死陣前家口屠戮合胡禄都督等失色及杯至即譯曰如令公盟約皆喜曰初發本部將巫師两人來云此行見一大人即歸巫師信有徵矣舊唐書囘紇傳郝廷玉累封安邊郡王授神䇿將軍時吐蕃犯京畿與馬璘屯中渭橋魚朝恩聞其善布陣請觀之廷玉申號令鳴鼓角部伍坐作進退若一朝恩歎曰吾處兵間久今始識訓練法廷玉惻然曰此臨淮王遺法也郝廷玉傳大厯元年冬十二月同華節度使周智光反智光遷同華二州節度使聚不逞數萬恣剽掠以甘其欲結固之殺陜州監軍張志斌及前虢州刺史龎充時崔圓自淮南納方物百萬盗頡其半天下貢奉輸漕刦留之士沿調當西間道走同者遣部將邀捕斬之代宗未暴其罪命中使余元仙持詔拜尚書左僕射既授詔恚語曰吾有大功上不與平章事且同華地狹不足伸足若加陜虢商鄜坊五州差可元仙震汗徐遺百縑遣之唐書周智光傳二年春正月郭子儀討周智光斬之二年上詔郭子儀密圖之同華路閉詔書不能通乃詔子儀婿趙縱受口詔書帛内密丸遣家僮走間道傳詔子儀得詔聲言討之未行其衆大攜部將李漢惠自同州降子儀乃貶智光灃州刺史聽百人隨身貸將吏一切不問尋為帳下斬其首并斬子元耀元幹來獻詔梟首皇城南街判官邵賁别將蔣羅漢並伏誅唐書周智光傳華州牙將姚懐李延俊殺智光通鑑淮西節度使李忠臣掠華州淮西李忠臣入朝次潼闗聞智光反率兵討之會敗忠臣因入華大掠自赤水至潼闗畜産財物皆盡官吏至有衣紙自蔽累日不食者唐書周智光傳二月帝如昆明池大厯二年二月壬午幸昆明池從俗踏青也册府元龜秋七月作章敬寺魚朝恩奏以先所賜莊為章敬寺以資章敬太后冥福窮壯極麗毁曲江及華清宫館以給之費逾萬億衛州進士髙郢上書曰先太后聖德不必以一寺增輝國家永圖無寜以百姓為本捨人就寺何福之為又曰古之明王積善以致福不費財以求福修徳以消禍不勞人以禳禍今狥左右之過計傷皇上之大猷臣竊為陛下惜之不報通鑑秋九月吐蕃入冦詔郭子儀鎮涇陽吐蕃冦邠州詔子儀率師三萬自河中鎮涇陽京師戒嚴戊午移鎮奉天舊唐書代宗紀三年春正月帝如章敬寺上幸章敬寺度僧尼千人通鑑二月商州兵馬使劉洽作亂二月癸巳商州兵馬使劉洽殺其刺史殷仲卿唐書代宗紀秋八月吐蕃冦邠節度使馬璘敗之八月丁卯吐蕃冦邠州京師戒嚴節度使馬璘破吐蕃二萬於邠州舊唐書代宗紀冬十二月邠州兵馬使王童之謀作亂知留後段秀實捕斬之元載以吐蕃連嵗入冦議徙馬璘鎮涇州而使郭子儀以朔方兵鎮邠州璘先徃城涇州以都虞候段秀實知邠州留後初四鎮北庭兵久覊旅數遷徙頗積勞弊及徙涇州衆皆怨誹刀斧兵馬使王童之謀作亂期以辛酉旦警嚴而發有告之者秀實陽召掌漏者怒之以其失節令毎更來白輙延之數刻遂四更而曙童之不果發秀實欲討之而亂迹未露又云今夕欲焚馬坊草因救火謀作亂中夕火起秀實命軍中行者皆止坐者勿起各整部伍嚴守要害童之白請救火不許及旦捕童之及其黨八人皆斬之下令曰後徙者族流言者刑遂徙於涇通鑑五年二月鳯翔軍亂二月戊戍李抱玉移鎮盩厔軍士忿怒大掠鳯翔坊市數日乃定通鑑七年春正月回紇使者犯朱雀門回紇使出鴻臚寺刦掠坊市吏不能禁止復以三百騎犯金光朱雀等門是日皇城諸門皆閉遣諭之乃止舊唐書代宗紀八年冬十月兵馬使渾瑊及吐蕃戰於宜禄敗績十月西戎冦邠涇原節度使馬公襲之郭公使其將渾瑊率步騎五千為之掎角十八日師登黄萯原望見吐蕃瑊急引其衆前據乘險仍設拒馬槍以遏馳突之勢史抗温儒雅等宿將五六人任氣自負輕侮督將置酒高飲使人召之至則皆醉矣見拒馬槍曰野地見賊須擊設此何為命去之戎衆既陳抗等叱馬軍使馳賊及囘自衝其軍吐蕃躡背而入我師大敗卒之不死者什二三邠志九年春二月遣兵戍朔方二月郭子儀入朝言朔方國之北門戰士耗散存者什纔有一今吐蕃兼河隴之地雜羌渾之衆勢彊十倍願更於諸道各發精卒戍兵四五萬人則可以制勝矣通鑑十年秋九月吐蕃冦隴州李抱玉敗之九月癸丑吐蕃冦隴州鳯翔節度使李抱玉擊退之舊唐書代宗紀冬十二月囘紇冦夏州梁榮宗敗之囘紇千騎冦夏州州將梁榮宗破之於烏水烏水在夏州朔方縣郭子儀遣兵三千救夏州囘紇遁去通鑑十一年春二月詔加邊城防戍二月增朔方五城戍兵以備囘紇通鑑十二年夏五月金州卓英璘叛刺史孫道平擒殺之載委主書卓英倩闗通貨賄大厯十二年詔收載賜死英倩弟英璘家金州州人縁以授官者亦百餘聚無頼少年以伺變載誅璘盜庫兵據險以叛詔發禁兵及山南西道兵二千討捕刺史孫道平擒殺之詔給其州三年唐書元載傳秋九月吐蕃冦坊州九月庚午吐蕃冦坊州掠党項羊馬而去舊唐書代宗紀吐蕃冦坊州又冦鹽夏州又冦長城郭子儀遣兵拒却之通鑑十三年秋八月吐蕃冦銀麟州郭子儀遣兵敗之吐蕃二萬冦銀麟州畧党項雜畜郭子儀遣李懐光擊破之通鑑冬十二月邠州兵馬使李懐光謀作亂知留務杜黄裳矯定之杜黄裳郭子儀辟佐朔方府子儀入朝使主留事李懐光與監軍隂謀矯詔誅大將等以動衆心欲代子儀黄裳得詔判其非以質懐光懐光伏罪於是諸將狠驕難制者黄裳皆以子儀令易置衆不敢亂唐書杜黄裳傳陜西通志巻七十九
