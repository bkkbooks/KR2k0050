三百七歩髙一丈九尺東西南門三係極衝中地邊垣長三十里墩臺一十座今有分防把總改名鎮羅堡延安府志鎮靖堡在靖邊東八十里南至安塞縣三百里北至大邊二里東至龍州城四十里宋夏州地後為白灘兒延綏鎮志明初守塞門成化二年邊備尚書王復請移於榆林莊易名鎮靖既又移於白塔澗口就快灘河迤南之險其河深二三十丈長百餘里五年廵撫王鋭進守筆架城八年余子俊請復移還白灘兒即白塔澗口圖書編成化八年寇入延綏鎮靖堡殺千户黃琮兵部請追勦之嘉靖四十四年寇犯鎮靖堡叅將魯聰戰死明世法録城在山畔周四里三分南北門二樓舖十九座係極衝中地北臨快灘嘉靖四十五年為水所渰隆慶六年加髙萬厯六年重修髙三丈五尺甎砌牌墻垜口邊垣長四十里墩臺四十三座有分防守備延安府志龍州堡在靖邊東一百二十里南至安塞縣三百餘里北至大邊五里東至清平堡三十五里漢為龍州宋夏州石堡砦為范仲淹哨馬營延綏鎮志明成化五年廵撫王銳建尚書王復請添軍官於龍城髙家𦂳闗衝要駐劄䇿應嘉靖中總制曾銑言自龍州城起至定邊營計四百四十里邊墻宜修明世法録城在平地周二里二百十六歩東西門二樓鋪九座係極衝中地隆慶六年加髙萬厯六年重修髙三丈三尺甎砌牌墻垜口邊垣長三十四里墩臺二十五座四面深溝東接清平河口西接麻黄梁俱通險要路有分防把總堡境有鴉兒巷腦四面天險足資保障延安府志把都河堡在靖邊西南七十里南至保安縣一百二十里北至大邊二十里西至永濟堡三十里在把都河口宋夏州地延綏鎮志明初守栁樹澗成化十一年巡撫余子俊修城堡十二座創置把都河堡明世法録城周三里一百八十歩髙三丈五尺樓鋪十一座隆慶六年加髙萬厯六年甎砌牌墻垜口今裁併寜塞延安府志寧塞堡在靖邊西四十里南至保安縣一百八十里北至大邊三里宋夏州地舊屬栲栳城延綏鎮志明成化十一年廵撫余子俊修城堡十二座創置寧塞堡正徳元年總制楊一清言自寧塞至定邊營一百六十三里平衍宜墻者百三十一里險崖宜剷者三十二里可就為墩臺成化八年侍郎葉盛言宼入道路一則自寧塞入安定進入金湯川直抵鄜州嘉靖十五年總制楊天和奏靖邊寧塞之間寇所由入尚書唐龍議自安南八墩至寧朔墩十七里創築新墻以杜干溝深入之路自寧朔墩至昌平墩九十里増修重墻以衛舊安邊孤懸之勢總兵梁震奏於干溝要路大加剷削干溝之中挑挖濠塹皆要䇿也明世法録嘉靖二十五年宼十萬騎自寧塞入犯延安慶陽保安諸處總制曾銑遣叅將李珍夜出塞刼其營帳寇自是渡河去三十二年都御史王以旂敗賊於寧塞堡名山蔵城在山原周四里三分門四樓鋪十八座係極衝中地隆慶六年增修髙三丈三尺甎砌牌墻垜口邊垣長五十四里墩臺五十四座西面枕山東南北俱平川逼近紅栁河嵗多水患有分防守備延安府志廵檢司鎮在縣南九十里縣圖附縣境古闗隘范老闗在縣西南一里宋范文正公曾屯兵於此今廢縣冊把都闗在寧塞堡南把都河水所經龍城闗在龍州堡東延綏鎮志附縣境古橋永濟橋在靖邊南荍麥河上今廢延綏鎮志陜西通志巻十六
