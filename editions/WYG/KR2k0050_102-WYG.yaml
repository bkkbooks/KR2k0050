body:
  text: 後序勅修陜西通志告成釐為百巻裝成函帙臣史貽直謹會同吏部尚書署理陜西總督臣劉於義陜西巡撫臣碩色奉表上進恭呈御覽而臣荷䝉聖恩畀以總理陜撫重任莅職三載於通志一書與有監修之責今得遹觀厥成臣敬拜手稽首而颺言其後曰國家統壹四海湛恩龎鴻赫聲濯靈固東震日域而西讋月􅒸矣欽惟我皇上亶聰天縱文武聖神參兩執中體元纘緒皇恩普被首及三秦溯自御極以來其嘉惠乎西土者不可殫述蠲屯衛未完之銀米歴有嵗年豁西安所屬之錢糧動逾百萬寛徴展課矜恤三時耕耨之夫墾畆脩渠永垂萬世農桑之利而且王師西指頻嵗軍興皇上軫念民勞恩綸叠沛飛芻輓粟則脚價嵗以加増好義樂輸即束草償其價值賞給兊運之餘米捐免領借之帑金浩蕩皇恩天髙地厚臣不知秦民何脩而得此也伏念臣自雍正九年四月以左都御史䝉皇上特簡率同翰林以下諸臣共五十餘員恭捧聖諭至陜宣諭化導臣親睹秦省之民扶老携幼歡呼舞蹈奔走恐後及至跪聆訓㫖率皆感激天恩叩頭流涕迄今讀所頒上諭洵足以格天地而動鬼神矣臣遂於是年八月䝉恩命臣協同工部侍郎臣馬爾泰辦理陜西巡撫事務冬十一月復䝉恩擢臣兵部尚書十年冬十一月命臣署理陜西巡撫印務又於十一年冬十二月䝉聖恩調臣戸部尚書仍總理西安巡撫並一切軍需事務臣受恩深重忝寄封疆仰見皇上之愛養秦民者如此其周詳俯悉秦民之感戴皇上者又如此其忠摯臣敢不夙夜冰兢以期報稱臣每於辦理政務之餘取通志而參稽考覈焉竊見夫山川之雄秀疆域之縱横戸口之殷繁原田之膏沃學校為人材淵藪兵防則闗塞干城陂渠兼鄭白之饒鹽鐵擅公私之富民風質木而尚義習俗剛果而近仁家無黷禮之祀士無畔道之言官斯土者以法而以㢘舉於鄉者有恒而有物臣不禁掩巻踊躍額手稱慶怳然曰此固本朝列聖相承仁漸義摩垂百有餘年而後能若此其盛也又况加以皇上之深仁厚澤淪肌浹髓如天之覆如地之載如日月之照臨如雨露之敷施雖秦之慈母亦不能鞠育其子至於如此也宜乎通志所載若是之詳明而大備矣抑臣聞之土無常俗教有定式上之遷下均之埏埴臣以一介庸愚叠奉簡命而撫綏其地自愧智不能以理人材不足以宰物惟有日宣聖徳仰體皇仁進秦民而噢咻之訓誨之化其車鄰駟驖之偏而躋於豐鎬二南之盛至於察吏治以整飭官方酌時宜以興起富教皆臣所夙夜思維而冀以仰報主恩者也矧天威震疊西師屢奏捷書計大軍之凱旋匪朝伊夕則秦民休養生息正在此時臣益當奮自淬磨勉圗後效若夫是書之整比綱條啟發凡例與損益乎古今訂正其訛闕皆有司者之事而臣不敢以瀆告於君父者也故不具贅時雍正十三年二月初一日賜進士出身光禄大夫欽命經筵講官戸部尚書仍暫留西安總理巡撫並一切軍需事務加四級紀録八次臣史貽直謹序
