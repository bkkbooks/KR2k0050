body:
  text: 陜西通志卷四十六祥異一洪範建極休咎聿徴保章星土次舍攸凴生尅相沴五行互乘鳴岐周應聚井漢興昭應山立壺口河澄民風吏治如香上升禨祥示儆有勸有懲鑒於往昔以永凝承作祥異志第二十二殷祖甲二十八祀季厯生昌有聖瑞史記周本紀尚書帝命騐云季秋之月甲子赤爵銜丹書入於酆止於昌户本紀注帝乙三祀夏六月周地震八祀周文公元年有鳯集於岐山竹書十五祀周文公莅國八年歲六月文王寢疾五日而地動東西南北不出國郊羣臣皆恐請移之文王曰奈何對曰興事動衆以增國城其可乎文王曰不可夫天道見妖以罰有罪也今又專興事動衆以增國城是重吾罪也昌也請改行重善以移之無幾何而疾止韓詩外傳帝辛十有九祀周王宅程三年遭天之大荒汲冢周書周成王二年周公居東秋大熟未穫天大雷電以風禾盡偃大木斯抜邦人大恐王啓金縢之書乃得周公所自以為功代武王之説王執書以泣曰今天動威以彰周公之德惟朕小子其親迎王出郊天乃雨反風禾則盡起二公命邦人凡大木所偃盡起而築之歲則大熟尚書金縢三十四年雨金於咸陽竹書宣王三十年有兎舞於鎬京竹書幽王二年西周三川皆震伯陽甫曰周將亡矣夫天地之氣不失其序若過其序民亂之也陽伏而不能出隂迫而不能蒸於是有地震今三川實震是陽失其所而填隂也陽失而在隂原必塞原塞國必亡夫水土演而民用也土無所演民乏財用不亡何待昔伊洛竭而夏亡河竭而商亡今周德若二代之季矣其川原又塞塞必竭川竭山必崩夫國必依山川山崩川竭亡國之徵也若國亡不過十年數之紀也天之所棄不過其紀是歲三川竭岐山崩周語幽王時牛化為虎羊化為狼今洛南有避狼城云述異記平王二十四年秦文公十九年得陳寶史記秦本紀索隱曰太康地志云秦文公時陳倉人獵得獸若彘不知名牽以獻之逢二童子童子曰此名為媼常在地中食死人腦即欲殺之以柏挿其首媪亦語曰二童子名陳寶得雄者王得雌者霸陳倉人乃逐二童子化為雉雌上陳倉北坂為石本紀注惠王十三年魯莊公三十年九月庚午朔日有食之劉歆以為八月秦分二十二年魯僖公五年九月戊申朔日有蝕之劉歆以為七月秦分漢書五行志襄王六年秦饑晉閉之糴左傳定王二十一年成五年梁山崩遏河水三日不流召伯尊遇輦者不避使車右鞭之輦者曰所以鞭我者其取道逺矣伯尊因問之輦者曰君親縞素率羣臣哭之斯流矣如其言而河流榖梁傳靈王十九年魯襄公二十年十月丙辰朔日有食之劉歆以為八月秦分二十年魯襄公二十一年九月庚戌朔日有食之劉歆以為七月秦分十月庚辰朔日有食之劉歆以為八月秦分漢書五行志景王十四年晉昭公元年河赤龍門三里史記晉世家烈王七年秦獻公十六年桃冬花秦本紀顯王二年河赤龍門三日竹書秦獻公十八年雨金櫟陽史記秦本紀八年秦孝公元年彗星見西方六國表二十八年秦孝公二十一年有馬生人劉向以為孝公始用商君攻守之法東侵諸侯其象將以兵革抗極成功而還自害也漢書五行志三十三年秦惠王二年有新生嬰兒曰秦且王史記秦紀贊慎靚王元年秦孝文王五年遊朐衍有獻五足牛者劉向以為近牛禍也先是文惠王初都咸陽廣大宫室南臨渭北臨涇思心失逆土氣足者止也戒秦建止奢泰將致危亡秦遂不改至於離宫三百復起阿房未成而亡又曰牛以力為人用足所以行也其後秦大用民力轉輸起負海至北邊天下叛之漢書五行志按漢書作孝文王五年考史記六國表孝文止一年而惠文王五年有北遊戎池事胊衍本戎池漢書孝文王疑有訛也赧王元年梁惠王二十一年河渭絶一日史記魏世家徐廣註七年秦武王三年渭水赤者三日十年秦昭襄王二年彗星見十二年昭襄王四年彗星見十九年昭襄王十一年彗星見秦本紀二十八年昭襄王二十年秦地有父馬生駒牡馬生牛而死秦本紀徐廣註四十二年昭襄王三十四年渭水赤三日劉向以為近火沴水也秦連相坐之法棄灰於道者黥罔密而刑虐加以武伐橫出殘賊隣國至於變亂五行氣色謬亂天戒若曰勿為刻急將致敗亡秦遂不改至始皇滅六國二世而亡昔三代居三河河洛出圖書秦居渭陽而渭水數赤瑞異應德之效也漢書五行志秦始皇初即位冬雷漢書五行志九年四月寒凍有死者史記秦始皇帝本紀二十六年童謡云阿房阿房亡始皇述異記三十六年秋使者從關東夜過華隂平舒道有人持璧遮使者曰為我遺滈池君因言曰今年祖龍死使者問其故因忽不見置其璧去使者奉璧具以聞始皇黙然良久曰山鬼固不過知一歲事也退言曰祖龍者人之先也使御史府視璧乃二十八年行渡江所沈璧也史記秦始皇帝本紀秦時狼入咸陽市洪範五行傳二世元年宫中雨金頃刻皆化為石述異記漢高祖為亭長送徒驪山被酒夜徑澤中令一人行前行前者還報曰前有大蛇當徑願還高祖醉曰壯士行何畏乃前抜劍斬蛇蛇分為兩道開行數里醉困卧後人來至蛇所有一老嫗夜哭人問嫗何哭嫗曰人殺吾子人曰嫗子何為見殺嫗曰吾子白帝子也化為蛇當道今者赤帝子斬之故哭史記高祖本紀漢高祖元年十月五星聚東井以厯推之從歲星也此高皇帝受命之符也漢書天文志高允曰漢元年冬十月五星聚於東井此乃厯術之淺今譏漢史而不覺此謬恐後人譏今猶今之譏古崔浩曰所謬云何允曰案星傳金水二星常附日而行冬十月日在尾箕昏没於申南而東井方出於寅北二星何因背日而行是史官欲神其事不復推之於理浩曰欲為變者何所不可君獨不疑三星之聚而怪二星之來允曰此不可以空言爭宜更審之時後歲餘浩謂允曰先所論者本不注心今更考究果如君語以前三月聚於井非十月也魏書高允傳二年關中大饑米斛萬錢人相食令民就食蜀漢漢書高帝本紀惠帝二年宫中雨黃金黑錫述異記三年秋七月都廐災四年三月甲子長樂宫鴻臺災漢書惠帝本紀十月乙亥未央宫凌室災丙子織室災劉向以為元年吕太后殺趙王如意殘戮其母戚夫人是歲十月壬寅太后立帝姊魯元公主女為皇后乙亥凌室災明日織室災凌室所以供養飲倉織室所以奉宗廟衣服天戒若曰皇后亡奉宗廟之德將絶祭祀其後皇后亡子後宫美人有男太后使皇后名之而殺其母惠帝崩嗣子立有怨言太后廢之更立吕氏子𢎞為少帝賴大臣共誅諸吕而立文帝惠后幽廢五行志七年雷震南山林木皆自火燃至根其地悉燋黃後其雨迅過人就其間得龍骨一具述異記吕后三年夏漢中大水水出流四千餘家八年三月祓霸上還過枳道見物如倉狗撠高后掖忽而不見卜之趙王如意為祟遂病掖傷而崩夏漢中水復出流六千餘家是時女主獨治諸吕相王漢書五行志文帝七年六月癸酉未央宫東闕罘罳災東闕所以朝諸侯之門也罘罳在其外諸侯之象也五行志後二年四月乙巳水火木三合於東井占曰外内有兵東井秦也是歲誅反者周殷於長安市天文志三年秋大雨晝夜不絶三十五日藍田山水出流九百餘家渰壊民室八千餘所殺三百餘人先是趙人新垣平以望氣得幸為上立渭陽五帝廟欲出周鼎以夏四月郊見上帝歲餘懼誅謀為逆發覺要斬夷三族是時比再遣公主配單于賂遺甚厚匈奴愈驕侵犯北邊殺畧多至萬餘人漢連發軍征討戍邊四年四月丙辰晦日有食之在東井十三度五行志景帝元年漢武帝未誕時景帝夢一赤彘從雲中直下入崇蘭閣帝覺而坐於閣上果見赤氣如煙霧來蔽户牖望上有丹霞蓊鬱而起乃改崇蘭閣為猗蘭殿後王夫人誕武帝於此殿有青雀羣飛於霸成門乃改為青雀門乃更修飾刻木為綺橑雀去因名青綺門述異記四年七月癸未火入東井行隂又以九月己未入輿鬼戊寅出占曰為誅罰又為火災後二年有栗氏事其後未央東闕災漢書天文志中元年填星當在觜觽參去居東井其三年五月甲午金木俱在東井戊戌金去木留守之二十日占曰傷成於戉木為諸侯誅將行於諸侯也四年四月丙申金木合於東井占曰為白衣之會其六年天子四衣白臨邸第天文志五年八月己酉未央宫東闕災先是栗太子廢為臨江王以罪徵詣廷尉自殺丞相條侯周亞夫以不合㫖稱疾免後二年下獄死五行志後元年五月壬午火金合於輿鬼之東北不至柳出輿鬼可五寸占曰為爍有喪丙戌地大動鈴鈴然民大疫死棺貴至秋止天文志武帝建元六年熒惑守輿鬼占曰為火變有喪是歲高園有火災竇太后崩天文志四月壬子高園便殿火上素服五日武帝本紀元光二年七月京師雨雹西京雜記元狩元年上郊雍獲一角獸若麃然有司曰陛下肅祇郊祀上帝報享錫一角獸葢麟云史記武帝本紀建章宫後閣重櫟中有物出焉其狀似麋以聞武帝往臨視之問左右羣臣習事通經術者莫能知詔東方朔視之朔曰臣知之願美酒梁飯大飱臣臣乃言詔曰可已飱又曰某所有公田魚池蒲葦數頃陛下以賜臣臣乃言詔曰可於是朔乃肯言曰所謂騶牙者也逺方當來歸義而騶牙先見其齒前後若一齊等無牙故謂之騶牙其後一歲所匈奴渾邪王果將衆十萬來降漢乃復賜東方生錢財甚多滑稽列傳元鼎元年汾隂得鼎以聞天子以禮祠迎鼎至甘泉從上行薦之至中山晏溫有黃雲葢焉有麃過上自射之因以祭云公卿大夫請尊寶鼎曰鼎至甘泉光潤龍變承休無疆合兹中山有黃白雲降葢若獸為符路弓乘矢集獲壇下報祠大饗唯受命而帝者心知其意而合德焉鼎宜見於祖禰藏於帝廷以合明應制曰可武帝本紀三年正月戊子陽陵園火漢書武帝本紀五年四月丁丑晦日有食之在東井二十三度五行志十一月辛己朔旦冬至立泰畤於甘泉天子親郊見朝日夕月詔曰望見泰一修天文壇辛卯夜若景光十有二明武帝本紀元封元年秋有星茀於東井史記武帝本紀韋昭曰秦分也衞太子兵亂本紀注二年有芝生殿房内中天子乃下詔曰甘泉房生芝九莖赦天下毋有復作武帝本紀大寒雪深五尺野鳥獸皆死牛馬踡蹜如蝟三輔人民凍死者十有二三西京雜記太初元年秋蝗從東方飛至敦煌漢書武帝本紀十一月乙酉柏梁臺災先是大風發其屋夏侯始昌先言其災日後有江充巫蠱衞太子事五行志征和四年二月丁酉隕石於雍二聲聞四百里漢書武帝本紀帝嘗見彗星東方朔折指星木以授帝帝以木止彗星星尋則殁也星出之夜野獸盡鳴别説謂之獸鳴星洞㝠記武帝時蜀張寛為侍中從祀甘泉至渭橋有女子浴於渭水乳長七尺上怪其異遣問之女云第七車知我已知寛在第七車對曰天星主祭祀者齋戒不潔則女人星見益都耆舊傳未央宫殿前鐘無故自鳴三日夜乃止帝以問東方朔對曰銅者土之子以隂陽氣𩔖言之子母相感恐山有摧陁者越三日南郡太守以山崩為言漢武别傳昭帝始元元年春二月黃鵠下建章宫太液池中秋七月大雨渭橋絶漢書昭帝本紀始元中太白出東方入咸池東下入東井人臣不忠有謀上者天文志昭帝時上林苑中大柳樹斷仆地一朝起立生枝葉有蟲食其葉成文字曰公孫病已立後昭帝崩無子徵昌邑王賀嗣位狂亂失道霍光廢之更立昭帝兄衞太子之孫是為宣帝本名病已五行志元鳯四年五月丁丑孝文廟正殿災劉向以為孝文太宗之君與成周宣榭火同義先是皇后父車騎將軍上官安安父左將軍桀謀為逆大將軍霍光誅之皇后以光外孫年少不知居位如故光欲后有子後宫皆不得進皇后年六歲而立十三年而昭帝崩遂絶繼嗣光執朝政猶周公之攝也是歲正月上加元服通詩尚書有明哲之性光無周公之德而秉政九年久於周公上既已冠而不歸政將為國害故正月加元服五月而災見古之廟皆在城中孝文廟始出居外天戒若曰去貴而不正者五行志元平元年昌邑王賀即位天隂晝夜不見日月賀欲出光祿大夫夏侯勝當車諫曰天久隂而不雨臣下有謀上者陛下欲何之賀怒縳勝以屬吏吏白大將軍霍光光時與車騎將軍張安世謀欲廢賀光讓安世以為泄語安世實不泄召問勝勝上洪範五行傳曰皇之不極厥罰常隂時則有下人伐上不敢察察言故云臣下有謀光安世讀之大驚以此益重經術士後數日卒共廢賀此常隂之明效也五行志宣帝即位尊孝武廟為世宗巡狩郡國皆立廟告祠世宗廟日有白鶴集後庭以立世宗廟告祠孝昭寢有鴈五色集殿前郊祀志本始四年七月甲辰熒惑入輿鬼天質占曰大臣有誅者名曰天賊在大人之側天文志地節三年長安雨黑粟玉海元康元年三月甘露降未央宫二年夏神雀集雍宋書符瑞志三年春五色鳥以萬數飛過屬縣翺翔而舞欲集未下其令三輔無得以春夏摘巢探卵彈射飛鳥四年三月神雀五采以萬數集長樂未央北宫高寢甘泉泰畤殿中及上林苑金芝九莖產於函德殿銅池中漢書宣帝本紀神雀二年正月乙丑鳳凰甘露降集京師羣鳥從以萬數四年春二月鳳凰甘露降集京師修興太一五帝后土之祠鸞鳳萬舉蜚覽翺翔集止於旁齋戒之暮神光顯著薦鬯之夕神光交錯或降於天或登於地或從四方來集於壇冬十月鳳凰十一集杜陵十二月鳳凰集上林宣帝本紀五鳳二年正月甘露降京師宋書符瑞志三年郊上帝祀后土神光並見三月辛丑鸞鳳集長樂宫東闕中樹上飛下止地文章五色留十餘刻吏民並觀漢書宣帝本紀甘露元年夏四月黃龍見新豐宣帝本紀建章未央長樂宫鐘簴銅人皆生毛一寸所郊祀志甲辰孝文廟災四年冬十月丁卯未央宫宣室閣火宣帝本紀黃龍元年未央殿輅軨中雌雞化為雄毛衣變化而不鳴不將無距劉向以為雞變乃國家之占后妃象也孝元王皇后以甘露二年生男立為太子妃王禁女也黃龍元年宣帝崩太子立是為元帝王妃將為皇后是歲未央殿中雌雞為雄明其占在正宫也不鳴不將無距貴始萌而尊未成也宣帝時大司馬霍禹所居門第自壞時禹内不順外不敬見戒不改卒受滅亡之誅五行志宣帝時江淮饑饉雨榖三秦亡榖二十頃述異記元帝初元三年四月乙未孝武園白鶴館災劉向以為先是前將軍蕭望之光祿大夫周堪輔政為佞臣石顯許章等所譛望之自殺堪廢黜明年白鶴館災園中五里馳逐走馬之館不當在山陵昭穆之地天戒若曰去貴近逸遊不正之臣將害忠良後章坐走馬上林下烽馳逐免官初元中丞相府史家雌雞伏子漸化為雄冠距鳴將劉向以為元帝初元元年將立王皇后先以為媫妤三月癸卯制書曰其封媫妤父丞相少史王禁為陽平侯位特進丙午立王媫妤為皇后明年正月立皇后子為太子故應是丞相府史家雌雞為雄其占即丞相少史之女也伏子者明已有子冠距鳴將者尊已成也漢書五行志永光四年六月甲戌孝宣杜陵園東闕南方災劉向以為先是上復徵用周堪為光祿勲及堪弟子張猛為大中大夫石顯等復譛毁之皆出外遷是歲上復徵堪領尚書猛給事中石顯等終欲害之園陵小於朝廷闕在司馬門中内臣石顯之象也孝宣親而貴門闕法令所從出也天戒若曰去法令内臣親而貴者必為國害後堪希得進見因顯言事事決顯口堪病不能言顯誣告張猛自殺於公車五行志建昭元年秋八月有白蛾羣飛蔽日從東都門至枳道四年六月藍田地沙石雍霸水安陵岸崩雍涇水水逆流元帝本紀竟寧元年長陵銅駞生毛端開花酉陽雜爼元帝時童謡曰井水溢滅竈烟灌玉堂流金門至成帝建始二年三月戊子北宫中井泉稍上溢出井水隂也竈烟陽也玉堂金門至尊之象隂盛而滅陽竊有宫室之應也漢書五行志成帝建始元年正月乙丑皇考廟災初宣帝為昭帝後而立父廟於禮不正是時大將軍王鳳顓權擅朝甚於田蚡將害國家故天於元年正月而見象也五行志六月有青蠅無萬數集未央宫殿中朝者坐十二月大風抜甘泉畤中大木十圍以上成帝本紀三年夏大水三輔霖雨三十餘日郡國十九雨山谷水出凡殺四千餘人壊官寺民舍八萬三千餘所十月丁未京師相驚言大水至渭水虒上小女陳持弓年九歲走入橫城門入未央宫尚方掖門殿門門衞户者莫見至句盾禁中而覺夫民以水相驚者隂氣盛也小女而入宫殿中者下人將因女寵而居有宫室之象也名曰持弓有似周家檿弧之祥易曰弧矢之利以威天下是時帝母王太后弟鳳始為上將秉國政天知其後將威天下而入宫室故象先見也其後王氏父子兄弟五侯秉權至莽卒篡天下葢陳氏之後云五行志冬十二月戊申朔夜地震未央宫殿中成帝本紀四年十一月乙卯月食填星星不見時在輿鬼西北八九尺所占曰月食填星流民千里河平元年三月流民入函谷關天文志九月長安城南有鼠銜黃蒿柏葉上民塜柏及榆樹上為巢桐柏尤多巢中無子皆有乾鼠矢數升時議臣以為恐有水災鼠盜竊小蟲夜出晝匿今晝去穴而登木象賤人將居顯貴之位也桐柏衞思后園所在也其後趙皇后自微賤登至尊與衞后同類趙后終無子而為害明年有鳶焚巢殺子之異也一曰皆王莽竊位之象云京房易傳曰臣私祿罔辟厥妖鼠巢五行志河平元年四月己亥晦日有食之不盡如鈎在東井六度長安男子石良劉音相與同居有如人狀在其室中擊之為狗走出去後有數人被甲持兵弩至良家良等格擊之或死或傷皆狗也自二月至六月乃止五行志二年十月下旬填星在東井南耑大星尺餘歲星在其西北尺所熒惑在其西北二尺所皆從西方來填星貫輿鬼先到歲星次熒惑亦貫輿鬼十一月上旬歲星熒惑西去填星皆西北逆行占曰三星若合是為驚位是為絶行外内有兵與喪改立王公天文志四年白烏集孝文廟下玉海壬申長陵臨涇岸崩雍涇水漢書成帝本紀鴻嘉二年三月博士行大射禮有飛雉集於庭厯階登堂而雊後雉又集太常宗正丞相御史大夫大司馬車騎將軍之府又集未央宫承明殿屋上時大司馬車騎將軍王音待詔寵等上言天地之氣以𩔖相應譴告人君甚微而著雉者聽察先聞雷聲故月令以紀氣經載高宗雊雉之異以明轉禍為福之騐今雉以博士行禮之日大衆聚會飛集於庭歴階登堂萬衆睢睢驚怪連日徑歴三公之府太常宗正典宗廟骨肉之官然後入宫其宿留告曉人具偹深切雖人道相戒何以過是三年八月乙卯孝景廟北闕災十一月甲寅許皇后廢五行志永始元年正月癸丑大官凌室災戊午戾后園南闕災是時趙飛燕大幸許后既廢上將立之故天見象於凌室與惠帝四年同應戾后衞太子妾遭巫蠱之禍宣帝既立追加尊號於禮不正又戾后起於微賤與趙氏同應天戒若曰微賤亡德之人不可以奉宗廟將絶祭祀有凶惡之禍至其六月丙寅趙皇后遂立姊妹驕妬賊害皇子卒皆受誅四年四月癸未長樂宫臨華殿及未央宫東司馬門災六月甲午孝文霸陵園東闕南方災長樂宫成帝母王太后之所居也未央宫帝所居也霸陵太宗盛德園也是時太后三弟相續秉政舉宗居位充塞朝廷兩宫親屬將害國家故天象仍見五行志元延元年正月長安章城門門牡自亡谷永對曰章城門通路寢之路城門守國之固固將去焉故牡飛也七月辛未有星孛於東井踐五諸侯出河戍北五行志四年甘露降京師成帝本紀綏和二年二月大廐馬生角在左耳前圍長各二寸是時王莽為大司馬害上之萌自此始矣八月庚申鄭通里男子王褒衣絳衣小冠帶劍入北司馬門殿東門上前殿入非常室中解帷組結佩之招前殿署長業等曰天帝令我居此業等收縳考問褒故公車大誰卒病狂易不自知入宫狀下獄死是時王莽為大司馬哀帝即位莽乞骸骨就第天知其必不退故因是而見象也姓名章服甚明徑上前殿路寢入室取組而佩之稱天帝命然時人莫察後莽就國天下寃之九月丙辰地震自京師至北邊郡國二十餘壊城郭凡殺四百一十五人五行志成帝時雍大雨壊平陽宫垣災林光宫門郊祀志成帝時童謡曰燕燕尾涎涎張公子時相見木門倉琅根燕飛來啄皇孫皇孫死燕啄矢其後帝為微行出遊常與富平侯張放俱稱富平侯家人過河陽主作樂見舞者趙飛燕而幸之故曰燕燕尾涎涎美好貌也張公子謂富平侯也木門倉琅根謂宫門銅鍰言將尊貴也後遂立為皇后弟昭儀賊害後宫皇子卒皆伏辜所謂燕飛來啄皇孫皇孫死燕啄矢者也成帝時歌謡又曰邪徑敗良田讒口亂善人桂樹花不實黃爵巢其顛故為人所羨今為人所憐桂赤色象漢家華不實無繼嗣也王莽自謂黃象黃爵巢其顛也五行志成帝末年宫中雨一蒼鹿殺而食之其味甚美述異記哀帝建平元年正月丁未隕石北地十有六光燿雷聲二年四月乙亥朔御史大夫朱博為丞相少府趙𤣥為御史大夫臨延登受策有大聲如鐘鳴殿中郎吏陛者皆聞焉上以問黃門侍郎揚雄李尋尋對曰洪範所謂鼓妖者也師法以為人君不聰為衆所惑空名得進則有聲無形不知所從生宜退丞相御史以應天變然雖不退其人自䝉其咎揚雄以為鼓妖聽失之象也朱博為人強毅多權謀宜將不宜相恐有凶惡亟疾之怒八月博𤣥坐為姦謀博自殺𤣥減死論三年正月癸卯桂宫鴻寧殿災帝祖母傅太后之所居也時傅太后欲與成帝母等號齊尊大臣孔光師丹等執政以為不可太后皆免官爵遂稱尊號三年帝崩傅氏誅滅四年夏京師郡國民聚會里巷阡陌設祭張博具歌舞祠西王母又傳書曰母告百姓佩此書者不死不信我言視門樞下當有白髪至秋止漢書五行志元壽元年孝元廟殿門銅龜蛇鋪首鳴哀帝本紀哀帝時大司馬董賢第門無故自壞時賢以私愛居大位賞賜無度驕嫚不敬大失臣道見戒不改後賢夫妻自殺家徙合浦五行志平帝元始元年二月乙未義陵寢神衣在柙中丙申旦衣在外牀上平帝本紀朔方廣牧女子趙春病死斂棺積六日出在棺外自言見夫死父曰年二十七不當死太守譚以聞五月丁巳朔日食在東井六月長安女子有生兒兩頭異頸面相鄉四臂共匃俱前鄉凥上有目長二寸所京房易傳曰暌孤見豕負塗厥妖人生兩頭下相攘善妖亦同人若六畜首目在下兹為亡上正將變更二首下不一也上體生於下媟瀆也五行志四年冬大風吹長安城東門屋瓦且盡平帝本紀五年七月己亥高皇帝原廟殿門災盡高皇帝廟在長安城中後以叔孫通譏復道故復起原廟於渭北非正也是時平帝幼成帝母王太后臨朝委任王莽將篡絶漢故天象見也五行志王莽初長安狂女子碧呼道中曰高皇帝大怒趣歸我國不者九月必殺汝王莽傳王莽時未央宫中雨五銖錢既而至地悉為龜兎述異記建國三年池陽縣有小人景長尺餘或乘車馬或步行操持萬物大小各相稱三日止漢書王莽傳天鳳元年七月大風拔木飛北闕直城門屋瓦雨雹殺牛羊二年二月置酒王路堂公卿大夫皆佐酒是時日中見星訛言黃龍墮死黃山宫中百姓奔走往觀者有萬數莽惡之問語所從起不能得三年五月戊辰長平館西岸崩邕涇水不流毁而北行七月辛酉霸城門災十月戊辰王路門朱鳥門鳴晝夜不止四年八月莽親之南郊鑄作威斗鑄斗日大寒百官人馬有凍死者五年正月朔北軍南門災王莽傳地皇元年七月大風毁王路堂是月杜陵便殿乘輿虎文衣廢藏在室匣中者出自樹立外堂上良久乃委地武功水鄉民三舍墊為池三年二月霸橋災數千人沃救不滅夏蝗從東方來蜚蔽天至長安入未央宫緣殿閣六月殿中鉤盾土山仙人掌旁有白頭公青衣郎吏見者私謂之國師公衍功侯喜素善卦莽使筮之曰憂兵火莽曰小兒安得此左道是乃予之皇祖叔父子僑欲來迎我也王莽傳後漢光武先在長安時同舍生彊華自關中奉赤伏符曰劉秀發兵捕不道四夷雲集龍鬭野四七之季火為王後漢書光武本紀建武二年關中饑人相食光武本紀七年九月庚子土入鬼中十年閏月庚辰火入輿鬼十二年九月甲午火犯輿鬼十三年二月乙卯火犯輿鬼西北古今注三十年閏月甲午水在東井二十度生白氣東南指炎長五尺為彗五月甲子不見凡見三十一日水常以夏至放於東井閏月在四月尚未當見是贏而進也東井為水衡水出之為大水白氣為喪三十一年七月戊午火在輿鬼一度入鬼中出尸星南半度明年二月二十二日有客星在輿鬼東北六尺所滅凡見百一十三日熒惑為凶衰輿鬼尸星主死亡熒惑入之為大喪後漢書天文志明帝永平元年十一月辛未土逆行乘東井北軒轅第二星古今注十三年閏月丁亥火犯輿鬼為大喪質星為大臣誅戮後漢書天文志章帝建初元年三月戊寅木火在東井古今注七年十月車駕西巡得白鹿於臨平觀車駕西巡至槐里右扶風境上美陽得銅器於岐山似酒尊詔在道晨夕以為百官熱酒宋書符瑞志和帝永元元年十一月壬申鎮星在東井二年正月乙卯土在東井二月乙亥金在東井古今注五年四月癸巳太白熒惑辰星俱在東井東井秦地為法三星合内外有兵九月行車騎將軍事鄧鴻與度遼將軍朱徵䕶烏桓校尉任尚中郎將杜崇征叛胡十二月車騎將軍鴻坐追虜失利下獄死徵崇皆抵罪後漢書天文志木在輿鬼六年六月丁亥金在東井古今注七年二月戊寅金火俱在東井為外兵有死將其九年九月羌反遣執金吾劉尚行征西將軍事越騎校尉節鄉侯趙世發北軍五校黎陽雍營及邊兵三萬騎征西羌後漢書天文志十三年正月辛未水乘輿鬼古今注十五年六月辛酉漢中城固南城門災四月甲子晦日有食之在東井二十二度後漢書五行志十六年七月庚午水在輿鬼中輿鬼為死喪天文志元興元年五月癸酉右扶風雍地裂五行志安帝永初元年八月戊申客星在東井弧星東井弧皆秦地是時羌反斷隴道是其應也天文志三年三月壬寅熒惑入輿鬼古今注四年六月癸酉太白入輿鬼輿鬼為將凶後漢書天文志七年四月丙申晦日有蝕之在東井一度五行志元初元年三月癸酉熒惑入輿鬼二年九月辛酉熒惑入輿鬼三年三月熒惑入輿鬼中七月甲寅歲星入輿鬼四年正月丙戌歲星留輿鬼中四月壬戌太白入輿鬼中己巳辰星入輿鬼中六月丙申熒惑入輿鬼中戊戌犯輿鬼大星五年三月丙申鎮星犯東井鉞星五月庚午辰星犯輿鬼質星丙戌太白犯鉞星六年四月癸丑太白入輿鬼六月丙戌熒惑在輿鬼中丁卯鎮星在輿鬼中自永初五年到永寧七年之中太白再入輿鬼熒惑五入輿鬼鎮星一犯東井鉞星一入輿鬼歲星辰星再入輿鬼凡五星入輿鬼中皆為死喪熒惑太白甚犯鉞質星為誅戮天文志延光元年八月戊子陽陵園寢殿火凡災發見於先陵此太子將廢之象也若曰不當廢太子以自剪則火不當害先陵之寢也五行志三年六月辛未扶風言白鹿見雍七月丁酉馮翊言甘露降安帝本紀左馮翊衙有木連理十月壬午鳳凰集京兆新豐西界槐樹宋書符瑞志四年太白入輿鬼中古今注曰四月甲辰入後漢書天文志順帝永建二年八月乙巳熒惑入輿鬼輿鬼為死喪質星為誅戮天文志三年秋七月丁酉茂陵園寢災帝縞素避正殿辛亥使太常王龔持節告祠茂陵順帝本紀陽嘉三年四月乙卯太白熒惑入輿鬼古今注永和三年閏月甲寅辰星入輿鬼辰星入輿鬼為大臣有死者五年五月己丑晦日有蝕之在東井三十三度東井三輔宿又近輿鬼輿鬼為宗廟其秋西羌為宼至三輔園陵後漢書五行志六年二月甲申彗星在東井遂歴輿鬼東井輿鬼為秦皆羌所攻鈔天文志永和年長安雨綿皆白古今注漢安二年五月丁亥辰星犯輿鬼輿鬼為大喪後漢書天文志質帝本初元年三月癸丑熒惑入輿鬼四月辛巳太白入輿鬼皆為大喪天文志桓帝建和元年八月壬寅熒惑犯輿鬼質星二年二月辛卯熒惑行在輿鬼中三年五月丙申熒惑入東井八月己亥鎮星犯輿鬼中南星熒惑犯輿鬼為死喪質星為戮臣鎮星犯輿鬼為喪天文志四月丁卯晦日有蝕之在東井三十三度五行志永壽三年四月戊寅熒惑入東井口中為大臣有誅者天文志延熹元年七月乙巳左馮翊雲陽地裂三年五月戊申漢中山崩五行志四年三月甲寅熒惑犯輿鬼質星熒惑犯輿鬼質星大臣有戮死者天文志四月上郡言甘露降桓帝本紀六月右扶風地震六年七月甲申平陵園寢火七年三月癸亥隕石右扶風一鄠又隕石三皆有聲如雷五行志八月庚戌熒惑犯輿鬼質星熒惑犯質星有戮臣八年五月癸酉太白犯輿鬼質星九年六月壬戌太白行入輿鬼七月乙未熒惑行入輿鬼中犯質星太白犯輿鬼質星有戮臣太白熒惑入輿鬼皆為死喪又犯質星為戮臣天文志永康元年五月壬子晦日有食之在輿鬼一度五行志靈帝建寧二年十月戊戌晦日有蝕之右扶風以聞五行志熹平四年夏四月延陵園火六月三輔螟蟲為害五行志光和二年三月京兆地震五行志三年冬彗星出狼弧天文志中平二年七月三輔螟蟲為害中平中長安城西北六七里空樹中有人面生鬢五行志獻帝初平元年三月獻帝初入未央宫翟雉飛入未央宫獲之漢紀八月霸橋災其後三年董卓見殺二年三月長安宣平城門外屋無故自壊至三年夏司徒王允使中郎將吕布殺太師董卓夷三族四年六月右扶風雨雹如斗後漢書五行志華山崩裂獻帝本紀右扶風大風發屋抜木五行志興平元年十月長安市門無故自壊至二年春李傕郭汜鬭長安中傕廹刼天子移置􅔛塢盡燒殿城門官府民舍放兵寇鈔公卿以下五行志秋七月三輔大旱自四月至於是月帝避正殿請雨遣使者洗囚徒原輕繫是歲榖一斛五十萬豆麥一斛二十萬人相食啖白骨委積九月桑復生椹人得以食獻帝本紀九年十一月有星孛於東井輿鬼十七年十二月有星孛於五諸侯周羣以為西方專據土地者將失土是時漢中太守張魯據漢中二十年秋曹公攻漢中魯降二十三年三月孛星厯東井五諸侯鋒炎指帝座占曰除舊布新之象也天文志後主建興十二年諸葛亮帥大衆伐魏屯於渭南有長星赤而芒角自東北西南流投亮營三投再還往大還小占曰兩軍相當有大流星來走軍上及墜軍中皆破敗之徵也九月亮卒於軍營而退羣帥交惡多相誅殘宋書天文志魏明帝青龍二年三月辛卯月犯輿鬼輿鬼主斬殺占曰民多病國有憂五月丁亥太白晝見積三十餘日以晷度推之非秦魏則楚也是時諸葛亮據渭南與司馬懿相持三年六月丁未填星犯井鉞戊戌太白又犯之占曰凡月五星犯井鉞悉為兵災一曰斧鉞用大臣誅七月己丑填星犯東井距星占曰填星入井大人憂行近距為行隂其占曰大水五榖不成四年閏四月乙巳填星犯井鉞三月癸卯填星犯東井宋書天文志青龍中盛修宫室西取長安金狄承露盤盤折聲聞數十里金狄泣於是因留霸城晉書五行志少帝正始二年九月癸酉月犯輿鬼西北星西北星主金三年二月丁未月又犯鬼西南星西南星主布帛占曰有錢令一曰大臣憂四年十月十一月月再犯井鉞宋書天文志嘉平元年六月壬戌太白犯東井距星占曰國失政大臣為亂四月辛巳太白犯輿鬼占曰大臣誅兵起二年三月己未太白犯井距星十二月丙申月犯輿鬼三年四月戊寅月犯東井占曰軍將死一曰為兵七月己巳月犯輿鬼九月乙巳又犯之占曰臣有亂四年十一月丁未月犯鬼積尸五年七月月犯井鉞丙午月犯鬼西北星占曰國有憂十一月癸酉月犯東井距星占曰將軍死晉書天文志高貴鄉公正元二年二月戊午熒惑犯東井北轅西頭第一星天文志甘露元年五月上洛言甘露降宋書符瑞志七月乙卯熒惑犯東井鉞星壬戌月又犯鉞星九月丁巳月犯東井二年三月庚子太白犯東井占曰國失政大臣為亂是夜歲星又犯東井八月壬子歲星犯井鉞九月庚申歲星逆行乘井鉞占曰逆臣為亂人君憂三年八月壬辰歲星犯輿鬼質星占曰斧鑕用大臣誅四年四月甲申歲星又犯輿鬼東南星占曰鬼東南星主兵木入鬼大臣誅晉書天文志晉武帝太始元年十二月鳳凰三見馮翊下邽八年十月白鹿見扶風雍州刺史嚴詢獲以獻宋書符瑞志咸寧二年六月丙午白龍二見九原井中三年六月梁州暴水殺人九月始平郡大水梁州又大水晉書五行志五年十一月甲寅青龍見京兆霸城宋書符瑞志太康元年白雲起霸水三日乃滅拾遺記七月木連理生馮翊粟邑四年正月木連理生馮翊臨晉十一月癸未白兎見北地富平十二月嘉禾生扶風雍木連理生扶風六年梁郡國旱九月白龍見京兆隂槃七年四月甘露降京兆杜陵宋書符瑞志八月京兆地震九年夏扶風始平京兆旱傷麥晉書五行志十年五月白烏見京兆長安宋書符瑞志白兎見京兆長安六月嘉禾生扶風雍一莖四穗是歲收三倍冊府元龜惠帝元康元年七月雍州大旱隕霜疾疫關中饑米斛萬錢宋書五行志三年六月華隂雨雹深三尺七年七月秦雍二州隕霜殺禾大旱疾疫關中饑米斛萬錢因此氐羌反叛雍州刺史解系敗績而饑疫薦臻戎晉並困朝廷不能振詔聽相賣鬻晉書五行志十年五月秦雍二州疾疫宋書五行志永康二年二月太白出西方逆行入東井占曰國失政臣為亂是時齊王冏起兵討趙王倫倫滅冏擁兵不朝專權淫奢明年誅死晉書天文志永寧元年七月梁州螟五行志八月戊午辰星守輿鬼占曰秦有災天文志太安二年七月熒惑入東井占曰兵起國亂宋書天文志永興二年四月丙子太白犯狼星占曰兵大起九月歲星守東井井秦分也是時關西諸將攻河間王顒顒奔走東海王迎殺之晉書天文志懷帝永嘉三年六月壬子玉龜出灞水宋書符瑞志四年五月秦雍疫至秋五行志永嘉中秦雍大蝗草木及牛馬毛皆盡又大疾疫兼以饑饉百姓又為寇賊所殺流尸滿河白骨蔽野晉書食貨志愍帝初有童謡曰天子何在豆田中至建興四年帝降劉曜在城東豆田壁中五行志建興三年六月丁卯長安地震是時主幼權傾於下四方雲擾兵亂不息之應也四年六月大蝗去歲劉曜頻攻北地馮翊麴允等悉衆禦之悉為劉曜所破西京遂潰五行志建武元年五月癸未太白熒惑合於東井占曰金火合曰爍為喪宋書天文志元帝太興二年二月甲申熒惑犯東井占曰兵起貴臣相戮天文志地震長安尤甚時曜妻羊氏有殊寵頗預政事隂有餘之徵也晉書劉曜載記七月甲午歲星熒惑會於東井天文志三年十月己亥熒惑在東井居五諸侯南躊躇留止積三十日占曰熒惑守井二十日以上大人憂守五諸侯諸侯有誅者宋書天文志劉曜光初三年西明門内大樹風吹折經一宿樹撥變為人形髮長一尺鬚眉長三寸皆黃白色有斂手之狀亦有兩脚著裙之形惟無口鼻毎夜有聲十日而生柯條遂成大樹枝葉甚茂四年終南山崩長安劉終於崩所得白玉方一尺有文字曰皇亡皇亡敗趙昌井水竭構五梁咢酉小衰困囂喪嗚乎嗚乎赤牛奮靷其盡乎羣臣咸賀以為勒滅之徵曜大悦齋七日而後受之於太廟大赦境内以終為奉瑞大夫中書監劉均進曰臣聞國主山川故山崩川竭君為之不舉終南京師之鎮國之所瞻無故而崩其凶焉可極言昔三代之季其災也如是今朝臣皆言祥瑞臣獨言非誠上忤聖㫖下違衆議然臣不逹大理竊所未同何則玉之於山石也猶君之於臣下山崩石壊象國傾人亂皇亡皇亡敗趙昌者此言皇室將為趙所敗趙因之而昌今大趙都於秦雍而勒跨全趙之地趙昌之應當在石勒不在我也井水竭構五梁者井謂東井秦之分也五謂五車梁謂大梁五車大梁趙之分也此言秦將竭滅以構成趙也咢者歲之次名作咢也言歲馭作咢酉之年當有敗軍殺將之事困謂困敦歲在子之年名元囂亦在子之次言歲馭於子國當喪亡赤牛奮靷謂赤奮若在丑之歲名也牛謂牽牛東北維之宿丑之分也言歲在丑當滅亡盡無復遺也此其誠悟蒸蒸欲陛下勤修德化以禳之縱為嘉祥尚願陛下夕惕以答之書曰雖休勿休願陛下追蹤周旦盟津之美捐鄙虢公夢廟之凶謹歸沐浴以待妖言之誅曜憮然改容御史劾均狂言瞽説誣罔祥瑞請依大不敬論曜曰此之災瑞誠不可知深戒朕之不德朕收其忠惠多矣何罪之有乎晉書劉曜載記永昌元年武功男子蘇撫化為女子上洛男子張盧死二十七日有盜發其塜者盧得蘇劉曜載記明帝大寧元年大雨霖震曜父墓門屋大風飄發其父寢堂於垣外五十餘步有鳯凰將五子翔於故未央殿五日悲鳴不食皆死武功豕生犬劉曜載記三年四月雍梁州大旱自正月至於是月元經成帝咸和二年五月甲申朔日有蝕之在井晉書天文志三年長安自春不雨至於五月劉曜載記九年三月己亥熒惑入輿鬼犯積尸占曰兵在西北有没軍死將四月鎮西將軍雍州刺史郭權歸從尋為石斌所滅宋書天文志咸康元年八月戊辰熒惑入東井占曰無兵兵起有兵兵止三年八月熒惑入輿鬼犯積尸占曰貴人憂甲戌月犯東井距星占曰國有憂將死七年四月己丑太白犯輿鬼占曰兵革起八月辛丑月犯輿鬼占曰人主憂天文志穆帝永和元年五月辛巳太白晝見在東井占曰為臣強秦有兵八月己未月犯輿鬼占曰大臣有誅晉書天文志三年六月月犯東井距星占曰將死國有憂戊戌月犯五諸侯占曰諸侯有誅五年四月丁未太白犯東井占曰秦有兵六年七月丙寅熒惑犯鉞星占曰大臣有誅七年二月乙卯熒惑入輿鬼犯積尸占曰貴人憂八年七月壬子歲星犯東井距星占曰内亂兵起八月戊戌熒惑入輿鬼占曰忠臣戮死九年八月歲星犯輿鬼東南星占東南星主兵兵起十二月月在東井犯歲星占曰秦饑民流宋書天文志十年正月癸酉填星掩鉞星占曰斧鉞用七月庚午太白晝見晷度推之災在秦是時桓溫伐苻健破其嶢柳軍晉書天文志十一月月掩填星在輿鬼占曰秦有兵時桓溫伐苻健健堅壁長安溫退宋書天文志三麥不登至關西亦然晉書五行志新平有長人見語百姓張靖曰苻氏應天受命今當太平外面者歸中而安泰問姓名弗答俄不見新平令以聞健以為妖下靖獄會大雨霖河渭溢蒲津監寇登得一屐於河長七尺三寸人跡稱之指長尺餘丈深一寸健歎曰覆載之中何所不有張靖所見定不虚也赦之十一年蝗蟲大起自華澤至隴山食百草無遺牛馬相噉毛猛獸及狼食人行路斷絶健自蠲百姓租税減膳徹懸素服避正殿苻健載記苻健死子生僣立虎狼大暴從潼關至於長安晝則斷道夜則發屋不食六畜專以害人魏書苻生傳偽中書監胡文中書令王魚言於生曰比有熒惑入於東井井秦之分野於占不出三年國有大喪大臣戮死願陛下逺追周文修德以禳之惠和羣臣以成康哉之美生曰皇后與朕對臨天下亦足以塞大喪之變毛太傅梁車騎梁僕射受遺輔政可謂大臣也於是殺其妻梁氏及太傅毛貴車騎尚書令梁楞左僕射梁安晉書苻生載記壽按晉書苻生僣位改年光時永和十三年也綱目通鑑皆作永和十一年秋九月秦殺其后梁氏及太傅毛貴等今依綱目紀之而并附晉書十三年之説以偹考云十二年六月庚子太白晝見在東井宋書天文志長安大風發屋抜樹行人顛頓宫中奔擾或稱賊至宫中晝閉五日乃止晉書苻生載記升平元年有司奏太白犯東井東井秦之分也太白罰星必有暴兵起於京師生曰星入井者必將渴耳何所怪乎長安謡曰東海大魚化為龍男便為王女為公問在何所洛城東東海苻堅封也時為龍驤將軍第在洛門之東太史令康權言於生曰昨夜孛星入於太微遂入於東井兼自去月上旬沉隂不雨迄至於今必有下人謀上之禍生怒以為妖言撲而殺之苻生載記四月壬子太白入輿鬼丁亥月掩東井南轅西頭第二星占曰秦地有兵一曰將死其年五月苻堅殺苻生而立晉書天文志二年二月甲午月犯東井宋書天文志三年六月太白犯東井七月丙戌太白犯輿鬼晉書天文志五年堅僣位五年鳳凰集於東闕苻堅載記哀帝興寧三年七月庚戌歲星犯輿鬼占曰人君憂宋書五行志帝奕太和元年秦雍二州地震裂水泉湧出金象生毛長安大風震電壊屋殺人晉書苻堅載記簡文帝咸安二年六月太白犯輿鬼占曰國有憂宋書天文志孝武帝寧康元年天鼓鳴有彗星出尾箕太史令張孟言於堅此燕滅秦之象時有人於堅光明殿大呼謂堅曰甲申乙酉魚羊食人悲哉無復遺堅命執之俄而不見晉書苻堅載記三年六月癸卯太白犯東井占曰秦地有兵宋書天文志苻堅建元十二年高陵縣民得大龜三尺六寸背文負八卦古字堅命作石池養之後死藏其骨於太廟其夜廟丞高虜夢龜謂之曰我本出將歸江南遭時不遇殞命秦庭即有人夢中謂虜曰龜三千六百歲而終終必妖興亡國之徵也未幾為謝𤣥破於淮淝自縊新城浮圖中異苑太元二年六月長安大風抜苻堅宫中樹宋書五行志七月己卯老人星見三年七月乙酉老人星見玉海四年秦大饑綱鑑七年新平郡獻玉器初堅即位新平王雕陳説圖䜟堅大悦以雕為太史令嘗言於堅曰謹按䜟云古月之末亂中州洪水大起健西流惟有雄子定八州此即陛下三祖之聖諱也又曰當有草付臣又土滅東燕破白虜氐在中華在表按圖䜟之文陛下當滅燕平六州願徙汧隴諸氐於京師三秦大户置之於邊地以應圖䜟之言堅訪之王猛猛以雕為左道惑衆勸堅誅之雕臨刑上疏曰臣以趙建武四年從京兆劉湛學明於圖記謂臣曰新平地古顓頊之墟里名曰雞閭記云此里應出帝王寶器其名曰延壽鼎顓頊有云河上先生為吾隱之於咸陽西北吾之孫有草付臣又土應之湛又云吾嘗齋於室中夜有流星大如半月落於此地斯葢是乎願陛下誌之平七州之後出於壬午之年至是而新平人得之以獻器銘篆書文題之法一為天王二為王后三為三公四為諸侯五為伯子男六為卿大夫七為元士自此以下考載文記列帝王名臣自天子王后内外次序上應天文象紫宫布列玉牒版辭不違帝王之數從上元人皇起至中元窮於下元天地一變盡三元而止堅以雕言有徵追贈光祿大夫彗星掃東井自堅之建元十七年四月長安有水影逺觀若水視地則見人至是則止堅惡之上林竹死晉書苻堅載記十年慕容冲進逼長安長安大饑人民相食有羣烏數萬鳴於長安城上其聲甚悲魏書苻堅傳毎夜有人周城大呼曰楊定健兒應屬我宫殿臺觀應坐我父子同出不供汝旦尋而不見人跡城中有書曰古苻傳賈錄載帝出五將乆長得先是又謡曰堅入五將山長得堅大信之告其太子宏曰脱如此言天或導予於是遣衞將軍楊定擊冲於城西為冲所擒堅彌懼付宏以後事將中山公詵張夫人率騎數百出如五將宣告州郡期以孟冬救長安宏尋將母妻宗室數百出奔百僚逃散慕容冲入據長安縱兵大掠死者不可勝紀初秦之未亂也關中土然無火而烟氣大起方數十里中月餘不滅堅毎臨聽訟觀令百姓有怨者舉煙於城北觀而錄之長安為之語曰欲得必存當舉烟又為謡曰長鞘馬鞭擊在股太歲南行當復虜秦人呼鮮卑為白虜慕容垂之起於關東歲在癸未晉書苻堅載記秦記曰初長安謡曰鳳凰鳳凰止阿房苻堅遂於阿房城植桐數萬株以待之其後慕容冲入阿房城而止焉冲小字鳳也宋陳翥桐譜七月丁巳老人星見玉海十一年三月戊申太白晝見在東井六月甲申又晝見於輿鬼占曰秦有兵時魏姚萇苻登連兵相征不息晉書天文志十五年沔中諸郡大水宋書五行志七月壬申有星孛於北河宋書天文志安帝隆安元年四月丁丑太白晝見在東井秦有兵喪天文志八月熒惑守井鉞占曰大臣有誅晉書天文志四年十月梁州有馬生角晉書五行志元興元年二月戊子太白犯五諸侯因晝見七月戊寅熒惑在東井犯輿鬼積尸宋書天文志義熙元年三月太白犯東井占曰秦有兵天文志二年華山郡地湧沸廣袤百餘步燒生物皆熟五月乃止晉書姚興載記五年四月甲戌熒惑犯辰星在井東六年七月己亥月犯輿鬼占曰國有憂一曰秦有兵七年四月辛丑熒惑入輿鬼占曰秦有兵一曰雍州有災宋書天文志時客星入東井所在地震前後一百五十六興公卿抗表請罪姚興曰災譴之來咎在元首近代或歸罪三公甚無謂也公等悉􅃣履復位晉書姚興載記八年七月甲申太白犯填星在東井占曰秦有大兵己未月犯井鉞十月丁丑填星犯東井占曰大人憂十二月癸卯填星犯井鉞九年二月丙午熒惑填星皆犯東井占曰秦有兵壬辰歲星熒惑填星太白聚於東井從歲星也熒惑入輿鬼太白犯南河東井秦分十三年高祖定關中熒惑入輿鬼占曰兵喪太白犯南河占曰兵起後皆有應十年七月庚辰熒惑犯井鉞填星犯輿鬼遂守之占曰大人憂宗廟改九月填星犯輿鬼占曰人主憂宋書天文志日在東井有白虹十餘丈在南干日災在秦分秦亡之象晉書天文志十一年二月己卯填星入輿鬼閏月丙午填星又入輿鬼占曰為旱為疫為亂臣六月己未太白犯東井占曰秦有兵戊寅犯輿鬼占曰國有憂十一月乙未月入輿鬼而暈占曰主憂財寶出宋書天文志姚興死之前歲太史令奏熒惑在匏瓜星中一夜忽然亡失不知所在崔浩曰庚午之夕辛未之朝天有隂雲熒惑之亡當在此二日之内庚之與未皆主於秦辛為西夷今姚興據咸陽是熒惑入秦矣後八十餘日熒惑果出於東井留守盤旋秦中大旱赤地千里昆明池水竭童謡訛言國内諠擾明年姚興死魏書崔浩傳靈臺令張泉又言於興曰熒惑入東井旬紀而返未餘月復來守心王者惡之宜修仁虚已以答天譴興納之正旦興朝羣臣於太極前殿沙門賀僧慟哭不能自勝衆咸怪焉晉書姚興載記十三年漢中城固縣水涯有聲若雷既而岸崩出銅磬十有二枚五行志十四年二月癸丑太白犯五諸侯七月甲辰熒惑犯輿鬼占曰秦有兵丁巳月犯東井占曰軍將死宋書天文志鑑按晉書記載禨祥皆不紀年今以通綱目所紀約畧其年代為叙次焉宋按宋齊梁地之在秦者止有漢興商洛漢興漢書為翼軫分商洛唐書為柳張分皆非井鬼正占若陳則並漢興商洛悉非其境魏收以為江南僑立雍州以總牧西土遺黎故與井鬼同候其説雖未足據要之天象𤣥逺或南史紀其變而仍於秦地應其占則天文之關於井鬼者皆不可缺也今依正史並載之文帝元嘉七年六月熒惑犯東井輿鬼八年五月太白犯天關東井六月庚子熒惑入東井八月乙未熒惑犯積尸十月丙辰月掩天關東井十年仇池氐宼漢中梁州失戍九年正月庚午熒惑入輿鬼三月己丑太白入積尸十一年閏月戊寅太白犯五諸侯己丑月入東井犯太白十二年七月熒惑犯積已十三年十一月辛亥歲星犯積尸十