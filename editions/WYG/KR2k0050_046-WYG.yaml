戊子太白犯五諸侯晝見經天犯五諸侯所以興霸行也四月辛丑月掩辰星在東井月為隂國之兵辰象戰鬭占曰所直野軍大起戰不勝亡地家臣死冬十月帝伐秦師於䝉坑大敗之遂舉乾壁關中大震其上將姚平赴水死魏書天象志天賜六年四月火犯水於東井其冬赫連氏攻安定秦主興自將救之自是侵伐不息天象志太宗永興二年七月月犯輿鬼占曰亂臣在内四年六月癸巳金木合於東井七月甲申金犯土於井占曰其國内兵有白衣之會十一月土犯井十二月癸卯土犯鉞土主疆理之政存亡之機也是為土地分裂有戮死之君徵在秦邦至五年二月丙午火土皆犯井占曰國有兵喪之禍主出走是月壬辰歲填熒惑太白聚於井將以建霸國之命也其地君子憂小人流又自三年四月至五年三月熒惑三千鬼主命者將夭而國徙焉是時雍州假王霸之號者六國而赫連氏據朔方之地尤為強暴薦食關中秦人奔命者殆路間歲姚興薨而難作於内明年劉裕以晉師伐之秦師連戰敗績執姚泓以歸戕諸建康既而遺守内㩗長安淪覆焉五年十二月甲辰月三暈東井天象志神瑞元年二月填星入東井犯天尊旱祥也天象若曰土失其性水源將壅焉施於天尊所以福矜寡之萌也八月庚寅至二年三月填星再犯輿鬼積尸土爰稼穡鬼為物之精氣是為稼穡潛耗人將以饉而死焉一曰大旱又鬼主秦旱在秦邦天象志泰常二年十一月癸未月犯東井南轅西頭第一星占曰諸侯貴人死一曰有水三年正月戊申月犯輿鬼積尸己酉月犯爟星占曰女主憂五月癸亥月犯太白於東井七月丁巳月犯東井天象志世祖始光三年五月洛州獻白兎靈徵志神䴥三年六月火犯井鬼占曰秦憂兵亂有死君又旱饑之應九月帝用崔浩策行幸統萬擊赫連定於平凉十二月克之悉定三秦地四年金火入東井明年五月火又犯鬼五年正月庚午火入鬼占曰秦有死君天象志延和三年閏月戊寅金犯五諸侯占四滑起官兵起亂己丑月入井犯太白占曰兵起合戰秦邦受之七月上幸隰城詔諸軍討山胡白龍入西河九月克之伏誅者數千人天象志太延二年正月月犯東井占曰將相死八月丁亥木入鬼守積尸十一月辛亥又犯鬼三年正月壬午有星晡前見在井左右色黃大如橘魏師之應也四年四月己酉華山崩華山西鎮也鎮傾而國從之十一月丁未月犯東井占曰將軍死天象志真君二年七月壬寅填星犯鉞六年二月太白熒惑歲星聚於東井占曰二星合是為驚立絶行其國内外有兵與喪改立王公九月盧水胡葢呉據杏城反僣署百官諸虜皆響從關内大震十一月將軍叔孫抜敗呉師於渭北天象志高宗太安四年三月月犯五諸侯五年二月熒惑入東井占曰旱兵饑疫大臣當之六月太白犯鉞占曰兵起更正朔天象志和平元年正月丁未歲犯鬼歲星人君也是為君有喪事四月太白犯東井井秦分雍州有兵亂二年詔諸將討雍州叛氐大破之二年三月熒惑入鬼是謂稼穡不成且曰萬人相食六月太白犯東井七月火入井九月火犯積尸占曰貴人憂之斧鉞用五年三月庚子月入輿鬼積尸六月火入井占曰大臣憂斧鉞用六年四月太白犯諸侯占曰有專殺諸侯者天象志顯祖天安元年六月熒惑犯輿鬼占曰旱饑疾疫金革用其後東平王道符擅殺副將及雍州刺史據長安反詔司空和其奴討滅之甲辰月犯東井十月癸巳月掩東井天象志皇興元年正月丙辰月犯東井北轅東頭第三星四月壬寅太白犯鬼八月辛酉月蝕東井南轅第二星占曰有將死五年七月辛巳月犯東井天象志高祖延興元年十二月乙巳鎮星犯井二年正月丙子月犯東井庚子又如之占曰天下有變令貴人多死者天象志二月白雀見於扶風郡靈徵志承明元年九月京兆民獻玉璧一雙文色炳煥王者賢良美德則至靈徵志太和元年二月月在井暈天象志五月統萬鎮地震有聲如雷六月雍州獻玉印是月長安鎮獻玉印一上有龜紐下有文字色甚鮮白有殊常玉雍州周城縣獻白兎二年七月壬戌雍州赤風靈徵志九月火犯鬼占曰主以淫佚失政相死之天象志十一月洛州獻白鵲靈徵志三年正月壬子月暈東井占曰有赦十月大赦天下癸丑日暈東西有珥有佩㦸一重北有偃㦸四重後有白氣貫日珥狀如車輪京師不見雍州以聞天象志統萬鎮獻白雉七月雍州大霜禾豆盡死靈徵志四年正月丁未月暈東井五年二月甲辰月暈侵東井西河輿鬼天象志六年七月雍州大水虸蚄害稼七年六月甲子東雍州地震有聲靈徵志八年正月辛巳月暈東井天象志四月雍州暴雨蝗靈徵志九年正月月暈東井北河占曰水戊申月犯東井占曰貴人死一曰有水天象志四月雍州隕霜靈徵志十一年二月癸亥月犯東井七月丁未月入東井甲子月入東井是歲月三入東井金又犯之占曰隂陽不和不為水患且大旱十二年四月癸丑月火金會於井甲戌火水又俱入井皆雨𤾉失節萬物不成候也且曰諸侯貴人多死是歲兩雍旱饑十一月己未月犯東井十三年正月甲寅月入東井九月庚申月入東井十二月壬午月入東井十四年十月壬午月入東井十五年十一月辛未月入東井十六年八月甲辰月入東井十月癸亥月入東井十七年二月丁丑太白犯井辛丑又犯鬼是為兵祥雍州也八月辛巳熒惑入井占曰兵革起八月辛丑月犯輿鬼甲午月入東井十一月辛酉月犯東井前星十八年六月丁卯月入東井十九年六月庚申金木合於井七月火犯井天象志二十三年正月華州獻白麏靈徵志世宗景明元年四月丙子夏州隕霜殺草六月雍州大雨雹殺麞鹿八月乙亥雍夏州頻暴風隕霜靈徵志二年正月甲辰月暈井占曰貴人死大赦三月戊午填星在井犯鉞相去二寸占曰人君有戮死者三年正月填星逆行守井北轅西星皆大臣更政立君之戒也二月丁酉有流星起東井至北極而滅東井雍州西君之分既而西君錫命是歲七月月暈東井占曰旱大赦天象志九月丙辰豳岐梁東秦州暴風昏霧抜樹發屋靈徵志十一月己巳月蝕井盡乙未月暈井鎮星占曰兵起四年氐反行梁州事楊椿左將軍羊社大破之四年正月月暈東井天象志三月壬戌雍州隕霜殺桑麥七月夏州獻黑兎靈徵志壬申月犯東井占曰旱有大赦天象志九月梁州上言犬豕交靈徵志正始元年正月戊戌月暈東井南河北河輿鬼天象志六月夏州蝗害稼懷朔鎮隕霜七月戊辰東秦州隕霜東秦州暴風抜樹發屋二年五月雍州獻蒼烏六月雍州又獻蒼烏七月辛巳豳岐二州隕霜三年七月夏州獻白鳩十二月雍州獻白雀四年三月乙丑豳州頻隕霜靈徵志永平元年三月乙酉岐豳二州隕霜六月洛州獻白鳩靈徵志二年三月火入鬼距積尸五寸積尸人之精爽而炎氣加之疫祥也四月乙丑金入鬼去積尸一寸又以兵氣干之強死之祥也踰逼者事甚鬼主驕亢之戒故金火薦災其人以儆而懼之三年八月火犯積尸占曰貴人死又饑疫祥也天象志十一月夏州言橫風山木連理靈徵志四年八月癸丑月掩輿鬼天象志延昌元年二月庚午月暈東井輿鬼十月癸酉月暈東井三年二月乙酉月暈東井占主赦天象志四年正月癸丑華州地震閏月岐州獻白雉九月雍州上言鄠縣木連理十二月洛州上言魏興太守常矯家黃雌雞頭上肉角大如棗長寸三分角上生聚毛長寸半靈徵志肅宗熙平元年十二月甲辰月暈東井天象志二年正月金出岐州橫水縣赤粟谷四月華州獻白雀靈徵志十月甲辰月暈東井占曰天下大饑大赦十一月戊戌月暈東井天象志神龜元年八月雍州獻三足烏靈徵志二年二月丙辰月在井占曰有相死天象志六月夏州上言山鹿縣木連理靈徵志正光元年沃野鎮馬為蟲入耳死者十四五蟲似蝗大如櫡靈徵志四月庚戌金火合於井二年十一月己酉月在井蝕天象志三年二月夏州獻白雉靈徵志四年正月戊戌月暈東井南河天象志五年二月庚寅月暈東井占曰兵起天象志孝昌元年春隕星於岐如雨五月雨雹傷禾靈徵志十二月火入鬼占曰大賊在大人之側后以淫佚失政又秦分也三年正月癸酉月在井暈兩河天象志莊帝永安二年閏月熒惑入鬼犯積尸占曰兵起西北有鈇鉞之誅十月辛亥月暈井占曰兵起大赦三年三月万俟醜奴遣其大行臺尉遲菩薩㓂岐州大都督賀抜岳可朱渾道元大破之四月大赦天下九月庚寅月暈井天象志節閔帝普泰元年十月癸丑月暈東井占曰有赦天象志文帝大統三年關中饑周書太祖本紀東魏孝靜帝天平四年十二月梁州獻白雉冊府元龜元象元年二月洛州上言木連理魏書靈徵志十一月庚午月在井暈東井南北河占曰有赦天象志八月東雍州獻嘉禾靈徵志三年六月太白入東井占曰秦有兵大臣當之先是行臺侯景司徒高昻圍金墉西帝及宇文泰自將救之是月陳於河隂泰以中軍合戰大克司徒高昻死之既而左右軍不利西師由是敗績斬將二十餘人降卒六萬是月西帝太傅梁景叡據長安反關中大震尋皆伏誅天象志興和元年二月壬子火犯井占曰秦有兵亂貴人當之四月又入鬼又兵喪之祥也三年春正月辛巳月暈東井占曰大赦武定元年正月大赦改元四年七月壬午火木合於井相去一尺天象志武定三年五月梁州獲白雀四年四月梁州獻白烏靈徵志五年正月乙巳月犯東井占曰大赦五月丁酉大赦天下天象志北齊按高氏分據河北本無秦地則井鬼星變無關於北齊分野矣但為北周諸書所不載故並錄之以補其缺文宣帝天保九年二月熒惑犯鬼質占曰斧質用有大喪十年六月庚子填星犯井鉞占曰君有戮死者大臣誅斧鉞用隋書天文志孝昭帝皇建三年七月乙丑熒惑入鬼中戊辰犯鬼質占曰有大喪天文志武成帝河清元年七月乙亥太白犯輿鬼占曰有兵謀誅大臣斧質用天文志後主天統四年六月彗星見東井占曰大亂國易政五年五月甲午熒惑犯鬼積尸占曰大臣誅兵大起斧質用有大喪天文志周孝閔帝元年春正月槐里獻赤雀四五月己酉槐里獻白䴏周書閔帝本紀辛亥熒惑犯東井北端第二星占曰其國亂又曰大旱隋書天文志明帝二年三月戊申長安獻白雀六月長安獻白烏周書明帝本紀六月庚子填星犯井鉞占曰傷成於鉞隋書天文志冬十月長安獻白兎周書明帝本紀武帝保定元年七月熒惑入輿鬼犯積尸武帝本紀二年七月乙亥太白犯輿鬼隋書天文志五年十一月岐州上言一角獸見周書武帝本紀天和二年七月梁州上言鳳凰棲於楓樹羣鳥列侍以萬數冊府元龜五月己丑歲星與熒惑合於井宿相去五尺井為秦分占曰其國有兵為饑旱大臣匿謀下有反者若亡地三年三月己未太白犯井北轅第一星占曰將軍惡之其七月壬寅隋公楊忠薨四月辛巳太白入輿鬼犯積尸占曰大臣誅又曰亂臣在側七月癸卯在鬼北八寸所乃滅占曰為兵國政崩壊又曰將軍死大臣誅四年五月癸巳熒惑犯輿鬼甲午犯積尸占曰午秦也大臣有誅兵大起後三年太師晉國公宇文䕶以不臣誅隋書天文志五年七月鹽州獻白兎周書武帝本紀六年四月己卯熒惑犯輿鬼占有兵隋書天文志建德元年七月丙午辰星太白合於井相去七寸占曰其下之國必有重德致天下天文志九月庚申扶風掘地得玉盃以獻二年二月壬戌熒惑犯輿鬼入積尸周書武帝本紀癸亥熒惑掩輿鬼西北星占曰賊在大人側大臣有誅隋書天文志三月己卯皇太子於岐州獲二白鹿以獻詔答曰在德不在瑞周書武帝本紀關中大蝗隋書五行志三年七月京師連雨三旬九月雍州獻蒼烏五年三月庚子月犯東井第一星周書武帝本紀六月庚午熒惑入鬼占曰有喪旱其七月京師旱隋書天文志六年青城門無故自崩青者東方色春宫之象也時皇太子無威儀禮節青城門無故自崩者皇太子不勝任之應帝不悟明年太子嗣位果為無道周室危亡實自此始五行志宣政元年六月壬午癸丑木火金三星合在井占曰其國霸又曰其國外内有兵喪改立王侯天文志宣帝大象元年四月戊子太白歲星辰星合在井占曰是謂驚立是謂絶行其國内外有兵喪改立王公又曰其國可霸修德者強無德受殃周自宣政元年熒惑太白從歲星聚東井大象元年四月太白歲星辰星又聚東井東井秦分隋以后族興於秦地之象天文志六月咸陽有池水變為血周書宣帝本紀隋文帝開皇初同州得石龜文曰天子延千年大吉隋書王邵傳元年二月甲子即帝位於臨光殿是日京師慶雲見三月辛巳長安獲白雀宣仁門槐樹連理衆枝内附文帝本紀盩厔獻連理樹植之宫庭冊府元龜二年二月涇陽獲毛龜京師醴泉出冊府元龜京師雨土京房易飛候曰天雨土百姓勞苦而無功其時營都邑後起仁壽宫頺山堙谷丁匠死者大半隋書五行志四年關内饑文帝本紀四年以後京師頻旱時遷都龍首建立宫室百姓勞弊亢陽之應也六年七月京師雨毛如髮尾長者三尺餘短者六七寸京房易飛候曰天雨毛其國大饑時關中旱米粟踴貴五行志八年二月庚子填星入東井占曰填星所居有德利以稱兵其年大舉伐陳克之天文志十四年五月辛酉京師地震關内諸州旱八月辛未關中大旱人饑上率户口就食於洛陽文帝本紀十六年神雀降含章殿闥玉海開皇中掖庭宫毎夜有人來挑宫人宫司以聞帝曰門衞甚嚴何從而入當是妖精耳戒宫人曰若逢但斫之其後有物如人夜來登牀宫人抽刀斫之若中枯骨其物落牀而走宫人逐之因入池而没明日帝令涸池得一龜徑尺餘其上有刀迹殺之遂絶龜者水居而靈隂謀之象晉王諂媚宫掖求嗣之應云隋書五行志十七年有羣鹿入殿門續元經大興城西南四里有袁村設佛會有老翁皓首白裙襦衣來食而去衆莫識追而觀之行二里許不復見但有一陂中有白魚長丈餘小魚從者無數人爭射之剖其腹得秔飯始知此魚向老翁也後數日漕暴溢人皆溺死二十年十一月京都大風發屋抜樹秦隴壓死者千餘人地大震鼓皆應淨刹寺鐘三鳴佛殿門鎖自開銅象自出户外鐘鼓自鳴者近鼓妖也開皇末渭南有人寄宿他舍聞二豕對語其一曰歲將盡阿爺明日殺我供歲何處避之一答曰可向水北姊家因相隨而去天將曉主人覔豕不得意是宿客而詰之宿客言狀主人如其言而得豕其後蜀王秀得罪帝將殺之平樂公主毎匡救得全後數年而帝崩歲盡之應開皇末渭南有沙門三人行頭陀法於場圃之上夜見大豕來詣其所小豕從者十餘謂沙門曰阿練我欲得賢聖道然猶負他一命言罷而去賢聖道者君上之所行也皇太子勇當嗣業行君上之道而被囚廢之象也一命者言為煬帝所害開皇末高祖於宫中埋二小石於地以誌置牀之所未幾變為玉劉向曰玉者至貴也賤將為貴之象及大業末盜皆僣名號隋書五行志仁壽元年五月壬辰驟雨震雷大風拔木宜君湫水移於始平文帝本紀二年四月岐雍地震京房易飛候曰地動以夏四月五榖不熟人大饑盩厔人以楊木為屋梁生三條長二尺京房易傳曰妃后有顓木仆反立斷枯復生獨孤后專恣之應三年梁州就谷山崩洪範五行傳曰崩散落背叛不事上之𩔖也梁州為漢地明年漢王諒舉兵反四年有人長數丈見於應門其迹長四尺五寸其年帝崩仁壽中仁壽宫及長城之下數聞鬼哭獻后及帝相次而崩於仁壽宫五行志煬帝大業十一年扶風有馬生角長數寸十二年顯陽門災舊名廣陽則帝之姓名也國門之崇顯號令之所由出也時帝不遵法度驕奢荒怠裴藴虞世基之徒阿諛順㫖掩塞聰明宇文述以讒邪顯進忠諫者咸被誅戮天戒若曰信讒害忠則除廣陽也五行志長安城禁苑内一大樹冬月雪中忽花葉茂盛及彫落結實其子光明燦爛如火之明焉數日皆化為紅蛺蝶飛去明年高祖自唐國入長安瀟湘錄恭帝義寧二年麟遊太守司馬武獻羊羔生而無尾時議者以謂楊氏子孫無後之象隋書五行志三月丙午熒惑入東井占曰大人憂唐書天文志唐高祖武德元年五月隴州獻嘉麥七月京師慶雲見冊府元龜丙午填星太白辰星聚於東井關中分也唐書天文志十一月藍田玉山南嶺有樹連理十二月麟州獻芝草一株紫莖黃葢是年新豐鸚鵡谷水清世傳云此水清天下平開皇之初暫清尋濁至是復清冊府元龜二年正月麟州獻白鹿冊府元龜三月丙申填星太白復聚於東井九月庚寅熒惑守五諸侯唐書天文志十月乙未京師地震隂盛而反常則地震故其占為臣強為后妃專恣為小人道長為寇至為叛臣三年二月丁丑京師西南有聲如崩山近鼓妖也説者以為人君不聰為衆所惑則有聲無形不知所從生夏旱至於八月乃雨五行志四年二月白狐見元武門五年正月梁州野蠶成繭百姓得而用之冊府元龜六年秋關中久雨少陽曰暘少隂曰雨陽德衰則隂氣勝故常雨唐書五行志七月癸卯熒惑犯輿鬼西南星占曰大臣有誅天文志七年秋關内旱五行志閏四月十三日長安古城鹽渠水中生鹽色紅白而味甘狀如方印會要萬年縣言甘露降九月丹州言河水清八年四月赤雀巢於殿門九年正月西韓州獻芝草異莖同葢冊府元龜三月順天門樓東柱已傾毁而自起占曰木仆而自起國之災唐書五行志四月甘露降於中華殿之桐樹凝泫如氷霰以示羣臣冊府元龜五月太白晝見六月丁巳經天己未又經天在秦分己卯歲星辰星合於東井占曰為變謀唐書天文志納義門獲白鹿一己卯涇陽縣生嘉禾異畝同頴九月麟州言麟見冊府元龜太宗貞觀元年關内饑唐書五行志閏三月甘露降於長安縣二年三月宜州言白狼見六月長安縣獻嘉禾冊府元龜京畿旱蝗太宗在苑中掇蝗祝之曰人以榖為命百姓有過在予一人但當蝕我無害百姓將吞之侍臣懼帝致疾遽以為諫帝曰所冀移災朕躬何疾之避遂吞之是歲蝗不為災唐書五行志九月有白雀巢於寢殿槐上合歡如腰鼓左右稱賀命毁其巢縱鵲於野外通鑑三年四月甘露降於雍州冊府元龜乙丑豳州言麟見玉海秋隴州水四年正月癸巳武德殿北院火唐書五行志三月赤雀見於萬年四月甘露降於萬年縣冊府元龜關中大稔太宗實錄秋丹延等州雨雹唐書五行志六年四月甘露出於丹霞殿之西冊府元龜十月乙丑京師地震唐書五行志九年五月萬年縣獲白雀冊府元龜十二月京師蒼烏見玉海十年二月白鹿見於京之冷泉谷冊府元龜關内大疫唐書五行志十一年二月癸未熒惑入輿鬼占曰賊在大人側天文志四月甲子雷震乾元殿前槐樹震耀天之威怒以象殺戮槐古者三公所樹也五行志五月麟見京師之後苑冊府元龜十二年六月辛卯熒惑入東井占曰旱唐書五行志十三年三月壬寅雲陽石燃方丈晝則如灰夜則有光投草木則焚歴年乃止是火失其性而沴金也五行志六月太白犯東井北轅井京師分也天文志十四年七月白龍見於富平十五年三月乙酉安禮門御榻產芝五莖六月庚子商州言慶雲見十六年七月朔鄜州言白龍見九月金州言青龍見冊府元龜十七年四月立晉王為太子有青氣繞東宫殿始冊命而有祲不祥唐書五行志芝草生於太廟一十四莖為龍鳳形玉海有雄雉飛集東宫顯德殿前太宗問羣臣曰頃來頻有雉集是何祥也諫議大夫褚遂良曰昔秦文時有童子化為雉雌者鳴於陳倉雄者鳴於南陽童子言曰得雄者王得雌者霸文公遂以為寶雞祠漢光武得雄遂起南陽而有四海陛下舊封秦王故雄雉見於秦地既古來將為祥貺所以表彰明德太宗曰立身之道不可無學遂良所對深為可重五月雍州獻三足烏己未華平出於𤣥武門之池閏六月丹州獻白鹿冊府元龜己卯朔日有食之在東井十六度京師分也唐書天文志司農寺有豕生子一首八足自頸分為二五行志七月鄜州言景星見冊府元龜民訛言官遣棖棖殺人以祭天狗云其來也身衣狗皮鐵爪毎於闇中取人心肝而去於是更相震怖毎夜驚擾皆引弓劍自防無兵器者剡竹為之郊外不敢獨行太宗惡之令通夜開諸坊門宣㫖慰諭月餘乃止唐書五行志十八年五月太白辰星合於東井占曰為兵謀十九年六月丙辰太宗征高麗次安市城太白辰星合於東井史記曰太白為主辰星為客為蠻夷出相從而兵在野為戰天文志十月老人星見山南道獻木連理交錯玲瓏有同羅木一丈之幹並枝者二十餘所玉海二十年十一月雍州言甘樹一株有十八處連理李樹生紫芝光生二十一年七月綏州言慶雲見八月綏州言慶雲見二十二年正月玉華宫李樹連理冊府元龜五月乙巳鎮星守東井占曰旱唐書天文志九月邠州大疫詔醫療之冊府元龜二十三年三月甲弩庫火唐書五行志高宗永徽元年二月己丑熒惑犯東井占曰旱四月己巳月犯五諸侯熒惑犯輿鬼占曰諸侯凶天文志京畿雍同等州旱蝗六月新豐渭南大雨零口山水暴出漂廬舍二年延綏等州霜殺稼五行志三年二月己丑熒惑犯五諸侯天文志四年八月己亥隕石於同州馮翊十八光耀有聲如雷近星隕而化也庶民惟星在上而隕民去其上之象一曰人君為詐妄所蔽則然五年五月丁丑夜大雨麟遊縣山水衝萬年宫𤣥武門入寢殿衞士有溺死者七月辛巳萬年宫有小鳥如雀生子大如鳲鳩十二月乙巳尚書司勲庫火六年六月商州大水五行志七月己丑熒惑入輿鬼天文志八月京城大雨五行志顯慶元年四月丁酉太白犯東井北轅占曰秦有兵天文志二年五月庚寅有五龍見於岐州之皇后泉三年長孫無忌第有大鼠見於庭出入無常後忽然死五行志龍朔元年五月甲子晦日有蝕之在東井二十七度三年六月乙酉太白入東井占曰君失政大臣有誅天文志十二月詔以含元殿前琅臺閣内並覩麟改來年正月為麟德元年冊府元龜麟德二年三月戊午熒惑犯東井四月壬寅熒惑入輿鬼犯質星唐書天文志六月鄜州大水壊居人廬舍五行志乾封元年八月乙巳熒惑入東井天文志總章元年冬京師旱饑五行志二年六月戊申朔日蝕在東井二十九度天文志諸州四十餘饑關中尤甚五行志咸亨元年四月庚午雍州大雨雹五行志癸卯月犯東井占曰人主憂六月壬寅朔日有蝕之在東井十八度七月壬申熒惑入東井占曰旱天文志八月以天下四十餘州旱及霜蟲百姓饑乏關中尤甚詔雍同華蒲絳五州百姓乏絶者聽於興鳳梁等州逐糧冊府元龜二年四月戊子大雨雹震電大風折木落則天門鴟尾三四年八月乙酉大風落太廟鴟尾唐書五行志五年六月壬寅太白入東井天文志上元三年七月丁亥有彗星於東井指北河長三尺餘東北行光芒益盛長三丈掃中台指文昌九月乙酉不見東井京師分中台文昌將相位兩河天闕也天文志儀鳳二年正月庚辰京師地震高宗本紀三年五月丙寅高宗在九成宫霖雨大寒兵衞有凍死者五行志調露初京城民謡有側堂堂撓堂堂之謡太常丞李嗣真曰側者不正撓者不安自隋以來樂府有堂堂曲再言堂者唐再受命之象元年秋關中饑八月邠州霜二年夏豐州河清四年延州霜殺草五行志永隆初長安獲女魃長尺有二寸其狀怪異是歲秋不雨至於明年九月五行志元年五月癸未熒惑犯輿鬼天文志二年七月雍州大風害稼關中旱霜大饑九月萬年女子劉凝靜衣白衣從者數人升太史令㕔問比來有何災異令執之以聞是夜彗星見太史司厯候王者所以奉若天道敬授人時者非女子所當問五行志永淳元年三月京畿蝗關中及山南州二十六饑京師人相食五月關中旱六月雍岐隴等州蝗乙亥京師大雨平地水深數尺五行志九月庚戌熒惑入輿鬼犯質星天文志冬大疫兩京死者相枕於路十月甲子京師地震高宗本紀十一月熒惑復犯輿鬼去而復來是為勾己天文志永淳中勝州兎害稼千萬為羣食苗盡兎亦不復見五行志中宗即位金雞竿折雞竿所以肆赦始發大號而雞竿折不祥五行志睿宗文明初新豐有馬生駒二首同項各有口鼻生而死又咸陽牝馬生石大如升上微有綠毛皆馬禍也五行志光宅初岐州刺史崇真之子橫杭等夜宴忽有氣如血腥五行志武后垂拱元年四月癸未辰星犯東井北轅辰為廷尉井為法令失道則相犯也天文志二年九月乙巳雍州新豐縣露臺鄉大風雨震電有山湧出高二十丈有池周三百畝池中有龍鳳之形禾麥之異武后以為休應名曰慶山荆人俞文俊上言天氣不和而寒暑隔人氣不和而贅疣生地氣不和而堆阜出今陛下以女主居陽位反易剛柔故地氣隔塞山變為災陛下以為慶臣以為非慶也宜側身修德以答天譴不然恐災禍至后怒流於嶺南五行志三年七月乙亥京師地震武后本紀四年六月朔日有蝕之在東井二十七度京師分也天文志七月戊午京師地震五行志永昌中華州赤水南岸大山晝日忽風昏有聲隱隱如雷頃之漸移東數百步擁赤水壓張村民三十餘家山高二百餘丈水深三十丈坡上草木宛然金縢曰山徙者人君不用道祿去公室賞罰不由君佞人執政政在女主不出五年有走王五行志天授元年五月檢校内史宗秦客拜日無雲而雷近鼓妖也五行志長壽二年正月大雪質明而晴俗云元日有雪則可榖豐文昌左丞姚璹對曰雪為五榖之精以其協和則年榖大穰玉海十月萬象神宫側檉杉皆變為栢栢貫四時不改柯易葉有士君子之操檉杉柔脆小人性也象小人居君子之位唐書五行志延載元年九月内出梨華一枝示宰相萬木揺落而生華隂陽黷也傳曰天反時為災又近常燠五行志證聖元年正月丙申夜明堂火武太后欲避正殿徹樂宰相姚璹以為火因人非天災不宜貶損后乃御端門觀酺引建章故事復作明堂以厭之是歲内庫災燔二百餘區五行志神功元年二月庚子有人入端門又入則天門至通天宫閽及仗衞不之覺綏州雹五行志聖厯二年熒惑入輿鬼天文志久視元年夏關内旱五行志長安初醴泉坊太平公主第井水溢流二年關内大旱熒惑犯五諸侯渾儀監尚獻甫奏臣命在金五諸侯太史之位火克金臣將死矣武后曰朕為卿禳之以獻甫為水衡都尉水生金又去太史之位卿無憂矣是秋獻甫卒五行志三年八月京師大雨雹人畜有凍死者白孔六帖中宗神龍元年四月壬子雍州同官縣大雨雹殺鳥獸大雨水湮没民居五百餘家二年長安城中往往見水影昔苻堅之敗也長安嘗有是是冬不雨至於明年五月京師旱饑唐書五行志三年五月戊戌太白入輿鬼占曰大臣有誅六月丁卯朔日有食之在東井二十八度京師分也天文志神龍中渭水中有蝦蟆大如鼎里人聚觀數日而失是歲大水五行志景龍元年京師疫二年岐州郿縣王尚賔家有苦蕒菜高三尺餘上廣尺餘厚三分近草妖也三年内出蒜條上重出蒜蒜惡草也重生者其類衆也五行志六月癸巳太白晝見在東井京師分也天文志七月灃水溢害稼冬關中饑四年六月辛巳朔烏集太極殿梁驅之不去三月京師井水溢占曰君凶又曰兵將死京兆藍田山竹實如麥占曰大饑五行志五月甲子月犯五諸侯天文志睿宗景雲元年十月己巳冊皇太子是日有景雲之瑞遂改元玉海景雲中西京霖雨六十餘日有一僧名寶嚴自云有術法能止雨設壇場誦經咒其時禁屠宰寶嚴用羊二十口馬兩匹以祭祈請經五十餘日其雨更甚於是斬僧其雨遂止張鷟朝野僉載二年三月壬申熒惑入東井唐書天文志太極元年四月熒惑太白合於東井天文志狂人段萬謙潛入承天門登太極殿升御牀自稱天子且言我李安國也人相我三十二當為天子五行志𤣥宗先天二年六月京師朝堂塼下有大蛇長丈餘大蝦蟆如盤而目赤如火相與鬭俄而蛇入於樹蝦蟆入於草蛇蝦蟆皆隂類朝堂出非其所也京師岐隴饑五行志開元元年内中因雨過地微潤裂至夜有光宿衞者記其處所曉乃奏之上令鑿其地得寶玉一片如拍板上有古篆天下太平四字百僚稱賀收之内庫開天遺事二年三月富平縣有肉角羊五月壬子久雨禜京城門終南山竹有華實如麥竹枯死是歲大饑民採食之占曰國中竹栢枯不出三年有喪唐書五行志六月京師大風抜木𤣥宗本紀七月太白犯輿鬼東南星天文志四年六月辛未京師華州大風抜木𤣥宗本紀五年正月癸卯太廟四室壊五行志春司天奏𤣥象有𤯝見其災甚重元宗震驚問曰何祥對曰當有名士三十人同日寃死今新及第進士正應其數其年及第李䝉者貴主家壻上不言其事密戒主曰毎有大遊宴汝愛壻可閑留其家主居昭國里時大合樂音曲逺暢曲江漲水聨舟數艘進士畢集䝉聞乃踰垣奔走羣衆惬望才登舟移就水中畫舫平沉聲妓篙工不知紀極三十進士無一生者朝野僉載十一月乙卯定陵寢殿火唐書五行志七年六月甲戌太白犯東井鉞占曰斧鉞用天文志八月老人星見色黃玉海八年三月庚午太白犯東井北轅唐書天文志京師興道坊一夕陷為池居民五百餘家皆没不見五行志十二月岐州獲白燕進之冊府元龜十一年二月赤兎見於后土壇玉海十二年七月旱帝親禱雨宫中設壇席暴立三日九月同州旱綏州霜殺稼唐書五行志十三年十月壬申萬年王慶築垣掘地獲寶鼎五獻之四鼎皆有銘銘曰垂作尊鼎萬福無疆子孫永寶冊府元龜十四年六月戊午大風抜木發屋端門鴟尾盡落十五年七月洛水溢入鄜城平地丈餘死者無算同州城市及馮翊縣漂居民二千餘家甲戌興教門樓柱災唐書五行志億歲殿生芝草一莖玉海十六年關中久雨害稼唐書五行志三月京兆府三原浪井出冊府元龜開元中含元殿火基下出丹堊有隱語不可解言天漢三年赤元生粟木下有子傷心過酷百家繪十七年四月乙亥大風震電藍田山摧百餘步畿内山也國主山川山摧川竭亡之證也占曰人君德消政易則然唐書五行志五月有靈芝草産於太廟殿柱冊府元龜十九年二月癸未皇太子奏正月二十七日興慶宫親耕耤田三百餘步既而青光紫氣覆地玉海六月壬申芝草生於京城之勝業寺一本七莖心黃外紫九月庚申神羊産於京兆之興平冊府元龜二十二年五月戊辰京畿渭南等六縣大風雹傷麥秋關輔河南十餘州水害稼唐書五行志二十三年六月壬子京兆富平縣瑞大麥生一莖五穗華州下邽縣瑞大麥生一莖三穗京畿採訪使御史中丞盧奐奏賀十月乙未京兆府奏盩厔縣嘉禾生冊府元龜十二月己巳龍池聖德頌石自鳴其音清逺如鐘磬近石言也唐書五行志二十四年八月庚戌老人星見玉海十月戊申京師地震唐書𤣥宗本紀二十五年隴州鵲哺慈烏二十六年三月癸巳京師地震二十八年四月庚辰慈烏巢宣政殿栱辛巳又巢宣政殿栱五行志二十九年六月甘露降司農寺玉海天寶三載二月辛亥有星如月墜於東南墜後有聲京師訛言官遣棖棖取人心肝以祭天狗人頗恐懼畿内尤甚遣使安諭之唐書五行志癸酉興慶宫芝草生一本六莖五月京兆尹奏所部芝草生八月戊子有班鹿産白鹿於苑中獻之請宣付史館上曰宫苑之内屢薦嘉祥今又縞質霜毛變林虞之獸族殊姿馴性實雲駕之龍媒允謂休徵用為慰也所請者依癸巳京兆之新豐嘉禾生或九穗六穗冊府元龜五載四月宰臣李適之常列鼎具膳羞中夜鼎躍相鬭不解鼎耳及足皆折六載少陵原楊慎矜父墓封域内草木皆流血慎矜令浮屠史敬思禳之退朝祼而桎梏於叢棘間如是數旬而流血不止唐書五行志七載三月有玉芝生於大同殿之柱礎一本兩莖神光照於殿上命文武百僚入觀之八載六月大同殿又産芝一莖九載二月甲戌獻陵昭陵乾陵定陵橋陵等五陵栢樹盡垂甘露壬寅華隂郡奏白鶴見於西嶽五福峯甘露降大羅峯之醮壇白鹿見於大羅東南峯駕鶴嶺衞叔卿得仙處請付史館從之冊府元龜三月華嶽廟災關内旱唐書𤣥宗本紀十載六月乙亥大同殿前鐘自鳴占曰庶雄為亂八月丙辰武庫災燔兵器四十萬餘武庫甲兵之本也五行志十月乙丑御朝元閣有慶雲見上賦詩羣臣畢和冊府元龜十一載六月黃河中女媧墓因大雨晦㝠失其所在至乾元二年六月乙未瀕河人聞有風雷聲曉見其墓踊出下有巨石上有雙柳各長丈餘時號風陵堆占曰塜墓自移天下破李林甫晨起盥飾將朝取書囊視之有物如鼠躍於地即變為狗壯大雄目張牙視林甫林甫射之中殺然有聲隨箭没唐書五行志十三載六月乙丑朔日有食之幾既在東井十九度京師分也天文志秋大霖雨害稼六旬不止九月閉坊市北門葢井禁婦人入街市祭𤣥㝠太社禜明德門壊京城垣屋殆盡人亦乏食五行志十四載二月熒惑太白鬭於井鬼間至四月乃伏天文志八月己亥中書省五色雲見壬寅京兆府奏嘉禾生而獻之十月癸酉幸華清宫有石産玉芝宰相楊國忠請宣付史館從之冊府元龜十二月月食歲星在東井占曰其國亡京師分也唐書天文志哥舒翰率師守潼關前軍啓行牙門旗至坊門觸落槍刃衆以為不祥五行志𤣥宗幸溫泉見白鹿升天改會昌為昭應縣會昌解頤錄明皇遭祿山之亂鑾輿西幸禁中枯松復生枝葉蔥蒨宛若新植者後肅宗平内難重興唐祚枯松再生祥不誣矣開天遺事肅宗即位十一月辛未長安雲氣如衣冠備具太史奏天下和平之象冊府元龜至德二載四月壬寅歲星熒惑太白辰星聚於鶉首從歲星也罰星先去而歲星留占曰歲星熒惑為陽太白辰星為隂隂主外邦陽主内邦陽與隂合中外相連以兵七月己酉太白晝見經天在秦分唐書天文志昭陵石馬汗出五行志釋元皎於鳳翔開元寺置御藥道場忽於法會内生一叢李樹有四十九莖元皎等表賀帝喜曰此大瑞應答勅云瑞李繁滋國之興兆生在伽藍之内足知覺樹之榮感此殊祥與師同慶高僧傳乾元元年太廟殿院北門内柱生芝草玉海二年十月詔百官上勤政樓觀安西兵赴陜州有狐出於樓上獲之唐書五行志三年四月丁巳有彗星於東方厯東井輿鬼柳凡五旬餘不見天文志七月乙亥晝渾天儀有液如汗下流五行志十一月丙寅左金吾衞大將軍王晟奏明鳳門有慶雲自欄杆上起盤旋紛郁光彩明耀門官皆覩焉冊府元龜上元二年七月甲辰延英殿御坐梁上生玉芝一莖三花親製玉靈芝詩三章章八句曰玉殿肅肅靈芝煌煌重英發秀連葉分房玉海代宗寶應元年四月己巳即位其日有慶雲見初帝至飛龍廐座前有紫雲見雲中有三白鶴徊翔又有喜鵲鳴及將即位仗衞宿設夜分雲霧四合不辨咫尺既曉朝呼萬歲天地清朗飛烟滿空黃氣抱日咸以為聖感五月商州上言慶雲見七月己卯京兆府萬年縣獲三足烏獻之冊府元龜十二月己酉大府左藏庫火唐書五行志廣德元年秋虸蚄蟲害稼關中尤甚九月大雨水平地數尺時吐蕃寇京畿以水自潰去二年秋蝗關輔尤甚關輔饑斗米千錢五行志永泰元年京師饑斗米千錢五行志七月甲寅有三白鹿一白兎見於禁苑觀軍容使魚朝恩受命巡苑内屯田因獲之以獻朝恩上言請付史館編諸簡册手詔答曰白鹿白兎王者嘉瑞和平之應朕以寡德詎敢當焉卿及將士等務切軍儲克勤農事上元眷祐爰獲禎符所請付史館者依是月京兆府上言鄠縣嘉禾生穗長一尺餘穗上粒生重叠如連珠冊府元龜盩厔穭麥生唐書代宗本紀二年三月辛酉中書敕庫壊關中大旱自三月不雨至於六月五行志太廟二室生芝玉海十一月乾陵赤兎見獲而獻之冊府元龜大厯二年七月乙丑鎮星犯水位占曰有水災九月戊申歲星守東井占為有兵唐書天文志十月己卯右羽林軍獲白雀獻之乙酉有醴泉出於京兆府之櫟陽飲者多愈痼疾冊府元龜十一月壬申京師地震自東北來其聲如雷唐書五行志三年四月乾陵上仙觀三尊殿有兩雀啣柴及泥補葺殿之隙壊凡一十五處冊府元龜五月丙戌京師地震唐書五行志七月五星聚於東井會要八月辛酉月入東井九月壬申歲星入輿鬼占曰歲星為貴臣輿鬼為死喪唐書天文志四星聚井㑹要四年正月乙亥大雪平地盈尺百僚於宣政殿拜舞稱賀前年冬少雪故也玉海二月丙辰京師地震唐書代宗本紀三月鎮星犯輿鬼天文志四月雨至於九月閉坊市北門置土臺臺上置壇立黃幡以祈晴五行志五月丙戌京師地震代宗本紀六月慶雲見於西郊冊府元龜八月己卯虎入京師長壽坊宰臣元載家廟射殺之虎西方之屬威猛吞噬刑戮之象唐書五行志五年六月庚戌太白入東井天文志六年四月戊寅藍田西原地陷五行志七月己丑華州言甘露降冊府元龜八月丁丑獲白兎於太極殿之内廊唐書五行志七年四月丁巳熒惑入輿鬼天文志八年京兆大旱京兆尹黎幹造土龍自與巫覡對舞彌月不應又禱孔子廟帝笑曰丘之禱久矣使毁土龍減膳節用既而㴻雨潛確類書五月丁丑鳳翔府上言天興縣嘉禾生一莖二穗六月戊申梁州獲白雀二獻之七月乙未蓬萊池獲毛龜出示百僚冊府元龜己卯太白入東井留七日非常度也占曰秦有兵唐書天文志九月丁丑京兆府上言梨樹及林檎樹並連理辛巳華州言嘉禾生冊府元龜武功獲大鳥肉翅狐首四足有爪長四尺餘毛赤如蝙蝠羣鳥隨而噪之近羽蟲孽也唐書五行志十月丁卯鳳翔獲白鼠獻之冊府元龜壬戌月入輿鬼掩質星十一月甲寅月入東井唐書天文志鳳翔府上言天興縣禾生一莖三穗冊府元龜武功櫟陽民家牛生犢二首五行志九年三月丁未熒惑入東井天文志京兆府獲白鵲一獻之四月甲午隴州獲白鵲一獻之五月丁巳隴州獲白鵲獻之京兆府上言瑞麥生九莖同頴冊府元龜七月壬戌太白入輿鬼唐書天文志十月辛卯鳳翔府上言嘉禾生一莖兩穗冊府元龜十一月同州夏陽有山徙於河上聲如雷十年二月昭應婦人張産一男二女唐書五行志三月鳳翔府獲白雀一獻之冊府元龜四月甲申雷電暴風抜木飄瓦人有震死者京畿害稼者七縣唐書五行志十二月月出東方上有十餘道若匹練貫井鬼柳天文志十一年七月戊子夜㴻雨京師平地水尺餘溝渠漲溢壊民居千餘家五行志十二年正月乙丑渭北行營所獲二赤雀獻之六月癸未苑内獲白鼠一出示百僚冊府元龜秋京畿大雨水害稼唐書五行志七月乙亥熒惑入東井天文志十一月辛亥京兆府上言甘露降於城内靖恭坊之南街柳樹味如飴蜜冊府元龜十三年二月太僕寺有泥像左臂上有黑汗滴下以紙承之皆血也五月左羽林軍有鸜鵒乳鵲唐書五行志十四年春歲星在東井天文志德宗建中元年四月己亥京師地震五行志十一月月蝕歲星在秦分占曰其國亡是月歲星食天尸天尸輿鬼中星占曰有妖言小人在位君王失樞死者大半二年六月熒惑太白鬭於東井天文志三年自五月不雨至於七月六月甲子京師地震九月己亥夜白虎入宣陽里傷人三詰朝獲之五行志四年四月甲子京師地震生毛德宗本紀五月辛巳又震五行志六月熒惑太白復鬭於東井京師分也金火罰星鬭者戰象也天文志八月庚申有星隕於京師德宗本紀朱泚既僭號名其舊第曰潛龍宫占者以為易稱潛龍勿用此敗祥也朱泚未敗前兩月有童謡曰一隻筯兩頭朱五六月化為蛆五行志興元元年中書省枯柳復榮貞元元年春旱無麥苗至於八月旱甚灞滻將竭井皆無水夏蝗西盡河隴羣飛蔽天五行志十一月京兆府奏有人於長興坊得玉璽文曰天子信璽中書門下表賀將付所司制曰可冊府元龜二年二月乙丑有野鹿至於含元殿前獲之壬申又有鹿至於含元殿前獲之占曰有大喪五月己酉京師地震六月丁酉大風雨京城通衢水深數尺有溺死者唐書五行志三年七月京兆府獻嘉禾異本同穗冊府元龜十一月丁丑夜京師地震唐書五行志十二月同州沙苑監上言白鹿見冊府元龜四年正月庚戌朔夜京師地震辛亥壬子丁卯戊辰庚午癸酉甲戌乙亥皆震金州尤甚江溢山裂屋宇多壊人皆露處庚戌朔德宗御含元殿受朝賀質明殿階及欄檻三十餘間自壊衞士死者十餘人含元路寢大朝會之所御也正月朔一歲之元王者之事天所以儆者重矣二月郊牛生犢六足足多者下不一郊所以奉天壬午京師地又震甲申乙酉丙申皆震有豕生子兩足四首首多者上不一也三月甲寅己未庚午辛未京師地又震中書省梧桐樹有鵲以泥為巢鵲巢知歲次於羽蟲為有知今以泥露巢遇風雨壊矣唐書五行志四月宗正寺獻毛龜冊府元龜五月丙寅丁卯京師地又震唐書五行志七月神策軍獻瑞瓜三蔓合為一蔕而生三瓜冊府元龜八月甲午京師地又震有聲如雷甲辰又震灞水暴溢殺百餘人唐書五行志六年正月坊州言櫟連理冊府元龜閏三月庚申太白辰星合於東井占為兵憂唐書天文志關輔旱五行志八月京兆府奏嘉禾異本同頴冊府元龜七年關輔牛大疫死者十五六唐書五行志八月同州言祥雲見冊府元龜八年正月丁亥許州人李狗兒持杖上含元殿擊欄檻伏誅五月己未暴風發太廟屋瓦毁門闕官署廬舍不可勝紀九年四月辛酉地震有聲如雷關輔尤甚壊城壁廬舍地裂水湧十年四月戊申京師地震癸丑又震有大鳥集宫中食雜骨獲之不食死六月辛未晦水鳥集左藏庫唐書五行志十一年二月同州獻五色鴈六月華州獻白烏十二年六月京兆府進白鼠京兆府奉先等八縣旱損秋禾稼萬頃十二月甲子左神策軍進白雀冊府元龜十三年四月幸興慶宫龍堂禱雨有一白鸕鷀浮沉水際羣𩔖翼從左右以為龍之變化玉海七月乙未京師地又震十四年京師饑唐書五行志九月丁卯中書門下奏賀苑中白鹿冊府元龜十五年正月戊申狂人劉忠詣銀臺稱白起令上表天下有火灾三月京畿興平醴泉等縣雨雹唐書五行志三月以久旱令李巘鄭雲逵禱於炭谷秦嶺祈雨五月丁未延州進元兎七月鳳翔府雞足山慶雲見冊府元龜十七年五月壬戌朔日有食之在東井十度唐書天文志五月戊寅好畤縣風雹害麥五行志十八年甘露降元和殿桐木丁香木玉海十九年秋關輔饑二十一年正月甲戌雨赤雪於京師唐書五行志順宗永貞元年京畿長安等九縣山水害稼五行志憲宗元和元年商州洪崖冶役夫將化為虎衆以水沃之不果化鄜坊等州雹五行志二年四月丙子太白犯東井北轅天文志七月邠州霜殺稼三年四月大風毁含元殿欄檻二十七間占為兵起四年四月册立皇太子以雨霑服罷十月再擇日册立又以雨霑服罷丁未渭南暴水漂民居二百餘家五年三月丙子大風毁崇陵上宫衙殿鴟尾及神門㦸竿壊行垣四十間六年十月鄜坊水七年八月京師地震草木皆揺八年夏華同二州旱四月長安西市有豕生二子三耳八足自尾分為二足多者下不一也鄜坊等州雹六月庚寅京師大風雨毁屋飄瓦人多壓死者丙申富平大風抜棗木千餘株京師大水城南深丈餘入明德殿門猶漸車服渭水漲絶濟五行志七月月犯五諸侯天文志九年春關内饑五行志十年六月辛未歲星熒惑太白辰星合於東井占曰中外相連以兵天文志秋鄜坊等州風雹害稼十月京師地震五行志十一月盜焚獻陵寢宫十一年盜斷建陵門㦸憲宗本紀二月丁丑京師地又震五行志四月丙辰太白犯輿鬼占曰有戮臣五月丁卯歲星辰星合於東井天文志京畿大雨水昭應尤甚六月京畿水害稼八月甲午渭水溢毁中橋五行志乙酉歲星辰星合於東井占曰為謀變更事天文志十一月甲戌元陵火憲宗本紀十二年六月乙酉京師大雨水含元殿一柱傾市中水深三尺毁民居二千餘家五行志十三年六月朔日有食之在輿鬼一度京師分也天文志十五年京畿興平醴泉等縣雹傷麥七月丁未苑中土山摧壓死二十人八月久雨閉坊市北門己卯同州雨雪害稼五行志十一月壬子月犯東井北轅天文志穆宗即位戊辰始朝羣臣於宣政殿是夜地震五行志長慶元年正月丙午月掩東井鉞遂犯南轅第一星天文志七月壽昌殿柱生玉芝一莖六尺玉海二年六月大風震電落太廟鴟尾破御史臺樹七月好畤山水漂民居三百餘家十月夏州大風飛沙為堆高及城堞五行志三年四月同州言文宣王廟甘露降冊府元龜四年三月庚午太白犯東井北轅遂入井中晝見經天七日而出因犯輿鬼京師分也天文志民徐忠信潛入浴堂門六月京師雨雹如彈丸庚寅大風毁延喜門及景風門五行志丙戌鎮星依歴在觜觿嬴行至參六度當居不居失行而前遂犯井鉞占曰嬴為王不寧鉞主斬刈而又犯之其占重癸未熒惑犯東井丁亥入井中八月庚辰熒惑犯鎮星於東井鎮星既失行犯鉞而熒惑復往犯之占曰内亂十二月戊子月掩東井天文志敬宗寶厯元年四月壬寅熒惑入輿鬼掩積尸天文志秋鄜坊二州暴水華州及京畿奉天等六縣水害稼五行志七月甲辰填星犯東井天文志八月邠州霜殺稼十一月庚辰鎮星復犯東井癸未月犯東井五行志二年八月月入東井熒惑鎮星復合於東井輿鬼間庚戌熒惑犯輿鬼天文志十二月延州人賀文妻一産四男五行志文宗太和元年同州虸蚄蟲害稼夏京畿同州旱八月癸卯京師見赤氣滿天五行志二年内昭德寺火延禁中野狐落野狐落者宫人所居也死者數百是日宰相兩省官京兆尹樞密皆集於日華門督神策兵救火獨御史府不至溫造自劾曰臺擊賊恐人緣以為姦白孔六帖夏京畿水害稼唐書五行志七月熒惑掩輿鬼質星十月丁卯月掩東井北轅天文志十月狂人劉德廣入含元殿三年四月同官縣暴水漂没二百餘家十月癸丑仗内火五行志十一月庚子京兆上言奉先富平美原雲陽華原三原同官渭南八縣早霜損稼二千三百四十頃冊府元龜四年夏鄜坊水漂没三百餘家五月己卯通化南北二門鎖不可開鑰入如有持之者破其管門乃啓五行志丙午歲星太白合於東井天文志秋鄜坊等州雹五行志十二月京畿大水害田稼冊府元龜五年正月庚子朔京師隂雪彌旬夏京畿奉先渭南等縣雨雹唐書五行志六年關輔旱八年三月定陵臺大雨震廡下地裂二十有六步占曰士庶分離大臣專恣不救大敗五月己巳飛龍駒廐中火夏陜華同等州旱六月癸未暴風壊長安縣署及經行寺塔十二月禁中昭應寺火九年三月乙卯京師地震屋瓦皆墜户牖間有聲四月大風拔木萬株墮含元殿四鴟尾抜殿廷樹三壊金吾仗舍廢城門樓觀内外三十餘所光化門西城十數雉壊秋京兆陜華同州旱京師訛言鄭注為上合金丹生取小兒心肝密㫖捕小兒無算往往隂相告曰某處失幾兒矣方士言金丹可致神仙葢誕妄不經之語或信而服之則發熱多死如有所戒云小兒無辜者取其心肝將有殺戮象鄭注為鳳翔節度使將之鎮出開逺門旗竿折十二月京師苦寒五行志開成元年二月乙亥京師地又震有蟻聚長五六十步濶五尺至一丈厚五寸至一尺者夏鳳翔麟遊縣暴雨水毁九成宫壊民舍數百家死者百餘人燕集蕭望之塚二年三月真興門外鵲巢於古塚鵲巢知避歲而古占又以高下卜水旱今不巢於木而巢於塚不祥宫中有衆蛇相與鬭五行志六月庚申太白入東井甲申客星出於東井天文志十一月乙丑夜京師地又震五行志三年二月戊午熒惑入東井三月乙酉入輿鬼五月辛酉太白犯輿鬼天文志夏河決侵鄜坊五行志四年二月乙酉月掩東井天文志四月有麞出於太廟獲之五行志八月壬申熒惑犯鉞遂入東井天文志十一月甲戌京師地又震十二月乙卯乾陵火五行志歲星熒惑俱逆行失色合於東井京師分也五年二月壬申熒惑入輿鬼四月太白歲星入輿鬼天文志六月有禿鶖羣飛集禁苑七月霖雨葬文宗龍輴陷不能進五行志武宗會昌元年七月山南等州蝗五行志閏八月丁酉熒惑入輿鬼中占曰有兵喪二年六月丙寅太白犯東井天文志十二月癸未京師地震三年六月西内神龍寺火萬年縣東市火焚廬舍甚衆五行志七月癸巳熒惑入東井色蒼赤動揺井中八月丁丑熒惑入輿鬼天文志六年八月葬武宗辛未靈駕次三原縣夜大風行宫幔城火五行志宣宗大中三年十月辛巳上都及夏州地震壊廬舍壓死數十人五行志十年八月熒惑犯東井天文志懿宗咸通元年五月上都地震五年十月貞陵隧道摧陷神策軍有浮屠像懿宗常跪禮之像没地四尺六年八月同華蝗十一月己卯晦潼關夜中大風山如吼雷河噴石鳴羣鳥亂飛重關傾側七年夏同華及京畿蝗九年六月久雨禜明德門關内蝗秋關内饑五行志懿宗時關中大旱貧者以蓬子為麫槐葉為虀食貨志僖宗即位是日黑氣如盤自天屬含元殿庭五行志乾符三年春京師饑十二月京師地震有聲五年内臣有刻木象頭以裹幞頭百官效之工門如市度木斫之曰此斫尚書頭此斫將軍頭近服妖也六年中書政事堂忽旦有死人血汚滿地不知主名二月京師地震藍田山裂出水又御井水色赤而腥渫之得一死女子腐爛近赤祥也五月丁酉宣授宰臣豆盧瑑崔沆制殿庭氛霧四塞及百官班賀於政事堂雨雹如鳬卵大風雷雨抜木五行志廣明元年華嶽廟𤣥宗御製碑隱隱然有聲聞數里間浹旬乃止白孔六帖四月京師雨雹大風抜木唐書五行志中和元年有異星出於輿鬼占者以為惡星天文志九月長安馬生人京房易傳曰諸侯相伐厥妖馬生人一曰民流亡二年關内大饑四年關内大饑人相食黃巢未入京師都人以黃米及黑豆屑蒸食之謂之黃賊打黑賊五行志光啓元年有彗星於積薪積水之間天文志二年春鳳翔郿縣女子未齓化為丈夫旬日而死延州膚施有牛死復生四月僖宗在鳳翔馬尾皆咤蓬如篲咤怒象七月鳳翔麟遊草生如旗狀占曰其野有兵冬鄜州洛交有蛇見於縣署復見於州署蛇冬則蟄易曰龍蛇之蟄以存身也五行志文德元年八月熒惑守輿鬼占曰多戰死天文志昭宗乾寧元年有星孛於鶉首京師分也天文志光化三年武德殿前鐘聲忽嘶嗄冬京師旱至於四年春四年冬昭宗在東内武德門内烟霧四塞門外日色皎然五行志天復元年武德殿前鐘聲又變小五行志自五月丁酉至於己亥太白晝見經天在井度天文志二年帝在鳯翔十一月丁巳日南至夜驟風有鳥數千迄明飛噪數日不止自車駕在岐常有鳥數萬棲殿前諸樹岐人謂之神鴉五行志三年冬熒惑徘徊於東井間久而不去京師分也天文志天復甲子歲自隴而西迄於褒梁之境數千里内亢陽民多流散自冬經春饑民啖食草木至有骨肉相食者甚多是年忽山中竹無巨細皆放花結子饑民採之舂米而食珍如粳糯其子粗顔色紅纎與今紅粳不殊其味尤更馨香數州之民皆挈累入山就食之至於溪山之内居人如市玉堂閒話天祐元年十月京師大饑唐書五行志二年四月甲辰彗星見於北河兩河為天闕在東井間而北河中國所經也天文志昭宗遷於鳳翔朱梁率諸道甲馬奉迎車駕時侯王將帥在岐下者皆以珠顆盤幞脚貫以銀線而簪之又軍人咸以珠飾巾競相誇尚及朱梁篡位乃知朱已居人上者久矣秦再思記異昭宗時十六宅諸王以華侈相尚巾幘各自為制度都人效之則曰為我作某王頭識者以為不祥昭宗時有禿鶖鳥巢寢殿隅帝親射殺之唐末京都婦人梳髮以兩鬢抱面狀如椎髻時人謂之抛家髻又世俗尚以琉璃為釵釧近服妖也抛家琉璃皆播遷之兆云唐書五行志陜西通志卷四十六
