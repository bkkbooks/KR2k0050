制步百為畝畝百給一夫商鞅佐秦以為地利不盡更以二百四十步為畝百畝給一夫唐書突厥傳秦始皇帝三十一年使黔首自實田史記秦始皇本紀注按秦壞井田之後任民所耕不計多少已無所稽考以為賦歛之厚薄其後遂舎地而税人則其謬尤甚矣是年始令黔首自實田以定賦文獻通考漢髙祖二年諸故秦苑囿園池令人皆得田之漢書髙祖本紀景帝後二年十月租長陵田漢書孝景本紀武帝建元元年罷苑馬以賜貧民漢書武帝本紀師古曰養馬之苑舊禁百姓不得芻牧採樵今罷之賜民為田文獻通考武帝役費並興而民去本董仲舒説上曰春秋他榖不書至於麥禾不成則書以此見聖人於五榖最重麥與禾也今關中俗不好種麥是嵗失春秋之所重而損生民之具也願陛下幸詔大司農使關中民益種宿麥令毋後時後功費愈甚天下虛耗帝悔之以趙過為搜粟都尉過能為代田一畝三甽師古曰甽隴也嵗代處故曰代田師古曰代易也古法也以二耜為耦廣尺深尺曰甽長終畮一畮三甽一夫三百甽而播種於甽中苗生葉以上稍耨隴草因隤其土以附苗根比盛暑隴盡而根深能風與旱其耕耘下種田器皆有便巧率十二夫為田一井一屋故畮五頃用耦犂二牛二人一嵗之收常過縵田畮一斛以上縵田謂不為甽者善者倍之過使教田太常三輔大農置工巧奴與從事為作田器二千石遣令長三老力田及里父老善田者受田器學耕種養苗狀民或苦少牛無以趨澤故平都令光教過以人輓犂過奏光以為丞教民相與庸輓犂率多人者田日三十畮少者十三畮以故田多墾闢過試以離宫卒田其宫壖地課得榖皆多其旁田畮一斛以上令命家田三輔公田三輔太常民皆便代田用力少而得榖多至昭帝時流民稍還田野益闢頗有蓄積漢書食貨志昭帝元鳯六年夏詔曰榖賤傷農今三輔太常榖減賤其令以菽粟當今年賦漢書昭帝本紀應劭曰太常掌諸陵園皆徙天下豪富民以充實之後悉為縣故與三輔同賦本紀注成帝時遣輕車使者氾勝之督三輔種麥而關中遂穰晉書食貨志氾勝之使教田三輔有書十八篇玉海哀帝綏和二年即位師丹建言古之聖王莫不設井田然後治乃可平孝文皇帝承周秦兵革之後天下空虚故務勸農桑帥以節儉民始充實未有并兼之害故不為民田限今累世承平豪富吏民貲數鉅萬而貧弱愈困宜略為限天子下其議丞相孔光大司空何武奏請諸侯王列侯皆得名田國中列侯在長安公主名田縣道及關内侯吏民名田皆毋過三十頃期盡三年犯者没入官漢書哀帝本紀如淳曰名田國中者自其所食國中也既收租税又自得有私田三十頃名田縣道者令甲諸侯在國名田他縣罰金二兩今列侯有不之國者雖遙食其國租税復自得田於他縣道公主亦如之不得過三十頃哀帝本紀注獻帝建安初關中百姓流入荆州者十餘萬家及聞本土安寧皆企望思歸而無以自業於是衞覬議鹽者國之大寳宜置使者監賣以其直益市犂牛百姓歸者以供給之勤耕積粟以豐殖關中逺者聞之必多競還於是魏武遣謁者僕射監鹽官移司𨽻校尉居𢎞農流人果還關中豐實晉書食貨志魏文帝黄初中濟北顔斐為京兆太守京兆自馬超之亂百姓不専農殖乃無車牛斐課百姓令閒月取車材轉相教匠其無牛者令養猪投貴賣以買牛始者皆以為煩一二年中編户皆有車牛於田役省贍京兆遂以豐沃晉書食貨志明帝太和初鍾毓以為上宜復關内荒地使民肆力於農事遂施行魏志鍾繇傳晉附秦苻堅時以境内旱課百姓區種王猛課農桑減田賦兵强國富垂及升平晉書苻堅載記北魏孝文帝太和八年户增帛三匹後增調外帛滿二匹所調各隨其土所出其雍華州貢綿絹及絲岐梁􅃎東秦萬年上谷上郡之白水縣雍州馮翊郡之連芍縣咸陽郡之寧夷縣北地郡之三原雲陽銅官宜君縣華州華山郡之夏陽縣皆以麻布充税魏書食貨志隋文帝開皇十二年以天下户口嵗增京輔地少而人衆議者咸欲徙就寛鄉帝乃發使四出均天下之田隋書食貨志唐關内道厥賦絹綿布麻厥貢毛羽革角布席弓刀唐書地理志京兆同華岐調綿餘州布麻地理志注京兆府貢水土稻麥麰紫稈粟隔紗粲席鞾氊蠟酸棗仁地骨皮櫻桃藕粉華州華隂郡貢鷂烏鶻茯苓茯神細辛同州馮翊郡貢鞾鞹二物皺紋吉莫麝芑茨龍莎凝水石商州上洛郡貢麝香弓材鳯翔府扶風郡貢榛實龍鬚席蠟邠州新平郡貢剪刀火筯蓽豆澡豆白蜜蛇膽隴州􅊈陽郡貢榛實龍鬚席鄜州洛交郡貢龍鬚席坊州中部郡貢龍鬚席枲弦麻丹州咸寧郡貢龍鬚席麝蠟燭延州延安郡貢樺皮麝蠟鹽州五原郡貢鹽山木𤓰牛綏州上郡貢胡女布蠟燭麟州新秦郡貢青他鹿角勝州榆林郡貢胡女布青他鹿角赤芍藥徐長卿興元府漢中郡貢縠蠟紅藍臙脂夏蒜冬笋糟𤓰柑枇杷茶洋州洋川郡貢白交㯶火麻布野苧蔴蠟白膠香麝香地理志𤣥宗開元二十二年七月勑自今已後京兆府關内諸州應徴庸調及資課並限十月三十日畢冊府元龜二十五年以關中蠶桑少菽帛常賤乃命庸調資課皆以米凶年樂輸布絹者亦從之唐書食貨志代宗永泰元年五月京畿表大稔京兆尹第五琦奏請每十畝官税一畝效古什一之義從之後民多流亡代宗停什一税法大厯五年定京兆府百姓税夏税上田畝税六升下田畝税四升秋税上田畝税五升下田畝税三升荒田開佃者畝率二升八年正月詔青苗地頭錢天下諸州每畝率十五文比以京師煩劇加至三十文自今已後宜准諸州例每畝十五文冊府元龜徳宗貞元八年五月初增税京兆青苗畝三錢以給掌閑彍騎十八年十月詔京畿諸縣百姓應今嵗青苗錢其中有便於納粟者計約時估價納之如便於納錢不便於納粟者宜聽委京兆府専督其務知縣令及主吏壅命者懲罰有差國家經計當有儲畜百姓徴賦深可優矜所期便人亦冀均濟咨爾長吏宜悉朕懷冊府元龜憲宗元和六年六月命京兆府其兩税宜以粟麥絲絹折納十年三月京兆府奏恩勅蠲放百姓兩税及諸色逋懸等伏以聖慈憂軫疲氓屢蠲逋賦將行久逺實在均平有依倚權豪因循觀望忽逢恩貸全免征徭至於孤弱貧人里胥敦迫及期輸納不敢稽違曠蕩之恩翻不霑及亦有奸猾之輩僥倖為心時雨稍愆已生覬望競相誘煽因致逋懸若無綱條實恐滋弊自今後忽逢不稔或有恩蕩伏請每貫每石内分數放免輸納已畢者准數折免來年租税則恩澤所加强弱普及人知分限自絶奸欺從之十一年六月京兆府奏今年諸縣夏税折納綾絹絁紬絲綿等並請依本縣時價只定上中下等每疋加饒二百文綿每兩加饒十五文絲每兩加饒二十文其下等物不在納限小户本錢不足任納絲綿斛斗須是本户如非本戸輒合集買成疋段代納者所由决十五枷項令衆勅㫖依奏冊府元龜文宗太和二年二月興元尹王涯奏本府南鄭兩税錢額素髙每年徴科例多懸欠今請於管内四州均攤代納二千五百貫文勅㫖宜付所司八年十月興元觀察使請減當府及洋州兩税錢八千六百貫文移加果閬渠開等郡開成元年二月度支奏每年供諸司並畿内軍糧等計粟麥一百六十餘萬石約以錢九十六萬六千餘貫糴之畿内百姓每年納兩税見錢五十萬貫約以粟麥二百餘萬石糶之是度支糴以六十而百姓糶以二十五農人賤糶利歸商徒度支貴糴賄行黠吏今請以度支貴糴錢五十萬貫送京兆府充百姓一年兩税勒二十三縣代緡輸粟八十萬石小麥二十萬石充度支諸色軍糧則開成二年以後似每嵗放百姓一半税錢又省度支錢一十萬貫勸農減費物理昭然仍請百姓廣開田畝更不加税行之有節富庶可期詔付京兆府夏季以前先造户帖務使平允凡折納之術行於豐年斯恵農務茍非豐登人用苦之盖輸緡易而輸粟難也冊府元龜昭宗乾寧四年同州節度使長春宫使韓建奏以京兆府於每年見徴賦内減四十萬貫充上供冊府元龜宋陜西路京兆府貢鞾氊蠟席酸棗仁地骨皮商州貢麝香枳殻實同州貢白蒺藜生熟乾地黄華州貢茯苓細辛茯神耀州貢甆器延安府貢黄蠟麝香鄜州貢蠟燭坊州貢弓弦麻席邠州貢火筯蓽豆剪刀鳯翔府貢蠟燭榛實席隴州貢席鳯州貢蜜蠟燭利州路興元府貢臙脂紅花洋州貢隔織沔州貢蜜蠟宋史地理志仁宗景祐初陜西用兵民賦率多支移因增取地里脚錢民不能堪五年詔陜西特蠲之且令後勿復取宋史食貨志神宗熙寧十年陜府西路田四十四萬五千二百九十八頃三十八畝官田一千八百五頃二十二畝見催額五百八十萬五千一百一十四貫石匹端兩斗量口斤根束夏税一百一十一萬一百五貫石匹端兩斗量口斤秋税四百六十九萬五千九貫石匹端量束斤根口田賦考哲宗元祐元年永興軍民庶進狀言興平縣有地二百四十餘頃久輸二税熙寧五年本縣抑令退為牧地詔提刑司審定以奏如他州縣更有以税地改牧地者亦具以聞提刑司乞與免納租錢給種如故文獻通考徽宗宣和元年户部尚書唐恪稽考諸路上供錢物之數陜西路一十五萬七百九十貫匹兩文獻通考髙宗建炎四年陜西夏税五月一日起納七月十五日畢秋税九月一日起納十二月十五日畢後又並加一月或值閏月其田蠶亦有早晚不同有司臨時奏裁宋史食貨志金世宗大定十一年六月詔諸路常貢數内同州沙苑羊非急用徒勞民罷之續文獻通考章宗明昌三年六月尚書省奏陜西路提刑司言舊牧馬地久不分撥以致軍民起訟比差官往定之凡民户有憑騐已業及宅井墳園已改正給付而其中復有官地者亦騐數對易陜西路牧地三萬五千六百八十餘頃六年六月詔罷括陜西之地泰和初民愬水旱應免者京兆鳯翔夏田四月秋田七月水田通以八月為限遇閏則展期半月限外愬者不理非時之灾則無限損十之八者全免七分免所傷之數六分則全徴桑被灾則免絲綿絹税諸路雨雪及禾稼收穫之數月以健步申户部五年三月諭宰臣曰陜西地寒稼穡遲熟夏税限以七月為初金史食貨志宣宗興定五年勅令户部按行州郡地有可開水田者誘民赴功其租止依陸田不復添徴仍以官賞激之陜西除三白渠設官外亦宜視例施行金史食貨志元憲宗八年括興元户田續文獻通考世祖至元二十三年六月命陜西籍定建都賦税續文獻通考成宗大徳三年嵗入糧數陜西省二十二萬九千二十三石元史食貨志明太祖洪武初詔陜西布政司民間田土許儘力開墾有司毋得起科世法録二十六年陜西布政司田土計三十一萬五千二百五十一頃七十五畝夏税麥六十七萬六千九百八十六石秋糧米一百二十三萬六千一百七十八石續文獻通考孝宗𢎞治十五年陜西官田六千八百六十二頃九十五畝二分四毫民田二十五萬三千七百九十九頃八十六畝六分夏税小麥七十二萬五千七百九十六石七斗三升四合三勺三抄七撮三圭五粟秋糧米一百二十萬三千二百六十石五斗二升一合六勺五抄七撮農桑絲折絹九千二百一十八疋一丈九尺八寸二分三釐四毫本色絲綿二百六斤一兩六錢五分綿花絨一萬七千一百七十二斤三兩一錢綿布一十二萬八千七百七十疋一丈八尺七寸四分馬草一百五十一萬四千七百一十二束一十一斤五分二錢零續文獻通考按圖書編等書所載田糧數目不同兹不具録世宗嘉靖初陜西布政司夏秋地三十一萬五千三百三十一頃六十五畝五分五釐夏秋税糧一百七十一萬五千四百七十一石二斗八升八合九勺草一百三十四萬六千四百九十八束農桑