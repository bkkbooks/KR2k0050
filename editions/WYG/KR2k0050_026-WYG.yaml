body:
  text: 陜西通志巻二十六貢賦三更名地丁經雜課税税課費歴代田賦户役更名地丁陜西糧鹽道並鳯翔府屬及商州屬鎮安縣更名省總原額更名本折贍賜烟庄及隨磨並莊基共地玖千捌伯陸拾伍頃㭍拾壹畝肆分貳釐伍絲㭍忽山坡山塲栗柿竹等園伍伯貳拾壹處段山塲内地壹拾壹分及坐落商州屬山坡山塲二處原無頃畝又莊基貳伯叄間貳拾㭍丈捌尺竹枝伍坡鮮笋伍伯把竹園叄處栗園肆處水旱碾磨壹拾捌合水渠壹道納課房玖伯伍拾叄間店房肆處除荒並豁免外實熟水旱各等共地捌千叄伯㭍拾壹頃肆拾玖畝叄分壹釐叄毫陸絲叄忽貳微實徴本色糧除粟榖折米減額外並旱地改種水地加增本色共糧肆萬玖伯㭍拾肆石叄斗陸升肆合伍抄玖撮玖圭陸粟貳粒折色銀及新增地租等項共銀伍千叄伯貳拾肆兩伍錢陸分肆釐伍毫玖絲伍忽開墾地玖頃捌拾陸畝叄分貳釐該徴本色糧貳拾玖石捌斗貳升玖合壹勺叄抄㭍撮貳圭壹粟陸粒又折色銀叄兩㭍分捌釐壹絲捌忽外山塲内地壹拾壹分山坡山塲肆伯貳拾㭍處段並墾過山坡貳段無頃畝共該徴本色糧捌拾㭍石玖斗肆升肆合肆勺折色銀陸伯陸拾伍兩壹錢叄分壹釐貳毫伍絲庄基壹伯肆拾壹間貳拾㭍丈捌尺該徴本色糧貳石陸斗壹升伍合又商州屬鎮安縣山坡山塲貳處原無頃畝内開墾熟地伍頃捌拾畝玖分捌釐陸毫玖絲共徴折色銀壹拾貳兩肆錢叄分貳釐叄毫壹絲玖忽伍微貳纎㭍𣺌原額校丁貳拾叄丁雍正伍年以糧載丁共均丁銀㭍千貳伯壹拾貳兩玖錢㭍釐叄絲陸忽壹微捌纎陸塵壹𣺌外山坡竹枝肆坡鮮笋肆伯把栗園肆處水旱碾磨壹拾叄合水渠壹道納課房並隨磨大小房捌伯肆拾叄間果價油柿等項各徴不同該徴碾課本色糧壹拾伍石貳斗壹升又折價共該銀㭍伯捌拾叄兩叄錢㭍分玖釐叄毫按此數項在載丁外起運本色糧肆萬壹千玖拾玖石玖斗陸升貳合伍勺玖抄㭍撮壹圭㭍粟捌粒存留本色糧壹拾石起運銀壹萬叄千玖伯玖拾玖兩壹錢玖分貳釐伍毫壹絲捌忽㭍微陸塵捌𣺌遇閏載丁内加増銀貳伯貳拾肆兩伍錢壹分捌毫玖絲㭍忽捌微伍塵陸𣺌存留銀貳兩叄錢糧鹽道屬廢秦藩原額更名本折及隨磨並庄基共地玖千陸伯捌拾叄頃肆拾貳畝伍分伍釐玖毫伍絲㭍忽山塲内地壹拾壹分山坡山塲栗柿竹等園伍伯壹拾玖處段無頃畝莊基貳伯叄間貳拾㭍丈捌尺竹枝伍坡鮮笋伍伯把竹園叄處栗園肆處水旱碾磨壹拾捌合水渠壹道納課房玖伯伍拾叄間店房肆處除荒并豁免外實熟水旱各等共地捌千貳伯陸拾捌頃捌拾玖畝叄分肆釐陸毫伍絲叄忽貳微實徴本色糧除粟榖折米減額外並旱地改種水地加增本色共糧肆萬貳拾壹石㭍斗伍升肆合貳勺陸抄捌撮捌圭玖粟折色銀伍千貳伯伍拾㭍兩叄錢玖分叄毫陸絲㭍忽開墾地玖頃貳畝肆分㭍釐該徴本色糧貳拾石㭍升㭍合肆勺叄抄㭍撮貳圭壹粟陸粒又折色銀叄兩㭍分捌釐壹絲捌忽外山塲内地壹拾壹分山坡山塲肆伯貳拾㭍處段並墾過山坡貳段無頃畝共該徴本色糧捌拾㭍石玖斗肆升肆合肆勺又折色銀陸伯陸拾伍兩壹錢叄分壹釐貳毫伍絲庄基壹伯肆拾壹間貳拾柒丈捌尺該徴本色糧貳石陸斗壹升伍合雍正伍年以糧載丁共均丁銀㭍千伍拾叄兩叄錢叄分玖釐陸毫貳絲貳忽㭍微壹纎伍塵陸𣺌外山坡竹枝肆坡鮮笋肆伯把栗園肆處水旱碾磨壹拾叄合水渠壹道納課房並隨磨大小房捌伯肆拾叄間果價油柿等項各徴不同該徴碾課本色糧壹拾伍石貳斗壹升又折價共該銀㭍伯捌拾叄兩叄錢㭍分玖釐叄毫起運本色糧肆萬壹伯叄拾㭍石陸斗壹合壹勺陸撮壹圭陸粒内糯米壹千肆伯壹拾石玖斗伍升叄合㭍勺貳抄壹圭遞年照時價折估不等徴解司庫存留本色糧壹拾石此項係起運内扣留冰窖人役口食起運銀壹萬叄千㭍伯陸拾兩壹分捌釐伍毫伍絲㭍忽㭍微壹纎伍塵陸𣺌遇閏加徴銀貳伯壹拾玖兩伍錢肆分肆釐壹毫伍絲玖忽貳微㭍纎玖塵玖渺存留銀貳兩叄錢此項係起運内扣留冰窖祭祀長安縣按長安等縣相沿舊無原額考之全書亦未刋列今照奏冊實熟地糧開載廢秦藩更名水旱並河崩各等共實熟地壹千壹伯貳拾叄頃伍畝捌分肆毫捌絲玖忽實徴本色糧陸千肆伯肆拾伍石肆升貳合捌勺陸抄貳撮伍圭叄粟陸粒伍顆折色銀壹千叄伯玖拾陸兩壹分捌釐壹毫玖絲捌忽㭍微㭍纎開墾地貳頃壹拾壹畝肆分並山坡貳段莊基貳拾伍間貳拾㭍丈捌尺該徴本色糧捌石陸斗伍升陸合肆勺肆抄又開墾地折色銀壹錢壹分壹釐玖毫壹絲捌忽雍正伍年以糧載丁共均丁銀壹千貳伯貳兩壹錢貳分陸釐壹毫壹忽玖微捌纎貳塵伍𣺌外房玖拾肆間該徴課銀肆拾肆兩叄錢伍分又栗園肆處栗果並柿花共價銀壹伯壹拾陸兩叄錢貳分壹釐伍毫起運本色糧陸千肆伯伍拾叄石陸斗玖升玖合叄勺貳撮伍圭叄粟陸粒伍顆内糯米叄伯㭍拾叄石貳斗貳升叄合陸勺叄抄陸撮遞年照時價折估不等徴解司庫起運銀貳千㭍伯伍拾捌兩玖錢貳分㭍釐㭍毫壹絲捌忽㭍微伍纎貳塵伍𣺌遇閏載丁内加増銀叄拾㭍兩肆錢壹分㭍釐㭍毫貳忽陸微玖塵捌𣺌咸寧縣廢秦藩更名水旱並河崩沙旱各等共實熟地玖伯捌拾陸頃貳拾伍畝肆分捌釐壹絲伍忽實徴本色糧伍千陸伯叄拾石肆斗捌升陸合捌勺捌抄貳撮叄圭貳粟陸粒折色銀捌伯玖拾貳兩貳錢㭍釐陸毫伍絲玖纎肆塵開墾地肆拾伍畝㭍釐並山坡壹段莊基陸拾肆間該徴本色糧叄石肆斗㭍升壹合陸勺捌抄又開墾地折色銀壹錢伍分㭍毫雍正伍年以糧載丁共均丁銀玖百玖拾玖兩肆錢肆分貳釐捌毫伍絲貳忽玖微㭍纎玖