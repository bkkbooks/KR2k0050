body:
  text: 陜西通志巻六十一人物七忠節周富辰郃人襄王大夫鄭伐滑王使伯服游孫伯如鄭請滑鄭執二子王怒將以狄伐鄭富辰諫王弗聽狄伐鄭取櫟王德狄人將以其女為后辰諫王又弗聽王黜狄后狄人來誅殺譚伯辰曰昔吾驟諫王王弗從以及此難若其不出王其以我為懟乎乃以其屬死之國語子車奄息秦大夫交交黄鳥止於棘誰從穆公子車奄息交交黄鳥止於桑誰從穆公子車仲行交交黄鳥止於楚誰從穆公子車鍼虎詩秦風秦穆公卒以子車氏之三子為殉皆秦之良也國人哀之為之賦黄鳥詩經注穆公與羣臣飲酒酣公曰生共此樂死共此哀於是奄息仲行鍼虎許諾及公薨皆從死黄鳥之詩所為作也史記秦本紀注漢蘇武字子卿建子杜陵人天漢元年以中郎將持節送匈奴使留在漢者與副中郎將張勝假吏常惠等俱至匈奴匈奴欲降之使衞律召武受辭武引佩刀自刺律驚自抱持武氣絕半日復蘇律謂武曰蘇君律前歸匈奴擁衆數萬蘇君今日降明日復然空以身膏草野誰復知之武不應律曰君今不聽吾計後雖欲復見我尚可得乎武罵曰女畔主背親何以女為見律知武終不可脅白單于乃幽武大窖中絕不飲食天雨雪武臥齧雪與旃毛幷咽之數日不死匈奴以為神徙武北海上無人處使牧羝武至海上廩食不至掘野䑕去草實而食之仗漢節牧羊臥起操持節旄盡落久之單于使李陵至海上置酒設樂謂武曰單于聞陵與子卿素厚故使來說足下虚心欲相待武曰武父子無功德皆為陛下所成就今得殺身自效誠甘樂之願勿復再言陵數日復曰子卿一聽陵言武曰自分已死久矣王必欲降請畢今日之懽效死於前陵見其至誠喟然嘆曰嗟乎義士陵與衞律之罪上通於天因泣下沾巾與武決去後陵復至海上語武捕得雲中生口言吏民皆白服曰上崩武號哭嘔血旦夕臨數月昭帝即位匈奴與漢和親漢求武等匈奴詭言武死後漢使復至匈奴常惠敎使者謂天子射上林苑得雁足有繫帛書言武等在某澤中單于驚謝漢使召會武官屬隨武還始元六年春至京師詔奉武一太牢謁武帝園廟拜為典屬國武留匈奴凡十九嵗始以强壯出及還鬚髮盡白宣帝神爵二年病卒圖畫麒麟閣漢書本傳段崇字禮高南鄭人太守鄭厪命為主簿凉州羌入漢中從厪屯褒中厪欲戰崇諫不可厪不聽出戰敗績崇及子勃兄子伯生等皆死羌遂得厪殺之程信字伯義南鄭人時為功曹居守馳來赴難殯殮厪喪結故吏子弟二十五人各募敢死士以待時太守鄧成命為五官虜復來信等將其同志率先奮討大破之信被八創死天子咨嗟賜信崇家穀數千斛有王宗原展及嚴孶李容姜濟陳已曹廉勾矩劉旌九人皆以令義為鄭厪所命王宗原展與厪同死孳容等七人與信幷命詔書賜九子家穀各五百斛漢中士女志魯旭謙子平陵人官太僕與王允共誅董卓李傕入長安旭遇害後漢書魯恭傳金元休名尚京兆人與同郡韋休甫第五休文俱著名號三休為兖州刺史東之郡而太祖已臨兗州尚依袁術術僭號欲以尚為太尉尚無屈意術亦不敢强也建安初尚逃還為術所害後喪至京天子嘉尚忠烈為之咨嗟詔百官弔祭拜子暐為郎典畧金禕字德禕璇子京兆人自以世為漢臣覩漢祚將移與耿紀韋晃吉本本子邈邈弟穆等結謀禕與王必善必典兵督許中事邈等率千餘人夜攻必禕遣人為内應射必中肩必投禕夜喚德禕禕家不知是必謂為邈等曰王長史已死乎必乃更他路奔南城會天明邈等衆散故敗三輔決錄注韋康字元將京兆人康父端從涼州徵為太僕康代為涼州刺史後為馬超所圍堅守歴時救軍不至遂為超所殺三輔決錄晉傅祗字子莊泥陽人性至孝才識明練起家太子舍人遷滎陽太守自魏黄初大水之後河濟汎溢祗造沈萊堰自此兗豫無水患遷常侍左將軍楊駿輔政欲悅衆心議普進封爵祇與駿書曰未有帝王始崩臣下論功者也不從氐人齊萬年反以祗為行安西軍司加常侍討平之趙王倫輔政以為中書監王戎陳準等相與言曰傅公在事吾屬無憂矣懷帝即位東海王越輔政祗旣居端右明達國體朝廷制度多所經綜大將軍茍晞表請遷都使祗出詣沔陰脩理舟楫為水行之備洛陽陷遂共建行臺推祗為盟主傳檄四方徵義兵以暴疾薨祗自以義誠不終力疾手筆勑厲其二子宣暢辭㫖深切覽者莫不感激慷慨晉書傅𤣥傳魏浚東阿人寓居關中有幹用永嘉末與流民東保河陰之硤石時京邑荒儉浚掠穀麥獻懷帝及洛陽陷屯於洛北石梁塢撫養遺衆其附賊者解喻之恃遠不從命者遣將討之遠近感悅襁負至者甚衆劉琨承制假浚河南尹劉曜忌浚得衆率軍圍之浚夜走為曜所得遂死之贈平西將軍浚族子該一名亥劉曜攻長安隨浚赴難守金墉城曜引去餘衆依之元帝承制加冠軍將軍雍州刺史助周訪討平杜曾詔以為順陽太守王敦反梁州刺史甘卓試以敦㫖動之該距而不應蘇峻反率衆救臺軍峻未平卒晉書本傳吉挹字祖沖蓮勺人祖朗愍帝時為御史中丞西朝不守朗嘆曰吾何忍君臣相隨北面事賊乎乃自殺挹少有志節孝武帝初苻堅陷梁益桓豁表挹為魏興太守尋加輕車將軍領晉昌太守以拒堅功拜員外散騎侍郎苻堅將韋鍾攻魏興挹拒之斬七百餘級加督五郡軍事鍾率衆欲趨襄陽挹邀擊斬五千餘級鍾怒回軍圍之挹又屢挫其銳後賊衆繼至挹力不能抗賊城將陷挹引刀欲自殺友人逼奪其刀會賊執之挹閉口不言不食而死追贈益州刺史晉書本傳傅𢎞之字仲度泥陽人父韶晉梁州史𢎞之少倜儻有大志舉秀才不行義旗建輔國將軍道規以為㕘軍盧循作亂桓石綏自號荆州刺史王天恩自號梁州刺史襲西城時韶為梁州遣𢎞之討石綏等斬之除太尉行㕘軍高祖北伐𢎞之與扶風太守沈田子等七軍自武關入偽上洛太守脫走進據藍田招懷戎晉晉人龎斌之羌人康横等各率部歸化進為桂陽公除畧陽太守徐師高叛𢎞之討平之高祖歸後勃勃偽太子赫連璝率衆三萬襲長安𢎞之領步騎五千於池陽破之璝又抄掠渭南𢎞之又於寡婦渡破璝掠七千餘口義真東歸勃勃傾國追躡於青泥大戰𢎞之軍敗陷没逼令降不屈見殺時年四十二宋書本傳梁韋粲字長倩杜陵人好學仗氣太清二年為散騎常侍粲聞侯景作逆簡閱部下得精卒五千馬百疋倍道赴援至豫章奉命報云賊已出横江粲就内侍劉孝儀謀之孝儀曰必期如此當有别勑豈可妄相驚動時孝儀置酒粲怒以杯抵地曰賊已渡江便逼宫闕水陸俱斷何暇有報假令無勑豈得自安韋粲今日何情飲酒即馳馬出以輕舸就路至南洲司州刺史栁仲禮亦帥步騎萬餘人至横江粲即送糧仗贍給幷散私金帛以賞其戰士建議推仲禮為大都督進軍次新亭是夜仲禮入粲營部分衆軍令粲頓青塘粲帥所部水陸俱進時値昏霧軍人失道比及青塘夜已過半壘栅至曉未合景率銳卒來攻軍副王長茂勸據柵待之粲不從令軍主鄭逸逆擊之遂敗賊乘勝入營左右牽粲避賊粲不動叱子弟力戰兵死畧盡遂見害子尼及三弟助警構從弟昂皆戰死賊傳粲首以示城内太宗聞之流涕曰社稷所寄惟在韋公如何不幸先死行陣詔贈䕶軍將軍世祖平侯景追諡曰忠貞並贈助警構及尼皆中書郎昂員外散騎常侍粲長子臧字君理厯官東宫領直侯景至帥兵屯西華門城陷奔江州收舊部曲據豫章為部下所害梁書本傳北魏王洛兒京兆人明元在東宫給事帳下性謹愿未嘗有過明元嘗獵於灅南乘氷而濟氷陷没馬洛兒投水奉帝出殆將凍死帝解衣賜之恩寵日隆天賜末帝避難居外洛兒晨夜侍衞恭勤發於至誠元紹之逆帝晝居山嶺夜還洛兒家洛兒冐難往返京都通問大臣大臣遂出奉迎明元還宫社稷獲全洛兒有功焉太宗即位拜散騎常侍賜爵新息公卒贈太尉太宗親臨哀慟者數四子長城襲爵北史本傳宿查干石祖朔方人世祖時虎賁幢將從征平涼有功賜爵安漢男遷給事討蠕蠕戰殁魏書宿石傳蘇湛字景儁魏侍中則之後舉秀才蕭寶夤之討關西以湛為行臺郎中深見委任孝昌中寶夤反時湛臥疾於家寶夤報湛云死生榮辱與君共之湛聞之舉聲大哭曰為我白齊王王本以窮鳥投人賴朝廷假王羽翼不能竭忠報德乃欲乘人間隙有不臧之心蘇湛不能以百口為王族滅願乞骸骨還鄕里寶夤素重之聽還武功寶夤敗莊帝即位徵補尚書帝謂曰聞卿答寶夤甚有美辭湛頓首謝曰臣與寶夤周旋契濶言得盡心而不能令其守節臣之罪也莊帝大悦加散騎侍郎尋遷中書病還鄕里終於家魏書本傳韋元恢杜陵人有氣幹孝昌初值刺史元法僧外叛元恢招聚同志潛規克復事泄為法僧所害時人傷之魏書韋閬傳泉企字思道上洛豐陽人曾祖景言魏建節將軍世襲本縣令父安志復領本縣企九嵗喪父哀毁類成人年十二鄉人詣州請企為縣令魏宣武帝詔從所請企雖童幼而好學恬靜百姓安之孝昌初加龍驤將軍除上洛郡守蕭寶夤反遣其黨郭子恢襲據潼關企率鄉兵三千人拒之連戰數日子弟死者二十餘人遂大破子恢以功拜征虜將軍寶夤又遣兵萬人趨青泥圖取上洛豪族泉杜二姓宻應之企與刺史董紹宗潛兵掩襲二姓散走寶夤亦退遷淅州刺史永安中梁將王元真宼荆州加企持節都督率衆援之遇於順陽與戰大破之除東雍州刺史企性清約纎毫不擾於民每於鄉里運米自給孝武初齊神武專政魏帝有西顧之心欲委企以山南之事乃除洛州刺史當州都督未幾帝西遷齊神武率衆至潼關企遣子元禮禦之上洛人泉岳其弟猛畧與拒陽人杜窋等謀翻洛州以應東軍企知之殺岳及猛畧等窋亡投東魏大綂初進爵上洛郡公三年高敖曹圍逼州城杜窋為鄉導企拒守旬餘矢盡援絕城乃陷企謂敖曹曰泉企力屈志不服也及竇泰被擒敖曹遂執企而東以杜窋為刺史企臨發宻誡子元禮仲遵致力本朝餘無所言聞者莫不憤歎尋卒於鄴元禮少有志氣好弓馬釋褐奉朝請本州别駕累遷散騎常侍洛州陷與企俱被執而東於路迯歸時杜窋雖為刺史然邑人素輕杜而重泉及元禮至與仲遵相見感父臨别之言潛與豪右結託信宿之間遂率鄉人襲州城斬窋傳首長安朝廷嘉之拜車騎大將軍世襲洛州刺史從戰沙苑為流矢所中卒仲遵少謹實涉獵經史年十四為本縣令及長有武藝每從父兄征討以勇決聞高敖曹攻洛州企令仲遵出戰衆寡不敵為流矢中目不堪復戰及城陷仲遵以被傷不行後與元禮斬窋以功封豐陽伯加授征東將軍豫州刺史及元禮於沙苑戰殁復以仲遵為洛州刺史隨于謹攻柏谷塢力戰先登擒其將王顯明復會大軍戰於邙山授荆州刺史仲遵雖出自巴夷而有方雅之操歴官以清白見稱朝廷以其父臨危抗節令襲爵上洛郡公恭帝初徵拜左衞將軍尋出為金州刺史武成初卒諡曰莊周書泉企傳韋祐字法保山北人祖騈中書博士父義上洛郡守法保少好遊俠人有急難投之者多保存之父殁事母兄以孝敬聞慕李長壽之為人遂娶長壽女因寓居關南正光末拜員外散騎侍郎孝武西遷除右將軍及長壽被害其子延孫收餘衆守禦東境朝廷恐延孫兵少不能自固乃除法保東洛州刺史配兵數百人以援延孫法保遂倍道兼行東魏陜州刺史劉貴以步騎邀之法保命所部為圓陣且戰且前數日得與延孫兵接乃幷勢置栅於伏流未幾太祖徵法保與延孫還朝賞勞甚厚授大都督除河南尹頻與敵人交兵每身先士卒單馬陷陣嘗至關南與東魏人戰流矢中頸從口中出當時氣絕輿至營久之乃蘇拜車騎大將軍鎮九曲城加驃騎大將軍會東魏遣軍送糧饋宜陽法保潛邀之轉戰數十里兵少不敵為流矢所中卒諡曰壯周書本傳北周楊敷字文衍華山公寛之兄子父暄歴輔國將軍諌議大夫以别將從魏廣陽王深征葛榮為榮所害贈華州刺史敷少有志操重然諾每覽書傳見忠臣烈士之事常慨然景慕之魏建義初襲祖鈞爵臨貞縣伯天和六年出為汾州刺史齊將段孝先率衆五萬來寇梯衝地道晝夜攻城敷親當矢石隨事扞禦拒守纍旬攻之愈急時城中兵不滿二千戰死者已十四五糧儲又盡公私窮蹙齊公憲總兵赴救憚孝先不敢進軍敷知陷没乃召其衆謂之曰吾等糧絕今欲突圍出戰死生一決於諸君意何如衆咸涕泣從命乃率兵夜出擊殺齊軍數十人俄而孝先率諸軍盡銳圍之敷殊死戰矢盡為孝先所擒齊人方欲任用之敷不為屈遂卒於鄴高祖平齊贈使持節大將軍諡曰忠壯周書本傳韓盛字文熾南陽堵陽人五世祖遠為鄭縣令因徙居京兆之渭南幼有操行涉獵經史兼善騎射膂力過人大綂初起家開府行㕘軍從李遠積年征討每有戰功纍遷至大都督出為新平郡守居守清靜嚴而不殘矜恤孤貧抑挫豪右賊盜止息郡治肅然尋以本官從晉公䕶東討於洛陽戰殁贈淅洛義三州刺史謚曰壯子謙嗣官至大都督兄德輿厯官邵州刺史仲恭歴廣原靈原新豐三縣令所在皆有聲績有八子並有志操少子紉約後最知名周書楊摽傳韋總字善會孝寛子杜陵人聰敏好學位京兆尹帝嘗戲總曰卿師尹帝鄉故當不以富貴威福鄉里耶總正色對曰陛下擢臣非分竊謂已鑒愚誠今奉嚴旨便似未照丹赤豈可久忝此職用疑聖慮請解印綬以避賢能帝大笑曰前言戲之耳五年從武帝東征每率麾下先驅陷敵遂於并州戰殁贈上大將軍追封河南郡公諡曰貞北史韋孝寛傳隋趙世模初事高寶寧後以衆歸周授上開府寓居京兆之雲陽高祖踐祚恒典宿衞迨同晉王伐陳先鋒遇賊力戰而死朝廷以身死王事令子元淑襲本官隋書趙元淑傳張定和字處謐萬年人少貧賤有志節初為侍官從上柱國李充擊突厥先登陷陣虜刺之中頸定和以草塞瘡而戰神氣自若虜遂敗走上聞而壯之進位柱國封武安縣侯煬帝嗣位拜宜州刺史尋轉河内太守頗有惠政嵗餘從帝征吐谷渾定和挺身登山賊伏兵於巖谷之下發矢中之而斃諡曰壯武子世立嗣尋拜為光禄大夫隋書本專韋洸字世穆世康兄杜陵人性剛毅有氣幹少便弓馬隋文帝為丞相從季父孝寛擊尉遲迥於相州以功拜柱國進襄陽郡公時突厥寇邊令洸綂兵出原州擊破之拜江陵總管陳平拜江州總管畧定九江遂圖嶺南上與書慰勉之洸至廣州嶺表皆降上聞而大悅許以便宜從事拜廣州總管嵗餘番禺夷王仲宣反以兵圍洸洸拒之中流矢卒贈上柱國諡曰敬子恊字欽仁好學有雅量位秘書郎其父在廣州上命恊齎詔勞問未至而父卒上以其父死王事拜柱國厯定息秦三州刺史有能名北史韋世康傳韋福奬世康少子杜陵人通事舍人在東都與楊𤣥感戰没北史韋世康傳楊武通華陰人性果烈善馳射數以行軍總管討西南夷以功拜左武衞將軍歴岷蘭二州總管復與周法尚討叛獠法尚軍不利武通束馬懸車出賊不意頻戰破之賊知其孤軍無援傾部落而至武通轉鬭數百里為賊所拒四面路絕武通輕騎挑戰墜馬為賊所執殺而噉之北史劉方傳陶模京兆人性明敏有器幹仁壽初為嵐州司馬諒旣作亂刺史喬鍾葵發兵將赴逆模拒之曰漢王所圖不軌公荷國厚恩致位方伯謂當竭誠效命以答慈造豈有大行皇帝梓宫未掩翻為厲階鍾葵失色曰司馬反邪臨之以兵詞氣不撓鍾葵義而釋之軍吏進曰若不斬模何以壓衆心於是囚之於獄及諒平煬帝嘉之拜開府授大興令楊𤣥感反率兵從衞元擊之以功進位銀青光禄大夫卒官隋書本傳劉韶文靜父武功人仕隋戰死贈上儀同三司唐書劉文靜傳楊善會字敬仁華陰人大業中為鄃令以清正聞俄而山東饑饉百姓相聚為盜善會以左右數百人逐捕之往皆克捷其後賊帥張金稱屠城剽邑善會率所領與賊捕戰數挫其鋒於時郡縣微弱陷没相繼能抗賊者惟善會而已金稱將數百人招集餘黨善會追捕斬之進拜清河通守其年從楊義臣斬漳南賊帥高士達士達部將竇建德復擾清河善會逆拒之為賊所執建德禮之用為貝州刺史善會罵之曰老賊何敢擬議國士我豈屠酤兒輩敢欲更相吏邪於是害之隋書本傳張季珣京兆人父祥少為高祖所知開皇中累遷幷州司馬仁壽末漢王諒舉兵反遣其將劉建畧地燕趙至井陘祥勒兵拒守建攻之復縱火燒其郭下百姓驚駭其城側有西王母廟祥登城望之再拜號泣而言曰百姓何罪致此焚燒神其有靈可降雨相救須臾驟雨其火遂㓕士卒感其至誠莫不用命月餘援軍至賊遂退走以功授開府入為都水監卒官季珣少慷慨有志節大業末為鷹揚郎將其府據箕山為固與洛口連接及李密陷倉城遣人呼之季珣罵密極口密怒遣兵攻之連年不克時密衆數十萬季珣四面阻絕而執志彌固誓以必死經三年糧盡士卒羸病不能拒戰遂為所陷季珣坐聽事顏色自若羣賊曳季珣殺之時年二十八其弟仲琰大業末為上洛令及義兵起率吏人城守部下殺之以歸義仲琰弟琮為千牛左右宇文化及之亂遇害季珣家素忠烈兄弟俱死國難論者賢之隋書本傳沈光字總持吳興人父君道仕陳陳㓕家於長安光少驍捷善戲馬常慕立功名不拘小節大業中徵天下驍果之士光預焉同類皆出其下及帝攻遼東以衝梯擊城竿長十五丈光升其端臨城與賊戰賊競擊而墜適竿有垂絙光接而復上帝壯之即日拜朝請大夫江都之難潛搆義勇為帝復讎光身無介胄遂為所害壯士聞之莫不隕涕隋書本傳唐宗休璟祖京兆始平人隋大業末為朔方郡丞梁師都舉兵將據城宗抗節不從為所害舊唐書唐休璟傳王辯字警畧蒲城人少習兵書尤善騎射漢王諒作亂從楊素討平之賜爵武寧縣男遼東之役以功加通議大夫山東賊帥等寇掠河北辯進兵擊之所往皆捷深為羣賊所憚翟讓寇徐豫辯頻擊走讓與李密屯據洛口倉辯與王世充討密阻洛水相持經年辯率諸將攻敗密因薄其營戰破外柵宻諸營已有潰者乗勝將入城世充不知鳴角收兵翻為密徒所乘官軍大潰不可救止辯至洛水橋已壞竟溺死焉隋書本傳骨儀京兆長安人性剛鯁有不可奪之志開皇初為侍御史處法平當不為勢利所囘煬帝嗣位遷尚書右司郎時朝政漸亂濁貨公行儀勵志守常介然獨立超拜京兆郡丞公方彌著時刑部尚書衞元兼領京兆内史頗行詭道輒為儀所執正元不能傷也義兵至元恐禍及遂稱老病儀與陰世師同心叶契父子並誅隋書本傳唐劉感岐州鳳泉人武德初以驃騎將軍戍涇州為薛仁杲所圍糧盡殺所乘馬啖士而煑骨自飲至和木屑以食城垂陷長平王叔良救之乃解與叔良出戰為賊執還圍涇州令感約城中降感紿諾至城下大呼曰賊大饑亡在朝暮秦王數十萬衆且至勉之無苦仁杲怒執感埋其半土中馳射之至死罵益甚賊平高祖購得其尸祭以少牢贈瀛州刺史諡忠壯詔其子嗣封爵賜田宅焉唐書本傳楊大寶炎曾祖天興人為龍門令劉武周攻之死於守贈全節侯唐書楊炎傳靳孝謨武功人為金紫光禄大夫武德二年正月遣孝謨安集邊郡為梁師都所獲孝謨罵之極口師都殺之二月詔追賜爵武功縣公諡曰忠通鑑盧士叡劉黑闥之亂死事者又有盧士叡李元通士叡客韓城隋亂結納英豪高祖與之舊及兵興率數百人上謁汾陰又使兄子諭降劇賊孫華與劉𢎞基敗隋將桑顯和於飲馬泉擢瀛州刺史黑闥遣輕騎破其郛拒戰半日叡為賊禽欲使說下城堡不從見殺元通藍田人高祖入關率所部自歸拜定州總管為黑闥所破愛其才欲以為將元通曰吾當守節以報烏能降志耶不聽囚之故吏有餉欲餽者元通曰諸君見哀吾能一醉遂縱飲謂守者曰吾能劍舞可借刀守士與之曲終仰天太息曰大丈夫撫方面不能保所守尚何惕息耶乃潰腹死帝為流涕擢其子伏䕶大將軍唐書忠義傳安金藏長安人在太常工籍睿宗為皇嗣有誣皇嗣異謀者武后詔來俊臣問狀左右欲引服金藏大呼曰公不信我言請剖心以明皇嗣不反引佩刀自刺腹中腸出被地眩而仆武后聞大驚輿致禁中命高醫納腸褫桑紩之閱夕而蘇后臨視嘆曰吾有子不能自明不如爾之忠也即詔停獄睿宗乃安神龍初母喪葬南闕口營石墳晝夜弗息地本卬燥泉忽湧流廬之側李冬有花犬虎相擾本道使盧懷慎上其事詔表闕於閭擢右驍衞將軍卒諡曰忠以子承恩為廬州長史中和中擢其遠孫敬則為太子右諭德唐書本傳韋安石萬年人祖津陵州刺史父琬成州刺史安石舉明經蘇良嗣薦於武后擢膳部員外郎遷幷州司馬有善政安石性方重不茍言笑政尚清嚴吏民尊畏久視中遷文昌右丞時二張及武三思寵横安石數折辱之易之引蜀商博塞后前安石奏商等賤類不當戲殿上顧左右引出坐皆失色后以安石辭正改容慰勉后幸興泰宫議趨疾道安石曰千金子且誡垂堂况萬乘可乘危哉后為回輦睿宗立復為侍中中書令太平公主有異謀欲引安石數邀之拒不往帝一日召安石曰朝廷傾心東宫卿胡不察曰太子仁孝天下所稱且有大功陛下今安得亡國語此必太平公主計也帝矍然曰卿勿言朕知之主竊聞乃構飛變欲訊之賴郭元振保䕶免俄罷政事遷蒲州刺史太常卿姜皎有所請拒之皎奏安石䕶作定陵有盜没詔籍其贓安石乃發憤卒天寶初贈左僕射郇國公諡文貞二子陟斌陟字殷卿累遷吏部侍郎楊國忠忌其才貶桂嶺尉徙平樂肅宗即位永王兵起委陟招諭授江東節度使與高適來瑱會安州推瑱為地主為載書登壇辭旨慷慨士皆隕泣永王敗除御史大夫拜吏部尚書卒諡忠孝斌父為相時授太子通事舍人嚴峭有大臣體天寶中為中書舍人禄山陷洛陽斌為賊得憂憤卒贈秘書監唐書本傳王孝傑新豐人少以軍功進長壽元年為武威道總管克龜茲于闐疏勒碎葉等城武后曰貞觀中西境在四鎮其後不善守棄之吐蕃今故土盡復孝傑功也進鳳閣鸞臺三品契丹李盡忠等叛詔為靖邊總管將兵討之軍至東硤石谷與賊戰後軍不至為虜所乘軍潰孝傑墮谷死贈耿國公以其子無擇為朝散大夫唐書本傳高叡萬年人舉明經歴趙州刺史聖厯初突厥黙啜入寇叡嬰城拒虜攻益急長史唐波若度且陷即與虜通叡覺之力不能制即自經不得死為虜執使降諭諸縣不肯應見殺初虜至有為叡計者突厥蠭銳所向無完公不能抗且當下之答曰我刺史不戰而降罪大矣武后嘆息贈冬官尚書諡曰節詔誅波若籍其家下制褒叡忠節波若臣賊使天下知之子仲舒通故訓學擢明經開元初宋璟蘇頲當秉多咨訪焉時舍人崔琳練達政宜璟等禮異之語人曰古事問高仲舒時事問崔琳何復疑終太子右庶子唐書本傳王海賓忠嗣父華州鄭人官太子右衞率豐安軍使開元二年吐蕃寇隴右詔隴右防禦使薛訥率杜賓客郭知運王晙安思順禦之以海賓為先鋒戰武階追北至壕口殺其衆進戰長城堡諸將媢其功按兵顧望海賓戰死大軍乘之斬賊萬七千級獲馬七萬牛羊十四萬𤣥宗憐其忠贈左金吾大將軍唐書王忠嗣傳賈循京兆華原人蘇頲嘗謂今頗牧為益州表署列將敗吐蕃於西山三遷靜塞軍營田使母亡將葬宅有枯桑一夕再生芝出北墉人以為瑞𤣥宗以循有功詔贈其父常山太守禄山反使循守幽州故杲卿招之以傾賊巢穴循許可為向潤客等發其謀賊縊之建中二年贈太尉諡曰忠從子隱林為永平兵馬使當入衞屬朱泚難率衆扈行在德宗見隱林偉其貌問家世答曰故范陽節度副使循臣從父也帝異之令糾察行在遷檢校右散騎常侍封武威郡王賊圍急隱林冐矢石死戰已而圍解羣臣稱慶卒贈尚書左僕射唐書本傳顏杲卿字昕與真卿同五世祖父元孫為濠州刺史杲卿以蔭調遂州司法參軍與兄春卿弟曜卿並以書判超等遷范陽參軍安禄山聞其名表為假常山太守禄山反杲卿及長史袁履謙謁於道賜杲卿紫袍履謙緋袍杲卿指所賜衣謂履謙曰與公何為著此履謙悟乃與真定令賈深内丘令張通幽定謀圖賊使子泉明往返計議時真卿在平原陰養死士為拒守計遣甥盧逖至常山約起兵斷賊北道杲卿大喜以為兵犄角可挫賊西鋒𤣥宗拜杲卿衞尉卿兼御史中丞履謙常山太守即傳檄河北言王師二十萬入土門遣郭仲邕引百騎為先鋒馳而南於是趙鉅鹿廣平河間並斬偽刺史傳首常山杲卿兄弟兵大振禄山聞兵興大懼使史思明等率兵攻常山兵少未及為守計六日而陷與履謙同執賊脅使降不應取少子季明刅頸上曰降我當活爾子杲卿不答遂並盧逖殺之杲卿至洛陽禄山怒曰吾擢爾太守何所負而反杲卿瞋目罵曰汝牧羊羯奴耳天子負汝何事而反我唐臣守忠義恨不斬爾以謝上禄山不勝忿節解以肉噉之詈不絕賊鉤斷其舌曰復能詈否杲卿含胡而絕履謙斷手足賊臠之杲卿宗子近屬皆被害乾元初贈太子太保諡忠節建中中又贈司徒泉明購尸葬長安鳳栖原泉明有孝節常山陷客壽陽真卿為蒲州刺史令泉明到河北求宗屬始一女及姑女並流離賊中及是并得之悉錢贖姑女還取貲復往則已女復失之履謙及父故將妻子尚三百餘人不能自存泉明悉力贍給殯父與履謙分柩䕶還長安履謙妻疑斂具儉狹發視之與杲卿等乃號踊待泉明如父肅宗拜泉明郫令政化清明遷潮州司馬居官廉飦鬻不給居母喪哀毁骨立當世以為難春卿倜儻通當世務舉明經終偃師丞沈盈者亦杲卿甥有行義釋褐博野尉與杲卿同死難唐書本傳龎堅涇陽人歴潁川太守安禄山反南陽節度使魯炅表堅為長史兼防禦副使以薛愿為潁川太守共守潁川賊將阿史那承慶悉銳攻之愿堅晝夜戰諸郡兵無援者自正月盡十一月賊設木鵞衝車飛梯薄城矢如雨士皆雷譟夜半踰城入二人不肯降賊紼致東京將磔解之有說禄山者曰義士也彼為其主殺之不祥乃縛於樹比且死見者哭之唐書本傳蘇震詵子武功人以䕃補千牛累遷殿中侍御史禄山陷京師震棄家出奔會肅宗興師靈武震晝夜馳及行在帝嘉之拜御史中丞終太常卿唐書蘇瓌傳韓浩休子長安人萬年主簿弟洪為華州刺史洪弟渾大理司直安禄山盜京師皆陷賊賊逼以官將走行在浩洪渾及洪四子復為賊擒殺之洪善與人交有節義藉甚於時見者為流涕肅宗以臣子能死難詔贈浩吏部郎中洪太常卿渾太常少卿唐書韓休傳郭旰子儀子鄭人賊安守忠壁永豐倉子儀遣子旰與戰多殺至萬級旰死於陳旰弟晞善騎射復兩京戰最力纍進鴻臚卿吐蕃囘紇入寇加御史中丞援邠州擊虜破之居父喪值朱泚亂南走山谷賊舁致之欲汙以官陽瘖不答賊脅之不動數以城中事貽書李晟旣而奔奉天天子還改太子賓客封趙國公晞弟曙累官司農卿德宗幸奉天曙方獵苑北聞蹕至從乘輿入駱谷與功臣子李昇韋清令狐建李彥輔被甲請見言南行路險且虞姦變臣等相誓願更挾帝馬許之帝還擢金吾大將軍終祁國公唐書郭子儀傳李嗣業高陵人開元中從安西都䕶來曜討十姓蘇禄累功署昭武校尉後安西軍中初用陌刀而嗣業尤善所嚮摧北高仙芝討勃律署嗣業為陌刀將時吐蕃兵十萬據山瀕水以扼王師嗣業提步卒升山頹石四面擊賊虜大潰鼓而驅至勃律禽其主授右武衞將軍從平石國以跳盪先鋒加特進諸胡連兵攻四鎮仙芝為大食所敗嗣業馳守白石嶺會拔汗那還兵塞道嗣業手挺鏖擊人馬斃仆者數十百虜駭走仙芝乃得還進右金吾大將軍疏勒鎮使安禄山反肅宗詔至即引道廣平王收長安嗣業綂前軍賊酋李歸仁擁精騎薄戰王師亂不能陣嗣業􅃝持長刀殺數十人陣復整步卒以陌刀長柯斧堵進所向無前斬首六萬級遂平長安進收東都封虢國公兼北庭節度使與子儀等圍相州師老諸將無功獨嗣業披堅數奮為諸軍冠中流矢臥帳中方愈忽聞金鼓知與賊戰大呼創潰流血數升而卒諡曰忠勇嗣業忠毅憂國不計居產前後賞賜皆以助軍唐書本傳程千里萬年人長七尺魁岸有力應募磧西累官安西副都䕶天寶末安禄山反詔募兵河東即拜節度副使雲中太守遷上黨長史至德二載賊將蔡希德圍上黨千里恃勇開門率百騎欲直擒希德幾得而救至乃退會橋壞馬顛為賊執仰首勑諸騎使還曰為我報諸將可失帥不可失城軍中皆為泣下賊還囚千里至東都唐書本傳郭昕子儀母弟幼明子肅宗末為四鎮留後會吐蕃陷關隴昕率將士閉境拒守北庭去西安七千餘里數遣使奉表皆不達聲問絕者十七年代宗朝昕宻遣間使自囘紇中來華州志令狐彰富平人父濞天寶中尉范陽彰遂少長范陽倜儻有膽氣涉獵書傳知大義事安禄山史思明偽署博滑州刺史鎮滑臺彰感激忠義思立名節乃潛謀歸順募勇士善水者乘夜涉河表請以所管賊一將兵馬及州縣歸順肅宗大悅賜書慰勞時彰移鎮杏園渡遂為思明所疑遣所親薛岌圍攻之彰明示三軍曉以逆順衆心感附與賊戰大破之遂以麾下入朝肅宗深奬之禮甚優厚拜御史中丞兼滑州刺史鎮滑州在職數年田疇大闢庫藏充積嵗奉王稅及脩貢獻未嘗暫闕時吐蕃犯邊徵兵防秋彰遣屬吏部綂營伍自滑至京師率自齎糧所過供擬皆讓不受識者稱之子建大厯四年入朝特加兼御史中丞歸滑州彰卒三軍逼奪情建守死不從舉家歸京師轉右龍虎軍使德宗出幸奉天建方敎射軍中遂以四百人隨駕為後殿加檢校左散騎常侍舊唐書本傳馮河清京兆人始𨽻郭子儀軍以戰多拜左衞大將軍後從涇原節度馬璘充兵馬使數以偏師與吐蕃遇多効級名聞軍中建中時姚令言討關東以河清知留後行師過闕有急變德宗走奉天河清召諸將計事東向哭相勵以忠衆無異言即發儲鎧完仗百餘乘獻行在披堅勒兵軍聲大振拜河清涇原節度使安定郡王朱泚數遣諜人訹之河清輒斬以狥興元元年田希鑒害河清京師平贈河清尚書左僕射再贈太子少傅唐書本傳辛讜雲京孫京兆人初事李嶧性廉勁居揚州慨然常有濟時意龎勛反攻杜慆於泗州讜聞之挐舟趨泗口貫賊柵以入慆素聞其名握手曰吾僚李延樞常為吾道夫子為人何意臨敎吾無憂矣賊將李圓焚淮口讜曰事棘矣獨出可以求援乃夜踰淮馳至洪澤見戍將郭厚本告急大將袁公异等曰賊衆我寡不可往讜拔劍瞋目呼曰泗州陷在旦夕吾今斷左臂殺君去推劍直前厚本持之公异僅免厚本決許付兵五百讜徧問士曰能行乎皆曰諾讜泣以謝衆擊賊大敗人心遂固圍三月救兵敗城益危讜復請乞兵與壯士持斧夜斬賊柵出見節度使令狐綯復詣浙西見杜審權合兵五千路梗不得進讜引兵決戰斬賊六百級乃克入慆迎泣表其功於朝授監察御史圍凡十月乃解初讜求救過家十餘未嘗見妻子後以功第一拜亳州刺史乾符末終嶺南節度使唐書本傳杜慆悰弟杜陵人咸通中為泗州刺史會龎勛反圍城處士辛讜勸慆出家屬獨以身守慆曰吾出百口求生衆心搖矣不如與將士死生共之衆聞皆泣下慆完濬城隍閱器械無不具賊將李圓易慆馳勇士百人欲入封府庫慆為好言厚禮迎勞賊不虞慆之謀明日伏甲士三百宴毬場賊皆殱焉圓怒傅城戰慆殺數百人圓退未幾賊焚淮口晝夜戰不息慆使人間道走京師詔戴可師以沙陀吐谷兵二萬招討淮南節度使令狐綯遣牙將李湘屯淮口為圓所敗湘等並没於是援絕賊乃以鐵鎻絕淮流梯衝乘城懿宗遣使加慆檢校右散騎常侍勉以堅守勛遣圓入城見慆約降慆怒殺之勛纍攻不得志會招討使馬舉率兵至遂解去圍凡十月慆拊循士卒皆殊死戰卒完一州時稱為難賊平遷義成軍節度使檢校兵部尚書卒唐書杜佑傳杜讓能字羣懿審權子杜陵人擢進士第為集賢校理稍進兵部員外郎僖宗狩蜀奔謁行在三遷中書舍人為翰林學士方兵興調發綏徠讓能處事機無所遺算帝倚重之從還京師再遷兵部尚書李克用兵至帝夜出讓能徒步從之朱玫兵逼帝狩梁是時棧道為南山石君涉所毁間關險澁讓能未嘗去側帝次褒中擢兵部侍郎同平章事於時貢賦不輸行在衞兵往往乏食讓能遣使入河中諭王重榮榮果奉詔京師平進中書侍郎昭宗立累進太尉李茂貞守鳳翔恃有功不奉法帝詔茂貞領興元武定以徐彥若為鳳翔節度使茂貞不赴鎮帝怒詔讓能計議曰卿為我圖之朕自以兵屬諸王讓能泣曰陛下之心憲祖心也但時有所未便他日臣䝉􅄯錯之誅顧不足弭七國患然敢不奉詔景德二年以嗣覃王為詔討使率師送彥若赴鎮茂貞迎戰盩厔覃王敗讓能曰臣固豫言之請歸死以紓難乃賜死弟彥林御史中丞𢎞徽户部侍郎皆及誅帝痛之後贈太師子光乂次子曉不復仕唐書杜如晦傳韋昭度字正紀京兆人擢進士第踐歴華近累遷中書舍人僖宗西狩進同平章事還京授司空再狩南山還次鳳翔李昌符亂昭度質家族於禁軍誓共討賊士感動乃平昌符昭宗即位封岐國公進太傅王行瑜求為尚書令昭度建言太宗由是即位後人臣無復拜者郭子儀有大功嘗授之因辭免況行瑜乎乃更號尚父行瑜恕請貶之未及報而行瑜收昭度於都亭殺之後追贈太尉唐書本傳于琮字禮用高陵人休烈曾孫擢第授左拾遺咸通八年同平章事拜尚書右僕射黄巢陷京師以病臥家巢欲起為相琮辭疾賊迫脅不止乃曰吾死在旦夕位宰相義不受汚賊遂害之唐書于琮傳王徽字昭文京兆人第進士廣明元年為户部侍郎同平章事是日黄巢入關僖宗西狩徽追帝不及為賊所執將汙以官徽陽瘖不答以刅環脅卒不動久之守者懈乃奔河中裂縑書章遣人間走蜀詔拜兵部尚書京城四面宣慰催陣使更為租庸供軍使因請赦沙陀罪令赴難其夏沙陀會諸軍遂平京師遷右僕射大亂之後宫觀焚殘園陵發掘徽充京畿安撫制置脩奉使外調兵食内撫流亡踰年稍稍完聚即奉表請帝東還進檢校司空御史大夫仍權京兆尹宦要家爭遣人治第侵冐齊民訟訴滿前徽一平以法由是為左右所憎遂移疾免昭宗立授吏部尚書大順元年卒贈司空諡曰貞唐書本傳宋韓杲華州鄭人為曲陽主簿及寇攻城陷殁焉宋史韓丕傳蔣偕字齊賢華州鄭縣人幼貧有立志父病嘗刲股以療父愈詰之偕曰情之所感實不自知也舉進士為大理寺詳斷官宻州豪人王澥使奴殺一家四人偕當澥及奴皆大辟宰相陳堯佐欲寛澥持之不從偕以是知名歴知汾涇二州徙原州邊民苦屬户為鈔盜偕得數輩腰斬境上盜為息珠明康奴諸族數為寇偕潛兵伺之斬首四百徙華州鈐轄湖南蠻唐和内寇徙潭州賊平知忻州儂智高反除韶州團練使廣南東西路鈐轄軍次賀州太平塲賊夜入營襲殺之贈武信軍節度觀察留後宋史本傳劉懷忠保安軍人官内殿崇班閣門祇候元昊叛厚以金幣及王爵招之懷忠毁印斬使洎入寇力戰以死宋史本傳高永能字君舉綏州人少有勇力善騎射由行伍補殿侍稍遷供奉官种諤取綏州發永能兵六千先驅入囉兀五戰皆捷治綏德城闢地四千頃增户千三百即知城事元豐初為鄜延都監秋大稔夏人屯一千騎於大會坪將取稼永能簡精騎􅊳過其營騎卒驚潰獲鈐轄二人轉六宅使夏人患之令曰有得高六宅者賞金等其身四年西討永能為前鋒鏖戰於無定河斬首數千級得馬三千槖駞牛羊萬計進東上閣門使永樂之役獻謀皆不用城旣陷其孫昌裔欲拔之從間道出永能歎曰此吾死所也易一卒敝衣戰而死其子世亮與昌裔求得尸以歸邊人無不痛惜詔贈房州觀察使永能之亡延州將皇城使宼偉亦力戰而没贈均州防禦使宋史本傳張確字子固邠州宜禄人元祐中擢進士第徽宗即位應詔上書言十事乞誅大奸退小人進賢能開禁錮起老成擢忠鯁息邊事修文德廣言路容直諌宣和二年知坊汾二州七年徙隆德府明年二月金兵至知城中無備諭使降確乘城拒守力戰而死欽宗聞之悲悼贈述古殿直學士宋史本傳种朴世衡孫長安人知河州蕃部叛朴出討時朴至州才二日以賊鋒方銳且盛寒欲姑待之而胡宗囘馳檄至六七不得已遂出兵羌知朴來伏以待朴遇伏首尾不相應朴殊死戰為賊所殺以馬負其屍去事聞贈朴防禦使宋史本傳李翼麟州新秦人宣和末為代州西路都廵檢使屯崞縣金人取代執守將嗣本遣諭降翼射却之帥士卒堅守義勝軍綂領崔忠殺都監張洪輔夜引金兵入城翼挺身搏戰達旦力不敵被執酋粘罕欲臣之怒罵不屈死之宋史本傳朱昭字彥明府谷人宣和末為振武城兵馬監押攝知城事金兵内侵夏人乘虛攻之城壞不可復支昭退召諸校謂曰城且破妻子不可為賊汚幸先戕我家而背城死戰勝則東向圖大功不勝則暴骨境内大丈夫一生之事畢矣衆未應昭幼子戲堦下遽起手刅之長子驚視又殺之徑領數卒屠其家人舁屍納井中賊登城昭勒衆於通衢接戰自暮達旦屍填街不可行昭躍馬從缺城出馬蹷墜塹賊驩曰得朱將軍矣生致之昭瞋目仗劍無一敢前旋中矢死年四十六宋史本傳种師中字端儒世衡孫長安人歴知邠州慶陽府金人内侵師中援中山河間尼堪至太原師中抵壽陽之石坑為金人所襲兵潰獨以麾下死戰身被四創力疾鬭死師中老成持重為時名將諸軍自是氣奪其聞命即行奮不顧身雖古忠臣不過也詔贈少師諡莊愍宋史本傳楊綯邦基父華州人宋末為易州州佐宗望伐宋蔡靖以燕山降易州即日來附綯被殺金史楊邦基傳吳革字義夫華州華陰人好學喜談兵以秉義郎幹辦經畧司公事金人南牧使尼堪軍見之庭揖不拜責其貪利敗約詞直氣勁尼堪少屈為追囘威勝諸屯兵授書使歸欽宗問割地與不割地利害對曰金人有吞噬之意願悉起關中士馬赴都為備詔以為閣門宣贊舍人持節諭陜西行至朱仙聞金人犯京師復還與張叔夜同入城請於帝乞幸秦州又乞出城刼之使不敢近又乞諸門同出兵牽制衝􅋓尾襲應援可一戰而勝時衆言已入皆不果後金人攻安上門填道度壕革言之守將使洩蔡河水以灌之不聽及填道將合欲用前議則水已涸矣車駕幸金營革以為墮其計往請叔夜欲身見其大酋計事叔夜問其故曰茲行有三說一則天子還内二則金騎歸國三則革死叔夜為言之不報上皇妃后太子出郊革白孫傅乞留之不得乃與傅謀於啓聖僧院置賑濟局募士民就食一日之間至萬計陰以軍法部勒久之所合已至數萬多兩河驍悍之士旣而有立張邦昌之議革謀先誅范瓊輩以三月八日起兵謀旣定前期三日有班直甲士數百人排闥入言邦昌以七日受冊請亟起事革乃披甲上馬至咸豐門四面皆瓊黨紿革入即執之脅以從逆革罵之極口引頸受刅顏色不變其麾下百人皆死宋史本傳劉化源耀州人紹聖元年進士建炎初金人陷關陜守令以城降者金人因而命之化源時知隴州不肯降城陷被執金人使人守之不得死遂驅入河北鬻蔬果隱民間者十年終不屈有米璞者與化源同鄉里登政和二年進士第時通判原州劉豫欲官之杜門謝病卒不汙偽命有劉長孺者亦耀州人時簽事博州判官㕔公事與豫書備陳祖宗德澤勸以轉禍為福豫怒囚之百日長孺終不屈豫後復官之不從紹興九年宣諭使周聿上之朝詔赴行在簽書樞密院事樓炤言璞苦風痺化源長孺老病遂命各轉兩官奉祠又言新鳳翔敎授陰晫守節不仕詔特改令入官其後金復渝盟長孺之華陰縣不屈而死宋史本傳張吉宗顔父延安人為涇原將解宣威城圍死之宋史張宗顏傳李好義下邽人祖師忠州團練使父定一興州中軍綂制好義弱冠從軍善騎射為興州正將吳曦受金人說以蜀叛亟歸與其兄對哭謀誅之密結親衞軍黄術趙亮吳政等女弟夫楊君玉亦與知長史安丙與楊巨源陰結忠義欲圖曦好義遂遣君玉報丙丙喜曰非綂制李定一之子乎此人來斷曦臂矣約二月晦舉事好義夜享士麾衆受甲與好古好仁及子姓拜決於家廟衆皆踴躍時偽宫門洞開好義大呼而入曦露頂徒跣開寢户欲遁遂斫其首出偽宫亟馳告丙城中市不改肆好義請乘時取關外四州王喜忌其能沮之好義曰西和乃腹心之地願得馬步千人死士二百齎十日糧可濟丙從其請好義率衆攻城親犯矢石人人樂死以少擊衆前無留敵金西和節度使完顏欽奔遁好義整衆而入欲乘勝徑取秦隴宣撫令謹守故疆不得侵越士氣皆沮好義以中綂制知西和州卒諡曰忠壯宋史本傳張珏字君玉鳳州人以戰功累官中軍都綂制號虓將寶祐末大兵圍合州珏與王堅恊力守之景定初堅入朝以馬千代四年乃以珏代千珏魁雄有謀善用兵出奇設伏算無遺策其治合州士卒必練器械必精御部曲有法故人人用命咸淳三年四月賽音迪延齊提兵出合州城下珏碇舟斷江中為水城大兵數萬攻之不克遂引去德祐元年陞四川制置副使知重慶府二年十二月珏入重慶至元十五年二月珏率兵出戰兵大潰歸索鴆飲左右匿鴆乃以小舟載妻子東走涪中道大憾斧其舟欲自沈舟人奪斧擲江中珏踴躍欲赴水家人挽持不得死明日鐵木兒追及於涪執送京師珏至安西趙老庵解弓絃自經厠中宋史本傳金楊達夫字晉卿耀州三原人泰和三年進士會有詔徙民東入關達夫與衆行及韶避兵於州北之横嶺為遊騎所執將禠衣害之達夫挺然直立馬首畧無所懼稍侵辱之即大言曰我金國臣子旣為汝所執不過一死忍裸袒以黷天日耶遂見殺金史本傳完顔陳和尚名彞字良佐豐州人父乞哥同知階州軍事戰殁於嘉陵江陳和尚試補䕶衞轉忠孝軍提控正大五年北兵入大昌原合達問誰可為前鋒者陳和尚擐甲上馬不反顧是日以四百騎破八千衆奏功第一授定遠大將軍六年有衞州之勝八年有倒囘谷之勝九年三峯山之敗走鈞州城破陳和尚趨避隱處殺掠稍定乃出自言曰我金國大將欲見白事詣行帳前曰我忠孝軍總領陳和尚也我死亂軍中人謂我負國家今日明白死天下必有知我者時欲其降斫足脛折不為屈割口吻至耳噀血而呼至死不絕大將酹以馬湩祝曰好男子他日再生當令我得之時年四十一金史本傳劉興哥楊沃衍部將率兵往來邠隴間屢戰屢勝故大軍猝不能東下興哥鳳翔虢縣人起於羣盜人呼曰熱劉後於清化戰死大兵至酹酒以弔西州耆老語之至為泣下金史本傳元董成夫奉元人以軍功授察罕諾爾宣慰使敵兵入邊殁於王事贈中大夫樞密院副使諡忠烈賈志明王真咸寧人洪武中以功授燕山右䕶衞百户從靖難出奇制勝肥河之戰斬獲無算而後隊不繼被圍數匝真氣愈奮斬敵數十人馬上自刅而斃續文獻通考高翔朝邑人洪武中以明經徵為監察御史所論奏皆國家機要多被采納建文時尤戮力戎事相與激發忠義初翔與程濟並徵翔勵名節濟好術數翔止濟勿為此不聽已而有兵事濟又勸翔學其術翔曰我願為忠臣也金川門破翔招濟同死濟曰我願為智士文皇素聞翔名即位後召之翔持喪服入見大哭語不遜乃命殺之没產夷族諸給高氏產者皆加稅曰令世世罵翔也親戚悉戍邊又發其先墓雜犬馬骨焚灰揚之而以其地為漏澤園世法錄韓永陜西西安人或曰浮山人豐軀美髯音吐宏朗官户科給事中慷慨論兵建文喜之靖難後杜門不出召入見不屈死續藏書趙義商州人洪武中進士任中軍都督府經厯死於靖難親族為盡今其地名為趙峪賈志程濟朝邑人以明經為岳池敎諭去家數千里濟夜歸朝邑朝講岳池人咸異之建文初熒惑守心濟上言明年某月某日兵當從西北方起帝曰安得此不祥語將誅之濟請囚而觀之明年燕果起兵帝出濟獄中以為翰林院編修使充軍師䕶軍小河之戰南軍大捷諸將樹碑露功誇列姓名濟固辭不得夜自禳碑下鐫之及靈壁之戰南軍大敗成祖過軍碑下大怒命鐫㓕之遽使止曰録其姓名來乃如碑按治濟名獨以先鐫脫及金川門破濟自髠從建文君亡屢免之於阨其後建文君出滇濟嘗從行已莫知其所終名山藏趙天泰三原人建文元年以明經為翰林編修出亡之日天泰與焉時衣葛因自稱衣葛翁又號為天肖子後老死於蜀表忠紀王志咸寧人永樂初進士授吏科給事中陞河南知府四年草宼猝發死之勑旌忠臣表忠紀高士文咸陽人官燕山左䕶衞百户從靖難有功纍陞前軍都督僉事為人質直剛果善騎射其征交阯多効勞勩勦賊至廣源州没於陣人皆惜之名山藏路俊字文英富平人官錦衣衞百户英宗北征俊扈從土木敗績俊潰圍而出號召軍將軍將莫應又擊虜營未至行在力竭遇害天順間諡昭信子誠世襲錦衣衞百户富平志王尚文商州人正綂中舉進士授户部主事土木之變没於沙漠賈志霍瑄字大宗鳳翔人永樂中舉人授山西大同通判陞知府正綂十四年英宗土木之變守城者戒嚴不敢啓瑄感慨奮不顧身從水竇匍匐出親叩馬嗚咽進膳羞靴袍賈志姜漢字大容榆林人由指揮歴總兵鎮寧夏正德五年寘鐇之變其黨何錦周昂丁廣等謀置酒王宫伏兵召鎮廵官挾之使叛漢至寘鐇以微言挑漢漢責以大義寘鐇知不可奪伏兵起執之漢罵不絕口遂遇害事聞賜祭葬加子奭官指揮使後鎮甘州數立邊功能世其家部將有李秦者綏德衞千户於寧夏花馬池石溝堡戰死延安府志殷輔西安前衞指揮僉事正德七年調征四川與賊廖麻子戰於德陽死之時有遊擊姚震榆林人亦征蜀寇戰殁賈志馮禎綏德衞指揮歴榆林副總兵正德七年流賊猖獗禎奉命討之連戰皆捷及洛兵半渡賊悉衆薄之戰死事聞贈洛南伯建祠於河南府延綏鎮志蔣賢榆林人以監生任靈璧縣主簿有清謹名時流賊犯鳳陽賢以靈璧去皇陵不遠繕城隍修戰具選民丁以備之賊至賢禦之郭外力不敵衆潰城遂陷賢短兵巷戰賊趣降賢曰榆林忠孝地我有死而已遂為亂兵所殺事聞賜祭奠於靈璧妻謝氏守節十數年以饑死無嗣延綏鎮志邵璋西安後衞人正德中舉人任登州府通判流賊犯境璋率衆力戰死之賈志霍宗鄜州人正德十四年回賊作亂掠州境兵備道甯溥遣指揮率戍卒及民兵捕之至石梯山賊勢猖獗衆潰走宗以鄉兵獨當一面力不能支死於難鄜州志張澍渭南監生正德末任江西按察使知事宸濠反械繫之驅令督舟投水死渭南縣志郭江榆林衞指揮歴固原總兵官戰於定邊死之賜葬祭建憫忠祠蔭一子指揮世襲是時有綏德衞指揮孟仁中軍指揮賀節者以力戰死於定邊又有龍州把總延安任傑者臨陣見殺延綏鎮志張鳳榆林衞指揮大同𢎞寺堡參將以罪謪戍嘉靖中總督翟鵬題起廢官立功贖罪鳳赴焉戰於鵓鴿峪全軍覆殁詔復官建祠蔭次子正千户是時死事者又有把總宗俍臣戰殁於永興之頁沙梁俍臣威武堡人又榆林衞指揮王璋延綏衞指揮僉事史畧指揮孫世傑皆戰死於宣府延綏鎮志趙天福延綏奇兵營軍也嘉靖二十四年隨副總兵李琦被圍於靖邊指揮崔經力戰矢石如雨天福以身翼蔽經得免三十三年副總兵李梅雙山之戰天福從管司賈琛先登軍敗琛與天福同戰死延綏鎮志武城榆林人正德間武舉與千户李江管本鎮司事嘉靖初禦敵於紅山兒敵衆兵寡力戰而殁延綏鎮志高儒綏德衞百户嘉靖中隨遊擊梁震拒敵於棗茨梁死之又有宋銳者榆林衞百户嘉靖中隨副總兵白爵戰殁於高家堡之馬鞍山延綏鎮志王勲渭南人襲祖職為延安衞百户驍勇多智所向克捷歴陞寧夏副總兵嘉靖中邊境不靖勲率師出戰於鹿泉敵大至勲據險發矢力戰移時矢盡而殞世宗錄其忠詔立祠子以寧襲指揮使渭南志孫臏綏德衞指揮為薊鎮總兵嘉靖中勤王戰死傅楫傅潛子萬厯中陣亡延綏鎮志馮恩榆林千户厯官指揮僉事嘉靖中由延綏遊擊陞大同參將前守將遇警多不出恩至力戰死之贈右軍都督府都督諡壯愍蔭子時泰指揮僉事世襲又千户姬曉亦死於大同延綏鎮志杜松號鶴林榆林人少負胆決精騎射軍中目為飛將萬厯間火落赤糾套騎吉能屢為邊患松從總兵官麻貴為前鋒屢破走之積功至坐營中軍二十三年領兵出常樂塞先登陷陣論功最進實授參將繼敗火落赤於安定又敗鐵雷於磚井威名日起請告歸松在軍與士卒同甘苦紀律甚嚴又驍果善戰松去邊四年督撫以邊事急交薦之詔起原官協守延綏東路炒忽擁衆寇孤山之紅崖堡松率精騎直前搏之斬其部長十二奪駝馬鎧仗無算進都督僉事掛征西將軍印專守延綏三十四年大敗火落赤於安邊塞吉能邀王封不得大舉宼邊又勾東西部入犯松分馳應禦諸部皆退走多棄其所掠人畜輜重去西陲倚為保障復告歸四十六年王師破撫順鐵嶺中外大震言官爭薦以原官起駐瀋陽破家募士及蒼頭廬兒得數千人疾馳出關四十七年春經畧楊鎬分四路出兵松一軍出南路經畧原期三月朔進兵松自負夙將先二日三鼓嚴裝出撫順王師聞松先出亟簡精銳三萬騎悉力禦之松越五嶺渡渾河已半渡忽萬騎遮擊軍衝為二車營鎗砲在後水急不能即渡林間伏四起自午至酉血戰力竭全師殱焉松碎首淪没寸骨不存續表忠記袁應泰鳳翔人由永平道陞遼撫適熊廷弼被論代為經畧辛酉二月王師渡渾河臨遼城至三月二十三日城破經畧登樓拜疏佩印劍自裁内姪姚居秀從之僕唐世明撫屍大慟焚樓而死續表忠記段展涇陽舉人厯自在州知州轉餉出關駐瀋陽時日暈異常展移牒經畧言天象示警宜預飭邊防踰月而瀋陽城破展死之續表忠記姬文𦙍字士昌華州人萬厯癸卯舉人謁選滕縣知縣莅任三日白蓮賊攻滕縣時滕民什九從賊公徒步呌號登陴才數十人問民何以從賊則曰禍由董二董二者延綏巡撫某子也公登城呼賊曰若等以董二故挺而走險吾執董二治其罪以伸若寃若等復為良民可乎公長身赤面髭髯奮張乘墉大呼聲殷殷動樓櫓賊望見以為神人讙呼羅拜俄而箭發於西隅二賊斃焉視之則延綏沙栁簳也賊憤盈肉薄而上遂不可禦公緋衣坐堂上嚼齒罵賊賊前搏公裂其冠裳以鋃鐺鎻之公大罵胡不速殺我越三日為詩八章書於屋壁以印狀授門役魏顯炤家僮守務北向再拜自縊而死遂葬於官署之池側賊考掠顯炤索印顯炤及守務罵賊死之詔拜錄顯炤守務復其家墓志楊愈懋潼關衞人萬厯末為中軍都督天啓癸亥蜀奢寇亂命愈懋總鎮四川獲捷功者五急欲進掃其巢遂率師至江門候援兵不至愈懋曰事不可為矣乃以勑印齎巡撫望闕遙拜曰此戰犂庭社稷之福茍或失利以死從之決計深入竟遇害妾王氏聞訃絕粒死潼關志此按奢崇明亂蜀是天啓中事愈懋盡節必在時潼關志作佘酋當是奢佘音近相訛耳牛彩南鄭人以明經為成都敎授多士奉為師表為奢賊所執不屈被殺漢中府志鄭國昌字天符邠州人萬厯丁未進士任永平兵備道己巳王師下永平有勸出亡者國昌厲叱之先令妻子縊死乃從容自盡事聞追贈太僕寺卿從祀表忠祠畿輔通志子奉先以蔭歴衡州府同知亦殉難邠州志党還醇字子真三原人天啓乙丑進士為良鄉令有聲己巳城破死之妾媵友僕死者一十二人事聞贈光禄寺丞賈志高運馨神木人崇禎初王嘉𦙍倡亂運馨被掠拷索財帛因極罵投河死時賊入貢生蘇萬元室萬元瞪目罵不已賊怒斫之又有秦光祖李亨俱涇陽人仗義討賊俱力竭而死賈志薛永譽吳堡人嵗貢崇禎三年賊大起七月犯吳堡之川口永譽先奉母居城中身率衆守虎頭二寨攻圍旣久永譽知力不支盡趣寨中老弱渡河永譽自斷後以禦賊賊衆蝟集矢石如雨遂入河中死又安定王俊彦字升庸素重氣節寇陷城閤室自縊賈志秦三輔字陸海萬厯戊午舉人令新城值吳橋兵變直攻新城三輔率衆守陴身被七創而死三原縣志方振寰字斗華城固人崇禎丁夘舉人任山東福山知縣城破死之賈志梁體坤字寧宇臨潼人增廣生崇禎五年流賊縱掠其地令牽馬坤大罵曰我朝廷士子豈為賊驅使耶賊舉刅斷其四肢遂殺之臨潼志楊呈秀字實甫華陰人登萬厯庚戍進士歴官順慶知府後罷官家居會流寇侵掠慨然結鄉勇以為保固得數千人每戰獲捷崇禎七年賊衆大至迎戰於縣西二十里不勝或勸之退避叱曰丈夫受國恩臨難當致死豈可縮首茍生遂奮呼當先力竭被執賊怒甚遂磔殺之直指傅永淳以聞贈光禄寺少卿賜祭葬弟呈芳字泗源性篤孝友兄呈秀禦賊被執呈芳泣曰兄亡弟豈獨存遂單騎直入賊營横戰至暮身帶重傷猶斬賊數十人及項將斷呼兄之聲不絶直指并以聞建坊旌表華陰志張應昌字順之榆林人初為延綏副總兵崇禎四年正月賊神一元陷保安應昌擊敗之三月賊圍慶陽應昌援之賊解去降賊不沾泥擁衆脇糧賞攻米脂洪承疇與應昌往討賊分兩營以待連戰賊始遁至西川斬三百餘級賊溺死無算六月鄜州賊混天猴張孟金謀襲靖邊應昌邀之於真水川敗之追斬四百餘級神一元死弟一魁領其衆降尋叛去其黨黄友才斬之來歸旣而友才復叛至是為應昌所誅以功陞寧武總兵官加都督同知紫金梁諸賊破臨縣山西震動六年二月許鼎臣曹文詔屯平定應昌屯汾州往來太原以禦寇七月賊攻彰德應昌進勦賊汾陽九月敗賊於平山獲賊首張有義即一盞燈也七年四月川賊三萬屯鄖陽之黄龍灘應昌與戰於均州敗績死之延安府志張景耀字振兮盩厔廩生時流氛四煽景耀以禦宼保鄉閭自任知縣田時暢令主義兵訓練嚴肅崇禎七年七月賊鑽天鷂等循山而至景耀遏之西境乘勝追至謝家灘會天大雨衆潰為賊所獲支解之又同邑諸生雷一聲里民翟羽翺與叔翟三皆率鄉兵禦賊衆潰而死盩厔志黎屛極鳳縣武生崇禎七年流宼破城屛極挺身巷戰自辰至午以刀折見殺漢中府志薛國蕙華州人以寧夏守備家居弟國華郡諸生崇禎七年八月流寇千人盤踞西南石脆山峪肆行屠掠國蕙及國華欲奮身搏戰苦無兵適御史傅永淳入關抵華阻寇聞其事呼至面諭勦賊遇賊於峪口之柿村同義勇姬文啓羅國楨史曰環王紹禹馬任等十八人喋血大戰俱陷陣而殁賊死甚衆即夕遁賈志徐應龍應鰲華州人應龍為山東鄒縣典史應鰲為四川雅州吏目崇禎七年流寇刼掠俱被虜不屈死時同郡諸生范祖淹壽官徐邦瑞皆罵賊死華州志韓識武功人儒生崇禎甲戍守堡禦賊堡已陷猶持梃當門傷數賊賊壯之不欲殺識大罵不已竟磔死賈志王祚丕字念兹涇陽人崇禎甲戍流寇入境祚丕奮率鄉勇戰於王六十橋手刅數賊為流矢所中而殁涇陽志屈學曾鳳翔縣諸生崇禎中流寇大起當事檄屬邑各練鄉勇為守禦計學曾身承其事八年春賊趨鳳翔學曾督衆力戰陷陣死涇陽志張全昌字濶之應昌弟以父蔭歴官靈州參將崇禎四年延安賊趙四兒以萬餘人掠韓城郃陽全昌以五百人戰三日斬三百餘級賊走鄜州復擊斬六百餘級趙四兒尋降陞宣府總兵官七年二月河南賊自鄖陽渡河入郢陷房縣全昌連敗之七月賊混世王等從鳳翔東奔將犯西安洪承疇檄諸路兵合擊又恐賊東出潼關先令曹變蛟同全昌間道走渭華遏其前而自率兵至潼關紅鄉溝追賊賊郤承疇馳赴藍田欲從山後間道勦之賊夜走商洛八年五月全昌自咸陽出興平之東距老􅉰􅉰營五十里賊渡河走郿縣官兵追至秦王嶺值寇大至全昌擊敗之自是商洛之寇逃終南山中餘寇西奔興平遂祈降陰遣諸賊連營走潼關守將艾萬年等兵潰全昌亦没於陣子福壽武舉任宣府深井堡守備亦以勇力聞賈志王廷賓字觀光澄城人崇禎戊辰進士任鄢陵令調永城以治行卓異與考選旋丁艱歸里八年秋賊混天星破城被執不屈而死澄城志梁民養韓城諸生崇禎八年寇至民養攜家入砦自保寇攻急度不能全泣跪母衞氏前母自裁呼妻女至手刅之三子皆遣去遂自經死韓城志張國禎字藎翼臨潼人從兄給諫國祥講實踐之學一夕賊數十刼其父國禎即持梃赴之免父於厄人稱其孝崇禎乙亥流賊薄城率族人避去夜深雨雪曰不可獨全吾家於是率僕人遍至隣家令亟起避難黎明賊突至率衆禦之手刃數賊相持至未力疲被執不屈遂遇害賈志杜必殿字賓皇世居咸陽北杜鎮崇禎乙亥賊薄邑必殿倡義堅守援兵不至城遂陷被執賊有渠魁奇其貎露刃逼降必殿不屈指賊罵曰若獨非朝廷赤子何竟反耶賊怒甚遂遇害鶴雪堂集俞翀霄靖邊人任延綏總兵崇禎九年闖賊擁兵北至時翀霄蒞任甫月餘倉卒率兵五千拒之於西川土壑砦遇賊力戰自辰至酉殺獲甚衆援兵不至遂死焉延綏志鄭國禎延長人以選貢授歸德府通判尋告歸崇禎十年六月流寇陷城子諸生鳴世欲奉之逃國禎曰城亡吾安所逃乎遂自刎死鳴世見父死義不與賊俱生奮刀出門殺賊力盡被執賊過天星壯其貌欲釋之鳴世仰天大呼曰父死吾何生為罵不絕口賊殺之同邑張程恩貢生授南陽府經厯終養家居城陷以大義諭賊賊怒殺之賈志茍好善字若誠醴泉人天啓乙丑進士歴長治蘭陽令有惠政擢御史建言忤㫖出知濟南府戊寅王師南下好善分守北城城陷死之贈太僕寺卿子鶴齡字子和聞父死徒跣走數千里遍覔遺骸出於壕下始扶櫬歸葬時兵火倉皇幼弟延齡壽齡俱相失鶴齡間關求訪復得完聚蓋孝友兼至云同時又有茌平令黄建極文安令王鑰俱武功人武邑令鄭集命延長人鉅鹿令郭司南安塞人任邱令白元慧清澗人皆城破力竭而死白妻某氏郭僕張爾璋同死焉賈志劉光祚字鴻基榆林人積功至保定提督三關總兵以河南賊盛督師楊嗣昌調援勦過南陽唐藩留守郡城值李自成兵數十萬來攻光祚血戰七晝夜力盡而殁延安府志劉國能之守葉也力戰不能支城陷自成念國能幼同里習嬉戲稍長同學拳武又同起草澤有意欲生之乃好語國能曰若我故人也何不服國能唾而罵曰我初與若同反今則王臣也奈何從賊遂遇害續表忠記豫撫常道立招撫射塌天等射塌天本名劉國能性至孝就撫乃奉其母命也庚辰六月左良玉遣國能圍張獻忠於瑪瑙山獻忠食盡分兵四出抄糧不得糧歸者盡殺之未歸者詣降左良玉使國能將之首行詐稱糧至獻忠開營延入國能掃其營壘擒其妻孥與徐以顯潘獨鰲等送襄陽獄自成破葉縣國能守葉自刎死其妻先死子方八嵗自成入城抱置膝上欲收養之不從自解所帶小刀亦刎死明季遺聞按續表忠記國能附汪喬年傳盡節在十四年明季遺聞作庚辰年事不合武大烈臨潼舉人强敏有幹濟時令永寧寇掠境上數卻之至是獄囚勾賊來攻城守都司宵遁大烈固守三日賊夜半登城執大烈自成以同鄉故欲活之大烈不屈索印又不予乃燔灼以死續表忠記盛以恒潼關衞人崇禎十年冬來知商城縣事雖儒者而秦人素習金革甫涖任寇猝來犯以恒登陴設守以兵法部勒邑中子弟賊攻城不能克乃解去嗣後不復來犯邑賴以安及獻忠陷襄陽勢益張以恒已遷開封府同知士民以其前此禦寇有方畧城得無陷羣起攀留以恒因士民歸誠於已遂慨然任城守事十四年二月賊大隊雲集以恒堵禦甚力雨雪大作守陴者寒凍不能支以恒猶擐甲執弓督家衆射賊賊益併力合攻流矢中以恒右額猶裹創拒敵敗留餘黨綴以恒而别揀驍悍緣北城而登遂陷以恒率家衆巷戰良久殱賊甚多家衆亦盡於賊乃被縳大罵不屈為賊所支解其孫覺亦不屈死事聞贈副使續表忠記葛竹溪淳化諸生善射崇禎十四年流寇滿天星過縣恣行剽掠竹溪不勝忿急挽弓挾矢而往射賊殺十餘騎須臾矢盡弦絕賊衆大至遂遇害於寺坡崖下柴菴疏集猛如虎虎大威俱邊外人家榆林如虎歴總兵官鎮守南陽屢卻賊及圍城將陷持短兵巷戰手及袍袖有血數升過唐府北門叩頭謝自稱力竭為賊所殺大威為楊文岳大將鎮守汝寧攻土賊中礟而死延綏鎮志李賢中部嵗貢任汝寧敎諭以老歸崇禎十四年寇陷中部執賢欲加笞辱賢張目大罵延頸向賊賊竟殺之子諸生芬宇慟父死歴白當道得祀卿賢賈志艾毓初字孩如米脂人崇禎辛未進士知内鄉縣毓初生長邊陲知兵習戰六年冬流賊來犯毓初令埋大砲滚地龍於城外城内暗通火線故於埋砲處備禦單疎示賊以瑕賊果爭馳之燃線而炮發賊死無算乃解去歴陞至參議分守南陽自成用宋獻䇿計復來犯楊文岳援軍至即引退甫退又復嘯聚使援者疲於奔命城遂潰毓初登城樓自縊續表忠記杜邦舉富平人任鄢陵典史崇禎十四年十二月城破被執自成知其素得民心欲降之大罵曰朝廷臣子豈為賊用自成怒抉其舌邦舉噀血噴之仍大罵遂遇害續表忠記馬嗣烋字孟善同州人官户部主事管薊鎮糧儲壬午年死難母薛氏弟嗣杰與焉又嗣烋從兄嗣煜官濟南府通判城破亦以身殉賈志党威字振玉神木人以西安參將有戰功見重於經畧丁啓睿崇禎十五年督師汪喬年綂兵二十萬勦闖賊威以中軍副將進秩總兵同四總兵十副將當闖賊八十萬衆環戰十七陣互為勝負及賊勢日衆汪督駐襄縣為戰守之計威與曹文詔以萬餘兵䕶汪督據孤城城中乏食威見勢不可支乃進謀督師曰不如暫退關中休養一年簡勁兵以殄渠魁餘黨不足平也汪不可及賊圍城下汪知事去欲自盡威泣勸乃止旋登城見賊帥旗在南威引精銳二十騎出西門直抵賊帳適賊帥他逸斬左右數人奪帥旗而還次日復率千餘騎出東入南出西入北衝突賊營當者無不披靡及城陷汪自經威復馳驟數創失馬自刎而屍不仆者移時賊帥為具棺函瘞之賈志是時副總兵樊來保及神木副總兵艾萬年與李賊戰于巴家寨死之延綏鎮志吉孔嘉洋縣舉人累擢順德知府壬午王師臨城孔嘉力屈與妻張氏長子貢生惠迪次子婦王氏並死焉續表忠記李盛英榆林人以明經任太湖縣流賊搆難圍城盛英竭力拒守援絕城陷被執賊欲降之盛英不從罵賊撞樹而死其妻亦完節賈志劉其德字子上興安州人寄籍紫陽崇禎戊辰進士由庶常歴官諭德在史館有聲尋目盲乞骸歸僑寓襄陽闖賊破襄陽其德罵賊而死興安州志守按省志云其德歸興安興安志云死於襄陽中間事蹟不無抵牾存疑可也馬颷字電如陜西同官貢士崇禎十五年任沔陽州同知賊陷承天督兵堵賊賊繞出颷背颷馳介馬疾呼所向披靡賊至愈衆下馬奮呼家丁數人背城與賊戰猶射殺數十賊矢盡力竭被執不屈賊怒用勁梃通中而死藁葬城東二十一載子來沔啓殯易棺顔色如生湖廣志李振聲米脂人進士巡按湖廣王璣扶風人舉人承天知府崇禎壬午除夕賊破承天並以不屈遇害振聲被執自成以同姓同邑稱之為兄且贈以金幣振聲不屈賊數置酒邀飲醉即厲詞詆斥乃移之襄陽令部將劉體仁伺察之及孫傳庭出關討賊復移之裕州有言振聲通書傳庭者賊怒遣其將谷永殺之南門外時九月二十九日也先是振聲被執有傳其降賊者朝野共詆之後賊入山西榜列受職者姓名以誑遠近振聲與焉實未受職也續表忠記璣字玉温知承天府時築關守城勤事如家旣報陞鳳陽副使忽流寇大至攻城璣極力禦之降兵内潰璣憤甚執刃轉戰被執罵不絕口賊百計脅降不從怒令殺之璣望闕再拜延頸受刃時崇禎癸未正月也楚人義之收屍殯殮子鍼鎬扶喪歸葬賈志孫璜字用謙三原人由嵗薦任鹽山敎諭癸未鹽山城將陷左右促璜與令同出走璜曰臨難茍免何以為臣已而城破璜自縊三原志范如游郃陽人崇禎癸酉舉人性明敏有執持後知武定州死於難郃陽志邵公坤廩生公巽公佐監生公齊公量生員俱商州人羣從聚居夙敦友愛閨門雍睦無間言癸未七月州城陷賊將袁宗第巡遊至邵氏逼降之公坤兄弟五人同聲罵賊不少屈脅以刃罵益厲賊盡殺之公坤之胞姪紹祖徽祖遵祖緒祖嗣祖公佐子昭祖公量子光祖𢎞祖式祖爭衞父兄難長者制梃㓜者投瓦礫俱遇害賊入中閫公坤之寡嫂公乾妻張氏痛五子無一存赴井死公佐妻孔氏公巽妻劉氏俱投繯死公坤之胞妹適雒南薛匡倫歸省其兄最後遇賊賊俾執爨氏厲聲罵賊賊愈怒磔裂之邵氏一門男婦死難共一十八人亂定合塋安葬一時稱奇節云賈志張任字碧岑三水人萬厯間舉人歴官衡州守未幾寇至任率衆督戰舟中力屈死之舉家咸盡節焉賈志劉禋字誠若中部人舉人性剛介識大節事父極孝賊陷邑城禋負父走時秋雨河漲渡者多溺禋獨弗溺辛巳授登封知縣時大盜李際遇申靖邦盤據山砦禋設法守禦與士卒同甘苦練死士數百且戰且守賊不敢近癸未逆闖攻登封城陷被執自成欲降之禋掉鬚罵曰豈有七世清白吏而降賊耶自成從容言曰吾與公誼切桑梓今方有事關中當同載西歸禋神色愈厲曰吾願血沾登土自成義之次日復令賊將劉崇文說之反覆數百言終不屈遂遇害於泮水之側事聞贈按察司僉事先是登封不守父爾完泣曰吾子素剛烈死國事矣及聞訃顧坦然曰殺身成仁又何憾焉賈志趙希魁渭南人由武進士官參將從孫傳庭戰殁於河南渭南志盛昶之字璽振潼關衞指揮使總制孫傳庭與寇自成戰郟縣敗績自成乘勝抵關勢若山裂人無固志城遂陷昶獨堅立不動日暮被擄明日賊促諸將西强昶之行不從厲聲罵曰我固盛指揮也世受國厚恩有死而已恨不手刃諸賊奴豈有職官從賊者哉賊怒縊殺之又衞指揮使張爾猷字定遠潼關陷率家僮奮馬馳突遇賊南門矢發輒應手仆復揮刀斬其數騎賊相顧失色俄頃賊大至環攻之矢下如雨爾猷大呼曰我前掌印指揮張爾猷也賊爭前刺之身被數十創旣墜馬猶罵不絶聲而死時本衞指揮使李繼祖守東城本衞千户袁化龍守西城賊入各就所守汛地死之賈志郭宗振字引震華州人萬厯癸卯舉人初授河陽令河陽地當衝道官商絡繹供億維艱宗振至力革之調太邱時有貴公子奪人田逼婦自刎宗振竟置以法境多盜宗振懸金以購盜賊遂息轉壽春守境内奸宄作亂者聞宗振至悉散去郡北多水患民皆迯亡宗振捐俸招集歸者六十餘家人名之曰郭公集郡地多荒磧宗振給牛種寛賦稅漸次開墾遂成良田丁内艱補右丞遷比部郎檢驗吏牘謹敬罔懈有言官陳贖軍之奏宗振抗疏力争朝論是之丙子銜命恤蜀有納賄縱賊並開釋重案者宗振悉寘於理後旋里崇禎癸未殉難華州志陳嗣虞字述敬華陰人萬厯庚子舉人仕至高郵知州性沈靜廉潔一介不茍歸里後杜門讀書不妄交遊闖賊陷省偽檄依例輸餉嗣虞内懷悲憤而不􅄱於色乘家人不意步至渭濱投水而死賈志東肇商字雲駒華州人諸生性敏而多學詩文千言立就聞賊至人皆逃避肇商獨飲酒不輟挺刃而出大罵賊奴遂被害賈志焦源清號湛一由進士厯官至宣府巡撫年七十始舉一子賊入西安勒源清往見不屈自經弟源溥號涵一以進士由知縣入為御史歴撫大同未一年罷歸癸未冬闖賊入西安召諸邑搢紳受偽職源溥為賊黨所刼執見自成授以總督銜源溥大罵曰爾為賊乃欲汚我自成閉諸空室罵益烈鬚髯皆上指眥皆裂賊稍近舉手擊之復厲罵不輟賊拔其舌支解之同死者渭南吏部尚書南企仲號弦蒲進士起家年八十三矣罵賊不屈曰老臣何惜此餘年報國不食死子進士禮部郎居業不屈死從子居益由進士歴官至福建巡撫海外有紅毛夷者俗殷富國名賀蘭自昔不通中土奸民潘秀賈大泥始引其人據彭湖求市遂入犯内地濱海大擾及居益履任設方畧討平之天啓五年遷督河道晉工部侍郎時逆奄竊柄奄黨迎合逆意劾居益依傍門户削籍去福建士民詣闕留之不聽乃立祠以祀􅆆碑於彭湖平遠諸山紀其績焉崇禎元年起督倉塲時陜西四鎮缺餉至三十餘月貧卒蠭起為盜居益為鄉土憂疏請以陜賦當輸關門者留三十萬紓其急報可代張鳳翔為工部尚書以疏救曹郎帝怒其狥私再削籍後叙守城功乃復冠帶城破自成誘降不屈罵賊被炮烙而死續表忠記鄭君愛字錫吾渭南人選貢授鄖陽府推官以憂歸復補衡州府皆有聲事父極孝值李自成陷渭南堅持大節不應偽命遂不食死渭南志王佩珂臨潼人事親色養備至明末司鐸河南商邱歸里後值李賊肆横預戒子孫潔身蹈義勿致玷汚癸未冬賊入關中堅臥不起水米不入口旬餘而卒其子及孫賊迫脅以偽官皆遵訓守義不為賊屈臨潼志白昭遠字允哲臨潼監生崇禎癸未闖賊圍堡堡破昭遠大呼城頭曰城破矣節義為重婦女各宜入井一時婦女死節者甚衆賊怒殺之臨潼志陶爾德字太初咸寧人進士仕至川北道告歸李賊攻長安爾德分守東城賊至被刃死咸寧志崔爾達字汝明西安右衞指揮擢秦州守備秦藩稔其賢疏留之癸未逆闖圍會城爾達擐甲侍衞昕夕不懈城陷衞士皆竄爾達獨以短兵接戰賊衆大集爾達奮呼殺賊手刃數人賊怒環攻之遂死五日得屍顔色如生咸寧志李光信咸寧學生崇禎癸未賊圍城光信晝夜守禦城已陷猶持斧與賊戰賊怒以刀斫其頸死又諸生王召俊亦投井死賈志朱誼䍒秦藩宗室也字明遠丙子鄉薦聞變投井死秦府舍人不知姓名王被執舍人牽賊而罵遂死亦袁憲一流也學古堂集徐應魁秦藩右䕶衞旗官王愛其才敏每奏事京師取辦江南皆特任之應魁忠摰自矢癸未城陷應魁從王嗣及王嗣為賊所刼應魁絕粒七日而死賈志祝萬齡長安人少受學於馮恭定歴官至副使賊陷省會萬齡衣冠入關中書院拜先師畢自縊於側御史霍達表聞於朝䝉詔褒異學古堂集竇光儀長安貢生任懷慶府通判崇禎末歸里闖逆陷會城光儀衣冠東向拜遂赴井死又徐方敬者萬厯時舉於鄉授儀封知縣旣歸里值會城破不欲辱賊手遂正衣冠赴井死賈志孫孕芳字嗣香世居西安之咸寧與兄孕泰讀書慈恩以節義為己任壬午孕芳舉於鄉孕泰拔貢士賊入城孕芳自經孕泰尋父不見亦投井死學古堂集周培忠咸寧人以興平縣貢生任隰州知州謝政歸會李賊陷西安一門盡節者數十人又咸寧朱恩同弟斗環姪浯俱義不從賊投井死賈志丘從周都司吏也長不滿三尺彊直敢言西安陷見自成暴虐乘醉直至其前㦸手罵曰若一貧賤細民今妄踞王府將僭偽號逆天背理所為如此吾見汝屍之萬叚也自成大怒立砍殺之續表忠記東按賈志作丘周雷堂商州廩生崇禎十六年十月十五日李自成陷商州謂家人曰我自有死所乃衣冠出至博文齋自經死李本健亦廩生城破逃北山被執慮不得死所紿賊曰我有藏金盍至家比至急投入井賊誘使出乃大罵以石擊之罵愈甚賊以土石填其井又庠生李本深城破服衰麻與子合娃守父柩而哭賊至並子俱被殺庠生呂元聲城破與母妻誓同死母妻曰汝盍逃乎元聲堅不去死之又生員孔纘文城破被賊執大罵不止賊煎油灌之立死賊退收其屍油尚透腹又楊名道役也被賊掠罵不絕口乃縳置樹上罵益厲割其舌磔之州民周揚實工鳥鎗賊攻城三晝夜揚實傷賊甚衆賊識之城破執而磔之焚其骸商州志李喬崑字孕厚高陵人天啓乙丑進士筮仕洪洞洪洞故多李氏喬崑之遠祖在焉有持家譜干以私者謝卻之擢守真定中官欲加以屬禮杜門不屈人稱其節闖寇據關汚以偽司馬拒弗受望闕北拜而死賈志王徵號葵心涇陽人由進士除廣平推官白蓮獄起株連者數千人徵咸理出之濬清河水閘漑田至千頃母憂去補任揚州三王之國䕶從者多所誅求徵白王禁戢民以無擾天啓中徽州富民呉養春與弟養澤爭産弟赴東厰首其兄佔黄山獲利無算閹提養春拷問又遣主事吕好問追贓變産激變徽民事連巨室數百人下徵按問徵據法爭之所全活者甚衆各省建祠媚忠賢揚州祠成大吏咸往叩首賀徵竟不往父憂服闋陞僉事歸里後流寇大起徵創為連弩活橋自行車自飛礟以資捍禦癸未闖賊入關羅致搢紳徵已先期自題墓石曰了一道人之墓又書全忠全孝四大字授其子永春曰吾且死死豈為名欲汝識我心耳賊果遣使趣徵往見引佩刀自誓乃繫永春去徵遂絕粒越七日而卒里人諡曰端節徵素為德於鄉當永春被繫時鄉人不避賊鋒請以身代者數百人賊乃舍之永春竟得不死續表忠記牛象爚字汝華涇陽諸生賊至其家爚踞樓不肯下賊舉火焚樓以逼之爚蹈火死又涇陽民趙九筵家居堡中賊至衆皆懼九筵鼓勇扞禦賊登陴九筵拒之中矢死賈志常道立字修之三原人萬厯間進士仕至河南中丞政績著聞歸里值李賊入秦不屈北望神京稽首哀呼不食而死賈志喬巍字維嶽三原人幼從馮少墟温無知遊踐履篤實待異母弟極友愛居繼母喪哀毁骨立登萬厯己未進士授司農郎司餉山海關陞參政出巡川南時奢安二寇叛巍削平之以事左遷僉事後論平奢功陞副使尋擢山西參政分守冀寧道便道過里值逆闖陷省徵索不少屈與表弟王伯達僕人王崇德同日被戮時並稱之賈志袁養和字祥人盩厔人萬厯戊子舉人為屏山令火焚獄獄中囚避於外火熄囚復歸獄人奇之擢刑曹持平不阿出守南安防澗賊修水城擢滇南憲副有疾歸里癸未逆宼自成力徵之時年八十二不屈絕粒而死賈志竇汝器字擢五富平人幼穎悟長尚節義以嵗薦授城固司訓崇禎癸未冬李闖入關諸郡風靡汝器說邑令增陴濬隍簡練丁壯戮力拒守及欃槍雲集衆皆潰散汝器度勢危歸整冠帶望闕拜畢坐明倫堂以待寇入賊殺縣令并執汝器脅以白刃欲降之汝器大罵不屈遂遇害於泮池側賈志牛養傑岐山人事後母能孝由選貢知延津縣坐剛直免歸闖逆之變衣冠向闕北拜罵賊死又同時南鄭舉人席增光諸生葉烶皆不屈死賈志張鳳翮字健翀城固人天啓乙丑進士官江西巡撫歸遭闖逆陷城為賊所執脅之仕抗志不從遂遇害賈志岳中衡城固貢生崇禎末賊至為所執呵之跪不屈令斬之中衡曰我得死所矣復釋之誘以官中衡曰我已成貢士猶不屈肯為汝賊官邪遂為亂刃所斃賈志劉長庚同州生員慷慨有志節明崇禎末李自成蹂躪秦關長庚挺身誓衆固守城圉繼聞會城陷遊騎且薄州衆皆奔散長庚仰天嘆曰是草莽臣委命之秋也先謁孔子廟焚衣冠次邀族黨於家指割城内地建祠祀先餘備烝嘗衆謂士無死法隱遁可以潔身可以全義長庚決志不從顧其妻曰吾乏嗣納妾幸生二子宗祧可繼善撫之死後葬我於讀書樓下又顧謂妾雷氏爾將奈何雷慨然言願相從於地下長庚拜謝引至書樓曰此吾平生脩習之所天地鬼神共鑒在茲遂手刃其妾并六嵗女徐自經死一時觀者如堵莫不垂泣賈志解光纓字端甫韓城人性端謹師事韓令左懋第以名節相勉會賊難避地晉中日結義士圖刺賊晉撫行視軍光纓往說謂長安雖陷三邊宿重兵兵將中豈遂無顔真卿郭子儀其人者願以忠義檄三邊令會勦未果賊攫搢紳金匿之者多波及光纓挺身往見賊不少屈繫長安掠以刑備極苦楚終不屈賊壯之適有為賊䇿餌衣冠收人心者檄令受職光纓不應辭氣益烈賊不能平遂遇害賈志魏國柱字鳳庭蒲城人萬厯壬子舉人幼即孝親敬兄不事浮飾宗族稱之初令臨淮清慎自矢愛民如子陞睢州守益勵清貞尋罷歸值賊亂被執遇害子諸生允貺事父母極孝父為賊執追餉允貺定省不離側卒以身殉又童僕羅安隨侍國柱朝夕痛哭同時被害人咸義之賈志王淑景耀州人中丞國長子廕知府性穎敏學行與三水文翔鳳齊名廕職未任值闖逆陷關中偽守欲用堅不為屈與子生員肇祥同遇害賈志趙士達永壽人嵗貢任莊浪衞敎授流寇破城被執罵賊遇害又同里貢生張應泰亦被執不屈而死賈志齊大成鄜州諸生崇禎癸未李自成陷長安大成哭於家已復别妻子獨衣冠入文廟不食問之輒詬罵越十日而死延安府志尤世威榆林人官總兵有戰功崇禎十六年李自成陷長安十月傳檄榆林是時巡撫甫罷代者未至人心恟恟時世威家居榆林道都任以衆議推世威為大將無何賊衆十萬下延安克綏德遣人說降衆未發議參將劉廷傑大呼曰賊雖破長安然三邊尚屬朝廷中州子弟不習戰榆林天下勁兵一戰必奪其氣然後約寧夏固原為三師以遞進賊可破也衆曰將軍議是於是都任令於軍中曰壯士壹聽尤將軍令世威迺簡兵誓師守具未備賊臨城下出戰敗之賊復悉衆薄城攻戰七晝夜不下賊穿城納火炮穴中城崩世威率衆巷戰兩日夜婦女登屋上亦彎弓助戰都任死之世威與弟世禄劉廷傑王世欽王世官李昌齡被執檻車送長安自成坐堂上世威等不跪自成曰將軍皆名將佐朕共取封侯可乎世威等仰天大笑罵曰驛中小卒敢大言某等朝廷上將悔不速殺汝自成笑前解縛世欽唾曰唉驛卒勿近前汚將軍衣自成怒命皆斬之榆林之陷婦女死義者數十人城中井滿賈志王世欽榆林人山海總兵免官家居崇禎十六年李自成陷長安榆林守將王定棄城走世欽與尤世禄等部署諸軍守榆林城以拒自成城旣陷被執檻車送長安自成親釋其縛罵不絕口自成殺之世欽方械繫道宿長安傳舍中且歌且飲大醉顧謂驛使自今至長安幾日驛使以對仰天大笑曰行矣丈夫死當為厲鬼以殺賊聞者壯之賈志世欽弟洪官天津總兵以勞卒於軍延綏鎮志王學書字忠吾榆林人父保字麟岡鎮守昌平及寧武薊鎮遼東總兵有戰功殁於海州學書補世職歴遷宣府總兵官尋轉天津防海總兵以老致仕林居值闖逆攻榆學書念巖疆重地世受國恩散家資給兵民拒賊七日城陷被掠罵不絕口遇害子國鼎字新甫官浙江寧波道以勞瘁卒官延綏鎮志鍾茂先榆林人為綏德衞管屯指揮賊至督衆固守及賊勢熾茂先知力不支藏二匕首於左右蔽膝中賊入茂先家陽以酒勞之左手捧觴右手拔匕首刺賊賊負傷出走茂先入殺其妻子而自刎焉延綏鎮志賀世魁榆林千户從總督守薊門適歸值賊圍城悉力固守攻益急城陷歸家陳衣冠取祖宗承襲號紙置香案東向而拜曰臣力盡矣更着深衣從容縊死妻栁氏亦殉焉延綏鎮志黄廷政廷用廷弼俱黄演孫也演榆林衞指揮歴官延綏恊守出兵芹河陣亡蔭廷政襲指揮使廷用千户廷弼百户李賊薄城廷政兄弟念家世忠烈力戰抗賊廷政中炮而隕廷用廷弼益自憤勵城陷遂偕死焉延綏鎮志尤世禄字裕齋榆林人以世職起家歴任固原遼東宣府總兵子拱極字樞寰任山海總兵家居寇至守新添門賊從海潮寺穴城入世禄覺之募敢死士縋城擊賊南門陷父子見執死之同時死者有原任宣府總兵王世國山海副將楊明山海參將尤岱岱子捷官薊鎮總兵甲申京城陷率兵奔河南志圖興復為叛兵所殺舊志潘國俊漢中衞百户官榆林副將逆闖破城死之漢中府志張雲鶚字元舉榆林人舉人為户部主事督餉山海闗致任歸賊至城守不屈死之子發字啓之定邊副將先雲鶚戰死延綏鎮志馬應舉榆林人為撫標中軍賊薄城應舉曰孤城不可守也乞師於套以數千騎至西門衆寡不敵套人引去賊入被擒梟於市延綏鎮志潘雲騰漢中人官延綏參將賊陷城與兄國奇俱死之賈志李淮榆林人原任西安參將值賊李過入城淮先令妻子自縊率子出門殺賊父子皆自刎死延綏鎮志陳義昌榆林學生性耿直闖逆陷城義昌獨正色罵賊為賊所殺諸生以罵賊死者又有沈濬沈演白拱極白含章延綏鎮志張連元榆林學生城陷偕弟連捷入漢壽亭侯廟從容縊於梁間又諸生李可柱縊死於余肅敏祠胡一魁李引祥亦自經於家延綏鎮志梁文炳及弟文俱靖邊諸生崇禎末流寇破城欲招致幕下皆抗節不屈而死延綏鎮志熊維藩字振宇威武堡人宣府參將致仕歸高賊攻堡維藩力戰傷賊甚衆堡陷維藩自刎延綏鎮志台元延安衞人闖賊入城兩手握大石欲為狙擊計隣人恐禍及縛之至家不食五日死延綏鎮志劉廷傑字若三彛鼎子崇禎癸未為延綏撫標參將寇逼榆林堅志固守城陷被執罵賊不屈賊支解之事聞贈都督僉事其從弟廷䕫亦投雲巖閣死焉賈志馬鳴節榆林人世襲百户賦性忠勇闖兵攻城將陷鳴節將妻孥用木器廂櫃圍聚一處引柴燃火烈熖薫天鳴節持刀巷戰砍死賊兵數十力竭身跳入火熖中弟鳴廉任總督汪喬年中軍勦賊於郟縣被圍單騎馳救出入賊營者三殺死賊兵無算力竭而死賈志楊繡徵膚施人生員崇禎十六年闖逆破延安繡徵衣冠至公署縊死衣冠内題云所恨上有老母未葬下有幼子未成眼觀時勢斷無苟生之理云云聞者哀之賈志惠顯清澗人由步卒積功至延綏副將闖賊至激勵將士勉以忠義閉城固守城破被擒賊慰之曰若固世家子而有武畧能從我則以權將軍相授顯極口詈之磔於市從子漸時為撫邊守備亦罵賊死延安志赫崇德綏德州人生員聞偽官入城即具衣冠自縊於文廟為門斗救免掖至學宫觸柱而死又鳳翔一生面詰賊官鞏焴焴為之痛哭賊聞之決杖而死又賊至三原下學令生員講書一生出曰孔孟之書敎子孝敎臣忠諸公相率從賊講忠孝乎講不忠不孝乎牛鞏諸賊無以對撤席而起惜未得兩生姓名云學古堂集張禮字義亭威武堡人為鹽商素有行義賊至傾家貲守城城陷被賊執罵賊而死延安府志李樹聲岐山人知猗氏縣廉靜不擾有德及人丁内艱不復仕闖逆徵之使仕樹聲曰吾家六世受國恩今安往乎即夕呼天而逝賈志羅世濟字虛舟平利人萬厯己酉舉人官澠池敎諭素負大義剛正不阿闖賊亂起即毅然以死自誓旣而澠池失陷力戰被執不屈死之子得鴻練兵守平利殺賊甚多城破與妻子俱死焉賈志郭天吉榆林人武進士仕至甘肅西恊副將賊攻甘涼城陷天吉巷戰被擒不屈賊怒磔之賈志衞景瑗字仲玉韓城人天啓進士授河南推官以廉明擢御史兵部尚書楊嗣昌議加勦賊兵餉景瑗抗疏拒之訖不能用會給事中傅朝佑李如燦以劾閣臣温體仁得罪下詔獄景瑗請釋兩臣以作敢言之氣帝大怒降行人司正屢遷至大理少卿以右僉都御史巡撫大同崇禎十七年李自成東犯太原景瑗議調兵趨控鴈門總兵不肯行寧武陷賊遂長驅抵大同總兵出降景瑗猶督麾下巷戰賊大至士皆散走衆擁景瑗入自成營或叱之跪景瑗不為動踞坐於地大呼皇帝而哭自成好謂曰吾非有天命不至此君佐我我當益加君官景瑗瞋目曰吾期㓕汝朝食肯從汝作逆耶自成見景瑗言切急命掖之出越三日再擁見自成自成又好謂曰君忠臣吾將具車騎放君還家景瑗曰國破何家可歸盍速殺我因出不意以頭搶階石血淋漓被面絕而復蘇自成又命掖之出復三日驅景瑗行至海會寺北向再拜自經死有繼母及兩子從行賊亦不之殺也堯峯文鈔石可礪字用汝城固人萬厯乙夘舉人知寶豐縣時縣舉人牛金星居鄉肆惡又納族妹為妾被告可礪奉審執法無狥金星懼逃投闖逆及陷西安金星欲復舊怨遣人搜獲可礪囚禁挾餉備受酷毒可礪不屈仍指數前事殺於紅芝驛賈志劉必達山陽人崇禎庚辰廷試特用授山西汾陽知縣有聲及闖逆抵汾仗義不降投井中賊兵尾至自井引出縛繫太原陰通書信於京口賊怒殺之賈志左士元耀州監生御史永圖子闖賊破州拘士元至省勒銀助餉士元曰我乃清白吏子孫安有此即有肯齎賊乎賊怒欲殺之見其年少有才欲脅降士元不屈遂遇害賈志宋師襄耀州人萬厯丙辰進士仕順天府尹家居闖賊入關師襄不屈被虜而東孫金臺邑諸生知師襄必不免仗劒尾行至聞喜師襄盡節金臺亦從死祖忠孫孝士林重之賈志李遇知字伸伯洋縣人萬厯庚戍進士授東明令持廉秉公特召考選補兵科給事疏月凡十上理餉徵兵有禆樞政丁母憂補官正崔魏煬蔽舉國如狂之日遇知先官樞垣有疏薦鄒元標馮從吾等甫近都魏璫嗾其同類中公以薦舉匪類獻媚東林矯旨削籍崇禎初起禮科累陞户尚總督倉塲時不苦寇即苦旱防盜打壩不遺餘力擢吏部尚書時時勢日危遇知以文文山正氣歌作屛顧而泣焉都城陷自縊於紅廟賊解縊執之劉閔宗宋企郊等迫之仕遇知不屈遂遇害一門同死者七人遇知妻先殂妾王氏先遇知縊死劉如漢李公紀略李昌齡字仁徵咸寧人天啓辛酉舉人為河南靈寶學諭月課諸生以忠孝大義勸率之至流寇侵城聚諸生於明倫堂曰平日所講忠孝大義安在誰無父母誰無妻子誰不履王土而可偷生乎每一生令監百姓十人倡義堅守賊始退陞山西猗氏知縣令各村社立鄉約以敦風化親詣四鄉力田者賞荒蕪者責時旱災頻仍兼以黄䑕害稼地多菅草蕪地萬頃竭誠祈禱霖雨時降令搆訟有罪者罰捕黄鼠若干或罰鋤菅草若干不半載悉為良田流寇煽突軍需不繼當道有議加糧者昌齡為民請命繪圖告減文移十數反始獲免尋以失當道意謫河南布政司檢校未幾遷知沈丘就道會永城劉超叛鳳陽督師檄取監軍即親赴軍前冐矢石獲叛告捷而監軍之日賊潰沈丘當道卸罪誣下刑部獄數月神京陷逆闖釋獄内諸搢紳令就選昌齡堅臥不食其子泣勸之正色曰余生平所學所講者何事余為國家罪人當死余不為國家罪人尤當死余志決矣越五日而卒賈志高鍟榆林人為北京神機營參將李自成犯闕鍟闔門自焚死先是鍟族父從龍任固原參將崇禎中調征流寇從龍行至三水遇賊力戰而殁諡忠勇延安府志劉彰本保安人貢士赴銓授涇陽訓導未出都城闖逆入京彰本囑其子雙全曰受朝廷一命之榮身屬朝廷矣今國破君亡吾不苟生兒歸幸勿以我為念遂縊於涇陽會館賈志蕭偲字慎甫延安人如薫子襲錦衣指揮逆闖犯京師偲年二十三殉難賈志郝允曜字覺天清澗人以祖蔭補南國學典簿歴刑部郎中多所平反以清獄忤旨謫上林簿尋復户部主事逆闖至不屈死賈志李固本字伯立洋縣人崇禎丁夘舉人歴官定州僉事闖逆入定死之賈志張光斗字元圃神木人貢士天資頴異嘗遊馮少墟先生門筮仕南皮令豁荒恤殘優禮師儒擢天津監紀復調河間同知闖兵陷城欲大用抗節不屈罵賊而死其妻單氏亦與難合郡憐其忠祀名宦賈志李承燦華州人山海闗義院口守備加遊擊崇禎末城破死之又同里有濬縣尉李華貴新城主簿王者佐郯城典史李嘉賓皆城破不屈而死華州志馮登鰲膚施人以舉人知靈壽賊陷城不屈死之其叔父大緯訓蠡城亦罵賊死賈志石嶐字長卿三原人少好騎射尤善古文詞癸未聯捷憤時政擬上書為權貴所遏賊入秦曲沃李建泰督師公慨然請纓願復三邊自黄甫川渡河聯絡榆中靈夏曲沃不能從遂憤鬱成疾避地江南甲甲五月聞北都陷痛哭數日不語不食三日死湖口友人劉湘客經紀其喪學古堂集王被徵張少保士佩家僮也幼從少保事主極忠順闖賊陷京師被徵哭詣少保墳曰奴從主人食朝廷之澤久矣今主人之主已晏駕奴何以生為不食數日死韓城志衞楨固字屏君韓城人少負奇氣喜談兵手畫山川􅄱勢習戰陣攻守之法崇禎甲戍成進士授開封府推官是時流寇往來村民扶攜奔走多及於難公議脩築西闗城處之經南陽汝寧河南諸城皆量其地宜城者勸諭增築論守城事宜十三條撫按奇公才有警必檄與謀公受檄即戎服據鞍按視城壘所過扼塞險易悉識之十四年九月以卓異召對中左門言平寇為足國第一務帝善其對擢拜雲南道御史明年受命巡按真定等處時河南民有遭寇竄河上者楨固竭家貲以賑檄縁河州縣安輯活數十萬人甲申正月闖逆陷河東諸郡大學士李建泰請禦之命楨固監其軍三月京城陷誓殉國難楨固按畿南嘗疏救參將王燝燝以兵二百隨征至是行至大石橋遇賊數萬騎督燝兵殊死戰賊引卻已復益兵來戰官軍盡覆楨固突圍出走追騎至躍入井中水涸不得死為賊所執抗罵不屈賊相牛金星故中州舉人嗛公理汴時發其惡幽公於獄中會自成西奔楨固乃得脱入五臺山之西北峪為絕命辭遂自殺河濱全書劉之勃字安劉寶雞人崇禎七年進士由行人擢御史風采清峻尤長於奏議時帝因寇亂頗崇信二氏之勃疏言近傳營殿閣設齋醮臣竊以兵荒交迫流移載道省土木齋醮之費以養饑民固萬年根本之圖也以佐軍需亦一時騰飽之資也若費之無用之地豈不重可惜耶疏出時論韙之繼上節財六議謂國初馬以萬計草塲止五六處今為額漸少而草塲反增二倍可節者一水衡工役之費嵗幾百萬請察可以停緩之工盡助軍興可節者二諸鎮兵馬潰敗時聞而餉額不減當嚴察隱冐可節者三光禄宴享賜賚旣從儉約而監局官役額設如故日廩月餼不貲可節者四三吳與澤潞之織造以及香蠟藥材陶器之屬無嵗不貢積之在内則為廢物輸之自下皆是金錢可節者五監軍贊畫之官不可數計平時則以一人而糜千百人之餉臨敵又以千百人而衞一人之身不惟耗食兼且耗兵可節者六優旨議行十五年正月疏參諸督撫之溺職者二月請停東厰言京師之五城及巡按御史俱有察訪之責刑部定罪大理平反此定例也今緝訪旣屬東厰刑部且為承行之吏大理更屬贅員不便於官守者一律法越訴有禁一詞告二事不准非兩造俱陳不定罪今四方奸頑以所𨽻有司難售其奸悉赴厰投首道路遠隔數千姓名半多假揑一紙連株全家立破不便於民生者一從來尊卑相制四維乃張今緝訪所獲或以子弟訐父兄或以僕𨽻訐家主或以部民訐官府不便於國體者一帝即命飭行未幾命之勃巡按四川甲申年八月賊逼成都初九日賊遂入城蜀王率宫眷投井死之勃被執賊以之勃同鄉欲强以官之勃勸以不殺百姓改邪從正輔立蜀世子賊不從遂大罵求死賊酷苦之終不少屈臨死語賊曰寧多刳吾肉無濫殺百姓縛於蜀府端禮門外攢矢射殺之續表忠記文郁邑諸生之勃從子也從之勃出按四川之勃遇害文郁抱尸號慟觸樹死院吏石璞殯之西門外鳳翔府志張繼孟字伯功文質之曾孫也萬厯己未進士知濰縣擢御史奉命巡江極陳江防八要以堅執不立魏璫生祠削籍逆黨敗詔補山東道御史直言糾劾出知廣西府宣慰普名聲與交趾倡亂勢甚猖獗繼孟單騎至息宰河招降之滇人懷其德立祠尸祝稍遷兩浙鹽運使加參政因忤權璫崔璘左遷保寧知府歴川西道崇禎甲申獻賊陷成都不屈死之妻賈氏同遇害賈志王勵精蒲城人崇慶知州初由選貢生授廣西府通判仁恕善折獄嵗饑毁所繫銀帶以賑及聞成都陷士民驚竄其僕勸之去不可曰身受國恩焉所逃死賊勢逼具朝服北向拜闕西向拜辭其家從容書於壁曰為臣盡忠為子盡孝而今而後庶幾無愧書畢登樓縛利刃於柱而露其鋒貯火藥於樓下危坐以待及報賊騎渡江勵精身自舉火火烈觸刃貫胷而死表忠記張耀字融我三原人萬厯癸夘舉人嘗從學於温恭毅之門篤志力行事親至孝仕至貴州布政使值流寇張獻忠檄至耀率僚屬登陴拒守誓同一死城破耀率僕役猶格殺數賊遂被執賊逼耀降耀大聲罵曰狂賊不知天命逞目前耳我天朝臣子豈從賊乎今日惟一死耳賊怒遂縳耀耀怒罵如初於是磔殺耀眷屬一十三口同時俱被害賈志衞𦙍文字祥趾韓城人崇禎辛未進士授庶吉士歴編修司業中允諭德環堵蕭然時家口近百同居五世無間言流寇四起海内瘡痍𦙍文方在里癸未十月逆闖入關全省瓦解即星夜赴京極陳利害時賊勢猖獗在朝猶未敢言而𦙍文以詞臣越爼言且將以家財輸國上以其愷切召見𦙍文痛哭陳勦賊之計請召四大鎮翼衞王室已而神京陷遂之江南以憂憤死賈志王總衡字振乾咸寧人由廕生仕熹宗朝不附魏璫因失朝儀例止罰俸竟以革處西歸侍奉兩親備極色養璫敗寃白以親老弗仕及闖賊入秦授以官不受賊怒加刑掠體無完膚罵不絕口賊以為死置之踰日復甦避居終南山賈志按忠節列傳俱以殉節之先後為編次其有事蹟畧具而嵗月未詳者則綂列於後如宋西安朱友恭為涇原將以兵敗不屈死明西安費邑宰以寧羌州參將戰死鄠縣諸生靳之翰以罵賊死鄠縣吳大猷仝調鼎張奇英王福劉學鑑王良志劉慎俱以殺賊死涇陽貢生趙友梧以守堡陷賊死延安衞人張維忠以寧夏總兵戰敗自經死延安衞世職指揮岳茂以大同總兵戰死延安衞世職百户邵復初以平遼將軍戰死膚施人孫仲嗣以階州廣文守城死安塞貢生袁光先以滎陽訓導城破自刎死麟遊諸生劉心潔罵賊死隴州貢生郝珊以訓導守節死漢中衞世職指揮胡汝寧以四川守備征氐戰死漢中舉人王彥芹以新城知縣抗節死褒城舉人歐植以長葛敎諭罵賊觸柱死洋縣崔榮宗以䝉陰尉罵賊死鳳縣原任天津參政辛思齊以家居罵賊死寧羌衞人張錦以寧夏百户征蜀寇死榆林衞世職指揮崔世榮丁碧俱以平羅衞參將戰死榆林衞人吳國偉以副將戰死商州諸生趙吉士以殺賊死雒南貢生張丕式以三河訓導抗節死韓城舉人趙春芳以許州學正罵賊死潼關衞武進士王乾以遼陽守備戰死乾州舉人陳虞裔以南皮知縣抗節死三水貢生秦廷輔以濟南府通判遇變死綏德衞指揮李芳以固原遊擊戰死綏德衞世職指揮鄭東以分守蘭州戰死綏德衞指揮沈應麒戰死綏德人張興以總旗戰死葮州李養成以口外守備殉難死高家堡人王琮琮子賜福以神木把總戰死神木人張拱㣲以三屯營副將戰死神木貢生張正名以汝州州判殉節死閱其姓氏迄今猶凜凜有生氣也本朝田佳運長安人貢生居堡中以耕讀自適順治二年賀逆犯省城破其堡獲之罵賊死仲子陌亦投井死安尼恭郿縣人生員賦性質直順治二年流寇賀琛破城尼恭被執不屈仍大罵琛怒甚寸磔以狥至死罵不絕口遠近哀之時寇孽未靖刼掠四出以諸生不屈者鄠縣王圻被殺死華州趙文明自剄死又華州民郭汝寧字君泰亦罵賊死許國楠咸陽人順治三年隨征入閩漳泉旣下奉檄攝漳浦令時戎馬在郊徵輸百出國楠處之裕如未幾楊學臯變起率衆襲城城陷國楠義不辱身赴井死吳錦興安庠生順治三年流寇餘孽陷州城錦與州人譚達文並罵賊不屈死李增廣鳳翔武生順治四年土寇李啓陽據麟遊清涼寺嘯聚數千人侵掠村堡道府團練鄉勇為守禦計知增廣多勇畧俾督其衆及破賊乗勝逐北馬蹶被執不屈死之妻王氏年甫二十家貧苦守敎二子俱入泮夫義妻貞聞於遠邇年六十一卒白旗郿縣人由嵗貢除蘭州訓導順治五年米􅉰子寇蘭州城陷罵賊殉難事聞贈國子監學録賜祭一壇周基昌城固貢生順治元年英王西畧從大兵至延安二年招撫興漢暨四川保寧諸處有功三年賀珍寇漢中基昌單騎潰圍赴省請救家人悉遇害賊平授直𨽻保定通判七年大兵下川南調基昌從征八年以功授叙州府知府甫半載劉文秀自滇窺蜀城陷不屈死妻王氏守節撫孤歴五十四年年七十有二卒子志道孫元侯皆遊庠倪光友定邊人任福建連江副將順治九年與海寇戰殁於陣孫一鵾字圖南富平人起家諸生中武科累功至參將順治初遷廣東水師副總兵十年冬進水師總兵官十一年李定國寇廣東之新會一鵾以舟師守江門值陳奇䇿從海上突至一鵾率兵大戰衆寡不敵遂殁於陣事聞贈太子太保賜祭葬仍月給俸米以恤其家陳有虞字嗣韶富平人順治壬辰進士授仙遊令十一年十二月朔海宼陷漳泉欲乘虛犯會城有虞曰吾城僅斗大然興福藩籬也乃集士民議固守先是鄭成功屢經招撫益肆滛掠有虞至任募鄉勇二百人又得家丁十五人俾為長復擇鄉勇一人為百總使將之賊至輒獲士民咸倚為重至是賊百道來攻志在必克有虞晝夜登陴與士卒同臥起士卒日裹創泣戰賊屢敗次年正月朔賊大進復敗賊憤甚即城下掘地道實以火藥名地雷初五日日方旦地雷大作地盡裂城頽守兵大潰有虞率餘兵巷戰至日中轉戰至城西馬蹶遂中箭死從死者家丁趙啓遜等十四人皆西北勁卒也子常夏適以省覲入閩中途聞變事聞贈福建按察司僉事予祭葬常夏以蔭官户部郎中張占鰲洛川人順治二年拔貢生性至孝父病禱於神願以身代任湖廣荆州府通判有治劇才康熙元年大兵進剿流賊餘孽占鰲督運糧餉晝夜催趲至房縣之七連坪猝遇賊被執罵賊不屈死之特贈按察司僉事賜祭葬子超以蔭生令宜陽劉本善字太素高陵人順治辛夘武舉任湖廣守備康熙元年冬山寇竊發制府徵兵會勦本善帥兵三百以往屢捷明年秋本善渡河迎宼遂戰殁七年録前功加恩賜祭劉偁三水人少有大志由行伍積功至總兵順治十六年歸誠充雲南義勇前營總兵官康熙三年從吳三桂出師征水西偁每戰輒奮戈先登賊潰走偁單騎追之陷大澤中為賊兵環射而死事聞給祭葬如制李化龍字躍禹榆林人康熙三年以從征黔蜀功進遊擊駐防建寧縣時寇孽不靖兵民疑貳化龍多方綏輯四境安之會江右賊入盤湖隘化龍即出兵擊賊賊夜遁化龍追至嚴塘及之疾提兵走賊後奮騎獨出擊其中堅賊衆皆披靡俄為鳥銃所中而斃士民立祠祀焉馬琾武功人由副榜貢生令永嘉屢著惠政康熈十三年耿逆蠢動温郡戒嚴琾與副使陳丹赤恊謀防禦一日集文武僚屬議城守事逆弁祖𢎞勲出不意殺丹赤倡衆從逆琾不屈瞋目大罵死之逆黨進逼縣署姪穎姿僕張義保俱格鬭死事聞贈浙江布政司參政予祭葬如制穎姿義保並䝉優恤子逸姿以蔭官蘇松糧道會聖祖南巡面陳父琾殉難狀且請諡奉㫖賜諡忠勤姚開先字堯門淳化拔貢生由臨縣令補四川鹽井經歴吳逆叛逆黨入蜀開先不屈自縊死子謙被掠後冐險扶櫬歸里事母王氏曲盡子道苦志力學中癸酉鄉試早卒父忠子孝一時重之張宷蒲城人順治辛夘舉人康熈十三年任綦江知縣吳逆竊據全蜀宷矢志不屈以憤死邵廷儀咸寧人順治甲午舉於鄉授清澗敎諭尋陞靖遠衞敎授值王輔臣兵叛偽檄促各官盡改舊印廷義獨懷印不予以死自誓賊怒之勿責也事平以節義聞於朝擢香山令有善政王𢎞毅行五居淳化白堡村務農膂力絕人人呼為狠王五康熈十三年王輔臣叛五月賊至村縱掠衆竄𢎞毅力敵被擒賊喜其勇啗以偽劄立碎之瞋目罵不已遂遇害李毓采清澗人康熈十四年朱龍叛逆縁邊城堡皆奔潰毓采以把總率兵逆戰於綏德死之賊乘勝陷神木營守備張光斗死之又次陷木𤓰營守備左成庫死之光斗成庫皆榆林人也常日暄三原人康熈十四年滇逆方熾慶陽土宼作亂犯涇原攻馮家堡三晝夜將陷日暄同魏良佐蔣四等率鄉兵一十八人往援殺賊數十賊撤圍并全營衝殺日暄力戰鞭死渠魁并賊黨數人衆寡不敵十八人俱戰死馮堡獲全董正第五小根俱三水人甲寅王輔臣叛平慶間日無寧宇邑令林逢堯招集鄉勇為守禦計二人與焉乙夘三月宼猝至據其城鄉勇分門殺入賊營賊大敗走二人竟戰死周士英榆林人由行伍授順德鎮標左營守備陞遊擊逆鎮劉進忠作亂士英綂兵堵截至黄岡力戰死康熈十七年贈廕如制文天爵安塞人由將材授廣東左翼鎮標遊擊康熈十五年賊孫楷宗來誘叛天爵叱之遂被殺沈屍於海十九年贈䘏有加韓璽聖淳化人幼喜韜畧順治二年以行伍從征屢立戰功授十總擢鄖陽守備康熈十七年檄勦竹房至岔山與賊血戰力盡被擒時吳逆踞衡州賊械以往逼降之不屈死贈署遊擊事傅汝友清澗人康熈十九年六月定海將軍王之鼎出師救永寧汝友以總兵官隨征九月城陷被執至貴陽遂遇害事聞贈都督同知子𢎞經廕衞千總大兵復貴州偏沅巡撫韓士琦收汝友遺骸殯於旅次三十年𢎞經始扶柩歸葬時同殁者總兵何成德劉奎陜西人王永世榆林人贈廕如汝友例王伏金咸寧人任涼州鎮屬西把截堡守備雍正元年十月隨征西寧陣亡張先志長安人康熈戊子武解元授七里關守備雍正二年勦卓子等山土番先志獨當加爾多寺一面因道險不得入率兵十五人進覘賊壘適林中番衆突出先志奮勇衝擊矢盡力竭遇害屍無完膚雍正三年奉㫖贈加一級賜祭葬廕一子以衞千總用徐宗仁長安人康熈六十年由行伍授陜西督標右營把總雍正元年九月從大兵出西寧十月羅卜藏丹津寇鎮海堡又宼新城宗仁先登陷陣前後得首功甚夥十一月勦郭莽寺二年正月勦爾各隆寺二月勦西海俱有功尋以獻俘引見賜銀幣授千總累擢山西殺虎口副將七年四月奉㫖赴陜從征八年大軍進駐巴里坤宗仁綂涼州兵分駐峩崘磯十二月初四日賊大至宗仁飛符請援而身督兵拒戰三晝夜殺賊數千獲馬數百匹會各汛同時告警因出兵禦之十八日至卜羅磚井遇賊堵戰奪囘被掠人畜宗仁率師前進數遇賊轉戰不息二十二日至紅山硤賊悉兵來迎宗仁謂據山者勝遂駐軍以待頃之賊攻急宗仁自辰至未血戰突圍為火器傷脇而殞事聞入祀忠勇祠給世職拜他拉布勒哈番先是宗仁同邑李國勲者雍正元年九月由武舉同宗仁出西寧戰鎮海堡戰新城戰郭莽寺俱有功引見授甘肅南古城守備八年調巴里坤從征於紅山硤遇賊苦戰中火器而斃時十二月初七日也勅賜葬祭給世職拖沙喇哈番又督標中營千總王大謨蒲城人興漢鎮標中營百總劉世勲興安人俱戰殁恩䘏有加陜西通志巻六十一
