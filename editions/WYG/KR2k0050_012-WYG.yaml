body:
  text: 陜西通志巻十二山川五興安州商州同州興安州牛頭山即牛山在州北九十里州冊西城縣有牛山唐書地理志西城故城在州西北牛山為州境羣山之冠上有泉不涸不溢禱雨輒應輿地紀勝黃巢谷在金州牛山雍大記州金州即今治牛頭山綿亘百餘里髙入雲漢有金牛洞即昔人掘劔刺黄腰獸處又其巔有五硌山峰巒錯互又有蠟燭山青翠挿天以形似名州志洛硌音九里岡在州北五十里石磴崚嶒陡峻難上神灘河經其陽琉璃河經其隂為長安孔道州志盻陽嶺在州北百里其山髙峻日出先及故名麻坪河經其陽洵河經其隂山麓有石砦名轆轤杷州志三教山在州北百二十里山甚髙有二龍湫相傳為南嶽禪師道場二龍得度報以甘泉其傍有喬松二龍所遊戯繞三匝而上舊痕宛然歳旱禱雨於此又州北百三十里為觀音山州志王莽山在州北三百里莽嘗遣兵戍守於此傅家河之水出焉山傍有樹髙數仭其隂四蔽而空其中名重陽樹又王莽山西為燕子嶺接鎮安界又燕子嶺東為二郎山四面險峻其頂平坦可屯數千人泉流皆瀑布林木蓊翳人跡罕至過此則為鎮安之下茅坪矣州志劇盗淡文省據燕子嶺距邑二百八十里明劉閣香溪洞記心山在州西北五里又相近有梅花山首枕漢江是為姚墟州志漢陽厥守漢中棄官修仙於此明劉閣記陽一作楊長鎗嶺在州西北十五里又折弓埡在州西北五十里相傳有將軍戰沒於此失其姓名土人祠之州志鯉魚山在州西四十里山上有泉舊時泉内有二鯉魚禱雨多應今泉涸其相近有赤崩灣宋將楊大勲死節處州志州西三十里地名秦郊渡月河約二里有山最髙曰鯉魚山與漢隂鳯凰山相連以鳯凰為頭鯉魚為尾共一百二十里輿地紀勝三條嶺在州西六十里明末㓂亂鄖將黄元吉死處又州西六十五里曰擂鼓臺土阜巋然亦古戰塲也州志鳯凰山在州西七十里懸聳萬仭冠絶羣山雍勝畧山西阻池河北阻越河東南阻漢亘二百五十里跨興漢石紫四郡縣地又天馬山在州西九十里亦鳯凰山之支也越河經其下其相近有越嶺與天馬山對峙設有越嶺闗與漢隂接界又小埡子在州西百二十里兩山壁立中通一路如線州志七寳山在州西百五十里接紫陽界州志西城山在州西南五里古縣治建其下今有三石塔存其相近又有藥王山以祠祀孫真人而名州志宇按寰記西城故城在漢江北西城山東與州志不合魏山在州西南九里元和志心山二里至魏山三面險絶惟北小徑可捫葛而升晉吉挹督䕶梁州秦韋鍾來㓂挹嬰壘急口岐山固守三年不可下即兹山也明劉閣牛山記天柱山一名砦子山在州西南四十里一名砦子山髙險壁立其下有碧瑱洞今封閉州冊郎家山在州西南八十里州志馬蝗山在州西南九十里香河水經此州志南宫觀山在州西南百五十里石笋凌空四壁如削嵐河水經其下砰䂴如雷不通舟楫州志趙臺山在州南二里梁時漢水泛溢人皆走避此山元和志州南三里曰歡喜嶺山色皆赭有巨冢名太子墳俗傳為堯第九子無所考昔有牧兒陷入見殿廷儼然皆上古時物以土封之後遂失其處州志玉屏山在州南五里山多青白堊香溪水出此其相近又有尖峰山州志文筆山在州南七里其相近有香溪洞州冊平利縣北數十里有香溪柴扉洞輿地紀勝自魏山又三里度香溪溝入崇山中有石洞相傳吕洞賔郭尚竈傳道兹洞洞前有石棋枰及子人不敢取尚書胡濙有詩鑱石壁明劉閣香溪洞記出郭循溪而南度仙關折而南為純陽洞又南為八仙洞又西為三茅洞亦名凌霄洞與純陽洞隔溪相望橋上有玉皇閣相傳即吕郭棲息處又相近有龍門谷谷有龍門洞洞有三泉旱禱輒應州志五峰山在州南五十里五峯聳秀為州勝槩州志牛蹄嶺在州東南十五里路極險峻黄洋河經其下州志老君山在州東三十里其相近有古廟嶺磨溝水所出又州東四十里有髙洞山又州東四十五里有青碌山有石洞十二處州志髙王山王一作望在州東六十里逈出衆山有髙王祠又歪頭山在州東八十里州志鶻嶺在州東接上津縣界地極險要雍勝畧白雲山在州東北五里白雲之泉出焉一名卓錫泉相傳為南岳懐讓禪師卓錫得泉處又大團山小團山俱在州東北十里州志龍王山在州東北三十里上有龍湫大旱不涸其相近有老樹嘴相傳昔山有豫章樹因以是名北望終南南望吉陽諸山簇簇如畫州志將軍山在州東北四十里相傳舊有將軍戰歿故名山後有石洞内藏鐵盔甲不知所自人不敢近賈志其相近有古墓嶺州志附考金川縣有焦陵山隋書地理志西城縣有伏羲山寰宇記按金川西城俱屬州境山無考又按路史注伏羲山在西城女媧山在平利與伏羲山接則山當在州東南近平利界疑即今之髙王山也漢水在州城北一里自紫陽界入境又東入洵陽界州圖漢水自逕魚脯溪口又東過西城縣南又東逕鼈池鯨灘又東逕嵐谷北口又東右得大勢左對月谷口又東逕西城縣故城南又東為鱣湍水經注漢水去州城百歩元和志漢江自樓子灘入州境又東為月池灘在州西南百六十里又東三十五里為馬尿灘又東五里受道河之水為思灘又東三十里為髙洋灘低洋灘又東十里受蒿坪河五堰河溜水河嵐河之水為三堆灘又東五里為織女灘又東五里為串灘又東四十五里為麩灘又東二十里受吉河月河之水為月河灘又逕州城下為州身灘又東去州十里為立石灘又東二里為下立石灘又東三十里受神灘河水為神灘又東五里為二郎灘又東七十里為洵陽界諸灘之中麩灘串灘二郎灘為險而神灘尤甚明成化間知州鄭福於沍冬時用火燒石疏鑿以殺其勢舟行利焉又江中有安康石因郡得名常隠不見見則歳饑又有美女石亦在石泉壩漢水北岸