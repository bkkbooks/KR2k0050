相傳晉髙僧佛圖澄洗腸於此名山記在三里澗南百餘歩金沙谷下油膩如星浮水面旱禱有應縣志搠槍泉水在縣南三里相傳漢光武北征時搠槍得泉故名潜確類書大峪河一名撲地河又名李家河俗名薄底河在縣東二十里源出界頭山與郃陽分界至蒲城入洛亦名撲地河俗訛為薄底河又謂之李家河縣冊溢池在縣西北七十里注而不溢故名西安府志芳泉在城中邑舊無水逺汲三里澗中𢎞治間知縣徐政即預備倉鑿一井深三百六十尺命曰芳泉又徐公井亦在城中嘉靖丙午知縣徐效賢擇隙地鑿四井邑人取汲稱便號徐公井又有雙泉嘉靖庚戍知縣敖佐因城中水鹹即社稷壇鑿二井其水清甘縣志温泉一名帝嚳泉在縣東北十五里西安府志泉有三源竒川瀉注西注於洛又曰帝嚳温泉寰宇記三源並出將軍山麓合為一流中隔土嶺一里鑿引逹縣可以利民或疑即古之温泉然非入洛之水也縣志韓城縣梁山在縣西北九十里禹貢錐指治梁及岐書經禹貢梁山在雍州孔傳奕奕梁山維禹甸之詩經大雅梁山韓之鎮也今在同州韓城縣朱傳成公五年梁山崩春秋梁山河上山公羊傳梁山崩壅遏河三日不流榖梁傳禹貢梁山在左馮翊夏陽縣西北漢書地理志縣夏陽故城在今南山在夏陽縣西臨於河上魏土地記河水又南逕梁山原原自山東南出河晉之望也水經注闗内道名山曰梁山唐十道志韓城縣有梁山唐書地理志大梁山在韓城縣西五里又有小梁山寰宇記治按雍錄云梁山在雍州見於詩書者凡兩出禹貢梁及岐此梁山在韓城縣詩所云維禹甸之者是也太王去邠踰梁山在奉天西非禹貢之梁矣奉天梁山距冋州治五百里諸家多混合言之誤乂按梁山延亘甚逺自郃陽西北又迤北抵韓城西北之麻線嶺皆梁山也龍門山在縣東北六十里縣志考詳見圖鳯凰山在縣北四十里縣圖鏵鎡山在縣北七十里即龍門西山縣冊大象山在縣西北二里出西郭即得山麓澽水南旋山勢起伏如象之飲於潭解拙存名勝志龍門山延亘而南與之相接縣志獅嶺山在象山南形如獅子臨於潭水躨跜欲動縣續志蘇山在縣西北五里許有漢蘇武墓故以名山古徑盤曲而上有老栢三百餘柯皆南向其麓多柿樹霜後滿山紅色可愛縣志横山在縣西北二十里迤川西北羣峰沓互宅中䆳處為横山石竒如砌澗底泉聲弄筑振環山有石洞昔道士郝凈元羽化其中遺書錮碑底為人劚取其藏書穴丹竈至今俱存名勝志文家嶺在縣西北二十里文水北嶺之南有黄花峪縣圖三峽山在縣西北四十里縣圖横溪水出三累山其山層密三成故俗以三累名山山下水際有二石室葢隠者故居又崌谷側溪西北皆有石室昔子夏教西河疑即此也水經注即按崌谷水經三峽山南則三累山疑今之三峽山也又横溪水疑即今之洫水栢林洞在縣西北四十五里又猿山在縣西北五十里其東北有蝦蟆坎縣圖牡丹山在縣西北六十里多産牡丹開時紅紫滿山香聞數十里土人采以當薪又有牡丹坪在渚北村西北亦多牡丹縣續志五池山在縣西北萬峰中為岑凡五深巖䆳谷人跡罕至北池最逺去縣可百二十里西池次之東南池又次之中池稍近亦且八十里俱有泉俗名海眼山多松中池尤勝自麓及巔青蔥夾路幽絶人寰舊志稱為五峙者誤也縣續志安國嶺在縣西北縣冊朱砂嶺在縣西北百十里盤水所出縣圖麻線嶺在縣西北百二十里與雒川縣分界明成化八年叅議嚴憲鑿山開道以通餉運縣志川亦見洛縣神道嶺在縣西北百二十里與宜川縣接界縣續志土嶺在縣西三十五里縣圖牛心峽在縣西四十五里薛峰鎮西縣冊峽勢甚竒其左怪石巉然兩水滙處急流如横幅練名勝志天鷷頭在縣西五十五里薛峰鎮西北縣冊峰不髙而娟秀一川景色盡在望中松樹尤多蔥鬰名勝志錦石門在縣西六十里薛峰鎮南縣冊老石成圍森然如楔澗水沄沄野趣甚曠名勝志韓原在縣西南八里括地志僖公十五年秦晉戰於韓原左傳即所謂少梁也雍勝畧髙門原一名馬門原在縣西南二十里賈志司馬靳葬華池孫昌塟髙門司馬遷自序陶渠水南逕髙門南葢層阜墮缺故流東門之稱今髙門東去華池三里水經注髙門原俗名馬門原在縣西南十八里括地志原在芝川西北梁山之麓有層阜秀出雲表縣志巍山在縣西南四十里孤峰獨聳而最髙縣冊登巍山上羣峰皆拱揖山椒無樹老石班然諺云華山髙只值巍山腰地勢可知矣名勝志香山香一作方在縣西南五十里以唐白少傅得名俗訛為方山縣續志馬頭山在縣南十五里形𩔖馬首故名縣舊志附考蘇代曰茂居秦自崤塞至鬼谷皆明知之史記廿茂傳韓城縣有鬼谷隋書地理志按此谷無考黄河在縣東十五里自宜川界流入與山西河津榮河分界又南入郃陽界縣圖河水南出龍門口又南右合暢谷水又南逕梁山原東又南崌谷水注之又南右合陶渠水昔魏文侯與吳起浮河而下美河山之固即於此也水經注河自龍門而南距郃陽不百里河堧多客土遇潦輒潰與榮河縣接界即韓信以木罌渡軍擊魏處縣志考詳見圖錯開河一名治户川在縣東北七十里龍門山北有河口略似龍門而不能通相傳鯀治水時所鑿今名錯開河縣冊錯開河由龍門而上六七里曰金門其西有澗曰治户川川口頗多鐫跡在昔金門未闢崇伯不諳水性意欲使河直行東北故失利耳書云鯀陻洪水疑即謂此也衛氏地圖記盤水即暢谷水在縣西北百十里縣冊暢谷水自溪東南流逕夏陽縣西北東南注於河水經注盤水源出朱砂嶺歴縣北相公殿逕馮峰口東過薛曲里煖水自西南入焉又南過帶村東入於河又縣北二十里盤水之南有文水一名汀水一名萬泉東流至吳村又至開化寺前合盤水入於河縣志谷水在縣西北四里源出蘇山東流至留庄入河縣圖澽水即崌谷水在縣西南一里縣圖崌谷水出縣西北梁山東南流横溪注之水出三累山細水東流注於崌谷水東南逕夏陽故城北又東南流入於河水經注出自西山東南流二十二里入黄河雍勝畧澽水源出麻線嶺東流為白馬潭受七水入河賈志澽水出麻線嶺東流過石門離水自南入焉又東過景封峪水自北入焉又東北過土嶺洫水自西北入焉又東出土門岸髙口窄水勢迅急過邑城西轉而南其勢益激澗水自西入焉又南過陳村水自西入焉又南過馬頭山潦水自西入焉又南過少梁澮水自西入焉又南合芝水入於河縣志白馬潭在縣西七十里西安府志芝水即陶渠水在縣西二十三里源出香山賈志陶渠水出西北梁山東南逕漢陽太守殷濟精廬南又南逕髙門南又東南逕華池南又東南逕夏陽縣故城南又歴髙陽宫北又東南逕司馬子長墓北又東南流入河水經注芝川河源出方山東南流諸山水自西南來會踰髙家坡潗水自北入焉又東過鏵薛澻水自西南來入焉又東過吕庄沆水自西北來入焉又東過芝川鎮南司馬祠北同澽水入於河縣志芝川在韓城縣南二十里東流入黄河雍勝畧丹陽觀碑漢武帝時得芝草於此遂稱芝川縣續志靈潭一名青龍潭在縣西三里峪有潭淵然巉巖之下將雨則絮絮雲升相傳有龍潜焉山半飛閣巋然松老莓苔如繡旱禱輒應又名青龍潭縣續志銅底井在縣城東北西安府志獨泉在縣北百二十里西安府志石井在縣西北十里西安府志馬杓泉在縣西十二里源出石罅以形似名西安府志天城泉在縣西四十里天城堡西安府志龍泉在縣南三里澽水之隂龍王座下冬夏澄碧伏流滙廟前為方池有松偃葢以滃然出雲為雨候名勝志歲旱禱雨有應西安府志北泉在縣南芝川鎮西張中丞士佩築北圃自為記圖畫刻石稱一方名勝縣續志河瀆泉在縣東五里縣圖陜西通志巻十二
