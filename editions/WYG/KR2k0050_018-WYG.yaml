body:
  text: 陜西通志巻十八封爵一衆建親賢胙茅錫曰典厥職貢祀乃山川斄扈古國列若星􅄤豐鎬鼎盛圭璧萃焉奄立郡縣五等猶沿剖符關内勛伐爛然雲龍風虎𤓰瓞蔓延釐爾秦土執鬯世𫝊作封爵志第八上古按賈志有翟侯壽西鄉侯容舞陽侯樊噲髙陵侯王虞人髙陵侯翟方進平陵侯蘇建杜侯復陸支富平侯張安世考史漢翟屬東海西鄉屬涿郡舞陽屬許州髙陵屬瑯琊平陵屬武當杜屬重平富平屬平原皆非陜境又髙祖先王漢中帝業伊始自不當入藩爵而賈志與列侯並載殊覺非體俱為乙去再賈志載關内侯信按文獻通考漢興設爵二等曰王曰侯羣臣異姓以功封之謂之徹侯關内侯雖有侯號而無侯國自不得與列侯守土者並也今從刪按漢書馮異傳封陽夏侯馮志作夏陽侯編入陜省誤矣又賈志載建忠侯彭寵考三原名建忠始自北魏漢時陜省無建忠郡縣又載富平侯張純考富平屬平原郡亦非陜境俱為乙去按賈志有西鄉侯曹眩張既劉放考後漢書郡國志西鄉屬涿郡不在陜西境内俱從刪晉按賈志有興平伯陸玩考晉興平名始平陜省無興平郡縣又載宋始平王劉鸞興平子袁粲陳始平子趙知禮新豐子蔡景歴考宋始平等縣皆僑治襄陽陳無陜省境土俱應從刪按賈志載秦王翰扶風公李崇考魏書皆係身後追封俱為乙去至涇陽男李渾華山公楊愔係北齊所封郃陽子薛寘澄城子裴文舉係北周所封不應入魏封爵至所載北周封爵京兆公冦洛等十三人俱係魏時所封今為更定陜西通志巻十八
