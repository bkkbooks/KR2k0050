body:
  text: 陜西通志巻七十七紀事第二後漢蜀漢魏後漢光武帝建武元年夏六月長安亂更始奔新豐張邛守河東為鄧禹所破還奔長安與諸將議曰赤眉近在華隂旦暮且至長安見滅不久不如掠城中以自富轉攻所在東歸南陽入説更始更始怒使王匡陳牧成丹趙萌屯新豐李松軍掫以拒之續漢志曰新豐有鴻門亭掫城即此張邛廖湛胡殷申屠建等與隗囂謀刼更始侍中劉能卿知其謀以告更始召邛等入將悉誅之隗囂不至更始使邛等待於外廬邛與湛殷疑有變遂突出獨申屠建在斬之邛與湛殷勒兵掠東西市燒門入戰更始大敗奔新豐復疑王匡陳牧成丹與邛等同謀乃並召入牧丹先至即斬之匡懼將兵入長安與邛等合後漢書劉𤣥傳赤眉以劉盆子稱帝於華隂赤眉進至華隂軍中有齊巫鼓舞祠城陽景王巫狂言景王大怒曰當為縣官何故為賊軍中警動方望弟陽説崇等立宗室扶義誅伐乃相議求劉氏共尊立之遂立盆子為帝初赤眉過式掠盆子及二兄恭茂皆在軍中恭隨崇等降更始即封式侯在長安盆子與茂留軍中及崇等欲立帝求軍中景王後惟盆子與茂及前西安侯孝最為近屬乃書札為符又以兩空札置笥中盆子等三人以年次探札盆子最幼後探得符諸將皆稱臣拜盆子時年十五被髮徙跣敝衣赭汗見衆拜恐畏欲啼茂謂曰善藏符盆子即齧折棄之後漢書劉盆子傳秋七月大司徒鄧禹渡河破左輔兵於衙禹自汾隂渡河入夏陽更始左輔都尉公乘歙引衆十萬與左馮翊兵共拒禹於衙禹破走之通鑑志按地理衙故城在今白水縣東北八月更始復入長安李松還從更始與趙萌共攻匡邛於城内連戰月餘匡等敗走更始徙居長信宫後漢書劉𤣥傳九月赤眉入長安更始奔髙陵詔封更始為淮陽王赤眉至髙陵匡等迎降之遂共連兵而進更始城守使李松出戰赤眉生得松松弟汎為城門校尉赤眉使使謂之曰開門活汝兄汎即開門九月赤眉入城更始單騎走侍中劉恭以赤眉立其弟盆子自繫詔獄聞敗乃出步從至髙陵右輔都尉嚴本恐失更始為赤眉所誅將兵在外號為屯衛而實囚之後漢書劉𤣥傳上聞更始失城守未知所在詔封更始為淮陽王敢有害及妻子者罪大逆其送詣吏者封列侯袁宏後漢紀冬十月淮陽王降赤眉赤眉下書曰聖公降者封長沙王過二十日勿受更始遣劉恭請降赤眉使其將謝祿徃受之十月更始詣長樂宫上璽綬於盆子赤眉坐更始置庭中將殺之劉恭謝祿為請不能得遂引更始出劉恭追呼曰臣誠力極請得先死拔劍欲自刎赤眉率樊崇等共救止之乃赦更始封為長沙王更始常依謝祿居劉恭亦擁䕶之後漢書劉𤣥傳鄧禹引軍屯栒邑劉盆子居長樂宫三輔郡縣遣使貢獻兵士輒剽奪之又數暴掠吏民百姓不知所歸聞鄧禹乘勝獨克而師行有紀皆望風相攜負以迎軍禹所止輒停車拄節以勞來之父老童穉滿其車下莫不感悦諸將豪傑皆勸禹徑攻長安禹曰不然今吾衆雖多能戰者少赤眉新拔長安財穀充實鋒鋭未可當也吾且休兵北道就糧養士以觀其敝乃可圖也於是引軍北至栒邑所到諸營保郡邑皆開門歸附通鑑志按地理栒邑屬右扶風張宗為偏將軍從鄧禹軍到栒邑赤眉大衆且至禹以栒邑不足守欲引師進就堅城而衆人多畏賊追憚為後拒禹乃書諸將名於竹簡署其前後亂着笥中令各探之宗獨不肯探云死生有命張宗豈辭難就逸乎禹歎息謂曰將軍有親弱在營奈何不顧宗曰愚聞一卒畢力百人不當萬夫致死可以橫行宗今擁兵數千以承天威何遽知其必敗乎遂留為後拒諸營既引兵宗方勒厲軍士堅壘以死當之禹到前縣議曰以張將軍之衆當百萬之師猶以小雪投沸湯雖欲戮力其勢不全也乃遣步騎二千人反還迎宗宗引兵始發而赤眉卒至宗與戰卻之乃得還營於是諸將服其勇還到長安夜將鋭士入城襲赤眉中矛貫髀又轉攻諸營堡為流矢所激皆幾至於死後漢書張宗傳十二月赤眉殺淮陽王三輔苦赤眉暴虐皆憐更始而張邛等以為慮謂謝禄曰今諸營長多欲簒聖公者一旦失之合兵攻公自滅之道也於是祿使從兵與更始共牧馬於郊下因令縊殺之劉恭夜往收藏其屍光武聞而傷焉詔大司徒鄧禹塟之於霸陵後漢書劉𤣥傳將軍馮愔反於栒邑帝以闗中未定而禹久不進兵勅曰司徒堯也亡賊桀也長安吏人遑遑無所依歸宜以時進討鎮慰西京繫百姓之心禹猶執前意别攻上郡諸縣更徵兵引穀歸至大要遣馮愔宗歆守栒邑二人爭權相攻愔遂殺歆因反擊禹禹遣使以聞帝問使人愔所親愛為誰對曰䕶軍黃防帝度愔防不能久和因報禹曰縛馮愔者必黃防也乃遣尚書宗廣持節往降之防果縛愔歸罪後漢書鄧禹傳二年春正月赤眉大掠長安而西鄧禹入長安劉恭見赤眉衆亂知其必敗自恐兄弟俱禍宻教盆子歸璽綬習為辭讓之言正月朔崇等大會恭先曰諸君立恭弟為帝且一年肴亂日甚誠不足以相成願得退為庶人更求賢知盆子乃下牀解璽綬叩頭曰今設置縣官而為賊如故吏人貢獻輒見剽刼流聞四方莫不怨恨此皆立非其人所致願乞骸骨避賢聖必欲殺盆子以塞責者無所離死因涕泣嘘唏崇等及會者數百人莫不哀憐之乃皆避席頓首曰臣無狀負陛下請自今以後不敢更放縱因共抱持盆子帶以璽綬既罷出各閉營自守三輔翕然百姓爭還長安市里且滿二十餘日赤眉貪財物復出大掠城中糧食盡遂收載珍寳縱火焚宫室引兵而西過祠南郊車甲兵馬最為猛盛衆號百萬乃自南山轉掠城邑與更始將軍嚴春戰於郿破春殺之遂入安定北地後漢書劉盆子傳時赤眉西走扶風禹乃南至長安軍昆明池大饗士卒率諸將齋戒擇吉日修禮謁祠髙廟收十一帝神主遣使奉詣洛陽因循行園陵為置吏奉守焉鄧禹傳二月延岑自稱武安王於漢中建武二年延岑復反攻漢中圍南鄭漢中王嘉兵敗走岑遂據漢中進兵武都為更始柱功侯李寳所破走天水公孫述遣將侯丹取南鄭嘉收散卒得數萬人以寳為相從武都南擊侯丹不利還軍河池下辨復與延岑連戰岑引北入散闗散闗故城在今陳倉縣南十里至陳倉嘉追擊破之通鑑秋九月赤眉發諸陵復入長安鄧禹戰不利走雲陽赤眉入北地至陽城番須中逢大雪坑谷皆滿士多凍死乃復還發掘諸陵大司徒鄧禹時在長安遣兵擊之於郁夷郁夷縣名屬右扶風反為所敗禹乃出之雲陽九月赤眉復入長安止桂宫長安記曰桂宫在未央宫北時漢中賊延岑出散闗屯杜陵逢安將十餘萬人擊之鄧禹以逢安精兵在外唯盆子與羸弱居城中乃自往攻之會謝祿救之夜戰槀街中禹兵敗走後漢書劉盆子傳按本紀赤眉發掘園陵在二年正月盆子傳謂安定既還乃發諸陵鄧禹遣擊不克走雲陽赤眉復入長安事在九月與本紀互異而司馬通鑑因焉今從之延岑大破赤眉於杜陵延岑及更始將軍李寳合兵數萬與逢安戰於杜陵岑等大敗寳遂降安而岑收散卒走寳乃宻使人謂岑曰子努力還戰吾當於内反之岑即還挑戰安等空營擊之寳從後悉拔赤眉旗幟更立已幡旗安等戰疲還營見旗幟皆白大驚亂走自投川谷死者十餘萬人逢安與數千人脱歸長安後漢書劉盆子傳漢中王嘉大破赤眉於谷口帝令鄧禹招降之廖湛將赤眉十八萬攻漢中王嘉嘉與戰於谷口大破之嘉手殺湛遂到雲陽就穀嘉妻兄新野來歙帝之姑子也帝令鄧禹招嘉嘉因歙詣禹降通鑑故按谷口城在今醴泉縣東北四十里冬十一月孫登僭號於上郡銅馬青犢尤來餘賊共立孫登為天子於上郡登將樂元殺登以其衆五萬餘人降後漢書光武帝紀按上郡今綏德州遣偏將軍馮異入闗代鄧禹伐赤眉十二月馮異破赤眉於華隂時赤眉延岑暴亂三輔郡縣大姓各擁兵衆大司徒鄧禹不能定乃遣馮異代禹討之帝送至河南賜以乘輿七尺貝劒勅異曰三輔遭王莽更始之亂重以赤眉延岑之酷今之征伐非必畧地屠城要在平定安集之耳卿本能御吏士念自修勅無為郡縣所苦異頓首受命引而西所至皆布威信𢎞農羣盜稱將軍者十餘輩皆率衆降異異與赤眉遇於華隂相拒六十餘日戰數十合降其將劉始王宣等五千餘人後漢書馮異傳三年春正月以馮異為征西大將軍夏四月馮異擊敗延岑於上林闗中平時赤眉雖降衆冦猶盛延岑據藍田王歆據下邽芳丹據新豐蔣震據霸陵張邯據長安公孫守據長陵陽周據谷口吕鮪據陳倉角閎據汧駱葢延據盩厔任良據鄠汝章據槐里各稱將軍擁兵多者萬餘人少者數千人轉相攻擊異且戰且行屯軍上林苑中延岑既破赤眉拜置牧守欲據闗中引張邯任良共攻異異擊破之諸營保附岑者皆來降岑遂自武闗走南陽時百姓饑餓委輸不至軍士悉以果實為糧詔拜趙匡為右扶風將兵助異并送縑穀異兵食漸盛乃稍誅擊豪傑不從令者褒賞降附有功勞者悉遣其渠帥詣京師散其衆歸本業闗中悉平後漢書馮異傳四年冬十二月公孫述遣兵屯陳倉隗囂遣兵助馮異擊破之公孫述積糧漢中築宫南鄭又造十層赤樓帛蘭舩多刻天下牧守印章使將軍李育程烏將數萬衆出陳倉與吕鮪徇三輔征西將軍馮異擊鮪育於陳倉大敗之鮪育奔漢中後漢書公孫述傳囂既有功於漢又受鄧禹爵署其腹心議者多勸通使京師囂乃上書詣闕光武素聞其風聲報以殊禮言稱字用敵國之儀所以慰籍之良厚時陳倉人吕鮪擁衆數萬與公孫述通冦三輔囂復遣兵佐征西大將軍馮異擊之走鮪遣使上狀帝報以手書恩禮愈篤其後公孫述數出兵漢中遣使以大司空扶安王印綬受囂囂自以與述敵國恥為所臣乃斬其使出兵擊之連破述軍以故蜀兵不復北出隗囂傳傳按述將程烏馮異作程焉五年冬十二月盧芳僭號於九原王莽時天下咸思漢德芳詐稱武帝曾孫劉文伯乃與三水屬國羌胡起兵更始至長安徵芳為騎都尉更始敗三水豪傑共計議立芳為上將軍西平王使使與西羌單于結和親單于乃使句林王將數十騎迎芳遂立芳為漢帝初五原人李興隨昱朔方人田颯代郡人石鮪閔湛各起兵自稱將軍建武四年單于遣無樓且渠王入五原塞與李興等和親告興欲令芳還漢地為帝五年李興引兵至單于庭迎芳與俱入塞都九原縣掠有五原朔方雲中定襄雁門五郡並置守令侵苦北邊後漢書盧芳傳六年夏四月帝如長安謁園陵遣兵擊漢中夏四月丙子幸長安始謁髙廟遂有事十一陵遣葢延等七將軍從隴道伐公孫述五月己未至自長安後漢書光武帝紀李通為前將軍六年夏領破姦將軍侯進捕虜將軍王霸等擊漢中賊謂延岑也公孫述遣兵赴救通等與戰於西城破之李通傳漢按注西城縣屬中郡五月隗囂反使其將王元據隴坁諸將戰不利引還諸將從隴道擊蜀隗囂使王元據隴坁伐木塞道諸將戰不利還屯三輔袁宏後漢紀時漢軍不利引下隴囂兵追急武選精騎還為後拒身被甲持㦸奔擊殺數千人囂兵乃退諸將得還長安後漢書馬武傳在按明一統志隴坻鳳翔府西北四十里即隴山也冬十二月隗囂遣兵下隴馮異祭遵共擊破之諸將之下隴也帝詔耿弇軍漆一統志云漆縣名後周改永壽縣馮異軍栒邑祭遵軍汧呉漢等還屯長安馮異引軍未至栒邑隗囂乘勝使王元行巡將二萬餘人下隴分遣巡取栒邑異即馳兵潛往閉城偃旗鼔行巡不知馳赴之異卒擊鼔建旗而出巡軍驚亂奔走追擊大破之祭遵亦破王元於汧於是北地諸豪長耿定等悉叛隗囂降異通鑑馮異擊盧芳匈奴兵破之北地上郡皆降異進軍義渠領北地太守事擊盧芳將賈覽匈奴薁鞬日逐王破之上郡安定皆降異後漢書馮異傳七年冬盧芳朔方郡降芳以事誅其五原太守李興兄弟而其朔方太守田颯雲中太守橋扈恐懼叛芳舉郡降光武復令領職如故後漢書盧芳傳八年夏閏四月帝如闗中征隗囂上西征至漆議者以為車駕不宜入險且遣諸將觀􅌷實議未定會馬援至勸上曰囂衆瓦解兵進必破以米為山谷于上前指衆軍所入處上笑曰虜在吾目中矣車駕遂進竇融與五郡太守將步騎數萬輜重五千兩與上會第一囂衆大潰城邑皆降囂將妻子保西州呉漢岑彭引兵追守之袁宏後漢紀冬十一月呉漢岑彭等引兵還長安公孫述將救囂乘髙卒至漢兵未及陳囂得逃出入冀漢軍食盡呉漢岑彭燒輜重歸長安袁宏後漢紀九年夏六月遣來歙監䕶諸軍屯長安馬援副之帝使來歙悉監䕶諸將屯長安太中大夫馬援為之副歙上書曰公孫述以隴西天水為藩蔽故得延命假息今二郡蕩平則述智計窮矣宜益選兵馬儲積資糧今西州新破兵人疲饉若招以財穀則其衆可集帝然之於是詔於汧積穀六萬斛綱目十年秋八月帝如長安遂至汧八月己卯幸長安祠髙祖廟上將討髙峻冦恂諫曰車駕止長安隴西足以震懼且去闗東不逺此從容一處而制四方今士馬勞倦逺履險阻非萬乘之固也前年穎川之役可以為戒上不從進及汧髙峻不降上謂恂曰公前止吾今為吾行矣恂至第一峻遣軍師皇甫文詣恂辭禮不屈恂怒斬之遣其副歸峻即日開城與囂純等降袁宏後漢紀十一年秋七月帝如長安帝自將征公孫述秋七月次長安後漢書光武帝紀十三年春二月盧芳犇匈奴五原郡降芳與賈覽共攻雲中不下其將隨昱守九原欲脅芳降芳知羽翼外附心膂内離遂棄輜重與十餘騎亡入匈奴其衆盡歸隨昱昱乃隨使者程恂詣闕拜昱為五原太守後漢書盧芳傳十八年春帝如長安二月甲寅西巡狩幸長安三月壬午祠髙廟遂有事十一陵厯馮翊界夏四月甲戌車駕還宫後漢書光武帝紀二十二年春閏正月帝如長安閏正月丙戌幸長安祠髙廟遂有事十一陵後漢書光武帝紀二十四年春正月匈奴南邊八部立日逐王比為南單于欵五原塞匈奴八部大人共議立日逐王比為呼韓邪單于欵五原塞願永為藩蔽捍禦北虜事下公卿議者皆以為不可許獨五官中郎將耿國以為宜如孝宣故事受之帝從之通鑑二十六年冬徙南單于居西河美稷冬五骨都侯子將其衆三千人歸南部北單于使騎追擊悉獲其衆南單于遣兵拒之逆戰不利於是復詔單于徙居西河美稷令西河長史歳將騎二千弛行五百人助中郎將衞䕶單于南單于既居西河亦列置諸郡王助為扞戍北地朔方五原皆領部衆為郡縣偵邏耳目後漢書南匈奴傳北美稷在今榆林東中元元年夏四月帝如長安四月戊子行幸長安祀長陵袁宏後漢紀明帝永平二年冬十月帝如長安十月西巡狩幸長安祠髙廟遂有事於十一陵十一月遣使者以中牢祠蕭何霍光帝謁園陵過式其墓後漢書明帝紀五年冬北匈奴冦五原南單于擊却之北匈奴六七千騎入於五原塞南單于擊却之西河長史馬襄赴救虜乃引去後漢書南匈奴傳八年春三月初置度遼將軍屯五原曼柏北單于欲合市遣使求和親顯宗許之八年遣越騎司馬鄭衆北使報命而南部須卜骨都侯等知漢與北虜交使懷嫌怨欲畔宻因北使令遣兵迎之鄭衆出塞疑有異伺候果得須卜使人乃上言宜更置大將以防二虜交通由是始置度遼營以中郎將呉棠行度遼將軍事副校尉來苗左校尉閻章右校尉張國將黎陽虎牙營士屯五原曼柏又遣騎都尉秦彭將兵屯美稷其年秋北虜果遣二千騎候望作馬革舩欲度迎南部畔者以漢有備乃引去後漢書南匈奴傳按鑑注曼柏在勝州銀山縣界章帝建初七年冬十月帝如長安十月癸丑西巡狩幸長安丙辰祠髙廟遂有事於十一陵遣使者祠太上皇於萬年以中牢祠蕭何霍光進幸槐里岐山又幸長平御池陽宫東至髙陵造舟於涇而還每所幸輒會郡縣吏人勞賜作樂後漢書章帝紀八年夏六月北匈奴大人欵五原塞降北匈奴三木樓訾大人稽留斯等率三萬八千人馬二萬匹牛羊十餘萬欵五原塞降後漢書南匈奴傳章和元年冬十月北匈奴五十八部來降鮮卑擊北匈奴破之斬優留單于北庭大亂屈蘭儲卑胡都須等五十八部詣五原朔方北地降後漢書南匈奴傳和帝永元元年夏六月遣將軍竇憲等伐匈奴車騎將軍竇憲出雞鹿塞在朔方窳渾縣度遼將軍鄧鴻出桐楊塞屬九原郡故城在勝州銀城縣南單于出滿夷谷與北匈奴戰於稽落山大破之登燕然山刻石勒功而還後漢書和帝紀二年冬十月南單于出雞鹿塞擊北匈奴大破之遣行中郎將班固報命南單于遣左谷蠡王師子出雞鹿塞擊北匈奴於河雲北大破之後漢書和帝紀三年冬帝如長安詔竇憲與車駕會十月癸未行幸長安賜行所過二千石長吏以下及三老官屬錢帛各有差十一月癸夘祠髙廟遂有事十一陵後漢書和帝紀冬幸長安詔令大將軍憲與車駕會長安時尚書見憲皆欲釋仗稱萬歳尚書令韓稜曰枉道事人臣非所以立身也且禮無為人臣稱萬歳之制左右皆慚遂已後漢紀六年春正月使匈奴中郎將杜崇等殺南單于安國於五原立左賢王師子為單于六年春以執金吾朱徽行度遼將軍時單于與中郎將杜崇不相平乃上書告崇崇諷令西河太守斷單于章無由自聞崇因與徽上言南單于安國疎逺故胡親近新降欲殺左賢王師子及左臺且渠劉利等又右部降者謀共廹脇安國起兵背降請西河上郡安定為之儆備下公卿議以為宜遣有方畧使者之單于庭與杜崇朱徽及西河太守並力觀其動靜帝從之於是徽崇遂發兵造其庭安國夜聞漢軍至大驚棄帳去因舉兵及將新降者欲誅師子師子先知乃悉將廬落入曼柏城安國追到城下門閉不得入徽遣吏曉譬和之安國不聽城既不下乃引兵屯五原崇徽因發諸郡騎追赴之急衆大恐安國舅喜為等乃格殺安國子師子立後漢書南匈奴傳安帝永初二年冬十一月羌冦三輔殺漢中太守董炳校尉梁慬破走之滇零等自稱天子於北地招集武都參狼上郡西河諸雜種衆遂大盛南入益州殺漢中太守董炳遂冦鈔三輔斷隴道後漢書西羌傳慬受詔當屯金城聞羌轉冦三輔迫近園陵即引兵赴擊之轉戰武功美陽闗慬臨陣被創不顧連破走之盡還得所掠生口獲馬畜財物甚衆羌遂奔散朝廷嘉之數璽書勞勉委以西方事令為諸軍節度梁慬傳三年春遣騎都尉任仁督諸郡屯兵救三輔仁戰每不利衆羌乘勝漢兵數挫後漢書西羌傳秋九月烏桓鮮卑南匈奴合兵冦五原雁門烏桓率衆王無何允與鮮卑大人及南匈奴合七千騎冦五原與太守戰於九原髙渠谷漢兵大敗殺郡長吏後漢書烏桓傳冬十月南匈奴圍中郎將耿种于美稷漢人韓琮隨南單于入朝既還説南單于云闗東水潦人民饑餓死盡可擊也單于信其言遂起兵反攻中郎將耿种於美稷冬遣行車騎將軍何熙副中郎將龎雄擊之後漢書南匈奴傳四年春正月梁慬破南匈奴於屬國故城單于圍耿种數月种移檄求救慬將八千餘人馳往赴之至屬國故城與匈奴左將軍烏桓大人戰破其渠帥殺三千餘人擄其妻子獲財物甚衆單于復自將七八千騎迎攻圍慬慬被甲奔擊所向皆破虜遂引還虎澤後漢書梁慬傳美按鑑注屬國故城在稷縣二月詔任尚還軍長安元年十二月詔車騎將軍鄧隲征西校尉任尚將五營及諸郡兵屯漢陽以備羌尚軍久出無功民廢農桑乃詔尚將吏民還屯長安通鑑三月梁慬等追南匈奴及虎澤降之三月何熙軍到五原曼柏暴疾不能進遣龎雄與慬及耿种步騎萬六千人攻虎澤連營稍前單于惶怖遣左薁鞬日逐王詣慬乞降慬大陳兵受之單于脱帽徒跣面縛稽顙納質會熙卒即拜慬度遼將軍後漢書梁慬傳羌冦褒中漢中太守鄭勤戰殁滇零遣人冦褒中燔燒郵亭大掠百姓於是漢中太守鄭勤移屯褒中羌復攻褒中勤欲擊之主簿段崇諫以為虜乘勝鋒不可當宜堅守之勤不從出戰大敗死者三千人段崇及下史王宗原展以身捍刃與勤俱死後漢書西羌傳五年春三月徙緣邊郡縣避冦羌既轉盛二千石令長多内郡人並無戰守意皆爭上徙郡縣以避冦難朝廷從之遂移安定徙美陽北地徙池陽上郡徙衙百姓戀土不樂去舊乃刈其禾稼發徹室屋夷營壁破積聚驅䠞刼畧隨道死亡或隕棄老弱或為人僕妾喪其大半後漢書西羌傳元初元年春羌冦雍城滇零死子零昌代立以杜季貢為將軍元初元年春零昌遣兵冦雍城後漢書西羌傳風按雍城屬右扶夏六月羌冦漢中五官掾程信擊破之號多與當􅋩勒姐大豪共脅諸種分兵鈔掠漢中巴郡板楯蠻將兵救之漢中五官掾程信率郡兵與蠻共擊破之號多退走還斷隴道與零昌通謀後漢書西羌傳二年秋八月遣屯騎校尉班雄屯三輔司馬鈞督闗中兵詔班雄屯三輔又遣左馮翊司馬鈞行征西將軍事督右扶風仲光安定太守杜恢北地太守包盛京兆虎牙都尉耿溥右扶風都尉皇甫旗等合八千餘人又龎參將羌胡兵七千餘人與鈞分道並進後並擊零昌鈞遁還坐徵自殺參以失期軍敗抵罪後漢書西羌傳冬遣中郎將任尚屯三輔遣任尚為中郎將將羽林緹騎五營子弟三千五百人代班雄屯三輔尚臨行虞詡説尚曰兵法弱不攻强走不逐飛自然之勢也今虜皆馬騎日行數百來如風雨去如絶絃以步追之勢不相及所以雖屯兵二十餘萬曠日而無功也為使君計莫如罷諸郡兵各令出錢數千二十人共市一馬以萬騎之衆逐數千之虜追尾掩截其道自窮便人利事大功立矣尚大喜即上言用其計後漢書西羌傳延光元年秋七月䖍人羌與上郡胡反度遼將軍耿䕫擊破之䖍人種羌與上郡胡反攻穀羅城穀羅屬西河郡度遼將軍耿夔將諸郡兵及烏桓騎赴擊破之後漢書西羌傳二年冬十二月鮮卑敗南匈奴於曼柏鮮卑既累殺郡守膽氣轉盛控絃數萬騎延光二年冬其至鞬鮮卑大人名自將萬餘騎入東領候分為數道攻南匈奴於曼柏薁鞬日逐王戰死殺千餘人後漢書鮮卑傳三年冬十月帝如長安十月行幸長安丁亥會三輔守令掾史於長安作樂閏月丁未祠髙廟遂有事十一陵歴觀上林昆明池遣使者祠太上皇於萬年以中牢祠蕭何曹參霍光後漢書安帝紀順帝永建四年秋九月復北地上郡徙者各歸舊土虞詡言安定北地上郡山川險阨沃野千里土宜畜牧水可溉􅒩頃遭元元之災衆羌内潰郡縣兵荒二十餘年夫棄沃壤之饒捐自然之財不可謂利離山河之阻守無險之處難以為固今三郡未復園陵單外而公卿選懦張解設難但計所費不圖其安宜開聖聽考行所長九月詔復北地上郡還舊土通鑑陽嘉四年冬十月度遼將軍耿煜敗烏桓蘭池城烏桓冦雲中遮截道上商賈車牛千餘兩度遼將軍耿煜率二千餘人追擊不利又戰於沙南屬雲中郡有蘭池城斬首五百級烏桓遂圍煜於蘭池城於是發積射士二千人度遼營千人配上郡屯以討烏桓烏桓乃退後漢書烏桓傳永和二年冬十月帝如長安十月甲申行幸長安庚子幸未央宫會三輔郡守都尉及官屬勞賜作樂十一月丙午祠髙廟丁未遂有事十一陵後漢書順帝紀五年春二月南匈奴圍美稷夏五月度遼將軍馬續討破之南匈奴左都句龍王吾斯車紐等背畔率三千餘騎冦西河因復招誘右賢王合七八千騎圍美稷殺朔方代郡長史馬續與中郎將梁並烏桓校尉王元發緣邊兵及烏桓鮮卑羌胡合二萬餘人掩擊破之後漢書南匈奴傳羌冦三輔遣兵擊之且凍傅難種羌反與雜種羌胡大冦三輔殺害長吏於是發京師近郡及諸州兵討之後漢書西羌傳匈奴引烏桓羌胡入冦殺上郡都尉等官徙緣邊諸郡秋句龍吾斯等立句龍王車紐為單于東引烏桓西收羌戍及諸胡等數萬人攻破京兆虎牙營殺上郡都尉及軍司馬乃徙西河治離石離石西河屬縣上郡治夏陽朔方治五原後漢書南匈奴傳六年春閏正月鞏唐羌冦三輔燒園陵鞏唐羌三千餘騎燒園陵掠闗中殺傷長吏郤陽令任頵追擊戰死遣中郎將龎浚募勇士千五百人頓美陽為凉州援後漢書西羌傳永和六年西羌大冦三輔征西將軍馬賢將諸郡兵擊之不能克郡將知規有兵畧乃命為功曹使率甲士八百與羌戰賊退郤皇甫規傳冬十月徙安定北地郡十一月遣車騎將軍張喬將兵屯三輔諸種羌八九千騎冦武威凉部震恐於是復徙安定居扶風北地居馮翊遣行車騎將軍執金吾張喬將左右羽林五校士及河西南陽汝南兵萬五千人屯三輔後漢書西羌傳桓帝和平元年春二月扶風妖人作亂討平之扶風妖賊裴優自稱皇帝伏誅後漢書桓帝紀永壽元年秋南匈奴冦美稷都尉張奐擊降之南匈奴左薁鞬臺耆且渠伯德等七千餘人冦美稷東羌復舉種應之奐壁唯有二百許人聞即勒兵出進屯長城遣將王衛招誘東羌因據龜兹縣上郡屬縣名使匈奴不得交通東羌諸豪遂與奐共擊薁鞬等連戰破之伯德惶恐將其衆降郡界以寧羌豪帥感奐恩德上馬二十匹先零酋長又遺金鐻八枚奐召主簿於諸羌前以酒酹地曰使馬如羊不以入廐使金如粟不以入懷悉以金馬還之羌性貪而貴吏清前有八都尉率好財貨為所患苦及奐正已率屬威化大行後漢書張奐傳延熹二年冬十月帝如長安十月壬申行幸長安乙酉幸未央宫甲午祠髙廟十一月庚子遂有事十一陵後漢書桓帝紀四年夏六月羌冦三輔零吾復與先零及上郡沈氐牢姐諸種并力冦并凉及三輔後漢書西羌傳永康元年春正月羌冦三輔春東羌先零五六千騎冦闗中圍祋祤耀州同官縣本漢祋祤地掠雲陽夏復攻没兩營殺千餘人後漢書張奐傳冬十月羌冦三輔使中郎將張奐擊破之冬羌岸尾摩蟞等脅同種復鈔三輔奐遣司馬尹端董卓並擊大破之斬其酋豪首虜萬餘人三州清定論功當封奐不事宦官故賞遂不行唯賜錢二十萬除家一人為郎並辭不受而願徙屬𢎞農華隂舊制邊人不得内徙唯奐因功特聽後漢書張奐傳靈帝建寧元年夏破羌將軍段熲追羌於奢延破之熲將兵萬餘人直指髙平與先零諸種戰於逢義山虜衆大潰熲復追羌出橋門至走馬水上尋聞虜在奢延乃將輕兵兼行一日一夜二百餘里晨及賊擊破之後漢書段熲傳中平二年春三月北宫伯玉等冦三輔詔車騎將軍皇甫嵩等討之嵩既破黃巾威震天下會邊章韓遂作亂詔嵩迴鎮長安以衞園陵章遂等復入冦三輔使嵩因討之後漢書皇甫嵩傳伯玉等刼致金城人邊章韓遂將萬騎入冦三輔侵逼園陵詔以卓為中郎將副左車騎將軍皇甫嵩征之董卓傳秋八月遣車騎將軍張温屯美陽討北宫伯玉冬十一月將軍董卓破走之嵩以無功免歸而邊章韓遂等大盛朝廷復以司空張温為車騎將軍執金吾袁滂為副拜卓破虜將軍與盪冦將軍周慎並統于温并諸郡兵步騎合十餘萬屯美陽章遂亦進兵美陽温卓與戰輒不利十一月夜有流星如火光照章遂營中驢馬盡鳴賊以為不祥欲歸金城卓聞之喜明日乃與右扶風鮑鴻等并兵俱攻大破之斬首數千級章遂敗走温乃遣周慎將三萬人追之時衆軍敗退唯卓全師而還屯於扶風後漢書董卓傳四年春二月扶風人馬騰反冦掠三輔韓遂殺邊章伯玉擁兵十萬殺涼州刺史耿鄙而鄙司馬扶風馬騰亦擁兵反叛又漢陽王國自號合衆將軍皆與韓遂合共推王國為王悉令領其衆冦掠三輔後漢書董卓傳五年冬十一月王國圍陳倉以皇甫嵩為左將軍討之五年梁州賊王國圍陳倉復拜嵩為左將軍督前將軍董卓各率二萬人拒之卓欲速進赴陳倉嵩不聽卓曰智者不後時勇者不留決速救則城全不救則城滅全滅之勢在於此也嵩曰不然百戰百勝不如不戰而屈人之兵是以先為不可勝以待敵之可勝不可勝在我可勝在彼彼守不足我攻有餘有餘者動於九天之上不足者陷於九地之下今陳倉雖小城守固備非九地之陷也王國雖强而攻我之所不救非九天之勢也夫勢非九天攻者受害陷非九地守者不拔國今已陷受害之地而陳倉保不抜之城我可不煩兵動衆而取全勝之功將何救焉遂不聽王國圍陳倉自冬迄春八十餘日城堅守固竟不能拔賊自解去後漢書皇甫嵩傳葢勲為京兆尹是時王國衆十餘萬三輔震動勲請發兵萬人分屯三輔每有宻事帝呼詔問數加賞賜袁宏後漢紀六年春二月皇甫嵩大破王國於陳倉王國走死國衆疲敝自解去嵩進兵擊之董卓曰不可兵法窮冦勿追歸衆勿迫嵩曰不然前吾不擊避其鋭也今而擊之待其衰也所擊疲師非歸衆也國衆且走莫有鬪志以整擊亂非窮冦也遂獨進擊之使卓為後拒連戰大破之斬首萬餘級國走而死卓大慙恨由是忌嵩後漢書皇甫嵩傳獻帝初平元年春遷都長安董卓以山東兵盛欲徙都長安召公卿議曰髙祖都闗中十一世後漢中興東都洛陽從光武至今復十二世案石苞室䜟宜還都長安百官無敢應者司徒楊彪曰遷都改制天下大事昔盤庚五遷殷民胥怨故作三章以曉諭之往者王莽簒逆更始赤眉之亂焚燒長安殘害百姓人民流亡百無一存光武受命更都雒陽此其宜也今建立聖主光隆漢祚而無故捐宗廟宫殿棄先帝園陵恐百姓驚愕必麋沸螘聚以致擾亂石苞室䜟妖邪之書豈可信用卓作色曰楊公欲沮國家計耶闗東黃巾作亂所在賊起長安崤函險固國之重防又隴右取材木功夫不難杜陵南山下有武帝故陶作甎處一朝一夕可辦宫室官府盍何足言百姓小人何足與議若有前却以我大兵驅之豈得自在百僚皆失色太尉黃琬曰此大事楊公語得毋可思乎司空荀爽曰相國豈樂遷都耶山東兵起非可一日禁也而闗西尚靜故當遷之以圖秦漢之勢也堅爭不止禍必有所歸卓使有司奏免二公二月丁亥天子遷都長安卓留屯雒陽徙民長安三月己巳車駕至長安遭赤眉之亂宫室焚盡惟有髙廟京兆府舍遂就都焉袁宏後漢紀二年夏四月董卓入長安卓西入闗將至公卿以下迎之皆謁拜車下卓不為禮卓謂御史中丞皇甫嵩曰可以服未嵩曰安知明公乃至於是卓曰鴻鵠固有逺志但燕雀自不知爾嵩曰昔與公俱為鴻鵠但明公今日變為鳳凰爾卓乃大笑曰卿早服何得不拜後漢紀冬十月劉焉使張魯殺漢中太守蘇固斷斜谷閣焉領益州牧隂圗異計沛人張魯母有姿色兼挾鬼道往來焉家遂任魯以為督義司馬與别部司馬張修將兵掩殺漢中太守蘇固斷絶斜谷殺使者魯既得漢中遂復殺張修而并其衆焉自此意氣轉盛遂造作乘輿時焉四子範為左中郎將誕治書御史璋奉車都尉並在長安惟别部司馬瑁隨焉在益州朝廷使璋曉譬焉焉留不遣後漢書劉焉傳三年春正月董卓築塢於郿董卓築郿塢與長安城埒積穀為三十年儲云事成雄據天下不成守此足以畢老嘗至郿行塢公卿以下祖道於橫門外卓豫施帳幔飲誘降北地反者數百人於坐中先斷其舌或斬手足或鑿眼或鑊煮之未死偃轉杯案間而卓飲食自若魏志董卓傳夏四月王允使中郎將吕布誅董卓於掖門初五原人吕布便弓馬膂力過人既殺丁原董卓信愛之誓為父子卓自以遇人無禮恐人謀已行止常以布自衛卓性剛褊忿不思難嘗以小失意拔手㦸擲布布㨗避之為卓致謝卓意亦解由是隂怨卓常使布守中閣布與卓侍婢私通恐事發覺心不自安司徒王允以布州里壯健厚接納之布詣允陳卓幾見殺狀允與僕射士孫瑞宻謀誅卓是以告布使為内應布曰奈如父子何允曰君自姓吕本非骨肉今憂死不暇何謂父子遂許之夏四月辛巳帝有疾既瘳會羣臣於未央殿卓置衛自其營至於掖門士孫瑞使騎都尉李順范書作李肅將吕布親兵十人偽著衛士服于掖門卓將出馬散不進卓怪之欲還布勸之遂行入門衛士以㦸刺之卓衣内有鎧不入傷臂墜車大呼曰吕布何在對曰在此布曰有詔趣兵斬之卓罵曰庸狗敢如是耶遂斬之王允使人然火卓腹上臭乃埋之袁宏後漢紀卓既死當時日月清明㣲風不起宗族老弱悉在郿皆還為其羣下所斫射英雄記五月董卓將李傕郭氾反攻長安六月戊午長安城陷故太尉黃琬司徒王允死之董卓既死牛輔為其麾下所殺李傕等還以輔死衆無所倚仗欲各散歸既無赦書而聞長安中欲盡誅涼州人憂恐不知所為賈詡曰聞長安中議欲盡殺涼州人而諸君棄衆單行即一亭長能束君矣不如率衆而西所在收兵以攻長安為董公報仇幸而事濟奉國家以正天下若不濟走未晚也衆以為然遂將其衆而西所在收兵攻至長安衆十餘萬卓故部將樊稠等合兵圍長安六月戊午長安城陷吕布與戰不勝將數百騎奔冀州傕等入城内殺太常种拂太僕魯猷大鴻臚周奐城門校尉崔烈越騎校尉王順死者數十人司徒王允挾乘輿上宣平城門允謂傕等曰臣無作威作福而乃放兵縱火欲何為乎傕曰董卓忠於陛下而無辜為吕布所殺欲為卓報布不敢為逆甲子殺故太尉黃琬司徒王允及其妻子衆庶為之流涕後漢紀秋九月以馬騰為將軍屯郿董卓入闗召韓遂馬騰以圖山東至會卓死傕等皆以為將遣遂還留騰屯郿綱目興平元年春三月馬騰與李催等戰於長平觀騰敗走侍中馬宇與諫議大夫种邵左中郎將劉範等謀欲使騰襲長安已為内應以誅傕等騰引兵至長平觀宇等謀泄奔槐里稠董卓將樊稠擊騰騰敗走還涼州又攻槐里宇等皆死時三輔民尚數十萬户傕等放兵刼畧攻剽城邑人民饑困二年間相啖食畧盡魏志董卓傳陽按長平坡名上有觀在池宫南去長安五十里秋八月馮翊羌反馮翊羌叛寇屬縣郭氾樊稠擊破之後漢書獻帝紀二年春二月李傕郭氾治兵相攻長安亂二月乙亥李傕殺樊稠而與郭氾相攻三月丙寅傕脅帝幸其營焚宫室後漢書獻帝紀汜與傕轉相疑戰鬬長安中傕質天子於營燒宫殿城門略官寺盡收乘輿服御物置其家傕使公卿詣汜請和汜皆執之相攻擊數月死者萬數魏志董卓傳夏四月李傕移帝幸北塢四月丁酉郭氾攻李傕矢及御前是日李傕移北塢後漢書獻帝紀時帝在南塢傕在北塢流矢中傕左耳乃迎帝幸北塢帝不肯從强之乃行山陽公載記傕將楊奉與傕軍吏宋果等謀殺傕事泄遂將兵叛傕傕衆叛稍衰弱魏志董卓傳秋七月車駕東歸張濟自陜和解之天子乃得出至新豐霸陵間郭氾復脅天子還都郿天子奔奉營奉擊氾破之氾走南山奉及將軍董承以天子還洛陽魏志董卓傳傕氾等鬬長安中傕復請詡為宣義將軍傕等和出天子祐䕶大臣詡有力焉是時將軍段煨屯華隂魏志賈詡傳初天子出到宣平門當度橋氾兵數百人遮橋問是天子邪車不得前傕兵數百人皆持大㦸在乘輿車左右侍中劉艾大呼云是天子也使侍中楊琦髙舉車帷帝言諸兵汝不却何敢迫近至尊邪氾等兵乃却既度橋士衆咸呼萬歳獻帝起居注八月甲辰幸新豐冬十月戊戌郭氾使其將伍習夜燒所幸學舍逼脅乘輿楊定楊奉與郭氾戰破之壬寅幸華隂露次道南是夜有赤氣貫紫宫張濟復反與李傕郭氾合後漢書獻帝紀建安二年春以鍾繇督闗中諸軍時闗中諸將馬騰韓遂等各擁强兵相與爭太祖方有事山東以闗右為憂乃表繇以侍中守司𨽻校尉持節督闗中諸軍委之以後事特使不拘科制繇至長安移書騰遂等為陳禍福騰遂各遣子入侍鍾繇傳三年夏四月詔闗西諸將討李傕誅之建安三年遣謁者僕射裴茂率闗西諸將誅傕夷三族氾為其將伍習所襲死於郿魏志董卓傳四年冬十一月曹操使治書侍御史衛覬鎮撫闗中太祖征袁紹而劉表為紹援闗中諸將又中立益州牧劉璋與表有隙覬以治書侍御史使益州令璋下兵以綴表軍至長安道路不通覬不得進遂留鎮闗中魏志衛覬傳五年冬十月張魯據漢中劉焉死子璋代立以魯不順盡殺魯母家室魯遂據漢中以鬼道教民自號師君其來學道者初皆名鬼卒受本道已信號祭酒各領部衆多者為治頭大祭酒皆教以誠信不欺詐有病自首其過大都與黃巾相似諸祭酒皆作義舍如今之亭傳又置義米肉懸於義舍行過者量腹取足若過多鬼道輒病之犯法者三原然後乃行刑不置長吏皆以祭酒為治民夷便樂之雄據巴漢垂三十年民有地中得玉印者羣下欲尊魯為漢寧王魯功曹巴西閻圃諫魯曰漢川之民户出十萬財富土沃四面險固上匡天子則為桓文次及竇融不失富貴今承制署置勢足斬斷不煩於王願且不稱勿為禍先魯從之魏志張魯傳十六年春三月韓遂馬超反建安十六年張魯據漢中三月遣鍾繇討之公使淵等出河東與繇會是時闗中諸將疑繇欲自襲馬超遂與韓遂楊秋李堪成宜等叛遣曹仁討之超等屯潼闗公勅諸將闗西兵精悍堅壁勿與戰魏志武帝紀太祖欲遣鍾繇等討張魯柔諫以為今猥遣大兵西有韓遂馬超謂為已舉將相扇動作逆宜先招集三輔三輔茍平漢中可傳檄而定也繇入闗遂超等果反髙柔傳秋七月曹操大破韓遂馬超於渭南超等屯潼闗秋七月公西征與超等夾闗而軍公急持之而潛遣徐晃朱靈等夜渡蒲阪津據河西為營公自潼闗北渡未濟超赴船急戰校尉丁裴因放牛馬以餌賊賊亂取牛馬公乃得渡循河為甬道而南賊退拒渭口公乃多設疑兵潛以舟載兵入渭為浮橋夜分兵結營於渭南賊夜攻營伏兵擊破之超等屯渭南遣使求割河以西請和公不許九月進軍渡渭超等數挑戰又不許因請割地求送任子公用賈詡計偽許之韓遂請與公相見公與遂父同歳孝廉又與遂同時儕輩於是交馬語移時不及軍事但説京都舊故附手歡笑既罷超等問遂公何言遂曰無所言也超等疑之他日公又與遂書多所㸃竄如遂改定者超等愈疑遂公乃與克日會戰先以輕兵挑之戰良久乃縱虎騎夾擊大破之斬成宜李堪等遂超等走涼州楊秋走安定闗中平魏志武帝紀許禇從討韓遂馬超於潼闗太祖將北渡臨濟河先渡兵獨與禇及虎士百餘人留南岸斷後超將步騎萬餘人來奔太祖軍矢下如雨禇白太祖賊來多今兵渡已盡宜去乃扶太祖上船賊戰急軍爭濟船重欲没禇斬攀船者左手舉馬鞍蔽太祖船工為流矢所中死禇右手並沂船乃僅得渡是日㣲禇幾危許禇傳公軍每渡渭輒為超騎所衝突營不得立地又多沙不可築壘婁子伯曰今天寒起沙為城以水灌之可一夜而成公從之乃作縑􅇸以運水夜渡兵作城比明城立由是公軍盡得渡渭曹瞞傳徐奕太祖為司空辟為掾屬從西征馬超超破軍還時闗中新服未安留奕為丞相長史鎮撫西京西京稱其威信轉為雍州刺史徐奕傳十二月曹操留夏侯淵屯長安以張既為京兆尹十月操自長安北征楊秋降十二月操自安定還留夏侯淵屯長安以議郎張既為京兆尹通鑑十七年春以夏侯淵行䕶軍將軍破南山賊降之太祖還鄴以淵行䕶軍將軍督朱靈路招等屯長安擊破南山賊劉雄降其衆魏志夏侯淵傳秋七月夏侯淵破馬超於藍田馬超餘衆屯藍田夏侯淵擊平之魏志武帝紀鄜賊梁興作亂左馮翊鄭渾討平之鄜賊梁興冦掠馮翊諸縣恐懼皆寄治郡下議者以為當移就險阻左馮翊鄭渾曰興等破散藏竄山谷雖有隨者率脅從耳今當廣開降路宣諭威信而保險自守此示弱也乃聚吏民治城郭為守備募民逐賊得其財物婦女十以七賞民大悦皆願捕賊賊失妻子者皆還求降渾責其得他婦女然後還之於是轉相冦盗黨與離散又遣吏民有恩信者分布山谷告諭之出者相繼乃使諸縣長吏各還本治以安集之興將餘衆聚鄜城操使夏侯淵助渾討之斬興餘黨悉平通鑑志按通鑑云鄭渾斬興於郿城而魏云夏侯淵斬興於鄠互異十九年春馬超奔漢中十九年趙衢尹奉等謀討超姜叙起兵鹵城以應之衢等譎説超使出擊叙於後盡殺超妻子超奔漢中還圍祁山叙等急求救諸將議者欲須太祖節度淵曰公在鄴反覆四千里比報叙等必敗非救急也遂行使張郃督步騎五千在前從陳倉狹道入淵自督糧在後郃至渭水上超將氐羌數千逆郃未戰超走郤進軍收超軍器械魏志夏侯淵傳二十年秋七月曹操破漢中冬十一月張魯降二十年三月公西征張魯至陳倉將自武都入氐氐人塞道先遣張郃朱靈等攻破之夏四月公自陳倉以出散闗至河池氐王竇茂衆萬餘人恃險不服五月公攻屠之秋七月公至陽平張魯使弟衛與將楊昻等據陽平闗橫山築城十餘里攻之不能拔乃引軍還賊見大軍退其守備解散公乃宻遣解髙祚等乘險夜襲大破之斬其將楊任進攻衛衛等夜遁魯潰奔巴中公軍入南鄭盡得魯府庫珍寳十一月魯自巴中將其餘衆降封魯及五子皆為列侯十二月公自南鄭還留夏侯淵屯漢中魏志武帝紀武帝承凉州從事及武都降人之辭説張魯易攻陽平城下南北山相逺不可守也信以為然及往臨履不如所聞乃嘆曰他人商度少如人意攻陽平山上諸屯既不時拔士卒傷夷者多武帝意沮便欲拔軍截山而還遣故大將夏侯惇將軍許禇呼山上兵還會前軍未還夜迷惑誤入賊營賊便退散侍中辛毗劉曄等在兵後語惇禇言官兵已據得賊要屯賊已散走猶不信之惇前自見乃還白武帝進兵定之幸而克獲魏名臣奏議魯聞陽平已陷乃奔南山入巴中左右欲悉燒寳貨倉庫魯曰本欲歸命國家而意未逹今之走避鋭鋒非有惡意寳貨倉庫國家之有遂封藏而去太祖入南鄭甚嘉之又以魯本有善意遣人慰喻魯盡將家出太祖逆拜魯鎮南將軍待以客禮封閬中侯張魯傳以趙儼統闗中軍趙儼遷扶風太守太祖徙故韓遂馬超等兵五千餘人使平難將軍殷署等督領以儼為闗中䕶軍盡統諸軍羌虜數來冦害儼率署等追到新平大破之屯田客吕並自稱將軍聚黨據陳倉儼復率署等攻之賊即破滅時被書差千二百兵往助漢中守署督送之行者卒與室家别皆有憂色署發後一日儼慮其有變乃自追至斜谷口人人慰勞又深戒署還宿雍州刺史張既舍署軍復前四十里兵果叛亂未知署吉凶而儼自隨步騎百五十人皆與叛者同部曲或婚姻得此問各驚被甲持兵不復自安儼欲還既等以為今本營已亂一身赴之無益可須定問儼曰雖疑本營與叛者同謀要當聞行者變乃發之又有欲善不能自定宜及猶豫促撫寧之且為之元帥既不能安輯身受禍難命也遂去行三十里止放馬息盡呼所從人喻以成敗慰勵懇切皆慷慨曰死生當隨䕶軍不敢有二前到諸營各召料簡諸姦結叛者八百餘人散在原野惟取其造謀魁率治之餘一不問郡縣所收送皆放遣乃即相率還降儼宻白宜遣將詣大營請舊兵鎮守闗中太祖遣將軍劉柱將二千人當須到乃發遣而事露諸營大駭不可安喻儼謂諸將曰舊兵既少策兵未到是以諸營圖為邪謀若或成變為難不測因其狐疑當令早决遂宣言當差留新兵之温厚者千人鎮守闗中其餘悉遣東便見主者内諸營兵名籍案累重立差别之留者意定與儼同心其當去者亦不敢動一日盡遣上道因使所留千人分布羅落之東兵尋至乃復脅喻並徙千人令相及共東凡所全致二萬餘口魏志趙儼傳二十二年夏四月蜀主進兵漢中法正説蜀主曰曹操一舉而降張魯定漢中不因此勢以圖巴蜀而留夏侯淵張郃屯守身遽北還非其智不逮而力不足也必將内有憂偪故耳今策淵郃才畧不勝國之將帥舉衆往討必可克之克之之日廣農積穀觀釁伺隙上可以傾覆冦敵尊奬王室中可以蠶食雍涼廣拓境土下可以固守要害為持久之計此葢天以與我時不可失也備乃進兵遣張飛馬超呉蘭等屯下辨操遣曹洪拒之通鑑二十三年夏四月蜀主次陽平闗擊張郃等不克建安二十三年先主率諸將進兵漢中分遣將軍吳蘭雷銅等入武都皆為曹公軍所没先主次於陽平闗與淵等相拒蜀志先主傳蜀主屯陽平闗張郃屯廣右蜀攻之不能克急書發兵諸葛亮以問楊洪洪曰漢中益州咽喉存亡之機會若無漢中則無蜀矣此家門之禍也發兵何疑通鑑太祖還鄴留晃與夏侯淵拒蜀兵於陽平備遣陳式等十餘營絶馬鳴閣道晃别征破之賊自投山谷多死者太祖聞甚喜假晃節令曰此閣道漢中之險要咽喉也蜀兵欲斷絶外内以取漢中將軍一舉克奪賊計善之善者也魏志徐晃傳秋九月曹操西征至長安秋七月治兵遂西征漢中九月至長安魏志武帝紀二十四年春正月蜀主擊夏侯淵於定軍山破斬之自陽平南渡沔水緣山稍前於定軍山勢作營淵將兵來爭其地先主命黃忠乘髙鼔譟攻之大破淵軍斬淵蜀志先主傳郭淮從征漢中為淵司馬淵遇害軍中擾擾淮推將軍張郃為軍主諸營乃定其明日蜀欲渡漢中來攻諸將議衆寡不敵欲依水為陣以拒之淮曰此示弱而不足挫敵非算也不如逺水為陣引而致之半濟而後擊敵可破也既陣敵疑不渡淮遂堅守示無還心以狀聞太祖善之魏志郭淮傳中按華陽國志漢沔陽縣有定軍山北臨沔水三月曹操出斜谷趙雲擊其軍敗之夏五月蜀主取漢中曹公自長安舉衆南征先主遥策之曰曹公雖來無能為也我必有漢川矣及曹公至先主斂衆拒險終不交鋒蜀志先主傳夏侯淵敗曹公爭漢中地運米北山下數千萬囊黃忠以為可取雲兵隨忠取米忠過期不還雲將數十騎輕行出圍迎視忠等值曹公揚兵大出雲為公前鋒所擊方戰其大衆至勢逼遂前突其陣且鬬且却公軍散已復合雲陷敵還趣圍將張著被創雲復馳馬還營迎著公軍追至圍此時沔陽長張翼在雲圍内翼欲閉門拒守而雲入營更大開門偃旗息鼔公軍疑雲有伏兵引去雲擂鼓震天惟以戎弩於後射公軍公軍驚駭自相蹂踐墮漢水中死者甚多先主明旦自來至雲圍視昨戰處曰子龍一身都是膽也作樂飲宴至暝軍中號雲為虎威將軍趙雲别傳操與蜀相守積月魏軍士多亡夏五月操悉出漢中諸軍還長安蜀主遂有漢中通鑑先主欲與曹公爭漢中問羣羣曰當得其地不得其民也若出偏軍必不利當戒慎之時州後部司馬蜀郡張裕亦曉占候而天才過羣諫先主曰不可爭漢中軍必不利先主竟不用裕言果得地而不得民也周羣傳秋七月蜀主自立為漢中王以魏延鎮漢中先主有漢中羣下上先主為漢中王遂於沔陽設壇塲陳兵列衆羣臣陪位讀奏訖御王冠於先主先主上言漢帝上還所假左將軍宜城亭侯印綬拔魏延為都督鎮漢中蜀志先主傳先主為漢中王當得重將以鎮漢州乃拔延為鎮逺將軍領漢中太守一軍皆驚先主大會羣臣問延曰今委卿以重任卿居之欲云何延對曰若曹操舉天下而來請為大王拒之偏將十萬之衆至請為大王吞之先主稱善衆咸壯其言蜀志魏延傳蜀漢按三國紛爭土宇割裂獻帝未廢之先雖王綱不振猶奉正朔故得秉筆而書之迨山陽就封而正朔蔑行矣紫陽綱目繼絶筆於獲麟乃以蜀係之正統葢為天下萬世而作也至陜志所以紀陜事當日蜀魏分據其地即因事以紀年不敢妄擬綱目亦紀實也至於兩國交搆雖因地分紀而年號則仍兩存之以便考訂後悉倣此例後主建興五年魏明帝太和元年春三月丞相亮出屯漢中丞相亮出屯漢中營沔北陽平石馬蜀志後主傳趙雲遷鎮東將軍建興五年隨諸葛亮駐漢中趙雲傳亮屯於陽平遣魏延諸將並兵東下亮惟留萬人守城晉宣帝率二十萬衆拒亮而與延軍錯道徑至前當亮六十里所偵候白宣帝説亮在城中兵少力弱亮亦知宣帝垂至已與相偪欲前赴延軍相去又逺回迹反追勢不相及將士失色莫知其計亮意氣自若勅軍中皆臥旗息鼓不得妄出菴幔又令大開四城門掃地却灑宣帝嘗謂亮持重而猥見勢弱疑其有伏兵於是引軍北趣山明日食時亮對參佐拊手大笑曰司馬懿必謂吾怯將有彊伏循山走矣候邏還白如亮所言郭冲三事六年魏太和二年春正月丞相亮由斜谷道伐魏軍敗亮拔西縣而還夏侯楙為安西將軍鎮長安亮於南鄭與羣下計議延曰聞夏侯楙少主壻也怯而無謀今假延精兵五千負糧五千直從褒中出循秦嶺而東當子午而北不過十日可到長安楙聞延奄至必乘船逃走長安中惟有御史京兆太守耳横門邸閣與散民之穀足周食也比東方相合聚尚二十許日而公從斜谷來必足以達如此則一舉而咸陽以西可定矣亮以為此縣危不如安從坦道可以平取隴右十全必克而無虞故不用延計魏畧六年春揚聲由斜谷道取郿使趙雲鄧芝為疑軍據箕谷一統志云箕谷在褒城縣北十五里魏大將軍曹真舉衆拒之亮攻祁山南安天水安定三郡叛魏應亮闗中響震魏明帝西鎮長安命張郃拒亮亮使馬謖督諸軍在前與郃戰於街亭謖違亮節度舉動失宜大為郃所破亮抜西縣西縣今興安州是千餘家還於漢中蜀志諸葛亮傳七年冬十二月築漢樂二城丞相亮徙府營於南山下原上築漢城於沔陽樂城於城固通鑑八年魏太和四年秋八月魏侵漢中丞相亮出次城固九月魏師還曹真以蜀連侵邊境宜遂伐之數道並入可克也帝從其計真當發西討帝親臨送真八月發長安從子午道南入司馬宣王泝漢水當會南鄭諸軍或從斜谷道或從武威入會霖雨三十餘日詔還魏志曹真傳八年秋魏使司馬懿由西城張郃由子午曹真由斜谷欲攻漢中丞相亮待之於城固赤坂赤坂在漢中府洋縣東二十里大雨道絶真等皆還是歳魏延破魏雍州刺史郭淮於陽谿蜀志後主傳夏侯霸字仲權淵為蜀所害霸常切齒欲有報蜀意黃初中為偏將軍子午之役霸召為前鋒進至興勢圍安營在曲谷中蜀人望知其是霸也指下兵攻之霸手戰鹿角間賴救至然後解魏畧十二年魏青龍二年春二月丞相亮由斜谷伐魏初亮勸農講武作木牛流馬運米集斜谷口治邸閣息民休士三年而後用之至是悉衆十萬由斜谷伐魏遣使約呉同時大舉通鑑夏四月丞相亮進軍渭南魏大將軍司馬懿引兵拒之亮悉大衆由斜谷出以流馬運據武功五丈原與司馬宣王對於渭南亮每患糧不繼使已志不伸是以分兵屯田為久住之基耕者雜於渭濵居民之間而百姓安堵軍無私焉蜀志諸葛亮傳青龍二年四月諸葛亮出斜谷屯渭南司馬宣王率諸軍拒之詔宣王但堅壁拒守以挫其鋒彼進不得志退無與戰久停則糧盡擄畧無所獲則必走走而追之以逸待勞全勝之道也魏志明帝紀晉宣帝西屯長安青龍二年亮帥衆十餘萬出斜谷壘於郿之渭水南原天子憂之遣征蜀䕶軍秦朗歩騎二萬受帝節度諸軍欲往渭北以待之帝曰百姓積聚多在渭南此必爭之地也遂引軍而濟背水為壘因謂諸將曰亮若勇者當出武功依山而東若西上五丈原則諸軍無事矣亮果上原將北渡渭帝遣將軍周當屯陽遂以餌之數日亮不動帝曰亮欲爭原而不向陽遂此意可知也遣將軍胡遵雍州刺史郭淮共備陽遂與亮會於積石臨原而陣亮不得進還於五丈原魏畧秋八月丞相亮卒於軍師還魏延作亂斬之亮既屢遣使交書又致巾幗婦人之飾以怒宣王宣王將出戰辛毗杖節奉詔勒宣王及軍吏已下乃止宣王見亮使唯問其寢食及其事之煩簡不問戎事使對曰諸葛公夙興夜寐罰二十以上皆親覽焉所啖食不過數升宣王曰亮體憊矣其能久乎魏氏春秋晉陽秋曰有星赤而芒角自東北西南流投於亮營三投再還往大還小俄而亮卒蜀志諸葛亮傳注亮卒於郭氏塢楊儀等整軍而出百姓奔告宣王宣王追焉姜維令儀反旗鳴鼓若將向宣王者宣王乃退不敢偪於是儀結陣而去入谷然後發喪宣王之退也百姓為之諺曰死諸葛走生仲達或以告宣王宣王曰吾能料生不能料死也漢晉春秋亮出北谷口延為前鋒秋亮病因宻與長史楊儀司馬費褘䕶軍姜維等作身殁之後退軍節度令魏延斷後姜維次之若延或不從命軍便自發亮適卒秘不發喪儀令褘往揣延意指延曰丞相雖亡吾自見在府親官屬便可將喪還葬吾自當率諸軍擊賊云何以一人死廢天下之事耶且魏延何人當為楊儀所部勒作斷後將乎因與褘共作行留部分令褘手書與已連名告下諸將褘紿延曰當為君還解楊長史長史文吏稀更軍事必不違命也褘出門馳馬而去延尋悔追之已不及矣延遣人覘儀等遂使欲案亮成規諸營相次引軍還延大怒纔儀未發率所領徑先南歸所過燒絶閣道延儀各相表叛逆一日之中羽檄交至後主以問侍中董允留府長史蔣琬琬允咸保儀疑延儀等槎山通道晝夜兼行亦繼延後延先至據南谷口遣兵逆擊儀等儀等令何平在前禦延平叱延先登曰公亡身尚未寒汝輩何敢乃爾延士衆知曲在延莫為用命軍皆散延獨與其子數人逃往奔漢中儀遣馬岱追斬之魏延傳外按何平即王平本傳平少養家何氏後復姓王將軍呉壹屯漢口以左將軍吳壹為車騎將軍假節督漢中蜀志後主傳延熙元年冬十二月大將軍蔣琬屯漢中延熙元年詔琬曰冦難未弭曹叡驕凶遼東三郡苦其暴虐遂相糾結與之離隔叡大興兵役還相攻伐曩秦之亡勝廣首難今有此變斯乃天時君其治嚴總帥諸軍屯住漢中須呉舉動東西掎角以乘其釁又命琬開府明年就加為大司馬蜀志蔣琬傳六年冬十月遣前監軍王平督漢中六年琬還住涪拜平前監軍鎮北大將軍統漢中蜀志王平傳七年魏邵陵厲公正始五年春三月魏曹爽攻漢中閏月費褘督諸軍救之五月魏軍退走七年春魏大將軍曹爽率歩騎十餘萬向漢川前鋒已在駱谷在盩厔縣西南一百二十里時漢中守兵不滿三百諸將大驚或曰今力不足以拒敵聽當固守漢樂二城遇賊今入比爾間涪軍足得救闗平曰不然漢中去涪垂千里賊若得闗便為禍也今宜先遣劉䕶軍杜參軍據興勢平為後拒若賊分向黃金平率千人下自臨之比爾間涪軍行至此計之上也惟䕶軍劉敏與平意同即便施行蜀志王平傳劉敏與鎮北大將軍王平俱鎮漢中曹爽襲蜀時議者或謂但可守城不出拒敵必自引退敏以為男女布野農穀栖畝若聽敵入則大事去矣遂帥所領與平據興勢多張旗幟彌亘百餘里會大將軍費褘從成都至魏軍即退敏以功封雲亭侯蔣琬傳附魏軍次於興勢假褘節率衆往禦之光禄大夫來敏至褘許别求共圍碁于時羽檄交馳人馬擐甲嚴駕已訖褘與敏留意對戯色無厭倦敏曰向聊觀試君耳君信可人必能辦賊者也褘至敵遂退費褘傳是時闗中及氐羌轉輸不能供牛馬騾驢多死民夷號泣道路入谷行數百里賊因山為固兵不得進爽參軍楊偉為爽陳形勢宜急還不然將敗爽乃引軍還魏志曹爽傳司馬宣王謂夏侯𤣥曰昔武皇帝再入漢中幾至大敗君所知也今興平路勢至險蜀已先據若進不獲戰退見徼絶覆軍必矣將何以任其責𤣥懼言於爽引軍退費褘進兵據三嶺以截爽爽爭險苦戰僅乃得過所發牛馬運轉者死失畧盡羌胡怨嘆而闗右悉虚耗矣魏畧十一年夏五月大將軍費褘屯漢中褘出住漢中自琬及褘雖身居於外慶賞刑威皆遥先諮斷然後乃行褘雅性謙素當國功名畧與琬比通鑑景耀元年十二月詔漢中兵屯漢壽守漢樂二城景耀元年維復拜大將軍初先主留魏延鎮漢中皆實兵諸圍以禦外敵敵若來攻使不得入及興勢之役王平捍拒曹爽皆承此制維建議以為錯守諸圍雖合周易重門之義然適可禦敵不獲大利不若使聞敵至諸圍皆斂兵聚穀退就漢樂二城使敵不得入平日重闗鎮守以捍之有事之日令遊軍並進以伺其虚敵攻闗不克野無散穀千里縣糧自然疲乏引退之日然後諸城並出與遊軍並力搏之此殄敵之術也於是令督漢中胡濟却住漢壽監軍王含守樂城䕶軍蔣斌守漢城又於西安建威武衛石門武城建昌臨逺皆立圍守蜀志姜維傳炎興元年魏陳留王景元四年秋魏遣鄧艾鍾會入冦漢中守將傅僉死之四年秋下詔使鄧艾諸葛緒各統諸軍三萬餘人艾趣甘松沓中連綴維緒趣武街橋頭絶維歸路會統十餘萬衆分從斜谷駱谷入先命牙門將許儀在前治道會在後行而橋穿馬足陷於是斬儀儀者許褚之子有功王室猶不原貸諸軍聞之莫不震竦蜀令諸圍皆不得戰退還漢樂二城守魏興太守劉欽趨子午谷諸軍數道平行至漢中蜀監軍王含守樂城䕶軍蔣斌守漢城兵各五千會使護軍荀愷前將軍李輔各統萬人愷圍漢城輔圍樂城會徑過西出陽安口遣人祭諸葛亮之墓使䕶軍胡烈等行前攻破闗城得藏庫積穀姜維欲赴闗城未到聞其已破退趨白水與蜀將張翼廖化等合守劒閣拒會魏志鍾會傳鍾會將向駱谷鄧艾將向沓中然後乃遣右車騎廖化詣沓中為維援左車騎張翼輔國大將軍董厥等詣陽安闗口以為諸圍外助比至隂平聞魏將諸葛緒向建威故住待之月餘維為鄧艾所摧還住隂平鍾會攻圍漢樂二城遣别將進攻闗口蔣舒開城出降傅僉格鬭而死蜀志姜維傳蔣舒將出降乃詭謂傅僉曰今賊至不擊而閉城自守非良圖也僉曰受命保城惟全為功今違命出戰若喪師負國死無益矣舒曰子以保城獲全為功我以出戰克敵為功請各行其志遂率衆出僉謂其戰也至隂平以降胡烈烈乘虚襲城僉格鬭而死魏人義之漢晉春秋魏明帝太和二年蜀後主建興六年春三月使將軍郝昭守陳倉曹真以亮懲於祁山後出必從陳倉使將軍郝昭王生守陳倉治其城魏志曹真傳冬十二月諸葛亮攻陳倉不克六年冬亮復出散闗圍陳倉曹真拒之亮糧盡而還魏將王雙率軍追亮亮與戰破之蜀志亮傳先是使將軍郝昭築陳倉城會亮至圍昭不能抜昭為人雄壯亮使昭鄉人靳詳於城外遥説之昭於樓上應詳曰魏家科法卿所練也我之為人卿所知也我受國恩多而門户重卿無可言者但有死耳卿還謝諸葛便可攻也詳以昭語告亮亮又使詳重説昭言人兵不敵無為空自破滅昭謂詳曰前言已定矣我識卿耳箭不識也詳乃去亮自以有衆數萬而昭兵纔千餘人又度東救未能便到乃進兵攻昭起雲梯衝車以臨城昭以火箭逆射其雲梯梯然梯上人皆燒死又以䋲連石磨壓其衝車衝車折亮乃更為井闌百尺以射城中以土瓦填塹欲直攀城昭又於内築重墻亮又為地突欲踊出於城裏昭又於城内穿地橫截之晝夜相攻拒二十餘日亮無計救至引退詔嘉昭善守賜爵列侯魏畧五年蜀建興九年春二月使司馬懿屯長安漢丞相亮帥諸軍入冦於是大司馬曹真有疾帝命司馬懿西屯長安督將軍張郃費曜戴凌郭淮等以禦之通鑑邵陵厲公嘉平元年蜀延熙十二年秋蜀姜維冦雍州不克陳泰代郭淮為雍州刺史姜維率衆依麴山築二城使牙門將句安李歆守之聚羌胡質任等冦逼諸郡征西將軍郭淮使泰率討蜀䕶軍徐質汝南太守鄧艾等進兵圍之斷其運道及城外流水安等挑戰不許將士困窘分糧聚雪以稽日月維果來救出自牛頭山一統志云牛頭山在漢中府褒城縣西北二十五里以形似名與泰相對泰勅諸軍各堅壘勿與戰遣使白淮使趣牛頭山截其歸路淮善其策進率諸軍軍洮水維懼遁去安等孤縣遂皆降魏志陳群傳附髙貴鄉公甘露二年蜀延熙二十年夏六月姜維來侵大將軍司馬望拒之二十年魏征東大將軍諸葛誕反於淮南分闗中兵東下維欲乘虚向秦川復率數萬人出駱谷徑至沈嶺時長城積穀甚多而守兵乃少聞維方到衆皆惶懼魏大將軍司馬望拒之鄧艾亦自隴右皆軍於長城維前住芒水背倚山為營望艾傍渭堅圍維數下挑戰望艾不應蜀志姜維傳山按水經注芒水出南芒谷陳留王咸熙元年春正月車駕如長安正月甲子行幸長安壬申使使者以璧幣祀華山魏志陳留王紀陜西通志巻七十七
