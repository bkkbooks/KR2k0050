才圖㑹太白山常積雪望之皎然上有洞道書第十一洞天潜確類書逹摩洞在縣東南四十里太白山下雲庵之後金時雲庵和尚隱此明山人孫太初亦隱此洞刻逹摩像其石剖之有松栢文人呼為栢朶石俗傳為逹摩傳法神光處今洞北道傍有雲庵和尚塔銘郿縣志鍾吕坪在縣東南五十里南山内小山不甚髙而頂寛平俗傳鍾吕傳道於此其相近有湯峪峪内有金錢石其形上大如房屋下小如碾盤傍臨深淵用手揺之即動視之隱然有金錢鳳翔府志三官池按太白山舊圖在山麓稍東自清湫廟廟在縣東二十五里至此三十三里池水清澈禱雨者多取水于此以山髙不易到也大雪巖按圖在三官池西南自三官池上至此二十里穿林涉潦有雷神洞再入有朝陽洞二仙橋龍盤山西望香烟山為大士佛地萬笏山按圖在大雪巖南自大雪巖上至此三十里初名石壘山以衆峰排矗如萬笏改今名又過水七十餘處十里至石壘山頂一峰挺秀拔萃羣峰之中名曰獨秀峰黑風嶺按圖在獨秀峰東南自獨秀峰上至此十五里一名神會夭坡皆黄土自六月朔至月終霧撤山顯曰開山其先後為霧雪所塞曰封山山中狼虎虺蟒熊羆之屬最夥人罕至者松花坪按圖在黑風嶺西南自黑風嶺上至此二十里蒼松數萬叢欝森列登此坪甚險下有水簾洞景極佳二仙山按圖在松花坪西南自松花坪至此二十里山有二石如人其下有下坂寺又十里至望仙石救苦嶺按圖在二仙山東南自望仙石至此二十里險峻益甚又十里至上坂寺人行亂石間䃕确相錯又三里至寒風關神窪按圖在救苦嶺西南自寒風關至此二十里皆直上如縁墻壁土人言太白常放異光現神像或星光如斗大至此鳥獸草木甚稀境凛冽不可處又三里至魔女嶺又三里至東天門冲天嶺按圖在神窪東南自東天門上至此四里有雷神峽皆陡絶下視多股栗分天嶺按圖在冲天嶺西南自冲天嶺至此五里西風起則山東向陽頗熱山西面風雖大暑若祁寒一山之間暄寒頓異故名孤魂窪按圖在分天嶺西自分天嶺至此五里徑既險峭風復凄寒人行嶺上風起必伏若起則吹墮如葉矣更有觀雲海處極佳宇宙茫然雲如叠絮在海中窪之上有三山九牙十二重樓諸勝髙挿碧空又十八里至二里關又里許至金鎖關鳥獸草木絶無矣山勢森羅石貌有若人拱立者行相揖者坐相戲者竒獸卧者鼎彛列者大太白池按圖在孤魂窪西南自金鎖關至此里許池廣三十餘畝清鑒毛髪無寸草㸃塵亦無他水族惟龍潜焉池面常放五色光萬字光夀字光珠光油光各肖其𩔖人䖍叩則應否則無池為雲霧籠􅇁不常見曰封池禱而後見曰開池餘六池皆然雷神池按圖在大太白池東南自大太白池上至此三里池在洞中有亘古凝氷洞上有石塔名觀星樓又有龍鳳二小池二太白池按圖在大太白池西南自大太白池過稻地窪至此十里池大數畝又五里至三太白池大亦數畝其傍不可久憇久則雷電疾至玉皇池按圖在大太白池東南自三太白池至此十里大二十餘畝其東為龍門有龍可見又上有走馬嶺相傳為山神乘馬處石上蹄跡宛然佛池按圖在玉皇池西自玉皇池至此十里大數畝又五里有三清池池傍金背枇杷甚多擷其葉可療百病諸池皆神所司凡禱者以黄楮投之誠則楮沉若有掣入者否則楮浮自清湫廟上至三清池共計二百九十里賈鉝太白山禱雨記武功山在太白山南即古垂山今呼為嶅山賈志武功縣東有垂山古文以為惇物漢書地理志武功縣有武功山九域志太白武功二山在郿縣蓋舊武功縣地雍大記楓木凹即武功東界自凹十五里許至迎仙橋橋北為圖坪庵一名小桃源又十五里有葛仙壇白鶴峰在葛仙壇上雲雨皆出其下白鶴仙居之武功水發源其巔相傳為葛仙煉丹池雷崖在煉丹池西北遊者必絙掖而升人或䙝之即迅霆霾曀故名雷崖上有數十洞恍惚有人居其中可望而不可即蓋葛仙藏書處又其阻有齊雲山山徑亦澁惟獵者時入焉三才圖會瓦窰山在太白山西其相近有駝羊峰郿縣志四嘴山在太白山北其上有仰天池鳳翔府志山巒若叠障迤􅆔凌髙比登太白峰則俯瞰若岡阜矣郿縣志之按太白山陽為洋縣境如洋縣之石柱青山神明琉璃寒泉宋軍華陽福仁女冠金紫三嶺南岐諸山合之皆太白也詳見洋縣程大昌雍録曰西域傳云于闐南山東出金城與漢南山屬數千里未嘗間斷故李吉甫在元和間核關中終南山所厯而著諸郡縣自鄠郿武功以至長安萬年每縣皆著終南又曰終南既髙且廣多産百物故禹貢曰終南惇物也不當别有一山名惇物也武功縣有太一山垂山漢志引古文而曰太一者終南也垂山者惇物也則是各為一山不知其何所本王應麟通釋曰西京賦以終南太一並列唐六典又以終南太白並列明非一山蓋終南南山之總名太一太白此山之别號胡渭禹貢錐指曰古終南止于盩厔自秦徙都于汧國人作詩以終南起興終南逺接岍岐蓋自此始漢人又以都南之山為秦嶺而終南則以武功之太一當之殊不可曉按西征賦注太一明與終南别山竊意太一垂山皆禹貢之惇物後人改名離為二山耳蓋垂山即太一之北峰也後人又以太一之南為武功其北為太白在禹貢則總為惇物郭景純所謂一實數名者也雍録謂不當别有一山名惇物此臆説也雍録又曰古圖志無言太白即為太一者萬年縣炭谷有太一祠始可命為太一而非武功之太白矣古文謂武功之終南即太一是殆誤認而世人莫或正之耳馬理通志亦曰太一者猶曰天下第一山也今考太乙谷西名五臺山者即太一山也南山秀麗惟此為最夫谷為太乙則山為太一無疑矣按諸説紛紛皆由人多信今疑古致成聚訟竊謂班固秦人寧不知終南之宻邇京兆而必逺以屬之扶風且以杜酈諸人之博核亦貿然皆沿其誤也哉蓋終南一山綿亘雖逺而郿之太白武功獨為峻絶故古有去天三百之諺今觀終南他處崇巖絶巘不可勝數然猶為人跡所可至惟太白四時積雪最為髙寒由來罕窮其巔意漢志以為在武功者不過舉最髙者以為指名蓋謂太一本屬終南而非謂終南之果專于太一也即今以終南系之西安又安得謂終南専屬西安哉又武功即垂山古文之惇物今之所謂嶅山也雍録為終南即惇物固屬臆斷而錐指謂太一即垂山亦非確論至若咸寧縣南之五臺有太乙峰太乙谷太乙池皆以古有太乙祠得名即以此命為太一山亦無不可但以漢志之太一即指此則亦曲説耳因終南為秦域重望故特援引衆説附辨於此俟博識者考焉又按終南一山首聯羌隴尾蟠商洛左渭右漢挾二水以分流北雍南梁為兩州之界劃九􅉄岐梁拱揖於其後太華讙舉聳矗於其東兼以䋫道潛通楚豫蝕中直達梁洋灙駱懸車襃斜綰轂類皆由間道以出奇亦可因地形以設險古以關中為天下之脊實以終南為關中之脊也是以豐鎬卜宅文武肇興秦漢於此定都隋唐因之奠鼎皆以其形勝之雄也然而王氣所鍾不常厥邑昔人云在徳不在險諒哉龍門山在韓城導河積石至于龍門書經禹貢山在河東之西界孔傳河下龍門其流駛如竹箭駟馬追弗能及慎子龍門未闢吕梁未鑿河出孟門之上尸子北登龍門九河之磴穆天子傳龍門山在左馮翊夏陽縣北漢書地理志龍門山其西在今韓城縣北其東在今蒲州龍門縣北而河從其中流出顔師古注梁山北有龍門山大禹所鑿通孟津河口廣八十步巖際鐫迹遺功尚存岸上並有廟祠魏土地記河水南出龍門口昔大禹導河積石疏決梁山謂斯處也水經注夏陽縣有龍門山魏書地理志龍門水懸船而行兩傍有山水陸不通龜魚集龍門下數千不得上上則為龍三秦記韓城縣有龍門山唐書地理志龍門山在韓城縣北五十里此河西之山東與壺口隔水相望括地志河水至此山直下千仭其下湍瀾驚波如山如沸兩崖皆斷山絶壁相對如門惟神龍可越故曰龍門名山記禹門禹貢龍門也亦曰禹門渡兩山石立河出其中廣百步世謂禹鑿三才圖㑹龍門山一名崶山形似筆架又名筆架山上多紫荆又名紫荆山自麓達嶺約五里自東徂西約十里衞氏地圖記龍門山即梁山别麓其南俗呼禹王陵在大河中浮於水面望之如沙渚然極衝激不能浸没人謂與河為消長非也蓋禹鑿山時巨石墮中流沉凝固結成坵阜耳韓城縣志龍門在韓城東北廣八十步袤九里三分兩岸斷壁狀盡斧鑿髙者千仭卑者數十百仭出龍門有洲若陵陵咸礫石人云治梁為門之屑也韓城縣舊志觀音洞在龍門山絶頂相傳霹􅋬一震山破崖開觀音及諸羅漢石像自出因就洞築室洞口常有雲氣覆之玉鏡巖在龍門山正東白石嶙峋上凌霄漢河東百里外一望輒見之梯子崖迤槖駞嶺西而北羊腸鳥道逕桑園坡老虎嘴又北里許過攅灘攀崖而上石磴層折謂之梯子崖由龍門登禹閣達金門以至相工坪後之石城率由是道金門由龍門而上六七里又金門之右山半有相工坪廣二丈餘長四丈餘片石臨河瑩潔可愛相傳為大禹督工處鴿子堂在金門西岸半山間削壁屹立懸崖横峙形如帷幔又髣髴梁欐下有石窟廣可五丈髙三倍仰攀無極俯臨無地惟鴿鳥累百棲息其中可望而不可即俗呼為它裏衞氏地圖記胡渭禹貢錐指曰自後魏改漢河東皮氏縣曰龍門縣而龍門之名遂被於東岸故顔師古謂龍門山其西在今韓城縣北其東在今龍門縣北宋改龍門縣曰河津縣縣西北二十五里有龍門山蓋即壺口之南支古時東岸無龍門之名也按禹貢龍門之在夏陽固已嘗考黄河大勢自故勝州東北折而南行至韓城東北則又折而西南以至華陰而龍門自梁山奮矗而來適當其折處蓋與東岸諸山左右夾峙上承孟門之險水道隘僅百步使其奔騰迅瀉之勢束不得舒即今疏鑿之後尚復震盪湍悍悸心駭目則未鑿之先又可想已斯固山川凝結之奇以表神聖平成之績也登眺者念禹功而懷明徳不於此益信哉嶓冢山在寧羌導嶓冢至于荆山書經禹貢漾水出嶓冢在梁州孔傳嶓冢之山漢水出焉而東流注於沔山海經嶓冢今在武都氐道縣南郭璞注嶓冢有二一在天水一在漢中寧羌漢水所出吴任臣注終南太一連岡乎嶓冢張衡西京賦跨平原而連嶓冢潘岳西征賦漾水東源出武都氐道縣漾山華陽國志漢中金牛縣嶓冡山禹導漾水東流為漢水通典山南道名山曰嶓冢唐六典嶓冡以東水皆東流嶓冡以西水皆西流故俗以嶓冡為分水嶺漢中記嶓冡山在寧羌州北九十里其相連者為漢王山漢中府志五丁山在寧羌州東北四十里有峽曰金牛峽一名五丁峽賈志秦獻美女於蜀王使五丁迎女見一大蛇入山穴中五丁引蛇山崩五女皆上山化為石蜀王本記秦惠王欲伐蜀而不知道作五石牛以金置尾下言能屎金蜀王負力令五丁引之成道秦尋路滅蜀因曰石牛道水經注金牛峽在沔縣西南百七十里雍大記山下有通秦鄉古稱蜀道之最險者峽南兩崖峙立懸兩大石東崖為石鼓西崖為石鐘明𢎞治中知州張簡常修鑿之寧羌州志禹貢錐指曰山海經云漢水出鮒嵎山蓋嶓冡之異名也本在漢中郡沔陽縣界後魏析沔縣置嶓冡縣故地形志云其縣有嶓冡山隋改置西縣故隋志云西縣有嶓冡山唐分置金牛縣而山入其境故括地志云嶓冡在金牛縣東二十八里後又分置三泉縣又省金牛入三泉故寰宇記云嶓冡在三泉縣東宋升三泉縣為大安軍又改建軍於西縣界復置三泉縣𨽻軍故輿地紀勝引宋朝郡縣志云今之言漢水以西縣之嶓冡為源後又省三泉入軍故地理通釋云嶓冡在大安軍西元降軍為縣故大一統志