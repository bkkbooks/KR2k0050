body:
  text: 陜西通志巻八山川一名山圖圖考大川圖圖考奠自鴻濛封濬肇功三山八水流峙稱雄扶輿清淑薈萃關中川環河漢嶽匹岱宗壯哉四塞百二秦封蓐收之野髙深曷窮媚珠輝玉踞虎蟠龍懐柔有道百神效忠作山川志第四謹按古山海經詳於荒服而畧於内地至桑經酈注以水為經即以水所歴之山谷城邑為緯顧世代􅉍逺陵谷變遷即山川之見於史志者尚多不可推究而况名稱錯出傳聞異同必欲援古證今以求其合難矣茲於關中名山大川各繪專圖依今水道溯源迄委支分𣲖合而以所逕之郡邑諸山附見焉不敢蔑古以自是亦不敢泥古以傅會蓋亦竊取桑酈之意也苐圖考提綱挈領其難以櫽括者則皆散見各州縣庶按圖而索可並得其詳云華嶽在華陰八月西巡守至于西岳書經舜典西岳華山蔡氏注西傾朱圉鳥䑕至于太華禹貢括地志云太華在京兆華陰縣南孔疏豫州其山鎮曰華山周禮職方氏華山在今華陰職方氏注僖公十五年晉賂秦河外列城五南及華山左傳華山黄帝之所常遊與神會史記封禪書太華之山削成而四方其髙五千仞其廣十里山海經即西嶽華陰山也今在𢎞農華陰縣西南山形上大下小郭璞注華之為言穫也萬物成熟可得穫也白虎通華者華也萬物滋然變華於西方也風俗通西嶽太華山者當少陰用事萬物生華故曰華山踞中土西偏當七官正位其行配金其辰直酉前對華陽之國後壓華陰之郡左抱桃林之塞右産藍田之玉少昊之下都辱收之别館也唐元宗華山碑畧上元二年改華山曰太山寳應元年復故名唐書地理志洞天記華山名太極總仙之天即少昊為白帝治西嶽上應井宿之精下鎮秦地之分野天中記華山髙崖四合重嶺秀起上有石池北有石鼓父老相傳常有聞其鳴者唐𩔖函華山四州之際東北冀東南豫西南梁西北雍十字分之四隅為四州九域志華山在長安東三百里不知其幾千叠如半天之雲三秦記華山從麓至頂升降迂迴凡三十三里述征記華嶽有三峰直上數千仞基廣而峰峻叠秀迄於嶺表寰宇記華嶽三峰芙蓉明星玉女也方輿勝覽明按芙蓉即蓮花峰星玉女疑是一名即東玉女峰也三峰直上晴霽可觀謂蓮花玉女松檜也華山記上有三峰上接三光中有石池二十八所上應二十八宿懐藴金玉蓄藏風雷為大帝之别宫乃神仙之窟宅也昭文館記華山古文以為惇物括地志華山古之惇物山也髙七千丈周迴二十里雲笈七籖也按尚書孔傳惇物垂山疏云垂山古文以為惇物或别是一山山頂有池生千葉蓮花因名華山名山記以西有少華山故曰太華雍勝畧王元冲登華頂旬餘下云峰頂有池菡蓞盛開傍有破鐵舟焉三水小牘絶按李攀龍記以頂三峯削成四方者為嶽正體其下羣峯衆壑環擁三峯合之皆華山也因将峯谷名目並升嶽次第序列如左玉泉在張超谷口其水色如漿相傳云玉井滲出者清冽而甘服之可去沉疴因置玉泉院有山蓀亭雍勝畧西嶽行宫至雲臺觀十里雲臺觀至玉泉院一里圖書編玉泉院有祠祀希夷先生祠後石洞為先生睡像左畔有山蓀亭踞盤石上佳木四周泉聲泠泠出其下魏光緒記希夷洞側有大石玉泉環流上鐫山蓀亭三大字有樹四株名無憂樹隴蜀餘聞谷口出玉泉院東南上為谷口有崇崖㟧嶂􅉍互虧蔽楊嗣昌記從北南入谷七里又屇一祠謂之石養文母石龕木主存焉水經注兩壁直立如削髙千餘仞谷底濶不盈尺寛者或二三尋谷流轉折隨山約五里許范守己記第一關自玉泉院至關五里圖書編巨石突塞谷口為石門人佝僂上若隧道然是為第一關范守己記玉泉院至五里關往時避兵者就險壘石為關額曰通天第一門三才圖會桃林坪在五里關上山色四圍圖書編蓋取昔放牛桃林義張獻圖記張超谷五里關南為張超谷楊嗣昌記華陰山南有公超市性好道術能作五里霧後漢書張楷傳又稱張超霧市峰麓名勝記一名仙谷以張超結廬改名今石室依然華嶽圖卧仙坪在張超谷内有石室為超蜕骨所樵牧戲其間有飛石来塞其穴峰麓名勝記希夷峽第一關四里至方洞洞石斗厓百尺名希夷峽其上𩔖穴乃其蜕骨所舊有垂鏁可攀以上見骨盛木函色微紅香甚有人竊趾骨去道士憤之斷其鏁自是人不得上都穆記嘉靖末姚直指葬於祠内香櫝下范守己記第二關希夷峽西折四十步為第二關大石中分若斧劈者都穆記石羊城在張超谷西乃黄初平叱石化羊處與兄初起俱仙隱於此又名仙谷名山記算塲蘆花池在張超谷中雍勝畧後魏道士冦謙之洞曉渾天儀曾定天元五紀後隨成公興去棄其餘算籌化為葭荻即成蘆花池述異記壺公石室在嶽西北孤峰上石室可容十餘人有泉東北入霧市谷東谷中即冦謙之算塲西谷中即修羊公石榻峰麓名勝記車箱潭在仙谷内十里雍勝畧華山車箱潭乃第七水府也水府記宋仁宗嵗遣使投玉簡於此崇寧二年封豐潤侯賈志修羊公石榻在嶽西北仙谷中峰麓名勝記甕谷在華山西谷口環抱如甕為商洛逕道桃谷在華山西入谷八里為張果晒經處牛心谷在華山東即楊震敎授生徒處賈志其地多槐稱楊震槐市山間多五色鶩鳥峰麓名勝記文仙谷在華山東吕真君修道處賈志藏馬谷在華山東與黄神谷相近漢武帝求仙有神馬自華山出馬不久留尋之在此谷石龕下故又名藏馬龕東北澗中石上馬跡尚存雍勝畧黄神谷在華山東真人黄蘆子隱居處賈志黄龍潭在黄神谷内旱則禱焉宋封廣潤侯華陰縣志種藥坪道士王暉魏時人居華嶽熊牢嶺常種黄精於溪畔虎豹為之耕耘因名其坪真仙通鑑娑羅坪自希夷峽至娑羅坪半里圖書編第二關行三里至娑羅坪土曠而夷都穆記有桫羅菴菴外東面石壁可數十丈鳴瀑掛壁而下三才圖會山至是兩壁各縮約十餘丈谷滸寛平如几有祠遊者過此祈禱范守己記有莎羅樹一本蓋即菩提樹文翔鳳記曲按自谷口至娑羅坪尚屬山麓地多幽壑澗凡張超谷以下皆環繞於坪之左右者也上方峰娑羅坪東對小上方又上為大上方深洞偃松尋途阻絶楊嗣昌記洞天坪即娑羅坪其東絶巘處為上方峰突面攀鏁險不可視非登嶽要路華嶽圖上方白雲宫中方太清宫下方雲臺宫皆在娑羅坪東峰上因羽人焦道廣建雍勝畧甕肚峰在華山中方上又有駕鶴軒在中方半路賈志山突起如半甕明皇嘉其髙迥欲於峰腹大鑿開元二字填以白石令百餘里皆見諫官諫乃止唐開元記西元門上方峰攀鏁盡處有石罅號西元門此峰唐金仙公主駕鶴昇仙處門則元宗覔金仙而鑿者也王履記第四華山西元洞周迴三十里名極真洞天乃長春之境十大洞天記八仙洞在娑羅坪西洞面崖石壁立每尺許即鑿為小坎險不可上都穆記繫馬峰娑羅坪北望山頭有石如柱名繫馬峰十八盤踰娑羅坪至十八盤山最陡者十有八折乃得上故名三才圖會坪之上為盤最下三盤曰斗三盤楊嗣昌記逆十八盤而上孤危錯落山猶左右截也李之椿記青柯坪自希夷峽至青柯坪十里圖書編在十八盤之上有青柯館遊者至此舍輿易裝雍勝畧至此山恰半入山来悉﨑嶔側塞夷者惟此王履記坪在西峰下迴陀曲磴浮蒼㸃黛疏宻如柯葉楊嗣昌記坪東懸巖上鑱青柯坪三大字范守己記里按自雲臺觀一里至玉泉院又五至第一關又四里至希夷峽又十里至青柯坪計二十里當山之半凡上方以下皆環繞於坪之左右者也北斗坪青柯坪西有峰挿天名北斗坪蓋四毛女拜斗得仙之地華嶽圖北斗坪儼樹繡屏兩山虚處平田萬頃李之椿記寥陽洞青柯坪右為寥陽洞都穆記洞旁架木為祠迤北皆石崖壁立范守己記囘心石從青柯坪左上里許至囘心石圖書編東南路皆斜削絶壁攀鐵鏁自此始遊者畏險輒還故曰囘心喬宇記卧石塞道中隆旁殺俯瞰斷崖千尺都穆記千尺㠉在青柯坪東上三里許圖書編南至天井裁容人穴空迂迴傾曲而上可髙六丈餘上者皆所由涉更無别路欲出井望空視明如在室窺窻也水經注絶壁中裂兩旁稍鑿横木承足凡千尺云三才圖會一峰直立劃焉中崩如鋸曳痕左偃右覆人自壁中行濶尺許髙百餘尋范守己記形如槽櫪持金繩探石竇以上或時晦暝疑在䑕穴木空也楊嗣昌記百尺峽在㠉上東北轉一里許圖書編東上百丈崖升降皆須攀繩挽葛而行水經注峽如㠉而縮險與㠉稱華嶽圖峰如前而殺亦中崩夾壁益狹兩腋摩壁石以行上有塊石撑之若恐其復合者范守己記雲頭石盤百尺峽頂有巨石如雲題雲頭石三字呉同春記出峽登望仙臺方丈平石可佇立逺眺三才圖會二仙橋百尺峽東北行二里許面崖執鏁足踏木棧以漸東移横行百步曰仙人橋喬宇記橋當山曲徑術中斷金橛貫石骨中架棧懸度楊嗣昌記俯渭崖過二仙橋龍背石又數轉髙崖傍踞坐見渭水題俯渭崖三字於上呉同春記車箱崖在二仙橋西崖如車箱人縁輪以行三才圖會車箱谷西一石長數丈髙數尺平如切而有横理似箱中之板楊嗣昌記猢猻愁自仙人橋東北行里許攀行六十步曰猢猻愁喬宇記崖壁竒峭上有鐵猿顰踞崖畔三才圖會石坎數十捫壁横度魏光緒記老君犁溝在峽上五里許有山如礪中有溝如犁闢然鑿石牽挽而上華嶽圖自閻王峽行二里許攀行七八十步曰犁溝圖書編石壁挿天若剗若削水霤一道自上而下直若引繩深若發耜范守己記犁險於㠉㠉暗而犁突李之椿記一云離垢謂老君登華離却塵垢云三才圖會雲臺峰自犁溝又行四里許至雲臺峰圖書編兩峰崢嶸四面懸絶上冠景雲下通地脉嶷然獨秀有若雲臺下有穴昔有人入此東去云經黄河底上聞流水聲雍勝畧循嶺而北二十餘步有坊曰雲臺峰第一門又五十餘步有坊曰白雲仙境又北復數百步為峰頂廣袤三丈許平衍如掌新構倚雲亭峰東有良掌諸峰范守己記玉女窓在雲臺南峰上有石門入丈餘直上石窰如窓望見南峰明星玉女之别館也峰麓名勝記神土巖在雲臺峰東南百步周武帝時道士焦道廣居雲臺峰帝親問道因於谷口置雲臺觀道廣欲構房廊精思所感石上湧出神土用盡復生於今尚然雍勝畧仙油􅜐在雲臺峰壁中焦道廣每設醮天降油於此後道廣乗麟去油不復見試鑿穴在雲臺北峰北面髙百尺深不測穴邊一石如鑿狀乃希夷先生蜕骨所峰麓名勝記公主峰與雲臺峰相近漢南陽公主避王莽亂入山得仙有朱履遺跡述異記長春石室在雲臺峰側貞觀中有道士杜懐謙居此自號長春先生峰麓名勝記竇谷在華山東即王遥隱居處賈志王刁三洞在華山東竇谷中仙人王遥刁自然登仙處上洞莫能到中洞有飛石遮洞門下洞隱居者皆在其中雍勝畧碧雲洞與王刁三洞相近下為碧雲溪宋有鄭雲叟翟士端鄭明處羅隱之居此時稱四髙士居峰麓名勝記白雲峰在嶽東北唐金仙公主修行之所名曰白雲宫宫側有焦真人石洞峰麓名勝記白雲峰一逕北去狹而長詩所謂嶞山也尖峰聳拔飛雲冉冉羃其上魏光緒記蠟燭峰在白雲峰北稍髙於白雲呉同春記白羊峰在嶽西北五里層崖晃朗洞室空濛昔有人隱此莫知姓名常乘白羊往来因以名峰雍勝畧白羊峰每至三元八節及諸齋日即有神燈或三或五見於崖壁焦公崖在嶽東南真人焦孝龍居此野火焚其菴坐火中徐起常於雪中單衾卧峰麓名勝記毛女峰在嶽西巘賈志秦時宫人字玉姜入山隱此峰上食柏飲水體生緑毛人常見之有毛女洞至今洞中猶聞鼓琴之聲雍勝畧太極總仙洞在嶽西北毛女峰西其下有車箱潭峰麓名勝記第三西嶽華山洞周迴三百里名總仙洞天三十六小洞天記擦耳崖自犁溝東轉至崖路僅容趾下臨絶塹行則崖石擦耳呉同春記從雲臺峰南行數十步東出亂石間崖規若釜植石為杙捫鏁摩石以度范彤弧記仙人碥自雲臺峰南去出第一門半里許循崖東轉而南路不盈尺范守己記鳥道一線足垂二分平臨萬仞范彤弧記閻王碥自猢猻愁又東北行二里許凡攀行十步名閻王碥又攀行三十步名閻王峽喬宇記道隘不盈尺下眡數千仞不辨水石行者度是人鬼關也范守己記日月崖自雲臺峰折而南行三里許至日月崖圖書編崖如斬塊挽鏁而上百餘步名上天梯有日月圏形呉同春記謂兩崖髙起日月出沒從山隙射之當是竒觀三才圖會崖形上大下小無草樹黑黄白相間上有赤白二圓形王履記金天洞在日月崖下南向頗開朗頂泐一隙濶五寸長二三尋天光下照范守己記石腹甚皤髙二丈有疎蹬淺凹以身面壁憑足揣投石上為洞楊嗣昌記三元洞循日月崖西南去復半里許有三元洞東向御道過門王碥行亂石上閻石若連屏直立循屏而度又一石稍濶為坊其上曰升嶽御道蒼龍嶺斜倚御道坊前范守己記御道在仙掌峰北乃升嶽路也漢武帝唐元宗曾由此因名今兩旁有石臼乃當時栽欄纒錦以遮危險者峰麓名勝記而按御道通指蒼龍嶺言其石坊則在嶺北白鹿龕在嶽東升嶽路之右峰麓名勝記魯生女乘白鹿從王母而去故曰白鹿龕漢武内傳蒼龍嶺自日月崖轉西南行三里許是為山脊圖書編至胡趨寺神像有童子之容從祠南歴夾嶺廣裁三尺餘兩箱崖數萬仞窺不見底祀祠有感則雲與之平也然後敢度猶須騎嶺抽身漸以就進故世謂斯嶺為搦嶺水經注列鐵柱閑鏁左右過則坐脊秉鏁漸移而前百步許喬宇記兩旁鐵柱有立有仆舊嘗有欄是漢武帝升山御道也三才圖會古無欄砌今可平視徐步嶺中有墠前後各百餘級合數之得二百四十有六楊嗣昌記嶺凡兩折中隆旁殺如背色正黑王履記嶺盡為龍口冒一大石有鑱曰韓退之投書所説鈴各按華嶽圖青柯坪至峰頂二十里據圖書編及家所記至蒼龍嶺已二十餘里險徑迂曲非有定程又按嶽圖三峰拔起外環巨壑衆峰俱隔壑外止蒼龍嶺一綫可度凡雲臺峰以下皆環列於嶺之前後左右者也鷂子翻身過蒼龍嶺又上行一里許復由深洞以入三十步許轉而上名鷂子翻身圖書編度蒼龍嶺至其巔路忽絶由崖下鑿石折身反度呉同春記八公龕度蒼龍嶺復循髙崖下黄上黑曰八公龕有水泉積雪樹最古者曰將軍樹范彤弧記五將軍樹度嶺見雙樹聳出空際曰將軍樹三才圖會樹有五僅存其四一仍萎大數人圍髙數十仞楊嗣昌記上馬石石嶺如馬脊自東踰石而西若騙馬狀石兩旁如削單人橋過上馬石復一石亘跨嶺際為單人橋范守己記巨石若斧斤所闢范彤弧記通天門單人橋南銜石背而上為通天門楊嗣昌記箭筈通天有一門唐杜甫詩仇池記云石角外向如雉堞唯一門可通杜詩注宗土祠趨雲山崖有宗土祠謂華為羣山之宗也三才圖會過騙馬石度單人橋五龍岡入通天門至宗土地祠則東峰之麓矣呉同春記華嶽有三麓首谷口次青柯坪次宗土地祠為削成四方之下踰之則至三峰説鈴四仙菴近宗土祠有四仙菴為譚紫霄馬丹陽劉海蟾邱長春修煉之所三才圖會細辛坪在頂之西南隅方圓三四畝盡是細辛雍勝畧三峰特起從縣道望之如古司冦冠以其披旉而冶又謂之蓮花峰至洗心坪蓮花之瓣始坼坼於左為東峰中峰坼於右為西峰南峰東峰之頂兩成而頵然於前西峰鋭末其旁多竇南峰凌出兩峰之上尹伸記三峰總為一大峰周十餘里至巔始分三嶺其間有二谿一自細辛坪北直界山頂為二東則東峰及玉女峰西則南峰及蓮花峰也一自玉井東来抵玉女峰下與南谿合直瀉北崖下是為瀑布飛流也太極東元門自細辛坪東過溪口登巨石上有鐵坊曰太極東元門朝陽洞自細辛坪西行百餘步有坪一方北有朝陽洞東南向范守己記洞頗髙曠顔曰迎陽蓋華當少陰迎陽令有生氣三才圖會是按朝陽迎陽應一洞玉女峰東峰左襟下為玉女峰昔有人見玉女乗白馬入峰間華嶽圖明星玉女居華山服玉漿白日上昇集仙録玉女峰在東峰右同阯而異巘范守己記玉女峰偃伏東峰之内若閨閣間許孚逺記玉女峰東北巖努如鳥啄上豐下縮努處小松附巖側曰捨身樹玉女殿在峰頂雪壁爍日玉履記有巨石若龜狀背上疊石為玉女祠范守己記石龜躡在玉女祠下東西八九步南北二十餘丈兩頭壁立其形如龜峰麓名勝記龜腹刳為石室舊有楊妓師事韓姑於此韓肉身猶在三才圖會醴泉在玉女祠旁水微有酒香為國之瑞屢招鳳飲峰麓名勝記玉女洗頭盆祠前度石梁而南一石突兀廣二丈長十餘丈有坎可容五斗水曰玉女洗頭盆范守己記祠前有五石臼水紺碧澄徹不乾不溢又有玉女石馬甚靈異常夜聞嘶噉之聲雍勝畧洗頭盆前石裂可五尺以石投之食頃猶有聲或云下通黄河三才圖會石北泐可五寸其深不測是為唐人進簡處范守己記東峰朝陽峰也名山志東峰岡石斜削可數十丈鑿足跡手援以上三才圖會東峰有三玉女在左石樓在右説鈴三茅洞東峰上有三茅洞前為小殿殿左有崖當東峰盡處三才圖會仙掌崖在東峰東北雍勝畧綴以二華巨靈贔屭髙掌逺蹠以流河曲西京賦眺華嶽之陰崖覿仙掌之遺跡西征賦今華嶽北面有巨靈神掌跡文選注華嶽本一山當河河水過而曲行河神巨靈手盪脚蹋開而為兩今掌足之跡仍存水經注峰有五崖北壑破崖而列自下逺望偶為掌形王涯仙掌辨崖壁黑色石膏自􅪤中流出隨膏凝結黄白相間逺望之見其大者五岐如指三才圖會掌二丈許掌形覆其拇北引如三尋之㦸從縣中望見五指參差出壁上也李攀龍記華嶽掌其石丹紫如人肉色日照則見暮則漸隱賈氏閒談石月在仙掌上華嶽圖上有石月半輪光可鑑名山記衞叔卿博臺在嶽頂東南隅别一孤峰上遥望有石方如屏榻真若棋局雍勝畧秦昭王令工施鈎梯而上華山以節柏之心為博箭長八尺碁長八寸而勒之曰王與天神博於此韓非子東峰南下有小峰平頂當嶽峰之胸上有鐵瓦亭一區鐵碁一枰為衞叔卿圍碁處路由懸崖鐵鏁直縋約十餘丈鏁盡蹠崖自度﨑嶇九折乃至其所范守己記老君碁石方徑五尺三十二子鐵為之重不可舉三才圖會石樓峰髙於玉女其東壁則為仙人掌名山記己按至宗土祠抵玉女峰下自玉女西麓西南去三里許至細辛坪有溪直界乃東峰與西南二峰分界處升嶽者度溪至東元門必先登玉女故以東峰次玉女後而玉女祠諸勝則附玉女三茅洞諸勝則附東峰也西峰曰蓮花峰一曰芙蓉峰雍勝畧蓮花峰為太上山迴巒四合三峰崢嶸上廣十里昭文館記西峰東面窊隆如蓮花所謂西嶽蓮花峰也王履記西峰最幽奥有石葉如蓮瓣覆崖巔下有石龜却立昂首如欲行蓋葉上是即所謂蓮花峰袁宏道記從雲臺望東西二峰上分下合若並蒂蓮花南峰藏其間如蓮房名山記西峰之頂缺空丈許有大石蓋覆於上喬宇記西峰有三石樓在前老君爐在後石樓峰與東峰石樓相對乃白帝建鐘鼓之所説鈴鎮嶽宫在三峰中央又有玉井樓雍勝畧鎮嶽宫在蓮花峰頂倚崖而構今亡范守己記鎮按三才圖西嶽大殿東折而下為嶽宫李攀龍記削成上四方顧其中汙也上宫在汙中西北蓋三峰踞東西南三面其北面空處所謂中汙也宫在其間不在峰頂巨靈足跡在西峰頂華嶽圖跡在石嶺上長三尺許深一寸許儼然踵趾痕范守己記岡上深可三寸旁鐫巨靈足三字王履記神香子斧劈石長十數丈浮置峰頂斬然斷而為三其北若夾壁上有覆石其下若門裁可容人石西下臨深壑五千仞石東亦􅈝削直至谿底范守己記石罅二尺直下相傳神香子斧劈之三才圖會玉井在蓮花峰旁雍勝畧太華峰頭玉井蓮花開十丈藕如船唐韓愈詩記云井中生千葉白蓮服之令人羽化韓詩注深可十丈圓徑半之三才圖會玉井涓渫異常泉敝宇覆之左方為鎮嶽宫右上即南峰路楊嗣昌記或曰谷口玉泉即玉井所注許孚逺記二十八宿潭在玉井旁華嶽圖峰之下有石窪如臼凡二十有八上應列宿自北而南如貫珠自崖端挂下山腹水簾洞洩之三才圖會列宿潭石竇欹圓可見者裁六七潭在南峰之足注西峰水簾蓋入蓮華之腹而行其腎腸楊嗣昌記八卦池太乙池俱在嶽頂蓮花峰上峰麓名勝記石仙人水簾洞在嶽北面半腹中雍勝畧洞深三百里中有瑶臺玉室石髓金精遥望方圓可丈餘鳥道絶通時出異色雲氣洞口上有丹石間青石似丹青畫出仙人之狀冠帔衣服無不周備號曰石仙人上有瀑布飛流直下三千餘丈登真隱訣洞在西峰之腰正臨削壁諺名老君臍玉井出西峰滙二十四潭奔注兩峰間懸瀑數千仞至洞口下有丹石承之泉倒灌入洞伏而不見至青柯坪於石隙中如珠簾散布而出流行成澗出谷口入渭范彤弧記嶽有四洞東曰昭陽西曰西元南曰正陽北曰水簾洞元石室在頂之西北峰上東西有二門初裁容身側入至室中周迴五六丈有石道君像髙三丈峰麓名勝記一名裴君石室真人裴君入石室精思至道積二十三年降五龍元老之所名山記肥􅖆穴在頂之西北峰上峰麓名勝記太華山有蛇焉名肥􅖆六足四翼見則大旱山海經屈嶺自上宫東北出四百五十步有屈嶺水經注西峰有一臂詰曲如蒼龍嶺廣倍之名曰屈嶺度嶺徑巨壑四五乃至南峰説鈴老君煉丹爐在蓮花峰北古柏宛有道意李之椿記石爐徑丈餘髙可六尺三才圖會南峰西為老君煉丹爐魏光緖記捨身崖西峰北上為西嶽大殿殿之北為捨身崖三才圖會谿按玉井白蓮自古著稱有自玉井東至玉女峰北注乃西峰與南峰分界處南峰獨髙西峰最竒其三峰統稱蓮花實由西峰得名也凡玉井諸勝俱附西峰之後朝来峰松檜峰玉柱峰玉秀峰此四峰上盡青松檜柏常有異雲覆之人跡罕到峰麓名勝記山按朝来即竇谷之松檜乃南峰之一玉柱玉秀應在西峰西壑之外南峰即落雁峰也峰端石色平滿堅固如古佛頂楊嗣昌記李白登華山落雁峰曰此山最髙呼吸之氣想通帝座恨不攜謝眺驚人語来搔首問青天耳唐語林計縣中所見如冠形者中峰隱約與東西峰相對南峰為西峰所障躡松檜峰始識其面絶其巔而後見東西峰之在下也尹伸記南峰踞兩峰上如人危坐雙引其膝袁宏道記南峰有三落雁在東寳旭在西説鈴南峰五岐並起如掌中落雁峰東松檜峰又東為賀老石室西則老君丹爐其一未有名或曰寳旭魏光緒記按南峰以落雁為中峰説鈴似非南峰東下瞰玉女祠歴少辛坪細辛坪一名少辛坪至東峰之頂西下瞰巨靈跡歴煉丹臺至西峰之頂白帝祠在松檜峰襟帶間楊嗣昌記中峰五鼓觀日出東際赤爍如金初見半輪忽全露大莫能狀彩色映峰巔峰下猶闇如夜經六刻許漸别下色東海如在几席間呉同春記黑龍潭在頂之南峰上旱禱必應宋崇寧二年封顯潤侯峰麓名勝記潭有三深淺不等深者不過二三尺雖大旱不涸王履記龍在則水黑去則水清華之頂門水也説鈴菖蒲池在太上泉旁池有菖蒲一寸九節雍勝畧届山頂上方七里靈泉二所一名蒲池西流注於澗一名太上泉東注澗下水經注頂上者名蒲池東偏者名太上泉水青緑作瑟瑟光俗謂之仰天池楊嗣昌記太上泉在老君洞次北老君洞在頂之東南峰峰麓名勝記朝元洞南峰南面上下壁削鑱壁成堮疊石置闌窽石以入深可四丈廣近之髙又倍焉純白如雪昔賀老營此四十年王履記自迎陽洞上之為雷神洞