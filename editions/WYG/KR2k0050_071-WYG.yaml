body:
  text: 陜西通志巻七十一陵墓二延安府膚施縣晉夏主赫連勃勃墓在城南杜甫川後延川縣南六十里白浮圖寺前七冢相傳赫連勃勃塟此府志勃勃塟嘉平陵十六國春秋夏録按寰宇記云勃勃墓在霍山最髙峰未知誰是尸毘墓延州天山之巔有奉國佛寺庭中有一墓世傳尸毘王之墓尸毘出於佛經大智論言常割身肉盡今天山下有濯筋河其縣為膚施慶厯中施昌言鎮鄜延壞奉國寺為倉發尸毘墓有枯骸尚完脛骨長二尺餘顱骨大如斗並得玉環玦七十餘件夢溪筆談後梁髙刺史萬金墓在府城南八十里盤龍村馬志萬金河西人髙萬興弟延州刺史貞明四年卒乃以萬興為鄜延節度兄弟世守其土延綏鎮志宋鄭指揮榮墓在府南十里馬志榮京兆人始以民兵來延有戰功授都指揮賈志明楊都御史宗氣墓在城南十里柳林山頂賜祭塟賈志楊太保兆墓在城北五里賜祭塟父御史本深墓亦在焉府志楊叅政吉墓在伏龍山府志楊同知如松墓在城南十里賈志贈尚書趙仕墓在城西十五里賈志在城西神仙溝子太傅彦光禄章祔府志章卒於崇禎庚辰以癸未祔塟於贈太傅公父之次與兄太傅彦分左右劉豫嘉譔趙光禄章墓志張布政世烈墓在城南五里夏家塔側賈志白廵撫希繡墓在城西南杜甫川賜祭塟賈志蕭大將軍如薫墓在城南三里杜甫川其祖都督漢墓亦在焉府志張副使廷雲墓在城東五里白雲窩賈志楊知縣如桂墓在城南賈志董都憲珊墓在城東十里府志楊同知墀墓在城南十里府志髙知縣夢禎墓在城南十里卧虎灣賈志李知府賦秀墓在城南十里賈志趙員外廣印墓在城北二里王家坪府志劉翰林世芳墓在城北二十里府志趙處士應震墓在城東二里有提學汪喬年碑賈志李烈婦墓在城西南杜甫川毘家崖有碑賈志本朝趙知縣隆引墓在神仙溝賈志白知縣可久墓在城西十里府志安塞縣明郭知縣東陽墓在縣石峰山左府志王驃騎將軍倫墓在縣南三十里府志王推官謨墓在縣南鳳凰山下府志馬叅議􅅷才墓在縣南十里府志甘泉縣隋薄姬冢在縣西六十里冢髙丈餘其間老松古柏蓊鬱相映馬志縣西府城村外俗傳煬帝北廵選納鄭妃名薄姬殁後塟此人稱薄姬冢縣志元袁御史榮墓在縣南十里府志榮元行御史臺中丞馮志文侍郎允中墓在太和山前縣志明刑部尚書開濟墓在石馬河縣志髙御史亮墓在焦家莊縣志石主事瑩玉墓在縣東臨鎮川府志安定縣明薛給事文周墓在縣東十里府志藍總兵墓在縣東郭任寧夏總兵名失傳縣志本朝薛經歴廷謩墓在縣東五里府志附疑塜宋潘美墓蟠龍山在縣南八十里嶺上古柏蒼翠相傳潘美墓在焉故又名忠山縣志按美非陜人又未宦終於陜其為傳訛無疑今洛陽陳留俱有美墓保安縣宋劉節度延慶墓在保安縣北二里延慶係宋保信軍節度使馮志明李御史光祖墓在東山府志王學士大任墓在南門外府志韓副使炳衡墓在縣南川縣冊宜川縣明張都諫琛墓在縣南五里郭家䃹府志劉孝亷子誠墓與弟知州子諴墓俱在縣北九臺山子諴倪元璐撰墓誌府志劉知縣繼墓在縣北十里如渠原賈志楊都督自新墓在縣北八十里神田嶺賈志延川縣明髙副使懷敬墓在延川縣府志延長縣明樊解元儀墓在縣南五十里石䟦村儀歴官江西提學縣志宋知州大奎墓在縣境縣志本朝薛侍郎柱斗墓在縣西于谷驛南山下祔於其父之竒叔之鳳側縣志鳳翔府鳳翔縣上古鴻冢鬼㬰區號大鴻黄帝大臣也死塟雍故鴻冡是史記五帝本紀註索隱曰黄帝臣大鴻塟雍鴻冢葢因大鴻塟為名也封禪書註䟽仡紀帝鴻氏塟雝雝之鴻冢是矣在秦漢皆列祀典路史鴻冢是大鴻冢即帝鴻也史漢書説者更以為鬼容丘益非按今冢在雍以知所都亦不逺黄帝之都也路史註按史記註曰黄帝臣路史曰帝鴻氏歴世荒逺難稽應從史註周秦穆公墓在鳳翔府城内東南隅明一統志周圍五丈有竒前有碑歲時致祭縣志繆公塟雍史記秦本紀皇覽曰秦繆公冢在橐泉宫祈年觀下本紀註橐泉在城東墓在城西無百步乃知昔未有此城秦人以泉識公墓宋蘇軾穆公冢詩按史記註謂雍縣東南二里是在城以外也此城正唐末李茂貞所築三良冢在城南半里許有碑記縣志文公六年秦伯任好卒以子車氏之三子奄息仲行鍼虎為殉皆秦之良也國人哀之為之賦黄鳥朱子詩傳正義曰括地志云三良冢在岐州雍縣一里故城内史記秦本紀註按史記註三良冢在城内今在城外是城已改築也六冢在城西六冢里冢甚髙大不詳所始疑即秦諸公陵也縣志雙冢在城西十五里雙冢村縣志按雙冢相傳已久村里俱因此得名故叙於六冢之後明霍侍郎瑄墓在府城南二十里勅塟馮志附疑塚殷比干墓政和間朝廷求三代鼎彛器李朝儒為陜西轉運遣人於鳳翔府破商比干墓得銅盤徑二尺餘中有欵識一十六字又得玉片四十三枚其長三寸許上圓而銳下濶而方厚半指玉色明瑩以盤獻之於朝玉留秦州軍資庫道君皇帝曰前代忠賢之墓安得發掘乃罷朝儒出其盤其玉久在秦帑王庶知秦州取之而去祁寛居之嘗見之為余言然比干墓在衛州西山去城數十里有漢唐以來碑刻甚多墓周圍數里生異木樛結不可入而居之言墓在關中未知何也墨莊漫録按衛輝府志殷比干墓在城北十五里即周武王所封信矣此云比干墓者考漢有何比干自汝陰徙平陵仕武帝時其後世為名族豈何墓塟此而後遂訛傳耶附迷塚秦惠文王墓惠文王塟公陵史記秦始皇本紀正義曰括地志云陵在雍州咸陽縣西北一十四里本紀註悼武王墓悼武王塟永陵秦始皇本紀徐廣曰塟畢陌今安陵西畢陌正義曰括地志云在雍州咸陽縣西十里俗名周武王陵非也本紀註皇覽曰冢在扶風安陵縣西北畢陌中大冢是也人以為周文王冢非也周文王冢在杜中秦本紀註漢淮南王長墓長謀反事覺載以輜車令縣次傳不食而死縣傳者不敢發車封至雍雍令發之以死聞廼以列侯塟淮南王于雍置守冢三十家漢書淮南王傳按史記始皇本紀元德公宣公成公俱塟陽康公塟竘社共公塟康公南桓公塟義里丘北景公塟丘里南畢公塟車里北夷公塟左宫惠公塟車里悼公塟僖公西剌龔公塟入里躁公塟悼公南懷公塟櫟圉氏靈公塟悼公西簡公塟僖公西惠公塟陵圉出公塟雍獻公塟囂圉孝公塟弟圉應俱在鳳翔境今皆無攷岐山縣皂角陵在縣東南十里朝代未詳賈志按諸舊志俱列皂角陵於周陵之前今仍之周太王陵在岐陽鎮北俗云幽王陵縣志按明一統志幽王陵在臨潼北二十五里幽王死驪山下陵在臨潼者為是舊志言鎮内有太王廟而志無太王塜太王始遷岐下塜在岐陽無疑關中陵墓志唐昌樂縣男李淳風墓在縣北墓傍有祠縣志在縣東北五里賈志按河南府志李淳風墓在新安縣盧院保畿輔通志淳風墓在涿州東北向陽里皆無所徵信考唐書淳風岐山人似應以此為正又西安府志盩厔東郭二里亦有淳風墓金完顔元帥墓在塔店北賈志在益店北金之宗室名失傳縣志扶風縣周姜太公夫人墓在縣西南馬志在湋水南八里縣志漢馬將軍援墓在縣西南八里伏波村馬志在縣西有碑存縣志援卒後有上書譛之者帝怒妻孥惶懼不敢以喪還舊塋裁買城西數畆地稾塟而已妻子詣闕上書訴寃前後六上然後得塟後漢書本傳司徒魯恭墓在縣北四十里魯馬村馬志按中牟縣志㳟墓在縣西北兖州府志載恭墓在焦氏山南考後漢書本傳恭以老病罷官卒於家則中牟諸處皆非實冡班中郞固墓在縣東二十里關中陵墓志有碑賈志往余計偕道過扶風見路旁短碑僅尺許為班孟堅墓字復漫漶半没草土中又三十餘年而余備兵涇原按部岐鳳訪班氏後僅自江一人貧苦憔悴因捐空役餼金檄扶風令置田七十畆於班氏桑園故地令自江力耕教其子府屬併黄令亦捐俸廣地六十畆搆屋數間為具牛種庶幾無艱於衣食而蕃育其子姓乎黄煒班氏廣育莊記晉竇滔墓在縣北周秦坡賈志故有碑出名人手筆摹搨者多里人苦之乃陰毁焉縣志隋文帝泰陵在邑東南四十五里陵地九頃餘城垣遺址尚存縣志文獻獨孤皇后仁壽二年八月塟於泰陵隋書后妃列傳髙祖文皇帝仁壽四年冬十月己卯合塟於泰陵同墳而異穴文帝紀陵髙五丈周數百步關中陵墓志按元和志文帝泰陵在武功縣西南二十里三畤原考武功西南二十里已交扶風界今陵在扶風境唐武部尚書楊恂墓在縣東北二十里舊美陽城北二里逺門有穹碑𨽻字甚竒古府志碑髙二丈五尺廣三之一𤣥宗御製文太子亨書今字漫滅幾半縣志元楊孝子皥墓在縣南二十里賈志趙孝子榮墓在縣西二十里柳店鋪西有碑存焉府志招討將軍胡昱墓在縣東杏林鋪北縣志明胡府尹宗道墓在東郭外奉勅修賈志嘉靖元年賜祭有碑縣志雙烈女墓在縣東十里賈志四女墓在縣南十里賈志相傳塟四孝女未詳縣志附疑塚周晉太師師曠塜在漆阮縣志按明一統志師曠墓在洪洞縣東南二十里濟南府志師曠墓在新泰縣北十五里昔人俱疑之然曠晉樂師必不逺瘞於秦也漢陰后冡在臨平亭部按漢書和帝使魯恭策廢后卒塟此縣志按河南通志載陰后以巫蠱事廢遷桐宫塟臨平亭雖扶風亦有臨平然應以近桐宫者為是郿縣周秦武公墓武公塟雍平陽史記秦本紀按秦都世次自周東遷始有岐西或營邑在郿或徙居平陽或居封宫卒塟平陽皆此一地也至德公復徙居雍則平陽在今郿縣境西濱渭當岐西南此與或言武公塟宣陽聚東南者合劉紹周平陽封域辨宋張横渠先生墓在縣東南横渠鎮祠堂南十五里馬志先生父涪州公廸暨弟戩以下四世墓俱在府志先生再謁吿西歸過洛見二程曰載病不起尚可及長安也熙寧十年冬十二月乙亥行次臨潼沐浴更衣而卒門人衰絰輓車送其喪歸於家元豐元年八月癸酉塟父涪州墓南之祔穴吕與叔撰横渠行狀有宋太常博士張天祺以熙寧九年三月丙辰朔暴疾不禄越是月哉生魄越翼日壬辰歸祔大振社先大夫之塋其兄載以報塟不得請銘他人手䟽哀辭十二各使刻石置壙中横渠撰其弟戩壙志明成化十八年提學副使戴珊開廣塋域𢎞治八年提學副使楊一清築垣樹扁命以春秋致祭府志金棲閒居士張中偉墓在縣治西北十里中偉官昭毅郞兄中孚封原國公墓亦在焉封爵碑記俱存府志大定二十五年三月庚戌以疾終於家以明年三月甲申奉君之喪塟於郿之斜渭鄉原公墓之東侍講沈英撰墓表中孚官尚書左丞進封崇王墓在居士西中彦歴吏部尚書其墓未詳所在今里人稱張金紫墳舊有翁仲石羊馬耕者侵而没焉僅遺址畆許云縣志元歹驢墓縣治東二十五里曰歹王城至正十四年元將歹驢築有塜俗稱蠻王塜半嚙於敎坊河縣志明王尚書􅈟墓在縣東一里馬志何叅議囘墓在縣治東北十五里有碑縣志附疑塚周甯大夫戚墓在郿縣東南十五里有二塜故村名曰甯曲馬志按明一統志宿州西平度州西俱有戚墓戚係齊桓左相彼時此地屬秦戚墓不應在此疑有誤府志寶雞縣周秦寧公墓寧公塟西山史記秦本紀正義曰括地志云秦寧王墓在岐州陳倉縣西北三十七里秦陵山帝王世紀云秦寧公塟西山大麓故號秦陵山也本紀註按始皇本紀云塟衙與此不同唐岐王李茂貞墓在縣北五里府志在治北五里陵原上縣志元邠國公李思齊墓在縣東三十里府志縣東底店後山上兄弟有七思齊行三故邑人呼其墓為三相公墳馬志明劉侍郞俊墓在縣東三十里賈志張侍郞撫墓在