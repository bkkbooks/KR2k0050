body:
  text: 陕西通志巻四十五風俗習尚方言時令化導禮儀納賈陳詩觀民設教土厚泉深樸直是好公戰知方力農相劭周帥以仁漢易厥暴六輔侈靡五陵年少久建國都寖逺於道溯古夏聲軌涂則傚移易之權視乎化導作風俗志第二十一習尚正西曰雍州其民三男二女其畜宜牛馬其榖宜黍稷周禮職方氏呉公子札來聘請觀於周樂使工為之歌豳曰美哉蕩乎樂而不淫其周公之東乎為之歌秦曰此之謂夏聲夫能夏則大大之至也其周之舊乎左傳豳周之舊國秦本在西戎􅊈隴之西秦仲始有車馬禮樂去戎狄之音而有諸夏之聲及襄公佐周平王東遷而受其地故曰周之舊杜注虞芮之君相與朝周入其境耕者讓畔行者讓路入其邑男女異路班白不提挈入其朝士讓為大夫大夫讓為卿毛氏詩傳秦人之俗大抵尚氣概先勇力忘生輕死然本其初而論之岐豐之地文王用之以興二南之化如彼其忠且厚也秦人用之未幾而一變其俗則已悍然有招八州而朝同列之氣矣何哉雍州土厚水深其民厚重質直無鄭衛驕惰浮靡之習以善導之則易於興起而篤於仁義以勇驅之則其强毅果敢之資亦足以彊兵力農而成富强之業非山東諸國所及也朱子詩傳秦處仲秋之位男懦弱女高膫白色身音中商其言舌舉而抑聲清而揚詩含神霧秦金積堅故秦俗亦堅春秋說題辭闗中自􅊈雍以東至河華膏壤沃野千里自虞夏之貢以為上田而公劉適邠太王王季在岐文王作豐武王治鎬故其民猶有先王之遺風好稼穡殖五榖地重重為邪漢都長安諸陵地小人衆故民益玩巧而事末也北地上郡與闗中同俗然地亦窮險唯京師要其道都國諸侯所聚㑹故其俗纎儉習事史記貨殖傳商君定變法之令行之十年道不拾遺山無盜賊家給人足民勇於公戰怯於私鬬商鞅傳撃甕叩缻彈箏搏髀而歌嗚嗚者秦之聲也李斯傳昔后稷封斄公劉處邠太王徙岐文王作豐武王治鎬其民有先王遺風好稼穡務本業故豳詩言農桑衣食之本甚備漢都長安徙齊諸田楚昭屈景及功臣吏二千石高訾富人豪桀并兼之家於諸陵是故五方雜厝風俗不純其世家則好禮文富人則商賈為利豪桀則逰俠通姦又郡國輻凑浮食者多民去本就末列侯貴人車服僣上衆庻倣效羞不相及嫁娶尤崇侈靡送死過度安定北地上郡西河皆廹近戎翟脩習戰備高尚氣力以射獵為先漢書地理志關西諸郡自頃以來數與胡戰婦女載㦸挾矛弦弓負矢三國志鄭渾傳注姚興托意佛道公卿已下莫不欽附沙門自逺而至者五千餘人起浮圖於永貴里立波若臺於中宫沙門坐禪者恒有千數州郡化之事佛者十室而九矣晉書姚興載記京兆皇都所在俗具五方人物混淆華戎雜錯去農從商爭朝夕之利游手為事競錐刀之末貴者崇侈靡賤者薄仁義豪强者縱横貧窶者窘蹙桴鼓屢驚盜賊不禁此古今之所同焉自京城至於外郡得馮翊扶風是漢之三輔其風大抵與京師不異安定北地上郡其人性猶質直尚儉約習仁義勤於稼穡多畜牧無復冦盜雕隂延安𢎞化連接山胡性多木彊皆女淫而婦貞盖俗然也朔方榆林地接邉荒多尚武節亦習俗然焉漢中之人質朴無文不甚趨利性嗜口腹多事田漁雖蓬室柴門食必兼味好祀鬼神尤多忌諱家人有死輒離其故宅崇重道教尤有張魯之風焉傍南山雜有獠户富室者頗参夏人為昏衣服居處言語殆與華不别沔連雜氐羌性質直務農習獵民多勁悍梁者言西方金剛之氣彊良故因名焉隋書地理志陕西路葢禹貢雍梁冀豫而雍全得焉其民慕農桑好稼穡鄠杜南山土地膏沃二渠灌溉兼有其利大抵夸尚氣勢多遊俠輕薄之風甚者好鬬輕死被邉之地以鞍馬射獵為事其人勁悍而質木上洛多淫祀申以科禁故其俗少變宋史地理志秦之水泔而稽淤滯而雜故其民貪戾㒺而好事管子水地篇秦性强其地險其政嚴其賞罰信其人不讓皆有鬬心呉子秦人家富子壯則出分家貧子壯則出贅借父耰鋤慮有徳色母取箕帚立而誶語抱哺其子與公併倨婦姑不相恱則反唇而相稽賈誼陳政事疏太王躬仁邠國貴恕今長安習俗無以異於逺方郡國來者無所法則或見侈靡而倣效之匡衡政治得失疏東海人黄公為術能制蛇御虎佩赤金刀以絳繒束髮立興雲霧坐成山河三輔人俗用以為戲漢帝亦取以為角牴之戲焉西京雜記河西其氣蔽壅厥性急㐫故曰雍雍壅也李廵爾雅注雍冀合商羽端駛烈人聲犍其泉辛以鹹元覧漢高祖發巴蜀伐三秦遷巴蜀七姓居商洛其俗多獵山伐木深有楚風寰宇記三輔者本雍州之地世世從公卿大夫吏二千石及高貲皆以陪諸陵五方之俗雜㑹非一國風不但繁於詩之秦豳也其為士好高尚義貴於名行其俗失則趨勢進權惟利是視秦始皇遣䝉恬攘却匃奴得其河南造陽之北千里地甚好於是築城郭徙民居之名曰新秦四方錯雜奢儉不同今俗名新富貴者為新秦由是名也册府元龜上洛郡南屬邑豐陽深山窮谷不通轍迹其民刀耕火種播種時釀黍稷烹雞豚先約曰某家某日有事於畬田雖數百里如期而集鉏斧隨焉至則行酒啖炙鼓噪而作援桴者有勉勵督課之語若歌曲然更互力人人自勉王禹偁小畜集子厚言關中學者用禮漸成俗正叔言自是關中人剛勁敢為子厚言亦是自家規矩寛大程氏遺書麟府州在黄河西古雲中之地乃漢蕃雜居黄茅土山高下相屬極目四顧無十歩平坦廨舍廟宇覆之以瓦民居用土止若栅焉架險就中重復不定上引瓦為溝雖大注亦不浸潤其梁柱榱題頗甚華麗下者方能細窺城邑之外穹廬窟室而已人性頑悍不循禮法公事惟吏稍識去就除兹而下莫吾知也俗輕生重死侮性亡義上官融友㑹談叢讀秦風喜得無淫奔之詩見得秦俗好薛思菴野録天下有九褔秦隴鞍馬褔珍珠船漢中風俗尚白男子婦女皆以白布裹頭或用黄絹而加白帕其上昔人謂為諸葛武侯帶孝後遂不除漢中滕太守嚴其禁十年來漸以衰止然西鳯諸府風俗皆然而華州渭南等處尤甚凡元旦吉禮必用素冠白衣相賀則為武侯之說非也隴蜀餘聞關中故俗其人質直尚氣鮮儇黠詭佞之習乃今漸澆古樸閭閻搆訟百偽朋興王維楨與王南溟書周自后稷封於邰始播百榖烝民乃粒萬邦作乂其後公劉立國於豳復脩后稷之業而風俗以厚其民勤稼穡詩曰三之日于耜四之日舉趾同我婦子饁彼南畝又曰亟其乘屋其始播百榖貴家大族皆力蠶桑詩曰爰求柔桑采蘩祁祁上下之情交相忠愛詩曰女心傷悲殆及公子同歸又曰為公子裳為公子裘言私其豵獻豜于公又曰稱彼兕觥萬夀無疆老者慈㓜少者敬老詩曰入此室處以介眉夀太王居豳時猶尚質詩曰陶復陶穴未有家室盖地近西戎而苦寒故其俗如此文王之時徳化大成考之二南男女以正婚姻以時見桃夭詩賢才衆多見兎罝詩家室和平見芣苢詩江漢之間淫俗皆變見漢廣詩女子以禮自守見行露摽梅死麕諸詩在位皆節儉正直見羔羊詩此周徳之盛道徳一而風俗同固無疆理之異也及秦俗以後政異俗殊故隨其郡縣之志而列之馬志西安府其俗男耕女桑先勇力尚氣概廣皇輿攷長安險絶之土民多剛强魏書陸俟傳長安風俗自貞元侈於遊宴其後或侈於書法圖畫或侈於博奕或侈於卜祝或侈於服食各有所蔽也唐國史補長安士女遊春野歩遇名花則必設席藉草以紅裙遞相挿掛以為宴幄其奢逸如此也開元天寳遺事長安尚有秦漢遊俠之風聞見前䤸士尚氣節人多醇朴市交不欺多集商賈衣履多布素屋宇質陋器惟瓦甆冠婚喪祭悉遵㑹典家禮昔人所謂以善導之則易興起而篤於仁義諒矣長安縣志漢都長安五方雜處風俗不純自隋唐建都以來鬬華競麗侈僣相仍去漢抑又逺矣厯宋元而明漸返樸素民不事末作急公敬上及其末也裘馬錦綺充填衢巷羅袴雲履得僣於娼優卒𨽻之軰而雕甍峻宇在在有之至菜傭輿卒率以號行非禮稱呼無貴賤悉然間有後進以凌傲為氣節老成至避其鋒獨是翁婦非禮見不面伯氏於弟婦雖禮問不通此則風俗之美而可傳者邇來薦紳義命自安鮮鑚營干謁無侈田廣宅荷鍤躬耕者有之士習本業饒美資力學者不逃貧故科甲聨翩但士多兼農擇師逺遊者鮮農勤作苦甘淡泊貧力傭自分作奸者少百工不尚技巧作無用惟商賈多不量力競肆奢侈外似富而内無深藏其性剛語直不事斡旋人守法令征稅易完古今如一轍焉咸寜縣志縣治凡十里居高原者九而居下隰者一民守法令甘辛苦安儉素不厭簡略士知問學罕事商賈衣冠文物儼有古風醇厚樸實好禮度征稅易完但婚姻多重財致有男女愆期者䘮𦵏多作佛事設戯樂致有停柩暴露不能掩壙成封者亦晚近相沿之陋習也咸陽縣志興民樸實負氣率直不阿激之挺險則粗莽不馴漸之禮教則節義可鼓興平縣志潼水深而土厚性剛而尚氣臨潼縣志民多醇厚樸實尚勤儉好禮度事耕織征稅易完詞訟尤簡但婚姻多重貨財致有男女愆期者髙陵縣志訟簡民醇糧完易治官制明成化初服食器用嫁娶送死俗尚簡樸閭閻多忠厚長者人盡力於田畝無遊蕩以此多富實興於禮讓𢎞治初漸入於奢至正徳華靡倍昔鄉邑無老少習為浮偽好挾人短長以為能不論徳行論富論勢力遂至凌競成風鄠縣志藍之俗醇而雅藍之民樸而質藍之士大夫操行而愿恪王邦才脩武安王廟記質直淳樸男耕女織三古之風其猶有存焉舊志士風樸茂雖甚貧負薪好學一入官則清忠見表即掾吏矯矯有聲百姓亦知崇尚孝弟力田外便以完公賦為急但不習商賈閭里因多困乏然婦女不尚淫巧婚契先擇門第親喪盡哀不侈靡文又藍民之儉而得中者藍田縣志涇陽為西安劇縣政繁而道衝俗美而習敝民逐末於外者八九康對山集涇邑故邇邠岐豐鎬之間相傳之盖可知明初頗近古人尚樸素城市衣履稀有純綺鄉落父老或簷帢靸履不襪器惟瓦甆屋宇質陋崇儒薄吏與其吏也寜賈故仕宦視昔十倍富人亦數倍之婚䘮酒醴漸以豪華相尚惟剛正負氣不為靡靡之習古今不甚殊焉涇陽縣志三原物産阜蕃習俗淳雅民耻爭競有禮遜風圖經士勤學問民多商賈婦翁非慶賀不靣見長㓜雖異姓亦有序昏䘮有相助之儀時節有徃還之禮藹然淳龎之遺非復古之秦俗矣至今士能敬業城邑鄉井𩔖多絃誦科目甲於諸邑農勤力作工不事淫巧惟商賈逺出每數年不歸勸令買地耕種多以為累思欲轉移令務本輕末其道良難三原縣志市閭襍業者多於縣人十九趨農業者十五富民豪農頗輸名買横緩急以自蔽匿氏冒名欺偷浮詐相樛沈亞之盩厔縣丞㕔壁志人多醇樸力本務農士尚氣節剛直不屈舊志地僻民樸不工不商食惟田畜衣惟桑綿器惟瓦磁凡昏䘮交際之具率以土物充之邇年以來官斯土者或性喜華靡而民間倣焉盩厔縣志人性勇悍尚樸實葢關中周秦漢唐都㑹之地前軰猶有古風耻遊惰奢靡非禮㑹不聚飲聽樂尊卑貴賤衣服器用品式森然莫敢僣踰至嘉隆以䧏其俗漸敝無復㳟儉敦樸之遺渭南縣志富平為豐鎬北地其民有先王遺風勲業節義接踵前脩敦厚力本遍滿境内富平縣志醴俗素稱簡樸習尚慓悍近且嚚訟成風矣醴泉縣志延安府民勤稼穡方輿勝覧俗尚鬼神延安圖經脩習戰備高上氣力以射獵為先名將多出賈志府志云延民有四美一結姻不論財一交友多重義一思先時盡哀一好善勤施舍有一病曰惰流水可以灌田而惰於疏濬閒田可以樹木而惰於栽植女惰蠶織男惰經營今延川宜川民漸知種桑果興蠶事又時置機杼習女紅衣食之資視前稍賴焉延安府册不崇侈靡頗習程法膚施圖經質樸少文習尚禮教力本務農急公重義坦率愚耿不事諛佞有豳岐遺化焉但崇奉神教好鬬嗜酒鹽販之外更無他營安塞縣志甘邑地瘠無紡織水利服賈經商之益惟以服疇力穡完輸將育家室凡婚祭服食不尚侈靡惟修廟設醮好施舎有郡城遺風甘泉縣志土風剛勁習尚淳龎重氣節敦齒讓勤詩書正供及時辦納士民如一轍焉安定縣志民風醇樸厭惡繁華賦稅急公恐後人物嫻雅專以耕耘為業明末兵荒後逃亡者多鄉井為虛保安縣志服食儉樸民勤農業宜川縣志人勤稼穡俗尚鬼神不崇侈靡頗習章程性樸少文質任自然男耕女織差有三古遺風延川縣志民多淳樸好義急公有無常相貸貧富不相耀賦役無逋欠之累吏胥無舞文之奸其俗猶為近古延長縣志鳳翔府人皆尚氣力喜射獵多出名將元一統志勤稼穡務本業士皆儒雅習俗忠厚馮志不尚華靡有先王之遺風鳳翔府志近代民猶質朴尚勤儉士紳敦禮教絶浮靡去古猶未逺也鳯翔縣志岐山務農力穡質直好義馮志明初相傳鄉民足不履縣廷目不識長吏好義急公輸將恐後迨於末年訟獄興而逋賦積奸偽日滋矣近者長吏勤於撫字曲為訓廸而民氣蒸蒸漸以復古云岐山縣志扶固瘠土風俗頗為近古鄉黨相與尚齒讓服食尚簡素忠厚質直絶無機巧小民畏官法以不入官府為高獨椎魯不能商販故里少素封之家扶風縣志人尚氣槩田野優沃物産富饒郿縣志人性勤儉務稼穡遵教化有先王之遺風寳雞縣志􅊈地寒儉俗習偷惰􅊈陽縣志士大夫重名節養亷耻齊民亦務本業勤耕耨間有負氣爭訟者判其曲直旋卽悔艾麟遊縣志民鄙嗇寒儉穴窰而處農服耕種女習紡績畏官吏重犯法士習禮肄書代有聞人隴州志漢中府其俗强勁質朴力農習射廣皇輿攷於卦直坤故多斑綵文章於辰值未故尚滋味徳在少昊故好辛香星應井鬼故君子精敏小人鬼黠勇悍武都氐傁多羌戎之民其人半秦多勇戇土地險隘其人半楚風俗略與荆州沔州郡同漢中府志其民質直好義士風朴厚有先民之遺南鄭縣志厥田沃衍其俗富庶竇充重修大成廟記民務耕織士尚敦樸漸有蜀風漢中府志俗本尚約耻逐末競利故無積儲畏法度不敢健訟謹供億故賦役無有後者褒城縣志士敦禮讓守詩書農無閒工亦無餘粟工極拙一無長技器極質不尚華奢商惟麻縷絲粟魚鹽銅鐵以資民用無異産亦無逺販婦女貧家紡績縫紉不尚衣飾城固縣志洋民勤儉力作惟事農畝士敦禮讓重亷耻農夏秋兩穫但耕耘失宜甚有榖稗爭秀者工朴拙鮮精巧商不過花布絲麻無負貲逺販者洋縣志士女出遊人持一青繒小葢飾以茸綵直有用珠璣編綴者蔡交洋州詩自注俗多醇樸民重耕織文學日趨於新禮義漸近於古士大夫駸駸有教民興行之風西鄉怒嶺惡谿險阻千里商賈之所不聚貨殖之所不滋沿城四五里得平土焉耕者鋤沙剔石耰於其間旱則溪涸而禾焦潦則水滙而禾爛幸或有秋所登畝不盈石官逋私債徭力雜征盡其所入苦不及支西鄉縣志務農力穡質直好義與岐壤相接或有豳風之遺鳯縣志風氣兼南北語音雜秦蜀士人不奔競干謁閭里無豪俠亡命小民農桑之外或事商賈不習方伎不尚滛巧不競繁華不剃度為僧道昏姻不論財禮似有古風然家貧出贅承户飬老并袓姓而易之䘮不尚浮屠士大夫家差有可觀至拘泥年月不即安塟無貴賤皆同亦胡可訓也寜羌州志地峻泉甘人崇儉樸家多健訟之流士饒驕悍之氣崇敬鬼神以享賽為樂沔縣志性本敦龎行崇儉樸民務農耕鮮為商賈士敦文學不尚聲華好義急公遺風猶在畧陽縣志榆林府習弓馬好戰鬬馮志俗驕悍喜功利習騎射尚忠勇地處砂磧不事耕織昔多世䘵之家以奢侈相尚故至今華而不實漸囂凌矣且兵民叅半以餉為命家無儋石稍稍水旱輒肆攘竊為隠憂焉戴斗極為崆峒其下曰幽都其氣角立其風精悍榆林去崆峒不逺而俗尚武勇則其性然也延綏鎮志興安州獵山伐木深有楚風寰宇記本州諸縣人户蕭條路岐荒僻詞訟絶少租賦甚微陳彭年奏劄鄉民刀耕火種聘娶以布帛為禮錯居多諸方之人聲音五方皆備城市逐末者多三年之蓄無有也山野之民質朴男女不冠不髻舊志士尚禮儉而少積書農任耕穫而少水田工不淫巧商鮮竒贏婚姻不計財䘮塟克盡力雖兵民雜處日趨儇薄而視昔慓悍之習葢有間矣興安州志平邑五方雜處幸俗尚淳朴崇儉約惟兵過於民習俗競騖讀書者殊寥寥也平利縣志民俗朴實好畋獵務耕種不尚奢華洵陽縣志白邑土瘠民貧人皆儉朴男婦項多癭瘤婚姻以布匹通好居䘮以哀慟為先嵗時節序不知徃來無宴㑹常時唯以濁酒探親而已盖因零星散處無三家村堡無半畝平田亦習俗使然也白河縣志邑治僻處山中多流寓入籍山居力穡者椎魯無文士大夫家崇禮義以訓子弟無囂競之風蓬門柴户不務葢藏不恣口腹吉凶諸禮隨力厚薄勿尚奢侈紫陽縣志石泉土著寥寥四方商旅聚而成俗其間冠婚䘮祭之儀有沿客習而變者大約朴畧無文男尚耕作女勤績紡不甚趨利而性嗜口腹斯則石之本習也石泉縣志民皆樸實節儉勤於農務不作商賈屋宇質陋衣履悉布素漢隂縣志商州習尚清高方輿勝覧人性質實土風簡朴男務耕獵女職蠶績不騖商賈不喜奔競工無竒技器無淫巧愚氓畏吏鄉紳飬高無請囑昔稱淳俗非虛也商州志儀文簡交際厚男尚質朴女尚貞順士知禮義而樂恬退布衣蔬食志安耕讀農終嵗胼胝以求秉穂工拙無巧技商以貨易貨鮮見銀錢鎮安縣志士尚醇謹農安愿朴力稼穡慕節義務本抑末安土重遷故庠無劣衿里乏豪右胥絶奸蠧閭耻訐告宦遊者羞封殖致政後𩔖儉素如寒士風服用簡朴無錦綺飾至於子孝婦節時相踵錯尤徵淳化雒南縣志尚耕桑輕末作其人徑直其風淳朴其俗儉約山陽縣志士習醇厚朴實尚勤儉急公守法少儀文民風厚重質直守法令甘辛苦勤稼穡商南縣志同州民性剛而好勝方輿勝覧士敦本尚學惜名檢入官皆砥節農力稼穡作苦貧氓至輓耕趣澤工不作淫巧架屋造器具皆觕樸有用衣服不尚華飾入市惟稗販以通有無總之土地瘠狹皆務勤苦儉嗇士十九兼農婦女績絍大較猶有古風同州志士峻名節工者不作窳商者貨足用少者尊事長者毋不遜衣食稱乎其家近或以少凌長以貧效富聚訟紏紛所爭者銖兩而費以不貲愚莫甚焉然其男力本女織絍老而不倦貧乃益力正供先時而備此則俗之美者也秦民皆力農朝邑頗事賈仕者尚亷有氣前軰盡然今或少衰焉朝邑縣志葉夢熊曰秦人喜鬬郃陽獨甚平居睚眦視生死甚輕訟訕無嚴長吏又曰郃士通籍者時有之未見其彬彬盛以俗力農末視經術父兄責望旦夕子弟倖一弋不獲則棄去無專業也今按葉公所云士習葢指嘉隆前言之今則比户誦讀雖疎於古學而人以科名為尚惟固陋之習爭訟之風不可除又婦女好遊觀賽社演劇男女雜沓無别宰莘退食䤸郃陽僻在山谷他無所營惟事農仕者尚亷有氣槩婚姻論財居常較强弱好訐訟郃陽縣志大較前軰風俗重農事勤女工儉約朴實拙於服賈民有童而野處華顚未識公署者士則恱理義好讀書仕者尚亷介而賤乾没乃今不盡然或暴悍使氣輕視法令避征徭轉移化導之機不存乎人哉澄城縣志南敦稼穡北尚服賈詩禮日增冠裳時躋黨序尚齒重於論官第婚姻論財之風尚存挾衆恃力之習未殄朴實惜異於古剛悍喜減於今舊志士敦朴無異他郡邑農則地狹人夥多事椒麻木棉終嵗服勤家無餘資者十户八九工不作竒貨而巧者徃徃有雅製商賈之利縣北為多然近或漸習紛華司民牧者宜急挽之韓城縣志華州衣冠文物儼有古風將相篤生項背相望方輿勝覧小人力田君子修已盖土地膏腴而狹隘不能如東南多産士多感􅁬激烈而以憸邪欺詐為耻女多含蓄淵明而以貞靜莊嚴為尚人守法令樂飬恬服田力穡不事遊惰市無商賈之肆民無釋老之惑至有數年補用一衣歴年不更一巾者可謂清儉渾朴之俗如阜立波澄者也華州志性率直尚敦朴厭浮華勤於農事拙於服賈華隂縣志民性剛而好鬬健訟士知學問耻奔競崇尚本實鄉人苦力稼穡不習逐末惟西鄉農商叅半工書冩作刀筆吏直南與華渭土著雜處頗尚靡麗若東北二鄉土物之外無一長蒲城縣志人尚氣節好文學脩飭亷隅服食整潔士不入肆䘮塟竭力婚不論財頗有古風今居民唯兵丁衙役為多而故家紳士咸星散鄉居非復昔年之舊矣潼關縣志耀州直市物無二價故以直市為名九域志耀州習俗醇龎才多英俊方輿勝覧同民專務稼穡不事織紡不習商賈民少生業故貧然亦能蓄積節用不事華靡禮義多濶畧但俗信巫覡重淫祀西北惟力田採薪東南多窰冶採炭以為生謀大都民多質木士尚氣節有先王遺風同官縣志人性剛而好鬬士敦朴有恥民稼穡作苦不事商賈最貧者終年輓煤白水縣志乾州人性剛方俗尚儉約男勤稼穡女事桑麻士習詩書敦節義有先民之雅槩北鄉地岡阜﨑嶇瘠薄尤甚農隙男無生意女無紡織豐嵗僅能度日凶年不免逃亡乾州志其土疆沃美高厚有丘陵墳衍之大其植物豐暢茂遂有秬秠藿菽之宜其人善樹藝其俗有禮讓宜乎其大雅之遺烈焉栁宗元武功縣丞㕔壁記邑介邠乾之間其風大約相肖但邠地膏腴宜果蔬乾地温燠宜桑棉而永夀自耕播之外别無事事不知織絍之巧鬻販之利其節嗇勤瘁儼有七月之風永夀縣志邠州邠為古國其俗質而厚其人朴而易理業尚播種畜擾有后稷公劉之遺風鄭處晦邠州節度使㕔壁記野無惰農嵗有高廩元一統志士勤詩書代不乏人屏絶浮屠不事工賈邠州志民務農桑俗尚勤儉三水縣志士多苦志篤於誦讀長吏之庭無茂才投謁農務耕耘勤力作即列子衿恒操耒耜工樸斵無淫巧商旅不通亦鮮貲本婦女紡績雖疎而閨範稱嚴謹焉所患年嵗少祲輒輕去其鄉淳化縣志本公劉太王風化之遺勤稼穡躋堂稱觥獻豜獻羔至今猶有存者但世代云遥老成非舊子衿有佻達之風閭巷多供億之苦亦凋敝使然爾長武縣志鄜州俗以夏月遊賞為重鄜州圖經仕尚勇退而賤乾没民懐法守正寡嚚訟地僻土瘠男拙於服賈女慵於績紡而婚䘮儉朴有古先王之遺風焉舊志按舊志云拙賈慵績今鄜州婦女多織紡者乃自兵燹後貧不能買衣相效而為之袛以自蔽其體不能出售矣大都業農者十之九工賈十之一鄜州志人皆精於製兵器坊州圗經中邑士嚮詩書女勤織紡敦本務農不作佛事尤其近美者也中部縣志地近邉陲俗尚强悍男苦耕稼女不織紡士習儒雅英才軰出綏徳州志尚氣槩先勇力厚重質直崇儉約勤稼穡多畜牧少盗賊清澗縣志葭州好尚武力守望相助葭州圖經士多英特尚節義工文詞少長有禮民安儉朴惟城堡與沿河一帶稍習粉飾然不事商賈專勤耕牧亦重本安土之意也居民朴魯不務織絍常服皆以布五榖終嵗所穫一畝不過二斗以粟米豇豆為常食葭州志地僻山陡風剛土勁民性朴魯不事侈華河東多事商賈而呉專農桑大率氣勇尚義多誠少詐呉堡縣志水甘土厚風氣冲和民尚勤朴宻邇邉陲多喜射獵不事績紡至於服田力穡固其本業也文武士大夫頗尚氣節軍民間有佞佛談仙者亦不為左道所惑神木縣志地臨邉塞俗尚儉朴男女耕耘不習織紡府谷縣志時令依月令廣義以時日為叙次長安風俗元日以後遞飲食相邀號傳座南部新書元旦士大夫夙興吉服祭拜袓先畢以次拜父兄出拜師長親族齊民亦然元日至元宵舂磑不事交易不行貧者亦過破五咸寜縣志元旦雞鳴起燔桃柴設香案禮天地袓先興平縣志元旦焚香燃燭設菓餚祭竈中霤臨潼縣志正旦比雞鳴各懸黄紙於長竿以祀天曰接天神又以木炭懸之門曰去瘟疫高陵縣志元日以黄紙作錢結彩懸門名寳葢錢石泉縣志元旦祭袓先拜尊者畢醉飲而散名曰拜神子山陽縣志元日以甲乙為豐丙丁旱戊巳蟲兩傷庚辛兵壬癸潦占夏糶風從南來東來者皆賤逆此者貴臨潼縣志元日宜晴不宜隂是日逢雪必兆旱乾州志立春前一日職官迎春於東郊樂人扮雜劇女童唱春詞街民捧盒酒獻官長鑼鼓彩旗聚觀雜㳫設春盤捲春餅謂之咬春臨潼縣志立春日女新適人者母家歸禮焉曰迎春人爭裂土牛皮以塗竈曰袪蚍蜉奪春仗以育蠶曰蠶盛用朱墨筆􅀞牛􅊁及小兒項曰打春高陵縣志春日人飲春酒食白蘿蔔鳳翔縣志春日民間以線貫豆爭掛牛角用禳兒疹岐山縣志立春前一日有司迎勾芒神里市各扮故事表曰慶豐年是日男婦攜兒女看春俟土牛過爭以豆麻撒之謂之散疹城固縣志立春日用牛土書字於門曰鎮宅呉堡縣志立春日早風成早禾晚風成晚禾前八日晴諸事皆吉得辛日小麥成臨潼縣志春日喜晴厭雨歌曰但得立春晴一日農夫不用力耕田城固縣志正月五日剪紙人送擲門外謂之送窮臨潼縣志五日飽食謂之填五窮延綏鎮志五日忌出門以新肉置釡中炭火炙之或以麻豆名曰迸窮韓城縣志六日夜多聽靜以卜終年吉凶延長縣志六日炒黑豆散房壁名爆六甲七日用糠著地上以艾炷灸之名救人疾俗以疾七聲相近也延綏鎮志人日晴人安乾州志八日屬榖晴年必豐乾州志九日炙榖皮於閾以袪災同州志九日用糠一合黎明置門前炭火燃之名曰炙窮韓城縣志十日名老䑕嫁女是夜家人滅燭早寢恐驚之也延綏鎮志十一日夜不張燈十二日厨不動刀謂之䑕忌臨潼縣志都中每至正月十五日造麫蠒以官位帖子卜官位高下或賭筵宴以為戯笑開元天寳遺事京城街道有執金吾曉暝傳呼以禁夜行惟正月十五夜敇許弛禁前後各一日謂之放夜西京雜記元宵居民各立社㑹宰猪羊設香燭張鼓樂或廟或家以娯神興平縣志元宵用熟麪湯雜果菜曰元宵茶渭南縣志十五夜用麪為不托名燈琖注油燃燈至十六日早作羮食之示收燈也延綏鎮志十五日蒸麪繭蓋襲古卜繭之遺同州志元宵迎女歸寜謂之避燈中部縣志元宵日夜雨寒食必雨是夜燈結蕋棉花成臨潼縣志正月十五日州人將五榖攅於寺觀因而祝神以袪禳虛耗謂之送耗蔡交洋州詩自注風吹十五月雨灑清明節李因篤集元宵諺都人士女每至正月半後各乘車跨馬供帳於園囿或郊野中為探春之宴開元天寳遺事十六夜婦女出遊謂之走百病臨潼縣志十六日遊女都集柏樹下十七以殘炬送道旁謂送毒蟲韓城縣志池陽以正月二十日爲天穿以紅縷繫餅餌擲之屋上謂之補天珍珠船二十日名小填倉燃燈舉火府谷縣志二十二日紙剪車輪貼門上為招財進寳韓城縣志二十三日少年作百戯狀沿街而行曰擺社褔又曰過不當亦一日澤遺意也富平縣志二十三日夜家家院内打火用氷鎮門作紙人帶孝掛門名曰爲老君送殯延長縣志二十三日士女於漢水搭彩船上自柳林下自桃園登臨遊嬉曰遊湖城固縣志二十三夜聚猪羊骨雜燒之名煉乾俗諺曰大忌二十三太上老君不出菴延綏鎮志二十三日祀佛剪紙人帖門上禁不得食米或禁三數日懼病疳同州志二十三日作佛事忌用刀斧恐傷佛故也韓城縣志二十三日傾城士女遊百子廟祈嗣是夜復放燈如元宵白水縣志二十五日名大填倉亦燃燈舉火府谷縣志晦日各以斧斤砍梨棗冀其實繁曰撻棗以火照桑樹謂其無蟲曰燎桑富平縣志秦俗以二月二日攜鼓樂郊外朝徃暮回謂之迎富天䘵閣識餘二月二日曲江拾菜士民遊極盛秦中嵗時記二月二日以年初乾餅散家衆謂之咬蝎尾臨潼縣志二月二日以灰畫於莊墻外曰衛莊人以是日謁高禖廟祈嗣富平縣志二日早篩灰室墻四圍謂之圍龍岐山縣志二月二日文昌帝君之誕無長幼皆有祭曰松花㑹城固縣志二月二日蒿坪寺藥王大㑹男女畢至踏青選勝採野菜供食西鄉縣志二日以灰圍宅舎謂之圍蚰蜒延綏鎮志二月二日名龍擡頭禁止女工恐傷龍目韓城縣志三日早取元旦所作黄米大磨和燒黒豆啖之謂之咬蠅子延綏鎮志驚蟄節忽風冷必有倒寒人多病麥田不生長乾州志二月十二日花神生日晴百花成臨潼縣志唐上巳日賜宴曲江都人於江頭褉飲踐踏青草曰踏青秦中歳時記池陽上已日婦女以薺花㸃油祝而洒之水中若成龍鳳花卉之狀則吉謂之油花卜圖經三月二日士民携酒榼出遊郊外亦修禊意也臨潼縣志三月三日男女於翠屏山上香如雲延長縣志三月三日取葳㽔枝挿壁户圖蝎書符以禁螫岐山縣志三月三日朝武子名山男女拈香畢各採松枝蘭花簮鬢而歸以為祓除不祥西鄉縣志三日昧爽以柳枝鞭房内四壁以􅓙蝎蟲府谷縣志寒食節内僕司車與諸軍使為繩橛之戲合車轍道兩頭打大橛張繩橛上高二尺許湏𦂳榜定駕車盤轉碾輪於繩上過不失者勝落輪繩下者輸皆裝飾車牛賭物動以千計秦中歳時記長安每歳諸陵當以寒食薦餳粥雞毬等又薦雷子車至清明尚食内園官小兒於殿前鑚火先得火者進上賜絹三疋金椀一口都人並在延興門㸔内人出城洒掃車馬喧閙新進士則於月燈閣置打毬之宴或賜宰臣以下酴醿酒卽重釀酒也輦下歳時記清明前二日爲寒食作鞦韆戲拜掃民籍用百五日軍籍用清明日臨潼縣志清明日縛鞦韆婦女童子遊戲罷業曰作業能令目盲高陵縣志清明詣名山之泉源水共禮一神刑牲禱豐曰遊水富平縣志清明日至祖先墓獻新韭新笋新茗西鄉縣志興安州寒食上塜遊人相逢先淺漫數拜後極深六七拜如是者三乃止宋王冲詩云鳴珮相逢拜不休馮志清明拜掃回則折柳枝挿門以錢紙縛樹且以圍其釜曰能避蟲蟻同州志寒食後六十日内麥熟則實佳遲則粃臨潼縣志三月十五日六坊民輪祭孤魂相傳黄巢作亂多殺傷祭則年豐岐山縣志三月十八日士女出城祀后土廟祈嗣白水縣志榖雨日貼厭蝎符於壁書呪其上曰穀雨日穀雨晨奉請穀雨大將軍茶三琖酒三廵逆蝎千里化為塵延綏鎮志穀雨日貼神符於壁上以除毒蟲韓城縣志三月不宜霜致傷諸禾宜雨乾州志洋州春時遊於埧求石之穿者以絲項之取其宜蠶郡官張樂于下同民歡樂謂之踏石蔡交洋州詩自注長安四月已後自堂厨至百司厨通謂之櫻筍厨公餗之盛常日不同秦中歳時記四月一日男女戴皂莢葉曰已頭痛高陵縣志以四月朔占秋糶風從南來西來者皆賤逆此者貴臨潼縣志四月八日民間各帶皂角枝咸寜縣志四月八日俗謂城西靈山是釋迦經行處逺近男婦咸徃祈拜鳳翔縣志小滿前後農各栽秧諺曰手執秧苖挿野田低頭便見水中天六根清浄方成稻退歩原來是向前城固縣志四月居人遊江上遇葛纒草木解之謂之解繳興安州志葛藤纒繳草木居人出而解之取解殃咎纒繳之意因而有㑹謂之解繳蔡交洋州詩自注麥熟女爲新麥食送其父母諺曰麥上場女㸔娘富平縣志四月來麥成熟之候不宜多雨晴則籽粒堅好又相傳八日不宜南風乾州志唐世京城遊手夏月採蟬貨之唱曰只賣青林樂婦妾小兒爭買以籠懸忩户間有騐其聲長短為勝負者謂之仙蟲社陶穀清異録端午前二日東市謂之扇市車馬闐集秦中歳時記唐宫中端午日造粉團角黍貯盤中以小角弓射之中者得食都中盛行此戲開元天寳遺事端午家具角黍餽遺姻親貼符懸艾以禦瘟疫興平縣志端陽飲雄黄酒挿艾小兒女繫五色絲艾虎臨潼縣志端午日戴艾葉曰去疾㓜者係百索於項腕曰蛇蟲不螫高陵縣志端午日用蒲艾紙牛貼門名曰鎮病延長縣志端陽日官長率僚屬觀競渡謂之踏石興安州志漢中五月十五必以酒食相饋賔旅聚㑹有甚於三元隋書地理志徳公二年初伏以狗禦蠱正義曰六月三伏之節起秦徳公爲之故云初伏厯忌釋云伏者金氣伏藏之日也秋以金代火故至庚日必伏庚者金故曰伏也蠱者熱毒惡氣為傷害人故磔狗以禦之狗陽畜也徐廣曰年表云初作伏祠社磔狗邑四門也史記秦本紀注漢中自擇伏日俗云其地温暑草木早生晚落氣異中國故令自擇伏日謹案漢書高祖還定三秦席巻天下蓋君子所因者本也故重復寵異令自擇伏風俗通六月六日以麫湯新果薦祖先出書籍衣服以晒俗謂蟲不嚙咸寜縣志六月六日爲迎女節高陵縣志六月六日取五更時水作麯曰壓麯又於是日作醬曰不生蟲富平縣志六月六藏水待用久不壊渭南縣志六月六日用酒漿奠墳曰解渇清暑延長縣志六月六日新嫁女母家授以單衣謂之避凉岐山縣志六月六日雞初鳴作菉豆羮俗呼漿水遲明各攜至祖塋澆奠名解炎熱延綏鎮志初伏頭雨則旱臨潼縣志六月六日雨菜根遭蟲蛀李因篤集六日諺五六月俱宜雨旱難望有秋乾州志漢彩女常以七月七日穿七孔針於開襟樓西京雜記唐輦下歳時紀事曰七夕俗以蠟作嬰兒形浮水中以為戱為婦人宜子之祥謂之化生全唐詩話七夕㓜女設果酒豆芽祀告織女神民間亦具果雞蒸食相餽興平縣志七月七日女兒陳瓜果以金鍼漂水椀中視影之妍􅑦以覘巧拙臨潼縣志七夕俗於是日飬女之家供七姑水主於院落中獻以瓜桃棗梨月上星輝招貧家女未笄者擊瓦坯唱歌石泉縣志七夕男家饋衣儀競豐幾與聘等白水縣志中元折麻穀具緡酒以獻祖考士大夫多至墓所以祭俗云鬼節咸寜縣志七月十五燒紙祭麻姑臨潼縣志中元祭先在黄昏儀如正旦必折麻穀以獻告穡事成也高陵縣志中元夜農家㑹飲曰掛鋤城固縣志中元日農家早向隴頭擇禾之長茂者懸五色紙旗名曰田旛延綏鎮志中秋具酒餚㑹飲曰賞月高陵縣志八月十五以瓜果香餅賞月并以月餅相遺延綏鎮志中秋有雨次年元宵必隂臨潼縣志八月十五雲遮月來年元宵燈熀雪李因篤集中秋諺七八月秋霖亦吉忌不周風此風至天氣必肅農家忌之乾州志重陽家具食饌牲酒相饋興平縣志重陽上驪山飲茱茰酒所親以棗糕相餽臨潼縣志九日兒童登高競放風鳶曰迎寒城固縣志九日婦女以口採茱萸有可治心疼之諺西鄉縣志重陽有雨冬有雪來年豆成臨潼縣志九月霜䧏忌早早則穀蕎未至大熟必至減數乾州志十月一日雞鳴焚紙獻餛飩祭先謂之送寒衣臨潼縣志十月一日傭工人皆於是日放還諺云十月一放僱的西鄉縣志以十月朔占春糶貴賤風從東來者春賤逆此者貴臨潼縣志十月秋成報答土功祭獻山神迎賽經月不絶鳳翔縣志十月可納禾稼宜稍煖故曰小春是月純隂而復温黄葉蘀盡來年之蒂芽復萌二麥分枝必多屢騐乾州志冬至拜賀如元旦興平縣志冬至祭祖先儀如正旦臨潼縣志冬至向巴山㸔雪以占來歳豐歉西鄉縣志一九雪九九皆有雪臨潼縣志十一月乾土亢厚宜大凍二麥斂藏必固缺雪必致來歳之蟲不宜暖果木開花不吉騐乾州志惠文君十二年初臘正義曰十二月臘日也秦惠文王始效中國為之故云初臘獵禽獸以歳終祭先祖因立此日也史記秦本紀注十二月五日煑五豆食之已五毒八日煑粥相送或於路食客謂臘八粥臨潼縣志臘月八日作酒曰臘脚富平縣志臈八日早作粳粥取米泔浴蠶種令多岐山縣志臘月八日煑肉糜抛花木俗謂不歇枝咸寜縣志臘月八日以肉糜澆果木冀其實盛城固縣志臘月八日謂之道徳臘用黄黍作糜下油鹽於中謂之餴飯延綏鎮志臘八日為㓜男女剃頭設菓肉粥於通衢以飯貧者同州志二十三日祀竈用糖餅以糖泥神口祝曰毋以惡事訴上帝也延綏鎮志臘月二十四日夜設槽饌果酒祀竈掃舍興平縣志二十四後嫁娶不擇吉謂兩年不厮管臨潼縣志秦中歳除日儺皆作鬼神狀二老人各為儺翁儺母秦中歳時記除夕是日更桃符設歳宴興平縣志除日具酒羣飲曰守歳臨潼縣志除夕優人扮鍾馗遍詣人家鳴鑼擊鼓曰驅鬼渭南縣志十二月宜雪寒不洩盡人多病乾州志洋州冬月用蒲葉養魚至臘日郡官泛舟於漢之鵞翁潭奏鼓樂掲而取之遊人縱觀謂之掲蒲蔡交洋州詩自注戊午至甲子七日内必有雨無則兩月旱四時甲子日雨皆不吉月暈則風日暈三日内雨早霞雨晚霞晴水老鴉鳴則雨燕子天雨不晴水鴣鳴亦不晴虹見卽晴驪山出雲西行多雨西南望終南山雲漸白大雨驟至西北嵯峨山起雲亦大雨臨潼縣志春雨甲子赤地千里夏雨甲子操舟入市秋雨甲子禾頭生耳冬雨甲子雪􅄟羊豕甲子諺四時不取甲申雨甲申諺壬子癸丑甲寅晴五旬之中宵見星戊午至甲子七日行泥滓旬諺篤李因集禮儀人不知冠久矣娶婦者前一日冠帶拜見尊長尊長斟以酒或其遺意歟男子多麻冠婦人雖濃粧亦必以白布飾其首蓋西方金也山曰太白故多尚白從來逺矣臨潼縣志冠加於首所以象天也最宜雅重古時制度無論已今制夏凉冬煖各有定制又有帽頂以别貴賤用之者不可不審也楊用晦維風約婚酒食召親友所以厚其别親迎執贄所以致其恭不樂不賀所以思其繼同牢合卺所以思其愛近俗婚禮多費貨財相交婿以花飾衣冠婦以聲樂迎導非所以謹夫婦嚴宗廟也咸陽縣志媒妁言允後男家肅簡拜謝或用酒幣謝允起媒接媒㑹親納幣豐約不等從不言財親迎入門拜祖先合巹相引新郎婦同過筵間謂之轉筵三日拜尊長下厨十日備禮囘門此禮俗兼行者也臨潼縣志納采問名縣俗發媒似之蓋先通言至是主人告廟具書宴媒徃女氏用鴈若羊酒致辭女主人亦告廟復書有啓書各具男女名字生年月日卜吉納吉縣俗第一成禮似之加金幣羊豕主人黨亦徃同女主人謁其廟而後燕明日女主人復禮於男氏有羊酒時娶納徵縣俗第二成禮似之加冠花􅁫釧女主人酬以女鍼指瀕迎則請期縣俗問客似之不用儀物壻冠而後親迎縣俗迎在午前以是日宴男女賔也其主人告廟醮子命辭女主人告廟醮女戒辭壻奠鴈授綏導婦入房交拜合巹明日婦廟見舅姑縣俗婦下車卽拜神主改粧卽拜賔舅姑其明日舅姑率壻婦見廟婦執棗栗見舅腵脩見姑三日婦盥饋縣俗婦盥洗具饌饋舅姑亦先獻廟其婦家備盛饌饁婦高陵縣志婚多論財貨侈奩具有破産嫁女者有年十三四而娶者涇陽縣志婚姻有兒女襁褓時卽締姻締姻後男家為女家置羊酒三載安定縣志婚三日壻家請婦家客新壻新婦先後出拜兩姓親族各與拜禮謂之做三日過是則五日十日婦家請壻謂之轉五住十鳳翔縣志婚惟令媒氏議婚問年匹配禮必親迎聘勿論財奩惟從便明郡人邵可立有移風固言革卯筵侈費知州王廷伊議從省節求其别二姓明伉儷婚之義止矣商州志婚女家許允男家同媒妁擇吉衣冠拜女之先祖及女之父母女家待酒終無改易無婚啓庚帖遇節送時物果肉名追節如親母徃則為女具拜禮如簮􅁫巾帕任便定禮俗名頭成禮或一馬一騾鄉民或一牛禮銀或十二兩至六兩不等臨娶則具衣冠􅁫珥布帛多寡無定先一日賫迎禮親迎用二少婦名娶女客女家亦請二少婦名送女客合巹禮畢新婦隨新郎靣上立先拜業師次拜柯人及諸親最後拜父兄次日新郎謝親三朝壻家請食試刀麵女家送飯婦昏後生子然後加髻山陽縣志婚重門第辨族六禮不盡備而儀節殊繁同州志婚之次日婦之姑姊諸母悉來㸔女送餛飩名曰捻飯韓城縣志婚或六禮不具有男家備粧奩者亦簡便不致失時乾州志䘮禮存諸經五服制度著於令甲釋服作樂律有明刑近世居䘮或輕或重居處飲食出入之節多無所變衰麻月筭雖有差等殆成空文咸陽縣志䘮縉紳家多行文公家禮不作佛事鄉民雜用俳優屢禁少止興平縣志哭奠親友給帽布至戚或孝衣臨潼縣志䘮禮明邵布政禁作佛事省金置椁磚墓殊恔人心近時殯儀多用劇尚花火知州王廷伊以事不合禮悉議革之商州志䘮事寜戚不儉其親稍戾者初䘮裂帛塟用幢幡親賔路奠之同州志䘮貧富不等貧者懸棺而塟稍有力則用㨃名曰套材撦布散衣名曰破孝又以各色紙結金銀山斗層樓駝獅馬象及幡幢帛聨廣作佛事齋醮名曰同壇富貴家更侈張戯樂走馬上竿親執掛帳猪羊油盤食桌動輙數十䘮家破産徃徃有之韓城縣志䘮三日成服四日卽弔奠有力之家不别親疎弔者卽與孝帛名曰通孝二十七月除服此禮古今南北無二乾州必滿三週始免素服女子旣嫁䧏服朞年乾州卽已嫁女亦滿三載而除雖踰乎禮要之不失乎情也乾州志祭於新䘮鄉人以三日七七百日三週稱力備儀燒紙錢奠酒哭拜盡哀服除則已紳士家每日哭拜早晚獻食如常儀五七成服家奠始請禮生衣冠賛行九拜三獻禮元旦清明拜掃忌日行五拜禮入學登科拜官焚黄等乃於墓則備牲設樂請相禮賛行九拜三獻禮臨潼縣志塟祭之禮文太青酌文公家禮分以三獻豳之士大夫有遵行者寒食掃墓孟冬送衣長至元旦設位祭享士庶兼行焉三水縣志鄉飲孟春望孟冬朔衆賔介僎必以齒徳優者正賔以爵尊者執事以生員八九人歌詩以童子六七人行禮必早令必嚴肅徹席後方退興平縣志射禮明知縣章評置射器於朔望日令諸生習射行禮後知縣徐開禧復舉行如禮興平縣志賀生子相索酒食謂之破賀生辰設咂嘛罈羣飲歡呼醵金賽神以所獻果肴瓜分謂之散福臨潼縣志交際豳人於吉禮則布帛兼餽凶禮則牲食恒儀則以羊醴從其質也三水縣志方言三輔謂日出清濟為宴史記武帝本紀注關中俗謂桑榆蘖生為葆天官書注京師人謂麤屑為紇頭陳平列傳注秦隴間謂父曰翁漢書高帝本紀注馮翊呼葵音如誰武帝本紀注三輔謂山阪間為衍娣姒關中為先後郊祀志注極屋梁也三輔間名為極或曰極棟也三輔間名棟為極天文志注西方謂亡女壻為丘壻丘空也楚元王傳注梁益之間所愛謂其肥鄒陽傳注關西俗謂得杖呼及小兒啼呼為呼瓝灌夫傳注尊章猶言舅姑今關中俗婦呼舅姑為鍾鍾者章聲之轉也廣川王傳注關西人謂補滿為適黄覇傳注三輔謂憂愁靣省瘦曰嫶㝠以漆漆物謂之髤今關西俗云黑髤盤朱髤盤外戚傳注秦俗呼人為黔首謂奴為蒼頭後漢書光武帝本紀注長安市人語各不同有萌蘆語鏁子語紐語練語三摺語通名市語西京雜記䖍儇惠也謂慧了秦謂之謾言謾訑娥好也秦曰娥言娥娥也秦晉之間凡好而輕者謂之娥今關西人呼好為媌自關而西秦晉之故都曰妍秦舊都今扶風雍丘也其俗通呼好為妍烈餘也秦晉之間曰肄傳曰夏肄是屏或曰烈陶養也秦或曰陶矜悼哀也秦晉之間或曰矜或曰悼自關而西秦晉之間凡大人小兒泣而不止謂之唴哭極音絶亦謂之唴悼傷也秦謂之悼惄溼憂也自關而西秦晉之間凡志而不得欲而不獲高而有墜得而中亡謂之溼溼者失意潛阻之名沮一作阻或謂之惄惄愼思也秦晉或曰愼凡思之貌亦曰愼謂感思者之容或曰惄嘏奘大也秦晉之間凡物壯大謂之嘏或曰夏秦晉之間凡人之大謂之奘或謂之壯假􅛕至也邠唐之間曰假或曰􅛕邠在今始平縣嫁逝徃也自家而出謂之嫁由女而出為嫁也逝秦晉語也劉㨆殺也今關西人呼打為㨆秦晉之間謂殺曰劉秦晉之北鄙謂賊為䖍亟愛也自闗而西秦晉之間凡相敬愛謂之亟鮐老也秦晉之郊曰耉鮐言背皮如鮐魚尋長也自關而西秦晉梁益之間凡物長謂之尋周官之法度廣為尋幅廣為充衆信曰諒周南召南之語也自關而西秦晉之間凡人語而過謂之􅻦或曰僉自關而西秦晉之間凡物之壯大者而愛偉之謂之夏牴觸牴也􅥚㑹也雍梁之間曰牴秦晉亦曰牴凡㑹物謂之􅥚􅨬古蹋字跳也自關而西秦晉之間曰跳或曰􅨬躡􅛕􅛕亦訓來登也自關而西秦晉之間曰躡梁益之間曰􅛕或曰跂逢迎也自關而西或曰迎或曰逢自闗而西秦晉之間凡取物而逆謂之籑相謁而飱晝飯為飱謁請也秦晉之際河隂之間今馮翊郃陽是其處也曰䭡䭓此秦語也今關西人呼食欲飽為䭡䭓釗薄勉也秦晉曰釗或曰薄故其鄙語曰薄努猶勉努也如今人言努力也朦厖豐也自關而西秦晉之間凡大貌謂之朦或謂之厖豐其通語也窕美也自闗而西秦晉之間凡美色或謂之好或謂之窕秦晉之間美貌謂之娥美狀為窕言閑都也美色為艶言光艶也美心為窈言幽靜也奕僷容也自關而西凡美容謂之奕或謂之僷奕僷皆輕麗之貌魏笙揫掺細也自關而西秦晉之間凡細而有容謂之魏魏魏小成貌或曰徥言徥偕也凡細貌謂之笙斂物而細謂之揫或曰掺言瓌瑋也渾們渾肥滿也䑄䑄呬充壯也䑋􅫋泡盛也自關而西秦晉之間語也秦晉或曰䑋梁益之間凡人言盛及其所愛曰諱其肥謂之䑋肥䑋多肉私纎䓲穉古椎字杪小也自關而西秦晉之郊梁益之間凡物小者謂之私小或曰纎繒帛之細者謂之纎布帛之細者秦晉曰靡靡細好也凡草生而初逹謂之䓲鋒萌始出穉年小也木細枝謂之杪言杪梢也殗殜㣲也自闗而西秦晉之間凡病而不甚曰殗殜病半卧半起也自關而西秦晉之間凡物力同者謂之臺敵倚踦竒也自關而西秦晉之間凡全物而體不具謂之倚雍梁之西郊凡獸支體不具者謂之踦逴驚也自關而西秦晉之間凡蹇者或謂之逴行畧逴也體而偏長短亦謂之逴了快也秦曰了赧愧也秦晉之間凡愧而見上謂之赧小雅曰靣赤愧曰赧憡刺痛也憡小痛也自關而西秦晉之間或曰憡撟捎選也此妙擇積聚者也自關而西秦晉之間凡取物之上謂之撟捎瞷睇睎䀩眄也自關而西秦晉之間曰眄䭒消息喙口喙息也自關而西秦晉之間或曰喙或曰䭒䤨劈歴摫裁也梁益之間裁木為器曰䤨裂帛為衣曰摫䤨又斵也皆折破之名也鍇堅也自關而西秦晉之間曰鍇藎餘也謂遺餘自關而西秦晉之間炊薪不盡曰藎幢翳也儛者所以自蔽翳也關西曰幢摉略求也秦晉之間曰摉就室曰摉於道曰略略强取也矜遽也謂遽矜也秦晉或曰矜或曰遽賴讎也秦晉曰讎劋蹶獪也古狡狭字秦晉之間曰獪凡人嘼乳而䨇産秦晉之間謂之僆子侮奴婢賤稱也秦晉之間罵奴婢曰侮言為人所輕弄斟協汁也謂和協也或曰瀋汁所未能詳關西曰汁蘇芥草也漢書曰樵蘓而㸑蘓猶蘆語轉也自闗而西或曰草或曰芥或言菜也關之東西或謂之蘓或謂之荏凡草木刺人自關而西謂之刺凡飲藥傅藥而毒自關而西謂之毒逞曉恔苦快也快卽狡狡戲亦快事也自關而西曰快膠譎詐也自關而西或曰譎或曰膠擢㧞也自關而西或曰㧞或曰擢遝及也關之東西曰遝或曰及瘼癁病也謂勞復也秦曰瘎襌衣關之東西謂之襌衣襜褕自關而西謂之襜褕其短者謂之短褕以布而無縁敝而紩之謂之襤褸自關而西謂之䘪䘿俗名䘿掖其敝者謂之緻緻縫納敝故名之也汗襦自關而西或謂之祗裯亦呼為掩汀也蔽䣛自關東西謂之蔽䣛袴關西謂之袴絡頭陌頭也自關而西秦晉之郊曰絡頭屨麄履也自關而西謂之屨中有木者謂之複舄梁益之間或謂之或謂之䋀履其通語也緉􅥭絞也謂履中絞也關之東西或謂之緉或謂之􅥭絞通語也釜自關而西或謂之釜或謂之鍑鍑亦釜之總名㿿桮也秦晉之郊謂之㿿所謂伯㿿者也案自關東西謂之案桮落盛桮器籠也自關東西謂之桮落箸筩自關而西謂之桶檧今俗亦通呼小籠為桶檧甖秦之舊都謂之㽀自關而西其大者謂之甀其中者謂之瓿甊罃甈謂之盎案爾雅甈康壺而方言以為盆未詳也自關而西或謂之盆或謂之盎其小者謂之升甌甂自關而西謂之甂其木者謂之甌籮自關而西謂之注箕扇自關而西謂之扇繘汲水索也關西謂之繘綆飲馬槖自關而西謂之裺囊或謂之裺篼或謂之㡞篼鉤懸物者自關而西謂之鉤或謂之䥩僉今連架所以打穀者自關而西謂之棓或謂之柫刈鉤自關而西或謂之鉤或謂之䥥或謂之鍥薄自關而西謂之薄槌絲蠶薄柱也自關而西謂之槌其横關西曰㮳亦名校胡以縣㯂關西謂之䌞簟自關而西謂之簟或謂之䓆今云䓆蔑蓬也其麄者謂之籧篨筕篖似籧篨直文而麄江束呼笪自關而西謂之筕篖牀其杠自關而西秦晉之間謂之杠户鑰自關而西謂之鑰簙謂之蔽或謂之箘秦晉之間謂之簙聳欲也皆强欲也山頂也自關而西秦晉之間相勸曰聳或曰中心不欲而由旁人之勸語亦曰聳凡相被飾亦曰䏁聾也半聾梁益之間謂之䏁言胎煩憒也秦晉之間聽而不聰聞而不達謂之䏁聾之甚者秦晉之間謂之􅫣言其無所聞知也恧慙也若梁益秦晉之間言心内慙矣弿展難也若秦晉之言相憚矣鋡龕受也猶秦晉言容盛也矔轉目也梁益之間瞋目曰矔轉目顧視亦曰矔嗌噎也皆謂􅍋痛也秦晉或曰嗌又曰噎誣䛳與也猶秦晉言阿與相阿與者所以致誣䛳也􅧞取也自關而西曰􅧞或曰狚蹇妯也謂躁也人不靜曰妯秦晉曰蹇挈持也秦曰挈禀敬也秦晉之間曰禀鋪頒索也猶秦晉言抖藪也謂斗藪舉索物也参蠡分也謂分割也秦晉曰離􅤙散也秦晉聲變曰􅤙器破而不殊其音亦謂之􅤙器破而未離謂之璺緍施也秦曰緍紕理也秦晉之間曰紕􅨣審也秦晉曰􅨣錯滅也周秦曰錯摳揄旋也秦晉凡物樹稼早成熟謂之旋絙竟也秦晉或曰絙或曰竟􅱅續也秦晉續折謂之繩索謂之􅱅喛恚也謂悲恚也秦晉曰喛皆不欲譍而强畣之意也凡尊老秦隴謂之公或謂之翁諄憎所疾也若秦晉言可惡矣肖𩔖法也秦晉之西鄙使犬曰哨西南梁益之間凡言相𩔖者亦謂之肖肖者似也自關而西秦晉之間凡言相責讓曰譙讓皮𫝊强也謂强語也秦晉言非其事謂之皮𫝊􅈩曬暴也秦之西鄙言相暴僇為膊暴僇謂相暴磔惡事暴五穀之𩔖秦晉之間謂之曬凡以火而乾五榖之𩔖關西謂之憊秦晉之間或謂之㷅凡有汁而乾謂之煎胹熟也自關而西秦晉之郊曰胹賀儋也自關而西謂之賀凡以驢馬馲駝載物者謂之負他亦謂之賀凡㦸而無刃秦晉之間謂之釨或謂之鏔謂其大者曰鏝胡泥鏝其曲者謂之鉤釨鏝胡卽今鷄鳴句孑㦸也三刃枝今㦸中有小孑刺者所謂雄㦸也其柄自關而西謂之柲或謂之殳箭關西曰箭箭者竹名因以為號劍削自關而西謂之鞞盾關西謂之盾車枸簍卽車弓也秦晉之間自關而西謂之枸簍輪關西謂之􅭿車紂自關而西謂之紂輨關之東西曰輨車釭自關而西謂之釭盛膏者乃謂之鍋舟自關而西謂之船泭謂之􅗝􅗝謂之筏筏秦晉之通語也屑屑不安也徃來之貌也秦晉謂之屑屑或謂之塞塞或謂之省省不安之語也頷頥頜也謂頷車也秦晉謂之頜頥其通語也築娌匹也今關西兄弟婦相呼為築里水中可居為洲三輔謂之淤上林賦曰行乎洲淤之浦也鼻始也梁益之間謂鼻為初或謂之祖祖居也鼻祖皆始之别名也轉復訓以為居所謂代語者也古筥字小者自關而西秦晉之間謂之箄麴也自關而西秦豳之間曰冢秦晉之間謂之墳取名於大防也或謂之培或謂之堬或謂之采古者卿大夫有采地死塟之因名也或謂之埌波浪或謂之壠有界埒似耕壟因名之注以上漢揚雄方言晉郭璞關中謂天為祆說文關中下俚人言音謂水為覇啟顔録中尚書本秦官尚音上今謂之常書者秦人音也至今秦人謂尚為常沈括補筆談潘邠老云花妥鸎捎蝶妥音堕乃韻不知秦音以落為妥上聲如曰雨妥花妥之𩔖少陵秦人也邵博聞見錄秦訛青字則謂青為萋謂經為稽老學菴筆記八米關中語歳以六米七米八米分上中下言在穀取八米取數之多也西溪叢話酒肆曰務酒罈曰瓨取物曰刁水滚曰尖渾者全也者長也促者短也頁者横也眼黑者憎惡也圪喇者言不順理也囊囊突突者背地短人也阿跌多者怪嘆聲也這搭此處也兀搭彼處也吃扎填早飯前食餅也開繫袍也主活筆也頗煩者厭棄不耐也虎淡者其人大不才也收拾幾下者管教子弟也亷耻幾句者呵叱子弟也晢者美也駭者醜也哥憎者可愛也乒乓者快也胡基者土坯也矢巴牛蜣蜋也打捶者厮打也鎮早晚者這時節也言喘者說話也稜吞者老大也不接撑者羞見人也其四鄉或以俺為噯以咱為才以父為逹以大為垜以地為剃以了為老謂祖母為阿婆伯母為阿姆嬸母為姨朋友中之長者稱為某師子曰娃小女曰女娃及笄者曰客人妻曰屋裡的山峪為豳韋姓為御惠姓為戱雎姓為徐岳丈為姨父岳母為姨臨潼縣志音鑚去聲水入土也坔與漫同水冒土上而流也卡音嗄食在喉中上不上下不下也今伏路兵亦謂之卡來與覷同三人不出頭也瞎同人入井也鑚同身入門中也碜同土入口也音迸火炒豆則迸也竧音掙能自立身也劉竧人名見宋史音班俗以為文武全才也因有取以為名者峁音夘山之岡坡皆謂之峁魚河堡有魚兒峁者是音蛙山之汚下也墕音煙兩山中臨溪之小徑也綏徳州有一歩墕者是垧晌同牛之耕地曰幾垧也音尋山之田不能畝計者曰㡬吉縫同土開口也野同音参荍麥仁也釘同冇無同梁俗呼山脊為梁俗呼器具為家使作此字吃噠亂說也圪音格勞去聲山之窩處也圪㙮小山相連峯起之名長樂浦東二十里有一湖傍起五沙峯俗名五圪㙮音格喇亦縫也猪猪音客婁小猪也虸􅢗神名卽虸蚄暹音先生俗呼瞽者之能巫卜也崾嶮山之過峽處也喜喜同俗以二吉為喜碼俗以碼碯之碼為法馬之馬又騙人曰碼馿是馬扁之訛變音便急走也然字去聲俗以麥稭和泥塗壁謂之草延綏鎮志方言字義雨霑足曰爛雨同州志雲之西雨湧泉雲之南水傾罈雲之東佇立空雲迤北耕穫得雲諺朝雨雖雨不雨老健春寒秋暑朝雲謡横雲不雨縱雲雨願為東風吹送汝雲謡星瞬目雨浸屋星諺大缻注小缻溢為雲水聲其下如建瓴畢星諺集李因篤化導文王徙都於豐而分岐州故地以為周公旦召公奭之采地且使周公為政於國中而召公宣布於諸侯於是徳化大成於内朱子詩傳周文王始居岐山之陽躬行召南之教以成王業至三分天下乃宣周南召南之化本其徳之初刑于寡妻至于兄弟以御于家邦故謂之鄉樂用之房中册府元龜關中華戎雜錯風俗勁悍欲以荆揚之化施之函秦此無異解衣包火張羅捕虎魏書崔浩傳正叔謂洛俗恐難化於秦人子厚謂秦俗之化亦先自和叔有力焉亦是士人敦厚東方恐難肯向風程氏遺書徳業相勸徳謂見善必行聞過必改能治其身能齊其家能敬父兄能教子弟能御僮僕能事長上能睦親故能擇交遊能守亷介能廣施惠能受寄託能救患難能規過失能為人謀能集衆事能解鬭爭能決是非能興利除害能居官奉職凡有一善為衆所推者皆書於籍以為善行業謂居家則事父兄教子弟待妻妾在外則事長上接朋友教後生御僮僕至於讀書治田營家濟物如禮樂射御書數之𩔖皆可為之非此之𩔖皆為無益過失相規過失謂犯義之過六犯約之過四不修之過五犯義之過六一曰􅒬博鬬訟二曰行止踰違三曰行不恭遜四曰言不忠信五曰造言誣毁六曰營私太甚犯約之過四一曰徳業不相勸二曰過失不相規三曰禮俗不相成四曰患難不相䘏不修之過五一曰交非其人二曰怠惰三曰動作無儀四曰臨事不恪五曰用度不節已上不修之過每犯皆書於籍三犯則行罰禮俗相交此行婚姻䘮塟祭祀之禮禮經具載亦當講求如未能遽行且從家傳舊儀世不經者當漸去之凡與鄉人相接及徃還書問當衆議一法共行之凡遇慶弔每家只家長一人與同約者皆徃其書問亦如之若家有故或與所慶弔者不相識則其次者當之所助之事所遺之物亦臨事聚議各量其力裁定名物及多少之數若氣分淺深不同則各從其情之厚薄凡遺物婚嫁及慶賀用幣帛羊酒蠟燭雉兎果食之𩔖計所直多少不過二千至一二百䘮塟始䘮則用衣服或衣段以為襚禮以酒脯為奠禮計直多不過三千少至一二百塟則用錢帛為賻禮用猪羊酒蠟燭為奠禮計直多不過五千少至三四百災患如水火盜賊疾病刑獄之𩔖助濟者以錢帛米穀薪炭等物計直多不過三千少二三百凡助事謂助其力所不足者婚嫁則借助器用䘮塟則又借助人夫及為之營幹患難相恤患難之事七一曰水火二曰盜賊三曰疾病四曰死䘮五曰孤弱六曰誣枉七曰貧乏凡同約者之財物器用車馬人僕皆有無相假若不急之用及有所妨者亦不必借可借而不借及踰期不還及損壊借物者皆有罰凡事之急者自遣人徧告同約事之緩者所居相近者及知者告於主事主事徧告之凡有患難雖同約其所知者亦當恤事重則率同約者共行之罰式犯義之過其罰五百不修之過及犯約之過其罰一百凡輕過規之而聽及能自舉者止書於籍皆免罰若再犯者不免其規之不聽聽而復為及過之大者皆即罰之其不義已甚非士論所容者及累犯重罰而不悛者特聚衆議若決不可容則皆絶之聚㑹具每月一㑹具食每季一會具酒所費率錢令當事者主之遇聚會則書其善惡行其賞罰若約有不便之事共議更易主事約正一人或二人衆推正直不阿者為之專主平決賞罰當否直月一人依長㓜輪次為之一月一更主約中雜事以上藍田呂氏鄉約子孫才分有限無如之何然不可不使讀書貧則教訓童稚以給衣食但書種不絶足矣能布衣草履以事農圃足跡不至城市大是佳事闗中村落有魏鄭公莊諸孫皆為農張浮休過之留傳云兒曹不識字耕稼魏公莊仕宦不可常不仕則農可無憾也但切不可迫於衣食為市井小人戒之陸游緒訓横渠張子患世喪祭無法喪僅隆三年期以下恬未有衰麻之變祀先之禮用流俗節序祭以䙝不嚴於是勉修古禮為薄俗倡期功而下為製服輕重如儀實始行四時之薦曲盡誠潔教童子以洒掃應對給侍長者女子未嫁者必使觀於祭祀納酒漿以養遜弟而就成徳甞曰事親奉祭豈可使人為之聞者始或疑笑終乃信而從之相傚復古者甚衆關中風俗為之大變關學編省㑹風氣近古諸凡禮節頗有先民之意苐恐久而寖失其初是不可不一申之冠婚喪祭當以㑹典家禮為主至冠禮久已不行尤望諸公亟倡之士夫經年不一靣恐非吾軰一體之誼擬於每年正月初六日各携餅四器酒一樽同至一公所公拜二拜再拜二拜以見相答已時赴㑹申時散㑹中有年高歩履不便者公除餅果四器酒一尊送至其家非有大不得已事不可不到彼此徃拜俱用單帖止後軰於前軰用折柬一次其前軰亦只用單帖答後軰途遇前軰下車立道左俟前軰過方登車如年歳及科目相近者或彼此下車相揖或車中拱手旣别不必差人拜上彼此徃拜務要相見不可槩以不在辭如坐談時久隨便出一餅一果用之不必設桌以滋靡費彼此稱謂或字或號不必稱翁惟後軰於前軰仍用翁字以見鄉黨重齒之意彼此爭搆吾軰所無萬一有之大家務要盡心勸和勿令因小忿以傷大體至於外侮之來雖聖賢所不能免吾軰中倘有無故遭此者大家亦當左右維持無令失所士夫宦遊歸及公事過家者吾軰為主人當先有一拜越數日其客囘拜卽主人中有年高歩履不便者或莊居不知者不必論其先施否亦當徃拜仍當下車登堂以候安否不可過門止投一刺其燕㑹禮文俱當節省如中有至親同年不在此例中有新選及出差陞轉過家者各捐分金一兩其餘願捐者聽中有年老無子或有子而貧甚者每年公具分金若干以助之其異日夀器賻奠仍當破格存厚異日中有大故公具分金若干為賻塟時再具若干為祭公舉外私舉者隨便士夫之後有貧乏不能度日者亷實量給資本以慰先世於既徃以存厚道於將來士風薄惡莫過於投遞掲帖以後凡有縁門投遞者衆共絶之不必接覽吾鄉士風雅稱恬靜而近日諸長者尤多閉户寡營絶口不談時事苐恐無知之人指稱吾軰或揑冩連名假書囑托當路或擅借一二名號傳帖相約甚至無名之帖頃刻傳遍而莫知所自闗係一方士風不小今後吾軰遇此不妨過於詳慎馮少墟闗中士夫約百姓奢僭之端亦有其漸相沿不止勢且繁多濫氣僭風皆足致異某忝為令長難以坐視用示相禁共惜物力安民志以迓天庥嫁娶聘禮粧奩宦家士庶各有品式金銀布帛􅁫環等物亦有定數宜減不宜増願加厚者止許於嫁娶後陸續増置不得於嫁娶前違約過増喪禮欵客宜禁初喪是何時候而暇備酒設肴凡親友相弔本縣本鄉一揖徑出十里以内者一茶十五里以外者一飯富家自備士庶不能備飯者隣里族人公分代備陪喪者欵之臨塟紙扎人馬幢幡之𩔖俱不得過二十件以省無益之費至臨塟設臺作戱扮隊搶紅雜耍等項尤宜嚴禁孝子哀痛之際何得有供人戯樂之情且禮云隣有喪舂不相親戚朋友亦何忍向喪家此一時博耳目之快也白丁衙役及各僕𨽻止穿青布衣至青屯絹而止不可擅穿紬縀紗羅不可登顔色鑲履婦人士庶之家不許著織金粧花洒線補服并束銀帶僕𨽻之婦不許戴金銀珠玉首飾著紬縀紗羅等服止穿梭布夏布房屋非有職之家不許擅立脊獸及花磚雕墻宦家吹手不得過六名鼓樂不得過十二名士人吹手不得過四名鼓樂不得過八名吹手庶人之家不得擅用鼓樂不得過六名士民衣服不許服紅紫黄色以上諸欵守分省財心安禮盡正合人厭奢返儉之心且明僭不可長之義久行之而百姓純朴獄訟不煩各守尺幅而無有踰越不犯天忌和氣以興風雨以時盜賊不作未有不繇此者也惟望薦紳首倡士民或有不遵者其共有以繩之韓城令左懋第崇儉書從來治理準乎風俗風俗視乎人情郃陽有莘古地聖人之化相傳宜其風淳俗古乃人遺理而任氣家從薄而棄忠揆受弊所由皆因謬待父母乖張子分以致婚姻之地亦思用貪訟獄之興全不顧義今敬約薦紳耄士耆老議為正俗大畧先飭喪禮十則以治太甚次婚禮四則輕生二則女誡二則悉逐𩔖附焉郃陽令郭𫝊芳正俗畧宴㑹人所不廢禮重初筵易言酒食從來逺矣自風㑹日流甚至窮水陸之珍以恣口腹連日夜之飲以罄交歡不知沉􅊺饕餮古人所戒而日食萬錢禍且隨之則以簡易煩以儉易奢尤當急講者也柬用古折兩幅有吉慶用紅亦兩幅亦不用套如話長多増一二幅亦不用䕶封至於請啟不用速帖次日亦不必送謝稱謂止稱字不稱號稱某兄若官長稱某大人不許台臺及翁老字様尋常宴㑹兩人一桌每桌不過八器湯飯不過三巡品味皆本土所産不許越境置買竒異之物以滋妄費然亦湏豐整香潔堪以適口殺生古人所戒惟是祭享賔筵不能盡廢竊恐潦畧太甚客以為簡然止取成禮不必求備羊豕雞魚之外不許多宰鴨鵝鴿鶉等物以博客喜客有從役餅一盤酒二壺預置於各位桌下客飯畢將饌餘頒賞席間坐談止許問候起居及課子明農量晴較雨探節數時不許言及朝政及陞除事若官長有司長短當絶口勿談王嗣美宴㑹約易崇婚媾詩首闗雎書言釐降婚嫁結二姓之歡通秦晉之好非為利也世俗女家倚恃門第索禮不貲男家不資其勢則利其有及六禮已成奠鴈有期百兩之迎車馬供張媵侍服飾之盛充街塞巷其一時奢華鄉里小兒嘖嘖􅃩羡于歸後男家猶以為薄無㡬何債主臨門坐而責負遂闔室詬怨兩姓失歡甚且有雀角䑕牙之爭亦何益哉凡結姻須擇平日門第相等道義相契及父母素有家教者如古朱陳世世結好庶嫌疑不生可保永久徒羨一時富貴不旋踵氷山一解利盡勢散則前日富貴如石火水泡豈久要之至計耶大家聘禮不過五十幣不過八端衣服首飾之外再加油桌茶果羊酒亦自成禮然止許一次近有挿定納采重復繁瑣令人難支其次二十金再次十金下焉者卽雞酒亦可成婚四季追節禮止許蒸爐豚首果酒亦要豐潔鮮整不必用幣用羊異日女家亦照此行嫁女粧奩箱櫃大小不過八桌椅不過二牀止用一不必八鋪螺墊等令價高難置牀帳門簾止用厚紅縑子為之不必首帕札花紬縀器皿止用本地榆槐木自造亦湏堅厚堪以久逺不必彩漆粧畵然此為上等之家言之其次則不在此例首飾不用全副女冠花素不過二頂大小著中至妙常等冠誨淫導侈殊為可厭縉紳之家尤宜戒之簪掠戒指數不過十手鐲一雙自造慎勿換解汾烏銀贗物服飾當遵古制衫袖務要著中不用蘓袖及時様荔紅柿黄等色陪女冬夏上衣紬縀紗羅不過十身其次以厚縑為之亦不許置買江南札花衮龍等服不惟費物亦且違制至於下體之裳當盡用布取其汚後易澣女紅婦人正事也枕頂禮鞋皆嫁後拜人之禮即多不為過女子歸後翁姑督責過嚴或爭粧奩不豐及歸寜則泣訴於本生父母致兩家不睦甚且率衆相毆爭訟不已以後如有此等本生父母必湏含忍教導寜柔無剛寜歸罪於女母歸怨於人庶翁姑聞之亦必悔改王嗣美婚姻約邇來風俗侈靡極矣而䘮塟為尤甚夫喪主哀戚而選伎徵歌以滋歡娯非孝也幡幢用楮而加以段帛綵繒非制也隻雞絮酒可代生芻而金玉寳玩以侈觀覽非情也生無人非死亦無鬼責而佞佛飯僧以脫獄苦是誣也近日喪家多預請親友有力者搭祭以為祖道棚高數丈飾以文采中擺古董器玩錦軸古畫燦爛盈目近又添金銀寳玉等物以炫耳目不惟賃借所費不貲且旁觀睥眤大起戎心更當戒也近日喪家虞人以恡吝儉親為譏多高築樓臺飾以綵繡廣招樂伎以滋懽笑倒行逆施莫此為甚以後止照文公家禮有仍前淫侈者罰輪迴轉生原係乾竺氏假設以戒為惡者耳近日惑於幽冥之說多延請緇黄廣修醮事以祈冥福且解地獄之厄夫親在生前豈盡作孽為人子者一概妄事祈免是昭親之過也若飲食經醮之費又其餘矣尊尚異端悖違名教尤非縉紳所宜有喪家親戚預贈五色大幢懸之家衢爭竒誇勝近又易紬縀彩幣不惟導侈且隣於恃財以後喪家自備素幢二杆以示有喪至於親戚隨便相贈成禮而止棺椁塜壙碑石芻狗視官爵崇卑㑹典原有定制近日棺椁五彩粧漆尺寸無度塜壙有高數丈者華表麒麟翁仲芻狗等亦多擅用不經之物不惟越制竊恐地下受之心亦不安祭品舊制止猪羊餚饌食桌香楮已耳卽縉紳之家亦不過加一誄文與素帛二端近日廣設方丈盈街塞衢甚至有九走十飛剪縀帛為花鳥等物殊非禮制以後湏力挽澆風歸於雅道諛墓之文及請貴人㸃木主謝后土惟士大夫家可行庶民及婦人無徳可述似亦不必近日殷實有力者不論有爵無爵一概求當代達官作誌以為泉壤光中且奬許溢分増其所無夫畫工冩真止取其像已耳卽峩冠博帶儼然若神於自己祖父何千反而思之必有良心悚動者王嗣美喪塟約紳士為一邑之望言行湏標典型於里黨近俗每小不平輒成憤激最傷雅道不知今日茂才乃他日鄉紳今約每歳秋冬暇日紳士各集公所講習揖讓紳無驕士無傲相親相愛亦善俗之首務也移風易俗莫妙於儉乃人情由儉入奢易由奢入儉難使人人明於寜儉寜固之義則必謹身節用有不復隆古之風俗者吾未之聞也楊用晦教化約童䝉入學倣傚古禮以鮮菜四色或果盒酒肉為贄見禮初見一揖執贄畢再揖禀拜先生受兩拜答兩拜拜畢先生升座新舊學生分班對拜舊者居左新者居右總兩拜拜畢授書楊用晦䝉飬約婦人之髻卽冠也明季只以鐵絲為之覆以烏紗士民之家無異同其後士夫秀才之家漸用五梁髻以金飾之百姓家不敢僭也今則五梁髻徧國中野外矣而且為金髻銀髻珠髻玉髻髪髻翠髻字髻為鬆頭為精頭為垂髪頭時様有一歳而三易者至女歸之初頭戴者純用金玉珠翠實不勝任而猶以為未備物華何淫奢至如是之甚也衣服先輩止取質朴私居不過白布直身見有服羅縀者則以為刺眼今俗不遵古制日服綾羅彩縀時興花様日新月盛甚至衵衣皆用綾綺竪子皆服織錦招揺市肆以誇耀閭里至婦人女子服花袍蟒袍猶以為非時尚也有時而服五彩繡花袍者矣有時而服織金大紅袍者矣富效貴貧效富日盛一日恬不知恥世道江湖砥柱屬誰良可浩歎楊用晦冠約舊俗納采之禮貧家不過五六金富家不過十數金幣不過四端而已蒲俗近日娶一嫠婦輒百五十金結婚財禮亦至百金幣則一二十端至納采之日女家大張鼓樂盛設珍饌沉􅊺徹夜所得財禮盡行花費亦愚甚矣今約桌不過八幣不過四財禮稱家貧富宴㑹不容多客傍晚罷飲主賔各留不盡之意親迎之日鄉人樹采棚於閭巷結采樓於門首有儐賛有盒酒今則俱廢矣但親迎則必執雁以為贄蒲俗不知雁為贄禮至女家而先拜雁男女入本家而先拜廟皆非禮也宜改之出嫁裝資蒲俗日事浮靡今擬倣古意以行之鋪設次第宜以布素陳之前列用比於明水疏布次乃陳織紡炊㸑等器次抑搔盥巾等器次列果品次女誡一册屬平日講習者諸凡牀帳箱櫃俱隨其後是雅俗不相掩而情禮兩無所失也楊用晦婚約蒲俗凡民有喪不論有服無服槩以疏麻為冠白布裹頭名曰散孝反是者􅅓以為薄其親隨俗者寜衣衾棺椁在所缺而散孝服必不容已夫王制未有散孝之禮習尚不變不亦大惑不解乎秉禮君子毅然革之以起敝維風可也蒲俗自期以下不更製服隨便用家常素冠素衣素帶遂謂成服不知此特燕居之服耳更且有止帶一素冠衣履之𩔖或參用有色白紵白紗雖素也亦錦𩔖也在戚而有嘉容忘哀甚矣禮服期功緦麻自有定制蒲俗自小功以下多有不行間有行之者必其門内之親不然亦情所極暱如甥舅相為服外此而中表兄弟亡之矣三從之兄弟姊妹亡之矣夫父黨之服由父而推母黨之服由母而推薄其黨服非薄吾父母耶思之思之蒲俗小民有盡孝者每過於禮其守制必滿三十六月士大夫守制必滿二十八月又有執祖父之喪不論承重與否必皆披跣其於伯叔父母期功緦麻之服𩔖多斬衰此雖喪過乎哀然讀書知禮者亦當使衆人講習之楊用晦喪約一至親厚友餽送有折儀古時禮銀不過三分五分以至一錢而止有携盒酒相賀者有三五相約共一盒酒者客入門與主人一揖舉觴行酒賔主酬酢俱不過三情意亦自周洽近日煩文加厚所費不貲或較量成怨風尚之惡以至於斯今約大禮不宜茍簡若尋常賀奠自一錢至三二錢亦可矣賀夀古者以八十為上夀近世常慶七十有慶六十者然十年一舉猶不甚侈今蒲俗不拘老少每歳生日大張宴樂此無名之費也或有老年借此聚樂小集可已楊用晦徃來約設席不宜過豐古人請客每桌止設餚四大盤四人圍坐飯一餐酒數行午刻至食畢而散蒲俗乃治辦累日方敢發簡多戕物命多費貲財多折福分或至薄暮或徹夜乃散豈無亂爼豆失歡好為賔筵羞者今擬饌只用六簋一二湯㸃勸飽果用三品止期可口小碟七八葷素蔬果間之卽新親宴㑹聊加數簋果加一二品飯加一二餐其看花大席五牲俱不宜用若適然相知一二簋可也楊用晦宴㑹約萬厯中年新生入學不敢與前輩並肩相見時則稱曰齋長或長者有事則執弟子之禮不以為詘及冠巾時又有折儀以餽齋長今約凡在本族尊者雖仕宦不得上坐遇父執及相知高年必容必下氣禮云敬老為其近於父敬長為其近於兄敬吾父兄成吾孝弟國人興讓又何難乎楊用晦揖讓約田野人家材用豐隆起造房室便極其高廣不知屋宇太高大則隂氣勝而人氣不足以充之昔人云高明之家鬼瞰其室居者且多不利奈何曠安宅而弗居也耶楊用晦房室約蒲俗宦家之僕遇主翁親識屬在貧寒者即與抗禮且褻越之至族黨尊長且凌侮之其主恬然不為異此詎非名分倒置風俗之最惡者乎以後僕人犯此者宜重懲之楊用晦僕從約贍族義田昔范文正公行之但職掌難其人恐日後不免中廢耳今約族衆中有極貧不能舉火者各與義田數畝使盡力耕作以資餬口閭里子弟有俊秀貧苦不能向學者不無可惜今約設義學一所延師一人公處束修之費以教訓貧寒子弟使異日有成立照此續行勿令中廢里中有節孝仁義出自委巷者不必論會否相識有無徃來俱宜凑集公分或備禮物或具牌扁以發潛徳甚有孀居守志無所依賴貧不能自保者亦勸義出粟布同相親者周濟之以堅其貞志小民非能壊風俗以觀望所不在也其惟士大夫之責歟士大夫百凡炫耀衆皆恱之其為士者笑之百凡儉約衆皆效之其為士者重之則好尚不可不慎也楊用晦立徳約生我家者父母覆載我家者天地至於覆庇我家安養教衛我家者大君也故教家以忠君為第一義身膺仕籍者湏教之國爾忘私公爾忘身方事進取者湏教之矢志致主立心報國即畎畝耕稼之人亦湏教之急公尚義安分守法如此則永不犯公法長得樂生理即成一康寜順泰之家而父母兄弟妻子羣享其䕃息矣故忠君一事又所以安父母安兄弟安妻子之原本也南人無生子不教讀書者此意甚好盖人性本善一經讀書無論氣質好者可望成就即中材能識得三二分義理亦是保身保家之道我北人見淺但家貧便不令子孫讀書甚且闔鄉百十家無一䝉師此風最是可惜日後子弟但非癡聾瘖啞當七八歳後必湏令之從師讀書下些義理種子王心敬家訓潼惟西京之舊風豈不美近或户族不睦兄弟相訟憤怒輕生婚姻論財徃徃重利而忘義者習俗使然也然則何以挽之曰講鄉約鄉約一法古者鄉三老遒人木鐸之遺意所以佐縣官之不逮而興行教化者也縣門舊制設旌善申明二亭以約正老人司之勸人改過遷善故越訴有笞顧寜人炎武註之曰謂民詞不由鄉約調理竟赴縣告者即為越訴非謂越縣而府越司而之院也鄉約之法行則刑省矣而王文成呂文簡兩先生於講約尤三致意焉文成公之法曰立約所於道里均平之處推年高有徳衆所推服者一人為約長二人為約副公直果斷者四人為約正精健亷幹者四人為知約禮儀習熟者二人為約賛置文書三一書姓名及日之所為知約司之一書彰善一書糾過約長司之彰善之辭顯而決糾過之辭隠而婉蓋不輕棄人於過而欲引之同歸於善也其要曰一念而善即善人矣一念而惡即惡人矣文簡公之法曰在城在鎮以百家為率孤莊村落以一甲為率立約正約副約講約史各一人選公道正直者充之其十甲之中亦擇一長一甲之中自有四鄰以交相勸戒焉約所設鐸書講案傍竪一碑碑上書天地神明紀綱法度八字紀善有簿紀惡有簿和處有簿改過有簿其所以引人去不善而即於善者至詳且盡于京竊有意焉因訪其老成謹厚者在縣設鄉約十六名合十二鎮共設鄉約一百十名務使實心講約俾百姓蒸蒸然感動庶百里聨為一體萬姓聫為一家可望其風移而俗易矣盩厔徵君李顒聞之遣其門人程伊藻以通海鄉約要言舊制一册示京附以司牧寳鑑蓋欲堅吾之志也臨潼令趙于京風俗志舊制天下各州縣之鄉設立社學社倉以養䝉正以備饑荒又制各處鄉村人民每里一百户内立壇一所祀后土五穀之神每歳一户輪為㑹首遇春秋社日用羊豕各一牽祭畢㑹飲先令一人讀鋤强扶弱之誓其詞曰凡我同里之人各遵守禮法毋恃力凌弱違者先共制之然後經官或貧無可贍周給其家三年不立不使與㑹其婚姻喪塟之資隨力相助如不從衆及犯奸盜詐偽一切非為之人並不許入㑹讀誓詞畢長㓜以次序坐盡歡而退又制每里立壇一所祭無祀孤魂凡此盛典皆所以禮鬼神敦風俗也藍田縣志萬厯間知州王邦俊在城立總約一所舉徳行耆宿五人為約正副教讀童生冀允昇等為約講在大雲下寺每月二次遵行四鄉各就舖舍為鄉約所皆擇年長有徳行者為約正副共三十九所約正副教讀木鐸各二人講學明倫以維風俗彰善紀惡以示勸懲商州志陜西通志巻四十五
