body:
  text: 陜西通志卷七十六紀事第一古昔國君左右有史乘與檮杌實維載紀矧此舊邦政有張弛戰甘伐崇玁狁宻邇漢唐鼎移氐羌蠭起巡狩會盟命將岀使鍳於往時得失臧否闗内編年綱目竊取作紀事志第二十九唐虞帝堯五十載帝觀于華堯觀乎華華封人曰嘻請祝聖人使聖人壽富多男子堯曰辭多男子則多懼富則多事壽則多辱封人曰天生萬民必授之職多男子而授之職何懼之有富而使人分之何事之有天下有道與物皆昌天下無道修徳就閒千嵗厭世去而上仙乘彼白雲至於帝鄉何辱之有南華經山按注華西岳名七十四載虞舜攝位巡于西岳八月西巡狩至于西岳如岱禮虞書舜典帝堯七十四年舜巡狩四岳竹書紀年舜八月巡狩至西岳西岳華山也史記封禪書夏后啟三嵗王帥師伐有扈大戰于甘大戰于甘乃召六卿夏書甘誓啟即天子位有扈氏不服啟伐之大戰于甘將戰作甘誓乃召六卿申之遂滅有扈氏史記夏本紀是按地理志扶風鄠縣扈國帝癸三嵗畎夷侵岐后桀之亂畎夷入居邠岐之間後漢書西羌傳后癸三年畎夷入於岐以叛竹書紀年六嵗岐戎來賔帝癸六年岐踵戎來賔竹書紀年二十二嵗公劉遷國於豳篤公劉于豳斯館涉渭為亂取厲取鍛止基迺理爰衆爰有夾其皇澗遡其過澗止旅迺宻芮鞫之即詩經大雅公劉在戎狄之間復修后稷之業自漆沮渡渭取材用正義曰公劉徙漆水南渡渭水至南山取材木為用也百姓懐之多徙而保歸焉周道之興自此始史記周本紀夏道衰而公劉失其稷官變於西戎邑於豳匈奴傳商王小乙二十六祀古公亶父自豳遷岐改國號曰周古公亶父來朝走馬率西水滸至于岐下詩經大雅天作髙山太王荒之周頌古公亶父復修后稷公劉之業薰育攻之欲得地與民民皆怒欲戰古公曰殺人父子而君之予不忍為乃與私屬遂去豳踰梁山止於岐下豳人扶老攜弱盡復歸古公於岐下他旁國亦多歸之于是古公乃營築城郭室屋而邑别居之史記周本紀古公去豳處岐周居三月成城郭一年成邑二年成都而民五倍其初吳越春秋王武乙三祀王賜周岐地武乙三年命周公亶父賜以岐邑竹書紀年王辛六祀周始禴于畢帝辛六年周文王初禴于畢竹書紀年縣按畢在今咸陽西北十三祀西伯獻洛西地請除炮烙之刑許之紂囚西伯于羑里閎夭之徒求有莘氏美女驪戎之文馬有熊九駟他奇怪物因殷嬖臣費仲獻之紂紂大悦曰此一物足以釋西伯況其多乎乃赦西伯賜之弓矢斧鉞使西伯得征伐曰譛西伯者崇侯虎也西伯乃獻洛西之地以請紂去炮烙之刑紂許之史記周本紀十四祀虞芮質成于周虞芮質厥成詩經大雅虞芮之君相與爭田乆而不平乃相與朝周入其境則耕者讓畔行者讓路入其邑男女異路斑白者不提挈入其朝士讓為大夫大夫讓為卿二國之君感而相謂曰我等小人不可以履君子之庭乃相讓以其所爭之田為閒田而退天下聞而歸者四十餘國詩傳十五祀西伯田于渭陽吕尚葢嘗窮困年老矣以漁釣干周西伯西伯將出獵卜之曰所獲非龍非彲非虎非羆所獲霸王之輔于是周西伯獵果遇太公于渭之陽與語大悦曰自吾先君太公曰當有聖人適周周以興子真是耶吾太公望子乆矣故號之曰太公望載與俱歸立為師史記齊世家十六祀西伯徙都于程依其在京侵自阮疆陟我髙岡無矢我陵我陵我阿無飲我泉我泉我池度其鮮原居岐之陽在渭之將詩經大雅文王在周之京而所整之兵既遏宻人遂征阮疆而出以侵宻於是相其髙原而徙都焉所謂程邑也其地於漢為扶風安陵今在京兆府咸陽縣詩註維三月既生魄文王合六州之侯奉勤于商商王用宗讒震怒無疆諸侯不娛逆諸文王文王弗忍乃作程典以命三忠汲冢書十九祀西伯伐崇因作豐邑徙都之既伐于崇作邑于豐詩經大雅文王聞崇徳亂而伐之軍三旬而不降退修教而復伐之因壘而降左傳紂赦西伯賜之弓矢鈇鉞得征伐西伯伐崇侯虎而作豐邑自岐下而徙都豐史記周本紀鄠按詩註豐即崇國之地在今縣杜陵西南周立靈臺于豐經始靈臺經之營之庶民攻之不日成之詩經大雅昌二十九年伐崇侯作靈臺周易乾鑿度文王作靈臺及為池沼掘地得死人之骨吏以聞文王曰葬之吏曰此無主矣文王曰有天下者天下之主也有一國者一國之主也寡人固其主又安求主遂令吏以衣棺更葬之天下聞之皆曰文王賢矣澤及枯骨又况于人乎或得寳以危國文王得朽骨以喻其意而天下歸心焉劉向新序周武王十三年春二月王遷都于鎬考卜維王宅是鎬京詩經大雅鎬京武王所營也在豐水東去豐邑二十五里詩註夏四月王至自伐商惟一月壬辰旁死魄越翼日癸巳王朝步自周于征伐商厥四月哉生明王來自商至于豐乃偃武修文歸馬于華山之陽放牛于桃林之野示天下弗服周書武王伐紂居酆鎬放戎夷涇洛之北以時入貢命曰荒服匈奴傳成王五年大蒐于岐陽成王有岐陽之蒐左傳成王歸自奄大蒐于岐山之陽杜註昔者成王盟諸侯于岐陽楚為荆蠻置茆蕝設望表與鮮牟守燎故不與盟外傳七年春二月王自周至豐周公攝政七年二月成王自鎬京至豐以遷都事告于文王廟孔氏書疏十年王游于卷阿有卷者阿飄風自南豈弟君子來游來歌以矢其音詩經大雅召康公從成王游歌于卷阿之上因王之歌而作此以為戒詩註三十年驪戎來告兵成王三十年離戎來賔注離戎驪山之戎也為林氏所伐告于成王竹書紀年穆王元年春正月作昭宫元年己未春正月王即位作昭宫竹書紀年冬十月築祗宫于南鄭自武王至穆王享國百年穆王以下都于西鄭竹書紀年注九年築春宫王所居有鄭宫春宫竹書紀年注十四年夏作范宫五月作范宫竹書紀年懿王元年徙都槐里自懿王為政周綱不振王室始衰徙都于槐里雍大紀懿王自鎬徙都犬丘一曰廢丘今槐里是也索隱七年西戎入冦懿王七年西戎侵鎬竹書紀年十三年翟入冦懿王十三年翟人侵岐竹書紀年厲王三十六年西戎入冦秦仲立三年周厲王無道諸侯或叛之西戎反王室滅犬丘大駱之族史記秦本紀宣王元年命秦仲討西戎宣王即位乃以秦仲為大夫誅西戎史記秦本紀命尹吉甫帥師伐戎玁狁孔熾我是用急王于出征以􅋌王國詩經小雅成康既沒周室寖衰八世而厲王胡暴虐周人逐之出居于彘玁狁内侵逼近京邑宣王即位命尹吉甫帥師伐之有功而歸詩人作歌以叙其事詩傳茹按詩玁狁匪整居焦穫侵鎬及方至于涇陽焦穫鎬京皆京畿地六年秦仲伐西戎死之王命其子伐戎破之西戎殺秦仲秦仲有子五人其長者曰莊公宣王乃召莊公昆弟五人與兵七千人使伐西戎破之於是復予秦仲後及其先大駱地犬丘并有之莊公居其故西犬丘史記秦本紀幽王六年戎圍犬丘襄公二年戎圍犬丘世父世父擊之為戎人所擄嵗餘復歸世父史記秦本紀十一年申侯以犬戎入冦戎弑王于驪山幽王嬖愛襃姒欲廢申后并去太子宜臼以襃姒為后以伯服為太子周太史伯陽讀史記曰周亡矣昔自夏后氏之衰也有二神龍止于夏帝庭而言曰余襃之二君夏帝卜殺之與去之與止之莫吉卜請其漦而藏之乃吉於是布幣而策告之龍亡而漦在櫝而去之夏亡傳此器殷殷亡又傳此器周比三代莫敢發之至厲王之末發而觀之漦流于庭不可除厲王使婦人裸而譟之漦化為黿以入王後宫後宫之童妾既齔而遭之既笄而孕無夫而生子懼而去之宣王之時童女謠曰檿􅓡箕服實亡周國於是宣王聞之有夫婦賣是器者宣王使執而戮之逃于道而見鄉者後宫童妾所棄妖子出於路者聞其夜啼哀而収之夫婦遂亡奔於襃襃人有罪請入童妾所棄女子者于王以贖罪棄女子出于襃是為襃姒當幽王三年王之後宫見而愛之生子伯服竟廢申后及太子以襃姒為后伯服為太子太史伯陽曰禍成矣無可奈何襃姒不好笑幽王欲其笑萬方故不笑幽王為烽燧大鼓有冦至則舉燧火諸侯悉至至而無冦襃姒乃大笑幽王悦之為數舉烽火其後不信諸侯益亦不至幽王以虢石父為卿用事國人皆怨石父為人佞巧善諛好利王用之又廢申后去太子也申侯怒與繒西夷犬戎攻幽王幽王舉烽火徵兵兵莫至遂殺幽王驪山下擄襃姒盡取周賂而去於是諸侯乃即申侯而共立故幽王太子宜臼是為平王以奉宗祀史記周本紀平王元年始命秦為諸侯賜岐豐地周辟犬戎難東徙雒邑襄公以兵送平王王封襄公為諸侯賜之岐以西之地曰戎無道侵奪我岐豐之地秦能攻逐戎即有其地與誓封爵之襄公於是始國而與東諸侯通使聘享之禮史記秦本紀犬戎殺幽王遂取周之焦穫而居於涇渭之間侵暴中國秦襄公救周於是平王去酆鄗而東徙雒邑匈奴傳秦祀上帝於西畤秦用駵駒黄牛羝羊各三祠上帝西畤史記秦本紀秦立西畤祠白帝年表襄公始列為諸侯自以居西故作西畤索隠九年秦徙居􅊈渭秦襄公十二年伐戎至岐卒生文公文公元年居西垂宫三年以兵七百人東獵四月至􅊈渭之㑹曰昔周邑我先秦嬴于此後卒獲為諸侯乃卜居之占曰吉即營邑之史記秦本紀十按竹書書秦遷于􅊈陽在平王年今從綱目前編十五年秦作鄜畤秦文公十年作鄜畤史記年表於鄜地作畤故曰鄜畤索隠文公夢黄蛇自天下屬地其口止於鄜衍文公問史敦敦曰此上帝之徵君其祠之於是作鄜畤用三牲郊祭白帝焉漢書郊祀志二十一年秦伐戎収岐西地以岐東地歸于王秦文公十六年以兵伐戎戎敗走于是文公收周餘民有之地至岐岐以東獻之王史記秦本紀桓王六年冬秦徙居平陽秦寧公二年徙居平陽史記秦本紀平陽故城在岐州岐山縣秦寧公徙都之處括地志七年秦滅蕩社秦寧公二年伐蕩社三年與亳戰亳王奔戎遂滅蕩社史記秦本紀西戎之君號曰亳王葢成湯之裔其邑曰蕩社索隠言按徐廣注蕩社一作湯杜􅣚邑在杜縣之界十二年秋秦人侵芮芮伯萬之母芮姜惡芮伯之多寵人也故逐之出居于魏秦師侵芮敗焉小之也冬王師秦師圍魏執芮伯以歸十八年秦人納芮伯萬于芮左傳馮按通典同州翊縣古芮國二十三年秦伐彭戲氏秦武公元年伐彭戲氏至於華山下居平陽封宫史記秦本紀州按正義戲戎號葢同彭衙故城莊王十一年秦滅小虢秦武公十一年初縣杜鄭滅小虢史記秦本紀雞按虢故城在寳縣東僖王五年秦徙居雍秦徳公元年初居雍城大鄭宫以牲三百牢祠鄜畤卜居雍後子孫飲馬於河梁伯芮伯來朝史記秦本紀惠王五年秦作宻畤秦宣公四年作宻畤史記年表秦宣公作宻畤于渭南祭青帝括地志晉人伐驪戎晉伐驪戎驪戎男女以驪姬歸生奚齊其娣生卓子左傳初獻公將伐驪戎卜曰齒牙為禍及破驪戎獲驪姬愛之竟以亂晉史記晉世家十七年春虢公敗犬戎于渭汭春公敗戎于渭汭舟之僑曰無徳而禄殃也殃將至矣遂奔晉紀事年表二十三年春晉公子夷吾奔梁晉侯使賈華伐屈夷吾不能守將奔狄郤芮曰不如之梁梁近秦而幸焉乃之梁左傳少按括地志韓城縣南梁故城古梁國五年冬晉乞糴於秦冬晉薦饑使乞糴於秦秦伯謂子桑與諸乎對曰重施而報君將何求重施而不報其民必攜攜而討焉無衆必敗謂百里奚與諸乎對曰天災流行國家代有救災恤隣道也行道有福㔻鄭之子豹在秦請伐晉秦伯曰其君是惡其民何罪秦於是乎輸粟於晉自雍及絳相繼命曰汎舟之役左傳六年冬秦乞糴於晉晉不許遂發兵伐秦晉惠公五年秦饑請糴於晉晉君謀之慶鄭曰以秦得立已而倍其地約晉饑而秦貸我今秦饑請糴與之何疑而謀之虢射曰往年天以晉賜秦秦弗知取而貸我今天以秦賜晉晉其可以逆天乎遂伐之惠公用虢射謀不與秦粟而發兵且伐秦史記晉世家七年冬晉侯及秦伯戰於韓獲晉侯晉侯之入也許賂秦伯以河外列城五東盡虢畧南及華山内及解梁城既而不與晉饑秦輸之粟秦饑晉閉之糴故秦伯伐晉三敗及韓晉侯逆秦師使韓簡視師復曰師少於我鬬士倍我公曰何故對曰出因其資入用其寵饑食其粟三施而不報是以來也今又擊之我怠秦奮倍猶未也公曰一夫不可狃况國乎遂使請戰壬戌戰於韓原晉戎馬還濘而止公號慶鄭慶鄭曰愎諫違卜固敗是求又何逃焉秦獲晉侯以歸晉大夫反首拔舎從之左傳晉興兵將攻秦繆公發兵使丕豹將自往擊之與晉惠公夷吾合戰於韓地晉君棄其軍與秦争利還而馬鷙繆公與麾下馳追之不能得晉君反為晉軍所圍晉擊繆公繆公傷於是岐下食善馬者三百人馳冒晉軍晉軍解圍遂脱繆公而反生得晉君初繆公亡善馬岐下野人共得而食之者三百餘人吏逐得欲法之繆公曰君子不以畜産害人吾聞食善馬肉不飲酒傷人乃皆賜酒而赦之三百人者聞秦擊晉皆求從從而見繆公窘亦皆推鋒争死以報食馬之徳史記秦本紀原按括地志韓在同州韓城縣西南王命秦伯釋晉侯繆公擄晉君以歸令於國齋宿吾將以晉君祠上帝周天子聞之曰晉我同姓爲請晉君夷吾姊亦為繆公夫人夫人聞之乃衰經跣曰妾兄弟不能相救以辱君命繆公曰我得晉君以為功今天子為請夫人是憂乃與晉君盟許歸之史記秦本紀晉隂飴甥會秦伯盟於王城晉隂飴甥㑹秦伯盟於王城秦伯曰晉國和乎對曰不和小人恥失其君而悼喪其親不憚征繕以立圉也曰必報讐寧事戎狄君子愛其君而知其罪不憚征繕以待秦命曰必報徳有死無二以此不和秦伯曰國謂君何對曰小人慼謂之不免君子恕以為必歸小人曰我毒秦秦豈歸君君子曰我知罪矣秦必歸君貳而執之服而舎之徳莫厚焉刑莫威焉服者懐徳貳者畏刑此一役也秦可以霸納而不定廢而不立以徳為怨秦不其然秦伯曰是吾心也改館晉侯饋七牢焉晉侯歸殺慶鄭而後入是嵗晉又饑秦伯又餼之曰吾怨其君而矜其民左傳秦歸晉侯夷吾夷吾獻其河西地使太子圉為質於秦秦妻子圉以宗女是時秦地東至河史記秦本紀在按括地志王城故城朝邑縣十一年秦滅梁初梁伯好土功亟成而弗處民罷而弗堪則曰某冦將至乃溝公宫曰秦將襲我民懼而潰秦遂取之左傳三月晉侯潛㑹秦伯於王城晉惠公病子圉亡歸晉惠公卒子圉立是為懐公子圉之亡秦怨之乃求公子重耳發兵送重耳使人告欒郤之黨為内應殺懐公于髙梁入重耳重耳立是為文公文公恐初入國國人賣已乃為㣲行㑹秦繆公於王城國人莫知三月己丑吕郤等果反焚公宫不得文公秦繆公誘吕郤等殺之河上晉國復而文公得歸史記晉世家十七年春秦伯帥師勤王次於河上太叔以狄師伐周王出適鄭使告難於諸侯秦伯師於河上將納王狐偃言於晉侯曰求諸侯莫如勤王諸侯信之且大義也繼文之業而信宣於諸侯今為可矣晉侯辭秦師而下左傳繆公二十五年周王使人告難於晉秦秦繆公將兵助晉文公入襄王殺王弟帶史記秦本紀夏四月晉侯伐戎襄王告急於晉文公文公興師伐逐戎翟誅子帶迎内周襄王居於洛邑當是之時秦晉為彊國晉文公攘戎翟居於河西圁洛之間號曰赤翟白翟史記匈奴傳按徐廣注圁在西河洛在上郡馮翊間二十七年春二月晉侯及秦師戰於彭衙秦師敗績春秦孟明視帥師伐晉以報殽之役晉侯禦之先且居將中軍趙衰佐之王官無地御戎狐鞠居為右及秦師戰於彭衙秦師敗績晉人謂秦拜賜之師左傳按地理志彭衙故城在今白水縣冬晉人宋人陳人鄭人伐秦冬晉先且居宋公子成陳轅選鄭公子歸生伐秦取汪及彭衙以報彭衙之役左傳之按路史汪秦邑同白水有汪城二十八年秦人伐晉秦伯伐晉濟河焚舟取王官及郊而還左傳王按括地志官城在澄城西北六十里左傳秦伐晉取王官即此先言渡河史文倒耳二十九年秋晉侯伐秦秋晉侯伐秦圍邧新城以報王官之役左傳今按新城在澄城縣東北二十里王賜秦金鼔命為西伯秦用由余謀伐戎王益國十二開地千里遂霸西戎天子使召公過賀賜繆公以金鼔史記秦本紀王賜秦伯金鼔命為西方諸侯伯綱目前編三十三年夏秦人伐晉取武城晉靈公二年秦伐我取武城史記年表秦康公元年晉襄公之弟名雍秦出也在秦晉趙盾欲立之使隨㑹來迎雍秦以兵送至令狐晉立襄公子而反擊秦師秦師敗二年秦伐晉於武城報令狐之役秦本紀城按正義武一名武平城在華州鄭縣東北頃王二年春晉人伐秦取少梁晉靈公四年伐秦取少梁史記晉世家夏秦伯伐晉取北徵報少梁也左傳杜註伐秦拔少梁秦取我北徵史記年表按索隠徵葢今之澄城也五年冬晉趙穿帥師侵崇晉欲求成於秦趙穿曰我侵崇崇急秦必救之吾以求成焉冬趙穿侵崇秦弗與成左傳崇秦之與國杜注按崇今鄠縣六年春秦師伐晉秦師伐晉以報崇也遂圍焦左傳定王六年夏晉師白狄伐秦宣公八年春白狄及晉平夏㑹晉伐秦晉人獲秦諜殺諸絳市六日而蘇左傳十三年秋七月秦伯伐晉晉敗秦師於輔氏宣公十五年秋七月秦桓公伐晉次于輔氏魏顆敗秦師于輔氏獲杜回秦之力人也初魏武子有嬖妾無子武子疾命顆曰必嫁是疾病則曰必以為殉及卒顆嫁之曰疾病則亂吾從其治也及輔氏之役顆見老人結草以亢杜回杜回躓而顛故獲之夜夢之曰余而所嫁婦人之父也爾用先人之治命余是以報左傳同按輔氏今州地簡王六年晉侯秦伯夾河而盟秦晉為成將㑹于令狐晉侯先至焉秦伯不肯涉河次于王城使史顆盟晉侯于河東晉郤犨盟秦伯于河西范文子曰是盟也何益齊盟所以質信也㑹所信之始也始之不從其可質乎秦伯歸而背晉成左傳八年夏五月晉侯以諸侯之師伐秦秦桓公既與晉厲公為令狐之盟而又召狄與楚欲道以伐晉諸侯是以睦于晉五月丁亥晉師以諸侯之師及秦師戰于麻隧秦師敗績獲秦成差及不更女父曹宣公卒於師師遂濟涇及侯麗而還迓晉侯于新楚成肅公卒于瑕左傳新按杜注麻隧侯麗楚皆秦地靈王八年秋楚子師于武城援秦以伐晉秦景公使士雅乞師于楚將以伐晉楚子許之子囊曰不可當今吾不能與晉爭晉君𩔖能而使之舉不失選官不易方其卿讓於善其大夫不失守其士競於教其庻人力於農穡商工皂𨽻不知遷業君明臣忠上讓下競當是時也晉不可敵事之而後可楚子曰吾既許之雖不及晉必將出師以為秦援秦人侵晉晉饑弗能報也左傳九年夏五月晉師伐秦夏五月晉荀罃伐秦報其侵也左傳十年冬秦人伐晉戰於櫟晉師敗績秦庻長鮑庻長武帥師伐晉以救鄭鮑先入晉地士魴禦之少秦師而弗設備壬午武濟自輔氏與鮑交伐晉師己丑秦晉戰於櫟晉師敗績易秦故也左傳十三年夏四月晉荀偃以諸侯之大夫伐秦諸侯之大夫從晉侯伐秦以報櫟之役也晉侯待于竟使六卿帥諸侯之師以進及涇不濟叔向見叔孫穆子穆子賦匏有苦葉叔向具舟魯人莒人先濟鄭子蟜見衛北宫懿子曰與人而不固若社稷何二子見諸侯之師而勸之濟濟涇而次秦人毒涇上流師人多死鄭司馬子蟜帥鄭師以進師皆從之至於棫林杜預云棫林秦地不獲成焉荀偃令曰雞鳴而起惟余馬首是瞻欒黶曰晉國之命未有是也余馬首欲東乃歸下軍從之乃命大還晉人謂之遷延之役欒鍼曰此報櫟之敗也又無功晉之恥也與士鞅馳秦師死焉士鞅反欒黶謂士匄曰余弟死而子來是而子殺余弟也弗逐余亦將殺之士鞅奔秦左傳二十九年夏楚師臨上雒晉人執戎蠻子赤歸於楚楚人既克夷虎乃謀北方襲梁及霍單浮餘蠻氏蠻氏潰蠻子赤奔晉隂地司馬起豐柝與狄戎以臨上雒左師軍於菟和右師軍於倉野杜預云菟和山在上雒東倉野在上雒縣使謂隂地之命大夫士蔑曰晉楚有盟好惡同之若將不廢寡君之願也不然將通於少習以聽命杜預云少習商縣武闗也將大開武闗道以伐晉士蔑請諸趙孟趙孟曰晉國未寧安能惡於楚必速與之士蔑乃致九州之戎執蠻子以畀楚師於三户司馬致邑立宗焉以誘其遺民而盡俘以歸左傳定王八年秦伐大荔取王城秦厲共公十六年塹河旁以兵二萬伐大荔取其王城史記秦夲紀大荔戎之别種也大事記是時義渠大荔最强築城數十皆自稱王外紀十三年秦縣頻陽秦厲共公二十一年初縣頻陽史記秦本紀地按頻陽今富平晉取秦武城晉取武城史記秦本紀十七年晉知開奔秦秦厲共公二十五年晉大夫知開率其邑人來奔史記年表十八年秦城南鄭秦厲共公二十六年左庶長城南鄭史記年表二十一年晉知寛奔秦秦厲共公二十九年晉大夫知寛率其邑人來奔史記年表二十八年秦南鄭反秦躁公二年南鄭反史記秦本紀考王十一年義渠伐秦秦躁公十三年義渠伐秦侵至渭陽史記年表自秦厲公㓕大荔取其地其遺脫者皆西走踰汧隴自是中國無戎冦唯餘義渠種焉至貞王二十五年秦伐義渠擄其王後十四年義渠侵秦至渭後漢書西羌傳威烈王四年秦作上下畤秦靈公作上下畤於呉陽方輿勝覽云呉陽呉山之陽在隴州上畤祭黄帝下畤祭炎帝大事記七年晉魏斯城少梁晉烈公元年魏城少梁史記年表魏有大梁故以少梁别之正義八年秦人晉人戰於少梁秦靈公七年與魏戰少梁史記年表九年晉魏氏復城少梁魏文侯八年復城少梁史記年表秦塹河瀕秦靈公八年城塹河瀕初以君主妻河史記年表魏城少梁而秦塹河瀕葢相備也綱目前編十一年秦城籍姑秦靈公十年補龎城城籍姑史記年表龎及籍姑皆城邑之名補者修也謂修龎而城籍姑也索隠籍按明一統志姑在韓城縣北十三年晉敗秦師於鄭秦簡公二年與晉戰敗鄭下史記年表北按鄭在華州十四年晉人圍秦繁龎魏文侯十三年公子擊圍繁龎出其民人史記年表按繁龎城在韓城縣十七年晉伐秦築臨晉元里魏文侯十六年伐秦築臨晉元里史記魏世家同按正義臨晉在州馮翊縣西南十八年晉人築洛隂郃陽魏文侯十七年子擊西攻秦至鄭而還築洛隂郃陽史記魏世家秦塹洛城重泉秦簡公七年塹洛城重泉史記年表同按明一統志重泉城在州蒲城縣安王十二年秦侵晉陰晉魏文侯三十六年秦侵我陰晉史記魏世家今按括地志云隂晉華隂縣十五年秦敗晉師於武下文侯三十八年伐秦敗我武下得其將識史記魏世家按武下即武城地秦取南鄭秦惠公十三年伐蜀取南鄭史記秦本紀十九年秦城櫟陽秦獻公二年城櫟陽史記秦本紀顯王元年秦作畦畤櫟陽雨金獻公自以為得金瑞故作畦畤櫟陽而禮白帝史記封禪書五年秦敗三晉之師于石門秦獻公二十一年與晉戰于石門斬首六萬天子賀以黼黻史記秦本紀雍按括地志堯門山俗名石門在州三原縣西北六年秦攻少梁趙成侯十二年秦攻魏少梁趙救之史記趙世家七年秦敗魏師于少梁取龎秦獻公二十三年與魏戰少梁擄其將公孫痤史記秦本紀魏惠王九年秦敗我少梁取龎魏世家龎按龎即繁十四年秦魏㑹于杜平秦少公七年與魏惠王㑹杜平史記秦本紀州按正義杜平在同澄城縣界十五年秦取少梁魏惠王十七年與秦戰元里秦取我少梁史記魏世家秦孝公元年魏築長城自鄭濵洛以北有上郡孝公於是布惠振孤寡招戰士明功賞下令國中曰昔我穆公自岐雍之間修徳行武東平晉亂以河為界西霸戎翟廣地千里天子致伯諸侯畢賀為後世開業甚光美㑹往者厲躁簡公出子之不寧國家内憂未遑外事三晉攻奪我河西地獻公即位鎮撫邊境徙治櫟陽且欲東伐復穆公之故地修穆公之政令寡人思念先君之意常痛于心賔客羣臣有能出奇計强秦者吾且尊官與之分土衛鞅聞是令下西入秦孝公拜為左庶長八年與魏戰元里有功史記秦本紀十九年秦徙咸陽始廢井田秦孝公十二年作為咸陽築冀闕徙都之并諸小鄉聚集為一縣縣一令四十一縣為田開阡陌東地渡洛史記秦本紀二十九年魏割河西地於秦衛鞅説孝公伐魏魏使公子卬將而擊之軍既相距鞅遺公子卬書曰吾始與公子驩今俱為兩國將不忍相攻可與公子面相見盟樂飲而罷兵公子卬以為然㑹盟已飲而鞅伏甲士襲擄公子卬因攻其軍盡破之以歸秦魏惠王恐乃使使割河西之地獻於秦以和史記商君傳三十一年秦誅商鞅滅其家鞅既破魏還秦封之商於十五邑號為商君相秦十年宗室貴戚多怨望者孝公卒太子立公子䖍之徒吿商君欲反發吏捕商君商君亡至闗下欲舎客舎舎人曰商君之法舎人無騐者坐之商君嘆曰為法之弊一至此哉去之魏弗受遂内秦商君既復入秦走商邑與其徒屬發邑兵北出擊鄭鄭縣也在今華州秦發兵攻商君殺之車裂商君遂滅商君之家史記商君傳三十六年秦大敗魏師取雕陰秦惠文王七年公子卭與魏戰擄其將龍賈斬首八萬史記秦本紀魏襄王二年秦取我雕陰年表陰按括地志雕故城在鄜州洛交縣北三十七年魏人以陰晉歸秦秦惠文王六年魏以陰晉為和命曰寧秦史記年表三十九年魏獻少梁於秦魏襄王五年與秦河西地少梁史記年表四十一年魏賂秦上郡地秦惠文王十年魏納上郡史記秦本紀秦使公子華與張儀圍蒲陽降之儀因言秦復與魏而使公子繇質于魏因説魏王曰秦之遇魏甚厚魏不可以無禮魏因入上郡少梁謝秦惠王乃以張儀為相張儀傳郡按正義上今鄜綏等州赧王二年秦魏㑹於臨晉魏哀王六年秦來立公子政為太子與秦王㑹臨晉史記年表楚屈匄伐秦楚懐王十六年秦欲伐齊而楚與齊從親秦惠王患之乃宣言張儀免相使張儀南見楚王謂楚王曰敝邑之王所甚説者無先大王雖儀之所甚願為門闌之厮者亦無先大王敝邑之王所甚憎者無先齊王雖儀之所甚憎者亦無先齊王而大王和之是以敝邑之王不得事王而令儀亦不得為門闌之厮也王為儀閉闗而絶齊今使使者從儀西取故秦所分楚商於之地方六百里索隠曰地理志丹水及商屬𢎞農魏晉始分置順陽郡商城丹水俱𨽻之如是則齊弱矣是北弱齊西徳於秦私商於以為富此一計而三利俱至也懐王大悦乃置相璽於張儀日與置酒宣言吾復得吾商於之地羣臣皆賀而陳軫獨弔懐王曰何故陳軫對曰秦之所為重王者以王之有齊也今地未可得而齊交先絶是楚孤也夫秦又何重孤國哉必輕楚矣且先出地而後絶齊則秦計不為先絶齊而後責地則必見欺於張儀見欺於張儀則王必怨之怨之則西起秦患北絶齊交西起秦患北絶齊交則兩國之兵必至臣故弔楚王弗聽因使一將軍西受封地張儀至秦徉醉墜車稱病不岀三月地不可得楚王曰儀以吾絶齊為尚薄耶乃使勇士宋遺北辱齊王齊王大怒折楚符而合於秦秦齊交合張儀乃起朝謂楚將軍曰子何不受地從某至某廣袤六里楚將軍曰臣之所以見命者六百里不聞六里即以歸報懐王懐王大怒興師將伐秦陳軫又曰伐秦非計也不如因賂之一名都與之伐齊是我亡於秦取償於齊也吾國尚可全今王已絶於齊而責欺於秦是吾合秦齊之交而來天下之兵也國必大傷矣楚王不聽遂絶和於秦發兵西攻秦秦亦發兵擊之史記楚世家三年秦敗楚師取漢中楚復襲秦又大敗於藍田楚懐王十七年春與秦戰丹陽索隠曰此丹陽在漢中秦大敗我軍斬甲士八萬擄大將軍屈匄禆將軍逢侯丑等七十餘人遂取漢中之郡楚王大怒乃悉國兵襲秦戰於藍田正義曰藍田在雍州東南八十里大敗楚軍史記楚世家甘茂因張儀樗里子求見秦惠王王見而悦之使將而佐魏章略定漢中地甘茂傳張儀曰楚嘗與秦搆難戰於漢中楚人不勝列侯執珪死者七十餘人遂亡漢中張儀傳五年秦魏㑹於臨晉梁哀王九年與秦王㑹臨晉張儀魏章皆歸於魏史記魏世家七年秦韓㑹於臨晉韓襄王四年與秦㑹臨晉史記年表九年趙略地至榆中趙武靈王二十年西畧胡地至榆中林胡王獻馬歸使樓緩之秦史記趙世家王胡服率騎入胡出於遺遺之門踰九限之固絶五徑之險至榆中辟地千里戰國策按括地志榆中勝州所治榆林縣是十三年秦及魏韓㑹於臨晉梁哀王十七年與秦㑹臨晉史記魏世家韓襄王十年太子嬰與秦王㑹臨晉至咸陽而歸年表十五年趙畧地至九原趙武靈王二十六年攘地西至雲中九原史記趙世家按括地志九原漢更名五原故城在今榆林縣界十六年趙君自九原入秦趙武靈王二十七年立王子何為王武靈王自號為主父主父欲令子主治國而身胡服將士大夫西北畧胡地而欲從雲中九原直南襲秦於是詐自為使者入秦秦昭王不知已而怪其狀甚偉非人臣之度使人逐之而主父馳已脫闗矣審問之乃主父秦人大驚主父所以入秦者欲自畧地形因觀秦王之為人也史記趙世家秦誘楚君槐於武闗執之以歸楚懐王三十年秦復伐楚取八城秦昭王遺楚王書曰始寡人與王約為兄弟盟於黄棘太子為質至驩也太子陵殺寡人之重臣不謝而亡去寡人誠不勝怒使兵侵君王之邉今聞君王乃令太子質於齊以求平寡人與楚接境壤界故為婚姻所從相親乆矣而今秦楚不驩則無以令諸侯寡人願與君王㑹武闗面相約結盟而去敢以聞下執事楚王見書患之欲往恐見欺無往恐秦怒昭睢曰王無行而發兵自守耳秦虎狼不可信有并諸侯之心王子子蘭勸王行於是往㑹秦昭王昭王詐令一將軍伏兵武闗號為秦王楚王至則閉武闗遂與西至咸陽朝章臺如蕃臣禮因留之史記楚世家上按一統志武闗在商州洛縣界二十年趙滅中山遷其君於膚施趙惠文王二年主父行新地遂出代西遇樓煩王于西河而致其兵三年滅中山遷其王于膚施史記趙世家按年表趙惠文王四年滅中山此云三年互異二十八年秦王畧地秦昭襄王二十年王之漢中又之上郡北河史記秦本紀三十五年楚獻漢北于秦楚頃襄王十九年秦伐楚楚軍敗割漢北地予秦史記楚世家四十六年秦誘殺義渠戎于甘泉秦昭王時義渠戎王與宣太后亂有二子宣太后詐而殺義渠于甘泉遂起兵伐殘義渠於是秦有隴西北地上郡史記匈奴傳秦始皇帝六年楚趙魏韓衛合從以伐秦不克趙悼襄王四年龎煖將趙楚衛燕之鋭師攻秦蕞徐廣曰在新豐不拔史記趙世家九年夏四月嫪毒伏誅遷太后於雍莊襄王薨太子政立年少太后竊私通吕不韋始皇帝壯不韋恐事覺禍及乃進嫪毒詐為宦者侍太后太后私與通絶愛之太后恐人知之詐徙宫居雍嫪毒常從始皇九年有人告嫪毒實非宦者常與太后私亂生子二人皆匿之於是秦王下吏治具得情實夷毒三族殺太后所生兩子而遂遷太后於雍史記吕不韋傳四月上宿雍己酉王冠帶劍長信侯毒作亂而覺矯王御璽及太后璽以發縣卒及衛卒官騎戎翟君公舎人將欲攻蘄年宫為亂王知之令相國昌平君昌文君發卒攻毒戰咸陽斬首數百毒等敗走即令國中有生得毒賜錢百萬殺之五十萬盡得毒等二十人皆梟首車裂以殉滅其宗始皇本紀二十年燕人使盜刺秦王不克燕太子丹故常質于趙秦王政生於趙其少時與丹驩及政立為秦王而丹質于秦王遇丹不善丹怨而亡歸求報秦王問鞠武田光光曰所善荆卿可使也丹於是尊荆卿為上卿舎上舎太子日造門下恣荆軻所欲以順適其意乆之軻未有行意秦王翦破趙進兵略地至燕南界丹懼乃請荆軻曰秦兵旦暮渡易水雖欲長待其可得哉軻曰行而無信則秦未可親也誠得樊將軍首與燕督亢地圖奉獻秦王秦王必悦見臣臣乃有以報丹曰樊將軍窮困來歸丹丹不忍軻乃私見於期曰秦之待將軍可謂深矣父母宗族皆為戮没願得將軍之首以獻秦王秦王必喜而見臣臣左手把其袖右手揕其胷則將軍之仇報而燕見凌之愧除矣於期曰此臣之日夜切齒腐心者也遂自刎太子聞之馳往伏哭然已不可奈何乃遂盛樊於期首函封之於是太子豫求天下之利匕首以藥焠之以試人血濡縷無不立死者乃裝為遣荆卿燕勇士秦武陽為副至秦秦王為之大喜見燕使者咸陽宫荆軻奉樊於期頭函秦武陽奉地圖匣以次進至陛秦武陽色變軻取秦武陽所持地圖圖窮而匕首見因左手把王之袖而右手持匕首揕之未至身王驚起袖絶軻逐王環柱而走秦法羣臣侍殿上者不得持兵是時侍醫夏無且以其所奉藥囊提荆軻左右乃曰王負劍遂拔以擊軻斷其左股軻引其匕首以擿王不中於是左右殺軻秦王大怒發兵伐燕史記荆軻傳二十六年秦王更號皇帝徙豪傑於咸陽秦初并天下采上古帝位號號曰皇帝推終始五徳之傳以為周得火徳秦代周徳從所不勝方今水徳之始改年始朝賀皆自十月朔衣服旌旄節旗皆尚黑數以六為紀更名河曰徳水剛􅐧戾深事皆決于法然後合五徳之數於是急法乆者不赦徙天下豪富于咸陽十二萬戸史記始皇本紀作咸陽宫初諸廟及章臺上林皆在渭南秦每破諸侯寫放其宫室作之咸陽北阪上南臨渭自雍門以東至涇渭徐廣曰在髙陵縣正義曰在岐州雍縣東殿屋複道周閣相屬所得諸侯美人鐘鼔以充入之史記始皇本紀二十七年作信宫及甘泉前殿作信宫渭南已更命信宫為極廟象天極自極廟道通驪山作甘泉前殿築甬道自咸陽屬之史記始皇本紀三十二年帝巡北邊從上郡入遣將軍䝉恬伐匈奴始皇使䝉恬將三十萬之衆北擊匈奴悉收河南地因河為塞築四十四縣城臨河徙適戍以充之史記匈奴傳䝉恬為秦將北逐戎人開榆中地數千里項羽本紀三十五年除道道九原抵雲陽始皇欲㳺天下道九原直抵甘泉正義曰宫在雍州乃使䝉恬通道自九原抵甘泉壍山堙谷千八百里史記䝉恬傳營朝宫作阿房始皇以咸陽人多先王宫廷小乃營朝宫渭南上林苑中先作前殿阿房為複道渡渭屬之咸陽隠宫徒刑者七十餘萬人分作阿房宫或作麗山發北山石椁乃寫蜀荆地材皆至闗中計宫三百闗外四百餘於是立石東海上朐界中以為秦東門因徙三萬家麗邑五萬家雲陽皆復不事十歲盧生説始皇為㣲行以辟惡鬼所居宫毋令人知然後不死之藥可得始皇乃令咸陽旁二百里内宫觀二百七十複道甬道相連帷帳鐘鼔美人充之各案署不移徙行所幸有言其處者死嘗幸梁山宫在好畤縣從山上望見丞相車騎衆弗善也中人或吿丞相丞相後損車騎始皇怒曰此中人泄吾語捕時在旁者盡殺之自是莫知行之所在羣臣受決事者悉於咸陽宫史記始皇本紀阬諸生於咸陽使長子扶蘇監軍上郡侯生盧生相謀曰始皇為人天性剛戾自用貪于權勢未可為求仙藥乃亡去始皇聞之大怒曰盧生等吾尊賜之甚厚今乃誹謗我以重吾不徳也諸生在咸陽者或為妖言以亂黔首於是使御史悉案問諸生諸生傳相告引乃自除犯禁者四百六十餘人皆阬之咸陽長子扶蘇諫曰諸生誦法孔子今上皆重法繩之臣恐天下不安始皇怒使扶蘇北監䝉恬軍於上郡史記始皇本紀衛宏詔定古文尚書序云秦既焚書恐天下不從所改更法而諸生到者拜為郎前後七百人乃宻種𤓰於驪山陵谷中温處𤓰實成詔博士諸生説之人言不同乃令就視為伏機諸生賢儒皆至焉方相難不決因發機從上填之以土皆壓終乃無聲也儒林傳注二世皇帝元年夏四月復作阿房宫二世還至咸陽曰先帝為咸陽朝廷小故營阿房宫為室堂未就罷其作者復土酈山酈山事大畢今釋阿房宫弗就則是章先帝舉事過也復作阿房宫徵材士五萬人為衛狗馬禽獸當食者多調郡縣轉輸菽粟芻稿皆令自齎糧食咸陽三百里内不得食其穀史記二世本紀秋七月楚人伐秦次戲秦章邯擊敗之周文通鑑作周章自言習兵陳王與之將軍印西擊行収兵至闗車千乘卒數十萬至戲軍焉秦令少府章邯免酈山徒人奴産子悉發以擊楚大軍盡敗之周文敗走出闗史記陳涉世家二按地理志戲在新豐東十里二年秋七月楚遣沛公伐秦懐王令沛公西畧地入闗與諸將約先入定闗中者王之時秦兵强諸將莫利先入闗獨羽怨秦破項梁軍奮願與沛公西入闗懐王諸老將皆曰項羽為人慓悍猾賊所過無不殘滅不如更遣長者扶義而西告諭秦父兄秦父兄苦其主乆矣今誠得長者往毋侵暴宜可下獨沛公素寛大長者卒不許羽而遣沛公西史記髙祖本紀秋八月沛公入武闗九月擊嶢闗破之沛公攻武闗入秦秦相趙髙恐乃殺二世使人來欲約分王闗中沛公不許九月趙髙立二世兄子子嬰為秦王子嬰誅滅趙髙遣將將兵距嶢闗沛公欲擊之張良曰秦兵尚彊未可輕願先遣人益張旗幟於山上為疑兵使酈食其陸賈往説秦將啗以利秦將果欲連和沛公欲許之張良曰止獨其將欲畔恐其士卒不從不如因其怠懈擊之沛公引兵繞嶢闗踰簣山擊秦軍大破之藍田南正義曰蕢山在藍田縣東二十五里遂至藍田又戰其北秦兵大敗漢書髙帝本紀漢漢王元年冬十月沛公至霸上子嬰降沛公至霸上秦王子嬰素車白馬繫頸以組封皇帝璽符節降枳道旁諸將或言誅秦王沛公曰始懐王遣我固以能寛容且人已服降殺之不祥乃以屬吏漢書髙帝本紀沛公入咸陽還次霸上沛公西入咸陽欲止宫休舍樊噲張良諫乃封秦重寳財物府庫還軍霸上史記髙祖本紀沛公至咸陽諸將皆爭走金帛財物之府分之何獨先入収秦丞相御史律令圖書藏之沛公為漢王以何為丞相項王與諸侯屠燒咸陽而去漢王所以具知天下阨塞户口多少强弱之處蕭相國世家十一月沛公召諸縣豪傑約法三章秦民大喜爭持牛羊酒食獻享軍士公讓不受曰倉粟多不欲費民民又益喜惟恐沛公不為秦王漢書髙帝紀十二月項籍入秦軍于戲沛公㑹籍于鴻門沛公破咸陽項羽大怒使當陽君等擊闗項羽遂入至于戲西沛公軍霸上未得與項羽相見沛公左司馬曹無傷使人言于項羽曰沛公欲王闗中使子嬰為相珍寳盡有之項羽大怒曰旦日饗士卒為擊破沛公軍當是時項羽兵四十萬在新豐鴻門沛公兵十萬在霸上范増説項羽曰沛公入闗財物無所取婦女無所幸此其志不在小吾令人望其氣皆為龍虎成五采此天子氣也急擊勿失楚左尹項伯者項羽季父也素善留侯張良項伯乃夜馳之沛公軍私見張良具告以事欲呼良與俱去良曰今事急亡去不義良乃入具吿沛公沛公大驚曰為之奈何張良曰誰為大王為此計者曰鯫生説我曰距闗毋内諸侯秦地可盡王也故聽之良曰料大王士卒足以當項王乎沛公黙然曰固不如也張良曰請往謂項伯言沛公不敢背項王也沛公曰君為我呼入吾得兄事之張良出要項伯入見沛公沛公奉巵酒為壽約為婚姻曰吾入闗秋毫不敢有所近籍吏民封府庫而待將軍所以遣將守闗者備他盜出入與非常也日夜望將軍至豈敢反乎願伯具言臣之不敢倍徳也項伯許諾于是夜去至軍中具報項王因言曰沛公不先破闗中公豈敢入乎今人有大功而擊之不義不如善遇之項王許諾沛公旦日從百餘騎來見項王至鴻門謝曰臣與將軍戮力而攻秦將軍戰河北臣戰河南然不自意能先入闗破秦得復見將軍于此今者有小人之言令將軍與臣有郤項王曰此沛公左司馬曹無傷言之不然籍何以至此項王因留沛公與飲范增數目項王舉所珮玉玦以示之者三項王不應范增起出召項莊謂曰君王為人不忍若入以劍舞因擊沛公殺之莊入為壽壽畢請以劍舞項王曰諾項莊拔劍起舞項伯亦拔劍起舞常以身翼蔽沛公莊不得擊于是張良至軍門見樊噲曰今者項莊舞劍其意常在沛公噲曰此迫矣臣請入噲即帶劍擁盾入瞋目視項王頭髮上指目眦盡裂項王曰壯士賜之巵酒與斗巵酒噲拜謝起立而飲之項王曰賜之彘肩與一生彘肩樊噲覆其盾于地加彘肩上按劍切而啗之項王曰壯士能復飲乎樊噲曰臣死且不避巵酒安足辭夫秦有虎狼之心天下皆叛之懐王與諸將約曰先入咸陽者王之今沛公先破秦入咸陽毫毛不敢近封閉宫室還軍霸上以待大王來故遣將守闗者備他盜出入與非常也勞苦功髙如此未有封侯之賞而欲誅有功之人竊為大王不取也須臾沛公起如厠因招樊噲出沛公已出項王使都尉陳平召沛公沛公令張良留謝曰我持白璧一雙欲獻項王玉斗一雙欲與亞父公乃為我獻之張良曰謹諾當是時項王軍在鴻門下沛公軍在霸上相去四十里沛公脫身獨騎與樊噲等持劍盾步走從酈山下道芷陽間行沛公謂張良曰從此道至吾軍不過二十里耳度我至軍中公乃入沛公已去間至軍中張良入謝曰沛公不勝杯杓不能辭謹使臣奉白璧一雙冄拜獻大王足下玉斗一雙冄拜奉大將軍足下項王曰沛公安在良曰聞大王有意督過之脫身獨去已至軍矣項王則受璧置之座上亞父受玉斗置之地拔劍撞而破之曰唉䜿子不足與謀奪項王天下者必沛公也吾屬今為之擄矣沛公至軍立誅殺曹無傷史記項羽本紀新按續漢志鴻門在豐東十七里項籍屠咸陽殺子嬰沛公歸數日羽引兵西屠咸陽殺秦降王子嬰燒秦宫室所過無不殘滅秦民大失望漢書髙帝紀羽殺子嬰収其寳貨婦女而東燒秦宫室火三月不滅韓生説羽令都闗中羽曰富貴不歸故鄉如衣錦夜行韓生曰人謂楚人沐猴而冠果然羽聞之怒殺韓生荀悦前漢紀春二月立沛公為漢王以秦降將章邯等為三秦王項王范增疑沛公之有天下業已講解又惡負約恐諸侯叛之乃陰謀曰蜀亦闗中地立沛公為漢王王巴蜀漢中都南鄭而三分闗中王秦降將以距塞漢王章邯為雍王王咸陽以西都廢丘長史欣者故為櫟陽獄掾嘗有徳于項梁都尉董翳者本勸章邯降楚故立司馬欣為塞王韋昭曰在長安東名桃林塞王咸陽以東至河都櫟陽立董翳為翟王王上郡都髙奴羽自立為西楚霸王史記項羽本紀夏四月諸侯罷戲下兵各就國漢王之國南鄭四月兵罷戲下諸侯各就國漢王之國項王使卒三萬人從楚與諸侯之慕從者數萬人史記髙祖本紀漢王之國良送至褒中遣良歸韓良因説漢王曰王何不燒絶所過棧道示天下無還心以固項王意乃使良還行燒絶棧道良説項王曰漢王燒絶棧道無還心矣留侯世家信從沛公入武闗沛公立為漢王信從入漢中韓王信傳秋七月漢王還定三秦漢王既至南鄭諸將及士卒皆歌謳思東歸多道亡還者韓信為治粟都尉亦亡去蕭何追還之因薦於漢王曰必欲争天下非信無可與計事者於是漢王齋戒設壇塲拜信為大將軍問以計策信因陳羽可圖三秦易并之計漢王大恱遂聽信策部署諸將留蕭何収巴蜀租給軍糧食漢王引兵從故道出襲雍雍王邯迎擊漢陳倉雍兵敗還走戰好畤又大敗走廢丘漢王遂定雍地東如咸陽引兵圍雍王廢丘而遣諸將畧地八月塞王欣翟王翳皆降漢羽聞漢王并闗中而齊梁畔之大怒時張良徇韓地遺羽書曰漢王欲得闗中如約即止不敢復東羽以故無西意而北擊齊漢書髙帝紀酈商以所將四千人屬沛公于岐從攻長社先登别將攻旬闗師古曰今旬陽縣西定漢中漢王賜爵信成君以將軍為隴西都尉别定北地郡破章邯别將於烏氏栒邑師古曰栒邑在豳州泥陽酈商傳曹參從至漢中遷為將軍從還定三秦初攻下辨故道雍斄擊章平軍於好畤南破之圍好畤取壤鄉擊三秦軍壤東及髙櫟破之復圍章平平出好畤走因擊趙賁内史保軍破之東取咸陽曹參傳樊噲從入漢中還定三秦别擊西丞白水北擁輕車騎于雍南破之從攻雍斄城擊章平軍好畤從擊秦軍騎壤東攻趙賁下郿槐里柳中咸陽至櫟陽樊噲傳周勃從入漢中拜為將軍還定三秦賜食邑懐徳攻槐里好畤最北擊趙賁内史保於咸陽最北救漆擊章平姚卭軍西定汧還下郿頻陽周勃傳漢王元年定三秦賈為將軍定塞地荆王賈傳灌嬰從還定三秦下櫟陽還圍章邯于廢丘灌嬰傳二年十一月漢王徙都櫟陽漢王還歸都櫟陽使諸將略地漢書髙帝紀夏四月塞王翟王降楚漢王悉發闗中兵東伐楚羽大破漢軍諸侯見漢敗皆亡去塞王欣翟王翳降楚漢書髙帝本紀六月作北畤於櫟陽二年東擊項籍而還入闗問故秦時上帝祠何帝也對曰四帝有白青黄赤帝之祠髙祖曰吾聞天有五帝而有四何也莫知其説於是髙祖曰吾知之矣乃待我而具五也乃立黑帝祠命曰北畤史記封禪書漢兵圍廢丘雍王自殺漢兵引水灌廢丘廢丘降章邯自殺雍州定八十餘縣置河上渭南中地隴西上郡興闗中卒乘邊塞漢書髙帝本紀秋八月漢王㑹兵擊楚蕭何守闗中漢王以何為丞相漢二年漢王與諸侯擊楚何守闗中侍太子治櫟陽為法令約束立宗廟社稷宫室縣邑輒上可許以從事即不及奏上輒以便宜施行上來以聞闗中事計戸口轉漕給軍漢王數失軍遁去何常興闗中卒補缺上以此專屬任何闗中事史記蕭相國世家四年冬十一月漢王至自伐楚漢王西入闗至櫟陽存問父老置酒梟故塞王欣頭櫟陽市留四日復如軍軍廣武闗中兵益出漢書髙帝本紀髙祖五年二月即帝位夏五月還都闗中髙帝五年敬過洛陽說曰陛下都洛陽豈欲與周室比隆哉陛下起豐擊沛収卒三千人以之徑往而卷蜀漢定三秦與項羽戰滎陽争成臯之口大戰七十小戰四十使天下之民肝腦塗地傷痍未起而欲比隆於成康之時臣竊以為不侔也且夫秦地被山帶河四塞以為固卒然有急百萬之衆可具也因秦之故資膏腴之地此所謂天府者也陛下入闗而都之山東雖亂秦之故地可全而有也夫與人鬭不搤其吭拊其背未能全其勝也今陛下入闗而都之案秦之故地此亦搤天下之吭而拊其背也羣臣皆山東人争言周數百年秦二世即亡不如都周上疑未能決及留侯明言入闗便車駕即日西都闗中史記婁敬傳劉敬説髙帝都闗中左右多勸上都洛陽留侯曰洛陽四面受敵非用武之國夫闗中左殽函右隴蜀沃野千里南有巴蜀之饒北有胡苑之利阻三面而守獨以一面制諸侯諸侯安定河渭漕輓天下西給京師諸侯有變順流而下足以委輸此所謂金城千里天府之國劉敬説是也於是髙帝即日駕西都闗中留侯世家秋九月治長樂宫徙諸侯子闗中治長樂宫漢書髙帝本紀七年春二月帝至長安始定徙都二月至長安蕭何治未央宫立東闕北闕前殿武庫太倉上見其壯麗甚怒謂何曰天下匈匈勞苦數歲成敗未可知是何治宫室過度也何曰天下方未定故可因以就宫室且天子以四海為家非壯麗無以重威且亡令後世有以加也上說自櫟陽徙都長安漢書髙帝本紀九年冬十一月徙齊楚大族於闗中髙祖九年十一月徙齊楚大族昭氏屈氏景氏懐氏田氏五姓闗中與利田宅漢書髙帝紀婁敬從匈奴來因言匈奴河南白洋樓煩主去長安近者七百里輕騎一日一夕可以至秦中秦中新破少民地肥饒可益實夫諸侯初起時非齊諸田楚昭屈景莫能興今陛下雖都闗中實少人臣願陛下徙齊諸田楚昭屈景燕趙韓魏後及豪傑名家居闗中無事可以備邊諸侯有變亦足率以東伐帝曰善乃使劉敬徙所言闗中十餘萬口婁敬傳十一年春正月韓信謀反吕后詐誅之十一年陳豨反上自將而往信病不從隂使人至豨所曰第舉兵吾從此助公信乃謀與家臣夜詐詔赦諸官徒奴欲發以襲吕后太子部署已定待豨報其舎人得罪于信信囚欲殺之舎人弟上變告信欲反狀吕后乃與蕭相國謀詐舎人從上所來言豨已得死列侯羣臣皆賀相國紿信曰雖疾彊入賀信入吕后使武士縛信斬之長樂鐘室信曰吾悔不聽蒯通之計乃為兒女子所詐豈非天哉遂夷信三族史記淮隂侯列傳秋七月帝自將討黥布命太子監闗中上欲廢太子立趙王如意吕后使建成侯吕澤刼留侯為畫計留侯曰上有不能致者四人令太子為書卑辭安車固請為客上知此四人賢則一助也於是吕后令吕澤使人奉太子書卑辭厚禮迎此四人四人至十一年黥布反上病欲使太子將往擊之四人説建成侯請吕后乘間為上泣言黥布猛將善用兵諸將皆陛下故等夷乃令太子將此屬無異使羊將狼且使布聞之則鼔行而西耳吕澤立夜見吕后吕后承間為上涕泣而言如四人意於是上自將而東羣臣居守皆送至霸上留侯病自彊起至曲郵長安縣東有曲郵聚因説上令太子為將軍監闗中兵史記留侯世家太子監闗中兵上曰子房雖病强卧而傅之時叔孫通已為太傅留侯行少傅事發闗中車騎巴蜀材官及中尉卒三萬人為太子衛軍霸上綱目惠帝元年春正月城長安漢都長安蕭何雖治宫室未暇築城帝元年始築之至五年乃畢通鑑三年春城長安春發長安六百里内男女十四萬六千人城長安三十日罷夏六月發諸侯王列侯徒𨽻二萬人城長安漢書惠帝本紀五年春正月城長安秋九月成正月復發長安六百里内十四萬五千人城長安三十日罷九月長安城成漢書惠帝本紀髙后八年秋九月吕禄吕産謀作亂朱虛侯章與太尉勃丞相平等誅之秋髙后崩于未央宫諸吕恐為大臣所誅謀作亂欲廢少帝而立吕産朱虚侯婦吕禄女宻聞其謀告章章乃使人隂告其兄齊王嬰令發兵西章及興居欲從中與大臣為内應誅諸吕立齊王曲周侯酈商其子寄與吕禄善周勃陳平使人執刼商而令寄説吕禄曰髙帝與吕氏定天下劉氏所立九王吕氏所立三王皆大臣之議事已布告諸侯王諸侯王以為宜今太后崩少帝幼足下不急之國守藩乃為上將將兵為大臣諸侯所疑何不速歸將軍印綬因以兵屬太尉請梁王亦歸相印與大臣盟而之國髙枕而王千里此萬世之利禄然其計使人報産及諸吕多以為不便計未決禄信寄與俱出遊過其姑吕嬃嬃怒曰汝為將軍而棄軍吕氏今無𩔖矣乃悉出珠玉寳器散之堂下曰無為他人守也八月太尉周勃復令寄謂禄曰帝使太尉守北軍欲令足下之國急歸將軍印綬辭去不然禍且起禄遂解印屬典客而以兵授勃勃入軍門行令軍中曰為吕氏者右袒為劉氏者左袒軍皆左袒勃遂統北軍兵而朱虚侯將卒千人入未央宫斬吕産辛酉斬吕禄諸吕無長幼皆斬之大臣相與謀以為少帝及諸侯王皆非惠帝子欲盡誅之立齊王議者曰王暴戾虎冠之代王母家薄氏君子也且代王親髙帝子於今為長仁孝聞於天下以子則順以賢則大臣安乃迎代王東牟侯興居與太僕夏侯嬰隂共入宫中誅少帝於是告齊王令罷兵荀悦漢紀文帝三年匈奴入冦帝如甘泉遣丞相灌嬰擊走之三年五月匈奴入冦上幸甘泉遣丞相灌嬰擊匈奴匈奴去發中尉材官屬衛將軍軍長安史記文帝本紀文帝三年匈奴右賢王入居河南地侵盜上郡葆塞蠻夷殺畧人民於是文帝詔丞相灌嬰發車騎八萬五千詣髙奴正義延州城本漢髙奴縣舊都擊右賢王右賢王走出塞匈奴傳十年冬帝如甘泉文帝十年冬行幸甘泉漢書文帝本紀十五年夏四月始郊見五帝於雍夏四月上幸雍始郊見五帝漢書文帝本紀文帝十三年議增雍五畤路車各一乘駕被具西畤畦畤禺車各一乘禺馬四匹駕被具後三歲徐廣曰在文帝十五年夏四月文帝始郊見雍五畤祠史記封禪書作渭陽五帝廟趙人新垣平以望氣見上言長安東北有神氣成五采若人冠冕焉或曰東北神明之舎西方神明之墓也天瑞下宜立祠上帝以合符應於是作渭陽五帝廟同宇帝一殿面五門各如其帝色祠所用及儀亦如雍五畤漢書郊祀志十六年夏四月帝祀渭陽五帝文帝親拜霸渭之㑹以郊見渭陽五帝五帝廟臨渭其北穿蒲池溝水權火舉而祠若光煇然屬天焉於是貴平至上大夫賜累千金而使博士諸生刺六經中作王制謀議巡狩封禪事文帝出長門如淳曰亭名也若見五人於道北遂因其直立五帝壇鄭氏曰因其所立處以立祠也祠以五牢漢書郊祀志後二年夏帝如雍文帝後二年夏行幸雍棫陽宫漢書文帝本紀圖棫陽宫按三輔黄在扶風四年夏五月帝如雍後四年夏五月行幸雍漢書文帝本紀五年春三月帝如雍後五年春三月行幸雍漢書文帝本紀六年冬匈奴冦上郡詔將軍周亞夫等屯兵以備之軍臣單于立四歲匈奴復絶和親大入上郡雲中烽火通于甘泉長安數月漢兵至邊匈奴亦去逺塞史記匈奴傳文帝之後六年匈奴大入邊以宗正劉禮為將軍軍霸上祝兹侯徐厲為將軍軍棘門以河内守亞夫為將軍軍細柳以備邊上自勞軍至霸上及棘門軍直馳入將以下騎送迎已而之細柳軍軍士吏被甲鋭兵刃彀弓弩持滿天子先驅至不得入先驅曰天子且至軍門都尉曰將軍令曰軍中聞將軍令不聞天子之詔居無何上至又不得入于是上乃使使持節詔將軍吾欲入勞軍亞夫乃傳言開壁門壁門士吏謂從屬車騎曰將軍約軍中不得驅馳于是天子乃按轡徐行至營將軍亞夫持兵揖曰介胄之士不拜請以軍禮見天子為動容式車使人稱謝皇帝敬勞將軍成禮而去既出軍門羣臣皆驚文帝曰嗟乎此真將軍矣曩者霸上棘門軍若兒戲耳其將固可襲而擄也至於亞夫可得而犯耶月餘三軍皆罷乃拜亞夫為中尉絳侯世家昆按張揖注細柳營在明池南景帝中六年春二月帝如雍祠五帝春二月己酉行幸雍郊見五帝漢書景帝本紀夏六月匈奴冦上郡李廣為上郡太守匈奴入上郡上使中貴人從廣勒習兵擊匈奴中貴人將騎數十從見匈奴三人與戰射傷中貴人殺其騎且盡中貴人走廣廣曰是必射雕者也廣乃從百騎往馳三人三人亡馬步行行數十里廣令其騎張左右翼而廣身自射彼三人者殺其二人生得一人果匈奴射雕者也已縛之上山望匈奴數千騎見廣以為誘騎皆驚上山陳廣之百騎皆大恐欲馳還走廣曰吾去大軍數十里今如此走匈奴追射我立盡今我留匈奴以我為大軍之誘不我擊廣令曰前未到匈奴陳二里所止令曰皆下馬解鞍其騎曰敵多如是解鞍即急奈何廣曰彼皆以我為走今解鞍以示不去用堅其意有白馬將出䕶兵廣上馬與十餘騎奔射殺白馬將而復還至其百騎中解鞍縱馬卧㑹暮匈奴終怪之弗敢擊夜半匈奴亦以為漢有伏軍于旁欲夜取之即引去平旦廣乃歸其大軍漢書李廣傳武帝建元三年秋九月起上林苑武帝建元三年㣲行始出北至池陽西至黄山南獵長楊東遊宜春與侍中常侍武騎及待詔隴西北地良家子能騎射者期諸殿門以夜迺出常稱平陽侯旦明入山下馳射鹿豕狐兔手格熊羆馳騖禾稼稻秔之地民皆號呼罵詈鄠杜令欲使吏呵止獵者數騎見留迺示以乘輿物乆之乃得去後乃私置更衣十二所上以為道逺勞苦又數為百姓所患迺使吾丘夀王為上林苑屬之南山又詔中尉左右内史表屬縣草田欲以償鄠杜之民朔進諫曰夫南山之阻陸海之地也山出玉石金銀銅鐵豫章檀柘異𩔖之物不可勝原此百工所取給萬民所仰足也又有秔稻梨栗桑麻竹箭之饒土宜薑芋水多鼃魚貧者得以人給家足無饑寒之憂故酆鄗之間號為土膏其價畮一金今規以為苑絶陂池水澤之利而取民膏腴之地上乏國用下奪農桑其不可一也且盛荆棘之林大虎狼之虛壞人冢墓發人室廬其不可二也垣而囿之騎馳車騖有深溝大渠夫一日之樂不足以危無堤之輿其不可三也且殷作九市之宫而諸侯畔靈王起章華之臺而楚民散秦興阿房之殿而天下亂糞土愚臣逆盛意犯隆指罪當萬死上乃拜朔為太中大夫給事中賜黄金百斤然遂起上林苑如壽王所奏云漢書東方朔傳元光二年冬十月帝如雍祠五畤二年冬十月行幸雍祠五畤漢書武帝本紀立太一祠亳人謬忌奏祠太一方曰天神貴者太一太一佐曰五帝古者天子以春秋祭太一東南郊用太牢七日為壇開八通之鬼道于是天子令太祝立其祠長安東南郊常奉祠如忌方史記封禪書六年夏六月帝如雍元光六年夏六月行幸雍漢書武帝本紀元朔二年春匈奴入冦遣衛青等擊走之取河南地匈奴入上谷殺畧吏民遣將軍衛青李息出髙闕獲其首數千級収河南地置朔方五原郡夏募民徙朔方十萬口漢書武帝本紀衛青出擊匈奴于是漢遂取河南地築朔方復繕故秦時䝉恬所為塞因河為固是歲元朔二年也匈奴傳元朔二年春収河南地置朔方五原郡興十餘萬人築衛朔方轉漕甚逺自山東咸被其勞費數十百鉅萬府庫益虚迺募民能入奴婢得以終身復為郎增秩及入羊為郎史記平準書偃盛言朔方地肥饒外阻河䝉恬城之以逐匈奴内省轉輸戍漕上覽其説下公卿議皆言不便公孫𢎞曰秦時嘗發三十萬衆築北河終不可就已而棄之主父偃盛言其便上竟用主父計立朔方郡主父偃傳府按髙闕在今榆林北套内三月徙郡國豪傑於茂陵主父偃説上曰茂陵初立天下豪傑并兼之家亂衆之民皆可徙茂陵内實京師外銷姦猾此所謂不誅而害除上從其計史記主父偃傳鄉按茂陵武帝陵邑本槐縣之茂在長安縣西北四年冬帝如甘泉元朔四年冬行幸甘泉漢書武帝本紀夏匈奴冦上郡匈奴入代郡定襄上郡各三萬騎殺畧數千人匈奴右賢王怨漢奪河南地而築朔方數為冦盜邊及入河南侵擾朔方殺畧吏民甚衆史記匈奴傳五年春匈奴冦朔方遣衛青率六將軍擊之匈奴比歲入上郡朔方所殺畧甚衆元朔五年春上令青將三萬騎出髙闕衛尉蘇建為㳺擊將軍左内史李沮為彊弩將軍太僕公孫賀為車騎將軍代相李蔡為輕車將軍皆領屬車騎將軍俱出朔方匈奴右賢王當青等兵以為漢兵不能至此飲醉漢兵夜至圍右賢王右賢王驚夜逃獨與其愛妾一人騎數百馳潰圍北去得右賢王禆王十餘人衆男女萬五千餘人畜數十百萬漢書衛青傳元狩元年冬十月帝如雍祠五畤武帝郊雍獲一角獸若麃然有司曰陛下肅祗郊祀上帝報享賜一角獸葢麟云於是以薦五畤畤加一牛以燎賜諸侯白金以風符應合于天漢書郊祀志武帝幸雍祠五畤獲白麟一角五足作歌歌之終軍對曰野獸并角同本也殆將有解辮髮左衽冠帶而化者由是改年曰元狩後越地及匈奴名王率衆來降白孔六帖二年冬十月帝如雍祠五畤元狩二年冬十月行幸雍祠五畤漢書武帝本紀三年夏徙山東貧民於闗西朔方山東被水民多饑乏遣使虚倉廩以賑猶不足又募富人假貸尚不能相救乃徙貧民闗西朔方新秦中七十餘萬口皆仰給縣官數歲貸與産業使者分䕶費以億計綱目作昆明池上將討昆明以昆明有滇池方三百里乃作昆明池以習水戰吏弄法皆令伐棘上林穿昆明池綱目明按昆池在西安城南五年夏四月幸甘泉祠神君天子病鼎湖甚索隠曰鼎湖宫在藍田巫醫無所不致游水發根言上郡有巫病而鬼下之上召置祠之甘泉及病使人問神君神君言曰天子毋憂病病少愈强與我㑹甘泉于是病愈遂幸甘泉病良已大赦置壽宫神君神君最貴者曰太一其佐曰太禁司命之屬皆從之非可得見聞其言與人音等時去時來來則風肅然居室帷中時晝言然常以夜天子祓然後入因巫為主人闗飲食所欲言行下又置壽宫北宫張羽旗設供具以禮神君神君所言上使受書其名曰畫法其所言世俗之所知也毋絶殊者而天子獨喜其事秘世莫知也漢書郊祀志元鼎二年春起柏梁臺作承露盤長陵女子先嫁為人妻生一男數歲死以悲痛卒祠之有靈説人家小事有騐平原君亦祠之上即位延于宫中祭之聞其言不見其人至是神君求出乃營柏梁臺舎之漢武故事四年冬十月帝如雍祠五畤十月行幸雍祠五畤自夏陽東幸汾隂漢書武帝本紀汾隂巫錦應邵曰錦巫名得鼎天子迺以禮祠迎鼎至甘泉從上行薦之至中山晏温如淳曰三輔謂日出清濟為晏晏而温乃有黄雲故為異也師古曰中讀曰仲即今雲陽之中山也有黄雲焉有鹿過上自射之因之以祭云郊祀志秋帝郊雍幸甘泉秋上雍且郊或曰五帝太一之佐也宜立太一而上親郊之上疑未定齊人公孫卿曰漢興復當黄帝之時寳鼎出而與神通黄帝接萬靈明廷明廷者甘泉也黄帝採首山銅鑄鼎于荆山下鼎既成有龍垂胡􅐖下迎黄帝黄帝上騎羣臣後宫從上龍七十餘人龍去天子曰嗟乎誠得如黄帝吾視去妻子如脱屣耳拜卿為郎使東候神于太室上遂郊雍幸甘泉漢書郊祀志五年冬十月帝如雍祠五畤遂巡邊上祠五畤於雍遂踰隴西出蕭闗從數萬騎獵新秦中以勒邊兵而歸新秦中或千里無亭徼於是誅北地太守以下綱目立泰畤於甘泉十一月朔郊見如雍禮十一月辛巳朔旦冬至立泰畤于甘泉天子親郊見漢書武帝本紀十一月辛巳朔旦冬至昒爽天子始郊拜泰一朝朝日夕夕月則揖而見泰一如雍郊禮郊祀志秋九月匈奴冦五原九月匈奴入五原殺太守漢書武帝本紀六年冬十月將軍公孫賀帥師出九原漢已滅南越遣故太僕賀姓公孫將萬五千騎出九原三千餘里至浮苴井而還不見匈奴一人史記匈奴傳元封元年冬十月帝北巡還祠橋陵十月詔曰南越東甌咸伏其辜西蠻北夷頗未輯睦朕將巡邉陲躬秉武節置十二部將軍親帥師焉行自雲陽北歴上郡西河五原出長城北登單于臺至朔方臨北河勒兵十八萬騎旌旗經千餘里威振匈奴還祠黄帝于橋山在上郡周陽縣迺歸甘泉漢書武帝本紀二年冬十月帝如雍祠五畤冬郊雍五帝還拜祝祠太一史記封禪書夏作蜚亷桂館通天臺公孫卿曰僊人可見上往常遽以故不見今陛下可為館如緱氏城置脯棗神人宜可致且僊人好樓居于是上令長安則作飛㢘桂館甘泉則作益夀延夀館使卿持節設具而候神人乃作通天臺置祠具其下招來神仙之屬于是甘泉更置前殿始廣諸宫室漢書郊祀志四年冬十月帝如雍祠五畤元封四年冬行幸雍祠五畤漢書武帝本紀夏匈奴冦邊遣郭昌將兵屯朔方天子巡邊至朔方使郭吉風告單于單于留郭吉不歸休養士馬習射獵數使使請和親漢使王烏窺匈奴單于佯許甘言為遣太子入漢為質紿曰吾欲入漢見天子面相約為兄弟王烏歸報漢為單于築邸於長安匈奴使其貴人至漢病死漢使路充國送其喪單于以為漢殺吾使者乃留充國數使奇兵侵犯漢邊漢乃拜郭昌為將軍及浞野侯屯朔方備邊史記匈奴傳五年夏四月帝如甘泉郊泰畤元封五年夏四月幸甘泉郊太畤漢書武帝本紀太初元年春受計於甘泉二月起建章宫上以柏梁災故受計甘泉勇之迺曰粤俗有火災復起屋必以大用勝服之於是作建章宫漢書郊祀志三年秋匈奴冦五原朔方太初三年使光禄徐自為出五原塞數百里逺者千里築城障列亭至盧朐而使游擊將軍韓說長平侯衛伉屯其旁其秋匈奴大入五原朔方殺畧數千人敗數二千石而去漢書匈奴傳四年起明光宫秋起明光宫漢書武帝本紀天漢元年春帝如甘泉郊泰畤正月行幸甘泉郊泰畤漢書武帝本紀二年冬詔闗内都尉謹防衛武帝天漢二年冬十一月詔闗内都尉曰今豪桀多逺交依東方羣盜其謹察出入者漢書武帝本紀四年春正月貳師將軍李廣利等擊匈奴不利使貳師將軍案漢書謂李廣利也將六萬騎步兵十萬人出朔方彊弩都尉路博徳將萬餘人與貳師㑹游擊將軍説將步騎三萬人出五原匈奴聞悉遷其累重於余吾水北徐廣曰余吾水在朔方郡北而單于以十萬騎待水南與貳師將軍接戰貳師乃解而引歸史記匈奴傳太始元年春徙豪桀於茂陵春正月徙郡國吏民豪桀於茂陵雲陵師古曰此當言雲陽而傳寫者誤為陵耳漢書武帝本紀三年春正月帝如甘泉宫正月行幸甘泉宫饗外國客漢書武帝本紀江充為趙王客得罪亡詣闕告趙太子隂事太子坐廢上召與語大悦之拜直指繡衣使者使督察貴戚近臣踰侈者嘗從上甘泉逢太子家使乘車馬行馳道中充以屬吏太子使人謝充曰非愛車馬誠不欲令上聞之以教敇亡素者惟江君寛之充不聽遂白奏上曰人臣當如是矣大見信用威震京師綱目四年夏五月帝如建章宫五月幸建章宫大置酒漢書武帝本紀冬十二月帝如雍祠五畤十二月行幸雍祠五畤漢書武帝本紀征和元年春正月帝如建章宫春正月行幸建章宫漢書武帝本紀冬十一月大搜長安十日上居建章宫見一男子帶劍入中龍華門命収之弗獲上怒斬門候發三輔騎士搜上林索長安中十一日迺解巫蠱始起綱目二年夏帝如甘泉宫秋七月太子殺使者江充舉兵反武帝末衛后寵衰江充用事充與太子及衛氏有隙恐上晏駕後為太子所誅㑹巫蠱事起充因此為姦是時上春秋髙意多所惡以為左右皆為蠱道祝詛窮治其事丞相公孫賀父子陽石諸邑公主及皇后弟子長平侯衛伉皆坐誅充典治巫蠱既知上意白言宫中有蠱氣入宫至省中壊御座掘地上使按道候韓説御史章贛黄門蘇文等助充充遂至太子宫掘蠱得桐木人時上病避暑甘泉宫獨皇后太子在太子召問少傅石徳徳懼為師傅並誅因謂太子曰前丞相父子兩公主及衛氏皆坐此今巫與使者掘地得徵驗不知巫置之邪將實有也無以自明可矯以節収捕充等繫獄窮治其姦詐且上疾在甘泉皇后及家吏請問皆不報上存亡未可知而姦臣如此太子將不念秦扶蘇事耶太子急然徳言征和二年七月壬午乃使客為使者収捕充等按道候説疑使者有詐不肯受詔客格殺説御史章贛被創突亡自歸甘泉太子使舎人無且持節夜入未央宫殿長秋門因長御倚華具白皇后發中廐車載射士出武庫兵發長樂宫衛告令百官曰江充反乃斬充以徇炙胡巫上林中遂部賓客為將率與丞相劉屈等戰長安中擾亂言太子反以故衆不肯附太子兵敗亡漢書戾太子傳三年春正月帝如雍正月行幸雍漢書武帝本紀匈奴冦五原三月遣兵擊之不利貳師將軍李廣利將十萬人出五原御史大夫商丘成將二萬人出西河重合侯馬通將四萬騎出酒泉城至峻稽山多斬首級通至天柱山敵引去因招降車師皆引還廣利兵敗降荀悦前漢紀初貳師之出也丞相劉屈為祖道送至渭橋廣利曰願君侯早請昌邑王為太子如立為帝君侯長何憂乎屈許諾昌邑王者貳師女弟李夫人子也貳師女為屈子妻故共欲立焉貳師出塞破匈奴兵於夫羊句山乘勝追北至范夫人城㑹有告丞相夫人祝詛上及與貳師共禱祠欲令昌邑王為帝按驗罪至大逆不道六月屈􅈊要斬東市貳師妻子亦収貳師聞之憂懼遂深入要功北至郅居水上逢左賢王左大將合戰一日殺左大將敵死傷甚衆還至燕然山單于自將五萬騎遮擊貳師夜塹漢軍前後數尺從後急擊之軍大亂敗貳師遂降綱目林按燕然山在榆邊外套内四年夏六月帝如甘泉宫六月行幸甘泉漢書武帝本紀後元元年春帝如甘泉郊泰畤正月行幸甘泉郊泰畤漢書武帝本紀夏六月侍中僕射莽何羅反伏誅初莽何羅與江充相善及充敗衛太子何羅弟通用誅太子力戰得封後上知太子寃迺夷滅充宗族黨與何羅兄弟懼及遂謀為逆日磾視其志意有非常心疑之隂獨察其動靜與俱上下以故乆不得發上幸林光宫括地志云秦林光宫漢甘泉宫也旦上未起何羅袖白刄從東箱上見日磾色變走趨卧内欲入行觸寳瑟僵日磾得抱何羅因傳曰莽何羅反日磾捽胡投何羅殿下禽縛之窮治皆伏辜漢書金日磾傳二年春二月帝如五柞宫是月昭帝即位二月上行幸盩厔五柞宫上疾篤侍中光禄大夫霍光問嗣焉上曰立少子君行周公之事光頓首讓曰臣不如金日磾日磾曰臣外國人將令匈奴輕漢三月乙卯拜光禄大夫司馬大將軍日磾為車騎將軍上官桀為左將軍桑𢎞羊為御史大夫與丞相田千秋俱受遺詔輔少主荀恱前漢紀冬匈奴冦朔方遣上官桀行邊匈奴入朔方殺畧吏民發軍屯西河左將軍桀行北邊漢書昭帝本紀昭帝始元五年春正月夏陽人成方遂詣闕詐稱衛太子伏誅有男子乗黄犢車詣北闕自謂衛太子公車以聞詔公卿將軍中二千石雜識視長安中吏民聚觀者數萬人右將軍勒兵闕下以備非常丞相御史中二千石至者立莫敢發言京兆尹不疑後到叱從吏収縛或曰是非未可知也且安之不疑曰諸君何患於衛太子昔蒯瞶遺命出奔輙拒而不納春秋是之衛太子得罪先帝亡不即死今來自詣此罪人也遂送詔獄天子與大將軍霍光聞而喜之曰公卿大臣當用經術明於大誼繇是名聲重於朝廷在位者皆自以不及也廷尉騐治竟得姦詐本夏陽人姓成名方遂居湖以卜筮為事有故太子舎人嘗從方遂卜謂曰子狀貌甚似衛太子方遂心利其言幾得以富貴即詐自稱詣闕廷尉逮召鄉里識知者張宗禄等方遂坐誣罔不道要斬東市一姓張名延年漢書雋不疑傳元鳳元年冬匈奴入㓂邊兵擊之獲甌脫王匈奴發左右部二萬騎為四隊並入邊為㓂漢兵追之斬其首獲九千人生得甌脫王匈奴見甌脫王在漢恐漢以為道擊之即逺去不敢南逐水草遣九千騎屯受降城以備漢北橋余吾令可度以備奔走欲和親常使左右諷漢使者然其侵盜益希遇漢使愈厚欲以漸致和親漢亦羈縻之漢書匈奴傳俱按受降城余吾水在今榆林套内宣帝神爵元年春正月帝如甘泉泰畤上始幸甘泉郊見泰畤數有美祥修武帝故事盛車服敬齋祠之禮漢書郊祀志五鳳元年春帝如甘泉郊泰畤元年正月行幸甘泉郊泰畤漢書宣帝本紀二年春三月帝如雍祠五畤二年春三月行幸雍祠五畤漢書宣帝本紀甘露元年春正月帝如甘泉郊泰畤元年春正月行幸甘泉郊泰畤漢書宣帝本紀二年冬帝如萯陽宫二年冬十二月行幸萯陽宫屬玉觀漢書宣帝本紀按括地志萯陽宫在鄠縣匈奴欵五原塞請朝匈奴呼韓邪單于欵五原塞願奉國珍朝三年正月詔有司議咸曰陛下聖徳充塞天地光被四表匈奴單于鄉風慕義舉國同心奉珍朝賀自古未之有也單于非正朔所加王者所客也禮儀宜如諸侯王稱臣位次諸侯王下詔以客禮待之位在諸侯王上漢書宣帝本紀三年春正月帝如甘泉三年春正月行幸甘泉郊泰畤匈奴呼韓邪單于稽侯㹪來朝賛謁稱藩臣而不名賜以璽綬冠帶衣裳安車駟馬黄金錦繡繒絮使有司道單于先行就邸長安宿長平上自甘泉宿池陽宫上登長平阪詔單于母謁其左右當户之羣皆列觀蠻夷君長王侯迎者數萬人夾道陳上登渭橋咸稱萬歲單于就邸置酒建章宫饗賜單于觀以珍寳二月單于罷歸遣長樂衛尉髙昌侯忠車騎都尉昌騎都尉