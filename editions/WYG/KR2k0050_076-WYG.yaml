徳日盛大得天人之助至其年十二月遂即真矣漢書翟方進列傳新莽始建國二年冬十二月起八風臺王莽簒位二年興神僊事以方士蘇樂言起八風臺於宫中臺成萬金作樂其上順風作液湯如淳曰藝文志有液湯經其義未聞也又種五梁禾於殿中師古曰五色禾也谷永所謂耕耘五徳也各順色置其方面先鬻鶴毒冒犀玉二十餘物漬種師古曰鬻古煑字也古髓字也謂鬻取汁以漬穀子也計粟斛成一金言此黄帝穀僊之術也吕樂為黄門郎主之漢書郊祀志天鳳二年春五原兵起莽好變改制度政令煩多當奉行者輒質問乃以從事前後相乘憒眊不渫上書待報者連年不得去拘繫郡縣者逢赦而後出衛卒不交代三歲矣穀常貴邊兵二十餘萬人仰衣食縣官五原代郡尤被其毒起為盜賊數千人為輩轉入旁郡莽遣捕盜將軍孔仁將兵與郡縣合擊歲餘迺定邊郡亦畧將盡漢書王莽傳地皇元年秋九月莽起九廟於長安城南太初祖廟東西南北各四十丈髙十七丈餘廟半之為銅薄櫨飾以金銀琱文窮極百工之巧帶髙増下功費數百鉅萬漢書王莽傳二年秋莽毁漢髙廟莽感漢髙廟神靈遣虎賁武士入髙廟抜劍四面提擊斧壞户牖桃湯赭鞭鞭灑屋壁令輕車校尉居其中漢書王莽傳淮陽王更始元年秋析人鄧葉等起兵攻武闗克之析人鄧葉于匡起兵南鄉百餘人時析宰將兵數千備武闗葉匡謂宰曰劉帝已立君何不知命也宰請降盡得其衆葉自稱輔漢左將軍匡右將軍攻武闗都尉朱萌降進攻右隊大夫宋綱殺之莽憂不知所出乃率羣臣南郊陳具符命本末仰天大哭氣盡伏而叩頭諸生小民旦夕㑹哭甚悲哀者除以為郎漢書王莽傳莽遣九虎將軍迎擊漢兵至華隂敗走保京師倉莽拜將軍九人皆以虎為號號曰九虎將北軍精兵數萬人東内其妻子宫中以為質時省中黄金萬斤者為一匱尚有六十匱長樂御府中御府及都内平凖帑藏錢帛珠玉財物甚衆莽愈愛之賜九虎士人四千錢衆重怨無鬬意九虎至華隂囘谿距隘北從河南至山于匡持數千弩乘堆挑戰鄧葉北出九虎後擊之六虎敗走史熊王况詣闕歸死莽使使責死者安在皆自殺其四虎亡三虎郭欽陳翬成重収散卒保京師倉漢書王莽傳鄧葉開武闗迎漢兵三輔豪桀共起討莽葉開武闗迎漢丞相司直李松將二千餘人與葉等共攻京師倉未下葉以𢎞農掾王憲為校尉將數百人北度渭入左馮翊界降城畧地李松遣偏將軍韓臣等徑西至新豐與莽波水將軍戰波水走韓臣等追奔遂至長門宫王憲北至頻陽所過迎降大姓櫟陽申碭下邽王大皆率衆隨憲屬縣斄嚴春茂陵董喜藍田王孟槐里汝臣盩厔王扶陽陵嚴本杜陵屠門少之屬衆皆數千人假號稱漢將時李松鄧葉以京師小小倉尚未可下何况長安城當須更始帝大兵到即引軍至華隂治攻具而長安旁兵四㑹城下聞天水隗氏兵方到皆争欲先入城貪立大功鹵掠之利莽遣使者分赦城中諸獄囚徒皆授兵殺豨飲其血與誓曰有不為新室者社鬼記之漢書王莽傳冬十月漢兵入長安共誅莽莽更始將軍史諶將度渭橋皆散走諶空還衆兵發掘莽妻子父祖冡燒其棺槨及九廟明堂辟雍火照城中十月戊申朔兵從宣平門入張邯行城門逢兵見殺王邑王林王巡䠠惲等分將兵距擊北闕下漢兵貪莽封力戰者七百餘人獲莽當得封故貪之而力戰㑹日暮官府邸第盡犇亡二日己酉城中少年朱弟張魚等恐見鹵掠趨讙並和燒作室門斧敬法闥謼曰反賊王莽何不出降火及掖庭莽避火宣室前殿火輒隨之莽紺袀服帶璽韍持虞帝七首天文郎按式於前莽旋席隨斗柄而坐曰天生徳於予漢兵其如予何三日庚戌羣臣扶莽之漸臺欲阻池水王邑晝夜戰士死傷畧盡馳入宫間闗至漸臺見其子睦解衣冠欲逃邑叱之令還父子共守莽軍人入殿中謼曰王莽安在有美人出房曰在漸臺衆兵圍數百重臺上亦弓弩與相射矢盡短兵接王邑父子䠠惲王巡戰死莽入室下晡時衆兵上臺王揖趙博苗訢唐尊王盛等皆死臺上商人杜呉殺莽取其綬校尉東海公賔就斬莽首軍人分莽身支節肌骨臠分公賔就持莽首詣王憲憲自稱漢大將軍城中兵數十萬皆屬焉六日癸丑李松鄧葉入長安將軍趙萌申屠建亦至以憲得璽綬不輒上多挟宫女建天子皷旗収斬之傳莽首詣宛漢書王莽傳二年春二月更始自雒陽遷都長安鄭興河南人更始立以李松行丞相事先入長安松以興為長史令興奉迎遷都更始諸將皆山東人咸勸留雒陽興說更始曰陛下起自荆楚權政未施一朝建號而山西雄桀争誅王莽開闗郊迎者何也此天下同苦王氏虐政而思髙祖之舊徳也今又不撫之臣恐百姓離心盜賊復起矣春秋書齊小白入齊不稱侯未朝廟故也今議者欲先定赤眉而後入闗是不識其本而争其末恐國家之守轉在函谷雖卧雒陽庸得安枕乎更始曰朕西決矣後漢書鄭興傳李松自長安傳送乘御服御又遣中黄門從官奉迎遷都二年二月更始自洛陽而西初王莽敗唯未央宫被焚而已其餘宫館一無所毁宫女數千備列後庭自鐘鼓帷帳輿輦器服太倉武庫官府市里不改於舊更始既至居長樂宫升前殿郎吏以次列庭中更始羞怍俛首刮席不敢視諸將後至者更始問擄掠得幾何左右皆宫省乆吏各驚相視劉𤣥傳延岑據漢中漢中王嘉擊降之更始即位嘉遷大將軍擊延岑于冠軍降之更始既都長安以嘉為漢中王扶威大將軍持節就國都於南鄭衆數十萬後漢書順陽侯嘉傳冬十二月赤眉西入闗赤眉雖數戰勝而疲敝愁泣思欲東歸崇樊崇也等慮衆東向必散不如西攻長安更始二年冬崇自武闗徐宣自陸渾闗兩道俱入後漢書劉盆子傳蕭王遣將軍鄧禹將兵入闗蕭王將北徇燕趙度赤眉必破長安乃拜鄧禹為前將軍中分麾下精兵二萬人遣西入關綱目陜西通志卷七十六
