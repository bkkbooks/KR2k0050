body:
  text: 陜西通志巻四十二茶馬汧渭牧圉自古蕃息天駟騰輝冏卿專職九廐八坊齊力齊色晚代籌邊以荈酬直雀舌龍團大裨軍國隴右銀川招懐異域供我馳驅花雲坐得芻茭節留何啻萬億作茶馬志第十九國朝大清㑹典陜西茶法給畨易馬初差御史巡視後歸巡撫兼理他省發引召商徵課起解陜西茶課陸千柒百伍拾伍兩陸錢定額貳萬貳千肆百引内易馬貳萬柒百玖拾陸引榆林神木寧夏三處壹千陸百肆引每引徵銀叁兩玖錢又安漢二府各徵商茶税貳百伍拾兩順治初易馬例每茶壹箆重壹拾斤上馬給茶壹拾貳箆中馬給茶玖箆下馬給茶柒箆七年題准舊例大引箆茶官商均分小引包茶税分差等今定大小引槩例平分十年定例每茶壹千斤槩准附茶壹百肆拾斤如有夾帶嚴查治罪順治十年榆林神木二道始行茶法從御史姜圖南之請也中路紅山市口額發茶引壹千道徵價銀叁千玖百兩東路神木黄甫川市口額發茶引叁百叁拾肆道徵價銀壹千叁百貳兩陸錢其引於巡按茶馬察院領繳商人俱往荆襄市茶至邊口易賣延綏鎮志國朝茶引設立茶馬御史每嵗在於漢中鞏昌等處招商領引納課報部漢中府西鄉縣茶課銀貳百柒拾玖兩貳錢叁分柒釐捌毫該縣徑解苑馬寺支銷興安州茶課銀肆拾柒兩壹錢壹分貳釐玖毫該州徑解苑馬寺支銷州屬石泉縣茶課銀貳拾貳兩貳分玖毫零漢隂縣茶課銀伍拾兩玖錢壹分壹釐零紫陽縣茶課銀貳百貳拾柒兩叁錢肆分陸釐零俱該縣徑解該州轉解苑馬寺支銷外榆林神木二道報奉文叁分減壹額茶引壹千叁百叁拾肆道徵課銀伍千貳百貳兩陸錢徑解布政司賈志康熈二年裁苑馬寺今俱解布政司國朝茶馬仍設但鎮兵既減闔營額馬僅貳千玖百取之内地而已足故西寧領馬嵗止數拾匹苑廐之牧以實郵傳而池鹽互市等項盡罷惟樁朋馬禁俱沿明制延綏鎮志康熈七年以茶法歸併巡撫甘肅都御史而司其出入者則屬之中東兩㕔延綏鎮志大清㑹典康熈十年題准陜西各營馬匹缺額開數報部移行甘肅巡撫招中撥給仍將補過馬匹毛齒領騎兵丁姓名造冊報部查核茶課官商對分每引壹道額茶百斤又加脚費附茶壹拾肆斤每百引該官商附茶壹萬壹千肆百斤每封伍斤共貳千貳百捌拾封其官茶壹千封赴甘省五司照例􅍐定交納其商附茶封壹千貳百捌拾封任商貨賣歸本接濟新引納茶之外更無餘税自康熈六十一年總督年羮堯管理茶馬令商人每百引納官茶壹千封外納捐助銀柒拾叁兩陸錢貳分柒釐在甘肅布政司衙門交納又令商人每百引納養膳銀肆拾叁兩捌錢捌分壹釐在甘肅巡撫衙門交納雍正初漢中府屬大小商伍百玖拾名額引貳萬柒千貳百捌拾道漢中同知徵收西鄉縣額徵茶課銀貳百柒拾玖兩柒錢陸分壹釐壹毫榆林府商壹百壹拾捌名額引壹千道經知府額徵茶課銀叁千玖百兩神木縣商壹百叁拾肆名額引貳百道神木㕔額徵茶課銀柒百捌拾兩興安州屬本州額徵茶課銀肆拾玖兩玖錢柒分捌釐肆毫紫陽縣額徵茶課銀貳百貳拾柒兩叁錢肆分陸釐玖毫叁絲柒忽石泉縣額徵茶課銀貳拾伍兩叁錢貳分捌釐伍毫漢隂縣額徵茶課銀伍拾兩玖錢壹分壹釐叁毫柒絲伍忽歴代茶馬附考周夏官校人掌王馬之政辨六馬之屬種馬一物齊馬一物道馬一物田馬一物駑馬一物凡頒良馬而養乘之乘馬一師四圉三乘為皁皁一趣馬三皁為繫繫一馭夫六繫為廐廐一僕夫六廐成校校有左右駑馬三良馬之數麗馬一圉八麗一師八皆為六字之誤也八師一趣馬八趣馬一馭夫良善馬五路之馬也鄭康成謂二耦為乗自乘至廐其數二百一十六匹易乾為馬此應乾之莢也至校變言成者明六馬各一廐而王馬小備也校有左右則良馬一種者四百三十二匹五種合二千一百六十匹駑馬三之則為千二百九十六匹五良一駑凡三千四百五十六匹然後王馬大備師十二匹趣馬七十二匹則馭夫四百三十二匹矣麗耦也趣馬掌贊正良馬而齊其飲食簡其六節巫馬掌養疾馬而乘治之牧師掌牧地皆有厲禁而頒之庾人掌十有二閑之政教圉師掌教圉人養馬圉人掌養馬芻牧之事以役圉師馬質掌質馬馬量三物戎馬田馬駑馬馭夫分公馬而駕治之周禮周因井田而制軍賦故四井為邑四邑為丘丘十六井也有戎馬一匹四丘為甸甸六十四井也有戎馬四匹天子畿方千里提封百萬井定出賦六十四萬井戎馬四萬匹漢書刑法志秦非子居犬丘好馬及畜善養息之犬丘人言之周孝王孝王召使主馬於汧渭之間馬大蕃息史記秦本紀秦有騉蹄苑爾雅注有車鄰鄰有馬白顛詩經秦風白顛的顙也傳正義曰此美秦仲初有車馬之好疏駟鐵孔阜六轡在手秦風鐵驪阜大也傳正義曰言襄公鐵色之馬旣肥大而又良善不須控制也疏小戎俴收駕我騏馵秦風騏騏文也左足白曰馵傳正義曰國人夸兵車之善疏四牡孔阜六轡在手騏駵是中騧驪是驂小戎篇黄馬黒喙曰騧傳赤身黒鬛曰駵中中服也驂兩騑也箋正義曰此國人夸馬之善也疏漢太僕秦官掌輿馬有兩丞屬官有大廐未央家馬三令漢書百官表邊郡六牧師苑皆太僕領之而諸牧師苑分在河西六郡馬志未央宫有九廐金廐輅軫廐大廐果馬廐軛梁廐騎馬廐大宛廐胡河廐騊駼廐俱在長安城内三輔黄圖覇昌廐在雍州萬年東北三十八里括地志交道廐去長安六十里近延陵漢書谷永傳註孝景時益造苑馬以廣用史記平準書索隠曰謂増益苑囿造廐而養馬以廣用則馬是軍國之用也平準書注中四年春二月御史大夫綰奏禁馬髙五尺九寸以上齒未平不得出關中六年夏六月匈奴入上郡取苑馬漢書景帝本紀如淳曰漢儀注太僕牧師諸苑三十六所分布北邊西邊以郎為苑監官奴婢三萬人養馬三十萬匹景帝紀注武帝時告緡没入奴婢分諸苑養馬漢書食貨志建元元年罷苑馬以賜貧民武帝本紀天子盛養馬馬之來食長安者數萬匹卒牽掌者關中不足乃調旁近郡又令民得畜牧邊縣官假馬母三嵗而歸及息什一以除告緡用充仞新秦中史記平凖書謂與民母馬令得為馬種令十母馬還官一駒此為息什一也平凖書注建元中衆庶街巷有馬阡陌之間成羣而乘字牝者擯而不得聚㑹平凖書漢書音義曰皆乘父馬有牝馬間其間則相蹄齧故斥不得出㑹同平凖書注元鼎中匈奴渾邪王率衆來降漢發車二萬乗縣官無錢從民貰馬民或匿馬馬不具上怒欲斬長安令汲黯曰令亡罪獨斬臣黯民乃肯出馬上黙然漢書汲黯傳元鼎六年邊車騎馬乏絶縣官錢少買馬難得乃著令令封君以下至三百石以上吏以差出牝馬嵗課息史記平凖書李陵為建章監監諸騎漢書李陵傳昭帝始元四年詔往時令民共出馬其止勿出諸給中都官者且減之文獻通考五年罷馬弩關漢書昭帝紀孟康曰舊馬髙五尺九寸以上齒未平弩十石以上者皆不得出關今不禁也昭帝紀注元鳯二年詔頗省乘輿馬及苑馬以補邊郡三輔傳馬傳驛馬也其令郡國勿斂今年馬口錢昭帝紀元帝初元元年九月詔太僕減穀食馬貢禹言髙祖文景循古節儉廐馬百餘匹今廐馬食粟將萬匹惟深察古道從其儉者可無過數千匹乃下詔太僕減穀食馬漢書元帝本紀後漢世祖建武十九年作髙車廐於長安後漢書杜篤傳安帝元初二年任尚代班雄屯三輔虞詡説尚曰今虜皆騎馬日行數百里來如風雨去如絶絃以步追之勢不相及今莫如市馬尚即上言用其計後漢書西羌傳太僕有牧師苑皆令官主養馬分在河西六郡界中續志北魏太武太延二年冬十一月行幸稒陽驅野馬於雲中置野馬苑魏書世祖本紀平統萬定秦隴以河西水草善乃以為牧地畜産滋息馬二百餘萬匹槖駞將半之每嵗自河西徙牧於并州以漸南轉欲其習水土而無死傷也而河西之牧彌滋矣食貨志唐制諸牧監凡馬五千為上監三千為中監不及為下監園苑有官馬坊每嵗河隴羣牧進其良者以供御六閑馬以殿中監及尚乘主之唐書百官志髙祖武徳二年正月於鄜州南牧馬坊置坊州唐㑹要太宗貞觀二十年八月上踰隴山關次瓦亭觀馬牧唐書太宗本紀初用太僕少卿張萬嵗領羣牧自貞觀至麟徳四十年間馬七十萬六千置八坊岐豳涇寧間地廣千里一曰保樂二曰甘露三曰南普潤四曰北普潤五曰岐陽六曰太平七曰宜禄八曰安定八坊之田千二百三十頃募民耕之以給芻秣八坊之馬為四十八監而馬多地狹不能容又析八監列布河西豐曠之野監有左右因地為名其時天下以一縑易一馬自萬嵗失職馬政頗廢兵志貞觀中自京師東赤岸澤移馬牧於秦渭元和志髙宗時京師養廐馬萬匹張文瓘諫為減廐馬數千玉海崔日用從父兄日知遷殿中少監建言廐馬多請分牧隴右省關畿芻唐書崔日用傳永徽二年九月癸卯以同州苦泉牧地賜民髙宗本紀麟徳中自京師西屬隴右有七馬坊置隴右三使領之百官志州按兵志邠岐四有八坊較此㣲不同儀鳯中益置八監於鹽州鹽州使八統白馬等坊兵志𤣥宗開元十二年諸州府馬闕乏官私共補之唐書兵志二十年朔方節度増領閑廐宫苑監牧使方鎮表二十五年郄昻撰邠岐四州八坊碑頌書目一巻序畧云我有唐之新造國也於赤岸澤得牝牡三千匹命太僕張萬嵗傍隴右字之四十年間馬七十萬六千匹開元初惟得二十四萬匹至十九年復成四十四萬匹上耕籍之明年命邠公典馬政先是國家以岐山近甸邠土晚寒寧州壤甘涇水流惡今𨽻甘省澤茂豐草地平鮮原度其四境分置八坊其五在岐餘在三郡保樂第一甘露第二保樂者隋石門馬坊也甘露先置在九成苑外有詔令新保樂徙甘露折衝果毅蘇忠等八人各主一坊苑總監韋績統之八坊有田千二百三十餘頃分為十屯胄曹參軍碑序開元中突厥欵塞𤣥宗厚撫之嵗許朔方軍西受降城為互市以金帛市馬於河東朔方隴右牧之旣雜此種馬乃益壯唐書兵志天寳六載十二月九姓堅昆及室韋獻馬六千匹於受降城納之唐㑹要十一載詔京旁五百里勿置私牧天寳後諸軍戰馬動以萬計議者謂秦漢以來唐馬最盛十三載隴右羣牧都使奏馬牛駝羊總六十萬五千六百而馬三十二萬五千七百唐書兵志肅宗至徳中幸鳯翔詔公卿百寮以後乘助其軍其後邊無重兵吐蕃乘隙陷隴右苑牧畜馬皆没唐書兵志代宗永泰元年大捜城中百官士庶馬輸官曰團練馬下制禁馬出城者唐書兵志回紇有助收西京功代宗厚遇之與中國婚姻嵗送馬十萬匹酬以縑帛百餘萬匹食貨志大厯三年子儀兼邠寧慶節度使屯邠州回紇赤心請市馬萬匹有司以財乏止市千匹子儀曰回紇有大功宜答其意中原須馬臣請納一嵗俸佐馬直詔不聴郭子儀傳徳宗建中元年市關輔馬三萬實内廐貞元三年吐蕃羌渾犯塞詔禁大馬出潼蒲武關者唐書兵志憲宗元和中張孝忠子茂宗為閑廐使國家自貞觀中至於麟徳國馬四十萬匹在河隴間開元中尚有二十七萬雜以牛羊雜畜不啻百萬置八使四十八監自長安至隴右置七馬坊為㑹計都領岐隴間善水草及腴田皆屬七馬坊至麟徳以後西戎陷隴右國馬盡散監牧使與七馬坊名額盡廢其地利因歸於閑廐使寳應中鳯翔節度使請以監牧賦貧民為業土著相承十數年矣又别勅賜諸寺觀凡千餘頃及茂宗掌閑廐與中尉吐突承瓘善遂並以監牧地歸閑廐司茂宗又奏麟遊縣有岐陽馬坊按舊圖地方三百四十七頃制下閑廐司檢計百姓紛紜論訴節度使李惟簡具事上聞詔監察御史孫革往按問之革還奏曰天興縣東五里有隋故岐陽馬坊地在其側蓋因監為名與今岐陽所指百姓侵占處不相接皆有明騐茂宗怒恃有中助誣革所奏不實又令侍御史范傳式覆按盡翻前奏遂奪居人田業皆屬閑廐舊唐書張孝忠傳沙苑一名沙阜在同州馮翊縣南十二里東西八十里南北三十里宜六畜置沙苑監元和郡國志穆宗即位岐人叩闕訟閑廐使張茂宗所奪田下御史按治悉予民唐書兵志文宗太和七年以銀州刺史領銀川監牧使唐書方鎮表度支鹽鐵使言銀州水甘草豐請詔刺史劉源市馬三千河西置銀川監以源為使開成二年劉源奏銀川馬已七千若水草乏則徙牧綏州境今綏南二百里四隅險絶冦路不能通以數十人守要畜牧無他患乃以𨽻銀川監兵志開成三年以夏州節度使領銀川監牧使方鎮表後周世宗顯徳二年於沙苑内牧馬在同州南二十五里寰宇記宋初市馬陜西麟府豐延保安軍河西綏寧夏州自趙徳明據有河南其收市惟麟府保安軍其後置塲則又止慶延而已宋史兵志太宗淳化二年六月禁陜西緣邊諸州闌出生口宋史太宗本紀至道初西京作坊使楊允恭言商人市諸州茶新陳相揉陜西諸州風土各有所宜非參以多品則少利罷𣙜務令就茶山買茶不可行食貨志真宗咸平六年七月詔陜西振武兵如河東廣鋭例立社馬官給直以市之至天聖初猶得蕃部省馬總三萬四千九百餘匹玉海景徳二年召茶商論議别為新法其於京師入金銀綿帛實直錢五十千者給百貫實茶陜西沿邊亦如之而茶増十五千議奏三司皆以為便宋史食貨志改諸州牧龍坊悉為監賜名鑄印以給之在外之監十有四同州曰沙苑兵志凡招馬之處麟府之黨項豐州之藏才族延鄜保安軍每歳皆給以空名勅書委沿邊長吏擇牙吏入蕃招募給劵詣京師至則估馬司定其直自三千五千至千凡二十三等舊選三嵗至十七嵗者景徳二年詔止市四嵗至十三嵗者餘聴私市文獻通考大中祥符九年李迪凌䇿吕夷簡與三司同議條制時以茶多不精給商人罕有饒益行商利薄陜西交引愈賤知秦州曹瑋請於永興鳯翔府官出錢市之詔可天禧二年三司言陜西入中芻糧請依河北例斗束量増其直計實錢給鈔入京以見錢買之願受茶貨交引給依實錢數令𣙜貨務並依時價納緡錢支茶不得更用芻糧文鈔貼納茶貨詔每入百千増五千茶與之餘從其請時陜西交引益賤京師纔直五千有司惜其費茶宋史食貨志仁宗天聖中詔府州自今省馬三嵗四嵗者不以等第五嵗已上十二嵗已下骨格良善行者悉許綱送估馬司宋史兵志四年許陜西入中願得茶者每錢十萬所在給券徑趣東南受茶一十萬一千茶商獲利争欲售陜西茶食貨志康定初陜西用兵馬不足詔陜西路括市戰馬馬四尺六寸至四尺二寸其直自五十千至二十千凡五等兵志慶厯四年知諫院余靖上奏畧曰臣謹按詩書已來中國養馬蕃息故事乃知不獨出於戎狄也秦之先非子居犬丘善養馬周孝王召使主馬於汧渭間馬大蕃息犬丘今之興平汧渭今之秦隴州界也周官校人之職春執駒以養血氣夏攻駒以防蹄齧月令季春遊牝於牧仲夏遊牝别羣亦秦人之馬政也唐以沙苑監最為宜馬即今同州也自貞觀至麟徳馬四十萬匹開元中置七坊四十八監半在秦隴綏銀則知牧馬之政脩之由人今同州有馬監其餘州軍牧地七百餘所乞敕於羣牧使副都監判官等内一員往監牧舊地相度水草揀擇孳生四逺牧放一依周官月令法務令蕃息别立賞罰以明勸沮庶幾數年之後馬畜蕃盛名臣奏議凡闕馬軍士以分數配填慶厯四年詔陜西填五分五年出内藏庫絹二十萬市馬於府州六年詔陜西社馬死者本營鬻錢以助馬直宋史兵志五月丙申詔陜西市蕃部馬仁宗本紀皇祐元年葉清臣奏臣前在三司嘗陳監牧之弊占良田九萬餘頃嵗費錢百萬緡天閑之數纔三四萬急有征調一不可用今欲不費而馬立辦莫若賦馬於陜西等五路上户一馬中户二户一馬養馬者復其一丁如此則坐致戰馬二十萬匹不為難矣葉清臣傳至和元年詔軍士戍陜西闕馬填七分又詔蜀馬送京師道逺多病瘠自今以春秋冬部送陜西四路總管司二年修陜西蕃馬驛羣牧司每季檄沿路郡縣察視之邊州巡檢兵校聴自市馬官償其直嘉祐中始以陜西轉運使兼本路監牧買馬事後又以制置陜西解鹽官同主之兵志五年八月庚辰置陜西估馬司仁宗本紀英宗治平元年薛向請永興軍養馬務如原州徳順軍并渭州同判三年為任悉以所市馬多少為殿最二年陜西廣鋭勁勇等軍相與為社每市馬官給直外社衆復裒金益之曰馬社軍興籍民馬而市之以給軍曰括買三年詔陜西廣鋭蕃落闕馬復置社買一馬官給錢三十千久之馬不至乃増置如慶厯詔書第三等三十五千第四等二十八千四年以成都府路嵗輸紬絹三萬給陜西監牧司自是蕃部馬至者衆官軍仰給焉宋史兵志神宗熙寧初詔河北騎軍如陜西社馬例立社其後陜西馬社苦於斂率馬志熙寧元年樞宻副使邵元請以牧馬餘田修稼政以資牧養之利沙苑等監餘良田萬七千頃可賦民以收芻粟從之先是羣牧司請於陜西都總管治所置一監以便給軍乃遣官下諸路詳度既又以知太原唐介之請發沙苑馬五百置監於交城宋史兵志七年始建三司幹當公事李把入蜀經畫買茶於秦鳯博馬與成都路漕司議合事方有端而王韶言西人頗以善馬至邊所嗜唯茶乏茶與市即詔趣把據見茶計水陸運至又以銀十萬兩帛二萬五千度僧牒五百付之假常平及坊場餘錢以著作佐郎蒲宗閔同領其事自熙寧七年至元豐八年蜀道茶場四十一京西路金州為場六陜西賣茶為場三百三十二税息至李稷加為五十萬及陸師閔為百萬云文獻通考八年廢河南北八監惟存沙苑一監沙苑先以𨽻陜西提舉監牧至是復屬之羣牧司宋史兵志十年利州路漕臣張宗諤張升卿議廢茶場司依舊通商詔付李稷稷方以茶利要功言宗諤等所陳皆疏謬罪當無赦熈寧中麟州奏夏人之請乃令鬻銅錫以市馬食貨志元豐三年春詔陜西州縣户各計資産市馬坊郭家産及三千緡鄉村五千緡若坊郭鄉村通及三千緡以上者各養一馬増倍者馬亦如之至三匹止馬以四尺三寸以上齒以八嵗以下及十五嵗則更市如初籍於提舉司於是諸道各上其數秦鳯等路六百四十二永興路一千五百四十六兵志五年許川路餘羨茶貨入陜西變賣食貨志元豐中環慶路經畧司言已檄諸蕃部養馬詔閲實及格者一匹支五縑鄜延秦鳯路凖此七年詔鄜延路發户馬二千以給正兵益以永興軍等路及京西坊郭馬又詔陜西路罷社馬法更從買馬司給之元豐末麟府路上所市馬三百以其直増於熈河而又多羸憊乃罷本路博易兵志哲宗嗣位詔陜西碎賣芽茶皆罷宋史食貨志元祐初議興廢監以復舊制於是詔庫部郎中郭茂恂往陜西相視所當置監尋又下陜西轉運提㸃刑獄司按行河渭間牧田以聞兵志元祐二年秦鳯路茶仍官為計置永興鄜延許通商凡以茶易榖者聴仍舊毋得踰轉運司和糴價其所博斗斛勿取息食貨志元祐中詔以蜀馬給陜西軍兵志紹聖元年陜西復行禁𣙜凡茶法並用元豐舊條文獻通考初内外諸軍給馬例不及其元額視其闕之多寡以分數填配元豐更立為定制凡諸軍闕馬應給者陜西路無過十之七然其後諸軍闕馬者多紹聖三年乃詔提舉司陸師閔於嵗額外市馬三萬匹給鄜延路正兵餘支弓箭手仍權不限分數宋史兵志三年知州張赴以為陜西沿邊弓箭手授田不過一頃既養一馬又役一丁備邊之日嵗居其半令但牧一馬而無身丁之役若試之一監或一縣當有利而無害樞宻院是其請下太僕寺應有監牧州縣悉施行之文獻通考紹聖初樞宻院言今嵗籍馬萬三千有竒堪配軍者無幾惟沙苑六千匹愈於他監四年廢淇水等監罷提㸃所及左右廂惟存東平沙苑二監曽布自叙其事曰元祐中復置牧監兩廂所養馬止萬三千匹而不堪者過半今既以租錢置蕃落十指揮於陜西養馬三千五百又人户願養馬者亦數千而所存兩監各可牧萬馬馬數多於舊監而所省官吏之費非一近世良法未之能及時三省皆稱善其後沙苑復𨽻陜西買馬監牧司宋史兵志徽宗崇寧二年陜西舊通蜀茶至是年始通東南茶宋史食貨志大觀元年尚書省言元祐置監馬不蕃息而費用不貲今沙苑最號多馬然占牧田九千餘頃芻粟官曹嵗費緡錢四十餘萬而牧馬止及六千自元符元年至二年亡失者三千九百且素不調習不中于用以九千頃之田四十萬緡之費養馬而不適於用又亡失如此利害灼然可見今以九千頃之田計其磽瘠三分去一猶得良田六千頃以直計之頃為錢五百餘緡以一頃募養一馬則人得地利馬得所養請下永興軍路提㸃刑獄司及同州詳度以聞俟見實利六路新邊閒田當以次施行兵志政和二年盡括澤潞京西山東河北等田即陜右軍蕃羌馬一分給之後詔以所牧馬盡給賜童貫及補陜右諸軍之闕馬者凡九萬餘匹蔡條國史補又大増損茶法凡請長引再行者輸錢百緡即往陜西加二十茶以百二十斤短引輸緡錢二十茶以二十五斤私造引者如川錢引法政和中陜西設官茶令估賣繼以妨商旅下令禁棄宣和元年邠州通判張益謙奏陜西非産茶地奉行十年未經立額嵗嵗比較第務増益稍或虧少程督如星州縣懼殿多前路招誘豪商増價以幸其來故陜西茶價斤有至五六緡者或稍裁之則批改文引轉之他郡及配之鋪户安能盡售均及税農民實受害徒令豪商坐享大利言竟不行宋史食貨志宣和二年詔罷政和二年以來給地牧馬條令收見馬以給軍應牧田及置監處並如舊制凡諸監興罷不一而沙苑監獨不廢兵志髙宗建炎中丞相李綱上言今行在騎兵不多官馬既無獨陜西諸路尚有私馬宜降指揮立格尺以善價買之可以濟一時之乏上以為善李忠定公奏議孝宗乾道間川秦買馬之額嵗為萬有一千九百匹有竒秦司五千九百後秦司六千一百二十文獻通考孝宗時員興宗上奏陜西運茶之制十里為鋪鋪有兵兵日有程月有給茍不如式則罪罰隨之國家逐年收西馬之利皆鋪兵之力也名臣奏議淳熈四年閻蒼舒陳茶馬之弊曰祖宗時一䭾茶易一上駟陜西諸州嵗市馬二萬匹今陜西未歸版圖西和一郡嵗市馬三千匹耳而價用陜西諸郡二萬䭾之茶則夷人遂賤茶矣續文獻通考寧宗嘉泰末秦司三塲増馬七千七百九十八匹興元府馬務每年排養二衙馬一百十一綱率未嘗如數蓋茶馬司靳吝錢帛蕃馬至多不即償故也文獻通考金章宗明昌三年六月陜西提刑司言舊牧馬地久不分撥以致軍民起訟比差官各路定之陜西路牧地三萬五千六百八十餘頃泰和三年陜西設提舉圉牧所續文獻通考衞紹王崇慶元年五月括陜西馬金史衞紹王本紀宣宗元光二年三月省臣以國蹙財竭奏曰金幣錢榖世不可一日闕者也茶本出於宋地非飲食之急今河南陜西凡五十餘郡郡日食茶率二十袋袋直銀二兩是一嵗之中妄費民銀三十餘萬也奈何以吾有用之貨而資敵乎並禁之犯者徒五年告者賞寳泉一萬貫金史食貨志元世祖至元五年𣙜成都茶於京兆置局發賣私自採賣者其罪與私鹽同續文獻通考元制每茶商貨茶必令賫引無引者與私茶同引之外又有茶由以給賣零茶者初毎由茶九斤收鈔一兩至是自三斤到三十斤分為十等隨處批引局司每引收鈔一錢元史食貨志明太祖洪武中立茶馬司於陜西等處聴西蕃納馬易茶降金牌信符賜番族以防詐偽每三年一差官召各番合符以應納差發馬交納易茶有以私茶出境者斬關隘不覺察者處極刑民間蓄茶不得過一月之用茶户私鬻者籍其園入官續文獻通考四年奏准陜西漢中府金州石泉漢隂平利西鄉縣茶園每十株官取一分其民所收茶官給價無主者令守城軍士薅培及時採取以十分為率官取八分軍取二分每五十斤為一包二包為一引令有司收貯於西番易馬明㑹典十七年命茶馬司以所市馬五百六十匹分給陜西騎士十九年行人冀忠往陜西市馬還得馬二千八百七匹遣虎賁左衞指揮僉事姜觀右衞千户沈成行人任俊以鈔三十九萬三千六百九十錠往陜西等處市馬給騎士操練續文獻通考二十二年定茶易馬例上等馬每匹一百二十斤中馬七十斤下馬五十斤明㑹典二十三年陜西都指揮使聶緯以西安左右等衞所市馬七千六十匹送京師二十五年河州番族獻馬萬三百四十餘匹命分給陜西衞所騎士續文獻通考三十年定北邊牧馬草塲自東勝以西至寧夏河西察罕諾爾馬志置陜西苑馬寺卿一人少卿一人寺丞無定員其屬主簿一人又令自三月至九月每月差行人一員於陜西等處省諭把隘關口頭目禁約私茶出境續文獻通考漢中府茶例嵗辦茶二萬六千二百斤兼以巡獲私茶四五萬斤易馬其於逺地一切停止本地茶園人家除約量本家嵗用外其餘盡數官為收買九邊者明制招商中茶上引五千斤中引四千斤下引三千斤每七斤蒸曬一箆運至茶司官商對分官茶易馬商茶給賣每上引仍給附茶一百箆中引八十箆下引六十箆名曰酬勞經過地方掌印官盤驗佐貳官催運若漢中私茶之禁尤嚴凡中茶有引由出茶地方有税貯放有茶倉巡茶有御史分理有茶馬司茶課司驗茶有批驗所明㑹典陜西馬額原額一萬六千一百八十三匹延綏二萬二千二百一十九匹陜西馬價地畝銀一萬七百七十九兩四錢七分六釐零樁朋銀一萬四千九百五十八兩一錢二分馬志凡查比苑馬三年比較陜西行太僕寺苑馬寺所屬地方明㑹典成祖永樂初増置苑馬寺於陜西寺六監二十四苑設官亦視行太僕而各監監正一人監副一人苑有廣狹上苑馬萬匹中苑七千匹下苑四千匹苑有圉長一圉長率五十夫夫牧十馬後馬頗蕃息明史竊軍法志陜西苑馬寺所屬長樂監開成苑安定苑弼隆苑廣寧苑靈武監清平苑萬安苑定邉苑慶陽苑同州監天興苑永康苑嘉靖苑安勝苑威逺監武安苑隴陽苑保州苑泰和苑熈春監康樂苑鳯林苑香泉苑㑹寧苑順寧監雲驥苑昇平苑巡寧苑永昌苑後存二監六苑餘廢十三年遣御史三員巡督陜西等處茶馬司收貯官茶易換蕃馬永樂間每嵗於陜西茶易馬及孳生馬内選取堪中騍馬送御馬監分送各馬房領牧取乳明㑹典仁宗洪熈時陜西按察使陳智疏言按察司所以肅庶官貞百度而太僕寺得臨之嵗徵駒與下民等將憲綱掃地於是罷散馬之令明史竊軍法志宣宗宣徳七年令法司及陜西布按二司雜犯死罪應充軍者發陜西行太僕寺養馬馬志九年十月罷陜西買馬時陜西布政使王敏言陜西今年田榖少收邊餉遥逺先買馬驢及入番諸物民間已甚勞費今又買馬給行都司軍士民實不堪且民間馬有堪用者多以易糧給邊所遺牝馬及駒皆不堪用請以二苑馬寺所選赴京之馬及都行二司衞所官下所養之馬給之上從其言世法錄陜西苑馬寺長樂監𨽻開成安定廣寧黒水四苑靈武監𨽻清平萬安二苑孳牧馬匹舊馬四千八百餘匹并新増種馬一千匹養馬軍人一千一百六十四名九邊考英宗正統三年陜西苑馬司為四監凡苑視其地里廣狹為上中下三等上苑牧馬萬匹中苑七千匹下苑四千匹各苑皆有圉長一圉長率五十夫每夫牧馬十匹圖書編五年閏十一月鎮守陜西副都御史陳鎰奏令延綏各邊堡採刈秋青草各堡執稱沙漠無草而各寨堡嵗用草一百萬束鎰止撥延安府草十萬束供給瘦損馬匹世法錄八年令陜西倉所收茶折支軍官俸給每斤折米一斗五升又奏准金州芽茶一斤收葉茶二斤運西寧茶馬司收貯易馬九年題准起倩四川軍夫給與口糧將減半茶四十二萬一千五百三十斤陸續運赴陜西接界褒城縣茶厰又議准將減運茶斤陜西都司運三分半布政司運六分半除都司所屬延安等八衞延安所屬葭州等六州縣不起軍夫外其餘有司軍衞酌量起倩軍夫給口糧有差俱直抵褒城縣茶厰明㑹典十一年題准延綏一帶衞所自定邊安邊營西抵花馬池東至府谷縣大小營堡水草便利可以牧放每年摘撥軍旗餘丁自行牧養馬匹續文獻通考十四年停止茶馬金牌後每嵗遣行人四員巡察私販自潼關以西通行禁革明㑹典京運馬價正統初延綏軍伍缺馬奏發内帑銀六萬兩買馬給軍嗣是無定額惟遇馬缺巡撫奏討凡募軍俱有奏討馬價每匹給銀十二兩延綏鎮志代宗景泰二年令陜西布政司委官巡視關隘禁約私茶出境暫罷差行人四年復差行人如故續文獻通考英宗復位四年奏准延綏寧夏二鎮輪年循環中納馬匹馬志鹽中馬天順中每中馬一匹給鹽八十引後以所易中馬不堪征操奏准折價延綏鎮志憲宗成化三年令差御史一員於陜西巡茶一年更代定麤茶每百斤收銀五錢芽茶三十五斤亦量收五錢無銀收絲絹等項俱解本省有司收候以補收買茶課支用五年令陜西布政司將金州等處茶課自成化六年為始仍收本色其原折收銀布候豐年收買茶斤送各茶馬司收貯以備易馬明㑹典五年四月巡撫甘肅徐廷璋言西寧地方舊有茶馬例後暫停止近又舉行然民間絶無興販官府又無督辦之人以致茶馬司見茶不滿千斤乞勅所司通查出茶州縣山場定其則例募民採取運赴官庫收貯換易番馬給軍騎操并與苑馬寺作種孳牧其民間採茶除税官外餘皆許給文慿於陜西腹裏貨賣有私越黄河及邊境通番易馬者究問如律世法録十年令陜西榆林等處近邊地土各營堡草塲界限明白敢有那移條欵盜耕草塲及越出邊牆界石種田者依律問擬賈志十一年令取回陜西巡茶御史仍差行人十四年仍差御史於陜西巡茶明㑹典樁朋銀十三年兵部議邊馬倒失酌量官軍朋合出銀買補每遇雙月都指揮出銀一錢千百户鎮撫七分旗軍五分走失被盜者各加五錢扣存官庫照時買馬約一年應扣五千餘兩延綏鎮志十四年奏准陜西易馬須四嵗以上六嵗以下髙大堪中者方准收買兒騸馬就彼給各邊騎操騍馬送苑馬寺孳牧馬志十五年令陜西巡茶御史招番易馬不拘年例願來者聴十九年令四川保寧等府茶課每嵗運十萬斤至陜西接界交收轉運各茶司支用明㑹典孝宗𢎞治三年令陜西巡撫并布政司出榜招商報中給引赴巡茶御史處掛號於産茶地方收買茶斤運赴原定茶馬司以十分為率六分聴其貨賣四分驗收入官四年奏准陜西苑馬寺孳牧馬匹每三年差官㸃閲其各行太僕寺苑馬寺於内府關領精㣲文簿將騎操孳牧馬匹逐一填冩繳部送内府交收明㑹典六年都御史劉忠題准茶馬給領延綏各照年分差人逓領馬志七年以陜西嵗饑開中茶二百萬斤召商𣲖撥缺糧倉分上納備賑八年令免易馬止中茶四百萬斤以資邊儲十年奏准茶易馬除就彼給軍外其餘差官陸續解赴苑馬寺交割俵養十四年以榆林糧餉缺乏將洮河西寧發賣茶斤量開四五百萬斤召商上納價銀𩔖解邊倉糴買糧料十五年令今後不許召商中茶十六年令取回巡茶御史凡一應茶法悉聴督理馬政都御史兼理十七年令陜西每年於按察司揀憲臣一員巡禁私茶一年滿日擇一員交代明㑹典又令將䕫州東鄉保寧利州附近陜西聴督理馬政都御史帶管續文獻通考𢎞治初陜西牧地止存六萬六千頃有竒養馬軍止七百名牧養兒騸騍馬止二千八百匹都御史楊一清往巡撫奏黜寺卿之不職者而簡布按二司叅政副使薦補絃轍大更於是六苑地清復草塲十二萬八千頃有竒清勾撥補養馬軍士二千三百有竒増脩城堡十九處創復馬廐千百所馬給騎操外六苑可常牧馬三萬匹陜自一清至馬日蕃三邊之用頼之明史竊軍法志都御史楊一清又清出騎操地畝朋合銀西安榆林鳯翔各多寡不一備禦馬延綏東路西路中路各營堡多者以千計少者不下數百馬志十八年奏准陜西茶鹽易馬備邊係是舊制今後再不許别項奏討明㑹典都御史楊一清巡撫陜西復講求納馬易茶舊制即金牌失之已久第嚴私販之禁番人無茶則死自不得不奉我差發而來納馬於我四年間得馬萬九千七百餘匹而茶尚積有四十五萬餘斤大小鹽池復増課引銀二萬七百六十兩有竒留貯買馬明史竊軍法志漢中府屬新増茶課銀二萬四千一百六十四斤並舊五萬一千二十六斤一十五兩五錢賈志武宗正徳元年議准勘處漢中所屬金州西鄉石泉漢隂等處舊額嵗辦茶課二萬六千八百餘斤新收茶課二萬四千一百六十四斤俱照數嵗辦永為定例二年仍設巡茶御史一員請勅兼理馬政茶法二事明㑹典榆林鎮原額馬二萬二千二百一十九匹正徳元年起至八年止三次共領過五千四百八十匹馬價銀三萬兩九邊考世宗嘉靖十一年議准西安等衞收貯私茶俱送三茶馬司不拘常例麤細搭配招易臕壯馬匹關送總制衙門給軍騎操十二年奏准陜西金州西鄉石泉漢隂紫陽五州縣茶户巡茶御史每十年一次清審量為増減均平茶課十三年奏准陜西金西等五州縣課茶責令大户徑解茶馬司交納其經過州縣原設茶户二千餘名止𣲖百名徵銀以給大户脚價十四年題准四川䕫州等處附近陜西通茶地方不論軍衞有司凡事干茶法者悉聴陜西巡茶御史管理嚴禁私茶查考舉劾十五年題准今後陜西三茶馬司積茶止留二年之用每年易馬計該正茶外分毫不許夾帶議准陜西行太僕寺每年春秋二季㸃視官庫騎操馬匹如遇倒失照例追收樁朋銀兩買補仍將倒死馬匹並追完銀兩買補數目造册奏繳送部查考如該寺分管官員不行按季㸃視以致追補數少聴撫按指名具奏明㑹典又議准陜西苑馬寺每年清查監苑牧養馬匹年齒壯實可用者造册送巡按衙門備照遇官軍馬匹倒死給領仍照例追樁朋銀收貯以備買補續文獻通考延綏互市馬始自嘉靖中仇鸞奏許馬市計節次易馬六千匹分給軍士延綏鎮志二十年議准陜西三邊重地所産馬匹宜配本處防虜以後發銀買馬不許分派陜省明㑹典二十五年令將見在不堪易馬茶斤減價三分之二差好者量估價二錢二分次一錢八分遇各軍支放折色月分每軍量給一二箆即於本軍應支折色銀内照茶箆數目扣銀在官𩔖解陜西行太僕寺貯庫聴候買馬續文獻通考二十六年令陜西開中茶一百萬斤召内𦂳要邊鎮以備軍餉三十一年以陜西各苑種馬數少議准給本省贓罰等銀四萬兩買補以後缺少止查苑馬寺收貯地畝樁朋銀兩題請買補明㑹典又奏准茶産漢中府等處茶課嵗額五萬餘斤每百斤加耗六斤商茶嵗中率八萬斤令商運賣官取其半易馬續文獻通考三十二年題准陜西苑馬寺令巡茶御史督理各監苑倒失馬匹虧欠馬駒將寺卿丞並監苑各官查叅陜西巡茶一年一次明㑹典三十五年議准陜西苑馬寺孳養馬匹每年准給固原延綏寧夏三鎮共馬二千匹内一千五百匹專給固原五百匹分年輪給延寧二鎮馬志三十九年議准陜西各苑馬老病矮小不堪作種給征者各用退字火印照依時估定價變賣就將前賣過價銀叧買臕馬分發各苑無馬軍丁領養仍將賣過馬驘收過價銀造册奏繳每三年變賣一次明㑹典穆宗隆慶元年議准陜西各苑馬如孳生虧欠五分倒失又多過一分者照買補例分等罰俸提問其孳生多而虧欠少者雖未買補亦酌量免罰孳生少而倒失虧欠多者雖已買補仍加究治三年令陜西撫按巡茶衙門每年贓罰與布政司開納事例銀兩俱聴存留轉解延綏鎮准作本部應發年例又題准將四川課茶改徵折色解陜西苑馬寺易買種馬詔陜西各茶馬司中納官茶明會典三年九月兵部覆巡按陜西李良臣奏請以七苑不堪馬匹查係牧軍賠補者退令叧買大馬本寺量助三分之一以抵贖自後追徵必齒嵗尺寸中度方准印牧係茶易銀買者仍加驗閲必堪收堪俵方准印烙發苑母濫收以滋牧圉之弊上然之續文獻通考五年題准陜西丈過苑馬寺牧地計算熟地三萬頃養馬一萬匹餘熟地五萬頃該寺分别三等徵銀共四萬五千兩解固原鎮兵備道收作軍餉又議准近年奸商假以附茶為由任意夾帶恣情短販甚至漢中盤過有二三年不到茶司者今後招商引内註定一年完者厚賞二年量賞三年免究四年問罪仍抽附茶一半入官五年問罪附茶盡數入官不准再報六年以上即係老引興販照例問遣其經過漢中專責理刑推官查照引内箆斤著實盤驗又各商收買真細好茶完日原住買茶所在官司催發起程仍填註發行年月日期印鈐運至漢中府辨驗真假明㑹典九月御史褚鈇奏請裁革陜西行太僕寺苑馬寺寺丞各増設少卿一員與本寺卿俱兼按察司僉事職銜止聴巡茶御史鈐束其他撫按衙門無得干預從之十二月陜西巡按褚鈇條議茶馬五事一招商引内註定年限數額委漢中府佐一員嚴行稽考如有過期違限者加罪從之續文獻通考六年以陜西嵗課馬駒每匹追銀三兩利於納銀虧欠數多議准將各苑種馬嚴責孳駒如有倒失虧欠俱追補馬駒不許納銀明㑹典又令陜西苑馬寺牧地實有五萬五千三百二十二頃二十六畝一分零内川地一萬二千一百二十頃零坡地三萬一千九百三頃零山地一萬一千三百七頃零將七苑册開見在馬一萬六百七十四匹除駒驘一千九百四匹例不給地外議每騍馬一匹定給川地一百三十畝兒騸馬一匹各給川地五十畝坡山地五十畝川地不足苑分每頃或給坡地一頃五十畝或給山地二頃抵算共該除一萬二千三百五十一頃一十九畝二分零除外川地五千三百九十二頃零每頃議徵銀六錢坡地二萬八千二百八十三頃零每頃議徵銀四錢山地九千二百九十四頃零每頃議徵銀三錢共徵銀一萬七千三百三十七兩四錢八分零又將節年叧議混互不明分争不已地土照例起科共二千二百五十八頃該銀九百八十三兩一錢六分零俱查照徵收專備軍餉扣抵年例軍餉又令苑馬寺牧地照依原擬分别川坡山三等定擬徵銀數目立為定額每年收解固原兵備道專備軍餉支用續文獻通考神宗萬厯二年議准陜西苑馬寺缺少種馬將該寺庫貯茶課等銀嵗解固原鎮二千兩給軍自買於年例應解該鎮馬二千匹内扣留二百匹在苑作種馮志六年四川茶課折色初嵗解陜西巡茶衙門易馬銀一千五百九十六兩五錢三分見今巡茶御史册報新收銀一千六百九十四兩六錢九分五釐續文獻通考十三年題准陜西腹裏地方西安等三府因無官茶私販横行議行巡茶御史招商印給引目每引定為一百斤收買園户餘茶運去漢中府驗明發賣每百斤量抽三十斤入官大約在西安不過六萬斤鳯翔漢中多各不過二萬斤引内明坐地方隨路截角如無印記及越境者以私茶論明㑹典二十九年御馬監太監丘乘雲賞銀五兩紵絲一表裏陜西抽税名馬九月延綏巡撫王見賓奏河套濟農諸部求通馬市上允行之續文獻通考明初興安州課茶四千六百六十三斤七兩四錢七分外加耗茶五十一斤十二兩二錢五分解河東茶馬司萬厯三十四年議允每斤折銀二分共徵銀九十四兩三錢三釐四毫興安州志免糧馬始自成化九年余子俊題免土兵本户税糧二十石以下並其差役專買本軍馬匹牧養萬厯四十三年改為徵銀給價每糧一石徵銀三錢三分土兵領銀買馬每匹十二兩地畝馬價成化六年議於屯田内每頃出銀一錢屯官徵收解鎮收買戰馬給軍計榆林綏徳延安慶陽四衞共一千七百五十八兩六錢八分至萬厯末年逋欠侵漁嵗貯不滿三百金矣延綏鎮志陜西茶課初二萬六千八百六十二斤一十五兩五錢萬厯末茶課五萬一千三百八十四斤一十三兩四錢係漢中府屬金州紫陽石泉漢隂西鄉五州縣嵗辦分解各茶馬司明㑹典陜西通志巻四十二
