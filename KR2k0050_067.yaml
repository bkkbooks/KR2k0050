遊諸生吕珽妻芳年守節撫育二子相繼而殞伶仃無依以績絍自給終其天年里民趙應乾妻郝氏年二十二而寡歷試兵荒不渝其志二子俱成立卒年八十賈志魏氏汧陽趙邦彥妻年二十五而夫亡遺孤於庭甚幼氏矢志守節撫孤有成後於庭以明經任教授氏年九十有五而卒朱氏於庭子徵之妻也徵為名諸生卒時氏年十八子一鶴尚在襁褓氏欲以死殉三日不食翁姑委曲諭之乃勵志苦守後一鶴亦舉明經人稱一門雙節汧陽志燕氏汧陽李簋妻張氏生貟任璽妻明末冦亂俱投崖死汧陽志冉小姐汧陽人幼孤育於伯後賊亂伯遇害氏號天痛哭墜崖而死汧陽志吕氏汧陽庠生蘇育妻蘇氏吕廷諫妻吕年二十一而寡守節五十年蘇年二十一而寡守節四十二年皆教子入泮鄉里稱其賢節汧陽志陳氏隴州舉人閻傳妻同傳入京傳道病卒扶櫬歸守節訓子四十二年隴州志沈氏隴州茍一新妻年二十七而寡守節四十八年關西道表其貞節又梁氏監生米養博妻亦年二十七而寡守節四十二年院司旌表隴州志李氏隴州庠生閻鉟妻年二十八而夫亡遺孤甚幼氏飲氷茹蘖屢經挫折守志不渝後其子入庠氏年五十六而卒守節二十八年隴州志劉妃漢中府瑞王夫人也王在潛邸當婚神宗以妃良家子聘為王妃王性好佛不近女色妃亦賦性貞潔居王宫數十年處子也及王就藩國朝夕禮佛不親藩政妃剛斷明決親閲書奏大小政務總攬處分咸中規則一黠閹欲求某宫人為配上書白妃妃大怒即召母弟劉某與諸官吏促草書上之閹懼逃亡沔邑妃設計斬之其交通宫人以不首賜死癸甲之變有總兵趙鷂子脅王入蜀妃亦隨之王遇害妃投江水死槲葉集冉氏褒城副榜馬上乘妻年二十餘夫死孝事翁姑撫育幼子又儒士路州傑妻王氏年二十一夫故苦節二十四年氏有養女郭氏幼字鄰兒宋宋客蜀不歸倩人諷郭他適女聞之投黑龍江而死里民胡獻珍妻沈氏善事翁姑年二十五而寡時值嵗飢或諷之再適氏嚙指自誓終身不渝年八十卒漢中志趙氏城固生貟夏文炳妻年二十七而寡矢志守節卒年五十四又庠生張嘉猷妻周氏年二十二而夫亡守節撫孤足不出户者四十年教子鳯翮成進士官中丞崇禎中旌表庠生李為範妻張氏亦年二十二而寡親黨憫其少勸之他適氏不應入室仰藥死城固志魏氏洋縣李汝登妻夫亡時氏年二十七守節撫子艱苦備嘗撫按題請旌表洋縣志賈氏洋縣黃錫極妻年二十一而夫亡立志守節或欲奪其志氏懷刃誓死撫孤成立卒年八十二薛增輝妻劉氏年二十五而夫亡父母欲嫁之氏引刀自刎以救得不死守節奉姑卒年八十七洋縣志石氏洋縣貢生李喬木妻夫亡甘貧守節終始不渝天啓時旌表賈志何氏洋縣曹宗武妻于歸月餘而夫亡時氏年十九甘貧守志卒年六十餘李國郁妻趙氏年二十二而夫故守志不移卒年八十嵗任康侯妻薛氏年二十五而寡事親課子卒年七十五洋縣志亢氏洋縣樊維楨妻夫故時氏年十七孝事舅姑勵志守節建坊旌表洋縣志楊氏洋縣任康玉妻年二十而夫故孝事舅姑鞠育孤子苦節終身洋縣志袁氏洋縣諸生劉立典妻楊氏劉士典妻夫亡時二氏年皆二十餘勵志苦守人稱雙節洋縣志白氏洋縣諸生李作樞妻年十八夫亡育遺腹子苦志守節至八十一終薛琦妻強氏年十九夫亡遺子五月守節至九十一終任梁妻紀氏年二十六甘貧守志歷五十年里民周昌嗣妻張氏年二十而寡事姑育孤值兵冦頻擾備盡孝慈邑人公表之楊士茂妻閻氏年二十六夫亡哀毁絶食誓以死殉舅姑勸諭勉強存活仰事俯育極盡孝慈崇禎間旌表洋縣志假氏洋縣楊妻夫故氏年二十一遺孤甫半載孝事翁姑竭力以葬夫之祖父母教其子成立守節五十年柴菴集王氏劉維楨妻西鄉人年二十五夫亡痛哭而死邑令聶宗祐為文以祭之漢中志符氏焦馨逺母西鄉人年二十二而夫亡苦志守節教子入泮又同縣郭彪妻祈氏年二十三而夫亡矢志撫孤克底成立卒年七十嵗西鄉志劉氏鳯縣梁雲髙妻雲髙任廣平訓導卒於官氏年二十二子校甫七月氏矢志守節堅心不移教子慈嚴兩盡後校成諸生有聲庠序鳯縣志金氏沔縣錢一貫妻年十八而一貫亡子在襁褓紡織自給苦節撫孤卒年七十又同里趙子節妻李氏年二十三夫故無子甘心守節卒年六十直指俱加旌表焉沔縣志劉氏貢生王世業繼妻略陽人夫亡氏年十九撫遺腹子矢志守節後子死家益貧守節益堅邑令拜其門奉文特旌嵗有給恤年九十餘卒又同邑劉起敬妻芮氏起敬任湖廣通判病卒氏孀居苦節終身略陽志許氏寧羌生貟張講妻夫亡氏年三十遺腹生子撫之成立院道旌表寧羌志王氏榆林衛指揮使王國禎妻年二十八夫逺出客死江南訃至即投繯鄰媪偕其母抑譬再三後迎母與姑同居侍奉不怠鄉里共推節孝千戶葉森妻何氏年二十六守節里民崔重祚妻趙氏年二十守節白有庫妻劉氏年二十四守節張五倫妻連氏年二十餘撫遺腹子守節崇禎十四年斗粟千錢每遇賑濟雖數日絶粒不踰閾又衛指揮朱玠妻周氏年二十四守節舍餘許聰妻劉氏年二十六守節千戶楊汝楫妻張氏衛軍李春芳妻梁氏衛民薑正妻紀氏李時妻嶽氏餘丁楊明妻髙氏俱年二十七守節百戶李義妻韓氏諸生王經妻劉氏舍餘周潤妻張氏崔天秩妻瞿氏監生劉大學妻曹氏里民楊穆妻孔氏總兵紀世檻妾薛氏里民傅鏜妻王氏俱夫亡守節年登上夀延綏志劉天祥妻王氏榆林人夫亡即縊死于柩前賈志曹氏知縣李盛英妻榆林人英以貢任太湖令崇禎癸未殉賊難後逆闖陷城氏身被數鎗不肯屈辱賊將憐而釋之甘貧教子斷髮守節有司旌其門賈志殷氏懷逺清平堡人榆林學生張威妻年二十九喪夫遺子三嵗時遭荒旱恆紡績以供饘粥苦節五十餘年教子鵬翼為黌上士以夀終巡撫旌之波羅堡應襲汪直妻沈氏年二十五撫孤守志至七十餘卒賈志張氏柴芝蘭妻靖邉人嵗大飢芝蘭偕長子璠負販遇盜死氏年三十指季子國梁謂仲子國棟曰此塊肉足以祀柴氏矣吾與若往求尸即不得則死哀號匍匐果得夫及子尸負之歸矢志自守傭縫紉自給年七十八卒延安志劉氏興安生貟屠瑀妻年十八歸瑀夫故遺孤秉忠甫八月誓甘同死賴鄰婦救之黽勉持家教子入泮苦節四十八年柴菴集水中二女興安人州遭水變死者甚衆幸生者皆找筏浮樹杪間忽波中有呼救人聲漸近筏上人遙見二女子伏朽木上出沒蕩漾即引筏救之俱上筏年約十六七姿態婉孌問其姓不應見筏上人皆祼體森立又無女伴二女相顧語曰吾姊妹倚木不死兾有善地可茍存今景象若此何用生為即携手復躍入水中筏上人挽救不得皆遙望隕涕時崇禎癸未夏六月也興安志張氏興安諸生陳大䇿妻貢士希載女也崇禎癸未水變大䇿溺死氏躃踊靈側幾絶者數四勺水不入口七日口眼湧血而死又同里生貟馬兆祥妻張氏兆祥病故氏自縊以殉時年二十有四興安志某氏興安監生張最妻夫死撫遺腹子茹荼紡績教子入泮有司纍旌之諸生王國英妻徐氏夫故家貧苦節五十餘年王學先妻俞氏夫故有妾生一女氏撫女苦守道守旌其門興安志謝氏洵陽進士李聮芳妻年二十二守節至七十餘嵗清苦自持當道給以公餼王論妻馬氏年二十六寡居事舅姑盡禮撫幼孤成立督學王世懋特加旌禮又邑御史許忠妻某氏勵志守節當道月給廩餼洵陽志侯氏紫陽生貟魏訪之妻年二十夫故數日不食幾死叔暨兄欲奪其節氏剪髮自誓遂絶歸寧力貧以事舅姑喪葬盡禮守節五十四年崇禎十年旌表紫陽志周氏石泉舉人魏人仰妻人仰十九舉于鄉氏每以讀書勉朂相敬如賔及人仰沒守身課子足不踰閾人罕見其影聞其聲者院道旌其門石泉志髙氏漢隂生貟任宗伊妻夫亡守節和熊勵子院道俱旌之里民陳光耀妻蔡氏幼年孀居教子國典成名有司表之賈志南氏商州生貟南文表女年十六父歿孀母疾篤告天求代忽母思肉羮時禁屠氏割股烹進人驚孝烈商州志屈氏邵尊賢妻商州人夫死遺子三月係庶出屈多方撫育誓不再嫁翁文科夀九十三姑鄧氏夀八十九翁病癱癩屈進湯粥接糞穢臥起必扶朝夕罔倦鄉里稱之又李氏生貟周謨妻謨故遺子承文甫四嵗氏誓死守志家計蕭索氏上事孀姑下育弱子甘貧守志五十餘年又李某妻閻氏年二十七而寡守節五十餘年有司旌其門商州志劉氏商州民邦教女年十五聘張綿夀綿夀年十四疾篤氏聞之即輟食比卒氏白父母詣弔臨柩慟哭幾絶謂嫂曰乞分若子過繼我欲守節衆駭異父母促歸氏不可強之不食而死翁姑慟悼備棺槨與其子合葬商州志南氏商州生貟任引妻歸任半載引即卒氏年十四孀守七十年末路貧困苦節愈堅八十四卒有司賜粟帛旌表同郡吕應春妻劉氏亦早年失耦教子有成賈志南氏商州生貟南應旌之女幼聰慧通經書許字山陽劉光方受聘而光亡年十五父赴弔女堅請隨入劉門撫棺哭索衰麻變服請終喪不歸曰此吾家也父母翁姑勸不從因留老媪作伴而去女朝夕上香哭所居室令築墻隔之自為一院院中有井井旁有蠟梅一株梅開不令人折井水不令人汲自題一聨於門扉云梅開遇雪氷心苦井底無波月影寒舅姑外雖至親婦女亦不見面舅姑憐之與氏父母私議擇配氏聞遂割耳炙面幾死議乃寢崇禎二年三月年五十二無疾而卒邑令萬愛民髙其行申請旌表奉敕建烈女坊山陽志張氏雒南生貟夜夢麟妻年二十六而寡苦節撫子年八十卒又王氏同里任景聰妻年二十七而夫亡氏甘貧守志躬親蠶織課子讀書苦節四十年雒南志強氏雒南史鏡妻夫歿年未三十持節撫孤家貧甚歷兵荒艱苦萬狀操持無斁雒南志某氏雒南諸生劉呈旦妻年二十而夫亡氏誓死守節食貧撫子苦操三十餘年雒南志楊氏雷世興妻同州人夫亡姑老子稚家徒壁立氏竭力績紡以給俯仰值嵗凶族人逼奪其志氏以頭觸石血流地乃得完節有司旌表同州志惠氏同州趙守曾妻夫故親老絶嗣叔翁利其産唆翁姑嫁氏氏聞毁容自裁賴鄰婦救之復蘇已雪涕曰叔翁利吾田耳願歸田叔翁未亡人甘以手力養翁姑也叔慚沮後翁姑亡葬祭如禮有司表曰節孝李宗權妻馬氏夫早卒無後氏立從子為嗣守志終身同州志張氏同州馬芳繼妻年十六于歸五年芳卒家計蕭然氏拮據井臼撫前室子果與遺腹子杲饁畝勞耕篝燈勸讀孀苦至老其甘如飴後果克家杲遊泮氏稱夀母貧不能聞於朝其喪夫守志終始不渝者有王相妻楊氏張璠妻楊氏睦爵妻雷氏呼景原妻武氏生貟尚矩妻劉氏董邦靜妻馬氏張嘉猷繼妻路氏董三成妻王氏王養心妻張氏李嘉客妻王氏生貟王選士妻張氏馬涵妻李氏尚澄妻暢氏王無邪妻馬氏李緯妻王氏生貟王養正妻雷氏邢守節妻趙氏雷世恩妻楊氏韓舜清妻陳氏王友妻董氏董三才妻王氏張登蛟妻王氏生貟閻守讓繼妻張氏生貟李傳教繼妻王氏成孟禮妻馬氏李汝棖妻王氏張汝朝繼妻范氏李來攀繼妻黃氏皆旌於有司而未上聞他逺僻枯守繩甕間者猶不克盡書同州志張氏朝邑諸生黨元第母趙氏樊成芳妻俱年十七而寡撫子克成又張氏李尚平妻年十六而寡开氏生貟張淑載妻年二十八而寡二氏皆無子撫姪為後苦守終身又樊氏監生韓仲妻張氏王𢎞緒妻夫亡時年皆二十有二矢志苦守撫孤成立節操凜然又孫氏邑人徐發母年二十而寡家甚貧以紡績自給苦節四十餘年朝邑志雷氏朝邑李天夀妻年二十一而寡無子守志鄉里賢之又王氏李騰琨妻夫亡守節按察使給扁旌表王氏御史雷士禎妻年二十四而寡撫幼孤肅家政者四十年節慈並著朝邑志喬氏李廷璽妻冦氏李瑶妻趙氏雷謙妻皆郃陽人早嵗孀居清操不二郃陽志賀氏李昆妻郃陽人夫亡誓不欲生翁姑以年老無依慰留氏袖刀至靈前割左耳以殉乃守志事親終身完節監生寧洵妻范氏大參燧孫女也范通書史性貞烈適寧未及成禮而寧卒范誓死以殉姑止之以諸孫嗣始勉就食剪髮明信姑婦相依苦節終身黨相妻李氏郃邑村民也年十四夫卒以紡績事親後夀至八十二又康邦成妻褚氏魏恩寄妻趙氏趙昌符妻雷氏寧濬妻李氏趙鑌妻寧氏趙潤妻雷氏俱早年孀居守身不二賈志秦氏田光謙妻郃陽人謙疾篤氏許以死殉及卒殮畢著新衣拜姑曰兒將從夫地下不獲終養矣姑泣挽留乘間自縊賈志李氏安尚起妻郃陽人尚起貿易河南病故氏聞訃痛哭幾絶盡易産完夫債家置二棺待夫櫬歸跪托族黨曰煩舉二棺入地遂潛室自縊而死侯三仕妻趙氏同邑孟春女也三仕病故氏不食死時年一十九郃陽志張氏通判白麒繼妻澄城人夫亡葬祭畢飲毒死邑諸生李朱藎妻呼氏事舅姑盡孝藎疾歿氏痛幾絶因念己與妾俱有娠忍死自護後竟兩無一成乃于崇禎八年冬自經死事聞建坊旌表賈志解氏韓城生貟衛景輶妻亷憲解經雅之女也年十九輶亡氏引創斷脰者數四以翁姑密防父母勸諭乃抱其親姪雲龍嗣夫後日事織絍以奉翁姑其教嗣子嚴而有方間取夫遺書手自督課無何嗣子染疫死氏即投繯柩側柴庵集薛氏王三聘妻韓城人三聘赴京應選授太守未任而故氏對母曰夫嘗云吾不敢望世生富貴人惟願世有節義人今不敢違是訓母曰貞節婦德也汝自主之及夫櫬歸里服毒死諸生薛維緒妻解氏夫病篤剪髮誓以死殉及歿遂投繯姑屢勸阻氏跪泣曰無徒苦我竟絶食死時年一十九嵗又孫一龍妻劉氏夫卒自縊死顔問仁妻王氏夫死氏不食三日其兄至從容問死生孰愈兄曰死固善如母老何氏曰然但歸告母我且強食無憂兄去即自經又同邑諸生張文軌妻師氏夫死縊于柩側其子哭而解之復蘇語家人曰我志決矣痛哭絶粒而死里民楊先樓妻陳氏樓沒于水氏越七日自縊死韓城志薛氏強不息妻王氏史節妻俱韓城人薛年十九夫故絶粒嘔血以翁姑勸止守節六十餘年王年二十守志以織紡奉繼姑育嗣子縣令並旌其門又邑諸生吉黃裳妻史氏年二十三孀居守節五十年賈志薛氏韓城吉來敬妻生子星粲方五嵗來敬死氏絶粒嘔血誓以死殉翁姑以子幼勸之遂事親撫孤績絍以給朝夕屢值嵗荒糟粳自啖教子中崇禎戊辰進士王養粹妻劉氏年二十餘夫死守節孝事孀姑子者都登康熙甲辰進士韓城志按賈志薛氏華隂吉來敬妻與韓城志異陳氏華州生貟王栻妻夫故氏年二十五守節四十餘年柴庵集孫氏王氏李鉉妾華州人夫亡七日俱縊柩旁孫年二十三王年二十一賈志王氏華州諸生郭甸妻年二十一甸故氏孝事翁姑甘貧撫孤三十三年里民王夢熊妻東氏年十九子丕顯甫三月而夫故孝事姑嫜撫子入庠夀六十餘卒郭承實妻杜氏年二十而寡姑年七十子甫一嵗氏甘貧守志孝親撫子九十四卒何溢妻薛氏年二十三孀居守志子婦王氏亦克孝厥姑又邑民李茂妻宋氏郭循規妻喬氏趙齡妻郭氏劉奉祀妻王氏武朝臣妻栁氏武稷妻李氏安天器妻楊氏宜民妻管氏皆苦志守節終身不二賈志閻氏華隂陳虞恭繼妻年二十一而寡撫前子過于己出甘貧守志四十四年霍霞妻楊氏年二十餘而寡善事舅姑苦節四十餘年王之寵妻鮑氏事舅姑克孝少寡守義四十餘年貟偉鉉妻孟氏亦守節撫孤四十餘年陳星斗妻趙氏幼通烈女孝經諸傳適星斗三十而孀矢志撫孤未幾子與婦俱亡更歷兵荒撫二孫成立年八十卒賈志陳氏郭允休妻華隂人幼習女訓歸于郭孝事翁姑郭亡撫棺號泣誓以身殉家人防護甚嚴乘間飲藥死賈志王氏蒲城諸生趙念劬妻幼聰慧婉恬年十六歸念劬未五年念劬病卒時當酷暑躃踊號泣勺飲不入口者四日其母痛哭曰子死如我未亡人何氏強進湯粥曰母在兒何忍死防稍踈解腰絰經死時崇禎十六年七月初六日也銅壺集樊九女蒲城人中丞東謨女字李耀如未娶而耀如死欲往弔以殉母不可朝夕哽咽有委禽者恚恨而卒時年甫十四嵗蒲城志王氏蒲城諸生郭國瑾妻夫死是夜即投繯厠中救免親以遺腹勸始強延既生女即哭請為夫立嗣嗣立即自縊于內室其衣服密縫無寸隙王馨徵妻張氏年十八而寡伯氏謀再醮氏聞引刀刎頸家人奪之復自縊家人又救免竟欎欎成疾而卒張蟬雲者尚紀女也許字李俞檜俞檜被誣繫獄女聞可賄脫謀諸母欲貨粧奩助之母不可曰人盡夫也時女方食即以碗擲地恚不復語臨晚自縊死蒲城志楊氏蒲城生貟王光育妻年二十而夫故撫遺腹子守節四十年蒲城志田氏蒲城生貟楊體乾妻年二十三而夫亡誓以死殉數日內自縊者三俱賴家人救免乃勵志守節撫孤成立苦節四十餘年又同縣趙逢祥妻王氏年二十四而孀居守節教子飲氷茹蘗閣邑稱重諸生單從則妻楊氏夫亡守志教子入庠苦節五十餘年生貟權取宦妻原氏取宦歿遺二子俱幼時原年二十七勵志苦守屢遭巨族凌逼百折不回守節五十餘年賈志李氏蒲城王沂妻沂病故氏年二十三事親保孤逺近稱之守節五十二年柴庵集王氏潼關楊愈懋妻懋總兵四川殉難訃至王絶粒而死少司馬孫必顯卒于官妾郭氏七日不食而死諸生劉鴻發妻孫氏夫暴病亡氏哀痛嘔血而死李可棟妻孟氏年二十五夫以京操卒于京櫬歸治喪畢自縊死又劉氏陳扆畫妻扆為水溺死氏九日不食自縊以殉潼關志張氏潼關張振德妻年十八夫歿號泣欲從死家人勸之氏慨然曰吾夫上無兄弟下無子女若我死夫家一脈絶矣乃取親甥繼嗣以奉宗祀守志終身焉又盧滋妻鄭氏孫元祖妻韓氏俱夫故守志以完節稱潼關志宋氏魏信妻耀州人夫亡守節院司旌表耀州志趙氏李遇妻同官人夫卒氏年二十勤苦守節教子入庠年八十有司旌表賈志李氏溪洪斗妻白水人崇禎間斗病故方殮李躃踊哭已入室投繯遂與斗同殯賈志李氏白水田開稷妻年十九夫亡裂指守節孝親教子四十年又同邑于仁妻郭氏李向春妻武氏吕經妻王氏髙思溫妻龎氏李恩崇妻髙氏吳孟賢妻李氏俱守節終身見稱鄉里賈志王氏乾州宋子大妻年十六歸子大二十四嵗而夫歿撫教二子相繼成名崇禎十一年題請建坊夀八十六諸生吳楫妻丘氏年十九楫亡勵志守節教子燻成貢士夀六十三舉人王啓芳妻夏氏夫亡嫡嫁而夏氏勵志堅節教子入泮孫應路妻馬氏年二十甘貧持節至八十二卒有司旌表張應芳妻上官氏年二十二矢志守節王多受妻吳氏年二十三守節馬奉驥妻吳氏年二十八守節劉宗周妻李氏許天民妻馬氏徐自新妻开氏俱年三十守節終身無玷賈志張氏馬爾蕃妻乾州人年二十痛夫早逝日夜號泣未數月而亡巡按旌之又李氏女者聘陳姓年十六未歸陳罹官刑女聞之曰如此不肖何以托終身遂自經于閨中知州周應泰匾其門馬氏陳汝真妻秋氏師賔妻韓氏黎九成妻俱乾州節婦也馬年二十二孝養舅姑撫遺腹子成立年八十二卒秋年二十七斷髮毁面守節終身韓年未三十守節教子玉田登崇禎戊戍進士夀八十餘俱疏請建坊旌表乾州志張氏生貟馬珮妻武功人年十五適珮性孤介寡言笑崇禎癸未珮歿氏有娠哀毁骨立自矢必死有勸以生子存嗣乃止既産男遂不食而死武功志白氏李行保妻巨氏師誥妻俱永夀節婦也白氏與嫂同嫠撫姪猶子鄉里稱之巨氏割臂以啖夫嚙指以示志賈志貟氏永夀趙應聘妻年二十三而寡無子止二女勵志撫養出閨氏年七十遇竒荒塞戶絶鄰不食而死又諸生史在書妻楊氏年二十四而寡李棟妻胡氏年二十五而寡任廷舉妻楊氏年二十一而寡王在程妻傅氏年二十六而寡趙學妻李氏年二十六而寡宋宇妻祁氏年二十一而寡皆矢志守節以終其身永夀志史氏邠州劉术妻年二十二寡居撫一嵗孤守節三十四年苦志貞操終身不渝邠州志席氏邠州生貟紀復妻劉氏安所遇妻王氏監生閻誥妻並節婦也席氏夫亡守節事翁姑至孝崇禎中旌表劉氏年三十守節至八十二卒王氏少寡子幼守節二十餘年賈志文氏劉復祖妻三水人幼貞慧夫早卒守節五十年能詩文著思古齋草三十五篇賈志文氏景重華妻三水人夫沉疴嵗餘病革謂氏曰若年少不可孀居善事後人氏嚙指誓以死從及亡遂縊于柩側三水志吳氏三水文運徵妻運徵赴公車卒京邸氏年二十四子女無出訃聞數覔死所不食者七日以姑姊朝夕勸諭遂矢死靡他孀居五十餘年夀八十卒三水志許氏李宗白妻三水人夫亡氏年二十三撫孤矢死靡他守節三十年又許氏李蓁妻年三十而孀家貧無子苦節終身賈志王氏三水蘇思望妻李氏思望弟志望妻王年二十五而寡李年二十八而寡俱矢志守節人稱一門雙貞云三水志姚氏羅克明妻淳化人年三十守志割所居地以廣學宫里人欽其賢節淳化志栁氏鄜州羅璜妻年十九而夫亡誓死不嫁撫孤守志四十餘年賈志梁氏陳虞治妻鄜州人年二十夫亡子幼苦節終身又王氏貢生宋吕妾吕無嫡室羣妾中有一遺腹吕亡四月而生子後其生母他適王與其姑苦節四十年舉四孫夀八十餘卒賈志任氏趙世寧妻鄜州人年二十五夫亡家貧守節拾薺養子至七十卒鄜州志申氏孟自務妻洛川人孟佃于趙順宰家趙悅氏色百方圖之夜乘孟出強入室氏執刀刃之反被殺死監司表其烈賈志宋氏中部楊景輝妻景輝歿氏年二十四二子尚幼躬親紡績辛苦萬狀年九十一而終人稱苦節又張廷輔妻賈氏年二十七而寡守節至七十三嵗李應奎妻張氏年二十五而寡守節至七十嵗髙敏妻范氏亦早年喪夫撫孤成立守節五十年中部志楊氏中部劉煜華妻夫亡無子誓死守節內外無依備嘗艱苦守節二十六年中部志李氏諸生劉爾客妻中部人年二十四夫亡氏夜經柩前家人驚救遂苦節撫孤子亦蚤亡偕媳李氏教撫諸孫人稱一門雙節賈志郭氏宜君人父維城久病氏割股肉以進父隨愈賈志張氏宜君貢生趙彬妻無子守節有司屢旌其門夀七十里民田英妻楊氏年二十二夫亡撫子子早卒復撫孫夀七十七終賈志于氏綏德衛應襲髙曇妻李氏百户管邦妻俱年二十五而寡撫孤守志卒年七十餘又指揮王階妻申氏年二十七而寡守節終身綏德志李氏米脂人適榆林庠生馮竒莪夫卒守節不二又米脂諸生姬翊周妻艾氏舉人朝棟女也年二十五夫故守節終身賈志惠氏生貟鮑璽妻清澗人年二十而夫卒翁姑欲嫁之氏誓不改適苦節六十年賈志白氏生貟王永祚妻清澗人年二十夫亡事孀姑竭誠盡孝姑多病氏親嘗湯藥及姑死脫簪珥以送終卒年七十五嵗賈志王氏葭州建安堡宋璋妻夫早亡無子守節至七十餘嵗延綏志閻氏葭州髙家堡鄭維緒妻夫亡矢志守節終始不渝卒年七十餘嵗葭州志牛氏葭州人馬三樂妻年二十而夫卒甘貧守志孝事翁姑苦節五十年撫孤道逺娶媳李氏後道逺歿李守節不移教子維健為諸生維健尋亦早夭妻劉氏恪遵姑訓堅心苦守撫子有成有司表其門曰一門三節葭州志王氏吳堡張如愚妻年十八夫故其母憐其少欲令改適氏抱遺孤晨夜號泣指天誓曰氏欲以死殉母乃止氏勵志苦守躬親井臼孝養舅姑卒年八十有七又同里宋名儒妻劉氏亦少寡撫子守節終身葭州志樊氏吳堡張志賢妻無所出每勸夫娶妾夫不從氏候夫外出為娶妾生五子未幾張故妾改適氏撫妾子如己出後皆成立氏年至八旬鄉里稱賢吳堡志丁氏吳堡諸生冦善妻年二十一而寡生子宗夏甫三嵗氏撫孤堅守後宗夏舉明經任訓導氏年八十有五而卒守節六十四年吳堡志劉氏劉宗舜妻神木人夫死時氏年二十三有子甫五嵗撫之入泮有聲庠序神木志王氏神木人楊名逺母夫早亡氏矢志撫孤守節不二後膺旌典神木志李氏府谷王道大妻幼年孀居苦節堅守卒年八十有二官司旌表府谷志李氏府谷人李瑾之女適保德朱正中年十九而寡歸於母家苦節歷五十年後旌表府谷志朱氏長安生貟馬健空妻姑病氏割股以進獲愈閭里咸稱其孝逆闖據長安縱兵大掠虜獲婦女無算氏聞之投井而死時朱誼濋妻晉氏沈伯騰妻韓氏沈伯起妻任氏王𢎞祖妻袁氏王𢎞宗妻晉氏暨女寅姐蕭起鳯妻王氏蕭仕昌妻葛氏葉增光妻趙氏張素含妻張氏與弟媳素謨妻宗氏李氏國楨女俱投井死張允儀妻王氏自經死又鄭夢麟妻趙氏通經史能文章夫亡守節聞闖亂不食死賈志曹氏咸寧庠生郭晉妻給諌代之女也性貞靜善事翁姑荆布隨分闖至以頭觸壁而死陳大經撰傳劉烈女者給諌𢡟孫女也幼聰慧知書逆闖陷城與母俱投井中母先下而斃女未死園嫗援以綆弗應抱母尸經宿死又趙生民妻王氏王召俊妻熊氏程安妻周氏朱守吾妻徐氏樊培己妻朱氏舉人李芳妻樊氏生貟李光信妻雷氏周培和妻陶氏周培武妻王氏周培明妻朱氏周維垣妻王氏俱投井死又有節婦盧應豸妻康氏夫亡苦守二十年經冦亂亦投井死陳我綸妻雷氏偕妯娌俱投井死朱伯明母某氏挾子孫七人投井死李道妻某氏偕姊妹已字未嫁者十餘人並指揮蔣愈妻楊氏悉投井死髙翔妻唐氏賊欲劫去氏紿賊出自鋸其首而死咸寧志宋氏咸陽薛來徵繼妻能文章工詩歌城陷罵賊死馮志翟烈女興平中軍自信女也賊陷城投井死又王烈女諸生謂靖女李烈女廷祀女皆罵賊死馬志吳氏臨潼武啓哲妻髙陵進士鍾英女也哲亡氏柏舟自矢流冦之亂氏被執大罵賊碎斫其身而死張計允妻喬氏賊掠馬上氏搶地數次厲聲大罵賊怒加刃而死胡默妻趙氏遇賊度不免自投崖下賊追斫其頭以為已死數日後默覔尸猶聞喘息聲舁至家詢之則以啖雪得餘生也是嵗翁與夫俱亡氏髽而撫孤者四十年又孝廉周祚妻王氏妾屈氏諸生胡士竒妻黃氏劉濬源妻袁氏偕妹髙姐次女儒姐俱投井死郝聲揚妻王氏李輔德女劉溢源妻孔氏俱罵賊死又二烈女者臨潼官莊里民女也失其氏賊挾之馬上大罵不絶賊怒甚連斫而死賈志同氏鄠邑諸生趙日升妻與升同被賊掠紿賊曰吾兄也釋之吾從汝賊信之日升得脫免氏度其去逺據樹大罵賊以刀劈之至死猶抱樹不解何氏同里楊遇妻遇亡守節賊至強挾不從乃縳於樹氏忿罵賊以刀割乳塞其口氏仍罵不絶賊剖其腹而死又姚大錫妻閻氏山思廉妻閻氏閻祚昌妻沈氏俱遇賊不辱大罵而死舉人陳治衡妾某氏投井死賈志羅氏涇陽郭來輔妻崇禎己巳延冦入涇陽氏同衆匿髙樓上賊縱火焚樓諸人爭出羅獨赴火死時王進祿妻潘氏曹登祿妻姚氏皆墜崖死寧一鵬妻楊氏王福盛妻馬氏俱投井死己亥秋流寇復入涇陽執王三有妻楊氏劫之去氏不從賊斷臂割腹而死有犬守之逾二日葬訖始去牛象煜妻白氏遇賊不屈賊焚死柴良卿妻賈氏避賊與夫相失賊去於枯井見夫尸氏一慟躍入井中而死監生王運昌妻何氏流冦至令氏入厨作食氏以厨刀自刎死諸生韓鼐妻茹氏遇賊大罵賊艷其姿猶豫未忍殺旁一賊斫其首而死樊鼐妻魏氏賊殺鼐氏投井以殉家人救出復自縊而死韓爾訥妻張氏牛應麟妻齊氏俱避賊居髙樓賊攻不下焚之張有子在懷抱跪托乳母自墜樓死齊子稍長推之下墮樓逸去齊自蹈火而死李魁吾妻楊氏遇賊迫其行不從以甘言令縫袵又不從賊怒連刃而死又劉澤溥妻李氏楊方妻于氏周仕璉妻屈氏王之臣妻吕氏康嗣昌妻王氏王三秀妻陳氏師燮元妻韓氏劉涇妻李氏又李氏夫失其姓俱義不從賊大罵而死何承怡女甫及笄同母避冦窰中賊焚窰子母不出而死王三統妻陳氏張佐妻李氏任盡禮女王養女俱投井死焦希商妻李氏梁爾翰妻趙氏俱自經死賈志楊氏三原貢生秦儒竒妻素賢孝避冦髙樓賊縱火氏抱幼女投窗下死而復蘇復匍匐投井死柴玉堂妻李氏孀居數年遇冦不屈寸磔死陳五妻某氏逸其姓北山冦亂搶南關強挾氏馬上氏墜而搶地者三賊怒連斫死武舉張汝翼妻王氏居孤村汝翼與賊戰被害賊虜氏馬上氏哭墜者數次賊怒剸七刃而死假為章妻劉氏闖冦入城氏恐被辱抱幼女投井死梁應堯妻俱氏梁錥妻白氏俱遭亂投井死溫樹璿妻楊氏投崖死舉人梁士駿妻王氏年十六抱子投井死來氏三女者明經來鑑女也長來貞年十九貟所祐妻次來芳年十六趙耀妻季來媛年十五未字時貞芳歸寧兵入城俱投一井死巢氏夫失名遭亂泣謂夫曰汝苐擕子為宗祀計我偕女必死矣遂沉女井中紉衣自縊死賊至見其懸梁有欲取衣者其魁叱曰烈婦其可令祼乎去之馬夏姐朝江女也喪母聞寇至恐受汚解裙覆面投井死三原志何氏盩厔生貟任榶妻聰慧夙成旁涉書史年十七適榶崇禎八年歸寧遇流賊逼之上馬氏佯從馬上遙語乳媪抱兒去度媪行已逺遂倒投下馬竄入河中水淺不能沒膝賊將涉水取之氏曰吾今亦自畏死願從汝矣授我刀我藉刀柄拄淤泥中即可自力登岸賊擲刀與之氏得刀連自刎腕弱不能絶但流血被體宛轉波濤間賊憤極趣前捉髮出之捶楚備至氏坐地上握刀瞋目大罵賊奪刀支解之事聞建坊旌表立祠祀之同里生貟何興瑞妻陳氏事孀姑最孝流冦突至適興瑞他出姑被重傷氏痛憤罵賊賊揮刀斷其臂而死舉人李瑁妻楊氏諸生翟道妻穆氏俱守身不從被殺死燕氏女者武進士鯤化女也年十四嫻習書史遇賊罵不絶聲賊舉刀恐之女奪刀自刎賊怒連斫而死霍小礽者給練文華公之裔孫也年十九未字崇禎七年罵賊死貢生李拱辰僕李信妻任氏為主守别墅崇禎七年賊至不欲逃曰無以報主也相匿舍旁叢竹中賊至搜獲之令從行氏抱女仆地不肯起賊舉鎗刺之創甚推女與信目之使急去乃厲聲大罵而死丁香者王瓉婢也同瓉逃難賊將近瓉以銀付之使逃去瓉被賊燒死丁香負尸匍匐歸以前銀買棺葬埋人皆義之盩厔志周氏渭南生貟李化春妻崇禎八年冦掠其家逼氏上馬周厲聲罵賊賊怒刃之肚破腸出而死時年二十九嵗里民方寸潔妻同氏王家賔妻袁氏俱匿下邽廢城閣上賊初逼同同不從遂裂其尸以示袁袁掩面撲地曰任爾斫銼賊並殺之同年二十六袁年二十五田母李氏妻李氏姑婦同避賊賊強奪其婦姑婦牽挽不捨冦斷姑一手其一手仍挽婦手賊並殺之胡養正妻史氏成王輔妻薛氏遇賊摟挾上馬投地數四賊以鐵钁捶之而死史年十八薛年十九李自升女年十八流冦逼掠守義被殺死渭南志王氏富平石若星妻賦性端敏幽貞自好崇禎八年流冦入縣氏引三女於樓上賊稔知氏母子色美欲生得之戈徒環繞二匝氏度無可免與三女俱自經死溫九疇妻翟氏賊破寨投河死富平志王氏醴泉人陳繼才妻也崇禎七年賊劫氏逼勒上馬氏大罵遂遇害茍烈女者彌懷女也崇禎八年氏年十五賊欲掠去女堅執不從持刀脅之遂投井死醴泉志髙氏宋薊妻安寨人值草冦橫發自鄉入城以避道值冦劫氏大罵賊截其耳以繩束之馬上臨崖氏復大罵墜而死安寨志白氏諸生薛文炳妻薛氏張志道妻俱安定人遇賊義不受汚白投井死薛自縊死薛一翀妻髙氏年二十三夫亡守妾子數年賊陷城自縊死貢生郝建中妾陳氏年十七投井死里民薛三樂兒婦失其姓初聞盜有掠人子女者即買砒礵一握佩於身一日盜至即吞之扶之馬上行未數步墜而死王彥俊女其夫某被盜殺氏聞出郊奔尸先見夫血在路守哭被賊執氏投氷孔死安定志鄭氏保安進士韓炳衡妻賊破城索宦資氏挺然曰吾夫清官那有餘物賊以白刃加其項氏曰吾為命婦義不可辱遂厲聲罵賊引頸受刃而死時貢生劉善慶妻張氏聞城陷投繯而死諸生王符妻李氏聞賊至城下晨起命婢取櫛沐具曰吾將沐浴見先人於地下城隨陷氏被執罵不絶口賊以刃披其頰傷左耳氏掩耳急奔投井而死里民許志尚妻靳氏年十八夫禦賊城上被傷將死賊至欲掠氏去氏紿之曰吾夫命在旦夕吾掩尸從汝是夕志尚卒氏葬墻下遂投井死保安志髙氏馬萬選妻延川人避兵居山寨崇禎九年賊破寨劫氏行強扶上馬氏奮身墜馬者數次賊以繩縳之馬上至隘徑卒投崖死延川志談氏崇禎甲戍闖冦之犯鳯翔也諸生劉文正妻談氏為賊執大罵不從賊怒手刃之罵愈厲至氣絶而止諸生李某妻張氏罵賊求死賊怒將刀燒紅插入腹中氏猶厲罵而死里民髙守業妻劉氏遇賊屢挫不辱紿賊投井賊怒下之石後三日出尸其色如生時又楊騰鳯妻吳氏崇禎七年騰鳯被執罵賊遇害賊退氏殮夫已畢一哭嘔血而死鳯翔志陳氏庠生袁逢辰繼室寶雞人遭冦亂舉家被虜陳擕六嵗兒遇賊大罵不屈舌血染裳賊怒曰汝倔強如此寧不惜幼子乎從則母子俱活陳罵益力並遇害又胡氏其夫失名流冦破縣逼之上馬氏大罵賊怒碎其尸寶雞志薛氏扶風諸生丘凌雲妻孀居二十年流冦破城投城下死之貢生陳璉妻李氏被賊殺於其家有白犬守之七日不少離俟家人至收葬之時武舉張英鍾妻韓氏庠生王立極妻樊氏韓一龍妻李氏馬行健妻薑氏韓養德妻趙氏里民宋吉祥妻劉氏魏宗效妻楊氏王在宗妻魏氏俱投河死庠生劉文燦妻王氏羅儒童妻王氏劉芳舉之女八姐俱投井死庠生張彥珍妻唐氏張鶴妻張氏里民劉伯義妻張氏俱自經死庠生髙士慎妻張氏與幼女小姐同秉節而死又楊菊姐亦死大參張繼孟妻賈氏夫死張獻忠之難氏以死殉玉莪者繼孟女也賊破城逼之不從見殺主事王繩祖妻陳氏大參王秉鑑母也城陷投井死馬潤姐者汝龍女也賊逼汚女以梃擊賊被磔死諸生馮可時妻周氏賊逼不從被殺死里民田幾妻張氏罵賊而死羅鴻妻史氏馮文可妻王氏王鎰妻孫氏聞賊陷城俱投井死鳯翔府志楊氏郿邑張文竒妻夙嫻閨訓善事舅姑崇禎七年從姑避冦中途見執氏紿賊釋姑度姑去逺伺間投崖賊往救之據地大罵亂刃殺死諸生師以風母楊氏妻王氏俱被賊劫楊罵賊砍傷王挺身撲救立斃刃下郿志茍烈女麟遊人崇禎七年為賊所掠自毁其面罵不絶口遂遇害趙氏生貟趙玉堂妻家貧以紡績佐夫讀書崇禎末年遭流冦劫掠義不受辱墜崖而死麟遊志閻氏隴州戶部員外馬如翰妻年十六于歸崇禎七年冦陷州城氏投水塘中冦曵出氏大罵自抉目毁面復投塘中死後三日得其尸衣裳襪履細結如織縣丞閻廣宗妻胡氏擕幼女投井死庠生馬相如妻李氏率女赴河死貢生俞徽吉妻閻氏王廷詔妻王氏王標妻喬氏張愼行妻馬氏庠生閻光升妻何氏閻光景妻劉氏閻光宗妻李氏李永茂妻閻氏楊世浩妻李氏李振妻閻氏閻舜卿妾武氏醫生葛思洪妻李氏俱不從賊赴水死隴州志嶽烈女城固人十六嵗許字生貟王棐子遇賊罵不絶口賊怒三斷其身貢生嶽中衡女年十八未字賊攻城急中衡語家人曰城破我不偷生若等宜自為計女曰父不惜死兒何敢偷生遂以刀自刎賊至中衡立而罵之被殺里民張拱夀妻李氏年十八避髙傑之亂於谷口與賊遇罵不從賊賊怒碎其身焉城固志王氏洋縣參議吉允迪妻允迪隨父孔嘉任順德府城破氏刎諸生陳守潔妻周氏賊兵犯洋夫婦被掠即夜自經於賊營諸生假際昌妻李氏闖賊殺其夫罵不絶口亦被殺死王延緒妻薛氏俱罵賊死烈女王氏父貴許字程姓未適值闖賊暴掠女忿罵不從賊強掖上馬女搶地毁容賊怒截其軀數假而去里人義之為解衣裏尸以葬號烈女塜洋縣志來氏鳯縣貢生盧效先妻崇禎間賊過天星獲之氏觸樹而死馬烈女者父名義張獻忠破城以女有殊色欲挾去女閉目不從鞭之徉死終不應賊碎其身而死鳯縣志沈氏寧羌諸生曹良輔妻崇禎八年冦陷城自縊而死又張氏谷自登妻亦自縊死諸生沈文斗妻蔡氏夫婦俱被賊執賊欲害沈蔡請以身代賊不從氏怒罵之遂遇害寧羌志趙氏沔吏梁賔妻崇禎間冦至氏因夫病不忍逺避夫再四促之及聞呼噪聲始避於門外麥壠中賊索得脅入營氏厲聲罵曰我清白婦肯從汝賊耶賊怒斷其兩手罵不絶口再斷其兩足而死夫聞之觸墻而斃里民蔡一仕妻胡氏同次女欲渡河避寇女曰即得渡河賊若從馬上追之死亦不免何若葬此江之為愈女先投江母隨之時稱子母雙烈賈志王氏徐士選妻略陽人崇禎甲戍賊掠略陽氏被執誘之不從脅以白刃又不從賊怒剖其腹而死王康寧妻王氏遇賊不屈寸磔而死略陽志髙氏榆林衛山海總兵王世欽妻賊陷城投井死賊退獲尸顔如生中軍劉永昌妻髙氏夫為賊執髙欲就死永昌止之髙曰吾得畢命於君前幸矣遂先永昌死教授徐可徵妻潘氏可徵避賊入井潘料夫先死乃自縊可徵匿井中七日賊去救之出竟不死里民吳伯裕妻王氏聞賊至以石自碎其首未絶復投繯死趙之珍妻馬氏家於焦家川賊營於莊前馬自知不免潛匿古窰內竟飢餓而死百戶王伸妻髙氏孀居十三年聞賊破城整衣笄手擕長婦曰吾寡居不面姻親中一男子者有年矣今面賊乎同長婦入井死後三閲月合殯夫壙開棺視之香聞數里百戶楊坤妻栁氏聞賊警泣告姑曰賊入余必死但不能終養而以幼子纍親奈何城破投井死吳守忠妻楊氏巡捕喬國雲妻劉氏生貟劉伯新妻張氏並二女俱死崔國安妻米氏率婢同羣婦避寇於僻巷賊至見氏色麗欲劫之氏正色危坐賊逼之氏起大罵亂髮爪面碎首出血賊怒加刃而死懷逺威武堡管登魁妻傅氏城陷擕幼男投井死延綏志二烈婦者興安人失其姓劉二虎破城一婦被虜入營欲汚之大罵不從賊以亂石擊破其腦死一婦逃出城外賊追迫之投漢水死興安志烈婦石泉人無名氏崇禎丙子五月初二日賊陷城南門外積草中藏一少婦未二十賊數人取草見婦曵之出見其艷欲驅之入城烈婦踊罵不止賊怒脅以刃仍詈罵如故賊首悅其色慰諭而撫之罵愈厲賊首恨其不屈令斷臂抉舌迫之江干一躍而入觀者無不墮淚石泉志尹氏漢隂貢士茹上珍妻夫亡守志撫子鉞成名院道並旌之崇禎丁丑城陷賊拉媳去氏挽之不得自刎死時經歷陳光啓妾王氏自以少艾恐被辱亦自刎死里民王道直妻鄭氏抱女投井死漢隂志劉氏商州諸生孔維朴繼妻歸未期而寡年十七事舅姑撫前子孀居四十餘年鄉里欽其苦節城破恐被辱投井死盧宜巍妻南氏夫故甘貧事孀姑二十五年城破仰藥死邵公正妻王氏守節十年城破自刎未殊賊執之至泮池以頭觸石檻而死儒士周之瑾妻南氏守志二十餘年城破執氏紿曰井邉有金比至遂投井死石中王妻閻氏苦節二十七年城破罵賊被焚死醫官薑騰鳯妻假氏守節十年城破登城頭以襟覆面倒身而下折骨裂首而死里民雷維元妻孔氏守節十二年城破自焚張希元妻姚氏守節五十年院道旌表被虜不屈死南國禎妻王氏王英妻姚氏俱守節二十年投井死吕元聲母東氏賊攻城急東與媳薛氏誓死促聲戍城頭城陷聲大呼曰城破矣姑婦各執厨刀自刎而死聲見之亦自刎於側孔剛妻吕氏城破投井被賊繫出誘之不從縳柱剜去雙目而投之火儒生南士程妻程氏夫婦俱年十九城破與母王氏同夫被執賊欲殺其姑與夫而納氏氏哭罵不絶口奪刀自殞賊磔其尸而死楊育桂妻杜氏剖腹死貢生閻調璽妻吳氏斷臂死郡署商洛道中軍守備朱從鎮妻李氏貢生牛紹玉妻盧氏牛振武妻王氏諸生牛竒妻周氏周之珽妻牛氏程彤錫妻王氏俱守義不屈而死諸生楊育楨妻武氏陳宗器妻牛氏牛紹開妻王氏里民李從文妻王氏俱自刎死白玉潔妻吕氏以剪自刺其喉不死抱兒匍匐投井死諸生雷維垣妻邢氏張詣妻武氏侯維垣妻吕氏周天琬妻王氏牛維明妻南氏牛芳妻劉氏周志伊妻魚氏兾觀妻楊氏俱投井死諸生張耀明妻楊氏里民田應貢妻孟氏俱自縊死商州志景氏鎮安姚西峰妻崇禎間被賊虜逼氏罵不從賊殺之鎮安志邵氏雒南薛匡倫妻商州方伯可立女也年十六歸倫貞順淑慎克修婦道崇禎十六年因避冦居商闖賊破商城執氏欲辱之氏大罵刖其足磔之時年二十八嵗本朝雍正六年旌表給銀建坊貢士史録妻王氏巨賊入邑王痛罵賊怒以佩刀刺其頸比死猶罵不絶庠生何克俊妻周氏冦至使為炊周正坐罵曰我望族之女肯為爾賊奴作飯耶賊怒殺之里民陶崇妻樊氏避賊居山岩崇禎乙亥賊攻之樊恐寨破被辱從寨上投潭中死之孫應錫妻盧氏闖賊入邑氏自縊死女亦死之邑吏王鳴鳯女年十五兒婦張氏年十七避冦同匿山中度不免同趨峻崖各以衣蒙面擕手墜崖而死雒南志翟氏張春妻同州人崇禎間春陷於陳氏投繯死事聞于朝贈恤有加同州志吳烈女朝邑人崇禎七年流冦劫掠欲去女堅不從強牽至坡底嚇以刃女大罵不絶口遂被害朝邑志雷氏諸生侯在庠妻黨氏雷運泰妻楊氏吳學文妻侯氏雷梗妻俱郃陽人崇禎中冦至雷氏楊氏俱投井死侯氏偕女彩奠亦投井死黨氏自縊死知縣范志𢡟為立節烈祠並祀焉楊丕仲妻袁氏賊掠不從殺身全節王烈女者進士又旦之妹許聘韓原張氏賊至家人逃散女投井而死郃陽志楊氏通判杜一崖妻黨氏主薄路從度妻俱澄城人崇禎八年城陷罵賊而死澄城志師氏韓城儒士解居乾妻崇禎八年流冦號八隊者蹂韓環刃相向氏知不免徐弗為動賊以氏容止端麗逼之氏遂大罵賊手刃隨刃隨罵聲與氣絶而死死七日顔色如生乂諸生王名世妻李氏冦陷薛峰村氏被虜賊欲犯之數以智免擁至堡城下招贖氏即大呼曰我陷於賊以心迹不白為恨毋用贖也我欲死人見處耳遂以手批賊面大罵而死趙翔鳯妻孫氏避賊居崖窰賊攻破之抱幼子夫婦並投崖死薛匡王妻趙氏翔鳯女也避冦花石村崖窰將陷氏投崖死薛允中妻孫氏寨陷度不免與二女堅縫衣裳使不離體同墜城死王國純妻程氏投河死衛思德妻吉氏流冦八大王劫燒氏被執度不免抱幼子赴火死烈士梁養民母衛氏流冦攻寨將破自經死諸生張爾逹妻孫氏事三繼姑孝無間言流賊破陳村寨氏投井死韓城志王小桂王黑女俱十四嵗崇禎二年賊入韓二女與吉氏韓氏髙氏同時而死邑令左𢡟第謂一門五烈云賈志王欣王真心父子為賊殺薛氏跳崖死程應第妻燕氏衛姑於鋒刃之下全身於強暴之徒賊感其孝舍之而去左羅石韓城集張氏華州諸生郭仲熙妻崇禎癸未賊掠村居氏投井死劉烈女者父應柏女年十四賊至匿屋壁間賊劫之弗從賊怒曰速死耶女展頸伏於地刃下而死賈志張烈女華隂人祚昌女年及笄逆闖入關劫女挾之馬上躍下者數四賊怒欲殺之女即引頸受刃分尸為數假賈志張氏蒲城生貟單惟欽繼妻崇禎癸未夫婦避亂至朱牛山欽墜崖死氏慟傷賊定搬尸葬畢自縊死蒲城志蔣氏潼關舉人孔傑儒妻崇禎癸未賊破潼關欲劫之氏大罵不從賊逼以刃氏毫無懼意罵益急賊怒腰斬之時同死不屈者則有儒官徐學禮妻張氏赴火死百戶尹君極妻任氏總旗楊一貴妻楊氏俱自縊死諸生周鼎引妻徐氏里民孫升基妻翟氏俱投黃河死又有登重光妻范氏賊破龍門氏被執罵賊支解盛光之妻關氏賊渡禁峪氏投峪死許教授女北直人父嗣復任潼學教授崇禎癸未城陷殉難死賊衆至犯其女女大罵不屈而死死時猶堅持其衣𢃄見者傷之時潼關生貟宋果妻王氏張文運孫女俱罵賊死歐蘇妻李氏義不受辱死袁茂官妻周氏兵入城自縊死黨氏千總田勇妻流冦至勇陳亡氏著孝服自經死潼關志溫祥姐同官人守備溫所知女年十三許配劉氏子賊破城逼之上馬女厲聲曰我名門女肯從賊求活耶以頭觸石血流被面罵不絶口賊殺之事聞建坊旌表賈志陳氏武功人劉弼主妻崇禎甲戍賊破城氏罵不絶口賊斷其兩臂而死賈志陳氏祖衍溱妻永夀人與姑同幼女被劫賊欲刃姑挾氏以行氏奪賊刀殺女自刎賊驚異釋姑賈志髙荆媧淳化髙一奎女也崇禎五年二月賊至劫脅虜去陳金帛於案曰此物惟汝用之媧義不受辱竟不語擁之騎馬即倒於馬下賊大怒割髮裂衣仍不動遂砍三刀斷喉而死時年十六柴庵志同縣葛氏女小字經姐崇禎十六年闖賊據長安分掠州邑淳化陷女走匿車箱坡敗窰中賊獲之握女兩手出女撒手得脫即舉身投坡下賊去父母踉蹌至瞷坡底見女出之泣負歸女殊不欲生勸之食不食曰兒一處子耳兩手已被賊汚何以生為五日氣遂絶年才十三賈志白氏長武尚杰妻國健之母父子與賊巷戰氏見賊勢衆令國健出城請兵殺賊氏扶杰至家知大勢已去夫婦投繯死王世從妻魏氏為賊虜罵不絶口賊笑而慰之罵益厲旁賊怒羣刀碎死尚時務妻魏氏有女及笄崇禎庚辰賊入城女謂母曰賊既入城不死何待母曰爾能死我復何憂視女入井亦入井死魚璞妻尚氏被虜不辱投井死李福春妻王氏自以首擊石死王登泰妻黃氏自縊死長武志劉氏鄜州諸生王延祚妻年二十夫亡誓不他適育幼子成名守節三十年崇禎間兵叛憤罵被殺任紹伊妻薑氏見夫被執與其姑同縊一木而死里民時養清妻侯氏遇賊執其夫氏力請代死爭之甚急遂殺氏而養清得脫衆賊亦嘆悔又羅宗臣妻王氏遇賊大罵不止賊怒以刀砍之仆地賊以為死去之後數日復生陳善妻王氏遇賊與夫相失賊以皮索繫之臨崖大呼曰此吾謝夫報祖母處也即投下未死次日人聞哭聲舁至家夫亦無恙邢其藴妻何氏賊殺其夫欲汚氏氏以石擊賊大罵賊怒殺之張國時妻田氏幼讀經傳賊至大罵賊刃之丁鴻圖妻李氏流冦陷崖窰欲逼氏以從氏紿取衣物從牖中投崖死李必灼妻雷氏義不受辱投崖死諸生宋國玠妻陳氏年二十一遭冦亂至自縊死鄜州志李氏中部鎮撫劉光燦妻夫亡守節茹荼撫孤賊陷城氏年七十九矣其家掖之走不許曰未亡人何往語未已賊驟至露刃入氏即取刀自刺血流淋漓賊壯其烈與飲食以碗擊賊罵曰吾忍死四十九年今啜賊食耶罵不止遂怒殺之時有諸生呼恆昌母劉氏夫亡守節至老里民劉福妻賀氏年二十五夫亡無子孀居三十年城陷俱死之又貢生劉爾駟妻宋氏罵賊死諸生蘇育世妻劉氏與其女投井死里民曹可升妻王氏投崖死時崇禎四年也又鄜州任氏適中部諸生劉煥崇禎十六年賊陷城獲氏氏大罵賊以刀逼之氏曰死即死必不從汝賊恚亂加刃焉賈志田氏張國時妻宜君人崇禎十四年盜至氏義不受汚罵賊被害賈志賀氏綏德衛正千戶沈湸妻賊破城賀託男大中於妾髙氏從容就義投繯自經延綏志王氏米脂馮觀祥妻崇禎初大荒盜起夫死無依義不受辱投河死髙建鼎妻賈氏崇禎三年遇賊欲汚之氏紿曰汝稍待我遂入內舍刎頸死賈志劉貴姐清澗劉興女也年十七嵗崇禎三年賊攻神崖寨虜婦女五十餘獨貴姐抗節不從乃自言曰與賊為妻吾父吾兄何以為人徑投崖身碎而死賊嘆息去柴庵集戴氏府谷貢生李日滋妻崇禎三年賊圍城急氏恐城陷被辱抱子投崖下三日而死其子無恙同縣蕭偲官錦衣衛妻吳氏逆闖陷京師偲年方二十三死之吳氏亦自經死府谷志陜西通志卷六十七
