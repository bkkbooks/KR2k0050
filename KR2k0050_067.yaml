body:
  text: 陜西通志卷六十七人物十三列女二郭氏劉進忠妻楊氏劉進孝妻長安人姊姒也郭氏年二十夫故守節楊氏夫亡無子斷指自誓與郭氏同心苦守人稱一門雙節云長安志趙氏長安生貟陳經濟妻濟病殂氏七日不食死提學熊師旦表其門又縣民安守性妻孫氏年二十八夫卒自縊死顧應善妻馮氏苦節撫孤冦亂自縊死賈志王氏席榮妻長安人年二十七夫亡誓以死殉母敦諭撫孤乃止苦節四十餘年母病篤氏割股以進病遂愈天啓中給匾旌之鄠縣王氏適邑民閻鴻業舅遘疾王刲股以療邑人稱為孝婦賈志王氏長安晉國柱妻事孀姑朱最孝姑病疫氏毁衣飾供藥餌且祈天請代姑病遂愈王沒國柱繼娶朱氏撫育前妻三子皆克成立長安志韓氏咸寧人李能妻能亡氏絶粒七日死賈志劉氏咸寧王持衡妻太原同知養性女也年十九子女無出而夫亡堅志苦節長齋繡佛守節四十年督學熊師旦奏旌其閭賈志盧氏咸寧尚書紳之女也適庠生蘇幼芳年十七而夫亡矢志撫孤歷五十餘年咸寧志王氏咸寧進士胡叔元妻叔元卒於京氏年二十哀毁骨立撫姪植為嗣愛如己出都御史張翰重其節義給月廩以養之仍匾其門曰貞節年八十一卒咸寧志茹氏咸陽張九鳳妻年三十孀居教子執中以義方後為安嶽尹賈志朱氏咸陽民杜仲清妻鄭氏清弟仲義妻朱年二十而寡鄭年二十五而寡俱守節終身咸陽志王氏咸陽杜希奎妻希奎卒遺孤雲祥甚幼氏守志撫養為娶媳趙氏後雲祥又卒趙與姑同心苦守人稱雙節有司表之咸陽志杜氏咸陽王科妻年十九而寡程氏科子來之妻劉氏來之子元知妻年二十五而寡人稱三世氷霜焉咸陽志郭氏髙陵生員李原植妻幼讀四書及列女傳夫卒守節教子口授魯論及忠孝故事年三十二而卒髙陵志吳氏髙陵黑士昌妻少寡撫子守志年八十一而卒王洪妻周氏無子撫諸女并日而食年七十而卒吳恂妻馬氏幼寡守節撫孤年六十餘而卒崔漢妻楚氏守節不嫁被嫂逼迫具狀縣尹給帖執守以卒髙陵志馬氏髙陵田遇霖妻夫亡守節四十年撫三子俱成立髙陵志何氏鄠縣舉人王堠妻年二十三而堠亡安貧苦節守志終身縣民李庫妻張氏年二十一而寡養姑撫子傋嘗荼蓼如是者垂五十年魏邦開妻南氏亦年二十有一而寡守節三十餘年何津妻楊氏年二十五而寡守節四十年又武輻妻髙氏曹進節妻王氏俱甘貧守志苦節終身鄠縣志封氏藍田謝顯妻年十九而寡矢志撫孤守節歷八十年又魏縉妻熊氏夫亡無子氏年二十一上事衰姑下撫孤女卒年八十有四閻積妻楊氏年二十五而寡守節四十五年撫子成立藍田志張氏藍田生員孫振譜妻振譜亡氏絶食死藍田志李氏藍田生員王業建妻年二十四無子而業建卒夫弟業顯亦相繼而亡妻徐氏年二十二有子甫一嵗李謂徐曰汝有子可守其勉之吾則一死而已徐泣曰嫂死豫復何依百方敦勸李因與徐同心守節共撫一子李年六十卒徐年八十卒天啓三年詔旌其門藍田志晉氏涇陽進士劉宇曜繼妻年二十夫故絶粒求死姑勸止之遂守志撫前氏子繼烈後官長蘆運副涇陽志韓氏涇陽生員劉思向妻年二十四而寡守節三十餘年涇陽志段氏三原舉人溫日知妻夫亡與妾李氏年俱二十同志守節教遺腹子成立又王治寧妻李氏年二十七守節至六十三終子仲妻秦氏年十九守節至七十二終孫士端妻秦氏年三十守節至六十一終三世貞操人比之張婦三節云三原志馬氏郝莪南妻三原人夫亡矢志靡他苦心教子且博通女史內則及歷代史鑑諸書著有近體詩百餘首王氏司馬郎來望之妻十九守節歷五十餘年人號曰女師又馬氏忠獻公理五世孫女也適舉人雒獻書二十而孀守節四十餘年賈志秦氏三原李根元妻年二十二夫卒自縊數次家人救免乃自剔一目甘貧守節教子松年中天啓甲子鄉試夀八十四卒同里員維寧妻孔氏年二十維寧亡痛不欲生數覔死所以家人密防獲免茹荼教子三十六年又員大學妻孔氏年二十夫亡屢縊救免撫遺孤苦節三十五年王君賞妻張氏年二十夫亡絶粒數日家人敦勸乃苦志撫孤五十餘年縣令旌之賈志吕氏張忠妻三原人少寡辛苦自持終身不易其志督學靳公録其子楠為增廣生以嘉其節三原志雒氏三原秦甲業妻業亡氏年少苦節教子四器領鄉薦天啓中奉文旌表又同邑生員李大芳妻某氏年二十五夫亡苦節五十年又秦昻妻吳氏年未二十夫亡甘貧撫孤縣令旌其廬又郭光明妻周氏年二十二夫亡子方襁褓甘貧撫孤四十年三原志劉氏盩厔魏嚴妻嚴歿誓以死守天性尤純孝翁溥年九十餘臥病飲食轉側皆氏扶持之便液漬汚浣濯不倦三年如一日孝聲嘖嘖鄉里無間盩厔志任氏盩厔生員孟芳鄰妻年二十夫死孝事孀姑士民稱之子復死撫孫紹祖成立苦節四十年同里孟學孔妻牟氏年十六歸孟四嵗而孀遺孕方七月苦節四十七年袁某妻侯氏年二十夫卒矢志守節六十年有司表其門又同里趙雲妻楊氏趙琅妻許氏張克憲妻楊氏張附羽妾田氏俱幼年苦節以夀終賈志白氏盩厔生貟馬翰如妻年十九適翰如家貧無以養父母氏以女工佐之二十九嵗翰如病死氏盡剪其髮晝績柩前夜則抱幼女傍柩宿每食必祭祭必盡哀或勸其更志輒斥之越數月聞其伯有成謀遂携其女慟哭拜夫柩前是夜竟自經於柩右時天啓七年夏六月也其身自衣裙至襪履皆針線密縫無寸隙見者咸驚惋泣下稱為封骸節婦邑令張䱋化請於上即其居為立祠夫婦合葬於祠後焉又同里任調元妾焦氏夫亡自縊死焦莊妾劉氏夫亡飲鴆死賈志王氏渭南生貟張而弛妻夫卒氏絶粒毁容吞毒投繯家人救免覷防少踈卒自縊死其妾樊氏亦自縊死天啓元年奉文建坊又生貟孫玻妾張氏年十九玻亡氏櫛沐縊於柩側賈志李氏尹孝䇿妻渭南人生一女夫亡氏年二十六叔翁日夜謀奪其節私許韓氏嵗除夜突擁入門捆載疾馳叔母預匿車中知李帶刃搜擲之李用束髮簮刺喉七孔血淋淋將斃及抵韓門見血不可近遂還之史義伯率諸生白于當道旌匾其門已而女嫁李謂女曰汝當自立我可以死矣遂不食而死賈志劉氏渭南田守愛妻夫卒氏年十九遺腹生子食貧操作守節六十餘年天啓中旌表賈志王氏渭南縣民談應志妻年二十六夫亡斷髮嚙指誓不再適罄夫囊橐以與夫兄弟上事衰姑以紡績供甘旨夀八旬卒安顯然妻尹氏年二十七寡家徒壁立竟日一餐課兒讀書寒暑不懈夀六十六卒鄭時逹妻李氏年二十八守節撫孤吳養浩妻劉氏夫早逝氏奉事祖舅姑孝感閭里撫孤子至成立甘汝濟妻袁氏適汝濟五年而寡或勸改適氏泣曰老親無男媳可代子孤兒失父怙可兼恃孀居五十八年子振世卒成立賈志李氏富平生貟孫應魁妻歸孫二載而孫故氏無出家且貧舅姑勸令改適氏不可遂為立嗣守志終身賈志王氏董璜妻醴泉人夫亡氏年十九生子甫八月苦志守節當道旌之又郭氏董珠妻珠故誓死明志以紡績自給有司旌其門又張氏夫失其名亦以苦節著賈志趙氏指揮陶秉忠妻延安人年十九夫亡其父以無子故屢勸易節氏抗志不從以紡績自給夀七十卒賈志王氏楊虞徴妻膚施人夫亡三日自縊死賈志曹氏梁恭妻劉氏郭鋭妻俱宜川人皆年二十四嵗而寡曹撫二子成立守節五十年劉子早夭撫孫成立卒年八十一嵗宜川志狄氏生貟寧化龍妻宜川人夫亡無子撫嗣孫振祖成立苦節至七十嵗賈志王氏生貟劉永𢎞妻張氏生員李永第妻宜川人俱年十八而寡撫幼子皆克成立後夀並至七十宜川志劉氏呼爽妻宜川人夫亡孀居四十年官旌其門又夀光縣丞楊秉俊繼妻黨氏郭總妻劉氏俱夫亡守志苦節終身賈志袁氏生貟李仁妻延川人夫歿氏年二十四二子皆在襁褓其兄強之嫁不從茹荼甘貧撫二子俱成立又里民王紀妻張氏年十九夫亡有遺腹氏誓不改嫁後産男鞠育成立事姑孝竭力奉養採樵汲水皆躬操之姑歿率子世賔哭泣哀毁稱貸營葬事代夫有終延川志劉氏鳳翔髙應亨妻夫故氏年二十子女無出勺水不入口者數日家素貧含辛茹蓼四十餘年鳳翔志李氏岐山生貟楊大烈妻年二十五夫亡有勸其再適者氏嚙指血以謝曰嘗聞烈女不更二夫今墳土未乾忍他適耶遂守志不渝卒撫孤成立又里民侯省度妻樊氏夫亡守節歷五十年岐山志髙氏生貟張乾妻寶雞人夫亡氏守節四十九年奉文旌表賈志王氏寶雞諸生髙竑妻夫亡年十六矢志柏舟夀五十卒旌表同里張造士妻王氏年未三十夫亡孝奉翁姑克盡婦道有司旌其門鳳翔府志楊氏寶雞劉復引妻夫故楊年二十六遺孤八嵗楊勤紡績教子成立有司旌其廬寶雞志某氏庠生王在鎬妻扶風人年二十夫亡孝事舅姑以紡績自給守志四十年足迹未嘗出閭門里人稱為女君子又馬道逺妻王氏扶風通判衡女也幼年苦節艱難備嘗以夀終扶風志孫氏生貟趙一琴妻扶風人年二十餘夫亡伯氏欲奪志令婢妾迫之氏自經賴鄰嫗救免伯又奪其産業且謀隕其孤氏避之他所辛苦保育授經訓誨克底成立後伯夫婦俱歿氏自營葬祭撫遺女如己出人以為難五十餘終賈志彭氏舉人李華先妻郿縣人華為聞喜令有聲卒於任氏輿櫬歸年未三十操持家政苦節終身鳳翔府志劉氏生貟尹祭湯妻隴州人夫故氏年二十八堅守苦節以紡績自給有勸其再適者氏正色拒之生平言動不茍節操凜然為鄉里所服隴州志朱氏南鄭人端靜少言笑年十六字宋氏子未成禮而宋亡飲食不進孀母葉氏知其意動靜與俱因慰之曰我無子汝死我將何依然女終懼有再婚之命也至七日母不及視遂縊死郡邑申上建坊曰貞烈漢中府志潘氏南鄭馮衮妻年二十二衮亡甘貧守節卒年六十六漢中府志張氏褒城庠生張雲鵬繼妻年二十而寡張前妻生子方五嵗氏視如己出教育成立夀六十九卒漢中志張氏生貟張兆祿妻洋縣人歸未幾而兆祿病氏侍奉湯藥晝夜不懈後兆祿卒氏誓以死殉家人嚴守之不得死氏乃潛藏利刃於衣帶間俟殮畢家人慟哭氏乘間自刎於柩側遂合葬焉事在天啓時漢中府志王氏西鄉諸生符廷瑀妻瑀亡氏以死殉巡按劉廷宣以聞敕建貞烈坊西鄉志王氏指揮楊國禎繼妻寧羌人年十七適楊愛前妻幼女如己出越三年生子甫百日而楊歿氏堅志立節育子長襲父職孀居六十餘年漢中志張氏寧羌生貟蔡延聘妻年二十四蔡故蔡繼母過嚴而家甚貧氏委曲奉養卒得其歡事聞建坊旌表張四聰妻蔡氏年二十二夫故子幼孝事翁姑苦節至八十三卒里民趙洛妻孫氏年十九洛逝子甫數月氏撫子事親孝慈兼至有司旌之賈志張氏總兵謝朝恩妾榆林人恩死自縊又王氏紀總兵世楹僕紀儒妾也儒亡其夕即儒柩縊以死延綏志習氏威武堡彭翀霄妻年二十而寡撫孤守節至六十七卒子士𢎞以孝稱延綏志景氏鎮靖堡杜有秀妻年二十六而寡撫四嵗孤子歷凶荒守節至八十四卒延綏志喻氏興安生貟張應乾妻年二十九夫故誓欲自盡或曰氏死子將誰依意稍解勤勞家政早夜課子不窺門見齒者三十餘年院道表其門里民鄭朝綱妻曹氏夫亡年二十三而寡矢志堅貞撫子成立興安志王氏紫陽生員余養龍妻夫早逝氏年幼矢志無他孝事翁姑嚴訓二子凛節四十餘年天啓七年旌表紫陽志王氏漢隂生貟閔進孝妻年二十五而夫亡矢志撫孤甘貧勵節堅守四十年漢隂志白氏漢隂溫以恭妻以恭卒氏年二十三嵗守志不二奉姑育子苦節三十餘年又魏奉儀妻溫氏年二十六而寡生子未周甘貧守節三十餘年任礱妻楊氏亦年二十六而寡遺孤三月撫育成立守節四十餘年漢隂志駱氏漢隂生貟解鶴妻陳氏藍敏妻李氏里民劉大論妻皆守志節婦也駱年二十三而寡子幼孤寠竭力以事衰姑一十六年陳年二十四而寡守節三十六年李年二十七而寡守節四十餘年賈志趙氏漢隂藍煽妻陳氏藍習妻夫亡守節教子有方院道旌表賈志任氏商州監生葉御邦妻夫亡年十九守節終身賈志王氏萬縣主薄葛坤妻商州人坤以勦賊死於難氏苦守終身賈志王氏鎮安沙仲妻解氏同縣張鏜妻也夫亡守志苦節終身鎮安志朱氏貢生紹孔女也許字謝姓子未嫁隨父任夫病故遂投江而死鎮安志崔氏夏民表妻雒南人年二十八孀居時翁司教吳堡卒於官崔傾資歸櫬致孝于繼姑守節教子四十年又恩選劉漢英妻王氏年二十四而寡守節終身里民王柱妻劉氏年二十七而寡守節四十三年孝姑撫子邑令俱加旌表焉賈志王氏雒南楊守莊妻楊故氏年二十八子作棟方在襁褓值族豪欺孤逼氏再醮氏氷操稜稜辛苦治家義方訓子有烈丈夫風守節五十五年邑令李燦旌其門雒南志石氏生貟趙國寶妻雒南人夫病篤氏誓以身殉夫故氏哭絶復蘇水漿不入口父母翁姑勉慰之石佯許焉及殮畢即入室縊死賈志張氏同州王圭繼妻生一子一女嵗飢家貧圭欲鬻前妻子張曰死者遺此一塊肉忍鬻以糊口耶寧鬻我子於是鬻其子女而留前子人稱女中伯道云又王蕙繼妻張氏翁姑以其少寡無子勸令改適氏指前室子女曰此非吾子耶後值嵗大荒掘草根而食翁姑數逼嫁卒不能奪事聞當道旌表又監生王昻繼妻李氏昻已衰年而李未及笄不再稔而昻卒氏足不踰戶撫育前室子寡居二十年又孫仲時繼妻鄭氏亦善視前室子過於己子凡衣食資用皆先之鄭終仲時以追傷不再娶賈志田氏按察使張思靜妾同州人夫病氏誓以死從及卒遂投繯死賈志張氏石捷妻朝邑人捷死氏拜辭舅姑及弟妹閉户而自縊家人欲毁壁救之氏從內止之曰毋壞吾大事遂縊死經日面如生事在天啓六年賈志閻氏韓日孜妻楊氏申養情妻丑氏霍養孝妻俱朝邑人閻年十七而夫亡祖母井氏姑李氏并孀居氏堅節侍奉矢志撫孤有司交旌之楊年十九守節丑年二十六守節皆教子有成又同里馬丈芬妻趙氏雷子忠妻王氏皆以完節稱賈志王氏魏屏翰妻嚴氏雷一滋妻皆郃陽人夫卒號泣不食而死賈志梁氏喬進孝妻孫氏寧仲賢妻俱郃陽人少寡守節終身不易賈志趙氏生貟雷起蛟妻郃陽人起蛟病篤氏即以死自誓及卒氏痛哭投繯而殉郃陽志瓽氏澄城路世榮妻郃陽舉人瓽照女也通經書大義適榮八年男女無出而榮故矢志苦守孀居四十餘年有司旌其門又同里田某妻和氏王之楫妻張氏馬律妻惠氏馬御妻任氏扈九髙妻袁氏路仕季妻韓氏石韓妻張氏郭現妻栁氏皆夫亡苦節名重里閭賈志路氏馬鶚妻澄城人夫病故氏痛幾絶姑慰之曰死節易撫孤難勉之氏乃守節教子氷操歷六十年夀八十終賈志薛氏韓城髙文運妻運亡薛年十七守節立嗣年九十六終子名自養媳李氏亦以柔靜稱於鄉里韓城志同氏韓城張惟偉妻偉死氏年十九誓不他適撫遺腹子文䡾為諸生以善書名人以為畫荻遺風焉又張星耀妻強氏年二十三夫亡無子毁容斷髮以死自誓撫嗣子省度為諸生年六十二終薛自強妻李氏年十六夫亡舉遺腹子堅志苦節父母欲嫁之遂絶歸寧媳孫氏即與二女墜寨城死者也韓城志王貞女華州人王承勛女許字黃宗憲憲為冦掠去數載不歸父母欲改聘女絶食求死家人百方勸諭女曰必欲活我須歸黃門其父母從之女乃荆叉縞布身操井臼孝事翁姑當道表其閭賈志王良姐華隂屠户女肌體肥胖合卺後夫家疑其腹大恐有娠出歸母家訟之官良姐云妾屠家女榖食少而肉食多是以腹大官吏遊移不決良姐忿然曰此事易白遂引刀剖腹肝腸墮地猶對衆自明言畢而死天啓二年旌表華隂志馬氏廪生王之祚繼室華隂人性柔靜善事舅姑祚歿哀悲不自勝踰月而卒其侍姬楊氏痛哭不食自縊以殉時之祚父母已老别無子息媵妾張氏年方少艾矢志守節以孝養舅姑為己任巳日饜糟粳堂上甘旨必極豐潔後翁姑繼歿氏竭力襄事守節歷四十餘年華隂志楊氏廪生薑濓妻濓亡氏年二十一凛凛氷操不出戶庭孀居六十年後旌表蒲城志曹氏蒲城郭清妻自萬厯六年守節至崇禎元年旌表蒲城志王氏蒲城生貟常清妻夫死時氏年二十五兩兒尚在襁褓哀毁不食死而復蘇後其父勸之曰立孤難死節易汝既有志宜勉為難者氏遂誓志守節起卧夫木主前哭則嘔血家貧甚老姑無依氏紡織以供菽水教子嚴而有方後一子中殤一子入庠白於當事旌表母節蒲城志鄭氏蒲城馬廷襄妻年十九而寡無子立嗣以存夫祀事姑盡孝八十四卒蒲城志王氏蒲城董秋妻適夫四年生子甫一嵗秋死氏年二十五紡績事姑備嘗艱苦後翀成名三任教職氏年九十有三蒲城志二張氏蒲城人胞姊妹也長適魏滌次適滌弟汪滌亡時姊年二十未幾汪又歿妹年二十五妯娌同心守節事舅姑竭誠盡孝內外稱賢後姊年七十三而卒妹年六十六而卒人稱一門雙節焉蒲城志原氏蒲城李自強妻夫死無子氏立嗣以存夫祀撫育不啻己出守節茹苦歷五十年日夜哀號左目喪明蒲城志井氏蒲城原永吉妻年二十八而夫故遺二孤長拱翼甫三嵗次拱軫未彌月氏欲以死殉家人密防之得不死後乃勵志守節孝養翁姑鞠育幼子後二子俱為諸生有聲庠序氏得夀七十人以為苦節之報焉蒲城志原氏李應書妻蒲城人書病故氏以頭觸棺刺血書旌水漿不入口者數日姑以遺娠寬慰亡何舉一女且數月死自經者三俱救免一夕夢夫次早往祭痛哭以頭觸墓前石血流不止扶歸六日卒天啓四年旌表同里馬蘭香鏜之孫女也許聘李氏子春煒春煒罹官刑訃至悲咽欲死沐浴整髻著新衣用白練自縊死時七月十六日餘溽未除停尸三日蠅不侵肌異香滿室面如生事聞旌表蒲城志王氏蒲城楊惟琦妻年二十二夫卒矢志欲殉舅姑力勸乃止遂養親撫子子亦早亡復課孫仕顯成進士年八十一卒天啓五年旌表又閻顧行母王氏夫亡悲慟淚血誓以死殉姑勸乃止家徒壁立日事紡績教子成進士天啓六年旌表賈志假氏潼關張維任繼妻任亡氏年二十八苦節三十年如一日妾文氏初任卒氏誓以死殉不食者七日姻戚多方勸諭乃與假同志守節食息相依假沒後夜半仰鴆死及詰鴆所從來婢云昔七日不食時佩囊已藏至今矣潼關志烏氏序班鎖守貴妻長安人天性至孝姑張氏孀居性嚴易怒烏見怒時即長跪含笑曲意敬順疾革囑貴曰母老宜敬順若妾在時又呼二子曰汝輩慎毋忤婆婆意言畢而逝里中稱為孝婦又安塞教諭楊實儒妻劉氏盩厔人儒宦逰孀姑湛氏病風不能轉側氏扶持侍奉至忘寢食四載如一日姑歿氏亦以勞瘁致疾卒後當道俱加旌奬焉時又有郃陽車氏者生貟李樹畿之婦也善事舅姑每解簮珥供甘旨視親飲食多寡以為喜憂崇禎初嵗大飢氏或並日以食而堂上奉養不致闕遺姑病數年極盡誠孝勞苦成疾而死至今鄉里稱為女師又武功有郭愈妻王氏事孀姑先意承志姑病侍湯藥目不交睫者數日姑死王以積勞成疾卒賈志王氏冦來宣妻乾州人年未三十而夫亡苦志守節至老無玷奏聞旌表乾州志車氏徐自清妻乾州人夫亡氏年未二十撫養一子朝夕紡織子亦早亡獨守四十餘年同郡上官緒妻張氏夫亡氏年二十六終身茹素不忍葷食教二子中和俱入泮年七十卒又韓川妻許氏年二十八川亡家貧甚以紡績為生撫子守節邑令金汝和給粟贍之年九十五卒乾州志董氏三水人年未笄適趙姓不三嵗夫以疾故氏哽咽悲泣誓不獨生舅姑諸親百方勸慰弗從竟投崖下死邑人嘆其貞烈建坊道左勒石三水志羅氏淳化人適三水文翽鳳克勤婦道躬操井臼夫病篤暗具繯求死家人守之死而蘇者三嫠居四十年教子倬天成名儒三水志羅氏淳化舉人文育鳳妻好讀書喜吟咏孝事舅姑克盡婦道所著有拾翠閣草淳化志王氏淳化羅廷官妻廷官歿遺孤二皆在提抱茹齋食淡不改其節嵗屢祲勤操作艱苦撫子歷五十餘年邑令楊燫為作苦節記賈志高氏李柏妻長武人柏故氏年二十九守節撫子天啓年題旌長武志高氏魚三耀妻長武人夫亡守節有司旌表長武志劉氏鄜州長史宋綸妻年二十四而寡守節三十餘年鄜州志張氏鄜州李從義妻年十七而夫亡守節終身崇禎時旌表又李讓妻假氏年二十六而寡孝事翁姑甘貧守節有司扁其門給粟帛焉鄜州志任氏鄜州王文祐妻年二十六而夫亡誓不再嫁撫子成立卒年八十嵗鄜州志李氏綏德左所千戶孫榮妻榮卒家甚貧氏艱苦撫子成立後子臏歷薊鎮總兵官綏德志劉氏綏德馬義妻夫亡守志建貞節坊又紀文烺妻王氏馬文熙妻胡氏王雲標妻鍾氏皆早寡守志申請旌表綏德志蘇氏綏德白麒妻年二十而夫故守節五十年又馬光祚妻文氏亦早年喪夫苦守終身綏德志李氏米脂生貟鄭宗禹妻常氏生貟杜能任妻夫亡守志孀居並五十餘年米脂志潘氏長安陳之英妻年二十七而夫亡氏甘貧守志孀居至五十餘年長安志張氏長安吳伯齡妻年二十四而夫亡斷髮守節事舅姑撫遺子教養備至五十年如一日長安志吳氏西安前衛百戶費之完妻夫亡時氏年始十七矢志守節飲氷茹檗守節五十餘年崇禎時屢表其閭命有司嵗給粟帛以奬勵焉長安志王氏咸寧給事中張國祥妾京師人夫卒於官氏年二十四生子尚未彌月扶櫬西歸食貧守志教子有成苦節歷三十餘年家有婢嫁人亦早年失耦家人勸之他適婢曰我習聞主母言謂婦人從一以終雖迫飢寒有死無二豈可再嫁以辱此訓耶其感化如此長安志張氏長安李雲妻夫早亡氏守節七十年天啓中旌表長安志胡氏生貟孫光引妻蒲州人寄籍咸寧光引卒氏年二十四紡績自給義方教子苦節四十八年咸寧志張氏郡丞許從坤妻咸寧人都諌張齊女也幼貞靜通內訓大義坤卒慟哭不食數日尫羸濵死毁簮珥治書延師教子入庠凡二十五年臨終囑子肇業曰撫孤守節乃婦人分內事甚勿身後舉表其見大體如此李思成傳夏氏生貟李梁妻咸寧人性端淑歸梁時梁已病篤氏日夜侍湯藥不假寐不櫛沐者二年及梁故氏年十八聞父母翁姑欲别議絶粒七日不死後以頭觸柱而死崇禎中旌表賈志董氏咸寧人中翰韓在之母生而聰慧端莊父母深器異之適敕贈君崑旭崑旭卒在方十二齡以撫孤自誓延師課讀立毁簮珥佐中饋視陶母剃髮欵賔無異戊辰正月草日櫛沐危坐而逝夀七十有六在知制誥侍經筵奉使册封鄒太守匾其門曰節夀凝褒茂陵憲副王秉鑑為立傳咸寧志白氏咸寧宋實妻夫亡守志苦節歷四十年院司為表其閭西安府志任氏咸寧梁濟妻濟卒氏無子撫姪為嗣愛如己出苦守終身院司旌表咸寧志何氏咸寧貢生李磐妻馮氏指揮曹煥妻何年二十二而寡守節五十八年馮年十九而寡守節五十年又縣民郭鳳妻張氏年十八夫故守節六十年賈志趙氏咸陽縣民鄭問妻歸二十一日而夫故守節終身卒年八十舊志范氏咸陽生貟劉承恩妻年二十五而寡守節孝親夀九十七嵗舊志蔣氏咸陽蕭體元妻夫死守義父母欲奪之誓以死乃止事親盡孝後以夀終咸陽志趙氏王萬鎰妻康氏監生王道平妻俱咸陽人年俱二十五而寡堅志守節百折不易邑人頌之咸陽志謝氏咸陽人袁宗義妻宗義亡謝年方少艾矢志守節飲氷茹蘖卒