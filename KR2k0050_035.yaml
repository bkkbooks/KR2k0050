  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0050_WYG_035-1a, image: WYG0553/WYG0553-0025a.png}
body:
  text: 陜西通志卷三十五兵防二附考歷代兵制軍儲塞垣邊防兵制夏無考篤公劉其軍三單詩大雅公劉篇三單相襲也傳邰后稷上公之封大國之制三軍以其餘卒為羡今公劉遷於豳民始從之丁夫適滿三軍之數單者無羡卒也箋毛以為從邰往豳未得安定之時其為軍也分老弱婦女為三等之陳而單營之鄭言公劉初至於豳丁夫寡少其軍有三惟單而已無羡卒也正義曰重衣謂之襲三單相襲者謂三行皆單而相重為軍也此謂發邰在道及初至之時以未得安居慮有冦鈔故三重為軍使強壯在外所以備禦之也王肅云三單相襲止居則婦女在內老弱次之強壯在外言有備也地官小司徒云凡起徒役無過家一人以其餘為羡羡謂家之副丁也今言三單則是單而無副故知無羡卒也以周禮言之三軍三萬七千五百人然則從公劉之遷其家不滿此數故通取羡卒始滿三軍也疏周以兵定天下天下既定戢藏干戈教以文德而猶立司馬之官設六軍之衆因井田而制軍賦地方一里為井井十為通通十為成成方十里成十為終終十為同同方百里同十為封封十為畿畿方千里有稅有賦稅以足食賦以足兵故四井為邑四邑為丘丘有戎馬一匹牛三頭四丘為甸甸有戎馬四匹兵車一乘牛十二頭甲士三人卒七十二人干戈備具天子畿方千里提封百萬井定出賦六十四萬井戎馬四萬匹兵軍萬乘故稱萬乘之主戎馬車徒干戈素具春振旅以搜夏拔舍以苗秋治兵以獮冬大閲以狩皆於農隙以講事焉漢書刑法志黃帝立丘井之法因以制兵故井分四道八家處之其形井字開方九焉周之始興太公實繕其法始於岐都以建井畝李衛公問對秦襄公當平王初興兵討西戎以救周平王東遷遂有岐豐之地列為諸侯修其車馬備其兵甲武事備矣至穆公霸西戎始作三軍又置陷陳三萬及孝公用商鞅定變法之令令民為什伍行之十年民勇於公戰怯於私鬬又以秦地曠而人寡晉地狹而人稠誘三晉之人耕秦地優其田宅而使秦人應敵於外大率百人則五十人為農五十人習戰凡民年二十三附之疇官給郡縣一月而更謂更卒復給中都一嵗謂正卒復屯邊一嵗謂戍卒凡戰獲一首賜爵一級皆以戰功相君長長平之後年十五以上悉發又非商鞅之舊矣文獻通考秦二世盡徴材士五萬人為屯衛咸陽令教射下調郡縣轉輸菽粟芻藁皆令自齎糧食咸陽三百里內不得食其榖史記二世本紀漢髙祖二年五月蕭何發關中老弱未傅者悉詣軍漢書髙帝紀如淳曰律年二十三傅之疇官髙不滿六尺二寸以下為罷癃漢儀注云民年二十三為正一嵗為衛士一嵗為材官騎士習射御騎馳戰陳年五十六衰老乃得免為庶民就田里今老弱未嘗傅者皆發之未二十三為弱過五十六為老師古曰傅者也言著名籍也髙帝紀注二年六月令諸侯子在關中者皆集櫟陽為衛髙帝紀劉攽曰諸侯子謂諸侯國人髙帝紀注漢興京師有南北軍之屯南軍衛尉主之掌宫城門內之兵北軍中尉主之掌京城門內之兵文獻通考漢制九月都試太守都尉令長丞會都試課殿最十月車駕幸長安水南門會五營士為八陳進退名曰乘之馬志文帝三年發中尉漢書百官表曰中尉秦官材官屬衛將軍軍長安史記文帝本紀景帝初更名衛尉為中大夫令後元年復為衛尉掌宫門衛屯兵長樂建章甘泉衛尉皆掌其宫漢書百官表武帝建元元年詔衛士轉置送迎常二萬人其省萬人文獻通考三年置期門羽林屬南軍上始微行八九月中與侍中常侍武騎及待詔并良家子弟能騎射者期諸殿門故有期門之號以六郡良家子選給六郡謂上郡西河隴西北地等郡掌執兵送從以材力為官名將多出焉漢書東方朔傳元狩三年秋減隴西北地上郡戍卒半發謫吏穿昆明池武帝紀臣瓉曰西南夷傳有越雋昆明國有滇池方三百里漢欲伐之故作昆明池象之以習水戰在長安西南周回四十里武帝紀注元封六年赦京師亡命令從軍文獻通考太初元年置羽林掌送從次期門名曰建章營騎後更名羽林騎又取從軍死事之子孫養羽林教以五兵少壯令從軍號曰羽林孤兒更名中尉為執金吾掌徼循京師兵卒皆屬焉更名郎中令為光祿勳掌宫殿掖門户屬官有諸郎掌守門户出充軍騎凡郎官皆東直執戟宿衛中郎有五官左右車户騎三將軍漢書百官表四年發天下七科謫出朔方張晏曰七科謫吏有罪一亡命二贅壻三賈人四故有市籍五父母有市籍六大父母有市籍七文獻通考天漢元年秋發謫戍屯五原册府元龜四年發勇敢士出朔方文獻通考征和二年初置城門屯兵漢書武帝紀四年置司𨽻校尉持節從中都官徒千二百人捕巫蠱督大姦猾後罷其兵百官表昭帝始元二年冬發習戰射士詣朔方漢書昭帝紀元鳯五年六月發三輔郡國少年詣北軍天文志宣帝即位皇太后歸長樂宫置屯衛漢書宣帝紀令中郎將騎都尉監羽林百官表羽林有左監主羽林左騎八百人右監主右騎九百人漢官儀地節三年冬十月詔曰朕既不德不能附逺是以邊境屯戍未息今復飭兵重屯久勞百姓非所以綏天下也其罷車騎將軍右將軍屯兵元康元年冬置建章衛尉漢書宣帝紀後漢光武以扶風都尉部在雍縣涼州羌數犯三輔將兵衛護園陵故俗稱雍營漢官儀明帝永平八年三月初置度遼將軍屯五原曼柏曼柏縣在今勝州銀城縣十月詔三公募郡國中都官死罪繫囚減罪一等勿笞詣度遼將軍營屯朔方五原之邊縣妻子自隨便占著邊縣占著謂附名籍父母同産欲相代者恣聽之凡徙者賜弓弩衣糧九年春三月詔郡國死罪囚減罪與妻子詣五原朔方占著所在十六年九月丁卯詔令郡國中都官死罪繫囚減死罪一等勿笞詣軍營屯朔方妻子自隨父母同産欲求從者恣聽之女子嫁為人妻勿與俱後漢書明帝紀安帝元初二年詔郡國中都官繫囚減死一等勿笞詣馮翊扶風屯妻子自隨占著所在後漢書安帝紀冬遣任尚將羽林緹騎五營子弟屯三輔虞詡説尚罷諸郡兵令各出錢數千二十人共市一馬以萬騎之衆逐數千之虜大功立矣尚即上言用其計西羌傳用按此漢兵騎之始順帝永建五年十月詔郡國中都官死罪繫囚皆減死一等詣北地上郡戍永和四年九月令扶風漢陽築隴道塢三百所置屯兵後漢書順帝紀晉附秦苻堅建元中略計兵杖精卒有九十七萬建元末下書悉發諸州公私馬人十丁遣一兵良家子年二十以下武藝驍勇富室材雄者皆拜羽林郎良家子至者三萬餘騎晉書苻堅載記姚興皇初元年徙隂密三萬户於長安分大營户為四置四軍以領之皇初中興練兵講武大閲於城西幹勇壯異者召入殿中晉書姚興載記故按此非晉制然亦草竊雄圖也附載其略云西魏大統九年廣募關隴豪右以增軍旅周書文帝本紀周武帝天和元年秋七月築武功郿斜谷武都留谷津坑諸城以置軍人周書武帝本紀隋兵制十二衛各分左右皆置將軍以分統諸府之兵有郎將副將坊主團主以相統治開皇十年罷北方緣邊之地新置軍府文獻通考唐髙祖武德初始置軍府以驃騎車騎兩將軍府領之析關中為十二道曰萬年道長安道富平道醴泉道同州道華州道岐州道豳州道西麟州道宜州道寧州道涇州道在今甘屬三年更以萬年道為參旗軍長安道為鼓旗軍富平道為元戈軍醴泉道為井鉞軍同州道為羽林軍華州道為騎官軍岐州道為平道軍豳州道為招搖軍西麟州道為苑遊軍宜州道為天節軍軍置將副各一人以督耕戰以車騎府統之六年廢十二軍改驃騎曰統軍車騎曰别將所謂天子禁軍者南北衙兵也南衙諸衛兵是也北衙者禁軍也初髙祖以義兵起太原已定天下悉罷遣歸其願留宿衛者三萬人髙祖以渭北白渠旁民棄腴田分給之號元從禁軍後老不任事以其子弟代謂之父子軍唐書兵志殿中侍御史九人京畿諸州兵皆𨽻焉三輔及近畿州都督府皆置府凡六百三十三百官志關中置府二百六十一積兵士二十六萬舉關中之衆以臨四方會要太宗貞觀十年更號統軍為折衝都尉别將為果毅都尉諸府總曰折衝府凡天下十道置府六百三十四皆有名號而關內二百六十有一皆以𨽻諸衛凡府三等兵千二百人為上千人為中八百人為下府置折衝都尉一人左右果毅都尉各一人長史兵曹别將各一人校尉六人士以三百人為團團有校尉五十人為隊隊有正十人為火火有長禁軍及貞觀初太宗擇善射者百人為二番於北門長上曰百騎又置北衙七營選材力驍壯月以一營番上十二年始置左右屯營於玄武門領以諸衛將軍號飛騎唐書兵志京兆府有府百三十一曰真化匡道水衡仲山新城竇泉善信鳯神安業平香太清餘皆逸華州有府二十曰普樂豐源義全清義萬福修仁神水常興義津定城延壽羅文鄭邑宣義相原孝德溫湯宣化懷德懷仁同州有府二十六曰濟北唐安泰城太州大亭河東興德連邑伏龍溫湯安逺業善南鄉臨髙瀵陽襄城崇道淅谷吉安長春華池永大洪泉善福司禦效誠商州有府二曰洵水玉京鳯翔有府十三曰岐山雍北道清洛邑留谷岐陽文城邑三交鳯泉望苑邵吉山泉邠州有府十曰嘉陽宜祿公劉良社胡陵蜂川萬敵金池舜城宜山隴州有府四曰大堆龍盤開川臨汧鄜州有府十一曰洛昌龍交葦川五交大同安光洛安銀方杏林修武安吉坊州有府五曰杏城仁里思臣永平安臺丹州有府五曰宜城通天同化丹陽長松延州有府七曰敦化延川寧戎因城塞門延安金明鹽州有府一曰鹽川夏州有府二曰寧朔順化綏州有府四曰伏洛義合萬古大斌金州有府一曰洪義梁州有府一曰麗水鳯州有府一曰歸昌地理志貞觀初凡關內團結兵京兆府六千三百二十七人同州六千七百三十六人華州五千二百二十三人選強壯免征賦凡天下節度使有八一曰關內朔方唐六典關內道華州有鎮國軍商州有興平軍鳯翔有隴右軍更名保義隴州有義寧軍鄜州有肅戎軍鹽州曰保塞勝州曰義勇唐書地理志太宗置府八百在關中者五百陸宣公奏議畿內有八鎮兵𨽻左右神策軍郃陽鎮近華州良原鎮近邠州編遺録玄宗開元六年始詔折衝府兵六嵗一簡自髙宗武后時久不用兵府兵之法寖壞畨役更代多不以時衛士稍稍亡匿宰相張説乃請一切募士宿衛唐書兵志張説為朔方節度使親行五城督士馬故時邉鎮兵嬴六十萬説以時平無所事請罷二十萬歸農時衛兵貧弱番休者亡命略盡説請一切募勇強士優其科條簡色役不旬日得勝兵十三萬分補諸衛以強京師後所謂彍騎者也張説傳十一年取京兆蒲同岐華府兵及白丁益以潞州長從兵共十二萬號長從宿衛嵗一番命尚書左丞蕭嵩與州吏共選之明年更號曰彍騎兵志十一月詔曰同華兩州精兵所出地資輦轂不合外支自今已後更不得取同華人充兵防册府元龜玄宗以萬騎左右營改為左右龍武軍皆用唐元功臣子弟制若宿衛兵是時良家子避征戍者亦皆納資𨽻軍分日更上如羽林開元十二年詔左右羽林軍飛騎闕取京旁州府士以户部印印其臂為二籍羽林兵部分掌之十三年始以彍騎分𨽻十二衛總十二萬為六番每衛萬人京兆彍騎六萬六千華州六千同州九千岐州六千餘俱屬别域其制皆擇下户白丁宗丁品子強壯五尺七寸以上不足則兼以户八等五尺以上皆免征鎮賦役為四籍兵部及州縣衛分掌之又擇材勇者為番頭頗習弩射又有羽林軍飛騎亦習弩諸軍皆近營為堋士有便習者教試之唐書兵志二十一年朔方節度使統經略豐安定逺東西受降城安北都護振武等七軍府管兵六萬四千七百人馬四千三百匹舊唐書地理志肅宗至德二載置左右神武軍補元從扈從官子弟不足則取他色帶品者同四軍亦曰神武天騎制如羽林總曰北衙六軍又擇便騎射者置衙前射生千人分左右廂總號曰左右英武軍唐書兵志代宗大厯二年正月詔潼關置鎮兵三千人册府元龜四年魚朝恩請以京兆之好畤鳯翔之麟逰普潤皆𨽻神策軍五年復以興平武功扶風天興𨽻之唐書兵志九年郭子儀上書朔方國北門臣所統士不當賊四之一河南北江淮大鎮數萬小者數千未始搜擇請追赴關中勒步隊示金鼓郭子儀傳德宗建中四年下詔募兵以白志貞為使請節度都團練觀察使與世嘗任者家皆出子弟奴馬裝鎧助征授官於是豪富者緣為幸而貧者苦之貞元二年改神策左右廂為左右神策軍三年改殿前左右射生軍為左右神威軍自德宗幸梁還以神策兵有勞皆號興元元從奉天定難功臣恕死罪兵部乃不能嵗比其籍京兆又不敢綜舉名實三輔人假庇於軍一牒至十數長安姦人多寓占兩軍身不宿衛以錢代行謂之納課户吏稍禁之輒先得罪京尹赤令皆為斂屈十年京兆尹楊於陵請置挾名敕五丁許二丁居軍餘差以條限由是少畏十四年詔左右神策置統軍以崇親衛如六軍時邊兵衣餉多不贍而戍卒屯防藥茗蔬醬之給最厚諸將務為詭辭請遙𨽻神策軍廩賜遂嬴舊三倍由是塞上往往稱神策行營皆內統於中人其軍乃至十五萬唐書兵志憲宗元和初嚴礪為山南西道節度使奏當軍將士請共置一萬二千其數內二千三百八十六人新加從之册府元龜文宗太和中王承元為鳯翔節度使奏當軍應管兵三萬人內軍一千五百騎今更置一千五百騎册府元龜昭帝景福二年以藩臣跋扈議以宗室典禁兵乃用嗣覃王允為京西招討使神策諸都指揮使李鐬副之悉發五十四軍屯興平乾寧元年詔諸王閲親軍收拾神策亡散得數萬益置安聖捧宸保寧安化軍曰殿後四軍嗣覃王允與嗣延王戒丕將之韓建畏諸王有兵請皆歸十六宅留殿後兵三十人為控鶴排馬官𨽻飛龍坊餘悉散之於是四軍二萬餘人皆罷及帝還長安左右神策軍復稍置之以六千人為定已而悉誅宦官神策軍由此廢崔胤奏六軍名存兵亡非所以壯京師軍皆置步軍四將騎軍一將步將皆兵二百五十人騎將皆百人總六千六百人番上如故事乃令六軍諸衛副使京兆君鄭元規立格募兵於市而朱全忠隂以汴人應之唐書兵志後周太祖廣順初陜西弓箭手諸州縣十户取材勇者一人為之餘九户資以器甲芻糧宋史兵志宋諸州騎兵步兵禁廂兵建隆以來之制馬軍騎射陜西路永興鳯翔華鄜威邊陜西路永興鳯翔同華耀乾必敵邠馬鬬永興突陳延乾廳直華保勝鄜歸恩鳯翔保節陜西路州軍飛騎麟威逺府清邊陜西無敵保安左衙𣙜奉化陜西路鳯翔隨身商水軍興耀武華定逺鳯壯武陜西路鳯翔同耀華乾步捷金勇勝永興清逺永興延鄜隴保安建武鄜永清丹昭勝坊肅清乾寧邊乾克寧利州路興元洋懷逺興元保節陜西路永興邠鄜延丹隴坊廣塞興元順化興英武鄜本城剩員諸州並有梅山洞剩員丹捉生延驍勇邠武捷鳯翔鳯鄜延邠坊丹司牧永興省作院邠壯城陜西路永興鄜耀坊華丹同其將校則有馬步軍都指揮使有副都指揮使都虞候馬軍有都指揮使副都指揮使都虞候步軍亦如之宋史兵志制兵之額有鄉兵蕃兵鄉兵者選自户籍或土民應募所在團結訓練以為防守國朝以來陜西有保毅寨户強人強人弓手義勇麟州有義兵蕃兵者塞下內屬諸部落團結以為藩籬西北羌戎種落不相統一保寨者謂之熟户餘謂之生户陜西則秦鳯鄜延河東則麟府其大首領為都軍主百帳以上為軍主其次為副軍主文獻通考真宗咸平四年詔陜西沿邊州軍兵士先選中者併升為禁軍名保捷又令陜西係稅人户家出一丁號曰保毅使之分番戍守緣邊充保毅者至六萬八千七百七十五人五年五月命使臣分往邠寧渭隴鄜延等州於保安保毅軍內與逐處官吏選取有力者共二萬人各於本州置營升為禁軍號曰振武指揮景德二年鎮戎軍曺瑋言有邊民應募為弓箭手者請給以間田蠲其徭賦有警可參正兵為前鋒而官無資糧戎械之費詔人給田二頃出甲士一人及三頃者出戰馬一匹設堡戍列部伍補軍置巡檢以統之其後鄜延州軍亦各募置宋史兵志三年秋七月減鄜延戍兵真宗本紀大中祥符九年詔陜西諸州軍揀料本城兵五百人以上升為一指揮於本處置營教閲武藝升為禁軍兵志仁宗天聖元年冬十月徙陜西緣邉軍馬屯內地宋史仁宗本紀景祐元年詔聞陜西戍卒多為大將選置麾下及偏禆臨陳鮮得精鋭自隨自今以全軍𨽻逐將毋得選占天聖至寶元間增募陜西蕃落廣鋭清邊弩手康定初趙元昊反西邊用師詔募神捷兵既而易名萬勝為二十營是時禁兵多戍陜西並邊土兵雖不及等然驍勇善戰京師所遣戍者不能辛苦摧鋒陷陳非其所長故議者欲益募土兵為就糧於是增置陜西蕃落保捷定功振武壯勇制勝延州青澗弩手麟州飛騎府州威逺皆為禁軍詔陜西土兵自今悉就本路通補詔麟府州募歸業人增補義軍俾耕本户故地免其稅租其制與弓箭手略同而不給田又籍陜西之民三丁選一以為鄉弓手未幾刺充保捷為指揮一百八十五分戍邊州西師罷多揀放焉康定中吕夷簡言自元昊反被邊城寨各為自守計萬一賊有奔衝即關輔驚擾雖夏竦等屯永興其實兵少自永興距鄜延諸路皆數百里設有緩急內外不能相救請募勇敢士三萬訓以武技分置十隊以有謀勇者三人將之分營永興西冦至則舉烽相應或乘勢討擊進退不以地分並受夏竦等節制從之兵志寶元慶厯間陜西一路弓手盡刺充保捷正軍文獻通考陜西護塞慶厯元年募土人熟山川道路曉蕃情善騎射者涅臂充二百人為指揮自備戎械就鄉閭習武技季一集州教閲無事放營農月給鹽茗有警召集防守即廩給之無出本路宋史兵志韓琦知秦州兼隴州鳯翔等路都總管經略安撫沿邊招討使以前日山外之戰諸將多亡歿所從兵衆不可一槩問罪今不立法制他日各務生全豈復以主將存亡為意若人數不多則軍法可以必行諸路總管許置親兵百五十人鈐轄百人招討都監等七十人月加給錢二百其出師臨敵主帥陷沒者並斬從之韓忠獻家傳二年知青澗城种世衡奏募蕃兵五千涅右手虎口為忠勇字𨽻折馬山族言者因請募熟户給以禁軍廩賜使戍邊悉罷正兵下其章四路安撫使議范仲淹上言蕃情黠詐不可倚為正兵如去正兵必至驕蹇不若遇有警旋以金帛募勇猛禦賊為便議遂格文獻通考皇祐元年詔陜西邊警既息土兵可備守禦東軍屯戍者徙內郡以省餉饋宋史兵志又簡汰陜西諸路羸兵為民者六萬減廩糧之半者二萬通鑑至和元年陜西募就糧兵騎以四百人步以五百人為一營嘉祐五年選陜西本城牢城河清裝禦馬遞鋪卒長五尺三寸勝帶甲者補禁軍其嘗犯盜亡坐黥者配外州軍歸逺壯勇七年詔陜西土兵番戍者毋出本路宋史兵志英宗治平元年十一月科陜西户三丁之一刺為義勇軍凡十三萬八千四百六十五人各賜錢二千司馬光纍上疏諫之不允宋史英宗本紀詔陜西民除商虢二州餘悉籍義勇凡主户三丁選一六丁選二九丁選三年二十至三十材勇者充止涅手背以五百人為指揮置指揮使副二人正都頭三人十將虞候承局押官各五人嵗以十月番上閲教一月而罷又詔秦隴邠寧鄜延等州義勇遇召集防守日給米一升月給醬菜錢三百陜西路治平初總十五萬六千八百七十三人又陜西州軍悉置壯城以備繕完城壘之役兵志二年陜西路駐泊兵馬鈐轄梁實等至部蕃召酋領稱詔犒勞賞以銀帛城寨兵馬計族望大小分隊五給旗幟使各繕堡壘人置器甲以備調發仍約如令下不集押隊首領以軍法從事秦鳯路寨十三強人四萬一千一百九十四壯馬七千九百九十一鄜延路軍城堡寨十蕃兵一萬四千五百九十五官馬二千三百八十二強人六千五百四十八壯丁八百十文獻通考募陜西土民營伍子弟𨽻禁軍一營填止八分發兵指揮二十分戍永興軍邠州仍遣官專掌訓練詔陜西戰卒四十五萬九百并義勇等委總管司訓練毋得冗占宋史兵志治平中韓魏公建議於陜西刺義勇共得二十餘萬人深山窮谷無得脫者人情驚撓而紀律踈略終不可用徒費官錢不資無人敢言其非者司馬君實時為諫官極言不便魏公竟不為止其後不十年義勇運糧戍邊率以為常一如君實之言龍川别志陜西州軍景祐中本城四十三萬八千逮治平三年乃五十萬治平末陜西州軍並寨户弓箭手總四萬六千三百人宋史兵志神宗熙寧以後之制陜西路騎軍之額自騎射而下有六步軍之額自左衙而下二十有九並改號曰保寧凡一百一十一指揮總二萬五百六十三人內司牧永興省作院邠壯城永興鄜耀坊華丹同隴乾馬監同州沙苑咸陽橋道永興作院丹騎射永興鳯翔華鄜安邊永興鳯翔同華擢乾必敵邠馬鬬永興突陳延同乾廳直華保勝鄜歸恩鳯翔衙隊隴保節永興邠鄜延丹隴坊左衙耀隨身商耀武華奉化鳯翔勇勝永興清逺永興延鄜保安開廣同建武鄜昭勝坊肅清乾寧逺鳯壯武鳯翔同耀華乾保安驍勇邠武捷鳯翔鳯鄜延邠坊丹四川路步軍之額橋道興水軍興懷逺興元廣塞與元克寧興元洋利順化興本城梁山志宋史兵熙寧元年兵部上陜西義勇數陜西路二十六郡舊籍十五萬三千四百益以環慶延州保毅弓箭手三千八百總十五萬六千八百為指揮三百二十一文獻通考二年六月詔陜西就糧軍士將校其間材效之人孤逺無由自達有司審度其有軍功驍勇者以名聞當擢置班行以備本路任使宋史兵志詔併諸軍營陜西馬步軍營三百二十七併為二百七十馬軍額以三百人步軍以四百人其後總兵之撥併者馬步軍五百四十五營併為三百五十五文獻通考兵部上陜西十郡并寨户舊籍四萬六千三百今惟秦鳯有寨户三年秦鳯路經略使李師中言前年築熟羊等堡募蕃部獻地置弓箭手迄今三年所募非良民初未嘗團結訓練今當置屯列堡為戰守計從之詔募增廂軍陜西減額五千人而所募至三萬人十月韓絳言今將義勇分為七路內延丹坊為一路邠寧為一路秦隴為一路鳯州鳯翔府為一路乾耀華永興軍為一路逐年將一州之數分為四番緣邊四路十四州每年秋冬合用一番屯戍近裏三路十二州軍即令依此立定番次未得逐年差發遇本處闕少正兵即得勾抽或那往次邊守戍從之宋史兵志十一月命陜西立教閲賞罰格玉海司馬光乞留屯兵略曰臣奉勑充永興軍一路兵馬都總管安撫使臣聞本路十州所管屯駐禁軍至少大率皆是緣邊就糧兵士常時分為上下番有一半在逐州或遇邊上稍有警急則盡皆抽去逐州並無守把兵士萬一盜賊乘虛姦人竊發本州官吏手下無兵雖有智勇將安所施臣愚以為逐州宜各添一指揮禁軍屯駐內永興軍為關中根本宜添兩指揮若朝廷别無兵士可以差撥只乞於沿邊就糧兵士內依此數目撥留在逐州屯駐邊上更不得勾抽緩急不至失備溫公集詔陜西就糧禁軍額十萬人方用兵之初其令陜西河東亟募士補其闕四年詔比選諸路配軍為陜西強猛罷陜西路義勇差役又罷陜西諸路提舉義勇官委本屬州縣依舊分番教閲五年趙卨為鄜延路以其地萬五千九百頃募漢蕃弓箭手四千九百人帝嘉其能省募兵之費褒賞之發遣延州招到漢蕃弓箭手人騎四千九百八十四為八指揮三月以西邊用兵詔諸處義兵並罷令諸路轉運司剗刷京東西河東北淮南廂軍又令都水監刷河清及客軍共三萬餘人赴陜西團結宋史兵志六年樞密院言勇敢效用皆以材武應募從軍廩賜既優戰馬戎械之具皆出公上平時又得以家居以勞效賞者凡四補而至借職校弓箭手減十資淹速相逺甚非朝廷第功均賞之意請自今鄜延秦鳯等路各以三百為額第一等步射弓一石一斗馬射弓九斗奉錢千第二等以下遞減一斗奉七百至五百季首閲試於經略司射親及野戰中者有賞全不中者削其奉次季又不中者罷之戰有功者以八等定賞一給公據二以為隊長三守闕軍將四軍將五殿侍六三班借差七差使八借職其弓箭手有功亦以八等定賞一押官丞局二將虞候十將三副兵馬使軍使四副指揮使五都虞候六都指揮使七三班差使八借職即以闕排連者次遷詔可文獻通考十一月詔永興軍同華鄜延丹坊邠耀各依原刺義勇外商虢州保安軍並止團成保甲又以都保置本契左留司農寺右付其縣凡追胥閲試肄習則出契詔行於永興秦鳯五路七年詔分置將副自第一將以下共十七將在河北西路而鄜延秦鳯又自列將其在鄜延者九在秦鳯者五宋史兵志八年十一月詔選陜西蕃兵丁壯户九丁以上取五六取四五取三三取二二取一并年二十以上涅手背毋過五丁每十人置十將一五十人置副兵馬使一百人置軍使一副兵馬使一二百人置軍使一副兵馬使二三百人置副指揮使一軍使二副兵馬使三四百人加軍使一副兵馬使一五百人又加指揮使一副兵馬使一過五百人每百人加軍使一副兵馬使一即一族三十人以上亦置副兵馬使一不及二十人止置十將文獻通考九年九月詔永興秦鳯等路義勇以主户三丁以上充不拘户等是年諸路所管義勇永興軍路八萬七千九百七十八人秦鳯路三萬九千九百八十人十年知延州吕惠卿言自熙寧五年招到弓箭手只是權行差補未曽團定指揮本司見將本路團結將分團成指揮都分置立將校統轄即於臨時易為勾集從之元豐二年五月詔陜西諸路舊制馬軍自十月一日馳射野戰至榖雨日止中書樞密院請陜西義勇保甲皆如諸軍教閲法從之宋史兵志四年鄜延五路有漢蕃弓箭手各附諸將而分𨽻焉文獻通考五年正月以新收復米脂吳堡義合細浮圖塞門五寨地置漢蕃弓箭手及春耕種其約束補職並用舊條六年鄜延路經略司言弓箭手於近裏縣置田兩處立户及四丁巳上乞取一丁為保甲一丁為弓箭手有二丁至三丁即且令充弓箭手詔保甲願充弓箭手者聽其見充弓箭手與當丁役毋得退就保甲陜西亦如之四月河東經略司請以麟州飛騎府州威逺子弟二十五以下刺為兵八年詔罷秦鳯路置場集教弓箭手令經略司購求土人習教所宜立法宋史兵志哲宗元祐元年詔陜西將兵不出戍他路二月詔永興秦鳯等路提點刑獄兼提舉保甲并依提刑司例各為一司二年復置陜西府界馬步軍三年兵部言隴山一帶係官地非自朝廷置局招置標撥無以杜絶姦弊從之後殿前副都指揮使劉昌祚奏根括隴山地凡一萬九百九十頃招置弓箭手人馬凡五千二百六十賜敕書奬諭四年詔將隴山一帶弓箭手人馬别置一將管幹七年陜西路諸帥府敢勇以一百人為額專𨽻經略司宋史兵志紹聖四年五月詔陜西添置蕃落馬軍十指揮哲宗本紀詔陜西路添置蕃落指揮各以五百人為額於永興軍鳯翔同華州各置兩指揮並𨽻住營州軍將下統制訓練委諸路所屬都總管同選官招人元符元年利州路興元府增置就糧武寧永興軍等路創置蕃落詔罪人應配五百里以上配陜西充廂軍二年六月鄜延路新築米脂等八堡寨增置土兵馬步軍十一月以吕惠卿奏減鄜延戍兵五十指揮三年詔撥陜西保寧指揮入諸路廂軍額七月詔陜西路新城寨合招弓箭手投換其元祐八年四月不得招他路弓箭手指揮勿用兵志徽宗建中靖國元年減放秦鳯路土兵崇寧元年九月詔董采秦鳯路安師文鄜延路並提舉弓箭手元符三年罷今復置五年詔永興秦鳯路各武臣一員充提舉保甲其見專提舉保甲文臣並罷樞密院言陜西等處差官詔諭逃亡軍人並許所在首身更不會問便支口劵令歸本營邊上軍人憚於戍守之勞往往逃竄內郡首身遂得口劵歸營恐相習成風有害軍政乞自今應軍人首身並須會問逃亡赦限依今來詔諭指揮若係赦後逃亡即乞依條施行從之大觀元年五月延安置錢監兵二年六月詔陜西諸路自罷兵以來數年於此兵未曽撤蓋緣邊將怯懦坐費邊儲戍卒勞苦可除新邉的確人外餘並直抽歸營有司不得占吝政和三年秦鳯路經略安撫使何常奏諸路並塞民皆是弓箭手關東戍卒多是硬弩手及摽牌手若遇賊於山林險隘之處先以牌子捍賊次以徑弓強弩與神臂弓射賊先鋒或遇賊於平原廣野之間則馬上用弩攢射可以一發盡殪牌子與馬上弩皆已試之效不可不講又步兵之中先擇魁健材力之卒皆用斬馬刀别以一將統之如唐李嗣業用陌刀法是取勝一竒也詔樞密院劄與諸路經略司五年二月詔陜西逐路並復置提舉弓箭手司仍各選差武臣一員充並依提舉保甲條例施行宋史兵志欽宗靖康元年正月詔募陜西土人為兵二月臣僚言陜西恃弓箭手為國藩籬舊𨽻帥府比年始置提舉弓箭手官務取數多選練不精法制寖壞乞罷提舉官以弓箭手復𨽻帥司詔從之五月宣撫司奏陜西遊手惰民願充軍者亦衆祗緣招刺闕乏例物是致軍額常闕今若給一色銀絹折充例物犒設起發召募人作義勇止於右臂上刺字依禁軍例物支衣糧料錢陜西五路共可得二萬人從之詔遣文武官各一員前去陜西路募兵二萬人赴闕是月都水使者陳求道言朝廷差官往陜西招軍適當嵗豐恐未易招填若就委監司招募保甲啖以例物與免科差以作其氣可得徑兵五萬從之七月陜西制置使錢蓋言陳求道請招刺保甲五萬充軍緣比來陜右正兵數少全藉保甲守禦及運糧諸役差使外所餘無幾若更招刺五萬則是正丁占使殆遍不惟難以選擇兼慮民情驚疑欲乞令州縣曉諭保甲取其情願如未有情願之人即乞令保甲司於正丁餘數內選擇通赴闕人共成七萬可以足用從之是月錢蓋奏陜西募土人充軍多是市井烏合不堪臨敵今折彥實支陜西六路銅錢各十萬緡每名添錢十千自可精選少壯六路可共得六萬人從之宋史兵志髙宗建炎中丞相李綱上言今日之計莫若募兵於西北金人騷擾關陜之人流為盜賊強壯不能還業者甚衆乘此遣使優給例物以召募之新其軍號勒以步伍付之將帥以時教閲訓練不年嵗間皆成精兵上以為然乃於陜西募兵三萬人許召募白身於諸色廂軍中撿選招收潰散兵卒改刺例物白身人全給餘給半每募及一軍就本路選差材武大小使臣充將官部隊將押赴行在陜西委經制司而以錢蓋復充其任又命永興軍路置帥府要郡次要郡帥府為安撫使帶馬步軍都總管要郡帶兵馬鈐轄次要郡帶兵馬都監皆以武臣為之副改路分為副總管路鈐轄為副鈐轄州鈐轄為副都監總管鈐轄司許以便宜行軍馬事又請於陜西路置制置使使以逺近相應援從之李忠定公奏議紹興元年籍興元府良家子弟兩丁取一四丁取二每二十人為一隊號曰義士宋史兵志四年宣撫吳玠始創興元府良家子招關陜流寓及陳亡主兵將子弟驍武不能存立者充月給比強弓手五十人為一隊文獻通考十年二月命陜西復募蕃漢弓箭手宋史髙宗本紀十一年興元府興州金州三都統兵皆本關西舊部興元都統司兵一萬七千人金州都統司兵一萬一千人紹興中劉子羽在興元招集流散立成部伍子羽罷吳玠併將其兵故玠之兵十萬玠死胡世將為宣撫命吳璘以二萬守興州楊政以二萬守興元郭浩以八千守金州而玠之中部三萬人分屯仙人關以外璘并將之是以四川之兵獨偏重於興州文獻通考寧宗開禧元年興元都統秦世輔言本司諸軍闕額頗多紹興之末管二萬九千餘人乾道三年以二萬七千人為額今管二萬五千四百餘人所差發出戍官占實一萬一百四十三人點閲所部堪披帶者僅六百二十七人欲乞許本司酌紹興末年元額招刺補填從之文獻通考金諸邊將鄜延九將鳯翔十六將續文獻通考凡邊境置兵之州三十八有鳯翔延安隴商保安綏德葭東勝改置于要州者十一有京兆金史兵志海陵天德二年九月置統軍司於陜西路正隆末復升陜西統軍司為都統府金史兵志世宗大定二年正月命陜西等路征南步軍並放還家續文獻通考三年五月罷陜西統軍司置都統副統五年七月罷陜西都統府復置統軍司京兆徙陜西元帥府河中金史世宗本紀章宗泰和間邊鋪軍則陜西居守邊界者金史兵志宣宗貞祐三年八月諭陜西堅守延安保安綏德鄜坊邠乾耀等處要害分渭南州郡步兵屯平原令宣撫使治邠州副使治同州之澄城以統之更以步騎守渭津九月設潼關提控總領軍馬等官壬午以空名宣敕付陜西宣撫司凡夏人入冦有能臨陳立功者五品以下並聽選授十月以同華舊屯陜西兵𨽻陜州宣撫司者改𨽻陜西行省十二月陜西行元帥府乞益兵以田琢之衆𨽻之金史宣宗本紀興定二年選募陜西弩手軍二千人為一軍賜號威勇兵志三年四月選陜西步騎精鋭六千人實京兆戊辰選精鋭六萬分屯邠乾耀等州元光二年四月設京兆南山安撫司七月詔籍陜西路僑居官民為軍宣宗本紀元太宗七年七月簽陜西路人匠充軍元史兵志世祖中統元年五月詔平陽京兆兩路宣撫司簽兵七千人於延安等處守隘元史世祖本紀三年十月以鳯翔屯田軍人凖充平陽軍數仍於鳯翔屯田勿遣從軍刁國器所管充簽軍九百一十五人即日放罷為民陜西行省言士卒戍金州者諸鄂囉巳嘗服役今重勞苦詔罷之元史兵志四年正月以宋和爾摩哩及沙只回回鷹坊等兵戍商州藍田諸隘五月乙未敕啇州民就戍本州毋禁弓矢至元元年八月陜西行省臣上言商州險要乞增戍兵鳯翔屯田軍遷戍興元從之元史世祖本紀七年以金州軍八百𨽻東川統軍司十年正月哈喇請於渠江之北雲門山及嘉陵西岸虎頭山立二戍以其圖來上仍乞益兵二萬敕給京兆新簽軍五千人益之正月陜西京兆延安鳯翔三路諸色人户約六萬户內簽軍六千六月汰陜西貧難軍十一年正月調襄陽府生劵軍六百人熟劵軍四百人由京兆府鎮戍鴨池命金州招討使竒徹部領之五月詔延安府沙井靜州等處種田巴達勒達户選其可充軍者簽起出征兵志五月敕有司閲核延安新軍貧無力者免之十二年簽延安路達嚕噶齊弟男為軍十六年罷延安路新簽軍二十七年十二月遣兵部侍郎靳榮等閲實西安鳯翔延安三道軍户元籍四千外復三萬三千二百八十丁樞密院欲以為兵僧格不可帝從之元史世祖本紀仁宗延祐四年十一月陜西都萬户府言碉門特默齊軍一百五十名鎮守多年乞放還元翼樞密院臣議彼中亦係要地不宜放還止令於元翼起遣一百五十名三年一更鎮守元史兵志泰定帝四年三月陜西行省嘗言奉元建立行省行臺别無軍府惟有蒙古軍都萬户府逺在鳯翔置司相離三百五十餘里緩急難用乞移都萬户府於奉元置司軍民兩便及後陜西都萬户府言自大德三年命移司酌中安置經今三十餘年鳯翔離天都土蕃甘肅俱各三千里地面酌中不移為便制可元史兵志明太祖洪武二年延綏守臣建議開設各衛銓官選軍於時有歸附者有收集者有選充者有編撥者共四等延綏鎮志二十三年耿炳文奏陜西都司所屬二十四衛馬步軍一十四萬四千九百九十一人馬八千三百七十二匹世法録英宗正統初發遣陜西邊衛官軍操備京師者各還原衛其腹裏衛分仍舊更番赴京操備二年募所在軍餘民壯願自效者分𨽻操練於陜西得四千二百人人給布二匹月糧四斗世法録六年令陜西土軍優免五丁餘聽科差明會典天順初清出陜西各衛逺年無勾之軍同姓名而相推諉者悉發榆林編伍謂之老軍延綏鎮志憲宗成化二年延綏守臣盧祥因營堡兵少請選土兵敕御史往會官點選如延安所屬之州縣選其壯者編成什伍每名量免户租六石常存二丁貼其力役五石以下者存三丁三石以下者存四丁時得丁壯五千餘名六年三衛老軍撥邊數少巡撫議從老軍户內陸續抽選壯丁分四班輪流操備謂之四班壯丁八年沙克嘉斯賚侵套侍郎葉盛總督王越巡撫余子俊奏請清解六年七年各省軍之不服水土者暫留實邊與清勾雲南兩廣浙閩衛所軍人俱解榆林以實邊備詔可之謂之雜抽軍延綏鎮志十年總制督御史余子俊題將前項土兵審勘有願入伍當軍者將本户稅糧二十石以下者并差役盡行蠲免二十石以上者免二十石其餘照舊徵納存留本處并附近去處不許逺起邊糧本軍收發榆林衛入伍食糧差操聽總兵等官調用殺賊明九邊考十二年余子俊奏綏德衛十二隊延安衛十九隊每隊五十名有竒凡屯軍每年俱十月朔到邊備冬次年三月朔踈放農作謂之屯軍一名備冬軍延綏鎮志二十年五月以延綏東西三十四城堡指揮等官權輕令弛復設領班都指揮二員令統陜西潼關等衛所備禦官軍分上下班嵗一番休仍將定南定北乾溝軋澗備禦官軍歸併原伍半載一更分番戍守世法録孝宗𢎞治中延綏巡撫題召募土兵義勇軍計得一萬三百七十六名十三年守臣議奏官軍家三丁內選一丁以補軍缺計選二千名謂之選丁延綏鎮志十五年太僕少卿題於陜西等處各州官庫內查取見在官銀每二鎮共輳五萬兩以備召軍之用若係召募者每名給銀五兩係册內查出抽選者每名給銀三兩五錢仍免空間舍餘一名幫貼就與關支糧賞其見任官員百户召一百名與升副千户副千户召一百名升正千户正千户召二百五十名升指揮僉事指揮僉事召二百名升指揮同知指揮同知召二百名升指揮使俱月加俸糧一石都指揮僉事召二百五十名升都指揮同知都指揮同知召二百五十名升都指揮使若有為事立功及革職間住官員能召百名悉與復職其所召土兵就令原召之人管領殺賊有功之日照例併功升職明九邊考延綏三衛壯丁輪流操備自𢎞治以後共得四萬三千五百九十四名延綏鎮志武宗正德時提督尚書楊一清題西人性氣猛悍尚勇善鬬且見敵不懼設法召募不拘衛所軍餘舍餘村野土民但係年力精壯騎射間熟者籍名在官願領馬者給銀五兩步軍給銀三兩令其置備軍裝弓矢器具團成隊伍聽總兵守備等官統領訓練不許濫收不堪之人徒費官錢無益於事明九邊考正德五年各軍户內五丁以下者擇一丁六丁以上者擇二丁計得一千五百二十二名謂之選丁延綏鎮志世宗嘉靖二十四年延綏巡撫張子立題綏德衛延安衛屯軍留本衛設官訓練三十年於免糧土兵餘丁內免五石以下者抽一丁五石以上者抽二丁十石以上者抽三丁三十一年以免糧十石上下者抽一丁俱夏秋備邊過冬踈放謂之免糧抽軍延綏鎮志穆宗隆慶三年兵馬數目延綏原額馬步官軍八萬一百九十六員名除節年逃故外實在官軍五萬一千六百一十一員名原額馬四萬五千九百四十匹除節年倒失外實在馬二萬七千八百五十一匹五年八月兵部覆言常戍之説施於遼東宣大尤便其延綏見兵四枝當酌行劉應節等議各分兩班每嵗在薊者以十一月中旬放還期至嵗暮抵家在延綏亦以十一月中旬起程期至嵗暮抵鎮不必候到交代至於清理主兵宜特遣風力御史往陜西無論原係何軍凡逃亡者盡數清勾旨如議行續文獻通考陜西都司領衛二十五守禦千户所四西安左衛西安前衛西安後衛延安衛綏德衛漢中衛寧羌衛榆林衛鳯翔守禦千户所金州守禦千户所餘屬甘省潼關衛𨽻中軍都督府而官軍則陜西例得調用馬志陜西城操備官軍舍餘五千五十一員名實有馬步二千五百六十五員名公差商洛等處防守一千四百八十六貟名事故在逃等項一千員名榆林鎮所管三十四城堡常操新募輪班冬操夏種并事故等項原額馬步騎操官軍共五萬八千六十七員名常操延綏榆慶等衛馬步官軍四萬一千五十四員名實有官軍三萬一百二員名事故等項官軍一萬九百五十二員名新召募甲軍三千名輪班西安南陽潼關寧山穎上等衛所馬步官軍一萬一千一十三員名實有官軍九千八百八十二員名事故等項軍人一千一百三十一名見班官軍五千四百七十六員名冬操夏種無馬官軍二千員名鎮守總兵官在城官軍一萬一千四百一十三員名協守副總兵部下官軍三千員名專一統領操練東西路逰擊將軍二員名部下官軍三千員名統領延綏逰兵東路右恭將部下官軍一千七百八十員名西路左恭將部下官軍一千一百九十三員名中路鎮城所轄十一城堡官軍共七千九百五十六員名東路鎮城所轄外八城堡官軍共四千九百七十二員名西路恭將所轄外十二城堡官軍共七千七百三十八員名明九邊考榆林鎮屬營六堡二十八榆林鎮馬步官軍三萬三千七十七員名清水營官軍七百一十四員名新安邊營官軍一千四百四員名靖邊營官軍九百七十六員名寧塞營官軍九百八十三員名舊安邊營官軍九百五十四員名定邊營官軍八百四十四員名髙家堡官軍九百九十四員名建安堡官軍七百一員名雙山堡官軍八百三十四員名常樂堡官軍七百七十六員名歸德堡官軍三百六十六員名魚河堡官軍六百三十二員名響水堡官軍五百七十三員名木瓜堡官軍四百三十六員名孤山堡官軍六百五十九員名鎮羌堡官軍六百五十九員名龍州堡官軍五百七十二員名把都堡官軍六百二十二員名新興堡官軍三百八十四員名潦池堡官軍四百二十六員名鹽池堡官軍一百二十五員名波羅堡官軍六百九十二員名懷逺堡官軍四百二十四員名威武堡官軍五百二十五員名清平堡官軍六百二員名神木堡官軍三千七十七員名黃甫堡官軍三百六十九員名永興堡官軍七百六十二員名大柏堡官軍二百九十員名柏林堡官軍五百六十員名鎮靖堡官軍一千八十七員名永濟堡官軍七百三員名三山堡官軍三百二十員名饒陽堡官軍一百八十八員名朱思本輿地圗明之衛所即唐府兵遺意也自京師達於郡縣之險要者皆立之有事征伐則詔總兵官佩將印領之既旋則上所佩印於朝官軍各回本衛法誠善也洪武初陜西都司所屬凡三十四衛訓練馬步官軍十六萬七千有竒此大較也自後承平日久官皆世胄而不習武是時軍士強壯則占役於權門疲羸則挂名於公府支糧則有其數調遣則無其人逃亡者既不勾補占役者又不著伍急則藉口召募及調遣而已故老軍變而為土兵土兵變而為抽選班軍變而為改折舉祖宗之法而盡變之以至於亡而不悟也延綏鎮志軍儲殷帝謂文王以爾鈎援與爾臨衝以伐崇墉詩大雅皇矣篇鉤鉤梯也所以鉤引上城者臨臨車也衝衝車也傳正義曰臨者在上臨下之名衝者從旁衝突之稱疏漢髙祖元年夏四月留蕭何收巴蜀租給軍糧食漢書髙帝本紀七年蕭何治未央宫立武庫以藏兵器中尉屬官有武庫令丞少府屬官有若盧考工室令丞百官表注云若盧主藏兵器考工主作兵器武庫精兵所聚文獻通考文帝時胸奴數侵盜北邊屯戍者多邊粟不足給食當食者於是募民能輸及轉粟於邊者拜爵爵得至大庶長史記平準書武帝元鼎六年邊兵不足乃發武庫工官兵器以贍之史記平凖書武帝時衛青軍出塞擊胸奴以武剛車自相環為營文獻通考宣帝五鳯四年大司農中丞耿夀昌奏設常平倉以給北邊漢書宣帝紀後漢光武帝造戰車可駕數牛上作樓櫓置於塞上以拒丐奴後漢書南胸奴傳櫓即樓也釋名曰樓無屋為櫓胸奴傳注明帝永平五年十一月北胸奴冦五原南單于擊却之是嵗發遣邊人在內郡者賜裝錢人二萬後漢書明帝紀安帝元初五年諸羌瓦解三輔益州無復冦警自羌叛十餘年間軍旅之費轉運委輸用二百四十餘億後漢書西羌傳順帝永建四年尚書僕射虞詡上疏言雍州沃野千里又有龜兹縣在上郡鹽池以為民利水草豐美土宜産牧牛馬銜尾羣羊塞道北阻山河乘厄據險因渠以溉水舂即水碓也河􅒩用功省少而軍糧饒足故孝武光武築朔方開西河置上郡皆為此也書奏帝乃復三郡遂令安定北地上郡等處常儲榖粟周數年後漢書西羌傳晉附赫連勃勃以叱干阿利造五兵之器精鋭尤甚既成呈之工匠必有死者射甲不入即斬弓人如其入也便斬鎧匠又造百鍊鋼刀為龍雀大環號曰大夏龍雀銘其背曰古之利器吳楚湛盧大夏龍雀名冠神都可以懷逺可以柔邇如風靡草威服九區世甚珍之晉書赫連勃勃載記北魏太武帝始光四年春正月遣就隂山伐木大造攻具太平真君九年冬北討至於受降城不見蠕蠕因積糧城內留守而還魏書世祖紀孝武帝永熙三年夏四月宇文泰徴豳涇東秦岐四州粟以給軍周書文帝紀文帝大統三年秋八月齊神武度河周太祖令軍人齎三日糧輕騎渡渭輜重自渭南夾渭而西周書文帝紀隋髙祖開皇十五年二月收天下兵器敢有私造者坐之關中緣邊不在其例隋書髙祖紀唐肅宗寶應元年是年四月代宗即位九月敕駱谷子午等路往來行客所將隨身器仗等今日已後除郎官御史諸州部統進奉事官任將器仗隨身自餘私客等皆須過所上具所將器仗色目然後放過如過所上不具所將器仗色目數者一切於守堤處勒留册府元龜德宗興元初李晟為神䇿行營節度使時李懷光叛德宗再幸梁州初無芻藁乃令簡較户部郎中張彧假京兆尹擇官吏以賦渭北畿縣不數日芻糧皆足後為副元帥討朱泚時渭橋先積米鹽十餘萬斛度支方運以備懷光軍晟又密疏以渭近畿雖乘兵亂尚可賦斂冦盜未滅宿兵曠時人廢耕桑又無儲蓄非防微制勝之術也帝深納之至是守禦益固軍不乏食册府元龜河湟六鎮既陷嵗發防秋兵三萬戍京西資糧百五十餘萬緡唐書食貨志貞元初吐蕃劫盟召諸道兵十七萬戍邊關中為吐蕃蹂躪者二十年北至河曲人户無幾諸道戍兵月給粟十七萬斛皆糴於關中宰相陸贄以關中榖賤請和糴可至百餘萬斛帝乃命度支增估糴粟三十三萬斛然不能盡用贄議文獻通考貞元八年五月初增稅京兆青苖畝三錢以給掌間彍騎册府元龜憲宗元和六年京兆尹王播奏諸縣軍鎮放牧人等不得帶弓箭刀劒器仗從之文獻通考文宗太和中王承元為鳯翔節度使奏當軍今更添置一千五百騎請度支給衣糧草料册府元龜後唐明宗長興元年十月興元府奏軍府官共進助軍粟三萬三千石册府元龜宋真宗咸平四年陜西保毅軍官給糧賜使之分番戍守宋史兵志五年夏四月詔陜西民挽送緣邊芻糧者賜租之半真宗本紀大中祥符初陜西闕兵食州縣括民家所積糧市之謂之推置取上户版籍酌所輸租而均糴之謂之對糴食貨志仁宗天聖四年詔作坊造鐡槍一萬五千給秦渭延州等軍景祐元年三司使程琳上疏論兵在精不在衆陜西軍儲數匱而召募不已且住營一兵之費可給屯駐三兵昔養萬兵者今三萬兵矣陜西嵗費千五百萬其賦入支十之五自餘悉仰給京師自咸平逮今凡沿邊所增馬步軍指揮百六十計騎兵一指揮所給嵗約費緡錢四萬三千步兵所給嵗約費緡錢三萬三千他給賜不預合新舊兵所費不啻千萬緡天地生財有限而用無紀極此國用所以日屈也今同華沿河州軍積粟至於紅腐而不知用沿邊入中粟價常踴貴而未嘗足誠願陜西募住營兵勿復增置遇闕即遷廂軍精鋭者補之仍漸徙營內郡以便糧餉無事時番戍于邊緩急即調發便近嚴戒封疆之臣毋得侵軼生事以覬恩賞違令者重置之法如此則疆場無事而國用有餘矣帝嘉納之宋史兵志寶元二年三月賜陜西緣邊將士緡錢四月募陜西人入粟實邊十月庚午賜麟府州及川陜軍士緡錢仁宗本紀陜西糴榖嵗預給青苗錢天聖以來罷不復給然發內藏金帛以助糴者前後不可勝數寶元中出內庫珠直緡錢三十萬付三司售之取其直以助邊費食貨志康定元年二月出內藏緡錢八十萬陜西市糴軍儲又詔江南淮南造紙甲三萬給陜西仁宗本紀八月詔陜西製栁木旁牌又詔陜西屯重兵罄本路租稅益以內庫錢帛並西川嵗輸而軍儲猶不足宜度隙地為營田務四路總管轉運悉兼領使慶厯二年詔鄜延秦鳯路各置都作院兵志四年賜鄜延路總管風羽子弩箭三十萬仁宗本紀仁宗時龎頴公自延州入為樞密副使首言關中苦餽餉請徙沿邊兵就食內地議者爭言不可以為敵初伏情偽難測未可遽弛備獨公知元昊已困必不能遽敗盟卒徙二十萬人石林燕語皇祐元年詔陜西邊警既息土兵可備守禦東軍屯戍者徙內郡以省餉饋宋史兵志二年二月出內庫絹下陜西路以備軍賞仁宗本紀四年陜西路都總管司言郭咨所造獨轅衝陳無敵流星弩可以備軍陳之用詔弓弩院如樣製之除咨為鄜延路鈐轄許置弩五百募土兵教之至和元年詔陜西路每嵗夏曝器甲有損斷者悉令完備如復閲視有不堪用者知州通判及主兵官並貶秩兵志范仲淹上議云延安西有賊界百餘里侵入漢地唐馬燧造戰車行載兵甲止為營陳此路山坡大車難進當用小車二十兩銀絹錢二十萬賞有功將吏又云陜西四路各屯重兵所入中糧草無定數並支京師錢帛久行府庫須竭又支移關輔二稅往邊上送納道路險阻百姓勞費至轉運司經畫財利應副邊上每年亦無定額縱使元昊納欵未能頓解邊兵悠久何以支濟伏望聖慈指揮更選差朝臣四人充陜西四路經略計置判官專管本路稅賦課利及圖回營田等事仍令三司將逐路軍馬並現在糧草數目約度今後每年各計入中若干石於京師支給見錢比舊十分中減三分令陜西轉運司約度逐路稅賦課利數目外每年各令支助錢帛若干既糧草錢帛皆是定額自然各務省節不更占冗兵既沿邊入中有數必自那移軍馬入次邊及近裏州軍駐劄此軍國大計乞聖慈留意范文正公集神宗熙寧元年二月知青澗城劉怤言所𨽻歸明號箭手八指揮凡三千四百餘人馬九百匹連嵗不登願以丹州儲糧賑恤詔下其章轉運司行之宋史兵志八月賜鄜延路轉運司空名誥敕募民入粟實邊神宗本紀二年令諸軍餘糧願糶入官者計價支錢復儲其米於倉明年仍聽行於陜西諸路三年二月詔移巴蜀羡財市布帛儲於陜西以備邊省食貨志判延州郭逵言陜西起發義勇赴沿邊戰守今後並令自齎一月糗糧折本户稅賦若不能自備則就所發州軍預請一月口食從之知永興軍司馬光極言分義勇四番於沿邊屯守以為挑敵勞人虛費糧餉於是永興一路獨得免四年詔付趙卨聞鄜延路諸軍數出至鬻衣裝以自給可密體量賑恤之樞密院言除不教閲廂軍撥併各帶舊請外今後招到者并乞依本指揮新定請受陜西醬菜錢一百月糧二石春衣絹二匹布半匹錢一千冬衣絹二匹紬半匹錢一千綿十二兩兵志六年詔鄜延路經略司支封椿錢於河東買槖駝三百運沿邊糧草七年命輔臣議與陜西並塞芻糧之法令轉運司增舊糴三分以所糴虧羡為賞罰仍遣吏按視而陜西和糴或以銀錢紬絹糴於弓箭手食貨志八年冬十月陜西帥臣請增給兵器帝令給之元豐元年冬鄜延路經略使吕惠卿乞給新樣刀軍器監欲下江浙福建路製造帝不許給以內南庫短刃刀五萬五千口四年春陜西轉運使李稷奏本道九軍什物之外一皆無之乞於永興軍庫以餘財立法營辦兵志中書言物帛至陜西擇省樣不合者貿易糴糧儲於邊期以一年畢五年户部上其數凡八百十六萬一千七百八十匹兩三百四十六萬二千緡有竒食貨志七月鄜延路計議邊事所奏乞緡錢百萬工匠千人鐡生熟五萬斤牛馬皮萬張造軍器并給之八月詔令沈括以劈陳大斧五千選給西邊諸將十一月陜西轉運使李察言本路都作院五宜各委監司提舉從之七年陜西轉運副使葉康直言秦鳯路軍器見闕名物計四百三十餘萬使一一為之非十餘年可就乞自京給賜詔量給之兵志徽宗政和六年軍器少監鄧之綱奏國家訓練士卒各給軍器以備不虞恐嵗久因循多致損敝乞自河北陜西路為首令一新戎器壯國威從之宋史兵志哲宗元符二年正月出內金帛二百萬備陜西邊儲三年八月出內庫金帛二百萬糴陜西軍儲宋史哲宗本紀髙宗建炎中命降見錢鈔三百萬貫付陜西路􅒩司廣糴應副河東河北兩路又命起川綱河東衣絹於永興軍樁管以待兩路支俵丞相李綱奏上既於陜西路募兵而軍器衲襖旗幟之類經靖康之變類多散失內庫甲胄甚多重大兵不能勝乞降指揮條具軍器衲襖下諸路轉運司製造內庫甲改為大小三等圖畫式樣製造旗幟上皆從之李忠定公奏議紹興九年八月庚戌賜陜西諸軍冬衣絹十五萬匹乙丑給新法度牒紫衣師號錢二百萬緡付陜西市軍儲宋史髙宗本紀三十二年王之望至梁洋諭豪民使輸財先是之望以軍興費廣為言朝廷令勸民户獻納之望因是親至續文獻通考金海陵正隆四年命陜西統軍司并虞候司順德軍官兵並增廩給金史兵志世宗大定三年言事者以陜西等路循宋齊舊例州縣司吏弓手於民間驗物力均敷顧錢名曰免役請以是錢贍軍至是省具數以聞詔罷弓手錢其司吏錢仍舊金史兵志八年八月命左衛將軍大磐訪求良弓而磐多自取出為隴州防禦使十五年出兵備邊同州徴箭十萬根以雕鴈羽為之其價翔躍不可得觀察判官張榖曰矢去物也何羽不可節度使曰當須省報榖曰州距京師二千里如民急何萬一有責下官當任其咎一日之間價減數倍尚書省竟如所請續文獻通考章宗承安三年陜西放老千户穆琨佛寧正軍烏勒希等給賞之例舊軍千户十年以上賞銀五十兩絹三十匹不及十年比附十年以上穆琨支穆琨十年以上銀四十兩絹二十五匹不及十年銀三十兩絹二十匹佛寧十年以上銀三十兩絹二十匹不及十年銀二十兩絹一十五匹馬步正軍烏勒希等勾當不拘年分放老正軍銀一十五兩絹一十匹烏勒希旗鼓吹笛本司火頭人等同銀八兩絹五匹三虞候千户十年以上銀四十兩絹二十五匹不及十年銀三十兩絹二十匹穆琨二十年以上銀五十兩絹三十匹十年以上銀三十兩絹二十匹不及十年銀一十兩絹一十五匹佛寧十年以上銀二十兩絹一十五匹不及十年銀一十五兩絹一十匹正軍烏勒希勾當不拘年分放老正軍銀一十兩絹七匹烏勒希旗鼓吹笛本司火頭人等同銀五兩絹四匹邊鋪軍請給與射糧軍同陜西路統軍司鎮防甲軍馬軍明安錢八貫米五石二斗絹八匹六馬芻粟穆琨錢六貫米二石八斗絹六匹五馬芻粟佛寧錢四貫米一石七斗絹五匹四馬芻粟正軍錢二貫米石五斗絹四匹綿十五兩三馬芻粟烏勒希錢一貫五百文米七斗絹三匹綿十兩步軍明安馬二匹謀克馬一匹芻粟每馬給芻一束粟五升嵗仲春野有青草馬可牧養則止惟每明安當差馬七十二匹四時皆給又定制陜西嵗給六月鎮防軍補買馬錢陜西路正軍三百文烏勒希隨色人二百文金史兵志泰和五年十一月詔陜西帥臣訓練士卒以備非常仍以銀十五萬兩分給邉帥募民偵伺章宗本紀哀宗正大三年十二月詔諭陜西省凡戎事三品以下官聽以功過賞罰銀二十五萬兩從其給賞金史哀宗本紀元明宗致和元年九月以伊蘇岱爾知行樞密院事將兵詣闕西擊河中潼關軍以摺疊弩分給守關軍士元史文宗本紀明成祖永樂五年令陜西臨邊衛分守城征哨旗軍俱全支米九年令陜西都司腹裏各衛所八分米二分鈔明會典英宗正統三年令陜西西安等衛邊軍有家小者月支糧六斗無家小四斗五升餘折鈔五年令陜西都司都指揮管領旗軍及綏德等寨堡備禦者照甘肅例月支米五斗八年令陜西西安左等衛調撥延綏等衛操備旗軍有家小原支本色六斗者添支一斗無家小原關四斗五升者添支五升又令陜西衛所腹裏旗軍三箇月全支米一石餘月米鈔兼支令延綏等處操備旗軍有家小者每名給賞布三匹隻身布二匹綿花俱一斤八兩又令綏德延安西安等衛鳯翔守禦千户所正軍校尉有家小者布三匹九年又令陜西延綏守邊旗軍有家小者月支米五斗豆二斗餘三斗折布十年令陜西西延鳯翔等衛所屯田旗軍分調定邊等營備冬者每名給賞布二匹內折鈔一匹綿花一斤八兩又令陜西延慶二衛并西安左等四衛旗軍原調守邊備冬者每名給賞布四匹內二匹并綿花一斤八兩給與家小餘布二匹再增綿花一斤八兩給守邊正軍明會典十四年令陜西西安延安等衛府官吏舍人所犯不係贓罪笞杖徒流及軍民人等犯該笞杖不該立功者定撥各堡納草續文獻通考正統間失東勝城退守黃河套中膏腴之地令民屯種以省邊糧明九邊考代宗景泰元年令陜西延綏總兵鎮守及管糧郎中布按二司等官於秋草長茂之時量起軍夫趂時采取每束重一十五斤設法堆積委官看守以備支用續文獻通考英宗天順元年七月諭户部自遼東抵陜西邊軍良苦其遣給事中并司屬官各六人齎金分勞之人二金名山藏二年令陜西布政司右恭議一員督理糧草明會典憲宗成化二年陜西例將在邊各營堡操守官軍餘丁盡數查出於青草長茂之時督令前去採打有馬者每名採草一百八十束各勾自巳馬匹六個月支用無馬者每名照例採打堪中草一百二十束運倉上納以備客兵之用明九邊考六年六月命將征盧詔加延綏征進馬草五十萬束及運太倉見收折草銀五萬兩於軍前買草應用其馬臨征時許日加料一升屯守則如舊七年五月余子俊奏西安左等衛旗軍調撥榆林衛操守防禦已越三年士無完衣寒苦特甚請運胖襖鞋袴各二萬五千一百餘副分給優恤詔從其請世法録令陜西延綏二衛旗軍總旗月支本色八斗折鈔七斗小旗月支本色六斗折鈔六斗有家小軍人月支本色六斗折鈔四斗明會典八年何京上禦敵車制遣赴延綏與鎮臣議之車施鐵網網穴發鎗弩行則斂之寬止三尺戰則展之廣至六尺每五十車為一隊用士三百七十五人世法録榆林各衛所官軍月糧例該月初關支守備官軍行糧馬匹草料例該驗日關支本鎮行糧俱於月初關支遇有征調又起關隨處關支是一官一軍一月三次關支成化八年總制余子俊奏革行糧每月二次關支亦節省之意宜各邊通行明九邊考九年令延綏二衛在榆林備邊者月支本色米六斗折色四斗支銀錢又令延綏各堡馬步軍餘采草十一月終不完者本堡把總官住俸年終不完者管糧恭政及監收副使等官住俸十四年令户部運銀十萬兩分送陜西榆林給與官軍準折草料仍行山西河南附近州縣或借撥或儧運或買辦料豆各萬石榖草各一百五十萬束俱納榆林一帶倉場明會典二十年十二月發江南折糧銀十五萬并各處鹽課二百萬引於陜西榆林等處以給邊儲名山藏孝宗𢎞治十三年六月都御史史琳奏榆林等處嵗荒民貧恐軍儲不繼有誤機事户部會議請以近日禮部所借各處鈔關課銀仍還户部為供邊之數仍開中河東𢎞治十六年至十八年鹽課一百五十五萬四千引并令浙江等布政司及南直𨽻所屬凡問過徒流雜犯死罪囚犯俱納銀贖罪其按察司折收罪人紙價及各處扣除在官祗候齋夫及均徭餘剩銀兩俱清查解部轉發給軍上皆從之十三年復命造禦敵車於延綏凡千兩已復下車式於各邊間二載陜西總督秦紘推廣其制車用隻輪前後約長大四尺在上發銃者二人在下推車并發銃者四人重可二石而止遇險則四卒肩之以行若遇賊可先發車十兩或五兩直衝其陳前逐則首車向前後襲則末車向後其餘車箱掎角夾攻扼賊歸路庶幾萬全請名車曰全勝世法録十五年實徴馬草數陜西布政司馬草一百五十一萬四千七百一十二束零明會典𢎞治中布政文貴奏改西延慶三府東鎮之稅為拋荒折色二萬餘石自是軍用始窘明九邊考武宗正德五年議準延綏鎮墩軍除月糧一石外照夜不收例每日給米一升六年議定陜西起運各邊糧草照依時價解銀糴買上納每州縣各委佐二官或首領一員管押每府佐二官一員總理明會典九年十一月整理陜西糧儲户部侍郎馮清奏改西安延綏等府糧草皆徴折色銀兩解邊自是邊用益窘遂有米珠草桂之謡陳選明紀正德時總制楊一清題查得陜西各鎮自來處置邊儲不過曰穵運曰召商曰糴買𢎞治十三年間大敵在套動調京軍差大臣督理軍儲穵運腹裏州縣糧草纍民賠補至破産鬻兒今日斷不可行况腹裏空虛亦無糧可穵惟有召商糴買二事可行銀買雖若簡易緣地方道里逺近不同計算腳程多致末踰其本若分派州縣僉報人户糴買未免纍氏而官吏里書賣富拘貧侵尅抵換之弊又不能無省費於官斂怨於民亦非至計揆今事勢惟有召商報中似為得策客商射利雖小必趨官府儲糧小費何吝故在客商增一分之價則官司有一分之益但須革兜攬賣窩之弊豈可廢從古飛挽之法明九邊考世宗嘉靖十五年總制陜西侍郎劉天和即禦虜車舊制稍為損益上置大小雜兵以一百五十斤為凖箱前設蔽象以狻猊傍各施虎盾以禦矢石二車相連可蔽三四十人車用二人更推一人挽之又二人翼之敵入即倚牆布陳隨地形環列而護騎士於中一里之中用車十兩敵逺則施火器稍近則施弓弩又近則以短兵接之敵走則出騎士以追之夜則用火箭以防之復制隨車小帳令士不露宿以擺列邊牆據厄險要二十五年五月上深以延綏凋殘為慮允科道鮀道明曺邦輔議詔户部亟發兵銀六萬往賑令總督親詣撫恤一應軍餉趣陜西巡撫等官亟徵所逋濟之其所戍宣大遊兵亦令調還防守世法録三十四年題準延綏客兵行糧賊至百騎踰日不退雖在百里之內亦聽支給明會典陜西布政司嵗入榆林鎮夏稅秋糧本色共七萬九千三百四石九斗折色共二十一萬一千九百八十石零各折不等共銀一十八萬四千六百五十八兩二錢三分本色馬草五十五萬六千八十六束河南布政司嵗入榆林鎮布豆折銀三萬三千兩榆林本鎮本色屯糧六萬六千一百三十五石一斗八升零屯草七萬三千二百一十一束秋青草三十七萬七千四百六十束年例銀三萬兩新增募軍年例銀一萬兩額派客兵引鹽銀二萬九千七百五十兩補嵗用不敷引鹽銀三萬三千八十九兩募軍引鹽銀二萬九千五百二十兩明九邊考四十五年令各鎮除民屯鹽引外每年延綏主兵發舊例銀一十九萬五千七十九兩九錢八分新增料銀二萬二千一百八十五兩二錢三分客兵八萬兩以後視此為凖明會典延綏年例初不過一十萬兩嘉靖時增至二十一萬兩延綏主兵銀十九萬兩新增募軍料銀三萬兩客兵銀八萬兩續文獻通考穆宗隆慶三年延綏鎮年例主兵銀二十四萬七千二百六十五兩二錢一分客兵銀八萬兩五年薊鎮客兵部覆言在延綏者以十一月中旬起程每名給犒賞銀一兩有馬死通支本色行糧以恤其困題準延綏三年關領硫黃𦦨硝一次延綏黃三千五百斤續文獻通考神宗萬厯二年令延寧二鎮並延慶二府主客兵馬俱屬延綏管糧郎中兼理凡遇出納召買􅔜道挂號定價郎中收放互相恭考萬厯初延綏鎮見餉額主兵屯糧料五萬六千四百八十七石三斗八升草六萬一千五百五束地畝銀一千四十六兩一錢六分民運糧料九萬七千八百二十六石八斗九升草七千九百四十二束折色銀一十九萬七千四百三十三兩淮浙鹽一十五萬六千四百八十二引􅔜銀六萬七千六百二十五兩五錢二分五釐京運年例銀三十五萬七千二百六十五兩二錢一分客兵淮浙鹽七萬引􅔜銀二萬九千七百五十兩京運年例銀二萬二百五十兩六年實徴馬草數陜西布政司馬草一百三十七萬五千六百三十四束零明會典延綏年例銀萬厯中加至三十六萬七千明史竊軍法志熹宗天啓三年太倉出數延綏鎮年例銀四十三萬三千七百三十九兩八錢七分司册主客兵錢糧分開少四萬七千二百五十一兩五錢七分世法録榆林鎮屬馬二萬四千四百四十六匹糧料一十八萬九千七百二十八石零民糧三千九百三石零草八十八萬一千二百六十束內榆林鎮馬一萬一千二百三十二匹糧料三萬三千五百六十八石民糧三千九百三石七斗六升草五千束清水營馬六百七十二匹糧料一千三百五十石草九萬七千八百六十束新安邊營馬七百八十二匹糧料一千石草六千束靖邊營馬五百三十五匹糧料一萬九千二百六十七石草一萬七千九百四十五束寧塞營馬五百七十匹糧料二千三百二十八石四斗草二萬九千九百二十四束舊安邊營馬四百六十六匹糧料六百石草一萬五千二百束定邊營馬四百四十三匹糧料五千八百石草三萬八千二百八十二束髙家堡馬三百七十四匹糧料四千一石九斗草三萬二千一百二十三束建安堡馬四百一匹糧料五千三百七十石四斗草一萬四千八百二十一束雙山堡馬四百九匹糧料九千七百三十五石草九千九百四十九束常樂堡馬三百四十三匹糧料四百五十石草三千六百八十二束歸德堡馬一百六十七匹糧料三千三百六十二石六斗草二萬二千七十六束魚河堡馬三百一十二匹糧料一萬四千六百七十二石一斗草一萬四千六百一十束響水堡馬二百五十五匹糧料一萬一千四百七十石草八千三百六十束木瓜堡馬二百六十八匹糧料一千五百二十石草四萬一千二百五十束孤山堡馬四百四匹糧料四千一百一十石草六萬五千二百束鎮羌堡馬五百六十七匹糧料五百六十石草八萬六千七百五束龍州堡馬三百七十七匹糧料二千七百七十四石草一千一百二十一束把都堡馬三百二十五匹糧料五千八百石草八千二百九十束新興堡馬八十九匹糧料三千三百八十四石七斗草八千束潦池堡馬一百九十五匹糧料六十二石三斗草九千六束鹽池堡馬一百一十八匹糧料三百五十石草三千束波羅堡馬三百六十四匹糧料六千五百四十八石九斗草三萬三千二百四十三束懷逺堡馬五百二十一匹糧料四千三百五十四石九斗草一萬五千六百四十四束威武堡馬三百五十三匹糧料四千六百一十三石三斗草一萬二千三百六十三束清平堡馬三百四十匹糧料二千二百五十二石一斗草二千四百十八束神木堡馬一千二百四十八匹糧料二萬四千九百六十一石三斗草九萬一千三百六十一束黃甫堡馬二百一十四匹糧料五百八十五石草三萬一千一百二十束永興堡馬四百七十八匹糧料四千三百二十石草八萬四千六百四十四束大柏堡馬一百八十一匹糧料四百六十六石草一千二百一束柏林堡馬一百九十五匹糧料三千八百五十二石九斗草三萬六百一十三束鎮靖堡馬五百三匹糧料二千七百石草一萬七千九百四十五束永濟堡馬三百三匹糧料六百七十石六斗草一萬四千一百八十八束三山堡馬二百五十四匹糧料二千二百七十八石七斗草一千一百四十六束饒陽堡馬一百八十八匹糧料六百二十五石草三千八百三十五束朱思本輿地圖數按六營二十八堡馬匹總數散相符惟糧料草束不符今無考延綏東起黃甫川西止定邊營邊長地逺為套寇充斥之地考之先朝經略如余子俊楊一清王瓊輩其所建置修築先焉蓋設險衛民實保塞至計也然竊有説此中軍士更番入衛疲於奔命而又以地多沙漠種植為難芻糧不充曽不宿飽萬一敵駐魚河糧道險逺鎮城坐困可不為之經理哉議者欲於府谷至葭州由黃河而上造舟轉運以濟清水木瓜孤山等處亦為甚便近雖題行而建置倉庾改徴本色未聞議及皆今日之所宜汲汲者續文獻通考霍韜曰延綏軍士月糧一石折銀四錢成化中米一石價銀二錢軍士得銀四錢買米二石食烏得不足也今則銀一錢僅買粟二升軍士數口之家月食八升之粟如之何可足也然粟價所以先亷而後厚者何也成化以前邊防嚴固猛將林列故邊地盡耕邊粟自多今則將庸卒弱不堪支持地之出粟者寡人之食粟者衆成化以前鹽引皆輸邊粟故富商自招流民自墾邊地其米價自平而食自足𢎞治以後鹽引輸銀故富商大賈得輸銀之便而不復開墾邊地粟之所以貴而食之所以不足者殆為此也圗書編九邊舊無客兵止有主兵嵗輸民運屯鹽足以自給未嘗有兵餉也即余子俊初開榆林衛時增置城寨以民運不繼奏請江南折糧銀以備緩急不過一時之權計也自後軍政不修屯鹽漸廢請發帑金嵗以為常嘉靖末延綏一鎮軍餉年例費以二十七萬計况萬厯以後哉夫以九邊數十萬之衆不耕而仰食於民國家之力幾何而不困也延綏鎮志塞垣周魏惠王十九年築長城塞稒陽史記魏世家正義曰括地志云稒陽縣漢舊縣也在銀州銀城縣界按魏築長城自鄭濵洛北達銀州至勝州稒陽縣為塞也稒陽有連山東至黃河西南至夏會等州稒音固魏世家注秦昭王時北地上郡築長城以拒胡史記胸奴傳秦始皇帝三十三年西北斥逐胸奴自榆中並河以東屬之隂山徐廣曰在五原北以為三十四縣城河上為塞又使蒙恬渡河取髙闕山名在五原北陶山北假中地名近五原築亭障以逐戎人徙謫實之初縣史記秦始皇本紀秦巳併天下乃使蒙恬將三十萬衆北伐戎狄收河南築長城因地形用險制塞延袤萬餘里於是渡河據陽山逶迤而北暴師於外十餘年居上郡威振胸奴史記蒙恬傳河南正義曰靈勝等州陽山徐廣曰五原西安陽縣北有隂山隂山在河南陽山在河北傳注漢髙祖二年繕治河上塞史記髙帝本紀武帝元朔二年取丐奴河南地築朔方復繕故秦時蒙恬所為塞因河為固册府元龜元封六年漢使因杆將軍敖築受降城太初三年漢使光祿徐自為出五原塞數百里逺者千餘里築城鄣列亭至廬朐而使遊擊將軍韓説長平侯衛伉屯其旁使強弩都尉路博德築居延澤上史記胸奴傳正義曰五原郡榆林塞在勝州榆林縣四十里顧引云鄣山中小城亭候望所居也括地志云五原郡相陽縣北出石門鄣得光祿城又西北得支就縣又西北得頭曼城又西北得牢城河又西北得虜城按即築城鄣列亭至廬朐也括地志漢居延縣故城在張掖縣東北千五百三十里有漢遮虜鄣博德所築胸奴傳注後漢世祖建武十二年冬遣驃騎大將軍杜茂將衆部弛刑屯北邊築亭侯亭侯伺侯望敵之所修烽燧後漢書光武帝紀邊方備警作髙土臺臺上作桔臯桔臯頭有兜零以薪草置其中常低之有冦即燃火舉之以相告曰烽又多積薪寇至即燔之望其煙曰燧晝則燔燧夜乃舉烽廣雅曰兜零籠也漢書音義十四年馬成代杜茂繕治障塞自西河至渭橋築堡壁起烽燧十里一侯後漢書馬成傳安帝元初三年秋築馮翊北界侯塢五百所後漢書西羌傳順帝永建元年因朔方以西障塞多不修南部單于憂恐上言求復鄣塞順帝從之增置緣邊諸郡兵列屯塞下教習戰射後漢書南胸奴傳五年於扶風漢陽隴道作塢壁三百所置屯兵以保聚百姓西羌傳北魏太宗泰常八年二月戊辰築長城於長川之南起自赤城西至五原延袤二千餘里備置戍衛北魏書太宗紀髙祖太和中髙閭上表曰王公設險以守其國今宜依故於六鎮之北築長城以禦北敵雖有暫勞之勤乃有永逸之益六鎮東西不過千里若一夫一月之功當三步之地三百人三里三千人三十里三萬人三百里計十萬人一月必就其利有五罷逰防之苦一也北部放牧無抄掠之患二也登城觀敵以逸待勞三也省境防之虞息無時之備四也嵗常逰運永得不匱五也詔曰覽表具卿安邊之䇿比當與卿面論北魏書髙閭列傳隋髙祖開皇元年四月發稽胡修築長城二旬而罷隋書髙祖紀遣司農少卿崔仲方發丁三萬於朔方靈武築長城東至黃河西距綏州南出勃嶺綿亘七百里明年帝復令仲方發丁十五萬於朔方巳東緣邊險要築數十城以遏敵冦册府元龜六年二月發丁男十一萬修築長城二旬而罷七年二月發丁男十萬餘修築長城二旬而罷隋書髙祖紀煬帝大業三年秋七月發丁男百餘萬築長城西距榆林東至紫河一旬而罷四年七月發丁男二十餘萬築長城自榆林谷而東九月詔免長城役者一年租賦隋書煬帝紀長孫晟奏染干部落歸者既衆雖在長城內猶被雍閭抄略請徙五原以河為固於夏勝兩州間東西至河南北四百里掘為橫塹令處其內任情放牧免於抄掠上從之延綏鎮志唐髙祖武德中劉𢎞基為井越將軍領步騎一萬自豳州北界東距子午嶺西接臨涇修營鄣塞副淮安王神通備敵冦于北鄙册府元龜中宗景龍二年張仁願為朔方軍總管先是朔方軍與突厥以河為界河北岸有拂雲神祠突厥將入冦必先詣祠祭酹求福因牧馬料兵而後渡河時突厥默啜盡衆而擊突騎施娑葛仁願請乘其虛奪取漠南之地於河北築三受降城首尾相應以絶其南冦之路太子少師唐休璟以為兩漢以來皆守黃河今於寇境築城恐勞人費功終為賊有建議以為不便仁願上請不巳中宗竟從之仁願表留年滿鎮兵以助其功時咸陽兵二百餘人逃歸仁願盡擒之悉斬於城下軍中股栗役者盡力六旬而三城俱就以拂雲祠為中城與東西兩城相去各四百餘里皆據津要遙相應接北拓三百餘里於牛頭朝那山北置烽堠一千八百所自是突厥不得度山放牧朔方無復冦掠減鎮兵數萬人仁願初建三城不置壅門及郤敵戰格之具或問曰此邊城禦賊之所不為守備何也仁願曰兵法貴在攻取不宜退守冦若至此即當併力出戰回顧望城猶須斬之何用守備生其退恧之心也其後常元楷為朔方軍總管始築壅門以備冦論者以此重仁願而輕元楷焉册府元龜三受降城中城南直朔方西城南直靈武東城南直榆林明九邊考代宗大厯中馬燧為隴州刺史州西有通道二百餘步上連峻山與吐蕃相直敵每入冦皆出於此燧乃按行險易立石種樹以塞之下置二門上設樵櫓八日而功畢張獻甫為邠寧節度使選險要之地以為烽堡又上疏請復鹽州等鎮各置兵防以備蕃冦朝廷皆從之册府元龜穆宗長慶四年李祐為夏州節度使奏於蘆子關北木瓜嶺創築堡柵以捍黨項之衝其壁壘屋並出當軍財力不别請錢祐於塞外凡築五城烏延宥州臨塞隂河淘子而宥州烏延皆方廣數里尤居要害蕃戎畏之册府元龜敬宗寶厯元年振武節度使張惟清以東城濵河徙置綏逺烽南唐書兵志明成祖永樂十二年七月敕陜西臨邊諸城增烽堠謹備禦名山藏英宗正統間寧夏副總兵黃鑑奏偏頭關東勝州黃河西岸地名一顆樹起至榆溝蘇默圖六鎮沙河海子山火石腦兒鹻石海子回回墓紅鹽池百眼井甜水井黃沙溝至寧夏黑山等處共立十三城堡七十三墩臺東西七百餘里時議以地土平漫難據巳之總兵石亨奏延綏一路營堡移從直道以府谷堡移柴關故城孤山東村二堡移野蘆州神木堡移楊家城柏林髙家二堡移石落澗雙山堡移真溪灘榆林城移樺林白澗灘響水波羅移白土窯土門堡移白臘峯大兔鶻堡移濫柴關龍州城移北城塞門堡移古窯靖邊營移蒯河寧塞營移察罕諾爾直與安邊定邊相對時守土者以徙置煩勞巳之世法録正統二年守將都督王楨始請榆林城堡往北三十里之外沙漠平地則築瞭望墩臺敵窺境即舉煙示警往南三十里之外則埋軍民種田界石多於硬土山溝立焉界石外開創榆林一帶營堡纍增至二十四所嵗調延安綏德慶陽三衛官軍分戍而河南陜西客兵助之列營積糧以遏冦路續文獻通考七年六月用總兵巡撫議依界石一帶山勢隨其曲折剷削如城髙二丈五尺川口左右俱築大墩調軍防守世法録憲宗成化初延綏指揮同知房能請移營堡以固邊方臣所守迤東地原設塞門堡白洛城二處俱在偏南以裏去邊墩相逺道路迂曲聲勢不聞看得白洛城北地名甎營塞門堡北地名榆林依據險阻水草便利又與大兔鶻龍州邊堡接徑易為應援可將安定守官軍一百員名併入白洛城數內操守為宜二年延綏紀功兵部郎中楊琚奏自偏頭關邊墩河西一顆樹至寧夏黑山東西七百餘里立十三城堡又以府谷至寧塞十六堡移置故城至察罕諾爾一路併作二十堡其延綏西路安邊定邊二營與寧夏河東四堡仍用不移上命兵部會議以聞十一月整飭邊備兵部尚書王復奏臨邊府谷等一十九堡俱極邊要地必須增置那移庶為易守將府谷堡移出芭州舊城東村堡移出髙漢嶺響水堡移出黑河山土門堡移出十頃坪大兔鶻堡移出響鈴塔白洛城堡移出甎營兒塞門堡移出務栁庒東西對直捷徑水草亦甚便利內髙家堡至雙山堡雙山堡至榆林城寧塞營至安邊營安邊營至定邊營相去隔逺合於各交界地名崖寺子三眼泉栁樹澗瓦劄梁各添哨堡一座就於鄰近營堡量摘官軍哨守又於安邊營起每二十里築墩臺一座通共二十四座定邊營起每二十里築墩臺一座共十座俱於附近軍民量撥守瞭北靣沿邊一帶墩臺空逺者各添墩臺一座共二十四座隨其形勢以為溝牆必須髙深足以遮賊來路因其舊堡廣其規制必須寬大足以積糧草容人馬從之八年侍郎葉盛等言延綏西路舊守土門大兔鶻等堡並未守鐡鞭鎮地名五榖黑城子銀州關等城俱宋時防守夏人所築山勢最險水泉甚便近年棄土門等處乃守懷逺威武等堡既無險可據又取水太逺宜將鐡鞭等城漸為修補為官軍截殺駐劄之所不果行世法録巡撫延綏都御史余子俊疏奏延邊西路定邊二營俱係平漫沙漠難立牆塹近年於定邊東空添築永濟小堡按伏馬匹鎮靖堡軍馬原守塞門今移於畢家堡五營堡水苦且逺人馬多病內定邊新興安邊永濟四營堡賊易窺見虛實軍馬難於出入但鎮靖堡已行奏允仍守塞門其餘四營堡俱各那移就險而守定邊營接連寧夏花馬池我固便利彼無鄰援不可動也惟將新興堡移於迤南古迹海螺城安邊營移於迤南邊營中山坡永濟堡移於迤南上紅寺鎮靖堡不必那回塞門却移於迤北白塔澗口海螺城中山坡上紅寺多是削山為城俱有門禁即可搬移逐漸修理其白塔澗口就快灘河迤南之險其河深二三丈逺百餘里事成之後則定邊新興安邊永濟寧塞靖邊鎮靖龍州八營堡之地以守則固以戰則利况常年必須民間運納榖草今只令納户就彼採野草自足供給此保民之計也明奏疏十年閏六月余子俊奏修築邊牆之數東自清水營紫城寨西至寧夏花馬池營界牌止凡修城堡一十二座榆林城南一截舊有北一截創修安邊營及建安常樂把都河永濟安邊新興石潦池三山馬跎泉八堡俱創置響水鎮靖二堡俱移置凡修邊牆東西長一千七百七十里一百二十三步守護壕牆崖寨八百一十九座守護壕牆小墩七十八座邊墩一十五座奏入上令所司知之七月命榜諭延綏等處所司嚴飭邊備每年四月八月令守備官軍修葺垣牆墩堡增築草場界至時加巡察敢有越出塞垣耕種及移徙草場界至者俱治以法十六年子俊為兵部尚書言延綏三路東路神木西路安邊皆山勢險峻賊難輕入惟中路榆林東有常樂雙山建安髙家四堡西有響水波羅懷逺威武清平五堡南有歸德魚河二堡皆地勢平曠可以通騎主將一人難於應敵宜增設守禦世法録世宗嘉靖十年閏六月王瓊奏計度榆林東中二路大邊六百五十六里當修者三百十里二邊六百五十七里當修者二百四十八里因言二邊乃成化中余子俊所修因山為險屯田多在其外大邊𢎞治中文貴所修防護屯田中間率多平地築牆髙厚不過一丈可壞而入今當先修大邊必使岸塹深險牆垣髙厚計用丁卒萬八千人乞發帑金十萬從之世法録二十二年題準延綏逼鄰套冦添定邊寧塞二堡修築邊牆明會典二十四年總督曽銑言自定邊營至黃甫川連年冦入率由是道當亟為修繕分地定工次第修舉西自定邊營東至龍城堡計長四百四十餘里為西段所當先築自龍城堡東至雙山堡計長四百九十餘里為中段自雙山堡東至黃甫川計長五百九十餘里為東段嵗修一段期以三年竣事明紀事本末四十三年令榆林西北古梁易馬二城增修城堡又令鎮城硬地梁一帶小邊桞河梁各處添設城堡以嚴防護明會典穆宗隆慶元年題準延慶地方東有黃草墕小滴溜石人坪西有蘆關嶺龍安集靖邊龍尾觜化字倉寧塞吳旗營俱係要路通行及時修築又題準榆林鎮邊牆自石峽墩迤東至常樂地界及鎮城東西北三面外邏城俱分頭修築三年題準修築延綏鎮東起黃甫川邊牆迤西至常樂堡通以五年為限明會典神宗萬厯二年題準延綏墩臺一墩止軍十名不能固守邊內險阻可建墩院者仍行增築又於十里之間酌量緩急以為寨城又題準修建延綏一鎮三段邊牆六百七十一里墩臺七十五座墩院八座寨城七座石砌大川河口一處土築大川河口四處石砌河口水洞連臺一座石劵關門一座石砌并土築溝口一十七處磚石劵砌大小水洞暗門八十三處水口四十五處水眼五十一處水道四百二十五處三年題準延綏榆林神木定邊靖邊四道築空心敵臺見存城垣六十二座民塞堡城一百四十九座寨城五十五座空心敵臺二百三十九座敵臺一百一十六座墩臺一千三百一十六座明會典中路榆林城在常樂保寧之中左山右水天設巖疆保寧波羅相去八十里中有響水一堡去邊七十里舊恃無定河為限今水淺不足憑宜於保寧波羅之間添置一堡移響水之兵守之懷逺威武清平邊垣臨險髙峻可據然衝口實多川面平衍如西川小理河汊灞最為首衝當備且自常樂抵波羅沿邊積沙髙與城等剷去復滿又保寧昔多水澤今瀦漸涸馬無所飲歸德之餉道可虞况保寧常樂實扼魚河歸德大川之衝尤當首為綢繆者延綏志中路議東路黃甫川堡與晉之岢嵐樓子營隔河相對西至雙山十二城岡阜交錯深塹髙崖蜿蜒四五百里東南逼臨大河最稱險要自昔敵難深入然雙山之大川南近米脂為最衝黃甫川之河氷冬則易度且密邇葭州府谷神木吳堡諸邑軍民雜居保牧為難所宜隨時設備因事制宜者也延綏志東路議延鎮定邊營西鄰寧夏與花馬池接壤轉而東為甎井龍城十五營堡皆倚山臨塹然寧塞桞樹澗平川錯雜為延安門户較之鎮靖靖邊尤為要害栁樹澗迤西則曠野平原無險可恃新安邊新興石潦池三山諸堡設在腹裏議者欲分丁貼守亦一䇿也甎井去定邊五十餘里宜於瓦劄梁增設一堡如鎮羅堡故事以便接應定邊西郭之外南北二沙最為邊患除之復聚不如增築墩臺之為要也延綏志西路議榆林東起黃甫川西至定邊營長垣九百二十餘里城堡三十四墩臺一百七十有零座墩堡勾連橫截河套之口內復塹山湮谷另為一邊名曰夾道地利亦險矣九邊考邊防漢髙祖二年興關內卒乘塞史記髙祖本紀李竒曰乘守也本紀注文帝十四年冬胸奴謀入邊為冦攻朝那塞乃遣三將軍軍隴西北地上郡中尉周舍為衛將軍郎中令張武為車騎將軍軍渭北車千乘騎卒十萬後六年胸奴入上郡以將軍張武屯北地河內守周亞夫為將軍居細栁徐廣曰在長安西宗正劉禮為將軍居霸上祝兹侯軍棘門孟康曰在長安北秦時宫門也數月罷史記孝文本紀孝文時胸奴數冦邊朝錯上言曰胡人食肉飲酪衣皮毛非有城郭田宅之居美草甘水則止草盡水竭則移往來轉徙時至時去今使胡人轉牧行獵於塞下或當燕代或當上郡北地隴西以候備塞之卒卒少則入陛下不救則邊民絶望救之少發則不足多發逺縣才至則胡乂去聚而不罷為費甚大罷之則復入如此連年則中國不安矣陛下憂邊境遣將吏發卒治塞甚大惠也然令逺方之卒守塞一嵗而更不知胡人之能不如選常居者家室田作且以備之以便為之髙城深塹具藺石布渠答如淳曰藺石城上雷石也蘇林曰渠答鐵蒺藜也復為一城其內城間百五十步要害之處通川之道調立城邑毋下千家為中周虎落鄭氏曰虎落者外蕃也若今時竹虎也又師古曰虎落者以竹篾相連遮落之也先為室屋具田器乃募罪人及免徒復作令居之不足募以丁奴婢贖罪及輸奴婢欲以拜爵者不足乃募民之欲往者皆賜髙爵復其家豫冬夏衣廩食能自給而止其亡夫若妻者縣官買豫之胡人入驅而能止其所驅者以其半豫之師古曰言胡人為寇驅掠漢人及畜産而他人能止之以得其所驅者令其本主以半賞之縣官為贖師古曰官為備價贖之其民如是則邑里相救助赴胡不避死逺方無屯戍之事塞下之民父子相保無係虜之患矣上從其言漢書朝錯傳武帝元朔三年秋城朔方城漢書武帝紀漢拜郭昌為拔胡將軍及浞野侯屯朔方以東備胡是嵗元封六年也史記胸奴傳宣帝五鳯四年胸奴單于稱臣以邊塞無冦減戍卒什二漢書宣帝紀後漢世祖建武二十二年胸奴北徙幕南地空詔罷邊郡亭侯吏卒二十四年春正月胸奴薁鞬日逐王比遣使欵五原塞求捍禦北虜後漢書光武帝紀二十六年冬復詔單于徙居西河美稷因使中郎將段彬及副校尉王郁留西河擁護之為設官府從事掾史令西河長史嵗將騎二千弛刑五百人助中郎將衛護單于冬屯夏罷自後以為常及悉復緣邊八郡南單于既居西河亦列置諸部王助為捍戍使韓氏骨都侯屯北地右賢王屯朔方當于骨都侯屯五原皆領部衆為郡縣偵羅耳目南胸奴傳明帝永平六年北單于欲合市求和親顯宗許之八年遣越騎司馬鄭衆北使衆上言宜更置大將以防二虜交通由是始置度遼營以中郎將吳棠行度遼將軍事副校尉來苗左校尉閻章右校尉張國將黎陽虎牙營士屯五原曼柏又遣騎都尉泰彭將兵屯美稷其年秋北虜果遣二千騎候望朔方作馬革船欲度迎南部畔者以漢有備乃引去後漢書南胸奴傳章帝元和元年詔設官邸與北單于合市南單于出上郡遮略生口驅還入塞後漢書南胸奴傳和帝永元七年正月馮柱將虎牙營屯五原後漢書南胸奴傳順帝永和六年十一月以執金吾張喬行車騎將軍事將兵屯三輔後漢書順帝紀西魏大統六年夏茹茹度河至夏州太祖召諸軍屯沙苑以備之周書文帝紀隋髙祖開皇二年十月皇太子勇屯兵咸陽以備胡隋書髙祖本紀唐髙祖武德初以豐州絶逺先屬突厥交相往來吏不能禁隱太子建成議廢豐州虛其城郭權徙百姓寄居於靈州割并五原榆平之地於是突厥遣處羅之子都設率所部萬餘家入處河南之地以靈州為境册府元龜六年七月皇太子屯於北邊以備突厥七年閏七月秦王世民齊王元吉屯於邠州以備突厥唐書髙祖本紀武德中帝會羣臣問所以備邊者將作大匠丁筠請五原靈武置舟師於河扼其入中書侍郎溫彥博曰魏為長塹遏丐奴今可用帝使桑顯和塹邊大道召江南船工大發卒治戰艦突厥傳玄宗厚接突厥嵗許朔方軍西受降城為互市唐書兵志互市監每監監一人從六品下丞一人正八品下掌蕃國交易之事互市有衛士五十人以察非常百官志開元十五年十一月制以吐蕃為邊患召關中兵萬人集朔方防秋通鑑德宗時陸贄奏諸牧有馬每州有糧肅宗得以為資先帝漸修邊防關中有朔方隴右等三帥以捍西戎聲勢壯盛士馬精強又召諸道戍兵每嵗乘秋備塞陸宣公奏議貞元三年七月遣決勝軍使唐良臣以其衆六百人自咸陽戍潘原堡神策副將蘇太平率其衆五百人戍隴州八月以劉昌為京西行營節度使戍麟逰册府元龜後周太祖廣順四年延州向訓言請禁止州界民賣軍裝兵器於蕃部從之五代史周太祖本紀宋真宗景德四年於保安軍置𣙜場以繒帛羅綺易駝馬牛羊玉氊毯甘草以香藥瓷漆器薑桂等物易蜜蠟麝臍毛褐羱羚角􅗠砂柴胡蓯蓉紅花翎毛非官市者聽與民交易入貢至京者縱其為市宋史食貨志仁宗康定元年正月元昊寇延州詔陜西運使明鎬募強壯備邊四月遣使籍陜西強壯軍備邊宋史仁宗本紀天聖中陜西𣙜場二及元昊反即詔絶其互市廢保安軍𣙜場後又禁陜西並邊主兵官與屬羌交易久之元昊請臣數遣使求復互市食貨志天聖中禁田河西者虜乃得稍蠶食其地俯窺麟州司馬光為龎籍畫䇿宜因州中舊兵益禁兵二千廂兵五百築二堡河西可使堡外三十里虜不敢田則州西六十里無虜矣籍移麟州如其言溫公文集慶厯二年詔發士三萬戍永興委總管司部分閲教嵗以八月遣萬五千人戍鎮戎軍十二月以萬五千人代至二月無警即還嵗以為常宋史兵志六年復置場于保安軍繼徙于順寧寨既而蕃商卒無至者食貨志至和二年麟府豐州先以間田募置人給屋貸口糧二石而德順軍靜邊寨壕外弓箭手尤為徑勇夏人利其地數來爭朝廷為築堡戍守文獻通考嘉祐初禁陜西四路私與西人貿易宋史食貨志英宗治平四年詔延州募保捷五營以備更戍宋史兵志河東經略司言西界乞通和市乃復許之後二年令陜西邊民勿與通市又二年遂申詔諸路禁絶既而河東轉運司請罷吳堡於寧星和市如舊麟州復奏夏人之請乃令鬻銅錫以市馬而􅊏縞與急須之物皆禁食貨志神宗熙寧三年保平軍節度推官王韶倡為緣邊市易之説丐假官錢為本詔秦鳯路經略司以川交子易物貨給之因命韶為本路帥司幹當兼領市易事八年二月鳯翔永興軍並置市易司宋史食貨志范仲淹為陜西招討使以邊兵訓練不精又部署鈐轄等權任相亞莫相統一於是首分鄜延路兵以為六將將合三千餘人選路分都監及駐泊都監等六人各監教一將兵馬又選使臣指揮使十二人分𨽻六將專掌教閲遇有冦警少則路分都監將所部先出多則鈐轄署領兩將或三將以出更出迭入總領不二勞逸又均邊備寖修冦不敢犯其後諸路皆用此制却掃編哲宗元祐二年樞密院言今朝旨令熙河蘭會路都總管司遇本路緩急闕人許于秦鳯路勾抽一將應副緣本路即目事宜慮向秋闕人防守欲熙河蘭會路都總管司遇本路緩急闕人聽令勾抽秦鳯路九將應副差使從京東差步軍五指揮赴永興軍商虢州權駐劄以備秦鳯路勾抽從之元符二年閏九月遣秦鳯路戍兵十指揮應副熙河新邊戍守宋史兵志徽宗政和四年詔西羌久為邊患乍叛乍服今雖誓表已進羌戎之性不保其往備戒不虞正在今日令陜西帥臣訓練兵伍除治軍器繕修樓櫓收積芻糧所有弓箭手蕃兵常令優恤逃亡者可速招補貧乏者亦令貸借將佐偏禆如或軟懦失職具名以聞或冦至失事並行軍法宋史兵志髙宗建炎後吳玠兵屯鳯州大散關和尚原宋史兵志紹興四年詔川陜即永興軍威茂州置博易場食貨志十二年五月乙未置陜西𣙜場髙宗本紀金熙宗皇統二年五月許宋人之請各置𣙜場於兩界以通互市九月命鳯翔府等處皆置續文獻通考海陵正隆四年正月罷鳯翔等處所置𣙜場金史食貨志世宗大定四年復置鳯翔𣙜場十七年二月陜西沿邊𣙜場止留一處餘悉罷之罷保安綏德二𣙜場金史食貨志二十一年以東勝與陜西道路隔絶貿易不通尋令綏德州置一場仍許就館市易續文獻通考章宗承安二年復置場於保安泰和八年八月以與宋和遂復置場於秦鳯之地金史食貨志宣宗興定五年十月分京畿戍卒萬二千河中民兵八千以元帥赫舍哩鶴夀將之屯潼關西金史宣宗本紀元世祖中統元年五月以總帥汪良臣統陜西漢軍於沿河守隘元史世祖本紀明太祖洪武九年正月命中山侯湯和潁川侯傅友德等帥師往延安防邊三十年正月命長興侯耿炳文佩征西將軍印為總兵官武定侯郭英為副往陜西選精鋭步騎巡西北邊以備冦世法録英宗正統二年楊士竒楊榮楊溥上言今遣御史清軍有以陜西等處之人往南方極邊補伍者有以江浙等處之人往北邊補伍者其水土不相習北人苦於瘴癘南人苦于嚴寒多致死亡深為可憫又西北二邊急于防守而所在勇壯之人乃發戍南方自今邊卒清解者宜從南北所宜發戍庶幾人宜水土兵政有備詔廷臣議行之時兵部侍郎鄺野掌部事曰此舊制不可紊稍有變易將不勝其弊咎將誰歸卒不動歷朝時務䇿要築東勝等城屯兵戍守明九邉考七年令陜西土軍土民餘丁若户丁有在邊操備者免雜泛差役續文獻通考憲宗成化元年二月延綏都督張傑上安邊方略謂綏延等境廣袤千里甚宜耕牧但須增立營堡以時開閉且所轄東西二十五營堡每堡頓兵不過一二百人勢孤力弱可選諸營精兵九千分為六哨分屯府谷神木二縣龍州榆林二城髙家安邊二堡無事則巡歷邊疆遇警則彼此應合又延安地臨極邊鄜州定邊俱在腹裡相去不止數程遇警猝難馳報其所屯防秋軍士二千餘人乞分布沿邊要害以備調用上從之二年十二月參政朱瑛奏近年毛里孩南侵延慶所在官軍既以堅壁清野為能鄰近人馬又以據守信地為重各擁重兵傍觀坐視議推選武臣一員總制文臣一員充總督常鎮陜西節制三邊并腹裏軍務聽其操練調度兵部覆奏以陜西甘肅寧夏延綏俱有文武大臣再加以總督總制則三邊有事候其遙斷必誤事機今宜移文各官地方有警鄰境即發兵應援毋誤軍機從之三年三月王復言北人最為邊患今大同宣府有總兵參守一十二員寧夏甘肅亦有八員而延綏城堡窵逺止有總兵參將三員調度豈能周遍請添設參將二員將先調鄜慶官軍存留四十員名慶陽衛官軍八百一十七員名相參土兵八百六十六名撥堡輪守詔曰可六年陜西巡撫馬文升奏榆林事宜揀將練兵豐財足食據險以遏其深入燎荒以絶其孳牧四條上是其言世法録五月文升奏陜西三邊榆林最為要害請敕該部每嵗秋初遣主事一員督軍辦糧草事竣還京事下户部從之登壇必究七年命侍郎葉盛行視河套時北虜入河套議增兵設險或請大舉搜套驅之出河外沿河築城堡抵東勝徙民耕守其中盛往上言搜河套復東勝未可輕議惟增兵守險可為逺圖上從之世法録十年巡撫余子俊議敵人潛住河套離邊不逺凡遇沿邊軍民耕作時月人畜在野計令分守東路右參將領軍于神木堡逰擊將軍領軍於髙家堡俱係要害去處住劄防禦東西二路分守參將并把總都指揮等官每堡三路擺塘哨探沿邊墩空數塘本堡東西相向數塘迤南腹裏東西相向數塘遇警放炮使耕作人畜運糧人等取便回避及令各官整兵隄備遇有小冦隨即追殺若是大舉星馳通報發兵䇿應明九邊考孝宗𢎞治初總督都御史王越疏奏綏德在秦時為上郡歷漢隋唐皆為邊鎮國初洪武二年定陜西設綏德衛屯兵數萬守之撥綏德衛千户劉寵屯治榆林正統中命都督王貞鎮守延綏始議築榆林城及沿邊十八寨遂移鎮焉成化七年置榆林衛八年都御史余子俊開廣榆林城垣增置三十六營堡以今日陜西邊備論之國初以綏德為邊衛東自葭州黃河西至定邊營七百餘里岡阜相連有險可據猶易為守自移鎮榆林綏德官軍移徙不常在綏德者不及什一敵兵大舉或由榆林東雙山堡等處入冦綏德或由榆林西南定邊營花馬池等處入冦固原榆林之兵其在東也則以無險而不能守其在西南也則以路逺而不能援其在綏德舊鎮也則以兵寡而不能禦為今之計宜量撤兵卒之半復還綏德使守險拒敵防其深入其榆林及新設城堡各計其屯田嵗入之數留兵屯守而移置其多餘之屯於定邊營要害之地委謀勇將官統之如此則敵不敢深入而內無土崩之患矣明奏疏武宗正德元年正月命巡撫楊一清總制陜西延綏等處邊務兼督馬政一清言寧夏花馬池興武營直抵髙橋三百餘里為敵入邊門户近因警報議調延綏逰兵土兵至此分布防禦而無一人至者蓋事關各鎮不相統攝故也宜命大臣為總制居中調度如敵衆出套亟行經略花馬池一帶邊務庶有備無患全陜可安兵部集議遂以一清薦乃有是命先是孝宗𢎞治末朝廷清明內外大臣協心體國議復河套會孝宗崩劉瑾專政總制楊一清上經略三疏一議守守敵所必入一議戰戰敵所必敗一議攻攻敵所必救已一清得罪去無敢言及河套者世法録世宗嘉靖二十六年十一月曽銑會同撫按官疏陳邊務十八事曰恢復河套曰修築邊垣曰選擇將材曰選練將士曰買補馬騾曰進兵機宜曰轉運糧餉曰申明賞罰曰兼備舟車曰多備軍器曰招降用間曰審度時勢曰防守河套曰營田儲餉曰明職守曰息訛言曰寬文法曰處孳畜奏下兵部覆言銑經略甚詳但事體重大請下其章於廷臣各疏所見然後集議上曰敵據河套為國家患朕軫念宵旰有年矣念無任事之臣今曽銑前後所上方略卿等既看詳即會衆協忠定䇿以聞已而銑復上營陳圖八曰立營總圖曰遇敵駐戰圖曰選鋒車戰圖曰騎兵逐陳圖曰步兵博戰圖曰行營進攻圖曰變營長驅圖曰獲功收兵圖上覽而嘉之令廷臣一併議奏世法録二十八年題準延綏逰兵照原議應援宣大如宣大稍寧延綏緊急將老營堡逰兵一枝聽候延綏調遣明會典三十年七月延綏鎮巡等官張愚等言本鎮自開國以來未經開市法宜慎始且東西相距千五百里無邊牆為限雖定邊稍有邊牆而地多平漠惟花馬池界在延寧二鎮之中有邊牆三百餘里可以為據宜合二鎮同此立市限以日期先後互易總督大臣用防秋例駐此以便調度兩鎮撫鎮各帶兵馬分布防禦仍乞比照大同事例給發帑銀充用從之發銀四萬令總督會同鎮巡官酌議停當如大同例行郜光先奏延寧二鎮互市應行事宜六條一議處撫賞一議定市期一處置市貨一議給馬價一分定市地一優贍通丁世法録嘉靖中俺答開市凡十一處在延綏者一曰紅山寺堡續文獻通考榆林地險而防嚴將士戰不貫胄敵呼為駱駝城舊以陜西左前右後護衛延安綏德慶陽三衛并河南南陽衛頴上千户所直𨽻潼關寧山二衛官軍輪班哨守延安府府谷安定安塞保安四縣并綏德衛屯種栁樹會拜堂兒麻葉河俱在近邊地方止是人民屯軍土兵人等居住若定委千百户所管屯官一員會同各縣編成行伍給領軍器常川操練就於本縣防守可代邊軍河套地方千里敵數萬入居其中趂逐水草四散畜牧欲大舉南冦則令人傳示諸部落約日聚衆而進既聚衆至二三萬夜宿火光連亘數十里我之墩軍夜不收瞭望先知我兵可設備矣敵衆臨牆止宿必就有水泉處安營飲馬今花馬池牆外有鍋底湖栁門井興武營外有蝦蟆湖等泉定邊營外有東栁門等井餘地無井泉又多大沙凹凸或産蒿深沒馬腹賊數百騎或可委曲尋路而行多則不能故設備之處有限明九邊考穆宗隆慶元年題準延安衛舊有遊擊統領官軍三千駐劄本處防秋則赴大邊鎮靖堡後改延安遊擊為鎮靖參將遂將官軍二千移駐鎮靖一千移駐鄜州延安城池空虛令鎮靖營將原調延安軍五百七十名發回城操而以新募兵發補鎮靖營缺數續文獻通考神宗萬厯十三年題準延鎮備禦陜西西安并潼關各衛所班軍暫免逺戍徴銀解邊防守續文獻通考邊市距鎮城之北十里許為紅山市又東為神木市又東為黃甫川市皆屬國互市處也正月望後擇日開市間一日一市鎮人習蒙古語者持貨往市有土城不屋陶穴以居或施帳焉其貨則湖茶蘇布草段鹽煙不以米不以軍器蒙古之至者則羊絨駝毛狐皮羔皮牛羊兔不以馬鎮城及營堡俱有市而沿邊村落亦間有之如黃甫川之呆黃坪清水營之尖堡子神木營之紅寺兒清水坪高家堡之豆峪萬户峪建安雙山之大會坪通秦寨金河寺栁樹會西寺子波羅迤西之土門子白洛城卧牛城威武清平之石人坪麻葉河鎮靖之筆架城靖邊寧塞迤西之鐡角城順寧園林驛吳旗營把都永濟新安邊迤西之鎖骨朵城張寡婦寺李家寺沙家掌五箇掌者是也其稅少止數錢多不過二兩而已各堡之守備把總司之於春秋兩季解布政司充餉延綏鎮志國初敵遁河外居漠北延綏無事正統以後浸失其險敵始渡河犯邊鎮守都督王貞始築榆林城創沿邊一帶營堡墩臺纍增至二十四所嵗調延安綏德慶陽三衛官軍分戍而河南陜西客兵助之列營積糧以遏冦路景泰初敵犯延慶不敢深入天順初阿羅出掠我邊人以為嚮導因知河套所在不時出沒遂為邊境剝膚之害世法録延綏初築東勝等城戍守河外正統間失東勝退守黃河後失河套又棄河守牆鎮城舊在綏德捐米脂魚河等地於外幾三百里成化中徙鎮榆林東起黃甫川西至定邊營千二百餘里聨墩勾堡橫截河套之口遂稱雄鎮但鎮城不産五榖芻糧皆仰給腹裏明會典陜西防邊之法考唐三城守之於河外上䇿也蓋守之於河外則險在我而易為力守之於河南則險在敵而難為功也修夾道之牆時出精兵以搜套中䇿也其下䇿來則浪戰去則坐守而已苑洛集榆林舊治在綏德成化時余肅敏子俊廣開城垣增置三十六營堡其邊牆東起黃甫川西至定邊營長千二百餘里橫絶河套之口侈其功者曰鎮包米脂魚河三百里膏腴地東連牛心堡可便應援西截河套衝可便耕牧千三百里樹藝圍獵樵採之地吾得擅而有焉據險衛內誠雄鎮也引為罪者曰榆林東有雙山堡敵由此而冦綏德我兵之在東者以無險而不能守也榆林西南有定邊花馬池彼由此而冦固原我兵之在西南者以路逺而不能援也且鎮既移則綏德之兵寡其不能禦寇必也憂其危者曰軍所恃者食也自賊據套而耕牧絶耕牧絶而轉輸艱轉輸艱而士伍耗榆林之軍不患不勇而患恆飢也惟陜州有河可通綏德若計沿河郡縣改徴本色悉以輸之庶少蘇耳且夫亂峯墩野豬峽是直衝魚河之徑彼若駐兵魚河則斷榆林綏德為兩矣又自定邊營西抵寧夏東黃河岸橫城堡三百里中多平漫沙漠敵人大舉多由此入當慎之矣有王者起復河套而守東勝彼榆林之或有或無正不足深論也朱思本輿地圖陜西通志卷三十五
