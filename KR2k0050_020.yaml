body:
  text: 陜西通志卷二十職官一惟王建國爰樹羣工雍為天府列爵斯崇乃建爾牧職在藩封承以師長課爾民功連以將帥義奮從戎漢隋唐宋沿革異同我朝損益典制攸隆凡百君子敬爾在公作職官志第二十漢司𨽻校尉武帝征和四年初置察三輔三河𢎞農元帝初元四年去節成帝元延四年省綏和二年哀帝復置為司𨽻官秩二千石從中都官徒千二百人師古曰中都官京師諸官府也京兆尹掌治京師景帝二年分置左右內史武帝太初元年更名京兆尹秩二千石丞二員秩六百石長安令丞市厨令丞都水長丞鐵官長丞按內史之分左右漢書百官公卿表作景帝二年師古曰地理志云武帝建元六年置左右內史而此表云景帝二年分置表志不同今考百官表載景帝元年朝錯為左內史則與表稱二年者不合鄭當時武帝建元四年為右內史則與地理志稱建元六年者亦不合也左馮翊本左內史武帝太初元年更名左馮翊秩二千石丞二員秩六百石廩犧令丞尉師古曰廩主藏穀犧主藏牲左都水長丞左鐵官長丞雲壘長丞長安四市長丞右扶風治內史右地本主爵都尉武帝太初元年更名右扶風秩二千石丞二員秩六百石掌畜令丞東方朔曰益為右扶風畜牧之所在也都水長丞鐵官長丞廏長丞雍厨長丞如淳曰五畤在雍故有厨按漢書百官公卿表右扶風與左馮翊京兆尹是為三輔師古曰京兆在尚冠前街東入故中尉府馮翊在太上皇廟西入右扶風在夕隂街北入故主爵府長安以東為京兆長陵以北為左馮翊渭城以西為右扶風據此則當日設立三輔分治京畿而公署仍在都城也京輔都尉武帝元鼎四年置太初元年改中尉為執金吾左右京輔都尉丞兵卒皆屬焉黃圖云京輔都尉治華隂秩二千石又西京雜記輿駕祀甘泉汾隂長安都尉騎左右各二人則長安亦有都尉也左輔都尉黃圖云左輔都尉治髙陵右輔都尉黃圖云右輔都尉治郿都尉丞以上三輔皆有按三輔黃圖三輔郡皆有都尉如諸郡王莽分長安城旁六鄉置帥各一人分三輔為六都尉渭城安陵以西北至栒邑義渠十縣屬京尉大夫府居故長安寺高陵以北十縣屬帥尉大夫府居故廷尉府新豐以東至湖十縣屬翊尉大夫府居城東霸陵杜陵以東至藍田西至武功郁夷十縣屬光祿大夫府居城西茂陵槐里以西至汧十縣屬扶尉大夫府居城西長陵池陽以北祋祤十縣屬列尉大夫府居城北三輔直指繡衣使者督三輔盜賊禁察踰侈不常置城門校尉掌京師城門屯兵秩二千石屯司馬八員師古曰八屯各有司馬城門候十二員師古曰門各有候蕭望之置小苑東門候亦其比也按漢書武帝本紀及劉屈氂傳武帝時以戾太子在外始置屯兵長安諸城門是城門校尉之員當自武帝時始步兵校尉掌上林苑門屯兵秩二千石武帝初置長水校尉掌長水宣曲胡騎師古曰宣曲觀名胡騎之屯于宣曲者秩二千石武帝初建胡騎校尉掌池陽胡騎不常置師古曰胡騎之屯池陽者秩二千石武帝初置丞司馬以上各校尉皆有按漢書百官公卿表中壘以下八校尉皆掌兵事然所屯之地非若上林宣曲池陽之可指故不録入又執金吾所屬雖掌徼循京師水衡都尉所屬雖在甘泉上林但係京官亦不雜序漢中郡北地郡上郡西河郡五原郡朔方郡太守以上各太守掌治其郡秩二千石本名郡守景帝二年更名太守丞秩六百石各郡皆有長史置上郡秩六百石掌兵馬庫令置上郡如淳曰北鄙郡庫官之兵器所藏故置令文學武帝時郡國立官經師成帝時郡國置一人漢中都尉治漢陽縣北地都尉上郡都尉治塞外西河都尉五原都尉朔方都尉以上各都尉掌武職甲卒本名郡尉景帝中二年更名都尉元帝建昭三年令三輔大郡都尉秩皆二千石𢎞農都尉𢎞農郡治在今潼關外武帝太初三年徙𢎞農都尉治武關則移駐陜地矣故附見于此丞秩六百石以上各都尉皆有上郡屬國都尉武帝初置主蠻夷降者治龜兹馮奉世傳上郡屬國歸義降者萬餘人五原屬國都尉治蒲澤西河屬國都尉治美稷安定屬國都尉治二水丞候千人以上各屬國都尉皆有北部都尉治髙望東部都尉治稒陽廣發南部都尉治翁龍西部都尉二員一治虎猛一治寙渾中部都尉二員一治渠搜一治成宜胸歸都尉治塞外師古曰胸歸者言胸奴歸附陵寢官髙寢令髙寢郎孝文園令渭陵寢中郎延陵園郎食監每陵各一人六百石如淳曰給陵上祭祀之事監丞每陵各一人三百石縣令掌治其縣萬户以上為令秩千石至六百石縣長減萬户為長秩五百石至三百石丞秩四百石至二百石尉秩與丞同鹽官龜兹沃野富昌成宜各一員主鹽稅餘縣無鐵官鄭縣夏陽雍縣漆縣沔陽各一員餘縣無經師成帝時校置經師一人庠序置孝經一人亭長鄉三老掌教化嗇夫職聽記收賦稅遊徼掌徼循禁賊盜以上官屬各縣皆有司𨽻校尉李仲雒陽人昭帝初辟兵昭帝時師古曰不知姓蓋寬饒魏郡人宣帝時諸葛豐琅邪人元帝時王尊髙陽人初元中轅豐建始間以長安令擢王章巨平人建始二年陳慶成帝時涓勳成帝時王駿臯虞人河平元年何武郫縣人成帝時解光哀帝時鮑宣渤海人綏和二年任司𨽻官始此方賞東海人建平元年胡軫京兆尹周苛髙帝元年杜恬髙帝五年董赤孝文十四年寧成南陽人建元元年卬建元元年石慶萬石君少子建元二年石偏建元三年充元光二年以上俱為內史無忌太初元年以下俱改京兆尹于已衍征和二年建後元元年韋璁武帝時雋不疑渤海人始元元年樊福始元六年嚴彭祖東海下邳人元鳯四年田成本始元年趙廣漢蠡吾人本始三年遺元康元年黃霸陽夏人元康三年張敞杜陵人神爵元年成甘露四年陳遂杜陵人𥘉元元年范代郡人初元二年成初元四年張談琅琊人永光四年王昌建昭五年宋平建始元年甄尊杜陵人建始二年王尊髙陽人建始四年宋登齊人河平二年王章巨平人河平四年逢信平陵人陽朔元年王吉成帝時王駿臯虞人陽朔四年鄧義河內人鴻嘉元年劉威鴻嘉二年翟方進上蔡人鴻嘉三年劉子泄永始二年何武郫縣人永始四年以司𨽻校尉任王建元延元年孫寶鄢陵人元延二年薛宣郯人綏和元年朱博杜陵人綏和二年邴漢琅邪人綏和二年王嘉綏和二年母將隆蘭陵人建平三年申屠博茂陵人建平四年薛修哀帝時翟萌南陽人元夀元年孫意清河人元夀三年金欽孝平元始元年鐘義元始四年武襄元始五年尹立元始六年陸恭吳縣人王柏髙陽人左馮翊朝錯潁川人景帝元年公孫𢎞災川薛人元光五年李沮雲中人元朔三年楊敞華隂人元狩元年兒寬干乘人元鼎四年咸宣元封元年以上俱為左內史殷周太初元年以下俱改左馮翊韓不害天漢四年賈勝胡昭帝元鳯元年田廣明元鳯三年武元平元年宋疇本始四年漢書黃霸傳作宋畸延本始四年官地節三年讓地節四年蕭望之杜陵人元康二年強神爵元年韓延夀杜陵人神爵三年信五鳯元年延夀五鳯二年以五原太守任充郎甘露二年常黃龍元年延孝元初元二年劉彭祖下邳人初元五年馮野王杜陵人永光二年郭延建昭二年畢衆孝成建始元年浩賞建始四年韓勳杜陵人河平元年武河平三年薛宣郯人陽朔元年趙增夀鴻嘉元年滿黔茂陵人鴻嘉二年朱博杜陵人永始二年龎真杜陵人永始三年徐讓元延元年遂義琅邪人綏和元年方賞東海人建平元年以司𨽻校尉任左咸琅邪人建平三年方賞元夀二年張嘉孝平元始元年匡咸元始三年孫信沛人元始四年郝黨南陽人元始五年右扶風鄭當時陳人武帝建元四年番係元光五年賁元朔四年汲黯濮陽人元朔五年義縱河東人元狩四年王鼂元狩六年蘇縱元鼎元年李信成元鼎四年王溫舒陽陵人元封四年以上俱為右內史咸宣太初元年以下俱改右扶風王欣濟南人征和四年以右輔都尉任周德元鳯六年朱山拊會稽人本始四年朱輔地節元年廣地節二年尹翁歸杜陵人元康元年陳萬年沛郡相人神爵元年武甘露四年鄭𢎞泰山剛人初元三年強永光二年溫順孝成建始元年讓建始二年王昌建始三年王賞河平二年以漢中太守任甄尊陽朔元年淳于信陽朔四年牛商鴻嘉三年彭宣陽夏人永始三年師臨潁川人永始四年蕭育元延三年范隆綏和二年馬嘉太山人綏和二年謝堯孝哀建平二年魏章東海人建平三年龔勝楚人建平四年𢎞談沛人元夀元年南夏常元夀二年畢由元夀三年趙恢元始元年以右輔都尉任武襄沛人元始二年謝堯元始四年鄧馮南陽人元始五年京輔都尉田叔井陘人武帝時趙廣漢蠡吾人王尊髙陽人建始徵為京輔都尉行京兆事甄豐蕭由杜陵人望之後何顯左輔都尉蕭由杜陵人權忠天水人右輔都尉王溫舒陽陵人元封六年以右輔都尉行中尉事王欣濟南人征和三年尹賞以長安令擢任趙恢孝平元始元年三輔繡衣使者江充邯鄲人武帝時漢中太守田叔井陘人髙帝時任十餘年張卬湯子武帝時吉恪手原人王賞平原人北地太守張延夀杜陵人宣帝時杜延年宣帝時谷永長安人元延四年上郡太守李廣隴西成紀人景帝時馮野王杜陵人元帝時馮立野王弟勉昻邸林扈育邸杜王黨以上京兆人西河太守馮立杜陵人常惠武帝時杜延年宣帝時五原太守督瓊杜陵人馮立杜陵人延夀五鳯時朔方太守蕭育杜陵人望之于成帝時翟方進汝南上蔡人成帝時平當平陵人哀帝時董援平陵人𢎞農都尉朱萌平帝時五原屬國都尉雷電輝渠侯征和三年馮立京兆杜陵人西河屬國都尉班稚長安人哀帝時安定屬國都尉劉歆向子哀帝時蓋思齊京兆人後漢太常卿一人中二千石光武都洛陽取十廟合於髙廟太常卿一人别治長安主知髙廟事髙廟令一人六百石掌案行掃除陵園令每陵園各一人六百石食官令每陵各一人六百石掌望晦時節祭祀令監丞一人三百石司𨽻校尉按世祖中興司𨽻巳移置洛陽而陜地三輔及華隂縣仍屬所部焉功曹從事主州選署及衆事别駕從事校尉行部則奉引録衆事簿曹從事主財穀簿事兵曹從事有軍事則置部郡國從事每郡國各一人主督促文書察舉非法以上皆百石主簿録閣下事省文書門亭長主州正門功曹書佐主選用孝經師主監試經月令師主時節祠祀律令師主平法律簿曹書佐主簿書都官書佐主一郡丈書典郡書佐每郡國各一人主一郡文書與都官書佐俱以郡吏補歲滿一更雍州刺史獻帝建安十八年復禹貢九州省司𨽻校尉以司𨽻部分屬豫冀雍三州省涼州刺史以其郡國并為雍州置刺史部郡二十二京兆馮翊扶風上郡北地武都及𢎞農之華隂上洛今屬陜西京兆尹長安令漢舊儀曰長安城方十三里經緯各長十五里城中皆屬長安令左馮翊關中記馮翊舊治長安城中光武東都復出治髙陵右扶風關中記扶風舊治長安城中光武東都後出治槐里按漢書百官志漢初都長安京兆尹左馮翊右扶風皆秩中二千石謂之三輔中興都雒陽更以河南郡為尹以三輔陵廟所在不改其號但減其秩唐類函云減其秩與太守同也至于丞令長之異制與否史無明文今不具録京兆虎牙都尉武帝元鼎四年置京輔都尉光武建武六年省安帝永初四年復置為京兆虎牙都尉治長安左輔都尉武帝元鼎四年置建武六年省右扶風都尉武帝元鼎四年置右輔都尉建武六年省安帝永初四年復置為右扶風都尉獻帝中平六年復省按漢書百官志武帝元鼎四年置三輔都尉各一人中興建武六年省安帝永初四年以羌犯法三輔有陵園之守乃復置右扶風都尉京兆虎牙都尉