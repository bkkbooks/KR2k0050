body:
  text: 陜西通志卷六十二人物八孝義周張仲吉甫之友其性孝友詩箋而按小雅皆周西都時所作六月一篇其末章云來歸自鎬飲御諸友侯誰在矣張仲孝友則仲必家於西周者也故取以冠孝義之首漢萬石君石奮其父趙人也髙祖召其姊為美人徙其家長安中奮孝文時官至大中大夫無文學恭謹舉無與比孝景即位徙奮為諸侯相奮長子建次甲次乙次慶皆以馴行孝謹官至二千石景帝號奮為萬石君萬石君歸老於家過宫闕必下車趨見路馬必軾焉子孫為小吏來歸謁萬石君必朝服見之不名子孫有過失不誚讓為便坐對案不食然後諸子相責因長老肉袒固謝罪改之乃許子孫勝冠者在側雖燕必冠上時賜食於家必稽首俯伏而食如在上前其執喪哀戚甚子孫遵教亦如之建元二年建為郎中令慶為內史建每五日洗沐歸謁親入子舍竊問侍者取親中裙厠牏身自浣灑復與侍者不敢令萬石君知之以為常建奏事於上前屏人乃言極切至廷見如不能言者上以是貌而禮之萬石君徙居陵里內史慶醉歸入外門不下車萬石君聞之不食慶恐肉袒請謝罪不許舉宗及兄建肉袒乃謝罷慶慶及諸子入里門趨至家萬石君卒建哭泣哀思嵗餘建亦死慶遷御史大夫元鼎元年以御史大夫慶為丞相慶深審謹無他大略後薨諡曰恬侯漢書本傳張歐字叔髙祖功臣安邱侯説少子也歐孝文時以刑名侍太子然其人長者景帝尊重常為九卿至元朔中代韓安國為御史大夫歐為吏未嘗言按人剸以誠長者處官官屬以為長者亦不敢欺上具獄事有可郤郤之不可者不得已為涕泣面而封之其愛人如此以上大夫祿歸老於家家陽陵子孫咸至大官漢書本傳趙都祋祤人為左馮翊馮野王部督郵掾池陽令並素行貪汙輕野王外戚年少治行不改都案驗得其主守盜十金罪收捕並不首吏都格殺並並家上書陳寃事下廷尉都詣吏自殺以明野王册府元龜云敞字幼孺平陵人也師事同縣吳章章治尚書為博士平帝年幼王莽秉政帝母及外家衛氏皆不得至京師莽長子宇非莽鬲絶衛氏恐帝長大後見怨與吳章謀夜以血塗莽第門若鬼神之戒冀以懼莽章欲因對其咎事發覺章坐腰斬磔尸陳市門初章為當世名儒教授弟子尤盛莽以為惡人黨皆當禁錮不得仕宦門人盡更名他師敞時為大司徒掾自劾吳章弟子收抱章尸歸棺斂葬之車騎將軍王舜髙其志節表奏為掾薦為中郎諫大夫莽篡位擢為魯郡大尹更始時安車徴敞為御史大夫免病去卒於家漢書本傳龍伯髙敦厚周慎口無擇言謙約節儉廉公有威馬援與兄子書伯髙名述京兆人為山都長由此擢零陵太守後漢書馬援傳宣秉字巨公馮翊雲陽人也少修髙節顯名三輔哀平際見王氏據權專政遂隱遁深山州郡連召常稱疾不仕及莽篡位遣使者徴之秉固稱疾病更始即位徴為侍中建武元年拜御史中丞明年遷司𨽻校尉務舉大綱簡略苛細秉性節約常服布被蔬食瓦器帝幸其府舍見而嘆曰楚國二龔不如雲陽宣巨公四年拜大司徒司直所得祿俸輒以收養親族其孤弱者分與田地自無擔石之儲六年卒於官除子彪為郎後漢書本傳王丹字仲回京兆下邽人哀平時仕州郡王莽時連徴不至家纍千金隱居養志好施周急每嵗農時輒載酒肴於田間候勤者而勞之其墮孏者恥不能致丹皆兼功自厲邑聚相率以致殷富其輕黠遊蕩者輒曉其父兄使黜責之沒者則賻給親自將護鄉鄰以為常行之十餘年風俗以篤丹資性方潔疾惡豪強時同郡陳遵大俠也欲結交於丹丹不許前將軍鄧禹西征關中軍糧乏丹率宗族上麥二千斛禹表丹領左馮翊稱疾不視事後徴為太子少傅客初有薦士於丹者因選舉之後所舉者陷罪丹坐免客慙懼自絶尋復徴為太子太傅乃呼客謂曰子之自絶何量丹之薄也不為設食以罰之相待如舊其後遜位卒於家後漢書本傳韋彪字孟逹平陵人彪孝行純至父母卒哀毁三年不出廬寢服竟羸瘠骨立異形醫療數年乃起好學洽聞建武末舉孝亷除郎中以病免肅宗即位徴為左中郎將長樂衛尉數陳政術歸於寬厚乞骸骨拜為奉車都尉建初七年車駕西巡以彪行太常從彪因建言今西巡宜追録髙祖中宗功臣紀其子孫帝納之還拜大鴻臚是時陳事者言州郡貢舉率非功次詔下公卿議彪曰國以簡賢為務賢以孝行為先求忠臣必於孝子之門士以才行為先不可純以閥閲彪因盛夏多寒上疏諫曰當暑而寒殆刑罰刻急所致天下樞要在尚書宜簡嘗歷州宰素有名者諌議之職應用公直之士書奏帝納之元和三年東巡以彪行司徒事從行還以病乞身永元元年卒彪清儉好施祿賜分與宗族家無餘財後漢書本傳馮豹字仲文衍子京兆杜陵人年十二其母為父所出後母惡之嘗因豹夜寐欲行毒害豹逃走得免敬事愈謹而母疾之益深時人稱其孝長好儒學以詩書春秋教驪山下鄉里為之語曰道德彬彬馮仲文舉孝廉拜尚書郎忠勤不懈每奏事未報嘗俯伏省閣從昏至明肅宗聞而嘉之使黃門持被覆豹敕令勿驚時方平西域以豹有才謀拜為河西副校尉和帝初數言邊事遷武威太守視事二年河西稱之復徴入為尚書永元十四年卒後漢書馮衍傳趙宣字子雅南鄭人出自寒微溫良博雅太守犍為楊文方深器異之遂察孝廉官至犍為太守漢中士女志張奮字稚通純子京兆杜陵人少而好學節儉行義常分捐租俸贍恤宗族雖至傾匱而施與不怠永元六年為司空時嵗災旱乃口陳時政之宜明日和帝録囚徒收洛陽令陳歆即大雨三日奮在位清白九年以病罷十三年更召拜太常上疏曰王者化定制禮功成作樂謹條禮樂異議三事願下有司考定帝善之其冬以病罷卒於家後漢書張純傳陳綱字仲卿成固人少與同郡張宗受學南陽以母喪歸宗為安衆劉元所殺綱免喪往復之值元醉卧還須醒乃殺之自拘有司會赦免三府並辟舉茂才拜𢎞農太守初至有兄弟相訟自責引退後無訟者在官九年卒天子痛惜賜家錢四十萬漢中士女志田輝字叔都兄字威都左馮翊人俱各純懿叔都最知名郡嘗欲察授之輝恥越賢兄遂託病瘖人數恐灼持之有度後在田舍友人張子平吉仲考等密共穿窬奪取衣衾窮夜獨處迫切至矣然無聲響徒喑喑而已子平因前抱持曰謂汝避兄耳何意真然耶相對歔欷哀動左右間積四嵗威都果舉遷安定長史還歷鄉里薦祀祖考叔都沃醊神坐俯仰因語是月司𨽻太尉大將軍同時並辟為侍御史舉茂才不幸早隕威都官至武都太守太尉掾風俗通蘇不韋字公先平陵人父謙初為郡督郵時魏郡李皓為美陽令與中常侍具瑗交通貪暴為民患前後監司莫敢糾問謙至郡案其臧論輸左校謙纍遷金城太守去郡歸鄉里漢法免罷守令非詔徴不得到京師後謙私至洛陽時皓為司𨽻收謙死獄中不韋時年十八載喪歸鄉里瘞而不葬藏母武都山中變名姓盡以家財募劍客邀皓於諸陵間不尅會皓遷大司農時右校芻廥在寺北垣下不韋與親從兄弟潛入廥中夜則鑿地晝則逃伏經月逹皓寢室值皓在厠因殺其妾及小兒留書而去不韋知皓有備乃飛馳魏郡掘其父阜冢斷取阜頭以祭父墳又標之於市曰李君遷父頭皓憤恚發病嘔血死不韋後遇赦還家乃始改葬行喪後漢書蘇章傳燕邠字元侯趙嵩字伯髙南鄭人陳調字元化仲卿孫也邠為刺史郤儉從事使在葭萌與從事董馥張引同行儉為黃巾所殺邠聞故哀慟説馥引赴難二子不可邠嘆曰使君已死用生何為獨死之牧劉焉嘉之為圖象學宫誅馥等嵩事太守蘇固固為米賊張修所殺嵩痛之仗劍直入修營殺十餘人幾獲修死陳調少尚遊俠聞固死聚賔客百餘人攻修大破之進攻修營乃與戰以傷死漢中士女志田真京兆人兄弟三人共議分財生資皆平均惟堂前一株紫荆樹共議欲破三片明日就截之其樹即枯死真往見之大驚謂諸弟曰樹本同株聞將分斫是以憔悴是人不如木也因悲不自勝不復解樹樹應聲榮茂兄弟相感合財寶遂為孝門真仕至大中大夫吳均續齊諧記續按田真舊志及續文獻皆作隋人今考梁吳均齊諧即載此事而晉陸機詩亦云三荆歡同株則真必漢魏間人以為隋者訛也魏鮑出字文才新豐人少遊俠興平中三輔亂出與老母兄弟五人家居留其母守舍相將行採蓬實為母作食噉人賊數十人掠其母以繩貫其手掌驅去出怒攘臂結袵追賊賊共布列待之出斫賊四五人賊走復合聚圍出出跳越圍斫之又殺十餘人賊連擊出不勝乃問出曰卿欲何得出責數賊指其母以示之賊解還出母比舍嫗遙望求哀出復斫賊賊謂出曰已還卿母何為不止出又指求哀嫗此我嫂也賊復解還之出得母還遂相扶持客南陽建安五年關中始平出北歸母不能步行以籠盛其母獨自負之到鄉里士大夫嘉其孝烈州郡辟召出出曰田民不堪冠帶青龍中母年百餘嵗乃終出時年七十餘行喪如禮魏略勇俠傳脂習字元升京兆人中平中除太醫令天子西遷及詣許昌習常隨從與少府孔融親善融被誅許中百官與融親善者莫敢收恤習獨往撫而哭之太祖欲理之以事直見原後見太祖陳謝太祖呼其字曰元升卿故慷慨至黃初詔欲用之以其年老賜拜中散大夫還家魏略純固傳晉劉殷字長盛新興人七嵗喪父哀毁過禮曾祖母王氏盛冬思堇殷哭禱澤中遂獲堇又嘗夢人告以西籬下有粟掘之得粟十五鍾銘曰七年粟百石以賜孝子劉殷弱冠博通經史性倜儻有濟世志齊王攸及羊祜皆辟之以供養無主辭不赴妻張氏亦婉順事王母盡孝王卒殷夫婦毁瘠幾至滅性齊王冏辟為大司馬軍咨祭酒轉拜新興太守甚有政能永嘉末沒於劉聰有七子五子各授一經一子授太史公一子授漢書北州之學殷門為盛以夀終晉書本傳南齊魯康祚扶風人有至性母患乳癰諸醫療不愈康祚乃跪兩手捧癰大悲泣母即覺小寬因此漸差人以其有冥應康祚位至屯騎校尉南史解叔謙傳梁韋正字敬直放弟京兆杜陵人起家南康王行參軍稍遷至中書侍郎出為襄陽太守初正與北海王僧孺友善及僧孺為吏部尚書郎參掌大選賔友故人莫不傾意正獨淡然及僧孺擯廢之後正復篤素分有踰曩日論者稱焉歷官至給事中黃門侍郎梁書韋睿傳韋愛字孝友睿族弟京兆杜陵人沉靜有器局少而偏孤事母以孝聞素性清介不妄交遊篤志好學每虛室獨坐遊心墳素而埃塵滿席寂若無人及長博學有文才尤善周易及春秋左氏袁顗為雍州刺史辟為主簿遭母憂廬於墓側負土起墳髙祖臨雍州聞之親往臨弔服闋引為中兵恭軍義師之起也以愛為壯武將軍時京邑未定雍州空虛魏興守顔僧都等據郡反愛沉敏有謀素為州里信服乃推心撫御曉示順逆兼率募鄉里得千餘人與僧都等戰大破之百姓乃安蕭頴胄之死也和帝徴兵襄陽愛從始興王憺赴焉先時巴東太守蕭璝巴西太守魯休烈舉兵來逼荆州愛以書諭之璝即日請降髙祖受禪進號輔國將軍尋除寧蜀太守西上襲劉季連行至公安道病卒贈衛尉卿子乾向官至鍾離汝隂二郡太守梁書韋睿傳吉翂字彥霄馮翊蓮勺人幼有孝性年十一遭母憂水漿不入口殆將滅性天監初父為原鄉令為姦吏所誣逮詣廷尉其父理雖清白恥為吏訊乃虛自引咎罪當大辟翂乃撾登聞鼓乞代父命廷尉蔡法度厲色問翂曰爾求代父死爾孺童志不及此必為人所教若有悔異亦相聽許翂曰囚雖蒙弱豈不知死可畏憚顧不忍見父極刑所以內斷胸臆委骨泉壤此非細故奈何受人教耶法度知翂不可屈撓乃更和顔誘之曰主上知尊侯無罪行當釋亮今若轉辭幸父子同濟翂對曰囚父必正刑書故思殞仆冀延父命瞑目引領以聽大戮翂初見囚獄掾備加桎梏法度矜之命脫其二械翂弗聽曰翂代父死死罪之囚唯宜增益豈可減乎竟不脫械法度具以奏聞髙祖乃宥其父丹陽尹王志欲於嵗首舉充純孝翂曰父辱子死斯道固然若翂當此舉則是因父買名亦何甚辱拒之而止年十七應辟為本州主簿出監萬年縣攝官期月風化大行後鄉人裴儉連名薦翂以為孝行純至明通易老敕付太常旌舉翂初因父成悸疾後因發而卒梁書本傳北魏韋俊字頴超範子京兆杜陵人早有學識少孤事祖母以至孝聞性溫和廉讓為州里所稱太和中襲爵歷位都水使者子子粲字暉茂齊王蕭寶夤引為主簿轉恭軍寶夤反子粲與弟子爽執志不從相率逃免雍州平賜爵長安子子粲兄弟十三人並有孝行居父喪毁瘠過禮負土成墳弟榮亮字子昱博學有文才德行仁孝為時所重歷諫議大夫衛大將軍子綱字世紀有操行才學開皇中位趙州刺史有子文宗文英並知名北史韋閬傳韋休之崇子杜陵人貞和自守未嘗言行忤物歷位給事中安西將軍光祿大夫子道逺中山太守道建東閣祭酒北史韋閬傳王訓辨祖馮翊蒲城人以行商致富魏世嘗出粟助給軍糧為假清河太守隋書王辨傳冦治字祖禮祖訓弟馮翊萬年縣人自洛陽令稍遷鎮逺將軍東荆州刺史兄弟並孝友敦睦白首同居父亡雖久而猶於生平所處堂宇備設幃帳几杖以時節開堂列拜垂淚陳薦若宗廟然吉凶之事必先啓告逺出行反亦如之世宗末遷前將軍河州刺史時蠻反於三鴉治為都督追討戰沒贈雍州刺史昌平男魏書冦讚傳楊元就仲宣子𢎞農華隂人幼而俊拔收捕時年甫九嵗牽挽兵人曰欲害諸尊乞先就死兵以創斫斷其臂猶請死不止遂先殺之永熙初贈汝隂太守北史楊椿傳北齊皇甫徽朝那人寓居漢中仕梁安定略陽二郡守隨其妻父夏侯道遷入魏道遷别上勳書欲以徽為元謀徽曰創謀之始本不關預雖貪榮賞內愧於心遂拒而不許梁州刺史羊靈祐重其敦實表為征虜府司馬卒北齊書本傳北周陸政性至孝其母吳人好食魚北土魚少政求之常苦難後宅側忽有泉出而有魚遂得供膳時人以為孝感所致因謂其泉為孝魚泉周書陸通傳郡按續文獻云陸政吳人祖載從宋武帝平關中遂居長安秦族洛川人祖白父雚並有至性聞於閭里族性至孝事親竭力為鄉里所稱父喪哀毁過禮每一痛哭酸感行路既以母在恆抑割哀情以慰母意四時珍羞未嘗匱乏與弟榮先復相友愛尋而其母又沒哭泣無時終喪之後猶蔬食不入房室二十餘年鄉里咸嘆異之其邑人王元達等上其狀有詔表其門閭榮先亦至孝遭母喪哀慕不已遂以毁卒邑里化其孝行世宗嘉之贈滄州刺史周書本傳隋于宣道字元明義子京兆髙陵人素性謹密不交非類以父功賜爵安成縣男髙祖為丞相引為外兵曹尋拜儀同及踐祚遷內史舍人進爵為子丁父憂水漿不入口者纍日獻皇后命中使敦諭嵗餘起令視事免喪後六嵗遷太子左衛副率進位上儀同卒年四十二隋書于義傳薛濬字道賾胄弟夏陽人少孤養母以孝聞好學有志行天和中為新豐令開皇中歷尚書虞部考功侍郎帝聞濬事母孝以其母老賜輿服几杖當世榮之後其母疾病濬貌甚憂瘁親故弗之識丁母艱歸葬夏陽時隆冬極寒濬衰絰徒跣冒犯霜雪自京及鄉五百餘里足凍墮指創血流漓朝野為之傷痛尋起令視事上見其毁瘠過甚為之改容濬竟不勝喪病卒文帝為之屑涕使齎册書弔祭濬性清儉死日家無遺財子乾福武安郡司倉書佐北史薛辨傳史永遵武功人與從父昆弟同居大業中賜物一百段米二百石表其門閭隋書煬帝紀唐宋興貴萬年人纍世同居躬耕致養至興貴已四從矣髙祖聞而嘉之武德二年詔表其門閭蠲免課役舊唐書本傳田伯明涇陽人少孤伯母劉撫育伯明恩義甚篤劉以夀終伯明廬於墓側負土成墳齋居菜食册府元龜王隴德馮翊人王藏仁蒼頭也藏仁父母先沒未合葬既而從役物故其妻孀居旁無親屬隴德迎致其尸并其父母而葬之因廬其墓次負土成墳每有白雉飛鳴墳上册府元龜王瞿曇鄭人事親以孝養聞葬祖父母及伯父皆負土成墳三年乃畢母終亦如之晝夜悲號頭髮盡落形體枯悴墓門三年不掩夜嘗寢於棺側服終之後仍不離墓焉册府元龜王燾圭孫郿人性至孝為徐州司馬母有疾數從髙醫遊遂窮其術因所學作書號外臺祕要討繹精明世寶焉厯給事中鄴郡太守治聞於時唐書王圭傳周智夀同官人其父永徽初被族人安吉所害智夀及弟智爽乃候安吉於途擊殺之兄弟相率歸罪於縣爭為首謀官司經數年不能決鄉人或證智爽先謀竟伏誅臨刑神色自若顧謂市人曰父讐已報死亦何恨智夀頓絶衢路流血遍體又收智爽尸舐取智爽血食之皆盡見者傷焉舊唐書本傳徐元慶下邽人父爽為縣尉趙師韞所殺元慶變姓名為驛家保久之師韞以御史舍亭下元慶手殺之自囚詣官唐書張琇傳元讓武功人擢明經以母病不肯調侍膳不出閭數十年母終廬墓次廢櫛沐飯菜飲水咸寧中表闕於門永淳初巡察使表讓孝悌卓越擢太子右內率府長史嵗滿還鄉里人有訟皆詣讓判中宗在東宫召拜司議郎入謁武后謂曰卿孝於家必能忠於國宜以治道輔吾子尋卒唐書本傳李逈秀字茂之大亮族孫涇陽人及進士第調相州恭軍轉員外郎纍遷鴻臚卿拜兵部尚書卒年五十贈侍中逈秀母少賤妻嘗詈婢母聞不樂逈秀即出其妻或問之答曰娶婦要欲事姑茍違顔色何可留武后嘗遣內人候其母或迎致宫中所居堂産芝草犬乳鄰貓中宗以為孝感旌大門閭唐書李大亮傳崔沔京兆長安人自博陵徙關中世為著姓沔醇謹口無二言事親至孝博學有文詞初應制舉對䇿髙第俄被落第者所援則天令重試沔所對䇿又工於前由是知名纍遷祠部員外郎當官正色未嘗撓沮睿宗時徴拜中書舍人時沔母老疾在東都沔固請間官以申侍養改虞部郎中開元七年為太子左庶子母卒哀毁逾禮常於廬前受弔謂人曰平生非至親者未嘗升堂入謁豈可以存亡變禮中書令張説數稱薦之服闋拜中書侍郎尋出為魏州刺史奏課第一徴還分掌吏部十銓事以清直歷祕書監太子賔客沔善禮經朝廷每疑議皆取決焉卒年六十七贈禮部尚書舊唐書本傳李孝孺安康人髙宗時封遂寧郡公辭歸養親明一統書第五峯琦子長安人以孝著旌表其門舊唐書第五琦傳馮猛將邠州新平縣人居喪以孝聞慶雲見桃杏冬結實詔有司旌表其門册府元龜賈會京兆華原人有髙節嘗稱疾不答辟署里中號一龍親亡負土成墓廬其左手蒔松時號關中曽子卒縣人私諡曰廣孝徴君唐書賈循傳張阿九京兆人母疾阿九割股肉饋之厥疾遂愈京兆府奉天縣人趙正言母病割股肉以餌母疾瘳賜物五十段以資孝養華原人韓難陀父亡廬於墓側凡十六年華隂人韓思訥六代同居詔特旌其門奉天縣百姓滑清泌父茂先疾亟清泌割右股肉方圎二寸與父食之病乃痊詔清泌宜與官以旌孝道册府元龜李貞古南鄭人肅宗寶應元年梁州刺史臧希讓上言貞古孝行彰聞請付所司旌表從之貞古六嵗而孤母欲改嫁貞古雨泣留之母遂守志母未食寢貞古不食寢及母亡負土成墳廬於墓側有猛虎馴於廬前白鼠見於墓門村人異之册府元龜郭曜子儀子華州人性沉靜姿貌瑰傑纍從節度府辟署至德初推子儀功授衛尉卿纍進太子詹事太原郡公子儀專征伐曜留治家事少長無間言諸弟或飾池館盛車服曜獨以簡朴自處子儀罷兵遷太子少保昆弟六人共制拜官子儀薨以遺命簿上四朝所賜名馬珍物德宗復賜之乃悉散諸弟居喪以禮疾甚或勸茹蔥薤終不屬口建中三年卒贈太子太傅諡曰孝唐書郭子儀傳董思寵櫟陽縣人大歷七年京兆府上言思寵五代同居子孫凡八十餘人友愛敦睦鄉里稱之天寶末冦盜剽掠村閭此家獨全年遭水旱此家獨免至於征稅每先於人伏望旌表門閭編諸史册許之册府元龜韋宏京兆人葬父母廬墓次廬前生芝草七十餘莖見者以為孝感詔免其課續文獻通考董龍盩厔人家貧與里人共祀社衆買牲牢龍撰文以祭祭畢分胙久之衆不平逐出龍龍造祀飯以祭祭畢泣於樹下將焚文有白鼠銜文入地穴掘之獲白金龍不自私率衆首官縣令賢之奏表其閭曰義夫續文獻通考杜式方字考元佑子京兆萬年人以蔭授揚州恭軍事再遷太常寺主簿考定音律髙郢稱之遷太僕卿子悰尚公主式方以右戚輒病不視事穆宗立授桂管觀察使弟從郁痼疾躬為營方藥羞膳及死期而泣世稱其篤行唐書杜佑傳梁悅富平人父為秦果所殺悅殺仇詣縣請罪詔以悅申寃請罪詣公門流循州唐書張琇傳郭儀鄠人割股醫母疾瘳邑大夫以聞其令尹令尹聞於上上俾聚土以旌其門時昌黎官京師曾為鄠人對無名氏郭儀墓辨趙隱字大隱奉天人父存約辟署興元李絳府值軍亂方與絳燕間吏報賊至絳麾存約使去對曰荷公厚誼不當獨免即部勒左右捍之而同被害隱以父死難與兄隲廬墓幾十年闔門誦書不應辟召親友敦勉令仕會昌中擢進士第歷州刺史咸通末進同中書門下平章事中書侍郎封天水縣伯性仁悌不敢以貴權自處始布衣時家無資與騭同耕以養雖姻宗之富未嘗干以仕宦寖顯還家易衣侍左右猶布衣也隲終宣歙觀察使既輔政他宰相及百官皆詣第升堂慶母嵗時公卿必參訊懿宗誕日宴慈恩寺隱侍母以安輿臨觀宰相方率百官拜恩於廷即回班候夫人起居搢紳以為榮僖宗初罷為鎮海軍節度使王郢之亂坐撫御失宜下除太常卿廣明初為吏部尚書居母喪卒子光逢光裔光引皆第進士厯臺省華劇光逢尤規矱自持以中書舍人為翰林學士時光裔由膳部郎中知制誥對掌內外命書士歆羡之唐書本傳康買得京兆人年十四父憲責錢於雲陽張蒞蒞醉拉憲危死買得以蒞趫悍度救不足解則舉鍤擊其首三日蒞死刑部侍郎孫革言買得救父難不為暴度不解而擊不為凶宜賜矜宥有詔減死唐書張琇傳爾朱逵郃陽人官至御史因母居荆楚弗克迎飬兄弟八人更迭定省人以孝稱賈志吳仲孺商州人父病侍湯藥夜不解衣後遭父喪朝廷纍起不就後官至中丞賈志宋甄婆兒鄠縣民母劉與同里人董知政忿競知政擊殺劉氏婆兒始十嵗妹方襁褓託鄰人張氏乳養婆兒避仇徙居郝村後數年稍長大念母為知政所殺又念其妹寄張氏與兄課兒同詣張氏求見妹張氏拒之不得見婆兒憤怒悲泣謂兄曰我母為仇人所殺妹留寄他姓大仇不報何用生為時方寒食具酒肴詣母墳痛哭歸取條桑斧置袖中往見知政知政方與小兒戲婆兒出其後以斧斫其腦殺之有司以其事上請太宗嘉其能復母讐特貸焉宋史李璘傳惠從順京兆人十世同居詔旌表門閭宋史許祚傳李仲容字儀父濤孫萬年人舉進士甲科除大理評事擢御史纍遷户部侍郎仲容性醇易喜飲酒不與物忤與人言未嘗及勢利三弟早卒字其諸孤十餘人如已子當世稱其長者宋史李濤傳吕君華隂人舉進士聘里中女行既中第婦家言曰吾女故無疾既聘而後盲敢辭吕君曰既聘而後盲君不為欺又何辭遂娶之生五男皆中進士其一人丞相汲公是也李元綱厚德録楊榮麟州人七世同居咸平時旌表仍蠲課調續文獻通考元守全京兆人五世同居請加旌表詔從之宋史裘承詢傳李永洋州民負土成母墳芝生墳上宋史五行志劉靖同州郃陽縣人兄弟同居宅邊榆樹上生桑西廊梧桐上生榖枝明年墳中白楊生檜並鬱茂鄉人號榆為義祖桐為小義楊為義孫縣令出官錢為修三異亭清異録侯可字無可華隂人篤志為學隨計入京里中醵金贐行比還悉散其餘與同舉者曰此金鄉里所資以應詔者也不可以為他利且行聞鄉人病念曰吾歸則彼死矣遂留不去病者愈輟已馬載之徒步而歸孫沔征㺜猺請恭軍事奏功得官知化城縣巴俗尚鬼而廢醫娶婦必擇財可為約束立制違者有罪幾變其習再調華原主簿富人有不占田籍而質人田劵至萬畝嵗責其租可晨馳至富家發櫝出劵歸其主簽書儀州判官西夏寇邊使者使可按視即以數十騎涉夏境猝與之遇亟分其騎為三四令之曰建爾旗幟旋出徐行夏人以為誘騎不敢擊韓琦鎮長安薦知涇陽縣説渭源羌酋輸地八千頃因城熟羊以撫之琦上其功又議復鄭白渠得召對以微罪罷官至殿中丞卒於家年七十二可輕財樂義急人之急憂人之憂與田顔為友顔病千里求醫未歸而顔死不瞑目可至拊之乃瞑顔無子不克葬可辛勤鬻衣卒葬之方天寒單衣以居有饋白金者顧顔之妹處室舉以佐其奩具一日自逺歸家以窶告適友人郭行扣門曰吾父病醫邀錢百千賣吾廬而不售可惻然計槖中裝略當其數盡與之關中稱其賢宋史本傳張伯威大安軍人紹熙元年舉武進士調神泉尉太母黃年九十八不忍之官黃得血痢瀕殆伯威剔左臂肉食之遂愈繼母楊因姑病篤驚而成疾伯威復剔臂肉作粥以進其疾亦愈知大安軍羅植即伯威所居立純孝坊事聞詔伯威與升擢宋史本傳師安字子仁清澗人篤信孝友家富好施幼失怙恃事外祖母三十年生養死葬備盡其禮常刻家訓於石曰無犯非禮無妄語言勤儉率物為先卒贈忠訓郎改昭毅郎賈志張評事涇陽人五世同居男女百口緦服同㸑宋金兩朝敕命築義門臺旌表宅里續文獻通考元賀仁傑字寬甫鄠人父賁數從軍有功關中兵後積尸滿野賁買地金天門外為大塜葬之後歷官總管京兆諸軍卒仁傑從世祖南征雲南北征乃顔皆著勞績居中事上知無不言言無不聽多所禆益而言不外泄帝愛重之帝欲選童女充後宫及有司買物多非土産山後鹽禁為民害皆奏罷之特授上都留守加中書右丞其妻劉歿帝欲為娶貴族固辭乃娶民間女已而喪明夫妻相敬如友未嘗置媵妾大德九年請老卒諡忠貞元史本傳李邦瑞字昌國臨潼人幼嗜學讀書通大義木華黎下諸城堡率衆來歸受旨使宋宋遣賤者來迎邦瑞叱出之宋改命行人乃如約而還太宗慰勞賜車騎因奏兵戈之際宗族離散乞歸尋訪帝諭馳驛南京尋訪親戚或以𨽻諸部者悉歸之後從諸王濶出經略河南凡所歷州郡四十城繪圖以進授金符宣差軍儲使卒元史本傳蕭道夀興平人家貧鬻針以自給母年八十餘道夀事養盡禮每旦候母起親侍盥櫛日三飯必待母食然後退就食至夕必待母寢然後退就寢出外必以告母許乃敢出母或怒欲罰之道夀自進杖伏地以受杖足母命起乃起起復再拜謝違教拱立左右俟色喜乃退母嘗有疾醫纍嵗不能療道夀刲股肉啖之而愈至元八年賜羊酒表其閭元史本傳張閏延長縣人八世不異㸑家人百餘口無間言日使諸女諸婦各聚一室為女紅工畢斂貯一庫室無私藏幼稚啼泣諸母見者即抱哺一婦歸寧留其子衆婦共乳不問孰為已兒兒亦不知孰為已母也閏兄顯卒即以家事付姪聚聚辭曰叔父行也叔宜主之閏曰姪宗子也姪宜主之相讓既久卒以付聚至元二十八年旌表其門元史本傳王思聰安塞人素力田農隙則教諸生得束修以養親母喪盡哀父繼娶楊氏事之如所生以家多幼稚侵父食别築室曰養老堂奉之朝夕定省父嘗病劇思聰憂甚拜祈於天額膝皆成瘡得神泉飲之愈後復失明思聰舐之即能視縣上其狀命表異之元史本傳劉德奉元人父娶後妻何氏德事之如所生家貧傭工取直寸錢尺帛皆上之四弟並何出德撫愛尤篤年五十未娶稱貸為弟求婦諸弟化其德一門藹然鄉里稱為劉佛子元史郭全傳楊皥扶風人父清母牛氏牛氏病皥叩天求代遂痊如是者再後牛氏失明皥登太白山取神泉洗之復如故牛氏歿哀毁特甚葬之日大雨獨皥墓前後數里密雲蔽之雨不沾土葬畢令妻衛氏養清皥獨廬墓上負土為墳清卒亦如之元史本傳李子敬陜西三原人嫁不能嫁者五十餘人葬不能葬者五十餘喪焚逋劵四萬餘貫有司以名聞旌之元史孫秀實傳趙榮扶風人母強氏有疾割股肉啖之者三復負母登太白山禱於神得聖水飲之乃痊後年七十五卒榮號痛不食三日方飲水七日乃食粥葬之日白雲庇其墓前後十五里葬畢而散榮負土成墳廬其側終喪元史本傳吳好直蒲城人父歿事繼母孝兄弟求分財好直勸諭不能止即以已所當得悉推與之淡泊三十年無悔詔旌表續文獻通考甄城柴郁陳舜咨俱蒲城人皆能孝友以已財分讓兄弟縣令言狀均蒙旌表續文獻通考吳份髙陵人嘗畜牛每耕田不煩人策人策之輒觸人死子弟欲鬻之份曰是嫁毒也他日份出子弟鬻之份追客以牛性語客客遂還牛取直而去份又善折鬬訟不煩辭而人服有訟不之官而解官聞之朝乃旌其廬曰耆德吳份門續文獻通考王忠三原長孫里人能盡孝道值母有疾欲為之娶忠曰吾母疾安忍為此後母卒廬墓日夜哀號疏食飲水人所不堪有司奏旌其門續文獻通考王顯政蒲城人五世同居天厯中旌其門元史文宋本紀王理蒲城人七世同居延祐天厯中表其門續文獻通考張思孝華州人母喪以孝聞父疾調護甚至不愈以父涕洟半器垂泣盡飲之復潔齋致禱乞以身代未幾遂痊至順三年表其門元史本傳王士宏中部人父摶有疾士宏傾家資求醫見醫即拜遍禱諸神扣額成瘡父歿哀毁盡禮廬墓三年墓廬上有竒鵲來巢飛鳥翔集終喪復建祠於塋前朔望必往奠祭雖風雨不廢也有司上其事旌表之元史本傳何從義洛川人祖良祖母李氏偕亡從義廬於墓側旦夕哀慕不脫絰帶不食菜果唯啖疏食而已事父世榮母王氏孝養尤至伯祖溫伯祖母郝氏叔祖恭叔祖母賀氏叔祖讓叔祖母薑氏叔父珍叔母光氏皆無子比其亡也從義咸為治葬築髙墳祭奠以禮時人義之元史本傳王克已中部人父伯通歿克已廬於墓側貊髙縱兵暴掠縣民皆逃竄克已獨守墓不去家人呼之避兵克已曰吾誓守墓三年以報吾親雖死不可棄也俄兵至見其身衣裳衰絰形容憔悴曰此孝子也遂不忍害竟終喪而歸元史本傳劉思敬宜君人事其繼母沙氏杜氏無異親母父年八十兩目俱喪明會亂兵剽掠其鄉思敬負父避於岩穴中有兵至欲殺思敬思敬泣言曰我父老矣又無目我死不足惜使我父何依乎兵憐其孝不忍殺父子皆免於難元史本傳員從政葭州人纍世同居續文獻通考劉欽字仲賢醴泉人元末兵至九嵕山欽負母而逃攜子與姪度難兩全以姪為母所鍾愛謂其妻曰父母愛則愛之敢以恩奪孝為不道之人哉投子於涇水襁母擕姪而行卒脫兵患孝義聞於郡國賈志趙璋奉天人任安善屯丞辭職歸養素性孝友禮士周窮尤篤信義子質纍官宜川白水商州龍沙宣慰使嘗遇母忌日泣曰人子於親與其祭之厚孰若養之周賈志明黨榮富平諸生父冕官主事得罪戍雲南榮上疏願以身代上悅曰君親人道大倫忠孝臣子大節榮能篤大倫全大節其令應天府速給冕引還鄉並除戍賈志王忠同官人七嵗喪父事母以孝聞洪武三年詔旌其門馮志陳七兒延安人逺戍邊思母日夜號泣若風癲匝地環繞不能立腳晚見關帝跪求令騎馬尾不移時至家驚卧方蘇與母會未幾母卒終喪廬墓三年永樂十年敕立石坊旌表延安府志梁鏆字貫之鳯翔人大父凖永樂時任石州學正聞母張氏訃音即日徒跣抵家營葬結廬塋域朝夕哭奠時禮科給事中胡濙奉使抵鳯聞其事造塋慰問比還奏於朝詔授湖廣均州知州制終赴均半載以疾卒子信治家孝且嚴信子鏆以母趙遘病親嘗湯藥侍不離席及卒勺飲不入纍日葬時於墓所築垣廬居其中穴一隙以通薪水號泣如初喪服闋而考終於西河乃出廬迎歸葬後復居冢上前後積六載邑人咸重之稱曰梁孝子牛澤撰梁氏世孝紀王永綏德人都指揮僉事母喪三年不入內宣德五年旌表馬志秦福郃陽人正統六年出粟千石助賑寧夏敕書建坊褒之宰莘退食録員宗義咸陽人慷慨有志節事繼母以孝聞敦族睦鄰輕財尚義正統間飢宗義賑救活幾萬人西安府志張興咸陽人景泰五年值凶荒興施財賑窮煮粥濟飢活人不可勝數後嵗豐有來報者興竟不任馬志馬仲良三原人仁讓謹飭口不言人過失處鄉里犯而不校嘗有野鴿羣集所居廬若忘機者將卒出書一編皆篤厚親戚鄰里之説韓苑洛撰墓表陳於殿字伯重潼關人父殁廬墓一年值母哭夫喪明於殿即歸侍奉湯藥晝夜禱籲極其精誠夜夢神人語曰爾母目復明矣及旦視之果然洎母歿復廬墓李完涇陽人母病矇完時舐母目尋復如故南續芳渭南人母失明續芳求醫禱神心力並瘁未幾母目復明賈志黨汝孝漢隂人同父進朝早出刈麥父為虎噬汝孝奮力追之奪父虎口虎蹲視林中有復噬勢汝孝愈奮以石擊之負父歸治噬瘡閲三月無恙漢隂志朱敬醴泉人母歿廬墓羣盜至不忍加害遺以米敬不受強留之後又至敬以所遺米作食食盜乘間勸諭羣盜同聲悔過後果改行盧春渭南人母歿廬墓三年拜泣無間寒暑有盜來劫春曰我守墓者盜曰此盧孝子也遂去劉霞長武生員親喪廬墓賊至欲殺之後詢為劉孝子賊亦感動捨去賈志李茂澄城人母患惡瘡茂口吮膿血及歿廬墓時暴雨如注茂懼水嚙墓伏墓而哭焂然雨止父歿亦然天順六年旌表茂二子表森表子俊皆以廬墓旌表賈志李清長安人字元潔甫十九父歿水漿不入口者數日哀毁踰禮不食肉不內處纍年母病湯藥親嘗不離左右及卒哀毁幾滅性西安府志劉勤字警常髙陵人居喪哀毁骨立杖而後起與弟勉璉友愛甚篤璉字宗器成化末飢獨販米漢中以養二兄早孤孝思至老弗替鄉里稱服馬志劉時蓀髙陵人事母至孝凡飲食衣服皆親試然後奉母諸弟有不恭者不形諸言恐傷母心母歿哀毁骨立人不忍見賈志張鋭髙陵人事親及二兄孝友成化末年大飢鋭千里負米奉養與族人祀先祖祭畢必男女分席會飲以施勸戒賈志趙謐字子安家世涇陽正統甲子鄉舉第一景泰辛未進士授主事升員外郎以輿論遂有江西亞恭之擢至即飛章劾少司徒及中貴人專恣不少徇性甚孝母歿號痛幾絶廬墓側淡食草寢者八載旦夕哭奠如初常有慈烏飛繞其旁不去兄弟以父母俱棄圖分異謐泣止之不能則盡讓以資産已無分毫取尤急濟人嵗飢鄉多婚葬失時者謐竭力資之成化六年卒張有禎趙恭議墓銘謐兄子穟以吏任驛丞亦以廬墓獲旌馬志張昶三原人事親色養兼備初策鹽河東以父疾棄商攻醫飲食必手治父所欲食必多方辦之冬月得雙鯉若神惠者父病篤嘗糞以卜吉凶籲天願代父張目曰冥司不索我矣因汝孝延夀一紀後果然馬理私諡曰孝莊先生三原志孫逢吉三原人慷慨好施率家人收穫見婦女拾遺穗者心傷之即出已麥數石分給里中有稱貸者輒如數與之不索劵時有詩云施金不計王孫報應笑田文三窟謀人皆號為義士艾陵遺稿張善治三原人舉人從父張三極廬祖墓三年時人稱孝子順孫仕南康知府清忠多善政賈志杜鶴齡三原人母病甫五嵗每夜籲天願代母尋愈父病不解帶者四年夢神授以方內載海風藤詢醫人皆不省後得其藥於京邸人咸以為孝感學者私諡曰孝宏先生三原志李端宜川人父疾割股以進及卒事母羅氏愈謹母歿廬於墓側負土築壠地髙燥乏水端仰天哀籲忽泉湧於廬左成化二十一年旌表郭斆鄜州人父喪同母廬於墓側躬自炊㸑以事母下山汲水甚艱一日墓前忽湧清泉人以為孝感張泉雒南人張繼志藍田人廬墓時皆有清泉湧出賈志陳倫岐山人年十七父官潁上適疾倫往省侍湯藥禱天願以身代及卒扶柩歸途三千里足指破爛未嘗一乘騎俸資盡以與兄苦學不怠登成化乙未進士厯官長蘆運使致政歸衣食不繼岐山志馬驥漢中人為府吏時巨冦藍鄢嘯聚鹽場勢甚猖獗莫敢攖者驥奮然效勇捧檄深入賊營宣諭利害招出賊首牛長子等一十八名殱厥渠魁地方遂寧紀功咨用驥終不仕賈志熊玻涇陽增廣生年十九母病寢食俱廢湯藥身嘗母歿玻慟哭不忍遽葬浮柩於庭坐卧草土三月及葬構廬墓傍朝夕哭奠服闋歸極力養父父病至歿並如前孝負土增塋倍髙疇曩朝夕溢米形容稿敗有數劫賊入廬欲生焚之玻出迎不懼賊因問玻聞爾産殊厚何悴乃爾玻曰日夕思慕不覺其他廬無長物僅有麻衣暫解送君賊驚歎辭謝去𢎞治中旌表名山藏褚字宣玉涇陽人祖孟升生圭圭嘗為鄉貢士有孝行父殁廬墓三年配潘氏生宣玉宣玉性仁孝於蟲豸有不得所者必加憫焉母疾宣玉求名醫診療弗愈乃取其糞嘗之語內曰吾母糞苦其得生矣後果愈比歿哀毁逾禮既葬廬墓除服日有羣鶴飛集屋上由是逺邇稱為褚孝子孝子毅然以文章為已任正德庚午試於憲學冠多士是年秋登鄉舉年四十九而卒馬溪田褚孝子墓志銘鏞從弟雲字民望母病日侍左右既卒終日兒啼廬於墓側朝夕哀奠鄉人嘗遺以雞卵雲置之他所忽有牝雞來伏之成雛數十環鳴墓側人以為異有司以聞表其閭賈志黨淵同州人家貧善事親父歿飲水飯糲至終喪母素事績紡淵恐其勞匿紡具慰止母終持喪哀苦每晨必爇香泣墓下同郡王尊事母以孝聞母歿貧不克斂鬻子市棺以葬坰州志蔚能陜西朝邑人起吏由光祿寺典簿纍寺卿進禮部右侍郎在光祿三十餘年未嘗持一禁臠歸家嘗偕僚屬聨名疏請查入內供應器皿下禁獄問所由能奮曰上怒不可測能老矣不以纍諸公也獨受責降官未嘗有後言續藏書雷振關華隂人父遘疾勺水不入口者五日刲臂肉大如錢者三烹藥進之明日病良已強飯徐步優遊里閈者一年而卒振關廬於墓側老屋三間上漏下穿天寒月黑悲風蕭颯振關拊膺夜哭與嘷狐啼猿相應和鄉老白其事所司咸異之華隂志文錦三水人夫婦持耒耕於東山積粟萬斛五子各二千石遇荒盡施有司上其事賜夀官五世孫竤中幼有夙慧讀書一覽不遺以恩例入太學性仁孝每食不離親側寢不離親居父卒水米不入口者五日廬墓六年有白兔出隧之異邑人舉之御史疏旌縣官嵗給榖布三水志顔彩長安庠生父疾籲天願代及父歿寢苫枕塊水漿不入口者三日葬時廬墓三載所掘墳地得白金三鎰後合母遷葬其金盡用人謂孝感所致當道屢加旌表賈志李壯丁兒延安安定人兵大至壯丁兒從父母奔避山谷卒與遇兵兵母去壯丁兒取石擊兵母得脫前行復遇五騎一騎下馬還縳母其母呼曰壯丁兒但逃命勿顧我壯丁兒不忍手提鐵骨朵擊仆一虜母逃得生四騎圍壯丁兒斫碎之名山藏張友直宜川人正德時父武死武定難友直哀痛遂自殺賈志楊楠岐山人舉人任知縣生而重厚醇雅比長讀書究極性命動以古人自期待父兄早喪事孀母寡嫂曲盡孝敬尹霍山竟以母老乞歸母年九十病卒楠跣號惻怛勺水不入口者三日月餘竟殂鄉人稱孝鳯翔府志李珍榆林衛指揮歷官恭將總督曾銑議復河套咸寧侯仇鸞搆之棄市更誣銑子淳侵官銀械珍至京師證之珍身受五毒辭終不撓幽閉中每曰寧我死無絶曾氏後自誣銀一千兩繫獄淳得末減長流三千里鸞敗淳得於流所放歸聞者義之延綏鎮志張之渠字儀正華州人壬午中式癸未卒業太學以思親歸省至真定夢老父謂曰汝母疾汝宜亟行覺而大懼兼程至家母果病延醫問藥夙夜衣不緩帶母卒哀毁踰禮既殯廬居墓次雪夜伏墓哭曰吾母素畏寒吾母寒矣聞者悲之墓岡下忽有泉湧出清冽異常里中一少年素逆於父母一旦市肉以進其父異之曰吾見張孝子矣彼為死者猶哭我親生敢不孝耶里人以是化焉竟以墓次風寒遘疾卒康對山撰行狀車宗湯郃陽人字自新母病癱宗湯負之起居三十年如一日宰莘退食録唐好古渭南人父癱侍湯藥不離寢席者六年賈志張士榮字仁亨朝邑人母韓氏苑洛子女也幼以孫育於韓有至性苑洛撫晉陽歸忽感疾坐中堂命士榮召汝祖母語士榮初不知對曰祖入耳祖母固不出也苑洛氣不屬曰我病士榮驚仆地口鼻盡血即匍匐行告祖母其祖母陡視士榮狀又聞苑洛病狀亦驚仆士榮出視祖入視祖母奔走號呼淚血滿膺食頃苑洛病蘇士榮曰果愈耶抑安我耶聞苑洛呼曰粥來乃大喜既冠補弟子員仍侍苑洛宦京邸嵗丙午祖母病士榮晝夜侍湯藥命歸應秋試不行苑洛怒治裝嚴遣之士榮跽請曰祖母病而欲從事功名可乎因伏地哭苑洛亦泣聽之及病亟士榮割股肉進又嘗糞甜苦以驗瘥否卒不起士榮扶柩抵家登涉三千里暮露宿柩旁既葬考古禮行義服三年士榮歷覽羣書尤精書易凡律厯度數樂器龜卜方藥之屬悉出苑洛指授年二十有八卒何景明敦倫編韓洲長安人嘉靖間大祲賑粟百石嘗晨出見一人遺金號泣欲死洲即如數豫之子灼字以光洲患病灼割臂取血和藥以進疾旋瘳後灼賈兩淮妻許氏事翁姑亦曲盡誠孝灼子在居母喪廬墓三年事兄尤曲盡友敬以恩選入史館文詞雅贍為當時所重賈志王之垣字伯鎮其先臨潼人避亂涇陽幼而通敏父捐館舍年方十嵗袒而號有孝童之目十四推擇為弟子員教授里中得糈養母豐甘中程母卧病跬步不離母訶之出則潛避戶外聲氣俱屏俟熟睡方去病劇嘗惡驗甘苦露禱中庭請減年以益母算歿則哀毁骨立葬畢廬於墓左后土祠偃息攀號棗樹悴而復榮三年廬墓如故萬厯元年貢於鄉陳眉公撰傳馬珵字允莊涇陽人貢入太學一夕夢母病覺心惕明日即馳歸見母果病遂養母不仕郊行得遺金坐以待頃一人號泣至為言賣女得此養老母即與之後復周以粟父卒哀毁骨立喪葬以禮服除授蘇州吳江縣丞賈志趙宏祚三原人年三嵗孤母李氏誓志撫之邑多伏莽值嵗飢竊發宏祚方五六嵗隨母避匿道遇冦欲劫其母宏祚號泣跪拜賊不可宏祚引頸披胸乞賊手中刀欲自殺以釋其母賊義之舍去稍長不樂讀書母督之泣曰家貧無以養母願為賈母聽之賈則善賈既而有贏資走江淮間未一年欲馳歸同賈者怪之曰夜夢阿母呼我而號是必苦憶我我心怦怦矣即歸見母母泣撫曰人傳汝溺於水余痛而呼幾不生矣汝今固無恙耶宏祚大痛曰奈何以財故纍阿母自是誓不離膝下諸若飲食衣服晨昏起居率先意而辦蓋終其身孺慕不改云何景明敦倫編劉鳯岐岐山人嘉靖中任巡檢父母俱早亡祖母李氏育之成立鳯岐事李曲盡孝道李卒負土築墳風雨猛獸弗避廬於墓側一日夢李運水來家次日比鄰失火至岐舍反風火息人以為孝感鳯翔府志原寀字次寮蒲城人嘉靖己丑進士官行人值父母相繼殞訃聞即日就道抵家伏柩水榖不入口者數日葬訖築室墓旁朝夕哭奠纍官户部員外郎與富平楊忠介爵為莫逆交寀姪古為沁水知縣天性敦厚素以孝稱賈志雷太初蒲城人幼醇謹慎取與畏法義一日昧爽偕同里數人適野途中有偶坐者見其來走遺金一袋衆競分之太初獨不取曰非分之物得之不祥越月監司獲盜諸分金者皆為盜指誣被劫家又皆識為其家金竟無以白斃於獄正德中縣令劉大謨以太初負鄉望辟為鄉飲賔不就親詣其家卒不赴劉甚髙之年九十四卒何景明敦倫編忽麒朝邑人孝親廬墓奉旨旌表萬姓統譜馬士碩扶風人事繼母如生母母病夫婦侍湯藥經年衣不解帶其母難曰雖豫親子不如母年九十餘士碩亦七十餘色養愈隆孺慕不已閭里合詞請表鳯翔府志黨中疇字易甫城固人萬厯庚戍進士初任交河知縣詢民利苦力為興除障黃河得淤地甚廣人咸頌之尋考選假歸值嵗飢中疇立厰煮粥活人萬計日在粥厰遂中疫死城固人為建碑紀德共以未竟其用惜之賈志徐以忠洋縣庠生母王早逝以忠哀痛不衰事繼母席恭謹如母兄乾亨吏肅州坐罪其父洋隨居病故以忠隻身徑往計程四千餘里不避艱險赴肅控巡按乞免兄罪當事者憐其至性給牛車俾扶柩還葬隆慶間旌表漢中府志段朝綱洋縣人生甫五日喪父稍長痛父早亡事母張孝家貧傭身以供菽水母病鬻敝衣為醫藥費及歿號呼甚悲隆慶間旌表漢中府志段廷貞澄城人嘉靖萬歷間每遇凶荒即出粟賑之孫邦進性至孝幼失怙恃事祖必體其心輕財好施尤有祖風賈志馬誠長安人官指揮僉事少孤事母無違母歿蔬食飲水泣血枕塊者三年及葬廬墓又三年里人無不感悼馮恭定贈以孝弟説賈志樊天敘字敦夫西安諸生萬厯戊寅貢天性孝義母病篤忽思爐餅苦厨無具者求諸里舍及歸母逝矣遂悲悼終身不食爐餅廬墓數載人多不知年方強仕內子見背終身不再娶讀書蕭寺昕夕必整衣冠一言一動無不斤斤繩尺自少至老無少踰越卒年六十有八馮恭定樊貢士傳朱藴竒字子節西安右衛人家貧甚僦屋而居妻子織網巾為生讀書古東嶽廟並日而食一日其子因差徭下獄會天雨四日不食氣息奄奄盡矣時嶽廟有大戶收糧者黃冠憐之因取其米為粥以食藴竒心知其故以為此官米何可竊也竟不食同舍生服其節操因出其食食之藴奇曰此可食也劉孝廉必逵聞而義之白衛官始出其子於獄嘗之市途有遺網巾二其子拾之藴奇曰彼之失猶我之失也即命其子追而還之父早喪養母盡孝母歿毁幾滅性生平苦節篤行一步不茍歿之日貧無以為葬聞義而賻者數百人馮恭定朱貧士傳許汝清咸陽人父疾籲天願代父愈汝清竟嘔血死賈志王應臻鄠縣人家貧貿布養親嵗荒養不繼􅏰然剪髮造其鄰易粟食親臻與妻啖粳里人感其孝稍周之得脫於厄仇同張彥山俱富平人賣菜養親嘗以餅魚悅親口而與妻同甘糟粳賈志李忍富平人家貧能孝偶獄訟當對縣役羅武朱素豪橫求忍不即得遂繫忍母以行仍繩穿裳中辱之忍憤然曰安有辱母若此尚可共戴天耶捶朱立死自詣縣請罪縣官置以法直指重其行改戍之富平志王一正三原人萬歷十四年出粟賑飢撫按上其事敕賜義士坊以旌之敦倫編仇養蒙富平人萬厯間遇荒負米養親與妻趙氏共糟粳母病痢躬侍湯藥衣不解帶父病足癰輒吮膿血親歿負土築墳廬墓六年葷酒不茹年既八十詣親墓灑泣若孺子然崇禎三年旌表子桂芳字月賔事母至孝母病籲天求代病革或云嘗糞可知安危遂嘗之以告醫者知不可救一痛幾絶既殮乃於母卧處舐其涕唾痰涎而哭之任洧川令見人有哭母者益傷其母之不逮養也父子俱以孝稱賈志袁光閈字德徴渭南諸生素以廉孝聞萬厯間大飢邑令憐其貧豫之粟不受強之始受即呼鄰里極貧者盡賙之無何遭母喪悲號過慟卒於柩側渭南志劉俊保安人父母逝泣血三年不飲酒茹葷不窺家園及葬以襟包土築塋丘壠髙聳隱若山阜萬厯中旌表延安府志焦復榮宜川人事親至孝萬厯間旌表李藎延長庠生崇禎末大冦入城藎逃至焦孝子塋前泣曰彼人子也我亦人子也母病不能動何偷生為遂自縊塋樹而死延安府志王一清延川庠生早喪母哭泣如成人事繼母與生母等其妻劉亦孝姑病傾奩購藥不解衣者旬日時督學校士諭諸生卷面各書某生德行實迹闔庠咸注一清孝行無異延安府志武全鳯翔人以嵗貢任荆門同知事後母得其歡心兄弟中有拂母意者即跪謝牖下逹旦母悅始罷弟兄皆孝讓相成無間言賈志張維􅔛縣庠生天性孝友父喪哀毁水漿不入口親朋以母在苦勸維伏地痛哭終喪焉友於諸弟一錢不私人稱其難郿縣志方世恩寶雞人母董氏多病迎醫侍養不遺餘力母喪三日不食三年不爐不扇寶雞志董舜鳯隴州人割股療親終身廬墓同郡吳顯春親歿負土築墳四遇虎而志不變隴州志彭應麟西鄉庠生家貧竭力事親父病與妻同伺左右衣不解帶父歿鬻産營葬事繼母周如生母撫其前出子女如己弟妹學使纍給米帛漢中府志王敦直南鄭庠生事父母以孝稱母歿敦直朝夕悲慟畫已像於母像前如生時依戀狀父歿哀毁幾絶復畫墨衰像拜禮於父母像前展像則痛哭不已晨夕必問視年八十餘孺慕不衰謂之曰居憂圖同邑李一鰲官布政事親亦以孝著賈志李原榆林人性孝友事繼母如嫡母繼母弟青疾終夜守視坐以待旦及卒原哭之失明視青子如己子賈志單應錦紫陽人恩例夀官天性孝友重禮義好施與嵗歉周恤煢獨卒年九十七嵗人稱為百嵗翁孫經德萬厯己酉明經以教授終父抱沉疴號泣籲天誓以身代事繼母愈惋承順尤得歡心臺司咸旌其門紫陽志趙汝圭同州人親老汝圭日奉案上食夜則侍寢夏扇冬溫席家雖貧奉養甚盛楊誦華隂庠生事親色養備至不離左右隆冬寒夜抱父足而眠賈志楊天瑞同州人兄弟四人皆孝友父被蟲螫氣欲絶天瑞聞奔抱亟吮其螫處頃之蘇弟天輔病危天瑞禱於神曰弟善事親尚無子息願以身代其他行類此四世共㸑無間言同州志張養中字亦中同州諸生為人醇篤質素事王母及二親起居衣食疾病醫藥無不竭力友愛諸弟事必任勞産不居豐父嘗病痢便溲轉側必親掖扶未嘗頃刻離一夕恍惚見朱衣神握手授藥曰憫汝過苦特令汝父蚤愈比昧爽病良已後遭父喪杖而後起母歿時隆冬永夜衣麻卧草極其毁瘁甫襄事而卒人皆以死孝傷之同州志韓舜璿澄城人母歿寢中門之外者三年母素畏雷每遇雷作即繞墓走曰兒在此比雷止始歸同縣田苫姚珊路邦進親喪皆廬墓三年賈志孫繩祖華州人初失怙弱冠王母歿宜承重哀毁逾禮既襄事廬於墓側者三年同州有沈時泰渭南有姚應魁臨潼有張應珮華隂有石之岱藍田有王之賈陳養心陳化龍徐明教而華州又有張迪光皆相繼廬墓馮恭定孝弟説王從善蒲城人兄弟四人從善為叔伯姒力主析居從善泣勸不從家産悉讓伯獨與仲季食力孝事二親會仲死從善營葬且為季娶因大困率季貸貨至襄貨敗於水季亦病死扶櫬歸夜嘗露處泣守之時糧盡宿玄武祠甫睡忽為神趣起聞虎嘯門外更有擲地聲曉出有物橫閾下啓視則雜叉釧悉兼金也抵家後二年伯及姒俱亡從善為營葬撫其養子為畢婚治産若猶子焉事詳臨溪公傳賈志樊志賢永夀人五世同居賈志李繼鄜州人性至孝竭力供子職父亡孝事繼母萬厯年間旌表賈志劉芝中部人父侃早亡母忽氏守貞芝弱冠成鄉進士官通判念母早孀衣不華飾食不重味躬親執㸑終身如一日或語及母苦節事輒涕泣不能言赴闕陳情詔旌表延安府志張志尹洛川人邑諸生父應奎早卒母尚氏守志不二嘗卧疾志尹親嘗湯藥及卒哀毁骨立啜粥三年既葬守祠廟三世同居御史疏旌其閭延安府志劉爾完中部人事父母以孝聞食必親徹必請父歿水漿不入口者七日及葬親負磚石以明經任阜平知縣母老齒俱落爾完晨昏必省命諸兒婦升堂乳母母歿葬祭盡禮松柏皆手植賈志李邦鎮清澗庠生淮之子淮赴試卒旅邸妻王年二十二邦鎮僅五齡王欲死殉邦鎮跪諌王始以撫孤為念宗人謀奪王志王誓死不二邦鎮弱冠補弟子員事王益力家雖落啜菽飲水必盡其歡遇病親嘗湯藥且密禱願以身代有司以孝聞同邑盧之苓家貧性至孝父死於蜀匍匐乞食抵西川負骸歸葬知縣陳汝元並旌其閭延安府志李邦禎李邦琦葭州人俱吏員性至孝因母老不仕母病百藥不愈兩人各割股以奉母食之即愈後歿祭葬廬墓當事旌其閭曰二難苦孝葭州志蕭升咸寧人拾金二鎰仍還之祖母與母歿苫次三年葬又廬墓三年墓柏生花賈志任紹曾涇陽人天啓間嵗飢輸粟於官躬為賑給吏不得侵素輕財人有稱貸不能償者常焚其劵以是義聲益著涇陽志髙愈字泰吾韓城諸生倜儻有氣節事父母至孝天末嵗荒愈鬻産得百金悉以賑之尋以勇略攝韓郃營事嵗復荒餉不至愈多方周恤全活甚衆軍兵不譁城堡無恙賈志武謨盩厔人父陷於賊以身代死崇禎間旌表王者輔興安庠生賊尅城執其父代父死焉賈志田而腴字沃千美原人以孝子稱田氏閥閲雄一邑則自孝子父御宿先生始崇禎癸未逆成僣號脅諸紳強受之官稍抗即械繫以輸餉為名動纍千萬御宿先生不欲屈見賊檄下孝子請代繫先生預決其不免數諭意孝子孝子曰父不逃則陷父父子並逃則陷宗族父子俱往俱死無益也卒行逮長安獄擊掠備至賊東行遂挾孝子去遇害於平陽妻徐氏凶訃至哀毁踰禮棺斂皆自簡視七日絶粒死陳禎年撰田孝子墓志臨潼庠生宋儒周父應鰲官僉事李自成勒令輸餉儒周毅然以身代至平陽引頸受刃賈志王守庫扶風人少孤與弟守德事母最孝流冦亂人皆避匿守庫兄弟以母年老不去俱被執冦怒欲殺守庫弟守德跪泣曰我有子兄尚無後且善事母乞饒兄命願以身代守庫曰願殺我勿殺吾弟弟在母不缺養姪不失怙兄弟爭死不已冦俱殺之同執者述其事時麟遊庠生趙應璧奉母避賊母迫墮崖璧即於墮處號泣死之同縣貢生楊四謙父陷於賊與弟四可爭代死聞者感咽庠生何元秀與弟敏秀兄弟捐生脫父於難賈志李郁寶雞學生家貧性質篤無偽丱角知事母母疾朝夕不離側湯藥必先嘗隨母食多少衣不解帶者三月遭荒嵗走百里外負米以延母命母夀七十餘閭里聞之咸謂孝童鳯翔府志李桂芳寶雞人家貧傭作養父父卒竭力棺斂藁葬城西日哭於墓所歸則為位哭於家一日聞母言父生時有畫像寄外遂走數百里得而事之母亡貧不能備禮亦權厝焉後稍有積蓄即營域易棺槨合葬復斬衰三年悲號幾至滅性逺近感動臺院行文表揚鳯翔府志葉孕秀城固人任汝州經歷母蕭氏年八十餘齋心奉釋氏孕秀偕弟孕莪食則必侍疾則屢禱後因母老棄官歸修橋梁道路堰埭溝渠多損已資溥利衆人崇禎末巨冦經擾焚毁廬舍孕秀同孕莪竭力築堡避亂者生全以萬計議請旌褒固辭縣申道府題其堡曰仁里敦睦宗旌纍世同居漢中府志陳所養洋縣人官主事致仕歸流冦壓境捐資倡衆守城賊七攻之卒不能破孟侁石泉恩貢崇禎間巨冦臨城侁同叔養氣養重弟傑倡率士卒傾資鼓舞竭力守禦城賴以全後遇荒又勸叔養氣出粟賑飢逺近感頌縣請旌表固辭趙天一乾州人明末賊薄城下天一用火攻屢却之嵗祲倡義賑飢全活甚衆賈志范鈗郃陽人鴻臚寺序班性剛直孝友流冦犯境所過燔掠無遺鈗急趨家廟護主值賊騎突至被執不屈一賊擲主地下鈗罵不絶口遂遇害賊詢知素行嗟嘆悔恨久之宰莘退食録劉皓然韓城人與弟誾然廬墓而處賊至不避賊相戒不入其塋曰此廬墓孝子也左蘿石韓城集王端心韓城人其父母與弟死於賊亦投火死左蘿石韓城集楊呈芬字含蔚華隂人性至孝闖賊入關鄰里咸逃芬以母病獨不去賊詢其故感而不殺後以母喪哀毁致疾卒賈志梁小槐蒲城人庚辰嵗大荒有夫欲賣其婦者相持泣小槐與之粟夫婦復完聚有村翁市布得偽銀泣欲自經小槐如數豫之翁得免於死一日六七嬰兒棄於道小槐擕歸以粥活之明年辛巳斗粟二千錢死者狼藉小槐施米賑之全活甚衆銅壺集屈忠秦蒲城人性至孝母歿葬堯山忠秦結廬墓側每食必薦每薦必泣服闋復居山之清明寺晨昏登髙望墓而泣如是者又三年家人促還弗許推其意殆將終身焉銅壺集髙起鳯淳化縣生員家貧甚崇禎五年賊至掠母及妹去生詣賊營曰生父年髙賴母與妹以度朝夕如必引去則生父不保賊曰得二馬贖之生得一馬至營祈請甚哀賊豫其母留其妹生乃與妹訣曰我去汝即死遂持母歸賊惡之數十騎遮留生曰吾營中少一書記汝速順我且勸汝妹當惟汝所欲生大罵曰吾讀聖賢書作盜跖事乎賊怒撲殺之柴菴疏集劉篤中部庠生五嵗喪母頭觸母柩啼號弗食稍長植柏墓間柏枯日對之泣泣涕著樹上樹復茂賊攻邑城陷時祖母老矣篤負之走夜犯沮水澌氷渡妻在後弗顧也父紲青門獄病方溽夏篤侍父不解衣寢憂鬱嘔血祕不令父知父病瘳而篤隨歿賈志劉爾璽中部人崇禎二年盜至母驚匿爾璽時就傅於外聞變手戈馳追叔父固止之不聽追及從者震怖莫敢前爾璽犯堅而入獨往來賊壘間殺傷數賊尚未得母處身中大創十餘陷曲巷中兵折力盡死焉同縣杜夀春城破時人呼之去夀春曰母老安忍捨之遂遇害保安庠生胡國賔守城禦賊城破趨家衛其母持利刃當門手戮二賊後賊大至死之延安府志梁濟民中部人家徒四壁而奉母每食必進甘旨崇禎辛巳嵗大祲諸弟雖分㸑必呼與俱食鄉民有既鬻妻又將自鬻濟民憐而與之食又曲為贖夫婦相合如初舉明經不仕卒賈志按唐書孝友傳云唐受命二百八十八年以孝弟名通朝廷者多閭巷刺草之民皆得書於史官萬年王世貴長安嚴待封鄭縣新法汪郭士舉張長郭士度鄭迪栁仁忠能君德劉崇甘元爽韓子尚韓思約下邽張萬徹朝邑申屠思恭吕昻宜川司馬芬洛交周崇俊洛川何善宜皆事親居喪著至行者奉先張俘鄭縣王元緒冦元童皆數世同居者天子皆旌表門閭賜粟帛州縣存問復賦稅有授以官者唐時陳藏器著本草拾遺謂人肉治羸疾自是民間以父母疾多刲股肉而進鄭縣吳孝友華隂尹義華城固雍孫八或給布帛旌表門閭皆名在國史而元史孝友傳亦云合觀史氏所載其事親篤孝者則有同官強安臨潼任居敬華州要敬富平王賈僧華隂李寧屈秀耀州王思天子嘗表其門閭或復其家至舊志所載明季孝義甚多往往事迹略具世次難稽今亦倣各史例統敘於後廬墓則有長安楊時敷咸陽王汝成臨潼黃仲德藍田張繼志王之賈陳養心涇陽駱森三原張獻科盩厔王冕渭南趙是式富平孟國詔醴泉王天秩張璉西安衛張軫膚施劉友德張信楊汝勳保安馬忠宜川楊均仁延長徐方貢延川馬閏延安衛薛廣鳯翔石玫雷轟岐山宋仲貴王髦士封奎杜林寶雞趙一元劉守仁楊崙郿縣髙彥良麟遊何相翟孜郤邦敬汧陽王汝愚王用臣洋縣武全西鄉焦爵鳯縣辛宏石泉魏人文漢隂劉夢龍商州劉琦雒南張朝卿張可大薑朝周何宷馮三定同州侯智雷鳯至朝邑王於豐澄城黨𠂻趙大治華州趙圭華隂蘇自新郭登張綗趙乾德楊惟諶周祿蒲城雷瑜潼關藍瑄楊順通楊素通同官習顯何源馮光升習四科乾州康衢永夀張其藴邠州胡子淳郭元洛川張科米脂髙必升葭州姚慕虞割股則有咸寧劉溥吳光先李維新郭良才李一道彭允中線補章馬宰三原梁希贄梁應臺富平張道治張然唐舜相王尚賢竇良棟安定景大有岐山劉厚郿縣王瀚西鄉張淮乾州陸大端李維本永夀陳粟鄜州武演文中部張克讓哀毁滅性則有咸陽張延祚盩厔楊起潛辛守仁渭南薛紹慶薑鄰仲韓城衛之琚華州劉國仕讓産則有長安李茂實渭南盧崇雅李若泰富平季廷實延安楊汝桂沔縣李時義中部劉䌑發粟賑飢則有咸寧王表曹恭蒲福趙佩陳福髙陵樊宗玉涇陽任紹曽張敏曹儼曹恪三原劉祿王清揚聰渭南薑文恭陳顯藺政王祥田雲楊茂春富平王肅周肅魏廣膚施趙志常鳯翔梁禧岐山李存寶雞王尚忠城固黨中衡西鄉苻維新王加第漢隂藍盛郭濟同州董躍董景岩王珩雷衍朝邑冦福李珩劉十九韓整雷冬郃陽車輗康國梁澄城韓泰習玉鄭鑑李守心袁忠華州王濟民耀州喬政喬仲節同官何仕能王者為寧希恭孟友諒孫霖陳邦彥白水王憲劉澤永夀宋寧宋寧三水劉愷鄜州丁潤王佐中部王光祖秦濟李逵宜君田秀康允楊樹勳清澗白廷祿代輸逋賦則有咸陽許榮三原侯逹先韓城黨孟輈拾金不昧則有涇陽巢帝閣渭南張騰蛟乾州張啓明周思聰李果永夀楊自竒漢隂溫以良吳自強皆得列其姓名以為修身行已者之勸焉本朝張大齡長安人幼失怙母黃氏守節大齡性純孝善體母心時承顔色為欣戚少好學家貧改業岐黃母病篤百方療之復精誠籲天果獲愈子永福孫爾珖俱登賢書康熙四十一年旌表孟學長安人幼有至性母病危遍訪醫藥日夜泣禱願減已算以增母年母遂愈時年甫十餘嵗又馮選亦長安人母遘疾選不食纍日潛割股和藥以進疾遂愈有司俱旌李文秀長安人家貧以市楮為業性至孝罄日中所得子錢悉以充養妻子衣食才足雖纎毫不私也人稱為楮孝子柏覆皇長安人事祖母楊繼母髙俱盡孝居喪有禮篤友愛撫猶子如己子康熙辛未壬申間大荒散粟八千餘石長鄠兩邑全活甚夥族黨貧乏者畀以田種除國賦外不責其償童僕給産婚娶嵗稔悉遣歸一門長幼七十餘人數世同居焉張我訓長安人事母先意承志年五十孺慕不衰性喜周恤閭里婚葬悉極力資給無德色又嘗建豐水橋行者稱便子勇亦好施慕義有父風嵗荒散賑鄉人德之鄭仁咸寧縣人十齡喪父哀痛如成人母朱氏安貧守節仁色養備至承歡無間雍正三年仁年踰五旬母歿廬墓三載枕塊茹蔬未嘗一歸里舍雍正八年旌表孫符咸寧貢生歸善令孫能寬長子喪母韓氏悲思不已每至墓哀號竟日父病癰吮之獲愈攻苦勤學齎志早亡士林惜之雍正八年旌表先是吳逆變起關中不靖符曾祖世選挈鄰里二十餘家與家人同避白鹿原破産周濟皆無恙祖盛事繼母李能孝李病籲天請代復割股和藥以進里人以為世德吕大猷咸寧人順治丁亥進士厯官兵部郎以母老乞終養朝夕承歡務以悅親為事母疾視寢視藥心力交瘁母既歿遂終身不起居鄉清介退讓不履城市咸知為君子人也子梓生嵗貢父歿時年甫十二事嫡母許生母李俱盡孝先是梓生未育大猷撫從子某為嗣梓生體父志終身兄事之無間言舅氏任楚藩梓生將母命往謁楚民有爭財致訟者以千金求關説梓生力却之生平好讀書尤精醫術暇時以栽花釀酒為樂郡邑檄赴賔筵皆不就鄉邦重之楊宗明咸寧人賦性醇謹事父母尤盡孝母歿父年邁獨居宗明朝夕侍側寢食不離父再娶宗明事後母如其母父卒哀毁骨立不茹葷御內者三年廉使翟鳯翥以孝行旌其門劉祐字篤生咸寧人康熙間嵗貢為諸生試輒冠軍問業者恆接迹生平尤留心經世大務嘗立仁義社倉以賑貧民全活甚衆蕭光蘭咸陽人事親克孝盜劫父室光蘭持梃奔鬭被數創賊遁嵗飢光蘭承父志散金出粟存活千人父歿廬墓二年餘得痺濕強舁歸涕泣不已稍愈廬毁日至墓拜奠巡撫黃爾性請旌之吳珍咸陽人幼有至性弱冠隨父渡渭父墮水時秋漲方盈珍衝波救出見者異之有賊入室將加創珍母珍冒死直前奪母走得免於難值嵗荒輸粟以賑里黨賴焉劉曰鋭咸陽監生事親至孝友愛昆仲至老無間素性尤樂善好施每農時必捐給籽種以助耕耨凡閭里婚嫁疾病喪葬及旅人之流寓于咸者曰鋭隨時周給未有德色康熙辛丑關輔飢曰鋭出千金散賑全活無算雍正癸丑嵗歉復出粟六百石賑之時所居堡垣傾圮曰鋭獨捐已資五百金修築自是守望有資晨夜無警又延孰師設義學督課里中子弟一時風尚彬彬如也雍正十一年巡撫疏其事於朝奉旨給正六品職銜以示奬勵侯治經咸陽監生早失母事父及繼母陳俱盡孝從母無子治經迎事之如所生遇鄰里婚喪必悉力資助奴婢臧獲有父母煢獨者即焚劵令歸養屢值嵗歉散粟散金以賑貧乏鄉人賴以全活者甚衆雍正十一年巡撫疏請議敘奉旨以應得之缺即用王鄠縣生員家貧事孀母至孝遭冦變被虜及脫歸知母死賊手一慟而絶鄰人救之經夕乃蘇泣血三年聞者無不慘切王欣鄠縣人順治初邑遭冦變賊繫欣母拷索銀幣欣挺身護母賊揮創中其肩幾隕賊平家業蕩盡欣力田服賈奉母承歡伯兄諸生慥苦貧欣分已産贍之仲兄慤妻亡遺二子鞠之如己子孝友之稱人無間言陳調陽鄠縣生員父樓居失火調陽方弱冠冒火登樓負而下兩人俱無恙父歿兄子遺孤輔聖方八嵗季弟甫四嵗調陽知母意以幼子孤孫為念分析家産悉推美者與之復延師課學弟姪俱賴成立輔聖太學生性行醇厚母疾藥必親嘗衣不解帶食息咸與母俱母亡以哀毁成疾卒劉龍洲鄠縣人繼母張氏性嚴急龍洲日侍左右略無忤色父卒後事之二十餘年不少衰以明經授教職兩舉鄉飲賔王永圖字伯固鄠縣生員為文典贍博雅性醇謹雖盛暑不去衣冠接人無少長咸以禮居家孝友年七旬每念及二親輒痛哭所著永思草鶺鴒鳴杕杜編諸書皆原本至性焉張炯鄠縣生員賀賊陷城父被執炯挺身衛父賊斫其腦而死聶宏鄠縣人家貧以賣酒為業有所得輒易甘脆養親肆去家逺宏身為傭保偶間即歸家問父母安否雖祁寒盛暑不輟也母故宏常宿父榻旁卧起定省家有畜犬客以餅啖之犬即銜飼老犬人皆以為宏孝所感王賢鄠縣民家窘為人傭得值養親日用無缺偶逢親舊有贈以果餅者必懷以奉親親未入口不敢遽嘗親亡棺衾無措至典身以葬魏惟紫字青臣鄠縣孝子國成次子嗣嫡叔國垣後以文行選拔授河南偃師令招來開墾設學課士多惠政時祖母年八十失明生父母繼父母具慶悉安車迎養後以罣誤去官例得復起念兩代髙年絶意仕進奉養葬祭靡不中禮友愛昆季敦睦族黨始終不倦年七十哭兄過哀以疾卒王先身鄠縣生員賀賊陷城奉母閻氏避賊卒俱斃賊手張文運藍田人八嵗失怙母王氏孀居家貧嵗荒竭力孝養遭冦變負母逃匿金山日採果實奉母備厯險艱卒保無恙母夀將及期頥而歿文運哀毁逾禮既殯負土封築猶宿墓不忍去嘗另建一室顔曰永思堂鄉人過者皆興孝思雍正六年旌表薑士珍涇陽人母孫氏早逝繼母楊性多恚且私其前子女百計苦之士珍怡然順受無怨懟色里人憐之欲訴其母於官士珍號泣挽留得不訴楊知而自悔愛如已出撫軍雷興題旌李天牖涇陽人性孝友母病痢嘗糞知不起每夕跪誦孝經禱天願以身代母歿事父尤盡孝兄年邁苦貧仍迎養於家業師文某居三水嵗祲嘗負米百里以贍之至於還遺金拒奔女焚宿劵尤多隱德雍正八年旌表李長㽔字丹馥涇陽諸生事親至孝母劉得痿痺疾長㽔侍藥餌十載每至徹旦家不甚豐而好施豫念友乏嗣助資納妾鄰人有逋官錢者將鬻妻長㽔代償之他如施藥捐棺賑粟焚劵幾於嵗以為常陳振烈涇陽諸生天懷孝友居母喪家貧未葬日寢處柩側盡哀服闋時年未三旬鬚髮盡白事父及後母曲盡孝養性嗜學博覽羣書子焯以進士令漳平封振烈如其官熊鈵涇陽嵗貢生性孝友母劉常負疴藥餌鮮效遂究心盧扁母症獲痊後母喪泣血而歿聞者皆為雪涕一時如三原王維圻安定南宏緒麟遊魏棻華州張延統中部馬佶皆以親喪哀毁成疾卒宏緒康熙癸巳進士棻嵗貢生延統舉人福安知縣佶諸生維圻年甫弱冠事母尤有至性焦之雅字大雅三原人中丞源溥長子為人方正􅈺於禮儀逆闖破關父被執罵賊死之雅與弟之夏尋父尸衣衰絰手持利創誓不得遺骸必死之果得尸負歸葬畢棄家隱華山憤鬱而死之夏亦終身隱處或勸之出輒不應房廷祥字發公三原人年十三補博士弟子父建極崇禎辛未進士官於晉遷兵部主事歸里會李自成盜關中建極知國事孔棘星馳入都時廷祥年十五請從母不許廷祥泣告曰父死國兒不當死父乎遂褁糧易服為少黃冠以從至河阻賊不得渡乃涉洛躡王屋太行諸山匍伏行數千里甲申四月抵近畿聞京師陷建極將絶粒死廷祥泣請曰吾父今道死窮山中誰知者且死亦何益因強輿歸未幾卒廷祥慟不欲生既葬廬墓側不去僅得下夀以歿來淑泗字聖濤三原人年十嵗值流冦變扶繼母左氏避難訛傳冦至母投身井中淑泗號泣井上跪求途人覔綆縋救乞人負歸閭里稱為孝童李時盛字文吾三原人性至孝懋遷於外因母寡居棄歸養母浣衣滌器皆躬親焉明季有舊交髙姓者以黃金五十兩寄其家商於外值闖亂焚掠時盛家室不保閲七年而髙至悉取還之髙為感泣人頌其義申培棫字林蒼三原嵗貢任兩當訓導性孝友父歿維揚徒跣扶櫬營葬盡哀事後母委曲承順所生弟妹撫誨婚嫁悉殫心力嘗捐金代宗族輸稅至於周貧濟困掩骼埋胔尤為好行其德劉容三原人農家子也居嵯峨之麓與弟俱入山虎至攫弟去容追及左手挽其尾據其背右手執屨撻之虎益猛容益力虎乃置其弟去容負歸得蘇梁澄之字靜海三原人倉場侍郎鋐庶子也幼時常從宦四方父以果餌賜之輒念曰吾嫡母在家未食也因泣下間得䊵綺輒以請於父曰吾將為嫡母衣也以是戚屬咸稱其孝後歸省嫡母適患痢粒食不進澄之減餐泣禱曰吾母食始食越翌日果瘳性好施解衣推食無德色竟以嫡母卒過哀致殞士林嗟之劉守法守富守竒俱三原人兄弟友愛至老無間同㸑經五世縣令表其門曰百忍同芳洋縣王奇瑾崇禎癸酉舉人知束鹿縣亦五世同居又鄠縣樊邦彥四世同居髙陵裴汝清三世同居皆無忝公藝家風者張厫盩厔人順治四年山冦金龍破其堡兄厰被殺并掠厰子靈娃以去厫念兄止此子今被掠是無後也即負已子補娃入山易靈娃以歸冀圖往贖乏資未果值冦移營以補娃幼不能從行遂殺之後厫亦復得子云郝振綱富平人太學生少失怙日侍寡母側含泣讀書值嵗荒日鬻線易米為食既長優於幕學所至必奉母以遊族孫信七嵗家貧度為僧振綱養之得成立又族孫仕有忤行振綱令從已日夕觀事母狀閲三載仕感悟請歸事母族人有夫婦同逝者葬之而育其嗣母疾篤焚祝求代及卒哀毁廬墓者三年雍正五年旌表孫文達富平人産於滇年十嵗父歿盡哀遵所生母訓讀書入泮不知原籍有嫡母在也雍正二年富平令移文到滇乃大慟遂扶父柩奉母擕妻妹萬里歸秦備極艱苦以久缺嫡母養負罪自責晨夕竭力以事二母遇外侮槩不與較曰恐傷寡母心耳雍正四年旌表唐文昭字含章富平諸生父歿齋居三載繼母偏愛己子因逐昭昭肆力稽古益明理數之學順治十年御史何承都造其廬贈以金却之贈以布辭不得因為母夀母卒悔悟呼歸居常困於貧每竟日不舉火嵗祲邑人重其學行斂粟贍之知縣郭傳芳祠祀孝義三人昭特與焉黨國虎富平人六嵗母亡寄撫舅氏父普寬兄廉生為族子國孝毆死以事未露國孝幸免國虎恚甚揣力弱未能報順治九年國虎年二十一乃誘國孝於野並其子尋兒撾殺之詣縣自首赴獄縣令欲加矜恤國虎念父仇已雪遂於獄自經死與唐時梁悅事正同知縣郭傳芳創孝義祠首肖像祀悅而以國虎配之孟孔脈字祖尼富平人順治乙酉舉人授稷山令聽斷明允邑無寃抑嘗割俸贖民鬻子百餘人富邑隂家河病涉捐資築石橋以濟行旅又築堡寨聨守望里黨賴之趙一韓富平諸生性醇謹親老多病藥必先嘗及歿哀毁骨立鄉人稱之兩事繼母無異所生待諸弟友愛無間言以子兆麟巡撫鄖陽贈都察院右副都御史南爾強字遜之安定廪生有至性六嵗喪母方斂慟幾絶父撫之曰汝為死母獨不為生父乎哀稍輟既殯朔望必至荒郊展拜事繼母尤篤孝諸季欲分㸑罄産讓之父士逵將就廷試積資三十金一夕被盜去復稱貸以進不令父知盜感愧還金遣之去終身不泄也父卒尤孺慕不衰雍正九年題旌從弟爾輔字長民性孝謹事親色養由貢生任金縣訓導史秉鑑字敷平安定人明末盜起父任耀州學正秉鑑馳省途遇賊泣告曰吾往省父願見父來就死賊釋之父歿為諸生始食餼曰此天家所以造士也以佐菽水之資可乎仍率諸弟子力耕以奉母以外大父無子復迎養以悅母志一門之內融融如也每出行經溪山崖谷必下車騎曰母命也其舉念不忘多類此年七十由嵗貢授渭南司訓垂十年還里舉鄉飲年九十乃終雍正十年旌表石又賢安定諸生家貧甚幼時過里孰聞誦書聲輒欣然不捨父異之令從舅氏學初授以孝經退輒語人曰吾能是及長弟肖先方五嵗輒呼至學中同卧起告以懷橘扇枕等事弟一日觸母怒戒之曰吾語汝謂何弟大沮悔由是不敢復忤母母亡毁甚父亡毁愈甚得咳血疾時肖先已前卒又賢知不起語家人曰吾兄弟繼逝不獲親視窆穴俾吾父有子而無子天乎何酷言訖而終聞者皆掩涕雍正十年旌表郝秉秀字挺生安定人年七十事母孝謹晨昏必趨拜膝下母止之每日晨起必屏氣肅容向母户叩祝母夀又貢生南瑶字馥蘭五嵗即解定省禮父歿事母務得歡心撫孤姪尢篤鄉人稱之子源澄源漪亦以孝聞李桐安定人孝友子諒鄉黨著聞父母年俱耄耋桐終身孺慕不衰友于尤篤每事必肩其難者季弟早世桐撫其婦子衣食必先孤寡而後已王璉安定人九嵗值母病湯藥必親夜不假寐母卒事繼母尤恭謹母子俱有令名教子姪以孝經小學為根柢閲史鑑得忠孝大節及隂德事則手書一編示之其他敬老慈幼敦族睦鄰尤篤行君子也楊方安定人康熙辛酉舉於鄉授長安教諭性孝友弟正病股者三載母念弟不能逺離欲挈弟至長安慮方不能兼顧因不至方命妻子奉母於家輿弟至學舍訪國醫治之藥餌俱親調飢飽寒暖撙節之如嬰兒見者咸為感動聞母喪即日就道諸生追唁不及搢紳間尤重之李恭乂宜川人康熙丁丑進士父歿繼母他適遺弟妹六人撫視如一既長婚嫁俱成禮仲叔兩弟復早逝遺孤嵗餘又撫之克底成立同居共㸑人無間言通籍後家居杜門尤恥干謁惟來學者不拒終浙江景寧令王光印延川生員母病劇醫者不審其症光印嘗糞以察之復焫香告天願以身代母病旋愈後享大夀卒光印哀毁骨立廬墓終喪薛之奇延長人嵗貢性至孝親病湯藥必親嘗及歿葬祭如禮撫幼弟終身友愛不倦贍族周親恩意懇摯官湖廣衡州府通判盧點鳯翔人性至孝事親色養兼至嵗飢負米漢南甘旨無闕父遘疾日侍湯藥祈以身代事繼母祝無異所生雍正六年旌表弟熙康熙己未進士年十三喪母悲慟欲絶事繼母祝以孝稱官翰林院檢討王大利鳯翔人事親孝家貧赴川生理及歸而母已歿大利葬母後即以家産讓其兄躬自廬墓鄉黨稱之蹇逢吉岐山人官撫標守備遭冦變父被掠逢吉罄産贖之不得語人曰活我孰若活我父乃紿賊家有埋金願質已釋父發金以償父既脫賊覺之害吉於青峰山下聞者莫不流涕焉後旌表董成梅寶雞人入國學事親養志居喪尤哀毁逾禮侍兄疾湯藥必親嘗歷久不懈族叔嘉言歿旅舍為歸櫬營葬族弟舒績遭嵗歉流移他所成梅給資營運家室復完康熙辛未壬申陜大飢成梅捐粟出賑又勸諭親黨素封之家協力捐輸分户散給鄉人賴舉火者甚衆郡邑聞其行義歷舉鄉飲正賔雍正九年奉旨旌表劉元昌麟遊人官白河縣司訓流冦破城父被拷掠至死元昌痛父死於非命哀毁終身事繼母尤克盡子道鄉里稱之吕夢熊麟逰學生母老失明每早起盥洗為母舐目飲食手供親滌溺器起居不離左右遇宴會必懷果核歸以奉母母夀八十八嵗何文元麟遊學生父歿母遘疾危篤感異夢起禱土主廟燃一指和指灰入藥以進母病旋瘥更善事祖父母人稱其至性過人又公孫浩者母疾篤割股以療母遂愈亦麟遊諸生也張東生褒城縣諸生五嵗喪母事繼母李盡孝值冦警東生負母避亂備歷諸艱險平時菽水尤能色養張拱極城固貢生母病侍湯藥三年衣不解帶晨昏祝天願以身代母病愈為朝邑訓導一年以憂歸遂不復仕年九十一卒梁天植城固人明末父衡為逆賊所執家人竄伏天植追隨不釋既而乘間脫父入山谷日負其父行數十里卒免於難後舉順治乙酉科鄉試趙元惺城固人父京仕官京師值冦亂家人咸被執母楊年六旬賊索餉加以炮烙元惺哀號乞代賊令牽出將殺之元惺引頸就刃無懼色賊義而兩釋之夏錫攸城固人傭身養母母病篤日夕祈禱願以身代延醫治藥潛割股和藥以進翌日母病愈方振寰城固舉人與弟諸生耀寰素友愛家人或議析居兄弟相抱而泣自是中外弗復言耀寰妻張氏中丞鳯翮女凡飲饌衣服必先夫之兄嫂而後已尤人所難彭效古西鄉人善事繼母以孝聞申請旌異張永福西鄉縣民性至孝四嵗失怙母李氏撫養成立以貧故負薪易米事母惟謹人憫其孝助資貿易時覔蠅頭以佐菽水終身無一日離母也又楚人姚必聞以招墾輿母至西鄉母病篤割右股以進病遂愈人以為孝感康紹文興安庠生順治三年流冦陷城父子俱被掠賊欲殺其父紹文乞以身代賊殺之父竟免於難康應祥興安州人家貧好義嘗路拾黃金六十兩俟失者還之一日糴麥歸麥中得白金十兩亦返其主事繼母以孝聞順治三年流冦過其門曰此孝義士也相戒勿犯覃訓紫陽人少孤事繼母宋至孝待繼母弟誨極友愛土賊竊發訓負宋避難誨稍後為賊所獲訓傾財詣賊求贖卒歸之生平修橋梁施醫藥里黨咸利賴焉許應選紫陽人韋雲蒲城人母病目皆失明醫藥罔效二人朝夕籲天號泣母目忽明人以為孝感應選以諸生居鄉尤樂賙恤窮乏有不能庀喪葬者恆加佽助周蒲璧商州人康熙己酉以第一人舉於鄉壬戍成進士改庶吉士授檢討念不得養母請告歸飲食湯藥咸親嘗母歿遂絶意仕宦屢徴不起兩女弟家貧賙恤倍至視從兄弟如同懷督課從子多所成就擇族人之方正者舉為族長身率子弟受教居鄉慎言笑嚴取與讀書樂善泊如也會州牧修明文廟祀典力為贊襄易木主刋儀注至今奉為程式卒之日逺近執紼者千人盧運熙商州人幼失怙族伯廷詔無子收育之遂嗣焉年數齡即嗜學崇禎癸未城陷羣兒被虜俱焚死運熙獨手持孟子一卷賊異之獲免事嗣父母盡孝暨歿哀毁盡禮有從伯無子者事之如父康熙辛酉舉於鄉壬戍赴禮闈忽心動兼程歸伯已寢疾及卒庀喪葬尤盡力又族弟少孤隨母改適訪得之令歸宗俾娶妻成立族兄老而生子及卒運熙嚴課之得列庠序嘗建乳來社與鄉人講學課藝所造就尤衆王孝風鎮安人事母至孝冦至與族弟各擕家避亂事急弟棄其母負妻去孝風獨棄妻子負母逃匿亂定孝風奉母歸妻子亦無恙其弟及妻竟遇害陳國柱鎮安人性至孝家貧無以為養投充行伍所得餉悉供親膳或招之飲必先為父母設饌務極豐腆國柱目不知書其愛敬蓋本天性云孟三光鎮安人少孤事母盡孝母失明扶掖不離左右家赤貧甘旨無缺年逾四十母怒輒長跪受杖里黨賢之曹亨鎮安人年十一母死不能具棺號泣於路乞鬻身殮母或贈之金歸葬畢即詣其家執役終身不改李嗣蕃雒南諸生通經學工古文辭值冦亂父果珍逺宦撫寧嗣蕃奉母避冦山中卒保無恙果珍攝京兆值甲申之變被冦虐幾死嗣蕃諱子稱傼囚服槖饘免父於難以勞勩得肺疾日就瘠羸後侍父榷稅邗關歿於邗果珍崇禎丙子舉人居家孝友授撫寧令奏免缺額賠賦及定攢槽養馬之法嵗省萬金署清豐流冦袁時中陷開州果珍單騎直前諭以大義賊遂解又為開州殘民請蠲請賑後皆得請歷贛州府知府陳顯耀山陽縣役順治三年流冦劉二虎率衆自楚入商犯山陽城制府大發兵剿之賊偵知宵遁邑令趙廷臣偕數十騎探冦至土橋倐遇賊衆役咸鳥獸散顯耀獨挺戈衛廷臣俄一賊起草中奮矟傷廷臣右股奪其馬更刺廷臣顯耀力救得免賊去負廷臣登山匿榛莽間裹其創升髙望賊見賊大至懼我兵乘其後俱疾走顯耀尾賊大隊且盡突下山奮呼而前賊謂我兵至益駭潰顯耀橫刺一賊墜地因奪馬飛騎掖廷臣馳歸後廷臣官浙閩總督招之赴浙顯耀卒不往茍復字元煦山陽庠生明季流冦陷商州復父日躋罵賊遇害復遍覔父尸以殮將葬甫及壙遇賊數十騎突至衆悉奔避復守棺痛哭賊問棺何人曰父也問何不逃曰寧與父同死耳又一賊後至謂復曰可速葬少遲則大隊將至蹂躪靡遺矣呼衆賊助葬訖令急走且問何姓氏具以告後商洛道許宸按部亟訪山陽孝子苟秀才復往謁許甚敬之蓋後至賊為許家僮陷賊中後脫歸仍事許嘗為述此事顛末云劉緒岱字宗嶽山陽嵗貢生明季流冦掠山右父必逹為汾陽令被害緒岱聞警馳至求尸不獲冦方遍捕必逹家屬緒岱念已死如父骨何因潛歸明年冦定即徒步抵晉瀝血呈請臺司願發義冢認父骨臺司允之纍滴血無一沁者緒岱倣徨莫措一里老欷歔云迤西關聖祠後置一棺上有墨字盍驗之緒岱即馳視所書面髮身色殊似父急啓棺刺血三滴俱沁入無痕時觀者如堵皆泣下緒岱亦僅餘一息即置棺衾更殮歸葬舊阡父忠子孝時論重之蔡光先山陽庠生七嵗喪母四事後母皆盡孝晚母生弟光祚甫及周父死光先曲體母意愛弟極篤比長親為督課更延名師訓誨光祚得入庠康熙十四年吳逆偽將屯縣境城陷室廬盡毁光先負弟逺避歷盡險阻卒保無恙劉運惇同州生員曾祖自德以勤儉起家事兄自明尤謹四傳至運惇昆季十人友于彌篤諸兄皆先逝運惇撫育諸姪不啻已出且朂之曰吾家四世同心骨月依輔爾曹倘有乖離使吾無以見先人於地下也諸姪恪守庭訓益敦孝友迄今孫曾繩繩七世同㸑雍正十年奉旨旌表加賜御書匾額時論榮之曹如琯同州人性純孝數嵗即解問寢視膳比長登賢書負米中州以供甘旨父病嘗糞以驗愈否與仲季相友愛無私財里黨多感化嘗雪夜憩别館有少婦奔之如琯急趨避里中妄人橫逆置不與校初任涇州學正州民聚衆譁於牧署牧大困如琯以義諭止之康熙丙戍成進士改庶吉士尋告歸劉世澤朝邑諸生父裔山西廣靈知縣攝廣昌篆昌邑舊多浮派裔申請捐除為姦吏李承芳所害櫬歸承芳漏網世澤痛父事未白憤不欲生忽一夕不知所往家人以為必從緇黃去矣世澤潛至廣昌歷訴臺司具得承芳罪狀詔磔於市邑人感動仍相率建祠以祀其父世澤歸時年方十七薛國光朝邑人善事繼母母病國光禱以身代湯藥必親嘗衣不解帶者數月性好施與嵗飢捐米助賑邑令姚士孰纍旌其門雷王賔朝邑生員孝子捷之孫也執親喪期年不茹菜果三年不御酒肉居祠下朝夕哭奠如禮人稱世孝張疇武朝邑生員天性孝友父歿哀毁骨立既葬廬墓三年邑令羅人琮旌其門又嵗貢生王元灝居親喪生員張奠極居父喪布衣劉宏禹居祖母喪俱三年不御酒肉既殯行廬墓禮張售珄朝邑嵗貢生家貧負米致養康熙辛未旱蝗售珄館上郡迎父就養父老不能騎以肩輿度嶺嶺險峻輿夫不前售珄自舁父山行數十里父為嗚咽售珄故示踴躍以慰父性友愛伯兄怒輒加詬杖售珄恬然受之工文嗜學試輒冠軍邑令延為義學師從遊日衆多所成就侯樹屏字建侯郃陽人前壬午舉人授朔州牧遷廬州府佐未任以終養歸為諸生時值流冦變起母雷適歸舅氏倉猝奉父走匿城中一夕聞舅寨失守急詣邑令痛哭求啓門出令感其誠許之出遇賊泣訴以故賊亦釋之既至母先已殉節樹屏痛不欲生常以栗板書樹屏爾忘爾母耶七字置座右觸目揮淚數十年如一日其治朔也值薑瓖殘破後奉檄招集流移給房舍散牛具不二年墾地數千頃父在庠嘗採古名宦事實為觀宦録以朂樹屏樹屏為循吏蓋本庭訓云解體健韓城人順治丙戍進士髫年父病每晨起必號泣於村社各廟祈以身代衣不解帶者數月父母歿育於兄嫂登第後事兄如父歷宰武強龍陽俱著惠政薛爾昌韓城人明大學士國觀仲子廕中書舍人年十三值闖逆劫兄爾章拷餉爾昌投賊自言願代笞掠賊義之幽禁年餘脅之降不屈賊敗潛脫歸痛父慘死遂絶意仕進國初益都孫廷銓在政府勸之仕謝以疏散不堪任職卒不出閉門讀書足不越户外者六十餘年里黨罕識其面年八十八卒衛引嘉韓城人順治己亥進士闖逆入關遍逮搢紳索餉引嘉父之琯叔之琚堂兄引文皆邑顯宦悉被執將害之引嘉甫弱冠挺身詣賊願以身代備罹凶慘卒不屈知石首縣值山冦竊發城幾陷引嘉率兵民剿平之糗糧芻茭不煩閭左石首至今感頌經理家務五世同居課子弟必嚴皆為令器族黨有好學者招至家孰或解囊助之多所成就衛藎臣韓城人闖逆入關掠藎臣父先範索餉備受慘毒藎臣朝夕環泣兩閲月得間以其父逸歸其弟被誣繫獄親黨勸為自全計藎臣不可挺身赴臺司反覆陳辨寃得雪嘗構龍門社學集子姓姻黨嚴加督課邑中先後登賢書成進士者多出其門藎臣亦以順治庚子舉於鄉衛鴻韓城人幼隨父引文宦京邸年十三值闖變引文緇衣南下母張氏死之鴻扶母喪及庶母卞幼弟嵩齡西歸中途失弟所在抵家葬母訖即隻身四出誓不見父與弟不復還時南北路梗乞食以行後知父盡節維揚慟哭幾殞求尸不可得因招魂歸葬再出訪弟踉蹌道左歷四載至蘆溝橋旁遇民家子殊肖父叩之果然乞歸課讀嵗辛酉嵩齡得舉於鄉族人有從父於難者給田以贍其家周貧恤苦歷久不倦前後捐債焚劵不下數千金鄉人稱其孝義後以明經授鎮原訓導不赴閻和羮韓城人順治戊子嵗貢任延川教諭性至孝父歿廬墓三年流冦劫掠人皆逺避和羮獨守墓下聞金鼓聲即伏冢哭曰兒在此父勿驚也程育槐韓城人順治甲午舉於鄉少失怙哀毁幾絶母病禱於神乞以身代值闖亂村人皆走匿育槐母喪在殯與弟諸生育檟守柩下不去賊至刃脅之育槐與育檟爭就死賊重其孝友勿殺也後過其村曰此程孝子莊戒勿犯所居西川里當韓城孔道山徑﨑嶔每霖雨挽輸不至育槐育檟捐資開鑿韓人賴之又西川土瘠民貧絃誦多廢育槐育檟為擇地建社學延師課讀鄉人子弟咸來就業嗣後科名鵲起二程培養之力居多吉庚韓城人康熙甲午舉人五齡失父母有言及者即哭泣不食鄉黨稱為孝童稍長事祖父母備極色養祖疾晝夜侍湯藥不少懈叔祖母孀居無子庚迎養有加禮叔久病養之如父暨歿撫孤弟恩意尤曲至庚少有文譽試輒冠軍邑令康行僴延郃陽康乃心修志庚採訪商確之力為多解光紳字公垂韓城人以明經任府谷訓導性至孝事親先意承志無私蓄父患痬卧床纍月不能轉側光紳晝夜扶掖不離左右中夜執香泣禱香盡爇指不覺也禱畢瘡旋愈數年後父歿事母尤盡孝居喪苫次三載以伯兄光纓死闖難言及輒涕泗交頤與仲季篤友愛動必與偕為諸生足不履長吏庭工書嗜學旁及子史試必冠其曹任府谷日砥節礪行文廟圮捐金葺之強敬業韓城人性孝家貧經商為養備極勞苦父病疫日侍湯藥纍月不怠及歿營葬不半載鬚髮盡白祖母卒叔不能襄葬事敬業一身辦之撫幼弟極友愛比長析産或云爾産爾自有之弟不望均分也敬業曰手足一體敢二視乎毋撓我嵗庚子韓大飢念庠士苦寒又不敢居賑士名私以百金付學博散給貧者居恆謙謹不慢一人人有犯婉詞謝之不與校人亦多自愧云董士孝韓城細民家酷貧傭工為養嘗走遞文書得值悉奉父母母病祈以身代嘗糞驗愈否天寒懷父足以坐夜必身先溫被辛未大飢不能舉火恆賃傭以供父母不使父母知也張京瓉韓城人康熙丙午舉人事親先意承志事姊唯謹篤友誼有同年寄葬先人於韓者嵗必詣墓下代為祭掃辛未蝗災捐榖數百石以給親族不足更鬻産濟之宰慶都民貧恆苦乏食京瓉力請發榖麥以貸嵗荒復緩征又捐俸置學田供士子科舉費蒞慶十餘載士民刋實政録以志其德張顧行韓城人康熙丁未進士顧行幼出嗣奉本生父母盡孝生養死葬皆身任兄弟多早卒為營喪葬撫從子孫恩義尤篤業師許某家貧顧行餽遺數十年無倦師客死中州經紀歸殯故阡壬申關中大祲顧行歸自黔陽遇流離滿路施賑無虛日抵家即毁飲器典衣物妻薛氏脫簪珥佐之得千金糴粟散賑全活甚衆自朗川令歷貴州學政廉明特著擢江蘇糧道未數月以憂歸陳九疇華州人性孝友事繼母屈氏承歡四十餘年屈忘其非已出也與異母弟九錫相友愛盡以美田宅讓之族叔某為膠州巡檢卒於官九疇逺涉為扶櫬挈眷而歸撫其子女俾立室家有至戚醉後墮井死其家疑素有隙者害之將藉九疇與搆難九疇力辨於官遂得釋初湯斌分守潼商髙九疇行義與友善及卒為銘其墓子邃如康熙甲辰進士授海豐令以目疾解組歸當明季闖變邃如挈家避居栁鎮比時杆賊嘯聚邃如築堡固守賊不能攻保全甚衆里人德之杜進華州生員敦孝行事繼母曲意承順四十餘年人無間言父歿值嵗歉喪葬盡禮妹少寡養之終身為撫孤成立族孫如松未及周而孤為經理其家比長訓以讀書如松入庠俾其節母得邀旌典族弟有孤女同州富豪設謀強聘進力遏之為擇配以嫁鄰人母誤服毒或誣其子大逆將置極典子懼懷金求救進叱去仍力釋之得不寃進年九十有六舉鄉飲介賔李棲鳯字羽伯華州生員父早卒事母至孝母疾湯藥必親嘗及卒哀毁骨立先是父歿時弟喬甫嵗周棲鳯撫育之屢經離亂悉力保護喬稍長教之讀書補郡諸生受室分産友愛愈篤又性好施與嘗捐粟賑飢里中共賢之劉誥字謹軒華州人事親孝誥兒時即嶷然不羣束髮受書托採百家尤篤嗜忠孝經親歿泣血居憂終喪無嘻笑容先後廬墓六年每厯辰午戌三時親戴土封墓即寒暑弗輟也州人楊耀世事父母喪葬盡禮先後亦廬墓六年蒲城劉士信幼孤事母至孝母卒廬墓六年始歸孫蒼華州人康熙初年十七隨父應禮樵西石門虎突至攫其父蒼奮呼而前揮手中斧裂虎項虎逸蒼父得脫歸數月瘡始瘳父常袒瘢示人相視皆戰栗或詰蒼曰汝斫虎時毋怖乎曰爾時不知所畏今回思始覺可怖耳其天性純篤如此王讀字啓吾華州人父仕俊好遊不知所在讀三嵗養於祖父母年十三祖歿葬畢必欲蹤迹其父之太和山之郿縣清風山又之峨嵋山遇老僧詢讀有祖母在慰之曰汝尋父為盡子職耳父不可得不若代汝父歸事祖母讀乃歸事祖母盡孝所居室內外遍書色難二字或遺以李密陳情表讀朝夕泣誦後祖母得年九十二而卒讀孺慕如初楊長華隂人嵗荒乏食嘗負粟鄰境忍飢奉親家貧卧無衾褥嘗身先溫席抱父足竟夕父病祈以身代且嘗糞以驗瘥否父卒哭盡哀不食數日葬後廬墓側朝夕環塜守視事之如生康熙二十年旌表蘇億華隂人純孝性成六嵗知問寢視膳七嵗喪母哭泣至慟水漿不入口者數日後每過墓門必慟哭事父愈色婉容歷五十年如一日父疾嘗抱坐懷中七晝夜無轉側隨父寢處三十餘年父歿既葬戴土成墳廬墓側三年雍正五年旌表蘇昌隆俊隆興隆俱蘇億子孝行純篤能世其德母歿三人皆哀毁骨立既葬晝則力耕養父夜必更代居墳以伴母後父歿爭負土築墳兄弟並廬墓側親朋以家無長丁勸興隆歸守父業兩兄亦促歸興隆不入室依主而卧者三年邦人過其墓嘗見白蛇守壙咸謂純孝所感雍正五年並旌表王宏嘉字玉質華隂嵗貢生性醇篤親歿水漿不入口三日值親忌率子弟更衣冠拜獻主前輒淚涔涔覆面其終身孺慕如此生平讀書砥行尤工行楷書法李馥蒸字雲伯蒲城人前癸未進士歷江西提學道性孝友執親喪廬墓三載所遺産悉讓弟嵗飢出家財糴粟平糶全活甚衆蒲邑遭王永強之變暴骨遍野為捐金立義冡瘞之故友王御史道純死闖難於山西不逺千里擕櫬歸葬李承引蒲城人性篤孝初娶婦偶拂姑意即出之設義學孰師及諸生膏火悉以身任孰中多成名者好施與周貧恤苦無虛日嘗居肆偶出或竊其錢比舍攢擊之承引至曰我令彼來取勿毆也其人感悔易行除夕有鄰人盜其麥遇承引訴以養母因倍給錢米遣之嵗己丑王永強叛兵至蒲承引業避城外復入負先人遺像並木主以行時城閉不得出聞空中呼曰東南隅走者三因越城得脫王凝祚蒲城人幼有至性父汝璜明末任河南息縣丞卒於官道阻未能歸櫬順治初凝祚辭母東行至潼關足繭不能前卧旅舍夜夢老人摩足令起次日大愈即星馳至息負骸歸葬事祖父母及母俱色養無闕姪育俊幼孤撫之如己子及長事凝祚稍不謹勿校也許仲盈蒲城人父歿廬墓三年母疾醫藥不效默禱於北辰願以身代兄早卒孤寡依仲盈為生卒撫孤成立嵗荒設社倉宗黨全活者甚衆宋希寅蒲城人家貧未學性篤孝瓦盆脫粟奉養必至常貿繩易餅以供膳父母相繼逝既葬希寅守塜三年穿土穴為居掘草根以食幾至滅性既釋服衆強之歸每登城望墓輒長號淚盡不已嘗見其父儼然在寢旋出門疾追至墓下訖不見又嘗恍惚見母來卧室牽衣而哭亦行至冡畔相失因慟絶野老為舁入土穴逾時始蘇先是希寅獨居土穴時有犬重鬈赤睛晝夜旋繞不去又有兩狼日蹲踞墓上馴若籬落間物又嘗於墓側種瓜烏啄鄰田瓜而希寅瓜獨無一損人皆謂至孝所感學使髙爾公造其廬禮之為作宋孝子傳屈琚字珮玉蒲城人少好讀書嘗負笈從盩屋李顒郿縣李柏遊二人皆器重之嵗辛未關中大飢琚館於鹿邑因擕家就食父疾卒琚痛幾死先送母歸蒲復至鹿邑扶父櫬徒步往來晝夜號泣不絶聲歸葬畢竟以哀毁致殞雷䥵字劍華蒲城副榜貢生少好學工古文辭性篤孝友執親喪哀毁骨立所遺産悉讓兩弟僦居數椽啼號不絶意恬如也季弟客死山左聞訃慟絶以歸骨為己任踉蹌衝雪而行既至為人傭書得金始扶櫬歸葬雷鐸字伯覺蒲城人康熙丙子舉人性孝事繼母尤謹值嵗歉負米他郡嘗終日不食不致母闕於供母病禱於家廟願減算益母夀家雖貧兄弟姑姊之貧者恆迎養不絶偶見同宗孀婦擕幼子行田畔即聚族人議曰族中少婦出行吾宗黨之責也倡衆議給薪米婦遂守節終身性好學嘗嚴冬就月下讀楚辭邑令助以膏火不受有府司馬攝蒲篆丁祭不至鐸抗詞爭之署令即馳至如禮四時家祭竭誠盡慎不以貧故少怠朔望聚族人習禮講法定例言二十條族人恪守之原進長蒲城人幼失母祖母董撫育之祖母病卧床進長朝夕事奉藥餌必親七年不懈事父愛敬交盡居喪不離苫塊既葬迎主歸朝夕哭奠歷三載如一日原文彩蒲城人父永貞晚得瘖疾卧床五載文彩傾資求醫百計不怠及卒喪葬盡禮繞墓號泣不能歸因廬墓側嘗曰吾父素性多畏今適中野不更畏乎用伴朝夕無使有畏而已永貞力學好著述有小學人物考十二卷歿後文彩為乞序以傳劉鳴珂字伯容蒲城諸生性孝友居貧養親極先意承志之樂與人交尤重氣誼故人屈琚歿母老無依有弟又不知所往鳴珂力為營葬并覔弟歸以養其母西河李重丙少年不偶因延致于家俾就讀後得為知名士蒲令汪兆鼎聘修邑志有富人挾重資凂為伊父作佳傳卒不許初鳴珂父襄謨友愛諸姪撫育如己子及卒呼子鳴珂玉珂諄諄以同居為囑今緦服同㸑食指六十餘人無間言皆襄謨遺訓也玉珂康熙辛卯舉人性行肫篤如其父兄王發祥耀州廩膳生孝友性成以父淑璟兄肇祥並死闖禍終身不飲酒茹葷不御內哀思痛悼無間嵗時暨死猶泫然曰吾今而始得見吾父吾兄也聞者盡為淚下宇文墱武功人少遭母喪哀毁等成人事父及繼母俱孝養不哀父老多病親奉湯藥者十餘年夜必侍寢父歿喪葬悉中禮哭過哀成疾而卒未卒前其弟死無子嗣以己子哭而言曰吾不早為弟後者望其生子耳今已矣聞者無不泫然雍正八年旌表李倬武功生員髙祖柏好施與敦義讓五傳至倬皆以孝友長厚著聞鄉里倬克承世德醇謹自持教子孫以孝弟其子孫亦克守家法親遜和睦同㸑歷七世食指九十餘人雍正十年建坊旌表特頒宸翰以示奬勵崔襟漢武功人父歿哀毁逾禮事母楊尤盡孝薄田躬耕晨昏養志母歿方在殯會大雨水漲欲漂其柩襟漢伏柩號呼水頓減得無恙先是會城有關中書院明馮恭定從吾講學所也西安守葉承祧遴取屬邑諸生入院襟漢為舉首以親老懇辭不就同邑馬鳴秋者亦葉守所拔士入院肄業一日忽心痛即星馳抵家則母於昨午抱微疾問家人吾子何日當歸正鳴秋心痛時也其誠感如此鳴秋樂善好施尤篤於親族士林重之襟漢增廣生鳴秋嵗貢生馬之騄武功諸生義烈性成族姪琾為永嘉令值耿逆叛閩中逆黨祖宏勳自溫應之琾不屈死琾子逸姿年尚幼之騄適在署挺身挈逸姿至琾死所枕尸而哭賊怒欲加以刃或曰此義士也釋之遂護其喪而歸同琾死者為溫處道陳丹赤其妻孥亦賴之騄保全第五憲文三水嵗貢生性至孝幼喪母哀毁如成人父歿事繼母尤盡子道弄雛舞綵母忘其非已出也歿後廬墓三年嵗時薦祭恆泣慕不衰賈文耀字彬彬淳化人幼隨父我琪居西安闖賊陷城舉家竄散文耀年十八冒鋒刃徒跣雨雪中負母任氏還淳未幾土賊郭君振破淳執我琪文耀請以身代不許縳至石門山復號泣求贖乃釋我琪囚文耀歷二載賊首憐其孝稍縱之得間逃歸父母皆無恙復勵志讀書餼於庠貢入成均葛俊字前山淳化人少失怙恃養于外大母趙趙素封欲以為嗣俊念祖父宗祧辭之明季徭役煩苦里多流亡經營賠纍人稱長者嵗荒糴粟以賑鄰族人皆德之子崇眀性篤孝髫年母病親侍湯藥嘗糞知不起即晝夜號泣不止俊歿崇眀年五十餘哀慕一如喪母時釋服日過慟一仆竟卒劉名翰長安人幼育於伯父母及長充淳邑營卒遂𨽻淳伯母病思食肉名翰向天默禱刲股為羮以進病立愈邑令文秉濂聞而異之奬以殊禮董明庠長武人性至孝母疾割股煮藥以進不令人知或問股何疾謝以他辭母疾遂愈邑令陳所抱旌其門李天隆鄜州生員父成秀有疾天隆割股和藥以進父疾遂愈劉宏譽洛川生員失怙善體母志母聞城北門將圮問狀遂終身不由母念姊及鄰媪家貧時時饋遺不闕又季姊早寡請同居贍之母疾醫藥罔效忽思黔婁事竊嘗糞告醫者曰糞極苦可治願更調藥病果愈以嵗貢授咸寧訓導劉克定中部人天性純孝方七嵗流冦執其祖克定號泣求代賊義之遂釋其祖父禋令河南登封罵賊不屈死克定年舞勺徒步千里外扶柩歸葬以明經授靈武訓導劉夔中部人順治二年賊丁崇福等作亂虜父入深山夔竭力贖之不得乃號哭於軍門誠動三軍遂擒斬渠魁八人保父以歸梁師舜字虞天中部人事繼母甚孝流冦李老才之亂師舜負母逃難嵗歉鬻子養母及歿寢苫枕塊三年不入內室食不成味禫後乃葬切切有餘哀劉􅕔字子鼎中部人年九嵗隨祖母及父山行遇虎父以身蔽祖母􅕔以身蔽父虎退而去十六嵗父亡母病􅕔日侍左右謝絶人事嘗曰人生應世之日長報親之日短况母老染疾可外出乎其純孝如此楊琮中部人五六嵗時見人毆其父輒泣跪求免人以為偶然再試之哀乞如故又執兵刃戲刺其父琮即以身迎創護救十五嵗父患癱疾醫藥罔效遇一道人云大蛇和藥可起時祁寒琮仰天哀禱忽見一蛇入穴中掘之果得大蛇和藥以進道人曰藥後糞味可驗琮即嘗之以告道人賀曰生矣皆爾孝心所感也劉克念字修吉中部廩生善事母居貧自得意氣遒上曰貧何負於我而自卑耶妻李氏亦同志後克念病革囑氏曰吾性剛忤物以有今日之貧此呱呱者將何賴氏慨然曰君負才不偶遺二子以清貧足矣吾當教子成立以報君于地下克念亡氏年二十三嵗歷三十餘年卒馬侊綏德諸生有文名闖逆陷西安欲授以偽官侊抱先人木主逃寧鄉山中賊怒索之兄企被掠死會王師至侊獲免家貧甚兼值兵荒侊一意奉親已粗糲恆不飽師友招之食不就也親殁時年幾七十既葬廬墓三年曠野嚴冬每伏冢哀號手足俱皸瘃雍正九年旌表髙如玉葭州人親疾傾産以事醫藥居喪幾至滅性伯父某年邁無子宦逰不歸如玉具資迎飬及殁營葬如禮弟早妖遺孤方幼撫之如己子州南談家坪地濵河最稱沃衍河身適當窪下不能行地乃捐金集衆鑿石引流以資灌溉州牧孫育竒等重其行義聘主義學如玉以師道自任生徒蔚起雍正九年旌表李在淑葭州人幼孤事母至孝母殁哀思尤終身不忘初赤貧及壯生業稍豐戚屬婚喪有不能自贍者必傾資周恤兄子若琮卒官一姊一妹俱貧寡在淑撫諸甥姪不使失所嘗刻朱子家訓及經驗良方等書行世語人曰此先慈遺命也其善則歸親類此雍正九年旌表陜西通志卷六十二
