body:
  text: 陜西通志卷六十人物六直諫周芮伯桑柔芮伯刺厲王也詩序芮伯畿內諸侯王卿士也字良夫毛詩箋厲王悅榮夷公芮良夫曰夫榮公好專利而不知大難夫王人者將導利而布之上下者也今王學專利其可乎匹夫專利猶謂之盜王而行之其歸鮮矣榮公為卿士諸侯不享國語虢文公宣王即位不藉千畝虢文公諫曰不可夫民之大事在農王事惟農是務三時務農一時講武乃能媚於神而和於民今天子欲修先王之緒而棄其大功匱神之祀而困民之財將何以求福用民王勿聽國語文公虢叔之後西虢也宣王都鎬在畿內也史記周本紀注左儒友於杜伯皆臣周宣王宣王殺杜伯而非其罪左儒爭之於王九復之而王勿許王曰别君而異友斯汝也左儒對曰臣聞之君道友逆則順君以誅友友道君逆則率友以違君王怒曰易而言則生不易而言則死左儒對曰臣聞古之士不枉義以從死不易言以求生臣能明君之過以死杜伯之無罪王殺杜伯左儒死之説苑家父作誦以究王訩式訛爾心以畜萬邦詩經小雅節南山家父刺厲王也詩序家父字周大夫也毛詩箋正義曰作詩刺王而自稱字者期於申寫下情冀上改悟而已家父盡忠竭誠不憚誅罰故自載字焉毛詩疏翟黃下邽人魏文侯與士大夫坐問曰寡人何如君也羣臣皆曰仁君也次至翟黃曰君非仁君也曰子何以言之對曰伐中山不以封君之弟而以封君之長子臣以此知之文侯大怒逐翟黃黃起而出次至任座文侯問寡人何如君也任座對曰仁君也曰子何以言之對曰臣聞之其君仁者其臣直向翟黃之言直臣是以知君仁君也文侯復召翟黃入拜為上卿新序甘龍秦大夫秦孝公欲用衛鞅之言恐大臣不從於是召衛鞅甘龍杜摯三大夫慮世事之變計正法之本使民之道公孫鞅曰君亟定變法之慮行之無疑甘龍曰不然臣聞聖人不易民而教智者不變法而治因民而教者不勞而功成據法而治者吏習而民安之今君變法不循故更禮以教民臣恐天下之議君願君熟慮之公孫鞅曰智者作法愚者制焉賢者更禮不肖者拘焉拘禮之人不足與言事制法之人不足與論治君無疑矣杜摯曰利不百不變法功不什不易器法古無過循禮無邪君其圖之公孫鞅曰治世不一道便國不必古反古者未可非循禮者未足多君無疑矣於是孝公違龍摯之善謀從衛鞅之過言新序漢馮唐其父徙安陵唐以孝著為中郎署長事文帝文帝曰吾居代時吾尚食監高袪數言趙將李齊之賢父知之乎對曰尚不如廉頗李牧之為將也上悅曰吾獨不得廉頗李牧為吾將唐曰陛下雖得廉頗李牧弗能用也上怒讓曰公何以知吾不能用也對曰臣竊聞魏尚為雲中守胸奴入尚擊之所殺甚衆上功幕府一言不相應文吏以法繩之臣愚以為陛下法太明賞太輕罰太重雖得廉頗李牧弗能用也帝説是日令馮唐持節赦魏尚復以為雲中守拜唐為車騎都尉景帝立為楚相免武帝立求賢良舉馮唐唐時年九十餘不能官以唐子遂為郎遂字王孫亦竒士史記本傳袁盎者楚人也字絲父徙安陵為郎中絳侯之國人上書告反諸公莫敢言惟盎明絳侯無罪得釋淮南厲王驕甚盎諫曰諸侯太驕必生患可削地上弗用王益橫謀反事覺遷之蜀至雍病死上哭甚哀盎入頓首請罪上曰以不用公言至此盎由此名重朝廷宦者趙同以幸常害盎盎患之盎兄子種為常侍騎説盎曰君廷辱之使其毁不用文帝出趙同參乘盎伏車前曰臣聞天子所與共六尺輿者皆天下豪英陛下獨奈何與刀鋸餘人載於是上笑下趙同帝從霸陵上欲西馳下峻阪盎攬轡曰陛下縱自輕奈高廟太后何上乃止上幸上林皇后慎夫人從及坐郎署長布席盎引卻慎夫人坐盎以數直諫不得久居中調為隴西都尉仁愛士卒皆爭為死遷齊相徙為吳相吳王厚遇盎盎告歸吳楚反聞鼂錯欲請治盎未決盎恐夜見竇嬰願至上前口對狀乃召入具言吳楚反狀獨斬錯以謝吳吳可罷錯誅吳楚已破上以元王子禮為楚王盎為楚相病免居家景帝時時使人問籌䇿梁王欲求為嗣盎進説其後語塞梁王怨盎使刺客殺盎安陵郭門外史記本傳錯已死謁者僕射鄧公為校尉擊吳楚還上書言軍事曰吳為反數十年矣發怒削地以誅錯為名其意非在錯也夫錯患諸侯強大請削地以尊京師萬世之利也計畫始行卒受大戮內杜忠臣之口外為諸侯報仇臣竊為陛下不取也帝默然良久曰公言善吾亦恨之乃拜鄧公為城陽中尉鄧公城固人也多竒計建元中上招賢鄧公起家為九卿謝病免歸子章以修黃老言顯諸公間鼂錯傳車千秋本姓田氏其先齊諸田徙長陵千秋為高寢郎會衛太子為江充所譖敗久之上急變訟太子寃是時上頗知太子惶恐無他意乃大感悟召見千秋曰父子之間人所難言公獨明其不然此高廟神靈使公教我立拜為大鴻臚數月遂為丞相封富民侯千秋敦厚有智居位自稱踰於前後數公昭帝初千秋年老上優之朝見得乘小車入宫殿中號曰車丞相子順官雲中太守漢書本傳徐福茂陵人霍氏奢侈上疏言霍氏泰盛陛下即愛之宜以時抑制無使至亡書三上輒報聞其後霍氏果滅而告霍氏者皆封人為福上書曰茂陵徐福數上書言霍氏且有變宜防絶之向使説得行則國無裂土出爵之費臣無逆亂誅滅之敗今往事既已而福獨不蒙其功唯陛下察之書奏上賜福帛十匹復以為郎漢書霍光傳史丹字君仲魯國人徙杜陵祖父恭有女弟武帝時為衛太子良娣産悼皇考宣帝即位恭已死三子高曾元皆以外屬舊恩封侯宣帝即位拜高為車騎將軍領尚書事帝崩太子襲尊號是為元帝高薨諡曰安侯元帝為太子時丹為中庶子侍從十餘年元帝即位為駙馬都尉侍中上以丹舊臣詔丹護太子家是時傅昭儀子定陶共王有才藝王皇后無寵元帝嘗隤銅丸以摘鼓定陶王亦能之上數稱其材丹曰所謂材者敏而好學皇太子是也帝默然中山哀王薨太子前弔不哀上大恨丹曰臣見陛下哀痛中山王至以感損向者太子進見臣竊戒無涕泣感傷陛下罪乃在臣上意解竟寧元年上寢疾數問尚書以景帝時立膠東王故事丹以親密臣得侍疾候上間獨寢時直入臥內頓首涕泣言曰皇太子以適長立積十餘年名號繫於百姓天下莫不歸心今道路流言以為太子有動搖之議審若此公卿以下必不奉詔臣願先賜死以示羣臣上意大感曰吾無有此議都尉安所受此語丹頓首曰愚臣妄聞罪當死上謂丹善輔導太子無違我意丹噓唏而起太子由此遂為嗣矣成帝即位遷右將軍後徙左將軍光祿大夫封武陽侯丹為人足知愷悌愛人貌若儻蕩不備然心甚謹飭故尤得信於上為將軍前後十六年以病歸第數月薨諡曰頃侯漢書本傳張猛字子遊城固人以光祿大夫給事中侍元帝當廟祭濟渭欲御樓船御史大夫薛廣德當車免冠乞剄血汙車輪帝不悅猛進曰主聖則臣直今乘船危就橋安聖主不乘危故大夫言之帝曰曉人不當如是邪後為幸臣𢎞恭石顯所譛毁猛自殺漢中士女志平當字子思祖父自下邑徙平陵當以明經為博士公卿薦當議論通明給事中每有災異當輒傅經術言得失元帝時韋玄成為丞相奏罷太上皇寢廟園當上書言太上皇漢之始祖後嗣所宜尊奉上納其言復太上皇寢廟園頃之使行流民幽州舉奏刺史二千石勞徠有意者言渤海鹽池且勿禁以救民急所過見稱纍遷大鴻臚先是太后姊子淳于長白言昌陵不可成當以為作治連年可遂就上既罷昌陵以長首建忠䇿議封長當又以為長雖有善言不應封爵之科左遷巨鹿太守當以經明禹貢使行河為騎都尉領河隄哀帝即位徴當為光祿大夫至丞相賜爵關內侯明年卒子晏以明經歷位大司徒封防鄉侯漢書本傳杜欽字子夏延年子杜陵人少好經書目偏盲茂陵杜鄴與欽同姓字俱以才能稱京師故衣冠謂欽為盲杜子夏以相别欽惡以疾見詆乃為小冠由是京師更謂欽為小冠杜子夏大將軍王鳳請欽為大將軍武庫令欽為人深博有謀自上為太子時以好色聞及即位皇太后詔采良家女欽説大將軍鳳曰禮一娶九女所以極陽數廣嗣重祖也將軍輔政宜建九女之制詳擇有行義之家求淑女之質無必有聲色音技能為萬世大法鳳白之太后太后以為故事有無欽復重言鳳不能自立法度但循故事而已後有日蝕地震之變詔舉直言欽上對曰陛下正后妾抑女寵防奢泰去佚遊躬節儉親萬事如此即堯舜不足比隆咎異何足消滅欽以病罷後徴詣大將軍幕府數稱達名士王駿韋安世王延世等救解馮野王王尊胡常之罪過及繼功臣絶世鎮撫四夷當世善政多出於欽者以壽終漢書杜周傳朱雲字遊魯人徙平陵年四十從博士白子友受易又事前將軍蕭望之受論語皆能傳其業好倜儻大節是時少府五鹿充宗貴幸為梁邱易元帝好之欲考其異同令充宗與諸易家論會有薦雲者召入抗首而請音動左右既論難連拄五鹿君繇是為博士遷杜陵令坐故縱亡命會赦舉方正為槐里令數上疏言丞相韋元成容身保位元成言雲暴虐無狀雲遂廢成帝時丞相故安昌侯張禹以帝師位特進甚尊重雲上書曰臣願賜尚方斬馬劒斷佞臣一人以厲其餘上問誰也對曰安昌侯張禹上大怒御史將雲下雲攀殿檻檻折呼曰臣得下從龍逢比干遊足矣左將軍辛慶忌叩頭殿下曰此臣狂直使其言是不可誅其言非固當容之上意解得已後當治檻上曰勿易因而輯之以旌直臣後不復仕常居鄠年七十餘終於家漢書本傳班伯况子長安人少受詩於師丹大將軍王鳳薦伯宜勸學拜為中常侍遷奉車都尉定襄太守歲餘徴伯伯道病中風既至以侍中光祿大夫養病賞賜甚厚起視事自富平定陵侯張放淳于長等愛幸設宴飲之會皆引滿舉白談笑大噱時乘輿幄坐張畫屏風畫紂醉踞妲已作長夜之樂上顧指畫而問伯伯曰沈湎於酒微子所以告去也式號式呼大雅所以流連也詩書淫亂之戒其原皆在於酒上乃喟然歎曰吾久不見班生今日復聞讜言放等因罷出遷水衡都尉侍中每朝東宫常從及有大政俱使諭指於公卿病卒弟稚少為黃門郎中常侍方直自守成帝季年立定陶王為太子數遣中盾請問近臣稚獨不敢答哀帝即位遷廣平相平帝即位太后臨朝莽秉政方欲文致太平使使者分行風俗采頌聲而稚無所上大司空甄豐劾稚絶嘉應嫉害聖政不道稚上書願歸相印入補延陵園郎太后許焉漢書敘傳王嘉字公仲平陵人以明經射䇿甲科為郎鴻嘉中舉敦朴能直言召見宣室對政事得失超遷大中大夫出為九江河南太守治甚有聲遷御史大夫建平三年為丞相封新甫侯嘉為人剛直嚴毅有威重上甚敬之哀帝初立嘉上疏薦儒者公孫光滿昌及能吏蕭咸薛修等天子納而用之時侍中董賢愛幸欲因東平事以封賢嘉上封事上感其言止後日食嘉復奏封事上寢不悅而愈愛賢會傅太后薨上因託傅太后遺詔益封賢嘉封還詔書因諫上上怒召詣廷尉嘉喟然曰幸得充備宰相不能進賢退不肖以是負國死有餘責繫獄二十餘日不食死元始四年追録忠臣封嘉子崇為新甫侯諡嘉為忠侯漢書本傳鄭崇字子遊本髙密大族祖父徙居平陵父賔明法律為御史名公直崇少為郡文學史哀帝擢為尚書僕射數諫爭上初納用之每見曵革履上笑曰我識鄭尚書履聲久之上欲封祖母傅太后從弟商崇諫曰今無故封商壞亂制度逆天人心非傅氏之福崇又以董賢貴寵過度諫由是重得罪尚書令趙昌佞讇素害崇奏崇與宗族通疑有姦上責崇曰君門如市又何以欲禁切主上崇對曰臣門如市臣心如水願得考覆上大怒下崇獄窮治死獄中漢書本傳郭欽隃麋人哀帝時為丞相司直奏免豫州牧鮑宣京兆尹薛修等又奏董賢左遷盧奴令平帝時遷南郡太守王莽時以病免官漢書鮑宣傳張湛字子孝平陵人矜嚴好禮動止有則三輔以為儀表成哀間為二千石建武初為左馮翊在郡修典禮設條教政化大行後五年拜光祿勳光武臨朝有惰容湛輒陳諫其失嘗乘白馬帝每見湛輒言白馬生且復諫矣代王丹為太子太傅及郭后廢因稱疾不朝後數年卒後漢書本傳申屠剛字巨卿茂陵人七世祖嘉文帝時丞相剛質性方直慕史鰌汲黯之為人王莽篡位避地河西轉入巴蜀及隗囂據隴右欲背漢剛説之歸國囂不納建武七年詔書徴剛拜侍御史遷尚書令光武嘗欲出遊剛以隴蜀未平不宜宴安逸豫諌不聽遂以頭軔乘輿輪帝遂止時帝法理嚴察羣臣莫敢正言剛輒極諫失旨出為平隂令復徴拜大中大夫以病去官卒於家後漢書本傳朱勃扶風人馬援卒帝追收新息侯印綬賔客故人莫敢弔會援同郡朱勃詣闕上書願下公卿平援功罪宜絶宜續以厭海內之望書奏報歸田里勃字叔陽年十二能誦詩書常候援兄況方領矩步辭言嫻雅援裁知書見之自失況酌酒慰援曰朱勃小器速成智盡此耳卒當從汝稟學勿畏也勃未二十右扶風請試守渭城宰及援為將軍封侯勃位不過縣令援雖貴常待以舊恩及援遇讒惟勃能終焉後漢書馬援傳樂恢字伯竒長陵人父親為縣吏得罪於令收將殺之恢年十一伏寺門晝夜號泣令聞而矜之即解出親長好經學事博士焦永閉廬精誦不交人物遂為名儒性廉直介立行不合已者雖貴不與交後仕本郡為功曹選舉不阿徴拜議郎會竇憲出征胸奴恢數上書諫爭朝廷稱其忠入為尚書僕射刺舉無所回避憲兄弟放縱恢上書諫不省乃稱疾乞歸竇憲風厲州縣迫脅遂飲藥死竇氏誅門生何融等上書陳恢忠節除子已為郎中後漢書本傳已字伯文為郎非其好也去官三輔決録注何敞字文髙平陵人元和中辟太尉宋由府司徒袁安深重之時京師及四方纍有竒異鳥獸草木言事者以為瑞敞通經傳言於二公曰瑞應依德而至災異緣政而生今異鳥翔於殿屋怪草生於庭際不可不察居無何而肅宗崩以髙第拜侍御史數切諫言諸竇罪過憲等深怨之出為濟南太傅敞至國輔以道義數引法度諫正之遷汝南太守以寬和為政分遣儒術大吏案行屬縣百姓化其恩禮修理鮦陽舊渠墾田增三萬餘頃遷五官中郎將後漢書本傳李法字伯度南鄭人博通羣書性剛而有節永元九年應賢良方正對䇿除博士遷侍中光祿大夫歲餘上疏以為朝政苛碎宦官權重椒房寵盛又譏史官記事不實坐失旨免還鄉里在家八年徴拜議郎諫議大夫正言極辭無改於舊出為汝南太守政有聲迹後歸卒於家後漢書本傳朱寵字仲威京兆人篤行好學從桓榮授尚書後漢書桓榮傳注鄧隲死大司農朱寵痛隲無罪遇禍乃肉袒輿櫬上疏追訟曰伏惟和熹皇后聖善之德為漢文母兄弟忠孝同心憂國歷世外戚無與為比而橫為宫人單辭所陷罪無申證獄不訊鞫遂令隲等罹此酷濫率土喪氣宜收還冢次寵樹遺孤奉承血祀以謝亡靈寵知其言切自致廷尉詔免官歸田里順帝即位擢寵為太尉録尚書事寵初辟隲府稍遷潁川太守治理有聲拜太尉封安鄉侯甚加優禮鄧隲傳蘇章字孺文平陵人祖父純字桓公有髙名三輔號為大人官南陽太守章少博學能屬文安帝時舉賢良方正對䇿髙第為議郎數陳得失出為武原令歲飢輒開倉廪活三千餘戶順帝時遷冀州刺史故人為清河太守章行部案其姦臧乃請太守為設酒肴陳平生之好甚歡曰今夕蘇孺文與故人飲者私恩也明日冀州刺史案事者公法也遂舉正其罪州境望風畏肅換為并州刺史以摧折權豪坐免後漢書本傳魏齊卿扶風人危言深論不隱豪強自公卿以下莫不畏其貶議屣履到門漢書黨錮傳敘陳雅字伯臺城固人靈帝時為諫大夫閹宦用事上疏不省出為巴郡太守年七十五卒臨終戒子薄葬漢中士女志楊竒震曾孫華隂人靈帝時為侍中帝嘗從容問曰朕何如桓帝對曰陛下之於桓帝亦猶虞舜比德唐堯帝不悅曰卿強項真楊震子孫死後必復致大鳥矣出為汝南太守帝崩復入為侍中衛尉從獻帝西遷有功勤及李傕脅帝歸其營竒潛誘傕部曲楊昂等令反傕傕由此孤弱帝乃得東後徙都許追封竒子亮為陽成亭侯後漢書楊震傳趙戩字叔茂長陵人質而好學辟公府入為尚書選部郎董卓欲以所私並充臺閣戩拒不聽卓怒欲殺之觀者皆為戩懼而戩自若及見卓引辭正色陳説是非卓屈而謝之遷平陵令故將王允被害莫敢近者戩棄官收斂之三輔亂戩客荆州曹公平荆州辟為掾後為相國鍾繇長史年六十餘卒典略魏楊偉字世英馮翊人明帝治宫室偉諫曰今作宫室斬伐生民墓上松柏毁壞碑獸辜及亡人傷孝子心不可以為後世法則世語曹爽秉政鄧揚等欲爽立威名勸使伐蜀爽乃西至長安發卒從駱谷入關中轉輸不能供兵不得進參軍楊偉為爽陳形勢宜急還揚與偉爭於爽前偉曰揚將敗國事可斬也爽乃引還魏志曹爽傳傅嘏字蘭石泥陽人伯父巽黃初中為侍中尚書嘏弱冠知名正始初除尚書郎遷黃門侍郎時曹爽秉政何晏與嘏不平因微事免嘏官司馬宣王請為從事中郎曹爽誅為河南尹遷尚書時論者議欲自伐吳詔以訪嘏嘏對曰賊君臣偽立吉凶同患設令列船津要堅城據險橫行之計其殆難捷未若明法練士措計於全勝之地也後吳諸葛恪新破關東乘勝欲向青徐朝廷將為之備嘏以為淮海非賊輕行之路不過遣偏率小將乘海泝淮示動青徐恪自並兵來向淮南耳後恪果圖新城不克而歸嘏常論才性同異鍾會集而論之嘉平末賜爵關內侯進封武鄉亭侯母丘儉文欽作亂或以司馬景王不宜自行唯嘏勸之景王遂行以嘏守尚書僕射俱東儉欽敗嘏有謀焉以功進封陽鄉侯薨諡曰元侯魏志本傳晉杜錫字世嘏預子杜陵人少有盛名起家長沙王文學纍遷太子中舍人性亮直忠烈屢諫愍懷太子言辭懇切太子患之置針著錫常所坐氊中刺之流血他日太子問錫錫對醉不知後轉衛將軍長史趙王倫篡位以為治書御史孫秀求交於錫錫拒之秀憚其名高不敢害惠帝反正遷尚書左丞卒晉書杜預傳傅玄字休奕泥陽人祖燮漢漢陽太守父韓魏扶風太守玄少孤貧博學善屬文性剛亮徑直不能容人之短舉秀才除郎中遷𢎞農太守所居稱職數上書陳便宜多所匡正武帝為晉王以玄為散騎常侍及受禪加駙馬都尉玄上疏曰近者魏武好法術天下貴刑名魏文慕通達天下賤守節今陛下聖德龍興受禪臣又奚言惟未舉清逺有禮之臣以敦風節未退虛鄙以懲不恪臣是以猶敢有言詔使玄草詔進之玄復上疏帝下詔曰常侍懇懇於所論可謂乃心欲佐時益者也泰始四年以為御史中丞復上便宜五事遷太僕卿時比年不登羌胡擾邊詔公卿會議玄陳事切直轉司𨽻校尉玄天性峻急不能容物每有劾奏或值日暮捧白簡整簮帶踈踊不寐坐而待旦於是貴遊斂迹臺閣生風卒諡曰剛子咸字長虞剛簡有大節風格峻整疾惡如讎推賢樂善咸寧初襲父爵拜太子洗馬出為冀州刺史遷司徒左長史在位多所執正轉車騎司馬咸以世俗泰侈上疏曰奢侈之費甚於天災欲時之儉當詰其奢又議移縣獄於郡及二社應立朝廷從之遷御史中丞會詔舉郡縣補內官咸上書曰興化之要在於官人競內薄外遂成風俗此弊誠宜急革使內外通塞無偏耳咸再為本郡中正遭繼母憂去官頃之起以議郎長兼司𨽻校尉時朝廷寬弛豪右恣放咸奏免河南尹淡左將軍倩等京都肅然咸以長吏到官未幾便遷百姓困於無定吏卒疲於迎送時僕射王戎兼吏部咸奏戎不能寧謐風俗請免官吳郡顧榮曰傅長虞徑直忠果劾按驚人雖非周才偏亮可貴也元康四年卒官子敷睎纂敷字頴根清靜有道素解屬文元帝引為從事中郎睎亦有才思為上虞令甚有政績卒於司徒西曹屬晉書本傳北魏楊昱字元晷椿子華陰人起家廣平王懷左常侍王好武事出遊獵昱每規諫後除散騎侍郎延昌三年以本官帶詹事丞時肅宗在懷抱中出入左右乳母而已不令宫寮知昱諫曰臣等備位宫城太子動止宜令翼從陛下若召太子必降手敕令臣下咸知為後世法詔曰自今已後非朕手敕勿令兒出宫臣在直者從至萬歲門久之轉太尉掾兼中書舍人靈太后從容謂昱曰今帝年幼朕親萬幾卿有所聞慎勿隱諱昱於是奏揚州刺史李崇載貨恆州刺史楊鈞造銀食器具並餉領軍元義太后召義泣責之孝昌初遷給事黃門侍郎賊圍豳州詔昱兼侍中持節催大都督北海王皓仍隨軍監察豳州圍解雍州賊張映薑神達知州內空虛謀欲攻掩刺史元修請援都督李叔仁遲疑不赴昱曰長安關中基本若長安不守大軍雖往何益遂與叔仁等俱進斬神達餘悉奔散孝莊入洛昱為東道行臺後歸鄉里為爾朱天光所害子孝雍員外郎走匿蠻中結渠帥謀誅爾朱氏微服入洛世隆收殺之魏書楊播傳隋王韶字子相世居京兆幼方雅好竒節在周纍以軍功至儀同三司高祖受禪進爵項城郡公晉王廣鎮并州除行臺右僕射性剛直王甚憚之王穿池起三山韶自鎖而諫王謝而罷之平陳之役支度軍機無所擁滯及尅金陵韶即鎮焉秦王俊為並州總管仍為長史歲餘馳驛入京勞敝而卒高祖甚傷惜之命取子相封事數十紙傳示羣臣上曰其直言匡正禆益甚多吾每披尋未嘗釋手子士隆慷慨有父風官至備身將軍數討擊山賊往往有捷王世充僣號士隆憂憤疽發背卒隋書本傳韋焜京兆人為民曹屢進讜言隋書髙構傳唐蕭瑀字時文後梁明帝子也以女兄為隋晉王妃故入長安愛經術善屬文性鯁急鄙逺浮華拜內史侍郎數言事忤旨見忌出為河池郡守髙祖入京師挈郡自歸拜民部尚書秦王領右元帥攻洛陽署瑀府司馬武德元年遷內史令帝委以樞管內外百務悉關決瑀自力孜孜抑過繩違無所憚上每見納用手詔曰得公言社稷所賴朕既寶之故賜黃金一函公其勿辭是歲州置七職秦王為雍州牧瑀為州都督詔嘗下中書未即行帝讓其稽瑀曰隋季內史詔敕多違舛百司不知所承今朝廷初基所以安危者繫號令比承一詔必覆審使先後不謬始得下此所以稽留也帝曰若爾朕何憂乎王世充平進尚書右僕射貞觀初房玄齡杜如晦新得君瑀不能無少望太宗怒廢於家俄復為僕射帝問瑀朕欲長保社稷奈何瑀曰三代有天下所以能長久者類封建諸侯以為屏藩秦置守令二世而絶漢分王子弟享國四百年魏晉廢之亡不旋跬此封建之有明效也帝納之始議封建遷御史大夫參預朝政瑀諭議明辨然不能容人短意或偏駁不通而向法深罷為太子少傅復為太常卿拜河南道巡省大使九年復參預政事帝嘗曰武德季太上皇有廢立議顧朕挾不賞之功於昆弟弗見容瑀於爾時不可以利怵死懼社稷臣也因賜詩曰疾風知徑草板蕩識誠臣又曰守道耿介古無以過然善惡太明或有時而失瑀頓首謝曰既蒙教又許以忠亮雖死日猶生年也晉王為皇太子拜太子太保同中書門下三品瑀中狹每燕見輒言房玄齡等朋黨帝為瑀曉解瑀以帝有所偏信帝積久亦不平詔奪爵下除商州刺史卒遺命斂以單衣無卜日詔陪葬昭陵諡曰肅子鋭太常少卿唐書本傳蘇世長武功人祖彤仕後魏通直散騎常侍父振周宕州刺史父死王事有詔襲爵入隋為長安令數條上便宜大業末為都水少監督漕上江煬帝被弒發喪慟聞行路洛陽平始歸拜諫議大夫從獵涇陽大獲帝詫左右曰今日畋樂乎世長曰陛下廢萬幾事遊獵不滿十旬未為樂也帝色變既而笑曰狂態發耶曰為臣計則狂為陛下計忠矣又侍宴披香殿酒酣進曰此煬帝作耶帝曰卿好諫似直然詐也豈不知此殿我所營耶對曰臣見傾宫鹿臺非受命聖人所為天下厭隋侈以歸有道今乃即其宫加雕飾焉欲易其亂得乎帝咨重其言貞觀初出為巴州刺史舟敗溺死子良嗣髙宗時為周王府司馬王年少不法良嗣數諫王以法繩府官不職者甚見尊憚遷荆州長史帝遣宦者采竹江南所過縱暴至荆州良嗣囚之上書言狀帝下詔慰奬徙雍州良嗣政尚嚴每盜發三日內必禽號稱神明垂拱初拜納言封溫國公留守西京尚方監裴匪躬案諸苑建言鬻果蔬儲利良嗣曰公儀休一諸侯相拔葵去織未聞天子賣果蔬與人爭利遂止遷文昌左相同鳳閣鸞臺三品遇薛懷義於朝懷義偃蹇良嗣怒叱左右批其頰曵去武后聞之戒曰第出入北門彼南衙宰相行來毋犯之卒年八十三子踐官太常丞為酷吏所陷子務元終長史唐書本傳韋挺萬年人父沖仕隋為民部尚書挺少與隱太子善高祖平京師署隴西公府祭酒貞觀初王圭數薦之拜御史大夫是時承隋大亂風俗薄惡挺上疏曰父母之恩昊天罔極今衣冠上族辰日不哭謂為重喪親賔來弔輒不臨舉又閭里細人每有重喪不即發問先造邑社待營辦具乃始發哀既葬鄰伍會集酣醉名曰出孝夫婦之道王化所基故有三日不息燭不舉樂之感今婚嫁之初雜奏絲竹以窮宴歡官司習俗弗為條禁望一切懲革申明禮憲俄為黃門侍郎改太常卿以怨望貶象州刺史卒子待價安息道行軍大總管萬石遷纍太常少卿號任職後知吏部選事唐書本傳權萬紀萬年人父琢玠隋匡州刺史以願慤聞萬紀幸直廉約自潮州刺史擢治書侍御史僕射房玄齡侍中王圭掌內外官考萬紀劾其不平太宗以為不阿貴近由是奬禮萬紀又建言宇文智及受隋恩賊殺其君萬世共棄今其子乃任千牛請斥屏以懲不軌帝從之徙散騎常侍久之徙吳王長史王畏其直善遇之齊王祐不奉法帝素竒萬紀能左右吳王乃徙為祐長史祐比䁥羣小萬紀驟諫不入即條過失以聞祐恐與所嬖燕𢎞亮謀殺之贈武都郡公諡曰敢子元初髙宗時兵部侍郎唐書本傳于志寧字仲謐髙陵人髙祖入關率羣從迎謁遷天䇿府中郎文學館學士貞觀三年為太子左庶子太子承乾數有過惡志寧欲救止之上諫苑以諷俄兼詹事以母喪免帝遣中書侍郎岑文本敦譬就職時太子以農時造曲室又好音樂過度志寧諫不納又私引突厥與相狎比志寧上疏極言太子大怒遣張師政紇干承基往刺之二人入其第見志寧憔然在苫塊中不忍殺乃去太子敗帝知狀謂曰聞公數諫承乾不聽公故至此時宫臣皆罪廢獨志寧蒙勞勉晉王為皇太子復拜左庶子遷太傅拜太子太師卒諡曰定唐書本傳蕭鈞瑀從子長安人有才譽永徽中纍遷諫議大夫𢎞文館學士盧文操跳堞盜庫財髙宗以其職主幹當自盜罪死鈞曰囚罪誠死然恐天下聞謂陛下重貨輕法任喜怒殺人帝曰真諫議也詔原死太常工為宫人通訊遺詔殺之且附律鈞言禁當有漸雖附律工不應死帝曰如姬竊符朕以為戒今不濫工死然喜得忠言即宥工徙逺夷終太子率更令子瓘為渝州長史居母喪以毁卒鈞兄子嗣業纍擢鴻臚卿單于都護府長史唐書蕭瑀傳楊𢎞武𢎞禮弟華陰人永徽中纍為吏部郎中擢司戎少常伯遷西臺侍郎帝嘗讓曰爾在戎司授官多非其才何也對曰臣妻剛悍此其所屬不敢違諷帝用后言也帝笑不罪乾封二年同東西臺三品𢎞武謙慎自守居職以清簡稱卒諡曰恭三子元亨元禧元禕並至刺史唐書楊𢎞禮傳姚班璹弟萬年人篤學有立志擢明經歷六州刺史政皆有績遷太子詹事時節愍太子稍失道班凡四上書諫太子雖稱善不能用其言及敗索宫中得班諫書中宗嘉嘆擢右散騎常侍遷祕書監睿宗立拜戶部尚書卒年七十唐書姚思廉傳韓瑗字伯玉三原人父仲良刑部尚書潁川縣公瑗少負節行貞觀中以兵部侍郎襲爵永徽三年遷黃門侍郎進侍中兼太子賔客王后之廢瑗雪泣言曰皇后乃陛下在藩時先帝所娶今無罪輒廢非社稷計不納明日復諌帝大怒詔引出褚遂良貶潭州瑗上言遂良受先帝顧託願寬無辜以順衆心帝不聽瑗憂憤自表歸田里不報顯慶二年貶振州刺史卒自瑗與遂良死內外以言為諱將二十年唐書本傳袁利貞朗從祖弟長安人高祖時為周王侍讀王立為太子帝欲大會羣臣命婦合宴宣政殿設九部伎散樂利貞上疏諫以為前殿路門非命婦宴會倡優進御之所請徙命婦别殿九部伎從左右門入罷散樂不進帝納之既會詔利貞曰卿奕葉忠鯁能抗疏規朕之失賜物百段擢祠部員外郎卒唐書袁朗傳王琳字方慶周石泉公褒曾孫家咸陽父𢎞直為漢王元昌友元昌畋獵無度上疏切諫元昌漸見踈斥轉荆王友龍朔中卒方慶年十六起家越王府參軍永淳中纍遷太僕少卿則天臨朝拜廣州都督管內諸州首領舊多貪縱百姓詣府稱寃府官先受首領參餉未嘗鞫問方慶絶其交往首領縱暴者悉繩之境內清肅證聖元年召拜洛州長史萬歲登封元年遷鸞臺侍郎同平章事俄轉鳳閣侍郎則天幸玉泉寺以山徑危懸欲御腰輿而上方慶諫曰昔漢元帝嘗出便門御樓船光祿勳張猛奏曰乘船危就橋安元帝從橋今山徑危險石路曲狹比於樓船安危不等伏望停輿駐蹕則天納其言而止又舉令期功喪未葬不預朝賀未終喪不預宴會比來朝官不遵禮法名教既虧實玷皇化伏望申明令式禁斷從之方慶以老疾乞間乃授麟臺監修國史封石泉公卒諡曰貞方慶博學好著述尤精三禮酬答咸有典據舊唐書本傳王石泉居相時子為眉州司士天后嘗問曰卿子何逺乎對曰廬陵是陛下愛子今猶在逺臣之子焉敢相近會昌一品集方慶孫俌明經辟范陽節度使張守圭幕府時契丹屈烈部將謀入寇河北騷然俌至虜中脅説禍福虜乃不入安祿山叛拜博陵常山太守副河北招討使卒唐書本傳李昭德長安人父乾祐貞觀初為殿中侍御史鄃令裴仁軌私役門卒太宗欲斬之乾祐曰法令與天下共之仁軌以輕罪置極刑非畫一之制由是免死母卒廬墓側負土成墳帝遣使就弔表其閭歷治書侍御史有能名免官卒昭德強幹有父風擢明經纍官鳳閣侍郎同平章事武承嗣任文昌左相昭德諫曰承嗣已王不宜典機衡以惑衆庶乃罷洛陽人王慶之請以承嗣為皇太子后遣昭德詰其故昭德笞殺慶之奏曰自古有姪為天子而為姑立廟乎陛下承天皇顧託而有天下又立承嗣臣見天皇不來食矣后乃止有人獲洛水白石而赤文者獻闕下曰此石赤心故以獻昭德叱曰洛水餘石豈盡能反邪時來俊臣侯思止舞文法數誅陷大臣人皆懾懼昭德每奏其誣罔不道狀卒榜殺思止其黨稍摧沮萬歲通天二年來俊臣誣以逆謀既而俊臣亦下獄同日誅衆庶莫不寃昭德而快俊臣建中三年贈司空唐書本傳田歸道仁會子長安人明經及第纍擢內供奉左衛郎將突厥默啜請和武后詔將軍閻知微册可汗號默啜又遣使謝知微遇諸道即與緋袍銀帶因表使者即到請備禮廷賜歸道諫曰知微擅賜使朝廷何以加之宜敕初服須天子命后從焉默啜將至單于都護府詔歸道攝司賔卿往勞之默啜請六胡州及都護府地不得執歸道將害之歸道辭色不撓為陳禍福默啜悔以禮遣歸歸道還具陳默啜不臣狀請備邊已而果反乃擢歸道夏官侍郎遷左金吾將軍押千騎宿衛玄武門桓彥範誅二張歸道不豫聞及索騎士拒不應事平彥範欲誅之以辭直免中宗壯其守召拜太僕少卿遷右金吾將軍卒諡曰烈子賔庭開元時至光祿卿唐書田仁會傳韋月將京兆人武三思得幸於中宗月將不堪憤激上書告其事中宗怒流於嶺南尋使人殺之大唐新語蘇珦藍田人中明經第調鄠尉鄠多訟珦裁決明辨垂拱初為監察御史武后殺韓魯諸王付珦密牒按訊珦推之無狀或言珦助韓魯者后詰之挺議無所撓詔監軍河西五遷右司郎中御史王𢎞義附來俊臣為酷世莫敢觸其鋒珦按奏𢎞義坐免進左肅政臺御史大夫中宗將斬韋月將珦執據時令不可大戮忤三思意出為岐州刺史復為右臺大夫會節愍太子敗時睿宗居藩為獄辭牽逮珦密啓保辨帝感悟多所舍貸擢户部尚書致仕卒諡曰文唐書本傳韋湊字彥宗萬年人祖叔諧貞觀中為庫部郎中與弟吏部郎中叔謙兄主爵郎中季武號三列湊永淳初解褐婺州參軍事遷揚州法曹州人孟神爽豪縱數犯法交通貴戚吏莫敢繩湊按治杖殺之逺近稱服六遷司農少卿睿宗立徙太府兼通事舍人時改葬故太子重俊有詔加諡又詔雪李多祚等罪議贈官湊上言宜易諡以合經禮多祚等罪云免而不云雪帝瞿然罷多祚等贈官景雲初作金仙等觀湊諌以為農月興功傷伐甚多非仁聖本意出為陜汝岐三州刺史開元初欲建碑靖陵湊以古園陵不立碑又方旱不可興工諫而止遷將作大匠詔復孝敬皇帝廟號義宗湊諫孝敬皇帝未嘗南面無稱宗之義遂罷遷右衛大將軍徙太原尹卒諡曰文子見素字會微及進士第擢諫議大夫天寶五載為江西山南黔中嶺南道黜陟使繩糾吏治所至震畏遷文部侍郎銓敘平允十三載詔拜武部尚書同平章事集賢院學士知門下省事祿山表請蕃將三十二人代漢將帝許之見素謂楊國忠曰難將作矣國忠不應見素曰知禍之芽不能防見禍之形不能制焉用彼相明日當懇論之既入流涕具陳詔曰朕徐圖之由是每進見未嘗不為帝言未幾祿山反從帝入蜀詔兼左相封豳國公肅宗立與房琯崔渙持節奉傳國璽及册宣揚制命明年三月拜尚書左僕射徙太子太師詔至蜀郡奉迎太上皇以功食實封三百戶寶應元年卒贈司徒諡忠貞子諤歷京兆府司録參軍國忠死兵聚不解陳元禮請殺貴妃以安衆心帝猶豫諤陳曰臣聞以計勝色者昌以色勝計者亡今宗廟震驚陛下惟割恩以安社稷因叩頭流血帝悟賜妃死軍乃大悅尋擢御史中丞後終給事中唐書本傳韓休長安人父大智洛州司功參軍其兄大敏仕武后為鳳閣舍人梁州都督李行褒為部人告變詔大敏鞫治或曰行褒諸李近屬后意欲去之無列其寃大敏至驗出之后怒遣御史覆按卒殺行褒而大敏賜死休工文辭舉賢良中乙科擢左補闕進至禮部侍郎知制誥出為虢州刺史遷尚書右丞拜黃門侍郎同平章事休直方不務進趨既為相天下翕然時政得失言之未嘗不盡帝嘗稍過差必視左右曰韓休知否已而疏至嘗引鑑不樂左右曰自韓休入朝陛下無一日歡何不去之帝曰吾雖瘠天下肥矣卒諡文忠贈太子太師唐書本傳李尚隱其先出趙郡徙貫萬年舉明經調下邽主簿神龍中擢左臺監察御史崔湜鄭湆典部選附勢幸銓擬不平尚隱劾其罪湜等皆斥去睦州刺史馮昭泰性鷙刻人憚其強嘗誣繫桐廬令李師旦二百餘家為妖蠱有詔御史覆驗皆稱病不肯往尚隱請行果雪其寃進御史中丞御史王旭招權稍不制仇家告其罪尚隱窮治具得姦贓無假借遂抵罪遷河南尹尚隱性剛亮論議皆披心示誠處事分明御下不苛尤詳練故實前後制令誦記無遺以太子賔客卒諡曰貞唐書本傳唐紹臨孫長安人神龍時為太常博士遷左臺侍御史度支員外郎韋庶人請妃公主命婦以上葬給鼓吹詔可紹言鼓吹本軍容黃帝戰涿鹿以為警衛惟功臣詔葬得兼用之請置前詔用舊典不省中宗始郊國子祭酒祝欽明等奏以皇后亞獻安樂公主終獻紹固爭帝又詔武氏陵及諸武墓皆置守戶紹請罷之又言比羣臣務厚葬下逮衆庶流蕩成俗願按令切敕裁損凡明器不許列衢路惟陳墓所昏家盛設障車擁道為戲樂傷化紊禮不可示天下事雖不從議者美嘆睿宗即位數言政事損益再遷給事中兼太常少卿唐書唐臨傳辛替否字協時萬年人景龍中為左拾遺時置公主府官屬而安樂府補授尤濫武崇訓死主棄故宅别築第侈費過度又盛興佛寺公私疲匱替否上疏帝不省睿宗立罷斜封官千餘人俄詔復之方營金仙玉真觀替否以左補闕上疏帝不能用稍遷右臺殿中侍御史雍令劉少微恃權貪贓替否按之岑羲屢以為請替否曰我為憲司懼勢縱罪謂王法何少微坐死纍遷潁王府長史卒唐書本傳嚴挺之名浚以字行華隂人少好學姿質軒秀舉進士并擢制科調義興尉號才吏姚崇為州刺史異之崇執政引為右拾遺先天二年正月望夜然百千燈帝御延喜安福門縱觀閲月未止挺之上疏陳五不可誠意忠到帝納焉開元中纍進給事中典貢舉時號平允宰相張九齡雅知之用為尚書左丞知吏部選李林甫與九齡同輔政戶部侍郎蕭炅林甫所引嘗與挺之言稱伏臘為伏獵挺之白九齡省中有伏獵侍郎乎乃出炅岐州刺史林甫恨之除洛州刺史徙綘州天寶初帝顧林甫曰嚴挺之才可用林甫因紿挺之使稱疾已言挺之春秋髙有疾幸間官得自養乃以為員外詹事詔歸東都挺之重交遊許與生死不易當時重之子武字季鷹幼豪爽母裴不為挺之所答獨厚其妾英武始八歲怪問其母母語之故武憤然以鐵鎚就英寢碎其首左右驚白挺之曰郎戲殺英武辭曰安有大臣厚妾而薄妻者兒故殺之非戲也父竒之曰真嚴挺之子以蔭調太原府參軍事纍遷侍御史從玄宗入蜀至德初赴肅宗行在擢劍南節度使破吐蕃七萬衆於當狗城遂收鹽川加檢校吏部尚書卒唐書嚴武傳楊瑒字瑶光華陰人五世祖縉陳交愛九州都督子林甫隋栁城太守髙祖軍興遣子琮招之挈郡以來授綘州刺史琮歷沔綏二州刺史人咨其廉瑒始為麟遊令時竇懷貞大營金仙玉真二觀檄取畿內嘗負逆人資者暴斂之以佐費瑒拒不應懷貞怒曰縣令而拒大夫命乎瑒曰所論者民寃抑也位髙下乎何取懷貞壯其對為止纍擢侍御史京兆尹崔日知貪沓不法瑒謀劾之反為日知先搆瑒廷奏曰肅繩之司一為恐脅所屈開姦人謀則御史府可廢元宗直之逐日知進瑒戶部侍郎帝召宰相大臣議天下戶版瑒言利病尤詳帝咨賞宇文融建檢脫戶餘口瑒執不便出為華州刺史帝封太山集樂工山下居喪者亦在行瑒謂起苴絰使和鍾律非人情所堪帝許乃免入為國子祭酒遷大理卿以疾辭改左散騎常侍卒諡曰貞瑒在官清白吏請立石紀德瑒曰書名史氏足矣若碑頌者徒遺後人作矴石耳瑒伯父志操頗剛簡未遇時著間居賦自託位終司屬卿安平縣男瑒從父兄晏精孝經學常手寫數十篇可教者輒遺之唐書本傳閻用之立德曾孫萬年人初為彭州參軍嘗攝録事一日糾愆謬不法數十事太守以為才後舉通事舍人纍遷右衛郎將知引駕仗金吾將軍李質升殿不解刀呵却之請按以法左右震悚始有司以三衛執扇登殿用之奏三衛皆驕悍不宜升陛邇御坐請以宦者代遂為故事終左金吾將軍唐書閻立德傳姚南仲下邽人乾元初擢制科纍遷右補闕大厯十年獨孤皇后崩代宗悼痛詔近城為陵朝夕臨望南仲上疏曰臣聞葬者藏也欲人之不得見也王者據髙明燭幽隱今起陵目前心一感傷纍日不平陛下諡后以貞懿而終以褻近臣竊惑焉帝嘉納拜義成節度使入朝授尚書右僕射卒諡曰貞唐書本傳韋肇貫之父杜陵人大厯中為中書舍人纍上書言得失為元載所惡左遷京兆少尹久之改祕書少監載曰肇若過我當擇善地處之終不肯詣載誅除吏部侍郎卒諡曰貞唐書韋貫之傳常衮京兆人天寶末及進士第性狷潔不妄交遊由太子正字纍為中書舍人文采贍蔚譽重一時魚朝恩判國子監衮奏成均之任當用名儒不宜以宦者領職又天子誕日諸道爭以侈麗奉獻不則為老子浮屠解禱事衮以為諸道餽獻類出於民是斂怨以媚上也請皆還之諸祠寺寫經造像焚幣埋玉以巨萬計若以易芻粟減貧民之賦福豈有量哉代宗嘉納遷禮部侍郎元載死拜門下侍郎同平章事德宗即位貶潮州刺史建中初起為福建觀察使始閩人未知學衮至設鄉校親加講導由是俗一變嵗貢士與內州等卒於官後閩人春秋祀衮於學宫云唐書本傳蕭復字履初衡子長安人歷歙池二州刺史治狀應條遷湖南觀察使久乃拜兵部侍郎德宗狩奉天欲西如鳳翔依張鎰復曰鳳翔乃泚舊兵今泚悖亂當有同惡者雖鎰臣畏不免帝曰朕業行留一日以驗爾言俄而鎰為李楚琳所害以是拜吏部尚書同平章事復嘗言艱難以來始用宦者監軍權望太重是曹正可委宫掖事兵要政機叵使參領帝不聽又言陛下厥初清明自楊炎盧把放命穢盛德播越及兹今阽於危當懲艾前敗帝謂左右曰復慢我因詔復充山南江淮湖南嶺南等道宣撫安慰使興元初進門下侍郎中官馬欽緒揖宰相劉從一附耳語既而從一密諗復曰有詔與公議向所奏不欲李勉盧翰聞知復曰堯舜有僉曰之言朝廷大事尚當謀及公卿如勉等非其人當罷去既曰宰相而謀議可獨避之乎今與公行此或可第恐寖以生常政由是敝從一以聞帝不悅復辭疾上政事許之卒年五十七復望閥髙華勵名節不通狎流俗及為相臨事嚴方數咈帝意子湛湛子置咸通中位宰相無顯功置子遘咸通中擢進士第乾符中纍擢戶部侍郎僖宗入蜀拜同平章事纍拜司空遘負大節以王佐自任既當國丰采峭整天下器之時田令孜權寵可炙公卿無不附順唯遘未嘗少下諸節度共劾令孜生事離間大臣遘與裴徹計共召朱玫於邠玫起兵奉迎令孜迫帝幸陳倉玫怒令孜并望帝不諒其心謂遘曰諸王才可任天下者不乏遘曰人非伊霍欲為禍首未利也玫立嗣襄王煴罷遘為太子太保遘移疾不出帝還宫即賜死遘行完而才逢世多故召愎臣以濟亂不得其死人為哀之唐書本傳李元素字太朴長安人為御史東都留守杜亞惡大將令狐運會盜劫輸絹於洛北運畋近郊亞疑而訊之請斥運醜土詔元素馳按元素徐察其寃悉縱所囚以還亞劾元素失有罪比元素還帝已怒奏獄未畢帝曰出元素曰臣言未盡帝曰第去元素曰臣以御史按獄知寃不得盡辭是無容復見陛下帝意解即道運寃狀帝感悟曰非卿孰能辨之後歲餘齊抗得真盜由是天下重之滑鄭節度使盧羣卒拜元素檢校工部尚書節度其軍治有異績元和初進戶部尚書判度支元素少孤奉長姊謹姊沒悲哽成疾卒唐書本傳馬彛扶風人曹王臯除山南東道節度使初彛未知名臯始辟之卒以正直稱漢陽王張柬之有林園在州西公府多假之遊宴皋將買之彛言曰漢陽有中興功遺業當百代保之王縱欲之奈何令其子孫自鬻焉臯謝曰主吏失詞為足下羞微足下安得聞此言舊唐書李臯傳許孟容長安人父鳴謙究通易象官撫州刺史孟容舉進士授祕書省校書郎册府元龜孟容辟武寧張建封府李納以兵拒境建封使孟容見納敷引逆順納悔謝罷兵德宗知其能召拜禮部員外郎公主子求補崇文生孟容不可主訴之帝問狀以著令對帝嘉其守纍遷給事中京兆上言好畤風雹害稼帝遣宦人覆視不實奪尹以下俸孟容曰府縣上事不實罪應罰然宜更擇御史一人參驗乃可不聽浙東觀察使判官齊總暴斂以獻帝擢總衢州刺史孟容還制曰總無功超授羣議謂何詔中停自袁髙爭盧把後凡十八年門下無議可否者至孟容數論駁四方想見其風貞元十九年夏大旱上疏帝不悅改太常少卿元和初遷京兆尹神䇿軍自興元後日驕恣府縣不能制軍吏李昱貸富人錢八百萬三歲不肯歸孟容遣吏捕詰與之期曰不如期且死一軍盡驚訴於朝憲宗詔以昱付軍治之再遣使皆不聽奏曰不奉詔臣當誅然錢未盡輸昱不可得帝嘉其守正許之京師豪右大震纍遷吏部侍郎盜殺武元衡孟容白宰相願白天子起裴中丞輔政使主兵柄索賊黨罪人得矣後數日果相度俄拜東都留守卒諡曰憲孟容方徑有禮學每所折𠂻咸得其正弟季同始署西州韋臯府判官劉闢反棄妻子歸拜監察御史終宣歙觀察使唐書本傳白居易字樂天太原人徙下邽父季庚彭城令李正已之叛説刺史李侑自歸纍擢襄州别駕居易敏悟絶人工文章元和元年對制䇿一等調盩厔尉遷左拾遺四年天子下詔蠲貸居易建言乞盡免江淮兩賦且多出宫人憲宗頗采納河東王鍔將加平章事居易以鍔誅求百計不恤雕瘵今若假以名器則紀綱大壞是時孫璹以禁衛勞擢節度使張奉國平李錡有功遷金吾居易言宜罷璹進奉國以竦天下忠臣心會王承宗叛帝詔吐突承璀出討居易諫唐家制度未有以中人專統領者四方聞之必輕朝廷既而兵老不決居易上言承璀進不決戰觀其勢似陰相為計不急罷之且有四害後對殿中論執強鯁帝未諭輒進曰陛下誤矣帝變色罷拜左贊善時盜殺武元衡居易首請亟捕賊宰相嫌其出位貶江州司馬久之入為司門員外郎知制誥穆宗好遊畋獻續虞人針以諷於時天子荒縱居易雖進忠不見聽乃外遷為杭州刺史築堤浚井復拜蘇州刺史病免開成初拜太子少傅會昌初以刑部尚書致仕卒居易於文章精切最工詩頗以規諷得失諡曰文從祖弟敏中長慶初第進士宣宗立以兵部侍郎同平章事會黨項冦邊以司空兼邠寧節度徙劍南西川治蜀有勞召還卒弟行簡擢進士纍遷主客員外郎敏而有辭後學所慕向唐書本傳柳公權字誠懸公綽弟華原人元和初擢進士第穆宗拜侍書學士問用筆法對曰心正則筆正帝改容悟其以筆諫也改𢎞文館學士文宗復召侍書遷中書舍人充翰林書詔學士嘗與六學士對便殿帝稱漢文帝恭儉因舉袂曰此三浣矣學士皆賀獨公權對曰人主當進賢退不肖納諫諍明賞罰服浣濯之衣此小節異日與周墀同對論事不阿帝徐曰卿有諍臣風可屈居諫議大夫乃自舍人下遷仍為學士知制誥開成三年轉工部侍郎召問得失因言郭旻領邠寧人謂獻二女乃有是除是日帝命中官自南內送女還家其忠益多類此咸通初以太子太保致仕卒公權博貫經術於詩書左氏春秋國語莊周尤邃其書法結體徑媚自目一家當時大臣家碑志非其筆人以子孫為不孝貺遺巨萬主藏奴或盜用公權不復詰惟研筆圖籍自鐍祕之唐書柳公綽傳郭承嘏字復卿晞孫華州人元和中及進士第纍遷起居舍人居母喪以孝聞太和六年為諫議大夫言政事得失文宗以鄭注為太僕卿承嘏極論其非注頗懼進給事中時詔宰相分領度支戶部承嘏言宰相調和陰陽安黎庶若使閲視簿書校緡帛非宜帝納之遷刑部侍郎卒唐書郭子儀傳魏謨字申之擢進士第為右拾遺雍管經略使董昌齡誣殺參軍衡方厚貶淑州司户俄徙峽州刺史謨諫曰王者赦有罪唯故無赦比昌齡專殺不辜事迹暴章獄窮罪得特被矜貸中外以為屈法今又授刺史復使治人紊憲章乖至治不見其可有詔改洪州别駕御史中丞李孝本宗室子坐李訓事誅死其二女沒入宫謨上言陛下即位不悅聲色今取孝本女內之後宫傷治道之本速塵穢之嫌惟陛下崇千載之盛德去一旦之玩好帝即出孝本女以謨為右補闕教坊有工善為新聲者詔授揚州司馬謨獨固諫不可工降潤州司馬荆南監軍吕令琛縱傔卒辱江陵令觀察使韋長避不發移內樞密使言狀謨劾長任察廉知監軍侵屈官司不以上聞私白近臣亂法度請明其罰不報俄為起居舍人帝索起居注謨奏古置左右史書得失以存鑒戒陛下所為善無畏不書不善天下之人亦有以記之帝乃止中尉仇士良捕妖民賀蘭進興及黨與治軍中反狀具帝自臨問詔命斬囚以徇謨上言事繫軍即推軍中如齊民宜付府縣今獄不在有司法有輕重何從而知帝停決擢諫議大夫兼起居舍人𢎞文館直學士宣宗嗣位遷御史中丞發駙馬都尉杜中立姦贓權戚縮氣進同平章事建言今天下粗治惟東宫未立不早以正人傅導之非所以存副二之重且泣下帝為感動纍遷門下侍郎兼户部尚書因久疾檢校尚書右僕射太子少保卒年六十六謨為宰相議事天子前他相或委蛇規諷惟謨讜切無所回畏宣宗嘗曰謨名臣孫有祖風朕心憚之然卒以剛正為令狐綯所忌讒罷之唐書魏徴傳志按徴籍𨽻曲城謨其五世孫也於陜無涉但舊載徴有賜田在澄城謨因家焉後遂為澄城人故入之以備考韋溫字𢎞育綬子杜陵人方十一歲舉兩經及第為著作郎遷右補闕宰相宋申錫被搆罪不測溫率同舍伏閣切爭由是益知名太和五年太廟室漏罅詔宗正將作營治不時畢文宗怒責卿李鋭監王堪奪其廩敕中人葺之溫請還將作會羣臣請上尊號溫固諫今河南水江淮旱歉京師雪積五尺老稚凍仆非崇飾虛名時帝乃謝羣臣久之為給事中兼莊恪太子侍讀晨詣宫日中見太子諫曰殿下宜雞鳴蚤作問安天子如文王故事太子不悅辭侍讀太子得罪詔諭羣臣溫曰陛下訓之不早非獨太子罪時頗直其言遷尚書右丞出為陜虢觀察使民當輸租而麥未熟吏督之溫曰使民貨田中穗以供賦可乎為緩期而賦辦武宗立擢吏部侍郎出為宣歙觀察使威行部中卒諡曰孝唐書韋貫之傳楊煚字公隱嗣復孫華陰人纍擢左拾遺昭宗初立數遊宴上疏極諫歷戶部員外郎朱全忠入京師煚挈族客湖南終諫議大夫唐書楊嗣復傳王摶字昭逸璵曾孫咸陽人擢進士第辟佐王鐸滑州節度府纍遷蘇州刺史久之以戶部侍郎判户部乾寧初進同中書門下平章事判度支昭宗建嫡后摶請因赦天下以尊大其禮拜右僕射遷司空封魯國公初中官權盛帝欲翦抑之自石門還政一決宰相羣宦不平搆藩鎮內脅天子摶曰人君務平心大體御萬物偏聽産亂古所戒也今奄人盜威福逼制君上道路人皆知之方朝廷多難未可卒除當徐以計去之事急且有變崔胤與摶並位素忌摶明達有謀即劾摶為中官外應會胤罷宰相疑摶擠斥乃厚結朱全忠薦已復輔政即譛摶將危社稷全忠因顯疏其尤光化三年罷為工部侍郎貶溪州刺史又貶崖州司戶參軍事賜死藍田驛唐書王方慶傳韓偓字致光萬年人擢進士第拜左拾遺後為翰林學士中書舍人嘗與崔胤定䇿誅劉季述昭宗反正為功臣帝疾宦人欲盡去之偓曰陛下誅季述時餘皆赦不問今又誅之誰不懼死天子威柄今散在方面若上下同心攝領權綱猶兾天下可治宦人忠厚可任者使自翦其黨蔑有不濟今公私牽屬不減二萬雖誅六七巨魁未見有益適固其逆心耳帝曰此一事終始屬卿初李繼昭等以功皆進平章事時謂三使相後更附韓全誨皆忌胤胤聞召李茂貞入朝留子繼筠宿衛偓以為不可胤不納偓又語令狐渙渙曰無衛軍則為閹豎所圖矣偓曰不然無兵則家與國安有兵則家與國不可保李彥弼見帝倨甚偓請逐之帝不用繼昭等飲殿中自若偓曰三使相有功不如厚與金帛毋使預政事今宰相不得專決事繼昭輩所奏必聽他日遽改則人人生怨初以衛兵檢中人今敕使衛兵為一臣竊寒心願召茂貞還其衛軍及胤召朱全忠偓勸胤督茂貞還衛卒若茂貞不如詔即許全忠入朝未及用而韓全誨等劫帝西幸偓夜追及見帝慟哭至鳳翔遷兵部侍郎進承旨宰相韋貽範母喪詔還位偓當草制上言貽範處喪未數月遽使視事傷孝子心學士馬從皓逼偓求草制偓曰腕可斷麻不可草明日百官至而麻不出宦侍合譟李茂貞入見帝曰命宰相而學士不草麻非反耶艴然出帝畏茂貞卒詔貽範還相初偓侍宴與京兆鄭元規威逺使陳班並席坐朱全忠崔胤臨陛宣事坐者去席偓不動曰侍宴無輒立二公將以我為知禮全忠怒偓薄已貶濮州司馬天祐二年挈其族南依王審知而卒兄儀字羽光亦以翰林學士為御史中丞偓貶之明年帝宴文思毬場全忠入百官坐廡下全忠怒貶儀棣州司馬唐書本傳宋楊昭儉字仲寶長安人祖授刑部尚書父景諌議大夫昭儉登進士第天福初為翰林學士驕將張彥澤鎮涇原暴殺從事張式昭儉抗疏論列請置之法疏奏不報昭儉復上疏願誅彥澤以謝軍吏由是權臣忌之停官尋復中書舍人時河決數郡大發丁夫塞之晉少主喜詔立碑記其事昭儉表諌曰陛下刻石紀功不若降哀痛之詔摛翰頌美不若頒罪已之文言甚切至少主嗟賞卒罷其事周世宗愛其才召入為御史中丞多振舉臺憲故事開寶六年以工部尚書致仕太宗即位就加禮部尚書卒宋史本傳李濤字信臣萬年人後唐天成初舉進士甲科拜監察御史晉天福初遷刑部郎中涇帥張彥澤殺記室張式奪其妻式家人詣闕上訴晉祖以彥澤有軍功釋其罪濤伏閣抗疏請置於法晉祖召見諭之濤植笏叩階聲色俱厲晉祖怒叱之濤執笏如初諌不已晉祖不得已罷彥澤節制漢祖起義以為翰林學士周初歷刑部戶部二尚書宋初拜兵部尚書建隆二年濤被病有軍校尹勳董浚五丈河陳留丁壯夜潰勳擅斬隊長陳琲等十人濤力疾草奏請斬勳家人謂濤曰公久病宜自愛朝廷事且置之濤憤言曰人孰無死但我為兵部尚書坐視軍校無辜殺人烏得不奏太祖嘉之削奪勳官爵配𨽻許州濤卒年六十四濤慷慨有大志以經綸為己任工為詩筆札遒媚居家以孝友聞子承休至尚書水部郎中宋史本傳雷德驤長安人宋史本傳作郃陽人太祖時久居諫諍之任有直名與趙普有隙時普以勳舊作相寵遇方渥驤言普專權容堂吏納賂由是忤旨貶商州司戶歲餘其子有鄰撾登聞鼓訴寃鞫得其實堂吏李可度除名餘黨皆杖脊黥配逺州出普知河陽召德驤復舊官擢有鄰守校書郎後普復入相德驤乞致仕太宗勉之曰朕保卿必不為普所擠有鄰性亦剛鯁有父風太宗嘗面諭有鄰朕欲用汝父為相何如有鄰曰臣父非宰相器乃止王禹稱贈詩二首其二曰當時詞氣壓朱雲老作皇家諫諍臣章疏罷封無事日朝廷猶指直言人題詩野館光泉石講易秋堂動鬼神棘寺下僚叨末路齋心惟祝秉鴻鈞蓋禹稱出德驤門下而德驤深易酷嗜吟咏故也青箱雜記德按賈志有雷德遜云驤之弟所載事迹則王元之贈德驤詩也考宋史德驤本傳不云有弟蓋即德驤一人賈志誤分作兩人耳閲青箱雜記可見楊偕字次公中部人舉進士釋褐坊州軍事推官遷侍御史為三司度支判官時郭皇后廢偕與孔道輔范仲淹力爭富民陳氏女選入宫將以為后偕復上疏諫又數論升降之弊擢知河中府夏竦為陜西經略使請增置土兵易戍兵歸衛京師偕言關中財用乏復增土兵徒耗國用今賊勢方盛雖大增土兵亦未能減戍兵東歸竦奏偕沮邊計偕爭愈力進樞密直學士知并州有中官豫軍事素橫偕至一繩以法軍政肅然明年改本路經略安撫招討使偕列六事於朝一罷中人預軍事二徙麟州三以便宜從事四出冗師五募武士六專捕援朝廷不從偕纍奏不已乃罷知邢州久之致仕卒偕性剛而忠朴數上書論天下事子忱慥有雋才蚤卒宋史本傳張升字杲卿韓城人舉進士為楚丘主簿王曾稱其有公輔器纍官至知雜御史升性質朴不善擇言至斥張貴妃為一婦人謂楊懷敏得志不減劉季述仁宗讀之不懌以語陳升之升之曰此忠直之言不激切則聖意不可回矣帝乃解至和二年拜御史中丞劉沆在相位以御史范師道趙抃嘗攻其惡隂欲出之升曰天子耳目之官奈何用宰相怒而斥上章力爭之沆竟罷去帝見升指切時事無所避謂曰卿孤立乃能如是對曰臣仰託聖主致位侍從是為不孤今陛下之臣持祿養望者多赤心謀國者少竊以為如陛下乃孤立爾帝為之感動嘉祐三年遷樞密使升愛惜官資凡內降所與多持不下見帝春秋高屢進言儲嗣事卒與韓琦同決䇿英宗立請老致仕熙寧二年薨諡曰康節宋史本傳楊畋字樂道進士及第授祕書省校書郎慶厯三年湖南唐和等劫掠州縣擢提點本路刑獄專治盜賊事乃募才勇深入遂平六洞以功遷太常博士賊復肆乃授畋荆湖南路兵馬鈐轄賊聞畋至皆遁明年賊復出畋出嶺外涉夏秋凡十五戰賊潰去入為吏部員外郎上言願擇宗室之賢者使侍禁中為宗廟計嘉祐三年地震明年日食復上疏言陛下宜立皇嗣以答天意改知制誥李珣劉永年各遷秩畋當草制封還詞頭因言珣等無功特以外戚故除之恐非祖宗法不報嘉祐六年京師大水畋上言洪範五行傳簡宗廟則水不潤下又曰聽之不聰厥罰常水臣愚以為萬幾之聽必有失於審者七廟之享必有失於順者乃下其章禮官并兩制考議咸言南郊二聖並侑溫成皇后立廟皆違經禮於是詔悉改之卒贈右諫議大夫畋出於將家喜學問與士卒同甘苦性清介謹畏每奏事必發封數四而後上自奉甚約及卒家無餘資宋史本傳麟按畋傳不載邑里延綏鎮志作州新秦人神木志同趙瞻字大觀其先亳州人父剛太子賔客徙盩厔瞻舉進士英宗治平初除侍御史上疏英宗稱善久之詔內侍王昭明等四人為陜西諸路鈐轄瞻以為宜追還內侍責成守臣章三上言甚激切又請罷京使專委宿將夏人入侵慶帥孫長卿不能禦加集賢院學士瞻言長卿當黜不宜賞京東盜賊數起瞻請易置曹濮守臣之不才者未報乃求退力言追還昭明等英宗改容納其言時議追崇濮安懿王中書請懿王稱親瞻爭之已而皇太后手書尊王為皇瞻入對曰陛下為仁宗子而濮王又稱皇考則是二父二父非禮貶通判汾州熙寧三年為開封府判官神宗問青苗法便乎對曰青苗法唐行於季世擾攘中掊民財誠便今欲為長久計愛養百姓誠不便初王安石欲瞻助已使其黨餌以知雜御史瞻不應由是出為陜西轉運副使元祐三年擢樞密直學士簽樞密院事明年同知院事卒諡簡懿宋史本傳王吉甫字邦憲同州人舉明經練習法律試斷刑入等為大理評事纍遷刑部員外郎南郊起幔城役卒急於畢事董役者責之曰此殆類白露屋耳卒訴之吏當非所宜言論死吉甫謂不應死遂求對神宗怒吉甫從容敷陳不少懾帝為霽怒其人得釋蘇軾南遷所過郡守有延館之者詔鞫之吉甫議當笞宰相章惇不悅吉甫曰法如是難以增加成罪卒從笞太倉火議誅守者十餘人亦爭之皆得不死尋知梓州轉運使欲增折配以取羡餘吉甫謂僚曰民力竭矣一增之後不可復減吾寧貽使者怒忍為國斂怨為基禍哉竟却之以中大夫卒宋史本傳張舜民字藝叟邠州人中進士第為襄崇令王安石倡新法舜民上書言便民所以窮民強內所以弱內富國所以蹙國時人壯之司馬光薦其才氣秀異剛直敢言以館閣校勘為監察御史上疏論西夏強臣爭權當興師問罪左遷監登聞鼓院徽宗立擢右諫議大夫居職才七日所上事已六十章陳陜西之弊論河朔之困言多剴峭以龍圖閣待制知定州坐元祐黨籍商州安置復集賢殿修撰卒舜民慷慨喜論事善為文自號浮休居士紹興中追贈寶文閣直學士宋史本傳何常字德固京兆人中進士第為開封府兵曹歷熙河轉運副使議者欲貸民金帛使入粟塞下常曰車馬轉輸民力已病然未至於死亡者粟自官出而民無害也今強以金帛使自入粟懼非貧弱之利熙帥及監軍劾之貶秩徙成都路中使持御札至令織戲龍羅二千繡旗五百常奏旗者軍器之飾敢不奉詔戲龍羅唯供御服日衣一匹歲不過三百有竒今乃數倍無益也詔奬其言為減四之三除直龍圖閣轉通議大夫諜告夏人多築堡柵朝議出兵牽制常言羌人生長射獵今困於版築可以拱手待敝無煩有為也從之終右文殿修撰宋史本傳雍沖洋縣人紹聖時太學生章惇變更政事追削元祐黨人沖曰士尚可以仕乎乃上書數其罪乞斬之有旨移興元府張浚試吏興元與之交好後隱居不仕漢中府志金蕭貢字貞卿咸陽人大定二十二年進士調鎮戎州判官擢監察御史遷北京轉運副使親老歸養左丞董師中右丞楊伯通薦其文學除翰林修撰上書論比年之弊人材不以器識操履巧於案牘不涉吏議者為工用人不務因材授官惟泥資敘名器不務慎與人多僥幸守令不務才實民罹其害伏望擢真才以振澆俗核功能以理職業慎名器以抑僥幸重守令以厚邦本然後教化可行百事可舉矣詔詞臣作唐用董重質誅郭誼得失論貢為第一賜重幣四端貢論時政五弊言路四難詞意切至改治書侍御史遷國子祭酒兼太常少卿與陳大任刋修遼史改刑部侍郎歷河東北路南京路轉運使御史中丞戶部尚書興定元年致仕卒諡文簡貢好學讀書至老不倦有注史記一百卷金史本傳程震字威卿東勝人與兄鼎俱擢第震入仕有能聲興定初召百官舉縣令震得陳留治為河南第一召拜監察御史彈劾無所撓時皇子荆王為宰相家僮席勢侵民震劾奏曰荆王不能上贊君父同濟艱難顧乃開納貨賂縱奴𨽻侵漁細民諸所不法不可枚舉陛下不能正家而欲正天下難矣於是上責荆王出內府銀以償物值杖大奴尤不法者數人未幾坐為故吏所訟罷官震為人剛直有材幹為御史臺綱大振以故小人側目不能久留於朝士論惜之金史本傳元孟攀麟字駕之雲內人日誦萬言能綴文時號竒童金正大七年擢進士第為陜西帥府詳議官遂家長安中統三年授翰林待制同修國史至元初召見條陳十七事大抵勸上以郊祀天地祠太廟制禮樂建學校行科舉擢守令以字民儲粟米以贍軍省無名之賦罷不急之役百司庶府統於六部紀綱制度悉由中書是為長久之計世祖悉嘉納之又嘗召問宗廟郊祀儀制攀麟悉據經典以對時帝將親祀命攀麟會太常議定禮儀攀麟夜畫郊祀及宗廟圖以進帝皆親覽後以病請西歸帝令就議陜西五路四川行中書省事四年卒贈翰林學士承旨諡文定元史本傳張訥藍田人少有志行歷官監察御史立朝論事謇諤不避權貴諫草一出時論歸美家居孝友姻睦舉動必協於道關中學者翕然宗之賈志楊欽雲陽人三歷風憲俱有政聲賈志王亨朝邑人為縣募官持守端楷每與時尚同異遂棄去不仕由義亨之孫為御史纍有獻替從幸上京抗章論衛士縱牧踐民田行營肅然馬志由義至大元年除彰德路總管值旱隨禱而雨逾年又旱請於朝得錢一萬緡易米以濟飢民纍章奏免屬邑稅絹稅米營建廟學民不知費徴為兵部侍郎河南通志明文振三水人洪武初貢士任御史賦性剛直權勢莫撓京師以鐵面號之太祖命督修文華武英諸殿嘗以言見謫充吏三日復諫上怒甚將殺之振顔色不變上竒而釋之尋擢河南僉事涖政廉能升雲南交趾廉使卒賈志王朴同州人洪武乙丑進士授吏科給事中改四川道御史性戇直數以諫忤旨一日以奏事爭辨上怒命斬之至市復赦還曰改乎朴曰臣無罪不宜戮有罪又安用生之上復命斬之出過史館呼曰學士劉三吾某月日皇帝殺無罪御史王朴行刑者復命上怒其不先聞俱坐死賈志來恭三原人洪武中貢士纍擢僉都御史彈劾不避權貴有讒恭者上私幸其第恭妻紡綿恭方荷鋤園中遂誅讒者而益重恭三原志墨麟字士禎髙陵人洪武甲子鄉舉任監察御史風紀大振擢北平副使永樂初升刑部右侍郎人不敢干以私進少保卒西安府志史按明一統志云麟以國子生任御永樂時以守城功升少司馬卒贈少保諡榮毅與府志互異丘野鄜州人洪武中以國子生擢御史激揚得體永樂初升湖廣按司副使明一統志馬京字子髙三原人洪武十三年進士及第授翰林院編修永樂初拜刑部右侍郎未幾卒諡文簡京為人方正有才思立朝多所建明雍大記康郁扶風人建文中以貢士任御史時議削奪燕藩上疏切諫不報歷官四川臬使持憲嚴明人不敢干以私賈志雷恭字時敬澄城人永樂乙酉舉人授交址道御史正直謇諤不避權貴出按山西風裁凜然墨吏望風解綬天順初同御史楊瑄等極論石亨擅權英廟怒謫戍遼東同州志李節字文度三原人永樂中以明經授給諫論事務存大體升四川副使振肅風紀氣節凛然宣德間都督陳懷鎮四川擅作威福節抗疏劾其不法數事懷竟以是敗衆服其剛介尋升按察使三原志李錫字天祿咸寧人永樂戊子解元授蒲州學正毅然以師道自居出其門者多成令器升給事中整飭典章小心慎密得近臣體轉通政使封駁章奏通達下情雖倥傯繁劇條理井井賈志周彧朝邑人永樂中以明經徵為給事中升通政使剛直敢言有論劾必著緋衣諸大臣每早朝使人候彧長安門外見彧緋衣各取素衣角巾待罪有譛彧貪者上怒下獄死命籍其家惟襲布斗粟而已召彧妻問曰彧無俸金耶妻曰彧俸金寄通政司庫已而司上彧庫金上悟立誅譛者復其官西安府志段信字宗實三原人正統丙辰進士任杭州司李亷介不撓獄無寃滯擢御史巡按雲南滇人有詩曰擔頭不帶滇南物只插梅花到處香繼按直𨽻監軍口外所至風節著聞彈劾不避權貴升僉都出守紫荆關邊境寧輯三原志楊祥商州人正統丙辰進士歷任監察御史彈劾無所避姦豪咸憚之居官十年環堵不飾西安府志白行中字大本清澗人正統甲子鄉薦知襄垣安肅拜監察御史按廣東攬轡有澄清之志羣吏貪墨者輒解綬去後守松江以卓異聞總兩淮鹺政轉運不匱尤以清白自持延安府志行順字致和行中兄正統戊辰進士歷官湖廣巡撫亦以風節著清澗縣志楊鼎字宗器咸寧人正統四年進士授翰林編修以才推改監察御史治兵兖州升工部右侍郎天順二年轉左中貴牛玉議欲轉江南折糧銀入實內帑以他物充武職俸鼎從容議已之成化四年代馬昻為户部尚書延綏用兵廷議預徵邊餉鼎言黃河漢唐漕運故道間雖稍險然三門而上小河可達延綏其迹尚在茍貯糧水次遡流徐運何所不濟疏上請身督之竟齟不行鼎在官力清利孔所題覆持正不回事出上旨亦不曲徇所立稅監二法户部遵守之致仕歸卒諡莊敏子時暢官至太常少卿名山藏裴斐字成章渭南人正統丁卯舉人官御史立朝有風裁出按遼陽將領整肅升湖廣僉事告歸紹宗字伯修斐孫以進士除海門知縣遇事敢為無所畏避武宗南巡當道使署江都事時張忠江彬等橫索有司莫敢犯紹宗獨與抗不少屈比駕旋省費數萬緡尋擢給事中直言無諱會有大禮事紹宗抗疏數千言反覆辨難詞嚴義正詔下錦衣獄以掠重創甚卒貧不能治喪時稱忠清渭南志郭宗舜岐山人有膽略涉獵書史正統時有羣盜聚劫宗舜以計擒之有司上其事授巡檢歲凶軍民流離詔下求言宗舜伏闕上十事極論時弊指斥權要末復繫之以詩英廟採行焉再授漷縣巡檢會御史楊綱夜經其處宗舜盤詰如法綱怒劾以輕侮風憲宗舜亦抗章辨奏上直之及土木之變入塞省候進衣物後論功升後軍都督僉事鳯翔府志李著郿縣人由太學生授廣西道御史當英廟北狩景帝以太后令監國時國勢危疑漸起即真之議著力言宜輔太子以成周公之美疏詞稱殿下言頗切直帝再三詰責終不屈帝怒殺之英廟復辟令以禮改葬云同邑嶽嵩亦以太學生任兵科給事中以言事忤旨謫福建布政司經歷曾孫宗知密縣有聲郿縣志閻佐字文輔商州人天順甲申進士授御史巡按兖豫閩蜀直聲大著與中官勘事不合中官素知其直謝不敢逆升浙江副使有以私干者却之逺近震攝子宇字大啓𢎞治間進士知曹縣有績馮志張鼎字大器咸寧人成化丙戌進士授刑部主事上言邉備曰陜西三邊腹裏俱有鎮守總兵巡撫都御史等官遇事各為可否有警不相救援宜推文武兼濟者一人總制三邊副將以下悉聽調遣則事體歸一詔從之邊境賴以稍寧咸寧志鼎歷官户部侍郎初知太原除豪黠孟氏一家九人按察河東威名逺著巡撫保定禦流賊築墻數百里自內邱直達京畿境內肅清賈志魏秉孝字執中蒲城人成化丙戌進士官御史遷山東副使政績丕著憲廟時嘗直南郊糾儀上言人君所畏者惟天今當郊祀宜肅恭收斂以精對越之誠不可令教坊諸俳在左右時以為名言蒲城志張進祿字天錫清澗人成化丙戌進士授御史正論危言彈劾不避權貴巡按山西時榆次有巨俠魚肉小民亷知之悉置於法境內遂安以直道罷歸子鸞鄉舉兩令巖邑皆有能聲賈志李俊岐山人父賜生俊六月而卒母曹氏矢志守節俊稍長安貧力學登成化己丑進士官吏科都給事中彈擊姦回權要斂迹嘗言事恐忤旨置棺櫬待命後出為湖廣參議山西參政所至有德政及人鳳翔府志張琛宜川人成化乙未進士授行人歷吏科都給事中廉潔自守彈劾不避權貴疏數上皆切時弊升太僕少卿尋卒延安府志李善字宗元隴州人成化戊戌進士授行人擢御史是時太監梁芳怙寵市權乃上疏極言中貴側目按遼東時韋太監縱舍人侵漁軍餉聞善至即相顧斂手又劾都督王鎧孫貴皆以不職罷壽寧侯張鶴齡負勢族子漁獵小民謗怨載路善曰此教授侯門者弗嚴也乃參其教授姚某侯家以罪發戍者若干人逺邇皆縮舌侯陰間之出為河南僉事河決張秋都御史劉大夏督修之善為相度水勢開賈魯河改河南注築塞黃陵決口斷水東流卒底於成升湖廣參議何淮等僣號攻陷城池善以計擒之荆襄王景陽以左道惑衆善捕送京師餘悉不問擢四川布政使番人久肆摽掠善移檄宣布朝廷威德番盡降拜南京都察院右副都御史以整肅風憲為己任升南工部尚書移病去賈志張鸞字應祥咸寧人成化辛丑進士授大名知縣為政廉平調南樂歲旱民飢流亡過半乃力請賑貸民以獲蘇擢御史巡視居庸條陳防邊數事悉報可出按四川先後奏議松潘諸處及成都諸郡縣添設裁革事宜皆卓然為經逺之績纍遷僉憲時御史王時中巡按大同忤權貴欲置之死鸞力解救之巨璫張璿掠奪民産往勘事得直以田産還之民轉刑部右侍郎以忤劉瑾致仕歸賈志閻價字允德隴州人成化丁未進士由庶吉士授浙江道御史𢎞治五年查盤松茂邉儲巡按河南值劉瑾亂政價特疏劾之事雖未行時論歸美後升四川參議致仕卒賈志虎臣麟遊人慷慨有氣節成化末貢入太學適聞萬歲山架棕棚以備登眺臣上疏極諫憲廟竒之祭酒費誾不知也懼其賈禍會六堂鳴鼓聲罪以鋃鐺鎖之俄官校至宣臣至左順門中官傳旨勞之曰爾言是棕棚拆卸矣命吏部豫七品官誾聞而大慚臣知雲南􅑇嘉縣事卒於官郊外農談袁澤字汝霖醴泉人𢎞治己酉舉人兩署學政矩範尊嚴諸士翕然仰之繼擢御史糾劾姦惡無所顧避清理河南軍戎兼刷文卷並造軍器俱有成法以疾歸馬志王綸字汝言扶風人𢎞治己酉舉人初任真定知縣適權璫奉使過州縣辱官吏笞郵卒張甚既至真定綸直入傳舍以帶繫之縛其左右搜簡囊槖欲聞於朝璫伏罪乃已尋召入為御史出巡四川此璫適為鎮守斂戢不敢恣肆時藍鄢作亂督臣洪鐘日事宴飲露章劾罷之後掌十二團營會逆璫劉瑾銜靈寶許進揑旨命綸往按治綸力為昭雪瑾怒方遣逮而瑾敗由此直聲震中外擢浙江參政未赴卒賈志王卺字汝器朝邑人𢎞治庚戌進士授户部主事清理京衛牧馬草場畜牧事宜時房山豪民侵牧地卺自按之豪民有奧援卺不顧曰法如是也為員外會詔求直言疏列五十餘事尋為郎中督儲遼東條奏邊儲戰陳方略過山海關憲臣以誘殺勘邊士罪卺疏言實非誘殺急行功賞以厲士心巡歷諸倉敷陳便宜七事後忤大司馬某謫阿迷州同知擢守和州辨寃抑導水利後為蘇州同知以直道忤時遂免歸朝邑志東思恭字進賢華州人𢎞治癸丑進士拜兵科給事中敢言直諫縉紳憚之如劾都指揮彭麟輩附勢南京祭酒劉震貪汚天下快焉尋奉命給賞京衛軍士處置得宜會雲南夷酋猛密相仇殺上命思恭案驗事平方擬奏報思恭感瘴癘卒於滇南西安府志尚衡字一中同州人𢎞治丙辰進士拜工科給事中清寧宫災衡上封事以為天子倦勤所致會詔求直言兩上書各陳四事其後又造延壽塔衡上書極諫上為改容罷其役已遷吏戶二科數劾論諸大臣不法事武宗即位上封事二十條詞皆切直於是當路銜之出為浙江右參議歲飢賑貸多所全活升左參政復改山西河東道下車戢橫藩擒巨盜移守兾寧會流賊攻太原鋒甚鋭時官兵已調防澤潞衡募勇壯嚴城守又檄材官設伏盤駝谷中防賊南遁賊偵知卒逸去巡按素不喜衡至是劾其玩冦衡亦上書自理皆左遷衡遷漢陽知府至郡旬餘卒衡負志節不能下人居朝徑直敢言廷臣無不敬憚及見妒外補氣不少降嘗入賀時逆瑾用事惡人高幘或令衡暫易衡憤曰丈夫寧為一刑餘改度乎其特立類此子班爵字宗周少英敏好學精研理窟隨衡在浙衡令師事王文成故所詣益邃舉𢎞治甲子鄉試任安居令剛果勤勵政舉民安季子班命以明經丞阜城以戇直不阿上官棄職歸人謂其不負家訓焉同州志周熊字應文長安人𢎞治丙辰進士正德間按滇任法不少貸一時貪墨望風解組雲南通志楊武字宗文岐山人𢎞治丙辰進士知淄川縣鋤惡弭盜理寃滯課耕織積倉粟拓學規興詩書賑貧乏疏淄河灌田利賴甚溥召拜監察御史按河南正德初按順天諸郡縣時劉瑾用事事多牽制武通達下情宣布朝廷德意一切敷陳無所顧避擢大理寺左寺丞勘視大同邊務彈劾屯田不均軍役耗損諸弊政不少貸超拜左僉都御史巡撫宣府罷歸賈志石祿字君錫華州人𢎞治己末進士拜南給事中卓有建論權豪斂迹升山西僉事去淹獄賑飢饉又嘗解寧武關圍晉人深賴之丁艱歸再補四川僉事平僰蠻有功終四川參議華州志吉時字惟可長安人𢎞治壬戌進士由庶吉士改給事中建言忤瑾謫死西安府志張璉字汝器耀州人𢎞治壬戌進士授行人選為御史時劉瑾數以禮意招璉璉不往瑾怒欲中傷竟無隙巡按湖廣治其黨不法事瑾怒甚將逮繫會瑾敗不果遷按察時晉府儀賔某以殺人成獄武廟駐蹕太原縣君重賂江彬矯稱天語赦儀賔死璉曰憲臣為天子守法今天顔咫尺璉未奉明詔顧信公口傳耶彬語塞尋升侍郎奉敕督宣大糧儲數有論奏忤權相自劾乞罷黜乃以左侍郎致仕耀州志田登字有年長安人𢎞治乙丑進士任刑曹適武宗幸南海子五日不返登率同僚跪門大呼曰請駕回請駕回陛下縱自樂如宗廟太后何上亦不之罪也後官至參政長安志秦偉字世觀三原人與馬溪田講誠敬之學登𢎞治乙丑進士授户部主事督宣大邊餉監軍張永欲賞所私偉不與永竟阻出守保定有中貴占民田舍偉執奏不法狀中貴斂迹遷山西參政戇直愈著令行禁止弊絶風清撫按忌之罷去賈志王九峯字壽夫鄠人正德戊辰進士授御史巡視居庸開險阻簡行伍利器物時練習衛官怠惰侵漁者必懲主將貪懦者必斥按順天旌廉去貪畿內大治其年秋駕幸居庸九峯率同列諌止前後三十疏不允出為金華知府德政茂著嘉靖甲申擢山西副使備兵偏頭關乞歸卒賈志韓邦靖字汝慶朝邑人正德戊辰進士除工部虞衡主事部檄監收十庫時宦勢正熾邦靖至庫羣宦不為禮乃自坐前席署案如舊禮又檄監收黑窑厰厰亦宦者主之弊尤甚邦靖至厰乃躬自視稱羣宦曰吾輩厚費而來此欲何為邦靖弗顧次當浙江抽分下令非巨材若竹木成器者皆免徴比代正課且不足部科皆以法奏邦靖邦靖亦自劾宰臣知其事得原已升員外郎檄往直𨽻陜西山西查徴歷年匠班值見其民貧甚建言宜罷徴不許以乾清宫災竟罷之天子方以災異下詔求直言邦靖歸上疏天子震怒繫錦衣獄給事中李鐸率衆論救乃奪官為民世宗初起擢山西布政司參議分守大同革姦弊恤民隱權豪斂迹又以邊郵之地兵糧所繫分守官故事無印乃上疏請給關防時朝廷修定䇿功賞邦靖以兄終弟及天敘所宜諸臣何功之有亦上疏論皆不報大同歲飢又入奏乞發內帑賑濟事下部不許且駁之邦靖復抗疏論列部司頗不悅邦靖遂上疏乞休疏拜即去邦靖矜名節孝弟友恭尤為切至學有淵源自幼即以經濟為志冀北父老誦其行事有泣下者苑洛集王元凱字堯卿盩厔人正德辛未進士拜兵科給事中時戶部郎王崇慶以言事繫廷尉元凱上章論救上怒詔詣左順門對狀元凱曰主事郎官因言繫獄凱諫官以言得罪固其分也苐權姦誅滅未久朝廷不可復罪言者以滋禍端上感悟釋崇慶時中貴用事公卿皆因關説元凱切諫不報乃力疏懇致仕弟元正字舜卿凱同榜進士官翰林院檢討武宗幸宣大述五子之歌以諷以議大禮謫戍茂州卒西安府志東郊字希宋華州人正德辛未進士歷官浙江道御史值武廟將幸居庸抗疏諌止時錢寧怙寵納賄據實論奏江彬竊弄威福擾害郡邑郊力為禁止姦黨銜恨共肆萋菲左遷潞州判官致仕西安府志劉儲秀字士竒咸寧人正德甲戌進士授刑部主事歷郎中多所平反録囚蜀中全活尤衆戊子擢山西提學副使崇雅黜浮士風丕變晉右副都巡撫遼東整飭邊方治績茂著內擢戶部尚書總督倉場督理西苑農事時陶仲文方幸至以三孤兼宗伯儲秀於仲文獨不為禮尋改兵部尚書例疏辭疏中語及復套事嚴嵩方借復套謀陷夏言因與仲文交搆上前遂削籍馮少墟集張原長安人正德甲戌進士授吏科給事中即上疏言十二事曰正守令擇將帥理刑獄汰冗食省征斂減工作恤士卒明賞罰禮大臣開言路崇天道進德學忤旨降貴州新添驛丞學者聞原名莫不裹糧負笈而從經所指授輒充然有得士風為之一變嘉靖改元復召兵科給事中原感知遇益以諫諍為己任言皆剴切凡論國家大計及進賢退不肖詞嚴色正上多嘉納三年七月以諫大禮被杖死闕下先是原有停司禮監請乞一疏中貴人銜之杖獨重竟至不起穆廟初奉世宗遺詔復原官録其後馮少墟集劉琦字廷珍洛州人舉正德甲戌進士授行人擢兵科給事中敷陳六事議論剴切復極言差放冬衣布花之弊皆報可錦衣衛多權右冒領官銀取利琦廉得其情置於法他如峻宫墻之禁嚴宿衛之鋪一劾而中官逮罪者四十人未幾奉命清軍條奏三十事咸切中時弊大臣及中官凡有請囑琦必劾治之雖事干勳戚不顧也賈志妖人李福達坐死其子以燒煉術往來武定侯郭勛勛為福達代辨給事中劉琦劾勛交通逆賊明受賄賂福達既應伏誅勛無可赦之理帝以劾勛者為朋姦陷正命逮繫詔獄戍邊穆宗立遇赦乃還紀事本末李朝綱字振之武功人正德丙子舉人初為聞喜令清潔自持憲司有惡其形已者因查錢榖突入縣署親檢笥中惟書一帙公服一襲綱妻紡績以馬矢為㸑憲司嘆服首薦之擢御史巡歷所至凡有見聞必入告墨吏望風而化遷岢嵐副使清直猶昔多所建白竟以執法弗諧於俗罷歸武功志胡侍字承之咸寧人正德丁丑進士歷官鴻臚少卿時追尊獻帝議者力辨兩考之非侍上言祖訓兄終弟及蓋嚴嫡庶防覬覦爾魯嬰齊不受命歸父漢病已不受命昭帝何以受命為哉唐睿宗不當兄中宗宋太宗不當兄藝祖以其為君也不當稱兄則不當稱伯明矣上怒出為潞州判官西安府志許宗魯字東侯咸寧人正德丁丑進士授雲南道御史刷卷蘇徽盡按諸大猾置之法所入銀榖至百數十餘萬世宗初巡按宣大時將卒素驕悍宗魯罪其甚者將卒帖然先是太監劉祥乾沒邊餉以萬計罪止罷鎮宗魯請下祥於獄祥大懼即如數抵償御史曹嘉論諸大臣不法事有給事希大臣意劾嘉宗魯力奏嘉無罪獲免至劾武定侯郭勛太監蕭敬兩疏言尤切至宣大故有大邊正德初以地逺棄不守宗魯行邊奏請補築已視湖廣學政士風丕振未幾巡撫保定核驛傳均徭賦築堤捍滹沱河有功賜璽書旌焉庚戌以都御史駐昌平修邊墻三百里墩堡數百陵寢以安移撫遼東增鹽課歸民田之占於諸軍者遼人甚賴之致仕歸賈志從坤字載陽宗魯孫中萬𩔶乙酉鄉薦初仕霸州守潔已奉公不畏權璫州人頌之擢臺中以耿直左遷淮安府水利同知開泇治黃漕艘飛渡以功擢南工部員外咸寧志許忠洵陽人正德丁丑進士初授行人選山東道御史敢言不避以議大禮忤旨謫判亳州卒同時議禮不阿者有御史來聘三原人郎中趙儒華隂人大理評事王光濟商州人皆忤旨受廷杖聘謫丹稜令除虎患民歌思之升四川按察使儒歷敘州永州知府力行教化入覲以戇直忤冢宰罷光濟官歷山左運使治亦有績賈志王懋字昭大咸寧人正德丁丑進士授行人以諫止南巡廷杖左遷國子學正嘉靖初詔復行人尋拜監察御史時廷臣議禮不合相繼去位有杖死者懋上疏論救謫典史數遷至懷慶知府卒西安府志杜鸞咸寧人正德辛巳進士授大理評事李福達之獄郭勛居間席書助之鸞請將二人先正國法徐命多官集議疏上鸞逮治削籍西安府志王用賔字允興咸寧人正德辛巳進士授翰林院編修歷清署三十餘年以講官侍經筵啓沃開陳世宗每目禮之晉秩宗伯值穆宗在裕邸誕嗣並奉詔議孝烈皇后袝廟兩事時際諱忌朝臣率多異同公力持宜稱皇孫主袝廟議先後疏入俱稱旨以忤嚴嵩置留京冢宰咸寧志張緯字文之咸寧人正德辛巳進士嘉靖初擢御史時有以佛老進者緯抗疏直諫不報江南民鄧愈唐為仇家誣執繫獄數年不決緯立剖雪之巡視居庸諸關所至練武修備發姦摘伏邊人頌之大同有變緯奏恩浮於威無以示戒宜有震動以彰天討上納之奉命按遼東會疾卒貧不能具棺殮賈志劉仕字以學中部人正德辛巳進士授刑部主事世宗立欲考興獻仕伏哭奉天門上大怒廷杖三十不死久之起為員外郎歷郎中讞獄山西御史馬録質以張寅罪狀仕言寅為李福達不疑乃移寅詔獄以武定侯郭勛庇寅劾之廷杖謫戍柳州穆宗即位以遺詔起太僕少卿謝病不就子光升官新泰知縣剛正不阿有父風賈志李恭榆林衛諸生例授秦府典膳正德十三年武宗西狩恭抗疏請誅權姦江彬聞之矯詔下行在錦衣獄煆煉死之子大興逮繫詔獄嘉靖改元巡撫姚鏌奏恭死於忠贈紀善大興亦以清介稱延綏志雒昂字仲俯三原人嘉靖癸未進士纍擢吏科給事中未三年疏凡數十奏直聲著聞出為四川僉事歷河南布政使升巡撫奏議條陳期月間六十上徽藩不道昂抗疏劾之被逮廷杖斃闕下三原志李宗樞字子西富平人嘉靖癸未進士授諸城令邑多衛辨巨室奪民田宗樞按治歸故侵地縣鄰海夙稱盜藪宗樞在邑三載盜皆屏迹戊子擢御史宣大有警敕樞按之陳邊務十一事詔用之邊境果寧抗疏論總憲阿附及少司馬副都不法事皆坐免出為潁州兵備遷河南參議轉副使上南巡擢按察使分督扈從之役中官斂戢拜僉都巡撫河南素性堅直廉正無所阿避尤軫民隱陳災疫請賑恤凡章奏入告期於通達下情無所隱諱多得請中州民甚德之以病歸富平志劉璣白水人嘉靖乙酉舉人任井陘令歲飢多方賑濟上疏請鎔佛鑄錢以救荒不報因執辨疑獄忤臺使左遷武昌教授楚王謁廟由中道璣直言非禮時論韙之耀州志朱綬南鄭人嘉靖癸未進士初以行人出使卻徽王之餽為御史多所論諌時兵馬司門內湧血莫敢上聞綬上疏規諫言甚剴切中外韙之卒之日囊空不能治棺具漢中府志楊爵字伯修富平人家貧年二十始發篋讀書兄為邑掾以他纍連爵並逮獄爵從獄中上書白兄寃令見書立出之舉嘉靖八年進士授行人奉使楚藩還朝時上方議禮爵言臣至湖廣見百姓多菜色假令周公禮文盡行抑何補於飢饉之艱上為下疏發賑改御史念母乞終養母卒廬墓三年起補御史疏言大學士夏言欺天罔人翊國公郭勛巨惡大姦凡此任用匪人皆足以失人心而致危亂又請止土木之功開諫諍之路屏邪妄之術以慰人心以祈天祐疏入上大怒逮繫詔獄杖幾死五年上修玄教神降於箕請宥爵上釋之未彌月而上為箕神造臺尚書熊浹極言不可上曰吾固知釋爵諸妄言者立至矣復逮還繫獄爵抵家僅十日也又三年內殿火上於火光中聞神語呼爵名請釋之於是始釋爵歸二年有大鳥止於舍爵曰楊伯起之鳥至矣兆其在我乎越五日無疾而卒明史竊本傳隆慶初贈光祿卿萬厯中諡忠介名山藏吕應祥字子和涇陽人嘉靖壬辰進士以行人選吏科給事以諫諍為己任嘗曰朝廷以言官為耳目茍稍有顧忌即蔽明塞聰豈朝廷設官意乎會京師地震上書言汰冗賑貧倡勇恤讞節賞五事尋奉命監草場疏發司場太監通商減芻姦狀覆宣大邊餉盡得登耗出入之實劾都御史以下若干人條塞下便宜十事皆嘉納焉上幸承天祔皇太后顯陵應祥以禮科都給事中從議禮多所匡正時選宫僚多賂進者應祥言太子國之儲副師友必慎其選願罷諸賂進者會推一時賢俊疏上觸執事者奪為民賈志高節字中立西安後衛人嘉靖乙未進士知襄陵擢南給事中戇直有聲出知河南衛輝府以廉介稱中丞某禮接少違即挂冠去一日直指使者往候節方冠褦襶荷鋤自耘留坐惟麥飯一盤人服其古朴云西安府志段朝宗字公見朝邑人嘉靖乙未進士授中書舍人拜兵科給事中遷禮科巡視京營條奏防秋八事多見施行時薊督多姦利事朝宗抗疏論之又疏京營士馬不得假借市恩以故怨者多飛語出知嶽州時婺源盜方張朝宗檄示禍福盜立時解散復作諭解數十條訟者至庭反覆開導皆悔謝邑人立祠祀之朝邑志楊宗氣字鐘山延安衛人嘉靖辛丑進士授庶吉士改給事中丰裁峻厲多所建明世宗時爭大禮上怒廷杖之議謫戍上怒稍釋左遷山西督糧道剔釐宿弊尋擢山西巡撫振綱飭紀下詔褒錫兼節制四省吏畏民懷時中官用事宗氣獨不附璫人深銜之遂乞歸賈志王鶴字子臯長安人嘉靖甲辰進士為行人奉使朝鮮饋遺盡却遷工科給事中上疏論時政忤旨廷杖當嚴嵩柄國時人爭出其門鶴持正不阿人服其介長安志張鍊字伯純武功人鎛弟嘉靖甲辰進士以行人選刑科給諌疏奏無所忌以忤權要被廷杖幾死出為湖南僉事甚有德政賈志鄒應龍字雲卿長安人嘉靖丙辰進士授行人擢御史長安志嘉靖四十一年五月以御史鄒應龍為通政司參議時嚴嵩眷遇日隆言者或死或戍應龍欲具疏一夕夢出獵見一髙山射之不中東有培壘樓俯平田有草米覆其上一矢中之醒而悟曰此小兒東樓之兆也遂上疏劾世蕃數其通賄敗行諸不法狀乞置於理因及嵩植黨蔽賢溺愛惡子且曰如臣言不實願斬臣首以謝世蕃父子帝覽之心動命嵩致仕而下世蕃於理擢應龍嘉其敢言紀事本末應龍後歷兵部侍郎巡撫雲南以忤江陵致仕賈志王言字斗廬南鄭人嘉靖戊午解元初仕徽州教授升國子博士考選御史殿中執法有百折不回之力觸時相外轉安綿道僉事西蜀鎖鑰賴以嚴飭生平嶽立人難干以私賈志孫代字紹甫扶風人嘉靖己未進士除行人使周肅兩藩不受贈遺擢御史首糾吏部郎某偽學文姦削其籍穆廟視牲南郊戎服乘馬以出具疏爭之上怒甚然卒是其所請出按四川平九絲都蠻督學江右所掄皆知名士轉浙江參政謝疾歸賈志李復聘字叔徴盩厔人嘉靖壬戌進士除聞喜令繩姦吏捕劇盜三年授南京廣東道御史抗疏論時事劾執政一勳貴一薦有望大臣十風裁赫然出為四川僉事四川盜訌甚復聘推誠安輯盜乃散尋升參議移疾歸用薦起分部鄖襄升副使治兵蘄州以疾卒盩厔志雒遵字道行涇陽人入籍三原嘉靖乙丑進士任給諫劾權璫馮保忤江陵謫浙江照磨縉紳想望丰采轉太僕卿巡撫四川有疏稿集諌垣奏議行世子仁字少經萬厯癸未進士官大理評事時神宗倦勤進四針以規聖德語觸上怒廷杖削籍忠直之風父子濟美三原志孫丕揚字叔孝富平人嘉靖中進士授行人時分宜熖熾走其門者如市丕揚獨謝不往壬戌授御史同官鄒應龍糾分宜子世蕃諸不法狀詔丕揚籍其家士論快之升大理寺右丞時新鄭用事以夙憾嗾其黨詆之坐落職新鄭罷去以臺臣薦起巡撫保定增設紫荆關邊墻一千九百餘里金湯屹然以不能事權璫馮保忤江陵引疾歸又以薦起應天府尹轉戶部左侍郎丕揚風節彌髙辭疾不赴辛卯以撫按會薦起刑部尚書大同變起上入蜚語逮總督魏學曾乃抗言學曾為國家剪除元憝忠烈茂著大功垂成用肘掖萋菲遽加挫辱恐傷天下忠臣義士心上是其言釋勿問改都察院左都御史命各道御史會集諸事宜為書名曰巡方總約至今諸御史奉為功令升吏部尚書告歸再起吏部時黨議方興丕揚抗疏極論而諸臣互相傾危國事日壤乃挂冠歸里性亢率爽豁與人交不設城府不念私怨凡國家大政如九邊河漕皆確有碩畫念天下安危托於諸撫臣再柄銓衡獨以遴選撫臣為兢兢一時建牙擁旄皆卓然為世名臣賈志孫恭介為冢宰時文選員外薛芳者韓城人萬厯壬辰進士素有直聲恭介喜曰此為我砥柱銓衡者也一切倚重芳竟以孤直被論歸甲寅起太常卿以慈寧宫救劉御史弗克發憤卒韓城志任佩字伯玉髙陵人嘉靖中以明經授興平訓導遷肅藩教授藩嗣性佻達佩嚴其近侍不使私出入多所匡正藩校王應龍兄弟以事犯王怒甚下佩議死佩封還令旨竟得釋時又有崇王府長史劉遷髙陵人德王府長史梁光裕洋縣人皆隨事規諫導王以禮二王遂有賢聲賈志黨傑字子興城固人隆慶丁卯舉人性剛果沉毅每以忠孝節義自矢官榆社教諭升文安知縣循良大著擢南京御史條議江防事宜後因建儲直言見忤時宰左遷東昌知府遂挂冠歸神宗每言黨御史疏奏激切內多戇語實有可採欲大用之而傑卒賈志舒鵬翼南鄭人隆慶庚午鄉舉官鄖西知縣以卓異擢御史見事輒奏人方之朱雲賈志劉四科字健菴涇陽人隆慶辛未進士沉毅廉簡持守端嚴由長治令升吏部主事纍擢太僕卿或言牧馬地稅可得數萬金四科三抗疏止之羣璫讒阻百端上卒從四科議時畿甸屢年大水四科請寬舊逋緩并征又請帑金賑濟上疏言天下者陛下之天下也陛下不圖安天下天下將何所寄天下不安陛下又何所寄上嘉其切直咸報可卒於官涇陽志盛訥字敏叔潼關人父德本衛指揮洛南盜起勢甚熾德奉檄往勦深入賊壘力竭而死訥時年十七勺水不入口泣請當道發兵勦賊賊就擒乃發喪行禮後登隆慶辛未進士歷吏部侍郎時封倭之議起聚訟盈庭訥抗章言倭不退而求欵恐非實情宜控要害集兵糧為自治計不宜許和以墮其術已果復獗人服其先識云子以𢎞字子實萬厯中進士選庶常歷官國子祭酒神宗末引疾歸光宗踐祚起吏部侍郎以𢎞慨然以鑑才為己任核名實抑躁競起用廢棄諸賢天下翕然望太平熹宗登極充日講官敷陳經義因事開導能以至誠動人主有以竒技淫巧惑上者以𢎞立斥之置帝鑑圖説於講筵以資法戒晉禮尚後魏璫竊政朝紳脂韋以𢎞正色自立孤危益甚歸里後憂鬱而卒潼關志白棟字子隆米脂人隆慶辛未進士除東阿令立條鞭法貧富皆以地科差役邑中一切倚辦不煩里甲以卓異徴為山西道御史抗言直諫忤權貴謫髙郵州判官歷遷大理寺少卿以議石尚書事不協上意告歸益自淬厲名節延綏志張國祥字角善臨潼人萬厯初進士以理學自任生平言笑不茍歷官戶禮二垣與楊左諸人同心持正抗論危言每諫草一出天下爭傳之賈志郝土膏字臣水郿縣人萬厯初進士授芮城令有善政擢兵垣直言敢諫數上封事以忤魏璫謫降後纍升河南巡撫郿縣志李三才字道甫臨潼人萬厯甲戌進士少負志節與南樂魏允貞長垣李化龍以名世相期許允貞為郎抗論時相左遷道甫以戶部郎論救亦譴外自此聲稱藉甚屢遷卿寺以僉都御史總督漕運加戶部尚書萬厯中中人出管礦稅橫行恣睢陳奉在淮尤無狀道甫悉心力與之搘拄牢籠駕馭權譎縱橫神廟用其言撤奉東南得安枕列朝詩集雷士楨字國柱朝邑人少頴悟有風節六歲時從學外祖韓邦竒容城楊繼盛故師邦竒及以諫謫狄道尉過謁久語士楨從旁竊視繼盛甚羡之既去謂邦竒曰客洵丈夫哉邦竒竒之謂兒他日當以諫顯登萬厯甲戌進士初授太常博士拜浙江道御史方三日即疏論潘晟晟張居正同鄉嘗為司禮監馮保師居正病亟其黨謀以晟代詐為居正疏薦之馮保援於內遂徴晟士楨疏入保持不下流言且杖天子時已銜居正竟罷不召頃之巡中城宦戚皆相戒勿觸禁已復巡漕務請託盡絶以疾乞歸卒朝邑志劉士忠字純卿華州人萬厯甲戌進士授真定李官三載考績晉江西道御史行部三晉摘諸豪宗不法者會清丈事起議者欲加賦復黃册額士忠持不可賦得無加越二年再按中州計臣有欲裒中州賦二萬有竒者忠抗疏罷之時天久陰霾忠應詔條上五害上覽之色動辛卯復按順天諸戚畹勛貴相戒毋犯約束纍遷右僉都御史總理河道復攝漕撫後廷推南廷尉乞歸卒華州志屈灼字青門蒲城人萬厯甲戌進士歷官右通政值火災上疏不報因忤時出為河南睢陳兵備副使賈志孫瑋字以貞渭南人萬厯五年進士由行人考選給事纍遷至保定巡撫嚴法令剔蠧弊節浮費廣儲蓄民賴以安升兵部尚書管左都御史事瑋清廉不受餽遺又性忠純敢直言極諫會星變上疏言陛下宜猛力回心朝乾夕惕疏入不報遂乞歸天啓元年起南吏部尚書轉北仍掌左都事尋卒官瑋未卒前一日效古人尸諫遺書上陳天災迭見民不聊生陛下欲圖治莫如固結人心欲結人心莫如汲用善類如輔臣劉一燝憲臣鄒元標詞臣文震孟等宜聽臣言漸次簡擢疏入上竟不報未幾魏忠賢用事斥為東林黨人矯旨削奪為民崇禎初復原官諡莊毅東林列傳王九儀字維邦長安人萬厯丁丑進士為淄川令有善政徴拜御史以激揚自任巡視皇城劾中貴人不得跨馬禁中及巡視光祿條議一疏皆人所難言尋以僉事分巡大梁以病告歸長安志張惟任字希聲潼關人萬厯己卯舉人授巫山令擢御史巡按河南河官倍調夫役抗疏論置重典巡鹽兩浙條議詳明力清弊竇升大理寺卿致仕賈志許守恩字誠齋涇陽人萬厯庚辰進士授鄒縣令有異政擢河南道御史連疏建元良正宫體一時直聲動海內有宦者驕橫不法守恩憤甚振臂毆之諸閹奪氣出為河南驛傳尋移霸州兼攝天津益振刷無所畏避有撓法者即權幸不少貸以言事觸宸怒逮廷杖下獄久之得釋歸里涇陽志甘學書南鄭人萬厯壬午舉人歷官趙州知州礦監肆虐學書抗顔爭止遂誣訐被逮廷杖天啓間事雪贈尚寶寺少卿漢中府志王紹先字伯生咸寧人三原籍萬厯癸未進士天性清直任主事監修潞府省費巨萬姦璫忿甚陷之詔獄尋謫山東運判後復主昌平糧務糾劾姦璫再謫代州同知丰稜愈峻稍復南刑部員外郎家居修全陜通志西安府志楊紹程岐山人萬厯癸未進士授庶吉士改御史奏言郊廟不親朝講不御儲二不建匹嫡當辨皆言人所不敢言巡滇疏沭舍人僣侈僉謂真御史參晉藩笞逐權要雖直道招忌不悔也賈志李應䇿字成可蒲城人萬厯癸未進士歷任安陽尹舉卓異徴授刑科給事以倭事糾參石星沈惟敬升太常少卿左通政賈志楊光訓字汝若渭南人萬厯丙戌進士授南充令補閬中興學賑荒爰書吏議咸自為狀稱神君焉選山東道御史督課兩淮請罷增引復京掣鹽政一清時三殿災上書極陳時政闕失言多批逆尋改巡漕即奏督河督漕當歸併一臣已按東省稅使馬堂以峻刻激亂光訓單騎往諭罪首事者餘得貸一方安堵復疏罷礦稅備陳蠧國之害長陵明樓災再上修省實政言更剴切遷順天府丞卒賈志劉芳字爾聲渭南人萬厯丙戌進士授行人與魏大中以名節道義相尚奉使衡鄭二藩謝絶筐篚清望蔚然授湖廣道御史首劾邊境失事諸臣繼陳屯田錢法四事皆次第報可巡視九門鹽法劾私販中官任兆元任二等論如律轂下肅然督長蘆鹽課疏解鹽法專委解官不更煩竈戶並著為令山東經白蓮亂兵旱相仍請免鄒滕七邑歲額山左以安時逆璫魏忠賢干政芳與十三道合疏論列劾忠賢言甚切直不報督學南畿以內艱歸尋為璫陷奪職璫敗以臺省薦還原官賈志張允升南鄭人萬厯丙戌進士耿介敦朴為蜀司理力持苦節擢御史以直言名於時倭小西飛乞封疏斥其非鄉居恂恂里人賢之賈志武之望字叔卿臨潼人萬厯己丑進士宰霍丘江都皆有能名擢吏部尋主文選直忤當路改兵曹歸里閉門講學逺近爭師事之後備兵海蓋調永平臺頭營缺餉兵譟城下僉議藉府縣别貯給之之望持不可曰萬一他營效尤又何以應自臨賊以溫言慰散洊歷諸卿晉大中丞巡撫登萊劾總兵毛文龍之驕有登撫可裁一疏以少司馬總督陜西三邊軍務士卒缺餉謀作亂乃廉治其魁一軍肅然未幾卒於官生平正色立朝不為朋黨遇事獨斷曾不依違兩可子二人獻哲天啓進士歷四川副使迪哲辛酉舉人皆賢達有父風臨潼志張企程字維勇洋縣人己丑登焦竑榜進士授山東章丘令慈祥為質出以清嚴召入掖垣多所建明乙未河決邳州泛漲泗州祖陵松柏沒於水天子震恐遣科臣風力者荒度之公受敕詣泗展謁祖陵上疏曰祖陵腹心也運道咽喉也民生手足也今當以奠安陵麓為第一義先條議以聞而漕臣褚袂疏奏導淮正流泄淮積浮無事分黃糜數十萬金錢公慨然謂目前補救終屬摸稜又上疏曰川壅則潰導則利惟有分黃流以殺其勢蓋上流既分下流自減泗州積水可消祖陵可保無虞矣又畫便利條為四事曰議錢糧議官夫議委任議肅法上下其議一時治河諸臣人人毖飭明年工竣上大悅晉太僕少卿又明年子假旋里以疾卒李遇知撰傳周傳誦字淑逺西安左衛人萬厯己丑進士官湖廣左布政稅璫陳奉肆虐民不堪命楚撫劾之反被詔下獄傳誦署撫力抗其鋒後奉竟解職楚民始得安枕肖像祀焉賈志楊明盛字熙宇洋縣人萬厯乙未進士任滋陽縣時中官領𣙜稅私貨甚盛使州縣為之轉輸民不堪擾經滋陽明盛盡貯於庫劾其貪虐之罪反為中人中傷而罷賈志史記事字義伯渭南人萬厯乙未進士兩任邑令教養兼舉及擢西臺直言敢諫權貴側目按楚尤多異政遷光祿少卿終以觸忌罷歸賈志王豫立字定甫涇陽人萬厯乙未進士歷尹稷山嵩縣政績卓然擢禮部儀制司主事主諸藩襲封事代藩寵妃欲以支子易嫡謀已就獨豫立不從兩疏請之始得正名嗣王以魚鮓藏金報謝豫立叱之尋擢觀察使正已率屬墨吏皆為斂迹升河南左轄出納惟允升南光祿卿見璫焰方熾上疏請休悠遊林皋者十年賈志張邦俊字襟黃韓城人萬厯乙未進士初授御史時抗言起廢棄廣用賢請出閣講學皆人所不能言者乂疏請增浙閩秦齊解額四省各得五人增會額天下得五十人定為例劾稅璫梁永髙淮救直臣王邦才等俱載國史人尤難之賈志王之宷字藎甫朝邑人萬厯辛丑進士知無極縣為里社九十有六社設師講學絃歌徹於逺邇調慶雲邑方大祲之宷一意拊循招綏逃户輕其丁差又條陳荒狀申請賑濟全活甚衆賈志萬厯三十四年五月有男子張差持棗木棍入慈慶宫命法司提問御史劉廷元奏張差語言顛倒形似病狂主事王之宷言散飯獄中見張差不顛不狂中多疑似疏入不報時諸臣以瘋癲二字為鐵案中旨特黜之宷為民天啓元年御史魏光縉薦之寀以原官起用二年之宷上言乙卯之變鄭國泰欲睥睨神器宜開棺戮尸上不問五年楊維垣劾張差一案王之寀誤皇祖負先帝疏入削籍逮訊紀事本末熹宗立之宷因薦起用歷升刑部侍郎魏忠賢擅政與同志連疏論之楊維垣承忠賢旨劾其貪功冒進又言其納鄭國泰贓銀二萬兩追贓擬戍劉志選言戍未盡辜逮捕詔獄立斃獄中崇禎改元詔褒其忠復原官子建斗以廕授户部主事朝邑志李朴字季白朝邑人忠鯁敢言萬厯辛丑進士觀政吏部聞母病請假不俟報輒行謫判髙唐起府推官擢戶部主事時朝士各立朋黨臺諫尤好攻擊神宗春秋髙不復視朝朴不勝憤上人望幾空一疏不報是時天下正賦多缺朴以為賦缺由民貧民貧由稅璫為害先後上書極論皆不省朴每一疏出人爭傳誦朝廷曾無可否由是科道益無所忌後為郎中復指名劾之疏奏科道四十餘人交章攻朴朴復數疏力辨語侵閣臣葉向髙奉旨議處值慈聖太后喪建言例在赦列得不死方朴奏上時光宗在東宫每視其疏曰直臣也及即位進太僕少卿卒朝邑志解經雅字岱瀛韓城人萬厯辛丑進士為汝寧司李執法不避權貴外艱歸起補汾州召入吏垣疏六事十苦十失時稱碩畫遷山東觀察使卒韓城志孫振基字爾構潼關人萬厯辛丑進士為黃縣令歲飢躬視粥厰邑無莩民稅監鴟張振基獨不為屈調安丘罷額外征流移來復千餘家禦冦每先登冦輒解去為給諌上建儲疏又上罷紅丸疏上嘉納之巡視光祿糾寺卿之出納天津稅監馬堂乞兼攝江南疏劾之以言多訐直外轉山東僉事乞休賈志李喬崙字孕秀髙陵人喬崑弟萬厯丙午舉人官永平府司理備陳八苦皆經濟名言後為御史敷奏甚多其最著者彈劾魏忠賢一疏歷官參政賈志薛大中字允執三原人萬厯庚戌進士授寧陵令調太康補黃縣益勵清操運遼海米豆二萬有竒開聖水黃城龍灣泉田千頃擢刑科給事中陳六事抗疏言移宫紅丸梃擊諡法議奏剴切後以疾告歸賈志周文煥字堯章富平人萬厯庚戌進士初授諸城知縣捐俸賑飢以卓異上聞歷升文選郎中時魏璫欲相逆黨崔呈秀文煥持之不應呈秀數召概辭弗往璫壻閻青雷欲超選終弗得璫怒矯旨令冡宰自為政弗聽選郎煥知禍及引疾罷竟以憤卒賈志馬逢皋字千里三原人萬厯癸丑進士出知襄陵除富民供具之苦驛遞養馬之纍擢御史抗疏請正綱紀指斥梃擊紅丸遂及墨敕票提等事朝端以肅又力救楊漣以明移宫之案劾御史劉廷元三不忠表提牢王之寀發覺之功轉山東參議詔還授御史有為魏璫起祠真定者逢皋束會稿不行疏劾諸黨逆者中察典降山西都事後授南吏部考功主事三原志楊建烈字義清韓城人萬厯癸丑進士授江西道御史時逆璫用事建烈抗疏擊之出為參議璫怒未巳先後羅織諸直臣中以危法次且及建烈會崇禎御極事已召補山東道御史歷通政使韓城志孫紹統字昌之華州人萬厯癸丑進士授把縣令歷諫垣遷山東按察使政聲彌著因論魏璫削職璫敗起原職尋以病歸賈志曹代之字若參咸寧人領萬厯乙卯鄉薦初任貴州安順司李持法平允吏民畏服時黔冦歸附代之治城修學還定安集哀鴻漸至歷升工科都給事中風岸峭厲抗直敢言己卯督理秦省餉務庚辰竒荒斗米二干錢力請減賦鄉人德之咸寧志左佩玹字左漆耀州人萬厯乙卯舉人授沙河令考選御史疏蠲積逋以假休息速爵賞以勸軍功寬降罰以鼓士氣軫念沙河邢臺二邑疲病特疏條陳又上馬政屯田諸疏以不合當事謫應天知事尋擢户部郎司漕運出守濟南歲凶盜起攻東明圍泰安列十三營勢甚猖獗玹討平之甲申京師陷玹入關避地賊欲用其子重光不從遂死之玹為思痛詩以見志賈志薛文周字晴嵐安定人七歲能屬文弱冠成萬厯丙辰進士仕山東濰縣調掖縣兩邑各建祠擢吏科給諫危言正論多所建白常劾逆璫魏忠賢幾罹禍賴當事營救得免遂稱病乞歸賈志馬鳴世字聲希武功人萬厯丙辰進士歷官操江副都御史初為御史時抗疏劾魏璫黨人魏廣微顧秉謙言甚剴切又疏稱孫慎行伸討賊之義排賞姦之典觸忤舊輔為紅丸一案首擬遣戍宜賜起用又有安民去害一疏甚切吏治後里居逆闖加害賈志劉𢡟字養𠂻臨潼人萬厯己未進士仕項城寧陵新安令遺愛河南擢給事中諫止內操薦馮恭定為正學當柄用劾逆璫魏忠賢於穢熖燻天之日力救楊左諸君子中外咋舌𢡟恬然不顧坐削籍崇禎初韓城閻可升為給諫奏曰逆璫魏忠賢天下皆建生祠惟臣鄉陜西無祠豈非馮從吾廉恥之教乎其薦從吾之劉𢡟宜加優擢疏入詔𢡟復原官召對平臺稱旨改兵垣主驛遞時驛務費繁𢡟剴切言之上方擬大用尋病卒臨潼志厲按明季流冦之亂起於驛卒𢡟疏實為階然其劾逆璫救東林亦諫臣之風節最著者不得因其一言之失而病之也朱國棟字元培富平人天啓壬戌進士歷仕江南蕪湖休寧山陽安東諸大邑俱有政績及考選戶垣陳奏利弊劾地方大吏凡十四疏皆報可旋攝侍郎事册封趙邸却其餽遺以僉都御史出撫山永修武備興屯牧儲蓄充牣晉兵侍壬午出鎮昌平威望益著武辨之貪懦者皆自解去中貴申之秀亦疏辭時兵苦缺餉國棟抗疏請餉士卒感泣以病告歸西安府志王聚奎字伯明郿縣人崇禎戊辰進士由行人授貴州道御史錚錚有直聲以建言謫晉藩幕郿縣志按以上諸公直言讜論悟主匡時今撮其遺事列傳如左至有風節素著而事迹未詳者在元則御史王纘長安人在明則給事中蕭鼎髙陵人徐芳醴泉人都御史劉𢎞道鳳縣人卜奯略陽人御史劉寅雒南人楊鈍鄜州人俱洪武時工科給事中霍榮盩厔人都御史賈古升城固人御史李英洋縣人何益西鄉人李善興安州人任錦商州人王恭乾州人俱永樂時給事中傅榮洋縣人宣德時僉事張善膚施人天順時御史李琰張厚俱醴泉人御史劉九經郿縣人同知劉讓朝邑人御史張聞鄜州人夀王府長史劉蘭清澗人俱成化時郎中鄒相咸寧人御史張邦敷乾州人俱正德時給事中張汝棟涇陽人御史秦時吉南鄭人宣化巡撫孫錦綏德州人俱嘉靖時刑部員外郎袁應春鳳翔人副使張堪褒城人州判劉淳中部人俱萬厯時知縣芮質成漢中人崇禎時皆以真諫著聞本朝黨崇雅字于薑寶雞人天啓乙丑進士纍官户部左侍郎督餉天津順治元年以原官赴京補用九月改刑部左侍郎請更定大清律輕重比附斟酌得宜五年升本部尚書八年調户部時車書日闢軍興費不資崇雅量入為出國用裕如進少保兼太子太保九年請老歸十一年特旨起用授內翰林國史院大學士加太保兼太子太傅崇雅既拜命入直綸扉夙夜匪懈嘗侍世祖顧問曰朕以堯舜之心為心而天下未平何也崇雅曰在善推其所為已矣因請給筆札疏六事以進既出或問何事曰入告君而出語人可乎其慎密如此十三年二月豫告歸九月遣使存問崇雅家居清約門闌悄然每出入一蹇一僮里中不知為師相也康熙三年卒賜祭葬咸如禮張沖翼富平人崇禎壬午舉人授教諭升四川平武知縣順治十四年擢御史疏請復諸生嵗科兩試並豁免各省灘地賠糧巡鹽巡倉鹺漕肅清康熙十二年聖祖親試臺垣奏議沖翼名列第一洊歷大理寺少卿乞假歸卒周之桂字鷲飛咸寧人崇禎癸未進士順治初授秀水令多善政行取諫垣敷陳剴切如請蠲直省宿逋及簡學臣內升皆見採用陟督捕疏請熱審減等照刑部窩逃例移順天府發配又隱匿旗人初有連坐例姦民率挾私妄訐之桂奏請行郡縣查覆以杜誣枉由是省釋無算後官至通政使乞歸李化麟韓城人少有文譽家貧常傭書里中得館穀悉以奉父母崇禎癸未成進士改庶吉士順治初授給事中晉省民上言某地有礦願備資開採廷議將用之化麟力爭不可上疏寢其事居恆謙厚接物至大義所在不可干以私有罪犯應死者持白金求營脫嚴叱之曰殺人者死天可欺乎其清正如此髙辛傳韓城人崇禎癸未進士初授大理評事國初改諫垣遷少京兆提調順天鄉試會中使送兩生入闈辛傳斥之世祖亷得其事召對乾清門嘉其風節屢加超擢歷官工部右侍郎韓故小邑土狹民稠資食於延綏各路亂後盜賊出沒芻粟不至辛傳疏請設兵神道嶺防守有資商民俱便韓邑距潼關二百里挽餉頗艱再疏請免邑人立碑以志不忘康熙二十四年卒賜祭葬初辛傳舉進士值闖逆陷西安逮家屬拷餉從兄汲引挺身往事解得逸歸汲引邑諸生順治六年土冦攻城城幾陷汲引倡義設守會大兵救援城得不陷時有謂邑民通賊欲盡勦諸堡寨以絶根株汲引力請於制府止殱首惡由是全活無算賈𢎞祚字永錫韓城人順治丁亥進士弱冠能文邑令左懋第極器重之性孝友嘗以祿養未遂終身不置酒張樂不衣裘帛篤愛二弟常捐置義田以通賙恤初任章丘令疑獄立剖旋丁外艱服闋補尉氏邑舊有報墾田六百餘頃為民纍𢎞祚躬行勸課稅額始辦內艱歸再補元氏擢御史封章數十上其舉孝義重師儒一疏尤剴切出視長蘆鹽政商人例餽萬金悉屛弗納嘗按部所屬餽黃金飲器正色叱之差竣還京請告歸杜門謝客年登大耋好學不倦子締芳字懷伯讀書勵行少從盩厔李顒遊學有根柢聞父道左令軼事心慕之為搜輯遺稿以崇儉一書付梓年三十六卒所著有思誠録楊素藴宜君人順治壬辰進士初任東明令考最擢四川道御史劾奏吳逆被謫暨變起大臣交章薦之復起督學山西晉人有關西夫子之頌歷順天府尹出為安徽巡撫值夏逢龍作亂調撫湖廣時武昌新經兵燹加意撫循病革猶採陳民間疾苦竟以勞勩卒官梁鋐字子逺三原人賦姿英敏登順治乙未進士選庶常旋改給諫遇事指陳得失無所回護直聲震一時清正雅亮歷官三十年猶僦屋而居有勸其置買田宅者則引清白吏貽子孫語以謝之歷倉場總督户部侍郎生平於書無所不讀丁外艱悲泣傷目母卒哀毁逾甚遂失明竟卒子涏之由諸生令湖口再令富川馴服苗夷邑中向化歷光祿寺署正清操如一日殆無忝厥父云衛執蒲字禹疇韓城人順治辛丑進士初授新樂令請蠲荒地賦額三千緡時郡邑徵賦以銀七錢三為額執蒲請從民便悉遵市值收錢歲省民財萬餘金流亡漸集邑稱樂土尋遷户部主事督理通倉盡革收漕諸弊廷臣交薦授雲南道御史有請裁所歸驛并復設延安巡撫兩疏皆關大計旋出視浙鹺廉聲特著時西南方用兵秦民困於飛挽執蒲請用水運可自楚直達漢中公私交便歷僉都通政先後疏凡數十上二十七年奉命祭告南海道拜左副都御史以病卒於廣州王焯字仲􅌢三原人康熙庚戌進士令直𨽻阜城地雜旗屯民多影射首行均稅法俾豪無匿田田無匿稅更立徵輸十限民無逋賦境內帖然擢刑垣旋掌吏垣論事多達大體晉通政轉僉都陟太常卿皆著清聲尋乞歸癸未秋鑾輅西巡焯迎覲潼關天語垂注賜御書唐律陜西通志卷六十
