body:
  text: 陜西通志巻五十九人物五勇畧下五代王䄠字衆美京兆人少事梁太祖為小校尚讓攻梁戰尉氏門檀勇出諸將太祖竒之遷踏白副指揮使從太祖破魏内黄復從朱珍攻徐州獲其將一人攻王師範以一軍破其宻州拜宻州刺史太祖即位遷保義軍節度使潞州東北面招討使晉兵圍邢州太祖欲自將救之檀止太祖請拒敵力戰卒全邢州以功加同平章事進封瑯琊郡王貞明元年徙匡國是時莊宗取魏博檀謂晉兵悉在河北檀以竒兵西出隂地襲太原不克而還徙鎮天平檀嘗招納亡盜居帳下帳下兵亂入殺檀諡曰忠毅五代史本傳孫徳昭五原人為神䇿軍指揮使光化三年劉季述廢昭宗幽之東宫宰相崔𦙍謀反正隂使人求義士可共成事者徳昭乃與孫承誨董從實應𦙍天復元年正月朔季述將朝徳昭伏甲士道旁邀其輿斬之分索餘黨皆盡昭宗反正以功拜静海軍節度使號扶傾濟難忠烈功臣與承誨等皆同平章事圖形凌煙閣留京師號三使相恩寵無比時崔𦙍欲誅宦官外交梁以為恃冬十月宦者韓全誨刼昭宗幸鳯翔承誨從實皆從徳昭獨率兵衞𦙍及百官保東街趨梁兵西梁太祖至京師表同州留後梁兵圍鳯翔徳昭以兵八千屬太祖昭宗東遷拜左衞上將軍以疾免太祖即位以烏銀帶袍笏名馬賜之疾少間以為左衞大將軍末帝立拜左金吾大將軍卒五代史本傳袁建豐不知其世家晉王討黄巢至華隂闌得之時方九嵗愛其俊爽收養之長習騎射為鐵林都虞候以功遷突陣指揮使從莊宗破夾城戰柏鄉入魏取衞磁洺三州拜洺州刺史擊梁將王千斬首千餘級獲其將校七十餘人遷相州刺史從戰胡栁指揮使孟謙據相州叛建豐還討平之徙隰州刺史病風廢明宗即位以舊恩召還京師親幸其第撫慰甚厚卒贈太尉五代史本傳宋張保續字嗣光萬年人父洪唐左武衞上將軍保續梁貞明中補臨濟尉後唐天成初改贊善晉天福中領通事舍人契丹入冦杜重威李守貞等連兵禦之命保續馳騎往來軍中論機事大破敵於陽城使還充西上閤門副使周祖革命詔為東上閤門副使從平慕容彦超世宗即位從征淮南夀州納欵遣保續先往撫慰以功遷判四方館事從平瓦橋關奉使吳越宋初遷衞尉卿保續性介直好儉素善宣贊辭令累使蕃國不辱命從征李筠以足疾歸京師卒宋史本傳杜漢徽長安人父阿孫為太原威勝軍使漢徽有膂力善騎射年十七仕後唐武皇為直隊長晉開運二年戍深州破契丹於樂夀殺獲甚衆漢初從髙行周討杜重威於鄴屢為流矢所中身被重創猶力戰觀者壯之周世宗征劉崇漢徽有戰功補都虞候宋初領茂州刺史從平李筠又從平李重進錄功居多建隆三年出為雄武軍使知屯田事是冬被病即以符印授通判宋鸞請告歸卒宋史本傳崔翰字仲文萬年人少有大志風姿偉秀太祖見而竒之以𨽻麾下從周世宗征淮南平夀春取關南以功補軍使開寶九年領端州刺史太平興國四年從征太原總馬步諸軍攻城流矢中其頰神色不變督戰益急太原平命知定州契丹兵數萬冦滿城㑹李漢瓊兵於徐河河陽節度崔彦進兵自髙陽關繼至因合擊之俘馘數萬所獲他物又十倍焉以功擢武泰軍節度使明年出為感徳軍節度時盜賊充斥翰戒以禍福羣盜感悟歸農雍熙四年移鎮鎮安軍淳化三年召還以疾留京師稍間入見上曰臣既以身許國願得以馬革裹尸上壯之復令赴鎮月餘卒翰驍勇有謀輕財好施死之日家無餘貲子繼顒虞部員外郎孫承業閣門祗候承祐内殿崇班宋史本傳梁延嗣長安人少事髙季興頗見委任表授檢校司空充衙内馬步軍都指揮使歴事四帥人稱忠藎繼沖之納土也延嗣嘗勸之復率荆州水軍從慕容延釗趨戰太祖嘉之授復州防禦使充前軍都指揮使自復州入朝太祖慰撫之曰使髙氏不失富貴爾之力也改濠州防禦使有善政詔書褒美延嗣頗知書好賢接士開寶九年卒宋史本傳雷有終字道成徳驤子郃陽人以䕃補司户參軍淳化初遷知江陵李順之亂命為峽路轉運使同知兵馬事調發兵食規畫戎事皆有節制行至峽中遇盜且行且戰進至廣安軍賊衆奄至有終引竒兵出其後擊之賊驚擾赴水死者無算就拜諫議大夫知益州賊平改知許州咸平三年益州戍卒擁都虞候王均為亂陷漢州進攻綿州即日拜有終瀘州觀察使知益州兼川岐兩路招安捉賊使有終至收復瀘州進壁昇仙橋賊出攻砦有終擊走之進攻彌牟砦斬首千餘級賊由昇仙橋分路來冦有終逆擊大敗之均撤橋塞門官軍進至清逺江為梁而渡克城北羊馬城設鴈翅敵棚覆洞屋以進遂入城均突圍遁有終遣軍追之均窮蹙縊死加保信軍節度觀察留後改知永興軍府景徳初契丹入冦上幸澶淵有終赴援威聲甚振還拜宣徽北院使檢校太保卒子孝若為閤門祗候孝傑為内殿崇班孝緒為供奉官孝恭為侍中禁有終倜儻自任能撫士卒豐於宴犒官用不足則傾私帑以給之家無財身没之日宿負猶不啻十萬宋史雷徳驤傳雷孝先字子思有終兄子舉進士試大理評事王均反益州隨季父有終進討孝先帥先鋒與賊戰昇仙橋斬首數百改將作監丞李繼遷陷靈州朝廷調兵軍費多出於民關内大擾孝先請募商人入粟塞下償以茶鹽詔對稱㫖後多施行遷屯田員外郎嘗建置三司拘收司以掌天下財利出入之數詔如其請遷領軍衞大將軍分司西京卒子簡夫字太簡隠居不仕樞宻使杜衍薦以秘書省校書郎簽書秦州觀察判官知坊州徙簡州用張方平薦知雅州辰州蠻酋彭仕義内冦命簡夫督諸將進兵築明溪上下二砦據其險要拓地石馬崖五百餘里仕義内附擢三司鹽鐵判官累遷尚書職方員外郎卒錄其子爵臣為郊社齋郎宋史雷徳驤傳种古字大質世衡子京兆人少慕從祖放為人不事科舉當任官辭以與弟時稱小隠君世衡卒錄為天興尉累知原州羌人犯塞古禦之斬級數百築城鎮戎北以據要害神宗詔對遷通事舍人與弟珍破環州折薑㑹斬首二千級遷西上閤門副使民有損直鬻田於熟羌以避役者古按其狀得良田三千頃丁四千悉刺為民兵歴環慶永興軍路鈐轄坐訟范純仁奪官知寧州徙鎮戎軍熙河師十萬道境上須芻糧僚佐以他路為言古曰均王師也命給之徙鄜隰二州卒宋史种世衡傳王嵩清澗僧种世衡在清澗元昊未臣其貴人野利剛浪㖫遇乞親信用事邊臣欲以謀間之有僧王光信者趫勇善騎射習知蕃部山川道路世衡出常使為鄉導數盪族帳奏以為三班借職改名嵩世衡為蠟書遣嵩遺剛浪㖫言朝廷知王有向漢心剛浪㖫得書大懼執嵩歸元昊昊疑剛浪㖫貳已錮嵩穽中使其臣李文貴以剛浪㖫㫖報世衡世衡召文貴至諭以國家寛大開納意縱使還報元昊得報出嵩禮之甚厚遂稱臣如舊世衡聞野利已誅為文越境祭之龎籍疏嵩勞具言元昊未通時世衡畫䇿遣嵩冐艱險間其君臣遂成猜貳因此與中國通請優進嵩官遷三班奉職後又進侍禁閤門祗候宋史种世衡傳种誼字夀翁世衡子熙寧中從髙遵裕復洮岷平山後羌為都監自蘭州渡河討賊斬首六百元祐初知岷州鬼章入冦結屬羌為内應誼與姚兕合兵出討羌迎戰擊走之追奔至洮州亟進攻晨霧蔽野誼曰吾軍逺來乗此可一鼓下也霧霽先登者已得城鬼章就執拜西上閤門使康州刺史徙知鄜州夏人犯延安趙卨使誼統諸將敵聞誼至皆潰去延人謂得誼勝精兵二十萬進熙河鈐轄知蘭州蘭與通逺皆絶塞保障不相接誼請城李諾坪以扼衝要遷保州團練使卒誼倜儻有氣節蒞軍嚴整每戰未嘗負敗宋史种世衡傳李浩字直夫本綏州人務學通兵法以父定廕從軍破儂智髙韓絳城囉兀領兵戰賞堡嶺川殺其首領訛革多移斬首千三百餘級積官廣西都監著安邊䇿從章惇討舒光貴破盈口栅蠻賊田元猛元喆合狤狑拒官軍浩分兵擊之殺狤狑降元猛元喆城懿州進破黔江蠻復城黔江擢熙河鈐轄李憲討山後羌浩將右軍至合龍嶺㑹戰遣降羌乞嘊輕騎突敵帳俘獲冷雞朴李宻斬馘三千遷副總管知河州安撫洮西五路大舉浩將前軍復蘭州遷知蘭州兼熙河涇源安撫副使哲宗即位拜忠州防禦使卒宋史本傳張岊府谷人為牙將有膽畧善騎射天聖中西夏觀察使阿遇有子來歸阿遇冦麟州虜邊户約還子歸所虜麟州還其子而阿遇背約安撫使遣岊詰問岊徑造帳中以逆順諭阿遇悉歸所虜州將補為來逺砦主手殺偽首領奪其甲馬時年十八名動一軍元昊犯鄜延岊從折繼閔破浪黄黨兒兩族斬偽軍主敖保時賜軍衣至麟州不得前岊往䕶之至者睂浪遇賊接戰流矢貫雙頰岊拔矢鬬愈力奪馬十二匹而還賊攻府州城西南隅卑下賊將登岊乗陴大呼搏賊飛矢中右目下身被三創晝夜督守圍解以勞遷右班殿直為麟州府道路巡檢至深栢堰遇賊分兵追擊斬首百餘級近郊民田秋成未敢穫岊以步卒九百人䕶之大敗賊於龍門川通麟州糧道破賊於栢子砦改左班殿直内侍宋永誠傳詔砦下岊護永誠遇賊三松嶺賊矢中岊臂猶躍馬左右馳射諸將乗勝而進賊將棄潰改西頭供奉官累遷洛苑使前後數中流矢創發臂間卒宋史本傳王凱字勝之全斌曽孫祖審鈞嘗為永興軍駐泊都監遂家京兆饒於財凱散施結客日馳獵南山下以踐蹂民田捕至府時冦準守長安見其狀貌竒之為言全斌取蜀有勞而審鈞以忠義死當錄其孤遂以為三班奉職元昊反徙麟州都監嘗出雙烽橋遇夏人破之又破龎青黄羅部再戰於伺候峰遷麟州路緣邊都巡檢使入兎毛川賊衆三萬凱以兵六千陷圍矢中面鬬不解斬首百餘級賊自蹂踐死者以千數後為并代鈐轄夏人二萬㓂青塞堡凱出鞋邪谷轉戰四十里至杜􅨨川大敗之前後斬首三百餘級獲馬牛器械以數千計經畧使明鎬言凱在河外九年有功遂領資州刺史累遷涇州觀察使又徙秦鳯路帝諭以唃氏木征交易阻絶頗有入冦之萌宜安静以處之凱至以恩信撫接遂復常貢召拜侍衞親軍馬軍副都指揮使卒諡莊恪子緘緘子詵字晉卿能詩善畫官至留後宋史王全斌傳延安老校寶元元年西虜圍延安七日鄰於危者數矣范雍為帥憂形於色有老軍校出自言曰某邊人遭圍城者數次其勢有迫於今日者虜不善攻卒不能拔今日萬萬無虞若有不測某甘斬首范嘉其言壯人心亦為之小安事平此校大䝉賞拔言知兵善料敵者首稱之或謂之曰敢肆妄言萬一言不應須伏法老校笑曰君未思也若城果陷何暇殺我聊欲安衆心耳夢溪筆談李庠字彭年唐郇王裔萬年人性純厚長於吏事父尚書在真定斷獄有令名庠多助焉佐政萬年善窒訟源趙元昊反陳禦敵之䇿甚備仁宗嘉納之在河東自分諸將占地總兵使應機制敵各專其責籍戍兵以時更代人皆便之涇原嵗饑主計者以乏軍儲不蠲民租庠請減邊兵就食内地租遂得蠲人服其達環慶羌衆逼境四路都帥遣使促兵擊賊庠請堅壁清野以困之帥用庠言賊果去其臨事應變類此賈志姚兕字武之五原人補右班殿直為環慶巡檢與夏人戰一矢斃其酋衆潰因乗之遂破蘭浪敵大舉㓂邊兕駐荔原堡據險張疑兵伺便輒出有悍酋臨陣兕射中其目斬首還明日來攻益急兕手射百人遣子雄引壯騎掩其後所向必克敵度不可破乃退攻大順城兕復往救轉鬬三日斬級數千卒全二城慶軍叛兕以親軍守西關下馬與語皆感泣誓無復叛遷為路都監攻河州飛矢貫耳戰益力河州既得又為鬼章所圍兕乃往擊隴宗圍遂解累遷皇城使從攻交阯破乞弟遷東上閤門使徙熙河與种誼合兵討鬼章於洮州破六逋宗城夜斷浮橋援兵不得渡遂擒鬼章拜通州團練使卒於鄜延總管宋史本傳姚麟字君瑞兄兕攻河州時俱在兵間中矢透骨鏃留不去以彊弩出之笑語自若積功至皇城使為秦鳯副總管從李憲討生羌擒冷雞朴轉英州刺史元豐西討以涇原副總管從劉昌祚出戰勝於磨􅗹隘督諸將討堪哥坪經畧盧秉上其功擢威州團練使歴都指揮使節度建雄定武軍檢校司徒卒贈開府儀同三司麟為將沈毅持重不少縱捨宿衞士嘗犯法詔釋之麟杖之於庭而後請拒詔之罪故所至肅然宋史姚兕傳王文郁字周卿新秦人為府州巡檢韓琦薦其才加都監熙寧討夏國文郁敗之吐渾河其將香崖夜遣使欲舉衆降旦至衆情忽變譟以出文郁擊之追奔二十里據險大戰矢下如雨文郁渡河謂吏士曰前强敵後天險韓信驅市人且破趙况爾曹皆驍勇耶士感奮進擊夏人大潰遷通事舍人夏人踰屈野河掠塞上文郁追至長城坂盡奪所掠而還神宗召見知文郁善左射閲肄殿庭文郁九發八中遷知麟州夏衆踐稼襲敗之未幾為熙河將李憲討靈武文郁得羌户萬餘遷鈐轄夏人圍蘭州已奪兩關門文郁募死士持短兵突賊即掃營去擢知蘭州夏人大入文郁乗城禦之殺傷如積圍解加榮州團練使知河州築安西城金城關進秦州防禦使冀州觀察使卒宋史本傳游師雄字景叔武功人學於張載第進士趙禹師延安辟為屬時夏人擾邊諸城兵力咸弱卨患之師雄請發義勇以守多聚石城上夏人知有備不敢入嵗饑行諸壘賑貸計口受糧人無殍亡元祐初吐蕃冦邊構夏人為亂詔師雄行聴便宜從事師雄分兵為二姚兕將左种誼將右兕破六逋宗城斬首千五百級誼破洮州擒鬼章及大首領九人斬首千七百級後遷陜西轉運判官夏人侵涇原復入熙河師雄言宜於定西通渭之間建三栅以固藩籬詔付范育皆如議拜祠部員外郎召詣闕哲宗數訪邊防利病師雄具紹聖安邊䇿上之出知邠州徙知陜州卒師雄慷慨豪邁有志事功議者以用不盡其材為恨宋史本傳姚雄字毅夫兕子五原人少勇鷙有謀年十八佐父征伐從討金湯以百騎先登奪隘官累左騏驥使紹聖中章楶城平夏雄部熙河兵䇿援夏人傾國來與之鏖鬬流矢注肩戰罙厲賊引却追躡大破之斬首三千級俘虜數萬城成擢秦州刺史明年虜攻平夏勢鋭甚雄與弟古合兵却之徙知㑹州遷熙河鈐轄羌人攻湟鄯詔雄援之自鄯至湟四戰皆㨗遂築安鄉關通湟水漕運商旅負販入湟者始絡繹於道加復州防禦使進左金吾衞上將軍以檢校司空奉寧節度使致仕卒諡武憲宋史姚兕傳种師道字彛叔世衡孫以廕補三班奉職知西安州夏人侵定邊築佛口城率師夷之遷防禦使知渭州督諸道兵城席葦土賦工敵至堅壁葫蘆河師道陣於河滸隂遣偏將曲克徑出横嶺揚言援兵至敵方駭顧楊可世潛軍軍其後姚平仲以精甲衝擊之敵大潰卒城而還詔帥兵征臧府城期旬日必克敵守備甚固列校有自休者立斬之衆股慄譟而登城即潰從童貫為都統制貫欲伐燕師道諫不聴謫為右衞將軍致仕金人南下趣召之加少保師道至洛陽聞斡離不已屯京城下掲榜沿路言种少保領兵百萬來金人懼徙砦増壘自衞欽宗聞其至喜甚拜少傅京畿兩河宣撫使金使王汭在廷望見師道拜跪如禮帝笑曰彼為卿故也師道請緩金嵗幣使彼惰歸扼而殱諸河執政不可金師退罷為太一宫使御史中丞許翰奏師道尚可用加少師進太尉河北河東宣撫使師道請合關河卒屯滄衞孟滑備金兵再至朝論敵甫退不宜勞師既而召還太原陷又使巡邊亟上疏請幸長安以避其鋒大臣以為怯復召還既至病卒諡忠憲宋史种世衡傳張宗顔字希賢延安人補三班借職積官至涇原副將張俊選為統領從俊討湖西冦秀州軍校徐明以城叛宗顔夜襲其城明遁遷御前中軍統制金人攻明州宗顔破其前軍從俊討李成與成將馬進戰玉隆觀敗之以兵襲擊淮北遷崇信軍承宣使偽齊入冦張俊檄宗顔自泗州為後繼與劉猊遇於李家灣大破之猊僅以身遁擢知廬州總帥事敵數百騎至城下宗顔以百騎遇之敵退紹興九年卒諡壯敏宋史本傳解元字善長保安軍人起行伍𨽻韓世忠麾下擢偏將世忠出下邳金兵大至士皆駭愕元領二十騎擒其生口俄逢騎數百身自陷陣横刺部長墜馬餘皆遁去苗傳劉正彦之變從世忠追賊擒於浦城金人攻浙西世忠以海艦横截大江金人出小舟以長鈎扳艦元躍入敵舟以短兵擊殺數十人擒其千户授統制前軍討閩冦范汝為轉討湖外諸盜時劉忠據白面山元率兵五百四面並進賊平改相州觀察使紹興四年金人偽齊合兵入侵元屯承州遣百人伏要路百人伏嶽廟自以四百人伏路隅金人走城下伏發進退無路元追獲四百八十人時城中兵不滿三千金萬户黒頭虎造城下元微服出偽若降者金人稍懈俄伏發擒黑頭虎金兵四集元戰却之從世忠出下邳以數百騎破敵伏兵授保順軍承宣使畧地淮陽騎三百當敵騎數千元揮戈大呼轉戰自辰至午敵退成列而還進保信軍節度使宋史本傳金龎迪字仲由延安人少倜儻喜讀兵書習騎射應募𨽻涇原副將破賊有功授保義郎從百餘騎行山谷遇夏人數千衆懼請避迪躍馬犯陣敵皆披靡擢為正將權知懐徳軍夏人合軍五萬薄懐徳迪開門待之夏人不敢入因以數千騎分門突出遂破之斬獲甚衆改華州防禦使天眷元年除永興路兵馬都總管知京兆府徙臨洮尹陜右大饑流亡四集迪開渠溉田流民居民各得其所七年除慶陽尹以最聞正隆元年遷鳯翔尹海陵征斂煩急官吏因緣為姦迪不加威督而力役均人情大悦大定初遷南京路都轉運使以省事惜費安静為政徙絳陽軍節度使卒迪性純孝父疾仰天泣禱刲股作羮由是獲安昆弟析家財迪盡以與之官爵之廕率先諸侄金史本傳楊仲武字徳威保安人父遇以勇聞關西為宥州團練使宋末仲武謁經畧使王庶用為先鋒婁室入關與鄭建充俱降為環慶路兵馬都監皇統初復陜西將兵戍鳯翔屢却宋軍除知寧州關中薦饑境内盜賊縱横仲武悉平之遷同知臨洮尹改同知河中府臨洮地接西羌與木波雜居邊將貪暴木波苦之遂相率為冦掠仲武前治臨洮從數騎入其營諭之羌人喜悦冦掠遂息至是木波復掠熙河主帥使人諭之不肯去詔復遣仲武及至責以負約對曰邊將苦我今幸見公願終身不復犯塞乃舉酒酹天折箭為誓仲武因以巵酒飲之羌人羅拜而去大定三年除武勝軍節度使改陜西西路轉運使卒金史本傳完顔色埓黙名鼎字國器陳和尚兄豐州人年二十以善戰知名自夀泗元帥轉安平都尉鎮商州威望甚重敬賢下士有古名將風金史完顔陳和尚傳元謝睦歡豐州人以貲雄鄉曲間大兵南下轉客烏拉城太祖攻西夏過其城睦歡與其帥迎降從攻西京睦歡力戰先登連中三矢仆城下太宗命軍校拔矢縛牛刳其腸裸而納諸牛腹中良久乃甦誓以死報每遇敵必身先之官至太原路金銀鐵冶達嚕噶齊元史謝仲温傳郭寶玉字玉臣華州人通天文兵法善騎射金末封汾陽郡公引軍屯定州㑹穆呼哩軍至寶玉舉軍降引見太祖問取中原之䇿寶玉對曰中原勢大西南諸蕃勇悍宜先取之以圖金又言建國之初宜頒行令帝從之授鈔馬都鎮撫從穆呼哩取永清破髙州降北京龍山復破太原平陽諸州縣從帝討契丹遺族破其兵三十餘萬收巴實伯里丕實南等城次和卓河西人列陣戰方酣寶玉疾呼曰西陣走矣其兵果走追殺幾盡次暗水河敵陳船河中寶玉令發火箭射其船一時延燒乗勝直前斬大將卓琳收摩哩四城從托卜蘇布特二先鋒收契丹渤海諸國有功累遷斷事官子徳海徳山徳山以萬户破陜州攻潼關卒徳海字大洋亦通天文兵法金末為穆昆擊宋將彭義斌於山東敗之大軍至乃出降從托卜西征踰雪嶺西北萬里進軍次達魯國平之還至峥山吐蕃囘紇反破之從元帥庫庫入關中金人閉關拒守徳海斬關入破南山八十三寨與金將武仙軍十萬遇於白河斬首二萬餘級復破金軍於鄧至均州辛夘春金人圍之我軍衝圍而出金人死者三十餘萬又破金將喀齊喀兵於中牟完顔色埓黙帥軍來戰先登破之以功遷右監軍壬辰破金師於黄龍岡癸巳取申唐二州甲午河南叛徳海討之砲傷其足以疾卒元史本傳王檝字巨川虢縣人父霆金麟遊主簿檝性倜儻元帥髙琪薦授副統軍太祖南下兵敗見執義而釋之授都統從大軍破紫荆關取涿易保州中山軍次雄州孫吳堅守不下檝入城諭以禍福吳遂降授宣撫使從南征下古北口攻薊雲順等州所過迎降得漢軍數萬圍中都中都降入覲授銀青榮禄大夫時都城廟學燬於兵檝復立之春秋率諸生行釋菜禮從征西夏及秦州夏人進撤橋梁軍阻不得前檝夜督士卒運木石比曉橋成軍乃得進命領省中都盜起掠近縣檝曰都城根本之地不可無備引水環城人心稍安遣男守謙率諸軍討諸盜平之從征關中長驅入京兆進克鳯翔從攻汴京奉命持國書使宋宋人甚禮重之檝前後凡五往以和議未決隠憂致疾卒元史本傳郭侃字仲和徳海子弱冠為百户鷙勇有謀畧金將博索取衞州侃拒之破其兵四萬遂渡河襲金主至歸徳攻汴西門金元帥崔立降以下徳安功為千户從宗王錫里庫西征西城平世祖即位上疏陳建國號築都城立省臺興學校等二十五事及平宋之䇿後皆如其䇿中統二年擢江漢大都督府理問官三年益都李璮及徐州總管李杲格俱反宋夏貴來犯邊史天澤薦侃召入賜尚衣弓矢馳至徐斬杲格杲格弟里瑪復與夏貴來擾邊境侃出戰斬首千餘級至元五年濟南胡王反討平之七年彰徳趙當驢反又平之帝以侃習於軍務擢為萬户從軍下襄陽江南平知寧海州居一年卒侃行軍有紀律野㸑露宿不入民舍所至興學課農吏民畏服元史郭寶玉傳任進鄜州人至正間為鄜坊康定軍節度使勇畧著聞朝野倚重及没朝廷禮葬焉子貴至正末充征南統軍大元帥屢立戰功邊疆寧謐馬志明車泰字子陽華州人洪武中嵗貢除户科給事中歴遷山東叅政靖難兵起進攻徳州泰與鐵鉉協力拒守不下隨機應變成祖終莫能克進左布政使永樂初以前事逮京念為髙皇帝侍從舊臣免問調四川左布政賈志郭繼宗洵陽人洪武初從軍有開造功守紅岩關禦紅巾賊之亂授南京鎮南衞百户成化中改金州守禦千户所洵陽志林嵩邠州人國子生任御史成祖渡江言事忤㫖謫戍廣西交阯叛以嵩往征之嵩夙嫻韜畧卒能底定授交州府同知歴陞叅政賈志石岩字廷舉渭南人嫻武畧善騎射洪武中戍大寧寛河衞尋從文皇舉靖難兵立功陞本衞千户永樂中扈從北征至元㝠河戰退布尼雅實哩陞本衞指揮僉事以忠謹見稱從子亨嗣渭南縣志亨不學英果有膽氣善騎射從子彪揮斧挽强亦不在亨後每出戰亨先登彪從之亨累功都指揮使彪亦授大同衞鎮撫正統中亨遷都督僉事為大同左叅將守萬全彪亦遷都指揮己巳之變亨繫獄冦至京城下景帝赦之使將兵亨與彪出安定門馳突截殺㓂却而西亨等追擊城西冦復却而南追及清風店冦懼且出倒馬關亨使紿㓂皆反戰亨彪復擊殺數百人盡棄其羊馬輜重而還亨封武清伯尋進侯總京營兵彪陞都督僉事為大同左叅將諸子並陞千户景帝不豫亨隂約徐有貞等迎上皇復位論功封忠國公仍理後軍都督府事召彪為都督同知充遊擊將軍凡以迎駕奪門論功者前後四千人亨日於上前言事上心漸厭亨其始有請盡見從無何可八九又無何可四五又無何可二三耳彪以亨功一再遷為後軍右都督天順元年以遊擊將軍遇冦磨兒山大敗之封定逺伯又明年冦屯賀蘭山後使彪往彪連戰安邊營追至昌平墩大敗之轉戰六十餘里交鋒數十合斬酋果勒齊平章召彪還進爵為侯彪在大同既誣陷都御史年富復數侮其總兵總兵因彪嘗奏城威寧海子遂為流言誣彪有異志上疑之下彪獄予亨病告凡附亨進者皆貶黜四年春逯杲上章言忠國公怨望益甚遂命籍亨彪家及其莊田之在渭南者亨死獄中彪伏誅名山藏亨從孫進士俊者素有才名亦被收時人寃之渭南縣志鞏固洋縣人宣徳中知四川珙縣有勇畧生擒賊首阿具田等夷人畏憚不敢近城四川通志楊洪字宗道漢中衞百户馬志洪永樂初調開平八年從征追虜至鄂諾河洪熙元年追虜至大松林有功陞正千户宣徳中累功陞指揮使尋充遊擊將軍至瓦房嵯大破虜陞僉事正統元年副都督李謙守懐來追敗虜至三乂口其冬擊虜囘囘墓大破之三年追敗虜巴延山遷都指揮同知尋進都指揮使四年追叛虜阿穆蘭進都督府僉事七年充左叅將敗虜北只嶺進同知九年掛鎮朔將軍印充總兵鎮宣府洪為人機變敏㨗尚權譎善於用竒制勝虜畏之呼為楊王見洪旗幟相戒不敢出入十四年土木師潰虜偽上㫖予洪書誘使開門迎上洪謹閉不出縛使者送京師進封昌平伯虜犯京師洪率六萬騎入援追虜至金坡鎮斬首四百進昌平侯景泰二年卒諡武襄洪為將敬慎强敵不怯戰勝不驕宣正間稱名將子傑嗣侯庶子俊以擒逆閹喜寧功陞右都督從子四人能都督同知信都督僉事仁錦衣衞指揮僉事智開平衞指揮使能後封武强伯信封彰武伯明史竊成化元年冬摩囉歡冦陜西彰武伯楊信禦之遁去紀事本末傅瑛綏徳衞指揮使屢立邊功成化元年設鎮立堡命瑛督工一年以功陞都指揮僉事八年守定邊授都指揮同知後㨗於紅鹽池陞都指揮使二子釗鐸皆以邊功顯釗承父廕解大同圍有功授都指揮僉事協守寧夏累官副總兵好文愛士諳達邊務正徳初統延綏義勇軍往來破敵敵不知所備號為驍傑鐸長於謀勇能以寡勝衆平洛川賊授都指揮協守寧夏大樹勲績延綏志王信字君實南鄭人姓譜成化二年二月特擢鎮守荆襄王信為都指揮同知劉千斤之亂荆襄震驚信度房陵險要自率數十騎往據之調集兵民不滿千人賊四千餘突至圍城攻之援絶信多張旗舉火日夜不息歴四旬間以死士出城五六里舉火礟賊以為援兵驚潰信追擊之大利紀事本末信沉毅簡重被服儒素出鎮三十年笥無華衣廐無肥馬鈴閣之下寂無人聲亷平錄神英字景賢延安衞指揮使驍勇敢戰累有斬獲功成化𢎞治間以總兵官守寧夏延綏宣府大同歴四鎮正徳初封涇陽伯延綏志正徳五年命涇陽伯神英率師討寘鐇明紀輯畧彭清字原潔綏徳衞指揮𢎞治中擢副總兵守甘肅有功代劉寧為總兵官清乆鎮西陲威名甚著性亷潔遭母及妻妹四喪貧不能歸葬卒之日命其子不得受賻贈帝特命撫臣發帑金資送歸里延綏志土番蘭芽守哈宻副總兵彭清統鋭卒乗夜倍道襲蘭芽師入哈宻得牛羊三千斬級六十西域自是頗憚中國紀事本末曹雄西安左衞指揮累官都督同知寘鐇反雄趣兵赴靈州收船約諸鎮渡河討之大張兵威七日而會者數萬仇鉞藉其聲勢盡平逆黨雄拜鎮西將軍馮志楊宏西安左衞指揮使亷勇過人博覽羣史成化時以薦陞都指揮守固原請築紅古城募衆屯田扼入冦路掌陜西都司事平漢南盜斬首八百餘級陞總兵鎮松潘平大盜鄢本恕廖林子等斬首數百級降二萬人以功累陞南京都督召入後府改守淮揚總督漕運剔蠧清逋増制淺船省費五十萬召為南京中府宏居官中外五十年臨事多算以智將稱賈志王緒華隂人𢎞治己酉舉人正徳中為諸城縣令流賊攻城下親率諸邑兵民逆戰斬賊首賊遁一境獲全及論功當事索賄弗叙竟拂衣歸諸城祠之賈志劉繼宜川人卓犖不羣慷慨多大畧善騎射正徳間以貢生任盧氏縣令時大盜劉六劉七等攻城掠邑繼先期斂民入城堡四境獲全復領本邑募丁夜襲破賊以軍功上於朝會疾大作而歸繼子廷瑚嘉靖初任延津令承天之役所過郡邑無一獲全廷瑚預置髙樓凡飲食供帳先以號帖投諸司必諸司遣人至樓下驗號帖乃給之一時上下皆得飽食上嘉之手書一等官員額其縣堂繼祖父多隠徳嘗拾遺金二百還其主積徳之家必以劉氏為首稱賈志時源綏徳衞指揮為人質實亷能驍勇絶倫以邊功歴鎮三秦時蜀賊作亂遷源為平賊將軍督各鎮兵討平之又於陽武縣征劉六劉七有功延綏志馬昊改姓鄒其先句容人後徙居長安長身驍㨗善騎射舉𢎞治乙未進士為御史擢僉事以直言屢謫因蜀盜藍鄢叛合四省兵討之擢昊以僉事治兵斬將受降遷秩副都御史僰人普法等僭號攻刼擒誅之累遷右都御史長安志徐璉朝邑人𢎞治進士由户部郎中出為袁州知府宸濠變起璉起兵會王守仁於樟樹鎮同臨江戴徳孺贛州邢珣等各將精兵破宸濠於黄家渡獲首功事定遷江西右叅政世宗錄功増秩二等明史稿列傳王勛榆林衞指揮為人英邁騎射出衆以軍功為都督僉事鎮守延綏弟効嘉靖中為寧夏總兵敗濟農於栁門明年敵以十萬騎冦邊復連破之累功進左都督効言行謹飭用兵兼謀勇名振西陲卒諡襄武延綏志桑蓁字徳美長安人父濟邦正徳中舉人仕陽城令清介絶俗蓁嘉靖己酉舉於鄉初仕杭州府通判時礦徒為亂蓁招降其衆復殱其酋孽擢同知太原府會雲中警甚以兵援廣武被圍者三日夜蓁出竒衝突圍解㨗聞賜金幣遷按察僉事巡轄遼左以終養歸籍長安志劉鸞白水人舉人正徳五年知東明縣時流賊攻東門二日幾陷鸞登城督戰幾百餘合項刺二創神色不變巡守愈勵乗風縱火賊圍始解活數萬民監司以上聞有綵緞之賜畿輔志楊伸同官人任山東安東衞指揮僉事驍勇諳韜畧正徳間流賊起奮不顧身斬首獲虜陞指揮使進階昭勇將軍馬志王縉西安左衞人以指揮僉事戰清水河積功遷固原守備旋充右叅將分守延綏戰涼水灣攻孟家塔破髙松砦援神木山擢副總兵協守延綏拜征西將軍總兵官鎮守寧夏以義渠之衂罷延綏志孟孝臣榆林人蘭州叅將質朴有膽畧與士卒同甘苦火篩剽掠内地孝臣奉檄䇿應寧河一㨗幾破敵膽復潛師馳䕶郡城敵齧指不敢近又帥兵奪獲牛馬甚夥火篩所至孝臣輒尾擊之屢立戰功延綏志何棟字伯直長安人正徳辛巳進士嘉靖初授監察御史以疏劾興邸從龍宦豎王斌等出為宜興知縣俄擢工部都水郎中遷右通政轉左僉都御史巡撫大同時有星孛於井之末度朝議僉謂永嘉相公輔政之應棟獨上言井之末度乃大同分野彗色蒼赤兆主兵變期年後大同當有圍城蹶將之災聞者誣為黨附棟至大同選將扼險虜犯髙山站等處督兵力戰連破之俘級二百二十人㨗聞賜書褒予金帛言者仍以星疏論不已有詔謫蜀藩左叅政遂乞終養歸二十九年八月敵逼京師即家起右副都御史提督薊州軍務明年加兵部右侍郎咸寧侯仇鸞請伐朶顔三衞棟力争以為不可上卒用棟言寢兵是年以生擒哈扎爾等進左侍郎加賜金帛明年再擒敵諜孫黑子等進右都御史兼兵部左侍郎三十二年以疾乞休西安府志黄雲字叔卿咸寧人由進士任工部主事監𣙜浙税羨餘悉貯郡藏歴任山西憲副兵備岢嵐路當偏關冦出没無常乃浚城隍募間諜師出常㨗𢡟績鴻功具載實錄卒於官咸寧志沙金延安人從行伍討流賊擒獲賊首累立邊功馬志嘉靖間陞威茂叅將廉平不苛雅有儒風每日戴星而出寒暑無間每坐至夜分時呼將校講求平蠻機宜以忠勤清慎勉之自奉不務華美去官之日行李蕭然四川通志梁震榆林衞指揮使忠勇好讀兵書累功進延綏總兵嘉靖十五年改大同延綏志先是大同軍亂殺巡撫張文錦鎮巡官每以甘言慰勞之震拜命率家丁五百人馳至雲中下令曰我無爾陵爾無我叛王法軍令具在我不敢破紀綱悞國其家丁向大同兵語曰爾敢蔑視主將者恃衆耳兒郎輩無一不當百五步内恐爾不得用其衆由是軍中肅然莫敢譁者震與卒同甘苦身為率先修復五堡邊境蘇息卒諡曰武壯明紀輯畧姜應熊字周佐榆林人弱冠舉武科攝本衞指揮使當時器重之累陞甘肅副總兵掛征西將軍印鎮寧夏嘉靖三十二年㓂犯延綏應熊潛師來援㓂敗於金湯川秋犯平羅城應熊復多首功㨗聞實授都督同知三十四年以黑疙疸功授右都督調薊遼會北兵大舉薄居庸城陵京震動時我兵方數萬敵見兵少圍之數重應熊搏戰潰圍出復轉戰數十里至營創甚檢之得刀痕五敵退以功陞大同總兵官掛征西前將軍印四十一年戰於湯其河斬獲甚衆璽書褒美賚金幣廕一子百户上表請代及歸里屢徵不出卒於家子顯宗顯祚皆有名延綏志崔鏞字汝洪其先潁上人始祖程以義勇從太祖征建昌有功授榆林百户世襲鏞嘉靖中進士授潞安府推官決獄多所平反遷户部主事督昌平薊門餉尋陞山西按察司僉事分巡陽和進副使隆慶四年俺荅孫巴罕鼐濟來降諳達叩邊求還總督王崇古巡撫方逢時屬鏞議鏞曰殺降固不可還之則又示弱莫若以鼐濟歸義上聞爵以官諳達必喜使其貢欵還我叛人然後予之於計便即單騎往諭之諳達聴服上多鏞功錫以金帛改井陘道萬厯中又改岢嵐道時諳達初進貢一切簿期皆鏞所手定進都察院右僉都御史巡撫山西會與御史不合自劾罷及歸侍父母色養備至居家雍睦鄉里皆則傚之以喪父過哀竟得疾卒延綏志趙岢榆林人父英為總兵官岢少以父廕歴寧夏副將剿丘富有功陞延綏總兵為北兵所畏鄜延民來田塞下者日衆黄台吉入掠岢擊走之復犯髙家堡萬騎屯明水湖諜者以告岢令二將將五千人疾走威武塞見敵乗髙結營窺覘虛實岢潛師示弱以驕之遂突出精兵奮擊敵敗而遁後東勝之圍岢提師往援敵遙見旌旗便散走岢多勇畧善鼓士氣故每向有功子孟麟官總兵延綏志劉鳯池渭南人嘉靖中進士有文武才任兵部主事贊畫軍務將士多授成算邊塞克定未幾以疾卒隆慶中沔縣舉人張日新任兵曹亦以參贊軍務著名賈志張臣榆林人趫㨗精悍好搏戰陷堅由隊長立功知名隆慶初土蠻大入畿北援師皆坐視臣獨力戰斬馘甚衆萬厯時歴寧夏總兵諳達畏其威無敢譁朶顔擾邊移鎮薊朶顔憚懼乞降進都督同知再鎮固原甘肅呼喇珠犯洮河套酋助之臣大挫其衆酋慟哭逺遁經畧鄭洛主欵議與臣左乞歸臣善撫士卒更歴四鎮名著塞垣延綏志魏學曽字惟貫涇陽人嘉靖中進士授户部主事歴員外郎郎中有權璫為商人乞支芻糧鉅萬大司農業許之學曽執弗與督餉宣府適敵騎薄城守者不知所出學曽遽攝戎衣乗城指授方畧敵遁去擢光祿少卿尋拜僉都御史撫遼東晉右副都御史尋以疾告起兵部右侍郎改吏部時新鄭江陵同在政府皆倚重學曽會二相失歡新鄭䇿免廷臣失色學曽大言曰上踐阼甫數日首逐一顧命大臣詔草出何人手不可不明示百官衆為凛然朝罷更要九卿詣江陵所江陵稱病謝客新鄭遂行江陵嗾言者劾之歸江陵敗起户部侍郎歴尚書又數年西北羽書急詔督陜西三邊軍務屢辭不獲移書政府罷欵議戰至固原明莊二部各擁衆數萬擾邊三戰三北之斬明安莊走獲其部落五百餘級晉太子少保巴拜父子殺撫道據城叛學曽發檄偽撫以緩之潛檄各鎮徵兵餉自統大軍駐靈州以偏師駐花馬鳴沙諸要害兵餉四集進師薄城下障水圍之城中懼學曽曰此可以行間矣乃射書城中疑之居民多受計為内應言官交章以偽撫緩兵罷學曽易督未幾巴拜黨自相殺門啟師入巴拜闔室自焚皆學曽本謀也頼縉紳交訟還官歸里功亦不錄弟學思亦舉於鄉歴寳豐知縣真定同知所至皆有聲賈志蕭如薰延安人以父廕百户歴寧夏平魯營參將延安府志巴拜作亂以金帛結河套卓哩克圖犯邊與布延攻平魯蕭如薰射殺布延部衆引去論功遷署都督同知明紀輯畧如薰好義潔已善撫士卒敬賢下士以故人樂為用佩大將軍印者九都督京營者三祖漢父文奎兄如芷如蘭如蕙皆總兵賈志劉九韶字應鳯盩厔人性愿謹駢脇多力平地超距丈餘嘗往四方山别業遇盜遮路九韶從容出尺挺揮擊顛仆如摶嬰兒有行刼於路者九韶適至盜即棄所掠去九韶令諸被刼者各取所失衆願分財以酬九韶不許會劇盜曠無徹據西番寨為亂直指使發西漢鄖三郡材官征之失利有司以九韶聞乃命參軍事九韶言賊據山谷急則死鬭不如緩之乃陽為招撫而隂致賊黨楊進甫令誘無徹來降與之歡飲度其醉乃出壁間壯士三十人擒之并縳其從騎無遺以功遷土官世守其地盩厔志劉承纓字元洲以進士任楚荆司理值容桑搆兵岳澧震動承纓深入開諭威信賊皆投戈帖服嗣㓂獗荆襄親入施南調集土兵捕斬以千計南國倚為長城會以察典改調督撫交章乞留既得請益身歴疆埸累立戰功以積苦行間卒賈志李必達字中孚城固人萬厯甲午舉人性倜儻不羣精竒門遁甲歴官遵義副使天啓間奢賊陷重慶必達畫謀決勝攝服賊衆稱為神兵在川十餘年控制有法殘孽不敢逞後罷職川人感慕立祠祀之賈志王扆漢中衞指揮使嫻於韜畧西鄉縣星子山巨冦何勉倡亂扆奉命征勦奮勇赴敵斬首十五級生擒趙子等二人以功陞本營守備賈志張剛大同總兵堅之子榆林衞指揮累遷神木營參將多智謀時北兵大舉入邊剛設竒䇿挫其鋒而去於河口堡築墻長八里迄今恃為捍衞歴陞固原總兵延綏志王保榆林人以行伍起家萬厯十六年任神木副總兵時套中挾賞犯邊保力禦之十九年陞都督僉事鎮昌平調鎮山西復改薊鎮喜峯口有警保奮勇力戰陞都督同知尋調征倭有叛兵聚嘯於石門將為亂聞保至即時解散二十四年回鎮與北兵戰於羅文谷及石塘路皆有功詔以原官掛印鎮遼東於瀋陽前屯諸處屢立戰功以病卒於海州保寛慈得衆盡瘁王事一時稱為名將延綏志尤繼先榆林人任昌平總兵善騎射愛士士樂為之死後鎮守固原延綏敵不敢犯又鎮薊遼九年加少保其殁也軍中咸西向祭之延綏志王威綏徳人萬厯時延綏參將從麻貴征河套大挫賊衆進右都督鎮大同時塞上多事威訓兵飭防邊境晏然前後在邊五十年九佩將印以功名終威祖孫父子兄弟三世二十四元戎延綏志王撫民延安衞指揮使祖鉞河西千户撫民承襲守靖邊時苦多盜摘發如神姦宄肅遏累遷保河遊擊綏禦有方畧萬厯元年遷紫荆參將旋推石門副總兵尋改涼州涼州逼處番回撫民至募勇敢三千日訓練待敵常率所部突其圍敵披靡遁去涼州以安十四年遷都督僉事鎮守陜西嵩山逋㓂為亂至即撲滅之和碩聞風不敢犯邊者數年十七年遷右軍都督同知召還京屢疏乞歸許之未幾復起鎮守山西尋以病卒延綏志杜應奎字海宇三水人萬厯癸丑武進士初授遼東清陽守備屢建竒功天啓中特擢為壩上總兵多謀畧力舉千斤常遇戰臂中矢刮骨療之色自若有古名將風以讒歸里時流賊㓂三水應奎率蒼頭軍大破之出所擄子女無數一方帖然無警賈志孫必顯字克孝潼關人萬厯丙辰進士由户禮二部郎擢吏部佐偘偘舉職不少假易有名選郎之遺風小人以計典中傷左遷去流賊起必顯以山西按察司經歴量移南祠部急請歸建議設重鎮以扼關鄉人恤其私以勞師動衆尼之㓂自是渡澠池而西莫可禁禦假滿還留都途出柘城歸徳遇賊潰隄而入數十騎薄城引弓詬詈城中危懼必顯令傔從環射之賊中傷皆散人咸謂必顯知兵可辦賊也久之由大理寺丞擢兵部右侍郎拜命之日廬兒戍卒靡不㦸手相賀甫一月卒墓誌杜桐字來儀延安人任本鎮總兵以謀勇著稱首功至一千八百官右都督文煥字弢武桐之子時套警方嚴自寧夏總兵遷本鎮戰多㨗以事謝去崇禎二年大盜混天王等掠延川米脂清澗諸縣復起為總兵勦之三年邊盜苗登霧嘯聚於安定文煥擊敗之王嘉引降復叛去走皇甫川引套人入冦文煥從孤山進擊大破之四年賊首神一魁據保安招套中千餘騎為亂文煥與賀虎臣合軍圍之遁去文煥三任榆林賜飛魚寵盛無比子𢎞域官池州總兵部伍肅然為一道最自桐及𢎞域三世總戎當代稱為將家延綏志李卑字持平榆林人以神木千總屢立戰功陞延安參將值羣盜四起以防兵三百破賊數千於甘泉臨陣出竒疾如風雨延以北諸縣頼之積功擢臨洮總兵勦賊於湖廣所至軍命嚴肅居民不擾雖倉卒顛沛鎮定如山賊營望見旗鼓即知為李將軍惜勲未奏而卒延綏志崔林綏徳衞千户世居榆林卑退自持鄉人或侵其田林推與之守柏林堡嚴烽堠飭邊防賊不敢犯及隨征奮不顧身以驍勇聞鄉人語曰林居鄉怯臨陣抑何勇也子孫亦勤儉謙厚有家法延綏志趙彦膚施人萬厯癸未進士歴官都御史巡撫山東沉敏有智畧平妖賊有功進兵部尚書延安志天啓二年山東妖賊徐鴻儒作亂撫臣趙彦連戰皆㨗未幾賊攻兗州彦親至兗州同總兵楊肇基迎敵殺賊千餘人賊走滕縣賊侯五乞降而鴻儒同黨三百人復力守官兵分攻之彦令鴻儒不出即四面焚攻賊因縳鴻儒降復滕城加趙彦兵部尚書紀事本末鄭學陸字翼宣西安人舉人明季任大冶令性慈厚語音和細目眶㣲赤即其怒時時盜賊盛起計擒渠魁柯篤生等數十人丁丑峽山吕瘦子叛獨運方畧統家丁胥役經營聯絡遂不敢犯境與守道袁繼咸協力滅之湖廣志孫守法字繩武臨潼人多智謀膂力絶人時流冦猖獗守法仗劍入行伍為總制洪承疇戎旗健卒毎出輒敢當先宜君之戰以單騎擒賊首㸃燈子不粘泥斬獲甚衆授守備又與賊闖王髙迎祥戰於長武迎祥敗棄馬入溝中守法亦棄馬逐之手搏生擒以歸餘賊氣奪授叅將轉陞䕶藩練營副總兵髙傑號翻山鷂雄武有才畧為賊羅汝才副將守法知其可用單騎入壘諭降之傑感恩誓以死報李自成僭號西京守法獨不屈遁入山中康乃心撰孫將軍傳王應朝韓城人豪俠有氣節膂力絶人明季盜起西川一帶盡為賊藪應朝直入其營斫殺斬首數級邑令左蘿石嘉其武勇請授千總防禦有功毎遇賊戰則所向披靡一以當百七年賊圍澄城應朝同韓郃營兵將勦殺力斬數十級生擒數人雄勇振一時旋為領兵者忌而殺之蘿石哀之祭以文韓城志王之良字虞卿華隂人天啓乙丑進士授中書改御史按畿南巡鹽長蘆大猾賈大成金吾陳寵因縁為奸特疏紏劾商人頌之秦中苦冦甚又值嵗凶請帑賑貸復請修華隂城條奏甚悉咸報可陞太僕寺少卿以僉都御史巡撫南贛時猺蠻土㓂相煽突勢逼衡州衡故介䖍鎮選將防𠞰廣東樂昌盜起遣兵往擊俱大㨗桂東林起鳯反下令撫之衆感其誠即投戈降鉛山張普薇與南豐封家山妖人各蜂起勢漸合遣兵與江西撫軍夾擊之戰於封山再戰於韶遂擒普薇修城練兵天險屹然利器充牣積榖至三十四萬石有奇連州陽山猺賊起以兵扼猺出入斷其魚鹽連報㨗冦悉平人稱國家設䖍鎮百餘年間得兩王公前有文成後有之良云尋陞南京兵部右侍郎壬午予告歸卒之良性温和淵静有休休度每從三原温純長安馮從吾遊淹通典籍而以自得為宗賈志許國翰字柱宇涇陽人崇禎戊辰進士授儀封令歴任岳州道練水兵焚賊船洞庭積㓂一清及為兗東兵河道倣用武剛車鴛鴦牌之法戰守有備其防河兵參用鄉勇厚其賞給以故人有固志時冦賊刦掠而兗東晏然皆翰力也終山西按察使涇陽志陳繼泰字憲宇涇陽人崇禎癸酉舉人都察院司務慷慨慕義少年多逺畧明季賊亂破産糾義旅數出奇勝之賊始遁去閭里恃以安堵涇陽志單興詩興安舉人明末賊犯興安興詩與州守協力守禦臨機畫䇿出人意表又洋縣舉人黄路清勇敢有方畧流賊薄城下路清率鄉人登陴守禦城頼以全賈志按秦中氣秉金精星占井鉞地險固而俗武勇故歴代謀臣戰士秦產為多今取其勲名顯赫者列傳於左至聞望素著事蹟未詳如元則有楊子江三原人封莊武伯明則有陳煇延安人官總兵岳可延安人官副將官秉忠榆林人官總兵劉國鏞榆林人官總兵袁聰榆林人官叅將孫鑑潼關人官指揮使孫士英宜君人官守備戴欽綏徳人官總兵傅鍾綏徳人官叅將王道純蒲城人官山東巡按皆附其姓名官爵於後以見關西之多將材焉本朝梁加琦安塞人入籍三原沉勇有謀夙嫻韜畧順治元年以將材隨征充前鋒取太原陜督孟喬芳薦授遊擊三年王師征蜀加琦運餉有勞晉副將十七年率兵攻川東擒斬賊將陳貴榮等康熙元年臺議設蜀中總統彈壓兩川加琦以威望授是職勦平山西逆冦五年攻太昌賊袁宗第有擣巢功復招降偽新化伯馮起鳯等是年冬又大合諸軍進勦賊黨於巫山賊首劉二虎自縊㨗聞晉秩有加子世勲以父廕歴官户部侍郎髙第字漢沖榆林世族也順治初大兵下河南第由西路進兵駐洛所到風靡尋奉命總鎮河南開歸三府駐節於襄累加少保兼太子太保賜蟒玉初至襄時縣令佟某未任第見城垣傾圯即捐金督將士分汎修築城以完固恐下情難達於城樓立鳴寃鼓令屈抑者擊之輒為伸理節制營將即親故不少貸性好施捨每設粥厰茶棚立藥局給貧生膏火資修古寺觀無虛日以及祭蝗祈雨無不立應至於撫開歸河南南陽等府州縣五十一城招營頭一千五百四十六寨勦陳蛟諸㓂發金逆偽札曹之役身親堵殺姜之變輿疾從軍尤其赫赫者張天禄榆林人明末以義勇從軍初𨽻賀人龍及曹變蛟從勦流賊有功歴陞池浦總兵官豫王南下上其籍於幕府衣資器械如山積以招撫江南功陞蘇松提督時海冦出没天祿撫勦兼施威惠並行降者接踵坐鎮十年増秩賜金廕阿思哈尼哈番世襲天祿性忠勇樂善好施尤能禮接儒雅時比之杜征南云黄應傑榆林衞人順治四年任惠州總兵官鎮嶺東平長寧劇盜㑹冦圍興寧軍書告急應傑兼程至縣安營未定即馳三騎衝賊壘賊大潰斬獲無算八年興寧復亂提兵營於城西赤巷嶺平定安集寧人徳之張鵬程字雲圖榆林人由行伍從髙傑於江南順治二年豫王南畧鵬程率先歸附授寧國副將以招撫江南功授二等阿達哈哈番世襲時江南初定鵬程多方綏輯反側潛消十一年擢偏沅總兵官李定國兵犯常徳都統蘇克薩哈自荆州來援鵬程列艦濟師夜襲其營更設伏以要之定國兵潰十七年王師進取滇黔廷議欲得威望大臣鎮撫其地因調駐鎮逺康熙元年移駐安順府㑹水西安坤不靖奉命與吳三桂㑹師進勦師次六廣安坤遣酋岔揢拉率衆來襲約兵至舉火即斷橋以覆我師於江鵬程偵得之乃伏精兵於五里坪守橋為固仍舉火誘致之岔揢拉馳至陷伏中擒之遂連營而進次日克水西與三桂兵㑹於時勦撫兼施山無伏莽始議改建流官設威寧等四府治水西悉定初鵬程身經百戰屢被重傷至是血氣向衰創疾間作遂乞歸既殁聖祖軫念勞臣䘏典特優祭葬如制許鴻翔榆林人順治初知葉縣時拐河土冦作亂勢張甚鴻翔躬擐甲胄率鄉勇搗巢滅賊而還㨗聞紀功民頼安堵許占魁字文元蒲城人順治二年大兵南下占魁以招撫蘇杭功授陽平關叅將時獻逆雖除全蜀猶梗六年從定西將軍梅勒根入蜀襲偽侯趙榮貴破其軍復出碧魚口設疑兵以遮賊後餘衆悉降十一年遷山西平陽副將巨冦張武等乆肆刼掠占魁先分兵守諸隘口簡精騎二百親將之乗風雪入山中擒武等以出晉地悉寧康熙九年陞延綏鎮總兵官十四年朱龍叛進逼榆林遣逆黨投以偽劄占魁立集文武僚屬發其事事聞特授都督同知時緣邊城堡相繼報陷鎮兵先因蜀警被調軍伍乆虛占魁與遊擊謝鴻儒等誓衆固守三閲月不懈㑹平逆將軍畢力克兔以禁旅來援又總督哈占遣叅將楊宗道遊擊王宣懿等進𠞰援兵四集朱龍伏誅惟東路神木未下占魁督兵圍之遂乞降㨗聞授世職拜他喇布勒哈番襲二次鴻儒擢延安營叅將宗道宣懿俱陞賞有差十六年卒贈太子少保諡恪敏占魁長子登隆年甫冠值朱龍之變請於父夜縋而出詣闕面陳賊勢及鎮城被圍狀甚悉賊平補鴻臚寺少卿歴雲南臨安知府巨盜朱六非以妖術煽亂登隆至立平之五十二年卒於官李吐馨同官人順治二年任靈丘典史適大同姜瓖叛逆土冦蠭起令某恇怯無才能吐馨招集鄉勇示以大義兵民咸感泣禦㓂城頼以全冦徽音字繩之同官人由行伍授山西都司再擢河南叅將時嵩洛間多嘯聚徽音出奇計悉獲之又折節下士論交多寒素值嵗凶諸儒咸頼其賙恤後遷長沙副將卒於官陳躍馭城固人以從軍功授關南道中軍守備順治三年冬𠞰黒水峪得賊首髙勲以歸四年𨽻寧夏總兵劉芳名𠞰馬徳五年𠞰李彩六年𠞰王永强𠞰劉𢎞才俱有功制府孟喬芳知其忠勇可任拔授遊擊康熙元年隨征雲南三年閏六月奉檄守天生橋招徠賊首彭長庚等旋令搜箐平化仲硐平蔡家硐平值金平歸龍硐躍馭先登陷陣斬獲無算四年五月大兵進討水西躍馭率衆次涘列遇賊戰大㨗復分兵攻牛鼻硐匝月賊出降功上䝉恩議叙八年陞四川松潘東路參將十一年卒於官吉允迪字太丘洋縣人順治己丑進士夙嫻兵畧授信豐令時議𠞰安逺砂含賊允迪練鄉民於新田賊謀從他道乗虛刼城迪偵知之夜伏精兵隴頭俟賊至突出擊之賊大敗壬辰九月復奉檄𠞰黄石砦賊先是副將楊栗賈三榮乆戰無功迪至諭以皇靈遐播賊遂降歴官雲南參政貴州學道所至皆有實政居鄉尤好周恤人有鬻子女者輒為捐貲代贖鄉黨頼焉楊文啓西鄉人性忠勇善兵法衝鋒克敵屢立竒功屢擢至川北鎮總兵官卒賜祭葬馬文秀城固人由行伍積功至臨安鎮遊擊時滇省初入版圖人心未洽康熙三年二月土目王朔等偵知總兵閻鎮赴水西即率衆襲城城守者來告急鎮未發文秀曰城困於賊而不救不可請先之即倍道疾馳而進既至尾賊後賊方盛氣攻城期必克城中胥役皆黨賊謀開城出應文秀以奇兵急擊之城中兵知救至因大譟出攻賊潰會閻鎮兵亦至氣益奮越八日賊糾集諸蠻衆復大進鎮督軍出戰文秀阻之曰賊氣方張我師輕出將不利宜以計取之鎮不聽果敗越三日賊攻益急鎮大恐文秀起曰賊驕矣衆心必懈可擊之選城中得二千人戒之曰賊所恃者鏢弩也疾逼之則弩不及發技窮矣且戒城中人兵出即下鍵無令出戰者懐退志即引兵張左右翼出擊文秀䇿馬先登諸軍殊死戰賊大敗走遂進兵霧露結盡傾其巢穴而還㨗聞進副總兵以疾歸卒劉永亨字正吾榆林人年十八以勇力聞補青泉鵰鶚諸堡守備累官至都督僉事協守紹興時浙東多土㓂蔓延上虞餘姚新昌諸縣永亨將兵𠞰撫所至風靡㨗聞特賜貂裘名馬遷宣府總兵晉都督同知掛鎮朔將軍印復詔關内昌平宻雲諸軍悉𨽻宣鎮節制永亨至鎮繕修龍門滴水崖諸城堡關門屹然烽燧偃息年六十五卒賜祭葬張玉麒鵬程子少習韜鈐康熙九年襲世職授直𨽻保定參將十四年秋新河張可大變起畿甸逺邇煽動巡撫金世徳集衆議未定玉麒潛師夜起以百騎破可大萬衆往返僅五日事聞進二階尋改陜西定邊副將以罣誤歸里再起山東沂州副將三十四年陞温州鎮總兵官嚴明有紀律尋復移鎮臺灣臺灣逺隔重洋宿多伏莽三十八年春吞霄社土番叛鷄籠淡水二澳復聞風效尤玉麒選將厲兵直抵吞霄擒卓奇卓霧尸諸市更授計二澳汛官縳其渠俱斬之海疆自此寧謐四十一年調福寧鎮尋署福建全省陸路提督印務在鎮凡十二年賜御書匾額者三曰機宜果斷曰奕世承休曰世澤堂皆異數也石光玉榆林人登武科康熙十四年朱龍據定邊叛陷郡城榆林大震光玉倡義與靈州訓導李龍雯平利訓導艾士彥連九卿等率士民守之城頼以全王維威富平人任江西石城典史康熙十三年城被閩逆圍攻維威視事甫三日與照磨李徳明協力守禦晝夜登陴二旬乃解十五年劉應麟兵至城下維威與戰破之嘗巡城矢中臂弗為動三載冦始平卒保危城維威實有力焉陳範富平人康熙丁未武進士授守備擢廣東碣石鎮遊擊十九年二月海冦犯甲子所擊敗之三月進征海山島百洲島四月征磊門五月征甌汀背海口俱有功賊首鄭鴻儒遁南澳二十一年大兵平臺灣沿海悉定論功除甘州城守參將二十八年陞汀州副將巨盜朱紹嘯聚龍門山永定歸化諸縣大擾範率兵搗巢一鼓平之民頼以安尋卒於官藺泗耀州人由將材授湖廣興國參將康熙十二年陞直𨽻三屯營副將未赴因吳逆據長沙調駐武昌十三年進勦岳州又檄討黄金龍戰於大冶之換縧橋殱賊殆盡獲馬騾器械無算軍威大振十四年還任薊協兼攝通協事十八年特擢荆州左路總兵時逆黨未靖泗旌麾所指屢立奇功克思南復龍泉凡遵義綏陽桐梓等處一時蕩平改鎮安籠安籠地界滇粤巨㓂窟穴其中最稱險要泗安内撫外四境帖然在鎮十有六載予告歸尚宣長武人生而英毅既長偉貌長軀膂力絶人康熙十三年王輔臣從逆叛兵四起長武孤城無援宣父子倡衆固守城以無恙明年二月賊將周養民吳占春復率兵圍長武宣潰圍請救賊始遁十六年授固原參將固鎮武備乆弛宣整飭一新又鎮城外舊有逼水城一道嵗乆傾圮夏秋遂多水患宣捐俸修築屹然完固十八年奮威將軍王進寶兵取漢中宣先登拔二里關掃煎茶坪恢鳯縣下兩當叙功為軍鋒冠二十二年陞副將以罣誤左遷陜西陽平關參將陽平為川蜀間道姦宄出没不常宣創建望江樓又多置漁舟網具每登髙覽勝即命卒沿流舉網下上川原宵小遁跡三十一年陞洞庭水師副將尋調澎湖營調膠州營調三屯營三十七年以署都督僉事充宣化鎮掛印總兵官駕幸熱河宣頻嵗迎謁䝉賜撫訓安重匾額優渥叠加四十二年加提督仍管總兵官事又三年予告歸卒殷化行字熙如其先晉人徙咸陽幼撫於王從王姓舉康熙庚戌武進士吳逆叛總督哈占題補火器營守備十五年從撫逺大將軍圖海收復川陜積功授三屯營副將二十六年擢臺灣總兵官先是臺灣議築城未決化行至令所部人各致樹二株數日而木城成更令諸部各製木城以相犄角居三載移鎮襄陽復移鎮寧夏三十四年冬上親征厄魯特令化行兵偕大將軍費揚古出西路次年二月出師四月至郭奪力五月己未師次土喇河聞噶爾丹西遁戊辰至召木多地平廣約數里南向有小山方連營而進適偵知賊已在山下化行力主先據小山於是麾兵先登甫至巔賊已大集化行令士皆下馬坐發礟叠擊之賊亦捨騎而鬭氣方張化行宻告大將軍曰賊陣堅宜於山下遣一軍衝其脇又賊陣後士馬甚盛而游兵不戰是輜重也往刼之必亂大將軍然之俄所遣兩軍俱薄賊化行乃鼓兵而前飛矢雨下呼聲震山谷賊大潰噶爾丹僅以身遁化行復具疏請率師深入務殄根株疏至時車駕已至寧夏賜御書深沉節制匾額閏三月復從出塞㑹噶爾丹勢窮死乃旋師論功特授世襲拖沙喇哈番尋提督廣東軍務既至平翁源長寧及瓊州諸賊最後乃議平連陽猺既得請與總兵劉虎分道進攻直逼猺穴諸猺震駭而遁其東路一師失律副將林芳夜失道墮澗死化行勒兵再進猺始面縳乞降廷議謂化行總統宜坐遂以原官世職致仕化行淹貫文藝軍中時手一編恬吟若諸生家居後以詩酒自娛綽有古儒將風李麟字振公其先延安人徙咸陽弱冠從勇畧將軍趙良棟南征以平滇功加守備再以功授張家口遊擊尋擢化林營參將時打箭爐蠻人恃險不服麟至即列狀請討盡平之陞副將尋陞總兵會大兵西討奉㫖赴軍前議政區畫調遣悉中機宜賊將車令敦突踞中藏麟力疏請進兵長驅至通天河編篾為渡前抵博克麟與諸將謀曰我師深入且逺來疲敝賊必乗夜襲我盍備之已而賊果至陷伏中斬獲無算其後再戰再㨗賊益懼又以計誘賊將疑釁日生車令敦敗走因䕶送撻頼喇嘛歸國師還授提督固原軍務雍正元年入覲奏對稱㫖授内大臣鑾儀使世襲拜他拉布勒哈番以年耄乞歸馬如龍字見五綏徳州人父光祐與弟光稷皆諸生優文行尤善教子弟光稷子仲融順治丙戌進士為固始令有聲如龍少倜儻多大畧康熙壬子舉於鄉會三方梗化朱龍倡亂十四年四月延安陷州城失守如龍糾集鄉勇據山立寨逺近團結者復千餘家軍聲大振賊至屢却之賊遣使啗以偽劄如龍手刄其使以狥賊益憤為長圍以困之如龍誓衆死守悉無異志五月平逆將軍畢力克兎兵至永寧未即進會賊退如龍馳使至軍期六月四日濟師至期如龍揚兵出河上謁軍門陳破賊方畧因統前鋒追賊大破之朱龍走定邊畢力克兎即署如龍本州牧以撫定其地越月延安平幕府上其功改授灤州知州屢遷杭州知府二十八年車駕南巡超授浙江按察使海㓂潘三假貿易謀不逞設䇿擒治殱其首從六人進浙藩擢江西巡撫三十八年奉詔陛見御書老成清望堂額以旌之四十年卒於官賜葬祭再賜績著西江匾額哀榮之典稱極備云張其藴鎮番衞人徙居長安康熙十四年由諸生從征吳逆積功授辰州水師營守備二十二年征紅苗二十七年討夏逆俱有功歴陞神木副將改慶陽四十六年擢雲南臨沅鎮總兵官雲南自孫李竊踞之後民户流亡我師入滇即以從征者分駐其地既而生齒日繁糧仍故額軍有艱食之苦其藴糴榖捐金分貯三營曰義榖義金自此婚喪有資軍不告匱五十三年臨大饑市中糧絶其藴移檄牧宰發官米萬餘石置四城計時計口減價以糶四閲月所全活無算五十五年卒於官祀名宦祠陜西通志巻五十九
