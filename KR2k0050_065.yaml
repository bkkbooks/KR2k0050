body:
  text: 陜西通志巻六十五人物十一釋道上古尸毘修行於延之清涼山忽有鸇逐雀墮座下尸毘憫鸇饑割肉飼之乃去曰佛弟子乃相試耳延安府志晉法慧闗中人方直有戒行入嵩髙山事浮圗密為師晉建元元年至襄陽止羊叔子寺不受别請每乞食輙齎繩牀自隨遇雨以油帔自覆雨止唯見繩牀不知慧所在後征西庾穉恭鎮襄陽素不奉法聞慧有非常之迹甚嫉之慧預告弟子曰吾宿對尋至誡勸眷屬令勤修福善後二日果收而刑之年五十八臨死語衆人云吾死後三日天當暴雨至期果洪注城門水深一丈續文獻通考道安姓魏氏常山扶柳人苻堅遣苻平南攻襄陽安獲於堅既至住長安五重寺初堅承石氏之亂至是四方略定欲平一江左堅弟平陽公融等並切諫終不能迴㑹堅出東苑命安同載顧謂安曰朕將與公南遊呉越陟㑹稽觀滄海不亦樂乎安對曰陛下應天御世有八州之富宜棲神無為與堯舜比隆今欲以百萬之師求厥田下下之土非愚心所知也堅曰順時巡狩亦著前典若如師言則帝王無省方之文乎安曰若鑾駕必動可先幸洛陽抗威蓄鋭傳檄江南如其不服伐之未晚堅不從前軍大潰於八公山堅單騎而遁如所諫焉建元二十一年二月八日忽告衆曰吾當去矣齋畢無疾而卒髙僧傳僧渉西域人苻堅時入長安虛静服氣不食五穀日能行五百里言未然之事驗若指掌能以祕咒下神龍每旱堅常使之咒龍請雨俄而龍下缽中天輙大雨卒於長安後大旱移時苻堅歎曰渉公在豈憂此乎晉書本傳僧朗京兆人少而逰方問道後於金輿谷崑崙山中别立精舍内外屋宇數十餘區聞風而造者百有餘人朗孜孜訓誘不倦秦王苻堅欽其徳素遣使䞋遺堅後沙汰衆僧乃别詔曰朗法師戒徳氷霜學徒清秀崑崙一山不在搜例谷中舊有虎人常執杖結羣而行及朗居之猛獸歸伏晨行夜往道俗無滯至今呼為朗公谷卒山中年八十有五賈志鳩摩羅什天竺人年七歲出家從師受經日誦千偈博覽五明諸論及隂陽星算妙達吉凶言若符契性率達不拘小檢專以大乗為化苻堅聞之密有迎什之意遣驍騎將軍吕光西伐獲什至涼州堅為姚萇所害於是在涼州積年姚興破吕隆乃迎什待以國師之禮仍使入西明閣及逍遙園譯出衆經無不究其義㫖沙門慧叡才識髙明常隨什傳寫什每為論西方辭體商略同異嘗講經於草堂寺興及朝臣大徳沙門千有餘人肅容觀聽什忽下髙坐謂興曰有二小兒登吾肩慾障須婦人興召宫女進之一交而生二子興嘗謂什曰大師聰明超悟天下莫二何可使法種少嗣遂以妓女十人逼令受之爾後不住僧坊别立廨舍諸僧多效乃聚針盈鉢引諸僧謂之曰能食此者乃可畜室因舉匕進針諸僧愧服乃止什死於長安興如逍遙園依外國法以火焚尸薪滅形碎惟舌不爛晉書本傳僧肇京兆人才思幽𤣥善談説羅什至姑臧肇自逺從之著般若無知論羅什讀之稱善時廬山隠士劉遺民見肇此論曰不意方袍復有平叔以呈逺公逺公歎曰未嘗有也馮志時鳩摩羅什為姚興所敬於長安草堂寺集義學八百人重譯經本羅什聰辨有淵思達東西方言沙門道彤僧略道恒道僧肇曇影等與羅什共相提挈發明幽致諸深大經論十有餘部更定章句辭義通明沙門共所祖習道彤等皆識學洽通僧肇尤為其最羅什撰譯僧肇常執筆定諸辭義注維摩經又著數論皆有妙㫖學者宗之魏書釋老志本朝雍正十一年四月二十六日勅封大智圓正聖僧禪師道融時師子國有婆羅門䭾其書至長安乞與僧辯論羅什謂道融曰子可以當之融乃密使人録其書目一覽即誦尅日議論秦王與公卿大集婆羅以能博觀為誇融數其目並秦地經史三倍之什乗勝嘲曰卿未聞秦地有博學者乎於是婆羅門再拜而去續文獻通考道䂮以奉律精苦為秦王所重時僧尼萬數頗多愆濫以䂮為國僧正綱領之僧有官自䂮始續文獻通考慧嵬不知何許人止長安大寺戒行澄潔多栖處山谷脩禪定之業有一鬼作異形嵬皆隨言遣之後冬時天甚寒雪有一女子來求寄宿形貌端正自稱天女以上人有徳天遣我來相慰喻欲動其意嵬厥志貞確一心無擾謂女曰吾心若死灰無以革囊見試女遂凌雲而逝顧歎曰海水可竭須彌可傾彼上人者秉志堅貞不可易也後以晉隆安三年與法顯俱遊西域不知所終髙僧傳佛䭾耶舍罽賓國婆羅門種年十五誦經日至萬言羅什至乃從學阿毘曇論十誦律後入長安姚主别立省寺於逍遙園供養一無所受時什譯出十住經師更相徵决辭理方定師髯赤善解毘婆沙論時號赤髭論主秦𢎞始中譯出四分律長阿含經義熙八年來廬山入社復還本國蓮社髙賢傳曇邕姓楊氏闗中人形長八尺雄武過人南投廬山依師逺公内外典籍無不綜習立茅屋於山西以自居弟子曇果澄思禪門一夕夢山神求受戒果曰家師在此可往求之少時邕忽見一人著袷衣風神端雅從者三十許人乞授戒師以果先夢知是山神乃為説法授五戒畢神以外國二鋤為䞋禮謝而去師後往荆州行化卒於竹林寺蓮社髙賢傳南宋佛䭾跋陀羅姓釋迦迦維羅衛國人年十六博學羣經深達禪律與迦達多遊罽賓時姚秦沙門至罽賓覩法衆清淨慨然東顧曰孰能遂我祈請化流東土僉應之曰跋陀羅其人也慧嚴乃邀師同行從鳩摩羅什於長安秦太子泓請師於東宫集衆説法忽謂弟子曰吾見本國五舶俱發衆謂妄言因擯之與弟子慧嚴慧觀等四十餘人至廬山香谷逺公請師於東林譯出禪教諸經後西適江陵果見天竺五舶至宋元嘉六年念佛而化塔於廬山北嶺蓮社髙賢傳道生魏氏鉅鹿人幼從竺法汰出家年在志學便登講座後與僧叡慧嚴慧觀等從羅什受業闗中乃立善不受報及頓悟成佛義又著二諦論佛性常有論佛無淨土論應有緣論又以法顯三藏所翻泥洹經先至經云除一闡提皆有佛性謂是經來未盡耳乃唱闡提之人皆得成佛僧黨以為背經遂擯而遣師正容誓曰若所説背經當見身厲疾若與實相不背願舍夀之日據獅子座及後大經至諸師皆媿服元嘉十一年於廬山升座説法將畢衆見麈尾紛然墮地隠几而化宛若入定諸師聞之益信前誓有證翌日葬於廬山西阜稽古録曇無成姓馬扶風人家世避難移居黄龍年十三出家履業清真神悟絶倫聞什公在關負笈從之既至見什什問沙彌何能逺來答曰聞道而至什大善之於是經停務學慧業愈深姚興將亡關中危擾乃憩於淮南中寺涅槃大品常更互講説受業二百餘人著實相論又著明漸論宋元嘉中始卒髙僧傳智猛新豐人稟性端明厲行清白少襲法服脩業専至聞天竺國有釋迦遺跡遂結同心沙門十五人發跡長安厯鄯善龜茲于闐諸國至華氐國阿育王舊都有大智婆羅門名羅閲見猛至問秦地有大乘學否猛答悉大乘學羅閲驚歎猛得大泥洹梵本一部又得僧祇律一部及餘經梵本以甲子歲發天竺還涼州出泥洹本得二十巻元嘉末卒於成都髙僧傳僧道京兆人初為姚興欽重出入同輦後宋孝武悦其賢躬為夀春立光山寺勅開講首續文獻通考南齊僧宗姓嚴馮翊人晉氏喪亂其先四世祖移居秦郡年九嵗為瑗公弟子諮承慧業晚又受道於斌濟二法師善大涅槃及勝鬘維摩等經每至講説聽者將近千人妙辯不窮應變無盡魏王元宏遙挹風徳屢致書並請開講齊世祖不許外出造太昌寺以居之建武三年卒髙僧傳梁慧球姓馬氏扶風人世為冠族年十六出家住荆州竹林寺事道馨為師稟承戒訓履行清潔後入湘州麓山専業禪道頃之與同學慧度俱適京師諮訪經典後又之彭城從僧淵受成實論年二十三還荆土講集相繼學侣成羣訓勗之功有譽當世天監三年卒髙僧傳慧彌姓楊氏華隂人漢太尉震之後年十六出家入終南山剪茅結宇以為栖神之宅時至則持鉢入村食竟則還室禪誦如此者八年後觀化京師止於鍾山定林寺習業如先戒範精明奬化忘倦凡造山禮拜者皆為説法提誘足不出山三十餘年曉夜習定常誦般若六時禮懴必為衆先梁天監十七年終於山舍葬於寺南立碑頌徳髙僧傳北魏恵始姓張家本清河聞羅什出新經遂詣長安見之觀習經典坐禪於白渠北晝則入城聽講夕則還處靜坐三輔有識者多宗之劉義真去長安赫連屈丐追敗之道俗咸見坑戮恵始身被白刄而體不傷衆大怪異言於屈丐屈丐以寶劍擊之又不能害乃懼而謝罪統萬平到京師世祖每加禮敬始自習禪至於殁世五十餘年未嘗寢卧或時跣行雖履泥塗足色鮮白世號之曰白脚師魏書釋老志隋闍那屈多西天竺人文帝時至長安大興善寺奉勅譯法華等經續文獻通考普安姓郭涇陽人少出家周氏滅法隠終南山楩梓谷隋文創厯廣募遺僧時谷中三十餘僧皆應詔惟安自守林壑時行村聚恵益生靈後棲子午豹林谷澗之側解困度阨止疾起生往往奇驗社人有殺生者常倍價贖之令勿殺不得即引刀自割䏶肉曰此彼俱肉耳猪食糞穢爾噉之况人食米理足貴也衆驚恚放之其感發慈善率此類以大業五年終於靜法禪院續髙僧傳彭淵姓趙氏武功人年十三出家靈裕法師擅步東夏乃從而問焉居履法堂目不尋文口無談義門人初未齒之裕異其器宇召入私室與論名理對答如影響身心如鐵石裕大嗟賞遂同居宴寢論道説義終日竟夜兩情相得頓寫幽深後屏迹終南置寺結徒裕後勅召入朝徑投淵寺帝為卜西南坡阜足稱福地淵從焉今之寺墌是也大業七年卒續髙僧傳法慶煬帝時在長安先天寺造丈六夾柱像未成暴亡時寶昌寺大智亦卒三日而還良乆云見宫殿若王者見法慶在一像前語曰法慶造像未畢何乃令我死檢簿者曰命禄俱盡像曰須成我矣可給荷葉以終其身言訖大智再生衆異之往問法慶亦話其騐竟不能食每旦食荷葉一枚齋時三枚如此五年功就而卒桂苑叢談唐曇詢姓楊華隂人年二十二逺訪巖隠遊至白鹿山北林落泉寺逢曇淮禪師剃髪後移住鹿土谷修禪枯泉重出麋鹿繞院學徒慶瑞嘗值虎鬬執錫語云同居林藪計無大乖幸各分路虎低頭受命而去每入禪定七日為期或稱自有禪踪斯人罕擬武徳五年弟子靜休等建塔立碑賈志志超姓田氏馮翊人方孩即喜禮佛年十七削髪雲遊至五臺一老人㸃悟曰子後當佛至介休華嚴寺講經脩養侍者摩斯供厨後入綿山仙窟五龍聽法白鹿白兔紛紛前導至抱腹巖中禪定有青衣童子奉古佛舍利供養貞觀初旱太宗禱雨不應長安父老向各名山求禱及禪師師令拜侍者摩斯斯方淅米將米汁向西少灑令急囬曰霑足矣果應太宗召入長安不就遂瞑目而化後駕至巖麓興國寺知已化詣巖行禮時山霧迷漫善衆未審名號祝天顯示倐霧開恍見金字牌云空王古佛太宗乃賜佛號後歲旱禱雨輙應山西通志曇藏姓楊氏華隂人年十五二親為姻媾遂逃亡山澤莫知投造但念觀音尋聞鐘聲忽見僧寺因求剃落即出門行百步迴望不見乃西奔隴上求法為務晚還京邑於旌善寺行道受戒又往山東名稱普聞及返京師住光明寺論發新異大唐御世造寺㑹昌召為上座貞觀譯經又召為證義皇儲失御召入宫受菩薩戒翌日即瘳勅賜絹數百段皇后疾又請入宫受戒施物極多貞觀九年終於㑹昌寺續髙僧傳法誠終南山悟真寺僧萬年人事沙門僧和為師和亦鄉族之所推奉嘗有人欲害和夜詣門見房内猛火騰焰升帳遂即追悔誠奉佩訓勗常誦法華夢感普賢勸書大教既寤即重䞋工匠令書八部般若香臺寶軸莊嚴成就又於寺南横嶺造華嚴堂鑿山堙壍列棟連甍前對重巒右臨斜谷吐納雲烟實奇觀也𢎞文館學士張孝靜善書翰誠請寫藏經齋潔勤奉大致感應靈禽異獸馴擾精廬貞觀十四年忽謂侍者曰諸行無常法緣有竭九品往生斯言驗矣言畢口光燭於楹奄然而化髙僧傳㑹通萬年人少欣儉素苦節戒行終始不渝投豹林谷潛隠誦法華經至藥玉品便欣厭捨私積柴木誓必行之以貞觀末年靜夜林中積薪為窟誦至藥王便令下火風驚焰發烟火俱盛卓爾跏坐聲誦如故尋西南有白光流入火聚身方偃仆至曉身火俱滅乃收其骨為起塔銘髙僧傳慧圓唐貞觀三年杖錫來山陽之天竺山造雲蓋寺栖止説法道成坐脱百年後人見於終南山曰余天竺山慧圓師也匡廬恵逺異世異地今同居此釋氏叢話法順姓杜氏萬年人為隋文帝所重月給俸供之有病者對之危坐少頃即愈生而聾者與言即聰啞者與語即能言狂顛者使人領住向之禪定少選即拜謝而去又嘗臨溪侍者懼不可濟順率同渉水即斷流其神迹類此太宗素敬之嘗引入宫禁妃主戚里諸貴奉之如生佛集華嚴法界觀門弟子智嚴尊者傳其教續文獻通考慧融字圓照姓張氏南陽人幼而精進落髪後奉勅入京住普光寺時遊終南山逢雪深厚不能上忽有一虎弭耳俯伏慧融知其意乃乗之虎遂負融而上常有雙鳥於山林中前行引路永徽初遷神本寺寺僧望慧融房舍上五色光起及於山中見慧融縱火焚身肌骨總銷唯心不爛髙僧傳靜之姓趙髙陵人性樂出家隨父任蜀父亡乃迴心剃剪貞觀初隠彭門山光化寺又入靈巖山利州道禪師請入劍閣小時鼻塞百方無驗有僧令誦般若多心經萬遍恰至五千肉便落後遇疾苦依前得瘥乃撰諸家觀門為一巻要約精最後學重之顯慶三年召入西明别立禪府利州本寺柱樹忽凋胡桃自拔佛殿無故北面仰地徳動幽靈若此顯慶五年終於西明續髙僧傳沙門𤣥奘俗姓陳偃師人少有操行貞觀三年因疾挺志往五天竺國凡經十七歲至貞觀十九年二月十五日方到長安足所親踐者一百一十一國探求佛法咸究根源凡得經論六百五十七部佛舍利並佛像等甚多京城士女迎之填城溢郭時太宗在東都乃留所得經像於𢎞福寺有瑞氣徘徊像上移晷乃滅遂詣駕朝謁太宗謂之曰法師行後造𢎞福寺其處雖小禪院虚靜可為翻譯之所太宗御製聖教序髙宗時為太子又作述聖記並勒於碑麟徳中終於坊州玉華寺𤣥奘撰西域記十二巻見行於代著作郎敬播為之序大唐新語道宣姓錢丹徒人弱冠出家専精克念晦迹終南所居號為白泉寺隋末遷豐徳寺貞觀中隠沁部雲室山乾封二年十月安坐而化賈志法琳唐武徳中終南山宣律修持戒律時有法琳道人飲酒食肉不擇交游至有妻子律師在城内法琳過之律師不禮焉或謂律師曰彼菩薩地位非師所知律師乃改觀後法琳醉造律師直坐其牀吐於床下律師不敢嫌法琳手取功徳錢納之袖中沽酒市肉錢盡復取律師見即與之後唐髙祖聽道士言將滅佛法法琳與諸道士競論道士慙服佛法得全琳之力也感通記窺基字洪道姓尉遲長安人年十七奉勅為𤣥奘弟子始住廣福寺尋奉勅選聰慧穎脱者入大慈恩寺躬事奘師學諸佛法常造玉文殊像及金寫大般若經皆獲瑞應永淳二年卒於慈恩寺翻經院賈志洪昉本京兆人幼而出家遂證道果志在禪寂亦以講經為事嘗為鬼王授八闗齋戒帝釋講大涅槃經言辭典暢備宣宗㫖時則天在位命徵昉至大申供養數月則天謂昉曰師遂無一言教弟子乎昉言曰惟願陛下無多殺戮大損果報則天信受之昉年過下夀卒於陜中紀聞録萬迴閿鄉人姓張氏兄戍安西絶音問父母日涕泣迴朝往夕返𢎞農抵安西萬餘里以萬里而迴故名萬迴後則天召語事多驗臨終大呼遣求本鄉河水弟子徬徨失措迴曰堂前是河水便於堦下掘井忽然河水湧出飲竟而終塔今在香積寺咸寧縣志僧伽大師西域人姓何氏龍朔中至泗州臨淮縣建寺化行江表景龍二年中宗遣使迎師入内道塲尊為國師尋出居薦福寺京畿無雨師將瓶水汎洒俄頃隂雲驟至甘雨大降中宗大喜詔賜所脩寺額為普光王寺御筆親書至四年三月二日端坐而終中宗令於薦福寺起塔漆身供養俄而大風歘起臭氣遍滿中宗問曰是何祥也近臣奏曰僧伽大師化緣在臨淮恐是欲歸彼處故現此變中宗黙然心許頃刻之間奇香郁烈即送至臨淮起塔供養紀聞録儀光禪師本唐室之族也父瑯琊王與越王起兵伐天后不克而死師方襁褓乳母抱而逃後數歲天后聞瑯琊王有子購之急乳母將至岐山界中具告本末因與流涕而訣乳母既去師莫知所之遇一老僧獨行呼師曰小子汝身家破滅將何所適又曰出家閒曠且無憂畏汝欲之乎因擕至桑隂下削髪又出袈裟令服之將行指東北有伽藍汝詣彼謁寺主云我使爾為其弟子言畢老僧已亡師如言趨寺寺主駭其所以因留之向十年遇唐室中興求瑯琊王後因出詣岐州李使君師從父也見之悲喜奏是瑯琊王子命至京引見慰問賞賜優給復以為王師不願中宗降勅令廣領徒衆尋山置蘭若禪師性好終南山居於興法寺又於諸谷口造禪菴蘭若凡數處或入山數十里從者僧俗嘗數千人禪師既證道果常先言將來事是以人益歸之開元二十三年終遺命於少陵原南面鑿原為室而封之所封之處遂建天寶寺弟子輩留而守之紀聞録普寂義福神秀弟子按神秀姓李氏師𢎞忍天下謂之北宗並為時人所重普寂姓馮氏蒲州人神秀奇之盡以其道授焉開元十三年勅普寂於都城居止二十七年終於都城興唐寺及葬傾城哭送閭里為空義福姓姜氏銅鞮人初止藍田化感寺處方丈之室二十餘年未嘗出宇外後𨽻京城慈恩寺神秀禪門之傑未嘗聚徒開堂至普寂始於都城傳教二十餘年人皆仰之舊唐書方伎傳無畏三藏天竺人初自天竺至所司引謁𤣥宗謂曰師來欲何方休息耶三藏進曰臣在天竺時嘗聞大唐西明寺宣律師持律第一願往依止𤣥宗可之宣律禁戒堅苦焚脩精潔三藏飲酒食肉言行麤易往往乘醉喧競穢汚茵席宣律頗不能甘忽中夜宣律捫虱將投於地三藏半醉連聲呼曰律師律師撲死佛子耶宣律知為異人整衣作禮師事焉開天傳信記龍血禪師唐開元間自蜀之洋卓錫於祈子山西麓創寺説法醴泉湧出傳有龍化老人聽講入定後遺蜕竪塔藏之洋縣志法秀居京師遊於咸鎬之間以勸率衆緣多成善務後不知所終賈志不空本北天竺婆羅門族幼隨叔父觀光東國天寶五載終夏愆陽詔令祈雨空奏立孔雀王壇未三日雨已浹洽帝大悦一日大風卒起詔空禳止請銀瓶一枚作法加持須㬰戢靜賜號曰智藏至徳初鑾駕在靈武鳳翔空常密奉表起居肅宗亦密遣使者求秘密法洎收京反正之日事如所料代宗即位恩渥彌厚永泰中沐浴倚卧而寂茶毘火滅收舍利數百粒其頂骨不燃中有舍利一顆半隠半現勅於本院别起塔焉賈志太白山有胡僧不知幾百歲眉長數寸身不製繒帛衣以草葉恒持楞伽經雲壁逈絶人跡罕到嘗東峰有鬬虎弱者將死僧杖而解之西湫有毒龍乆而為患僧器而貯之商山趙叟采茯苓深入太白嘗值此僧岑嘉州集南岳懐讓杜禪師金州人嘗詣曹溪㕘六祖忽然有悟後居般若寺聞沙門道一常習坐禪師往庵前磨甎云欲作鏡一曰磨甎豈得成鏡師曰坐禪豈得作佛一遂求教天寶三年圓寂謚大慧禪師續文獻通考抱玉師以道行聞居長安中師而事者千數每夕獨處一室闔戸撤燭嘗有僧於門隙視之見有慶雲自口中出後年九十卒時方大暑而其尸無萎敗唐宰相第五琦與師善及卒來治喪將以香乳灌其口已而祥光自口出晃然四照或曰佛有慶雲祥光今抱玉師有之真佛矣宣室志純陀大厯三年三月萬年縣鎮國寺有胡僧純陀自言六百載遣弟子持衣鉢傳奉皇帝帝遣中書以紫衣賜之續文獻通考法照生於洋縣之釋子山遊南岳師長老承逺得法而歸居北山巖石下日夜精意念阿彌陀佛每念佛嘗有化佛空中顯見聲不加大聞於長安代宗遣使者以禮迎禁中賜號徳宗問曰佛留下法衆生歸依何門法照答曰諸佛在心頭迷人向外求内懐無價寶不識一生休帝大悦洋縣志京兆興善寺惟寛祝禪師信安人白居易嘗問禪師何以説法師曰無上菩提者被於身為律説於口為法行於心為禪其致一也元和十二年示寂謚大徹禪師續文獻通考神凑藍田人具戒於南嶽希操㕘禪於鍾陵大寂大厯八年詔配江州興果寺從僧望移𨽻東林寺元和十二年卒師自興果訖東林一盂齋一榻居衣麻寢菅如坐七寶檀施來無虚月盡歸寺藏與大衆共之目前無長物禮佛四十九年凡十二時未嘗闕一門人道達等封墳建塔白居易為銘豫章書惟則長孫禪師京兆人居天台山佛窟巖嗣忠禪師法嘗曰聖人如影百姓如夢孰為死生元和中示寂續文獻通考懐暉漳州謝氏子初受業於同安正寂院宣宗詔往京兆章敬寺傳燈録載有自性光明不與一切和合等語元和十三年示滅福建通志束草師長安平康坊菩提寺有僧不言姓名常負束藁坐卧於寺西廊下不肯住院經數年寺綱維或勸其住房曰爾厭我耶其夕遂以束藁焚身至明唯灰燼耳無血䁝之臭衆方知為異人遂塑灰為僧於佛殿上世號為束草師酉陽雜俎素和尚長安興善寺僧不出院轉法華經三萬七千部夜嘗有狼子聽經齋時有鳥鵲就案取食酉陽雜俎佛陀禪師居鳳翔府法門寺常持一串數珠念三種名號一釋迦二元和三佛陀自餘是甚麽椀躂丘乃過一珠終而復始事迹異常人莫能測指月録興元西墅有蘭若上座僧常飲酒食肉羣輩皆效焉一旦多作大餠招羣徒入尸陀林以餠裹腐尸肉而食數啖不已衆僧掩面走上座曰汝等能食此肉方可食肉自此緇徒精進雲溪友議有佛陀薩者其籍編於岐陽法門寺嘗獨行岐隴間衣黄持錫貌類童騃好揚言於衢中或詬辱羣僧僧皆怒焉其資膳裘紵俱乞於里人里人憐其愚厚與衣食以故資用獨饒於羣僧陀薩亦轉均於里中窮餓者焉開成五年夏六月陀薩召里中民告曰我今夕死矣汝為我塔瘞其尸果端坐而卒於是里中之人建塔於岐陽之西岡上漆其尸而瘞焉宣室志澄觀字大休俗姓夏侯氏㑹稽人年九歲禮本州寶林寺體真大師為師越一朞解通三藏十有一歲歴講涅槃淨名諸經洞悉幽微宿齒嘆異年滿受具於曇一大師研究律藏乂於常照禪師受菩薩戒又㕘無名大師融印宗説復依東京大詵和尚聽受元㫖詵深契之曰法界盡在汝矣師念五台為文殊道塲遂委身栖托閣錫大華嚴寺者十年凡儒家經子史傳及老莊寓言靡不兼綜博覽擬著華嚴大疏於般若院見一金像卓立空際夢寐中若或指授覺而下筆如有神助疏就將闡忽夢為龍頭枕南臺尾蟠北臺須㬰化作多龍奮迅分散經疏流通兆於兹矣製隨疏演義鈔四十巻隨文手鏡一百巻又為鄭公餘慶韋公皋孟公簡白公居易著十七巻文皆所以發明華嚴之㫖也師生於𤣥宗開元戊寅徳宗貞元丙子賜紫己夘受清涼國師號憲宗元和庚寅授僧統印至文宗開成己未春三月示寂世歴九宗師禮七帝俗夀一百二僧臘八十三形長九尺四寸垂手過膝目夜發光凡著述所流傳者總四百餘巻大經前後講五十餘遍無遮大㑹十有五設上足弟子海岸虚寂為首稟受學徒殆將千衆惟東京僧睿圭峰宗密獨得奥傳遺命窆於終南石室時有西域梵僧在葱嶺見二使者足不履地以呪止而詰之曰余北印土文殊堂神於東土取華嚴菩薩大牙供養及至奏啓石室驗之唯三十九齒色若氷霜闍維之際得舍利數千粒舌若紅蓮火不能變其神異多類此文宗命裴公羙撰碑塔謚妙覺元沙門印重脩祖塔刋石記本朝雍正十二年十月十五日奉㫖清涼觀著封妙正真乘禪師仍著該地方官致祭一次終南山惟政禪師得法於普寂結廬太乙唐文宗嗜蛤蜊海民供遞甚勞一日御饌中有劈不張者帝以其異即焚香禱之乃開見菩薩形儀梵相具足遂貯以金粟檀合賜興善寺令僧衆瞻禮問羣臣曰斯何祥也或奏師可備顧問乃召師問其事師曰此啓陛下信心耳經云以此身得度者即現此身為説法帝曰菩薩身已現第未聞説法師曰陛下覩此為常耶非常耶信耶非信耶帝曰希有之事朕深信焉師曰陛下已聞説法竟帝大悦詔留師内道塲師累乞歸乃詔住聖夀寺武宗甫即位師忽入終南隠居人問何故曰吾避仇矣後闍維收舍利四十九粒而建塔焉指月録宗密姓何西充縣人少通儒書元和二年印心於圓和尚又受具於極律師太和二年慶成節徵入内殿問法要賜紫方袍為大徳尋請歸山㑹昌元年正月六日坐滅於興福塔院著圓覺金剛華嚴涅槃諸疏抄及法義類例禮懴修證圖傳纂略又集諸宗禪言為禪藏總叙之並酧答書偈議論等凡九十餘巻裴休有圭峰禪師碑銘在盩厔縣賈志𢎞辨禪師京兆大薦福寺僧唐宣宗問禪宗何有南北曰慧能神秀俱𢎞忍弟子慧能居南而神秀在北故曰南頓北漸非禪宗有南北號也又問諸佛書名義隨問而答賜紫方袍號圓智禪師續文獻通考子成號妙明霸陵人少習儒術長從釋氏洞明本宗嘗註心經五日成萬二千言辭理精當尤善詩詞咸寧縣志如觀禪師披剃於漢中精嚴寺海東和尚之大弟子也善禪定釋子皆宗之欲示寂令童子煮茗既熟次中路而師已寂童子亦執茗立化焉漢中志了覺禪師萬年人得法於洞山价初至洞山山問近離何處曰湖南又問途中還見異人否曰若是異人不渉途中山深器之閒堂僧問淨名大士入不二法門㫖趣何如曰山僧未敢舉明又問若是即事理不分答曰扁舟已過洞庭湖四川總志居誨禪師京兆人居潭州大光山初造石室長坐不卧麻衣草屨忘身為法續文獻通考元安禪師麟遊人夾山將寂時語曰石頭一枝看㸔滅矣師曰不然他家自有青山在山曰茍如是即吾宗不墜續文獻通考五代阿闍黎胡僧住鳳翔行髙知前事末帝在藩屢與僧言甚重之清泰元年七月遣供奉官鄭延遂往鳳翔召之二年十月鳳翔言僧闍黎卒帝嗟惜之命翰林學士為誌銘册府元龜休靜禪師京兆華嚴寺僧洞山謂汝向南住有一千人向北住止三百後住福州華嚴衆滿一千未幾後唐莊宗徵入輦下大闡元風其徒果止三百寂後謚寶智禪師續文獻通考僧朗偽蜀王氏時梁州天旱祈禱無驗僧子朗詣州云能致雨乃具十石甕貯水僧坐其中水滅於頂者凡三日雨足州將王宗儔異禮之檀越雲集後莫知所適僧令藹他日於興州見之因問其術曰此閉氣耳習之一月就本法於湫潭中作觀與龍相繫龍為定力所制必致驚動因而致雨然不如甕中為之保無他害北夢瑣言善靜禪師京兆府永安縣僧本王氏子有僧辭洛浦浦曰四面皆山向何處去僧不對師時為園頭代為措語曰竹密豈妨流水過山髙那阻野雲飛師甚喜後知其園頭語對衆稱曰莫輕園頭他日座下有五百人後住永安果應寂後謚静悟禪師續文獻通考京兆府重雲智暉禪師得法白水事之十年還洛京愛中灘佳山水創屋以居號温室院日以施水給藥為事梁開平五年忽欲至圭峰山翛然深住坐巖石間如嘗寢處顧見磨衲數珠銅瓶㯶笠觸之即壊斂目良乆曰此吾前身道具也因就其處建寺以酧夙心方薙草有祥雲出衆峰間遂名曰重雲節度使王彦超㣲時嘗從師遊欲為沙門師熟視曰汝世緣深當為我家垣牆彦超後果鎮永興申弟子之禮周顯徳三年夏詣永興與彦超别囑以䕶法彦超泣曰公遂忍棄弟子乎師笑曰借千年亦一别耳七月二十四日跏趺而化指月録宋紹巖禪師住杭州真身寳塔寺雍州劉氏子也呉越王命師開法署了空大智常照禪師開寶四年寂續文獻通考法天本中天竺摩伽陀國僧來至鄜州與河中梵學僧進共譯經義始出無量尊勝二經七佛贊知州王龜從潤色之法天獻於闕下宋太祖召見賜紫衣袍續文獻通考倒流菩薩不知何許人嘗坐蒲團逆涇而上旋涅槃於邠州之景村相傳宋天聖中事有塔存賈志文通慧姓張氏脱俗白雲寺師令掌厠盥盆忽有市鮮者沃於盆文偶擊之仆地死文懼奔華州總持寺乆之為長老忽曰三十年前一段公案今日當了遂趺坐以待時張浚統兵至闗中一卒持弓矢至法堂瞠目視文將射之文笑曰老僧相候乆矣語以故卒悟曰寃寃相報何時了刼刼相纒豈偶然不若與師俱解釋如今立地往西天視之已立化矣文即索筆書偈云三十三年飄蕩做了幾番模様誰知今日相逢却是從前魔障書畢汩然而化續文獻通考元詳悟號圓通髙僧也能悟禪教至元十一年於富平金粟山右石穴遂禪定焉其徒頌之曰樂水樂山為仁為智今骸尚在穴中賈志明順禪師長安人俗姓弓洪武初來五臺普光禪寺師無念徳公嘗夜中見自身在文殊㑹中聞種種偈誦後雲遊名山還至五臺永樂初跏趺而逝名山蔵方外記寶金姓石乾州永夀縣之名胄六嵗依雲寂温法師為弟子既受具入西蜀晉雲山中師事海真禪師大領道要出㕘諸方憇峨眉山採啖松柏脇不沾席者三年自是入定或累日不起嘗趺坐大樹下溪水横逸人意其溺死水退燕坐如平時惟衣濕耳一日聞伐木聲通身汗下歎曰妙喜大悟十有八小悟無算豈欺我哉急往證海真海真歎曰無用和尚有云無用應出三虎一彪一彪者豈非爾耶爾往朔方道大行也先是寳金在定中見一山甚秀麗重樓傑閣金碧絢爛諸佛五十三菩薩行道其中招寳金曰此五臺山秘魔巖也前身脩道靈骨猶存爾何忘之既寤遂遊五臺就山建靈鷲菴來學之僧多至千餘應元順帝召居宣州敬亭山寳金既有道行兼習天文太祖起兵時過宣州聞其名往訪之趺坐不起上異之問以向導果决勝如其言名山蔵方外記文機洪武初率徒衆飛錫山陽之天竺山歲庚申卜隠淨雲寺露宿不避風雨能馴猛虎山陽志無壊禪師西域人與秦愍王有宿緣卓錫黙川南普光寺夜擊木魚聲達王宫王異之遂往見師與語怳然悟前生事命席禮師師擕石甑炊飰石甑煮水飲食王從者千人皆遍後示寂又有一西域僧貌絶類師來遊於此踪跡詭異或飲食無算或累日不食飲之酒數斗不醉或自遺矢取雜鉢中並食之一居士欲從之遊師指矢令食有難色師笑舍之去後所遺矢處輙生白蓮花人謂無壊化身遊戯隴蜀餘聞惟安號普門郿人年十嵗為人牧羊有省遂薙髪受戒㕘方至普陀元旦挑柴忽風吹前後際斷因走五臺禮空印和尚深有發明行脚至黄山道聲洋溢宫庭胥仰後北遊至乘願禪院示寂江南通志趙老自號山主天順間覺悟禪宗居明月山頂以藥餌濟人有疾請者乗虎以往一方依之如思邈云其蟬蜕骨在山寺西室富平縣志東明禪師成化間至紫陽之五郎河見山水清奇林壑幽勝結庵居焉面壁焚脩端坐而化今東明庵乃其所創建者也紫陽志卧雪老僧𢎞治中京口人錢寳者善醫嘗遊齊魯間遇一老僧能卧大雪中雪為不積問其年數百歲矣後尹蓬頭客錢氏錢偶言僧狀尹曰吾師祖也别來乆尚無恙耶已而尹去老僧復至錢為述尹語僧曰是吾孫也徐出度牒示錢則唐大中四年所給已八百年矣僧秦人不知名字香祖筆記老九晉人不傳姓名嘉靖初寓蘇村寺或數日不飲食體貌魁梧言辭慷慨人稱曰老九或曰以邊帥而隠居者嘉靖十年之後愛少華峰時來寓華州東闗南岡下道院既數年郡人皆以為髙僧無求於世諸大夫往觀之見其雙目烱烱笑而不言年過九十猶步走如飛寓二十年不知所往華州志水齋嘉靖中持静商州羅漢洞檀越請供齋師曰吾日飲水一盂不須穀食衆供水一載時有蟒漸長將出洞噬人師仗劒覔之蟒前後遁避師掛衲洞前自立洞後蟒趨見衲返洞後師迎斬之是夜投崖飛昇遺蜕民收葬商州志清忠和尚夀寧寺禪僧性慧博學時引藏乗語擬議六經多有合者詩翰亦奇警縉紳先生聞而禮之三年前自言嘉靖庚戌歲當休届期坐化延綏志悟緣字萬休涇陽人剃度江南為雪浪門人後遊京師住圓通庵神廟間奉李太后懿㫖䕶蔵西歸開講文塔寺涇陽志華和尚波羅堡接引寺住持日以誦禪為事於萬厯年間坐化是日有人在靖邊遇華隻履西行甚急今於堡西南建塔俗呼新寺溝延安府志張騰霧商州龍駒寨人萬厯中將生父夢蓮花寺僧人來家霧生而喜靜且好善樂施年五十重脩蓮花寺工竣霧持靜於内知州龔淳慕其名便道詣寺霧拜謁不復起視之已立化矣淳驚異即書偈曰爾從何來從蓮花來爾從何去從蓮花去納懐中葬之商州志東晹禪師萬厯中卓錫商州棣花南洞持静二十年初大水泛漲絶食七日毫無饑色嘗施藥濟人逺近全活者甚衆將化去凡事皆前知商州志淨瑄商州大雲寺僧號瑞光精聲韻工繪畫常禁步閲藏一日沐浴著新衲登座召諸弟子誦經而化商州志張禪僧延長太平寺僧萬厯年間人貌甚奇古好㕘禪樂施濟造十方經堂及滲金佛五部經南遊普陀造香木佛厯五臺名山有積輙施後入定窅然坐化而終延安府志深毓字思元内袐禪宗外現講師法席所至雲集萬人嘗説楞嚴經金剛孝行鈔盂蘭盆鈔又彌陀疏鈔所詣在蓮池交光兩尊宿之間一時秦士大夫多與之遊賈志善道法師探大藏中巻得觀無量夀佛經乃専心念佛篤志精研晝夜不輟遁跡終南山修般若三昧數年見寶閣瑤池宛然在目後入定中觀綽禪師三罪綽禪師靜思往咎洗心悔謝乆之道出定謂綽曰師罪滅矣白光照之當往生相也道行化京師歸者如市後圓寂時有天樂異香賈志烏思由西竺來自言常受菩薩戒於烏思蔵同行三人皆類有道者欲往清涼山尋文殊遺跡住於榆林城西誦經持咒晝夜不輟惟日中一食而已後入五臺而寂延綏志顛和尚長安人蹤跡詭異蜀臬某迎之成都禮拜甚恭而往往面斥之言無忌憚嘗食犬肉帽簷挿花一枝引羣丐遊行市中入昭覺見雪丈禪師詼嘲不屑禪師頗敬憚焉一旦騎馬出城數里語廏吏曰吾歸矣徑舍騎徒歩去臬追贐不受往來秦蜀棧中所至輙畫達摩像施人歸至長安數日遂坐化隴蜀餘聞懶翁仕名任義本蜀李氏子避難寓隴州後官彭州太守忽自歎曰三生原是出家人一念差來墮縉紳破袖蒲團瓢笠杖依前還我水雲身遂棄妻子掛冠而遁混迹緇流歸隠於隴州方山結廬巖壑徜徉嘯傲似唐之懶殘而詩歌梵音絶類寒山子門人於石壁樹葉間尋得其遺跡刻拾唾録一集傳世夀八十一一日沐浴整衣與大衆别行者道坐脱耶翁曰我不喜打坐行者道立化耶翁曰你也管我不住大衆求偈翁竪起拳頭曰㑹麽衆無語翁笑曰不是這箇道理老夫天堂也去得地獄也去得言訖自卧而逝白雲繞室異香三日不散隴州志隋神尼髙祖以大統七年六月癸丑夜生於馮翊般若寺紫氣充庭有尼來自河東謂皇妣曰此兒所從來甚異不可以俗間處之尼將髙祖舍於别館躬自撫養皇妣嘗抱髙祖忽見頭上角出遍身鱗起皇妣大駭墮髙祖於地尼自外入見曰驚我兒致令晚得天下隋書文帝紀隋神尼者名智山蒲坂劉氏女少出家有戒行文帝誕日怱至名帝為那羅延將帝躬自撫養及帝年七嵗曰佛法將滅神明已西兒當大貴神來有日後周滅二教尼隠皇家戒行不改帝踐祚重興佛法每以神尼為言歿後即葬寺中為起金浮屠又改所居般若寺為大興國寺山西通志明吕尼正統親征也先陜西吕尼迎駕諌曰不利上怒叱武士交捶之尼趺坐以逝及䝉塵數數見尼娓娓有所説時時授上餅餌駕返居南宫又數數見尼娓娓有所説復辟後詔封皇姑建寺賜額曰順天保明寺後殿祀姑肉身趺坐愁容一媪也萬厯初年頂猶熱畿輔通志苗氏榆林衛百戸王受璽妻家貧夫亡不嫁舍旁有地可築圃種菜自給晨起灌園輙喃喃誦佛經不置口後趺坐而逝未逝前數日圃中卉草皆開小花青色如芙蓉一夕而落香氣經旬不散氏無子兄子苗可進好義人也恒負薪水助之以功受戎車營守備闖亂隠商山不知所終延綏鎮志本朝寂慜不知何許人卓錫膚施縣靜因庵四時不著履終日禮禪順治十七年端坐入定火從口出而逝楊禪字慈容膚施縣萬夀寺僧好㕘禪持五戒甚嚴一日謂徒曰吾今日當去去後火之須㬰趺坐而逝其徒舉火火光中結紅蓮數十朶佛像數十尊火熄乃止祖來字皈宗膚施縣人其母臨産時夢𤣥奘排闥直入遂生祖來形貌奇古七歲披剃清涼山之延夀洞誦大藏孔雀諸經咒悉能記憶嗣歴遊五臺諸名山歸足不履城市者三十載年八十趺坐而逝賀佛延長干谷驛人幼嬉戲遇佛輙作禮人異之及長父母與婚即遁走晉中為僧與人不晉接晝夜立如山止或詰之不語康熙十三年自晉歸即屏居清澗山中一日端坐而化七日不仆鄉人祀之性耀字洞然榆林人薊鎮總兵官呉國俊弟少小厭薄紛華及長欲為之娶不顧即剪落為僧住十方院諦誦經論流賊之亂杖錫南去開戒於嵩山龍潭寺河南尊事之稱龍潭和尚於康熙六年化去寂蓮漢隂人鉢無宿糧糧盡則啖黄精以飽居蓮花寺寺在萬山中屏絶塵境性好遊勿問晝夜興至輙往雖巉巖峭壁跣足飛步因號赤脚禪師一日與寺衆僧約某月日將化去届期遂積柴坐焚頂上現五色光空中聞鼓樂聲云寂宗鎮安龍興寺僧有戒行康熙九年忽一日晨起呼其徒曰今日有客至吾當迎之隨整衣帽端坐而逝許靈康熙十一年至鎮安紅山洞蓋竹庵終日静坐時有巨蛇蜿蜒坐下聽僧持誦歴三年趺坐而化超古號蜀叟本蜀人順治十八年投栖山陽天柱山能消毒蛇驅猛虎鑿石藏經詠詩説偈確有見道處王嗣運朝邑人嗜浮屠學順治初年已八旬一日坐街頭假寐農夫李百能過而見之至田又見其芸驚問之答曰我固在田也百能仍視街頭寐如故由是人大異之有戚屬病祟求為驅伏運曰我安能學方士伏邪耶懇之力始往將入門呼佛者三聞有聲吼曰吾無生矣怪遂滅順治十六年夀九十一無疾而終康熙十年里人李成林遷流閩中不得歸忽遇嗣運於市慰之曰行矣不久將歸成林懵然不復知嗣運死既乆方疑之壬子邑紳張好奇典試入閩攜成林歸其言果驗景理鶴本慶陽人順治末至朝邑居阿石村之大廟終日静坐數十年如一日卒之日晨起呼弟子曰今日之酉吾去矣汝輩喪葬依常禮勿為鬼怪壊我末路至時沐浴更衣端坐而逝松山祝髮朝邑沙橋寺戒律精嚴河濱李楷為構精舍朝夕焚脩李將南遊送之沙橋幷擕所購梵典五千巻藏之寺後即危坐涅槃緇衆環繞合掌而逝通賀韓城人少嗜浮屠學剃度後即師事鑒如聽講楞嚴法華諸經三年盡得其義聞世祖設龍華㑹於五臺首往受千佛戒至京止憫忠寺㑹文皇后違和選名僧諷經通賀與焉后既愈賜紫衣一襲時名僧報恩卓錫江南遂南遊問道瞑目趺坐者七日豁然頓悟西歸閉闗藍田之寶泉寺嵗旱禱雨輙應甲戌臘月整衣沐浴説偈而逝上古偓佺槐里采藥人也食松實形體生毛數寸許能飛行捷步後不知所終興平志偓佺以松子遺堯堯不暇服也松者簡松也時人受服者皆至二三百嵗列仙傳馮夷華隂潼鄉人得仙道化為河伯博物志稟華之精食惟八石乗龍隐淪往來海客若是水仙號曰河伯郭𢎞農馮夷贊三代真行子禹時出降於商山授禹九疇書及靈寳五符治水真文續文獻通考蘇林嘗師華山仙人仇先生仇先生者湯時木正也服胎食之法於還神守魄之事大得其益周季通元洲上卿傳青鳥公彭祖弟子入華隂山中學道積四百七十一歲服金液而昇天列仙全傳李八百蜀人居筠陽五龍岡歴夏商周年八百歲又動則行八百里里人因號為李八百脩煉於華隂山石室丹成還蜀續文獻通考杜冲字元逸鎬京人棲𤣥學道穆王為脩觀建祠置沖為道士沖閒居幽室吟咏道徳經二十餘年感真人展先生降於寢所授九華丹方一函又感真人李君授以大上素靈洞𤣥大有玅經遂乃洞觀衆妙通㝠達幽莫測其涯太極真人傳馮長驪山人周宣王時為柱下史觀天文之變乃退隠攝生遇鄧真人授以靈書功行垂成復遇彭真人授以太上隱書遂得仙平王三十年化去列仙全傳乞食公者西岳真人馮延夀周宣王時史官也楚莊王時市長宋來子常洒掃一市時有乞食公入市經日乞而歌曰天庭發雙華山源障隂邪清晨安天馬來詣大真家真人無那隠又以滅百魔一市無解者獨來子忽悟疑是仙人乃棄官追逐積十三年授以中山之道列仙傳馮按馮延夀即長弄玉秦穆公女善吹簫與蕭史共登樓吹簫作鳳凰音鳳從天而降後升天去帝王世紀蕭史周宣王時人遊終南山遇異人授長生術教以吹簫歸告父母願入道父母聽之宣王史籍散亂蕭能文著本末以備史之不及人以史目之實無名秦穆公有女名弄玉善吹笙無和者孟明薦史因召見女呼試之一吹而清風生再吹而彩雲迎三吹而鳳凰來女亦三吹如史所感願嫁之於是合宴西殿笙簫間奏曲未終鳳凰忽下二仙乗之而去盩厔縣志老子楚苦縣人姓李氏名耳字伯陽謚曰耼周守藏室之史也其學以自隠無名為務居周乆之見周之衰乃遂去至關關令尹喜曰子將隠矣强為我著書於是老子乃著書上下篇言道徳之意五千餘言而去史記本傳老子將去而西出闗闗令尹喜占風氣逆知當有神人來過乃掃道四十里見老子而知是也老子在中國都未有所授知喜命應得道乃停闗中具以長生之事授喜喜又請教誡老子語之五千言喜退而書之名曰道徳經行其道亦得仙神仙傳傳按樓觀仙師載老子度關事應在周昭王時今據史記叙於春秋之末關令尹喜善内學隠徳脩行時人莫知老子西遊喜先見其氣知有神人當過物色而遮之果得老子老子亦知其竒為著書授之尹喜亦自著書九篇號曰關尹子列仙傳尹喜天水人少好學善天文祕緯仰觀俯察莫不洞徹渉覽山水於盩厔聞仙里結草為樓以望氣後老子入闗迎至樓觀授道徳五千言告以通神變化之道號文始先生盩厔縣志紫衣真人不傳姓氏結廬西鄉天仙山喜服紫衣後仙去漢中志秦茅濛字初成咸陽人即東卿司命君盈之髙祖也濛覩周室將衰不求進於諸侯常歎人生若電流出處宜及其時於是師北郭鬼谷先生授長生之術後入華山脩道合藥乗龍駕雲白日昇天先是其邑歌謠曰神仙得者茅初成駕龍上昇入太清時下𤣥洲至赤城繼世而往在我盈帝若學之臘嘉平秦始皇聞之因改臘為嘉平洞仙傳盈字叔申年十八棄家入恒山積六十年思念至道寢興妙論彷彿見太𤣥玉女把玉札攜至西城見王君從王君見王母王母告以玉珮金璫之道太極元真之經又有隂陽二景符與太上法遂歸句曲邦人因改句曲為茅君山時二弟固衷在官聞盈𤣥跡𣺌邁於是棄官還家渡江求兄盈並授以上道至漢平帝二年帝命盈為司命東卿治赤城玉洞之府二弟留治此山爾乃風雨以時五禾成熟疾癘不起暴害不行司命真君傳馬成子扶風人周秦間慨然有脩道志棄家入伯陽川遇一童子授以胎元煉氣法乃入蜀鵠鳴山隠居洞中忽一人杖䇿至曰此山鵠鳴子當登仙矣乃授以神丹曰氣為内丹藥為外丹子受仙童内丹今復受吾外丹不當為髙真乎言訖乗氣去成子服之遂白日昇天續文獻通考漢伯山甫雍州人入華山中精思服食時時歸鄉里省親二百年不老至人家數人先世以來善惡功過有如目見又知方來吉凶言無不效神仙傳裴元仁夏陽人年十餘嵗精思讀經嘗詣佛圖道人支子元見而謂曰吾善相人子目中珠子真似北斗瑤光星自背以下象如河魁既有貴爵又當神仙因以仙人蔣先生神訣五首授之元仁再拜還歸精思行之積十一年夜視有光年二十三州辟主簿後遷冀州刺史有仙人乘白鹿從天下庭中曰我南嶽真人赤松子也聞子好道故來相過勤存五靈别當授子真道元仁遂棄官委家登太華山入西洞元石室中積二十二年見五老人各賜神芝經巻元仁服芝讀經十旬之間視見萬里之外能日步千里乃遊行天下東到青𤣥遇谷希子青帝君還太山遇司命君西到流沙遇太素真人在空山之上遂留空山積十一年太素真人曰子道成矣因詣太素宫受書為清靈真人鄧雲子清靈真人傳脩羊公魏人居華隂山石室有懸石榻卧其上石盡穿陷略不動時取黄精食之後以道干景帝帝禮之使止邸中數嵗道不可得有詔問公何日發語未訖化為白石羊題其脇曰脩羊公謝天子後置石羊於通靈臺上復去不知所在列仙傳脩羊公石榻在嶽之西北仙谷中石室雍勝略劉慿沛人有軍功封夀光金鄉侯學道於稷丘子年三百餘嵗有少容嘗到長安有百餘人隨慿行於山中逢賊數百人拔刃張弓四合圍之須㬰大風折木飛沙揚塵賊衆皆頓地反手背上張口短氣欲死慿責之皆叩頭乞命奔走去武帝聞之詔徵而試之云殿下有怪可治否慿曰此易耳至夜帝偽使人作之慿於殿上以符擲之皆面搶地以火焠口無氣帝大驚曰此非怪也朕以相試耳乃解之後入太白山中數十年復歸鄉里顔色更少神仙傳巫炎字子都北海人武帝出見子都於渭橋頭上鬱鬱紫氣髙丈餘帝詔東方朔使相此君有何道術朔曰此君有隂道之術武帝屏左右問之遂授其法於帝帝頗行其法不能盡用之然得夀最長於先帝也神仙傳孟岐清河之逸人也年可七百歲語及周初事了然如目前岐侍周公昇壇上岐以手摩成王足周公以玉笏與之岐嘗寶執每以衣袂拂拭笏厚七分今鋭斷恒切桂葉食之聞帝好仙披草來謁洞㝠記車子侯扶風人漢武帝愛其清浄積遷其位至侍中一朝語家云我今補仙官此春應去至夏當暫還還少時復去如其言武帝思之乃作歌曰嘉幽蘭兮延秀蕈妖媱兮中塘華斐斐兮麗景風徘徊兮流芳皇天兮無慧至逝兮仙鄉天路逺兮無期不覺涕下兮霑裳洞仙傳李充馮翊人自言三百嵗荷草畚負五嶽真圖而至帝禮待之亦號負圖先生焉洞㝠記衛叔卿者中山人也服雲母得仙漢武帝閒居忽有一人乘雲車駕白鹿從天而下來集殿前帝驚問為誰答曰吾中山衛叔卿也帝曰子朕臣也可前共語叔卿黙然不應忽焉不知所在帝悔恨遣使者梁伯至中山推求叔卿得其子名度世即將還見帝曰臣父委家而去已四十餘年云當入太華山帝即遣使者與度世共求其父到山下輙火不能上積數十日度世齋戒獨上於絶巖之下望見其父與數人博戲於石上紫雲鬱鬱度世望而再拜言故叔卿曰帝不識道而反欲臣我不足告語終不復往汝歸當取吾齋室西北隅大柱下玉函中神素書按方合藥道成來就吾於此勿為漢臣亦不復語帝也度世於是辭去後掘得玉函封以飛仙之香乃五色雲母遂合藥服之仙去神仙傳王仲都漢人學道於梁山遇太白真人授以虹丹能禦寒暑漢元帝召至京師試其方術嘗以嚴冬之月從帝遊令仲都單衣乘駟馬車於上林昆明池環水馳走帝御狐裘猶覺寒仲都貌無變色背上氣蒸又當盛夏曝之日中圍以十爐火口不穪熱身不流汗後仙去桓君山著新論稱其人神仙傳赤須子豐人豐中傳世見之云秦穆公主魚吏也數言豐界災害水旱十不失一劉向從受業好食松實天門冬石脂齒落更生髪白還黒後往呉山下十餘年莫知所之列仙傳谷春櫟陽人成帝時病死而尸不寒後忽出櫟南門及光門上而入太白山民為立祠於山嶺春秋來祠中山宿焉水經注劉根字君安長安人少明五經以成帝綏和二年舉孝亷除郎中後棄世學道入嵩髙山石室崢嶸峻絶直下五千餘丈冬夏不衣身毛長一二尺顔色如十四五嵗人每與坐或時忽變著髙冠𤣥衣人不覺換之王莽時衡府君使府掾王珍問起居數得見每見根書符了有所呼召似人來取或聞推問有人答對及鞭撻聲悉莫測其端也根後入雞頭山仙去神仙傳書按後漢方術傳劉根係潁川人葛稚川作神仙云傳又云京兆人稚川博洽有據故録之唐公昉王莽居攝二年為郡吏遇真人賜以神藥時去家百餘里轉影即至鄉人驚白府君府君遣吏收妻子昉告其師師以藥飲其妻子塗其屋柱須㬰大風雲霧拔宅仙去城固縣志李八百知漢中唐公昉有志欲教授之乃先往試為傭公昉愛異之八百乃偽病困欲死公昉為迎醫合藥費數十萬錢又轉作惡瘡徧體臭惡不可近公昉為之流涕八百曰吾瘡得三十斛美酒浴身得愈公昉即為具酒著大器中八百起入浴瘡即愈體無餘痕乃告曰吾仙人也子有志故此相試今當授子度世之訣乃使公昉夫妻并三婢以其浴酒自浴即皆更少以丹經一巻授公昉公昉入雲臺山中作藥藥成服之仙去神仙傳戴孟本姓燕名濟字仲㣲漢明帝時人入華山受裴君玉珮金璫經及受石精金光符復有太㣲黄書能周遊名山神仙傳矯慎字仲彦茂陵人少學黄老隠遯山谷因穴為室仰慕松喬導引之術年七十餘不娶忽歸家自言死日及期果卒後人有見慎於燉煌者或云神仙焉後漢書逸民傳馬明生臨淄人姓和字君實少為賊傷殆死忽遇一女子云太真夫人也與藥一丸服訖即愈乃自號馬明生後得安期生丹經神方入華隂山脩煉漢靈帝時太傅胡廣試以國事皆驗續文獻通考靈夀光扶風人年七十餘得朱英丸方合而服之頗得其妙轉更少壯年如二十時漢獻帝建安元年光已二百二十歲常寓江陵胡田家無疾而卒田殯埋之百餘日人復見在小黄寄書與田田得書發棺無所有惟履在神仙傳呼子先漢中闗下卜師老夀百餘歲臨去呼酒家老嫗曰急裝當與嫗共應中陵王夜有仙人持二茅狗來至呼子先子先持一與酒家嫗得而騎之乃龍也上華隂山列仙傳李仲甫豐邑人少學道於王君服水丹有效兼行遁甲能隠形年百餘歲轉少初隠百日一年復見形後遂長隠但聞其聲與人對語飲食如常仲甫有相識人相去五百餘里常以張羅自業一日張羅得一鳥視之乃仲甫也語畢别去是日仲甫已復至家在民間三百餘年後入西嶽山不復還神仙傳魯女生長樂人初餌胡麻及术絶穀八十餘年道成一旦與知友故人别云入華山去後五十年先相識者逢女生華山廟前并令謝其鄉里故人神仙傳赤斧巴戎人為碧雞祠主簿能作水澒煉丹與硝石服之三十年反如童子毛髪生皆赤後數十年上華山取禹餘粮餌賣之累世傳見之手掌中有赤斧焉列仙傳南陽文氏其先祖漢中人值亂逃華山中饑困欲死有二人教之食术遂不饑數十年乃來還鄉里顔色更少氣力轉勝抱朴子内篇青谷先生不知何許人常脩行九息服氣之道後合爐火大丹服之得道入華山洞仙傳平常生不知何所人數死復生為華隂門卒列仙傳陳安世京兆人為權叔本家傭賃叔本好道有二仙人託為書生從叔本遊叔本不覺其仙人也乆而意怠叔本在内方食二仙來詣門問安世叔本在否答曰在入白叔本其婦使安世出答言不在二人曰前云在旋言不在何也答曰大家教我云耳二人善其誠實乃問安世汝好道乎汝審好道明日早㑹道北大樹下安世承言早往期處三期之而安世輙早至知可教乃以藥二丸與安世誡之曰汝歸勿復飲食别止於一處安世承誡叔本見安世不復食但飲水止息别位疑非常人乃執弟子禮朝夕拜事安世教之叔本後亦仙去神仙傳劉道偉少入嶓冡山學道積十二年遇仙人試之將二大石約重萬斤以一白髪懸之使道偉卧其下顔色無異心安體悦又十二年遂賜以神丹服之昇天洞仙傳郎宗字仲紱安丘人後居華山服胡麻得道續文獻通考翟法言雲陽人詣蜀棲霞宫採藥得道能召灘神楊雲外與翟法言相繼得道於棲霞宫亦雲陽人四川總志王順採藥於終南山今終南有王順祠歲旱禱雨輙應神仙通鑑呉睦長安人少為縣吏人多訟之睦逃入山林饑乏累日行至石室遇異人命學種黍及胡麻備驅使經四年遂授其道長安志隂生長安中渭橋下乞兒常止於市中乞市人厭苦以糞灑之旋復在里中衣不見汚如故長吏知之械收繫著桎梏而續市中乞又械欲殺之乃去灑者之家室自壊殺十餘人故長安中謠曰見乞兒與美酒以免破屋之咎搜神記鍾離簡咸陽人為郎中與弟權俱入華山得道白日昇天列仙全傳權號谷和子一號真陽子又號雲房先生歴仕漢及魏晉首遇上仙王元甫再遇華陽真人授祕訣遂棄世事於縣東四十里真陽洞脩煉登仙續文獻通考呉丹酈邑人十一嵗母死居墓側五年哭聲振林木間後遇異人傳煉服術曹操召拜左奉駕郎不就遊終南山得篆文十六曰孝哉呉丹卓行異人以番而鳳致道之所乃遊番至餘干呉鳳岡遂結茅居之江西舊志三國王暉魏時人居華嶽熊牢嶺常種黄精溪側虎為之耕豹為之耘出入亦乗虎豹餌黄精蒼木後以道術傳王法沖尸解而去嘗著祕訣人莫能曉賈志薊子訓有異術魏正始中有人於長安東霸城見與一老公摩挲銅人相謂曰適見鑄此已近五百年矣見者呼曰薊先生少住並應之視若遲徐而走馬不及水經注杜契字廣平京兆人建安初渡江依孫䇿後孫權用為立信校尉黄武二年學道師介琰受黄白術乆能隠形遁迹後居茅山之東時與弟子採伐貨易山塲市里人不能知後入洞中得仙洞仙傳晉路光漢順帝時人歴三國堅心慕道晉武帝太康五年往華山仙掌峰脩煉夢老君賜玉鑰匙書符行功治病驅邪後昇天去賈志梁諶扶風人初事鄭法師於樓觀晉恵帝永興二年老君命真人尹軌降於樓觀授以煉氣隠形之法及水石還丹術諶乃隠於終南山丹成能飛行變化一日謂門人曰有友召我於南峰今往矣輙冠服而出雲氣繚繞不見其形惟鼓吹之音隠隠從空去列仙全傳王嘉字子年隴西人清虚服氣不與世交石季龍之末至長安隠於終南山苻堅累徵不起公侯已下咸躬往㕘詣隨問而答辭如䜟記事過皆騐堅南征遣使者問之嘉曰金剛火强使者還告堅不悟復遣問世祚云何曰未央明年癸未敗於淮南所謂未年有殃也姚萇入長安禮嘉如苻堅故事萇與苻登相持問嘉曰吾得殺苻登定天下否嘉曰略得之萇怒曰得當云得何略之有遂斬之先此釋道安謂嘉曰世故方殷可以行矣答曰卿其先行吾負債未果至是戮死所謂負債者也及萇死萇子興字子略方殺登略得之謂也嘉死日人見之隴上晉書本傳王嘉隠於東陽谷鑿崖穴而居弟子傳業者數百人亦皆穴處石季龍兵亂棄其徒衆至於長安隠終南山結菴廬而止門人聞而復隨之乃遷於倒獸山十六國春秋名按倒獸山一𤣥象山在渭南縣東南三十七里孟欽洛陽人有左慈劉根之術苻堅召詣長安惡其惑衆命苻融誅之俄欽至融留之遂大讌羣僚酒酣目左右收欽欽化為旋風飛出第外頃之有告在城東者融遣騎追之垂及忽然已逺或有兵衆拒戰或澗溪騎不得過遂莫知其所在晉書本傳馬儉扶風人博通經史苻秦甘露中從孫徹學道授五符真文斷穀服水行氣導引遂役使萬靈制御羣邪姚萇聞而異之往召不至給以香燭年九十八馮志劉少翁曽數入太華山禮拜向山如此二十年忽一旦得見西嶽丈人授其仙道續博物志南北朝麻衣子姓李名和紺髪美姿入終南山遇道者遺以道劉宋大明初百有一歲坐逝續文獻通考冦謙之字輔正早好仙道有仙人成公興謂謙之曰先生有意學道豈能與興隠遁謙之從之興乃令謙之潔齋三日共入華山令謙之居一石室自出採藥還與謙之食藥不復饑魏書釋老志李順興杜陵人年十餘乍愚乍智言未來事時有中者家常為齋方食器用不周順興言昆明池有大荷葉可取盛餅食所居去池十數里日不移影順興負荷葉而歸舉坐驚異後稍出城市嘗冠道士冠號李練好飲酒但不至醉得人所施輙散乞貧人蕭寶夤反召問曰朕王可幾年對曰天子有百年者百日者及寶夤敗裁百日也有侯終徳者寶夤之黨順興稱其必敗終徳棒殺順興置城隍中頃之起活如初俄至太傅梁覽家庭中卧以布衫倒覆身上後覽被誅以衣倒覆果如順興之形周文至温泉順興乞温泉東驪山下二畝地未幾至温湯卒於其地初大統十三年順興謂周文曰可於沙苑北作一老君象面北作笑狀周文曰何為曰令笑破蠕蠕時未解及蠕蠕滅周文憶其語遂作順興象於老君側北史本傳强練不知何許人先是李順興語黙不恒好言未然事當時號李練世人以强類之故亦呼為練焉恒寄住諸佛寺兼歴造王公邸第所至人敬信之晉公䕶未誅前練手持一瓠到䕶門外抵破曰瓠破子苦時柱國平髙公侯伏龍恩深被任委練至龍恩宅呼其妻元氏及妾媵婢僕等並令連席而坐諸人苦辭不肯練曰一例人耳何有貴賤遂逼就坐未幾䕶誅諸子皆死龍恩亦伏法仍籍沒其家建徳中每夜上街衢樹邊大哭釋伽牟尼佛或至申旦如此者累月聲甚哀苦俄而廢佛道二教大象末又以一無底囊厯長安市肆告乞市人爭以米麥遺之練張囊受之隨漏於地或問之練曰但欲使諸人見盛空耳至隋開皇初果移都龍首山城遂空廢後莫知其所終北史本傳韋節杜陵人後魏時棄官謁趙法師入華山因號華陽子餌黄精撰三洞議序老子易論周武帝賜號精思法師有白鶴臨壇天和四年忽彩雲如蓋覆其廬上節曰吾當乗此而去遂化昇續文獻通考焦道廣周武帝時道士獨居雲臺峰辟粒餐霞常有三青鳥報未然之事周武帝親詣山庭臨軒問道因於谷口置雲臺觀道廣欲構房廊精思所感石上湧出神土用盡復生雍勝略王延字子元扶風人師焦真人授三洞祕訣周武帝召至都乆之請還山嘗苦乏油乃置一器經夕自滿文帝禪位置仙都觀詔延主之謂門人曰吾欲歸西嶽乃委化於觀中帝遣使䕶葬西嶽及就壙但空棺而已賈志隋王褒字子登范陽人開皇中辭親求道乃入華隂山精思一十八年感太極真人西梁子下降授䭀飯方并服雲芽法復五年太極真人王總正復降以上清經三十一巻付子登并將子登遊五嶽觀名山備受上法上清經述唐華隂雲臺觀劉法師於貞觀中鍊氣絶粒迨二十年每三元設齋則見一人衣縫掖面黧瘦來居末坐齋畢而去如此者十餘年衣服顔色不改法師異而問之對曰余姓張名公弼住蓮花峰東隅法師請同往公弼怡然從之遂隨行至一石壁下一徑濶數寸法師與公弼側足而立公弼以指扣石壁中遂劃然開一門門中有人曰何故引外人來公弼曰此靈臺劉法師也與余乆故可豐食遣之其人遂取一盂水以肘後青囊中刀圭粉和之以飲法師飲畢而饑渴之想頓除公弼曰余昨云山中甚樂盍為戲令法師觀之其人以水噀東谷中俄有蒼龍白象各一對舞舞甚妙威鳳彩鸞各一對歌歌甚清頃之公弼送法師迴法師至觀處置事畢却尋公弼則步步險阻杳不可階法師痛恨遂成腰疾公弼更不復至矣續𤣥怪録羅通㣲臨晉人少時採薪山中遇閻使君宷謂曰子骨相可學長生遂冠褐五老山學歩虛絶粒貞觀中忽一日謂人曰我當歸明日大㑹士庶俄雷震地下青龍躍出遂跨龍飛去列仙全傳匡智長安人貞觀間棄妻子與姪大郎往廬山修煉居七日有老人曰此山隂地仙不可得南有名山陽地可往居之乃至吉州望見義山忽有樵夫引二人登山曰此山安穏勉力精修遂於送龍洞尾立二壇朝夕禮斗既數年中元節上昇而去大郎更立第三壇亦朝夕禮斗次年七月七日尸解事聞勅鄉人祀焉胡澹菴碑記杜懐謙貞觀中道士居雲臺山側之長春石室斷穀不食好吹長笛令人多買笛一吹即投於巖下笛盡更棲息巖中累月不動自號長春先生賈志薛尊師者家世榮顯則天末為陽翟令精心歸道棄官入山邑小胥唐臣願從之杖䇿負囊往嵩山口忽遇一人自云姓陳云知近有仙境當入山求之知所詣即來相報期以五日既而過期十日不至薛遂緣磴入谷行數日俄覩一禪室中有老僧於僧床下見藤蔓緣壁出戸僧指蔓視薛遂視蔓出戸其蔓旁巖壁不絶經兩日猶未盡忽至石室中有道士數人其陳山人亦在笑謂薛曰子之志可教也遂指授道要問其所云終南山紫閣峰下去長安城七十里尊師道成後入京居於昊天觀𤣥風益振開元末時已百餘歲忽告門人曰天帝召我為八威觀主無病坐亡顔色不變遂於本院中造塔弟子唐臣後亦為國師焉元化記韋善俊京兆人生十三嵗遇道士韓元最授以祕要嘗過壇墟店遇黒犬旋繞不去因畜之呼為烏龍一日謂弟子曰太上召我我去矣其犬忽長數丈化為龍乘之而去列仙全傳李筌號逹觀子居少室山好神仙之道嘗至嵩山虎口巖得黄帝隂符經其本糜爛筌抄讀數千遍不曉其義因入秦至驪山下逢一老母敝衣扶杖神狀甚異路旁見遺火燒樹因自言曰火生於木禍發必尅筌驚問之母曰吾受此符已三元六周甲子矣少年從何得之筌再拜具告所得母曰少年顴骨貫於生門命輪齊於日角血脉未減心影不偏性賢而好法神勇而樂智正吾弟子也於是坐於石上與筌説隂符之義乆之母曰日已晡矣吾有麥飯相與為食袖中出一瓠令筌谷中取水及還已失母但留麥飯數升於石上筌後入名山訪道不知所終神仙感遇傳成真人開元末有中使自嶺外迴謁金天廟奠祝畢戲問巫曰大王在否曰不在闗外三十里迎成真人耳中使遽令人候之有一道士敝衣負囊自闗外來問之姓成以驛騎載之到京密奏焉𤣥宗召入館於蓬萊院詔問道術及所脩之事皆不能對半嵗餘懇求歸山自内殿挈布囊徐行而去所司掃灑其居改張幃幕見壁上題曰蜀路南行燕師北至本擬白日昇天且看黒龍飲渭以事上聞上黙然良乆頗追思之其後禄山起燕聖駕幸蜀皆如其䜟仙傳拾遺申宗開元中進士張佐嘗南次鄠杜郊行見有老父乗青驢背鹿革囊自斜逕合路佐試問所從來叟笑而不答至再三叟曰吾夀永者耳遂促走佐亦撲馬趂之至逆旅佐貰白酒將飲試就請叟曰此正所好何子解吾意耶飲訖佐徐請願先生賜言叟曰吾宇文周時扶風人也姓申名宗慕齊神武因改宗為歡從燕公于謹征梁元帝於江陵軍旋夢青衣二人謂余曰吕走天年人向主夀不干吾乃詣占夢者於江陵市占夢者曰吕走迴字人向主住字也豈子住乃夀也時留兵屯江陵遂陳情於校尉拓跋烈許之自是周行天下迨兹二百餘嵗所見異事甚多並記在鹿革中因啓囊出二軸書佐不能讀其夕佐略寢及覺已失叟後數日有人於炭谷湫見之叟曰為我致意張君佐遽尋之不復見𤣥怪録李元明皇時華山採藥以食性復好酒山下人多以酒與之忽一日騎白鹿舉手謂山下人曰我今去遊天臺三老人遮道留之元與藥三丸服之皆一百五十歲賈志傅仙宗長安人性沉黙好道有神人告以脩真地遂乗青騾赴平岡隠焉開元間詔赴闕上問卿何道致此對曰守以恬淡行以簡易又問金丹曰恵及民物即長生也乆之還山乾道二年沐浴登榻而逝邑人王念還自成都見其乗青騾於簡州道上四川總志田真人碑沒其名富平人脩煉美原田村曉服食變化術里人碑其處曰田真人拔宅處賈志契虚本姑臧李氏子自孩提好佛氏法律年二十七髠髪衣褐居長安佛寺中及禄山破潼闗𤣥宗幸蜀契虚遁入太白山採柏葉食之自是絶粒一日有道士喬君來詣謂契虚曰師神骨孤秀當遨遊仙都請備食於商山逆旅中遇桻子餽焉或有問所詣者苐言願遊稚川桻子當導師去契虚即往商山舍逆旅中備甘㫖以俟桻子僅數月遇桻子百餘俱食畢而去一桻子年甚少謂契虚曰吾師安所詣乎契虚曰願遊稚川栙子曰稚川甚近師能偕我去乎於是俱至藍田其夕即登玉山陟危險逾巖巘至一洞二人俱入洞中昏晦不可辨見一門在數十歩外遂望門去既出洞外風日恬煦山水清麗見一髙山道徑危峻契虚眩惑不敢登栙子曰仙都且近何為徬徨即挈手去既至山頂見有城邑官闕栙子指語此稚川也已而至一殿上有具簪笏者慿玉几而坐侍衛環列呵禁甚嚴栙子命契虚謁拜曰此稚川真君也真君召契虚訊曰爾嘗絶三彭之讐乎契虚不能對真君曰慎勿乆留於此桻子引契虛歸因廬於太白山絶粒吸氣貞元中徙居華山下竟不知所在宣室志韋集代宗因晝寢夢一人謂曰西嶽太華山中有黄帝壇即日詔遣監察御史韋君馳驛詣山尋訪至山下店中韋君聞房中𠻳聲問何人遣視之乃有一老父韋君訪老父何姓答曰姓韋韋君邀與同席老父因訪韋父官諱又訪髙祖為誰韋君曰髙祖奉道不仕隋朝入此山中不知所在老父喟然歎曰吾即爾髙祖也吾名集有二子爾即吾小子曽孫也韋君涕泣再拜老父問韋君今何之韋君曰奉勅於此山求黄帝壇不審翁能知此處否老父曰蓮花中峰西南上有一古壇髣髴餘址此當是也但不定耳遂與韋君同宿明日入山至山足隨老父行里許到室見三嫗老父曰此爾祖母及二祖姑也相見甚喜謂曰年代遷變一朝遂見元孫欣慰久之遂與老父上山直至中峰西南隅果有一壇韋君洒掃拜謁立標記而逥却到老父石室辭出遂下山具以事奏代宗歎異遣韋君齎手詔入山求覔遂失舊路訪山下故老皆云不知韋君望山慟哭而返代宗悵恨具以事跡宣付史館異聞録至按逸史載唐徳宗建中初有楚州司馬楊集華隂遇越公弟其事與此相同恐一事而傳聞異詞故不復載許棲巖岐陽人舉進士習業於昊天觀時韋皋鎮蜀巖將為入蜀之計欲市一馬自入西京訪之有蕃人牽一馬瘦削而價不髙因市歸洎登蜀棧棲巖與馬俱墜崖下積葉承之幸無所損尋其崖下見一洞穴行而乗之約十餘里忽及平川花木秀異池沼澄徹有一道士卧于石上二玉女侍之巖問云是太乙真君巖即以行止白君曰爾好道乎曰讀莊老黄庭而已命坐酌小盃以飲之曰此石髓也嵇康不能得爾得之矣居半月思家求還太乙以所乗馬送之謂曰此馬吾洞中龍也子有仙骨故得值之到人間放之渭曲勿復留之既别逡巡已達虢縣問鄉人年代已六十年出洞時二玉女託買虢縣田婆針乃市之繫馬鞍上放之化龍而去棲巖幼在鄉里已見田婆至此惟田婆容狀如舊亦仙人也棲巖大中末年復入太白山去傳奇陳休復者號陳七子貞元中來居褒城多變化之術褒人好事少年常求學其術勤勤不已休復與出郊外坐大樹下語道未竟忽然暴卒須㬰臭敗衆皆驚走莫敢迴視自此不敢干之嘗狂醉市中褒帥李讜怒而繫於獄忽不食而死尋還家復在市中讜特加禮焉為築室於褒城江之南岸遺與甚多略無受者河東栁仲郢相國周墀燕國公髙駢擁旄三川皆深加禮敬書幣相屬蜀相燕公使人致書至褒城延休復使人經旬方達休復當日已至成都又有一休復與使者偕行未嘗相捨燕公詰於使者益奇待之中和三年大駕還京休復亦至闕下田晉公軍容問至京國幾年安寧曰二十果自問後二十日再幸陳倉後於道中寄詩與田晉公曰夜坐空庭月色㣲一樹寒梅發兩枝及駕至梁洋邠帥朱玫立襄王監國寒梅兩枝驗矣自是衛駕詣都多在西縣三泉褒斜以來屯駐嵗餘卒於家葬於江南山下數月好事者掘其墓無復有所見休復在長安駕駐華州休復亦至興徳府矣仙傳拾遺裴航秀才長慶中因下第遊於鄂渚同載有樊夫人乃國色也因賂侍妾裊烟求達詩一章久而無答夫人後使裊烟持詩一章曰一飲瓊漿百感生𤣥霜搗盡見雲英藍橋便是神仙窟何必﨑嶇上玊清航覽之愧佩而已後抵襄漢航飭裝歸輦下經藍橋驛側因渴甚見茅屋有老嫗航揖之求漿嫗咄曰雲英擎一甌漿來俄於葦箔下出雙玉手捧甌航接飲之真玉液也因還甌遽揭箔覩一女子航驚怛植足而不能去因白嫗願娶嫗曰我今老病昨有神仙遺靈丹一刀圭但須玉杵臼搗之百日方可就吞君約娶此女者得玉杵臼吾當與之航謝去至京國訪玉杵臼數月餘遇一貨玉老翁曰近得虢縣藥鋪卞老書云有玉杵臼貨之郎君懇求如此吾當為書道達航媿荷珍重果獲杵臼遂挈而抵藍橋嫗大笑曰更為吾𢷬藥百日方議婚好航𢷬藥日足嫗持而吞之遂挈女入山謂航曰但少留此逡巡車馬僕𨽻迎航而徃别見一大第帳幄屏帷珠翠珍玩莫不臻至航就禮訖引見諸賓多神仙中人也有仙女鬟髻霓衣云是妻姊航拜訖女曰裴郎不憶鄂渚同舟乎航驚謝後問左右曰是小娘子姊雲翹夫人劉綱仙君之妻也嫗遣航將妻入玉峰洞中居之餌以絳雪瓊英之丹體性清虛毛髪紺緑神化自在超為上仙太和中友人盧顥遇於藍橋驛之西因說得道之事傳奇嚴士則建州刺史穆宗朝為尚衣奉御頗好道午日於終南山採藥迷路然林岫深僻風景明麗有茅屋數間出於松竹之下窺籬隙内見有一人於石榻偃卧士則推戸直造其前乃攝衣而起士則具陳資糧已絶迫於枵腹請以飲饌救之隠者自起於梁間脱紙囊啓其中有百餘顆如扁豆之形俾於藥室取鐺拾薪汲水以一粒煮之良乆微有香氣視之已如掌大曰可食矣渴則取鐺中餘水飲之復曰汝得至此當由宿分他時位至方伯兼獲長生之道士則告歸曰去此三二里與採薪者相值可隨之而去此至國門不逺既出果有人採薪路側纔經信宿已及樊川既還輦轂不喜更嘗滋味日覺氣壯神清有驂鸞馭鶴之意盧僕射聞方伯之説因以處士奏官自梓州别駕作牧建溪時年已九十到郡周歲即解印歸羅浮及韋宙相公出鎮江南使人訪之猶在山谷劇談録韋卿材太和中選授江淮縣宰出京日離灞滻行一二十里外覺道路漸異林木葱蒨似非人間頃之有謁於馬前者如州縣候吏問韋自何至此俄頃復有一人至謂前謁者曰既至矣則須速報上公却走而去逡巡遽聲連呼曰上公出韋下馬趨入門侍衛嚴肅擬於王侯見一人年可四十歲平上幘衣素服命坐慰勞乆之謂韋曰某因世亂百家相糺竄避於此衆推為長强謂之上公爾來數百年亦無號令約束但任自然而已公不可乆留命取絹十疋贈之韋出門上馬却尋舊路迴望亦無所見至明則已有官路逆旅暫歇詢之於人無能知者取絹視之光白可鑑韋遂褁却入京詣親友具述其事因以絹分遺親愛約其處在驪山藍田之間蓋地仙也尚書故實金可記新羅人賓貢進士性沉靜好道俄於終南山子午谷葺居手植奇花異果極多常焚香靜坐誦道徳及諸仙經不輟後三年思歸本國航海去復來却入終南大中時昇天而去續仙傳吕嵒初名紹先蒲州人一云闗右人屢舉進士不第後於長安道中遇真陽語紹先曰予所居終南山有洞可從行頃刻到一峰真陽飲紹先以元和之酒坐石談𤣥曰子從予奉道當名嵒字洞賓遂將洞中書朝夕觀覽真陽授以上真𤣥訣道成仙去今洞在樓觀説經臺左盩厔縣志杜光庭字賓至杜陵人舉制科不中入天台為道士僖宗召見賜紫衣出入禁中上表乞遊成都隠青城山白雲溪卒於蜀年八十五顔貌如生世以為尸解有文千巻宋居白幸蜀記王老坊州宜君縣人居於村墅頗好道一旦有藍縷道士造其門王老延禮之居月餘日相歡洽俄患遍身惡瘡王老㸔療逾年道士謂王老曰此瘡但得數斛酒浸之自愈王老為精潔釀酒及熟道士以大甕盛酒入甕三日方出鬚髪俱黒肌若凝脂王老合家視之驚異道士曰此酒可飲王老飲之初甕酒五斛餘及窺存三二升清美異常其時方撻麥王老與妻子并持麥人共飲皆大醉於是祥風忽起緑雲如蒸屋舍草樹全家人物雞犬一時飛去空中猶聞撻麥聲數村人共觀望驚歎風定其傭力持麥人乃遺在别村樹下後亦不食皆得長生宜君縣西三十里有昇仙村在焉續仙傳杜昇字可雲杜陵人莫測其年夀顔甚悦澤常遊城市間好於水碗及盆中以沙書龍字浮而左右轉或叱之則飛起髙丈餘隠隠若雲霧作龍形呼之復下水中冬則卧雪中三兩日人以為斃矣撥之徐起抖擻而行若醉醒也杜孺休為蘇州牧聞可雲在城市延入郡齋咨以道術可雲曰但以政化及人慈愛為意况今多事宜逺兵傷道術詎可問也後軍亂孺休果為兵傷而斃可雲亦被殺頃之但有舊布衫一領斫破在地後數日人見入江西市中醉吟沙書如故續仙傳田鸞家居長安聞道者有長生術入華山見黄冠禮謁祈問隠訣黄冠指柏樹示之曰此即長生藥也鸞取柏葉曝乾為末服至六七日未有他益但覺煩熱至二年餘病熱頭目如裂舉身生瘡鸞意終不捨七八年後熱病益甚諸瘡潰爛黄水遍身如膠忽自云體今小可須一沐浴遂命置一斛温水於室中數人舁卧斛中遂於斛中寢三日方寤呼人起之身上諸瘡皆已掃去光彩鮮明自云初寢夢黄冠數人持旌節導引謁上清遍禮古來列仙皆謂曰柏葉仙人來此遂授以仙術自此絶穀隠於嵩陽年一百二十三歲無疾而終異香滿室化源記杜子華信州李員外虞嘗與秀才楊稜遊華山窮搜巖谷時李公及楊君俱有棲遁之志每遇幽賞吟咏移時俄至一小洞欲窮其跡少窮至洞口川巖草樹不似人間亦有耕者更二里餘有佛堂李公等因往求宿逡巡見有紫衣乗小馬從者四五呵路而至曰得到此何也此處偏陋請至某居處遂同往到一府署因自言曰某姓杜名子華遇仙侣居此已數百年矣因止宿飲饌皆甚精豐留連累日遣使者導之而返逸史賣藥翁不知其姓名常提一大葫蘆賣藥人告疾皆與之稱效後於長安賣藥抖擻葫蘆已空内只有一丸出極大有光明安掌中謂人曰百年人間賣藥過却億兆人無一肯把錢買藥吃今須自吃却藥纔入口足下五色雲生風起飄飄飛騰而去續仙傳竇真人字子明少出家學道於漢中斗山後昇仙去山巔有奉真觀漢中志何尚翁略陽人修真於仙人關道成飛昇闗以此名漢中志譚峭字景升幼而聰明及長好黄老諸子及周穆漢武茅君列仙傳靡不精究一旦告父出遊終南山父以南山近京都許之自終南太白太華迤邐遊歴不復歸寧父母以其堅心學道乃聴其所從後丹成服之入青城而去續仙傳五代劉哲字元英號海蟾子事燕王劉守光為相喜黄老一日有道人自稱真陽子來謁海蟾待以賓禮道人為演清静無為之宗金液還丹之要竟索雞卵十枚金錢十文一文置几上累十卵於金錢若浮圖狀海蟾驚曰危哉道人曰居榮禄履憂患其危殆甚盡以其錢劈破擲之辭去海蟾大悟遁跡終南山下丹成尸解有白氣自頂門出化鶴沖天賈志宋丁少微亳州真源人為道士隠華山潼谷密邇陳搏所居與搏齊名志尚清潔善服氣多餌藥年百餘歲康强無恙太平興國三年召赴闕以金丹巨勝南芝𤣥芝為獻留數月遣還山七年冬卒宋史方技傳張夢乾孟店鎮人老而好道有離俗之志遇劉海蟾授以仙術一日辭村人曰遲十日中午吾將飛去衆以為狂及期登槐杪吐沬斗餘貓犬䑛之相隨翀舉有涇陽商人即於是日午見夢乾於雲南涇陽縣志抱一鳳州人嘗遇一老人篋中取物餌之狀如蘆菔又與之小瓢中有葉如緑豆戒曰遇有疾者施之自是絶粒真宗召見賜名抱一漢中志于元隠莫知所從來遇駝頭道者授大洞經十一章後有老人導之與遊雞足山山裂得洞洞昏黒不可入忽日光穿隙見石匣一探匣得書乃玉注大洞三十九章經老人口授祕訣又十餘年來鳳翔稍與世接逺近奔凑郡守召與語異之延於家元隠求一室置大斛貯水扄戸睡三月守日遣人伺之又三月忽坐水斛中臨卭呉伸道以職事如秦遇於途欵語移時至秦以語守守駭曰安有是就視則尚寐也大觀元年詔赴闕既而屢辭還山即清平軍上清太平宫構别位以居補道蔵真玉注自為迴風混合百神圖居常以大洞真經五行六字氣轉相傳授傴躄者起行羸瘵者充盛四方言大洞者皆以元隠為師又築觀於耀州三原之脩真鄉詔名崇真觀未去前五日歸舊庵易衣側卧拳手結印而後逝宋任諒于真庵碑記羅道人不知何許人嘗遊洛交遇異人得祕訣預知休咎劉延慶重之靖康二年忽大哭於市别鄰里及汴梁陷二帝北行乃哭之日也馮志白雲片鶴金明人為道士自稱為白雲片鶴宣和初遊汴見趙鼎遂大呼曰中興名相人驚異之他日又遇鼎曰吉陽相逢後鼎至紹興五年果為相有重名晚竄於吉陽忽與白雲相見白雲曰尚憶昔之言乎公將歸矣未幾鼎卒馮志姬洞明號抱真子居華山文仙谷紹興丙子中秋前一日謂門人劉裕之曰張翁驪姥待吾乆矣言訖怡然化去賈志石泰常州人號杏林又號翠元子遇張紫陽得金丹之道初紫陽得道於劉海蟾海蟾曰異日有為汝脱韁解鎖者以道授之後紫陽以所傳非人三遭禍患乃作悟真篇行於世復罹鳳州太守怒誣以事坐黥竄經邠境酒肆中遇杏林告以故杏林曰邠守泰故人也為之先容獲免紫陽感之盡以道法傳於杏林道成亦作還元篇行於世夀一百三十七紹興二十八年中秋日尸解後二年有人復見杏林於羅浮山列仙全傳泰以醫藥濟人不受謝令植杏一株乆遂成林人因號石杏林云扶風志薛道光一名式一名道原陜府雞足山人字太源嘗為僧法號紫賢一號毘陵禪師雲遊長安雅意金丹導養宋徽宗崇寧五年丙戌冬寓郿遇石杏林傳授口訣真要乃註解悟真篇作復命篇及丹髓歌行世夀一百十四嵗尸解作頌云鐵馬奔入海泥蛇飛上天蓬萊三島路兀不在西邊明年沙道昭復見紫賢於霍童山賈志郭尚竈一名郭馬兒興安人賣酒翠花臺下有道人吕姓常飲尚竈肆中尚竈不取其値如此數年道人授藥一丸投龍窩水中即成酒道人去後數年復來攜尚竈往香溪煉丹浴於銷金池中從翠光臺飛去興安州志王嚞號重陽子咸陽人妊二十四月而生體貌雄偉美鬚髯倜儻尚義不拘小節嘗醉於甘河㑹二人披髮被毡其年貌同一師訝之從而懇請其人授修真口訣再遇於醴泉師趨拜之邀師飲問其鄉閭年姓答曰濮州人年二十一不告其姓留祕語五篇令嚞讀畢焚之且曰速去東海投譚捉馬俄失所在乃捐妻子行匄鄠杜終南間舉止若狂後别構庵於南時村一夕自焚其庵鄉里驚救方躍舞而歌攜鐵鑵乞食出闗抵寧海郡人馬宜甫執弟子禮師名之曰鈺㑹譚玉者以宿疾來見因請為弟子未幾領馬鈺登崐崘山言曰是中有烟霞洞我先世脩道之所命鑿之其器具之朽者與玉井池尚在時棲霞丘公投謁師賜名處機又劉公者來謁師一見輙契名以處元師至南京與衆别云今可赴師真之期矣奄然而逝馬鈺嗣其教與譚劉丘相繼為宗盟而全真學者稱鍾吕劉為三祖又以師為祖師元至元六年賜重陽全真開元真君左編李靈陽京兆人博學好仙遇至人授以抱一符火大丹之訣與玉蟾重陽為友列仙全傳金趙抱淵道號還元子俗呼曰摩歌延安雞川人自幼不凡志在方外嘗遇有道之士傳祕訣後詣劉真人素不讀書一日夢真君賜以道徳二篇先生吞之入腹自此天性明朗詩詞歌咏若湧泉之流注遂來終南㕘重陽祖師至晚年還鄉於迎祥觀住坐泰和五年作如夢令詞末句云相别相别來嵗暮春時節次年上遣使者召先生赴闕先生沐浴正衣冠而逝是夜正春分之際金史本傳然逸期字守約涇陽人至驪山遇了真子黙有所契後遊商顔卜築三陽草庵居十餘年西遊太白延祥觀士庶持紙幅求翰墨甚多或者辭色頗倨即書二詩付之持歸披讀了無一字翌日詣師白其事師曰再讀當有所見展視墨跡儼然驚悔拜謝節度使曳刺金紫在鄧病篤夢異人飲以法水寤而即愈聞師歴商過鄧使數人邀於路至則駭曰乃夢中所遇之異人也居浙川石門下語之曰比歲吾將行矣其年冬命道侣次第坐髙歌起舞時及四鼓端坐而蜕金史本傳元丘處機號長春子登州棲霞人金大定丁亥謁重陽王真君嚞於寧海請為弟子戊申召見闕下隨還終南山金主召不起宋使來召亦不起太祖遣近侍劉仲禄持手詔致聘至行在所命掌天下道教至燕居太極宫輟耕録大定丁亥重陽自陜右來真人師之重陽既逝真人乃逰秦隴戢志磻溪戊申金世宗徵赴闕特㫖住全真堂雲山集長春子穴居磻溪日乞一食行則一簑人謂之簑衣先生陳時可長春本行碑按處機與譚處端劉處元王處一郝大通馬鈺鈺妻孫不二七子皆齊人重陽行化至齊同時入道元史釋老志載之甚詳並未言其入陜列仙傳載重陽化後諸子廬墓終南亦未見顯化實蹟茲從碑文内摘録長春一傳賈志各傳俱刪又同州志載今西庵里有處端親書龜蛇二字筆力道勁大定二十年事也列仙傳云今髙唐州有處端手跡大書龜蛇二字未知孰是並識於此白道元峪口人貌古質厚肩背嶐然人呼為井轂轤嘗遇馬丹陽於途次與語若合宿契遂傳真訣蹈水如履平地日行千里足下無跡嘗歌曰横順四條椽在世八十年若要跟尋我直至白骨邊後八十無疾而卒既而舉葬棺空無尸旬日人見在白骨寺邊往來方驗歌言涇陽縣志董守志元太祖時人字寛甫號凝陽居汧隴慕神仙感遇真陽純陽海蟾屢加㸃化晚築庵於隴山低村一日祥雲覆地疾雷震天謂其徒曰仙師邀㑹蓬萊矣遂逝隴州志劉仙不知何許人脩煉於横山石穴中白日飛昇後人因名其穴為古仙洞韓城志石按賈志富平石壘山巔曰陽洞洞前有石砌山田數畝相傳劉仙種蔬處其何代何名俱未詳附誌於此白守一本太山寨窊溝人自幼禮還元趙真人為師號碧然子至元四年五月金明不雨碧然子至即雨當道奏聞勅賜潤澤真人後入華峰隠迹一日呼門童囑之曰吾當去矣遂沐浴整衣冠而逝延安府志吉志通郃陽人幼穎悟師喬道及潘清客博學多聞後居武當山十年不火食但餌黄精蒼术精神清徹行歩如飛一日召弟子戒以珍重修道言訖曲肱而逝時中統甲子嵗也續文獻通考李妙成岐山人古澹清淨每懐方外之志元時築靜明菴藏脩汧陽服氣煉神年踰大耋童顔不衰晨昏有鶴周旋其室人皆異焉莫知所終後人名其結庵處為寤仙莊岐山志呉翠巖受道於㳺搏霄得全真術又得王玉陽祕訣遍訪名山至横山以為勝地居石室中不畏寒暑嘗聞朱子敬齋箴知脩道真訣聞孟子存心養性事天知䖍事上帝無過於此其徒郝净元刻碣山中韓城志明坐雪道人不言姓名朝邑程濟微時墅外有小祠値大雪深無人跡濟入取火先有道士峩然危坐因饋之食將去授書一巻曰子忠臣也習此可免禍其書皆符咒祕籙濟習之遂成異術周旋於靖難之禍朝邑志張君實人目為邋遢張在金時脩煉寶雞縣之金臺觀洪武初復來寶雞與西闗道士李白雲交契有童子張朝用者君實問知其先世謂曰吾識爾髙祖始生時童子善自愛越月北行朝用與白雲送之其後時往來長安土洞名山蔵方外記張剌達相傳宋時為華州掾嘗從州守入華山謁陳搏叙坐訖復設榻於左似有所伺已而一道人至出棗三枚以青者投守守持以與掾掾啖之自後得道國初時往遊人間每顯異蹟徐楨卿異林永樂時長安西郭土室中有道人神情朗異鬚張如㦸身垢不堪自曰姓張西郭人因號為邋遢張喜與郭民劉寡蕩逰嘗以身垢為丸治人疾病後他適給事中胡濙奉命訪張三丰遇寡蕩言狀以為即三丰也長安縣志永樂間三丰遇生員張恪於周公廟朝陽洞敝衣垢面恪不為禮時大雪方炊飯三丰須㬰自外持菜至如新擷於圃云自成都取來恪出視雪中無迹知為仙將别去乃告恪曰吾元元子張三丰也問所欲曰苦無記性乃吹耳連囑曰吾令汝聰明自是讀書過目輙不忘後舉永樂甲午解元岐山縣志元青富平人住持五龍宫洪武初以薦授監察御史力辭轉太常卿使從郊祀上宿齋宫諮以雨暘之事奏對有驗名山蔵中按元青仙跡未著然拜官不受視嘉靖陶仲文邵元節諸方士有薫蕕之别嗣法三丰不虚也孫碧雲馮翊人入華州半截山受張三丰之教華州志碧雲結茆書堂山成祖召見賜袍笏敕聽歸山臨别賜贊及詩又命訪張三丰賜敕四道其徒為建萬夀宫貯諸法物賈志余喜巖延安人性質古朴住太清宫年踰八十永樂五年三月二十六日更衣焚香盤趺而坐曰來由此門去由此路一脚不失囬頭即悟鼻垂雙柱而逝旬日顔色不改四川總志孫演書字洞鳴甘泉人雅意林壑遊華山得希夷先生先天之學豫知休咎修真太和山施藥醫人童顔鶴髪後趺坐羽化甘泉志劉宗道三原人為元通觀道士能役使鬼神祈禱雨澤又能以數知人生死名曰癸亥數後慶王大集陜西僧道修追薦事衆既集宗道徐至是日天甚晴霽衆皆樹旛揭榜具金袈裟法衣作樂迎經於道宗道但設雨具端坐而已須㬰大雨驟至衆旛榜俱盡金衣俱濕俄晴霽宗道始行事其日惟宗道一壇在焉慶王以為神以金冠餽之葬時有二鶴翔柩上若送葬然賈志陳玉字無壊成化間朝邑栁村人事親至孝親歿負土築墳廬墓三年有仙術能分身知未來事頗以藥施人冬時掖布往市有餓莩者黙念得陳師遺布而我拾之可活矣須㬰遂遺其布夜有穿窬盜即先知置物所穿之處嘗推車至旅舍主人晨興適田至午方憶有宿客急歸啓戸扄鑰如故人車不知從何而出村東西社各構樂樓同時上梁皆請陳師至各自矜能得陳師後知其皆至也衆盡驚平陽梁侍御私訪其家答以偈曰我本華山希夷子一轉南菴去楚州後入華山今饒益寺塔中其蜕骨也朝邑志從鉉安陸人正統八年母夢湘子入室而生骨相奇偉篤好黄老之術辭父遊太和山復遊嵩華遇異人授大還丹雲跡靡定萬厯中郡守阮屏麓遊太華失路遇鉉指引見道貌軒舉問其姓氏年里已百六十歲矣後入華山絶巘不知所終湖廣通志尹蓬頭名從龍華州人囊有宋理宗時度牒𢎞正間來金陵寓邸中輙閉闗卧多者逾月少亦五六日後起能分身嘗鍵戸寢有終南黄道人來留青鞋去後數日尹起問弟子曰有黄師來何言弟子獻所贈尹曰是知我當逺行也無何當事懼其詭異遣卒押歸華州過鐵鶴觀騎一鶴飛去江南通志董仙不知其名往來城市言事多徵驗夕宿咸寧金花落土洞中冬夏不著衣惟褁牛皮人呼為牛皮董每詢其自不答自作詞云摧殘形體不穿衣只是裹牛皮跣足傲寒饑便悟徹重元上機十年吃飯十年還盡一志更無移行滿跨雲歸並不管人間是非後僵死洞中身首俱另鄉人瘞之嗣後又見在王渠濛溪庵裹牛皮如故正徳間遍辭鄉人不知所之賈志劉偉朝邑人成化中舉人任文水知縣文水多豪彊號難治偉獨以誠心直道為理乆之衆庶傾心向化擢御史持法平允出知兖州卒賈志偉生好神仙比疾病命其子曰即死毋埋我及卒鄉人有自逺方還者多出道中見之寄問其家因不敢葬其甥韓邦奇為山西僉事方視事偉從中道緩步而前曰汝弟邦靖可速令歸僚友相視駭愕令人跡之至一逺寺中止明日求之竟不見邦靖不久養病歸卒劉氏聞之發棺視惟一屨在焉楊儀髙坡異纂逍遙子嘉靖二十年間自東來榆林科頭赤脚隆冬不寒即大雪端坐於地竟夕不移汗猶津津出人餽之食則食雖不餽累日亦無所需人叩之惟頷之不語居榆三月而去日午出城未刻有人在二百里外遇之後竟莫知所終延綏志鞋幇子住咸寧鳳棲原金滹沱村時村民陳氏館之甚勤日飲酒醉卧街衢人觸之即大詈日與兒童嬉戲為樂以舊鞋幇百衲為衣冬夏服之有與新衣輙給貧乏人問其姓名自云鞋幇子萬厯時一日往城乞黄紙錢百餘自糊於身遍體咸具是夜卒鄉人醵錢為棺瘞焉後陳氏貿易於蜀復遇之談笑詈罵如故囬鄉語人發棺視之惟餘鞋幇衲衣紙錢而已賈志蓬谷道人由來無考萬厯年衣羽衣持杖雲遊遇大河足不履地飛身而過至中部黄帝廟和三丰詩有萬壑烟雲連帝塜九天春色映龍城之句延安府志一炁字幼朔號海侗子不知何許人貌甚古數更姓名人不能測萬厯四十六年春副使陳性學許汝魁鎮將杜文煥敦請邀致授以服氣煉神存真知命之道云能脩此則可徵隆砂八百之數每於指光中見未來事後一旦飄然去延綏志幼朔姓彭氏多往來呉楚間後不知所終胡載道河南人萬厯丁丑進士厯官四川監軍道好丹砂寓於石泉數年丹成尸解去石泉志玉風不知何許人萬厯乙巳雲遊至葭州南五里白雲山童顔鶴髪隠居避靜施藥濟人神木大㕘陳性學聘之談及符録祕訣無不輙應獨居一室七日不火隆冬袖出青麥歲旱有禱即應後韓城尚書薛貞奏上勅賜道經一藏封為玉風真人後不知所之延安府志劉常泰咸寧人出家丹陽宫後棲大興山蓬頭赤脚採草木食嘗於萬仞壁間畫真武像人皆異之有一鹿嘗隨坐卧人犯劉者抵觸之問以世情一咄而已山中作鐵橋畢曰可謝世矣歸故宫坐化咸寧志玉華子姓俞名道精於易理或日數食或數日不食於羅谷深處廣植花木建藏易洞日夕卧其中一日謂其徒曰我將去矣具浴盥潄畢整衣端坐而逝長武志王輔榆林人應襲千戸讓與其弟經脩煉形氣嘗遊武當山深谷中習静年八十餘步履若飛弟經往迎之歸榆林年餘謂經云我於某日還山乃遍辭親知至日端坐而化有自米脂來者遇輔道上延綏志三無道人姓曹氏咸寧縣人少從軍冀州見殺死人更衣不僵惻然遂棄家從清虚子遊授以道術居終南太乙宫崇禎十一年遇賊被磔死後人自蜀道囘見在武侯廟賣藥咸寧志張雨號清虚子貌清古寡言笑絶烟火食常攜一瓢居華之東峰石洞中崇禎癸未十月初六李闖入闗之夕趺坐而逝自書其瓢曰我姓張名雨慶陽人年六十四數字而已迨甲申春正月十五猶端坐如生賈志秦毛女在華隂山中獵師世世見之形體生毛自言秦始皇宫人秦亡入山避難遇道士谷春教食松葉遂不饑寒身輕如飛所止巖中有鼓琴聲云列仙傳眉之彭山進士有宋籌者與故㕘知政事孫抃同赴舉至華隂大雪天未明過華山下有牌堠云毛女峰者見一老姥坐堠下鬢如雪而無寒色時道上無一行者不知其所從來雪中亦無足跡孫與宋相去數百步宋先過之亦怪其異而莫之顧孫獨留連與語有數百錢掛鞍盡以予之既追及宋道其事宋悔復往求之已無所見是嵗孫第三人及第而宋老死無成東坡志林蔡元長自長安易鎮西川道華山舊聞毛女之異思得一見向曉從者見嶽廟燒紙錢爐中有物甚異以告元長亟往視之乃一婦人也遍身皆毛色如紺碧而髪若漆目光射人顧元長曰萬不為有餘一不為不足言訖而去其疾如飛王明清投轄録漢西河神女神仙伯山甫外甥也山甫見其多病與之藥女時年已七十稍稍還少色如嬰兒漢遣使行經西河於城東見一女子笞一老翁頭白如雪跪而受杖使者怪而問之女子答曰此妾兒也妾舅伯山甫得神仙之道隱居華山中愍妾多病以神藥授妾漸復少壯此兒妾令服藥不肯致此衰老妾恚之故杖耳女仙傳南陽公主漢元帝女下嬪王咸綏和間王莽秉政謂咸曰國危世亂但當退而脩身咸不能從公主遂結廬華山歲餘精思丹道乗雲氣冉冉而去咸追之漠然無跡忽於嶺上見遺朱履一隻取之已化為石後人名其峰曰公主峰述異記唐索姑扶風人性至孝清正恬淡不喜塵俗事嘗懐超世之志久之其父貿易隴西姑請為買白馬及父歸次日五鼔姑乗馬馳去遺線於路至盩厔青山趺坐而化家人隨線迹之得其處居人神之為立廟焉扶風志宋陜西子仙姑傳云得道術能不食年約三十許不知其實年也陜西提刑陽翟李熙民逸老正直剛毅人也聞人所傳甚異乃往清平軍自驗之既見道貌髙古不覺心服因曰欲獻茶一盃可乎姑曰不食茶久矣今勉强一啜既食少頃垂兩手出玉雪如也須㬰所食之茶從十指甲出凝於地色猶不變逸老令就地刮取且使嘗之香味如故大奇之嬾真子華山有郭仙姑年二百六七十歲曽事陳希夷又常隨吕公遊於世癸辛雜識明華山玉女峰女冠楊氏名妓也少年入山食松皮或枵腹坐即大雪七日不粒亦無恙竟日夜尸坐如寐其玉女殿右韓姑遺蜕殁幾三十年雖槁不腐以杖擿其足亦不僵蓋楊氏師也王履宿玉女峰記張仙姑中部河西人居常知未來事人莫識其所從一夕聞空中有人呼曰張仙姑張仙姑笑曰此必吕公嵒也開戸視之遂飛身昇天延安府志仙姑萬厯時洵陽縣北露金坪民間女臨嫁時天將曉驅雞飛過洵河南至碥下洞中坐化人聞雞鳴尋見之遂名為仙姑碥洵陽志本朝林道士萬厯時人隠山陽之下髙山石龕知未來事能興雲雨時訓人忠孝亷節不好人學已來學者輙拒之順治二年山中人共見其入三鳳山古洞方入石門即闔後歲旱禱洞外許入乃入洞取水即雨有取水者未得請直入始苦黒頃之朗如霽日别一天也見二人偉然儒服對奕顧曰汝來求雨外間已得雨矣盍行乎其人叩謝出果大雨如注韓可精朝邑人明末避冦棄家去晚歸動止有異常栖息沙中後居長安昌村村中水苦不可食為指地鑿井獲甘泉天旱禱立應村人遞主之鄰有徵逋甚急可精使從往河東視其弟子至則其人甫宦歸將行奉多金為夀止取一餅金付從者遂行弟子目留從者以金盡與之至途忽相失獨行遇盜所得金盡被刼惟先餅金在抵家適償所逋人以是益怪之當事禮請謝不往士大夫從商略文史欣然往復叩以二氏學終不置一語冬月有販夫露宿可精憐之使卧榻旁無火具而汗不止嘗辟穀數月面色益瑩潤年八十餘趺坐而化後有人見於新豐道上云人瑞按詩咏介眉禮稱就見所以引年重齒彰太平之瑞也但歴世寢逺載籍多湮漢唐以來史缺有間矣今搜羅舊志叙次自宋為始焉宋房寅韓城人為人容貌古朴善咒禁之術年一百一十歲解去韓城志李茂蒲城翔鸞鄉人先世籍隴右後由鎬徙蒲八傳而為翁喜遨遊太華太白間掃一室揮麈而談茶鐺酒罏有名士大夫風夀百有七歲蒲城志明趙光裕三原人由掾吏為留守衛經歴原邑有温家河無渡行人苦之裕開路建橋往來稱便里人呼為趙公渡夀百歲三原志辛朝涵渭南人夀百嵗渭南志閻禮同州七里村人𢎞治中夀一百九十歲齒髪步履俱不衰同州志貟澤同州通川里人夀百有一歲同州志張守志同州雁羌里人夀百三歲視聽食息如少年同州志李準朝邑人夀百十二嵗同州志呉良朝邑人夀百有十歲同州志尚苖朝邑人夀百歲同州志趙謹朝邑人國子生歴利津邱縣主簿五十致仕百嵗乃卒苑落集陳仲載韓城人為人孝友敦義讓喜施捨夀一百有二孫環正直好義夀一百三歲屢舉鄉飲賓韓城志樊整永夀人兄遺幼子一嵗整撫育成立以已産付之夀至百嵗有五鄉人稱為百歲翁賈志董遇和神木人夀百歲給冠帶為夀官神木志雷氏渭南人萬厯丙辰進士劉芳祖母也芳官行人奉使出都值氏百歲夀抵家稱慶衣冠大集一時以為盛事渭南志魏氏郃陽任朝選妻少寡守節年八十八歲始旌後年百三歲乃卒子守成隆慶二年以孝行選貢授壺關訓導未幾棄官歸養時母年八十餘矣郃陽志解氏賈世成妻韓城人生平樂行善事夀一百五嵗邑令左𢡟第匾其廬曰人瑞石鳳臺又匾曰百有四歲韓城志薛氏王應車妻韓城人年二十二夫亡守節夀一百有二韓城志劉氏中部人適三原趙瀛蚤歲苦節稱未亡人八十四年夀百十二歲後子以進士歴官戸部郎至山東㕘政中部志本朝咸陽老人張姓一云本姓名李興河南鄧州人明季遭冦亂入闗初居咸陽馬跑泉敗窰中與人傭不計值康熙初就蘇家莊古寺下編茅以居老人駘背兒齒出入嬉遊歴數十載有少容生於明萬厯二十年至康熙四十七年春計百又十七歲矣上聞之召見賜御書長年人瑞四字遣歸巡撫鄂海率僚屬搆亭奉御書以榮之宋君厚盩厔人雍正二年夀一百歲旌表毛奇盩厔人勇敢絶倫明末流冦翻山鷂等盤踞刼掠縣令糾鄉勇禦之奇先登陷陣殺賊無算國初總督孟喬芳募勇士入川勦冦授守備隨大兵入川累立戰功陞重慶府都司未兩月箭瘡大作乞歸享年百歲井天培朝邑南留社人年一百二十歲解執中韓城人好施樂善人稱解佛夀百歲無病而逝馮養虎蒲城人雍正二年夀一百四歲旌表常羙蒲城人雍正二年一百二嵗旌表武振華蒲城人雍正二年旌表時年一百六嵗何恕邠州安化里人有隠徳喜種藝足跡不履城市子孫百餘皆以勤儉世其業順治庚寅年百嵗强健如六旬以上者屈運通葭州庠生康熙四十二年奉勅建百歲坊王氏長安人吕君昇妻雍正二年夀一百二歲旌表梁氏咸寧民張蕭菴妻年二十夫亡撫孤守節矢志不移夀一百二十有一其生卒皆壬申歲也吕氏三原生員侯于桂妻少嫻女則夫亡教子成武進士授臨清都司封恭人康熙甲子孫憺復舉武鄉試第一氏夀至百歲無疾而逝任氏盩厔生員何器妻年二十五歲夫殁撫孤成立孫年中崇禎癸酉舉人氏生於明嘉靖丁未殁於國朝順治六年夀一百三歲守節七十八載建坊旌表梅氏盩厔人馬復學妻雍正五年夀一百五嵗旌表丘氏醴泉人劉芳節妻夫亡守節康熙五十三年夀一百二歲奉㫖建貞夀坊李氏醴泉民王家相妻年三十八而寡撫孤三貴三仁俱克成立雍正十一年氏百有七歲奉勅建貞夀坊特賜銀幣旌表劉氏鳳翔人程希舜母年百餘嵗希舜幼而孤事母至孝賀賊亂希舜負母攜孫而走倐遇賊泣請曰寧殺我與我孫勿傷我母我母守節婦也賊並釋之食貧養親承歡無間母年百餘希舜亦年七十餘矣李氏洵陽人黎金妻雍正二年撫臣以一百一嵗請旌張氏朝邑生員麻出表妻少嫻内則治家諸事修潔夀百嵗談故明萬厯以來事悉有條理子孫繁衍皆能稟母教云薛氏韓城陳守分妻初字守分值守分商於外十年不歸傳已死父母欲嫁之不從至年二十六守分歸始完娶閨門雍穆子孫繩繩夀一百有四邑令魏步南表其門曰百有餘嵗李氏華州人亳州知州劉澤溥母澤溥順治壬辰進士治亳有恵政李氏夀百歲亳人間闗稱祝時去亳已二十年矣馬氏武功生員康傚俶妻年二十七而寡撫二子既長咸授室生孫二子旋殀次媳奉姑守節亦殀家故貧因子婦婚喪益致懸磬氏飲泣撫諸孫衣食不充艱苦逾昔後孫曽繩繩以服賈起家氏年至百齡猶健飯捷步操作如少壯時陜西通志巻六十五
