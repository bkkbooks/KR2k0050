body:
  text: 陜西通志巻四十四物産二草屬獸屬木屬鱗屬禽屬介屬蓍蓍生滿百莖者其下必有神龜守之其上常有青雲覆之史記龜筴傳周文王陵在畢原上陵生蓍草衍易者恒取諸此咸陽縣志芝有芝生甘泉殿九莖青色緑葉朱實夜有光乃作芝房之歌三輔黄圖白芝生華山名醫别録蟾井在白鹿觀中在臨潼驪山有一金色蝦蟇三足賀蘭先生見之曰此肉芝也烹而食之白日飛昇拾遺記四皓避秦入藍田山採芝而歌曰燁燁紫芝可以療飢纂要道經云斗山在城固縣有五穴穴有肉芝即千嵗蝦蟇得而食之可延夀雍勝畧寶鼎山在褒城縣産芝草明一統志明世宗詔采芝鄠縣民聚芝百八十本為山以獻内有徑一尺八寸者數本號曰仙應萬年芝山湧幢小品白芝一名玉芝雍勝畧四皓茹紫芝形似芝而味苦性質堅重食之耐飢商州志杜若杜衡杜若出漢中大者大善范子若杜若上林賦注出漢中事文類聚靡蕪被以江離糅以靡蕪上林賦靡蕪一名江蘺芎藭苖也生雍州川澤名醫别録上林言江蘺蘼蕪似非一物葢嫩苗未結根時則為蘼蕪既結根後乃為芎藭大葉似芹者為江蘺細葉似蛇床者為蘼蕪本草綱目出雍州葉似蛇床而香馬志薫草浮山有草焉名曰薰草麻葉而方莖赤花而黒實臭如蘼蕪佩之可以已癘西山經掩以緑蕙上林賦張揖曰蕙薫草也上林賦註一名蕙草名醫别録一名香草一名燕草本草綱目鄜州出如茅而香馬志䔾車揭車衡蘭上林賦郭璞曰䔾車一名䒗輿香草也上林賦註留荑雜以留荑上林賦張揖曰留荑新荑也善曰王逸楚詞註曰留荑香草上林賦註流按留荑史記作夷蘭蘭香草也薛綜西京賦註漢時池苑種蘭以降神西京雜記霍定與友生遊曲江以千金募人竊貴侯亭榭蘭花挿帽兼自持往羅綺叢中賣之士女争抛擲金錢曲江春宴録一莖數花出南山咸寧縣志絶𩔖建本而精神丰采過之洋縣志入夏始放一莖十數花清芬撲鼻沔縣志棣花山出商州志蘭幾遍山谷俗以多殊不貴之雒南縣志一莖一花幽秀芳香商南縣志不似建蘭而香無異城東有之山陽縣志真珠蘭一名魚子蘭花開成穗蓓蕾如珠其香甚濃廣羣芳譜南鄭有魚子蘭南鄭縣志芍藥出三輔范子一名將離董子勝州榆林郡土貢芍藥唐書地理志白者名金芍藥赤者名木芍藥世謂花相本草綱目今三原亦有之馬志根資藥物咸寧縣志赤白二種咸寧縣志金盞花花之四季開者蘭桂之外有長春菊學圃雜疏花大如指頭金黄色狀如盞子四時不絶救荒本草金琖一名長春延綏鎮志翦春羅二月生苗髙尺餘夏開花六出周廻如翦成可愛本草綱目一名翦紅羅入夏開深紅花如錢大廣羣芳譜翦紅羅山中多山陽縣志石竹石竹二種單瓣者名石竹千瓣者名洛陽花延綏鎮志石竹花山中多山陽縣志瞿麥即石竹子府谷縣志罌粟花出膚施縣馬志米囊即罌粟花有千瓣五色其粟可作腐又有一種小者名懶擡頭又名滿園春千葉者佳延綏鎮志麗春即罌粟山陽縣志俗名萵苣蓮又名米囊葭州志虞美人褒斜山谷中有虞美人草狀如雞冠大葉相對歌唱虞美人曲則兩葉如人拊掌之狀頗中節賈氏談録萱花萱名忘憂說文一名宜男花葉可食咸寧縣志萱花土人取作菜名黃花雒南縣志鹿葱即萱草山中多有之山陽縣志蜀葵戎葵今蜀葵西京賦註惟兹珍草懷芬吐榮挺河渭之膏壤吸昴井之元精陳虞繁蜀葵賦葉似葵葉而大有岐花似木槿而大有千葉單葉之異本草綱目黄紅白紫色𩔖不同莖葉亦異皆向日咸陽縣志俗名一丈紅扶風志一名戎葵延綏鎮志有十餘種色千葉者甚佳山陽縣志俗呼為大葉花淳化縣志錦葵叢低葉微厚花如小錢文彩可觀色深紅淺紅淡紫皆單葉廣羣芳譜種多嫩葉可茹商州志莵葵似葵而小葉狀如藜嘉祐本草劉禹錫復逰𤣥都觀惟莵葵燕麥動揺春風耳纂要山丹百合紅者為山丹食療本草隴州産寰宇記葉似栁葉四月開紅花六瓣不四垂結小子本草綱目色赤蘃若胭脂五月間山陬水湄最蕃艷安塞縣志巻丹莖葉同山丹而稍長大花六瓣四垂本草綱目髙如萱花花大如椀瓣俱反巻一葉生一子名囬頭見子花廣羣芳譜鳯翔出鳯翔縣志金鳯花即鳯仙人家多種之莖有紅白二色花或黃或白或紅或紫或碧或雜色本草綱目指甲花即此延安府志俗名指甲花十餘色不同山陽縣志玉簮六七月抽莖莖上有細葉中出花朶十數長二三寸本小末大未開時正如白玉搔頭簮形本草綱目武帝寵李夫人取玉簮搔頭後宫人皆效之玉簮花之名取此廣羣芳譜有紫白二種山陽縣志荷花漢昭帝琳池中植分枝荷一莖四葉狀如駢葢日照則葉低蔭根若葵之衞足名曰低光荷實如𤣥珠可以飾佩花葉雖萎芬馥之氣徹十餘里食之令人口氣常香益人肌理宫人或剪以為衣三輔黄圖張揖曰蓮根則藕上林賦註昭帝栁池有芙蕖素色大如斗花葉甘可食藝文初學記明皇太液池有千葉白蓮秋盛開帝與貴戚宴賞焉開元天寶遺事德宗貞元十八年西内神龍寺前水渠生合歡蓮其花一莖兩房文苑英華京兆貢藕粉唐書地理志雍州産藕粉寰宇記崔逺家墅在長安城南就中禊池産巨藕相傳曰禊寶又曰玉臂龍清異録華山頂有池池中生千葉蓮花長十丈藕如大船服之羽化物類相感志蓮有紅白二種近有晉人於髙橋種數十畝花開香聞十里取房藕市城中咸寧縣志西番蓮花淡雅似菊自春至秋相繼不絶春間將藤壓地自生廣羣芳譜志按延安府及府谷神木皆載有是花向日蓮花色或黃或白葉浮水上翠厚而澤形如菱花差大開則隨日所在日入輒斂而自藏於葉下廣羣芳譜長安有之長安縣志秋葵與葵相似故名秋葵朝夕傾陽此葵是也廣羣芳譜葵一種黃如盤曰向日葵又名固本花淳化縣志菊花生雍州川澤名醫别録夏萬鈴出鄜州開以五月紫色細鈴生於雙文大葉之上秋萬鈴出鄜州開以九月中千葉淺紫其中細葉盡為五出鐸形而下雙文大葉承之范成大菊譜終南五老洞碑記墨菊其色如墨古用其汁以書字澄懷録𢎞農諸山正秋草木衰謝盡山上下水涯籬落皆黃菊大如錢叢生粲然懸笥瑣探菊有六月菊小葵菊九月菊米脂縣志千葉者有硃砂紅白蠟瓣紫芙蓉黃金菊單葉者有紅白藍三種府谷縣志蓼花予又集于蓼以薅荼蓼詩經周頌蓼水草也毛傳㳺龍即水紅花又名蓼種多山陽縣志水仙唐𤣥宗賜虢國夫人紅水仙十二盆花史華陰湯夷服花八石得為水仙三才圖會夾竹桃花五瓣長筒瓣微尖淡紅嬌艷𩔖桃花葉狹長𩔖竹故名夾竹桃自春及秋逐旋繼開嫵媚堪賞廣羣芳譜長安有之長安縣志珍珠花莫道長安貧似磬縁堦遶砌盡珍珠張舜民珍珠花詩珍珠花一名米殻延綏鎮志紫金蟬葉如菖蒲紫萼五出與蟬甚𩔖廣羣芳譜長安有之長安縣志後姚婆一莖作蓓蕾開花五六瓣翠色俗云後姚婆者舜母也亦曰虞美人延綏鎮志萬年竹可供盆景清玩咸寧縣志秋海棠一名八月春花色粉紅甚嬌艷葉緑如翠羽此花有二種葉下紅筋者為常品緑筯者開花更有雅趣廣羣芳譜長安有之長安縣志花汁傷人人指亦傷花山陽縣志雞冠種多處處有之廣羣芳譜有紅白二種山陽縣志酴醿唐制召侍臣學士飲酴醿酒景龍文館記長安有之長安縣志酴醿叢生而繁山陽縣志薔薇武帝與麗娟看花時薔薇始開態若含笑帝曰此花絶勝佳人笑也麗娟遂取黃金百斤作買笑錢奉帝薔薇名買笑自麗娟始賈氏說林有紅白二種取露甚佳洋縣志十姊妹花小而一蓓十花故名其色自一蓓中分紅紫白淡四色有七朶一蓓名七姊妹遵生八牋南鄭有之南鄭縣志玫瑰樂逰苑中有自生玫瑰樹西京雜記玫瑰甚香乾可作囊以沙糖同搗謂之玫瑰醬延綏鎮志凌霄苕之華詩經小雅即今之紫葳蔓生附于喬木之上其花黃色亦名凌霄朱子集傳紫葳出三輔太平御覽自夏至秋開花一枝十餘朶大如牽牛花而頭開五瓣赭黄色有細㸃秋深更赤本草綱目刺䕷絶似玫瑰而無香學圃餘疏有紅黄二種延綏鎮志月季叢生人家多栽挿之莖葉俱有刺逐月一開四時不絶廣羣芳譜一名月月紅山陽縣志棣棠花若金黄春深與薔薇同開有單葉者名金盌廣羣芳譜長安有之長安縣志紫茉莉花形似茉莉色紫香不及茉莉女人取花汁勻面子肉雪白作粉冬擦面不皺人呼胭粉花山陽縣志南天燭白花宻實實若赤珠經霜始艷咸寧縣志茅白茅包之詩經召南晝爾于茅豳風茅叢生荒野間野人刈以覆屋合璧事類有劍脊者根炒麫可食山陽縣志蓬彼茁者蓬詩經召南蓬草名也毛傳張仲蔚與魏景卿俱隱不仕所居蓬蒿至于没人三輔決録黄沙極目朔風獵獵中有枯草團欒佶屈輾轉于馬蹄之間訊之土人曰轉蓬也延綏鎮志綿蓬其子可食凶年多産葭州志沙蓬神木出神木縣志白蒿于以采蘩詩經召南采蘩祁祁豳風蘩皤蒿毛傳凢艾白色為皤蒿今白蒿春始生及秋香美可食陸疏蘩即白蒿山陽縣志角蒿菁菁者莪詩經小雅莪蒿也生田澤漸洳之處葉似邪蒿而細科生三月中莖可生食又可蒸陸疏莪蒿一名蘿蒿一名角蒿陸疏廣要山陽有之山陽縣志黄花蒿一名臭蒿一名草蒿與青蒿相似但此蒿色深帶淡黄氣辛臭不可食廣羣芳譜山陽多山陽縣志水蒿言刈其蔞詩經周南馬云蔞蒿也郭云似艾陸璣疏云白色長數寸髙丈餘生水澤中正月根芽生旁莖正白生食之香而脆美其葉又可蒸為茹孔疏蔞即水艾蒿延長縣志牡蒿匪莪伊蔚詩經小雅蔚牡蒿也三月始生七月華華似胡麻華而紫赤八月為角角似小豆角銳而長一名馬薪蒿陸疏菰蔣菰也上林賦註太液池邊皆是彫胡緑節之𩔖菰之有米者長安人謂為彫胡菰之有首者謂之緑節西京雜記出西安陂池蔣草也生水中葉如蔗获至秋則為米長安人謂彫胡葭蘆之米馬志蒲依于其蒲詩經小雅維筍及蒲大雅五帝廟臨渭其北穿蒲池溝水漢書郊祀志蒲池為池而種蒲師古注苻𢎞先居武都家生蒲長五丈狀如竹咸異之謂之蒲家因以氏焉前秦記香蒲即甘蒲可作薦者春初生取白為葅亦堪蒸食山南人謂之香蒲以菖蒲為臭蒲也唐本草叢生水際似莞而扁有脊而柔八九月收葉以為席亦可作扇本草綱目産渭川可作簔笠綆䋲亦可飯牛咸寧縣志蒲可為席居人不能止知為炊薪咸陽縣志蘆彼茁者葭詩經召南葭蘆也毛傳亦名葦朱子集傳葭蘆之未解籜者長安人謂之紫蘀西京雜記長丈許中空皮薄色白者葭也蘆也葦也本草綱目三川間多有咸寧縣志狀似竹而葉抱莖生有節無枝種水澤傍秋採以織蓆咸陽縣志蘆俗呼羽子山陽縣志下地宜葦中部縣志获蒹葭蒼蒼詩經秦風八月萑葦豳風薍為萑毛傳蒹似萑而細髙數尺陸璣疏云蒹水草也堅實牛食之令牛肥彊又初生為菼長則為薍成則名為萑孔疏短小于葦而中空皮厚色青蒼者菼也薍也获也萑也其最短小而中實者蒹也薕也皆以初生已成得名其身皆如竹其葉皆長如箬葉本草綱目三川間多有中蓆箔用咸寧縣志荇參差荇菜詩經周南荇接余也毛傳白莖葉紫赤色正圓徑寸餘浮在水上根在水底與水深淺等大如釵股上青下白陸疏春光淡沲秦東亭渚蒲芽白水荇青杜工部集莕與蓴一𩔖二種葉徑一二寸有一缺而形圓如馬蹄者蓴也似蓴而稍尖長者莕也並夏月開花有黄白二色本草綱目蘋于以采蘋詩經召南蘋大蓱也毛傳蘋今水上浮萍是也其大者謂之蘋陸疏葉浮水面根連水底莖細于蓴莕葉大如指頭面青背紫有細紋四葉合成中折十字形合如田字夏秋開小白花故稱白蘋其葉攅簇如萍故爾雅謂大者如蘋也又項氏言白蘋生水中青蘋生陸地按今之田字草有水陸二種陸生者多在稻田沮洳之處葉與白蘋一樣但莖生地上髙三四寸不可食本草綱目萍萍氏掌國之水禁周禮秋官小者曰䓑季春始生詩經陸疏水萍出三輔色青者善范子一種面背皆緑者一種面青背紫赤若血者謂之紫萍本草綱目三月三日採陰乾以沐浴生毛髪咸陽縣志藻于以采藻詩經召南魚在在藻小雅藻水草也生水底有二種其一種葉如雞蘇莖大如箸長四五尺其一種莖大如釵股葉如蓬蒿謂之聚藻扶風人謂之藻聚為發聲也陸疏漢武昆明池中有水網藻枝橫側水上長八九尺有似網鳬鴨入此草中皆不能出因名酉陽雜爼菅白華菅兮詩經小雅茅菅白華一名野菅爾雅菅似茅而滑澤無毛根下五寸中有白粉者柔靱宜為索漚乃尤善陸疏郭璞曰菅茅屬西京賦註一名巴芒俗訛作覇王菅山陽縣志瀵池旁産菅子草可製汗衫郃陽縣志蒯蒯亦菅之𩔖左傳杜註聲𩔖曰蒯草中為索西京賦註苀說文曰苀東蠡西京賦註苀草名葉似蒲叢生集韻菖蒲朝事之豆其實昌本周禮天官昌本菖蒲根切之四寸為葅周禮註文王嗜菖蒲葅吕氏春秋漢武帝扶荔宫有菖蒲百本三輔黄圖石菖蒲生上洛池澤一寸九節者良名醫别録菖蒲池有菖蒲其葉細如劍脊其根毎寸九節服之令人强徤延年雍勝畧洋沔二縣及金州出明一統志葉有劍脊瘦根宻節者石菖蒲也廣羣芳譜石菖蒲根一寸九節者山溪中多山陽縣志虎鬚蒲燈前置一盆可收燈烟廣羣芳譜可供盆玩咸寧縣志吉祥草叢生不拘水石間皆可種廣羣芳譜運草可供盆玩咸寧縣志四季槐葉似槐而有花可供盆玩臨潼縣志十様錦即臨秋變雁來紅以雁來而色嬌紅老少年至秋深脚葉深紫而頂紅少年老頂黄而葉緑延綏鎮志莎草南山有臺詩經小雅臺草有皮堅細滑緻可為簦笠南山多有陸疏臺夫須即莎草也朱子集傳櫕戾莎上林賦爾雅曰臺夫須又曰葿西京賦註離騷云青莎雜樹古今詩人多以比興咸陽縣志龍鬚草生梁州山谷濕地以九節多珠者良本草衍義作穗如鬚延綏鎮志可作帚府谷縣志王芻終朝采緑詩經小雅綠王芻也鄭箋爾雅曰綠王芻郭璞曰今菉蓐也西京賦註萆荔小華之山其草有萆荔狀如烏韭而生于石上亦縁木而生食之已心痛西山經說文曰荔草似蒲西京賦註垂盆草叢生其葉輭而長延綏鎮志結縷尃結縷上林賦郭璞曰結縷蔓生如縷相結上林賦註石長生生咸陽山谷近道亦有之是細草紫色葉如龍鬚草黑如光漆不與餘草雜名醫别録青薠蔣芧青薠上林賦青薠似莎而大雁所食廣雅黃䔒草之中有黃䔒者可覆屋雒南縣志席薊其莖可作索土人編以為席復為棬米脂縣志鎻把草可備芻牧延綏鎮志沙竹堅光性柔細無節且長屈之可以為棬延綏鎮志絞之可以為索葭州志薲蘆稠疊似竹葉其莖如錐馬嗜之延綏鎮志繡墩草長安有之長安縣志虎耳草一名石荷葉生陰濕處人亦栽于石上莖葉如荷葢狀本草綱目出長安長安縣志羊蹄甲言采其蓫詩經小雅蓫牛蘈揚州人謂之羊蹄似蘆服而莖赤可瀹為茹滑而美也陸疏羊蹄根以形名葉長尺餘似牛舌入夏起薹開花結子本草綱目荲俗名羊蹄菜延長縣志黄白草生山中可飼牛臨潼縣志馬蘭生澤旁如澤蘭而氣臭本草拾遺臨潼出臨潼縣志羊躑躅一名閙羊花所在有之苗似鹿葱葉似紅花本草綱目蒲城有之蒲城縣志佛指甲多附石向陽而生似馬齒莧而細長呼為佛指甲本草綱目臨潼有之臨潼縣志仙人掌漢武帝扶荔宫植千嵗子百餘本三輔黄圖發苞時外𩔖芋魁内攅瓣如翠毬各擎子如掌然俗呼為千嵗子惟宜沙地黄佐仙人掌賦序吳堡有之吳堡縣志甜根苖根甜可食葭州志馬蓮可用作紙府谷縣志苔慈恩寺唐三藏院後簷階有苔狀如苦苣初生磚上色如藍緑輕軟可愛酉陽雜爼瓦松崇文館瓦松者産于屋霤之上以其形似松生必依瓦故曰瓦松唐崔融瓦松賦馬乳𩔖黄刺梅結子如馬乳延綏鎮志黄花有刺葭州志沙蒿子研末入麫黏而不斷葭州志盆料春生夏熟有微米年荒可以療飢府谷縣志水黒豆生水中有子扁如黒豆延綏鎮志條符禺之山其草多條其狀如葵而赤華黄實如嬰兒舌食之使人不惑西山經載按華州志亦之條石脆之山其草多條其狀如韭而白華黒實食之已疥西山經黄雚竹山有草名曰黄雚其狀如樗其葉如麻白華而赤實其狀如赭浴之已疥又可以已胕西山經今按竹山在商州蓇蓉嶓冢之山有草焉其葉如蕙其本如桔梗黒華而不實名曰蓇蓉食之使人無子西山經今名花骨空凌霄花之𩔖楊慎補註按爾雅曰榮而不實謂之蓇吳任臣註山按嶓冢在漢中相思草秦趙間有相思草狀如石竹而節節相續一名斷腸草又名愁婦草亦名霜草人呼寮莎述異記離合草終南山多離合草葉似江蘺而紅緑相雜莖皆赤色氣如羅勃西京雜記醒醉草興慶池南有草數叢葉紫而心殷有醉人過於草傍不覺失其酒態後有醉者摘草嗅之其酒立醒開元天寶遺事布帛帛似帛布似布華山有之爾雅草葉有似布帛者因以名云生華山中郭註草按雍勝畧云細辛即古所稱似帛似布今人所稱西岳布是也未知其何據而馬志據爾雅另列今從之自揺草興安州心山有異草吹之不偃無風乃自揺劉閣記無按赤箭獨活鬼白鬼督郵無風獨揺草獨揺芝俱風自揺有獨揺之稱未知劉記所指何種抑别一類歟無心草生鳳翔商州各縣皆出之三月開花五月結實圖經本草迷人草三教山有草履之迷人興安州志積雪草咸陽有之酉陽雜爼一名地錢一名連錢圖經云生咸陽下濕地葉如錢莖細而勁蔓延馬志木屬松松柏斯兌詩經大雅華山之首曰錢來之山其上多松西山經鄭遨聞華山有五粒松因徙居華陰求之五代史一行傳唐時華州貢五粒松一名乳毛松十二月採出蒲谷今不貢寰宇記凡松葉皆雙股故世以為松釵獨栝松每穗三鬚而髙麗所産每穗乃五鬛焉今所謂華山松是也癸辛雜識不空三藏塔多老松嵗旱則官伐其枝為龍骨以祈雨葢三藏役龍意其樹必有靈也寺塔記五粒松生華山西南峰上樹如偃葢旁有青蘿長百尺華嶽集萬年松出華陰山圖書編鄜州開元寺有白松竒古張著詩葉墜銀釵細花飛香粉乾寺門煙雨裏渾作白龍看明一統志吳瑞曰松子有華陰松形小殻薄有香廣羣芳譜松産南山不一種咸寧縣志南山有白骨松鄠縣志松有赤松白松黄松商州志有羅漢松皮光白最佳山陽縣志栢漢文帝霸陵不起山陵稠種栢三輔黄圖大興善寺東廊素和尚院庭有栢四株元和中卿相多逰此院栢至夏月有汗汙人衣如脂不可浣相國鄭相惡其汗謂素曰弟子為伐此樹各植一松也及暮素戲祝曰我種汝三十餘年汝以汗為人所惡來嵗若復有汗我必薪之自是無汗宋敏求長安志栢箭韓子秦昭王令工施鉤梯而上華山以松栢之心為博箭潜確類書栢葉仙人田鸞家居長安入華山求問真侣見黄冠指栢樹示之曰此即長生藥也原化記華山生文栢一名黄腸地理志予官陜西登髙望栢千萬株皆一一西指葢此木受金之正氣所制也本草衍義平泉草木記有藍田龍栢老學菴筆記耀州雲陽出栢板寰宇記漢故道縣龍女山在鳳翔縣多紫栢天中記紫栢生華山東北峰上葉際碧露以五月五日用油囊接之食者可作地仙華嶽集千枝栢一本千枝生商州南山明一統志盩厔昇天臺上有再生栢世傳老子說經於此見二栢枯以鍼炙之復生今尚欎茂賈志産龍首原者佳叢而緻者曰千枝栢葉長而銳者曰茨栢填園圃又有四季栢四時皆花枝葉蒼秀如葢蒔牛頭寺咸寧縣志乾陵栢文多菩薩雲氣人物鳥獸一株值萬錢白樂天有栢牀詩乾州志檜上林苑栝十株西京雜記栝栢葉松身西京賦註同州郃陽縣劉靖家墳中白楊生檜清異録檜葉尖硬亦謂之栝廣羣芳譜樅上林苑樅七株西京雜記樅松葉栢身也西京賦註杉太液池西有一池名孤樹池池中有洲洲上煔樹一株大十餘圍望之童童如葢故取為名西京雜記杉一名煔廣羣芳譜梓維桑與梓詩經小雅商子曰南山之陽有木名橋北山之陰有木名梓尚書大傳秦文公二十七年伐南山大梓史記秦本紀梓如栗而小西京賦註䑕梓北山有楰詩經小雅楰䑕梓毛傳樹葉木理如楸亦名苦楸朱子集傳豫章木蘭豫章上林賦漢武帝立豫章宫于昆明池中作豫章木殿述異記楠終南何有有條有梅詩經秦風柟葉大可三四葉一藂木理細緻于豫章子赤者材堅子白者材脆荆州人曰梅終南多柟終南與上庸新城通故亦有柟也陸疏石脆之山其木多柟西山經爾雅曰梅柟郭璞曰柟木似水楊西京賦註上林苑柟四株西京雜記石楠上發馬嵬行至扶風道傍有石楠樹團圞愛玩之因呼為端正樹太真外傳生華陰山谷名醫别録葉似􅗀草凌冬不凋闗中者葉細為好唐本草闗隴間出者葉青黄色皆有紫㸃雨多則併生長及二三寸圖經本草終南斜谷有石處甚饒韓保昇本草重註桐梧桐生矣于彼朝陽詩經大雅上林苑梧桐三椅桐梧桐荆桐西京雜記青梧觀有三梧桐樹三輔黄圖昭帝元鳳三年馮翊人獻桐枝長六尺一葉也伏䖍古今註植桐數十萬株於阿房城晉書苻堅載記忽見紫桐花悵望下邽明日是清明長慶集桐生桐栢山中今三原有之馬志榆秦漢故塞其地皆榆爾雅翼上林苑白榆十株西京雜記長安故城樹宜榆三輔黄圖同州郃陽劉靖家兄弟同居宅邊榆樹生桑人號榆為義祖清異録榆林地多生榆王恢云樹榆為塞謂此賈志槐上林苑槐六十四株守宫槐十株西京雜記長安故城水泉深二十餘丈樹宜槐甘泉北岸有槐樹今謂玉樹相傳以為甘泉賦所謂玉樹青葱即此三輔黄圖自長安至于諸州皆夾路樹槐晉書苻堅載記雲陽縣界多漢離宫故地有似槐而葉細土人謂之玉樹隋唐嘉話尚書省都堂南門道東有古槐垂陰至廣相傳夜深聞絲竹之音省郎有入相者俗謂之音聲樹祠部呼為木㕔言其清且冷也宋敏求長安志天街兩畔槐樹俗呼為槐衙中朝故事長安持國寺門前有槐樹數株金監買一株别理解之毎片一天王塔㦸成就夏州唯一郵有槐樹數株鹽州或要葉行牒求之酉陽雜爼吳凑為京兆尹街榆悉易以槐唐書吳凑傳華州三家店西北道邊有槐甚大葱欎周廽可蔭數畝槐有癭形如二猪相趂奔走其廽顧口耳頭足一如塑者竒聞録驪山下玉女殿東有槐兩樹相並上幹相連馬志木中車器花可作黄角資藥物又有葉晝合而夜布者名守宫槐咸寧縣志葉大而黒者名櫰槐葉細而青者但謂之槐咸陽縣志明皇幸蜀至馬嵬手植槐焉及肅宗即位鑾輿返京見之曰此太上槐也俗訛為太上老君槐興平縣志檀樂彼之園爰有樹檀詩經小雅孟康曰欃檀檀别名也上林賦註有黄白二種葉皆如槐肌細體堅與梓榆莢蒾相似本草綱目苦檀漢中出漢中府志駮馬隰有六駁詩經秦風駮馬梓榆也其樹皮青白駮犖遥視似駮馬故謂之駮馬陸疏楸終南何有有條有梅詩經秦風條槄也今山楸也亦如下田楸耳皮葉白色亦白材理好宜為車板陸疏有山水二種木多紋理咸寧縣志有雲楸白楸二種商州志楸堅而好可作舍製器雒南縣志楓張揖曰楓欇也脂可以為香上林賦註楓香木也西京賦註上林苑楓四株西京雜記闗陜甚多樹髙大似白楊有赤白二種白者木理細膩葉圓作岐而香霜後丹廣羣芳譜似楊葉圓有脂而香名楓香隋唐多植宫庭故謂宸居曰楓宸咸寧縣志楮其下維榖詩經小雅榖今之楮樹也朱子集傳南山西北八十里曰大時之山上多榖申山其上多榖鳥山其下多楮西山經於官社後立官稷稷種榖樹漢書郊祀志皮可作紙實入藥咸寧縣志俗名構一曰榖田荒蕪久則榖自生葉有花瓣無曰構可作紙咸陽縣志民以此皮為穰做紙山陽縣志椿椿樗栲一𩔖三種椿木皮細肌實而赤嫩葉香甘可茹本草綱目易長而有夀南北皆有之廣羣芳譜紅椿木香葉可為菜咸陽縣志向多香椿今無復遺蘖白水縣志樗采荼薪樗詩經豳風樗惡木也毛傳唯堪為薪故云惡木孔疏樗樹及皮皆似漆青色其葉臭陸疏樗木皮粗肌虚而白其葉臭惡本草綱目白椿木臭幹可為棟咸陽縣志山樗南山有栲詩經小雅山樗與下田樗略無異葉似差狹耳陸疏栲山樗朱子集傳栲木即樗之生山中者本亦虚大然斧之如腐朽古人以為不材之木本草綱目櫟山有苞櫟詩經秦風柞棫拔矣大雅秦人謂柞為櫟其子房生為梂陸疏南山西百八十里曰大時之山上多柞申山其上多柞西山經五柞宫漢之離宫也在扶風盩厔宫有五柞樹因以為名五柞皆連抱上枝覆蔭數畝三輔黄圖櫟有二種不結實者曰棫其木心赤結實者曰栩其實為橡本草綱目櫟芽可茹商州志櫟俗呼花力作薪燒炭最佳山陽縣志栁有菀者栁詩經小雅自長安至于諸州皆夾路樹栁晉書苻堅載記王維别墅在輞川有栁浪唐書文藝傳曲江池畔多栁號為栁衙意謂其成行列如排衙也中朝故事鳳州境内生栁翠色可愛與他處不同墨客揮犀送行者於覇橋折栁贈别名消魂橋地輿志金絲栁出鳳縣宋元豐間有㫖下鳳州取金絲栁一百根明一統志栁金線者園囿多蒔之咸寧縣志即垂楊挂絲者延綏鎮志檉栁其檉其椐詩經大雅檉河栁生水旁皮正赤如綘一名雨師枝葉似松陸疏漢苑中有栁狀如人形曰人栁一日三眠三起三輔故事檉栁一名河栁一名三眠栁即今俗所稱三春栁也廣羣芳譜三春栁出鄜州延安府志俗名沙栁又名三春栁延綏鎮志霧栁叢生材中箭笴延綏鎮志水楊隰有楊詩經秦風長楊宫中有垂楊數畝因為宫名長安御溝謂之楊溝謂植髙楊于其上也三輔黄圖長安地多長楊聞見前録白楊葉尖圓如杏枝頗勁微風來則葉皆動其聲蕭瑟陜虢南山谷尤多懸笥𤨏探白楊陜西甚多永耀間居人修葢多此木也本草衍義勁葉逐風作聲咸寧縣志生澤旁葉圓微風動揺聲若大雨咸陽縣志枎栘唐棣之華詩經召南山有苞棣秦風棣唐棣唐棣栘也毛傳郭璞曰今白栘也似白楊孔疏一名枎栘無風葉動花反而後合本草拾遺女貞豫章女貞上林賦張揖曰女貞葉冬不落上林賦註今人不知女貞但呼為蠟樹女貞一名冬青與冬青同名異物女貞葉長者四五寸子黒色凍青葉微團子紅色花皆繁子並纍纍滿樹本草綱目前有植白蠟樹者經亂削伐盡今始復植矣雒南縣志女貞子黒色山陽縣志冬青太液池邊看月時好風吹動萬年枝宋盧多遜詩一名凍青一名萬年枝廣羣芳譜俗呼凍青子赤色山陽縣志枸骨南山有杞詩經小雅杞樹如樗一名枸骨朱子集傳小華之山其木多荆杞西山經昆明靈沼黒水元沚周以金堤樹以栁杞西山賦杞即楩木也如楊赤理西京賦註楩杞也似梓上林賦註烏臼生山南平澤樹髙數仭葉似棃杏五月開細花黄白色子黒色唐本草漢中有之漢中府志黄楊木理細膩枝幹繁多性堅緻難長廣羣芳譜木多黄楊華州志樺木延州土貢樺皮唐書地理志生西北諸地其木色黄有小斑㸃紅色能收肥膩其皮厚而輕虚軟柔用襯鞾裏為刀靶之𩔖謂之暖皮以皮巻蠟可作燭照本草綱目蔓荆楚荆也廣志秦隴多有之莖髙四五尺對節生枝夏有花作穗淡紅色蘃黄白色秋結子圖經本草欒荆莖葉似石楠幹亦反巻經冬不死葉上有細黒㸃者真今雍州所用者是唐本草牡荆言刈其楚詩經周南止於楚秦風以牡荆畫幡日月北斗登龍漢書郊祀志牡荆荊之無子者如淳注牡荆作樹不為蔓生故稱為牡非無實之謂唐本草其生成叢而疎爽故謂之楚本草綱目棘在彼杞棘詩經小雅左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後周禮秋官白棘别録云生雍州川谷一名棘鍼一名棘刺馬志赤棘隰有杞桋詩經小雅桋赤梀也毛傳釋木曰白者梀舍人曰桋名赤梀郭璞曰赤梀樹葉細而岐銳皮理錯戾好叢生山中白棘葉圓而岐為木大也孔疏皂莢生雍州山谷如豬牙者良名醫别録唐華清宫今靈泉觀也七聖殿之西南隅數十步間有皂角一株合數人抱枝幹頗瘁相傳明皇貴妃共植于此每嵗結實必有十數莢合歡者京兆尹令老卒數十守視之移接於他枝則不復合歡也墨客揮犀雙皂莢生太白山圖書編雙皂莢在驪山下臨崖玉女殿西其背相合故名馬志秦人多樹之以為社咸陽縣志蜜香樹漢武帝起扶荔宫植所得異木有蜜香樹百本三輔黄圖靈夀木其檉其椐詩經大雅椐樻也毛傳椐木節中腫似扶老今人以為馬鞭及杖𢎞農郡北山有之即今靈夀木也陸疏光稱疾辭位太后詔賜靈夀杖漢書孔光傳木似竹有節長不過八九尺圍三四寸自然有合杖制不須削理令人延年益夀顔師古註娑羅木慈恩寺殿庭大娑羅樹大厯中安西所進其木樁賜此寺四橛大德行逢自種之酉陽雜爼有坪曰莎羅舊有莎羅樹大合抱頂如華葢葉七出如掌白華緑萼登華記在青柯坪西域種香祖筆記杻北山有杻詩經小雅杻檍也葉似杏而尖白色皮正赤為木多曲少直枝葉茂好二月中葉疎華如練而細蕋正白葢柎今官園種之正名曰萬嵗陸疏今官園種之名曰萬嵗或謂之牛筋嚴粲詩緝似棣細葉葉新生可飼牛材中車輞闗西呼杻子一名土橿爾雅郭註英山其上多杻橿大時之山下多杻橿數厯之山木多杻橿申山下多杻橿西山經楛上申之山下多楛西山經楛木可以為箭詩云榛楛濟濟郭註莖似荆而赤其葉如蓍草木疏欒華欒華生漢中川谷名醫别録長安山中亦有之其子謂之木欒子圖經本草本草云葉似木槿而薄細花黄似槐而稍長大小殻如酸漿其中有實如熟豌豆圓黒堅硬堪為數珠者是也馬志欒柴可茜氊延長縣志櫧櫧似柃葉冬不落上林賦註櫧木處處山谷有之大者數抱髙二三丈葉如栗葉而稍尖堅厚光澤凌冬不凋三四月開白花如栗花實大如槲子本草綱目槲林有樸􅈪詩經召南槲􅈪别名爾雅郭註槲二種叢生小者名枹髙者名大葉櫟樹三四月開花亦如栗八九月結實似橡子而稍短小蔕亦有斗本草綱目槲大葉山陽縣志棫柞棫拔矣詩經大雅棫白桵也鄭箋郭璞曰桵小木也叢生有刺實如耳璫紫赤可食孔疏浮山西七十里曰羭次之山漆水出焉其上多棫橿西山經青剛木出宜君宜川延安府志割漆者必需之山陽縣志黄櫨郭璞曰櫨槖櫨上林賦註黄櫨木生商洛山谷葉圓木黄可染黄色本草拾遺昔無今有山陽縣志楝有雌雄二種雄者無子根赤雌者有子根白唐本草𩔖紫荆微白咸陽縣志黄楝山中呼為藥樹山陽縣志椴椴木葉最大有𩔖團扇其皮可以當麻取為魚網之綱牢固殊常廣羣芳譜出宜川延安府志可刻鏤山陽縣志皮作絙覊鞋屨華州志樸芃芃棫樸詩經大雅樸枹木也毛傳椅其桐其椅詩經小雅梓之美文者為椅本草綱目出自南山鄠縣志桑阪有桑詩經秦風蠶月條桑豳風鳥山其上多桑西山經唐京兆萬年縣大寧坊有桑樹一株暮秋生子秋冬椹熟文苑英華桑有數種葉沃者曰沃桑不實可飼蠶結椹者亦有黒白二種咸寧縣志檿其檿其柘詩經大雅檿山桑也毛傳郭璞曰材中為弓孔疏山中有之盩厔縣志桑多山桑家植者甚少然山桑之絲堅靭異常謂之檿絲雒南縣志柘弓人為弓取幹之道七柘為上周禮考工記張曲江里第之側有古柘嘗因狂風發其一根解為器具花紋甚竒人又以公之手筆冠世目之曰文章樹清異録柘亦可飼蠶咸寧縣志牡丹生漢中名醫别録長安貴逰尚牡丹每春暮車馬若狂以不就玩為恥國史補開元禁中初重木芍藥即今牡丹也得數本紅紫淺紅深白者移植於興慶池東沉香亭前摭異記開元中裴士淹奉使幽冀過汾州衆香寺得一株白牡丹移植長安至德中馬僕射總鎮太原又得紅紫二色者今則多與戎葵比矣長安興善寺素師院牡丹絶佳元和末一枝花合歡興唐寺牡丹一窠元和中著花一千二百朶其色有正暈倒暈淺紅淺紫深紫黄白檀等獨無深紅又有花葉中無抹心者重臺花者其花面徑七八寸酉陽雜爼生漢中苖似羊桃根似芍藥長安謂之吳牡丹唐本草洛人宋單父能種藝術凡牡丹變易千種紅白間色上皇召至驪山植花萬本色様各不同龍城録今丹延山中皆有但花有黄紫紅白數色此當是山牡丹其莖梗枯燥黒白色圖經本草丹延以西褒斜道中最多與荆棘無異歐陽花譜唐開元中天下太平牡丹始盛于長安廣羣芳譜寶雞縣北二里蟠龍山有故相國少傅党公崇雅别業公好蒔花竹一日有樵人獻牡丹一枝色如墨四邊作金線界道云得之棧中令人踪跡之不復見矣隴蜀餘聞牡丹色名錯出約百餘種咸寧縣志鳯翔廨舍内有牡丹一叢四十餘枝枝大如斗是東坡以斗酒易之者在蓮池亭之北蘇子由有岐下詩二十一韵鳳翔縣志宋歐陽修花譜延安紅丹州紅皆謂産之傑然者自丹延以西尤多土人刈以為薪延安府志在白姑寺者竟成樹安塞縣志牡丹山多産牡丹開時紅紫滿山香聞數十里土人採以當薪又有牡丹坪在渚北村西北亦多牡丹韓城縣新志海棠宋淳熈間秦中有雙株海棠其髙數丈翛然在衆花之上與江淮所産絶不𩔖閱耕餘録海棠秦中者為次其株翛然如出塵髙步俯視衆芳有超羣絶𩔖之勢徐積海棠花序千葉者佳子為秋實咸寧縣志垂絲海棠山中最多人不知植貼梗海棠俗呼茶花山陽縣志玉蘂上都安業坊唐昌觀舊有玉蘂花甚繁每發若瑶林瓊樹劇談録唐昌觀玉蘂花長安惟有一株或詠之曰一樹瓏鬆玉刻成則其葩蘂形似畧可想矣春花盛時傾城來賞至謂有仙女降焉元白皆賦詩以實其事曽端白曰韋應物帖云京師重玉蘂花雍録山礬一名海桐樹婆娑可觀花碎白而香學圃餘疏大者髙丈許葉似梔子光澤堅强畧有齒凌冬不凋三月開花繁白如雪六出黄蕋甚芬香結子大如椒青黒色熟黄可食曽端伯以七里香為玉蘃花未知的否本草綱目一名芸香一名七里香興安州志木蘭欃檀木蘭上林賦上宴諸王于木蘭殿時木蘭花發皇情不悅妃醉中舞霓裳羽衣一曲天顔大悅太真外傳長安敦化坊百姓家太和中有木蘭一樹花色深紅太平廣記辛夷王維别墅在輞川有辛夷塢唐書文藝傳列辛雉于林薄甘泉賦生漢中魏興梁州川谷樹髙丈餘名醫别録一名辛雉一名木筆花開初出枝頭苞長半寸而尖銳儼如筆頭廣羣芳譜玉蘭唐昌的的春猶淺漢掌亭亭露欲溥張茂吳玉蘭詩花九瓣色白微碧香味似蘭故名廣羣芳譜花則多玉蘭華州志繡毬春月開花五瓣百花成朶團圞如毬廣羣芳譜按藍田諸縣志俱有之紫荆京兆田真兄弟三人共議分財堂前一株紫荆樹共議欲破其樹即枯死狀如火燃真大驚因不復解樹應聲榮茂齊諧記有紫荆白荆二種鄠縣志紫荆之花清烈而美渭南縣志崖嶺甚廣三四月過之芬香撲人安塞縣志紫薇開元元年改中書省曰紫薇省唐書百官志一名百日紅四五月始花一枝數穎一穎數花每微風至妖嬌顫動舞燕驚鴻未足為喻唐時省中多植此花廣羣芳譜花多紫薇華州志梔子鮮支黄櫟上林賦司馬彪曰鮮支支子也上林賦註海梔髙不盈尺香氣襲人洋縣志薝蔔花刀六出刻房七道花香異常即西域之種也一作瞻博花沔縣志杜鵑商山秦嶺愁殺人山石榴花紅夾路長慶集王建宫詞云敕賜一窠紅躑躅謝恩未了奏花開其重如此容齋隨筆杜鵑一名紅躑躅一名山石榴廣羣芳譜木槿山中習静觀朝槿王維輞川荘詩夜合葉似皂莢及槐極細五月花發紅白色上有絲茸秋實作莢子極薄細西京第宅山池間亦有種者名合昏唐本草木芙蓉張揖曰華皮可以為索上林賦註相如賦謂之華木叢生髙丈許葉大如桐冬凋夏茂秋半著花𩔖牡丹芍藥有紅白黄千葉者山人取其皮為索本草綱目巖桂桂椒木蘭上林賦上林苑桂十株西京雜記昭帝元鳳二年於琳池之南起桂臺以望逺氣東引太液之水有一連理桂樹上枝跨于渠水下枝隔岸而南生與上枝同一株拾遺記桂有硃砂桂金釵桂黄桂白桂南鄭縣志黄白二色秋未中而花争吐沔縣志山茶深冬開花紅瓣黄蕋周憲王云嫩葉亦可蒸晒作飲本草綱目以葉𩔖茶經冬不凋故得茶名廣羣芳譜實為花木瓜咸寧縣志蠟梅上林苑有蠟梅隆冬而花西京雜記元稹為翰林承㫖朝退行至廊下初日映九英隙光射稹有氣勃然百僚望之曰豈腸胃文章映日可見耶纂要蠟梅雖盛開常半含名磬口梅次曰荷花又次曰九英廣羣芳譜色黄似蠟香清山陽縣志瑞香冬春之交開花成簇長三四分如丁香狀共數種廣羣芳譜有黄紫白三色本草綱目興安州出興安州志迎春方莖厚葉葉面青背淡對節生正月初開小花狀如瑞香黄色不結實本草綱目一名金腰帶人家園圃多種之廣羣芳譜俱按西安府縣志有之丁香雞舌香即今丁香是也三省故事郎官日含雞舌香欲其奏事登答其氣芬芳夢溪筆談丁香有雌雄雄為丁香雌為雞舌香本草綱目為種不一花大者曰荆咸寧縣志靈雀春初開黄花甚可愛儼狀飛雀遵生八牋藍田有之藍田縣志茉莉弱莖繁枝花皆暮開其香清婉柔淑廣羣芳譜葭州出葭州志瓊花元遺山續夷堅志云鄠縣南十里炭谷入谷五里有瓊花樹大四人始合抱逢閏即花以初伏開末伏乃盡花白如玉中有玉蝴蝶一髙出花上花落不著地乘空而起香祖筆記紫藤藤皮著樹從心重重有皮四月生紫花可愛長安人亦種飾庭池本草拾遺花多藤花華州志南藤不見髙人王右丞藍田丘壑蔓寒藤杜工部集南藤即丁公藤生南山山谷圖經本草細藤圓膩紫緑色一節一葉葉深緑色似杏葉而微短厚四時不凋本草綱目龍藤山蓀亭有龍藤十二樹夭矯多節節皆凹枝榦皆空相傳為陳希夷所植說鈴亭按華嶽焦山蓀在華山木香惟紫心白花者為最香馥清逺髙架萬條望若香雪廣羣芳譜之按洋縣志有通脫木葉似蓖麻其莖空中心有白瓤輕白可愛女人取以飾物俗名通草本草合遺蔓生山中莖大者圍數寸本草綱目山陽有之馬志天油箸叢生可取為箸安塞縣志瓔珞藤終南山出軟碧可愛葉甚小有子纍纍然纒固其上有似瓔珞纂要竹如竹苞矣詩經小雅英山禺水出焉其陽多箭䉋又西竹山竹水出焉北流注于渭其陽多竹箭又西羭次之山漆水出焉其下多竹箭嶓冢之山囂水出焉上多桃枝鈎端西山經今漢中郡出䉋竹厚理而長節根深箭篠也鈎端桃枝屬郭註渭川千畝竹其人與千戸侯等史記貨殖傳褒斜材木竹箭之饒擬于巴蜀河渠書漢水重安而宜竹淮南子秦地有鄠杜竹林漢書地理志篠簜敷衍編町成篁西京賦林茂有鄠之竹西征賦嶓冢美竹厥號桃枝簟以安寢杖以扶危郭璞桃枝賛竇將軍有青竹田三輔故事蔣詡舍種竹下開三徑三輔決録太液池岸有竹數叢牙筍未嘗相離帝與諸王步於竹間謂諸王曰人世父子兄弟尚有離心覩此可以為鑑因呼為義竹開元天寶遺事輞川有竹里館唐書文藝傳篔簹谷在洋州産竹故詩云漢川修竹賤如蓬東坡集註丹青竹黄碧丹相間出熊耳山竹譜竹出咸寧藍田鄠縣盩厔渭南圖書編平利縣化龍山有苦竹其竹米可充食歉嵗民多資之賈志鳯尾竹中篴杖甜竹即義竹桓竹出南山小者曰松花竹中織器用墨竹色淡者曰紫竹咸寧縣志輞川北垞有金絲竹數叢即竹里館也藍田縣志周穆王逰元池在盩厔縣植竹竹皆成斑其大如椽其宻如簀盩厔縣志竹有斑竹䈽竹紫竹木竹觀音竹繡毬竹松花竹鳳尾竹洋州雙竹一榦兩枝漢中府志産毛竹鎮安縣志産箬竹茨竹苦竹洵陽縣志丹青樹終南山有樹直上百尺無枝上結叢條如車葢葉一青一赤望之斑駮如錦繡長安謂之丹青樹亦云華葢樹亦生熊耳山西京雜記千年長生樹上林苑有十株西京雜記萬年長生樹上林苑有十株西京雜記七葉樹杜佑城南樊川有桂林亭其地有七葉樹每朶七葉因以為名羅隱詩所謂夏窻七葉連簷暗是也張禮逰城南記模木生周公冢上其葉春青夏赤秋白冬黒以色得其正也淮南王草木譜净土樹在鄠縣南三月開花如桃花八月結實狀如小粟殻中皆黄土俗傳鳩摩羅什憩此覆其履土中所生明一統志大空秦隴人名獨空葉似楮小圓厚根皮赤色唐本草琵琶駱谷生花明艷似杜鵑花樵者識之曰早花殺人李紳集注似按本草綱目云此花羊躑躅文莖小華山西八十里符禺之山其上有木名曰文莖其實如棗可以已聾西山經盼竹山西百二十里曰浮山多盼木枳葉而無傷木蟲居之西山經不灰木太平寰宇記云俗多為鋌子燒之成炭而不灰其葉如蒲草今人束以為燎謂之萬年火把楊慎丹鉛録雖按今南山深谷中間有之入油數十燒不灰惟見水則易壞不凋木生太白山巖谷樹髙二三尺葉似槐莖赤色有毛如棠梨四時不凋本草拾遺無憂樹華山希夷洞側有樹四株名無憂樹隴蜀餘聞在西嶽玉泉院西域種香祖筆記橪支木枇杷橪柿上林賦郭璞曰橪橪支木也上林賦註貝多貝多出自摩伽陀國長六七丈經冬不凋貝多是梵語漢飜為葉樹名酉陽雜爼延長有之延長縣志禽屬鳯凰鳯凰于飛􅞪􅞪其羽鳯凰鳴矣于彼髙岡詩經大雅雄曰鳯雌曰凰其雛為鸑鷟非梧桐不棲非竹實不食非醴泉不飲陸疏文王時鳴於岐山論語朱註周之興也鸑鷟鳴于岐山周語鳯凰降集京師羣鳥從以萬數漢書宣帝本紀五鳯三年鳯集長樂宫東闕樹上神爵二年鳯凰集祋祤縣三輔黄圖鷫鸘西方之鳯名鷫鸘禽經長脛緑色其形似雁西京賦註焦明似鳯西方之鳥也宋衷曰水鳥也上林賦註鶴鶴鳴于九臯詩經小雅大如鵝長脚青翼髙三尺喙長四寸餘多純白亦有蒼色者今人謂之赤頰常夜半鳴陸疏鶴間有之臨潼縣志有灰鶴延安府志鸛鸛鳴于垤詩經豳風鸛水鳥也將陰雨則鳴鄭箋似鴻而大長頸赤喙白身黒尾翅樹上作巢大如車輪卵如三升杯陸疏鶬鷄爾雅曰鶬麋鴰也西都賦註一名鶬鴰一名麋鴰一名鴰鹿按羅願云鶬麋其色蒼如麋也鴰鹿其聲也闗西呼曰鴰鹿本草綱目鶖有鶖在梁詩經小雅水鳥也一名扶老玉篇狀如鶴而大青蒼色其嗉下有胡袋如鵜鶘狀好啖魚蛇及鳥鶵本草綱目鶖即秃鶖山陽縣志鵜鶘鵜水鳥形如鶚而極大喙長尺餘直而廣口中正赤頷下胡大如數升囊詩經陸疏好羣飛沉水食魚故名洿澤俗呼之淘河爾雅郭註太液池邊多平沙沙中鵜鶘動輒成羣西京雜記鴻鴻飛遵渚詩經豳風鴻鵠羽毛光澤純白似鶴而大長頸肉美如雁又有小鴻大小如鳧色亦白今人直謂鴻也陸疏毛萇詩傳曰大曰鴻西都賦註雁鴻雁于飛詩經小雅大曰鴻小曰雁毛傳自闗而西謂之􅕯鵝方言秦穆公得百里奚公孫支歸取雁以賀說文鴐鵝野鵝西京賦註鴐按方言􅕯字玉篇音加與同則鴐即􅕯也鵠說文曰鵠黄鵠也西都賦註始元元年黄鵠下太液池上為歌曰黄鵠飛兮下建章西京雜記似鸛而小毛畧紅巢於木商州志鳧鳧鷖在涇詩經大雅郭璞曰似鴨而小長尾背上有文陸璣云青色卑脚短喙水鳥之謹愿者也陸疏野鴨也咸陽縣志鴛鴦鴛鴦于飛詩經小雅鴛鴦雄雌不相離故謂之匹鳥崔豹古今註一名黄鴨其質杏黄色有文采紅頭翠鬛黒翅黒尾紅掌其交不再本草綱目性有定偶咸陽縣志黄鴨野鴛鴦也延綏鎮志羽有黄鴨米脂縣志鵁鶄睛交而孕禽經郭璞曰似鳧而脚髙有毛冠辟火災上林賦註太液池邊多鵁鶄西京雜記旋目司馬彪曰旋目鳥名也上林賦註大如鷺而短尾紅白色深目目旁毛皆長而旋上林賦云鵁鶄旋目是矣本草綱目方目一名鴋一名澤虞俗名䕶田鳥西人謂之蝦蟇䕶水鳥常在田澤中形似鷗鷺蒼黒色頭有白肉冠赤足見人輒鳴喚不去本草綱目鷺鷥振鷺于飛于彼西雝詩經周頌爾雅曰鷺舂鋤西都賦註鷺鷥膚施縣出馬志生沙堤水洲色白咸陽縣志頭雪白絲冠山陽縣志鷗鳧鷖在涇詩經大雅倉頡解詁云鷖鷗也一名水鴞孔疏悠悠水上人以比忘世君子咸陽縣志鸀玉晉灼曰屬玉水鳥似鵁鶄漢書宣帝紀註天子登屬玉之館西都賦鴐鵞鸀玉上林賦屬玉似鴨而大長頸赤目紫紺色三輔黄圖鸕鷀盧鸕鷀也上林賦註似鶂而小色黒亦如鴉而長喙善没水取魚日集洲渚夜巢林木本草綱目形似鶴灰色咸陽縣志翠鳥符禺之水北流注渭其鳥多鴖其狀如翠而赤喙可以禦火西山經翠似燕而紺色畜之辟火災郭註畧陽縣出翡翠舊志羽多翠鳥華州志鶺鴒脊令在原詩經小雅大如鷃雀長脚長尾尖喙背上青灰色腹下白頸下黒如連錢故杜陽人謂之連錢陸疏脊令雝渠水鳥也朱子集傳松果之山濩水出焉有鳥其名曰䳋渠其狀如山雞黒身赤足可以已𦢊西山經即鷛渠古音畧云水鳥也吳任臣注庸渠似鳧灰色而雞脚一名章渠上林賦註唐明皇時有脊令數十飛集麟德殿廷木翔棲浹日魏光乘作頌以為天子友悌之祥爾雅翼脊令一名雪姑米脂縣志雉雉之朝雊詩經小雅盂山鳥多白雉白翟西山經漢書鴻嘉二年雉飛集承明殿屋三輔黄圖隴州産雉尾寰宇記雉供祀典咸寧縣志山雉多山陽縣志羽多雉華州志鷮雉有集維鷮詩經小雅微小于翟走而且鳴其尾長肉甚美朱子集傳鷮雉俗呼化雞形如鷴土色白黒斑尾長六七尺夜栖必擇大樹尾倚木直𥪡山陽縣志鷩雉小華之山鳥多赤鷩可以禦火嶓冢之山鳥多赤鷩西山經赤鷩山雞之屬胸腹洞赤冠金背黄頭緑尾中有赤毛彩鮮明郭註促鵔鸃上林賦羽儀五彩望之繽紛間于山中羅致之然性不受擾置籠中輒自㫁尾沔縣志西鄉縣出錦雞舊志錦雞一名鷩雉一名鵔鸃五色不與他鳥同赤如硃砂緑似銅緑黄如金白如粉黒似漆但不能生捕必捕雛以養之山陽縣志吐綬雞羽色多黒雜以黄白圓㸃如真珠斑頂有嗉囊内藏肉綬常時不見每春夏清明則向日擺之頂上先出兩翠角二寸許乃徐舒頷下綬長濶近尺紅碧相間彩色煥爛踰時悉斂不見或剖而視之一無所覩本草綱目鳳翔有之鳳翔府志鶡鷄鶡雀飛集丞相府漢書黄覇傳張揖曰鶡似雉鬭死不却上林賦註似雉而大黄黒色首有毛角如冠本草綱目白鷴嶓冢之山鳥多白翰西山經白翰白鵫也亦名鵫雉又曰白雉郭註白鷴一名白鷴音之轉也白色有黒文如漣漪本草綱目通身雪白項下黒至胸背上如細墨筆畫紋細嘴紅腿形大于錦雞土人呼潮雞非也山陽縣志山雞洋縣出舊志𩔖班鳩紅嘴足而毛文小異可為窻禽也延綏縣志山雞非吐綬鵔鸃也澄城縣志鷓鴣太液池邊平沙上多鷓鴣西京雜記性畏霜露早晚希出夜栖以木葉蔽身多對啼今俗謂其鳴曰行不得也哥哥本草綱目漢中出漢中府志竹雞一名泥滑滑處處有之多居竹林比鷓鴣差小褐色多斑赤文其性好啼見其儔必鬭本草綱目石泉有之石泉縣志鸂鶒其形大於鴛鴦而色多紫亦好並逰謂之紫鴛鴦本草綱目漢中有之漢中府志生水草中大如鳧鷖羽色微灰黒嘴尖如錐頸足俱長其翎堪中箭羽謂之鴒當作鵏延綏鎮志鶂太液池邊多平沙沙上鴻鶂動輒成羣西京雜記杜預曰鶂水鳥也上林賦註青有名信天縁者終日凝立不易其處俟魚過取之即俗名青翰者也又名青本草綱目之按商州志有箴䳄張揖曰箴䳄似魚虎而蒼黒色上林賦註鶤雞雞三尺曰鶤爾雅似鶴黄色上林賦註鶤雞黄白長項赤喙西京賦註提壺鳥商州未是無人境一路山村有酒沽遷客由來長合醉不煩幽鳥道提壺王禹偁聞提壺鳥詩雙雞元和十五年奉令採雙雞五聫各重四觔元稹同州進雙雞狀唐元稹有進雙雞表今土人亦不復識同州志土角兒慧鳥色如土而斑頭𥪡毛好食沙土拌榖秦中謂之土角兒能學諸鳥鳴與貓犬聲形小聲弱不能逺聞來陽伯詩集阿濫堆驪山多飛禽名阿濫堆明皇御玉笛采其聲為曲子名當時左右皆傳唱之唐尉遲偓中朝故事紅樹蕭蕭閣半開玉皇曽幸此宫來至今風俗驪山下村笛猶吹阿濫堆張祜詩水鴉兒闗内水鴉兒旱乾累月氣如焚柴忽樹頭睨睆數聲則滂沱立至故獲此名觚賸毛按闗中有一種鳥黒形似鴝鵒名水鴉兒紅鶴色紅禽經所謂朱鷺是也圖經本草出膚施縣馬志伯勞七月鳴鵙詩經豳風鵙伯勞也毛傳伯勞純黒色形小于鳩好擊搏羣鳥皆怕夏至一陰生則五更鳴七月鳴不已大寒將至也不久去矣一名博勞左氏作伯趙商山名硯瓦蟲山陽縣志鸜鵒身首俱黒兩翼下各有白㸃頭上有幘亦有無幘者本草綱目俗名八哥翦舌尖能效人言洵陽縣志鸚鵡數歴之山鳥多鸚䳇西山經建隆二年隴州進黄鸚鵡宋史太祖本紀郭浩以秦鳳提刑獄按邊至隴口見一紅一白鸚鵡鳴於樹間問上皇安否浩詰其因葢隴州嵗貢此鳥徽宗置之安妃閣教以詩文及宣和末使人發還本土二鳥猶感恩不忘建炎筆談正大六年隴州防禦使舒穆嚕棟爾進黄鸚鵡金史哀宗本紀師曠謂之乾臯李昉呼為隴客有緑鸚鵡出隴蜀丹咮鈎吻長尾赤足金睛深目舌如嬰兒本草綱目出隴州能言鳥明一統志百舌一名反舌狀如鴝鵒而小灰黒色微有斑㸃喙亦尖黒行則頭俯春後鳴囀不已夏至後則無聲本草綱目興安有之興安州志黄鸝黄鳥于飛詩經周南交交黄鳥秦風有鳴倉庚豳風黄鳥黄鸝留也或謂之黄栗留一名倉庚一名商庚一名鵹黄一名楚雀闗西謂之黄鳥當葚熟時來往桑間陸疏自闗而西謂之鸝黄或謂之黄鳥方言明皇每於禁院中見黄鶯常呼之為金衣公子開元天寳遺事黄鸝闗中謂之楚雀趙德麟侯鯖録斑鳩翩翩者鵻宛彼鳴鳩詩經小雅鵻春秋云祝鳩郭璞曰今鵓鳩也孔疏鳴鳩斑鳩也草木疏鷱其􅝣鳩謂之鸊鷱自闗而西秦漢之間謂之鵴鳩其大者謂之鳻鳩其小者謂之鳩或謂之䳫鳩或謂之䳕鳩或謂之鶻鳩方言小而無斑者鵻本草綱目有斑鳩秋鳩二種咸寧縣志鳲鳩維鳩居之詩經召南鳩鳲鳩鴶鵴也毛傳鳲鳩有均一之德飼其子旦從上而下莫從下而上均平如一陸疏今之布榖也朱子集傳南山鳥多尸鳩西山經尸鳩自闗而西謂之服鶝或謂之鶝方言按爾雅鳲鳩即布榖非戴勝也郭註布榖一名郭公鳥山陽縣志雎鳩闗闗雎鳩詩經周南睢鳩王睢也鳥摰而有别毛傳大小如鴟深目目上骨露出陸疏水鳥狀𩔖鳧鷖朱子集傳鵓鴿唐明皇呼為飛奴韻㑹鴿之毛色於禽中品第最多本草衍義色名不一咸寧縣志有家野二種延綏鎮志鵽鳩唐書云髙宗時突厥犯塞有鳴鵽羣飛入塞邊人驚曰此鳥一名突厥雀南飛則突厥必入㓂張華云鵽生闗西飛則雌前雄後隨其行止本草綱目慈烏華州華陰郡土貢烏唐書地理志栁仲郢毎遷官羣烏大集于昇平里第庭樹㦸架皆滿凢五日而散家人以為候舊唐書栁公綽傳純黒小嘴者反哺者慈烏本草綱目烏鴉反哺得仁孝之端人謂之慈烏咸陽縣志純黒色為烏山陽縣志反哺者為烏葭州志烏鴉弁彼鸒斯歸飛提提詩經小雅小而腹下白不反哺者謂之鴉烏爾雅鴉楚烏也一名鸒秦謂之雅說文大嘴腹白不反哺者鴉烏本草綱目頸白而小不能反哺咸陽縣志白項為鴉山陽縣志小而腹白不反哺者為鴉葭州志山烏似鴉烏而小赤嘴穴居者山烏也一名鷁生西方本草綱目烏有赤嘴穴乳者咸寧縣志鴉有白項赤嘴二種延綏鎮志乾鵲維鵲有巢詩經周南鵲之作巢冬至架之至春乃成鄭箋鵲善為巢其巢最為完固朱子集傳孝武坐未央前殿東方朔執㦸階旁屈指獨語上見朔呼問之曰殿後栢樹上有鵲立枯枝東向而鳴使視之果然漢書東方朔傳其翼左覆右為雄右覆左為雌人謂之喜鵲咸陽縣志鳥多鵲山陽縣志山鵲鷽山鵲爾雅似鵲而有文彩郭註似鵲而尾長洵陽縣志紅嘴脚灰青色長尾有白尖稍山陽縣志子規一名杜宇一名杜鵑一名周燕狀如雀鷂而色惨黒赤口有小冠春暮鳴夜啼達旦鳴必向北至夏尤甚田家候之以興農事本草綱目蒲按今漢中郡志及興安城諸志俱有之燕一名乙鳥一名天女别録曰有紫胸輕小者是越燕有斑黒而聲大者是胡燕本草綱目燕有大小二種咸寧縣志燕子山以𤣥鳥冬蟄此又名燕子龕商州志羽多燕華州志名按延綏岐山葭州諸志有沙燕者即胡燕瓦雀以色名麻雀以常在階除名賔雀以居檐中名瓦雀山陽縣志黄雀莊辛曰黄雀俯啄百粒西京賦註小於瓦雀色黄山陽縣志靈雀細軀翼拖黄金有花同名色芸黄每夏月花開鳥輒引族至嚶鳴可聽沔縣志蒿雀似雀責黒色在蒿中本草拾遺能逐更夜啼延綏鎮志鶉大如雞雛頭細而無尾毛夜則羣飛晝則草伏人取之畜令鬭摶本草綱目人養之鬭山陽縣志䳺一名鴽鄭𤣥註禮記以鷃為鴽本草拾遺與鶉相似無斑者為鵪本草綱目亦作鵪大于鶉鳴聲如牛故名牛鵪山陽縣志白頭翁漢中有之漢中府志蠟嘴交交桑扈詩經小雅俗呼青雀嘴曲食肉喜盜脂膏食之孔疏鄭註云此鳥今謂之蠟嘴性甚慧陸疏廣要養之易馴嘴如黄蠟山陽縣志練雀禹錫曰似鴝鵒而小黒褐色時珍曰其尾長白毛如練帶今俗呼為拖白練本草綱目咸寧有之咸寧縣志按臨潼志鳥有名托白者托即拖音之訛也畫眉好音怡人眉白長如畫山人不知養山陽縣志按漢中志南鄭志俱有之鴇鴇有豹文故名獨豹爾雅翼鴇似雁無後趾毛有豹文上林賦註一名花豹陸佃曰鴇性淫而無定匹延綏鎮志半翅一名半癡大如鶉見人鳴喚不去故有癡目延綏鎮志啄木此鳥鑿裂樹木取蠧食故名博物志云能以嘴畫字令蟲自出本草綱目有二種山陽縣志志按延安郡志延綏鎮商州華州志俱有之鷦鷯鴟鴞鴟鴞詩經豳風肇允彼桃蟲周頌桃蟲今鷦鷯是也微小于黄雀其雛化而為鵰故俗語鷦鷯生鵰陸疏鴟鴞一名鸋鴂闗西謂之桑飛孔疏桑飛自闗而西或謂之懱爵方言桑飛即鷦鷯也又名鷦鸎懱爵言懱截也郭註為按鴟鴞孔疏以為桑飛朱傳以鵂鶹二說不同今俱存之相思鳥按今長安咸寧皆有之小而灰色置雌雄各一於籠中或放其一雄鳴則雌歸雌鳴則雄歸俱放則皆飛去鶡鴠鷱鴠自闗而西秦隴之内謂之鶡鴠方言鳥似雞五色冬無毛赤倮晝夜鳴鄭註一名寒號蟲夜鳴求旦之鳥也冬月毛脫惟翅尖有硬羽千里之逺求食一處抛糞山陽縣志鷹鴥彼飛隼詩經小雅隼鷂屬也或謂之雀鷹春化為布榖者是也陸疏茂陵少年李亨以鷹鷂逐雉兎皆為之佳名鷹則有青翅黄眸青㝠金距之屬鷂則有從風鷂孤飛鷂西京雜記華州華陰郡貢鷂唐書地理志爾雅翼云在北為鷹在南為鷂一云大為鷹小為鷂本草綱目羽多鷹鷂華州志鸇鴥彼晨風詩經秦風晨風鸇也毛傳似鷂青黄色燕含勾喙向風揺翅乃因風飛急疾擊鳩鴿燕雀食之陸疏鵰似鷹而大尾長翅短土黄色鷙悍多力盤旋空中無細不覩本草綱目中部縣鵰窠窟去城十里鵰鸇孕卵其間至今多出鷙鳥延安府志皂色而大羽翎可箭山陽縣志鶻華州華陰郡土貢鶻唐書地理志同州舊貢鶻華州採鶻于金氏陂寰宇記南按陂在今渭縣有鶻穴於長安薦福浮圖冬之夕取鳥之盈握者完而致之以燠其𤓰掌旦則執而上浮圖之跂焉者縱之其去茍東矣則是日不東逐栁宗元鶻記小於鴟而最猛捷本草綱目鶻善擊鴿咸寧縣志鳶鳶飛戾天詩經大雅鳶鴟之𩔖鳥之貪惡者也鄭箋明皇數登勤政樓毎來鴟必集樓上號隨駕老鴟因話録一名隼一名鷂一名鴟鶻生三子一為鴟鴟似鷹而稍小其尾如舵善髙翔專捉雞雀然不擊胎殺中有仁本草綱目俗名餓老鴟延綏鎮志鷂屬玉篇多雞華州志鴞自闗而西謂梟為流離詩經陸疏鴞即梟也一名鵩本草拾遺訓狐闗西呼訓猴天中記狀如母雞有斑文頭如鴝鵒目如貓目好食桑椹本草綱目訓狐惡語也聲自呼其名兩目如猫大於鸜鵒延綏鎮志鵩土人名釁猴昌黎作訓狐其首如猫又呼樹猫山陽縣志鴟鵂說文謂之角鴟爾雅謂之怪鴟大如鴟鷹黄黒斑色頭目如猫有毛角兩耳晝伏夜出鳴則雌雄相喚聲如老人初若呼後若笑本草綱目俗名鴟怪非茅䲭也爾雅萑老鵵木兎也兎頭有角即此延經鎮志鵂鶹鴟鴞鴟鴞詩經豳風鴟鴞鵂鶹惡鳥攖鳥子而食者也朱子集傳大如鴝鵒毛色如鷂頭目亦如猫鳴則後竅應之其聲連轉如云休留休留故名本草綱目鬼車鳥出秦中春夏之交遇陰晦則飛鳴而過聲如刀車鳴愛入人家鑠人魂氣血滴之家必有凶咎劉恂嶺表録鴆鳥狀似孔雀五色雜斑黒頸赤喙别録陶註出商州以南其肉腥有毒唐本草肥遺英山有鳥焉其狀如鶉黄身而赤喙其名曰肥遺食之已癘可以殺蟲西山經槖􅖦音肥羭次之山有鳥焉其狀如梟人面而一足曰槖􅖦冬見夏蟄服之不畏雷西山經當扈上申之山鳥多當扈其狀如雉以其髯飛食之不眴目西山經浄池鳥大太白池傍有浄池鳥如畫眉而小毛色花紋可愛其聲嘹喨亦不避人人亦莫敢捕之池有片葉寸荑鳥必銜去故名賈鉉太白山禱雨記鵝僖宗好鬬鵝數幸六王宅興慶池與諸王鬬鵝天中記長脰善鳴峩首似傲故曰鵞說文同官無鵞以二羊易一鵞耀州志鴨庶人執鶩周禮春官家鴨曰鶩曲禮孔疏郭璞曰鶩鴨屬也上林賦註雞工商執雞周禮春官雞人掌共雞牲辨其物大祭祀夜嘑旦以嘂百官周禮雞人雞雛闗西曰􅑹方言郭註鼯䑕張揖曰蠝䑕也其狀如兎而䑕首以其髯飛郭璞曰蠝鼯䑕也飛且生一名飛生上林賦註鼯狀如小狐肉翅飛且乳西京賦註司馬君實侍其父知鳳翔府竹園中得如蝙蝠巨如大鴟莫有識者有自南山來者云此鼯䑕也一名飛生飛而生子每欲飛則縁樹至顛能下不能髙也江隣幾雜志闗西山中皆有毛極宻俱向下飛不能至逺人捕取皮為煖帽本草衍義其物飛而生子難産者以皮覆之則易故又名催生馬志褒城縣乾龍洞達華山洞約行三十里其中飛䑕如鳩漢中府志獸屬麟麟之趾詩經周南麕身牛尾馬足黄色圓蹄一角角端有肉音中鐘吕行中規矩行必擇地詳而後處不履生蟲不踐生草不羣居不侣行不入陷阱不罹羅網王者至仁則出陸疏其獸則麒麟上林賦武帝幸雍祀五畤獲白麟一角而五蹄漢書終軍傳騶虞吁嗟乎騶虞詩經召南義獸也白虎黒文不食生物有至信之德則應之毛傳建章宫後閤重櫟中索隱重櫟欄楯之下有重欄處也有物焉其狀似麋詔東方朔視之朔曰所謂騶牙者也其齒前後若一齊等無牙故謂之騶牙禇先生滑稽傳史之說有得獸而莫知其名者東方朔識之曰此所謂騶牙者也則漢武時嘗有獸號騶牙者矣古者音聲之假借以牙為吾故朔所謂騶牙則詩所謂騶虞者爾陸疏廣要屈商拘文王于羑里散宜生乃以千金求天下之珍怪得騶虞以獻淮南子白虎黒文西方之獸也埤雅虎有貓有虎詩經大雅盂山獸多白虎西山經自闗而西謂之伯都方言俗曰伯都事見虎說郭註漢中有虎生角道家云虎千嵗則牙蛻而角生述異記角按說文委虎虎之有者又爾雅云似虎而有角曰虒虎出南北山埤雅云虎知衝破又能畫地卜食此亦獸之靈者也馬志豹赤豹黄羆詩經大雅毛赤而文黒謂之赤豹毛白而文黒謂之白豹孔疏南山多猛豹西山經豹似熊而小毛淺有光澤能食蛇食銅鐵郭註陶谷子妻曰南山有𤣥豹霧雨七日不下食者何也欲以澤其衣毛成其文章也列女傳穆王獵漆澤得𤣥豹潜確類書沈氏筆談云秦人謂豹為程至今延州猶然本草綱目文豹初生無文稍長隱南山霧雨中七日則文彩蔚然𤣥豹毛澤而色黒美于文豹逺甚出終南山中馬志貔獻其貔皮詩經大雅似虎或曰似熊一名執夷一名白狐其子為豰陸疏闗西謂之狸方言郭璞曰貔執夷虎屬上林賦註熊有熊有羆詩經大雅嶓冢之山多熊西山經張揖曰熊犬身人足黒色上林賦註生雍州山谷名醫别録洋州貢寰宇記今雍洛山中有之形類大豕而性輕捷好攀援髙木見人自投于地冬蟄春乃出本草衍義羆嶓冢之山多羆西山經似熊而長頭髙脚猛憨多力能拔樹木闗西呼曰貑熊爾雅羆有黄羆有赤羆大如熊其脂如熊白而麤理不如熊白美也詩經孔疏洋州貢寰宇記兕殪此大兕詩經小雅兕野牛也朱子集傳嶓冢之山獸多犀兕西山經葱聾符禺之水北流注渭其獸多葱聾其狀如羊而赤鬛西山經案駢雅曰羊之異者一角謂之䍶䍶赤鬛謂之葱聾吳任臣注黄腰豰似鼬而大腰以後黄一名黄腰食獮猴上林賦註似黄䑕而大醴泉志野豬陜洛間甚多形如家豬但腹小脚長毛色褐作羣行本草衍義野豬惟闗西者時或有黄似豬而大牙出口外如象其肉有至二三百斤者能與虎鬬啖蛇虺本草綱目毫彘竹山有獸焉其狀如豚而白毛大如笄而黒端名曰毫彘西山經狟豬也夾髀有粗豪長數尺能以脊上毫射物亦自為牝牡郭註發民入南山捕熊羆豪豬長楊賦陜洛諸山中並有髦間有毫如箭能射人圖經本草形如豬毛如笄行動有聲其項脊有鬃長六七寸能以之射人俗呼鸞猪商州志渾身二寸長錐尖利尾長寸許鬃長五寸若笄能低頭拱項以射人中衣而止見虎則體縮而毛立行則如甲響山陽縣志昆駼如馬跂蹄善登髙西京賦註獼猴毋教猱升木詩經小雅猱獼猴也陸疏出南山性好動無休時善避箭善射者莫能中牧圉畜之則馬無疾病馬志出終南諸山唐昭宗時養一猴衣以俳優服謂之猴部頭朱温既簒引至坐側仍賜衣為俳猴忽號擲自裂其衣温叱令殺之馬志猿猴長臂者為猨詩經陸疏𤣥猿素雌上林賦𤣥猿猿之雄者黒色也素雌猿之雌者素色也索隱郭璞曰似獼猴而大長臂便㨗色黒西都賦註商山隱士髙太素嘗居清心亭每至一時即有猿一枚詣亭前鞠躬而啼不易其候太素因目之為報時猿開元天寳遺事出南山形如猴面白性静而仁非若猴之􅏥而惡也馬志鳳縣出黒猴舊志獑猢猨之白腰者為獑胡詩經陸疏張揖曰似獼猴頭上有髦腰以後黒上林賦註獑猢猿𩔖而白西京賦註黒身白腰如帶手有長毛白色似握版之狀本草綱目狖張揖曰蜼似母猴卭鼻而長尾上林賦註倉頡篇曰狖似狸西都賦註狖蜼也尾長四五尺長楊賦註果然一名蜼一名狖狀如猨白面黒頰多髯而毛采斑斕尾長于身喜羣行老者前少者後食相讓居相愛生相聚死相赴栁子所謂仁讓孝慈者是也古者畫蜼為宗彛亦取其孝讓有智也本草綱目玃張揖曰玃似獼猴而大上林賦註郭璞爾雅注曰玃豹形如虎而圓文長楊賦註色蒼黒能人行善攫持人物又善顧盻故謂之玃本草綱目囂羭次之山有獸焉其狀如禺而長臂善投其名曰囂西山經亦在畏獸畫中似獼猴投擲也郭註鹿野有死鹿詩經召南町畽鹿場豳風麀鹿麌麌漆沮之從小雅上申之山獸多白鹿西山經南山多鹿抱朴子唐京師安國寺釋元康貞觀中遊養一鹿角分八岐乘而致逺曽無倦色宋髙僧傳華清宫一鹿十年精俊不衰人呼曰角仙陶榖清異録京師𤣥都觀老鹿將有客來輙夜鳴道士每候之無失潛確類書出南北山鹿性警防分背而食食則相呼羣居則環其角外向以防害馬志白鹿最異間一産于書堂山雒南縣志麋似水牛上林賦註麋子曰䴠西京賦註生南山山谷名醫别録順治五年興平河得一物色青黒頭角如鹿尾如馬之秃者目下别有二竅深寸餘夜能視物據𩔖從云糜也興平志一名馬鹿尾長故名山人以鹿為麋鹿以麋鹿為馬鹿馬鹿陰獸也冬至則角解山陽縣志麞野有死麕詩經召南麕麞也草木疏鹿屬無角朱子集傳秋冬居山春夏居澤似鹿而小黄黒色本草綱目毛多麞華州志麝似麞而小黒色常食栢葉又噉蛇名醫别録陜西山中皆有圖經本草商汝山中多麝遺糞常在一處不移人以是獲之楊億談苑出商州鳳縣鄜州圖書編麝居山麞居澤以此為别本草綱目出終南諸山今商汝山中多羣麝不敢遺跡他所慮為人獲人以是掩羣而取之馬志出商南山形如小鹿馮志麈似鹿而大上林賦註鹿之大者曰麈羣鹿隨之皆視麈尾所轉為準名苑出終南諸山其尾辟塵以置蒨帛中能令嵗久紅色不黦又以拂氊不蠧馬志羣鹿視麈尾為嚮道故古之談者揮焉馮志麂山林處皆有而漢間尤多乃獐𩔖也其皮作履為勝於諸皮圖經本草虎食則醉醉所在麂必鳴以告馬志皮可為靴盩厔縣志毛多麂華州志貍取彼狐狸詩經豳風洋州貢寰宇記一名野猫大小如狐毛雜黄黒本草綱目商按延安漢中郡志及咸寧延綏華州諸志俱有之狐錦衣狐裘詩經秦風有芃者狐小雅狐者妖媚之獸朱子集傳穆王獵漆澤得白狐潛確類書洋州貢寰宇記狐皮毛惡薄不堪為裘咸陽縣志貉一之日于貉詩經豳風貉形如小狐毛黄褐色本草衍義其毛深厚温滑可為裘服性好睡本草綱目獾貛闗西謂之貒方言猯猪獾也獾狗獾也二種相似而畧殊本草綱目獾出清澗馬志出終南山渭南縣志狨生山南山谷中本草綱目楊文公曰狨𩔖䑕而大尾長而金色生陜深山中人以藥矢射殺之取其尾為卧褥鞍被坐氊之用狨甚愛其尾既中毒而囓㫁其尾以擲之惡其為身患陳眉公辟寒録出隴州明一統志似猴而大毛長黄赤色人取其皮作鞍褥馬志狼狼䟦其胡狼㚄其尾詩經豳風盂山獸多白狼西山經豺爾雅曰豺狗足西都賦註處處山中有之狼屬也俗名豺狗其形似狗而頗白前矮後髙長尾本草綱目毛多豺華州志獨角獸寳雞縣有獨角獸樵者見其卧林間或搏虎而食之食輒餘其半山家每得殘虎以飽陳貞父雜録獺郭璞三蒼解詁曰獱似狐青色居水中食魚羽獵賦註獺大者曰獱王氏字說狀如青狐毛色黒膚如伏翼長尾四足水居食魚本草綱目志按延安漢中山陽縣俱有之㸲牛小華之山其獸多㸲牛又西英山禺水出焉其獸多㸲牛西山經今華陰山中多山牛肉千斤即此牛也郭註鎮北大都護府貢犛牛尾唐書地理志牛按犛牛即㸲㸲牛西人呼為竹牛因角理如竹也或云竹即㸲音之轉本草綱目牛誰謂爾無牛爾牛來思其耳濕濕詩經小雅維羊維牛周頌沈牛水牛也能沈沒水中南越志曰潛牛一名沉牛上林賦註五原郡貢􅕳牛唐書地理志牛白頭黄身者為牛中之王農家畜此主大富純黄者尤為上乘咸陽縣志馬有馬白顛駟驖孔阜駕我騏馵騏駵是中騧驪是驂詩經秦風白顛額有白毛今謂之的顙駟驖四馬皆黒色如鐵也馬左足白曰馵赤馬黒鬛曰駵黄馬黒喙曰騧驪黒色也朱子集傳趙髙曰何必華山之騄耳而後行逺乎史記樂書秦馬之良探前趹後蹄間三尋騰者不可勝數張儀傳隴州夏州産馬寰宇記武都出名馬漢中府志駝韋昭曰背上有肉似槖故名槖駝上林賦註夏州産駝寰宇記駝生河西狀如馬其頭似羊長項垂耳脚有三節背有兩肉峰如鞍形有蒼褐黄紫數色力能負重本草綱目神木府谷出葭州志驘駃騠驢驘上林賦驢太武將北征發民驢以運糧使軌部詣雍州軌令驢主皆加絹一疋後魏書公孫表傳張公超隱華陰山常乘驢車唐類函陜西民家有千里驢腰有腎六香祖筆記羬羊華山之首曰錢來之山有獸焉其狀如羊而馬尾名曰羬羊其脂可以已腊又西英山禺水出焉其獸多羬羊西山經羊六尺曰羬爾雅今華陰山中多山羊郭註山羊一名野羊一名羱羊能陟峻阪狀如驢而羣行其角甚大本草綱目羊有山羊商州志麢羊張揖曰埜羊麢羊也似羊而青上林賦註南山商洛間大有今出梁州唐本草今秦隴金商州山中皆有其形似羊青色而大圖經本草雒南縣羚羊山多羚羊西安府志鳳縣出舊縣志野有羚洵陽縣志羊羔羊之皮詩經召南曰殺羔羊豳風小曰羔大曰羊毛傳卜式牧羊上林中史記平準書羖䍽羊出陜西又同華之間有小羊供饌在諸羊之上唐本草隴州産羊保安軍産羊夏州産羊馮翊朝邑許原下有苦泉羊飲之肥而肉美今於泉側置羊牧諺曰苦泉羊洛水漿寰宇記生秦晉者為夏羊頭小身大毛長土人剪其毛以為氊物本草綱目合璧事𩔖云陜西羊最佳馬志朝邑苦泉羊亦肥美同州志蠒耳羊同州沙苑出耳小味美圖書編蠒耳羊出同州或他處羊畜於此大耳羊亦生小耳羊葢其地脉所産然耳馮志蠒耳羊耳如繭尾如扇角如栗肋如筯肉味不羶皆出沙苑中他即有弗良也同州志黄羊闗右塞上有黄羊無角色類麞人取其皮以為衾褥雞肋編黄羊無角善走杜甫云黄羊飫不羶有二種𩔖山羊者瘦𩔖綿羊者肥以尾上有毛者辨之延綏鎮志䍫羊䍫羊出郿縣有峰類駝明一統志背有肉峰出郿縣南山馮志豕壹發五豝壹發五豵詩經召南言私其豵獻豜于公豳風豕牝曰豝毛傳豵一嵗豕豜三嵗豕朱子集傳豬闗西或謂之彘或謂之豕方言梁州曰䝕何承天纂文豬天下畜之而各有不同生梁雍者足短本草綱目犬無使尨也吠詩經召南載獫歇驕秦風尨狗也毛傳獫歇驕田犬名長喙曰獫短喙曰歇驕毛傳茂陵少年李亨好馳駿狗逐狡獸為之佳名狗則有修毫釐睫白望青曹之號楊萬年有獵狗名青駮買之百金西京雜記有田犬守犬二種山陽縣志貓毛則多貓華州志兎肅肅兎罝詩經周南有兎斯首炮之燔之小雅斯白也今俗語斯白之斯作鮮鄭箋兎可供祀典咸寧縣志多食損陽咸陽縣志鼬地猴一名艾猴一名黄䑕狼形極小人馴養之縱入黄䑕穴則銜黄䑕喙曵而出之味極肥美延綏鎮志鼬俗呼䑕狼以食䑕名山陽縣志碩䑕形大如䑕頭似兎尾有毛青黄色好在田中食粟豆闗西呼為䶂䑕爾雅郭註鼫䑕一名䶂䑕一名雀䑕闗西方音轉鼫為䶂訛䶂為雀本草綱目兎䑕頭耳如兎足前短後長亦食禾稼疑即埤雅所謂鼫䑕兎首似䑕而大者延綏鎮志山䑕有害苗者商州志黄䑕出延綏諸地本草綱目生延川清澗神木圖書編孟熈曰北方黄䑕穴處中作小土窖若牀榻之狀則牝牡所居也秋時蓄黍菽及草木之實以禦冬各為小窖别而貯之天氣晴和時出坐穴口見人則拱前腋如揖狀即竄入穴韓孟聨句所謂禮䑕拱而立者是也延綏鎮志黄䑕肥於他處乾州志竹䶉商嶺多脩篁蒼翠連山谷有䑕生其中薦食無厭足王禹偁小畜集竹園中穴地而居惟食竹根門牙尖利肉最肥美山陽縣志䑕誰謂䑕無牙詩經召南穹窒熏䑕豳風張湯杜人也其父為長安丞出湯為兒守舍還而䑕盜肉其父怒笞湯湯掘窟得盜䑕及餘肉劾䑕掠治史記張湯傳唐䑕唐公房城固人白日昇天雞鳴天上犬吠雲中惟以䑕惡留之䑕乃感激以月晦日吐腸胃更生故時人謂之唐䑕水經注松䑕西鄉有之西鄉志㑹䑕即也一名土䑕無目黒色穿土而行天將雨則鳴行必成羣銜尾魚貫而進以目瞽懼顛蹶也延綏鎮志有按葭州志亦之吉靈䑕蒼質白文斑駮可愛走甚駛取皮以佩小兒云能辟不祥今鄉音轉吉靈為格利矣延綏鎮志䑕爾雅云身似䑕而馬蹄長鬚秦人謂之小驢者即此物也本草綱目刺猬一名毛刺一名蝟䑕頭嘴似䑕刺毛似豪猪踡縮則形如芡房及栗房本草綱目醴泉有之醴泉縣志鱗屬龍河津一名龍門巨靈跡猶存水懸下注旁有山水陸不通江海大魚集門下數千上者為龍不上者魚三秦記龍門之下每嵗季春有黄鯉自海及諸川争來赴之一嵗中登龍門者不過七十二初登龍門即有風雨隨之天火自後燒其尾即化為龍林登博物志鱣鮪三月則上渡龍門得渡為龍水經註房琯嘗修學終南山谷中忽聞聲若戞銅器之屬問父老云此龍吟也靈怪録太白池無諸水族惟龍一種時大時小變化出入其中玉皇池東面為龍門有龍可見首類牛而大脣長尺餘兩角嶄然身金黒色其小者或長尺許二尺許蜿蜒池中腥氣撲人觸之頭目岑岑賈鉉太白山禱雨記蛟漢昭帝常遊渭水使羣臣漁釣為樂時有大夫任緒釣得白蛟長三丈若大蛇無鱗甲頭有一角長二尺牙出脣外帝命太官為鮓骨青肉紫味甚美帝後思之使罾者復覔終不可得也拾遺記蛇諸次之山在榆林多衆蛇西山經蛇有數種大毒咸陽縣志反鼻蛇灙谷口多反鼻蛇元和志肥􅖆太華之山有蛇焉名曰肥􅖆六足四翼見則天下大旱西山經青䂎蛇灙谷口多青䂎蛇一名燋尾蛇常登竹木上能十數步䂎人中此蛇者即須斷肌去毒元和志蝮蛇山南漢沔間多有之唐本草蝮蛇害人最毒山陽縣志千嵗蝮狀如蝮而短有四脚圖經本草字林云聽形如蜥蜴出魏興居樹上見人則跳來嚙之嚙已還樹垂頭聽聞哭聲乃去即此也其狀頭尾一般大如搗衣杵俗名合木蛇長一二尺本草綱目花蛇浄避寨内多毒蛇名曰花蛇白河縣志蟒蛇南山有蟒嘘氣成雲人入其中輒僵陳貞父雜録鯉炰鼈鱠鯉詩經小雅出三川門咸寧縣志赤色陳藏器曰從脊當中數至尾無大小皆三十六鱗亦成數也咸陽縣志美惟黒河之鯉盩厔縣志出神木吳堡沿河地方并府谷縣取之黄河味甚佳延安府志郃之瀵池多鯉同州志魚惟黄河紅尾鯉為佳然人不善取發河時最多潼闗衛志鱮孔樂韓土川澤訏訏魴鱮甫甫詩經大雅鱮似魴而頭大謂之鰱詩經陸疏素鱮揚鬐西征賦注鱮似魴西京賦註鱅嚴氏鱅鰱相似而小别鰱頭小鱅頭大陸疏廣要郭璞曰鰫似鰱而黒上林賦註鱒九罭之魚鱒魴詩經豳風似鯶而鱗細於鯶赤眼陸疏今俗人謂之赤眼鱒爾雅鯖似鯇而背正青色本草綱目洵陽有之洵陽縣志鮊形窄腹扁鱗細肉中有細刺本草綱目洵陽有之洵陽縣志鱨魚麗于罶鱨鯊詩經小雅一名黄頰魚似燕頭魚身形厚而長大頰骨正黄魚之大而有力解飛者陸疏鱤一名黄頰上林賦註鱨揚也西京賦註丙穴魚南有嘉魚詩經小雅嘉魚出于沔南之丙穴朱子集傳丙穴在漢中沔陽縣北有魚穴二所常以三月取之蜀都賦註嘉魚穴在上津縣東北百五十里今在山陽境上已日有羣魚出穴大者尺許名曰鱄魚寰宇記嘉魚鯉質鱒鯽肥肉甚美食乳泉出於沔縣丙穴今漢中臨江之山多有之穴口亦不甚大毎遇江漲或霖雨時魚出輒蔽江不可以量計葢穴中山空有淵在内魚生子長養其中然終不能隱有時則出于江也馬志丙穴嘉魚在寧羌州南百里水涸則藏水漲則出其味美詩傳云嘉魚出沔南丙穴是也知州裘龍記曰洞當大丙山之腰絶地者二丈洞有二相隔五十步在左者曰黄魚巨鱗堅甲聳背圓喙在右曰黒魚細黶柔毛尖腮濶眼形不𩔖焉上半嵗春分而出夏至而没下半嵗秋分而至冬至而絶按時而見序不錯焉沔洞之時黄黒不亂各以羣區族不紊焉土人言是山綿亘巴蜀達州有之其味鹹與此不一此則届時而出出則沿洞下瀉或豎木栅或於洞口設筐筥罾罟取之又大安亦有洞曰大魚洞土門鋪之七里亦皆有魚不如兹洞之𩔖廣也漢中府志大丙山下有穴嘉魚産焉寧羌志者按嘉魚産處頗多魚不一類而所謂丙穴則在寧羌州大丙山下俗傳山丙向為丙穴者葢妄也鯽出三川間咸寧縣志似鯉色黒而體促和蓴作羮最良咸陽縣志度水在沔縣南二里一濁澰出鮒鯽也漢中府志鱗則有鯽華州志鯿魴魚赬尾詩經周南廣而薄肥恬而少力細鱗魚之美者陸疏漢中鯿魚甚美禁人捕以槎斷水因謂之槎頭縮項鯿耆舊傳魴一名鯿漢河尤多本草綱目詩稱韓有魴今不可得韓城縣志鱖一名罽魚一名石桂魚扁形濶腹大口細鱗有黒斑彩本草綱目鱖按臨潼志有沙魚鯊魚麗于罶鱨鯊詩經小雅魚狹而小張口吹沙故又名吹沙朱子集傳鯊鮀也西京賦註鑚按今府谷志有沙魚鰷鰷白鰷也詩經周頌毛傳鰷白色其形長而小咸陽縣志白鰷産黄河水性甚駛網罟不易葭州志鱧魚麗于罶魴鱧詩經小雅似鯉頰而厚爾雅曰鱧鮦也陸疏鱧魚名西京賦註首有七星朝夜北斗有自然之禮故謂之鱧形長體圓頭尾相等細鱗𤣥色有斑㸃花文本草綱目鱣猗與漆沮潛有多魚有鱣有鮪詩經周頌鱣身形似龍銳頭口在頷下背上腹下皆有甲陸疏爾雅鱣似鱏西京賦註鮪似鱣而色青黒頭小而尖似鐵兠鍪口亦在頷下舊說鮪從鞏穴而來北入河西上龍門入漆沮詩經陸疏毛萇詩傳曰鮪似鮎西京賦註郭璞云大者名王鮪小者名䱙鮪李竒曰周洛曰鮪本草綱目鰋魚麗于罶鰋鯉詩經小雅鰷鱨鰋鯉周頌鰋鮎也毛傳鰋魚名西京賦註鮎魚葭州出馬志鮎似鱏而小色黒咸陽縣志黄鬚者益人赤鬚赤目者有毒洋縣志鮎魚産黄河葭州志按郭璞云鰋額白魚與諸說異人魚丹水注于洛其中多人魚西山經如䱱魚四脚郭註鰨鯢魚也上林賦註鯢魚一名人魚一名鰨魚聲如小兒即䱱魚之能上樹者秦人名鰨本草綱目人魚俗名娃魚商州志人魚山海經云出洛水豐水亦有之形似鮎有四足皮青腹白能縁木行陸則發水生剥皮乾之能治兒啼故名娃魚山陽縣志出天橋窄口府谷縣志孩按西鄉志有兒魚即此類鮠魚秦人為其發癩呼為䲚魚頭尾身鬐俱似鱘狀惟鼻短耳口亦在頷下骨不柔脆腹似鮎魚背有肉鬐本草綱目花魚四腮狀似松江之鱸産于秋河昔有今無平利縣志䰾魚銳頭圓身力能逆水而上故名延綏鎮志飛魚陜西鄠縣澇水出飛魚狀如鮒食之已痔疾明一統志飛魚出澇河鄠縣志乞物魚夏州産寰宇記石花魚鯉類鱗有金色葭州志中按今石花魚出府谷黄河冬唼石上花味極肥美丹魚丹水出京兆上洛縣出丹魚先夏至十夜浮水側必有赤光上照若火割其血塗足涉水如履平地抱朴子金魚有三尾金色可為盆池之玩咸寧縣志家園池沼中多畜之延安府志鱗多五色金魚華州志鯫魚即青衣魚韻會生潭水中安塞縣志渼陂魚霜筠細破為雙掩中有長魚如卧劍紫荇穿腮氣慘悽紅鱗照坐光磨閃蘇東坡渼陂魚詩渼陂魚甚美唐寳厯二年敕渼陂令尚食使收管不得雜人採捕鄠縣志鰻一名白鱓一名蛇魚似鱓而腹大青黄色本草綱目美惟莫底泉之鰻盩厔縣志鱓大鱓謂之鰬博雅郭璞曰鰬似鱓上林賦註出三川間咸寧縣志似鰻鱺而細長咸陽縣志鰌長三四寸沉于泥中似鱓而小銳首肉身青黒色本草綱目出三川間咸寧縣志度水在沔縣南二里有一清澰出􅧖魚􅧖小鰌也漢中府志鼃秋鼃蝦蟇鬬漢書武帝本紀長安水多鼃魚得以家給人足東方朔傳鼃似蝦蟆而長脚其色青人亦取食之師古注漢唐皆都雍東方朔言水多鼃魚是漢都人食鼃也顔師古言人亦取食之是唐都人食鼃也東臯雜録一名田雞一名青雞闗中常食之如魚本草綱目娑羅泉世傳張三丰養真於此惡蛙聲至今産蛙不鳴寳雞縣志按爾雅鼃列魚類介屬龜太液池中多紫龜西京雜記秦地山中多老龜極大而壽本草衍義龜出洛南河諸水龜舊也外骨内肉腸屬於首廣肩無雄與蛇為匹龜不咽粟葢龜善藏久能行氣導引其背微傴韓子謂穹龜今按天地之氣東生南長西收北藏龜居北方天地閉藏淵黙之地天地至静之所也天下之動唯静者能知之故卜以問馬志龜與蛇交有毒咸陽縣志甲則多龜華州志蟕􅏲其緑甲文似玳瑁能鳴甲亦可卜爾雅郭註即秦龜也唐本草秦人呼蟕􅏲為山龜食物本草鼈炰鼈鮮魚詩經大雅鼈人掌取互物以時簎魚鼈周禮天官太液池中多緑鼈西京雜記闗中諸水皆有之鼈以眼聽穹脊連脇甲蟲也水居陸生養魚經曰魚滿三百六十則龍為之長而引飛出水内有鼈則魚不復去故鼈一名神守卵世云鼈伏隨日謂隨日光所轉朝首東向夕首西向也馬志三爪者謂之能食之令人化水咸陽縣志甲多鼈華州志貝成是貝錦詩經小雅貝水中介蟲也有文彩似錦朱子集傳相貝經曰赤電黒雲謂之紫貝西京賦註䰷魚英山禺水出焉北流注於招水其中多䰷魚其狀如鼈其音如羊西山經事物紺珠曰蚌魚如龜魚尾二足劉鳳雜爼作䰷魚吳任臣注蟹出南北山流泉石下外骨内肉旁行故今俚語謂之螃蟹言外剛内柔而性又火燥故為蟹也神農本草以為蟹性敗漆燒之致䑕蟹性走明漆見之而輙解名之曰蟹似出於此淮南子曰漆見蟹而不乾馬志介則有螃蟹咸寧縣志出渼陂鄠縣志出鄜州宜川延安府志宜川縣白水川水色偏白中有小蟹宜川縣冊郭索浮清澗形小無膏不足供持螯之勝也沔縣志稍泉産蟹三水志按揚雄謂蟹為郭索以其行聲而名之也又按沈括筆談云闗中無蟹土人怪其形狀收乾者懸門辟瘧不但人不識鬼亦不識也此特嘲之云爾今闗内近水郡縣皆有之但小而無肉爾雅云小者名蟛蜞葢此類也土人謂之小石蟹蛤蛤似蚌而圓漢書地理志註志按今咸寧縣志漢中郡俱有之蚌春獻鼈蜃周禮天官蜃蛤蚌也西京賦註蜃秦謂之牡厲說文圓曰蛤長曰蚌漢沔獨多大者長七寸狀如牡蠣小者長三四寸狀如石決明其肉可食其殻可為粉本草綱目螺螄漢沔尤多大如指頭而殻厚于田螺惟食泥水春月人取蒸之其肉自出本草綱目螺出渼陂鄠縣志介則多螺華州志蝦出渼陂鄠縣志蝦小而無肉山陽縣志豸屬蠶蠶月條桑詩經豳風中春詔后帥外内命婦始蠶于北郊周禮天官民不多育咸寧縣志民飼蠶作絲咸陽縣志山人多事蠶山陽縣志四境多桑蟓華州志石蠶形似蠶細小有角節生江漢側石穴中青黒色岐隴間亦有之唐本草蜜蜂蜂子生武都山谷名醫别録蜂三種蜜蜂小而微黄本草綱目蜂𩔖多釀蜜者貴咸寧縣志蜂釀蜜者民亦養之咸陽縣志鳳縣蜜蜂溝多蜜蜂漢中府志白蠟蟲今人不知女貞但呼為蠟樹者立夏前後取蠟蟲之種子裹置枝上半月其蟲化延縁枝上造成白蠟本草綱目白蠟蟲商州有之商州志蝝韋昭曰蝝復陶也可食西京賦註蝝井中小蟲集韻木䖟生漢中川澤名醫别録緑色如蜩蟬蜚䖟狀如蜜蜂黄色唐本草醫方所用䖟蟲即此馬志蜚蠊此蟲辛臭漢中人食之一名石薑亦名盧蜰一名負盤唐本草金州等處有之多在林樹百十為聚山人啖之謂之石薑蜀本草桑蟲蜎蜎者蠋烝在桑野詩經豳風蠋桑蟲也毛傳郭璞云大蟲如指似蠶孔疏螟蛉螟蛉有子詩經小雅螟蛉者犍為文學曰桑上小青蟲也似步屈其色青而細小或在草萊上陸疏蠮螉果蠃負之詩經小雅一名蒲盧似蜂而小腰故許慎云細腰也取桑蟲負之於木空中或書簡筆筒中七日而化為其子里語曰咒云象我象我陸疏蠮螉生熊耳川谷或人屋間名醫别録蠮螉一名果蠃一名蒲盧本草綱目蒲盧喜在竹木壁空中作窠乳子山陽縣志土蜂生武都山谷名醫别録土蜂穴居作房赤黒色本草拾遺土蜂在土中山陽縣志馬蜂即細腰者有四五種山陽縣志崕蜂在山巖髙峻處作房即石蜜也其蜂黒色似牛䖟本草綱目好于髙山石巖下作脾似家蜂脾長丈許蠟佳蜜不甜土人火攻取之山陽縣志有崖蜂釀蜜于崖石間華州志壺盧蜂革蜂乃山中大黄蜂其房有重重如樓臺者一名元瓠蜂方言名壺蜂冦宗奭曰元瓠蜂多在髙木之上或屋之下外面圍如三四斗許或一二斗窠如瓠狀色赤黄大如諸蜂本草綱目其窠形如壺白色有一空作門戸中有格乳蜂長寸許大如指螫人畜死山陽縣志七里逰獨蜂俗名七里蜂斆曰窠大如鵞卵只一蜂大如小石燕子許人馬被螫立亡也本草綱目大蜂長二寸能追螫人於里許故名山陽縣志蟋蟀十月蟋蟀入我牀下詩經豳風似蝗而小正黒有光澤如漆有角翅陸疏一名促織臨潼縣志負蠜趯趯阜螽詩經召南阜螽蝗子一名負蠜陸疏螽一名蚱蜢在草上者曰草螽在土中者曰土螽似草螽而大者曰螽斯似螽斯而細長者曰蟿螽數種皆𩔖蝗而大小不一本草綱目螽螽斯羽詩經周南五月斯螽動股豳風螽斯蜙蝑也毛傳長而青長角長股青色黒斑其股似玳瑁文五月中以兩股相搓作聲聞數十步陸疏蜤螽周南作螽斯七月作斯螽雖字異文倒其實一也爾雅邢疏莎雞六月莎雞振羽詩經豳風如蝗而斑色毛翅數重其翅正赤或謂之天雞六月中飛而振羽索索作聲陸疏爾雅云螒天雞樊光云小蟲黒身赤頭一名莎雞李廵曰一名酸雞郭璞曰樗雞孔疏古今註曰莎雞一名絡緯謂其聲如紡緯也陸疏廣要樗雞出岐州此有二種以五色具者為雄其青黒質白斑者是雌唐本草一名紅娘子秋深生子在樗皮上本草綱目螳螂兩臂如斧當轍不避故得當郎之名俗呼為刀蜋本草綱目土人呼為猴子山陽縣志蟬五月鳴蜩詩經豳風如蜩如螗大雅鳴蜩蟬也螗蟬之大而黒色者有五德文清廉儉信陸疏秦晉之間謂之蟬方言蟬未脫時名轉化相傳言蛣蜣所化秀才韋翾家在杜曲嘗冬中掘樹根轉化附於朽處怪之村人言蟬固朽木所化也翾因剖一視之腹中猶實爛木酉陽雜爼蜣螂一名蛣蜣一名推車客一名夜逰將軍𢎞景曰其𩔖三四種本草綱目俱按今各郡縣志有之蜉蝣秦晉之間謂之蟝方言似天牛而小有甲角出糞土中朝生夕死郭註葛上亭長𢎞景曰此蟲六七月在葛花上黒身赤頭如亭長之著𤣥衣赤幘故名也恭曰出雍州本草綱目斑蝥一名斑猫本草經云春食芫花為芫青夏食葛花為亭長秋食豆花為斑蝥冬入地中為地膽韓保昇曰斑蝥七八月大豆葉上甲蟲也黄黒斑文鳥腹尖喙本草綱目之按臨潼志有蟪蛄秦謂之蛥蚗或謂之蝭蟧或謂之蜓蚞西楚與秦通名也方言此蟲立夏後至夜則鳴聲如蚯蚓月令螻蟈鳴者是也本草衍義螻蛄即土猴山陽縣志居按蟪蛄穴土而本草綱目亦名土狗故有土猴之稱守宫秦晉謂之守宫或謂之蠦􅨦方言俗名蝎虎延長縣志蜥蜴秦晉或謂之蜤易其在澤中者謂之易蜴方言山南處處有之蜀本草石龍子即蜥蜴也俗名蛇屬兒延長縣志蜤蜴俗名蛇䑕頭圓色灰者名沙和尚延綏鎮志比守宫稍大在野間山陽縣志蝎蠀螬梁益之間謂之蛒或謂之蝎或謂之蛭蛒秦晉之間謂之蠧或謂之天螻方言按爾雅云􅕪天螻謂螻蛄耳而方言以為蝎未詳其義也郭註今陜郡皆有之圖經本草全蝎葭州出明一統志醴泉老軍營有蝎子塜人不動土無蝎如動土蝎出無數醴泉縣志蜻蜓所在有之六足四翼好飛水際蜀本草蜻蜓有二種山陽縣志蝴蝶大曰蝶小曰蛾蝶美于鬚蛾美于眉故又名蝴蝶俗謂鬚為胡也其種甚繁皆四翅有粉嗅花以鬚代鼻其交以鼻交則粉退本草綱目蜨有數種山陽縣志蠅營營青蠅詩經小雅建始元年六月有青蠅無萬數集未央宫殿中朝者坐漢書成帝本紀自闗而西秦晉之間謂之蠅方言螢熠燿宵行詩經豳風熠燿燐燐螢火也毛傳豳風熠燿宵行宵行乃蟲名熠燿其光也寇宗奭曰在大暑前後得大火之氣而化故明炤如此本草綱目蚊處處有之冬蟄夏出晝伏夜飛細身利喙本草綱目按郡縣志多有之蠛蠓孫炎曰蠛蠓蟲小於蚊甘泉賦註蜘蛛鼅鼄鼄蝥也自闗而西秦晉之間謂之鼄蝥方言蠨蛸蠨蛸在戸詩經豳風蠨蛸長踦也毛傳一名長脚此蟲著人衣當有親客至孔疏蠨蛸小蜘蛛也朱子集傳䑕婦伊威在室詩經豳風伊威一名委黍一名䑕婦在壁根下甕底土中生似白魚者是也陸疏濕生蟲多足大者長三四分其色如蚓背有横紋蹙起本草衍義壁錢蟲似蜘蛛作白幕如錢貼牆壁間北人呼為壁繭本草拾遺有按各郡縣志俱之蠅虎蠅狐也形似蜘蛛而色灰白善捕蠅一名蠅豹崔豹古今注縣按今處處有之惟永夀載入志壁魚衣魚一名蠧魚一名壁魚别録曰生咸陽平澤本草綱目蠧魚俗名狥蝎子延長縣志土鼈一名地龜生牆壁下土中濕處本草綱目山陽有之山陽縣志蜈蚣蜀圖曰生山南川谷及土石間人家屋壁中身扁而長黒頭赤足本草綱目百足一名馬蚿一名千足一名刀環蟲本草綱目百足蟲長寸餘大如菉豆黒色多足生濕處不傷人刀環蟲大如指長三四寸蒼緑色光明奪目兩邊足似百足觸之則拳曲如環山陽縣志蟲按山陽縣志分百足刀環為二據本草綱目寔一蟲也大小異耳故併之蚯蚓此物有毒崇寧末年隴中兵士暑月跣足為蚯蚓所中遂不救後數日又有人被其毒本草衍義蝤蠐一名木蠧一名蛣􅔒食木蟲也本草綱目醴泉有之醴泉縣志蟻鸛鳴于垤詩經豳風垤蟻塜也朱子集傳祭祀共蠯蠃蚳以授醢人周禮天官西南梁益之間謂之元蚼方言韋昭曰蚳蟻子也可以為醢西京賦註秦中多巨黒蟻好鬬俗呼為馬蟻次有色竊赤者細蟻中有黑者遲鈍力舉等身鐵有竊黄者最有兼弱之智成式兒戲時常以棘刺摽蠅直其來路此蟻觸之而返或去穴一尺或數寸入穴中者如索而出疑有聲而相召也其行每六七有大首者間之整若隊伍至徙蠅時大首者或翼或殿如備異蟻狀也酉陽雜爼顛當成式書齋前每雨後多顛當窠深如蚓穴網絲其中土葢與地平大如榆莢常仰捭其葢伺蠅蠖過輒翻葢捕之纔入復閉與地一色並無絲隙可尋也其形似蜘蛛爾雅謂之王蛛蜴鬼谷謂之蚨母秦中兒童戲曰顛當牢守門蠮螉冦汝無處奔酉陽雜爼碎車蟲狀如唧聊蒼色好棲髙樹上其聲如人吟嘯終南有之酉陽雜爼天牛蟲黒甲蟲也長安夏中此蟲或出於籬壁間必雨成式七度騐之皆應酉陽雜爼一角者名獨角仙本草綱目蚰蜒處處有之墻屋爛草中尤多狀如小蜈蚣而身圓不扁尾後禿而無岐多足大者長寸餘死亦踡屈如環一名入耳一名䖡蚭本草綱目俱按臨潼蒲城諸志有之蝸牛即負殻蜒蚰也日華本草俱按今各郡縣志有之蝙蝠自闗而西秦隴之間謂之蝙蝠方言紅蝙蝠出隴州皆深紅色惟翼脉淺黒多雙伏紅蕉花間采者若獲其一則一不復去北戸録一名仙䑕其矢即夜明砂山陽縣志蝦蟇五月五日取陰乾東行者佳咸陽縣志溪潭河湄最廣夏間鳴聲䀨人安塞縣志蟾蜍俗呼釘子蝦蟆延長縣志其子多蝌蚪延綏鎮志水蛭一名螞蟥一名螞蛭本草綱目志按鳳翔府及西鄉俱有之水馬一名水黽羣逰水上水涸即飛長寸許四脚本草拾遺延長有之延長縣志陜西通志巻四十四
