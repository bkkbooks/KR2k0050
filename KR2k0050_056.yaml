body:
  text: 陜西通志卷五十六人物二廉能上周蘇忿生武王臣周公曰太史司冦蘇公式敬爾由獄以長我王國尚書立政蘇忿生為司冦用能敬其所由之獄培植基本以長我王國蔡注漢何比干字少卿平陵人學尚書於朝錯武帝時為廷尉正與張湯同時湯持法深而比干務仁恕數與湯爭雖不盡得然所活者以千數後遷丹陽都尉獄無寃囚淮汝間號曰何公萬姓統譜張敞字子髙平陽人祖父孺徙茂陵父福官光祿大夫敞後徙杜陵補太守卒史擢豫州刺史數上事有忠言徵為大中大夫以忤大將軍光復出為函谷關都尉徙山陽太守久之渤海膠東盜賊並起徵拜膠東相敞到膠東明設購賞開羣盜令相捕斬除罪由是盜賊解散詔以敞守京兆尹自趙廣漢誅後守尹皆不稱職長安市偷盜尤多敞求問長安父老偷盜酋長數人居皆溫厚出從童騎閭里以為長者敞皆召見責問令致諸偷以自贖偷長願一切受署敞皆以為吏遣歸休置酒小偷悉來賀且飲醉偷長以赭汙其衣裾吏坐里閭閲出者汙赭輒收縛之窮治所犯盡行法罰由是市無偷盜敞為人敏疾見惡輒取時時越法縱舍其治略循趙廣漢之迹然其政頗雜儒雅不純用誅罰以此能自全為京兆九嵗坐與光祿勳楊惲善公卿奏敞不宜處位奏寢不下敞使賊捕拿舜有所案驗舜以敞奏劾當免曰五日京兆耳安能復案事敞聞舜語即部吏收舜繫獄舜當出死敞使主簿持教告舜曰五日京兆竟何如乃棄舜市行寃獄使者奏敞賊殺不辜天子薄其罪下敞坐楊惲免為庶人既數月冀州部中有大賊天子思敞功使召敞拜冀州刺史敞既到部居嵗餘盜賊禁止病卒初敞為京兆尹弟武拜為梁相時梁王驕貴民多豪強號難治敞戒吏問武武意欲以刑法治梁吏還道之敞笑曰武必辦治梁矣既到官其治有迹敞孫竦王莽時至郡守封侯博學文雅過於敞然政事不及也漢書本傳黃霸字次公陽夏人以豪傑役使徙雲陵霸少學律令喜為吏入穀補左馮翊二百石卒史馮翊以霸入財為官不署右職使領郡錢穀計簿書正以廉稱察補河東均輸長復察為河南太守丞霸為人明察內敏又習文法然溫良有讓足知善御衆為丞處議當於法合人心太守甚任之吏民愛敬焉自武帝末俗吏尚嚴酷以為能而霸獨用寬和為名宣帝聞霸持法平召以為廷尉正數決疑獄庭中稱平擢揚州刺史三嵗以賢良髙第為潁川太守時上垂意於治數下恩澤詔書吏不奉宣霸為選擇良吏分部宣布詔令令民咸知上意使郵亭鄉官皆畜雞豚然後為條教置父老師帥伍長班行民間勸以為善防姦之意及節用殖財米鹽靡密初若煩碎然霸精力能推行區處咸稱神明姦人去入他郡盜賊日少霸力行教化而後誅罰務在成就安全長吏許丞老病督郵白欲逐之霸曰許丞廉吏且善助之無失賢者意或問其故霸曰數易長吏送故迎新公私耗費皆出於民所易新吏又未必賢或不如故徒相益為亂凡治道去其泰甚者耳霸以治為天下第一徵守京兆尹以乏軍興貶秩歸潁川太守治如其前前後八年郡中愈治五鳯三年代丙吉為丞相霸材長於治民及為相功名損於治郡時薨諡曰定侯霸為丞相後徙杜陵漢書本傳楊惲字子幼敞子華隂人為郎補常侍騎霍氏謀反惲先聞知以聞封平通侯遷中郎將以法令從事郎謁者有罪輒奏免薦舉其髙第有行能者郎官化之莫不自厲絶請謁貨賂之端令行禁止擢光祿勳惲居殿中廉潔無私郎官稱公平然惲伐其行治又以其能髙人由是多怨於朝廷與太僕戴長樂相失樂上書告惲罪詔免為庶人惲既失爵家居治産業以財自娛其友人安定太守孫會宗知略士也與惲書諌戒之惲報書會有日食變騶馬猥佐成上書告惲章下廷尉案驗得所豫會宗書宣帝見而惡之廷尉當惲大逆無道要斬漢書本傳韓延壽字長公燕人徙杜陵少為郡文學擢諫大夫遷淮陽太守徙潁川潁川多豪強難治趙廣漢為太守患其俗多朋黨構會吏民令相告訐潁川由是為俗延壽欲更之教以禮讓乃厯召郡中長老為鄉里所信向者數十人設酒具食接以禮意問以謠俗為陳和睦親愛銷除怨咎之路長老皆以為便議定嫁娶喪祭儀品略依古禮不得過法於是令文學校官諸生皮辨執俎豆為吏民行禮百姓遵用其教數年徙東郡太守延壽所至必聘其賢士用廣謀議納諫爭修治學宫春秋鄉射陳鐘鼓管絃盛升降揖讓及都試講武設斧鉞旌旗習射御之事又置正五長相率以孝弟不得舍姦人閭里阡陌有非常吏輒聞知姦人莫敢入界其始若煩後皆便安之在東郡三嵗令行禁止斷獄大減為天下最入守左馮翊滿嵗稱職為真嵗餘出行縣至髙陵民有昆弟訟田延壽大傷之曰幸得備位為郡表率不能宣明教化令民骨肉爭訟咎在馮翊當先退因入卧傳舍閉閣思過令丞嗇夫三老亦皆自繫待罪於是訟者宗族傳相責讓兩昆弟深自悔謝終死不敢復爭延壽乃起聽事勞謝令丞以下引見尉薦郡中歙然莫不傳相敕厲二十四縣莫復以辭訟自言者延壽代蕭望之為左馮翊而望之遷御史大夫侍謁者福為望之道延壽在東郡時放散官錢千餘萬會御史當問事東郡因並問之具得其事延壽在東郡時治飾兵車畫龍虎朱雀衣黃紈方領於是望之劾延壽僭上不道延壽竟棄市百姓莫不流涕延壽三子皆為郎吏且死屬其子弗為吏以已為戒子皆去官不仕孫威復為吏至將軍亦多恩信能拊衆得士死力又坐奢僭誅漢書本傳朱博字子元杜陵人家貧少時給事縣為亭長稍遷功曹補安陵丞成帝即位舉櫟陽令徙雲陽平陵三縣以髙第入為長安令京師治理遷冀州刺史行部決遣如神吏民驚服徙琅琊太守齊部舒緩養名博視事數年大改其俗博治郡常用屬縣豪傑以為大吏文武從宜縣有劇賊及他非常輒移書詭責之其盡力有效必加厚賞懷詐不稱誅罰輒行以是豪強慹服入守左馮翊其治左馮翊少愛利敢誅殺然亦縱舍時有大貸下吏以此為盡力遷後將軍坐免嵗餘哀帝即位召為京兆尹數月超為大司空博為人廉儉不好酒色遊宴食不重味好樂士大夫為郡守九卿賓客滿門欲仕者薦舉之欲報仇怨者解劍以帶之其趨事待士如是博以此自立然終用以敗初定陶太后欲稱尊號太后從弟髙武侯傅喜持正議博代孔光為丞相太后怨傅喜諷丞相奏免喜侯博受詔奏喜在位無益於治請免為庶人上知太后素怨喜疑博承指召問狀博詣廷尉自殺漢書本傳侯文京兆人孫寶為京兆尹文以剛直不茍合常稱疾不肯仕寶以恩禮請文欲為布衣友文求署為掾進見如賓禮數月以立秋日署文東部督郵入見敕曰今日鷹隼始擊當順天氣取姦惡以成嚴霜之誅掾部渠有其人乎文曰無其人不敢空受職寶曰誰也文曰霸陵杜稚季寶曰其次文曰豺狼橫道不宜復問狐狸寶默然稚季者大俠與衛尉淳于長厚善寶前失車騎將軍淳于長方貴幸友寶寶亦欲附之始視事而長以稚季托寶故寶窮無以應文文怪寶氣索知其有故因曰明府素著威名今不敢取稚季且當闔閣勿有所問如此竟嵗吏民未敢誣明府也即度稚季而遣他事衆口歡譁終身自墮寶曰受教稚季耳目長聞知之杜門不通水火穿舍後牆為小户但持鋤自治園因文所厚自陳如此文曰我與稚季幸同土壤素無睚眥顧受將令分當相直誠能自改嚴將不治前事即不更心但更門户適趣禍耳稚季遂不敢犯法漢書孫寶傳何並字子廉祖父自平輿徙平陵並為大司空掾事何武武舉為長陵令初卭成太后外家王氏貴侍中王林卿通輕俠傾京師後坐法免賓客愈盛歸長陵上冢因留飲連日先是林卿殺婢壻埋冢舍並具知之以非已時又新免故不發舉欲無令留界中而已即遣吏奉謁傳送林卿素驕慙於賓客既去令騎奴還至寺門拔刀剝其建鼓並自從吏兵追林卿行數十里林卿迫乃令奴自代從間徑馳去會日暮追及收縛奴奴曰我奴耳並心知已失林卿乃叱吏斷頭持還縣所剝鼓置都亭下署曰故侍中王林卿坐殺人埋冢舍使奴剝寺門鼓吏民驚駭以為實死哀帝問狀而善之徙潁川太守時潁川鍾元為尚書令領廷尉弟威為郡掾臧千金並為太守過辭鍾廷尉廷尉免冠為弟請一等之罪並曰罪在弟身與君律不在太守元懼馳遣人呼弟陽翟輕俠趙季李款多畜賓客縱橫郡中聞並至皆亡去並下車求勇猛曉文法吏十人使文吏治三人獄武吏往捕之各持頭還並皆懸頭於市郡中清靜表善好士見紀潁川名次黃霸性清廉妻子不入官舍數年卒子恢王莽擢為關都尉建武中以並孫為郎漢書本傳關並平陵人王莽時徵能治河者以百數其大略異者長水校尉平陵關並言河決率常於平原東郡左右其地形下而土疏惡聞禹治水時本空此地以豫水上古難識近察秦漢以來河決曹衛其南北不過百八十里可空此地勿以為官亭民舍而已大司馬史長安張戎言水性就下行疾則自刮除成空而稍深今西方諸郡以至京師東行民皆引河渭山川水溉田春夏乾燥少水時也故使河流遲貯淤而稍淺雨多水暴至則溢決而國家數隄塞之稍益髙於平地猶築垣而居水也可各順其性毋復灌溉則百川流行水道自利無溢決之害矣漢書溝洫志師古曰新論云並字子陽材智通達也戎字仲功習灌溉事也本志注郭伋字細侯茂陵人髙祖解武帝時以任俠聞父梵為蜀郡太守伋少有志行哀平間辟大司空府遷并州牧更始新立三輔被兵冦百姓震駭更始徵拜左馮翊使鎮撫百姓世祖即位拜雍州牧再轉為尚書令數納忠諫爭建武四年出為中山太守明年轉漁陽太守民多猾惡冦賊充斥伋示以信賞糾戮渠帥盜賊銷散時胸奴數抄郡界伋整敕士馬設攻守之略胸奴逺迹民得安業後潁川盜起徵拜潁川太守伋到郡招懷山賊皆束手詣降十一年調伋為并州牧伋前在并州素結恩德後所到縣邑老幼相攜逢迎道路所過問民疾苦求耆德雄俊朝夕與參政事始行部到西河美稷有童兒數百各騎竹馬迎拜事訖諸兒復送至郭外問使君何日當還伋計日告之既還先期一日伋為違信於諸兒遂止於野亭須期乃入二十二年徵為大中大夫明年卒時年八十六後漢書本傳鮑恢扶風人鮑永為司隸校尉朝廷肅然辟扶風鮑恢為都官從事恢亦抗直不避強禦後漢書鮑永傳孔奮字君魚茂陵人遭王莽亂奮與老母幼弟避兵河西建武五年河西大將軍竇融請署議曹掾守姑臧長姑臧稱為富邑居縣者輒至豐積奮在職四年財産無所增事母孝謹奉養極求珍膳躬率妻子同甘菜茹力行清潔隴蜀既平河西守令咸被徵召奮單車就路吏民斂牛馬器物追送一無所受至京除武都丞時隴西餘賊隗茂等殘殺郡守畏奮追急乃執其妻子為質奮終不顧望窮力討之擒滅茂等奮妻子亦為所殺世祖下詔褒美拜武都太守為政明斷甄善疾非郡中稱為清平弟竒遊學洛陽奮以竒經明當仕上病去官守約鄉閭卒於家竒博通經典作春秋左氏刪奮晚有子嘉官至城門校尉作左氏説云漢書本傳劉寬字文饒華隂人父﨑順帝時為司徒寬桓帝時大將軍辟五遷司徒長史延熹八年拜尚書令遷南陽太守寬仁多恕雖在倉卒中未嘗疾言遽色吏人有過但用蒲鞭罰之示辱而已有功善推之自下災異或見引躬克責每行縣止息亭傳引處士諸生執經對講見父老慰以農里之言少年勉以孝弟之訓人感德興行日有所化靈帝初徵拜大中大夫遷侍中宗正轉光祿勳嘉平五年為太尉封逮鄉侯後漢書本傳史崇字伯勤杜陵人建武中纍官青冀二州刺史治尚寬簡不威而化以功封溧陽侯天下既平詔公侯皆就封因家焉卒諡壯侯江南通志第五倫字伯魚長陵人少有義行為鄉嗇夫京兆尹閻興召為主簿時長安鑄錢多姦巧乃署倫為督鑄錢掾領長安市倫平銓衡正斗斛市無阿枉百姓悅服建武二十七年舉孝廉補淮南國醫工長從王朝京師見帝問以政事倫酬對政道帝大悅明日復特召入與語拜會稽太守躬自斬芻養馬受俸賤貿與民會稽俗多淫祀好卜筮民常以牛祭神百姓困匱倫皆案之後遂斷絶永平五年坐法徵老小啼呼相隨不得前倫乃偽止亭舍隂乘船去及詣廷尉吏民上書守闕者千餘人會帝幸廷尉録囚徒得免歸田里數嵗拜宕渠令遷蜀郡太守蜀地肥饒掾史皆鮮車怒馬以財貨自達倫悉遣還之更選孤貧志行之人以處曹任於是爭賕抑絶文職修理所舉吏多至九卿二千石時以為知人肅宗初立代牟融為司空倫奉公盡節言事無所依違時人方之貢禹元和三年罷卒少子頡厯桂陽廬江南陽太守所在見稱順帝之為太子廢也頡為大中大夫與太僕來厯共固爭帝即位擢將作大匠卒官倫曾孫種字興先少厲志義永壽中以司徒掾清詔使冀州廉察災害舉奏刺史二千石以下甚衆還以奉使稱職拜髙密侯相是時徐兖二州盜賊羣輩髙密在二州之交種大儲糧稸勤厲吏士賊聞皆憚之桴鼓不鳴流民歸者數千家遷兖州刺史中常侍單超兄子匡為濟隂太守負勢貪放種欲收舉聞從事衛羽素抗厲乃召羽馳至定陶收匡賓客四十餘人糾發其贓五六十萬種即奏匡并劾超州內震栗朝廷嗟歎之超遂以事陷種徙朔方初種為衛相以門下掾孫斌賢善遇之及當徙斌具聞超謀乃將俠客晨夜追種遮險格殺送吏遂得脫歸數年徐州從事臧旻上書訟之會赦出卒於家後漢書本傳王況字文伯杜陵人代為三輔名族該總五經志節髙亮為陳留太守性聰敏善行德教永平十五年蝗蟲過陳留界飛逝不集五穀獨豐章和元年詔以况為司徒後漢書虞延傳注廉范字叔度杜陵人曾祖褒成哀間為右將軍祖丹王莽時為大司馬皆有名前世父客死於蜀范年十五辭母西迎父喪蜀郡太守張穆丹故吏乃重資送范范無所受與客步負喪歸葭萌載船觸石破沒范抱持棺柩遂俱沈溺衆傷其義鈎求療救僅免於死歸葬服竟詣京師受業事博士薛漢會漢坐事誅故人門生莫敢視范獨往收斂之由是顯名舉茂材數月再遷為雲中太守會胸奴大入塞范令軍士各交縛兩炬三頭爇火營中星列虜謂漢兵救至大驚待旦將退范令軍中蓐食晨往赴之斬首數百級虜自相轔藉死者千餘人由此不敢復向雲中後頻厯武威武都二郡太守隨俗化導各得治宜建初中遷蜀郡太守其俗尚文辨好相持短長范每厲以淳厚不受偷薄之説舊制禁民夜作以防火災而燒者日屬范毁削前令但嚴使儲水而已百姓為便歌曰廉叔度來何暮不禁火民安作平生無襦今五袴在蜀數年免歸鄉里卒於家後漢書本傳秦彭字伯平茂陵人自漢興之後世位相承六世祖襲為潁川太守與羣從同時為二千石者五人三輔號萬石秦氏彭同産女弟顯宗時為貴人有寵永平七年以彭貴人兄擢開陽城門候十五年拜騎都尉副耿秉北征胸奴建初元年遷山陽太守崇好儒雅敦明庠序每春秋饗射輒修揖讓升降之儀為人設四誡定六親長幼之禮遵奉教化者擢為鄉三老常以八月致酒肉勸勉之吏有過咎罷遣而已不加恥辱興起稻田數千頃每於農月親度頃畝分别肥瘠差為三品各立文簿藏之縣鄉於是姦吏局蹐無所容詐在職六年轉潁川太守有鳯凰麒麟嘉禾甘露之瑞肅宗幸潁川賞賜錢穀恩寵甚異章和二年卒弟惇褒並為射聲校尉後漢書本傳魯恭字仲康平陵人祖父匡有權數號智囊父某為武陵太守卒時恭年十二服喪禮過成人建初初拜中牟令專以德化為理不任刑罰訟人許伯等爭田纍守令不能決恭為平理曲直皆輟耕相讓亭長從人借牛而不還牛主訟於恭恭歎曰是教化不行也欲解印綬去掾吏涕泣共留亭長慚悔還牛建初七年郡國螟傷稼不入中牟河南尹袁安聞之疑不實使仁恕掾肥親往廉之恭隨行阡陌俱坐桑下有雉止其旁旁有兒親曰兒何不捕之兒言雉將雛親瞿然起曰所以來者欲察君之政迹耳今蟲不犯境一異也化及鳥獸二異也豎子有仁心三異也久留徒擾賢者還府具以狀白安安因上書言狀帝異之後拜侍御史和帝遣竇憲擊胸奴恭上疏諫不從拜魯詩博士學者日盛遷樂安相時州多盜恭盡平之永元九年徵拜侍中遷光祿勳為司徒坐事免永初元年復為司徒恭性謙退奏議依經潛有補益然終不自顯以老病策罷卒於家以兩子為郎長子謙為隴西太守有名績後漢書本傳馬稜字伯威援族孫茂陵人少孤依從兄毅恩猶同産毅卒無子稜心喪三年建初中仕郡功曹舉孝廉徵拜謁者章和元年遷廣陵太守民飢奏罷鹽官以利百姓賑貧薄賦興復陂湖溉田二萬餘頃吏民刻石頌之永元二年轉漢陽太守有威嚴稱後江湖多劇賊以梭為丹陽太守發兵掩擊皆擒滅之轉會稽太守治亦有聲永初中卒於家後漢書馬援傳法雄字文強􅔛人世為二千石雄初仕郡功曹舉髙第除平氏長善政事好發擲姦伏吏人畏愛永初三年海賊張伯路等冦濱海九郡徵雄為青州刺史討之連戰破賊斬首溺死者數百人餘賊遁走遼東止海島上五年春乏食復抄東萊間雄擊破之州界清靜雄每行部録囚徒察顔色多得情偽長吏不奉法者皆解印綬去遷南郡太守斷獄省少户口益增郡多虎狼之暴前太守賞募張捕反為所害雄移書屬縣曰至化之世猛獸不擾皆由恩信寬澤仁及飛走太守雖不德敢忘斯義其毁壞檻穽不得妄捕是後虎害消息人以獲安在郡數嵗嵗常豐稔初平中卒官後漢書本傳閻憲字孟度城固人名知人為綿竹令以禮讓為化民莫敢犯男子杜成夜行得遺物一囊中布錦二十五匹求其主還之曰縣有明君何敢負其化童謠歌曰閻尹賦政既明且昶去苛去辟動以禮讓遷蜀郡民泣涕送之以千數漢中士女志作按閻憲華陽國志間慮韋義字季節彪族子杜陵人兄順字叔文平輿令有髙名次兄豹字季明數辟公府輒以事去安帝西巡徵拜議郎義少與二兄齊名初仕州郡太傅桓焉辟舉理劇為廣都長甘陵陳二縣令政甚有績官曹無事牢獄空虛以兄順喪去官比辟公府不就廣都為生立廟及卒三縣吏民舉哀若喪考妣豹子著字休明少以經行知名不應州郡命桓帝公車備禮徵至霸陵稱病歸乃入雲陽山采藥不返靈帝即位中常侍曹節欲借寵時賢以為名白帝就家拜著東海相詔書逼切不得已解巾之郡政任威刑為受罰者所奏又後妻驕恣亂政以之失名隱者恥之後漢書韋彪傳第五訪字仲謀長陵人少孤貧常傭耕以養兄嫂仕郡為功曹察孝廉補新都令政平化行三年之間鄰縣歸之户口十倍遷張掖太守嵗飢開倉賑給吏懼譴爭欲上言訪曰若上須報是棄民也太守樂以一身救百姓遂出穀賦人順帝璽書嘉之由是一郡得全嵗餘官民並豐界無姦盜遷南陽太守去官拜護羌校尉邊境服其威信卒於官後漢書本傳趙瑤字元圭琰字稚圭南鄭人凡七兄弟宣子也皆以令德著聞瑤始為緱氏令遷扶風太守徙蜀郡司空張溫謂之曰昔第五伯魚徙蜀郡為司空掃吾第以待足下矣瑤曰諾尋換廣漢卒琰始為青州刺史部下清肅徙梁相徵拜尚書不就卒漢中士女志宋果字仲乙扶風人以烈氣聞辟公府侍御史并州刺史所在能化後漢書郭泰傳張亮則字元修南鄭人為牂牱太守威著南土永昌越雋夷謀欲反畏則換臨其郡相諫而止號曰卧虎遷護羌校尉徵拜扶風又換臨桂陽皆平盜賊巴郡板楯反拜隆集校尉鎮漢中徙梁州刺史又為魏郡太守所在稱治漢中士女志魏杜畿字伯侯杜陵人少以孝聞年二十守鄭縣令縣囚繫數百人畿裁其輕重決遣之舉孝廉除漢中府丞建安中為司空司直遷護羌校尉使持節領西平太守太祖定河北髙幹舉並州反河東衛固范先與幹通謀拜畿河東太守固等使數千人絶陜津畿遂詭道從郖津度謂衛固范先曰君臣有定義大事當共平議固等喜陽事畿不以為意會吏民多舉城助畿大兵至幹敗固等伏誅河東定畿治有章程郡中化之太祖西征與賊夾渭為軍軍食一仰河東畿在河東十六年為天下最文帝賜爵關內侯徵守司隸校尉帝征吳以畿為尚書僕射統留事受詔作御樓船於陶河試船遇風沒帝為流涕追贈太僕諡戴侯子恕嗣恕字務伯太和中為散騎黃門侍郎論議亢直出為𢎞農守頃之為幽州刺史使持節護烏丸校尉征北將軍程喜劾奏恕下廷尉當死徙章武郡死徙所甘露二年河東樂祥訟畿遺績詔封恕子預豐樂亭侯邑百户三國魏志本傳龎迪扶風人河南尹扶風龎迪以清賢稱魏志邴原傳楊沛字孔渠萬年人初平中為新鄭長太祖輔政遷為長社令時曹洪賓客在縣界徵調不肯如法沛殺之太祖以為能纍遷九江東平樂安太守並有治迹坐髠刑輸作未竟會太祖出征在譙間鄴下頗不奉科禁乃發教選鄴令當得嚴能如楊沛比故沛從徒中起為鄴令軍中豪右畏沛各遣告子弟使各自檢敕關中破代張既領京兆尹沛前後宰厯城守不以私計介意故身退之後家無餘積三國志賈充傳注晉魯芝字世英􅔛人舉孝廉除郎中纍遷尚書郎曹真督關右參大司馬軍事轉天水太守傾心鎮衛更造城市數年間舊境悉復明帝策書嘉歎勉以龔黃之美曹爽輔政引為司馬宣帝起兵誅爽芝斬關出勸爽挾天子保許昌爽不能用芝坐爽下獄當死宣帝赦而不誅使持節領護胸奴中郎將並州刺史以綏輯有方遷大鴻臚晉武踐祚轉鎮東將軍進爵為侯尋徵為光祿大夫卒諡曰貞晉書本傳竇允字雅始平人清尚自修少仕縣稍遷郡主簿舉孝廉除浩亹長勤於為政勸課田蠶平均調役百姓賴之遷謁者拜臨水令克已厲俗士庶咸歌詠之遷巨鹿太守甚有政績卒於官晉書本傳王育字伯春京兆人少孤貧為人牧羊每過小學必欷歔流涕時暇即折蒲學書同郡許子章聞而嘉之給衣食使與子同學遂博通經史太守杜宣命為主簿司徒王渾辟為掾除南武陽令為政清約宿盜逃奔他郡遷並州都護晉書本傳王遜字邵伯魏興人仕郡察孝廉為吏部令史纍遷上洛太守轉魏興太守惠帝末西南夷叛以遜為寧州刺史遜道遇冦賊踰年乃至外逼李雄內有夷冦吏士散沒城邑丘墟遜披荒糾厲收聚離散專仗威刑鞭撻殊俗誅豪右不奉法度者數十家征伐諸夷俘馘千計獲馬及牛羊數萬餘於是威行寧土又遣子澄奉表勸進元帝帝嘉之賜爵褒中縣公李雄遣李驤冦寧州遜使將軍姚崇拒之戰於堂狼大破驤等追至瀘水透水死者千餘人崇以道逺不敢渡水遜以崇不窮追執崇鞭之怒甚髮上衝冠冠為之裂夜中卒州人復立遜中子堅行州事詔除堅寧州刺史諡遜曰壯陶侃慮堅不能抗對徵還京病卒兄澄襲爵厯魏興太守散騎常侍晉書本傳南宋吉翰字休文池陽人初為龍驤將軍道憐參軍為將佐十餘年清謹剛正甚為髙祖所賞永初三年轉道憐大尉司馬出督梁南秦二州諸軍事龍驤將軍梁南秦二州刺史徙益州刺史在益州著美績甚得方伯之體論者稱之六年徵還時太祖經略河南以翰為司州刺史明年假節監徐兖二州豫州之梁郡諸軍事徐州刺史其下畏服莫敢犯刑明年卒官宋書本傳杜驥字度世杜陵人曾祖丹避難河西苻堅平涼州父祖始還關中宋武帝平長安隨從南還驥纍遷長沙王義欣後軍録事參軍元嘉十七年為青冀二州刺史在任八年惠化著於齊土自義熙至於宋末刺史唯羊穆之及驥為吏民所稱詠後徵為左軍將軍兄坦代為刺史北土以為榮坦長子琬為員外散騎侍郎南史本傳梁吉士瞻字梁客蓮勺人少有志氣不事生業梁武起兵義陽太守王撫之天門太守王志遜武陵太守蕭強等並不受命鎮軍蕭穎胄遣士瞻討平之厯秦梁二州刺史加都督又為西陽武昌二郡太守在郡清約家無私積普通七年卒諡曰明子子琨時在戎役聞問一踊而絶良久乃蘇不顧軍制輒離所部遂以孝聞詔下旌異南史本傳北魏韋閬字友觀杜陵人世為冠族祖楷晉長樂清河二郡太守父達慕容垂大長秋閬少有重望世祖徵拜咸陽太守轉武都太守屬郝溫吳愛反關中擾亂閬盡心撫納所部獨全子範厯守華山郡閬兄子禎喜馮翊太守子祉太府少卿祉子義逺岐州刺史祉弟禎有識幹給事黃門侍郎子文殊員外散騎侍郎閬從叔道福安逺將軍子欣宗徐州長史帶彭城內史撫綏內外甚得民和轉大中大夫卒諡曰簡子元睿潁川長史欣宗從父弟合宗東海太守閬從子崇字洪基父肅字道壽劉義真鎮關中辟主簿厯魏興太守崇入國除南潁川太守不好摘發細事郡中大治髙祖聞而嘉賞以為司州中正復為河南邑中正以平直見稱除華山太守卒子猷之前將軍大中大夫魏書本傳冦讚字奉國上谷人徙萬年父修之東萊太守讚少清潔姿容嚴嶷非禮不動除襄邑令姚泓滅秦雍人千餘家推讚為主歸魏拜河南郡太守其後秦雍人來奔河南滎陽河內者户至萬數拜讚南雍州刺史於洛陽立雍之郡縣以撫之由是流人襁負自逺而至參倍於前進爵河南公加安南將軍領南蠻校尉仍刺史分洛豫二州之僑郡以益之在州十七年甚收公私之譽年老致仕卒諡曰宣穆長子元寶豫州别駕子祖徐州刺史子靈孫赭陽太守元寶弟虎皮有才器本縣令弟臻字仙勝居喪以孝稱除𢎞農太守子祖訓順陽太守魏書本傳嚴稜臨晉人遇亂避地河南劉裕以為廣威將軍陳留太守戍倉垣泰常中山陽公奚斤南討稜詣斤降太宗嘉其誠款拜平逺將軍假荆州刺史世祖踐阼除中山太守有清廉之稱年九十卒子稚玉襲爵東兖州刺史卒子量襲爵魏書本傳韋彧字遵度珍子杜陵人有學識為東豫州刺史綏懷蠻左頗得其心蠻首田益宗子魯生魯賢數為冦掠自彧至州咸箋啓修敬不復為害彧以蠻俗荒梗不識禮儀乃表立太學選諸郡生徒於州總教又於城北置崇武館以習武焉境內清肅還遇大將軍京兆王繼西征請為長史拜通直散騎常侍尋以本官兼尚書為豳夏行臺以功封隂盤縣男孝昌元年卒贈雍州刺史諡曰文子彪藍田太守彪弟融以軍功賜爵長安縣公稍遷大司馬開府司馬魏書韋閬傳冦俊字祖俊讚孫萬年人孝昌中朝議以國用不足乃置鹽池都將秩比上郡以俊為之永安初華州民史底與司徒楊椿訟田長史以下以椿勢貴皆言椿直欲以田給椿俊曰史底窮民楊公橫奪其田若欲損不足以給有餘未敢聞命遂以地還史底二年出為左將軍梁州刺史民俗荒獷多為盜賊俊乃令郡縣立庠序勸耕桑敦禮讓數年之中風俗頓革屬魏室多故梁人遣大兵屯魏興志圖進取俊撫勵將士人思效命梁人弗敢逼俊在州清苦不治産業秩滿徒步而還吏人送俊留連於道久之得出界大統二年東魏授俊洛州刺史俊謀歸闕五年入關拜祕書監時典墳散逸俊選置令史抄集經史羣書始備進開府儀同三司卒諡曰元子奉洵州刺史奉弟顒少好學最知名居喪哀毁為典祀下大夫小納言周書本傳陽猛雄父邑陽人父斌上庸郡守正光中万俟醜奴作亂朝廷以猛商洛首望擢大谷鎮將以禦醜奴行河北郡守轉華山郡守移鎮潼關頻典三郡頗有聲績周書本傳楊逸字遵道津子華隂人有當世才度起家員外散騎侍郎給事中建義初莊帝在河陽逸往謁除平東將軍光州刺史逸折節撫綏乃心民務法令嚴明寬猛相濟於是合境肅然莫敢干犯時災儉連嵗人多餓死逸欲以倉粟賑給而所司懼罪不敢逸曰國以人為本人以食為命以此獲戾吾所甘心遂出粟然後申表既出粟後其老小殘疾不能自存活者又於州門煮粥飯之將死而得濟者以萬數逸為政愛人尤憎豪猾廣設耳目其兵吏出使下邑皆自持糧人或為設食者雖在暗室終不進咸言楊使君有千里眼那可欺之在州政績尤美及其家禍爾朱仲逺遣使於州害之吏人如喪親戚城邑村落為營齋供一月之中所在不絶太昌初贈尚書僕射豫州刺史諡曰貞逸子謐厯散騎常侍謐弟遵吏部尚書魏書楊播傳北周薛端英集子夏陽人有志操遭父憂居喪合禮與弟裕勵精篤學不交人事魏孝武西遷周文以為丞相府户曹參軍從擒竇泰復𢎞農戰沙苑並有功纍遷吏部郎中端性強直每有奏請不避權貴轉尚書右丞仍掌選事端久處選曹雅有人倫之鑒其所擢用咸得其才六官建拜軍司馬周孝閔帝踐阼遷户部中大夫晉公護將廢帝召羣臣議之端頗具同異護不悅出為蔡州刺史為政寬惠人吏愛之轉基州刺史基州地接梁陳事藉鎮撫總管史寧催令赴任蔡州父老請留端者千餘人至基州未幾卒諡曰質子胄字紹元性慷慨志立功名隋文帝受禪三遷為兖州刺史到官繫囚數百胄剖斷旬日便了囹圄空虛時人謂為神明先是兖州城東沂泗二水合而南流泛濫大澤中胄遂積石堰之決而西注陂澤盡為良田又通轉運利盡淮海百姓賴之號為薛公豐兖渠轉郢州刺史有惠政檢校相州甚有能名漢王諒作亂並州遣將綦良東攻胄胄欲以計却之遣説良良去朝廷以胄懷二心鎖詣大理相州吏人詣闕理胄者百餘人胄竟坐除名配防嶺南道卒子筠獻知名端弟裕字仁友少以孝弟聞於州里弱冠丞相參軍事尋卒文士誄之者數人北史薛辨傳蘇讓字景恕亮弟武功人幼聰敏好學頗有人倫鑒識初為本州主簿遷武都郡守及太祖為丞相引為府屬甚見親待出為汾州刺史治有善政尋卒官周書蘇亮傳梁昕字元明烏氏人其先因官徙居京兆之盩厔祖重耳漳縣令父勸儒州主簿昕少溫恭見稱州里周文帝軍次雍州昕以三輔望族上謁即授右府長流參軍纍遷丞相府主簿大統十二年除河南郡守遷東荆州刺史昕撫以仁惠蠻夷悅之孝閔踐阼進位驃騎大將軍天和初拜工部中大夫出為陜州總管府長史昕性溫裕有幹能厯官內外咸著聲稱尋卒贈大將軍諡曰貞弟榮厯位下大夫開府儀同三司周書本傳皇甫璠字景瑜三水人世為西州著姓後徙居京兆父和本州治中璠少忠謹有幹略永安中補主簿以勤事被知每蒙褒賞厯官計部下大夫孝閔踐阼進驃騎大將軍開府儀同三司出為隴右總管府長史璠性平和小心奉法安分守志恆以清白自處建德三年授隨州刺史政存簡惠百姓安之卒諡曰恭子諒少知名位至吏部下大夫周書本傳隋于義字慈恭雒陽人父謹從魏武帝入關因家京兆義少矜嚴有操尚篤志好學大統末以父功賜爵平昌縣伯周閔帝受禪纍遷安武太守專崇德惠不尚威刑有郡民張善安王叔兒爭財相訟義曰太守德薄非其罪也取家財倍與兩人喻而遣去善安等各懷愧移貫他州於是風教大洽進封建平郡公及髙祖作相王謙構逆以義為行軍總管謙將達奚惎擁衆據開逺義將左軍擊破之尋拜潼州總管嵗餘以疾歸京師卒諡曰剛隋書本傳王長述霸城人早孤為祖羆所養襲封扶風郡公除中書舍人周受禪出拜廣州刺史甚有威惠吏人懷之後厯襄仁二州總管並有能名及髙祖為丞相授信州總管部內夷獠未賓長述討平之王謙作亂授行軍總管率衆討謙以功進柱國開皇初復上平陳之計上善其能頻加賞勞後病卒諡曰莊隋書本傳韋師字公頴杜陵人少沈謹有至性少丁父母憂居喪盡禮及長涉經史尤工騎射宇文護引為記室轉兵曹參軍師雅知諸蕃風俗及山川險易其有朝貢師必接對論其國俗如指諸掌夷人驚服無敢隱情髙祖受禪遷河北道行臺詔為山東河南十八州安撫大使平陳之役以本官領元帥掾陳國府藏悉委於師秋毫無所犯後除汴州刺史甚有治名卒官諡曰定隋書本傳韋藝字世文洗弟杜陵人周文帝時以軍功致位上儀同髙祖為丞相擊尉迥破尉惇皆有力焉髙祖受禪拜齊州刺史為政清簡士庶懷惠遷營州總管藝容貌瓌瑋每夷狄參謁必整儀衛盛服以見之番人畏懼莫敢仰視大治産業與北夷貿易家資巨萬開皇十五年卒官諡曰懷弟沖字世沖少以名家子釋褐衛公府禮曹參軍稽胡屢為冦亂沖自請安戢之因拜汾州刺史髙祖踐阼進位開府嵗餘發南汾州胡千餘人北築長城在塗皆亡因命沖綏懷叛者月餘皆至並赴長城尋拜石州刺史甚得諸胡歡心以母憂去職起為南寧州總管渠帥爨震及西爨首領皆詣府參謁後檢校括州事時東陽賊帥陶子定吳州賊帥羅慧方聚衆為亂沖率兵擊破之尋拜營州總管寬厚得衆心拜民部尚書未幾卒少子挺最知名隋書韋世康傳蘇孝慈扶風人少沈謹有氣幹從武帝伐齊以功進位開府髙祖受禪拜太府卿時王業初基百度伊始徵天下工匠無不畢集孝慈總其事世以為能拜兵部尚書上於陜州置常平倉轉輸京下於是決渭水為渠以屬河令孝慈督其役渠成上善之數嵗進位大將軍先是以百官供費不足臺省府寺咸置廨錢收息取給孝慈以為官民爭利非興化之道上表請罷之開皇十八年出為浙州刺史仁壽初遷洪州總管俱有惠政其後桂林山越相聚為亂詔孝慈為行軍總管擊平之卒於官隋書本傳于璽字伯符翼子京兆人少有器幹仕周起家右侍上士髙祖受禪拜汴州刺史甚有能名尋轉邵州刺史在州數年甚有恩惠後檢校江陵總管州人張願等數十人詣闕上表請留璽上嘉歎良久令還邵州尋遷洛州刺史復為熊州刺史並有惠政以疾徵還京師卒諡曰靜隋書于仲文傳李圓通涇陽人給使髙祖家初髙祖恆令圓通監厨圓通性嚴整左右婢僕咸所敬憚髙祖作相委以心膂周氏諸王每伺髙祖之隙圖為不利賴圓通保護獲免者數矣髙祖受禪深被任信伐陳之役以功拜揚州總管長史轉並州總管長史秦孝王仁柔自善少斷決府中事多決於圓通煬帝嗣位拜兵部尚書帝幸揚州以圓通留守京師判宇文述田以還民述訴其受賂帝怒而徵之發疾卒子孝常大業末為華隂令隋書本傳唐丘和洛陽人徙居􅔛重氣俠嫻弓馬仕周開府儀同三司入隋為右武衛將軍厯資梁蒲三州刺史以寬惠著名拜代州刺史煬帝北巡饋獻精腆帝用為博陵太守和善撫吏士得其心大業末海南苦吏侵數怨畔帝以和所吏淳良拜交趾太守撫接盡情荒境安之隋亡陳欵歸國謁見髙祖語平生歡甚和時已老以稷州其故鄉也令為刺史以自養卒諡曰襄唐書本傳皇甫無逸字仁儉萬年人厯淯陽太守治為天下最再遷右武衛將軍帝幸江都詔居守洛陽帝被弒乃立越王侗及王世充篡斬關自歸髙祖以無逸本隋勳舊尊遇之拜刑部尚書封滑國公厯陜東道行臺民部尚書遷御史大夫時蜀新定吏多橫恣詔無逸持節巡撫得承制除吏既至除貪暴用廉善法令嚴明蜀人以安還拜民部尚書出為同州刺史徙益州大都督府長史所至輒閉閣不通賓客左右無敢出入者所須皆市易他境嘗按部宿民家鐙炷盡主人將續進無逸抽佩刀斷帶為炷其廉介類如此母在長安疾篤太宗召還憂悸不能食道病卒唐書本傳李襲志字重光安康人仕隋始安郡丞大業末盜起襲志傾私産募士乘城拒盜蕭銑林士𢎞屢攻不下固守二年力窮援絶為銑所陷武德初襲志潛圖歸國趙郡王孝恭承制授桂州總管五年來朝進柱國封始安郡公江州都督後討輔公祏為水軍總管轉桂州都督襲志守桂二十八年政尚清省南荒便之致仕卒弟襲譽字茂實通敏有識度仕隋為冠軍府司兵髙祖定長安拜潞州總管詔委典運以餉東軍擢揚州大都督府長史揚州俗喜商賈襲譽引雷陂水築句城塘溉田八百頃以盡地利民多歸本召為大府卿為人嚴慤居家儉嘗謂子孫曰吾性不喜財遂至窶乏然負京有賜田十頃耕之足以食河內千樹桑事之可以衣江都書力讀可進宦吾殁後能勤此無資於人矣遷涼州都督改同州刺史坐在涼州以私憾杖殺番禾丞廢為民流泉州卒唐書本傳韋仁壽萬年人隋大業末為蜀郡司法書佐髙祖入關擢巂州都督府長史南寧州納款朝廷嵗遣使撫接至率貪沓邊人苦之多叛去帝素聞仁壽治理詔檢校南寧州都督寄治越巂仁壽將兵循西洱河開地數千里置七州十五縣酋豪來見即授以牧宰威令簡嚴人人安悅將還酋長泣曰天子藉公鎮撫奈何欲去我仁壽曰吾奉詔撫循庸敢擅留夷夏父老悲啼祖行遣子弟隨貢方物天子大悅仁壽請徙治南寧州假兵撫定詔可敕益州給兵護送刺史竇軌疾其功訹言山獠方叛未可逺略不時遣嵗餘卒唐書本傳馮立馮翊人有武藝略涉書記隱太子建成引為翊衛車騎將軍建成被誅其左右多逃散立歎曰豈有生受其恩而死逃其難於是率兵犯元武門苦戰久之解兵遁於野俄來請罪太宗慰勉之未幾突厥至便橋立率數百騎與虜戰於咸陽殺獲甚衆太宗聞而嘉歎拜廣州都督不營産業取給衣食而已在職數年甚有惠政卒於官舊唐書本傳謝叔方萬年人初從巢剌王元吉征討數有戰功元吉奏授屈嘻直府左車騎太宗誅隱太子及元吉於元武門叔方率府兵與馮立合軍拒戰秦府護軍尉遲敬德傳元吉首以示之叔方下馬號哭而遁明日出首太宗曰義士也命釋之厯遷西尹二州刺史善綏邊鎮胡戎愛而敬之貞觀末纍加銀青光祿大夫厯洪廣二州都督永徽中卒舊唐書本傳竇靜字元休平陵人髙祖入京師擢並州大總管府長史時突厥數為邊患糧道不屬靜表請屯田太原以省餽運嵗收粟十萬斛詔檢校並州大總管太宗即位授司農卿改夏州都督突厥攜二諸將出征者過靜靜為陳虜中虛實諸將由是大克獲部落皆內附帝嘉之再遷民部尚書卒諡曰肅唐書竇威傳張儉字師約新豐人父植車騎將軍儉以功除右衛郎將遷朔州刺史時頡利可汗方強每有求取所遣書輒稱詔敕邊吏奉承不敢却儉獨拒不受大教民營田嵗收穀數十萬斛州以完安李靖既平突厥有思結部者窮歸於儉儉受而安輯之徙勝州後將不察遽奏思結叛時儉以母喪奪服使撫納之儉單騎入其部召酋帥慰諭咸匍匐歸命因舉徙代州遂檢校代州都督墾田力耕私蓄富實儉恐虜易驕乃建平糴法入之官由是儲斛流贏遷營州都督太宗將征遼東拜行軍總管使領諸蕃騎為六軍前鋒趨建安城破賊纍封皖城郡公永徽初卒諡曰密兄大師太僕卿華州刺史武功縣男弟延師左衛大將軍范陽郡公性謹畏典羽林兵三十年未嘗有過卒諡曰敬儉兄弟三人門皆立戟時號三戟張家唐書本傳韓仲良瑗父三原人武德初與定律令建言周律其屬三千秦漢後約為五百依古則繁請崇寬簡以示維新於是採開皇律宜於時者定之終刑部尚書唐書韓瑗傳唐臨字本德長安人為萬泉丞有輕囚久繫方春農事興臨説令可且出囚使就畎畝不許令移疾臨悉縱歸與之約囚如期還遷侍御史俄持節按獄交州出寃繫三千人纍遷大理卿髙宗常録囚餘司斷者輒紛訴不已獨臨所訊無一言帝問故答曰唐卿斷囚不寃所以絶意帝歎曰為獄者固當如是永徽元年拜御史大夫纍遷吏部尚書坐免官起為潮州刺史卒兄皎武德初為秦王府記室從王征討掌書檄貞觀中官吏部侍郎先選集四時補擬不為限皎請以冬初集盡季春止後遂為法終益州長史子之竒除蒼括令與徐敬業起兵伏誅唐書本傳杜楚客如晦弟杜陵人少尚竒節擢中郎將進蒲州刺史政有能名後為魏王府長史遷工部尚書攝府事以威肅聞揣帝意薄承乾數言王聰睿可為嗣及王貶爵廢於家終虔化令唐書本傳田仁會長安人祖軌幽州刺史父𢎞陵州刺史仁會擢制舉仕纍左武侯中郎將永徽中為平州刺史嵗旱自暴以祈雨大至穀遂登五遷勝州都督境有夙賊依山剽行人仁會發騎捕格夷之城門夜開道無冦迹入為太府少卿遷右金吾將軍晝夜循行有絲毫姦必發京師憚之轉右衛將軍卒諡曰威唐書本傳竇德元威從孫平陵人父彥隋西平郡守德元為髙祖丞相府千牛遷司元太常伯麟德初進檢校左相勤職約已天子臨朝咨其清素卒諡曰恭唐書竇威傳韋𢎞機萬年人祖元禮隋浙州刺史𢎞機仕貞觀時纍遷殿中監顯慶中為檀州刺史以邊人陋僻乃修學宫畫孔子七十二子漢晉名儒像敦勸生徒繇是大化擢司農少卿主東都營田苑宦者犯法杖乃奏遷司農卿初東都方士朱欽遂為武后所寵姦贓狼藉𢎞機白帝逐欽遂於邊后恨之帝將復任為后掎而止孫嶽子武后時為汝州司馬以辨治稱遷永州長史厯廬海等州刺史皆著風迹恩嚴兩施睿宗立召為殿中少監授陜州刺史卒唐書本傳李元紘字大綱其先滑州人後占京兆萬年曾祖粲仕隋為金吾衛大將軍善撫循能得士心髙祖入關以衆歸後為左監門大將軍諡曰明祖寬為太常卿隴西公父道廣為汴州刺史有善政突厥契丹冦河北議發河南兵擊之百姓震擾道廣悉心撫定人無離散遷殿中監同平章事卒諡曰成元紘早修謹仕為雍州司户時太平公主勢震天下嘗與民競碾磑元紘還之民長史竇懷貞大驚趣改之元紘大書判後曰南山可移判不可搖也改好畤令遷潤州司馬以辦治得名開元初為萬年令賦役稱平擢京兆少尹三遷吏部侍郎遂拜中書侍郎門下平章事元紘當國務峻崖檢抑奔競夸進者憚之是時廢京師職田議者欲置屯田元紘曰軍國不同內外異制若人間無役棄地不墾以間手耕棄地省饋運實軍糧屯田為益尚矣今百官職田不一縣百姓私田皆自耕若置屯即當公私相易調發丁夫調役則業棄於家免庸則賦闕於國恐得不補失徒為煩費遂止致仕卒諡文忠唐書本傳權懷恩萬紀族孫萬年人祖𢎞壽佐髙祖平京師擢太僕卿懷恩以廕纍遷尚乘奉御馭人安畢羅為髙宗所寵見帝戲慢不恭懷恩奏事適見之退杖四十帝歎賞曰良吏也擢萬年令賞罰明見惡輒取時語曰寧飲三斗塵無逢權懷恩更慶萊衛邢宋五州刺史洛州長史所居威名赫然吏重足立遷益州大都督府長史卒唐書權萬紀傳楊昉纂從子華隂人武后時為肅機宇文化及子訴治先蔭昉方食未判遽曰肅機而未食庸知天下有寃而求食乎昉怒取牒署曰父弒隋主子訴隋資可乎人服其敏終工部尚書唐書楊𢎞禮傳張知謇字匪躬幽州人徙家岐兄弟五人知元知晦知泰知默皆明經髙第曉吏治清介有守公卿爭為引重知謇厯十一州刺史所蒞有威嚴中宗在房州知謇為刺史供擬保戴不少弛帝復位拜左衛將軍知泰御史臺大夫伯仲華首同貴時以為榮知謇惡請謁求進士不才冒位視之若讐每敕子孫經不明不得舉家法可稱云武后革命知泰奏置東都諸關十七所譏斂出入百姓驚駭卒罷不用知默與監察御史王守慎來俊臣周興掌詔獄卒陷酷吏子孫禁錮為張氏羞知元子景升知泰子景佚開元中皆顯官唐書張知謇傳韋知人字行哲叔謙子萬年人弱而好古以國子舉授校書郎遷司庫員外郎卒子維繩維字文紀進士對策髙第擢武功主簿督役乾陵會嵗飢均力勸功人不知勞徙內江令教民耕桑縣為刻頌遷户部郎中終太子庶子繩舉孝廉厯長安尉威行京師擢監察御史更泗涇鄜三州刺史天寶初入為祕書少監以善職稱終陳王傅虛心字無逸維子舉孝廉遷大理丞侍御史神龍中按大獄據正不撓景龍中屬羌叛既擒捕有詔悉誅虛心惟論酋長死原活其餘遷御史中丞厯荆潞揚三大都督府長史以廬江多盜遂縣舒城盜賊為衰入為工部尚書東京留守卒諡曰貞弟虛舟厯洪魏二州刺史有治名入為刑部侍郎唐書韋湊傳蘇幹瓌從父兄武功人擢明經授徐王府記室參軍王好畋每諫止之垂拱中遷魏州刺史河朔飢幹檢吏督姦勸課農桑以治稱拜右羽林軍將軍遷冬官尚書來俊臣素忌之誣幹與琅琊王沖通書繫獄發憤卒諸子詵字廷言舉賢良方正髙第纍轉給事中出徐州刺史治有迹唐書蘇瓌傳尹思貞長安人弱冠以明經第調隆州參軍事邑豪蒲氏驁肆不法思貞按之擲其姦論死部人稱慶遷明堂令以善政聞檢校洛州刺史會契丹亂朔方震驚思貞境內無擾除青州刺史治州有績蠶至嵗四熟黜陟使路敬歎美曰是非善政致祥乎表言之睿宗立纍遷工部尚書請致仕開元四年卒諡曰簡思貞前後為刺史十三郡其政皆以清最聞唐書本傳韋景駿𢎞機孫萬年人中明經神龍中厯肥鄉令縣北瀕漳連年泛溢人苦之景駿相地勢因髙築鄣水至堤趾輒去其北燥為腴田又維艚以梁其上而廢長橋功少費約後遂為法方河北飢身巡閭里勸人通有無教導撫循民獨免流散後為貴鄉令有母子相訟者景駿曰令少不天常自痛爾幸有親而忘孝耶教之不孚令之罪也因嗚咽流涕授孝經使習大義於是母子感悟請自新後為趙州長史道出肥鄉民皆奉酒食迎犒有小兒亦在中景駿曰兒未生而吾去邑非有舊恩何故來對曰耆老言學廬館舍橋鄣皆公所治意公為古人今幸親見所以來景駿為留終日後遷房州刺史州窮險有蠻夷風無學校好祀淫鬼景駿為諸生貢舉通隘道作傳舍罷祠房無名者轉奉天令未行卒唐書本傳韓思復字紹出長安人少孤年十嵗母為語父亡狀感咽幾絶祖倫特愛之舉秀才髙第調梁府倉曹參軍會大旱輒開倉賑民州劾責對曰人窮則亂不如因而活之無趣為盜賊州不能詘轉汴州司户仁恕不行鞭罰遷滁州刺史州有銅官人鏟鑿尤苦思復為賈他鄙費省獲多有黃芝五生州署民為刻頌其祥徙襄州入拜給事中開元初復為襄州刺史治行名天下卒諡曰文子朝宗初厯左拾遺睿宗詔作乞寒胡戲諫曰乞寒胡非古不法又道路藉藉咸言皇太子微服觀之白龍魚服可深畏也帝稱善特賜中上考開元二十二年以襄州刺史兼山南東道襄州南楚故城有昭王井傳言汲者死行人雖渴困不敢視朝宗移書諭神自是飲者亡恙人更號韓公井天寶初召為京兆尹出為髙平太守貶吳興别駕卒朝宗孫佽字相之性清簡元和初第進士為殿中侍御史纍遷桂管觀察使部二十餘州自參軍至縣令無慮三百員吏部所補才十一餘皆觀察使商才補職佽下車會春服使至鄉有豪猾厚賄使者求為縣令使者請佽佽許之既去召鄉豪責以撓法笞其背自是豪右畏戢時詔置五管監兵盡境賦不足充其費佽處以儉約遂為定制衆以為難唐書本傳韋抗安石從子萬年人弱冠舉明經纍官吏部郎中景雲初為永昌令輦轂煩要抗不事威刑而治遷右御史臺中丞邑民詣闕留不聽乃立碑著其惠開元三年授黃門侍郎俄為御史大夫兼按察京畿弟拯方為萬年令兄弟領本部時以為榮進刑部尚書分掌吏部選卒抗厯職清儉不治産及終無以葬元宗聞之特給槥車諡曰貞唐書韋安石傳李朝隱字光國三原人明法中第調臨汾尉擢大理丞武三思構五王御史鄭愔請誅之朝隱以不經鞫實不宜輕用法忤旨貶聞喜令遷吏部員外時政出權幸內授官但斜封其狀付中書宣所司朝隱執罷千四百員遷長安令宦官閭興貴有所干請曳去之睿宗嘉歎進大中大夫一階以旌剛烈成安公主奪民園不酬直朝隱取主奴杖之由是權豪斂伏開元初遷吏部侍郎銓敘明審久之降滑州刺史徙同州擢河南尹政清嚴姦人不容息太子舅趙常奴怙勢橫閭里朝隱執而榜辱之帝賜書慰勉授岐州刺史召為揚州都督府長史還為大理卿出為嶺南採訪處置使卒於官諡曰貞唐書本傳宇文融萬年人祖節明法令謹幹自將永徽初遷黃門侍郎同中書門下三品融明辨長於吏治開元初由監察御史擢兵部員外郎兼侍御史奏慕容琦等二十九人為勸農判官假御史分按州縣括正邱畝招徠户口於是諸道收沒户八十萬田亦稱是嵗終羡錢數百萬緡帝悅拜御史中丞融乃自請馳傳行天下事無巨細先上勸農使而後上臺省臺省須其意乃行下融所過宣天子恩旨百姓至有感涕者使還言狀帝乃下詔以客賦所在並建常平倉益貯九穀權發斂官司勸作農社使貧富相恤凡農月州縣常務一切罷省使趨刈穫流亡新歸十道各分官屬存撫使遂厥功復業已定州縣季一申牒不須挾名出為魏州刺史河北大水詔領宣撫使俄兼檢校汴州刺史入為鴻臚卿明年進黃門侍郎同平章事司農發融在汴紿隱官息錢巨萬詔流巖州道卒子審融之貶也審與兄弟侍母京師及聞融再貶徒步號泣省父後擢進士第纍遷大理評事以夏楚大小無制始創杖架以髙庳度杖長短又鑄銅為規齊其巨細楊國忠專政殺嶺南人畏議者嫉其酷乃以審為監決處置等使活者甚衆終和永二州刺史唐書本傳楊慎矜華隂人隋齊王曾孫父隆禮厯州刺史以嚴辨名開元初為太府卿時御府財物羡積如山隆禮性詳密出納皆自按省凡物經楊卿者無不精麗嵗常省數百萬以户部尚書致仕卒慎矜沈毅任氣健而才初為汝陽令有治稱隆禮罷太府元宗訪其子可代父任者宰相以慎餘慎矜慎名皆得父清白帝喜擢慎矜監察御史知太府出納慎餘太子舍人主長安倉慎名大理評事為含嘉倉出納使被眷尤渥慎矜遷侍御史知雜事髙置風格始議輸物有汙傷責州縣償所直轉輕齎入京師自是天下調發始煩天寶二年權御史中丞兼諸道鑄錢使擢户部侍郎仍兼中丞明年慎矜父冢草木皆流血懼以問所善胡人史敬忠敬忠使厭之王鉷李林甫作飛牒告慎矜有詔賜死唐書本傳第五琦字禹圭長安人少以吏幹進頗能言強國富民術賀蘭進明才之奏為録事參軍肅宗駐彭原進明遣琦奏事帝悅拜監察御史勾當江淮租庸使遷諸道鹽鐵鑄錢使當軍興隨事趣辦人不益賦而用以饒乾元二年進同平章事貶忠州長史寶應初起為朗州刺史有異政拜太子賓客改京兆尹加判度支鑄錢鹽鐵轉運常平等使坐與魚朝恩善貶括州刺史德宗素聞其才將復用會卒唐書本傳路嗣恭字懿範三原人為蕭關令連徙神烏姑臧二縣考績為天下最轉渭南令主杜化東陽二驛時關畿用兵使人係道嗣恭儲具有素而民不擾後為郭子儀朔方節度留後大將孫守亮驕蹇不受制嗣恭因稱疾守亮至即殺之一軍皆震永泰三年檢校刑部尚書知省事出為江西觀察使以善治財賦稱大厯八年嶺南將哥舒晃殺節度使五嶺大擾詔嗣恭兼嶺南節度使嗣恭募勇敢士八千人由間道出不意斬晃及支黨萬餘俚洞魁宿為惡者皆族夷之拜東都留守卒子應恕應字從衆以廕為著作郎纍遷宣歙觀察使李錡反應發鄉兵救湖常二州錡不能拔元和六年授左散騎常侍卒諡曰靖恕字體仁從嗣恭討哥舒晃賊平恕功多纍遷鄜坊宣歙觀察使以右散騎常侍致仕唐書本傳柳子華華原人公綽諸父始辟嚴武劍南府纍遷池州刺史代宗將幸華清先命完葺以子華為昭應令檢校金部郎中修宫使設棘圍於市徇邑中曰民有得華清宫瓦石材用投圍中踰三日不還者死不終日已山積營辦略足宰相元載有别墅以奴主務自稱郎將怙勢縱暴租賦未嘗入官子華因奴入謁收付獄杖殺之一邑震伏載不敢怨子公度善攝生年八十餘有強力唐書柳公綽傳蕭定字梅臣瑀曾孫長安人以廕起家陜州參軍事金城丞蒞事清挺選補黜陟使裴遵慶表為判官還調萬年主簿厯左右司郎中為元載所惡外遷袁潤等六州刺史大厯中有司差天下刺史治最定與常州蕭復濠州張鎰為第一而劭桑稼均賦稅業徠遊口在鎰復右遷户部侍郎太常卿朱泚反詭姓名為張誕匿里中不浼於賊事平擢太子少師卒唐書蕭瑀傳韓滉字大沖休子長安人廕補左威衛騎曹參軍性強直明吏事蒞南曹五年簿最詳緻再遷右丞知吏部選以户部侍郎判度支德宗立遷浙江東西觀察使尋檢校禮部尚書為鎮海軍節度使綏輯百姓均租調不踰年境內稱治帝在奉天滉訓士卒分兵戍河南既狩梁州又獻縑十萬匹請以鎮兵三萬助討賊有詔嘉勞進檢校尚書右僕射滉聞京師未平調發糧帛以濟朝廷當時實賴之李晟方屯渭北滉運米饋之漕船臨江滉顧僚吏曰天子蒙塵臣下之恥乃自舉一囊將佐爭負之貞元元年加檢校左僕射同平章事江淮轉運使封鄭國公更封晉卒諡曰忠肅子羣臯羣終國子司業臯字仲聞由雲陽尉厯東都留守忠武軍節度使大抵以簡儉治所至有績拜吏部尚書進左僕射卒諡曰貞洄字幼深滉弟安祿山亂避難江南乾元中授睦州别駕德宗即位復為諫議大夫擢户部侍郎判度支洄上言天下銅鐵乃山澤利當歸王者請悉隸鹽鐵使從之復罷省胥吏冗食二千人積米長安萬年二縣各數十萬石視年豐耗而發斂焉故人不艱食終國子祭酒唐書韓休傳韋夏卿字雲客萬年人少邃於學善文辭大厯中與弟正卿同舉賢良方正皆策髙等纍遷刑部員外郎授奉天令課第一後為吏部侍郎時從兄執誼在翰林受人金有所干請密以金納夏卿懷中夏卿毁懷不受曰吾與爾賴先人遺德致位及此顧當如是哉執誼大慚改太子少保卒諡曰獻夏卿為政務通理不甚作條教所辟士多至宰相達官世稱知人正卿子瓘字茂𢎞桂管觀察使唐書本傳奚陟字殷卿京兆人少篤志通羣書大厯末擢進士授校書郎居親喪毁瘠過禮厯遷中書舍人江南淮西皆大水詔陟勞問循慰所至人人便安中書吏倚宰相勢陟遇之無假借雖細務皆身親久益強力人以為難遷刑部侍郎京兆尹李充有美政裴延齡誣劾充逮繫搒掠甚急陟持平具獄上充免進工部尚書諡曰憲唐書本傳王紹自太原徙京兆父端第進士有名天寶間終工部員外郎紹少為顔真卿所器奏為武康尉包佶領租庸鹽鐵使署判官時李希烈阻兵江淮輸物留梗乃徙餉道自潁入汴紹入關德宗已西狩乃督輕貨趨間道走洋州見行在由是紓難遷倉部員外郎頃之遷尚書元和初檢校尚書右僕射為武寧軍節度使搜輯軍政推誠示人裨將安進達唐重靖謀亂紹以計取之出家資賞士舉軍安賴拜兵部尚書判户部卒諡曰敬唐書本傳嚴綬挺之從孫華隂人擢進士第以侍御史副劉贊為宣歙團練使贊卒綬總留事悉庫物以獻召為刑部員外郎河東軍司馬鄭儋為節度德宗頗憶綬所獻擢河東司馬儋卒代其使在鎮九年尚寬惠治稱流聞士馬孳息嘗大閲旗幟周七十里回鶻梅録將軍在會聞金鼓震伏入為尚書右僕射吳元濟反徙山南東道節度使加淮西招撫使召還進太傅卒綬才不踰中人然歷三鎮所奏辟及綬時位將相者九人河東李進賢為振武節度使辟綬子徹為判官徹年少治苛刻軍中苦之乃殺徹唐書嚴挺之傳徐申字維降京兆人擢進士第纍遷韶州刺史韶自兵興四十年刺史以縣為治署令丞雜處民間申按公田之廢者募人假牛犁墾發田久不治故肥美嵗入凡三萬斛乃徙治故州未幾邑閈如初始來韶户止七千比六年倍而半之會初置景州授刺史賜錢五十萬加節度副使進嶺南節度使前使死吏盜印署府職百餘員畏事泄謀作亂申覺殺之詿誤一不問外蕃嵗以珠玳瑁香文犀浮海至申於常貢外未嘗賸索商賈饒盈加檢校禮部尚書封東海郡公卒諡曰平唐書本傳任迪簡萬年人擢進士第天德李景略表佐其軍軍中悅其長者景略卒舉軍請為帥監軍使拘迪簡不聽衆大呼破户出之德宗遣使察變具得所以乃授豐州刺史天德軍使入為太常少卿太子左庶子張茂昭以易定歸迪簡以檢校工部尚書為節度使承茂昭奢縱後公私屈覂欲饗士無所給至與下同糲食踰月軍中感其公三年上下完充以疾入除工部侍郎卒諡曰襄唐書本傳杜佑字君卿萬年人以廕補剡縣丞嘗過潤州刺史韋元甫有疑獄不決試訊佑佑為辨處契要無不盡元甫竒之署司法參軍入為工部郎中楊炎輔政改度支兼和糴使於是軍興餽漕佑得剸決以户部侍郎判度支俄遷嶺南節度使疏析㕓閈以息火災朱崖黎氏三世不賓佑討平之召拜尚書右丞俄出為淮南節度使決雷陂以廣灌溉斥海瀕棄地為田積米五十萬斛列營三十區士馬整飭四鄰畏之拜檢校司空同平章事德宗崩詔攝冢宰進檢校司徒兼度支鹽鐵使始度支嗇用度多署吏權攝百司繁而不綱佑以營繕還將作木炭歸司農涷染還少府職務簡修明年拜司徒封岐國公致仕卒諡曰安簡佑天性精於吏職議者稱治行無缺云唐書本傳韋武待價曾孫萬年人少孤年十一補右千牛纍遷長安丞德宗幸梁州委妻子奔行在除殿中侍御史轉刑部員外郎是時帝以反正告郊廟大兵後典章茍完執事者時時咨武武酌宜約用得禮之衷羣司奉焉後為絳州刺史鑿汾水灌田萬三千餘頃璽書勞勉憲宗時入為京兆尹卒唐書韋挺傳柳公綽字寬華原人幼孝友性質嚴重舉直言極諫授渭南尉嵗歉饉其家雖給每飯不過一器或問之答曰四方病飢獨能飽乎召為吏部郎中憲宗數出遊畋公綽奏大醫針以諷天子髙其才拜御史中丞出為湖南觀察使徙鄂嶽時方討吳元濟詔發鄂嶽卒五千隸安州刺史李聽公綽請自行許之三軍出公綽數省問其家疾病生死厚給之軍中感服鄂軍每戰輒克拜京兆尹方赴府有神策軍校乘馬不避者即時榜死帝怒其專殺公綽曰此非獨試臣乃輕陛下法俄檢校户部尚書山南東道節度使行部至鄧縣吏有納賄舞文二人同繫獄縣令以公綽素持法謂必殺貪者公綽曰贓吏犯法法在姦吏壞法法亡誅舞文者入為刑部尚書俄拜邠寧節度使先時神策諸鎮列屯部中不聽本道節制故虜得窺間公綽論所宜屯營緩急悉受節度復為刑部尚書京兆獄有姑鞭婦至死者府欲殺之公綽曰尊毆卑非鬭也且子在以妻而戮其母不順遂減論太和四年為河東節度遭嵗惡樽節用度輟宴飲衣食與士卒均以病乞代授兵部尚書忽顧左右召故吏韋長衆謂委以家事及長至乃曰為我白宰相徐州專殺李聽親吏非用髙瑀不能安因瞑目卒諡曰元子仲郢幼嗜學長工文元和末及進士第為校書郎會昌初纍轉吏部郎中遷左諫議大夫武宗延方士築望仙臺纍諫諄切帝遣中人愧諭拜京兆尹置權量於東西市使貿易用之禁私製者北司吏入粟違約仲郢殺而尸之自是人無敢犯政號嚴明宣宗初授河南尹以寬惠為政或言不類京兆時答曰輦轂之下先彈壓郡邑之治本惠養烏可類乎擢劍南東川節度使大吏邊章簡挾勢肆貪前帥不能治仲郢因事殺之官下肅然居五年詔為吏部侍郎俄改兵部領鹽鐵轉運使大中十二年罷使咸通五年為天平節度使卒於鎮子圭璧玭圭字交元大中中與璧繼擢進士皆秀整而文終衛尉少卿璧字賓玉馬植鎮汴州辟管書記又從李瓚桂州規正其不法瓚不聽乃拂衣去未幾軍亂擢右補闕纍遷右諫議大夫玭以明經補祕書正字擢刑部員外郎出為嶺南節度副使文德元年以吏部侍郎修國史拜御史大夫直清有父風唐書本傳蘇辨字元容世長從孫武功人擢進士調奉天主簿德宗出狩縣令計事在府官屬皆惶恐欲遁走辨曰昔肅宗幸靈武至新平安定二太守坐伏匿斬諸君知之乎衆乃定車駕至儲偫畢給帝嘉之試大理司直朱泚平進監察御史擢纍倉部郎中判度支案裴延齡死召見延英賜紫衣金魚以度支郎副知度支事辨通學術吏事精明承延齡後平賦緩役略煩苛人賴其寬久之遷户部侍郎判度支改太子詹事坐前以腐粟給邊貶汀州司户參軍數年起辨為滁州刺史卒唐書蘇世長傳馬總字會元系出扶風少孤窶不妄交遊貞元中辟署滑州姚南仲幕府元和中以虔州刺史遷安南都護廉清不撓用儒術教其俗政事嘉美獠夷安之十二年副裴度宣慰淮西吳元濟禽為彰義節度留後蔡習偽惡總為設教令明賞罰磨治洗汰其俗一變始奏改彰義為淮西擢淮西節度使徙天平入為户部尚書卒諡曰懿唐書本傳楊於陵字達夫本漢太尉震之裔擢進士調句容主簿入為繕部員外郎德宗聞其名拜中書舍人遷浙東觀察使越人飢請出米三十萬石贍貧民政聲流聞入為京兆尹先是編民多竄北軍籍中倚以橫閭里於陵請限丁制減三丁者不得著籍姦人無所影賴京師豪右大震遷户部侍郎出為嶺南節度使教民陶瓦易蒲屋以絶火患監軍許遂振悍戾貪肆憚於陵不敢撓以私為飛語聞京師有詔罷歸授吏部侍郎穆宗立以尚書左僕射致仕於陵器量方峻節操堅明始終不失其正時人尊仰之卒贈司空諡曰貞子景復同州刺史紹復中書舍人師復大理卿嗣復位宰相唐書本傳嗣復字繼之擢進士博學宏詞善禮家學遷禮部員外郎與牛僧儒李閔宗雅相善二人輔政引之權知禮部侍郎俄同平章事武宗之立非宰相意故用李德裕而罷嗣復貶潮州刺史宣宗立以吏部尚書召道卒子授損授字得符於昆弟最賢由進士第遷纍刑部尚書從昭宗幸華徙太子少保損字子默由廕補藍田尉遷給事中陜虢軍亂逐節度使崔蕘命損代之至則盡誅有罪者徙天平卒唐書楊嗣復傳韋丹字文明萬年人髙祖琨以洗馬事太子承乾諫不聽太宗才之擢給事中孝敬為太子琨以右中護為詹事卒諡曰貞丹從外祖顔真卿學舉五經髙第厯咸陽尉拜容州刺史教民耕織止惰遊興學校民貧自鬻者贖歸之禁吏不得掠為隸屯田二十四所教種茶麥仁化大行以諫議大夫召有直名拜江南西道觀察使丹計口受俸委餘於官罷八州冗食者收其財始民不知為瓦屋丹召工教為陶聚材於場度其費為估不取贏利人能為屋者受材瓦於官免半賦貧不能者畀以材置南北市為營以舍軍嵗中旱募人就功厚與直給其食為衢南北夾兩營東西七里以廢倉為新廏馬息不死築堤扞江長十二里為陂塘五百九十八所灌田萬二千頃有吏主倉十年丹覆其糧亡三千斛丹籍其家盡得文記乃權吏所奪丹召諸吏期一月還之及期無敢違卒年五十八子宙為永州刺史州方災歉乃斥官下什用所以供刺史者得九十餘萬錢為市糧餉俗不知法多觸罪宙為書制律并種植為生之宜户給之州負嶺轉餉艱險宙始築常平倉收穀羡餘以待乏罷冗役九百四十四員湘源生零陵香嵗市上貢人苦之宙奏罷民貧無牛以力耕宙為置社二十家月會錢若干探名得者先市牛以是為準久之牛不乏立學官取仕家子弟十五人充之禮俗遂改還為大理少卿久之拜江西觀察使遷嶺南節度使南詔陷交址撫兵積備以幹聞加檢校尚書左僕射同平章事咸通中卒弟岫字伯起亦有名擢福建觀察使唐書本傳程異字師舉長安人居鄉以孝稱第明經再補鄭尉精吏治李巽領鹽鐵薦異心計可任稍遷淮南等道兩稅使異厲已竭節悉革征利舊弊遷鹽鐵轉運副使方討蔡異使江表調財用因行諭諸帥府以羡贏貢故所至不剝下不加斂經用以饒元和十三年以工部侍郎同平章事猶領鹽鐵異自以非人望久不敢當印秉筆明年議置巡邊使憲宗問孰可者乃自請行會卒諡曰恭身殁官第無留資世重其廉云唐書本傳李願晟子萬年人元和初領夏綏銀宥節度使政簡而嚴部有失馬者願署牒於道以金購之三日失馬並良馬一繫署下且曰逸而至不告罪當死以良馬一贖願歸失馬而縱其良境內肅然徙武寧軍會伐青鄆數有功以久疾用訴代之詔為刑部尚書俄檢校尚書左僕射節度鳯翔自是邇聲色而政衰矣後拜河中晉絳等節度使卒弟憲任醴泉尉遷衛州刺史以治行稱徙絳州絳有幻人怵民以亂憲執誅之河中兵本仰食於絳而汾可輸河渭嵗租與糴常數十萬石故敖保山為固民之輸者十牛不勝一車憲濱汾相地治新倉當費二百萬請留垣縣粟糶河南以錢還糴絳粟既免負載勞又權其贏以完新倉絳人賴利入為宗正少卿副金吾大將軍胡證為送太和公主使遷嶺南節度使所厯皆以吏能顯政績暴著善治律令性明恕詳正大獄活無罪者數百人卒官聽字正思七嵗廕為協律郎吐突承璀討王承宗以聽為神策行營兵馬使斬賊驍將承璀數問聽計卒縛盧從史遷左驍衛將軍出為蔚州刺史州有銅冶聽開五爐鑄錢柳公綽討蔡以聽典軍一一咨之詔為羽林將軍帝討李師道出為楚州刺史聽掩賊不虞趨漣水破沭陽遂取海州攻朐山降之懷仁東海兩城望風送款以功兼御史大夫夏綏銀宥節度使又徙靈鹽部有光祿渠久廢聽復屯田以省轉餉引渠溉塞下地千頃穆宗初立授檢校兵部尚書充河東節度使敬宗嗣位改義成軍太和初魏博將丌志沼反擊其帥史憲誠詔聽出援擊殺志沼以功封涼國公兼帥魏博聽遷延不即赴魏遂亂殺憲誠罷為太子少師開成初為河東節度使文宗歎曰付之兵不疑退處散地不怨唯聽為可拜太子太保卒子琢以家閥纍擢節度使廣明時沙陀盜邊琢為宿將拜都統行營節度使坐逗撓下遷刺史卒唐書李晟傳崔倰字德長長安人祐甫從子性介潔視贓負者若讐以蘇州刺史奏課第一遷湖南觀察使湖南舊法貿易不出境鄰郡災荒不恤也倰至削其禁自是商賈流通資物益饒入為户部侍郎判度支唐書崔沔傳令狐楚德棻後裔華原人貢進士纍擢職方員外郎知制誥其為文於箋奏制令尤善為華州刺史擢河陽節度使代烏重引重引徙滄州以河陽士三千從士不樂半道潰歸將掠旁州楚以數騎自往勞之斬其首惡衆遂定穆宗即位進門下侍郎方營景陵詔楚為使出為宣歙觀察使遷宣武節度使汴軍驕韓𢎞峻法繩治楚至解去酷烈以仁惠鐫諭人人悅喜徙天平召為吏部尚書進拜左僕射彭陽郡公是時政在宦豎數上疏辭位拜山南西道節度使卒諡曰文子緒綯緒厯隋汝壽三州刺史有佳政綯擢進士纍擢湖州刺史大中初召入為翰林學士遷御史中丞俄同平章事懿宗嗣位為河中節度使徙淮南安南平以饋運勞封涼國公僖宗立拜鳯翔節度使徙封趙卒楚弟定桂管觀察使唐書本傳竇易直字宗元始平人擢明經補校書郎纍遷吏部郎中元和六年進御史中丞由陜虢觀察使入為京兆尹貶金州刺史起為宣歙浙西觀察使時江淮部將王國清激衆謀亂易直知之械國清送獄其黨數千篡取之欲大剽易直登樓令曰能誅亂者一級賞千萬衆喜反縛為亂者三百餘人易直悉斬之入為户部侍郎判度支同中書平章事文宗立檢校尚書右僕射頃之檢校司空為鳯翔節度卒諡恭惠易直以公潔自喜方執政未嘗引用親黨唐書本傳盧鈞字子和系出范陽徙藍田舉進士中第補祕書正字遷御史拜華州刺史關輔驛馬疲耗鈞為市健馬率三嵗一易自是無乏事擢嶺南節度使時稱潔廉蕃獠與華人錯居相婚嫁多占田營第舍吏或撓之則相挺為亂鈞下令不得通婚禁占田産闔部無敢犯貞元後流放衣冠其子姓窮弱不能自還者以俸稟資助凡數百家又除采金稅會昌中漢水害襄陽拜山南東道節度使築隄以障漢暴王師伐劉稹武宗以鈞寬厚能得衆詔兼節度昭義軍宣宗即位節度河東大中九年召為左僕射帝元日大饗含元殿鈞年八十升降如儀音吐鴻暢帝以鈞同平章事為山南西道節度使懿宗初以太保致仕卒諡曰元鈞與人交始若淡薄既久乃益固所居官必有績大抵根仁恕至誠而施於事位將相沒而無贏財唐書本傳韋正貫字公理臯弟子萬年人舉賢良方正異等進壽州團練使宣宗立以治最拜京兆尹俄擢嶺南節度使南海舶賈始至大帥必取象犀明珠上珍而售以下直正貫既至無所取吏咨其清南方風俗右鬼正貫毁淫祠教民無妄祈會海水溢人爭咎撤祠事正貫登城沃酒以誓曰不當神意長人任其咎無逮下民俄而水去民乃信之居鎮三嵗卒唐書韋臯傳杜審權字殷衡元絳子杜陵人第進士宣宗時入翰林為學士纍遷兵部侍郎出為鎮海軍節度使龎勛反審權與令狐綯連師犄角饋粟相銜王師賴濟勛破進檢校司空繼領河中忠武節度使卒贈太子太師諡曰德唐書杜如晦傳蕭倣字思道悟子長安人太和中擢進士第除纍給事中宣宗嘗以李璲為嶺南節度使使者已賜節而倣封還詔書令狐綯用李琢經略安南琢以暴沓免俄起為壽州團練使倣劾奏琢無所回時推其直自集賢學士拜嶺南節度使南方珍賄叢夥不以入門家人病取稿梅於厨以和劑倣知趣市還之咸通初為左散騎常侍懿宗怠政事喜佛道引桑門入禁中為禱祠事數幸佛廬廣施豫倣諫以為天竺法割愛取滅非帝王所尚慕帝雖昏縱猶嘉歎其言後官數遷拜義成軍節度使滑州瀕河纍嵗水壞西北防倣徙其流逺去樹堤自固人得以安以兵部尚書再判度支進中書侍郎同平章事再遷司空蘭陵縣侯時天下盜起宦人持兵柄倣以鯁直為權近所忌卒年八十子廩字富侯第進士遷尚書郎倣嶺南海解官往侍為人退約少合南海多榖紙倣敕諸子繕補殘書廩諫曰州距京師且萬里書成不可露齎必貯以囊笥貪者伺望得無薏苡嫌乎倣曰善吾思不及此乃止廣明初以諫議大夫知制誥請厲止夜行以備賊諜出太倉粟賤估以濟貧民俄遷京兆尹田令孜養子有罪捕吏繫獄請救踵門廩不納杖殺之內外畏讋令孜拒黃巢以廩為糧料使辭疾貶賀州司户參軍事會襄王竊據挈族逃河朔卒唐書蕭瑀傳楊發字至之收兄馮翊人登進士又中拔萃纍官左司郎中宣宗追加順憲二宗尊號有司議改造廟主發執不可知禮者韙之改太常少卿為蘇州刺史治以恭長慈幼為先尋徙福建觀察使又以能政聞弟假常州刺史儼兵部侍郎子陟注陟哀帝時同平章事以謙靖免於禍注户部侍郎唐書本傳宋楊克讓字慶孫馮翊人髙祖公略洪州都督克讓厯鳯翔司録參軍母老解官歸養太祖素知其名起為左補闕開寶三年命為西川轉運副使蜀民懷其善政璽書褒美代歸闕下疏民利病十事稱旨太平興國初為兩浙西南路轉運使泉州民嘯聚為盜克讓討平之四年徙知廣州俄兼轉運市舶使明年卒克讓少好學厯官廉謹幹局所至有聲當時稱為能吏子希閔字無間經史厯耳不忘屬文善緘尺有集二十卷自教三子日華日嚴日休皆登進士第希甫從子日宣亦登進士宋史本傳邊翊字待價華州人曾祖頡石泉令祖操下邳令父蔚太常卿珝晉天福六年舉進士周顯德年知通州課鬻鹽於狼山嵗增萬餘石宋建隆二年兄玕自河南令為吏部員外復以珝為洛陽令開寶初遷職方郎中監京兆麴務又掌永安軍𣙜貨奏徙務揚州有富民訴廣陵尉謝圖殺其父本部收尉囚之官吏推劾纍三百日獄未具狀聞詔珝案鞫盡得其實乃富民誣告即反坐之就命權知州事太宗即位充廣南轉運使太平興國七年移知開封府明年卒珝精力有吏材帝方欲倚用及聞其卒歎惜數四賻其家絹四百匹錢二十萬以其從子俊為尉氏主簿兄玕至金部郎中弟玢右贊善從子倣至殿中丞倚為比部員外郎宋史本傳宋璫字寶臣渭南人父鸞監察御史璫乾德中進士及第拔萃登科解褐青城主簿知綿州太宗即位改右贊善大夫出知秦州有善政就拜監察御史充陜西轉運使以韋亶代知秦州未百日坐事繫獄上以璫前有治績再命知秦州安集諸戎部內清肅雍熙初遷屯田郎中知益州屬嵗飢多盜璫始至以方略擒捕招輯盜皆屏息淳化中知蘇州卒上聞之嗟悼録其子明逺為蒲城主簿俾護其喪歸葬焉璫性清簡歷官三十年未嘗問家事唯聚書以貽子孫且曰使不忘本也次子柔逺亦舉進士宋史本傳師頏字霄逺內黃人父均後唐長興二年進士終永興節度判官因家關右頏少篤學建隆二年舉進士上第解褐耀州軍事推官纍殿中侍御史知資睂二州所至以簡靜為治蜀人便之超拜工部郎中知陜州真宗以其素負才望而久次於外纍詔對詢其文章命以本官知制誥咸平五年知審官院通進銀臺封駁司俄卒宋史本傳段鵬京兆人太平興國三年知興化縣擢知興化軍轉運使以遊洋轉輸不便奏請移治於莆鵬覽視形勝以都巡檢廨為軍治借民力而民不怨後論創始者稱段知軍云福建志宋濤溫舒子長安人端拱二年進士知襄城縣以政績聞宋史宋湜傳趙湘字巨源華州人進士甲科厯彰武永興昭武三軍節度推官遷著作佐郎知新繁縣以吏最命知商州徙隴州興元府上補政忠言十篇詔判宗正寺賜白金二百兩真宗東封泰山為東京留守推官禮成遷侍御史升州火命湘往致祠兼問民疾苦還言轉運使劉照弛職知洪州馬景不任事皆罷黜之再遷工部郎中出知河南府以疾徙虢州卒宋史本傳李仕衡字天均成紀人家京兆進士及第調鄠縣主簿田重進守京兆命仕衡鞫死囚五人活四人重進即其家謂曰子有隂施此門當髙大之徙知彭山縣遷知劍州擢尚書度支員外郎判三司鹽鐵勾院度支使梁鼎言商人入粟於邊率髙其直而售以解鹽商利益博國用日耗請調丁夫轉粟而輦鹽諸州官自鬻之嵗可得緡錢三十萬仕衡曰安邊無大於息民今增以轉粟挽鹽之役欲其不困何可得哉不聽遂行鼎議而關中大擾乃以仕衡為荆湖北路轉運使徙陜西真宗幸洛召為度支副使上言關右既弛鹽禁而永興同華耀四州猶率賣鹽年額錢請減十之四詔悉除之為河北轉運使建言河北嵗給諸軍帛七十萬而民艱於得錢預假於里豪出倍償之息故工機之利愈薄方春民不足請户給錢至夏輸帛則民獲利而官用足矣詔優其直仍推其法於天下以為河北都轉運使盜起淄青間遷知青州前守捕羣盜妻子置棘圍中仕衡至悉縱之未幾其徒有梟賊首至者仁宗即位拜尚書左丞以足疾改同州觀察使卒子丕緒蔭補將作監主簿及仕衡歸老時為虞部員外郎請解官就養纍遷司農卿致仕卒丕緒居官廉靜不為矯激家多圖書集厯代石刻為數百卷藏之宋史本傳李行簡字易從馮翊人家貧刻志於學每至夜分寒暑不易又聚木葉學書筆法遒徑與里中富人楊志元同學同時中進士第志元資遺謝不取起家隴州司理參軍徙彭州軍事推官陵州富民陳子美父死繼母詐為文書逐之纍訴不得直行簡劾正其獄遷侍御史陜西旱蝗命往安撫發倉粟救乏絶又蠲耀州積年逋租擢龍圖閣待制帝數幸龍圖閣命講周易間訪大臣能否行簡無怨昵各道所長人以為長者乾興初改給事中以足疾請外知河中府徙虢州卒宋史本傳李若拙字藏用萬年人舉進士擢上第授密州防禦推官登賢良方正直言極諫科太祖嘉其敏贍改著作佐郎遷知隴州以政聞雍熙三年假祕書監使交州先是黎桓制度踰僭若拙入境遣左右戒以臣禮由是桓聽命拜詔盡恭燕饗日以竒異列前若拙一不留眄取先陷蠻使鄧君辨以歸使還上謂其不辱命遷起居舍人淳化二年出為兩浙轉運使徙江南若拙尚氣有幹才然臨事太緩宰相以為言罷使知涇州至道二年黎桓復侵南鄙又詔若拙充使桓復稟命使還真宗嗣位詔試學士院俄知制誥咸平初使河朔按邊事知升貝二州卒子繹字縱之幼謹願自修舉進士中第除將作監丞纍遷屯田員外知華州蒲城民李藴訴人盜其從子亡去繹因密刺藴藴有隂罪侄覺之懼事暴殺之以滅口遂收藴致法擢提點河北刑獄權知貝州嵗旱繹為酒務市民薪草溢常數餓者皆以樵採自給得不死官入亦數倍邊民嵗輸草十餘萬委積久輒腐敗繹奏罷之三遷本曹郎中改兵部為江淮制置發運使內出絹五十萬匹責貿於東南繹曰百姓飢不宜重擾輒奏罷之甫半年漕課視常嵗增五之一繹自以久宦在外意不自得作五知先生傳謂知時知難知命知退知足也為右諫議大夫卒宋史本傳閻詢字議道天興人少時以學問著聞擢進士第又中書判拔萃科纍遷鹽鐵判官使契丹詢頗諳北方疆理契丹在靴淀迓者王惠導詢由松亭往詢曰此松亭路也胡不徑蔥嶺而迂枉若是豈非夸大國地廣以相欺耶惠慚不能對加直龍圖閣知梓州徙河東轉運使言三路土兵疲老者聽其族以強壯者代從之進集賢殿修撰知河中府大河漲壞浮橋詢易為長橋拜天章閣待制轉右諫議大夫知邠同二州提舉上清太平宫卒宋史本傳范祥字晉公三水人進士及第自乾州推官稍遷殿中丞通判鎮戎軍元昊圍城急祥帥將士拒退之厯知慶汝華三州提舉陜西銀銅坑冶鑄錢祥曉達財利建議變鹽法後人不敢易稍加損益人輒不便纍遷度支員外郎權轉運副使改制置解鹽使卒嘉祐中包拯言祥通陜西鹽法行之十年嵗減𣙜貨務緡錢百萬其勞可録熙寧中權陜西轉運副使張詵奏朝廷復洮隴故地自將帥至裨佐悉有功賞臣見洮渭父老言皇祐中轉運使范祥因熟羌數被冦掠其部族願輸土置城以為守禦乃即古渭為寨消沮邊隙可謂知守攻之利冀推原舊功少賜褒恤使天下知祥死猶被恩且舒祥忠義之氣詔贈祕書録一子子育字巽之舉進士為涇陽令以養親歸從張載學有薦之者召見授崇文校書監察御史裏行神宗諭之曰書稱堲讒説殄行此朕任御史意也育因薦張載等數人知河中府加直集賢院徙鳯翔以直龍圖閣鎮秦州元祐初詔為太常少卿改光祿卿都承旨出知熙州時議棄質孤勝如兩堡育爭之曰熙河以蘭州為要塞此兩堡者蘭州之蔽也棄之則蘭州危蘭州危則熙河有腰膂之憂矣又請城李諾平汝遮川曰此趙充國屯田古榆塞之地也不報入為給事中户部侍郎卒紹興中採其抗論棄地西夏及進築之策贈寶文閣學士宋史范祥本傳吕大忠字進伯大防兄藍田人登第為華隂尉晉城令韓絳宣撫陜西以大忠提舉永興路義勇改祕書丞大忠言養兵猥衆國用日屈漢之屯田唐之府兵善法也弓箭手近屯田義勇近府兵擇用其一兵屯可省為簽書定國軍判官會遭父喪起復知代州契丹使蕭素梁穎至代大忠數與素穎會議屢以理折之元祐初厯工部郎中陜西轉運副使知秦州時郡糴民粟豪家因之制操縱之柄大忠選寮宷自旦入倉雖斗升亦受不使有所壅閼民喜爭運粟於倉負錢而去得百萬斛紹聖三年加寶文閣直學士知渭州付以秦渭之事徙知同州旋降待制致仕卒詔復學士官佐其葬宋史吕大防傳李處訥同州人為郡守時稱循吏賈志張汝明鳯翔人神宗時為漢陽軍判官時行公田法授牒按境內躬臨閲實雖雨雪不渝由是吏不得通賄而稅均於一湖廣志李周字純之馮翊人登進士第調長安尉嵗飢官為粥以食餓者民坌集不可禁縣以屬周周設􅔰間老少男女無一亂者轉洪洞令縣南有澗支流湓入嵗賦災楗調徒遏之周始築新堤民不告病改知雲安縣蠲鹽井之征百萬通判施州州介羣獠不習服牛之利為辟田數千畝選謫戍知田者市牛使耕軍食以足哲宗立召為職方郎中遷直龍圖閣為陜西轉運使以集賢院學士知邠州徙鳯翔府改集賢殿修撰卒宋史本傳畢仲衍字夷仲士安曾孫華州鄭人以廕為陽翟主簿張升縣人也方鎮許請於朝欲興鄉校具材計工聽民自以其力輸助邑子馬宏以口舌橫閭里謾謂諸豪曰張公興學縣令因取諸民由十百至千萬未已也誠捐百金豫我我能止役豪信其能豫百金宏即詣府宣言縣吏盡私為學之費又將賦於民升果疑敕縣且止又揭其事於道令欲上疏辨仲衍曰亡益也取宏治之不辨自直矣會攝縣事即逮捕驗治五日得其姦言於升流宏鄧州一縣相賀舉進士中第調沈邱令以祕閣校理同知太常禮院擢起居郎暴疾卒仲遊字公叔與仲衍同登第調環慶轉運司幹辦公事從髙遵裕西征運期迫遽陜西挽夫三十萬一旦悉集轉運使范純粹李察會僚屬議皆不知所為以委仲遊仲遊集諸縣吏令先效金帛緡錢之最戒勿啓扄鐍共簿其名數以為質預飭斛量數千洞徹倉庾牆壁使贏糧者至其所人自㪺槩輸其半而以半自給不終朝霍然而散翊日大軍遂行元祐初召試學士院擢第一加集賢校理出提點河東路刑獄韓縝以故相在太原按視如列郡縝奴告有卒剽其衣於公堂之側縝怒將置卒於理仲遊曰奴衣鮮薄而敢掠之於帥牙非情也以付獄治卒得免太原銅器名天下獨不市一物懼人以為矯且行買二茶匕而去縝曰如公叔可謂清矣改祕閣校理知耀州是嵗大旱仲遊先民未飢揭諭境曰賑施與平糴若干萬石富室知有備相勸發廩民就食者十七萬九千口無一人去其鄉徽宗時厯吏部郎中墮黨籍坎壈而終弟仲愈厯知鳯翔府擢祕書少監卒宋史畢士安傳韓彥直字子溫世忠子延安人以父任補右承奉郎調大社令出為浙東安撫司主管機宜文字乾道二年遷户部郎官總領淮東軍馬錢糧會大軍倉給糧察給米不如數捕吏置於理初代緡錢僅二十萬明年奏計乃四倍帝嘉之拜司農少卿權知江州時相密啓換武授鄂州駐劄都統制條奏軍中六事乞備器械增戰馬革濫賞厲竒功選勇略充親隨等朝廷從之八年丐歸文班遷刑部侍郎同列議大辟三鞫之弗承宜令以衆證就刑欲立為令彥直持不可議卒格會當遣使於金帝親擇以往既至守節不屈金卒禮遣之遷吏部侍郎改工部尚書以言罷尋知濕州首捕巨猾王永年窮治之杖徙他州奏免民間積逋以郡餘財代輸海冦出沒大洋彥直授將領土豪等方略不旬日生擒賊首海盜為清奏功進敷文閣學士以弟彥質為兩浙轉運判官進龍圖閣學士致仕卒宋史韓世忠傳彥古知平江府至郡有士人持吏短長投狀以占能否彥古曰此狀汝不能為必有吏人為者其人錯愕即以實告於是拘吏杖之一郡以為神明姓譜古按彥彥質弟延安人金楊邦基字德懋華隂人天眷二年登進士第遷太原尹徒單恭貪汙不法託名鑄金佛命屬縣輸金邦基獨不與徒單恭怒召至府將以手持鐵柱杖撞邦基面邦基不動以廉為河東第一遷祕書監兼左諫議大夫出為永定軍節度使致仕卒邦基能屬文善畫山水人物尤以畫名當世云金史本傳趙重福字履祥豐州人試補女直令史遷滄州鹽副使嵗飢民煮鹵為鹽賣以給食鹽官往往杖殺之重福曰寧使課殿不忍殺人嵗滿課殿當降三司使以嵗荒薄其罰遷都水少監治密雲縣貞祐二年以守密雲功遷同知河間府事三年河間被圍有劉中者勸重福出降重福不聽是時河間兵少多羸疾不任戰重福勸其父老率其子弟強者戰弱者守圍解遷河東北路轉運使致仕卒金史本傳武都字文伯東勝州人大定十二年進士調陽穀主簿遷髙水令縣素多盜都皆廉得姓名榜之通衢約無再犯悉奔他境纍遷中都路都轉運副使以親老與弟御史郁俱乞侍尋丁憂服除遷灤州刺史入為户部郎中被詔由海道漕遼東粟賑山東都髙其價直募人入粟招海賈船致之遷中都西京按察副使以勞遷本路按察使備禦西京有勞召為户部尚書中都戒嚴都知大興府醉酒以褻衣見詔使坐是解職起為刑部尚書河東路宣撫使以疾卒金史本傳元謝仲溫字君玉豐縣人略涉書史世祖命備宿衛中統元年擢平陽太原兩路宣撫使至元九年遷順德路總管時方用兵江淮有寡婦鬻子以償轉輸之直仲溫出俸金贖還之十六年為湖南宣慰使二十二年改淮東嵗旱仲溫導白水塘灌民田公私賴焉元史本傳張敏富平人大定間進士為聞喜令有善政至元初民為立碑賈志宋規字漢臣長安人親殁廬墓瑞草生中統戊戌徵試中論賦兩科拜議事官先是官吏縱肆曰久數侵苦小民規繩之以法惕然皆莫敢犯丙辰春詣闕陳便宜數事上悉嘉納為耀州尹官蜀道憲副政聲著聞關學編程思廉字介甫家東勝州父恆國初佩金符為解州鹽使思廉用薦給事裕宗潛邸以謹願聞至元十二年同知淇州纍遷河北河南道按察副使道過彰德聞兩河嵗飢而徵租益急欲止之有司謂法當上請思廉曰民不堪命矣即移文罷征後果得請二十年河北復大飢流民渡河求食朝廷遣使者集官屬絶河止之思廉曰民飢就食豈得已哉亟令縱之章上不之罪衛輝懷孟大水思廉臨視賑貸全活甚衆城不沒者數版即修隄防露宿督役水不為患衛人德之遷陜西漢中道按察使成宗即位除河東山西廉訪使太原嵗飼諸王駝馬一萬四千餘匹思廉為請止飼千匹平陽諸郡嵗輸租稅於北方民甚苦之思廉為請得輸河東近倉舊法決事咸有議劄權歸曹吏思廉自判牘尾某當某罪吏皆束手思廉纍任風憲言事剴切與人交有終始其於家族尤盡恩意好薦達人物卒諡敬肅元史本傳趙弼字元輔雲陽人歷大都留守京師勢家望族為之斂迹後以使出宣慰荆西湖北時西蜀諸夷貢物率舟達江陵山塗五百里賦民負之甚苦弼乃浚故漕渠灌以沮漳之水達湖入白湫通漢中置龍岡奉申二水驛以省勞費荆民惠之名趙公河大德三年為平章政事議陜西省事卒賈志線庫魯克布哈京兆人至元六年監元氏勤於公務晨夕無倦民有爭訟立剖決之每月朔望至文廟行禮畢揖耆儒升講堂序坐吏曹各專一經講明正理使日新所聞明年春夏蝗旱相仍祈禱自罪甘雨應期蝗遂出境畿輔志吕戜字伯充河內人父佑初隸兵籍轉徙北郡復至關中家焉廉希憲宣撫京兆聘許衡教授生徒戜從衡學衡為祭酒舉戜為伴讀輔成教養戜功為多至元十四年授四川行樞密院都事宋安撫使王立守合州西院獲立偵卒張郃等將殺之戜釋郃等俾歸諭立立降瀘敘等郡相繼送欵巴黔民感之改華州知州勸農興學俱有成效及代民爭留之大德中河東關隴地震移書廟堂陳救災弭患之道仁宗即位拜翰林侍讀學士未幾致仕遣使給驛送關中卒諡文穆元史本傳劉允中號西澗美原人大德間授順鹿路總管討叛酋有功調廣南郡尹故事三五姓聮户飼馬民苦甚允中令月出緡錢市馬人便安之遷長寧州同知地接蠻徼允中招徠之又教作水車引溉陸田並令子弟入學風俗丕變後改涇州值嵗飢百方賑濟全活甚衆三年請老制以耀州知州致仕富平志賀勝仁傑子字貞卿鄠人嘗從許衡學通經傳大義年十六入宿衛凝重寡言世祖甚器重之拜集賢學士三十年簽樞密院事遷大都護大德九年父仁傑請老代為上都留守既至通商賈抑豪縱出納有法供億不匱民賴以安奉聖州民髙氏籍虎賁以資雄鄉里身死子幼有達官利其財使部曲強娶髙氏婦勝白帝斥之髙氏以全嵗大飢輒發倉廩賑民民德之為立祠上都西門外開平人張弼家富弼死其奴索錢民家弗得毆負錢者至死治獄者教奴引弼子並下獄丞相特們德爾受賂不為直勝聞以語御史遂劾奏丞相罷之英宗即位特們德爾復相誣勝殺之百姓持紙錢哭尸傍甚哀泰定中詔雪其寃諡惠愍至正三年改諡忠宣子二惟一左丞相惟賢同知上都留守司事元史本傳薛榮字君英渭南人元貞二年以陜西行省薦補通事四年擢御史臺譯史延佑二年遷興元路判官督修棧道有功至治二年以憲司薦舉升西和州知州延師儒興禮義綽有政聲終工部尚書馬志楊寅字敬伯乾州人恭懿之子性孝友兼善治生未嘗以匱乏貽親憂嘗為盩厔尹仁嚴兼盡未滿旬朔宿弊盡袪以父喪去任哀毁骨立後由韓城尹擢陜西行臺御史建言皆裨切時政轉江西行臺山東廉訪使所至伸枉黜濫風紀振揚遷四川憲使泰定乙丑升國子祭酒講明正學誨誘不倦賈志程達藍田人有大志常以天下國家為分內事歷官雲南肅政廉訪司僉事持憲凜然人咸畏服賈志李誠字克誠渭南人擢知三原任德緩刑勸農興學屏除姦盜鈐束羣吏兵興轉粟挽芻量户髙下而均其徭民不告病時稱循良渭南志趙溉甘泉人明於經術至正間官吏部尚書清介不阿又延安劉萬鐸官大司馬亦以政績為時所重延安志石端甫渭南人舉茂材異等厯官四川憲副忠慎廉介卓有能名賈志郭均字叔平朝邑人至正時尹􅔛課農興學有害政蠧民者悉伏法一時訟簡盜息又引斜谷水溉田建常平倉積粟善治犁然時稱良吏又髙陵魏紹開知慶陽府臨潼趙公諒知三原縣涇陽潘希賢為永壽團尉鄠縣張雲翼為同州同知皆以政績著聞賈志陜西通志卷五十六
