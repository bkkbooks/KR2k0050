body:
  text: 陜西通志卷六十九人物十五列女四本朝劉氏興安民楊裔昌妻年十六而寡遺孕生子氏孝事舅姑舅姑殁力營喪葬艱苦備至子長教之入泮守節三十七年康熙五十二年旌表王氏興安民趙應泰妻年二十四生二子而寡時姑老孀居氏善體姑志撫二子並克成立年七十一而卒康熙五十三年旌表馬氏興安民賈廷鼎妻年二十夫亡孝事舅姑劬勞訓子苦節四十八年雍正三年旌表康氏興安生員楊秉彛妻年二十五夫亡生子方六日親老家貧氏紡績充養遺孤鞠育有成苦守二十四年卒雍正三年旌表馬氏興安生員魯鏞妻年二十二夫亡遺孤𢎞漢相倚為命及𢎞漢入泮完娶與婦先後死復撫孫承楷成立再世劬勞一心氷蘗守節三十七年雍正三年旌表孫氏興安民梁陳妻年二十四而寡姑老孀居生養死葬無失禮子生三月撫育成人有聲庠序守節二十五年雍正三年旌表馬氏興安生員劉鼎基妻夫亡氏年二十七後兵荒屢至艱苦備嘗年八十三而卒唐氏興安生員陳于闈妻于闈隨父大計司理維揚病卒氏年二十六嵗二子俱幼又妾子三人氏教育無異視後大計亦殁于官氏自數千里外扶兩柩歸葬守節終身劉氏興安人百户崔榮妻年二十榮殁不再醮三嵗兒昌引昌引長娶謝氏而夭謝引刀自刎劉救得免與姑守節終身馮氏興安馬在良妻年十九夫死家貧氏茹荼飲蘗撫兒守節以終胡氏興安馬志學妻夫殁年二十三遺子中駿訓誨成名孫道𢎞幼失母胡亦辛勤撫育守節四十二年卒俞氏興安王學先妻夫亡妾生一女氏撫女守節終身徐氏興安生員王國英妻陳氏監生劉其言妻夫死守節徐五十餘年陳六十四年李氏興安生員陳五典妻年十七夫亡自縊死胡氏劉氏胡興安生員謝賢謨母劉其妻也流冦至劉負胡走避閻王寨寨破俱投巖死喻氏興安生員梁信成妻順治三年城破賊逼氏所氏大罵賊兵刃俱下氏死之席氏興安陳于堂妻順治三年流冦破城氏被迫引刀自殺死蔣氏興安貢生王建極妻順治三年劉二虎破城氏語建極曰吾死君急逃乃引簮刺喉而卒年二十八侯氏興安范文奎妻順治三年劉二虎破城投井死劉氏興安生員陳五美妻賊至城陷投水死單氏興安生員崔尚志妻康熙十四年吳逆竊踞州城餘黨縱掠氏知不免以其子托鄰婦投巖死李氏平利民楊啓勇妻年二十七夫亡氏痛不欲生親族諭以養老存孤大義始強起就食治家勤儉嚴肅事翁姑如子及殁喪葬盡禮人稱節孝教二子皆入泮卒年六十有一雍正四年旌表朱氏洵陽生員鍾仙麓妻仙麓死氏年二十七不嫁教子􅙇貢於成均􅙇死婦吳氏年十八亦不嫁教子衍慶餼於庠朱守節四十三年吳守節三十四年吉氏洵陽生員吳鳳喈妻夫亡終事舅姑撫子伯禮入泮而卒婦華氏善承姑志撫子淳科餼于庠兩氏俱年二十六而寡吉守節四十四年華守節四十二年吉氏洵陽舉人宋英妻年二十四夫殁教子成名守節五十六年吉氏洵陽生員鍾仙質妻年二十二夫死以姑老無依誓不再嫁守節五十八年王氏紫陽民任兆麟妻年二十四而寡親老子弱矢志靡他守節二十七年雍正三年旌表李氏紫陽民武君化妻夫亡事姑育子苦節終身雍正六年旌表鄭氏漢隂生員藍旐妾旐夫婦死于賊氏負嫡子立避難險阻備嘗亂定家業蕩盡每䌟麻糊口兼勤訓課俾立成名苦守四十餘年邑令旌其門胡氏廪生陳國典妻汪氏夏之相妻張氏曽述志妻俱漢隂人胡年二十九汪年二十五張年二十八並夫亡守節撫孤終身溫氏郭祚妻亦夫亡守節終身孔氏商州人王正妻幼讀孝經小學能通其義未嫁姑殁即不事膏沐不與宴會年十七歸王十九夫死無子女有諷以他適者即不食以明志家貧備歷艱苦或勸就食母家不可其兄誓養以終身遣婢僕相迎氏曰此大歸也必兄至敦請始往教嗣子讀書成立苦節歷三十七年雍正七年旌表唐氏商州生員牛廷琇妻年二十三夫遠出不歸後姑逼之輒以死自誓苦節歷六十年卒趙氏商州楊用枅妻年十九夫亡誓以身殉父母密防之得不死矢志守節翁與父憐其年少無子勸改適即入室髠髮以示不二翁感泣為立姪嗣之歷五十七年卒周氏商州進士羅立賢妻夙嫻內則歸立賢家徒四壁紡績佐讀立賢天姿頴異氏自喜得所歸登第後一載立賢卒氏日夜涕泣勺水不入口數日淚盡眼枯嗚咽而逝楊氏鎮安劉瑞徴妻田氏齊扶上妻並年三十而寡矢志撫孤楊歷三十四年田歷四十五年何氏雒南生員張足發妻夫死年二十二遺孤甫周翁老姑病氏矢志不二代夫終養歷冦變田廬蕩然拮據養育年八十二卒強氏雒南生員許鏡妻年二十五夫死矢志撫孤歷兵荒艱苦萬狀守節三十一年崔氏雒南夏民表妻夫死氏年二十八矢志撫孤翁時仲以明經司訓吳堡卒于官氏罄資庀喪事扶櫬歸葬事繼姑盡孝備歷艱苦守節五十年王氏雒南增生劉呈旦妻冀氏張見龍妻夫死撫孤食貧守節並歷三十餘年卒焦氏雒南張珽妻珽亡氏年二十二事姑育子內外無間言壽七十二卒初珽父庠生如堪亦早亡母張氏時年三十守節撫孤歷五十年而終兩世氷操守令咸表其門董氏雒南藺士興妻年二十一而寡家貧子幼氏苦節撫孤操作終身年七十餘卒其子孫皆務農敦本克守家風吕氏雒南生員白貽哲妻年十六適貽哲二十九而孀親老子幼氏仰事俯育孝慈備至歷五十年以壽終劉氏雒南劉燝妻二十三歲而寡矢志殉夫時遺孤方三歲族黨力止之得不死子既長課子躬耕家稍起及生孫乃課孫讀書以紹先業年六十四卒今孫龍有聲諸生間雒南二李氏一生員趙𢎞正妻一雷起聲妻𢎞正亡氏年二十二守節年七十三而終起聲亡氏年二十七守節年六十而終李氏雒南張度妻相夫事姑克盡婦道度卒氏年二十九奉孀姑撫弱子歷四十四年終張氏雒南何承烈妻承烈亡氏年甫二十七奉姑育子歷十餘年子長為娶婦生孫子復夭氏慮婦姚氏有他志泣謂曰我命蹇故爾汝勿效我所為姚泣曰姑能守婦獨不能守耶婦姑相依者復三十七年張氏年七十六而殁冀氏雒南張銘妻趙氏周知妻銘亡冀年二十四知亡趙年二十六家貧子幼誓不再適冀年五十八卒趙年五十九卒石氏雒南張靖荆妻年十六歸張事舅姑以孝聞夫病亟氏誓以死殉夫囑以養老存幼氏勉從之後三子皆成立季子璽得入泮守節三十六年而殁康熙三十年歲荒氏捐粟賑飢里中全活者數十家其殁也鄉人多赴哭邵氏山陽生員羅星燦妻燦少負雋才不售早卒氏年二十餘堅志撫孤年七十二卒又州判武震方妾魏氏亦以守節著聞董氏山陽生員田生芝妻氏年二十夫死於虎子在抱氏覔尸歸殮矢志撫孤操作勤苦教子成立守節五十年單氏同州生員李昌世妻年二十二夫死氏痛哭不食投繯者再戚屬諭以存孤大義遂守節終身雍正三年旌表王氏同州民陳汝極妻汝極死氏年十八無子矢志堅守孝養姑嫜汝極從兄忠極立極感氏節各嗣以一子共給贍田十畝苦節四十年雍正三年旌表張氏同州民李與階妻年二十九歲夫死遺二子一女翁姑衰老氏身代子職孝養無間會大荒朝夕不給氏鬻次子及女以供膳翁姑俱以壽終卒撫長子成立守節三十八年雍正三年旌表姚氏同州民南永福妻歲荒永福闔家就食河南中途永福病故抵鄧州永福父亦殁時氏年二十八矢志守節血指織絍以撫遺孤比歲豐率子扶櫬旋葬故里里人重之雍正五年旌表杜氏同州民強有禮妻歲大飢全家避襄陽翁與夫俱客死姑衰老子女俱幼氏績絍度日暨歲稔先奉姑擕子女以歸復拮據纍年遣子附估客至襄陽扶兩櫬歸葬守節三十七年雍正六年旌表王氏同州民郝造賢妻年二十四夫殁斷一指以明不二事翁姑視夫在時尤謹子既長家事一切令子與族衆議行嘗語其子曰我婦人何知但無墜先人足矣其識大體多此類雍正九年旌表時年六十九嵗張氏同州儒童王助芳妻生而端重寡言笑父以女孝經授之能識大義既適王生子三月而助芳殁氏甘貧撫孤未幾翁又亡典叉衣以葬姑頸有惡瘡十餘年不愈時口吮之以出其毒鄰里見者皆感動姑殁為醵錢庀喪葬氏卒年八十七守節六十六年雍正十年旌表汪氏同州儒童王國正妻國正亡遺腹生一子子幼不能食氏慮不育慟幾絶投繯者三以救免母憐其少寡諷以改適氏截指示之始不復言姑兩目皆失明氏出入維持不少怠守節五十五年年七十有五雍正十年旌表孫氏同州民李子燽繼妻年二十七而寡事繼姑至孝撫前室子與塍與圻如已出與圻有過使跪木主前氏涕泣數之不與杖二子皆哭失聲而罷未幾興塍入泮事母尤盡孝又早卒婦張氏年甫二十二慟絶姑諭以存孤大義哀稍止值歲祲以榆麵蕎花自給子芾亦好學既長孝謹有父風娶媳生孫媳復夭芾再娶王氏生二子芾又亡王氏亦矢節不移每三寡三孤悲啼相向里人聞者皆掩泣孫張並雍正十年旌表孫時年八十有四張時年七十有二李氏同州民王奪標妻年二十六夫亡奉翁姑孝敬彌篤翁姑慮有他志氏抱三歲子呼天指日以明不二子長遊庠又早殁復撫遺孫成立雍正十年旌表時年七十有一楊氏同州民王玉秀妻事翁姑以孝聞年二十四夫亡親族欲分育其子女氏矢志不二子幼常啼飢氏多方止之不使翁姑知也持身尤謹親屬宴會皆不與雍正十年旌表時年五十九歲雷氏同州楊奉魁妻生一子一女奉魁遠出惡少李延梅窺氏色突入氏室逼汚之氏厲聲呌罵脅以刃罵益力延梅恐事泄遽刃之并殺其子女逸去事發置延梅極典氏旌表李氏朝邑韓快妻年二十二而寡事病姑敬謹不衰家素貧拮據荼苦持家有則長子宗琰以行義著於鄉次宗玠蜚聲黌序皆母教成之也年七十八而終雍正九年旌表張氏朝邑王文祥妻氏素賢淑里中狂徒窺氏夫他往潛入氏室逼汚之氏忿激詈罵脅以利刃罵不已斷臂乃絶家人奔救少蘇頃之夫至窮其故靳而不言母至乃泣指強暴狀而卒強暴伏法氏膺旌典侯氏朝邑永年令王報春繼妻報春居官清白家無餘資其亡也祀永年名宦氏撫子鵬翼鵬程紡績佐讀備歷艱苦鵬翼登康熙辛酉賢書己卯鵬程復以第一人舉於鄉人謂亷吏宜有後亦孀母苦節之報也關氏馬育宗妻蘇氏張頌音妻俱朝邑人夫早亡並寄食於母家甘貧終老關有子守節五十五年蘇無子守節七十一年朝邑二張氏一貢生郭藩母一諸生王琛母也二氏並夫死守節事親有禮訓子有成藩母年七十六卒琛母年八十一卒張氏李含萌妻上官氏楊魾妻上官氏趙攀詔妻上官氏樊玉瑚妻俱朝邑人夫亡皆親老子幼仰事俯育辛苦備嘗含萌妻年六十八攀詔妻年九十玉瑚妻年五十八魾妻年三十八遽終聞者傷之以為未食其報云朱氏雷福有妻黃氏孫維乾妻謝氏周士熊妻雷氏賀昌祚妻俱朝邑人夫早亡上事孀姑下撫孤子備歷艱苦孝慈兩盡後朱年七十六謝年七十九雷年八十黃氏獨年登九十邑令陳昌言表其門曰節壽兼隆侣氏朝邑張辰斗妻趙氏李應春妻夫死無子並撫從子為後似守節六十二年趙守節四十餘年馬氏朝邑樊王佐妻徐氏張經濟妻夫死俱無子誓不再醮馬苦節六十六年徐苦節四十二年于氏王所進妻劉氏樊中鵬妻都氏仇允忠妻王氏張羅俊妻王氏樊良弼妻王氏吏目黃三省妻俱朝邑人夫死各守遺孤教養備至迄能成立于氏年六十八劉氏年七十都氏年八十七張王氏年六十七樊王氏年七十六黃王氏年八十三人謂天祐全節故咸登上壽也王氏朝邑生員嚴呈瑞妻員氏生員安濟繼妻任氏楊東昱妻謝氏楊三尚妻夫死俱誓不再適茹荼教子歷久不懈王氏年六十員氏年五十五任氏年六十餘其子皆諸生謝氏年八十六其孫有遊庠者張氏朝邑生員何之英妻年二十七夫死截髮納棺矢志撫孤冦至掣其耳取環以去氏即截耳以示不汚子亡又育孫成立年七十七卒田氏朝邑吳興讓妻年十九夫死子加祉甫周氏奉姑撫子黽勉勞苦未幾加祉夭氏孑然孤嫠朝夕不給從子加福迎養之苦節歷四十餘年田氏朝邑王大猷妻夫死氏年二十有二家貧無子翁姑欲令改適氏以死自誓卒撫嗣子成立姑病拮據奉養孝敬不衰守節歷三十餘年雷氏朝邑王慎獵妻年二十二慎獵死無子矢志守節夫弟慎餘年八歲氏善視之以妹妻慎餘生子門臻未幾慎餘又死妹年二十八二寡同撫一孤暨成立娶婦郭氏門臻復夭郭年二十四依二姑為生節孝並著雷氏年各八十餘卒郭壽亦至八十王氏朝邑生員麻出羣妻夫亡時子浡然甫六歲氏守節撫孤歷三十餘年浡然娶婦井氏生子直甫四歲浡然早卒井事姑教子更歷兵荒年七十三卒時稱一門雙節直妻王氏亦守節苦志終身樊氏朝邑生員張璠妻年十七夫亡無子父母憐其少欲令改適氏微聞此議痛哭不食嘔血而死薛氏朝邑孫崇朴妻夫病革語氏曰我死汝嫁乎氏泣對曰存以代君養不得已以死繼之夫死家利富人重幣使強載去時夜已半氏守燈厲罵不絶達旦得脫歸飲藥死秦氏郃陽黨克儉妻年十七克儉死子未及周氏撫棺慟絶誓以身殉翁姑力勸意稍解甘貧茹苦撫子成立守節四十年雍正六年旌表黨氏郃陽雷爾預妻年二十三爾預殁或言再醮氏截左耳以誓事頽親撫弱息孝慈兼盡守節六十餘年張氏郃陽雷延壽妻年二十而寡延壽祖母劉以節著氏孝親鞠子志操氷霜人謂克嗣徽音守節三十六年寧氏郃陽雷曉妻年二十一夫死家貧舅姑尚在殯夫兄嫂復相繼去世氏拮據經營善撫猶子祀事不墜守節四十年烈女姓王氏字玉父圖南郃陽世族字韓城張氏會盜起梁山北家人聞盜至咸出走玉告其母曰兒處子也何之必死之言未既盜牽之去玉紿盜曰汝已破吾家吾焉往盍少寬乎守者稍懈乃乘間走道旁溺井死賊退家人求之有同繫女婦指示井中始出尸歸殯時順治五年冬也王氏郃陽李覺世妻覺世母老家貧遠館洛川氏紡績養姑甘旨無缺雍正元年夏覺世適館涉溪暴漲竟溺死婦聞之慟絶姑力救始蘇及櫬歸氏為營葬葬畢入室自縊家人啓視顔色如生氏無子卒年二十有五王氏史節妻師氏趙于階妻薛氏強不息妻俱韓城人年各不滿二十夫死守節終身康熙初旌表薛氏韓城儒童陳其誠妻其誠病革泣曰我死誰與我育子女者氏剪鬢髮一股示之以明不二夫殁氏年二十八事姑盡孝姑病疫幾危或勸氏少遠之氏不聽朝夕扶侍目盡腫且流血姑忽見之大驚一汗而病痊家素貧日事縫紉以資朝夕撫遺孤學業有成蜚聲庠序守節歷四十二年雍正九年旌表范氏韓城儒童劉翕順妻翕順家貧父母皆年登耄耋氏飭治中饋修理井井舅姑喜曰吾自今可無虞凍餒矣未幾舅姑亡夫亦繼逝氏拮據經營喪葬成禮教子慈嚴兼盡雍正十年旌表時年六十有二薛氏韓城諸生王秉乾妻解氏劉廷仕妻夫死即遭冦變顛沛備經薛時年二十有二解年未二十皆無子薛立嗣子為後歷三十七年解依母家以居歷四十年卒姚氏韓城劉學龍妻年二十二夫死三子俱幼翁衰老繼姑性難事氏矢志守節備歷艱苦常竟日枵腹飲泣不言教子務農經商家漸康遇戚屬貧者恆周之曰我從貧中來深知其難也歷六十六年諸孫繞膝有逰庠者人皆謂氏苦節之報祁氏韓城陳振興妻振興死氏年二十有六戚屬慮不能守將分育其子女氏矢志不二姑在堂孝養無缺姑殁喪葬盡禮嚴課二子俱得成立苦節歷三十八年張氏韓城生員薛隆世繼妻隆世病七載日侍湯藥不一假他人手病劇語氏曰汝無出吾死可他適氏以死自誓及卒有微勸之者厲聲拒絶幾自刎撫前妻子如已出比長而夭氏痛不欲生慮無後立嗣孫撫之苦節四十二年楊氏韓城陳朝瑛妻夫病篤囑氏曰我病不起若能終撫吾兒乎氏泣以立孤自誓既殁氏時年十九家赤貧事翁姑甘旨無缺自咽粳籺弗使知也子既長入泮有聲未幾夭苦節四十二年孫氏韓城師正學妻年二十九夫死子十齡或勸氏改適代養其子氏叱之曰稍待六七年子漸長可自謀生理矣奈何背夫舍子去乎未幾子亦死一慟輒絶聞者淚下所居屋兩間歲久圯壞風雨無障氏鍵户獨處早夜紡績自給或病不能織寧枵腹不乞憐於人苦節歷五十三年雷氏解登位妻薛氏劉述古妻趙氏李夢春妻吳氏秦文煒妻俱韓城人夫死咸立志撫孤薛吳尤家貧備歷諸艱雷卒時年八十二薛年七十李年九十三吳年亦八十云薛氏韓城生員衛士竑繼妻年十八夫死撫前室子及嗣孫備極艱苦守節歷六十五年卒強氏張文輐妻薛氏輐弟文輨妻韓城人並二十四而寡相依守志俱壽至八十二而卒人稱一門雙節孫氏生員薛丕基妻劉氏生員吳無隱妻梁氏生員程謙光妻皆韓城人孫年三十而寡守節五十三年劉年二十八而寡守節二十二年梁年十六而寡守節五十五年史氏韓城諸生衛廣生妻廣生死氏年十六翁姑憐其少勸令改適氏涕泣不食曰身可死節不可易翁為立嗣氏撫之成立年五十四卒丁氏韓城史序官繼妻賈氏史可志妻二史亡丁年甫十七賈年二十親老子幼一室凄然二氏養親育子備歷辛勤丁守節歷四十餘年賈守節歷五十餘年解氏韓城儒士薛印淑妻幼有令質能讀孝經論語年十六夫死子生甫三月矢志守節事親撫子歷七十五年卒郭氏韓城生員衛執瑞妻李氏生員衛執奎妻郭年十七而寡李年十八而寡皆無子李撫從子為嗣矢志守節郭歷五十四年終李歷五十八年終髙氏解自性妻程氏晉星妻並韓城人髙年十七而寡年七十八卒程年十八而寡年八十卒張氏韓城吳之音妾年十九之音夫婦俱卒撫嫡子及孫曾劬勞三世年八十卒孫氏韓城諸生劉昌引妻夫死氏年十九矢志撫孤翁性嚴諸叔橫逆時至氏隱忍守節年九十卒衛氏韓城儒士薛生德妻年十九夫死子英甫二歲叔生周亦幼稚家赤貧值大飢氏辛苦支持事姑盡孝課叔與子讀書比長皆入泮里人賢之氏竟以勞瘁得疾年未四十而卒薛氏韓城程殷輅妻夫垂死以親老子幼為託氏年二十四矢志守節事姑撫子歷五十三年卒晉氏韓城生員薛自通妻夫死氏年二十守節撫孤順治六年冦至子從之未得死所至柳枝村紿子他去投崖死薛氏韓城閻邦計繼妻夫死氏無出撫前妻子長既娶子婦俱夭復撫孫成立順治七年冦至被掠罵不絶口遇害王氏韓城衛士望妻夫亡氏年二十餘有一子一女氏不顧哭泣數十晝夜絶粒而死吳氏韓城儒士張雲樞妻史氏王國彥妻夫死誓以身殉營葬畢遂不食死解氏韓城中書舍人亷楨女許字同里閻衍緒未嫁而衍緒卒女聞之日夕掩泣一日就閣中沐浴更新衣將死母疑之詭曰兒無他遂密防之得間登樓俯檻望閻氏廬默祝曰魂兮來忽痛哭委頓于地家人扶就榻遂不食以死死之日欲言族止唯淚涔涔下父母哀其志合葬閻氏焉程氏韓城人字孫紹曾未嫁紹曾卒女欲臨其喪父母不許時掩泣有議婚者女聞之痛哭乘間自經死馬氏生員楊中涵妻雷氏生員楊中渼妻華隂人中涵殁馬氏年二十四家貧無子矢志守節父迎之歸曰我楊氏婦也有姑在我去孰與姒並事吾姑中渼殁雷氏年十七亦無子或勸之嫁泣曰姆為伯守我獨何往值逆闖之變姑憂怖幾死二婦奉姑避山中孝養備至姑殁竭力庀喪營葬雷更事馬如姑並守節終身康熙二十六年旌表郭氏蒲城生員王凝圖妻夫卒氏年二十長子元芳甫四歲又遺腹生次子聯芳氏以養老撫孤為巳任元芳後讀書成立值闖逆入關元芳負母避山中遂偕隱馬苦節四十餘年卒康熙三十九年旌表曹氏蒲城劉士瑜妻年二十一夫死父母憐其少寡微言守節之難氏大慟而返不歸寧者數載戚族有言再醮者即絶之事姑至孝姑病十餘年日侍床簀頃刻不離初抱姪為嗣九歲而殤氏一慟輒仆夫兄仍以次子彤嗣之教育備至苦節三十四年康熙五十四年旌表劉氏蒲城仵允藩妻允藩死氏年二十有二翁姑老病氏克盡孝養及卒喪葬盡禮撫遺孤恩義兼至克底成立康熙五十四年旌表李氏蒲城生員王楠齡妻年二十一夫死投繯者再舅姑密防之得不死終身不事膏沭足不踰閾事父母翁姑咸盡孝初撫族姪為子而殤痛哭不欲生又撫嫡姪承嗣盡鬻簮珥供乳哺常午夜紡績伴子讀書卒至成立雍正四年旌表米氏蒲城劉漢興妻年二十而寡誓以死殉戚屬勸以養親存孤大義即矢志守節事舅姑倍篤日夜為舅姑祈壽後並享大年人以為誠孝所感舅姑殁鬻衣以葬盡哀盡禮里黨重其節孝欲白于有司却不受曰是為名也非吾本志苦節歷二十六年卒梁氏蒲城權丕昌妻年十五歸于權事翁姑以孝聞年二十二夫死投繯者再姑密防之得不死遺腹生子即以立孤自任仰事俯育悉取給於十指卒撫子女成立苦節二十六年卒雷氏蒲城原溍長妻年二十夫亡自經數次賴妯娌密防得不死事翁至孝甘旨無缺課二子讀書不少怠二子俱入庠苦節歷四十三年卒張氏蒲城屈寧妻年十八喪夫無子欲絶粒死以舅姑衰邁苦守侍養既殁殯葬備禮撫姪為後教育成名守節二十四年卒原氏蒲城校演武妻年二十二演武死所遺田舍伯盡奪而有之或勸與較氏曰伯夫手足也傷夫手足何以見夫地下乎子弱家貧終身不易守節五十二年張氏蒲城王來賔妻年十七來賔經商卒于滇訃至氏誓不欲生翁姑勸止苦節六十七卒常氏蒲城原于素妻年十九于素卒家人憐其少令改適氏忿然曰吾之不速死者圖為夫撫嗣子也於是撫于素兄子維為嗣中康熙戊子副榜守節四十一年卒徐氏蒲城庠生劉克忠妻年十九克忠死氏奉翁姑撫二子守節三十二年卒吳氏蒲城陳采之妻年十四夫死撫姪韓學為嗣守節三十四年卒趙氏蒲城車國祥妻年二十二夫亡矢志守節父母憐其少寡值歸寧以微言動之即大慟而返清操益勵時翁年八旬病羸者十餘年三子皆襁褓氏早夜縫絍以資養育卒年七十九歲劉氏中部人蒲城生員王秉乾妻年十八秉乾亡遺腹生一子三歲殤有女亦相繼殁氏孝事孀姑甘貧守節年五十八卒張氏蒲城楊圻妻圻卒氏年二十七欲以死殉念子女無依乃勉為存孤計初氏有奩資雖經喪葬猶可自存值祭日氏攜子女赴墓所偷兒乘間行竊比歸則囊篋蕭然矣氏煢煢無告乃依母家僦舍而居勤儉課子卒底成立年七十卒劉氏蒲城生員張所懷繼妻年二十二夫亡無子氏慟絶翁姑諭之曰吾子不幸汝能從死固善其如吾二老何氏感悟曲意承顔每獨處雪涕不令二老知也未幾翁殁事姑又三十餘年喪葬無缺歲辛未大飢氏以甘脆奉老姑次飽嗣子恆枵腹終日卒時年六十三武氏蒲城周文興妻東妹即文興妹也文興居邑東南之安豐村順治初流孽未靖氏與東妹同在田刈穫賊突至覩氏少艾挾之去氏大罵不從賊殺之復逼東妹亦不從復殺之未及葬會文興亦死于兵有鄰人武姓者以土掩之亂定其事亦不彰康熙五十三年居人築墻掘土得二尸顔如生衣履儼然衆異之武姓者時年已八十餘憶其事備言本末二氏之烈乃著村人王孝亷廷瑗為具棺改瘞并勒石志之常氏蒲城米正頤妻吏部郎中澄之女順治六年賊黨據蒲正頥被殺氏覔尸歸殯忽一日几上設七筯各二吉服臨奠家人疑之至晚自縊死屈氏蒲城進士頴藻女適儒生賀慎慎死年二十有二服闋自縊死郭氏蒲城孫述妻康熙壬申關中大飢貧家婦子多相鬻以食述語妻曰吾義不賣汝汝可改適以圖活未幾述竟死氏亦自縊同時有楊氏者戴茂宇妻茂宇將鬻氏氏投井死周氏潼關民畢懋篤妻年二十九夫亡遺三子俱幼氏守節撫孤家貧以縫紉糊口戚族欲奪其志氏剪髮自誓值明季兵燹擕孤匿山谷間備嘗艱苦三子俱得成立康熙十六年旌表劉氏潼關民郭宗儒繼妻事姑盡孝姑常語人曰此吾家孝婦也無何姑殁夫繼殁前室柩尚未殯氏拮據襄事三喪畢舉撫前室子鞠育備至當歲歉以餅餌飼其子而已及所生二女常咽粳籺曰此郭氏家祧所係脫不虞無以見吾夫地下也二女亦明大義俱少寡不再適有母風雍正十年旌表時年五十有七守節歷三十四年成氏耀州民劉月桂妻年二十七而寡遺腹生子敷榮氏教子讀書以母兼父敷榮以康熙甲午舉於鄉氏守節四十餘年雍正四年旌表閻氏周氏耀州右都御史王國妾國卒時兩氏俱年二十無子或勸更嫁並叱之曰主人立節朝端吾二人不可留名彤管乎相與苦守終身俱八十餘歲卒王氏耀州生員宋金臺妻性至孝少時侍父疾祈以身代歸金臺值家門鼎盛氏以勤儉自持常竟夕紡績以伴金臺夜讀及金臺死於賊氏勵志守節歷三十四年卒卒之日猶諭其子若孫曰勿忘先志嶽氏耀州監生左士元妻嫁甫四月士元死寇難氏初志誓必死因身有遺孕既而幡然曰舅姑無他子夫死左氏再世止此一線矣吾姑待之後果生子驂氏恩勤教育驂得列名膠庠享年七十有七卒文氏耀州民胡平六妻年十八夫故事姑養孤誓不他適族人有幼女失母者姑見之指謂氏曰吾孫無父此女無母其痛一也氏欣然乞養之如已出姑大慰姑既殁攜子居父家事父一如事姑時幼弟婚娶皆倚辦歷三十年而卒秦氏耀州民左于聖妻年十七歸左事姑盡孝于聖卒於蜀姑哭泣不止氏日引二幼子戲於前姑每破涕為笑自是寢食動息倚姑為命姑殁氏年已三十八以積哀成疾既革呼二子謂曰汝父死而我不死以汝祖母在也今死矣汝父尚寄骨他鄉汝兄弟能歸之吾目瞑矣言終而逝王氏同官生員習完初妻年二十五夫亡遺三女皆幼氏矢志守節明季寇禍鄉人皆出走氏泣曰吾未亡人將何之遂自經恍惚間有神救之因繯絶而蘇復不食閲十一日不死會冦退乃復食衆異之順治十三年旌表年八十而殁黨氏同官習世科妻夫病禱於神割股以進夜夢神語曰汝夫命當死憐汝志增算三旬夢醒夫果愈一月復病遂不起氏自毁其面以矢志後遭冦變兼值歲荒日課兩子讀書啖糟籺無二志歷四十餘年卒宋氏同官廪生馮賔明妻年二十七賔明死二孤俱成立有名黌舍守節三十八年卒侯氏同官廪生習佩珂妻年二十一夫亡無子屢欲自盡長姒許氏哀之以次子湛為氏子及長入泮有文名甫娶婦又夭婦劉氏年二十三亦無子時佩珂伯仲皆再世單丁乃撫外孫溫姓者為孫以繼湛後兩寡相依一門完節侯歷五十二年卒年七十三劉歷三十二年現年五十五劉氏白水農家女適張順順亦業農氏刈豆田間兩小姑春兒八兒偕往有惡少高姓者突至語挑之氏正色以拒高以刃脅之氏大罵遂被殺春兒八兒號救並遇害事聞捕髙置法旌其門吳氏生員張庚妻王氏生員宋陶澄妻韓氏胡尚盈妻董氏劉禹統妻並乾州人夫死奉姑育子不以艱辛易慮吳得年七十七王得年七十餘韓得年五十六董得年五十餘樊氏乾州生員何麟瑞妻年二十六夫死兩值年荒氏機杼資生事翁教子鄉黨賢之守節四十餘年殷氏乾州周成德妻適周甫年餘而寡年二十二家貧甚氏勤杼軸以奉舅姑育孤子守節五十餘年楊氏乾州廪生趙輝妻竇氏袁大經妻俱夫亡不嫁事舅姑克盡婦道楊守節三十二年卒竇守節五十餘年卒張氏乾州生員董煥妻年二十四夫死誓同穴痛夫無子恩勤撫姪以苦節終身董氏乾州生員邢瑄妻周氏李伯友妻並年二十三而寡初誓死以殉因翁老子幼勵志守節辛苦終身董歷三十七年周歷五十五年龍氏乾州劉繼法妻年二十九夫亡事舅姑盡孝家貧乏食氏辟纑易粟養老育孤鄉黨賢之守節五十餘年王氏乾州王紹周妻夫亡年二十二撫孤成立孤又夭氏又撫孫以延夫祀苦節四十餘年師氏乾州韓天錫妻年二十三夫死敬事舅姑家貧旦暮紡績易薪米供膳守節三十餘年張氏乾州馬賢妻夫病禱於天願以身代夫亡慟幾絶憐子幼無依乃忍死苦節撫孤歷四十五年虢氏乾州唐振聲妻年十八振聲殁翁姑病祝天請禱寢食俱廢家貧課子以女紅資其膏火守節四十年黎氏乾州監生王賔賢妻張氏侯勳妻並年十八而寡事舅姑以孝撫孤子以慈黎守節五十三年張守節三十年彭氏乾州宋志禮妻年十七甫孕而寡暨生子鞠育成立苦節四十餘年陳氏趙照妻唐氏史大儒妻祝氏劉增妻王氏王鍏妻俱乾州人夫死親老子幼家計維艱諸婦一身擔荷孝慈克盡陳唐苦節並三十餘年祝苦節三十八年王苦節五十餘年韓氏乾州王鋐妻年二十一夫殁依夫伯父母以居事之如舅姑人稱其孝立孤守節四十餘年趙氏乾州貢生宋朴繼妻年二十三朴亡待前子焻如已出焻死婦張氏年十九遺孫志琪姑媳辛勤教育早歲入泮趙守節四十七年卒張守節四十五年卒馬氏乾州上官銘妻銘兄弟同居銘死氏分爨擕孤子獨處雖寒飢無怨言苦節四十八年虢氏乾州田純儒妻寧氏王壽妻純儒壽皆諸生早亡遺子俱幼二氏誓死守節姑病各割股煮藥以進田子業儒王子業農咸得成立人謂慈孝兼盡寧五十九卒虢四十餘年卒袁氏乾州貢生殷銓繼妻夫亡截髮明志誓死不二子夭撫嗣孫成立艱辛備歷守節五十餘年嚴氏乾州雲浩然妻年二十四夫染疫氏禱於神願以身代夫殁孝事孀姑教子入泮守節三十三年師氏乾州生員殷必掄妻年二十八夫亡兩子俱幼氏撫育成立事姑篤孝姑死旦暮哭兩目失明年至七十餘卒李氏乾州生員陳而經妻年二十二甫孕而寡暨生男氏擕持事姑孝慈兼盡守節四十八年殷氏乾州崔易妻年二十一夫病篤囑其事親撫孤氏泣而頷之夫死茹荼飲蘗卒成夫志苦守四十餘年殷氏乾州生員黎衛妻夫病篤先投繯死李氏乾州廖揚光妻年二十七夫殁不食死吳氏乾州殷之才妻歸三載之才客死氏設位舉哀親朋彚弔畢乃整衣自經從容以殉劉氏武功生員馬頴姿妻頴姿隨叔琾宦永嘉兵變死節氏聞訃慟絶撫姪為嗣以延其祀守節歷四十三年卒雍正六年旌表李氏武功黨從直妻二十四歲而寡撫子仿成立仿妻薛氏二十七歲而寡侍姑苦守子銓後得入泮李七十四歲卒薛五十九歲卒楊氏武功李尚林妻年二十三尚林死立孤守節六十八年劉氏尚林子灝妻年二十六灝死立孤守節三十五年魏氏武功民馬瑜妻吳逆之變瑜運餉不歸時氏年十九貧而無倚一子甫三歲或勸改嫁氏抱子泣曰吾去將馬置此况吾夫或猶在乎朝夕紡績數十年無他志後子以病廢婦又死撫孫完節而殁年七十五郭氏武功張錫履妻年二十三夫亡翁老子幼小叔小姑皆未長氏一身擔荷矢死靡他翁殁竭力營葬叔入泮姑遣嫁皆氏力也未幾子病死益勵志守節歷四十七年卒耿氏武功生員康吕師妻閔氏康吕夢妻耿年二十四而寡撫從子為嗣苦節三十九年閔年十八而寡撫遺腹子得成立苦節五十四年李氏武功童生吳翥妻年十九生一子而寡族惡逼其改嫁氏斷五指以明不二復以舅姑俱殁無可自存抱遺孤寄母家守節五十一年張氏武功黨可法妻年二十四而寡八十二而卒五十餘年中事衰姑撫弱息堅心苦操為巾幗完人至今孫曾玉立黌舍有名康氏武功李某妻康熙壬申歲飢且大疫夫病故遺子女各一家赤貧姑殯亦在堂氏晨昏雨泣日營葬事閲數載始就緒葬日值雨氏衰服扶輿行泥中至塋匍匐冡間所需悉手具女長甫嫁而殁一子婚生孫矣其媳又殁氏備歷諸艱卒無易志素精女紅善指授德言尤擅美族姪某聘婦年甚稚失怙恃氏攜歸育之逮長遂成佳婦甥趙某婦不令延於家從氏起居者久之卒改而去洵近世女師也氏年二十六而寡卒時年六十一楊氏武功楊志秀女年十四順治八年土賊破其堡女被掠至渭水湄欲汚之女大罵賊怒以刀斫其靣兩目俱墮遂死侯氏武功生員馬璟妻璟病將不起氏誓以身殉遂先璟自縊死馬氏武功民張居仁繼妻年二十五生一子一女而寡前妻子節稍長性至孝氏與力耕糊口貧無廬舍栖止土窑中苦守者十三年一日突有惡少勸改嫁氏叱之去越數日竟紏夥夜至欲虜為婦氏閉户厲罵賊劫門入節揮刃峻拒賊怒舉火焚窑地無援者遂闔家死死後出尸節猶手持弟若妹而全身護氏氏則髮雖焦靣目如生此康熙十八年事也王氏武功民馬鐸妻年十八于歸生二女而夫夭誓不再適以從子為嗣舅姑憐其少欲嫁之氏婉辭以謝一日歸寧及返室盡失其槖中裝氏默知此舅姑計也即夕自縊死既覺姑視之衣裾斬然淚痕欲濕因撫尸而哭之極哀時年二十有四姚氏淳化陳其元妻生三女夫亡年二十餘資産悉讓夫異母弟茹荼飲氷甘貧守志女長皆遣嫁遭冦掠乘間即拔賊刀自刎血湧仆地賊驚逸越宿得蘇全節終身年七十餘卒郭氏淳化王平妻順治甲申冬土冦王老虎破縣平隨衆守陴氏聞賊至即抱幼子投井中平歸營救俱得不死未幾平被賊傷病創卒氏撫諸孤守節三十餘年恆苦貧不自給夫從弟興夫婦時為解推鄉黨義之葛氏淳化髙某妻年二十一某殁子兆祥甫歲餘氏誓無二志奉孀姑居髙家山賊至氏逃匿谷中賊搜獲之遂墮崖賊疑已死置之去越三日家人得其尸有微息因救稍蘇問姑無恙乃歸竭力奉養長齋持佛五十餘年一夕虎窺牖氏悮為耕犢以手驅之虎伏而遁里有龍王廟歲旱里民禱弗應凂氏往禱輒大雨其節孝感格如此年八十七卒兆祥亦以孝聞張氏王氏王氏羅氏王氏淳化所稱三世五節也張氏生員賈思達妻年三十夫亡守節長子獻庭康熙十三年由舉人授蒼溪知縣因吳逆之變路梗病卒妻王年二十九次子佑庭殁妻王年二十五三子佐庭殁妻羅年三十二獻庭子又誼殁妻王年二十三先後守節出自一門鄉里稱重王氏淳化羅養正母夫亡撫二子守志不移後養正與其弟相繼殁又撫二孫歷盡劬勞邑令張綸立坊以表曰節久彌貞月給倉米二斗卒年九十一薛氏淳化生員羅維垣妻年二十四維垣卒家貧苦守教子銘鑑讀書髫年入泮復早夭婦王氏奉姑育孤雯瀚雯浩亦列黌序人謂世節之報羅氏名竇芳淳化生員羅襄衮女嫁三原房大猷順治二年淳邑兵噪為亂氏聞兵至墮樓死氏有從姊雁珠明末死於賊氏母楊方娠夢奉天竇烈女偕雁珠來而生氏因為命名奉天竇氏二烈女係唐永泰中人氏與雁珠相距十七年俱以正月十五日死死時年俱十八後先爭烈事出一輒且兆于生初事為尤異云杜氏田氏淑明淑儀優姐淳化五烈也杜適生員羅章衮章衮殁杜矢志靡他順治三年土冦破淳化杜指墻間井語養女淑明淑儀曰此井吾死所也投井死二女相對哭哭畢亦次第投井死田氏章衮姪羣聘妻羣聘夭田守節與杜連墻居聞變顧其女優姐曰我與若為賊辱毋寧死遂與優姐投杜所死井俱死之冦去五尸出井上見者皆泣下邑令朱廷鋐題其門曰一門五烈又前令趙賔為傳合雁珠竇芳曰七烈淑明淑儀失其姓優姐死時年才十四尚氏長武焦之妻年十七而寡矢志守節事親教子始終無間年四十三卒雍正九年旌表魚氏長武生員王培元妻年二十夫亡事親至孝婦職無虧子懿入泮成名家聲復振年六十四卒雍正九年旌表郭氏長武生員尚班妻夫殁無子夫弟璲方二歲氏撫之恩義兼盡延師授室迄能有成雍正九年旌表守節四十年李氏長武尚簡臣母少寡守節育子有成年八十餘卒髙氏鄜州武生齊七政妻年十九七政故哀毁骨立傷舅姑老年喪子曲意承順遺孤方周歲家貧拮據教育子得入泮雍正六年旌表霍氏鄜州生員羅海瀚繼妻年二十海瀚殁家甚貧兩孤幼弱人勸之嫁氏誓死不二姑老病不能行氏負之出入二十餘年如一日撫前妻子標與己子棟無岐視拮據延師皆得成就雍正六年旌表左氏鄜州營兵許晉妻康熙十四年晉南征陳殁三子方幼翁姑皆年邁氏養育無遺憾年六十一而終雍正九年旌表張氏鄜州史彩妻年十八孀居家貧姑病氏紡績易粟養姑鄰里稱之子二人長載義娶婦旋夭無何婦亦夭氏慟絶復蘇念次子載法尚幼力加防護以延宗祀雍正九年旌表年五十八歲王氏鄜州民曹汝為妻夫亡後翁姑年邁氏誓死守節翁終年八十九姑終年七十七氏竭力營葬咸稱有禮二子皆業農諸孫讀書雍正九年旌表年六十有三李氏洛川生員屈攀鳯妻善事舅姑年十九孀居子翼廷方三歲矢志守節五十年如一日姪翊廷幼孤鞠育無異已出後翼廷登丙子鄉薦翊廷亦早歲入泮康熙五十五年旌表郝氏洛川貢生劉夢筆妻夢筆亡守節撫孤子鋐成進士孫生韻舉孝亷孀居二十餘年卒李氏中部生員劉蔚泰妻年十六蔚泰故屢欲自盡既而悟曰我死誰與養吾親撫吾子是吾夫罪人也乃強起父母憐其少寡欲奪而嫁之氏不歸寧者數載姑衰老日扶侍不去側子能言即口授孝經語孟祁寒盛暑紡績課讀不輟苦節三十八年卒雍正六年旌表子愷亦以孝聞張氏中部贈僉事劉禋妻楊氏貢生劉禔妻冦氏生員劉禊妻皆妯娌也禋任河南登封令李自成之亂殉難後禔與禊相繼亦殁張時年二十八楊二十一冦十九各撫幼子成立守志終身人稱一門三節先是祖姑王氏年老飲食罕御三氏爭乳以頤養之禊子克訏亦娶寇氏訏早亡氏事孀姑始終不懈撫育四子後皆入泮氏年五十卒楊氏中部民張崇德妻幼識大義閨範嚴肅年二十崇德亡氏撫孤守節至四十八歲卒張氏中部生員葛天裔妻年十八天裔故氏甘貧守節或諷之改適氏曰葛氏中部名族我何忍汚先人名節耶教子綺入庠守節二十一年而終天培天裔從兄弟也天培殁妻曹氏年二十九甘貧守節姑目盲事之極誠敬壽八十有四馮氏中部生員艾若􅉅母若􅉅生甫期父病革呼姪某以若􅉅囑之氏泣問夫哽咽不語氏慟曰豈謂吾不能撫孤耶金可鑠志不可奪夫殁氏方二十五歲苦節撫孤教之成立年五十卒郭氏中部民劉範妻年二十五範故氏哀傷成疾半年不能起一日忽奮然曰家貧子弱而未亡人日夜泣哭是棄孺子不育吾夫目不瞑也乃躬自織紡晝夜操作不休年四十七卒王氏中部生員劉熛妻年二十三熛亡家無立錐惟一孀姑一弱息以紡績自資值歲歉艱辛萬狀苦節五十年卒任氏鄜州人中部生員劉篤妻年十九篤亡勺水不入口者數日幾斃矣祖姑勸之曰遺孤方襁褓奈何不為嗣續計乃稍稍飲食撫子成立年八十二卒葛氏中部民梁文逺妻李氏侯世昌妻俱夫亡守節矢志撫孤葛年五十九卒李年五十八卒劉氏中部生員蘭清妻年二十清亡無子氏誓以死守父母欲奪其志氏曰吾撫孤女成立當從夫地下矣清兄蘭渤因以冢子嗣之守節三十年卒張氏中部民張大鵬母年十九夫亡守節六十七年又李育母逸其姓年十八守節卒年八十雷氏中部生員張永濟妻年二十二永濟亡家道蕭條氏勤紡績課子讀書守節四十餘年口不見齒足不踰閾子鳯翴以孝聞蘭氏中部民雷沛田妻年二十四沛田亡氏紡績課子寒暑不輟者四十七年蘭氏中部民馬俊妻年二十二俊亡遺子中驎甫二歲延師課讀少年食餼氏守節五十五年卒張氏中部民梁本素妻年二十四本素亡氏甘貧守志撫育幼子成立性勤儉壽登古稀猶率子媳織紡不輟年七十二卒劉氏中部生員牛秉乾妻夫亡氏年未及三十諸子俱幼繞膝而哭比舍為之流涕初秉乾事父甚孝又嘗以粟賑飢氏曰有隂德者後必昌當在吾子守節二十年諸子皆入學有聲蔡氏中部生員劉治妻年十九治故氏撫孤守志五十年卒初氏年十五于歸執婦道能先意承志夫殁戒諸子事祖父母出入扶持無頃刻離待姊姒及僕婢有禮有恩既殁十餘年家人言及輒涕泗不能置黃氏中部生員王者遴妻年十五歸于遴孝事舅姑夫亡氏方二十四歲父母欲奪其志氏曰家世詩禮夙聞從一之訓有死無二撫子熹成乙亥貢生年五十六卒柳氏中部貢生劉種妻賢而無子勸夫置妾延祀妾生子愛若已出年二十八種亡撫孤守節年七十七卒李氏中部民王言綸妻年二十三言綸亡甘貧守節撫育二子成立歲大飢藜藿不充氷操愈厲冢媳早死遺孫方數月氏常抱之乞乳見者墮淚年七十九卒韓氏中部民張瑗妻王氏牛漢彬妻瑗亡韓年十八漢彬亡王年二十一各遺腹生一男二氏撫孤守節並年五十一而終宋氏安塞人中部拔貢劉爾甲繼妻年二十五爾甲亡撫前妻子成立壽過古稀劉氏中部生員蘭馥暢妻馥暢病氏不解衣者二年及疾革囑氏曰煢煢弱孤善為我撫之氏泣曰諾既殁督耕課讀終身不懈二子俱成立初夫殁氏方二十三歲苦節二十年卒陳氏中部民劉崑妻年十八崑故守節至八十歲卒崑曾祖母忽氏故明已旌節婦也氏可謂嗣徽矣徐氏中部前鄒縣縣丞蘭如簡繼妻孝事老姑問寢視膳不懈姑疾湯藥必親嘗年二十四如簡故躬紡績撫孤視前子如已出家教謹嚴婦劉氏亦以孝謹稱徐年八十而殁劉以毁卒溫氏中部生員張可畏妻年二十六可畏亡子幼家貧矢志不渝年七十六歲卒郭氏中部民牛大年妻年二十夫亡子方周氏殷勤撫育娶媳生孫無何子復早世媳他適氏零丁孤苦撫其幼孫成立年七十五卒李氏中部民蘭之香妻年二十三香故子幼家貧姻婭來弔者唁曰將何恃以自立氏曰我子母相依為命忍絶其乳又别事人乎若飢而死不失為蘭氏鬼晝夜紡績不輟守節四十一年卒楊氏中部民張育妻年二十九育亡甘貧守志之死靡他守節至七十一歲柳氏中部民劉芳聲妻年十九芳聲亡其母欲令他適氏慟哭曰女不二夫素聞此義况舅姑老子幼將安託耶守節三十五年馬氏中部民張名舉妻年二十名舉亡二子皆幼或以媒妁來輒詬詈之義形於色守節二十年卒楊氏中部民張經治妻年二十一夫亡家赤貧爨火或不繼氏負子拾薪見者墮淚紡績織絍無分宵晝老姑甘旨必潔必精苦節五十六年中部二劉氏一寇曇妻一冦暹妻並庠生克訏女也曇亡氏年十九暹亡氏年二十五曇妻守節三十七年暹妻守節四十二年李氏中部民楊維世妻年十八夫亡氏養親撫孤備嘗艱苦姑亡乞貸以殯年五十七卒屈氏中部廩生孫開先妻年二十一夫亡數日不食人以親老子幼勸乃復食仍毁容見志舅姑病侍奉罔懈孤稍長篝燈課讀二子俱成立守節至七十三歲卒張氏中部生員梁國傑妻國傑以小忿為人所害氏仰天慟哭誓報夫仇罄所藏付伯兄為資斧以訟夫寃獄成將葬氏慟哭而死時年二十歲薛氏中部民雷物正妻雷客死於外氏聞訃大慟絶粒而死時年二十歲屈氏中部生員王者謀妻王病篤氏誓以死殉及卒家人嚴防之氏乘間投井死時年十六歲任氏中部縣民劉誕離妻節婦任氏之曾孫婦也年十八夫亡欲以身殉念有遺腹未即死默祝曰所生男則曾祖姑之操可繼不幸而女當從夫地下耳及生女竟自縊樊氏宜君生員蔡蕃妻李氏生員樊甸妻並夫亡守節撫孤有成樊年七十六卒李年六十五卒蘇氏宜君民董其事妻年二十三夫亡遺孤遴儒方四齡氏甘貧守節撫之成立及壯娶妻無子納妾安氏又無子遴儒尋殁時安年甚幼痛哭自經而死蘇氏至八十九歲乃卒人稱一門節烈曹氏宜君民楊維克妻年十七夫亡氏養親撫孤守節至五十二歲卒張氏宜君民徐明哲妻年十九夫亡家貧守節凍餒不怨孝翁姑勤紡織撫孤成立至八十歲卒焦氏宜君民馮琦妻年二十夫亡守節五十年事姑至孝教子成立田氏宜君民馮聚瑞妻年二十二夫亡守節三十餘年備歷艱辛始終不變劉氏宜君廪生楊國權妻年二十二夫亡教子凌漢成立凌漢復早世妻王氏年二十六守節教子一如其姑三子苾芷荃並遊庠苾亡家貧甚妻冦氏年二十九甘貧守節至拾遺􅕗滯穗以自給見者傷之劉五十六歲卒王七十三歲卒冦六十一歲卒董氏宜君生員賀年有妻年二十一夫亡一慟幾絶念舅姑老子幼強飯自愛勤紡織以供甘旨撫遺孤掄升成立年六十七歲卒白氏宜君廪生王振基妻年二十六歲夫亡甘貧守志孝事孀姑撫姪為子教養成立苦節五十餘年卒張氏宜君楊緒妻緒病革念氏年少無子囑其改適氏大慟即自縊死時年祗十八柳氏綏德儒童馬驂龍妻年十六適驂龍親操井臼事舅姑曲盡孝道二十一而寡撫幼子既長有文名兩遇歲祲族黨不能自存者悉推所有共之雍正八年旌表時年八十一歲李氏綏德馬繼俊妻年二十繼俊亡仰事俯育備歷艱辛翁姑俱年至八旬卒課子誦讀以母兼師長精一康熙辛卯舉人次純一生員雍正八年旌表時年七十有五劉氏綏德生員馬彭齡妻夙㛠內則于歸後逮事舅姑承歡無間未幾夫亡矢志苦守以織紉自給時翁姑已逝所遺幼子弱女為經營婚嫁悉底成立遇歲祲推食以惠宗黨從子某為本宗冢子家貧衣食之不使失所某病劇囑其子當厚報氏聞之泣曰吾為祖宗嗣續計耳何報為仍呼其子歸撫之雍正八年旌表時年七十二守節經四十六年張氏綏德馬徴易妻夫殁氏年二十九遺孤甚幼忍死茹荼教子成立歷三十八年雍正八年旌表田氏綏德生員李如膺妻如膺得疾氏醫禱備至以舅姑年髙恐貽憂晨夕必多方慰解暨殁事舅姑彌篤家貧子幼艱苦備嘗年五十七歲卒雍正八年旌表楊氏綏德民王善福妻年三十夫故矢志撫孤既長念家世單寒命四子各就一業時值耕穫率諸婦身自操作家業漸裕里黨有婚喪者咸周之無吝色年七十四歲卒雍正八年旌表慕氏綏德生員馬士俊妻士俊亡氏年甫二十一家貧子幼慷慨矢節翁姑衰年久病氏盡心調護俱登上壽守節歷六十年而殁雍正九年旌表髙氏綏德民延自璽妻年二十二夫亡茹荼守志事舅姑生事葬祭無缺性習勞操作至老不衰年七十二歲卒猶及見諸孫成立云雍正九年旌表任氏綏德生員馬啓周妻年二十二夫殁誓死守節朱龍變起閭里劫掠一空獨相戒不入馬氏室欽其節也奉孀姑撫幼子艱辛備歷年六十八卒雍正九年旌表王氏綏德民汪生瑾妻年二十一夫亡翁繼殁氏以婦代子治喪盡禮事繼姑尤稱孝謹二子涵溶耕讀傳家里中推善士氏年六十四歲卒雍正九年旌表葉氏綏德儒童馬彪妻年十八而寡姑老子幼其母諷以再醮氏卒無二志歲大疫氏晨夕侍姑笑言甚適俱無恙教子成家備歷艱苦年六十二歲卒雍正九年旌表李氏綏德民陸法愷妻愷亡氏慟絶終喪猶哭泣不止家貧甚以紡績自給養老存孤不致凍餒年二十一而寡歷三十九年雍正九年旌表李氏諸生張充善妻賀氏張隆軒妻俱綏德人夫亡無子誓不再適奉翁姑睦妯娌庭無間言李守節三十二年賀守節四十四年雍正十年旌表馬氏綏德民張國璽妻夫亡撫孤閫範無玷雍正十年旌表時年七十有二守節歷四十四年金氏明參將艾穆妾米脂人性敏慧嫡馬氏尤愛之年二十五穆亡會冦亂隨馬氏避兵玉華山中逾七年國朝定鼎穆仲子懷英以參將歸誠官鑲藍旗牛彔章京居於京師未幾物故季子懷元往省暨歸有仇家指為逃旗白於官捕繫之檄行原籍追取家屬甚急時窩逃禁方嚴檄下郡縣承風趣迫馬氏年邁慮不測欲自盡金氏慷慨請代與懷元妻薑氏同就道比至事得雪謀西歸無資懷元方南遊時順治八年也九年薑氏舉一子懷元閲歲不返值秦中僕至乃歸時秋雨連旬積潦千里金氏負幼子攜薑氏日彳亍泥淖中兩月餘始抵家明年馬氏卒金氏以憂勞積歲又過慟成疾而逝時年六十三薑氏哭盡哀庀喪葬逾常禮久之懷元遣信與家人訣曰母死不奔喪不可為子吾誓畢此生不歸矣薑氏驚怛不欲生家貧子幼茹苦四十餘年至六十九歲卒懷元後竟不知所終雍正六年有司以雙節聞旌表髙氏米脂生員馮震妻年二十一夫亡守節雍正六年旌表王氏米脂指揮同知艾懷光妻幼讀詩書識女誡夫亡苦節三十餘年事姑盡孝姑亡痛哭失明年六十餘卒白氏清澗民王承祚妻年二十五夫亡家甚貧粗糲不給或有勸嫁者氏囓指自誓遺孤印傑甫七歲延師教之遊庠食餼氏七十二歲卒田氏清澗廪生白乃建繼妻年二十五夫亡撫前妻子女如已出吳逆之亂邊郡禆將多叛氏顛沛流離志不少變兩孤俱早世復撫遺孫成立年七十卒郭氏葭州民劉建謨妻夫亡自縊為鄰人救蘇而止有子三人族人劉建功欲繼其幼子先以錢米輸之氏不納曰吾豈賣子糊口耶族衆聞之率建功卑禮致辭以請乃許之守節四十四年年七十三歲雍正九年旌表康氏葭州生員劉再升妻夫故氏投崖幾死念舅姑以痛子致疾氏每夕焚香籲天晝則婉辭曲諭舅姑意漸解後舅亡囑氏曰我在尚不能為汝謀生矧死乎姑已老不足恃也氣絶而目不瞑氏痛哭跪榻下誓奉姑不二適始瞑嗣喪姑喪葬以禮鄉人稱其節孝三子皆遊庠有文名守節三十五年雍正九年旌表張氏葭州民劉含珠妻年二十四而夫卒蓬首垢靣苦志完操守節三十六年雍正九年旌表劉氏葭州民劉和梅妻年二十五夫殁姑繼之撫幼叔及己子俱成立歷三十四年終雍正十年旌表馬氏葭州諸生白而潔妻夫亡氏奉姑撫孤誓無二志家素貧見孤寡無依者必分餐與之守節五十三年雍正十年旌表屈氏葭州生員牛瑾妻曹氏瑾弟牛璋妻屈年二十夫亡守節至六十五歲卒曹年十八璋亦亡與屈氏共矢節孀居事翁姑能執婦道年六十八而殁張氏葭州生員任士修妻順治六年王永強之變避賊至河干以弱子付其親曰不死恐為賊汚遂投河死李氏葭州生員劉嗣京妻結褵後劉隨親逺宦十餘年父母使之他適氏以死自誓後劉歸甫完聚旋遇冦至投崖死丁氏吳堡生員馬朂妻年二十一夫亡勵志守節孝事舅姑存殁盡禮處妯娌無間言守節三十七年雍正八年旌表馬氏吳堡監生樊恭妻年二十夫亡二子俱幼苦志守節撫育成人壽七十八卒李氏吳堡生員丁泰妻史氏吳堡生員李應賢妻羣賊來劫二氏登樓避之賊焚樓逼之下二氏堅拒不從甘為煨燼某氏府谷杜景春妻逸其姓年十八夫亡遺子甫數月家貧無資勵志苦節後子死撫孤孫成立年逾八十卒八旗節婦巴牙拉氏廂黃旗滿洲鞍匠頭目杜什巴之妻年二十九守節至六十一歲卒康熙四十三年旌表女枯魯氏廂黃旗滿洲披甲敦泰之妻年二十八守節至五十歲康熙五十三年旌表馬嘉氏廂黃旗滿洲披甲烏利巴之妻年二十九守節至五十九歲康熙六十一年旌表何舍利氏廂黃旗滿洲披甲拉虎他之妻年二十五守節至五十五歲康熙六十一年旌表馬吉氏廂黃旗滿洲披甲諾謨齊之妻年二十六守節至五十六歲康熙六十一年旌表席拉努特氏廂黃旗蒙古領催阿玉世之妻年二十五守節至五十四歲康熙五十年旌表哈爾秦氏廂黃旗蒙古外委前鋒校巴達克之妻年一十九守節至六十一歲康熙六十一年旌表博何諾特氏廂黃旗蒙古披甲三達之妻年一十八守節至五十一歲康熙六十一年旌表爾圖特氏廂黃旗蒙古披甲巴第之妻年二十守節至五十一歲康熙六十一年旌表葉氏廂黃旗漢軍披甲陳聖言之妻年二十六守節至五十八歲康熙六十一年旌表張氏廂黃旗漢軍披甲李文英之妻年二十三守節至五十三歲康熙六十一年旌表陳氏廂黃旗漢軍披甲藺登科之妻年二十九守節至六十五歲康熙六十一年旌表括爾嘉氏正黃旗滿洲披甲永愛之妻年二十五守節至五十五歲康熙四十三年旌表完顔氏正黃旗滿洲披甲韓杜之妻年二十七守節至五十五歲康熙四十三年旌表阿卓特氏正黃旗滿洲披甲努勒之妻年二十七守節至五十歲康熙四十三年旌表何舍利氏正黃旗滿洲披甲穆成額之妻年二十六守節至六十九歲康熙四十三年旌表孟固索氏正黃旗滿洲披甲古爾泰之妻年二十七守節至五十歲康熙四十三年旌表富查氏正黃旗滿洲披甲西賴之妻年二十六守節至五十歲康熙四十三年旌表格吉勒氏正黃旗滿洲披甲石圖之妻年二十六守節至五十歲康熙四十三年旌表張顔氏正黃旗滿洲披甲阿佛和之妻年二十九守節至五十歲康熙四十三年旌表瓜爾嘉氏正黃旗滿洲披甲褚爾庫之妻年二十二守節至五十歲康熙四十八年旌表哈爾哈覺羅氏正黃旗滿洲披甲常什保之妻年二十一守節至五十歲康熙五十三年旌表瓜爾嘉氏正黃旗滿洲披甲趙玉之妻年二十九守節至五十歲康熙五十三年旌表伊拉力氏正黃旗滿洲披甲俄和之妻年二十九守節至五十歲康熙五十三年旌表瓜爾嘉氏正黃旗滿洲披甲薩爾帕之妻年二十九守節至五十歲康熙五十五年旌表圖色利氏正黃旗滿洲披甲亨特之妻年二十七守節至五十八歲康熙六十一年旌表伊拉力氏正黃旗滿洲披甲齊努呼之妻年二十五守節至五十歲康熙六