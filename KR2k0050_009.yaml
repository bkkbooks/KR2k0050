body:
  text: 陜西通志卷九山川二西安府西安府長安縣終南山一名南山在縣南五十里東接咸寧西接鄠縣界太乙山在縣西南八十里即終南之異名縣志南山一名終南在縣南七十里連乾祐縣界宋敏求長安志安乾祐縣今屬鎮東西連亘藍田咸寧長安鄠盩厔五縣境府志太乙山在終南山南二十里明一統志名詳見圖考按山水有屢易其者名稱岐出每易混淆兹凡山水有别名皆注於本山本水之下庶一覽可晣後皆倣此龍首山在縣北十里賈志規龍首撫未央杜篤論都賦未央宫因龍首制前殿三輔黃圖蕭何因龍首山營未央宫山長六十餘里頭入於渭尾達樊川頭高二十丈尾漸下高五六丈土色赤而堅云昔有黑龍從南山出飲渭水其行道因山成迹山即基闕不假築高出長安城水經注山首在長安故城中自漢築長安城及營宫殿咸以堙平其餘即今宫城之太倉以東是也括地志山在長安城北禁苑西偏胡氏鑑注京城後枕龍首山唐書地理志山之餘尾城南皆已堙平坡陀北出復見於唐大安宫東西橫亘迤邐而去今宫城及內苑後墻含元殿臺一帶俱在山上下去平地可六七丈長安圖志長安城南鼎門西南北附城有土嶺可二三百步隱然如城俗名曰土蛇嶺即此山之餘土也雍大記龍首山西北高處為秦長樂漢未央稍東南六坡為隋城唐西內其東為唐南內興慶龍池之所其北為唐東內大明宫含元宣政紫宸蓬萊金鑾諸殿南內東南引滻水入城為龍首渠入東苑為龍首池龍首殿皆以是原得名名山記隋以長安城狹小作新都於龍首山遷焉明一統志餘按凡敘山有名山為境內之鎮者則以冠首則以方位循次敘之其自北而西而南而東以地勢西北多高東南多下而水道因之取其與諸水相比附也後皆倣此故市坡在京坡西即舊西市市廢其坡號為故市云府志高陽原在縣西南二十里接咸陽界雍大記故渠有二流合於高陽原水經注畢原在縣西南縣圖畢文王墓近鎬也尚書注周公葬畢在鎬東南杜中史記周本紀畢終南之道名也毛詩注李竒曰畢在岐周之間裴駰集解汲郡古文曰畢西去豐三十里臣瓉注畢原在長安縣西南二十八里雍大記據長安志云屬咸寧與咸陽縣界接非矣蓋在宋屬咸寧今屬長安而今之咸寧固不與咸陽界接也雍勝略按文武陵周公墓今俱在渭北咸陽境細栁原在縣西南三十三里别是一細栁非亞夫屯軍之所元和志在舊昆明池南縣志少陵原在縣南四十里東接萬年縣界西入縣界五里宋敏求志今詳見咸寧縣萬年縣屬咸寧石鱉谷鱉一作壁在縣南六十里長咸以此分界縣志寧詳見咸縣豹林谷在縣南石鱉谷西种放隱居之地城南記近子午谷雍録在終南山麓宋种放隱此山東明峰府志子午谷在縣南百里長六百六十里縣圖張儀説趙曰秦一軍塞午道戰國䇿長安有子午谷北山是子南山是午則午道秦南道也鮑氏注平帝元始五年王莽通子午道從杜陵直絶南山徑漢中漢書王莽傳延光四年罷子午道後漢書順帝紀建興六年魏延謂丞相亮曰願假竒兵五千當子午而北不十日可到長安三國蜀志子北方午南方言通南北道相當故謂之子午今京城直南山有谷通梁漢道者名子午谷顔師古注子午谷長安正南山名三秦記子午嶺在府南四十里至東杜甫村景祐二年置關雍大記入按漢高帝紀云元年就國從杜南蝕中如淳注云蝕入漢中道川谷名今此谷正當杜南疑子午谷即蝕中也附考長安記曰長安城西北有武將山即漢辛孟隱處雍大記相按武將山不在縣境今在醴泉縣去甚逺疑長安記之誤渭水在縣北三十里自咸陽界流入又東入咸寧界禹貢錐指渭水自合豐水又東北與鎬水合又東北徑渭城南沈水注之又東分為二水其瀆東北流徑郭淮碑南又東南合一水徑兩石人北又徑陽侯祠北渭水又東注此水水上有渭橋又東與沈水枝津合又徑長安城北又東合昆明故渠又東徑霸陵縣水經注詳見圖考渭城今屬咸陽霸陵今屬咸寧按凡敘水有大水為境內之滙者則以冠首而以所入之水附焉其所入之水則不拘大小以入之先後為次庶源流可一覽而晰也後皆倣此豐水豐一作灃在縣西南四十里自鄠縣界流入又北至咸陽入渭縣册成帝時王商穿長安城引內灃水注第中大陂以行船漢書元后傳大興中劉曜命於水上起酆明觀尋省酆水囿以與貧户晉書載記豐水出豐溪西北流分為二水一水東北流為支津一水西北流又北交水自東入焉又北昆明池水注之又北徑靈臺西又北至石徼注於渭古水經注灃水今名賀蘭渠東北流注交水括地志鎬在豐水東豐在鎬水西相去二十五里三輔決録注豐水自鄠縣界來由馬坊村入咸陽合渭水宋敏求志子午谷水源出長安縣秦嶺北得萬陽三川水西北經子午谷得折腰嶺水又西入豐谷水水出豐谷口北流其西高觀太平二谷水入焉其東則雪谷龍騾西和白石羅什諸谷水入焉為西交河又北則有東交河水入焉雍勝略潏水即沈水一名高都水一名漕水在縣南二十里自咸寧縣流入又西北入渭縣志沈水自徑下杜城又西北與昆明故池會又北徑秦通六基東又北徑堨水陂東又北合陂水又北徑長安城西與昆明池水合又北徑鳳闕東又北分為二水一水東北流一水北徑神明臺東又北徑漸臺東又北流注渭亦謂是水為潏水也又謂之高都水又沈水枝津上承沈水東北流徑鄧艾祠南又東分為二水一水東入逍遙園注藕池一水北流入渭水經注咸下杜城今屬寧漕水即沈水也東自萬年界流入亦謂之潏水寰宇記潏水在縣南十里東自萬年縣界流入交水又漕河在咸陽縣南十五里自萬年界來經咸陽界五里入渭宋敏求志丈八溝在縣西南十五里即漕河岸最深處賈志皂河自牛頭寺入縣境西北流至丈八溝一分流為通濟渠一西北流徑三橋鎮入渭縣册河按皂河即漕之訛交水交一作郊郊河水在縣南三十二里自萬年縣界徑本縣三十里合豐水圖經交水一作郊水水經注曰交水又西南流與豐水枝津合其北又有漢故渠出焉又西至石碣分為二水一水西流注豐一水北徑細栁諸原北流入昆明池又坈谷水在縣南二十七里自萬年縣界流徑本縣五里合交水又楩梓谷水出南山北流合潤國渠又西北豹林谷水入焉又西北至縣東南三十里入交水其豹林谷水出南山北流三里有竹谷水自南來會之又北流二里子午谷水自東來會之自此以下亦謂之子午谷水合入交水又有龍騾谷水太和谷水皆流合於交水宋敏求志鎬水鎬一作鄗又作滈一名鎬池在縣西南縣圖長安西南有鎬池史記孟康注昆明池北有鎬陂徐廣注廟記曰長安城西有鎬池周匝二十一里三輔黃圖鎬水上承鎬池于昆明池北周武王之所都也又北流與滮池水合又北徑清泠臺西又徑磁石門西北注于渭水經注滈水源出長安縣西北滈池今按鎬池水北流入永通渠不復入渭括地志鎬池一名元址在昆明池北始皇毁之十道志鎬水或作滈出縣西北十八里鎬池圖經云水在縣西四十里自鄠縣界入本縣界十里入清渠宋敏求志鎬池在咸陽縣西南二十五里長安圖鎬水在豐東二十五里源出太乙山西谷中北流迤西得七姑谷水又西得漆谷磻谷鴻興竹谷桐梓石鱉豹林諸谷水過御宿川北香積寺南西合潏水為東交河又西入豐水雍勝略水源亦出南山谷中北流經故長安城西南注昆明池又北為鎬池又北入於灃水自唐堰入昆明池而灃鎬之流絶今則昆明池亦涸為民田矣縣志御宿川宿一作羞在縣西南四十里縣志武帝元鼎二年置御羞禁圃令丞漢書百官表御羞地名在藍田如淳注夏遊蓹宿漢書元后傳即今長安城南御宿川也不在藍田羞宿聲相近故或云御羞或云御宿耳顔師古傳武帝開上林東南至御宿揚雄羽獵賦序御宿苑在長安城南御宿川中漢武帝為離宫别館禁禦人不得出入往來遊觀止宿其中故曰御宿三輔黃圖樊川一名御宿川三秦記樊川御宿皆上林苑地城南記御宿川北岸之西潏水來會為東交河南岸之西為西交河又西為豐水又北至定昆池為豐鎬之間又北為鎬入豐處御宿之地盡矣其形逶迤自東南而西北故杜甫詩曰昆吾御宿自逶迤是也馬志聖女泉水即滮池一名氷池在縣西北二十里縣志滮池北流浸彼稻田詩經小雅滮流貌毛傳豐鎬之間水北流也鄭注長安縣有滮池水魏書地形志滮池水出鎬池西而北流入於鎬世傳以為水名水經注滮池一作滮沱説文氷池在長安西三輔黃圖氷池在縣西北十五里圖經滮池一名聖女泉蓋氷滮聲相近而訛也舊圖聖女泉出昆明池北平地上周十步西北流五十步與牧豬泉合宋敏求志按志中凡溝池泉澗之無所流注者並附諸水後其流衍而入於他水者則以所入之序為次而加一水字别之後皆倣此布政司井在城中布政司庫內相傳即昊天觀水是否未詳咸寧縣志李德裕在中書喜飲常州惠山泉因置水遞有僧詣德裕曰京師一眼井與惠山泉脈相通李笑其誕曰井在何方曰昊天觀庫後是也李乃以惠山一罌昊天一罌雜以八瓶遣僧辨析僧因啜嘗取惠山與昊天餘八乃同味德裕大竒之因停水遞芝田録劉公井在城中按察司署內扶溝劉自強蒞官時鑿時旱甚城內外渠井皆涸既穿味極甘冽因名劉公井咸寧縣志咸寧縣終南山在縣南五十里縣圖終南山東自藍田縣西入縣界石鱉谷以谷水與長安分界東西四十里長安志終南山東接藍田西接長安延四十里南界鎮安袤二百里又秦嶺在縣南南山峰脊也江河水由此分南流皆謂江北流皆謂河屬邑界者東西約七十里縣志東詳見圖考按三秦記云秦嶺東起商洛西盡汧隴西八百里則秦嶺即終南也乃今多指商藍之界為秦嶺亦因其地為唐韓愈所經而遂專目之耳金鑾坡在縣北郭外縣圖金鑾坡者龍首山之支隴隱起平地而坡陀靡迤其上有金鑾殿故殿旁之坡亦遂名也坡在蓬萊山正西微南雍録京兆元武門外龍首坡上出三稄人呼為三稄坡府志三稜坡西亘長安又有龍首坡在金鑾坡東縣志草場坡在縣南郭外縣志坡在永樂坊即橫岡之第五爻也宋張禮城南記在朱雀門外乃舊草市有坡府志胭脂坡在縣治東南董子祠後即翡翠坡或云與翡翠相接在宣平坊南縣志開元坡在縣東興慶池西為明皇藩邸後廢為坡縣志石鱉谷鱉一作壁在縣西南五十五里谷口大石如鱉咸長以此分界內有景陽川梅花洞九女潭仙人迹宋吕大防曰隋築都城南直南山石鱉谷縣志谷口有白圓石其巨如屋類鱉雍大記谷有廣惠神祠其西有百塔城南記樂遊原即樂遊苑在縣南八里賈志亦龍首杜原之橫岡隨地異名也縣志塔坡在縣南二十里縣册坡在韋曲西以其地有浮圖故名唐何將軍山林也杜甫有遊何將軍山林詩長安圖説勳蔭坡一名牛頭山在縣南二十五里牛頭寺下賈志今牛頭寺之坡也寺即牛頭山遍照禪師之居又有龍堂坡在牛頭寺西地甚平衍中多植杏謂之杏花坪城南記勳蔭坡在樊川北隈為韋杜故里縣志杜坡即杜固一名馬塴崖一名鳳凰嘴在縣南即杜固也唐杜正倫執政建言鑿杜固通水以利人既鑿川流如血今所鑿處崖塹尚存俗曰馬塴崖或曰鳳凰嘴城南記在神禾原東北縣志神禾原在縣南三十里賈志原上有蓮花洞唐鄭駙馬所居杜甫詩主家隂洞細煙霧指此長安圖説原在御宿川北樊川之原上東西三十里雍大記原在縣南下臨樊川其原南起竹谷東西北行三十里入長安為潏水界斷其南為御宿川劇談録云晉天福六年産禾一穗重六斤故名縣志高望堆一名高