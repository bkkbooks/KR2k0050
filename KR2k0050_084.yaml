body:
  text: 陜西通志巻八十四德音二漢髙帝元年冬十月西入咸陽十一月召諸縣豪傑曰父老苦秦苛法久矣誹謗者族耦語者棄市吾與諸侯約先入關者王之吾當王關中與父老約法三章殺人者死傷人及盗抵罪餘悉除去秦法吏民皆安堵如故凡吾所以來為父兄除害非有所侵暴毋恐且吾所以軍霸上待諸侯至而定要束耳漢書髙帝本紀二年冬十一月都櫟陽使諸將畧地繕治河上塞故秦苑囿園池令民得田之漢書髙帝本紀正月大赦罪人史記髙祖本紀二月癸未令民除秦社稷立漢社稷施恩德賜民爵蜀漢民給軍事勞苦復勿租税二嵗關中卒從軍者復家一嵗六月壬午立太子赦罪人漢書髙帝本紀四年十一月漢王西入關至櫟陽存問父老置酒漢書髙帝本紀十年秋七月癸邜太上皇塟萬年赦櫟陽囚死罪已下漢書髙帝本紀十一年夏四月令豐人徙關中者皆復終身漢書髙帝本紀惠帝五年九月長安城成賜民爵戶一級册府元龜文帝二年春正月丁亥詔曰夫農天下之本也其開藉田朕親率耕以給宗廟粢盛民讁作縣官及貸種食未入入未備者皆赦之漢書文帝本紀景帝七年免徒𨽻作陽陵者史記景帝本紀中元四年秋赦徒作陽陵者死罪漢書景帝本紀武帝建元三年春賜徙茂陵者户錢二十萬田二頃漢書武帝本紀元朔三年秋城朔方城令民大酺五日漢書武帝本紀元狩三年秋舉吏民能假貸貧民者以名聞減西北地上郡戍卒半徙貧民於關西及充朔方以南新秦中秦始皇遣䝉恬攘卻匈奴得其河南造陽之北千里地甚好於是為築城郭徙民居之民名曰新秦四方雜錯奢儉不同今俗名新富貴者為新秦由是名也七十餘萬口衣食皆仰給於縣官數嵗貸與産業使者分部䕶之冠葢相望費以萬計册府元龜元鼎四年冬十月行幸雍祠五畤賜民爵一級女子百户牛酒漢書武帝本紀六年詔曰農天下之本也泉流灌浸所以育五穀也左右内史地名山川原甚衆細民未知其利欲為通溝瀆畜陂澤所以備旱也今内史稻田租挈重不與郡同其議減令吏民勉農盡地利平繇行水勿使失時漢書溝洫志元封二年六月詔曰甘泉宫内中芝産九莖連葉上帝博臨不異下房賜朕𢎞休其赦天下賜雲陽都百户牛酒漢書武帝本紀昭帝始元三年秋募民徙雲陵賜錢田宅漢書昭帝本紀四年夏六月徙三輔富人雲陵賜錢户十萬秋七月詔曰比嵗不登民匱於食流庸未盡還往時令民共出馬其止勿出諸給中都官者且減之漢書昭帝本紀元鳳二年六月詔曰朕閔百姓未贍前年減漕三百萬石頗省乘輿馬及苑馬以補邊郡三輔傳馬其令郡國毌斂今年馬口錢三輔太常郡得以菽粟當賦漢書昭帝本紀六年夏詔曰夫穀賤傷農今三輔太常穀減賤其令以菽粟當今年賦漢書昭帝本紀宣帝本始二年春以水衡錢為平陵徙民起第宅漢書宣帝本紀三年大旱令三輔民就賤者且毋收事盡四年漢書宣帝本紀晉灼曰不給官役也師古曰收謂租賦也事謂役使也盡本始四年而止漢書注四年春正月詔曰盖聞農者興徳之本也今嵗不登已遣使者賑貸困乏其令大官損膳省宰樂府減樂人使歸就農業丞相以下至都官令丞上書入穀輸長安倉助貸貧民民以車船載穀入關者得毋用傳漢書宣帝本紀地節三年冬十月詔池籞未御幸者假與貧民流民還歸者假公田貸種食且勿算事漢書宣帝本紀元康三年六月詔曰前年夏神爵集雍今春五色鳥以萬數飛過屬縣翺翔而舞欲集未下其令三輔毋得以春夏擿巢探卵彈射飛鳥具為令漢書宣帝本紀四年八月賜故右扶風尹翁歸子黄金百斤以奉其祭祀漢書宣帝本紀詔曰朕夙興夜寐以求賢為右不異親踈逺近務在安民而已扶風翁歸廉平鄉正治民異等早夭不遂不得終其功業朕甚憐之其賜翁歸子黄金百斤以奉其祭祀冊府元龜神爵元年上行幸甘泉行所過毋出田租文獻通考五鳯元年夏赦徒作杜陵者漢書宣帝本紀元帝初元元年三月以三輔太常郡國公田及苑可省者振業貧民貲不滿千錢者賦貸種食六月以民疾疫令大官損膳減樂府員省苑馬以振困乏九月詔曰間者隂陽不調黎民飢寒無以保治惟徳淺薄不足以充入舊貫之居其令諸宮館希御幸者勿繕治太僕減穀食馬水衡省肉食獸漢書元帝本紀二年春正月行幸甘泉郊泰畤賜雲陽民爵一級女子百户牛酒三月詔罷水衡禁囿宜春下苑少府佽飛外池嚴籞池田假與貧民漢書元帝本紀罷建章甘泉宮衛角抵省禁苑以予貧民減關中卒五百人轉轂振貸窮乏漢書食貨志三年六月詔曰盖聞安民之道本由隂陽間者隂陽錯謬風雨不時朕之不徳庶幾羣公有敢言朕之過者今則不然媮合茍從未肯極言朕甚憫焉永惟烝庶之飢寒逺離父母妻子勞於非業之作衛於不居之宮恐非所以佐隂陽之道也其罷甘泉建章宫衛令就農百官各省費條奏毋有所諱有司勉之毋犯四時之禁丞相御史舉天下明隂陽災異者各三人漢書元帝本紀永光元年春正月行幸甘泉郊泰畤赦雲陽徒賜民爵一級女子百户牛酒髙年帛行所過毋出租賦漢書元帝本紀成帝建始二年詔曰迺者徙泰畤后土於南郊北郊朕親飭躬郊祀上帝皇天報應神光並見三輔長無供張繇役之勞赦奉郊縣長安長陵及中都官耐罪徒減天下賦錢算四十漢書成帝本紀鴻嘉元年二月壬午行幸初陵赦作徒以新豐戲鄉為昌陵縣奉初陵賜百户牛酒漢書成帝本紀永始元年七月詔曰朕執徳不固謀不盡下過聴將作大匠萬年言昌陵三年可成作治五年中陵司馬殿門内尚未加功天下虚耗百姓罷勞客土䟽惡終不可成朕惟其難怛然傷心夫過而不改是謂過矣其罷昌陵及故陵勿徙吏民令天下無有動揺之心漢書成帝本紀四年春正月行幸甘泉郊泰畤賜雲陽吏民爵女子百户牛酒鰥寡孤獨髙年帛漢書成帝本紀元延四年三月甘露降京師賜長安民牛酒漢書成帝本紀哀帝建平元年太皇太后詔外家王氏田非冡塋皆以賦貧民漢書哀帝本紀平帝元始元年正月遣諌大夫行三輔舉籍吏民以元壽二年倉卒時横賦歛者償其直義陵民塜不妨殿中者勿發漢書平帝本紀東漢世祖建武二年十一月勅馮異曰三輔遭王莽更始之亂重以赤眉延岑之酷元元塗炭無所依訴今之征伐非必畧地屠城要在平定安集之耳諸將非不健鬭然好擄掠卿本能御吏士念自修勅無為郡縣所苦後漢書馮異傳五年五月丙子詔曰久旱傷麥秋種未下朕甚憂之將殘吏未勝獄多寃結元元愁恨感動天地乎其令中都官三輔郡國出繫囚罪非犯殊死一切勿案見徒免為庶人務進柔良退貪酷各正厥事焉後漢書光武本紀六年五月辛丑詔三輔遭難赤眉有犯法不道者自殊死以下皆赦除之後漢書光武本紀七年春正月丙申詔三輔郡國出繫囚非犯殊死皆一切勿案其罪見徒免為庶民耐罪亡命吏以文除之後漢書光武帝本紀和帝永元三年冬十月癸未行幸長安詔曰北狄破滅名王仍降西域諸國納質内附豈非祖宗迪哲重光之鴻烈歟寤寐歎息想望舊京其賜行所過二千石長吏以下及三老官屬錢帛各有差鰥寡孤獨篤癃貧不能自存者粟人三斛後漢書和帝本紀十二年夏四月閏月賑貸五原民下貧者穀後漢書和帝本紀十三年三月丙午賑貸朔方貧民及孤寡羸弱不能自存者後漢書和帝本紀十四年夏四月庚辰賑貸五原流民下貧穀各有差後漢書和帝本紀安帝永初四年春正月辛邜詔以三輔比遭冦亂人庶流冗除三年逋租過更口算芻藁稟上郡貧民各有差後漢書安帝本紀元初元年冬十月乙邜詔除三輔三嵗田租更賦口算後漢書安帝本紀二年春正月詔稟三輔流冗貧人冬十月遣中郎將任尚屯三輔詔郡國中都官繫囚减死一等勿笞詣馮翊扶風屯妻子自隨占著所在女子勿輸亡命死罪以下贖各有差其吏人聚為盗賊有悔過者除其罪後漢書安帝本紀順帝永和二年冬十月甲申行幸長安所過鰥寡孤獨貧不能自存者賜粟人五斛庚子幸未央宮㑹三輔郡守都尉及官屬勞賜作樂後漢書順帝本紀桓帝延熹二年十二月賜長安民粟人十斛園陵人五斛行所過縣三斛後漢書桓帝本紀獻帝初平四年夏五月雨水遣侍御史裴茂訊詔獄原輕繫後漢書獻帝本紀李傕奏茂擅出囚徒請收之詔曰災異屢降隂雨為害使者銜命宣布恩澤原解輕微庶合天心欲釋結而復罪之乎後漢書董卓傳興平元年三輔大旱遣使者洗囚徒原輕繫使御史侯汶出太倉米豆為飢人作糜粥經日而死者無數帝疑賦䘏有虚乃親於御坐前量試作糜乃知非實使侍中劉艾出讓有司侯汶杖五十自是之後多得全濟後漢書獻帝本紀晉武帝泰始七年五月雍梁秦三州饑赦其境内殊死已下晉書武帝本紀惠帝永平六年冬十月乙未曲赦雍梁二州晉書惠帝本紀八年春正月詔發倉廩賑雍州飢人晉書惠帝本紀帝奕太和元年九月甲午曲赦梁益二州晉書帝奕本紀宋髙祖永初三年三月秦雍流户悉南入梁州送紵絹萬疋荆雍州運米委州刺史隨宜給賦册府元龜後魏太武帝神䴥三年十有一月庚子赦秦雍之民賜復七年魏書太武帝本紀太平真君七年二月丙戍幸長安存問父老魏書太武帝本紀文成帝太安五年冬十有二月戊申詔曰朕承洪業統御羣有思恢政化以濟兆民故薄賦歛以實其財輕徭役以紓其力欲令百姓脩業人不匱乏而六鎮二雍偏遇灾旱年穀不收其遣開倉廩以賑之有流徙者諭還桑梓欲市糴他界為關傍郡通其交易之路若典司之官分職不均使上恩不達於下下民不贍於時加以重罪無有攸縱魏書文成帝本紀孝文帝承明元年八月甲申以長安二蠶多死丐民嵗賦之半魏書孝文帝本紀太和三年六月辛未以雍州民飢開倉賑恤魏書孝文帝本紀十有二年五月丁酉詔關内六郡各修水田通渠溉灌十有一月詔以雍州民飢開倉賑恤魏書孝文帝本紀十有九年六月乙邜曲赦梁州復民田租三嵗魏書孝文帝本紀二十有一年夏四月辛未幸長安乙亥親見髙年問所疾苦丙子遣侍臣分省縣邑賑賜穀帛五月己丑車駕東旋泛渭入河庚寅詔雍州士人百年以上假華郡太守九十以上假荒郡八十以上假華縣令七十以上假荒縣庶老以年各減一等七十以上賜爵三級其營船之夫賜爵一級孤貧鰥寡窮痾廢疾各賜帛二匹穀五斛其孝友徳義文學才幹悉仰貢舉魏書孝文帝本紀宣武帝正始三年八月壬戍曲赦秦岐等五州魏書宣武帝本紀孝明帝孝昌三年冬十月戊申曲赦關西諸州魏書孝明帝本紀北周武帝天和元年春正月辛巳露寢成幸之令郡臣賦古詩京邑耆老並預㑹焉頒賜各有差周書武帝本紀建德四年岐州民飢開倉賑給周書武帝本紀關中民飢椿表陳其狀璽書勞慰因令所在建倉賑恤周書宇文椿傳隋文帝開皇二年上幸岐州下詔曰賞以勸善義兼訓物岐州刺史梁彥光操履平直識用凝逺布政岐下威惠在人亷慎之譽聞於天下三載之後自當遷陟恐其匱乏且宜旌善可賜粟五百斛物三百段御傘一枚庶使有感朕心日増其美四海之内凡曰官人慕髙山而仰止聞清風而自勵未幾又賜錢五萬隋書循吏傳四年九月乙丑幸灞水觀漕渠賜督役者帛各有差隋書文帝本紀五年五月工部尚書長孫平奏曰去年亢陽關内不熟陛下哀愍黎元甚於赤子運山東之粟置常平之倉開發倉廩普加賑賜隋書食貨志六年八月辛邜關内七州旱免其賦税隋書髙祖本紀命司農丞王亶發廣通之粟三百餘萬石以拯關中又發故城中周代舊粟賤糶與人買牛驢六千餘頭分給尤貧者令往關東就食隋書食貨志七年十月行幸同州以先帝所居降囚徒册府元龜十四年關中大旱民飢上遣左右視民食得豆屑雜糠以獻為之流涕不御酒肉殆將一期乃帥民就食於洛陽敇斥候不得輙有驅逼遇扶老擕㓜輙引馬避之至艱險之處見負擔者令左右扶助之文獻通考煬帝大業三年四月甲申關内給復三年隋書煬帝本紀四年秋七月發丁男二十餘萬築長城自榆谷而東九月辛巳詔免長城役者一年租賦隋書煬帝本紀十二年百姓饑饉義師入長安發永豐倉以賑之隋書食貨志唐髙祖武徳二年二月武功人嚴甘羅行刼為吏所拘髙祖謂曰汝何為作賊甘羅言飢寒交切所以為盗髙祖曰吾為汝君使汝窮乏吾之罪也因命捨之册府元龜閏二月壬寅皇太子及秦王世民裴寂巡於畿縣唐書髙祖本紀詔曰隋末道消運為陽九盜賊蜂起饑饉薦臻四海之民墜於塗炭是以上天䧏鑒爰命朕躬綏靜黎元克定凶醜府庫倉廩所在開發流冗之民隨加鎮撫言念亭育監寐匪忘然年榖不登民多困乏一物失所有甚納隍宜加存問救其疾苦可令皇太子建成廵京城側近諸縣秦王廵京城以東右僕射裴寂廵京城以西詣彼閭閻見其耆老觀省風俗廉察吏民乏絶之徒量加賑給如有寃滯並為申理髙年疾病就致束帛册府元龜三年四月癸卯禁關内諸州屠唐書髙祖本紀詔曰有隋失馭喪亂𢎞多民物凋殘俗化踰侈躭嗜之族競逐旨甘屠宰之家恣行刳殺芻豢之畜靡供肴核之資胎天之羣莫遂蕃滋之性傷財墮業職此之由􅔯敚穿窬因兹未息禮曰君無故不殺牛大夫無故不殺羊士無故不殺犬豕庶人無故不食珍非惟務在仁愛盖亦示之儉約方域未寜尤須節制凋敝之後宜先蕃育豈得恣彼貪暴殘殄庶類之生茍循目前不為經久之慮導民之理有未足乎其關内諸州宜斷屠殺庶六畜滋多而民庶殷贍詳思厥𠂻更為條式册府元龜四年七月丁邜給復豳州二年唐書髙祖本紀六年四月己未以故第為通義宮赦京城唐書髙祖本紀詔曰朕恭膺大寶克隆景祚永言孝思聿追㒺極肇惟自昔葺宇舊居王迹所基積慶攸在桑梓之敬每懷踐歴日不暇給以迄於兹今既氛祲廓清區夏寧謐民休俗泰天成地平爰擇良辰言還邑里禮同過沛事等歸譙故老咸臻族姻相㑹肅恭薦享感慶兼集思俾歡心逮於衆庶愍兹幽滯有懐寛釋都輦之地宗祏所居祚固萬邦義越常等時惟孟夏方申長育宜歸天心宣兹惠澤可曲赦京城内繫囚見徒及被推問應禁之人死罪已下並從放免其内有於政切害惟理難原者宜降死從流冊府元龜七年關中旱遣使賑給之册府元龜九年八月甲子即位免關内二嵗租唐書太宗本紀太宗貞觀二年三月己巳遣使巡關内出金寶贖飢民鬻子者還之太宗本紀上謂侍臣曰水旱不調皆為人君失徳朕之不修天當責朕百姓何罪而尚多窮困聞有鬻男女者朕甚愍焉於是遣御史大夫杜淹廵關内諸州出御府金寶贖之還其父母册府元龜三年五月旱六月令中書舍人杜正倫崔敦禮守給事中尹文憲張元素等往關内諸州分道撫慰問人疾苦見禁囚徒量事斷決人有寃枉不能自申者隨狀理之事有不便於人及官人貪殘為患者並具狀還日以聞困窮之徒比雖賑贍仍有乏絶者亦量加支給在京見禁囚徒亦令所司量事斷決務從寛簡稱朕意焉終南等數縣蝗帝至苑中見蝗掇數枚而祝之曰民以穀為命而汝食之是害於百姓有過在予一人爾其有靈但當食我無害百姓將吞之侍臣恐致生疾遽諌止太宗曰所冀移災朕躬何疾之避遂吞之自是蝗不為災十月幸隴州詔岐隴二州八十以上賜物百嵗以上尤加優䘏冊府元龜四年十月壬辰赦岐隴二州免今嵗租賦降咸陽始平武功死罪以下唐書太宗本紀詔曰朕恭膺寶命握圖馭歴屬喪亂之後承凋敝之餘𢎞宣徳化勵精治道遐邇肅清要荒來服聊因暇務觀省民風遵彼岐梁言臻汧渭百年之老俱稱鼓腹五尺之童咸欣擊壤睠言曩昔亟隳此地嵗月踰邁以迄於兹周覧原隰悵然懐舊延問鄉黨僚吏猶存事異宛譙情均豐沛民和俗阜上下歡洽宜宣愷澤俾同慶幸可特赦岐隴二州管内自貞觀四年十月一日昧爽已前大辟罪以下悉從原免二州户民無出一年租賦八十以上鰥寡篤疾及舊任二州雜職佐史以上賜物各有差百嵗以上就加優恤行經咸陽始平武功三縣見禁之囚徒罪以上各降一等杖罪以下并宜釋放年八十以上及鰥寡篤疾并武功縣舊軍主帥亦加賜物凡此界内名山大川望秩之禮備加牲帛孝子順孫義夫節婦隨事褒顯旌表門閭其賜物之差宜依别敇務從周厚以稱朕意乙邜又詔曰武功舊居與岐隴不異前令减罪未稱朕心其武功一縣曲赦其罪及賜帛免租賦等特宜同岐隴二州冊府元龜五年十二月壬寅幸温湯癸邜賜新豐髙年帛癸丑赦關内唐書太宗本紀六年三月戊辰如九成宫丁丑降雍岐豳三州死罪以下賜民八十以上粟帛唐書太宗本紀詔行經之所八十已上及孝子順孫鰥寡惸獨賜以粟帛五月宴岐州父老賜帛九月幸慶善宮賜故老帛乙巳宴岐州父老賜帛各有差己酉至慶善宮庚戍宴從官父老賜帛各有差冊府元龜七年正月辛丑賜京城酺三日唐書太宗本紀十一年正月乙邜免雍州今年租賦唐書太宗本紀宴長安父老於𤣥武門賜以穀帛册府元龜十二年二月甲戌如長春宮免朝邑今嵗租賦降囚罪十月己邜獵於始平賜髙年粟帛唐書太宗本紀十三年正月乙巳帝朝於獻陵是日赦三原縣及從官衞士等大辟已下已發覺未發覺皆原其罪免其縣人一年租賦年八十已上及孝子順孫義夫節婦鰥寡惸獨有篤疾者賜物各有差宿衛陵邑中郎將衞士及三原令已下各賜爵一級册府元龜十四年正月赦雍州長安縣免延康里今嵗租賦二月赦大理萬年縣唐書太宗本紀十六年十一月丙辰獵於武功壬戍獵於岐山之陽甲子賜所過六縣髙年孤疾氊衾粟帛唐書太宗本紀帝幸慶善宫召武功之邰城立節三時豐義四鄉士女七十以上及居宮側數百人賜宴縱酒盡歡其父老中或宿經役事或舊媪蒼頭皆蹈舞勸醉爭前上壽或因言屈滯者帝咸理之宴畢賜帛各有差其無官者並加泛級冊府元龜十七年十月朔帝召雍州諸縣令誡之曰夫人君為心百姓為體安則心樂苦則心危然手足寒則應心政令急則傷下爾等或飭郵厨要聲譽非朕所尚平法憲安黎元使老弱窮獨皆得其所豪家富室不有侵漁朕所孜孜在此而已册府元龜十八年二月幸壺口村落偪側問其受田丁三十畝遂夜分而寢憂其不給詔雍州録尤少田者給復移之寛鄉冊府元龜十月癸邜宴雍州父老於上林苑賜粟帛唐書太宋本紀帝謂之曰朕剪除喪亂海内乂安百姓復業各循其理而遼東數城中國舊地莫離支狼子野心虐殺其主朕欲存其國而弔其人所以將幸雒陽有事經畧安復三韓之地一二年方還故召父老别耳子孫從行者朕躬自廵撫勿以為慮賜百嵗以上氊被袍各一疋帛十段粟十石九十以上帛五段粟五石八十以上帛三段粟三石冊府元龜二十年八月丁邜見京城父老於北闕賜食及粟帛冊府元龜二十二年二月乙邜見京城父老勞之蠲今嵗半租畿縣三之一三月丁亥赦宜君給復縣人自玉華宮苑中遷者唐書太宗本紀三月丙辰至玉華宮賜行幸所過髙年篤疾粟帛各有差冊府元龜十二月辛未降長安萬年徒罪以下唐書太宗本紀詔曰皇太子治業隆三善道兼四學惟忠孝是資寛仁在慮興言獄犴每切於懷以春陽方動請行寛宥惻隱之辭屢聞旒扆宜順其所請曲流恩降雍州長安萬年兩縣及諸司見禁囚徒三年以下差降杖罪並放免徒罪已上徵銅未輸者亦從降例冊府元龜二十三年六月即位給復雍州一年唐書髙宗本紀髙宗永徽二年正月詔曰朕寅畏三靈憂勤萬類分宵軫慮昃晷忘飱跡在嵓廊心遍天下懼八政之或舛憂一物之未安欲使菽粟積於京坻禮讓興於萌俗而德不被逺誠未動天政道有虧咎徵斯應去嵗三輔之地頗被蝗螟天下諸州或遭水旱百姓之間致有罄乏此由朕之不徳兆庶何辜今獻嵗肇春東作方始糧廩或窘事資賑給其遭䖝水處量以義倉賑貸貧乏雍同二州各遣郎中一人充使廵問務盡哀矜之旨副朕繾綣之心八月廢玉華殿以為佛寺苑内及諸曹司舊是百姓田宅并還本主册府元龜九月以同州苦泉牧地賜貧民唐書髙宗本紀四年十月甲辰赦新豐唐書髙宗本紀五年三月如萬年宫次鳳泉湯辛未赦岐州及所過徒罪以下唐書髙宗本紀詔曰朕恭膺寶命嗣奉瑶圖居萬乘之尊當四海之責遐觀往烈詳求前古每希蹤於哲后常勞心於庶務兢懼弗寜憂勤若厲屬天下無事區宇有截仰髙風於汾射暫清暑於林泉朕昔在震宫侍遊兹壤山川如舊嵗月不追今既俗阜年和華夷胥恱緬懷徽範情兼感慰宜遵省方之義且順陽和之序曲申惠澤式彰寛宥行幸所經諸縣及岐州囚徒行人犯罪者流降徒徒以下並免之册府元龜八月己未詔免麟遊岐陽今嵗課役岐州及供頓縣半嵗唐書髙宗本紀六年正月壬申拜昭陵赦醴泉免縣今嵗租調唐書髙宗本紀詔曰朕躬膺大寶嗣隆景業䖍奉成則光闡洪猷昧旦兢懷分宵動慮蒼昊垂祐宗社降靈順黎元之心藉忠賢之力俗登仁夀道暨升平逺肅邇安時康俗阜履端受節陽和肇氣親率庶僚奉謁陵寢遺弓永慕切終身之憂撫鏡纒悲興寒泉之思敬深如在哀隆㒺極薦享既畢精禮獲申式表因心宜𢎞愷澤可曲赦醴泉縣并行從人大辟罪已下皆赦除之百姓宜免今年租調右監門員外將軍常基在此宿衛進爵一等令陵丞各加一階并節級賜物册府元龜顯慶三年二月戊寅録京城囚徒悉原宥之册府元龜四年十月壬辰親慮在京囚徒多所降免册府元龜龍朔三年二月庚戍詔曰天地施生陽和在節言念幽圄載惻分宵雖復每有哀矜猶恐未免枉濫在京繫囚應流死者每日將二十人過帝自慮之多所原免慮不盡者仍令皇太子於百福殿慮之舊唐書髙宗本紀十二月庚子詔在京雍州諸縣見繫囚徒各降一等杖罪已下並免之册府元龜麟徳元年正月己邜宴京城老人八十以上賜物各有差八月己邜降萬年縣囚徒流罪從徒徒從杖杖已下並宥之冊府元龜總章二年九月壬寅如岐州乙巳赦岐州賜髙年粟帛唐書髙宗本紀咸亨元年七月甲戌以雍華同州旱遣使慮囚减中御諸廐馬九月丁丑給復雍華同岐邠隴六州一年唐書髙宗本紀十月壬辰詔雍同華等州百姓有單貧孤苦不能得食及於京城内流冗街衢乞丐㕓肆者宜令所司撿括具録名姓本貫屬於故城内屯監安置量賜皮裘衣裝及糧食縣官與屯監官相知檢挍冊府元龜四年十月乙未以皇太子納妃赦岐州賜酺三日唐書髙宗本紀上元二年春正月勅雍岐同華隴等州給復一年自餘諸州咸亨年遭旱澇䖝霜損免之家雖經豐稔家産未復宜更免一年租冊府元龜儀鳳元年八月庚子以星變放京城繫囚舊唐書髙宗本紀三年四月以同州饑沙苑及長春宮並許百姓樵採漁獵五月壬戍發京師幸九成宮丙戍至自九成宮是日山中霖雨大寒行從兵士有凍死者各賜絹三疋給棺槥官為埋殯十月詔曰咸京天府地隘人繁百役所歸五方胥萃雖獲登秋之積猶虧洊嵗之資眷言於兹思蠲徭賦夫以交風奥壤測景神州職貢所均水陸輻輳今兹豐熟特倍常時事貴從宜實惟權道即以來年正月幸東都關内百姓宜免一年庸調及租并地丁税草其當道諸縣特免二年冊府元龜永隆元年正月己亥詔雍岐華同四州六等以下户宜免兩年地税七月赦京城繫囚舊唐書髙宗本紀開耀元年正月己亥免雍岐華同四州二嵗税唐書髙宗本紀武后垂拱二年十月己巳有山出於新豐縣改新豐為慶山赦囚給復一年賜酺三日唐書武后本紀長安元年十月辛酉給復關内三年賜酺三日唐書武后本紀中宗神龍元年四月雍州同官縣大雨雹鳥獸死又大水漂流居人四五百家遣員外郎一人廵行賑給冊府元龜景龍元年四月庚寅赦雍州唐書中宗本紀三年十月以關中旱遣大理少卿侯令徳等分道撫問賑給冊府元龜十一月免關内今嵗賦十二月如新豐温湯甲辰赦新豐給復一年唐書中宗本紀四年二月壬午赦咸陽始平給復一年唐書中宗本紀睿宗景雲元年十一月曲赦萬年髙陵三原華原富平等縣册府元龜宗開元元年十月己亥幸温湯免新豐來嵗税唐書𤣥宗本紀引京畿縣令入見謂之曰間者畿輔之地水旱有愆朕務在恤人將幸於雒恭承嚴㫖遂輟東廵百姓等或有出關恐至失業朕毎自節儉惠養黎元卿等深體朕懷各敬乃事時太上皇有誥不令東廵也册府元龜二年春正月關中自去秋至於是月不雨人多飢乏遣使賑給舊唐書𤣥宗本紀求直諌停不急之務寛繫囚塟暴骸唐書𤣥宗本紀戊寅勅曰如聞三輔近地豳隴之間頃緣水旱素不儲蓄嗷嗷百姓已有饑者靜言思之遂忘寢食宜令兵部員外郎李懷讓主爵員外郎慕容珣即分道馳驛往岐華同豳隴等州指宣朕意灼然乏絶者速以當處義倉量事賑給如不足兼以正倉及永豐倉米充仍令節減務救懸絶者還日奏聞冊府元龜五月罷修大明宮詔以農務方勤罷之世史類編九月丁酉宴京師侍老於含元殿庭賜九十以上几杖八十以上鳩杖婦人亦如之賜於其家唐書𤣥宗本紀十月癸亥幸郿縣之鳳泉湯甲戌制曰詩人賦田以備蒐狩之義王者順時式展畋遊之禮頃者築場神甸清道子來經上林之苑囿指扶風之藪澤雖獵將提鼔虞人植旗仍憫沍寒之節不行肅殺之命豈惟虞舜之典或秩山川所冀周文之風及於鳥獸由是罷還士卒非重盤遊養彼吏人致有煩擾所謂行者幸也后來其蘇宜申恩惠用符古者所經州縣供承頓官百姓並告營幕橋道等事宜令所司勘㑹奏聞其緣御路及頓塲麥苗有損者亦令實具奏聞十一月乙邜至鳳泉湯是月詔曰陳詩展義問俗觀風乃王者之所務也頃屬農事皆隙嵗功有成近歴酆鎬左連岐雍見江山秀麗溝塍綺錯長楊鄠杜之間竹林園果之富相望於道家給人足謂之時邁頗慰予懷思所以問耆老恤淹滯舉逸人旌賢士庶協廵遊之典以符行在之恩駕所過之縣見禁囚徒以下咸宜放免流以上罪具犯狀奏聴進止古者親問髙年義存養老年九十以上並篤疾各賜物四段綿布各一屯十二月甲辰詔曰惟此新豐温湯是出古之順豫義兼廵省頃者觀風數臨兹地以察寃滯詢於故老閭里歡康田疇墾闢况冬隆積雪春期有年且誦王遊果符時邁雖千乘萬騎咸給於主司而累月再來頗勤於除掃宜下復蠲之令慰其望幸之心新豐縣百姓免一年雜差科冊府元龜三年五月丁未以旱錄京師囚唐書𤣥宗本紀詔曰惟刑恤哉古之道也朕撫臨四海茂育兆人思致淳風登之夀域期畫冠而不犯故開羅而在宥念兹下愚自抵常法時屬盛夏天其養生在物最靈惟人為貴朕處臺榭猶有欎蒸之毒彼居囹圄能無憯怛之憂故令宰臣備加案察省覽所奏用憫於懷爰矜可恕之罪必務惟輕之義將布寛惠俾從原减應合書罪者宜遞降一等論册府元龜十月癸亥如郿赦所過徒罪以下賜侍老九十以上及篤疾者物戊辰降大理繫囚罪十二月乙丑降鳳泉湯所過死罪以下唐書𤣥宗本紀四年九月壬寅詔曰關中田苗今正成熟若不收刈便恐飄零緣頓差科時日尚逺宜令併功收拾不得妄有科喚致妨農業仍令左右御史檢察奏聞冊府元龜七年正月京畿縣令朝見勅之曰諸縣令等親百姓之官莫先於邑宰成一年之事特要於春時卿等列在三畿各知人務宜用心處置以副朕懷農功不可奪蠶事湏勿擾市獄在簡典正宜肅徭賦湏平豪强勿恣凡著賢能必無曠職即宜好去冊府元龜八年詔曰昔史起溉漳之䇿鄭國鑿涇之利自兹厥後聲塵缺然同州刺史姜師度識洞於微智研未兆匪躬之節所懷必鑿奉公之道知無不為頃職大農首開溝洫嵗功猶昧物議紛如緣其忠款可嘉委任仍舊暫停九列之重假以六條之察自藏過半績用斯多食乃人天農為政本故兹廵省不憚祁寒將申勸䘏之懷特冐風霜之弊今原田彌望畎澮連屬由來榛棘之所徧為秔稻之川倉庾有京坻之饒關輔致珠金之潤本營此地欲利平人縁百姓未閑恐三農虚棄所以官為開發冀令遞相教誘功既成矣思與共之其屯田内先有百姓挂籍之地比來召人作主亦量准頃畝割還其官屯熟田如同州有貧下欠地之户自辦工力能營種者准數給付餘地且依前官取師度以功特加金紫光禄大夫賜帛三百疋冊府元龜九月丙寅制曰五刑之用以禁奸慝三宥之設以矜愚耄朕永康四海憂在兆人俾臻大化爰措庶獄而愚妄之色抵犯或聞向隅可哀當宁興軫今天地既肅申嚴在命時分其令罪則無留載懷幽犴思布生徳宜崇减死之恩式明宥過之典其京城内犯罪人等時令按覆其中造偽頭首及謀殺人斷死者决一百配流嶺南惡處斷死者决一頓免死配流逺處雜犯流移者各减一等杖罪已下並免冊府元龜十二年八月詔曰蒲同兩州自春偏旱慮至來嵗貧下少糧宜令太原倉出十五萬石米付蒲州永豐倉出十五萬石米付同州减時價十錢糶與百姓冊府元龜十五年七月丙辰詔曰同州鄜州近屬霖雨稍多水潦為害念彼黎人載懷幽惕宜令侍御史劉彥回乘傳宣慰其有百姓屋宇田苗被漂損者量加賑恤冊府元龜己亥䧏都城囚罪徒以下原之唐書𤣥宗本紀十七年十一月丙申拜橋陵赦奉先縣唐書𤣥宗本紀十八年正月畿縣令朝見勅之曰諸縣令等撫綏百姓莫先於宰字煦育黎民須自於厥徳卿等日在京畿各親吏理務在用心以安疲瘵庶期成政以副朕懷册府元龜十九年五月壬申京師旱帝親禱興慶池是夜大雨乙亥侍中裴光庭等請宣付史館手詔報曰爰自今春時雨愆序切憂農務無忘寢興陜雒兩郊已聞流霪而咸京近縣尚未霑霈憫禾黍以疚懷仰雲漢而翹首投龍致祭親禱靈池誓移咎於薄躬庶垂祐於黎獻神道昭著鑒此䖍誠甘澤應期嘉生遂性亦是卿等同心燮理戮力謀猷上下咸和致兹休應豐年可望慶慰良深麟鳯飛翔未為瑞也册府元龜二十一年關中久雨害稼京師饑詔出太倉粟二百萬石賑給之舊唐書𤣥宗本紀二十二年十一月勅曰百姓屢空朕孰與足言念於此良所疚懷如聞京畿及關輔有損田百姓等屬頻年不稔久乏糧儲雖今嵗薄收未免辛苦宜從蠲省勿用虗弊至如州縣不急之務差科徭役並積年欠負等一切並停其今年租八等已下特宜放免地税受田一頃已下者亦宜放免冊府元龜二十三年五月詔曰如聞關輔蠶麥雖稍勝常年百姓所收纔得自給若無優假還慮艱弊其先欠百司職田及諸色應合至蠶麥時徴已有處分訖其公私舊債亦宜停徵貧下百姓有傭力買賣與富兒及王公已下者任依常式冊府元龜二十四年八月千秋節召京兆父老宴勅并宜坐食訖樂飲兼賜物冊府元龜十月甲子次華州免供頓州今嵗税降兩京死罪流以下原之唐書𤣥宗本紀丁卯還京勅曰朕永懐西土陵寢在焉至自東都誠慰㒺極兼兹廵省且無怨思徯予之望多謝哲王飲至之規豈忘前典其供頓州應縁夫役差科並免今年地税行從飛騎萬騎三衞引駕監門各賜物五段兵彍掌閑及諸色當蕃人各賜物三段緣路供頓刺史縣令及専知官各賜一中上考從行有職掌武官賜勲一轉京兆及岐同華三州畿輔之間百役所出至於征鎮又倍餘州其今年租並依本州納其脚縱已支入京亦令所司計折酧還兩京城内及京兆府諸縣囚徒反逆緣坐及十惡故殺人造偽頭首死罪特宜免罪長流嶺南逺惡處其餘雜犯死罪𨽻配効力五年流罪並放罪人犯贓量罪貶降緣近頓所損麥苗宜令州縣即簡括量酬價直畿内侍老九十已上量賜酒麫鰥寡惸獨及征行之家宜令州縣長官親自存問如有疾患量加醫藥使近甸之内咸有賴焉冊府元龜二十六年正月丁丑以京兆稻田給貧民唐書𤣥宗本紀制曰京畿之内雜役殷繁言念劬勞豈忘優恤頃以櫟陽等縣地多鹹鹵人力不及便至荒廢近者開决皆生稻苗亦既成功豈專其利京兆府界内應雜開稻田並散給貧丁及逃還百姓以為永業冊府元龜七月免京畿下户今嵗租之半賜民酺三日唐書𤣥宗本紀天寳七載五月壬午册尊號詔京城父老各賜物十段七十以上仍板授本縣令其妻板授縣君六十以上板授本縣丞冊府元龜十載正月甲子制京兆府及三輔三郡百役殷繁自今已後應差防丁屯丁宜令所繇支出别郡冊府元龜十三載秋大霖雨米價湧貴詔出太倉米百萬石於城中分十場賤糶與貧人冊府元龜十四載三月詔曰關輔郡邑霈澤屢施京城在近時雨未降是用軫慮匪寧於懷其諸郡壇雖已勤請攸資遍祭庶達誠心宜令吏部侍郎蔣烈今月二十五日祭天皇地祇給事中王維等分祭於五星壇務申䖍㓗以副朕懷冊府元龜肅宗至徳二載十月鳳翔郡給復五載舊唐書肅宗本紀十二月給復好畤奉先縣二載唐書肅宗本紀三年是年二月改元乾元正月詔京城之人久陷凶醜亦既底定莫非王臣比屋可封唐之人闔境皆戴商之舊復以宗廟之器府庫之資散在閭閻紊於綱紀主守者缺以供事竊取者冒其常刑所以遣其撿括必使詳實如聞小臣失所遂使流言冦攘資財驚擾士庶官吏不修其法豪强横有縱暴或得一官物則破人家産或捕一奸吏則傍累親隣仍有不逞之徒因此恐嚇大為侵暴百姓寃苦永言哀念良深歎息委京兆尹兼御史大夫李峴勾當諸使撿括一切並停妄有欺奪宜即推捕奏聞仍牓坊市務令安輯副朕意焉冊府元龜乾元元年六月戊午詔曰朕聞古先哲王慎罰以䘏人命脇從罔理罪疑從輕成湯有解網之仁光武有焚書之令盖惠彼至理愛其刑章是以法不濫及刑所以措也間者時遭㓂逆患在干戈衣冠之流逼迫者衆事不獲已情稍輕焉頃者委在三司窮其五聴議重者累中刑典稍輕者猶被勾留况時久淹延人皆窘乏衣食且猶不給家屬又悉乖離艱難之憂無甚於此豈朕泣辜宥罪作人父母之意耶况恩澤頻加科條遞减原其事狀稍近平人豈可尚議遷貶窮其反側萬方有責罪實在予一物失所憂將誰屬永言憫念用惻於懐而兩京官應被賊逼授偽官三司所推問未了者一切放免其賊中守百官至冬方選曽受驅馳既寛刑典免其貶降並至來冬放選合得官時仍委所司量事輕重注擬其已貶官者續有處分冊府元龜三年二月以米貴斗至五百文多餓死令中使於西市煮粥以飼餓者冊府元龜寶應元年四月己巳即位唐書代宗本紀十二月戊辰詔曰凡在生靈合登仁夀自逢艱阻多致傷殘或冦盗為灾斃於鋒鏑或嵗時不稔道殣相望枯骨轉屍多未埋瘞朕為人父母良深憫惻將何以示掩骼之禮昭塟骨之仁永念前修豈忘古訓其京城内外應有舊骸骨宜令京兆府即勾當收拾埋瘞仍令中使與所由計㑹致祭冊府元龜代宗廣徳二年二月己丑大赦唐書代宗本紀制曰自凶孽亂常王室多故干戈不息今已十年軍國務繁關輔尤劇念兹疲耗久困徵科其京城諸司諸使應配彍騎官散官諸色丁匠幕士供膳音聲人執祭齋郎問事掌閑魚師並諸司門僕京兆府驛丁屯丁及諸色納資人每月總八萬四千五十八人數内宜每月共支二千九百四十四人仍令河東關内諸州府配不得偏出京兆府餘八萬一千一百一十四人並停所須諸衞役使宜撙節定數官給資錢不得干擾百姓冊府元龜永泰二年十一月庚辰勅曰古者量其國用而立税典必以經費用之輕重公田之籍可謂通制履畝而税斯誠弊法期於折𠂻以便於時億兆不康君孰與足故愛人之體先以博施富國之源必在均節朕自臨宸極比屬艱虞嘗欲闡敦朴之風守冲儉之道每念黎庶思致和平而邊事猶殷戎車屢駕軍興取給皆出邦畿九伐之師尚勤王畧千金之費重困吾人乃者尊冉有之言守周公之制什而税一務於行古今則編户流亡而墾田减税計量入之數甚倍徴之法納隍之懼當宁軫懷慮失三農憂深萬姓務從省約稍異蠲除用申勤䘏之㫖以救惸婺之弊其京兆府所奏今年秋税八十二萬五千石數内宜减放一十七萬五千石委黎幹據諸縣户口地數均平放免仍令明牓示百姓令知當户所减斛斗數訖奏聞其青苗地頭錢亦宜三分放一先欠永泰元年地頭錢一十四萬九千一百四十一貫並宜放免朕當躬儉節用䘏我黎元中夏漸寧庶有康濟宣示百姓知朕意焉册府元龜大厯二年正月戊寅勅同華兩州頃因盗據民力凋殘宜給復二年一切蠲免舊唐書代宗本紀三年六月辛丑詔曰夏后氏五十而貢殷人七十而助周人百畝而徹其税皆什一也故天下謂之中正而頌聲作矣乃者因三代之制定其税典務於行古庶以便人屬以嵗㑹戎事軍國用度公儲匱乏役費薦至近於倍征而吏或奉法不謹失我字人之意孤惸者恣其厚歛豪富者貸以輕徭動而生奸浸而流弊謂之什一其實大半致有去父母之邦甘庸保之役流離逋蕩靡室可依阽於死亡而莫之省每一念至良深憫惻頃以釐改從其便安置沃塉之差寛賦斂之重今邦畿之内宿麥非稔去嵗墾田又减常嵗昨者徴税其數頗多朕以萬姓不安三農將廢憂勤欝切中夜以興思以康濟庶臻其道每欲悉免量入將悉其困而未解兵嚴猶資日費用蠲常數以䘏疲人其京兆府於今年所率夏麥宜於七萬石内五萬石放不徴二萬石容至晚田熟後以雜色斛斗續納仍委京兆府尹崔昭差少尹李椅于頎等分縣廵撫必躬必親宣示朝章令悉朕意冊府元龜四年三月甲戌免京兆今嵗税唐書代宗本紀制曰王者承天命以養人也愛之如身豈止如子餒者食之寒者衣之猶恐仁之不至愧悼之心惻隱於内而不能已也故天下有道藏於百姓古之使人不過三日可以長孺齒可以養孤老盖太平至理之化何施而集於此乎朕承奉大業於兹八載不能恢𢎞王道被之六合雖徳之寡昧未燭於理常亦憂勤損節以濟元元豈不知乾坤以易簡成物帝王以惇儉守位從賦斂之薄省哉然時或多故事非獲已屬兹外攘連嵗備邊兵車之下不下十萬餉饋耗竭邦畿大殘又郊社宗廟之祀府庫錫予之用庶事之費皆仰給焉急賦暴征日益繁重加以水旱相仍嵗非豐熟方冬之首糓已翔貴又宿豪大猾横恣侵漁致有半價倍稱分田刼假於是棄田宅鬻子孫蕩然逋散轉徙就食行者甚衆念之疚心夫安土重遷人之常性向鮮誅索豈去父母之邦盖以朕不敏不明欝於教化徳之寡薄以至於斯傳曰百姓不足君孰與足書曰民非后何戴后非衆罔與守邦今縣内告病流亡不已失於撫育之道得不愧於心乎哀痛勤約明發不寐在予之情懼惕良深宜有蠲除以惠貧弱其京兆府今年秋税於所徴數内减十萬石百姓應納諸色物等比緣朔方軍糧輸轉勞敝又時方收斂宜從便省其草粟等並於東渭橋給納仍各隨當縣道路穩便如法搬入苑南及抵苑北靣貯積及檢納等宜委中書門下與所由計㑹處置百官及府縣官職田嵗月深久多被換易縱有本主皆是蒿荒虛配户人令出苗子閭閻之内其弊至深今年宜四分徴一餘並放免其諸司諸使丁役及夫匠掌閑彍騎等户多非正丁皆率貧弱頃雖减省猶慮艱辛宜委中書門下即各與本司計㑹如灼然湏役正身者具所要色目事由聞奏除此之外商量和雇並百姓先出資者並官出錢充資畿内至來年五月己未一切停差遣來年准㫖及勅並度支符應年支諸色雜物合各徴科百姓等宜據所由供數並官出錢置使依市糴供所徴百姓宜停應供徃來郵遞從來年正月至麥熟已來並官出給百姓應有欠負一物已上及諸雜夫役庸課未酬納者一切容至麥熟填還所由不得輒有干擾如官典隱盗在腹内及有欠負者不在免限且風化之由繫於長吏黜陟之典所宜大明宜令御史臺切加糾察其户口有减田萊不除或流庸稍歸農畝加闢即宜具名條奏當峻刑賞庶使凋瘵之人僅於蘇息憂勤之志止達神明宣示詔書令知朕意文苑英華四月連雨至八月京城米斗八百文官出米二萬石减估而糶以惠貧民舊唐書代宗本紀十一月乙邜詔京兆府今年税量放十萬石仍令京兆尹即與合審勘㑹不支濟户先矜放百姓應納地税及草等各隨使送納不得勞人其諸司丁役及掌閑彍騎等宜委中書門下勘㑹其先出資並官出錢充不湏更有科率冊府元龜十月制京兆府减税曰三代之時藉而不税降及近古或至倍征承平則省於經入有事則煩於薦費亦古今之常也朕勵精憂人夙夜勤約至如王制之定國用民曹之制地征必視豐穰與之上下然以邊末撤警十年於兹連五兵七萃之屯有賦輿調食之重征求横作空耗吾人所以徴地之數有踰常典頃者躬自節儉勵於三軍斂從其輕以减大半今舊穀旣沒宿麥未登尚使餒殍相望流庸不返邦畿千里編户大殘慮有自存之人未喻詔書之意臨時科率或恐増加以兹躊蹰多不墾闢行及春暮田萊益荒屬膏雨沛然慮失農候故重明朝旨更减田租盖畿内移軍所餘全少山東加運其助頗多朕又親統六師大閲戎籍事必精實自然蠲省京兆府夏麥上等每畝税六升下等毎畝税四升荒田開佃者毎畝税二升秋税上等毎畝税五升下等毎畝税三升荒田開佃者每畝税二升比者百姓不安皆因税重據其减數漸復平時頗有優當兼罷徭役加之誡勅又絶侵漁所宜鑿井耕田各勤生業自今已後必致康寜仍委京兆尹及令長分明宣示以勸東作躬親撫慰稱朕意焉文苑英華十二月勅頃以蕃冦猶虞王師未戢所資軍費皆出邦畿征調薦興日加煩重念流亡之役减嵗入之租務於惠養兼有蘇息尚聞告病終未安居深用愧悼更思愛䘏今關輔諸州墾田漸廣江淮轉漕常數又加計一年之儲有大半之助其餘他税固可從輕其京兆來年秋税宜分作兩等上下各半上等每畆税一斗下等每畆税六升其荒田如能佃者宜准今年十月二十九日勅一切每畆税二升仍委京兆尹及令長一一存撫令知朕意文苑英華五年三月丙戌以昭陵皇堂有光赦京兆關輔唐書代宗本紀制古者以季春之月布徳行惠䘏刑振乏朕親執犧牲玉帛獲奉於上帝神祗九年於兹矣克己思理明不能燭昆夷未叙王畧猶虞嵗㑹三秦之師日有千金之費悉索敝賦疲於餽軍侯甸之間徴求耗竭百穀翔貴關中小歉窮則斯濫安能懼刑困而成盗多有犯法至於軍戎之士致使廩賜不充因之逃亡或抵邦憲事非獲已情亦可察近以露濡之感明發有懷屬禁火之令節方薦鮪於園寢聖祖敷佑景靈告祥先天後天載荷嘉貺以隂以雨又助發生固宜順曲成之仁布維新之命赦罪育物曠然滌除其京兆府及三輔并京城内諸司諸使見禁囚犯死罪已下特宜釋放其有犯未發覺者罪無輕重一切放免如妄有論告以其罪罪之其官典犯賍不在免限頃者魚朝恩夙有功勲委之戎事而徴求黎庶空竭閭閻加之廣有貿易奪人賄利京城之内擅致刑獄恣行忍虐幽執無辜部領師人乖於撫馭資糧刻薄勞役煩苛惡稔豐盈自嬰沉痼念其勲舊許以幽閑令罷兵權遂其養疾而宗社䧏鑒神明所殛羸瘵不起旋至斃亡既徃無追一切不問所𬋩將士等同坐於王事各効忠勤是朕爪牙自致勲業並宜仍舊勿有憂懼盖以朕誠乖感物明未知人失於授任而臻此也今則虚懐引咎親御禁戎特加優寵以表勞績其資聖寺禁人並追捕勘責等即宜並停然以王畿艱弊矜恤疲人蠲税罷徭與之休息尚恐流庸罕復貧弱未安益用憂勤諒兹損約京兆府百姓承前應欠負官物等委所由勘責實在百姓腹内者一切放免其在所由腹内者不在放限畿内官人手力資課及府官充職掌名額稍多所有祇供不免煩費並諸縣郵遞路次館驛諸色徴科等一物已上並委中書門下與京兆尹即㑹計責取色目一一商量條件處置務令减省以息煩勞其諸司使廻易一切並停不急之務亦宜且罷農隙之後照凖常式宣示中外知朕意焉文苑英華八年五月壬寅赦京師八月甲子廢華州屯田給貧民唐書代宗本紀九年五月壬辰赦京城繫囚舊唐書代宗本紀十月壬辰降京師死罪流以下原之唐書代宗本紀十年九月壬寅降京師死罪流以下原之唐書代宗本紀詔曰朕以寡薄獲守丕圖恭黙思道克謹天戒常恐至誠不達景化未敷寅畏之誠寢興在慮自純陽用事靈雨愆旬麥雖有秋禾未嘗畝有阻三農之候將貽百姓之憂是用齋心滌慮禱於上下神祗雲從自郊月未離畢膏澤不降憂勤益深雖水旱成災隂陽恒數而刑法失中或致愆伏豈信孚有爽忠敬未誠與嗟我矜人陷於刑辟當炎蒸之序在縲絏之中久積幽怨有傷和氣所以引成湯之六事過實在予寛大禹之九刑誠存育物期於作解以救如焚其京城見禁囚徒死罪降從流流已下罪一切釋放仍委中書門下即踈理處分訖奏聞雖赦罪從輕或謂之長惡而宥過無小寜失於不經庶空夏臺用緩秋典宣示中外令知朕意文苑英華敕天下所命俾朕字人豈敢怠荒期於康濟勞精極慮十有四年務崇省約以訓天下方其疾苦屢有蠲除公税之差僅從盍徹宮衞之備仍罷踐更兼損服御用資軍國大去煩弊以休邦畿游食之人悉歸南畝墾田之數漸復平時神降嘉生嵗乃大熟震於珍物景福紛委盖上天列聖之儲祉也豈寡昧之徳而臻此耶夙夜祇惕永懷增懼然以令有緩急物有輕重故粟輕而易散錢重而難聚古人所謂糴之至賤與貴其傷一也如聞閭閻未免告疾至乃以粟數斛易錢一緡雜以他徭難以償費轉用所寶念之惻然深可重惜所宜節省其京兆府諸色番役等訪聞諸司或有徵課比緣時儉省數稍多估折皆賤不仍舊貫其掌閑彍騎三衞及橋堰丁匠等如本司湏徴資並納錢三千米六㪷其青苗地頭天下諸州每畆率錢十五頃以京師煩劇供應頗多茍從權宜遂倍其數自今已後宜准諸州例徴率朕以帝王之教人如父母之訓子所以至纎至悉必躬必親茍或便之豈憚煩也宣示百姓知朕意焉文苑英華十二年六月乙巳給復金州二年丁未以旱降京師死罪流以下原之唐書代宗本紀詔曰頃屬煩暑差候愆陽積旬處於髙明之中猶有欎蒸之嘆而况幽閉獄户辨對官曹俯臨秋期將正時憲重修欽恤之道載𢎞全宥之仁其京城見禁囚犯流以下罪並宜釋放冊府元龜八月以京城水旱分命御史廵苗冊府元龜冬十月京兆尹黎幹奏水損田三萬一千頃度支使韓滉奏所損不多兼渭南令劉藻曲附滉亦云部内田不損差御史趙計撿渭南田亦附滉云不損上曰水旱咸均不宜渭南獨免復命御史朱敖檢之渭南損田三千頃上嘆息曰縣令職在字人不損亦宜稱損損而不聞豈有䘏隐之意耶劉藻趙計皆貶官舊唐書代宗本紀十四年五月帝即位六月制士庶田宅車服踰制者有司為立法度禁百官置邸販鬻唐書徳宗本紀赦書應士庶自艱難以來田宅踰制車服奢侈仰所司詳前後格敕明立法度王公百官既處榮班宜知亷慎如聞坊市之内置邸鋪販鬻與人爭利並宜禁斷仍委御史臺及京兆尹紏察冊府元龜十月辛酉以沙苑豢豕三千給貧民唐書徳宗本紀德宗興元元年正月癸酉大赦給復奉天五年城中十年唐書徳宗本紀制曰京畿之内屬此冦戎攻刦焚燒靡有寧室王師仰給人以重勞特宜减放今年夏税之半朕以凶醜犯闕遽用於征爰度近郊息駕兹邑供儲克辦師旅攸寧式當褒旌以志吾過其奉天宜昇為赤縣百姓並給復五年陸宣公奏議六月以梁州為興元府給復一年耆老加版授己巳給復洋州一年加給興元一年免鳳州今嵗税父老加版授唐書徳宗本紀六月癸丑詔改梁州為興元府百姓給復一年己巳詔曰朕廵狩於南自春渉夏師旅殷㑹日費斯廣州閭杼軸嵗計其空東作妨時西成罕望雖黽勉從事人不告勞而愧悼積𠂻予實知咎昨日减其租税優以復除庶乎有瘳汔用小息洎駕言旋軫躬履畏途絶硐縈廻危棧綿亘時經塗潦道路阻修工徒造舟縣人葺路長㓜耄耋莫獲寧居而又齎荷糗糧供備頓舍渉於千里犒我六師居人露處而罔息宿麥過時而不穫覩此妨奪彌增感傷前所蠲除未足酬䘏式敷惠澤以紓大勞其興元府除先减放秋税給復外更給復一年洋州除放秋税外給復一年鳳州全放今年秋税其興元府鳳州界内知頓及修道路閣橋州縣官將士等並委嚴震類例功效具名聞奏量與甄奬嗟乎古先哲王東征西怨顧予不徳重以勞人補費録勤是有申命長吏明加優諭稱朕意焉陸宣公奏議七月丙子詔鳳翔府管内今年秋税及去年已前逋欠並宜放免鳯翔府耆夀侍老八十以上各與版授刺史仍賜紫餘並與版授上佐仍賜緋府縣知頓官考滿日放選冊府元龜辛邜給復京兆府一年唐書徳宗本紀制曰朔方並諸軍應在河中管内及同州將士等自逺赴難解其重圍念兹功勞並未酬報雖遭脅制情有可矜應到行營未經甄叙者並凖元勅迢五資改轉其賞錢比收京將士例各給一半委本軍兵馬使速條録名銜聞奏所司即支計給付其食實封者亦便配額令其請受尚齒養老王風之首三代制理未或遺年朕將遵古典以興化本人心而教孝用優秩賜式慰里閭京兆府耆夀年八十已上並與版授刺史仍賜紫七十已上及諸州府迎駕耆夀亦各版授本縣令仍賜緋天下侍老耆夀等亦各與版授本官如年九十以上者州縣長吏嵗時躬親省問貧弱不能自存者量賜粟帛京兆府百姓普恩之外給復一年其供頓官吏委京兆府尹類例具名銜聞奏量與優奬文苑英華貞元元年正月詔關畿之内連嵗興戎荐屬天災稼穡不稔穀麥翻貴蒸黎困窮倉廩空虚莫之賑贍每一興念惻然痛心宜令度支取江西湖南見運到襄州米一十五萬石設法搬赴上都以救荒饉二月二日詔曰諸道節度觀察使所進耕牛委京兆府勘責有地無牛百姓量其產業以所進牛均平給賜其有田五十畝以下人不在給限冊府元龜又詔曰春陽布和萬物暢茂實兆庶樂生之日農夫致力之時今兹吾人則異於是廹以荒饉愁怨無憀有離去井疆業於庸保有乞丐途路困於死亡鄉閭依然烟火斷絶種餉既乏農耕不興若東作愆時西成何望為人父母得不省憂雖國計猶虚公儲未贍濟人之急寜俟盈豐罄其有無庶拯艱危京兆府百姓並宜賜種子二萬碩同華州各賜三千碩委州長吏即與度支計㑹請受差公清仁恤之吏與縣令親至村閭隨便給付仍加勸課勿失農時應諸倉所有逺年粟麥宜令節度更分二萬碩京兆尹即差官逐便搬載賑賜貧人先盡鰥寡孤獨目下不濟者務令均給全活流庸嗚呼朕徳之不敷誠之不感上帝降割丁寜厥躬元元何辜罹此災害思欲拯救未知其方長人之官寄任斯重所宜極慮與我同憂勉敷惠和以育疲瘵佇聞良術稱朕意焉陸宣公奏議八月己邜給復同州一年唐書徳宗本紀二年正月丙申詔减御膳之半賙貧乏者授以官唐書徳宗本紀詔曰朕以薄徳託於人上勵精思理期致雍熙而鑒之不明百度多缺傷痍未瘳而征役薦起流亡既甚而賦斂彌繁人怨上聞天災下降連嵗荒旱盪無農收惟兹近郊遭害尤甚豈非昊穹作沴深警予𠂻跼蹐憂慚㒺知攸措今穀價騰踊人情震驚鄉閭不居骨肉相棄流離殞斃所不忍聞公私之間廩食俱竭既無賑恤猶復徴求財殫力盡捶楚仍及弛征則軍莫之贍厚取則人何以堪念兹困窮痛切心骨思所以濟浩無津涯補過實在於増修救患莫如於息費致咎之本既由朕躬謝譴之誠當自朕始尚食每日所進御膳宜各减一半應宮内人等每月唯供給糧米一千五百石其飛龍廐馬從今已後至四月三十日並减半料京兆尹應科徴諸色名目一切並停如有能减有均無賙救貧乏者當授以官秩冊府元龜六年閏四月乙邜免京兆府夏税唐書徳宗本紀以嵗旱令常叅官及京畿縣令各上封事指陳救人之術致旱之由咸極乃誠無有所隱又詔京兆府諸縣田合徴夏税者除水利地外一切放免其迴種秋苗者亦不在收税限七月召京兆府諸縣令對延英殿問人疾苦各賜衣一襲又以麥不登賜京兆府種五萬石冊府元龜十一月庚午賜文武官階爵䧏囚罪徒以下原之塟戰亡暴骨者唐書徳宗本紀詔曰畿内百姓委京兆尹切加慰撫除正税正役外徴科差遣並宜禁絶非交相侵奪尋常訴訟不宜追擾務且息人京畿内外及京兆府諸縣見禁囚徒死罪降徒流已下一切放免畿内及河中同州界應有因戰陣殺戮遺骸暴露者各委所在長吏随事埋瘞咨爾卿位實惟股肱所當一其誠心同恤災患勉修厥職副我憂勤陸宣公奏議七年三月以關輔牛疫存者十五六遣中使市以給之冊府元龜十二年十月詔京兆府所奏奉先等八縣旱損秋苗一萬頃計予三萬六千二百石青苗錢一萬八千二百貫比緣春夏少雨秋稼或傷頃畆雖損非多黎庶猶慮艱食况畿甸之内供應實繁須有優矜以寛疲瘵其所奏損特宜放免先是州府奏水旱損苗别差官檢覆多有異同之議又追集人户煩擾州府至是帝知其弊故特允其奏朝野歡慶冊府元龜十四年六月庚寅詔曰訪聞烝庶之間米價稍貴念兹貧乏每用憂懷茍利於人所宜通濟今令度支出官米十萬石於街東西各五萬石毎斗賤較時價糶與百姓乙巳以旱儉糓貴人流出太倉粟賑恤京兆府諸縣七月令賑給京兆府百姓麥種三萬石十月以嵗凶穀貴出太倉粟三十萬石令京兆府開塲糶以惠民冊府元龜十五年二月以久旱嵗凶出太倉粟十八萬石於京畿諸縣賤糶以救貧人冊府元龜十九年六月詔曰京師近郊時雨未洽慮囹圄寃滯致傷和氣是用軫於朕心其御史臺大理寺及京兆府等諸司繫囚中書門下與有司亟議條理寃滯以聞七月貸京畿百姓麥種冊府元龜二十年二月詔曰去夏迄秋頗愆時雨京畿諸縣稼穡不登朕用軫慮愧為其父母今宿麥未收其逋租宿貸六十五萬貫石宜蠲除之禮化之本繫乎京師副朕憂人屬於長吏宜勉務農桑各安生業以慰朕懷冊府元龜二十一年正月順宗即位詔京畿諸縣應今年秋夏青苗錢並宜放免冊府元龜順宗永貞元年十一月以久雨京師鹽貴出庫鹽一萬石以惠饑民冊府元龜憲宗元和元年正月丁邜大赦唐書憲宗本紀詔京畿諸縣今年青苗錢及𣙜酒錢並宜放免地税率與每㪷量放二升冊府元龜四年閏三月己酉以旱䧏京師死罪非殺人者唐書憲宗本紀六月渭南縣暴水發溢漂損閭舍二百一十三户秋田十六頃溺死者六人命京兆府發義倉賑給冊府元龜六年二月以京畿民貧貸常平義倉粟二十四萬石舊唐書憲宗本紀制京畿舊穀已盡宿麥未登宜以常平義倉粟二十四萬石貸百姓諸道州府有乏糧處依例借貸文獻通考十月戊寅賑貸京畿制曰朕聞王者之牧黎元也愛之如子視之如傷茍或風雨不時稼穡不稔則必除煩就簡惜力重勞以圖便安以阜生業况邦畿之内百役所從雖勤恤之令亟行而供億之制猶廣重以經夏炎暵自秋霖霪南畝虧播植之功西成失豐登之望内乏口食外牽王徭豈惟轉徙之虞慮有餒殍之患斯盖理道猶欝和氣未通永言於兹良所咎嘆宜加惠貸式示誠懷京兆府每年所配折糶粟二十五萬石宜放如百姓有粟情愿折納者時估外特加優饒今春所貸義倉粟方屬嵗饑容至豐熟嵗送納元和五年以前諸色逋租並放百官職田其數甚廣今縁水潦諸處道路不通宜令所在貯納度支支用令百官據數於太倉請受遭水旱處所損便與除破不得檢覆朕以為理之本在乎安人咨爾尹京宰邑之官實惟親人阜俗之寄必當詢其疾苦奉我詔條當恤隱為心無怠於事罔或徇利以尅下吐剛而茹柔使閭井咸安鰥惸獲濟各勉忠効宜悉朕懷文苑英華閏十二月乙巳勅畿内百姓頃以秋稼旱損農收不登言及疲黎毎務矜恤乃者詔命既下各已加恩如聞村閭之内尚慮乏食更宜優貸以惠吾人其粟及大豆除已徴納外見在百姓腹内者宜令全放青苗錢欠在百姓腹内者量放一半冊府元龜七年二月庚寅制元和六年諸色税草并職田草共一百一十五萬束並宜放免又有常賦錢穀蠲放之餘貧敝者多慮難輸入欲令寛恤須有優矜其京兆府欠去年兩税青苗等錢二萬一千八百貫欠秋税雜斛㪷及職田粟五萬三千三百石並宜放免元和六年春賑貸京畿百姓義倉粟二十四萬石亦宜放免壬辰制曰王者布徳行惠必順天時發廩賑乏盖循舊典朕君臨宇縣念切黎元思欲咸致其安各阜其業事關恤下政在便人予無愛焉斯為大本而甸服之内比年豐穰一嵗不登遂至艱食豈非轂下賦役經制猶繁物力所資凋耗已甚興言於此愧嘆良深今春陽發生田事具飭茍迫於歉乏不能自存則耕植頓缺秋成何望所以特加惠賚蠲彼徴求庶農桑之及時候麰麥之方稔式當和煦之候載示憂勤之心我其永懷俾厚生殖京畿百姓宜賑給粟三十萬石内八萬石以京府常平義倉充之其餘用大倉支給三月庚午以旱故詔京畿内禁囚徒據罪輕重宜踈理處分冊府元龜九年二月丁未制曰善為國者務蓄於人百姓未康君孰與足其或時逢水旱念切惸婺於是有己責之恩行散利之典古今通範何莫由斯朕恭已勵精以臨兆庶永言憂濟終食豈忘思俾萬邦同臻富夀而去嵗甸服氣序愆和夏屬驕陽秋多苦雨三農爽候五稼不滋比及收藏曽靡善熟如聞閭井之内儲備罕充産於地者既微出於力者宜困既牽公上之税薦廹輸送之期循環嵗時固亦勞止况羣司具列軍衞實繁供億之名制備存工役之科條未艾四方楨榦屬在京師念兹矜人良深愧嘆今土膏方動東作其勤逋賦未蠲種餉何望宜加惠渥式俾厚生趨澤務農庶乎勸化姑示納隍之㫖佇寛艱食之虞煦育順時義斯可取應京畿百姓所欠元和八年税斛㪷青苗錢税草等在百姓腹内者並宜放免仍以常平義倉斛斗三十萬石委京兆府條䟽賑給務及貧人如常平義倉不足即宜以元和七年諸縣所貯折糴斛斗添給應縁賑給百姓等委京兆差擇清幹官於每縣界逐處給付使無所弊各得自資近嵗已來屢𢎞徳澤邦畿千里上號腴田阜安疲黎亦在循政咨爾京邑長吏洎於宰字之官各宜叶心將我詔意戒之以擾授之以仁宣示朕懷咸使知悉五月以旱穀貴出太倉粟七十萬石開六場糶之并賑貸外縣百姓至秋熟徴納便於外縣收貯以防水旱冊府元龜癸酉以旱免京畿夏税唐書憲宗本紀京畿旱免今年夏税大麥雜菽合三十萬石並隨地青苗錢五萬貫冊府元龜十一月罷京兆府獵獻狐兎唐書憲宗本紀十一年三月己未免京畿二嵗逋税唐書憲宗本紀制曰疆理宇内必先於京師惠綏四方亦始於中國盖以千里之壤百役是資俾其不足吾孰與足頃自春及夏時澤未䧏恐失順成之道或生歉儉之灾是以仰瞻昭回俯察田畝喜獲朝隮之潤方寛夕惕之憂思遂康寧盡蠲逋負其京畿百姓所有積欠元和九年十年兩税及青苗折糴折納斛㪷及税草等除在官典所由腹内者並放免冊府元龜十二年四月詔出太倉粟二十五萬石糶於兩京以惠饑民冊府元龜十四年五月乙酉勅京畿之内供億所叢雖年穀比登而人食尚寡俾其存濟實在憂矜其京兆府及諸縣今年夏税大麥等共九萬四千六百九十四石並宜放免冊府元龜十五年閏正月即位唐書穆宗本紀四月勅京畿二十二縣欠元和十四年京百司職田二十二萬九千一石束貫等京畿百姓聞甚艱貧頃差搬運軍糧今又修營陵寢雖應縁驅役皆給價錢而屢有牽召頗妨農畝豈可更徴懸欠重使憂愁其所欠並宜蠲免其合受納所欠職田或見在官班各請厚俸或近終考秩稍有餘資宜體朕懷以寛人力冊府元龜穆宗長慶二年十二月乙未帝以疾痊平勅在京諸司踈放繫囚冊府元龜四年正月即位唐書敬宗本紀二月詔如聞京城米穀翔貴百姓乏食者多夏麥未登須有救䘏宜出太倉陳粟四十萬石委度支京兆府類㑹减時價於東西街置塲出糶其價錢仍司府收貯至秋收糴三月詔京畿諸縣應今年夏青苗錢並宜放免秋青苗錢毎貫放二百文其京兆府除所放青苗錢外更放錢五萬貫斛㪷五萬石冊府元龜敬宗寶厯元年十二月詔曰農功所切實在耕牛疲甿乏此理須給賜宜委度支於東鎮武靈鹽夏州分市耕牛萬頭交付京兆尹均給畿内貧下百姓其價以户部綾絹充冊府元龜二年六月癸亥詔曰近日京城雖已得雨畿甸之内霑灑未周灾歉是虞黎元重困救旱之備深所注懷宜令京兆府各勒諸縣令長踈理見禁囚徒除首罪外餘支證並責保放出其有法不得原情有可恕者府司一一條舉當為蠲免御史臺大理寺亦委本司長官親自覆視凖前處分炎熾方甚狴牢可矜京城及畿内諸獄亦宜並與除放冀得存活冊府元龜文宗太和元年二月乙巳免京兆今嵗夏税半六月乙邜以旱䧏京畿死罪以下唐書文宗本紀詔曰朕聞動人以行不以言應天以實不以文盖明誠者感通之大本也刑德者隂陽之大倫也故五事陳於洪範時令著於禮經雖堯湯之灾或丁於天數而休咎之萌必徴乎人事朕祇荷大統子視兆人宵衣昃食不敢自逸猶慮上心不達於下下志不通於上是以正朝廷聴便殿訪求事之益者罔不行弊之壅者罔不去庶乎交感以致洽和而誠有所未臻應有所未逹自春及夏亢陽為害雖麥秋大稔而禾嵗未登京畿之間隂陽小爽齋禱備至膏澤未濡心中惻然思所以濟豈庶獄之未孚將一夫之不獲永用惕戒載懷哀矜其京畿見禁囚徒犯死罪非故殺人者並降流流已下罪遞减一等依令有司約禮禱祠宗廟徧祈山川務盡莊敬以副予志百司庶務有不便於人者各委長吏悉心陳列無使壅於上聞其寶厯二年十二月二十七日勅及今年二月十二日赦條所釐革施行未畢者宜趨中書門下速舉處分朕志惟克己誠在恤人自臨御以來躬行不逮乃者永虞艱食瞻仰昭回幽禱移灾蔬食逾月益罷浮費用嚴天譴尚懼明有未燭道有未宣聞於神者無馨香施於理者或繆戾終夕三省履氷在懷内外卿士有規朕以道宜封事條奏宰衡庶尹候衛守長各勵乃職庶承於天休八月詔三原縣百姓今年秋青苗錢並放免髙陵縣量放一半冊府元龜三年八月辛酉以旱免京畿九縣今年租唐書文宗本紀十一月庚子京兆上言奉先富平美原雲陽華原三原同官渭南等八縣旱雹損田稼二千三百四十頃有詔蠲免冊府元龜四年四月詔曰春夏之交稼穡方茂永念東作其勤如傷况時屬陽和命禁麛卵所以保滋懷生仁遂物性如聞京畿之内及關輔近地或有豪家如務弋獵放縱鷹犬頗傷田苗宜令長吏切加禁察有敢違令者捕繫以聞十二月京畿大水害田稼官出米賑給蠲免其田稼官租冊府元龜五年十月丁邜京兆府上言奉先渭南縣今年夏風電暴雨害田稼至是請蠲免其租可之冊府元龜六年正月十八日制京兆府諸縣宜令以常平義倉斛斗量事賑濟仍先從貧下户給其京城内鰥寡孤獨不能自濟瘖聾跛躄窮無告者亦與京兆尹兩縣令量加賑䘏訖其所破數聞奏躬自省閲務令均贍文苑英華七年正月壬子以旱詔京兆府宜賜粟十萬石同華等州各賜五萬石并以常平義倉及折糴斛㪷充無本色者以運米折給委本州府長吏明作等第差官吏對面宣賜先從貧下起給又詔京兆府太和六年青苗𣙜酒錢在百姓腹内者並放免京兆河中同華陜虢晉綘等州府自太和六年秋税已前諸色逋懸在百姓腹内悉放免文苑英華八年二月庚寅詔京邑之内本無𣙜酤屬貞元用兵之後費用稍廣始定店户等第令其納𣙜况萬户所聚私釀至多禁令既不可施𣙜利自無所入從立課額殊非惠人其長安萬年兩縣見徴𣙜酒錢一萬五千一十貫八百文若先欠者並宜放免其𣙜酒錢起今亦停冊府元龜十二月己邜䧏京畿死罪以下唐書文宗本紀詔曰王者愛人如身推己及物恤其寒燠之苦適其舒慘之宜俾協太和用臻至理朕恭黙思道憂勤在懷時屬嚴沴念深徽纆當雪霜之候滯囹圄之中饋餉為勞逮捕斯擾沍寒所廹愁難必多惻然疚心思有矜䧏宜布在寛之令使無留獄之嗟應京百司及畿内諸縣見禁囚徒應犯死罪特䧏徒流流已下者遞减一等如欠官錢情非巨蠧責保填納不要禁繫唯故殺人者及官典犯贓不在此限仍委京兆府及諸司官長制下日當速疏决聞奏朕司牧黎元存誠寰宇况封甸殷廣京師浩擾憫觸法以罹辜式加恩而宥罪庶亡無告寧失不經宣示中外令知朕意冊府元龜九年十二月丁亥降京師死罪以下唐書文宗本紀開成元年正月免京畿今嵗税唐書文宗本紀詔同州賜穀六萬石冊府元龜二年三月壬辰縱五方鷹隼禁京畿採捕唐書文宗本紀詔韶陽御辰生氣方盛思全物類以順天時内外五塲凡有籠養鷹鷂及鷄鴨鳥雀狐兎等悉宜放之起今月一日至五月十三日禁京城及畿内採捕禽獸羅網水虫以遂生成永為定制委臺府及本司切加禁止七月詔以時旱减入内水十分之九賜百姓灌田從京兆尹崔珙之請也冊府元龜三年正月二十四日蝗旱賑恤制曰京兆府諸州府應有蝗虫米穀貴處亦宜以常平義倉及側近官中所貯斛斗量加賑賜灾旱之餘撫養尤切眷兹長吏必在得人應遭蝗虫處刺史委中書門下精加訪察如有煩苛暴虐貪濁懦弱者即須與替邦畿之内徭役殷繁言念疲人固資矜恤京兆府今年夏青苗錢宜量放一半應遭蝗虫及旱損州縣鄉村百姓公私債負一切停徴至麥熟即任依前徴理及准私約計㑹其遭蝗虫及旱損處准勅添貯義倉每畝九升斛斗去秋合徴在百姓腹内者並宜放免犴獄之重人命所懸將絶寃濫必資慎恤京城百司及畿甸見禁囚徒委中書門下差官踈理無使寃濫文苑英華十一月壬戌詔曰上天盖髙感應必由乎人事寰宇雖廣理亂盡繫於君心從古以來必然之義朕嗣膺寶位十有三年常克己以恭䖍每推誠於衆庶將以導迎休應漸致緝熈期克荷於宗祧思保寧於華夏而徳有所未至信有所未孚灾氣上騰天文謫見再周期月重擾星躔當求衣之時覩垂象之變兢懼惕厲若蹈泉谷是用舉成湯之六事念宋景之一言詳求譴告之端採聴銷禳之術必有精理藴於衆情冀屈法以安人爰恤刑而原下應京城諸道見繫囚自十二月八日已前死罪降流已下遞减一等十惡大逆殺人刼盜官典犯賍不在此限舊唐書文宗本紀詔京畿之内百役繁興欲其阜安切在優䘏其今年二月二十五日勅賑貸諸縣百姓糧種粟八萬四千九百七十八石如聞數内半是義倉斛㪷此乃救災之備豐年自合收填其餘有户部管係者並宜停徴以候來嵗畿内諸縣應有開成元年已前諸色逋欠並宜放免仍委度支與府司同檢勘聞奏如是官吏破用不在此限冊府元龜四年十一月己亥降京畿死罪以下唐書文宗本紀曲赦京城及畿内死罪䧏流流已下者遞减一等唯十惡五逆殺人官典及監臨犯賍不在此限册府元龜武宗㑹昌三年九月丁未以雨霖理囚免京兆府秋税唐書武宗本紀制曰朕恭臨寶位祇嗣丕圖勤䘏憂兢夙夜匪怠懼天下之目專專然以觀予動懼天下之耳顒顒然以聴予言何嘗發一言不遵祖宗之制動一事不副臣庶之懷雖克己甚勞誡心無逸驅時風於朴素絶進取於争馳便於人者無不為厚於身者無不去然而惠化猶缺懲勸未行殘虜在邊尚煩饋餉狂童叛潞猶擾干戈盖不得已而用之事有違其志者顧惟寡昧慙嘆方深今朝野叶心忠良同志共除氛祲日冀清平而秋雨經旬有妨收積雖云苗稼未害亦恐隂沴為灾慮生人之疾苦未蠲刑獄之滯寃未理勵堯舜敬天之志當夕興嗟切禹湯罪己之心詰朝下詔衆貧國豈云富人瘠君安得肥况畿甸差科終年無已百司取給供億實多其京兆府秋税及青苗錢共放八百萬便委張賈與諸縣令同商量各據所損多少作等第减放更不用檢苗覆損煩於申奏其合徴納物仍量與寛限容待路通後輸納如聞貧人未及種麥仍委每縣量人户所要貸與種子寛限至麥熟日填納如京兆府自無種子即據數聞奏太倉給付其御史臺京兆府所有囚徒委宰臣一人與左僕射王起御史中丞李囬就都省踈理如情狀可矜便委决遣其諸州府囚徒亦委長吏親自踈理勿令寃滯於戯水旱之災隂陽定數實當菲德合恤疲人施令布恩期於蘇息凡厥臣庶宜體朕懷文苑英華六年二月癸酉以時雨愆候詔京城繫囚除官典犯賍持杖刼殺忤逆十惡外罪遞减一等舊唐書武宗本紀宣宗大中元年正月十七日制曰京畿之内荆南數州或頻嵗辛勤或遭罹歉沴須免租賦以慰疲人京兆府今年夏青苗錢及中和十五年以後至㑹昌三年終巳前應有諸縣欠日掌閑並宜放免文苑英華二月癸未理京師囚唐書宣宗本紀四年四月壬申以雨霖詔京師關輔理囚唐書宣宗本紀五年四月給復鹽邠鄜坊等州三嵗唐書宣宗本紀制曰邠寧鄜坊官吏自用兵以來責辧公事亦甚辛勤軍將皆已得官文吏具名聞奏有官者與依資轉遷無官差攝者當與正官仍具差攝年月申奏直須公當不得轉授囑託如是將帥親情亦湏具言諸道百姓徴斂不時差役至多疲瘵亦甚或聞屋宇被賊焚燒至於桑麻亦遭砍伐生業既失須加安存宜各給優三年其有無屋可居無牛可種者委長吏量事接借一一奏聞仍須早設法招携令各歸復勿令豪强便占產業為生自用兵以來京師與鄜坊邠寧兩道接界及當路諸縣差役繁併物力凋殘若無優矜必難存立其今年夏稅錢及青苗錢每貫量放三百文其斛斗糧量放一半仍委京兆尹差官子細磨勘其或離在鄉村不曾經供應者不在准例放限仍一一條件等第聞奏如是分路須就中更校便併者量加優恤必使均平其所放錢及斛斗委户部以實錢支填仍令京兆府及下諸縣散榜鄉村要路曉示百姓務令知悉京畿及鄜坊邠寧并鳳翔等道自用兵以來人頗勞苦今頒徳澤須令曲恩應見禁囚徒據罪减一等唯官典枉法犯贓及賊中有持杖刼人故殺人等不在此限如有積年逋賦必加徴督不得者委長吏條流聞奏准格律大功以上親及女婿外甥不許連任文苑英華八月詔曰如聞近日多有閒人不務家業常懷凶惡肆意行非專於坊市之間恐脅取人財物又其中亦有曾為趨吏依倚門欄自恐愆尤遂至停解不思己過却務怨讐妄搆虚辭恣行恐嚇要懲此弊以静奸源自今已後宜委京兆府切加訪察如有此色便捉獲痛加刑斷冊府元龜懿宗咸通七年二月戊申免同華一嵗税唐書懿宗本紀八年五月十八日制京兆府奏雲陽等一十二縣百姓論去年宿種麥苗下子後旋被蝗䖝食損今年盡不滋生雖京畿之間去冬蠲放不少但以疲人懇訴務須哀矜己令府司差官廵檢如有損處即時特與减放令府司具令放數指實聞奏文苑英華十四年四月制曰載念狴牢寢興在慮況漸當暑毒繫於縲絏或積幽停滯有傷和氣或關連追擾有妨農務京畿及天下州府縣禁囚徒除十惡忤逆故意殺人官典犯贓合造毒藥放火持杕開發墳墓外餘罪輕重節級遞减一等其京城軍鎮限兩日内疎理訖聞舊唐書懿宗本紀昭宗乾寧元年八月癸巳减京畿興元洋商州賦役唐書昭宗本紀天復三年二月戊寅降京畿鳳翔同邠鄜三州死罪以下唐書昭宗本紀後唐明宗天成二年十一月新授鄜州節度使米君立辭帝誨之曰擢汝於行伍今理吾民勿以左右小輩妄裁政事須與賔佐官吏商量吾賞罰無私汝宜聴之冊府元龜末帝清泰元年四月乙亥即位制曰王者司牧兆民寵綏四海爰屬統臨之始宜布渙汗之恩仰測天心俯從人欲所以春夏秋冬四時先布於發生草木禽魚萬彚乃期於蘇息伏念大行皇帝承天眷祐立極艱難繄予眇躬常佐興運櫛風沐雨從湯征而多歴勤劬匣劍槖弓賛周道而克成底定爾後繼持玉節獲受桐珪事君必盡於忠誠為子益堅於孝道諒穹蒼之可鑒冀宗社之永寧旋屬杞國人憂荆山鼎就痛攀髯之靡及念同軌之將臻爰自汧岐徑朝伊雒所冀宿參蜃輅親奉山陵纔覲宮闈旋承告令百辟堅陳於勸請三讓莫諧六師共切於推崇羣情益固昔夏啟以謳歌有屬能承大禹之基漢文以將相叶心克嗣髙皇之業顧惟小子豈迨前王自纉𢎞圖如登虎尾惟當慎終若始居安慮危保七百載之延昌致億兆人之開泰將布改元之令爰敷在宥之文宜改應順元年為清泰元年可大赦天下四月十六日昧爽已前内外見繫囚徒據罪已發覺未發覺已結正未結正罪無輕重常赦所不原者咸赦除之應左䧏官及徒流人與量移已量移者更與量移已放歸者量與叙録應内外文武臣寮節鎮州府等使刺史文武職員將校並與加恩應自鳳翔扈駕員寮凡主兵主事者各賜功臣名見在京隨駕並諸道馬歩將士並與等第優給並從别敕處分自二月十四日西來文武參佐没於王事者各與追贈仍叙録子孫隨駕前資文武官寮並量才任使鳳翔民李存劉實罄出家財以助軍賞並與命官起事之初鳳翔三城民户多遭燒燬並宜本道撿視量給瓦木工價各令修葺自岐雍華陜已來王師所經踐履去道三里内夏税並與放免應三京諸州府長興三年十二月以前欠夏秋殘税並與除放其鳯翔即自長興四月十二日終已前並放冊府元龜後周太祖廣順元年五月丁丑勅京兆鳳翔府朕臨御以來憂勤無怠慮庶政之尚闕恐蒸民之未安寢食不遑夙宵若厲早嵗雍岐連叛兵革薦興迨至討平可知傷敝誠念負罪之黨尋以誅夷亡命之徒近皆滌蕩則被釋放者皆為赤子經釐革者悉是平人雖性命之永全在生涯之何著興言軫閔未嘗去懷其京兆鳳翔府先因攻討之時及收復之後應有諸色犯罪人第宅莊園店舍水磑曾經籍没及本主未歸者已宣下本道却給付罪人骨肉為主仍仰逐處嚴切指揮勿令所繇裡私闌吝邀求資金庶令存濟用副朕懷冊府元龜三年七月丁酉勅賦税婚田比來州縣之職盗賊烟火元係廵鎮之司各有區分不相踰越或侵職分是紊規繩切慮所在職員尚循舊弊湏行條貫以正紀綱京兆鳳翔府同華邠鄜耀等州所管州縣軍鎮頃因唐末藩鎮殊風久歴嵗時未能釐革政途不一何以教民其婚田聴訟賦税丁徭合是令佐之職其擒奸捕盜庇䕶部民合是軍鎮警察之職今後各守職分專切提撕如所職踈遺各行按責其州府不得差監徴軍將下縣庶期靜辦無使煩勞冊府元龜四年十一月勅近降命京兆鳳翔同華邠延涇鄜耀等州管内縣鎮各守職分州縣徴税賦治婚田詞訟廵鎮賊盗追捕非不丁寧宜令三司使依前勅更嚴切指揮各守職分不得侵越諸州各行訖聞奏冊府元龜世宗顯徳二年十一月下鳳州乙邜詔曰朕承宗社之靈居億兆之上祇臨大寶於兹再周每念晉漢以來朝野多故疆宇日削生聚未堪嘗懷拯救之心冀答天人之意至於夙夜不敢荒寧求安邊拓境之謀思濟世息民之計乃眷秦鳳地接巴卭頃屬亂離因兹阻隔千里之地大朝之聲教不通十年之中百姓之艱苦難狀昨者興發師旅經畧封郵鼓鼙絶震於郊原虵豕難逃於鋒刃僵尸徧野棄甲如山秦成階等州管内將校官吏軍人百姓等喜㓂孽之逋逃舉城壘而歸順飛章送欵協力同謀父老相懽山河如故而偽署鳳州節度使王環等獨迷去就尚據城池朕念彼孤危繼令招諭惜一城之士庶開三面之網羅豈期拒轍之徒不體好生之徳遂令攻擊立見盪平渠帥就擒秦隴無梗宜降維新之澤庶隆及物之恩應秦鳳階等州管内自顯徳二年十一月已前有罪犯者無問輕重一切釋放應馬歩行營將士等各與恩澤其有没於王事者自副馬兵使已上並與贈官仍賜賻贈物城下攻殁百姓為矢石所害致死者本户除二税外放免三年差徭仍賜本家孝服絹三疋其部署人夫州縣官並與加階减選秦成階等州歸明將士自長行以上等第支賜優給其官吏將校職員等並與加恩其中有西川人員除恩澤賞賜外如願駐留者厚與請受如願歸去者並給盤纒用慰衆情免違物性應收捉到賊軍將校一切放罪並令押送赴闕各與恩澤自何重建等歸投西川已來訪聞管内州縣連嵗饑荒百姓軍人倍加勞役科斂頻併法令滋章既為吾民宜革前弊今後除秋夏兩税