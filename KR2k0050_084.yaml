饑發義倉粟賑之仍給鈔四千錠十二月延安路雹災賑糧一月元史泰定帝本紀二年正月延安饑賑糶有差三月鳳翔諸路饑賑糶有差鳳州延安等處民饑賑糧鈔有差夏四月隴西漢中秦州饑賑鈔三萬錠六月奉元等路暑雨傷稼蠲其租濟寜興元等十二郡饑賑糶米七萬餘石七月邠州諸路饑賑糶米三萬餘石元史泰定帝本紀三年三月奉元路饑賑糧二月七月賑永平奉元鈔七萬錠八月奉元蒲城等縣水發粟賑之元史泰定帝本紀四年二月奉元路饑賑糧有差夏四月奉元路饑賑糧兩月六月己邜永興屯被災免其租七月延安屬縣旱免其租九月奉元延安諸路饑賑糶有差十二月延安鳳翔屬縣饑並賑之元史泰定帝本紀致和元年正月免陜西撈鹽一年二月陜西諸路饑賑鈔五萬錠五月奉元等處饑賑鈔十四萬三千餘錠六月奉元延安二路饑賑鈔四千八百九十錠元史泰定帝本紀文宗天厯元年陜西霜旱免其科差一年元史食貨志陜西大饑撥江浙鹽運司嵗課十萬錠賑之續文獻通考二年正月是年正月丙戌明宗即位未改元己巳陜西告饑賑以鈔五萬錠丙戌陜西行省乞糧三十萬石鈔三十萬錠詔賜鈔十四萬錠遣使往給之二月丙辰奉元臨潼咸陽二縣告饑陜西行省以便宜發鈔萬三千錠賑咸陽麥五千四百石賑臨潼遣使以聞從之夏四月戊戌以陜西久旱遣使禱西嶽西鎮諸祠陜西諸路飢民百二十三萬四千餘口諸縣流民又數十萬先是常賑之不足行省復請令商賈入粟中鹽富家納粟補官及發孟津倉糧八萬石及河南漢中亷訪司所貯官租以賑從之五月庚辰陜西行省言鳳翔府飢民十九萬七千九百人本省用便宜賑以官鈔萬五千錠又豐樂八屯軍士飢死者六百五十人萬户府軍士飢者千三百人賑以官鈔百三十錠從之元史文宗本紀六月陜西行省告饑遣使還都與諸老臣議賑救之甲寅賑陜西臨潼華隂二十三驛鈔一千八百錠元史明宗本紀明宗遣吏部尚書伯勒齊爾巴哈還京師命中書集老臣議賑荒之䇿時陜西流民死亡相藉命所在州縣官以便宜賑之陜西延安諸屯以旱免徴舊所逋糧千九百七十石十月丙申給鈔十五萬錠賑陜西飢民壬寅弛陜西山澤之禁以與民庚戌免徴奉元路民間商税一年陜西鳳翔府飢民四萬七千户皆賑以鈔元史文宗本紀以關陜旱免差税三年元史食貨志三年是年五月改元至順免陜西行省今年商税續文獻通考至順元年正月命陜西行省以鹽課鈔十萬錠賑流民之復業者元史文宗本紀四月戊申陜西行臺言奉元鞏昌鳳翔等路以累嵗饑不能具五穀種請給鈔二萬錠俾分糴於他郡從之元史文宗本紀二年三月陜西行省遣官分給復業饑民七萬餘口行糧四月甲子陜西行省言終南屯田去年大水損禾稼四十餘頃詔蠲其租七月奉元屬縣蝗免今年田租元史文宗本紀三年六月免陜西行省今年商税元史文宗本紀順帝至正四年八月陜西行省定惠民藥局元史順帝夲紀五年四月邠州等處民飢賑之募富户出米五十石以上者旌以義士之號續文獻通考十二年正月中書省臣言陜西腹裏諸路供給煩重調兵討賊正當春首耕作之時恐農民不能安于田畝守令有失勸課宜委通曉農事官員分道廵視督勒守令親詣鄉都省諭農民依時播種務要人盡其力地盡其利其有曾經盗賊水患供給之處貧民不能自備牛種者所在有司給之仍令總兵官禁止屯駐軍馬毋得踏踐以致農事廢弛從之元史順帝本紀二十七年以兵興煩擾陜西等處除軍人自耕自食外與免民間今年田租之半續文獻通考明太祖洪武三年正月丁巳西安鳳翔二府饑耆民宋昇等來言太祖即命户部往賑之户部奏彼民飢須運粟以濟之太祖惻然曰民旦夕待哺如涸魚之欲水若待運粟濟之死者多矣况今東作方興民無食而廢耕將見其患益甚即令户部主事李亨馳驛往賑之户給粟一石計三萬六千八百八十九石世法錄五年詔陜西軍民先因饑荒逃移將妻妾子女典賣與人者許典賣之家首告准給原價贖取歸宗其無主及願留者聴之續文獻通考九年三月詔曰山西陜右地居西北山河壯麗昔我中國歴代聖君皆都此而號召萬邦朕自丁未繼位建都炎方於今九年矣其間西征燉煌北討沙漠軍需甲仗民人備之外有轉運艱辛内有秦晉二府宮殿之役愈繁益甚自平定以來民勞未息今始方寜正當與民同享太平之福朕於今年三月二十五日勅中書度倉庫軍有餘糧特將山西陜西二省民間夏秋租税盡行蠲免以甦吾民於戯民省君艱則天下大治五常如令則風雨乃時惟爾臣民想宜知悉明太祖文集二十七年三月甲子陜西有士人上仁政書太祖覽之謂侍臣曰既言仁政則必當愛民何故所言皆勞民傷財之事自相悖戾彼山林儒生不深究事體然言亦有嘉也不必指摘瑕疵以杜言路世法録成祖永樂十年六月甲戌陜西西安等府老人詣闕謝賑濟恩命賜道里費遣還又詔問老人今嵗禾稼如何對曰來時甚茂上曰禾稼雖茂民力未甦凡所借用官糧今年不責爾償俟下年豐熟乃償老人叩謝世法録十二年二月庚申有自陜西來者言鳳翔隴州民饑上諭行在户部臣曰水旱世常有之國家廣儲積正以備民之饑朕數詔有司恤民今乃坐視其飢寒不言亟令監御史發廩賑之並按問長吏坐視不言者罪世法録十六年七月降勅切責陜西布政按察二司曰比聞所屬郡縣嵗累不登致民流莩又不以聞其咎安在速賑之十月諭陜西三司曰西人苦旱征役又繁朕甚憫焉自今出使外番一切供應非有朝命毋得擅取違者重罪之十二月以陜西旱命成山侯通偕户部官馳賑之諭曰民之飢餓譬救水火速往勿緩一切不急悉停止之民間事不便者條具以聞名山藏十二月辛丑以陜西旱賑飢民九萬八千餘户給米十萬四千三百餘石鈔十二萬六千三百錠世法錄宣宗宣徳二年以陜西不嵗止一切買辦十二月陜西旱命有司開倉賑濟出絹五萬疋綿花十萬觔給其尤艱食者止一切科徴作書媿詩示行在户部尚書夏原吉名山藏英宗正統四年令陜西沿邊空閒之處許官軍下户人丁儘力耕種免納子粒資治通紀十年三月勅鎮守陜西右都御史陳鎰曰近得御史馬恭奏陜西逺近居民流徙求食日有二千餘人咸陽渭南富平等縣閉門塞户逃竄趂食其飭令正佐能幹官分廵所屬量發倉廩不急之務悉為停止名山藏憲宗成化二十年七月廵撫陜西右副都御史鄭時等奏陜西連年水旱至今益烈乞將嵗課物料暫為停止詔允奏八月勅陜西鎮守總兵廵撫等官招撫流亡緝捕盗賊調湖廣運糧十萬石赴陜西以備兵荒名山藏二十二年二月詔移河南開封府存留米十二萬石於陜西賑飢名山藏孝宗𢎞治五年正月命織綵粧絨毼曵撒於陜西御史張文諌命减之名山藏六年十二月西安知府嚴永濬䟽言臣頃見陜西雜造局二次䧏下圖式令織造綵粧絨毼凡四十九疋先次坐𣲖二十五疋行布政使司辦料傭作費金三千餘未就今復造二十四疋不知陛下珍此之多何以用之下工部覆命織未就者悉罷名山藏十一年十一月免陜西織造上用羊絨令小民舊欠嵗𣲖物料勘實奏免名山藏武宗正徳九年七月總制右都御史彭澤奏陜西荒飢民流徙而徴調督運者如故恐關陜之患不在邊夷而在飢民也請令總制都御史鄧璋賑濟平涼之東督餉侍郎馮清賑濟平涼之西都御史王憲駐漢中等處以安撫流民而别選才望廵撫陜西以代陳壽户部議覆詔璋清兼理賑濟憲撫流民壽仍舊廵撫世法録世宗以正徳十六年六月初立陜西諸郡大旱疫詔停織絨袍於陜名山藏嘉靖元年命出太倉銀二十萬運赴陜西蝗旱地方給賑續文獻通考十年令支太倉銀三十萬兩賑濟陜西又奏准陜西災傷重大令各州縣官員戒諭富室將所積粟麥先扣本家食用其餘照依時價糶與飢民若每石减價一錢至五百石以上者給與冠帶一千石以上表為義門被災人民逃出外境者招集復業各倍與賑濟銀兩官給牛種隆冬時月飢民有年七十以上者添給布一疋動支官銀收買遺棄子女州縣官設法收養若民間有能自收養至二十口以上者給與冠帶州縣官各於養濟院支預備倉糧設一粥厰就食者朝暮各一次至麥熟而止世法録三十四年十二月以地震頒帑金恤之華州志穆宗隆慶二年五月禮科何起鳴奏陜西西安郡縣地震經月壓傷人民乞賜賑恤上曰地震重大所在被災人民朕深憫念賑濟一事户部議處以聞於是户部奏以本省織造羡餘銀八千八百三十兩並預備倉糧相兼賑濟得旨撫安官須委用得人給散有法俾小民得霑實惠續文獻通考神宗萬厯十二年陜西廵按奏義婦王氏輸粟一千石賑飢上命給銀竪坊旌表續文獻通考十四年陜西廵撫奏三原民王一正輸銀三百兩麥百石賑饑賜義官冠帶命撫按合旌其閭西安府志愍帝崇禎四年正月二十六日諭曰朕覽章奏據陜西延綏等處總督撫按各官屢報地方饑荒小民失業甚有迫而從賊自罹鋒刃者誰非赤子顛連若斯誼切痌瘝可勝憫惻兹特命户兵二部共發銀十萬兩差御史吳甡前去㑹同該省撫按相酌被災處所次第賑給必須躬親料理實惠及民不許委官吏胥從中侵没仍責成府州縣有司多方措處設法凑濟以贍窮黎毋得專恃京庾反寛求牧果能實心幹辦奉行得宜准與奏薦如有玩違闒茸及乘機染指的即當叅劾挐問還着大張曉諭開導愚氓朝廷軫念飢貧特行賑賚嗟爾百姓何故不安本分甘作非為即有已被脅從誤投賊黨若肯歸正便為良民嘉與維新一體收恤其差去御史着遵體朝廷恤民戢亂之意着實用心相機行事以副簡委待復命即以稱否為爾功罪其欽承之特諭柴菴䟽集七年三月山陜大饑發金五萬賑之明紀編年九年五月下詔大赦山陜脅從羣盗令地方官多方安挿以消反側違者重治之明紀編年陜西通志巻八十四
