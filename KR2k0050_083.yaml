body:
  text: 欽定四庫全書陜西通志卷八十三德音第一周文治岐仁政先施漢髙約法三章允宜蠲租賜復恤祲賑飢渙汗大號惠我嘉師粵稽曩代世法良規於維我朝恩浹秦黎損上益下如傷是咨洪河廣漢澤不逮斯作德音志第三十國朝順治二年四月初十日諭陜西詔周𢎞大賚天下歸心漢約三章秦民咸恱流賊李自成弒君虐民多行悖逆神人共怒自速誅亡知朕誕膺天命撫定中華尚敢竊據秦川抗阻聲教朕憫其荼毒久切痌瘝爰整貔貅窮搜巢穴豫王移南伐之衆直搗崤函英王秉西征之旄濟自綏德莫不追奔逐北斬馘獲俘百二山河定於俄頃實賴我太祖太宗之純嘏藉爾二三大臣之弼成以致豫眇躬克揚大烈緬惟全秦黎庶莫非嘉師向因羣盜縱橫迄無寧宇頻年捍禦既竭脂膏一日染汙重遭湯火雖賊以此始必以此終要其受禍久而痛痡深未有過於秦人者矣朕執言弔伐本為除殘既受歸誠宜矜詿誤是用特施浩蕩咸與維新所有陜西地方合行恩例開列於後一自順治二年二月初一日昧爽以前陜西通省地方官吏軍民人等有犯無論大小已發覺未發覺已結正未結正併文武偽官等罪咸赦除之有以赦前事相訟告者即以其罪罪之一地方初定亟需撫輯綢繆應設督撫鎮將等官以資彈壓會城根本之地應留滿洲重臣重兵鎮守其延寧甘固四鎮實在兵馬應行文清核以便裁定經制潼關商雒及楚蜀衝要地方應酌量置兵控扼著吏戶兵三部作速確議具奏一陜西通省地畝錢糧自順治二年正月為始止徴正額凡加派遼餉新餉練餉召買等項悉行蠲免其大兵經過地方仍免見糧一半歸順地方不係大兵經過者三分免一西安等府州縣遭冦焚掠獨慘應聽撫按官察明順治二年錢糧應全免者全免應半徴者半徴一大兵初入陜西境內該地方文武官紳倡先慕義殺賊有功以城池歸順者該部通行察敘具奏定奪一該省地方前朝文武進士文武舉人仍聼該部核用一該地方軍民年七十以上者許一丁侍養免其雜泛差徭八十以上者給與絹一匹綿一斤米一石肉十斤九十以上者倍之有德行著聞為鄉里所敬服者給與冠帶榮身一有司徴收錢糧止許正數不許分外侵漁稱頭火耗違者治以重罪一該省生員鄉試舉人會試俱照直𨽻各省事例一體遵行各學廩增附生員仍舊肄業俱照例優免其有被闖賊威逼曾受偽職者盡行赦宥生員歸學舉人準赴京會試一該省各府州縣衛學廩生準照恩例每學貢二名一歷代帝王陵寢在秦中者有司照例以時致祭及名臣賢士墳墓俱嚴禁姦民掘毁一凡訛言妖術煽惑平民聚衆燒香偽造符契擁集兵仗其傳頭會首怙惡不悛者自當嚴緝正法脅從人等果能改邪歸正解散力農前罪免究如執迷不悟被人告發者不赦一該省肅州地方嘉峪關外西域三十八國部落之長投誠歸順者撫按官察實具奏以便照例封賞一西番都指揮指揮宣慰招討等司萬戶千戶府所等官舊例應於洮河西寧等處各茶馬司通貿易者準照舊貿易原有官職者許至京朝見授職一切政治悉因其俗一各州縣土冦有乘機竊發賊首已經就擒脅從歸農復業及脅從擒其賊首赴所在官司連名自首者前罪并赦勿論一邉方兵馬投順仍願在伍效勞者各清查實在數目準與造册酌用一地方初定有司未及銓除撫按當亟行察核一切為賊迫脅情出於不得已者無論有司及鄉紳舉貢不妨量才題委俟事平另行定奪但不得濫及匪人一陜中在今日撫恤為救民第一義撫按不得聼從有司濫準詞狀以戕害良民果有姦惡不法大者題請小者撫按拿問依律懲處一切紙贖折罰嚴行禁革務令州縣官一意課農仍於嵗終察其荒熟多寡以分殿最一越訴誣告屢經嚴禁該省人民初出湯火尤宜息訟務農凡户婚田産小事止就有司歸結人命劫盜重大事情方赴撫按告理倘姦棍訟師誘陷愚民入京越訴察出一併反坐於戲慰苖民於清問鰥寡有辭恢湯網而克寬雲霓在望式諧羣志於迓天休拯溺救焚非敢私於西土承流嚮化期共喻於多方布告臣民想宜知悉順治三年覆準延鎮所屬氷雹蝗蝻被災田畝免本年額賦之半順治五年覆準陜西水患蝗蟲氷雹相繼被災一等者蠲一年額賦二等者免一年之半三等免三分之一順治七年九月陜西督撫會題奉旨恩準豁免西延鳯漢興等府州屬無著荒地一十二萬六千三百九十八頃六十四畝零逃亡丁五十九萬四千三十零順治八年十月陜西督撫會題奉旨恩準豁免西延鳯漢興等府州屬荒地一萬四千七百四十八頃七十一畝零順治十一年詔順治六七兩年直省地丁本折錢糧拖欠在民者悉與豁免八月陜西延撫題免延安府屬續荒地二千三百四十七頃七十畝零續逃亡丁六千八百有零順治十二年覆準陜西地震全家被災者盡豁歷欠錢糧草束餘免本年地糧丁徭白河縣荒殘陜撫題準停緩地丁均徭銀米順治十三年詔順治八九兩年直省地丁本折錢糧拖欠在民者悉與豁免二月陜西督撫會疏題準豁免鳯翔府屬漏報荒地八百二十頃有零順治十五年四月陜撫題準豁免西安府屬續荒地一百八十六頃七十一畝零九月又具題興安州屬之平利縣續荒地七頃七十五畝零續絶丁一千七百有零俱準豁免順治十六年陜撫題免西安府屬之耀州續荒地七十五頃五十六畝零二月又奏免興安州水崩續荒地十一月延撫具題延屬之安塞縣續荒地二頃九十畝零並準豁免康熙元年延撫題免延安府屬之延長縣逃亡并洪水推漂人丁六千零康熙三年詔直省順治十五年以前拖欠各項銀米藥材紬絹布匹等項錢糧槩行豁免康熙四年詔順治十六十七十八等年各項拖欠錢糧俱令蠲除三月陜西督撫會題豁免西安府屬之邠州包賠地九百五十五頃零巡撫賈漢復又奏免韓城縣沿河津渡載運粟炭船稅康熙八年正月陜西督撫會題豁免鳯翔府屬郿縣山水衝決地七十三頃七十四畝零五月又會題為秦屬蠲免等事案內奉旨豁免過興屯揑墾及新荒共地七千四百七十八頃四畝零西鳯漢興四屬均徭銀二千七百五十六兩零西延漢興四府州屬無影鬼名招來流寓回籍及死絶殺傷丁一萬八千五百五十零又豁免棉花五百二十九斤及藍田竹枝鮮筍各折價康熙十年恩詔蠲免直省康熙四五六年舊欠地丁等項錢糧康熙十一年陜西巡撫阿席熙題準豁免民屯更名地內各細色租粒五千三百石零又免棉花九百四十五斤零折價康熙十四年靖逆侯張勇具詳酌時勢等事題請蒙恩準免康熙十四年分起存項下未徴銀三千九百六十二兩零又起存米四百五十四石零康熙十五年五月撫逺大將軍圖海具請賜寬免等事題請蒙恩蠲歷年拖欠并被陷失耕地土錢糧康熙十六年編審案內奉旨豁免西延鳯三府殺傷人丁一千零康熙十九年陜西督撫會題豁免雒南縣永難耕墾地二百九頃零康熙二十年恩詔蠲免直省康熙七年起至十七年舊欠地丁等項錢糧康熙二十二年五月陜西督撫會題為遵詔陳言等事案內奉旨豁免延安府屬甘泉保安二縣包賠虛丁銀一千三百七十四兩零康熙二十二年十二月十七日諭戶部陜西西安甘肅等處前當大兵征勦之時轉輸糧糗辦運芻茭一應軍需取給閭里小民由陸路供億勞費繁多今既經蕩平朕心時切軫念康熙二十三年應徴地丁各項錢糧著與蠲免三分之一以昭朕眷念民生勞苦之意又山西崞縣欣州定襄五臺代州振武衛新經地震被災頗重雖經遣官賑濟仍應量行加恩以昭軫恤其被壓身亡命人所有康熙二十三年應徴地丁錢糧著與全免其房舍倒壞力不能修者丁銀全免地畝錢糧著免十分之四爾部速行該地方官曉諭小民務俾各霑實惠如有司官役借端朦混私行重征者或經參奏或被告發將經管各官從重治罪爾部即遵諭行特諭康熙二十三年題準豁免漢興荒地八千三百八十三頃一十七畝零康熙二十六年十一月二十六日諭戶部朕惟自古帝王統御萬方乂安九有殫心懷保節愛攸先期於物力充裕爰以振業黎元俾膏澤旁流咸蒙美利朕自御極以來軫恤民依力圖休養惟理財為裕國之大經蠲貸為愛民之實政歷年敦崇節儉嚴核浮冒蓋欲為布德行惠之資頻年以來各省錢糧雖次第蠲免但江蘇所屬各郡縣為財賦重地額征錢糧甲於他省且屢嵗輸將供億效力維勤兹用大沛恩膏除漕項錢糧外所有康熙二十七年應徴地丁各項錢糧俱著蠲免二十六年未完錢糧亦悉與豁除又陜西錢糧前雖已行蠲免但念該省人民用兵之際轉輸餽餉效力可念再宜加恩以𢎞樂利其康熙二十七年應徴地丁各項錢糧及二十六年未完錢糧亦著俱與蠲免爾部速行該地方官通行曉諭務使小民均沾實惠以副朕愛育蒼生至意如有不肖有司官吏借端蒙混及私行重徴者該督撫指名題參從重治罪如該督撫徇隱不行糾舉或經參奏或被告發定行一併從重治罪爾部即遵諭行特諭康熙三十一年十月初四日諭戶部陜西西安等處地方連嵗凶荒繼以疾疫因而閭閻失業漸致流離朕軫恤民艱焦勞宵旰自去嵗冬月以來頒發帑金蠲免正賦挽輸積榖轉運漕糧屢次特遣大臣察勘多方賑濟念國家所重惟在養民目今秦省雖薄有秋收但民間匱乏已極倘非格外加恩無以使積困盡蘇轉徙盡復陜西巡撫所屬府州縣衛所康熙三十二年地丁銀米著通行免徴從前所有積欠未完錢糧亦著通行蠲豁務俾比屋同沾實惠小民咸慶更生用稱朕子愛元元撫育安全至意爾部即遵諭行特諭康熙三十一年十一月初九日諭刑部朕保乂黎元崇尚寬大每於刑獄之事輒厪矜恤之懷秦省西安等處地方比嵗薦飢閭閻困苦業已多方賑恤屢諭蠲租尤宜大沛仁恩特加赦宥凡陜西巡撫所屬今年秋審情正緩決之犯內除十惡及軍機獲罪官員犯罪不赦外其餘自諭旨到日通著免死照例減等發落有見在審擬未經結案者亦如之嗣後務令革心向善副朕法外生全至意爾部即遵諭行特諭康熙三十四年十二月十七日恩詔陜西省康熙三十三年以前歷年積欠及帶徴未完銀米俱著豁免康熙三十六年二月丁亥上統六師啓行庚戍上自保德州渡黃河駐蹕府谷城辛亥上仍駐蹕府谷縣城南三月壬子朔駕駐蹕府谷縣城南癸丑駕至孤山堡西駐蹕甲寅上駐蹕卞家水口乙卯上駐蹕神木縣丙辰上渡屈野河駐蹕自榆林至橫城口安設驛站理藩院奏曰駕次榆林由口外至寧夏應自榆林起設驛至橫城口設此驛時以前次內路增驛預備之馬照鄉導官所分宿頭每驛設馬三十匹筆帖式一員蒙古台吉一員章京一員披甲十名此坐驛筆帖式以現在隨行部院筆帖式充之駕至寧夏後即撤此驛將巡撫所備馬增置內驛中上準行丁巳駕次柏林堡西南戊午上駐蹕髙家堡南己未上駐蹕建安堡東庚申上駐蹕玉關澗辛酉駕次榆林壬戌上出邊康熙三十六年三月二十七日諭陜西四川總督吳赫朕巡幸沿邊地方詢察閭井生聚及田土沃壤之狀自晉歷秦經行二千餘里直抵寧夏所以勤求民隱至殷且切惟朔方資大河之灌注疏渠溉田宜於稼穡當兹春氣鬯遂正三農盡力南畝之時誠恐有司官員不體朕懷因車駕經臨調遣師旅借辭供億擾纍小民既東作之有妨將西成之奚望今一切軍需芻糗俱經儲峙足以資用至扈從人員概行簡約所有馬匹悉牧放水草善地并不須以供辦草豆動煩民力爾可傳飭有司禁勿借端妄行科派違者事覺定行處分仍遍諭地方百姓各安本業㕓無廢市隴無輟耕庶不負朕親歷邊圉軫念民依之至意特諭康熙三十六年閏三月初十日諭陜西總督提督巡撫總兵等官朕宵旰勤民慮周遐邇緣向來巡幸未經親歷邊境頃特濟河而西循秦省沿邊地方延覽風俗咨詢疾苦見所在兵民築土室以為居耕沙磧以為業生聚之計甚屬艱難朕惻然於衷軫念勿釋因思兵民倚賴全在將吏而將吏之表率惟督撫提鎮是視誠使督撫提鎮實正已澄源則所屬守職奉公祿足自贍必無朘削兵民之事倘或積習相仍濫受屬員私餽因而所屬官辨節次求索取償於下文官則加征無藝武辨則侵尅月餉勢不至於厲民剝兵不止如此而欲冀疾苦日蘇生聚日盛烏可得乎夫秦地俗尚素稱簡朴邊方士卒允屬精強總恃撫馭得人斯於兵民胥益朕兹駐蹕寧夏特召該省總督總兵以下官員凡在鎮城者俱賜宴內庭面加諄諭無非期望文武大吏董率屬員以仰副朝廷愛民恤兵至意自今以往爾等其益體朕懷交相砥礪文職皆習知民事豈身作官吏不恤百姓之依武職多起自行伍豈甫為將領遽忘軍士之苦上官克謹亷隅屬員恪遵法紀馴至比屋殷阜列戍飽騰則兵民皆得所爾等亦與有休寵以視厲民剝兵身名俱喪者孰得孰失爾等其敬念之特諭康熙三十六年七月十九日恩詔朕君臨天下早夜孳孳勤求治理惟恐一夫不獲其所初未嘗有岐視中外輕事兵戎逺伐異域之事厄魯特噶爾丹向與七旗喀爾喀同奉職貢嗣因兩國交郤搆兵喀爾喀汗等為所敗衄叩關內附噶爾丹乃借辭追擊闌入我邊境恣行狂逞朕屢頒敕諭令其悔罪自新而狡冦不知省悟益肆鴟張其逆謀叵測實有逼處近塞窺伺中原之漸朕思此冦包藏禍心倘不即行撲滅則異日必緣邊設防重滋民困何如及時聲討立靖根株於是昭告天地宗社躬統禁旅不憚勤勞三出塞外去年夏賊踞克魯倫河自度力不能抗倉皇宵遁朕親追至土喇河適西路大兵遮截其後擊敗之於昭木多賊勢大挫冬月復駐蹕鄂爾多斯收撫其降衆遏絶其外援而賊益困蹙機會所在刻不可失遂以今年春西巡邊境從寧夏出塞遣發大兵兩路進勦而西海烏思藏人等皆先後輸忱自效哈密國人又俘獻噶爾丹之子於行在噶爾丹窮迫已極一聞六軍壓境計無復之隨於阿察阿穆塔台地方飲藥自盡揆諸料敵成謀適相符合自此寇氛盡滌邊圉永安而朕為民除害不得已而用兵之意亦可曉然共喻於天下臣民矣武功告成之會正太和殿鼎建工竣巍煥方新臨御伊始協氣集於九重觀瞻肅於萬國是用覃敷慶澤以上答郊廟社稷之靈下愜中外人心之望所有事宜開列於後一大將軍領侍衛內大臣伯費揚古駐扎邊境綏輯蒙古固守地方征勦噶爾丹時所抒謀略與朕意合遂畀以西路官兵令其統領進勦師行道路遼逺兼乏水草乃全無顧慮直抵土喇昭木多奮揚軍威俾姦狡積冦一鼓而大敗之屢年以來統兵諸將未有能過之者著從伯爵優升為一等公一西路官兵聞朕親至克魯倫河雖徒步在道飢疲已極仍謂世受豢養之恩今聖駕躬親臨敵我等官兵若數應盡則甘斃道路倘命可少延誓圖竭力自效其奮勇若此故大功獲奏理宜誕沛殊恩自參贊以下實授章京以上各給與一拖沙喇哈番襲替一次所有功牌著另行分别議條護軍校驍騎校俱各加一級即照加級食俸其兵丁加恩之處著議奏一西路進勦緑旗官兵自將軍提督總兵官以下兵丁以上應作何加恩者吏戶兵三部會同議奏一三次出征官員兵丁及西路進勦官員兵丁所借官庫銀兩未經賠償者俱免追取其未出征兵丁有將本身所養馬匹送至軍前倒斃者各賞銀二十兩一三次俱出征官員各加一級三次俱出征兵丁加恩之處著議奏一滿洲蒙古漢軍出征厄魯特於軍前陳亡者護軍給與七品官馬兵給與八品官一外官員缺近見漢軍選用者甚多正途出身之進士舉人不得選用殊屬壅滯嗣後應作何分缺銓授該部定例具奏一外藩四十九旗兵丁比年以來出征巡汛甚屬勞苦其中西兩路隨征押運米車牧馬安站掘井修路看守米糧兵丁在軍前未曽得賞者每人每年各賞銀六兩給與三年已經得賞者每人每年各賞銀六兩給與二年其未出征兵丁除富戶外不堪度日者每人各賞銀六兩給與一年一八旗效力行間年老辭職官員已得半俸外勞績茂著多有功牌未得半俸者及年尚未老傷廢辭職官員內勞績多著應得半俸者該都統詳查保送著該部題請一滿洲兵丁原係披甲效力行間有帶傷殘廢間住及疾病年老間住者著察例加恩賜一在京滿洲蒙古漢軍馬步兵丁俱加恩賜一出征病故兵丁俱有恩恤其出征病故間散三品以下官員亦準概行恩恤一年尚未老傷廢辭職官員及傷廢退甲兵丁酌給錢糧米石一外藩蒙古出征病故間散三品以下官員亦準概行恩恤一外藩蒙古有效力行間傷廢退甲者著加恩賜一五嶽四瀆等祀應遣官致祭者查舊例舉行一歷代帝王陵寢先師孔子闕里應遣官致祭著察例舉行一內外大小各官除各以現在品級已得封贈外凡升級及改任者著照新銜封贈一康熙三十八年鄉試中式舉人大省加十名中省加七名小省加三名康熙三十九年會試中式進士三百名一各省正貢作恩貢次貢作嵗貢一國子監監生免坐監一個月一凡官吏兵民人等有犯除謀反叛逆子孫殺祖父母父母內亂妻妾殺夫告夫奴婢殺家長殺一家非死罪三人採生折割人謀殺故殺蠱毒壓魅毒藥殺人強盜妖言十惡等真正死罪不赦外及修造宫殿陵寢工程不固冒破錢糧製造戰船軍器等項不堪用糜費錢糧軍機獲罪貪官衙役犯贓監守自盜冒借官庫銀兩拖欠錢糧漕糧侵盜漕糧騷擾驛遞姦細光棍誣告叛逆放火因姦致死人命罪犯亦在不赦别項死罪俱減一等此內有鬬毆殺人者仍照例追銀四十兩給付死者之家其餘自康熙三十六年七月十九日昧爽以前已發覺未發覺已結正未結正咸赦除之有以赦前事訐告者以其罪罪之一內外文武官員除大計軍政處分外現在議革議降議罰戴罪住俸等項各該衙門悉與奏明寬宥一凡流徙人犯在流徙處所身死其妻子有願攜骸骨回籍者該地方官報明該部準其各回原籍一各處賊盜或為飢寒所纍或為貪官所迫實有可憫如能改過就撫者準赦其罪一天下驛遞苦纍凡乘傳員役騷擾驛遞者著該督撫立行參奏如有容隱一并治罪一罰贖積榖原以備賑冬月嚴寒恐鰥寡孤獨貧民無以為生著直𨽻各省督撫責令有司官將積榖酌量賑濟毋令姦民假冒支領一地方有才品優長山林隱逸之士著該督撫核實具奏酌與録用一除革職降級休致回籍外地方人才果有才行著聞及學問優長者著該督撫核實具奏一督撫題補各官原從地方需才起見或受任之後有行事乖張貪縱虐民者該督撫不時體訪據實參奏勿得以曽經保舉曕顧偏徇如故違隱庇别經發覺將該督撫一併從重治罪一各處關差如有將不應納稅之物額外橫徴差役四出分踞津隘擾害商民者該督撫題參若不行題參事情發覺一併從重治罪一督撫係封疆大吏地方利弊聞見必真凡關係籌餉節用禆益兵民事宜如有確見著據實條奏果屬可行著有成效即從優擢用一河道漕運關係重大所關河漕一應情罪俱不赦免一地方災傷已經查勘蠲免賦役者有司不遵仍行濫派及但免有力之家致窮民不沾實惠者事發決不饒恕一各地方有豪紳劣襟衙胥積蠧或免本身田地差徭或包攬他人田地徭丁代為規避偏纍窮民莫此為甚該督撫行各地方官秉公嚴察如有此等情弊重加懲處一凡有叛逆殺死人強盜等罪牽連對質候審監禁人犯在獄年久恐無辜致死該部院直省督撫確審無慿質對情可矜疑者即行奏請釋放於戲懋武功而敷文德聿臻熙皥之風建宸極而鞏皇圖永慶平成之治誕告中外咸使聞知康熙四十二年三月十八日恩詔賞給軍民耆老粟帛有差康熙四十二年十月初五日諭吏兵戶三部朕統御寰區勤求治理鑾輿時邁省方觀民春月閲視河工自畿輔山東以及江浙地方皆經巡幸兹兩河漸已底績所至之地民生風俗亦因以周知念陜西省為巖疆重地當出師塞外時曽經歷其邊境而西安一路未及親蒞頃陜西督撫諸臣言秦民望幸之心至殷且切具請乘此冬令農隙之際觀覽民風詢察吏治簡閲禁旅整飭軍容實為要務用是輕裝約從諏吉而巡沿途一切供御皆內庭儲備纎毫不取辦於地方即偶有市易之物亦敕所司依時價給值不許錙銖抑勒所過大小官吏宜體恤朕愛民德意勿借詞供億私派閭閻如有悖旨科斂者察出即以軍法從事其扈從人員宜約束僕役勿使妄行如不遵法紀生事擾民一併從重治罪朕視民如子凡乘輿所至市㕓隴畝宜各安生理米豆薪芻等物民間照常貿易不必禁止惟懷私挾詐衝突告訐者所告事不與準理仍嚴加治罪爾等即傳諭扈從官員人等並行各督撫令於經過府州縣城市村莊遍示曉諭俾咸悉朕懷特諭康熙四十二年十一月十七日諭川陜總督華顯陜西巡撫鄂海甘肅巡撫齊世武朕撫有區夏思臻上理期於舉世乂安宵旰勤勞未嘗少釋而秦省為天下要地時厪朕懷曩者連嵗荒旱所司未經奏報朕訪聞得實即多方籌畫運米拯救一由襄陽運至商州一命河臣由黃河運至潼關一由湖灘河朔運至渭河一由甘肅運至西安分行賑濟蠲賦已責安集流離秦民始得少蘇自康熙三十二年遣皇長子致祭華山以來雨暘時若年榖豐登閭閻微有起色但秦省關係最重且不通水運撫綏尤宜加意故不憚隆冬跋履風霜逺臨兹土見百姓歡迎載道且知今嵗有秋地方文武官吏能恪勤奉職滿漢軍士亦皆訓練有方朕心甚慰凡巡幸所至必大沛恩膏今將陜西巡撫及甘肅巡撫所屬地方康熙四十二年以前各項積欠銀米草豆錢糧盡行蠲免俟四十三年直𨽻各省咸獲豐稔當將秦省四十四年正供亦行免徴該督即通行曉諭俾窮鄉僻壤小民均沾實惠倘有不肖有司希圖侵蝕以致澤不下究該督撫嚴加訪察據實指參以副朕愛養黎元之至意爾等即遵行特諭康熙四十四年題豁漢中府褒城縣衝崩折正地四頃零康熙四十五年十月陜撫鄂海疏稱漢中屬南鄭等五縣水沖民屯地共九十七頃七十四畝該糧七十九石六斗六升六合零該銀六百九十一兩九錢九分二釐委係沖塌河底并沙壓無存糧無所出應請永為豁免部議應將本年應徴糧銀準其豁免該撫等所稱永為豁免之處毋庸議十一月二十日奉旨今嵗漢江水大南鄭等縣城垣田舍被水衝沒且米價騰貴小民艱食所有本年應徴錢糧著豁免明年以後地丁錢糧亦著暫行停徴俟應徴收之年著該督撫查明具奏起科現在被災人民該督撫速行賑濟欽此康熙四十九年閏七月兵部題覆肅州鎮條奏兵丁入場另請廣額一疏部議不準奉旨陜西多才勇之人今兵丁又準考如舉人額少則人才必致遺漏壅塞著將武舉額數於原額外增二十名欽此康熙五十年十月初三日諭戶部朕誕膺大統撫育寰區夙夜孜孜不自暇逸凡以為民也勤圖利濟休養安全即無水旱之虞時布寬仁之政蠲租除賦務使遐方率土無不均沾或值雨暘偶愆出帑發粟多方賑恤其有益於吾民者靡弗備舉而急行之朕殷勤周詳之至意前四十九年所頒諭旨申晰甚明原欲將五十年天下錢糧通行蠲免以諸臣集議恐需用兵餉撥解之際兵民驛遞益致煩苦故自五十年為始三年之內全免一周除將直𨽻奉天等九直省康熙五十年地丁錢糧一概蠲免及歷年舊欠錢糧一併免徴外山西河南陜西甘肅湖南湖北各撫屬除漕項外五十一年應徴地畝銀共八百四十萬四千兩有竒人丁共銀一百二十萬八千一百兩有竒著察明全免並歷年舊欠共銀五十四萬一千三百兩有竒亦俱著免徴其五十二年應蠲省分至期候旨行民間舊欠既經豁免嗣後每年額徴錢糧務如數全完倘完不及額或有虧空託稱民欠即責令督撫以下官員償補仍從重治罪該督撫須實心力行期副朕惓惓愛民之意如有指稱事故侵欺科派事發之日必嚴行究治諭旨到日遍示城郭鄉村深山窮谷咸使知悉爾部即遵諭行欽此康熙五十二年三月十八日恩詔賞給老人絹棉肉有差康熙五十五年十月初七日諭户部朕統一寰宇無分中外皆欲久安長治共樂升平宵旰孜孜五十餘年未嘗頃刻去懷也澤旺阿喇布坦前曾頻行請安遣使來往近忽狂悖侵擾哈密哈密係我編置佐領之部落與內地無異若不遣發師旅置之不問斷乎不可故特徴兵備邊一切飛芻挽粟悉支正供毫無纍及閭閻然而行軍置驛及諸凡挽運皆由邊境今嵗山西陜西二省雖屬豐收喜登大有猶念邊民效力轉輸無悮急公固其常分而民勞亦所堪恤若非格外施恩何以昭示鼓舞兹特大沛恩澤加意培養著將沿邊一帶運糧地方自山西大同府屬前衛右衛大同懷仁馬邑朔州保德等七州縣衛直至陜西延安府屬府谷神木安塞綏德米脂安定吳堡保安榆林保寧常樂雙山魚河歸德嚮水波羅懷逺威武清平甘肅屬山丹髙臺古浪莊浪西寧肅鎮寧夏左屯中屯平羅中衛靈寧平涼固原鎮戎西安慶陽阜城甜水河州歸德蘭州洮州等四十二州縣衛所堡康熙五十六年額徴銀八萬六千一百零糧米豆榖三十一萬七千七百二十五石零草二百七十六萬五千九百束零通行蠲免併將從前積年逋欠銀糧草豆亦悉與蠲除諭旨到日該督撫即遍行張示使遐陬僻壤莫不周知仍嚴飭所司實心奉行以副朕加厚邊民至意其或陽奉隂違澤不下究該督撫題參從重治罪爾部即遵諭行特諭欽此康熙五十六年十一月二十六日諭戶部朕撫馭寰宇五十餘年夜寐夙興為小民勤求生遂凡率土逺近皆期共享樂利聿成家給人足之休未嘗一日不厪諸懷也數十年以來各省正賦屢經全免歷年積欠亦已蠲徴偶有雨澤愆期或發倉廩散給或截漕糧賑救不惜數萬萬金錢米榖頻沛恩施誠念窮簷之艱慮其至於顛連失所耳近者民力雖已稍舒然念分年帶徴銀兩若不格外優寬則小民一嵗所獲分納二年之賦以其贏餘養贍室家斷難充足朕每懷及此軫惻良深宜更加殊恩通行豁免今將直𨽻安徽江蘇浙江江西湖廣西安甘肅等八處帶徴地丁屯衛銀二百三十九萬八千三百八十兩有竒概免徴收其漕項雖例不準免亦著破格施恩將安徽江蘇所屬帶徴漕項銀四十九萬五千一百九十餘兩米麥豆一十四萬六千六百一十餘石內免徴各半爾部即行文該督撫嚴飭所屬實心奉行遍加曉諭俾民間無徴催之纍均沾實惠用稱朕撫恤羣黎至意倘有不肖有司借端朦混私行徴收者該督撫嚴察參處如該督撫失察一併從重處分爾部即遵諭行特諭康熙五十八年十二月二十三日諭戶部朕惟治天下之要首以乂安民生為急故自御極以來於閭閻疾苦無不博咨廣詢渙敷庥澤其有動用民力之處尤孜孜厪念刻不能忘蓋六十年如一日也比年因澤旺阿喇布坦狂逞跳梁軍興征繕逺歷邊陲其沿邊數處師旅屯駐一切雖皆支用正項錢糧而協辦轉輸行賫居送之事民力勞瘁朕心時切軫念曽將陜西甘肅巡撫所屬康熙五十八年額徴地丁銀一百八十八萬兩零歷年舊欠銀四萬兩零特沛恩綸悉行蠲免而沿邊各州縣衛所軍興既多飛挽之勞辦賦復滋催科之擾若非格外加恩黎民恐致失業所有沿邊一帶陜西延安府屬府谷神木安塞綏德米脂安定吳堡保安榆林保寧常樂雙山魚河歸德響水波羅懷逺威武清平葭州龍州鎮靖鎮羅寧塞靖邊桞樹澗安邊磚井定邊饒陽水堡髙家堡甘肅屬山丹髙臺古浪莊浪西寧肅鎮寧夏左屯中屯平羅中衛靈州寧州平涼衛固原州鎮戎西安阜城甜水河州歸德蘭州洮州寧夏前衛平涼縣固原衛固原廳河州衛蘭州廳慶陽涼州衛永昌衛鎮番衛甘州左衛甘州右衛肅州衛鎮彛所等六十八州縣衛所堡康熙五十九年錢糧米豆草束俱宜蠲免但目今係有軍務之時除米豆草束外將康熙五十九年額徴銀九萬八千一百兩零盡行蠲免爾部移文該督撫通行曉諭實心奉行務俾均沾德惠以副朕曲軫邊民之至意倘或借端徴派澤不下究該督撫嚴察指參從重治罪爾部即遵諭行特諭康熙五十九年十月十五日奉旨朕臨御以來凡事惟以實心行實政務俾羣黎均沾實惠為要從不諱災傷崇尚虛文今嵗江南浙江湖廣等省大稔豫省微覺歉收朕已頒諭旨將運京漕糧停其輸運著於彼處收貯但陜西地方現有軍務今嵗糧榖適又歉收朕預頒諭旨著總漕施世綸將運米路徑勘視具奏協同總督鄂海辦事除陜西歷年錢糧屢經蠲免明嵗錢糧另頒諭旨蠲免外今雖動支常平倉糧榖散給而地方官大半俱在軍前現今所有俱係署事官員辦事人員殊少應照曩年差官賑濟山東百姓遣往賑濟著九卿詹事科道會議具奏欽此欽遵該九卿等會議得山東賑濟飢民自泰安至郯城濟南至登州德州至兖州東昌濟寧分為三路差大臣三員又三佐領下公派官一員每佐領借户部庫銀三千兩帶去散賑再官民情願效力者即行發往不論銀米與地方官分界散賑事成回日酌量所賑議敘在案今陜西甘肅地方不通水路此賑濟應將西安府一路延安府一路蘭州一路作為三路差大臣三員令派出大臣每路揀選各部院滿漢賢能司官各四員動戶部庫銀五十萬兩蘭州二十萬兩延安府十五萬兩西安府十五萬兩由驛遞運送散賑地方會同督撫等率領地方官將現今陜屬州縣衛所廳常平倉存貯糧六十九萬二千石零甘屬州縣衛所廳常平倉存貯糧六十七萬二千石零之內酌量就近動用自散賑之日起以至麥收之日大口每日米三合小口每日米二合務使百姓各得其所毋致流離再無論旗民有情願效力人員自備銀米散賑者俟事竣交與九卿從優議敘再查施世綸具題碾米一十萬石運送西安奉旨截留六十年漕米二十三萬三千三百八十八石但西安地方甚為緊要米石不得不為多貯除現今施世綸具題運送米十萬石外將截留六十年漕米內撥十萬石交與河南巡撫照施世綸所題運米之例運至西安存貯備用其派大臣之處俟命下之日將滿漢堂官職名開列具題等因於十月二十三日題本月二十五日奉旨這事情所議甚好不必差遣堂官著派出司官將銀兩交與施世綸總管公同賑濟餘依議欽此康熙五十九年十月十七日諭戶部朕自御極以來無日不以民生為念凡閭閻疾苦必詳加咨訪至於他方偶遇災傷一有所聞即行蠲賑撫恤備至務期黎庶安生樂業優遊化日六十年來夙夜孜孜未嘗少釋也邇年因西陲用兵師行糧從雖芻粟悉支正供絲毫不擾民間然轉輸必需民力勞苦宜恤曽將康熙五十八年陜西甘肅所屬額徴地丁銀一百八十八萬零歷年舊欠銀四萬兩零康熙五十九年沿邊各州縣衛所額徴銀九萬八千一百兩零浹沛恩綸屢行蠲免近聞二年歉收民有艱於粒食者辦賦急公力何能支若非渙敷德澤無以培養窮氓是宜特頒浩蕩之恩用申勤求民瘼之念著將陜西巡撫甘肅巡撫所屬通省各州縣衛所除應徴米豆草束外康熙六十年應徴地丁銀一百八十八萬三千七百四十兩零通行蠲免爾部速行文該督撫遍行曉諭實心奉行務必均沾實惠如有不肖官吏陽奉陰違澤不下究者該督撫嚴察題參從重治罪又署撫花闕奏稱甘肅地方數年歉收糧草價值騰貴兵丁採買維艱且兵丁效力行間勞瘁堪憫尤當軫恤準預給半年餉銀著即行文附近省分撥銀三十萬兩速解甘撫頒發以副朕篤念民勞優恤軍士至意爾部即遵諭行特諭雍正元年三月二十二日諭户部陜省自軍興以來大兵駐扎運送糧餉供支草豆無一不需民力原非他省可比皇考每為軫念今當大沛恩膏以子惠元元所有康熙六十年以前陜西全省除借給籽種著該督撫查明定議分年帶徴外其餘凡有民屯衛所實在未完銀米豆草悉豫蠲免倘有不肖官吏以虧空揑稱民欠濫邀曠典者一經發覺罪在不赦該部作速行文毋得遲留特諭雍正元年六月十三日諭户部兵部朕惟治安天下欲兵民並得其所必以敷恩減賦為要比年以來䇿妄阿喇布坦狂逞逆命苦師致討四川陜西進藏官兵歷經險道往返萬有餘里甚屬勞乏朕深憫念其倒斃馱載馬匹價銀及口外沿途與西藏留駐兵丁續補馱馬價銀著悉免追賠又西陲軍興以來民間急公趨事供應差役實厪朕懷聞陜西甘肅二屬各州縣衛所地丁銀兩每錢額外徴收三釐米每斗額外徴收三合以為備荒之用此項徒有加賦之名而無賑濟之實著自雍正元年始將額外徴收銀米永行停止如有舊欠亦悉豫蠲除爾部即速行文該督撫遵諭奉行務俾均沾實惠以副朕篤念兵民至意特諭雍正元年九月川陜總督年羮堯疏稱長武縣西鄉縣於康熙二十三年前令史佐揑報開墾起科銀一千三百兩究無承墾之戶可以追徴仰懇皇仁準豫豁免部議長武西鄉二縣額徴錢糧俱係全書開載自康熙二十三年間開墾徴收三十餘年並無揑報之説事關錢糧不便遽準應將該督所請之處毋庸議十月二十二日奉旨長武西鄉二縣浮額錢糧屢年徴收甚纍百姓著照該督所請準豫豁免欽此雍正二年五月初二日上諭陜西人材壯健強勇者多騎射嫻熟盛於他省每科取中不過三十名而入學額數亦與他省不相上下額少人多不無屈抑自雍正四年鄉試為始西安甘肅武舉各加中十名其武童入學額數若通省俱加恐有冒濫照文童改學例令督撫會同學臣查明技勇最優之州縣酌量數目奏請加額特諭雍正二年十月二十九日奉上諭川陜進藏出口一應用兵之處倒斃騎馱馬匹著悉免賠補雍正三年九月十五日奉上諭前年羮堯查拿陜西郃陽縣私鹽用兵一案初據年羮堯奏稱並未傷損一人及朕留心察訪知有損傷居民之事續據黃焜寄與范時捷稟帖亦止稱傷損十數人朕軫念黎元惟恐官吏朦蔽使民困不能盡逹用是再加訪問知所傷之人甚多因特遣奏事石麟前往平陽府傳諭審事侍郎史貽直髙其佩令其用心查訪作何設法開導務使小民無所瞻顧具呈控告勿似黃焜從前用威恐嚇使小民不敢申訴實情今據史貽直髙其佩奏稱遵旨用心查訪親身至彼曉諭開導查出實在因年羮堯用兵致死無辜之男婦老幼共七百八十六名口連前報出之十九名共傷損人民八百零五名口俱取有鄉保甘結該縣册結鑿鑿可據又奏稱年羮堯因查拿鹽梟曹豬頭而該縣將良善之馮豬頭頂名解送年羹堯並不覆審即將馮豬頭正法等語朕聞之驚駭戰栗不勝愧恨之至朕以愛養百姓為心惟恐一夫不獲其所宵衣旰食時厪於懷乃年羮堯負朕委任之恩逞其凶殘之性草菅民命毒害無辜以致多人受其慘酷皆由朕任用匪人之故深自愧憾實無以謝郃陽之紳襟黎庶郃陽地方既被騷擾著該督撫等加意撫綏其被害之家雖經欽差官員賞給銀兩著該督撫等再行優恤雍正四年郃陽縣應徴錢糧盡豫豁免該督撫等可遍行曉諭合邑紳襟黎庶伊等遭年羮堯之殘害幸朕留心察訪研究實情使伊等沉寃得雪今特沛恩膏以示軫恤務令僻壤荒村咸知朕意特諭雍正三年十二月二十五日奉上諭陜西西安地方緊要又有滿洲駐防兵丁省倉米石應當多貯查西安現在所貯米石為數無多今嵗秦省收成豐稔著總督嶽鍾琪巡撫圖理琛就近商酌動用庫銀採買米石存貯省倉以為備用其米數多寡該督撫酌定奏聞務須陸續採買勿令價值騰貴倘倉厫不足亦令該督撫酌議收貯之法大凡積貯米榖於地方甚有禆益而有司往往耽延瞻顧不肯實心奉行該督撫等宜仰體朕心毋蹈此習雍正四年十一月初四日奉上諭西安官員兵丁在巴里坤軍前年久甚是勞苦效力著行文總督嶽鍾琪賞給副都統常壽一年俸同常壽撤回官員每員半年俸兵丁每人銀十兩再去年自巴里坤撤回西安官員兵丁官員每員賞給一季俸兵丁每人銀六兩雍正五年二月十六日奉上諭朕聞得陜西鄭渠白渠龍洞向來引涇河之水溉田甚廣因歷年既久疏濬失宜龍洞與鄭白渠漸致淤塞堤堰大半坍圮醴泉涇陽等縣水田僅存其名深為可惜朕特令該督嶽鍾琪詳酌興修今據該督親勘奏稱龍洞急宜挑挖鄭白渠務當疏濬更須修築堤堰建設閘口以俾堅久已於西安布政司庫貯公用羡餘銀先動一千兩委員將龍洞鄭白渠及時挑濬其建閘工料約估銀七千兩請亦於司庫存貯羡餘銀內動用等語朕惟興修堤堰乃於民生大有禆益之事著動用正項錢糧俟一切功程告竣造報工部查核務期渠道深通堤堰堅固俾農田得以永賴以副朕保惠元元之至意雍正六年四月初五日奉上諭據嶽鍾琪摺奏前因陜甘兩省丁銀偏纍援照各省以糧載丁之例題請將丁銀於全省地糧之內通計均攤已奉旨允行在案惟是各屬册籍繁多未能一時核定而該年錢糧已準部咨撥充兵餉若俟攤定之日始行開徴未免遲悮是以各州縣仍照舊額徴收伏查以糧載丁則各屬錢糧較之舊額勢必有增有減今應減丁銀之朝邑等二十一州縣於未及攤定之先照原額徴收共長解銀六千七百九十二兩此項丁銀若命各州縣領回按戶退還則糧戶畸零難於分折散給必致胥役中飽小民不沾實惠况百姓既沐鴻恩將偏重丁糧均攤完納永無苦纍即此項銀兩亦係從前應徴之項但以均載之年攤撥未定暫假原額完納一年並非重徴可比應請存貯司庫以充兵餉等語此項銀兩於攤撥未定之先民間既已照舊完納該督奏稱今若按戶退還難於散給必滋胥吏中飽之弊著照該督所請停其按戶退還但此項銀兩既係陜西輸納之物著留貯陜省於地方公事如積貯興修之類有禆益於民間者該督撫酌量奏聞動支應用不必撥充兵餉雍正七年二月初二日奉上諭陜省兵丁年來效力甚多朕深為軫念伊等出征之時若因已給行糧遂扣其坐糧則伊等妻子在家難以養贍嗣後出征之兵丁等於照例支給行糧外仍給與坐糧銀米以為養贍家口之資俾免內顧之慮再陜西營伍甚屬緊要若兵丁有派出之處著總督嶽鍾琪酌量召募充補另行按名給與錢糧雍正七年六月十二日奉上諭朕愛養黎元遐邇一體而邊逺之地小民家計不及近省尤朕心之所繫念數年以來甘肅四川雲南貴州廣西五省有用兵西藏及勦撫苖蠻等事其一應軍需皆動用公帑備辦秋毫不派及於民間而糧餉轉輸亦有資於民力今藏地苖疆俱已寧謐朕心嘉慰特沛恩膏著將庚戍年甘肅額徴地丁銀二十七萬七千六百八十四兩零四川額徴地丁銀三十一萬六千三百兩零雲南額徴地丁銀一十四萬一千六百兩零貴州額徴地丁銀七萬四千二百兩零廣西額徴地丁銀三十五萬三千九百兩零悉行蠲免其西安各屬地方近日亦有預備軍需之事朕心軫念著將庚戍年額徴錢糧蠲免十分之三共計銀四十七萬九千九百兩零此六省督撫大吏宜仰體朕心轉飭所屬有司敬謹奉行務使閭閻均沾實惠如有奉行不力被不肖有司暗飽私囊或被姦胥土棍強紳劣襟包攬侵蝕者朕若訪聞必將通省大小官員分别從重治罪至於國家設官本以理民官有恤下之責民有奉上之義若設官而不為計及養亷之資則有司之賢者將窘迫而莫能支不肖者又將橫取而無所檢束矣是以酌定以錢糧耗資均給各官養亷之資此揆情度理上下相安之道但思加恩百姓豁免正賦若將耗羡一併蠲除是民雖邀額外之恩而官員轉有拮據之苦上司或因此稍有寬假則必致巧取苛索於民流弊種種轉多於耗羡之數於吏治民生均無裨益嘗見庸劣之地方官每以蠲免錢糧為不便於己心懷悵怏即此意也著於庚戍年為始凡遇特恩蠲免錢糧者其耗羡仍舊輸納諒必民所樂從若因水旱蠲免者不得徴收耗羡將此永著為例雍正七年六月二十六日奉上諭據陜西總督嶽鍾琪奏稱前奉恩諭陜屬設立社倉一事於雍正四五兩年司庫耗羡銀內發各州縣十四萬五千八百餘兩共採買榖麥三十九萬八千七百五十五石零計州縣小者二三千石大者七八千石儘足設立社倉每年借放之本尚存銀八萬八千七百餘兩分發各處蓋造社倉約以京斗一千石為一社每社倉一所不拘房屋間數總以足貯二千京石為率請敕下署督臣查郎阿撫臣武格於各州縣四鄉分社建倉令同社各村堡之老民公舉倉正倉副經管本社倉糧合計陜屬州縣約買糧四十萬石共應建社倉四百餘處務於今嵗秋冬辦造齊全將糧石分貯惟是地方督撫州縣作何奉行則為利為病之分途專以在官在民為大要今陜省大僚皆不知臣原奉恩諭之由但見從司庫發銀既存兢懼之念又見積貯虧空處分之嚴例每遇州縣請領社倉銀兩撫藩過於慎重誡諭甚嚴州縣亦懷貽纍之憂將所領銀兩不肯交與倉正倉副仍勒令里甲採運又有令胥役家人幕賔收放者始而勒買既而勒借陜省百姓竟呼此項榖麥為皇糧不知立社倉之恩意臣以設立社倉聼從民便之語再四曉告諄切叮嚀不遺餘力無如大小官員謂臣言茫無慿據嘖嘖訾議其所以然者祗以因民所利之明詔未頒是以在官在民之界限不定伏乞特頒社倉諭旨交督撫恭録鐫石每一社倉頒發一本張挂曉諭臣又謹擬社倉條約亦請發各社倉刋刻木榜竪立倉門使鄉里愚民人人共曉則每年收放皆有程式庶可久而弗替等語朕惟國家建立社倉原令民間自行積貯以百姓之資糧濟百姓之緩急其春貸秋償及滋生羡息各社自為經管登記地方有司但有稽查之責不得侵其出納之權此社倉之古法也是以各省有請立社倉者朕皆令其聼從民便毋得強勒捐輸繩以官法以致便民之舉轉為民纍所以曉諭各省督撫者不啻至再至三矣從前嶽鍾琪在京時請於通省加二火耗內應行裁減每兩五分之數且暫行徴收發與民間採買榖石分貯社倉俟採買數足即行裁減是於暫收耗羡之中隱寓勸輸之法實則應行酌減之耗羡即小民切己之資財而代民買貯之倉糧即小民自捐之積貯此藏富於民之良法最為切實而易行是以俞允所請令其辦理乃陜省官員不知此項榖石本係民資又未識從前嶽鍾琪奏請之由以為收貯在官即是公物不肯付民經管而胥吏司其出納者遂有勒買勒借之弊殊非數年以來朕之周咨詳畫多方生養斯民之本意矣今特降諭旨將朕允從嶽鍾琪之請並嶽鍾琪陳奏原委明白曉示著署督查郎阿巡撫武格刋石頒布俾各州縣鄉社小民咸知朝廷經營設法之蓋藏實百姓自為斂散之資用倘地方官有於社倉榖石創議交官不交百姓或指稱原係公項預為公事侵那之地者俱以擾撓國政貽誤民生論從重治罪其嶽鍾琪所擬社倉條約著戶部抄録交與該督撫分發各州縣刋刻木榜於各鄉社倉竪立以為永久程式特諭雍正七年七月二十八日奉上諭陜西興安州於康熙四十五年河水泛漲沖塌城垣房屋漂沒各案倉糧共六千四百四十餘石曽經鄂海以此項糧石皆兵民積蓄之需不便虧缺題請令官紳士庶不拘多寡量力捐輸在案但自題請捐補以來聞止捐過糧榖七百餘石尚虧欠五千六百餘石未曽補足朕思當日公捐之舉本係聽從民便今事歷多年著將官紳士庶捐補之舉曉諭停止其興安州應補糧石或照陜省現動五分耗羡採買糧石存貯社倉之例令該督撫酌量辦理具奏雍正七年八月十一日奉上諭自古帝王之治天下設官分職不得其人則庶政莫由振舉而理財不得其道則國用不足雖欲減賦蠲租沛膏澤於萬姓其勢有所不能此自然之理也數年以來怡親王大臣等辦理戶部事務敬慎公忠風清弊絶阜民裕國府庫充盈國家經費既敷則蠲除惟正之供施恩常格之外使羣黎百姓俯仰有餘乃朕寤寐之至願也昨山東署撫奏稱今嵗東省秋成大稔父老皆言二十餘年以來所僅見朕思上年命田文鏡總督山東而今年地方禾稼遂登大有又如嶽鍾琪總督陜省平日駐劄西安則西安比歲豐收今夏領兵前往甘肅則甘肅收成大熟而西安六七月間便覺苦旱又如鄂爾泰之在雲南連嵗滇省地方雨暘時若今夏巡歷貴州甫離滇境而雲南府屬之晉寧宜良等處即有暴雨潰堤低田被水之事又如李衛之在浙江屢年四境豐樂今嵗李衛暫離浙省而衢屬江山縣峽口谷即有起蛟發水淹沒禾麥之災觀此數事益見賢督撫之感召天和捷於影響則凡為督撫者宜何如之敬謹居心公忠奉職以不愧屋漏之誠為感格上天之本耶聞今年秦省西安一帶夏月甚旱而地方文武大臣官員罔知修省此則封疆大臣之所當切戒者朕非卸責於臣工而屢頒此等諭旨也蓋朕實有見於天人感應之理纎毫不爽而夙夜敬謹乾惕覺鑒觀之有赫而呼吸之可通倘朕心有一刻之懈弛而徒以訓誡之詞責諸臣下其又何以對越天地神明乎又據廣東督撫布按等奏稱今年粵東雨澤均調百榖順成合計通省米價貴者不過八錢幾分賤者至於五六錢實粵省從來希有之事朕聞之深為慰悅此皆該省人民等革薄從忠醇厚良善之心仰感上天垂祐而錫以豐穰之所致也著將山東廣東二省庚戍年地丁錢糧各免四十萬兩以奬地方官民之善直𨽻陜西今年已各蠲銀四十萬兩庚戍年著再各免地丁錢糧四十萬兩山西通省連嵗皆獲豐收著免庚戍年地丁銀四十萬兩安徽等屬亦著免庚戍年地丁銀四十萬兩此六省共蠲免額徴銀二百四十萬兩乃朕加惠閭閻之特恩該督撫等應轉飭有司仰體朕心敬謹奉行務使小民均沾實惠倘不肖官吏及紳士土豪等有侵蝕包攬等弊一經發覺定行重治其罪並將失察之督撫上司等官嚴加議處特諭雍正七年十二月初八日奉上諭康熙五十九年陜省解送駝馬進藏文武官五十員每員借支肅州公庫銀五百兩為行裝路費之資本係應給之項因當時該督撫未經題報不敢作正項開銷是以各員回陜之時仍於各名下著追補項至今尚有未完銀一萬六千八百兩朕念伊等效力戎行逺涉藏地雖非衝鋒破敵者比而間關行役亦屬可憫著將未完銀兩槩行豁免其已完者悉給還本員或交伊之的屬如該員有别項虧欠應追者即準其抵補以示優恤勞役之至意雍正八年十月十七日奉上諭辦理軍需必得熟練之員方為有益陜甘二省州縣官員備辦軍需有經手數年者有經手二三年者將此熟練人員若因細故微瑕即行參革則接任之員新辦軍務未免生疏或至遲誤亦未可定嗣後陜甘地方辦理軍需之州縣官員若無大過其所犯情有可原者著該督撫揆情度理量加寬宥若錢糧有些小不清之處而事屬因公者統俟大軍凱旋之後查核明白定其功過特諭雍正八年十月十八日奉上諭陜西四川地方民風淳朴歷年逋賦甚少查每年徴收錢糧之期四月完半十月全完此定例也朕思四月十月既屆納課之期小民必須預先經營是麥榖未收之時即為輸將之計或因稱貸而受剝於富豪或因預糶而大虧其價值且如甘肅地方有徴收本色者若在糧榖未獲之前更為竭蹶歷來川陜錢糧既無拖欠之陋習著將四月完半者寬至六月十月全完者寬至十一月俟夏麥秋禾登場納稼之後從容完課俾民力紓徐以副朕愛養黎元之至意特諭雍正九年正月初三日奉上諭朕思惠養黎元之道莫先於除賦蠲租使萬姓均沾渥澤是以數年來寬免各省之額徴以為阜民足食之計者難以枚舉而該省之人民果抒誠慕義宣力急公朕尤嘉其人心風俗之淳良而屢沛施於常格之外也陜西甘肅二省經理軍需數年矣凡米糧芻牧之屬及車馬牧畜之類皆動支公帑銀兩備辦一絲一粟不使擾民此中外臣民所共知者然朕每念地方既有軍務縱不取辦於民財未嘗不資藉於民力而陜甘二省之民人踴躍趨事其心甚為可嘉年來已屢降蠲免之旨兹特再布恩膏將雍正九年西安所屬額徴地丁銀蠲免十分之三共計銀四十七萬九千九百零甘肅所屬額徴地丁銀二十八萬二千二百零全行蠲免該督撫等可轉飭所屬有司仰體朕心敬謹奉行務令閭閻均沾實惠將此旨刋刻頒布俾深山僻壤共知之特諭雍正九年二月二十六日奉上諭從來備辦軍需於地方不無勞費朕深知其弊惟恐纍及民間是以於征勦凖噶爾之舉悉心密籌於數年之前一絲一粟皆用公帑置辦而民間並不知國家將有軍旅之事從來未聞預備軍需地方如此毫不騷擾也此天下所共知更為三秦百姓所深悉者及至大兵既出時日既多挽粟飛芻脂車秣馬雖不取辦於民財恐不免借資於民力此亦時勢之不得不然也祗以凖噶爾狡獪凶頑父子濟惡實蒙古之巨患為國家之隱憂若因循茍且縱賊養姦是狡寇一日不滅即邊境一日不寧邊境一日不寧即內地之人民一日不得休息此朕熟思詳審計算再三而出於萬不容己者並非好大喜功利其民人土地而為此舉也即以上年之事言之賊彛先遣使臣詐稱求和及朕降旨暫停進兵待其信息而彼傾其賊衆乘我不備大肆猖獗然則此等狡寇固可置之度外聼其貽害於邊方哉即此愈見聖祖皇考當年不得已之情朕今日繼承先志之應舉行事也惟是國家設兵所以衛民今因用兵而有不得不資民力之勢朕心實為憐憫是以年來屢蠲陜甘二省額徴錢糧使羣黎均沾膏澤乃三秦紳士庶民知感國恩兼明大義踴躍趨事志切急公二十年來如一日朕實嘉賞之如昨歲據督撫奏報甘肅士民等有願捐車輛以資挽運者有願捐草束以供芻牧者朕皆降旨一一照數給與價值而其服勞宣力之誠悃則不可忘矣今年添辦軍需朕尤切諭督撫有司體恤民情不得絲毫擾纍其糧餉運費特令加增倘有不敷仍令據實陳奏無非軫念民勞之意惟望陜甘二省紳士庶民等歡欣鼓舞勿懈初心則和氣致祥仰邀天眷數年間必見膚功克奏不但邊城內外共受寧靜之福即爾等世世子孫亦永享安居之樂矣查雍正九年甘肅所屬額徴錢糧業已全行蠲免西安所屬額徴錢糧前降旨蠲免四十萬兩著再蠲免四十萬兩以昭朕體恤之恩該督撫務飭有司敬謹奉行使閭閻同受實惠并將此旨刋刻頒布俾陜甘二省逺鄉僻壤之民共知之特諭雍正九年三月二十四日奉上諭朕欲於在京官員人等內揀選老成明白者數十員命往陜西內地州縣辦理宣諭化導之事年餘事竣即著回京辦理若好加恩議敘著大學士會同該教習於庶吉士內揀選數員各部堂官在本部學習人員內揀選一二十員國子監祭酒等在選拔貢士內㨂選二三十員俱交送內閣帶領引見雍正九年四月十一日奉上諭朕御極以來繼述皇考聖祖仁皇帝乂安區宇之聖心旰衣宵食朝乾夕惕欲使薄海內外休養生息物阜民安永戢兵戈咸登衽席以成蕩平熙皥之治是以宣猷敷治之間𢎞綱庶務凡有益於民生者莫不興舉不便於民生者莫不屏除若有幾微措置失宜即五內輾轉寤寐難安豈肯好大喜功興兵搆難使百姓有供應之勞不遑寧處哉惟是除暴乃所以安良撫內莫先於攘外此古今不易之至理帝皇治世之常經凡爾百姓粗通大義者即莫不知之不必待髙逺之識也惟彼凖噶爾一部落原係元朝之臣僕其始祖曰額森額森之子托渾漸至大員因擾亂元之宗族離間蒙古惟恐獲罪遂背負元朝之恩逃遁藏匿於西北邊逺之地煽惑匪類要結黨與自稱凖噶爾當我朝定鼎之初各處蒙古傾心歸順求為屬國共享升平之福獨凖噶爾一部落違越於德化之外至噶爾丹䇿妄阿拉布坦二人則尤狡獪凶頑之甚者噶爾丹身為喇嘛不守清規不遵佛教破戒還俗娶青海鄂齊兒圖車臣汗之女為妻又潛往青海地方賊害伊之妻父而虜其人衆又復巧搆釁隙乘喀爾喀之不備發兵猝擊以致喀爾喀人衆潰散紛紛投我天朝蒙聖祖仁皇帝施恩撫恤遣使前往噶爾丹處諭令戢兵和好多方開導乃噶爾丹冥頑不靈轉借追襲喀爾喀之名犯我邊汛彼時即行勦滅復有何難我聖祖仁皇帝至仁如天好生為德特遣官員前往責問是時噶爾丹惶愧恐懼設誓撤兵仍復潛住近邊暗圖窺伺且乘間搶掠蒙古牲畜俾其不獲安居我聖祖仁皇帝始親統六師躬行天討噶爾丹逆天背理自速滅亡此噶爾丹之始末也䇿妄阿拉布坦者乃噶爾丹之姪也彼時我兵既平噶爾丹即應鋤絶根株不留遺孽祗因我聖祖仁皇帝寬大仁慈赦罪宥過且念䇿妄阿拉布坦素與伊叔不相和睦情有可原於是加以天髙地厚之恩將噶爾丹餘剩部落賞伊收管此時伊力弱勢微甚為恭順其後則離間伊妻之父子誘其妻弟擕帶萬餘戶至伊住牧之地因而強占入已於是勢力漸增竟敢肆意妄行窺伺青海侵犯哈密又潛兵入藏殺害伊妻弟拉藏汗毁壞寺廟荼毒人民我聖祖仁皇帝特遣大臣前往詢問乃伊愍不畏死阻兵抗命使臣率師甚少兵力單弱伊得愈肆猖狂此實天下臣民所共憤者我聖祖仁皇帝仍賜包容諭令兩路官兵姑緩前進以俟其悔罪輸誠若終不悛則命將徂征犁庭掃漠此我皇考之本意也朕即位以來伊雖遣使求和而詐偽作姦仍復如故且將我青海叛臣羅卜藏丹津收留藏匿朕屢次降旨諭以定界息兵而伊恍惚支吾巧幻百出及䇿妄阿拉布坦身故伊子噶爾丹䇿凌繼立其妄亂之性悖逆之行更過於其父其遣使陳奏之詞甚屬支離妄誕即如前年西藏阿爾布巴等之敢於戕害頗羅鼐亦因凖噶爾等伊地相近而逃匿之羅卜藏丹津又係伊等姻戚彼此相依是以敢於悖逆朝命而仗凖噶爾以為狡兔之三窟也似此世濟其惡之人以逞凶挾詐為心以劫物傷人為事不可以德感不可以理喻無賴無恥懷逆藏姦時時欲戕害臣服我朝之蒙古部落以壞我屏垣若此時可以經理之會而瞻顧因循避興師動衆之名為耽逸偷安之計則狡寇一日不滅則蒙古一日不安蒙古一日不安則邊境一日不寧邊境一日不寧則內地之民一日不得休息而首先之疲於奔命者即三秦之黎庶也即以上年之事論之賊夷先遣使臣偽稱請和及朕降旨停兵以待信息而彼於深冬氷雪之時傾其醜類乘我不備侵犯汛界盜竊馱馬然則此等狡寇固可置之度外聼其貽害於將來乎從來窮兵黷武為聖帝明王之所深戒而以大加小以強凌弱又仁人君子之所恥而不為者况準噶爾彈丸之地逺在極邊之區得其地不足以耕耘得其民不足以驅使即使滅此朝食亦不足以誇廟略而耀武功此皆皇考與朕熟思審處先後籌畫數十年而出於萬不得已者也惟是地方有軍旅之事厲兵秣馬諸務紛繁雖不取辦於民財恐不免不借資於民力向蒙皇考軫念秦民勞勩所以加恩而優恤之者無待朕之屢述矣朕御極之元年即將陜甘二省康熙六十年以前民屯衛所未完銀米豆草等項悉行蠲免又將舊例應完之三釐三合免其徴收數年以來西安所屬額收錢糧或免四十萬或免八十萬甘肅所屬錢糧則連嵗全行蠲免他如展納課之定期寬帶徴之舊欠開墾地畝修築河渠悉動帑金永為民利此皆朕之加惠於秦民者可約略舉之也即以西陲用兵之事言之北路軍需交與怡賢親王等辦理西路軍需交與大將軍嶽鍾琪辦理此皆定議於雍正四年者王大臣等密奉指示一絲一粟皆用公帑製備纎毫不取給於民間是以經理數年而內外臣民並不知國家將有用兵之舉以致宵小之徒如李不器輩竟謂嶽鍾琪私造戰車蓄養勇士訛言繁興逺近傳播達於朕聼朕將嶽鍾琪遵奉密旨之處曉諭秦人而訛言始息即此一節觀之若非辦理軍需秋毫無犯何至以國家之公事疑為嶽鍾琪之私謀乎及至雍正七年大軍將發飛芻挽粟始有動用民力之時朕皆敕令地方有司照數給與腳價嚴禁扣尅短發侵蝕等弊倘有不肖官員借稱軍需科派擾民者著該管大臣即行題參革職枷號示衆先動帑金傳集百姓如數給還朕所以為百姓防患除弊者亦極嚴切矣上年該督撫先後奏稱民人中有願捐草束以供牧養者紳襟士庶中有願捐車輛以資挽運者朕皆奬以溫諭仍令照數給與價值去冬賊彛猖獗之後將來軍餉較前未免繁多朕特令加添運價一切軍務悉令有司寬裕辦理似此是朕豈肯因戎事繁急稍涉權移使閭閻騷擾於萬一哉意謂三秦衆庶必能諒朕不得己而用兵之苦心悉朕不忍纍民之至意矣乃近來風聞陜西之民竟有怨朕而私相謗議朕撫躬自問實不得其致怨之由再四思維昔年曽靜謗朕之語怪誕離竒實為夢幻所不及之境然則天下之大如鬼如蜮之事何所不有總因數年來大逆不法之人不得遂其逆願於是使其匪類揑造流言轉相傳布以冀搖惑衆心擾亂國政前年一一根究悉出發遣衆犯之口供證鑿鑿已按律正法大義覺迷録中載之已詳十數年來陜西居住之允禵塞思黑年羮堯延信等皆視朕躬如讐敵者也其脅從之逆黨實繁有徒專揑誹謗之詞將無作有欲以泄其私忿如塞思黑之令狐士儀年羮堯之鄒魯靜一道人延信之道姑王氏等皆公然以反叛為衆人之倡則其他匪類之造作妖言暗中煽動者又不知其幾矣地方既有姦回之人接踵肆惡而又值軍興旁午或有司自顧考成間有奉行不善之處是以愚民無知惑於邪説溺於私情偶因用力於目前遂忘受恩於平日此亦時勢之所不免者若果深知朕心明曉大義一聞匪類揑造之言即深信我主必無是事偶遇奉行不善之處即深信我主必無是心此誠天下之良民也然而造言生事之人專以蠱惑人心為務此倡彼和有意流傳而知理安分之人不過本身奉法而已豈能執途人而告之是以三秦百姓聞邪説者多而聞正論者少豈非世道人心之患哉朕又思之秦風朴直自古為然朴則易被人欺直則善言易入祗以向來未有宣諭化導之人而該省督撫以及有司既有刑名錢榖之專責又有徴兵籌餉之軍需簿書鞅掌難於兼顧是凖噶爾之始末邊防關係之情形皇考與朕奉天討罪除暴安民萬不得已之苦𠂻並未家喻而戶曉而但聼僉邪小人搖唇鼓舌訕謗朝政變亂是非無怪乎草野之中被其迷惑者不少也今朕特頒此旨遣左都御史史貽直侍郎杭奕祿署內務府總管鄭禪寶率領翰林院庶吉士及六部學習人員國子監肄業之選拔貢士等前往陜甘二省開導訓諭覺悟愚蒙從前雖將大義覺迷録通行頒布祗恐逺鄉僻壤之氓尚有未曽聆悉者著一併宣諭咸使聞之倘合省民人等果能篤尊君親上之義消亢戾怨懟之情將見和氣致祥福緣善慶必邀上天默祐迅奏膚功邊塞永寧烽煙永息不但爾等安居樂業俯仰優遊即爾等世世子孫共享升平之樂矣至於軍需各項悉動帑金差員辦理不得扣尅短少貽纍小民所降諭旨至再至三著欽差大臣悉心訪察倘有不遵諭旨者即行題參或所定官價有不敷用之處亦即據實奏聞若兵馬經過之地有不遵紀律騷擾民間者小過即告知該管大臣懲治大過即行題參不得姑容務使兵民和洽內外輯寧以迓天庥以副朕念特諭雍正九年七月初一日戶部奉上諭據陜西署督查郎阿等奏稱西鳯二府撥運甘肅等處米十五萬石二府民人領運之時惟恐逺涉長途或有虧耗每米一石多帶一二升以備添補之用途次安行並無虧折據收糧之員節次具報正米之外多交餘米或數十石或至數百石不等大約交足之時可得米千餘石將來一併收貯於邊儲軍糧大有禆益等語數年以來秦省民人運送軍需俱無遲誤是以朕屢次加恩以示優恤兹因挽輸西鳳米糧以資軍食特令加添腳價務期運送從容而領送之民人等敬謹承應於交完正米之外尚有餘米交官其急公敬事之念甚屬可嘉該署督等查明交米多寡之數分别賞賚務令本人實沾恩賜勿令胥吏中飽以副朕加惠秦民之至意特諭雍正九年十一月二十五日奉上諭陜西西鳳二府運米十五萬石前赴甘肅等處據巡撫武格等定議若領運民人之牲畜有在途疲乏倒斃者即令該地方官借給銀兩代雇牲畜運送前去仍於本運戶原籍追銀還項今聞軍糧十五萬石俱已全數運至甘肅等處交收惟是領運民人有因牲畜疲乏倒斃在平涼涼州甘州肅州所屬州縣借支銀兩者共計銀一萬八千七百餘兩目今催收止交過一百九十兩其餘尚未交還朕思陜西民人等領運軍糧既已如數運到未曽遲誤而所借雇覔牲畜之銀兩若不稍寬限期責令一時交納恐其中不無力量艱難者著諭知該督撫等此未完之借項一萬八千餘兩寬以一年之限以示朕軫念秦民至意特諭雍正十年二月初九日奉上諭自冬春以來京師未得雨雪朕與諸大臣等戒懼修省虔誠祈禱以冀仰格天心聞畿輔地方及河南山東雨雪亦少山西陜西二省雖有得雪之處亦未周遍朕心憂慮深恐二麥歉收小民艱於糊口已切諭該督撫等多方籌畫為思患預防之計從來天人感召之理捷如影響所賴該督撫等以恤民之心為格天之本果能使民困全除民氣舒暢自無有不能感召天和者至於清理刑獄亦祈求雨澤之要務除在京已命刑部法司清查案件速行歸結以免拖纍外其畿輔地方及河南山陜等省郡縣繁多有司賢否不一其中或有聼斷刻核濫及無辜者或有淹滯羈留塵案莫結者或有牽連待質致誤恆業者該督撫大吏等當悉心體察嚴飭屬員速為清理應釋放者釋放應取保者取保務期平允矜慎俾閭閻各安生業其他政令凡有稍不便於民者急思力為改圖總在各該督撫等體朕若保赤子之心各切痌瘝乃身之念至誠惻怛勤求民隱殫竭實心普行實政庶幾上天昭格早降甘霖勉之勉之特諭雍正十年五月初十日奉上諭秦省民風醇良質朴朕所素知苐因近年以來有一二匪類揑作浮言妄冀鼓動衆聼朕恐無知愚民一時不察被其迷惑是以特遣大臣官員等開誠布公宣諭化導盡消姦匪蠱惑之害益堅良民嚮善之心從前陜甘二省民人深知感戴國家教養之恩今復悉西陲不得已用兵之處聆受諭旨開悟踴躍衆志僉同朕心深為嘉悅但軍興日久轉粟飛芻不無資於民力其挽運之價朕已屢次加添近聞路徑僻逺之地尚有不敷又或採辦草豆等項時價低昂不等若如此則該督撫等不洞逹朕意矣向後著悉心體察有應行奏聞者即據實陳奏朕自加恩不使官民等有賠纍之苦著將此旨曉諭陜甘二省官民等共知之特諭雍正十年十月十六日奉上諭直𨽻河南等省驛馬有每年準報倒斃三成四成之例而陜甘兩省向因地僻差少不在準報之中今西路軍興羽書絡繹差遣繁多地方有司不無賠補之苦朕心軫念除偏僻州縣仍照舊例外其自潼關至西安一路自西安由秦鞏南路一帶由平涼北路一帶至蘭州又自蘭州由涼甘一帶至肅州嘉峪關又自蘭州由莊浪一帶至西寧又自榆林延綏寧夏沿邊一帶至涼州各路驛遞馬匹俱照直𨽻河南等省之例十分之內準報倒斃三分領銀買補作正開銷如有過三分之數者勒令賠補倘恃有恩旨或尅扣草料不加謹飼餵者著該道府查明詳揭該督撫即行題參其準報三分之數俟軍務告竣仍照舊例停止特諭雍正十二年八月初六日內閣奉上諭張正瑗王大士辦運妥協可嘉著交部議敘其領運之民人急公敬事著史貽直碩色查明交米多寡之數酌仿從前之例分别賞賚務令均沾實惠欽此雍正十二年十一月二十六日內閣抄出奉上諭今嵗春夏間陜西地方禾麥頗好及至仲秋聞有雨少之州縣如甘肅所屬則有階州靖逺環縣等處西安所屬則有臨潼渭南髙陵涇陽三原醴泉富平同州郃陽澄城韓城朝邑華州華隂蒲城潼關以及榆葭二府州所屬等處朕心深為軫念特諭該督撫速籌蠲免賑恤並轉運接濟之䇿務使貧民不至失所兹據劉於義許容奏稱階州及靖逺縣環縣本年錢糧及應徴舊欠已概行停徴俟明年夏收後再議徴收至乏食之民已按照成例計大小口借給口糧以今嵗十月起至明嵗四月為率統俟夏收後再行徴還或其他州縣有一村一堡被旱薄收者亦照階州等處之例辦理等語據史貽直碩色奏稱西安所屬州縣秋間雨澤愆期嗣于九月內大沛甘霖所種之麥滋潤暢茂明歲夏收可望現在糧價有減無增約計本地存貯榖石足以接濟明春之用無庸借資于豫省至本地錢糧百姓感戴皇仁且值連年豐稔已經完納十之八九亦無庸加恩蠲免惟從前借糶之倉糧應于秋後還倉者今西安同華榆葭等府州既有薄收之屬若再催還借糶之項誠恐市價增長民力維艱應請暫緩徴買統俟明秋還項則民力可舒等語劉於義史貽直等奏報地方情形已悉階州等三州縣乏食民人所借之口糧俱著賞給明年夏收時不必徴還所有本年未完之錢糧亦著蠲免明年不必補徴其應徴舊欠著概行停止仍令劉於義許容督率有司加意撫綏務令小民得所至西安同華榆葭等府州屬百姓所借之倉糧亦著賞給明年不必交還其糶出之榖著史貽直等酌量于明年何時買補還項特諭欽此陜西通志卷八十三
