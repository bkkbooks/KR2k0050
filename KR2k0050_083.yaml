body:
  text: 欽定四庫全書陜西通志巻八十三徳音第一周文治岐仁政先施漢髙約法三章允宜蠲租賜復䘏祲賑饑渙汗大號惠我嘉師粤稽曩代世法良規於維我朝恩浹秦黎損上益下如傷是咨洪河廣漢澤不逮斯作徳音志第三十國朝順治二年四月初十日諭陜西詔周𢎞大賚天下歸心漢約三章秦民咸恱流賊李自成弑君虐民多行悖逆神人共怒自速誅亡知朕誕膺天命撫定中華尚敢竊據秦川抗阻聲教朕憫其荼毒乆切痌瘝爰整貔貅窮捜巢穴豫王移南伐之衆直擣崤函英王秉西征之旄濟自綏徳莫不追奔逐北斬馘獲俘百二山河定於俄頃實頼我太祖太宗之純嘏藉爾二三大臣之弼成以致予眇躬克揚大烈緬惟全秦黎庶莫非嘉師向因羣盗縱横迄無寜宇頻年捍禦既竭脂膏一日染汙重遭湯火雖賊以此始必以此終要其受禍乆而痛痡深未有過於秦人者矣朕執言弔伐本爲除殘既受歸誠宜矜詿誤是用特施浩蕩咸與維新所有陜西地方合行恩例開列於後一自順治二年二月初一日昧爽以前陜西通省地方官吏軍民人等有犯無論大小已發覺未發覺已結正未結正併文武僞官等罪咸赦除之有以赦前事相訟告者即以其罪罪之一地方初定亟需撫輯綢繆應設督撫鎮將等官以資彈壓㑹城根本之地應留滿洲重臣重兵鎮守其延寜甘固四鎮實在兵馬應行文清覈以便裁定經制潼關商雒及楚蜀衝要地方應酌量置兵控扼著吏戸兵三部作速確議具奏一陜西通省地畆錢糧自順治二年正月爲始止徴正額凡加派遼餉新餉練餉召買等項悉行蠲免其大兵經過地方仍免見糧一半歸順地方不係大兵經過者三分免一西安等府州縣遭冦焚掠獨慘應聴撫按官察明順治二年錢糧應全免者全免應半徴者半徴一大兵初入陜西境内該地方文武官紳倡先慕義殺賊有功以城池歸順者該部通行察叙具奏定奪一該省地方前朝文武進士文武舉人仍聼該部覈用一該地方軍民年七十以上者許一丁侍養免其雜泛差徭八十以上者給與絹一疋綿一斤米一石肉十斤九十以上者倍之有徳行著聞爲鄉里所敬服者給與冠帶榮身一有司徴収錢糧止許正數不許分外侵漁秤頭火耗違者治以重罪一該省生員鄉試舉人㑹試俱照直𨽻各省事例一體遵行各學廩増附生員仍舊肄業俱照例優免其有被闖賊威逼曾受僞職者盡行赦宥生員歸學舉人準赴京㑹試一該省各府州縣衛學廩生准照恩例每學貢二名一歴代帝王陵寢在秦中者有司照例以時致祭及名臣賢士墳墓俱嚴禁奸民掘毁一凡訛言妖術煽惑平民聚衆燒香僞造符契擁集兵仗其傳頭㑹首怙惡不悛者自當嚴緝正法脅從人等果能改邪歸正解散力農前罪免究如執迷不悟被人告發者不赦一該省肅州地方嘉峪關外西域三十八國部落之長投誠歸順者撫按官察實具奏以便照例封賞一西番都指揮指揮宣慰招討等司萬戸千戸府所等官舊例應於洮河西寜等處各茶馬司通貿易者准照舊貿易原有官職者許至京朝見授職一切政治悉因其俗一各州縣土冦有乘機竊發賊首已經就擒脅從歸農復業及脅從擒其賊首赴所在官司連名自首者前罪并赦勿論一邉方兵馬投順仍願在伍効勞者各清查實在數目准與造冊酌用一地方初定有司未及銓除撫按當亟行察覈一切爲賊廹脅情出於不得已者無論有司及鄉紳舉貢不妨量才題委俟事平另行定奪但不得濫及匪人一陜中在今日撫䘏爲救民第一義撫按不得聼從有司濫准詞狀以戕害良民果有奸惡不法大者題請小者撫按拿問依律懲處一切紙贖折罰嚴行禁革務令州縣官一意課農仍於嵗終察其荒熟多寡以分殿最一越訴誣告屢經嚴禁該省人民初出湯火尤宜息訟務農凡户婚田産小事止就有司歸結人命刼盗重大事情方赴撫按告理倘奸棍訟師誘陷愚民入京越訴察出一併反坐於戲慰苖民於清問鰥寡有辭恢湯網而克寛雲霓在望式諧羣志於迓天休拯溺救焚非敢私於西土承流嚮化期共喻於多方布告臣民想宜知悉順治三年覆准延鎮所屬氷雹蝗蝻被災田畆免本年額賦之半順治五年覆准陜西水患蝗蟲氷雹相繼被災一等者蠲一年額賦二等者免一年之半三等免三分之一順治七年九月陜西督撫㑹題奉㫖恩准豁免西延鳯漢興等府州屬無著荒地一十二萬六千三百九十八頃六十四畆零逃亡丁五十九萬四千三十零順治八年十月陜西督撫㑹題奉㫖恩准豁免西延鳯漢興等府州屬荒地一萬四千七百四十八頃七十一畆零順治十一年詔順治六七兩年直省地丁本折錢糧拖欠在民者悉與豁免八月陜西延撫題免延安府屬續荒地二千三百四十七頃七十畆零續逃亡丁六千八百有零順治十二年覆准陜西地震全家被災者盡豁歴欠錢糧草束餘免本年地糧丁徭白河縣荒殘陜撫題准停緩地丁均徭銀米順治十三年詔順治八九兩年直省地丁本折錢糧拖欠在民者悉與豁免二月陜西督撫㑹疏題准豁免鳯翔府屬漏報荒地八百二十頃有零順治十五年四月陜撫題准豁免西安府屬續荒地一百八十六頃七十一畆零九月又具題興安州屬之平利縣續荒地七頃七十五畆零續絶丁一千七百有零俱准豁免順治十六年陜撫題免西安府屬之耀州續荒地七十五頃五十六畝零二月又奏免興安州水崩續荒地十一月延撫具題延屬之安塞縣續荒地二頃九十畝零並准豁免康熈元年延撫題免延安府屬之延長縣逃亡并洪水推漂人丁六千零康熈三年詔直省順治十五年以前拖欠各項銀米藥材紬絹布疋等項錢糧槩行豁免康熈四年詔順治十六十七十八等年各項拖欠錢糧俱令蠲除三月陜西督撫㑹題豁免西安府屬之邠州包賠地九百五十五頃零廵撫賈漢復又奏免韓城縣沿河津渡載運粟炭船税康熈八年正月陜西督撫㑹題豁免鳯翔府屬郿縣山水衝决地七十三頃七十四畝零五月又㑹題爲秦屬蠲免等事案内奉㫖豁免過興屯揑墾及新荒共地七千四百七十八頃四畝零西鳯漢興四屬均徭銀二千七百五十六兩零西延漢興四府州屬無影鬼名招來流寓囘籍及死絶殺傷丁一萬八千五百五十零又豁免棉花五百二十九斤及藍田竹枝鮮筍各折價康熈十年恩詔蠲免直省康熈四五六年舊欠地丁等項錢糧康熈十一年陜西廵撫阿席熈題准豁免民屯更名地内各細色租粒五千三百石零又免棉花九百四十五斤零折價康熈十四年靖逆侯張勇具詳酌時勢等事題請䝉恩准免康熈十四年分起存項下未徴銀三千九百六十二兩零又起存米四百五十四石零康熈十五年五月撫逺大將軍圖海具請賜寛免等事題請䝉恩蠲歴年拖欠并被陷失耕地土錢糧康熈十六年編審案内奉㫖豁免西延鳯三府殺傷人丁一千零康熈十九年陜西督撫㑹題豁免雒南縣永難耕墾地二百九頃零康熈二十年恩詔蠲免直省康熈七年起至十七年舊欠地丁等項錢糧康熈二十二年五月陜西督撫㑹題爲遵詔陳言等事案内奉㫖豁免延安府屬甘泉保安二縣包賠虚丁銀一千三百七十四兩零康熈二十二年十二月十七日諭戸部陜西西安甘肅等處前當大兵征勦之時轉輸糧糗辦運芻茭一應軍需取給閭里小民由陸路供億勞費繁多今旣經蕩平朕心時切軫念康熈二十三年應徴地丁各項錢糧著與蠲免三分之一以昭朕睠念民生勞苦之意又山西崞縣忻州定襄五臺代州振武衞新經地震被災頗重雖經遣官賑濟仍應量行加恩以昭軫恤其被壓身亡命人所有康熈二十三年應徴地丁錢糧著與全免其房舍倒壊力不能修者丁銀全免地畝錢糧著免十分之四爾部速行該地方官曉諭小民務俾各霑實惠如有司官役借端朦混私行重征者或經叅奏或被告𤼵將經管各官從重治罪爾部即遵諭行特諭康熈二十三年題准豁免漢興荒地八千三百八十三頃一十七畝零康熈二十六年十一月二十六日諭戸部朕惟自古帝王統御萬方乂安九有殫心懐保節愛攸先期於物力充裕爰以振業黎元俾膏澤旁流咸蒙美利朕自御極以來軫恤民依力圖休養惟理財爲裕國之大經蠲貸爲愛民之實政歴年敦崇節儉嚴核浮冐蓋欲爲布徳行惠之資頻年以來各省錢糧雖次第蠲免但江蘓所屬各郡縣爲財賦重地額征錢糧甲於他省且屢嵗輸將供億効力維勤兹用大沛恩膏除漕項錢糧外所有康熈二十七年應徴地丁各項錢糧俱著蠲免二十六年未完錢糧亦悉與豁除又陜西錢糧前雖已行蠲免但念該省人民用兵之際轉輸餽餉効力可念再宜加恩以𢎞樂利其康熈二十七年應徴地丁各項錢糧及二十六年未完錢糧亦著俱與蠲免爾部速行該地方官通行曉諭務使小民均沾實惠以副朕愛育蒼生至意如有不肖有司官吏借端蒙混及私行重徴者該督撫指名題叅從重治罪如該督撫狥𨼆不行糾舉或經叅奏或被告發定行一併從重治罪爾部即遵諭行特諭康熈三十一年十月初四日諭戸部陜西西安等處地方連嵗凶荒繼以疾疫因而閭閻失業漸致流離朕軫恤民艱焦勞宵旰自去嵗冬月以來頒發帑金蠲免正賦輓輸積榖轉運漕糧屢次特遣大臣察勘多方賑濟念國家所重惟在養民目今秦省雖薄有秋收但民間匱乏已極倘非格外加恩無以使積困盡甦轉徙盡復陜西廵撫所屬府州縣衞所康熈三十二年地丁銀米著通行免徴從前所有積欠未完錢糧亦著通行蠲豁務俾比屋同沾實惠小民咸慶更生用稱朕子愛元元撫育安全至意爾部即遵諭行特諭康熈三十一年十一月初九日諭刑部朕保乂黎元崇尚寛大毎於刑獄之事輒厪矜恤之懐秦省西安等處地方比嵗薦饑閭閻困苦業已多方賑恤屢諭蠲租尤宜大沛仁恩特加赦宥凡陜西廵撫所屬今年秋審情正緩决之犯内除十惡及軍機獲罪官員犯罪不赦外其餘自諭㫖到日通著免死照例減等發落有見在審擬未經結案者亦如之嗣後務令革心向善副朕法外生全至意爾部即遵諭行特諭康熈三十四年十二月十七日恩詔陜西省康熈三十三年以前歴年積欠及帶徴未完銀米俱著豁免康熈三十六年二月丁亥上統六師啟行庚戍上自保徳州渡黄河駐蹕府谷城辛亥上仍駐蹕府谷縣城南三月壬子朔駕駐蹕府谷縣城南癸丑駕至孤山堡西駐蹕甲寅上駐蹕卞家水口乙卯上駐蹕神木縣丙辰上渡屈野河駐蹕自榆林至横城口安設驛站理藩院奏曰駕次榆林由口外至寜夏應自榆林起設驛至横城口設此驛時以前次内路増驛預備之馬照鄉導官所分宿頭毎驛設馬三十匹筆帖式一員䝉古台吉一員章京一員披甲十名此坐驛筆帖式以現在隨行部院筆帖式充之駕至寜夏後即撤此驛將廵撫所備馬増置内驛中上准行丁巳駕次栢林堡西南戊午上駐蹕髙家堡南己未上駐蹕建安堡東庚申上駐蹕玉關澗辛酉駕次榆林壬戌上出邊康熈三十六年三月二十七日諭陜西四川總督呉赫朕廵幸沿邊地方詢察閭井生聚及田土沃壤之狀自晋歴秦經行二千餘里直抵寜夏所以勤求民隠至殷且切惟朔方資大河之灌注疏渠溉田宜於稼穡當兹春氣鬯遂正三農盡力南畝之時誠恐有司官員不體朕懐因車駕經臨調遣師旅借辭供億擾累小民既東作之有妨將西成之奚望今一切軍需芻糗俱經儲峙足以資用至扈從人員概行簡約所有馬匹悉牧放水草善地并不湏以供辦草豆動煩民力爾可傳飭有司禁勿借端妄行科派違者事覺定行處分仍徧諭地方百姓各安本業㕓無廢市隴無輟耕庶不負朕親歴邊圉軫念民依之至意特諭康熈三十六年閏三月初十日諭陜西總督提督廵撫總兵等官朕宵旰勤民慮周遐邇縁向來廵幸未經親歴邊境頃特濟河而西循秦省沿邊地方延覽風俗咨詢疾苦見所在兵民築土室以爲居耕沙磧以爲業生聚之計甚屬艱難朕惻然於衷軫念勿釋因思兵民倚頼全在將吏而將吏之表率惟督撫提鎮是視誠使督撫提鎮實正已澄源則所屬守職奉公禄足自贍必無朘削兵民之事倘或積習相仍濫受屬員私餽因而所屬官弁節次求索取償於下文官則加征無藝武弁則侵尅月餉勢不至於厲民剥兵不止如此而欲冀疾苦日蘓生聚日盛烏可得乎夫秦地俗尚素稱簡樸邊方士卒允屬精強總恃撫馭得人斯於兵民胥益朕兹駐蹕寜夏特召該省縂督縂兵以下官員凡在鎮城者俱賜宴内庭面加諄諭無非期望文武大吏董率屬員以仰副朝廷愛民恤兵至意自今以徃爾等其益體朕懐交相砥礪文職皆習知民事豈身作官吏不恤百姓之依武職多起自行伍豈甫爲將領遽忘軍士之苦上官克謹亷隅屬員恪遵法紀馴至比屋殷阜列戍飽騰則兵民皆得所爾等亦與有休寵以視厲民剥兵身名俱䘮者孰得孰失爾等其敬念之特諭康熈三十六年七月十九日恩詔朕君臨天下早夜孳孳勤求治理惟恐一夫不獲其所初未嘗有岐視中外輕事兵戎逺伐異域之事厄魯特噶爾丹向與七旂喀爾喀同奉職貢嗣因兩國交郄搆兵喀爾喀汗等爲所敗衂叩關内附噶爾丹乃借辭追擊闌入我邊境恣行狂逞朕屢頒勅諭令其悔罪自新而狡冦不知省悟益肆鴟張其逆謀叵測實有偪處近塞窺伺中原之漸朕思此冦包藏禍心倘不即行撲滅則異日必縁邊設防重滋民困何如及時聲討立靖根株於是昭告天地宗社躬統禁旅不憚勤勞三出塞外去年夏賊踞克魯倫河自度力不能抗倉皇宵遁朕親追至土喇河適西路大兵遮截其後擊敗之於昭木多賊勢大挫冬月復駐蹕鄂爾多斯收撫其降衆遏絶其外援而賊益困蹙機㑹所在刻不可失遂以今年春西廵邊境從寜夏出塞遣發大兵兩路進勦而西海烏思藏人等皆先後輸忱自効哈宻國人又俘獻噶爾丹之子於行在噶爾丹窮廹已極一聞六軍壓境計無復之隨於阿察阿穆塔台地方飲藥自盡揆諸料敵成謀適相符合自此㓂氛盡滌邊圉永安而朕爲民除害不得已而用兵之意亦可曉然共喻於天下臣民矣武功告成之㑹正太和殿鼎建工竣巍煥方新臨御伊始協氣集於九重觀瞻肅於萬國是用覃敷慶澤以上荅郊廟社稷之靈下愜中外人心之望所有事宜開列於後一大將軍領侍衞内大臣伯費揚古駐扎邊境綏輯䝉古固守地方征勦噶爾丹時所抒謀畧與朕意合遂畀以西路官兵令其統領進勦師行道路遼逺兼乏水草乃全無顧慮直抵土喇昭木多奮揚軍威俾奸狡積冦一鼓而大敗之屢年以來統兵諸將未有能過之者著從伯爵優陞爲一等公一西路官兵聞朕親至克魯倫河雖徒歩在道饑疲已極仍謂世受豢養之恩今聖駕躬親臨敵我等官兵若數應盡則甘斃道路倘命可少延誓圖竭力自効其奮勇若此故大功獲奏理宜誕沛殊恩自叅賛以下實授章京以上各給與一拖沙喇哈番襲替一次所有功牌著另行分别議條䕶軍校驍騎校俱各加一級即照加級食俸其兵丁加恩之處著議奏一西路進勦緑旗官兵自將軍提督總兵官以下兵丁以上應作何加恩者吏戸兵三部㑹同議奏一三次出征官員兵丁及西路進勦官員兵丁所借官庫銀兩未經賠償者俱免追取其未出征兵丁有將本身所養馬匹送至軍前倒斃者各賞銀二十兩一三次俱出征官員各加一級三次俱出征兵丁加恩之處著議奏一滿洲䝉古漢軍出征厄魯特於軍前陣亡者䕶軍給與七品官馬兵給與八品官一外官員缺近見漢軍選用者甚多正途出身之進士舉人不得選用殊屬壅滯嗣後應作何分缺銓授該部定例具奏一外藩四十九旗兵丁比年以來出征廵汛甚屬勞苦其中西兩路隨征押運米車牧馬安站掘井修路看守米糧兵丁在軍前未曽得賞者毎人毎年各賞銀六兩給與三年已經得賞者毎人每年各賞銀六兩給與二年其未出征兵丁除富戸外不堪度日者毎人各賞銀六兩給與一年一八旗効力行間年老辭職官員已得半俸外勞績茂著多有功牌未得半俸者及年尚未老傷廢辭職官員内勞績多著應得半俸者該都統詳查保送著該部題請一滿洲兵丁原係披甲効力行間有帶傷殘廢閒住及疾病年老閒住者著察例加恩賜一在京滿洲䝉古漢軍馬歩兵丁俱加恩賜一出征病故兵丁俱有恩䘏其出征病故閒㪚三品以下官員亦准概行恩䘏一年尚未老傷廢辭職官員及傷廢退甲兵丁酌給錢糧米石一外藩䝉古出征病故閒散三品以下官員亦准概行恩䘏一外藩䝉古有効力行間傷廢退甲者著加恩賜一五嶽四瀆等祀應遣官致祭者查舊例舉行一歴代帝王陵寢先師孔子闕里應遣官致祭著察例舉行一内外大小各官除各以現在品級已得封贈外凡陞級及改任者著照新銜封贈一康熈三十八年鄉試中式舉人大省加十名中省加七名小省加三名康熈三十九年㑹試中式進士三百名一各省正貢作恩貢次貢作嵗貢一國子監監生免坐監一個月一凡官吏兵民人等有犯除謀反叛逆子孫殺祖父母父母内亂妻妾殺夫告夫奴婢殺家長殺一家非死罪三人採生折割人謀殺故殺蠱毒壓魅毒藥殺人強盗妖言十惡等真正死罪不赦外及修造宫殿陵寢工程不固冐破錢糧製造戰船軍噐等項不堪用糜費錢糧軍機獲罪貪官衙役犯贜監守自盗冐借官庫銀兩拖欠錢糧漕糧侵盗漕糧騷擾驛逓奸細光棍誣告叛逆放火因姦致死人命罪犯亦在不赦别項死罪俱减一等此内有鬬毆殺人者仍照例追銀四十兩給付死者之家其餘自康熈三十六年七月十九日昧爽以前已發覺未發覺已結正未結正咸赦除之有以赦前事訐告者以其罪罪之一内外文武官員除大計軍政處分外現在議革議降議罰戴罪住俸等項各該衙門悉與奏明寛宥一凡流徙人犯在流徙處所身死其妻子有願攜骸骨囬籍者該地方官報明該部准其各囘原籍一各處賊盗或為飢寒所累或為貪官所廹實有可憫如能改過就撫者准赦其罪一天下驛逓苦累凡乗傳員役騷擾驛逓者著該督撫立行叅奏如有容隠一并治罪一罰贖積榖原以備賑冬月嚴寒恐鰥寡孤獨貧民無以爲生著直𨽻各省督撫責令有司官將積榖酌量賑濟毋令奸民假冐支領一地方有才品優長山林隠逸之士著該督撫核實具奏酌與録用一除革職降級休致囘籍外地方人才果有才行著聞及學問優長者著該督撫核實具奏一督撫題補各官原從地方需才起見或受任之後有行事乖張貪縱虐民者該督撫不時體訪據實叅奏勿得以曽經保舉曕顧偏徇如故違隠庇别經發覺將該督撫一併從重治罪一各處闗差如有將不應納税之物額外横徴差役四出分踞津隘擾害商民者該督撫題叅若不行題叅事情發覺一併從重治罪一督撫係封疆大吏地方利弊聞見必真凡關係籌餉節用禆益兵民事宜如有確見著據實條奏果屬可行著有成效即從優擢用一河道漕運關係重大所關河漕一應情罪俱不赦免一地方災傷已經查勘蠲免賦役者有司不遵仍行濫派及但免有力之家致窮民不沾實惠者事發決不饒恕一各地方有豪紳劣衿衙胥積蠧或免本身田地差徭或包攬他人田地徭丁代爲規避偏累窮民莫此爲甚該督撫行各地方官秉公嚴察如有此等情弊重加懲處一凡有叛逆殺死人強盗等罪牽連對質候審監禁人犯在獄年久恐無辜致死該部院直省督撫確審無慿質對情可矜疑者即行奏請釋放於戲懋武功而敷文徳聿臻熈皥之風建宸極而鞏皇圖永慶平成之治誕告中外咸使聞知康熈四十二年三月十八日恩詔賞給軍民耆老粟帛有差康熈四十二年十月初五日諭吏兵戸三部朕統御寰區勤求治理鑾輿時邁省方觀民春月閲視河工自畿輔山東以及江浙地方皆經廵幸兹兩河漸已底績所至之地民生風俗亦因以周知念陜西省爲巖疆重地當出師塞外時曽經歴其邊境而西安一路未及親蒞頃陜西督撫諸臣言秦民望幸之心至殷且切具請乗此冬令農隙之際觀覽民風詢察吏治簡閲禁旅整飭軍容實爲要務用是輕裝約從諏吉而廵沿途一切供御皆内庭儲備纎毫不取辦於地方即偶有市易之物亦勅所司依時價給值不許錙銖抑勒所過大小官吏宜體恤朕愛民徳意勿借詞供億私派閭閻如有悖㫖科斂者察出即以軍法從事其扈從人員宜約束僕役勿使妄行如不遵法紀生事擾民一併從重治罪朕視民如子凡乘輿所至市㕓隴畆宜各安生理米豆薪芻等物民間照常貿易不必禁止惟懐私挾詐衝突告訐者所告事不與准理仍嚴加治罪爾等即傳諭扈從官員人等並行各督撫令於經過府州縣城市邨莊徧示曉諭俾咸悉朕懐特諭康熈四十二年十一月十七日諭川陜總督華顯陜西廵撫鄂海甘肅廵撫齊世武朕撫有區夏思臻上理期於舉世乂安宵旰勤勞未嘗少釋而秦省爲天下要地時厪朕懐曩者連嵗荒旱所司未經奏報朕訪聞得實即多方籌畫運米拯救一由襄陽運至商州一命河臣由黄河運至潼關一由湖灘河朔運至渭河一由甘肅運至西安分行賑濟蠲賦已責安集流離秦民始得少蘓自康熈三十二年遣皇長子致祭華山以來雨暘時若年榖豐登閭閻微有起色但秦省關係最重且不通水運撫綏尤宜加意故不憚隆冬䟦履風霜逺臨兹土見百姓歡迎載道且知今嵗有秋地方文武官吏能恪勤奉職滿漢軍士亦皆訓練有方朕心甚慰凡廵幸所至必大沛恩膏今將陜西廵撫及甘肅廵撫所屬地方康熈四十二年以前各項積欠銀米草豆錢糧盡行蠲免俟四十三年直𨽻各省咸獲豐稔當將秦省四十四年正供亦行免徴該督即通行曉諭俾窮鄉僻壌小民均沾實惠倘有不肖有司希圖侵蝕以致澤不下䆒該督撫嚴加訪察據實指叅以副朕愛養黎元之至意爾等即遵行特諭康熈四十四年題豁漢中府褒城縣衝崩折正地四頃零康熈四十五年十月陜撫鄂海疏稱漢中屬南鄭等五縣水冲民屯地共九十七頃七十四畝該糧七十九石六斗六升六合零該銀六百九十一兩九錢九分二釐委係沖塌河底并沙壓無存糧無所出應請永爲豁免部議應將本年應徴糧銀准其豁免該撫等所稱永爲豁免之處毋庸議十一月二十日奉㫖今嵗漢江水大南鄭等縣城垣田舍被水衝没且米價騰貴小民艱食所有本年應徴錢糧著豁免明年以後地丁錢糧亦著暫行停徴俟應徴收之年著該督撫查明具奏起科現在被災人民該督撫速行賑濟欽此康熈四十九年閏七月兵部題覆肅州鎮條奏兵丁入塲另請廣額一疏部議不准奉㫖陜西多才勇之人今兵丁又准考如舉人額少則人才必致遺漏壅塞著將武舉額數於原額外増二十名欽此康熈五十年十月初三日諭戸部朕誕膺大統撫育寰區夙夜孜孜不自暇逸凡以爲民也勤圖利濟休養安全即無水旱之虞時布寛仁之政蠲租除賦務使遐方率土無不均沾或值雨暘偶愆出帑發粟多方賑䘏其有益於吾民者靡弗備舉而急行之朕慇懃周詳之至意前四十九年所頒諭㫖申晰甚明原欲將五十年天下錢糧通行蠲免以諸臣集議恐需用兵餉撥解之際兵民驛逓益致煩苦故自五十年爲始三年之内全免一週除將直𨽻奉天等九直省康熈五十年地丁錢糧一概蠲免及歴年舊欠錢糧一併免徴外山西河南陜西甘肅湖南湖北各撫屬除漕項外五十一年應徴地畝銀共八百四十萬四千兩有竒人丁共銀一百二十萬八千一百兩有竒著察明全免並歴年舊欠共銀五十四萬一千三百兩有竒亦俱著免徴其五十二年應蠲省分至期候㫖行民間舊欠既經豁免嗣後毎年額徴錢糧務如數全完倘完不及額或有虧空託稱民欠即責令督撫以下官員償補仍從重治罪該督撫湏實心力行期副朕惓惓愛民之意如有指稱事故侵欺科派事發之日必嚴行究治諭㫖到日徧示城郭鄉村深山窮谷咸使知悉爾部即遵諭行欽此康熈五十二年三月十八日恩詔賞給老人絹棉肉有差康熈五十五年十月初七日諭户部朕統一寰宇無分中外皆欲久安長治共樂昇平宵旰孜孜五十餘年未嘗頃刻去懐也澤旺阿喇布坦前曾頻行請安遣使來往近忽狂悖侵擾哈宻哈宻係我編置佐領之部落與内地無異若不遣發師旅置之不問㫁乎不可故特徴兵備邊一切飛芻輓粟悉支正供毫無累及閭閻然而行軍置驛及諸凡輓運皆由邊境今嵗山西陜西二省雖屬豐收喜登大有猶念邊民効力轉輸無悮急公固其常分而民勞亦所堪恤若非格外施恩何以昭示鼓舞兹特大沛恩澤加意培養着將沿邊一帶運糧地方自山西大同府屬前衛右衛大同懐仁馬邑朔州保徳等七州縣衞直至陜西延安府屬府谷神木安塞綏德米脂安定吳堡保安榆林保寜常樂雙山魚河歸徳嚮水波羅懐逺威武清平甘肅屬山丹髙臺古浪莊浪西寜肅鎮寜夏左屯中屯平羅中衛靈寜平凉固原鎮戎西安慶陽阜城甜水河州歸徳蘭州洮州等四十二州縣衞所堡康熈五十六年額徴銀八萬六千一百零糧米豆榖三十一萬七千七百二十五石零草二百七十六萬五千九百束零通行蠲免併將從前積年逋欠銀糧草豆亦悉與蠲除諭㫖到日該督撫即遍行張示使遐陬僻壌莫不周知仍嚴飭所司實心奉行以副朕加厚邊民至意其或陽奉隂違澤不下究該督撫題叅從重治罪爾部即遵諭行特諭欽此康熈五十六年十一月二十六日諭戸部朕撫馭寰宇五十餘年夜寐夙興爲小民勤求生遂凡率土逺近皆期共享樂利聿成家給人足之休未嘗一日不厪諸懐也數十年以來各省正賦屢經全免歴年積欠亦已蠲徴偶有雨澤愆期或發倉廩散給或截漕糧賑救不惜數萬萬金錢米榖頻沛恩施誠念窮檐之艱慮其至於顛連失所耳近者民力雖已稍舒然念分年帶徴銀兩若不格外優寛則小民一嵗所獲分納二年之賦以其贏餘養贍室家㫁難充足朕毎懐及此軫惻良深宜更加殊恩通行豁免今將直𨽻安徽江蘓浙江江西湖廣西安甘肅等八處帶徴地丁屯衛銀二百三十九萬八千三百八十兩有竒概免徴收其漕項雖例不准免亦著破格施恩將安徽江蘇所屬帶徴漕項銀四十九萬五千一百九十餘兩米麥豆一十四萬六千六百一十餘石内免徴各半爾部即行文該督撫嚴飭所屬實心奉行遍加曉諭俾民間無徴催之累均沾實惠用稱朕撫䘏羣黎至意倘有不肖有司借端朦混私行徴收者該督撫嚴察叅處如該督撫失察一併從重處分爾部即遵諭行特諭康熈五十八年十二月二十三日諭戸部朕惟治天下之要首以乂安民生爲急故自御極以來於閭閻疾苦無不博諮廣詢渙敷庥澤其有動用民力之處尤孜孜厪念刻不能忘盖六十年如一日也比年因澤旺阿喇布坦狂逞跳梁軍興征繕逺歴邊陲其沿邊數處師旅屯駐一切雖皆支用正項錢糧而協辦轉輸行賫居送之事民力勞瘁朕心時切軫念曽將陜西甘肅廵撫所屬康熈五十八年額徴地丁銀一百八十八萬兩零歴年舊欠銀四萬兩零特沛恩綸悉行蠲免而沿邊各州縣衞所軍興既多飛輓之勞辦賦復滋催科之擾若非格外加恩黎民恐致失業所有沿邊一帶陜西延安府屬府谷神木安塞綏徳米脂安定吳堡保安榆林保寧常樂雙山魚河歸徳響水波羅懐逺威武清平葭州龍州鎮靖鎮羅寧塞靖邊桞樹澗安邊磚井定邊饒陽水堡髙家堡甘肅屬山丹髙臺古浪莊浪西寧肅鎮寧夏左屯中屯平羅中衞靈州寧州平凉衞固原州鎮戎西安阜城甜水河州歸德蘭州洮州寧夏前衞平凉縣固原衞固原㕔河州衞蘭州㕔慶陽凉州衞永昌衞鎮番衞甘州左衞甘州右衞肅州衞鎮彛所等六十八州縣衞所堡康熈五十九年錢糧米豆草束俱宜蠲免但目今係有軍務之時除米豆草束外將康熈五十九年額徴銀九萬八千一百兩零盡行蠲免爾部移文該督撫通行曉諭實心奉行務俾均沾德惠以副朕曲軫邊民之至意倘或借端徴派澤不下究該督撫嚴察指叅從重治罪爾部即遵諭行特諭康熈五十九年十月十五日奉㫖朕臨御以來凡事惟以實心行實政務俾羣黎均沾實惠爲要從不諱災傷崇尚虚文今嵗江南浙江湖廣等省大稔豫省微覺歉收朕已頒諭㫖將運京漕糧停其輸運著於彼處收貯但陜西地方現有軍務今嵗糧榖適又歉收朕預頒諭㫖著總漕施世綸將運米路徑勘視具奏協同總督鄂海辦事除陜西歴年錢糧屢經蠲免明嵗錢糧另頒諭㫖蠲免外今雖動支常平倉糧榖散給而地方官大半俱在軍前現今所有俱係署事官員辦事人員殊少應照曩年差官賑濟山東百姓遣往賑濟著九卿詹事科道㑹議具奏欽此欽遵該九卿等㑹議得山東賑濟饑民自泰安至郯城濟南至登州德州至兖州東昌濟寧分爲三路差大臣三員又三佐領下公派官一員毎佐領借户部庫銀三千兩帶去散賑再官民情願効力者即行發往不論銀米與地方官分界散賑事成回日酌量所賑議叙在案今陜西甘肅地方不通水路此賑濟應將西安府一路延安府一路蘭州一路作為三路差大臣三員令派出大臣毎路揀選各部院滿漢賢能司官各四員動戸部庫銀五十萬兩蘭州二十萬兩延安府十五萬兩西安府十五萬兩由驛逓運送散賑地方㑹同督撫等率領地方官將現今陜屬州縣衞所㕔常平倉存貯糧六十九萬二千石零甘屬州縣衞所㕔常平倉存貯糧六十七萬二千石零之内酌量就近動用自散賑之日起以至麥收之日大口每日米三合小口毎日米二合務使百姓各得其所毋致流離再無論旂民有情願効力人員自備銀米散賑者俟事竣交與九卿從優議叙再查施世綸具題碾米一十萬石運送西安奉㫖截留六十年漕米二十三萬三千三百八十八石但西安地方甚爲𦂳要米石不得不爲多貯除現今施世綸具題運送米十萬石外將截留六十年漕米内撥十萬石交與河南廵撫照施世綸所題運米之例運至西安存貯備用其派大臣之處俟命下之日將滿漢堂官職名開列具題等因於十月二十三日題本月二十五日奉㫖這事情所議甚好不必差遣堂官著派出司官將銀兩交與施世綸總管公同賑濟餘依議欽此康熈五十九年十月十七日諭戸部朕自御極以來無日不以民生為念凡閭閻疾苦必詳加諮訪至於他方偶遇災傷一有所聞即行蠲賑撫恤備至務期黎庶安生樂業優游化日六十年來夙夜孜孜未嘗少釋也邇年因西陲用兵師行糧從雖芻粟悉支正供絲毫不擾民間然轉輸必需民力勞苦宜恤曽將康熈五十八年陜西甘肅所屬額徴地丁銀一百八十八萬零歴年舊欠銀四萬兩零康熈五十九年沿邊各州縣衞所額徴銀九萬八千一百兩零浹沛恩綸屢行蠲免近聞二年歉收民有艱於粒食者辦賦急公力何能支若非渙敷德澤無以培養窮氓是宜特頒浩蕩之恩用申勤求民瘼之念著將陜西廵撫甘肅廵撫所屬通省各州縣衞所除應徴米豆草束外康熈六十年應徴地丁銀一百八十八萬三千七百四十兩零通行蠲免爾部速行文該督撫徧行曉諭實心奉行務必均沾實惠如有不肖官吏陽奉陰違澤不下䆒者該督撫嚴察題叅從重治罪又署撫花闕奏稱甘肅地方數年歉收糧草價值騰貴兵丁採買維艱且兵丁効力行間勞瘁堪憫尤當軫恤准預給半年餉銀著即行文附近省分撥銀三十萬兩速解甘撫頒發以副朕篤念民勞優恤軍士至意爾部即遵諭行特諭雍正元年三月二十二日諭户部陜省自軍興以來大兵駐扎運送糧餉供支草豆無一不需民力原非他省可比皇考毎為軫念今當大沛恩膏以子惠元元所有康熈六十年以前陜西全省除借給籽種著該督撫查明定議分年帶徴外其餘凡有民屯衞所實在未完銀米豆草悉予蠲免倘有不肖官吏以虧空揑稱民欠濫邀曠典者一經發覺罪在不赦該部作速行文毋得遲留特諭雍正元年六月十三日諭户部兵部朕惟治安天下欲兵民並得其所必以敷恩减賦爲要比年以來䇿妄阿喇布坦狂逞逆命苦師致討四川陜西進藏官兵歴經險道往返萬有餘里甚屬勞乏朕深憫念其倒斃䭾載馬匹價銀及口外沿途與西藏留駐兵丁續補䭾馬價銀著悉免追賠又西陲軍興以來民間急公趨事供應差役實厪朕懐聞陜西甘肅二屬各州縣衞所地丁銀兩毎錢額外徴收三釐米毎斗額外徴收三合以爲備荒之用此項徒有加賦之名而無賑濟之實著自雍正元年始將額外徴收銀米永行停止如有舊欠亦悉予蠲除爾部即速行文該督撫遵諭奉行務俾均沾實惠以副朕篤念兵民至意特諭雍正元年九月川陜總督年羮堯疏稱長武縣西鄉縣於康熈二十三年前令史佐揑報開墾起科銀一千三百兩䆒無承墾之戸可以追徴仰懇皇仁准予豁免部議長武西鄉二縣額徴錢糧俱係全書開載自康熈二十三年間開墾徴收三十餘年並無揑報之説事關錢糧不便遽准應將該督所請之處毋庸議十月二十二日奉㫖長武西鄉二縣浮額錢糧屢年徴收甚累百姓著照該督所請准予豁免欽此雍正二年五月初二日上諭陜西人材壯健強勇者多騎射嫻熟盛於他省毎科取中不過三十名而入學額數亦與他省不相上下額少人多不無屈抑自雍正四年鄉試爲始西安甘肅武舉各加中十名其武童入學額數若通省俱加恐有冐濫照文童改學例令督撫㑹同學臣查明技勇最優之州縣酌量數目奏請加額特諭雍正二年十月二十九日奉上諭川陜進藏出口一應用兵之處倒斃騎䭾馬匹著悉免賠補雍正三年九月十五日奉上諭前年羮堯查拿陜西郃陽縣私鹽用兵一案初據年羮堯奏稱並未傷損一人及朕留心察訪知有損傷居民之事續據黄焜寄與范時㨗禀帖亦止稱傷損十數人朕軫念黎元惟恐官吏朦蔽使民困不能盡逹用是再加訪問知所傷之人甚多因特遣奏事石麟前徃平陽府傳諭審事侍郎史貽直髙其佩令其用心查訪作何設法開導務使小民無所瞻顧具呈控告勿似黄焜從前用威恐嚇使小民不敢申訴實情今據史貽直髙其佩奏稱遵㫖用心查訪親身至彼曉諭開導查出實在因年羮堯用兵致死無辜之男婦老㓜共七百八十六名口連前報出之十九名共傷損人民八百零五名口俱取有鄉保甘結該縣冊結鑿鑿可據又奏稱年羮堯因查拿鹽梟曹猪頭而該縣將良善之馮猪頭頂名解送年羹堯並不覆審即將馮猪頭正法等語朕聞之驚駭戰慄不勝愧恨之至朕以愛養百姓為心惟恐一夫不獲其所宵衣旰食時厪於懐乃年羮堯負朕委任之恩逞其兇殘之性草菅民命毒害無辜以致多人受其慘酷皆由朕任用匪人之故深自愧憾實無以謝郃陽之紳衿黎庶郃陽地方既被騷擾著該督撫等加意撫綏其被害之家雖經欽差官員賞給銀兩著該督撫等再行優恤雍正四年郃陽縣應徴錢糧盡予豁免該督撫等可遍行曉諭合邑紳衿黎庶伊等遭年羮堯之殘害幸朕留心察訪研䆒實情使伊等沉寃得雪今特沛恩膏以示軫恤務令僻壤荒村咸知朕意特諭雍正三年十二月二十五日奉上諭陜西西安地方𦂳要又有滿洲駐防兵丁省倉米石應當多貯查西安現在所貯米石為數無多今嵗秦省收成豐稔著總督岳鍾琪廵撫圖理琛就近商酌動用庫銀採買米石存貯省倉以爲備用其米數多寡該督撫酌定奏聞務湏陸續採買勿令價值騰貴倘倉厫不足亦令該督撫酌議收貯之法大凡積貯米榖於地方甚有禆益而有司徃徃躭延瞻顧不肯實心奉行該督撫等宜仰體朕心毋蹈此習雍正四年十一月初四日奉上諭西安官員兵丁在巴里坤軍前年乆甚是勞苦効力著行文總督岳鍾琪賞給副都統常壽一年俸同常壽撤囬官員毎員半年俸兵丁毎人銀十兩再去年自巴里坤撤囘西安官員兵丁官員毎員賞給一季俸兵丁毎人銀六兩雍正五年二月十六日奉上諭朕聞得陜西鄭渠白渠龍洞向來引涇河之水溉田甚廣因歴年既乆疏濬失宜龍洞與鄭白渠漸致淤塞堤堰大半坍圮醴泉涇陽等縣水田僅存其名深爲可惜朕特令該督岳鍾琪詳酌興修今據該督親勘奏稱龍洞急宜挑挖鄭白渠務當疏濬更湏修築堤堰建設閘口以俾堅乆已於西安布政司庫貯公用羡餘銀先動一千兩委員將龍洞鄭白渠及時挑濬其建閘工料約估銀七千兩請亦於司庫存貯羡餘銀内動用等語朕惟興修堤堰乃於民生大有禆益之事著動用正項錢糧俟一切功程告竣造報工部查核務期渠道深通堤堰堅固俾農田得以永頼以副朕保惠元元之至意雍正六年四月初五日奉上諭據岳鍾琪摺奏前因陜甘兩省丁銀偏累援照各省以糧載丁之例題請將丁銀於全省地糧之内通計均攤已奉㫖允行在案惟是各屬冊籍繁多未能一時核定而該年錢糧已准部咨撥充兵餉若俟攤定之日始行開徴未免遲悮是以各州縣仍照舊額徴收伏查以糧載丁則各屬錢糧較之舊額勢必有増有减今應减丁銀之朝邑等二十一州縣於未及攤定之先照原額徴收共長解銀六千七百九十二兩此項丁銀若命各州縣領囘按戸退還則糧戸畸零難於分折散給必致胥役中飽小民不沾實惠况百姓既沐鴻恩將偏重丁糧均攤完納永無苦累即此項銀兩亦係從前應徴之項但以均載之年攤撥未定暫假原額完納一年並非重徴可比應請存貯司庫以充兵餉等語此項銀兩於攤撥未定之先民間既已照舊完納該督奏稱今若按戸退還難於散給必滋胥吏中飽之弊著照該督所請停其按戸退還但此項銀兩既係陜西輸納之物著留貯陜省於地方公事如積貯興修之𩔖有禆益於民間者該督撫酌量奏聞動支應用不必撥充兵餉雍正七年二月初二日奉上諭陜省兵丁年來効力甚多朕深為軫念伊等出征之時若因已給行糧遂扣其坐糧則伊等妻子在家難以養贍嗣後出征之兵丁等於照例支給行糧外仍給與坐糧銀米以為養贍家口之資俾免内顧之慮再陜西營伍甚屬𦂳要若兵丁有派出之處著縂督岳鍾琪酌量召募充補另行按名給與錢糧雍正七年六月十二日奉上諭朕愛養黎元遐邇一體而邊逺之地小民家計不及近省尤朕心之所繫念數年以來甘肅四川雲南貴州廣西五省有用兵西藏及勦撫苖蠻等事其一應軍需皆動用公帑備辦秋毫不派及於民間而糧餉轉輸亦有資於民力今藏地苖疆俱已寜謐朕心嘉慰特沛恩膏著將庚戍年甘肅額徴地丁銀二十七萬七千六百八十四兩零四川額徴地丁銀三十一萬六千三百兩零雲南額徴地丁銀一十四萬一千六百兩零貴州額徴地丁銀七萬四千二百兩零廣西額徴地丁銀三十五萬三千九百兩零悉行蠲免其西安各屬地方近日亦有預備軍需之事朕心軫念著將庚戍年額徴錢糧蠲免十分之三共計銀四十七萬九千九百兩零此六省督撫大吏宜仰體朕心轉飭所屬有司敬謹奉行務使閭閻均沾實惠如有奉行不力被不肖有司暗飽私囊或被奸胥土棍強紳劣衿包攬侵蝕者朕若訪聞必將通省大小官員分别從重治罪至於國家設官本以理民官有恤下之責民有奉上之義若設官而不為計及養亷之資則有司之賢者將窘廹而莫能支不肖者又將横取而無所檢束矣是以酌定以錢糧耗資均給各官養亷之資此揆情度理上下相安之道但思加恩百姓豁免正賦若將耗羡一併蠲除是民雖邀額外之恩而官員轉有拮据之苦上司或因此稍有寛假則必致巧取苛索於民流弊種種轉多於耗羡之數於吏治民生均無裨益嘗見庸劣之地方官毎以蠲免錢糧為不便於己心懐悵怏即此意也著於庚戍年為始凡遇特恩蠲免錢糧者其耗羡仍舊輸納諒必民所樂從若因水旱蠲免者不得徴收耗羡將此永著為例雍正七年六月二十六日奉上諭據陜西總督岳鍾琪奏稱前奉恩諭陜屬設立社倉一事於雍正四五兩年司庫耗羡銀内發各州縣十四萬五千八百餘兩共採買榖麥三十九萬八千七百五十五石零計州縣小者二三千石大者七八千石儘足設立社倉毎年借放之本尚存銀八萬八千七百餘兩分發各處蓋造社倉約以京斗一千石為一社毎社倉一所不拘房屋間數總以足貯二千京石為率請勅下署督臣查郎阿撫臣武格於各州縣四鄉分社建倉令同社各村堡之老民公舉倉正倉副經管本社倉糧合計陜屬州縣約買糧四十萬石共應建社倉四百餘處務於今嵗秋冬辦造齊全將糧石分貯惟是地方督撫州縣作何奉行則爲利爲病之分途耑以在官在民為大要今陜省大僚皆不知臣原奉恩諭之由但見從司庫發銀既存兢懼之念又見積貯虧空處分之嚴例毎遇州縣請領社倉銀兩撫藩過於慎重誡諭甚嚴州縣亦懐貽累之憂將所領銀兩不肯交與倉正倉副仍勒令里甲採運又有令胥役家人幕賔收放者始而勒買既而勒借陜省百姓竟呼此項榖麥為皇糧不知立社倉之恩意臣以設立社倉聼從民便之語再四曉告諄切叮嚀不遺餘力無如大小官員謂臣言茫無慿據嘖嘖訾議其所以然者祗以因民所利之明詔未頒是以在官在民之界限不定伏乞特頒社倉諭㫖交督撫恭録鐫石毎一社倉頒發一本張掛曉諭臣又謹擬社倉條約亦請發各社倉刋刻木榜竪立倉門使鄉里愚民人人共曉則毎年收放皆有程式庶可乆而弗替等語朕惟國家建立社倉原令民間自行積貯以百姓之資糧濟百姓之緩急其春貸秋償及滋生羡息各社自為經管登記地方有司但有稽查之責不得侵其出納之權此社倉之古法也是以各省有請立社倉者朕皆令其聼從民便毋得強勒捐輸繩以官法以致便民之舉轉為民累所以曉諭各省督撫者不啻至再至三矣從前岳鍾琪在京時請於通省加二火耗内應行裁减毎兩五分之數且暫行徴收發與民間採買榖石分貯社倉俟採買數足即行裁减是於暫收耗羡之中隠寓勸輸之法實則應行酌减之耗羡即小民切己之資財而代民買貯之倉糧即小民自捐之積貯此藏富於民之良法最為切實而易行是以俞允所請令其辦理乃陜省官員不知此項榖石本係民資又未識從前岳鍾琪奏請之由以爲收貯在官即是公物不肯付民經管而胥吏司其出納者遂有勒買勒借之弊殊非數年以來朕之周咨詳畫多方生養斯民之本意矣今特降諭㫖將朕允從岳鍾琪之請並岳鍾琪陳奏原委明白曉示著署督查郎阿廵撫武格刋石頒布俾各州縣鄉社小民咸知朝廷經營設法之蓋藏實百姓自為歛散之資用倘地方官有於社倉榖石創議交官不交百姓或指稱原係公項預爲公事侵那之地者俱以擾撓國政貽悞民生論從重治罪其岳鍾琪所擬社倉條約著戸部抄録交與該督撫分發各州縣刋刻木榜於各鄉社倉竪立以為永乆程式特諭雍正七年七月二十八日奉上諭陜西興安州於康熈四十五年河水泛漲冲塌城垣房屋漂没各案倉糧共六千四百四十餘石曽經鄂海以此項糧石皆兵民積蓄之需不便虧缺題請令官紳士庶不拘多寡量力捐輸在案但自題請捐補以來聞止捐過糧榖七百餘石尚虧欠五千六百餘石未曽補足朕思當日公捐之舉本係聽従民便今事歴多年著將官紳士庶捐補之舉曉諭停止其興安州應補糧石或照陜省現動五分耗羡採買糧石存貯社倉之例令該督撫酌量辦理具奏雍正七年八月十一日奉上諭自古帝王之治天下設官分職不得其人則庶政莫由振舉而理財不得其道則國用不足雖欲减賦蠲租沛膏澤於萬姓其勢有所不能此自然之理也數年以來怡親王大臣等辦理戸部事務敬慎公忠風清弊絶阜民裕國府庫充盈國家經費既敷則蠲除惟正之供施恩常格之外使羣黎百姓俯仰有餘乃朕寤寐之至願也昨山東署撫奏稱今嵗東省秋成大稔父老皆言二十餘年以來所僅見朕思上年命田文鏡總督山東而今年地方禾稼遂登大有又如岳鍾琪總督陜省平日駐劄西安則西安比歲豐收今夏領兵前徃甘肅則甘肅收成大熟而西安六七月間便覺苦旱又如鄂爾泰之在雲南連嵗滇省地方雨暘時若今夏廵歴貴州甫離滇境而雲南府屬之晋寜宜良等處即有暴雨潰堤低田被水之事又如李衞之在浙江屢年四境豊樂今嵗李衞暫離浙省而衢屬江山縣峽口谷即有起蛟發水淹没禾麥之災觀此數事益見賢督撫之感召天和㨗於影響則凡為督撫者宜何如之敬謹居心公忠奉職以不愧屋漏之誠爲感格上天之本耶聞今年秦省西安一帶夏月甚旱而地方文武大臣官員㒺知修省此則封疆大臣之所當切戒者朕非䣃責於臣工而屢頒此等諭㫖也盖朕實有見於天人感應之理纎毫不爽而夙夜敬謹乾惕覺鑒觀之有赫而呼吸之可通倘朕心有一刻之懈弛而徒以訓誡之詞責諸臣下其又何以對越天地神明乎又據廣東督撫布按等奏稱今年粤東雨澤均調百榖順成合計通省米價貴者不過八錢幾分賤者至於五六錢實粤省從來希有之事朕聞之深爲慰悦此皆該省人民等革薄從忠醇厚良善之心仰感上天垂祐而錫以豐穰之所致也著將山東廣東二省庚戍年地丁錢糧各免四十萬兩以奬地方官民之善直𨽻陜西今年已各蠲銀四十萬兩庚戍年著再各免地丁錢糧四十萬兩山西通省連嵗皆獲豐收著免庚戍年地丁銀四十萬兩安徽等屬亦著免庚戍年地丁銀四十萬兩此六省共蠲免額徴銀二百四十萬兩乃朕加惠閭閻之特恩該督撫等應轉飭有司仰體朕心敬謹奉行務使小民均沾實惠倘不肖官吏及紳士土豪等有侵蝕包攬等弊一經發覺定行重治其罪並將失察之督撫上司等官嚴加議處特諭雍正七年十二月初八日奉上諭康熈五十九年陜省解送駝馬進藏文武官五十員毎員借支肅州公庫銀五百兩為行裝路費之資本係應給之項因當時該督撫未經題報不敢作正項開銷是以各員囘陜之時仍於各名下著追補項至今尚有未完銀一萬六千八百兩朕念伊等効力戎行逺渉藏地雖非衝鋒破敵者比而間關行役亦屬可憫著將未完銀兩槩行豁免其已完者悉給還本員或交伊之的屬如該員有别項虧欠應追者即准其抵補以示優恤勞役之至意雍正八年十月十七日奉上諭辦理軍需必得熟練之員方為有益陜甘二省州縣官員備辦軍需有經手數年者有經手二三年者將此熟練人員若因細故微瑕即行叅革則接任之員新辦軍務未免生疎或至遲悞亦未可定嗣後陜甘地方辦理軍需之州縣官員若無大過其所犯情有可原者著該督撫揆情度理量加寛宥若錢糧有些小不清之處而事屬因公者統俟大軍凱旋之後查核明白定其功過特諭雍正八年十月十八日奉上諭陜西四川地方民風淳樸歴年逋賦甚少查毎年徴收錢糧之期四月完半十月全完此定例也朕思四月十月既届納課之期小民必湏預先經營是麥榖未收之時即為輸將之計或因稱貸而受剥於富豪或因預糶而大虧其價值且如甘肅地方有徴收本色者若在糧榖未獲之前更為竭蹶歴來川陜錢糧既無拖欠之陋習著將四月完半者寛至六月十月全完者寛至十一月俟夏麥秋禾登塲納稼之後從容完課俾民力紓徐以副朕愛養黎元之至意特諭雍正九年正月初三日奉上諭朕思惠養黎元之道莫先於除賦蠲租使萬姓均沾渥澤是以數年來寛免各省之額徴以為阜民足食之計者難以枚舉而該省之人民果抒誠慕義宣力急公朕尤嘉其人心風俗之淳良而屢沛施於常格之外也陜西甘肅二省經理軍需數年矣凡米糧芻牧之屬及車馬牧畜之𩔖皆動支公帑銀兩備辦一絲一粟不使擾民此中外臣民所共知者然朕毎念地方旣有軍務縱不取辦於民財未嘗不資藉於民力而陜甘二省之民人踴躍趨事其心甚為可嘉年來已屢降蠲免之㫖兹特再布恩膏將雍正九年西安所屬額徴地丁銀蠲免十分之三共計銀四十七萬九千九百零甘肅所屬額徴地丁銀二十八萬二千二百零全行蠲免該督撫等可轉飭所屬有司仰體朕心敬謹奉行務令閭閻均沾實惠將此㫖刋刻頒布俾深山僻壤共知之特諭雍正九年二月二十六日奉上諭從來備辦軍需於地方不無勞費朕深知其弊惟恐累及民間是以於征勦凖噶爾之舉悉心宻籌於數年之前一絲一粟皆用公帑置辦而民間並不知國家將有軍旅之事從來未聞預備軍需地方如此毫不騷擾也此天下所共知更為三秦百姓所深悉者及至大兵旣出時日旣多輓粟飛芻脂車秣馬雖不取辦於民財恐不免借資於民力此亦時勢之不得不然也祗以凖噶爾狡獪凶頑父子濟惡實䝉古之巨患爲國家之隠憂若因循茍且縱賊養奸是狡㓂一日不㓕即邊境一日不寜邊境一日不寜即内地之人民一日不得休息此朕熟思詳審計算再三而出於萬不容己者並非好大喜功利其民人土地而為此舉也即以上年之事言之賊彛先遣使臣詐稱求和及朕降㫖暫停進兵待其信息而彼傾其賊衆乗我不備大肆猖獗然則此等狡㓂固可置之度外聼其貽害於邊方哉即此愈見聖祖皇考當年不得已之情朕今日繼承先志之應舉行事也惟是國家設兵所以衞民今因用兵而有不得不資民力之勢朕心實為憐憫是以年來屢蠲陜甘二省額徴錢糧使羣黎均沾膏澤乃三秦紳士庶民知感國恩兼明大義踴躍趨事志切急公二十年來如一日朕實嘉賞之如昨歲據督撫奏報甘肅士民等有願捐車輛以資輓運者有願捐草束以供芻牧者朕皆降㫖一一照數給與價值而其服勞宣力之誠悃則不可忘矣今年添辦軍需朕尤切諭督撫有司體恤民情不得絲毫擾累其糧餉運費特令加増倘有不敷仍令據實陳奏無非軫念民勞之意惟望陜甘二省紳士庶民等歡欣鼓舞勿懈初心則和氣致祥仰邀天眷數年間必見膚功克奏不但邊城内外共受寜静之福即爾等世世子孫亦永享安居之樂矣查雍正九年甘肅所屬額徴錢糧業已全行蠲免西安所屬額徴錢糧前降㫖蠲免四十萬兩著再蠲免四十萬兩以昭朕體恤之恩該督撫務飭有司敬謹奉行使閭閻同受實惠并將此㫖刋刻頒布俾陜甘二省逺鄉僻壤之民共知之特諭雍正九年三月二十四日奉上諭朕欲於在京官員人等内揀選老成明白者數十員命徃陜西内地州縣辦理宣諭化導之事年餘事竣即著回京辦理若好加恩議叙著大學士㑹同該教習於庶吉士内揀選數員各部堂官在本部學習人員内揀選一二十員國子監祭酒等在選㧞貢士内㨂選二三十員俱交送内閣帶領引見雍正九年四月十一日奉上諭朕御極以來繼述皇考聖祖仁皇帝乂安區宇之聖心旰衣宵食朝乾夕惕欲使薄海内外休養生息物阜民安永戢兵戈咸登衽席以成蕩平熈皥之治是以宣猷敷治之間𢎞綱庶務凡有益於民生者莫不興舉不便於民生者莫不屏除若有幾㣲措置失宜即五内輾轉寤寐難安豈肯好大喜功興兵搆難使百姓有供應之勞不遑寜處哉惟是除暴乃所以安良撫内莫先於攘外此古今不易之至理帝皇治世之常經凡爾百姓粗通大義者即莫不知之不必待髙逺之識也惟彼凖噶爾一部落原係元朝之臣僕其始祖曰額森額森之子托渾漸至大員因擾亂元之宗族離間䝉古惟恐獲罪遂背負元朝之恩逃遁藏匿於西北邊逺之地煽惑匪類要結黨與自稱凖噶爾當我朝定鼎之初各處䝉古傾心歸順求為屬國共享昇平之福獨凖噶爾一部落違越於德化之外至噶爾丹䇿妄阿拉布坦二人則尤狡獪兇頑之甚者噶爾丹身為喇嘛不守清規不遵佛教破戒還俗娶青海鄂齊兒圖車臣汗之女爲妻又潛往青海地方賊害伊之妻父而擄其人衆又復巧搆釁隙乗喀爾喀之不備發兵猝擊以致喀爾喀人衆潰㪚紛紛投我天朝䝉聖祖仁皇帝施恩撫恤遣使前往噶爾丹處諭令戢兵和好多方開導乃噶爾丹㝠頑不靈轉借追襲喀爾喀之名犯我邊汛彼時即行勦滅復有何難我聖祖仁皇帝至仁如天好生為徳特遣官員前往責問是時噶爾丹惶愧恐懼設誓撤兵仍復潛住近邊暗圖窺伺且乗間搶掠䝉古牲畜俾其不獲安居我聖祖仁皇帝始親統六師躬行天討噶爾丹逆天背理自速滅亡此噶爾丹之始末也䇿妄阿拉布坦者乃噶爾丹之姪也彼時我兵旣平噶爾丹即應鋤絶根株不留遺孽祗因我聖祖仁皇帝寛大仁慈赦罪宥過且念䇿妄阿拉布坦素與伊叔不相和睦情有可原於是加以天髙地厚之恩將噶爾丹餘剰部落賞伊收管此時伊力弱勢微甚為恭順其後則離間伊妻之父子誘其妻弟擕帶萬餘戸至伊住牧之地因而強佔入已於是勢力漸增竟敢肆意妄行窺伺青海侵犯哈宻又潛兵入藏殺害伊妻弟拉藏汗毁壊寺廟荼毒人民我聖祖仁皇帝特遣大臣前往詢問乃伊愍不畏死阻兵抗命使臣率師甚少兵力單弱伊得愈肆猖狂此實天下臣民所共憤者我聖祖仁皇帝仍賜包容諭令兩路官兵姑緩前進以俟其悔罪輸誠若終不悛則命將徂征犁庭掃漠此我皇考之本意也朕即位以來伊雖遣使求和而詐偽作奸仍復如故且將我青海叛臣羅卜藏丹津收留藏匿朕屢次降㫖諭以定界息兵而伊恍惚支吾巧幻百出及䇿妄阿拉布坦身故伊子噶爾丹䇿凌繼立其妄亂之性悖逆之行更過於其父其遣使陳奏之詞甚屬支離妄誕即如前年西藏阿爾布巴等之敢於戕害頗羅鼐亦因凖噶爾等伊地相近而逃匿之羅卜藏丹津又係伊等姻戚彼此相依是以敢於悖逆朝命而仗凖噶爾以爲狡兎之三窟也似此世濟其惡之人以逞兇挾詐為心以刼物傷人為事不可以徳感不可以理喻無頼無恥懐逆藏奸時時欲戕害臣服我朝之䝉古部落以壊我屏垣若此時可以經理之㑹而瞻顧因循避興師動衆之名爲躭逸偷安之計則狡㓂一日不滅則䝉古一日不安蒙古一日不安則邊境一日不寜邊境一日不寜則内地之民一日不得休息而首先之疲於奔命者即三秦之黎庶也即以上年之事論之賊夷先遣使臣偽稱請和及朕降㫖停兵以待信息而彼於深冬氷雪之時傾其醜類乗我不備侵犯汛界盗竊䭾馬然則此等狡㓂固可置之度外聼其貽害於將來乎從來窮兵黷武爲聖帝明王之所深戒而以大加小以強凌弱又仁人君子之所恥而不為者况準噶爾彈丸之地逺在極邊之區得其地不足以耕耘得其民不足以驅使即使㓕此朝食亦不足以誇廟畧而耀武功此皆皇考與朕熟思審處先後籌畫數十年而出於萬不得已者也惟是地方有軍旅之事厲兵秣馬諸務紛繁雖不取辦於民財恐不免不借資於民力向䝉皇考軫念秦民勞勩所以加恩而優恤之者無待朕之屢述矣朕御極之元年即將陜甘二省康熈六十年以前民屯衞所未完銀米豆草等項悉行蠲免又將舊例應完之三釐三合免其徴收數年以來西安所屬額收錢糧或免四十萬或免八十萬甘肅所屬錢糧則連嵗全行蠲免他如展納課之定期寛帶徴之舊欠開墾地畝修築河渠悉動帑金永為民利此皆朕之加惠於秦民者可約畧舉之也即以西陲用兵之事言之北路軍需交與怡賢親王等辦理西路軍需交與大將軍岳鍾琪辦理此皆定議於雍正四年者王大臣等宻奉指示一絲一粟皆用公帑製備纎毫不取給於民間是以經理數年而内外臣民並不知國家將有用兵之舉以致宵小之徒如李不噐軰竟謂岳鍾琪私造戰車蓄養勇士訛言繁興逺近傳播達於朕聼朕將岳鍾琪遵奉宻㫖之處曉諭秦人而訛言始息即此一節觀之若非辦理軍需秋毫無犯何至以國家之公事疑為岳鍾琪之私謀乎及至雍正七年大軍將發飛芻輓粟始有動用民力之時朕皆勅令地方有司照數給與脚價嚴禁扣尅短發侵蝕等弊倘有不肖官員借稱軍需科派擾民者著該管大臣即行題叅革職枷號示衆先動帑金傳集百姓如數給還朕所以爲百姓防患除弊者亦極嚴切矣上年該督撫先後奏稱民人中有願捐草束以供牧養者紳衿士庶中有願捐車輛以資輓運者朕皆奬以温諭仍令照數給與價值去冬賊彛猖獗之後將來軍餉較前未免繁多朕特令加添運價一切軍務悉令有司寛裕辦理似此是朕豈肯因戎事繁急稍渉權移使閭閻騷擾於萬一哉意謂三秦衆庶必能諒朕不得己而用兵之苦心悉朕不忍累民之至意矣乃近來風聞陜西之民竟有怨朕而私相謗議朕撫躬自問實不得其致怨之由再四思維昔年曽静謗朕之語怪誕離竒實為夢幻所不及之境然則天下之大如鬼如蜮之事何所不有總因數年來大逆不法之人不得遂其逆願於是使其匪𩔖揑造流言轉相傳布以冀揺惑衆心擾亂國政前年一一根䆒悉出發遣衆犯之口供証鑿鑿已按律正法大義覺迷録中載之已詳十數年來陜西居住之允禵塞思黒年羮堯延信等皆視朕躬如讐敵者也其脇從之逆黨實繁有徒專揑誹謗之詞將無作有欲以洩其私忿如塞思黒之令狐士儀年羮堯之鄒魯静一道人延信之道姑王氏等皆公然以反叛為衆人之倡則其他匪𩔖之造作妖言暗中煽動者又不知其幾矣地方既有奸囘之人接踵肆惡而又值軍興旁午或有司自顧考成間有奉行不善之處是以愚民無知惑於邪説溺於私情偶因用力於目前遂忘受恩於平日此亦時勢之所不免者若果深知朕心明曉大義一聞匪𩔖揑造之言即深信我主必無是事偶遇奉行不善之處即深信我主必無是心此誠天下之良民也然而造言生事之人專以蠱惑人心爲務此倡彼和有意流傳而知理安分之人不過本身奉法而已豈能執途人而告之是以三秦百姓聞邪説者多而聞正論者少豈非世道人心之患哉朕又思之秦風樸直自古為然樸則易被人欺直則善言易入祗以向來未有宣諭化導之人而該省督撫以及有司既有刑名錢榖之專責又有徴兵籌餉之軍需簿書鞅掌難於兼顧是凖噶爾之始末邊防關係之情形皇考與朕奉天討罪除暴安民萬不得已之苦𠂻並未家喻而戸曉而但聼僉邪小人揺唇鼓舌訕謗朝政變亂是非無怪乎草野之中被其迷惑者不少也今朕特頒此㫖遣左都御史史貽直侍郎杭奕禄署内務府總管鄭禪寳率領翰林院庶吉士及六部學習人員國子監肄業之選㧞貢士等前往陜甘二省開導訓諭覺悟愚䝉從前雖將大義覺迷録通行頒布祗恐逺鄉僻壤之氓尚有未曽聆悉者著一併宣諭咸使聞之倘合省民人等果能篤尊君親上之義消亢戾怨懟之情將見和氣致祥福縁善慶必邀上天黙祐迅奏膚功邊塞永寜烽烟永息不但爾等安居樂業俯仰優游即爾等世世子孫共享昇平之樂矣至於軍需各項悉動帑金差員辦理不得扣尅短少貽累小民所降諭㫖至再至三著欽差大臣悉心訪察倘有不遵諭㫖者即行題叅或所定官價有不敷用之處亦即據實奏聞若兵馬經過之地有不遵紀律騷擾民間者小過即告知該管大臣懲治大過即行題叅不得姑容務使兵民和洽内外輯寜以迓天庥以副朕念特諭雍正九年七月初一日戸部奉上諭據陜西署督查郎阿等奏稱西鳯二府撥運甘肅等處米十五萬石二府民人領運之時惟恐逺渉長途或有虧耗毎米一石多帶一二升以備添補之用途次安行並無虧折據收糧之員節次具報正米之外多交餘米或數十石或至數百石不等大約交足之時可得米千餘石將來一併收貯於邊儲軍糧大有禆益等語數年以來秦省民人運送軍需俱無遲悞是以朕屢次加恩以示優恤兹因輓輸西鳳米糧以資軍食特令加添脚價務期運送從容而領送之民人等敬謹承應於交完正米之外尚有餘米交官其急公敬事之念甚屬可嘉該署督等查明交米多寡之數分别賞賚務令本人實沾恩賜勿令胥吏中飽以副朕加惠秦民之至意特諭雍正九年十一月二十五日奉上諭陜西西鳳二府運米十五萬石前赴甘肅等處據廵撫武格等定議若領運民人之牲畜有在途疲乏倒斃者即令該地方官借給銀兩代僱牲畜運送前去仍於本運戸原籍追銀還項今聞軍糧十五萬石俱已全數運至甘肅等處交收惟是領運民人有因牲畜疲乏倒斃在平凉凉州甘州肅州所屬州縣借支銀兩者共計銀一萬八千七百餘兩目今催收止交過一百九十兩其餘尚未交還朕思陜西民人等領運軍糧既已如數運到未曽遲悞而所借僱覔牲畜之銀兩若不稍寛限期責令一時交納恐其中不無力量艱難者著諭知該督撫等此未完之借項一萬八千餘兩寛以一年之限以示朕軫念秦民至意特諭雍正十年二月初九日奉上諭自冬春以來京師未得雨雪朕與諸大臣等戒懼修省䖍誠祈禱以冀仰格天心聞畿輔地方及河南山東雨雪亦少山西陜西二省雖有得雪之處亦未周遍朕心憂慮深恐二麥歉收小民艱於餬口已切諭該督撫等多方籌畫為思患預防之計從來天人感召之理㨗如影響所頼該督撫等以恤民之心爲格天之本果能使民困全除民氣舒暢自無有不能感召天和者至於清理刑獄亦祈求雨澤之要務除在京已命刑部法司清查案件速行歸結以免拖累外其畿輔地方及河南山陜等省郡縣繁多有司賢否不一其中或有聼㫁刻覈濫及無辜者或有淹滯覊留塵案莫結者或有牽連待質致悞恒業者該督撫大吏等當悉心體察嚴飭屬員速為清理應釋放者釋放應取保者取保務期平允矜慎俾閭閻各安生業其他政令凡有稍不便於民者急思力爲改圖總在各該督撫等體朕若保赤子之心各切痌瘝乃身之念至誠惻怛勤求民隠殫竭實心普行實政庶幾上天昭格早降甘霖勉之勉之特諭雍正十年五月初十日奉上諭秦省民風醇良質樸朕所素知苐因近年以來有一二匪𩔖揑作浮言妄冀鼓動衆聼朕恐無知愚民一時不察被其迷惑是以特遣大臣官員等開誠布公宣諭化導盡消奸匪蠱惑之害益堅良民嚮善之心從前陜甘二省民人深知感戴國家教養之恩今復悉西陲不得已用兵之處聆受諭㫖開悟踴躍衆志僉同朕心深爲嘉悦但軍興日乆轉粟飛芻不無資於民力其輓運之價朕已屢次加添近聞路逕僻逺之地尚有不敷又或採辦草豆等項時價低昂不等若如此則該督撫等不洞逹朕意矣向後著悉心體察有應行奏聞者即據實陳奏朕自加恩不使官民等有賠累之苦著將此㫖曉諭陜甘二省官民等共知之特諭雍正十年十月十六日奉上諭直𨽻河南等省驛馬有毎年准報倒斃三成四成之例而陜甘兩省向因地僻差少不在准報之中今西路軍興羽書絡繹差遣繁多地方有司不無賠補之苦朕心軫念除偏僻州縣仍照舊例外其自潼關至西安一路自西安由秦鞏南路一帶由平凉北路一帶至蘭州又自蘭州由凉甘一帶至肅州嘉峪關又自蘭州由莊浪一帶至西寧又自榆林延綏寧夏沿邊一帶至凉州各路驛遞馬匹俱照直𨽻河南等省之例十分之内准報倒斃三分領銀買補作正開銷如有過三分之數者勒令賠補倘恃有恩㫖或尅扣草料不加謹飼餵者著該道府查明詳揭該督撫即行題叅其准報三分之數俟軍務告竣仍照舊例停止特諭雍正十二年八月初六日内閣奉上諭張正瑗王大士辦運妥協可嘉著交部議叙其領運之民人急公敬事著史貽直碩色查明交米多寡之數酌仿從前之例分别賞賚務令均沾實惠欽此雍正十二年十一月二十六日内閣抄出奉上諭今嵗春夏間陜西地方禾麥頗好及至仲秋聞有雨少之州縣如甘肅所屬則有階州靖逺環縣等處西安所屬則有臨潼渭南髙陵涇陽三原醴泉富平同州郃陽澄城韓城朝邑華州華隂蒲城潼關以及榆葭二府州所屬等處朕心深為軫念特諭該督撫速籌蠲免賑恤並轉運接濟之䇿務使貧民不至失所兹據劉於義許容奏稱階州及靖逺縣環縣本年錢糧及應徴舊欠已概行停徴俟明年夏收後再議徴收至乏食之民已按照成例計大小口借給口糧以今嵗十月起至明嵗四月爲率統俟夏收後再行徴還或其他州縣有一村一堡被旱薄收者亦照階州等處之例辦理等語據史貽直碩色奏稱西安所屬州縣秋間雨澤愆期嗣于九月内大沛甘霖所種之麥滋潤暢茂明歲夏收可望現在糧價有减無増約計本地存貯榖石足以接濟明春之用無庸借資于豫省至本地錢糧百姓感戴皇仁且值連年豐稔已經完納十之八九亦無庸加恩蠲免惟從前借糶之倉糧應于秋後還倉者今西安同華榆葭等府州既有薄收之屬若再催還借糶之項誠恐市價増長民力維艱應請暫緩徴買統俟明秋還項則民力可舒等語劉於義史貽直等奏報地方情形已悉階州等三州縣乏食民人所借之口糧俱著賞給明年夏收時不必徴還所有本年未完之錢糧亦著蠲免明年不必補徴其應徴舊欠著概行停止仍令劉於義許容督率有司加意撫綏務令小民得所至西安同華榆葭等府州屬百姓所借之倉糧亦著賞給明年不必交還其糶出之榖著史貽直等酌量于明年何時買補還項特諭欽此陜西通志巻八十三
