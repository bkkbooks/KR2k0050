body:
  text: 陜西通志卷三十四兵防一地水象師容民畜衆畫井寓兵夏官所統駟鐵車鄰秦風夙頌南北分權府廂遙控振古防秋三邊尤重細柳出屯榆關欵貢韓范揚威指示發縱除器練強戒備足用作兵防志第十四本朝陜西各營官五百八十二員馬步戰守兵三萬九千九十名餉銀七十萬三千一百四十六兩四錢糧米一十萬五十五百一十二石四斗兵丁家口七萬三千九百八十六口銀一十一萬九百七十九兩米一十一萬九百七十九石官員兵丁馬三萬四千五百四十二匹乾銀三十萬二千五百三兩二錢料豆三萬四千七百九十七石三斗草四十八萬五千七百六十束內會城潼關滿洲蒙古漢軍八旗官三百六員馬步兵炮手弓鐵匠並餘丁一萬三十名餉銀二十二萬五千五百八十二兩糧米九千六十四石兵丁家口七萬三千五百六十六口銀一十一萬三百四十九兩米一十一萬三百四十九石官員兵丁馬二萬三千三百四十八匹乾銀二十萬一千二百四十一兩五錢料豆二千五百二十七石二斗草一十五萬六千七百八十束督撫兩標八營官六十六員披甲親丁馬步戰守兵七千九百一名餉銀一十一萬六千八百二十四兩糧米三萬九千三百八石親隨披甲家口四百二十口銀六百三十兩米六百三十石官員兵丁馬四千七百九匹乾銀四萬三千八百八十八兩八錢料豆二萬一千二百三十五石八斗雍正九年新增督撫二標兵二千名在此額外固原鎮屬分駐陜省各協營官四十四員外委千總把總一十六員按外委千把在馬戰兵內選用故後仍列馬兵之數馬步戰守兵共四千六百六十七名餉銀五萬二千二百三十兩糧米二萬三百四石官員兵丁馬共一千二百五十三匹乾銀八千六百三十兩一錢料豆四千九百二石三斗草三十二萬六千八百二十束延綏鎮屬各協營堡官八十三員馬步戰守兵九千二百四十九名餉銀一十五萬五千九百二十二兩糧米三萬六千七百二十八石四斗官員兵丁馬三千五百二匹乾銀三萬四千一百九十五兩二錢料豆一千九百七十四石興漢鎮屬各協營路官六十七員馬步戰守兵七千二百四十三名餉銀一十五萬二千五百八十八兩四錢糧米一百八石官員兵丁馬一千七百三十匹乾銀一萬四千五百四十七兩六錢料豆四千一百五十八石草二千一百六十束兵制會城滿兵營鎮守西安將軍一員滿洲左右翼副都統各一員漢軍左右翼副都統各一員筆帖式四員八旗滿洲協領八員佐領四十員內有協領兼攝佐領八員防禦四十員驍騎校四十員八旗蒙古協領八員佐領一十六員內有協領兼攝佐領二員防禦一十六員驍騎校一十六員八旗漢軍協領八員四品參領八員防禦四十員驍騎校四十員八旗滿洲馬戰兵三千五百八十六名蒙古馬戰兵一千四百一十四名漢軍馬戰兵二千名滿洲蒙古步戰兵七百名滿洲蒙古漢軍炮手一百五十四名弓匠六十四名鐵匠一百一十二名弓鐵匠內各有頭目十六名雍正九年添設額外養育兵一千名馬戰兵七千名嵗支餉銀一十七萬八千八百四十八兩每名月支二兩內委壯尼大前鋒領催九百四名月支三兩步戰兵七百名嵗支餉銀八千八百八十兩每名月支一兩內頭目四十名月支二兩炮手弓匠鐵匠共三百三十名嵗支餉銀五千八百八兩弓鐵匠每名月支一兩炮手每名月支二兩家口馬戰兵每名十口計七萬口步兵頭目每名十口步兵每名二口計一千七百二十口炮手每名七口計一千七十八口弓匠頭目鐵匠頭目每名五口弓匠鐵匠每名二口計四百四十八口共計七萬三千二百四十六口每口嵗支半本粟米一石五斗半折米銀一兩五錢共嵗支半本粟米一十萬九千八百六十九石半折米銀一十萬九千八百六十九兩又餘丁內挑選兵一千名每名月給餉銀一兩嵗支銀一萬二千兩月給米三倉斗嵗支米二千五百二十石將軍馬二十匹都統每員馬一十五匹計六十匹協領每員一十二匹佐領參領每員八匹計八百匹防禦每員五匹驍騎校每員四匹計八百六十四匹八旗馬戰兵每名三匹計二萬一千匹步兵頭目四十匹弓匠頭目一十六匹共計官兵馬二萬二千八百匹嵗支半本料六萬八千四百二十八石六斗五升半折銀六萬八千四百二十八兩六錢五分半本草三百八萬七百束半折銀三萬八百七兩雍正三年停止草束俱行折給銀兩嵗共支銀一十九萬八千四百七十一兩三錢順治四年户部撥給右翼四旗滿洲蒙古官員園地二百四十畝至二百十有五畝不等將軍地在長安縣羅家塞菜園子左翼副都統地在咸寧縣景龍池右翼副都統地在咸寧縣八里村正黃旗地在咸寧縣龍渠堡景龍池正紅旗地在咸寧縣小鴈塔長安縣塔坡野狐塜廂紅旗地在咸寧縣大鴈塔水河村魯家村八里村長安縣野狐塜鑲藍旗地在咸寧縣景龍池康熙二十二年户部撥給駐防西安八旗兵丁塋地二頃一十畝在咸寧縣菜園人頭院娘娘廟火巷口等處長安縣西城壕海家村解家村楊家莊七堵墻等處演武場在長安縣西北方潼關滿兵營雍正四年新設駐守潼關城守尉一員八旗防禦八員驍騎校八員滿洲撥什庫三十二名馬戰兵三百六十八名步戰兵六百名撥什庫每名月支三兩嵗共餉銀一千一百五十二兩馬戰兵每名月支二兩步戰兵每名月支一兩五錢嵗共八月銀一萬三千八十六兩四月糧六千五百四十四石又每名月加五錢嵗共銀五千八百八兩撥什庫家口計三百二十口嵗共支半本粟米四百八十石半折米銀四百八十兩城守尉馬一十二匹防禦每員五匹驍騎校每員四匹計七十二匹撥什庫每名三匹計九十六匹共計官兵馬一百八十匹嵗支半本料五百四十石半折銀五百四十兩半本草二萬四千三百