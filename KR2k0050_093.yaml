body:
  text: 陜西通志卷九十三藝文序傳書啓華嶽銘序晉傅玄易稱法象莫大乎天地天以高明崇顯而嶽配焉地以廣厚為基而嶽體焉若夫太華之為鎮也五嶽列位而存其首三條分方而處其中故能參兩儀以比德協和氣之絪緼故雲行與雨施興靁風以動物是以古先歷代聖帝明王莫不燔柴加牲尊而祀焉於虞書則西巡狩至于西嶽而親祭焉於禮則大司馬掌其分域而大宗伯典其祀禮也暮春太師左右丞相諸公于韋公逍遙谷宴集序唐宋之問山有姑射人蓋方外海有蓬瀛地非宇下逍遙谷天都近者王官有之不廢大倫存乎小隱迹崆洞而身拖朱紱朝承明而暮宿青靄故可尚也先天之君俾人在宥歡心格於上帝喜氣降為陽春時則有若太子太師徐國公左丞相始興公少師宜陽公少保崔公特進鄧公吏部尚書武都公禮部尚書杜公賔客王公黼衣方領垂璫珥筆詔有不名命無下拜熙天工者坐而論道掌邦典者官司其方相與察天地之和人神之泰聽於朝則雅頌矣問於野則賡歌矣乃曰猗哉至理之代也吾徒可以酒合燕樂考擊鐘鼓退於彤庭撰辰擇地右班劔驂六騶畫輪載轂羽幢先路以詣夫逍遙谷焉神臯藉其緑草驪山啓於朱户渭之美竹魯之嘉樹雲出於棟水環其室灞陵下連乎菜地新豐半入於家林館層巔檻側徑師古節儉惟新丹堊巖谷先曙羲和不能信其時芳卉後春勾芒不能一其令桃徑窈窕蘅臯超忽驂御延佇於叢薄珮玉升降於蒼翠於是外僕告次獸人獻鮮樽以大罍烹用五鼎木器擁腫即天姿以為飾沼毛蘋蘩在山羞而可薦伶人在位曼姬始縠齊瑟慷慨於座右趙舞徘徊於白雲衮旒松風珠翠煙露日在蒙汜羣山夕嵐猶且濯纓清歌據梧高詠與松喬為伍是羲皇上人且三代之後而其君帝舜九服之內而其俗華胥上客則冠冕巢由主人則兄弟元凱合是四美同乎一時廢而不書罪在司禮竊思楚傅常詣茅堂之居仰謝右軍忽序蘭亭之事蓋不獲命豈曰能賢上已泛舟昆明池宴宗主簿席序前人僕不逰於兹十有五載矣心由物感遐矣不忘迹為事牽近而難挹南陽宗雍文通學古器重名高令君有奉倩象賢丞相生玄成邁德暮春修以文之會上已邀祓禊之逰乃結縉紳撰清辰殷殷轔轔敲霧驚塵望於昆明之濵觀其大浸川陸博資畿甸鳬鷖發海來往浮沉日月麗天東西出入千年珍館無復豫章四面金堤仍同樹杞是日也摩肩錯轂備朝野之歡娛袪服靚粧匝都城之里閈翠幕星布錦帆霞屬餘瀝下醉於綃人新聲逺聒於川后縱目遐覽識皇代之承平得意同歸有吾儕之行樂高朋一座桂樹藂生君子肆筵玉山交映束晢以言談得俊張華以史漢先鳴登旨酒而無荒絃清琴而自逸於是涉連榻命孤舟桃水漲而浦紅蘋風搖而浪白逼匡阜兮遵彭蠡邈矣載浮指衡嶽而超洞庭眇焉疑到曲島之光靈乍合神魂密逰中流之萍藻忽開龜魚潛動睎鏤鯨而鼓棹共看燒劫之灰歷牽牛而問津欲取支機之石晴光劃野有象而必形夕陽照山無竒而不見思溢今古心搖草木漢家城闕遺之以雜霸之風秦塞膏腴潤之以太平之色景窮勝踐歸限嚴闉思染翰於上林願揮戈於濛汜主稱未醉唯見馬駐浮雲賔共少留自有魚銜明月宫商待叩羣公之獲助已多序引先題下走之求蒙不逮請授素幅以頌佳逰使一時之興詠遙存千古之姓名常在春逰宴兵部韋員外韋曲莊序前人長安城南有韋曲莊京郊之形勝也却倚城闕朱雀起而為門斜枕岡巒黑龍卧而周宅賢臣作相舊號儒宗聖后配元今為戚里韋文雙珠絶價百金懿名文華得俊於陸氏兄弟掩譽於荀家先人結廬當大厦之地衆賔連袂乘暮春之月觀其奧區一曲甲第千甍冠蓋列東西之居公侯開南北之巷嬴女樓下吹鳳降於神仙漢妃館前遊龍走其車馬地靈磊落而間出天爵蟬聨而相繼拜郎起草襲雁而傳羔補衮司槐送伯而迎季爾乃闢虛幌敞華筵閨門之秀士咸集京邑之清流畢萃萬株果樹色雜雲霞千畝竹林氣含煙霧激樊川而縈碧瀨浸以成陂望太乙而鄰少微森然逼坐尚書未至曳履驚鄰宫尹遞來鳴騶動壑登玉爼醉金觴地高而珍物維豐理洞而清徽不雜以醉觀德因談獲情外戚遨逰自攜歌吹主人賞會但有琴詩於是下髙臺陟曲沼鋪落花以為席結垂楊而代幄霽景含日晚霞五彩而丹青韶望卷雲春臯一色而凝黛景闌興逸氣清心逺仰大儒之肆其德可師入處士之廬斯人若在諷誦於逸彭之藻沐浴於扶陽之墟向來挹清議擅風流即事竒偉佳辰行樂安可無述文在兹乎酆國善誘詞宗見收士末內史禊亭之集竊倚琳琅衛尉别業之遊濫先題目歸軒莫駐麗城將掩拙而不速恨無倚馬之才婉而且微請談雕龍之什公命賦水字盍成四韻云爾季春下旬詔宴薛王山池序張説有生之微萬殊無方之感一節陽和而動植暢春滿而臯壤恱后皇所以發時令布新慶二南邁周召之風百辟形金石之詠者也碧流日暖南山雪殘首獻之浹辰暮春之提日帝京形勝借上林而入遊戚里池臺就修竹而開宴泉賙御府味給天厨仙倡侑樂中貴督酒太平嘉事前史未書大矣哉一德日新九功惟敘運璿樞而均四氣握金鏡而靜萬方堯舜湯文不違顔於咫尺夔龍伊吕共接武於朝廷不可見而見焉不可聞而聞焉豈深思勝殘去殺纍百年之至仁推厯按圖啓千齡之昌運河清難得人代幾何擊壤之歡良有以也地即青門上路朱邸平臺城煙屢起而汩山野風時來而過水春將悵别愛落花之灑途夏如欣會玩峰雲之映沼爾其列筵授几分曹設幕艇送江鳬船迎海鶴魚龍九劒曼延揮霍鸞鳳鳴簫鼓作申錫逾於百甕慈惠出於三爵炮炙熏林塘醪醴厭丘壑抃急管於無算醉湛恩以取樂羣公賦詩俾僕題序長卿消渴覺含毫之轉遲子雲壯夫見雕蟲之都廢敢憚鄙詞之訥澀恐貽盛集之蕪穢示爾韋司馬别業集序張九齡杜城南曲斯近郊之美者也背原面川前峙太乙清渠修竹左並宜春山靄下連俗氛中絶此皆鄭公之有也余固已聞之開元嵗夏四月猥忝散職居多放情跂彼一行無忘於夙尚時因七召果獲於前期乃與起居舍人蔡公萬年主簿韓公惠而得朋欣然命駕韋公方拭席見待羞以藥物之滋倚琴相歡雜以嘯歌之韻清言移景間步周林翻飛目情俯仰為得斯亦吾儕之樂事幸可而同也扶陽餘慶磻溪古迹樹留梓漆器用天成庭漸芝蘭馨香世襲斯乃韋氏之懿業是所謂異焉而韋公尚其同之樂忘其身之貴均林棲於服冕齊鼎食於焚枯彼未可量吾見其大迹繼前軌將為龍以為光道包逺圖豈一丘而一壑二三君子相與志之云宴韋司户南亭序王維惟帝克辟惟股肱克左右庶績允釐有司多暇舉無違德孰獻其可雖列侍丹陛而罕伏青蒲攄懷致館灞陵南望曲江左轉登一級而鄠杜如近盡三休而天地始大凝氣向晦蒼蒼寒木式與汝歌多酌我酒墨客既序親當獸炭膳夫交馳屢奉鮮食夫含德之厚與時偕化拂衣而放則野人於小隱之中束帶而朝則君子於大夫之後何軌轍一境是非外物哉且騎有羈勒徒有次舍可以永日可以繼夜客非詩人之徒歟奚其默矣鄭縣劉少府兄宅月夜登臺宴集序李白夏六月小暑至矣吾兄方幕夜天掃月榭有酒如乳醑我乎城南城臨近髙山俯瞰平隰秦郊漢院相錯如繡且有皓氣足以娛人故數君子稱觴焉其誰同之有若功曹隴西李華參軍滎陽鄭洵卿琅琊王休河東裴貺鄭尉京兆韋造皆卿材也聲同而形體相忘道契而機事不入是以有髙會逺望危言浩歌或心愜清機寓興於物或語及陳迹盱衡而笑於是初筵而惠好修中飲而意氣接既醉而是非遣夫彭澤採菊隱侯臨風謂之盛矣况髙城古臺深夜朗月芳樽良友佳境勝事今夕何夕八者俱並盍亦偕賦於此乎觀二三子之志華山黃神谷宴臨汝裴毗陵十四明府序前人黃盧子滅景上漢千嵗矣留碧峰白雲以貽後世故清機勝事未始有極余使於華之明年道侣裴冀亦再命為臨汝今夏六月假道敝邑稅鞅此地思欲追髙步詣真境於是相與携手及二三友生童子將命者六七人挈長瓢荷大壺以濁醪素琴會於黃神之谷興也按谷之西頂實三峰東面石壁藂倚東為洞壑乳竇潛泄成盤渦兩崖合關若與天接二三子將極其深也至則係馬山足披蓁石門入自洞口至於梯路踏連嶂而輿疊崿度嶇嶔而躡凌兢夤緣絶磴及橫嶺而止澡身乎飛泉濯纓乎清漣想夫君俟我於蓮花峰之下碧空嬋娟愛而不見搔首空山然後靡靈草以為席傾流霞而相歡楚歌徐動沂詠亦發清商激於琴韻白雲起於筆鋒是日也髙興盡而世緒遣幽情形而神機生頺然覺形體六藏悉為外物天地萬有無非秋毫既醉且止則亦足言以志仙迹且旌吾友嘉會之在山也宰相及百官定昆池旬宴序孫逖古者天子居青陽服蒼玉於是乎和令布德行慶施惠其義逺矣粵若稽古皇帝御天下之十有九載溥暢神化𢎞宣大明氐羌來享四方無事元凱升朝百揆時序年屢豐而多慶物由庚而自樂乃賜羣臣十日宴所以畢春氣樂太平也越三月己巳會於定昆池於是秉鈞宗工執事庶尹元衮赤舄黼衣繡裳奉璋峩峩珮玉鏘鏘仰丹闕而拜命俯清川而樂飲大庖孔碩尹京為致餼之司旨酒思柔柱史為佐樽之政既錫之以髙會又恱之以備樂修妓羅舞名倡間歌含姑洗於鐘鼓動陽春於羽籥陟則設帟降則具舟榜文鷁以泝洄與飛鷗而狎玩魴鱮甫甫鳬鷖翼翼薰風敷散於草木喜氣宛延於郊甸亦既醉止于胥樂兮夫恩之所覃者深則感之所及者逺引之於大足以助天地之同和伸之於微足以致魚鱉之咸若大君垂裕豈虛也哉詩以展事抑惟舊典我上相裴公中書令蕭公輔弼皇極緝熙文教以為正國風美王化者莫近於詩微言浸逺大義將缺乃命革剗浮靡導揚雅頌斫雕為朴取實棄華親題首章以倡在位皇矣上帝式歌文王之德穆如清風方聞吉甫之頌請問其目列之如左黃帝廟碑序宋李昉天下暴亂聖人用干戈而靖之天下寧靜聖人用道德而化之昔有蚩尤肆殘毒孰能去焉涿鹿有氛祲孰能平焉黃帝所以鎮神威而大定也雲官紀符瑞孰能享焉土德成運數孰能興焉黃帝所以神明德而致太平也披史册覽五帝之舊記閲經籍稽百王之大典以治世之法為師範以嚴祀之禮立教化大宋闡統之十有三祀開寶紀號之五載彞倫攸敘萬國咸寧西踰卭僰之鄉東極神樞之地北窮絶塞南極丹崖靡不沐皇風而被德教萬里之斥堠無虞四方之風雨咸若文武並用農戰交修師旅無六月之征倉庾備九年之蓄途歌里唱逺頌近謠矣惟我皇帝陛下握乾符受天命為億兆之主居九重之尊靜則端拱凝旒來八方之琛賮動則靈旗萃輅蕩六合之妖孽圜丘展禮天地享其至誠萬物效靈人神協其佳瑞所謂登三皇而邁五帝也一日御便殿顧謂輔臣曰前代帝王有功德昭著澤及生民者宜加崇奉豈可廟貌墮而享祀寂寞乎當命有司遍加興葺輔臣承命拜稱萬嵗即日頒旨洋洋德音無翼而飛騰域中矣今坊州黃帝廟即其一也本郡守土臣以厥功告畢列狀求文詔以掌綸之臣昉俾文之以琬琰用紀其修建之迹臣昉謹托舊史而揚言曰昔者炎帝道衰諸侯未制惟力是恃伊民何依黃帝於是神聰明之德振威武之氣雕虎一嘯猛暴不覺震驚神龍未起陸梁先知悚懼始以兵法治其亂次以帝道柔其心寰海塵飛一朝盡息修德振旅勸農務穡登沅湘而逐葷粥無逺不臨舉風后而用力牧惟賢是試少昊顓頊嗣其瑞雲之德而宇宙清唐虞堯舜法其垂衣之道而域中化天生斯民樹之司牧為司牧者能以皇帝修身理國之道以御今之世而生靈不登仁夀之域者未之有也天有厯數鍾我皇朝考求參訂徵祀事於前文芷藻蘋蘩薦時羞於廣殿羽衛似巡於東海神兵如戰於阪泉尚憑德於威靈永垂休於黎獻虔遵睿旨謹序遊鄠山詩序程皓僕自幼時已聞秦山多竒占有扈者尤復秀出常恨逰賞無便嘉祐二年始應舉得官遂請於天官氏願主簿書於是邑謂厭飫雲山以償素志今到官幾二年矣中間被符移奔走外幹者三居其二其一則簿書期會倉廥出入固無暇息惟白雲特在山面最為近邑嘗乘間兩至其餘佳處都未得往變化初心辜負泉石五年二月初吉聞二車朝公來逰諸山先是朝公見約同往會探吏失期二日早朝公以書見命始知車騎已留草堂走白邑大夫張君時民産有在山麓者以罪沒官府符方命量其租入之數因請以往鞭馬至山而朝公已由高觀登紫閣還憩下院見待已久遂奉陪西逰經李氏五花莊息駕池上夜宿白雲精舍詰旦朝公西首僕復並山東逰紫閣登南山望仙掌回抵高觀谷探石穴窺石潭因周視所定田徜徉於花林水竹間夜止草堂是晚雨氣自西山來始慮不得遍詣諸境一霎遂霽明旦入太平谷憩息於重雲下院自入太平谷山水益竒絶殆非人境石道甚巇下視可悸往往步亂石間入長嘯洞過虎溪西南下至重雲閣訪鳳池觀雲頂凌霄羅漢三峰登東嶺望大頂積雪復東北來雲際下深澗白石磷磷於水間水聲清泠可愛坐石掬水戀戀不能去者久之遂宿大定寺凌晨登上方候日初上西望藥山北眺大頂千峰萬巒目極無際下山緣東澗渡橫橋復憩於重雲下院出谷逰太平宫故基而歸馬上率爾口語往往成詩章自入山至歸凡四日得長短詠共十二篇姑存之以志逰覽之次第云逰靈巖詩序鮮于侁熙寧三年秋侁行部偶公暇與太守虞曹郎李茂先晉弼僉謨殿省臣文紳儀公逰藥巖精舍舟南下數里乃並崖登山又數百步有一巖環覆可拾畝宫搆其下崖壁颷呀石色乳竇怪不可名品像殿之前有一軒瞰臨溪山俯仰可愛又東行迤邐行間見石脈出泉玉色如乳云飲之可蠲疾又數十步抵小崖崖後數丈廣二尋中有一石柱承載巖崖殆非耳目所聞見也其後有洞穴云昔人嘗誤入其中行數里見川源花木之遇或憶其家遂恍然欲行迷失處所豫愛其景物之異徘徊久之因為詩以記此山之勝事云慈恩鴈塔題名序樊察雁塔本隋無漏寺故地高宗在春宫為文德皇后復置故以名之永徽三年沙門玄奘自西域歸始於寺西建雁塔其後毁至長安中乃復更造南對玉案霧簷諸峰東枕曲江與大明宫月鳳門端若引繩氣象雄偉甲於天下自神龍以來進士登科皆賜逰江上題名雁塔下由是遂為故事五季寺廢惟雁塔巋然獨存有僧蓮芳始葺新之塔之內外皆以塗塈唐人題字不可復見元豐間塔再火鄉人王正叔始見書壁斷裂自剗刮甃甓得題名數十乃録以歸屢白好事者使刻於石逮今四十年卒不果重和戊戍察讐書東觀偶遇同年栁伯和縱談及此擊節悵嘆明年伯和出使咸秦暇日率同僚登絶頂始命盡刮斷壁而所得尤富皆前之未見又俾刻者李知常本摸拓隨其斷缺不復敢增益一字正叔隱居里中素樂書法乃屬以次第標目分為十卷刻于塔之西南隅於是一代竒迹爛然在目先是會昌中李德裕不由科第深恥進士始罷宴集向之題名削之殆盡故今所存獨詩人逸士與公卿貴逰子弟為多夫晉賢真迹流傳至唐官楮私謄幾數千卷自歐虞褚薛而下皆宗之當時士人咸以不能書為恥以今題名考觀其間縱復欹絶至鋒藏筆徑氣格髙古皆有江左遺風本朝士大夫必題識其側欲俾來者護持而皂𨽻庸人輒以俗書汚漫其上於是汲水滌之新墨盡去舊畫宛然乃知唐人於字學非特點曵盡工至於筆迹亦復精妙如此伯和好古博雅邁往不羣聞其成也為之喜而不寐諉序引輒以所見聞者列之碑首云長安志序明康海關中故有長安志刻之省署嵗久亡矣豫家有舊藏本嘗因其引類得其緒理喜關秦之迹頗為明悉易見間有踳駁則據册而擬欲盡固難也其書為宋龍圖學士宋敏求氏所著程文簡謂宋氏家多古書如宫闕記宫闕疏關中記廟記三輔皇圖三輔舊事皆所採據信哉夫自成周以來關中為歷代名都其人文之盛固不待别録而後知者若其遺迹故趾所在田父野老之妄既荒唐難信而學士大夫又不能闕疑存訛徒欲以逺而莫考之事畢議一旦若山海經之誕水經之誇括地輿地之志靡曼皆是也孟子曰盡信書不如無書豫於武成取二三策而已矣孔子曰吾猶及史之闕文也後之君子得是書而讀之會其領略可也而欲遽以言語文字之間定數千百年之疑誣矣知西安府南埠李侯刻是書成屬豫為序故復之如此蓋其所刻皆關中盛事云爾元老靖邊詩序王九思少保晉溪先生王公以兵部尚書兼都察院右副都御史總制陜西邊務開府固原於時土魯番貢職弗修屢抗我師為禍甚大貽朝廷西顧之憂公曰土魯番舊稱臣久苐御之失宜故至此我其撫之撫之不聽然後用師彼當自屈於是撫之果降修貢罔敢或爽先是各鎮士馬各守其地不相及北兵往往竊入我境拒之則無人覺而逐之則有甚不易者公自畫以各鎮士馬凡兵可入之地分布之以拒其入謂之擺邊以語諸巡撫諸公諸公訪於軍中老而諳事者咸以為不可公笑曰吾畫已成苐俟之可萬全無事已而果然於是邊人頌之以為降土魯番者詢謀僉同公之雅量也或可學也至於擺邊之策神識獨智公之才實不可以學而能也於是關中士大夫聞之作為歌詩以紀其盛題曰元老靖邊云而涇陽進士穆文英走使鄠杜下屬九思敘之夫六月之詠平玁狁也采芑之作服蠻荆也由今日視之師不興於六月士無事於采芑而邊靖焉則夫嗣遺雅之音以流於萬世者宜何如哉公未久入侍天子為四海致太平盛德偉績紀之太常備諸國史蓋不止於靖邊者云西京雜記序黃省曽漢之西京惟固書為該練非固之能爾亦其所資者贍也仲尼約之魯書馬遷鳩諸國史因本而成在古皆然也暇得葛洪氏西京雜記讀之云為劉子駿所撰以甲乙次第百卷考比固作殆是全取劉書有小異同耳洪又抄集固所不録者二萬許言命曰西京雜記豫於是知固之漢書蓋根起於子駿也乃遡憶其所不録之故大約有四則猥瑣可略間漫無歸與夫杳昧而難憑觸忌而須諱者也其猥瑣者則霍妻遺衍之類是也其間漫者則上林異植之類是也其杳昧者則宣獄佩鏡秦庫玉燈之類是也而其觸忌者則慶郎趙后之類是也凡若此者披金置沙法所刪棄矣至於乘輿大駕儀在典章鮑董問對言關理奧亦皆擯落而無采宜書而不書者何也豈不幸存於雜記歟但今所傳且失其半又非洪之故簡矣嗚呼後代之儒安得如子駿者遐收彚集以待班固者出歟誠為史家之一慨也贈李于鱗視學關中序王世貞今皇帝創禮樂褒經術徵諸公卿侍從之臣潤色鴻業日相與賡歌乎盛矣而獨濟南李攀龍于鱗其文章髙天下以逺故厭廢為外臣不得與從事于鱗為順德守滿考比三年自如而是時吳郡王世貞守尚書部九嵗當遷者再輒報罷上之三十又五年于鱗乃始遷按察副使奉璽書乘傳以條課秦博士弟子而世貞稱治獄使者北察燕趙為文貽于鱗云秦封自非子而孝公幾祀矣猶不得接冠帶盟非以俗寢故然耶至於小戎黃鳥蒹葭諸篇抑何其深文婉致也齊魯鄭衛其君子修于詞相矜尚巨麗矣乃見黜於仲尼而録秦誓也説者謂豐鎬之間周之遺教漸焉秦王吞誅六雄首采李丞相言焚詩書尊法吏天下額然而吏是師所存者醫藥卜筮種樹家言耳更覩所稱制與金石之銘猶郁郁爾文也無乃陽棄而隂收之耶漢興治馬上而自柏梁以來詞賦稱西京無偶者賈誼司馬相如子長吾丘壽王王褒揚雄諸大夫東西南北人也則豈其秦風是競七葉而後其衰也甚矣其不振于文也則亦豈惟秦嗚呼天子非有挾書之禁固闤闠六經而道路子史矣未央馺娑井幹之瓦猶一二存者寧無先人語遺也千餘年來二華逺跖終南太乙髙蟠而插天欱豐吐鎬不削其舊獨以百二之險士馬之富下瞷山東而已然吾聞孝廟時北地有李獻吉者一旦為古文詞而關中士人雲合景附馳騁張揭蓋庶幾曩古焉父老言故相楊文襄公實為之師倡之獻吉與諸君子時時慕稱楊公不衰也彼所謂師者訓詁割裂食宋氏之遺尚不能舉二戴何鄭以博甲乙第則可即諸君子獻吉一二外亦豪舉耳烏在其能倡耶雖然千餘年來磅礡鬱積氣不得決楊公亦小振之亦難能哉于鱗之為順德視右扶風部貴人毛束以吏事且于文非職即有所著作重自閟不出而西河之濵跂響而思奮者比比今上以秦故選于鱗非少于鱗有所不足蓋以秦山川令自致其造而已也語曰順風而呼不加長而應者衆言自上易也詩不云乎如塤如篪如璋如圭如取如攜攜無曰益牖民孔易于鱗其有以牖秦哉世貞采秦風而得小戎諸篇也刪書而取可以誓者知其為于鱗功矣陜西通志序馬理雍人曰往嵗帝命司馬獻臣撫我西土于內靖外安之暇念及斯文乃會諸臺獻及三司諸明諏曰昔在成化端肅先明保釐兹土肇修前志惟時臨川伍氏實執筆焉逮今七十載矣其後信陽何氏雖嘗撰述識其大者而已先今文獻茍無所紀後將何徵諸獻明曰然爰用幣及書託涇野宗伯逮余衰朽續前二志惟時二人出所藏籍萃諸時彥就館竹林議纂述焉未幾宗伯乃歸侍慈闈尋罹內艱繼應星殞溘焉長逝余如鶼喪厥翼焉嗣是乃咨諸時彥展才助豫彥乃觀象考籍得兹土星文當列宿之半五行之二雲漢之全復屢得秦星所在又察理考籍得天下山川脈之所起源之所發為紀為絡為條為列分江分河要會之處又參互考訂得名山大川所在昔所迷者辨而著之又稽諸古今茅土之頒在兹土者載之復見諸郡邑之設昉於兹土有因有革有割有合志者或顧其一指失其肩臂或地在他方冒名在此史既舛謬志益踵訛悉加正焉尋考河套西域吾故疆也具有城郭物産在其土地建置沿革見諸圖籍爰收而載焉仍稽諸聖迹古迹布我疆域輝耀山川苾芳簡册爰别而紀焉續議兹土之獻聖神為大肇造彞倫傳衜開來制厥服食宫室器用書籍禮樂舊或略之而詳諸異端辭客之事特表而著之綴以蕪詞繪髙厚焉續議兹土之文經籍為大舊或略之而詳諸詖淫浮誕之文乃載其要略繫以管見續議兹土之獻聖神之下帝王為大兹土之文經籍之下諸史子集可及爰第而載之繼索兹土名世之宦鄉國之賢雖人有崇卑顯晦剛柔之異行有偏全之殊為獻則一舊所遺者悉登載之但儲書未廣昔賢之行未能博聞又見任名宦不書尚踈略耳嗣以兹土藝文孔殷非大車可載乃擇其關世教者録之嗣以兹土人民自古及今屢有消長詳著於編見户口蕃息在仁惠焉至于物産則黃壤之區黍稷之美甲於天下乃本草訓注諸家農書不别二物夫性既不同用各有宜倘事君事親誤羞湯藥豈細故哉故明以辨之若夫釋老二氏實繁有徒其栖止出處不可勝算考厥先師具有妻子故詳其原委繫以鄙言蓋厚吾彞倫厚其徒焉其徒聞之靡不欣恱可以見其情與治之機矣乃若政事在兹土者各詳本篇稍見議例他不載者不勝載也乃以鑒戒終焉送胡方伯節鎮榆林軍序節前人嘉靖庚寅春我北鄙榆林軍缺御史大夫冡宰乃疏二臣于上其一為訥齋胡公疏略曰臣伏見陜西左布政使忠佐司徒制國用度支有功升廣西參政二方伯撫除猺獞妥疆域維裕調湖廣牧荒活民升陜西右布政使至今官內綏八郡士民外歷三邊餉軍有功諸御史大夫薦二御史薦八肆臣某舉賢才惟帝時遴時使帝曰俞忠往欽哉於是錫命使至曰惟兹榆林我軍東連朔代西接環慶南衛關輔北當胸奴惟兹胸奴數弗靖於我鄙震驚我師擾我耕桑廢我樵牧我民用咨帝用是簡爾為御史大夫往鎮兹土倚爾惟長城兹往其善視我師奠我邊鄙毋俾叔虎專美有周往欽哉公稽首拜命翼日乃就道於是藩城諸君子咸餞之渭上野人則從而留之曰公宅心亶厚亶榖敷政亶平宜我士民我士民祈淹兹數年衆心實若結罔釋寧無慰哉君子曰毋然比我關中嵗凶北鄙滋甚民流移將士枕藉以殍匪惟內憂實外虞皇上特側席任公公宜遄往其毋淹哉公曰加之師旅因之飢饉今時則然矣往則將攸為邪君子曰吾聞昔哲人之撫士也使寒者如燠餒者如飫張空拳者莫知白刃之當乎前也夫豈犒賞激之哉在誠以感之云耳公于是謝諸野人而别君子曰美哉誠也道其行矣夫吾兹試矣送謝副使督學關中序喬世寧天子鋭意治平而求端于人材謂督學者此其掌故弗可弗慎也乃以參議謝先生遷副使督學關中往先生為御史時嘗視學京畿已又以僉事視學廣西乃今復推擇關中云余往來京畿聞京畿人頌説先生無已也先生在廣西時會余領湖南學事湖南去廣西近也則又習聞先生之政余至今蓋私心愧焉先生視關中寧獨異京畿廣西也顧余關中士則益厚望先生矣夫關中者周秦漢唐故域也自昔岐豐豳渭之間其人文遐哉盛矣然論世考實則漢不及周唐不及漢其勢若流水趨下也此猶異代不論明興以來鄉先達多質朴強毅厚重抗直之風而關中亦用是稱于天下顧今學徒日多文具日益飾而往時質厚強直之風寖衰矣此自器識者較論耳顧其學又日益塗岐而師悖也彼曲士束於教無足論者中材者足達于思慮乃多記誦剽竊恱其徑省不自以為襲陋何耶至俊異之士復自以神頴天授怠于誦法即髙才厚稟何為也其性習學術大較若斯矣以今視昔蓋俊茂同稱而德業殊歸豈山川之氣盛衰固有時耶將教化漸摩使然也先生其有意督教之耶先生之教京畿廣西也其程業惟行誼與經術耳時復用風節勵俗於文詞不盡據也要使人名實不失以此務為治者也豈非道德之符而成材之驗耶此獨不可以施之關中耶秦諺曰峙高一丈築堵八尺言人以模成也今而後關中多彬彬文質之士矣即由此復先達之風軼漢唐而上之寖及成周惟先生風教聲容所變化耳先生將趨視事方伯髙先生屬余贈言余關中人竊幸關中士得良師也願先生復吾關中之故至先生德學在論思聲華賁海內者不盡稱述云送張南溪巡撫延綏序李宗樞嘉靖壬寅秋冦入雁門攻太原至榆次踰月遁去上乃顓任武臣選士厲兵簡練傑俊先事豫防是時延綏撫臣闕銓部以河南左丞南溪張公請于上以公為右副都御史往撫其地于是一時大夫卿士咸曰邊鎮得賢云余聞之曰天子其無西顧之憂也乎我國家之御戎也西北為要監以憲臣宿以重兵虎視鯨吞屹不可犯歸義欵塞百有餘年而邊陲晏然夫安久則怠怠久則弛考工踈而器械無犀利之用校人懈而馳驅無膚幹之資度支玩而廪廯無轉輸之積重之以飢饉薦臻疫癘駢作是以攻守靡利藩籬漸踈邊兵深入職此之由夫延綏五路之襟喉三秦之要區孤懸絶漠控制諸邊左提右攜罥足扼吭固今之雄鎮也公以雄才贍智令德宿望𢎞而毅沉靜而多謀威而不猛又嘗歷三曹忤權貴謪百粵遷越郡振藩臬明刑中土敷教湖南氣節文章𢎞烈茂績照耀寰區其在關中也為僉憲為參政決議贊政尤積有嵗年泝洪河躡華嶽越𢎞化窺靈武陟賀蘭攬朝那登降於北地上郡之間今皆密邇節鉞之地壯猷多算元鑑洞窺變化翕闢於胸中久矣𢎞毅者任重之器也沉靜而多謀者理事之才也威而不猛者御衆之道也惟公鎮之以器則不震不動運之以才則不戁不竦而董之以威綏之以仁而又紓豫定之䇿樹不朽之勳弊剷蠧除憊興困蘇工勵而器械精圉勸而驅馳備廪廯程而轉輸充動作協變通制備垂永久破膽之謡此中故事非公其疇嗣之余固知天子無西顧之憂也簡書既降戒行有期諸大夫咸歌詠以頌公右丞豐山孫公暨諸大夫謂余關中人也侍公教且久俾敬述明德作此序辭逰嶽草序魏學曽萬厯甲申余司農南中諸曹少事而尚詞翰矜名行而嚴品藻每論文則率稱數范比部云時余歸思困衡未及與相從論議歸無何而比部以僉事來巡我關內余私為一路慶幸謂詩腸騷臆襟期自軼而圖回必踔絶也久之范公與分守原公逰華山窮日三嵱嵷畢歷其意興如此逰有作原公刻之曰逰嶽草記一斷為五賦一詩十有二余得而覽之曰是安可弗傳也自昔滁山章於歐記三都錯陳於左賦廬山以文通吟呈秀鍾山以休文五咏騁靈其所從來久逺矣蓋繪形圖貌資於記匪核弗肖標美讃徽取諸賦匪麗弗闡摛韻語而發繹思得於詩匪超弗悟三善誠具斯與勝迹並傳矣今讀記若得其體勢焉賦若得其光景焉詩則不覺神爽與山靈飛揚也斯謂之核之麗之超非耶余竊觀張華見太沖賦咨嗟其美江沈皆以才俊蜚聲江左而永叔又為趙宋一代名筆則其諸作傳也非直善揚榷亦以其風格勝而藻繪芳潤耳周濓溪曰美則愛愛則傳輪轅飾而厥行逺也信夫華嶽自韓退之登陟懼莫能下以來聲益卓詭而方內耽竒嗜勝之士孰不思陟其峰嶂縱其駭矚往往以逺莫致之為憾茍得是草可以不出户庭而愜登眺之想有不把玩不忍釋者乎刻華嶽全集序賈待問國家盤盂嵗久策素日彬亡言嶞山喬嶽仙島洞天即丘壑擅一隅之勝岑巒供四眺之竒靡不咀墨鋪棻殺青表振直將藻渾沌之支俾令起色倩愚公之力移向含毫豈其配天之嶽而鮮垂世之文哉余自解褐入關迄建旄分陜其道華下者數矣仰金天之聳翠訪玉井之開祥展禮修虔陟髙矚逺彼層巖之屹􅝝􅋂巇煙嵐之巊溟鬱􅔍面面駴目色色賞心顧讀所為華山集者既品析之棼殽亦搜羅之挂漏山靈幾溷文獻曷徵焉二憲天中張君鎮潼之暇亦斯是慨乃謀手編俾鐫掌故不再月而工竣謁敘於余余維自二儀肇判揭天柱而維地軸者嶽為尊自五位攸分鎮神臯而通帝座者華為貴彼其靈鍾而聖神立極奧祕而文物開先德配金行氣肅玉宇麗澤為兌八埏説少皥之成闔户謂坤萬品遂蓐收之利此非獨一方之賴也介江河而內峙樞區宇以中蟠矗天峭壁五千仞之削成插漢懸崖四十里之直上頺峰瞰若木之陽飛瀑瀉芙蓉之露此非獨一方之雄也唯是分封畫野首雍寧秦使四塞之疆永安歸馬八水之澨常咏維魚則關以西之所倚命登耗與蒞關西者之所藉手報塞者爾夫人非嶽罔與銷祲錫羡而輳乂安嶽非人罔與闡幽祚世而揚景鑠􅑴昔軒逰舜望邈矣遐哉王降而漢隋代遷於唐宋法駕時禋肹蠁素靈之趾桓碑世勒扶輿白帝之墟爰逮熙明益隆崇奉髙皇夢遊而秩祀列聖殷薦於報祈疇匪懷靈貺而明禋感神功以幽贊者乎張君是役也冥搜窮索托故增新豕亥刋訛魚珍核謬更昈列而星分遂雲蒸而霞變不惟使西嶽之雄秀畢呈東井之文明載煜而按圖牒見神竒之天造稽藏育識英淑之地靈考秩祀而典神厚下之義明諦詞賦而揚休寄興之思遠允矣人祗共快孰云化理無關他若神迹仙蹤之臚列玄棲道宇之刺陳物有異而胥書事無詭而不纂凡詞客騷工幽人達士不必覓九節之竹躡三峰之椒而閴處軒庭間披几案可以攬真境而靡遺收大觀於坐致張君用意不其勤與彼徒組山繪谷而奓夸誣語怪志恢以餌登覽則向者剽勝傳竒之所或然不同類而稱矣張君昔司諫議挺徑直之孤標再飭韜鈐肅威嚴之偉望然則斯刻也其亦有與嶽相印證者哉明文西序高𢎞圖關中友人韓聖秋氏於辛巳之春裒集其鄉先達之文拔尤擇粹得若干卷名曰明文西以示不佞且曰詩于是書也匪第惟文之求將必其學有源本而言有關切者然後收焉其辨言也微公莫可矣爰為之敘曰夫文章之道方巨公碩儒馳騁上下之時其聲價恆不易定及其氣運一小易然後瞭然見其分際焉故立乎東京以察西京立乎至德寶應以察貞觀斯莫有晰焉者矣身至其間而立乎其後以察乎其前愈莫有晰焉者矣不佞曩者承乏按秦所至觀古人之迹以及國朝諸名士之原委頗能略悟文章之運竊怪學者稱文章自周次秦漢他莫敢望斯論既確而未免專以秦豫秦也夫二陜之為秦斷自襄公暨始皇耳前此為西周後此為西漢故夫周秦漢一地也而周文秦文漢文一書也人皆能知而皆如不知是故以詛楚逐客為秦文而不知周官大誥勸農貴粟之未嘗非秦文以車𥻘駟鐵為秦詩而不知清廟生民房中天馬之未嘗非秦詩何哉雖然一氣而數變則有可得而論者焉大抵周之文居二代聖人簡言之後而發揮本朝忠厚制作之意是獨為郁郁厥後道術爭鳴皆燦然若繁星之麗顧其雄才絶力類非後世之所及是宇宙一大結集也其文因而非襲始皇帝燔上世之書自為制詔碑頌其雄霸鷔之氣前無古昔然資稟甚異譬如孟賁烏獲雖不由師授而拳勇過人其文熄而能創漢人承秦之徑烈摹周之溫雅以經術儒藻行其髙視濶步究竟于秦近而於周逺其文倣古而能離也至我國朝北地崛起槐野諸公繼之遂欲踰越唐宋六朝而逺紹乎周秦漢兹惟囏哉然而列聖之所培植山川之所孕鍾其人文之盛雄剛古峻可以不愧曩哲至其讜言名論彪炳日星抑又有過之者原其胚胎奄有三代典則得之周經術得之漢氣概得之秦其斯為用物𢎞者與卓哉韓子之以西名其書也西則備而秦則偏西則通而秦則礙於以觀周漢之全而鳴昭代之盛如是乃得之爾何其與鄙言吻合也不佞手其書恤其苦焉為其網羅放失于流離去國之餘也偉其識焉為其斷制去取於一代浩繁之後也服其忠焉為其以述代作以筆代舌卷帙之內且見其上佐朝廷之忱也是故秦以詞賦聲律雄天下而韓子所甄拔諸篇其為關係國家之治亂講求學術之邪正分别人品之忠佞者居十之七八其它風雲月露之章往往在所略雖間不廢必其敷陳比興有豳風之遺意者焉不佞謬謂此書臣下輯之蘇軾繕寫陸疏之意也君上録之漢宣追用賈䇿之道也昭明遜其質而東萊遜其雄求其匹儷其西山氏乎可謂大而精矣所謂立乎東京以察西京且身至其間者不佞之有感于斯文不既深哉若夫聖秋氏之才方及時建樹不朽之業庸詎止此蓋三原之為天下望也唐之衛公精治兵明之端毅善治國聖秋行將鼎足而三之乎聖秋謀斷兼長名動君相向讀其復秦討賊一疏不佞固已心韙之矣重刻三輔黃圖序本朝顔敏陜轄古之都城三輔故事不勝捆掇相傳黃圖最為詳核舊有板在司今亡矣豫公餘乃重刻之序曰稽古不其難哉黃圖自序裒採秦漢以來宫殿門闕樓觀池囿在關輔者著於篇東都不與焉追溯三代之儉愾歎秦穆惠文始皇之汰侈又以隆準創業文景休養致惜於茂陵土木之役折𠂻于春秋謹用民力之大旨作者良亦苦矣文獻通考朝氏以為廣引劉昭漢志出于梁陳之間陳氏以為引用應劭漢書解如淳顔師古復引此書意漢魏間所作新安程尚書泰之雍録則辨其有唐縣名且晉灼所引黃圖皆今書所無蓋唐人續成之非見漢事者嗟乎稽考信疑非深心博雅之士烏能諦審其書哉以豫所聞宋敏求長安志葛稚川關中記吕汲公大防長安圖記張禮遊城南記何大復雍大記皆與黃圖相為不泐豫力薄不能遍梓是則可愧也後之君子尚其鑒諸重刻西京雜記序前人秦藩舊有西京雜記刻本燬不存矣豫既刋三輔黃圖因并付梓序之曰稚川廣先生志載秦事者一曰關中記顧以略弗傳一曰西京雜記即今本也宋馬端臨經籍考稱其掇集劉子駿之作豫按洪傳洪蓋神仙家流也晉之時尚清談博贍詳洽則近於世人聞見之儒宜其不無枘鑿而稚川獨嗜好之不少倦竊嘗論正史浩繁是非凜凜小説家得以乘其間而中之天下戔戔之小儒反有取於稗乘此幾近于蠅紫之惑人乃其質而有據者司馬涑水作通鑑時亦所不棄吾于稚川雜記雅重其不詭於史而又嘉其不淪於小説也文章之道永垂不易性命微奧經濟𢎞逺學者故有其人而事物紛賾之原充於緗素者尤為學士之所崇以資舌華以飽貧腹以供漁獵以助著述由雜記而拓之四庫七録吾其弗能已矣陳子厚關中紀遊詩序陳維嵩潼關六扇擎出蓮花棧道千盤矗成箭括咸陽原冷百王之賸壘連雲盩厔城空千古之殘碑蝕土星分井鬼陋吳越之輕華地踞雍涼笑燕齊之迂怪千家板屋人多以擊缶相娛一曲車轔俗盡以彈筝為業自戰國張儀而後競誇天府之雄至嬴家成蟜而還都説關中之勝吳季札觀風而夏之審厥聲乎賈長沙弔古而過焉論其世耳然而地雖莽濶成敗偏多氣實高蒼興亡不少軹道乃降王之祖驪山為竊國之魁邯鄲東走既從來惻愴之鄉灞滻北流亦自古嶔崎之地間愁疊疊紛于太華之旒歷劫綿綿多似櫟陽之韭千年繡嶺墮珥遺鈿一派溫泉殘脂棄粉雨淋蜀道偏愁阿犖之來月照鎬池獨惜祖龍之去遂使長陵寶碗恆隨鸚鵡以宵啼徒令小市金箱每共獾狐而晝舞我之懷矣慎毋為汧渭之行人卿欲愁乎何事作邠岐之遊子然而吾家南阮饒有才情昨嵗西行偏多慷慨三輔則宫中行樂之窟羅綺衯裶二陵則霸朝酣鬭之場幡幢撞擊姚萇殿上一種斜陽赫連城前幾番蔓草銅琵劈裂消磨異代之悲鐵撥沉雄淘洗前朝之恨字如柈大揮毫而漫興猶顛墨似鴉粗擲筆而老狂欲旋嗟乎美人鐘鼓阿房則昔事都非劍客弓刀嶢關則其人安在黃沙浩浩空圍漢主離宫碧海茫茫長挂秦時明月是用倚馱鞍而製恨和鈴柝以言哀隴禽解唱定翻成突厥之鹽秦女如花須採入西京之記贈陳方伯序施閏章宫詹學士陳先生出為山東右布政使一年遷陜西左使以行秦方用兵羽書旁午其民獷悍不馴婦人女子皆習戰好鬬嵗又薦飢芻餉無出幅員數千里飛挽不繼非得武健嚴酷之人勢不足以集事雖然獨不見先生所以治齊者乎齊之民急利好詐走死如騖至獷悍不馴也先生至則錢法行盜鑄息市肆不擾上下以和中丞直指之按部者罔不首推轂諸司大夫及縉紳先生皆相得甚歡雅善書法人爭貯墨汁紈素伺間乞書得則以為幸其見慕如此攝左司數月簿書錢榖無愆期御事和平而政日以舉行之既效矣移其治齊者治秦何難焉且秦苦兵荒久矣以鳩形鵠面之遺黎剜肉醫瘡又不善其拊循申其期會而徒操切是務吾不知武健嚴酷者之得失何如也夫民肢體也財膏血也瘡痍之民黃項稿膚形容憔悴迫而索其膏血立斃耳不若舒其手足導其筋力而後膏血可得而貫輸也先生亦移其治齊者治秦可矣時陸大夫石齋出餞聞余言而善之曰是可以贈先生行矣思齊樓序鈕琇鄭人聘晉曽傳塓館之詞單子入陳亦舉除門之制是知三農已暇非無藉於宫功百堵攸興洵有求于邑政况乎周遭僻谷密邇嚴關戒徼道而列楹用設不虞之限表端闈而奠磶宜崇有伉之規此爽塏所以憑髙而麗譙于焉特立者也維兹白水聳峙重闉樓曰思齊冠之公署工于掞藻在宋則寧尉題碑𢎞以寫謀維明則張公建榜來四山之朝爽棟宇巋然送千祀于夕陽嵗華邈矣粵自險通翟道腴遜鳳原當赤伏之遽興或緑林之竊發閭無植鎩危等瞻烏士亦登陴亂經逐鹿以是荒垣雨斷柱榴蜜而頻穿落構霞殘瓦零鴛而並坼雖盛朝耆定天流閣道之輝而小邑雕疲人憚門材之役余也聿來吳市隱吏愧乎梅仙適尹彭衙好事儕乎孫宰慨斯頽圮勉是經營乃割俸於鳥翎遂興戌築方會辰於龍􅔀旋見子來程以畢月之工費無中人之産即山攻石不假鞭驅因木呈材仍加蜃寫修牆賦白偃壘澀而波縈反宇流丹橋飛簷而虹指雙規牖啓參差翡翠之楣肆曲欄回宛轉芙蓉之檻於是公餘曵履興至橫眸邇接神臯城馮桑落逺臨仙掌嶽望蓮開西矚頻山則將軍美宅尚遺汗馬之勳東睎沙苑則丞相舊衙未泯棲鸞之迹爾其雪消鶯至雲斷鴻來林壑在懷郊原入望耕犁曉出紅破蹊華牧笛晚歸青翻隴麥倒景落平疇之外孤煙生别嶂之中座可鳴琴非僅期乎物阜野無懸耜應重閔乎人勞至乃新絲曵栁條踠芳塵古癭垂槐隂浮畫堞却扇而祛畏日披襟以快雄風儐而豆籩召兹僚友疏簾飛燕分題喜雨之篇森木鳴蟬重展凌歊之席豈無仙伯追尹賞之風流亦有嘉賔來杜陵之拓落蓋嘗曠觀陸幕境歷盈虛周覽三墳事多成毁固有家藏金埒園仿玉津高閎容十丈之旗華屋照千尋之杏既而鶴歸如夢忽改平蕪鴉起欲啼但留衰樹此皆侈而非度計已失於殫財私以自營業何堪於永世維夫規模由舊既用宜民廢墜聿新實因體國堪當禁楄之重奚厭增華役無鼛鼓之煩寧忘示後爰為原其經始聊擬綿州雪嶠之圖及此落成尚待歷下雲莊之詠璿璣圖詩序丁腹松吟腸簇繡浪説錦心韻府團花稀逢妙手薰香傅粉不過粗曉之無染翰停針亦止略諧競病人傳騷賦屈嬃但假留名情溢風詩衛女惟能寫怨荀粲房中之令範掞藻誰聞高柔室內之賢荆抒竒莫覩砑紅箋滑空題江月于掖庭擲謝梭輕僅製綾花於午牖蔡文姬拍成紫塞無非帳外吹笳卓文君吟就白頭終是壚邉口號氷綃寸寸仙機織去尚少文章春鳥雙雙巧繡拈來曽無點畫粵自秦風多競秀育竒英扶地常靈慧鍾淑媛則有門楣竒麗品第清華望重班姬蘇武功之季女名高鮑妹竇安南之孺君翠袖分歡緑衣搆隙聽琵琶於隔院譜疊新聲冷琴瑟于空閨絃翻别調夭桃甫艷何來牆外之枝睡鴨初濃竊訝花間之蝶且也妾居渭北思子三秋郎别襄南去家千里悵衡山之雁斷石亦望夫傷錦水之鴛孤津非妬婦已矣大刀環折幾回破鏡飛天悲哉團扇風淒一旦齊紈棄篋難同弄玉雙吹鳳竹以遊仙翻羡王章共卧牛衣而灑泣託私心於紅鯉羞緘徐姬之書散曉夢於黃鶯欲蕩湘娥之魄於焉愁連逺黛恨壓遙峰夜月機絲叩天孫而祈巧空廊杼柚借雲錦以摛文頻抽繭絲而彌長情詞顛倒愈剝蕉心而入妙章句縱橫自非怨海千重奚覩縷言而皆血祗以腸回九曲遂驚轉韻之如綸天工奪而南朝之金粉盡若泥沙凡艷空而北鄙之胭脂皆同瓦礫周邦士女從前枉説綺羅秦國山川自此不生花草僕也天涯薄宦惜潘鬢之徒雕海角迂儒愧江花之早謝有懷弔古驅車而過織錦之臺乘興探竒展卷而覽回文之譜搜自梳粧記內採芳久許無雙選歸翰墨林中倣艷今推第一沉之碧海言言成鮫女之珠鐫以青天字字化媧皇之石爰嗣曩帖用綴新詞倘常璩成編便合函以玳瑁或殷淳彚集何妨軸是珊瑚公為宇內之竒觀留作枕中之祕妙陜西通志序朱軾志書所載義例不一而所最重者曰人物曰風俗曰山川形勢所以辨疆域昭盛衰于是乎在雍州山河壯麗甲天下其民其俗文武成康之所遺也二南尚矣小戎無衣猶有忠愛之遺意焉漢興扇以仁義導以恭儉西京習尚頗為近古唐承隋後溺於侈靡然長安冠裳文物號稱極盛宋明人材輩出若橫渠張子藍田吕氏師弟子之倡學與濓洛並稱下逮呂仲木韓苑洛馮少墟諸先生篤志純修風流未歇也本朝重熙纍洽日月漸摩我皇上夀考作人化成久道薄海喁喁嚮風思皇之彥霞蔚雲蒸况此姬周故壤三輔舊地有不翹然奮興者乎余奉簡命視學兹土遍歷三邊八郡所在諸生衣冠淳朴無子襟佻達之習制藝古文詞未盡歸大雅每有竒傑傲岸不可磨滅之氣吳季札所謂夏聲是耶若夫二華太白朱圉鳥鼠崆洞之嵳峩涇渭潦潏江源漢脈之洸漾古先帝王賢聖陵墓以及韋杜曲江華嚴石鼓輞川諸勝迹莫不憑眺徙倚悠然動懷古之思而幽岸絶壑穴居野處之民垂老不覩長吏之面聞使者至往往扶杖牽袂相與逢迎於秦碑漢篆之間為道山川溪谷之遷變指示古人居處逰歷之處而嵗時方社吹豳飲蠟與夫攜筐挈筥饁婦耕夫依媚之狀歷歷車塵馬足間也古者輶軒採風上之天子今之學使其即古採風之職歟蓋全秦之人文風俗山川形勢凡官于秦生於秦者之所未盡識而學使者早已志之目以志之心矣今夏歸青門適中丞永公補刻通志告成授余為序余翻卷披閲覺二年中所歷山容水態民情土俗畢呈于書䇿琴瑟之旁又念奉命以來日夕兢兢畏此簡書所至宣揚聖天子愛養元元移風易俗之至意父老子弟有聞而泣下者人心之淳窺見一斑矣至黌宫士子讀書勵行亦已日月改觀而使者之所望猶不止此也於是進諸生而告之曰教化之所薰蒸山川之所鬱積其深者釀為風俗其顯者著於人文多士生邠岐豐鎬之墟沐聖朝棫朴菁莪之化憤發振興將必有如橫渠藍田仲木苑洛諸先生者出焉夫克己修身稱先則古學不如古人不止行不如古人不止于以黼黻休明主張世道風化賴以蔚興河嶽增其光耀是則中丞之所期待乎諸生而亦採風使者之厚幸也遂書以為序圬者王承福傳唐韓愈圬之為技賤且勞者也有業之其色若自得者聽其言約而盡問之王其姓承福其名世為京兆長安農夫天寶之亂發人為兵持弓矢十三年有官勳棄之來歸喪其土田手墁衣食餘三十年舍於市之主人而歸其屋食之當焉視時屋食之貴賤而上下其圬之傭以償之有餘則以與道路之廢疾餓者焉又曰粟稼而生者也若布與帛必蠶績而後成者也其他所以養生之具皆待人力而後完也吾皆賴之然人不可遍為宜乎各致其能以相生也故君者理我所以生者也而百官者承君之化者也任有大小惟其所能若器皿焉食焉而怠其事必有天殃故吾不敢一日舍墁以嬉夫墁易能可力焉又誠有功取其直雖勞無愧吾心安焉夫力易強而有功也心難強而有智也用力者使于人用心者使人亦其宜也吾特擇其易為而無愧者取焉嘻吾撡墁以入富貴之家有年矣有一至者焉又往過之則為墟矣有再至三至者焉又往過之則為墟矣問之其鄰或曰噫刑戮也或曰身既死而其子孫不能有也或曰死而歸之官也吾以是觀之非所謂食焉怠其事而得天殃者耶非強心以智而不足不擇其才之稱否而冒之者耶非多行可愧知其不可而強為之者耶將富貴難守薄功而厚饗之者耶抑豐悴有時一去一來而不可常者耶吾之心憫焉是故擇其力之可能者行焉樂富貴而悲貧賤我豈異于人哉又曰功大者其所以自奉也博妻與子皆養于我者也吾能薄而功小不有之可也又吾所謂勞力者若立吾家而力不足則心又勞也一身而二任焉雖聖者不可能也愈始聞而惑之又從而思之蓋賢者也蓋所謂獨善其身者也然吾有譏焉謂其自為也過多其為人也過少其學楊朱之道者耶楊之道不肯拔我一毛而利天下而夫人以有家為勞心不肯一動其心以畜其妻子其肯勞其心以為人乎哉雖然其賢于世之患不得之而患失之者以濟其生之欲貪邪而忘道以喪其身者其亦逺矣又其言有可以警豫者故豫為傳而自鑒焉宋清傳栁宗元宋清長安西部藥市人也居善藥有自山澤來者必歸宋清氏清優主之長安醫工得清藥輔其方輒易讐咸譽清疾病疕痬者亦皆樂就清求藥冀速已清皆樂然響應雖不持錢者皆與善藥積劵如山未嘗詣取直或不識遙與劵清不為辭嵗終度不能報輒焚劵終不復言市人以其異皆笑之曰清蚩妄人也或曰清其有道者歟清聞之曰清逐利以活妻子耳非有道也然謂我蚩妄者亦謬清居藥四十年所焚劵者百數十人或至大官或連數州受奉博其餽遺清者相屬於户雖不能立報而以賖死者千百不害清之為富也清之取利逺逺故大豈若小市人哉一不得直則怫然怒再則罵而仇耳彼之為利不亦翦翦乎吾見蚩之有在也清誠以是得大利又不為妄執其道不廢卒以富求者益衆其應益廣或斥棄沉廢親與交視之落然者清不以怠遇其人必與善藥如故一旦復柄用益厚報清其逺取利皆類此吾觀今之交乎人者炎而附寒而棄鮮有能類清之為者世之言徒曰市道交嗚呼清市人也今之交有能望報如清之逺者乎幸而庶幾則天下之窮困廢辱得不死亡者衆矣市道交豈可少邪或曰清非市道人也栁先生曰清居市不為市之道然而居朝廷居官府居庠孰鄉黨以士大夫自名者反爭為之不已悲夫然則清非獨異于市人也種樹郭槖駝傳前人郭槖駝不知始何名病僂隆然伏行有類槖駝者故鄉人號之槖駝聞之曰甚善名我固當因捨其名亦自謂槖駝云其鄉曰豐樂鄉在長安西槖駝種樹凡長安豪富人為觀遊及賣果者皆爭迎取養視駝所種樹或移徙無不活且碩茂蚤實以蕃他植者雖窺視效慕莫能如也有問之對曰槖駝非能使木壽且孳也能順木之天以致其性焉耳凡植木之性其本欲舒其培欲平其土欲故其築欲密既然已勿動勿慮去不復顧其蒔也若子其置也若棄則其天者全而其性得矣故吾不害其長而已非有能碩茂之也不抑耗其實而已非有能蚤而蕃之也他植者則不然根拳而土易其培之也若不過焉則不及茍有能反是者則又愛之太恩憂之太勤旦視而暮撫已去而復顧甚者爪其膚以驗其生枯搖其本以觀其疏密而木之性日以離矣雖曰愛之其實害之雖曰憂之其實讐之故不我若也吾又何能為哉問者曰以子之道移之官理可乎駝曰我知種樹而已理非吾業也然吾居鄉見長人者好煩其令若甚憐焉而卒以禍旦暮吏來而呼曰官命促爾耕朂爾植督爾穫蚤繅而緒蚤織而縷字而幼孩遂而雞豚鳴鼓而聚之擊木而召之吾小人輟飱饔以勞吏者且不得暇又何以蕃吾生而安吾性耶故病且怠若是則與吾業者其亦有類乎問者嘻曰不亦善夫吾問養樹得養人術傳其事以為官戒也梓人傳前人裴封叔之第在光德里有梓人欵其門願營隟宇而處焉所職尋引規矩繩墨家不居礱斫之器問其能曰吾善度材視棟宇之制髙深圓方短長之宜吾指使而羣工役焉捨我衆莫能就一宇故食于官府吾受祿三倍作於私家吾收其直大半焉他日入其室其牀闕足而不能理曰將求他工余甚笑之謂其無能而貪祿嗜貨者其後京兆尹將飾官署余往過焉委羣材會衆工或執斧斤或執刀鋸皆環立嚮之梓人左持引右執杖而中處焉量棟宇之任視木之能舉揮其杖曰斧彼執斧者奔而右顧而指曰鋸彼執鋸者趨而左俄而斤者斫刀者削皆視其色俟其言莫敢自斷者其不勝任者怒而退之亦莫敢愠焉畫宫于堵盈尺而曲盡其制計其毫釐而構大厦無進退焉既成書于上棟曰某年月日某建則其姓字也凡執用之工不在列余圜視大駭然後知其術之工大矣既而嘆曰彼將舍其手藝專其心智而能知體要者與吾聞勞心者役人勞力者役於人彼其勞心者與能者用而智者謀彼其智者與是足為佐天子相天下法矣物莫近乎此也彼為天下者本於人其執役者為徒𨽻為鄉師里胥其上為下士又其上為中士為上士又其上為大夫為卿為公離而為六職判而為百役外薄四海有方伯連率郡有守邑有宰皆有佐政其下有胥吏又其下皆有嗇夫版尹以就役焉猶衆工之各有執伎以食力也彼佐天子相天下者舉而加焉指而使焉調其綱紀而盈縮焉齊其法制而整頓焉猶梓人之有規矩繩墨以定制也擇天下之士使稱其職居天下之人使安其業視都知野視野知國視國知天下其逺邇細大可手據其圖而究焉猶梓人畫宫于堵而績於成也能者進而用之使無所德不能者退而休之亦莫敢愠不衒能不矜名不親小勞不侵衆官日與天下之英材討論其大經猶梓人之善運衆工而不伐藝也夫然後相道得而萬國理矣相道既得萬國既理天下舉首而望之曰吾相之功也後之人循迹而慕之曰彼相之才也士或談殷周之理者曰伊傅周召其百執事之勤勞而不得紀焉猶梓人自名其功而執用者不列也大哉相乎通是道者所謂相而已矣其不知體要者反此以恪勤為公以簿書為尊衒能矜名親小勞侵衆官竊取六職百役之事躬聽於府庭而遺其大者逺者焉所謂不通是道者也猶梓人而不知繩墨之曲直規矩之方圓尋引之短長姑奪衆工之斧斤刀鋸以佐其藝又不能備其工以至敗績用而無所成也不亦謬歟或曰彼主為室者倘或發其私智牽制梓人之慮奪其世守而道謀是用雖不能成功豈其罪耶亦在任之而已余曰不然夫繩墨誠陳規矩誠設髙者不可抑而下也狹者不可張而廣也由我則固不由我則圮彼將樂去固而就圮也則卷其術默其智悠爾而去不屈吾道是誠良梓人耳其或嗜其貨利忍而不能捨也喪其智量屈而不能守也棟撓屋壞則曰非我罪也可乎哉余謂梓人之道類於相故書而藏之梓人蓋古之審曲面勢者今謂之都料匠云余所遇者楊氏潛其名圉人傳宋司馬光汧侯有馬悍戾不可乘服以為無用將棄之野愛其疾足募有能馴之者祿以百金有圉人叩門而告曰臣能馴之汧侯使養馬數月馬益調服步驟緩速折還左右唯人所志汧侯喜賞以百金之祿拜為圉師衆騶疾之謁於侯曰侯馬今馴矣彼何功而徒費侯金臣請代之侯逐圉人居數月馬復悍戾如故侯乃召圉人而謝曰子能使悍馬馴子去而馬復悍敢問何術也對曰臣賤夫也不知異術而惟養馬之知夫馬太肥則陸梁太瘠則不能任重䇿之急則駭而難馴緩則不肯盡力善為圉者渴之飢之飲之秣之視其肥瘠而豐殺其菽粟緩之以盡其才急之以禁其逸鞭䇿以警其怠御控以馴其心使之得其宜適而不勞亦不使有遺力焉其術甚微得於心應於手已不能傳之於人人亦不能從已傳也如此故馬之材在馬馬之性在我雖悍疾何傷哉汧侯曰善圉人曰是術也豈特養馬而已抑治國亦猶是也夫材智之士治國者之悍馬也捨之則不能以興功業御之不以道則不獲其利而桀黠不可制故明君者能用材智之士而以爵祿賞罰御之是以爵太髙則驕祿太豐則惰驕惰之臣雖有智力君不得而使也制之急則不得盡其能制之緩則不肯宣其用不任恩渥一驅之以威則愁怨而離心故明君者節其爵祿裁其緩急恩澤足以結其心威嚴足以服其志則士生死貴賤之命在於君矣雖僄悍何憂哉汧侯恱位為上卿任以國政用其術推而行之汧國大治諫逐客書秦李斯臣聞吏議逐客竊以為過矣昔繆公求士西取由余於戎東得百里奚於宛迎蹇叔於宋求丕豹公孫支於晉此五子者不産於秦而繆公用之并國二十遂霸西戎孝公用商鞅之法移風易俗民以殷盛國以富強百姓樂用諸侯親服獲楚魏之師舉地千里至今治強惠王用張儀之計拔三川之地西并巴蜀北收上郡南取漢中包九夷制鄢郢東據成臯之險割膏腴之壤遂散六國之從使之西面事秦功施到今昭王得范睢廢穰侯逐華陽強公室杜私門𧖟食諸侯使秦成帝業此四君者皆以客之功由此觀之客何負於秦哉向使四君却客而不內疏士而不用是使國無富利之實而秦無強大之名也今陛下致崑山之玉有隨和之實垂明月之珠服太阿之劔乘􅊏離之馬建翠鳳之旗樹靈鼉之鼓此數寶者秦不生一焉而陛下説之何也必秦國之所生然後可則是夜光之璧不飾朝廷犀象之器不為玩好鄭衛之女不充後宫而駿良駃騠不實外廄江南金錫不為用西蜀丹青不為采所以飾後宫充下陳娛心意悅耳目者必出於秦然後可則是宛珠之簪傅璣之珥阿縞之衣錦繡之飾不進於前而隨俗雅化佳冶窈窕趙女不立於側也夫擊甕叩缶彈筝摶髀而歌呼嗚嗚快耳目者真秦之聲也鄭衛桑間韶虞武象者異國之樂也今棄擊甕叩缶而就鄭衛退彈筝而取韶虞若是者何也快意當前適觀而已矣今取人則不然不問可否不論曲直非秦者去為客者逐然則是所重者在乎色樂珠玉而所輕者在乎人民也此非所以跨海內制諸侯之術也臣聞地廣者粟多國大者人衆兵強則士勇是以泰山不讓土壤故能成其大河海不擇細流故能就其深王者不卻衆庶故能明其德是以地無四方人無異國四時充美鬼神降福此五帝三王之所以無敵也今乃棄黔首以資敵國卻賔客以業諸侯使天下之士退而不敢西向裹足不入秦此所謂藉冦兵而齎盜糧者也夫物不産於秦可寶者多士不産於秦而願忠者衆今逐客以資敵國損民以益讐內自虛而外樹怨於諸侯求國無危不可得也招摯峻書并序漢司馬遷摯峻字伯陵京兆人與司馬遷友善隱于岍山遷以書招之曰太上立德次立功次立言伏惟伯陵材能絶人髙尚其志氷清玉潔不以細行荷纍其名固已貴矣然未盡太上之所由也報司馬遷摯峻君子量能而行度德而處故悔吝逺于身利不可虛受名不可茍得漢興以來帝玉之道于斯始顯能者見利不肖者自屏此其時也與楊湛書薛宣吏民條言君如牒或議以為疑于主守盜馮翊敬重令又念千金法重不忍相暴章故密以手書相曉欲君自圖進退可復伸眉於後即亡其事復封還記得為君分明之移櫟陽令謝遊書前人吏民言令治行煩苛適罰作使千人以上賊取錢財數十萬給為非法賣買聽任富吏賈數不可知證驗以明白欲遣吏考按恐負舉者恥辱儒士故使掾平鐫令孔子曰陳力就列不能者止令詳思之方調守與荀彧論關中歸民書衛覬關中膏腴之地頃遭荒亂人民流入荆州者十萬餘家聞本土安寧皆企望思歸而歸者無以自業諸將各競招懷以為部曲郡縣貧弱不能與爭兵家遂強一旦變動必有後憂夫鹽國之大寶也自亂來放散宜如舊置使者監賣以其直益市犁牛若有歸民以供給之勤耕積粟以封殖關中逺民聞之必日夜競還又使司𨽻校尉留治關中以為之主則諸將日削官民日盛此強本弱敵之利也與岐州刺史鄭孝穆書北魏宇文泰知卿蒞職近畿留心治術凋弊之俗禮教興行厭亂之民襁負而至昔郭伋政成并部賈琮譽重冀方以古方今彼有慙德上西嶽書唐李靖布衣李靖不揆狂簡獻書西嶽大王閣下靖聞上清下濁爰分天地之儀晝明夜昏乃著神人之道又聞聰明正直依人而行至誠感神信不虛矣伏惟大王嵯峩擅德肅爽凝威為靈術制百神配位名雄四嶽是以立象清廟作鎮金方遐觀歷代哲王莫不順時禋祀興雲致雨天實肯從轉孽為祥何有不賴嗚呼靖者一丈夫耳何得進不偶用退不獲安呼吸若窮地之魚進退似失林之鳥憂傷之心不能己巳社稷陵遲宇宙傾覆姦雄競逐郡縣土崩遂欲建義橫行雲飛電掃斬鯨鯢而清海嶽卷氛祲以闢山河使萬姓昭蘇庶物昌運即應天順時之作也又大寶不可以妄據欲仗劍竭節未有飛龍在天捧忠義之心身傾濟世志吐肝膽於階下惟神鑒之願告進退之機遂得平生之志有賽德之時終陳擊鼓若三問不對亦何神之有靈然後即靖斬大王頭焚其廟建縱橫之略亦未晚也惟神裁之識皇太子玉華山宫銘賦啓許敬宗昨晚內坊丞王君德奉宣全賚臣等玉華山宫銘賦二本拜承恩貺駭忭交懷跪玩清辭星河溢目伏惟殿下天資學府道貫生知絢發詞林若春華之麗韶景漪清碧海譬秋水之淡晨霞仙鶴和吟慚八音於雅韻神龍縟彩謝五色于雕文綺布天庭雲生石砌理含貞邃雅達谷處之端趣極幽間妙盡嵓居之體煙松合翠露桂分紅察彼殊形翻然共色究寫真之奧旨擅體物之窮神若乃漢月鈎空乍臨珠箔石苔垂髮或映莊帷莫不理超詞表意生文外自餘清拔觸類竒新成若神化之工光乎性道之製蓋由基天挺裕纂聖凝離故能邁古超前納卿雲於度內逾儔絶侣括啓誦於胸中臣等忝荷殊私曲蒙垂示見所未見情百恆情無任鳬藻之懷謹上啓陳謝謹啓山中與裴秀才迪書王維近臘月下景氣和暢故山殊可過足下方溫經猥不敢相煩輒便往山中憩感配寺與山僧飯訖而去北涉元灞清月映郭夜登華子岡輞水淪漣與月上下寒山逺火明滅林外深巷寒犬吠聲如豹村墟夜舂復與疏鐘相間此時獨坐僮僕靜默多思曩昔携手賦詩步仄徑臨清流也當待春中草木蔓發春山可望輕鯈出水白鷗矯翼露濕青臯麥隴朝雊斯去不逺倘能從我逰乎非子天機清妙者豈能以此不急之務相邀然是中有深趣矣無忽為同州張評事謝辟并聘錢啓李商隱某文乖綺繡學乏縑緗負米東郊止勤色養獻書北闕未奉明恩撫京洛之塵素衣穿穴訪江湖之路白髮徘徊大夫榮自山陽來臨沙苑固以室盈東箭門咽南金豈謂搜揚乃加孱眇府稱蓮沼慙無倚馬之能地號雲門竊有化龍之勢便居帷幄遽别蓬蒿袁生有望於樵蘇楚子永辭於藍縷刻諸肌骨知所依歸伏惟待賜鑒察謹啓上吕相公書宋范仲淹某奉命此行至重至憂初欲道中上記以未到邊隅無可述者或有屑屑之見奏牘具焉初至長安見九江太尉首傳台旨頗言開釋尋來鄜延路巡按北視金明之役止數日復還延安極邊之情指掌可見金明一邑舊寨三十六人馬數萬一旦蕩去後來招安到蕃部三百來户不足為用又塞門寨圍逼十旬諸將逗留無敢救者軍民數千一時復沒及廢承平南安長寧白草四寨棄為敵境延安之北東西僅四百里藩籬殆盡近修金明聊當一路將修寬州以禦邊塞非多屯軍馬亦不能守必須建軍其利害具於奏中所奏劄子方永興軍繫署今有圖先具呈上今延安兵馬二萬六千患訓練未精將帥無謀問以數路賊來勢何䇿以待皆不知所為但言出兵而已此不可不為憂也或得其人精練士卒山川險惡據以待寇俟有斬獲乘勝深入敵勢一破鳥散窮沙復舊漢疆宜有日矣如未克勝敵勢不衰縱入討除豈肯逃散或天有風雨之變人在山川之險糧盡路窮進退有患此宜慎重之秋也自延州至金明四十里一河屈曲涉者十三度此言山川之惡也或遇風雨不敵自困某今與延安當職議定約束急於訓練俟其精強可禦可伐亦令録奏乞朝廷特賜威命則邊鄙可定廟堂無憂别路兵馬少處臨時制置不必倣此又張龍圖吏道精強但親年八十寓於他郡復言不練兵律延安重鎮數郡仰賴若不主戎政所失則大段待制西人所望明鎬亦細知邊事惟相府裁之又上吕相公書前人竊以文武之道一而文武之用異然則經天下定禍亂同歸於治者也傳曰天下安注意相天下危注意將斯則將相之設文武之殊久矣後世多故中外不恬二道相髙二權相軋至有大將軍而居三司之上蓋時不得已也五代衰亂專尚武力諸侯握兵外重內輕血肉生靈王室如綴此武之弊也皇朝罷節侯署文吏以大救其弊立太平之基既而四夷咸賔忘戰日久內外武帥無復以方略為言惟文法錢榖之吏馳騁于郡國以尅民進身為事業不復有四方之志一旦外患偶生爰及征討朝廷渴用將帥大慮乏人此文之弊也前則劉平陷沒范資政去官次則韓琦與某二于元帥不能成績以罪失職復以夏陳分處二道期于平定近以師老罷去而更張之三委文帥一無武功得不為和門之笑且議耶今歸之四路復皆用儒彼為相輔大臣朋奬文吏他日四路之中一不任事則豈止于笑當尤而怒之用儒無功勢必移于武帥彼或專而失謀又敗國事况急而用之必驕且怨重權厚賞不足厭其心外寇未平而萌內患此前代之可鑒故裴度淮西之行不落韓𢎞都統蓋為此也某不避近名之嫌有表陳讓願相公與西府大臣因而圖之如鄜延環慶二帥一路以文一路以武涇原秦鳳二帥亦如之使諸將帥髙者得色下者增氣如寡䇿略則擇俊乂為之參佐仍使鄜延環慶二路如舊通其軍政涇原秦鳳亦如舊制則謀可相濟兵可相援矣今王仲寶是環慶部署兼管鄜延兵馬許懷德是鄜延部署兼𬋩環慶兵馬涇原秦鳳副都部署於今亦然惟新命都部署則未有處分固不煩更改詔敕惟續降宣旨以兼之乃舊制也既文武參用二路兼資均其事任同其休戚足以息今日之謗議平他時之驕怨使文武之道協和為一何憂乎邊患矣某復慮朝廷以逐路部署為經略招討之二謂之參用則此使權雜伍于下不足為重僅之虛設或以文換武謂之參用則前日換者人皆以儒視之或以新帥難動則某願避此路以待武帥請主外計仍領安撫舊名亦足救生民之困弊復可按邊陲之利病咸得聞于朝廷不為輕矣區區之意附記注梁學士達于臺聽恐道途雨雪之阻故復拜此不任懇切憂惶之至與韓魏公書前人邸報云某有恩命改職增秩貧儒至此誠為光寵奈何朝廷本欲吾輩來了邊事今涇原全師敗沒鄰道無應援之效而特進爵天下豈無深議耶又今將佐不思報國惟望僥恩吾輩頻時進改豈能伏其心何言責他實效候文字到須以此削章乞朝廷載酌今日聞閣下復舊職改大諫職可復矣官莫須陳讓使諸將知吾輩無僥幸之意當此之際如得朝廷責怒則吾輩可以責將佐之功矣某昨赴邠州設禦捍之勢實懼自已路分內放過冦馬入撓關中其責如何誠以避罪豈足為功以邀渥澤也惶恐惶恐冦謀漸熾皆由將帥無謀入賊䇿中吾輩須日夜營營以備將來時乞數字上樞密尚書書前人某久在江外職業無可惟望廢退以遂麋鹿之趣而朝廷過聽越次寄任拳拳負荷不能無憂今至延安北入金明視城壘之役且欲深見邊事戎馬之後原野蕭條金明百里之間原有塞門栲栳二寨並李士彬下蕃部寨三十六所悉已蕩去盡沒番境人不敢詣又此間隨川取路夾以峻山暑雨之期湍走大石秋冬之流屈曲如繞一舍之程渡涉十數山川之惡諸處鮮並兵馬出入所宜慎重又將帥無謀不務訓練坐困糧道惟請益兵兵聚城中無舍可泊人馬暴露時苦寒凛庫緡空虛不議營構守禦之術寂寥無聞張龍圖言纍陳乞只願領郡求免軍馬之務諸將何稟焉某已有奏章乞别選人段待制西人所望無出右者明鎬亦知邊事頗見究心如僉議未諧即某不敢避儒生之算豈能決成但一方之憂未有當者此夙夜切切不得已也秋霖弗止禾穗未收斯民之心在憂如割近分擘延安兵馬作六將教習由鄜州始其於利害奏牘具焉某卵翼門下雖竭心力常常懼貽知已之羞此所以罄其短拙而不知朝廷可否之意惟待罪而已知永興軍謝兩府啓劉敞雍州上腴見稱前史秦地四塞實雄諸侯至於人物車甲之饒風聲謠俗之盛擇守未易得人為難豈有抱空疏之姿守朴陋之學材不洎衆智非過庸擢從講幃假以威節兼四千石之重運數十域之封自視缺然曷以稱此此蓋伏遇某官專連鈞之化隆作厦之功至和平分羣力並用不愛美錦曲從庇身之求申錫介圭界比元侯之舊蓋觀國者以處逺為陋事君者以居中為榮揆能茍微冒寵斯過固當勵斷斷之節立優優之風庶幾所長尚有云補下塞讒慝之口上答甄鎔之私答論橫渠私諡書司馬光昨日承問張子厚諡倉卒奉對以自漢魏以來此例甚多無不可者退而思之有所未盡竊惟子厚平生用心欲率今世之人復三代之禮者也漢魏以下蓋不足法郊特牲曰古者民無爵死無諡爵謂大夫以上也檀弓記禮所由失以為士之有誄自縣賁父始子厚官比諸侯之大夫則已貴宜有諡矣然曽子問曰賤不誄貴幼不誄長禮也惟天子稱天以誄之諸侯相誄非禮也諸侯相誄猶為非禮况弟子而誄其師乎孔子之沒哀公誄之不聞弟子復為之諡也子路欲使門人為臣孔子以為欺天門人厚葬顔淵孔子嘆不得視猶子也君子愛人以禮今關中諸君欲諡子厚而不合於古禮非子厚之志與其以陳文範陶靖節王文中孟貞曜為比其尊之也曷若以孔子為比乎承關中諸君決疑于伯淳而伯淳謙遜轉謀及于淺陋不敢不盡所聞而獻之以備萬一惟伯淳裁擇而折衷之代人上宰相論鄭白渠書程頤某聞天下之事有甚難而易者有甚易而難者獨係在上之人為與不為而已昔韓欲罷秦兵使鄭國説以鑿涇水溉田注填之水溉瀉鹵之地四萬頃收常一鍾關中遂為沃壤無凶年秦以富強至漢白公復引涇水以溉民田得其饒民歌之曰田於何所池陽谷口鄭國在前白公起後衣食關中億萬之口此兩渠之功也秦漢而下皆獲其利熙寧中神宗皇帝講求治功興葺遺利時先祖殿丞建明鄭白之利神宗皇帝賜對便殿大稱聖心付以其事興役踰年功已有敘而害能者巧為沮止不終厥功陜右之人至今為恨某每思神宗皇帝知其利而欲興之意與先祖盡其力而被沮之恨某未嘗不憤嘆至於流涕也閣下嘗尹長安矣必聞其事今則又非昔年之比也涇水低下渠口髙仰溉灌之功幾盡廢矣民用困乏米斛踴貴職此之由今方外有不順之羌師旅之興儲偫為急誠使秦中嵗增榖數百千萬斛所濟豈不甚大某關西陋儒也自幼小稔知其事人微處逺無由自伸其憤鬱幸遇僕射相公以經緯之才逢時得君以天下事為已任某是以不避狂妄之誅塵瀆鈞聽倘蒙采録或致成功不使先祖抱恨泉下則某生平志願足矣鳳翔到任謝執政啓蘇軾軾本凡才謬承選取忽從州縣便與賔佐捫躬自省豈不愧幸伏惟昭文相公素所奬庇曲加搜揚既蒙最深之知遂有自重之意所任簽署一局兼掌五曹文書內有衙司最為要事編木筏竹東下河渭飛芻挽粟西赴邊陲大河有每嵗之防敗務有不蠲之課破蕩民業忽如春氷於今雖有優輕酬奬之名其實不及所費百分之一救之無術生以自慙惟有署置之必均姑使服勞而無怨過此以往未知所裁與汪帥論屯田朱熹崇安有范芑通判者頃從鄭資政鎮蜀能言當時漢中屯田之利所以實邊郡紓民力省嵗費者甚有條理不知其幕府文書猶有存於今日者否就使不完當日官吏必尚有可訪者今之所謂和好豈可長保萬一可保而在我者亦豈當但為安坐以守所保之計乎聚人之本財用為急與其賣度牒責財於民而髠其首以絶生聚之源賣官告使入仕之流猥濫訛雜以為吾民之病孰若因天時分地利借力於飽食安坐之兵而坐收富強之實效乎况前人已試之驗未逺在博訪而亟行之爾稼穡之功經嵗乃成然當可為之時緩之一日則失一嵗之事今以閣下之明乘此邊事少休嵗收大稔之際兵民皆有餘力可以就事况諸司又皆通情則事之在漢中者亦可委曲審議而共為之失今不為恐後難復值此可為之會矣熹在逺僻不能深得利病之詳然得於傳聞參以簡册所記載竊以為此最當今邊防之急務而申軍律練士卒備器械抑又次之皆不可不先事預謀以為之備不審臺意以為如何與乾州太守趙君書節明康海賊輩往來之地止在髙祖廟馬嵬南上官薛爐鎮一帶其南過渭河則祖菴一帶而妻孥寄居則郿縣東南鐵爐菴寨其間若無交契深厚之人何以存住兹急為出示將連日斬獲人名姓明白開曉某人常以樊伸妖術衒惑謂當做何官職今乃首領不保如此往者靡追來者可戒凡爾各處軍民人等能將樊伸楊朴張和董漢等有名賊首設計捕獲者許免其脅從之罪仍照首功例一體升賞其為賊捉拏割髮塗面及著名賊簿哄誘脅從者原係被賊威劫比之楊朴等同謀結聚不同若能自首到官給與執照令其寧家生理其楊朴等果能改悔前愆將樊伸等擒斬送官亦照例賞功免罪如此則民志自定賊勢自孤不待旬日之間諸賊之首悉函官庫矣今聞立節渡口地方所報二十二日辰時賊衆先後二十一騎駐渡索船村民執兵追呼賊徑西去因往來鐵爐菴寨熟知道路淺深舍舟而涉其餘黨只在州城東西及興平一帶舊行道路村舍憑熟隱匿若令各村挨拏呈報凡獲賊物件悉行給與隱匿不報與犯人同律則勇敢之士志向既專而隱匿之家親疏靡諱自首自縛者源源而至謂孽蔓猶滋氛祲不消者吾未之信也賊衆自言去喚所約銀兵及涇陽元狐教私人復來攻城事之有無雖不可料而備之曲折誠不可疏宜密令人先去鐵爐菴寨抓探賊輩若果招誘銀兵宜申上司火速移文巡檢於翺令其多方訪邏勦捕若尚留滯未發宜密行寶雞把塞隘口截其西奔兼移盩厔揚兵致邏遏其東邁凡武功扶風岐山鳳翔沿渭河道但有淺窄可渡處仔細隄防不許放賊北渡乃徐陳師壓境則計無不獲矣元狐教不但涇陽一處咸陽醴泉三原三水淳化髙陵處處有之此教風行二十餘年其妖師所至家家事若祖考惟其所需極意奉承一飲一饌妖師方下筯入口其家長幼大小即便跪請留福奪去自食至於退處空室則使處女少婦次第問安倘蒙留侍枕席即為大幸有福其妖師者又令此輩照水鑑形云某後當為何官某後當有何福愚民易惑便爾堅志奉承牢不可解往嵗藍巡撫在陜僕備言其事藍公星夜取知縣劉仲和至分付區處顧仲和不諳事體曉諭無方致此輩托求太府反謂官司生事而此輩方且深根固蒂聚貨通官打點承對搖手一呼應者千萬生員楊芝恐貽害地方具呈巡撫發縣跟究縣官以重賄竟以他事致芝於死此後雖有敢言之士閉口不敢矣今欲悉行處置則干礙衆人不若摘為首之人斬首號令則愚民將曰彼嘗照水見有何官今輒遭此方來復有蠱惑者亦不信矣此其隂隲於民奚啻萬萬哉與鄉中知舊胡松僕四月入關分守關西理在涇滸涇雖荒落陋瘠然所過西安所部平涼鳳翔則皆古賢聖豪傑誕育經營之地固平生之所寤寐快覩者遇行部必迂途往觀用以激昻砥礪試為諸君誦焉方自靈寶出函谷望潼關見黃河迢迢從西北來切抱關麓而太華三峰髙矗東南歷歷如畫乃賈生所謂踐華為城因河為固者今猶宛然真稱天地之險使秦漢隋唐稍能布張政教用惟其人豈有敗與亡哉自關行六十里至華陰縣縣正直太華西嶽廟在縣中宏壯不可言又六十里至華州遙睇驪山諸阜信若培塿兒孫然又五十里至渭南渭源出鞏昌之鳥鼠同穴山迤邐而東行可千餘里合汧湋鎬戲漆沮滻灞灃潏涇汭諸水西至於華入河而斯邑適在其南又八十里至臨潼所謂華清繡嶺僅存其名茫茫惟土垤驪山亦不甚髙惟溫泉如昨然當年繁華侈盛俱隨浮雲流水散矣為題古今殷鑒四大字於驪阜而去自是西行則新豐鴻門灞橋皆在所歷過橋不三十里入長安履任經長樂里登西南城望終南諸山髙入雲表張屏列嶂儼如罨畫橫帶會城周際而山之下周方數百里多秦漢故渠膏塍沃壤古所稱天府陸海殆謂斯域外此則昔所習稱未央長樂諸宫上林樂遊諸苑與昆明曲江棘門細栁雲陽灃鎬杜陵韋曲樊川御宿歷歷皆在目睫指顧之間乃憶唐人所云宫中下見南山盡者真實語也四月念日出長樂赴涇原路當西出咸陽為欲至終南遊所謂祖菴樓觀者乃東出長安門望鄠縣行可七十里鄠古崇侯虎國也後文王奉天伐之作豐邑路皆廣原平陸中有渠通長安渠上垂楊夾峙參天合抱長亦五六十里不斷人行樹底殆不知有夏出鄠縣里許為渼陂上為紫閣峰峰下陂水澄湛環抱山麓方廣可數里中有芙蕖鳬雁之勝杜子美所云半陂以南純浸山者也恨不得岑參王維少陵其人載酒從之遊又四十里至祖菴元王重陽道場也有石刻遺像與其手書書亦飛動竒譎又一十里至樓觀觀蓋老子與關令尹喜傳道處也上有説經臺臺在終南山腰松阡石徑迤邐而上最上有洞可容數十百人非惟西北所無殆非人境又二十里至盩厔盩厔形勝膏沃與鄠埒而長楊五柞舊宫皆在其境又七十里至武功武功古邰國后稷舊封禹貢所載惇物若秦嶺藍關與子午諸勝皆在東南睇望中又數里輿人遙指馬嵬坡會日欲暮不能往然問俗所傳土皆成粉非實事憶哲婦傾城之詠為嘆息久之又七十里至乾州乾於唐稱奉天從此地漸髙寒有邊鄙意出乾州北數里經乾陵則天葬處也所遺石翁仲人物雜卧土石草樹間甚巨且衆則當其盛時雄麗可想然行道之人語及盜掘亦多詬而羞之直稱遺臭豈若昭陵壞土漫然九嵕山下之有耿光耶從此過永夀縣至邠州邠本稱豳元宗開元間因恤岐周府兵幸其地以豳近幽字改今名稱至今入其境則陶穴纍纍如見公劉時人而所云凌隂室履迹坪與其隘巷種種固在北望甘泉林光諸故址炯焉未滅而甘泉則武帝祭天雍畤萬靈明庭處也又夏日出按鳳翔由涇東南行百餘里至靈臺又東南百里至麟逰縣縣南五里九成宫故址在焉祗存歐陽詢書記一石而字多剝落不可讀所謂十二層樓閬苑西者惟翠巘丹梯尚無恙爾然古木丫槎半無枝葉欹斜偃側巖壑無光矣又南八十里至鳳翔鳳翔秦故都也秦雖起西戎有非子者為周孝王主馬於汧渭之間馬大蕃息封為附庸邑之秦使續嬴氏之祀故今城中有穆公與三良墓余行過之則嗤彼繆之謬而重興黃鳥之哀焉登城一望見岐及梁山奠其東北岍與吳山亘其西南襟帶環合居然一大都會雖其雄偉廣博差謝長安而聲名禮樂殆踰他郡又城東門外有東湖即大旱不涸花木水竹之勝舟楫壺觴之適無讓江鄉而凌虛臺喜雨亭址在其北陬今則復為荒煙野草如蘇長公之臺記語矣從鳳翔西行七十里為汧陽汧於漢屬隃麋縣耿况嘗封於其邑又有唐人段太尉秀實祠汧蓋其鄉也又西七十里為隴州而吳山在其東南七十里號西鎮然在周職方則稱嶽李義山所稱吳嶽曉光連翠巘者是也巖石聳峭林木秀阻九峰離立如笋拔地而舊志苐稱為五峰余為數之實為九數已刻其説於巖壁豈帝命巨靈雕刻鑿削特示工巧其勝乃若是耶又東南百餘里為寶雞大散關在其西南數十里路通褒斜宋與金人百戰爭得之而石鼓山在縣南二十里陳倉山距縣東南百十餘里志載山上有石類山雞晨鳴山頭則聲聞數十里而縣因以名縣南十五里有曰益門山者所從入蜀道也棧閣蓋實自兹始縣東南八十里為磻溪溪流注渭旁有石室傳為太公所為避紂地東坡為鳳翔簽書判官時夜逰詩有夜入磻溪如入硤照人炬火落驚猿蓋實録也而繆公女弄玉鳳女臺元真人丘處機清風臺皆在縣東南六十里外至張三丰菴則在縣東三里焉志稱三丰洪武癸酉秋七月念日自言當逝留頌以别邑人楊軌山等為置棺斂比葬發視之三丰復生後入蜀見蜀王又入武當山或逰襄鄧間永樂中嘗遣使尋訪竟不遇為宫以待之余他日逰武當親見成祖所為招三丰手書當不妄去寶雞東南行數十里為岐山縣縣西八十五里為岐山中有周公太公召公三廟巍然並峙而岐山之南數里而近則為郿太白山峙其東所謂和尚原五丈原斜谷關者則分峙其西誦出師未捷身先死之句為之淚下若東南五十里則有橫渠先生祠其北二十里為郿塢漢董卓所為貯金積榖徼覬富貴無窮者夫張祠董塢相距甚邇而使人貴賤愛惡至與天地隔若此然則吾人百年易盡之身其惡可不遹修厥德也歟又東為扶風漢畿輔地其人則馬援傅毅馬融諸子望於其鄉又東則醴泉咸陽雖非余所守然往來會城必道焉咸陽故阿房宫址褰帷四顧但見蒼蒼雲水離離禾黍滮滮泉流彌近逺爾又北行以望周文武諸陵若漢髙長陵祗遺數大阜近道側其餘環長陵者以百數纍纍錯落率如屋如鐘如釜如囷如廩如積不知其為后歟王歟將歟相歟公歟侯歟祗增嘆息彼貪且懵者可以悟而省矣與薛方山同年前人使還得公書乃知既已登壇柄事一新號令矣僕未嘗遊上郡五原之地然知其為近塞光景頗牢落與內地殊苐豪傑出世且欲立功絶域之外正不宜置苦樂於此間也來示登歷十律種種見胸臆不厭繁多僕今著在壁間時倚几坐讀焉足當一逺逰也與王保宇郡丞書馮從吾向得華翰知橫渠先生後裔在灤大為吾道一快鳳翔太府沈公祖聞之喜甚即具書奉謝併致書永平太府項先生欲得永平一印信公文據以申呈吾省當路便於題請耳沈公篤志理學力以表章先儒為已任國朝二百五十年闕典直待今日良為竒遇吾輩為桑梓先儒尤當竭蹶成之以竟千載不朽之事上延撫嶽中丞書名和聲趙彥荒徼殘疆年來建鉞清肅固已烽煙寧謐樂享太平之業矣夫何昊天不弔旱魃為虐以致餓莩載道飢民走挺始而攘竊以資一飽繼而盜糧畜以為已利遂漸至於明火執創而劫及鄉堡漸逼城池髙明自有碩畫但某明農家食目覩時事之非不得不過為鰓鰓焉宋先賢有云小盜宜思所以安之大盜宜思所以勝之以今日而論似小盜也在初意亦憐此無知不過凍餒之餘姑免須臾死耳豫之矜全賜以賑恤孰知愚民愚甚始懼其法既貸以生遂視為利在既逞者既已不死而未逞者何苦束手待斃而不樂一試耶試之者衆而一倡百和以王法為不足畏以狂肆為可得計降而復叛者屢見告矣叛而復降者不深罪矣在有司不過曰小盜安之之術也以愚見度之已非小盜矣勝廣之徒豈非當日一夫耶後日之事將有不忍言不敢言者緘默不言非所以為朝廷非所以為鄉井尤非所以報知我也叨在帡幪兼締蘭譜世誼寧有忌諱愚者一得并憶某先在山東平妖已試之效為煩清聽可乎今日之撫局已成養瘡矣又成誨盜矣某非不念民命之可哀但民愚甚狡不大創之則不懲以台臺旌鉞所指何異拉朽勦可也撫可也勦撫并用可也如屢降屢叛之卒何難藁首轅門以一警百堯舜之仁不廢放誅不然狼子野心以撫為要挾以勦為虛文所謂國法天討者何在某熟計逺思非為目前計正欲杜亂萌而收全功賴台臺造福無既也答劉敬乂論無定河沙書夲朝談吉璁來教云朱子楚辭注引沈括筆談言在延安渡無定河其沙急流人馬如行幕上多陷沒之患為流沙千里之注似矣及考諸書禮注流沙者不然則無定河之沙非弱水之流沙也明甚頃從波羅轉餉歸涉謊忽河謊忽者即無定河之上流也得李將軍先以人馬往來於河中數巡而後敢渡猶必躡踵而行稍失足即墮陷矣居人名之為潰沙唐輿地廣記注云無定河即圁水也後人因潰沙急流深淺不定故更今名較為詳實每讀宋史見王中正以河東軍渡無定河循水北行地皆沙涇士馬多陷沒竊謂中正奄人躁妄冒進以取潰敗亦猶足下所云朱子之注者然而今歷其地乃知沙在水中而非地也益見沈括之有據矣豈非古所云千聞不如一見者乎若北史刁雍表中稱薄骨律鎮道多深沙輕車載榖二十石必至陷滯則今之榆林城外及清平堡一路皆是而盡名之為流沙也可乎注書固難而作史也亦不易自今以往益不敢妄下筆矣雖然即歷其地而不博訊土人猶不知也使僕非李將軍為之鄉導則不幾又蹈奄人之轍耶易屯之二曰即鹿無虞往吝窮也需之傳曰利涉大川往有功也余方在屯之時而需之以養庶其險在前而不陷矣乎辱在同志故敢以所見者進惟再教之與張岫庵邑侯書王心敬鄠邑河渠雖不及盩厔之多而水可取用處亦復不少且中間髙亢之地惟西北一鄉其餘無河之鄉亦無不可掘井而灌蓋井之為利雖甚微甚緩然十口之家能掘一井亦可灌田四五畝薄收亦可得榖豆八九石更若糞多力勤且可十二三石昔嵗敝鄉之旱自二十八年始至三十二年方止當二十八年春某尚從師于二曲竊憶關中豐稔已久計時或當歉薄即歸倣古渠田之法汲井灌田及秋竟旱顆粒無收而某家獨有數十石之穫及三十年旱愈甚老農且效某所為彼時井灌之田薄者收三石有餘厚則四石而上十口之家能灌田三畝得榖十餘石合以夏穫之留餘便可終嵗無飢方今積場餘麥四五日可畢五日之外如無雨澤幸即傳諭四鄉近水者須備水斗灌種無河泉者須計口掘井務以五口一井為準幸而雨澤及時不過家費三五日工力耳若天道終于亢陽井已掘就便可立行灌溉望明府于此月十五各鄉地庭謁時示以定法限其井數刻以時期約以某日巡某鄉如令者賞不如令者懲務以十日為度蓋自十五至二十五則種榖已遲更遲則地熱難下種且慮過遲將來或見傷于早霜也要之小民可與樂成難與圖始惟明府留意焉陜西通志卷九十三
