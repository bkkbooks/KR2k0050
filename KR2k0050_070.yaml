縣北十五里宋敏求長安志成王陵盩厔分祭康王陵鄠縣分祭賈志按鳳翔府志周康王陵在麟逰縣西八十里乃括地志三輔黃圗雍録明一統志等書俱云文武成康四陵在咸陽畢郢原則康陵之不在麟明矣舊志云秦康公居雍髙寢髙寢鳳翔地生而居之殁而葬之康王之為康公無疑也恭王陵在文王陵南縣志周公旦墓在文王陵東縣志周公在豐病將殁曰必葬我成周以明吾不敢離王既卒成王亦讓葬周公於畢從文王以明豫小子不敢臣周公也史記魯世家正義曰括地志云周公墓在雍州咸陽北十三里畢原上世家注在文王陵東今立廟於墓前賈志太公望墓在文王陵東縣志禮記曰太公封於營邱比及五世皆反葬於周鄭玄曰太公受封留為太師死葬於周五世之後乃葬齊史記齊世家注按皇覽吕尚冡在臨淄縣城南去縣十里齊記補遺云公葬於周齊人思其德葬衣冠於此則臨淄定屬虛冡矣畿輔志又云太公墓在東明縣南四十里郭家屯證以曲禮反葬之説更屬無稽八士墓在縣東五十里即一母四乳之八子縣志豫至咸陽縣東北五十里有八士墓稱南宫氏及觀雍大記亦載其墓而父老尚傳誦云薛應旗酉陽搜古竒編按襄城縣志八士冡在縣北王落子南伯達堡未知孰是武安君白起墓在縣東五里杜郵亭武安君自刎葬此而祠亦在焉賈志按洛川縣志白起山韓城縣志華池俱有起墓考洛川為起采地至華池則司馬靳與起同賜死杜郵因靳葬華池而起冡亦傅會於此要以杜郵者為是漢髙帝長陵長陵在咸陽縣東三十里亦曰長山其北有蕭城蕭何築以守長陵漢初徙關東豪族以奉陵邑長陵茂陵各萬户皆屬太常不𨽻於郡長陵令秩千鐘陪葬諸臣蕭何張良曹參紀信在其東賈志十二年四月甲辰髙祖崩長樂宫丙寅葬長陵史記髙祖本紀皇甫謐曰長陵山東西廣百二十丈髙十三丈在渭水北去長安三十五里正義曰括地志云長陵在雍州咸陽縣東三十里本紀注六年夏六月城長陵漢書髙后本紀張晏曰起縣邑故築城也師古曰此説非也黃圗云長陵城周七里百八十步因為殿垣門四出及便殿掖庭諸宫寺皆在中是即就陵為城非止謂邑居也本紀注皇覽曰髙帝吕后山各一所史記吕后本紀注髙后崩合葬長陵外戚世家關中記曰髙祖陵在西吕后陵在東漢帝后同塋則為合葬不合陵也諸陵皆如此世家注關中記曰長陵城有西北南三靣東靣無城陪葬者皆在東徙關東大族萬家以為陵邑宋敏求長安志戚夫人墓在長陵之東馬志舊按會典漢髙帝陵陜西涇陽縣祭蓋沿志而地實屬咸陽也再漢中府志西鄉縣東南二十五里有戚夫人墓俱不足辨姑以供後人之憑弔可矣惠帝安陵在咸陽東三十五里周之程邑也賈志漢書云葬安陵皇覽曰山髙三十二丈廣袤百二十步皇甫謐曰去長陵十里去長安北三十五里史記吕后本紀注關中記曰徙關東倡優樂人五千户以為陵邑善為啁戲故俗稱女啁陵也宋敏求長安志孝惠張皇后廢處北宫孝文後元年薨葬安陵不起墳漢書外戚傳昭帝平陵在咸陽縣東北一十三里賈志元平元年六月壬申葬平陵漢書昭帝本紀臣瓚曰平陵在長安西北七十里本紀注平陵去茂陵十里帝初作夀陵令流水而已石槨廣一丈二尺長二丈五尺無得起墳陵東北作廡長三丈五步外為小厨裁足祠祀萬年之後掃地而祭三輔黃圗孝昭上官皇后凡立四十七年建昭二年崩合葬平陵漢書外戚傳昭按河南通志漢帝陵在河南洛陽縣城東平落保昭帝崩於長安無葬洛陽之事其誤可知元帝渭陵在咸陽縣東北一十三里賈志永光四年冬十月以渭城夀陵亭部原上為初陵詔曰安土重遷黎民之性骨肉相附人情所願也頃者有司緣臣子之義奏徙郡國民以奉園陵令百姓逺棄先祖墳墓破産失業親戚别離人懷思慕之心家有不安之意是以東垂被虛耗之害關中有無聊之民非久長之䇿也詩不云乎民亦勞止迄可小康惠此中國以綏四方今所謂初陵者勿置縣邑使天下咸安土樂業亡有動搖之心布告天下令明知之竟寧元年七月丙戌葬渭陵漢書元帝本紀服虔曰陵未有名故曰初臣瓚曰渭陵在長安北五十六里本紀注孝元王皇后建國五年二月癸丑崩三月乙酉合葬渭陵元后傳孝元傅昭儀哀帝祖母也哀帝即位為帝太太后後又更號為皇太太后元夀元年崩合葬渭陵稱孝元傅皇后云哀帝崩王莽秉政奏貶傅太后為定陶共王母元始五年莽復言共王母前不臣妾至葬渭陵冡髙與元帝山齊懷帝太后皇太太后璽綬以葬不應禮禮有改葬請發共王母冡歸定陶葬共王冡次既發冡崩壓殺數百人公卿在位皆阿莽旨入錢帛遣子弟及諸生四夷凡十餘萬人操持作具掘平共王母冡外戚傳髙陵南有定陶恭王廟傅太后陵元夀元年傅后崩合葬渭陵潘嶽關中記漢帝后同塋則為合葬不共陵也恭王廟在霸城西北廟西北即傅太后陵不與元帝同塋渭陵非謂元帝陵也蓋在渭水之南故曰渭陵也陵與元帝齊者謂同十二丈也王莽奏毁傅太后冡周棘其處以為世戒今其處積土猶髙世謂之增墀亦謂之增阜又謂之成帝初陵處所未詳也水經注成帝延陵在咸陽縣西北一十三里雍録建始二年春閏正月以渭城延陵亭部為初陵綏和二年四月己卯葬延陵漢書成帝本紀臣瓚曰延陵在扶風去長安六十二里本紀注王莽時遣使壞渭陵延陵園陵罘罳曰毋使民復思也又以黑色汙其周垣三輔黃圖李成班偼妤失寵退處東宫至成帝崩充奉園陵薨因葬園中孝成許皇后立十四年而廢在昭臺嵗餘還徙長定宫後九年賜藥自殺葬延陵交道廄西外戚傳哀帝義陵在咸陽縣西八里雍録建平二年七月以渭城西北原上永陵亭部為初陵勿徙郡國民使得自安元夀二年秋九月壬寅葬義陵漢書哀帝本紀臣瓚曰義陵在扶風去長安四十六里本紀注元始元年詔義陵民冡不妨殿中者勿發平帝本紀平帝康陵在咸陽縣西二十五里賈志元始五年冬十二月葬康陵漢書平帝本紀臣瓚曰在長安北六十里本紀注在興平原口三輔黃圖七妃墓在縣東北一十五里賈志按賈志及縣志俱列戚夫人墓後而並無徴考未知漢代何帝之妃趙王如意墓在咸陽縣東北二十五里賈志在吕后陵西馬志蕭相國何墓在咸陽縣東北三十里賈志東觀漢記云蕭何墓在長陵東司馬門道北百步正義曰括地志云蕭何墓在雍州咸陽縣東北三十七里史記蕭相國世家注按蕭相國陪葬長陵則墓在咸陽信矣城固志又云何墓在縣西二里杜家豈因何在漢中日久其民思之而為起塜歟若河南通志及永城縣志並載蕭墓則傳聞異辭之故也平陽侯曹參墓在咸陽縣東北二十五里賈志按參墓賈志縣志俱云縣東北二十五里馬馮兩志及府志俱云三十五里綘侯周勃墓在咸陽縣東四十里賈志成國故渠徑周勃冡南渠東南謂之周氏曲水經注宣平侯張敖墓在長陵東咸陽縣志關中記曰張敖冡在安陵東正義曰魯元公主墓在咸陽縣西北二十五里次東有張敖冡與公主同域史記張陳列傳注五嶽塜張敖冡也在安陵東三十里冡上有五嶽之象人謂之五嶽冡雍勝略按宋敏求長安志亦謂之五角冡馮都尉唐墓在咸陽縣東北八里賈志按畿輔通志馮唐墓在趙州南二里沙河店考史記馮唐本傳唐大父趙人父徙代漢興徙安陵漢代徙關中諸陵者即世籍陵邑唐墓之在咸陽無疑也其趙州所傳或係唐祖墓耳至河南通志云唐墓在陳州東南四十里者尤非揚大夫雄墓在咸陽縣馮志子雲天鳳五年卒葬安陵陂上所厚沛郡桓君山平陵如子禮弟子巨鹿侯子芭共為治喪諸公遣世子朝郎更行事者會送桓君山為斂賻起祠堂侯芭負土作墳號曰玄冡揚雄家牒揚子雲在長安素貧約比嵗已甚亡其兩男哀痛不已皆歸葬於蜀遂至困乏雄為中散大夫病卒貧無以辦喪事以貧困故葬長安妻子棄其墳墓而歸於蜀桓談新論按四川通志揚雄墓在郫縣西二十里土人呼為子雲亭明郭子章題其墓曰漢法玄先生墓似為有據然證以桓談之説則在長安者為篤矣唐代祖元皇帝陵在咸陽縣東三十五里名興寧陵馬志髙祖父昞襲封唐公卒諡曰仁武德元年追諡元皇帝唐書髙祖本紀魏王武士彠墓在咸陽縣北三十里則天父母追贈帝后名其墓曰順陵嘉靖三十四年冬地震碑毁石器在賈志士彠娶相里氏又娶楊氏楊氏咸亨元年卒追封魯國以王禮葬咸陽給班劍葆仗鼓吹嗣聖元年追贈考為太師魏王妣為王妃王園邑守户百永昌元年以咸陽墓為明義陵太后改國號曰周以眀義陵為順陵唐書后妃列傳在縣東北二十五里長陵鄉周二里宋敏求長安志將軍契苾明墓在咸陽縣北五里明何力子仕武后至左鷹揚衛大將軍府志按賈志作後周契苾烈墓在咸陽縣北五里即此墓也五代時既無婁師德碑北周書又無契苾烈疑賈志誤故從府志元丞相稹墓在咸陽縣洪瀆原西安府志太和五年七月薨於位以六年七月祔葬於咸陽縣洪瀆原從先宅兆也白居易撰墓志李光輔墓葬在咸陽東北近涇萬厯中涇岸崩壅水不流三日乃得兹石其銘曰水竭源遷斯文乃傳可謂竒矣石墨鐫華本朝殷提督化行墓康熙五十一年葬於咸陽縣北靳李村東之新塋檢討劉涵撰墓志蕭孝子光蘭墓在縣東五十里畢郢原下趙騰撰墓表光蘭以孝獲旌人皆號其墓為孝子墳艾陵遺稿附疑冡漢留侯張良墓舊志在咸陽縣東北三十五里賈志按史記留侯死並葬黃石冡録異記圯橋老人云我榖城山下黃石是也後果得焉子房隱商山其家葬其衣冠黃石後為赤眉所發黃石亦失則留侯墓本無確據必求其地以實之則鑿矣隋煬帝陵在咸陽縣東北三十五里府志在武功縣西原賈志按揚州府志煬帝墓在城西雷唐側考義寧二年煬帝崩蕭后令宫人殯於西院陳稜改葬吳公臺下唐復移葬雷塘别無北徙之説是咸陽武功兩説俱無據也附迷冡漢博士朱雲墓雲魯人徙平陵年七十餘終於家遺言以時服斂棺周於身土周於槨為丈五墳葬平陵東郭外漢書朱雲傳張丞相禹墓禹河內軹人徙家蓮勺年老自治冡塋起祠室好平陵肥牛亭部處地又近延陵奏請求之上以賜禹詔令平陵徙亭他所張禹傳安昌漢成帝河平四年封丞相張禹今城東有古冡時人謂之張禹墓余考漢書禹河內軹人徙家蓮勺鴻嘉元年以老乞骸自治冡塋起祠堂於平陵哀帝建平二年薨遂葬於彼此則非也水經注韋丞相賢墓初賢徙平陵玄成别徙杜陵病且死因使者自白願乞骸骨歸葬父墓上許焉漢書韋玄成傳賢墓在鄒縣東十五里東韋社按漢書賢父子墓乃在關中此或韋孟墓也兖州府志王莽妻墓莽妻死葬渭陵長夀園偽諡曰孝穆皇后僭號曰億年陵三輔黃圗馮將軍奉世墓先將軍葬渭陵哀帝之崩也營之以為園後漢書馮衍傳自論奉世為右將軍即衍之曾祖故言先將軍渭陵元帝陵在長安北五十里哀帝義陵在長安北四十六里奉世墓入義陵塋中所以衍不得入葬馮衍傳注平阿侯王談墓渭水東徑平阿侯王談墓弱夫冡故渠又東徑漢丞相周勃冡南冡北有弱夫冡水經注按弱夫冡無考北魏司空周惠達墓周惠達碑咸陽令王公家瑞所得碑稍完𨽻書碑首大魏故司空匡穆周公之碑銘篆書十二字宛然如新石墨鐫華北周楚國公慕容寧墓寧昌黎徒何人封楚國公授岐州刺史保定五年薨葬於洪瀆之川庾信撰神道碑王刺史羆墓徽京兆人十世祖羆仕周為同州刺史死葬咸陽鳳政原唐書王徽傳齊王憲墓憲太祖建德元年封齊王宣政元年薨以某年月日葬於長安縣洪瀆之川庾信撰神道碑沃野縣公豆盧永恩墓永恩封沃野縣公保定三年薨天和元年葬於咸陽洪瀆川庾信撰神道碑豆盧永恩碑在咸陽恩墓前𨽻書令尹王公家瑞求得之石墨鐫華大將軍爾綿永墓公諱永遼東石城人天和五年薨於賀葛城柩至京師帝臨喪贈柱國大將軍其年葬於京城南髙陽原髙司里庾信撰神道碑按髙陽原在咸陽縣東二十里唐楊都督志墓志本華隂人潭州都督長安四年薨於州館夫人長孫氏以大定元年卒神龍元年合祔於咸陽舊塋嚴識元撰墓碑朝散大夫達奚思敬墓思敬加朝散大夫神龍二年終於長安義寧坊私第夫人蔣氏景龍二年終三年合葬於咸陽之畢陌原員半千撰墓志竇豳公希瑊冀公希球墓希瑊扶風人爵豳國公開元五年薨於東都六年歸葬於京兆咸陽縣洪瀆川之北原李湛然撰神道碑希球扶風平陵人昭成皇后之弟封冀國公開元二十一年薨於長安布政里賜第歸祔於咸陽舊原裴耀卿撰神道碑楊元帥執一墓執一華隂人朔方元帥開元十四年薨贈户部尚書夫人獨孤氏先即窀穸以十五年合葬於咸陽之洪瀆川張説撰神道碑王庶子敬從墓敬從京兆人太子庶子開元二十八年終葬於咸陽洪瀆原孫逖撰神道碑權員外自挹墓自挹之先天水人徙於汧隴遷尚書員外郎大厯五年終於布政里私第夫人王氏殁時貞元十年二月也十二年祔葬咸陽縣洪瀆原權德輿撰墓志王常侍定墓興元元年太子右庶子王公艱貞歸全於京師新昌里天子以公忠義追命左散騎常侍且詔有司護葬冬寧神於咸陽縣肺浮原先公之兆既葬十二嵗其孤仲周俾識於神道公諱定京兆人贈尚書易從子權德輿撰神道碑興平縣漢武帝茂陵在興平縣東北一十七里府志建元二年夏四月初置茂陵邑後元二年三月甲申葬茂陵漢書武帝本紀臣瓚曰茂陵在長安西北八十里本紀注漢諸陵皆髙十二丈方百二十步惟茂陵髙十四丈方一百四十步徙民置諸縣者凡七陵長陵茂陵各萬户其餘五陵皆各五千户關中記茂陵周回三里三輔舊事云武帝於槐里茂鄉徙户一萬六千置茂陵三輔黃圗漢武帝茂陵故槐里之茂鄉也水經注李夫人墓亦名習仙臺髙二十丈周一百六十步在縣東北一十六里宋敏求長安志夫人卒上以后禮葬焉漢書外戚傳茂陵西北一里即李夫人冡冡形三成世謂之莢陵一作萊陵水經注李夫人墓東西五十步南北六十步髙八丈在茂陵西北一里俗名英陵亦云集仙臺三輔黃圗按宋敏求長安志亦名習仙臺蓋集習音轉而訛耳孝昭上官皇后母敬夫人墓后母前死葬茂陵郭東追尊曰敬夫人置園邑二百家長丞奉守如法漢書外戚傳按賈志云敬夫人墓在扶風縣郭東者誤長平侯衛青墓在縣東北一十五里崇二十丈與平陽主合葬起冡象廬山宋敏求長安志青尚平陽主與主合葬起冡象廬山漢書霍去病傳師古曰在茂陵東次去病冡之西相併者是也霍去病傳注平陽公主嫁衛青青與主合葬冡在華山葬時發土得銅槨一枚楊奐山陵雜記按賈志云衛青墓在咸陽西北三十里夫興平在咸陽西青墓又在去病墓西賈志既以去病墓屬興平反以青墓屬咸陽誤矣考溪田少墟及府志俱入興平故改正至楊奐謂冡在華山則尤與漢書注不合冠軍侯霍去病墓在縣東北一十九里崇二丈宋敏求長安志去病元狩六年薨上發屬國元甲軍陳自長安至茂陵為冡象祁連山漢書霍去病傳師古曰在茂陵旁冡上有竪石冡前有石人馬者是也本傳注在茂陵東北賈志按鄧州志州西北四十里冠軍城武帝封霍去病於穰縣盧陽鄉名為冠軍者即此今城東北有去病墓恐涉傅會公孫丞相𢎞墓在興平縣東北一十里賈志霍丞相光墓在興平縣茂陵東南一里馮志地節二年光薨上及皇太后親臨光喪太中大夫任宣與侍御史五人持節護喪事中二千石置莫府冡上賜金錢繒絮繡被百領衣五十篋璧珠璣玉衣梓宫便房黃腸題湊各一具樅木外藏槨十五具東園溫明皆如乘輿制度載光尸柩以輼涼車黃屋左纛發材官輕車北軍五校士軍陳至茂陵以送其葬諡曰宣成侯發三河卒穿復土起冡祠堂置園邑三百家長丞奉守如舊法禹既嗣侯太夫人顯改光時所自造塋制而侈大之起三出闕築神道北臨昭靈南出承恩成帝時為光置守冡百家吏卒奉祠焉漢書霍光傳按馬賈兩志及咸陽縣志俱云光墓在平陵西考平陵在咸陽東茂陵在咸陽西三十餘里若果葬平陵西奚必發軍校至茂陵耶蓋諸志相襲傳訛耳又明一統志云光墓在浮山縣北二十里畿輔通志云光墓在蠡縣城西者其背謬又不待辨矣王丞相嘉墓在興平縣東北一十里賈志南郡太守馬融墓在縣西南三十里按馬融嘗居扶風茂陵卒葬於此故有墓俗名為馬蓮冡縣志融年八十八延熹九年卒於家遺令薄葬後漢書馬融傳丁孝子蘭墓在縣東北一十里蘭河內人有孝行卒葬於此縣志按賈志蘭墓在咸陽縣東北一十里誤附迷冡漢敬侯墓金日磾輔政嵗餘薨賜葬具冡地送以輕車介士軍陳至茂陵漢書金日碑傳按漢書日磾墓應在茂陵左右而西安府志云在渭南縣東南馬馮賈三通志俱云在廢下邽城東南或者廢下邽城東南有金氏陂相傳為日碑賜莊其墓或金氏子孫所瘞歟原氏阡在漢茂陵縣今興平縣境雍勝略涉自以為令先人墳墓儉約非孝也乃大治冡舍周閣重門初武帝時京兆尹曹氏葬茂陵民謂其道為京兆阡涉慕之乃買地開道立表署曰南陽阡人不肯從謂之原氏什漢書原涉傳隋常都督醜奴墓醜奴墓志醜奴始平人為都督滎澤令大業元年卒志在興平崇寧寺今亦不知墓所在石墨鐫華臨潼縣上古隂康氏陵隂康氏葬浮肺山之隂路史禪通紀驪山也見長安志冡今存焉路史注按浮肺山自少華以東西至終南太白南至商藍皆有地肺之名故尊盧在藍田隂康在臨潼皆曰浮肺之隂周幽王陵在縣東北二十里戲水原上縣志兩京道里記曰陵髙一丈三尺周三百步宋敏求長安志神醫扁鵲墓在臨潼縣東北三十里賈志扁鵲渤海郡鄭人徐廣曰鄭當為鄚為醫名聞天下來入咸陽秦太醫令李醯自知伎不如鵲使人刺殺之史記扁鵲傳按河間府志鵲墓在任邱鄚城東北蓋鵲故里也豈見刺後遂歸葬歟特史傳不載其事别無可考又明一統志彰德府志俱云鵲墓在湯隂伏道社其説無所徵信當以臨潼者為近是耳秦宣太后陵在芷陽賈志昭襄母楚人姓芉氏號宣太后四十二年太后薨葬芷陽酈山史記秦本紀正義曰在新豐縣南秦本紀注按賈志云宣太子陵芈氏陵俱在芷陽考秦本紀止有宣太后則賈志及臨潼志之稱宣太子而别多一芈氏陵者其訛甚矣秦始皇帝陵在臨潼縣東一十五里馮志始皇初即位穿治酈山及并天下天下徒送詣七十餘萬人穿三泉下銅而致槨宫觀百官竒器珍怪徙藏滿之令匠作機弩矢有所穿近者輒射之以水銀為百川江河大海機相灌輸上具天文下具地理以人魚膏為燭度不滅者久之二世曰先帝後宫非有子者出焉不宜皆令從死死者甚衆葬既已下或言工匠為機藏皆知之藏重即泄大事畢已藏閉中羡下外羡門盡閉工匠藏者無復出者樹草木以象山史記秦始皇本紀皇覽曰墳髙五十餘丈周回五里餘正義曰關中記云始皇陵在驪山泉本北流障使東西流有土無石取大石於渭上諸山括地志云秦始皇陵在雍州新豐縣西南十里本紀注始皇葬於酈山之阿下錮三泉上崇三墳其髙五十餘丈周回五里有餘石槨為遊館人膏為燈燭水銀為江海黃金為鳬鴈項籍燔其宫室營宇往者咸見發掘其後牧兒亡羊羊入其鑿師古曰鑿所謂穿冡藏者牧者持火照求羊失火燒其藏槨漢書劉向傳始皇使丞相李斯將天下刑人徒𨽻七十二萬人作陵鑿以章程三十七嵗錮水泉絶之塞以文石致以丹漆深極不可入奏之曰丞相臣斯昧死言臣所將𨽻徒七十二萬人治驪山者已深已極鑿之不入燒之不然叩之空空如下天狀制曰鑿之不入燒之不然其旁行三百丈乃止漢舊儀秦始皇大興厚葬營建冡壙於麗戎之山一名藍田其隂多金其陽多玉始皇貪其美名因而葬焉斬山鑿石下涸三泉以銅為槨旁行周回三十餘里上畫天文星宿之象下以水銀為四瀆百川五嶽九州具地理之勢宫觀百官竒器珍寶充滿其中墳髙五丈項羽入關發之以三十萬人三十日運物不能窮關東盜賊銷槨取銅牧人尋羊燒之火延九十日不能滅水經注五柞宫樹下石麒麟二枚刋其脅為文字是始皇驪山墓上物也頭髙一丈三尺東邊者前左腳折有赤如血父老謂其有神皆含血屬筋焉西京雜記始皇陵在驪山北髙數十丈周回六七里今在隂盤縣界北水背陵障使東西流又運取大石於渭北渚故歌曰運石甘泉口渭水為不流千人唱萬人謳金陵餘石大如塸土屋其銷功力皆如此類博物志驪山始皇陵作地市生死人交易市平不得欺死人云秦王地市有斷馬利三秦記始皇陵以明珠為日月魚膏為燭脂金銀為鳬雁金蠶三十箔四門施徼三輔故事始皇陵周回七百步下周三泉刻玉石為松柏以明月珠為日月山陵雜記陵髙一千二百四十尺內院周五里外院周十一里俗呼當陵南嶺尖峰作望峰言築陵望此為準兩京道里記郡國志曰始皇陵有銀蠶金雁以多竒物故俗云秦王地市宋敏求長安志始皇陵內城周五里舊有門四外城周十二里其址俱存自南登之二丘並峙人曰此南門也右門石樞猶露土中陵髙可四丈昔項羽黃巢皆嘗發之老人云始皇葬山中此特其虛冡都穆驪山記子嬰墓子嬰扶蘇子墓在新豐西北隅縣志按子嬰于軹道降漢髙祖還軍霸上子嬰必在漢軍矣項羽入關殺嬰則瘞于鴻門左右其或然歟漢太上皇陵在臨潼縣東北七十五里馮志十年秋七月癸卯太上皇崩葬萬年漢書髙帝本紀師古曰髙祖初居櫟陽故太上皇因在櫟陽十年太上皇崩葬其北原起萬年邑置長丞本紀注髙帝葬太上皇於櫟陽北原因置萬年縣於櫟陽大城內以為奉陵邑其陵在東者太上皇西者昭靈后也三輔黃圗漢萬年陵在櫟陽北二十五里縣志櫟陽侯景丹墓在櫟陽北丹馮翊櫟陽人封櫟陽侯縣志曲陽令馮衍墓在臨潼縣東一十四里馮志於是以新豐之東鴻門之上夀安之中地勢髙敞四通廣大南望酈山北屬涇渭東瞰河華龍門之陽三晉之路西顧酆鄗周秦之丘宫觀之墟通視千里覽見舊都遂定塋焉後漢書馮衍傳自論衍墓在今新豐縣南四里馮衍傳注墓崇二丈宋敏求長安志田真墓在縣北三田村田慶田廣祔縣志按醴泉縣谷口亦有田真墓不如臨潼三田村之傳逺而有據也唐奉天皇帝齊陵在新豐西二里縣志玄宗子天寶十載薨肅宗立詔曰靖德太子琮親則朕兄睿惁聰明朕昔踐儲極顧誠非次君父有命不敢違永言懇讓不克如素宜進諡奉天皇帝妃竇為恭應皇后詔尚書右僕射裴冕持節改葬羣臣素服臨送達禮門帝御門哭以過喪墓號齊陵唐書十一宗諸子列傳在縣東十六里旌儒鄉新豐店西二里宋敏求長安志文敬太子謜墓在新豐西一里臨潼縣志德宗取順宗子謜為第六子貞元十五年薨年十八追贈及諡葬日羣臣以位而哭通化門外陵及廟置令丞云唐書十一宗諸子列傳在縣東十五里旌儒鄉宋敏求長安志惠昭太子寧墓在新豐西一里臨潼縣志憲宗子四年立為皇太子眀年薨年十九唐書十一宗諸子列傳在縣東十五里旌儒鄉宋敏求長安志恭哀太子倚墓在臨潼縣北賈志懿宗子初封睦王為劉季述所殺天復初追贈唐書十一宗諸子列傳莊恪太子永墓在驪山北原宋敏求長安志太和六年立為皇太子開成三年暴薨唐書