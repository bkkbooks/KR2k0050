body:
  text: 陜西通志卷七十陵墓一橋山風埠傳於掌故驪隧異原仁暴異趨漢唐園邑營建合度君德可傳祭告守護從葬諸臣佳城星布纍纍北邙殘碑僵仆如彼三良黃鳥斯賦達觀解韜朝陽晞露作陵墓志第二十六西安府長安縣周穆王陵在縣西南二十五里張恭村宋敏求長安志杜伯墓在長安下杜城東南馮志在長安下杜清明渠邊相傳秋水暴漲其墓遂開人見其石槨四隅有石柱以鐵索繞之及水落仍封俗謂有玉皇閣者誤賈志樗里子墓在漢長安城中唐獨孤實撰墓志張誼書馬志樗里子卒葬於渭南章臺之東曰後百嵗當有天子之宫夾我墓樗里子疾室在於昭王廟西渭南隂鄉樗里故俗謂之樗里子至漢興長樂宫在其東未央宫在其西武庫正直其墓秦人諺曰力則任鄙智則樗里史記樗里子傳武庫北舊樗里子葬於此水經注隋文帝遷都大興城增修樗里子之墓雍録漢杜子夏墓在長安北四里府志杜子夏葬長安北四里臨終作文曰魏郡杜鄴立志忠欵犬馬未陳奄先草露骨肉歸於后土氣魂無所不之何必故邱然後即化封於長安北郭此焉宴息及死命刻石埋於墓前種松柏樹五株西京雜記唐恭懿太子紹墓在縣西南二十里縣志在髙陽原宋敏求長安志涼國公李抱玉墓在長安縣杜永村顔其卿書碑猶存馬志元蕭貞敏公㪺墓在城南五十里子午鎮縣志明姚太僕顯墓在城南吉家村縣志邵通判璋墓在城北講武里從子芰同死節從葬縣志楊莊敏鼎墓在城南塔坡子孝亷時敷六世孫知縣復亨祔縣志鄒總憲昊墓在城南第五橋縣志何總督棟墓在城南十里木塔里王用賔志其墓縣志劉武襄尚文墓在城西三橋鎮縣志馮同知友墓在城西南木塔里李維楨表其墓縣志馮恭定從吾墓在城南姚希孟撰神道碑縣志晉知縣調元墓在長安江村里調元以守城贈兵備副使賈志王府尹鶴墓在城南木塔里橫岡五爻縣志楊烈婦劉氏墓在城南縣志王烈婦晉氏墓在城西南縣志朱烈婦晉氏墓在城西北縣志本朝梁都督孟玉墓在灃水西賈志附迷冡周秦襄公墓宋太宗朝長安民於壞塜得古銅鼎狀方而四足古文十六字人莫曉命杜鎬考其事曰武王都鄷鎬平王東遷以岐豐之地賜秦哀公篆曰岐陽錫公必秦哀公之墓也後得折碑果然山堂考索平王賜地時係襄公疑襄哀二字之訛圗書集成按史記秦始皇本紀襄公葬西垂應不在長安境今云襄公墓在長安有折碑何也姑存以俟考漢廢后薄氏墓孝景薄皇后無子立六年廢廢後四年薨葬長安城東平望亭南漢書外戚薄后傳按平望亭在長安故城外仍在今長安界趙王友墓友以諸吕女為后弗愛愛他姬諸吕女妬怨去讒之於太后太后怒召趙王幽死以民禮葬之長安民冡次史記吕后本紀卭成侯王奉光墓孝宣王皇后父奉光封卭成侯元帝二年薨諡共侯葬長門南置園邑二百家長丞奉守如法漢書外戚孝宣王皇后傳北周蕭都督泰墓公諱太周書南史並作泰避周太祖諱作太蘭陵人天和二年都督蔡州諸軍事薨於蔡鎮五年十一月葬於長安北原庾信撰墓志宇文顯和墓建德二年二月遷葬於長安縣之洪瀆原庾信撰墓志溫國公髙緯墓後主緯為周所獲封溫國公至建德七年誣與穆提婆謀反賜死大象末陽休之等請收葬葬長安北原洪瀆川北齊書幼主紀按周書建德六年十月誅溫國公髙緯且建德無七年齊書誤任城王髙湝墓湝神武第十子於冀州募兵拒周軍戰敗被擒至長安尋與後主同死隋開皇三年表請葬湝及五子於長安北原北史任城王傳唐隱太子建成墓在縣境宋敏求長安志太宗立追封建成為息王諡曰隱以禮改葬詔東宫舊臣皆會帝於宜秋門哭之唐書宗室列傳按西內西一門為宜秋門太宗臨門而哭則其墓當在縣西信王望墓望玄宗子大厯九年十月薨其年十一月葬於細栁原妃范陽盧氏祔焉常衮撰墓志新平郡王嚴墓永泰元年二月新平郡王薨其年五月七日遷窆於萬年縣龜川鄉細栁原王諱嚴元宗孫奉天皇帝長子也常衮撰墓志騶虞縣子安附國墓附國先出自安息父朏汗貞觀初率所部五千餘人歸朝詔置維州即以為刺史附國封騶虞縣開國子調露二年二月終於神都永隆二年二月葬於雍州長安縣孝悌鄉之原李至逺撰神道碑中山郡公李乂墓乂趙房子人爵中山郡開國公紫微侍郎開元丙辰薨於京師宣陽里第贈黃門監考行曰貞以其夏卜葬長安細栁原東北望帝京二十有五里蘇頲撰神道碑韋貞公虛心墓虛心京兆杜陵人東都留守以開元二十九年某月薨於東都賜諡曰貞明年某月葬於京兆之髙陽原祔先塋孫逖撰神道碑茹將軍義忠墓義忠雁門人纍遷忠武將軍天寶元年六月薨於京兆長安縣太和里私第即以其年七月葬於京兆長安縣永平鄉阿房殿之墟張賁然撰神道碑李光弼母墓光弼母封韓國太夫人二子節制皆一品葬長安南原將相奠祭凡四十四幄時以為榮唐書李光弼傳按李光弼父楷洛葬富平檀山兹唐書云然豈以檀山為陪葬之塋不復啓祔歟咸寧縣周秦昭襄王墓在霸陵咸寧縣志葬茝陽史記秦始皇本紀五十六年秋昭襄王卒子孝文王立尊唐八子為唐太后而合其葬於先王秦本紀括地志云在雍州新豐縣西南三十五里以地計之當在咸寧界中賈志按芷陽在咸寧之東橫亘數十里東接繡嶺南抵藍田如秦宣太后葬芷陽驪山去新豐縣十四里則在臨潼界矣秦悼太子葬芷陽而括地志云在藍田縣西六里則在藍田界矣故分載各縣云秦孝文王夀陵即夀陵在通化門外賈志孝文王葬夀陵史記秦始皇本紀始皇七年莊襄王母夏太后薨孝文王后曰華陽太后與孝文王會葬夀陵莊襄王葬芷陽故夏太后獨别葬杜東曰東望吾子西望吾夫後百年旁當有萬家邑吕不韋傳正義曰孝文王陵在雍州萬年縣東北二十五里索隱曰地理志云京兆霸陵縣故芷陽案在長安東也夏太后陵在萬年縣東南二十五里本傳注秦莊襄王陵在通化門外今青門大冡是或曰韓信塜非也賈志莊襄王葬茝陽史記秦始皇本紀索隱曰葬芷陵正義曰括地志云莊襄王陵在雍州新豐縣西南三十五里俗亦謂為子楚始皇陵在北亦謂為見子陵本紀注霸水東徑子楚陵北皇甫謐曰秦莊王葬於芷陽之麗山京兆東南霸陵山劉向曰莊王大其名立墳者也戰國䇿曰莊王名子楚故世人猶以子楚名陵水經注京城東有塜極髙大俗謂吕不韋冡以其鋭上亦謂之尖塜咸亨初布政坊法海寺有英禪師言見鬼物云秦莊襄王過其舍求食自言是其冡而後代人妄云不韋也隋唐嘉話尖塜兩京道里記曰在通化門東二里皇覽云是吕不韋冡三輔舊事云是子楚母塜皆非也其冡制度廣大豈人臣所宜據韋述兩京記則秦襄王夀陵也宋敏求長安志始皇十九年太后薨諡為帝太后與莊襄王會葬芷陽史記吕不韋傳秦二世皇帝陵在宜春苑南咸寧縣志趙髙以黔首葬二世杜南宜春苑中史記秦始皇本紀正義曰括地志云陵在雍州萬年縣南三十四里本紀注漢文帝霸陵漢文帝陵陜西咸寧縣祭會典在白鹿原東北崖去城四十里咸寧縣志帝治霸陵皆以瓦器不得以金銀銅錫為飾不治墳欲為省母煩民後七年六月帝崩遺詔曰霸陵山川因其故母有所改史記孝文帝本紀應劭曰因山為藏不復起墳山下川流不遏絶也就其水名以為陵號皇甫謐曰霸陵去長安七十里本紀注霸水左合滻水歷白鹿原東即霸川之西故芷陽矣史記秦襄公葬芷陽者也是謂之霸上漢文帝葬其上謂之霸陵水經注白鹿原亦謂之霸上漢文帝葬其上謂之霸陵王仲宣詩曰南登霸陵岸回首望長安即此也元和志霸陵在霸水東去薄太后陵五里因山為墳道南有秦時銅人十二董卓鑄以為錢餘二枚尚存即薊子訓與老人摩挲銅狄處賈志竇太后後孝景帝六嵗建元六年崩合葬霸陵史記外戚世家宣帝杜陵在府城東南咸寧地賈志元康元年春以杜東原上為初陵更名杜縣為杜陵徙丞相將軍列侯吏二千石訾百萬者杜陵漢書宣帝本紀初元元年春正月孝宣皇帝葬杜陵元帝本紀杜陵在長安南五十里本紀注帝在民間時好逰鄠杜間故葬此三輔黃圖武帝治茂陵昭帝平陵宣帝杜陵邑皆取二千石將相守陵故三陵多貴皆三萬户至五萬户漢舊儀在府城東南一十五里許后陵亦近焉馮志孝宣王皇后立四十九年永始元年崩合葬杜陵稱東園漢書外戚孝宣王皇后傳杜陵之制正方詢之居人每方百二十步據地六十畝四面去陵十餘步皆有觀闕基址其東南數千步陪葬數十冢環拱森列大小不等其北里許亂冡百餘自是以北直至城南東西延亘髙原之上纍纍皆是但不知其名耳宋敏求長安志按會典歷代帝王陵寢漢宣帝陜西長安縣祭蓋沿舊制實咸寧地也薄太后南陵在府城東南三十五里關中陵墓志地稱南霸陵賈志薄太后景帝前二年崩葬南陵以吕后會葬長陵故特自起陵近孝文皇帝霸陵史記外戚世家索隱曰按廟記云在霸陵南十里故謂之南陵按今在長安東滻水東原上名曰少陵蓋在霸陵西南故曰東望吾子西望吾夫是也正義曰括地志云南陵故縣在雍州萬年縣東南二十四里漢南陵縣本薄太后陵邑陵在東北去縣六里世家注薄太后南陵在白鹿原咸寧縣志按汝州志郟縣薄姬墓在城東薄姬堡明李宜培碑記云邑東三十里薄姬冡相傳為漢文帝母薄太后前輩每指太后母家在隔溪相望處此蓋附會之辭當以史記為斷衛皇后陵在邑東南桐柏鄉咸寧縣志后遭巫蠱事自殺黃門蘇文姚定漢輿置公車令空舍盛以小棺瘞之城南桐柏亭名宣帝立乃改葬追諡曰思后置園邑三百家長丞周衛奉守焉漢書外戚傳師古曰葬在杜門外大道東以倡優雜伎千人樂其園故號千人聚其地在今長安城內金城坊西北隅是外戚傳注許后少陵宣帝后許氏早崩葬杜陵南園謂之少陵咸寧縣志后立三年而崩諡曰恭哀皇后葬杜南是為杜陵南園漢書外戚傳師古曰即今所謂小陵者去杜陵十八里外戚傳注少陵原南接終南北至滻水西屈曲六十里入長安縣界即漢鴻固原也宋敏求長安志宣帝既建杜陵即縣南葬許后故其地乂號少陵原凡宜春下苑即少陵地也雍録本鳳棲原以葬后起陵遂曰少陵原陵在司馬村東趙崡逰城南記陵在咸寧縣司馬村其陵比杜陵差小謂之小陵俗又訛為少陵唐杜甫居少陵即此後世因陵在司馬村遂傳為大司馬霍光塜非也馬志淮隂侯韓信墓在古長安城東三十里新店墓前有廟馬志今在霸城計去未央四十里其陵墓志所載霸東者非也縣志舞陽侯樊噲墓在神禾原縣志長安待賢坊隋北領軍大將軍史萬嵗宅其宅初常有鬼怪居者輒死萬嵗不信因即居之夜見衣冠甚偉來就萬嵗萬嵗問其由鬼曰我漢將軍樊噲墓近君居厠常苦穢惡幸移他所必當厚報萬嵗許諾因責殺生人所由鬼曰各自怖而死非我殺也乃掘得骸柩因為改葬後夜又來謝曰君當為將吾必助君後萬嵗為隋將每遇賊便覺鬼兵助己戰必大捷兩京記樊噲墓在樊川南原上馬志按南陽府志樊噲墓在舞陽縣城北三十里樊村孟津縣志樊噲墓在相留樊山下滎陽縣志將軍塜即樊噲葬處蓋因噲當日侯封因疑葬地當與舞陽相近但考噲功成後終老長安未嘗之國宜樊川原上至今丘壠依然也又元馬臻徐州詩序云州有三百六十山樊噲墓凡七處未知孰是則又因噲生于沛沛徐壤錯遂多疑塜耳其城固雒南兩志及濟南府志云皆有噲塜者尤不足據滕文公夏侯嬰墓在咸寧縣東臨灞水賈志索隱曰三輔故事曰滕文公墓在飲馬橋東大道