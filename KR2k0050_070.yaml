慶追考功績發於簡書炎掌史之官也奉命為詞楊炎撰神道碑按代宗陵在縣西北三十五里檀山光弼墓即在縣西北三十里是亦檀山原也其父楷洛未知同塋與否而諸志止載光弼兄弟墓則楷洛墓迷矣醴泉縣隋齊國公髙熲墓在醴泉東五十里馬志唐太宗昭陵唐太宗陜西醴泉縣祭會典在醴泉東北四十里九嵕山上陪葬諸王凡七蜀王愔趙王福紀王慎越王貞嗣紀王澄曹王明蔣王惲陪葬公主凡二十二清河晉國豫章新興蘭陵髙密長樂遂安南平衡陽新城咸陽廣陽師道襄城長沙安康臨川晉陽潯陽汝南常山陪葬妃嬪凡八鄭國夫人紀國大妃常氏賢妃鄭氏趙國大妃楊氏彭城夫人趙國妃熊氏才人徐氏竇卿姊陪葬宰相凡一十三馬周岑文本崔敦禮李績李靖溫彥博蕭瑀髙士亷房玄齡魏徵許敬宗杜如晦長孫無忌陪葬承郎三品凡五十三唐儉李大亮虞世南姚思亷薛收孔頴達閻立本張俊胤褚亮房仁裕薛頤長孫璿盧赤松李震吳黑闥李正明江夏王道宗李之芳琅琊王沖零陵王俊臨淮公李規常山公李清中山王琚楊恭仁襄武郡王琛西平王安馬載杜正倫孔志亮孔惠元魏叔玉薑遐薑晦薑簡長孫敞劉洪直裴藝蕭守業竇義節李弼司馬謙竇庭蘭唐嘉會房光義房光敏房誕房佐馬覬房回史幼豆盧承業安康伯岑曼倩陪葬功臣大將軍以下凡六十三尉遲敬德秦叔寶段志玄程知節杜君綽丘行恭鄭仁泰劉𢎞基公孫武達豆盧寬薛萬均周護仁李客師梁建方張仕貴張大師張延師賀蘭整許洛仁梁仁裕薑確公孫雅靖楊思訓元仲文王愔申進達李孟嘗薛仁貴李承祖仇懷古薛咄摩蘇泥熟拔野鐵賀拔儼阿史那忠李思摩阿史那道真阿史那社爾契苾何力史大奈阿史那步真阿史那德昌牛伯億王波利史奕房先忠豆盧承基斛斯正貴尉遲寶林梁倣龔善元思賢段眘爽尉遲巡昱李蒜仇務豸薛承慶康平徐定盛魯何道張阿難賈志貞觀十一年二月丁巳營九嵕山為陵賜功臣密戚陪塋地及祕器唐書太宗本紀貞觀二十三年八月庚寅葬文皇帝於昭陵髙宗本紀文德順聖皇后長孫氏大漸與帝決曰妾生無益於時死不可以厚葬願因山為壠無起墳無用棺槨器以瓦木約費送終是妾不見忘也及崩諡文德葬昭陵因九嵕山以成后志帝自著表序始末揭陵左上元中益諡文德順聖皇后后妃列傳貞觀十八年帝謂侍臣曰昔漢家皆先造山陵既達始終身復親見又省子孫經營不煩費人功古者因山為墳此誠便事九嵕山孤聳逈絶因而旁鑿可置山陵處朕有終焉之理乃詔營山陵於九嵕山之上足容一棺而已務從儉約又佐命功臣義深舟楫追念在昔何日忘之漢氏將相陪陵又給東園祕器篤終之義恩意深厚自今以後功臣密戚及德業佐時者如有薨亡賜塋地一所及賜以祕器使窀穸之時喪事無闕凡功臣密戚請陪陵葬者聽之以文武分為左右而列墳髙四丈已下三丈已上若父祖陪陵子孫從葬者亦如之若宫人陪葬則陵户為之成墳凡諸陵皆置留守領甲士與陵令相知巡警左右兆域內禁人無得葬埋古墳則不毁之昭陵在京兆府醴泉縣因九嵕層峰鑿山南西深七十五步為玄宫山旁巖架梁為棧道懸絶百仞繞山二百三十步始達玄宫門頂上亦起逰殿文德皇后即玄宫後有五重石門其門外於雙棧道上山起舍宫人供養如平常及太宗山陵畢宫人亦依故事留棧道準舊山陵使閻立德奏曰玄宫棧道本留擬有今日今既始終永畢與前事不同謹按故事惟有寢宫安神供奉之法而無陵上侍衛之儀望除棧道固同山嶽上嗚咽不許長孫無忌等援引禮經重有奏請乃依奏貞元十四年命有司修葺陵寢以昭陵先因火焚毁故詔百官詳議議者多云舊宫既被火爇請移就山下或有議請修舊宫者上意亦不欲移由是復以山上為定於是遣左諫議大夫平章事崔損完修入陵使及司所計獻昭乾定泰五陵各造屋三百七十八間橋陵一百四十間元陵三十間惟建陵不復創造但修葺而已所緣陵寢中帷幄牀蓐一事已上並令制置上親閲焉文獻通考按昭陵附蟄通志載昭陵建陵圗一卷王方慶九嵕山記一卷及會要諸書今不見謹以舊新兩史參之羣書詳而考焉諸王墓七蜀王愔蔣王惲越王貞紀王慎趙王福曹王明越王貞子琅琊王沖起兵討武后父子俱死貞開元四年復爵土幼子珍子謫嶺表數世不能歸開成中女孫女道士元真持四世喪歸求祔王塋紀王慎以貞故改氏虺載以檻車謫巴州死於道子琮睿秀獻欽俱死琮子行休以三喪歸陪葬昭陵中興初改封慎少子鐵誠為嗣紀王後易名為澄曹王明永隆中坐太子賢事徙黔州為都督謝祐逼殺景雲中陪葬昭陵子俊嗣王此諸王一則也公主二十三長沙公主降豆盧懷讓髙密公主降長孫孝政後嫁把國公段綸衡陽公主降阿史那社爾桂陽公主初降趙慈景慈景討堯君素戰死更降楊師道改封長廣公主四主皆神堯女襄城南平遂安長樂豫章臨川清河蘭陵晉安安康新興城陽新城普安晉陽汝南常山皆太宗女內晉陽汝南常山早夭未降城陽初降杜荷荷誅嫁薛瓘晉安降韋思安又嫁楊仁輅南平嫁王敬直又嫁劉元意遂安嫁竇逵又嫁王大禮新城降長孫詮又嫁韋正矩正矩以主暴死伏誅主以皇后私葬昭陵旁襄城壻蕭鋭清河壻程懷亮桂陽壻楊師道衡陽壻阿史那社爾突厥酋長也此公主一則也妃嬪八紀國太妃韋氏趙國太妃楊氏越國太妃燕氏徐賢妃惠餘不可考此妃嬪一則也宰相墓十有二皆佐命功臣而以子祔父弟祔兄者如馬載周子也覬載子也魏叔玉徵子也岑曼倩文本子也瑀子鋭以尚主李客師李正明靖弟也此宰相一則也三品丞郎墓五十有三唐儉李大亮孔頴達虞世南褚亮姚思亷薛收閻立本皆文武之選張俊胤以經授文皇又陳説天命者也如孔志亮則頴達子惠元則頴達孫而祔者也蕭守業鋭子也江夏王道宗以功臨淮公子珍子琅琊王沖及俊琚清皆王孫也西平王安恭安之父襄武王琛孝恭之兄以族以功也薑氏之祔也以皎寵也晦皎弟也李林甫之舅也確者行本也遐者柔逺也皎父也簡祔確故遐晦祔也太史令薛頤首占德星秦分文皇以九嵕築紫府居之者也宗正卿李之芳蔣王孫宗彥也蔡國公承祖之子也長孫敞無忌族也吳黑闥者吳廣也與程知節秦瓊同功征伐而與於隱太子之功者也楊恭仁觀王孫師道兄也范陽公盧赤松相承慶父同太原起義者也其餘或祔祖父如諸房竇薛史不傳也此三品以下一則也功臣大將以下尉遲秦劉程段佐命也公孫武達杜君綽鄭仁泰與於六月四日之功者也尉遲寶琳敬德子也阿史契苾李思摩史大奈皆長而忠勇者也丘行恭和之子有血戰功者也許洛仁世緒弟也元仲文李孟嘗薛萬均張大師延師皆名將也薛仁貴集古碑跋云苗神容撰今碑亡而不可考也此功臣一則也蓋陪葬者以史傳所書為正而其餘皆祔之祔也越紀曹諸王孫以死難而得入先兆其餘將相子功臣子則大力者負之而趨耳間有名爵存而史譜不著則闕之如夏五例因為昭陵附蟄記以示後來者昭陵附蟄圗説按妃王公主將相陪葬共一百六十餘墓通考綱目陵圖邑乘俱已悉載惟取其有差誤者詳之通考載妃嬪墓七而綱目注云八墓邑志亦是八墓內有竇卿妹石塔未審何人而圗無之乃有先妃陸氏墓又邑志韋氏作常氏趙國太妃燕氏作趙國熊氏俱誤諸王七墓內有越王貞嗣然唐書止名貞通考太宗十四子有楚王貞不書越王按貞始王漢後徙原已乃封越疑通考誤貞善騎射涉文史為宗室材垂拱四年起兵敗仰藥死未詳何時附葬也又有紀王澄墓考太宗子無名澄者惟有紀王慎第七子名證神龍初以證嗣王澄或證之誤然未附葬昭陵又考慎子七長續王東平餘琮睿秀獻欽俱為武后所殺琮與二弟同死桂林開元四年琮子行休始往迎以三喪歸陪葬昭陵則昭陵當有琮墓無證墓又有琮二弟墓今併名失之公主墓二十一內程懷亮作元亮都尉唐義識作善識通考與志皆誤長孫曦作長孫輝竇懷哲作懷整長孫沖止書孫沖劉元意作元懿城陽公主作咸陽長廣公主作廣陽普安公主作晉陽晉陽反作潯陽志誤甚多而長廣公主駙馬楊師道今刋去楊字又誤為師道公主墓則舛甚矣安康公主駙馬都尉通考載為獨孤彥雲志為獨孤音雲字似誤然史止書獨孤謀意謀乃名彥雲字耶尤可疑者韋正矩遇新城公主不以禮主暴薨詔三司推治矩伏誅是矩為主罪人今合葬何謂也普安主初嫁韋思安再嫁楊仁裕襄城主初嫁蕭鋭後嫁薑簡今仍與韋蕭合葬殊不可解其書之者誤耶綱目注公主墓二十一通考止十八墓無汝南常山晉陽三主墓邑志載之殊是其陪葬宰相通考與昭陵圗皆無杜萊公墓綱目注邑志與關中陵墓志皆誤書萊公以貞觀四年三月薨爾時未議山陵無因祔葬後人但以房杜同稱遂不及深考耳又有洪州刺史吳黑闥圗志俱謬為劉黑闥劉為太宗所擒豈容埋骨於此圗又列衛公墓於房墓下光上陵過公墓在煙霞洞西去山甚近與房梁公墓地勢正並列墓作三山形而左一阜則略斷而不屬土人呼上三冡以李績墓為下三冡遊景叔雅意刻圗廣傳而誤尚如是後世復何憑觀九原哉績墓與許洛仁尉遲鄂國程知節史大奈諸武臣墓皆在陵南之東所謂文武分左右列亦不盡然以上諸墓公主妃嬪大半在昭陵之東南山上俗曰亂冡坪又曰姑姑陵諸王圖不載無考功臣密戚俱在山下平地去陵逺者尚二十餘里獨魏玄成墓在鳳凰山居陵西自馬鞍望之孤山獨秀夾澗交流尚隔數里許當日陵封內周回一百二十里故爾廣逺陵墓志謂百餘人一山臆説也斷碑有薑遐字柔逺確之子陵圖止有確墓通考邑志又有薑逺墓或即遐誤脫柔字且薑皎薑晦一家從祔不應無遐又無忌從父敞封平原郡公亦陪葬而圖無名即所云一百六十餘墓圖載未百知所失多矣范文光昭陵志按唐書貞觀十年十一月庚寅葬文德皇后於昭陵十一年二月丁巳營九嵕山為陵則是陵未營而后先葬陵之營因后也陵有獻殿有後殿山巔亦有遊殿今俱廢惟陵北存石屋三楹六駿列於左右及貞觀中擒服諸番君長頡利等十四人像琢石列之北司馬門內今皆不完其周垣重門甬路諸故迹猶存也陪葬凡一百七十有七冡昭陵下宫太宗陵寢宫也在九嵕山陵之右腋後燬於火貞元十四年欲復置山髙無水泉苦於供役廷臣集議移置瑶臺寺側去陵一十八里今廢縣志冡按昭陵陪葬一百六十餘其間姓氏參錯位號抵牾前人論之已詳然訖不能定特備録之以俟考肅宗建陵在縣正北三十里武將山縣志廣德元年三月庚午葬文明武德大聖大宣孝皇帝於建陵唐書代宗本紀建陵在京兆府醴泉縣界文獻通考章敬皇后吳氏生代宗代宗即位追尊為皇后上諡合葬建陵啓故窆貌澤若生衣皆赭色后妃列傳在縣東北武將山修文鄉劉村下宫去陵五里陪葬功臣一尚父汾陽郡王郭子儀宋敏求長安志建中二年詔故尚父子儀斂以衮冕贈太師陪葬建陵舊令一品墳髙丈八詔特加十尺及葬上御安福門臨哭送之舊唐書郭子儀傳明文教諭清墓在醴泉縣東北賈志張處士敬墓在醴泉縣北一里賈志袁侍郎澤墓在醴泉縣龍泉里賈志茍侍御好善墓在醴泉縣東北賈志附迷冡李汧公懷讓墓懷讓成紀人封汧國公廣德元年九月薨於華州軍府即以其年十月陪葬建陵旌勳臣也常衮撰墓志按省郡邑諸志俱云陪葬止郭子儀則懷讓之墓久迷矣陜西通志卷七十
