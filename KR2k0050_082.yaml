討戊申博囉特穆爾遣珠展等入陜西據其省治時陜西行省右丞達實特穆爾與行臺有隙恐陜西為庫庫特穆爾所據隂結於博囉特穆爾請珠展入城刼御史大夫旺扎勒特穆爾及監察御史張可遵等印其後屢使招旺扎勒特穆爾珠展拘留不遣庫庫特穆爾遣部將貊高與李思齊合兵攻之珠展出降元史順帝本紀二十五年冬閏十月命庫庫特穆爾總督闗中閏十月詔以庫庫特穆爾總制闗陜諸道軍馬陟黜予奪悉聴便宜而行庫庫特穆爾於是分省自隨官屬之盛幾與朝廷等元史庫庫傳二十六年春二月張良弼拒命庫庫特穆爾遣兵討之庫庫特穆爾還河南調度各處軍馬張良弼拒命三月庫庫特穆爾遣兵西擊良弼李思齊圖烈巴孔興等兵皆與良弼合元史順帝本紀初李思齊與察罕特穆爾同起義兵齒位相等及是庫庫總其兵思齊不能平而張良弼遂首拒命孔興圖烈巴等亦皆恃功懐異請别為一軍莫肯統屬釁隙遂成庫庫遣闗保和琳齊以兵西擊良弼於鹿臺思齊與圖烈巴孔興等皆與良弼合庫庫遣闗保等合兵渡河且約思齊以攻良弼良弼遣子弟質於思齊連兵拒守闗保等戰不利思齊請詔和解宋元通鑑明太祖洪武元年夏五月副將軍馮勝克潼闗洪武元年元將李思齊張良弼聞王師下河南即駐兵潼闗以拒既而火焚良弼營思齊仍移軍退守葫蘆灘遣其部將張徳欽穆薛飛守闗五月都督同知馮宗異抵潼闗思齊奔鳳翔良弼奔鄜城丙寅宗異遂入潼闗紀事本末郭英以驍騎衛指揮僉事從大將軍徐達破潼闗名山藏異按明功臣錄馮宗即馮勝也大將軍徐達以都督郭興守潼闗馮勝取華州先是宗異下陜州上遣使諭之曰若克潼闗勿遽乘勝而西今大將軍方有事北方宜選將守闗以遏其援兵五月庚午徐達調僉事郭興將慶陽衛指揮于光威武衛指揮金興旺守之紀事本末馮勝拔潼闗先登謂大將軍曰謹備三秦門戸也大將軍擇都督郭興守之乘勝遂取華州名山藏秋八月元兵攻潼闗守將郭興擊敗之元右丞王某自河中來攻潼闗兵始接指揮于光持矟大呼横貫其陣都督僉事郭子興乘勝擊大破之名山藏郭按郭子興即興也二年春正月遣使諭征西諸將洪武二年春正月庚申上遣使齎勅諭諸將大將軍達遣使齎諭都督同知康茂才都督僉事郭子興且告之曰陜州潼闗三秦門戸二將軍扼而守之李思齊張思道如穴中䑕耳可坐而擒之若其來寇慎勿與爭鋒蓋軍旅多虞勝負難必但厲兵積糧嚴為守備俟大軍至日當戮力取之世法錄三月大將軍徐達克奉元路徐達率兵自山西渡河鄜城守將迎降克同州留兵戍之趨鹿臺時奉元為都省而平章李思齊據鳳翔張思道與孔興圖烈巴據鹿臺各有重兵以衛奉元而思道等聞達兵至三日遁達遂進渡涇渭至三陵坡父老千餘人出迎達撫慰之遣左丞周凱入申約束明日師進奉元其約束如下故都時秦民大悦以奉元為西安府世法錄中山主世家耿炳文嘗以鎮國上將軍從大將軍征陜西元將李思齊張思道夾武功東川而陣炳文乘隙伺進一日數挑戰身不解甲蓐食者數月思齊奔鳳翔思道奔涇陽而大將軍因得入陜炳文從中取割凍葆供億西入軍名山藏達師之至鹿臺也元陜西行省平章哈瑪爾圖棄奉元走盩厔為民兵所殺平章烏爾圖西臺治書侍御史王武遁去復降斬之西臺御史僧格實哩守闗家洞達遣攻之勢促廹不屈與妻子俱投崖死左丞拜特古斯逃入終南山郎中王可仰藥死檢校阿實克巴哈自縊死三原尹朱春與其妻亦俱投崖死紀事本末徐達等克鳳翔李思齊遁走進徇鳳隴諸州下之三月常遇春馮宗異帥師發陜西進克鳳翔初李思齊之奔鳳翔也上以書諭之曰昔足下在秦中兵衆地險雖有張思道専尚詐力孔興等自為保守庫庫以兵出沒其間然皆非勁敵足下不能圖秦自王已失此機今中原全為我有向與足下相為犄角者皆披靡竄伏足下孤軍相持徒傷物命終無所益足下誠能以信相許翻然來歸當以漢竇融之禮相待否則非朕所知也思齊得書有降意其麾下誘之與西入吐蕃思齊惑之至是大兵至鳳翔思齊懼遂帥所部奔臨洮叅政傅友徳克鳳州以指揮張能守之夏四月丙寅大將軍達㑹諸將於鳳翔留御史大夫湯和守營壘輜重令指揮金興旺余思明等守鳳翔遂移師趨隴州克之明紀事本末大將軍徐達遣兵克延安二年夏四月大將軍徐達出蕭闗遣指揮朱明克延安以明守之延綏鎮志三年夏四月大將軍徐達徇畧陽沔州下之遣别將克興元傅友徳從大將軍𢷬定西太保王保保友徳領前鋒出秦州奪略陽闗虜其平章蔡琳遂入沔分兵由鳳翔合攻漢中克之世法錄大將軍徐達遣禆將金興旺張龍由鳳翔入連雲棧合兵攻興元元守將劉思忠知院劉慶祥迎降達留興旺龍鎮守平夏錄秋七月偽夏兵寇漢中傅友徳救却之夏吳友仁寇興元興旺擊却之明日友仁復來攻興旺與戰面中流矢拔矢復戰斬首數百時城中守兵纔三千友仁兵三萬興旺遣使間道走寶鷄取援兵友仁乃圍城決壕填塹急攻興旺嬰城拒守發礟擂石敵兵多死時徐達在西安得報即帥師還屯益門鎮先令傅友徳率兵三千逕趣黑龍江夜襲木槽闗攻斗山岩下令軍中人持十炬燃於山上友仁軍見列炬起大驚乘夜遁去平夏錄八月偏將軍李文忠大破元兵孔興敗走綏徳洪武二年秋八月偏將軍李文忠與元圖烈巴孔興戰於白楊門擒圖烈巴遂進兵東勝州孔興走綏徳其部將斬之來降紀事本末元將賀宗哲寇鳳翔賀宗哲聞王師攻慶陽乃引兵攻鳳翔或隧地或實至甕城凡十五日指揮金興旺周興嬰城固守至是慶陽下宗哲乃由六盤山遁去紀事本末四年大將軍湯和定東勝置屯衛和攻察罕諾爾獲猛將呼沁定東勝置延安綏徳二衛延綏鎮志七年偏將軍李文忠及元兵戰於豐州敗之洪武七年文忠敗元兵於豐州延綏鎮志九年春正月命湯和傅友徳等巡延安夏四月巴延特穆爾入宼傅友徳敗之九年正月命中山侯湯和潁川侯傅友徳僉都督藍玉王弼中書右丞丁玉帥師往延安防邊上諭和等曰自古重於邊防邊安則中國無事今延安地控西北與胡虜接境虜人聚散無常若邊防不嚴即入為寇待其入寇而後逐之則塞上之民必然受害朕常勅邊將嚴為之備復恐久而懈怠為彼所乘今特命卿等率衆以往衆至邊上常存戒心雖不見敵常若臨敵則不至有失矣世法錄上命中山侯和潁川侯友徳往延安防邊至則巴延特穆爾來乞降上聞之召和還勅諭友徳曰無事而請降兵家所戒爾其慎之已而巴延乘間入寇友徳大破之因執之以歸明史竊命都督耿忠帥師屯闗中洪武丙辰春忠欽上命領兵萬來闗中悉建屯戍因駐武功而控制之太宗祠碑隂書耿忠鳳陽人長興侯從弟也洪武九年春詔統鳳陽軍萬餘人屯戍闗内而君控於武功號令嚴明士毋敢易旋師之日父老送者以數萬計民至於今猶稱之曰耿三官人云康海武功志十五年冬詔列侯耿炳文等巡視陜西洪武十五年冬十二月上命長興侯耿炳文延安侯唐勝宗巡視陜西城池督軍屯田訓練士卒陜西二十二衛校卒凡一十萬六千餘人得驍勇騎士二萬人習馬二萬三千五百疋明紀二十一年冬十月陜西戍兵作亂討平之哈密出所部達兵有安置陜西者中途皆叛都指揮王徳追至延安麻街等處勦平之明紀二十四年秋八月皇太子巡撫陜西洪武二十四年八月秦王樉有過召還命皇太子巡撫陜西十一月皇太子還自陜名山藏三十年夏六月陜賊作亂命列侯郭英等討平之洪武三十年川陜冦發勢甚猖獗上命武定侯郭英長興侯耿炳文討之兵至漢中之後河擒賊首高佛興及其黨四千餘人英等疏其同謀者請誅之脇從者勿治上可之明紀代宗景泰元年春正月勅延綏總兵仍鎮守原舊寨堡景泰元年正月鎮守陜西徐亨奏鎮守延安等處都督僉事王禎擅棄原守寨堡移入腹裏葭綏二州延慶二府守備其地陜隘不堪屯牧恐胡㓂占據所棄寨堡以為巢穴宜令本官速囘原舊寨堡果有星散小寨宜并入大城協力固守仍乞削禎今陞都督同知職事戴罪操備事下兵部移文右都御史王文等勘實具奏亨所言有理禎偏執不從遂勅禎候春煖河開將移入腹裏軍民撫恤前往原寨堡守備已陞職事不動若再偏執誤事不宥世法錄英宗天順二年春二月博囉冦高家堡延綏守將楊信擊敗之天順二年二月北兵七千餘騎犯高家堡延綏總兵官楊信率兵擊敗之擒賊五人斬首七十二級獲駝馬器械無算遣人獻俘馘至京師世法錄冬十月博囉㓂神木守將張欽戰敗之天順二年冬博囉冦神木縣延綏守將都督僉事張欽禦於柴溝斬獲甚衆續文獻通考十一月博囉摩囉歡冦延綏總兵官張欽敗之博囉冦神木縣欽出擊敗之於柴溝延綏鎮志五年冬阿勒楚爾出冦延綏天順五年冬阿勒楚爾渡河入套冦延綏延綏鎮志國初逃遁河外居漠北延綏無事正統以後寖失其險虜始渡河犯邊景泰初虜犯延慶不敢深入天順初阿勒楚爾掠邊人以為鄉導遂知河套所在不時出沒遂為邊境剝膚之害世法錄六年春正月瑪勒噶等入河套天順六年正月虜入河套是時博囉稍衰其大酋瑪勒噶阿勒楚爾少師孟克與博囉相仇殺而自立托蘓為汗托蘇故小王子從兄也於是瑪勒噶阿勒楚爾博勒呼三酋始入河套爭水草不相下以故不深入為冦時遣人貢馬然亦通諾延諸戎時竊邊郡世法錄冬十一月套酋冦延寧六年十一月阿勒楚爾瑪勒噶冦延寧延綏鎮志憲宗成化元年夏鄖西賊冦漢中鄖西流民劉千斤倡亂以其黨石和尚為謀主劉長子苗鳳苗虎等為羽翼衆至數萬人遂僭號改元為署置諸將帥襄鄧漢中之境屠掠出沒民無寧居諸守臣不能禦世法錄秋九月套虜冦延綏鎮巡兵擊敗之成化乙酉秋虜㓂延綏時巡撫都御史項忠寧逺伯任璹巡撫延綏都御史盧祥合兵禦之虜敗去續文獻通考成化元年十月瑪勒噶冦陜西都御史項忠及彰武伯楊信禦之虜遁世法錄二年夏四月勅延綏守臣整飭邊防成化二年四月大學士李賢等奏河套與延綏接境瑪勒噶精鋭人馬居處其中出沒不常今欲安邊必須大舉而後可乞令兵部㑹官博議預積糧草於陜西塞下及令陜西延綏等處守臣選練騎步精兵整頓器械什物及預造戰車拒馬之𩔖期以明春或今秋進兵捜勦務在盡絶其總制官將與凡出兵事宜俱預請處畫又秋禾方熟虜騎必復入抄而延綏鄜慶環縣一帶須用兵駐劄以保居民亦宜推選武將一人統步騎精兵萬人往守諸處上以為然於是兵部尚書王復及㑹昌侯孫繼宗等集議今鎮守大同總兵官彰武伯楊信舊鎮延綏稔知地利宜召還京面受成算其陜西延綏鎮巡諸官亦宜勅令整飭兵備候至期調發四月鎮守延綏都指揮同知房能奏邊冦瑪勒噶尚擁衆屯聚河套近邊烽火不絶而我増調戍兵屬延綏慶陽三衛者俱無甲胄馬匹屬陜西河南者多不能戰乞令陜西鎮守巡撫等官措置又於近邊州縣要害之處増兵把守使賊勢分散進退無利而我兵併力勦殺以圖成功下兵部議從之仍行都督僉事趙英往來遊擊遇警㑹兵勦殺世法錄五月套酋入㓂六月命彰武伯楊信帥師討之成化二年六月制諭彰武伯楊信佩平虜將軍印充總兵官統京營兵往延綏討虜冦先是延慶守臣奏報五月初十日虜衆可二萬分為五路長十餘里入境内兵部尚書王復等因請勅馳諭陜西延綏寧夏鎮守巡撫等官併力飭兵防禦仍請㑹推武職重臣調京軍往勦之有旨虜已入延綏境調兵往勦恐緩不及事可再議以聞復等又請勅都督同知趙勝充副總兵統京操騎步精兵萬人期以七月往勦又得旨令俟信至詳處之至是信至復乃與㑹昌侯孫繼宗大學士李賢等集議以為虜犯延綏實欲俟今秋大舉以掃夷氛以安邊境第彼地糧草不給未可輕動今宜量遣信等將兵討之上以為然遂勅信充總兵官將京營兵萬人馬萬二千五百匹神礟百神鎗千大同騎步兵五千宣府騎兵三千寧夏騎兵二千往延綏境上㑹鎮守總兵等官飭兵勦冦又勅勝充副總兵都督僉事湛清充叅將都指揮同知秦傑守備柴溝堡署都指揮僉事許寧充遊擊將軍俱赴延綏若賊勢衆大則寧夏陜西等處附近人馬悉聴信調發節制併力防禦世法錄三年秋七月套酋冦榆林成化三年七月阿嚕出入榆林塞孤山守將湯引績力戰死之延綏鎮志湯引績成化初充叅將守禦延綏孤山堡三年套人入冦大掠子女而東績率麾下百餘人邀於境上力戰衆寡不敵死之鎮志本傳四年春二月滿達勒入河套成化四年二月沙克嘉斯賚殺阿勒楚爾併其衆而結元人滿達勒入河套世法錄秋七月命馬文升巡撫陜西翦流㓂時流賊蜂起漢中李鬍子潼闗火蝎兒蒲城王彪各聚衆刼掠鋒甚鋭文升悉以計翦除之紀事本末冬十二月套酋㓂榆林成化四年十二月沙克嘉斯賚冦榆林延綏鎮志五年秋九月套酋冦延寧成化五年博勒呼沙克嘉斯賚㓂延寧延綏鎮志六年秋七月套酋冦延綏成化六年七月阿勒楚爾入榆林塞以撫寧侯朱永為大將軍禦之延綏鎮志命王越總闗中軍務屯榆林博勒呼等據河套邊人大擾乃勅都御史王越總闗中軍務議捜河套復東勝越等奏言河套水草甘肥易於駐劄腹裏之地道路曠逺難於守禦博勒呼沙克嘉斯賚等糾率醜𩔖居套分掠出入數年雖嘗阻於我師然未經挫衂終不肯退近日據我河曲擾我延綏乞命廷臣共議得一爵位崇重威望素著者統制諸軍往圖大舉朝廷從其議紀事本末成化六年命越以總督視師越令諸將分軍各守營堡自與太監恭太監恒統軍萬二千有奇軍於榆林别分東西二路夾之繼與西路左都督劉玉東路右都督劉聚擊敗虜於墩索尖蓋先是文臣視師者從大軍後出號令行賞罰而已至越始多選驍勇跳盪武騎將而與虜戰探虜所聚或其零騎伺怠邀殺之用是多成功名山藏王越傳七年春命彰武伯楊信帥師巡邊時北虜潛伏黄河套中嵗為邊患輔臣請興十萬之師以楊信為總制搜捕之兵部尚書程信言河套地曠逺無水草興師十萬則餽運者加倍自古禦戎來者拒之去者勿追此不易之法也既而楊信亦止請三萬人巡邊禦敵朝廷因與信二萬人令巡邊而罷搜套之議累朝策要冬十一月命侍郎葉盛巡視延綏虜出入河套為患成化乙酉冬上命吏部侍郎葉盛往延綏議河套事盛往度方畧回奏謂河套沙深水淺難以住牧春遲霜早不可耕種搜河套復東勝皆時勢所難惟増兵守險可為逺圖且剷削邊牆増築城堡收新軍以實邊選土兵以助守不但可責近效而亦足為長便制曰可續文獻通考八年夏五月命將軍趙輔統制諸路軍馬赴延綏成化八年五月命武靖侯趙輔佩平虜將軍印充總兵官統制諸路軍馬與總督右都御史王越赴延綏等處擊虜時吏部右侍郎葉盛行邊既還總督右都御史王越亦赴京議事兵部尚書白圭請命文武大臣與盛等面議攻守事宜乃㑹昌侯孫繼宗吏部尚書姚䕫等議咸謂沙克嘉斯賚等久居河套頻年冦邊若不痛加勦殄終無寧日先後所調諸軍已逾八萬各路總兵事無統一兵雖多而成功少宜遣一大將佩印受勅與越赴延綏等處調度仍勅都御史馬文升督陜西兵余子俊督延綏兵徐廷章督寧夏兵及各邊總兵叅將遊擊將軍等官悉聴大將節制則事權歸一上以命輔世法錄冬十月套人冦延綏八年十月延綏遊擊將軍祝雄奏虜入延綏鎮靖堡殺千户黄琮執夜不收以去事下兵部言比者趙輔王越累稱虜衆逺遁亟欲旋師今境内官軍潛被殺掠必能覘我虛實大逞入冦之謀宜令輔等率兵追𠞰毋徒坐視以貽邊患從之世法錄九年冬十月王越擊套酋於紅鹽池破之成化九年十月㕘贊軍務左都御史王越襲破虜營於紅鹽池以捷奏云九月十三日滿達勒博勒呼沙克嘉斯賚三人自河套出分冦西路臣已遣兵往追道逺兵疲必難取勝宜率輕兵搗其巢穴仍與總兵官許寧遊擊將軍周玉各率兵四千六百從榆林紅山兒出境晝夜兼行百八十里夕營於白鹹灘北又行一百五十里探知虜賊老弱俱在紅鹽池連營五十餘里乃取弱馬分布陣後以張形勢選精騎令許寧為左哨周玉為右哨又分兵千餘伏於他所進距虜營二十餘里虜集衆來拒臣督諸將方戰伏兵忽從後呼噪進擊虜見腹背受敵遂驚潰擒斬三百五十五獲其駝馬牛羊器械不可勝計燒其廬帳而還上賜勅奬諭之世法錄二十年春遣使祠陜西嶽瀆陜西旱遣禮部侍郎兼學士徐溥代祀岳鎮河瀆諸神明紀孝宗𢎞治元年冬勅延綏巡鎮防邊𢎞治改元左都御史馬文昇上疏云本年十二月十七日巡撫延綏都御史黄紱差舍人房正奏事稱説虜賊俱在河套近邊牆居住日逐射獵通事囘話答説並不做賊搶掠到明春要來進貢臣切惟胡虜為患自古而然勢盛則搶掠勢衰則北遁近年以來東則在於大同宣府西則在於延綏寧夏再西則在於甘涼趂逐水草時或出沒陜西之患何時得已乞勅延綏鎮守總兵巡撫等官一面用心操練軍馬嚴加防禦一面令通事與彼答話既要進貢早為出套還從大同赴京朝廷自有重賞若又以榆林進貢為詞緩我之兵必大張兵勢必别有奇謀務要逐彼出套不可容彼久住貽患地方下兵部覆議從之續文獻通考三年夏六月選延綏兵援大同𢎞治三年六月新寧伯譚祐調選延綏遊兵策應大同延綏鎮志八年北部入河套𢎞治八年北部復擁衆入河套住牧世法錄十二年冬套酋冦榆林𢎞治十二年十月和碩入榆林塞延綏鎮志十三年秋七月套酋冦榆林命保國公朱暉討之是年七月和碩入榆林平江伯陳鋭無功保國公朱暉代之延綏鎮志八月朱暉等擊套酋破之𢎞治十三年八月征虜大將軍總兵保國公朱暉提督軍務都御史史琳及監督太監苗逵帥五路之師從紅城子墩出塞乘夜𢷬虜巢於河套虜已先覺徙家北遁軍還斬首三級得所授故勅三道駱駝五馬四百二十六牛六十羊千八十器械二千五百有奇事聞命賜勅奬勵賞齎奏事人鈔各一千貫是年冬十二月和碩入河套世法錄十四年春正月套酋冦榆林二月朱暉等討破之𢎞治十四年正月火篩擁衆入榆林塞二月保國公朱暉提督軍務右都御史史琳出禦之暉等至邊覘虜酋所在潛師河套𢷬其巢穴㑹夜大霧虜聞礟驚遁毁其廬帳斬老弱百餘級而還明紀𢎞治辛酉兵部尚書馬文升以地震因言陜西西鄰畨虜而延慶二府又與河套密邇即今小王子部落日衆精兵數萬觀其所存其志非小未幾命朱暉總兵史琳督軍赴榆林禦虜暉等覘虜酋所在師襲破之頃之其酋火篩者復侵擾劇甚邊堡失事鎮城晝閉又擢大理寺陳夀巡撫延綏夀至先恤陣亡官軍隨易諸路將領兩旬間與虜戰三勝虜知有備遂渡河北遁續文獻通考十六年套酋冦榆林𢎞治十六年套酋入榆林塞千户湯璽力戰死之延綏鎮志十七年和碩入套將軍張安遣兵敗之𢎞治十七年和碩入套總兵官張安遣把總藍海等追及於黄河岸勝之延綏鎮志武宗正德四年蜀賊冦漢中正徳四年蒼溪賊鄢本恕營山賊藍廷瑞及其黨方四馬六兒廖麻子糾諸飢寒謀聚為鴇未及朞年衆盈十萬髠首漆足文身朱額緣越山谿入漢中屠戮畧陽西鄉沔利城亦不守殺守令燔屋廬刼婦女杜道路朝廷屢發師旅征討而賊皆驅所掠之饑民委之殺人盈野費財空帑不能救藥吕柟涇野集六年六月官兵平漢中五年廷議謂闗陜天下險要之首而鴇醜實諸賊之初起即墨藍公以陜西僉憲為都察院右僉都御史巡撫陜西㑹總制卿洪公及荆蜀巡撫諸公戮力同心四伐鴇醜自帥師以來竭忠貞簡恤將士用其膽智以遏亂畧六年六月擒其渠魁三十人於金寶寺解厥支蔓百千其衆上令典刑諸魁梟首湖廣於是諸賊膽懾漢中乃乂進右副都御史仍撫陜西比公退長安餘孽曹甫續叛江津漢人雲擾公再領師入漢威徳昭臨甫懼奔蜀黨與大解所降男女萬有二千築京觀於金寶刹而歸吕柟涇野集七年冬十一月雒川賊冦澄城指揮張等死之正徳七年十一月雒川妖賊邵進祿等入犯由黄龍山據白水衙寨四掠潼闗衛指揮張闗健百户王珍與戰死之兵備使者張禴率衆擊走之澄城縣志十年秋八月諳達冦米脂綏徳正徳十年八月諳達自榆林直犯米脂綏徳無定河大川至黄河西岸大殺掠十一年二月又入榆林塞延綏鎮志十三年冬十月帝如榆林正徳十三年冬十月上自偏頭渡河幸榆林十一月上在榆林十二月上在榆林十四年春正月上在榆林二月初旬上自榆林還京師續文獻通考武宗西巡命鄭𤾉督餉於邊值葭州盜起猖獗𤾉督官兵討平之延綏鎮志世宗嘉靖元年套虜冦邠隴諸州北虜在套恣肆嘉靖元年復大舉直犯西安之邠州鳳翔之隴州殺掠之慘比前倍之續文獻通考四年秋乾州人樊伸作亂官兵擒獲之伸多貲而樂誕方士誕妄者皆集於其門附㑹伸意行諛於伸云伸當大貴於是傳播逺近舉翕然從伸而伸遂自居不疑日召無賴男子習戰修武來者雲集又令妖人以照水法惑之洎三年隂相結聚者十數萬人是年秋集黨冦乾州州人力禦之日晡逃去走南山結銀兵復謀北冦郡縣震動武功姜令下令曰伸輩皆膏梁子徒以妖師扇惑至是其黨固烏合也即果南奔礦場必假道於此立節渭水橋頭凡濱水諸村落宜據舟密候其至共力與擊賊可悉擒明日昧爽賊果至諸村落人執梃拒賊賊悉從涉渡逃去獲馬及器物村落以馬來令即以馬賞曰能得賊賞更不直此日中有執賊至者得伸所給號帖已署有偽官乃立磔於市而厚賞獲者凡涇咸興醴愚民為賊惑者舉不敢南渡應賊賊居鐵爐菴五六日候應不至始決意趨礦場又二日賊首悉為于敖輩所擒無一遁者賊黨悉平康海姜武功平賊序八年冬十月濟囊諳達冦榆林嘉靖八年十月濟囊諳達冦榆林塞總督王瓊率兵禦却之初小王子有三子長阿爾婁次阿珠次莽果沁阿爾婁死阿珠稱小王子未幾死衆立阿爾婁子愽恰而阿珠子二曰濟囊曰諳逹強甚濟囊分地河套當闗中地肥饒時入冦瓊乃請修沿邊垣墉起蘭洮盡榆林三千餘里紀事本末十一年春二月濟囊冦榆林總督唐龍禦却之嘉靖十一年二月内虜酋濟囊等擁衆十萬侵犯榆林臣即提兵往勦將主客兵分布要害且戰且守虜屢遭挫衂計不能入乃突出五萬由野馬川渡河徑入西海襲破虜營收其部落大半歸於套内唐龍申嚴邊防以弭虜患疏先是北虜自延綏求通貢市事下兵部議兵部言小王子通貢雖有成化𢎞治年間事例但其情多詐難以輕信宜命總制鎮巡官察其情偽無何虜以不得請為憾遂擁衆十餘萬入冦五月吏部尚書王瓊上言臣前議榆林之虜直以精兵扼之綏徳險陿調固原援兵三千足矣而當事過計乃至調京營宣大寧固兵一萬八千赴之供億浩繁日費至六千金内地坐困今虜已退乞掣囘京軍散遣各路所調及召募兵専責本鎮兵據險防守世法錄十三年秋濟囊冦榆林嘉靖十三年七月濟囊入榆林塞八月又入榆林塞遊擊梁震敗之於定邊延綏鎮志十四年夏六月濟囊冦榆林嘉靖十四年六月濟囊入榆林塞掠内郡叅將魏祥死之八月又入榆林塞守將梁震擊敗之延綏鎮志十五年秋套酋冦延綏官軍擊敗之嘉靖十五年秋虜入延綏黒河墩蒺藜川等處官兵四戰皆敗之斬首百餘級世法錄十八年冬十二月套酋冦榆林嘉靖十八年十二月套酋入榆林塞殺守將宋隆延綏鎮志十九年春三月套酋㓂榆林總兵周尚文擊敗之十九年三月套酋入榆林塞破清平堡入米脂總兵官周尚文駐兵狄青原邀擊之以捷聞延綏鎮志秋八月濟囊冦安邊總督劉天和大破之嘉靖庚子秋虜數萬入安邊定邊陜西總制尚書劉天和率精兵九千斬虜首五百卒張奴兒殺濟囊之子虜諸酋大哭遁去續文獻通考嘉靖十九年虜酋濟囊擁數萬由延綏西路定邊營入冦時諸鎮兵悉分布守邊虜乘虛四掠殺戮甚慘會大雨浹旬道濘虜騎不得騁弓矢盡膠陜西總兵趙時督兵分道邀之虜始引旋至黒水苑延綏革任總兵周尚文盡鋭攻之自巳至申凡三戰勝負未決吉囊子號小十王者驍果而輕率其勁卒三十餘人馳衝營中堅為我軍所殲虜衆遂奪氣斂去寧夏總兵任傑副總兵陶希臯復選鋭於鐵柱泉迎擊之追奔出塞斬獲甚衆是役也虜以八月二十一日入境九月十二日始出初至甚鋭諸將莫敢攖其鋒者虜乃深入内地縱横虜掠既霖潦旋虜欲且饜顧惜輜重兼易我軍甚無戰志總督尚書劉天和以脩省詔旨嚴切而諸將畏縮慮重得罪乃斬不用命指揮使牛斗郭卿二人時周尚文已革任特檄召之激以忠義尚文感奮遂有黒水苑之戰軍氣乃振而三鎮斬獲至四百四十餘級虜所擄獲亦復失亡過半於是天和以捷聞上大嘉之曰虜歴嵗冦邊猖獗滋熾天和等調度士馬悉力驅𠞰斬將擒王此捷前所未有總督巡撫鎮守等官俱賜勅奬勵世法錄二十二年秋八月套酋冦延綏守將張鵬等擊破之嘉靖二十二年虜三萬騎犯延綏遊擊張鵬力戰禦之虜引去總兵官吳瑛副總兵傅存禮尾之在外東路叅將周尚文兵亦至因夾擊斬百餘級而還巡撫都御史張􅙆等以捷聞時巡按陜西御史殷學報虜因言賊入内地且五百里而諸將擁兵不聞一戰請罷􅙆瑛等疏方入而捷至上嘉守臣功謂學謬於是非世法錄二十四年秋七月套虜入冦總督張珩調諸將兵禦之吳瑛張鵬等兵失律虜大掠而還嘉靖乙巳七月虜兵二萬餘騎結營邊外謀入冦覘者以報榆林總兵吳瑛瑛即以報總督張珩明日瑛與副總兵李琦併將兵出榆林時總督以防秋住花馬池聞即發所部將在花馬池者四將軍軍往擊之瑛故狡智多算度虜入必自寧塞營寧塞則遊擊將軍張鵬分地伏冦彼自當我即往必與虜先鋒遇接戰乃與琦故囘逺出逶迤邅延不與賊兵值虜果由寧塞營穿牆擁入張鵬不能禦匿避之初虜入寧塞以為旁有伏軍顧慮不敢前及至新城池四望不見一人遂揚揚南馳無復忌畏而李琦自清平堡與吳瑛分行至靖邊營忽值虜虜圍琦急琦度不免殊死戰延綏遊擊將軍龍登固原遊擊將軍葛宇咸以總督遣適至而分守延綏西路㕘將楊鋭亦領兵來與兩軍會咸奔救琦虜見兵集多度不勝解去琦得免琦面中賊矢一所殺虜亦數人瑛鵬軍不知所往陜西總兵王縉寧夏總兵李義與登宇軍同遣以為賊犯所自有當乃故逗遛後登宇期登宇以二人同遣不至與楊鋭等各頓兵不擊賊但依險自保而已於是賊益狂馳趨利直抵園林驛岔洛川諸處縱兵肆掠踰保安犯安塞未至延安僅百里耳極意恣暴盤留十餘日而去至八月七日復自寧塞營穿牆故道出亦不見我軍一人虜出邊有司籍虜掠男女四千四百五十有四馬驘牛羊十四萬五千二十有四殺傷男女一百七十有四其蹂躪田稼燔燬室廬刼取衣物不可數計諸將懼罪乃相約偽為虜首各為書偽稱戰得虜首若干級謀定咸奏報總督隔逺不為察而撫臣雷同不肯發奸巡按御史曹邦輔行部聞之上書劾諸將請法之書至天子使給事中鮑公往視之鮑公還報詔下吏治七將軍論如法總督撫臣亦皆不宥惟李琦以與賊戰少有功獲賞焉王維禎核邊記二十五年秋八月套酋犯延安掠内地嘉靖二十五年八月套虜三萬餘人入冦越延安府至於三原涇陽殺掠人畜無算事聞上下旨曰今年失事頗輕不必查核總督三邊侍郎曾銑請復河套條為八議一曰定廟謨二曰立綱紀三曰審機宜四曰選將材五曰任賢能六曰足芻餉七曰明賞罰八曰修長技計萬餘言指據明悉下兵部議行嘉靖二十五年虜十萬騎以七月二十五日自寧塞營入犯延安保安諸處殺掠男婦諸軍禦之不能却總督侍郎曾銑遣叅將李珍夜出塞刼其營斬虜百十一級生擒虜一人虜聞始遁去世法錄二十六年夏五月總督曾銑出塞襲套部勝之三月中套虜以草清近邊塞住牧零騎往來侵掠居民不敢樵採總督侍郎曾銑方鳩兵繕塞慮為所擾乃蒐選鋭卒督之出戰凡斬首二十七級生擒一人托克托呼斃於矢石者甚衆獲馬牛駝及夷器以千計虜移帳漸北間以輕騎入掠銑復督諸軍驅之虜遂逺徙不復近塞世法錄三十三年春三月套酋冦高家堡嘉靖三十三年三月套部犯高家堡副總兵李梅死之延綏鎮志三十四年冬十月吉能冦葭州府谷嘉靖三十四年十月吉能犯建安栁樹會葭州至府谷叅將楊璘死之延綏鎮志濟按紀事本末吉能農子也三十六年春三月徳埒哩冦榆林嘉靖三十六年三月徳埒哩犯榆林副總兵陳鳳往擊死之延綏鎮志四十年夏四月套酋冦鎮靖堡十一月又犯榆林嘉靖四十年四月套人犯鎮靖堡殺掠二千餘人去十一月套人犯榆林南下攻背干川大牆至米脂守備謝世勲戰死延綏鎮志四十二年秋七月套酋陷黄甫川嘉靖四十二年七月套酋陷黄甫川堡把總高秉鈞死之延綏鎮志是年七月虜襲陷黄甫川堡殺二百八十餘人倉官一人世法錄四十四年春正月套酋冦邊總兵趙岢擊敗之嘉靖四十四年正月套酋入塞總督郭䖍巡撫胡志䕫會議令總兵趙岢帥兵出榆林邊外至黒灘畔頁河兒克之延綏鎮志夏四月虜陷黄甫川堡秋九月陷鎮靖堡嘉靖四十四年四月虜陷黄甫川堡殺二百八十餘人倉官一人九月犯鎮靖堡㕘將魯聰戰死亡將士二百餘人世法錄四十五年秋七月套酋冦延安總兵郭江死之嘉靖四十五年六月虜陷筆架城擄掠甚衆官軍逐之去七月薄安塞縣城分騎掠延安府北闗及東西兩川八月入甜水等堡殺三十六人總兵郭江等戰死亡兵六百餘人世法錄穆宗隆慶元年春套酋入冦守將王鐸戰死隆慶元年正月虜冦小芹河墩半入總兵郭琥與戰却之追出邊遇伏失亡相當二月攻清平堡遊擊郭鈞等固守不下虜乃引去三月虜攻康家寨守備王鐸等逐之有斬獲功鐸中矢死又入榆科澗遊擊高天吉等敗之又入常樂堡又敗之前後奏報俱下御史勘覈至是御史楊鉁上其事劾鎮撫薛鞫指揮陳保通判王尚賢叅將李希靖千户田養賢等各失事罪狀及他功罪相贖者并叙原任總督霍冀巡撫王遴總兵趙岢副使楊錦等修築邊牆功兵部覆奏上命賞冀等銀幣有差遴遇缺推用鞫保謫戍尚賢為民希靖革任養賢等俱下御史問世法錄四年詔陜西邊缺簡能員除授隆慶四年大學士高拱請自今各邊有司必擇年力精強才氣超邁者除補陜西則安塞安定保安清澗綏徳米脂葭州吳堡神木府谷等州縣從之續文獻通考神宗萬厯四十三年秋吉能入冦萬厯乙夘閏八月吉能等挾討王封金印等十大事不許大舉入犯大柏油孤山中軍劉聚等死之是年十二月沙計歹成等謀犯雙山總兵官秉忠出塞擊破之延綏鎮志四十四年秋七月沙計㓂高家堡萬厯四十四年七月沙計入冦高家堡都司僉書王國安死之延綏鎮志熹宗天啟二年秋九月套酋冦延鄜天啟二年九月套人冦延安至鄜州越四日乃去延綏鎮志愍帝崇禎元年春正月置降丁于延綏崇禎戊辰春命安置降丁于延綏等處初兵部請置之山海闗三屯營不許明史畧冬十一月陜西盗起是嵗延安饑府谷民王嘉𦙍作亂延安人張獻忠從之獻忠隂謀多智賊中號八大王其部最強旁掠延安諸郡邑紀事本末崇禎戊辰府谷民王嘉𦙍倡亂又有不沾泥楊六郎白水盜王二等掠蒲州韓城刼宜君獄北合嘉𦙍五六千人二申野錄漢南賊四百餘人自汧陽兩當薄畧陽引土賊三千餘人入畧偪漢中等處白水賊合山西逃兵掠蒲城韓城之孝童淄川鎮時承平久猝被兵人無固志陜西巡撫胡廷晏惡聞盜警杖報者曰此饑民也掠至明春後自定耳後各縣不以聞盜偵知之益恣明史畧崇禎元年延安大饑其十一月王嘉𦙍起府谷王二起白水相聚於黄龍山為盜不沾泥一座城五虎黒煞神等起洛川王和尚混天王起延川苗美左掛子起綏德苗登騖起安定各有衆三四千漢南盜又大起畧陽清水涇陽富平耀州之間囂然矣延綏鎮志十二月米脂人李自成為盜延安饑不沾泥楊六郎王嘉𦙍等掠富家粟有司捕之急遂揭竿為盜自成性狡黠善走能騎射家貧為驛書往投焉已而叅政洪承疇擊賊破之不沾泥等相次俘獲自成走匿山澤間得免紀事本末李按延綏鎮志紀自成於崇禎四年始起為盜與此互異二年春正月陜西延綏撫臣奏流賊恣肆二月以劉廣生巡撫陜西楊鶴總督三邊軍務崇禎己巳春正月洛川淳化三水畧陽韓城宜君中部石泉宜川綏徳葭耀潼闗陽平闗金鎖闗流賊恣掠固原逃兵掠涇陽富平執遊擊李英二申野錄陜西巡撫胡廷晏延綏巡撫岳和聲各奏流賊恣掠刑科給事中上言賊之熾也由喬應甲撫秦置盜刼不問實釀其禍今弭盜之方在整飭吏治有先事隄防之法有臨事翦滅之法有後事懲戒之法上是之紀事本末二月以陜西左布政劉廣生為秦撫右副都御史楊鶴總督三邊官軍勦漢南賊平張獻忠據米脂十八寨乞降二申野錄副使劉應遇擊賊於漢中破走之二月丙午商洛道劉應遇率毛兵入漢中合四川吳國輔兵敗賊賊走漢隂遇遣兵追之誅渠魁數十人餘走蜀漢南悉平明史畧夏四月叅政洪承疇擊賊於耀州破之崇禎己巳三月流盜掠三水四月固原賊犯耀州叅政洪承疇合官兵鄉勇萬餘人圍賊於雲陽幾覆之賊乘夜雷雨潰圍走淳化入神道嶺紀事本末流賊犯涇陽套酋冦延綏四月流盜犯涇陽甘峪遊擊商從龍被殺時西人五十騎犯延綏髙家堡千總王權徳逐之出塞敵兵漸至權徳敗沒中軍任秉徳千總白慎俱死之明史畧冬十月李自成稱闖將山西兵潰叛走秦晉間山谷李自成出與之合旬日間衆至萬餘推髙迎祥為首稱闖王賊中稱自成為闖將紀事本末良按自成時依髙迎祥迎祥方自號闖王與劉佐自結為一隊故闖將名不大著十一月詔陜西巡撫劉廣生𠞰賊十一月丁未上命馳諭陜西巡撫劉廣生令急殲流孽不必入衛時大盜混天王等掠延川米脂清澗諸縣復召前總兵杜文煥使𠞰之明史畧三年春正月綏徳安定盜起官兵擊敗之三年春正月陜西邊盜王子順苗美連逃兵衆至三四千掠綏徳南圍韓城總督楊鶴巡撫劉廣生擊敗之賊遁復犯清澗官兵追逃賊走四川先是萬厯時朝廷命西軍勞苦預給三月糧以為常至是秦旱粟騰貴軍餉告匱往往譁潰亡命山谷遂倡饑民為亂時廷議核兵餉各邊鎮咸釐汰至數十萬兵多譟給事劉𢡟請裁定驛站可嵗省金錢數十餘萬上從之給事許國榮御史姜思睿爭之不能得河北遊民向藉食驛糈用是益無賴嵗不登無所得食所在潰兵煽之而全陜無寧土矣明紀會纂夏六月王嘉𦙍據府谷官兵擊敗之崇禎三年四月王嘉𦙍陷府谷六月陷黄甫川清水二營遂據府谷洪承疇總兵杜文煥圍之賊夜刼營官兵擊敗之紀事本末綏徳賊王子順降六月延安府知府張輦都司艾穆破賊王子順於延川招降之延綏鎮志時王嘉𦙍等冦掠延慶諸郡城堡多陷總督楊鶴主撫不以聞與陜撫劉廣生遣官持牌四出招賊賊魁黄虎小紅狼一丈青龍江水掠地虎郝小泉等俱給牒免死安置延綏河西但不焚殺其淫掠如故民罹毒益甚兵科給事中劉懋上言秦之流賊非流自他省即延慶之兵丁土賊也邊盜倚土冦為嚮導土冦倚邊盜為羽翼六七年來韓蒲被掠其數不多至近年荒旱頻仍愚民影附流刼涇原富耀之間賊勢始大當事以不練之兵勦之不克又議撫之其勦也所斬獲皆饑民也而真賊飽掠以去矣其撫也非不稱降聚衆無食仍出刼掠名降而實非降也且今斗粟金三錢營卒乏食三十餘月即慈母不能保其子彼官且奈兵民何哉邇來貪酷成風民有三金不能供納賦之一金至捕一盜而破十數家完一贖而傾人百金産奈何民不驅為盜乎若營兵曠伍半役於司道半折於武弁所餘老弱既不堪戰又不練習當責督撫清汰操練以備實用紀事本末秋九月套酋冦邊巡鎮兵逆戰破之崇禎庚午九月己夘黄甫川賊復勾套人入掠巡撫洪承疇總兵杜文煥從孤山進擊大破之賊始奔潰明史畧冬十月王嘉𦙍復陷府谷崇禎庚午十月王嘉𦙍陷清水營殺遊擊李顯宗遂破府谷延綏鎮志十二月神一元陷寧塞據之崇禎庚午十二月神一元破寧塞據之殺叅將陳三槐圍靖邊副使李右梓固守賊勾西人四千騎益圍靖邊三日夜遂陷栁樹澗保安等城紀事本末四年春正月神一元陷保安副總兵張應昌擊敗之崇禎辛未神一元陷保安張應昌擊之一元死弟一魁領其衆二月總兵賀虎臣杜文煥合軍圍保安一魁突圍遁延綏鎮志遣使往陜西招撫流盜崇禎辛未正月命御史吳甡齎金賑陜西饑荒招撫流盜明鑑易知錄臣䝉簡命賑賚延綏叱馭而西臣訪得流賊猖獗情形敢為皇上陳之延鎮四面黄沙無可耕之地専倚兩運為續命之膏自改本色為折色而庾廩空矣自改輸粟而納銀増浮課而引滯而鹽政廢矣自鹽商歸籍田地荒蕪豪弁肆虐而屯政廢矣自㕘罰之會嚴凡馬匹倒損諸弁率隠匿不報而馬政廢矣加以幾番調援精鋭俱盡凶年相繼月餉不敷此饑軍為盜之根因也延慶一帶荒涼瘠薄仍復加派遼餉明經有司日暮途窮巧營歸槖百姓入城封糧則監追其積逋逃亡拖累全無樂生之氣因之饑饉富者皆貧貧者皆賊邊軍糾集遂相附合此饑民為盜之根因也又有邊地軍餘及廢弁家丁生來勁悍弓馬精熟既無月餉又憚耕耘惟有做賊一路視為固然當其躍馬而出肆行剽掠歸來得有多財則分送親識即將官之左右無不相通黨與日衆敢為叛亂此軍餘為盜之根因也賊之初發勢亦甚微地方官視為泛常全無備禦總一缺乏錢糧悮事到底且調來邊兵皆與賊相識臨陣有相對立談而不戰者有將老弱饑民割級送與獻功者有將輜重遺棄聴其搶掠者上下轉相䝉蔽趕出境外便報蕩平此盜賊猖獗之根因也夫秦晉為京師右臂况秦百二河山延鎮勁兵甲於宇内今賊聚衆數萬東延西蔓屠毒兩省此豈可易視之耶即延鎮應得之餉計臣寧悮封疆而必不肯慨發數十萬以濟燃眉秦事真不可為矣則無如就近兑支陜西遼餉尤急著也臣遵奉諭旨次第給賑已檄司道轉行州縣查取見在饑民及已被脇從悮投賊黨願歸正維新者一體收恤於賑賚之中寓解散之意廟謨宸斷已得要領少俟頒布徳音即當冒險而前躬歴郡縣親自給散不敢不竭盡心力至攻城陷堡之叛賊如王嘉𦙍神一元之𩔖在督撫鎮將同心合力聲罪致討未可奉若驕子懈將士之心貽異日封疆之禍如欲臣以哺饑之具為盜齎糧臣所不敢出也總之激厲將士全在足餉餉足而後可以申嚴賞罰賞罰明而後人心鼓舞用命失軍機陷城池之罰凜然議其後而文武俱束於法則大賊可平而小賊不足撫也吳甡星馳入闗疏二月官軍圍賊神一魁於保安賊突圍走二月壬子總兵賀虎臣杜文煥合軍圍保安神一魁勾西人千餘騎突圍出復糾賊數萬刦寧夏紀事本末宜君盜起冦掠西安諸縣四年二月宜君賊起和尚等犯涇陽三原韓城澄城三月賊帥孫繼業等來降總督楊鶴受之紀事本末夏四月總督楊鶴招神一魁降之四月己未賊神一魁降於楊鶴鶴責數其罪懼伏謝一魁有戰騎五千鶴侈其事上言乞賜數萬金賑濟又止巡撫練國事北征商雒賊亦求撫於國事從之其脇從饑民各給牒回籍首領置軍中丁夘延綏巡撫洪承疇令守備賀人龍勞降者酒降者入謝伏兵斬三百二十人紀事本末降盜不沾泥叛攻米脂官軍擊降之降盜不沾泥擁衆脇糧賞復攻米脂總兵王承恩侯拱極率兵至葭州洪承疇張應昌亦至賊分兩營以待連戰賊始遁追至西川斬三百餘級賊溺死無算官兵屯西川雙湖峪其間窰塞六十有四皆險絶盡為賊藪承疇令在在設防堵截不沾泥懼率百騎逃闗山嶺都司馬科等追之盡殲其騎不沾泥乃降殺賊目雙翅虎縳紫金龍自贖紀事本末五月總兵王承恩擊宜川賊降之崇禎辛未五月王承恩擊宜川賊敗之闖王虎金翅鵬乞降餘賊走宜君其衆二萬紀事本末陜西都司曹變蛟擊賊於唐毛山大破之五月陜西都司曹變蛟追寧塞遺賊於唐毛山賊大潰四戰皆捷先後斬一千四百餘級而寧塞遺賊稍殺矣紀事本末賊冦韓城郃陽叅將張全昌破走之延安賊趙四兒以萬餘人掠韓城郃陽靈州叅將張全昌以五百人戰三日斬三百餘級賊走鄜州復進擊斬六百餘級尋降紀事本末六月官軍擊鄜州賊敗降之六月辛酉鄜州賊混天猴張孟金謀襲靖邊張應昌邀之於真水川敗之追斬四百餘級癸亥混天猴獨行狼等萬餘人自甘泉犯合水洪承疇率兵追擊敗之甘泉山中混天猴等乞降紀事本末秋七月賊復掠鄜州擊破之七月賊首上天龍馬老虎獨行狼復掠鄜州列三營於太平原楊鶴王承恩擊破之上天龍等以二千人降給事中孟國祥曹履太各奏撫賊欺飾之弊逮陜西三邊都御史楊鶴下獄論戍之紀事本末九月降盜神一魁叛據寧塞討誅之九月神一魁復叛據寧塞張應昌討之其黨黄友才斬以獻是月獨頭虎滿天星一丈青上天猴等恣掠宜雒二申野錄冬十一月賊陷安塞閏十一月陷安定王承恩克之崇禎辛未十一月陜西賊譚雄陷安塞襲掠一空仍乞撫閏十一月總兵王承恩誘譚雄等五人斬之癸丑降賊不沾泥張存孟陷安定王承恩討克安塞斬五百餘級即進勦安定賊走綏徳紀事本末賊陷甘泉副使張允登等死之降丁混天猴勾盜夜陷甘泉刼餉銀十萬八千兩殺知縣郭永圖河西道張允登戰死洪承疇聞之遣王承恩分勦以甘泉鄜延咽喉而自以四百人赴之賊勢日熾承疇日不暇給矣紀事本末十二月賊陷葭州僉事郭景嵩死之崇禎辛未十二月甘泉賊陷宜君又陷葭州兵備僉事郭景嵩死之諸降盜復叛攻綏徳紀事本末五年春正月賊陷宜君二月陷鄜州崇禎壬申正月延綏賊偽為米商陷宜君復陷保安明紀㑹纂二月盜夜入鄜州僉事郭應響死之紀事本末三月套酋入冦曹文詔拒却之河套以三百騎近塞稱察罕求欵千總李世科陣歿曹文詔等擊之乃不得入明史畧秋八月曹文詔擊賊於甘泉破之八月曹文詔擊賊於甘泉敗之洪承疇令脇從者免殺降四千餘人散者亦數千人餘賊散匿山谷紀事本末六年秋九月察罕冦鄜延插罕自高家堡入犯焚掠至石窰溝九月察罕入延安至鄜州套部為察罕所逼和爾台及古魯部來降延綏鎮志叛盜不沾泥㓂葭州癸酉九月不沾泥等至三岔川總兵王承恩禦之東去掠葭州延綏鎮志冬十二月延綏巡撫陳奇瑜擊賊於永寧闗大破之時秦賊已盡入晉而延綏賊首鑚天哨開山斧獨據永寧闗前阻山險下臨黄河負固數年不下奇瑜謀取之乃陽傳總制檄發兵簡衆抵延川潛師疾走入山賊不虞大兵至倉皇潰佚焚其巢縱擊斬首千六百級二賊死分兵擊賊首一座城斬之奇瑜威名著闗陜明鑑易知錄是年冬山西河北賊分入漢中興平陜西賊陷鎮安二申野錄七年春正月李自成張獻忠敗走盩鄠總督洪承疇率總兵曹文詔等先後𠞰諸賊斬獲甚衆羣賊奔入商雒興平大山中自成獻忠奔盩鄠間紀事本末賊陷漢南諸縣正月辛丑陜賊陷洵陽逼興安土冦乘之漢中震動興安賊連陷紫陽平利白河道臣王在台固守興安洪承疇赴援城得全時練國事移兵商雒賊南破鳳縣入四川紀事本末詔延綏巡撫陳奇瑜督師討賊進陳奇瑜兵部右侍郎總督軍務視賊所向隨方勦撫明紀會纂夏四月四川湖廣賊趨漢中五月洪承疇會師逐賊走匿四月川賊復入陜己夘陷鳳縣先是三邊總督洪承疇因插漢犯甘肅即漢中北行至棧道青橋驛聞川賊數萬營寧羌乃返至沔州援之賊由平陽闗過河奔鞏昌承疇檄副將賀人龍等兵三千赴藍田夾擊及兩當鳳縣連陷賊分道一向邊方一向漢中知府㫁棧道守雞頭岡賊不得前間道犯城固洋縣官兵禦却之賊走石泉漢隂又别部賊二萬由鳳縣趨寶雞􅊈陽求撫承疇姑慰諭焉時撫治鄖陽盧象昇總督陳奇瑜以數省兵力萃于楚楚賊盡西奔漢中而川巴通江入西郷者復二三千凡名賊盡歸漢中興平而接於商雒癸未復謀入川阻大江入西安之終南五月陜别賊畧鄜延官軍廹之皆傍終南山竄入商雒羣盜畢集深入大峪承疇㑹師進逐之遂東走網峪川復入大山逺竄紀事本末六月陳奇瑜擊賊於漢中受其降總督陳奇瑜圍李自成於漢中車廂峽㑹連雨四十日賊馬乏芻死者過半弓矢俱脱賊大窘自成乃自縳乞降奇瑜許之各給免死票回籍自是復縱横不可制矣紀本末事崇禎甲戌五月陜賊再陷鳳縣漢南六月洪承疇等阨賊漢中賊詐降陳奇瑜信之賊出棧道陷麟遊永夀同官二申野錄秋七月鳳翔守臣殺賊陳奇瑜奏逮之七月辛夘賊至鳳翔藉口奉督撫檄安插城内守臣知其詐紿以門不敢啓須縋城上先登三十六人盡殺之陳奇瑜因借為辭劾地方官紳撓僨撫局命緹騎逮寶雞知縣李嘉彦鳳翔郷紳孫鵬等下獄紀事本末巡撫練國事擊賊於盩厔殲之叛兵楊國棟擁三千騎披雙鎧直抵西安城下乞撫巡按范復粹無計登陴固守巡撫練國事在鄠縣聞之馳還登南城檄賊至濠畔語一日夜未決度不受撫必西走鄠盩厔密檄沿途官兵弛備更設伏於盩厔之夾水溝時禾茂泥淖騎不任馳伏發殲其半國事遣官招之諭殺渠自贖予上賞頃之一賊斬國棟以獻賊人人自疑互戕千餘人餘仍入南山紀事本末李自成陷澄城崇禎甲戌七月闖賊陷澄城圍郃陽聞洪承疇兵至解圍去轉掠邠州時張獻忠敗奔商雒與李自成合陷澄城冦邠州旋與羣賊出潼闗二申野錄賊自鳳翔東犯西安官兵禦却之賊走商雒乙未賊混世王等從鳳翔東奔云犯西安洪承疇馳一日夜入西安檄諸路兵赴西安合擊賊賊颺至西安東境官軍以力疲未能出承疇恐賊東出潼闗先令張全昌曹變蛟間道走渭華遏其前而自率兵至潼闗追賊遊擊李效祖柏永鎮力戰賊卻不能出闗因登山承疇馳赴藍田欲從山後間道勦之丙午賊覘知官兵意夜走商雒初老􅉰􅉰等萬餘先踞雒南山中今又益盜萬餘其地山谷險阻承疇率諸將兵共三千人赴潼闗大峪口截其出仍備閿郷靈寶諸處紀事本末八月李自成據乾州李自成陷威寧殺知縣趙躋昌洪承疇兵至賊棄金錦餌官兵竟西遁屯乾州招之不應紀事本末賊陷隴州崇禎甲戌八月陜賊復陷隴州閏八月陳奇瑜至鳳縣時賊益熾衆殆二十萬二申野錄八月陳奇瑜招撫降賊復叛先是川兵扼巴西諸險賊無所得食故乞降於奇瑜凡數萬人奇瑜專事招撫受其降檄諸軍按甲不動遣官監䕶降者檄所過郡邑具糗糧傳送之度棧道已出險漸不受繩束仍肆殺掠盡殺䕶官五十員攻城陷麟遊永夀勢不可遏矣明紀㑹纂九月賊陷扶風崇禎甲戌九月陜賊陷扶風時賊二十餘營至函谷連屯百餘里别賊萬餘連營雒南西北至邠州長安西南則盩厔寶雞大冦皆聚秦中明史畧洪承疇遣兵援隴州先是賊圍賀人龍於隴州賊先鋒高傑降於賀人龍人龍率以襲賊稍卻之至是洪承疇遣左斗先等援隴州賀人龍圍始解明史畧冬十月總兵左光先擊賊於高陵富平敗之左光先擊李自成於高陵富平間斬首四百餘級自成佯求撫真寧知縣王家永遽信之出城招諭失其印陜西巡按御史傅永淳上言降盜破城陷邑所在騷然皆由陳奇瑜専主招降不許道途問訊開門揖盜𠞰撫兩妨皆奇瑜之流毒也吳甡言招安流盜最宜慎重彼狼子野心勢難馴伏况邊地窮荒蕪居無食僅曰免死遂甘心易慮乎哉明史畧八年春正月賊犯商南入漢中崇禎乙亥春正月河南北賊犯商南河南賊復入漢中二申野錄先是秦賊數十萬出闗三分入晉入豫入楚總督洪承疇抵河南河南諸盜知承疇至又入潼闗承疇遣副總兵來引昌以兵千二百往戍西安紀事本末二月賊冦西安三月賊陷寧羌二月癸未賊密邇潼闗雒南者又折入秦中約六七萬西安諸縣並遭蹂躪有四大營北渡渭突剽邠耀間乙未命陜西巡撫移商州調度興安漢中三月壬戌漢中賊陷寧羌紀事本末夏四月洪承疇督兵入闗討賊四月乙酉承疇以各冦之復入秦也率諸將自汝入秦檄曹文詔以師㑹丙午承疇次靈寶以商雒為賊藪漢中興平其寄境也令文詔出閿郷直𢷬商洛自馳興安遏其犇軼五月甲寅曹文詔夜至五峪冦伏險以誘文詔擊敗之張全昌自咸陽出興平之東老􅉰􅉰等距官兵營五十里賀人龍南入子午谷奪其南徑劉成功及遊擊王永祥往東南遏其北走賊夜渡河走郿縣承疇亦渡河追之丙辰至王渠鎮冦方下南山恣掠賀人龍遽擊走之追至大泥峪賊舍騎登山丁巳官兵至郿縣之秦王嶺值冦張全昌擊敗之自是商雒之冦逃終南山中餘冦西奔興平蓋冬春之間賊奔豫楚江北至是又復萃於秦矣紀事本末秋七月賊陷澄城八月陷咸陽崇禎乙亥七月癸亥秦賊陷澄城八月壬午陷咸陽丁酉商雒賊復入河南二申野錄崇禎間流賊數萬自延安來襲縣城韓郃營副將張全昌大破之澄城縣志冬十月洪承疇擊賊於武功敗走之先是賊翻山鷂降於承疇賊首闖王屯乾州承疇令翻山鷂説之不聴南走武功承疇追擊敗之闖王自盩厔武功分道渡河紀事本末十一月賊據鄜州十一月辛酉秦賊一字王等部衆二十萬撞天王統十七萬自潼闗出塵埃漲天絡繹百里左良玉與總兵祖寛兩軍相隔不敢邀擊秦賊屯於鄜州綿亘百里紀事本末賊滿天星等冦韓城知縣左懋第率士民守之不克十一月二十八日侵薛峯韓城鎮名者乃賊滿天星也賊衆數千懋第約守備劉進爵遣兵夜砍其營㑹同郷兵舉砲相應賊衆夜亂于十二月起營北向欲渡河因山西有備㑹郃陽王叅將名永祥兵亦至與韓城兵合遂遁尋闖將賊以數萬自宜雒川入韓境滿天星復與合賊哨五千騎直抵城下懋第督火器擊退劉進爵遇數萬賊於土門口四面圍裹血戰得脱賊遂合營圍繞韓城先是懋第修濬城池重築攔馬牆以防賊騎城頭火器衝擊賊未敢近懋第與紳士合力分城以守㑹大兵馳救大挫賊於西原馬庄之間賊退遂肆毒於四郷堡寨堅守者甚多懋第與士民同守孤城雖四面賊圍前後四十餘日城守時時啟閉薪米出入不絶郷民入城者廟宇公廨皆滿故城未至坐困左懋第韓城集十二月叅將羅于萃擊賊於漢中敗走之十二月乙酉漢中羣賊㑹於漢南戊戌雅黎叅將羅于萃連擊敗之窮追賊於子午谷奪其所掠子女二千口賊犇饒風闗紀事本末四川總兵楊玉振與賊戰於雒南敗績死之玉振四川總戎也崇禎乙亥統兵二萬來雒勦㓂駐屯城外粒芥不擾時秦將之駐縣者酷暴噬民振聞惡甚欲劾奏居無何賊從石梯峪入山衆且數萬振嚴兵迎敵遇賊於黒潭且戰且圍殪賊殆盡振逐賊渠入峪中適有别賊從階峪入者又且數萬秦將忌振成功秘不與知麾兵潛遁川兵遂潰振受害雒南志九年春正月賊陷麟遊正月己巳漢中之賊過天星九條龍陷麟遊延綏鎮志是月給事中常自裕上言流冦數十萬最強無過闖王彼多番漢降丁堅甲鐵騎洪承疇盧象昇即日報斬獲不過别營小隊耳於闖勢曾無損也今秦賊在宜君鄜州當責求秦撫而督理兩臣宜令専圖闖王賊渠殲而餘賊自成破竹矣紀事本末二月置降賊於延安總兵栁紹宗等敗過天星於西寧州賊窮蹙請降陜西巡撫甘學闊受其降安插其部數千人於延安尋沿河刼掠如故紀事本末三月賊入漢中三月乙丑賊闖王蝎子塊自興安入漢中紀事本末李自成入商雒據三水先是李自成由潼闗而南與諸賊㑹都司陳永福敗之自成奔漢南循南山遵洛水而行至武功渡渭河走涇陽三原以馬少直趨秦川牛馬營掠馬數千匹攻隴州破之將攻鳯翔且於三水縣牧馬旬日間有衆數萬延綏鎮志總兵曹文詔擊李自成於三水敗績死之洪承疇檄曹文詔以兵㑹三水之鍬頭原與李賊遇自成頗怯不敢戰亂世王請為先鋒自成大喜次日亂世王居前自成居中過天星居後曹變蛟先登敗走文詔繼至過天星力戰亂世王自成左右擊之曹兵大敗諸軍莫救文詔自刎死文詔與其從子變蛟皆善戰時為謠曰軍中有一曹流賊聞之心膽搖至是戰死諸軍為之奪氣自成既敗曹兵從延安而西官軍逆擊之于羅家山大敗自成所收士馬器械無算遂從鄜州至綏徳延綏鎮志八按紀事本末曹文詔於崇禎年夏六月遇賊于娑羅寨兵敗自刎未詳何賊易知錄則言李自成於九年二月朱仙鎮敗後始入闗由商洛圍綏徳而于牧馬三水曹文詔戰死事不載延綏志紀自成朱仙鎮敗後走商洛據三水殺曹文詔入綏徳殺俞翀霄其事頗詳但無年月可考今依二申野錄與易知錄編次而以延綏志發明其事叙于俞翀霄被執之前以備叅考夏四月延綏總兵俞翀霄引兵逐李自成被執自成欲往綏徳渡河入山西定邊副將張天機力戰却之賊沿河犯朝邑將圍綏徳翀霄引兵逐賊陷賊伏中翀霄被執綏延精卒盡覆賊分陷米脂延安綏徳賊本延安人至是再入延安衣錦晝遊衒其親戚故從亂者益衆紀事本末五月詔赦陜西脇從羣盜五月癸丑下詔大赦山陜脇從羣盜令地方多方安插以消反側違者重治之是月陜賊過天星復叛於延安六月乙酉洪承疇上言秦中兵今實數共騎步一萬三千有奇見選川兵五千有奇俱步卒専于藍田商雒等處堵勦秦豫接界之冦闖將李自成衆約三四萬混天王衆約二萬過天星滿天星衆約二三萬歴次勦散混天王逃延綏定邊勢孤復合闖將過天星滿天星等今奔走延綏等處猶可督責收拾闖塌天闖王蝎子塊已犇興安漢中進則入三秦退可犯楚豫亟宜合兵凑餉力圖協勦紀事本末秋七月巡撫陜西孫傅庭擊賊於盩厔大破之崇禎丙子秋七月孫傅庭破賊盩厔擒闖王髙迎祥及劉哲等獻俘闕下磔於市賊推自成為闖王九月李自成犯鳳翔漢南賊陷褒城二申野錄十年春正月李自成犯西安李自成同過天星等出冦涇陽三原西安大震蝎子塊復來㑹之駐兵於涇河之濱者八閱月省城兵不敢出㑹曹變蛟與副將白廣恩兵至自成走秦州延綏鎮志時諸賊混天星侵軼商洛李自成縱横西安過天星盤踞􅊈隴獨行狼在漢南蝎子塊在河西民皆倚擔而立紀事本末十一年春二月李自成敗走商洛李自成走秦州遯入華亭奔隴州蝎子塊降於孫傅庭又奔寧羌自七盤闗逼成都不下引兵退屯􅊈陽闗曹左兩總兵來㑹戰數却乃夜走武功咸陽至三原又分兵往西番族帳中掠馬將次老鴉闗遇總兵祖大弼與戰敗之復走四川廣元賀人龍同降將蝎子塊追之俘其妻子自成僅與十八人遯自成跣足行捫蘿附葛伏窟穴中數日得免間居商洛山中晝則射獵夜則讀書且觀乾象云過此六月之阨九五可期以勉慰羣賊髙一功笑之曰昔漢沛公百戰百敗而得天下汝亦知之乎其所讀之書云為異人所授甚秘不得而知也延綏鎮志十五年春正月米脂知縣邊大綬發李自成祖墓焚其屍賊祖海父守忠葬於縣之三峯砦山勢環抱林木鬱葱若佳城者大綬訊之故老曰穴中舊有墨碗一枚躬率夫役入山發掘冢窮碗見骨黒如墨額生白毛六七寸許又十一冢生榆一株粗九臂籠䕃不可犯衆斧之榆㫁墓開骨節緑如銅青亦生黄毛數寸又有白蛇長一尺二寸頭角嶄然其餘骨骸有毛者七八冢盡數伐掘聚火燒化大小林木盡行砍伐實崇禎十五年正月十四日也餘生錄夏四月陜西總督孫傅庭殺總兵賀人龍傅庭檄召諸將於西安聽令人龍以兵來㑹傅庭大集諸將縛人龍坐之旗下而數之曰爾為大帥遇冦先潰致秦督委命賊手一死不足塞責也因命斬之因以人龍兵分𨽻諸將刻期進討人龍米脂人初以諸生効用佐督撫討賊屢殺賊有功叛將劇賊多歸之人龍推誠以待往往得其死力朝廷嘗疑人龍與賊通密勅傅庭殺之賊聞人龍死酌酒相慶曰賀風子死取闗中如拾芥矣明鑑易知錄十六年秋七月陜督孫傳庭出師討賊傅庭發兵潼闗分道討李自成以總兵牛成虎盧光祖為前鋒副總兵高傑將降丁為中軍命四川總兵秦翼明出商洛為犄角總兵王定官撫民率綏夏二鎮兵為後勁紀事本末九月孫傅庭還軍潼闗初孫傅庭討賊次郟縣大雨連旬傅庭軍乏餉譟於汝州降盜李際遇隂通賊賊率精騎大至官軍接戰大敗死亡四萬餘人李自成向潼闗白廣恩擊破之傅庭亦回軍潼闗衆尚四萬紀事本末冬十月李自成陷渭南督師孫傅庭知縣楊暄死之十月壬戌一隻虎陷閿郷即自成弟李過也疾走至潼闗獲督師大纛賊以纛紿守闗者乘間突入潼闗陷李自成間道緣山崖出潼闗後夾攻官軍大潰賊既入闗西行一隻虎陷華隂傅庭及白廣恩退屯渭南賊合衆數十萬陷渭南傅庭沒於陣楊暄被執不屈死賊屠渭南陷華州戊辰陷商州商洛道黄世清不屈死之賊屠商州紀事本末李自成陷西安陜西巡撫馮師孔按察使黄炯長安知縣吳從義指揮崔爾達秦府長史章世炯等死之十月乙丑賊陷臨潼闗中人心所在瓦解馮師孔知冦棘急入西安收保俄賊至師孔督兵出戰城陷被執不屈死之按察使黄炯自盡長安知縣吳從義指揮崔爾達俱投井死秦府長史章世炯自經死紳士死者甚衆右都御史三原焦源溥罵賊磔死磁州道副使祝萬齡至學宫拜先聖從容自經死禮部主事南居業罵賊死宣撫焦源清叅政田時震俱不受偽職死解元席増光舉人朱誼泉俱投井死山東道僉事王徵七日不食死都司吏邱從周罵賊死餘吏民皆相率降於賊總兵白廣恩逃而追獲降之自成據秦王府偽授秦王存樞權將軍世子妃劉氏曰國破家亡願求一死自成遣歸外家賊之犯秦也户部尚書倪元璐奏曰天下諸藩無如秦晉山險用武國也宜諭兩藩能任殺賊不妨假之以大將之權如不知兵宜悉輸所有與其齎盜何如享軍賊平之後益封兩藩各一子如親王亦足以報之書上不報至西安陷秦藩府庫盡為賊有賊分兵徇諸縣蒲城知縣朱一統抱印投井死先是賊好殺掠牛金星勸以不殺遂嚴戢其下民間稍安堵輒相誑惑人無鬭志自成遂以西安府為長安搒掠巨室助餉李自成分兵略鄜延中部知縣華堞死之紀事本末命余應桂總督陜西三邊收兵勦賊應桂遷延不進十月庚寅上始聞潼闗失守以兵部侍郎余應桂總督陜西三邊收拾邊兵相機𠞰㓂應桂聞命飲泣陛辭曰不益兵餉雖去何益上黙然發帑金五萬給軍應桂遷延河上不進紀事本末十一月李自成陷延安復陷翔翔屠之總兵王定髙傑自渭南敗各率所部奔延安自成命賊將田斌守西安自往塞上髙傑聞賊至以兵渡河而東入山西王定奔榆林自成陷延安大㑹羣賊戎馬萬匹旌旗數十里於米脂祭墓以五百騎按行鳳翔守將誘而殲之自成怒親攻鳳翔陷之屠其城紀事本末崇禎十六年冬自成分遣賊將田見秀徇漢中李過徇延安遣偽禮政府侍郎姜學一祭墓升米脂縣為天保府乃檄天保府磔賀時雨艾詔於市初米脂諸生賀時雨貢生艾詔詣督師汪喬年上書請發自成祖墳為厭勝計喬年以聞報可事下知縣邊大綬發掘焚棄之故賊得而甘心焉人稱為二義士云延綏鎮志李自成陷榆林備兵副使都任總兵尤世威及闔城盡死之十一月壬寅李自成發金數萬招榆林諸將以大冦繼之備兵副使都任及故總兵王世顯侯世祿侯拱極尤世威惠顯等斂各堡精鋭入鎮城大集將士問之曰若等守乎降乎各言效死無二遂推世威為長主號令繕甲兵賊遣偽官説三日不聽賊怒乙未賊四面環攻城上强弩疊射賊死屍山積更發大砲擊之稍却丁巳李自成陷榆林榆林被圍諸將力戰殺賊賊死者萬人攻益力逾旬不克賊以衝車環城穴之城崩數十丈賊擁入城遂陷都任闔室自經死尤世威縱火焚其家百口揮刀突戰死諸將各率所部巷戰殺賊千計賊大至殺傷殆盡無一降者闔城婦女俱自盡諸將死者數百人榆林為天下勁兵處頻年餉絶軍士飢困而殫義殉城志不少挫闔城男子婦女無一人屈節辱身者紀事本末榆林既屠三邊俱沒賊無後顧長驅而東矣我朝順治元年自成僭號西安逼陷京師愍帝遇害天兵一擊賊敗於山海闗狼狽走西安尋自西安出商洛奔辰州自成為郷兵所誅死賊黨潰散易知錄謹按紀事所載歴代巡狩征伐凡事闗封疆人民者皆採摭史䇿折衷綱目始敢彚編至本朝功崇徳溥政教所及徧於東西南朔非一隅所能詳述况石室金匱之藏職諸太史外臣無簪筆之任不敢上擬國史記注時政惟是恩膏下逮浹於臣民宸翰昭囘光於雲漢三秦之漸被既深萬姓之瞻依日切謹以頒發之諭旨及刋布之御製詩文恭錄於徳音類中冠於歴代之首以昭盛典云陜西通志巻八十二
