body:
  text: 陜西通志巻八十二紀事第七金太宗天㑹五年宋高宗建炎元年冬十二月取宋同華二州破潼闗建炎元年十二月甲戌金人陷同州守臣鄭驤死之庚辰金人陷華州辛巳破潼闗宋史高宗本紀金羅索至河中官軍扼河西岸不得渡乃自韓城履氷過陷同州華州沿河安撫使鄭驤赴井死金兵破潼闗中原大震宋元通鑑六年宋建炎二年春正月取宋永興軍宋經畧使唐重死之羅索既陷同華諸州遂圍永興軍時京兆兵皆為經制使錢蓋調赴行在經畧使唐重度勢不可支以書别其父及金兵圍城重與守臣㑹盟死守而經制副使傅亮以精鋭數百奪門出降重遂與副總管楊宗閔提舉軍馬程迪提㸃刑獄郭忠孝等八人俱死宋元通鑑仁按是月宋王擇復永興軍二月取宋鳳翔金羅索既陷永興鼓行而西勢益張引兵犯熙河經畧使張深遣都監劉惟輔以精騎二千禦之夜趨新店金人恃勝不虞黎明軍進惟輔舞矟刺其帥哈芬洞胷墮馬死深更檄張嚴往追之嚴追羅索及鳳翔境上銳意擊賊至五里坡羅索伏兵坡下嚴與曲端期不至徑前遇伏戰不利死之羅索陷鳳翔守臣劉清臣棄城去宋元通鑑秋八月羅索富察等取下邽九月破宋兵於同州八月乙夘羅索敗宋兵於華州額特埒破敵於渭水遂取下邽九月辛丑盛格等敗宋兵於蒲城甲辰又破敵於同州乙丑取丹州金史太宗本紀太宗命羅索富察專事陜西以博勒呼盛格監戰盛格等遇敵於蒲城及同州皆破之羅索傳冬十一月取宋延安王庶帥師救之不克十一月庚寅富察羅索取延安府金史太宗本紀王庶至京兆節制陜西六路軍授端團練使充節制司統制端不欲屬庶金諜知端庶不協併兵攻鄜延時端盡統涇原精兵駐淳化庶日移文趣其進兵端不聴乃遣吳玠攻華州拔之端自分蒲城而不攻引兵趨耀之同官復迂路由邠之三水與玠㑹襄樂金攻延安急庶收散亡往援知鳳翔府王􅊅將所部發興元比庶至甘泉而延安已陷庶無所歸以軍付􅊅自將百騎與官屬馳赴襄樂勞軍猶以節制望端欲倚以自副端彌不平問延安失守狀欲即軍中殺庶奪其兵明日庶見端為言己自劾待罪端拘縻其官屬奪其節制使印庶乃得去宋史曲端傳羅索克丹州破臨真進克延安府遂降綏徳軍及靜邊懐逺等城寨十六復破青澗城金史羅索傳圍晉寧宋知府州折可求來降金人既破延安遂自綏徳渡河圍晉寧今葭州知軍事徐徽言約可求出兵夾攻金人羅索聞之執可求之子彥文使為書招可求可求遂以所屬麟府豐三州降金可求與徽言連姻金人使招徽言於城下徽言引弓射之可求走徽言引兵擊虜大敗之通鑑續編七年宋建炎三年春二月克晉寧軍宋守臣徐徽言死之晉寧所部九寨皆降而晉寧軍久不下羅索欲去之薩里不可曰此與夏鄰且生他變城中無井日取河水以為飲乃決渠於東泄其水城中遂困李位石乙啓郭門降諸將率兵入城守將徐徽言據子城戰三日衆潰徽言出奔獲之使之拜不聽臨之以兵不為動縶之軍中使先降者諭之降徽言大罵與統制孫昂皆不屈乃并殺之遂降定安堡渭平寨及鄜坊二州於是羅索博勒呼守延安折可求屯綏徳延安鄜坊州皆殘破人民存者無幾羅索置官府安輯之金史羅索傳八年宋建炎四年春正月取宋同州三月拔終南縣正月金人犯邠州吳玠拒戰敗之彭原又陷同州三月金人拔終南縣經畧使鄭恩戰敗死之宋史高宗本紀夏四月羅索克邠州天㑹八年四月辛丑羅索戰於淳化勝之醴州降遂克邠州金史太宗本紀金人攻環慶端遣吳玠拒於彭原店端自將屯宜祿玠先勝既而金軍復振玠小却端退金乘勝焚邠州宋史曲端傳秋七月命皇太子宗輔為右副元帥督師陜西先遣羅索經畧陜西所下城邑叛服不常其監戰鄂勒博請益兵帥府㑹諸將議以皇子右副元帥宗輔往為宜以聞詔曰羅索往者所向輒克今使専征陜西淹延未定豈倦於兵耶闗陜重地卿等其戮力焉金史太宗本紀九月元帥宗輔等敗宋軍於富平耀州鳳翔皆降宋張浚兵取陜西帝至洛水治兵張浚騎兵六萬步卒十二萬壁富平帝至富平羅索為左翼宗弼為右翼兩軍並進自日中至昏暮凡六合戰破之耀州鳳翔府皆來降金史睿宗世紀張浚合五路兵欲與金人決戰玠言宜各守要害須其敝而乘之及次富平都統制又㑹諸將議戰玠曰兵以利動今地勢不利未見其可宜擇髙阜據之使不可勝諸將皆曰我衆彼寡又前阻葦澤敵有騎不得施何用他徙已而敵驟至輿柴囊土藉淖平行進薄玠營軍遂大潰五路皆陷玠退保散闗宋史吳玠傳張浚復永興烏珠入援大戰於富平涇源帥劉錡身率將士薄敵陳殺獲頗衆㑹環慶帥趙哲擅離所部哲軍將校望見塵起驚遁諸軍皆潰浚斬哲以徇退保興州張浚傳睿宗與張浚戰於富平宗弼左翼軍已却羅索以右翼力戰軍勢復振張浚軍遂敗睿宗曰力疾鏖戰遂破巨敵雖古名將何以加也以所用犀玉金銀器及甲胄並馬七匹與之金史羅索傳冬十一月將軍馬五等敗宋軍於隴州天㑹八年十一月馬五等擊宋吳玠軍于隴州癸亥宗輔以陜西事狀聞詔奬諭之金史太宗本紀完顔希卜蘇從睿宗經畧陜西出隴州以兵四百敗敵數千希卜蘇傳九年冬十一月賜劉豫陜西地天㑹九年十一月己未以陜西地賜齊金史太宗本紀十年宋紹興二年冬十二月取宋金州天㑹十年十二月庚子薩里罕克金州金史太宗本紀金久窺蜀以璘駐兵和尚原扼其衝不得逞將出奇取之時玠在河池用叛將李彦琪駐秦州睨仙人闗以綴玠薩里罕自商於直擣上津取金州宋史吳玠傳三年正月烏珠入侵自上津疾馳不一日至洵陽統制官郭進死之彦退保石泉金人入金均彦趨西郷王彦傳金人將道金商以嚮四川公以書諭金州經畧使王彦使伏彊弩於險以俟之彦習用短兵屢平小盜不以公言為意敵猝至不知所為逆戰果敗走保石泉朱子劉子羽神道碑金按宋史云紹興三年正月金克州與此互異十一年宋紹興三年春正月薩里罕帥師克洋州遂入興元天㑹十一年正月丁夘薩里罕敗吳玠於饒風闗戊辰取洋州甲戌入興元府金史太宗本紀紀饒風之戰詳見宋中冬十一月取宋和尚原金烏珠陷和尚原於是宣撫司分陜西之地自秦鳳至洋州吳玠主之屯仙人闗金房至巴達王彦主之通鑑熙宗天眷三年夏六月陜西平五月丙子詔元帥府復取陜西地命右監軍薩里罕出河中趨陜西六月陜西平秋七月乙夘宗弼遣使奏陜西捷金史熙宗本紀金烏珠以歸陜西為非計及達蘭誅遂命薩里罕出河中趨陜西薩里罕入同州趨永興軍權知軍事郝逺開門納之陜西州縣所至迎降遂進據鳳翔初闗陜新復朝廷分軍屯熙秦鄜延諸路薩里罕既至鳳翔陜西諸軍皆隔在後逺近震恐宋元通鑑秋八月詔撫諭陜西八月辛巳詔撫諭陜西五路金史熙宗本紀皇統三年春三月詔陜西富民納粟補官皇統三年三月陜西旱饑詔許富民入粟補官金史食貨志海陵正隆六年宋紹興三十一年秋九月克宋大散闗是年十月世宗立改元大定九月圖克坦喀齊喀由鳳翔取散闗金史海陵紀世宗大定元年冬十二月詔副元帥完顔古雲規措陜西軍事古雲本名達蘭攝河東南北兩路兵馬都總管朝廷以陜西與宋已而復取之師至耀州宋人每旦出城張旗閱隊抵暮而還道隘騎不得逞古雲請兵五百薄暮先使五十人趨山巔令之曰旦日視敵出舉幟指其所向乃以餘兵伏山谷間明日城中人出閱如前山巔旗舉伏兵發宋兵爭馳入城古雲麾軍登城拔宋幟立金軍旗幟宋軍後者望見之不敢入遂降城中人亦降金史古雲傳二年春三月詔釐正陜西良民大定二年三月癸亥詔陜西昨因捕賊良民被虜為賊者釐正之金史世宗紀夏五月萬户費摩等擊宋兵於華州敗之大定二年五月丁巳押軍萬户費摩阿拉明安伊喇蘇爾拉敗宋兵於華州金史世宗本紀三年春二月詔撫諭陜西大定三年二月壬申詔撫諭陜西金史世宗本紀四年冬十二月取商州大定四年十二月丁亥尚書省奏都統髙景山取商州金史世宗本紀十二年鄜州同州民作亂討誅之大定十二年九月鄜州李方等謀反伏誅十一月同州民屈立等謀反伏誅金史世宗本紀章宗明昌六年春正月詔罷陜西括地正月庚戌罷陜西括地金史章宗本紀泰和五年冬十一月商州兵擊敗宋師於丹河泰和五年十一月乙酉宋人攻洛南之固縣商州司獄壽祖追至丹河擊敗之金史章宗本紀六年冬十月命陜西諸道兵伐宋六年十月戊申朔平章政事布薩揆督諸道兵伐宋右監軍充以闗中兵一萬出陳倉右都監富察貞以岐隴兵一萬出成紀隴州防禦使完顔璘以本部兵五千出來逺金史章宗本紀十二月宋將吳曦來降克大散闗取鳳州六年十二月癸丑宋宣撫使吳曦納欵於完顔綱戊午右監軍充攻下大散闗辛酉完顔綽哈以兵趣鳳州城潰入焉完顔綱遣京兆錄事張仔㑹吳曦於興州之罝口曦具言所以歸朝之意仔請以告身為報盡出以付之乙丑完顔綱以朝命假太倉使馬良顯齎詔書金印立曦為蜀王金史章宗本紀時曦已布腹心於金將士未之知都統制母思以重兵守大散闗曦因撤驀闗之戍敵由板閘谷遶出思後思遁金遂陷大散闗曦退屯罝口舉人陳國飭投匭上書言曦必叛侂胄不省興州見兩日相摩金遣吳端持詔書金印封曦為蜀王曦密受之還興州翌日曦召幕屬意謂東南失守車駕幸四明今宜從權濟事王翼楊騤之抗言曰如此則相公八十年忠孝門户一朝掃地矣曦曰吾意已決曦遂北向受印宋史吳曦傳衞紹王大安二年秋八月夏人寇葭州大安二年八月夏人侵葭州金史衞紹王紀夏自天㑹初與金議和八十餘年未嘗交兵至是為䝉古所攻求救於金金主永濟新立不能出師夏人怨之遂侵葭州金慶善努擊敗之而去通鑑續編三年夏人宼邠涇都統韓玉敗之夏人連陷邠涇陜西安撫司檄玉以鳳翔總管判官為都統府募軍旬日得萬人與夏人戰敗之獲牛馬千餘當路者忌其功驛奏玉與夏人有謀朝廷疑之使使者授玉河平節度副使金史韓玉傳崇慶元年春三月夏人寇葭州崇慶元年三月夏人犯葭州延安路兵馬總管完顔諾爾布禦之金史衛紹王傳至寧元年六月夏人寇保安至寧元年六月夏人犯保安州殺刺史金史衛紹王本紀宣宗貞祐二年夏人寇延安貞祐二年夏人攻延安乃詔有司移文責問金史西夏傳三年夏五月命大臣鎮撫京兆三年五月戊子謀伐西夏遣大臣鎮撫京兆金史宣宗本紀九月詔給陜西世襲蕃部巡檢俸定立功賞格三年九月丙寅樞密院言陜西世襲蕃部巡檢昨與世襲明安穆琨例罷其俸今邊事方急宜仍給之庶獲其用從之乙亥詔邠州經兵四品以下職事官並以二十月為滿壬午以空名宣勅付陜西宣撫司凡夏人入寇有能臨陣立功者並聴遷授金史宣宗本紀冬十月夏人寇保安及延安累戰破之三年十月夏人入保安都統完顔果嘉努破之攻延安戍將又敗之金史宣宗本紀元兵攻潼闗不克䝉古主駐魚兒濼遣僧格巴圖帥萬騎自西夏趨京兆以攻潼闗不能下遂赴汴京宋元通鑑四年秋八月夏人寇安塞元帥左監軍烏庫哩慶壽遣軍敗之烏庫哩慶壽貞祐四年遷元帥左監軍兼陜西統軍使駐兵延安敗夏人於安塞堡戰於鄜州之倉曲谷有功金史烏庫哩慶壽傳九月元兵攻坊州九月辛巳朔元兵攻坊州以簽樞密院事永錫為御史大夫領兵赴陜西便宜從事金史宣宗本紀冬十月元兵克潼闗貞祐四年十月己未命元帥左監軍必里克阿嚕岱守潼闗元兵攻潼闗西安軍節度使尼馮哈博勒呼