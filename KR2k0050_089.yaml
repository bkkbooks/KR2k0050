body:
  text: 陜西通志卷八十九藝文五賦下渭水貫都賦唐衛次公清渭天鑿名都王制貫金城千里之域㵼銀河九霄之勢同穴發源衆川潛泄分黑水以渺漫繞黃山而迢遞水能濟物用導於中州君德配天故法於上帝都之會也皇皇渭之流也湯湯異東西之瀍澗非汲引之沮漳夏后濬川分流非肇於伯禹秦德主水貫都必因於始皇照雙鳳之丹闕架長虹之飛梁褰裳者不勞於揭厲濯纓者何必於滄浪泛彼樓船掩橫汾於武帝濵之釣叟感入兆於文王且夫前王酌憲惟皇都之所建度地有孚因貫渭之上腴曲抱乎周原秦野旁臨乎八達九衢既流衍以紅粟誠輝煥乎黃圖則知八水皆流豈清於渭水五都並制莫大於西都原夫渭者雍之巨浸都者人之所聚天垂法君必取曳雲間之清渭河殊雲漢移天上之紫宫洞開天府及乎縈流一帶中派紆餘蕩元氣澄太虛稽前典而備矣於名川而舍諸豈惟積潤於庶物固亦近壯於皇居至乃春景澄廓晴霞朗暢涵萬象於影中度牽牛於波上客有觀光者於茲而寫望美夫取法可仰因天垂象疏紫陌而逶迤流丹霞而蕩漾周公卜洛雖云風雨所交秦后貫都實謂膏腴之壤惟洪業之永固與渭流而彌廣登吳嶽賦周針吾嘗文戰將北羇遊極西覩吳嶽之孤峭計羣山之莫齊由是邈崖谷遂攀躋入雲靄出沈泥既臻頂上用視天倪鴈塞殊小峨眉甚低蓋以氣壯神扶雄標國祚揖白帝兮不見抱皇城而自固嵐光擁翠拓開霄漢之心岫色橫空鎖斷東來之路嵽嵲旁竦岧嶤上千碧草春含清風夏寒遙瞻魏闕逈立煙巒疑超洞府謂在天壇中隱深溪日月之光不到外連層阜龍蛇之勢斯蟠當其區宇正寧氛埃初見覽造化之宏制識乾坤之設險汧水縈盈而線走隴山峛崺而螺掩西窺劒閣霜地表之千鐔東瞰蓬萊黛波間之數點遐徴衆嶽式並隆崇彼皆受封於百代此獨不視於三公森筍立以削成寧慚太華黯雲凝而化出豈讓維嵩况乎萬仞凌虛千里倒影虎踞華裔鯨吞遐境壘巘攢壁回巖列屏捍絶域以增隘固中原之堪永直使以禮賔九有仁服八荒臂賢以為輔弼宅道以為封疆亦須假我嚴衛憑我巨防靜藩垣於都邑逺隔閡於氐羌吾唐重其功崇其鎮爰升成德之號用補極天之峻小儒是以竟日興感抽毫賦韻登詠畢兮嶔岑指長安而後進巨靈擘太華賦關圖泰華崔嵬伊巨靈兮其壯哉挺髙掌以遐舉擘孤峰而洞開功侔造化勢越風雷劃千仞之巖巒屹從地裂決九河之波浪杳自天來昔者混茫是生磅礴惟神無朕配天有作念波流之未通顧茲山之可却將以闢迢遞正嶄鑿愜心而再定川原應手而别開林壑靈異將伸雄稜益振蓄怒贔屭注情嶙峋謂釣鼇不足以駭人鞭石不足以騁神指揮而疊嶂知改盼睞而三峯可新然後攘臂效能端身任力捫蒼藹於天半拆翠微於月側若百神將萃而潛助二儀欲判而未息嵐光兩向猶連松柏之聲黛影中開已斷雲霞之色豈不以閟形幽默拓迹巍峩致用而扶持天地成功而變化山河分積翠於空中千年軋坱啓通津於指下萬里騰波豁丹崖於天阻呀峭壁而相距勢且異於兩傷力自𢎞於一舉截仙子幽棲之洞壯王者建都之所蓋以神開夀域靈固人寰廓峻極於倐忽標削成而險難越大禹之理水小愚公之移山竹箭波中路竟深於導達蓮花峯外迹終寄於躋攀是知事關杳冥理歸幻奧石有時而分裂水有時而疏導信乎載物者之使然非人情之所到涇渭合流賦獨孤綬感異源而合趣指涇渭於秦樹涇如經也自北而南流渭若緯焉從西而東注性相近以不息勢使然而自遇湜湜其沚昔既聞之於詩湯湯其流今則狀之為賦夫至清者渭至濁者涇惟清也鑒物之道著惟濁也含垢之義形共導金氣咸通井星混殊流之昭晰成一帶之濚渟初以縱亂橫似爭長而難雜終以潔受汚何極暌而乃合禹功之所兩存漢苑斯焉博納乍異其色覺遊鱗之隱見必同乎聲帶長風之蕭颯象昭回之可求歌鄭白之有由飲馬投錢足以發明亷士決渠降雨足以殷富神州既相𢎞以利物寧自異乎並流知之者齊我以不皎不昧感之者比我於一薰一蕕斯乃柔以長存和之足貴近則順洪河之紆直逺則成滄海之濩渭同功一體叶靈通氣信殊榖洛之流寧爽淄澠之味夫然波獨清而無偶非達識之所謂御注孝經臺賦張昔孝惟行先教實理本故玄宗探宣尼之旨為聖理之閫爰索隱以鈎深或詞約而意逺然後勒睿旨於他山之石樹崇臺為儒林之苑天文煥發知孝道之克宣微旨髙懸示仁風之已返上崇君德下達人情王猷玉潤帝典金清誼雖刑於子道理實暢乎家聲施之於人風俗可移於孝理懸之於教日月方比於貞明不然何以倬爾孤標介然守正金字纍纍以條貫銀鈎歷歷而交映故嚮之者修睦就之者起敬斯乃示生民之大端仰髙山之景行至哉聖化本本元元酌其旨而薄俗可厚毗於政而理道可敦故政以肅教為尊非無詩書始務陳其行本非無貴賤心願宗其化源且髙而不危者尚乎臺磨而不磷者莫如石揭貞質於庠序殊祕府之竹帛諒乃侔天地而始終豈特垂載祀於千百靜而繹思文固在茲一人有作比屋允釐覽君君臣臣之間則心乎愛矣於尊尊卑卑之道則學而知之矧乎雕琢成章區分式序方隅而不失其正篇次而各得其所三千子之鼓篋邈矣具瞻十八章之針規揭之備舉乃知孝理馨香有時而彰不壞不朽化被無疆所以播鴻休於玉葉表嗣子於明王故曰孝者天之經也宜乎配地久而天長駕幸九成宫賦李子卿皇帝握靈符之三載也天地穆清星日耀潤野訪遺逸朝登傑雋化則垂拱而成令則不言而信時巡之儀展秋獮之禮順思訪俗而觀人若乘乾而出震右輔伊邇離宫在茲前瞻鳴鳳之岫傍指神雞之祠渭水煙波接苑中之洲渚岐山雲物落禁裏之軒墀俄而回鑾輅載羽旗為宴鎬之樂動橫汾之詞况不勞於百姓而有務於三時者哉由是叶清秋揀吉日乘石洗皇輿出七騶按隊千乘扈蹕戈矛林森士馬櫛比始地業而天旋終電馳而飈疾翻然而八駿賽騰霍濩而六龍奔逸雷公轉轂風伯按馭朱旗列而秋野生春金甲照而暮川增曙陋漢帝之遊衍哂秦皇之逸豫祥煙不散近飛槍壘之間瑞草常開併拂車宫之處廣陌鳴鑾異彼遊盤訪百年之疾苦知五稼之艱難成王之搜由是問古公之政有以觀翠華來兮野老喜屬車至兮國人歡詎比夫隴塞回中妄開行幸之路泰郊畤上虛立禮神之壇穆然深宫駐蹕其中樓枕嶺而倒影殿當川而抱虹閟邃而寒暑隔岧嶤而雲霧通前視八水傍臨九嵕所以明四目達四聰凝睿想播元風比遊心於汗漫侔得道於崆洞亦既下輦於是端冕補闕政修墜典大風之歌作湛露之恩展於是振旅建旄回鑾返轡百蠻懼威武萬姓知教義若臣者巖穴久服丘園來賁未有燭於皇明竊以覩於人瑞敢獻揚雄之賦庶獲有司之議按地業宜作地岋三良冢賦并序劉禹錫魯文公六年秦伯任好卒以子車氏之三子奄息仲行針虎為殉皆秦之良也國人哀之為之賦黃鳥君子曰秦伯之不為盟主也宜哉先王違世猶貽之法而况奪之善人乎是以知秦之不復東征也秋季月吾西遊汧渭出於岐雍之間於古道傍得三良冢心甚哀之涕泗者久之而去詞曰昨宿岐城曉涉渭東霜凌雪結飛沙亂蓬中野躊躇屆此古墟野人曰即車氏之塜方驅駕班如久而吒曰吾嘗讀舊史矣古者秦氏大於穆公出師則寧東夏用賢則霸西戎大邦服其禮小邦畏其雄謀已集戰亦武不能勤王不為盟主者何居以滅天之良喪人之特百夫仰系一朝而踣可哀也哉宛其三子遭時迍邅主已即世身皆靡全指冥寞而為期撫昭世而坐捐方惴惴以臨穴且哀哀而號天從有言於寒原莽蕩千里回眺無垠上刺衰德下傷幽魂挂驂隴樹脫劍山門掇野芳以為薦汲行潦而充樽矧今情之猶悲諒古恨之潛吞死而不作吾誰與言代事浩渺人夀爾夭言念君子中心悄悄哀生人之長慟赴永夕之莫曉歸去來兮不可留且悲吟於黃鳥華清宫望幸賦李程上苑之左兮驪山之中天作髙岫帝為離宫示宸遊之有所表聖鑒於無窮臨峻路而赫其昈昈標爽塏而屹以崇崇惜翠華之未至閴紫殿而猶空則有望幸其中流睇延幕希天顔而回矚望雲闕而屢顧想息波之東注俯瞰渭流愛佳氣之西浮空瞻秦樹目盡煙末心馳御路何聖慮之未還獨幽懷而能喻窮轍迹且俟玉山之遊想車音將購長門之賦矧夫閣有朝元之美稱殿有長生之嘉名霞駮丹檻雲攢繡楹可以召通仙之降止安皇祥之永貞是以仰碧空竭丹誠庶日月之回照等葵藿而同傾濯觱沸之泉每想金輿之度踐萋青之草還思玉輦之行雖託質於别館常寄心於穆清戀戀西向悠悠矚望步磴道以寂歷眄廣庭以寥曠竹花雖吐如含待鳳之誠雲氣才升若覩從龍之狀彼玉山既逺金闕仍賒未若浮遊近縣如在仙家俄天邑之孔邇自神都而不遐雖館稱五柞殿美九華諭之於此曾何以加惜乎神光未矚曠此佳境徒企想以忡忡復懷慕而耿耿閉玉樹於深谷銷金鋪於秀嶺君乎君乎胡不出宸居而來幸華山為城賦陳諷地控強秦路惟分陕有太華之作固若崇墉之生險絶壑中抱重巒外掩倚雲漢而匝野屏開跨金方而當空黛染千尋壁立萬雉雲屯龍盤日月虎視乾坤大河自北而東呀為濬洫窮谷從中而斷豁若重門誠百二之光宅見九五之天尊偉夫襟帶皇都咽喉上國磅礴乎崤函之外隱軫乎豐鎬之側所以羅羣象吞八極展萬祀而成在衆心冠三秦而位居一德况乎天地初霽雲霞四披紅塵滅影碧落標竒宿霧市之氣尚疑煙闕聳蓮峯之色不讓文陴顧萬夫之莫向信六國而奚為岌岌神才言言天設連岸抱九州之路壯氣折諸侯之節蕭蕭歸馬想飲窟之初還隱隱輕雷訝鳴鼓之不歇天包地束鳥過雲輕萬仞垂峭千峯入冥髣佛虹霓盡識旌旗之色依稀星月皆分弧矢之形疑其發迹混茫孕茲重阻假巨靈拔山之力衛王者登龍之所不然安得不費一錢不勤一旅削成而千里共峻作鎮而一人可禦是宜堯為君而舜為臣道為主而德為鄰與天地之人共守使海內之士咸賔潼關賦張翌惟皇王之建國分中外於上京憑山河以作固閾華夷而騰聲誠曰咽喉吞八荒而則大是稱巖險控萬國以來平周有掌貨之節禮無關門之征巨防宵扃倚洪波而作鎮重扉擊柝連太華而為城創中代之新號變函谷之舊名柱史老聃擁仙雲而西邁終軍童子建使節而東行文仲不仁廢六關而興誚王元有説封一丸而永清若用備不虞取諸繫象作邦畿之襟帶杜姦宄之來往長墉矗兮雲屯層樓赫以霞敞登臨者皆知其地雄踰越者無漏於天網亦有孟嘗奔走長宵未曙何白馬之不談學雞鳴而乃去逢尉臣之一失或愚者之千慮至如楚漢爭雄沛公先入旗鼓照耀兵戈翕習南面則三傑齊驅東井則五星俱集實靈命之所應亦人謀而是及王道廓而已清帝業巍乎乃立窮四塞之艱阻成百王之都邑故知建功定霸期乎此關武侯矜於固險婁敬説乎河山視前列之軌躅覽陳迹而躋攀既登髙而能賦希駟馬以言還武關賦王啓路入商山中橫武關呀重門於固護屹峭壁以孱顔昔在危時屯千夫而莫守今當聖日置一卒以常間觀乎地勢爭雄山形互對西連蜀漢之險北接崤函之塞世亂則厄限區宇時清則通流外內當其六國連謀關防日修則斯地也雲屯貔武雪耀戈矛張儀出以行詐懷王入而竟留縱下客之雞鳴將開莫可任公孫之馬白欲度無由及乎塵起九州波搖四海秦鹿失而襟帶難保漢龍興而山河遽改豈料禦衝之所此日全平未知擊柝之徒當時安在所謂以兵而備者莫之能守以道而居者莫得而踰千里之金城湯池終為漢有二世之土崩魚爛自是秦無今則要害何虞平隆已久雖設險以猶在顧戒嚴而則否蕭條古壘豈臧文之廢來寂寞空扉似楊僕之移後蓋以文修武偃國泰時雍濬四溟而作塹廓八極以為墉遂使鼙鼓無喧一水之寒聲決決旌旗常卷千載之暮色重重嗟乎昔為洪樞今成隙地信無外以斯見實善閉之攸致儒有經其所感其事乃曰今朝西去豈無隨老氏之人他日東還誰是識終軍之吏西都賦李庾洛汭先生客於上京問里人以秦漢咸陽故事里人曰先生不習乎哉秦址薪矣漢址蕪矣西去一舍鞠為墟矣代逺時移作新都矣先生曰賔者不識藐然老沈懵嵗亡而日逺願聞古而知今為我源説恭承玉音里人曰昔者帝兆唐居命隋先基乃假隋權是開中原既權二年為唐遷都周榛秦莽平蕪枿餘文驅煬迎卒於侑傳若天使項氏死勞而授漢休也唐開禮壇新都之門闢殿乾宫以朝諸侯時則有若房魏作弼英鄂執律南陽故人河間帝室戎衣既脫瑞氣洋溢歡聲傳於億兆煬燎致乎太乙乃會漢酺發周賚謐萬類渟四海遂開國以報功差子男之五等然後搆閣圖形榮號凌煙指河帶以山礪書天子之縉紳其制度也擁乾體正坤儀平兩曜據北辰斥咸陽而會龍首右社稷而左宗廟宣達周衢址以十二棊張府寺局以百吏環以文昌二十四署六部提統按星分度儼憲臺而四列肅隂宫於北户建倍員於前王總綱維於御史端國儀朝實周察乎左右其內則有太極承端通址含元日出東榮月沉西軒倚九嵕之下麓涵太液之清瀾龍道雙回鳳門五開煙籠凝碧風靜蓬萊東則左閣當辰延英耽耽宣徽洞達溫室隅南接以重離綿乎少陽是為二宫復道邃廊西則月華重啓銀臺內向中書在焉密用宰相宦者别省延緣右藏建子亭於屏外設蘭錡於廡下天子端朝明庭九賔發少府之冕旒陳奉常之官勳肅勾陳以辟護翼雉扇而對分雞人乃下鳴鶴先聞千官就日萬品趨雲漏遲遲而東轉風習習而南薰外則國子招徒疏館開軒左立太學前惇廣文膳豐中厨就教九年稽以博士總之成均祕書典籍品命校郎橫閣三重闡正鉛黃若六藝之條貫百氏之縱橫交錯發論禮形而樂聲太傅在前少傅在後載言載筆出納謨誥鵷動鸞飛振玉鏘金殷廟羞瑚璉之器楚材産杞梓之林已而燮和隂陽經緯天地採托軒昊牢籠虞夏闢孔子之學堂敷一代之風雅此王者之文教也親兵百萬制以神䇿紫身豹首金腰火額獵霞張斾剝犀綴革奮目而虎眥振須而蝟磔柔六鈞貫七札對天仗以司戈分玉墀而執戟别有陳旌賜鉞閫外四七依榆關以作鎮距栁營而開壁逐冦則出塞飛塵伐叛則救陽作澤此王者之武威也唐禮既行三代同風徴叔孫之春官命伯夷之秩宗則有封禪巡狩謁天拜祖明堂辟雍王者之事有司勿失次有朝廷之位班爵之序器服車馬以節文武不僣不濫群臣之事有司以告下有內族外姻以殺以隆五禮各殊陳吉儀凶一室是形天下大同百姓之事有司以教故以內則敬以外則嚴以家則肥以國則昌卿士翼翼公侯皇皇在野熙熙在朝蹌蹌夫如是夸周而正魯胡可殫詳洎乎樂之設也以德配樂陳器以作革木匏竹簨簴磬鎛命官二署諧以協律以奏廟貌祖考來格以陳宫庭簫韶九成鳳凰來儀以布天下手之舞之足之蹈之及乎御引衣集舞童或獻凱作名以宣帝功或布字綴行以達皇風此禮經之所未紀夔戛之所不同刑期無刑以辟止辟三章置漢祖之德四赦緩穆王之法於是天子御端門詔天下渙汗發澤與民更始建金雞於仗內聳修竿而揭起其下則稅三關解銀鐺追共工徒歡兜煦舜絃浹堯年臺收白簡吏閣丹筆總秋官之計料不踰乎三十斥匡衡之失論罪溫舒之不足司冦無鬼哭之庭大理有烏巢之獄又若薦祖建宫元元之庭霞披雲冠飄飄太清天子將有事也嵗豆時籩夏簋殷鉶傳金爐之御煙開甲帳之琳琅此王者之示孝也對里連街帝宅王家青門列檻棠棣分華勤政外名花萼中題屹雲中而佩鳳杳天外而舒霓於是天子設席千羞百醴家人齒筵愈愈濟濟此王者之示悌也盛則長隄砥平錯則纓辨繁夥佩印分魚九參六佐肅威儀於行蓋指戒途於前馬待漏未開朝騎沓街雞鳴朱邸火度青槐先導擘雲後車奮雷遞以嚴聲不生微埃人寒物栗統以京尹臨人秉殺罔敢不謹豪家戚里金張許史走騎如雲行車若水拉枯請命曾不仰視配前王與後趙固異代而殊擬其地勢也負秦章臺倚漢甘泉帶涇渭之富流挾終南之夀山指重城之二華拓外門於兩關元素交川灞滻在焉斷虹偃蹇而亘梁拖輪走驟而蹄奔度萬國以向朝趨魏闕之通門赤縣統劇停阡帝鄉長安萬年乾封明堂藍田左倚鄠杜前張分圻連乎馮翊畫郊接乎岐陽排吳山而抵蜀亘氐谷而通商天子穆清環衛陳兵將軍之號三番六營至乃辨曉警昏主在金吾鼓列六條外傳通衢備以嚴兵羅以周廬禁動息人用戒不虞其中則御水分溝昆明下流在野決溉入宫環洲菰織蒲紉芰贄菱羞渚戲玄鷁沙眠白鷗其逺也深有蛟潭派作龍湫涘接河漢波通女牛其近也方塘含春曲沼澄秋戶閉煙浦家藏畫舟爾乃農家東作厥土黃壤樹以桑柘翳薈乎南畝以粳以稌以黍以稷以輸太倉天子之儲土厚地中溫寒以宜門多杖老室有蕃兒承化發謡帝力不知則有程鄭之家白闥朱軒崇基峻砌侍駟髙門木秀茸葩紅舒緑繁挺碩果於華林育豐蔬於中園珠箔晝晴金釭夜明羅繡巾㡚鼓瑟吹笙譁族陳賔以樂乎太平貨隧分㕓物次駢連中署肆師夕咽朝昏越璞楚琛蜀賄巴賨裁綺張繡紋軸蕉桐聲教之所被車書之所通交錯雜沓斯焉會同黃宅緇廬金篆玉扃以張帝居用壯天庭千形萬聲不可多名天子奉堯舜之道勤后稷之功當仲夏而獻繭立中和而視農然後黼黻時備粢盛告豐其接下也則堯鼓不懸晉木不列鎔金作軌四門是揭人靡迷邦土無諱訐示收材而問眚上諫行而寃達當其萬國貢珍四夷納賮賦用舟通財因輦進地官計國度支主吝百姓既足斯焉充牣復若天府萬品以備供職登饌則光祿獻厨命駕則太僕承軾其樂人也大啓九重分開三殿齒羣臣於坐次徴公族於內宴於以訓恭儉於以示慈惠戲族咸在百㺯迭改視仙童之霓裳覩壯夫之角抵御階晝隂帝座春生繽紛宫闥窈窕嬪林既受賜於逮昏盡拜帛而懷金與衆之樂一日於此先生獨不習乎其四郊也故有乘時之舊址亡國之遺蹤天子迎四氣䀌然改容曰是足以懷傷於耳目作戒於心胸且秦政肆刑秦民共傾楚澤大呼分隳列城徒罷驪山役休上林秦址既遷鴻門至今此東郊之事也隋苑廣袤置籠南山占地萬頃不為人間齊門失耕禽遊獸間代謝物移繚垣不完此南郊之事也豐水悠悠文王作周傳艱子孫衰平遂遷乃眷鎬都武王宅居國失赧遜豐鎬皆無此西郊之事也漢設五畤以主淫祀欒誑徐誣將求永久天子親拜太牢黍牡事亡地存為天下笑此北郊之事也故因迎春則鑒秦敗知恃刑不如恃德也因迎夏則鑒隋怠知獵獸不如獵賢也因迎秋則鑒周勤知祖基作艱傳萬年也因迎冬則鑒漢誤知去淫即正獲天祚也四鑒已陳澤於生人四德已懋格於上下故我髙祖一呼大定安都居正傳今皇帝一十四聖是知禪國也禪都也非得隋之命是得天之命阿房宫賦杜牧六王畢四海一蜀山兀阿房出覆壓三百餘里隔離天日驪山北搆而西折直走咸陽二川溶溶流入宫牆五步一樓十步一閣廊腰縵回簷牙髙啄各抱地勢鉤心鬬角盤盤焉囷囷焉蜂房水渦矗不知其幾千萬落長橋臥波未雲何龍復道行空不霽何虹髙低冥迷不知西東歌臺暖響春光融融舞殿冷袖風雨凄凄一日之內一宫之間而氣侯不齊妃嬪媵嬙王子皇孫辭樓下殿輦來於秦朝歌夜絃為秦宫人明星熒熒開粧鏡也緑雲擾擾梳曉鬟也渭流漲膩棄脂水也煙斜霧橫焚椒蘭也雷霆乍驚宫車過也轆轆逺聽杳不知其所之也一肌一容盡態極妍縵立逺視而望幸焉有不得見者三十六年燕趙之收藏韓魏之經營齊楚之精英幾世幾年取掠其人倚疊如山一旦不能有輸來其間鼎鐺玉石金塊珠礫棄擲邐迤秦人視之亦不甚惜嗟乎一人之心千萬人之心也秦愛紛奢人亦念其家奈何取之盡錙銖用之如泥沙使負棟之柱多於南畝之農夫架梁之椽多於機上之工女釘頭磷磷多於在庾之粟粒瓦縫參差多於周身之帛縷直闌橫檻多於九土之城郭管絃嘔啞多於市人之言語使天下之人不敢言而敢怒獨夫之心日益驕固戍卒呌函谷舉楚人一炬可憐焦土嗚呼滅六國者六國也非秦也族秦者秦也非天下也嗟夫使六國各愛其人則足以拒秦秦復愛六國之人則遞二世可至萬世而為君誰得而族滅也秦人不暇自哀而後人哀之後人哀之而不鑑之亦使後人而復哀後人也集靈臺賦張良器希夷乎人皇居明堂闢隂開陽冠通天兮蔭華蓋發大號兮流耿光將樂瑶池之宴集由喜玉京於夀昌降清問於宣室討真經於柏梁乃因髙為臺順時謀築披翳薈剪林麓鏟重岡移峻谷量其逺近以議夫土功命彼般倕再度其山木使人以悅無告於勞均力取材不逺而復屹九重以初起憑一簣而始覆其為勢也峨峨皚皚粉壁光兮朱門開若方丈與蓬萊其為麗也崢嶸郁煜星柱浮兮雲楣肅狀靈光與景福有時鳴猿告曉貞松斂靄千峰轉日迎秀色於瓊樓萬嵗傳聲和幽音於地籟磅礴壓乎人境屴聳乎天外王喬飛舄見鳬影之翩翩神女窺忩聽鸞歌之􅎪􅎪俯衆山兮如束縈八川兮如帶上方向晦宴息齋心防戒乘金根駟玉車犬夸父秉鉞蚩尤揚斾鐵衣沸渭以焜煌寶馬騰驤而沛艾環鈎陳而列武士震砰訇兮軼埃壒登夫集靈之臺謂天帝而為會奏無聲之樂寂寞而難分展無體之禮質素而無文睟容綽約元化氤氲聖主湛恩散作八方之雨清都喜氣凝為五色之雲彼升龍鑄鼎之后捧盤承露之君徒髣象於前載孰能成乎此勛然大造之德曰生大君之位曰寶未有離於兆庶而謂之至道願獻華封之夀上祝唐堯之盛股肱為良元首作聖用壯辟雍之美乃經靈臺之政豈必沐咸池陵倒景脫屣乎宇縣棲真乎絶嶺屇中天之峻極從化人兮習靜然後屆無何之鄉去有為之境者也於是情冥其欲德貴惟恆可大可久不騫不崩動植風靡雍熙日𢎞宜其四溟式晏而人和年豐望春宮賦闕名青門之左兮層宫嶙峋資睿覽以臨下得嘉名於望春故在東以就乎陽位當出震必俟於良辰乃發惠和式遵夫月令無勞轍迹自表於時巡其初也度𢎞規法大壯標上苑而獨出儼復道而明望逺天聽以遂於群生浹皇情用交乎四暢解飈微扇籠輕靄於髙臺淑氣初臨鎖浮光於綵仗吾君於是縱目前檻馳神逺郊散晴煙於地表拂佳氣於林梢觀青陽之煦然載懷祈榖聽鶬鶊之鳴矣不使覆巢布政有孚宸遊是假察微明於逺嶠睇新緑於平野南山之翠色盈前渭水之素光在下蓋將賦籍田於晉代豈比撰吉月於周雅美矣哉矗雲楣以重疊煥藻井以輝潤居髙而逺無不臨涵澤而動無不順諒可禆於恭默非取樂於崇峻况乎流鶯欲囀初栁生姿懿祥風之習習增麗日之遲遲偉鳳闕之樓臺萬邦仰止眄龍鱗之原隰五稼惟時聖上所以成化用彰克勤是務元功所以遐及仁術紛其大布斯宫寧忝後之為斯望匪盤遊之故既而天地叶神人和修文以昭士耀武以止戈然則賦望春之事宜乎播大雅而登歌重修周公廟賦并序宋王嚴元祐元年春三月皇帝嗣位肆大眚以新天下詔書之下郡縣者有曰前世聖帝明王忠賢哲義有大功利及物列於祀典其陵寢廟貌廢缺不完者悉令葺治所以竭虔妥靈格於上下稽若古訓敦厚風俗其意甚美當是之時有司固當增置然制度狹陋草率茍完不足以奉承朝廷尊大先古聖賢之意今陜西轉運使遊公元祐六年按行西路飭官吏畀財用大為營建凡一百一十間又因其泉流導之者為畎澮瀦之者為池沼植之者為園林培之者為亭榭森布概列落落如畫圖間使人喜遊而肆觀焉至其廟貌尊嚴殿廡華煥左右仗衛塑畫羅列劍戟森然綵繪光耀竦動耳目而聖象巍然居其上髣佛如見當時坐明堂被衮衣抱幼君以朝諸侯四方萬里海隅之君奔走俯伏聽命莫敢後時制禮作樂七年而致太平以成周家卜年卜世之久嗚呼盛哉此亦天下之壯觀也惟周公盛德大業具見於詩書而法度文物載在周禮及其行事之緒餘往往論辨發于史傳諸子百家之書仲尼又以其微意於春秋以深究禮法之弊此固非淺見謏聞所可道也因拾其已傳之迹而係之以賦曰粵惟有周肇自履帝后稷不窋憂勤積纍公劉基理釐爾士女太王避敵從者如市躬仁蹈義以逮王季文王作則德與民庇小心翼翼天下有二武拯塗炭昧爽甲子太白授首商紂妲己梯航四海車書一軌天作元輔曰旦翊世文王之子武王之弟武疾未瘳公告天地植璧秉圭請代以死至忠竭誠則始見於金縢受遺託孤則恭承乎玉几爰畀顧命乃攝寶位冡宰作誥百官總己於是輔導幼主笞撻伯禽坐明堂冠冕旒撫四方朝諸侯吐餔握髮制禮作樂卜世三十卜年七百營洛邑均道里設官職列朝士序同異封子弟建磐石之固宅維城之利五侯九伯犬牙相制揚文武之烈光率祖宗之大締監二代之文物揭萬世之典禮噫嘻我直如矢我道如砥變生於獨惑出於似君子既誠小人乃毁貝錦萋斐箕舌哆侈近則成王不知召公弗喜逺則四國橫議曰公不利據手瘏口跋胡疐尾羣輕折軸積毁銷骨青蠅上璧點白為黑衆口鑠金呀吻利喙梟無好音車有載鬼蜂氣豺目蛟涎虎噬公於是時了不芥蒂是用居東以伐作詩以遺不顧小忿斷以大義誅殛讒亂表暴仁智罪人斯得神告以異大風偃拔開悟主意羣公盡辨乃啓金匱曰公勤勞訓我孺稚衮衣告歸天地薦祉嵗則大熟禾則盡起攝政七嵗明辟復子啓封七百土宇世嗣老於京師備道全美巍巍乎髙哉逺哉兮宣德音以不瑕皭然不滓豐功盛烈與日月而齊光兮烜赫晃耀乎垂千百祀魯侯受命祭以天子血食萬世流澤千紀榮華至今歌頌不已漢唐而降土木其峙想望風采恍惚夢寐載在祀典廟貌簠簋曰岐之陽在水之溪靣終南兮俯清渭瞻睟容兮望遺趾睥睨爽塏兮髣佛英氣殿沉沉兮穹窿神其來哉兮昂昻顒顒層垣落日兮古木號風停流澄碧兮晴影涵空丹楹剝月兮繪壁噓龍繁雲翳翳兮暑雨濛濛遺波餘澤兮幾千百年濫而為泉兮滙而為淵釃而為渠兮霈而為川鍤雲渠雨溉我甫田沃壤萬畝泝洄千里契理亂鑑臧否或通或塞或涸或沸守令得其人則決不得其人則止嵗在閼逢漈闢可歷肆沕潏以曼衍極舒徐以逶迤蘭澤勃以滂湃晷潎洌其櫛比灂堆崎激霄墜宗磈砢瀵泜沚淪湄滸漪靡紓洶洶洞洞瀹瀹泚泚蒼崖峩峩兮白石齒齒若乃支分派引旁午錯出滌闤闠瀺井里浸淫逆折乎蘭若之圃汗漫溥博乎絃歌之地濡鱗翼於將勦蘇根荄於既殘惟餘閏之所浹無一物而不被至於風亭月榭層樓觀閣流珠潄玉清聲爽韻洋洋乎方池曲江孤嶼絶島沐浴長養乎春陽而秋艾天波空鱗雲山倒影涼颸兮皺輕碧急雨兮斂新霽皓月沉素餘霞㺯綺雁落兮修漣生魚吹兮圓暈起沙堤兮蓼岸花妍兮草媚客有乘范蠡之舟橫桓伊之笛延馳影以綸鈎泛凄飈而膾鯉抹毫而吟挈榼而醉不事王侯屣棄名利而深入乎煙霞之際以索於形骸之外養乎中和之氣此智者之所樂而不可勝記夫是之謂周公之水辭曰我思古人兮永想風聲徘徊明廷兮瞻仰儀刑野人何知兮桂酒芬馨禳除凶災兮祈請冥靈嵗時豐樂兮吏治不驚奉法循度兮天王聖明我思古人兮姬公孔子忽乎其有見兮邈乎其不可致如有用我者兮期月而已將以敬天之命垂於無窮詣於極治兮請俟周禮西園八詠賦明沈周粵惟苑囿園池之屬關中者鄙夫無一隅之及一日之覩矧聞之髣佛於今稽之挂漏於古聊準長安之西笑託公子之夢語嗟夫上林蕪矣甘泉莽矣御宿稌矣樂遊黍矣西郊之兔跧矣宜春之麋麌矣梨園燬而礫矣凝碧夷而土矣類皆前王遊畋歌舞之區鄙夫蔑有所取也取則不無郭令公之仁里邵故侯之青門李將軍之北郭王右丞之輞川俾人追惟於往致儼水木之如存又不無代逺人非於懷慨然然而何地無勝何代無賢何賢無述何勝無傳時則有若耀之為郡實古雍地平原膴而裔衍諸陵矗而足峙荆耀而玉韞地靈而氛萃嶻嶭突秀而近拱漆沮流潤而暗匯壯哉三原之佳甸洵矣三輔之遺治屏八垠曠蕩之風鬱大塊坱圠之氣負隂靣陽審形遵勢宜賢者之胥宇嘉勝者之收麗百堵仡千弓迤乃從相卜乃從窆厝乃從搆架乃從樹藝孝以為基忠以定位擴中類仁制外侔義方之象行圓之比智厚以積德髙以抗志於是大司馬公拓為西園以藏以修存誠而樂道觀物而玩化非文饒之錮愚非季倫之豢尤徒悅耳目而恣般遊者也有碑勒銘在幕中堂史氏大書燦爛厥章於考世德於發幽光靈蔡贔屭而薦力文霓昭晰而呈祥其側有堂兩廂翼成櫋蘭劈蕙茨藝填蘅浩浩穰穰儲書滿盈紛者百氏秩者羣經標牙刻玉籖軸熒熒其前有池湜湜且泚不澩不溢不淪不漇擅雪滌之専攻潔垢硯之遺滓日新日資舊染是去方沐之槃譬飲之洗有松於軒徠服其隅離立矯矯直不假扶結瑶為根聳玉為株冒雪而腯被霜而腴負大且固葆貞不渝歷載而夀無度效材而需不訾有栁苞矣栵門之側匪朝匪夕先公之迹骳骩櫹槮紅總翠輑略和嶠千丈之譽襲馮異大樹之烈公之理南都也其在默運疇眤疇測其在獨斷曷憑曷藉祁然而威行沛然而德化潤廣則何物不沾庇大則無物不借民仰如雲所謂用作霖雨而澤下者也曰州曰藩公所蒞止化覃澤加則民之衰孱寡弱猶培而廡猶溉而華轉富而易庶若出乎咄嗟民之佩荷激切將以棫朴榛楛比公所樹之栁甘棠緑竹比公所藝之花公尚以池凡庶執事爰有汙墨沙之汰之蕩之激之公尚以記末學膚受瑣才小能舉録而鎮採兼收而並登揆方圓而施用期將就而勸成方我句吳之墟浲流湯湯為割屢年民告飢墊天子簡公來旬來宣民乃歡呼拜逆鄙夫亦獲瞻承光霽識公宏正而亮鎮簡約而靜淵以之柱石則明堂底定以之調元則庶徴罔愆其時也於公之園奚止二四之可賦來百祥之駢駢草靈芝茁木仁理連華峯􅏎􅏎醴泉涓涓或蒸之孝義或應之忠藎其氣在人酬酢於天尚為公賦之以屬於篇夢遊太白山賦并序康海余歷覽載籍所志古人之辭由屈原宋玉以來不可勝計而浮靡侈放之辭益託諷寓興者之所共趨上林之後益蕪益漫亡能爾雅志士之所賤也余感風人之義因夢遊太白山歷見竒瑰駭異之狀而作賦雖極假借要皆自喻其迹少有虛謬諛駕凌絶之病示諸同志皆曰可録𢎞治閼逢攝提格終相之月康子夢遊太白與金子可卿乘馬領僕各執糧糗飫飼之物浮漆渭跨郿塢環惇物逾武功去約萬里四望塞蔽恐怖獰突惶惑震厲若將遂為虎豹之嚙有老人者雪髭鶴髮電目龍顔自西而來若愛若識請以前路則笑而不言少頃復去金子曰若非山川之精耶豈將疑我以迷晦顧我以虛詼也乃躡以其後則豁然四開巒回徑折泉下雲散豫曰是未可止也夫八紘之廣獨有太白盤礴峵嵬﨑崛神靈秀明嵭嶪嶭夫是但謂末麓近壑然未邃也乃與蚖蜒仄石轉附垂藤升瞷巉壁靜嘯絶坪忽萬里之瞬側何溟渤之未窮雜卉菁蔥石泉沸騰嘉樹驂乎九御神風颯乎太綋騄駬散乎秣粒蛟螭視乎細繩電光恍乎山足雷聲浩乎廣聽零露凝其在衣松濤悠乎啓聲金子曰快哉遊乎夫造物者假我以聖智崇我以令德我弗用觀奈此膚景遂直詣而不回何茫迷之勿騁乃爾若神物之可憑歷千岩之邃嶺山石儼乎華嵩細流浩乎滄溟蓬蒿翳乎峰壑墜葉震乎雷霆老人跨鶴從雲前下笑曰異乎子之善勇也夫太白始峰炎暑氷沍萬夫之勇亡有敢及况逮於是夫是泉脈應乎坤軸遮飾極乎越區天扃邇乎可聲神祗恍乎可呼至循崖之前重谷之裏百鳥不宿神獸亦避雖至人亦蔑有入也越此百里西下隂壑復闢峻嶽則金屋龍棟控亢聳摶異花雜乎瓊瑶仙風泠乎清綽靈芝馥乎滿郊麒麟馴乎盈郭龍蹇屈於平池鳳翩聫於長漠此則上帝之祕區而太白之關鑰也其東百里瑶宫蕊殿萬户齊啓蒼光青氛四靣周起函丹書於億笈紛朱絃於兆徴散靈繭之如斗歷綺縠之竒靡總百綵而具存奚瓊桃之如纍此又太乙之宅合陽之宫至其南也朱雲陸離丹閣神桂宿日南極奉塵羽翰極乎麗暉珠貝極乎雕飾鵬鶚駕而鳳軒鯨鯢御而兕履是謂朱明之宫天帝之闕北則至幽號曰玄府紫微之所宿萬象之所聚玉臺瑩光氷柱炫色珊瑚如林水晶四徹雲沆漻而守默氣鬱森而馳起靈龜元龍參錯其下松檜接乎帝金碧曵乎泉石翼八獸以守衢役百神而司臬夫皆五天之至精萬化之樞紐能有至者皆必具靈負祕與抱圖膺籙之士有天人之德者也已而風柔香墜路豁視空若雙龍之負引倐靈宇之就中仙姝麗乎兩間洞簫錯乎萬笙浩歌凝乎飛泉朱絃颯乎翠空座列煥乎雲端境象委乎穹窿環珮鏘乎旖旎禮數儀乎動容豫乃攝衣升堂長揖就位悟人世之囂紛歎靈扃之皇閟乃與金子終身同丈人居之不去華山賦許讃噫吁巍哉華山質聳千萬餘丈於鰲極之初分其髙無垠根蟠千萬餘里於混元之始判其大孰倫突出雲表直指天津噴吐風雷拂拭星辰慨自洪荒以來羲農之創則軒唐之造鈞舜禹治績湯武革因皆興起於嶽麓之左右孰不法象乎儀則而仰遵乎明神逮夫秦漢以下則但知陳玉帛以徼福具牲醴以致禋而已孰知嶽宰西方秉灝靈掌商政令肅貞上天付以收斂劾實之名號委以清汰勤政之權衡凡物之未過者不阻其長養物之太盛者必伏其裁成故月無棼次日無逆行雲無妄發雨無妄晴禾稼不得過時而暢鬱草木不得驀候而妍英夫西行為金金禁也物之流溢茂濫過常度矣禁止之而不得肆金色為白白質也物之炫耀文采失本原矣迫還之使歸於情匪曰摧其華節之則復生匪曰傷其英斂之則復榮此嶽之性情司令通萬古徹八紘而無息無更者也以言其景象則黃河洶湧望嶽而南注者若朝涇渭潺湲遵嶽而東過者如緯玉井澄冷兮蒔寶蓮之竒祥月嶽窈窕兮森蘿藤之芳蔚坪青柯兮蒙古樹之槎丫觀白雲兮聽飛泉之鼎沸其至竒者五指嵳峩於凌巔千載具瞻而可畏名為仙掌不知何謂豈以制引煙霧虹霓而節宣化理抑指揮垣度辰躔而佐調元氣乎其名曰華者則以其亭亭萬丈而巖巒交匝靈秀萬狀而四出如蝟磊砢無窮稜層難既依稀乎紅紫蔥舊乎蒼翠或析瓣分枝或呈葩衍類望之者真如芍藥芙渠而四面互植玉樹玫瑰千章交芾也名之曰華是為可貴夢遊山賦楊爵時和煦以轉泰兮嵗惟丁夫壬寅余倣佛於夢中兮夢歸遊於咸秦歷韓魏之故疆兮泛柏舟於渭濵浮䫻以逺覽兮暫憩夫山之危岑乃吳嶽之崔嵬而秀麗兮古號曰西雍之鎮峯突屼以峻出兮勢若連乎霄辰石巉巖以崚嶒兮百壑砑其嶙峋風習習以清和兮迹迥脫於世塵草與木森森而夭喬兮秀雲邊其苯䔿鳥與獸蹌蹌而頡頏兮若解意以相馴豫乃采芝蘭以聊茹兮氣和煦而苾芬挹清泉以時酌兮蕩吾平昔之塵襟忽回顧以寥廓兮百峰羅翼其共臨俯仰余長嘯而朗吟兮髙胸次以樂真山有廟焉迤邐其麓之東南兮以時妥侑乎嶽神棟宇苞翬其壯固兮丹青煥乎維新背􅑬嵼而面涇渭兮延廣袤其幽沈古取夫萃與渙之大義兮儼嶽像以獨尊豫乃肅容儀以瞻拜兮心栗祇其快覩復長跽而祝之曰惟明神其監觀於下土以大義而降禎祥與妖孽兮斯固無幽而不燭夫何世事之紛紛乃有稽典訓而不類兮固豫中心其眩貿豫敢筮遊衍而不豫隱兮願得夫豫奪之微故惟豫小子之有生兮何不辰而遭世風波灑憂時之血忱而貞志於孚先兮固久罹於窞坷時省愆而思咎兮求不忝於屋漏於嵗月之陽春兮今已兩過念豫總角而志學兮每矢心以克邁嚴步履以出户兮敢斯須而或怠景先哲以周旋而與歸兮忽凶害焉其顯祟固豫小子反復思之而莫知其謂也語畢悽慘流淚澘然傴僂伏俯聽神所言惟神囅爾而有聲兮復喟然其長嘆曰嗚呼來汝小子兮是爾之愆爾不聞曲其躬而圓其行兮取封侯以相先或有貞直方而未少回兮死固不免於道邊當行而吾行之兮當止而即止斯先達之明訓而可敬服兮胡不珍身而量處道固不能無消息兮應斯有常而有否茍相幾而或少戾兮夫孰非以災而自取惟明哲之見髙一世兮動自逺於坎砢燭隱機而尚肥遁兮泛長江之一舸乃有迷檢括而寡諧兮拂潛晦以自頤衒崑山之良璧兮人共惜夫楚和履大間而不茍措兮固自謂世所尚也當枘鑿之不類而欲強置兮孰不指身心以為訛嗚呼小子而今後其尚亹亹焉以克勵未可以一蹶而遽挫思福堂之玉汝於成兮方一念之偏頗惟古良士之堅志於患難兮思尚友以切磋寧雉介之耿於羅網兮勿狡兔其爰爰寧松柏挺挺於嵗寒兮勿桃李其灼灼何所往而非吾可安之地兮慎無怵中而懷憂彼皇矣之全賦於有生之初兮惟反身而是求聽吾誨爾之諄諄兮尚不忝於前修茍迷途其終不悟兮將脂韋以自羞豫乃再拜稽首而起應噍噍其未已旋周旋以出户忽驚愕以覺悟時東方之既晨愧絲粟於枕衾嗚呼天耶神耶教戒懇切誠可信而可遵大道坦坦而無曲兮固不越乎吾之心觀宇篇巨賦略文在中夫八郡三陲更僕未易卒業請略道酆鄗之舊而吾子自分寸焉夫關中據六合之上遊負函谷之天險庖犧神農軒轅帝嚳以來周以鳳騫秦以虎啖漢以龍興唐以豹變隋以鴟張苻堅姚萇西魏後周以狐嘯而猿喊璽而皇者五莽而帝者四是謂秦地披山帶河四塞以為固入關而都案秦之故此扼天下之吭而拊其背奉春以之而建天䇿關中左殽函右隴蜀沃野千里南有巴蜀之饒北有狐苑之利三面固守獨以一面東制諸侯此所謂金城千里天府之國留侯以之而贊劼謨秦形勝之國帶河阻山懸隔千里帶甲百萬秦得百二地勢便利下兵於諸侯譬猶居髙屋之上建瓴水田肯以之而賀廟算塹華為堞因河為池據億丈之城臨不測之溪有席卷天下包舉宇宙囊括四海并吞八荒之勢長沙以之而過祖龍三輔之地南界江淮北濵河渭汧嶺以東商洛以南厥壤肥饒此所謂陸海之地曼倩以之而獻武皇前臨沙苑後枕虎岡左控桃林右阻藍田漆沮經其東涇渭繞其北依山為險形勢雄壯雍史以之而標地靈則關中形勢甲於天下秦中自古帝王州咏於詩人殊非虛也是故金精方盛天畢用權駕艅艎之舟渡渭水之灣過咸陽之域思阿房之宫其下可建五丈旗而坐萬人閣道迤邐屬乎驪山之陂者殆二百里宫車顗頠而度馳懸橋而轢天宫愚黔首而莫測橫半霄之蛟龍雖既招八州朝同列鑄戈鋋為鐘鐻殄滅三代之子孫隍漮六王之雉墉乃始皇帝之為人下絶地之紀上斬天之脈而剩嗜遐思鞅侼而伏諸胸臆者何其雄擷燕趙之菁英籠鄭衛之處子幽鬱而閉夾槐垂栁永巷之內且三十六年猶爾屠湘妃之廟冒博浪之椎伐五大夫之松命盧敖徐福驅童男女數萬人媻姍扶杖而陟蓬萊方壺嵒齬岝􅣉之危峰然而戴岌天之竹冠登華嶽芙蓉明星之嶺揫蒼龍之鬛而西顧繫飲海之苴屢躋五月積雪疾風暴雨太白之巔乘陂半瀑布之雲而東瞻揖黃河龍門積石萬里洶湧之波而問道攀崑崙瓊璚三珠之樹泛星宿之海而撑船詔渭伯來鼓楫檄涇侯使張􅎶駕鴻毛於弱水過黑津而陵瀾當其青陽謝候朱明統天馳馬畢郢奉天之原而青莎則漢唐之陵壘相望未始不動六合之思而願為赤龍子天䇿將軍執鞭至若祝融揮汗而却步蓐收鼓浪而潺湲貿瓜楊城之隈以傲盛暑問酒新豐之家而涉灞橋則隋宫雖以陀渚枌榆猶樹舊川釋十六苑之湖池海藪而幸江都稱觴未央而與仲較生理桑枝遷於海上蜀王化為杜鵑紅塵萬古白雲橫山布衣與朱黻未知孰尊鴻溝疆界今已漲漫馬上噤噤徒掣龍淵粵惟漢之故都於今實為長安英雄之遺魂何在娥嬴之粉黛成煙不堪東郊皆禾黍令人咺唏淚泗漣吾聞鑿昆明之池以習水戰豫章臺之石鯨魚不識其遇雷雨之期而猶鳴吒動其鬐尾而鼓其喉舌秋風瓠子之歌可為厄咽柏梁窮迫幾窮之韻東方生於茲乎不復謳左牽牛而右織女空取象於雲漢亦罔䟷乎阿陬臨影蛾而玩月思宫嬪之乘舟築通靈以懷舊顧青鳥而生愁育皇躬於猗蘭逢七日而張侜遊結襟之太液悲啄菰之鳬鷗經焦濩之古藪尋白公之渠流越甘泉之垝垣踰通天之髙丘過栒邑之深谷訪大厯之夀湫嘉鄭國之灌溉請水工於韓侯頌成雲於舉鍤欲作雨而決溝觀彭衙之戰處覽咸林之蓮洲緬緇衣之遺武壯孟明之焚舟閲鴈塔之蠡勒夢學士於瀛洲遾召燕之曲江想天寵之綢繆出種瓜之青門嘆邵平之無求嘯雲霞而覔侣何駢趾而結瘤若乃麒麟之圖像十一人而不得與博陵之後典屬之前則魂悵惘而若怯凌煙之功臣二十四而謀謨不得房杜次韜略或與英衛踈則撫遺趾而三嘆祗局踳而躊躇孝文之受釐宣室處今仍在恨不得干前席之澤與少年之洛陽人論鬼神幽明死生之祕説非不會於忥諡但代神荼而鞭度朔之梗魅駕天寶而出宇宙以馳驅明皇之金鑾殿沈香亭噊災而幾頽恨不聓李白賜食調羮之寵賦名花傾國之句而賞四本芍藥之蓲蕍馮夷擊鼓湘妃出歌岑參之兄弟非不好竒每過渼陂而思嘉魚秋槐葉落萬户傷心王維之忠肝一片不下睢陽與常山睇凝碧之池而或為若人三垂胡杜欽對䇿何如幸芙蓉而下馬之董仲舒覩白虎之嶒􅗆而坑吾前傾天人性命之囊世卞氏三刖於荆山之璞而玉何沽張禹説論語尚書何如扶風之峽不辭寒暑而讀書之馬季長䀩金華閣之倔佹乎雲灘乃知翦篲而讀墳典丘索之殘篇不翅倚相神淈六經契斷八卦籠絡風雲磊落之才纛於幽僻厥初枉六射而懸弧冀闕未央長樂建章甘泉五柞之瓌譎而紆鬱創於秦漢捎天星而千閶闔之閭乃草元執戟墨卿翰林可推第一􅓥􅓥焉懼不得步金門而上玉堂黃衣白鳳之辭取而覆瓿仙林望春翠微大明興慶華清之􅉳然浺瀜而博敞經營乎隋唐已遺鎬池之蒼璧而不寤徒勞由余之鬼為而向愚以采蘋之淑而賦樓東以侯夫人之俊而懸朱棟千古大不平事殆如冦鳬况辭人騷客夫珇士幾得志於枚箇焉握瑾而持瑜不願學酇侯藏六家河洛之祕圖於石渠而究要害焉得偕子政校七十二乘之奧典於天祿而然青藜桓溫非鍾期則攜手王景略之豪傑捫虱而談世務於華山之隂門前水倒流望人十年而不出吾何待則始掩僧一行之北斗七星於甕中推厯法於銅人之廬王官濟河而封殽尸吾將罪穆公不用蹇叔黃髮之言而襲鄭之東門終非計致大鳥於喪前垂關西之師慕設覆鼠以肆嘲嵗星照於華隅起黃帝而作史懸龍門而垂鬚良弓藏於鳥盡弔淮隂於櫟墟步咸城之北原嘆子房之與商山同區軾華胥於藍郊奠桂酒乎平蕪訪尊盧於南陂憐牧豎之掘狐帝嚳藏骨於郃陽先莘女而孕秀腴蒼頡伏緑字於白水聽鬼哭而陵煤瀕陽老將夢王翦細栁旌旗憶亞夫杜郵白起復何罪韋侯逍園亦非􅋯陳希夷青坪之睡洞可橫吾之肱而卧其廬秦王子嬰奉璽之枳道徒流涕於始皇之長城而思飯清蔬華子罔乃輞川之絶勝安得偕摩詰而戴茱萸特勒驃為六駿之超蹄越醴泉之石刻而踟蹰指戲亭為笑柄舉熢燧以悅襟裾有扈氏與帝啓戰於甘之野則在鄠東鬼塊作書三篇責禹亂天下事厥説有根而非誹於膚踏渭原之草而跟蹡拗黃河之波而陪鰓攀文武之陵而收洎跖髙景之寢而涕垂翹崇嶺則捻躍而欲騰驤俯深崖則掾嬴而謀療飢經略乎八水之濵而茭荻網䠑踽乎五陵之衢而揚風吹秦來漢往騷騷焉如麋鹿之逐西陂前古後今覼縷而起在豫心如蠢春原𧖟之抽繭絲則吾安得憩鳩摩之淨土樹兮摘八月之桃實而袖歸扶仙人之九節杖兮柱玉女洗頭之盆而浣埃緇騎龍首之􅤢嶵以周視兮索渭水樊川之窋䆛而棲遲餐終南之合離丹青而黜金銀兮誦倏黝詰曲之辭於昌黎連亘乎太一之􅛡佹插雲霄而直上兮近天都而問阿維升驪之坂曦東西之兩繡兮下盝於溫泉濯豫纓之颯纚慶之風雷湧面堆阜出兮重俞俊隂陽之説而扶冠縷歷七盤之十二䋫兮搜藍關之雪迹於嶮巇瓜見仲之巉岩兮思圍獵而致風雨之涕洟石鼓之原問承露之金盤兮躔逡運而臺榭糜王嘉隱於象山兮聞倒獸而詢渭湄少華多荆杞佐白帝施雨澤兮崩於宋而亂石陸離鳳御圖而至扈岫兮軒皇拜而受之青石出於磬山兮廢四濵如白磯三石鼎峙於漆水兮萬斛如斗形之旖旎獲寶鼎於汾陽兮至中山而黃氣氤氲以淋滋鰲背之峯巒若龍相之所鈞兮吾將郅龍門之懸泉而暴腮九嵕齴齴六百餘尺兮上石門攢天之嶺諸岫如鋪棊紫閣峯隂入於渼陂兮落雁髙絶可通帝座恨不攜謝眺驚人詩來問真源於素威始平之原築於廣漢兮白鸚紫鴛旄牛青兕充牣其間徙之上林要非白衣分之攸宜太真終於馬嵬兮還一斛之珠竟有赧於梅妃獵五丈之屯懷諸葛之英明兮馳鴻門之阪嘉赤龍屈信之委蛇觀長平覆地之盤蟲兮識秦國之多赭衣令人俯眉而思古昔兮屈指乎西伯與庖犧西極子曰若淑夫賔之論羕乎融融纚乎洋洋然則雍之美罄茲乎西州賔曰未既夫雍跨有西北崖隒華陲居天地之大半吞邊域而為疆迤邐綿亘三千里海內之雄也由京兆至於扶風三百里隴關阻其西益門扼其南五水所會三秦之一此古西伯岐周興王之地鸑鷟之所騫翥汧隴之間又一大都會也赤烏銜書天柱嶢􅒈實誕聖瑞爰基鎬豐石雞晨鳴陳倉之峯聲聞三十里音中商宫吳嶽為雍州之鎮曉光連翠巘而容裔望輦大賢竒岫五出墆霓而摩乎層空天水大坂是曰隴山九回不能窮其隈七朝不能越其巔隴頭流水不堪聽顧瞻而生悲思肝腸斷絶而望秦川諸葛亮與司馬懿相拒於五丈之原􅡟虎颬颬如欲吞餐逭道之間化為灰塵迹淹敝而黮與渭水而波瀾吕望釣魚則在磻溪石室􅌄窱而不見徒盼林岑之髙低丹喙鳴於樹間鸚鵡出於隴西問上皇之安否假郭浩而寄思蕭史吹於鳳臺致孔雀之翻飛得羽化之妙術偕㺯玉而齊馳女登感於華陽炎帝生於薑湄臨西虢之舊城懷文考之萼輝傷蹇叔之諫鄭􅍇秦誓之知非周召之所㺯璋乃哲濬之舊圻惟二張之繼産刑範垂於關西由扶風至於漢川七百里地兼梁雍之二州星參翼軫之四宿前瞰河華後蔽巴蜀崖谷險絶千里百折秦之坤地蜀之艮方關頭荆尾連髙夾深漢髙帝赤龍之所提劍張魯之所狐嘯而竊據諸葛八陳之所伐魏而六出褒沔之間又一大都會也漾發源於嶓冡合沔池而為漢嘉陵漭沆沛艾若箭出散關經利閬入大行如匹練在戰國為白馬之舊都於南鄭有褒國之古塹天柱懸崖下有碧鈿藥婦醫夫化石為變石牛糞金五丁擘堰曲盤十八始登江岸金竹之縈流七十二略陽之渡口一百八山桔桀而庨豁水渺瀰而誕漫縱使中黃作贔而發弧誰能沒羽洞褒斜之雲棧惟南北二日之相距亘四百里而為行旅患獸蹄夭矯而不敢過鳥羽譴喘而不能轉留侯燒天梯而韓成熙子龍壞赤崖而諸葛詘雖用情之不同皆忠白之僅見匪佐卿之化鶴豈能越飛仙之嶺而幻閃脫扁鵲之飲上池水亦難柔山消石穿幞頭之七十二洞而揖長縮之真面由扶風至於安定三百里水土雜於河西人煙接於北地咽喉靈武襟帶西涼黃流在其北崆洞阻其南隴山環拱渭波夾繞此漢之朝那介於涇原環慶之間又一大都會也惟崆洞之杳冥而赫昈兮清煙與玉繩而齊浮軒轅既柴岱宗兮遂陟崆洞之别峯曰雞頭廣成子處於東寨之隂穴兮外慮不足滑其靈修屈至尊而稽顙請益兮峭壁幽洞垠堮屹其猶留涇發源於城之白巖兮汭自華亭而上流揖渭水而會陂兮至龍門而洪河投殷之妲己尚有川兮秦王馬跑之泉亦涾湤而成湫皇甫謐讀書之處青草櫹槮於靈臺兮三都賦序體裁何容與而倏悠烽火動於蕭關兮動漢文之西憂武帝登崆洞而出茲兮亮羌夏之襟喉王母垂五色雲而來降兮漢帝聽崑丘之謡於西州煙雲鎖於臺館兮問道之所下於重巘有洞穴之可求此蓋古之密國兮頃聞康公與其王遊西北不必秉斧鉞兮入我版圖已成千秋皇甫規恥不與黨人兮自繫廷尉而罔知愁厥妻草書而屬文兮罵羌人而不為夫子遺羞皆溪山之秀氣兮邈古昔而寡儔璘與玠之戰功兮亦彪炳而可搜由安定至於隴西八百里天水名郡關西重鎮倚西傾朱圉鳥鼠諸山以稱雄接壤羌裔通道西川背山面池襟帶秦隴之間又一大都會也於春秋三代之前兮本氐羌之所居至非子之養馬汧渭兮孝王封於秦都隗囂與其將王元協謀兮遂偕公孫子陽分隴蜀而﨑嶇杜甫過之留詩於萬丈之潭兮並西地之十九泉而懷諸李白逸才乃隴西之苗裔兮與其祖廣射雕之手奪成紀之膏腴紀信薑維皆偉人兮死君之難輕其軀如錙銖充國産於上邽兮金城方略垂於麒麟而與博陸齊驅雪山冬夏不消兮西傾載於禹迹嶓􅜗導漾東流為漢兮乃大江之頭顱庖犧陵在三陽之寨兮蓋由履大人之迹於華胥冠三皇而首出兮畫八卦而制鴻隅乃知崑崙信天地之元首兮以故關輔為諸聖胚胎之所須由隴西至於武始一百里控邊陲而為域接巴嶲之襟裔南得鍾存廣其腴土北阻大河以為險固臯蘭峙其前長城為之障此嬴秦之舊封隴西之故地又一大都會也惟臯蘭之岹嵽兮為州之主山其下地勢之平坦兮可屯百萬之兵而令甲頒峞巍而峙有嵻㟍兮西秦築城於此而歸熾磐洮河之源出於塞外兮流入本境經數百里而曲盤㶀㵧􅢨􅡰聲如萬雷兮並東峪三岔瀲灧而相連蒙恬發兵三十萬北築長城蓋在斯兮一朝禍起蕭墻山東諸侯入於函門李晟之繫朱泚息奉天之亂兮望墓草而悽慘由京北至於北地九百里城髙如山池深如泉原阜錯列溝澗輻輳境接羌人山川險固為關輔保障鎮於邠寧之間又一大都會也惟不窋之舊都兮在昔號之曰北豳寧為古之義渠兮秦滅之而建屯真乃隋之羅川兮獲玉真而得名馬連出於合水兮九龍繞乎寧城鵝池浚於昌言兮厥洞㱂窘而涼風生小鹽池為三輔之利兮花馬與孛羅而相縈陟靈武之臺兮肅宗登極之所猶未傾越范仲淹之舊宅兮馬既過而復更讀郭子儀鐵劵之碑兮嘉其孫訥用思之為精岐伯之素問難經於此作兮弼軒皇而究瘽癥獻吉筆冠一代赤城乃其母家兮訪諸故老得之惆悵而意不平由北地至於上郡五百里形勝之地五路襟喉洛水之交三川所會北接邊塞南障秦邦中外之衝鎖鑰之關又一大都會也惟橋山之蹉跎兮葬我軒轅之衣冠邐倚蹇産林木蘙薈兮上有古柏之丸丸蒙恬扶蘇監兵而築長城兮何一去而不還黃河流於東北兮洛水經而為長川直搗土門之十八寨兮猿臂之李廣不侯而負慚涉奢延無定之波兮潰咆勃而激乎赫連誦秋風白髮陳祐之詩兮我馬回復而周環過中部而謁黃帝兮雲色苂眼亦向睇夫玉仙少陵豪傑寓於鄜之城南兮囏窶孺弱或啼飢而彌年君子艮窮何悻然而發浩嘆兮為飢寒所迫而聲喛喛白雲片鶴之遇趙鼎兮識中興之名相於汴前後至吉陽而相逢兮知浮萍世上死生之有定緣由上郡至於雲中五百里逺際龍沙四無襟帶營堡相望烽燧連煙東枕髙丘西橫大波南阻岡陵北迤沙漠此亦雍之一大鎮也惟秦之却外患兮樹榆枝於塞溪古號為九原與勝州兮蓋三輔之障隄經石峨峨而赩赫兮近代築榆林為城陴有水迤延來自沙漠兮從石而下陡落數千仞如倒甀孤懸一方所謂備榆中之關兮誰其䇿士馬之窳疲安得倜儻大略之士還我舊物兮寄言當塗勿聲腆而遺茲由北地至於朔方五百里黃河繞其前賀蘭聳其背靈武古界西陲巨屏西北以山為固東南以水為險於春秋為羌人所居於晉則赫連夏都會之地唐末據於拓跋思恭宋興城於厥孫德明此又雍之一大鎮也惟賀蘭之山巃嵸而慏歷兮丹崖翠峯盤踞數百里以稱雄草木菶茸而果園晠兮塞北江南讓其雲煙之鬔鬆石觜黑鷹偃蹇而不可路兮琥入惸子澗溪險惡人蹤罕到猋猋紛紛獨遌獸蹄之倥􅘓蒲草鴛鴦洞水徹湙而淡濘兮紅花秦梁分河流之波而溉我黍穜賀蘭之上有元昊之舊宫兮人雖豫賴牆壁猶儼然而橫古松築髙臺而臨之以極山川之偉觀兮沙土萬里清黸焉所用其翿幢黑山黃沙征夫之所宿兮閨人出閣望北雁而曜容斯誃而腸斷不足言之􅻦兮樹之丹棘要不得消此離宗由函谷至於酒泉三千里襟河帶山為羌人通驛之路環以祁連合黎之峰漫以居延鮮卑之水萬山環抱三峽重圍紅崖峙其左青海瀦於右漢武始置酒泉武威張掖諸郡者即斯地此又雍之一大鎮也惟祁連之峻號天山兮草木茂幪冬溫而夏涼天梯青巖偕焉支而摩蒼崑崙山積雪不消與日相連兮周穆見王母於此跪陳觴而踉蹡積石三危禹之所導兮皆羅列於龍勒之旁風卑禾羌獻我青海之地兮魚鱗背負黑點而飲玉漿弱之餘波入於流沙兮黑水為雍州之西防若夫洮乃吐谷渾之舊邑兮岷亦古之西羌夏禹見長人而受黑書兮是在岷之下遣歸霄而遺玉裝河州靖逺漢之金城兮紅寺會城盛景喬桀而斐亹羅於絶荒爪牙相控將數千里兮撰屓勒石而追拓邊者須户庭夫八荒龍橋賦本朝韓詩逖那石有五以繼鰲之左足吾初覩天與地乃補苴之清寧邇掌開芙蓉之西壁錢唐君遂萬其血腥彼羣峰巨江在域中合天地山水為四大得非台莫或與之經若是陽氷七星實津其天漢祖龍表牽牛清渭使帝座接夫三庭不見衆輪之外廣漠馬賴之上木坰非煙凌而欲斷雲如女而忽停蓋下貢黃噴之寶馬上流西極之丹青遇雨漰湱望美人於天末則何似一角九頭之睇躍於元冥説者以治其涇之支也涇尚不附離於道元之撰又孰辨乎朝宗者萬表茲之一也而得頡頏於至濁之形崤函東據符禺南屏西則褒斜隴首之孔道北則雲陽谷口之依慿觀井星而人從繘出慨然念吾手之無梁何罔擬四海之波澄即一帶之渺若河山已奚俾夫戴日戴斗之隮升驪龍果飛梁之莫企造舟擅風雅之誕登架黿鼉而九江坦道填鳷鵲而河鼓媒乘乃有伐蜀之子渡蟻之翁一浮而敗一餓而䎖相期何後相涉何氷遇者作帝之師惠者舉相之能雲蓊霞蔚波折流興決渠而降荷插而成黃支大宛佩玉鳴箏端阿僄狡角抵瓏玲目眩轉而意迷體逍遙而節靈若雲蒸兮在下若日出兮當心夾兩龍兮遊蒼霧采秋月兮橫孤襟於是春漲鮮皓清英載陽王芻蔏藋馬帚懷羊無疵諸慮枸檵甘棠葉蕸本密夏納晚涼白華野菅桐木桋桑維神蓐收苦菜寒漿水臺亭厯蒲栁權黃綸組帛布冬日為衣菟葵馬尾蹶泄樝梨莫不盛往來之觀極娛遊之樂備口腹之美竭聲色之謔襄公過陳而嘆興司馬升仙而題作茍騫崩之不葺雖揭厲而難度爾乃制度精巧鴈齒絶程方圓合妙爻象錯陳般倕棄其剞劂王繭投其鈎繩上象紫宫之崢嶸下等寥廓之無垠南北交會雞犬相聞羽檄朝至皇華夕陳鳴珂甲第棧閣聫雲珠琳梵宇倡麗優伶炫靚服妖粉白黛青霧縠飄揚紈扇絡纓車香馬柔洞魄駴睛有時指壁而倒聽楓葉有時貰酒而往問黃鸝之聲四顧岸峙墱道蹇産畫闕朱甍壘嶵嶄巖何必求閬風星林之離立又何羡乎喬松安期之遙逺舉杯屬月非卿不立非聖不成委裘之登雒北延眺嘆其佳美魏亮之崇渭水百姓利其經營偃半月而作勢纍巨石而代楹少遊建大夫之號隱刑逅擲巾之生間者風起濤作天吳震怒懷襄可虞鴻流湍渡壁立赮駮迅澓增步㵗淑潰濩泧漷漩澴滎瀯偎灅濆瀑租車壞覆而絶來崩石硉矹以前路盤渦谷轉凌海山頽擲蛟龍於大壑瀾涴演而雲回三更戰鼓之登枕上萬派海音之響層臺韋笮不堪障壁馬空復徊吁然後覩河雒之功而唏噓慕哀曰厥德其􅐮溫公哉曷不爼豆持萬年之觴哉陽侯疸威猶恐懼干其廟貌孰東門之老婦望石駝而却走哉亦有遊間公子挾彈馳毬乘鮮䇿肥飲壑食流輕死重氣逞欲蒯侯實繁有徒跨府連州賦詩咏懷登眺夷猶騷人失意志士埋憂看出雲之初月吸碧澗之長虯引聲踏臂竹肉旅酬或裂秋江之鐵笛或送塞上之箜篌點啜見青龍而捲甲秦觀纜錦鷁而韻抽起萬里於展足橫百丈以泛艘徹杠彴之遼海飛架漢之仙舟馬退而釋國士履進而獲竒謀水涸則詠溴梁之詩天寒則歸龍鶴之儔曷不引人主於文申之宫擲杖而明其矞皇復使聞棋砰于方廣跨石梁以釋八風之愁橋猗橋橋猗橋我將圖三株之松於天外莫問浣花叟孰分其仔細蓋大笑秦皇之巡海右架滄津而空九宇之萬頭然後知建不拔者勢與空鬭捍大患者力與岸爭少保之功業善世窣堵之傑搆文星吾謂事有虛而有實亦一方而一周雁江之浮屠新泥塗以軒冕東西之缺陷簮多寶於芒勾故西周之鼎盛人英物華男秀女貞敦詩服禮秉德令明公輔碩相哲頴修靈杖攜屐過嶽峙淵渟聚似京雒貫比重城轂擊雲動肩摩雷殷其下修額短項腹行脰鳴奮隼歸鳬狎鵝家鶤草木夭喬山川出雲地靈物衆不可勝倫贔功德之鐫自我光祿夫子而余不忍復訊雒鵑之間但見枕席過師治湟偉觀算子排木曵馬載轅堞朋而環如耳而鉉蜷然雲裝襟帶其園脛之所钁脊之所負或慪而塗或眇而附錞于峪而建瓴其患此瓠中之路亂曰神哉豐霳茲下濟風雨從之胡然締茂世之規𢎞仁惠伯禹仰嗟黃龍負陽侯遁行瀾安步天挺斯人補天系地維坼兮虹梁繼山容水意黿鵲嘒建華以西斗杓離此橋亘空千萬嵗卿日尹月周天麗岐山懷古賦并序王轂平居懷古雅慕岐風筮仕服官愴心周道痛兵燹之相繼致民社之丘墟萬姓流離一方憔悴荒城日落杳絶炊煙破壁風凄永無人迹曩時名勝悉成瓦礫之場革代繁華盡委荆榛之藪撫今追昔感慨係之登眺興懷泫然泣下凄涼觸目悲楚填喉爰比賦于興衰實未裁乎工拙云爾岐繇商祀天作大邦洪惟亶父肇此西壤地接梁山之脈星分鶉首之鄉甲雍州之膏美種柞棫之幽芳沃厪荼于原隰奠弧矢于隂陽由是山呈厥瑞川貢其祥天柱巍聳太白鬱蒼汧流分導渭水環襄姬圖式廓王業寖昌誕興奕葉篤生文王化行南國澤溥西方風淳俗厚士秀民龎頌孔邇而如戴歌既醉以不忘近質成于虞芮逺威讋乎戎羌一時人文蔚起政教矞煌鹿馴于囿鳳鳴于岡啓白魚之先兆衍赤爵之流光遂有諸臣佐命多士思皇股肱締造夾輔胥匡綿十五王之厯祚垂八百載之靈長休哉化國展矣名疆自運會有隆替之異將世代為興廢之常降及後季相率孔臧沿為郡縣代有紀綱樹兩京之屏翰鎮三輔之金湯矜雄盛者譜豐功于秦漢誇富麗者揚嘉業於隋唐或擅六朝之美或推五代之良歷宋元而太平屢遘迄明時而綏乂丕張乃為逖稽隆勝允誦吉康上也穆穆下也穰穰家敦絃誦户溢笙簧農服先疇之隴畝士食舊德之衣裳沐風雲者輝聫甲第咏櫛比者積滿倉箱於是朱楹紛列繡闥成行百廛鱗集萬井煙藏貨泉填市筐篚盈廂遂有張翠幰駕元驦披錦縠曵明璫風流梁苑富貴荀香詩催金谷花照玉堂鶯啼寶榭燕語雕梁蘭薰瑶鼎蓉繞紗牀琴協太和之奏歌傳卜夜之觴極賞心之樂事騁快舉於康莊亦有青山寄傲白屋顒卭牙籖萬軸縹帙千緗藝封鄴架卷擁曹倉或賭西山别墅或開北海幽房或餐霞於鶴嶼或烹字於螢囊率彼都之蔥珩咸結調于琳琅四壁鼓鐘佐熙時之禮樂千山花栁映瑞世之文章聿徴休美莫與頡頏不謂天收景慶妖隱欃槍􅍉苻蜂起刁斗塵揚兜鍪馳驟羽檄糜忙由是室家淪沒原畝拋荒親知零落骨肉參商斷上林之喬梓拆合浦之鴛鴦奔人民於燧鏑委陵谷於滄桑是以愁雲結而成陳淚雨注而如汪試向空城憑眺不禁四顧悽惶人迹杳絶煙火微茫荆榛塞道瓦礫充牆風摧敗棟月冷頽廊飢鳶晝伏野雉宵翔鶻夜泣兮青冢鳥暮號兮白楊鷹隼搏兮署側狐兔穴兮舍傍畫棟煙消莫問繁華故址璚臺氷化誰留歌舞遺坊弔古徴竒山川黯淡尋幽選勝草木悽涼膴膴周原想見當年富庶蕭蕭遺孑半成今日逃亡白骨山髙僅保離羣鴻鴈青磷夜遍空嗟羵首牂羊觸目流離誰為繪鄭監門之畫頻年飢饉何從望汲都尉之糧露宿原棲影形共弔星零籜散魂魄相將林莽昏翳怯度溪煙野月村墟滅沒驚看人迹橋霜吁嗟噫嘻舊事既難問新愁莫可當一望破垣埋蔓蘚幾家殘墓絶蒸嘗無人對月不揮涕到處思鄉皆斷腸痛莫痛兮家破慘莫慘兮兵殤可憐革代興亡慨總付西風呌禿鶬重曰空城寂寞兮逝水泱泱荒原冷落兮衰草云黃時期平定兮風靜牙璋重修樂土兮永慶椒漿關賦并序李楷古人為關之義多於郊坰司譏察戒出入禦暴而銷萌以守以戰匪但義取於防也天下皆有關獨秦之西安以關中為名逖稽周漢隋唐之世建都以控萬邦門户藩籬惟關是賴東有函關西有隴關移函為潼越隴為散乃至于鄰沙漠臨外域迤邐周遭莫不有疆域之慮焉或乃以疆域為逺近之程如記里鼓李子過之作關賦以疏其旨其辭曰有遊奕公子者足有重趼衣垢結鶉舌如星箕其言啍啍眯經邦之逺猷惟瑣屑之為敦以汰吏為封殖及抱關之蟣臣譎其詞而悅耳如有裨于經綸適適然遊于溟涬之野與辰放氏私之曰衣皮之人木茹皮以禦風霜綯髮閨首以蔽靈雨存冉相之淳龎仍神民于隆古不星分於混茫誰瓜判於九土雖山阻而川隔量包容以并舉無畛無畦何城何府故扶輿之大同亦先代之希覩後世不然百法煩增各有其宇關隘乃興歘中䁥而外拒痞元化而膠凝使通塗其滯礙剩多費之堪憎擊柝匪但乎糜祿冗員尤滋乎營蠅𣙜無抑末之旨客悲貿遷之登思飛渡而不得將棄繻而不能矧鋭頭之總干倚要害以憑陵俾鄰國其生心豫嘆息而撫膺何不徹去乎贅疣之鄙而示人以大道之𢎞乎辰放氏蹙眉而嘆曰惡乎可惡乎可子不觀夫心乎膜以藏之腹以囊之咽喉呼吸肢體丰昌輔車脣齒元首康強氣用其柔食用其剛斷堅韌之乾胾啜沆瀣之玄漿頤地天之沖和養榮衛之隂陽又不觀乎作宫者乎其丹其雘曰栥曰梁美輪美奐肯搆肯堂實門户之重寄時啓閉以為康吾非忍以誑汝請徴稽于亶父之遷疆乃立臯門臯門有伉乃立應門應門將將即石室之繩樞與穴居之巖牆誰其無需於鎖鑰惜升斗以愴惶是故古人之殷殷逺慮也既建國都遂及關防每先事而預戒蓋有鑒於復隍吾與汝遐想乎居重馭輕之勢以考其內外相維之綱緬周人之制法定山藪於職方惟其封建之繡錯斯以遙理乎要荒左周亭而右召亭遂分布而相望循封濬之故迹得山河之鬱蒼設習坎之險守峩巨鎮以雄張時則有若殽陵函谷設關斯當南轘轅而緱嶺北孟門之太行挹郟鄏之定鼎鞏洛邑之金湯路車不可以馳奔騠駃不可以騰驤歘崒嵂而如劒閣亦詰屈而號羊腸旌旗則有熛怒招拒之五部戈鋩則有湛盧露陌之千鋩惟借此以省兩葉之斧柯詎有惜乎升斗之微糧子不知乎盤古諒有鑒於夏商失其勢則代不遽興戍其險則國可遲亡是以平轍東依於晉鄙關右聿付於秦襄蕃汧渭之駟馬成咸雍之虎狼或聖占於紫氣或賢隱而羣臧徴流沙之西逝何國步之難匡逮嬴氏之益侈扼六國之背吭來相如連城之璧納范睢入相之裝洵無怯于季子亦納交于孟嘗雖譎資于狗盜克亂正以雞鳴鑑席捲之威焰作兀蜀之阿房稽此時之建置非一關之嶈嶈武關嶢關㟏岈激昂屹少習以磊坷排蒼野以􅟃攘緬堯師于丹水弔古堞于蠻鄉誑張儀之六里嗤楚人之一僵蒲坂蒲關河水洋洋固虞氏之京邑判芮野之圃場秦滅晉而一之蓋銷兵器而資墉坊昔魏侯之論德險美山河之固而一怠遑縱窺關之有人匪天命之靡常故赤帝子之隆凖而逴絶笑內應者之失措而倣徨三户果楚人之桀桀傳檄又義問之煌煌微項重瞳之暴殄於一炬何沛亭長之約法於三章爰至韓信之木􅎆既渡魏豹之疑陳斯戕慨入關之三道每引望而懷傷此則大漢之崖略也奚重訊乎隋唐遊奕子曰處左者防其右都西者備其東云胡不襲其舊址長建邦畿于關中孰守其雌孰知其雄且外患之宜慮何先戒乎吾邦况古今之易姓奚守險之有終不擇人而選任難幸免於困窮徒縉雲氏之迂䇿將雎鳩氏之難通此剝民以奉軍旅者之所宜變計也盍取法乎良工於是欣然大笑拊其背而告之曰子言辨矣吾子不謾古人之有厯數者豈一隅之為安哉嬗者皆冀州以為都征誅則各異其郊壇亳屢遷而衆蹙乃籲天於河干吾德尚有其代運八極環轉於無端昭后稷公劉之令緒徴去邠邑岐之艱難開八百之寶祚有禹貢之琅玕澤深廣而四被封碩大而且寬漢略倣於豐鎬偉赤城之堅完前乎此為雍為翟為塞維三秦之脣齒相倚後乎此京兆馮翊扶風斯三輔之台曜密攢以潼束蔽而屏障庶其靖猰貐與共歡若夫宜臼趨洛而棄西文叔奮宛以回鑾帝不都於關右亦西望乎巑岏稽其防微之要旨蓋嘗逺郤夫蹂躪惑魏絳之不智悻二師之桓桓故漢文之粟紅而貫朽武帝之出塞而一摶或加恩於甌脫或宣威於呼韓棘門細栁之赳赳羽林健兒之嘽嘽隋有宿衛之七萃唐立府兵之重闌文昌列將相於星緯九野共藩屏於天盤其近而為關者則有藍田駱谷亘子午於南路涇陽焦穫依金鎖於同官西達鳳翔則有斜谷大散諸葛亮之所出師而伐殘也隴關大震薛防禦之所威外而戒鄰也又有金牙之崢嶸青巖之屈蟠為陳倉之勝槩映吳嶽之雄巔乃入梁漢則有棧道之危削雞頭之巖巒青石之扼要陽平之聚團仙人之縹眇方山之幽寒或將入於劒閣或俯臨於漢瀊惟漢陽之址昭烈之所以破夏侯惇也饒風之椒金師之所以怖吳玠也茍忠孝之不渝境以人而不刋其關虎頭馬嶺華陽七盤鐵嶺清風匪苐察姦平涼有瓦亭焉隗囂之所以戍守唐肅之所以牧馬靈武而盤桓也有六盤焉宣宗之所以成功吐蕃之所以失利而蹣跚也至於蕭關扼據如石斯盤吳人逺憶詩歌攸嘆追英主於漢武猶崆洞以遊觀藐通稍與大峽咸抱弩而負籣鞏昌則有首陽之嵬􅕲大震之岌垣眄玉壘於蜀道思鄧艾之征鞍匪三巴之無人得批郤而導髖臨洮則有積石鎖崑崙之下流金城壯名郡之波瀾慶陽北地是惟彈丸不窟攸宅形勝莫殫驛馬象其衝突清平消其揭竿延安鄜畤宜設三單原闕十二字亦備可汗永寧為古今之餉道直羅存唐代之衣冠其逺而為關者則有榆林為鎮於勝州會寧接址於烏蘭若夫鎮逺勝金嘉峪石關玉門陽關之屬莫不處於極西之西極北之北亘不周以岌岌護神臯之涫涫是故關中之域修於區寰我疆我理將無憂患甘泉猶厪於烽火校獵誰盡於豪豲惟王者之大無外經略之具聿端其或忽巨而重瑣瑣略大而事戔戔辟之處於屋漏下管上簟吾未見其可也諒非過於勞心之溥溥於是遊奕子其容有蹙其口囁嚅仰天而嘆曰先生之言關也可以銘可以針可以法古而垂今余小子復何知夫蹄涔哉史皇造字臺賦并序文龍軒癸卯觀濤後五日至頡皇造字臺臺在昆明池左不知何時改為三會寺宇其上宇三楹外培塿數尺古槐婆娑其畔土人言下有仙草見之者不死故罕遇是時亭午蒹葭滿目鳬鷖凌波終南山色襲人渭水晴光搖樹四眺者久之憶嘉州空階鳥迹之咏恍四目頡皇來虛無縹眇間也斯臺為古今第一文丘而相尋於荒煙亂楚而莫問爰造斯賦以志勝遊我欲搜第一灝靈之菡萼於權輿兮障劫灰其茫茫極逺遊諸邃古獵竒迹乎大荒奮亥步而未遂聊驅馬於周疆爰按圖而求古壘真憑几以數列觴繭余心兮擾擾於逐鹿之秦漢晬盤視兮騷騷然奕棋之隋唐時維蘂館娑霓衣之舞濤門下白鷺之翔偕同人而選勝指昆池以騰裝有臺墳起巋彼平蒼四圍告垝三宇猶張皤皤焉垂安國之柯郡萋萋兮窩王孫之年芳拾級偃蹇極目周章西州賔告豫曰此頡皇造字臺也嵗久而圮址堙於潢變為蓮界蕩為狐場軒轍罕至鳥迹不彰零露漙文章之府蟬聲聒禮樂之堂臨風寥闃撫影虛涼傷岑參之野寺攬宋玉之秋光慨余禁兮宕越恍彼美兮頎長涇陽君睪然為之不平紛鼓頰而琅琅曰聞之九州之隩實右我雍隴坂竪其頭顱鎬京拓其心胸下圜之以八水上杓之以七衡隂陽屆東西之會子午協南北之中宜其胞無極之氣孕太初之精故磊塊鬱勃蓓蕾而為仰觀俯察之神鋒爾其珠湧壁卓也地籟自鳴天網重暈倬章不絅素質初印邃皇解結盤古破悶日月賁其光華鴻濛失其混沌文實蕃而粟飄幽情燭而鬼遁蝌蚪繪妍籃箊生韻流為墨池濫為筆陳剡溪裁蹄中山束㕙墳典垂芒丘索取娉兒孫諸阜臣妾連艮五嶽失髙四瀆減潤錫車指於羣玉之巔剖符節於琅環之峻七十二家之所不敢登萬有千嵗之所無能問誰其揚此匹夫標金簡玉册之封我其為是片語剖赤縣神州之藴豈謾張掞天之辨空屑粲花之論於憑弔間者耶郇伯裔兄弟晉曰西風渭水落葉長安如叟問影何人探環悼青松於香積訪白鶴於樓觀認折戟於函谷尋膩粉於湯泉鳳岡寂寂麟麓漫漫幽徑古丘蔓草寒煙遊人不道樵子實繁灃滸之雲物邈如卷阿之車馬泯焉僅有此一度之跫音相與低徊指點於空階也奚有夫去天三百而壁地五千何以峙之秦州卦臺魯國尼邱可以鼎足而為三厥宇內之絶峯峻巘崢嶸嶙峋者吾嫌其無文咸螟侍若一卷於是晚風鼓浪斜日催鞭悵葭蒼其莫溯倐倦飛而思還西州賔不覺粲然曰今日之遊竒曠過龍門之馬二客之讚開闢邁蘭臺之班頡皇可作同九錫夫斯言金牛峽賦劉棨伊維鴻濛既闢兩儀判形山谷異位髙下殊情或峻極於霄漢或深入乎窅冥或險而有鳥道之號或邃而有鬼窟之稱幽潛沈鬱突兀崢嶸固職方氏不能窮其數山海經不能悉其名者也若夫聳削壁立竒峭天然隱蔽日月吞吐雲煙盡乾坤之奧妙成宇宙之大觀孰如金牛峽之險亘古今而無前以彼夾峙兩山中通一線危石巉巖魂搖目眩仰視則長空如帶驚翠巒之欲合環顧則崇墉如削疑赤壁之互見哀行人兮地底羡松根兮天半極世境之酷烈兮已令人却步而思返又誰為設此永巷兮長逶迤而不斷當其一天霽色萬里晴光亭亭日午倐爾輝煌撫清暉兮載路思白晝兮正長猶得把景物以流連任緩步而徜徉若乃重隂凝閉四野同雲蒼煙大霧沒頂連根飛鳥悲鳴而逐伴哀猿長嘯以覔群寂寞兮中道迢遞兮前村一舉足兮顛越一回望兮迷昏且為歷﨑嶇而上下縱呼籲兮難聞至其方幸出谷旋驚陟巘羊腸迂回龍門悠逺摩石蹬兮崚嶒俯溪谷兮危棧乍屈乍伸或仰或俯急賈勇之弗遑敢屏息而定喘李白所以興嗟於上天之難而何有於九折之坂是蓋帝眷王公險設重門一夫當關萬夫逡巡疇有德而當興遂授此凌霄之城闉即在大禹疏鑿八載四乘胼胝經營濬海亦不能假神聖之威靈俾岡巒之頓改維彼五丁其力伊何乃揮巨斧手劈嵯峨挾此移山平險之能若使之束甲而橫戈應無難取秦人之疆域而為蜀氏之山河區區石牛糞金有幾乃以開山勤勞壯士卒啓釁而招亂致隕滅其宗祀是固可為貪得者之炯戒而蜀人之愚諒不至此吁嗟乎財役身賤利令智昏古今同慨豈惟蜀人顧此關隘之危峻兮宜乎人之停驂而回輪奈何來往者之紛紛兮且如雨而如雲倘石牛在於今日兮或不惜遄征而宵奔安可以舉世之通病兮獨誚讓乎蜀人嗚咽泉賦葉映榴綏州夾圁水大理而居文屏山屏其南循山而西為雕山故以雕隂名雕山之巔扶蘇冢在焉時有白虹出冢中去冢不五里有泉曰嗚咽相傳為扶蘇自裁處泉流斷續餘哀怨聲名之嗚咽甚稱己未夏余較士至綏公事畢州守于君吳堡令李君邀余遊徘徊久之感慨係焉于李二君屬余記而賦之余應之曰唯唯憶昌黎有言凡物不得其平則鳴然鳴亦各異其或忠能折檻穎不處囊獨排羣議抗論朝堂其為鳴也激昂其或才人扼腕思婦關情青衫雨淚紅袖吞聲其為鳴也凄清又或權佞嫉才忠良去國憂讒畏譏吟騷賦鵩其為鳴也哀蹙又或俠客愁深孤軍援絶易水悲歌龍沙飲血其為鳴也悲切而兹泉不然如簷之溜如石之瀝無瀑布之可懸無珠簾之可織荷承露而乍傾雨將歇而猶滴水與石濡石為水蝕噫嘻此其所為嗚咽者歟聽之泠泠挹之滎滎若泣者之中哽如歌者之不勝欲鳴不可不鳴不能噫嘻此其所為嗚咽者歟方其初授軍麾含情未絶牽衣請留以止北轍於時可鳴也而不鳴洎乎祖龍已死姦臣矯符真偽未辨上章理誣於義可鳴也而不鳴即謂父不可違從容引決一言而死以殛讒孽於情可鳴也而不鳴而乃聞命銜悲撫劍飲泣引頸自裁流血成碧鬼嘯鵑啼風雲變色寫怨臆於清泉激哀音於白石閲萬古兮千秋恍聞聲而於邑噫嘻此其所為嗚咽者歟乃為之歌曰雕山嶻􅑖州城南岡巒森秀紛煙嵐吁嗟忠孝俱葬此公子扶蘇與蒙恬蒙恬墓道沙飛雪扶蘇塜旁泉嗚咽塜上長虹白亘天峽裏泉聲暗流血泣諌坑儒難悟君一麾北監長城軍沙丘片紙倉卒下掣劍呼天天不聞公子既死李斯裂子嬰誅髙秦亦滅忠魂哀怨瀉鳴湍萬古悲腸猶百結泉流觸石聲淙淙千巖萬壑吹隂風颯如寒雨滴梧葉􅉃如敗壁吟秋蛩碎佩叢鈴共悽切珠凌斷澗自摧折欲哭不哭時吞聲如與三十萬人訣我行聞此摧中腸長歌入雲思激昂棄絶父子蔑忠孝無道未有如始皇嗚呼阿房一炬清渭竭驪山錮泉泉亦泄牧童失火燒其陵惟有此泉流不絶黃金峽賦鄒溶伊銀河之澄景映天漢之靈波托涓涓於嶓􅜗滙渺渺於江沱趨東海而朝宗廣南國而興歌方其滄浪未逺漾水既同噓吸沔丙吐納褒龍姚墟之西壻河之東厥有天險鎖鑰漢中其地則武康雄鎮洋川故州玉符徴瑞珠臺環流控秦楚以扼塞據鄖襄之上遊穆王却西征之轡赤帝紓東顧之憂典午設郡於本末拓跋置邑於巖頭山則脈連秦嶺勢接巴陵行回磅礴霧蔚雲蒸駱谷逶迤子午杳冥萬螺疊翠千髻浮青水則支壑咸容細流罔拒馨椒艷桃柔蒲挺苧灙淺潛深貫規溢矩文川武谷之歸遜水亷泉之聚羡徹底之澄清無纎毫之塵縷夫何山勢促水流湍束斷瀨瀉重灘疑龍門闕竦而斤削恍虎牙傑峙而戟攢詎藉丁開匪緣靈擘嗤共工之頭觸詔應龍以尾畫紺峯嶻嶪而摩霄赭嶂嵳峩而礙日懸崖鬬角而屏列絶岸夾流而壁立漏天光於一線雲起還遮罣瀑布之千尋煙來如織亭午微射曦暉夜分略窺蟾魄雖盛伏而隂寒縱晴明而晦黑怒濤風鼓雷不夏而常鳴駭浪湯翻雪非冬而恆積遊女心悸於葦航交甫魂銷而珮失客星犯斗驚回八月之槎仙令朝天悄度雙飛之舄若乃蟠蘿虯木密箐叢芒藤有鈎吻纓絡竹有篃箭篔簹岩桂嶺松作濟川之舟楫秋蘭春蕙韞幽谷之芬芳靈禽構虛捷獸騰荒羣蜼股接而飲澗孤狒唇翻而嘯岡色分甝虪角别麢麞豹濡霧以澤文麝護臍而憐香獺數月而肝益熊應時而膽藏鳬鷖唼喋雕鶚翺翔浮鸀鳿於沙渚嗅鷩鵫於山梁忘機狎其鷗鳥定偶羡夫鴛鴦鸚鵡吉了應空谷之清響鷓鴣杜宇呌落月而悲傷爾其竒鱗異甲潛錦昭妍揚鬐耀溜掉尾滉淵既乘波而奮翅亦吹浪而飛涎黿晾裙於汭際鯉暴腮於垠前出丙穴而嘉美麗槎頭而肥鮮或順時而偶至或土産之自然復有胚璣孕璜含琛藏璞晶珀斂輝球琳未琢斑瑁元龜百朋雙珏皆希世之竒珍豈凡庸之能索惟是金河之水金水之砂注於碧澗養厥黃芽楊邁浮檀經淘汰而呈彩蔓苔麟趾由披揀而顯華百煉斯精鉎鏐在鎔而成器一經兼教鼎鉉叶吉以傳家故以黃金命名與麗水而同誇豈非嫓雙南之珍重歷千古以休嘉也哉然而天下之險莫之與齊瓦林羊角大小髙低曰籠曰甕獺掯蒿溪二十四灘九十餘里下如隕石上如升梯不辨南北難指東西屈曲駛逸目眩神迷假使淡臺問渡難不遇蛟而投璧縱令摩訶善沒曷敢探珠於睡驪第見馮夷蠲忿而亦威罔象懴嗔而猶勇石尤不惡而自阻封姨雖婉而仍猛天吳震蕩以滔滔陽侯淜湃而洶洶誠可藐灧澦而傲瞿塘易人鮓而輕惶恐也矧夫雲根浸底不測其深石筍滿壑􅚱砑成林似盆傾而盎注如鼎沸而瓴淋觸激回瀾鐵維欲絶盤渦迅漩羽芥都沉漁人生長於煙波過此收綸猶必逡巡而股栗商子往來於湖海抵兹停棹不覺怔忡而戒心吾因思世路嶮巇俯鑒崇園之侈人情翻覆應懲况穴之淫君子奉椿萱之遺體奈何侣蛟龍以相尋故寧居易而白璧慎毋行險於黃金驪山賦康乃心瞻皇洲之漠漠兮經帝里之茫茫唯周秦之故苑兮繄唐漢之封疆何巑岏之綿亘兮橫豐鎬以回翔柏青青其似黛兮石砢砢而如霜俯清渭之東流兮約滻灞其西行固祖龍之夀域兮伊文帝之崇岡應星躔於井鬼兮鎮岐雍於金皇當山河之兩戒兮通雲漢於天章昔驪戎之所據兮實晉獻之攸荒羌烽火之作戲兮俾宗周以喪亡豈層巒之秀麗兮偏遊冶以為臧抑列雍於上國兮或亦都人髙士之所倣徨爾其連峰斷嶺暮雨朝煙層崖疊嶂花馥草芊岑名金斧水出溫泉風鳴林錯鳥語石妍平視長樂之苑逺臨杜曲之川左龍首以還顧右桃塞之當前既可觴而可詠亦宜隱而宜仙將褰裳乎竟日欲䇿杖而流連探遺迹於神母訪疑義於李筌冀握機其可授識木火之真傳極遊目於遐表採靈芝於絶巔何崆洞之浩渺無軒帝之長年已而赤日將微夕陽欲下搔首中天悲生四野感倩艷兮岩阿寄興亡於頌雅歘零淚兮沾衣或浩歌而盈把睇嶺之牛羊愴九變之鐵馬嗟百戰兮為雄不侮鰥而凌寡胡諸孫兮繼起乃莫庇夫廟社既龍飛於興慶復燕啄乎華清醉朝陽之第一或並輦而同行陟朝元之髙閣顧繡嶺而縱橫浴鴛鴦於别殿訂牛女之私盟慨人天之會合時泣下夫長生矧其紅塵一騎驚荔子之飛來緑樹重簷怪雪花之未落縹眇驪宫兮遙聞仙樂蒼茫豐市兮近見行人悵曲江其已去開偃月之方新固將經時經嵗以夕以朝宴瑶池而永好逢羣玉以久要妃子海棠歡齊乎金母三郎玉笛夀比夫王喬孰知恩波方承乎太液戎馬忽動於燕山催花羯鼓淵淵坎坎兮撻開劒閣霓裳羽衣翩翩裊裊兮舞破潼關天半峨眉鳳輦之匆匆方下雲中紫閣鸞車之􅎪􅎪不還霜殿紅妝兮長辭金鏡馬嵬青草兮遂葬玉環慘石甕於殘陽咽湯泉之半灣野草凄迷以長緑宫花寂寞而無顔遡開寶之理亂知帝位之維艱茍慎終其如始奚難辨乎忠姦豈兹山兮亡國實不戒夫冥頑徒叩頭兮泣諌空流恨以潺湲步林椒兮太息每惆悵夫雲鬟聊上下兮千古託規諷於行間亂曰於戲哉雄連兩華壯坤輿兮秀接終南麗黃居兮吐納風雲元始墟兮祈靈太乙授鴻書兮烽臺繡嶺禾黍餘兮周道唐宫怨樵漁兮億萬斯年御世膺圖夕陽流水顧此嵯峨尚取鑑於古初兮陜西通志卷八十九
