body:
  text: 陜西通志巻十山川三延安府鳯翔府延安府膚施縣鳯凰山在府西城跨其上雉堞巍然為郡山首上有鎮西樓宋范仲淹建殘碑猶存今重修府志雲梯山一名雲夢山在府北闗一名雲夢山文廟在焉又筆架山在府學東又文廟西北有碧簮山府志山形如簮髙數百丈雍勝略草場山在縣西南百五十步山脊入城中與府治相連雍大記太和山一名清凉山在縣城東北七十步其巔最髙一峰曰蓮花峰上有尸毘巖又萬佛洞内有石佛萬餘潜確類書佛書言昔尸毘王割身肉飼鷹後人言膚施即此地按漢書膚施乃秦縣其時未有佛書此傅㑹之説也雍勝略又有仙石洞落星巖文岡爛骨泉相傳為樵子觀仙棋爛骨處府志清凉山阿多名人題咏石刻參差磊落里人呼為詩灣邑令翟善愛其名勒石志之華岳集仙石洞下有撒珠坡萬佛洞下有挿金崖縣冊五龍山在城東一里縣圖膚施倚有五龍山金史地理志山下有黑龍泉府志嘉嶺山在縣東南百八十步南河之濵形勢髙峻上有古塔縣冊范仲淹大書嘉嶺山三字刻於石潜確類書熙寧十年帥延因時遊觀南上嘉嶺北上九州臺西北獵於伏虎龍頭山東閲武於武家坪皆極髙深之致宋吕惠卿築四堡記山有先憂後樂宋朝人物第一胸中自有數萬甲兵泰山北斗出將入相一韓一范各大字山頂古塔九級唐建洪鐘一口金造府志三臺山在縣南一里縣冊有大通寺山下有龍耳泉府志伏龍山一名虎頭山在城北五里一名虎頭山府志膚施倚有伏龍山金史地理志上郡之名山郡國志伏龍山在膚施狀如卧龍故名潜確類書牡丹山在縣西南四十里許名山記牡丹山在膚施名曰花園頭産牡丹極多樵者以之為薪潜確類書相傳杜甫避亂時遊此賈志卧虎山在府南十里以形似名府志亞支山一名野猪峽在府南四十里又名野猪峽府志險窄可避兵南接甘泉界縣冊琉璃山在縣東北八十里縣冊在豐林縣北九十五里元和志縣豐林故城在東附考膚施縣有豐林山隋書地理志膚施縣有牢山隋書地理志按二山俱無考清水即區水一名去斤水一名濯筋水在縣城東北自安塞縣南流入縣界又東入延長界縣圖清水又東得龍尾水口又東會三湖水水出南山三湖谷東北流入清水清水又東逕髙奴縣合豐林水地理志謂之洧水故言髙奴有洧水肥可㸐水上有肥可接取用之豐林川長津瀉注北流㑹洧洧水又有谿谷水注之水西出奚川東南流入洧水水經注縣髙奴故城在北膚施縣清水鮮卑謂之去斤水斤一作筋北自金明縣界流入元和志屬金明縣今安塞濯筋水在縣北二十九里又流入豐林縣界耆老云昔尸毘王割身救鴿身肉並盡於此水中濯其筋骨因名寰宇記膚施縣有濯筋水金志謂之濯巾水九域志延水在府城東門外源出安塞縣蘆闗嶺東南流入府境俗稱濯筋水明一統志自入境至虎頭峁合西小河水又逕縣東合杏子河水東流至延長界計行二百八十里縣冊杏按西小河即安塞之小平川水又按此子河别是一水非保安之杏子河也金明川一名西小河在縣西北五里俗名西小河自安塞縣流來入延水縣冊定㾜泉水㾜一作甲在縣東一里百二十步萬佛寺北山半崖其泉温潔流入延水雍勝畧以尸毘王割膚療之故名府志南河水一名杏子河在城南門外源自甘泉野猪峽北流至城東入延水賈志一名杏子河自亞支山流至郡城嘉嶺山下凡四十五里入延水府志小河在縣南七里源出牡丹山東南流四十里入杏子河一名牡丹川又名杜甫川以子美常居此故名縣冊栁湖水在城南門外昔多種栁其上故名賈志種栁穿湖後延安盛可遊宋范仲淹詩水按南河栁湖疑即古三湖然無可考牧龍川一名龍泉在縣東北五龍山下泉池葢飲馬所也府志龍泉在土軍城東南道左山下牧馬川多産名駒水經注龍泉在延州牧龍川多産駿馬九域志五龍泉出山東一里平石縫雄吼甘美上有五龍堂寰宇記城東兩山相夾處俗稱黑龍溝是谷幽處城市中蒼蒼㝠窅近之摸斷碣披蟲刻有雲根雨脈四字趙廷錫黑龍祠序烏耶谷水在縣東縣冊源出烏耶谷流入濯筋水府志清化水一名潘陵川在縣東四十里源出嘉泉東流入濯筋河賈志嘉泉在豐林廢縣東北耆老云水湧出飛流一丈噴激可嘉府志谿一云此即谷水自安定縣流入即潘陵川縣冊恵民泉在縣南門瓮城内府志暖泉井在府西北五十里泉有七孔其味甘美大寒衆泉皆凍惟此流溢不減雍勝畧石油泉在府南二十五里府志髙奴縣石脂水水膩浮上如漆採膏車及燃燈極明酉陽雜俎不流泉在府東十里汲之不竭亦不流府志鷲峰泉在城東北清凉山下泉脈出崖石中清冽可飲寺僧於懸崖置轆轤垂繩八十餘尺汲之雍勝略安塞縣天澤山在縣治東五十歩其山土石相間上有天澤泉四時不竭雍大略嶙峋挺峙逺瞰清流山上有翟王泉董翳所鑿又有恵民井在山之㘭處縣志俱按二泉今堙金龍山在縣南門外又名龍吟山與天澤山相連有石刻金明砦三字府志鳯凰山一名北邙山在縣西南二里縣圖形若舞鳯又名北邙山縣志龍安山在縣西一里髙數百丈狀如盤龍舊建龍安砦雍大記靈臺山靈一作雲又名石嘴山又名石峰山在縣北五里俗呼石嘴山巨石髙險勢如削成府志一名石峰山一峰孤峙二水環流上建靈臺觀祠真武頗多遊咏縣志青山在縣北七里縣冊幽谷清窈石磴盤紆中多洞穴為邑人避跡之所縣志蘆闗嶺在縣北百五十里接靖邊界延水所出府志椒蒿山在縣西北百餘里時有雲氣掘地多蝮蛇縣志獅子山在縣西二十里以形似名上有報恩寺雍勝畧鳯頭山在縣西五十里其相近有白晝山縣志摩雲山在縣西六十里近西川府志巉巗髙聳直逼雲霄縣志石門山在縣西南百二十里兩山壁立如門洛