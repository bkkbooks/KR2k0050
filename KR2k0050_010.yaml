志塔兒峽在州東南四十里旁有石洞數丈可容百餘人青山環峙一水七折方出峽口有三股水合流注下絶為神異州志西秦山在州東南百里州圖在隴安舊縣北二十里雍大記其上有秦王試劔崖府志寒居洞在州東南百二十里縣頭鎮北山下嵩陽居士有記府志龍盤山即盤龍山在州東南百二十七里州圖南由縣有盤龍山隋書地理志龍盤山在吳山舊縣東南七里山勢盤曲如龍故名州志相公山在州東三十里相傳有後漢右丞相墓姓氏莫考州志峰臺山在州東四十里上有數峰雄峙州志水峪在州東北四里值雨暴水溢時衝嚙州城為患州志附考唐太宗貞觀四年幸隴州校獵於貴全谷册龜元按此谷無考全一作泉渭水在州南百四十里自秦州清水縣入州境又東入寶雞界禹貢錐指渭水東南出石門度小隴山徑南由縣南東與楚水合又東入散關水經注寶散關今屬雞渭水在南由縣南四十里元和志渭河在隴安縣西南四十五里寰宇記考詳見圖長蛇水即楚水在州西南州圖數歷之山楚水出焉而南流注於渭山海經楚水世所謂長蛇水水出汧縣之數歷山南流徑長蛇戍東又南流注於渭闞駰以是水為汧水水經注魏按數歷山今無考長蛇戍即長蛇縣在州束南長蛇川在南由縣西百步元和志在吳山舊縣境內其流委曲如蛇後魏以此名縣州志金陵河在州東南四十里南村鎮西又東南流入寶雞界州册汧水一名魚龍川在州城南又東流入汧陽界州圖周孝王使嬴非子養馬於汧渭之間秦本記汧縣汧水出西北入渭漢書地理志汧水出岍山郡國志源出汧源縣西南岍山東入渭括地志汧水出汧縣之蒲谷鄉弦中谷爾雅曰水決之澤為汧汧之為名實兼斯舉水有二源一水出縣西小隴山其水東北流歷澗注以成淵潭漲不測出五色魚俗以為靈莫敢採捕因謂是水為魚龍水自下亦通謂之魚龍川川水東徑汧縣故城北又東歷澤亂為一右合龍泉又東會一水自水會上下咸謂之魚龍川又東南徑隃糜縣水經注汧隃糜縣今屬陽汧源縣有汧水隋書地理志隴州路七十餘里有洞中有石或大或小隨水流出破之中皆有魚龍形過者並不敢語語者便聞風雷之聲録異記汧河源出岍山東流會北河東南入汧陽界濵水之地自州西至汧陽寶雞幾二百里謂之汧川雖隆冬蔬草長青如春又魚龍川源出小隴山東北流杜甫詩水落魚龍夜即此州志關山河在州西八十里源出關山東北流合於汧州圖白環谷水在州西水流如環故名州志吳山縣有白環水九域志汧源縣有白環水金史地理志蒲峪水在州西二十里州册雍州其澤藪曰弦蒲周禮職方氏弦蒲在汧鄭司農云弦蒲或為汧浦周禮注九藪秦有楊陓爾雅楊陓在汧郭璞注汧水出蒲谷鄉弦中谷決為弦蒲藪水經注汧源縣有弦蒲藪九域志弦蒲藪在州西四十里明一統志蒲按楊陓即弦蒲而今州西四十里尚有峪寨則其為古之蒲谷鄉無疑也北河在州城北其流最細會溫泉水南入汧又溫泉水在州西北十五里隆冬不氷一名湯池州志金泉水一名白龍泉在州南四十里府志汧水右合龍泉泉徑五尺源流奮通淪漪四泄東北流注于汧水經注金泉一名白龍泉明一統志金泉在州東南梨林川水出如注汚之即涸俗傳昔人得金鞭于此其水東北注于汧州志八渡河俗名一水河在州東南州圖汧水又東會一水發南山西側山下石穴廣四尺髙七尺水溢石穴懸波側注發源成川北流注於汧水經注一水河發源望輦峰左旋繞廟前東北流入汧水又神岔溝在閬苑西三里許一通五峰山壑一通一水河源即宋吳玠敗烏珠處州志發按水經注云汧水有二源一水出縣西山一水南山西側則二源皆汧水也本文甚明自昔人誤謂一水為水名而不察汧有二源之語遂呼之為一水河且沿襲而筆之於志其謬甚矣今特為正之汭水在州西北又東北流入華亭縣界州圖理按漢書地志云汭水出汧縣西北東入涇又水經注云芮水出小隴山朱子詩傳云芮水出吳山西北東入涇蔡氏書傳云汭水出弦蒲藪西北今考隴州之水凡出吳山及弦蒲者或合於汧或入於渭而並無入涇之水漢志諸書所云殊不可解惟郡縣志云涇州良原縣有芮水一名宜祿川西自隴州華亭縣流入今在長武縣入涇者是也此正與詩所云芮鞫之即者合故寧據經為斷而不敢因傳以疑經存其説以俟考可也又見長武縣丹泉在州北二里谷神觀東雍勝略神泉在州西十五里平地湧出州志涼泉在州西南十五里涼甫里四時皆涼州志蓮花泉在州南四十里南村鎮東其水不竭州志陜西通志卷十
