body:
  text: 陜西通志卷六十三人物九儒林漢田何字子莊齊人自孔子授易五傳至何漢興田何以齊諸田徙杜陵號曰杜田生以易授弟子東武王同子仲洛陽周王孫丁寬齊服生等皆顯當世惠帝時何年老家貧守道不仕帝親幸其廬以受業終為易者宗髙士傳施讐字長卿沛人從田王孫受易後徙長陵田王孫為博士復從卒業與孟喜梁丘賀並為門人及梁丘賀為少府事多乃遣子臨分將門人張禹等從讐問於是賀薦讐結髮事師數十年賀不能及詔拜為博士甘露中與五經諸儒雜論同異於石渠閣漢書本傳惠莊長安儒生聞朱雲折五鹿充宗之角乃歎息曰栗犢反能爾耶吾終恥溺死溝中裹糧從雲雲與言莊不能對逡巡而去拊心謂人曰吾口不能劇談而此中多有西京雜記韋賢字長孺魯國鄒人為人質朴篤志於學兼通禮尚書以詩教授號稱大儒徵為博士給事中進授昭帝詩遷光祿大夫詹事至大鴻臚宣帝即位以先帝師甚見尊重本始三年代蔡義為丞相封扶陽侯為相五嵗以老病乞骸骨賜黃金百斤加賜第一區丞相致仕自賢始薨諡曰節侯少子玄成字少翁少好學修父業以眀經擢諫大夫遷大河都尉初玄成兄𢎞為太常丞職奉宗廟典諸陵邑煩劇多罪過及賢病篤𢎞竟坐宗廟事繫獄室家問賢當為後者賢恚恨不肯言門下生與宗家計議矯賢令以玄成為後玄成知非賢雅意即陽病狂徵至長安當襲爵以病狂不應召丞相御史以玄成實不病劾奏之詔勿劾引拜玄成不得已受爵宣帝髙其節以為河南太守初帝寵淮陽憲王欲以為嗣久之欲感風憲王輔以禮讓之臣召拜玄成為淮陽中尉詔與蕭望之及五經諸儒雜論同異於石渠閣條奏其對永光中代于定國為丞相七年守正持重不及父賢而文采過之建昭三年薨諡曰共侯初賢以昭帝時徙平陵玄成别徙杜陵病且死乞骸骨歸葬父墓上許焉漢書本傳韋賢治詩事博士大江公及許生又治禮傳子玄成玄成及兄子賞以詩授哀帝至大司馬車騎將軍由是魯詩有韋氏學漢書儒林傳張山拊字長賔平陵人事小夏侯建為博士論石渠至少府授同縣李尋鄭寬中少君山陽張無故子儒信都秦恭延君陳留假倉子驕由是小夏侯有鄭張秦假李氏之學漢書本傳鄭寬中平陵人有雋才以博士授太子成帝即位賜爵關內侯食邑八百户遷光祿大夫領尚書事會疾卒谷永上疏曰鄭寬中有顏子之美質包商偃之文學總五經之妙論立師傅之顯位卒然早終宜加葬禮賜之令諡上弔賜甚厚漢書本傳侯按漢書載張山拊師事夏建授同縣李尋鄭寬中尋之學術源流似與寬中相等及考尋本傳言尋治尚書與寬中同師寬中守師法教授尋獨好洪範災異雖其説王鳯以進賢臣諫哀帝以逺外戚議論不無可採但洪水為災之説不應於前而一聞夏賀良等改元易號增益漏刻之邪言更附和于後卒以左道亂政流徙燉煌身敗名裂班史不列之儒林傳中自有深意今附識於此不欲假托經術者與儒林諸賢同傳也士孫張字仲方平陵人受易於五鹿充宗為博士官至給事中家世傳業册府元龜郭威字文偉茂陵人好讀書以謂爾雅周公所制而爾雅有張仲孝友張仲宣王時人非周公之制明矣嘗以問揚子雲子雲曰孔子門徒遊夏之儔所記以解釋六藝者也家君以為外戚傳稱史佚教其子以爾雅爾雅小學也又記言孔子教魯哀公學爾雅爾雅之出逺矣舊傳學者皆云周公所記也張仲孝友之類後人所足耳西京雜記蘇竟字伯況平陵人平帝時以明易為博士講書祭酒善圖緯能通百家之言王莽時拜代郡中尉時丐奴擾亂北邊竟終完輯一郡光武即位就拜代郡太守建武五年詣京師拜侍中以病免初延岑護軍鄧仲況擁兵據南陽陰縣為寇劉歆兄子龔為其謀主竟時在南陽與龔書曉之仲況與龔遂降龔字孟公長安人善議論扶風馬援班彪並器重之竟終不伐其功潛樂道術作記誨篇及文章傳於世年七十卒後漢書本傳許商長安人善為算著五行論歷四至九卿號其門人沛唐林子髙為德行平陵吳章偉君為言語重泉王吉少音為政事齊炔欽幼卿為文學王莽時林吉為九卿自表上師家大夫博士郎吏為許氏學者各從門人會車數百兩儒者榮之欽章皆為博士徒衆尤盛漢書儒林傳杜林字伯山茂陵人博洽多聞時稱通儒初為吏王莽敗盜起林與弟成俱客河西隗囂素聞林志節深相敬待以為侍書林雖拘於囂而終不屈節弟成物故囂聽林持喪東歸既遣而悔追令刺客楊賢於隴坻遮殺之賢見林身推鹿車載致弟喪賢乃歎曰我雖小人何忍殺義士因亡去光武徵拜侍御史引見問以經書故舊及西州事甚恱之京師大夫咸推其博洽為光祿勳內奉宿衛外總三署周密敬愼選舉稱平羣臣上言宜增科禁詔下公卿林奏曰人情挫辱則義節之風損法防煩多則茍免之行興臣愚以為宜如舊制帝從之頃之代朱浮為大司空博雅多通稱為任職相明年薨帝親自送葬除子喬為郎後漢書本傳林從張竦受學於西州得漆書古文尚書常寶愛之衛宏徐巡皆受林學出示宏曰林流離兵亂常恐此經將絶何意衛子徐生復能傳之古文雖不合時務然禮失求之野古文不猶愈於野乎願諸生無悔所學古文遂傳於世東觀記賈逵字景伯平陵人父徽從劉歆受左氏春秋兼習國語周官又受古文尚書於塗惲學毛詩於謝曼卿作左氏條例逵傳父業弱冠能誦左氏傳兼通五家榖梁之説自為兒童常在太學不通人間事身長八尺二寸諸儒為之語曰問事不休賈長頭性愷悌多智思倜儻有大節尤眀左氏傳國語為之解詁上疏獻之顯宗重其書寫藏祕館時有神雀集宫殿官府帝召逵問之對曰昔武王終父之業鸑鷟在岐宣帝威懷戎狄神雀仍集此胡降之徵也帝勑蘭臺給筆札使作神雀頌拜為郎肅宗立降意儒術好古文尚書左氏傳召逵入講帝善其説使發出左氏傳大義長於二傳者逵條奏曰左氏義深於君父公羊多任於權變帝嘉之令逵自選公羊嚴顏諸生髙才者教以左氏和帝即位以逵為侍中領騎都尉內備幃幄兼領祕書近署甚見信用逵所著經傳義詁及論難百餘萬言學者宗之後世稱為通儒後漢書本傳李育字元春扶風漆人少習公羊春秋沈思專精博覽書傳知名大學深為同郡班固所重固薦育於東平王蒼由是京師貴戚爭往交之州郡請召育到輒辭病去常避地教授門徒數百涉獵古學嘗讀左氏傳謂不得聖人深意作難左氏義四十一事建初元年衛尉馬廖舉育方正為議郎後拜博士四年詔與諸儒論五經於白虎觀育以公羊義難賈逵往返皆有理證最為通儒再遷尚書令及馬氏廢育坐為所舉免歸嵗餘復徵再遷侍中卒於官後漢書本傳京兆祭酒晉馮結髮修身白首無違好古樂道元默自守古人美行時俗莫及扶風掾李育經明行著教授百人客居杜陵茅室土階京兆扶風二郡更請徒以家貧數辭病去雖前世名儒韋平孔翟無以加焉京兆督郵郭基孝行著於州里經學稱於師門政務之績有絶異之效班蘭臺集楊政字子行京兆人少從范升受梁丘易善説經書京師語曰説經鏗鏗楊子行教授數百人范升嘗為出婦所告坐繫獄政乃肉袒以箭貫耳抱升子潛伏道旁候車駕持章叩頭曰范升一子今適三嵗孤孑可哀武騎虎賁舉弓射之不肯去旄頭又以戟義政傷胸猶不退泣請感帝詔出升政由是顯名為人不拘小節果敢自矜然篤於義時帝壻梁松皇后弟隂就皆請與交友政每言論切磋懇至不為屈撓建初中官至左中郎將後漢書本傳魯丕字叔陵恭弟平陵人性沈深好學兼通五經以魯詩尚書教授為當世名儒建初元年舉賢良方正除議郎遷新野令期年州課第一擢拜青州刺史元和元年拜趙相門生就學者常百餘人關東號曰五經復興魯叔陵永元二年遷東郡太守丕在二郡為人修通灌溉百姓殷富數薦達幽隱名士明年拜陳留太守十三年遷侍中免永初二年詔公卿舉儒術篤學者大將軍鄧隲舉丕復為侍中左中郎將再為三老七十五卒於官後漢書本傳摰恂字季直伯陵之十二世孫也明禮易遂治五經博通百家之言又善屬文詞論清美扶風馬融沛國桓驎等自逺方至者十餘人既通古今而性復溫敏不耻下問故學者宗之隱於南山之陰永和中博求名儒公卿薦恂行侔顏閔學擬仲舒文參長卿才同賈誼由是公車徵之不詣大將軍竇武舉賢良不就清名顯於世以壽終高士傳宋登字叔陽長安人父由為太尉登少傳歐陽尚書教授數千人為汝隂令政為明能號稱神父遷趙相入為尚書僕射順帝以登明識禮樂使持節臨太學奏定典律轉拜侍中數上封事抑退權臣由是出為潁川太守市無二價道不拾遺病免卒於家汝陰人配社祠之後漢書本傳三國吉茂字叔暢馮翊池陽人世為著姓好書不耻惡衣惡食而耻一物之不知建安初關中始平茂與扶風蘇則共入武功南山隱處精思數嵗州舉茂才除臨汾令居官清靜吏民不忍欺之轉為武德侯庶子後又為武陵太守不之官轉酇相以國省拜議郎黃初中病亡茂修行從少至長冬則被裘夏則短褐行則步涉食則茨藿臣役妻子室如懸磬其或饋遺一不肯受雖不以此髙人亦心疾不義而富且貴者三國志常林傳注董遇字季直性質訥而好學興平中關中擾亂與兄季中依將軍段煨采梠負販而常挾持經書投間習讀其兄笑之而遇不改建安初王綱小設郡舉孝廉稍遷黃門侍郎旦夕侍講為天子所愛信轉為冗散常侍黃初中出為郡守明帝時入為侍中大司農數年病亡初遇善治老子又善左氏傳更為作朱墨别異人有從學者遇不皆教而云讀書百遍而義自見從學者言苦無日遇言當以三餘或問三餘之意遇言冬者嵗之餘夜者日之餘陰雨者時之餘由是諸生少從遇學無傳其朱墨者魏略遇子綏位至祕書監亦有才學世語隗禧字子牙京兆人世單家少好學初平中客荆州擔負經書每以採梠餘日則誦習之太祖定荆州詔署軍謀掾黃初中為譙王郎中王宿聞其儒者虛心從學禧亦敬恭以授王由是大得遺賜以病還拜為郎中年八十餘以老處家就學者甚多禧既明經又善星官常仰觀天文歎息謂魚豢曰天下兵戈尚有未息如之何豢又嘗問左氏傳禧答曰欲知幽微莫若易人倫之紀莫若禮多識山川草木之名莫若詩左氏直相斫書耳不足精意也豢因從問詩禧説齊韓魯毛四家義不復執文有如諷誦又撰作諸經解數十萬言未及繕寫而得聾後病亡三國志王肅傳注晉董景道字文博𢎞農人少而好學千里追師所在惟晝夜讀誦略不與人交通明春秋三傳京氏易馬氏尚書韓詩皆精究大義三禮之義專遵鄭氏著禮通論非駁諸儒演廣鄭旨永平中知天下將亂隱於商洛山衣木葉食樹果彈琴歌笑以自娛毒蟲猛獸皆繞其傍劉元海及聰屢徵皆礙而不達至劉曜時出山廬於渭汭曜徵為太子少傅散騎常侍並固辭竟以壽終晉書本傳士按晉世崇尚虛無廢弛名教故通經學古之寥寥無幾其載在儒林者有京兆韋謏字憲道雅好儒學善著述綜羣言祕要嘗著伏林三千餘言演淹典林二十三篇凡所作述皆深博有才義但考其本傳始仕劉曜又仕石勒後又仕冉閔靦顏貪爵歷仕三姓而又不能容默自保卒殺身於凶暴之手生平事迹一無足取所謂名儒而行非者兹不敢徇舊濫入使真儒與偽儒同傳也北魏梁祚北地泥陽人父邵為濟陽太守祚篤志好學歷治諸經尤善公羊春秋鄭氏易常以教授有儒者風與幽州别駕平恆有舊僑居於薊積十餘年雖羈旅窮窘而著述不倦辟祕書中散稍遷祕書令後出為統萬司馬徵為散令撰並陳壽三國志名曰國統又作代都賦頗行於世清貧守素不交勢貴年八十七卒子元有父風少子重相州鎮北府參軍事魏書本傳徐遵明字子判華陰人幼孤好學隨鄉人毛靈和詣山東求學至上黨乃師屯留王聰受毛詩尚書禮記一年便辭聰詣燕趙師事張吾貴服膺數月乃私謂其友人曰張生名髙而義無檢格凡所講説不愜吾心遂與平原田猛略就范陽孫買德受業一年復欲去之猛略謂遵明曰君年少從師每不終業如此用意終恐無成遵明曰吾今始知真師所在猛略曰何在遵明指心曰在此乃詣平原唐遷納之居於蠶舍讀孝經論語毛詩尚書三禮不出門院時彈箏吹笛以自娛又知館陶趙世業家有服氏春秋乃往讀之因撰春秋章義為三十卷是後教授門徒每臨講坐必持經執疏然後敷陳海內莫不宗仰永安二年為亂兵所害魏書本傳唐顏師古字籕其先臨沂人祖之推自髙齊入周終隋黃門郎遂居關中為萬年人父思魯以儒學顯武德初為秦王府記室參軍師古少博覽精故訓學仁壽中李綱薦之授安養尉髙祖入關授朝散大夫纍遷中書舍人專典機密詔令一出其手太宗即位拜中書侍郎封琅琊縣男帝嘗歎五經傳習寖訛詔師古於祕書省考定多所釐正因頒所定書於天下學者賴之俄拜祕書少監専刋正事古篇竒字世所惑者討析申熟必暢本原與撰五禮成進爵為子又為太子承乾注漢書遷祕書監𢎞文館學士從征遼道病卒諡曰戴師古弟相時字睿亦以學聞貞觀中纍遷諌議大夫有爭臣風轉禮部侍郎師古死不勝哀而卒師古叔遊秦武德初纍遷廉州刺史時劉黑闥初平人多強暴遊秦至禮讓大行終鄆州刺史撰漢書決疑師古多資取其義唐書本傳蕭德言字文行系出蘭陵陳亡徙關中貞觀時歷著作郎𢎞文館學士太宗欲知前世得失詔魏徵虞世南褚亮及德言裒次經史百氏帝王所以興衰者上之帝愛其書曰使我稽古臨事而不惑者公等力也賚賜尤渥德言晚節學愈苦開經輒祓濯束帶危坐妻子諫曰老人何終日自苦答曰對先聖之言何復憚勞詔以經授晉王王為太子又兼侍讀請致仕不許進祕書少監久乃得謝髙宗立遣通事舍人即家致問乘輿至肅章門引見禮遇隆重卒諡曰博唐書本傳韋叔夏安石兄通禮家學叔父太子詹事琨嘗曰爾能繼漢丞相業矣擢明經第歷太常博士髙宗崩恤禮亡缺叔夏與中書舍人賈大隱博士裴守真撰定其制擢春官員外郎武后拜洛享明堂凡所沿改皆叔夏等裁討每立一議衆咨服之纍遷成均司業后又詔五禮儀物司禮博士有所修革須叔夏等評處然後以聞進位春官侍郎中宗復位轉太常少卿為建立廟社使進銀青光祿大夫纍封沛郡公卒諡曰文子縚開元時歷集賢修撰遷太常初帝詔嵗率公卿迎氣東郊至三時常以孟月讀時令於正寢二十六年詔縚奏月令一篇朔日於宣政側設榻東向置案縚坐讀之諸司官長悉升殿坐聽髙宗上元三年將祫享議者以禮緯三年祫五年禘公羊家五年再殷祭二家舛互諸儒莫能決太學博士史玄璨議禘後三年而祫又二年而禘議遂定後至開元二十七年禘祭五祫祭七縚奏四月已禘孟冬又祫祀禮叢數請以夏禘為大祭之源自是相循五年再祭後終太子少師唐書本傳啖助字叔佐趙州人後徙關中淹該經術天寶末調臨海尉丹陽主簿善為春秋考三家短長縫綻漏闕號集傳復攝其綱條為例統門人趙匡陸質其髙弟也助卒質與其子異録助所為春秋集注總例請匡損益質纂會之號纂例唐書本傳韋彤京兆人名治禮德宗時為太常博士先是天寶中詔尚食朔望進食太廟天子使中人侍祠有司不與也貞元十二年帝詔朔望食畀宗正太常合供彤與裴堪議曰禮宗廟朔望不祭寢園則有之王者弗敢以孝思之極而溢禮弗敢以肴品之多而賸味願罷天寶所增奉寢園以珍奉宗廟以禮帝曰是禮先帝所定今遽更之其謂朕何卒不廢唐書本傳韋公肅隋觀城公約七世孫萬年人元和初為太常博士兼修撰憲宗耕籍詔公肅草具儀典太子太傅判太常卿事鄭餘慶言廟有二祖妣疑於祔祭請諸有司公肅議古諸侯一娶九女故廟無二嫡自秦以來有再娶前娶後繼皆嫡也兩祔無嫌諸儒不能異初睿宗祥月太常奏朔望弛朝尚食進蔬具止樂後遂為常公肅上言禮忌日不樂而無忌月王者不以私懷踰禮故禫禮徙月樂漸去其情也不容追逺而立禮反重今大常雖郊廟樂且停習是謂反重以慢神也有司禁中外作樂是無故而徹也願依經誼裁正其違詔禮官學官議咸曰宜如公肅所請制可以壽卒唐書本傳韋表微字子明萬年人羈丱能屬文擢進士第為翰林學士時李紳忤宰相貶端州龎嚴蔣防皆謫去學士缺人爭薦丞相所善者表微獨薦韋處厚人服其公進知制誥後與處厚議增選學士復薦路隋處厚以諸父事表微因曰隋位崇入且翁右奈何答曰選德進賢初不計私也文宗立進户部侍郎开志沼叛詔李聽率師討之天子憂無成功表微曰以聽軍勢不十五日必破賊及捷書上止浹日以病痼罷學士卒始被病醫藥不能具所居堂寢隘陋既沒弔客咨嗟篤故舊雖庸下與擕手語笑無間尤好春秋病諸儒是非紛然著三傳總例完會經趣又以學者薄師道不如聲樂賤工能尊其師著九經師授譜唐書本傳柳璞字韜玉華原人學不營仕著春秋三氏異同義又述天祚長厯斷自漢武帝紀元為編年以大政大祥異侵叛戰伐隨著之閏位者附見其左常謂杜征南春秋後序述紀里厯為得實自餘史家皆差蔣係以為然終著作郎唐書本傳宋張載字子厚長安人少喜談兵至欲結客取洮西之地年二十一以書謁范仲淹一見知其逺器乃警之曰儒者自有名教可樂何事於兵因勸讀中庸載讀其書猶以為未足又訪諸釋老纍年究極其説知無所得反而求之六經嘗坐虎皮講易京師聽從者甚衆一夕二程至與論易次日語人曰比見二程深明易道吾所弗及汝輩可師之撤坐輟講與二程語道學之要渙然自信曰吾道自足何事旁求於是盡棄異學淳如也舉進士為祁州司法參軍雲嚴令政事以敦本善俗為先每月吉具酒食召鄉人髙年會縣庭親為勸酬使人知養老事長之義因問民疾苦及告所以訓戒子弟之意熙寧初御史中丞吕公著言其有古學神宗方一新百度思得才哲士謀之召見問治道對曰為政不法三代者終茍道也帝悅以為崇文院校書他日見王安石安石問以新政載曰公與人為善則人以善歸公如教玉人琢玉則宜有不受命者矣明州苗振獄起往治之還朝即移疾屏居南山下終日危坐一室左右簡編俯而讀仰而思有得則識之或中夜起坐取燭以書其志道精思未始須臾息敝衣蔬食與諸生講學每告以知禮成性變化氣質之道學必如聖人而後已以為知人而不知天求為賢人而不求為聖人此秦漢以來學者大蔽也故其學尊禮貴德樂天安命以易為宗以中庸為體以孔孟為法黜怪妄辨鬼神其家昏喪葬祭率用先王之意而傅以今禮又論定井田宅里發斂學校之法皆欲條理成書使可舉而措諸事業會秦鳯帥吕大防薦其學善發明聖人之遺旨其政略可措以復古宜還其舊職以備咨訪乃詔同知太常禮院與有司議禮不合復以疾歸中道疾甚沐浴更衣而寢旦而卒貧無以斂門人共買棺奉其喪還翰林學士許將等言其恬於進取乞加贈恤詔賜館職半賻載學古力行為關中士人宗師世稱為橫渠先生淳祐元年封郿伯崇祀孔子廟廷弟戩字天祺起進士知金堂縣養老恤窮召父老使督教子弟民有小善皆籍紀之月吉召老者飲勞使其子孫侍勸以孝弟民化其德所至訟獄日少熙寧初為監察御史纍章論王安石亂法乞罷條例司及追還常平使者劾曾公亮陳升之趙抃依違不能救正韓絳左右徇縱與為死黨李定以邪諂竊臺諫且安石擅國輔以絳之詭隨臺臣又用定輩繼續而來芽蘖漸盛吕惠卿刻薄辨給假經術以文姦言豈宜勸講君側書數十上又詣中書爭之安石舉扇掩面而笑戩曰戩之狂直宜為公笑天下笑公者不少矣趙抃從旁解之戩曰公亦不得為無罪抃有愧色遂稱病待罪出知公安縣徙監司竹監至舉家不食笋常愛用一卒其卒盜笋籜治之無少貸罪已正待之復如初略不介意其德量如此卒於官宋史本傳吕大鈞字和叔大防弟藍田人中乙科調秦州司理參軍改知三原縣請代父蕡入蜀移巴西縣蕡致仕大鈞亦移疾不行丁外艱家居講道數年起為諸王宫教授改宣義郎會伐西夏鄜延轉運使檄為從事既出塞轉運使李稷餽餉不繼欲還安定取糧使大鈞請於种諤諤曰吾受命將兵安知糧道萬一不繼召稷來與一劒耳大鈞性剛直曰朝廷出師去塞未逺遂斬轉運使無君父乎諤意折始許稷還未幾道得疾卒年五十二大鈞從張載學能守其師説而踐履之居父喪衰麻葬祭一本於禮後乃行於冠昏膳飲慶弔之間節文燦然可觀關中化之尤喜講明井田兵制謂治道必自此始悉撰次為圖籍可見於用雖皆本於載能自信力行載每歎其勇為不可及弟大臨字與叔學於程頤與謝良佐遊酢楊時在程門號四先生通六經尢邃於禮每欲掇習三代遺文舊制令可行不為空言以拂世駭俗元祐中為大學博士遷祕書省正字范祖禹薦其好學修身如古人可備勸學未及用而卒宋史本傳蘇昞字季明武功人素性純茂強學篤志從張載學最久後見二程復師事以卒其業元祐末吕大忠以布衣薦為太常博士坐元符中上書言事入邪籍編管饒州卒宋史𢎞簡録侯仲良字師聖華隂人二程舅氏無可之孫從二程遊人有欲館之者仲良造焉則壁垂佛像几積佛書其家人又常齋素仲良遂行嘗訪周濂溪濂溪留之對榻夜談越三日乃還自謂有得如見天之廣大伊川驚異其不凡曰非從濂溪來耶後遊荆州胡文定留與為鄰終焉朱文公稱其學清白徑直關學編郭緒字天錫蒲城人幼而岐嶷讀書如素習晚調上杭簿留意邵雍象數之學兼取揚雄所據列山易以章會統元推之久而成書名易春秋為二十卷隆興紀元以其書上方議推恩而卒萬姓統譜金楊天德字君美髙陵人肄業太學登進士第釋褐補聊城丞纍遷轉運司度支判官京城不守流寓宋魯間十年而歸自讀書至晚嵗風節矯矯始終不少變晚讀大學解沿及伊洛諸書大嗜愛之常語人曰吾少時精力奪於課試殊不省有此今而後吾知道之傳為有在也埋沒篆刻中幾不復見天日目昏不能視書猶使其子講誦而朝夕聽之以是自樂及有疾親友往問之談笑歌詠不衰曰吾晚年幸聞道死無恨矣卒年七十九許衡志其墓關學編元楊奐字煥然乾州奉天人年十一母沒哀毁如成人金末舉進士不第作萬言策指陳時病未及上而歸教授鄉里東平嚴實聞奐名數問其行藏奐終不一詣太宗詔宣德稅課使劉用之試諸道進士奐試東平兩中賦論第一耶律楚材薦授河南路徵收稅課所長官兼廉訪使既至招致名士與之議政事約束以簡易為事按行境內親問監務月課幾何難易若何有以增額言者奐曰剝下欺上汝欲我為之耶即減原額四之一公私便之不踰月政成時論翕然以為前此漕司未有也在官十年請老於燕之行臺壬子世祖在濳邸驛召奐參議京兆宣撫司事上書請歸卒年七十奂博覽強記作文務去陳言以蹈襲為耻朝廷諸老皆折行輩與之交關中號稱多士名未有出奐右者奂不治生産業而喜周人之急雖力不贍猶勉強為之人有片善則委曲稱奬惟恐其名不聞或小過失必盡言勸止不計其怨怒元史本傳蕭㪺字維斗奉元人性至孝出為府史上官語不合即引退讀書南山者三十年於是博極羣書天文地理律厯算數靡不研究及門受業者甚衆世祖分藩在秦辟㪺侍秦邸㪺以疾辭授陜西儒學提舉不赴後纍授國子司業改集賢侍讀學士皆不赴大德十一年拜太子右諭德扶病至京師入覲東宫書酒誥為獻以朝廷時尚酒故也尋以病力請去職卒諡貞敏㪺制行甚髙真履實踐教人必自小學始為文辭立意精深言近指逺以洙泗為本濂洛考亭為據關輔之士翕然宗之稱為醇儒元史本傳嶽嵩號景山郃陽人延祐中三聘不起解禽鳥語嘗讀書於卧虎岡與蕭㪺友善所著有六經四書注賈志同恕字寬甫奉元人恕安靜端凝羈丱如成人日記數千言年十三以書經魁鄉校至元間三召不起陜西行臺御史趙世延請即奉元置魯齋書院中書奏恕領教事制可之先後來學者殆千數延祐六年以奉議大夫太子左贊善召入見東宫賜酒慰問繼而獻書歷陳古誼盡開悟涵養之道眀年春英宗繼統以疾歸恕之學由程朱上溯孔孟務浹洽事理以利於行教人曲為開導使得趨向之正性整潔平居雖大暑不去冠帶母張夫人卒事異母如事所生父喪哀毁致目疾時祀齋肅詳至嘗曰養生有不備事猶可復追逺有不誠是誣神也可逭罪乎恕家居十三年搢紳望之如景星麟鳯鄉里稱為先生而不姓至順二年卒年七十八制贈翰林直學士諡文貞其所著曰矩庵集二十卷元史本傳第五居仁字士安涇陽人見關學編幼師蕭㪺弱冠從同恕受學博通經史躬率子弟致力農畝而學徒滿門其𢎞度雅量能容人所不能容嘗行田間遇有竊其桑者居仁輒避之鄉里髙其行義率多化服作字必楷整遊其門者學明行修卒之日門人相與議易名之禮私諡曰靜安先生元史同恕傳韓擇字從善奉元人天資超異信道不惑其教學者雖中嵗以後亦必使自小學等書始或疑為陵節勤苦擇曰人不知學白首童心且童蒙所當知而皓首不知可乎擇尢邃禮學有質問者口講指畫無倦容士大夫遊宦過秦中必往見擇莫不虛往而實歸焉世祖嘗詔之赴京疾不果行其卒也門人為服緦麻者百餘人元史蕭㪺傳侯均字伯仁奉元人父母早亡獨與繼母居賣薪以給奉養積學四十年羣經百氏無不淹貫每讀書必熟誦乃已嘗言人讀書不至千遍終於已無益故其答諸生所問窮索極深如取諸篋笥名震關中學者宗之用薦者起為太常博士後以上書忤時相意不待報可即歸休田里均貌魁梧而氣剛正人多嚴憚之及其應接之際則和易欵洽雖方言古語人所未曉者莫不隨問而答世咸服其博聞元史蕭㪺傳程瑁字君用涇陽人隱居不仕弱冠即以古學自力討論六籍寒暑未嘗少輟三原李子敬創學古書院延瑁講學其中逺近從逰者百餘人循循然樂道不倦學者稱悅古先生嘗戒諸子曰人性本善習之易荒古聖賢皆以驕惰為戒況凡民乎集家戒一卷以遺子孫關學編眀尚士行同州人名志以字行學通五經元末隱居白水之龍岡山學者稱南岡先生與蒲城趙孟暘馬巨江等樂道講學明初孟㿩為學士薦於朝詔授本學訓導以斯文為己任士皆翕然慶得師焉同州志馬巨江蒲城人洪武十七年以通經舉授咸寧訓導永樂初授翰林五經博士時稱巨儒趙晉字孟暘亦蒲城人眀太祖徵聘輔導太子諸王賜春坊侍講學士以安車致仕蒲城志馬尚賔名貴以字行三原人光祿卿理祖也生而穎敏祖母徐教之學即奉書晝夜讀能盡識大意及長祖母徐語之曰吾聞汝外曾王父云道在中庸尚賔遂專意中庸時處士師敏深於中庸者也相與研極中庸之理吉士解栖霞嘗就問退而歎服永樂中詔求遺逸不就尚賔用周易六壬皇極諸書占事知來皆竒驗説者謂當與君平堯夫並傳云苑洛集子江字文淵博學好古事親中禮隱居教授吕柟謂其得君子之道有九焉雍大記張傑字立夫鳯翔人生有異質頴悟過人稍長以聖賢自期登正統辛酉鄉薦山西趙城訓導以講學教人為事嵗祲捐俸賑飢父殁徒跣奔歸喪葬悉以禮先是里俗多用浮屠法傑一切屏去鄉人化之後以養母遂不復仕益肆力於學恆瞑目端坐至於移時起則取諸經子史朗然諷誦或至丙夜後已最愛涵養須用敬進學在致知二語因大書揭座右造詣日深弟子從遊者日衆乃拓家孰以五經教授名重一時或勸之著書曰吾年未艾猶可進也俟有所得為之未晚竟未及著書而卒年五十二關學編宋玉字廷珍長安人自幼好學人號宋五經舉正統三年鄉舉任雙流訓導以賢能行取赴部時王振當權玉獨不為禮授瀋府教授瀋王敬之如師動靜言語必稟而後行致仕歸惟教授鄉閭子弟從遊者甚衆西安府志姚顯字微之咸陽人領正統甲子鄉薦傳業成均時三上封章大略皆闢異端崇正道安社稷之謀言甚切直大名著天下大興龍寺者朝廷習朝儀之所外樹大樓題匾曰天下第一叢林以顯奏毁除人益仰重擢言職為不利己者黜之出宰齊東民愛之如父母歌曰清似水明如鏡齊東之人何其幸轉武城民亦愛之歌曰先有子遊後有姚公律己治人同一古風後丁內外艱俱廬墓側以教鄉社子弟尋升大僕丞顯為人剛方正直光明磊落其制行一以聖賢為法人與之接邪僻自為之消比卒也士林咸痛惜焉雍大記李錦字在中咸寧人九嵗讀書知大義後遇秦州周廷芳講學得聞周程張朱為學之要遂棄詞章之習專以主敬窮理為事踐履醇茂關中學者咸敬服之天順壬午舉於鄉遊成均大司成邢讓深器異之後邢坐事下獄錦倡六館士伏闕抗章明其無罪名重京師錦解經平正通達不為鑿説且善誘後學諄諄忘倦仕松江府同知卒於官貧不能為棺殮其僚友賻之始充歸云關學編薛敬之字顯思渭南人生五嵗愛讀書十一解屬文言動必則先賢以積廩貢太學二尊人相繼殁徒跣奔葬風雪不避後遂病足值冬月輒發母嗜韭母殁終身不忍食韭成化丙午選山西應州知州首勸民耕稼紡績時當東作巡察田野民艱於耕種者賚以牛種又務積蔬粟不三四嵗粟至四萬餘石乾蔬數萬餘斤尋當飢饉應民免於死亡其既竄而復歸者三百餘家南山有虎患為文祭之旬日間虎死於壑己酉春蕭家寨北平地有暴水湧出一寨幾至淹沒亦為文祭告水即下泄聲如雷鳴民免於溺尤重學政數至學舍為諸生言孔孟之旨由是應人知身心性命之學奏課第一升金華府同知居二年致仕卒敬之嗜道若飴老而彌篤好與人講又好靜坐思索凡有所得即以劄記所著思録野録諸書其言多有補於名教云關學編劉璽宜川人賦性端方博覽羣書與兄琛同舉𢎞治乙卯鄉試人以公輔期之琛登進士任推官歷按察司僉事而璽方以道學自任不急進取徙家長安教授諸生人爭師事之關中以理學名者多出其門馮從吾璽外孫也少時璽口授五經昕夕誨育其後竟傳其學璽官衛輝通判有廉名兄琰成化辛卯舉人知汝陽亦稱循吏而琛居官所至多政績長安號三劉云宜川志吕柟字仲木髙陵人少授尚書於邑人孫昻有志聖賢之學危坐誦讀雖炎暑不廢大參熊公李公延教其子館於開元寺聞父疾徒步歸二公以夫馬追送不及父愈搆雲槐精舍聚徒講學𢎞治辛酉舉於鄉明年遊成均與諸同志講學寶卭寺正德戊辰廷對第一授修撰時閹瑾竊政以枌榆故致賀柟却之會西夏搆亂疏請上御經筵親政事不報乃引去瑾敗薦起舊職上疏勸學上嘉納未幾乾清宫災應詔言六事不報復引疾去父病侍湯藥晝夜衣不解帶履恆無聲一年鬚髮為白及卒哀毁逾禮既葬廬墓側旦夕焚香號泣釋服復講學東林書屋鎮守閹廖素張甚戒使者過髙陵勿擾曰有吕公在也世廟即位詔起原官上御經筵柟進講值淳皇后忌辰口奏宜存黲服禮罷賜酒饌朝論韙之甲申復以十三事上言過切直謫判解州既至解以作士變俗為任會守缺柟攝事善政犁然來學者益衆建解梁書院選少而俊秀者歌詩習小學諸儀朔望令耆德者講會典行鄉約廉孝悌節義者表其廬求子夏後教之學政舉化行俗用丕變轉南吏部郎遷國子祭酒以師道自任取儀禮諸篇令按圖習之登降俯仰鐘鼓管籥洋然改觀易聽有古辟雍之風晉南禮部右侍郎署南吏曹掾疏薦何塘穆孔暉徐階唐順之等二十人入賀會廟災自陳遂致仕歸卒之日髙陵人為罷市四方門人聞者皆為位而哭諡文簡關學編柟在南都凡八年四方士環趨講下是時海內講學者相望起而各守一先生言柟獨集取宋儒周程朱張語為四子抄釋令學者體驗而力行之語學者曰必如是乃為吾實學無他法門也明史竊馬理字伯循三原人𢎞治十一年以春秋魁鄉試再試禮闈未第遊太學與吕柟崔銑交相切劘文章德義名震都下正德九年登進士授稽勳主事改文選與郎中不合引疾歸居三年復任與黃鞏諫南巡被杖未幾送母還鄉設教嵯峨精舍生徒履滿門外尋起考功郎中力持公論時稱為真考功歷遷光祿卿生平學凖程朱以主敬窮理為主四方學徒轉相授受自縉紳士子以至田夫野叟無不欣慕之雖四夷亦聞其名安南貢使至問部郎黃清曰逺聞馬道學名所願一見今何不在仕列髙麗使至亦聞馬主事為聖朝第一人宜加厚遇乞頒賜所為文使國人矜式其見重如此卒年八十餘諡忠獻名山藏咱如心字子推三原人性頴悟讀書能悟人所不到處厭科舉之學慨然有求道之志嘗衣冠危坐整心飭身言動應酬悉遵道義人咸敬服年二十九而卒萬姓統譜王盛字𢡟德韓城人釋褐南户科給事陟山西參政受業薛河津之門孝友清貞秉禮好學參藩時常以暇日課士名流多出其門居家凡喪祭悉遵朱子家禮不用浮屠法韓俗為之一變同州志吕濳字時見涇陽人幼穎敏讀書解大義稍長師事吕柟言動率以為法嘉靖丙午薦鄉書卒業成均先是母柏病於京濳扶病西歸病革以濳且壯命之娶濳娶而不婚日夜苫處喪次服除乃始婚嘗與友人郭郛講學谷中洞口四方從學者甚衆辟授國子學正時馬文莊公為祭酒郛亦為助教乃與郛議以吕柟為祭酒時所布學約力舉行之由是講讀之聲徹於橋門調工部司務卒年六十二時從柟學者又有張節李挺節字介夫亦涇陽人父幡官通州同知節隨父之任會湛若水講學京師節從之遊湛教以隨處體認天理大有省悟無何父幡致仕節歸受學於柟柟深器重之生平不妄交遊獨與吕濳郭郛諸君子相切劘日坐南園草屋中讀書窮理涵養本源至老不倦惡衣糲食淡如也挺字正立咸寧人西安郡學生性孤直有義氣不隨時俯仰嘗自誦曰生須肩大事還用讀春秋柟殁又講學於馬理往來三原道中以盜死人皆惜之關學編郭郛字惟藩涇陽人與吕濳同肆力於學以聖賢相期許父母相繼逝居喪竭力盡瘁家計窘甚而處之裕如朝夕攻苦益濳心性命之學或有以千金求居間者峻拒不納嘉靖戊午舉於鄉選河南獲嘉學諭與諸生講學課藝多所造就擢國子助教遷户部主事𣙜稅九江剔弊除姦商旅胥悅出守馬湖居未三載投牒歸田讀書講學外他無所事卒年八十八門人私諡曰貞懿先生關學編王之士字欲立藍田人嘉靖戊午舉人濳心理學毅然以道學自任為養心圖定氣説書之座右閉關不出者九年蒿牀糲食尚友千古行已必恭與人必敬謂居鄉不能善俗如先正和叔何乃立鄉約為十二會赴會者百餘人設科勸糾身先不倦諸灑掃應對冠婚喪祭禮久廢每率諸宗族子弟一一敦行之己卯如京與諸同志講學崇正闢邪力肩斯道或談及二氏輒正辭拒之不少假借生平著述皆根柢理窟一時學者翕然宗之賈志劉儒字以聘宜川人性至孝父嘗倉卒被盜儒與兄自外踰垣入爭求代父於是盜義之釋其父嘉靖間以舉人令安邑完縣升敘州府同知所至皆有惠政遷慶藩左長史以禮繩王王不聽遂致仕儒為學以誠一為本辨析理義毫忽不茍子史百家言無所不通顧一折𠂻於程朱學者爭師事之太保楊兆出其門既貴每見猶侍立終日語人曰吾侍兩宫未若先生嚴也子光文以明經知招逺寬和宜民擢判真定有井出金內官監採為民害光文奏劾內宦因罷役一時權貴憚之延安府志劉子誠字伯明宜川人幼有至性濳心經史嘉靖時舉人與溫恭毅砥行明經一時老師宿儒皆尊信之子誠為學既綜六經又精羣緯尤與周子圖説通書得抽關啓鑰之妙嵗己丑為楊啓元擬元與他房陶望齡爭或因北卷欲置第二楊不平憤置之曰斯人道學淵懿議論瑩徹非吾曹所及因刋其卷布長安自是退講於鄉隨人淺深皆有成就終身無攢眉事一日臨觴不樂謂弟子諴曰學無體用便分物理性命為二吾學雖未見用然繕性治世放諸百世無疑也苐度設施可澤於斯人便可出而仕矣尋卒學者尊為大劉夫子宜川志文在中字少白御史振之八世孫也萬厯甲戌進士廷對已共以第一人相擬江陵以策有一氣未通兩孽未除之語抑置三甲歷仕至祠部郎復以忤馮璫降調尋遷長沙别駕挂冠歸老豳山建樂育書院日講內聖外王之學負笈從遊者甚衆性既聰敏復博極羣書下筆數萬言立就所著有觀宇觀宙天經天雅天典天引天朔天極各三十六帙生平孝友天植周恤族閭時三水賦重民貧不克充額在中申請減糧一萬邑人為建減糧永思碑稱關西夫子云賈志馮從吾字仲好長安人甫髫齡即深契王文成人心有仲尼句口誦心維常以文人何如聖人廣厲同志為德清許孚逺所器重舉進士由庶常改御史巡視中城有中貴投刺者必峻却之時神宗臨御久經筵几席塵封從吾具疏特請朝講且謂今當入覲之期萬方畢集咸欲一覩清光而不可得則必疑而相議不曰皇上困於麯蘖之御而歡飲長夜必曰倦於窈窕之娛而晏眠終日雖近頒敕諭謂聖體違和冀可借此自掩不知鼓鐘於宫聲聞於外天下人心豈可得而欺哉望皇上勿以天變為不足畏勿以人言為不足恤勿以目前之晏安為可恃勿以將來之離亂為勿虞上大怒欲杖之以長秋節獲免又疏逐相門狎客胡汝寧出督蘆鹽忤要人削籍不出門者九年燕寢三楹竟日危坐親朋罕睹其面惟問學者至一稚子肅而入坐久碾來牟剪葵韭為供更端問難亹亹忘倦逺近從遊者日衆天啓即位與鄒元標同赴召適京師戒嚴朝官爭遣其孥從吾獨盡室以行無何廣寧陷經撫擕手入關從吾謂國家無事士大夫不知節義臨難抱頭鼠竄者踵相接宜喚起親上死長之心非講學不可因與元標倡立首善書院集同志相切劘羣小側目於是兵科朱童蒙疏劾建壇講學之非從吾疏乞休豫告回籍繼而起從吾總留臺不赴即家拜工部尚書疏辭奄禍益烈尋遭削奪會秦撫亦奄黨借從吾以媚奄日以窘迫為事毁書院擲夫子象於城隅從吾痛切剝膚吁嗟趺坐二百日不就寢飲恨而卒崇禎改元贈宫保諡恭定續表忠記張舜典字心虞鳯翔人萬厯甲午舉人自諸生時濳心理學受知督學許孚逺後遊江南復從許講學因遍交鄒南臯顧涇陽馮少墟諸先輩數年始歸謁選署開州學正與諸主朝夕講論皆朱程語録不以舉業為先升鄢陵令盡心民事細大必舉民間養生送死之具皆備而貯之以貸貧乏創𢎞仁書院與諸生講學置經史數千卷為令五年鄢民戴若父母升彰德府同知致仕歸諸生從遊者常數百人天啓改元升兵部武選員外上疏勸聖學逺宦寺時魏閹已用事舜典特指斥之遂罷歸卒於家初舜典之令鄢也時方承平舜典忽製軍器若干皆精好貯於庫人咸訝之及去官後有邊警需軍器縣以舜典所製者應之獨精利為他邑冠人服其先識云賈志趙應震字廉夫膚施人生而莊重沈默少就傅即勉強力學每進講必究理義所在閲五經性理諸書知聖賢理藴在此師馮少墟先生為及門第一主太和書院講學比肩從遊者皆師事之歸里讀書清涼山寺購書萬卷執經問字者盈門應震天性純孝事孀母盡菽水歡簞瓢自適不受餽遺會母卒嚴冬不履而跣嵗祲貧益甚弟子或供饘粥終不屑曰菜根滋味正著述受用物手不釋卷日事討輯未經大用賫志而殁逺邇痛悼之後二十年督學道汪喬年表其墓曰理學真儒趙應震之墓賈志按陳疇演象實開理窟之精天祿石渠大啓諸經之祕厥後橫渠二張藍田諸吕力肩道統繼往開來此關學之所以源逺流長而師承有自也雖其間造詣不齊宗𣲖不一然要皆表章聖訓羽翼斯文佑啓後人維持風教今撮其遺事依次列傳其有聞望素著德業未詳如洪武時則有蒲城石伯元藍田李恆宣德時則有三原雒守一𢎞治時則有髙陵孫昻成化時則有長安吉人膚施趙章嘉靖時則有扶風馮侃白水石萬鍾萬厯時則有長安宋學三原楊春芳盩厔楊楠延安姚衍宗鳯翔劉𢎞業華隂劉濯翼淳化王近泉崇禎時則有長安楊復亨皆以通經講學聞於時本朝李顒字中孚盩厔人父可從崇禎十四年從總督汪喬年出關征闖敗於襄城陷陳死顒時年十五母子煢煢日不再食既長矢志力學尤篤信濂洛關閩諸書以明體達用為主性純孝事母色養及殁哀毁幾絶葬祭悉如禮服闋訪父遺骸於襄城不獲為位痛哭招魂而歸康熙十二年總督鄂善修復關中書院邀顒至為諸生講明正學人稱二曲先生督撫薦剡交上先後奉旨特徵以疾辭康熙四十二年冬六龍西狩長安召見顒時顒已衰老遣子愼言詣行在陳情隨賜御書操志髙潔以奬之顒復進呈二曲集反身録並荷溫綸褒諭年七十有九卒顒門人如咸寧羅魁韓城程良受蒲城寧維垣邠州王吉相皆篤志力學得知行合一之旨其質美而學未逮者雒南楊堯階舜階同州馬棫士武功張志坦志坦年三十而卒顒慟之為表其墓志坦父承烈亦學於顒張珥字敦庵順治丁亥進士李士璸字文伯嵗貢生俱同州人也不仕家居篤好正學嵗戊申李顒至同州二人首執弟子禮其實皆齒倍於顒也顒力辭二人執禮如故一時謂其忘年向道有古人風士璸年九十乃卒所著有大學正譜二卷羣書舉要二卷孝經要義一卷四書要諦四卷小學約言一卷理學宗言二卷王陳宗言二卷問疑録一卷玉山前後集十卷黨湛字子澄同州人性至孝父患顚疾家人莫敢進湛獨晨夕侍側父殁復廬墓三年人稱其孝居家不營生産瓦盂脫粟安之若素晚年屏居古窰中靜久有得每同志講集輒娓娓不倦年八十矍鑠如少年時嘗步訪李顒於盩厔留止浹旬商證所學至丙夜無惰容既殁西安郡丞郝某為大書理學孝子之墓以表之王建常字仲復朝邑人為諸生家貧力學所著述皆發明儒先排斥異説其得力尤在孝經一書許孫荃聞其名數造請初至持金幣為壽不敢出改餽葛棉數種不受使者力請乃受其抗節如此建常同里有關獨可者逸其名李顒過朝邑嘗一見之每稱其篤實朴茂與建常在伯仲間云王化泰蒲城人少好性命之學既長與同志諸人以學術相摩厲嘗賦靜中吟三章直抒心得讀者歎為見道之言年七十訪李顒於盩厔質所學又與同州白煥采共肅車迎顒尊以師禮日夕往復無倦色每自謂日暮途逺虛擲此生輒唏噓不已見者悚然煥采字泊如嵗貢生厲志正學晚嵗與化泰迎顒主其家日集友生會講一時同志之士奉為宗盟其踐履切實尤篤行之士也康吕賜字復齋武功人少入鄉校有大志欲以勳業自見久之父母相繼逝居喪如禮服闋遂絶意仕進思欲倡明絶學刻苦數十年忽若有得以致良知為宗主以愼獨為工夫以體用一原內外兩忘為究竟遂名其齋曰愼獨所著有愼獨齋日録等書宋振麟字子禎淳化人恩貢事母至孝母病盲振麟寢食不寧者三載母目復眀人以為孝感性狷介博極羣書與同邑姚開先羅萬藻討論性命之學部檄授教職以疾辭康熙己未以博學鴻詞徵不起所至人爭聘為經師所著有大學知止義説二程語録寶鑑及詩文若干首學者宗之文學漢司馬談秦人見本傳為太史公學天官於唐都受易於楊何習道論於黃子仕於建元元封之間愍學者不達其意而師悖乃論六家之要指子曰遷生龍門耕牧河山之陽十嵗誦古文二十南遊江淮上會稽探禹穴窺九疑浮沅湘北涉汶泗講業齊魯之都觀夫子遺風仕為郎中奉使西征巴蜀以南略卭筰昆明還報命太史公卒遷為太史令紬石室金匱之書述陶唐以來至於麟止著十二本紀十表八書三十世家七十列傳凡百三十篇成一家言遷死後其書稍出宣帝時遷外孫平通侯楊惲祖述其書遂宣布焉至王莽時求遷後封為史通子漢書本傳馮商如淳曰商長安人成帝時以能屬書待詔金馬門受詔續太史公書十餘篇師古曰劉歆十略云馮商陽陵人治易事五鹿充宗能屬文博通強記與孟柳俱待詔頗序列傳未卒會病死漢書張湯傳贊注慶虬之長安人亦為善賦嘗為清思賦時人不之貴也託以相如所作遂大見重於世西京雜記班斿況子長安人幼博學有俊材左將軍師丹舉賢良方正以對策為議郎遷中郎將與劉向校祕書每奏事斿以選受詔進讀羣書上器其能賜以祕書之副早卒有子曰嗣顯名當世嗣雖修儒學然貴老莊之術桓生欲借其書嗣報曰若夫莊子者絶聖棄智修生保真清虛淡泊歸之自然獨師友造化而不為世俗所役者也漁鈎於一壑則萬物不姦其志栖遲於一丘則天下不易其樂不絓聖人之罔不嗅驕君之餌蕩然肆志談者不得而名焉故可貴也今吾子已貫仁誼之羈絆繫名聲之韁鎖伏周孔之軌躅馳顏閔之極摰既繫攣於世教矣何用大道為自眩矅昔有學步於邯鄲者曾未得其髣佛又復失其故步遂匍匐而歸耳恐似此類故不進嗣之行已持論如此漢書敘傳張禹字子文軹人禹父徙家蓮勺禹從沛郡施讐受易琅玡王陽膠東庸生問論語舉為郡文學甘露中諸儒薦禹詔蕭望之問禹詩易及論語大義望之善焉奏禹經學精習有師法可試事試為博士初元中立皇太子詔令禹授太子論語出為東平內史成帝即位賜爵關內侯拜給事中領尚書事河平四年代王商為丞相封安昌侯鴻嘉元年以老病乞骸骨罷就第禹為人謹厚內殖貨財禹雖家居以特進為天子師國家每有大政必與定議永始元延間日蝕地震尤數吏民上書言災異之應王氏專政所致上意頗然之親問禹因用吏民所言王氏事示禹禹曰災變之意深逺難見新學小生亂道誤人宜無信用上由此不疑王氏建平二年薨諡曰節侯長子宏官太常三弟皆為校尉散騎諸曹初禹為師以上難數對已問經為論語章句獻之諸儒為之語曰欲為論念張文由是學者多從張氏餘家寢微漢書本傳谷永字子雲長安人父吉為衛司馬使送郅支單于侍子為郅支所殺永博學經書御史大夫繁延壽舉為太常丞建始三年冬日食地震同日俱發詔舉方正直言極諫之士太常舉永待詔公車時對者數十人永為上第擢光祿大夫元延元年為北地太守時災異尤數永當之官上使衛尉淳于長受永所欲言永對奏天子甚感其言永於經書泛為疏達與杜欽杜鄴略等不能洽浹如劉向父子及揚雄也其於天官京氏易最密故善言災異前後所上四十餘事專攻上身與後宫而已黨於王氏上亦知之不甚親信也永所居任職徵入為大司農卒於家漢書本傳杜鄴字子夏本魏郡繁陽人武帝時徙茂陵鄴少孤其母張敞女鄴從敞子吉學問得其家書以孝廉為郎與車騎將軍王音善鄴見音前與平阿侯談有隙説音與成都侯商親密二人皆重鄴後以病去郎元壽元年正月朔日食詔舉方正直言扶陽侯韋育舉鄴方正鄴對未拜病卒初鄴從張吉學吉子竦又幼孤從鄴學問尤長小學鄴子林清靜好古亦有雅材建武中歷位至大司空其正文字過於鄴竦故世言小學者由杜公漢書本傳班彪字叔皮稚之子與從兄嗣共遊學家有賜書內足於財好古之士自逺方至父黨揚子雲以下莫不造門唯聖人之道然後盡心焉年二十遭王莽敗世祖即位於冀州時隗囂據隴右公孫述稱帝於蜀漢天下雲擾乃著王命論以救時難知隗囂終不悟乃避地於河西河西大將軍竇融嘉其美德訪問焉舉茂材為徐令以病去官後數應三公之召仕不為祿所如不合學不為人博而不俗言不為華述而不作漢書敘傳彪既才髙而好述作專心史籍之間武帝時司馬遷著史記自太初以後闕而不録彪乃繼採前史遺事傍貫異聞作後傳數十篇辟司徒王況府時東宫初建而官屬未備彪上言宜博選名儒為太子傅帝納之後察廉為望都長吏民愛之年五十二卒官後漢書本傳班固彪子弱冠而孤作幽通賦永平中為郎典校祕書專篤志於學以著述為業以為堯舜之盛必有典謨之篇然後揚名於後世冠德於百王漢紹堯運以建帝業至於六世史臣乃追述功德私作本紀編於百王之末太初以後闕而不録故探纂前記綴集所聞以述漢書起於髙祖終於孝平王莽之誅十有二世二百三十年綜其行事旁貫五經上下洽通為春秋考記表志傳凡百篇漢書敘傳固字孟堅父彪卒歸鄉里固以彪所續前史未詳乃濳精研思欲就其業郡上其書顯宗甚竒之除蘭臺令史使終成前所著書固永平中受詔濳精積思二十餘年至建初中始成當世甚重其書學者莫不諷誦焉自為郎後遂見親近時關中耆老猶望朝廷西顧固上兩都賦盛稱洛邑制度之美以折西賔淫佚之論及肅宗雅好文章固愈得幸數入讀書禁中固以二世才術位不過郎作賔戲以自通後遷玄武司馬天子會諸儒講論五經作白虎通德論令固撰集其事永元初大將軍竇憲以固為中護軍與參議及憲敗竇氏賔客皆逮考固遂死獄中後漢書本傳馮衍字敬通杜陵人幼有竒才九嵗能誦詩二十博通羣書王莽時諸公多薦之者衍不肯仕天下兵起莽遣將軍亷丹討山東丹辟衍為掾丹戰死衍乃亡命山東更始遣鮑永安集河北衍説永以鎮太原撫上黨永以衍為立漢將軍扞衛井土世祖即位遣使者招衍衍不肯降後審知更始已殁乃罷兵降於河內帝怨衍不時至遂見黜頃之以為曲陽令斬劇賊郭勝等論功當封以讒故賞不行衛尉隂興新陽侯隂就深重衍與之交結尋為司𨽻從事帝懲西京外戚賔客以法繩之衍由此得罪西歸故郡作賦自厲命其篇曰顯志居貧年老卒於家所著賦誄銘説問交德誥愼情書記説自序官録説策凡五十篇肅宗甚重其文後漢書本傳杜篤字季雅京兆杜陵人少博學不修小節不為鄉人所禮居美陽與美陽令遊數從請託不諧頗相恨令怨收篤送京師會大司馬吳漢薨光武詔諸儒誄之篤於獄中為誄辭最髙帝美之賜帛免刑篤以關中表裏山河先帝舊京不宜改營洛邑乃上奏論都賦後仕郡文學掾以目疾二十餘年不窺京師建初三年車騎將軍馬防擊西羌請篤為從事中郎戰沒於射姑山所著賦誄弔書讚七言女誡及雜文凡十八篇又著明世論十五篇子碩豪俠以貨殖聞後漢書本傳王隆字文山雲陽人王莽時以父任為郎後避難河西為竇融左護軍建武中為新汲令能文章所著詩賦銘書凡二十六篇後漢書本傳田邑蓮勺人有大節涉學藝能善屬文為漁陽太守道病徵還為諫議大夫東觀記傅毅字武仲茂陵人少博學永平中於平陵習章句作迪志詩以顯宗求賢不篤士多隱處故作七激以為諷建初中肅宗博詔文學之士以毅為蘭臺令史拜郎中與班固賈逵共典校書毅追美孝明皇帝功德最盛而廟頌未立乃依清廟作顯宗頌十篇奏之由是文雅顯於朝廷毅早卒著詩賦誄頌祝文七激連珠凡二十八篇後漢書本傳馬融字季長茂陵人美辭貌有俊才初京兆摯恂以儒術教授融從其學博通經籍恂竒融才以女妻之永初二年大將軍鄧隲召為舍人不應命客於涼州武都漢陽界中會羌虜飈起米穀湧貴自關以西道殣相望融既飢困乃往應隲召四年拜校書郎詣東觀典校祕書鄧太后臨朝隲兄弟輔政俗儒以為文德可興武功宜廢融上廣成頌以諷諫忤鄧氏十年不得調因兄子喪自劾歸太后聞之怒謂融羞薄詔除欲仕州郡遂令禁錮之安帝親政召還郎署復在講部出為河間王廄長史時車駕東巡岱宗上東巡頌帝竒其文召拜郎中北鄉侯即位融移病去陽嘉二年詔舉敦朴徵詣公車對策拜議郎大將軍梁商表為從事中郎轉武都太守時西羌反叛融上疏乞自效朝廷不能用桓帝時為南郡太守先是融有事忤梁冀旨冀諷有司奏融在郡貪濁免官髠徙朔方得赦還復拜議郎重在東觀著述以病去官融才髙博洽為世通儒教養諸生常有千數坐髙堂施絳紗帳前授生徒後列女樂弟子以次相傳鮮有入其室者初融懲於鄧氏不敢違忤勢家頗為正直所羞年八十八卒後漢書本傳族孫日磾字翁叔少傳融業以才學進典校中書歷位九卿登台輔三輔決録注蘇順字孝山霸陵人和安間以才學見稱好養生術隱處求道晚乃仕拜郎中所著賦論誄哀辭雜文凡十六篇時三輔多士扶風曹衆伯師亦有才學著誄書論四篇後漢書本傳祝龜字元靈南鄭人年十五逺學汝穎能屬文太守張府君竒之曰吾見海內士多矣無如祝龜者也州牧劉焉辟之不得已行授葭萌長撰漢中耆舊傳以著述終漢中士女志楊敷震孫華陰人震少子奉奉子敷篤志博聞議者以為能世其家敷子衆亦能傳先業後漢書楊震傳李歷字季子太尉固從弟少修文學性行清白與鄭康成陳元方齊名弱冠拜新城令朝都督漢中士女志趙岐字邠卿長陵人少明經有才藝仕州郡以廉直疾惡見憚永興二年辟司空掾議二千石得去官為親行服朝廷從之其後為大將軍梁兾所辟為陳損益求賢之策兾不納後舉理劇為皮氏長會河東太守劉祐去郡而中常侍左悺兄勝代之岐耻疾宦官即日西歸中常侍唐衡兄玹為京兆虎牙都尉岐數為貶議玹深毒恨延熹元年玹為京兆尹岐懼禍及逃難四方自匿姓名賣餅北海市中後諸唐滅乃出擢拜并州刺史岐欲奏守邊之策未及上會坐黨事免因撰次以為禦寇論中平元年徵拜議郎遷太僕卿李傕專政使太傅馬日磾撫慰天下以岐為副行至洛陽日磾表别遣岐宣揚國命時袁紹曹操與公孫瓚爭冀州紹及操聞岐至皆自將兵數百里奉迎岐深陳天子恩德又移書瓚為言利害各引兵去興平元年詔書徵岐會帝當還洛陽先遣衛將軍董承修理宫室承表遣岐使荆州岐至劉表即遣兵助修宫室軍資委輸前後不絶於是拜岐為太常建安六年卒著孟子章句三輔決録傳於時後漢書本傳孟子得立為博士實自岐始續文獻通考嚴象字文則京兆人少聰博有膽智為揚州刺史同郡趙岐作三輔決録恐時人不盡其意故隱其書唯以示象魏志荀彧傳注士孫瑞字君榮扶風人世為學門瑞少傳家業博達無所不通仕歷顯位遷大司農為國三老子萌字文始亦有才學與王粲善粲嘗作詩以贈萌有答在粲集中三輔決録注陳述字申伯漢中人博學多聞著釋問七篇益都耆舊傳及志位歷三郡太守三國志李撰傳魏杜寬字務叔理子杜陵人清虛玄靜敏而好古以名臣門户少長京師而篤志博學絶於世務其意欲探賾索隱由此顯名當塗之士多交焉舉孝廉除郎中年四十二而卒經傳之義多所草創未就惟刪集禮記及春秋左氏傳解今存於世杜氏新書賈洪字叔業新豐人好學有文才精於春秋左傳建安初仕郡舉計掾應州辟時州中自參軍以下百餘人唯洪與馮翊嚴苞交通材學最髙洪歷守三縣令所在輒開除廄舍親授諸生後馬超反劫洪將詣華陰使作露布洪不獲已為作之司𨽻鍾繇在東識其文曰此賈洪作也及超破走太祖召洪署軍謀掾猶以其前為超作露布文故不即敘晚乃出為隂泉長延康中轉為白馬王相彪亦雅好文學常師宗之過於三卿數嵗病亡三國志王肅傳楊修字德祖震元孫華隂人少好學有俊才為丞相曹操主簿操平漢中欲因討劉備而不得進欲守之又難為功護軍不知進止何依操出教唯曰雞肋而已外曹莫能曉修獨曰夫雞肋食之則無所得棄之則如可惜公歸計決矣修機決多此類操於此忌修且以袁甫之甥慮為後患遂因事殺之所著賦頌碑讚詩哀辭表記書凡十五篇後漢書楊震傳修謙恭才博是時軍國多事修總知外內事皆稱意自魏太子已下並爭與交好臨災侯植以才捷愛幸雅意投修數與修書往來甚數植後以驕縱見疏而植故連綴修不止修亦不敢自絶至二十四年秋公以修前後漏泄言教乃收殺之典略修子囂囂子準皆知名於晉世準子嶠字國彥髦字士彥並為後出之俊魏志陳思王傳注嚴幹字公仲李義字孝懿馮翊東縣人性皆厚重建安初詔分馮翊西數縣為左內史郡治髙陵義於縣分當西屬義謂幹曰西縣兒曹不可與爭坐席今當共作方牀耳遂相附結皆仕東郡郡舉幹孝廉義上計掾義留京師為平陵令遷冗從僕射遂歷顯職文帝即位拜執金吾衛尉卒官幹以孝廉拜蒲坂令病去官詔拜議郎以建策討髙幹又追録前討郭援功封武鄉侯遷𢎞農太守明帝時遷太僕數嵗卒始李義以直道推誠於人故於時陳羣等與之齊好幹從破亂之後更折節學問特善春秋公羊鍾繇不好公羊而好左氏謂左氏為大官謂公羊為賣餅家數與幹辨折長短繇為人機捷善持論幹口訥臨時無以應繇謂幹曰公羊髙竟為左丘明服矣幹曰某故吏為明使君服耳公羊未肯也魏志裴濳傳注如淳馮翊人魏陳郡丞注漢書漢書敘例晉摯虞字仲洽長安人父模魏太僕虞少事皇甫謐才學通博著述不倦舉賢良策為上第拜中郎時天子留心政道吳冦新平海內乂安上太康頌以美晉德以母憂解職久之召補尚書郎是時太廟初建詔普增位一等以主者承詔失旨改除之虞以為不可詔從之元康中遷吳王友時荀顗撰新禮使虞討論得失而後施行後歷祕書監衛尉卿從惠帝幸長安及東軍來迎百官奔散遂流離鄠杜之間轉入南山中糧絶飢甚拾橡實而食之後得還洛歷光祿勳太常卿時懷帝親郊自元康以來不親郊祀禮儀廢弛虞考正舊典法物粲然及京洛荒亂盜竊縱橫人飢相食虞素清貧遂以餒卒撰文章志四卷注解三輔決録又撰古文章類聚區分為三十卷名曰流别集各為之論辭理愜當為世所重晉書本傳韋元字祖思京兆人隱居養志恬淡寡欲博涉經史尤善屬文姚興備禮致之見興不拜興亦重其志操厚為之禮劉裕辟為相國掾亦不就十六國春秋本傳南齊韋纂睿兄杜陵人仕齊位司徒記室沈約嘗稱於上曰恨陛下不與此人同時其學非臣輩也南史韋睿傳梁韋稜正弟杜陵人性恬素以書史為業博物強記當世之士咸就質疑位光祿卿著漢書續訓三卷梁書韋睿傳北魏楊暐字延季津弟華隂人性雅厚有文學孝昌初正武衛將軍加散騎常侍安南將軍子元讓祠部郎中魏書楊播傳北周蘇亮字景順綽從兄武功人祖稚字天祐位中書侍郎玉門郡守父祜泰山郡守亮少通敏博學好屬文與弟湛等皆著名西土一家舉二秀才亮初舉秀才至洛陽過河內常景景深器之而謂人曰秦中才學可以抗山東者將此人乎魏齊王蕭寶夤引為參軍寶夤雅相知重凡有文檄謀議皆以委之尋行武功郡事甚著聲績及長孫承業爾朱天光等西討並以亮為郎中專典文翰賀拔嶽為關西行臺引亮為左丞典機密魏孝武西遷遷吏部郎中拜黃門侍郎除中書監領著作修國史亮有機變善談笑有所籌議率多會旨記人之善忘人之過薦達後進常如弗及故當世敬慕拜侍中卒於位亮少與從弟綽俱知名世稱二蘇所著文筆數十篇頗行於世子師以亮名重起家黃門侍郎北史本傳顏之儀字升幼穎悟三嵗能讀孝經及長博涉羣書好為詞賦常獻梁元帝荆州頌辭致雅贍江陵平之儀隨例遷長安周明帝以為麟趾學士武帝初建東宫盛選師傅以之儀為侍讀太師宣帝即位進爵為公帝後刑政乖僻之儀犯顏驟諌雖不見納終亦不止宣帝崩劉昉鄭鐸等以隋文帝為丞相輔少主之儀拒而不從昉等草詔署訖逼之儀署不可乃代署而行之文帝後索符璽之儀曰此天子物宰相何故索之文帝將戮之以其人望乃止開皇五年拜集州刺史在州清淨夷夏悅之有文集十卷行於世北史本傳傅準北地人祖照光祿大夫父諝湘東王外兵參軍準有文才善詞賦以西中郎參軍隨蕭察之鎮官至度支尚書所著文集二十卷有二子曰秉曰執並才兼文史周書本傳隋何妥字栖鳯西城人少機警髙祖受禪除國子博士加散騎常侍進爵為公性徑急好是非人物蘇威時兼領五職上甚親重之妥因奏威不可信任又以掌天文律度皆不稱職妥上八事以諫威大銜之上令妥考定鍾律録三調四舞曲名又製歌辭書奏敕太常取妥節度於是作清平瑟三調聲又作八佾鞞鐸巾拂四舞先是太常所傳宗廟雅樂數十年惟作大吕廢黃鍾妥又以深乖古意乃奏請用黃鍾議從之後出為龍州刺史時有負笈遊學者妥皆為講説教授之在職三年以疾請還詔許之復知學事時上方使蘇夔在太常議鍾律有所建議朝士多從之妥獨不同朝臣多排妥妥復上封事指陳得失大抵論時政損益指斥當世朋黨於是蘇威等皆坐得罪尋為國子祭酒卒諡曰肅隋書本傳蘇夔字伯尼威子武功人聰敏有口辨八嵗誦詩十四詣學與諸儒議論詞致可觀見者皆稱善及長博覽羣言尤以鍾律自命起家太子通事舍人後與鄭譯何妥議樂得罪議寢不行著樂志十五篇以見其志仁壽三年詔天下舉達禮樂源者晉王昭時為雍州牧舉夔帝謂侍臣曰唯此人稱吾所舉拜晉王友煬帝即位蠻夷來朝帝謂虞世基曰四夷率服觀禮華夏鴻臚之職須歸令望咸以夔對即拜鴻臚少卿突厥圍雁門夔為弩樓車箱以功進位通議大夫丁母憂不勝哀卒北史蘇綽傳常得志京兆人隋秦王記室及王薨過故第為五言詩辭理悲壯甚為時人所重復為兄弟論義理可稱北史本傳唐姚思廉陳吏部尚書察之子陳亡察自吳興遷遂為萬年人思廉少受漢書於察盡傳其業初察嘗修梁陳二史未就死以屬思廉思廉表父遺言有詔聽續煬帝又詔修區宇圖志遷代王侍讀髙祖定京師府僚皆奔亡獨思廉侍王兵將升殿思廉厲聲曰唐公起義本安王室若等不宜無禮衆却列階下帝義之聽扶王至順陽閣泣辭去觀者歎曰仁者有勇謂此人乎俄授秦王府文學時思廉在洛陽王遣使遺物三百段致書曰景想節義故有是贈王即位改著作郎𢎞文館學士詔撰梁陳書思廉采謝炅顧野王等諸家言推究綜括為梁陳二家史以卒父業加通直散騎常侍凡政事得失許密以聞思廉亦展盡無所諱拜散騎常侍卒諡曰康唐書本傳袁朗長安人陳尚書左僕射樞之子陳亡徙關中朗勤學好屬文在陳釋褐祕書監為江總所重嘗製千字詩當世以為盛作陳後主召入禁中使為月賦朗染翰立成又使為芝草嘉蓮二頌深見優賞武德初授齊王文學貞觀初卒官太宗為之廢朝一日謂高士廉曰袁朗在任雖近然其性謹厚特使人傷情因敕給其喪事有文集十四卷從父弟承序武德中齊王元吉聞其名召為學士髙宗在藩太宗選學行之士為僚屬召守晉王友仍令侍讀加授𢎞文館學士未幾卒舊唐書本傳杜淹字執禮如晦叔杜陵人材辨多聞有美名秦王引為天策府兵曹參軍文學館學士嘗侍宴賦詩尤工及踐祚召為御史大夫敕東宫儀典悉聽淹裁訂俄檢校禮部尚書參預朝政貞觀二年卒諡曰襄子敬同官鴻臚卿唐書杜如晦傳令狐德棻華原人博貫文史髙祖入關引直大丞相府記室武德初遷祕書丞是時大亂後經籍亡散祕書湮缺德棻始請帝購求遺書置吏補録不數年圖典略備又建言近代無正史陳齊文籍猶可據至周隋事多脫損今不論次各為一王史則先烈世庸後無傳焉於是論撰歷年不就罷之貞觀三年復詔撰定五家史德棻次周史書成遷禮部侍郎兼修國史坐事免會修晉史房元齡奏起之德棻為先進類例多所諏定除祕書少監永徽初復為禮部侍郎𢎞文館學士兼修國史髙宗嘗問王霸孰先德棻曰王任德霸任刑又問禹湯桀紂所以興亡對曰傳稱禹湯罪已其興也勃焉桀紂罪人其亡也忽焉二主惑嬖色戮諫者造炮烙之刑此所以亡也帝悅厚賜遷國子祭酒崇賢館學士爵為公卒諡曰憲峘德棻五世孫天寶末及進士第遇亂隱南山豹林谷楊綰微時數從之遊綰修國史薦峘拜右拾遺兼史職撰玄宗實録裒掇詔策備一朝之遺大厯中遷司封郎中知制誥兼史館修撰建中初為禮部侍郎貞元五年貶卒初受詔撰代宗實録未就會貶詔聽在外成書元和中其子太僕丞丕獻之以勞贈工部尚書唐書本傳孟利貞華陰人父神慶沁州刺史以清介著名利貞初為太子司議郎受詔與少師許敬宗崇賢學士郭瑜顧引董思恭等撰瑤山玉彩五百卷龍朔二年奏上之髙宗稱善又撰續文選三十卷兄允忠垂拱中為天官侍郎舊唐書本傳徐齊聃字將道長城人世客馮翊八嵗能文舉𢎞文生髙宗時崇文館學士侍皇太子於芳林門時姑為帝婕妤嫌以恩進求出為桃林令咸亨初詔突厥酋長子弟事東宫齊聃上書諌以為非左右惟其人之義又長孫無忌以讒死家廟毁頓齊聃言齊獻公陛下外祖後嗣有罪不宜毁及先廟今周忠孝公廟崇飾踰制非所以示海內帝寤有詔復其祀齊聃善文誥帝愛之令侍皇太子及諸王屬文坐漏禁中事貶卒子堅字元固幼有敏性舉秀才及第聖厯中東都留守楊再思王方慶引為判官方慶善禮學嘗就質疑晦得所未聞屬文典厚再思每目為鳯閣舍人樣與徐彥伯劉知幾張説與修三教珠英時張昌宗李嶠總領彌年不下筆堅與説專意撰綜條彚粗立諸儒因之乃成書睿宗即位遷黃門侍郎玄宗改麗正書院為集賢院以堅充學士副張説知院事堅於典故多所諳識凡七當撰次髙選卒諡曰文子嶠字巨山開元中為集賢院直學士遷中書舍人父子相次為學士自祖及孫三世為中書舍人唐書本傳楊炯華隂人幼聰敏博學善屬文舉神童拜校書郎為崇文館學士俄授盈川令如意元年七月望日宫中出盂蘭盆分送佛寺則天御洛南門與百僚觀之炯獻盂蘭盆賦詞甚雅麗卒官贈著作郎文集三十卷炯與王勃盧照鄰駱賔王以文詞齊名海內稱王楊盧駱亦號為四傑炯聞之謂人曰吾愧在盧前耻居王後當時議者亦以為然舊唐書本傳江融盩厔人撰九州設險圖備載古今用兵成敗之事舊唐書魏元忠傳富嘉謨雍州武功人舉進士與新安吳少微友善先是文士撰碑頌皆以徐庾為宗氣調漸劣嘉謨與少微屬詞皆以經典為本時人欽慕之文體一變稱為富吳體嘉謨作雙龍泉頌千蠋谷頌詞最髙雅作者推重後預修三教珠英為左臺監察御史卒有文集五卷舊唐書本傳李適萬年人景龍中為中書舍人轉工部侍郎睿宗時天臺道士司馬承禎徵至京師及還適贈詩敘其高尚之致其詞甚美當時朝廷之士無不屬和凡三百餘人徐彥伯編而敘之謂之白雲記頗傳於代尋卒舊唐書本傳適子季卿亦能文舉博學宏辭肅宗時為中書舍人代宗立進吏部侍郎河南江淮宣慰使號振職大厯中終右散騎常侍遺命以布車一乘葬季卿在朝薦進才髦與人交有終始恢博君子也唐書李適傳蘇晉珦子藍田人數嵗知為文作八卦論舉進士及大禮科皆上第先天中為中書舍人玄宗監國所下制命多晉及賈曾稿定屢獻讜言天子嘉允始晉與洛人張循之仲之善循之上書忤武后見殺仲之神龍中謀去武三思為宋之遜等所發死晉厚撫其子漸為營婚宦晉卒漸喪之若諸父云唐書本傳鄧元挺藍田人少善屬文為頓丘令有善政纍授中書舍人性俊辨機捷過人出為澧州刺史後以善政聞召拜天官侍郎舊唐書本傳祝琳字叔良欽明父始平人少通經頗著書終無極尉唐書祝欽明傳韋述𢎞機曾孫杜陵人家厨書二千卷述為兒時誦憶略遍父景駿神龍中為肥鄉令述從到官元行沖景駿姑子也為時儒宗嘗載書數車自隨述入其室觀書不知寢食行沖異之與語前世事復詳諦如指掌使屬文授紙輒就行沖曰外家之寶也舉進士時方少儀質陋侻考功員外郎宋之問曰童子何業述曰性嗜書所撰唐春秋三十篇恨未畢他惟命之問曰本求茂才乃得遷固遂上第述好譜學故於百氏源𣲖為詳撰開元譜二十篇張説領集賢院薦述為直學士遷起居舍人先是詔修六典徐堅搆意嵗餘未有所適及蕭嵩引述撰定述始摹周六官各領其屬事歸於職規制遂定初令狐德棻吳兢等撰武德以來國史皆不能成述因二家參以後事遂分紀傳又為例一篇文約事詳蕭穎士以為譙周陳壽之流改國子司業充集賢學士纍遷工部侍郎弟逌迪學業亦亞述述與逌對為學士與迪並禮官搢紳髙之唐書本傳于休烈志寧曾孫髙陵人機鑒融敏善文章開元初第進士又擢制科遷比部郎中肅宗立遷太常少卿知禮儀事兼修國史時經大盜後史籍燔缺休烈獻五代論討著舊章天子嘉之代宗立甄别名品拜右散騎常侍兼修國史纍進工部尚書封東海郡公雖歷清要不治産性恭儉仁愛無喜愠之容樂賢下善推轂士甚衆年老篤意經籍嗜學不厭卒年八十一諡曰元二子益肅及休烈一時相繼為翰林學士益天寶初及進士第肅終給事中肅子敖字蹈中擢進士元和初拜監察御史遷户部侍郎出為宣歙觀察使敖修謹家世用文學進四子圭球瓌琮皆清顯唐書于志寧傳于邵萬年人天寶末第進士以書判超絶補崇文校書郎由比部郎中為道州刺史未行徙巴州會嵗飢部獠亂薄城下邵勵兵拒戰且遣使諭曉獠丐降邵儒服出賊見皆拜即引去授兵部郎中俄以諌議大夫知制誥進禮部侍郎朝有大典册必出其手邵孝悌有行晚塗益修潔樊澤始舉賢良邵望見曰將相材也崔元翰舉進士年五十矣邵以其文擢異等曰後當司詔令已而皆然獨狐授舉博學宏詞吏部考當乙邵覆之置甲科人咨其公唐書本傳蘇源明武功人工文辭有名天寶間及進士第纍遷國子司業安祿山陷京師源明不受偽署肅宗復兩京擢考功郎中知制誥數陳政治得失後以祕書少監卒唐書本傳竇叔向字遺直京兆人代宗時常袞為相用為左拾遺內供奉袞貶亦出為溧水令四子登第羣以處士隱毗陵韋夏卿薦之朝德宗擢為左拾遺代武元衡為中丞羣與兄常牟弟庠鞏皆為郎工詞章為聮珠集傳於時義取昆弟若五星然全唐詩話韋綬貫之兄杜陵人舉孝廉又貢進士後擢明經德宗時以左補闕為翰林學士密政多所參逮以母老丐解職每請帝輒不悅出入八年性謹甚晚感心疾罷還第九月九日帝為黃菊歌顧左右曰可示韋綬即遣使持往綬遽奉和附使進帝曰為文不已豈頤養耶敕自今勿復爾終左散騎常侍弟纁有精識為士林器許兄弟皆名重當時唐書韋貫之傳韋顗字周仁諤弟益之子萬年人通陰陽象緯博知山川風俗論議典據以蔭補千牛備身歷御史補闕裴垍韋貫之李絳崔羣蕭俯皆布衣舊繼為相朝廷典章多所資逮纍遷御史中丞為户部侍郎徙吏部卒所著易緼解推演終始有深誼唐書韋湊傳杜牧字牧之悰從弟萬年人善屬文第進士舉賢良方正沈傳師表為江西團練府巡官又為牛僧孺淮南節度書記府擢監察御史拜殿中侍御史是時劉從諫守澤潞何進淹據魏博頗驕蹇不循法度牧追咎長慶以來朝廷措置亡術故作罪言歷黃池睦三州刺史入為司勳員外郎常兼史職復乞為湖州刺史遷中書舍人牧剛直有竒節敢論列大事指陳病利尤切至從兄悰更歷將相而牧困躓不自振卒年五十自為墓志悉取所為文章焚之牧於詩情致豪邁人號為小杜以别杜甫云弟顗字勝之幼病目母禁其為學舉進士禮部侍部賈餗曰得杜顗足敵百人李德裕奏為浙西府賔佐德裕貴盛賔客無敢忤惟顗數諌正之及謫袁州歎曰門下愛我皆如顗吾無今日太和末召直史館顗亦善屬文與牧相上下唐書本傳楊收字藏之世居馮翊父遺直德宗時仕為濠州參軍收七嵗而孤處喪若成人善屬文所賦輒就號神童及長博學強記他藝無不通解涔陽耕者得古鐘高尺餘收扣之曰此姑洗角也既劀拭有刻在兩欒果然嘗言琴通黃鍾姑洗無射三均側出諸調由蘿蔦附灌木然時有安涗者世稱善琴且知音收問五絃外其二云何曰世謂文武二王所加者收曰能為文王操乎涗即以黃鍾為宫而奏之以少商應大絃收曰如子言少商武絃也且文世安得武聲乎涗大驚因問樂意收乃取律次之以示涗涗時七十餘以為未始聞而收未冠也擢進士懿宗時纍擢中書舍人翰林學士承旨以中書侍郎同中書門下平章事始南蠻掠交趾調華人往屯涉氛瘴死者十七蠻勢益張收議豫章募士三萬置鎮南軍以拒蠻悉教踏張戰必注滿蠻不能支又峙食泛舟餉南海天子嘉其功進尚書右僕射楊玄價隂加短毁罷為宣歙觀察使詔賜死後三年詔復官子巨鏻巨乾寧初為翰林學士從入洛終散騎常侍鏻至户部尚書唐書本傳五代李懌京兆人少好學頗工文辭唐末舉進士為祕書省校書郎集賢校理天成中為中書舍人翰林學士纍遷尚書右承旨時右散騎常侍張文寶知貢舉所放進士中書有覆落者乃請下學士院作詩賦為貢舉格學士竇夢徵張礪等所作不工乃命懌為之懌笑曰豫少舉進士登科蓋偶然耳後生可畏來者未可量假令豫復就禮部試未必不落第安能與英俊為準格聞者多其知體遷刑部尚書分司洛陽卒五代史本傳宋李浣字日新濤弟萬年人幼聰敏慕王楊盧駱為文章後唐長興初吳越王錢鏐卒詔兵部侍郎楊凝式撰神道碑令浣代草凡萬餘言文彩遒麗時輩稱之晉天福中召為翰林學士契丹入汴浣陷塞北應厯十二年卒兄濤收浣文章編之為丁年集子承確主客郎中承續職方郎中宋史李濤傳安儼郃陽人父廷鐬工部郎中儼負竒節善屬文舉進士授大理評事刑平政理歷祕書省著作郎帝謂曰卿文章純粹為時名器宜懋乃德啓沃朕心加右司諌出知鄜州蘇州皆多良績同州志韓溥長安人唐相休之裔孫少俊敏善屬文周顯德初舉進士開寶三年自靜難軍掌書記召為監察御史三遷至庫部員外郎再轉司門郎中淳化二年被病表請辭職許之溥博學善持論詳練臺閣故事多知唐朝氏族與人談亹亹然可聽號為近世肉譜搢紳頗推重之尤善筆札人多藏其尺牘弟泊亦進士及第宋史本傳韓丕字太簡華州鄭人幼孤貧有志操讀書驪山嵩陽通周易禮記太平興國三年舉進士聲名藉甚嘗著孟母碑返魯頌人多諷誦之知河陽濠州丕起寒素以沖淡自處太宗甚嘉重之為翰林學士又出知滁州卒丕鈍厚畏愼歷典州郡能以清介自持宋史本傳楊礪字汝礪鄠人曾祖守信唐山南西道節度使祖知禮後唐均州刺史父仁儼永和令礪建隆中舉進士甲科父喪服除以祿不足養母間居無仕進意開寶九年詣闕獻書授隴州防禦推官真宗尹開封礪為推官真宗嘗問礪何年及第礪唯唯不對後知其唱名第一自悔失問謂礪不以科名自伐甚重之拜給事中判吏部未幾召入翰林為學士咸平初拜樞密副使卒真宗軫悼謂宰相曰礪介直清苦方當任用遽此淪謝即冒雨臨其喪礪僦舍委卷中乘輿不能進步至其第嗟憫久之礪為文無師法每詩一題或數十篇有文集二十卷子嶠祠部郎中嶧太常博士峭太子中舍少子嵎至道初刋校真宗儲邸書籍賜進士出身直史館宋史本傳陶榖字秀實邠州人本姓唐雍儉皆其逺祖因避晉祖諱而史為陶遂不復其舊父渙唐末仕至刺史為邠州帥楊崇本所害穀隨母育崇本家幼有俊才漢相李嵩竒之宋興歷禮刑户部三尚書宋之南郊法物制度皆其所定博記美詞翰滑稽好大言佛老之書隂陽之學亦能詳究隆平集宋湜字持正長安人曾祖擇牟平令祖贊萬年令父溫故左補闕叔溫舒職方員外郎湜幼警悟早孤與兄泌勵志篤學事母以孝聞溫舒典耀州湜侍行代作箋奏詞欽而麗溫舒拊背曰此兒真國器也太平興國五年進士釋褐將作監丞咸平元年充樞密副使卒諡忠定湜風貌秀整有醖藉器識沖逺好學美文詞筆法遒媚人多傳效喜引重後進有名者又好趨人之急當世士流翕然宗仰之有文集二十卷兄泌至起居郎直史館溫舒子沆州倅喜西京提點刑獄宋史本傳張宗永華州人倜儻不羈善為詩寶元中知建安縣時鄭州陳相尹京兆宗永以事失公意公有别業在鄠杜間宗永知公好絶句詩乘間詣之於舍壁大書二韻莊督録以聞公覽而善之宗永常有詩云大書文字隄防老剩買峰巒準備間佳句往往膾炙人口墨客揮犀李豸字方叔其先自鄆徙華豸少長以學問稱鄉里謁蘇軾於黃州贄文求知軾謂其筆墨瀾翻有飛沙走石之勢拊其背曰子之才萬人敵也豸再拜受教而家素貧三世未葬一夕撫枕流涕曰吾忠孝焉是學而親未葬何以學為旦而别軾軾解衣為助又作詩勸風義者於是不數年盡纍世之喪三十餘柩歸窆華山下益閉門讀書又數年再見軾軾閲其所著歎曰張耒秦觀之流也豸中年絶進取定居長社卒豸喜論古今治亂條暢曲折辨而中理當喧溷倉卒間如不經意睥睨而起落筆如飛馳元祐求言上忠諌書忠厚論並獻兵鑒二萬言論西事朝廷擒羌酋鬼章將致法豸深論利害以為殺之無益願從寬大當時韙其言宋史本傳金邊元鼎字德舉豐州人兄元勳元恕俱有時名號三邊德舉十嵗能詩天德三年第進士世宗即位張浩表薦供奉翰林德舉資稟踈俊詩文有高意時輩少及中州集黨懷英字世傑馮翊人大定年中進士第除翰林待制兼修國史能屬文工篆籀當時稱為第一學者宗之充遼史刋修官章宗即位旁求文學之士以備侍從謂宰臣曰近日制誥惟黨懷英最善再遷侍講學士承安二年致仕明年詔為翰林學士承旨卒諡文獻金史本傳景覃字伯仁華隂人年十八有賦聲大定初三赴廉試後以病不就舉博極羣書有問者立誦數百言不休又從而講説之為人誠實樂易不修威儀隱居西陽里以種樹為業落拓嗜酒醉則浩歌日以為常作詩有功樂府亦可傳伯仁老不廢書有勸以養目力者曰吾輩非讀書則無所用心要當死而後已耳晚年於易有所得年七十終於家自號渭濵野叟有集傳關中中州集杜佺字真卿武功人有詩名於關中以五言百韻上乾州通判馬涓涓大加賞異阜昌中登科蒞官亦有聲馬嵬太真墓過客題詩甚多道陵詔録其詩得五百餘首付詞臣第之真卿詩在髙等舊有錦溪集亂後不復見矣子師楊亦能詩尤工書翰中州集張建字吉甫蒲城人明昌初舉才行授絳州教官召為應奉翰林文字以老乞身道陵愛其淳素不欲令去左右眷眷久之超同知華州防禦使事仍賜詩士林榮之吉甫自號蘭泉老人有集行於世其論詩云作詩不論長篇短韻須要詞理具足不欠不餘如荷上灑水散為露珠大者如豆小者如粟細者如塵一一看之無不圓成始為盡善吉甫詩雖不能盡如所言然亦未為無所得也金史本傳華州楊庭秀學詩於吉甫有集行世華州志李端甫字濟夫同州人第進士仕為平定軍事判官工於詩有虎迹未乾溪水近樵聲相答嶺雲深之句中州集雷琯字伯威坊州人以薦書從事史館博學能文時輩少有及者并州人李汾與伯威同在史館以高蹇得罪伯威作詩送之頗譏翰林諸人不能少忍至與一書生相角逐使之狼狽而去有郎君未及留商隱官長從教罵廣文之句又云明日春風一杯酒與君同酹信陵墳人甚稱之中州集馮辰字駕之臨潼人貞祐三年進士九嵗知作詩金史本傳元郝鼎臣字巨卿韓城人博識洽聞文章光艷名重當時泰和八年占京兆府試擢巍科金衰流落之汴元丞相耶律公為董軍國事適汴張宴以待四方之士於是入謁大加歎賞鼎臣戊戌年京兆府學置貢院於三場內俱登魁甲尤長詞賦充本省參議兼提舉學校事嶽菘撰墓志唐富平人元進士博極羣書抱負宏博學者翕然宗之稱犀峰先生富平志第五昌言富平人博通經書為奉元路儒學學正賈志董立字植夫以明經中經元隱居教授徵拜翰林修撰輔導儲副遷司業以績著纍擢陜西行臺侍御史卒諡文定雍大記眀郭良字文易華陰人洪武中舉人為邯鄲教諭上幸國學覩所作教世子詩忠愛懇至擢北平參議永樂中征安南功加大司馬督理漕運退隱明志結廬羅敷山中雅善吟詠嘗與解大紳競敏有詩集數卷賈志趙璧字子深醴泉人沈靜好學綜攬百家尤精於大學章句洪武時辟本學訓導賈志劉順字孝夫富平人天資英慧少家貧嘗灌園養母遇方士授以易遂大有文名搆文時以木畫地代紙筆嵗不給嘗負米同官山中值縣尹索諸士子章莫應也乃授粲於順援筆立成尹竒之督學者列高等薦於鄉為夏縣知縣衣不掩膝道義朴直卓有躬行君子之風賈志魏浩咸陽人隱居龍巖號龍巖先生博聞強識綜貫百家尤長於詩賦又同里李儼號渭濵散人性剛直嗜學通經鄉先生劉源授以大易圖序遂明數學吉凶無不應所著有擊壤後塵十卷馬志雷霖字𢎞濟華隂人景泰中解元會試第二歷提學副使詩文豪宕為時名宿西安府志王九思字敬夫鄠人𢎞治丙辰進士李東陽當國為清新流麗之詩和平暢達之文士林宗尚九思亦學其體考選庶吉士契東陽意遂得選首授翰林檢討及李夢陽起而倡古文辭九思一洗舊習從之東陽以其文異己出為夀州同知至則與州人士評説古文辭州人士翕然樂向九思間美風流不拘禮節而談笑有韻下及艷曲小令亦皆新竒工美極人情之致名山藏張鳯翔字光世洵陽人𢎞治己未進士官户部主事光世生有異質落筆千萬言左手橫書瞬息滿紙與李獻吉同舉於鄉又同官户部王公大人求識面者無虛日聲名出李上而光世故推李兄事之光世卒母七十餘嵗子七嵗獻吉上書孝宗請養贍其母妻孝宗仁聖遂允行焉列朝詩集侯自眀白水人𢎞治中進士幼聰慧長與康海王九思何景明吕柟遊博學能詩文善草書以地曹主事忤逆瑾謫安慶判時值劉六等寇襄樊浮江漢自明預畫密計以一矢斃渠魁皖城士制册頌之官至敘瀘兵備賈志康鏞字振逺武功人八九嵗即孝友善文辭有所著述長老爭紀頌之弱冠益深明事理曰序述不若馬遷理辨不若孟軻功澤不若伊傅是未可已矣以嵗貢為平陽府知事卒墓志子海字德涵𢎞治壬戌進士及第第一人授翰林修撰夙稟靈秀不事章句掇採旨奧融通大義而已嘗曰經籍古人之魄也有魂焉吾得其魂爾矣論道則以無定為真論學則以適用為是論文則以達質為良劉瑾用事以海鄉人欲致之海常自疏濶其後李夢陽下獄瑾幾殺之矣夢陽妻弟曰左國玉者為書通海乞請劉生之海謝國玉曰我固自逺於劉太監乃何惜生李子即上馬馳至瑾門門者阻之海曰我康狀元乃公里人瑾聞即攝衣出迎坐海上坐留海飲海談笑睨瑾曰自古三秦豪傑有幾瑾愕然曰惟先生教之海曰昔桓溫問王猛三秦豪傑何以不至猛捫虱而談世務三秦豪傑舍猛其誰溫暗若此哉瑾面發赤疑其譏已因問曰於今則幾海默然屈指曰三人爾昔王三原秉銓衡進賢退不肖今則有密勿親信在帝左右瑾意指已轉發喜色因復問曰尚有一人其先生乎無謂王猛在前而吾不識海曰公何謬稱其一人者今李白也海卑卑耳瑾固問則曰昔曹操憎禰衡假手黃祖此姦雄小智李白醉使髙力士脫靴可謂輕傲力士力士脫而不辭容物大度也瑾俯首思曰先生豈謂李夢陽耶此人罪當誅海即起辭瑾謝曰我知我知明日入奏出夢陽瑾諷海欲以為吏部侍郎海固辭自是時時有匡正而亦自是益親瑾敗坐瑾黨奪官為民名山藏德涵既罷免以山水聲伎自娛間作樂府小令使青衣被之管絃歌以侑觴楊侍郎廷儀過滸西留飲甚歡自起彈琵琶勸酒楊言家兄在內閣殊相念何不以尺書通問德涵怒擲琵琶撞之楊走追而罵曰吾豈效王維假作伶人借琵琶討官做耶歸田三十餘年其殁也遺囊蕭然大小鼓却有三百副其風致可思也阜字德瞻德涵兄時有神童之目卒年十九栗字子寬德涵子為武功縣學生年二十二而夭有詩百餘篇王渼陂其婦翁為序而刻之列朝詩集張治道字孟獨長安人穎記絶人為諸生率試高等又嫻於詩賦議論如懸河而性剛氣豪尚竒節一時咸推服之正德甲戌登進士授長垣令三年以治行擢授刑部主事與部僚薛蕙劉儲秀胡侍並以詩名都下號西翰林夢其母病乃上疏引疾歸遂不復仕一意讀書為文章與王九思康海一見語合數與縱論詩文遨遊終南鄠杜間遇山水勝處輒命酒歌咏或語及天人古今之際浩渺閎肆時人莫測也家居四十年著述甚富丘隅集馬汝驥字仲房綏德州人正德丁丑進士選翰林庶吉士正德己卯當授官值威武南巡率同館士六七人赴闕請止罰跪闕下五日拜杖出知澤州世廟即位録諫官召還為編修歷升禮部右侍郎上方興禮樂諸公日聚講議仲房遇集議矢口駁正斧劈理解分宜數言之上前將大拜以病卒官有西元詩集列朝詩集仲房生平最工文辭尤練習典故論者謂不愧詞臣之選云賈志王謳字舜夫白水人正德丁丑進士纍官按察司僉事鎮宣府引疾歸卒舜夫風神散朗負氣任俠有髙才而無貴仕故多煩促噍殺之音五言隱秀時可尋味七言専力學杜詩曰彭衙集自正德戊寅逮嘉靖丙戌才九年所作近千六百篇列朝詩集王維楨字允寧又號槐野華隂人嘉靖乙未進士選庶吉士歷翰林侍讀乞養母不許遷南國子祭酒便道省母會關中地大震遂殁維楨之文豁達疏宕若泓瀾流江明霞赬天入門學司馬子長推尊鄉先達李夢陽躋之聖境其始載筆承明修賦頌之業海內宗重居十餘年戎馬生郊與士大夫講方略論戰守又自言其為人淺中狹氣戇直朴略平生未嘗倒心反舌亂是非淆曲直嘗論士大夫處世當勉立功業懷仁義之實以振靡敝而救瘡痍其有志當世可知也與南禮部尚書孫升善升序其文曰王子産二華之奧區所云嶽降不虛矣名山藏允寧長大白晳諳知九邊要害扼腕時事慷慨悲壯為文好太史公盱衡抵掌沾沾自喜論詩服膺少陵自謂獨得神解尤深於七言近體列朝詩集時有臨潼趙統者字伯一與槐野同舉進士才名相與頡頏官户部郎中罷歸被誣繫獄幾二十年日以著述為事積稿二竹麓所傳有驪山集等書賈志趙天秩字仲禮朝邑人生而姿稟厚重六嵗時父世榮遣其兄天敘就學秩欲往不許乃不食終日卒遣之由是誦讀恆達旦先是世榮從同里韓邦竒學邦竒歸自晉陽秩年始十五請從遊世榮謂其幼無受教地固請得學焉始至邦竒示以春秋論式數日後課一文即單襄公論陳亡體也大竒之又命治尚書不十五日已精熟試以義若老於尚書者於書一過輒記五經子史無不淹洽顧尤精易占為學益勤坐室中足不踰閾同學者或笑語移時即去之曰光隂可惜也邦竒將以次盡傳其學癸卯冬竟卒兄天敘亦以竒童得名以是冬先秩卒初秩母馬氏夢二紫龍入室即飛去生二子皆負異才而早夭其徵蓋不爽云苑落集胡廷器字含素三原人聰穎夙成博覽羣籍旁及書畫無不精妙與同縣梁爾升相友善爾升字君旭有元扈山房文集行世三原志李蘭字幼滋咸寧人幼聰敏有神童之目舉進士官户曹員外郎督通州糧儲以讒歸所著詩文樂府皆傳於世咸寧志盧拱極字顒甫郃陽人秉姿竒傑嗜學博覽為文奧抉理窟與三原溫恭毅純相友善溫公當稱之曰盧公之文可與定性之書並傳其見重如此性端嚴不茍舉德行者九隆慶時應首貢讓與同學生任守成守成者孝子也鄉里稱之萬厯八年乃貢纍官韓王府審理正告歸子巨環亦有文名能世其學宰莘退食録劉士龍字甫化富平人萬厯癸卯解元博學善屬文隱居盤龍寺凡經史子籍悉手録評次幾與身等南北宿師大儒皆服其精治躬嚴謹與人交有汪洋萬頃之度著有上楊制臺藿議宋書經濟禦寇策與諸遊記香律月令等集行世賈志南師仲字子興渭南人萬厯乙未進士天資穎異善古文詞讀中祕書己酉典試留都得人稱盛拜南大宗伯師仲質素癯腰不滿圍隔膜見腑臟而目精炯爍神氣倍旺燃藜校録至夜分不倦所撰制詞倣伊訓虺誥不作近來體賈志張學道字致卿長安人自稱竹逸山人聰穎好學於書無所不窺尤長於詩所著有緑雲山房稿國華録數卷賈志趙崡字子函一字屛國盩厔人萬厯己酉舉人家有傲山樓藏書萬卷所居近周秦漢唐故都古金石名書多在時跨一驢挂偏提拓工挾楮墨以從每遇片石闕文必坐卧其下手剔苔蘚椎拓裝潢援據考證略仿歐陽公趙明誠洪丞相三家名曰石墨鐫華自謂窮三十年之力多都元敬楊用修所未見也隴蜀餘聞文翔鳯字天瑞三水人萬厯庚戌進士以副使提學山西入為光祿少卿不赴卒於家其論學以事天為極力排西來之教著太微以翼易謂太玄濳虛未窺其藩以辭賦為専門絶業覃思腐毫必欲追配古人作金陵六賦以當京都其為詩離竒奡兀不經繩削馳騁其才力可與唐之劉乂馬異角竒鬭險晚作嘉蓮詩七言近體至四百餘首亦古所未有也列朝詩集弟育鳯字太􅶑萬厯間舉人授武城令心慕絃歌廣敷道化未幾奉母西歸結廬於終南之御宿川隱焉笑傲山水日與諸弟子講論勿輟著有渺園集琳園集學水園草三水志來復字陽伯三原人萬厯丙辰進士為詩文敏捷如風為人重氣好客泛交道廣有聲薦紳間起家户部郎歷官布政使兵備揚州歸田病卒陽伯性通慧詩文書畫之外琴棋劍器百工伎藝無不通曉有詩集十餘卷列朝詩集臨字馭仲復弟也博學宏才二難齊名以明經任屯留縣升蔚州守歸里有叢筀齋集三十卷三原志文運開字時泰三水人少有才思博雅為一時之冠數竒不第萬厯中授漢中訓導課士有方升冀州學正以疾歸所至吟咏盈篋著江漢集京野集以詩學世其家三水多習詩皆其傳也賈志解引樾字拙存韓城人天啓戊辰進士授翰林編修為人孝友真摯雄才博學不可一世闖賊入關隱居太華龍門間讀書不輟稱韓山樵隱或龍門逸史與揚州姚思孝時相往復有逸史二老之目所著素位篇華遊草名勝志淡園稿諸書自為墓志以終韓城志郭宗昌字胤伯華州人闢沚園白崖湖上地介二華之間造一舟居之曰齋舫自謂一水盈盈與世都絶磊落﨑嶔任心獨往又有别業在鄭南即杜子美西溪與其友王承之東廕商為南玼社著園藏六齋疏二戎記諸書趙忠毅陳徵君序之以為似先秦古策周官考工記逺公宗雷八關齋文也又著金石史隴蜀餘聞王承之字季安著有水陽秋諸書賈志黨忠富平人以舉人訓磁州遷榆次諭勤學博問盛寒暑誦讀不輟故能淹貫六籍尤長於詩下至法律靡不究心升伊府審理富平志曹森字儼然蒲城人少嗜學性直而謙博極羣書虛懷下問老而不倦著有道學源流名臣經濟會心編三索元珠等書賈志康國相字芝函郃陽人弱冠負文名萬厯戊午舉於鄉崇禎時上封事兵部尚書梁廷棟召與語竒之稱為文海武庫顧不能用後知藁城罷歸晚年學益力文益離竒不測著述甚多遭冦亂燬於兵宰莘退食録許傑咸陽人學不師授自解孝經論語及史鑑諸書尤長詩歌自成一家鄉社子弟多所起發周貧恤孤尊賢敬老有遺藁數卷傳里中賈志按三秦為神臯奧區人文淵藪生斯地者類多閎通博洽之士足以鼓吹休明潤色鴻業今按其世次列傳如左至於龜文鳥迹肇自史皇玉筯雲頭盛於史籀關中字學厥有源流後人得其遺意而六書八體各自成家者固代有傳人未易更僕數也今並附載於後以見人文之盛焉如秦則有胡母敬櫟陽獄吏為太史令博識古文改大篆朱文長書評程邈下邽人始為縣吏得罪始皇幽繫雲陽獄益小篆方圓而為𨽻書三千字奏之始皇善之命為御史以奏事繁多篆字難成乃用𨽻字以為𨽻人佐書故曰𨽻書張懷瓘書斷漢則有秋胡杜陵人能通尚書善為古𨽻字西京雜記杜操京兆人以善書知名庾肩吾書品曹喜扶風人善篆𨽻小異李斯見師一時法書要録徐幹字伯張平陵人官至班超軍司馬善章草書班固與超書稱之曰近得伯張書稿勢殊工知識讀之莫不歎息書斷杜度杜陵人漢興而有草書不知作者姓名至章帝時有齊相杜度號善作字甚安而書體微瘦四體書勢張芝字伯英及弟昶字文舒並善草書後漢書張奐傳芝少持髙操太尉辟公車有道徵皆不至號張有道尤好草書學崔杜之法家之衣帛必書而後練臨池學書水為之黑下筆為楷則匆匆不暇草書為世所寶寸紙不遺韋仲將謂之草聖本傳注文舒書類伯英時人謂之亞聖王僧虔書録蘇班平陵人五嵗能書甚為張伯英所歎趙襲字元嗣長安人為燉煌太守與羅暉並以能草見重關西羅暉杜陵人官羽林監善草書著聞三輔張伯英自謂方之有餘與太僕朱賜書云上比崔杜不足下方羅趙有餘朱賜杜陵人時稱工書書斷三國則有韋誕字仲將京兆人有文采善屬詞章以光祿大夫遜位文章敘録誕服膺於張伯英兼學邯鄲淳之法諸書並善題署尤精八分𨽻書章草飛白入妙小篆入能兄康字元將工書子熊字季少亦善書書斷北魏則有王世弼霸城人善草𨽻書好愛典墳歷官中山內史次子由字茂道好學有文才尤善草𨽻性方厚有名士之風又工摹畫為時人所服歷東萊太守魏書本傳唐則有王睃咸陽人工書知名尤善琴棋性嚴整官殿中侍御史舊唐書王方慶傳盧藏用長安人官黃門侍郎𨽻行草入能書斷衛包京兆人官尚書郎工八分小篆其作字點畫不妄發落筆必左規右矩以倒薤篆書鷦鷯賦信由積學所致故為書品所録宣和書譜五代時則有楊凝式華隂人善文詞出時輩右喜作字尤工顚草居洛下十年凡琳宫佛祠墻壁間題紀殆遍書譜宋則有李元直長安人學篆書數十年覃思甚苦曉字法得古意用鐮銛筆縱手疾書通叔其字云東坡題跋明則有周宇西安左衛人嘉靖己酉舉人官户部主事博雅不羣精識古文竒字善臨池草書為世所重咸寧志文在兹字少元三水人萬厯辛丑進士善八分楷書三水志牛中麒字大徵武功人工書得者重如拱璧武功志本朝李楷字叔則朝邑人楷少聰慧嗜古學讀書朝萊山遇異人馬顚仙謂當以文章名世天啓甲子登賢書屢上春官不第嘗築樓髙數丈許屏居其上命書估日送圖史手自評隲學殖益富國初知寶應縣縣時改𨽻淮郡楷力請歸揚得罷解草米各項嵗省民財萬計政暇則訪古選勝題詠殆遍解官後流寓廣陵幾二十載與江西李明睿著二李珏書久之歸里值制府修陜省通志延至會城郊迎之楷長揖上座縱飲揮毫當事咸屬目尤工書畫旁及釋典道藏著河濵全書一百卷雷于霖字午天朝邑人崇禎癸酉舉人性至孝親殁哀毁幾不終喪嗜古學為文竒挺聲譽翕集流冦之亂倡衆築堡以守多所全活順治三年土人不靖縱暴入城縣令走匿于霖以兵法部勒堡衆擁令入城事遂定睢州湯斌為潼關兵備雅慕之知不可屈時造廬論道學之要所著有孝經神授篇西銘續生篇太極圖説柏林集别世言河濵李楷稱其文以膽勝東蔭商字雲雛華州人舉崇禎丙子鄉試意氣遒上學問淹通詩文咸有法度尤好書畫精鑒賞所至多傾倒有集十卷華山經一卷臆略十卷韓詩字聖秋三原人崇禎己卯舉人官至兵部郎學問淵邃詩文頴異寓居江南交遊皆知名士講藝課業孜孜不倦尤矜尚氣節著有學古集明文西行世張恂字稚恭涇陽人幼機警甫冠即盡發先世所藏書鍵户篝燈百讀不厭又博綜詩學稍暇輒倣法書名畫落筆都似為通人所賞崇禎癸未成進士會逆闖踞關中恂聞變遁迹壺山順治二年以先世策鹺維揚思整舊業遂南遊𨝍上遍交吳越諸名士十二年補授中書舍人世祖稔其名以工畫命兼給事毫素嘗有故人中隙者久之復來謁恂歡然道故其人方三喪未葬子女婚嫁俱未辦恂立揮五百金以贈人以是知其長者暮年尤工繪事天趣盎然客至則飛觴賦詩家人以有無告不問也所著有樵山堂詩西松館詩及雪鴻草詩文共如干卷孫爾思字睿生西安人順治丙戌舉於鄉授鳯翔教諭嘗攝邑篆剖疑決獄邑稱神君蜀撫李國英稔其才請於朝欲授以順慶司李不果爾思性坦易世味泊如家居臨灞岸日徜徉山水間有得即録置奚囊中久之成帙所傳有灞上集劉漢客字石生宜川人順治甲午貢生少倜儻英邁博極子史為文深奧古卓詩歌書法皆絶人性剛方不容人過然樂與人談詩文及古今興廢娓娓不倦交遊盡一時名宿嘗與修陜西通志所著詩文多行世溫樹珖字虞白三原人順治丁亥進士授堂邑令甫三月罷歸家居事親備極色養寧夏巡撫黃圖安稔其才欲薦之樹珖以親老辭不赴性好學嘗取天文地志國典及河漕關𣙜兵防刑法諸書精核條列之為用世具甲寅乙卯間秦中不靖樹珖倡邑人修城浚壕集鄉勇為守禦踰年卒人知其用之未竟也子德嘉康熙戊午舉人讀書好大略有經世志杜恆燦字蒼舒三原人八嵗能文年十七補弟子員值冦亂家中落嘗走四方負米養親鄉試中副車遂入太學名益噪念老親家居食貧因策蹇南遊時時得巨公詩文及珍玩錦綺物歸夀其親親大悅先是恆燦居京師與中翰吳煒交相得同訂觀文大社以振興古學為志及煒使關中過焦穫復廣其社於邑中學古書院煒去恆燦主盟學者多宗之長安梁化鳯鎮崇明遣迎恆燦既至化鳯以堤成出獵恆燦陪副乘即事作平洋沙十章化鳯立命譜入鐃歌持千金起為夀歡聲溢軍中尋遊楚遊滇復入吳久之歸卒恆燦性好客所居濵白渠南車騎冠蓋恆輻輳每酒酣耳熱潑墨揮毫無不厭所欲而去一夕悉焚所著書弟焴急起收之得詩文如千篇今所傳春樹草堂集也李念慈字劬菴涇陽人順治戊戌進士初授推官改知縣緣逋賦事罷歸康熙十三年滇逆作亂大兵駐荆襄念慈捧檄入楚以儹運有勞再補天門知縣十七年舉博學宏詞科復報罷遂絶意仕進念慈好吟咏詩酒唱酬一時諸名士皆傾倒所歷幕府爭延禮為上客揮毫潑墨灑如也少拂意立去之著有谷口集張調燮字元宰咸陽嵗貢生嗜學能文著有秋水編行世王豫嘉字建侯扶風人順治辛丑進士改庶常歷官至翰林侍讀天性純孝年十四父病嘗藥惟謹入史館父病漸劇豫嘉亟請假歸日夜侍奉衣不解帶者幾二載父殁哀毁骨立服闋赴補安輿迎母張於京邸張思鄉旋復告歸母卒居喪盡禮乙卯王輔臣兵變關陜大震大學士熊賜履詣直廬握手問策豫嘉曰賊無能為使其長驅出棧直趨長安則成敗未可知今卷旗返平涼不過為自守計此成擒耳因為借箸陳扼塞控禦策旬月果平生平砥廉隅維風俗博極典籍長於書法所著有詩古文詞甚富李柏字雪木郿縣人九嵗失怙事母至孝雖備歷艱辛而色養不衰初入邑庠食餼後避荒居洋縣入太白山中屏迹讀書者數十年其學貫穿百家勃窣理窟與朝邑李楷富平李因篤齊名稱關中三李性恬淡甘貧樂志自制府以下咸慕其才希一顧以為重同邑馮雲程事母至孝稍長治舉子業有聲順治戊子以選拔入成均授賔州判甫半載即以病乞歸里與李柏相得日徜徉山水間倡和甚適性剛介閭里有不平事必昌言力持之嘗自詫曰豫一身無長物止餘徑骨少許耳無子一女適徴士李顒子愼言晚年恆寓居二曲云孫枝蔚字豹人三原人性豪宕敦氣節博學工詩明末逆闖踞關中枝蔚感激時勢謀結鄉曲諸豪士起義討賊卒不果後遂南遊吳下流寓𨝍關以詩酒自娛遍交吳越諸名宿筆牀硯匣倡和無虛日康熙十七年舉博學宏詞入都以年老求免試不許及試被落南歸會詔下吏部令視與試諸人有年髙學贍者授京銜以寵其行部擬初授正字特授內閣中書舍人以歸枝蔚為詩沈雄竒古興至即書不事雕飾而意致灑如其自命在韓杜蘇杜諸公間餘子不屑也所著有溉堂集如干卷李因篤字子德富平人年十一為邑諸生丁明季之亂遂謝去肆力為古文辭尤長於詩歌嘗遊長安倣少陵作秋興詩八首見者多擊節時往來秦晉間過從悉知名士崑山顧炎武其尤也康熙十七年詔集諸儒纂修明史廷臣以因篤名上十八年授翰林院檢討未兩月即疏乞終養疏略曰臣母年踰七旬屬嵗多病隨經具呈吏部吏部謂稱親援病恐有推諉竊思已病或可偽言親老豈容假托臣雖極愚不肖詎忍藉口所生指為推卸之端臣仰圖報君俯迫諗母欲留不可欲去未能瞻望闕廷進退維谷疏三十七上始允歸抵家後寢食湯藥每事躬親越五年母殁遂不復仕性敏絶博極羣書又好汲引後學問字者無虛刻或有過必婉詞規勉未嘗以聲色加人顧炎武嘗集杜句題贈云文章來國士忠厚與鄉人蓋實録也生平著述甚富有文集十五卷詩集三十五卷廣韻正四卷行世劉汸字學海三原人幼聰穎讀書一過輒記長益奧衍學使吕雲藻薦於朝徴之不起所著有簷曝瑣言八卷蓬忩雜詠十卷劉爾字雪石中部人十嵗能屬文博極羣書結廬西山之唐峪洞率妻子力耕自給歷二十年徵隱逸不就又徵博學宏詞仍力辭不赴會延守陳天植延爾與安塞貢生韓一識同修郡志詞理簡嚴論者稱美韓亦有文名其才識與爾相伯仲云康乃心字太乙郃陽人少善屬文試輒冠其曹工詩甫脫稿即逺近傳播居恆敦孝友慕節義進退辭讓一以古聖賢為凖康熙乙卯舉於鄉庚辰春試不第諸大臣欲薦之固辭歸里四十二年大駕西巡駐潼關問關中經明行修之士韓城劉蔭樞以乃心名奏上首肯久之家素貧與諸弟侄同居食指六十餘人朝夕拮據而意致灑如嘗慨前賢遺迹湮廢為樹碑作傳記無虛日著有毛詩箋莘野集太乙子韓城平遙志若干卷生平與咸寧嵗貢楊生芝交最洽生芝字時發亦學行兼優之士也李國瑾字玉衡府谷舉人由寧州學正升國子監典簿貧不能買書日取國學經史板摩娑讀之手爪盡黑久而淹貫為世名儒嘗居佛寺日惟炊俸米一飯冬夜無火與一老僕共披敝裘而坐著有石花魚賦甚佳終大理司務陜西通志卷六十三
