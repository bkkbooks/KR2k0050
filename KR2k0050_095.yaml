髣佛仍佇想幽期如眼前金天有清廟松柏隱蒼然登太白峰李白西上太白峰夕陽窮登攀太白與我語為我開天關願乘冷風去直出一作上浮雲間舉手可近月前行若無山一别武功去何時復見還春陪商州裴使君遊石娥溪時欲東歸遂有此贈前人裴公有仙標拔俗數千丈淡蕩滄洲雲飄颻紫霞想剖竹商洛間政成心已間蕭條出世表冥寂閉玄關我來屬芳節解榻時相悅搴帷對雲峰揚袂指松雪暫出東城邊遂遊西巖前橫天聳翠壁噴壑鳴紅泉尋幽殊未歇愛此春光發溪傍饒名花石上有好月命駕歸去來露華生翠苔淹留惜將晚復聽清猿哀清猿斷人腸遊子思故鄉明發首東路此歡焉可忘望終南寄紫閣隱者前人出門見南山引領意無限秀色難為名蒼翠日在眼有時白雲起天際自舒卷心中與之然託興每不淺何當造幽人滅迹棲絶巘登樂遊廟作韋應物髙原出東城一一見咸陽上有千載事乃自漢宣皇頽壖久凌遲陳迹翳丘荒春草雖復緑驚風但飄揚周覽京城內雙闕起中央微鐘何處來暮色忽蒼蒼歌吹喧萬井車馬塞康莊昔人豈不爾百世同一傷歸當守沖漠迹寓心自忘因假歸白閣西草堂岑參雷聲傍太白雨在八九峰東望白閣峰半入紫閣松勝槩紛滿目衡門趣彌濃幸有數畝田得延二仲蹤早聞達士語偶與心相通誤徇一微官還山愧塵容釣竿不復把野碓無人舂惆悵飛鳥盡南溪聞夜鐘終南雲際精舍尋法澄上人不遇歸髙冠東潭石淙望秦嶺微雨作貽友人前人昨夜雲際宿旦從西峰回不見林中僧微雨潭上來諸峰皆晴翠秦嶺獨不開石鼓有時鳴秦王安在哉東南雲開處突兀獮猴臺崕口懸瀑流半宫白皚皚噴壁四時雨傍村終日雷北瞻長安道日夕多塵埃若訪張仲蔚衡門滿蒿萊與髙適薛據登慈恩寺浮圖前人塔勢如湧出孤髙聳天宫登臨出世界磴道盤虛空突兀壓神州崢嶸如鬼工四角礙白日七層摩蒼穹下窺指髙鳥俯聽聞驚風連山若波濤奔湊似朝東青槐夾馳道宫館何玲瓏秋色從西來蒼然滿關中五陵百原上萬古青濛濛淨理了可悟勝因夙所宗誓將挂冠去覺道資無窮同薛司直諸公秋霽曲江俯見南山作髙適南山鬱初霽曲江湛不流若臨瑶池前想望崑崙丘回首見黛色眇然波上秋深沈俯崢嶸清淺延阻修連潭萬木影插岸千巖幽杳靄信難測淵淪無暗投片雲對漁父獨鳥隨虛舟我心寄青霞世事慙白鷗得意在乘興忘懷非外求良辰自多暇欣與數子遊玉華宫杜甫溪回松風長蒼鼠竄古瓦不知何王殿遺構絶壁下隂房鬼火青壞道哀湍瀉萬籟真笙竽秋色正瀟灑美人為黃土况乃粉黛假當時侍金輿故物獨石馬憂來藉草坐浩歌淚盈把冉冉征途間誰是長年者九成宫前人蒼山入百里岸斷如杵臼層宫慿風回岌嶪土囊口立神扶棟梁鑿翠開户牖其陽産靈芝其隂宿牛斗紛披長松倒揭􅣈怪石走哀猿啼一聲客淚迸林藪荒哉隋家帝製此今頽朽向使國不亡焉為巨唐有雖無新增修尚置官居守巡非瑤水遠迹是雕牆後我行屬時危仰望嗟嘆久天王狩太白駐馬更搔一作回首渼陂西南臺前人髙臺面蒼陂六月風日冷蒹葭離披去天水相與永懷新目似擊接要心已領仿像識鮫人空蒙辨魚艇錯磨終南翠顛倒白閣影崷崒增光輝乘陵惜俄頃勞生愧嚴鄭外物慕張邴世復輕驊騮吾甘雜蛙黽知歸俗可忽取適事莫並身退豈待官老來苦便靜况資菱芡足庶結茅茨逈從此具扁舟彌年逐清景三川觀水漲二十韻前人我經華原來不復見平陸北上惟土山連天走窮谷火雲無時出飛電常在目自多窮岫雨行潦相豗蹙蓊匌川氣黃羣流會空曲清晨望髙浪忽謂雲崕踣恐泥竄蛟龍登危聚麋鹿枯查卷拔樹礧磈共充塞聲吹鬼神下世閲人代速不有萬穴歸何以尊四瀆及觀泉源漲反懼江海覆漂沙坼岸去潄壑松柏禿乘陵破山門回斡裂地軸交洛赴洪河及關豈信宿應沈數州沒如聽萬室哭穢濁殊未清風濤怒猶蓄何時通舟車隂氣不黲黷浮生有蕩汩吾道正羈束人寰難容身石壁滑側足雲電屯不已艱險路更局普天無川梁欲濟願水縮西志中林士未脫衆魚腹舉頭向蒼天安得騎鴻鵠同諸公登慈恩寺塔前人髙標跨蒼穹烈風無時休自非曠士懷登兹翻百憂方知象教力足可追冥搜仰穿龍蛇窟始出枝撑幽七星在北户河漢聲西流羲和鞭白日少昊行清秋秦山忽破碎涇渭不可求俯視但一氣焉能辨皇州回首呌虞舜蒼梧雲正愁惜哉瑤池飲日晏昆崘丘黃鵠去不息哀鳴何所投君看隨陽雁各有稻粱謀飛仙閣在略陽東南四十里前人土門山行窄微徑緣秋毫棧雲闌干峻梯石結構牢萬壑欹疏林積隂帶奔濤寒日外淡泊長風中怒號歇鞍在地底始覺所歷髙往來雜坐卧人馬同疲勞浮生有定分飢飽豈可逃歎息謂妻子我何隨汝曹彭衙行前人憶昔避賊初北走經險艱夜深彭衙道月照白水山盡室久徒步逢人多厚顔參差谷鳥吟不見遊子還癡女飢咬我啼畏猛虎聞懷中掩其口反側聲愈嗔小兒強解事故索苦李餐一旬半雷雨泥濘相牽攀既無禦雨備徑滑衣又寒有時經契濶竟日數里間野果充餱糧卑枝成屋椽早行石上水暮宿天邊煙少留周家窪欲出蘆子關故人有孫宰髙義薄層雲延客已曛黑張燈啓重門暖湯濯我足剪紙招我魂從此出妻孥相視涕闌干衆雛爛漫睡喚起霑盤飧誓將與夫子永結為弟昆遂空所坐堂安居奉我歡誰肯艱難際豁達露心肝别來歲月周胡羯仍搆患何當有翅翎飛去墮爾前奉同郭給事湯東靈湫作驪山溫湯之東有龍湫前人東山氣鴻濛宫殿居上頭君來必十月樹羽臨九州隂火煮玉泉噴薄漲巖幽有時浴赤日光抱空中樓閬風入轍迹曠原延冥搜沸天萬乘動觀水百丈湫幽靈斯可怪王命官屬休初聞龍用壯擘石摧林丘中夜窟宅改移因風雨秋倒懸瑤池影屈注蒼江流味如甘露漿揮弄滑且柔翠旗淡偃蹇雲車紛少留簫鼓蕩四溟異香泱漭浮鮫人獻微綃曾祝沈豪牛百祥奔明盛古先莫能儔坡陀金蝦蟇出見蓋有由至尊顧之笑王母不肯一作遣收復歸虛無底化作長黃虬飄飄青瑣郎文彩珊瑚鉤浩歌淥水曲清絶聽者愁登長城李益漢家今上郡秦塞古長城有日雲長慘無風沙自驚當今聖天子不戰四夷平終南山韓愈吾聞京城南茲惟羣山囿東西兩際海巨細難悉究山經及地志茫昧非受授團辭試提挈挂一念萬漏欲休諒不能粗敘所經覯嘗升崇丘望戢戢見相湊晴明出稜角縷脈碎分繡蒸嵐相澒洞表裏忽通透無風自飄簸融液煦柔茂橫雲時平凝點點露數岫天空浮修眉濃緑畫新就孤撑有巉絶海浴褰鵬噣春陽潛沮洳濯濯吐深秀崖巒雖嵂崒軟弱類含酎夏炎百木盛蔭鬱增埋覆神靈日歊歔雲氣爭結構秋霜喜刻轢磔卓立癯瘦參差相疊重剛耿陵宇宙冬行雖幽墨冰雪工琢鏤新曦照危峩億丈恆髙袤明昏無停態頃刻異狀候西南雄太白突起莫間簉藩都配德運分宅占丁戊逍遙越坤位詆訐陷乾竇空虛寒兢兢風氣較搜潄朱維方燒日隂霰縱騰糅昆明大池北去覿偶晴晝綿聯窮俯視倒側困清漚微瀾動水面踊躍躁猱狖驚呼惜破碎仰喜呀不仆前尋徑社墅坌蔽畢原陋﨑嶇上軒昻始得觀覽富行行將遂窮嶺陸煩互走勃然思坼裂擁掩難恕宥巨靈與夸娥遠賈期必售還疑造物意固護蓄精祐力雖能排斡雷電怯呵詬攀緣脫手足蹭蹬抵積甃茫如試矯首堛塞生怐愗威容喪蕭爽近新迷遠舊拘官計日月欲進不可又因緣窮其湫凝湛閉隂嘼魚蝦可俯掇神物安敢冦林柯有脫葉欲墮鳥驚救爭銜彎環飛投棄急哺鷇旋歸道回睨遠枿壯復奏吁嗟信竒怪峙質能化貿前年遭譴謫探歷得邂逅初從藍田入顧盼勞頸脰時天晦大雪淚目苦矇瞀峻塗拖長冰直下若懸溜褰衣步推馬顛蹶退且後蒼黃忘遐睎所矚才左右杉篁吒蒲蘇杲耀攢介胄專心憶平道脫險逾避臭昨來逢清霽宿願欣始副崢嶸躋冡頂倏閃雜鼯鼬前低劃開闊瀾漫堆衆皺或連若相從或蹙若相鬬或妥若弭伏或聳若驚雊或散若瓦解或赴若輻輳或翩若船遊或決若馬驟或背若相惡或向若相佑或亂若抽笋或嵲若炷灸或錯若繪畫或繚若篆籀或羅若星離或蓊若雲逗或浮若波濤或碎若鋤耨或如賁育倫暏勝勇前購先強勢已出後鈍嗔䛠譳或如帝王尊叢集朝賤幼雖親不褻狎雖遠不悖謬或如臨食案肴核分飣餖又如遊九原墳墓包槨柩或纍若盆􅑥或揭若㽅豆或覆若曝鱉或頽若寢獸或蜿若藏龍或翼若摶鷲或齊若友朋或隨若先後或迸若流落或顧若宿留或戾若仇讐或密若婚媾或儼若峨冠或翻若舞袖或屹若戰陳或圍若搜狩或靡然東注或偃然北首或如火熺焰或若氣饙餾或行而不輟或遺而不收或斜而不倚或弛而不彀或赤如禿鬝或燻若柴槱或如龜坼兆或若卦分繇或前橫若剝或後斷若姤延延離又屬夬夬叛還遘喁喁魚闖萍落落月經宿誾誾樹牆垣巘巘架庫廏參參削劍戟煥煥銜瑩琇敷敷花披萼闟闟屋摧霤悠悠舒而安兀兀狂以狃超超出猶奔蠢蠢駭不懋大哉立天地經紀肖營腠厥初孰開張黽俯誰勸侑創兹朴而巧戮力忍勞疚得非施斧斤無乃假詛呪鴻荒竟無傳功大莫酬僦嘗聞於祠官苾芬降歆嗅斐然作歌詩惟用贊報酭題炭谷湫祠堂在京兆南終南下前人萬物都陽明幽暗鬼所寰嗟龍獨何智出入人鬼間不知誰為助若執造化關厭處平地水巢居插天山列峰若攢指石盂仰環環巨靈髙其捧保此一掬慳森沈固含蓄本以儲隂姦魚鱉蒙擁護羣嬉傲天頑翾翾棲託禽飛飛一何間祠堂像侔真擢玉紆煙鬟羣怪儼伺候恩威在其顔我來日正中悚惕思先還寄立尺寸地敢言來途艱吁無吹毛刃血此牛啼殷至今乘水旱鼓舞寡與鰥林叢鎮冥冥窮年無由刪妍英雜豔實星鎖黃朱斑石級皆險滑顛躋莫牽攀龍區雛衆碎付與宿已頒棄去可奈何吾其死茅菅馬嵬行劉禹錫緑野扶風道黃塵馬嵬驛路邊楊貴人墳髙三四尺乃問里中兒皆言幸蜀時軍家誅佞幸天子捨妖姬羣吏伏門屏貴人牽帝衣低回轉美目風日為無暉貴人飲金屑倏忽舜英暮平生服杏丹顔色真如故屬車塵已遠里巷來窺覷共愛宿妝妍君王畫眉處履綦無復有履組光未滅不見巖畔人空見凌波襪郵童愛蹤迹私手解鞶結傳看千萬眼縷絶香不歇指環照骨明首飾敵連城將入咸陽市猶得賈胡驚遊終南龍池寺孟郊飛鳥不到處僧房終南巔龍在水長碧雨開山更鮮步出白日上坐依清溪邊地寒松桂短石險道路偏晚磬送歸客數聲落遙天遊華山雲臺觀前人華嶽獨靈異草木恆新鮮山盡五色石水無一色泉仙酒不醉人仙芝皆延年夜聞明星館時韻女蘿絃敬茲不能寐焚柏吟道篇初出藍田路作白居易停驂問前路路在秋雲裏蒼蒼縣南道去途從此始絶頂忽上盤衆山皆下視下視千萬峯峰頭如浪起朝經韓公坡夕次藍橋水潯陽近四千始行七十里人煩馬蹄阻勞苦已如此仙娥峰下作前人我為東南行始登商山道商山無數峰最愛仙娥好參差樹若插匼匝雲如抱渴望寒玉泉香聞紫芝草青崕屏削碧白石牀鋪縞向無如此物安足留四皓感彼私自問歸山何不早可能塵土中還隨衆人老夏日華山别韓博士愈鮑溶别地太華隂孤亭潼關口夏日可畏時望山易遲久暫因車馬倦一逐雲先後碧霞氣爭寒黃鳥語相誘三峰多異態迥舉仙人手天晴捧日輪月夕弄星斗幽疑白帝近明見黃河走遠心不期來真境非吾有鳥鳴草木下日息天地右躑躅因風松青冥謝仙叟不知無聲淚中感一顔厚青霄上何階别劍空朗扣故鄉此關外身與名相守迹比斷根蓬憂如長飲酒生離抱多恨方寸安可受咫尺岐路分蒼煙蔽回首西嶽廟賈餗老柏寒颼颼清祠晝寂寂開門華山北嵐煙沈日夕國家崇明祀五嶽盡封册念我西土民報君金天籍惟神本直信以道微損益無乃惑聰明訛言縱巫覡因循作風俗相與成浸溺疲病閭里氓錐刀往來客我行歲云暮登殿拜瑤席奠酒徹明靈緒言多感激鬱鬱展冠冕凜然生矛戟斑駁石色重隂沈香煙碧虹梁無燕雀聖座鎮虺蜴唧唧似有聞依稀疑所覿髫年業文翰弱冠薦長厄天命幾微茫神逵徒悚惕今來遊上國幸遇陶唐厯正直不吾欺願言從所適哀隴民皮日休隴山千萬仞鸚鵡巢其巔窮危又極險其山猶不全蚩蚩隴之民懸度如登天空中覘其巢驚擾爭紛然百禽不得一十人九死焉隴川有戍卒戍卒亦不間將命提雕籠直到金臺前彼毛不自珍彼舌不自言胡為輕人命奉此玩好端吾聞古聖王珍禽皆捨􅏧今此隴民屬每歲啼漣漣經太華衛光一太華五千尋重嵒合沓起勢飛白雲外影倒黃河裏上有千蓮葉服之久不死山髙採難得嘆息徒仰止登樂遊原懷古豆盧回緬惟漢宣帝初謂皇曽孫雖在襁褓中亦遭巫蠱寃至哉丙廷尉感激義彌敦馳逐蓮勺道出入諸陵門一朝風雲會竟登天位尊握符升寶厯負扆御華軒赫赫文物備葳㽔休瑞繁卒為中興主垂名於後昆雄圖奄已謝餘址空復存昔為樂遊苑今為狐園朝見牧豎集夕聞棲鳥喧蕭條灞亭岸寂寞杜陵原羃䍥野煙起蒼茫嵐氣昏二曜屢回薄四時更涼溫天道尚如此人理安可論不見陽城驛宋王禹稱不見陽城驛空吟昔人詩誰改避賢郵唱首元微之微之謫江陵憔悴為判司路道商山驛一夕見嗟咨所嗟陽道州抗直貞元時時亦被斥逐南荒終一麾題詩改驛名格力何髙竒樂天在翰林亦知遷客詞遂使道州名光與日月齊是後數十年借問經者誰留題富水驛始見杜紫微紫微言驛名不合輕改移欲遣朝天者惕然知在茲一以諱事神名呼不忍為一以名警衆名存教可施為善雖不同同歸化之基邇來又百稔編集空鱗差我遷上洛郡罪譴身縶維舊詩猶可誦古驛殊無遺富水地雖在陽城名豈知空想數君子貫若珠纍纍三章詩未泯千古名亦垂德音茍不嗣吾道當已而前賢尚如此今我復何悲題此商於驛吟之聊自怡辨熊耳邵雍昔禹别九州導洛自熊耳熊耳自有兩未審孰為是東者近成周西者隔丹水書傳稱上洛斯言得之矣哀張子厚先生司馬光先生負材氣弱冠遊窮邊麻衣揖巨公決策期萬全謂言叛羌輩坐可執而鞭意趣小參差萬金莫留連中年更折節六籍事精研羲農訖周孔上下皆貫穿造次循繩墨儒行無少愆師道久廢闕模範幾無傳先生力振起不絶尚聯綿教人學雖博要以禮為先庶幾百世後復覩三王前釋老比尤熾羣倫將蕩然先生論性命指示令知天聲光動京師名卿爭薦延置之石渠閣豈徒修簡編丞相正自用立有榮枯權先生不可屈去之歸卧堅孤嫠聚滿室糊口耕無田欣欣茹藜藿皆不思肥鮮近應詔書起尋取病告旋舊廬不能到丹旐風翩翩人生會歸盡但問愚與賢借令陽虎壽詎足驕顔淵况於朱紫貴飄忽如雲煙豈若有清名髙出太白巔門人俱絰帶雲梯會松阡厚終信為美繼志仍須專讀經守舊學勿為利祿遷好禮效古人勿為時所牽修內勿修外執中勿執偏當今洙泗風郁郁滿秦川先生儻有知無憾歸重泉紀行蘇軾壬寅二月有詔令郡吏分詣屬縣減決囚禁自十三日受命出府至寶雞虢郿盩厔四縣既畢事因朝謁太平宫而宿于南溪溪堂遂並南山而西至樓觀大秦寺延生觀仙遊潭十九日乃歸作詩五百言以記所經歷者寄子由遠人罹水旱王命釋俘囚分縣傳明詔尋山得勝遊蕭條初出郭曠蕩實消憂薄暮來孤鎮登臨憶武侯崢嶸依絶壁蒼莽瞰奔流半夜人呼急橫空火氣浮天遙殊不辨風急已難收曉入陳倉縣猶餘賣酒樓煙煤已狼藉吏卒尚呀咻雞嶺雲霞古龍宫殿宇幽南山連大散歸客走吾州欲往安能遂將遷為少留回趨西虢道却度小河洲聞道磻溪石猶存渭水頭蒼崖雖有迹大釣本無鉤東去過郿塢孤城象漢劉誰言董公健竟復伍孚讎白刃俄生肘黃金漫似丘平生聞太白一見駐行騶鼓角誰能試風雷果致不巖崕已竒絶冰雪更雕鎪春旱憂無麥山靈喜有湫蛟龍懶方睡瓶罐小容偷二曲林泉勝三川氣象侔近山牟麥早臨水竹篁修先帝膺符命行宫畫冕旒侍臣簪武辨女樂抱箜篌祕殿開金鎖神人控玉虯黑衣橫巨劍被髮凛雙眸邂逅逢佳士相將弄綵舟投篙披緑荇濯足亂清溝晚宿南溪上森如水國秋繞湖裁翠密終夜響颼飀冒曉窮幽邃操戈畏炳彪尹生猶有宅老氏舊停輈問道遺蹤在登山往事悠馭風歸汗漫閲世似蜉蝣羽客知人意瑤琴繫馬鞦不辭山寺遠來作鹿鳴呦帝子傳聞李嵓堂髣像緱輕風幃幔卷落日髻鬟愁入谷驚蒙密登坡費挽摟亂峰巉似槊一水淡如油中使何年到金龍自古投千重橫翠石百丈見遊倏最愛泉鳴洞初嘗雪入喉滿瓶雖可致洗耳嘆無由忽憶尋蟆培方冬脫鹿裘山川良甚似水石亦堪儔惟有泉傍飲無人自獻酬東湖前人吾家蜀江上江水緑如藍邇來走塵土意思殊不堪况當岐山下風物猶可慙有山禿如赭有水濁如泔不謂郡城東數步見湖潭入門便清澳恍如夢西南泉源從髙來隨坡走涵涵東去觸重阜盡為湖所貪但見蒼石螭開口吐清甘借汝腹中過胡為目耽耽新荷弄晚涼輕棹極幽探飄飄忘遠近偃息遺佩篸深有龜與魚淺有螺與蚶曝晴復戲雨戢戢多于蠶浮沈無停餌倏忽遽滿籃絲緍雖強致瑣細安足戡聞昔周道興翠鳳棲孤嵐飛鳥飲此水照影弄毿毿至今多梧桐合抱如彭聃絲羽無復見上有鸇摶䳺嗟豫生雖晚考古志所耽圖書已漫漶猶復訪僑郯卷阿詩可繼此意久已含扶風古三輔政事豈汝諳聊為湖上飲一從醉後談門前遠行客劫劫無留驂問胡不回首無乃趂朝參豫今正疏懶官長幸見函不辭日遊再行恐歲滿三暮歸還倒載鐘鼓已韽韽至下馬磧憩于北山僧舍有閣曰懷賢南直斜谷口西臨五丈原諸葛孔明所從出師也前人南望斜谷口三山如犬牙西臨五丈原鬱屈若長蛇有懷諸葛公萬騎出漢巴吏士寂如水蕭蕭聞馬撾公才與曹丕豈止十倍加顧瞻三輔間勢若風捲沙一朝長星墜竟使蜀婦髽山僧豈知此一室老煙霞往事逐雲散故山依渭斜客來空弔古清淚落悲笳昭陵六馬張耒天將剗隋亂帝遣六龍來森然風雲姿颯爽毛骨開飈馳不及視山立儼莫回長鳴視八表擾擾萬駑駘秦王龍鳳姿魚鳥不足摧腰間大白羽中物如風雷區區數豎子縳取如提孩手持掃天帚六合無塵埃艱難濟大業一一非常才惟時六驥足績與英衛陪功成鏘八鸞玉輅行天街寂涼昭陵闕古石埋蒼苔遊驪山孫漸曉促零口征晚留華清宿彌月倦紛埃晞髮蓮湯浴夜雨閙庭梧漏長秋睡足平明徑欲西霽色開林麓遂作朝元遊聊放千里目嵯峨北來橫渭水東轉曲坡田散牛羊沙岸翔鳬鶩爽氣襲衣裘青煙生井屋憶昔唐天子承平溺愛欲翠輦拂行雲鉤陳裹幽谷遺址今尚在繚垣半頽覆玉像暗真仙石槽標飲鹿羯鼓寂無聲連理空餘木長生豈難求有道書丹籙淚未忘馬嵬恨已悲金粟往事寄冥冥芳草依然緑阻雪華下麻革愛山久成癖得山真雋永太華隔風塵五年夢幽境傳聞十丈蓮擬扣玉仙井雪花忽迷漫蒼巔墜昏瞑蹇豫世緣深方外久自屏意是希夷君俗駕疏造請行行風撼林稍稍雲度嶺雲間三峯面隱約露芒穎初如灧澦堆屹起勢奔猛斬如倚天劍萬仞鐵花冷煙霞半明滅瞬息變光景乃知造物心相哀亦相警歸鞭晚忽忽回首心耿耿浩歌夜深寒孤月挂峯頂題張維中華山圖金黨懷英苡珠散遺曹我姓出馮翊空聞華山名未始見顔色三峰擢觚稜經眼但石刻那知玉井蓮香落清渭北巔崖劃變轉勢走關輔窄豈無愛山人不解傳粉墨多才曲江裔公暇日招揖歸裝貯新圖尚帶煙霧濕明窗一傳玩恍若到鄉國我生隨宦遊久作東南客有田秦山下繞屋皆泉石懷恩戀官廩老大歸未得况復秦川遙便恐此生隔崚嶒蒼煙面只許畫中識詩成持送君想像三太息按題圖畫諸詩本不宜入選但詩中詠歎刻劃可想見三峯面目故存之後倣此四皓二首選一元劉因智脫暴秦網義動英主顔鬚眉不得見猶思見南山每當西去鴻目極天際還馬遷歌采薇託名夷齊間孰謂紫芝曲能形此心間鄙哉山林稿摶也或可班安得六黃鵠五老相追攀一笑三千古浩蕩觀人寰長安孝子賈海詩張養浩天厯元二載西土罹洊飢愚時拜中丞帝曰汝往釐嗷嗷三輔間十室九困疲行者總溝瘠居者恆餒而親戚自魚肉遑恤父子離鄠縣民有賈竭力奉母慈闔門為口四一妻仍一兒撡瓢日行乞有得歸母貽不幸值虛往見母顔忸怩退省百無有滿屋風凄其以湯和粳籺進母母不怡曰我幼汝飼非珍即甘飴而汝今我哺以我犬豕為况我老且病纍汝無幾時子懼白其妻無言第頭垂妻曰攜此子從鬻無問誰市呼不見售復歸泣漣洏子心救火急兒命纍卵危隂攜至他所恩愛從此辭解衣縊不殊反為子禁持取盆拔佩刀手足隨紛披紿云黃犬炙雅於補衰宜母知口腹美不悟骨肉虧子幸母解顔不計妻攢眉余聞驚此言怒詰官失治使民至如此賑貸猶遲疑即引造行省使細陳毫釐且命出兒肉闔府遍示之飣諸相坐前余為失聲悲促掾狀其故聞上星夜馳或將復徭役或將表門楣或斥兼金賜或選好爵縻上以勸臣子下以安期頤廷議必不爽命下會有時昔人有埋子天憐以金遺復有貨視者哀鳴走通逵亦有棄半途完侄與相隨未聞刃所愛萬古猶絶竒嗟哉賈生心世俗彼烏知毋以賈為忍毋以賈為癡子失或再有母失庸可追孰能庭桂惜使我堂萱萎惟其持是心屠子如屠貍粵從王政圮風靡俗亦漓子囊錢貫朽母篋無針錐子妾曵羅綺母裙露膚肌不慮親猶天以利為根基不究身何來以貨為宗枝于物尚爾靳矧乃襁褓私嗟哉賈生心堪為世俗規嘗聞前哲言一孝蓋萬疵孝可包衆善孝可動兩儀孝可鬼神格孝可賢聖期能孝斯能忠厥心自親移願彼為人子終身誦吾詞題商德符華山圖虞集昔祠雲臺館行穿御階柏夕隂嵐氣深重碧照行客獨訪張超谷漸覺巖險迫冰生玉井頭日射仙掌側豈無鐵鎖懸翻身若飛鶻恐煩華隂令不奈昌黎伯王事况有程車馬何忽忽流觀終南山周覽天府國爾來十七年欲往不再得山河想邈悠傷殘轉蕭索摩挲商老圖髣佛希夷宅髙哉蓮花峰白雲淡秋色榆林驛漢史稱榆溪長塞即此周伯琦昔人多種榆今人惟種栁堅脆雖不同氣盡同一朽此地名榆林自漢相傳舊但見栁青青夾路忘炎晝行旅蘇汗暍車騎藉隂覆培埴將百年柯葉日滋茂驛亭當要衝人煙紛輻湊崇山峙東西步嶂明錦繡輦路中平平形勝信天授宛如道衡廬中峰望雲岫初夏别都城攀條集親友兹還秋將中涼颸滿衣袖物態有變容歲月如反手不問栁與榆生意要悠久華山明秦康王志􅤎華山乃西鎮巍然峙金天壁立幾千仞三峰入雲煙仰看仙掌日亦有玉井蓮我欲梯其上呼吸通帝前守藩叨典祀所願惟豐年豐年何所召試問希夷仙長安雜詩王褘自昔天子宅雄麗稱長安右瞻控隴蜀左顧俯河關清渭北據水太白南連山其間八百里陸海莽平川神臯奠天府風氣固以完周家本仁厚國統最綿綿漢唐能樹德亦復祚引延秦隋秉虐政二世即傾顛在德不在險古語諒弗諼嗟兹異代後遺迹已茫然宫殿皆劫灰城市盡荒阡迤邐龍首坂縈紆樂遊園老樹帶落日平蕪被寒煙慿髙一覽古千載在目前盛衰有天運興廢復何言崔嵬終南山形勢甚磅礴西來挾崆洞東亘聯華嶽長雲覆重巒紫翠入寥廓把梓産深林龍蛇蟄幽壑淑靈之所鍾宜有異人作如何千載間蹤迹轉蕭索姬旦不復生三代已云邈後來王佐才勞我思景略渭水何湜湜涇水雜泥淤其原各異出其末乃同趨清濁既以混終然成合汙人生實異此稟性同厥初所習日益遠竟爾分賢愚安得涇渭水清濁永相殊羣經載聖道昭揭比日星秦火一何烈燒燔滅其形漢儒事掇拾區區補殘零雖然有遺缺其功亦已宏唐世尚文學君臣益留情琬琰刻文字後先十三經謂兹金石堅不與竹帛并自從東都後此刻最為精羅列黌舍內奎壁映晶瑩我言金與石有時亦銷堋有形必有敝斯理詎難徴安知聖人道所託非所慿天地共終始猗歟罔能名長安王霸都中更九朝業城夷地亦堙復孰窺浩劫舊物奚所存獨有慈恩塔髙標穹昊摩壯址坤倪壓緬懷唐盛時士子重科甲石間所題名先後紛雜遝歲月曾幾何聲光俱濌濌吾將登絶頂俯仰凌六合天風從東來涼意客懷愜登蒼龍嶺王履嶺下望嶺上夭矯蜒蜿飛背無一仞濶旁有萬丈垂循背匍匐行視敢縱橫施驚魂及墜魄往往隨風吹午日晒石熱手腹過蒸炊大喘不可當况乃言語為心急足自縛偷眼羣峰低煙烘浪掩掩日走金離離松頭密如麻明滅無斷期誰知萬險中得此希世竒真勇是韓愈乃作兒女啼獨架橋方孝孺名為不祥器斯理昔未覺及兹困奔走始嘆立論確險哉七盤山羊腸凌巘崿三年八往返顛頓髮早白此行當盛夏溽暑逞餘雪晝伏避蚊虻石徑越林薄危橋滯褒水俯瞰波流惡鑿石勞衆工傍崖構飛閣下扶千柱壯上倚浮雲弱怒雷地底鳴懸瀑崕際落山中郵傳少過客資棲泊勞者務茍安寧思非所托更闌急雨至洪濤相噴薄鬼神助晦冥天地混磅礴病身倦輾轉酣寢絶疑愕晨興宵景澄林壑還可樂有生大化中萬變相綜錯所遇聽自然何處非安宅歷聘魯中叟詠歸沂上客勞逸命分殊順俟安可擇經漆村覽有邰古迹康海我聞昔人言此即漢漆縣其東故有邰草木殊蔥蒨終南當面朝清渭過如練直北倚黃山逶迤空周甸前望松檜場知是何王殿王迹日已微氣色忽隱見西南慶善宫鬱當漆村面勝地遷變多往躅審彌眩繄自唐虞來百祥俱兹奠地靈昔所庇諦此竊中羡上善池碑隂走筆前人一登老子臺佳思忽萬里降觀上善池野坐亦可喜同懷既靡愆橫飛安得止東谷古仲雍太微近平子殷勤遞璚章磊落動幽思黽勉事追逐倉皇愧迂鄙沖抱益以清虛襟彌欲起旭日鳴煩禽春風發芳芷中懷何所攖逖景向堪倚繄彼逍遙篇暫爾柱下史至終南前人衝泥抵終南迷濛失山色遙望太平宫崔嵬白雲極慿髙瞷村落嘉樹森森植此地素靈異氣候曷可測旦日雲氣消嫩碧競環域緑草彌望浮波光與山逼雙雙白鳥來滌蕩千慮息宿性喜丘壑躋攀易筋力深秋事佳遊長歌厭輕默早晚期卜築終以卧斯側過慶善宫王九思皇天頗厭亂太宗當其衝天戈起晉陽矯矯雲中龍乃知溝澮間神物自難容誕育在兹壤山川靈氣鍾清渭環其區終南如堵墉遺宫間蕭爽朝暮聞清鐘宫前斷碑卧雨深苔蘚封士民或拜舞卜歲求豐凶樵木不敢入亦欽王者蹤客從滸西來經此南課農下馬瞻閟像進止還肅雍黃閣峰前人荏苒老將至幽竒寡探索邇聆黃閣峰乃在紫閣北白閣峙其南飛瀑經其側隂暉殊氣象巖巒遜竒特嘉名久沈匿勝槩棄莫覿豫聆王生言煩囂頓揮滌遊目天南隅恨乏凌風翼躡履挾賓侣危巔庶可陟秦中古意八首選二黃臣矗矗西華嶽作鎮為秦雄峻巖懸天鎖危登臨青空引此八千丈始見元元宫澗底覔殘芝山腰拾斷虹盛夏寒凛凛晴晝雲濛濛所以希夷子來此完真功乾坤萬古事俱付黑甜中試問不睡人誰是古偓儂老我倦商山商山多紫芝豈無好松桂養生非所資但恐秦嶺險杖履胡能隨地僻神每交夢寐常見之綺甪是何人能抱避世竒儋石少儲蓄仗此以為餈渴飲澗潺湲朝夕免調飢吾欲將商山移置東海湄紫芝隨吾收安貧忘藿藜橫渠先生祠陳棐關中多聖靈儒者昔何疏孔尼不到秦博士曾坑除龍虎爭戰鬬焚溺及詩書久之絃誦歇齊魯重璠璵宋世闡文教生賢近橫渠匡世每談兵豈真為穰苴髙明性元遠佛老非崇虛講經撤座虎悟理聽鳴驢絶學真繼聖微言切砭愚浮名輕簮冕古服雅儒居所以濂洛後關西擅馨譽我來拜祠下一停恤使車祠荒有蔓草遺像猶儼如我問程朱裔博士出乘輿誰能引此典請之承明廬關中十首選一張瀚逶迤涇渭水引入廣通渠疏鑿馳民力舟航利國儲河流自清淺無地覔隋墟遊華嶽五首選一喬因阜巨靈混沌師神功元氣宅髙掌搴天半蓮峰劃地擘黃河洶湧來滔滔乃東適斷山兩却立嵐翠如開闢至今留靈蹤詭閟難思繹藍田郊望來復雨涼悅霽塏出郭散幽步秋成衆禾垂川原莽回互􅏭嵲王順峯逶迤輞谷路日入嵐氣生千林各成趣城堞帶嶺長俯瞰激湍赴邊山亘路通西與鄠杜遇迎面七盤開奠兹武關固誰知深窅中井畝尚無數謖謖巖松聲登登山寺暮石廬寸穴封人煙絶頂露念當遺塵紛一瓢採真去沈香亭李汝蘭龍飛碧池寒枯松卧殘水不見古時亭空餘古亭址亂石蒼煙合荒臺凄風起國色竟何在欄杆復能倚繁榮輝蒼萼寂寞生荆杞梨園曲不聞羯鼓聲亦止泣下還自收亘古皆如此悲歌紀斯遊後來者誰子蒙恬墓趙坤我來雕隂城尋古獨傷切憶昔祖龍代刑政多乖缺蒙氏守北邊趙李居台列奈何疑忌生至親亦疏别一朝沙丘變羣罔謀遂結功臣見誅鉏冡嗣忽磨滅樹封將軍冡泉流帝子咽強嬴亦已矣千載嗟忠哲希夷卧像有序解引樾在玉泉石室貌甚竒古眸頰間為遊人手摩津津肖龍眠之欲醒也陳橋曉攬轡恚彼榻邊睡誰識老希夷占斷三峯翠乾陵溫自知女主踞洪圖虎視何雄哉千秋王氣盡陵墓空崔巍我今登其顛蕭蕭風怒來飢鳶獵曠野寒狐呌山隈粧閣豈云祕翁仲生莓苔石獸夜吼天霜風日以摧咄嗟此髙阜萬古埋雲雷我本俠烈人過揖長夜臺腰下看青萍肝膽歷然開誰使貽妖氛民生逢禍災慷慨揮長劍坐使鯨鯢頽相顧起叱嘯旦夕風雲回雪後至蘿坪望三峯本朝劉正宗我自褒中回頗悉山情狀翠巘與丹崖突兀雜奔放氣勢一能敵岌嶪不相讓何如太華峰巉巖絶依傍拔地仞五千日月互摩蕩仙掌扶青冥蓮蕚散昭曠飛瀑從天來灑落層雲上始知名嶽尊羣山靡敢抗雪後衆峰明卑伏爭拱向灝氣澄金天百靈森名相疑有秦宫人去來迷疊障自愧胎骨凡雲卧奪塵障拄杖暮歸來矯首空惆悵新豐李楷夾水兩廢垣新豐名如故胡寬人已非雞犬復何處不知櫟陽宫幾多宫前樹芒碭一片雲長陵千年墓伊昔擁篲時父子得無誤望吳山前人吳嶽夙在念知是十七峰豫以嵩華擬想見青芙蓉遣祀關大典不願有登封周穆獨好竒山水多遙蹤豫乃一庶民策倚一枝笻始覿數笋尖丘原隔雲重遵渚翔隴流日暮心憧憧縱飲得隴酒迷途非倦容翼日城之南飽看嶽色濃羣山如舞鳳或得如遊龍巍巍列大藩嶷嶷副岱宗閬風不可到吾今庶幾逢但懷此中隱茹芝亦餐松餒飢無足慮租賦異耕農垂老生毛羽聊且辭勳庸間居懷遠偶紀龍門之遊張恂壯遊夙昔志所過探幽深不以龍門勝斧鑿痕鬱森有客攜壺榼邀我一相尋兩峰如對壘萬尺特﨑嶔山腰閣鳥道插木俯奔涔石鎖濤聲怒崕危水勢侵飛樓挂碧岫未登預斂襟長河爭隘口一往橫千尋禹廟壯空山風雷畫壁隂老檜盤鳳翥懸泉龍怒吟韓子天下士竒懷發雅音銜杯振丘壑眺遠窮雲林方舟來自北急湍直下臨瞬息千餘里鐺中酒未燖史遷墓如拳耕牧弔遙岑尊前三晉小一水商與參西河鬱相望文清繼國琛少梁何奕奕賢者成古今焉得周公楫焉得傅説霖而時同蔚起一慰聖人心響水橋遇劉將軍説龍門諸勝談吉璁西北諸源水獨能通中國激峻從髙注揚奔下流急清澄六斗泥千里還一曲混混圁谷流欲與黃河敵東徑紅門亭天封井火出雲泄復雷渀湍沙浩難測北過響水城野渡名恍惚幸有三門險關防似禹迹信哉水非鑿而能穿入石中門水交衝素沫隨風發旁流三門深濬波浮竹疾我來一問津窺臨真悸魄若非此安流不然將大溢何必登龍門神工懷巨厄飛仙嶺李念慈危棧轉山腹飛閣被崇巒旭日斜髙照簷楹沃且丹微徑循石脊曲折如蟲緣我行隨他人不得窮躋攀憶昔出函谷方春捫嶽蓮繫屐玉女峯酌酒天池邊西顧雪嶺白東望滄溟寬萬里在胸臆夜宿青雲端胡為年齒暮反遭俗纍牽妻子亦何人驅我數往還誓歸劚黃精一食生羽翰玉井二首選一王又旦萬檜翳深景夕日風颼飀茫茫石澗外皓氣誰挽收蓮花不復見一水入雲流龍門前人清曉望陘峴褰裳越溪壑叢薄遠難識雲水勢相錯遂登龍門山雙崕橫大漠怒濤如奔駟百折天外落初秋氣漸爽髙風亦間作秦野忽黯慘坤軸失寄托傾耳聆喧豗登臨翻不樂吾家大汀濱臨流看寥廓豈期石徑轉一縷自噴薄行矣重回首三嘆念疏鑿橋陵葉映榴大荒浮黃雲衆山失故黛劃然川原開蒼翠出煙靄居人為余言橋陵在其內下車拂征塵屏息顒再拜古柏參青霄枝葉如偃蓋黃帝未仙時此樹乃先在其餘二千株環陵而向背陵廟與樹連雲氣時靉靆沮水流其中觸石響清籟懷古有餘情瞻眺得大槩當年神聖興制作史具載採銅首山顛鑄鼎荆山界鼎成龍下迎其説近迂怪左右不及從抱弓致忠愛鑿山葬衣冠廟祀崇百代且戰且學仙漢武發深慨至今祈仙臺芳草尚暗藹候神幸緱山採藥巡海外封禪何紛紛徒為公孫賣余意帝王尊不仙亦何害緬彼垂裳年今古共嘉賴不死今有冡此言良大快惟有柏長生風雨勿能壞造書臺許孫荃世欲趨文明結繩難為功秋風聞鬼哭天意開鴻濛至今臺上鳥迹與舊時同岐下謁周元公廟六首選一前人召主陜之西惟公主陜東甘棠託古柏千祀青蘢蔥白首垂釣叟鷹揚接雄風俎豆幸不隔遺碑摩蒼穹配饗為太公召公上郡頗多石屋經行即事前人我昨上郡行家家石代瓦天然器適用不必煩陶冶頗聞秦土俗板屋經冬夏所悲時漂搖風雨臨廣野亦有黃岡竹作樓成大厦待裁郢匠斤遜此用力寡青青嶺上雲渺渺生石下三嘆過其門夕陽頻駐馬定軍山諸葛公墓下作王士禎髙密起南陽文終從髙祖暴繫本見疑數衄亦非武堂堂諸葛公魚水託心膂二表匹謨訓一德追伊吕視操但如鬼畏蜀還如虎嗟彼巾幗徒與公豈疇伍紫色復蛙聲抵隙各為主火井方三炎赤伏更典午志士恥帝秦祭器猶存魯隂平一失險面縛忘奔莒知公抱遺憾龍卧猶千古峨峨定軍山悠悠沔陽滸鬱鬱冬青林哀哀號杜宇耕餘拾敗鏃月黑聞軍鼓譙侯寧足誅激昻淚如雨渭橋懷古前人秦川夕澄霽灃水明如練西上中渭橋颯然秋氣變嬴政昔構造作此象天漢美人與鐘鼓流連恣荒宴徐市期不來山鬼璧已獻我昨驪山行徘徊弔中羡荆棘蔽銀海樵牧羅金雁麒麟折其股冷落青梧觀後代復何王繡嶺明珠殿唯有終南山興亡幾回見望嶽何芬入關窮遠目驀然阻西嶽三秦無空濶兩儀失清濁日光紛蕩漾心神亦驚愕倉忙問役夫指顧話頻數何物橫野斷稜稜露頭角誰能運鬼工劈空事礲斫屹立插青霄千尺只一削四面形屢改峰峰如蓮萼我行百里餘凝望尚悠邈登攀疑無路心往足前却緬彼昌黎翁正氣馴蛟鱷躡屩及山腰澘然老淚落緬彼杜陵老岩壑窮討索髙尋懷白帝拄杖空言托仰止自齠年向平杳難學何日聽秋風呼朋共趻踔登咸陽鳳凰臺張大森臺起凌虛空丹鳳棲雲表磴道挂三峰首尾俱繚繞立神擎棟宇天風響柏杪開户吞明月捲簾驚宿鳥千家樹稀密萬嶺煙昏曉秋色何處來不忍肆慿眺秦宫粉黛假五陵盡荒渺土穴竄鼯鼪殘碑雜藨還念人世間榮枯徒擾