杜陵野老何處尋水流從此無顔色未央宫李楷豐鎬直北數十里中有未央宫殿址大壯經營蕭相國鴻圖創見赤帝子憶昔祖龍席八荒跨渭凌山起阿房鮑魚未亂沙丘駕沐猴已焰長安鄉入關帝業隆天漢龍首皇居徙櫟陽朝廷大體生綿蕞石渠圖書集軒黃此時氣象還四代不止約法示三章代邸入繼狗禍熄景帝相承炎德昌丕烈孝武尤聖武征伐師旅何輝光新莽威能移孺子未央宫殿遂如此赤眉縱橫又一時怪得蒙茸生荆杞唐人舊觀修廢宫今日狐秋風裡吁嗟今日狐秋風裡賈大司馬修棧歌梁清寬君不見棧道髙去天尺五馬盡縮足人咸傴山前白骨野火磷江岸積骸泣無主中丞巡邊心惻然濬川煉石何今古誰云天險不可移五丁曾為施巨斧積薪一炬石為坼錘鑿既加如削腐隘者已濶屼者平冠蓋利涉雜商賈昔日百里無人煙行役更多豺虎苦中丞極意盡經營伐木成棟茅作宇鳳嶺雞關似坦途中夜酣憩為安堵回車不用愁王陽開闢功足補大禹吁嗟乎天下險阻寧止此人心巉巗難悉數對面戈矛不可避翻手為雲覆可雨吁嗟乎安得中丞此大力盡平世間嶮巇之處長無忤過五龍山懷古趙錫胤循蜚疏仡誰可考古皇治世乘雲早上巢下窟洚流深西北地髙多竒島膚施上郡據上遊五龍分治闢洪灝五音五行配仙靈治績無名天地老史載漢宣立廟祠松雲牗棟應共保離黍滄桑世代遷故物塵灰隨腐草我來其上訪遺蹤父老傳聞皆莫討有言東郊彼髙岡廟祠雖圮石作堡千古興亡指顧間香水東流長浩浩仙人掌蔣超一指二指斷蓍成秦華東接滄溟分三指四指櫛比勤二十八宿蟠螺紋小指隔在玉峰右少海陪嶽仙都羣細看指數似多出百千變化空氛氲乍似叔卿鼓掌擲棋笑不然玉女投壺拾矢紛為君苦生象數促算盡人間眉暗蹙蘆花池畔作籌場芙蓉國裡成博局要挽斯人懷葛心願收五指入深林客情倦卧修羊石袖手不言思漢隂華清宫歌孫爾思秋日返景明驪山有客行吟碧澗灣獨酌離宫寂無事却憶開元天寶間崇璟贊襄調玉燭朝寧不復容讒姦貞觀之風時再見直與房杜相追攀一朝進用楊與李却解乾綱付妃子祿兒宫中洗賜錢舞馬棧邊鳴曵綺錦鳬繡鴈浮蓮湯珠纓寶絡出金水鸚鵡猶傳般若文伶工盡識霓裳技樂極生悲自古然褒妲殷周同一軌七夕女牛何渺茫驚鐃駭鼓聞漁陽內人紅袖不知處鑾輿出狩蠶叢鄉姦諛雖已膏斧鉞女戎尚存禍未歇環上羅衣良可哀倉卒何人樹銘碣牧兒但拾馬嵬粉野嫗空留錦袎襪雨淋鈴聲清且悲能使六龍遲不發紫褥光銷玉骨冷蚶殼南來騎猶騁佛舍殘梨幾度花懷得香囊作悲哽日南龍腦爭馥郁無由更致明駝足琵琶香板響寂然瓔珞空傳舊舞曲西望雲稍飛錦城北瞻日月光重明行在時方駐靈武宸遊不復來華清華清久閉驪山麓一代繁華見麋鹿樓臺風葉飛牡蒿珠翠塵根生苦竹窅窊藻井巢蠮螉靃靡垣衣啼鴶鵴暖水不知時代更猶向瓊階自洄洑間披芳草求遺蹤作令當年羡巨公重闢清渠疏輦道至今桃栁驕春風摩挲更覽壁間字不覩滸西與北地大復山人曽此來筆鋒揮灑虬龍勢吁嗟往事今千年客行弔古翻悽然鐫珉亦欲睎髙詠心折春回繡嶺篇同楊樹滋登萬壽閣眺華山放歌王又旦渭川楊栁煙濛濛東西大道驕青驄百丈層樓隱深樹飛甍正欲摩蒼穹夙昔登臨意未厭重來攜友金天宫坐看芙蓉近咫尺嵐光天色相磨礱茫茫八水作池沼白帝聊戲抽荷筒坱北終古運元氣豈有斧鑿驅神工萬松幽邃不可辨依稀一線盤蒼龍指點天池是落雁蔽虧忽逐流雲空杜陵老人心膽怯崚嶒遠望終朦朧安得仙人九節杖徒以幻想安其衷寒暑猶餘古冰雪髙尋何必須秋風昌黎老人逞小勇欲從天上探竒蹤百計空煩華隂令到今舊迹蒼苔封願摘蓮花種七澤齎志未遂甘長終我昔捫蘿不辭險微軀竟與雲霄通龍湫仙迹縱搜討無勞廟史貪神功豈共猿猱較捷足幾與前輩爭豪雄歸向雲臺共君飲關門月出髙朣朧屈指年華一十七可憐日月如旋蓬春遊正值花爛漫銀鞍莫惜香羅蒙為君歌罷更惆悵平舒城外殘霞紅太白髙許孫荃太白髙髙積雪赤日青天互明滅太白髙髙入雲終南太華俯同羣太白髙髙出塵去天三百紛嶙峋太白髙森萬象凌空我有盧敖杖鄭白渠前人韓欲罷秦使鑿渠渠成斥鹵皆膏腴遂令富饒甲天下數傳霸業開雄圖乃知灌溉民所利亦有白公踵其事衣食關中億萬象池陽谷口歡聲沸髙岸為谷谷為陵兩渠中更幾廢興熙寧成功未克告宋神宗時有殿臣某建明二渠之利興役踰年功已有敘而害能者巧為沮止見伊川先生代上宰相書遺愛人傳耿右丞明耿公復修二渠民咸賴之碑洞行前人嗚呼倉頡久不作書臺鳥迹徒紛紛古文竒字世罕覩大篆小篆徒先秦隸隸八分開正草頓使風流屬晉人就中波撇誰入神古今無過王右軍貞觀天子性耽嗜金錢隻字搜沈淪豈徒蘭亭獲墨迹直將聖教昭貞珉一時鉤勒多詞臣褚馮虞薛足亂真繼起北海妙風格顔筋栁骨爭嶙峋其餘更僕難悉數要使古法存先民何時輦致歸學舍奎閣白晝回星雯虛堂漏痕映竒古龍蛇畫壁相鮮新我攜博士坐其下諸生好古親講詢剝苔剔蘚得遍讀劍氣珠光難具陳如登鄧林列萬木如入都市逢竒珍如過大官恣厭飫如臨天庾觀京囷心摹手追日易夕神移目眩雞將晨頗聞督橋工最急韓縝事大半移置灞水濱向拱摹拓三千餘傷心受害羅斧斤幸茲神呵并鬼護不悲玉石俱遭焚孔廟嵯峨亘萬世唐碑照耀垂千春不見滄桑歷浩劫陳倉石鼓羅成均潼關何芬山勢岌嶪如劍閣夾道逼迮臨絶壑嬴秦憑險肆驕橫六國疆土漸割削合縱不成魯連死人盡帝秦心膽落東填西築日愁胡沙丘一局才了却揭竿豎子競入關劉項爭王此為約秦人何惜丸泥封坐令入者恣跳躍離宫别館成飛灰驪山咸陽久寂寞我今驅車拉雜來坦如康衢無錯愕商旅魚貫市肆張抱關何須夜擊柝大地河山皆版圖長城一望連朔漠汪洋海若不揚波遊人式歌太平樂百二雄關今猶昔秦人安在空城郭華清宫歌為宣四作兼呈張潛谷康乃心君不見華清宫裏月如霜華清宫外草茫茫客行時向驪山路繡嶺東西落日黃開元自昔稱全盛薄海清寧嶽牧良巡遊却上朝元閣萬騎千官如會昌荔子飛來妃子笑梨園法部奏霓裳髙樓羯鼓警花栁爛漫玉環睡海棠溫泉一片芙蓉露承恩歲歲沐蘭湯哥舒催戰潼關破烽火彌天塞馬強劍門西去離宫暗玉輦稀來草樹荒念奴淪落龜年老世間萬事總悲涼我行此地尋遺迹昭應官衙得季方難兄作宰鳴琴久每從吏治見文章斷碑殘碣多零落得之不異魯靈光午夜燒燈勤簡閲竒文相賞豈尋常濟南山水稱雄秀二趙鴻名誰可當酒酣髙歌公莫舞清詞麗句玉琳琅嵩山髙士巖廊侣論文雅欲渺蒼桑有時握手長生殿宜春緑閣半斜陽秋風落葉長安道坐看牧豎下牛羊寂寞泰陵金粟裏金粟山在蒲城縣至今猶似怨香囊請君更續清平調為我從頭説上皇豐之山答友人王心敬豐之山雲飛翔豐之水流悠揚結茅臨水對山岡合志同方誦虞唐彈琴學道樂無疆無不足兮奚所望過畢原憶張漁隱張大森漁隱流風應未墜畢原原上柏森翠涇野少墟闡關學先後薪傳總一致平生傲岸多竒節辭幣却金腰不折間中走筆起雲煙夜半理琴飛白雪九嵕遙望如培塿哲人日遠空搔首歸來細讀秋水篇先生所著漁隱風規終不朽陜西通志卷九十五
