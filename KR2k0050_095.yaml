body:
  text: 陜西通志卷九十五藝文十一樂府四言古五言古七言古文王操琴操曰紂為無道諸侯皆歸文王其後有鳳凰銜書於郊文王乃作此歌翼翼翔翔彼鳳凰兮銜書來遊以會昌兮瞻天按圖殷將亡兮蒼蒼之天始有萌兮五神連精合謀房兮興我之業望來羊兮岐山操周公為太王作其詞曰狄戎侵兮土地遷移邦邑適于岐山蒸民丕憂兮誰者知嗟嗟奈何兮豫命遭斯越裳操周公作也周公輔成王成文武之道越裳重九譯而來獻白雉周公乃援琴而歌遂受之獻于文王之廟於戲嗟嗟非旦之力乃文王之德齊房元封二年芝生甘泉齊房作齊讀曰齋房産草九莖連葉宫童效異披圖按牒元氣之精回復此都蔓蔓日茂芝成靈華朝隴首元狩元年行幸雍獲白麟作朝隴首覽西垠雷電尞古燎字獲白麟爰五止顯黃德圖胸虐熏鬻殛闢流離抑不祥賓百僚山河饗掩回轅鬗長馳騰雨師灑路陂流星隕感惟風籋歸雲無懷心上之回上之回所中益夏將至行將北以承甘泉宫寒暑德遊石關望諸國月支臣胸奴服令從百官疾驅馳千秋萬歲樂無極長安有狹斜行無名氏長安有狹斜狹斜不容車適逢兩少年夾轂問君家君家新市傍易知復難忘大子二千石中子孝廉郎小子無官職衣冠仕洛陽三子俱入室室中自生光大婦織綺紵中婦織流黃小婦無所為挾琴上髙堂丈人且徐徐調絃詎未央陌上桑無名氏日出東南隅照我秦氏樓秦氏有好女自名為羅敷羅敷善蠶桑採桑城南隅青絲為籠繫桂枝為籠鉤頭上倭墮髻耳中明月珠緗綺為下裙紫綺為上襦行者見羅敷下擔捋髭鬚少年見羅敷脫帽著帩頭耕者忘其犂鋤者忘其鋤來歸自怒怨但坐觀羅敷使君從南來五馬立踟蹰使君遣吏往問是誰家姝秦氏有好女自名為羅敷羅敷年幾何二十尚不足十五頗有餘使君謝羅敷寧可共載不羅敷前致詞使君一何愚使君自有婦羅敷自有夫東方十餘騎夫壻居上頭何用識夫壻白馬從驪駒青絲繫馬尾黃金絡馬頭腰中鹿盧劍可值千萬餘十五小府吏二十朝大夫三十侍中郎四十專城居為人潔白晳鬑鬑頗有鬚盈盈公府步冉冉府中趨坐中數千人皆言夫壻殊按此詩舊志未採苐白樂天權德輿諸詩俱以羅敷為華州人今華州西亦有羅敷水故存之平陵東漢翟義門人所作也義為丞相方進少子為東郡太守以王莽篡漢舉兵誅之不克而見害門人作歌以怨之也平陵東松柏桐不知何人劫義公劫義公在髙堂下交錢百萬兩走馬兩走馬亦誠難顧見追吏心中惻心中惻血出漉歸告我家賣黃犢平關中魏繆襲平關中路向潼濟濁水亡髙墉鬬韓馬離羣凶選驍騎從兩翼虜崩潰級萬億長安道梁簡文帝神臯開隴右陸海實西秦推輪抵長樂復道向宜春落花依度幰垂栁拂行人金張與許史夜夜尚留賓隴頭水元帝銜悲别隴頭關路漫悠悠故鄉迷遠近征人分去留沙飛曉成幕海氣夜如樓欲識秦川處隴水向東流賦得橫吹曲長安道庾肩吾桂宫連復道黃山開廣路遠聽平陵鐘遙識新豐樹合殿生光彩離宫起煙霧日落歌吹還塵飛車馬度行幸甘泉宫歌劉孝威漢家迎夏畢避暑甘泉宫棧車鳴里鼓駟馬駕相風校尉烏桓騎待制樓煩弓後旌猶五柞前笳度九嵕才人豹尾內御酒屬車中輦回百子閣扇動七輪風鳴鐘休衛士披圖召後宫材官促校獵涼秋戲射熊琅琊王歌辭無名氏長安十二門光門最妍雅渭水從隴來浮遊渭橋下長安道陳顧野王鳳樓臨廣路仙掌入煙霞章臺京兆馬逸陌富平車東門疏廣餞北闕董賢家渭橋縱觀罷安能訪狹斜長安道蕭賁前登灞陵道還瞻渭水流城形類北斗橋勢似牽牛飛軒駕良駟寶劍雜輕裘經過狹斜里日暮與淹留長安有狹邪行北周王褒威紆狹斜道車騎動相喧博徒稱劇孟遊俠號王孫勢傾魏侯府交盡翟公門路邪勞夾轂塗艱倦折轅日斜宣曲觀春還御宿園塗歌楊栁曲巷飲榴花樽獨有遊梁客還守孝文園長安道隋何妥長安狹斜路縱橫四達分車輪鳴鳳轄箭服耀魚文五陵多任俠輕騎自連羣少年皆重氣誰識老將軍長安秋虞茂露寒臺前曉露清昆明池水秋色明搖環動珮出層城鵾絃鳳管奏新聲上林蒲桃合縹眇甘泉竒樹上蔥青玉人當歌理清曲婕妤恩情斷還續臨髙臺唐王勃臨髙臺髙臺迢遰絶浮埃瑤軒綺構何崔嵬鸞歌鳳吹清且哀俯瞰長安道萋萋御溝草斜對甘泉路蒼蒼茂陵樹髙臺四望同帝鄉佳氣鬱蔥蔥紫閣丹樓紛照曜璧房錦殿相玲瓏東彌長樂觀西指未央宫赤城映朝日緑桞搖春風旗亭百隊開新市甲第千甍分戚里朱輪翠蓋不勝春疊樹層楹相對起復有青樓大道中繡户文窗雕綺櫳錦衣晝不襞羅幃夕未空歌屏朝掩翠妝鏡晚窺紅為吾安寶髻蛾睂罷花叢塵間狹路黯將暮雲開月色明如素鴛鴦池上兩兩飛鳳凰樓下雙雙度物色正如此佳期那不顧銀鞍繡轂盛繁華可憐今夜宿娼家娼家少婦不須顰東園桃李片時春君看舊日髙臺處柏梁銅雀生黃塵長安道橫吹曲沈佺期秦地平如掌層城出雲漢樓閣九衢春車馬千門旦緑栁開復合紅塵聚還散日晚鬬雞回經過狹斜看隴頭吟王維長安少年遊俠客夜上戌樓看太白隴頭明月迥臨關隴上行人夜吹笛關西老將不勝愁駐馬聽之雙淚流身經大小百餘戰麾下偏裨萬户侯蘇武才為典屬國節旄落盡海西頭渭城少年行崔皓洛陽二月梨花飛秦地行人春憶歸揚鞭走馬城南陌朝逢驛使秦川客驛使前日發章臺傳道長安春早來棠梨宫中燕初至蔔萄館裡花正開念此使人歸更早三月便達長安道長安道上春可憐搖風蕩日曲河邊萬户樓臺臨渭水五陵花栁滿秦川秦川寒食盛繁華遊子春來喜見花鬭雞下杜塵初合走馬章臺日半斜章臺帝城稱貴里青樓日晚歌鐘起貴里豪家白馬驕五陵年少不相饒雙雙挾彈求金市兩兩鳴鞭上渭橋渭城橋頭酒新熟金鞍白馬誰家宿可憐錦瑟箏琵琶玉壺清酒就君家小婦春來不解羞嬌歌一曲楊栁花君子有所思行雜曲李白紫閣連終南青冥天倪色憑崖望咸陽宫闕羅北極萬井驚畫出九衢如弦直渭水清銀河橫天流不息朝野盛文物衣冠何翕赩廄馬散連山軍容威絶域伊臯運元化衛霍舒筋力歌鐘樂未休榮去老還逼圓光過滿缺太陽移中昃不散東海金何爭西輝匿無作中山悲惻愴淚霑臆長安道橫吹曲韋應物漢家宫殿含雲煙兩宫十里相連延晨霞出沒弄丹闕春雨依微自甘泉春雨依微春尚早長安貴遊愛芳草寶馬橫來下建章香車却轉避馳道貴遊誰最貴衛霍勢難比何能蒙主恩幸遇邊塵起歸來甲第拱皇居朱户峨峨臨九衢中有流蘇合歡之寶帳一百二十鳳凰羅列含明珠下有錦鋪翠被之燦爛博山吐香五雲散麗人綺閣情飄飄頭上鴛叉雙翠翹低鬟曵袖回春雪聚黛一聲愁碧霄山珍海錯棄藩籬烹犢炮羔如折葵既請列侯封部曲還將金印授廬兒歡榮若此何所苦但苦白日西南馳潼關吏杜甫士卒何草草築城潼關道大城鐵不如小城萬丈餘借問潼關吏修關還備胡要我下馬行為我指山隅連雲列戰格飛鳥不能踰胡來但自守豈復憂西都丈人視要處窄狹容單車艱難奮長戟萬古用一夫哀哉桃林戰百萬化為魚請囑防關將慎勿學哥舒塞蘆子前人五城何迢迢方鎮表朔方節度領定遠安豐二軍及三受降城為五城迢迢隔河水邊兵盡東征城內空荆杞思明割懷衛秀巗西未已回略大荒來崤函蓋虛爾延州塞門鎮本屬延州開元二年移就蘆子關秦北户關防猶可倚焉得一萬人疾驅塞蘆子岐有薛大夫薛景仙為扶風太守賊冦至擊却之旁制山賊起近聞昆戎徒為退三百里蘆關扼兩冦深意實在此誰能呌帝閽胡行速如鬼哀江頭前人少陵野老吞聲哭春日潛行曲江曲江頭宫殿鎖千門細栁新蒲為誰緑憶昔霓旌下南苑苑中萬物生顔色昭陽殿裡第一人同輦隨君侍君側輦前才人帶弓箭白馬嚼齧黃金勒翻身向天仰射雲一箭正墜雙飛翼明眸皓齒今何在血汚遊魂歸不得清渭東流劍閣深去住彼此無消息人生有情淚霑臆江水江花豈終極黃昏胡騎塵滿城欲往城南望城北岐山操周公為太王作韓愈我家於豳自我先公伊我承緒敢有不同今狄之人將土我疆民為我戰誰使死傷彼岐有岨我往獨處爾莫余追無思我悲涇水黃鼓吹鐃歌栁宗元薛舉據涇以死其子仁杲尤勇以暴師平之為涇水黃涇水黃隴野茫負太白騰天狼有鳥鷙立羽翼張鉤喙決前巨躍傍怒飛飢嘯翾不可當老雄死子復良巢岐飲渭肆翺翔頓地紘提天綱列缺掉幟招搖耀鋩鬼神來助夢嘉祥腦塗原野魂飛揚星辰復恢一方驪宫髙美天子重惜人之財力也白居易髙髙驪山上有宫朱樓紫殿三四重遲遲兮春日玉甃暖兮溫泉溢嫋嫋兮秋風山蟬鳴兮宫樹紅翠華不來歲月久牆有衣兮瓦有松吾君在位已五載何不一幸乎其中西去都門幾多地吾君不遊有深意一人出兮不容易六宫從兮百司備八十一車千萬騎朝有宴飫暮有賜中人之産數百家未足充君一日費吾君修已人不知不自逸兮不自嬉吾君愛人人不識不傷財兮不傷力驪宫髙兮髙入雲君之來兮為一身君之不來兮為萬人隴頭吟橫吹曲翁綬隴水潺湲隴樹黃征人隴上盡思鄉馬嘶斜日朔風急雁過寒雲邊思長殘月出林鳴劒戟平沙隔水見牛羊橫行俱是封侯者誰斬樓蘭獻未央長安少年行側調曲僧皎然翠樓春酒蝦蟆陵長安少年皆共矜紛紛半醉緑槐道蹀躞花驄驕不勝五原行宋文同雲蕭蕭草搖落風吹黃沙昏寂寞胡兒滿窟卧寒日卓旗繫馬人一匹夜來烽火連篝起銀鶻呼兵捷如鬼齊集弓刀上隴行犬譟狐嘷繞空壘羌人鈔暴為常事見敵不爭收若雨自髙聲勢敘邊功歲歲年年皆一同將軍玩冦五原上朝廷不知但推賞鴻門宴元楊維禎天迷關地迷户東龍白日西龍雨撞鐘飲酒愁海翻碧火吹巢雙猰㺄照天萬古無二烏殘星破月來天餘座中有客天子氣左股七十二子連明珠軍聲十萬振屋瓦拔劍當人面如赭將軍下馬力拔山氣捲黃河酒中㵼劍光上天寒彗殘明朝畫地分河山將軍呼龍將客走石破青天撞玉斗隴頭水明髙瓛隴坂﨑嶇隴水長征人隴上望家鄉停車駐馬不能渡嗚咽聲中欲斷腸抽刀斬水水不絶拔山塞川川更咽前軍洗瘡血尚存後軍滴泪水復渾丈夫有志沙場死未到隴頭愁塞耳鴻門髙李東陽鴻門髙髙屹屹日光蕩雲霧塞雙舞劒三示玦壯士入目眥拆謀臣怒玉斗裂網彌天龍有翼龍一去難再得新豐行前人長安風土殊不惡太公但念東歸樂漢皇真有縮地功能使新豐為故豐人民不異山川同公不思歸樂關中漢家四海一太公俎上之對何匆匆當時幸不烹若翁五丈原前人五丈原頭動地鼓魏人畏蜀如畏虎營門不開呼者怒揮戈指天天宇漏將星墮空化為土錬石心勞竟何補侯歸上天多舊伍熊為前驅羆後拒忠魂不逐降王車長衛英孫朝烈祖馬嵬曲前人唐家國破君不守獨載娥眉棄城走金甌器重不自持玉環墮地猶回首前星夜出紫薇垣王風淨掃長安羶上皇捲甲三川外父老含悲興慶前世間萬事多反覆自古歡娛不為福君不見西宫露刃迎何如坡下屯兵宿隴坂李夢陽我欲望長安隴坂髙隨天隴坂髙可陟隴水鳴濺濺盤盤上隴車斑斑下坂馬我匪虎與兕使我行曠野南山操五章并序選二王九思渼陂子既老棲于南山之阿作南山之操五首月夜獨坐被之絲桐抒情素焉我棲兮南山有佩其蘭兮有芝可餐綺皓逝矣誰與我兮盤桓南山之陬兮我憩我遊桂樹叢生兮其葉颼颼王孫歸來兮與爾淹留山靄靄兮出雲風蕭蕭兮涼發時雨降兮霏霏芳草茁兮勃勃恍須臾兮明晦見斗柄兮西揭蕩吾神兮天遊足不履兮散髮濯澗水兮冷冷弄團團兮明月忽浩浩兮長嘯舞潛虬兮幽窟隴頭流水徐禎卿隴水嗚咽流各自東西下生男不下堂生女棄原野下隴磨剪刀刀澀指爪柔將刀割斷水那用東西流隴水鳴不止似聞阿兒語出門不見人肝腸斷絶汝岐山操本朝張恂德之不修兮彼愛吾土吾敢愛此土兮重吾民苦望岐山兮綢繆牖户奈何使吾民兮間關水滸長安道吳兆騫馳道春風晚長楸落日斜按鷹來戚里挾瑟向侯家紈扇平陽月珊鞭宣曲花君王方好武新拜李輕車岐山操孫爾思豳土兮孔腴我豳兮是家彼忽焉兮我荼使我氓兮不獲休以愈朝遵兮漆滸夕築兮岐下北瞻兮豳藪昔我覆兮我宇皇天眷我兮復有兹土灞水操并序前人北溟子家於灞之澳習灞水之形與聲冬春則水落石出瑽瑢如佩玉其淺可以濫觴無所需于津人當夫秋水時至衆流畢􅚈則潰渱濞溢巨瀾彌望而不可厲揭也邇者刳木為舟以資利涉然不得夫善操舟者故楫纜徒具而無濟于時噫世果無善操舟之人乎哉灞之水兮其流濺濺灞之渟兮其深有徑蒲兮坻有弱荃彼有幽人兮恆于此乎蹁蹮厲揭其淺深兮以濯以湔秋水滎瀯而時至兮遠不覩夫修壖作舟楫兮期以濟此大川何操舟者之鮮其人兮望驚濤而徒旋哀慕歌商季歷先王既徂長霣異都哀傷心腹未寫中懷追念伯仲我季如何梧桐萋萋生于道周宫館徘徊臺閣既除何為遠去使此空虛支骨離别垂思南隅瞻望荆越涕淚交流伯兮仲兮逝肯來遊自非二人誰訴此憂紫芝歌商山四皓隱居髙祖聘之四皓不出仰天歎而作歌漠漠商洛深谷逶迤灼灼紫芝可以療飢唐虞世遠吾將安歸駟馬髙車其憂甚大富貴之畏人不如貧賤之肆志昊天嗟嗟深谷逶迤樹木漠漠髙山崔嵬岩居穴處以為幄茵灼灼紫芝可以療飢唐虞往矣吾當安歸隴頭水歌郝錦飛騎出隴頭已臨隴頭水夜聞鼓鐃聲知傍關山壘白渠歌無名氏田于何所池陽谷口鄭國在前白渠起後舉鍤如雲決渠為雨涇水一石其泥數斗且溉且糞長我禾黍衣食京師億萬之口隴頭二首并序同前秦州記曰隴山東望秦川四五百里極目怋然山東人行役升此而瞻顧者莫不悲思故歌曰隴頭流水流離四下念我行役飄然曠野登髙望遠涕零雙墮隴頭流水鳴聲嗚咽遙望秦川肝腸斷絶民謠同前武功太白去天三百孤雲雨角去天一握山水險阻黃金子午蛇盤烏櫳勢與天通古歌銅雀詞長安城西雙員闕上有一雙銅雀宿一鳴五榖生再鳴五榖熟五侯歌五侯初起曲陽最怒壞決髙都連竟外杜土山漸臺西白虎髙都外杜皆長安里名上郡歌成帝時馮野王為上郡太守其後弟立亦自五原太守徙西河上郡吏民喜美野王立相代為太守歌曰大馮君小馮君兄弟繼踵相因循聰明賢知惠吏民政如魯衛德化均周公康叔如二君京兆謠李燮拜京兆詔發西園錢燮上封事遂止不發吏民愛敬乃為此謠我府君道教舉恩如春威如虎剛不吐柔不茹愛如母訓如父盤中詩蘇伯玉妻山樹髙鳥鳴悲泉水深鯉魚肥空倉鵠常苦飢吏人婦會夫希出門望見白衣謂當是而更非還入門中心悲北上堂西入階急機絞杼聲催長歎息當語誰君有行妾念之出有日還無期結巾帶長相思君忘妾未知之妾忘君罪當治黃者金白者玉髙者山下者谷姓者蘇字伯玉人材多知謀足家居長安身在蜀何惜馬蹄歸不數羊肉千斤酒百斛令君馬肥麥與粟今時人知四足與其書不能讀當從中央周四角雍州晉摰虞於皇先王經啓九有有州惟雍居京之右土載奧區山包神藪嘉生惟繁庶髏殷阜悠悠周域有華有河外接荒服內含岐豐周餘既沒彜德未終莫不慕義易俗移風關中潘嶽於皇時晉受命既固三祖在天聖皇紹祚德博化光刑簡枉錯微火不戒延我寶庫蠢爾小醜狡焉思肆虞我國眚窺我利器嶽牧慮殊威懷理二將無專䇿兵不素肄翹翹趙王請徒三萬朝議惟疑未逞斯願桓桓梁征髙牙乃建旗蓋相望偏師作援虎視耽耽威彼好畤素甲日耀元幕雲起誰其繼之夏侯卿士惟系惟處别營棊跱夫豈無謀戎士承平守有完郛戰無全兵鋒交卒奔孰免孟明飛檄秦郊告敗上京周徇師令身膏氐斧人之云亡貞節克舉盧播違命投畁朔土為法受惡誰謂荼苦哀此黎元無罪無辜肝腦塗地白骨交衢夫行妻寡父出子孤俾我晉民化為狄俘亂離斯瘼日月其稔天子自矜旰食晏寢主憂臣勞孰不祇凛愧無獻納尸素以甚皇赫斯怒爰整精鋭命被上谷指日遄逝親奉成規稜威遐厲首陷中亭揚聲萬計兵固詭道先聲後實聞之有司以萬為一紂之不善我未之必虛皛湳德繆彰甲吉雍門不啓陳汧危逼觀遂虎奮感恩輸力重圍克解危城載色豈曰無過功亦不測情固萬端於何不有紛紛齊萬亦孔之醜曰納其降曰梟其首疇真可掩孰偽可久既徵爾辭既蔽爾訟當乃時實否則證空好爵既靡顯戮亦從不見竇林伏尸漢邦周人之詩實曰采薇北難獫狁西患昆夷以古况今何足曜威徒愍斯民我心傷悲斯民如何荼毒于秦師旅既加飢饉是因疫癘淫行荆棘成針絳陽之粟浮于渭濱明明天子視民如傷申命羣司保爾封疆靡暴于衆無陵于強惴惴寡弱如熙春陽關隴歌并序無名氏王猛政理稱舉關隴清宴自長安至于諸州皆夾樹槐栁百姓歌之曰長安大街夾樹楊槐下走朱輪上有鸞棲英彥雲集誨我萌黎隴頭流水歌無名氏西上隴阪羊腸九回山髙谷深不覺腳酸送方希直先生還漢中明蜀獻王椿嵋山峨峨江水泱泱我疆我理俾民以康靡言匪衣靡善匪得閲士孔多我敬希直謙以自牧卑以自持雍容儒雅鸞鳳之儀有學有識乃作乃述追之琢之金玉之質侍我經筵不倦以勤非德不言非道不陳職思其歸義不可奪采采者芹侍教如渴爰秣其馬爰振其衣拜手稽首載辭而歸昔之來也春日遲遲今之歸也涼風凄凄悠悠我心念子良苦爰命詞臣飲餞江滸王道如砥既歌且詠八月初吉抵于南鄭沔彼江漢亦合而流瞻彼岷峨鬱其相繆心之憂兮臨别繾綣子如我思道豈云遠嵗行在子文闈秋開較藝至公遲子西來南山十三章選三王九思美康侯也維茲鄠學多歷年所日就頽壞官師失據士因廢業茂才俊異亦蹇于成侯用疚心作而新之以興禮學施教化成人才裨治道焉諸士樂而美之作是詩也天啓斯文佑我鄠人康侯蒞止懷保小民小民攸樂既豐既穫既康既廓其色沃若侯曰時哉乃其有作乃作講堂講堂翼翼乃作齋廡齋廡殖殖乃作肄舍肄舍戢戢乃作中門中門仡仡乃作繪壁爛其有色言言學宫既邃既新我侯蒞止其從如雲於樂泮水言采其芹明明我侯淑慎其身其德不爽萬福來臻城略陽何景明扶風令城略陽賊來略陽令走藏扶風令為登城喚抽刀誓衆衆不散三日抗城一日戰戰不利兮生縛見見賊罵賊危不變略陽城人盡為鬼略陽令生扶風死守臣上奏驚天子君不見扶風令死封公卿嗟爾略陽之令胡為生韓侯祠蘇進溥彼疆兮周后是命皇皇幅􅊷天偉厥勝析余以圭至止為政攬轡山川驚竒莫竟大河西注龍門北豁兩崖天塹雲懸斧鑿浪起轟空龍翻崩嶽萬古雄流為韓經絡有截晉墟岌然南界東據洪河西袤梁外鉤連三嶺環合如帶鞏哉金盂無一絲壞隴頭胡纘隴頭林密流水其內赤根絲絲白波濊濊隴泉潄玉隴鳥沖煙隴水到地隴木到天輞川懷古吟四章本朝許孫荃有幽其山載曲其水我思古人築室於此其人伊何實始宋公之問曾僑寓於此右丞别墅風光不同亦有錢起裴迪過而詠歌溫庭筠白樂天繼起夢想岩阿伊余小子數公而後結廬何時於川之右三良冢魏曹植功名不可為忠義我所安秦穆先下世三人皆自殘生時等榮樂既殁同憂患誰云捐軀易殺身誠獨難攬涕登君墓臨穴仰天嘆長夜何冥冥一往不復還黃鳥為悲鳴哀哉傷肺肝贈羊長史晉陶潛左軍羊長史銜使秦川作此與之愚生三季後慨然念黃虞得知千載外正賴古人書賢聖留餘迹事事在中都豈忘遊心目關河不可踰九域甫已一逝將理舟輿聞君當先邁負疴不獲俱路若經商山為我少躊躇多謝綺與甪精爽今何如紫芝誰復採深谷久應蕪駟馬無貰患貧賤有交娛清謡結心曲人乖運見疏擁懷纍代下言盡意不舒三良冢前人彈冠乘通津但懼時我遺服勤盡歲月常恐功愈微忠情謬獲露遂為君所私出則陪文輿入必侍丹幄針規嚮已從記議初無虧一朝長逝後願言同此歸厚恩固難忘君命安可違臨穴罔遲疑投義志攸希荆棘籠髙墳黃鳥聲正悲良人不可贖泫然沾我衣西遊咸陽中陳隂鏗上林春色滿咸陽遊俠多城斗疑連漢橋星象跨河影裏看飛轂塵前聽遠珂還家何意晚無處不經過秋日遊昆明池江總靈沼蕭條望遊人意緒多終南雲影落渭北雨聲過蟬噪金隄栁鷺飲石鯨波珠來照似月織處寫成河此時臨水歎非復採蓮歌浴溫湯泉北齊劉逖驪岫猶懷土新豐尚有家神井堪消疹溫泉足蕩邪紫苔生石岸黃沫擁金沙振衣殊未已翻能停使車京兆歌陸厥園夾池水修竹復檀欒不如黃山苑儲胥與露寒邐迤傍無界岑崟鬱上干上干入翠微下趾連長薄芳露浸紫莖秋風搖素蕚雁起宵未央雲間月將落照梁桂兮影徘徊承露盤兮光照灼壽陵之街走狐金巵玉碗會銷鑠願奉葡萄花為石實羽爵幸同州過故宅北周明帝玉燭調秋氣金輿歷舊宫還如過白水更似入新豐霜潭漬晚菊寒井落疏桐舉杯延故老今聞歌大風登渭橋宗羈仲山朝飲馬還坐渭橋中南瞻臨别館北望盡離宫四面衣裾合三條冠蓋通蘭香想和季雲起憶成公圯上相知早雞鳴幸共同陪駕幸終南山宇文昶堯蓋臨河潁漢蹕踐華嵩日旗回北鳳星斾轉南鴻青雲過宣曲先驅背射熊金桴拂泉底玉琯吹雲中古轍稱難極新途或易窮煙生山欲盡潭淨水恆空交松上連霧修竹下來風仙才道無别靈氣法能同東棗羞朝座西桃獻夜宫詔令王子晉出對浮丘公陪駕幸終南和宇文內史庾信玉山乘四載瑤池宴八龍黿橋浮少海鵠蓋上中峰飛狐橫塞路白馬當河衝水奠三川石山封五樹松長虹雙瀑布圓闕兩芙蓉戌樓鳴夕鼓山寺響晨鐘新蒲節轉促短笋籜猶重樹宿含櫻鳥花留釀蜜蜂迎風下列缺灑酒召昌容且欣陪北上方欲待東封同州還前人赤岸繞新村青城臨綺門范睢新出相穰侯始出藩上林催獵響河橋爭渡喧竄雉飛橫澗藏狐入斷原將軍髙宴晚來過青竹園和春日晚景宴昆明池前人春餘足光景趙李舊經過上林栁腰細新豐酒徑多小船行釣鯉新盤待摘荷蘭臯徒稅駕何處有凌波忝在司水看治渭橋前人大夫參下位司職渭之陽富平移鐵鎖甘泉運石梁跨虹連絶岸浮黿續斷航春洲鸚鵡色流水桃花香星精逢漢帝釣叟值周王平堤石岸直髙堰栁隂長羡言杜元凱河橋獨舉觴春和趙王西京路春旦前人直城龍首抗橫橋天漢分風烏疑近日露掌定髙雲新渠還入渭舊鼎更開汾漢獵熊攀檻秦田雉失羣宜疑作祈年動春律御宿斂寒氛弄玉迎蕭史東方覔細君楊栁成歌曲蒲桃學繡文鳥鳴還獨解花開先自薰誰知灞陵下猶有故將軍秋日遊昆明池隋薛道衡灞陵因靜退靈沼暫徘徊新船木蘭楫舊宇豫章材荷心宜露泫竹徑重風來魚潛疑刻石沙暗似沈灰琴逢鶴欲舞酒遇菊花開羈心與秋興陶然寄一杯奉和春日臨渭水應令栁辨飲馬投錢岸解釣剖璜津風絲曵香餌覆杯懷昔人行經太華孔德紹紛吾世網暇靈嶽展幽尋寥濶風塵遠杳冥川谷深山昏五里霧日落二華隂疏風起蓮葉危塞隱桃林何必東都外此處可抽簪登終南山胡師耽結廬終南山西北望帝京煙霞亂鳥道劣見長安城宫雉互相映雙闕雲間生鐘鼓沸閶闔笳管咽