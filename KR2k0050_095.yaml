告祭酒如此至寶存豈多氊包席裹可立致十鼓祇載數駱駝薦諸太廟比郜鼎光價豈止百倍過聖恩若許留太學諸生講解得切磋觀經洪都尚填咽坐見舉國來奔波剜苔剔蘚露節角安置妥帖平不頗大厦深簷與蓋覆經歷久遠期無他中朝大官老于事詎肯感激徒媕婀牧童敲火牛礪角誰復著手為摩挲日銷月爍就埋沒六年西顧空吟哦羲之俗書趁姿媚數紙尚能博白鵝繼周八代爭戰罷無人收拾理則那方今太平日無事柄用儒生重丘軻安能以此尚論列願借辨口如懸河石鼓之歌止于此嗚呼吾意其蹉跎奉酬盧給事雲夫四兄曲江荷花行見寄并呈上錢七兄徽閣老張十八助教前人曲江千頃秋波淨平鋪紅雲蓋明鏡大明宫中給事歸走馬來看立不正遺我明珠九十六寒光映骨睡驪目我今官間得婆娑問言何處芙蓉多撑舟昆明度雲錦腳敲兩舷呌吳歌太白山髙三百里負雪崔嵬插花裏玉山前却不復來曲江汀瀅水平杯我時相思不覺一回首天門九扇相當開上界真人足官府豈如散仙鞭笞鸞鳳終日相追陪古意前人太華峰頭玉井蓮花開十丈藕如船冷比雪霜甘比蜜一片入口沈疴痊我欲求之不憚遠青壁無路難夤緣安得長梯上摘實下種七澤根株連金銅仙人辭漢歌并序李賀魏明帝青龍元年八月詔宫官牽車西取漢孝武捧露盤仙人欲立置前殿宫官既拆盤仙人臨載乃澘然淚下唐諸王孫李長吉遂作金銅仙人辭漢歌茂陵劉郎秋風客夜聞馬嘶曉無迹畫欄桂樹懸秋香三十六宫土花碧魏官牽車指千里東關酸風射眸子空將漢月出宫門憶君清淚如鉛水衰蘭送客咸陽道天若有情天亦老攜盤獨出月荒涼渭城已遠波聲小過敷水白居易垂鞭欲渡羅敷水處分鳴騶且緩謳秦氏雙蛾久冥寞蘇臺五馬尚踟蹰村童店女仰頭笑今日使君真是愚南梁行李紳江城鬱鬱春草長悠悠漢水浮清光雜英飛盡空晝景緑楊重隂官舍靜此時醉客縱橫書公言可薦承明廬元和十四年故山南節度僕射崔公奏觀察判官蒙以書奏見委青天詔下寵光至頒籍金閨徵石渠秭歸山路煙嵐隔山木幽深晚花拆澗底紅光奪火然搖風扇毒愁行客駱谷中多毒樹名山琵琶其花明艷與杜鵑花同樵者識之言曰早花殺人杜鵑啼咽花亦殷聲悲艷艷連空山斜陽瞥映淺深樹雲雨翻迷崕谷間山雞錦質矜毛羽透竹穿蘿命儔侣喬木幽溪上下同雄雌不異飛棲處望秦峰迥過商顔浪疊雲堆萬簇山行盡杳冥青嶂外九重鐘漏紫霄間元和列侍明光殿諌草初焚市朝變北闕趨承半隙塵南梁笑客皆飛霰追思感嘆却昏迷霜鬢愁吟到曉雞故篋歲深開斷簡秋堂月曙掩遺題嗚嗚曉角霞輝粲撫劍當應一長嘆芻狗無由學聖賢空持感激終昏旦橋山懷古舒元輿軒轅厭代千萬秋淥波浩蕩東西流今來古往無不死獨有天地長悠悠我乘驛騎到中部古聞此地為渠搜橋山突兀在其左荒榛交鎖寒風愁神仙天下亦如此况我戚促同蜉蝣誰言衣冠葬其下不見弓劍何人收哀喧呌笑牧童戲隂天月落狐狸遊却思皇墳立人極車輪馬迹無不周洞庭張樂降元鶴涿鹿大戰摧蚩尤知勇神天不自大風后力牧輸長籌襄城迷路問童子帝鄉歸去無人留崆洞求道失遺迹荆山鑄鼎餘荒丘君不見黃龍飛去山下路斷髯成草風颼颼長安雜題長句六首選一杜牧洪河清渭天池濬太白終南地軸橫祥雲輝映漢宫紫春光繡畫秦川明草妬佳人鈿朵色風回公子玉銜聲六飛南幸芙蓉苑十里飄香入夾城津陽門詩并序鄭嵎津陽門者華清宫外闕南局禁闈北走京道開成中嵎常下帷于石甕僧院多聞宫中陳迹今年冬自虢來暮及山下因解鞍謀餐客旅邸而主翁年且艾自言及事明皇夜闌酒餘復為嵎道承平故實翼日于馬上輒裁刻俚叟之語為長句七言詩凡一千四百字成一百韻以門題為之自云耳津陽門北臨通逵雪風獵獵飄酒旗泥寒欵段蹶不進疲童退問前何為酒家顧客催解裝案前羅列樽與巵青錢瑣屑安足數白醪軟美甘如飴開壚引滿相獻酬枯腸渴肺忘朝飢愁憂似見出門去漸覺春色入四肢主翁移客挑華燈雙肩隱膝烏帽欹笑云鮐老不為禮飄蕭雪鬢雙垂頤問余何往凌寒曦顧翁枯朽郎豈知翁曾豪盛客不見我自為君陳昔時時平親衛號羽林我才十五為孤兒射熊摶虎衆莫敵彎弧出入隨佽飛此時初創觀風䄛簷髙百尺堆華榱樓南更起鬭雞殿晨光山影相參差其年十月移禁仗山下櫛比羅百司朝元閣成老君見會昌縣以新豐移幽州曉進供奉馬玉珂寶勒黃金羈五王扈駕夾城路傳聲校獵渭水湄羽林六軍各出射籠山絡野張罝維雕弓繡韣不知數翻身滅沒皆蛾眉赤鷹黃鶻雲中來妖狐狡無所依人煩馬殆禽獸盡百里腥腥禾黍稀暖山度獵東風微宫娃賜浴長湯池刻成玉蓮噴香液潄回煙浪深逶迤犀屏象薦雜羅列錦鳬繡雁相追隨破簪碎鈿不足拾金溝殘溜和纓緌上皇寬容易承事十家三國爭光輝繞牀呼盧恣樗博張燈達晝相謾欺相君侈擬縱驕橫日從秦虢多遊嬉朱衫馬前未滿足更驅武卒羅旌旗畫輪寶軸從天來雲中笑語聲融怡鳴鞭後騎何躞蹀宫粧襟袖皆仙姿青門紫陌多春風風中數日殘春遺驪駒吐沫一奮迅路人擁篲爭珠璣八姨新起合歡堂翔鵾賀燕無由窺萬金酬工不肯去矜能恃巧猶嗟咨四方節制傾附媚窮奢極侈沾恩私堂中特設夜明枕銀燭不張光鑒帷瑤光樓南皆紫禁梨園仙宴臨花枝迎娘歌喉玉􅌄窱蠻兒舞帶金葳㽔迎娘蠻兒乃梨園弟子之名聞者三郎紫笛弄煙月怨如别鶴呼羈雌玉奴琵琶龍香撥倚歌促酒聲嬌悲飲鹿泉邊春露晞粉梅檀杏飄朱墀金沙洞口長生殿玉蘂峰頭王母祠禁庭術士多幻化上前較勝紛相持羅公如意奪顔色三藏袈裟成散絲蓬萊池上望秋月無雲萬里懸清輝上皇夜半月中去三十六宫愁不歸月中祕樂天半間丁璫玉石和塤箎宸聰聽覽未終曲却到人間迷是非千秋御節在八月會同萬國朝華夷花萼樓南大合樂八音九奏鸞來儀都盧尋橦誠齷齪公孫劍伎方神竒馬知舞徹下牀榻人惜曲終更羽衣祿山此時侍御側金雞畫障當罘罳繡祤衣褓日屓贔甘言狡計愈嬌癡詔令上路建甲第樓通走馬如飛翬大開內府恣供給玉缶金筐銀簸箕異謀潛熾促歸去臨軒賜帶盈十圍忠臣張公識逆狀日月切諫上弗疑湯成召浴果不至潼關已溢漁陽師御街一夕無禁鼓玉輅順動西南馳九門回望塵坌多六龍夜馭兵衛疲縣官無人具軍頓行宫徹屋屠雲螭時郊畿草擾無御頓之備上命徹行宫木宰御馬以饗士卒馬嵬驛前駕不發宰相射殺寃者誰長眉鬒髮作凝血空有君王潛涕洟青泥坂上到三蜀金堤城邊止九旗移文泣祭昔臣墓度曲悲歌秋雁辭明年尚父上捷書洗清觀闕收封畿兩君相見望賢頓君臣鼓舞皆歔欷宫中親呼髙驃騎潛令改葬楊真妃花膚雪艷不復見空有香囊和淚滋鑾輿却入華清宫滿山紅實垂相思飛霜殿前月悄悄迎春亭下風颸颸飛霜殿即寢殿而白傅長恨歌以長生殿為寢殿殊誤矣雪衣女失玉籠在長生鹿瘦銅牌垂象牀塵凝罨颯被晝襜蟲網頗梨碑碧菱花覆雲母陵風篁雨菊低離披真人影帳偏生草果老藥室空掩扉真人李順興後周時修道北山順興影堂果老藥室亦在禁中也鼎湖一日失弓劍橋山煙草俄霏霏空聞玉碗入金市但見銅壺飄翠帷開元到今踰十紀當初事迹皆殘隳竹花唯養棲梧鳳水藻周遊巢葉龜會昌御宇斥內典去留二教分黃緇慶山汙瀦石甕毁紅樓緑閣皆支離竒松怪柏為樵蘇童山眢谷亡嶮巇煙中壁碎摩詰畫雲間字失元宗詩石魚巖底百尋井銀牀下卷紅綆遲當時清影蔭紅葉一旦飛埃埋素規韓家燭臺倚林杪千枝燦若山霞摛昔年光彩奪天月昨日銷鎔當路岐龍宫御榜髙可惜火焚牛挽臨﨑峗孔雀松殘赤琥珀鴛鴦瓦碎青琉璃寺額睿宗在藩邸中所題也標于危樓之上今我前程能幾許徒有餘息筋力羸逢君話此空灑涕却憶歡娛無見期主翁莫泣聽我語寧勞感舊休吁嘻河清海宴不難覩我皇已上升平基湟中土地昔湮沒昨夜收復無瘡痍戎王北走棄青塜羌馬西奔空月支西逢堯年豈易偶願翁頤養豐膚肌平明酒醒便分手今夕一樽翁莫違藍田悟真寺作宋蘇舜欽旅食長安城回遑奔走無停行清懷壯抱失素向胸中填積塵土生偷間得至玉峯下為聞悟真之寺之嘉名杖笻赤腳度藍水細流激激心骨清仰看蒼山髙峯旁白雲明滅藏日光行人遙指置寺處正在白雲之中央逡巡緣棧更險絶攀蘿捫壁隨低昻明行咫尺乃相失已與雲霧相翺翔時聞啼鳥入吹竹數步一休還縱目行行未知髙則危下視昏煙覆平陸滿巖佳樹光朴􅈪赫赤如霞間濃緑是時八月初路旁已見芬芬菊貪竒戀景不知倦側睥又復心瑟縮神魂飛下大壑幽定省移時進雙足寺門髙開朝日暉丹青黭淡唐時屋老僧引我周遊看且云白氏子詩乃實録此詩疇昔余所聞殷勤更向碑前讀按言索像今無復惟有流泉數道如車輻我嫌世纍欲暫居又云此地無留宿殿宇之後林莽中日暮常有虎豹伏鑿石龕邊崕至淺近有浮屠於此相棖觸快心宿忿兩不解一乃顛擠死其谷我聞為之久顰戚此向期將避煩辱不為傷生事更多爭如平地隨流俗嘆息回頭急出山始覺全軀已為福華山邵雍太華中峯五千仞下有大道人往還當時馬上一回首十載夢魂猶過關生平愛山山未足由此看盡天下山求如華山是難得使人消得一生間石鼓蘇軾冬十二月歲辛丑我初從政見魯叟舊聞石鼓今見之文字鬱律蛟蛇走緬觀初以指畫肚欲讀嗟如箝在口韓公好古生已遲我今况又百年後強尋偏旁推點畫時得一二遺八九我車既攻馬亦同其魚維鱮貫之栁古器縱橫猶識鼎衆星錯落僅名斗糢糊半已似瘢胝詰曲猶能辨跟肘娟娟缺月隱雲霧濯濯嘉禾秀稂莠漂流百戰偶然存獨立千載誰與友上追軒頡相唯諾下挹氷斯同鷇㝅憶昔周宣歌鴻雁當時籕史變蝌蚪厭亂人方思聖賢中興天為生耆耈專征徐淮闞虓虎北伐犬戎隨指嗾象胥雜沓貢狼鹿方召聯翩賜圭卣遂因􅎏鼓思將帥豈為考擊煩矇瞍何人作頌比嵩髙萬古斯文齊岣嶁勳勞至大不矜伐文武未遠猶忠厚欲尋年代無甲乙豈有名字紀誰某自從周衰更七國竟使秦人有九有掃除詩書誦法律投棄俎豆陳鞭杻當年何人佐祖龍上蔡公子牽黃狗登山刻石頌功烈後者無繼前無偶皆云皇帝巡四國烹滅強暴救黔首六經既已委灰塵此鼓亦當遭擊掊傳聞九鼎淪泗上欲使萬夫沈水取暴君縱欲窮人力神物義不汙秦垢是時石鼓何處避毋乃天公令鬼守興亡有變物自間富貴一朝名不朽細思物理坐嘆息人生安得如爾壽雙皂莢行陳叔度緑葉森森迎曉日雙雙暗結秋霜實乾坤造化借風流隂靈滑稽為誰匹一蒂雙葩心兩同風力雨綿神其功中官始奏獻竒異祥圖瑞牒揮毫鋒四海萬方只一株繚繞周牆百丈餘侍從宫娃共爭取攀援棘刺血羅襦采得溫泉奉金輦雪瑩肌膚紅玉暖合歡當前此物生上皇都笑天機淺驪山李豸君門如天深九重君王如帝坐法宫人生難處是安穩何為來此驪山中復道凌雲接金闕樓觀隱煙橫翠空林深霧暗迷八駿朝東暮西勞六龍六龍西幸峨眉棧悲風便入華清院霓裳消散羽衣空麋鹿來遊猿鶴怨我上朝元春半老滿地落花人不掃羯鼓樓髙挂夕陽長生殿古生青草可憐吳楚兩醯雞築臺未就已堪悲長楊五柞漢幸免江都樓成隋自迷從來流連多喪國晏安鴆毒因奢惑三風十愆古所戒不必驪山可亡國遊華山寄元裕之金趙秉文我從秦川來遍歷終南遊暮行華隂道清使明雙眸東風一夜橫作惡塵埃咫尺迷嵓幽山神戲人亦薄相一杯未盡隂霾收但見兩崕巨壁插劍戟流泉夾道鳴琳璆希夷石室緑蘿合金仙鶴駕空悠悠石門劃斷一峯出婆娑石上為遲留上方可望不可到崖傾路絶令人愁十盤九折羊角上青柯坪上得少休三峰壁立五千仞其下無址旁無儔巨靈仙掌在霄漢銀河飛下青雲頭或云竒勝在髙頂腳力未易供冥搜蒼龍嶺瘦苔蘚滑嵌空石磴誰雕鎪每憐風自四山而下不見底惟聞松聲萬壑寒颼颼捫參歷井到絶頂下視塵世區中囚酒酣蒼茫瞰無際塊視五嶽芥九州南望漢中山碧玉簇亂抽况復秦宫與漢闕飄然聚散風中漚上有明星玉女之洞天二十八宿環且周又有千歲之玉蓮花開十丈藕如舟五鬛不朽之長松流膏入地盤蛟虬采根食實可羽化方瞳緑髮三千秋時聞笙簫明月夜芝軿羽蓋來瀛洲乾坤不老青山色日月萬古無停輈君且為我挽回六龍轡我亦為君倒却黃河流終朝汗漫遊八極乘風便覔元丹丘跋范寬秦川圖麻九疇山水人傳范家筆畫史推尊為第一朅來因看秦川圖天下丹青能事畢大山巖巖如國君小石落落士與民一山一形似爭長一石一態如布軍想君胸中有全秦見鐻削鐻鐻乃真掌上長安近於石千樹萬樹生青春憶昔岐山鳳凰語蔥蔥柞棫霑新雨昆夷束手密須降不見功勳見歌舞黃金鑄牛西入僰五丁雲棧通中國驪山宫闕九天髙六處孱王走銜璧坑士焚書信法家關東半被魚書惑畫卷圖籍亦大好五十年凶都一掃章邯董翳舉如毛沐猴冠委金陵道北原兵自天而下漢室傾頽如解瓦祁山六出縱無功渭水猶堪飲君馬螭蟠老將骨未朽草付那能濟陽九技癢投鞭抵歲星歸來鹿死何人手神武空矜賀六渾投機常落周人後竟令馮翊軟沙邊東風一夜吹新栁侵尋皂角相料理拋擲龍津浮汴水鷁頭過處已非隋不覺晉陽人姓李華清髙宴戞宫梧舞馬如何護兩都縱得青騾還蜀道肉得沙場白骨無興亡自取不可吁可憐神州為盜區貪徵往古山川事忘却題詩賞畫圖長安行李獻甫長安大道無人行黃塵不起生荆榛髙山有峰不復險大河有浪亦已平向來百二秦之形祇今百二秦之名我聞人固物乃固人不為力物乃傾將軍誓守不誓戰戰士避死不避生殺人飽厭敵自去長安有道誰當行黃塵漫漫愁殺人但見蔽野雞羣鳴河東遊子淚如雨眼花落日迷秦城長安道無人行長安城中若為情遊藍田王渥甲申之秋月建戌我行商嶺正落木山英似與行子期撥霧披雲到山腹古潭千丈照錦峰下有蟄龍上棲鵠髙風吹雪已多時熊耳雙尖寒欲縮新乘一水出龍窩驚見千峰遮木槲南山秀拔北山雄劒戟森然對羣玉﨑嶇直過藍田西始見商山真面目悟真峽口忽中斷天末修眉畫濃緑此峽何年得此名曾有金仙搆華屋西巖石室懸細水萬斛瓊珠輸輞谷行人尚説有七盤瘦馬已愁疲百曲風門放眼望秦川擾擾更嗟塵界局去年遊騎渡葭蘆萬里橫行如鬼速霸陵原下馬飲血太華峰頭虎擇肉今年九月未防秋始見登場有新榖一鞭莫指古招提疏雨有情留客宿主人聞客喜相接樽酒笑談如宿昔蹇豫懶散本真性臨水登山此生足一行作吏志益違十載從軍雙鬢禿官家後日鑄五兵便擬買牛耕白鹿長安少年行元元好問黃衫少年如玉筆生長侯門人不識道逢俠客問姓名袖把金鞭側身揖卧馳行槖錦帕蒙石榴壓漿銀作筒八月蒼鷹一片雪五花驕馬四蹄風日暮新豐原上獵三更歌舞灞橋東題華山圖張翥華嶽連天向西起澒洞秦川三百里巨靈髙掌削芙蓉影落黃河一絲水雲臺霧谷巢神仙羽衣金節時周旋大笑失腳白騾背歸來石上長鼾眠千載悠悠寄玄賞耳孫風骨猶蕭爽遠從丹丘渡滄海追挹神蹤欲長往何人想像圖真形疊崖隂洞髙林青上摩金天之帝京下攬玉女之明星峰邪麓邪兩莫極虎豹呌絶煙霏冥仙家樓觀超然住遙認微茫是征路丹梯鐵鎖不可攀直喚茅龍上天去潼關陳基河渾渾關崿崿太古以來神禹鑿前車未行後車却去馬一鳴來馬愕自從虎視繼龍興周道不復如砥平至今惟有秦川路千里秋風落葉聲賜華山孫碧雲明成祖太華山髙九千仞幽人學道巢其巔雲邊一卧知幾年緣崖鐵鎖嘗攀緣世間萬物無所纍飢食瓊芝渴乳泉煉龍還丹握化權三關透徹玄中玄髙奔日月呼紫煙絳宫瑤闕長周旋玉華靈芽植丹田明珠一點方寸圓左挹神公右白猿夜開明堂相與言窈冥恍惚合自然時人欲見不可得三峰下俯飛鴻翼丹丘羽人常往還洪崖赤松舊相識只今邂逅契心期青瞳緑髮煙霞姿福地洞天遊欲遍逍遙下上驂虬螭若遇真仙張有道為言佇俟長相思題華山圖劉基華嶽插天七千丈丹崖翠壁開仙掌壁間擘出黃河流大禹以之分九州河流滚滚赴溟漲華嶽拔出天河上雲宫霧窟疑本無石室金臺儼相向玉泉髙通玉井津中有蓮實如車輪時人肉食未羽化可望不得聊相親髙掌晚晴圖畫展眼明一見心自遠世間塵土日紛紛吾當拂衣卧山雲溫泉行宫張羽煌煌帝業三百年驪山宫殿空雲煙美人艷骨為黃土山前不改舊溫泉溫泉雖在君王去芳草萋萋滿宫路泉聲如泣日將暮山雞亂鳴上林樹憶昔玉環賜浴時紅樓綺閣香風吹頭上寶叉涼欲墮蓮步輕扶雙侍兒有客今年曾過此宫牆壞傾山色死虎旅知更不復問池上玉龍猶噴水當時此水在天上一沐恩波榮莫比六宫粉黛不敢唾今日行人鬭來洗避詔巗二首選一王履希夷先生愛睡者睡去那知有晨夜胡為留迹與留聲惹得丹書到林下到時却避無乃遲聲迹既留能致之然非賣畚捫蝨漢解識九五真龍飛真龍未飛良有以元元之依竟誰是笑聲忽動墮驢時徑入深山白雲裡安期固是神仙倫預項干劉能忘秦未忍乘龍自長往間將瓜棗試時人咸陽懷古謝貞咸陽古帝宅雉堞何崔嵬積