body:
  text: 陕西通志巻十四城池度地居民軒皇肇制踐華因河天然形勢由腹逮邉大小維繫崇墉言言深池淠淠繕治堅完塞垣至計鞏固秦疆如帶如礪建威銷萌浚築守衛得厥人和金湯百世作城池志第五西安府長安咸寧附郭府城即隋唐京城隋文帝厭長安制小納蘇威諌召髙熲等創建新都其地在漢故城東南南直終南子午谷北枕龍首山以據渭水東臨滻㶚唐永徽五年築羅城天祐元年匡國軍節度使韓建改築約其制謂之新城宋金元皆因之明洪武初都督濮英増脩周四十里髙三丈門四東曰長樂西曰安定南曰永寧北曰安逺四隅角樓四敵樓九十八座十七年建鐘皷二樓於城内東西相距半里許正統五年脩葺布政王暹為記嘉靖五年廵撫王藎重脩城樓有少保王用賔記隆慶二年廵撫張祉甃以甎有布政曹金記崇禎末廵撫孫傅庭築四郭城闖冦入闗焚東門樓及南月城樓本朝順治十三年廵撫陳極新脩葺如制康熈元年雨圮總督白如梅廵撫賈漢復重脩三十八年復脩城内皷樓咸寧知縣董𢎞彪記之滿城在府城内東北隅西界鐘樓本朝順治六年即故明秦府城改築門五東仍長樂西南因鐘樓東洞西北曰新城南曰端禮西曰西華咸陽縣城池舊在杜郵館西明洪武四年縣丞孔文郁遷今治築城浚濠有李炳記景泰三年知縣王瑾重脩周四里一百五十二步南臨渭水衝崩為患正德戊寅知縣底藴脩河岸制樁板沿堤覆翼嘉靖九年巡撫劉天和復脩之檢討王九思為記二十六年巡撫謝蘭拓東西北三隅四里有竒髙二丈五尺鑿池深一丈五尺門九東曰朝陽西曰望賢南曰渭陽北曰五陵學道門曰文明上各建樓又有西北小北小南及新城門萬厯丁亥堤圮水浸及城知縣樊鎔脩築有御史張應詔記崇禎中知縣張名世重加築濬譙樓在城内西街興平縣城池隋大業九年建土築周七里三分髙三丈池深一丈明成化十三年知縣王琮脩築嘉靖三十一年知縣劉賢引泉溉土築之完固倍昔三十五年知縣朱文環堞築臺起舍建四門樓有主事劉永記三十八年知縣章評改建譙樓於東南城上匾四門東曰喜雨西曰喜豐南曰喜晴北曰喜雪本朝順治中知縣徐開熈重脩臨潼縣城池在驪山之隂湯泉迴繞西北唐天寳六載建明洪武初増築周四里髙二丈七尺池深一丈五尺門四東北曰集鳯西曰永豐南曰華清北曰臨渭萬厯十一年改建北門於西北隅城樓五本朝順治十年塞北門康熈中知縣趙于京建臨渭亭於城上子方髙陵縣城池隋大業七年建周二里百二十步今曰土城為儒學射圃北垣明景泰元年知縣張錦増築周四里二百二十步髙三丈池深二丈五尺門四東曰距河西曰迎翠南曰接蜀北曰通逺東南二門知縣楊清甃以甎天順中僉事張紳築敵臺葺鋪舍嘉靖中知縣鄧興仁闢水門一甃以甎石譙樓在東門内轉南城下鄠縣城池舊在縣南二里隋大業十年徙建今治金大定二十三年縣令劉某重脩有靳康侯記周六里七十四歩髙二丈五尺土築池深一丈五尺門四東曰宜春西曰通濟南曰仁智北曰望威舊俱有樓明崇禎九年知縣張宗孟重脩建樓兩層各三楹豎四隅敵樓懸樓四十二座本朝康熈二十年知縣康如璉重脩譙樓在城内正中藍田縣城池本名嶢栁城亦名青泥城晉桓温伐苻健遣京兆太守薛珍擊青泥破之即此舊城周八里後改築之因東南一隅僅三里許門二明嘉靖二年知縣王科拓之周四里有竒髙三丈有竒池深二丈濶一丈闢四門東曰繡嶺回春西曰白鹿呈祥南曰㶚水環清北曰玉山映翠御史李東記二十年知縣吕好古闢水門於西南隅三十二年知縣楊紹先易女墻以甎萬厯中知縣王邦才増築北門甕城建門樓西向甃以甎副使秦隣晉記崇禎中知縣雷鳴時甃北城以甎本朝順治七年知縣楊行健修葺甕城十六年知縣郭顯賢修築涇陽縣城池秦苻堅創建土築元至正二十七年張思道令右丞魏文佐守禦修築周五里二十歩髙三丈五尺池深七尺明景泰元年知縣曽玉重修建東西二門東曰宣文西曰寧武成化間巡撫余子俊増闢南北二門南曰臨川北曰拱辰嘉靖二十六年増置東西郭崇禎四年城圮知縣梁士淳重修八年知縣王珵増修北門甕城本朝順治九年知縣王際有重修南門城樓及鋪舍鼓樓在城内縣治前鐘樓在聖果寺前三原縣城池本舊龍橋鎮元至元二十四年徙縣治於此土築周九里一百八十步髙二丈三尺白渠流繞城中東北隅有月城門四東曰賔暘西曰西達甘凉南曰髙山逺翠北曰凝瑞水門二東西南三面有池深三丈濶五丈北臨清河深十丈餘明初築西郭城周一里六分為邑右翼門二西曰三邉要路西南曰遙迎太白城池髙深與縣城同嘉靖三十六年巡撫謝蘭築北郭城周四里四分髙三丈池深如之有光禄馬理記萬厯間少保温純重加修葺建石梁南與縣城相連有尚書李維禎記門四東曰永泰西曰永安南曰永清北曰永寧崇禎七年知縣張縉彦以縣城北面瀕河岸圮増甎垜四百五十四丈餘邑諌議劉曰俊修馬墻髙八尺八年貢生趙希獻首倡築東郭城周三里三分竒髙三丈五尺門二東曰朝陽東南曰迎巽本朝順治初知縣李溥繕雉堞増修城樓譙樓在城内正中盩厔縣城池本隋唐舊址東西長南北狹象魚形周五里三分髙三丈二尺四面皆重門東曰迓曦西曰萃金南曰迎薫北曰拱極明嘉靖中知縣李春芳於内外東門及西内南外各建樓北内樓則知縣黎元續成之又引廣濟渠由隍西南東西夾流南深一丈廣三丈五尺東西較狹而深本朝康熈元年知縣駱鍾麟修築有教諭齊國俍記十八年知縣章泰濬壕甃甕城以甎改建城樓復新城北女墻小亭顔曰觀稼自為文記之雍正二年知縣董霑修觀稼亭譙樓在縣治前霑並新之亦自為記渭南縣城池隋大業九年建元至正二十一年元帥濶廓將商暠東拓二百三十五歩明洪武初縣丞呉雲加拓周七里門四東曰拱華西曰望秦南曰通源北曰臨渭東西各有樓嘉靖中知縣梁沂建北門樓乙邜地震傾圮知縣李希雒重築東南北三面又加拓焉周七里三百二十四歩髙二丈七尺池深一丈五尺塞南門議甃睥睨敵臺㑹被徵輟隆慶初知縣崔廷試復闢南門増飛樓二年知縣梁許増築甎甃髙三丈増角樓四敵樓十二有副使薛騰蛟記萬厯初知縣褚順起門闍與城顛齊甃睥睨水道以甎易門額曰引華襟湭帶渭抱豐萬厯末知縣徐吉重加修葺本朝順治間知縣尚九遷康熈間知縣孫熿黄培相繼増修雍正七年知縣岳冠華重築北城十二丈睥睨俱甃以甎東西門重建吊橋譙樓在縣治前富平縣城池本名窰橋頭元末張良弼移縣治於此明正統初知縣髙應舉始築土為城周三里髙三丈有竒池深一丈門三𢎞治中知縣陳濶闢西門嘉靖中巡撫謝蘭増築城外敵臺知縣胡志䕫易雉堞以甎乙邜地震城圮知縣趙桐繕之知縣崔舉葺四門知縣史燦始竟工扁四門東曰華翔西曰荆踞南曰石盤北曰金屏萬厯間知縣劉兌始創東郭更石盤門引玉帶渠水南入隍中本朝康熈元年知縣鄭崑修築譙樓在城内縣治東醴泉縣城池即古仲橋城元行樞宻院副也先速迭兒増築土城周二里許明成化四年知縣撒俊増築東西南三面外城六里有竒北則修舊城阻小河水之險髙二丈八尺池深二丈濶倍之有提學伍福記萬厯四年知縣姚燭建城樓敵臺徙鐘皷樓於縣左闢五門東曰陽和西内曰西城外曰永安南内曰南薫外曰迎恩北曰永定西北内曰逺馭外曰永平有按察韓朝江記崇禎中知縣韓景芳重修延安府膚施附郭府城唐天寳初建一云赫連勃勃築宋范仲淹龎籍經畧時繼修明𢎞治初知府崔陞復修周九里三分髙三丈石砌池深二丈門三東曰東勝南曰順陽北曰安定上建重樓又小東門曰津陽西面依山上為鎮西樓范仲淹所建也後燬于兵本朝順治乙未知府陳培基同進士趙廷錫重建十六年水衝東城門垣知府牛天宿修築康熈十四年朱逆燬城樓十八年知府陳天植重修又葺城内皷樓自為記鐘樓在城東南嘉嶺山古塔旁安塞縣城池本金舊堡元初改建明景泰中重修周三里七分髙一丈七尺池深一丈𢎞治嘉靖間因城北水患知縣韓震韓弼繼修移北就南䂓模悉倣舊制西南北門三南門西向萬厯壬子署篆范有志改建正南崇禎壬申寇陷城南面丁丑知縣彭堯昇督工補築譙樓在縣治前甘泉縣城池唐天寳初建明景泰中重修周三里三分高二丈土築池深一丈西南北門三西門久閉安定縣城池宋置堡元因為縣明洪武中千戸曹忠重修周五里三分宣徳八年知縣劉整建保障樓於敵臺成化中知縣郭演徐彬相繼建東闗城與内城相連共周九里七分高二丈八尺池深一丈五尺東西北門三樓四東曰覲日西曰懐逺中曰治安東角曰作賦嘉靖二十一年知縣和清因城坍圮加修築新懐逺更名禦侮二十四年河西道方逺宜命知縣曹銘以石砌城基女墻四十三年知縣孫黄修葺城及闗城新禦侮治安二樓萬厯十七年知縣王光祖城上下皆砌以石二十二年知縣粘鍾嵓復修四十三年知縣魏天命議石甃東關城築東門甕城未竟四十六年知縣陳應龍續成闢南門後塞本朝康熈七年知縣朱尚義闢中城門八年知縣楊藴修闗城十九年知縣王友德築西門門共四東内曰迎旭外曰仁和西曰義成中曰翊文北曰拱極五十二年知縣廖均重加修築保安縣城池即古栲栳城唐咸亨間駐禁軍於此宋設保安軍元因為縣明洪武二年縣丞洪道修築成化八年侍郎葉盛言保安縣去榆林不逺宜聼總督撥兵設伏以遏虜衝突嘉靖四十年署篆吏目郭邦靖萬厯三十三年知縣陳桂芳相繼増修周九里三分髙二丈土築東北門二池深一丈崇禎中截西南角為城本朝順治中知縣張嗣賢建城南樓匾曰南薫宜川縣城池宋初改建元至正中叅政朱希哲修明正統十四年知縣張繹重修周四里一百二十八歩髙三丈土築門四西南跨七郎山東西北三面距河池深三丈本朝順治四年知縣陳扆銘補築南甕城門雍正三年知縣王志深重建東門洞西城被銀川水衝崩八年復修延川縣城池本元舊址明正統中知縣王坦重築周四里髙二丈八尺南北門二東為水門旋塞之池深一丈二尺嘉靖初知縣陳文甃甕城以石厥後知縣金棟王行仁武之屏相繼修築隆慶初知縣毛儲元重修本朝順治戊戍知縣劉榖修葺北門庚子東北角圮於雨榖復修之譙樓在縣治前延長縣城池金大定二十六年縣令董承務建張廷直記之明𢎞治中知縣王紳重修周四里二百四十四歩髙二丈二尺北倚砦山南臨延水東西門二南為水門池深一丈嘉靖二年分巡道方逺宜檄知縣張旭陽修東西南三面咸甃以石北塹崖為堞水門并以石甃自為記知縣雷潔繼修萬厯中知縣王道明修城内中街皷樓知縣陳國柱葺雉堞明末移縣治於髙部山城距縣二百歩元脱列伯令參政何逺所築也本朝康熈九年知縣陳天祐復移於下城鐘樓在城東角鳯翔府鳯翔縣附郭府城唐末節度使李茂貞建鳯凰泉水繞城四圍周一十二里三分髙二丈五尺明景泰元年知府扈暹重修正德十三年知府王江増修萬厯二年知府鄒廷望増築髙三丈五尺池深二丈五尺濶三丈易女墻以甎鼎新門樓自為記門四東曰迎恩西曰保和南曰景明北曰寧逺又有小南門在正南門之東上建五奎樓常閉三十八年通判姚希曽闢重門於正南上構層樓鳯翔縣知縣李棨記之崇禎末知府熊應元繕葺本朝順治十八年察院許之漸鼎建門樓岐山縣城池唐武德四年建土築元至元二十五年重修周五里一百二十歩