池元至正四年徙建麻亭鎮明天順二年知縣郭質嘉靖四十五年知縣崔炳俱重修周五里明末被冦盡圮因結寨於虎頭山居之本朝順治丁酉知縣李如瑾築寨下南關有貢生趙運熙記康熙八年知縣張焜創建新城西南依舊寨四方崒嵂中央坦夷匾曰金盤城周三里髙二丈八尺土築闢西門大小各一曰金盤曰康阜建門樓二角樓四自為文記之邠州州城唐始建宋金繼修元末李思齊令部將何近仁重修明嘉靖二十三年知州孫禮建三門東曰太平遺澤西曰公劉啓化北曰姜嫄祖武二十五年知州姚本建南門題曰后稷開基周五里髙三丈池深二丈譙樓建於城内州治前三水縣城池西北枕山東南臨溪元至正十八年并入淳化明成化十四年復置縣知縣楊豫創築迄二十二年知縣馬宗仁始落成有李錦記周五里五分髙三丈土築池深一丈正徳中知縣趙璽増築創建南門嘉靖中知縣吳之翰修葺門堞萬厯時知縣秦渠重修門四名其東曰賔暘西曰志岐南曰凝薰北曰拱辰知縣方本清修葺城樓崇禎時知縣髙知築雙槐堡於西關作小門於志岐門北與堡通本朝順治七年知縣王儒復葺堡城康熙庚戌知縣林逢泰葺垣樓顔南樓曰丹翠有紀咏序建譙樓於縣治前乙夘丙辰間復修堡城淳化縣城池宋淳化四年建明嘉靖九年知縣馬崇増築周四里一百七十步髙二丈五尺池深一丈濶五尺門三東曰迎和南曰阜民北曰拱極環城皆山南北深溝東帶河四十三年知縣張介飭女牆門樓崇禎中知縣趙之琴増修知縣孟學孔築敵臺於東南角本朝順治五年知縣趙賔修葺門樓康熙三十九年知縣張如錦補築譙樓在縣治前長武縣城池本唐宜禄縣宋元因之明初併入邠州改為宜禄鎮萬厯十一年改縣知縣梁道凝拓築周五里髙三丈池阻溝東西南門各一北門二崇禎中知縣惲紹美修築譙樓在縣治前知縣武振建鄜州州城西阻龜山東帶洛水有内外二城内城相傳為元吳知院所築周二里一百三十步外城周十里洛水為患成化以來時加修築髙四丈池深廣各二丈嘉靖丁亥夏洛水暴漲城頹百餘丈副使汪珊知州杜蕙石砌城基尚書劉璣記之十六年副使吳瀚知州金禹績植栁固堤號栁林城十九年副使謝蘭二十年副使劉宗仁知州張旄増建角樓門樓門三東曰瞻洛西曰仰山南曰望岳東北東南及正東水門各一二十九年副使朱用増築南北城連山闢北門曰鎮朔四十一年水侵東北城圮副使張西銘知州蘇時化補築稍移於内四十三年水侵新城圮知州蘇璜又稍移内補築四十五年兵備道馮舜漁以外城寛濶難守北自東北角至龜山後南自東南角至龜山前増城垣二層髙厚俱三丈長五千三十餘丈自是南北有二重關矣門各二郎中劉仕記之隆慶六年兵備道程鳴伊増髙新城四丈周垣睥睨悉甃以甎改建東南北門東曰鎮洛南曰保鄜北曰威朔各建重樓萬厯六年兵備道李采菲率知州閻思孝甎甃舊内外城門置重樓庚寅兵備道楊時寧創建石堤修葺城垣未竟去知州宋言續成之有中丞王邦俊記崇禎六年兵備道王楫以城濶民稀不便守禦截斷二層外城止守一層外城十五年兵備道楊彤庭因山為寨伐石修築作石頭城門三東南又闢小門通泉水本朝順治初以下城遼濶又截斷外一層城止守内城十七年分巡道許瑶首倡捐輸修築下城東南北三面十八年分巡道李榮宗捐修西山城康熙二年復相率居下城鼓樓在州治前鐘樓萬厯間移城上東南角洛川縣城元僉院胡興築縁山阻澗周二里一百六十步東西南門三明洪武中知縣朱炳重修正徳七年妖賊李牛作亂築東郭土城髙僅丈餘嘉靖二十五年知縣吉澄重修倍加髙厚三十一年知縣王一賢建東西門樓萬厯元年知縣李廷儀増築郭城周三里八分髙三丈五尺濬池深二丈濶如之北臨壑曲築長垣甃女牆以甎水道以石建城樓四更繕内城扁其門東曰緝寧西曰阜成南曰開泰譙樓在縣治前中部縣城池舊在沮南明成化中改建今治城卑薄隆慶六年知縣衛汝霖増築周四里一百三十六步髙三丈因沮水為池甃雉堞建門樓五萬厯元年知縣李迎時築南城己未知縣江之澨増髙數尺崇禎五年知縣姚一麟築上城本朝順治十二年知縣彭聖培重建門樓康熙二年知縣金九鼎増築啓東門門七西為水門鐘樓在城内南隅宜君縣城池舊無明景泰中主簿李仲和始築然石滓難成成化中縣丞楊安因龜山之勢築削為城周五里三分髙二丈五尺門二南向曰保障北向曰金闕池深一丈本朝康熙十七年知縣賈有福増修綏徳州州城環水抱山宋鄜延宣撫使郭逵所築金元以來因舊修葺明洪武中指揮嚴淵増修周八里二百八十步髙三丈甎甃池深一丈五尺門四東曰鎮定西曰銀川南曰安逺北曰永樂跨門為樓各二其在城東山上曰信地樓南關城接連大城方六里三十步門四東曰賔陽西上曰上水西下曰挹秀南曰來逺建文中建本朝順治十六年知州王元士重修鐘樓在城内東偏迤北為鼓樓米脂縣城池環山紀水古名畢家砦宋改建米脂城金升為縣明洪武六年守禦千戸王綱修葺成化五年知縣陳貴拓東北隅萬厯元年知縣張仁覆増築周五里三分髙二丈九尺甎甃門三跨門為樓東曰拱極南曰化中北曰柔逺西角樓一池深一丈濶七尺本朝康熙二十年知縣寗養氣重修譙樓在縣治前清澗縣城池本寛州故址宋康定元年种世衡請即廢壘營築土城初苦無水鑿井百五十尺至石屑石得泉城成賜名清澗城明洪武初増修東西南臨河北據山周三里五步髙三丈甎甃池深二丈門三東曰朝陽南曰迎薰北曰拱極正徳六年知縣趙輅増修西羅城嘉靖乙巳副使方逺宜築西南二面石城有記癸丑同知何尚賢築南門甕城戊辰總督王公檄増築東北方建敵臺重樓闢北關水門一壬申知縣方可築草場山重城後圮於水乙夘知縣陳汝元改建南門樓於正中匾曰景庾樓自為文記之本朝順治中知縣廖元發重修葭州州城宋熙寧中葭蘆寨據山為固因河為池至今稱鐵葭州云金元以來屢經繕修明洪武初守禦千戸王綱改建自北而南截三分之一増築垣墉分内城北郭隆慶間知州章評増堞南郭外城周三里五分髙三丈石甃内城南北門二南曰徳安門上為徳風樓外有月城障之山腰一門東通黄河北曰揚武上為文昌樓北郭下北門曰鎮逺萬厯四年知州尹際可建南郭東西二門東曰天險西曰通泰水門各一天啓中知州盧揚輝修築本朝順治十五年知州武𢎞祖重修自為文記之康熙十六年知州孫毓竒重建南北門樓有李泰業記譙樓建州治前吳堡縣城池宋金為砦元始為縣依山勢髙下周二里五十七步髙二丈五尺土築東南以黄河為池西北以石壑為塹門四東曰觀瀾西曰熙皥南曰景陽北曰迎恩嘉靖十五年知縣劉鉞修築十七年知縣張弛重修二十二年知縣李錦築北門月城建門曰拱辰有知州張綺記三十三年知縣李輅増築甕城創建南北門樓萬厯三十五年知縣杜邦泰修築建東門樓㕘政王霖撰記四十二年知縣盧文鴻建西門樓崇禎中知縣簡國寧建南外門曰帶礪神木縣城池金為砦元至元十八年主簿王瑄徙於東山後改縣明正統五年都御史王翺查邊奏縣寨居山頂不便宜移置平川八年復徙建川口周五里髙二丈五尺池深一丈門四成化四年巡撫余子俊建羅城増修門樓隆慶六年東路道張守中増築髙三丈七尺建四角樓萬厯六年東路道覃應元甃以甎三十三年東路道袁諫甃羅城以石自為記後廢本朝雍正四年知縣胡増煐修築鐘樓在城内凱歌樓北南則鼓樓在焉府谷縣城池始建未詳按五代唐升府谷鎮為縣復建為州宋又置麟府路則城池始建宜在唐宋間明正徳十五年知縣張汝涉因故址拓築石砌周五里八分髙二丈五尺因河為池門六嘉靖中重修鐘樓在城内西北街陜西通志巻十四
