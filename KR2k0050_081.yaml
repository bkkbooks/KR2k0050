body:
  text: 陜西通志卷八十一紀事第六後梁太祖開平二年夏六月蜀師岐師晉師攻雍州招討劉知俊拒却之蜀遣將將兵會岐兵五萬攻雍州晉張承業亦將兵應之六月劉知俊為西路行營都招討使以拒之知俊及佑國節度使王重師大破岐兵於幕谷晉蜀兵皆引歸通鑑開平二年六月丙辰邠岐來冦芟害禾稼結營自固踰月同州劉知俊引所部兵擊退襲至幕谷大破之俘斬千計收其生口器甲宋文通僅以身免册府元龜秋九月同州劉知俊來獻捷開平二年九月同州劉知俊以鄜延歸降將十人并捷表來獻册府元龜冬十月華原賊溫韜發唐諸陵韜少為盜後事李茂貞為華原鎮將唐諸陵在其境內者悉發掘之取其所藏金寶昭陵最固韜從埏道下見宫室制度閎麗不異人間中藏前世圖書鍾王筆迹紙墨如新韜悉取之惟乾陵風雨不可發五代史溫韜傳今按華原故城在耀州境內三年春二月取岐州鄜州三月取丹州四月取延州坊州保塞節度使劉萬子暴虐失衆心且謀二於梁李繼徽使牙將李延實殺之據延州指揮使髙萬興與弟萬金以其衆數千人詣劉知俊降岐王置翟州於鄜城其守將亦降三月帝發步騎會萬興兵取丹延丹州刺史崔公實降四月劉知俊移軍攻延州李延實嬰城自守知俊遣白水鎮使劉儒分兵圍坊州知俊克延州延實降岐王所署保大節度使李彥博坊州刺史李彥升皆棄城奔鳯翔鄜州都將嚴𢎞倚舉城降梁以髙萬興為保塞節度使牛存節為保大節度使遂命知俊乘勝取邠州知俊難之辭以闕食乃召還通鑑夏四月帝如朝邑開平三年四月壬寅車駕巡於朝邑縣界焦黎店冀王友謙及崇政內諸司使扈從册府元龜五月殺佑國軍節度使王重師以劉捍鎮長安王重師鎮長安數年梁主怒其貢奉不時以劉捍為留後捍至長安重師不為禮捍譖之云與邠岐通賜自盡夷其族通鑑六月劉知俊以同州叛降於岐知俊功益髙太祖性多猜忌屢殺諸將王重師無罪見殺知俊益懼不自安太祖已下鄜坊遣知俊攻邠州知俊以軍食不給未行太祖幸河中使宣徽使王殷召知俊其弟知浣遣人告知俊以不宜來知俊遂叛臣於李茂貞以兵攻雍華執劉捍送於鳯翔太祖使人謂知俊曰朕待卿至矣何相負耶知俊報曰王重師不負陛下而族滅臣非背德但畏死爾太祖復使語曰朕固知卿以此吾誅重師乃劉捍悮我致卿至此吾豈不恨之耶今捍已死未能塞責知俊不報以兵斷潼關太祖遣劉鄩牛存節攻知俊知俊遂奔於茂貞五代史劉知俊傳丹州軍亂秋七月克丹州開平三年六月乙卯丹州軍亂逐其刺史宋知誨秋七月乙丑克丹州執其首惡王行思五代史梁太祖紀商州軍亂七月商州軍亂逐其刺史李稠稠奔於岐五代史梁太祖紀商州刺史李稠驅士民西走將吏追斬之推押牙李玫主州事通鑑八月詔同華雍等州招諭逆黨八月制左馮翊背叛元惡遁逃朕聞相濟之徒多是脅從之輩若能回心向國轉禍全身當與加恩必不問罪仍令同華雍等州切加招諭如能梟斬溫韜或以鎮寨歸化必加厚賞仍奬官班兼委本界招復人戶切加安存册府元龜九月延州刺史髙萬興請增兵禦敵髙萬興為延州刺史開平三年九月奏邠鳯賊百騎至韓家寨鄜州請添兵於本佛寨犄角備禦册府元龜冬十月康懷貞等及劉知俊戰於升平敗績岐王欲取靈州以處劉知俊使自將兵攻之朔方節度使韓遜告急詔康懷貞冦彥卿將兵攻邠寧以救之知俊聞之解還帝急召懷貞等遣兵迎援於三原青谷懷貞等還至三水知俊據險邀之左龍驤軍使王彥章力戰懷貞等乃得過懷貞與禆將李德遇等分道而行皆與援兵不相值至升平唐天寶十二載分宜君縣置升平縣知俊伏兵山口懷貞大敗僅以身免德遇等軍皆沒通鑑四年春三月夏州亂殺節度使李彜昌夏州都指揮使髙宗益作亂殺節度李彜昌將吏共誅宗益推彜昌族父李仁福為帥仁福以聞四月以仁福為定難節度使通鑑秋七月岐人晉人攻夏州遣兵拒却之岐王遣使告晉請合兵攻定難節度使李仁福晉王遣周德威將兵會圍夏州梁主恐晉兵襲西京遣兵屯三原遣李遇邀其歸路岐晉兵皆解去綱目乾化元年春三月溫韜攻長安康懷貞等擊走之岐王募華原賊帥溫韜以為假子於華原美原置義勝軍以韜為節度使使帥邠岐兵冦長安詔感化節度使康懷貞忠武節度使牛存節以同華河中兵討之懷貞等奏擊韜於車度車度地名在長安北同州界走之通鑑夏四月岐攻興元蜀兵擊郤之蜀主之女普慈公主嫁岐王從子繼崇繼崇驕矜嗜酒蜀主召公主歸寧留之岐王怒始與蜀絶至是岐王聚兵冦蜀興元唐道襲擊却之綱目秋八月岐劉知俊擊蜀兵戰於青泥嶺敗之圍安逺軍岐王使劉知俊李繼崇將兵擊蜀王宗侃王宗賀唐道襲王宗紹與之戰於青泥嶺蜀兵大敗王宗浩奔興州溺死於江唐道襲奔興元先是王宗綰城西縣號安逺軍宗侃等收散兵走保之知俊繼崇追圍之通鑑蜀岐戰於興元岐師敗績蜀王宗弼王宗播再敗岐兵蜀主如興元安逺軍望其旗王宗侃等鼓譟而出與援軍夾攻岐兵大破之拔二十一寨斬其將李廷志等岐兵解圍遁去唐道襲先伏兵於斜谷邀擊又破之岐王左右讒劉知俊岐王奪其兵李繼崇曰知俊壯士窮來歸我不宜以讒廢之知俊舉族居於秦州綱目十二月髙萬興敗岐兵於邠州十二月延州節度使髙萬興奏領軍於邠州界蒿子谷韋家寨殺戮寧慶兩州賊軍約二千餘人並生擒都頭指揮使及奪偽器等入奏召以銀器綵物賜之册府元龜二年秋朱友謙叛襲鄜州殺節度使徐懷玉徐懷玉為鄜坊節度使友圭既篡立河中朱友謙拒命遣兵襲鄜州懷玉無備尋為所虜囚於公館及友圭遣康懷英率師圍河中友謙慮變玉遂遇害册府元龜末帝貞明元年春三月岐邠州將李保衡來降貞明元年三月岐邠州留後李保衡以城歸順保衡楊崇本養子崇本又李茂貞養子任邠州二十餘年去嵗為其子彥魯所毒彥魯權知州事五十餘日保衡殺彥魯送欵於帝即以保衡為華州節度使以河陽留後霍彥威為邠州節度使册府元龜夏五月岐人圍邠州不克岐王遣彰義節度使劉知俊圍邠州霍彥威固守拒之通鑑劉知俊為同州節度使奔李茂貞邠州亂茂貞命知俊討之時邠州都校尉李保衡納欵於朝廷末帝遣霍彥威率衆先入於邠知俊遂圍其城半載不能下會李繼崇以秦州降於蜀知俊妻孥皆遷於成都遂解邠州之圍册府元龜霍彥威事梁遷邠寧節度使李茂貞遣梁叛將劉知俊攻邠州彥威固守踰年每獲知俊兵必縱還之知俊德之後不復攻五代史霍彥威傳冬十一月蜀遣兵攻岐劉知俊奔蜀蜀克鳯州劉知俊攻霍彥威於邠州半嵗不克聞秦州降蜀妻子皆遷成都解圍還鳯翔懼及禍夜率親軍斬關奔蜀軍王宗綰自河池進兵會王宗瑶攻鳯州克之綱目初汴將劉知俊奔鳯翔李茂貞以為大將稍侵建之興鳯皆沒焉後知俊自岐奔蜀建厚禮之任為上將令擊茂貞復興鳯二州册府元龜十二月岐人以耀鼎二州來降岐義勝節度使李彥韜知岐王衰弱舉耀鼎二州降梁彥韜即溫韜也復姓溫氏名昭圖官任如故綱目按五代史溫韜傳李茂貞以華原縣為耀州以美原縣為鼎州梁改耀州為崇州鼎州為裕州二年冬十月蜀攻岐取寶雞遂圍鳯翔蜀王宗綰等出大散關大破岐兵遂取寶雞王宗播等出故關至隴州保勝節度使李繼岌畏岐王猜忌帥其衆二萬棄隴州奔於蜀軍蜀兵進攻隴州以繼岌為西北面行營第四招討會王宗綰等圍鳯翔岐兵不出會大雪蜀主召軍還通鑑蜀通正元年遣王宗綰等率兵十二萬出大散關攻岐取隴州五代史王建世家五年春三月蜀兵入岐蜀王宗播等自散關擊岐度渭水破岐將孟鐵山會大雨而還分兵戍興元鳯州及威武城威武城在鳯州北蜀所築也王宗昱攻隴州不克通鑑六年夏四月朱友謙以同州附晉貞明六年友謙遣其子令德襲同州逐節度使程全暉因求兼鎮末帝不許已而許之制命未至友謙復叛始絶梁而附晉矣五代史朱友謙傳六月遣兵攻同州晉人救之秋九月師敗績朱友謙以河中同州降晉梁遣劉鄩攻同州友謙求救乃遣存審與李嗣昭救之河中兵少而弱梁人素易之且不虞晉軍之速至也存審選精騎二百雜河中兵出擊鄩壘陽敗而走鄩兵追之晉騎反擊獲其騎兵五十梁人知其晉軍也皆大驚然河中糧少而新降人心頗持兩端晉軍屯朝邑諸將皆欲速戰存審曰使梁軍知吾利於速戰則將夾渭而營斷我餉道以持久困我敗之道也不若緩師示弱伺隙出竒可以取勝乃按軍不動居旬日望氣者言夜有黑氣狀如鬬雞存審曰可以一戰矣乃進軍擊鄩大敗之鄩閉壁不復出存審曰鄩兵已敗不如逸之乃休士卒遣禆將王建及牧馬於沙苑鄩以謂晉軍且懈乃夜遁去存審追及於渭河又大敗之五代史符存審傳冬十一月蜀人侵岐蜀王遣宗籌將兵伐岐攻隴州岐王自將屯汧陽蜀將陳彥威敗岐兵於箭筈嶺箭筈嶺在寶雞縣東北蜀兵食盡引還綱目後唐莊宗同光二年三月遣使按視長安諸陵唐室諸陵先為溫韜所發唐主以工部郎中李途為長安按視諸陵使通鑑秋八月蜀遣兵屯洋州蜀主以右定逺軍使王宗鍔為招討馬步使帥二十一軍屯洋州以備唐通鑑三年秋九月命魏王繼岌郭崇韜伐蜀取鳯興州後唐魏王繼岌同光三年九月為西征都統伐蜀繼岌至鳯州偽武興軍節度使王承捷以鳯興文扶四州降大軍食其芻粟得糧四十萬兵士八千魏王給牒令攝武興軍節度使册府元龜郭崇韜入散關指其山曰吾輩進無成功不得復還此矣當盡力一決今饋運將竭宜先取鳯州因其糧乃倍道而進王承捷以鳯興文扶四州印節迎降得兵八千糧四十萬斛通鑑明宗天成元年夏四月魏王繼岌自蜀還至長安自殺郭從謙弒莊宗明宗入洛稱監國魏王繼岌至興平聞亂復引兵西謀保鳯翔退至武功李從襲曰退不如進請亟東行以救內難繼岌從之還至渭水留守張籛已斷浮梁循水浮渡至渭南腹心吕知柔等皆已竄匿從襲謂繼岌曰時事已去王宜自圖繼岌徘徊流涕乃自伏於牀命李環縊殺之任圜代將而東華州都監李沖殺從襲通鑑長興元年秋九月武功令薛文玉激亂降除之薛文玉為武功縣令長興元年九月西京奏武功縣百姓三千餘人持白棒入縣亂擊人吏分劫縣庫稅錢公廨什物尋差兵士捉到結集首領武功鎮將􅎤跌琉等三十二人各招本罪稱縣令以大竿尺簡田所以衆心難抑其􅎤跌琉準法科斷文玉罰七十直主簿李彥柔罰五十直並勒停册府元龜冬十二月遣安重誨督西征諸軍長興元年十二月遣樞密使安重誨赴西面軍前時帝以蜀路險阻進兵艱難潼關以西物價絶賤百姓搬糧往利州每費一斛不得一斗至令噍類穰穰逃竄山谷或聚為盜慮不堪命帝念饋挽之苦形於顔色謂近臣曰關中勞擾軍前未有成功孰能辦吾事者朕須自行重誨奏曰此臣之責也臣今請行許之言訖面辭翼日發赴軍前册府元龜三年春正月遣兵擊黨項破之樞密使范延光言自靈州至邠州使臣及外國入貢者多為黨項所掠請發兵擊之遣靜難節度使藥彥稠前朔方節度使康福將兵七千討黨項二月藥彥稠等奏破黨項十九族俘二千七百人通鑑藥彥稠明宗時授邠州節度使詔會兵制置鹽州蕃戎逃遁獲陷蕃士庶千餘並遣復鄉里册府元龜四年春三月命李彜超徙鎮延安彜超拒命定難節度使李仁福卒軍中立其子彜超為留後先是關西諸鎮皆言李仁福潛通契丹南侵關中會仁福卒以其子彜超為彰武留後安從進為定難留後仍命靜塞節度使藥彥稠將兵五萬以宫苑使安重益為監軍送從進赴鎮敕諭夏銀綏宥將吏彜超年少未能扞禦故徙之延安從命則有富貴之福違命則有覆族之禍彜超上言為軍士擁留未得赴鎮詔遣使趣之通鑑秋七月延州節度使安從進討李彜超不克彜超不奉詔遣其兄阿囉王守青嶺門青嶺門蓋上郡橋山之長城門集境內黨項諸胡以自救藥彥稠等進屯蘆關聚米圖經蘆關在延州塞門寨北十五里彜超遣黨項抄糧運及攻具官軍自蘆關退保金明陳執中曰金明漢膚施縣地蘆關至金明二百里安從進攻夏州州城赫連勃勃所築堅如鐵石斸鑿不能入又黨項萬餘騎徜徉四野抄掠糧餉官軍無所芻牧山路險狹關中民輸斗粟束藁費錢數緡民間困竭不能供彜超登城謂從進曰夏州貧瘠非有珍寶蓄積可以充貢賦也但以祖父世守此土不欲失之幸為表聞許其自新命從進引兵還自是夏州輕朝廷每有叛臣必隂與之連以邀賂遺通鑑閔帝應順元年春正月以潞王從珂為河東節度使不受從珂舉兵鳯翔四月以後潞王即位改元清泰朱𢎞昭馮贇謀徙潞王從珂為河東節度使遣使監送赴鎮潞王既與朝廷猜阻朝廷又命洋王從璋權知鳯翔從璋性粗率樂禍前代安重誨鎮河中手殺之從珂聞其來尤惡之謀於將佐皆曰離鎮必無全理乃移檄鄰道言朱𢎞昭等專制朝權懼傾社稷今將入朝以清君側以西都留守王思同當東出之道遣郝詡等詣長安説以利害餌以美妓思同謂將佐曰吾受明宗大恩今與鳯翔同反借使事成而榮猶為一時之叛臣况事敗而辱流千古之醜迹乎遂執詡等以聞時潞王使多為鄰道所執唯隴州防禦使相里金傾心附之通鑑相里金為隴州防禦使廢帝起兵鳯翔馳檄四鄰四鄰未有應者獨金首遣判官薛文遇見廢帝往來計事廢帝即位德之拜保義軍節度使五代史相里金傳二月遣兵討鳯翔三月官軍潰潞王遂入長安愍帝以思同為西面行營馬步軍都部署三月會諸鎮兵圍鳯翔破東西關城從珂兵弱而守甚堅外兵死傷者衆從珂登城呼外兵而泣曰吾從先帝二十年大小數百戰甲不解體金瘡滿身士卒固嘗從我矣今先帝先棄天下朝廷信用姦人離間骨肉我實何罪而見伐乎士卒聞者皆悲憐之興元張虔釗攻城西督戰甚急士卒苦之反兵攻虔釗走羽林指揮使楊思權呼曰潞王吾主也乃引軍自西門入降而思同未知猶督戰嚴衛都指揮使尹暉麾其衆曰城西軍入城受賞矣何用戰耶士卒解甲棄仗聲聞數里遂皆入城降諸鎮之兵皆潰思同挺身走至長安西京副留守劉遂雍閉門不納從珂引兵東五代史王思同傳從珂建大將旗鼓整衆而東劉遂雍悉出府庫之財於外軍士前至者即給賞令過皆不入城從珂至長安遂雍迎謁都監王景從等奔還中外大駭綱目潞王執西京留守王思同殺之三月二十二日潞王至昭應前鋒執思同來獻王謂左右曰思同計乖於事然盡心於所奉亦可嘉也顧謂趙守均曰思同爾之故人可行迓之於路達豫撫慰之意思同至潞王讓之曰賊臣傾我家國殘害骨肉非子弟之過我起兵岐山蓋誅一二賊臣耳爾何首鼠兩端多方誤我今日之罪其可逃乎思同曰臣起自行間受先朝爵命擁旄仗鉞纍歷重藩終無顯效以答殊遇臣非不知攀龍附鳯則福多扶衰濟弱則禍速但惟瞑目之後無面見先帝釁鼓膏原纍囚之常分也潞王為之改容徐謂之曰且宜憩歇潞王欲宥之而楊思權之徒恥見其面屢啓於劉延朗言思同不可留慮失士心又潞王入長安時尹暉盡得思同家財及諸妓女故尤惡思同與劉延朗亟言之屬潞王醉不待報殺思同并其子德勝潞王醒召思同左右報已誅之矣潞王怒延朗纍日嗟惜之册府元龜潞王次華州執招討副使藥彥稠三月甲子次華州執藥彥稠五代史廢帝本紀藥彥稠為副招討使與王思同攻鳯翔禁軍之潰彥稠欲沿流而遁為軍士所擒而獻册府元龜夏四月興元武定兩鎮降蜀張虔釗之討鳯翔也留武定節度使孫漢韶守興元虔釗敗歸與漢韶舉兩鎮之地降蜀綱目唐按明一統志武定軍置洋州五月興州刺史劉遂清棄鎮歸詔宥之唐主之起鳯翔也召興州刺史劉遂清遲疑不至聞唐主入洛乃悉集三泉西縣戍兵以歸自散關以南城鎮悉棄之皆為蜀人所有唐主以其能自歸乃赦之通鑑冬十月蜀遣兵屯興州九月詔鳯翔益兵守東安鎮以備蜀十月蜀李延厚將果州兵屯興州興州刺史馮暉自乾渠引戍兵歸鳯翔通鑑廢帝清泰二年秋七月蜀攻金州防禦使馬全節拒却之馬全節歷金州防禦使廢帝時蜀人攻金州州兵才數百全節散家財與士卒堅守蜀人去五代史馬全節傳任漢權西京弓弩指揮使末帝清泰二年漢權言六月二十一日與川賊戰兵少不敵都監崔希訥傷甚臣部署神武監驍兵士除夷傷外並至鳯翔又言盩厔都頭許溫勇勝都頭王思儒強溫李文通下六百三十七人並自漢隂歸册府元龜三年冬十二月延州軍亂殺節度使楊漢章是月晉髙祖即位改元天福清泰三年十二月以前坊州刺史劉景巖為彰武軍節度留後景巖故河西鄜延帥髙萬金之將校纍任至坊州刺史家在延州父子豪右私家有丁夫兵仗勢傾郡邑邑人憚其強多推服之會楊漢章帥延州無政失蕃漢之心是時有詔借括戰馬及壯丁漢章以數千人將赴軍期兵仗鞍馬閲之於野而便成行景巖密令人撓之言契丹在河東丁壯有去無歸衆心懼殺漢章乃以其衆至景巖家推為留後朝廷不獲己而命之册府元龜度按通鑑作同州小校門鐸作亂殺節楊漢章焚掠州城與此互異邠州節度使以城降晉周邊蔚為邠州李德琉從事晉髙祖建義入雒德琉不即獻城蔚力勸曰清泰運去新主勃興兩都衣冠歸之大器在手矣公宜表率西諸侯入覲何遲疑若此稍稍達於外則後悔無及矣德琉然之乃馳使入覲朝廷知蔚有其力尋徵拜虞部員外郎册府元龜丹州軍亂逐其刺史康承詢丹州義軍作亂逐刺史康承詢承詢奔鄜州通鑑後晉髙祖天福三年冬十一月鳯翔軍亂討平之鳯翔節度使李從曮厚文士而薄武人愛農民而嚴士卒由是將士怨之會發兵戍西邊作亂剽掠從曮發帳下兵擊之亂兵敗走至華州鎮國節度使張彥澤邀擊盡誅之綱目七年春正月彰武亂軍攻延州遣兵救之六月齊王即位次年仍稱天福彰武節度使丁審琪養部曲三千人縱之為暴於境內軍校賀行政與諸胡相結為亂攻延州遣防禦使何重建將兵救之同鄜援兵繼至乃得免以重建為留後召審琪歸朝通鑑齊王天福八年秋八月綏州刺史李彜敏作亂伏誅夏州牙內指揮使拓跋崇斌謀作亂綏州刺史李彜敏將助之事覺彜敏棄州與其弟彜俊等五人奔延州定難節度使李彜殷奏彜敏作亂之狀詔執彜敏送夏州斬之通鑑開運元年春二月以李彜殷為契丹西南面招討使定難節度使李彜殷奏將兵四萬自麟州濟河侵契丹之境詔以彜殷為契丹西南面招討使通鑑後漢髙祖天福十二年春正月長安軍亂討平之晉昌節度使趙在禮入朝其禆將留長安者作亂節度副使李肅討之軍府以安通鑑二月蜀遣兵攻鳯州不克蜀李繼勳與興州刺史劉景攻固鎮拔之何重建請出蜀兵與階成兵共扼散關以取鳯州蜀主發山南兵三千七百赴之重建遣宫苑使崔延琛將兵攻鳯州不克退保固鎮通鑑延州軍亂逐其節度使周密髙允權為膚施令罷居於家是時周密為彰信軍節度使契丹滅晉延州軍亂逐密密守東城而西城之兵以允權為留後歸漢拜節度使五代史髙萬興傳丹州將髙彥珣舉州來降丹州指揮使髙彥珣以其州來歸五代史漢髙祖本紀夏四月蜀人取鳯州蜀孫漢韶將兵二萬攻鳯州軍於固鎮分兵扼散關以絶援路鳯州防禦使石奉頵舉州降蜀奉頵晉之宗屬也通鑑冬十月晉昌節度使趙匡贊叛降於蜀晉昌節度使趙匡贊恐終不為朝廷所容是月遣使降蜀請自終南山路出兵應援通鑑十二月蜀遣兵數道入雍州蜀主以王處回書招鳯翔節度使侯益以山南西道節度使張虔釗為招討使雄武節度使何重建副之共將兵五萬虔釗出散關重建出隴州以擊鳯翔奉鑾肅衛都虞候李廷圭將兵二萬出子午谷以援長安諸軍齊發旌旗數十里侯益請降於蜀使吳崇惲持兵籍糧帳西還與趙匡贊同上表請出兵平定關中通鑑隱帝乾祐元年二月將軍王景崇擊蜀兵大破之趙匡贊入見王景崇等至長安聞蜀兵已入秦川發本道及趙匡贊牙兵千餘人同拒之恐匡贊牙兵亡逸欲文其面微露風旨軍校趙思綰首請自文面以帥下景崇悅齊藏珍竊言曰思綰凶暴難制不如殺之景崇不聽蜀李廷圭聞匡贊已入朝欲引歸景崇邀之敗廷圭於子午谷張虔釗至寶雞侯益閉壁拒之虔釗勢孤夜遁景崇追敗蜀兵於散關俘將卒四百人景崇引兵至鳯翔侯益尚未行景崇以禁兵分守諸門或勸景崇殺益景崇以所受密旨嗣主未之知或疑於專殺猶豫未決益聞之不告景崇而去景崇悔自詬及益入朝廢帝問何故召蜀軍對曰臣欲誘致而殺之帝哂之通鑑王景崇奏於大散關大敗蜀俘斬三千人初北虜犯京師侯益趙贊皆受賊命節制蒲關髙祖入洛頗懷反仄朝廷移贊於京兆益與贊皆求援於蜀蜀遣何建率軍出大散關以應之至是景崇糾合岐雍邠涇之師以破之又遣人送所獲偽蜀將校軍士四百三十八人至闕下詔釋之仍各賜衣服册府元龜三月長安軍校趙思綰據城反趙思綰為趙贊牙將贊鎮永興入朝留思綰兵數百人於永興髙祖遣使者召思綰等是時侯益來朝思綰以兵從益東歸思綰謂其下常彥卿曰趙公已入人手吾屬至並死矣彥卿曰事至而變勿預言也益行至永興永興副使安友規出迎益飲於郊亭思綰前曰兵館城東然將士家屬皆居城中願縱兵入城挈其家屬益信以為然思綰與部下入城有州校坐於城門思綰奪其佩劒斬之並斬門者十餘人遂閉門劫庫兵以叛髙祖遣郭從義王峻討之五代史趙思綰傳護國節度使李守貞反陷潼關邠涇同華四鎮俱上言守貞與永興鳯翔同反始守貞隂有異志有輕朝廷之志會趙思綰據長安奉表獻御衣於守貞守貞乃自稱秦王遣其驍將王繼勳據潼關同州距河中最近匡國節度使張彥威常詗守貞所為奏請先為之備詔指揮羅金山將兵戍同州故同州不為所併通鑑夏四月克潼關陜州兵馬都監王玉奏克復潼關五代史隱帝紀六月邠州留後王景崇反遣兵討之侯益至京師隂以事中景崇景崇心不自安諷鳯翔將吏求已領府事朝廷患之拜景崇邠州留後以趙暉為鳯翔節度使景崇乃叛盡殺侯益家屬與趙思綰共推李守貞為秦王隱帝即以趙暉討之五代史王景崇傳秋八月以郭威為招慰安撫使督關中諸軍自河中永興鳯翔三鎮拒命繼遣諸將討之昭義節度使常思屯潼關白文珂屯同州趙暉屯咸陽惟郭從義王峻置柵近長安而二人相惡如水火自春徂秋皆相仗莫肯攻戰帝患之欲遣重臣臨督以郭威為西面軍前招慰安撫使諸軍皆受威節度通鑑郭威督諸將討李守貞克西關城威與諸將議攻討諸將欲先取長安鳯翔鎮國節度使扈從珂曰今三叛連衡推守貞為主守貞亡則兩鎮自破矣威善之於是威自陜州白文珂劉詞自同州常思自潼關三道進攻文珂克西關城柵於河西諸將請急攻威曰守貞前朝宿將健鬬好施况城臨大河未易輕也乃發諸州民夫二萬餘人使白文珂等帥之刳長壕築連城循河設火鋪連延數十里遣水軍艤舟於岸冦有潛往來者無不擒之於是守貞如坐網中矣通鑑九月蜀兵援鳯翔都部署趙暉等擊敗之乾祐元年九月鳯翔都部署趙暉奏大破川兵於大散關殺三千餘人其餘棄甲而遁册府元龜冬十月趙暉圍王景崇於鳯翔蜀兵救之不克景崇遣兵出西門趙暉擊破之遂取西關城景崇退守大城暉塹而圍之數挑戰不出暉潛遣千餘人擐甲執兵效蜀旗幟循南山而下令諸將聲言蜀兵至矣景崇果遣兵數千出迎之暉設伏掩擊盡殪之自是景崇不敢出蜀主遣南山節度使安思謙將兵救鳯翔又遣雄武節度使韓保貞引兵出汧陽以分漢兵之勢安思謙屯右界漢兵屯寶雞思謙遣申貴將兵二千設伏於竹林以兵數百壓寶雞而陳漢兵逐之遇伏而敗蜀兵逐北破寶雞寨蜀兵去漢兵復入寶雞思謙進屯渭水漢益兵五千戍寶雞思謙畏之退屯鳯州尋歸興元通鑑定難兵援河中次於延丹徐引還彰武節度使髙允權與定難節度使李彜殷有隙李守貞密求援於彜殷發兵屯延丹境上聞官軍圍河中乃退允權以狀聞彜殷亦自訴朝廷和解之通鑑十一月蜀兵入散關王景崇告急於蜀蜀主命安思謙再出兵救之進屯散關擊漢箭筈安都寨破之韓保貞出新關九域志云隴州汧源縣有新關鎮軍於隴州趙暉告急於郭威威自往赴之至華州聞蜀兵食盡引去威乃還通鑑二年春正月李守貞襲河西柵敗歸郭威將至河中白文珂出迎之李守貞夜遣王繼勳等引精兵千餘人襲漢柵縱火大譟軍中狼狽不知所為劉詞神色自若下令曰小盜不足驚也帥衆擊之禆將李韜拔稍先進衆從之河中兵退走死者七百人繼勳重傷僅以身免守貞之欲攻河西柵也先遣人出酤酒於村墅或貰與不責其直邏騎多醉河中兵得潛入寨威乃下令將士非犒宴毋得私飲愛將李審晨飲少酒威立斬以徇綱目夏四月永興叛將趙思綰降思綰城中食盡殺人而食每犒宴殺人數百庖宰一如羊豕思綰取其膽以酒吞之曰食膽至千勇無敵矣思綰計窮募人為地道將走蜀其判官程讓能謂思綰曰公比於國無嫌但懼死而為此耳今國家用兵三方勞敝不已誠能翻然效順以功補過庶幾有生若坐守窮城待死而已思綰然之遣使乞降拜鎮國軍留後五代史趙思綰傳秋七月都部署郭從義誘殺趙思綰於長安七月永興都部署郭從義奏新降華州留後趙思綰五月三日授華州留後詔準赴任三移行期仍要鎧甲以給士兵及促之竟不遵路至七月九日夕有部曲曹彥進告思綰欲於十一日夜與同惡五百人奔南山入蜀是日詰旦再促上路云俟夜進途臣等與王俊入城分兵守四門其趙思綰部下軍各已執仗遂至牙署令召思綰至則執之與一行徒黨並處置訖册府元龜冬十二月叛將王景崇自殺鳯翔平守貞思綰相次皆敗景崇客周璨謂景崇曰公能守此者以有河中京兆也今皆敗矣何所恃乎不如降也景崇曰誠纍君等然事急矣吾欲為萬有一得之計可乎吾聞趙暉精兵皆在城北今使公孫輦等燒城東門偽降吾以牙兵擊其城北兵不成而死猶勝於束手也燦等皆然之遲明輦燒東門將降而府中火起景崇自焚矣輦乃降暉五代史王景崇傳三年春正月詔收葬鳯翔遺骸遣使詣河中鳯翔收瘞戰死及餓殍遺骸通鑑後周太祖廣順元年夏五月夏州叛附北漢定難節度使李彜殷遣使奉表於北漢通鑑二年春正月遣兵戍長安永興節度使李洪信自以漢室近親心不自安城中兵不滿千人王峻在陜以救晉州為名發其徒數百及北漢兵遁去遣禁兵千餘人戍長安洪信懼遂入朝通鑑漢兵攻府州折德扆擊走之北漢遣兵冦府州防禦使折德扆敗之殺二千餘人通鑑三年春正月麟州刺史楊崇訓來降廣順三年正月夏州李彜殷府州折德扆上言河東界偽麟州刺史楊崇訓以蕃部攻圍乞歸賜敕書曰麟州刺史楊崇訓及軍州將吏職員等據夏州節度使李彜殷奏得汝等狀稱劉崇拒命聖朝堅其逆壘今被部族侵迫乞垂救解兼已稱大朝正朔並罔逆命邊郡無歸值妖孽之脅從致朝貢之阻絶今則蕃部兵民助我討違汝等哀告蕃鄰欲謀歸向備覩變通之意特用𢎞納之仁宜示撫安用奬忠順已指揮州府及諸蕃部不令進攻汝等便宜明宣朝旨告諭軍民應是通河東道路口岸盡時遣人守禦不得通人來往凡有公事一一奏取朝廷指揮其官員將校職長一切依舊仍分析名銜申奏當議等第加恩兼之酬賞册府元龜二月遣兵屯延州彰武節度髙允權卒其子紹基謀襲位詐稱允權疾病表已知軍府事觀察判官李彬切諌紹基怒斬之以謀反聞帝命折從阮分兵屯延州紹基始懼又命供奉官張懷貞將禁兵屯鄜延紹基乃悉以軍府事授副使張匡圖周以客省使向訓權知延州通鑑向訓知延州上言所屬蕃部侵盜漢戶臣已招喚諸部酋率設酒食仍令誓約更不敢侵犯册府元龜冬十二月漢兵侵府州折德扆敗之太祖廣順三年十二月府州防禦使折德扆奏北漢將喬贇入冦擊走之册府元龜世宗顯德二年夏四月遣鳯翔節度使王景帥師伐蜀顯德二年四月詔鳯翔節度使王景攻收秦鳯二州以曹州節度使韓通充西南面行營都虞侯五月王景上言今月七日收下黃牛等三寨相次又收下黃花賈志云黃花鎮在鳯縣東北十里等五寨其鄉村人戶並己招攜安撫册府元龜秋九月王景擊蜀兵於黃花敗之蜀李廷圭遣竒兵出斜谷屯白澗九域志鳯州梁泉縣有白澗鎮又分兵出鳯州之北唐倉鎮及黃花谷絶周糧道王景遣禆將張建雄將兵二千抵黃花又遣千人趣唐倉扼蜀歸路蜀王巒將兵出唐倉與建雄戰於黃花蜀兵敗奔唐倉遇周兵又敗虜巒及其將士三千人兵皆潰通鑑冬十一月克鳯州王景等圍鳯州韓通分兵城固鎮以絶蜀之援兵遂克鳯州擒其節度使王環及都監趙崇溥等將士五千人崇溥不食而死詔將士願留者優其俸賜願去者給資裝稅外科徭悉罷之綱目三年春三月延州民亂攻其鎮將李彥頵彰武留後李彥頵性貪虐部民與羌胡作亂攻之上召彥頵還朝通鑑四年冬十月楊重訓以麟州降北漢麟州刺史楊重訓舉城降以為麟州防禦使通鑑五年冬十二月制置使判官李玉襲蜀歸安鎮敗沒世宗謀伐蜀以侍郎髙防為西南面制置使贊善李玉為判官玉至長安或言蜀歸安鎮在長安南三百餘里可襲取也玉信之牒永興節度使王彥超索兵二百彥超以為歸安道阻隘難取玉曰吾自奉密旨彥超不得已與之玉將以往蜀歸安鎮遏使李承勳據險邀之斬玉其衆皆沒通鑑宋太祖乾德元年冬十二月漢冦府州節度使折德扆敗之折德扆敗北漢軍於城下擒其將楊璘宋史太祖本紀二年冬十二月王全斌克興州乾德二年冬下詔伐蜀全斌為行營前軍督部署率禁軍步騎二萬諸州兵萬人由鳯州路進討召示川陜地圖授以方略十二月率兵拔乾渠渡萬仞燕子二寨遂下興州蜀刺史藍思綰退保西縣敗蜀軍七千人獲軍糧四十餘萬斛進拔石圌二十餘巖先鋒史延德進軍三泉敗蜀軍數萬擒招討使韓保正副使李進獲糧三十萬斛宋吏王全斌傳太宗太平興國七年夏五月遣使夏州迎李繼捧親屬詣闕李繼遷奔地斤澤李繼遷繼捧族弟也繼捧歸宋時年二十留居銀州及使至召緦麻親赴闕乃詐言乳母死出葬於郊遂與其黨數十人奔入地斤澤澤距夏州東北三百里宋史夏國傳契丹冦府州州兵擊破之五月己未府州破契丹於新澤寨獲其將校以下百人宋史太宗本紀冬閏十二月契丹冦豐州州兵獲之閏月戊子朔豐州與契丹戰破之獲其天德節度使蕭太宋史太宗本紀八年春三月契丹冦豐州敗之三月豐州破契丹兵降三千餘帳宋史太宗本紀冬十月都巡檢曹光實等擊李繼遷於地斤澤破走之繼遷入地斤澤知夏州尹憲與都巡檢曹光實偵知夜襲破之斬首五百級焚四百餘帳繼遷與其弟遁免獲其母妻宋史夏國傳雍熙二年春二月李繼遷陷銀州據之繼遷遁免復連娶豪族轉遷無常漸以強大西人以李氏世著恩德多歸之繼遷因語其豪右曰李氏世有西土今一旦絶之爾等不忘李氏能從我興復乎衆曰諾遂與弟繼沖破丑重遇貴張浦李大信等起夏州乃詐降誘殺曹光實於葭蘆川遂襲銀州據之時雍熙二年二月也宋史夏國傳夏五月副將王侁擊李繼遷走之銀麟等州蕃內附初繼遷既殺曹光實遂圍三族寨寨將折遇乜殺監軍使者與繼遷合田仁朗行次綏州請益兵留月餘俟報時繼遷乘勝進攻撫寧寨仁朗聞之喜曰撫寧小而固非浹旬所能破我俟其困以大兵臨之分遣強弩三百邀其歸路虜成擒矣部署已定仁朗欲示間暇縱酒摴蒱侁等因媒糵之帝聞三族已陷大怒徵仁朗還貸死竄商州是月侁等出銀州北破悉利諸寨梟其代州刺史折羅遇麟州諸蕃皆請納馬贖罪侁遂與所部兵入濁輪川斬賊首五千級繼遷及遇乜遁去由是銀麟夏三州番百二十五族悉內附户萬六千餘宋元通鑑淳化二年秋七月李繼遷請降以為銀州觀察使淳化二年秋七月李繼遷請降以為銀州觀察使賜國姓改名保吉宋史太宗本紀李繼遷襲銀州據之繼捧節制夏臺言能歸欵即授洛苑使銀州刺史淳化初復與繼捧戰於安慶澤不利轉攻夏州繼捧乞師及翟守素來乃奉表歸欵授銀州觀察宋史夏國傳五年李繼遷掠綏州以李繼隆為都部署討之繼遷徙綏州民於平夏部將髙文岯等因衆不樂反攻敗之繼遷復圍堡寨掠居民焚積聚詔李繼隆等進討繼遷夜襲保忠李繼捧賜名趙保忠走之獲其輜重以歸宋史夏國傳至道元年春正月契丹冦府州節度使折御卿擊敗之折御卿拜永安軍節度使契丹衆萬餘入冦御卿大敗之於子河汊斬首五千級獲馬千匹契丹將號突厥太尉司徒錫哩死者二十餘人擒其吐渾一人自是契丹知所畏太宗遣使問御卿曰西北要害皆屯徑兵戎人何自而至御卿對曰敵緣山硤小徑入謀剽掠臣諜知之遣人邀其歸路因縱兵大擊敗之人馬墜崖谷死者相枕其大將韓德威僅以身免皆聖靈所及非臣之功也上嘉之宋史折御卿傳夏六月以李繼遷為鄜州節度使不受繼遷遣押衙張浦以槖駝及良馬來獻太宗令衛士翹關超乘引強奪槊於後園俾浦等觀且令兵士皆拓兩石弓帝笑問浦曰羌人敢敵否對曰羌部弓弱矢短但見此長大矢則已遁矣况敢敵乎遣使持詔拜繼遷鄜州節度使不受乃以浦為鄭州團練留京師宋史夏國傳冬十二月契丹侵府州折御卿禦之卒於軍折御卿被病韓德威諜知且為李繼遷所誘率衆來侵以報子河汊之役御卿力疾出戰德威聞其至不敢進會疾甚其母密遣人召歸御卿曰世受國恩邊冦未滅御卿罪也今臨敵棄士卒自便不可死於軍中乃其分也為白太夫人無念我忠孝豈得兩全言訖泣下翌日卒上聞悼惜久之以其子惟正知州事宋史折御卿傳二年夏四月詔置李繼遷之母於延州保安軍奏獲李繼遷母太宗甚喜時冦準為樞密副使吕端為宰相獨召準與之謀準退自宰相幕次前過不入端使人邀至幕中曰鄉者上召君何為準以獲繼遷母告端曰君何以處之準曰準欲斬於保安軍北門之外端曰必若此非計之得者也願君少緩其事端將覆奏之即召閣門吏使奏宰相吕端請對上召見之端具道準言且言昔項羽得太公欲烹之漢髙祖曰願遺我一杯羮夫舉大事者固不顧其親况繼遷跳梁悖逆之人哉且陛下今日殺繼遷之母繼遷可擒乎不然徒樹怨讐而益堅其叛心耳宜置於延州使善養視之以招徠繼遷雖不能即降終可以繫其心而母死生之命在我矣上拊髀稱善曰微卿幾誤我事即用端䇿涷水記聞置按朱子綱目是年四月詔繼遷母於延州考西夏傳繼遷之母於太平興國八年及其妻並獲蓋至是年議定始置之延州耳涑水記聞述其巔末非一年一時事也真宗咸平元年春三月李繼遷降三月真宗即位咸平春繼遷復表歸順真宗乃授夏州刺史定難節度夏銀綏宥靜等州觀察處置等使加邑千户實封二百户益功臣號乃放張浦還封繼遷母衛慕氏衛國太夫人子德明為定難軍節度行軍司馬未幾復抄邊宋史夏國傳五年夏六月李繼遷冦麟州知州衛居實敗之六月癸酉繼遷圍麟州曹璨請濟師詔并代石隰州發兵援之己酉知麟州衛居實言繼遷以衆二萬來攻城兵出擊走之殺傷過半宋史真宗本紀詔遣張崇貴王涉議和割河西銀夏等五州與之六月繼遷復以二萬騎圍麟州詔金明巡檢李繼周擊之圍未解麟州部署請濟師真宗閲地圖曰麟州依險三面孤絶僇力可守但城中乏水可憂耳乃遣兵走援繼遷果據水寨薄城已五日知州衛居實出竒兵突戰縋勇士城下城上鼓噪矢石如注殺傷萬餘人繼遷去夏國傳按夏國傳編此事於六年而本紀及李繼周傳皆以為在五年今從之冬十二月長安禁卒謀作亂知永興軍向敏中討平之向敏中為鄜延路緣邊安撫使俄還京兆密詔盡付西鄙許便宜從事敏中得詔藏之視政如常日會大儺有告禁卒欲倚儺為亂者敏中密使麾兵被甲伏廡下幕中明日盡召賔僚兵官置酒縱閲無一人預知者命儺入先馳騁於中門外後召至階敏中振袂一揮伏出盡擒之果各懷短刃即席斬焉既屏其尸以灰沙掃庭張樂宴飲坐客皆股栗宋史向敏中傳六年春三月綏州蕃部內附三月綏州東山蕃部軍使拽臼等內屬宋史真宗本紀景德元年春三月蕃部入冦麟府兵敗之三月威虜軍守將破契丹於長城口追北過陽山斬獲甚衆栁谷川蕃部入冦麟府擊敗之擒千餘人乙巳麟府路言敗西人於神堆破其寨柵宋史真宗本紀三年秋九月趙德明降九月乙丑夏州趙德明奉表歸欵復遣劉仁朂奉誓表向敏中請以德明表誓藏盟府帝嘉之十月遣使授德明太師兼侍中充定難節度使封西平王賜賚甚厚給奉如內地因索子弟入質德明謂非先世故事不遣唯獻駝馬謝恩而已未幾契丹亦册德明為夏國王宋元通鑑遷按德明為繼子大中祥符四年春二月帝如潼關遣使祀西嶽二月壬子出潼關渡渭河遣近臣祀西嶽宋史真宗本紀仁宗寶元元年冬十二月元昊叛元昊表遣使詣五臺供佛以窺河東道路既還與諸酋歃血約先攻麟延欲自靖德塞門寨赤城路三道並入遂築壇受册即皇帝位國號大夏年號天授禮法延祚宋史夏國傳元昊未叛前其部落山遇者歸延州告其謀時天章閣待制郭勸守延州乃械錮還賊示朝廷不疑之意賊戮其族無遺類由是西人怨懼向化之心絶矣儒林公議二年春二月詔潼關設備置樓櫓夏臺叛命之二年勢益熾橫朝廷疑其有吞噬關中之意由是獻議者請修潼關以拒之時宋庠參預大政鋭意主其議遂詔興板縮置樓櫓戰具回關門而反闔之關中士民嗟怨謂朝廷棄之矣甚者取材興役半出於華隂其民之心可知也然見者則知其無益於備而徒失民心儒林公議冬十一月夏人冦保安軍狄青擊敗之青初以善騎射為騎御散直從西征戰安逺諸寨皆克捷臨敵披髮帶銅面具出入賊中皆披靡莫敢當至是元昊冦保安軍鈐轄盧守勤使青擊走之帝欲召見問以方略會賊冦渭州命圖形以進宋元通鑑康定元年春正月元昊冦延州副總管劉平石元孫戰敗績陷賊中劉平為環慶路馬步軍副總管屬元昊盛兵攻保安軍時平屯慶州范雍以書召平平與石元孫合軍趨土門既有告敵兵破金明圍延州者雍復召平與元孫救延州平素輕敵督騎兵晝夜倍道行明日至萬安鎮平先發步兵繼進夜至三川口西十里止營遣騎兵先趨延州爭門時鄜延都監黃德和將二千餘人屯保安北碎金谷巡檢万俟政郭遵各將所部分屯雍皆召之為外援平亦使人趣其行詰旦步兵未至平與元孫還逆之行二十里乃遇步兵及德和万俟政郭遵所將兵悉至步騎萬餘結陳東行五里與敵遇平與賊皆為偃月陳相向有頃敵兵涉水為橫陳郭遵及忠佐王信薄之不能入官軍並進殺數百人乃退敵復蔽盾為陳官軍復擊却之奪盾殺獲及溺者幾千人平中流矢日暮敵以輕兵薄戰官軍引却黃德和居陳後望見軍却率麾下走保西南山衆從之皆潰平遣其子宜孫馳追德和德和驅馬遁赴甘泉平遣軍校杖劍遮留得千餘人轉鬬三日賊退還水東平率餘衆保西南山立七柵自固敵夜使人叩柵問大將安在士不應復使人偽為戍卒遞文移平平殺之夜四鼓敵環營呼曰如許殘兵不降何待平旦敵酋舉鞭麾騎自山四出合擊絶官軍為二平遂與元孫等皆被執宋史劉平傳盧政太原文水人以神衛都頭從劉平與夏人戰延州虜薄西南隅兵不得成列政引數騎挑戰發伏弩二百射却之盧政傳康定中元昊入延州東路犯安南承平兩寨又以兵犯西路聲言將襲保安軍故延州發兵八萬支東西二隅而元昊乃乘虛由北路擊破金明寨擒李士彬直犯五龍川破劉平石元孫遂圍延州東軒記初起鄜延兵十萬入吐谷坂欲與賊遇乃戰戰時昏矣賊多解馬休徑兵驅老弱對敵士卒得利人人出死力與戰投夜且息更三起鬬會明老弱略盡士卒爭獲過當悉已疲番軍始徐鼓起士揭新旗乘髙處呼漢兵來鬬軍士氣失賊稍出馬馳略陳上調呼射軍中軍人多死此時特劉石軍也前此分萬餘人屬監軍黃德和使屯西坡以張向背為應援事已急念引去賊必乘之恐逼險不利不如舍軍決死幸有所完兩將方議未熟都監郭應起曰太尉決出此謀應願走德和軍招與俱來語未巳平曰始議固在舍人呼軍吏出騎士百人從去應曰得百人不足為護徒自露彼知吾呼旁軍必出馬遮去路矣不如獨去乃下令軍中皆完陳自固至德和軍軍聞應來白開壁欲內德和不肯促閉壁應收馬立陳外呼卒將前與語傳太尉令卒將還白之德和固怯聞敵大殊不敢去應連促數數度無以拒詆應曰先自去報太尉軍隨至矣苐戰無留待也應不敢止復馳還白德和語平等信以為德和審來即鼓起士戰連三北德和軍竟不來應獨出入行間軍稍却即回馬以殿持大鐵矟橫突之所當盡死最後軍北時賊使人持大索立髙處迎應輒為應所斷終不能得應因縱應深入鼓其旁曰急追漢兵留十餘弩連射應馬馬死步下行殺數人欲歸軍取馬軍已亂不得入乃脫身亡去士卒死者什八兩太尉失軍不還邊大警承受者馳二十驛比三晝夜至京師以聞已而賊收去敗兵散亡十餘日稍稍出邊旁諸郡負傷被創不及四萬獨德和一軍完天子使吏治德和以法死天子思平等失援不救人人力死哀之下詔贈將佐已下官七遷子孫聽以父兄任為右職云王向記客言夏五月元昊陷塞門寨康定元年五月元昊陷塞門寨兵馬監押王繼元死之宋史仁宗本紀秋八月經略安撫副使范仲淹治兵延州范仲淹與韓琦並為陜西經略安撫副使仲淹以延州諸寨多失守請自行詔仲淹兼知延州先是詔分邊兵總管領萬人鈐轄領五千人都監領三千人冦至禦之則官卑者先出仲淹曰將不擇人以官為序取敗之道也於是大閲州兵得萬八千人分六將領之日夜訓練量賊衆寡使更出禦敵人聞之相戒曰無以延州為意今小范老子腹中自有數萬甲兵不比大范老子可欺也大范蓋指雍也仲淹以民逺輸勞苦請建鄜城為軍以河中府同華州中下户租稅就輸之春夏徙兵就食可省糴十之三詔以為康定軍仲淹又修承平永平等寨稍招還流亡定堡障通斥堠城十二寨於是羌漢之民相踵歸業宋元通鑑鄜州將种世衡城清澗种世衡歷鄜州判官事西邊用兵守備不足世衡建言延安東北二百里有故寬州請因廢壘而興之以當冦衝右可固延安之勢左可致河東之粟北可復銀夏之舊朝廷從之命董其役夏人屢出爭世衡且戰且城然處險無泉議不可守鑿地百五十尺始至於石石工辭不可穿世衡命屑石一畚酬百錢卒得泉城成賜名青澗城遷內殿崇班知城事世衡開營田二千頃募商賈通貨利城遂富實宋史种世衡傳慶厯元年春正月詔諸道會兵討元昊不果行帝以元昊勢益猖獗遣翰林學士朝宗慤即陜西問攻守之䇿夏竦等具二説令副使韓琦判官尹洙詣闕奏之帝取攻䇿執政以為難杜衍亦曰徼幸成功非萬全計帝不聽詔鄜延涇原會兵期以正月進討范仲淹言正月塞外大寒不如俟春深賊馬瘦人飢勢易制且鄜延密邇靈夏西羌必由之地苐按兵不動以觀其釁乞留鄜延一路以備招納或擇利進城廢寨以牽制元昊帝從之通鑑續編元昊遣人至延州議和元昊歸陷將髙延德因與仲淹約和仲淹為書戒諭之會任福敗於好水川元昊答書語不遜仲淹對來使焚之大臣以為不當輒通書又不當輒焚之降夲曹員外郎知耀州宋史范仲淹傳元昊來求盟琦曰無約而請和者謀也命諸將戒嚴韓琦傳夏四月詔夏竦分屯鄜州夏四月以陳執中同陜西安撫經略使時夏竦判永興軍執中知軍事議多異同故分命竦屯鄜州竦雅意在朝廷及任以西事頗依違顧避嘗出巡邊置侍婢中軍帳下幾至兵變元昊命募得竦首者與錢三千其見輕侮如此宋元通鑑六月詔陜西嚴邊備六月壬辰詔陜西諸路總管司嚴邊備毋輒入賊界賊至則禦之宋史仁宗本紀秋七月元昊冦麟府州慶厯元年七月元昊冦麟府州八月詔鄜延部署以兵援麟府宋史仁宗本紀八月元昊陷豐州麟府兵擊敗之八月元昊冦金明寨破寧逺寨寨主王世亶兵馬監押王顯死之陷豐州知州王餘慶兵馬監押孫吉死之宋史仁宗本紀夏人攻麟府不能下乃引兵攻豐州孤城無援遂據之又屯要害絶麟府餉道會張亢管勾麟府軍馬事破之於柏子又破之於兔毛川亢築十餘柵河外始固夏國傳毁潼關樓櫓慶厯元年八月乙未毁潼關新置樓櫓宋史仁宗本紀九月延州經略龎籍築緣邊諸寨時分陜西為四路以龎籍知延州兼經略安撫招討使自元昊反延州城寨焚掠殆盡籍至稍葺治之戍兵十萬無壁壘皆散處城中畏籍莫敢犯法籍命部將狄青將萬人築招安寨於橋子谷旁以斷冦出入之路又使周美襲取承平寨王信築龍安寨悉復所亡地築十一城延民以安宋元通鑑三年春正月元昊上書請和正月元昊自名曩霄遣人來納欵宋史仁宗本紀元昊以旺榮元昊臣也姓野利書來會帝厭兵因招懷之遣籍報書使者往反踰年又遣賀從朂來改名曰曩霄稱男不稱臣籍不敢聞從朂曰子事父猶臣事君也若得至京師天子不許更歸議之籍送使者闕下因陳便宜言羌久不通和市國人愁怨今辭禮寖順必有改事中國之心請遣使者申諭之朝廷采用其䇿龎籍傳元昊遣使來稱男邦泥定國兀卒上書父大宋皇帝更名曩霄而不稱臣兀卒即吾祖也如可汗號夏國傳夏四月遣使諭元昊賀從朂至京帝用龎籍言命著作佐郎邵良佐如夏州許封元昊為夏國主嵗賜絹十萬匹茶三萬斤良佐至夏州元昊亦遣如定聿捨張延夀等來議和及歲幣時元昊倚契丹邀索無厭晏殊等厭兵將一切從之韓琦力陳其不便帝嘉納之宋元通鑑嘉祐二年夏五月夏人襲殺麟府州守將郭恩五月管勾麟府軍馬公事郭恩為夏人所殺殁於斷道塢宋史仁宗本紀嘉祐中麟州之役諒祚二年間連以兵屯窟野河進逼邊界聚而復散故武戡郭恩習以為常輕兵而出至忽理堆伏發而兵散東軒筆記六年冬十二月復豐州十二月丙戌復豐州宋史仁宗本紀英宗治平元年十二月命內侍監陜西軍帝遣王昭明等四人體量軍情治其詞訟有賞罰則與其帥議大事以聞各許嵗乘驛奏事諌官吕誨言唐舉兵不利未有不自監軍者我朝因循未革奈何又增置此員其權與安撫使均矣乞罷之精選帥臣專制閫外之權傅堯俞趙瞻皆有論列不聽通鑑續編四年冬十月復綏州是年正月神宗即位治平四年冬十月癸酉知清澗城种諤復綏州宋史神宗本紀夏將嵬名山部落在故綏州其弟夷山先降諤使人因夷山以誘之賂以金盂名山小吏李文喜受而許降而名山未之知也諤即以聞詔轉運使薛向及陸詵委諤招納諤不待報悉起所部兵長驅而前圍其帳名山舉衆從諤而南得酋領三百户萬五千兵萬人种諤傳种諤既受嵬名山降夏主諒祚乃詐為會議誘知保安軍楊定等殺之邊釁復起朝議以諤生事欲棄綏誅諤陜西宣撫主管機宜文字趙卨言虜既殺王官而又棄綏不守示弱已甚且名山舉族來歸當何以處又移書執政請存綏以張兵勢規度大理河川建堡以處降者不從乃命韓琦判永興軍經略陜西琦初言綏不當取及楊定等被殺復言綏不可棄樞密以初議詰之琦具論其故卒存綏州時言者交論种諤乃下吏貶其官宋元通鑑神宗熙寧二年春三月夏人乞綏州二年三月戊子秉常上誓表納塞門安逺二寨乞綏州詔許之宋史神宗本紀冬十月城綏州十月丙申城綏州命郭逵選將置守具逵遣趙卨交夏人所納安逺塞門二寨就定地界夏人渝初盟卨請城綏州不以易二寨改名綏德城宋史神宗本紀种諤取綏州夏人欲以塞門安逺二寨來易朝廷許之逵曰此正商於六百里之策也非先交二寨不可與遣其屬趙卨薛昌朝與夏使議唯言寨基卨曰二寨之北舊有三十六堡且以長城嶺為界西平王祥符所移書固在也虜使驚不能對乃寢其請初詔焚棄綏州逵匿而不下至是帝問大臣皆莫知逵始自劾向者違詔旨之罪帝手詔褒答郭逵傳三年秋八月夏人入冦屯榆林詔韓綘宣撫陜西夏人大舉入冦攻城堡兵多者號二十萬少者不下一二萬屯於榆林韓綘請行邊乃以綘為陜西宣撫使授以空名告敕得自除吏宋史夏國傳冬十月詔延州絶夏使熙寧三年冬十月辛酉詔延州毋納夏使宋史神宗本紀四年春正月种諤襲夏人敗之韓綘素不習兵開幕府於延安措置乖方選蕃兵為七軍復以种諤為鄜延鈐轄知青澗城信任之命諸將皆受其節制蕃兵皆怨望諤謀取橫山帥師襲敗夏人於囉兀因以衆二萬城焉自是夏人日聚兵為報復計吕公弼言諤稔邊患不便宜戒之弗聽已而絳言諤入夏之功乞加旌賞詔從之宋元通鑑三月夏人陷撫寧諸城种諤進築永樂川賞逋嶺二寨分遣都監趙璞燕達築撫寧故城及分荒堆三泉吐渾川開光嶺葭蘆川四寨已而夏人來攻順寧寨遂圍撫寧折繼昌髙永能等擁兵駐細浮圖去撫寧咫尺囉兀兵勢尚完諤在綏德節制諸軍聞夏人至茫然失措欲作書召燕達戰悸不能下筆顧運判李南公涕泗不已於是新築諸堡悉陷將士千餘人皆沒初朝議以新囉兀城去綏德百餘里偏梁險狹難於餉饋且城中無井泉遣李評張景憲往視之未至而撫寧陷遂詔棄囉兀城五月燕達以戍卒輜重歸自囉兀為夏人邀擊達多亡失宋史夏國傳秋九月夏人來輸平不許九月夏人遣使入貢且以二寨易綏州乞如舊約詔不允宋史夏國傳九年冬沈括治兵延州沈括知延州至鎮悉以别賜錢為酒命㕓市良家子馳射角勝有軼羣之能者自起酌酒以勞之邊人歡激執弓傳矢唯恐不得進越嵗得徹札超乘者千餘補中軍義從威聲雄他府宋史沈括傳元豐二年秋八月夏人冦綏德城元豐二年八月丙申朔夏人冦綏德城都監李浦敗之宋史神宗本紀秋九月綏德將楊永慶出境擅殺詔編管之元豐二年九月綏德把截楊永慶聲徼循邊而掩取蕃部首級詐言斬犯邊人詔毁永慶出身文字送西京編管宋史夏國傳四年秋九月种諤及夏人戰於無定川敗之种諤上言夏主秉常為其母所囚可急引本路兵搗其巢穴遂入對大言曰夏國無人秉常孺子往持其臂以來耳帝壯之決意西討以為經略安撫副使諸將悉聽節制諤即次境上帝以諤先期輕出使聽令於王中正敵屯兵夏州諤率本路並畿內七將兵攻米脂三日未下夏兵八萬來援諤禦之無定川伏兵發斷其首尾大破之降守將令介訛遇捷書聞帝大喜遣中使諭奬宋史种諤傳五年春三月鄜延擊夏人敗之夏四月進屯綏德城三月壬寅鄜延路副總管曲珍敗夏人於金湯夏四月己未沈括奏遣珍將兵綏德城應援討葭蘆塞左右見聚羌落詔從之宋史神宗本紀夏五月豐州卒作亂討平之五月豐州卒張世矩等作亂伏誅宋史神宗本紀秋八月給事中徐禧護兵城永樂沈括請城古烏延城以包橫山使夏人不得絶沙漠遂遣侍中徐禧內侍李舜舉往議禧復請於銀夏宥之界築永樂城永樂依山無水泉獨种諤極言不可禧率諸將竟城之賜名銀川寨禧等還米脂以兵萬人屬曲珍守之宋史夏國傳九月夏人陷永樂徐禧等敗死永樂接宥州附橫山夏人必爭之地禧等既城去九日夏人來攻珍使報禧乃挾李舜舉來援而夏兵至者號三十萬禧登城西望不見其際宋軍始懼翌日夏兵漸逼禧乃以士萬陳城下坐譙門執黃旗令衆曰視吾旗進止夏人縱鐵騎渡河或曰此號鐵鷂子當其半濟擊之乃可有逞得地則其鋒不可當也禧不聽鐵騎既濟震蕩衝突大兵從之禧師敗績將校冦偉李思古髙世才夏儼程博古及使臣十餘輩士卒八百餘人盡沒詔李憲張世矩往援及令括遣人與約退軍當還永樂地夏人進侵及縣門潰歸城者決水寨為道以登夏人因之奔歸於城者三萬人皆沒夏兵圍之者厚數里遊騎掠米脂將士晝夜血戰城中乏水已數日鑿井不得泉渴死者大半括等援兵及餽運皆為夏大兵所隔夏人呼珍來講和吕整景思義相繼而行夏人髠思義囚之而城圍者已浹旬矣夜半夏兵環城急攻城遂陷髙永能戰沒禧舜舉運使李稷皆死於亂兵惟曲珍王湛李浦吕整裸跣走免蕃部指揮馬貴獨誓死持刀殺數十人而沒是役也死者將校數百人士卒役夫二十餘萬夏人乃耀兵米脂城下而還宋史夏國傳六年春三月將軍薛義等擊夏人連破之三月河東將薛義敗夏人於葭蘆西嶺麟府州將郭忠詔等敗夏人於乜離抑部河東將髙永翼敗夏人於真卿流部宋史神宗本紀夏六月夏人冦麟州州兵擊敗之夏人冦麟州神堂寨知州訾虎躬督兵出戰敗之詔虎自今毋得輕易出入遇有冦邊止令禆將出兵捍逐恐失利損威以張虜勢宋元通鑑七年夏四月夏人冦延州州將擊敗之元豐七年夏四月癸巳夏人冦延州安塞堡將官吕真敗之宋史神宗本紀八年春三月夏人冦葭蘆元豐八年三月夏人攻葭蘆供奉王英戰死宋史夏國傳哲宗元祐元年春正月汰陜西增置官元祐元年正月罷陜西元豐四年後凡緣軍興添置官局宋史哲宗本紀秋七月夏人遣使求米脂等寨初秉常遣訛囉聿求米脂等五寨神宗不許及帝即位秉常復遣訛囉聿來請司馬光言此乃邊鄙安危之機不可不察今若靳而不與彼必以為恭順無益兵連不解願決聖心為兆民計文彥博與光合將許之會秉常卒遣使來告哀詔自元豐四年用兵所得城寨待歸我陷執民當畫以給還宋史西夏傳四年夏六月來歸永樂之俘四年六月稍歸永樂所獲人遂以米脂葭蘆浮圖浮圖在綏德州南安疆四寨與之而畫界未定宋史夏國傳六年夏六月夏人入冦鄜延都監李儀死之六年九月圍麟府三日殺掠不計鄜延都監李儀等盡沒宋史西夏傳八月詔李儀等以違旨夜出兵入界與夏人戰死不贈官餘官降等閏月嚴飭陜西諸路邊備九月詔州民為冦所掠廬舍焚蕩者給錢帛踐稼者振之失牛者官貸市之宋史哲宗本紀七年春二月詔陜西嚴邊防元祐七年二月丁卯詔陜西邊要進築守禦城寨宋史哲宗本紀冬十月募民守前代帝王陵廟元祐七年冬十月丁巳陜西有前代帝王陵廟處給民五家充守陵户宋史哲宗本紀紹聖三年冬十月夏人冦鄜延陷金明寨紹聖三年冬十月壬戍夏人冦鄜延陷金明寨戊辰詔被邊諸路相度城寨要害增嚴守備宋史哲宗本紀三年九月大入鄜延西自順寧招安寨東自黑水安定中自塞門龍安金明以南二百里間相繼不絶至延州北五里十月忽自長城一日馳至金明列營環城國主子母親督桴鼓縱騎四掠知麟州有備復還金明而後騎之精鋭者留龍安邊將悉兵掩擊不退金明乃破守兵二千八百人惟五人得脫城中糧五萬石草千萬束皆盡將官張輿死之夏國傳四年夏人冦綏德城及麟州紹聖四年二月丙寅夏人冦綏德城三月夏人犯麟州神堂堡出兵討之進築胡山寨宋史哲宗本紀元符元年夏六月遣使巡視鄜延新城元符元年六月丙戌遣官分詣鄜延按驗所築城寨宋史哲宗本紀二年春正月鄜延兵擊夏人敗之元符二年二月戊子鄜延鈐轄劉安敗夏人於神堆宋史哲宗本紀三月府州獲夏將三月知府州折克行獲夏國鈐轄令王皆保宋史哲宗本紀夏五月築鄜延路金湯城五月庚戍築鄜延路金湯城宋史哲宗本紀徽宗崇寧四年春三月復銀州三月復銀州是月夏人攻塞門寨宋史徽宗本紀夏四月夏人冦順寧鄜延兵敗之崇寧四年夏四月己丑夏人冦順寧寨鄜延第二副將劉延慶擊破之宋史徽宗本紀欽宗靖康元年冬十月遼故將陷建寧寨靖康元年十月遼故將小呼嚕攻陷麟州建寧寨知寨楊震死之宋史欽宗本紀十一月詔陜西宣撫范致虛督兵勤王不克而還靖康元年十一月以京兆府路安撫使范致虛為陜西五路宣撫使令督勤王兵入援宋史欽宗本紀致虗會陜西節制錢蓋師凡十萬入援致虛勇而無謀以僧趙宗印為參議官委已以聽於宗印宗印徒大言實未嘗知兵師出武關金將羅索以精騎衝之不戰而潰致虛收餘兵入潼關范致虛傳髙宗建炎元年秋七月史斌襲據興州建炎元年七月關中賊史斌犯興州僭號稱帝宋史髙宗本紀二年金太宗天會六年秋九月金兵犯永興守將賀師範戰死九月甲午金人再犯永興軍經略使郭琰棄城退保義谷辛丑陜西節制司兵官賀師範及金人戰於八公原敗績死之宋史髙宗本紀王庶節制陜西六路軍馬授端吉州團練使充節制司都統制端雅不欲屬庶九月金人攻陜西庶召端會雍耀間端辭以未受命庶以鄜延兵先至龍坊端又稱已奏乞回避席貢别遣統制官龎世才將步騎萬人來會庶無如之何則檄貢勒端還舊任遣陜西節制司將官賀師範趨耀别將王宗尹趨白水且令原慶出師為援三帥各遣偏將劉仕忠冦鯶來與師範會庶欲往耀督戰已行會龎世才兵至邠端中悔以狀白庶言已赴軍前庶乃止師範輕敵不戒卒遇敵於八公原戰死二將各引去端遂得涇原兵柄曲端傳冬十一月吳玠襲史斌於長安斬之史斌圍興元不克引兵趨關中義兵統領張宗誘斌還長安欲徐圖之曲端怒宗遣玠襲斬斌而自襲宗殺之通鑑三年冬十月張浚治兵興元十月戊戌張浚治兵於興元宋史髙宗本紀公抵興元奏曰竊見漢中實天下形勢之地臣頃侍帷幄親聞玉音謂號令中原必基於此臣所以不憚萬里捐軀自效庶幾奉承聖意之萬一謹於興元理財積粟以待巡幸願陛下鸞輿早為西行之謀前控六路之師後據兩川之粟左通荆襄之財右出秦隴之馬天下大勢斯可定矣始公未至敵已陷鄜延鄜延帥郭浩寄治德順軍敵驍將羅索貝勒引大軍渡渭河犯永興知軍郭琰遁去敵兵四掠而諸帥方互結仇怨不肯相援人心皇皇公到才旬日即出行關陜復奏請早決西來之期以繫天下心至陜訪問風俗罷斥姦贓而尤以搜攬豪傑為先務一時氣義拳勇之士爭集麾下吳玠及其弟璘素負才略求見公願自試公與語竒之時玠方修武郎璘尚副尉公奬豫不次擢用命玠為統制璘領帳前親兵皆感激誓以死報諸帥亦惕息聽命會諜報敵將冦東南公即命諸將整軍向敵知敵既北還乃復還興元朱子張魏公行狀四年金天會八年秋八月復永興軍張浚治軍入衛金人北歸復還關陜時金帥烏珠猶在淮西浚懼其復擾東南謀牽制之遂決䇿治兵合五路之師以復永興金人大恐急調烏珠等由京西入援大戰於富平軍潰退保興州宋史張浚傳州按富平之戰耀鳯翔復降於金冬十一月盜桑仲犯金州王彥擊敗之王彥知金州時盜賊蜂起加以飢饉無所資食惟蜀富饒巨盜往往窺覬桑仲既陷均房遂乘勝直搗金州白土關衆號三十萬仲彥舊部曲也以申牘請於彥曰仲於公無敢犯願假道入蜀就食耳彥遣統領閔立為先鋒擊之賊鋭甚立戰死將士失色或請避之彥叱曰樞相張公方有事關陜若仲越金而至梁洋則腹背受敵大事去矣敢言避者斬即勒兵阻水據山設伏以待賊見官軍少蟻附搏戰彥執幟一麾士殊死鬭賊敗走宋史王彥傳張浚遣吳玠守和尚原以拒金公退保興州時陜右兵散各歸本路宣撫司獨親兵實從官屬有獻議退保夔州者公堅駐不動以扼敵衝獨參議劉子羽毅然與公意合乃劾異議者遣子羽出關召諸將收散亡將士知宣司在興州皆相率會子羽於秦亭凡十餘萬公哀死問傷録善咎已人心悅焉乃命吳玠取涇原兵據髙扼險於鳯翔之和尚原守大散關斷賊來路命關師古等聚熙河兵於岷州大潭一帶命孫渥賈世方等聚涇原鳯翔兵於階成鳯三州以固蜀口敵見備禦已定輕兵至輒敗不敢近公上疏待罪上手書報公曰卿便宜收合夷散養鋭待時但能據險堅壁謹守要害既以保固四川之地又能牽制南下之師則惟卿之賴公奉詔益厲諸將嚴備待敵朱子張魏公浚行狀劉子羽參御營使軍事張忠獻公浚與敵遇戰不利退保興州官屬有建䇿徙治夔州者公叱之曰孺子可斬也四川全盛敵欲入冦久矣直以川口有鐵山棧道之險耳今不堅守縱使深入而吾乃僻處夔峽遂與關中聲援不復相聞進退失計悔將何及今幸敵方肆掠未逼近郡宣司但當留駐興州外繫關中之望內安全蜀之心急遣官屬出關呼召諸將收集散亡分布險隘堅壁固壘觀釁而動庶幾猶或可以補前愆續後咎奈何乃為此言乎張公然公言而諸參佐無敢行者公即自請奉命北出復以單騎至秦州分遣腹心召諸亡將諸亡將聞命大喜悉以其衆來會公命驍將吳玠柵和尚原守大散關而分兵悉守諸險塞敵諜知我有備引去朱子劉子羽神道碑按和尚原在今鳯縣紹興元年金天會九年春正月金兵攻商州統制張玘擊却之董先為制置司玘佐之紹興元年金將髙瓊率衆取商州董先禦之玘乘鋭奔擊從騎不能屬單馬至四皓廟金兵數百騎至玘瞋目大呼挺刃突擊金兵披靡莫敢向是日九戰九捷追至試劒關爭門蹂踐死者百人宋史張玘傳三月金兵逼興州金人破福津蹂同谷以迫興州浚遂退保閬州而以王庶為制置使節制陜西諸路知興元府通鑑夏四月金兵犯耀州擊却之夏四月己卯金涇原帥趙彬犯耀州守臣趙澄擊走之是月京西賊李忠陷商州宋史髙宗本紀秋九月李忠冦金州王彥擊敗之九月權京西南路副總管李忠反據京西遂攻金州諸關賊衆皆河朔人驍果善戰彥與戰不利關陷彥退屯秦郊令將士盡伏山谷間焚秦郊積聚偽若遁者秦郊距郡城二十里路坦夷彥募敢死士易麾幟設竒以待閲再宿賊至秦郊官軍逆戰大敗之追襲至秦嶺遂復乾祐縣以歸忠走降劉豫宋史王彥傳冬十月金兵攻和尚原吳玠及其弟璘禦却之玠保和尚原積粟繕兵列柵為死守計或謂玠宜退守漢中扼蜀口以安人心玠曰我保此敵決不敢越我而進是所以保蜀也金將摩哩自鳯翔鄂拉扎哈自階成出散關約日會和尚原鄂拉扎哈先期至陳北山索戰玠命諸將堅陳待之更戰迭休山谷路狹多石馬不能行金人舍馬步戰大敗移寨黃牛會大風雨雹遂遁去摩哩方攻箭筈關玠復遣將擊退之兩軍終不得合金人與玠戰輒北憤甚謀必取玠羅索死烏珠會諸道兵十餘萬造浮梁跨渭自寶雞結連珠營壘石為城夾澗與官軍拒攻和尚原玠命諸將選徑弓強弩分番迭射號駐隊矢連發不絶繁如雨注敵稍却則以竒兵旁擊絶其糧道度其困且走設伏於神坌以待金兵至伏發衆大亂縱兵夜擊大敗之烏珠中流矢僅以身免烏珠敗歸復以薩里罕為陜西經略使屯鳯翔與玠相持宋史吳玠傳箭筈關之戰斷摩哩與鄂拉扎哈兵使不得合璘功居多吳璘傳十二月桑仲冦金州王彥擊破之初桑仲既敗還襄陽乃鳩集散亡陷鄧州凶熖復熾分衆三道一攻注口關一出馬郎嶺一搗洵陽前軍去金州不三十里彥曰仲以我寡彼衆故三分道以離吾勢法當先破其堅則脆者自走遣副將焦文通禦注口自以親兵營馬郎相持一月大戰六日賊大敗仲為其下所殺宋史王彥傳二年金天會十年春三月金兵攻方山原不克三月金人攻方山原陜西統制楊政援之金兵引去宋史髙宗本紀隂按雍勝略方山原在今漢西三十里夏五月張浚以劉子羽守興元紹興二年五月張浚以參軍事劉子羽知興元府宋史髙宗本紀宣撫司移軍閬州公請獨留關外調護諸將以通內外聲援軍民之心翕然向之漢中大飢諸帥閉境自守因有違言皆願得公與連兵張公承制可其請公至鎮開關通商輸粟輯睦鄰援飭兵練卒柵險待敵朱子劉子羽神道碑秋九月詔曲赦陜西叛將紹興二年九月辛酉以彗出赦陜西諸叛將許令自新宋史髙宗本紀三年金天會十一年春二月金攻饒風關劉子羽吳玠兵潰金兵入興元子羽玠還擊破之二月吳玠遇金人於饒風關王彥自西鄉來會金人分兵攻關統制郭仲敗走丁酉饒風關破玠趨西鄉彥奔達州金師入興元經略使劉子羽焚其城走三泉縣吳玠退屯仙人關金兵復深入至金牛鎮疑有伏由褒斜谷引兵還興元吳玠劉子羽追擊其後殺獲甚衆宋史髙宗本紀時吳玠為秦鳯經略使公聞彥失守亟移兵守饒風嶺且以語玠玠大驚即越境而東日夜馳三百里中道少止請公會西縣計事公報曰敵旦夕至饒風下不亟守此是無蜀也公不前吾當往今又西走不知者謂吾懼而逸爾諸將得無解體乎玠得書即復馳至饒風列營拒守敵人悉力仰攻死傷如積更募死士由間道犯祖溪關一統志祖溪關在饒風嶺北四十里以入繞出玠後玠遽走還漢中且來邀公欲與俱去公不可留玠先柵定軍山以守玠不可公不得已退守三泉從兵不及三百人與士卒同粗糲至取草牙木甲噉之遺玠書與訣玠持之泣下欲馳赴公未果其愛將楊政者大呼軍門曰公今不行是負劉公政輩亦且舍公去矣玠乃來會三泉時敵遊騎甚迫玠夜不寐起視公方甘寢自若遽起公請曰此何等時而簡易若是公慨然曰吾死命也亦何言玠慙嘆泣下竟不果留公以潭毒山形陡拔其上寬平有泉水乃築壘守之儲粟十餘萬石盡徙將士家屬柵中積石數十百萬下臨走蜀道數日敵果至營數十里間一夕候騎報金大軍且至諸將皆失色入問計公曰始與公等云何今冦至欲避耶下令蓐食遲明上馬先至戰地前當山角據胡床坐諸將追及泣請曰某輩乃當致死於此非公所宜處也公不為動敵知不可攻亦引退入梁洋蜀中復大震宣撫使官屬爭咎公更為浮言相恐動力謂張公徙治潼川令下軍士憤怒或取其榜毁之公以書力為張公言此已為死守敵必不敢越我而南藉令不能守我死行未晚也今一旦輕動若此兵將忿怒恐將有齮齕公墳墓者奈何張公發書大悟立止不行敵遣十餘人持書與旗來招公及玠公斬之餘一人使還曰為我語羣盜欲來即來吾有死耳何可招也因復與玠謀出鋭師腹背擊之未及期而敵已遁矣蓋方敵未至公已悉徙梁洋官私之積置他所敵既深入無所得而糧日匱前後苦攻死傷十五六又聞公之將襲已也懼故遁公亟遣兵追擊之墮溪谷死者不可計其餘衆不能自拔者猶數十柵皆降之是時金大帥薩里罕烏珠輩主兵用事計必取蜀以窺東南其選募戰攻蓋已不遺餘力而我之謀臣戰將亦無敢為必守計者獨公與張公協心戮力毅然以身當兵衝將士視公感激爭奮卒全蜀境朱子劉子羽神道碑五按饒風關在今石泉縣西十里夏五月王彥復金州紹興三年五月丙子王彥復金州宋史髙宗本紀五月彥遣兵至漢隂縣與劉豫將周貴戰大敗之復金州王彥傳四年金天會十二年春三月吳玠吳璘及金人戰於仙人關敗之先是璘守和尚原饋餉不繼玠又謂其地去蜀逺命璘棄之經營仙人關右殺金平創築一壘移原兵守之至是烏珠薩里罕及劉夔率十萬騎入侵自鐵山鑿崖開道循嶺東下玠以萬人當其衝璘率輕兵由七方關倍道而至與金兵轉戰七晝夜始得與玠合敵首攻玠營玠擊走之又以雲梯攻壘壁楊政以撞竿碎其梯以長矛刺之璘拔刀畫地謂諸將曰死則死此退者斬金分軍為二烏珠陳於東韓常陳於西璘率鋭卒介其間左繞右縈隨機而發戰久璘軍少憊急屯第二隘金生兵踵至人被重鎧鐵鉤相連魚貫而上璘以駐隊矢迭射矢下如雨死者層積敵踐而登薩里罕駐馬四視曰吾得之矣翌日命攻西北樓姚仲登樓酣戰樓傾以帛為繩挽之復正金人用火攻樓以酒缶撲滅之玠急遣統領田晟以長刀大斧左右擊明炬四山震鼓動地明日大出兵統領王喜王武率鋭士分紫白旗入金營奮擊射韓常中目金人始宵遁玠遣統制張彥劫橫山寨王俊伏河池扼歸路又敗之是役也金自元帥以下皆㩦孥來劉夔乃豫之腹心本謂蜀可圖既不得逞度玠終不可犯則還據鳯翔宋史吳玠傳西按仙人關在鳯縣南七年冬十月鄜延故將李顯忠謀來歸不克奔夏顯忠綏德青澗人自唐以來世襲蘇尾九族巡檢顯忠年十七隨父永竒出入行陳金人陷延安授永竒父子官永竒聚泣曰我宋臣也世襲國恩乃為彼用耶會劉豫令顯忠帥馬軍赴東京永竒戒之曰汝若得乘機即歸本朝無以我故二其志事成我亦不朽矣顯忠至東京乃密遣客雷燦以蠟書赴行在已而豫廢烏珠授顯忠知同州顯忠至鄜省侍永竒教顯忠曰同州入南山乃金人往來驛路汝可於此擒其酋渡洛渭由商虢歸朝苐報我知我當以兵取延安而歸顯忠赴同州即遣黃士成等持書由蜀至吳報歸朝事元帥薩里罕來同州顯忠以計執之馳出城至洛河舟船後期不得渡與追騎屢戰皆勝顯忠憩髙原望追騎益多乃與薩里罕折箭為誓不得殺同州人不得害我骨肉皆許之遂推之下山崖追兵爭救得免顯忠㩦老幼長驅而北至鄜城縣急遣人告永竒永竒即挈家出城至馬翅谷口為金人所及家屬二百口皆遇害顯忠僅以二十六人奔夏宋史李顯忠傳九年春正月李顯忠以夏軍至延安顯忠奔夏夏人問故顯忠泣具言父母妻子之亡切齒疾首願得二十萬人生擒薩里罕取陜西五路歸於夏已亦得報不共戴天之讐夏主曰爾能立功則不靳借兵時有酋豪號青面夜乂者久為夏國患顯忠請三千騎馳至其帳擒之夏主大悅即出二十萬騎以文臣王樞武臣􅗹訛為陜西招撫使顯忠為延安招撫使宋史李顯忠傳二月遣使者宣諭陜西紹興九年二月癸丑以徽猷閣待制周聿為陜西宣諭使戊午以知金州郭浩為陜西宣撫判官己巳以郭浩為陜西宣諭使宋史髙宗本紀三月金以陜西地來歸三月王倫受地於金得陜西地宋史髙宗本紀夏四月命樓照宣諭陜西陜西叛將來歸復委用之夏四月辛亥命樓照宣諭陜西壬午金鄜延路經略使關師古上表待罪命知延安府癸丑金陜西諸路節制使張中孚上表待罪命知永興軍節制陜西諸路軍馬宋史髙宗本紀五月李顯忠自夏來歸顯忠至延安總管趙惟清大呼曰鄜延路今復歸宋矣已有赦書顯忠與官吏觀赦書列拜大哭乃以舊部八百餘騎往見王樞􅗹訛諭之曰顯忠已得延安府見講和赦書招撫可以本部軍歸國􅗹訛不從曰初經略乞兵來取陜西今既到此乃令我歸耶顯忠知勢不可乃出刀斫􅗹訛不及擒王樞縳之夏人以鐵鷂子軍來顯忠以所部却之馳揮雙刀所向披靡夏兵大潰殺死蹂踐無慮萬人獲馬四萬匹顯忠揭榜招兵每得一人豫馬一匹旬日間得萬人皆驍勇又擒害其父母弟姪者皆斬於東城之內行至鄜州有馬步軍四萬餘薩里罕在耀州聞顯忠來一夕遁去吳玠遣張振來撫諭曰兩國見議和好不可生事可量引軍赴行在遂至河池縣見玠玠撫之曰忠義歸朝惟君第一至行在髙宗撫勞再三賜名加賚宋史李顯忠傳十年金熙宗天眷三年夏五月金兵圍耀州五月辛丑金人犯鳯翔之石壁寨吳璘遣統制姚仲等拒郤之金人圍耀州郭浩遣兵救之金兵解去宋史髙宗本紀六月吳璘敗金人於扶風復其城吳璘節制陜西諸軍璘以書遺金將約戰金呼紐郎君以三千騎衝璘軍璘使李師顔以驍騎擊走之呼紐入扶風復攻拔之獲三將及女真百十有七人薩里罕怒甚自戰百通坊列陳二十里璘遣姚仲力戰破之宋史吳璘傳六月己未郭浩遣統制鄭建充攻破金人於醴州復其城髙宗本紀閏六月金兵入邠州王彥等擊敗之薩里罕與吳璘楊政夾渭河而陳璘駐兵大蠱嶺薩里罕覘之曰善戰者立於不敗之地此難與爭乃引去趨邠州田晟遣將拒之於青溪嶺胡世將又遣王彥楊從儀分道而出屢戰敗之薩里罕還屯鳯翔通鑑六月己丑永興軍鈐轄傅忠信等與金人戰於華隂縣敗之宋史髙宗本紀秋七月金兵犯永興盩厔擊却之秋七月庚戍永興軍統領辛鎮及金人戰於長安城下敗之金人犯盩厔縣王俊逆戰於東洛谷郤之宋史髙宗本紀八月敗金兵於汧陽八月甲午川陜宣撫司統領王喜等遇金人於汧陽縣敗之宋史髙宗本紀九月統制楊從儀襲敗金兵於鳯翔九月丁未楊政遣統制楊從儀夜襲金人於鳯翔府敗之宋史髙宗本紀冬十一月金兵犯寶雞十一月金兵犯寶雞縣統制楊從儀敗之宋史髙宗本紀十一年金皇統元年春正月楊從儀擊金兵渭南敗之正月癸卯鳯翔統制楊從儀敗金人於渭南宋史髙宗本紀金兵陷商州正月戊辰金人陷商州守臣邵隆棄城去二月邵隆破金人於洪門復商南通鑑秋九月諸將收復陜西九月壬子楊政克隴州破岐下諸屯郭浩復華州宋史髙宗本紀冬十月楊政及金人戰寶雞敗之十月戊辰楊政及金人戰於寶雞縣敗之擒通吉貝勒宋史髙宗本紀楊政敗金萬户通吉於寶雞時通吉居渭北政欲攻拔其城通吉將精甲萬衆出政帥勇士鏖戰遣禆將突出陳後登山執幟金軍見之大呼曰伏發矣乃驚潰政乘勝掩殺通吉走至城門而橋已絶遂擒之和議成帝召政還楊政傳十二月金人來求商州之地詔割其半以畀之烏珠遣使來求商州及和尚方山二原遂命周聿鄭剛中分畫商秦之半以畀金國止存上津豐陽棄和尚方山二原以大散關為界初邵隆在商州十年披荆榛瓦礫以為治招徠流散屢敗金人終不肯離商而去值和議成割商與金隆常怏怏徙知金州嘗以兵出敵境秦檜隂使人鴆之宋元通鑑十六年金皇統六年春二月詔以商州地豫金紹興十六年二月割豐陽乾祐縣畀金人宋史髙宗本紀三十一年金主亮正隆六年秋九月金兵攻黃牛堡吳璘等敗之圖克坦喀齊喀將五千騎扼大散關逰騎攻黃牛堡守將李彥堅告急人情洶洶制置使王剛中跨一馬馳二百里至吳璘營起璘於帳中責之曰大將與國義同休戚臨敵安得髙枕而卧璘大驚即馳至殺金平駐軍青野原益調內郡兵分道而進授以方略以援黃牛剛中又以蠟書抵張正彥濟師西師大集李彥堅以神臂弓射金師却之璘遣别將彭青至寶雞渭河夜劫橋頭寨破之遂復隴州通鑑冬十月復商州十月丙辰金州都統制王彥遣統制任天錫出洵陽復豐陽縣戊午任天錫復商洛縣命吳璘趨出兵漢中己未任天錫復商州執其守將完顔守能宋史髙宗本紀三十二年金世宗大定二年春閏二月吳璘復大散關閏二月吳璘遣楊從儀等攻拔大散關分兵據和尚原金人走寶雞宋史髙宗本紀冬十二月吳璘拒金兵於鳯翔詔璘班師金以重兵扼鳯翔爭吳璘新復十三州三軍璘亟馳德順以備之已而金富察世傑率師十萬來攻璘力戰拒之時議棄三路遂詔璘班師通鑑寧宗開禧二年金章宗泰和六年陜西安撫使吳曦叛降於金曦既得志與其從弟睍及徐景望趙富米修之董鎮共為反謀隂遣其客姚淮源獻關外階成和鳯四州於金求封蜀王宋元通鑑五月興元軍亂開禧二年五月興元都統秦世輔出師至城固縣軍大亂宋史寧宗本紀宣撫使程松棄興元歸先是以程松為四川宣撫使吳曦副之松移司興元金完顔綽哈攻鳯州松求援於吳曦曦紿言當發三千騎往松信不疑及曦受金詔宣言金使者欲得階成和鳯四州以和馳書諷松使去松不知所為會報金兵至百姓奔走相蹂躪松急趨米倉山而遁以書抵曦丐贐禮稱曦為蜀王曦封致餽松望見大恐疑為劒急逃奔使者追與之乃金寶也松受而兼程出峽西向掩淚曰吾今始獲保頭顱矣宋元通鑑三年金泰和七年春正月吳曦僭王位於興州權大安軍楊震仲死之曦遣將利吉引金兵入鳯州以四郡付之表鐵山為界曦乘黃屋左纛僭王位於興州即治所為行宫宋史吳曦傳楊震仲權大安軍吳曦叛素聞震仲名馳檄召之震仲辭疾不行曦遣郭鵬飛趣其行益急震仲飲毒死闔郡為之流涕楊震仲傳二月興州將李好義等討吳曦誅之監興州合江倉楊巨源謀討吳曦乃隂與曦將張林朱邦寧及忠義士朱福等深相結眉州人程夢錫知之以告轉運使安丙丙稱疾未視事乃屬夢錫以書致巨源延之卧所巨源曰先生而為逆賊丞相長史耶丙號哭曰目前兵將我所知不能奮起必得豪傑乃滅此賊巨源曰非先生不足以主此事非巨源不足以了此事會興州中軍正將李好義亦結軍士李貴進士楊君玉李坤辰李彪等數十人謀誅曦好義曰此事誓死報國但曦死後若無威望者鎮撫恐一變未已一變復生欲奉安丙主事使坤辰來邀巨源與會巨源往與約還報丙丙出視事君玉與白子申共草密詔乙亥未明好義率其徒七十四人入偽宫時偽宫門洞開好義大呼而入曰奉朝廷密詔以安長史為宣撫令我誅反賊敢抗者夷其族曦衛兵千餘聞有詔皆棄梃而走巨源持詔乘馬自稱奉使入內户曦啓戶欲逸李貴即前執之刃中曦頰曦反撲貴仆於地好義急呼王煥斧其腰曦始縱貴貴遂斫其首持告丙宣詔軍民拜舞聲動天地持曦首撫定城中市不易肆盡收曦黨殺之通鑑續編三月興州將李好義等復秦鳯等州及大散關楊巨源李好義謂安丙曰關外四州為蜀要害盍乘勢復取之不然必為後患丙從之於是分遣好義等復西和階成鳯州孫忠鋭復大散關宋元通鑑四月金人復破大散關宋史寧宗本紀夏六月安丙殺參議官楊巨源初吳曦誅奬諭詔至沔州巨源謂人曰詔命一字不及巨源疑有以蔽其功者俄報王喜授節度使而巨源僅與通判心益不平乃訴功於朝或謂安丙曰巨源謀亂丙令喜鞫其黨皆抵罪時巨源方與金人戰於鳯州之長橋丙密使興元都統制彭輅收巨源械送閬州獄至大安龍尾灘丙使將校樊世顯取刀斷其頭不絶者踰寸遂以巨源自殪聞忠義之士聞者莫不扼腕流涕宋元通鑑嘉定元年金泰和八年夏六月金以大散關來歸六月庚午金人歸大散關宋史寧宗本紀二年冬十一月沔州將張林等謀作亂嘉定二年十一月辛卯朔沔州統制張林等謀作亂事覺貸死除名廣南羈管宋史寧宗本紀十一年金宣宗興定元年春二月金兵陷大散關及皂郊三月統制王逸將兵復之二月甲辰金人焚大散關而去丙午破皂郊死者五萬人三月戊子王逸率忠義人復皂郊金副統軍完顔贇包長夀遁去沔州軍郭雄追斬贇首長夀僅以身免宋史寧宗本紀夏四月金兵破黃牛堡統制吳政拒却之金兵合長安鳯翔之衆復犯大散關守將王立遁又犯黃牛堡吳政拒却之政至大散關執立斬之以徇事聞進政三官宋元通鑑十二年金興定三年春二月金兵入興元洋州遣兵破之於大安軍金人遁嘉定十二年春正月甲午金人破鳯州守臣雷雲棄城去金人夷其城乙未興元都統吳政及金人戰於黃牛堡死之金人乘勝攻武休關二月癸卯金人破武休關興元都統李貴遁還利州路提刓權興元府事趙希皆棄城去丁未金人破興元府辛亥金人犯洋州守臣蔡晉卿遣兵拒之不克洋州破壬子沔州都統張威遣統制石宣等邀擊金人於大安軍大破之金人遂去興元府丙辰金人去洋州三月癸酉金人復入洋州焚其城而去宋史寧宗本紀三月興元軍士作亂三月乙亥興元軍士權興等作亂閏月癸亥興元軍士張福莫簡等作亂以紅巾為號宋史寧宗本紀十三年秋九月興元金州諸將取關中嘉定十三年九月興元副都統陳立出大散關興元統制田胄出子午谷金州副都統陳昱出上津宋史寧宗本紀理宗端平二年冬十二月元兵入沔州殺知州髙稼統制曹友聞救却之稼在沔葺理創殘招集流散皆襁負歸之及數與蒙古力戰竒功甚多至是奎騰自鳯州入西川東路之師多敗遂搗西池谷距沔九十里吏民議退保大安稼言於制置使趙彥呐曰今日之事有進無退若能進據險地以身捍蜀敵有後顧必不深入若倉皇召兵退守內地敵長驅而前蜀事去矣彥呐曰吾志也已而竟行留稼守沔蒙古自白水關入六股株距沔六十里沔無城依山為阻稼升髙鼓譟盛旗鼓為疑兵彥呐至蜀口輟帳前總管李彥威以軍還沔召小校楊俊何璘以兵會又選精兵千人命王宣帥以助之已而蒙古大至何璘遁沔州遂陷衆擁稼出户稼叱之不能止敵圍殺之彥呐聞稼死沔州破乃進屯青野原蒙古圍之曹友聞救之解其圍既而蒙古先鋒汪世顯搗大安友聞又救之指麾甫畢蒙古大軍數萬突至友聞逆戰又敗之敵乃退友聞遂引兵扼仙人關宋元通鑑三年秋九月曹友聞及元兵戰於陽平關死之初友聞帥師扼仙人關諜報蒙古合蕃漢軍五十餘萬將至友聞謂弟萬曰國家安危在此一舉衆寡不敵豈容浪戰唯當乘髙據險出竒設伏以待之蒙古攻武休關敗都統李顯忠軍遂入興元欲衝大安軍制置使趙彥呐檄友聞控制大安以保蜀口友聞以為不可彥呐不從友聞乃遣弟萬及友諒引兵上雞冠隘多張旗幟示敵堅守友聞選精鋭萬人夜渡江密往流溪設伏約曰敵至內以鳴鼓舉火為應外呼殺聲蒙古兵果至萬出迎戰蒙古巴圖魯及塔海帥步騎萬餘人往來搏戰矢石如雨萬身被數創令諸軍舉烽友聞分所部為三親帥精兵三千人疾馳至隘下先遣統領劉虎帥敢死士五百衝敵前鋒不動友聞乃伏三百騎道傍而令虎銜枚突陳會大風雨諸將請曰雨不止淖濘深沒足宜俟少霽友聞叱曰敵知我伏兵在此緩必失機遂擁兵齊進西軍素以綿裘代鐵甲經雨濡濕不利步鬬黎明蒙古以鐵騎四面圍繞友聞嘆曰此殆天乎吾有死而已於是血戰愈厲與萬俱死軍盡沒蒙古兵遂長驅入蜀宋元通鑑陜西通志卷八十一
