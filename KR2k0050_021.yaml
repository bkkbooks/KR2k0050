body:
  text: 陜西通志卷二十一職官二唐關內兵馬元帥掌征伐兵罷則省官屬不録副元帥行軍大總管武德七年改總管府為都督府復有行軍大總管者蓋有征伐則置於所征之道以督軍事尚書省令掌管內兵民總判省事僕射掌二令事左右丞各一人食貨監丞二人農圃監丞四人武器監丞二人百工監丞四人招討使掌征伐兵罷則省巡撫關內景雲元年置後省關內道安北大都護府本燕然都護府貞觀二十一年置龍朔三年曰瀚海都護府總章二年更名開元二年治中受降城十年徙治豐勝二州之境十二年徙治天德軍黜陟使貞觀八年置乾元元年停採訪黜陟使是歲改為觀察處置使安撫大使無定員經略使無定員鑄錢使無定員延州中都督府夏州中都督府都督一人别駕長史司馬録事參軍事録事二人功曹參軍事倉曹參軍事户曹參軍事參軍事四人市令文學醫學博士梁州下都督府豐州下都督府麟州下都督府勝州下都督府鄜州下都督府都督一人以上五州官屬與中州同但少市令一人京畿至德元載置京畿節度使領京兆同岐金商五州上元二年以華州置鎮國節度亦曰關東節度寶應元年廢京畿節度廣德元年罷鎮國軍節度二年置京畿觀察使以御史中丞兼之永泰元年以御史大夫兼京畿觀察使建中四年置京畿渭南節度觀察使領金商二州是年兼渭北鄜坊丹延綏五州未畿罷五州及金州為京畿商州節度使興元元年置京畿節度使以同州為奉承軍節度是年罷以華州置潼關節度使貞元九年罷乾寧元年以乾州置威勝軍節度二年升同州為匡國軍節度光化元年以華州置鎮國軍節度鎮華同二州三年罷天祐元年以京畿置佑國軍節度使領金商二州三年置義勝軍節度使領耀鼎二州罷匡國軍興鳯隴上元元年置興鳯隴節度使建中四年賜號保義節度是年罷保義以隴州置奉義軍節度使尋廢大中四年以隴州置防禦使領黃頭軍使中和三年增京甸神勇軍使乾寧元年鳯翔節度增領乾州未幾罷邠寧乾元二年置邠寧節度使領州九邠寧慶涇原鄜坊丹延上元元年罷領鄜坊丹延大厯三年罷邠寧節度使十四年復置邠寧慶節度使大中三年邠寧節度以南山平夏部落叛徙治寧州及內附復徙故治光啓元年賜號靖難軍節度渭北鄜坊上元元年置渭北鄜坊節度使治坊州并領丹延二州永泰元年罷領丹延二州增領綏州以丹延二州别置都團練使治延州是年增領安塞軍使尋升為觀察使大厯十四年罷渭北節度置都團練觀察使建中四年復置渭北節度如上元之舊尋罷未幾復置徙治鄜州其後置都團練觀察防禦使貞元三年復置渭北節度使以綏州𨽻銀夏節度元和元年析丹州置防禦使中和二年渭北節度賜號保大軍節度以延州置保塞軍節度光化元年更保塞軍節度曰寧塞軍節度後又更名衛國軍節度罷丹州防禦使以丹州𨽻衛國軍朔方開元九年置朔方節度使領單于大都護府夏鹽綏銀豐勝六州定逺豐安二軍東中西三受降城十四年領關內支度營田使十五年兼關內鹽池使二十年增領押諸蕃部落使及間廄宫苑監牧使二十二年兼關內道採訪處置使二十九年兼六成水運使天寶元年增領邠州十三載以豐州置九原朔方節度隴右兵馬使乾元元年置振武節度押蕃落使領鎮北大都護府麟勝二州廣德二年罷振武節度以所管七州𨽻朔方大厯三年朔方節度增領邠寧慶三州十四年析置振武邠寧節度朔方所領靈鹽夏豐四州西受降城定逺天德二軍振武節度復領鎮北大都護府及綏銀二州東中二受降城貞元三年置夏州節度觀察處置押蕃落使領綏鹽二州其後罷領鹽州十二年朔方節度罷領豐州及西受降城天德軍以振武之東中二受降城𨽻天德軍以天德軍置都團練防禦使領豐會二州三受降城元和九年夏州節度增領宥州開成三年領採造供軍銀川監牧使大中十年增領撫平黨項等使中和二年賜號定難節度南陽至德元載置興平節度使領上洛安康武當房陵四郡治上洛郡上元二年廢興平節度使置武關內外四州防禦觀察使寶應元年金商二州𨽻京畿罷武關內外四州防禦觀察使興元元年置金商二州都防禦使光啓元年升為節度兼京畿制置萬勝軍等使是年罷節度置昭信軍防禦使治金州光化元年升昭信軍防禦為節度使天祐二年賜號戎昭軍節度是年更戎昭軍曰武定軍徙治均州按南陽原不在陜省而興平節度等使俱𨽻南陽故據表録入山南西道至德元載置山南西道防禦守捉使乾元二年置興鳯二州都團練守捉使治鳯州廣德元年升山南西道防禦守捉使為節度使尋降為觀察使治梁州建中元年復升為節度使光啓元年升興鳯二州都團練守捉使為防禦使治鳯州置定武軍節度使治洋州二年升興鳯二州防禦使為感義軍節度使乾寧四年更曰昭武軍節度天祐三年置興文節度使領興文集壁四州治興州節度官屬副大使知節度事行軍司馬副使判官支使掌書記推官巡官衙推同節度副使十人館驛巡官四人府院法直官要籍逐要親事隨軍四人觀察官屬副使支使判官掌書記推官巡官衙推隨軍要籍進奏官團練官屬副使判官推官巡官衙推防禦官屬副使判官推官巡官按唐百官志節度觀察團練防禦等使皆兼所治州刺史京畿採訪使治京城內領京兆鳯翔二府華同商邠四州關內採訪使以京官領州二十四隴鄜坊丹延綏麟銀勝豐夏十一州今屬陜西山南西道採訪使治梁州領府一州十三興元一府洋鳯二州今屬陜西副使支使判官掌書記推官巡官衙推隨軍要籍進奏官以上官屬各採訪使皆同按唐書百官志景雲二年置十道按察使開元元年罷二年曰十道按察採訪處置使至四年罷八年復置按察