body:
  text: 陜西通志巻五十名宦一牧宰字人切於父母矧古京兆扶翊左右容保教思近在腋肘膏澤淪肌甘棠頌久䕶羌捍圉司隷繩糾勛銘於旂碑載於口自昔編氓躋堂春酒紀爾循良長勵厥後作名宦志第二十四節鎮上商南仲周文王大夫王命南仲往城于方出車彭彭旂旐央央天子命我城彼朔方赫赫南仲玁狁于襄詩經小雅王殷王也南仲文王之屬方朔方近玁狁之國也毛傳王使南仲為將率往築城於朔方為軍壘以禦北狄之難鄭箋文王以殷王之命命南仲往城朔方南仲為將率得人歡心故戌役當築壘之時云天子命我築軍壘於朔方欲令赫赫之南仲從此征玁狁於是而平除之能為戍役所美所以可嘉也孔疏周召公奭與周同姓姓姬氏成王時為三公自陜以西召公主之召公之治西方甚得兆民和巡行鄉邑有棠樹決獄政事其下自侯伯至庶人各得其所無失職者召公卒而民人思召公之政懐棠樹不敢伐歌詠之作甘棠之詩史記燕世家昔者周道之盛召伯在朝有司請營召以居召伯曰以吾一身而勞百姓此非吾先君文王之志也於是出就蒸庶於阡陌隴畝之間而聴斷焉召伯暴處逺野廬於樹下百姓大悦耕桑者倍力以勸嵗大稔民給家足於是詩人見召伯之所休息樹下美而歌之詩曰蔽芾甘棠勿剪勿伐召伯所茇此之謂也韓詩外傳正義曰武王之時召公為西伯行政於南土決訟於甘棠之下其教著明於南國愛結於民心故作是詩以美之孔疏按朱子集傳云召伯循行南國以布文王之政是召公舍甘棠在文王時矣但據韓詩外傳先君文王云云應在武王成王時也尹吉甫宣王大夫文武吉甫萬邦為憲詩經小雅吉甫尹吉甫也有文有武憲法也毛傳吉甫此時大將也鄭箋王征玁狁既出鎬方使吉甫逐之北至太原之地王師所以得勝者以有文徳武功之臣尹吉甫其才畧可為萬國之法受命逐狄王委任焉故北狄逺去也孔疏成康既没周室寖衰玁狁内侵逼近京邑宣王命尹吉甫帥師伐之有功而歸詩人作歌以叙其事朱子集傳方叔宣王卿士顯允方叔征伐玁狁詩經小雅方叔先與吉甫征伐玁狁鄭箋秦襄公史失名七年春西戎犬戎與申侯伐周襄公將兵救周戰甚力有功周東徙雒邑襄公以兵送平王平王封為諸侯賜之岐以西之地曰戎無道侵奪我岐豐之地秦能攻逐戎即有其地與誓封爵之襄公於是始國十二年伐戎至岐卒生文公文公三年東獵四年至汧渭之㑹乃卜居之占曰吉即營邑之十三年初有史以紀事民多化者十六年文公以兵伐戎戎敗走於是文公遂收周餘民有之地至岐岐以東獻之周五十年卒史記秦本紀按古者郡縣未設列爵分土封建亦郡縣也秦自襄公以後建國西藩比於節鎮穆公孝公霸圖再啓亦以並列焉秦繆公名任好立四年迎婦於晉晉獻公滅虞擄其大夫百里傒以為繆公夫人媵傒亡走宛楚鄙人執之繆公聞傒賢請以五羖羊皮贖之授之國政號曰五羖大夫傒讓曰臣不及臣友蹇叔賢於是繆公使人厚幣迎蹇叔以為上大夫三十二年使孟明視西乞術及白乙丙將百里傒蹇叔二人哭之秦兵遂東將襲鄭晉襄公遮秦兵於殽擊之大破秦軍三十六年繆公復益厚孟明等使將兵伐晉以報殽之役晉人皆城守不敢出於是繆公乃誓於軍以申思不用蹇叔百里傒之謀故作誓以記過君子聞之曰秦繆公之與人周也卒得孟明之慶三十七年用由余謀伐戎益國十二開地千里遂霸西戎天子使召公過賀繆公以金鼓史記秦本紀五羖大夫之相秦也勞不坐乘暑不張葢行於國中不從車乘不操干戈功名藏於府庫徳行施於後世五羖大夫死秦國男女流涕童子不歌謡舂者不相杵此五羖大夫之徳也戰國䇿文公元年殽之役晉人既歸秦帥秦大夫及左右皆言曰是敗也孟明之罪也必殺之秦伯曰是孤之罪也復使為政二年秦孟明視帥師伐晉以報殽之役戰於彭衙秦師敗績秦伯猶用孟明孟明増修國政重施於民三年秦伯遂霸西戎左傳秦孝公名渠梁立周室微諸侯力政爭相併秦僻在雍州不與中國諸侯之㑹盟孝公於是布惠振孤寡招戰士明功賞下令國中曰昔我繆公自岐雍之間修德行武東平晉亂西霸戎狄廣地千里天子致伯諸侯畢賀往者國家内憂未遑外事三晉攻奪我河西地諸侯卑秦醜莫大焉寡人常痛於心賔客羣臣有能出竒計强秦者吾且尊官與之分土衛鞅聞是令下西入秦説孝公變法修刑内務耕稼外勸戰死之賞罰孝公善之卒用鞅法百姓苦之居三年百姓便之十九年天子致伯二十年諸侯畢賀史記秦本紀秦䝉恬其先齊人始皇二十六年因家世得為秦將攻齊大破之拜為内史秦已并天下乃使䝉恬將三十萬衆北伐戎狄收河南築長城因地形用險制塞起臨洮至遼東延袤萬餘里於是渡河據陽山逶蛇而北暴師於外十餘年居上郡威振匈奴始皇甚尊寵䝉氏信任賢之史記本傳漢汲黯字長孺濮陽人治官理民好清靜擇丞史而任之公孫𢎞為丞相言上曰右内史界部中多貴人宗室難治非素重臣不能任請徙汲黯為右内史為右内史數年官事不廢渾邪王率衆來降漢發車二萬乘縣官無錢從民貰馬民或匿馬馬不具上怒欲斬長安令黯曰長安令無罪獨斬黯民乃肯出馬且匈奴降漢漢徐以縣次傳之何至令天下騷動乎上黙然及渾邪至賈人與市者坐當死者五百餘人黯請間見曰渾邪率數萬之衆來降虚府庫賞賜發良民侍養譬若奉驕子愚民安知市買長安中物而文吏繩以為闌出財物於邊關乎陛下以微文殺無知者五百餘人是所謂庇其葉而傷其枝者也上黙然不許後數月免官史記本傳按漢因秦制初設二内史繼置三輔以治京畿其祿位視九卿唐京兆亦如之漢世雖司隷督察三輔而京兆馮翊扶風非司隷屬官舊志與外郡牧守分編各府屬位置殊未合兒寛千乘人張湯為御史大夫舉侍御史見上語經學上説之擢為中大夫遷左内史寛勸農業緩刑罰理獄訟卑體下士務在於得人心擇用仁厚士推情與下不求名聲吏民大信愛之奏開六輔渠定水令以廣溉田收租税時裁濶狹與小民相假貸以故租多不入後有軍發左内史以負租課殿當免民聞皆恐失之大家牛車小家擔負輸租繦屬不絶課更以最漢書本傳王訢濟南人為被陽令繡衣御史暴勝之薦訢徵為右輔都尉守右扶風上數出幸安定北地過扶風宫館馳道修治供張辦武帝嘉之駐車拜訢為真視事十餘年漢書本傳雋不疑字曼倩渤海人昭帝即位擢京兆尹京師吏民敬其威信每行縣録囚徒還其母輒問不疑活幾何人不疑多所平反母喜笑為飲食語言異於他時或亡所出母怒為之不食故不疑為吏嚴而不殘久之以病免終於家漢書本傳趙廣漢字子都涿郡蠡吾人為陽翟令以治行尤異遷京輔都尉守京兆尹新豐杜建為京兆掾素豪俠賔客為姦利廣漢聞之先風告建不改於是收案致法宗族賔客謀欲簒取廣漢盡知其計議主名起居使吏告曰若計如此且并滅家令數吏將建棄市莫敢近者京師稱之遷潁川太守本始二年復用守京兆尹滿嵗為真廣漢為人强力天性精於吏職尤善為鉤距以得事情郡中盜賊閭里輕俠其根株窟穴所在及吏受取請求銖兩之姦皆知之長安少年數人㑹窮里空舍謀共刼人富人蘇回為郎二人刼之廣漢將吏到家自立庭下使長安丞龔奢叩堂户曉賊曰京兆尹趙君謝兩卿無得殺質此宿衞臣也釋質束手得善相遇二人驚愕又素聞廣漢名即開户出下堂叩頭廣漢送獄勅吏謹遇至冬當出死豫為調棺給斂葬具告語之皆曰死無所恨廣漢嘗記召湖都亭長湖都亭長西至界上界上亭長戲曰至府為我多謝問趙君亭長既至廣漢與語畢謂曰界上亭長寄聲謝我何以不為致問還為吾謝界上亭長勉思職事有以自效京兆不忘卿厚意其發姦摘伏如神皆此類也長老傳自漢興以來治京兆者莫能及廣漢好用世吏子孫新進年少者見事風生無所回避率多果敢之計終以此敗廣漢雖坐法誅為京兆尹亷明威制豪彊小民得職百姓追思歌之至今漢書本傳陽城侯徳字路叔楚元王交孫有智畧地節中封陽城侯寛厚好施生每行京兆尹事多所平反漢書楚元王傳尹翁歸字子兄河東平陽人徙杜陵治東海以髙第入守右扶風滿嵗為真選用廉平疾姦吏以為右職接待以禮好惡與同之其負翁歸罰亦必行治如在東海故迹姦邪罪名亦縣縣有名籍盗賊發其比伍中翁歸輒召其縣長吏曉告以姦黠主名教使用類推迹盗賊所過抵類常如翁歸言無有遺脱緩於小弱急於豪强豪强有論罪輸掌畜官使斫莝責以程數不得取代不中程輙笞督極者至以鈇自剄而死京師畏其威嚴扶風大治盗賊課常為三輔最翁歸為政雖任刑其在公卿之間清潔自守語不及私然温良嗛退不以行能驕人甚得名譽於朝廷視事數嵗元康四年病卒家無餘財天子賢之詔賜翁歸子黄金百斤以奉其祭祠漢書本傳蓋寛饒字次公魏郡人宣帝擢為司𨽻校尉刺舉無所回避小大輒舉公卿貴戚及郡國吏繇使至長安皆恐懼莫敢犯禁京師為清寛饒為人剛直髙節志在奉公家貧奉錢月數千半以給吏民為耳目言事者身為司隷子常步行自戍北邊公廉如此然深刻喜陷害人在位及貴戚人與為怨又好言事刺譏奸犯上意上以其儒者優容之然亦不得遷漢書本傳馮野王字君卿父奉世上黨潞人徙杜陵受業博士通詩年十八上書願試守長安令宣帝竒其志後遷櫟陽令徙夏陽令元帝時為左馮翊而池陽令並素行貪汙輕野王外戚年少治行不改野王部督郵祋祤趙都案騐得其主守盗十金罪收捕並不首吏都格殺並家上書陳寃事下廷尉都詣吏自殺以明野王京師稱其威信遷大鴻臚數年出為上郡太守病免賜告歸杜陵年老終於家立字聖卿野王弟通春秋竟寧中以王舅出為五原屬國都尉數年遷五原太守徙西河上郡立居職公廉治行畧與野王相似而多知有恩貸好為條教吏民嘉美野王立相代為太守歌之曰大馮君小馮君兄弟繼踵相因循聰明賢知恵吏民政如魯衞徳化均周公康叔猶二君漢書馮奉世傳諸葛豐字少季琅邪人以明經為郡文學名特立剛直舉侍御史元帝擢為司𨽻校尉刺舉無所避京師為語曰間何濶逢諸葛上嘉其節加秩光禄大夫時侍中許章以外屬貴幸不奉法度賔客犯事與章相連豐欲奏其事適逢許侍中私出豐駐車舉節詔章曰下欲收之章迫窘馳車去豐追之許侍中得入宫門自歸上豐亦上奏於是收豐節司隷去節自豐始是後言益不用徙城門校尉漢書本傳鄭昌字次卿泰山剛人好學明經通法律政事為右扶風京師稱之漢書鄭𢎞傳王尊字子贛涿郡髙陽人初元中舉直言遷虢令轉守槐里兼行美陽令事春正月美陽女子告假子不孝曰兒常以我為妻詬笞我尊聞之遣吏收捕騐問辭服尊曰律無妻母之法聖人所不忍書此經所謂造獄者也尊於是出坐廷上取不孝子縣磔著樹使騎吏五人張弓射殺之吏民驚駭後上行幸雍過虢尊供張如法而辦後免歸復為郿令為髙陵令數月以病免㑹南山羣盗傰音倍宗等數百人為吏民害拜故𢎞農太守傅剛為校尉逐捕嵗餘不能禽或説大將軍鳳獨選賢京兆乃可於是鳳薦尊守京輔都尉行京兆尹事旬月間盗賊清遷光禄大夫守京兆尹後為真凡三嵗坐免吏民多稱惜之漢書本傳彭宣字子佩淮陽陽夏人張禹薦宣經明有威重可任政事繇是為右扶風遷廷尉漢書本傳王章字仲卿泰山鉅平人少以文學為官成帝立遷司隷校尉大臣貴戚敬憚之王尊免後代者不稱職章以選為京兆尹時大將軍王鳳輔政章為鳳所舉非鳳專權不親附鳳㑹日有蝕之章奏封事召見言鳳不可任用上初納章言後不忍退鳳遂為鳳所陷初章為諸生學長安獨與妻居章疾病無被臥牛衣中與妻決涕泣其妻呵怒之曰仲卿京師尊貴在朝廷人誰踰仲卿者今疾病困戹不自激卬乃反涕泣何鄙也及為京兆欲上封事妻又止之曰人當知足獨不念牛衣中涕泣時耶章曰非女子所知也書遂上果下廷尉獄章為京兆二嵗死不以其罪衆庶寃紀之漢書本傳薛宣字贛君東海郯人大將軍王鳳薦為長安令治有名以明習文法守左馮翊滿嵗稱職為真始髙陵令楊湛櫟陽令謝游皆貪猾不遜持郡短長前二千石數案不能竟及宣視事詣府謁宣接待甚備宣察湛有改節敬宣之效迺手自牒書條其姦臧封與湛湛自知罪臧皆應記即時解印綬付吏為記謝宣無怨言而櫟陽令游自以大儒有名輕宣宣移書顯責之游得檄亦解印綬去又頻陽縣北當上郡西河為數郡湊多盗賊其令平陵薛恭本縣孝者功次稍遷未嘗治民職不辦而粟邑縣小辟在山中民謹樸易治令鉅鹿尹賞久郡用事吏為樓煩長舉茂才遷在粟宣即以令奏賞與恭換縣二人視事數月兩縣皆治宣得郡中吏民罪名輒召告其縣長吏使自行罰曉曰府所以不自發舉者不欲代縣治奪賢令長名也長吏莫不喜懼免冠謝宣歸恩受戒者宣為吏賞罰明用法平而必行所居皆有條教可紀多仁恕愛利池陽令舉廉吏獄掾王立府未及召其妻受繫者錢再宿獄掾實不知慙恐自殺宣聞移書池陽以府決曹掾書立之柩以顯其魂宣性宻靜有思思省吏職求其便安下至財用筆研皆為設方畧利用而省費吏民稱之郡中清靜漢書本傳翟方進字子威汝南上蔡人河平中為博士數年遷朔方刺史居官不煩苛所察應條輒舉甚有威名遷丞相司直帝欲試以治民徙為京兆尹搏擊豪强京師畏之時胡常為青州刺史聞之與書曰竊聞政令甚明為京兆能則恐有所不宜方進心知所謂其後少弛威嚴居官三嵗遷御史大夫漢書本傳何武字君公蜀郡郫縣人以射䇿甲科為郎光禄勲舉四行遷為鄠令坐法免歸久之為司隷校尉徙京兆尹武為人仁厚好進士奬稱人之善然疾朋黨欲除吏先為科例以防請托其所居無赫赫名去後嘗見思漢書本傳王駿吉子瑯琊臯虞人以孝廉為郎遷司隷校尉奏免丞相匡衡成帝欲大用之出駿為京兆尹試以政事先是京兆有趙廣漢張敞王尊王章至駿皆有能名京師曰前有趙張後有三王漢書王吉傳㳙勲為司𨽻校尉時北地浩商為義渠長所捕亡長取其母與猳猪連繫都亭下商兄弟㑹賔客自稱司隷掾長安縣尉殺義渠長妻子六人亡丞相御史請遣掾史與司隷校尉部刺史并力逐捕察無狀者奏可勲奏言春秋之義王人微者序乎諸侯之上尊王命也臣幸得奉使以督察公卿以下為職今丞相宣請遣掾史以宰士督察天子奉使命大夫甚誖逆順之理願下中朝特進列侯將軍以下正國法度議者以為丞相掾不宜移書督趣司𨽻㑹浩商捕得伏誅家屬徙合浦冊府元龜孫寳字子嚴潁川鄢陵人為京兆尹故吏侯文以剛直不茍合常稱疾不肯仕寳以恩禮請為布衣交進見如賔禮數月以立秋日署文東部督郵入見勅曰今日鷹隼始擊當順天氣取姦惡掾部渠有其人乎文曰霸陵杜穉季寳曰其次文曰豺狼横道不宜復問狐狸寳黙然穉季耳目長聞知之杜門穿舍後牆為小戸但持鉏自治園因文所厚自陳如此文曰誠能自改嚴將不治前事即不更心但更門戸適取禍耳穉季遂不敢犯法寳為京兆尹三嵗京師稱之哀帝即位遷司隷初傅太后與中山孝王母馮太后俱事元帝有卻傅太后使有司考馮太后令自殺衆庶寃之寳奏請覆治傅太后大怒曰帝置司隷主使察我馮氏反事明白故欲擿觖以揚我惡我當坐之上迺順指下寳獄大司馬傅喜光祿大夫龔勝固爭上為言太后出寳復官頃之鄭崇下獄寳上書言寃詔免為庶人漢書本傳鮑宣字子都渤海髙城人好學明經哀帝時為司隷丞相孔光行園陵官屬以令行馳道中宣出逢之使吏鉤止丞相掾史没入其車馬摧辱宰相事下御史中丞侍御史至司隷官欲捕從事閉門不納宣坐距閉使者亡人臣禮大不敬不道下廷尉獄博士弟子濟南王咸舉幡太學下曰欲救鮑司隷者㑹此下諸生㑹者千餘人朝日遮丞相自言丞相車不得行又守闕上書上遂抵宣罪減死一等髠鉗漢書本傳邴漢瑯琊人以清行徵用至京兆尹王莽秉政漢乞骸骨歸老於鄉里漢書龔勝傳鄧禹字仲華南陽新野人赤眉入闗光武籌赤眉欲并闗中以禹沈深有大度乃拜為前將軍持節西入闗建武元年渡汾隂河入夏陽更始中郎將左輔都尉公乘歙引衆十萬與左馮翊兵共拒禹於衙禹破走之是時三輔覆敗赤眉所過殘賊百姓聞禹師行有紀降者日以千數衆號百萬禹所止輒停車住節以勞來之父老童穉莫不感悦於是名震闗西諸將勸禹徑攻長安禹曰不然赤眉新拔長安財富充實鋒鋭未可當也吾且休兵北道就糧養士以觀其弊於是引軍北至栒邑擊破赤眉别將諸營保郡邑皆開門歸附三年春赤眉西走扶風禹乃南至長安大饗士卒收十一帝神主遣使奉詣洛陽因循行園陵置吏奉守引兵與延岑戰於藍田不克就穀雲陽赤眉復還入長安禹敗走髙陵乃徵還後漢書本傳馮異字公孫潁川父城人建武二年赤眉延岑暴亂三輔郡縣大姓各擁兵衆大司徒鄧禹不能定乃遣異代禹討之異引而西所至皆布威信與赤眉遇於華隂戰數十合降其將劉始王宣等五千餘人三年春拜異為征西大將軍時延岑據藍田王歆據下邽芳丹據新豐蔣震據霸陵張邯據長安公孫守據長陵楊周據谷口吕鮪據陳倉角閎據汧駱蓋延據盩厔任良據鄠汝章據槐里各稱將軍擁兵多者萬人少者數千人轉相攻擊異且戰且行屯兵上林苑中延岑既破赤眉欲據闗中引張邯任良攻異異擊破之斬首千餘級諸營保守附岑者皆來降岑遂自武闗走南陽時百姓饑餓道路斷絶委輸不至軍士悉以果實為糧詔拜南陽趙匡為右扶風將兵助異并送縑穀異兵食漸盛乃稍誅擊豪傑不從令者褒賞降附有功勞者悉遣其渠帥詣京師威行闗中明年公孫述遣將程焉出屯陳倉異與趙匡迎擊大破之焉退走漢川異追戰於箕谷復破之還擊破吕鮪營保降者甚衆懐來百姓申理枉結出入三嵗上林成都六年春朝京師留十餘日令異妻子隨異還西諸將上隴為隗囂所敗乃詔異軍栒邑未及至隗囂乗勝使將行巡下隴取栒邑異潛往閉城偃旗鼓行巡不知馳赴之異卒擊鼓建旗而出巡軍驚亂奔走追擊大破之北地諸豪長耿定等悉降異又擊盧芳將賈覽破之上郡安定皆降後漢書本傳蓋延字巨卿漁陽人建武十一年拜為左馮翊後漢書本傳視事四年人敬其威信續漢書祭遵潁川穎陽人建武二年春拜征虜將軍六年春詔遵與耿弇等從天水伐公孫述師次長安時車駕亦至隗囂不欲漢兵上隴使王元拒隴坻遵進擊破之及諸將到與囂戰並敗引退下隴乃詔遵軍汧八年秋復從車駕上隴囂破帝東歸過汧幸遵營勞饗士卒作黄門武樂良夜乃罷時遵有疾詔賜重茵覆以御蓋復令進屯隴下及公孫述遣兵救囂吳漢耿弇等悉奔還遵獨留不卻九年春卒於軍諡曰成侯後漢書本傳鮑永字君長上黨屯留人建武十一年為司隷校尉辟扶風鮑恢為都官從事恢亦抗直不避强禦帝常曰貴戚且宜歛手以避二鮑其見憚如此永行縣到霸陵路經更始墓引車入陌從事諫止之永曰親北面事人寧有過墓不拜雖獲罪所不避也遂下拜哭盡哀而去西至扶風椎牛上茍諫冡帝聞之問公卿曰奉使如此何如張湛對曰仁不遺舊忠不忘君行之髙者也帝意乃釋子昱字文泉中元元年拜司隷校尉在職奉法守正有父風永平五年免後漢書本傳鄭衆字仲卿河南開封人永平中遷左馮翊政有名迹後漢書鄭興傳郅夀字伯考汝南西平人以廉能稱舉孝廉肅宗擢為京兆尹郡多强豪姦暴不禁三輔素聞夀皆懐震悚各自檢勅莫敢干犯夀雖威嚴而推誠下吏皆願效死莫有欺者後漢書郅惲傳附桓宣譙國人安帝時為梁州刺史時四方多事宣務本節用每農月親載耒耜登臺勸民四民無惰業者嵗屢豐稔漢中府志王堂字敬伯廣漢郪人遷右扶風安帝西巡阿母王聖中常侍江京等並請屬於堂堂曰吾䝉國恩豈可為權寵阿意即日遣家屬歸閉閣上病果有誣奏堂者㑹京等誅堂以守正見稱後漢書本傳陳禪字紀山巴郡安漢人舉茂才時漢中蠻夷反畔以禪為漢中太守賊素聞其名即時降服遷左馮翊順帝即位遷司隷校尉卒於官子澄有清名官至漢中太守後漢書本傳史敞為京兆尹有能名尤善條教見稱三輔續漢書种暠字景伯洛陽人為梁州刺史甚得百姓歡心被徵當遷吏人詣闕請留之梁太后歎曰未聞刺史得人心若是乃許復留一年遷漢陽太守戎狄男女送至漢陽界暠與相揖謝千里不得乘車後漢書本傳梁並永嘉元年為左馮翊時諸羌叛並以恩信招誘之於是離湳狐奴等五萬餘戸詣並降隴右復平後漢書西羌傅陳龜字叔珍上黨泫氏人永建中舉孝廉遷五原太守拜京兆尹時三輔强豪之族多侵枉小民龜到厲威嚴悉平理其怨屈者郡内大悦後漢書本傳延篤字叔堅南陽犨人舉孝廉遷左馮翊又徙京兆尹其政用寛仁憂恤民黎擢用長者與參政事郡中歡愛三輔咨嗟焉先是陳留邊鳳為京兆尹亦有能名郡人為之語曰前有趙張三王後有邊延二君後漢書本傳劉陶字子竒潁川潁隂人靈帝時遷尚書令以數切諌為權臣所憚徙為京兆尹到職當出修宫錢直千萬陶既清貧恥以錢買職稱疾不聴政帝宿重陶才徵拜諫議大夫後漢書本傳樊陵字徳雲為京兆尹陽陵縣東涇水長流溉灌維首牧人之吏謀不假給光和五年京兆尹樊陵勤恤人隠悉心政事命方畧大吏麴遂令伍瓊權度計慮揆程經用以事上聞遂樹柱累石委薪積土折湍流疏水門㑹於新渠灑於畎畆昔日鹵田化為甘壤粳黎稼穡所入不可勝算農民熙怡悦豫謳談疆畔謂之樊惠渠蔡邕樊惠渠頌序蓋勲字元固敦煌人司隷張温舉為京兆尹時長安令楊黨父為中常侍恃勢貪放勲案得其贓千餘萬貴戚咸為之請勲不聴具以事聞并連黨父有詔窮案威震京師時小黄門京兆髙望為尚藥監幸於皇太子太子因蹇碩屬望子進為孝廉勲不肯用或曰皇太子副主望其所愛碩帝之寵臣而子違之所謂三怨成府者也勲曰選賢所以報國也非賢不舉死亦何悔及董卓廢少帝徵為議郎時左將軍皇甫嵩精兵三萬屯扶風勲密相要將以討卓㑹嵩亦被徵勲以衆弱不能獨立遂並還京師後漢書本傳時漢陽叛人王國衆十餘萬攻陳倉三輔震動勲領郡兵五千人請滿萬人因表用處士扶風孫瑞為鷹鷂都尉桂楊魏傑為破敵都尉京兆杜楷為威虜都尉𢎞農楊儒為烏擊都尉長陵第五雋為清冦都尉悉領屬勲續漢書段煨武威人魏志董卓遷天子西都長安使中郎將段煨屯華隂及李傕郭汜等亂天子東歸車駕至華隂寧輯將軍段煨具服御及公卿以下資儲請帝幸其營初楊定與煨有隙遂誣煨欲反乃攻其營十餘日不下煨猶奉給御膳廩贍百官終無二意後漢書董卓傳煨在華隂特修農事典略鍾繇字元常潁川長社人建安初闗中諸將馬騰韓遂等各擁强兵相爭太祖方有事山東乃表繇以侍中守司隷校尉持節督闗中諸軍委之以後事特使不拘科制繇至長安移書騰遂等為陳禍福遂各遣子入侍三國志本傳衞覬字伯儒安邑人除茂陵令太祖征袁紹而劉表為紹援闗中諸將又中立覬以侍御史使益州令劉璋下兵以綴表軍至長安道路不通覬不得進遂留鎮闗中時四方還民闗中諸將多引為部曲覬書與荀彧曰闗中膏腴之地頃遭荒亂人民流入荆州者十萬餘家聞本土安寧皆企望思歸而歸者無以自業夫鹽國之大寳也自亂來放散宜如舊置使者監賣以其直益市犂牛若有歸民以供給之勤耕積粟豐殖闗中逺民聞之必日夜競還又使司隷校尉留治闗中以為之主則諸將日削官民日盛此彊本弱敵之利也彧以白太祖從之三國志本傳魏書曰時闗西諸將外雖懐附内未可信司隷校尉鍾繇求以三千兵入闗外托討張魯内以脅取質任太祖使荀彧問覬覬以為西方諸將皆豎夫崛起無雄天下意厚加爵號得其所志非有大故不憂為變宜為後圖若以兵入闗中當討張魯地險衆强殆難為慮彧以覬議呈太祖太祖初善之而以繇自典其任遂從繇議兵始進闗右大叛太祖親征乃平之太祖悔不從覬議由是益重覬本傳注安按衛覬臣於曹氏應入三國但此係建中事故與鍾繇傳並列漢末魏延字文長義陽人先主遷治成都當得重將以鎮漢中衆論以為必在張飛飛亦以心自許先主乃拔延為督漢中鎮逺將軍領漢中太守一軍盡驚先主大㑹羣臣問曰今委卿以重任卿居之云何延對曰若曹操舉天下而來請為大王拒之偏將十萬之衆至請為大王吞之先主稱善衆咸壯其言建興五年諸葛亮駐漢中更以延督前部八年使延西入羌中與費瑶郭淮戰大破之遷征西大將軍封南鄭侯三國志本傳王平字子均巴西宕渠人建興十二年副車騎將軍吳懿駐漢中領漢中太守十五年代懿督漢中延熙六年拜鎮北大將軍統漢中七年春魏大將軍曹爽率步騎十餘萬向漢川前鋒已在駱谷時漢中守兵不滿三萬諸將大驚或曰今力不足以拒敵當固守漢樂二城比爾間涪軍足得救闗平曰不然漢中去涪千里賊若得闗便為禍也今宜先遣劉䕶軍杜參軍據興勢平為後拒若賊分向黄金平率千人下自臨之比爾間涪軍行至此計之上也惟䕶軍劉敏與平意同即便施行魏軍退還如平本䇿三國志本傳劉敏左䕶軍揚威將軍與鎮北大將軍王平俱鎮漢中魏遣曹爽襲蜀時議者或謂但可守城不出拒敵必自引退敏以為男女布野農榖栖畝若聴敵入則大事去矣遂帥所領與平據興勢多張旗幟彌亘百餘里㑹大將軍費褘從成都至魏軍即退三國志蔣琬傳傅僉義陽人為闗中都督景耀六年臨危授命論者嘉其忠義三國志楊戲傳魏夏侯淵字妙才沛國譙人建安二十一年太祖西征張魯漢中平留淵守漢中即拜淵征西將軍二十三年劉備軍陽平闗淵率諸將拒之相守連年為蜀所襲遂戰死三國志本傳世語曰淵第五子榮字幼權漢中之敗榮年十三左右提之走不肯曰君親在難焉所逃死乃奮劍而戰遂没陣本傳注按夏侯淵守漢中雖建安年間事然與鍾繇衛覬不同故入魏杜襲字子緒潁川定陵人領丞相長史隨太祖到漢中討張魯太祖還留督漢中軍事綏懐開導百姓自樂出徙洛鄴者八萬餘口夏侯淵没襲與張郃郭淮糾攝諸軍事權宜以郃為督以一衆心三軍遂定太祖東還當選留府長史鎮守長安主者所選皆不當太祖令曰釋騏驥而不乘焉皇皇而更索遂以襲為留府長史駐闗中文帝踐阼入為尚書三國志本傳趙儼字伯然陽翟人遷扶風太守太祖徙出故韓遂馬超兵五千餘人使將軍殷署等督領以儼為闗中䕶軍盡統諸軍羌虜數來冦害儼追到新平大破之屯田客吕並據陳倉儼復攻之賊即破滅時被書差千二百兵往助漢中守署督送之儼慮其有變自至斜谷口人人慰勞又深戒署署軍前果叛儼自隨步騎百五十人皆與叛者同部曲或婚姻得此問各不自安儼盡呼所從人喻以成敗慰勵懇切皆不敢有二前到諸營各召料簡諸奸結叛者八百餘人惟取其魁率治之餘一不問乃即相率還降太祖遣將軍劉柱將二千人當須到乃發遣而事露諸營大駭儼宣言當差留新兵之温厚者千人守闗中其餘悉遣東便見主者内諸營兵名籍案累重立差别之留者意定其當去者亦不敢動儼一日盡遣上道因使所留千人分布羅落之東兵尋至乃復脅喻并徙千人令相及共東凡所全致二萬餘口齊王即位以儼監雍涼諸軍事又遷征西將軍都督雍涼正始四年徵為驃騎將軍三國志本傳魏略曰舊故四征有官厨財籍遷轉之際無不因緣而儼义手上車發到灞上忘持其常所服藥雍州聞之乃追送雜藥材數箱儼笑曰人言語殊不易我偶問所服藥耳何用是為耶遂不取本傳注郭淮字伯濟太原陽曲人從征漢中太祖還留征西將軍夏侯淵拒蜀主以淮為淵司馬淵遇害淮收散卒推盪冦將軍張郃為軍主諸營乃定其明日蜀欲渡漢水來攻諸將議衆寡不敵欲依水為陣以拒之淮曰此示弱而不足挫敵不如逺水為陣引而致之半濟而後擊備可破也既陣備疑不渡淮遂堅守以狀聞太祖善之假郃節復以淮為司馬文帝賜爵闗内侯轉鎮西長史又行征羌䕶軍䕶左將軍張郃冠軍將軍楊秋討山賊鄭甘盧水叛人皆破平之闗中始定民得安業黄初元年擢領雍州刺史五年為真太和二年蜀相諸葛亮出祁山遣將軍髙詳屯列栁城淮攻詳破之加建威將軍五年隴右無榖議欲闗中大運淮以威恩撫循羌胡家使出榖平其輸調軍食用足轉揚武將軍青龍二年諸葛亮出斜谷時司馬宣王屯渭南淮䇿亮必爭北原宜先據之遂屯北原蜀兵大至淮逆擊後數日亮盛兵西行淮以為此必攻陽遂耳其夜果攻陽遂有備不得上正始元年蜀將姜維出隴西淮進軍維退遂討羌迷當等按撫柔氐三千餘落拔徙以實闗中遷左將軍梁州休屠胡梁元碧等率種落二千餘家附雍州淮奏請使居安定之髙平為民保障其後因置西川都尉轉拜前將軍領州如故正元二年薨諡曰貞侯三國志本傳陳泰字元伯潁川許昌人嘉平初代郭淮為雍州刺史蜀將姜維率衆依麴山築二城使句安李歆等守之聚羌胡質任等冦逼都郡征西將軍郭淮與泰謀曰麴城雖固去蜀險逺當須運糧羌夷患維勞役必未肯附今圍而取之可不血刃而拔其城淮從泰計使泰率討蜀䕶軍徐質汝南太守鄧艾等進兵圍之安等挑戰不許將士困窘維來救出自牛頭山與泰相對泰曰兵法貴不戰而屈人今絶牛頭維無反道則我之禽也勅諸軍各堅壁勿與戰遣使白淮使淮趣牛頭截其去路可並取維不惟安等而已淮善其䇿率諸軍軍洮水維遁走安等遂䧏淮薨泰代為征西將軍假節都督雍涼諸軍事景元元年薨諡穆侯三國志本傳司馬望字子初為征西將軍持節都督雍涼二州諸軍事在任八年威化明肅先是蜀將姜維屢冦闗中及望至廣設方畧維不得為冦闗中賴之晉書安平獻王孚傳晉司馬駿宣帝子字子臧武帝踐阼遷鎮西大將軍使持節都督雍涼等州諸軍事鎮闗中駿善撫御勸督農桑與士卒分役已及僚佐并將帥兵士等人限田十畝具以表聞詔遣普下州縣使各務農事咸寧初樹機能等叛遣衆討之斬三千餘級進位征西大將軍開府辟召儀同三司徙封扶風王及薨西土泣者盈路百姓為之樹碑長老見碑無不下拜其遺愛如此晉書本傳郄詵字廣基濟隂單父人累遷雍州刺史在任威嚴明斷甚得聲譽卒於官晉書本傳范晷字彦長南陽順陽人為司徒左長史轉馮翊太守甚有政能善於撫綏百姓悦之轉雍州刺史時西土荒毁氐羌蹈藉桑田失收晷傾心化導勸以農桑所部甚賴之元康中卒於官晉書本傳劉沈字道真薊人領雍州刺史張方既逼京師王師屢敗詔沈使發兵襲顒河間王沈奉詔馳檄四境合七郡之衆及防守諸軍塢壁甲士萬餘人以安定太守衛博安定功曹皇甫澹為先登襲長安顒時頓於鄭縣之髙平亭為東軍聲援聞沈兵起還鎮渭城遣督䕶虞䕫逆沈戰敗顒大懼退入長安沈渡渭而壘顒遣兵出鬭輙不利沈乘勝攻之使澹博以精甲五千從長安門入力戰至顒帳下沈軍來遲澹等無繼馮翊太守張輔率衆救顒横擊之大戰於府門博父子皆死之澹被擒不屈見殺沈軍遂敗與麾下百餘人南遁為陳倉令所執沈謂顒曰知己之顧輕在三之節重投袂之日期之必死葅醢之戮甘之如飴辭氣慷慨顒怒鞭之而後腰斬晉書夲傳賈疋字彦度武威人少有志畧器望甚偉厯遷雍州刺史時諸郡饑饉百無一存疋帥戎晉二萬餘人將伐長安劉粲聞之使劉曜劉雅及趙染距疋疋邀擊大敗之曜中流矢退走疋追之至於甘泉旋自渭橋擊蕩仲殺之遂迎秦王奉為皇太子後蕩仲子夫䕶帥羣寇攻之疋敗走夜墮於澗為夫䕶所害疋勇畧有志節以匡復晉室為己任不幸顛墜時人咸痛惜之晉書本傳索綝字巨秀敦煌人舉秀才除好畤令轉長安令在官有稱遷新平太守時劉聰將蘇鐵劉五斗等刼掠三輔除綝安西將軍馮翊太守綝有威恩華戎嚮服賊不敢犯及懐帝䝉塵長安又陷綝與雍州刺史賈疋扶風太守梁綜等糾合義衆頻破賊黨修復舊館遷定宗廟進救新平小大百戰秦王即位是為愍帝綝遷京兆尹晉書索靖傳張光字景武江夏鍾武人北地都尉以百餘人戍馬蘭山北賊圍之百餘日光撫厲將士屢出竒兵擊賊破之㑹梁王肜遣司馬索靖將兵迎光舉軍悲泣遂還長安肜表光處絶圍之地有耿恭之忠宜加甄賞以明奬勸於是擢授新平太守遷材官將軍梁州刺史先是秦州人鄧定等二千餘家饑餓流入漢中保於城固漸為抄盜梁州刺史張殷遣巴西太守張燕討之定窘急偽乞降於燕並餽燕金銀燕喜為之緩師定密結李雄雄遣衆救定燕退定進逼漢中太守杜正冲東奔魏興殷亦棄官遁光不赴州止於魏興乃結諸郡守共謀進取綏撫荒殘百姓悦服於是却鎮漢中時逆賊王如餘黨李運楊武等大盛光嬰城固守自夏迄冬憤激成疾佐吏及百姓咸勸光退據魏興光按劍曰吾受國厚恩不能翦除冦賊何得退還聲絶而卒百姓悲泣逺近傷惜之其後南陽太守應詹白都督王敦稱光在梁州興㣲繼絶威振巴漢值中原傾覆外無救助内闕資儲經年抗禦厲節不撓宜應追論顯贈以慰存亡不從晉書本傳周訪字士達汝南安成人杜曽冦害元帝命訪擊之遂定漢沔以功遷南中郎將督雍州諸軍梁州刺史務農訓卒勤於採納守宰有缺輒補然後言上逺近悦服卒諡曰壯子撫强毅有父風永和初桓温征蜀進督梁州之漢中四郡軍事在州三十餘年卒諡曰襄子楚監梁益二州假節世在梁益甚得物情時梁州刺史司馬勲作逆楚與朱序討平之又隴西人李髙詐稱雄子破涪城梁州刺史楊亮失守楚討平之卒諡曰定子瓊勁烈有將畧代楊亮為梁州刺史初氐人竇衝求降朝廷以為東羌校尉後衝反欲入漢川安定人皇甫釗京兆人周勲等謀納衝瓊密知之收釗勲等斬之晉書本傳陳頵字延思陳國苦人陶侃表為梁州刺史綏懐荒弊甚有威惠晉書本傳南宋劉道産彭城吕人元嘉三年累遷梁南秦二州刺史加都督在州有惠化南史劉康祖傳蕭思話南蘭陵人元嘉九年仇池大饑益梁州豐稔氐帥楊難當冦漢中起思話督梁南秦二州諸軍事梁南秦二州刺史既行遣司馬建威將軍南漢中太守蕭承之前進十年二月遣行參軍王靈濟率偏軍出洋川與承之合賊敗走漢中平悉收没地置戍葭萌水遷鎮南城加節號寧羌將軍太祖使思話上平漢中本末下史官累遷鎮西將軍宋書本傳劉鎮道彭城人元嘉十四年出為梁秦二州刺史氐帥楊難當侵漢中鎮道討破之十九年與裴方明進軍大致克捷難當奔上郡仇池遂平舊志劉秀之字道寳東莞莒人元嘉二十五年除督梁南北秦三州諸軍事梁南秦二州刺史時漢川饑儉境内騷然秀之善於為政躬自儉約先是漢川以絹為貨秀之限令用錢百姓受其利二十七年大舉北伐秀之節度諸軍震蕩汧隴氐賊楊髙為冦秀之討之斬髙兄弟遷益州刺史折留俸禄二百八十萬付梁州鎮庫此外蕭然秀之為治整肅以身率下逺近安悦焉宋書本傳南齊長沙王懿梁武帝兄永明末為梁南秦二州刺史魏軍入漢中圍南鄭懿隨機拒擊乃解圍遁去又遣氐帥楊元秀攻取魏厯城等六戍魏人震懼邊境遂寧南史本傳梁隂子春字㓜文武威姑臧人梁武帝踐阼遷都督梁秦二州刺史子春雖無他才行臨人以廉潔稱南史本傳裴邃字淵明河東聞喜人天監時為北梁秦二州刺史開創屯田數千頃倉廩盈實省息邊運民吏獲安乃相率餉絹千餘匹邃從容曰汝等不應爾吾又不可逆納其絹二匹而已梁書本傳蘭欽字休明中昌魏人幼而果決趫㨗過人大通時密勅欽向魏興經南鄭屬魏将托跋勝冦襄陽除持節督南梁南北秦沙四州諸軍事光烈將軍平西校尉梁南秦二州刺史梁漢底定魏遣都督董紹張獻攻圍南鄭梁州刺史杜懐珤請救欽率所領援之大破紹獻於髙橋城斬首二千餘紹獻奔退追入斜谷斬獲畧盡西魏相宇文泰致馬二千匹請結隣好詔加散騎常侍進號仁威將軍梁書本傳蕭循南蘭陵人為梁秦二州刺史移風易俗人號慈父時蝗害禾循深自咎責忽飛鳥千羣下食蝗盡雍大記李暉成紀人為梁洋州十州總管軍事梁州刺史時渠蓬二州生獠積年侵暴暉至州綏撫並來歸附朝廷璽書勞之舊志北魏薛辯字允白河東汾隂人魏東雍州刺史明元深加器重曰朕委卿西蕃志在闗右卿宜克終良筭與朕為長安主人辯務農教戰恒以數千之衆摧抗赫連氏帝甚褒奬之北史本傳莫雲雁門繁峙人好學善射世祖尅赫連昌詔雲與常山王素留鎮統萬進爵安定公時初并河西人心未一雲撫慰新舊皆得其所卒諡曰敬魏書莫含傳竇瑾字道瑜頓丘衞國人拜使持節都督秦雍二州諸軍事寧西將軍長安鎮將在鎮八年甚著威惠魏書本傳陸俟代人世祖以俟都督秦雍二州諸軍事與髙涼王那擊葢吳於杏城大破之遷内都大官安定盧永劉超等叛世祖以俟威恩被於闗中詔都督秦雍諸軍事鎮長安遂平之魏書本傳樂安王範性沈厚寛仁世祖以長安形勝之地非範莫可任者乃拜範都督五州諸軍事長安鎮都大將範謙恭惠下推心撫綏百姓稱之時秦土新罹冦賊流亡相繼範請崇易簡之治帝納之魏書本傳崔𤣥伯弟徽字元猷河東武城人樂安王範鎮長安世祖以範年少三秦民夷恃險多變乃選忠清舊徳之士與範俱鎮以徽為散騎常侍督雍涇梁秦四州諸軍事平西將軍副將行樂安王傅徽為政務存大體不親小事性好人倫引接賔客或談及平生或講論道義誨誘後進終日不止以疾徵還京師魏書崔元伯傳奚眷代人少有將畧世祖初鎮虎牢尋徙鎮長安世祖幸美稷眷受詔督諸軍討山胡白龍於西河破之魏書本傳司馬楚之字徳秀河内温人宋將裴方明胡崇之冦仇池以楚之為假節與皮豹子等督闗中諸軍從散闗西入擊走方明禽崇之仇池平而還魏書本傳古弼代人拜安西將軍鎮長安甚著威名魏書本傳伊馛代人真君初為東雍州刺史恩化大行百姓思之魏書本傳臨淮王他拜使持節都督雍秦二州諸軍事雍州刺史鎮長安撫綏秦土得民夷之心魏書陽平王熙傳皮豹子漁陽人真君三年劉義隆遣將裴方明等陷仇池世祖徵豹子拜仇池鎮將督闗中諸軍仇池平諸氐復推楊文德為主興安二年正月宋將蕭道成王虬馬光等入漢中别令楊文徳楊頭等率氐羌圍武都豹子將救之至女磊聞賊停車遣人於祁山取馬欲徃赴援文徳謂豹子欲斷其糧運回軍還入覆津據險自固義隆又増兵益將令晉夀白水送糧覆津漢川武興運粟甘泉皆置倉儲豹子表乞選兵増戍詔髙平鎮將茍莫于率突騎二千以赴之道成等乃退魏書本傳張黎雁門平原人世祖加征北大將軍鎮長安清約公平甚著聲稱代下之日家無餘財魏書本傳李惠中山人為雍州刺史加長安鎮大將長於思察雍州㕔事有燕爭巢鬭已累日惠令人掩獲使卒以弱竹彈兩燕既而一去一留惠笑謂吏屬曰此留者自計為巢功重彼去者既經楚痛理無固心羣下服其聰察人有負鹽負薪者同釋重擔息於樹隂二人將行爭一羊皮惠令人置羊皮席上以杖擊之見少鹽屑曰得其實矣使爭者視之負薪者乃伏而就罪凡所究察多如此類由是吏民莫敢欺犯魏書本傳陸真代人髙宗即位遷安西將軍長安鎮將是時初置長虵鎮真率衆築城未訖氐豪仇傉檀等反叛氐民咸應真擊平之卒城長虵而還東平王道符反於長安殺雍州刺史魚元明闗中草草以真為長安鎮將長安兵民素服威信真到撫慰之皆怡然安靜咸陽民趙昌受劉彧署龍驤將軍扇動鄠盩厔二縣據赤谷以叛真與雍州刺史劉邈討平之後鄠縣民王稚兄弟招引趙昌始平石安池陽靈武四縣人皆應之據冶谷堡真與雍州刺史劉邈擊破之斬昌及賊首三千餘級傳首京師并誅其黨與七百餘人雍州民夷莫不震伏在鎮數年甚著威稱延興二年卒歸葬京師諡曰烈魏書本傳京兆王子推太安五年位侍中征南大將軍長安鎮都大將性沈雅善於綏撫秦雍之人服其威惠魏書本傳按子推係元魏宗室京兆乃其王封非京兆人王姓也賈志作王子推京兆人誤源思禮後賜名懐髙宗末出為長安鎮將雍州刺史清儉有惠政善於撫恤刼盗息止流民皆相率來還魏書源賀傳張白澤上谷沮陽人行雍州刺史清心少欲吏民安之魏書張衮傳衍字安樂位梁州刺史轉雍州刺史性清慎所在廉潔不營産業有稱績魏書陽平王新成傳任城王雲景穆帝子髙祖遷使持節都督陜西諸軍事長安鎮都大將雍州刺史雲廉謹自修留心庶獄挫抑豪强羣盗息止州民頌之者千有餘人文明太后嘉之賜帛千匹太和五年薨於州魏書本傳茍頺代人拜洛州刺史為政剛嚴抑强扶弱山蠻畏威不敢為冦魏書本傳李崇字繼長頓丘人髙祖初行梁州刺史巴氐擾動詔崇為荆州刺史鎮上洛勑發陜秦二州兵送崇至治辭曰邊人失和本怨刺史奉詔代之自然易帖但須一宣詔㫖而已不勞發兵自防使懐懼也髙祖從之乃輕將數十騎馳到上洛宣詔綏慰當即帖然尋勅邊戍掠得蕭頤人者悉令還之南人感徳兩境交和無烽燧之警在治四年甚有稱績後車駕南討漢陽崇行梁州刺史氐楊靈珍遣弟婆羅與子雙領步騎萬餘襲破武興與蕭鸞相結詔崇率衆數萬討之崇多設疑兵襲尅武興靈珍走奔漢中以崇為都督梁秦二州諸軍事梁州刺史及靈珍偷據白水崇擊破之靈珍逺遁魏書本傳尉元字茍仁代人太和初出為使持節鎮西大將軍開府統萬鎮都將甚得夷民之心魏書本傳劉藻字彦先廣平易陽人永安中北地諸羌數萬家恃險作亂前後牧守不能制姦暴之徒並無名實朝廷患之以藻為北地太守藻推誠布信諸羌咸來歸附藻書其名籍收其賦税朝廷嘉之遷龍驤將軍雍城鎮將先是氐豪徐成楊黒等驅逐鎮將故以藻代之至鎮擒獲成黒等斬之以徇羣氐震慴在任八年遷離城鎮將太和中改鎮為岐州以藻為岐州刺史車駕南伐與安南將軍元英征漢中頻破賊軍長驅至南鄭垂平梁州奉詔還軍乃不果克魏書本傳賈儁字異隣武威姑臧人為荆州刺史先是上洛置荆州後改為洛州在重山中民不知學儁乃表置學官選聰悟者以教之在州五年清靜寡事吏民亦安魏書賈彞傳燮安定王休子世宗初除華州刺史燮表曰謹惟州治李潤堡雖是少梁舊地晉芮錫壤然胡夷内附遂為戎落城非舊邑先代之名爰自國初䕶羌小戍及改鎮立郡依岳立州因藉倉府未刋名實竊見馮翊古城羌魏兩民之交許洛水陸之際先漢之左輔皇魏之右翼形勝名都實惟西蕃奧府今州之所在豈惟非舊至乃居岡飲澗井谷穢雜升降劬勞往還數里僔沓明昏有虧禮教未若馮翊面華渭包原澤井淺地平樵牧饒廣採材華隂陸運七十伐木龍門順流而下陪削舊雉功省力易人各為己不以為勞昔宋民無井穿井而忻得人况合城無水得水而不家慶竊聞前政刺史非是無意或值兵舉或遇年災緣此契濶稽延至此去嵗已熟秋方大登四境宴安京師無事丁不十錢之費人無八旬之勤損輕益重乞垂昭鑒遂詔曰一勞永逸便可聴移後除幽州刺史魏書安定王休傳崔亮字敬儒清河東武城人世宗除安西將軍雍州刺史城北渭水淺不通船行人艱阻亮謂寮佐曰昔杜預造河梁況此有異長河且魏晉之日亦自有橋吾今決欲營之咸曰水淺不可為浮橋汎長無恒又不可施柱恐難成立亮曰昔秦居咸陽横橋渡渭以像閣道此即以柱為橋今惟慮長柱不可得耳㑹天大雨山水暴至浮出長木數百根藉此為用橋遂成立百姓利之至今猶名崔公橋亮性公清敏於決斷所在並號稱職三輔服其徳政世宗嘉之詔賜衣馬被褥魏書本傳邢巒字洪賔河間鄭人宣武時正尚書梁秦二州行事夏侯道遷以漢中内附詔加巒使持節征梁漢諸軍事進退徵攝得以便宜從事巒至漢中遣兵討之賊皆欵附乘勝追奔至闗城之下詔拜巒使持節梁秦二州刺史於是開地定境東西七百南北千里獲郡四十二部䕶軍及諸縣戍巒至漢中從容風雅接豪右以禮撫細民以惠北史本傳李叔虎渤海蓚人除假節行華州事為吏民所稱魏書本傳奚康生河南洛陽人出為平西將軍華州刺史頗有聲績魏書本傳崔延伯博陵人永平中為岐州刺史假征西將軍正光五年莫折天生下隴東冦詔延伯為使持節征西將軍西道都督討之天生悉衆來戰延伯身先士卒陷其前鋒大破之俘斬十餘萬授右衞將軍延伯善將撫得衆心為諸將之冠末路功名尤重魏書本傳源子雍字靈和西平樂都人肅宗踐阼遷夏州刺史時沃野鎮人破洛汗拔陵首為反亂所在蜂起統萬逆胡與相應接子雍嬰城自守城中糧盡子雍善撫綏得士心人人戮力無有離貳以饑饉轉切留子延伯據守自率羸弱向東夏運糧行數日為朔方胡帥曹阿各拔所邀力屈見執子雍為陳安危禍福之理勸阿各拔令降阿各拔未果而死拔弟桑生竟隨子雍降時北海王顥為大行臺子雍具陳賊可滅之狀顥給子雍兵馬令其先行時東夏合境反叛所在屯結子雍轉鬭而前仍平東夏徵税租粟運於統萬於是二夏漸寧及蕭寳夤為賊所敗賊帥宿勤明逹遣息阿非率衆邀路華州白水被圍逼闗右騷擾咫尺不通遂率士馬并夏州幕義之民攜家席巻鼓行南出生禽康維摩又攻賊帥契官斤於楊氏堡破之復破阿非軍多所斬獲詔遣城陽王徽於潼闗宣㫖慰勞封樂平縣公子雍長子延伯城鬭野戰勇冠三軍子雍向東夏留延伯城守延伯與兵士共分湯菜防固城隍及子雍為胡所執合城憂懼延伯曰吾父吉凶不測方寸焦爛但奉命守城所為處重若以私害公誠孝並闕諸君幸得此心無虧所寄於是衆感其義莫不勵憤朝廷聞而嘉之除龍驤將軍行夏州事卒能固守及後刺史至延伯率領義衆還赴子雍先鋒陷陳身禽維摩及至白水首摧阿非隨子雍至都進爵浮陽伯魏書源賀傳畢祖暉東平須昌人神龜初除右將軍豳州刺史入為平東將軍正光五年豳州民反招引隴賊攻逼州城以祖暉前在州日得民情和復授平西將軍豳州刺史假安西將軍為别將以討之祖暉且戰且前突圍入治孝昌初北海王顥救至城圍始解以全城之勲封新昌縣開國子尋假征鹵將軍行豳州事賊宿勤明達復攻祖暉祖暉兵少糧竭軍援不至為賊所乘遂殁魏書畢衆敬傳張普惠字洪賑常山九門人為尚書右丞先是仇池武興郡氐數反西垂郡戍租運久絶詔普惠以本官為持節西道行臺給秦岐涇華雍豳東秦七州兵武三萬人任其召發送南秦東益二州兵租分付諸戌其所部將統聴於闗西牧守之中隨機召遣軍資板印之屬悉以自隨事訖還朝賜絹布一百段北史本傳劉道斌武邑灌津人世宗時遷岐州刺史有清治之稱正光四年卒於州魏書本傳裴芬之字文馥河東聞喜人轉東秦州刺史在州有清靜之稱徙岐州刺史正光末元志西討隴賊軍敗退守岐州為賊所圍城陷芬之為賊擒送上邽為莫折念生所害贈平東將軍青州刺史魏書裴叔業傳魏蘭根鉅鹿下曲陽人孝昌初轉岐州刺史從行臺蕭寳夤討破宛州俘其民人為奴婢以美女十人嘗蘭根蘭根盡以歸其父兄部内麥多五穗隣州田䑕為災犬牙不入岐境屬秦隴反叛寳夤敗於涇州髙平虜賊逼岐州州城民逼囚蘭根降賊寳夤至雍州收輯散亡兵威復振城民復斬賊刺史推蘭根復任朝廷以蘭根得西土人心加持節假平西將軍都督涇岐東秦南岐四州軍事兼四州行臺尚書北齊書本傳酈道元字善長范陽涿鹿人除御史中尉時雍州刺史蕭寳夤反狀稍露侍中城陽王徽素忌道元因諷朝廷遣為闗右大使寳夤慮道元圖已遣其行臺郎中郭子帙圍道元於隂盤驛亭亭在岡上既被圍穿井十餘丈不得水水盡力屈道元與其弟二子俱被害道元瞑目叱賊厲聲而死事平贈吏部尚書冀州刺史北史本傳張熠字景世南陽西鄂人永安初除平西將軍岐州刺史矜恤貧弱為民所愛魏書本傳董紹字興逺新蔡鮦陽人永安中除梁州刺史假撫軍將軍兼尚書為山南行臺頗有清稱魏書本傳魏子建字敬忠初世祖時平氐遂於武興立鎮尋改為東益州其後鎮將刺史乖失人和羣氐作梗遂為邊患乃除子建東益州刺史子建布以恩信風化大行逺近清靜正光中子建屢求歸京師遣刺史唐永代焉子建將還羣氐慕戀相率斷道主簿楊僧覆先行曉諭諸氐忿曰我留刺史爾送出也子建徐加諭譬旬日方得前行使人贈遺一無所受自開華陽等郡梁州邢巒益州傅豎眼及子建為最魏書魏收自序唐永北海平夀人耿介有將帥才正光中為北地太守當郡别將俄而賊將宿勤明達等冦郡境永擊破之境内稍安永善馭下士人競為之用臨陣常著帛裙襦把角如意以指麾處分辭色自若在北地四年與賊數十戰未嘗敗北時人語曰莫陸梁恐爾逢唐將永所營處至今猶稱唐公壘也大統元年拜東雍州刺史尋加衛將軍卒贈司空北史本傳杜顒字思顔京兆人有幹用孝昌二年為西征軍司行岐州事蕭寳夤起逆顒據州不從以勲封平陽縣開國伯永安中万俟醜奴充斥闗右不行乃為都督防守岐州醜奴攻之不克後為征西將軍没於闗西魏書杜銓傳長孫儉代人本名慶明孝昌中邊方騷動儉初假東夏州防城大都督從爾朱天光破宿勤明達等周文臨夏州深敬器之轉夏州刺史甚得人和時西夏州仍未内屬東魏遣許和為刺史儉以信義招之和乃歸附即以儉為西夏州刺史總統三夏州諸軍事周文表授東南道行臺僕射所部鄭縣令泉璨為百姓所訟推按獲實即大集僚屬於㕔事前引已過肉袒自罰於是屬城肅勵莫敢犯法後卒於夏州總管北史長孫嵩傳雷紹字道宗武川鎮人賀拔岳以紹為京兆太守清平理物甚得人和北史本傳按此在孝武西都之後故京兆太守入節鎮郭琰字神寳京槃人魏孝武時除洛州刺史孝武西入授行臺尚書潼闗大都督齊神武遣大都督竇泰襲𢎞農時琰衆少戰敗乃奔洛州與刺史泉企城守力窮城陷竟為東魏將髙敖曹所擒謂敖曹曰天子之臣乃為賊所執敖曹素聞其名義不殺送并州見神武言色不屈見害北史本傳乙速孤佛保北秀容之人也孝武帝時從入闗大統初梁將蘭欽來冦遂陷漢中佛保時為都督統兵力戰知將敗乃先城未陷仰天大哭曰此馬吾常所乘此弓矢天恩賜我豈可令賊得吾弓馬乎遂斬馬及弓自刎而死三軍莫不壯之黄門郎趙僧慶時使漢中聞乃收其屍致長安天子歎感詔著作録之北史本傳薛長瑜河東汾隂人天平中為洛州刺史擊賊潼闗没於陳魏書薛辯傳王徳字天恩代武川人孝武西遷行東雍州事在州未幾百姓懷之大統元年遷北雍州刺史北史本傳楊儉字景則華隂人孝武初除北雍州刺史政尚寛惠夷夏安之大統七年為都督東雍華二州諸軍事華州刺史卒於家周書楊寛傳韓褒字𢎞業潁川潁陽人大統初為北雍州刺史州帶北山多有盗賊褒密訪之並豪右所為乃悉召傑黠少年素為鄉里患者置為主帥分其地界盗發不獲以故縱論於是諸被署者莫不惶懼皆首伏曰前盗並某等為之所有徒侣皆列其姓名或亡命隠匿者亦悉言所在褒乃取盗名簿藏之因大榜州門曰自知行盗者可急來首即除其罪盡今月不首者顯戮其身籍没妻子以賞前首者旬日之間諸盗咸悉首盡褒取名簿勘之一無差異並原其罪許以自新由是羣盗屏息北史本傳宇文導字菩薩少雄豪有仁惠文帝東征留導為華州刺史及趙青雀于伏徳慕容思慶等作亂導自華州率所部兵擊之擒伏徳斬思慶進屯渭橋㑹太祖軍進爵章武郡公太祖率諸將輔魏太子東征復以導為大都督華東雍二州諸軍事行華州刺史導治兵訓卒得定捍之方及大軍不利東魏軍追至稠桑知闗中有備乃退齊氏稱帝太祖發闗中兵討之拜大將軍大都督三雍二華等二十三州諸軍事屯咸陽導性寛明善於撫御臨事敬慎常若弗及深為吏民所附朝廷以此重之周書本傳崔猷字宣猷博陵人大統時遷京兆尹時婚姻禮嫁聚㑹之辰多舉音樂又㕓里富室衣服奢滛猷請禁斷事並施行恭帝元年周文欲開梁漢舊路乃命猷督儀同劉道通等五人開通車路鑿山堙谷五百餘里至於梁州即以猷為都督梁州刺史周文崩始利沙興等州阻兵為逆信合開楚四州亦叛惟梁州人無二心利州刺史崔士謙請援猷遣兵六千赴之信州糧盡猷送米四千斛於是二鎮獲全北史崔挺傳盧光字景仁范陽涿人大統中歴位京兆郡守郡舍先是數有妖怪前後郡將無敢居者光曰吉凶由人妖不妄作遂入居之未幾光所乗馬忽升㕔事登牀南首而立食器無故自破光不以介懐其精誠守正如此北史盧同傳鄭道邕字孝穆滎陽開封人幼謹厚清約涉厯經史孝武西遷從入闗大統中行岐州刺史在位有能名先是所部百姓久遭離亂逃散殆盡道邕下車之日戸止三千留情撫綏逺近咸至數年之内有四萬家考績為天下最周文賜書嘆美之徵拜京兆尹北史鄭羲傳栁檜字季華解人性剛簡任氣大統中從大將軍王雄討上津魏興平之即除魏興華陽二郡守安康人黄衆寳謀反連結黨與攻圍州城乃相謂曰嘗聞栁府君勇捍其鋒不可當今既在外方為吾徒腹心之疾不如先擊之遂圍檜郡城卑下士衆寡弱又無守禦之備連戰十餘日士卒僅有存者力屈城陷遂為賊所獲既而衆寳等進圍東梁州乃縛檜置城下欲令檜誘説城中檜大呼曰羣賊烏合糧食已罄行即退散各宜勉之衆寳大怒乃臨檜以兵曰速更汝辭檜守節不變遂害之棄屍水中城中人皆為之流涕衆寳解圍之後檜兄子止戈方收檜屍還長安贈東梁州刺史周書本傳宇文深字奴干性鯁正大統中厯東雍州别駕使持節大都督東雍州刺史為政嚴明示民以信抑挫豪右吏民懐之周書宇文測傳北周于謹字思敬河南洛陽人周文帝臨夏州以謹為防城大都督兼夏州長史謹言於周文曰闗右秦漢舊都古稱天府今若據其要害招集英雄足觀時變且天子在洛逼迫羣凶若陳明公之懇誠請都闗右然後挾天子而令諸侯千載一時也太祖大悦㑹有敕追謹為闗内大都督謹因進都闗中之䇿魏帝西遷授北雍州刺史大統十二年率兵鎮潼闗加授華州刺史魏恭帝元年除雍州刺史天和二年授雍州牧三年薨諡曰文謹子實字賔寔天和二年延州蒲川賊郝三郎反攻丹州遣實率衆討平之斬三郎首獲雜畜萬餘頭除延州刺史周書本傳劉亮中山人周文時為東雍州刺史為政清靜百姓安之北史本傳庾信字子山南陽新野人拜洛州刺史信多識舊章為政簡靜吏民安之周書本傳髙琳字季珉其先髙句麗人大統初平西將軍三年從太祖破齊神武於沙苑武成初除延州刺史從豆盧寧討稽胡郝阿保劉桑德等破之周書本傳豆盧寧字永安昌黎徒何人大統中拜北華州刺史在州以廉平著稱加散騎常侍從于謹破稽胡帥劉平伏於上郡武成初為同州刺史復督諸軍討稽胡郝阿保劉桑德等破之軍還遷大司冦保定四年授岐州刺史屬大兵東討輿疾從軍五年薨於同州周書本傳達奚武字成興代人保定三年為同州刺史時屬天旱髙祖勅武祀華岳岳廟舊在山下常所禱祈武謂僚屬曰吾備位三公不能燮理隂陽使盛農之月久絶甘雨忝寄既重憂責實深必須登峯展誠尋其靈奧岳既髙峻人跡罕通武年踰六十將數人攀援得上於是稽首祈請陳百姓懇誠晚不得還即於岳上藉草而宿夢見一白衣人來執武手曰快辛苦甚相嘉尚武驚覺益用祗肅俄而澍雨逺近霑洽髙祖聞之璽書勞武子震字猛畧武平初除華州刺史導民訓俗頗有治方秩滿還朝為百姓所戀周書本傳梁臺字洛都長池人大統十五年拜南夏州刺史保定五年拜鄜州刺史性疏通恕已待物至於治民處政尤以仁愛為心周書本傳宇文慶洛陽人周武帝詔以行軍總管擊延安反寇平之拜延州總管隋書本傳衞元字文昇洛陽人周武帝時攝内史事領京兆尹稱為强濟北史本傳韓果字阿六拔代武川人天和初授華州刺史為政寛簡吏人稱之北史本傳總按周隋並置諸州總管刺史自應在管下而隋書百官志云總管刺史加使持節故並入節鎮陸逞字季明吳郡人天和四年除京兆尹郡界有豕生數子經旬而死其家又有豶遂乳養之諸豚賴之以活時論以逞仁政所致北史陸通傳楊纂廣寧人慷慨有志畧授岐州刺史保定元年除隴州刺史天和六年進柱國大將軍轉華州刺史纂性質樸莅職但推誠信吏人懐之北史本傳宇文椿字乾夀建徳初除岐州刺史四年闗中民饑椿表陳其狀璽書慰勞因令所在開倉賑恤周書本傳梁睿字恃徳安定烏氏人周武帝時歴敷州刺史有恵政隋書本傳王慶字興慶太原祁人保定中厯丹中二州刺史為政嚴肅吏不敢欺大象元年除延州總管周書本傳鄭偉字子直滎陽開封人天和六年轉華州刺史莅職以威猛為政吏人莫敢犯禁盗賊休止周書本傳王世遵為邠州刺史性清約推誠化導百姓樂之賈志隋爾朱敞字乾羅秀容契胡人髙祖受禪拜金州總管號為明肅民吏懼之隋書本傳李和朔方巖綠人少勇敢有識度為州里所推賀拔岳鎮闗中引為帳内都督後從周文累遷夏州刺史保定二年除司憲中大夫尋出為洛州刺史和前在夏州頗留遺惠及有此授商洛父老莫不想望德音和至州以仁恕訓物獄訟簡靜進柱國大將軍開皇元年遷上柱國和立身剛簡老而愈勵二年薨諡曰肅北史本傳梁彦光字修芝安定烏氏人髙祖受禪以為岐州刺史甚有惠政嘉禾連理出於州境開皇二年上幸岐州悦其能賜粟五百斛物三百段御傘一枚未幾又賜錢五萬彦光在岐州數嵗其俗頗質以靜鎮之合境大化奏課連最為天下第一隋書本傳栁機河東解人周宣帝時拜華州刺史髙祖踐祚徵為納言復出為華州刺史前後作牧俱稱寛惠隋書本傳崔𢎞度字摩阿衍博陵安平人開皇初拜華州刺史𢎞度御下嚴急吏人讋氣所在之處令行禁止盗賊屏跡隋書本傳蔡王智積髙祖弟整之子授同州刺史以修謹聞聴政之暇端坐讀書門無私謁有侍讀公孫尚儀山東儒士府佐楊君英蕭徳言並有文學時延於坐所設唯餅果酒纔三酌其簡靜如此開皇二十年徵還京第隋書本傳周羅㬋字公布九江潯陽人厯豳州刺史有能名北史本傳辛彦之隴西狄道人後入闗遂家京兆髙祖時遷洛州刺史有惠政開皇十一年卒官諡曰宣隋書本傳唐劉師立宋州虞城人太宗詔檢校岐州都督上書請討吐谷渾未報即遣使間諭部落多降附者列其地為開橋二州又党項酋拓拔赤辭先附吐谷渾倚險自守亦遣説下之以母喪解岐人表留遂不得赴哀時河西党項破丑氏嘗苦邊又阻新附師立討之軍未至破丑懼遁去唐書本傳長孫祥河南洛陽人無忌從父兄安世子舊唐書長孫無忌傳祥永徽六年為雍州長史奏言鄭白渠為富商大賈競造碾磑堰遏漕水於是遣祥毁之得水田六千餘頃賈志按長史即京兆尹永徽中改見唐書百官志王方翼字仲翔并州祁人永淳初以功遷夏州都督屬牛疫民廢田作方翼為耦耕法張機鍵力省而見功多百姓順賴明年召方翼議西域事引見奉天宫賜食俄而妖賊白鐵余以綏州反詔方翼討之飛檜擊賊火其柵平之封太原郡公唐書本傳婁師徳字崇仁鄭州原武人天授初為檢校豐州都督率士屯田積穀數百萬兵以饒給無轉饟和糴之費武后降書勞之唐書本傳薛季昶絳州龍門人為雍州長史威名甚著前後京尹無及之者冊府元龜張嘉貞猗氏人歴梁州都督政以嚴辦吏下畏之奏事京師元宗善其政數慰勞唐書本傳張暐進京兆尹以幹治稱唐書王琚傳宋璟邢州南和人京兆人權梁山謀逆勅河南尹王怡馳傳往按牢械充滿久未決乃命璟為京兆留守覆其獄初梁山詭稱婚集多假貸欲併坐貸人璟曰婚禮借索大同而狂謀率然非所防億使知而不假是與為反貸者弗知何罪之云平縱數百人白孔六帖張説字道濟洛陽人元宗朝朔方軍大使王晙誅河曲降虜阿思布也九姓同羅拔野固等皆疑懼説持節從輕騎二十直詣其部宿帳下召見酋豪慰安之由是九姓遂安晙後討蘭池叛寇康待賔詔説經畧時党項羌亦連兵攻銀城説將步騎萬人出合河闗擊破之羌胡自相猜夜鬭待賔遁餘衆奔潰説招納党項使復故處副使史獻請盡誅之説不從奏置麟州以安羌衆召拜同中書門下三品明年詔為朔方節度大使親行五城督士馬時慶州方渠降胡康願子反掠牧馬出塞説進討至木槃山擒之俘獲三千乃議徙六州殘胡五萬於唐鄧間空河南朔方地以功賜實封三百户唐書本傳裴耀卿開元初累遷長安令長安舊有配戸和市之法百姓苦之耀卿到官一切令出儲蓄之家預給其直遂無姦僦之弊公私甚便在職二年寛猛得中及去官縣人思詠之二十年冬遷京兆尹明年秋霖雨害稼京城穀貴上將幸東都召耀卿問救人之術耀卿對曰大駕東巡百司扈從太倉及三輔先所積貯且隨見在發重臣分道賑給可支一二年從東都更廣漕運以實闗輔待稍充實車駕西還即事無不濟上深然其言舊唐書本傳佶字𢎞正耀卿孫第進士授藍田尉徳宗詔發畿縣民城奉天嚴郢為京兆政刻急本曹尉韋重規妻乳且疾不敢免佶請代役當時稱其義唐書裴耀卿傳源乾曜臨漳人元宗東幸以京兆尹留守京師治尚寛簡人安之居三年政如始至仗内白鷹因縱失之詔京兆督捕獲於野絓榛死吏懼得罪乾曜曰上仁明不以畜玩寘罪茍其獲戾尹專之遂入自劾失㫖帝不問衆服其知體而善引咎唐書本傳峴吳王恪孫折節下士長於吏治天寳時累遷京兆尹元宗嵗幸温湯甸内巧供億以媚上峴獨無所獻帝異之峴為政得人心時京師米翔貴百姓乃相與謡曰欲粟賤追李峴唐書本傳李叔明字晉閬州人本鮮于氏世為右族兄仲通天寳末為京兆尹叔明擢商州刺史遷京兆尹長安歌曰前尹赫赫具瞻允若後尹熙熙具瞻允斯唐書本傳崔光逺靈昌人累遷京兆少尹𤣥宗西狩詔留光逺為京兆尹西京留守採訪使乘輿已出都人火左藏大盈庫至乗驢入宫殿光逺募官攝府縣斬十數人乃定因偽使其子東見祿山祿山授光逺故官俄而同羅背賊以廐馬二千出奔賊將孫孝哲安神威招之不得官吏驚走獄囚皆逸光逺與長安令蘇震出開逺門使人奔呼曰尹巡門門兵具器仗迎謁至皆斬之募得百餘人遂趨靈武肅宗嘉之拜御史大夫復為京兆尹遣募僑民㑹賊黨剽涇陽椎牛呼飲光逺刺知之率兵夜趨其所使百騎彀滿狙其前驍士合噪賊醉不能師斬其徒二千得馬千俘一部長以獻自是賊常避其鋒扈帝還改禮部尚書乾元初又徙鳳翔尹先是岐隴賊郭愔等掠州縣光逺至諭降之唐書本傳李齊物肅宗乾元中厯鳳翔京兆尹清廉自飭人吏莫敢抵犯冊府元龜劉晏字士安南華人厯隴華三州刺史尋入為京兆尹委府事於司録張羣杜亞綜大體議論號為稱職舊唐書本傳魏少游字少游鉅鹿人四為京兆尹雖無赫赫名然善任人縁飾規檢有足稱者唐書本傳羅珦㑹稽人為奉天令中官出入係道吏縁以犯禁珦榜笞之雖死不置自是屏息再遷京兆尹請减平糴半以常賦充之人賴其利唐書本傳嚴郢字叔敖華隂人及進士第代宗初郭子儀表為闗内河東副元帥府判官行軍司馬子儀鎮邠州檄郢主留務河中士卒不樂戍邠多逃還郢取渠首尸之乃定大厯末拜京兆尹嚴明持法盗賊一衰减隷官匠數百人號稱職宰相楊炎請屯田豐州發闗輔民鑿陵陽渠郢習朔邊病利即奏發闗輔浚渠營田擾而無利炎惡異已諷御史張著劾郢繫金吾長安中日數千人遮建福門訟郢寃帝知之出為費州刺史嵗餘卒唐書本傳白孝徳安西人累功至北庭行營節度使徙邠寧僕固懐恩引吐蕃兵入冦孝德擊敗之永泰初吐蕃回紇圍涇陽郭子儀説回紇約盟吐蕃退走子儀使渾瑊以兵五千出奉天命孝德應之大戰赤沙烽斬獲甚衆唐書李光弼傳渾瑊本鐵勒九姓之渾部善騎射勇常冠軍遷中郎將擢朔方行營兵馬使從郭子儀擊吐蕃邠州留屯邠虜復入至奉天瑊戰漠谷有功周智光反子儀令瑊以步騎萬人下同州智光平以邠寧隷朔方軍瑊屯宜禄大厯七年吐蕃深入與鹽州刺史李國臣趨秦原吐蕃引去瑊邀擊破之悉奪河畧而還領邠州刺史吐蕃入方渠懐安瑊擊走之子儀入朝留知邠寧慶兵馬後務徳宗析所部為三節度以瑊兼綏銀麟勝州節度副大使帝狩奉天瑊率家人子弟以從授行在都虞候京畿渭北節度使朱泚兵薄城治攻具矢石四集王師乗城者皆凍餒瑊但以忠義感率中矢自揠去被血而戰愈勵乗輿狩山南瑊以諸軍衛入谷口遷同平章事兼奉天行營副元帥乃率諸軍趨京師賊韓旻拒武功瑊破之遂屯奉天以西軍收咸陽泚平論功以瑊兼侍中封咸寧郡王唐書本傳髙固字黄芩從渾瑊屯朔方徳宗在奉天固仍從瑊賊突入門固引鋭士長刀殺數十人曳車塞闉賊不能入封渤海郡王貞元十七年邠寧節度使卒邠軍刼固為帥固曰能聴吾言乃可徇曰毋殺人毋肆掠三軍皆悦帝亦念固功乃拜邠寧節度使固本宿將且寛厚人皆安之唐書本傳韓游瓌靈武人始為郭子儀禆將累進邠寧節度留後奉天之狩游瓌以兵三千來赴有詔引軍屯便橋次泥泉與泚兵值游瓌還奉天泚兵躡攻之游瓌殊死戰乃解泚大治戰棚雲橋既而大噪攻南雉游瓌曰是分吾力也趨北雉遣將郭詢郭廷玉以鋭士三百直出火其棚投薪於中風返棚皆燼賊氣沮諸將推游瓌赴難功第一李懐光叛誘游瓌為變游環白發其書帝嘉其誠問計將安出對曰懐光怙亂今邠有張昕靈武有寗景璿河中有吕鳴岳振武有杜從政潼闗有李朝臣渭北有竇覦皆守將也陛下以其衆與地授之罷懐光權而尊以元功諸將仰首各聴其帥彼安能亂帝曰罷懐光而泚益張若何對曰陛下約士以不次之賞今貢賦方至發而酬之其守自固邠有萬精甲臣得將之可以誅賊四方仗義而起賊不足慮帝美其言㑹帝幸梁州游瓌馳入邠説昕無汙不義昕不聽游瓌結其將髙固等殺昕以聞拜邠寧節度使遂㑹渾瑊於奉天扼京西要險破泚兵咸陽京師平帝至自興元論功與瑊等皆第一貞元二年吐蕃圍鹽州刺史杜彦光約與之城吐蕃許之又取銀夏麟等州游瓌請收鹽州以斷戎人走集詔李元諒韓令義率師㑹游瓌收鹽州後還京師卒諡曰襄唐書本傳戴休顔夏州人家世尚武郭子儀引為大將諭平党項羌進封咸寧郡王兼朔方節度副使城邠州功最遷鹽州刺史朱泚反率兵奔問行在與渾瑊等扞禦有勞帝進狩梁洋留守奉天李懐光屯咸陽使人誘之休顔斬其使勒兵自守遷奉天行營節度使合渾瑊兵破泚追至中渭橋京師平又與瑊率兵趨岐陽邀泚殘黨加檢校尚書右僕射唐書本傳尚可孤鮮卑别種上元中自賊所歸使將兵三千屯扶風武功厯十餘年隊伍閑整朱泚之難可孤壁七盤偽將仇敬忠等來冦擊郤之遂收藍田徳宗將遷梁州命引兵守壩上拜神䇿京畿渭南商州節度招討使敬忠拒戰可孤急擊斬之進軍與李晟收長安為先鋒又㑹諸軍進討李懐光次沙苑卒於軍唐書本傳李晟字良器隴右臨洮人興元元年朱泚盜據京城懐光圖為反噬德宗幸山南三月加晟檢校右僕射兼京畿渭北鄜坊丹延節度招討使四月加晟京畿渭北鄜坊商華兵馬副元帥晟於畿甸率聚征賦吏民樂輸守禦益固五月三日引軍抵通化門移書渾瑊駱元光尚可孤尅期進軍城下其月二十五日夜晟自東渭橋移軍於光泰門外米倉村以薄京城晟臨髙指麾令設壕柵以候賊軍俄賊衆大至逼柵求戰晟勒吳詵康英俊史萬頃孟涉等縱兵擊之時華州營在北兵少賊併力攻之晟遣李演孟華以精卒救之中軍鼓譟演力戰大破之乗勝入光泰門再戰又敗之餘衆走入白華二十八日晟大集諸將陳兵於光泰門乃使王佖李演率騎軍史萬頃領步卒直抵苑牆神麚村先是夜使人開苑牆二百餘步至是賊已樹木柵之賊倚柵拒戰晟叱軍士曰安得縱賊如此當先斬公等萬頃懼先登拔柵而入王佖騎軍繼進賊即奔潰獲賊將段誠諌大軍分道並入鼓譟雷動姚令言張庭芝李希蒨猶力捍官軍晟令決勝軍使唐良臣兵馬使趙光銑楊萬榮孟日華等步騎齊進賊軍陣成而屢北戰十餘合乗勝驅蹙至於白華忽有賊騎千餘出於官軍之背晟以麾下百餘騎馳之左右呼曰相公來賊聞之驚潰官軍追斬不可勝計朱泚姚令言張庭芝尚有衆萬人相率遁走晟遣田子竒追之其餘凶黨相率來降是日晟軍入京城乃遣京兆尹李齊運攝長安令陳元衆攝萬年令韋上伋告諭百姓居人安堵秋毫無所犯逺坊居人有經宿方知者七月十三日德宗至自興元晟以戎服謁見於三橋上駐馬勞之製紀功碑刋石立於東渭橋詔以晟兼鳳翔尹鳳翔隴右節度使初帝在奉天鳳翔軍亂殺其帥張鎰立小將李楚琳八月晟至鳳翔理殺張鎰之罪斬王斌等十餘人貞元二年九月吐蕃用尚結贊之計乃大興兵入隴州抵鳳翔無所擄掠晟先令衙將王佖選鋭兵三千設伏於汧陽誡之曰蕃軍過城下勿擊首尾首尾縱敗中軍力全若合勢攻汝必受其弊但俟其前軍已過見五方旗武豹衣則其中軍也突其不意可建竒功佖如晟節度果遇結贊及出奮擊賊皆披靡佖軍不識結贊故結贊僅而獲免舊唐書本傳嚴震字遐聞梓州鹽亭人山南西道節度府表為鳳州刺史母喪解起為興鳳兩州團練使好興利除害劍南黜陟使韋槙狀震治行為山南第一進封鄖國公治鳳十四年號稱清嚴逺邇咨美遷山南西道節度使朱泚反遣穆延光遺書誘之震即斬以聞時奉天危蹙帝欲徙蹕山南震馳表奉迎既至梁州宰相以為地貧無所仰給請幸成都震曰山南密邇畿輔李晟鋭於收復方藉六師為聲援今引而西則諸將顧望責功無期㑹晟表至亦請駐蹕梁洋議遂定然梁漢雖領十五郡賦入纔比東方數大縣自安史後山賊剽掠戸口流散震隨宜勸課鳩歛有法民不煩擾而行在供億具焉車駕將還加檢校尚書左僕射詔改梁州為興元府即用震為尹久之進同中書門下平章事卒諡忠穆唐書本傳崔縱博陵安平人授藍田令徳化大行縣人立碑頌德後德宗出奉天遷京兆尹上言懐光反覆不情宜備之及帝徙梁州追扈不及左右短縱素善懐光殆不來帝曰知縱者朕也非爾輩所及後數日至唐書崔元暐傳杜希全京兆醴泉人以禆將隷郭子儀積功至朔方節度使軍令整嚴士畏其威奉天之狩希全引兵赴難次漠谷為賊邀擊還保邠州賊平遷檢校尚書左僕射靈鹽豐夏節度使封餘姚郡王將即屯獻體要八章砭切政病帝嘉納賜君臣箴一篇尋兼夏綏銀節度都統建言鹽州據要㑹為塞保障自陷於虜靈武勢縣鄜坊單逼為邊深患請復城鹽州乃詔朔方邠寧銀夏鄜坊諸節度合選士三萬五千屯鹽州又敕涇原劍南山南軍深入吐蕃撓其力使不得犯塞執築凡六千人閲二旬畢希全居河西久頗横肆帝數容掩其短卒贈司空唐書本傳邢君牙瀛州樂夀人初李晟以君牙為都將德宗出奉天晟率君牙赴難徙屯渭橋軍中便宜唯君牙得豫晟在鳳翔數行邊常以君牙守晟入朝代為鳳翔觀察使俄領節度檢校尚書右僕射吐蕃嵗犯邊君牙勸耕講戰以為備戎不得侵又城隴州平戎川號永信城卒官贈司空唐書本傳張獻甫陜州河北人李懐光叛吐蕃盗邊獻甫領禁兵戍咸陽累年兵農悦安貞元四年代韓游瓌領邠寧節度使斷山浚塹選巖要地築烽堡請復鹽州及洪門洛原鎮屯兵遣兵馬使魏茪逐吐蕃築鹽夏二城虜衆不敢入冦唐書本傳栁晟河中解人朱泚反從帝至奉天自請入京師説賊黨以攜之帝壯其志得遣泚將郭常張光皆晟雅故晟出密詔陳禍福順逆常奉詔約自拔歸朱既昌告其謀泚捕繫獄晟夜半坎垣毁械亡歸奉天帝見為流涕乗輿還京師累授山南西道節度使府兵討劉闢還未扣城復詔戍梓州軍曹怒謀變晟聞疾驅入勞問曰若等何為成功曰誅驕不受命者晟曰若知劉闢得罪天子而誅之奈何復欲使後人誅若等耶士皆免胄拜從所徙唐書本傳鄭叔則德宗貞元初為京兆尹奏射生神䇿及六軍將士准三月二十一日勅如有闗府縣須其辨對者先具奏聞然後移牒本軍不得懸有追捕伏以浩穰之地姦慝不嘗小失隄防恐難懲肅其婚田常務即請准勅處分其盗賊鬭毆及姦偽等若待奏報恐失罪人請以時追捕具狀申奏從之李克為京兆尹德宗下制百司及府縣有於禁門内諸司追召人鞫問者宜先奏聞於是克奏府縣庶務訐鞫繁細若悉以聞奏既黷天聴且失罪人其賊盗奸犯摴蒱鬭毆誘人妻妾債人財物及相訐告者請仍舊追鞫從之冊府元龜樊澤字安時河中人舉賢良方正上第召對延英殿徳宗歎其論兵與我意合累遷山南東道司馬就拜節度使每射獵諸將憚其材武貞元二年為荆南節度使㑹山南東道嗣曹王臯卒軍亂剽居人以澤威惠著襄漢間復徙山南東道加檢校尚書右僕射十四年卒唐書本傳髙崇文少籍平盧軍貞元中從韓全義鎮長武城治軍有聲吐蕃冦寧州崇文率兵三千往救戰佛堂原大破之全義入朝留知行營節度後務遷長武城都知兵馬使劉闢反俾統左右神䇿麟游奉天諸屯兵討闢闢走追禽之詔同中書門下平章事邠寧慶節度使為京西諸軍都統居邠三年戎備整齊唐書本傳吳湊濮州濮陽人貞元十四年春夏旱穀貴人多流亡京兆尹韓臯以政事不理黜官上召湊面授京兆尹即日令視事湊以勤儉為務人樂其政時宫中選内官買物於市倚勢强買人畏而避之呼為宫市掌賦者多與中貴人交結假借不言其弊湊論之曰宫中所須責臣可辦不必更差中使若以臣外吏不合預聞宫中所須乞選内官年髙謹重者充宫市庶息人間論議又奏掌閑彍騎飛龍内園芙蓉及禁軍諸司等使雜供手力資課太多量宜減省上多從之初府掾吏以湊出自戚藩不諳簿領凡有疑事多候湊將出時方呈湊雖倉卒閲視必指其姦倖之處決斷無毫釐差掾吏非大過不行笞責按問詰責而釋之吏尤惕厲庶務咸舉文敬太子義章公主相繼薨殁上追思葬送頗厚召集工役妨民農務湊候上顧問極言之宗屬門吏以湊論諫太繁恐上厭苦每以簡約規之凑曰上明哲憂勞四海必不以公主太子而忽疲民但人多順㫖不言若再三啓諫必動宸情則生民受賜議者重之以能政兼兵部尚書官街樹缺所司植榆以補之凑曰榆非九衢之玩亟命易之以槐及槐隂成而凑卒人指樹而懐之舊唐書本傳裴玢五世祖糾本王疏勒武德中來朝留不去遂籍京兆玢初事論惟明為傔力從惟明鎮鄜坊署牙將後節度使王栖曜卒中軍將何朝宗作亂玢擒朝宗斬之同州刺史劉公濟領節度擢玢為司馬公濟卒授玢節度使元和三年徙山南西道玢為治嚴稜畏逺權勢不務貢奉疏食布衣取避風雨倉庫充實百姓安之當世將帥未有及者諡曰節唐書本傳顧少連字彞仲蘇州吳人舉進士厯京兆尹政尚寛簡不為灼灼名先是京畿租賦薄厚不能一少連以法均之遷吏部尚書唐書本傳李鄘字建侯江夏人舉進士順宗登極遷京兆尹元和初以京師多盗復選為京兆尹擒姦禁暴威望甚著舊唐書本傳王璠字魯玉元和初舉進士宏辭遷京兆尹自李諒後政條隳斁姦豪寖不戢璠頗修舉有名唐書本傳王播字明􅏡太原人舉賢良方正補盩厔尉善治獄李實為京兆尹表為三原令邑中豪强犯法未嘗輒貸嵗終課最厯京兆尹唐書本傳王播元和五年為京兆尹時禁軍諸鎮布列畿内軍人出入屬鞬佩劍往往盗發難以擒姦播奏請畿内軍鎮將卒出入不得持戎具諸王駙馬權豪之家不得於畿内試鷹犬畋獵之具詔從之於是姦豪弭息冊府元龜李惟簡本范陽内屬奚憲宗時為鳳翔節度使市牛佃具給農嵗増墾數十萬畝唐書本傳韓愈字退之鄧州南陽人唐書本傳為京兆尹六軍不敢犯法私相謂曰是尚欲燒佛骨何可犯耶通鑑崔從字子乂齊州全節人為山南西道節度使長慶初領鄜坊節度屬部多神䇿屯軍數亂法驕横吏不能制從一繩以法下皆畏之党項互市羊馬類先遺帥守從獨不取而厚慰待之羌不敢盗境唐書崔融傳王承元承宗弟有沈謀穆宗詔徙鄜坊丹延節度俄徙鳳翔鳳翔右袤涇原地平少巖險吐蕃數入盗承元據勝地為鄣置守兵千詔號臨汧城府郛左百賈州聚異時為虜剽敓承元版堞繚之人乃告安以功封岐國公唐書本傳劉栖楚為京兆尹峻誅罰不避權豪先是諸惡少竄名北軍凌籍衣冠有罪則逃軍中無敢捕栖楚一切窮治不閲旬宿奸老蠧為斂迹一日軍士乗醉有所凌突諸少年從旁譟曰癡男子不記頭上尹耶唐書本傳栖楚與屬吏言未嘗傷氣嘗謂府縣僚曰諸公各自了本分公事晴天美景任恣意逰賞勿致拘束因話錄李絳字深之系本贊皇元和十年為華州刺史吐突承璀田多在部中主奴擾民絳捕繫之㑹遣五坊使帝戒曰至華宜自戢絳大臣有奏即行法矣州有捕鷂戸嵗責貢限絳以為言并勸止畋獵有詔澤潞太原天威府并罷之文宗立以檢校司空為山南西道節度使四年南蠻冦蜀道詔絳募兵往赴兵還監軍使楊叔元素疾絳遣人迎説曰將收募直而還為民士皆怒譟而入絳方宴不設備遂握節登陴或言縋城可免絳不從牙將王景延力戰殁絳遂遇害募府趙存約薛齊皆死事聞絳贈司徒諡曰貞景延亦贈官唐書本傳温造字簡輿并州祁人興元軍亂殺李絳衆謂造可夷其亂文宗授山南西道節度使許以便宜從事興元將衛志忠張丕李少直自蜀還造喻以意乃以八百人自從五百人為前軍既入前軍呵䕶諸門造至欲大宴視㕔事曰此隘狹不足饗士更徙牙門坐定將卒羅拜勞問畢就坐酒行從軍合卒有覺者欲引去造傳言叱之乃不敢動即問軍中殺絳狀志忠丕夾階立拔劍傳呼曰悉殺之圍兵爭奮皆斬首親殺絳者醢之號令者殊死取百級祭絳三十級祭死事官以功加檢校禮部尚書賜萬縑賞其兵子璋以父䕃累官邠寧節度歴京兆尹璋素强幹豪右慴服同昌公主薨懿宗誅醫無狀者繫親屬三百餘人璋極諫貶唐書温大雅傳孔戢字方舉孔子三十八世孫授京兆尹嵗旱文宗憂甚戢躬祠曲江池一夕大澍帝悦詔兼御史大夫唐書孔巢父傳福襄邑恭王神符五世孫字能之太和中第進士調藍田尉後石當國薦福可任治人時黨項羌震擾議擇儒臣治邊乃授福夏綏銀節度使宣宗臨軒諭遣福以善政聞僖宗初拜山南東道節度使王仙芝冦山南福團練鄉兵邀險須之賊不敢入唐書李石傳附韋長文宗太和末為京兆尹奏准勅天下州府犯輕罪除情狀巨蠧者其他過誤及尋常公事違犯不得鞭背者伏以京師浩穰姦豪所聚終日懲罰牴犯猶多小有寛容即難禁戢若恭守勅㫖則無以肅清若臨事用刑則有違詔命伏望許依前據輕重處置從之冊府元龜張仲方韶州曲江人貞元中進士補金州刺史宦人奪民田仲方三疏申理卒與民直李訓之變召仲方曰有詔可京兆尹時族夷將相髗足旁午仲方皆密使識其尸俄許收葬故胔骸不相亂已而禁軍多撓政仲方不能有所繩刻更以薛元賞代之唐書張九齡傳薛元賞開成初為京兆尹奏京城豪猾素難禁戢自去冬後益恣兇狂假託軍司刼掠坊市伏望自去年十一月後府縣所繇及坊市百姓投名諸軍諸使諸司悉令解還府縣冀得畿内寧止輦下清肅許之冊府元龜元賞㑹昌中拜京兆尹都市多俠少年以黛墨鑱膚誇詭力剽坊閭元寳到府三日收惡少杖死三十餘輩陳諸市餘黨懼爭以火滅其文元賞長吏事能推言時弊禁屯怙勢擾府縣元賞數與爭不少縱由是軍暴折戢百姓賴安唐書本傳王起字舉之太原人擢進士舉賢良方正異等補藍田尉累遷山南東道節度使濵漢塘堰聨屬吏弗完治起至部先修復與民約為水令遂無凶年武宗立擢山南西道節度使同平章事唐書王播傳盧鈞字子和系出范陽徙京兆藍田舉進士中第從李絳為山南府推官調長安尉拜華州刺史闗輔驛馬疲耗鈞為市徤馬率三嵗一易自是無乏事㑹昌中拜山南東道節度使武宗以鈞寛厚能得衆詔兼節度昭義軍大中九年為山南西道節度使鈞居官必有績大抵根仁恕至誠而施於事位將相没而無贏財唐書本傳田牟平州人寛厚明吏治開成初鹽州刺史王宰失羌人之和詔牟代之累鄜坊節度使唐書田𢎞正傳崔珙博陵安平人開成二年六月遷京兆尹是嵗京畿旱珙奏滻水入内者十分量減九分賜貧民溉田從之舊唐書本傳鄭澣鄭州滎陽人餘慶子第進士累進尚書左丞出為山南西道節度使始餘慶在興元創學廬澣嗣完之養生徒風化大行唐書鄭餘慶傳畢諴字存之偃師人黄門監搆從孫舉進士為學士党項擾河西宣宗嘗召訪邊事諴援質古今條破羌狀甚悉帝説拜邠寧節度河西供軍安撫使諴到軍遣吏懐諭之人皆順向時戍兵常苦調饟乏諴募士置屯田嵗收穀三十萬斛以省度支經費詔書嘉美唐書本傳鄭畋字台文系出滎陽為鳳翔隴西節度使募鋭兵五百號疾雷將境中盗不敢發發輒得㑹黄巢陷東都遣兵戍京師以家財勞行妻自絍戎衣給戰士帝出梁洋畋上謁斜谷泣請便宜從事當以死報國畋還士卒繕器械濬城隍以逆順曉諸將刺血以盟中和元年賊將王璠率衆來攻畋設伏以待殺賊二萬級璠遁去畋傳檄天下逺近咸聳各思立功奔問行在巢大懼不敢西謀再進司空兼門下侍郎京城四面行營都統唐書本傳蕭廩字富侯第進士廣明初遷京兆尹田令孜養子有罪捕吏繫獄請救踵門廩不納杖之内外畏讋唐書蕭瑀傳五代牛存節字輦正青州博昌人太祖即位遷鄜州留後同州劉知俊叛奔鳳翔乃遷匡國軍節度使友珪立朱友謙叛附於晉西連鳳翔存節東西受敵同州水鹹而無井友謙與岐兵合圍持久欲以渴疲之存節禱而擇地鑿井八十水皆甘可食友謙卒不能下末帝立加同中書門下平章事五代史本傳徐懐玉為鄜州節度使材氣剛勇臨陣未嘗折退平生金瘡被體有戰將之名冊府元龜懐玉毫州焦夷人少事梁太祖天復四年遷華州觀察留後以兵屯雍州拜保大軍節度使太祖崩朱友謙附於晉襲鄜州執懐玉殺之五代史本傳霍彦威字子重洺州曲周人事梁太祖拜邠寧節度使李茂貞遣梁叛將知俊攻邠州彦威固守踰年每獲知俊兵必縱還之知俊德之後不復攻五代史本傳唐道襲梁山南西道節度使㑹李茂貞冦蜀道襲於青泥嶺以死守之茂貞自是無窺山南之意馬志李從曮深州博野人同光三年拜鳳翔節度使從曮有田千頃竹千畮在鳳翔懼侵民利未嘗省理鳳翔人愛之廢帝起鳳翔將行鳳翔人叩馬乞從曮廢帝入立復以從曮為鳳翔節度使卒五代史李茂貞傳楊彦詢字成章河中賔鼎人拜安國軍節度使天福七年徙鎮鎮國遭嵗大饑為政有惠愛五代史本傳折從阮字可久雲中人唐莊宗以為府州刺史晉出帝與契丹敗盟從阮以兵攻契丹取其城堡十餘遷本州團練使兼領朔州刺史漢髙祖入立於府州建永安軍以從阮為節度使明年以其族朝京師徙鎮武勝厯宣義保義靜難三鎮顯徳二年卒五代史本傳王環鎮州真定人晉開運之亂秦鳳階成入於蜀孟昶以環為鳳州節度使周世宗遣王景向訓攻秦鳳數為環所敗世宗乃決意攻之秦成階相繼降環獨堅守百餘日然後克之世宗召見環嘆曰三州已降環獨堅守吾數以書招之環不答至力屈乃就擒雖不能死亦忠其所事也用之可勸事君者乃拜環右驍衛將軍五代史本傳郭從義其先沙陁部人趙思綰之叛為行營都部署賜戎裝器仗金帶至永興圍其城即以從義為永興軍節度思綰糧盡城中人相食從義繫書矢上射入城中説思綰令降仍表於朝廷許以華州節制隠帝從其計即遣使諭思綰令開門納欵翊日從義具軍容入城憇候館中思綰入謁即令武士執之并其黨三百餘人悉斬於市宋史本傳陜西通志巻五十
