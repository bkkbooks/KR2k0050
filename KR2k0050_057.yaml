諭諸賊以逆順利害賊皆羅拜聽命遂招降之翰等督撫特疏奬薦十五年擢守鳳陽尋卒所著丹垠文集皆其弟燦所輯也燦字星公祚永季子順治乙亥進士由翰林改授刑曹矜全甚衆奉使安南宣布天朝徳意封祭悉協典制及還記其山川風俗以獻出守南康設救生船以拯覆溺修白鹿洞書院聚徒講學多所成就督學巴蜀甄拔孤寒一時賞識皆知名士獲雋者尤衆又奏請土司子弟亦令照例入學著有願學堂集李承尹三原人崇禎癸未進士初督三楚學政綽有師表及備兵沔上尤多恵政沔故有歳納官柴後業戸逃竄遺患比鄰承尹判田還里永蠲其征城東有蓮池舊納魚課遺累網戸承尹立碑蠲税一方以寧姚廷璉字華商膚施縣人貢生六歳失怙事母以孝任東平州倅攝州篆年餘勸農興學鋤奸除暴民賴以安境内有伏莽躬擐介胄殲之盜遂息當遷秩以請蠲浮費言過激忤上官遂罷歸㑹庚辰辛巳歳大饑罄資以貸貧者明年當償盡出其劵焚之順治己丑王永强叛陷延安大兵進討廷璉從行間督轉輸宼平以功委知保安縣請除浮丁蘇民困邑人尸祝焉陳安國字斗坦沔縣人生員國初以僉事監軍四川巨宼攻保寧甚急安國詣西安乞兵總督孟喬芳應之圍遂解時姚黄賊衆數萬方猖獗安國招降之當事忌其功誣下獄未幾事得白陞井陘道境有鹵地産鹽安國請開局便民至今利賴尋以專擅去官㑹言者白其罪補九江道屬邑多荒糧安國力請減免以數萬計百姓徳之致仕歸修黄金峽險道三百里建連雲棧圮壊橋梁數十處土人立碑記其事劉培陽字敬錫三原人順治乙酉舉人授建徳令時劇盜李布嘯聚培陽至審形勢設方畧甫三月盜平政聲大著補直𨽻南和澧水溢沒田千畝培陽築堤捍禦人名其堤為劉公堤立祠尸祝焉王繼祐字植三富平人順治乙酉舉於鄉授鎮平令不以繁苛擾民郡城協濟夫馬舊例徵折貯庫恆苦不支繼祐因事撙節遂多餘息河東鹽課計口銷引南陽丁浮於課鎮平課浮於丁繼祐力請當事裒益得平有捕官誤收偽引事覺吏白𣲖補里甲繼祐不許獨捐俸助之鹽使為疏其事於朝後乞歸子象天順治丁亥進士令臨漳多善政繼擢太僕寺丞疏陳臨漳三害一協濟宜恤一經界宜明一優免宜均俱報可漳民三累遂除厯湖廣學道以廉明著郭嶷然字因之朝邑人順治乙酉舉人由交城教諭遷閩清令鄉試分校府推官以千金屬其私人執不可以憂歸補靖江瀕海多盜守禦有方盜逼城下登陴諭以大義即引退再補昭化有女子為盜主交通甚廣前令莅任皆先往致敬嶷然至吏以故事白怒斥之亡何女子來謁偉岸桀黠不可馭嶷然叱捕下獄須臾訟者盈堦欵証皆實立斃之其黨震散撫御殘黎以清白自矢地産塊金俗呼狗頭金有獻者悉却之解官後囊無長物楊在陛字台卿三原人順治丙戌進士任河南扶搆令扶搆地瘠民流在陛諭令復業三年始算緡行折畝法給以牛種又請免河夫四十名由是田塍盡闢增賦七千石有奇大盜張元錫等倡亂請於中丞擒而磔之時有劉司馬者為僕劉馨所訐遂被逮在陛曰以僕訐主不可訓也直之馨嗾其黨將為亂在陛因立寘於理邑民乃安韓文富平人順治丙戌舉人授文安令邑居畿南下流水潦西注賴河堤為固文莅任堤潰歳大祲文捐俸易粟民無失所城東土寇猖獗文親率鄉兵捕誅賊首境内以寧又文邑旗民雜處爭訟日滋文常單騎遍厯莊屯多方開諭俗用丕變王承祖字貽雲渭南人順治丙戌領鄉薦除晉江令捍禦海寇城賴安全邑瀕海有大鎮最稱饒沃利其有者誣鎮民與賊通欲屠之承祖力辨於大帥事遂寢尋擢兵部主事遷郎中累陞工部侍郎告歸值歳饑承祖罄所有賑濟全活甚衆及歿鄉人思其徳立祠祀焉李振麟韓城人順治丙戌舉人初令臨武臨邑自賊首曹戇子盤踞積年人民蕩析城中茅舍百間盡屬兵營振麟多方招撫逃亡稍集臨舊有二十四里兵燹後流移過半丁糧不均振麟力請於上官編為十二里侵隠之弊一清邑境與粤東接壤逼近猺峝振麟練鄉勇八百人立練總四名統之扼要設守諸猺不敢犯界考績擢中書舍人以母老乞歸母夀九十八振麟孺慕終身劉璽字爾符朝邑人順治丁亥進士除烏程令邑附郭素煩劇璽釐剔奸弊豪强懾伏漕糧立倒厫法他縣多倣之擒治太湖巨盜親搏戰水上獲渠魁白花蛇沈三斃於獄羣盜震懾逺遁㑹長興歸安同時缺令兩縣民爭求璽署縣事歸民先得璽肩輿去臺司感其事遂允之以憂歸因錢糧磨勘謫四川按察司照磨署通江簡州皆有恵政生平多著述有鐮山集若干巻子峒崡峒字星柱康熙戊午舉人辛未壬申間歳大祲邑令諱災峒力請臺司簡牘累上㑹命大臣勘賑峒具呈朝邑災狀乃得賑全活無算崡己卯舉人有文名米襄蒲城人順治丁亥進士初授邢臺令邢故有水泉漫漶日久民未獲利襄至即度地開渠以資灌溉西山袤延數百里羣盜盤踞四出剽掠襄訓練鄉勇親勦賊巢渠魁授首民患以息内擢臺員旋出按江西甫入境有郡守暮夜餽金襄拒不受廉得其貪汚實蹟即劾罷之他如興屯政設江防奏豁荒欠審結厯年讞案嚴禁開採皆有禆實政視事一年外艱歸服闋檄取補官以母老乞終養遂不復起張重齡字九如涇陽人順治戊子舉於鄉十二年授直𨽻邢臺令重農息訟除積弊雪寃獄政績茂著報最補工部都水司主事奉命督通昌草場督寶源錢局又出督臨清税務兼攝倉儲錢法裕國通商措施悉當大司空重其才㑹河決淮安遴員協理以重齡名上先是南北河決塞不常中河一役九載未就尤稱危險重齡至遂奏績復命後以積瘁成疾給假歸卒子鼎梅康熙丁丑進士劉矩宗字仲旋渭南人順治戊子舉人授溫州司李方海孽未靖人心反側矩宗開誠撫納歸降日衆鎮以安靜有犯者執法不少貸民畏而懐之海濵地久蕪矩宗親行勘視免其虚税更築長堤以資蓄洩開東甌括婺諸驛路行旅便之卒於官王帷籌華州人順治戊子解元先是逆變起帷籌負母入山備厯艱苦康熙四年授祁縣令創義學講書課藝無虚日祁水舊為豪强所據帷籌責令毁壩俾無壅塞資民灌溉農事畢婦子攜羊酒祝之并立祠祀焉五子俱成名焦勤武功人順治戊子舉人初宰臨桂息事寧人循聲大起擢刑曹治獄明允㑹召問粤中利弊條對明晰仍奉命恤刑西粤全活甚衆尋兵備井陘值歳旱率屬終日跽赤日中甘雨立沛人以為精誠所感罷歸後母卒過哀成疾仍晨昏侍父所分析田舍盡以膏腴讓弟雖俸餘亦不已私父國鼎少年時自書院晚歸途遇一女私奔毅然却之蓋義方特著云朱廷璟字山輝富平人前兵部侍郎國棟子闖逆據西安多械致士大夫攫其金廷璟被執俄賊敗得免順治乙丑成進士改庶吉士累遷登萊副使時登兵以缺餉謀作亂守白其狀欲捕之廷璟曰是速亂也不可閲庫金與缺額相當立召諸弁唱給之餉至仍如數納庫中軍無譁者海寇陷𤓰儀圍江寧聲言將分兵突山左一日夜候騎數十至將吏皆失色廷璟但宻增沿海戍守舉止自如逋寇于七勢甚熾廷璟至即蒲伏聽約束廷璟諭遣之語人曰賊子瞻顧非常宜漸除之㑹陞河南參政去後果亂海上未幾廷璟以憂歸再補左江遂致仕林居後絶口不談世事性好古遇鼎彞書畫輒摩娑不去手人以是覘其風度王孫蔚字茂衍臨潼人與叔元衡元士同登順治壬辰進士由刑曹厯官湖廣按察福建布政以公事左遷備兵川東視學楚省未幾歿於任蔚少有神童之譽弱冠舉鄉試第二尤長於吏事在刑曹都下有玉銘錢穀茂衍刑名之謡玉銘者王大司農𢎞祚也任楚臬時值軍興羽書旁午臺府倚重一時綰五篆手握朱墨二筆判事如風雨諸司掾持案沓進目覽口誦悉皆贍舉詩才亦婉麗成一家著有軺香集子天寵登賢書蕭恆字月如三原人順治壬辰進士授安福令邑田水衝沙壅多虚糧恆力請直指題減糧額千餘石至今賴之遷卬州知州侯于唐字賡明三原人父達先有隠徳嘗歳荒代鄉人輸賦千金請於官取逋賦册悉焚之曰吾安敢重煩大令為吾追逋乎于唐登順治壬辰進士由庶常擢御史終養歸再起巡鹽巡漕奉詔以敬慎剛方褒之居鄉葺學宫築白渠堤民賴其利祀鄉賢張好奇字知天朝邑人順治壬辰進士初知鞏縣念河濵灘地起科時遭衝沒遺税病民力請每三年一勘丈以地有無為存豁鞏人徳之尤慎刑獄擢刑部主事矜全為多厯官河南學政索景藻字二因蒲城人順治壬辰進士邃易學性尤謙謹生平不道人短嘗之田見人有盜刈其麥者遽避之任樂平知縣初任時盜賊充斥景藻不加刑戮諭以大義期年而境内大靖舊賦逋額累萬景藻曲為勸諭不三月輸納一清以勤勞得疾卒於任士民哭奠日數千人祀名宦習全史同官人順治壬辰進士初令涇縣補内江有聲陞杭州府同知善聽訟漁臨關有奸宄與關蠧交通害政甫下車即行剖禁諸暨某持兩脛足屢控不止全史曰此必暮夜行竊為主人所折顧以誣人可乎立投於江某驚服訟始息後卒官貧無以殮制府李率泰為歸其櫬楊端本潼關人順治乙未進士授臨淄知縣開淄西龍首渠民享其利廉明仁恕輿頌歸之性孝侍親疾湯藥必親嘗處鄉里謙厚敦睦性好施濟親黨中貧不能舉喪者捐金助之石之玟甘泉人順治戊戌進士厯睢寧桃源知縣有恵政二邑皆濵河河臣靳輔方鳩工未集㑹翠華南幸引見之玫有老成勤慎諳練河務之褒守令以下咸榮之尋擢福州知府王又旦字幼華郃陽人順治戊戌進士授潛江令潛賦役偏重又旦摘發隠漏逃亡返業潛地居襄樊下流漢水厯安陸下大别每夏秋水漲為患又旦勸民趨事長堤屹然迄今無恙甲寅滇逆告變大軍駐荆襄潛當孔道羽騎絡繹徭役芻茭應時立辦擢給事中厯吏戸二垣尋典廣東鄉試還過花山建議設縣置官以成控扼之勢盜藪一清有黄湄詩集十巻行世牛光斗中部人方流孽未靖仇家搆陷其父以通賊繫獄光斗度勢不能脱即詣軍前請於帥求以身貸㑹烈日中忽大雨雹帥廉其寃釋之順治戊戌成進士官諸暨令減耗羨懲刁悍邑有機戸三百家例供織造使者様紬一疋光斗申請革除坐强項落職百姓咸詣臺司訟寃奉㫖復任尋丁内艱歸年七十九卒李光宸字君沃三原人少有逺志多大畧逆藩變作制府哈占重其才延之幕下一切機務咸諮之㑹蒲城令以民叛告制府將屠之光宸以為未叛制府按之果誣始得寢十八年占奉命與奮威將軍王進寶勇畧將軍趙良棟謀分道取蜀議未決光宸進曰逆無能為也湖南特下流地今退屯衡州所用皆親屬猜嫌易起大兵乗之如拉朽耳進寶良棟大奇之令從軍入蜀即舉為廣元令廣元久經兵燹人無固志有訛傳逆黨譚𢎞復叛者光宸晝夜戎服行城上語民曰我縣令也賊來我以身當之汝曹無恐人心始定先是保寧兵餉悉由廣元陸運光宸曰盍以舟運出昭化力請於制府從之公私俱利以内艱歸服闋補金堂初金堂與新繁諸邑並以清白江為蓄洩年久渠壊光宸詳視地勢復開新渠於是灌溉如舊光宸性明決而資復愷悌故所至有恵澤劉元勲咸陽人順治己亥進士七齡失怙哀戚如成人登第後讀書中秘以祖母年髙求得終養祖母卒宦遊所厯必奉母偕行及卒哀毁踰禮服闋分巡淮徐改山西糧驛道嚴禁官馬累民委賑大同無冐無偏發粟處有槐一章民懐其徳號為劉公槐尋致仕歸逢歳祲周給里黨兼為族人輸舊税親疎感之董元俊華州人順治己亥進士事親至孝初任黄岡知縣繼補句容除積弊二十條興額外利七事歳荒捐俸賑濟邑有虎患獵捕不得元俊宿廟䖍禱虎遂遁跡致仕後引掖後進周恤宗黨厯久不倦李𢎞橒字元文三原人由恩貢授永州府通判擢知桂陽州桂陽新遭兵燹橒勞來安輯凋敝頓起時大兵進取滇黔轉輸不給橒繪圖上陳請寛民力竟左遷去桂人籲留不得勒碑以志去思居家施予不倦濬河築梁倡始捐助里人皆沐其澤子彦瑁彦彦瑁字輯五康熙丁未進士值三藩變彦瑁參軍秦蜀以功擢肇慶府知府撫綏釐剔政聲大著再補黄州守卒祀名宦彦字重五從學李顒黙契儒先宗㫖每無事輒靜坐認取未發氣象丁卯登賢書官中翰聞兄訃哀痛幾絶尋卒耿獻忠字伯良武功人貢生順治初分巡閩中適海氛未靖將士俘獲不辨玉石獻忠詣臺司力爭得訊釋數千人遷廣東左布政使時武弁驕横士夫多被摧折部使者重獻忠名悉聽裁決粤東巨族多賴以寧姬琨字雪石華州人贈太僕文引子以難廕入成均厯官戸部主事督昌平糧儲㑹計如額擢户部郎中又出為榆林糧儲時榆林兵乏食琨先事籌畫兵賴以安奏請創立鼓鑄泉貨流通利垂永久復𣙜江南蘆政兵燹後民多流亡琨招集勸諭田廬如舊課亦無缺遷保定巡道盜賊一清又遷衡永道却餽除奸實政茂著嘗登衡山西望慨然有歸休志即去官歸任璣字公義涇陽人少力學工文順治辛丑進士筮仕滕令滕邑自明季流亡保甲盡廢璣畫境為八卦保置長鄉設約其東界連山宻箐中多伏莽璣擒斬首惡餘令歸農其南界接境徐碭距縣治逺踰數百里民抗不輸賦璣開誠勸諭化為淳良復以户口版籍無憑力請編審自此欺隠都絶賦無逋額先是河臣令璣督浚八閘河道如期告竣擢兖州府倅分司泇河尋改運河同知運河自黄淮以上灌輸恃七十二泉璣遍厯相視疏源滌流糧艘無阻又築漕河東堤泗河西堤以扞水患時奸民請築南旺西湖以擅水利璣謂汶河秋漲賴此洩水築之則八斗必塞運道將梗事遂寢遷長蘆運使建議引鹽積滯必通銷於引鹽不至之地其産鹽州縣例不食官鹽者奸商坐引至數千計悉請罷於是商力漸甦鹽課無損陞直𨽻守道以良鄉旗民經界未正奉㫖勘驗溽暑積勞竟得疾歸卒張召南字仲文朝邑人順治辛丑進士知安福縣民俗愚戇不供役召南單騎往諭以大義咸感泣輸賦邑境南接茶永西連沙攸康熙十三年永寇楚逆俱蠢動賊將取徑安福兵萬餘薄城下城遂陷召南赴制府請兵以復其城時議分滿兵駐安福召南力陳不可乃止是年秋召南方在省賊突至城復陷召南馳歸集鄉勇攻城賊疑大兵至踰山而遁遂復安福凡招撫賊將五十七員難民萬餘人因勸諭開墾散給牛種得田二千餘頃擢中書舍人衞秦翰韓城人順治辛丑進士少孤育於伯父景瑗景瑗死闖難兵燹相仍旦暮不給秦翰閉户力學成進士後猶莊誦如諸生時授靈夀令民田水衝沙壓戸口逃亡逋賦無著前令率被劾去秦翰至遍閲災地詳詢疾苦請令祗納本年正賦巡撫惡其擅將劾之檄太守親勘勒令開征秦翰不奉令太守怒杖吏且荷校以脅之秦翰曰不開征一吏死開征則百姓死矣言詞剴切太守亦心動秦翰又繪圖謁巡撫備陳流離狀哀懇不已巡撫惻然入告永豁地糧二千六百有奇自此歳豐民樂邑無逋賦遷中書科中書二十八年擢禮部主事厯郎中尋出知龍安府下車即革里民供應陋例在任九年鎮撫苗獠結以恩信所𨽻三十一司皆輯服以年老致仕歸數百里中多泣送者陳嘉績三原人康熙癸卯舉人授濬縣令以風化為己任作合律聖諭解刋書遍給勸懲並用民風大洽又悉除絶户女丁錢孤寡咸額手相慶再補澄海因邑居海濵招集鄉勇嚴飭守望有海寇千餘乗夜薄城嘉績率衆登陴矢石雨下賊大潰邑以無恙事聞擢御史厯掌河南道法司鞫獄凡夾訊者或至日昃散署始釋嘉績語法司宜共體欽恤至意令得供即釋洊陞大理寺少卿扈從蹕西巡過濬士民擁道爭願識舊尹陳公面未幾乞歸先是嘉績父諸生堯道潛心醫學製方奇效所著有傷寒辨證痘疹辨證二書嘉績校定付梓以竟前人之志焉趙璠麟遊人由恩貢判景州佐理有聲擢興化令省催科重農桑民貧不能耕者貸給牛種俾無失業值歳荒發粟賑濟多所全活邑地居淮河下流每歳工作枝帚悉賦於民璠令河壖遍植栁葦以備修築之用省費無算未幾致仕歸尤敦孝友任恤之誼梁鳳翔咸寧人康熙癸丑進士性純孝少失怙善事孀母母疾日夜籲天願以身代母疾遂愈二十五年授孝感令履畝均賦積弊一清壬申癸酉間秦楚洊饑鳳翔捐俸勸賑多所全活擢潞安太守革除漏巵勒石永禁期年政成以足疾乞歸潞人懐之郭毓秀字鍾山耀州人舉人知贛縣事康熙甲寅閩粤之變大兵多道贛有蜚語謂玉田村民通逆主兵者謀殲之毓秀言於撫臣佟國楨鎮臣哲爾肯曰國初兵寇交訌贛四境蕭索獨田村鷺谿一二井里能自保聚遂致蕃庶遽以大逆誣之非恵養元元意也國楨爾肯皆然之毓秀即馳入田村令毁其壘村民供輸芻糗倍於他所遂得保全邑人至今述其事猶有墮淚者劉蔭樞字相斗韓城人康熙丙辰進士性至孝事親先意承志視羣從如同懐值歳饑盜起里黨多不給為貸粟賑荒築堡以守大河自縣東北南出龍門山中兩岸絶壁鈎挽莫施蔭樞冶鐵為柱索舟縁以進又築澽水石橋修柿谷坡及城中通衢行者便焉初任蘭陽報最入諌垣章數十上如論秦豫兩省事宜及楚省均糧事皆關大計悉報可旋出分巡贛南除私收門税又米市有牙帖銀協濟定南蔭樞計歳入置田以租充額牙税永除癸未駕幸西安時蔭樞家居因迎覲潼關即擢雲南按察使進布政使滇海秋漲為害請疏之兼建六河岸閘蓄洩有備尋撫黔甫至釋苗狆之淹繫者數百人㑹烏䝉威寧土苗搆難命滇蜀黔督撫提臣於畢節㑹勘蔭樞至傳檄召之諸苗素服蔭樞恩信率衆偕來蔭樞諭以聖朝徳威諸苗帖服遂釋去五十四年西鄙出師蔭樞奉㫖馳赴巴爾坤周閲軍營既復命仍撫黔未幾奉㫖屯田塞下厯三年召還京師六十一年與千叟宴雍正初皇上篤念老成賜金歸里年八十七卒所著有周易蓄疑春秋蓄疑梧垣奏議宜夏軒雜著行於世劉曾字魯如臨潼人父秉攜邃易學有學易寤言八巻曾生而頴異弱冠即從李顒講學康熙己未成進士授漵浦知縣漵浦山深地僻糧役不均曾履畝親丈官無遺利地有餘力事竣湖南撫臣下其册於所屬俾為式三載擢吏部主事遷員外有墨吏以千金為夀曾笑曰劉曾豈受暮夜金者耶正色却之再遷郎中補貴陽知府黔地多苗狆家尤稱獷悍時竊出行刼黔民亦時誘其幼弱者鬻於鄰境曾為捕奸民畧販者得數十人正其罪所得苗子女悉還之有不知所自者令郡民無子女者撫之苗狆聞而感泣不復行刼郡倉歳贏米百石曾令别貯一倉春秋時有耕穫不給者補助之郡大治㑹考最得俞㫖賜蟒服旌勞擢雲南驛鹽道尋陞按察使五十六年致仕歸史流芳華州人康熙壬戌進士授廣東臨髙令臨積逋八萬有奇流芳先核逃亡户口每歳征止三千餘金復履畝丈量分别荒熟請豁者十之七於是招集流民捐給牛種課農興學邑人頌之流芳父母早亡終身哀慕兄客死肅州徒步三千里扶櫬而歸撫兄女如已出為之擇配凡從子弟之孤者悉為婚嫁幼時經師卒為營喪葬無缺少貧苦冬夜讀書嘗置足草籠中成名後猶手不釋巻博通淹雅教授生徒出其門者多知名士陳朝君韓城人康熙壬戌進士事母至孝與兄弟叔姪三世同居友愛甚篤初令䝉陰重學校嚴保甲革行户蠶税設催科紙皁吏民安之朝君聽訟明決嘗於省㑹一日審結十大案臺司皆器重之擢户部主事外省奏銷例有私餽盡斥之遷刑曹多所平反視學中州號稱得士趙隆𦙍膚施縣人拔貢生授固始令多恵政上官議加賦隆𦙍固爭之不得以憂卒上官感悟寢其事時有固始一官死汝寧萬姓活之謡党光前膚施人事繼母以孝聞由拔貢除徳平令政尚慈恵讞獄尤詳慎曰蒼鷹乳虎為世所痛吾忍蹈之乎徳平旗逃多所株連光前發摘甚神不能誣枉保全甚衆後以病卒於官櫬歸士民執紼泣送數百里焦映漢武功人太學生初為巴縣令值譚𢎞等復叛巴人震恐映漢募鄉勇捍禦全城以卓異薦厯刑部員外郎中尋出守平樂調慶逺大中丞彭鵬每歎賞其才晉雷瓊巡道映漢宣揚聖諭導民向化明丘文莊海忠介瓊産也風節冠一鄉而遺文散佚因重刋為粤人倡及司臬江蘇㑹總督與巡撫張伯行不協並誣劾映漢聖祖察其寃復原職改任廣西卒王承烈字遜功涇陽人康熙乙酉以五經發解己丑成進士選庶吉士授檢討雍正初轉監察御史巡視東北兩城時有巨猾倚宦勢為奸謀陷富賈吞其貲承烈搜捕之寘於理輦下肅然嘗召對養心殿講大學明明徳章稱㫖賞賚甚渥次年以諌垣督湖北漕從民請就便南兑省運費數千緡旗丁撥運則以保甲法聯之軍民帖服報最擢江西布政使司署故有通吏二人擅竊威柄承烈斥弗用鈎考振作諸弊一清累陞刑部侍郎遘疾猶勉力視事卒之夜有慈烏數千繞室賜祭葬有加禮云所著有日省録毛詩解尚書今文解諸書陜西通志巻五十七下
