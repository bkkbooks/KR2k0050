body:
  text: 陜西通志巻五十七上人物三廉能明潘友直字孟舉澄城人洪武初由茂材舉從太祖克陳友諒屢畫奇䇿陞工部尚書所至輒有聲績習儉服勤終始一節後乞骸骨朝廷寵賜金帛歸邸悉賞軍士同妻驅驢而歸行李蕭然惟圖書數巻而已賈志柳申漢中人洪武初拜大名太守為政務推經術尚徳緩刑郡人至今首稱之畿輔志齊原芳乾州人洪武初為郾城縣丞元末兵燹民皆竄徙原芳繕城邑修室廬勸農桑通商賈流民聞風歸附邑以富庶河南通志張紞字昭季富平人父月川文行知名紞才識通敏洪武間由明經舉厯雲南右參政晉左布政使凡雲南土地貢賦法令條格悉經裁定洪武三十年入覲考最為天下第一張芹備遺録建文即位召紞為吏部尚書時旁求遺逸會集闕下紞鑒識精絶用當其才試編修實録官得楊士奇奏為第一靖難兵起録朝中奸臣二十八人紞與其數赦為尚書如故上簡建文羣臣因解職務月給半俸居京師紞退自經名山藏呉偉南鄭人領洪武甲子鄉薦知茂州多善政羌人懐服累官四川左布政使明一統志李昶字文涇陽人自少敦重孝友刻志向學領洪武丙子鄉薦厯官至户部尚書凡儲蓄貢輸戸税增損金帛出納皆調度規畫有法所得不少留頒賜姻族比卒家無餘貲雍大記李暹長安人洪武中舉於鄉永樂初授戸部主事使西域踰萬里至撒罕馬兒凡五往返不辱君命遍厯諸國皆能得其懽心朝廷嘉之厯仕戸部侍郎後又有髙引先者亦長安人由進士官行人使朝鮮及境有使來迎稱曰館伴引先改為迎候得上國體歸朝授御史巡方所至發奸摘伏若神終四川參議賈志張毅安塞人洪武間以人才任廬州知府不挈妻孥止以一僕自隨布衣糲飯人不堪其苦毅處之裕如其清介近世罕有延安府志李著郿縣人太學生洪武中任御史明清有為勤慎自持吏民無不服賈志甄儀麟遊人舉人初任主事厯順天府尹兵部左侍郎清白之操始終不渝孫希賢官御史按雲南河南揚清激濁風裁卓然陞知府未任卒馬志周道朝邑人以舉人官御史征雲南時總兵餽貨寶幾千金道一無所受時稱其廉擢山西參政有恵政卒於官喪出民遮道哭奠三日不得行朝邑志馮進藍田人以人才授貴州道監察御史巡按山東陞四川按察僉事兼督學道衡鑑澄清轉河南屯田僉事抑豪强辨疑獄人擬之包拯後丁憂廬墓卒馬志王攻鄜州人洪武中舉人任懐慶府同知清潔自持有勸以置田宅者攻叱之歸里後囊無餘財篋中惟書籍數十部賈志楊榮宜君人洪武時以人材任郟縣丞廉慎清正政聲卓然永樂元年旌異宜君志何回鳳翔人以太學生知祁門縣誠心實政恵義丕著厯遷山西右參議廉勤自持始終不渝鳳翔縣志宋詡膚施人洪武中舉孝廉厯官有聲後累遷應天府尹明一統志髙懐敬延川人洪武中以人材起家厯官有能名累遷湖廣按察副使明一統志楊瑞鳳翔人洪武間以貢知墊江縣積穀二萬石市牛千隻民無力者給之植道旁柳千株以休行者四川總志胡貞岐山人由舉人任永和令邑素荒殘貞至捐俸買牛種治耕具敎民樹藝後擢知應州改廣徳俱有循聲馬志何福全鳳縣人洪武間以人材任縣丞有治聲陞威州知州威恵兼行蠻人信服擢四川左參議馬志權士安字惟寧澄城人洪武中由人材授南樂令至則詢民疾苦勸課農桑修葺城郭祠廟百廢畢舉政暇作興學校文風丕振澄城志張綱米脂人以國子生擢江西南康府照磨盡心於職後累遷四川按察副使明一統志王思呉堡人洪武中以國子生擢嘉興同知調揚州所至有聲後陞四川右參政明一統志王琰字廷玉鄠縣人由貢士授太寧令太寧民散處山中愚戇負固琰與約令自至為平其獄訟賦役俾各得所再補長清令吏舞文為患琰黜老吏三四人其患頓除治行為山東第一馬志王巹字克修郿縣人洪武末監生授蘇州府同知蘇賦甲他郡期年逋負皆完累陞工部尚書京師城垣外甎内土雨久輒壊巹督理純甓之正統中以王振用事致仕巹用嚴峻為治卒無子名山藏葉盛傳龎惟方延安人洪武間為臨海令為政平恕折訟均徭民胥悦服賈志張賢字思齊鄠縣人永樂乙酉舉鄉試授吏部司務陟驗封司郎中剛廉自持部中呼為板張超拜山西右布政使威恵並流逺近悦服尋乞歸舊廬數楹僅庇風雨王九思撰墓碣趙倫邠州人永樂乙酉舉人宣徳中厯官職方郎中有聲陞戸部侍郎巡撫浙江左遷河南布政使卒於官倫持身廉潔􅊩事嚴明人不敢干以私明一統志李敬臣鳳翔人永樂中以材能卓異薦於朝厯官有聲累遷刑部右侍郎明一統志艾瑛隴州人恩貢永樂中舉人材授浙江右布政使才能著稱明一統志杜棠字善政三原人剛毅寡合舉永樂丁酉鄉試任真定通判正統中靖邊伯王驥征麓川陞職方郎中參贊戎政復調南京戸部所在得大體南部堂後樹忽冬花衆譽其瑞棠正色曰冬花春秋書異何瑞之有其剛正類此性至孝母喪廬於墓側後陞雲南知府政績著聞致仕賈志賀琳宜君人洪熙元年任浮山縣丞時有逋税捐已俸並勸富家助償自是流民復業以優治聞及憂去民泣送塞道馬志許璞鳳翔人宣徳丙午發解授學官正統六年薦陞仁和知縣公平廉慎輕徭薄賦民懐其徳卒於官貧無以殮民爭賻以助葬仍為木主於本縣祀之萬姓統譜連俊邠州人宣徳初舉人材任崇明令邑田多圮於海而民猶償租俊力奏免癸丑歳蝗請以菽麥代秋賦軍民俱賴之明年復大祲借常熟官糧數萬石以濟所活甚衆萬姓統譜董鼐同州人宣徳壬子舉人厯海州知州恵政浹人改知膠州勸農桑興學校旱禱輒應人頌神君聞風歸附者二千餘戸賈志盧彬字文質咸寧人宣徳中進士授戸部主事時朝命將伐麓川以彬督餉規畫得宜貴州苗叛彬擒賊首餘皆奔潰水西宼為亂彬單騎往諭蠻民感化貴地以寧轉山西參議咸寧志李善字元吉岐山人正統己未進士初知黎城黜嚴峻尚寛平奬孝行勵耕織遷知汾州民間有到底清之謡累擢四川參政告歸賈志陳厚乾州人以舉人知重慶府明於照物敏於治事時稱能吏賈志王璽字廷用盩厔人正統辛酉鄉魁任武陟訓導躬為講解督課士習丕變文敎大興後遷武陟尹歳歉多盜設法賑貸盜賊衰息擢監察御史抑横除奸風聲赫著遷永平知府調襄陽撫恤流民以數萬計後致仕歸子傅字良弼成化乙未進士厯官鄖陽知府陞四川參政所至有績時稱父子濟美賈志郝安字居中清澗人正統甲子舉於鄉任萊州府通判以邊才擢守遼東安樂調守鎮寧有治績子志義成化己丑進士授評事進寺副奉命審録河南時方天旱志義定疑獄三十五人釋無辜者三百七十人取服罪者十人戮於市天即雨厯右副都御史巡撫湖廣尋卒志義素性嚴毅持已處人循蹈矩矱所至以廉慎稱賈志子序字宗殷𢎞治辛酉舉人志義卒序聞訃趨奔哀毁骨立藩臬以金賻却弗受扶櫬歸援例乞祭葬逆瑾素銜志義不附已遂矯詔下獄尋謫戍瑾敗授髙唐守髙唐民悍序嚴明仁恕豪猾斂跡終順徳府同知名宦序曾孫由進士厯南少司馬忤權璫罷歸賈志宋欽字克敬乾州人正統乙丑進士授大理評事審録罪囚必參駁求至當陞福建僉事遇疑獄尤盡心推鞫廉察奸墨罔有遺漏遷河南按察使持憲愈嚴俄遷右僉都御史巡撫貴州建學立師大興敎化鎮守太監鄭鍾病故欽建言官多則民病貴州地狹而簡乞免差内臣鎮守不報尋陞南大理寺卿數辨疑獄人皆稱平致仕卒王恕撰墓碑李儒王瑾俱涇陽人儒以監生令鄒平有貴戚奪民田儒奏聞歸田於民後知蘇州築堤四十里以障水患民為立祠瑾以舉人任安平黠盜誣良瑾釋其枉植栁萬株以便行人時稱為召棠之蔭馬志張文質字時中扶風人景泰庚午舉人知澤州輕徭薄賦舉廢釐弊凡愛民者無不為之轉順天治中擢漢陽知府六載多恵政時權閹以文質同鄉里期一見卒不往遂罷歸賈志郭瑾字良玉華州人景泰庚午舉人磁州知州施徳育民民以無訟尋守蓬州歳大饑請賑院司牽制舊例不許瑾泣曰吾所育者天子之民也獨不能告天子耶遂聞上得賑蓬民賴焉九年入覲蓬民隨赴闕借留以疾致仕賈志王俊字世傑邠州人景泰庚午舉人知嵩縣屏貪吏恤貧乏嘗濬順陽濟民二渠灌田百餘頃邑人賴之河南通志劉介字師恵清澗人父鏞景泰癸酉舉人厯長沙知府折獄有聲他郡咸請就讞再補登州晉參政益勵清操終始一節介中𢎞治癸丑進士由吏曹出守撫州撫多商販引價吏胥以舊留三分之一白介介叱之人服其廉逆瑾黨人李璫大索江南諸郡介獨不應瑾深銜之然卒無以中傷陞太常少卿終養歸子維禴字子孚正徳間中進士知滑縣武宗南巡道出滑維禴從容經理百役立辦滑素健訟維禴以徳意感孚訟獄衰息嵗饑蠲賑全活萬計始黄河故道經滑民嵗費金錢治河後河南徙封丘徵錢如故維禴罷之擢御史上疏皆切中利弊卒於官介孫大觀由舉人知孝義縣厯登州同知所至有恵政終趙王府長史賈志士麟大觀子萬厯丙子舉人授定襄令前令白璧亦清澗人也闢地招民省寃釋枉為一時良吏麟故出璧門下素悉定邑利弊至則修明政教潔已恵民論者謂不負親師遺訓焉綏徳志邢簡字居敬咸寧人㓜聰頴嗜學景泰甲戌進士授刑部主事用法明允為尚書所重凡大獄多委鞫焉陞真定守嚴明憲度祛弊均徭吏畏民服陞浙江參政時江海泛溢簡賑饑蠲税又築堤設閘民賴以安後陞戸部右侍郎馬志劉傑字世英髙陵人景泰五年進士授戸部主事遷知湖州府湖民尚訟傑盡滌誣冗譎誕之習而示以禮民遂靡然向風明年上嵗幣官屬語存餘為出納之圖傑曰吾安可割民以奉勢乎執事者大怒退幣六十餘疋劾不職左遷同知真定尋知永平府屬縣富民有巡校以盜誣者官府知而不爭傑得告即發執之其衆果遁傑因此中傷去馬志田濟麟遊人景泰甲戌進士由江西奉新令擢侍御按浙江抑豪右辨疑獄有引裾折檻之風麟遊志濟守真定甫下車即革吏弊察民隠明年夏秋瘟瘧交作濟施藥療疾給棺葬屍歳荒不待上報開倉賑濟全活無筭挫戚畹之勢釋盜誣之寃境内大治畿輔志白惟勤字勉之清澗人景泰中舉人任沁州知州加意撫循廉潔自勵獄訟明察能得隠情陞衞輝通判沁人立祠祀之清澗志閻本字宗元邠州人景泰甲戌進士初任薊州倉儲出納平允吏無敢為奸擢僉都御史撫薊門舉修平谷豐潤玉田開平諸城池通薊浮橋悉加繕構有貂璫怙權掾史舞智本盡法處之因是被讒稱疾致仕久之復起為戸部侍郎畿輔志驤字伯仁本之子𢎞治辛酉舉人厯刑部郎中為秋臺倚重後守太原致仕卒邠州志楊祥寶雞人景泰丙子舉人任四川重慶府通判陞䕫州府同知廉介有為剛毅不阿人號青菜楊又岳池主簿丁巘者陜之鳳翔人以清謹自矢方病篤有犯法者饋暮夜金巘固却之時以為難馬志王彝鄠人由舉人同知解州廉慎剛斷百姓呼為鐵王遷代州卒馬志榮清字元潔藍田人天順初以材品授内府甲宁庫大使職司金幣出納惟謹遷山東昌樂縣主簿昌多逋賦前官峻急有鬻妻子以輸者清寛限理之由是宿負漸清嘗署益都夀光篆二縣亦大治子華號雙溪成化辛丑進士初任鞏令鞏治與溫縣鄰田稼每為溫民所刈鬭傷者衆華築堤堰水界之爭端以息改嵩縣弭盜安民教化大行丁外艱服闋補無錫邑有四虎為害祝而捕之一日獲其三其一復自至民相謂曰猛虎猶知約束況吾民耶後為御史巡按兩淮四川所至除奸革弊稱為名御史子察𢎞治丁丑進士除山西夏縣令興學勸農有古循良風厯貴藩左參議治聲赫然藍田志員賢咸陽監生天順間任溧縣令初建水次倉留心學校溧陽縣志孟俊咸寧人天順己夘舉人知上杭縣為治嚴而有則理棼剔蠧威行恵流吏畏而民悦之擢監察御史巡按南畿以布政司參政致仕萬姓統譜申瓊字廷瓚三原人天順己夘舉人任山東䝉陰令嘗集古昔孝順事實為民講解又督治農器以溥耕鑿之利敎養兼舉䝉人繪像祀之趙應元撰墓表王政字尚徳扶風人幼遇異人自經史外旁通天文兵法天順壬午舉鄉試任蘭陽令復補威縣摘奸剔蠧平賦均役多異政陞澤州同知再補遼州前後二十年清慎質直不渝其節俱祀名宦致仕歸子孫不免貧窶賈志宋賓字大賢中部人精易學舉天順三年鄉試甲申當會試不赴公車曰必有火災已而果驗授陽曲令博詢民隠抑制豪强陞知陜州歳饑飛蝗布野賓竭誠步禱明日羣鳥來食殆盡陞南京中軍都督府經厯同里寇恕亦通易理以舉人任綿竹令有廉聲延安府志韓倫字秉彞朝邑人天順壬午舉人授武清知縣武清地近畿輔軍屯皇莊徧四境最稱難治時中官梁昉貴震朝廷牧馬斯地威焰百端倫不應昉怒縛里正懸髙竿以示曰知縣見此否倫亦擒昉頭目竿懸之曰釋里正則釋頭目昉不得已釋之昉至京言倫不稱狀遂罷歸自是杜門不出縣尹某欲致之不得適倫子繼宗應里長役尹故苦之以致倫倫曰彼縣官苦里長我何與焉竟不見尹悔言之分守車平章平章曰尹誤矣致賢豈以威力為哉率尹踵門請至再三始一見云苑洛集馮寧同官人父貴宣徳時以平漢功官鹽井提舉寧登成化二年進士厯四川僉事統芒部諸土官地甚險逺往時上官無一人至者寧攀木縁山親履其地躬行化導土司畏而懐之後正徳中有洛川張文奎者亦以僉事道備兵川南時芒部弗靖邊人互相煽動文奎結以恩信邊人感悦卒不煩兵而定文奎厯任山西左布政使廉名特著賈志紀溫字宗直綏徳衛人成化乙酉舉人榆林衞地近邊人鮮知學余子俊為巡撫奏設衞學官以禮聘為師温規格嚴整經指授者多成立謁銓授吏部司務士無問識不識皆知有紀司務陞太僕寺少卿綜理周宻咸中條節不避勞勩卒於官賈志雍泰字世隆咸寧人幼苦學成化五年進士銓呉縣知縣呉中田傍湖悉淪湖漲前尹欲堤之阸富室不就泰舉前事竟成之號雍公堤入為御史初巡南城後巡居庸紫荆二關及巡鹽兩淮已陞知府余子俊總督宣大舉為山西兵備副使千戸韋瑛誣收謀逆百人子俊將坐實上奏泰曰人命至重其可輕耶疑讞可子俊從之至京果俱免泰剛直有時名然行事時涉卞厲民有罪或杖至死太原知府告泰杖人至死狀收下錦衣獄刑部讞當酷刑罷官刑部郎韓紹宗走見王恕曰泰直臣公可避鄉曲嫌坐視耶降湖廣參政𢎞治初陞浙江右布政使十二年為右副都御史巡撫宣府諸所奏議咸當時務參將李稽李東陽姪也為部下所告泰將奏治之稽跪請受責度泰必見寛泰令縛下擊以大杖科道官承東陽意劾泰擅杖將官坐免既歸日居韋曲别業不涉城市冢宰許進語人曰吾遥望關西有二髙焉一華山一世隆也武宗即位起南京戸部尚書劉瑾泰鄉人有勸泰行金謝者泰曰吾進退在天居兩月瑾矯㫖令致仕自是長居韋曲年八十卒泰奉身儉素貴客至不過二肉為尚書未製緋及卒家人製以殮名山藏泰擢御史呉俗令行皆饋樓船公不受民固饋乃駕至張家灣還之呉人歌曰時苗留犢雍公返舟墓志泰巡鹽兩淮見竈丁貧而鰥者幾二千人比二年悉與完室既去淮人詠曰客邊檢槖渾無硯海上遺民盡有家又曰了却四千兒女願春風解纜去朝天見聞録東思忠字進伯華州人成化丙戌進士授刑部主事録畿内刑獄平反為多嘗曰獄有微㫖非敲扑所能致也陞松潘兵備内修政事外樹兵威諸番莫敢侵邊松潘孤寓萬山轉輸斗米輒費數金主藏吏多侵盜思忠盡滌其弊倉庾陳因又嚴減尅之禁正私鬻之罰茶馬有序外釁不生又於大石佛嘴鑿山開路以便轉輸至今宜之甲辰乙巳兩出軍勦逆命者直抵巢穴所獲軍器頭畜無筭西蜀士民倚為長城卒官康對山集漢字希節思忠子𢎞治戊午舉人正徳中授池州同知招亡附籍戸口增往昔二萬劇賊劉七流刼呉楚漢選民兵數千人陣要路斷賊往來賊不能犯時石棣黠盜章仁胡天寵王浩等聚衆行刼漢分兵大洪諸嶺凡數十戰賊遂平有程文寶者殺人亡命匿於胡氏史捕之急文寶反賄捕者使誣胡漢察有寃色鞫之得其情一郡驚服陞南昌知府歳饑出粟賑濟他郡悉來就食遷長蘆鹽運司使致仕野字希孟思忠第五子𢎞治壬戌進士授陳留知縣邑瀕河歳為患野築堤禦之更以其淤為桑麻地流亡來歸益戸口數千陳州盜殺典史行賄自脱野窮其事殺之於是河朔數百里皆欲赴愬陳留後陞刑部主事賈志侯恂字誠之白水人成化丙戌進士授戸部主事㑹計精當以能陞山東按察僉事督京畿軍儲累遷右僉都御史巡撫大同威振邊塞轉副都巡撫三晉風猷益楙已召入留院提督操江恂負才鴻碩操履清儉故能其官同州志李崙字世瞻臨潼人成化己丑進士授屯留知縣縣積猾舞文獄訟錢穀皆出其手崙至悉按斃之陞戸部主事除弊革奸出納分毫不爽出守廬州賑荒活萬人立俵馬法定鹽價創河橋廣積穀陞河南左參政賈志崙卒妻郝氏不能舉火守臣奏聞命所司月給米養終其身西安府志梁澤字汝霖家貧為掾縣令目所書牘奇之俾學舉成化己丑進士厯陞巡撫貴州山東所至斷獄剖決如流彈劾不避權倖貪汚吏多解綬去以忤時謫茶陵令復厯浙江參政皆以廉恵稱三原志閻仲實字光甫隴州人成化己丑進士為考功隨材量用鑒别精當公論倚以為重遷河南副使歳凶人相食遍厯所部存省賑貸全活甚衆弟仲宇字泰甫成化乙未進士授鹽山知縣累遷山東副使分理臨清時有妖僧惑衆仲宇擒之寘於法厯陞右副都御史巡撫湖廣時洞庭襄漢間劇賊充斥苗蠻梗化仲宇先後設謀擒之陞兵部尚書仲宇資性端重敷奏明切為政尚寛和不喜更張故所在稱治賈志張曉字光曙三原人成化己丑進士知襄垣縣多善政召拜監察御史上書論萬貴妃事同列讀其辭皆縮舌上笞而釋之尋為湖廣僉事施州亂全省震動諸僚皆莫敢往曉請行曰此可以義動至則宣朝廷威徳亂者感服陞河南副使時河決為患曉奉命督役導河幾千里俾復故道工竣晉按察使陳州有告毆死少年者三年莫能決曉閲屍驚曰安有少年缺其齒乎訊之果捕得少年其屍乃一乞嫗也事遂白尋以憂歸馬志張撫字世安寶雞人成化己丑進士授刑部主事性剛決不畏彊禦都督王義劉寧廣寧侯劉銓山西鎮守太監石巖各有罪衆莫敢決撫立訊決之浙江副使張蕙罪惡彰聞使者莫敢言撫治之遂服罪進四川按察副使蜀大饑捐俸易米賑之民賴不莩陞湖廣按察使楚多積盜撫出俸金捕之盜由是息尋晉刑部侍郎明年乞歸撫精於吏事所在以嚴明稱賈志郝滋字洪濟髙陵人成化辛夘舉人授中牟令守亷奉公興利除害不踰年境内大治有水患歳常淹沒民田滋築堤十八里植栁衞堤復得閒田千頃民甚利之明年秋螟螣害禾滋祭於漢魯恭祠次日蟲皆殞擢均州守卒劉時蘭撰墓誌王輔字良弼同州人成化壬辰進士知長垣縣時值荒後民逋三年賦監司督之急輔從容畢辦民不知苦邑東北窪下每秋雨潦萬頃俱壑輔鑿渠疏之盡為良田徵為御史出按四川貪奸斂迹素性負氣尋謫鄖陽府同知罷歸同州志張繼字述之鳳翔人成化戊戌進士以戸部郎中出知順徳府凡事務存大體持法平恕而人自不寃時歳旱引躬自責即雨境内多渠地髙水下製桔橰以濟旱又敎民植桑蠶事大興有盜刼鉅鹿捕官執齊民顧招等十三人皆誣服繼按得情皆釋之既獲真盜人稱神明時有戚里占民田辨者輒毆死撫按檄繼往勘繼以地還之民貴戚悚息賈志韓紹宗字裕後朝邑人成化戊戌進士授刑部主事部有大獄尚書輒付之張文安伯者勲戚也族人奏其不法紹宗當訊輒置之律御史柯忠巡按直𨽻劾都指揮王章章故横且多内授亦奏柯詔紹宗往勘章以守備體謁道中紹宗曰章犯人何得先謁勘官杖之途比勘果如柯劾章免官大同鎮守太監石巖巡撫許進互奏劾詔紹宗往獲石十大罪而許無瑕獄成石奏紹宗黨文職差官改勘而紹宗卒非黨𢎞治戊申京師大水米價騰翔紹宗乞應糧俸者預支三月價可平詔從之東厰錦衣之獄皆付刑部有所枉不敢辨紹宗送獄堂審尚書曰此獄自厰衞來耶紹宗進曰大人苐當視情法如何勿問所從來聽者聳然陞福建副使有屠執强市肉者以告盖鎮守陳太監舍人也紹宗捕其黨陳曰若等不知新韓副使乎皆械送之而抵罪嘗受御史委同右布政分濬雙門河未兩月所治河皆考績遂署司事兼海道時海寇王某聚衆刼海上曰韓公不去我輩不生於是以千金賂鎮守鎮守即奏罷紹宗官紹宗居官守法毫髮不可動所至率綱紀其大者其餘不勞而正所立偉然涇野集王坪字信之商州人成化中進士厯鳳陽知府時歳凶斗米千錢坪多方賑濟全活甚衆調南陽法令嚴明俸給外一錢不取弟墱字器之官地曹主政為人尚節氣篤故舊時稱二難商州志宋徳岐山人成化中進士由温縣令厯浙江道御史四川副使法度嚴明宅心仁恕更能以清介自守至作令定温鞏之田巡方洗焚死之寃持憲靖王剛之亂尤宦績表著者又同里羅佑以貢生尹寧陽亦有亷聲賈志張雄王鉞馬祥皆同州人成化時進士並官主政雄刑部鉞戸部祥工部雄素貧在部能礪節執法比卒也家無擔石鉞有幹濟才陞郎中總理糧務出納精覈人不能欺亦不敢撓以私祥始任都水督漕運挑直河五道築堤三百里漕艘賴之調營繕司清釐匠役陞虞衡郎中監遵化鐵冶剔弊恤工終山左鹽運使同州志邵錦商州人成化中舉人知雞澤縣修法度尚寛和損益因俗民不知擾值流賊亂錦礪人心固守一方賴為保障姓譜謝文字顯道金州人成化戊戌進士為御史巡方所至剔弊糾奸不避貴近後知河間折獄賑飢恵義兩盡終山東參政馬志王章字廷憲膚施人成化中進士任大理寺副鞫讞平允以同官逮罪謫同知髙唐州涖政剛果陞知州卒同縣髙俊以舉人同知汾州剛方明斷九年考績民遮留不得行又任三年以病歸延安府志于寛字克𢎞咸寧人成化中舉人事繼母以孝聞在太學時友人任良病沒良妻鬻二女歸葬寛為贖還率礪同志捐貲歸其喪後知鞏縣積穀救荒築隄障水擢守鄧州築城禦盜有功鄧人尸祝賈志張瓚字廷奎中部人成化中舉人知睂州陳案積獄數日而判卒於官貧不能斂直指倡有司賻之始歸曾孫志久知什邡亦有績賈志解經醴泉人成化庚子舉人𢎞治中令邯鄲性儉素自奉甚薄朔望謁文廟進諸生講釋經義課試嚴明貧民有累年負租税者與約次第輸之不刑一人凡徭役躬自簽𣲖輕重適宜政平訟理獄無繫囚畿輔志陳梁字伯棟涇陽人成化間舉人任渾源知州時以南人充大同軍役不習水土多死者梁條上其事請以本土衞所軍代之報可陞贛州同知有巨賊數萬剽掠郡縣梁以計誘執百餘人乃遣人分諭諸賊使解散賊黨悉平城南漳江人多病涉梁作石橋人便之稱為陳公橋賈志韓福字徳府西安前衛人父鐸天順己夘舉人知茂州有聲福登成化辛丑進士厯滑縣章丘令廉威並著擢御史敢言國家利弊出守大名民不知吏道不拾遺奏課第一累遷戸部左侍郎因忤宦瑾謝職歸馬志劉璣字用齊咸寧人成化辛丑進士初任曲沃令陞瑞州知府家食嘗不給公服外無餘衣時新昌盜起璣入賊巢面諭賊見璣皆羅拜聽命立時解散後厯遷至戸部尚書賈志屈直字道伸華陰人成化甲辰進士初直未第時值歳饑絶糧謁推官乞賑推官日三邀直㑹食曰吾所訊囚二人者將論邊戍數邀子來彼必求援吾釋之必厚謝子直曰賑可賂不可推官歎服授刑部主事部獄卒厚索囚賄不如意輒殺之直根治得狀白尚書論如法錦衣奸人依憑權勢郡縣賦至輒誘解人代納號攬頭解人多破産事覺白尚書按治及逮擊攬頭權勢人果邀奪之直入朝言於錦衣曰錦衣朝廷法官乃不容刑官守法耶明日攬頭至俱抵罪直厯刑部三司幾十年權貴憚之陞重慶知府府有妖擲磚石毁房舍又時有火災直告於城隍妖火遂息夏旱禱於元武山有白雲如盖往返隨之大雨如注歳大熟陞浙江按察使巨璫至浙怙勢作威欲三司跪謁直率衆不屈璫怒甚直從容言我輩見怒當何罪璫即改容揖衆入坐陞太僕卿太僕掌馬利近幸沿為奇貨攬納請託直力禁之乃共譖於劉瑾瑾察得其情諸譖不行遷操江都御史復改督漕運以運船稽遲置簿給付運官日記所運水程及阻風守淺時日以備考核其法至今用之瑾既敗某御史倡言直為瑾鄉人數數遷轉宜罷遂致仕直毅而有謀剛而不虐才敏而力足以行之故所至有聲與人言侃侃無隠亦以此得罪苑洛集受善字我虚直曾孫萬厯乙酉舉人知晉州恵義著績擢真定同知司儲上谷以才幹勞勩見稱賈志亢時霖藍田人成化丙午鄉試任長子敎諭陞廬山令時天全叛逆逐縣官掠居民人為霖危之霖至開諭招撫患遂息又募勇士殺其同類之難制者廬山立祠祀之藍田志谷賑咸陽人成化丙午舉人知巴縣以廉介自矢卒之日同官入視其家圖書數巻而已四川總志劉聰字達夫中部人性剛明果斷登成化丁未進士累擢彰徳知府翦除豪强屬縣肅然宗室有風七兒者日至府需索無已聰疏其不法自是斂跡厯左僉都御史巡撫保定皆有異績長子佐登進士官戸部主事季子倌舉嘉靖鄉試知聞喜石州皆以清白强幹世其家璋字尚徳聰弟正徳庚午舉人授南和令時河渠久湮璋修復灌道民沾其利邑十七社十社土著餘七社以處晉民奉例墾荒不税於是民有新舊田有多寡税有盈縮璋躬履丘畝使田租相證民卒歸業陞知霸州人多豪俠剽悍璋懲一二魁黠境内肅然城傍九河故道歳十九潦盜賊頻興璋平役薄征水不為災盜賊衰息致仕歸璋曾孫萬厯時舉明經亦篤行君子也延安府志馬通字致逺同州人年十二補州庠生入太學成化中銓博野丞持已廉平不私受一牘嘗攝束鹿篆判斷明敏人頌神明陞知本縣束鹿人復留不欲還兩縣詣闕爭之冢宰以成命諭遣始已􅊩博野凡舊政不便民者次第除之邑用大治憂歸服闋補繁峙繁峙素逋賦士不知學通勤勸課選社師訓民間子弟俗為一變賦亦畢輸㑹大水沒禾他邑承風減報通獨報全災邑人感悦俄病卒囊無餘物賈志雷爵朝邑人成化中舉人初知清苑厯守祁州廉謹自持大學士楊一清見之訝曰若非知清苑守祁州者耶厯聞子名今老矣有大名善地特以待子為優游桑榆地遂授大名府同知至大名直廉如初行部肅然匹馬果蔬自給賈志樊資字文質朝邑人成化中任榮縣典史歳饑出俸賑之人賴以生羣盜嘯起資督繕城池屹然保障仍單騎往諭之羣盜感其恩信立即解散馬志尚達字兼善同州人貢士𢎞治初任岳陽令政尚慈愛縣有澗水為民患達開渠溉田歳旱出粟救濟岳陽碑記李鴻乾州人𢎞治已酉舉人正徳六年知深州適霸州賊起縱横河北鴻率衆登城分僚屬守四門躬自提督往來廵眺賊知不可克乃引去一郡獲全興學校撫流移百事修舉百姓徳之畿輔志郭桂字時芳咸寧人𢎞治庚戌進士知安丘王某者邑中大豪也令至輒啖以利既乃格制之桂莅任使人啖之如昔桂發其事論殺之有父訟其子盜金者桂知其後母也謂翁曰亟歸金在若媼衣笥中歸果得之父子如初後判湖州儲運先期輒辦遷泰州知州州多積蠧有巨惡號三虎桂至發其奸事斃之逺近肅然轉鎮江同知攝郡事決獄若神遷平陽藩邸素為盜藪桂至後宗室咸畏其威盜賊逺遁尋擢參政卒賈志王錦字在中醴泉人𢎞治庚戌進士初任襄垣令陞蓬州知州秉公執法請託不行饋遺一無所受時以剛明稱四川通志後陞山東僉事兵備萊州制禦盜賊綽有方畧正徳閒致仕醴泉志姜實蒲城人𢎞治庚戌進士授曲沃知縣以廉能擢御史巡鹽河東值歳饑賑活萬計巡長蘆兼理河道凡權貴夾帶商貨及站鹽紅船一切革之鹽法流行陞湖廣僉事期年黜不職官十八人墨吏望風解綬生平寡言笑剛正不撓事親尤以孝稱馬志張憲字廷式涇陽人𢎞治壬子舉人謹言慎行為學者軌範以篤孝聞授絳州學正所造士多成立陞登封知縣有霸州巨賊數萬攻城憲招降被擄男女百餘人斬首五十餘級事聞賜勅勞之陞順天府通判卒官賈志謝朝宣字汝為西安左衛人𢎞治癸丑進士任監察御史巡按雲南監鄉試令土官咸得觀聽鹿鳴逺人感化陞浙江副使因忤權宦謫黄州同知招流移恤貧乏陞四川副使征勦有功斷獄無滯賈志趙繼爵同州人𢎞治癸丑進士授行人累陞山東副使備兵臨清皆有治績兖屬沂郯滕費諸州邑積年逋賦建議蠲罷金鄉魚臺有左道惑民者監司欲以叛治繼爵力言此愚民被誘第去其魁則餘衆自解監司從之所活甚衆薊賊劉七等攻城繼爵聞變急築外郭七十里浚濠崇櫓賊不敢犯尋免歸子國良字邦遂風度髙朗有智畧初以制科授工科給事中不阿權貴南畿與江右軍民仇殺獄三年不決廷推國良往勘一訊而獄成㑹大察以飛語謫孝義丞量移宜興令遷彰徳郡丞宜興民赴臺乞留以千計尋晉度支郎出守太原值有邊警國良圖畫方畧防禦甚周已與同官分城而守難民蔽野求入他皆嚴拒國良獨啟鑰納之民為立生祠以功進按察副使兵備潞安同州志楊槮字子喬臨潼人𢎞治乙夘舉人授杞縣知縣剛明自任時宦官需索無虚日聞槮風力相戒無敢干者有夫婦夜出為人所殺槮曰此必同舍所謀擒治之果得其情時流賊猖獗槮濬隍引汴水為阻多設戰守具賊覘知遂不敢入遷汝州知州儲粟萬石以賑饑集屬邑俊秀授以經學士風丕變尋倅大名額糧歳有餘羨槮悉貯之庫又倅松江歳有織造餘銀數萬槮悉給機戸無所取陞長蘆運同卒弟樞字子極𢎞治甲子舉人授夏縣知縣擢御史巡西城法令嚴肅盜為潛遁後陞四川僉事平綦江盜賊有功賈志賀有年字天錫臨潼人𢎞治乙夘舉人通判鄖陽府清盜平徭修學均賦尋補廣平境内多盜憲司嚴檄督捕他邑多誣陷有年開釋無辜百姓恃以不枉既而同知兖州府疏諸泉源隄防運河漕輓以濟臨潼志張守字惟約涇陽人兄官𢎞治乙酉舉人任雲南知府土寇經年相讐殺前太守不能治官至平之守中𢎞治乙夘舉人任封丘令時巨寇劉六所在攻城多被殘破守百方禦之城賴以全陞昌平知州州多勲戚内官守處之得所皆帖服陞永平府同知有以民田獻勲臣者守繩以法累陞成都知府卒於官馬志孟醇鳳翔人𢎞治乙夘舉人知良鄉縣以能稱擢御史時劉瑾黨人魏斌亂鹽法醇以成憲折之斌屈服陞成都知府駱胡盜起殄其渠魁餘黨悉解散厯官參政賈志馬應祥字公順咸寧人𢎞治丙辰進士授河内知縣時邑多夙逋應祥考戸數躬為編次奸滑斂手自是輸將恐後時有殺人者不可跡先期禱越國江公祠下曰神許我得情則雨果雨翼日啓棺諸人羅跪有鼠自棺出竄一人衣襟下忽不見應祥指之曰殺人者汝其人色動推究果服又郊外殺一人未絶移縣門内許士民縱觀有一人嗟歎其側祥遂執之一訊即得縣中稱為神明召拜吏部主事出備兵陳睢再改山西督屯屯田子粒積負併徵應祥請諸撫按許他物相準即以給士卒甫三月完十七八擢山西按察副使上疏乞休賈志李璽字朝信鳳翔人𢎞治丙辰進士授荆州府推官擢監察御史按河南山東直𨽻諸郡縣時劉瑾用事事多掣肘璽一切無所假貸由此忤瑾逮獄尋降為平溪驛丞陞襄陽知縣超拜河南副使折獄聽政嚴恕並行進職按察使致仕璽自起家至按使家徒壁立赴襄陽過洞庭羣盜操刃入舟既見行李蕭索乃相與嗟歎羅拜而去賈志張潛字用昭華州人生而頴秀從李西涯受尚書𢎞治壬子楊邃庵督學關中以慶陽李獻吉洵陽張光世與潛為三才子秋試三人同舉丙辰第進士授戸部主事劉瑾擅權深用避匿或曰公鄉人也不往且有禍笑不答擢廣平知府時盜起流刼郡邑潛多方捍禦郡中賴以無事按行屬邑省財力均徭賦黜舞文清滯獄興禮讓洺土熙然向風擢山東左參政罷歸賈志羅循號雙泉白河人𢎞治己未進士累擢鎮江知府平賊有功終淮陽兵備白河志髙選字朝用髙陵人𢎞治中進士授戸部主事督通州糧務出納精宻權豪不能為奸監督草場謝絶饋謁忤劉瑾致仕以薦復起郎中後縁事左遷鈞州同知時流宼圍鈞援入城外男婦五千俘賊數百人屹然為鄖襄保障陞兩淮運同尤能以清介自持卒於官貧不能歸櫬髙陵志王億字本一鳳翔人𢎞治中進士授閿鄉令邑素衝罷宦寺往來擾民億力為裁抑縣稱大治丁憂歸服除補濬縣不數月濬又治厯陞山東僉事分巡遼東皆以清直著尋督餉京師太監張忠弟舉素驕縱攬解河南歳餉侵沒至數萬官吏莫敢誰何億任事首發其奸狀杖之舉惶恐謝罪㑹獄未具而舉死忠遂訐奏上前謫戌南海越五年始放歸賈志李濟三原人𢎞治中監生任芮城主簿剛方練達因民為治陞本縣令改知臨潁潁民喜告訐濟至為平其訟獄有頑悍者即懲治不少貸刁風遂息自是疏壅理枉釐弊振弱百廢俱起後以疾去囊篋蕭然賈志侯珠麟遊人以舉人知大名縣持身廉勤撫民仁恕居憂服闋再補閿鄉治亦如大名時尋卒官賈志馬隆字道亨中部人沈毅剛介與人寡合由舉人任大同司李廉平明斷戍卒之變僚佐咸走隆獨不動亂兵鼓譟入王府聞隆在遂退其見信於人如此終浙西通判賈志白比珩字康徳綏徳州人以貢生判臨清擢彭山令劍州茂州守所至有恵政弊衣蔬食恬如也厯工刑二部郎中綏徳志張綸興平人𢎞治辛酉舉人知羅江縣善決獄人頌神明擢知綿州四川總志王納誨字獻可長安人𢎞治壬戌進士授工部主事治漕臨清嚴約束謹蓄泄公私便之調吏部課覈嚴正倖路杜絶忤當道謫易州同知覈軍實繕城郭晉河南按察司僉事理屯田河南寇亂屯多荒蕪誨給以牛種時其征斂三年屯政底績郡有豪黠怙勢武斷官司累年莫能究誨執之伏法郡獄繫囚千餘按牒剖決不三日獄㡬空改備兵敘瀘懷逺人固封守宣威敷澤人稱父母晉副使巡兩川風裁肅然蜀境為之改觀賈志李伸字道甫三原人𢎞治壬戌進士授臨汾令晉王府軍校肆横殺人前令莫敢治伸至悉寘於法境内肅然擢御史巡紫荆等關時礦賊千餘作亂伸執首惡餘黨解散賈志伸正徳中守嘉興有大豪侵官錢事覺廉得之即定爰書有殺兄謀奪其官者獄久不決伸一訊而服舉措因民不干聲譽浙江通志張鏜字尚節咸陽人父英善屬文鏜舉𢎞治甲子鄉試就選安邑改靜海令靜海宻邇京師為水陸要衝天子南巡諸郡盜起百姓愁苦鏜供應弭捕各有條理境内安堵渼陂集周紹字克述髙陵人幼與程汝修吕柟同學皆以聖賢相期許舉𢎞治甲子鄉試受戎縣令莅政公清邊民敬服調任江陵時縣有江水為害紹創築長堤民獲安居又墾田千頃至今利賴西安府志李恕字道夫富平人𢎞治中進士初任徳平知縣遇事敢為發積穀賑饑民厯陞四川僉事提孤兵數千破大盜藍四輩數萬衆以智勇見稱陞貴州參議致仕賈志許世昌澄城人𢎞治甲子舉人授太和令陞順慶府同知時廣安賊勢猖獗攻城甚急世昌率民兵禦之圍乃解廣安方饑甚世昌極力賑濟又買給牛種荒蕪盡闢順慶素多水患城屢圮於水民歳苦修築世昌開渠西山以泄之患遂息時涪州盜賊蜂起世昌奉檄勦平之院使者上其功世昌念母年髙疏乞終養母卒服闋復除承天府同知㑹上南廵世昌署府事時改建陵寢開築城池創立廟社添設司衞皆倚辦於府竟以勞卒官苑洛集張羽字伯翔南鄭人登進士初授行人武宗初宦官劉瑾嘗以同鄉干公公獨不進後巡按山東㑹中官導上遊獵錫予頗濫公上疏曰明王慎徳四夷咸賓不以禽獸病民猶謹衣裳之在笥也上覽其奏曰真御史也出守廣平建漳川書院建閘通水開田萬頃以利民生後超陞山西參政首擒妖黨廵撫不恤軍士衆軍作亂公奮然入亂軍中衆畏公正直亂遂息陟江西廉使下車首訪巨奸豪滑盡寘諸法轉貴州布政使吏白積餘之金舊規不報公盡數登籍後陞大理卿釋寃抑活民命不下數百後陞工部侍郎展修國學督修皇陵壯麗完固裁省節儉不下億萬自行人至司空厯官凡三十年清貧如洗吕涇野撰碑文史華渭南人貢生𢎞治間知潛江縣勸課農桑葺理學校諸所廢墜罔不振興為一時循吏湖廣志程珏字兩玉朝邑人𢎞治時貢生為富順丞下車捕巨猾大奸縣人悦服有戴氏子殺三人獄久不具珏一訊而抵罪以母憂歸不復出子範字君儀正徳丁夘舉人初判開封府有倉官餽餘金範怒斥之以艱歸復除大名府府舊治天雄鎮元時圮於河鞠為茂草範以暇時督率民兵樵蘇陶磚不煩公帑四門堅宻屹然畿南保障㑹河決為患範相水勢自白屋陂口築堤七十餘里水患遂息郡人為立遺愛碑朝邑志劉澤字恵民三水人𢎞治中以明經任廣安州判陞犍為知縣執法不阿調洪雅城池學校煥然一新母食惟青菜一味蜀人皆曰劉青菜後陞僉事三水志馬璿字文機涇陽人以掾為平谷尉決斷訟獄逺邇稱平修葺古北口邊城禦敵有功陞順義主簿司易州厰薪三月逋薪悉完限於資格未竟其用人咸惜之馬志王朝雍字仲和朝邑人正徳丁夘舉人任嚴州推官決獄公允署淳安桐廬人有輿頌録陞知澤州青羊賊起朝雍陷其中賊不忍害叩頭送出因熟其險阻告當道按地進兵賊遂平厯陞山西僉事馬志倪璣字公在咸寧人正徳戊辰進士厯給事中後以誣謫佐嘉善立法更化嚴保甲毁淫祠置義塚及社學書院甚有政教姓譜陞知定州世宗入繼大統所經郡邑咸以錦繡為居至定州璣獨以黄布上嘉其儉約御書可以二字賜之尋陞山西口北道僉事咸寧志閻欽字子明隴州人正徳戊辰進士選吏科給事中嘗抗疏勸毅皇視朝封駁不避權貴同列彈劾諸疏多出其手當道忌之遷河南兵備嘗推演武侯八陣圖為九曲新書刋布以訓戰士募義勇修城塹謹烽堠逺近恃以為安羅山勢豪張輔殺其妾及妾母妾母之族訟諸官輔反誣以他事陷獄死欽廉其狀執輔抵死信陽貧富兩民爭田里中二惡少素怨富民誘富者殺之旋又殺貧者誑其守謂自相殺欽按之具得情狀斬之以狥劉學恆者汝寧大盜也屢捕不獲欽出奇計執之論死其黨百人悉解散逺近駭服賈志楊淳字重夫先世出華陰縣明興徙臨潼淳登正徳戊辰進士授御史時宦官劉瑾索求科道瑕疵適決大辟衆皆退避淳請行瑾惡其不附己改工部屯田司主事辛未差荆州抽分請託不行後陞員外郎管臺基等厰尋差遼東查盤軍器甲戌陞都水司郎中奉勅管理通州南旺河道時中官方横舳艫往來陵轢州司需索無算有號二劉者勅使西域取佛其艘所費萬計沿河州司懼不敢支淳移檄擒治其黨衆斂迹而去陞寶慶知府南楚風浮俗又尚鬼淳首興學校以勸生徒擒妖誣毁淫祠浮風丕變調知鄖陽陞山西副使四川參政次年陞本省按察使陞右轄尋陞左轄淳在蜀威茂諸邊將常因蕃人入寇多殺無辜以邀賞賚淳諭以禍福勸戒切至諸將感悟平生清忠自勵慕趙清獻之為人遺榮養素居室蕭然吕柟撰墓誌曹蘭字徳芳咸寧人正徳辛未進士厯山西布政使大同兵變蘭履險決䇿賊不敢犯晉山東巡撫子韓嘉靖乙未進士累陞貴州參政莅政嚴敏操履清潔所在有聲咸寧志南大吉字元善渭南人正徳六年進士嘉靖初以部郎出為紹興太守二守靳塘多智譎大吉下車郡事多諮於塘塘以書生易而謾之大吉陰察其情而陽為不知者既三月一日坐堂上召諸吏抱案集庭下數之曰若等善欺予某事然若以為不然某事不然若以為然何欺予如是亟持案來案至立剖數十事人人慴服塘駭汗齚舌不敢出一氣由是飭條敎頒下邑懲奸戢暴不撓貴勢巨豪石天禄戴顯八者窩盜致富官府素不能治逮捕斃獄中每臨重囚必朱衣象簡秉燭焚香大開重門令衆見之望見者以為神人不可犯是時王文成先生為大吉㑹試舉主故稱門生大吉嘗於先生前自省臨政多過謂先生何無言文成曰吾已言之矣吾嘗言良知良知固自知也己自省加宻文成曰往鏡未明可得藏垢今鏡明矣一塵難住此入聖機也勉之大吉為葺稽山書院簡八邑才雋子弟講習其中刻先生傳習録振起絶學大吉政尚嚴猛喜任事不避嫌怨已濬郡河開上竈溪覈理侵壅以是籍籍謗騰郡人居吏部者銜之遂以大計落職去大吉每有書來文成問學無一語及升沈得喪間文成壯之還書相朂畢志此學明史竊穆世傑涇陽人正徳辛未進士知樂安縣汀贛流寇攻縣世傑擒斬首惡黨與立散居官以興學校育材為務鄰民爭歸附焉涇陽志郭田字汝耕長安人正徳甲戌進士知嘉善縣性簡直政令嚴明堅持氷蘗操人有饋遺輒峻拒每見解銀指謂左右曰此阿堵物能亡身敗家爾等母為所汚時有上書陳其過者即榜之縣門引以自罪嘉興府志張幾字知幾盩厔人正徳甲戌進士司理廣平不阿權貴民有汙田歳苦潦幾教之種蓮鬻以輸賦尋調真定真定視廣平尤劇幾理滯達枉決遣如流以考最徵入比部改丞松江職董漕運幾飛輓先諸郡召拜山東僉事按察青州諸郡青州濵海無賴者採山煮海恣睢睥聣尺符不能約束幾以間執諸豪逮繫之衆皆解散尋乞歸盩厔志畢鸞鳳翔人正徳丙子舉人初知朔州勸課農桑興育士類累陞南京户部郎中後補工部提督漕河制平水閘并涵水洞民獲灌溉利出為大理知府姦豪斂迹胥吏格心郡中大治鳳翔縣志趙輔字君鄰華州人登正徳丙子鄉薦授扶溝令縣故有大猾善結官吏武斷不法輔至有告大猾事者大猾懼罪亡匿久之知輔賢來謁謝輔反覆諭導許其自新卒為善士調靜樂邑多逋税民皆觀望不肯先輸輔至應期税辦遷廣平通判理寃釋枉廣人尸祝華州志雷子堅綏徳州人正徳中舉人知廣州賦性剛介廉潔勤敏不畏强禦值流賊刼掠繕城池治兵器賊見有備遂引去民賴以全因抗論將帥失利當路惡之遂落職將行出所貯金幣於官其清潔如此綏徳州志牛斗字應宿朝邑人正徳時登進士嘉靖初官兵部員外初世廟詔革冐功武職若干人無何夤縁求復當軸秉樞皆受賄為奥助獨畏斗梗正懐千金不敢入秉樞諷司務喻意斗不可乃召斗欵曲為言當國者行有美秩酬若矣斗曰壊國紀而得美官斗不為也秉樞怒幾欲掊之斗固移疾不視事尋出知莱州府又忤權貴罷歸人咸惜未竟其用云同州志管楫字汝濟咸寧人正徳中進士授刑部主事陞吏部文選郎中能以清苦自持厯任山東巡撫整肅官方甫五月齊魯翕然稱治以母老告歸行李蕭然圖書外别無長物賈志白宗舜字眀廷清澗人以舉人知蒲州蒲素多豪右宗舜一介不取禁絶干謁嚴革諸弊猾吏畏服尋調夷陵亦有恵政賈志恵儒長安人素行清介正徳時以舉人任兖州通判持已甚廉執法惟公有中貴斃民命臺司下儒理之中人懼餽金一罈覆以醬儒即發其事竟置於法陞同知河間俸給外一錢不取致仕歸長安志李東藍田人正徳丁丑進士任丹徒令存心仁厚涖政廉明時武宗南狩中外洶洶奸民乗間為奸詐稱乗輿至東疑其偽執而訊之寘重典召為監察御史廵方江北兩川皆以威稜著藍田志王朝瑬朝雍弟正徳丁丑進士令三河權璫張鋭者縣人也前令皆先謁跪而獻贄朝瑬獨不為禮鋭怒囑冢宰罷朝瑬官選司以其廉正固爭之調鹿邑值沈丘盜起守城有功陞知宿州朝邑志李蘭字秀夫華州人正徳丁丑進士授戸部主事賞軍宣大宣布朝廷徳意軍士感泣後屢管易州保定等處倉又督理永平山海薊州等處糧所至弊絶風清轉員外郎郎中時稱蘭為鐵郎中出知重慶府察民隠戢豪右一郡稱治華州志劉倫榆林人正徳己夘舉人知山東定陶縣值流賊刼掠郡邑所過殘破倫先期繕城練士賊薄城倫躬提枹鼓破其攻具城賴以全又均徭役勸農桑息爭訟興禮讓不二載縣以大治終戸部山西司主事延綏志穆相字伯寅三原人正徳辛巳進士授沂水令兩遇大盜降之歳饑煮粥給食所活甚衆擢浙江道御史巡視東城權貴斂手敕巡三關築隘口四百五十七置器械三萬餘斷囚八百餘案巡按山西開沁水以通溝洫又疏清源太原渠招降青羊山巨盜復巡江西以勞成疾卒西安府志劉邦禎字兆吉華州人以歳貢選為通許縣丞值巨盜髙寵作亂知縣段某惶懼成疾邦禎曰事誠在我乃設䇿勦平之事聞擢曲陽令㑹武宗南幸官民驚惶邦禎諭以事上之義隨宜供應調蒲江令蒲素奸梗難治邦禎莅政嚴明民罔不服以老歸華州志文清字潔之醴泉人監生任射洪教諭人材輩出鄢藍作亂保障有功馬志宋惟忠字守正安塞人正徳中以監生任新都簿禦賊有功民立生祠陞知徐溝政平訟理吏民畏服馬志張偉米脂人監生正徳中令邯鄲廉勤幹濟百廢俱興時薊盜攻畧城邑偉築城為守禦計城西沁河歳患衝激偉導使别流建樓橋築墩臺不踰月事竣宼至環攻不能克邑賴以寧畿輔志秦登字允升咸寧人嘉靖元年中鄉試選昌平學正嚴立課程作興士類擢同知鳳陽淮決築堤造梁於泗工役之費皆所自措㑹歳饑請賑全活甚衆尋補四川順慶肅清軍政陞崇王府長史以輔導自任告歸卒子可久字孟徵舉嘉靖丙午鄉試謁選揚州通判攝江都事亷明勤慎訟獄稱平陞知濵州盡心撫字不避勞怨濵城壊可久為修築之屹然保障咸寧志弟可大字仲容嘉靖中進士授東光令丁外艱起補光山令以績最擢兵部武選主事厯員外郎考察武臣不避權貴尋陞山西參議擢四川副使兵備建昌值土寇沙氐亂撫鎮主勦可大主撫竟以撫定陞山西行太僕卿兵備寧武尋致仕可大幼岐嶷長而頴脱博通五經尤長於詩弟可貞字秀章萬厯中進士為富順令亦有善政賈志盧紳字汝佩咸寧人嘉靖癸未進士知遂寧縣有水患築堤植栁水害永消累擢湖廣副使撫治荆南荆南界連川貴諸蠻搆兵連歳上怒下守臣㑹議紳曰蠻性蠢爾若繩制太嚴恐生他變不若開諭利害俾罷兵息民足矣從之兵遂解陞江西參政瑞州寇起單車諭散其黨擢貴州按察使衞指揮貪暴激變軍士連結諸蠻為亂紳至執首惡餘悉宥之進布政使改順天府尹時有勲貴奪畿内民田數百頃關説京兆紳力拒之擢户部侍郎總督倉場兼理西苑農事清查積貯餘米二千餘萬石以裕國儲拜南京户部尚書賈志閻溥字允周興平人嘉靖癸未進士授刑部主事時光禄崔卿子殺人其子故宰相甥曲為請溥謝曰僕與相公均有官守朝廷法顧為相公屈耶竟論如律出守保定路當四衝兵衞雜揉豪右戚畹武斷漁獵溥一切持以法毋敢肆者癸巳大同搆變朝命勘撫溥揚威布澤反側向化晉副浙臺以為郡時與臺使抗禮捃摭舊事論罷遂不復仕賈志秦世顯字子修涇陽人嘉靖癸未進士任饒陽知縣饒地瘠訟繁多盜世顯裁決如流案無停牘㑹有大盜入境世顯親獲渠魁一人餘俱生擒而還自是境内無盜真定有寇患世顯禦之一戰而平年二十三卒西安府志王良臣寧羌衛人嘉靖乙酉舉人庚戌俺答圍京師以郎署督餉九門著才能出守澂江遷運使錙銖無染正直有聲又同里景承芳官山西副使亦清介有恵政賈志宋宜鄜州人嘉靖丙戌進士授行人奉命祭瀋藩餽送悉却不受擢監察御史有中貴不法疏論其狀忤㫖下獄未幾上悟擢真定太守郡事委積決斷如流驛遞出納前守多私其盈羨宜令州縣自支歳省萬金陞四川參政歳饑請賑活數萬人白草番作亂宜督兵擒巨魁降其衆捷聞賜銀幣致仕卒賈志杜世爵涇陽人嘉靖戊子舉人任内丘知縣㑹世宗南狩供應孔繁世爵俄頃立辦擒刁頑吕崇仁李政等殺於獄築金堤官莊清修尹村四堡置錦繡堂鶴度嶺二口民倚賴之畿輔志畿按陜西及涇陽志俱作世爵輔志作世鬱者誤趙瀛字文海三原人嘉靖己丑進士初授章丘令歳饑賑濟全活甚衆除凶緝盜民賴以安擢知嘉興府轉兵備易州道邊功甚偉遷山東參政歸里時囊笥蕭然賈志瀛知嘉興府事政尚剛毅多所興革疏濬城河以其土運之南湖建煙雨樓時田多逋糧吏縁為姦乃分田地山蕩二則賦額均平迄今賴之嘉興府志馬書林字子約髙陵人嘉靖己丑進士初授河南輝縣令申減上税田三百餘頃改洩久潦地為田五百餘頃輝民頌徳有江西富民王冠者縱慾為惡買人童男女合藥事發王冠求書凂囑者無數且饋千金林一無所受寘之法陞河南汝寧知府時豪宗暴虐書林申革崇王府長史軍校充發邊衛者二十餘人汝民以安轉四川保寧府申減絲綾之累陞四川按察司副使未任卒髙陵志杜坤鄜州人嘉靖辛夘舉人判嘉興府興利除害勸課農桑海鹽大豪賈植恃財殺人坤捕擒按治如法民悦作洗寃記賈志馮友字益卿長安人夙性孝友篤志講學學者稱兑泉先生嘉靖甲午舉於鄉厯任岢嵐知州築城濬濠邊圉以固調忻州以募商飛輓繕修邊垣有功賜白金文綺加俸二級晉保定府同知時嚴嵩當國其僕嚴年以侍教生刺來謁友見刺即笞其人年恚嗾鹽院呉某論歸賈志左思明字五河耀州人嘉靖甲午舉人為永城令修城建橋設倉改驛立太丘書院以教士政績卓然陞知趙州耀州志王宗堯字汝敬由天性字純夫俱富平人嘉靖時舉人宗堯知郫縣興水利設社學天性判合州擒巨盜勸農桑蜀人咸徳之富平志廉傑城固人嘉靖中舉人知沁州能以至誠孚衆一時教化大行冀南翕然稱治子汝為以舉人知應州守正不阿革除夙弊應人為之立祠汝為子第以進士官按察使城固志恵之翰字伯君清澗人嘉靖中舉人官大同通判時雁門糧餉蠧吏多侵漁之翰至悉發其奸寘於法飲氷茹蘖遇事敢為不辭勞怨嘗曰茍利於民此官可棄何恤乎人言子承芳以舉人司曲周鐸教士多成材終戸部主事延安府志楊九澤字子徳華陰人嘉靖中進士為洪洞令擢御史巡按浙江禁奢費革火葬嘗疏請於漳州設重臣及增設月港縣治時稱碩畫華陰志孫昺榆林人徐衡鳳翔人並嘉靖中舉人昺知陵縣衡知髙唐州時齊魯大飢餓莩載道兩人各捐俸賑之全活無筭昺後官南京戸部郎中倭犯南直輸運畫䇿我兵以是克捷衡後知應州亦值邊警守禦有方城不得陷賈志胡昴字文宿扶風人嘉靖中舉人任開封通判治才明敏能摘伏有妖僧善幻形以行汚穢昴剖其奸逺近驚服遷松江倅見婦人在江上哭而不哀宻察之乃繼妻潛隕前室子而詐哭也即逮訊正法扶風志崔璉字宗商髙陵人嘉靖中貢生為崇慶州判抑豪强解寃誣常禄外毫髮不取告病貧不能歸上官為給路費始還里髙陵志王三聘字夢莘盩厔人嘉靖乙未進士授大理評事讞獄多所平反擢僉事河南督屯政兼理驛傳時南陽諸屯半侵於豪糧數影射三聘釐剔一清郵遞供應困絀三聘規畫節省改僉事四川㑹都蠻猖獗三聘主安撫同事者議不合遂歸里囊笥蕭然盩厔志薛騰蛟字時化渭南人嘉靖乙未進士授長治令均賦役恤鰥寡政平民阜累遷四川僉事分巡川東卿尹錢若愚貪墨無顧藉騰蛟即按劾之大盜銅梁朱洪受太平袁廷佐咸肆行刼掠負固不下騰蛟擒勦殆盡征苗之役騰蛟監蜀兵入楚轉饟以時人人用命俘斬七百級捷聞賜白金文綺陞山西㕘議分治大同大同遭悍卒變當事者務為姑息騰蛟以嚴治之一軍肅然已遷副使遂歸不復仕渭南志張紹芳字孝先鄠縣人嘉靖丁酉舉人初仕襄陵髙平教諭正身率士遷沁水令廉介自守請託不行調五臺築城禦寇修學育才民有張青天之謡比倅順天名譽益著冢宰張元洲知其賢即擢河間同知嘗攝府篆庫吏進羡餘三百金叱去歸里囊槖蕭然鄠縣志南逢吉字元貞嘉靖戊戌進士授禮部主事太廟明堂諸大禮屬草多出其手出知保寧力戢奸宄悉與更始暇則萃諸生之嶲者督教之一時得人為盛民有為盜誣者十一人寃十餘年莫能白一訊雪之陞副使備兵雁門慨然曰陣法不習匪我制敵敵實制我今之邊弊有甚於此者乎於是諭三關將士如令甲習之又數廵行三關外軍聲大振條上備邊便宜五事多觸忌諱執政不喜格弗上及考察用飛語罷官賈志髙謙字孫益榆林人嘉靖戊戌進士知淶水縣清謹自守歳滿擢崇州知州及卒州人撤市巷哭貧不能歸州民合賻始還里延綏志喬世寧字景叔耀州人嘉靖戊戌進士授南京戸部主事以僉事按川南時行郡縣奬良罰惡陞湖廣督學所擢拔無愧顔庚戌為河南參政有詔募兵河南世寧部署嚴整時裁損供費諸應募惡少多道亡且擄掠獨大梁士卒無一不法者尋督餉小灘小灘商賈閉糶轉餉無由輸官因即其直以為利世寧令轉餉者分糴旁邑奸商失利而民甚便之擢四川按察使以憂歸賈志王邦憲字後泉耀州人祥符令王志孫嘉靖庚子舉人初授徐溝令政聲茂著陞萊州府通判除舊守魚戸之私去劉瑾蜡税之苦萊人頌徳建祠憲文章氣節關輔稱美子孫為紳士者至三十餘人而國圖尤為顯赫年八十四卒賈志長子國字伯禎中萬厯丁丑進士以庶常授浙江道有權要占民田數千畝悉核實歸之督學江南首拔士如朱之蕃顧起元等皆盖代才復掌河南道管京察備櫬陳封事劾權貴直聲震朝野乞歸終養尋起山西副使時中使勢焰薫灼窘辱寮佐國獨能開陳大義頓令折服由是大僚方不庭謁宦官擢兵部侍郎廵撫保定歳荒賑饑全活甚衆大盜劉應第等聚衆倡亂國親討平之絶餽遺肅屬吏嚴保甲廣積儲善政犁然晉陞蘇督疾作乞歸圖邦憲第三子萬厯丙子解元丙戌進士任翰林典試福建多拔奇俊厯陞吏部右侍郎以讒去起禮部尚書泰昌登極特召起用㑹帝崩憂危朝事歸家病卒圖生平立朝不耦邪黨經筵多所啓沃纂修國史率皆實筆朝野重之庚戌拔俊得人稱盛人擬之為歐陽永叔司馬君實云諡文肅耀州志李應奎字文煥白水人嘉靖庚子舉人知陽信縣以嚴明為理境内肅然值秋水沒田應奎履畝號泣自責百姓皆感泣入春米價翔貴奎詣中丞請發倉以貸中丞意難之奎力請得發民賴以生白水志趙忻字子樂盩厔人嘉靖辛丑進士授長洲令長洲繁劇難治忻拊恤備至獨於黠吏按罪無少貸晉刑部郎中出守保定時值歳祲忻開倉賑之備兵冀州飭器練士隠負長城之望治兵山西巡撫應天所至務鎮静持大體汚吏皆惴惴矜名節盩厔志師桂字近溪臨潼人嘉靖癸夘舉人任青州守治礦盜決梗獄人服其威明時倭寇犯浙檄令監司守令部六郡良家子往禦之桂毅然請行親履行間矢石弗避總督胡林疏薦其才遷守大同奏豪宗不法者九人咸寘於理其歳禄匱乏者以時給之一時豪横畏且愛焉賈志任璜字伯玉臨潼人嘉靖甲辰進士授成都府推官監守倉糧時月俸皆倍支致倉曹多累璜釐其弊出納如數有松潘指揮坐監守盜應抵辠或為乞貸許賂以金璜竟寘之法時當事要功者請加兵瀘叙等衞璜按其迹實未叛乃力請罷師後徵苗兵備邊無不奉命造釁者遂被劾去璜得褒擢任給事中以母老乞歸養卒賈志兄佩字鳴玉達州學正有經濟才臨潼志南軒字叔後渭南人嘉靖甲辰進士除刑部主事改吏部較京闈試甄拔皆時俊擢四川副使遷山東參議墨吏望風解綬後以老致仕賈志子憲仲字子章萬厯甲戌進士授棗强令邑城卑薄憲仲修築遂稱保障抑豪宗發隠盜斷武邑寧晉疑獄利賴甚溥丙子秋奉檄按邊遍厯紫荆等關凡論斥堠修廢軍餉贏縮將領賢不肖悉當碩畫以勞卒渭南志嚴天祥字叔善朝邑人嘉靖甲辰進士知絳縣絳有毆人股致死者累檢之股骨無他天祥察二股骨形色微異嚴訊之乃吏仵受賕潛易他骨囚具服撫按有疑獄下天祥治之無不得徵拜監察御史苑洛集趙仕字丹山膚施人幼負才名與兄瑶嘉靖丙午同舉於鄉知武鄉邑半石田民苦貧瘠仕盡心撫恤清賦均徭懸墾田之令民乃樂業又倡立文社親為訓課文風丕振致政歸行李蕭然壅飱幾不給延安府志張光孝字惟訓華州人嘉靖丙午舉人授西華令剔蠧興利務與民休息西華舊為土城四面受水日就頽圮光孝易以甎三月告竣有王生者為厮養卒所誣臺司已成獄光孝知其誣力出之民大悦服光孝性孝友能文章掞華摛藻下筆千言立就著作多行於世子士鵬宻雲教諭士鯤沁源令皆以文章徳政世其家華州志黄扆字思瞻咸寜人嘉靖丁未進士授衞輝府推官時鄭府以諫忤世宗人乗機誣奏為逆上大怒命三法司按之法司檄扆訊鞫扆獨直其寃陞工部主事居淮上㑹兵變扆通商儧運開屯覈餉吏不敢奸叛軍帖服陞知彰徳府尋致仕咸寧志孫一正字格卿渭南人嘉靖癸丑進士授户部主事厯遷山西參政駐汾陽時雲朔多驚一正拊民振伍卓有方畧厯順天府尹振刷綱紀釐剔奸蠧部内肅清尋以病免一正性貞毅不為威利所移尤篤於孝友渭南志琡字成玉一正子萬厯乙未進士授東光令興利祛蠧調翼城翼城民疲俗悍琡均徭薄賦慈愛有加擢水部主政慎出納革積弊以勞瘁致疾卒賈志孟重字汝器渭南人嘉靖癸丑進士厯固始仁和滑縣令以才著名累遷懐慶郡守擒盜魁李應乾尋陞河南㕘政分守大梁復以擒巨盜擢僉都御史巡撫上谷終兵部右侍郎渭南志李從教字伯勉同州人嘉靖癸丑進士性重厚質直知淶水縣調歸安時方有倭警從教修水關置邏船倭不敢犯遷戸部主事轉郎中督餉雲中出納惟允陞知河南府改除䕫州未發卒同州志屠濟興安人嘉靖乙夘舉人任山西長子縣知縣秋毫不取沍冬著敝鞾無裼民有以罽襪進者正色曰若墨我叱去宦歸親識至以囊鏹問捧腹大噱曰官歸不問官問鏹吾豈以鏹官耶問者悦服興安州志李世達涇陽人嘉靖丙辰進士授户部主事厯陞僉都御史巡撫山東督漕河以寶應湖險惡歳漂舳艫無算請開越河以殺水勢為百世利晉南吏部尚書甄汰悉當後入為刑部尚書多所平反時權璫勢張甚世達疏先治禁近供事徐正首惡以杜禍源已為左都御史申明憲典俾巡撫無得以問餽相遺一時苞苴盡絶卒諡肅敏涇陽志楊兆字夢鏡膚施人嘉靖丙辰進士任紹興知府以卓異遷宻雲㕘政著邊功晉都御史巡撫順天嚴烽燧時訓練陞刑部尚書厯兵部尚書禁衞皆虚籍兆簡稽不避權貴軍政肅然遴選將士多得其用延安府志黄九成字引南城固人嘉靖丙辰進士授戸部主事陞員外監税崇文門盡汰溢額以清慎著名尋陞郎中㩁蕪關税務以餘金充上額二萬陞臨清道副使告歸賈志張士佩字玫父韓城人嘉靖丙辰進士授紹興府推官擢御史每疏入肅皇輒報可按山東調停海運安輯遼左流移咸稱碩畫遷守嶺北土寇葉楷作亂士佩諭散之有盜當三省之交嘯聚百年士佩議立州於程鄉興寧安逺武平四縣間俾保甲互制盜遂息改山西參政汾水汎濫沒民田士佩築猪城濼以時蓄洩遂成腴壤持憲東省齊東藪盜者十餘家廉得實殲厥渠魁盜為之盡晉右藩以水災請除魚臺諸邑寄養馬匹歳省民財巨萬總晉藩凡所解税不啓封即行轉解開府西蜀奉勅丈地盡釐隠詭重賦者縁是得蘇長官司土舍阿祭行萬金賄謀冐襲士佩治罪不少貸天全司土司楊時春以庶孽謀襲殺應襲者作亂士佩生擒之永寧宣撫司土婦奢世統爭印讐殺互奏廉得世統與邊目奢進忠茍合乃暴進忠罪許自新仍歆以厚賞進宗懼陰為我用世統遂帖然就勘卒正其罪又董卜烏慮冉維屏稱兵作亂俱以計討平之成都兵戍威茂監司發行糧稍遲遂鼓噪士佩急命啓門呼入曰此非副使所得主吾當給之衆遂散致仕歸嘗自誓云吾有三事在官不取贖鍰遷陟不用賂賄居家不行請託終身不愧斯言賈志澽濵撫蜀時有成都同知張元善者亦韓城人土司搆亂元善入幕參贊軍事謀畫周詳論功擢順慶守聽斷如神發寃釋枉一郡稱治韓城志宋承殷字伯賢鳳翔人嘉靖戊午舉人授沔縣諭嚴課文藝寒士不能婚葬者每周之陞通山令薄賦省刑有兄弟争産數年不息諭以大義竟相遜讓有凶豪數不法前令皆姑容之遂為所制承殷至寘於理惡風遂化鳳翔縣志劉時達金州人嘉靖戊午舉人知大竹縣時寇賊嘯聚達宻布方畧捕獲凡二百餘人奸宄至此斂手四川通志朱擢字徵庸渭南人嘉靖己未進士授安邑令政在恵民不阿上官以執法左遷廬州府教授正已率士累擢南戸部主事㩁税杭州往司税者以羡多為能擢獨減加額尋調戸部主事㩁都門税請託盡絶厯遷員外郎中鄖陽郡太守政務大體戒苛察鄖人尸祝渭南志范燧字以木郃陽人嘉靖己未進士累擢河南㕘政居家孝友厯官清約裁㩁金通滯漕擒妖僧除大猾宦轍所經人咸頌之子湜宰岳陽有能名賈志陜西通志巻五十七上欽定四庫全書陜西通志巻五十七下人物三廉能下明侯職榆林人嘉靖辛酉舉人為介休教授擢山東鄒平令歳饑盜起職捐俸賑濟躬詣盜所諭以大義羣盜立散遷大名府通判管宣府南路事時代藩占屯田地七千頃職力爭得還宣大屢警至是挾爭馬價督撫知職才檄董互市職兼示威信邊患始弭尋致仕歸延綏志王學古字子獲朝邑人嘉靖壬戌進士為夀春令調廣宗以治行第一擢判順天府尋遷刑部員外郎具獄多力爭平反無算調户部遷郎中清苦自砥忤中官出知漢陽府地衝疲又多盗學古丈田均役盜息民安一方稱治學謨字子揚學古從弟嘉靖癸丑進士初知太谷縣持已廉明令行禁止後治兵岢嵐嚴禁冒功殺降於河堧築邊墻益築老營堡及賈陀乃河二堡俺答將以十萬衆入邊學謨知三關不足恃建議請隔鎮兵為犄角督撫不聽遂陷石州坐謫戍萬厯初陞山東㕘政政績茂著告歸卒朝邑志鄭札字伯文澄城人少有志操負笈馬文莊之門砥礪行業嘉靖甲子舉於鄉起家學博轉信陽尹期月大治以憂歸起補新樂裁冗拊罷不勞而政舉以髙第入為戸部主事出知䕫州皆有能績陟淮陽鹽運使剗蠧恵商二年卒於官同州志劉自化字伯時髙陵人嘉靖乙丑進士除户部主事司崇文税令商各以物自占寛算緍額商困大甦司草場却千金饋司太倉銀庫得前盜臣主名奏治之大司徒以漕糧過期遣自化往督自化并道抵淮布憲令漕艘爭先至徐城河忽夜決自化披衣大呼巨艦載土塞城城完漕糧無恙除岳州臨湘故無城取關市賦成城民不告勞平江盜出沒吏莫能討自化入境擒渠魁散其餘黨改守登州築城如臨湘青登萊三郡逋賦至萬上書陳之司農蠲逋税而奪其俸自化大喜曰以吾俸省民脂膏吾所受贏矣兩調山東浙江都運使俱以廉稱遭父喪歸遂不出子復初字貽哲萬厯癸未進士授户部主事調兵部時有事朝鮮大司馬欲以封貢羈縻之復初力言不可大司馬為之屈出守上黨歳大饑民多轉徙時苦地産之征乃㑹計庫藏餘金補之又省站銀歳千兩以牛種給民墾田萬餘畝積粟至二千石郡乃饑而不害尋以飛語降廣東市舶提舉粤有税銀五十萬素不及額中使持之急復初反覆開説歳止賦十二萬擢淮安同知後持憲川瀘川人曾良弼唆土官攻筠連城復初計擒良弼父子斬之土官奢崇明與雷安民鬨復初遣人諭止之尋勅駐陽和順義與索囊陰相結七年不貢復初至築城堡練戎馬遂通貢如故調薊門陞太常告歸賈志王庭詩字言卿華州人嘉靖乙丑進士授内黄令政聲甚著時王元美備兵魏博有三郡一令之稱厯藩憲荆楚多異績賈志趙應龍字時化涇陽人嘉靖乙丑進士授伊陽令伊賦輕重不均應龍以九等定民賦賦乃平調臨淮有尸浮水不行應龍宻廉得三人攜一婦同舟者收鞫之乃婦殺其夫而投諸水也論殺三人政治赫然江淮間行取湖廣道監察御史按屯牧事減騶從薄供億條奏數上皆關治理惜未竟其用而卒孫虞佐萬厯丙午舉人厯官汝州兵備居官有廉操先任揚州府時民稱為趙不要云涇陽志韋文英字徳華嘉靖中舉人知陽城縣有大猾素凌轢其官稍不如意則訟陷罷之文英捕按伏法境内肅然同時宦績著於三晉者有鳳翔何廷琦南鄭毛一鳳汧陽張恕華陰呉講城固方䇿洋縣紀㑹廷琦大寧令力行教化盜賊悉為善良一鳳蒲縣令加意人文椎魯悉知弦誦恕任平遥聽斷大獄曲盡情偽講任萬泉編審丁户破格開除䇿官靈丘革耗羨郄餽送㑹任翼城撫凋瘵恤荒殘咸稱良吏舊志張思靜字伯安同州人祖績官容城令有恵政思靜嘉靖中舉進士授翰林改禮垣嘗劾奏英國公某鄔都尉某不法事權貴憚之出為四川參政督採木之役官民樂其不擾有汪四者倡白蓮教稱亂思靜用計擒之丁艱服闋再起分守河南擢觀察使以病告歸同州志馬永亨字健初韓城人孝廉司訓房山正已陶士即陞房山令性直質嚴取與常禄外一無所染真心實政人不敢干以私改河間同知嘗三攝府事視羨金若凂遷應天治中監織造往例有様段永亨皆却之陞常徳知府告歸自司鐸至太守厯官三十年清節始終不渝同州志張鎛字伯始武功人嘉靖中進士令曲沃有豪紳占丁役罄一里歳辦數百金鎛力裁之遷大理寺副數辨疑獄多忤權貴終蜀府長史武功志康河字汝修徳涵弟武功人授戸部主事理鈔關通商裕賦出守兖州培本抑末植善布恵以循良稱移守廣西殫力効職不畏難不辭勞不避嫌不規利以是馳聲亦以是賈怨再徙贛州遂移病歸里武功志米輔字良佐臨潼人由太學生判隰州督理糧餉纖毫不染教民興水利歳收稻萬餘斛又有溫湯者州及屬縣分耕其地州民多頑梗抗賦聞催科者輒持兵相向輔至諭以大義自是輸將恐後及歸吏民遮留載道臨潼志史載民渭南人初任昌平委吏先是為吏者率以虧折逮捕去載民約已勅法報竣後粟豆羨至千三百有奇後任羅山九里關巡檢有豪强恃山險窩盜載民設計擒獲羅令某素怨邑中富人誣以通盜當道檄載民訊其事被誣家持金為餽載民即唾叱擲出鞫訊虚公誣者得釋有潘某者私人妻而夫被殺獄經年不決復下載民潘以金杯白金綺縠托𨽻役為夀載民笞𨽻幾斃潘洎婦咸正法渭南志張士奇字秦麓宜君人痛親蚤逝置廬荒隴日依松楸間丁夘恩選授永清令潔已愛民纖塵不染擢守通州是時貂璫肆燄諸中涓賄賂公行士奇力拒之檄罷運木車歳省民費三萬金修築舊城疏通運河勞績大著上賜璽書金爵二盖異典也擢開封郡丞盡心河防中州得免水患以疾告歸祀名宦賈志李時孳字茂夫洋縣人隆慶丁夘舉人初任郿縣教諭教士有法陞長沙推官佐刑明允擢御史巡按遼東多著勞勩以忤時貴補䕫州知府陞山東副使督學關東所至美政著聞取士尤稱得雋賈志王繼祖字克紹咸寧人性孝友隆慶戊辰進士授兵部主事監税山海關謝絶餽遺陞武庫司郎中諸司支費甚繁繼祖謹出納明簿記陞河間知府政聲為畿輔最以直道不容罷歸薦起補南陽知府抵任當歳歉流移載道繼祖多方賑濟全活數萬尋陞副使告歸咸寧志張世烈字葵亭延安衞人隆慶戊辰進士仕開州牧刑清政簡有古循良風轉戸曹出守青州表率僚屬清操益勵晉左方伯終太僕卿延安府志羅奎字文光淳化人隆慶戊辰進士任上蔡令有羨金五百奎為募夫繕城著為令田糧久不均奎履畝勘定積弊一清邑故多豪猾悉按捕論如法以治行累擢兵部郎中出為萊州知府㑹歳祲莩流載道時府治城堞多傾圮奎曰古有興役濟饑者非其時耶乃募工修築量食支給城工速竣而民賴以存又杖殺土惡擒治礦首洗誣理枉鋤强扶善循政難以悉數未幾以讒歸袁正撰墓志薛亨字道行韓城人嘉靖辛酉舉第一人更十年成進士授户部主事督餉寧武時戍卒築堤請倍給餉或議加賦亨不可裁甲馬芻秣之溢額者畀之著為令遷刑部員外郎擢山西提學僉事教先徳行而後文藝遷山東少參督泰山香税屬歳大祲市粟賑饑市牛助耕遷楚副憲理屯鹽水利正經界繩兼并民困大蘇遷四川參政治涪大修學宫訓涪士民俗為丕變遷山西按察使治兵昌平尋徙汾州强宗聞公來凛凛受要束平停獄數十百人置學田養士遷河南方伯汰筦庫宿弊中丞某薦於朝而晉人議其後坐罷歸李維楨撰傳陳宣永夀人萬厯初年由進士知河南府留心學校加意民瘼興修渠堰為一時恵政河南通志韓希仁字孟元涇陽人萬厯癸酉舉人授髙宻令勸農給種三年積倉穀三萬餘石荒歳民賴以生陞知潁州平康中有陰殺游子弟者具首子弟殺娼自刎希仁曰即具首者殺之也竟抵死潁民咸服其神丁艱補濵州濵有巨盜為院司役或首之希仁佯叱曰安有公役為盜者乎故毁其狀宻報院司請付法賊黨遂絶陞襄陽同知清軍伍稽尺籍覈虚糧積弊一清督修老農堤以捍水患尤屹然為江漢保障云涇陽志郭如魯字唯一朝邑人萬厯癸酉舉人教諭平遥歳荒盡捐廪米以賑丙戌成進士知曲周縣俗健訟如魯以徳意感諭訟者日寡遷同知東昌府攝臨清廉其巨猾剔治如法州故舟車算賦地易為緇染如魯嚴禁内外不使關通廉聲大著以病乞歸朝邑志張邦敬字簡甫韓城人萬厯癸酉舉人任嵩縣令擢河南郡丞鹽法屯政多所整飭陞敘州知府敘荒裔文教殘缺邦敬為刋四書五經於府學安奢土司叛亂大兵勦之邦敬理餉有功陞安綿兵備副使調雲南金滄兼攝督學革土番私貢之金勅營伍時閲之制號一方保障陞貴州左參政歸里韓城志晉臣字孟藎長安人父爵官西城兵馬司戇直有聲臣萬厯間貢生任光禄寺署丞狷介自持常俸外纖毫無所取人咸以廉吏稱之調元臣從孫為館陶令救荒恤貧多所全活以守城功陞兵科給事中賈志張養才字汝才同州人萬厯中進士為行人三奉使藩國不受餽遺轉吏部主事厯四司秉公佐銓為冢宰所倚重終太常少卿同州志翟事心字鑑寰朝邑人萬厯中舉人為保昌令政治一以誠實不欺為本民胥化之喜拔才雋以道徳相砥礪陞東昌通判朝邑志常澄字希憲蒲城人父廷奎官青州同知以威稜著澄幼即好學舉止莊嚴由進士厯臨漳東明二邑令恵愷有聲擢吏部主事嚴禁餽送杜絶請托人無敢干以私者予告歸蒲城志呉永圖字維懐韓城人萬厯癸酉舉人為榆社令邑素凋敝永圖極意撫循課士勸農恤孤拯弱辨寃獄發誣枉榆民稱為呉青天編審催征尤愜輿情素性耿介不善逢迎當事者忌之中下考居榆三載行李蕭然韓城志葉期化寧羌衞人萬厯癸酉舉人任汾州推官為政有風裁且敏於聽斷多辯寃獄人服其明寧羌志雷大道字行卿朝邑人萬厯癸酉舉人知廣陵縣時大祲捐俸以賑墾荒千餘頃遷通判兖州署府事却常例數千金以母老告歸賈志郭性之字鹿坪華州人萬厯甲戌進士官河南布政使惇大寛仁用心精宻民間疾苦無不周詳決疑獄籌兵餉區處悉中條理致政歸人咸歌思之華州志陳諫字直卿華陰人萬厯甲戌進士為内江令素履小心精明端亮猾胥莫能欺擢户曹轉餉榆林以勞卒華陰志李士達字伯順三原人萬厯甲戌進士授中牟令擢南京江西道御史謇諤著聲忤江陵出為四川僉事㑹天全黎州永寧三土司亂平之擢敘州參議征賊有功厯陞四川布政使管川東事單騎往征流賊事甫定以艱歸遂不復出賈志王致中字懋和寧羌衞人萬厯甲戌進士任兵部主事因清直取忌謫河南知事尋陞靈寶知縣靈素苦衝疲致中救荒恤驛靈人感之祀名宦賈志馬樸字敦若同州人萬厯丙子舉人授景州守勤幹嚴明㩁使王監横甚景民被逮株連數百人民大譁樸為數税使激變罪諭譁民解去順永張監議加税河間上官已許樸格不行歳荒疫煮粥醫病安流移贖子女全活甚衆以憂去服闋補易州擢襄陽守積穀備荒倉庾完實復堙占塘百二十區修南漳堰得腴田若干頃革襄樊均州光化雜税後遷滇憲告歸賈志張徵音字祚康朝邑人萬厯丙子舉人知山右某縣調河南孟縣作堤以障黄河時稱張公堤又調寶豐政務優閒徵音智畧輻輳有當世才限於資格不得竟其志在山右時城守禦盜用鉦鼓柝鈴四物辨方向後遵用之又著論謂地寡者各於其地如地網法半髙半下以備水潦不惟田得利且可設險其他設施多類此弟綸音字祚欽萬厯辛丑進士官湖廣副使以威稜著朝邑志白希繡字夢山延安人萬厯丁丑進士授魚臺知縣邑瀕河民苦濬築往往避役希繡喻以大義民樂趨事擢吏科給事中丰裁凛然出為參政陞都御史巡撫山西墨吏望風解組延安府志馬協字恭甫同州人萬厯乙夘舉人授廣宗令邑民以賦重多逃徙者協至榜招開墾度地居民村墟復實改新鄭縣縣多冗役冗費繇賦不均協力為清理裁抑汰去二千餘緡遷禹州逋負積二十年協履畝度田以次豁免以俸足其額值旱疫協為賑濟醫藥發倉粟六千石賤直售民民賴以寧擢鳳陽府丞清寇捕盜時屯運久為累協於屯則議覆荒田時徵收謹委任行改折於漕則議修糧船選旗軍甄運官禁關津稽留嚴吏書需索皆為一時碩畫遷守辰州辰與苗接境協修築邊墻辰民困於漕木協力請減運生平方嚴剛果自少秉清約服勤茹淡不妄交遊賈志李時茂乾州人萬厯乙夘舉人天啓間為黔中郡守重學校恤軍民值苗衆圍城與民固守多所斬獲後卒於官貴州志王嗣美字實之朝邑人萬厯庚辰進士為太原推官持已廉約聽斷明允擢南戸科給事屢條時政缺失遷山西河東道有豪宗屢殺郡人有司莫敢問嗣美按治如律轉江右糧儲徵發押運夙弊一清再補河東道拊恤教養曲盡其事遷山東驛傳以病乞休賈志武紹祖字克光涇陽人萬厯壬午舉人初授濟寧州學正厯遷四川保寧府知府三巴産茶久為民患紹祖悉蠲去鹽課故㩁井井有枯有實有鬻按井而㩁無得免者而新井以供他費紹祖獨以新井應㩁商困大蘇擢兩淮鹽運使卒涇陽志賈嶼字魯玉渭南人萬厯壬午舉人授襄垣諭文教大興尋令崞邑革冗税墾荒田興水利招流移葺廟學繕城池聽訟公平民以不寃條上邊務十餘事著為令三年移大同通判遂辭歸渭南志王如皥字允淳朝邑人萬厯壬午舉人授鄖陽同知值歳凶為分地立限以賑再補永平攝灤州却常例金税璫勢方張請脱其私人之罹於法者如皥卒論如律擢知貴陽府經理蠻部方畧輻輳制府郭子章每諮訪焉議建貴定縣以增守禦創恤隠局以尉羈旅丁艱歸起補兩浙鹽運使奏最為天下第一後告歸朝邑志牛應元字兆坤涇陽人萬厯癸未進士初任光山知縣創條編法與民休息創建社倉積義穀六千三百石有奇時光歳貢葛為民累應元募匹自織自解光人徳之三載政洽民和有産麟之異陞四川道御史按鹺兩浙力剔奸竇巡方應天時值權璫開礦借端擾富室應元捕其黨繩之法璫稍稍戢累遷中丞撫南贛飭武備核將領拔才能禁苞苴立社學暇則坐臯比諸生質疑問難不復知開府之尊拜南大理卿刑部左侍郎予告歸賈志文運熙字和一三水人萬厯癸未進士以工部主事㩁兩淛木税力剔重算商賈為建生祠擢㕘議條海防權宜諸倭不敢犯賈志周道直字泰宇臨潼人萬厯乙酉舉人筮仕藁城河水為患築堤二百餘丈民賴寧居革行戸裁冗役以阜民便俗為務擢戸曹𣙜税潯陽裁船課一萬二千金以蘇商困歸來攜磁器數種而已後守閬郡值渝州寇變三川震動直親提一旅扼梁山之險以障全楚又義激石柱土兵解成都圍方敘功酬庸引疾歸賈志崔國裕字仲豐西安右衞人萬厯戊子舉人官泰州知州招流亡墾荒蕪擒巨盜捐貲賑饑全活數十萬人子爾進字抑菴萬厯甲辰進士授長子令躬行化導變悍俗為醇良擢御史巡鹽兩浙時議增額爾進力為請命乃如故按福建聞父有疾拜疏侍養即日就道後厯戸部右侍郎賈志孫崇先字重之扶風人萬厯戊子舉人初任䝉城知縣陞潁州知州剔弊懲猾人莫敢欺嘗出郊羣蛙遮道使人尾之去蛙止處掘得伏屍知有隠寃拜禱城隍神求雪其事是夕夢一馬負纓入中門寤而思之訪有名馬上英者執訊立服衆咸驚異擢貴陽知府賈志第五嗣先字石嶽三水人萬厯戊子舉人為贊皇令建學宫崇文教立義倉修荒政尋擢金華郡丞告歸賈志黄道亨咸寧人萬厯甲午舉人知祁州修文廟立社學飭保甲均徭役覈詭𣲖革耗羨未期月而政成歳荒捐俸煮粥救濟招流民開渠墾田得數千畝利賴至今畿輔志李仙品字雲卿髙陵人萬厯乙未進士初知長治長為潞郡首邑歳貢紬疋舊例於道府縣日送様紬仙品力請革除擢揚州江防同知嚴緝江賊累擢川北道㑹奢賊猖獗奉勅監軍親冐矢石搗宂直入翦賊首奢崇明遷偏沅巡撫復討安賊獲勝尋告歸卒賈志弟仙風崇禎戊辰進士巡撫河南值流寇披猖州邑殘毁甫下車百方招撫湯陰西山土賊蜂起躬履行陣勦滅之城得不陷河南通志來儼然字望之三原人萬厯乙未進士為太和令躬行阡陌勸課農桑有孝弟力田者表其閭戒飭士子烝烝向化期月邑大治晉兵部職方司主政三原志解經邦字叔憲韓城人萬厯乙未進士授嶧縣令嶧田蕪民徙逋賦至二萬經邦請捐積逋民稍集即為建屋市犢具耒勸耕計創官莊三百二十七間茀田二千二百二十四頃入為户部主事督海新二倉節羨六萬厯遷宣府巡撫宣兵驕惰經邦按部治之又寧武援軍肆掠經邦縛首惡八人立寘之法疏請天下援兵所過制撫得行法上是之加兵部右侍郎經畧遼東且行以母病乞歸經邦素喜讀易春秋盈虛邪正間數致意焉賈志趙可行字子達盩厔人究心時務兵法水利無不精詳萬厯丁酉舉賢書為中牟令政平治理數月調永城時多盜當事議屯兵以禦可行請罷兵給民牛種事遂定又厯夏邑即墨二令安丘盜起擢萊州郡丞捕魁散脅事平調太原督餉寧武招撫叛兵有功黔南土寇披猖經畧薦之擢守思南可行明於兵事動中機宜未竟其用而卒徐開熙撰傳李繼志字繩叔府谷人萬厯丁酉舉人除宿遷令山東饑民二萬餘口入境皆賑濟全活之轉西河㕔督船却木商常例數千金厯官兩淮運同賈志子國瑞以恩選官户部員外有廉名延安府志邵可立商州人萬厯戊戌進士任山海關兵部主事廉直剛斷加意人文建文昌書院購古今遺書以教俊彦嘗三劾貂璫四減關税修鎮東樓工師苦無大木忽海上浮若干至及落成無贏餘者亢陽不雨三禱三應士民咸歎異之畿輔志劉士璉字翼明三原人萬厯庚子舉人少事繼母至孝天啓中擢司刑權璫専恣士璉獨拒抗不附崇禎八年任達州兵備流賊寇成都官民束手無䇿士璉總理八門設法扼守危城以全敘功晉本省方伯賈志曰俊字虞臣士璉子崇禎戊辰進士擢諫垣疏通水利損金修渠數邑獲利累官宻雲總督三原志魏良槐三原人萬厯庚子舉人初授冠縣令兼攝丘邑篆先是銀馬俵解必僉𣲖富戸有一役未終而家産已破者良槐至官買官解民無包賠之累己未歳大祲煮粥救濟值兵興邑應出牛兵餉銀良槐軫念饑荒不堪重困捐助以免加𣲖民肖像祀之冠縣去思碑記陞蒲州知州減賦備荒卓有善政河中頌言録遷知平度州州舊有仲哥莊集因年荒逃竄集無人煙良槐招撫流離人皆復業時有麥兩岐穀雙穂之徵平度州集田有年字立烝扶風人萬厯庚子舉人知江寧縣時魏璫遣内守備至留都横甚有年力抗之幾陷不測齊庶人與妖僧瑞光謀逆有年覺察緝獲之擢户部主事𣙜兩淮税輸羨銀於官陞知袁州府五溪洞蠻叛有年帥師定之告歸賈志楊應震華陰人萬厯癸卯舉人厯守衡州持已廉介官俸外一切不取勸民息訟案牘蕭然以直道不善事上官為人所中去日敝笥羸馬居然寒士士民號泣追送擁不得行有父老奉盆水以進者慨然酌水飲之民勒碑以志其事湖廣志胡茂字淡明耀州人萬厯癸卯舉人為漢中教諭值歳饑請尹賑恤尹弗許茂自出衣物率士庶以賑全活無算竟以是忤尹罷歸賈志賈師逵臨潼人王永福醴泉人李燦然華州人馬從朱同州人萬厯癸卯同舉於鄉師逵為平原令勤敏剛斷陞知趙州益乃心民瘼興利除弊孜孜然惟日不足遷官趙人詣闕請留乃復守趙晉郎署陞滇南參政平吐蕃有功永福為黎城令極意撫循不事操切及歸黎人肖像祀之燦然為齊東令為政先教化而後誅罰一時吏畏民懐風俗烝烝日變從朱知黔陽黄縣太平三縣捐介自守飲水茹蘖卒於官貧不能斂舊志賈克忠字獻我淳化人萬厯甲辰進士任黟縣令以仁明稱陞刑部主事審録四川出寃獄一百六十人蜀人至今頌之淳化志眭時聘字任衡澄城人萬厯丙午舉人為延津令請蠲荒地賦民頌其徳知渾源州鑿水渠令髙下可受溉畝致一鍾遷鄖陽太守卒賈志李聯芳字同春朝邑人萬厯丁未進士知洧川時巨盜二紅四紅横行郡邑聯芳督民兵擒渠魁破散其黨調真定馭吏嚴明自奉至廉遷戸部主事𣙜臨清税㑹大旱舟阻商困抗疏謂商亦民也寧虧在官無虧在商尋陞員外郎卒季弟繼芳字蘭畹萬厯癸卯舉人知三河縣減浮糧三千金長兄時芳萬厯乙夘舉人仕知州亦有政聲朝邑志李采字質軒咸寧人萬厯丁未進士初知嘉定不私羨金尋督餉大同兵備冀北滇南修理戎政董勸農功俱有成績進江南布政使抑權璫肅僚吏風裁卓然為時砥柱咸寧志馬之陞字耀寰綏徳州人萬厯中進士官大理評事多所平反𣙜税九江裁加耗之税厯荆楚驛傳道募榆林精勇直𢷬賊巢流寇驚潰攝廉憲抑奔競崇恬退不法者望風而靡居鄉尤好施慕義人至今稱之延安府志武文達字衷懿涇陽人萬厯中進士授鄆城令勤課耕織聽訟先出溫語而徐以一言折之民胥悦服厯陞寧前道涇陽志趙於達字汝儀盩厔人萬厯中進士授行人擢御史巡按直𨽻督漕運時鄒滕盜起運道梗塞於達日夜竭蹶廢寢食者五十餘日漕事甫竣以勞瘁卒西安府志秦鄰晉字汝睦渭南人萬厯中進士授刑部主事多所平反出守順徳慈恵廉明誠心實政以才調真定治亦如順徳時陞四川副使終養歸渭南志王于陛字啓宸朝邑人萬厯丁未進士厯官岢嵐兵備道流寇掠代城親率兵戰敗之獲其渠魁特陞布政使予告歸朝邑志趙勉字兢喻朝邑人萬厯壬子舉人授新蔡令新蔡夙號疲敝兼多啙窳勉躬詣阡陌指授錢鎛民始樂業又剔積蠧雪寃獄卻羨金卓然以廉明為治新蔡人尸祝之賈志楊國柱字叔堅涇陽人萬厯癸丑進士授泰興令泰興田多濵江坍漲無定漲入豪右坍累貧民國柱以千畝為一區使不得混淆徭賦以平厯官兵備河東時賊犯隰州國柱整旅誓師擒劇賊混天龍等斬首千餘級賊乃遁歸里日囊槖蕭然涇陽志成琰字鎮寰朝邑人萬厯癸丑進士除鉅野縣調武强興利除害愛民如子遇歉歳蠲俸以賑之遷知䕫府清直益著減貨税置義倉農商感頌卒之日貧不克辦葬賈志潘學曾字省予華州人萬厯癸丑進士為保寧府推官政尚簡靜每行部凡厨傳炊爨之具一一罷之訊獄剖決如流務以得情為主一時有神君之號丙辰􅉰寇流刼學曾監軍督餉拮据矢石間遂獲渠魁兩川以寧尋以勞卒華州志耿志煒字明夫武功人萬厯癸丑進士授荆州府推官荆俗健訟煒遇訟者必先以大義喻之令歸思三日然後理有一繼母訟前室子者煒曰汝訴先室子彼必仇汝子是汝自戕汝子也令歸思之遂為母子無間荆地瀕江澌洋二洲屢被水害煒築堤三千餘丈人得樂業稱其堤曰耿公堤擢吏部以宦監用事請告歸崇禎己巳再起銓衡内勵氷操外營劇務尋陞提督四譯館少卿以母老告歸卒於家賈志楊楠字毓秀涇陽人萬厯乙夘舉人授寧鄉令時旱荒又流寇猖獗徵檄無虚日楠處置得宜轉輸不匱以勞疾卒官弟梧字鳳閣萬厯壬子舉人任青州府同知與兄友恭甚篤時人比之元方季方涇陽志梁棟字伯材安定人家長安登萬厯丙辰進士知泰興縣倭寇猖獗棟練兵守禦倭不敢犯告終養歸子九賦萬厯癸酉舉人知西充縣疏鹽課之累民為立石長安志寇慎同官人萬厯丙辰進士授刑部主事調工部出守蘇州值大水歳饑立法全活復捐俸以足漕糧開濵海淤地請減賦額蘇人賴之陞昌平副使轉山西勦翦毛賊斬獲四百餘級調朔州告歸賈志逆璫矯㫖逮周忠介於呉呉民知撫臣某以畜怨中忠介欲甘心焉某慼甚挾郡伯寇公為解民見公輒叩頭呼曰公能治呉人不能活周吏部耶公用好言勸慰民伏地悲哀久之卒殱緹帥撫臣乗間幸脱挾公力也撫臣既免則心惎公得民又内愧益逞其毒欲旁摭縉紳廉茂之有志節者公又以危詞力爭某稍稍懾益猜公右諸正人日夜刺公短公廉明無間且終憚公得民不能有所加徐汧寇守去思碑跋張鑛字陽宇中部人舉明經知武邑縣居官廉介斂賦不取毫釐輸解有不敷輒出金以償之時武邑多盜有魏孟祥者都御史猾胥也庇盜而分取以自潤人弗敢問鑛鞫得實孟祥懼賂當事囑免又餽二千金鑛正色拒之竟按以法遂忤上官挂冠歸躭玩林泉人皆髙之延安府志衛先範字象極韓城人萬厯乙未進士令襄陵襄有河患先範造浮梁民稱曰衛公橋又加意作人談經課藝名儒多出其門乙丑擢吏部主事胥吏假印為蠧先範至首釐之以忤魏璫告歸尋起考功轉文選嚴絶私交毅然以簡賢為己任時有鐵板釘子之謡内璫馬化龍欲有所托先範峻拒之遂中傷去韓城志盛以達字子從潼關人居家盡色養以廕除戸部檢校擢本部照磨摘發冒支官軍俸糧二千六百餘石盡追還帑時有百戸犯科為薄罰全其祖職百戸暮夜挾金以謝以達叱之陞後軍都督府都事轉經厯剔奸飭法省勾稽免徵輸敝竇陋規刮却殆盡所𨽻十七衞翕然頌之墓志張三汲字禹門華州人萬厯中舉人初授天長令以憂歸復除沅陵令操守廉明刑清訟簡多著愛民之政沅民戴之若父母焉賈志馬逢樂字叔遇三原人萬厯中舉人為天雄判遷莒州守值大飢捐俸以賑之全活無算終遼州知州三原志雷翀字翔宇郃陽人萬厯中舉人任絳州知州郡中飢饉翀以家所儲粟逾河以濟絳絳人深徳之郃陽志梁廷建岐山人萬厯中進士官大理寺寺正多所平反出守河南廉明仁恕嘗請㫖賜程邵二賢後裔為博士俾供祭祀士論歸美厯川南兵巡道引疾歸值流賊猖獗養義兵以保護岐城土人立祠以報又同縣曹暹天啓中進士任猗氏人感其徳巡按江淮振厲風采肅清僚吏尋㕘議冀寧平晉藩之亂釋久沈之寃及告歸寇攻岐城出夙養壯丁守禦賊驚潰城賴以全岐山志李喬岱字宗甫洋縣人萬厯中進士授休寧令斷訟如神恤災禦患盡力民事陞工部主事尋以戸部員外𣙜税滸墅正供之外毫無科斂陞萊州知府喬嶽喬岱兄也厯官至鶴慶知府亦廉明有聲洋縣志陳瓚字玉崗潼關人以明經授氓州訓導陞大邑知縣清正和平恵義兼盡革除火耗纖芥不染力行教化幾致無訟民有陳青天之謡潼關志第五緯三水人萬厯中舉人學宗横渠躬行實踐初廣文於郿重修横渠祠陞萊安令慈恵愛民勤懇課士擢兩淮鹽運司副疏通鹽法禁絶苞苴廉聲益著賈志王維精字環中萬厯中舉人由教諭陞知肥縣㑹山左盜起捍城有方畧陞知應州州地險民困惟精撫循休息政聲卓然朝邑志劉子諴字叔貞宜川人以明經授湖南訓導教士以不欺為本立行藝二格有善者記之行勤誦讀者記之藝擢鹽川令陞横州持節定交阯之難所至皆有治績賈志宜訓字孟庭華州人以恩貢授峩嵋令時邑山南多水患訓鑿山引水蓄洩有法灌溉民田數萬頃民胥賴之遷東昌府判尤多善政報最晉永寧知州因母老告歸華州志左史字子箴耀州人以明經除光州訓導署遂平固始皆有異政遷知扶溝吏舞文作奸史擇小吏謹愿者補吏延他邑老獄吏教習律令踰月漸次通曉手定爰書吏俯首繕寫莫敢仰視民多鬭殺史講習鄉約用古教化法兩匝月獄訟衰止縣故多盜史設法購斬盜無留跡縣西北地庳下水潦所聚河溢則助河為患史疏決壅積家各占業縣北境接鄢陵尉氏地勢尤下三縣民互相穿穴史躬自相度總計三縣病利作均水約束刻石水畔三縣共守之楚兵過中州所部畏其擾檄史駐襄城鎮之史遣人入楚籍記其將領部曲某兵前驅某兵後拒車馬芻牧各有成數乃按籍定約僦次舍庀餱糧偫器用兵所至如歸居人安堵市不改肆視事浹月聲藉甚以勞卒喪西歸民庶號慟耀州志髙悌邠州人選貢萬厯二十年任祥符縣丞遇事斧斷丰裁侃侃難干以私百姓謳曰關節不通今有髙公祥符縣志張橘字懐陸富平人天啓辛酉舉人任東阿知縣時邑多萑苻橘單騎諭以利害渠魁正法餘悉解散陞昌平守開荒修學遷本州兵憲庚辰奇荒賑米二千餘石人賴以生轉冀州少參賈志金煉色南鄭人天啓壬戌進士任河内令剛明果斷掾吏有關白甫至前輒頤止之曰吾為竟若説吏俯首塞黙無一事豐蔀者當事檄河内運豆餉邊力爭之始得豁河南通志張必大字可菴華州人天啓壬戌進士初授新城令調長清正直廉明愛民禮士以治行異等擢為吏部主事見逆璫祠不拜遂改工部督理顯陵工省帑金三十萬𣙜税杭關卒於道賈志許國翰涇陽人天啓壬戌進士為儀封令開支河以洩水又損俸置義倉以備賑厯陞岳州道練水兵焚賊船洞庭積寇一清改兖東道用武剛車鴛鴦陣屢挫賊鋒兖東人心始固終山西臬司涇陽志薛國柱呉堡人以貢生為交城令修城禦寇積穀賑荒因豫寇亂陞河南同知監軍督餉不避勞怨故所至有績終河汝兵備道呉堡志張國治扶風人天啓甲子舉人除獲嘉令撫字孑遺周咨民瘼凡利於民者必悉心區畫務求有濟時連歳荒祲國治力請捐租賑恤上官難之國治涕泣請命語甚切直遂忤上官即日罷歸鄉里論者皆以為榮扶風志馬懋才字晴江安塞人天啓乙丑進士授行人久之以禮部郎中陞西蜀參議撫治苗蠻諭以恩信叛者釋甲請降既免官居長安尋卒懋才為行人時陳延安災荒疏數上詔發帑遣賑延人徳之延安府志袁楷鳳翔人天啓乙丑進士任開封知府廉毅有大畧郡號煩劇訟案苦沈積楷登堂令數事羅跪一時並聽剖決無枉人稱為照天燭後陞河北守道河南通志王秉鑑字儒賢扶風人天啓乙丑進士初知郾城治行為中州第一調光山郾之叩閽乞留者數千人兩地皆勒碑紀績擢工部主事時都城戒嚴秉鑑冐鋒鏑陛見以守門濬河諸功加級賜賚陞鎮江守京口有止飲江心水之謡厯官浙江參政致仕賈志李燦字斗明韓城人天啓乙丑進士授兵部主事厯汝寧知府時流賊猖獗燦守備甚嚴卒不敢近土寇占居四野計圖刈收二麥以困城中燦傳檄招撫許封以官寇渠殷守祖五十餘人入城邀賞先以花紅賺入城隍廟以三力士俘一賊盡殺之收種無恙士民得生河南通志調平陽捐貲修城不煩州縣人尤稱之賈志都景運字永泰涇陽人天啓間恩貢授興濟令邑多荒屯景運設法招墾調青縣修城禦寇築堤通漕陞河間府同知條陳截漕糧查海船清委收積招買諸事悉中利弊卒於官涇陽志劉含輝字四勿耀州人崇禎戊辰進士任恩縣令潔已愛民急公敬事陞髙唐知州恩民赴闕保留仍命治恩又三年擢吏部主事孤立獨行不附中官十年不得調尋卒耀州册王健字大龍三原人崇禎中進士風格峻整動由禮節授聊城令强幹清慎請改遼糧練餉立折馬之法以甦俵馬民咸稱便三原志張炳璿字義照涇陽人父鑑太原同知督餉偏頭關勤能有聲炳璿以貢生崇禎時授滿城令甫匝歳而綏輯撫循邑稱大治以清直不合於時歸里閉户著書詩文多傳世涇陽志郭鼎藩字翰宇涇陽人沔縣教諭蔣汝艾字玉衡興安人西鄉教諭寇薄沔沔令恇怯鼎藩慨然以城守為己任泣勵義勇親冒矢石賊被創去攻西鄉汝艾亦率衆破之當事稔其才使鼎藩署鳳縣汝艾署南鄭兩人皆招撫流移殲捕盜賊克稱其職涇陽志黎玉田字含玉乾州人崇禎戊辰進士初任沈邱以才調杞縣英斷不撓流寇嘯聚單騎擒之又有新鄉令房建極者三原人辛未進士流寇至境建極率鄉勇捍禦城賴以全河南通志子按建極後事詳見其廷祥傳中李國宗字象坤韓城人崇禎庚午舉人授河南許州學正代篆滎陽蠲俸修城製火器不逾月大賊雲集四面環攻卒賴保全縣人為樹碑建祠韓城志孫鵬鳳翔人崇禎辛未進士知東明縣廉明有幹畧時萑苻多警鵬單騎至其宂諭以威福渠盜感泣就撫蔀屋以寧畿輔志辛炳翰渭南人崇禎中由選貢知昌樂縣有禦寇全城之功昌樂縣志陞真定同知駐宣府司餉務裁汰餉額後併司理於餉㕔全活誣罔甚夥擢南陽郡守值兵燹後空城茂草流亡難復炳翰開荒田招戸口盡心撫恤轉副使攝篆藩司廉聲藉甚及卒柩西還數百里哭聲不絶渭南志梁夢卜三水人拔貢崇禎末授襄陽通判值闖獻寇逆盤踞樊鄧間兵餉甚艱夢卜手檄諭山砦父老無不流涕助輸雖兵戈擾攘中而飲髙年崇學校有古良吏風湖廣志按國家設官分職首重廉能三秦夙稱材藪尤多有守有為之士但厯年寖逺遺事久湮雖賢聲猶播於人間而實蹟難徵於身後今録其姓字官位俾後之君子猶有傳焉洪武朝有湖廣僉事雷亮撫州知府王崧俱咸寧人沂州知州裴榮鄭州知州馬煥暨子主事馴俱髙陵人吏部尚書郭永道安塞人諸城知縣朱允恭保安人朔州知州石亨鳳翔人長夀知縣張思敬洋縣人山西㕘政喬誠朝邑人邵陽知縣薛得中文水知縣張羽禮部侍郎康汝楫俱武功人永樂朝有淶水知縣李森咸寧人襄城知縣劉昇興平人髙唐州判趙勉暨孫輝縣知縣元涇陽人僉事韶頀岐山人工部郎中何昇麟遊人陳州知州陳介南鄭人工部侍郎李彪洋縣人登封知縣谷庸城固人兩淮運使梁春鳳縣人保縣知縣栁方鄜州人正統朝有鄢陵