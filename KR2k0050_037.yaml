body:
  text: 陜西通志巻三十七屯運一屯地屯丁倉庾附轉運搜粟治田古名曰代耕戰並資渭濵策在仿而行之利饒功倍充爾倉儲厥惟耬耒寓爾犀兕奄觀銍乂饋餉轉漕以實闗内藉給東南果腹邊塞輸輓雖勞黔首永戴作屯運志第十六屯地屯丁國朝陜西西延鳳漢榆興同華乾綏葭十一屬原額屯地捌萬伍千肆伯捌拾陸頃壹拾捌畝伍分玖毫玖絲捌微除荒並圏占建城豁免外實熟地叁萬㭍千㭍伯叁拾陸頃㭍拾玖畝陸分壹釐貳毫玖絲㭍微玖纎貳塵實徴本色糧壹拾伍萬叁千捌伯壹拾石壹斗貳升壹合㭍勺陸抄伍撮㭍圭陸粟叁粒捌顆本色草玖千貳伯㭍束肆斤壹拾壹兩陸錢捌分伍釐貳毫㭍絲捌忽捌微玖纎陸塵肆𣺌折色糧折布銀壹萬壹千伍伯陸拾兩捌分㭍釐㭍毫肆絲陸忽伍微捌纎捌塵玖𣺌丁條馬草玖釐均徭等項銀壹萬捌千伍拾伍兩伍錢捌分㭍釐玖毫貳絲伍忽捌微肆纎玖塵壹漠㭍洙歴年開墾地肆伯叁拾陸頃玖拾伍畝玖分貳釐肆毫㭍絲玖忽該徴本色糧壹千伍伯壹拾叁石陸斗壹升伍合伍勺肆抄伍撮伍圭伍粟玖粒壹顆伍糠本色草貳伯陸拾玖束叁斤陸兩叁錢捌分貳釐肆毫玖絲玖忽㭍微陸纎陸塵折色糧折布銀貳拾叁兩壹錢㭍分伍釐叁毫捌絲貳忽伍微丁條馬草等項銀壹伯伍拾捌兩陸錢陸分伍釐壹毫陸絲玖忽叁微壹纎肆塵肆𣺌陸漠伍沙自首地捌拾畝該徵本色糧叁石貳斗折色糧折布銀叁錢叁分陸釐丁條馬草銀叁錢陸分原額零星地貳拾叁頃貳拾伍畝叁分㭍釐額徴銀壹伯壹拾陸兩貳錢壹分肆釐貳毫捌絲原額糜餘糜糧地除荒外實熟地壹千貳伯玖拾頃壹拾伍畝陸分㭍釐捌毫實徵折色糧銀壹千肆伯壹拾壹兩捌錢捌釐貳毫叁絲壹忽貳微歴年開墾並自首地捌拾陸頃貳畝該徴折色糧銀捌拾貳兩肆錢肆分玖釐伍毫貳絲肆纎外墻外熟地叁頃叁拾畝徵本色糧㭍石玖斗本色草壹拾束坐落榆林城南及城河西岸牧馬地壹拾陸頃叁拾陸畝叁分該徵銀貳拾壹兩貳錢㭍分壹釐玖毫榆林衞沙草灘地陸拾壹頃㭍拾伍畝肆分壹釐伍毫該徵銀捌拾壹兩伍錢捌分肆毫額外延鎭並安邊堡養亷地肆拾貳頃叁拾畝除荒外實熟地貳拾肆頃伍拾畝該徵銀肆拾壹兩叁錢肆分歴年首報清查共地叁拾伍頃㭍拾畝肆分伍釐貳毫陸絲該徵本色糧壹伯肆拾伍石壹斗捌升捌合貳勺肆撮折色糧折布銀壹拾伍兩壹錢伍分壹釐陸絲玖微貳纎丁條馬草銀㭍兩玖錢貳分伍釐玖毫玖絲㭍微黄壩驛開墾地㭍拾叁畝伍分該徵糧折銀貳兩捌分肆釐伍毫捌絲陸微肆塵叁𣺌接收高家堡並饒陽水堡歴年開墾地貳拾陸頃壹拾伍畝貳分實徵本色糧肆拾壹石捌斗叁升本色草肆拾捌束玖釐銀柒兩捌錢玖分肆釐㭍毫肆絲玖忽捌微固原總鎭養亷俸麥改徵豌豆伍拾伍石伍斗固原總鎭養亷地租銀壹伯陸拾陸兩貳錢壹分壹釐贍鹽火食歷年開墾火食並停免糧銀共肆拾肆兩玖錢捌釐貳毫陸絲玖忽貳微叁纎陸漠伍沙貳洙城壕地租銀除豁免外實徵銀叁拾壹兩㭍錢貳分原額屯丁共折下下丁壹拾萬肆千捌丁除豁免外並歴年招首編審丁共壹拾萬㭍千壹伯陸拾丁半雍正伍年以糧載丁共均丁銀貳萬㭍千叁伯肆拾伍兩陸錢玖分壹毫伍絲肆忽叁微貳纎貳塵㭍𣺌永不加賦丁陸伯玖丁起運本色糧壹拾肆萬㭍千伍伯㭍拾㭍石叁斗伍升伍合伍勺壹抄伍撮叁圭貳粟貳粒玖顆伍糠内改折銀壹萬壹千玖伯壹拾壹兩㭍錢玖釐叁毫捌絲玖忽玖微壹纎壹塵止徵糧壹拾叁萬伍千陸伯陸拾伍石陸斗肆升陸合壹勺貳抄伍撮肆圭壹粟壹粒玖顆伍糠暫留屯丁兊食糧捌千石按暫留屯丁糧未載丁銀起運本色草玖千伍伯叁拾肆束捌斤貳兩陸分㭍釐柒毫㭍絲捌忽陸微陸纎貳塵肆𣺌起運銀陸萬伍千陸伯陸拾伍兩貳錢陸分貳釐貳毫捌忽伍微捌𣺌肆漠玖洙遇閏加徵銀捌伯㭍拾叁兩㭍分玖釐㭍忽玖微捌纎捌塵伍𣺌暫留屯丁兊食銀捌伯肆拾兩按暫留屯丁銀未載丁銀又存留銀肆千伍伯捌拾兩玖錢玖釐伍毫肆絲貳忽肆微㭍纎玖塵陸𣺌遇閏加徵銀㭍拾玖兩肆錢肆釐玖毫陸絲貳忽㭍微伍纎玖𣺌西安府屬原額屯地貳萬陸伯肆拾玖頃肆拾伍畝陸分肆釐伍毫捌微除圏占衝决賠納蠲免外實熟地壹萬捌千捌伯肆拾玖頃陸拾畝㭍分捌釐陸毫貳絲叁忽捌微實徵本色糧捌萬貳拾叁石伍升叁合肆勺叁抄㭍撮肆圭肆粟折色糧折布銀捌千壹拾伍兩貳分肆釐捌毫肆忽叁微捌纎捌塵丁條馬草銀捌千陸伯叁拾肆兩肆錢玖分伍釐壹毫㭍絲捌忽貳微肆纎玖塵捌𣺌歴年開墾並自首地拾頃貳拾畝㭍分徵本色糧叁拾捌石伍斗肆合折色糧折布銀伍兩捌分壹釐伍毫捌絲丁條馬草銀肆兩陸錢叁分陸釐玖毫伍絲原額零星地貳拾叁頃貳拾伍畝叁分㭍釐額徵銀壹伯壹拾陸兩貳錢壹分肆釐貳毫捌絲額外首報清查出共地㭍頃陸拾壹畝壹分貳毫陸絲該徵本色糧叁拾壹石玖斗伍升伍合玖勺肆撮折色糧折布銀叁兩壹錢玖分陸釐陸毫叁絲玖微貳纎丁條馬草銀叁兩肆錢㭍分叁毫壹絲伍忽㭍微固原總鎭養亷俸麥改徵豌豆伍拾伍石伍斗固原鎭公費養亷地租共銀壹伯肆拾陸兩陸錢壹分壹釐城壕地租銀除豁免外實徵銀叁拾壹兩㭍錢貳分原額屯丁共折下下丁㭍萬陸千玖伯伍拾㭍丁並歷年編審出丁共㭍萬捌千伍伯肆拾肆丁雍正伍年以糧載丁共均丁銀壹萬叁千陸伯玖拾壹兩伍錢捌分叁毫捌忽陸微伍纎捌塵永不加賦丁貳伯陸拾陸丁起運本色糧㭍萬叁千壹伯㭍拾㭍石壹升叁合叁勺肆抄壹撮肆圭肆粟暫留屯丁兊食糧陸千玖伯㭍拾貳石起運銀貳萬玖千捌伯玖拾肆兩肆錢㭍分伍釐貳毫㭍絲㭍忽捌纎肆塵捌𣺌遇閏