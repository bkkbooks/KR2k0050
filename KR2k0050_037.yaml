發源渭源縣之鳥鼠同穴山僅山澗細流至鳳翔府寶雞之到底地方始成平川自到底東流至華隂縣之三河口始投入黃河西起鳯翔東至潼關由渭入黃由黃入汾可抵山西之平陽即或三門水溜不敢冒險而汾渭兩河可通船隻者幾二千里然往來商旅多捨水路而就陸路者皆因陜西船隻方頭平底無柁無篷而水手又不善於操舟舟行遲滯不如陸路便利所以舟行者甚少請於江南等省雇覔造船良工並熟練水手量水性以造船裝柁置篷使本地匠人土民學習演試如果便利令民船亦照式修造倘陜西收歉需用河南積儲糧石之時即可將商民船隻雇覔挽運康熙伍拾玖年拾月漕運總督施世綸題準由黃河挽運豫糧入秦自河南府至陜州之太陽渡計程叁伯零伍里用車裝運計期伍日到太陽渡每車裝米捌石日給腳價銀叁錢伍分自太陽渡至西安府黨家馬頭河水平穩船隻通行水運為便每石給水腳銀一錢叁分查潼關以上船隻頗多應飭令該關同知催下陜州同豫省押運官照價雇運自黨家馬頭至西安府倉二拾里車輛亦令該同知同豫省押運官雇運每石給車價銀二分再運穀二拾萬石止得拾萬之米一半盡屬粳粃徒費腳價應以二穀易一米照數運送至陜又請將湖廣荆州等處各倉米拾萬石由襄陽水運至商州龍駒寨每石需水腳銀一兩由龍駒寨陸運至西安每石需夫役銀二兩接濟荒民康熙陸拾年漕臣施世綸復奏請撥運豫糧拾萬石接濟陜西悉照前議惟自河南府陸運至陜州因春夏農忙從開歸護糧道吳柯之請加增腳價每石每伯里給銀一錢雍正玖年二月拾陸日奉上諭陜甘二省連年豐稔官倉存貯既多民間亦家有蓋藏採辦易便是以軍興以來儲糧充裕而民食亦寬然有餘但天時不可預必當於既富之時先籌有備之道而欲儲數年之積蓄不得不藉資於鄰省查鄰省如山西河南之米石若由陸路輸挽所費甚多且恐勞民若由水運則有三門砥柱之險聞從前曽以湖廣米石由水運至商州轉運於西安上年湖廣歲收甚熟今可否於湖廣採買米石循舊運之道運貯商州以備轉運著大學士等議奏欽此議得從前運米自荆州府運至襄陽由漢江􅘦流而上雖路經二千里而可以大船裝載需用水腳無多自襄陽漢江進小江口入丹江江流漸漸淺狹祗容伯石之船至河南所屬之淅川縣荆子關雖灘高水淺用小􅤭扒河等船可以挽拽而上又自荆子關至陜西商州之龍駒寨溪流瀉急間有灘石隨時挑濬亦可行運自小江至龍駒寨共計水程陸伯二拾餘里再於龍駒寨陸運經熊耳秦嶺七盤等山計程肆伯一拾㭍里遂由藍田縣至西安皆係山行小路不通車輛從前運送米石雇募人夫每人背米伍斗日行伍陸拾里大約騾馬驢隻馱載亦尚可行臣等查據康熙伍拾玖年奏册自襄陽至龍駒寨水運腳價及打造船隻挑濬灘河之費每石需水腳銀一兩自龍駒寨至西安每石需夫役銀二兩是湖廣運送米石既有成效事在可行今運米貯商州既可省陸運之費將來設有用處轉運亦易應照康熙伍拾玖年之例令湖廣督撫運米拾萬石水運送至商州尋因署陜督臣查郎阿疏奏運價繁多西安連年豐收倉厫儲積有餘商州萬山之中地方褊小難以久貯暫停運送雍正拾年拾二月經略陜甘軍務大學士伯鄂爾泰奏準陜省存倉穀玖拾餘萬石散貯伍府拾州延安榆林及葭鄜綏地處北邉漢中興商僻在山南其所貯積穀止自備本處緩急難以轉運通濟歷來酌撥軍糈惟取給西鳳二府及邠乾耀華同伍州目今伍州之穀亦只可自供儲備是為軍需民食計挽輸備貯皆當急為籌畫伏查雍正玖年二月奉旨令於湖廣採辦米石循舊運道運送商州以備轉運續據署陜督臣查郎阿以運價浩繁奏請停止再查康熙叁拾二年並伍拾玖年兩次將湖廣米石運送西安俱著有成效臣等細查楚省今歲豐收每米一石不過陸㭍錢其造船疏濬灘河及雇募馱腳等費每石不過二兩有零是現今運米一石約需叁兩若下次接續運送則造船濬河之費尚可稍減而源源挽運蓄積充盈於民食兵糧實兩有裨益令湖廣督撫於明春先運米拾萬石或動撥倉厫或就近於襄陽等屬米賤地方採買酌量辦理雍正拾一年正月兵部尚書署理陜西巡撫史貽直奏準豫楚二省各撥運米拾萬石水陸並進遴員押運陜省差員在於潼關接收豫米龍駒寨接收楚米並收豫楚口袋轉運西安或減價平糶或借給窮民臨時辦理此次撥運一切食物草料倍昂從前河南府陸運至陜州每石每伯里一錢者應照軍需案內每石每伯里給腳價銀一錢陸分其自陜州靈寶閿鄉雇民船運送由三河口分載渭河洛河黃河各水次交卸者每石每伯里給水腳銀肆分自水次入倉逺近不等按里數每石每拾里給腳價銀一分陸釐其楚米由襄陽至龍駒寨亦無庸打造船隻若雇民船運送則原議每石一兩尚可節省一錢自龍駒寨起旱或騾馱或人負原議每石二兩尚可節省一兩臨時咨商豫楚督撫酌量增減據實報銷陜西通志卷三十七
