發源渭源縣之鳥䑕同穴山僅山澗細流至鳳翔府寳雞之到底地方始成平川自到底東流至華隂縣之三河口始投入黄河西起鳯翔東至潼闗由渭入黄由黄入汾可抵山西之平陽即或三門水溜不敢冐險而汾渭兩河可通船隻者幾貳千里然徃来商旅多捨水路而就陸路者皆因陜西船隻方頭平底無柁無篷而水手又不善於操舟舟行遲滯不如陸路便利所以舟行者甚少請於江南等省僱覔造船良工並熟練水手量水性以造船裝柁置篷使本地匠人土民學習演試如果便利令民船亦照式修造倘陜西收歉需用河南積儲糧石之時即可將商民船隻僱覔輓運康熈伍拾玖年拾月漕運總督施世綸題准由黄河輓運豫糧入秦自河南府至陜州之太陽渡計程叁伯零伍里用車裝運計期伍日到太陽渡毎車裝米捌石日給脚價銀叁錢伍分自太陽渡至西安府黨家馬頭河水平穩船隻通行水運為便毎石給水脚銀壹錢叁分查潼闗以上船隻頗多應飭令該闗同知催下陜州同豫省押運官照價僱運自黨家馬頭至西安府倉貳拾里車輛亦令該同知同豫省押運官僱運毎石給車價銀貳分再運穀貳拾萬石止得拾萬之米一半盡屬糠粃徒費脚價應以二穀易一米照數運送至陜又請將湖廣荆州等處各倉米拾萬石由襄陽水運至商州龍駒寨毎石需水脚銀壹兩由龍駒寨陸運至西安毎石需夫役銀貳兩接濟荒民康熈陸拾年漕臣施世綸復奏請撥運豫糧拾萬石接濟陜西悉照前議惟自河南府陸運至陜州因春夏農忙從開歸䕶糧道吳柯之請加增脚價毎石毎伯里給銀壹錢雍正玖年貳月拾陸日奉上諭陜甘貳省連年豐稔官倉存貯既多民間亦家有盖藏採辦易便是以軍興以来儲糧充裕而民食亦寛然有餘但天時不可預必當於既富之時先籌有備之道而欲儲數年之積蓄不得不藉資於鄰省查鄰省如山西河南之米石若由陸路輸輓所費甚多且恐勞民若由水運則有三門砥柱之險聞從前曽以湖廣米石由水運至商州轉運於西安上年湖廣歲收甚熟今可否於湖廣採買米石循舊運之道運貯商州以備轉運着大學士等議奏欽此議得從前運米自荆州府運至襄陽由漢江􅘦流而上雖路經貳千里而可以大船裝載需用水脚無多自襄陽漢江進小江口入丹江江流漸漸淺狹祗容伯石之船至河南所屬之淅川縣荆子闗雖灘高水淺用小􅤭扒河等船可以輓拽而上又自荆子闗至陜西商州之龍駒寨溪流瀉急間有灘石随時挑濬亦可行運自小江至龍駒寨共計水程陸伯貳拾餘里再於龍駒寨陸運經熊耳秦嶺七盤等山計程肆伯壹拾㭍里遂由藍田縣至西安皆係山行小路不通車輛從前運送米石僱募人夫毎人背米伍斗日行伍陸拾里大約騾馬驢隻䭾載亦尚可行臣等查據康熈伍拾玖年奏册自襄陽至龍駒寨水運脚價及打造船隻挑濬灘河之費毎石需水脚銀壹兩自龍駒寨至西安毎石需夫役銀貳兩是湖廣運送米石既有成效事在可行今運米貯商州既可省陸運之費將来設有用處轉運亦易應照康熈伍拾玖年之例令湖廣督撫運米拾萬石水運送至商州尋因署陜督臣查郎阿疏奏運價繁多西安連年豐收倉厫儲積有餘商州萬山之中地方褊小難以乆貯暫停運送雍正拾年拾貳月經畧陜甘軍務大學士伯鄂爾泰奏准陜省存倉穀玖拾餘萬石散貯伍府拾州延安榆林及葭鄜綏地處北邉漢中興商僻在山南其所貯積穀止自備本處緩急難以轉運通濟歷来酌撥軍糈惟取給西鳳二府及邠乾耀華同伍州目今伍州之穀亦只可自供儲備是為軍需民食計輓輸備貯皆當急為籌畫伏查雍正玖年貳月奉㫖令於湖廣採辦米石循舊運道運送商州以備轉運續據署陜督臣查郎阿以運價浩繁奏請停止再查康熈叁拾貳年並伍拾玖年兩次將湖廣米石運送西安俱著有成效臣等細查楚省今歳豐收毎米壹石不過陸㭍錢其造船疏濬灘河及僱募䭾脚等費毎石不過貳兩有零是現今運米壹石約需叁兩若下次接續運送則造船濬河之費尚可稍减而源源輓運蓄積充盈於民食兵糧實兩有裨益令湖廣督撫於明春先運米拾萬石或動撥倉厫或就近於襄陽等屬米賤地方採買酌量辦理雍正拾壹年正月兵部尚書署理陜西廵撫史貽直奏准豫楚二省各撥運米拾萬石水陸並進遴員押運陜省差員在於潼闗接收豫米龍駒寨接收楚米並收豫楚口袋轉運西安或减價平糶或借給窮民臨時辦理此次撥運一切食物草料倍昂從前河南府陸運至陜州毎石毎伯里壹錢者應照軍需案内毎石毎伯里給脚價銀壹錢陸分其自陜州靈寳閿鄉僱民船運送由三河口分載渭河洛河黄河各水次交卸者毎石毎伯里給水脚銀肆分自水次入倉逺近不等按里數毎石毎拾里給脚價銀壹分陸釐其楚米由襄陽至龍駒寨亦無庸打造船隻若僱民船運送則原議毎石壹兩尚可節省壹錢自龍駒寨起旱或騾䭾或人負原議毎石貳兩尚可節省壹兩臨時咨商豫楚督撫酌量增减據實報銷陜西通志巻三十七
