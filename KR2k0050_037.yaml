body:
  text: 陜西通志卷三十七屯運一屯地屯丁倉庾附轉運搜粟治田古名曰代耕戰並資渭濵策在仿而行之利饒功倍充爾倉儲厥惟耬耒寓爾犀兕奄觀銍乂饋餉轉漕以實關內藉給東南果腹邊塞輸挽雖勞黔首永戴作屯運志第十六屯地屯丁國朝陜西西延鳳漢榆興同華乾綏葭十一屬原額屯地捌萬伍千肆伯捌拾陸頃一拾捌畝伍分玖毫玖絲捌微除荒並圈占建城豁免外實熟地叁萬㭍千㭍伯叁拾陸頃㭍拾玖畝陸分一釐二毫玖絲㭍微玖纎二塵實徴本色糧一拾伍萬叁千捌伯一拾石一斗二升一合㭍勺陸抄伍撮㭍圭陸粟叁粒捌顆本色草玖千二伯㭍束肆斤一拾一兩陸錢捌分伍釐二毫㭍絲捌忽捌微玖纎陸塵肆渺折色糧折布銀一萬一千伍伯陸拾兩捌分㭍釐㭍毫肆絲陸忽伍微捌纎捌塵玖渺丁條馬草玖釐均徭等項銀一萬捌千伍拾伍兩伍錢捌分㭍釐玖毫二絲伍忽捌微肆纎玖塵一漠㭍洙歷年開墾地肆伯叁拾陸頃玖拾伍畝玖分二釐肆毫㭍絲玖忽該徴本色糧一千伍伯一拾叁石陸斗一升伍合伍勺肆抄伍撮伍圭伍粟玖粒一顆伍粳本色草二伯陸拾玖束叁斤陸兩叁錢捌分二釐肆毫玖絲玖忽㭍微陸纎陸塵折色糧折布銀二拾叁兩一錢㭍分伍釐叁毫捌絲二忽伍微丁條馬草等項銀一伯伍拾捌兩陸錢陸分伍釐一毫陸絲玖忽叁微一纎肆塵肆渺陸漠伍沙自首地捌拾畝該徵本色糧叁石二斗折色糧折布銀叁錢叁分陸釐丁條馬草銀叁錢陸分原額零星地二拾叁頃二拾伍畝叁分㭍釐額徴銀一伯一拾陸兩二錢一分肆釐二毫捌絲原額糜餘糜糧地除荒外實熟地一千二伯玖拾頃一拾伍畝陸分㭍釐捌毫實徵折色糧銀一千肆伯一拾一兩捌錢捌釐二毫叁絲一忽二微歷年開墾並自首地捌拾陸頃二畝該徴折色糧銀捌拾二兩肆錢肆分玖釐伍毫二絲肆纎外墻外熟地叁頃叁拾畝徵本色糧㭍石玖斗本色草一拾束坐落榆林城南及城河西岸牧馬地一拾陸頃叁拾陸畝叁分該徵銀二拾一兩二錢㭍分一釐玖毫榆林衛沙草灘地陸拾一頃㭍拾伍畝肆分一釐伍毫該徵銀捌拾一兩伍錢捌分肆毫額外延鎮並安邊堡養亷地肆拾二頃叁拾畝除荒外實熟地二拾肆頃伍拾畝該徵銀肆拾一兩叁錢肆分歷年首報清查共地叁拾伍頃㭍拾畝肆分伍釐二毫陸絲該徵本色糧一伯肆拾伍石一斗捌升捌合二勺肆撮折色糧折布銀一拾伍兩一錢伍分一釐陸絲玖微二纎丁條馬草銀㭍兩玖錢二分伍釐玖毫玖絲㭍微黃壩驛開墾地㭍拾叁畝伍分該徵糧折銀二兩捌分肆釐伍毫捌絲陸微肆塵叁渺接收高家堡並饒陽水堡歷年開墾地二拾陸頃一拾伍畝二分實徵本色糧肆拾一石捌斗叁升本色草肆拾捌束玖釐銀柒兩捌錢玖分肆釐㭍毫肆絲玖忽捌微固原總鎮養亷俸麥改徵豌豆伍拾伍石伍斗固原總鎮養亷地租銀一伯陸拾陸兩二錢一分一釐贍鹽火食歷年開墾火食並停免糧銀共肆拾肆兩玖錢捌釐二毫陸絲玖忽二微叁纎陸漠伍沙二洙城壕地租銀除豁免外實徵銀叁拾一兩㭍錢二分原額屯丁共折下下丁一拾萬肆千捌丁除豁免外並歷年招首編審丁共一拾萬㭍千一伯陸拾丁半雍正伍年以糧載丁共均丁銀二萬㭍千叁伯肆拾伍兩陸錢玖分一毫伍絲肆忽叁微二纎二塵㭍渺永不加賦丁陸伯玖丁起運本色糧一拾肆萬㭍千伍伯㭍拾㭍石叁斗伍升伍合伍勺一抄伍撮叁圭二粟二粒玖顆伍粳內改折銀一萬一千玖伯一拾一兩㭍錢玖釐叁毫捌絲玖忽玖微一纎一塵止徵糧一拾叁萬伍千陸伯陸拾伍石陸斗肆升陸合一勺二抄伍撮肆圭一粟一粒玖顆伍粳暫留屯丁兊食糧捌千石按暫留屯丁糧未載丁銀起運本色草玖千伍伯叁拾肆束捌斤二兩陸分㭍釐柒毫㭍絲捌忽陸微陸纎二塵肆渺起運銀陸萬伍千陸伯陸拾伍兩二錢陸分二釐二毫捌忽伍微捌渺肆漠玖洙遇閏加徵銀捌伯㭍拾叁兩㭍分玖釐㭍忽玖微捌纎捌塵伍渺暫留屯丁兊食銀捌伯肆拾兩按暫留屯丁銀未載丁銀又存留銀肆千伍伯捌拾兩玖錢玖釐伍毫肆絲二忽肆微㭍纎玖塵陸渺遇閏加徵銀㭍拾玖兩肆錢肆釐玖毫陸絲二忽㭍微伍纎玖渺西安府屬原額屯地二萬陸伯肆拾玖頃肆拾伍畝陸分肆釐伍毫捌微除圈占衝決賠納蠲免外實熟地一萬捌千捌伯肆拾玖頃陸拾畝㭍分捌釐陸毫二絲叁忽捌微實徵本色糧捌萬二拾叁石伍升叁合肆勺叁抄㭍撮肆圭肆粟折色糧折布銀捌千一拾伍兩二分肆釐捌毫肆忽叁微捌纎捌塵丁條馬草銀捌千陸伯叁拾肆兩肆錢玖分伍釐一毫㭍絲捌忽二微肆纎玖塵捌渺歷年開墾並自首地拾頃二拾畝㭍分徵本色糧叁拾捌石伍斗肆合折色糧折布銀伍兩捌分一釐伍毫捌絲丁條馬草銀肆兩陸錢叁分陸釐玖毫伍絲原額零星地二拾叁頃二拾伍畝叁分㭍釐額徵銀一伯一拾陸兩二錢一分肆釐二毫捌絲額外首報清查出共地㭍頃陸拾一畝一分二毫陸絲該徵本色糧叁拾一石玖斗伍升伍合玖勺肆撮折色糧折布銀叁兩一錢玖分陸釐陸毫叁絲玖微二纎丁條馬草銀叁兩肆錢㭍分叁毫一絲伍忽㭍微固原總鎮養亷俸麥改徵豌豆伍拾伍石伍斗固原鎮公費養亷地租共銀一伯肆拾陸兩陸錢一分一釐城壕地租銀除豁免外實徵銀叁拾一兩㭍錢二分原額屯丁共折下下丁㭍萬陸千玖伯伍拾㭍丁並歷年編審出丁共㭍萬捌千伍伯肆拾肆丁雍正伍年以糧載丁共均丁銀一萬叁千陸伯玖拾一兩伍錢捌分叁毫捌忽陸微伍纎捌塵永不加賦丁二伯陸拾陸丁起運本色糧㭍萬叁千一伯㭍拾㭍石一升叁合叁勺肆抄一撮肆圭肆粟暫留屯丁兊食糧陸千玖伯㭍拾二石起運銀二萬玖千捌伯玖拾肆兩肆錢㭍分伍釐二毫㭍絲㭍忽捌纎肆塵捌渺遇閏