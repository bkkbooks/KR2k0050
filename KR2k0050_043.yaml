body:
  text: 陜西通志巻四十三物産一榖屬藥屬果屬貨屬蔬屬神臯陸海材器萬端竹箭檀柘球琳琅玕職貢攸紀今昔殊觀虞衡滋息司市禁奸先資民用次佐縣官異物匪尚徴求詎安騶虞頌瑞取而勿殫施生日進益道乃寛作物産志第二十糓屬黍維秬維秠詩經大雅豐年多黍多稌周頌秬黑黍也秠一稃二米也毛傳秬是黒黍之大名秠是黒黍之中有二米者别名為秠孔䟽關中處處有之爾雅翼曰以大暑而種故謂之黍孟秋熟故庶人薦黍其秀舒散黍之種有數十大約飯黍酒黍兩品而已酒黍黏飯黍不黏飯黍惟關中多有之晉人隣關中者種飯黍於其地三年皆黏不可飯故爾雅翼謂黍為禾屬而黏者關東人謂飯黍為稷葢止見酒黍未嘗見飯黍也今以黍言之黍有紫葢黍有罩籬黍有鵓鴿卵有牛尾串其黒者曰秠曰秬其黏者釀酒關東所謂黄米酒者是已不黏者炊飯關西所謂黄米飯者是已馬志􅓱似黍而小有酒􅓱飯􅓱二種穗舒散如衫袖夏種秋熟先榖早成咸陽縣志􅓱懼霧霧遲早􅓱穫霧早遲􅓱穫髙陵縣志黍有硬軟丹黒二種延安府志􅓱為土産故漢稱隃糜汧陽縣志黍有露仁矮人馬尾黒榖罩粒五種洋縣志黍亦名􅓱啇州志黍有數種秦中呼酒􅓱子米可作酒呼酒黄米山陽縣志黍有紅黄黒白紫灰數色俗謂之􅓱葭州志既按各志關中所謂􅓱者本謂黍也蘇㳟髙誘諸人誤以泰之不黏者為稷并謂關中謂稷為􅓱其傳訛有自來矣合觀郡縣諸志知馬志之辨證者為是故從之稷黍稷重穋詩經豳風黍稷茂止周頌先種後熟謂之重後種先熟謂之穋周禮鄭註邠州綏州勝州貢粟元和志京兆貢紫稈粟唐書地理志稷關中處處有之初種時在邰今武功縣是爾雅翼曰稷百榖之長也后稷播百榖獨以稷名其播榖之地亦曰稷山其祀百榖以配社不曰他而曰稷葢舉稷黍稷稲梁之屬皆該之也爾雅曰粢稷曲禮曰稷曰明粢郭璞曰今天下所謂粟米者正稷米也觀此則粢粟稷正是一物後人不察圖為舒散之穗則黍穗也又列稷于下品列粟于中品以一物分為二物第為二品又圖為别物且曰關中謂之􅓱􅓱黍也是謂稷即黍黍即稷矣夫稷之種多于百榖又為百榖之長乃可盡廢之耶今東人以酒黍為黍以飯黍為稷從其説是有黍而無稷矣幸而農夫農婦尚多識之今辨其名而著其實稷有竹葉青有牛尾黄有紫稈禾有棒杵穗有櫟花榖有狼尾有驢尾稷之黏者曰秫秫有野雞紅有紅猫蹄有白猫蹄有豬矢黒有老來變有隔溝扽其𩔖逾百然大率黏不黏兩種而已其黏者釀酒不黏者炊飯關西所謂粟米小米榖米者是已米脂縣境沃壤宜粟他郡不及其米淅之汁如脂故以名縣馬志稷粟榖也有黏粟味極軟美邑人多釀酒作糕咸寧縣志粟種𩔖頗多其佳者名狼尾又名紫羅帶又有名金褁銀銀褁金者又有名疾榖者晚種早熟其穗堅硬如鐵故又名鐵軸渭南縣志稷炒熟頗佳俗謂炒米延安府志稷分丹黄黒白四色軟硬二性硬者方熟捋而炒之舂米味甲天下粉之可為餺飥軟者釀酒炒熟可為麵安塞縣志粟有椒粟草粟薄地襯狗尾粟栁眼青猫爪粟棕簑粟西鄉縣志稷有數種號飯黄米山陽縣志稷俗謂粟榖有梁青白三名黏不黏二種葭州志説按馬志據郭璞粟米正稷米之于稷之外不更列粟謂粟即稷也今觀各志所載名色亦俱與馬説相同盖馬固關中人其於土物辨之必詳故不但合于古而且騐于今也今悉從之稻十月穫稻詩經豳風滮池北流浸彼稻田小雅京兆貢稻唐書地理志一名稌有數十種有米粒如霜而有線稜者謂之線稜秔出樊川作飯粒香軟而長三粒可盈寸其次色青者為青秔色紅者為桃花秔為赤甲秔其黏者為糯出御宿川樊川及華州藍田寳雞隴州諸川大率黏者釀酒不黏者炊飯兩種而已馬志字林云糯黏稻也可釀酒秔稻不黏者又曰稉本草岐稉與稻為二物非是秔與稉字為古今稉與糯黏否異耳三川俱産有線稜者佳咸寧縣志稻産花園及大嶺川者佳湭河川次之渭南縣志魚河堡多水田出稻延安府志葢草黄色白味美粒長安南黏色紅味佳及青榦黏土黄黏銀朱黏黄瓜早大紅榖小紅榖皆飯稻黄殻糯白殻糯麻殻糯皆酒稻漢中府志稻有冷水榖百日榖麻黏榖銀朱榖香榖黄秧早金線早黄瓜早紅米早望水白安南黏青榦黏土黄黏葉裡藏葢草黄等為飯稻百莖糯黄殻糯栁條糯鈞魚竿香兒糯虎皮糯寸榖矮脚黄三百顆麻殻糯等為酒稻西鄉縣志稻惟下馬澗有蒲城縣志梁維穈維芑詩經大雅穈赤粱粟也芑白粱粟也朱子集傳犬宜粱周禮天官犬宜粱者犬味酸而温粱米味甘而㣲寒氣味相成故云犬宜粱賈䟽漢中一種枲粱粒如粟而皮黒别録陶註黄粱出漢商間穗大毛長榖米俱粗于白粱而收子少不耐水旱食之香美勝於諸粱人號竹根黄唐本草今河陜間多種白粱而青黄稀有圖經本草粱者良也榖之良者也或云種出梁州故得粱名本草綱目關中處處有之榖穗有毛雀畏刺眼不啄比他榖益胃但性㣲寒其聲為凉其米青者為青粱夏日食之清凉其米白者形如芝麻為白粱亦曰芝麻粱古白粱謂之芑赤粱謂之虋黄粱穗大毛長謂之竹根黄今赤粱少青粱黄粱漢中有之黒粱穗如白梁其苞青而米黑然皆炊飯之米亦可借以釀酒但非黏物耳馬志赤黄二粱甲稃雖有二色而其米皆白咸陽縣志粱大穗有毛者米作飯山陽縣志小麥貽我來牟於皇來牟詩經周頌小麥䅘爾雅京兆貢麥豐州九原郡貢白麥唐書地理志小麥秋種夏熟南北皆有之出關中者為上品本草拾遺出關中味甘㣲寒圖經本草赤小麥赤而肥稀熟出鄭縣廣志爾雅翼曰麥者接絶續乏之榖最先熟又曰小麥生於桃二百四十日秀秀後六十日成葢秋種冬長春秀夏實具四時之氣自然兼有寒温熱冷故小麥㣲寒以為麯則温麫熱而麩冷其地煖處亦可春種至夏便收然比秋種者四氣不足故有毒今按關中有黒芒麥有無芒者為和尚麥色白者為白麥色紫者為紫麥紫麥麫多有色白而粒甚肥大者為御麥可為餅及蒸食早熟者為三月黄皆小麥也馬志麥生畢原者上品咸陽縣志出渭河北者粒小食之易化河以南者粒差大而色不光鮮然一種名三月黄者細膩潔白河北弗如也渭南縣志小麥後種者曰􅶣榖其六十日成者曰疾榖髙陵縣志有粒大無芒者謂之山麥雒南縣志大麥大麥麰爾雅京兆貢麰唐書地理志大麥出關中味鹹温㣲寒為五榖長唐本草今隨處有之以秦川為佳亦有數種有早熟者三月輒可食穗有六稜者為六稜麥有紅皮者為酒麥爾雅翼曰麰者周后稷所受瑞麥來牟也一作牟即今之大麥葢生於杏二百日而秀秀後五十日而成宜為飯又可為醋其糵可為餳馬志大麥種在小麥之後後十日者為植後一月者為􅶣髙陵縣志大麥皮粗粒大煑食之佳渭南縣志青稞麥青稞似大麥天生皮肉相離秦隴種之本草拾遺關中一種青稞粒㣲小色㣲青陳承别説青稞有大小二種似大小麥而粒大皮薄多麫無麩西人種之王禎農書青稞麥出安定形似小麥乆服黒髮馬志麥有露仁者為青稞可釀酒咸陽縣志有黒白二種較麥先熟洋縣志穬麥有二種一種𩔖小麥而大一種𩔖大麥而大圖經本草出延長縣味甘㣲寒久服力健馬志大麥穬似大麥粒少肥小麥穬似小麥粒亦肥俗呼裕麥山陽縣志蕎麥一名荍麥一名烏麥立秋前後下種宻種則實多稀則少八九月熟性最畏霜廣羣芳譜中伏種者最上立秋後種者次之其飯法可蒸使氣餾于烈日中暴令口開舂取作飯咸陽縣志蕎麥作麫不甚佳可偹諸糓之不熟渭南縣志甜苦二種延安府志種分大小二形三伏時種日周甲子收花甚芬為粥去稃造餅𩔖紙安塞縣志苦蕎似甜蕎無稜夏熟味苦宜山地甜蕎麫白味甘山陽縣志燕麥禹錫作遊𤣥都觀詩且言始謫十年還京師道士植桃其盛若霞又十四年過之無復一存惟兎葵燕麥動揺春風耳唐書劉禹錫傳一名雀麥苖葉似小麥而弱實似穬麥而細唐本草燕麥與江淮同榆人多種之九月收其實細如小麥不甚有稃炒食佳延綏鎮志有老燕麥小燕麥二種小燕麥生山坡商州志燕麥粒細長似菰米宜山地不宜肥山陽縣志蜀黍一名蜀秫一名髙粱莖粗髙丈餘狀似蘆荻而内實葉亦似蘆穗大如帚粒大如椒紅黒色米性堅實黄赤色有粘不粘二種本草綱目一名稻黍亦有酒飯二種商州志一名蘆穄山陽縣志玉蜀黍榦葉𩔖蜀黍而肥矮亦似薏苡苖髙三四尺六七月開花成穗如秕麥狀苗心别出一苞如㯶魚形苞上出白鬚如紅絨乆則苞拆子出粒如芡實大而瑩白廣羣芳譜玉蜀秫一名畨麥一名玉米有白紫藍之不同色山陽縣志沙米登相即沙米榆林鎮出馬志沙米苗莖如麻葉𩔖艾而稍圓有刺髙尺許生子成房粒細如黍杵去皮用羊羮作食味甘滑利大腸服之不飢邊外名黍喇棘譚吉璁曰彼榆人斯不耕不鑿地不愛寶求民之瘼秀發沙中瑞同旅榖延綏鎮志俱按葭州米脂志有之菵米神木縣生味甘寒爾雅云似燕麥可食一名守氣馬志荑稗荑苗似稗而穗如粟有紫毛即烏禾爾雅謂之本草綱目稗有水稗旱稗水稗生田中旱稗苗葉似􅭜子色深緑結子如黍粒茶褐色廣羣芳譜商州有之商州志大豆七月亨葵及菽詩經幽風蓺之荏菽大雅大豆菽也廣雅有黒白黄褐青斑數色黒者名烏豆可入藥本草綱目關中處處有之大豆以二月中旬種者為上馬志菽五色各出形味不一黄白青黑者皆可為腐咸寧縣志黑豆有大小二種大者早種小者晚種同時熟煮食之良渭南縣志菽之大者為京豆黄豆多而且佳雒南縣志豆有黒青紫數種均名黄豆可作腐可取油山陽縣志赤小豆宗奭曰關西多食之枝葉似豇豆葉㣲圓峭而小秋開花似小豆花而小淡銀褐色莢比緑豆莢稍大皮色㣲白帶紅三青二黄時取收之本草綱目綠豆圓小者佳大者名植豆開寶本草綠豆性凉煮飯益氣除熱亦可作粉渭南縣志綠豆亦有數種山陽縣志豌豆邠州開元貢蓽豆元和志京兆府先奏當管蟲食豌豆請據數折納大豆唐陸贄状邠州靖難軍貢蓽豆宋史地理志豌豆一名蓽豆一名胡豆農書云俗呼豌豆大者為淮豆廣羣芳譜關中有胡豆有豌豆有淮豆馬志豌豆或粒煑或和煑米粥又可為粉諸畜頼之茁壯渭南縣志豌豆有青白二種陜西多種以啖馬山陽縣志蠶豆方莖中空葉狀如匙頭二月開花如蛾狀結角連綴似蠶形本草綱目闗中有蠶豆馬志豇豆其花有紅白二色莢有紅白紫赤斑駁數色長者至二尺生必兩兩並垂子㣲曲如人腎形廣羣芳譜闗中有之馬志藊豆一名沿籬豆一名蛾睂豆花有紫白二色莢形或長或團或如龍爪虎爪子有黒白赤斑四色廣羣芳譜延長出能解酒毒馬志扁豆可雜炊米麥渭南縣志板豆亦名扁豆又名鷄蝨豆花紅白二種白者佳山陽縣志脂麻胡麻即脂麻有遲早二種黒白赤三色莖皆方秋開白花亦有帶紫艶者有四稜六稜七稜八稜者皆隨土地肥瘠而然本草綱目三月種九月熟味甘寒可榨為油咸陽縣志各邑俱有延安府志脂麻即油麻可作油有三色亦名胡麻亦名巨勝入藥用黒色山陽縣志脂麻有黒白紅三種蒲城縣志有二種白色者味香紫色者味苦葭州志亞麻一名鵶麻一名壁虱胡麻苗葉俱青花白色陜西人亦種之其實亦可榨油然燈氣惡不堪食廣羣芳譜麻子九月叔苴詩經豳風苴麻子也毛傳喪服注云苴麻之有實者然則叔苴謂拾取麻實以供食也孔䟽一名漢麻以别胡麻也本草綱目出南北山及鳯翔諸處爾雅翼曰麻實可以養人其利最廣然麻之屬總名麻别而言之則有實者别名苴而無實者别名枲馬志麻子可取油山陽縣志薏苡仁二三月生葉如初生芭蕉五六月抽莖開花結實有二種一種粘牙者尖而殻薄即薏苡也其米白色如糯米一種圓而殻厚堅硬者即菩提子其米少即粳也但可穿作念經數珠故人呼為念珠云本草綱目處處有之今都用梁漢者春生苗莖髙三四尺葉如黍葉開紅白花作穗結實形如珠子廣羣芳譜鎮安縣亦有之馬志一名川糓一名珠子米名薏米亦名薏仁惟罩川接鄖壤處有之不多山陽縣志果屬梅摽有梅詩經召南饋食之籩其實乾䕩周禮天官乾䕩梅也鄭註上林苑梅七朱梅紫葉梅紫蕚梅同心梅麗枝梅燕梅猴梅西京雜記梅實生漢中山谷名醫别録今漢川皆有之圖經本草李白遊慈恩寺僧獻綠英梅纂要山陽縣天臺山盛産梅每遇花開山如綴玉西安府志梅有硃砂梅錢梅照水梅玉蝶梅星梅南鄭縣志梅清韻與南方同植之者殊少邑人尤賤其子熟則落林下委棄弗取沔縣志杏上林苑有蓬萊杏又有文杏謂其樹有文彩也西京雜記武功山有二杏樹各大丈餘東花西實至明年易向述異記金杏大如梨黄如橘武帝上林苑遺種也一名漢帝杏杏譜巴旦杏一名八擔杏關西諸處皆有鮮者尤脆美廣羣芳譜花千葉者曰文杏美肉甘核又曰巴旦杏又有梅杏似李而大咸寧縣志有三妙杏花千葉實大子甜商州志桃桃之夭夭灼灼其華有蕡其實詩經周南上林苑有秦桃緗核桃榹桃金城桃綺葉桃紫霜桃文桃西京雜記明皇禁苑中有千葉桃盛開帝曰不獨萱草忘憂此花亦能銷恨開元天寶遺事桃陜西者尤大而美圖經本草有甘核者名巴旦桃又有扁桃李光桃味佳花有千葉者曰碧桃絳桃緋桃唯山桃花開最早咸寧縣志桃出張村里者佳三原縣志李華如桃李詩經召南北山有李小雅上林苑有紫李緑李朱李黄李青綺李青房李同心李合枝李金枝李顔淵李羌李燕李蠻李侯李西京雜記杜陵有金李李大者謂之夏李尤小者謂之鼠李述異記終南山出好李花貴侯富民以千金買種有致富者耕桑偶記貞觀中玉華宫李樹連理隔澗合枝類書輯要䑕李關陜甚多本草衍義鳯翔府産胡李寰宇記李有赤黄二種咸陽縣志李有赤青綠黄數色咸陽縣志李稱御黄者佳渭南縣志李有紫李麥李漢中府志李異他處供用頗多邠州志綏德州名玉黄者佳延綏鎮志車下李六月食鬱及薁詩經豳風鬱棣屬毛傳唐棣之𩔖屬劉稹毛詩義問云其樹髙五六尺其實大如李正赤食之甜本草云一名雀李一名車下李一名棣孔䟽别録云一名郁李陸璣詩䟽作薁李非爾雅棠棣即此㓂宗奭曰郁李子如御李子紅熟堪㗖㣲濇亦可蜜煎陜西甚多本草綱目郁李仁同官出今甘泉鄜州洛川宜君皆貢之馬志出鄜州延安府志郁李仁每年額供二十斤送司解部鄜州志梨上林苑有青梨芳梨大谷梨細葉梨縹葉梨金葉梨瀚海梨東王梨紫條梨西京雜記武帝御宿園出大梨如五升瓶落地則破其取梨先以布囊承之號曰含消三秦記雲陽車箱坂下有梨園一頃梨數百株青翠繁宻望之如車葢雲陽宫記新豐箭谷枝懸六斤庾肩吾啓青城山邢道士曰太白南溪有紫花梨一樹耳目記關以西𢎞農京兆右扶風界諸谷中梨率多供御廣志昔人言梨以𢎞農京兆為稱本草綱目今耀州産者亦佳馬志梨名香水者佳渭南縣志梨間重至斤難久貯盩厔縣志王謙村饒于梨朝邑縣志梨異他處土人善藏者仲春猶鮮供用甚多邠州志山梨隰有樹檖詩經秦風檖赤羅也毛傳陸璣疏云一名山梨今人謂之楊檖實如梨但小耳一名鹿梨一名䑕梨今人亦種之極有脆美如梨者孔䟽上林苑楟十株西京雜記張揖曰亭山梨也上林賦註採按楊慎丹鉛録言尹伯奇楟花以濟飢註者言楟即山梨乃今棠梨也恐誤棠梨蔽芾甘棠詩經召南甘棠杜也毛傳郭璞曰今之杜梨又曰杜赤棠白者棠孔䟽上林苑棠四赤棠青棠白棠沙棠西京雜記張揖曰沙棠狀如棠黄華赤實其味似李無核上林賦註杜梨即甘棠也安定縣志樝上林苑查三蠻查羌查猴查西京雜記木瓜之短小而味酢濇者為子一名木桃一名和圓和子重大而黄色無重蒂者為榠一名木梨一名木李生于呉越故鄭樵通志謂之蠻本草綱目處處有之小于木瓜更酢澀色㣲黄蔕核皆粗廣羣芳譜榅桲㣲大而狀醜有毛其味香闗輔乃有述征記生關陜沙苑出者更佳其實大抵𩔖樝子但膚慢而多毛味尤甘其氣芬馥置衣笥中亦香圖經本草秦中物專靈榲桲為佳果宋無名氏詩蒺藜已枯天馬歸嫩蠟籠黄霜冐榦梅堯臣得沙苑榲桲詩即樝𩔖之生于北土者與木瓜一𩔖各種本草綱目棣常棣之華詩經小雅白棣樹也如李而小如櫻桃正白今官園種之又有赤棣樹亦似白棣葉如刺榆葉而㣲圓子正赤如郁李而小自關西多有之陸䟽今闗西有棣樹子如櫻桃可食爾雅郭註棣花山以地多棣花而名商州志櫻桃孝惠帝曾春出游離宫叔孫生曰古者有春嘗果方今櫻桃熟可獻史記叔孫通傳櫻桃一名含桃呂氏春秋云鸎鳥所含故曰含桃上林賦註上林苑楔四株西京雜記上遊櫻桃園引中書門下五品以上諸司長官學士等入芳林園嘗櫻桃唐書中宗本紀京兆府貢櫻桃地理志鄜州櫻桃山上多櫻桃樹花史一名楔廣羣芳譜一名鶯桃鶯多啣食故名咸寧縣志出膚施延安府志枇杷枇杷橪柿上林賦註張揖曰枇杷似槲樹而長葉子如杏上林賦註上林苑枇杷十株西京雜記興元貢唐書地理志大厯十四年罷山南貢枇杷德宗本紀今襄漢有之肥枝長葉大如驢耳冬開白花四月成實作梂熟時色如黄杏圖經本草華山講堂西頭有枇杷園華山記太白山神窪草木甚稀惟産金背枇杷萬年枇杷皆非世有三清池金背枇杷甚多擷其葉可療百病賈鉉太白山禱雨記枇杷金色而肥甘沔縣志柰上林苑柰三白柰紫柰綠柰紫柰大如升核紫花青其汁如漆著衣不可浣名脂衣柰西京雜記似林檎而大西土最多有白赤青三色皆夏熟今闗西人以赤柰楸子取汁塗器中名果單本草綱目一名頻婆西土最豐廣羣芳譜大而不酸者佳渭南縣志林檎初脩上林苑羣臣逺方各獻名果異樹有林檎十株西京雜記林檎佳美闗輔乃有述異記周氏花木記曰林檎有六種蜜林檎花紅林檎水林檎金林檎轉身林檎橾林檎一云即來禽也延綏鎮志出延長延安府志蘋果果如梨而圓滑生青熟則半紅半白光潔可愛廣羣芳譜蘋果佳李自成入闗檄取甚多民大累爭伐其樹種幾絶商州志極佳山人不待熟而取之山陽縣志按本草柰與蘋果為一物而羣芳譜謂為一類二種也今從之枳椇南山有枸詩經小雅枸樹山木其狀如櫨髙大如白楊枝柯不直子著枝端大如指長數寸噉之甘美如飴今官園種之謂之木蜜古語云枳椇來巢言其味甘故飛鳥慕而巢之陸䟽杜工部入喬口詩云樹蜜早蜂亂錢箋引古今注枳椇子一名樹蜜證之按枳椇子秦中呼為拐棗其實拳曲如老人杖核在肉外味甘與棗同觚賸頭按華州有萬壽菓葉如楸實稍細于箸兩頭横拐一名拐棗紫紅色九月成熟盖即枳椇子也蒲萄蒲陶似燕奥可作酒上林賦註張騫使西域還得蒲萄博物志生五原山谷名醫别錄太宗破髙昌收馬乳蒲萄種于苑中併得酒法仍自損益造酒成緑色芳香酷烈味若醍醐南部新書蒲萄在漢西京似亦不少杜陵田五十畝中有蒲萄百樹今在京兆非止禁林也酉陽雜爼後凉錄曰龜兹國人家有至千斛蒲萄漢使取實來離宫别館傍盡種唐類函唐太宗收馬乳蒲萄釀酒長安始識咸寧縣志蘡薁六月食鬱及薁詩經豳風薁蘡薁毛傳薁鬱𩔖小别而同時熟孔䟽一名野蒲萄蔓葉花實與蒲萄無異實小而圓色不甚紫其莖吹之氣出有汁如通草本草綱目野蒲萄細如小豆色紫蓓蕾而生狀如蒲萄蟠之髙樹懸附可觀延綏鎮志棗八月剝棗詩經豳風吉少時學問居長安東家有大棗樹垂吉庭中漢書王吉傳西王母為帝設玉門之棗漢武帝内傳上林苑有弱枝棗玉門棗棠棗青華棗赤心棗西王棗西京雜記周文王時有弱枝之棗甚美禁之不令人取置樹苑中廣志馬牙者佳渭南縣志棗有大棗牙棗羊心䏩膊團棗呉堡縣志柿慈恩寺中柿樹是法力上人手植酉陽雜爼朱柿出華山似紅柿而圓小皮薄可愛味更甘圖經本草華州豐原鄉董侯里出寰宇記柿為𩔖甚多實可備饑咸寧縣志重臺與小而圓者佳渭南縣志柿出豆村者佳三原縣志柿多可為餅商州志沿山一帶地多石種柿作餅鬻為日用之資華州志椑柿上林苑有青椑赤葉椑烏椑西京雜記一名漆柿一名花椑乃柿之小而卑者廣羣芳譜軟棗上林苑有梬棗西京雜記輭柿一名㮕棗一名梬棗其木𩔖柿而葉長但結實小而長乾熟紫黒色一種小圓如指頭大者味尤美其樹接柿甚佳廣羣芳譜按平利縣志有之木瓜元獻皇后思食酸味明皇以告張説因進經袖出木瓜以獻明皇雜錄商州楚地户木瓜大如甒張舜民詩葉光而厚實小如瓜而有鼻津潤味不木者為木瓜圓小于木瓜味木而酢濇者為木桃似木瓜而無鼻大于木桃味濇者為木李亦曰木梨本草綱目葭按延安府山陽州諸志俱有之山木瓜五原郡貢唐書地理志産崖壑間極蕃盛野夫取作油安塞縣志山木瓜北方一名文官果一名㯽榔榆俗不知採食俟其子熟取油用周氏花木記曰木瓜有五山木瓜輭條木瓜宣州木瓜香木瓜榠樝延綏鎮志文官果子熟可取油米脂縣志安石榴上林苑有安石榴十株西京雜記漢張騫使西域得塗林安石國榴種以歸故名博物志温湯七聖殿繞殿石榴皆太真所植洪氏雜錄鄭䖍云石榴堪作胭脂睿宗女代國公主常為之取其實于禁中叢生成林北戸錄近昭陵南山下多石榴結實大而甘美傳為唐陵園種昭陵志實有紅白二種花有千葉單葉咸寧縣志子軟而色淡者佳渭南縣志榴重至斤難乆貯盩厔縣志有紅黄白粉四種南鄭縣志石榴花茂實蕡盈村皆樹之山陽縣志栗隰有栗詩經秦風烝在栗薪豳風栗五方皆有周秦特饒陸䟽栗周土所宜木朱子集傳栗出三輔范子燕秦千樹栗其人與千户侯等史記貨殖傳上林苑有侯栗榛栗瑰栗魁栗嶧陽栗栗大如拳西京雜記御宿園出栗十五枚一升三秦記西山麓中有栗藝植以來蕭森繁茂華山記漢武果園栗味甘而小不如三秦記所云括地志栗有關中侯栗大如雞子梁州獻栗徑寸半廣志小而甘美山陽縣志榛榛楛濟濟詩經大雅榛似栗而小關中鄜坊正多禮記鄭註上申之山在呉堡縣下多榛西山經禮記鄭註言關中甚多此果關中秦地也榛之從秦葢取此意爾雅翼扶風隴州土貢榛實唐書地理志鳯翔貢榛實宋史地理志榛子出隴州明一統志榛仁出宜君宜川延安府志實似栗而小味美于栗咸寧縣志胡桃上林苑有胡桃西京雜記陳倉胡桃薄皮多肌廣志此果漢時張騫使西域始得種還植之秦中今陜洛間甚多大樹厚葉多隂實亦有房秋冬熟時採之出陳倉者薄皮多肌圖經本草開元中長安物價大减胡桃䏑十錢一秤類書輯要出南山咸寧縣志核桃瓤綿者佳渭南縣志核桃最佳麟遊縣志果之最盛者無如核桃市餘猶足供燈油之用雒南縣志羊桃萇楚今羊桃或曰鬼桃葉長而狹紫赤色其枝莖弱過一尺引蔓于草上子赤狀如䑕矢詩經陸䟽花葉皆似桃子細如棗核根似牡丹蜀本草果有羊桃洋縣志按今長安咸寜俱有之獼猴桃今陜西永興軍南山甚多枝條柔弱多附木而生子十月熟色淡綠繁細本草衍義洋州雲亭山生獼猴桃甚甘酸食之止渴海錄一名獼猴梨其形如梨其色如桃而獼猴喜食故有諸名本草綱目銀杏一名白果葉似鴨掌又名鴨脚子本草綱目蒲城白果一樹世傳仙人所擲枝垂生果出身樹腫成壘塊破之得二三斗或至石餘形差小味則不殊羣芳譜南山銀杏甚佳鄠縣志橘蜀漢千樹橘其人與千户侯等史記貨殖傳生山南山谷名醫别錄扶荔宫有甘橘百餘本三輔黄圖唐于蓬萊殿九月九日賜羣臣橘風土記金橘盧橘夏熟上林賦盧橘為秦樹李青蓮詩司馬相如上林賦曰黄甘橙楱有一種小橘名楱疑即今之金橘涪翁雜記一名盧橘一名金柑廣羣芳譜柑黄甘橘屬而味精上林賦註興元貢唐書地理志天寶年内中柑樹結實帝日與貴妃賞御呼為瑞聖奴清異錄鼎州貢柑子尚方多不過千少或百數燕翼貽謀錄唐上元夜多以黄羅包柑遺近臣謂之傳柑宴全唐詩話柑較他邑為勝城固縣志柑華於夏落實於冬味苦遜橘柚沔縣志橙上林苑有橙十株西京雜記説文曰橙橘屬也上林賦註洵陽有之洵陽縣志松子關右亦有但細小味薄也本草衍義鳯翔府土産寰宇記寶雞出鳯翔府志菴羅果棃之𩔖也先諸棃熟本草衍義俗名香葢種出西域亦柰𩔖也明一統志有按葭州呉堡志俱此果無花果一名映日果一名優曇鉢最易生插條即活在處有之廣羣芳譜五月内不花而實實出枝間狀如木饅頭本草綱目果有無花果咸縣縣志菱秦謂之薢茩許氏説文武帝旦露池西靈池中有浮根菱根出水上葉沉波下霜降彌美因名青氷菱洞㝠記昭帝元始元年穿琳池中有倒生菱莖如亂絲一花千葉根浮水上實沉泥中名紫菱食之不老拾遺記形細已甚味則與産江南者無異沔縣志芡加籩之實䔖芡㮚脯周禮天官蓮芡之實有櫜韜地官鄭註唼喋䔖芡西征賦芡可供祭祀渭南縣志荸臍小者名鳬茈大者名地栗日用本草西鄉有之西鄉縣志寧按今長安咸縣俱有之菇根一年十二枚遇閏月多一枚似慈母乳故名多生水田中土人不食山陽縣志瓜七月食瓜詩經豳風則按孔䟽云鬱薁可生食故以食言之𤓰亦當是可生食者如甜𤓰之類邵平者故秦東陵侯秦破為布衣貧種𤓰于長安城東瓜美世謂之東陵瓜史記蕭相國世家興元貢唐書地理志五代郃陽令胡嶠于囬紇得瓜種培以牛糞結實大如斗味甘名曰西瓜天禄識餘西𤓰出朝邑比他處産者大而且佳馬志西瓜出定州村及青門者佳長安縣志蓏則有西𤓰甜𤓰金銀𤓰之𩔖西𤓰産東陵鄉近長樂坡亦産味勝東陵咸寧縣志西𤓰陽洪店出味美于他處乾州志西瓜味甘美形大如斗邠州志其按王禎云𤓰類不同用有二供果者為果𤓰甜𤓰西𤓰是也供菜者為菜𤓰胡𤓰越𤓰是也故列西𤓰甜𤓰于果類而列胡𤓰越𤓰等于蔬類云甜瓜葉大數寸五六月開黄花六七月瓜熟其𩔖有團長扁尖大徑尺小或一捻其稜或有或無其色或青或綠或黄斑糁斑或白路黄路其瓤或白或紅其子或黄或赤或白或黑本草綱目有按今陜地多之蔬屬秦椒秦椒生秦嶺上名醫别録金州貢椒唐書地理志藍田秦嶺間大有之唐本草今鳯金商州皆有之圖經本草此秦地所産者故言秦椒大率椒株皆相似但秦椒葉粒差大本草衍義秦椒花椒也始産于秦其葉對生尖而有刺四月生細花五月結實生青熟紅大于蜀椒本草綱目木之家植者惟椒雒南縣志生秦中者名秦椒對川椒而名也山陽縣志漢椒出武都赤色者善范子陜洛間人家多作園圃種之木髙四五尺似茱萸而小有針刺葉堅而滑四月結子無花但生于枝葉間顆如小豆而圓皮紫赤色圖經本草秦地亦有蜀椒種本草衍義蜀椒一名漢椒本草綱目生于漢中者為漢椒明一統志番椒俗呼番椒為秦椒結角似牛角生青熟紅子白味極辣山陽縣志按廣羣芳譜云秦椒以産自秦地故名今北方秦椒另有一種葢即番椒也薑關中土宜薑漢書東方朔傳茈薑蘘荷上林賦張揖曰茈薑子薑也上林賦註蜀漢薑舊美别録陶註處處有之以漢中者為良本草綱目薑較他邑為勝城固縣志蘹香子亦名茴香本草不載所出今三原人家園圃種之甚多馬志蒔蘿一名小茴香其子簇生狀如蛇床子善滋食廣羣芳譜山谷中惟小茴香遍地皆生淳化縣志韭獻羔祭韭詩經豳風朝事之豆其實韭葅周禮天官韭生山中者名藿爾雅䟽陳其年遊紀云厯刼綿綿多似櫟陽之韭葢古諺櫟陽家家種韭也臨潼縣志水韭醴泉出醴泉縣志沙韭與韭無異有一種粗大者不可食延綏鎮志山韭似家韭而硬山陽縣志泊里韭佳朝邑縣志有按今臨潼縣温泉旁田數十畆皆種韭味異他處俗謂之嬾韭葱葱㳿處末禮記曲禮隴上沙葱葉正齊曹唐詩冬葱即凍葱夏衰冬盛莖葉俱軟美山南有之蜀本草夏州産葱味辛寰宇記三川皆産樊川者佳咸寧縣志葱有冬漢胡茖四種咸陽縣志水葱醴泉出醴泉縣志沙葱葉細長不甚類葱延綏鎮志以子初種出者俗謂之小葱壅者謂之羊角葱洵陽縣志一種樓葱名龍角葱山葱葉似玉簪葉而味同葱山陽縣志蒜蒜卵蒜也俗謂之小蒜胡國有蒜十子一株名曰胡蒜俗謂之大蒜伏候古今注興元貢夏蒜唐書地理志葫出梁州者大徑二寸最美少辛涇陽者皮亦甚辣蜀本草蒜處處有之惟耀州産者更辛辣作汁經宿不敗三川皆産樊川者美咸寧縣志小蒜葉似薤而細根白延綏鎮志秦中有春蒜瓣小而多春栽夏熟小蒜一名澤蒜山陽縣志薤唐李生與客謁華隂令客能知人之飲食客曰明日必食椒薤酒果然太平廣記酥暖薤白酒長慶集蘓恭云有赤白二種白者補而美赤者苦而無味廣羣芳譜蒝荽張騫使西域始得種歸故名胡荽今俗呼為蒝荽柔莖圓葉有岐根軟而白立夏後開細花成簇淡紫色五月收子如大麻子辛香本草綱目一名胡荽咸陽縣志屠本峻曰臭如葷草味比菘薹肉食者喜藿食者諧延綏鎮志苜蓿宛馬嗜苜蓿漢使取其實来于是天子始種苜蓿肥饒地離宫别舘傍苜蓿極望史記大宛傳樂遊苑多苜蓿一名懷風時人或謂之光風風在其間常蕭蕭然日照其花有光采故名茂陵人謂之連枝草西京雜記陶隱居云長安中有苜蓿園北人甚重之㓂宗奭曰陜西甚多用飼牛馬嫩時人兼食之本草綱目李白詩云天馬常銜苜蓿花是此味甘淡不可多食有宿根刈訖復生馬志民間多種以飼牛咸寧縣志蔓菁葑關西謂之蕪菁詩經陸䟽蘴蕘蕪菁也關之東西謂之蕪菁揚雄方言朱泚圍奉天供御纔有糲米二斛每夜縋人于城外采蕪菁根進之幸奉天錄出綏德州明一統錄根長而白味辛苦而短莖粗葉大而厚濶夏初起臺開黄花結角如芥其子均圓似芥子而紫赤色本草綱目味甘根葉俱可食馬志根葉蓄可禦冬子為油資用甚廣咸寧縣志一名蕪菁其味甘美結蕋時作菜用香辣有味渭南縣志一名諸葛菜即詩經葑也子取油亦曰菜油山陽縣志同蒿一名蓬蒿莖肥葉綠有刻缺㣲似白蒿廣羣芳譜性平和但能令氣滿不可多食咸陽縣志白菜菘白菜也黄縐無絲者佳更霜愈美所謂秋末晚菘也咸寧縣志無絲白最佳臨潼縣志白菜較他邑為佳潼關衛志冬菜大而嫩藏地窖中經春不壞淳化縣志芥三川皆産樊川者美咸寧縣志芥似菘而有毛味辛可作葅食有青紫白三種夏種秋成咸陽縣志石花芥低小皆以八九月下種冬月食者俗呼為臘菜西鄉縣志芥種多以春不老為第一沙芥葉𩔖菠薐而尖長肥厚有光潤作虀味辛過于芥延綏鎮志芥味辣釋芥菜二月採瀹之更辛于家芥山陽縣志菠薐一名赤根菜作羮葉浮羮上故名咸寧縣志劉禹錫嘉話錄云本自頗陵國流入中國語訛耳性冷能解酒毒咸陽縣志菜中有水銀多食墜氣臨潼縣志宗按唐會要云太時尼波羅國獻波薐菜類紅藍實如蒺藜火熟之能益食味即此莧莧六種赤莧白莧人莧紫莧五色莧馬莧也蜀本草馬齒莧味寒圖經云根白葉青梗赤花黄子黒一名五行菜咸陽縣志髙濂曰馬齒莧初夏采沸湯焯過晒乾冬用佳王鴻漸曰馬齒莧馬齒莧風俗相傳食元旦延綏鎮志莧有數種白者佳山陽縣志元旦食人呼吉利菜葭州志葵七月亨葵及菽詩經豳風葵菜名朱子集傳松下清齋折露葵王維輞川莊詩葵為五菜之主古人采葵必待露解故曰露葵本草綱目苦菜四月秀葽詩經豳風堇荼如飴大雅荼苦菜生山田及澤中得霜甜脆陸䟽詩豳風葽鄭康成疑為王萯今按四月秀者野人呼為苦葽四月秋氣生故苦葽秀月令言苦菜即苦葽也兼明書唐景龍二年􅔛縣民王上賔家有苦蕒菜髙三尺餘上廣尺餘厚二分珍珠船苦萊即苦蕒也其莖中空折之有白汁本草綱目其莖潔白長五六寸夏間掇之充饑有汁味甘柔脆安塞縣志内則云濡豚包苦用苦葉是也延綏鎮志荼即苦菜山陽縣志芑薄言采芑詩經小雅豐水有芑大雅芑菜似苦菜也莖青白色摘其葉有白汁出脆可生食亦可蒸為茹陸䟽同州土貢芑唐書地理志莙薘苗髙三四尺莖若蒴藋有細稜夏盛冬枯蜀本草葉似白菘四月開細白花實如茱萸梂本草綱目性冷多食破腹咸陽縣志一名甜菜扶風縣志通按李時珍云菾與甜因其味也蕓薹九月十月下種生葉形色㣲似白菜冬春采薹心為茹三月則老不可食開小黄花四瓣如芥花結莢收子亦如芥子隴地多苦寒冬月多種此菜能歴霜雪近有油利種者亦廣本草綱目香菜有三種一種似紫蘇葉一種葉大二十歩内即聞香一種堪作生菜嘉祐本草羅勃一名香菜處處有之本草綱目性平與諸菜同食味香辟腥乾之可調羮咸陽縣志薇言采其薇詩經召南薇山菜也莖葉皆似小豆蔓生其味亦如小豆藿可作羮亦可生食孔䟽薇頗佳盩厔縣志按詩䟽以為迷蕨鏐蕨陟彼南山言采其蕨詩經召南蕨鼈也毛傳周秦曰蕨草木䟽生商州馬志春吐苗如拳根可作粉洋縣志蕨菜一名鱉芽初生葉如小兒拳名拳菜根作粉儉年代糧山陽縣志薺夏州貢霜薺元和志髙力士詩曰两京作斤賣五溪無人採明皇雜錄小薺葉花莖扁味美最細小者名沙薺大薺科葉皆大而味不及其莖硬有毛者名析蓂味不佳本草綱目薺菜田野中作葅羮最佳酉陽雜爼云薺早生主豐年咸陽縣志薺菜兒一名東風薺春月採之生熟皆可食延綏鎮志有大小二種山陽縣志大薺菥蓂大薺也爾雅生咸陽山澤及道旁名醫别錄即薺之莖硬有毛者與薺並以冬至後生苗二三月起莖五六寸開細白花結莢三角内子如葶􅏣本草綱目似薺細葉俗呼之曰老薺馬志俗呼辣薺咸陽縣志掃帚薺一名獨掃春采熟食王鴻漸曰掃帚薺青簇簇去年不收空倚屋但願今年收兩熟場頭掃帚掃盡禿延綏鎮志蕺菜生濕地葉似蕎麥而肥莖紫赤色山南人好生食之關中謂之葅菜唐本草秦人謂之葅子本草綱目藜北山有萊詩經小雅萊草名葉香可食者也朱子集傳藜一名萊一名紅心灰藋一名落藜老則可為杖廣羣芳譜野落籬正二月采頭湯過可食延綏鎮志灰藋周原膴膴堇荼如飴詩經大雅堇藋也今三輔之言猶然廣雅一名灰條菜此菜莖葉上有細灰如沙而枝葉翹趯故名本草綱目灰莧菜髙濓曰采成科熟食煎炒比家莧更美榆俗謂之冷菜食之能破腹菜之三月種者名熱菜延綏鎮志灰藋亦有數種山陽縣志灰莧不植自名灰藋葭州志仙人菜味冽氣香出深山中或有意挑之輒致風雷沔縣志玉環菜一謂之甘露榆俗呼滴溜屠本峻曰甘露草何闌珊堪綴步揺照玉環延綏鎮志地蠶俗名滴溜商州志燕兒菜葉長如燕尾譚吉璁曰燕子來燕子來沙際黄黄翠甲開延綏鎮志羊角菜葉似羊角花黄而扶蕚甚長根亦甘美延綏鎮志剪刀菜剪刀股春採生食兼可作葅野菜譜西鄉有之西郷縣志蓴葉如荇菜而差圓形似馬蹄莖紫色大如筯柔滑可羮廣羣芳譜鳯翔出鳯翔府志芹言采其芹詩經小雅芹菜也可以為葅周禮芹葅鄭箋魏徴好嗜醋芹太宗召賜食有醋芹三盃公見之喜龍城錄芹產榆林鎮芹菜溝两岸馬志有二種荻芹取根白色赤芹取莖葉並可作葅及瀹食咸寧縣志華清宫芹為最臨潼縣志産碧澗中極香潔沔縣志芹有水陸二種山陽縣志山藥藷藇出三輔白色者善范子秦名玉延呉氏本草始生赤莖細蔓花白實青黄根中白皮黄𩔖芋馬志薯蕷程棨曰唐改名薯藥宋名山藥延綏真志華陰山藥天下之異品也華州志山產者良華陰縣志山藥極佳山陽縣志芋關中土宜芋漢書東方朔傳天芋生終南山葉似荷而厚酉陽雜爼芋有六種青芋紫芋真芋白芋連襌芋野芋也關陜諸芋遍有山南惟有青白紫三芋而已唐本草一名土芝一名蹲鴟洋縣志栽田畔可供玉糝羮沔縣志有水陸二種苗可作蔬山陽縣志土芋似小芋肉白皮黄梁漢人名為黄獨蒸食之唐本草土豆即少陵之黄獨山陽縣志土癭俗呼土臃大如盌黑皮白肉灰水煮去皮如山藥山陽縣志百合􅗰麄如箭四靣有葉四五月開紅白花如石榴嘴根大如胡蒜採根人食之甚益氣馬志百合白花揺風甚香沔縣志百合為山産之佳者雒南縣志百合花甚香山陽縣志山産者佳華陰縣志蘿蔔嫩葉為生菜食大葉可熟啖秦最多唐本草有赤白二種赤者甚佳可為羮咸寧縣志盈田坊者佳渭南縣志一名萊菔一名紫花菘有圓長紅白不同山陽縣志胡蘿蔔肥莖有白毛辛臭如蒿不可食冬月掘根有黄赤二種長五六寸大者盈握本草綱目有按今陜地多之萵苣苣有數種色白者為白苣色紫者為紫苣味苦者為苦苣合璧事類夏州貢苣元和志彭乘墨客揮犀云萵菜自倭國來故名陳藏器云白苣葉有白毛本草綱目今人多飜栽成笋為𬞞中極品咸寧縣志甜苣葉尖㣲長有稜四五月間起莖開黄花三月采食根亦佳苦苣葉苗莖與甜苣同惟花紫為異延綏鎮志萵苣有數種山陽縣志菜𤓰疆埸有𤓰是剝是菹詩經小雅剝𤓰為菹也毛傳剝削淹漬以為菹鄭箋有青白二色生食可充果蔬醬豉糖醋藏浸皆宜亦可作葅本草綱目其細而長者曰稍𤓰咸寧縣志稍𤓰一名菜𤓰洋縣志一名越𤓰一名稍𤓰山陽縣志黄𤓰一名胡𤓰張騫使西域得種故名陳藏器曰北人避石勒諱改呼黄𤓰社寶拾遺錄云隋大業四年避諱改胡𤓰為黄𤓰與陳氏説異本草綱目有青白二色或以為月令之王𤓰誤也王𤓰乃野生如核桃大可入藥山陽縣志黄𤓰皮略厚近秋始繁結白水縣志絲𤓰一名蠻𤓰始自南方來故名本草綱目結實狀如𤓰有短而肥者有長而瘠者九月將老取子瓤絲如網可滌器廣羣芳譜絲𤓰一名天蘿扶風縣志山地出者不長山陽縣志冬𤓰果中子繁者惟冬𤓰故嗜果者目𤓰為百子甕清異錄味清芳更霜始美咸寧縣志一名白𤓰出山中者形小山陽縣志南𤓰結𤓰正圓大如西𤓰上有稜如甜𤓰廣羣芳譜形色味俱不一斑者曰番𤓰黒者曰北𤓰咸寧縣志形分圓長色異青黄安塞縣志倭𤓰以来自倭故名又名番𤓰味甜南𤓰圓扁有瓣皮硬味劣山陽縣志苦𤓰一名錦荔枝一名癩葡萄引蔓莖葉卷鬚並如葡萄而小七八月開小黄花五瓣結𤓰長四五寸短者二三寸青色皮上痱㿔如癩及荔枝殻狀熟則黄色自裂内有紅瓤裏子瓤味甘可食本草綱目按今陜地多有之壺盧八月斷壺詩經豳風匏之短柄大腹者為壺本草綱目蔓生莖長大小數種廣羣芳譜乾可作瓢咸寧縣志壺盧作葫蘆非山陽縣志瓠子甘瓠纍之幡幡瓠葉采之亨之詩經小雅無柄而圓大形扁本草綱目瓠子就地蔓生處處有之苗葉花俱如壺盧結子長一二尺夏熟廣羣芳譜味苦寒先壺盧成咸陽縣志惟西郭之瓠早茹盩厔縣志茄子衍義曰出新羅國味甘冷不可多食咸陽縣志一名落蘇洋縣志又名崑崙𤓰沔縣志茄有紫白二色山陽縣志芥藍葉似藍靛結實葉下根上味甜脆馬志葉如藍草而肥厚種之畦塍根圓大𩔖葵露出土外開黄花或謂之撇藍能去煤毒延綏鎮志蓮他邑不宜獨潼種之潼關衛志等按擘藍一名芥藍今馬志延綏志葭州米脂府谷志俱作茄蓮藍田潼關志又作蓮盖音訛也圓根山間人多種之岐山縣志濟荒與蔓菁同功雒南縣志刀豆蔓引一二丈葉如豇豆葉而稍長大五六七月開紫花如蛾形結莢長者近尺㣲似皂莢扁而劍脊三稜本草綱目咸陽有之咸陽縣志木耳各木皆生其良毒亦隨木性本草綱目生木上如耳可食馬志出宜川中部鄜州宜君延安府志沙木耳沙蒿朽根中生者雨後采之作葅延綏鎮志地輭狀如木耳雨後急採之見日即不堪廣羣芳譜一名地耳一名地踏菜春夏雨後生腴地上王鴻漸曰地踏菜生雨中晴日一照郊原空延綏鎮志筆頭菜潘之恒曰鬼葢鬼繖鬼屋皆菌種而異名夏日得雨驟生一名地葢地芩又有名鬼筆者生陰處頭如筆紫色名朝生暮落花今榆俗之筆頭菜即此采乾作食佳與南方異延綏鎮志盖按綱目云鬼盖土菌之類黑莖赤一名鬼繖一名鬼屋地芩即鬼盖之色黄白者鬼筆即鬼盖之無繖者紅紫鬆虗如花之狀故得花名蘑菇蕈一種狀如羊肚名羊肚菜本草綱目蘑菇㺅頭羊肚俱出宜川延安府志蕈按㺅頭亦蕈類如地之名獐頭筍維筍及蒲詩經大雅醢人加豆之實有筍菹周禮天官竹萌也詩經毛傳司竹監掌植竹歳以筍供尚食唐書百官志興州貢筍興元府貢冬筍地理志今漢中郡出䉋竹根深筍冬生地中人掘取食之郭璞山海經註漢中太守王圖每冬獻筍謂之笴廣志秦隴已來出筍纖長土人用鹽鹽乾結之浸而為臛菜甚美筍譜北地少竹惟秦以南則多有之竹有雄雌但㸔根上第一枝䨇生者必雌也乃有筍土人于竹根行鞭時掘取嫩者謂之鞭筍本草綱目山筍頗多盩厔縣志形細而鋭味甚清俗多芼而市焉沔縣志竹筍榦小不及閩筍山陽縣志蒲筍王鴻漸曰蒲兒根生水曲年年砍蒲千萬束水鄉人家衣食足延綏鎮志一名蒲蒻山陽縣志蘆筍山中多土人不知採食山陽縣志藥屬甘草生河西山谷積沙山及上郡名醫别錄今出漢中赤皮斷理㸔之堅實者是别錄陶註今陜西州郡皆有之春生青苗髙一二尺葉如槐葉七月開紫花似柰冬結實作角子如畢豆圖經本草府州豐州貢甘草宋史地理志府谷縣出圖書編生陜西州郡甘平無毒為衆藥之主故有國老之號羣芳譜黄蓍黄蓍生白水漢中名醫别錄出白水者冷補别錄陶注今出華原者最良宜州者亦佳唐本草今陜西州郡多有之圖經本草白水在陜西同州黄蓍味甘柔軟如綿湯液本草出宜川延安府志沙葠出華山者為善唐本草宜于沙地故名沙參其根多白汁俚人呼為羊婆奶本草綱目桔梗關中所出桔梗根黄皮似蜀葵根莖細青色葉小青色似菊葉唐本草根有心者桔梗無心者薺苨廣羣芳譜桔梗出延長延安府志長松生關内山谷中草似松葉上有脂山人服之本草拾遺黄精日食三寸絶榖不饑乆之度世陶先生謂之西嶽佐命是也福地記道士王暉居華嶽熊牢嶺種黄精於溪真仙通録秦時建阿房宫采木者偶食黄精不覺竦身飛上梧潯雜佩大嶺廟出視其苗之白以别鈎吻渭南縣志出中部延安府志産香林寺崖間安塞縣志出畧陽舊志葳㽔今漢中有之莖幹强直似竹箭簳有節葉狹而長表白裏青三月開青花結圓實圖經本草知母蝭母出三輔黄白色者善范子一名蝭母本草綱目産天澤山他處無安塞縣志肉蓯蓉陜西州郡多有之西人多用作食品三才圖會出保安圖書編出神木葭州志天麻赤箭生陳倉川谷雍州名醫别錄赤箭即今之天麻也夢溪筆談天麻出金州明一統志出隴州圖書編出大嶺廟渭南縣志术出三輔黄白色者善范子术生鄭山山谷漢中南鄭名醫别錄南陽文氏其先漢中人值亂逃華山中饑困有二人教之食术遂不饑枹朴子陶隱居言术有二種則爾雅所謂枹薊即白术也圖經本草商州有之春生苗青色其葉似薊莖作蒿幹狀青赤色夏開花紫碧色亦似刺薊花馬志蒼木諸山皆出靈臺山者佳渭南縣志木出驪山最上品臨潼縣志藥多蒼术華州志狗脊有二種一種根黑色如狗脊骨一種有金黄毛如狗形皆可入藥本草綱目邠州出邠州志貫衆陜西州郡皆有之而少有花者春生苗赤葉大如蕨莖幹三稜葉綠色似雞翎又名鳯尾草根紫黒色形如大𤓰下有一黑鬚毛又似老鴟圖經本草靈臺元象石鼔諸山俱出渭南縣志已㦸天其苗俗名三蔓草葉似茗經冬不枯根如連珠以多肉厚者為勝唐本草西鄉出西鄉縣志逺志今河陜洛西州郡有之根形如蒿根黄色苗似麻黄而青又如畢豆葉亦有似大青而小者三月開白花根長及一尺商州出者根又黑色圖經本草逺志苗名小草商州出者最佳馬志出龍尾灰塠諸坡渭南縣志出清澗延安府志逺志遍山有之安塞縣志淫羊藿生上郡陽山山谷名醫别録一名仙靈脾唐本草陜西漢中有之莖如粟稈葉青似杏有刺根紫色有鬚關中呼為三枝九葉草圖經本草仙靈脾出金州圖書編仙茅葉似茅其根粗細有節或如筆管有節文理黄色生西域延至武城海藥本草鄭按括地志云武城在縣今華州其根獨生始因婆羅門僧獻方於唐元宗故今呼為婆羅門參圖經本草元葠三月生苗其葉有毛四四相值似芍藥黒莖葉生枝間實黑呉氏本草出三輔色青者善太平御覽地榆宿根三月生苗初生布地獨莖直上髙三四尺對分出葉葉似榆葉而稍狹細長似鋸齒狀青色七月開花如椹子紫黑色根外黑裏紅似栁根圖經本草出嚴坡渭南縣志丹參今陜西州郡有之莖方有稜青色葉相對如薄荷而有毛開花成穗紅紫色似蘇花根赤色圖經本草紫葠出三輔有三色以青赤色為善范子生河西或商山圓聚生根黄赤有文皮黑中紫五月花紫赤實黑大如豆呉氏本草杜䝉姜撫言終南山有旱藕餌之延年狀𩔖葛粉右驍衛將軍甘守誠能名藥石曰旱藕杜䝉也方家久不用撫易名以神之唐書方技傳旱藕出渭河灘渭南縣志按本草綱目紫參亦名杜䝉而王孫則一名杜䝉一名旱藕是旱藕即王孫也白頭翁苗叢生似白薇而柔細葉生莖頭如杏葉上有細白毛而不滑澤近根有白茸根紫色深如蔓菁圖經本草鳯翔有之鳯翔府志白及今陜漢諸州有之生石山上春生苗長一尺許葉似栟櫚青色夏開紫花圖經本草諸山皆出渭南縣志黄連苗似茶叢生一莖生三葉髙尺許凌冬不凋花黄色今秦地者佳蜀本草胡黄連今秦隴間有之初生似蘆乾則似楊桞枯枝心黒外黄折之塵出如煙者乃為真也圖經本草黄芩今出宜州鄜州者佳唐本草陜西近郡皆有之苗長尺餘莖粗如筯葉從地四面作叢生𩔖紫草亦有獨莖者葉細長青色兩兩相對六月開紫花根如知母粗細長四五寸圖經本草秦艽今出鄜州岐州者良唐本草今陜州郡多有之其根土黄色而相交糾粗細不等圖經本草出秦中以根作羅紋交糾者佳故名秦艽一名秦糺本草綱目出隴州圖書編出鳯翔明一統志柴胡葉名芸蒿辛香可食生𢎞農川谷名醫别錄今關陜近道有之以銀州者為勝二月生苗甚香莖青紫堅硬㣲有細線葉似竹葉而稍𦂳小七月開黄花根淡赤色生丹州者結青子與他處不𩔖圖經本草麟州豐州貢宋史地理志以銀夏者最良市人以同華者代之然亦勝于他處葢銀夏地方多沙同華亦沙苑所出也陳承别説銀州即今延安府神木縣所産柴胡長尺餘而㣲白且軟不易得也本草綱目今葭州洛川皆貢之馬志石鼓山牛思嶺白崖寺坡俱出渭南縣志米脂最佳米脂縣志防風生沙苑川澤名醫别錄沙苑在同州南亦出防風輕虚不如東道者唐本草莖葉俱青綠色莖深而葉淡五月開細白花中心攢聚作大房似蒔蘿花實似胡荽子而大根土黄色關中生者三月六月采圖經本草出灰塠坡者佳渭南縣志前胡今陜西粱漢州郡皆有之春生苗青白色似斜蒿初出時有白芽味甚香美七月開白花與葱花相𩔖根青紫色今鄜延將來者大與柴胡相似但柴胡赤色而脆前胡黄而柔軟為不同耳圖經本草産石确間安塞縣志銀州者佳延綏鎮志獨活生雍州川谷名醫别錄出鳯翔府明一統志今寶雞扶風皆貢之馬志出隴州圖書編羌活今出蜀漢者佳圖經本草出鳳翔府明一統志今岐山􅔛縣隴州汧陽皆貢之馬志出隴州圖書編每歳解部四十斤岐山縣志而按本經云獨活羌活二物同一類蘇頌以紫色節密者為羌活黄色而作塊者為獨活李時珍亦言獨活羌活乃一類二種故綱目雖合一條今照各志分列都管草生宜州田野根似羌活頭歲長一節苗髙尺許葉似土當歸有重臺圖經本草升麻今陜西州郡皆有之春生苗髙三尺葉似麻葉並青色四五月著花似粟穗白色六月後結實黑色根如蒿根紫黑色多鬚圖經本草張揖廣雅呉普本草並云升麻一云周升麻則周或指周地如今人呼川升麻之義本草綱目漢中有之馬志靈臺石鼓諸山皆出渭南縣志苦葠其根黄色長五七寸三五莖並生葉青極似槐葉春生冬凋花黄白色七月結實如小豆子圖經本草出黄狗谷者佳渭南縣志出宜川延安府志延胡索每年寒露後栽立春後生苗葉如竹葉根叢生如芋卵本草綱目出倉堡嘴渭南縣志貝母蝱今藥草貝母也其葉如栝蔞而細小其子在根下如芋子正白詩經陸䟽爾雅曰􅔾貝母郭璞曰似韭西京雜記咸寧有之咸寧縣志山茨菰生山中濕地葉如車前根如慈姑本草拾遺磁谷即山茨菰藍田縣志龍爪子花名金燈花根名山茨菰山陽縣志石蒜水麻生鼎州其根名石蒜圖經本草處處下濕地有之古謂之烏蒜俗謂之老鴉蒜一枝箭是也春初生葉如蒜秧背有劍脊四散布地七月苗枯乃于平地抽出一莖長尺許莖端開花四五朶六出紅色如山丹花狀而瓣長黄蕋長鬚根狀如蒜皮色紫赤肉白色本草綱目地筋生漢中根有毛三月生四月實白三月三日採根名醫别錄黄菅茅之根本草綱目細辛一名小辛本草經出華隂色白者善范子生華陰山谷二月八月采根名醫别錄華州華陰郡土貢唐書地理志細辛出華山極細而直深紫色味極辛嚼之習習如椒夢溪筆談處處有之不及華陰者真根細而極辛圖經本草華州鎮國軍貢宋史地理志細辛坪在嶽頂東南隅方圓三四畆盡是細辛一曰少辛服之令人身體生香聞及百歩雍勝畧木細辛生終南山冬月不凋苗如大㦸根似細辛味苦溫有毒本草拾遺杜細辛按土宿本草云杜細辛葉圓如馬蹄紫背者良陜有之本草綱目鬼督郵生雍州莖如赤箭無葉根如芋子三四月採根用太平御覽督按赤箭徐長卿皆治鬼病故並有鬼郵之稱盖三物而同名也徐長卿勝州榆林郡土貢唐書地理志一名鬼督郵一名别仙蹤蘇㳟曰所在川澤有之葉似桞有光澤根如細辛㣲麄黄色廣羣芳譜龍膽草葉如龍葵味苦如膽故以為名開寶本草石泉有之石泉縣志白薇今陜西諸郡有之莖葉俱青頗𩔖桞葉六七月開紅花八月結實根黄白色𩔖牛膝而短小圖經本草當歸今陜西諸郡有之春生苗綠葉有三瓣七八月開花似蒔羅淺紫色根黑黄色以肉厚而不枯者為勝圖經本草今秦多栽蒔貨賣其頭圓尾多色紫氣香肥潤者秦産也名馬尾歸廣羣芳譜芎藭號山草多芎藭西山經生武功川谷斜谷西嶺名醫别錄關陜多有之四五月生葉似水芹胡荽蛇牀軰作叢而莖細其葉倍香七八月開碎白花根堅瘦黄黑色關中出者形塊重實作雀腦狀名雀腦芎最有力圖經本草出鳳翔府明一統志出關中者呼曰京芎亦曰西芎本草綱目今鳯翔有之馬志蛇牀田野墟落甚多花葉正似蘼蕪别錄陶註臨潼出臨潼縣志藁本藁本射干上林賦藁本藁茇也上林賦註莖葉與芎藭小異唐本草白芷號山草多葯䖀西山經氏按郭註云葯白芷别名又呉本草曰白芷一名䖀是葯䖀皆白芷也根長尺餘粗細不等白色葉婆娑紫色花白㣲黄入伏後結子圖經本草鄠縣出鄠縣志青木香葉似羊蹄而長大花如菊花結實黄黑所在有之唐本草鳯翔有之鳳翔府志白豆蔲其草形如芭蕉葉似杜若冬夏不凋花淺黄色子作朶如葡萄初出㣲青熟變白本草拾遺今宜州亦有之不及番舶來者佳圖經本草醴泉出醴泉縣志破故紙一名補骨脂破故紙胡人呼為婆固脂本草綱目石泉有之石泉縣志荆三稜舊不著所出地土今河陜間皆有之多生淺水旁及陂澤中似茭蒲葉而有三稜五六月抽莖莖端開花黄紫色圖經本草香附子莎草其根名香附子木草綱目香附味甘㣲寒和血咸陽縣志隨地俱出渭南縣志巨州鋪甚佳乾州志出延長延安府志茅香今陜西有之三月生苗似大麥五月開白花亦有黄花者有結實者有無實者圖經本草其莖葉黑褐色而花白者名曰茅香馬志藿香方莖有節中虚葉㣲似茄葉本草綱目山陽有之山陽縣志澤蘭生於澤旁故名澤蘭名醫别錄一名水香一名孩兒菊二月宿根生苗成叢紫莖素枝赤節綠葉葉對節生有細齒以莖圓節長而葉光有岐者為蘭草莖㣲方節短而葉有毛者為澤蘭本草綱目臨潼有之臨潼縣志爵牀生漢中川谷及田野名醫别錄此草生平澤熟田似香葇葉長而大或如荏且細唐本草出漢中一名爵卿太平御覽荆芥生漢中川澤名醫别錄假蘇一名荆芥葉似落藜而細呉氏本草中部縣出馬志橋山者佳延綏鎮志薄荷攢并閭與茇葀兮甘泉賦茇葀草名也甘泉賦注薄荷俗稱也陳士良食性本草作菝蕑揚雄甘泉賦作茇葀本草綱目出牛思嶺灌子村諸溝渭南縣志紫蘇蘇桂荏爾雅關之東西或謂之蘇或謂之荏揚雄方言紫蘇白蘇皆以二三月下種紫蘇肥地者面背皆紫瘠地者面青背紫其面背皆白者即白蘇乃荏也凢地畔近道可種蘇以取子打油本草綱目荏狀如蘇研子雜米作糜甚肥美亦可榨油和漆用咸陽縣志園種者佳渭南縣志荏子味與芝麻略同洋縣志白名荏紫即紫蘇子可取油山陽縣志艾屈突葢為武候驃騎嚴刻長安為之語曰寧茹三升艾不逢屈突葢隋書酷吏傳處處有之初春布地生苗莖𩔖蒿葉背白以苗短者為良圖經本草味苦主灸百病三月五月採咸陽縣志藥多艾華州志菴閭子生雍州川谷十月採實名醫别錄菴閭葉似菊葉而薄多細丫面背皆青其莖白色如艾莖八九月開花淡黄色結細實如艾實本草綱目茺蔚萑蓷爾雅今茺蔚也又名益母郭註今出靈臺元象石鼓大嶺廟諸山渭南縣志益母草出膚施延安府志薇銜生漢中川澤七月採莖葉名醫别錄一名無心草本草拾遺一名鹿銜叢生似茺蔚葉有毛赤莖唐本草出隴州圖書編夏枯草其莖㣲方葉對節生似旋覆葉而有細齒背白多莖端作穗長二寸穗中開淡紫小花一穗有細子四粒本草綱目臨潼出臨潼縣志延綏亦有之延綏鎮志茵陳蒿此雖蒿𩔖經冬不死更因舊苗而生故名茵陳本草拾遺出南山嶺上一名石茵陳日華本草青蒿生華陰川澤名醫别錄陜西銀綏之間蒿叢中時有一兩窠逈然青色者土人謂之香蒿莖葉與常蒿同但常蒿色淡青此蒿深青如松檜之色至秋深餘蒿並黄此蒿猶青其氣芬芳夢溪茟談劉寄奴今漢中有之唐本草一莖直上葉似蒼术尖長糙澀面深背淡九月莖端分開数枝一枝攢簇十朶小花白瓣黄蕋如小菊花狀花罷有白花如苦蕒花之絮其子亦如苦蕒子本草綱目旋覆花金錢花一名毘尸沙梁武帝時始進入中國酉陽雜爼二月後生苗多近水旁大似紅藍而無刺葉似桞六月開花如菊花小銅錢大深黄色人呼為金錢花圖經本草有金錢花長安縣志出旋覆花延長縣志大小薊大薊是虎薊小薊是貓薊葉並多刺相似田野甚多别錄陶註大薊生川谷小薊生平澤唐本草髙陵出髙陵縣志青葙子一名野雞冠一名雞冠莧其花葉似雞冠嫩苗似莧故謂之雞冠莧子名草決明本草綱目青葙出金州明一統志續斷出梁州七月七日采呉氏本草今陜西興元有之三月生苗幹四稜如苧麻葉兩兩相對四月開花紅白色似益母花根如大薊赤黄色圖經本草漏蘆生喬山山谷八月采根名醫别錄喬山應是黄帝所葬處乃在上郡市人取苗用之俗中取根名鹿驪根苦酒摩以療瘡疥别錄陶註葫蘆巴春生苗夏結子作細莢至秋采嘉祐本草谷按臨潼府志俱有之蠡實此即馬藺子也本草謂之荔實唐本草陜西諸郡皆有之葉似薤而長厚三月開紫碧花五月結實如麻大而赤色有稜根細長通黄色人取以為刷圖經本草牛蒡子處處有之葉大如芋葉而長實似葡萄核而褐色外殻似粟梂而小如指頭多刺圖經本草一名䑕粘子臨潼縣志葈耳采采巻耳詩經周南郭璞曰廣雅云枲耳亦云胡枲或曰苓耳陸璣疏云葉青白色似胡荽白華細莖蔓生可煑為茹滑而少味四月生子如婦人耳中璫或謂之耳璫孔䟽葉如䑕耳叢生如盤朱子集傳上多刺好著人衣今人通謂蒼耳陸䟽廣要蒼耳出渭河北灘渭南縣志豨薟草處處有之葉似芥而長莖高二三尺秋初有花如菊實似鶴蝨圖經本草臨潼出臨潼縣志蘘荷茈薑蘘荷上林賦一名葍苴説文似芭蕉而白色崔豹古今注花生根中花未敗時可食根似薑而肥葉似初生甘蔗宜陰翳地依蔭而生廣羣芳譜麻黄同州土貢龍莎唐書地理志龍莎麻黄也狗骨麻黄根也廣雅麻黄同州沙苑亦多唐本草出漢中太平御覽麻黄韓山之所出者不一地惟龍門諸巖谷既饒且佳以其滋河潤而鍾石精也人或採之貿易他郡衛氏祖地圖根皮色黄赤長者近尺本草綱目出羅家東坡渭南縣志出延長延安府志木賊産秦隴間陸䟽廣要出隴華諸郡近水地苗長尺許叢生每根一幹無花葉寸寸有節色青凌冬不凋嘉祐本草出綏德延安府志燈心草陜西亦有之蒸熟待乾折取中心白穰燃燈者是謂熟草又有不蒸者為生草本草衍義地黄生咸陽川澤黄土地者佳名醫别錄咸陽即長安也生渭城者乃有子實如小麥别錄陶註同州元和貢元和志同州定國軍貢生熟乾地黄宋史地理志處處有之以同州者為上葉似車前葉有皺紋而不光其花似油麻花而紅紫色亦有黄花者其實作房如連翹子細而沙褐色根如人指通黄色出同州者光潤甘美圖經本草隨地俱有渭南縣志安塞出者根少粗安塞縣志牛膝關中有之苗莖青紫色有節如牛膝葉尖圓如匙兩兩相對於節上生花作穗秋結實甚細以根長大至三尺而柔潤者為佳圖經本草一名牛脛一名對節菜關中皆有廣羣芳譜紫菀生漢中山谷名醫别錄今耀州有之三月布地生苗其葉二四相連五六月開黄白紫花結黑子圖經本草女菀生漢中山谷名醫别錄白菀即女菀功與紫菀相似唐本草即紫菀之色白者雷斆名羊鬚草本草綱目麥門冬秦名烏韭名醫别錄冬月作實如青珠以根肥大者為好别錄陶註金州多有之葉如韭叢生太平御覽四季不凋根黄白有鬚四月開淡紅花如紅蓼花圖經本草出宜川馬志龍葵俗亦名苦菜非荼也所在有之關河間謂之苦菜葉圓花白子若牛李子生青熟黒唐本草一名天茄子一名老鴉眼睛草其子生青熟赤者為龍珠本草綱目天茄子隨地俱出渭南縣志酸漿葴寒漿爾雅今酸漿草郭註苦葴形如皮弁始生青熟則赤裏有實正圓如珠亦隨裏青赤長安兒童謂為洛神珠一曰王母珠一曰皮弁草崔豹古今注燈籠草四方皆有惟陜最大葉似龍葵嫩時可食庚辛玉册生故墟垣塹間關中人謂之洛神珠嘉祐本草淡竹葉三四月生苗紫莖竹葉四五月開花如蛾形兩葉如翅碧色可愛結角尖曲如烏喙實在角中大如小豆豆中有細子灰黒而皺又名鴨跖草竹雞草藍姑草耳環草碧蟬花碧竹子竹葉菜本草綱目即翠蛾花咸寧縣志兒按今陜俗亦呼翠蛾翠蝴蝶鹿蹄草一名小秦王草一名秦王試劍草陜亦有之苗似堇菜而葉大背紫色春生紫花結青實如天茄子本草綱目敗醬根作陳敗豆醬氣故以為名别錄陶註出三輔太平御覽春生苗似松葉菜而狹長有鋸齒綠色莖數寸一節頂開白花成結小實成簇根白紫似柴胡本草綱目欵冬花出三輔范子出雍州南山溪水及華州山谷澗間葉似葵而大叢生花出根下唐本草今關中亦有之根紫色葉似萆薢十二月開花黄青紫蕚去土一二寸初出如菊花蕚通直而肥實無子圖經本草耀州有之馬志出牛思嶺渭南縣志郃陽縣西二里老君洞口多欵冬花俗傳為仙植郃陽縣志䨇山尤佳米脂縣志決明薢茩決光爾雅藥草決明也葉黄鋭赤花實如山茱萸關西謂之薢茩郭註決明子生龍門川澤十月十日採名醫别録龍門在長安北葉如茳芒子形如馬蹄呼為馬蹄決明别錄陶注地膚子即落帚子也子色青日華本草今關中近地皆有之根形如蒿莖赤葉青大似荆芥開黄白花結子青白色圖經本草王不留行葉似菘藍花紅白色子殻似酸漿實圓黑大如黍粟蜀本草出韓城馬頭山他處亦有惟此山産者最佳馬志葶藶陜西州郡皆有之苗葉似薺根白色枝莖俱青三月開花㣲黄結角子扁小如黍粒黄色圖經本草車前采采芣苢詩經周南芣苢馬舄馬舄車前也毛傳一名車前一名當道喜在牛跡中生故曰車前當道也陸䟽生道旁味甘性冷止痛明目咸陽縣志隨地俱有渭南縣志馬鞭草一名鳳頸草穗𩔖鞭梢故名馬鞭唐本草一名龍牙草圖經本草諸河灘皆有渭南縣志蛇含出興州生土石上或下濕地圖經本草細葉者名蛇銜大葉者名龍銜本草綱目連翹有兩種大翹生下濕地葉狹長如水蘇花黄可愛著子似椿實之未開者作房翹出衆草小翹生岡原之上葉花實皆似大翹而小細山南人並用之今長安惟用大翹子不用莖花唐本草靈臺元象大嶺廟石鼔諸山俱出渭南縣志出宜川延安府志陸英生熊耳山谷名醫别録此即蒴藋也此葉似芹及接骨花三物同一𩔖故芹名水英此名陸英接骨名木英唐本草虎杖似寒菊花葉莖蕋差大六七月開花花片四出色如桃花陜西山麓水次甚多本草衍義蒺藜楚楚者茨詩經小雅茨蒺藜也毛傳生馮翊平澤或道旁名醫别錄同州元和貢蒺藜子元和志一種白蒺藜今生同州沙苑牧馬草地最多而近道亦有之綠葉細蔓七月開花黄紫色九月結實作莢子綿布沙上圖經本草同州産白蒺藜寰宇記同州定國軍貢宋史地理志蒺藜有二等一等杜蒺藜一等白蒺藜出同州子如羊内腎大如黍粒本草衍義白蒺藜結莢長寸許内子如脂麻狀如羊腎而帶綠色沙苑蒺藜以此分别本草綱目出同州圖書編蔓生子有三角沙苑最多馬志引蔓如刺蒺藜而莖葉異紫花結莢實大于蠶種腎形碧綠色同州志榖精草收榖後生荒田中叢生葉似嫩榖秧莖頭小白花㸃㸃如亂星又有一種莖硬長有節根㣲赤出秦隴廣羣芳譜海金沙陜有之生山林下莖細如線引于竹木上葉細如園荽而甚薄多皺紋皺處有沙子狀如蒲黄粉黄赤色本草綱目地椒水楊梅一名地椒多生陰濕處荒田野中亦有之苗葉似菊莖端黄花實𩔖椒而不赤庚辛玉冊米脂出米脂縣志萹蓄似小藜赤莖節好生道旁可食爾雅郭註一名扁竹别錄陶註葉細綠如竹赤莖如釵股節間花出甚細㣲青黄色圖經本草俗名道生草延長縣志大黄生河西山谷名醫别錄今陜西州郡皆有秦隴來者謂之土番大黄葉似萞麻大者如扇根如芋大者如盌圖經本草直羅縣出寰宇記啇陸生咸陽川谷如人形者有神名醫别錄爾雅謂之蓫􅛅廣雅謂之馬尾易經謂之莧陸圖經本草幹粗似鷄冠花幹㣲有線楞色㣲紫赤極易生植救荒本草出鳳翔府明一統志出隴州圖書編本草云别名薚今關西亦呼為薚廣羣芳譜出白崖寺靈源坊諸溝渭南縣志狼毒葉似啇陸有毛根皮黄肉白以實重者為良開寶本草今陜西州郡有之圖經本草出秦地本草綱目防葵根葉似葵花子根香味似防風故名興州西方有之興州者乃勝南者為隣蜀地也唐本草狼牙出三輔色白者善范子苗似蛇苺而厚大深綠色根黑若獸之牙蜀本草䕡如藘茹出武都黄色者善范子䕡茹本作藘蕠白者名草䕡茹苗髙二三尺根長大如蘿蔔蔓菁皮黄赤肉白色破之有黄漿汁莖葉如大㦸二三月開細紫花結實如豆大一顆三粒生青熟黑本草綱目大㦸葉似初生楊桞小團三四月開黄紫花團圓似杏花又似蕪夷根似細苦參圖經本草出宜君圖書編今鳳翔麟遊皆貢之馬志出中部延安府志甘遂形似和皮甘草節日華本草今陜西有之苗似澤漆莖短小而葉有汁根皮赤肉白作連珠大如指頭圖經本草出三輔田中太平御覽出綏德州明一統志千金子一名續隨子千金子處處有之苗如大㦸開寶本草咸寧有之咸寧縣志莨菪子生雍州五月采子名醫别錄葉似菘藍莖葉皆有細毛花白色子殻作罌狀蜀本草一名天仙子四月開花紫色圖經本草天仙子出宜川延安府志雲實莖髙四五尺大葉中空葉如麻兩兩相值六月開花八九月結實呉氏本草出三輔太平御覽萞麻莖有赤有白中空其葉大如瓠葉夏秋間椏裏抽出花穗纍纍黄色結實數十顆有刺攅簇如蝟毛而軟子大如豆殻有斑㸃狀如牛螕仁有油無刺者良本草綱目土按本草羣芳譜並不載所出州今陜西諸郡皆有之常山生漢中蜀漆常山苗也名醫别錄今出金州梁州樹髙三四尺根似荆根黄色五六月采葉名蜀漆蜀本草藜蘆陜西山南東西州郡皆有之三月生苗葉似初出㯶心又似車前莖似葱白青紫色有花肉紅色根似馬腸根黄白色圖經本草陜西長安有之一名葱苒一名葱菼一名山葱一名鹿葱馬志草烏頭出三輔中白者善太平御覽本草云葉厚莖方中空與蒿相似馬志烏頭亦可療饑盩厔縣志草烏俗呼烏藥方書台烏天台山烏藥也誤用殺人山陽縣志附子冬月采為附子春月采為烏頭名醫别錄烏頭出三輔中白者善太平御覽烏頭亦可療饑盩厔縣志有按本草綱目别草馬頭白附子此則俗呼為黑附子川烏頭也天南星虎掌生漢中山谷名醫别錄天南星即本草虎掌也圖經本草虎掌因葉形似之天南星因根圓如老人星狀故名本草綱目出鎮安圖書編今澄城黄龍山有之葉如蒟蒻開花似蛇頭黄色七月結子根似芋而圓馬志出石鼓山渭南縣志半夏生槐里川谷名醫别錄槐里屬扶風以肉白者為佳不厭陳乆别錄陶註二月生苗一莖莖端三葉淺綠色頗似竹葉根下相重上大下小皮黄肉白馬志諸山俱出渭南縣志蚤休即紫河車也今華鳳州有之葉似王孫鬼臼六月開黄紫花蘂赤黄色上有金絲垂下秋結紅子根似肥薑皮赤肉白圖經本草鬼臼今商州有之花生莖間赤色三月後開花結實又一説葉六出或五出如鴈掌莖端一葉如繖旦時東向暮則西傾葢隨日出没也花紅紫如荔枝正在葉下常為日所蔽圖經本草北方惟龍門山有之本草綱目射干西方有射干莖長四寸生於髙山之上荀子藁本射干上林賦司馬彪曰射干香草也上林賦注一種紫花一種黄花一種碧花土宿真君本草紫花者呼為紫蝴蝶花三四月開六出大如萱花結房大如拇指一名烏扇一名鳯翼一名仙人掌其葉叢生横鋪一面故有是名俗亦呼扁竹本草綱目莞華出三輔太平御覽葉青色加厚則黑華有紫赤白者呉氏本草俗因其氣惡呼頭痛花根名黄大㦸本草綱目莞花黄紫二色黄者遍地生利入藥紫者出石鼓山誤用殺人渭南縣志蕘花生咸陽川谷六月采花名醫别錄苗似胡荽莖無刺花細黄色與芫花全不相似也唐本草所在有之以雍州者為好蜀本草莽草出三輔青色者善范子味辛溫色青馬志茵芋今雍州華州有之苗髙三四尺莖赤葉似石榴而短厚四月開細白花五月結實圖經本草出雍州味苦温三才圖會石龍芮出三輔色黄者善范子苗似附子實如桑椹生下濕地五月熟葉子皆味辛山南者粒大如葵子關中者細如葶藶唐本草斷腸草鉤吻即胡蔓草今人謂之斷腸草蔓生葉圓而光春夏嫩苗毒甚秋冬枯老稍緩五六月開花數十朶作穗本草綱目呉普曰秦鉤吻一名除辛廣羣芳譜一坡名㒺草坡出斷腸草昭陵志有按延安府志之劫律草魯子京有摶虎法以藥刀刺其喉應手而斃藥刀九曲五尖取讙舉山山在商州劫律草搗汁淬其鋒已􅒻編透山根出武都取汁㸃鐵立成黄金有大毒人誤食之化為紫水庚辛玉冊兎絲子蔓連草上生黄赤如金詩經陸䟽兎絲子入地初生有根及長延草物其根自斷無葉有花白色㣲紅香亦襲人結實如秕豆而細色黄生子梗上尤佳庚辛玉冊出綏德延安府志隨地俱有渭南縣志五味子出藍田山中唐本草陜西州郡尤多春初生苗引赤蔓于髙木葉尖圓似杏葉三四月開黄白花七月成實叢生莖端如豌豆許大生青熟紅紫圖經本草今華州以西多産之本草衍義靈臺元象石鼓大嶺廟諸山俱出渭南縣志覆盆子蓬虆是覆盆苗處處有之秦尤多圖經本草鳯州貢蓬虆子寰宇記永興華州尤多四五月紅熟其味酸甘外如荔枝大如櫻桃軟紅可愛本草衍義俗名揷田藨熟時色烏赤其四五月熟而色紅者乃耨田藨也本草綱目木鼈子其核如鼈蟹狀故以為名開寶本草藍田出藍田縣志馬兠鈴今關中州郡皆有之春生苗作蔓繞樹葉如山蕷葉而厚大六月開黄紫花七月結實大如棗狀似鈴圖經本草生關中味苦寒馬志出宜川延安府志石鼓山黄狗谷分水嶺俱出渭南縣志預知子蔓生依大木上葉綠有三角面深背淺有實作房至熟深紅色每房有子五七枚如皂筴斑褐色光潤如飛蛾圖經本草舊説取二枚帶衣領上遇蠱毒物則側側有聲當便知之故以為名馬志牽牛子二月種子三月生苗作藤蔓繞籬牆七月生花㣲紅帶碧色圖經本草黒者蔓有白毛斷之有白汁葉有三尖如楓葉花不作瓣如旋花而大其實有蔕褁之生青枯白核如棠梂一様但色淺黑耳白者蔓㣲紅無毛有柔刺斷之有濃汁葉團有斜尖並如山藥莖葉花小于黑牽牛淺碧帶紅色實蔕長寸許核白色人採嫩實蜜餞為果食呼天茄因其蔕似茄也本草綱目有黑白二種園種者佳渭南縣志旋花今關陜田野中甚多最難鋤艾治之又生本草衍義逐節蔓延葉如波菜而小至秋開花粉紅色如白牽牛之花花不作瓣狀如軍中所吹鼓子故有旋花鼓子之名一種千葉者色似粉紅牡丹俗呼為纒枝牡丹本草綱目粉團團一名纒枝牡丹柔蔓倚附而生花有牡丹態度延綏鎮志栝蔞果臝之實詩經豳風果臝栝蔞也毛傳栝蔞葉如瓜葉形兩兩相值蔓延青黑色六月華七月實如瓜瓣孔䟽生𢎞農川谷根入土深者良生鹵地者有毒名醫别錄花似壺蘆花淺黄色結實大如拳生青九月熟赤黄色圖經本草一名𤓰蔞根名白藥又名天花粉本草綱目𤓰蔞出牛思嶺渭南縣志葛粉冬月取生葛搗爛入水中揉出粉澄成垜入沸湯中色如膠以蜜拌食又將生葛根煑熟作果實賣本草衍義出雍州寰宇記天門冬在西岳名菅松抱朴子有二種一種苗有刺而濇一種無刺而滑皆是門冬唐本草夏生細白花亦有黄色紫色者結黑子在其根枝旁根白或黄紫色大如指長二三寸一科一二十枚同撮圖經本草隨地俱出渭南縣志百部今陜州郡有之春生苗作藤蔓葉頗似竹葉面青色而光根下一撮十五六枚黄白色圖經本草何首烏今在處有之春生苗蔓延竹木牆壁間莖紫色葉如薯蕷而不光澤夏秋開黄白花結子有稜似蕎麥根大者如拳各有五稜瓣似小甜瓜赤者雄白者雌圖經本草凢諸名山深山産者即大而佳也本草綱目按臨潼志山陽志俱有白斂今商州有之二月生苗多在林中作蔓赤莖葉如小桑五月開花七月結實根如雞鴨卵而長三五枚同窠皮黑肉白三才圖會山豆根苗蔓如豆葉青經冬不凋圖經本草出西鄉西鄉縣志黄藥子秦隴山中有之圖經本草莖髙二三尺柔而有節似藤實非藤也葉大如拳長三寸許根長尺許圍二三寸外褐内黄亦有黄赤色者本草綱目苦藥子興元府出苦藥子大抵與黄藥子相𩔖春采根曝乾亦入馬藥用圖經本草威靈仙出商州上洛山及華山并平澤以不聞水聲者良生先于衆草方莖數葉相對冬月丙丁戊巳日採根開寶本草今陜西州郡皆有之初生作蔓莖如釵股七月内生花六出淺紫或碧白色作穗似莆臺子亦有似菊花頭者實青色根稠宻多鬚似榖唐周君巢威靈仙傳云商州有人病手足不遂遇新羅僧為入山求威靈仙使服之數日遂愈圖經本草防已出洵陽范子生漢中川谷名醫别錄漢中出者文作車輻解黄實而香莖梗甚嫩苗葉小𩔖牽牛折其莖吹之氣從中貫如木通然圖經本草木通通草出三輔范子今漢中有之藤生蔓大如指莖大者徑三寸一枝五葉頗𩔖石韋又似芍藥二葉相對夏秋開紫花亦有白花者實如小木𤓰食之甘美圖經本草有細細孔兩頭皆通故名通草即今木通本草綱目鈎藤出梁州葉細長其莖間有刺若釣鈎唐本草今秦中興元府有之圖經本草芄蘭蘿藦一名芄蘭詩經陸䟽漢髙帝用子傅軍士金瘡故一名斫合子本草拾遺其實嫩時有漿裂時如瓢故有雀瓢羊婆奶之稱本草綱目延長出延長縣志赤地利所在皆有今惟華山者佳春夏生苗作蔓繞草木上莖赤葉青似蕎麥七月開白花結子青色根若菝葜皮紫赤肉黄赤圖經本草紫葛生山谷中苗似葡萄根紫色唐本草所在皆有今出雍州葉似蘡薁其根皮肉俱紫色蜀本草鳯州貢葛根寰宇記千歲虆葛藟纍之詩經周南藟一名巨苽似燕薁亦延蔓生葉如艾其子赤可食酢而不美陸䟽千嵗虆一名巨苽本草拾遺開元末隱民姜撫自言通仙人不死術召至集賢院言服常春藤使白髪可黑長生可致藤生終南帝遣使多取以賜老臣甘守誠云常春藤乃千嵗蘽也撫易名以神之本草衍義金銀花即忍冬一名鴛鴦藤三四月開花一蔕兩花長瓣垂鬚黄白相半而藤左纒故有金銀鴛鴦之名本草綱目靈臺元象石鼓諸山俱出渭南縣志遍山谷可作茗雒南縣志金銀花多山陽縣志澤瀉惟漢中南鄭者形大而長尾間必有兩岐為好别錄陶註今惟以華州者為善唐本草今陜有之漢中者為佳苗多在淺水中葉似牛舌獨莖而長秋開白花作叢似榖精草圖經本草生盩厔縣北淺水中圖書編澤瀉差佳華隂縣志石斛今漢中有二種一種似大麥累累相連頭生一葉名麥斛一種莖大如雀髀葉在莖頭名雀髀斛唐本草鳯州貢寰宇記出金州明一統志貨者多不真可盆景山陽縣志骨碎補陜西州郡皆有生木或石上多在背陰處引根成條上有黄赤毛及短葉附之又抽大葉成枝葉面青綠色有青黄㸃背青白色有赤紫㸃圖經本草出鳯翔府明一統志出隴州圖書編蒲黄香蒲蒲黄苗也處處有之夏抽梗于叢葉中花抱梗端如武士捧杵故俗謂之蒲槌亦曰蒲蕚花其蒲黄即花中蕋屑也細若金粉圖經本草蒲槌可取蒲黄山陽縣志石韋生華陰山谷石上不聞水聲及人聲者良名醫别錄一名石皮叢生石上葉如桞背有毛而斑點如皮馬志巻栢出三輔范子今關陜有之宿根紫色有鬚春生苗似栢葉而細拳攣如雞足多生石上圖經本草本草經云巻栢一名萬嵗馬志屈草生漢中川澤五月采名醫别錄本草經云味苦㣲寒久服輕身益氣廣羣芳譜别羇一名别枝生藍田川谷二月八月采名醫别錄兎兒酸兎棗味酸髙尺許實如棗名醫别錄葭州出葭州志紫給味鹹一名野葵生髙陵下地三月三日采根根如烏頭名醫别錄地茄子生商州三月開花結子五六月采陰乾味㣲辛溫有小毒國經石芸出三輔范子味甘無毒一名螫烈一名顧啄三五月采莖葉陰乾名醫别錄墓頭回按本草不載所出及形味今延綏葭州志藥類俱載之萆薢作蔓生苗葉青似山薯花有黄紅白數種亦有無花結白子者圖經本草今藍田出藍田縣志紫花地丁其葉似桞而㣲細平地生者起莖溝壑生者起蔓本草綱目地丁有黄花紫花二種延綏鎮志蒲公英一名金簪草一名黄花地丁關中謂之狗乳草莖葉花絮並似苦苣但小耳蘇頌曰葉有細刺中心抽一莖莖端出一花色黄如金錢本草綱目俗名金剛花其津能㸃惡瘡渭南縣志名黄花菜可作虀葭州志英按蒲公亦有地丁之名與紫花地丁形色逈異俗以為一物者誤也故分列之呉茱萸九月九日佩茱萸飲菊酒令人長壽西京雜記王維别墅在輞川有茱萸沜唐書文藝傳處處有之蜀漢尤多圖經本草出三輔太平御覽吳茱萸枝柔而肥葉長而皺其實結于梢頭纍纍成簇又有食茱萸一名藙一名榝一名欓子木髙葉長黄花綠子叢簇枝上止入食物中用廣羣芳譜吳茱萸大嶺廟出渭南縣志腐婢生漢中小豆花也名醫别錄栢子仁出宜州為勝唐本草以乾州者為最圖經本草陶隱居云栢忌塚墓上者而今乾州者皆是乾陵所出他處皆無大者但取其州土所宜子實氣味豐美可也陳承别説楓香脂洋州金州貢白膠香唐書地理志關陜甚多樹似白楊葉圓而作岐圖經本草楓香脂一名白膠香本草綱目出金州明一統志樹髙大葉三角而香木肌理硬五月砍樹為坎十一月采脂馬志乳香薫陸即乳香為其垂滴如乳頭也本草衍義出隴州圖書編出漢中西鄉沔縣褒城畧陽四縣及金州明一統志出延長房家原延安府志黄蘗蘖木生漢中川谷名醫别錄金州貢唐書地理志樹髙數丈葉似呉茱萸亦如紫椿經冬不凋皮外白裡深黄其根結塊如松下茯苓出商州山谷中皮𦂳厚二三分鮮黄者上嘉祐本草厚朴張揖曰厚朴藥名也上林賦註陜西山谷中徃徃有之葉如檞葉四季不凋紅花而青實皮極鱗皺而厚紫色多潤者佳圖經本草今商州亦有但薄而色淡本草衍義金州貢寰宇記杜仲生漢中名醫别錄金州貢唐書地理志今出商州近處大山中葉亦𩔖拓其皮折之白絲相連圖經本草漢中者佳廣羣芳譜秦皮今陜郡有之其木似檀枝幹皆青綠色葉如匙頭虚大而不光並無花實圖經本草秦皮本作梣皮其木小而岑髙故名或云本出秦地故得秦名廣羣芳譜蕪荑今延州同州者甚好唐本草河西處處有之開寶本草氣羶者良乃山榆仁也本草衍義苦楝子蘇頌曰葉密如槐花紅紫色實如彈丸生青熟黄一名金鈴子本草綱目出臨潼臨潼縣志槐角子凡采得去單子并五子者只取两子三子者本草綱目類按渭南臨潼諸志藥俱載之枳實枳殻金州貢唐書地理志商州上洛郡貢宋史地理志枳殻生商州川谷開寶本草今之商州者佳木如橘而小葉如橙多刺春生白花至秋成實七八月采者為實九十月采者為殻圖經本草枳實出金州明一統志枳殻出商州圖書編酸棗仁京兆貢唐書地理志京兆永興軍貢宋史地理志小則為棘大則為酸棗其實一本也今陜西臨潼山野所出亦好乃土地所宜也本草衍義生坡坂城壘間味甘平入藥不如酸棗縣者良咸陽縣志道旁叢生行人惡之安塞縣志㽔核今出雍州樹生葉細似枸把而狹長花白子附莖生紫赤色大如五味子莖多細刺五六月熟采實蜀本草㽔仁出清澗味甘溫馬志山茱萸出三輔范子生漢中山谷九月十月采實名醫别錄與吳茱萸甚不相𩔖本草衍義靈臺元象石鼓大嶺廟諸山俱出渭南縣志金櫻子叢生郊野𩔖薔薇有刺四月開白花夏秋結實亦有刺黄赤色形如小石榴宜州所供云本草謂之營實今校之與營實殊别也圖經本草南鄭有之南鄭縣志桃仁桃仁多山陽縣志杏仁延安杏仁甘美無毒而人可食馬志烏梅梅實生漢中取半黄者以烟薫之為烏梅入藥夲草綱目山樝子赤𤓰木赤樝也出山南葉似香葇子似虎掌大如小林檎赤色唐本草出牛思嶺渭南縣志木蒿藜即山查子山間有之安塞縣志䑕李子即牛李也髙七八尺葉似李但狹而不澤子于條上四邊生生時青熟則紫黒色至秋葉落子尚在枝今關陜甚多本草衍義五加皮五葉者良生漢中名醫别錄圖經云春生苖莖葉俱青作叢赤莖又似藤蔓髙三五尺上有黒刺葉生五釵作簇者良四葉三葉者最多每一葉下生一刺三四月開白花結細青子至六月漸黒色根若荆根皮黄黒肉白骨堅硬五七月采莖十月采根馬志今貨之髙郵作皮酒皆非真山陽縣志枸杞集于苞杞詩經小雅杞枸檵也一名苦杞一名地骨春生作羮茹㣲苦其莖似莓子秋熟正赤陸䟽京兆貢地骨皮唐書地理志京兆永興軍貢地骨皮宋史地理志丘陵坂岸者皆可用後世惟取陕西者良本草綱目地骨皮枸杞根也馬志枸杞小條苞生嫩葉可茹山陽縣志溲疏生熊耳川谷名醫别錄一名楊櫨一名空疏皮白中空有節子似枸杞子藥錄木天蓼生山谷中作藤蔓葉似柘花白子如棗許唐本草今時所用木蓼出山南鳯州樹髙如冬青不凋既云木蓼豈是藤生自有藤天蓼耳本草拾遺茯苓茯神出三輔范子第一出華山形極粗大雍州南山亦有不如華山唐本草華州華隂郡貢唐書地理志今太華山有之出大松下附根而生作塊如拳大者至數斤有赤白二種或云松脂變成或云假松氣而生不附著根其包根面輕虚者為茯神圖經本草所在大松處皆有惟華山最多形塊無定以似龜鳥形者為佳蜀本草石甕寺前有孔雀松下有赤茯苓入土千年則成琥珀宋敏求長安志華州鎮國軍貢宋史地理志五粒松生華山西南峰下生茯苓具如人形雍勝畧豬苓亦是木之餘氣所結如松之餘氣結茯苓之義他木皆有楓木為多本草綱目出葭州延安府志雷丸金州貢唐書地理志生漢中土中名醫别録雷丸竹之苓也無有苖蔓皆零無相連者今出金州唐本草出漢中色白者善太平御覽桑寄生蔦與女蘿詩經小雅蔦寄生也葉似當盧子如覆盆子赤黑甜美朱子集傳本草云桑上寄生一名寄屑一名蔦生𢎞農川谷桑樹上陸䟽廣要髙二三尺葉圓㣲尖厚而柔面青而光澤背淡紫而有茸本草綱目謂按陸佃埤雅蔦是松柏上寄生與諸説異松蘿蔦與女蘿詩經小雅松蘿自蔓松樹上生枝正青與兎絲殊異詩經陸䟽生熊耳山谷松樹上名醫别録女蘿色青而細長無雜蔓爾雅翼松蘿是松上浮蔓埤雅目按本草綱女蘿松上浮蔓一名松蘿毛詩註云女蘿莵絲松蘿吳普本草莵絲一名松蘿陶𢎞景謂松蘿是松柏上寄生諸説各異當以陸説為定古斯生上洛是木皮狀如厚朴色似桂白其理一縱一横桐君採藥錄一名良無極李當之云是樟樹上寄生本草綱目竹實陶𢎞景曰竹實出藍田狀如小麥可為飯食本草綱目白石英生華陰山谷大如指長二三寸六靣如削白澈有光長五六寸者彌佳其黄端白稜名黄石英赤端白稜名赤石英青端赤稜名青石英黑澤有光名黑石英名醫别録白石英狀如紫石英但差大而六稜白色若水精本草衍義五種石英皆石之似玉而有光瑩者本草綱目石膏今耀州興元府亦有之生于山石上色致瑩白與方解石肌理形段剛柔相𩔖圖經本草細理白澤者良黄者令人淋馬志理石如石膏順理而細生漢中山谷名醫别䤸即石膏中之長文細直如絲而明潔色帶㣲青者與軟石膏一𩔖二色碎之則形色如一不可辨矣本草綱目一名立制石馬志滑石性滑利竅其質又滑膩故名本草綱目出西鄉西鄉縣志五色石脂一名五色符青符生南山呉氏本草生南山之陽山谷中名醫别䤸宜州諸山亦有色理鮮膩為佳唐本草赤白二石脂惟延州山中所出最良揭兩石中取之陳承别説華原縣出石脂寰宇記無名異宜州山中亦有之黒褐色大者如彈丸小者如黒石子圖經本草孔公孽殷孽根也青黄色生梁山山谷名醫别錄梁山屬馮翊郡此即今鍾乳牀也别錄陶註狀如牛羊角中有孔通故名通石唐本草孔竅空通附垂于石如木之牙孽故曰孔空孽而俗訛為孔公爾本草綱目恭按李氏綱目從蘇之説以附石生而粗者為殷孽接殷孽而生以漸空通者為孔公孽接孔公孽而生者為鍾乳是殷孽乃孔公孽之根也與别錄異殷孽鍾乳根也生梁山名醫别録盤結如薑故名薑石唐草本殷隱也生于石山隱然如木之孽也本草綱目代赭石石脆之山灌水出焉中有流赭以塗牛馬無病西山經赭赤土也今人以朱塗牛角云以辟惡郭註石赭處處山中有之以西北出者為佳本草綱目水按華陰志灌即今潼谷水代赭石見鳯翔府藥類禹餘糧赤斧者為碧祠主簿上華山取服之列仙傳禹餘糧乃石中黄粉生于池澤其生山谷者為太一餘糧本草綱目出華山本草云禹甞採此當糧根如盞皮如茯苓人取以當榖不饑又云禹會諸侯棄糧于地化為此草馬志白礜石臯塗之山有白石其名白礜可以毒䑕西山經䑕食則死蠶食而肥郭註一名䑕鄉吳氏本草礜石生漢中山谷名醫别錄此石能拒火久燒但解散不可脱其堅少室有粒細理不如漢中者唐本草今梁州亦有之圖經本草興元府城固縣産礜石不可勝計與凢土石無異雖數十百擔亦可立取然其性酷烈有大毒老學菴筆記特生礜石出漢中者其外形紫赤色内白如霜中央有臼狀形如齒者佳别錄陶註一名蒼礜石梁州礜石赤有青者漢中人亦以毒䑕不入方用唐本草握雪礜石此石或在山或在水色白而粗糯至冬月有脂液出其上旦則見日而伏當于日未出時以銅刀剖置器内采時用白雞清酒祭之華山出岣嶁神書礞石有青白二種以青者為佳堅細而青黑打開中有白星㸃無點者不入藥本草綱目有按西鄉志藥類之銀精石産鳯頭山谷口河漘安塞縣志凝水石同州土貢唐書地理志有縱理横理兩種色清明者為上或云縱理為寒水石横理為凝水石今出同州韓城色青横理如雲母為良唐本草消陶氏别録謂之消石朴見水即消又能消化諸物故謂之消生于鹽鹵之地狀似末鹽牛馬諸皮須此治熟故有鹽消皮消之稱煎煉入盆凝結在下粗朴者為朴消在上有芒者為芒消有牙者為馬牙消本草綱目朴消芒消馬牙消出渭北灘鹵地渭南縣志𤣥明粉𤣥明粉傳曰唐明皇聞終南山道士劉𤣥真服食多夀乃詔而問之𤣥真曰臣按仙經修煉朴硝號𤣥明粉止服此方遂無病長生本草綱目馬牙硝可煉𤣥明粉渭南縣志硇砂形如牙消光浄者良唐本草今陜西近邊州郡有之圖經本草自然銅生曽青石緑穴中狀如寒林草根色紅膩亦有牆壁又一種似丹砂光明堅硬有稜中含銅脉尤佳又一種似木根不紅膩隨手碎為粉至為精明近銅之山有之本草綱目出金州明一統志出天橋崖府谷縣志五倍子子色青大者如拳而内多蟲開寶本草出宜君延安府志産五倍子山陽縣志桑螵蛸螳螂卵也多在小桑樹上叢荆棘間三四月中一枝出螳螂數百枚蜀本草出臨潼臨潼縣志雀甕出漢中生樹枝間蛅蟖房也八月采蒸之名醫别録好在石榴木上似蠶而短背上有五色斑刺螫人有毒馬志原蠶原蠶是重飬者俗呼為魏蠶别録陶註郭璞註方言云魏細也秦晉人所呼今所謂二蠶是矣本草綱目地膽邠州土貢唐書地理志真地膽出梁州狀如大螞蟻有翼偽者是斑蝥所化狀如大豆本草經陶註一名蚖青恭曰形如大螞蟻者今出邠州三月至十月草葉上采之本草綱目蟬蛻一名枯蟬一名金牛兒本草綱目隨地俱出渭南縣志龍骨春水至時魚豋龍門蛻骨甚多人採為藥國史補今多出梁益欲得脊腦作白地錦文䑛之著舌者良别録陶註出府谷葭州志穿山甲鯪鯉即今穿山甲也生金商諸州深山大谷中皆有之圖經本草狀如鼉而小背如鯉而濶首如䑕而無牙腹無鱗而有毛長舌尖喙尾與身等本草綱目蛇蜕生田野五月五日十五日取之良名醫别録出臨潼臨潼縣志烏蛇生商洛山背有三稜色黒如漆性善不噬物開寶本草商州有人患大瘋家人惡之山中為起茅屋有烏蛇墮酒罌中病人不知飲酒漸瘥罌底見有蛇骨始知其由朝野僉載出隴州明一統志烏蛇能療疾隴州志五靈脂寒號蟲矢寒號蟲千里之逺打食抛糞必在山崖人不到之處名五靈脂採者一得則數十斤山陽縣志牛黄生特牛膽中得之即隂乾百日使燥無令見日月光名醫别録𢎞景曰藥中之貴莫復過此一子及三二分好者值五六千至一萬也多出梁州本草綱目虎骨用頭及脛骨色黄者良凡虎身數物俱用雄虎者勝圖經本草載按西鄉志藥類之熊脂味甘㣲寒温無毒出雍州圖經云熊冬入穴而藏蟄始春而出脂謂之熊白十一月取之須其背上者寒月則有夏日則無馬志熊膽取一粟許滴水中一道若線不散者為真圖經本草出金州明一統志昔有今不可致雒南縣志羚羊角出華隂山谷名醫别録今秦隴金商州山中皆有之其角長一二尺有節如人手指握痕最堅勁圖經本草羚羊角出沔縣金州眀一統志今羚羊甚稀角亦不佳雒南縣志麝香同州元和貢丹州延州開元貢元和志同州商州丹州延州鳯州洋州土貢唐書地理志商州上洛郡延安府彰武軍鄜州保大軍貢宋史地理志洋州鳯州同州貢寰宇記金州貢九域志麝生雍州山中春分取香生者益良名醫别録漢中出今沔縣城固鳯縣皆貢之馬志出南山中渭南縣志出宜川鄜州延安府志出鳯縣舊郡志鹿茸南山多鹿當角觧之時其茸甚痛獵人以索繫住取茸抱朴子南鄭城固及金州出圖書編出興安州廣皇輿考寧羌州出舊郡志鹿角麟州勝州土貢鹿角唐書地理志鹿陽獸也故夏至則角解山陽縣志貨屬絲興元府貢唐書地理志亦間有之咸寜縣志絲有水絲火絲二種洋縣志絲出南陽洪者斷則易續引之則長朝邑縣志四境多桑蟓極豐商多以華絲稱最云華州志蠶絲各屯有之潼關衛志綿華州賦綿元和志闗内道賦綿興元府土貢唐書地理志京兆同華岐調綿開元二十五年以闗輔寡蠶詔納米粟地理志註繭捻綿華州志苧張揖曰苧三稜也上林賦註洋州貢野苧麻唐書地理志苧麻作紵可以績紵故謂之苧凡麻絲之細者為絟粗者為紵廣羣芳譜俱按藍田三原志有之大麻鳯翔府賦麻坊州貢枲麻邠州賦麻勝州貢麻元和志闗内道賦麻坊州中部郡土貢麻唐書地理志坊州中部軍貢麻宋史地理志許原自蒲城連朝邑界產麻最佳雍勝畧爾雅翼曰麻其縷可為布雖不及南北山鳯翔諸處最佳而亦可供用抄紙咸陽縣志麻出宜君最堅且長延安府志褒城洋縣皆産麻舊郡志麻出黑河沔縣志麻易生而且多雒無花惟恃麻易布雒南縣志黄麻剥皮為麻作繩山陽縣志韓城更多麻元魏時令夏陽以麻充租同州志縣西北宜麻中部縣志檾麻檾或作䔛周禮典枲麻草注草葛䔛也爾雅翼􅔾麻一作䔛麻今白麻也生卑濕處葉大似桐葉團而有尖六七月開黄花結實如半磨形有齒嫩青老黑其莖輕虛潔白北人取皮作麻以莖蘸硫黄焠燈引火本草綱目苗髙六七尺葉似苧而薄可包麥蘖作麯梗漚作麻或績布抄紙打繩索用咸陽縣志葛葛之覃兮詩經周南葛草名蔓生可為絺綌者朱子集傳掌葛以時征絺綌之材于山農周禮地官葛可為布麟遊縣志南鄭出舊志葛出褒城縣髙臺寺漢中府志葛最多商州志葛諸山之産最多民以牧畜絞索供㸑雒南縣志山中最多無人採製作布者山陽縣志木棉絨如鵞毳用以絮衣甚輕暖其種由外蕃入于闗陜廣羣芳譜宜君縣出明一統志西安府境多有之土人織紡為業馬志絮芒細軟而修産三川間亦無多咸寧縣志春種秋收黄花白子子成䝉茸吐出收時最艱可紡織為布其子可笮油咸陽縣志有黄白二色臨潼縣志棉花河之南不甚宜河北隨地皆宜東鄉尤宜故其種尤多渭南縣志東鄉諸屯多種木棉潼闗衛志棉花惟宜川延川中部宜君洛川出焉延安府志花則木棉為最華州志縣東南宜木棉中部縣志南鄭沔縣畧陽産舊志布鳯翔華州邠州夏州延州鄜州丹州綏州銀州賦布元和志闗内道賦布綏州土貢胡女布鳯州興州興元貢布洋州貢火麻布銀州土貢女稽布勝州土貢胡布唐書地理志布出鳴犢鎮者佳咸寜縣志布有髙機平機之名臨潼縣志邑多木棉蠶織之業頗廣郃陽縣志栁子鎮王宿庄善絍作大布華州志縣東南宜棉桑故蠶織廣焉武功縣志縑藝文𩔖聚云素出三輔釋名曰素樸素也已織供用不復飾也馬志素縑也咸寧縣志有黄白之分臨潼縣志紗京兆土貢隔紗唐書地理志雍州貢隔紗寰宇記郡之東闗織方紗華州志綿紬邠寧出綿紬宋莊綽雞肋編綿紬土人所織岐山志畧陽縣出舊志繭捻綿作紬華州志絹華州同州開元賦絹元和志闗内道賦絹唐書地理志今延川宜川二縣民漸知種桑畜蠶間織為絹延安府冊綾資表背或效織湖羅攅絹未甚佳蒲城縣志褐無衣無褐詩經豳風褐毛布也鄭箋毛布用毛為布今作褐皆織毛為之孔疏豐州土貢駝毛褐唐書地理志保安軍貢毛毼九域志隔織洋州洋川郡貢宋史地理志隔織布屬馮志羊羢保安軍貢毛段宋史地理志羊絨延安府出有紫有白馬志羢出保安延安府志羊羢較他處為細乾州志氊夏州貢元和志京兆豐州宥州貢唐書地理志京兆永興軍貢宋史地理志豐州貢氊九域志鳯縣出舊志民畜羊剪毛作㲩􅚊華州志紅花興元府貢宋史地理志大紅出澄城圖書編西安府境皆有惟涇陽橋底者良本草云出漢中一名黄藍馬志秋種春發夏乃花下作梂彚多刺花蕋出梂土人承露採之採已復出至盡而罷其花可染紅咸陽縣志邑之産以紅花為第一賈人有盩花之號盩厔縣志豐原鄉産紅花四方商多来售者華州志茜草千畝巵茜其人與千户侯等史記貨殖傳茜根生喬山山谷名醫别録陶隠居云東方有而少不如西方多土宿真君云一名西天王草一名西岳近陽草本草綱目藍終朝采藍詩經小雅染草也鄭箋爾雅曰葴馬藍郭璞曰今大葉冬藍西京賦註古云葴大藍又有小藍葉花似蓼皆可為靛咸寧縣志有二種其葉大如匙鋪地無梗俗呼為藍葉葉小而圓莖髙一二尺曰小藍俱染靛物咸陽縣志居民種藍製澱或資其用華州志紫草此草花紫根紫可以染紫故名本草綱目一統志云紫草生郃陽一名紫丹一名紫芙其根足以染紫又可以灌紅燭馬志出郃陽縣北山采其根以煎油沃之色自艷可染紫衣馮志皂斗木實為果橡葢果也昔摯虞入南山饑甚拾橡實而食本草綱目皂斗即橡殻可染皂商州志薑黄今人以扁如乾薑形者為片子薑黄圓如蟬腹形者為蟬肚欎金並可染色本草綱目較他邑為勝城固縣志金小華山西英山其陽多赤金數歴之山在隴州上多黄金申山在安塞縣其陽多金西山經商州上洛郡洛南有金金州漢隂郡漢隂月川水有金金州漢隂郡西城漢水有金唐書地理志漢中舊有金户千餘家於漢水沙淘金年終總輸後臨淮王彧為梁州刺史奏罷之魏書食貨志金梁州都有生水沙中作屑謂之生金名醫别録麗戎之山一名藍田其隂多金水經注金州貢麩金元和志商州上洛郡洛南有金大谷龍龕山在雒南縣出麩金寰宇記終南多金闗中三山記金出終南山及西鄉金州明一統志銀梁州貢禹貢大時之山隂多銀數歴之山下多銀西山經北魏延昌三年春有司奏長安驪山有銀鑛二石得銀七兩魏書食貨志終南多銀闗中三山記銀出終南山明一統志雒南唐家坡有銀鑛魏坡北産鑛馬志山陽白雲洞出礦砂西安府志猪牙口南陽洞小叠銀厰溝蒲峪溝古峰寺琴池溝渭坡韓峪川松橋子南崖白溝砂仁溝汪溝南牧䕶東牧䕶秦嶺蒲岔溝野猪坪柘茨林土門川麻池溝街阪溝石道峪狐洞蔣家隂黄柏岔小窵川李家溝岔口鋪東官道一眼俱産銀任慶雲坑冶論云皇祐中中書備對鑛冶之數商州嵗貢金三十九兩至熙寧元年詔天下坑冶不發而負嵗課者蠲之四年以商州所産㣲薄詔罷貢金夫商州地近三輔産礦之名易著自昔嵗額之貢率至逋負所産㣲細開則未見利而為害滋甚商州志白花嶺和尚溝階峪寳山之陽俱産礦雒南縣志南山川麓立爐場以煉銀砂華州志銅華山西四十五里曰松果之山濩水出焉北流注于渭其中多銅小華山西八十里符禺之山其陽多銅又西六十里石脆之山其隂多銅羭次之山漆水出焉其隂多赤銅盂山在榆林其陽多銅西山經丹陽水逕冶東俗謂之丹陽城城之左右有遺銅孟康曰赤銅丹陽銅也水經注藍田有川方三十里其水北流出銅三秦記商州上洛郡洛南有銅唐書地理志終南多銅闗中三山記西紅崖舊産銅宋皮仲容議採雒南紅崖山銅即此雒南縣志銅洞舊出銅山陽縣志鐵鐵柔鐵鏤剛鐵可以刻鏤者也禹貢梁州蔡註小華山西八十里符禺之山其隂多鐵又西英山其隂多鐵又西竹山其隂多鐵鳥山在安定縣其隂多鐵西山經京兆鄭縣有鐵官右扶風雍縣漆縣有鐵官漢書地理志商州上洛郡洛南有鐵同州馮翊郡韓城有鐵興元府漢中郡西有鐵興州順政郡順政有鐵長舉有鐵隴州汧陽郡汧源有鐵坊州中部郡中部有鐵宜君有鐵唐書地理志秦晉山中皆産本草綱目終南多鐵關中三山記鐵出終南山一出􅔛縣城固圖書編出􅔛縣城固宋時猶有鐵冶務明一統志鐵洞嶺山多出鐵商州志韓城有鐵後周置鐵冶設官相沿以至于宋猶有冶務七百餘户同州志錫興元府漢中郡西有錫唐書地理志九嵏山前出黒錫牧兒時有從土穴得之者昭陵志南山川麓立爐場以煉錫砂華州志鉛有銀坑處燒礦而取圖經本草黑鉛洵陽有之洵陽縣志打熊溝廟溝錫家河古洞文家洞湘子洞爛嘴椒源溝靈峪岔秦王山西俱産鉛商州志珠數歴之山楚水出焉南流注于渭其中多白珠西山經玉厥貢惟球琳琅玕禹貢雍州球琳美玉也可為珪璋之用蔡註書曰大玉天球在東序傳曰球雍州所貢鄭𤣥云大玉華山之球也天球雍州所貢之玉上林賦云玫瑰碧琳西都賦云琳珉青英則琳乃玉之青碧色者禹貢錐指雍州其利玉石周禮藍田見有玉山出玉石以為利者也周禮賈䟽小華之山其陽多㻬琈之玉又西石脆之山其陽多㻬琈之玉又西竹山竹水出焉北流注于渭其陽多蒼玉丹水出焉東南流注于洛水其中多水玉羭次之山漆水出焉其陽多嬰垣之玉按騈雅嬰垣美玉也又西百五十里曰時山無草木逐水出焉北流注于渭其中多水玉大時之山陽多白玉申山陽多玉鳥山陽多玉西山經玉英出藍田范子京兆藍田山出美玉漢書地理志南山出玉石漢書東方朔傳藍田出美玉三秦記曰有川方三十里其水北流出玉後漢書郡國志注麗戎之山一名藍田其陽多玉水經注玉髓生藍田玉石間玉屑如麻豆生藍田玉泉一名玉札生藍田山谷名醫别録藍田出美玉色如藍故曰藍田太平御覧後魏李預得餐玉法乃采訪藍田掘得若環璧雜器形者大小百餘枚證𩔖本草藍田今不聞有玉圖經本草青玉生藍田一名榖玉張華云合玉漿用榖玉大如升小如雞子取穴中者非作器物用也馬志琅玕琅玕石之似珠者可為冠冕之飾書經蔡註傳云石而似玉或云似珠玉言其質珠言其形也乃石精液凝結成樹形人截其枝刓之使圓若珠雍州據王制言之大小二百一十國茍惟藍田貢玉而餘國則偃然坐享其賦稅而一無所貢于天子有是理乎其必市取以貢無疑也禹貢錐指瑪瑙出府谷神木圖書編府谷神木二縣出至元中貢元一統志今無神木縣志寒山石同州貢元和志鈞石出安塞其石有花可以礲研延安府志離城三里石崖下有美石取而磨之小為研大為屏几雲光陸離安塞縣志升水石驪山有升水石可作清玩蘇文忠寄子由沉泥研詩有自採臨潼繡嶺山句臨潼縣志青石正義曰顔師古云美石出京師北山今宜州石是索隠曰案大顔曰北山青石肌理細密堪為埤槨至今猶然史記張釋之傳註青石出自藍田山長慶集出華原縣寰宇記出富平北山下其石軟細堅潤可作碑碣他山之石不及也馬志北山青石堅潤可鐫字琢磬砌堂階人號墨玉富平縣志青石可以礲碑薄者代瓦清澗縣志青石可作研府谷縣志碧瑱白河髙瑱子洞産賈志興安州出碧瑱唐宋俱採取明初始封閉舊志青瑱青瑱窟穴耀色于巉崖千仭之上民獲其英如探驪龍之珠興安州志白石爾雅云南方之美者有華山之金石焉杜工部有憶鄭南玼詩玼玉色言石似玉也可作礎階并花盎之𩔖考之録異記云金星之精下墜化為白石狀如美玉華山記洗石華山之首曰錢来之山其下多洗石西山經澡洗可以磢體去垢圿郭註陵石生華山其形薄澤名醫别録金牙石出漢中金牙湍湍兩岸石間打出者内即金色岸𩔖入水乆者皆黒近南山溪谷亦有勝于漢中者唐本草今雍州亦有之圖經本草崔昉本草云金牙石陽石也生陜山中似蜜粟子有金㸃形者妙本草綱目花乳石出陜華諸郡色正黄形之大小方圓無定嘉祐本草體至堅重色如硫黄形塊有極大者陜西人鐫為器用圖經本草雲母石生土石間作片成層可析明滑光白者為上圖經本草鳯翔有之鳳翔府志磬石梁州貢磬禹貢小華之山其隂多磬石西山經可以為樂石郭注太真妃最善擊磬明皇令採藍田緑玉為磬開天傳信記磬石在耀州東五里山出青石可以為磬唐天寳中採用泗濵之石遂廢白居易有詩記之賈志紫金山出華原磬石富平縣志磬玉山出青石唐天寳中取為磬其後郊廟樂遂廢泗濵磬白居易作歌曰梨園弟子調律吕知有新聲不知古又曰華原磬與泗濵石清濁兩聲誰得知盖刺新聲不雅云今東山石扣之皆鏗鏗聲然取磬處不知何所矣耀州志汵石號山多汵石西山經作按水經注引經汵石驪山石可作磑有沙者可作礪臨潼縣志試金石清澗有之清澗縣志硝石生武都名醫别録一名焰硝一名地霜本草綱目焰硝甘泉縣出馬志鹻鹽池窪窶人多採鹵土汁為鹻負販數百里以餬口同州志晉王灘洛北崖附近地出鹻較諸灘味厚且饒貧家採熬之注水結塊名鹻墮涇原諸邑多用之惟晉王鎮一區有焉遇澇則減東鹵池即安豐灘亦出鹻蒲城縣志火石可取火用府谷縣志燃石近赤蝦石崖有青色者土人取以代薪安塞縣志煤根石按此石不見于書及志今延安府有之色黑或云煤之根或云煤之苗細潤光滑琢為素珠及器玩等物頗佳石笋産商州大者三二尺小者尺餘其質挺然尖鋭或扁側有三兩靣紋理如刷絲起隠于石面雲林石譜石魚􅔛縣河灘上有亂石隨手碎之中有石魚長可二三寸天然鱗鬛或雙或隻不等云蔵衣笥能辟蠧魚金臺紀聞石魚出汧陽西四十里有魚隴掘地破石得之狀如鰍鯽鱗鬛俱備可辟衣蠧馬志距城六十里曰赤蝦峪其石赤色土人掘之石或破每兩相符鱗甲頭尾宛似魚形然故取之則不可得安塞縣志石墨汧陽縣有石墨洞夷堅志石墨洞産石墨可書潜確類書汧陽東三十里有洞産石墨鄉人取之以供茟硯馬志石墨年例解布政司刷厯􅔛縣志石門遺事云汧陽石墨洞産石墨考之漢尚書令僕丞郎日給隃糜墨二枚或指此然墨産不𩔖煙頗粗不堪用當時或别有製法寖失其傳耶汧陽縣志水經註曰商州黄水地有墨山石悉黒繢彩奮發黝焉若墨今按其地在黄川北山又西荆川亦有石墨洞土人製為錠貨之以牟利楊升菴曰古漆書後皆用石墨以書大戴禮所謂石墨相著也漢以後松煙桐煤既盛此墨遂廢今并其名人亦罕知之商州志石青白青出𢎞農青色者善范子扁青生武都名醫别録空青出銅官者色最鮮深别録陶註白青一名碧青石青一名扁青色深者為石青色淡者為碧青也本草綱目出金州眀一統志出興安州廣皇輿考雒南頁山舊産石青西安府志昔云有之今無雒南縣志膽礬其色青緑狀如琉璃而有白文易破折梁州無復有俗乃以青色礬當之别録陶註昔有今無雒南縣志硃砂産接溪山元和志陽按山在畧縣興州貢丹砂唐書地理志産商宜二州宋史食貨志金州商州出一種砂色㣲黄作土氣陜西並以入藥長安研以代銀硃作漆器陳承别説商州丹砂内含毒氣及金銀銅鉛氣不可服庚辛玉冊出洵陽圖書編出金州明一統志府谷有桃花洞産硃砂洞門如桃花色廣皇輿攷硃砂洞出今封閉洵陽縣志昔有今無雒南縣志水銀今出商州經云出于丹砂者乃是山石中采粗次硃砂作爐置砂于中下承以水上覆以盆器外加火煆養則煙飛于上水銀溜于下其色小白濁陶氏言别出沙地者青白色今不聞有圖經本草出洵陽明一統志雄黄生武都山谷名醫别録雄黄當得武都山中出者純而無雜其赤如雞冠光明乃可用抱朴子武都者為佳塊方數寸明澈如雞冠唐本草武都山在今鳯縣南六十里産雄黄雍勝畧雌黄生武都山谷與雄黄同山生其隂山有金金精熏則生雌黄名醫别録今雌黄出武都者謂之武都仇池黄色小赤别録陶注石油燃之如麻但煙甚濃所沾幃幕皆黒試掃其煤作墨墨光如漆松墨不及也夢溪茟談石油所出不一出陜之鄜州延川延長自石砦中流出肥如肉汁土人以草挹入缶中黒色頗似淳漆作雄硫氣土人多以燃燈甚明得水愈熾其煙甚濃不可入食本草綱目出延長延川二縣自石中流出可以燃燈療瘡明一統志膚施亦少出延安府志石油産延川縣地名石油溝六月取之可以療瘡延川縣志石硫青生武都山石間青白色故名名醫别録硫黄之多青色者本草綱目石硫黄出漢中范子生河西山谷名醫别録取之蔡鄧蒲城縣志同官亦有民賴以生耀州志土硫黄産野火山元一統志縣按山在宜君出宜君縣圖書編琥珀華山五粒松下時生琥珀夜即有光如荷花晝如牛目服之遐舉夜可書字華嶽集白礬礬石生河西山谷及武都能使鐵為銅名醫别録宜君有礬場宋史地理志礬石秦人名為羽涅本草綱目白礬取之蔡鄧蒲城縣皂礬緑礬一名皂礬西安出狀如焰消其中揀出深青瑩浄者即為青礬本草綱目黄礬出陜西者為上黄色狀如梧桐淚人或于緑礬中揀出黄色者充之本草綱目礬紅西安出緑礬煅過變赤則為綘礬入圬墁及漆匠家多用之本草綱目礬紅出澄城縣西長閏里馮志取之蔡鄧蒲城縣志出􅘸頭鎮澄城縣志同官亦有礬紅人賴以治生耀州志石緑隂石也生銅坑中本草綱目出金州明一統志出興安州廣皇輿考白土甘泥白且細可為磁器出陳爐村馬志明月山出白土如銀又出泔泥同官磁器以此為之富平縣志白土出西荆川商州志白水出粉土同州志白土可粉牆府谷縣志紅土出鳯凰山岐山縣志出紅土嶺黄川田家村商州志紅泥可粧彩府谷縣志紫土産澄城同州志取之蔡鄧蒲城縣志染羢貨用府谷縣志藍土出地花舖商州志禹貢徐州出五色土此地亦有紅白藍三色畵家作繪但土石相雜如大造冶鑄非土非石求一石之可刻鏤者不可得也山陽縣志貴妃粉馬嵬坡有楊妃塜塜生白石可為粉名貴妃粉筠廊偶筆出馬嵬坡上土白如粉塊婦女面有黒㸃者以水和粉洗之即除馬志胭脂興元府貢唐書地理志紅花曝乾染色並作胭脂馬志降真香今漢中有之李珣曰香似蘇方木燒之初不甚香得諸香和之則特美嵇含草木狀云長莖細葉根極堅實花白子黒其莖截置煙熖中經乆成紫香可降神本草綱目出漢中府西鄉畧陽沔縣褒城四縣明一統志漆阪有漆詩經秦風號山在葭州木多漆西山經上林苑蜀漆樹十株西京雜記乾漆生漢中山谷名醫别録今梁州漆最盛别録陶注出順政縣武興山元和志興州鳯州貢漆金州貢乾漆實唐書地理志興州金州貢漆寰宇記金州者最善蜀本草出華州南山及西鄉沔縣褒城畧陽金州圖書編漆六七月刻取滋汁出金州者最善馬志漆出黒河中沔縣志山産有漆人剖而瀝之雒南縣志南山多漆樹人咸採之以資用其子亦可作蠟華州志㯶小華山西石脆之山其木多㯶號山木多㯶西山經㯶樹高三丈許無枝條葉大而圓枝生梢頭實皮相褁上行一皮者為一節可以為繩一名栟閭郭注攅并閭與茇葀兮甘泉賦洋縣貢白交㯶唐書地理志西鄉縣出舊郡志蜜生武都山谷色白如膏者良名醫别録今闗中白蜜甘美耐久全勝江南者唐本草順政縣厨山産木蜜元和志興州鳯州貢蜜邠州貢白蜜唐書地理志鳯州沔縣貢宋史地理志雍洛間有一種梨花蜜白如凝脂圖經本草興州貢寰宇記蜜出西鄉沔縣褒城畧陽興安廣皇輿攷蜜蜂溝在鳳縣西南一百里地多蜜蜂居民利之漢中府志蜜出黒河沔縣志蠭房作蜜又有一種崖蜜葢蠭釀蜜于崖石間即本草之白蜜是也山間多有之人或攀附而採焉華州志蠟生武都山谷蜜廬木石間名醫别録邠州開元貢白蠟延州開元貢蜜蠟綏州開元貢蠟元和志京兆鳯翔丹州延州綏州興州鳯州興元洋州貢唐書地理志京兆延安鄜州扶風鳯州沔州貢宋史地理志隴州興州金州貢寰宇記蠟出黒河環其地皆山沔縣志有白黄蠟二種商州志蜂房作黄蠟華州志鳳按今南鄭褒城城固縣等處俱産酥夏州貢元和志黐膠大厯十四年七月辛巳商州歲貢黐膠罷之冊府元龜黐膠所以黏鳥廣韻紙興元府貢蠲紙金州貢紙寰宇記為紙則有楮構盩厔縣志洋縣出楮紙舊郡志構皮可作紙商州志民做紙田賦賴此出山陽縣志水莊作山紙華州志紙潔白細膩出興市鎮武店蒲城縣志紙按今城固縣亦出頗佳香石堤峪山居以木為機引水磨榆雜木作香四十里間桔橰相亂上下盖有千輪貲貨甚廣華州志煙較他邑為勝城固縣志草多煙草華州志服之而醉名曰煙酒又謂之相思草葭州志酒酒有富平之石洞春京城之西市腔蝦蟆陵郎官清阿婆清唐國史補鳯州公庫多美醖故世言鳯州有三出謂手桺酒也遯齋閒覽長安新豐市酒富平石凍春灞陵崔家酒馮翊含春鳯州清白酒酒小史鳯翔槖泉華州蓮花又氷堂上尊邠州静照堂又玉泉同州清洛又清心堂金州清虚堂酒名記隴州出鳳翔府志油陜西食杏仁紅藍花子蔓菁子油亦以作燈鷄肋編油有核桃芝麻椒菜子麻子稔子漆子杏仁共十數種商州志有旱水磨取菜子脂麻白紅花子枲實作油華州志席京兆貢席鳯翔府隴州鄜州坊州丹州貢龍鬚席唐書地理志京兆永興軍坊州中部郡扶風鳳翔軍隴州汧陽郡貢席宋史地理志磁器耀州感義軍貢宋史地理志耀州陶匠創一等平底深盌狀簡古號小梅甌清異録耀州出清磁器謂之越器以其𩔖餘姚縣秘色也極粗朴耐乆老學菴筆記出同官陳爐村馬志明月山有白土磁器富平縣志文昌山下舊出州西顯神寨二窰出缸瓮盆盎礶盞之𩔖名商磁商州志噐用黒磁産􅘸頭鎭澄城縣志開光川西北出葭州志砂器尚書村陶噐人以治生富平縣志州東趙峪川北泉村並出砂噐鍋礶等商州志案几鳯翔出案几其天生曲材者亦值數十緡雞肋編石踏爐華州舊貢出将相鄉獼猴谷今停寰宇記髤噐侯坊善製髤噐或為四方珍異以資生又善作囊華州志刀鄭之刀周禮考工記桺子鎮有千家鐵匠作刀劍剪斧之用士大夫共索以相贈華州志佳按今潼闗出刀名朱刀剪刀邠州土貢唐書地理志邠州靖難軍貢宋史地理志針郡之西闗磋鋼針頗足俯仰之資華州志火筋邠州土貢唐書地理志邠州靖難軍貢宋史地理志弓弦坊州中部郡土貢枲弦唐書地理志坊州貢弓弦宋史地理志弓材弓人為弓取六材必以其時六材既聚巧者和之幹也者以為逺也角也者以為疾也筋也者以為深也膠也者以為和也絲也者以為固也漆也者以為受霜露也周禮考工記夏州貢角弓元和志商州貢弓材唐書地理志皮革熊羆狐狸織皮禹貢梁州梁州多山獸熊羆狐狸四獸之皮製之可以為裘其毳毛織之可以為罽也蔡註同州土貢鞹豐州土貢野馬胯革安北大都䕶府貢野馬胯革唐書地理志虎豹狐貉之皮獵户山居者間有之又州東北土波砦善製緑黒韋為今所尚盖縁刀劒鞘鞍轡鞾子夏服櫜鞬之𩔖華州志吉莫同州開元貢縐紋吉莫皮元和志鞾同州元和貢縐紋靴元和志京兆永興軍貢宋史地理志同州貢縐紋鞾寰宇記澡豆邠州土貢唐書地理志燭鳯翔丹州開元貢元和志鳯翔丹州綏州鳯州土貢唐書地理志鄜州鳯翔貢宋史地理志隴州鳯州貢寰宇記石燭出延安予在南鄭數見之其堅如石照席甚明亦有淚如蠟而烟濃能薫汚帷幕衣服故西人亦不貴之老學菴筆記石𨫼餅同州元和貢元和志炭民以佐稅贍家惟柴炭數物盩厔縣志民以櫟作薪燒炭山陽縣志耀州同官惟薪炭作業耳耀州志石炭有三種有明煤碎煤末煤明煤大塊如斗許秦晉生之天工開物石炭龍門内上峪口皆有荒山絶壑穿穴以出負擔驢騾絡繹於道每數十百舸艓連尾上下浮於河由韓而郃而朝而同華自河達渭以及長安盩厔之西載以易粟嵗以為常衛氏祖地圗出同官北山下可以代薪馬志石炭多于他處安定縣志文昌山下有石炭顯神寨熊耳兩峰相對西南三十里鑿山取炭可以鑄鐵又田峪川北泉村地方七十里又大亢峪東三十里皆産炭又黄川冦家村北七十里于崇禎十六年亦産炭但三處可資炊㸑俱不堪鑄鐵商州志東南諸山皆産煤雒南縣志産􅘸頭鎮井深三百尺澄城縣志龍門之炭陜以西咸需之韓城縣志炭谷在縣西北三十里舊出炭今無後縣北三十里復出人利其便将蔡鄧炭遂革今又無惟運白水縣東炭耳蒲城縣志同官山出煤耀州志石炭明嘉靖甲辰始鑿山取之三水縣正徳七年開􅘸取煤至今賴之邠志州開光川出葭州志黑山出府谷縣志磚瓦本地出商南縣志陶人塼埴作甂甌瓴甓瓦鰲魚之𩔖華州志陜西通志卷四十三
