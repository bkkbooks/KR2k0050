body:
  text: 陜西通志巻七十三古蹟第二府第園林郊坰府第周辟廱在鄠縣東三十里馬志鎬京辟廱詩經大雅周文王辟廱在長安西北四十里亦曰璧廱如璧之圓雍之以水象教化流行也詩云於論鼓鐘於樂辟廱毛萇注云水旋丘如璧廱以節觀者三輔黄圖三代學周立三代之學學書於有虞氏之學典謨之教所以興也學舞於夏后氏之學文武中也學禮樂於商之學功成治定與已同也禮記注尹喜故宅寳鷄有尹喜故宅張三丰邱長春馬丹陽王重陽劉綱樊夫人秦弄玉仙跡往往而在苐虎豹熊羆時出伺人有獨角獸樵者見其卧林間或搏虎而食之食輒餘其半山家毎得殘虎以飽偃曝談餘漢靈金内府太上皇微時佩一刀長三尺上有銘字難識傳云殷髙宗伐鬼方所作也上皇遊豐沛山中寓居窮谷有人冶鑄上皇息其旁問曰鑄何器工者笑曰為天子鑄劍慎勿言曰得公佩劒雜而冶之即成神器可定天下昴星精為輔佐木衰火盛此為異兆上皇解匕首投爐中劒成殺三牲以釁祭之工問何時得此上皇曰秦昭襄王時余行陌上一野人授余云是殷時靈物工即持劒授上皇上皇以賜髙祖髙祖佩之斬白蛇是也及定天下藏於寳庫守藏者見白氣如雲出戸狀若龍蛇吕后改庫曰靈金藏惠帝即位以此庫貯禁兵器名曰靈金内府三輔黄圖太倉蕭何立太倉漢書髙帝本紀在長安城外東南文景節儉太倉之粟紅腐而不可食三輔黄圖武庫漢書曰武庫以藏禁兵又曰樗里子葬於武庫文頴曰秦惠王異母弟也師古曰樗里子且死曰葬我必渭南章臺東後百年當兩天子宫夾我墓漢興長樂在其東未央在其西武庫正直其上長安志辟廱在長安西北七里漢書河間獻王來朝獻雅樂武帝對之三雍宫即此禮樂志曰武帝時犍為郡水濵得古磬十六枚劉向説帝宜興辟廱焉三輔黄圖蕭何第蕭何買田宅必居窮僻處為家不治垣屋曰令後世賢師吾儉不賢毋為勢家所奪漢書蕭何傳王莽為安漢公以故蕭何宅為安漢公第長安志石奮宅石奮髙祖召其姊為美人徙其家長安中戚里漢書石奮傳師古曰於上有姻戚者皆居之故名其里曰戚里石奮傳注田子春宅在漢長安城中孟嘗君孫因諸吕擅權乃入闗圖扶漢誅諸吕故有是宅馬志夏侯嬰宅惠帝及髙后徳嬰賜嬰北第第一曰近我以尊異之漢書夏侯嬰傳師古曰北第者近北闕之第嬰最第一也故張衡西京賦云北闕甲第當道直啟夏侯嬰傳注敖倉漢書曰惠帝六年六月起長安西市修敖倉長安志代邸代王至渭橋太尉勃跪上天子璽代王謝曰至邸而議之閏月己酉入代邸郡臣從至上議請即天子位代王西向讓者三南向讓者再遂即天子位羣臣奉天子法駕迎代邸皇帝即日夕入未央宫漢書文帝本紀師古曰郡國朝宿之舍在京師者率名邸文帝本紀注三輔廨三輔黄圖曰三輔者主爵中尉及左右内史武帝改曰京兆尹左馮翊右扶風共治長安中是為三輔郡皆有都尉又曰京兆在故城尚冠里馮翊在故城内太上皇廟西扶風在夕陽街北此其廨治之所也雍録中尉府在尚官冠里街東京兆府即廢中尉府也長安志曾孫郡邸曾孫雖在襁褓猶坐収郡邸獄而邴吉為廷尉監治巫蠱於郡邸憐曾孫之無辜使女徒復作淮陽趙徵卿渭城胡組更乳養後元二年武帝疾往來長楊五柞宮望氣者言長安獄中有天子氣上遣使者分條中都官獄繫者輕重皆殺之内謁者令郭穰夜至郡邸獄吉拒閉使者不得入曾孫賴吉得全漢書宣帝本紀如淳曰謂諸郡邸置獄也師古曰據漢舊儀郡邸獄治天下郡國上計者屬大鴻臚此葢巫蠱獄繁収繫者衆故曾孫寄在郡邸獄宣帝本紀注丞相府平津侯公孫𢎞自以白衣為丞相乃大開東閣營客館招延天下士人其外曰欽賢之館以待大賢之士次曰翹材之館以待大材之士又次曰接士之館以待國士其有徳任毗贊佐理隂陽者處之欽賢館其有材堪九列將軍二千石者處翹材之館其有一介之善一方之藝者居接士之館所得俸禄以奉之西京雜記御史府漢御史所居曰御史府亦曰御史大夫寺在大司馬門内無墊其門用梓板不雘色亦謂之憲臺杜氏通典御史府中列栢木常有野烏數千棲宿其上晨去暮來號曰朝夕烏漢書朱博傳太學在長安城南安門之東杜門之西闗中記漢太學中有市有獄三輔舊事司隷府司隷府治故府即孝武帝廟也漢舊儀保宫少府官屬有居室武帝更名曰保宫李陵降匈奴以母繫保宫長安志有按甘泉宫别保宫鴻臚府王莽以鴻臚府為安定太后宫長安志長安厨發長安厨三太牢具漢書霍光傳如淳曰黄圖北出中門有長安厨謂之厨城門霍光傳注蠻夷邸陳湯斬郅支單于上疏乞垂之藁街蠻夷邸間諸家無言藁街之在何地者唐都髙驛即蠻夷邸在朱雀街西與鴻臚寺近雍録卜肆司馬季主楚人也卜於長安東市宋忠賈誼同輿而之市游於卜肆中史記霍光第宣帝賜甲第一區漢書霍光傳有甲乙次第故曰甲第音義王根第曲陽侯王根大治第室極其奢僣司隷校尉京兆尹不敢舉奏馬志王商第成都侯商穿長安城引内灃水注第中大陂以行船上幸商第見穿城引水意恨内䘖之漢書外戚傳董賢第哀帝詔將作大匠為賢起大第北闕下重殿洞門木土之功窮極伎巧柱檻衣以錦綈漢書董賢傳細柳倉在咸陽西三十里漢周亞夫屯軍處馬志漢文帝大將軍周亞夫軍於細柳今呼石徼是也石徼西有細柳倉城東有嘉禾倉樊噲傳柳中即細柳地也在長安西三輔故事服䖍曰在長安西北如淳曰長安細柳倉在渭北近石徼張揖曰在昆明池南今有柳市是也師古曰匈奴傳云置三將軍軍長安西細柳渭北棘門覇上此則細柳不在渭北揖説是也漢書注物定倉華州下邽縣南渭河岸上乃漢之物定倉也西京雜記物定倉收貯五穀各先定其性物則不浥壞故秦漢隋唐於此置倉鄉俗語訛為武底倉馬志任安宅漢任少卿以武功小邑無豪右髙貲故居武功賈志陸賈宅在永夀縣東南好畤鎮永夀縣志孝惠時吕太后用事欲王諸吕畏大臣及有口者賈自度不能争廼病免以好畤田地善往家焉有五男廼出所使越槖中裝賣千金分其子子二百金令為生産賈常乗安車駟馬從歌鼔瑟侍者十人詔其子曰與汝約過汝汝給人馬酒食極飲十日而更漢書陸賈傳後漢如淳宅漢平帝時賜淳宅於髙陵有碑頌節文賈志第五倫宅在三水縣東歸義鄉蒲東杜邠志云東漢賜田宅三十六所此其一也三水志張超廬在華隂縣霧谷後漢張楷字公超結廬此地學者如市又能為五里霧故稱張超霧市賈志晉殷濟精廬水經注云陶渠水東南流逕晉漢陽太守殷濟廬今不可考賈志來賔館苻健永和十年西虜乞没渾邪遣子入侍置來賔館于平朔門以懐逺人長安志宋范栢年宅在南鄭縣梁州記云范栢年漢中人謁宋明帝因語廣南貪泉栢年對云臣郡有文川武鄉亷泉遜水足以為名相傳范栢年宅在亷遜之間即此賈志魏沙苑監在同州東西八十里南北三十里西魏大統二年宇文泰與髙歡戰大破之後於兵立之處建忠武寺令騎士各種柳一株數及七千至今沙苑有柳樹仍以其地宜六畜置沙苑監豢養隴右牛羊諸畜以供上方之用故杜甫沙苑行有云左輔白沙如白水繚以周墻百餘里苑中來牝三千匹豐草青青寒不死集異記云唐明皇十三載重九獵於沙苑雲際有孤鶴徊翔上親御弧矢一發而中其鶴帶箭墮而復起及幸蜀逰道觀中視所掛箭道士徐佐卿題乃上獵沙苑之日也按沙苑在州城南三十里潜確類書隋煬帝在藩舊宅武徳中賜尚書左僕射蕭瑀所謂少陵原南接終南北至滻水即漢鴻固原也宣帝許后葬於此俗號少陵原後瑀子鋭尚襄城公主詔别營主第主辭以姑婦異居有乖禮則因固陳請乃取園地充主第又辭公主棨㦸不欲異門乃並施瑀之院門長安志李穆宅平康坊西北隅隋太師申國公李穆宅其地景龍中為長寜公主府及鞠塲景雲中廢並毬塲散賣與居人長安志史萬歳宅長安待賢坊隋北領軍大將軍史萬歳宅其宅初有鬼怪居者輒死萬歳不信因即居之夜見人衣冠甚偉來就萬歳萬歳問其由曰我漢將軍樊噲墓近君居厠常苦穢惡幸移他所必當厚報萬歳許諾因詰殺生人所由曰各自怖而死非我殺也及掘得骸柩因為改塟後夜又來謝曰君當為將吾必助君後萬歳為隋将毎遇賊便覺鬼兵助已戰必大㨗兩京記田𢎞宅永寜坊西門之北有隋兵部尚書田𢎞宅𢎞子仁恭徳懋及孫元基並以孝義旌時論美之長安志按蘇威宅亦在是坊廣通倉在華州隋文帝以長安倉廪尚虚詔以西至蒲陜東至衛汴水次十三州募丁運米於華州置廣通倉以給長安賈志唐尚書省在朱雀門北正街之東自占一坊雍録省中有都堂本尚書令㕔事都堂之東吏部户部禮部三行毎行四司左司統之都堂之西兵部刑部工部每行四司右司統之長安志尚書省東南隅通衢有小橋相目為抝項橋言侍御史及殿中久次者至此必抝項而望南宫也都堂南門道東有古槐垂隂至廣相傳夜深聞絲竹之音省郎有入相者俗謂之聲音樹祠部呼為本㕔言其清且冷也因話録吏部選院長安志曰在尚書省之南亦曰吏部南院選人看牓之所也六典吏部員外郎掌選院謂之南曹注云其曹在選曹之南故謂之南曹也雍録禮部南院吏部選院東禮部南院四方貢舉聚㑹之所也長安志禮部南院者即貢院也今世淡墨書進士牓首列為四字曰禮部貢院者唐世遺則也則唐人已嘗名南院為貢院矣有列牓之地如吏部雍録驥徳院後苑有驥徳院禁馬所在韋后入飛龍廐為衛士斬首葢自𤣥武門出宫入廐也雍録太平公主宅興道坊有太平公主宅没官後賜散騎常侍李令問居長安志李光顔宅開化坊有李光顔宅穆宗初賜第崇徳坊以為别宅長安志令狐楚宅按酉陽雜俎楚宅在開化坊牡丹最盛而李商隠詩多言晉陽里第未詳長安志緫按長安志韓洄宅馬宅沈傳師宅崔垂休宅俱在是坊劉延景宅王昕宅安仁坊有劉延景宅王昕宅延景即寜王憲之外祖昕即薛王業之舅皆是親王外家甲第並列京城美之長安志元載宅安仁坊有元載宅長安志元載城中南北二甲第又於近郊起亭榭帷帳什器皆如宿設城南别墅凡數十所婢僕曵綺羅二百餘人譚賔録載宅有芸輝堂芸輝香草名也出于闐國杜陽雜編萬按長安志仇兼瓊宅春公主宅崔造宅張孝忠宅于頔宅杜佑宅俱在是坊國子監在務本坊監東開街若兩坊衞北抵皇城南盡一坊之地監中有孔子廟貞觀四年立長安志齡按房元宅張懋昭宅于徳晦宅俱在是坊蘇朂宅崇義坊西南隅太子左庶子駙馬都尉蘇朂宅後為英王園其地湫下無人居長安志段秀實宅崇義坊段秀實宅徳宗所賜宣宗大中十年詔秀實崇義坊宅諸院典在人上計錢三千四百七十五貫宜賜莊宅錢収贖仍令鴻臚少卿段義楚追貼舍人計㑹長安志竇易直宅崇義坊有尚書左僕射竇易直宅長安志本中書令崔圖宅禄山盗國王維鄭䖍張通皆處賊庭洎克復囚於宣陽里楊國忠之舊宅崔圖因召於私第令畫各有數壁當時以圖勲貴無二望其解放運思精巧頗極能事其後皆得寛典其宅鬻於易直太和中畫尚存明皇雜録王按崔元暐宅馬懐素宅韋堅宅承業宅皆在是坊楊師道宅長興坊東北隅駙馬都尉楊師道宅其地後分裂左監門大將軍韓琦尚書刑部侍郎崔元童荆州司馬崔光意等居長安志杜鴻漸宅在長興坊鴻漸於長興正深第崇飾門館賦詩曰常願追禪侣安能挹化源朝士多和之長安志張嘉貞宅在長興坊馬志本太常少卿崔日知宅長安志馬璘宅在長興坊馬志大厯十四年七月毁元載馬璘劉忠翼之第天寶中京師堂寢已極宏麗而第宅未甚踰制及安史二逆之後大臣宿將競崇棟宇無復界限而馬璘之堂尤盛璘卒於軍以䘮歸京師士庶欲觀之假名故吏投刺㑹弔者數十百人故令撤毁之自是京師樓榭之踰制者皆毁徳宗實録丘按元行沖宅王宅紀國大長公主宅辛京杲宅韋聿宅漢陽大長公主宅鄭仲宅路隋宅王潘宅史憲中宅鄭顥宅于宗宅俱在是坊禮賔院元和九年六月置禮賔院於長興里北冊府元龜張説宅在永樂坊本侍中王徳正宅燕公大加修葺馬志有僧泓與説買永樂東南第一宅戒曰此宅西北隅最是旺地慎無於此取土越月泓至謂説曰此宅氣候忽然索漠甚必恐有取土於西北隅者公與泓偕行至宅西北隅果有取土坑數處皆深丈餘泓大驚曰禍事令公富貴一身而已更二十年外諸郎君皆不得天年燕公大駭曰填之可乎泓曰客土無氣與地脉不相連今欲填之亦猶人有瘡痏縱以他肉補之終無益也後説子均垍皆為禄山委任克復後均賜死垍流之大唐新語裴度宅在永樂坊馬志唐實録云度自興元請朝宰相李逢吉之徒百計隳沮有張權輿者上疏曰度名應圖䜟宅據岡原不召而來其旨可見葢嘗有人與度作䜟詞云緋衣小兒坦其腹天上有口被驅逐言度曾征討淮西平呉元濟也又帝城東西横亘六岡符易乾卦之數度永樂里第偶當五岡故權輿以為詞長安志宅按王璿宅王紹宅李思忠蕭寛宅俱在是坊魏徵宅在永興坊封演見聞録曰徵所居室屋卑陋太宗欲為營造輒謙不受洎寝疾太宗將營小殿遂輟其材為造正堂開元中此堂猶在家人遺火燒之子孫哭臨三日朝士皆赴弔唐傳所載亦同至白居易傳則又曰李師道上私錢六百萬為徵孫贖故第居易時為拾遺當元和四年建言徵任宰相太宗用殿材成其正寢後世不能守陛下宜為賢者子孫贖而還之師道人臣不宜掠美帝從之若如居易所言則是太宗殿材所造之寢至元和猶在開元中不曾遭火也特子孫不能保有而貨鬻之耳予詳思其理開元間所火當是殿材之正寢耳而他屋不皆火也直以清貧之故子孫盡舉而鬻之居易深探太宗重徵之意欲其還贖使事出朝廷也至㑹要所載曰元和四年上嘉魏徵諫諍詔訪其故居質賣已更數姓上出兩庫錢二百萬贖之以還其家禁其質賣據此記與居易傳畧同當是㑹要又欲歸美憲宗不欲出自臣下建請耳雍録亦按仇士良宅在是坊長寧公主宅崇仁坊西南隅有長寧公主宅主既承恩盛加雕飾朱樓綺閣一時絶勝又有山池别院山谷虧蔽勢若自然中宗及韋庶人數逰於此第留連彌日賦詩飲宴韋氏敗遂奏為觀詞人名士竟入遊賞兩京記禮㑹院崇仁坊之西南有禮㑹院本長寜公主宅公主及駙馬楊脊交奏割宅向西一半官市為禮㑹院毎公主郡縣主出降皆就此院成禮長安志初開元中置禮㑹院於崇仁里自兵興以來廢而不修徳宗實録按蘇瓌宅褚无量宅俱在是坊李林甫宅在平康坊本尚書令左僕射衛國公李靖宅景龍中韋庶人妹夫陸頌所居韋氏敗靖姪孫令問居之後為林甫宅有堂如偃月每欲排擠大臣即處之思所以中傷者若喜而出即其家碎矣長安志按褚遂良宅韋澄宅蘭陵公主宅王志愔宅崔㤗之宅裴光庭宅張宏靖宅俱在是坊萬年縣廨宣陽坊東南隅萬年縣廨去府七里縣門屋宇文愷所造太平公主降薛紹於縣廨設昏席初以縣門隘狹欲毁之髙宗勅宇文愷所造製作多竒不須毁拆也長安志虢國夫人宅在宣陽坊馬志貴妃姊虢國夫人恩傾一時於宣陽坊大置第宅棟宇之盛世無與比所居本韋嗣立舊宅韋氏諸子亭午方偃息於堂廡間忽見一婦人衣黄羅帔衫降自歩輦侍婢數十笑語自若謂韋氏諸子曰聞此宅欲貨其價幾何韋氏諸子降階言曰先人舊廬所未忍棄語未畢有工數百人登東西廂撤其瓦木韋氏諸子既不能制乃率家僮挈其琴書委於衢路嘆曰不才為勢家所奪古人之戒將見於今日矣與韋氏隙地十餘畝一無所酬明皇雜録楊銛與國忠五家於宣陽里甲第洞開僣擬宫掖毎造一堂費逾千萬見制度宏於己者則毁之復造土木之工不捨晝夜太真外傳希按李誨宅竇毅宅韓巨源宅劉進宅楊務亷宅韋叔夏宅單思逺宅李義宅李滚宅鄭惟忠宅郭元振宅楊國忠宅高仙芝宅李齊物宅薛平宅韓公武宅韋文恪宅張義潮宅俱在是坊于志寧宅在親仁坊馬志後併入相府閒地置府後勅賜貴妃豆盧氏後左金吾大將軍程伯獻黄門侍郎李髙等數家居焉長安志郭子儀宅在親仁坊宅居其坊地四分之一通永巷家人三千出入者不知其居其里巷負販之人上至簮纓之士出入不問或至王夫人趙氏愛女方粧梳對鏡公麾下將吏及郎吏皆被召令汲水持帨視之不異僕隷他日子弟集諫公不應繼之以泣曰大人功業已成而不自崇重以貴以賤皆逰卧内某等以為雖伊霍不當如此笑曰爾曹固非所料且吾官馬食粟者五百匹官餼者一千人進無所往退無所據向使崇垣扃戸不通内外一怨將起搆以不臣其有貪功害能之徒成就其事則九族虀粉噬臍莫追今蕩蕩無間四門洞開雖讒毁無所加也諸子皆服譚賔録安禄山宅在親仁坊長安志舊宅在道政坊𤣥宗以其隘陋更於親仁坊選寛爽之地出内庫錢更造院宇堂皇䆗窱周匝帷帳幔幙充牣其中天寳九載禄山獻俘至京命入新宅禄山故事馮宿宅在親仁坊馬志宿從子衮為給事中宅南有山林池亭院多養鵞鴨及雜禽之數常遣一家人主之謂之鳥省盧氏雜説公按韋琨宅鄭萬鈞宅滕王元嬰宅昌樂主宅李勉宅歸崇敬宅西華公主宅李國昌宅俱在是坊楊憑宅在永寧坊馬志憑入拜京兆尹治第永寧里功役叢煩謗議頗讙貶臨賀尉唐書楊憑傳白樂天得楊憑宅竹木池館有林泉之致因為池上篇窮幽記王仁皎宅在永寧坊神龍初李晉居焉繕造廓院稱為甲第勅賜仁皎長安志王鍔宅在永寧坊鍔子稷進永寧里第宣義亭子時議以鍔因縁累居大鎮營第華侈既没而入於官固其所也長安志李載義宅在永寧坊太和五年載義自幽州入朝文宗賜以居第及米麪錢帛芻籍甚厚長安志王鐸宅在永寧坊長安志第中别有書齋退朝獨處其中欣欣如也三水小牘宅按裴行儉宅裴炎宅李輔國宅徐浩髙郢宅王涯宅李有裕宅白敏中宅張直方宅李聴宅俱在是坊李晟宅在永崇坊馬志興元元年賜晟永崇里甲第詔宰臣諸郎將㑹送是日特賜女樂八人錦綵銀器等令教坊太常偹樂京兆府供具鼔吹迎導集宴京師以為榮觀長安志賢按韋抗宅楊銛宅杜亞宅李宅韓宏宅俱在是坊庾敬休宅在昭國坊馬志敬休宅屋壁有畫奏樂圖王維常至其處熟視而笑曰此霓裳羽衣曲第三叠第一折好事者集樂工騐之無一差者唐國史補鄭絪相公宅在昭國坊南門忽有物投瓦礫五六夜不絶乃移於安仁西門宅避之瓦礫又隨而至經久復歸昭國鄭公皈心釋門禪室方丈及歸將入丈室蟢子滿室懸絲去地一二尺不知其數其夕瓦礫亦絶翼日拜相酉陽雜俎崔琯宅栁玭云崔氏居昭國坊宅子孫昌盛衣纓不絶長安志宅按裴子餘宅李寰俱在是坊渾瑊宅在進昌坊馬志興元元年賜兼賜女樂五人錦綵銀器等宰臣郎將㑹送有司偹饌次於李晟焉長安志慶按穆敦信宅孫伏伽宅許國師宅陸餘宅元載别宅義章公主宅俱在是坊宋璟宅在大寧坊長安志璟宅中造屋悉東西正陽譚賔録宅按寜王憲宅岐王範宅陸象先王同晊宅李巖宅俱在是坊薛繪宅在勝業坊兄弟子姪數十人同居一曲姻黨清華冠冕茂盛人謂之薛曲雍録豆按薛王業宅徐堅宅盧建宅席豫宅朱巨川宅俱在是坊張師延宅在安邑坊馬志師延兄弟三人同時三品一宅之中棨㦸齊列時人榮之號三㦸張家景龍中司農卿趙履温居焉長安志李吉甫宅安邑坊有李吉甫宅長安志吉甫宅泓師謂其地形為玉柸云玉柸一破無復全至徳裕貶其家滅矣盧氏雜説在按楊執一宅亦是坊裴遵慶宅在昇平坊馬志遵慶罷相知選朝廷優其年徳令就第注官自宣平坊牓引士子以及東市兩階時人以為盛事國史補柳公綽宅在昇平坊馬志公綽子仲郢毎遷官羣烏大集於第之庭木棨㦸皆滿五日而散家人以為候惟除天平軍馬節度後烏不復集遂卒於鎮長安志潘孟陽宅在昇平坊馬志孟陽盛治第舍帝㣲行至樂游原望見之以問左右孟陽懼輟不敢治唐書潘孟陽傳按魏少游宅劉沔宅俱在是坊胡証宅在修行坊証嶺南節度使在鎮好修劍自奉修行坊第連亘閭巷議者非之李訓敗衛軍利其貯聲言賈餗匿其家争入剽刼長安志楊収宅在修行坊馬志収兄發弟嚴皆顯貴號修行楊家與靖恭諸楊相比長安志李按鄭宜遵宅杜從則宅建宅俱在是坊十六宅在安國寺東附苑城為大宅分處十王謂慶忠棣鄂榮儀台潁永濟也後盛夀陳豊常凉六王又就封入内宅是為十六宅後以諸孫成長又置百孫院雍録崔琳宅在興寧坊馬志琳祖義元父神慶伯父神基皆為相其父昆弟之子洎其自出參朝宴者數十人鳴玉啟道自興寧里詣大明宫冠葢相望時人屬目長安志生按姚崇宅王毛仲宅泉南宅李愬宅俱在是坊李綱宅在永嘉坊綱子孫茂盛四代緦麻服同居朝廷美之長安志里按張文瓘宅韋元炎宅申王撝宅成王千宅蔡國公主宅竇希玠宅凉國公主宅俱在是坊楊汝士宅在靖恭坊與其弟虞卿漢公魯士同居號靖恭楊家為冠葢盛族長安志符璘宅璘賜靖恭里第藍田田四十頃長安志崔彥昭宅在靖恭坊長安志靖恭崔公尚書為樂卿自靖恭宅露冕從扳輿入太常觀者樂之秦中記宅按楊慎交王敬從宅韋建宅韋渠牟宅呉通㣲集書院史憲誠宅金州進奏院俱在是坊牛僧孺宅在新昌坊馬志牛相新昌宅泓師號為金椀言金或傷庶可重製本將作大匠康𧦬宅𧦬自辨崗阜形勢以其宅當出宰相後毎命相必引領望之宅竟為牛所得續前定録楊於陵宅在新昌坊馬志楊損家新昌里與路巖第接巖為相欲易廐以廣第損族仕者十餘人議曰家世盛衰係權者喜怒不可拒損曰今尺寸土皆先人舊貲非吾等所有安可奉權貴耶窮達命也卒不與唐書楊損傳張按於陵子嗣復嗣復子損損宅即於陵所傳也又仲方宅温造宅盧宏宣宅路巖宅俱在是坊殷開山宅顔師古宅在敦化坊馬志貞觀永徽間太常少卿歐陽詢著作郎沈越賔亦在此坊殷顔南朝舊族歐陽與沈又江左士人時人呼此坊為呉兒坊長安志宅按韋武宅鄭國夫人俱在是坊程懐直宅在安業坊貞元十年賜懐直甲第一區妓女一人令歸滄州初懐直自滄州歸朝徳宗賜務本里宅又賜安業里别宅有池榭林木之盛長安志張去奢宅在安業坊弟去逸去盈同時三品亦號三㦸張家長安志亦按息國公主宅在是坊王鉷宅在太平坊長安志則天以後王侯妃主京城第宅日加崇麗御史大夫王鉷有罪賜死縣官簿録鉷太平坊宅數日不能遍宅内有自雨亭從簷上飛流四注當夏處之凛若髙秋又有寳鈿井欄不知其價他物稱是封氏見聞記源按舒王元名宅節敏太子妃楊氏宅王中宅羅言宅裴垣宅俱在是坊劉相國宅在通義坊本文宗朝朔方節度使李進賢舊第後進賢徙居長興其宅互為他人所有相國以十千税焉及竄於日南謫居四年方獲清雪未久復持鈞軸或將甲第為獻竟無所受復於此寓居庭宇不加修飾清風儉徳充塞寰宇劇談録宅按李思訓宅楊纂崔鉉宅俱在是坊裴㢲宅延壽坊東隅駙馬裴㢲宅髙祖末裴行儉居之自行儉以前居者輙死行儉卜居有狂僧突入髠其庭中大栁樹中有豕走出徑入北鄰其家數日暴死盡此宅清宴兩京記亦按成安公主宅在是坊京兆府廨在光徳坊東南隅府内廨宇並隋開皇中制度其後隨事改作長安志崔邠宅在光徳坊邠與弟浙西觀察使郾金吾大將軍鄯及宰相淮南節度使鄲皆貴顯同居光徳舊第鄲嘗搆便齋宣宗聞而嘆曰崔氏一門孝友可為士族之法因題曰徳星堂後京兆民即其里為徳星社長安志宅按劉仁軌宅鄱陽公主宅裴垍劉崇望宅俱在是坊閻立本宅在延康坊馬志後申王傅符太元居之西亭有立本畫山水長安志諸王府寳厯二年以延康坊官宅一區為諸王府唐朝故事王府在王京師即合有曹局自天寳以後王不出閣所置寮采過於閒冗其胥吏數司方共一員至是瓊王府長史裴簡求奏論遂創官府長安志有按是坊隋楊素宅盧懐慎宅在崇賢坊懐慎居官清儉宅在陋巷屋宇不蔽風雨長安志宅按虎王邕宅竇瑗俱在是坊瓊山縣主宅在延福坊縣主開元中適慕容氏即吐谷渾之苗裔富於財產宅内有山池院谿磴自然林木蓊欎京城稱之長安志俱按宣平府真化府在是坊宗楚客宅在醴泉坊馬志楚客造第新成皆是文柏為梁沉香和紅粉以泥壁開門則香氣蓬勃磨文石為堦砌及地着吉莫靴者行則仰仆楚客兄弟配流太平公主就其宅看嘆曰看他行坐處我等虚生浪死景龍中為中書令韋氏敗斬之朝野僉載長安縣廨長壽坊西南隅長安縣廨去府六里長安志按楊温宅尉遲敬徳宅俱在是坊劉道祥宅在居徳坊宅接先天寺據漢圜丘舊址因其髙築亭焉長安志同昌公主宅咸通九年同昌公主出降宅於廣化里房櫳戸牖以衆寳飾之唐書同昌公主傳宅按太華公主宅義陽公主韓滉宅岐陽公主宅俱在是坊李義琰宅義琰宅至褊隘雖居相位在官清儉竟居方丈之室髙宗聞而嗟嘆遂勅匠作造堂以安靈座焉長安志王家富窟王元寳都中巨豪也嘗以金銀疊為屋壁上以紅泥泥之於宅中置一禮賢堂以沉檀為軒檻以碔砆甃地面以錦文石為柱礎又以銅線穿錢甃於後園花徑中貴其泥雨不滑也四方賔客所至如歸時人呼為王家富窟開元遺事坊按富窟及李義琰宅俱未詳里姑附之以俟考訂按唐京城中府第最夥如光福坊則有竇參宅魏國公賈眈宅南充郡王伊慎宅蘭陵坊則有韋待價宅李􅡋宅靖安坊則有咸宜公主宅崔倫宅武元衡宅韓愈宅劉伯芻宅李宗閔宅昌樂坊則有屈突通宅安徳坊則有蘇萬宅桑道茂宅來庭坊則有王仁祐宅髙延福宅梁守謙宅安興坊則有韋安石宅朱泚宅通濟坊則有桓彦範宅宣平坊則有李秀宅嚴綬宅羅珦宅鄭朗宅劉遵占宅修政坊則有張九齡宅常樂坊則有來濟宅張九臯宅和政公主宅郭敬之宅錢徽宅修徳坊則有李抱玉宅光行坊則有宇文經野宅魚朝恩宅興化坊則有封徳彜宅邠王守禮宅孟温禮宅懐真坊則有畢搆宅唐休景宅韋謙宅宣義坊則有張説别宅李逢吉宅豐安坊則有裴寛宅安樂坊則有李希烈宅布政坊則有魏知古宅蕭嵩宅竇􅞓宅舍利澄宅敦義坊則有李光弼宅大通坊則有竇連山宅安定坊則有第五守進宅休祥坊則有武三思宅永平坊則有宣城公主宅長安公主宅歸義坊則有蜀王秀宅普寧坊則有李勣宅韋機宅義寧坊則有戴至徳宅羣賢坊則有昭容上官氏宅懐徳坊則有李至道宅雖其事迹湮没然古人遺趾所托按其坊第皆可考而知也故悉附之李靖宅在三原縣宅有古碑斷缺又云自清涼原折而西乃唐李靖故居其地屬涇陽今從本傳韋端符觀李衛公故物記云二年冬端符於三原令坐中揖其羣官有客曰李彥芳是衛公之胄也其家傳賜書與他服器十餘物俱無恙賈志司竹監在盩厔縣東三十里穆天子傳曰天子西征至元池奏廣樂三日是曰樂池乃植之竹史記曰渭川千畝竹漢謂秦地有鄠杜竹林晉地道記司竹都尉治鄠縣其園周一百里以供國用唐置司竹監丞掌之隋義寧元年唐髙祖起兵其第三女平陽公主舉兵於司竹園號娘子軍長安志宋嘉祐中蘇軾至盩厔適冬月司竹監燒葦園都廵檢柴貽勗左藏以其徒㑹獵園下軾有詩明設司竹局以大使典之馬志新食堂在盩厔縣右遺趾不存栁子厚撰記云貞元十八年五月作新食堂於縣内之右始㑹食也馬志蘇尚書宅在富平縣𢎞化坊宅門獅腹鐫云明昌元年蘇仲蘇千明隆慶初耕者獲銀觴於宅隅名如獅腹賈志折衝府在蒲城縣唐建府有五曰相原孝徳温泉宣化懐仁按相原今之賢相鄉舊管勲貴里者又有崇徳善徳懐仁各鄉即孝徳宣化懐仁諸府由名也賈志伏龍府在澄城縣南五十里唐置兵之所太宗時太原王榮為伏龍府折衝賈志孫思邈宅今為僧寺在祋祤縣東五里流惠鄉惠政坊啟玉山長安志耀按宅在今州栁公權宅在耀州北四十里宅廢今名為栁家原宅旁有公權瘞筆塜賈志桑道茂宅在乾州道茂所居宅有二柏甚茂曰木盛則土衰土衰則人病乃埋鐵數千斤其下以制之今城西有道茂遺蹟並祠堂故址賈志古翰坊在乾州治中為陸宣公草詔之所後人因建坊乾州志韋應物宅應物長安人漁陽兵亂流落失職屏居武功相傳渭濵是其故宅應物有經武功故宅詩賈志杜甫草堂在鄜州南六十里杜甫避難寓此即三川也又州西北三十里羌村有杜窟壁上詩甚多延安府志幽陵都督府在神木縣城西九十里唐開元中置葭州志青碌局在興安州西一百五十歩碧鈿責碌諸洞凡二十餘處唐宋以來歳辦採至明始停閉改為預偹倉今廢賈志宋冦準宅新説曰府城掖庭街有冦萊公宅中有山池熙熙臺後為寺號安衆禪院中有萊公祠堂馬志种放宅新説曰府城街後有种太尉宅中有奎鈞慶賜之閣下東壁畫晉王羲之蘭亭圖西壁繪廬山逺公白蓮社圖馬志青蓮堂新説曰堂在省衙蓮池宋陳堯咨建今改為總庫馬志空翠堂在鄠縣西五里渼陂堤上其中有唐杜甫題渼陂歌石刻在焉馬志空翠堂取杜甫渼陂行絲管啁啾空翠來之句馮志在渼陂北岸宋知縣張伋撰記久而堂廢明嘉靖間御史方新使鄠令王瑋重造前有紫閣後有菱池氣象清幽松竹叢中水磨之聲不絶賈志避世堂在盩厔縣東南二十五里南溪上今廢宋蘇軾序云南溪之南竹林中新搆一茅堂予愛其所處最為深䆳故名避世堂有詩馬志冦萊公宅在下邽城内今普照寺相傳即其遺址賈志凌虚臺在鳳翔府東宋陳希亮知鳳翔時建判官蘇軾記在府治後堂壁名山記嘯歌堂在鳳縣宋建取黄庭堅嘯歌山川重之句為名賈志勸忠堂在興安州宋時建久廢明成化十五年州守鄭福搆堂積圖書植花卉𤓰蔬為退思宴賔之所今復廢馬志望輝堂在耀州東鑑山年豐則有光如鑑故登此堂以望之馬志堂在耀州署後宋皇祐中華原令楊庭見寳鑑山常有光如鑑乃築臺望之臺西即宋時州守園居故有樓亭池臺花竹之盛今盡蕪没惟雷簡夫園居詩二十二首石刻存賈志思政堂在乾州公署中宋時本州刺史鄭彥文建馬志眉壽堂在邠州西北隅宋范文正公建臨西湖湖上有古豳亭寰宇記公劉以農事開國邠風葵棗之化流浹至今鑿井耕田野無隋農嵗有髙廩為此春酒以介眉壽斯民熙熙然躋和氣之域因以名堂范仲淹睂壽堂記豳亭在雉堞之旁俯觀湖水波濤湧起舟楫往來一州之偉觀也邠州志金張中孚宅新説曰府城草塲街有金紫光禄大夫張中孚宅中有頤真堂後為錢監元為利用倉馬志衆樂堂新説曰衆樂堂在興慶池北金朝金紫光禄大夫張中孚建與賔客晏逰處今廢馬志流杯亭在衆樂堂後金太尉張金紫所搆砌石成風字様曲水流觴以為祓禊宴樂之所賈志元成徳堂新説曰長安府學成徳堂七門八椽髙敞雄壯元末已壊明宣徳中建為明倫堂馬志采芹堂在成徳堂後貯官書文籍馬志雙桂堂新説曰在京兆景風里至大甲申張浩然二子琚珪同榜及第長安令王公有題詩馬志趙氏鄉學在臨潼縣北櫟陽元季工部尚書趙諒建有太史歐陽𤣥所作碑馬志栁塘在鄠縣南山下元楊奐隠居教授其徒植栁千株有清風閣讀書堂馬志歸來堂在乾州元楊紫陽先生佚老之所州志元岳崧讀書院在橋頭河卧虎岡元延祐中三聘不起鄉人頌之曰隠姓埋名岳景山嘗讀書於橋頭河之卧虎岡與蕭㪺友善博學好古嘗著六經四書解自覺不及程朱遂毁之郃陽志明秦王府在西安府城中之左洪武初命長興侯耿炳文修洪武三年四月初七日封愍王之國於秦雍大記永興郡王府在秦府西南一里雍大記保安郡王府在秦府之西雍大記興平郡王府在秦府西南二里雍大記永壽郡王府在秦府西南二里有勅建書樓雍大記宜川郡王府在秦府西南三里小池坊雍大記臨潼郡王府在秦府國東城之外洪武中為蒲城郡主府第雍大記郃陽郡王府在秦府東南三里雍大記汧陽郡王府在秦府西北半里雍大記湭西草堂在渭南縣湭水西岸明知府南大吉敷教舊址賈志劉孝子故居在長武縣西南現里成化中旌表里名孝村其灘曰孝子灘長武志園林周靈囿文王囿也在長安西四十里跨今長安鄠縣之境雍勝畧周靈囿文王囿也詩曰王在靈囿麀鹿攸伏毛萇注曰囿所以域養禽獸也天子百里諸侯四十里靈者言文王之有靈徳靈囿言道行於苑囿也孟子曰文王之囿方七十里芻蕘者往焉雉兔者往焉與民同其利也文王靈囿在長安西南四十二里三輔黄圖靈臺在京兆鄠縣周之故臺今鄠縣東五里有酆宮又東二十五里有靈囿囿中有臺左傳注周靈臺在長安西北四十里臺髙二丈周囬百二十歩三輔黄圖靈沼在長安西三十里三輔黄圖王在靈沼於牣魚躍詩經大雅有按朱子集註云臺下有囿囿中沼則臺沼並在靈囿中也秦獸圏列士傳云秦王召魏公子無忌不行於是朱亥奉璧一雙詣秦王王怒使置亥獸圏中亥瞋目視獸皆血濺於獸面獸不敢動名山記漢上林苑即秦之舊苑也其故基跨今盩厔鄠長安咸寜藍田五縣之境雍勝畧蕭相國請曰上林中多空地願令民得田苑中史記武帝微行以為道逺勞苦又為百姓所患乃使大中大夫吾丘壽王與待詔能用算者舉籍阿城以南盩厔以東宜春以西提封頃畝及其價值屬之南山以為上林苑東方朔諫秦起阿房而天下亂因陳泰階六符之事上乃拜大中大夫卒起上林苑故相如請為天子遊獵之賦稱烏有先生亡是公而奏上林也水經注上林苑中廣長三百里苑中養百獸天子春秋射獵苑中取獸無數其中離宫七十所容千乗萬騎漢舊儀西都則有上林禁苑林麓藪澤陂池連乎蜀漢繚以周墻四百餘里離宫别館三十六所神池靈沼往往而在西都賦上林苑門十二中有苑三十六宫十二觀二十五闗中記初修上林苑羣臣逺方各獻名果異卉三千餘種其中亦有制為美名以標竒麗也西京雜記秦之上林其邉際所抵難以詳究水經於宜春觀曰此秦上林故地也史記載上林所起曰作朝宫渭南上林苑中先作阿房前殿則宜春觀阿房宫皆秦苑故地也武帝尚以秦苑為狹命吾丘壽王舉籍阿城以南盩厔以東宜春以西悉除為苑則所拓比秦益大矣以漢唐郡縣言之則盩厔一縣不盡入苑而鄠杜兩縣悉歸包并矣其曰舉籍阿城以南而阿城之北則不在數是其疆境至渭水南岸而極也至揚雄則曰武帝廣開上林南至宜春鼎湖御宿昆吾長楊五柞並南山北繞黄山瀕渭而東則苑境不止限乎渭南矣葢謂踰渭而北又向東皆為苑地也此雄之誤也渭北有苑百八十里西向而入扶風周回五百餘里此則渭北之苑也以舊儀黄圖考之自名甘泉苑不名上林苑也當時揚雄但見夫渭南北皆有苑矣而渭北之苑又復有宫如黄山宫之𩔖故誤言之耳東方朔傳壽王所載截自阿城以南元不跨渭此最疆界之可証也張衡賦西京上林曰繞黄山而欵牛首牛首可欵矣而黄山可繞乃據行幸言之非上林位置也雍録承華殿七月七日上林承華殿齋正中忽有一青鳥從西北方來甫頃王母至漢武故事鳳皇殿宣帝神爵四年鳳皇集上林廼作鳳皇殿以答嘉瑞長安志平樂館武帝元封六年夏京師民觀角抵於上林平樂館漢書武帝本紀平樂館大作樂處西京賦注繭館師古曰漢宫閣疏云上林苑有繭館葢蠶繭之所也漢書元后傳注上蘭館師古曰上蘭館名也在上林中漢書元后傳注涿沐館宣帝許美人居上林涿沐館數召入飾室中若舍長安志磃氏館上求神君舍之上林中磃氏館漢書郊祀志如淳曰磃音蹄鄭氏曰音斯郊祀志注鹿館外戚傳成帝許美人在上林鹿館數召入飾室長安志新臺上林賦曰登新臺在豐水西北近渭今鄠縣也長安志清臺漢志曰武帝造太初厯即上林清臺課候則清臺在上林苑中矣黄圖曰漢靈臺在長安西北八里漢始曰清臺後更名曰靈臺郭延生述征記曰長安宫南有靈臺者髙十五仞上有張衡所制渾儀相風銅烏又有銅表題云太初四年造吕圖曰漢舊城外有靈臺北與未央宫對水經亦曰城南漕渠有漢靈臺故延生書其所見亦曰在宫之南也然則漢世城西之上林城南之漕渠皆有候景之臺也或曰清臺或曰靈臺名稱不一耳然銅表之立既在太初即是武帝定厯之初矣至銅渾儀則云張衡所造衡所造地動儀在漢順帝陽嘉四年其時帝都不在長安或者衡儀已成亦分置長安候臺耶雍録蠶室咸宣怒其吏成信信亡藏上林中宣使郿令將吏卒䦨入上林中蠶室門長安志延壽門平帝迎王皇后自上林延壽門入未央宫前殿長安志昆明池在長安縣西南三十里豐邑鄉鸛鵲莊雍勝畧昆眀池漢武帝元狩四年穿圖曰上林苑有昆眀池三輔皇圖越欲與漢用船戰遂乃大修昆眀池列觀環之治樓船高十餘丈旗幟加其上甚壯史記平準書昆眀池漢武習水戰也中有靈沼神池云堯時理水訖停舟於此葢堯時已有汙池漢代因而廣深耳闗中記武帝作昆明池欲伐昆吾教習水戰因而於上遊戲養魚給諸陵廟祭祀池周囬四十里西京雜記昆明池葢三百二十五頃池中有豫章臺及石鯨刻石為鯨魚長三丈毎至雷雨常鳴吼鬛尾皆動立石牽牛織女於池之東西以象天漢三輔故事武帝欲通西域為昆明所閉隔聞昆明有滇池方三百里鑿此池習水戰期以伐之中有樓船上建樓櫓又有戈船上施戈矛四角悉垂幡眊旍葆麾葢照觸涯涘其始鑿也固以習戰久之乃為遊玩之地耳三輔故事曰池周三百二十頃長安志曰今為民田夫既可為民田則原非有水之地矣然則漢時於何取水也長安志引水經曰交水西至石堨武帝穿昆明池所造有石闥堰在縣西南三十二里則昆明之周三百餘頃者用此堰水也雍録豫章觀武帝造在昆明池中亦曰昆明觀葢武帝所置桓譚新論云元帝被疾過求方士漢中送道士王仲都詔問所能曰能忍寒乃以隆冬盛寒日令袒載駟馬於上林昆明池上環以氷而御侍者厚衣狐裘寒戰而仲都無變色卧於池上曛然自若即此觀也三輔黄圖昆明池中有龍首船常令宫女泛舟池中張鳳葢建華旗作櫂歌雜以鼓吹帝御豫章觀臨觀焉三輔故事昆靈池上林有昆靈池初學記漢武帝始穿昆靈之池泛翔禽之舟帝自造歌曲使女伶歌之時日已西傾涼風激水女伶歌聲甚遒因賦落葉哀蟬之曲帝息於延涼室夢李夫人授以蘅蕪之香帝驚起而香氣猶著衣冠遂改延涼室為遺芳夢室拾遺記百子池上林有百子池初學記戚夫人侍兒賈佩蘭後出為扶風段儒妻説在宫内時七月七日臨百子池作于闐樂樂闋以五采縷相覊謂之相連愛三輔黄圖積草池上林苑有積草池池中有珊瑚樹髙一丈二尺一本三柯上有四百六十二條南越王趙佗所獻號為烽火樹至夜景常煥然三輔黄圖蒯池上林苑蒯池生蒯草以織席漢武故事牛首池濯鷁牛首上林賦張楫曰牛首池名也在上林苑西頭師古曰濯者所以刺舟也鷁即鷁首之舟也上林賦注野韭澤即漢牛首池地在内苑西豐水西北寰宇記西陂池三輔黄圖曰長安有西陂池東陂池郎池皆在上林苑中雍大記飛亷觀在上林苑武帝元封二年作飛亷神禽能致風氣者身似鹿頭如雀有角而蛇尾文如豹武帝命以銅鑄置觀上因以為名班固漢武帝故事曰公孫卿言仙人好樓居於是上於長安作飛亷觀髙四十丈三輔黄圖楊禄觀柘觀班媫妤生子楊禄觀柘觀師古曰二觀並在上林中長安志雲林館包陽館犬臺館當路館鼎郊觀朗池觀博望觀樛木觀便門觀元華觀益樂觀華元觀明光觀以上並在上林苑中見三輔黄圖博望苑武帝為戾太子立博望苑使通賔客苑在漢長安城外漕渠之北至唐則為長安縣北五里此特招致賔客之所耳太子之奔湖也斫覆盎城門而出覆盎門者漢城南面東頭第一門也苑在門外而太子斫門以出則知博望非常居之地也此苑至成帝始撤去雍録御宿苑在長安城南御宿川中漢武帝為離宫别館禁御人不得入往來遊觀止宿其中故曰御宿三秦記云御宿苑出栗十五枚一勝大梨如五勝落地則破其取梨先以布囊承之號曰含消此園梨也三輔黄圖宜春下苑在京城東南隅三輔黄圖宜春之名漢史凡三出有曰宜春苑者地屬下杜有曰宜春宫者即下杜苑中宫也有曰宜春觀者則在鄠縣雖三其名而實止兩地也東方朔傳曰武帝東遊宜春師古曰宜春在長安城東南又曰杜縣東即唐曲江也又曰宜春近下杜史記秦紀曰子嬰𦵏二世杜南宜春苑司馬相如從武帝至長楊獵還過宜春奏賦以哀二世其賦曰臨曲江之隑州望南山之參差末云弔二世持身之不謹兮墓蕪穢而不修也合數者言之則二世之所𦵏相如之所賦漢之曲州唐之曲江皆此下杜之宜春也其苑若宮皆秦創而漢唐因之也至於宜春觀者則在長安之西鄠縣澇渼二水之旁上林故地也説者誤以下杜之宫為鄠縣之觀則失之矣故師古於東方朔傳明辨之曰在鄠縣者自是宜春觀耳在長安城西豈得言東遊其説極為允篤貢禹傳元帝用禹言罷宜春下苑以假貧民此則下杜之苑矣故揚雄傳曰雖頗割其三垂以贍貧民者即指元帝所罷之苑也既曰下苑則必别有上苑矣頗割三垂則彼之一垂尚包苑中也耶雍録樂遊苑樂遊原上有樂遊苑一曰樂遊園去咸寜縣南八里雍勝畧宣帝神爵二年春起樂遊苑漢書宣帝本紀師古曰三輔黄圖云在杜陵西北又闗中記云宣帝立廟於曲江之北號樂遊按其處則今之所呼樂遊廟者是也葢本為樂遊苑後因立廟宣帝本紀注宣帝樂遊廟亦名樂遊原亦名樂遊苑地基最髙四望寛敞西京雜記黄山苑雲當朝請數稱病私出多從賔客張圍獵黄山苑中漢書霍光傳袁廣漢園茂陵富人袁廣漢藏鏹巨萬家僮九百人於北邙巖築園東西四里南北三里激流注其内構石為山髙十餘丈連延數里養白鸚鵡紫鴛鴦旄牛青兕廣漢後有罪誅没入官為園鳥獸草木皆徙入上林苑西京雜記即按北邙巖在今興平始平原也御羞苑漢書武帝元鼎二年初置水衡都尉掌上林苑有五丞屬官有御羞苑禁圃令丞如淳曰御羞地名在藍田其土肥沃多出御物可進者師古以為即御宿川非是賈志甘泉苑在淳化縣北車盤嶺賈志武帝置縁山谷行至雲陽三百八十一里西入扶風凡周回五百四十里苑中起宫殿臺閣百餘所有仙人觀石闕觀鳷鵲觀三輔黄圖梨園即今淳化縣城賈志車箱坂下有梨園漢武帝築大一頃樹數百株青翠繁宻望之如車葢雲陽宫記昭祥苑在甘泉宫西周囬十里萬國獻異物皆集此中洞冥記西郊苑漢西郊有苑囿林麓藪澤連亘繚以周垣四百餘里三輔黄圖思賢苑西京雜記曰文帝為太子立思賢苑不知苑屬何地雍録文帝為太子立思賢苑以招賔客中有堂隍六所客館皆廣廡髙軒屏風幃褥甚麗博物志魏顔斐菜園斐字文林為京兆守於府下起菜園使吏簡㧞鋤治也魏志晉逍遥園姚興常於逍遥園引諸沙門聴番僧鳩摩羅什演講佛經起逍遥宫殿庭左右有樓閣髙百尺相去四十丈以麻繩大一圍兩頭各絟樓上㑹日令二人各從繩上行過以為佛神相遇長安志澄元堂在逍遥園中鳩摩羅什演經所長安志周華林園庾子山有華林園馬射賦徐樹榖曰周明帝紀武成二年三月㑹羣公列將卿大夫及突厥使者於芳林園賜錢帛各有差園在長安明矣賦稱嵗次昭陽繫辛巳年乃武帝保定元年葢武帝初即位踵行故事而史偶失書耳按魏志云芳林園避少帝諱改曰華林園是則鄴下先有芳林園後周無諱當避而此賦亦改芳為華未詳何故庾子山集仙人藥園在漢隂縣南二十五里周地圖云龍子山叠嶂凡十一層上有仙人藥園賈志隋大興苑開皇元年置長安志在宮城之北即唐禁苑也賈志芙蓉園本古曲江文帝惡其名曲改名芙蓉園為其水盛而芙蓉富也劉餗小説芙蓉在京城東南隅有青林重複縁城瀰漫葢帝城勝境駕時幸之景龍文館記隋營京城宇文愷以京城東南隅地髙故闕此地不為居人坊巷鑿之為池以厭勝之又㑹黄渠水自城外南來可以穿城而入故隋世遂從城外抱之入城為芙蓉池且為芙蓉園也雍録西苑隋煬帝大業元年築西苑周三百里其内為海周十餘里為方丈蓬萊瀛洲諸山髙出水百餘尺臺觀宫殿羅絡山上向背如神海北有龍鱗渠縈紆注海内縁渠十六院門皆臨渠毎院以四品夫人主之堂殿樓觀窮極華麗宫樹秋冬彫落則剪綵為華葉綴於枝條色渝則易以新者常如陽春沼内亦剪綵為荷枝菱茨乗輿遊幸則去氷而布之十六院競以殽羞精麗相尚求市恩寵上好以宫女月夜數千騎遊西苑作清夜遊曲於馬上奏之緒世説西苑池在長安城中雍大記唐禁苑在宫城之北東西二十七里南北三十三里東接㶚水西臨長安故城南連京城北枕渭水苑西即太倉北距中渭橋與長安故城相接東西十三里南北十三里亦𨽻苑中苑中四面皆有監南面太樂監北面舊宅監東監西監分掌宫中植種及修葺園囿等事又置苑總監領之皆𨽻司農寺苑中宫亭凡二十四所南面三門中曰景曜東曰芳林西曰光化東面二門南曰光泰北曰昭逺西面二門南曰延秋北曰𤣥武北面三門中曰啟運東曰飲馬西曰永泰長安志雍録曰唐大内有三苑西内苑東内苑禁苑皆在兩宫北而有分别西内苑並西内太極宫之北東内苑則包大明宫東北兩面兩内苑北門之外始為禁苑之南門按程大昌云兩内苑北門之外始為禁苑南門非也考長安志則禁苑者其總名而内苑則在禁苑中如京城之中有宮城故云苑北啟運門南有内苑是在禁苑景曜門北啟運門南也東内苑後置故加東字以别之又大昌云大明宫基取禁苑中射殿地為之則東苑雖在大明宫東而實總屬禁苑中也故長安志叙禁苑云東接㶚水西接長安故城内苑東内苑相比而列於禁苑中是又不可分稱三苑也雍勝畧内苑啟運門之南有内苑北曰重元門東曰東雲龍門西曰西雲龍門自𤣥武門北至重元門一里東西與宫城齊長安志南望春亭北望春亭在禁苑東南髙原之上舊志多云望春宫其東正臨滻水也天寳元年韋堅因古迹堰渭水絶滻㶚為潭東注永豐倉下以便漕運名廣運潭未幾滻㶚二水沙泥衝壅潭不可漕付司農掌之為捕魚之所雍録魚藻池深一丈在禁苑中貞元十三年詔更淘四尺引㶚河天濠水漲之在魚藻宫後穆宗以觀競渡雍大記王建宫詞云魚藻宫中鎻翠蛾先皇行處不曽過而今池底休鋪錦菱角鷄頭積漸多先皇徳宗也池底張錦引水被之令其光豔透見也徳宗亦已奢矣雍録蠶壇亭在苑之東皇后祈先蠶之所長安志青門亭去宫城十三里在長安故城之東即邵平種𤓰之所長安志櫻桃園在禁苑之南又有東西葡萄園賈志臨渭亭禁苑内苑有臨渭亭長安志景龍四年四月甲寅幸臨渭亭修禊飲舊唐書中宗本紀桃園亭去宫城四里𨽻舊宅監所領長安志咸宜宫未央宫禁苑内苑有咸宜宫未央宫二所皆漢之舊宫也去宫城二十一里唐置都邑之後因其舊址復增修之宫側有未央池漢武庫及樗里子墓武宗㑹昌元年因遊畋至未央宫見其遺址詔葺之尚有殿舍二百四十九間作正殿曰通光殿東曰詔芳亭西曰凝思亭立端門命翰林學士裴素撰記𨽻舊宅監所領長安志梨園在光化門北光化門禁苑南面西頭第一門在芳林景曜門之西也中宗令學士自芳林門入集於梨園分朋拔河則梨園在太極宫西禁苑之内矣開元二年置教坊於蓬萊宫上自教法曲謂之梨園弟子至天寳中即東宫宜春北苑命宫女數百人為梨園弟子是梨園者按樂之地預教者名為弟子凡蓬萊宫宜春苑皆不在梨園之内也長安志曰文宗幸北軍因幸梨園又令太常卿王涯取開元雅樂選樂童按之名曰雲韶樂樂成獻諸梨園亭帝按之㑹昌殿此㑹昌殿即在梨園中矣唐末芳林十哲即自此門入交中官故十人者冠戴芳林名號如鴻都賦徒也雍録南昌國亭北昌國亭流杯亭在未央宫北漢之舊址𨽻舊宅監所領長安志坡頭亭栁園亭月坡毬塲亭子青城橋新鱗橋栖雲橋凝碧橋上陽橋正興亭元沼亭神臯亭七架亭明水園以上皆内苑所有見長安志東内苑南北二里與大明宫城齊東西盡一坊之地南即延政門北即銀臺門東即太和門長安志龍首池東内苑有龍首池長安志元和十三年三月浚龍首池㑹要𤣥宗先天二年三月甲戌帝以旱親往龍首池祈禱有赤蛇自池而出雲霧四布應時雨實録靈符應聖院在龍首池東長安志凝碧池在東内苑雍大記禄山亂逆徒張樂於此樂工雷海青不勝憤擲樂器慟哭王維䧟賊被拘僧寺聞之為詩曰萬户傷心生野煙百官何日再朝天秋槐落葉深宫裏凝碧池頭奏管絃雍録永寜園在永寜坊賜禄山永寜園為邸又賜永穆公主化觀為游燕地長安志奉誠園司徒兼侍中馬燧宅在安邑里燧子少府監暢燧貲甲天下暢亦善殖財貞元末神䇿尉楊志䖍諷使納田産遂獻舊第為奉誠園長安志裴向竹園在新昌坊元和中宰相武元衡遇害或告匿於新昌坊向之竹林者長安志度支亭子在永達坊輦下嵗時記新進士牡丹宴在永達亭子長安志家令寺園在昌明坊貞觀中日南王入朝詔於此營第尋還國宅遂廢復為園長安志馬璘池亭在崇賢坊璘卒池亭入官貞元後羣臣多賜宴於此長安志郭子儀園在大安坊後為岐陽公主别館長安志曲江池去咸寜縣南一十里本秦隑州漢之宜春下苑也雍勝畧曲江池其水曲折有似廣陵之江故名之寰宇記朱雀街東第五街皇城之東第三街昇道坊龍華尼寺南有流水屈曲謂之曲江西京記曲江開元中疏鑿遂為勝境其南有紫雲樓芙蓉園其西有杏園慈恩寺花卉環周煙水明媚都人遊玩盛於中和上已之節綵幄翠幬匝於堤岸鮮車健馬比肩擊轂上已賜宴臣僚京兆府大陳筵席長安萬年兩縣以雄勝相較錦繡珍玩無所不施百辟㑹於山亭恩賜太常及教坊聲樂池中備綵舟數隻唯宰相三使北省官與翰林學士登焉傾動皇州以為盛觀入夏則菰蒲蔥翠栁隂四合碧波紅蕖湛然可愛好事者賞芳辰翫清景聮騎擕觴亹亹不絶劇談録曲江宴唐初設以慰下第舉人其後弛廢而進士㑹同年於此開元時造紫雲樓於江邉至期上率宫嬪垂簾觀焉命公卿士庶人酺各擕妾妓以往倡優緇黄無不畢集先期設幕江邉是日商賈皆以竒貨麗物陳列豪客園戸争以名花布道進士乗馬盛服鮮制子弟僕從隨後率務華侈都雅推同年俊少者為探花使有匿花於家者罰之開元天寳間旁有殿宇安史亂後盡圯廢文宗覽杜甫詩云江頭宫殿鎻千門細栁新蒲為誰緑因建紫雲樓落霞亭嵗時賜宴又詔百司於兩岸建亭館春明退朝録曲江亭在府城東曲江池西南名山記杏園曲江池西即杏園玉海大中元年正月勅進士放榜後杏園依舊宴集㑹要韋曲在咸寜縣南二十里樊川唐韋安石别業林石花亭號為勝地雍勝畧韋曲花無賴家家惱殺人杜甫詩杜曲在啟夏門外向西少陵原也杜甫詩曰杜曲花光濃似酒雍録杜曲去咸寜縣南三十里樊川韋曲東十里有南杜北杜杜固謂之南杜杜曲謂之北杜按二曲名勝之地韋杜二家歴代顯宦故唐人語曰城南韋杜去天尺五雍勝畧唐岐公佑郊居山水形勝草木花塢為極勝佑以太保致仕與昆仲時賢遊縱其間賈志九曲池在長安城西興慶池西唐寜王山池院引興慶水西流疏鑿屈曲連環為九曲池上築土為基疊石為山植松栢有落猿岩栖龍岫竒石異木珍禽怪獸畢有又有鶴州仙渚殿宇相連左滄浪右臨王與宫人賔客宴飲弋釣其中雍大記定昆池本安樂公主西莊也在京城延平門外景龍初命司農卿趙履溫為公主疏園植果中列臺榭憑空架廻棟宇相屬又勅將作監少監楊務亷引水作沼延十數里時號定昆池通典曰安樂公主恃寵請昆明池中宗不與公主怒自以家財别穿地號曰定昆景龍中中宗幸焉雍大記何將軍山林今謂之塔坡少陵原乃樊川之北原自司馬村起至此而盡其髙三百尺在杜城之東韋曲之西山林久廢上有寺浮圖亦廢俗呼為塔坡唐杜甫題何將軍山林有詩馬志逍遥公别業韋嗣立東山之側有别業焉上聞而賞之乃命千官飲乎池上即席拜逍遥公名其居曰清虚原幽棲谷張説東山記韋嗣立搆别廬於驪山鳳皇原鸚鵡谷有重崖洞壑飛瀑水中宗臨幸改為清虚原幽棲谷拜嗣立為逍遥公唐紀王維别墅在輞川地竒勝有華子崗欹湖竹里館栁浪茱茰沜辛夷塢與裴廸游其中賦詩相酬對白孔六帖輞川在藍田縣西南二十里王維别墅在焉本宋之問别圃也雍録聚逺樓之東有廡廡南有樓臺遶以朱欄植玉蘭環之題曰木蘭柴小輞川記大興湯院藍田西南有地雪落即融唐時有異僧見之曰必溫泉也已而掘之果然凡病者浴之輒愈後有白魚之瑞神女屢降立玉女堂於泉側明皇賜名大興湯院潛確類書鳳翔府園有古槐一株故老云昭宗扶此樹令朱全忠結襪四顧無應者故至今謂手托槐云聞見後録李茂貞園在鳳翔府城東北五里唐光啟中茂貞節度鳳翔時建修竹萬竿内有竹閣旁引水灌入深林蘇軾詩云朝逰北城東囬首見修竹下有朱門家破墻圍古屋賈志宋白氏莊宋朝奉郎白序之莊中有八題曰揮金堂順牛堂疑夢室醉吟菴翠屏閣林泉亭辛夷亭嵓桂亭當時名公來逰皆有題詠白序字聖均自言白侍郎後金朝為石氏園亭疏泉為方池曲檻有四銀亭八銀亭至大七年趙尚書過逰有詩後為故中書陜西四川宣撫使襄山楊忠肅公祠有碑存焉馬志姚氏山亭宋嘉祐中蘇軾自仙逰潭囬至黑水見居民姚氏山亭絶髙可愛復憩其上賦詩馬志御花園在渭南縣花園村舊志謂宋太后所置周處廟碑隂云曹皇后庄賈志飛盖園在延安府南宋龎籍遊樂處賈志元胡相别墅在樊川元中書丞胡恭範年老致仕於杜曲植梅竹引泉鑿池葺治賔館亭臺以為幽棲之所左圖右書日與士夫宴飲為終焉之計命工繪樊川歸隠圖翰林待制孟攀鱗為序諸公皆題詩馬志亷相泉園元至元中平章亷希憲行省陜右愛秦中山水遂於樊川杜曲林泉佳處葺治㕔館亭榭導泉灌園移植漢沔東洛竒花異卉畦分碁布松檜梅竹羅列成行暇日同姚雪齋許魯齋楊紫陽商左山前進士邳大用來明之郭周卿張君美樽酒論文彈琴煮茗雅歌投壺燕樂於此教授李庭之為記征西參軍畸亭陳還題詩馮志趙氏别墅元至元甲子宣撫趙公於樊川楊坡就崗原爽塏𦵏考妣樹楸竹前建先廟䜿豐碑修葺園亭導水灌園以為别墅因而家焉自號樊川釣叟中有安適堂歸潜洞趙公泉馬志牡丹園在安化門西杜城北五里元河東北路行省郎中并人李煥卿子信之所葺也信之不喜仕進日渉經史葺園治田樹藝為事園植牡丹三四百株他花稱是亭臺旁午毎花時逰者車馬闐咽馬志玉泉園在澄城縣西北五十里老樹偃仰怪石巉岩其泉濵涯而出瑩潔如玉雖隆冬水芹夾岸泉下乂有蔬園藥畦引流灌溉元西臺御史潘汝劼有詩賈志明最樂園在長安縣西北隅秦藩築此為遊宴之所中有臺池花榭選勝行樂非貴客騷人不得遊賞名曰最樂賈志西園在三原縣西北二里有草亭後樂亭三愛圃涵碧池明王端毅公所營賈志三愛圃在王端毅公後樂苑中公有三愛圃説謂淵明愛菊茂叔愛蓮李唐人愛牡丹已則兼愛蓮菊亦嘗居富貴之地於牡丹亦愛之而不嫌云馬志瀑園明司空南居益建亭池臺榭竹木花卉盡泉原之勝賈志斑竹園在盩厔縣東二十里周數頃餘隷秦府内植斑竹其大如椽其宻如簀馬志郊坰上古華胥渚在藍田縣北三十五里伏羲氏母居也今有陵及華胥溝華胥􅘸枯棗樹毓聖橋俱存西安府志補天臺在藍田縣東五里許俗傳女媧煉石補之女媧亦華氏所生西安府志流金泊在涇陽縣北五十里黄帝鑄鼎處帝王世紀云黄帝鑄鼎於荆山鼎成崩於荆山之陽按閿鄉有鼎湖驛亦傳為黄帝崩處然此地陽為鼎州其南為湖縣西為冶谷及仙里仙發諸村則鼎成仙去之迹甚著况明庭橋陵去此最近當以世紀為定賈志軒轅柏在中部縣軒轅廟考之雜記乃黄帝手植物圍二丈四尺髙可凌霄延安府志掛甲柏在中部縣軒轅廟黄帝滅蚩尤歸而掛甲其上至今樹皮有掛甲痕柏液中出似有斷釘在内老幹細枝痕迹若一延安府志造書臺長安縣西三十里三㑹寺中有臺即倉頡造書處雍勝畧唐西明寺道律師逐静在京師城南故静業寺修道忽有一人來至律師所致敬申禮律師問今西京髙四土臺俗云是倉頡造書臺如何云𨽻書字古時已有答曰倉頡於此臺上増土造臺觀鳥跡者非無其事又有天人姓陸名元暢來謁律師云所問髙四土臺者本迦葉佛於此第三㑹説法度人至穆王時文殊目連來化穆王從之即列子所謂化人者是也化人示穆王云髙四臺是迦葉佛説法處因造三㑹道塲至秦穆公時扶風獲一石佛穆公棄馬坊中穢汚此象公遊上帝極被責疏覺大怖乂欲造佛像於髙四臺南村内得一老人姓王名安年百八十自云曽於三㑹道塲見人造之臣老無力能作所住村北有兄弟四人曽於道塲内為諸匠執作請追共造依言作之成一銅像公悦大賞賚之彼人得財並造功徳於土臺上造重閣髙三百尺人號髙四臺或曰髙四樓法苑珠林史官村在白水縣東北彭衙東二十里村西有利鄉亭今名史官村史記倉頡居陽武𦵏衙之利鄉亭南即此同州志履跡坪在邠州城南門外相傳為姜嫄出祀郊禖履巨人跡於此雍勝畧隘巷在邠州治南相傳生后稷之所詩曰誕置之隘巷牛羊腓字之即此雍勝畧狼乳溝在邠州南俗傳即平林寒泉之地邠州志在州東三十里即棄后稷狼乳處雍勝畧唐虞媯墟在興安州之梁州故城虞舜嘗居之謂之媯墟帝王世紀謂之姚墟史記曰舜冀州人生姚墟居媯汭正義曰按媯州亦冀州城即今畧陽縣漢志畧陽道屬天水郡十三州志曰畧陽即古冀城也雍勝畧石紐村石泉縣石紐村大禹生此石穴杳深人跡不到近世掘地得古碑有禹穴二字乃李白所書乃知會稽禹穴之誤書蕉洵按雍勝畧禹穴在陽縣與此異斄亭在郿縣境雍勝畧后稷封斄斄讀如邰或曰鳳翔府郿縣有台亭漢書郊祀志注邰在漆縣其民有㑹日以相與夜中市如不為則有災咎新論王忳字少林除郿縣令到官至斄亭長曰亭有鬼數殺過客不可宿也忳曰仁勝凶邪徳除不祥何鬼之避即入亭止宿夜中聞女子稱寃之聲忳曰有何枉狀可前求理乎女子曰無衣不敢進忳便投衣與之女子乃前訴曰妾夫為涪令之官過宿此亭亭長無狀枉殺妾家十餘口埋在樓下悉盗取財貨忳問亭長姓名女子曰即今門下游徼者也忳曰汝何故數殺過客對曰妾不得白日自訴毎夜陳寃客輒眠不見應不勝感恚故殺之忳曰當為汝理此寃勿復害良善也因解衣於地忽然不見旦召游徼詰問具服罪即狀繫及同謀十餘人悉伏辜遣吏送其䘮歸鄉里於是亭遂清安後漢書王忳傳夏三過村在鄠縣北二十里按地輿志鄠古崇國也連山易云顓頊五代孫鯀封於崇史記鯀治水功用不成舜殛於羽山舉禹以代禹痛父㒺功八年間三過其門不入今三過村舊傳即其處也鄠縣志甘亭在鄠縣西南五里緒漢書在甘水之東長水鄉長安志馬融曰甘有扈氏南郊地名索隠曰夏啟所伐鄠南有甘亭史記夏本紀注邠亭公劉徙居邠今邠州東北有豳亭春秋王朝興廢説商亳亭徐廣曰京兆杜縣有亳亭史記六國表注有莘野在郃陽縣東四十里夏陽村孟子謂伊尹耕於有莘之野即此雍勝畧古公城在邠州南山上與今州城相連雍勝畧官家洞在三水縣東二十里中領之下即古公時之陶復陶穴者陶復則土而陶穴則石也峭壁危崖不可攀躋元西臺御史僧格實哩守官家洞明徐達遣兵逼之勢窮不屈與妻俱投崖下死焉三水志周雨金原周成王時咸陽雨金今咸陽有雨金原𫐠異記杜郵亭在咸陽縣西南三十八里白起自刎處雍勝畧杜郵亭今名孝里亭中有白起祠水經注幽王城一名幽王壘在臨潼縣東南戲水上城髙八尺周二百八十歩國語曰幽王滅於戲蘇林曰戲邑名也在新豐縣東南三十里戲亭是也長安志烽火樓在驪山上第一峰雍勝畧褒姒不好笑幽王欲其笑舉烽火諸侯至而無寇乃大笑幽王説之為數舉烽火其後諸侯不信犬戎攻幽王徵兵莫至遂殺幽王驪山下史記周本紀狗枷堡在藍田西五十里賈志白鹿原上有狗枷堡秦襄公時有天狗來下其上有賊天狗吠而䕶之故一堡無懼心辛氏三秦記焦澤玁狁匪茹整居焦詩經大雅焦亦名瓠口亦名瓠中在雍州涇陽縣城北數十里括地志爾雅十藪周有焦郭璞以為池陽瓠口是也雍勝畧説經臺在盩厔縣樓觀南有臺老子於此説道徳經授尹喜又曰昇天臺臺上有再生柏世傳老子説經於此見二柏枯以針炙之復生今尚鬰茂人以為靈異賈志直市城在富平縣西南二十五里秦文公造物無二價故以直市為名三輔黄圖雨金堡在富平縣東南三十里周八百歩東有雨金堡史記秦獻公十六年雨金櫟陽後因名堡按其地古櫟陽界也長安志穆公城在富平縣南三十里南面西面崇一丈五尺東北面無墻長安志石鼔在鳳翔縣南二十里之石鼓原賈志石鼓文在鳳翔府天興縣南石形如鼓其數盈十葢記周宣王田獵之事即史籀之迹也貞觀中吏部侍郎蘇勗紀其事云虞褚歐陽共稱古妙雖嵗久訛缺遺迹尚有可觀元和志今在北京國子監雍勝畧授經臺在鳳翔縣南本終南山峯尹喜既見老子授五千言喜退而書之曰道徳經後嘗居此雍勝畧野人塢在鳳翔府城南秦穆公失善馬野人得而食之者三百人吏捕得欲法之公曰吾聞食善馬肉不飲酒傷人皆賜之酒其後秦伐晉三百人皆求從報徳遂脱穆公於難名山記鳳臺在鳳翔府城南十五里賈志雍有鳳臺秦穆公時有簫史者善吹簫能致白鵠孔雀穆公女弄玉好之公為作鳳臺以居之積數十年一旦隨鳳去云雍宫世有簫管之聲焉今臺傾祠毁之不復然矣水經注召公亭在岐山縣西八里召公村公采邑在此故後人建亭雍勝畧雍水東逕召亭南召康公之采邑也水經注周城在岐山縣西北十五里亦曰周公邸邸内有泉時平則流亂則竭號潤徳泉賈志岐水之南有周城周城者周公采邑也水經注磻溪釣石即釣臺在寳雞縣東南磻溪谷中溪邉其石下細上鉅俯臨溪中故老相傳為太公釣魚處有兩膝所着跡按太公釣魚臺有三在河南新安城東者一石也今去水數丈許矣在陜西者二一在咸陽城西土屹然不崩一在寳雞磻溪谷中石也豈太公避紂而來初釣新安繼而釣咸陽後則釣於磻溪與其遇文王者磻溪也馬志雉城秦文公時有湯伯者逢兩童子化為雙雉西飛至陳倉其雌東飛止於此故名潜確類書平陽亭在郿縣西北賈志史記秦寜公徙平陽徐廣曰故郿之平陽亭水經注白起城在郿縣東北十五里秦白起家居所築今遺址存雍勝畧弦蒲雍州其澤藪曰弦蒲周禮在隴州西四十里按晉地志汧縣有蒲谷鄉弦中谷即此雍勝畧扁鵲城在城固縣西南四十里相傳扁鵲常居此雍勝畧白公城在洋縣境秦白起守漢中築此城以控制蠻獠雍勝畧子貢遇丈人處在漢隂縣境雍勝畧子貢南遊於楚過漢隂見一丈人方將為圃畦鑿隧而入井抱甕而出灌搰搰然用力甚多而見功寡子貢曰有械於此一日浸百畦用力甚寡而見功多夫子不欲乎為圃者仰而視之曰奈何曰鑿木為械後重前輕絜水若抽數如沃湯其名為橰為圃者忿然作色而笑曰吾聞之吾師有機械者必有機事有機事者必有機心機心存於胷中則純白不偹純白不偹則神生不定道之所不載也吾非不知羞而不為也荘子蒼野聚在商州南一百四十里左傳昭四年楚左師軍於蒼野杜預注曰在商縣南商州志商宻楚鬪克屈禦冦以申息之師戍商宻秦人過析隈入而係輿人以圍商宻昏而傳焉宵坎血加書偽與子儀子邉盟者商宻人懼曰秦取析矣戍人反矣乃降秦師左傳商宻今南鄉丹水縣杜預注子夏讀書石室在飛浮山禮記云退老西河之上即此郃陽志索隠曰劉氏云今同州河西縣有子夏石室學堂史記仲尼弟子列傳注三累山南有石室西面有兩石室北面有兩石室皆因阿結牖連扃接闥東廂石上猶傳杵臼之跡庭中亦有舊宇處北坎室上有㣲滑石溜豐周瓢飲似是棲遊隠學之所昔子夏教西河疑即此也水經注白起社田在澄城縣北六十里將軍山南有村曰社田相傳為起食邑澄城志武城正義曰括地志云故武城一名武平城在華州鄭縣東十三里史記魏世家注武城在華州東二十一里又名光武城乃征隗囂時所築遺跡尚存馬志武按史記注城在華州東十三里係古華州馮志仍之非也今應從馬志桃林野春秋時晉侯使詹嘉守桃林之塞杜預曰桃林潼闗是也書著武王之事曰歸馬於華山之陽放牛於桃林之野孔頴達引杜預語亦以桃林塞為在闗且曰華山之旁尤乏水草非長養牛馬之地欲使自生自死以示戰時牛馬不復服乗也雍録告平城在華隂縣敷水之西賈志敷水南出石山之敷谷北逕告平城東耆舊所傳言武王伐紂告太平於此故城得闕名非所詳也水經注王宿莊宜氏族譜云宜氏世居華城東北二十里地曰王宿莊古傳周太子宜臼廢出奔曽宿渭陽之濵即此暨踐阼後以封庶子賜姓宜氏華州志魯王宮城在蒲城縣西南四十里大統記曰即魯哀王城也視其餘迹尚有宫城板築之象今在内政村長安志晉太子虚糧寨在蒲城縣東北六十五里沮水西岸史記晉世家曰晉穆侯四年娶齊姜氏為夫人七年伐條生太子仇杜預曰條晉地漢地理志懐徳縣禹貢北條荆山在南按今朝邑縣西南有懐徳故城即古條近焉虚糧史傳無聞長安志晉城在蒲城縣東南四十里舊傳晉公子重耳出亡於蒲所築計公子避難何暇築此傳聞秦孟明敗後晉建城為屯守也蒲城志秦邵平𤓰田在舊長安城東門外今長安縣之西北也雍勝畧廣陵人邵平為秦東陵侯秦破為布衣種𤓰青門外𤓰美世謂之東陵𤓰水經注皇子陂在萬年縣南二十五里長安志皇子陂在樊川水經注天寒皇子陂杜甫詩陂在啓夏門南三十里陂北原上有秦皇子冢因以為名隋文帝改曰永安陂周廽九里寰宇記蘭池陂在咸寧縣東二十五里雍勝畧始皇引渭水為長池東西二百里南北二十里築為蓬萊山刻石為鯨魚長二百尺亦曰蘭池陂三秦記文學城在興平縣東崇二丈五尺十道志曰今謂之故縣城長安志武學城在興平縣東一十里崇二丈五尺與文學城相接二城並秦章邯築長安志章邯臺在興平縣東南十里按項羽封章邯為雍王都廢丘故有此臺焉馬志跌腳石在興平縣南十里付寨村俗傳雍王章邯都廢丘聞韓信修棧道不設備後信兵至邯失計跌腳於此石以悔之有跡存馬志露臺臨潼縣驪山東南三十里秦始皇露臺祠在焉不齋戒往者輒風雨迷道潜確類書坑儒谷在臨潼縣西南五里長安志師古曰今新豐縣温湯之處號愍儒鄉温湯西南三里有馬谷谷之西岸有坑古相傳以為秦坑儒處也漢書儒林傳注秦既焚書苦患天下不從而諸生到者拜為郎前後七百人乃宻令種𤓰於麗山坑谷中温處𤓰實成詔諸博士諸生説人人不同乃命就視之為伏機諸生方相難不决因發機從上填之以土皆壓終乃無聲衛宏古文尚書序佷石在臨潼縣東十里秦始皇陵東南二里形似龜初始皇逺採此石將致之驪山至此不復動石崇一丈八尺周十八歩長安志謝聚在始皇陵北十餘里闗中記鐘官城一名灌鐘城在鄠縣東北二十五里秦始皇収天下兵器銷為鐘鐻處元和志華陽在富平縣東南三十里始皇二十三年李信伐楚敗歸時王翦謝病家居始皇疾駕入頻陽手以上將印佩翦身授兵六十萬後三日翦發頻陽始皇降華陽公主簡宫中麗色百人為媵北迎翦於途詔即遇處成婚翦行五十里遇焉列兵為城中堅設錦幄行合卺禮信宿公主隨翦入都詔頻陽别開主第今名相遇處為華陽賈志王侯堡在富平縣西北四十五里即王翦屯兵之所又莊子鎮有王翦别業賈志灰塠在渭南縣西南五里崇三十尺周一百歩俗傳秦始皇焚書處馬志金牛道在褒城縣境秦五丁所開漢永平中司𨽻楊厥鑿而廣之馮志昔蜀王從卒數千餘獵於褒谷秦惠王亦畋於山中怪而問之以金一筐遺蜀王及報欺之以土秦王大怒其臣曰此秦得之瑞秦王未知蜀道乃刻石牛五頭置金於尾下偽如養之者言此天牛能屎金蜀人見而信之乃令五丁共引牛成道秦知蜀道使張儀伐之蜀王開戰不勝而亡十三州志平舒城在華隂縣西北六里括地志秦始皇使者嘗夜過平舒道有人持璧遮使者曰為我遺鎬池君因曰今年祖龍死忽不見潜確類書平舒道中是山鬼預言祖龍死處地葢在華隂縣也其言遺鎬池君者指上林周武王故都言之也十道志誤認其語遂著滈池於華隂則失之矣雍録秦長城在蒲城東五十里秦築長城即是塹洛也三秦記秦孝公九年作長城簡公二年塹洛今沙苑長城是也寰宇記楊侯村在洛川縣東南六十里即楊班故里延安府志赤鴈營在洛川縣南九十里秦將軍楊班立陣之地因赤鴈落營故名延安府志朔方臺在綏徳州東一里無定河東岸相傳秦太子扶蘇築一名扶蘇臺雍勝畧漢軹道亭在漢長安城東十三里賈志秦王子嬰素車白馬繫頸以組封皇帝璽符節降軹道旁漢書髙帝本紀蘇林曰亭名也在長安東十三里師古曰軹音枳軹道亭在覇成觀西四里髙帝本紀注㶚上在通化門東三十里㶚河西岸漢王元年十月沛公至㶚上子嬰降文帝六年宗正劉禮為將軍次㶚上雍大記樊鄉在長安城南雍録樊川即杜之樊鄉也漢祖至櫟陽以將軍樊噲灌廢邱最賜邑於此鄉也水經注長門亭漢書文帝出長門若見五人於道北立五帝壇長安志寕按亭在今咸縣覇陵亭李廣家居數嵗廣家與故頴隂侯孫屏野居藍田南山中射獵嘗夜從一騎出從人田間飲還至覇陵亭覇陵尉醉呵止廣廣騎曰故李將軍尉曰今將軍尚不得夜行何乃故也廣宿亭下史記李廣傳朱博村去杜祠三里朱博丞相故里也在華嚴寺下北倚少陵下瞰終南賈志漢瓦形制古妙工極精緻雖塵壤漬蝕殘缺漫漶破之如新人有得其瓦頭者皆作古篆盤屈隠起以為華藻其文有曰長樂未央有曰長生無極有曰漢并天下有曰儲胥未央有曰萬壽無疆有曰永奉無疆亦有作上林字者以是知古人製作不茍雖瓦甓必有銘識不特彛鼎為然長安志曲郵在咸陽縣境漢書髙帝征黥布張良送至曲郵長安志蕭城在咸陽東北四十里漢髙祖長陵之北世傳蕭何築城以守長陵故名馬志棘門在咸陽縣東北十六里漢文帝後二年徐厲為將軍次棘門孟康曰在長安北秦時宫門也長安志棘門在横門外三輔黄圖周氏陂在咸陽縣東南三十里亦名周氏曲咸陽縣志周氏陂南一里有漢蘭池宫李善文選注陂周十三里漢周亞夫有功遂賜此陂故地以氏稱之括地志正陽洞在咸陽縣東四十里世傳漢鍾離修道之處馬志㶚館漢㶚館王莽更曰長存館長安志更按三輔黄圖王莽㶚橋為長存橋館臨㶚橋而設故名亦因之樊噲城在興平縣南十里崇二丈西京雜記曰漢王襲雍王章邯敗走廢邱城命將軍樊噲圍之於城西築臺以望今城南有武延臺疑是長安志小槐里李竒曰即槐里之西城東有槐里城故以此城為小槐里長安志鴻門亭即漢髙祖見項羽之處在大道北下坂口長安志鴻門也者驪山之北十里而新豐之東十九里也地有坂横亘大道中鑿隧路以為門徑故曰鴻門其迹尚在不知何世立此闗隘也雍録安幕抝在臨潼縣東二十里賈志相傳漢髙祖幸新豐安營幕於此長安志項王營在臨潼縣東南十五里馬志露臺師古曰今新豐縣南驪山之項有露臺鄉極為髙顯猶有文帝所欲作臺之處十道志曰漢文帝罷露臺於此然則驪山露臺正文帝已有成基而惜費不肯竟役者也雍録歩昌亭三輔黄圖曰成帝於覇陵北歩昌亭起昌陵即武帝之廢陵也長安志潼按亭在今臨縣三田村在西安府臨潼縣田真兄弟分而復合荆花再生即此潜確類書昆吾亭在藍田縣境漢宣帝霍皇后塟亭之東長安志射鴈臺在藍田縣北二十里漢將軍李廣之庄也廣屏居藍田山下出獵見草中石以為虎而射之中石没羽今掛弓樹尚存地名官庄賈志將帥堡在藍田縣南白鹿原十里與蕢山相接前數里即長水漢長水校尉屯兵之處賈志胡城在渭南縣南十里舊説匈奴休屠王部落降漢築此城以居因名長安志金氏陂在故下邽縣東南二十里漢昭帝以金日磾有匡輔功賜陂地數千畝雍大記云即渭南地薨賜冡地於此後人稱其陂曰金氏陂雍勝畧樂視臺在富平縣西南二十里世傳漢武帝遊樂其上今廢賈志任光故里漢河陵侯石碑立鄜州南門外子孫甚蕃住羊村延安府志郿塢城在郿縣東十五里漢董卓封郿侯據此築塢髙厚皆七丈號曰萬嵗城徙金銀雜物於内積三十年榖俗謂之小長安雍勝畧渭水東逕郿塢南水經注龍門洞在隴州西北一百五十里相傳為漢婁敬棲處雍勝畧拜將壇在南鄭縣漢髙祖拜韓信為大將處故基尚存雍勝畧藏劒岩在褒城縣南二十里世傳漢髙祖為王時藏劒於此雍勝畧棧道在褒斜谷中漢張良説髙祖燒絶棧道即此唐人詩梁州秦嶺西棧道與雲齊馬志樊噲臺在城固縣北十三里上容百餘人漢將樊噲築雍勝畧胡城在城固縣西四十里張騫使匈奴與胡夷妻堂邑父俱還漢中築城居之故名雍勝畧漢水自長栁渡又東逕胡城南水經注王陵故城正義曰括地志云王陵故城在商州上洛縣南三十一里荆州記云昔漢髙祖入秦王陵起兵丹水以應之此城王陵所築因名也史記髙祖本紀注劉仲城在郃陽縣西二里昔漢髙祖兄劉仲封邑於此唐房謙詩云千載遺踪寄薜蘿沛公鄉里漢山河長陵亦是閒邱隴異日誰知與仲多馬志公孫莊在邠州西南二十五里漢公孫賀故宅今謂之孫村賈志藏馬谷在華嶽東漢武帝求仙於華山下造集靈宫存仙殿望仙門有神馬自華山出帝令置内棧馬不久留令人尋之見在此山谷中石龕下故名藏馬谷又名藏馬龕東北澗中石馬跡尚存雍勝畧東鹵城在蒲城縣南二十里漢書宣帝微時常困於蓮勺鹵中如淳曰蓮勺有鹽池縱廣十餘里其鄉人名曰鹵中孟康曰蓮勺縣西北也按漢蓮勺縣在此縣東南下邽縣界唐大徳十二年東池生瑞鹽後勅禁斷鹽不復生雍勝畧祭天金人在甘泉山下賈志武帝元狩二年遣驃騎將軍霍去病擊匈奴得休屠祭天金人祠諸甘泉以為天神主漢書郊祀志龍尾墩在淳化縣漢元封中大秦國貢花蹄牛色駁髙六尺尾環繞其身角端有肉蹄如蓮花善走多力武帝令輦銅石起望仙宫牛跡在石上皆蓮花形陽闗外故有花牛津輦得異石長十丈髙三丈立於望仙宫名龍鏟石武帝末石自䧟入地尾出於上後人呼為龍尾墩淳化志涼武地在淳化縣北五十里以漢武帝避暑處故名淳化志祈仙臺在中部縣橋陵前漢武帝勒兵至朔方還祭黄帝於橋山時所築雍勝録杏城在中部縣西南五里相傳漢將韓胡伐杏木為柵以抗北狄因名元和志後漢黄白城在三原縣西南十五里後漢李傕亂政天子東遷三輔饑歉乃移保黄白城即此地也元和志馬融讀書臺在盩厔縣東北二十七里按舊圖經曰後漢馬融讀書所長安志伏波村在鳯翔府扶風縣伏波將軍馬援故居潜確類書絳帳村在扶風縣馬融嘗客此潜確類書即馬融傳經故宅遺址尚存雍勝畧回中城在隴州西北四十里即漢來歙開道處雍勝畧三國駱谷道在盩厔漢魏舊道也南通蜀漢魏少帝正始四年曹爽伐蜀諸軍入駱谷三百餘里不得前進牛馬驢騾以轉運死畧盡少帝甘露三年蜀將姜維出駱谷圍長城亦此道也元和志三交城在寳雞縣西十六里司馬宣王與諸葛亮相拒所築元和志落星村在岐山縣東五十里即蜀漢諸葛亮長星墜營處馬志曹操城在漢中府城北一十七里漢末操自長安西臨漢中因築城留夏侯淵等守之馬志漢樂二城蜀志建興七年諸葛武侯徙府營於南山下原上築漢樂二城通鑑築漢城於沔陽樂城於城固二縣屬漢中郡沔陽今興元府西縣城固今城固縣故西樂城在西縣西南武侯所立甚險固輿地廣記城固縣蜀改為樂城地理通釋陳倉故道在沔縣東北二十五里漢諸葛亮出散闗圍陳倉曹操自陳倉出散闗即此雍勝畧八陣圖在沔縣南定軍山下漢諸葛亮所作又有督軍壇鄉人言毎隂雨時聞有擊鼔聲馬志石馬城在沔縣東二十里諸葛亮屯兵處雍勝畧伎陵城在洵陽縣西五十里即木蘭寨蜀救孟逹之所雍勝畧晉星落石在興平縣内晉穆帝時有星隕縣西南汙澤化為石色黄白形如甕髙五尺唐韓琮為興平令移置縣齋賈志浄土樹在髙陵縣南八里俗傳西域鳩摩羅什憇此覆其履土遂生兹樹二月開如楊花八月結實狀如小栗殻中皆黄土名山記赫連臺在涇陽縣西三十里賈志赫連勃勃駐兵所在今橋底鎮東有遺址賈志甘泉城在渭南縣北九十里俗傳赫連勃勃所築馬志魏王樓姚萇兄姚襄所建今故址存四望俱石山竒峭如屏幛然樓南有襄教軍塲考晉書襄招集北地戎夏歸附者五萬餘戸是時北地正徙泥陽後襄與苻堅戰死三原萇僣號追諡襄為魏武王至今稱魏王樓云三木門與天桃諸堡及九龍寨皆魏王故跡九龍寨尚有寨門地牢故址相傳魏王立屯三百六十日宴一屯給人馬食嵗一週此其一也耀州志天活堡在耀州水門西北十里四面皆石崖峻絶上有薪水可守葢魏王姚襄所營金陜西行省李興嘗避兵於此今其瓦礫堆積逰者往往得遺鏃折㦸雨後或拾銅錢金銕古鏡諸物賈志偽夏太后城在洛川縣西三十六里赫連勃勃聞劉裕滅姚泓命子義真等守長安大悦自將兵入長安留太后於此築城以居元和志鄜按洛交在今州治呉兒城在龍泉縣西北四十里初赫連勃勃破劉裕子義真於長安遂虜其人築此城以居之號呉兒城元和志徳按龍泉故縣在今綏州東三里宋思鄉城在藍田縣東南三十三里宋武帝征闗中築城於此南人思鄉因以為名元和志思鄉城一名栁城以城旁多栁故曰栁城長安志魏逍遥觀孝文帝嘗登此觀望逍遥園見嵯峨山慨然語左右曰望見此山令人有脱塵之意長安志永安故城在三原縣西北六十里杜寨北今考杜寨北小杜村西北有故城城邉有唐貞元間碑載此地遺事今此地屬淳化其碑嘉靖間為淳化磨作儒學碑矣此地乃作鎮處杜寨則義柵所也亦名鴻賔柵按地圖記後魏孝明帝孝昌三年蕭寳夤亂闗右毛遐鴻賔立義柵扞賊孝莊帝永安元年於此置北永州以鴻賔為刺史俗謂之鴻賔柵孝武帝永熙元年徙北雍州於宜州仍於此柵置永安鎮此其故城也馬志董龍社樹在盩厔縣西南三十里舊圖經曰董龍盩厔人家貧村社衆人祭社逐出之龍遂以泥造飯祭之後穿地得黄金因大富遂名董龍樹長安志後周中華郡城在富平縣西南三里石川河之陽後周閔帝置有二石人卓立即郡門所在人稱為石婆婆原賈志隋豐潤陂在咸寜縣東北二十五里周六里後周太祖名為中都陂隋文帝改今名寰宇記滋水驛在咸寜縣東北三十里今廢馬志隋開皇十六年置兩京道里記在長樂驛之東睿皇在藩日經此廳之西壁畫一胡頭因題曰喚出眼何用苦深藏縮却鼻何畏不聞香南部新書定官石隋唐間隕於鄠縣人家園中化為巨石移府城九街唐時舉人就試以鐵釘釘之驗其中否復置藩署以卜官曰官清者大者釘之入否則弗入因號定官鄠縣志宜壽城在盩厔縣南三十里即隋之宜壽宮城也馬志隋文帝莊相傳在避暑宫以西漫無可考惟金大定二十七年重修岱嶽廟記云古蹟則有隋文帝魏元成之舊莊今則失其處矣澄城志看花臺在同州城南相傳隋煬帝築之雒岸者下有蓮池上起馳道今其址尚存同州志隋牛𢎞故居在邠州西南六十里宜禄舊縣東進賢里隋吏部尚書牛𢎞故居也俗呼相莊牛𢎞詩簷前無數好峰巒醉眼詩腸氷雪寒不換宜山真面目請君來此倚欄杆邠州志唐洛女陂在咸寜縣東十五里寰宇記洛女冡南有洛陂俗號洛女陂三輔舊事乾湫在神禾原皇甫村東舊傳有龍移去南山炭谷原湫水遂涸故名乾湫城南注長樂驛在咸寜縣東十五里今廢馬志郭子儀乾元元年破賊河上遂朝京師詔百官迎於長樂驛帝御望春樓待之天中記韓莊即韓退之城南雜題又送符城南讀書之地也莊在韋曲東皇子陂南引南陂水為南塘後為里人楊氏所有穿洞起閣引泉落地孟郊張籍俱有遊韓莊詩馬志鄭莊即鄭䖍郊居在韓莊東南李商隠有過鄭䖍舊隠詩馬志范氏莊本唐杜佑郊居門人權得輿為之記唐舊史稱杜佑城南有樊川亭有桂林亭卉木幽䆳日與公卿宴集其間元和七年佑以太保致仕居於此焉式方傳又云甲第在長安里杜城有别野亭館林池為城南之最范公熙寜中自侍御史出買此莊於尚書郎胡拱辰胡之前猶為杜氏有之自杜至范三易主矣今猶謂之御史莊有溪榭嵓軒江間圃堂林館謂之范公五居馬志員莊員半千莊在焦戴川北枕白鹿原蓮塘竹徑酴醿架海棠洞㑹景堂花塢藥畦碾磨麻稻里諺曰上有天堂下有員庄長安志金鑾坡龍首山之支隴隠起平地而陂陀靡迤者也其上有殿改名為金鑾殿故殿之旁坡亦遂名曰金鑾坡雍録愴别里吐蕃請婚中宗以所養雍王守禮女為金城公主妻之帝為幸始平縣設殿帳於百頃泊側餞别因改始平縣為金城縣又改其地為鳳池鄉愴别里舊唐書吐蕃傳靈符觀天寳初桃林獲寳符將入城宿於此因置觀在長樂陂南兩京道里記寜按長安志觀在咸縣渭城咸陽縣之東境也唐世多事西域故行役者以出陽闗為言既渡渭以及渭城則趨玉門陽闗者皆由此始故王維詩隨地紀别而曰渭城陽闗其實用覇橋折栁故事也雍録馬嵬故城在興平縣西北二十三里雍都西九十里城本是馬嵬築以避難馬嵬者姓名也有驛楊妃死於驛白居易詩曰西出都城百餘里雍録貴妃粉出馬嵬坡上土白如粉塊婦女面有黒㸃者以粉洗之即除西安府志李靖營在臨潼縣東二十里馬志鹿臺縣在髙陵縣南二十五里有果園名鹿苑唐析置鹿苑縣有鹿臺祠在鹿苑原上百姓祈禱水旱有驗鹿臺將軍元末李思齊築城戍此賈志巢閣在鄠縣西七里白樂天讀書處村名割耳莊有白沙諸泉長安逸士張光裕滙泉為湖種竹十畝倚樹為樓髙七丈故曰巢閣馮恭定講學其上富平劉解元士龍有記紀其勝賈志石門精舍在藍田山石門寺王摩詰嘗遊於此西安府志咽瓠泉在藍田縣西北一十五里長安志李筌得隂符經讀數千遍不曉其義入秦至驪山下逢一老母與説隂符之義袖中出一匏令筌谷中取水瓠忽沉及還已失所在授經碑記青泥城在藍田縣南七里按嶢栁城亦謂之青泥城即今縣是也舊有青泥坊杜甫詩飯煮青泥坊底芹西安府志五郡城在盩厔東三十里與古樓觀相近舊説兄弟五人共居此城因以為名後為道觀有唐明皇碑馬志義亭城唐開元間徙富平於義亭城即今舊縣地葢古之鄉亭也里曰義里在富平縣東北十里賈志魏徵故里在富平縣境宗支碑石尚可誦讀有左右鵝鴨池賈志半日村在渭南東五里新豐原寰宇記此村以山髙蔽虧陽光僅及其半唐郎士元為渭南尉置别業於此村賈志白樂天故里在唐下邽縣東紫蘭村有異花亭今考樂天渭村題詠最多賈志杜甫川在延安府城南七里西南折入四十里牡丹遍山谷樵者採之為薪歐陽永叔花譜所謂延安牡丹與荆棘無異者也甫避亂寓此范仲淹大書杜甫川三字於川口延安府志賣酒樓在鳳翔府寳雞縣陳倉城内自唐至宋屢更兵火獨此樓存潜確類書端正樹上發馬嵬行至扶風道道旁有花寺畔見石楠樹團圞愛玩之因呼為端正樹太真外傳臨汧城王承元為鳳翔節度使於汧陽西北八十里築新城一所賜額為臨汧城鳳翔西接涇原無山谷之險吐蕃由是往往入寇故承元奏於衝要築壘分兵千人以守之乂鳳翔府城東商旅所集居人多以烽火相驚承元益城以環之冊府元龜隴亭在隴州隴山官道傍唐時已有此亭童謡曰秦隴無人塞草腥將軍一去泣空營漢家天子東廵狩行到江南又起兵雍勝畧褒城驛元㣲之為御史奉使東川飲於褒城驛竇明府廳虞鄉黄丞犯令逃去再使東川至褒城驛黄丞餽酒艤舟㣲之與同酌徧問褒陽山水則褒姒所奔之城在其左諸葛所征之路在其右感今懐古作詩贈黄曰昔年曾痛飲黄令困飛觥席上當時走馬前今日迎迤邐七盤路坡陀數丈城花疑褒女笑棧息武侯征一種埋幽石空聞千載名本事詩仙人洞在商州西百一十里深五六丈石紋斑駁璧彩陸離以蓮花石有滴水垂珠禱雨者以瓶盛之得一二㸃即雨俗傳為湘子洞官道北有湘子洞碑商州志乾坑在同州西四十里唐李元諒敗李懐光於乾坑李克用自河中屯乾坑敗黄揆於沙苑今名界溝以州西界也同州志白樓同州有白樓唐賢眺詠之所令狐楚作賦刻其上集古録烟入白樓沙苑暮白樂天詩同家窪少留同家窪杜甫詩即同州同谷窪葉夢弼注三曲城在同州界地志三業城即此馬志鄭魏公莊同州北境良輔鎮即唐鄭魏公莊也畫墁録遊春亭在鄭縣故城東北三里土人呼曰杜基葢杜甫謫華州司功嘗題詩其亭故也又東二里曰西谿其地絶勝人慕杜司功之風遂名之為小曲江雍勝畧鄭縣亭子郡志載鄭縣亭子在西溪為今杜基者是按杜詩曰鄭縣亭子澗之濵戸牖憑髙發興新味憑髙二字則非西溪可知也又曰雲斷嶽連臨大路天晴宫栁暗長春杜詩注夢弼曰陜華間有地名大路晉書檀道濟伐姚泓至潼闗姚鸞屯大路以絶道濟糧道是也長春謂長春宫在同州朝邑縣去鄭縣亭子才一舍由此以論則鄭縣亭子當在華東渭濵之間又非西溪可知也西溪曰杜基後人慕公而祠之鄭縣亭子即晉時髙平亭必非西溪之杜基矣又按儲光羲過華隂詩有曰朝行敷水上暮出華山亭髙館宿初静長亭秋轉空又按陜西通志有敷西城在華隂縣敷水之西郭延生述征記以為苻姚所置即其地也雍録與明一統志未及詳考郡志仍之得無未按地理乎華州志令狐莊在耀州西北窰洞飾以丹青人傳為令狐綯山居明嘉靖三十四年地震洞始圮父老言寺溝村有令狐氏祠堂七王廟側有蓮池俱無跡賈志太元洞在華原東五里賈志唐孫真人思邈隠居所也往時遊者持火可深入今崩礙不能行洞下有洗藥池二皆鑿石為者耀州志高墌城在鶉觚北五里唐太宗圍薛仁杲於此雍勝畧奉天故城唐徳宗建中元年術士桑道茂言陛下不出數年暫有離宫之厄臣望奉天有天子氣宜髙大其城池以備非常乃命京兆發丁夫數千推六軍之士築奉天城詔州鎮無得修城毁其守具潜確類書奉天城外象龜形内列六街名山記舊子城周五里羅城周十里後子城坍今乾州城即羅城舊址乾州志薛仁貴采地在乾州東四十里至今名薛禄鎮乾州志雙烈村在乾州北門外唐竇氏雙烈女故居也即今竇村北門内有雙烈坊即為二烈女建乾州志相思鋪鄜州東百里有水名相思河傳舍曰相思鋪令狐楚詩曰誰把相思號此河塞垣車馬往來多只應自古征人淚灑向空川作碧波詩話龜鑑馬蹄石在葭州西南二里舊城其石有馬蹄痕世傳秦王下馬跡雍勝畧駱駝巷在鄜州城西北三十里杜甫遊梅柯嶺往來止宿於此延安府志宋長樂亭在通化門外十里長樂坡宋陳堯咨守京兆時作毎有迎餞必至斯亭嘗作歌刻石亭中馬志桂林亭亦曰三桂亭新説曰亭在長安城南潏水之陽宋諫議陳公别墅三子堯叟堯佐堯咨同登科扁其亭曰三桂堯咨知永興軍時題詩於碑有句云扶踈已問新栽竹清淺猶尋舊潄泉馬志玉峰軒在興教寺北松檜半原地形髙爽南對玉案峰宋元豐中龍圖吕公祈禱太湫道經是寺登此崗南瞰玉案令僧創是軒為登眺之所權長安令陳正舉為之記馬志雷簡夫隠居處自石炭谷口穿雲渡水躡亂石冒懸崖行十餘里數峯聳削蹬道之半有司馬温公𨽻書二十八字曰登山有道徐行則不困擇平穏之地而置足則不跌人莫不知之鮮能慎谷前太乙觀有希夷先生所撰碑觀南為故處士雷簡夫隠居之地遊城南記四馬務在興平縣東南二十里一曰飛龍務次大馬務次小馬務次羊澤務地凡三百七十一頃南渡渭河慶厯中為營田尋罷之其後民占佃簿籍散亡不復歸於有司長安志喜雨亭在鳳翔府東北蘇軾判郡時建鑿池其南引流種樹為休息之所自為文記之馬志井田在郿縣東五十里横渠鎮南宋張載所畫未就之井田也馮志天漢樓在漢中府治東北子城上宋建王沖詩仰窺日月三千界平見江山七十州馮志玉泉院洞華山玉泉院洞有希夷先生睡像黄衣束縧儼乎如生塑於先生存時元至正間宣撫王守誠嘗摹刻於石今樹洞中院東巨石如削刻宋陳古靈詩都穆㳺華山記李公窰在清澗縣東北百歩相傳李顯忠母避雨窰内適生顯忠紅光滿地後有棲者輒生疾不敢復居延安府志种公井即石井延安府志种君世衡任鄜州從事建言延安東北有故寛州請興之然處險無泉議不可守鑿地百五十尺始至石工徒拱手曰是不可井矣君曰過石而下將無泉耶攻其石屑而出之凡一畚償爾百金工復致力過石數重泉果沛發萬人歡呼曰神乎雖甲兵重圍無困渴之患矣復作數井兵民馬牛皆大足自兹西陲保障患無泉者悉倣此范文正公集塵玉亭在鄜州唐羅虬為鄜坊從事賦比紅兒百首末曰花落塵中玉墮泥香魂應上窈娘堤欲知此恨無窮極長倩城烏夜夜啼宋康識守鄜日因建亭取塵玉二字為名馮志元清風臺在寳雞縣東南六十里元真人邱處機所築西倚飛雲之壁東臨潄玉之溪北跨渭濵南依山色中引清風故名吕韋有記馬志張三丰遺詩處在中部縣軒轅廟側玉皇廟東壁上碑記元至正庚子三丰手題舊志載明永樂間三丰至廟索道士張清買𤓰歸則題詩壁上去矣延安府志陜西通志巻七十三
