body:
  text: 陜西通志卷九十九拾遺第二軼事訂訛徵應瑣碎軼事黃帝採首山銅鑄鼎於荆山下鼎既成有龍垂胡髯下迎黃帝黃帝騎龍羣臣後宫從上史記封禪書平按隋書地理志富縣有荆山禹貢金九牧鑄鼎於荆山下周赧王十九年秦昭王取九鼎一飛入泗水餘八入於秦中史記秦本紀注秦穆公伐晉及河將勞師而醪惟一鍾蹇叔勸之曰雖一米可投之於河而釀也於是投之於河三軍皆醉酒譜西明寺道律師在京師城南故淨業寺修道忽有一人來至律師所律師問邠州顯際寺山出石像者何代所立答曰像是秦穆公所造像元出處是周穆王造寺處也法苑珠林晉人惡秦之用士會也乃使魏壽偽叛以誘士會秦使士會會行繞朝贈之以䇿曰子無謂秦無人吾謀適不用也左傳蜀王獵於褒谷見秦王以金一笥遺蜀王蜀王報以禮物盡化為土秦王大怒臣下拜賀曰土地也秦當得蜀矣蜀王本紀秦穆公亡善馬岐山野人共得而食之者三百餘人吏欲法之公曰君子不以畜害人吾聞食馬肉不飲酒傷人皆賜酒而赦之三百人者聞秦擊晉皆推鋒爭死以報食馬之德史記秦本紀韓子曰秦昭王令工施鈎梯上華山以節柏之心為博箭長八尺棋長八寸而勒之曰昭王常與天神博於是水經注燕太子丹質於秦欲歸秦王謬言曰令烏白頭馬生角乃可丹仰天嘆烏即白頭馬為生角秦王不得已而遣之燕丹子燕太子丹求歸秦王為機發之橋欲以陷丹丹過之蛟龍捧輦而機不發水經注宣曲任氏之先為督道倉吏秦之敗也皆爭取金玉任氏獨窖倉粟楚漢相距民不得耕種米石至萬而豪傑金玉盡歸任氏任氏以此起富史記貨殖傳文帝拜釋之為謁者僕射從行登虎圈上問上林尉諸禽獸簿尉不能對虎圈嗇夫從旁代尉對上所問甚悉欲以觀其能口對響應無窮文帝曰吏不當若是邪詔釋之拜嗇夫為上林令釋之久之前曰絳侯東陽侯稱為長者此兩人言事曾不能出口豈斆此嗇夫諜諜利口捷給哉上曰善乃不拜嗇犬史記張釋之傳鄭當時孝景時為太子舍人每五日洗沐嘗置驛馬長安諸郊存諸故人請謝賔客夜以繼日至其明旦常恐不遍史記鄭當時傳元封中故吏皆通適令伐棘上林作昆明池是時越欲與漢用船戰遂乃大修昆明池列觀環之治樓船髙十餘丈旗幟加其上甚壯史記平凖書下邽翟公為廷尉賔客闐門及廢門外可設雀羅翟公復為廷尉賔客欲往翟公乃大署其門曰一死一生乃知交情一貧一富乃知交態一貴一賤情態乃見史記汲鄭傳贊雲陽段氏值豐年則盡取金錢埋之九里皆滿曰有得意田遂可棄無用錢豐年録初卜式不願為郎上曰吾有羊上林中欲令子牧之式乃拜為郎布衣履而牧羊嵗餘羊肥息上過見其羊善之式曰非獨羊也治民亦猶是也以時起居惡者輒斥去毋令敗羣上以式為竒史記平凖書趙廣漢守京兆尹嘗召湖都亭長西至界上界上亭長戲曰至府為我多謝問趙君亭長既至廣漢問事畢謂曰界上亭長寄聲謝我何以不為致問亭長叩頭服因曰還為吾謝界上亭長勉思職事京兆不忘卿厚意其摘伏如神皆此類漢書趙廣漢傳何武為鄠令坐法免歸武兄弟五人皆為郡吏郡縣敬憚之弟顯家有市籍租嘗不入縣數負其課市嗇夫求商捕辱顯家求姓商名顯怒欲以吏事中商武曰以吾家租賦繇役不為衆先奉公受吏辱不亦宜乎武卒白太守召商為卒吏州里聞之皆服焉漢書何武傳朱雲常居鄠田時出乘牛車從諸生所為皆敬事焉時薛宣為丞相雲往見之宣備賔主禮因留雲宿從容謂雲曰在田野忘世且留我東閣可與觀四方竒士雲曰小生乃欲相吏耶宣不敢復言册府元龜黃霸以入穀補左馮翊二百石卒吏馮翊以霸入財為官不署右職使領郡錢榖計漢書黃霸傳秦彭自漢興之後世位相承同時為二千石者五人故三輔號曰萬石秦氏册府元龜趙孝父普為田禾將軍任孝為郎每告歸常從長安還欲止郵亭亭長聞孝當過灑掃待之孝至不自名亭長不肯內因問曰聞田禾將軍子當來何時至乎曰尋到矣遂去漢書趙孝傳張氏得鈎何氏得算故三輔舊語曰何氏算張氏鈎何氏肥張氏瘦言何氏有肥人輒貴瘦人輒賤張氏瘦者輒貴肥者輒賤故二族以鈎算知吉凶以肥瘦知貴賤三輔決録王阜為重泉令鸞鳥集止學宫阜使掾沙疊為張雅樂擊磬鳥舉足奮翼應聲而舞東觀漢記李郃南鄭人善河洛風星縣召署幕門候吏和帝遣使者二人當到益部投郃候舍時夏夕露坐郃因仰觀問曰二君發京師時知朝廷遣二使耶二人驚相視曰不聞也問何以知之郃指星示云有二使星向益州分野故知之耳漢書李郃傳建興三年賊發霸陵杜陵及薄太后陵面如生得金玉不可勝計是時朝廷草創敕收其餘以實內府元經薛收注元始四年起明堂辟雍為博士舍三十區為會市列槐樹數百行諸生朔望會此市各持其郡所出貨物及經書傳記相與買賣雍雍揖讓論議樹下侃侃誾誾三輔黃圖杜銓京兆人為中書博士初密太后父豹喪在濮陽世祖欲命迎葬於鄴謂司徒崔浩曰天下諸杜何處望髙浩對京兆為美世祖曰朕今方改葬外祖意欲取京兆中長老一人以為宗正命營護喪事浩曰中書博士杜銓是杜預之後於今為諸杜最即可詔之及見銓器貌瓌雅世祖感悅以為宗正魏書杜銓傳韋孝寬為雍州刺史先是路側一里置一土堠經雨頺毁每須修之孝寬乃敕部內當堠處植槐木代之既免修復行旅又得庇蔭周書韋孝寬傳蘇亮武功人仕西魏為岐州刺史朝廷以其牧本州特給路車鼓吹先還其宅並給騎士三十列羽儀逰鄉黨經過故人歡會旬日然後入州世以為榮册府元龜趙元淑性踈誕家徒壁立時長安富人宗連仕周為三原令有季女慧而有色連獨竒之每求賢夫聞兀淑請與相見至其家服玩居處元淑所未見也數日復造之宴樂更侈如此者再三因謂元淑曰鄙人敬慕公子有一女願為箕帚妾元淑感愧遂聘為妻連復送奴婢二十口良馬十餘匹加以縑帛錦綺及金寶珍玩元淑遂為富人册府元龜隋開皇中京兆韋衮有奴曰桃符以久從驅使乃放從良桃符有黃牸宰而獻之因問衮乞姓衮曰止從我姓為韋氏故至今為黃犢子韋韋庶人即其後也朝野僉載煬帝在江都代王留守長安盜賊蜂起刻木鵝繫詔於頸致之渭汭冀關東救兵至日放百十順流而下竟無救至芝田録王方翼祖裕隨州刺史裕妻髙祖妹同安大長公主也父仁表岐州刺史仁表卒妻李氏為主所斥居於鳳泉别業時方翼尚幼與傭保齊力勤作數年闢田數十頃修飾館宇列植竹木遂為富室公主卒後歸長安舊唐書本傳唐王無得好博戲文武聖皇帝微時與無得蒲戲爭彩有李陽之宿憾焉帝登極召至惶懼請罪帝笑而賞之令於春明門俟諸州庸車三日並與之得坐三日屬霸橋破唯得麻三車更無所有帝知其命薄更不復賞朝野僉載上都通化門長店多是車工募人治片輞通鑿三竅懸錢百文雖敏手健力日止一二而已有奚樂山者攜持斧鑿詣門徐謂主人幸分别輞材某當併力主人指一室曰此有六百片任意施為樂山曰或欲通宵請具燈燭乃閉戶屏人丁丁不輟及曉啓主人曰已畢願受六十緡而去主人洎鄰里大竒之視所為精妙錙銖無失即付其錢樂山以所得遍散寒乞俄頃而盡遂南出都城不復見矣集異記長安三年則天令雍州長史薛季昶擇僚吏堪為御史者季昶以問録事參軍盧齊卿齊卿舉長安縣尉盧懷慎李體光萬年縣尉李義崔湜咸陽縣丞倪若水盩厔縣尉田崇璧新豐縣尉崔日用後皆至大官唐會要狄梁公精於針法官同州刺史車至褰帷見一巨室書榜於門以富翁一子鼻生瘤癭癢甚幾危醫者莫知措手公呼病癭者至車前手取金針從腦後針之癭應手而落富室饋絹二百匹酬公公悉以賚民之煢獨者鴻書李義琛為雍州刺史蘇珦為鄠縣尉義琛謂曰鄠縣本多訴公近日遂絶訪聞其由明公為其疏理因顧指聽事曰此即明公座也但恨非遲暮所見耳珦後至吏部尚書册府元龜景雲二年御史中丞韋抗加京畿按察使舉奉天縣尉梁升卿新豐尉王倕金城縣尉王氷華源縣尉王燾為判官其後皆著名位唐會要太平公主愛樂毅論則天與以織袋盛置箱中及籍沒咸陽老嫗竊去縣吏搜捕嫗驚懼投之竈下香聞數日珍珠船寧王常獵於鄠縣界忽見草中一匱扃鎖甚固發視之乃一少女也問其所自女言姓莫氏昨夜遇火光賊賊中二人是僧因劫至此動止含嚬冶態橫生王乃載以後乘時方生獲一熊置匱中如舊鎖之上方求極色王即日表上之具其所由上令充才人經三日京兆奏鄠縣食店有僧二人以錢一萬獨賃店一日一夜言作法事唯舁一匱入店中夜久腷膊有聲店戶人怪日出不啓門撤戶視之有熊衝人走出二僧已死骸骨悉露上大笑書報寧王寧哥大能處置此僧也酉陽雜俎開元二十九年命觀風使鄭審檢校兩京驛門即今門置十二辰候自審始也白孔六帖初蕭嵩家廟臨曲江玄宗以娛逰之地非神靈所宅命徙之楊炎為相立廟復直其地盧杞因言嵩廟地有王氣故玄宗徙之炎有異志故取以建廟遂貶崖州司馬通鑑京城諸州邸貞觀間所造至開元初李尚書悉賣與居人以錢入官隋唐嘉話崔希髙轉馮翊令時有雲氣如蓋當其聽事須臾五色雜錯遍於州郭唐新語盧光為京兆郡舍先是數有怪前後郡將莫敢居者光曰吉凶繇人妖不妄作遂入居之未幾光所乘馬忽升聽事升牀而立又食器無故自破光並不介懷其精誠守正如此册府元龜天寶中玄宗立玄元廟於長安大寧里臨淄舊邸欲塑玄元像夢神人曰太白北谷中有玉石可取而琢之紫氣見處是也翼日命使入谷求之山下人云旬日來常有紫氣連日不散果於其下掘獲玉石琢為玄元像高二尺許録異記天寶中長安有凶宅扶風蘇遏賃居之東牆下掘得一石有篆文云夏天子紫金三十斤賜有德者因改名有德取其金全唐詩寧王善畫馬開元興慶池南華萼樓下壁上有六馬滚塵圖內明皇最愛玉面花驄謂無纎悉不備後壁惟有五馬其一者失去信知神妙將與變化俱也龍城録裴遵慶罷相知選朝廷優其年德令就第注官自宣平坊榜引士子以及東市兩街時人以為盛事國史補長壽三年則天徵天下銅五十餘萬斤鐵一百三十餘萬斤錢二萬七千貫於定鼎門內鑄八稜銅柱髙九十尺徑一丈二尺題曰大周萬國述德天樞張革命之功天樞下置鐵山銅龍負戴獅子麒麟圍繞上有雲蓋蓋上施盤龍以托火珠髙一丈圍三丈金彩熒煌光侔日月至開元中詔毁天樞發卒鎔爍彌月不盡先有謠云一條絲線挽天樞言其不久也天樞之北韋庶人繼造一臺先此毁拆大唐新語申歡不知何許人開元中前進士張佐嘗遇鄠杜逆旅乘青驢背鹿革囊言扶風人生宇文周時全唐詩商山隱士髙太素纍徵不起在山中構道院二十餘間太素起居清心亭下皆茂林秀竹竒花異卉每至一時即有猿一枚詣亭前鞠躬而啼不易其候因目為報時猿開天遺事天寶中承平嵗久自開逺門至蕃界一萬二千里居人滿野桑麻如織哥舒翰鎮青海遣使乘白駱駝奏事日馳五百里珍珠船平康坊南街廢蠻院即李林甫舊宅也林甫别創一堂制度彎曲有偃月之形名曰月堂木土秀麗精巧林甫每欲破滅人家即入月堂精思極慮喜悅而出必不存焉春明退朝録貴妃姊虢國夫人寵傾一時所居本韋嗣立舊宅韋氏諸子方偃息堂廡間忽見一婦人衣黃帔衫降自步輦有侍婢數十笑語自若謂韋氏諸子曰聞此宅欲貨其價幾何韋氏降階言曰先人敝廬所未忍捨語未畢有工人數百登兩廂掘其瓦木韋氏諸子既不能制乃率家童挈其琴書委於衢路而自嘆曰不才無為勢家所奪古人之戒將見於今日乎與韋氏隙地十數畝其他一無所酬明皇雜録李預居長安每羡古人餐玉法乃採訪藍田躬往攻掘得若環璧雜器形者大小百餘稍得黑粗便篋盛以還皆光潤可玩預乃椎七十枚為屑日服食之馮翊公源懷等得其玉琢為器佩鮮明可寶册府元龜終南山翠微寺有僧絶粒五十年南部新書郭子儀為尚父兼太尉中書令汾陽郡王有子八人壻七人皆重官子曖尚升平公主諸孫數十人每羣孫問安不盡識頷之而已其宅在親仁里居其地四分之一中通永巷家人三千指出入者不知其居前後賜良田美器名園甲館聲色珍好堆積羡溢不可勝紀册府元龜郭子儀常於親仁里啓第里巷負販之人上至公子簮纓之士出入不問或云王夫人趙氏愛女方粧梳對鏡往往公麾下將吏出鎮去及郎吏皆被召令汲水持帨視之不異僕𨽻他日子弟諫公公笑謂曰爾曹固非所料吾官馬粟者五百匹官餼者一千人使崇垣扃戶不通內外一怨將起搆以不臣則九族虀粉今蕩蕩無間四門洞開雖讒毁是興無所加也諸子皆伏鴻書韓城縣郭汾陽王故處在郭莊云王女下嫁于帶村張氏以文水渠賠女令其浣洗至今鄉人能言之韓城縣志大厯元年周智光為華州刺史欲謀反遣吏邵進潛往京伺朝廷禦伐之意進歸告曰朝廷無疑公之心光怒以其紿已遽命斬之既而甚悔速遣送其首付妻兒妻即以針紉頸俄頃復活以藥傅之然猶懼智光使人告光曰進本蒲人今欲歸葬光亦賙賻之既至蒲浹旬其瘡平愈乃改姓他遊獨異志大厯三年興善寺不空三藏上言寺院佛塔先因地震陷坼今將增修下見古埏得一小棺其長尺餘發而視之凡積十餘重棺皆金寶裝飾中有舍利及佛髮一條色青而卷其長數尺每棺一鎖規制絶妙有殷仲文題贊處詔出內寶輿具威儀請入內道場奉之續文獻通考李光弼母有鬚數十長五寸許封韓國夫人鴻書徐晦憲宗時櫟陽尉中丞李夷簡彈楊憑貪汚貶臨賀尉親友無敢送者晦獨至藍田與别權德輿曰厚矣無乃為纍乎對曰晦自布衣蒙楊公知奬豈得不與之别德輿嗟嘆後數日李夷簡奏為監察御史曰君不負楊臨賀肯負國乎續文獻通考韋貫之為長安丞德宗末年京兆尹李實權移宰相言其可否必數日而詔行人有以貫之之名荐於實者答曰是其人居與吾同里亟聞其賢但吾得識其靣而進於上舉笏示説者曰實已記其名矣説者喜驟以其説告於貫之且曰子今日詣實而明日受賀矣貫之唯唯數歲終不往册府元龜景公寺前街中舊有巨井俗呼為八角井元和初有公主夏中過見百姓方汲令從婢以銀稜碗就井承水誤墜碗經月餘出於渭河酉陽雜俎唐以宦者使謂之宫市置白望數百人於兩市白望者白取人物不還本價嘗有農夫以驢負柴宦者取之與絹數尺又就索門戶皆有費用仍邀驢送柴至內農夫泣以所得絹與之不肯受曰須得爾驢農夫曰我有父母妻子待此然後食我有死而已遂毆宦者街吏擒以聞詔黜宦者賜農夫絹十匹通鑑憲宗時白居易為拾遺翰林學士當改官帝謂崔羣曰居易官卑俸薄拘於資地不能超等其官可以自便居易因奏曰臣聞薑公輔為內職求為京兆府判司為奉親也臣有老母家貧養薄乞如公輔於是除京兆府戶曹參軍學士如故册府元龜裴延齡判度支京西有汚池卑濕處時有蘆葦生焉亦不過數畝延齡乃奏云訪得長安咸陽兩縣界有陂池數百頃請以為內廏牧馬之地帝乃差官閲視事皆虛妄又因計料造神龍寺須長五十尺松木延齡奏云臣於近同州簡得一谷木可數千條皆長七八十尺帝曰人云開元天寶中側近求長五六十尺木尚未易得皆須於嵐勝等州採市如今何為近處便有此木延齡奏曰臣聞賢材寶物皆處處常有但遇聖君即出現今此木生自關輔蓋為聖君豈開元天寶合得有也每奏對帝頗知其誕妄但以其敢言無隱且欲訪問外事故斷意用之册府元龜元和中長安有老卒推倒平淮西碑帝怒命縛來朕自砍殺之囚至曰碑中只言裴度功不述李訴微臣是以不平上命放罪敕碑文别撰芝田録韓愈為京兆尹六軍不敢犯法私相謂曰是尚欲燒佛骨何可犯之續世説田全操文宗時為辟仗使太和二年休祥坊百姓三百人並於光宅坊西接宰相訴云當坊右龍武軍飛騎地敕賜百姓已久不出地課經今四十年被田全操併劫徵索後數日帝以其宅為百姓居業久不欲仗集復盡歸於百姓册府元龜相國裴公坦太和八年李漢侍郎下及第自以舉業未精辭歸鄠縣别墅三年肄業不入城歲時恩地惟啓狀而已掩關勤苦文格乃變始到京重獻恩門文章詞采典麗舉朝稱之後至大拜為時名相鴻書王徽字昭文京兆人其先本魏諸公子至漢徙關中霸陵以其故王家為王氏十世祖羆仕周為同州刺史死葬咸陽鳳政原子孫因家杜陵曾祖擇從昆弟四人曰易從朋從吉從皆擢進士第至鳳閣舍人者三人故號鳳閣王氏自是訖大中時登進士者十八人位臺省牧守者三十餘人唐書王徽傳大中末嚴士則為尚醫奉御午日於終南山採藥迷誤不覺遂行數日所齎糧盡復無居人計去京不啻五六百里忽有茅屋數間一人於石榻偃卧看書推戶直前請以食饌救之隱者自起於梁棟間脫紙囊其中有百餘顆如扁豆之狀俾於藥室取鐺拾薪汲水而煮良久盛有香氣視之已如掌大曰可以食矣渴即取鐺中餘水飲之士則方啖其半已極豐飽將欲告歸慮失道曰勿憂去此二三里與採薪人相值可以隨之而至國門既出山隅果有採薪者在路側才經信宿已及樊川既還不喜更嘗滋味日覺氣壯神清有驂鸞馭鶴之意劇談録李道咸通末為鳳翔府士曹因推發掘冢賊問其所發云為盜三十年咸陽之北岐山之東古冢皆開發嘗入一冢自埏道直下三十餘尺得一石門門內箭出不已如是百餘發不復有箭以物撞開之一盜先入俄為輪劍所中死門內十餘木人周轉運劍其疾如風勢不可近以木橫拒之機關遂定盡拔去其刃因至其中但見帳幄儼然罽褥舒展遍於座上有漆燈甚明木偶人與姬妾皆偶去地丈餘有皮裹棺柩鐵索懸挂焉以木撞之才動其棺即有砂流下如水逡巡不可止流溢四靣奔馳出門砂已深二尺餘良久視之砂滿冢內不可復入竟不知何人之墓又一墓在咸陽原上既入得鏡兩靣可照人鼻在側畔背靣瑩潔如新磨畢以靣照之如常無異以背照之形狀備足衣冠儼然而倒立也録異記秦川富室少年藏鏹巨萬一夜有投書於戶者則蒲紙加蠟昧墨斜翰為其先考所遺曰汝之獲利吾之冥助也今將有大禍汝及朔旦宜齋躬潔服出春明門外逆旅備縑帛隨其年三十有五俟夜分往霸水橋步及石岸見黃衣者即置於前禮祝而退災當可免少年大恐朔旦夜分馳往霸橋至則果有一物蓬頭黃衣交臂束膝負柱俯首少年捧縑祈祝疾驅而回獨有僕夫疑其不真未逾旬復有擲書者僕夫立擒之其緘札蒲蠟昧墨如初詞曰宜更以縑三十五重置河梁其家具狀始末訴於官司詰問具伏遂置於法時李常侍叢為萬年令訟牒數年尚在御史臺記鄭文公畋小字桂兒時西門思恭為監軍有詔徵赴闕畋父亞饌於北郊以畋託之曰他日願以桂兒為念言訖流涕思恭志之及為神策軍中尉亞已卒思恭使人召畋愛如甥姪因選師友教導之畋後官至將相黃巢入長安思恭逃難於終南山畋厚募訪獲之以歸岐下溫凊侍膳如父焉思恭終畋葬於鳳翔西岡未幾畋亦卒葬近西門之墳百官造二壠以吊之無不墮淚咸服其義也北夢瑣言僖宗再狩近轂之民爭入攘寶貨唯豳民取佛至今民家充滿其工緻精采非今人之作也畫墁録潼關之敗王思禮馬中矢斃有騎卒盩厔張充晟下馬授之問其姓名不告而去通鑑熊執易赴舉行次潼關秋霖月餘滯於逆旅俄聞鄰店有一士吁嗟數次執易潛問之曰前堯山令樊澤舉制科至此馬斃囊空莫能自進執易造焉遽輟所乘馬倒囊歸之執易其年罷舉澤明年登科托言僖昭之時長安士族多避冦南山中雖洊經雜亂而兵難不及故今衣冠子孫居鄠杜間室廬相比賈氏談録同州司馬裴沆往鄭有老人白衣曵杖而至裴覺非常人因隨行才數里至一莊竹落草舍裴渴甚求茗老人指一龕云此中有少漿可就取裴視龕中有杏核一扇如笠滿中有漿漿色正白乃力舉飲之不復飢渴漿味如杏酪裴知隱者拜請為奴僕老人曰君有世間微祿縱住亦不終其志酉陽雜俎梁牛存節為同州節度使先是州內井水鹹苦人不可飲及并人岐人來迫州城咸以為兵士渴乏陷在旦夕存節乃肅拜虔祝擇地鑿八十餘井其味皆甘冷由是人馬汲濯有餘衆以為至誠之感册府元龜南唐鍾謨性聰敏多記問自禮部侍郎聘周忤旨左授耀州典午盛夏之月自周徂秦每見道傍古碑必駐馬歷覽皆默識或止郵亭命筆繕寫一日之行不過數里而已又見一圭首豐碑制度甚廣約其詞旨不下數千餘字卧荒塹中半為水潦所掩無由披讀謨欣然解衣遊泳塹中以手捫揣默記其文志諸紙墨他日徵還重經是路天久不雨無復沈碑之泉乃發笥得舊録本就塹較之無一字差誤南唐近事梁韓建為華州刺史時不知書治郡之暇日課學習遣人於器皿牀榻之上各題其名建視之既熟乃漸通文字册府元龜太祖微時多遊關中雖甚窘乏未干投人或周之必擇而後納有百錢之餘必以與人人頗異之長武城寺僧嚴者常周之往來無倦隂異其骨氣使工人貌之今置神御過者朝謁其繪事本褐衫青巾據地六博後易靴袍矣畫墁録郭忠恕善畫屋木林石郭從儀鎮岐下每延止山亭張素設粉墨於傍經數月忽乘醉就圖之一角作逺山數峰而已郭珍惜之岐有富人主官酒酤其子善畫日給醇酎設几案絹素及好紙數軸屢以情言忠恕俄取紙一軸畫一小童持線車紙窮處作風鳶中引一線長數丈富家子不以為竒遂謝絶圖畫見聞志錢若水為同州推官有富民小女奴逃亡奴父母訟於州命録事恭軍鞫之録事嘗貸錢於富民不獲乃劾富民父子共殺女奴富民不勝榜楚自誣服州官皆以為得實若水獨疑之留其獄數日不決一旦詣州曰已密使人訪求女奴得之矣知州驚曰安在若水密使人送女奴於知州所引女奴父母示之泣曰是也乃引富民父子悉破械縱之宋名臣言行録陳堯佐知永興軍初太后遣宦者起浮圖京兆城中前守薑遵盡毁古碑碣充磚甓用堯佐奏曰唐賢人墓石今十亡七八矣子孫深刻大書欲傳之千載乃一旦與瓦礫等誠可惜也其未毁者願敕州縣完護之宋史本傳張刺達宋時為華州掾嘗從太守入華山謁陳搏一道人至探袖出棗三枚顔色各異以白者授先生赤者自食青者授太守太守不恱持以與掾掾遂啖之道人出太守曰是何道者先生曰此純陽真人也太守悔恨張公自後得道異林華隂吕君舉進士聘里中女未行既中第婦家言曰吾女故無疾既聘而後盲敢辭吕君曰既聘而後盲君不為欺又何辭遂娶之生五男子皆中進士第其一人丞相汲公是也後山談叢長安有寶貝行搜竒物者必萃焉唐諸陵經五代發掘皆空太平興國中具衣冠掩塞長老猶見之江鄰幾雜志范文正經略陜西時其子純佑年方弱冠與將卒錯處鈎深摘隱得其材否由是任人無失所向有功世史類編文正公知邠州暇日率僚屬登樓置酒未舉望見衰絰數人營理葬具者詢之乃寄居士人卒於邠將出殯近郊謂棺槨皆所未具公憮然即輟宴席厚賙給之使畢其事澠水燕談録程明道為鄠縣主簿南山僧舍傳有石佛首放光男女聚觀因語其僧曰光見白吾當取其首就觀之自是不復有光隴蜀餘聞少師卜居醴泉第舍卑狹某少時嘗到宛然如舊諸門房皆題誰居先公大中所記也先公守鳳州時四翁問欲得宅否先公答以叔有之與某有之正同程伊川世家舊事溫公在水興日行國忌幕次中客有事欲白公誤觸燭臺倒公身上公不動亦不問道山清話范純甫官鳳翔時年尚少家人每見其卧齋中忽蹶起著公服執手板危坐久之率以為常竟莫識其意常從容問之答曰吾時忽念天下安危事以天下安危為念豈可不敬耶墨客揮犀向敏中丞相判西京有僧暮過村舍求宿主人不許求寢於門外車箱中許之是夜有盜入其家攜一婦人並囊衣踰牆出僧不寐適見之自念明日必以此事疑我因亡去夜走荒草忽墜眢井而踰牆婦人已為人所殺尸在井中血汚僧衣主人蹤迹捕獲送官不堪掠治遂自誣獄成皆以為然敏中獨以贓仗不獲疑之詰問數四乃以實對如是密遣吏訪賊食於村店有嫗聞其自府中來不知其吏也問曰僧某獄如何吏曰府已讞決已笞死於市矣嫗嘆息曰今若獲賊如何吏曰府已讞決此獄雖獲賊不敢問嫗曰然則言之無妨彼婦人乃此村少年某甲所殺也吏問某人安在嫗指示其舍吏往捕並獲其贓僧始得釋聞見近録韓魏公領四路招討駐延安忽夜有攜匕首至卧內者乃夏人所遣也公語之汝取我首去其人曰不忍得諫議金帶足矣明日公不治此事俄有守陴者以原帶來納受之或曰初不治此事為得體卒受其帶則墮姦人計中矣公嘆其非所及清波雜志陜西豪士劉易多遊邊喜談兵寶元康定間韓公宣撫五路薦之賜處士號易善作詩韓公為書石或不可其意則發怒洗去魏公欣然再書不憚公每燕設易喜食苦馬菜不得之即呌怒無禮邊城無之公為求於內郡後每燕集終日唯以此菜啖之易不能堪方設常饌時稱公善制易也宋名臣言行録天聖中夏人犯邊自新平以下時被虜掠武功令种世衡集僚佐父老告曰虜所以敢凌我者以民未習戰騎射寡耳于是選子弟可教者數千人與約束騎射乃鑄金錢懸標的上令曰中錢孔者以錢與之初三四人中錢孔各與一錢數日則三四十人中錢孔再踰月則數百人皆連中錢孔時稱武功人善射者世衡之所教也武功志狄武襄西河書佐也逋罪入京竄名赤籍以三班差使殿試出為清澗城指揮使种世衡知城范文正帥鄜延种閲軍書至夜分從者皆休唯狄不懈呼之即至每供事兩手如玉种以此異之授以兵法又延之於范公遂成名畫墁録宋朱壽昌字康叔天長人父巽守京兆日出其母劉氏時方娠及壽昌生數歲歸父家母子不相聞五十年壽昌齋搗行四方求之熙寧中與家人訣棄官入秦曰不見母吾不反矣求至同州果得之劉巳年七十餘嫁黨氏有數子悉迎以歸事聞詔還就官由是以孝聞天下同州志元豐中夏戎之母梁氏遣將引兵卒至保安軍順寧寨圍之數重時寨兵少人心危懼有娼姥李氏得梁氏隂事甚詳乃掀衣登陴抗聲罵之盡發其私虜人皆掩耳盡力射之莫能中李氏言愈醜虜度李終不可得恐且得罪遂託以他事中夜解去雞鳴狗盜皆有所用信有之夢溪筆談祕書郎喬中山云至元十年自東曹掾出使延安道出鄜州土人傳有杜少陵骨在石中者因往觀之石在州市色青質堅樹於道傍中有人骨一具趺坐若自成者與石立化以佩刀削之真人骨也緯略洪武間土人塢馬兒樵採潛發太宗陵口行入數里昏暗無睹懼而趨出為鄉人擒送縣縣令王姓者因詣陵口秉火進至一所見石几上有金筆私納袖中歸視之筆管鏤字云洪武年月日塢馬兒劫墓王縣令盜筆袁天罡書續文獻通考王九思敬夫之再謫以及永錮皆長沙秉國時盛年屏棄無所發怒作為歌謠及杜甫逰春雜劇力詆西涯流傳騰誦關隴之士雜然和之嘉靖初纂修實録議起敬夫有言於朝者曰遊春記李林甫固指西涯楊國忠得非石齋賈婆婆得非南塢耶吏部闡之縮舌而止列朝詩集商洛署中鑿二池池以右緑苔蒙茸苔䀶中遽成點畫如龍文烏迹篆聨則雲轉徑則銀鈎即以人工效之旋離旋合一點不相肖昔蒼頡登玄扈山作字在商之陽洛之隂尚遺二十八字勒于名山嘉隆間一州守不能供當道之求遂鑿其碑毁其字豈史皇精靈不忍湮沒託之池以顯其異耶蘇濬紀異明初無壞禪師與秦愍王有夙緣卓錫默川南普光寺夜擊木魚聲達王宫王異之遂往見與語惝然悟前生事令席禮師師攜石瓶煮水飲食王從者千人皆遍隴蜀餘聞明曾震瀘州人進士才高學贍博通九流兵備榆林製有代漕陸舟法極精巧其遺制人多購求之四川通志何仲默督學秦中最愛喬景叔國士無雙歲己卯御史汰諸生就試者景叔在汰中仲默大恚越十年景叔果舉第一大泌山房集王安道畫行筆秀徑布置茂密及遊華山見竒秀天出乃知三十年學畫不過紙絹相承指為某家數於是屏去舊習以意匠就天則出之有問何師曰吾師心心師目目師華山列朝詩集華州王庭詩兄弟三人庭詩年十六中鄉舉其次弟年十七繼中幼弟庭諭年十五亦中三人皆早發而各占一歲其後又各舉進士窺天外乘興安尚郭竈賣酒有道人姓呂授藥一丸投龍窩中即成酒州志吳方伯道卿為陜西按察副使時葉少保謫丞郃陽吳杖其隸人不辟道者曰上下有體不可以遷客廢比吳官秦臬而葉已督府力薦吳人兩賢之大泌山房集延安城崇禎癸未冬仲賊兵據之設有偽將張某為河南人甲申五月張某叛闖賊立遣小瞎子帥兵萬餘圍城至則索故所愛妓妙玉兒出告之故將屠之玉兒泣以請不聽因盡出其所贈繡镼金璫蓬髮囚首以死請乃得釋遂止坐罪于張某不然無噍類矣延綏志康熙間過濟南寓趙鍾美家偶談其祖十六七時遊西嶽華山曽登絶頂有良田數千頃道士自耕自食百歲者極多有眉長數寸者東軒主人述異記康熙間南鄭縣東有民家老嫗年百二十歲尚強健無恙少京兆李先復過漢中往訪之云晨往田間栽種未及見而去香祖筆記訂訛昆明曰神池靈沼堯治水訖停船此池蓋堯時已有池漢代因而深廣之關中記秦作阿房欲俟其成更擇令名命之宫未成而秦亡以其在阿基旁遂謂之阿房宫房讀如旁亦有作阿旁者天香樓偶評秦所坑儒四百六十餘人則以侯生盧生韓衆徐市株連故也四子為秦鍊藥求仙者耳竊以為諸生橫議之流自以為儒而受坑秦亦以為儒而坑之而莫覺其非也大泌山房集近商於耕夫得漢世石刻數種有圈公神坐綺里季神坐又有神祚機皆漢人𨽻書其號不應誤當以石刻為正東觀餘論清水東徑髙奴縣項羽以封董翳為翟王居之民俗語訛謂之髙樓城水經注秦世所鑄特銅人耳漢武帝建章甘泉所鑄者人既持盤盤又加杯是為捧盤金人也廟記曰漢武帝即建章作神明臺上有承露盤有銅仙人舒掌捧銅盤玉杯以承雲表之露三輔故事盤髙二十丈長安記曰仙人掌大七圍以銅為之此漢世建章之銅人也黃圖曰甘泉宫通天臺上有承露盤仙人掌擎玉杯以承雲表之露元鳳間自毁椽桷皆化為龍鳳隨風飛去此即甘泉之銅人也雍録西嶽華山廟碑集古録云所謂集靈宫他書皆不見惟見此碑按漢書地理志云太華山有集靈宫又桓談仙賦云華山下有集靈宫文忠博古猶時有舛漏東觀餘論長安有董仲舒墓人過者多下馬因名下馬陵今轉語名蝦蟇陵白氏琵琶引云家在蝦蟇陵下住唐郭忠恕佩觽蚩海獸也漢武作柏梁殿有蚩尾水之精也能却火災因置其象於上今謂之鴟尾非也事文類聚漢書孟喜舉孝廉為曲臺直長師古曰曲臺殿名為長者主執其事也又孟卿傳后蒼説數萬言號后氏曲臺記服虔曰在曲臺校書記因以為名黃圖及師古皆云殿在未央宫又藝文志如淳曰行射禮於曲臺后蒼為記故名曲臺記漢書曰大射於曲臺晉灼曰天子射宫西京無太學於此行禮也長安志於曲臺凡三出一在未央一列三雍之次一雜敘在宫館之數以豫考之止未央有此臺而志誤分三也雍録漢明光宫一在北宫南與長樂相連者武帝太初四年起即王商所欲借以避暑者也别有明光宫在甘泉宫中亦武帝所起雍録三輔黃圖云宣曲宫在昆明池西孝宣帝曉音律嘗於此度曲因以為名此説非也按武帝時從宣曲以南置更衣十二所即宣曲宫也豈因宣帝度曲而得名乎天香樓偶評揚雄甘泉賦曰翠玉樹之青蔥兮璧馬犀之璘㻞李善引漢武故事曰上起神屋前庭殖玉木珊瑚為枝碧玉為葉其謂翠而青蔥者皆狀碧玉之色非真有是木也雍録西京雜記曰武帝初修上林苑逺方各獻異木中有千年長生木萬年長生木洎宅編曰徽宗時興畫學命題以試畫者曰萬年枝上太平雀試者皆不知有問諸中官者應之曰萬年枝冬青木也雍録漢書武帝置御羞禁圃令丞如淳注曰御羞地名在藍田元后夏遊御宿師古注曰御宿今長安城南御宿川也不在藍田羞宿聲相近故耳羞者珍羞所出宿者止宿之義雍勝略阮籍咏懷詩西遊咸陽中趙李相經過延年以為趙飛燕李夫人固為説夢楊用修謂漢書永谷傳小臣趙李成常與微行亦非按漢書何並傳輕俠趙季李欵多蓄賔客以氣力漁閭里是也天祿識餘西京雜記中事皆劉歆所記葛稚川采之以補班史之缺耳其稱余者皆歆本語中有歆所記草木名而段柯古作酉陽書乃云稚川就上林令虞淵得朝臣所上草木名非也蓋段誤以歆自稱余為稚川耳東觀餘論李庾西都賦配前秦與後趙此言京尹也文粹又作前王似謂前有趙張後有三王但疑顛倒其文耳文苑英華辨證武功蘇蕙織錦回文詩故少常沈公復傳其畫由是若蘭之才益著然讀者惟曉外繞七言至其中方則沈公之博亦謂辭句脫略讀不成文殊不知此詩織成本五色相宣因以别三四五七言之異後人流傳不復施采故迷其句讀豫得唐程士南校此詩并申諴之釋而後曉然然申諴所釋但依士南之設色七言數火其色反黃四言數金其色反緑於五行為弗類意蘇氏詩圖之色為不爾今因冠詩於畫遂别而正之東觀餘論筆陳圖乃羊欣作李後主續之今陜西刻石李後主書也以為羲之誤矣天祿識餘唐昌觀玉蘂花長安惟有一株或賦詩曰一樹瓏鬆玉刻成春花盛時謂有仙女降焉元白皆賦詩以實其事曾端白曰韋應物帖云京師重玉蘂花比至江南漫山皆是上人取以供染事雍録山按玉蘂即樊王建華清宫詞末二句曰內園分得溫湯水二月中旬已進瓜唐置溫湯監監丞種瓜蔬隨時貢奉或疑二月非瓜時答曰驪山溫湯地暖可以人力為之按衛宏古文竒字曰秦始皇密令人種瓜驪山硎谷中實成使人上書曰瓜冬有實詔諸生往視因坑之然則溫湯冬已瓜矣何待二月耶全唐詩話世言瓊花天下惟揚州蕃釐觀一株然元遺山續夷堅志云鄠縣南十里炭谷入谷五里有瓊花樹大四人始合抱逢閏即花以初伏開末伏乃盡花白如玉中有玉蝴蝶一髙出花上花落不著地乘空而起按此則不止廣陵有之矣香祖筆記杜牧華清宫詩云長安回望繡成堆山頂千門次第開一騎紅塵妃子笑無人知是荔枝來據唐紀明皇以十月幸驪山至春即還宫是未嘗六月在驪山也荔枝盛暑方熟詞意雖美而失事實矣玉匣記明皇幸蜀至馬嵬手植槐焉及肅宗即位鑾輿返京見之曰此太上槐也俗訛為太上老君槐興平志雲斷嶽蓮臨大路大路陜華間地名也晉書檀道濟至潼關姚鸞屯大路以絶道濟糧道而蜀本正作大道誤矣漢自中詩話長安故城城南為南斗形城北為北斗形故號斗城何遜咸陽詩云城斗疑連漢老杜秦城近斗杓皆用此而秦中詩云春城依北斗郢樹發南枝春不可對郢當是秦城耳天祿識餘裴度自興元入朝李逢吉之黨張權輿謂度名應圖讖宅占岡原長安城中有橫亘六岡如乾象度宅偶居第五岡程大昌曰宇文愷營隋都曰朱雀街南北盡郭有六條髙坡象乾卦六爻故於九二置宫殿以當王居九三立百司以應君子之數九五貴位不欲常人居之置玄都觀及興善寺以鎮其地裴度宅在朱雀街東自北而來則為第四坊名永樂坊略與玄都觀東西相對何獨指為占據乾岡也小人挾私欺君皆此類通鑑注長慶三年上自復道幸興慶宫至通化門樓程大昌云開元二十年築夾城通芙蓉園自大明宫夾東羅城復道由通化安興門次經春明門延喜門則至芙蓉園矣通鑑注東蒙蓋終南峰名杜詩云故人昔隱東蒙峰已佩含景蒼精龍故人今居子午谷獨在陰崖結茅屋皆長安地种明逸東蒙新居詩亦云登遍終南峰東蒙最孤秀南士不知故注杜詩者妄引顓臾為東蒙主以為魯地老學菴筆記智永居長安西明寺寫真草千字文八百本律召調陽為真本也俗稱律呂為誤耳癸辛雜識杜常華清宫詩朝元閣上西風急都入長楊作雨聲按三輔黃圖云長楊本秦宫漢武修之以備巡幸長楊華清相去遼逺况秦漢舊宫至唐惟未央宫尚在長楊已不存蓋詩人寓言以托諷耳唐三體詩注國史補載韓退之好竒與客登華山絶峰度不可返發狂慟哭賴華陰令百計取得之或云無是事詩退之答張徹詩云洛邑得休告華山窮絶陘倚巖睨海浪引袖拂天星日駕此回轄金神所司刑泉紳拖修白石劍攢髙青磴蘇達拳局梯飈颭伶俜悔狂已咋齒垂識仍鐫銘可信國史補不妄聞見後鏦通鑑載大厯十四年德宗初即位疾將帥治第奢麗命毁馬璘第乃命馬氏獻其園為奉誠園新舊史皆言奉誠為馬暢園盧氏雜記亦云馬燧宅為奉誠園而舊史載其本末尤詳璘家所獻乃山池也通鑑誤以山池為奉誠耳唐詩注豫客長安藍田水壞一墓得退之自書薛助教志石校印本殊不同印本加一矢石本乃指一矢為妙語又得退之李元賔墓銘段季展書校印本無友人博陵崔𢎞禮賣馬葬國東門之外七里之事又印本銘云已乎元賔文髙乎當世行過乎古人竟何為哉石本乃意何為哉益嘆石本之語妙聞見後録王蜀時修斜谷閣道鳳州衙將白公掌其事至武休潭見一婦人浮水而來意其溺者遂命僕扶至岸濵忽化為大蛇沒於潭中白公以為不祥因而致疾愚謂岑參招北客賦云瞿塘之東下有千歲老蛟化為婦人炫服靚粧遊於水濵白公聞之方悟蛟也厥疾尋瘳北夢瑣言嘉祐雜志載白水縣民得員半千墓志云十八代祖凝自宋入魏以其雅正似伍員遂賜姓員考唐書本傳其先彭城劉氏十世祖凝之事宋及齊受禪奔元魏以忠烈自比伍員因自姓員傳文與碑不同如此野客叢書同州彭衙故有拾遺廟祀杜甫并鐫其彭衙行後以兵燬鄉人再建祠則肖十婦人像呼十姨廟至金令陳炳掘得詩碑始毁婦像復祀甫同州志長安李士衡觀察家藏一端研當時以為寶下有刻字云天寶八年冬端州東溪石刺史李元書劉原父知長安取視之大笑曰天寶安得有年自改元即稱載矣且是時州皆稱郡刺史皆稱太守至德後始易今安得獨爾耶李氏研遂不敢復出避暑録話余既購西安石經全本而未詳書者姓名及刋立始末走書頻陽詢李子德內翰李遣其嗣子叔青往盩厔從趙子函家抄示云唐天寶中刻九經於長安禮記以月令為首從李林甫之請也文宗時鄭覃以經籍刓繆建石讐刋凖漢故事太和七年敕唐言度復定石經字體於國子監立石九經并論語孝經爾雅共一百五十九卷字樣四十卷開成二年告成按六朝以前用分𨽻今石經皆正書且多倣歐虞法知其唐人書無疑禮記首月令以尊明皇諱純字以尊憲宗又知其非天寶以前人書矣則今西安府學石經乃唐文宗敕定而成於開成時者舊在務本坊韓建築新城棄之於野朱梁時劉鄩用尹玉翁請遷故唐尚書省之西域宋元祐中汲郡呂公始遷今學明嘉靖乙卯地震石經倒損西安府學生員王堯惠等按舊文集其缺字别刻小石立於碑旁以便摹補唐書謂文宗朝石經遺棄師法不足觀然其用筆雖出衆人而法猶不離歐虞恐非晚近所及惟王堯惠等補字大為繆紕今華下東生文豸家有乙卯以前榻本庶幾稱善焉觚賸徵應西伯作邑於豐文王之妃曰太姒夢商庭生棘太子發植梓樹於闕間化為松柏柞棫以告文王文王幣告群臣與發并拜吉夢季秋之甲子赤雀銜書及豐止於昌戶昌拜稽首受之其文要曰姬昌蒼帝子亡殷者紂册府元龜説苑云呂望年七十釣於渭渚得鯉刺魚腹得書文曰呂望封於齊望知其異史記齊世家注呂望埀釣渭水得玉璜遂為帝師白孔六帖白鹿原周平王東遷有白鹿遊於此原以是得名蓋秦運之象三秦記秦文公出獵獲黑龍此水德之瑞於是更命河曰德水封禪書烈王二年周太史儋見秦獻公曰始周與秦國合而别别五百載復合合十七嵗而霸王者出焉應劭曰周孝王封伯翳之後為侯伯與周五百載至昭王時西周君臣自歸獻其邑三十六城合也索隱曰自周以邑入秦至始皇初立政由太后嫪毐至九年誅毐正十七年史記秦本紀注竇皇后弟廣國字少君四五嵗時家貧為人所略賣自卜數日當為侯從其家之長安聞竇皇后新立上書自陳召見果是於是后持之泣乃厚賜田宅金錢家於長安景帝立封為章武侯史記外戚世家衛青為侯家人嘗從入至甘泉居室有一鉗徒相青曰貴人也官至封侯青笑曰人奴之生得毋笞罵即足矣安得封侯事乎建元二年青姊子夫得入宫幸上乃召青為建章監侍中元朔元年為車騎將軍擊胸奴封長平侯史記衛青傳建章宫後閣重櫟中索隱云重櫟欄楯之下有重欄處也有物出焉其狀似麋詔東方朔視之朔曰所謂騶牙者也逺方當來歸義而騶牙先見其齒前後若一齊等無牙故謂之騶牙後一嵗所混邪王果來降褚先生滑稽傳後漢扶風馬融勤學夢見一林花如繡錦夢中摘花食之及寤見天下文詞無所不知時人號為繡囊武陵記僕射孫士瑞謀誅董卓有人書呂字於布上負而行歌於市曰布乎有告卓者卓不悟帝大會未央殿卓朝升車既而馬驚墮泥還入更衣其少妻止之卓不從遂行呂布持矛刺卓趣兵斬之後漢書董卓傳長安劉志言任華州下邽縣尉此廨素凶遂於里內借宅然宅內不免有怪婢晨起理髮梳墮地婢俯取梳見牀下布袋中似有數嵗小兒婢引手取之袋內跳出婢驚懼走出舉家就視了無所見志言秩滿而卒五行記晉長安有張氏者晝獨處室有鳩自外入止於牀張氏惡之披懷而咒曰鳩爾來為我禍耶飛上承塵為我福耶飛入我懷鳩飛入懷乃化為一銅鈎從爾資産巨萬法苑編珠苻堅元年長安樵人於城內見金鼎走報堅堅遣載取到化為銅鼎入門又變大鐸異苑車頻秦書曰苻堅建元十二年髙陸縣民穿井得龜大二尺六寸背文負八卦古字堅以石為池養之十六年而死取其骨以問吉凶名為客龜大卜佐髙夢客龜言我將歸江南不遇死於秦曾於夢中自解曰龜三萬六千嵗而終終必亡國之徵也為謝玄破於淮肥自縊新城浮圖中秦祚因即淪矣水經注秦主堅以弟融為冀州牧將發祖於霸上母茍氏以融少子比發三至霸上其夕又竊如融所內外莫知是夜堅寢前殿太史奏天市南門屏內后妃星失明左右閽寺不見乃后妃移動之象也堅推問知之驚曰天道不逺又長安謡曰鳳凰鳳凰止阿房堅遂於阿房植桐數萬株以待之其後慕容沖入阿房城而止焉沖小字鳳十六國春秋前秦録韓徹者乾元中任隴州吳山令進士宇文覿辛稷並隨至吳山廳有大槐覿稷行視樹得一孔旁甚潤澤中有青氣上升為雲掘之深數尺得一塜有棺木已爛壞有少齒髮脛胯骨猶在語徹命佐史以新棺斂葬諸野佐史偷錢用小書函折骨埋之既至舍倉猝欲死徹令巫視之巫靈語云我晉將軍契苾鍔以戰死葬此塜近馬坊恆苦糞穢明府恩及幽壤胥吏酷惡乃以書函見貯骨長函短斷我胯脛不勝楚痛故復讐之耳徹自陳不明吏有偽欺當令市櫬以衣被相送可赦其罪又靈語曰尋當釋之然創造此謀是宇文七及辛四幽魂佩戴辛不久自當擢祿足光其身宇文命薄雖獲一第終不及祿言畢佐史見釋方獲禮葬半嵗呂崇賁為河東節度奏覿左衛兵曹河東書記敕賜衣一襲敕至覿受敕衣緑裳西向拜蹈奴忽倒地作鍔語謂汝勿作官何故受之後四月覿卒廣異記杜畿延年後延年徙杜陵子孫世居焉畿與李恢郭智有好恢子豐以才智顯智子沖有內實而無外觀二人各修子孫禮見畿既退畿嘆曰孝懿無子非徒無子殆將無家君謀為不死也其子足繼其業恢死後豐為中書令父子兄弟皆誅沖為代郡太守卒繼父業世乃服畿知人魏志杜畿傳注苻融為司𨽻校尉京兆人董豐遊學三年返家是夜妻為賊所殺妻兄疑豐殺之告豐有司豐不堪楚掠誣引殺妻融察而異之問曰汝行往還頗有怪異及卜筮不豐曰初將發夜夢乘馬南渡水反而北渡復自北而南馬停水中俯視見兩日在於水下馬左白而濕右黑而燥還之夜復夢如初問之筮者筮者云憂獄訟逺三枕避三沐既至妻為具沐夜授豐枕豐記筮者之言皆不從之妻乃自沐枕枕而寢融曰吾知之矣馬左而濕濕水也左水右馬馮字也兩日昌字也其馮昌殺之乎於是推檢獲昌具首服曰本與其妻謀殺董豐期以新沐枕枕為驗是以誤中婦人十六國春秋苻融傳後周太祖時有李順興者世傳漢築長城日已為北靣軍主或隱或見愚聖莫測永熙後齊神武興軍數十萬次沙苑太祖地狹兵少懼不敢敵須臾興來太祖請其䇿謀更無餘語直云黃狗逐黑狗急走出筋斗一箇出筋斗黃狗夾尾走語訖便去於是東軍旗幟服色尚黃西兵用黑太祖悟其言遂力戰大破神武於沙苑廣古今五行記北周明帝為岐州刺史公堂上時有圓雲若蓋五色相間經時而滅州人以為其下有寶器韋敬逺獨曰此天子氣也及閔帝廢迎立之嘉蓮燕語後周武帝時有強練者岐山人佯狂號曰強練冢宰晉國公宇文護未敗之日強練執一瓠到其門前撲破之云瓠破憐你子苦護被殺護之諸子皆楚毒而卒時臯公侯龍思兄弟被冢宰寵遇燻灼當時強練度其門思妻嫗等遣婢呼入為設飲食察其言語練謂思等云與我作婢衆嫗大笑練又云作婢會不免他人將去安能勝我未幾冢宰誅思兄弟亦同被戮廣古今五行記髙祖生於馮翊般若寺有尼曰此兒所從來甚異不可以俗間處乃將髙祖舍於别館躬自撫養皇妣嘗抱髙祖忽見頭上角出遍體鱗起大駭墮地尼自外至曰已驚我兒致令晚得天下為人龍顔額有五柱入頂目光外射有文在手曰王隋書髙祖紀長安朝堂即舊楊興村村門大樹見在初周代有異僧號為棖公言詞恍惚後多有驗時村人於樹下集議棖公逐之曰此天子坐處汝等何故居此及隋文帝即位便有遷都意西京雜志段綸仕隋為左親衛隱太子見而悅之妻以琅琊長公主舍髙祖之舊第數聞鼓吹之音視之無所覩綸謂主曰聞圖讖李氏當王今於第內有此祥必而家受籙之徵也及義兵西邁綸於藍田聚結兵馬得萬餘人迎接大軍拜金紫光祿大夫册府元龜西市隋曰利人市市西北隅有海池長安中僧法成所穿分永安渠水以注之為放生之所穿池得古石銘云百年為市而後為池自置立市至是時百餘年矣兩京記蕭吉行經華隂見楊素冢上有白氣屬天因筮之得旅三爻曰次焚僕喪其後必有滅門之禍未幾玄感以反族滅筮述太宗文皇帝以隋開皇十八年歲次戊午生於武功之别館初太宗在孕而語聲達於外后心異之將誕育后不之覺而太宗已生時有慶雲現瀰漫數里上屬於天二龍戲於門外水中經三日乃沖天而去册府元龜裴寂家貧無以自業詣京師經華嶽廟祝曰窮困至此敢修誠謁神鑒其運命若富貴可期當降吉夢夜夢白頭翁謂寂曰卿年三十已後方可得志終當位極人臣至武德中為司空册府元龜孫處俊嘗以諸子見思邈曰俊先顯侑晚貴全福在執兵後皆驗續前定録劉仁軌年七八歲時張冏藏過其門謂其父母曰此童骨法甚竒當有貴祿後仁軌為陳倉尉冏藏時被流劒南經岐州適馮長命為岐州刺史令看判司已下無人至五品者出逢仁軌却謂馮使君曰得貴人也遂細看之後至僕射曰僕二十年前於尉氏見一小兒骨法與公相類當時不問姓名不知誰耳軌笑曰尉氏小兒仁軌是也冏藏曰公不離四品若犯大罪即三品已上後竟位至左僕射定命録貞觀中張寶藏為金吾長史嘗歸櫟陽路逢少年畋獵割鮮野食倚樹長嘆曰張寶藏身年七十未嘗得一食酒肉旁一僧指曰六十日內官登三品何足嘆也言訖不見寶藏異之即時還京太宗病痢衆醫不效詔問殿庭左右能治重賞之寶藏曾困此疾即具疏以乳煎蓽茇方進上服之立差宣下宰臣與五品官魏徵難之逾月不進擬上疾復作復令進之一啜又平復上曰嘗令與進方人五品官不見除授何也徵懼曰奉詔之際未知文武上怒曰治得宰相不妨授三品我天子也豈不及汝耶與三品文官立授鴻臚卿時正六十日也獨異志衛公李靖始困於貧賤因過華山廟訴於神且請告以位宦所至辭色抗厲觀者異之佇立良久乃去出廟門百許步聞後有大聲曰李僕射好去顧不見人後竟至端揆隋唐佳話唐周仁軌萬年人也孝和皇后韋氏母黨纍遷并州長史性殘酷忽堂階下見一人臂如新斷血流瀝瀝令人送二十里外數日其臂尚在人咸怪之其月孝和崩仁軌以韋氏黨伏誅介士抽刀砍之仁軌舉臂承刃其臂墮地與所見者無異廣古今五行記開元中諌議大夫呂崇粹東平人美秀魁梧薄有詞彩宅在京永崇坊於家忽見數箇小兒腳脛自膝下自踝已上流血淋瀝如新截來旬日粹遇疾而卒廣古今五行記李相國揆以進士調集在京師聞宣平坊王生善易筮往問之生為開卦曰當得河南道一尉揆悒忿而去王生曰君無怏怏自此數月當為左拾遺揆怒未解生曰若果然幸一枉駕揆以書判不中第補汴州陳留尉始以王生之言有徵後詣之生於几下取一緘書以授之曰君除拾遺可發此緘揆藏之開元中郡府上書姓李者皆先謁宗正時李璆為宗長適遇上尊號揆既謁璆璆素聞其才請為表三通以次上之上召璆曰百官上表無如卿者璆頓首謝曰是臣從子陳留尉揆所為乃下詔召揆宣命宰臣試文詞揆自午及酉而成既封拆其緘塗八字旁注兩句既進翌日授左拾遺旬餘乃發王生緘三篇皆在其中而塗注亦如之遽命駕往宣平坊訪王生不復見矣前定録浮圖泓與張説置永樂東南第一宅有永巷者戒曰此宅西北隅最是王地慎勿於此取土越月泓又至謂曰此宅氣候忽然索漠甚必恐有取土於西北隅者視之果有取土坑三數皆深丈餘泓大驚曰禍事令公富貴一身而已更二十年外諸郎君皆不得天年公曰填之可乎泓曰客土無氣與地脈不相連也後公子均垍皆為祿山委任克復後均賜死洎長流常侍言旨李林甫宅即李靖宅有泓師者以道術聞嘗過其宅謂人曰後之人有能居此者貴不可言開元初林甫從而居焉泓師曰如是十有九年居相位然吾懼其異製中門則禍且及矣林甫果相玄宗及末年有人獻良馬甚髙而其門稍卑不可乘以過遂易而製既毁其簷忽有蛇千萬數在屋瓦中林甫惡之未幾林甫竟籍沒至此果十九年鴻書趙冬曦典選合薦銓吏一人麴思明以次當得而略不言問其故曰吾行年值未濟三爻居位不當自知明年方得官故不言也請書其事封泥省壁至期驗之久之上幸溫泉見白鹿升天改會昌為昭應縣冬曦獨注思明昭應尉意其不預知有此新邑以破其言也發壁觀書云爻位變鼎鼎取新也縣邑中行且有更名者三應上上居離體離為日主以昭其應必得昭應一尉驚以為神筮述此按鴻書所載馬遊秦事與全同乃記述之異明皇初登極夢二龍一符自紅霧中來上大隸姚崇宋璟四字扐之兩大樹上宛延而去上召申王圓兆王曰兩木相也二人名為天遣龍致於樹即知崇璟當為輔相兆矣上嘆異之龍城録開元二年六月左拾遺蔡孚獻龍池集請付太常以歌聖德初帝在藩與宋王等居於興慶里時人謂為五王子宅及景龍末宅內成池湧出泛灔清瑩流之不竭中有龜龍遊焉故羣臣歌之册府元龜唐封望卿僕射敖之子杜邠公悰鎮岐下請為判官其所居室壁有筆灑墨迹者望卿以指爪盡搯去之其色如喪沮侍兒或問其故望卿默不應無何病甚謂侍兒曰吾前日指搯墨迹其時惡之不能語汝每點乃一鬼字數日而卒玉泉子李林甫為相既久自以隂禍且多天下頗怨望有鬼災乃致方術士以禳之後得一術士曰可於長安市求一善射者以備之林甫乃於西市召募之得焉即資其衣食後一夕林甫會宴於庭度曲未終忽然中絶善射者異而聽之乃執弓矢踰垣以入伺之忽見垣之南有一物墮而下又一人踰來善射者一發中之乃驚去因至林甫奏樂之地見歌舞者若木偶狀視垣南墮下之物一囊而結者解其中有數百籖皆林甫及家僮名氏也於是以名呼一一而應明日術士來且賀以賴此人不然幾為所禍明公久專機要積戾萬狀自兹十稔乃非吾之所知其後林甫籍沒果期十年也宣室志開元中司天奏玄象有謫見其災甚重玄宗驚問曰何祥對曰當有名士三十人同日寃死今新第進士正應其數其年及第李蒙者貴主家壻上不言其事密戒主曰每有大遊宴汝愛壻可閉留於家主居昭國里時大合聲樂音曲逺暢曲江漲水聫舟數艘進士畢集蒙聞乃踰垣奔走羣衆愜望才登舟移就水中畫舸平沉聲妓篙工不知紀極三十進士無一生者獨異志張易之造一堂甚壯麗紅粉泥壁文柏帖柱琉璃沉香為飾夜有鬼書其壁曰能得幾時令削去明日復書之前後六七易之乃題其下曰一月即足自是不復書經半年籍沒入官朝野僉載郭子儀初從軍沙塞間至銀州夜忽見赤光仰視空中軿車繡幄中有一美女坐床垂足自天而下俯視子儀拜祝云今七月七日必是織女降臨願賜長壽富貴女笑曰大富貴亦壽考言訖冉冉升天猶正視子儀良久而隱子儀後立功貴盛威望烜赫大厯初鎮河中疾甚三軍憂懼公謂幕賔等曰吾此疾自知未便衰損因話所遇之事衆稱賀欣悅其後拜尚父年九十餘薨感遇傳貞元中扶風竇質與京兆韋旬同自亳入秦宿潼關逆旅竇夢至華嶽祠下見一女巫黑而長青裙素襦迎路拜揖請為之祝神竇不獲已遂聽之問其姓自稱趙氏及覺具言於韋明日至祠下有巫迎客容質妝服皆所夢也顧韋謂曰夢有徵也乃命從者視囊中得錢三鐶與之巫撫掌大笑謂同輩曰如所夢矣韋驚問之對曰昨夢二人從東來一髯而短者祝醑獲錢三鐶焉及旦乃遍述於同輩今則驗矣竇因問巫之姓氏同輩中曰姓趙氏自始及末若合符矣白行簡三夢記泓師云長安永寧坊東南是金盞地安邑里西是玉盞地後永寧為王鍔宅安邑為北平王馬燧宅後王馬皆進入官王宅纍賜韓𢎞正史憲誠李載義等所謂金盞破而成焉馬宅為奉誠園所謂玉盞破而不完也盧氏雜説天寶初有范氏居者能知人休咎顔魯公尉醴泉詣范居問命曰神巫某官階盡五品否居曰幾鄰於一品所望何其卑耶魯公曰官階盡五品著緋衫帶銀魚兒子補齋郎某之望滿矣范指座上紫絲布食簞曰顔郎於衫色如此其功勞名節皆稱是云常侍言旨天寶中李遐周頗有道術多在禁署徙居宫觀於所居院內題詩不啻千言皆預紀上皇幸蜀祿山僭位之事初亦不悟後方豁然略舉一篇云燕市人皆去函關馬不歸如逢山下鬼環上繫羅衣貴妃小字阿環山下鬼嵬字也朝野情詩肅宗初為皇太子天寶十三載觀安祿山有悖逆之狀恐危宗廟遂精誠祈夢其夜夢故內侍普寂等二人舁一紫案覆一黃帕自天而下直至帝前素版丹書文字甚多十五載玄宗幸蜀帝幸靈武次永壽縣雲氣見西北長數丈成橋閣之狀識者以為天子氣自是紫雲擁帝所乘馬聚散不時册府元龜張光晟為潼關卒奉役至華州過嶽祠遂脫衣買酒致奠金天王祀訖因寢於碑堂忽夢傳聲云喚張光晟即入一府署遙見當廳貴人如王者謂之曰欲知官祿但光晟拜相則天下太平言訖驚寤後頻立戰功積勞官至司農卿及德宗西狩光晟奔從忽謂同行朝官曰今日亂兵乃涇卒朱泚久在涇原素得人心今者在城儻收涇卒扶持則難制矣即奔馬詣泚曰人主出京公為大臣豈是晏居之日泚曰願從公去命駕將行而涇卒已集其門光晟為泚所縻拜僕射平章事統兵出戰大敗而還方寤神告為徵矣集異記苖帝師困於名場䇿蹇出都門貰酒藉草醺醉而寤久之既覺有老父坐其旁因揖敘以餘杯飲老父愧謝曰郎君寧要知前事耶苖曰某應舉已久有一第分乎曰大有事但更問曰一郡寧可及乎曰更向上曰廉察乎曰更向上苖乘醉猛言曰將相乎曰更向上苖怒全不信因肆言曰將相向上作天子乎老父曰天子真者不得假者即得苗都以為誕怪揖之而去後果為將相及德宗升遐攝冢宰三日幽間鼓吹李晟為將軍嘗謁桑道茂茂云異日為京兆尹慎少殺人西平曰武夫豈有京兆尹之望後興元收復西平兼京尹時桑公在俘囚中當斷之際告西平公忘少殺人之言耶西平釋之傳載略故殿中侍御史李稜貞元二年擢第是嵗渾太師瑊鎮蒲津請稜為管記從事稜乃曰某夙好藍田山水據使銜合得畿尉雖考秩賤如公勳望特為某奏請必諧矣渾遂表薦之德宗令中書商量稜聞桑道茂言事神中因往詣具以本末言之對曰從此二十年方合授此官稜未甚信經月餘稜詣執政謂曰足下資歷賤未合入畿尉所奏遂寢元和元年冬始入選吏曹果注得藍田縣尉續定命録貞元中萬年縣捕賊官李公春月與所知置鱠一客偶至氣色甚傲衆問所能曰某善知人食料李公曰且看今日鱠坐中有人不得喫者否客微笑曰唯足下不得喫李公怒曰此事若中奉五千若是妄語當遭契濶因促饌將就有一人走馬來云京兆尹召李公奔馬去適會有公事李公懼晚使報諸客但餐語庖人但留我兩碟良久走馬來諸人已餐畢獨所留鱠在焉李公脫衫就坐執筋而罵言未了官亭子仰屋上壞方數尺墮落食器破碎鱠雜糞埃李公驚異問厨者更有鱠否曰盡矣乃厚謝術士以錢五千與之逸史下邽延年里西南有故蘭若而無僧居唐元和八年居易丁母憂退居下邽其從祖兄皥自華州來訪居易途出於蘭若前及門見婦女十許人衣黃綾衣少長雜坐會語於佛屋下聲聞於門皥熱行方渴將就憩且求飲因下馬繫韁於門柱舉首忽不見視其聚談之所塵埃羃然無足迹由是意其非人上馬疾驅來告居易且聞其所言大抵多云王裔老如此若相與數其過者因同往訪焉果有王裔者即其里人也方徙居於蘭若之東北百餘步不浹旬而裔死不越月而妻死不踰時而裔之二子二婦及一孫亦死止餘一子曰明進大懼意新居不祥夜徙走遂免白居易集樂沖出入文場多蹇夜禱華嶽廟願知升黜之分如可求名者則重適關城如不可則無由再窺仙掌矣中夜忽夢一青綬人檢簿書報云來年有樂坤及第名已到冥簿不見樂沖也遂改名坤果如其説雲溪友議陸賔虞舉進士在京師有僧惟瑛者知術數每言必驗寶厯二年賔虞欲罷舉歸吳告惟瑛以行計瑛謂虞曰但取京兆薦送必在髙等至七月六日若食水族則殊等與及第必矣賔虞乃書於晉昌里之牖數月後因候一郎官回憩於從孫聞禮之舍有人惠雙鯉魚賔虞素嗜魚便令作羮後日因視牖間所書字則七月六日也遽命駕詣惟瑛且紿之曰將遊蒲關故以訪别瑛笑曰水族已食矣遊蒲關何為賔虞深信之因取薦京兆府果得殊等前定録新昌里尚書溫造宅桑道茂嘗居之庭有一柏樹甚高大桑以鐵數千斤鎮於柏樹下既而告人曰後有居者發吾所鎮之鐵則其家長當死唐太和元年溫造居其宅因修建堂宇發地營繕得其所鎮之鐵後數日造果卒宣室志唐興平西有梁生别墅其後園梨木太和四年冬十一月新雪霽後梨忽花發芳而且茂梁生以為吉兆有韋氏謂梁生曰木以春榮冬悴今反是可謂之吉兆乎月餘梁生父卒宣室志扶風竇寬家於梁山太和八年罷職歸治園屋命家僕伐一樹有血滂溜汪然注地食頃而盡寬知為怪由是閉門絶人事至明年鄭注李訓反寬與注連遂死於左禁軍中宣室志羅立言太和九年為京兆尹嘗因入朝既冠帶引鏡自視不見其首遂語於季弟約言後果為李訓連坐誅死宣室志太府卿崔潔在長安與進士陳彤同尋親故陳君曰當與足下於裴令公亭餐鱠崔公不信過天門街偶逢賣魚甚鮮崔都忘陳君之言遂令從者取錢買魚得十斤曰何處去得左右曰裴令公亭子甚近乃先遣人計會及升亭下馬方悟陳君之説崔公大驚曰何處得人斫鱠陳君曰但假刀砧之類當有第一部樂人來俄頃紫衣三四人至亭子遊看一人見魚曰極是珍鮮二君莫欲作鱠否某善此藝與郎君設手詰之乃梨園第一部樂徒也鱠將辦陳君曰此鱠與崔兄餐紫衣不得也既畢忽呼駕幸龍首池喚第一部音聲切者攜衫帶望門而去兩人既餐陳君又曰少頃有九品官來此得半碗清羮喫語未訖延陵縣尉李耿至將赴任與崔公中外親故來告辭方食羡次崔公曰有鱠否左右報已盡只有清羮少許公大笑曰令取來乃喫清羮半碗而去逸史鄭絪相公宅在昭國坊南門忽有物投瓦礫五六夜不絶乃移於安仁西門宅避之瓦礫又隨而至經久後歸昭國鄭公歸心釋門禪室方丈室蟢子滿室懸絲去地一二尺不知其數其夕瓦礫亦絶翌日拜相鴻書柳晦少有文學始以廕補咸通末官至拾遺因上疏不納乃去官廬於終南山一日入城於宣陽里忽遇一人求食晦與之此人但三嗅而已晦怪問之答曰吾隂府掌事者君自此三年當為相言訖不見晦未之信及黃巢犯闕求能檄者或薦晦巢乃逼使為檄命晦為中書舍人尋授為相補録記傳廣明年中鳳翔副使鄭昌圖未及第前欲罷舉時同里親表家僕自宋亳至告其主人云昨於榖水店逢見二黃衣使人同行至華嶽廟前二使曰吾二人乃今年送榜之使也自泰山來到金天處押署幸相遇僕遂請竊窺其榜使者曰不可汝但記之遂畫其地曰此年狀頭姓偏傍有阜名兩字下一字在口中榜尾之人姓偏傍亦有此阜名兩字下一字亦在口中遂去鄭公親表頗異其事遂訪岐副具話之且勉以就試昌圖其年狀頭及第榜尾鄒希回也姓名畫點皆同玉堂間話江陵副使李君嘗赴進士舉至華隂見白衣人在店李君與語甚洽同行至昭應曰某隱居西嶽荷郎君相厚莫要知向後事否君再拜懇請乃命紙筆於月下凡書三封次第緘題云甚急則開之乃去五六舉下第欲歸無糧曰此為窮矣書可開也遂焚香啓之曰可向青龍寺門前坐見訖遂往到已晚矣寺主僧將閉門見李君遂邀入具饌烹茶乃曰郎君何姓曰姓李僧驚曰松滋李長官識否李君起嚬蹙曰某先人也僧垂泣曰某久故舊適覺郎君酷似長官長官求官至此狼狽有錢二千貫寄某處今得郎君老僧此生無事矣及旦遂載鏹而去鬻宅安居遂為富室又三數年不第欲罷去思曰第二緘可以發也又啓之曰可西市鞦轡行頭坐見訖復往至即登樓飲酒聞其下有人言及第事李君驚而問之客曰侍郎郎君有切故要錢一千貫致及第郎君見在樓上房內可引見之云主司是親叔父乃靣定約束明年果及第後官至殿中江陵副使患心痛少頃數絶危迫頗甚謂其妻曰第三封可以開矣妻遂盥洗開視之云某日當死果不數刻而亡鴻書李宗回者應進士舉曾與一客自洛至關客云吾能先知人飲饌臨正旦一日將往華隂縣令與李公舊知李公謂客曰看明日到何物喫客撫掌曰大竒與公各飲一盞椒蔥酒食五般餛飩不得飯喫及到華隂縣令請二人就縣相見喜曰二賢衝寒且速暖兩大盞酒來著椒蔥一小奴與縣令耳語令曰有五盤餛飩總煮來二客食盡忽有佐吏從外走來云敕使到舊例合迎縣令驚忙揖二客鞍馬而去客遂出欲就店其僕結束先發已行數里二人大笑相與登途竟不得飯喫逸史蘇檢登第歸行及澄城縣止於縣樓上醉後夢其妻取筆硯篋中取紅箋剪數寸為詩曰楚水平如鏡周回白鳥飛金陵幾多地一去不知歸檢亦裁蜀箋賦詩曰還吳東去下澄城樓上清風酒半醒想得到家春已暮海棠千樹已凋零詩成俱送於所卧席下又見其妻笞檢所挈小青極甚及寤乃於席下得其詩視篋中紅箋亦有剪處小青其日暴疾已而東去及歸妻已卒問其日乃澄城縣所夢之日謁其塋時乃春暮四靣多海棠花聞竒録鄭注鎮鳳翔日有草如菌生於紫金帶上注喜謂芝瑞注又嘗置藥篋藥化青蠅數萬飛去注頗惡之未踰月被誅杜陽雜編長安城有孫家宅居之數世堂室甚古其堂前一柱忽生槐枝期年之後漸漸滋茂以至柱身通體變易壞其屋上衝祕藏不及衣冠士庶之來觀者車馬填咽不久偓處巖廊居節制人以為應三槐之兆玉堂間話江淮間術士姓吳旅遊長安有赴宏詞科者謁之術士曰公頭上焰光髙三丈必登髙第後果然唐遺史王晙任渭南已數載自云久厭此縣但得蒲州司馬可矣時奚三兒從北來見一鬼云送牒向渭南報明府改官蒲州司馬便與相隨來渭南見晙當時鬼在廳階下曲躬立果三數日改蒲州司馬改後二十餘日敕不到三兒後見前鬼問故鬼云緣王在任賸請官錢所以折除今折欲盡至某時當得上任上後驗言定命録鳳州賔佐王鄑員外在相國滿幕中時有客任三郎者謂王曰此地將受災官街大樹自枯事將逼矣可速脫此禍如其言乞於關隴尋醫十五六日至吳山縣又十許日鳳州人言已軍變矣滿公歸褒中同院皆死於難録異記南鄭縣尉孫旻為山南採訪支使嘗推覆在途舍於山館忽有美婦人面出於柱中顧旻而笑旻拜而祈之良久方滅懼不敢言後數年選授桑泉尉遇疾友人問疾旻乃言之而卒記聞何中正初及第聞郭從周精於卜求占終身從周贈詩云三字來時月正圓一麾從此出秦關錢塘春色濃如酒貪醉花間卧不還後中正以八月十五日改知制誥出秦關至杭州卒堅瓠集趙瑩華隂人解褐為康延孝從事同光中延孝鎮陜州會莊宗伐蜀命延孝騎將將行留瑩監修金天神祠功既集忽夢神召於前亭待以優禮謂瑩曰公當有前程所宜自愛因遺一劍一笏覺而駭異後為中書令出為晉昌節度移鎮華州册府元龜梁彭城王劉知俊鎮同州日因築營牆掘得一物重八十餘斤狀若油囊召賔幕將校問之留源曰此是寃氣所結古來囹圄之地或有焉寃死囚人精爽入地聚為此物源聞酒能忘憂請奠以醇醪或可稍釋耳然此物之出亦非吉徵也知俊命具酒饌祝酹復瘞之尋有叛城背主奔秦之事乃驗之矣鑒戒録初廢帝起於鳳翔與共事者五人客將房皓喜鬼神巫祝之説有瞽者張濛自言事太白山神神魏崔浩也其言吉凶無不中皓素信之嘗引濛見帝聞其語聲驚曰非人臣也皓使濛問于神神傳語曰三珠併一珠驢馬沒人驅歲月甲庚午中興戊巳土皓不曉其義使問濛濛曰神言如此我能傳之不能解也帝即以濛為館驛巡官帝將反而兵少又乏食由此甚懼使皓問濛濛傳神語曰王當有天下可無憂王思同圍鳳翔廢帝懼又遣皓問神神曰王兵少東兵來所以迎王也已而東兵果叛降于帝帝入京師即位之日册曰維應順元年歲次甲午四月庚午朔帝回視房皓曰張濛神言豈不驗哉五代史唐臣傳晉李専美字翊商京兆人後唐末帝鎮鳳翔専美為記室在岐下曾夢具裳簡立嵩山之頂及為端明殿學士與李嵩同列而班在其上册府元龜張籛初仕後唐在雍州因出遊近郊憩於大塜上忽有黃雀銜一銅錢置於前而去未幾復於衙院晝卧見二燕相鬪鬪畢各銜一錢落於籛首前後所獲三錢嘗祕於巾箱識者以為大富之徵莊宗同光末為西都知府先是魏王繼岌西征回至咸陽時渭水暴漲籛斷浮橋魏王至渭南自經死所有隨行輜車蜀川珍貨女伎寶馬並為籛所有繇是家財巨萬册府元龜陳希夷遊華隂令王睦倒屣門迎先生曰子更一年位值屯上爻主有大災吾之來此有意救子子守官如是神亦祐子乃出藥一粒睦起拜受服之更一年回都下馬驚墮汴水善沒者救之得不死按坎為水乘馬班如則驚墮之應也筮述先晉公謫華州召伯祖叔祖同詣陳希夷希夷坐久不語忽問曰更有子乎晉公曰仲子在舍希夷曰召之及至門希夷顧先文正曰二十年太平宰相顧伯祖曰進士及第叔祖曰倚兄作官或問希夷曰此君鼻偏如何希夷曰今日拜相明日鼻正又懇文正曰他日至此願放此地租稅其後卒如其言及真宗西祀汾隂文正以前言啓之上即詔釋雲臺觀租稅續聞見近録錢若水為舉子時見陳希夷於華山希夷曰明日當再來若水如期往見一老僧與希夷擁地爐坐熟視若水久之不語以火箸畫灰作做不得三字徐曰急流勇退人也若水辭去後為樞密使年方四十致仕老僧者麻衣道者也齊東野語种放隱終南山往華山訪陳摶摶聞其來倒屣迎之既即坐熟視曰君他日官至丞郎种曰我之來求道義之益而乃言及爵祿非我意也陳笑曰君骨法合得此官雖晦迹山林終不能安異日當自知之至真宗時以司諫召還山遷諌議大夫東封改給事中西祀改工部侍郎竟如摶之相也東軒筆録种彜叔靖康初以保靖節鉞致仕居長安村墅一夕旌節有聲甚異旦而中使至遂起五代時安重誨王峻比嘗有此二人者皆得禍彜叔雖自是登樞府然功名不成亦非吉兆也老學庵筆記蘇孝澠池人正統時除知武功甲子當鄉試孝夢神告曰汝縣合舉二人明日萃當試者十一人置十一鬮以二花字內之曰得花者舉已而李紀張翺得後果二子得舉武功志安塞馬懋才為諸生時鄰村友人招之飲既夜醉而獨歸見傍溪燈火就之有女子髙髻雲鬟形容秀麗迎馬生至其家列酒殽對飲大暢臨行贈詩末句云得意須逢張子撰沒時竹葉繞槐隂馬生固知近村無是居也疑之斷所佩帶置之道上明日至其地見古墓纍纍前所遺帶在荆棘叢中後馬生舉進士歷官副憲登嶽陽樓讀壁間詩有張子撰名喟然曰吾止此矣既而果免官其所謂竹葉槐隂亦歷歷皆驗賈志嘉靖庚寅夏韓城人石道立靣生惡瘡數日瘡且腫潰亂如祟忽自誦曰鬼火三更夜鵑聲二月天又土埋千古恨月照一天愁又窮猿悲夜月孤鴈唳秋風又孤窆荒墳空夜夜琪花瑶草自年年悽惋之辭誦不絶口俄而索水或以碗水與之一吸而盡復大聲曰飲瀑布之清冽回膏肓之沉疴即瞑而卧須臾瘡潰而蘇辛卯六月罹渠妻之變識其日正誦詩時也人以為鼓盆之讖西安府志劉以平諸生時夢入宫殿有王者命坐對奕又至一所石門上有聫云鸚鵡能回千載夢麒麟空卧萬年秋不解所謂既登第遷秩陜西行太僕寺卿過武則天墓墓上石刻一聫即夢中所見也隴蜀餘聞明鳳翔孝廉王鼎安字磐石崇禎十六年十月逆賊李自成陷西安縉紳有汚偽署者鼎安頓足大哭痛憤不食遂疾作一日謂其父曰兒自遘禍以來不復作春明之夢疇昔之夜夢至京師是魂魄將與國家永終耳哽咽不言者久之踰月聞京師不守遂一慟而絶乃知見夢之日為都城破亡之日也袁楷王孝廉小傳長安薦福寺塔名小雁塔唐時建凡十五級嘉靖乙卯地震裂為二及癸亥地震復合滇逆之變王輔臣叛據平涼塔忽中裂亂平塔復如故隴蜀餘聞瑣碎黃帝時西王母獻昭華玉琯漢入關中秦府庫所藏有笛長二尺二寸亦名昭華琯西京雜記龍門禹鑿山斷門一里餘黃河自中流下岸不通車馬每暮春之際有黃鯉魚逆流而上得者便化為龍又林登云龍門之下每嵗季春有黃鯉自海及諸川爭來赴之一嵗中登龍門者不過七十二初登龍門即有雲雨隨之天火自後燒其尾乃化為龍三秦記夏啓以庚年鑄銅劍長三尺九寸後藏之秦望山古今刀劍録周穆王遊元池植竹竹皆成斑其大如椽其密如簀盩厔縣志盩按元池在厔穆王獵漆澤得白狐玄豹潛確類書穆王尚神有尹軌杜沖居終南山尹真人草棲之所因號樓觀蓋道觀之初也馮志秦穆公時扶風獲一石佛公不識棄馬坊中由余往觀之曰此佛也穆公取安清淨處墨池浪語穆公女弄玉有容德蕭史為燒水銀作粉與塗名飛雲丹天祿餘識盩厔升天臺上有再生柏世傳老子説經於此見二柏枯以針炙之復生今尚鬱茂賈志秦始皇令蒙驁伐于闐國得美玉二塊髙七八尺又鬼方進一玉工絶巧命刻玉以為虎虎即躍去遣邏候捕之竟不得至漢元鼎元年未央宫左右有白虎見閽人驚焉命獵者羅致獲一虎乃于闐玉所刻也武帝以為瑞遂建白虎殿鴻書始皇嘗鑄二劍銘曰定秦小篆書李斯刻埋在阿房宫閣下一在觀臺下長三尺六寸古今刀劍録秦咸陽宫中有鑄銅十二枚坐髙皆三五尺列在一筵上琴築竽笙各有所執皆組綬華采儼若生人筵下有銅管上口高數尺其一管空內有繩大如指使一人吹空管一人紐繩則琴瑟竽築皆作與真樂不異有琴長六尺安十三絃二十六徽皆七寶飾之銘曰璵璠之樂有玉笛長二尺三寸二十六孔吹之則見車馬山林隱隱相次息亦不見名曰昭華之管西京雜記三秦記云始皇作地市與生死人交易令云生人不得欺死人物市吏告始皇云死者陵生人生人定入市門斬斷馬脊故秦地市有斷馬郡國志云始皇陵有銀蠶金雁以多竒物故俗云秦王地市天中記昔始皇為塜斂天下竒材異木為宫傾逺方竒寶於塜中為川瀆山嶽之形以沙棠沉檀為舟楫金銀為鳬雁琉璃雜寶為龜魚設機舟自運動盤旋鳬雁龜魚時出沒隱見又於海中作玉象鯨魚銜火珠為星以代膏燭項羽入關開塜見所埋工匠皆久而不死琢石為龍鳳仙人及作碑辭讚文好事者驗諸史傳皆非葬時所有則知生埋匠者之所作也後人以其辭多愁苦詛怨之言因名碑曰怨碑賈志渭南漁父於渭水中得秦阿房宫香奩一具色如鸚哥羽毛好事者爭購之筠廊偶筆渭水過長安縣北又東南徑兩石人北秦始皇造橋鐵鐓重不勝故刻石作力士孟賁等像以祭之鐓乃可移動水經注秦蒙恬始作秦筆以枯木為管以鹿毛為柱羊毛為被所謂蒼毫也古今注四皓茹芝顧紫芝非靈芝根形似芝而味反苦於蕨但性質堅重食之耐飢四皓歌云可以療飢者此也商州志秦始皇斂天下銅鐵作銅簴於咸陽漢髙帝廟有銅簴二魏明帝徙之洛陽賈志漢髙祖入咸陽周行秦府庫金玉寶珍如山有青玉五枝燈髙七尺五寸作䖻螭以口銜燈燈燃鱗甲皆動煥耀若列星西京雜記漢髙祖入咸陽宫得方鏡廣四尺九寸表裏有明人來照之影則倒見以手捧心可見腸胃五臟西京雜記朝邑嘉靖甲寅河決西關人探水中得銀甲刺有魏豹名字縣志漢髙帝廟巨鐘十枚其容受千石撞之聲聞百里賈志漢髙長陵漢宣杜陵其鐘皆在長安夏侯征西欲徙詣洛陽重不能致賈志武帝為七寶牀雜寶鞍厠寶屏風列寶帳設於桂宫時人謂之四寶宫西京雜記元封三年大秦國貢花蹄牛蹄如蓮花善走多力帝使輦銅石以起望仙宫迹在石上皆如花形洞冥記元封中數過國獻能言龜東方朔教帝承桂露以飲之置於通風之臺欲往卜命東方朔問焉言無不中賈志漢武習水戰作昆明池釣魚綸絶而去夢魚求去其鈎明日帝戲於池見魚銜索為去之復遊於池得珠一雙獨異志漢武帝起招仙閣於甘泉宫西其上懸浮金輕玉之磬浮金者自浮水上輕玉者其質貞明而輕也洞冥記積草池中有珊瑚樹髙一丈二尺一本三柯上有四百六十二條是南越王趙他所獻號為烽火樹至夜光景常欲燃西京雜記武帝時西海國獻膠五兩帝以付外庫餘膠半兩西使佩以自隨後從帝射於甘泉宫帝弓弦斷西使乞以所送餘香膠續之乃以口濡膠為水注斷弦兩頭相連注弦遂相著帝使力士各引其一頭終不相離因名曰續弦膠博物志漢武帝凌波殿以桂為柱風來自香翰林雜事鈔武帝作酒池以誇羌胡飲以鐵杯重不能舉皆低首牛飲寰宇記太初三年起甘泉望風臺臺上得白珠如花一枝帝以錦蓋覆之如照月因名照月珠洞冥記月支香天漢二年月支國貢長安中大疫使者請燒以辟疫宫中病者瘥長安百里內聞其香數月不散香譜自元成訖王莽京師富人杜陵樊嘉茂陵摯綱平陵如氏苴氏長安丹王君房豉樊少翁王孫大卿為天下髙訾樊嘉五千萬其餘皆巨萬漢書貨殖傳光武在長安時嘗與宋佑共買蜜合藥帝追念之賜佑蜜數顧問何如在長安共買蜜乎册府元龜李廣與兄弟獵於宜山之北見卧虎焉射之一矢即斃斷其頭為枕示服猛也鑄銅象其形為溲器示厭辱之也侯鯖録唐明皇於芙蓉園得一白鹿山人王旻曰此漢時鹿也上命左右周視於角端雪毛中得一銅牌刻之曰宜春苑中白鹿上目之曰仙客潛確類書昭帝時茂陵人獻寶劍上銘曰直千金壽萬歲西京記漢昭帝遊渭水使羣臣漁釣為樂時大夫任緒釣得白蛟長三丈若大蛇無鱗甲頭有一角長二尺牙出唇外帝曰此魚鱔之類非珍祥也乃命大官為鮓骨青肉紫味甚美拾遺記大橫吹小橫吹並以竹為之昔張博望入西域傳其法於西京得摩訶勒一曲李延年因之更造新聲二十八解漢時常給邊將魏晉以後二十八解又不復存其所用者惟黃鶴隴頭水出關入關出塞入塞折楊柳黃覃子赤之楊望行人十四曲也賈志章帝建初七年十月岐山得銅器形似酒樽獻之册府元龜黃忠從漢先主定南郡得一刀赤如血於漢中擊夏侯軍一日之中手刃百數古今刀劒録鞞舞歌五曲內有關中有賢女一章相和歌三十曲內有度關山亦曰度關曲賈志唐公昉成固人白日升天雞鳴天上狗吠雲中惟以鼠惡留之鼠乃感激以月晦日吐腸胃更生故時人謂之唐鼠水經注西京化度廢寺有殭石徑二尺餘孔穴通連若欄楯樓臺之狀號曰蟻宫昔有人見大蟻萬計羣聚皆金色因掘地及泉得此石焉西京雜録漢中有虎生角道家云虎千年則牙蛻而角生述異記晉孝武帝太元元年於華山頂埋一劍銘曰神劍𨽻書古今刀劍録魏興黃金山有楠樹一年東邊榮西邊枯後年西邊榮東邊枯年年如此張華云交讓也任昉述異記張楷居華山谷中能為五里霧學其術者如市故曰霧市神仙傳前燕録石季龍使人採藥上華山得玉版潛確類書赫連龍升七年造五兵器鋭精利乃咸百錬為龍雀大環號曰大夏龍雀銘其背曰古之利器吳楚湛盧大夏龍雀名冠神都可以懷逺可以柔逋如風靡草威服九區世甚珍之水經注丹水出上洛縣冡嶺山入於支汋水中有丹魚夏至十夜伺魚浮出水有赤光如火網取割其血塗足涉水如履平地抱朴子咸陽嶽寺後有周武帝冠其上綴珠大如瑞梅歷代不以為寶天后時有士人過寺見珠戲取之諸胡以五萬緡市之鴻書京城南隅芙蓉園本曲江園隋文帝以曲名不正詔改之隋唐佳話隋文帝時大宛獻千里馬號曰獅子驄隋末不知所在唐文皇敕訪之同州刺史宇文士及得於朝邑麵家挽磑騣凶鬯匕尾焦秃皮肉穿穴及見之悲泣帝自出長樂坡馬到新豐向西鳴躍帝甚喜飼以鐘乳仍生五駒皆千里足也朝野僉載武功蘇威有鏡日蝕既鏡亦昏黑日蝕半缺鏡亦半昏珍珠船武德中坊州西南慈烏川有郝積者見群鹿常在山上逐去還來異之掘鹿所止處得石像髙一丈四尺許移出川中村內朝野僉載唐慈恩寺有巨雁集於庭僧捕得將烹食之一老僧曰此雁王也因瘞之造塔於上名雁塔志林長安興福寺有十光佛院是隋所制貞觀中寺僧慮有摧圮欲新其土木乃將毁撤既啓戶見有蛇萬數連貫在地蛇蟠繞如積搖首張喙若吞噬之狀寺僧大懼不敢除毁宣室志唐太宗養一白鶻號曰將軍取鳥常驅至於殿前然後擊殺故名落鴈殿上恆令送書從京至東都與魏王仍取報日往返數回亦陸機黃耳之徒歟朝野僉載唐太宗破高昌收馬乳葡萄種於苑中併得酒法仍自損益造酒成緑色芳香酷烈味若醍醐南部新書不空三藏塔前多老松歲旱則官伐其枝為龍骨以祈雨蓋三藏役龍意其樹必有靈也寺塔記開元中三輔大旱玄宗密投玉龍子於南內之龍池俄而雲物暴起風雨隨作及幸西蜀車駕次渭水左右侍御有臨流濯弄者於沙中得之上聞驚喜視之泫然流泣曰此吾昔時所寶玉龍子也自後每夜中光彩輝燭一室上既還京為小黃門攘竊以遺李輔國常置匱中輔國將敗夜聞匱中有聲開視之已亡其所明皇雜録唐故事天下有寃者許哭於太宗昭陵之下聞見後録天寶十載上命有司為安祿山治第於親仁坊敕令但求壯麗不限財力既成具幄帟器皿充牣其中白檀牀二皆長丈濶六尺銀平脫屏風帳方丈六尺於厨廏之物皆飾以金銀金飯􅑥二銀淘盆二皆受五斗織銀絲筐及笊籬各一他物稱是通鑑天寶中興慶池小龍嘗出遊宫垣南溝水中蜿蜒竒狀靡不瞻覩及鑾輿西幸一夕乘雲雨自池中望西南而去上至嘉陵江將乘舟有龍翼舟而進上泫然流涕顧謂左右曰此吾興慶池中龍也命以酒沃酬之於是龍振甲而登天明皇十七事長安聖相寺有賢者禪院修道佛座下有一蛇初大一圍後四十餘年蛇如堂柱開元中賢者夜至佛堂光燦滿堂因得徑寸珠至市髙舉價有胡人云蚌珠則貴此乃蛇珠多至千貫賢者嘆伏遂賣焉廣異記藍田縣嵗貢氷常在冬杪如藍水不氷則主吏宣命以祭一夕而成唐闕史崔希喬以仁孝友悌憂哀毁過禮為鄭縣丞芝草生所居堂一夕而葩蓋盈尺州以聞遷監察御史白孔六帖長安王元寶家有一皮扇子製作甚質每暑月宴客即以此扇子置於座前使新水灑之則颯然風生巡酒之間客有寒色遂命徹去明皇亦嘗差中使去取看愛而不受帝曰此龍皮扇子也開天遺事明皇在位靈昌郡得異馬於河其狀龍鱗虺尾拳毛環目肉鬛居帝闕二十年遇禍亂帝西幸馬至咸陽西入渭水化為龍遊泳去白孔六帖明皇樂民間清明節鬪雞戲及即位治雞坊索長安雄雞金尾鐵距髙冠昂首千數養於雞坊選六軍小兒五百教飼之時賈昌為五百小兒長甚愛幸之金帛日至其家東城老父傳梨園弟子皆居宜春北院時有馬仙期李龜年賀懷智洞知律度中官自蜀回得琵琶以獻其槽以羅沙檀為之光潤如玉有金縷紅文蹙成雙鳳珍珠船玄宗時富平産一神羊肉角當項白毛上捧議者以為獬酉陽雜俎蟬未脫時名轉化相傳言蛣蜣所化秀才韋翾家在杜曲嘗冬中掘樹根轉化附於朽處怪之村人言蟬固朽木所化也翾因剖一視之腹中猶實爛木酉陽雜俎太白山居士郭體以繩係一鐵片子鳥獸聞之即集庭下名曰唤鐵開元遺事馮宿為華州刺史以父名子華拜章乞罷改左散騎常侍册府元龜沉香亭木芍藥朝紅暮黃午碧夜白帝曰此木之妖也白孔六帖華清宫一鹿十年精俊不衰人呼曰角仙陶穀清異録虢國夫人有夜明枕設於堂中光照一室不假燈燭開天遺事開元末西國獻獅子至長安西道中繫於驛樹樹近井獅子哮吼若不自安俄頃風雷大至果有龍出井中而去唐國史補楊貴妃死之日馬嵬媪得錦袎襪一隻相遇過客一玩百錢前後獲錢無數唐太真外傳馬嵬老媪拾得太真襪以致富其女名玉飛得太真雀頭履一隻真珠口以薄檀為苴長僅三寸玉飛奉為異寶不輕示人嫏嬛記唐同昌公主堂中設却寒簾類玳瑁斑有紫色云却寒鳥骨所為杜陽雜編髻始自燧人氏周文王加珠翠翹花名曰鳳髻長安城中有盤桓髻驚鵠髻又拋家髻及倭髻鬟髻品白太傅女金鸞十歲忽書北山移文樂天方買終南紫石欲開文士傅遂輟以録之下黃私記九成宫磚瓦堅潤倍石完好者磨之為硯可方銅雀麟遊縣志藍橋驛乞玉漿黑犀合子下欵妙觀三十二年周旋多慶先音永寶十四字伊世珍嫏嬛記王維輞川林下坐用雷門四老石燈滅則石中鑽火白孔六帖武功蘇頲有一錦紋花石鏤為筆架嘗置於硯席間每天欲雨即此石架津出如汗逡巡而雨頲以此常為雨候固無差開天遺事唐元和二年紅崖峪冶夫將化虎衆以水沃之不果商州志房綰嘗修學終南山谷中忽聞聲若戛銅器之屬問父老云此龍吟也不久雨至矣綰望之冉冉雲氣遊漫果驟雨作靈怪録唐華清宫今靈泉觀也十聖殿之西南隅十數步間有皂莢一株合數人抱相傳明皇洎貴妃共植於此每歲結實必有十數莢合歡也墨客揮犀太和五年麟州刺史崔應奏刺史銅魚貞元十七年蕃冦陷州城因以失墜今請敕所司鑄賜從之册府元龜有鷙曰鶻穴於長安薦福浮圖冬之夕是鶻必取鳥之盈握者完而致之以燠其爪掌左右而易之旦則執而上浮圖之跂焉者縱之延其首以望之極其所如往必背而去焉茍東矣則是日不復東逐柳宗元鶻説上嘗幸興慶宫於復壁間得寶匣匣中獲玉鞭鞭末有文曰軟玉鞭即天寶中異國所獻光可鑑物屈之則頭尾相就舒之則徑直如繩杜陽雜編安樂公主有織成裙直錢一億花卉鳥獸皆如粟粒正視旁視日中影中各為一色通鑑馬燧之子暢以第中大杏饋竇文場以進德宗德宗未嘗見頗怪之令中使就封杏樹暢懼進宅廢為奉誠園屋木皆拆入內國史補興善寺有牡丹一窠元和中著花一千二百朵其色有正暈倒暈淺紅淺紫深紫黃白檀等獨無深紅又有花葉中無抹心者重臺花者其花靣徑七八寸酉陽雜俎興善寺素師院牡丹色絶佳元和末一枝花合歡酉陽雜俎唐中葉長安少年多以詩句鑱涅肌膚夸詭力剽奪坊間更有取名賢詩中意細刺樹木人物至有周身用白樂天詩意刺涅人呼為白舍人行圖者名為劄青云全唐詩話李釋諫議知鳳翔既卒有蝴蝶數萬自殯所以至府宇蔽映無下足處府官祭奠接武不相辨揮之不開踐踏成泥其大者如扇逾月方散癸辛雜識雍之洋縣念佛巖下有潭如碧鏡每歲五日巳午間忽有泡光出色艷異甚常時則無方輿勝覽唐文宗好食蛤蜊一旦有擘之不裂者上祝之俄頃自開中有二人形眉端秀體質悉備螺髻瓔珞足履菡蓞上遂置於檀香盒賜興善寺令致敬禮杜陽雜編長安敦化坊百姓家太和中有木蘭一樹花色深紅太平廣記慈恩寺唐三藏院後簷階開成末有苔狀如古苣布於磚上色如藍緑輕軟可愛談論僧義林太和初改葬基法師開冡香氣襲人磚上苔厚二寸餘作金色氣如爇檀酉陽雜俎武宗患心熱之疾醫藥罔瘳時有言青城山邢道士者妙於方藥帝即召見之道士以肘後緑囊中青丹兩粒及取梨絞汁進之帝疾尋愈問其丹為何物先生曰赤城山頂有青芝兩株太白南溪有紫花梨一樹臣昔歲曾遊二山偶獲兩寶合煉成丹幸逢陛下服之耳目記夏侯孜為宣宗山陵使開真陵用功尤至鑿皇堂深及袤丈於堅石中得折金叉半股其長如掌餘尚銜石中工乃抉取以獻孜孜以寢園方近其事稍異因隱而不奏唐闕史唐盧元裕子翰言太守少時嘗結友讀書終南山日晚溪行崖中得一圓石瑩白如鑑方執玩忽墜地而拆中有白魚約長寸餘隨石宛轉落澗中漸盈尺俄長丈餘鼓鬐掉尾雲雷暴興風雨大至紀聞康老子即長安富家子落魄不事生計常與國樂遊處一旦家産蕩盡偶一老媪持舊錦褥貨鬻乃以半千獲之尋有波斯見大驚謂康曰何處得此是氷蠶絲所織若暑月陳於座可致一室清涼即酬千萬康得之還與國樂追歡不經年復盡尋卒後樂人嗟惜之遂製曲名得至寶樂府雜録商州有人患大風家人惡之山中為起茅舍有烏蛇墜酒罌中病人不知飲酒漸差罌底見蛇骨方知其由也朝野僉載華山毛女峯有𨽻字曰伏苓諸山皆假惟此者真一旦一九三斗一斤疑為服伏苓法也陳後山談叢鳳翔知客郭璩其父曾主作坊將解一木其間疑有鐵石鋸不可入遂以新鋸兼焚香祝之其鋸乃行及破木文有二馬形一黑一赤相齧其口鼻鬃尾蹄腳筋骨與生無異聞竒録長安持國寺門前有槐樹數株金監買一株令所使巧工解之每片一天王塔戟成就焉太平廣記華州三家店西北道邊有槐甚大蔥鬱周回可蔭數畝槐有癭形如二豬相趂奔走其回顧口耳頭足一如塑者竒聞録黃巢陷京城南康王氏有鏡六鼻常生雲煙照之則左右前三方事皆見王氏即京城照之巢冦兵甲如在目前上平都邑以映日紗囊取入禁中白孔六帖初長安自石門之奔宫殿焚圮及岐人再逆火閭里皆盡宫城昏夜狐狸鳴啼無人迹沙陀列傳同光二年五月故秦王李茂貞遣使王修進遺留禮物水晶鞍盤玉帶馬瑙酒杯翡翠爵琉璃瓶玳瑁唾盂銀蓮花座珊瑚樹一株軍器繒絲錦等册府元龜京師玄都觀老鹿將有客來輒夜鳴道士每候之無失潛確類書藍田山悟真寺髙僧寫涅槃經羣鴿自空中銜水添硯珍珠船長安宫南靈臺有相風烏或云此烏遇千里風乃動述征記豫丙子奉使祭告西嶽於玉泉院見無憂樹四株此樹與青柯坪婆羅樹皆西域種香祖筆記酒有富平之石洞春京城之西市腔蝦蟇陵郎官清阿婆清唐國史補長安富民羅會以剔糞自業里中謂之雞肆會世副其業家財巨萬嘗有士人陸景暘會邀過所止館舍甚麗入內梳洗衫又極鮮屏風氊褥烹宰無所不有景暘問曰主人即如此快活何為不罷惡事會曰吾中間停廢一二年奴婢死亡牛馬散失復業已來家途稍遂非情願也分合如此朝野僉載王蜀將田承肇戍鳳翔憩於林下忽見淨地中有小樹一莖高數尺並無柯葉尤甚光滑肇就之玩弄以手上下摩婆頃刻手指如中毒苦不禁於是歸營臂膊已粗於桶時村嫗善禁居深山中急使人召得嫗曰此胎生七寸蛇戲處噴毒在樹間捫著枝立合致卒急使人就彼斸之果獲二蛇斃之嫗遂禁勒自膊間趂漸漸下至於腕又併趂入食指盡食指一節趂之不出蹙成一毬子許肉丸遂以利刀斷此一節所患方除玉堂間話朱梁尹皓鎮華州夏將半出城巡警因下馬於荒地中得一物如石又如卵其色青黑光滑可愛見村院佛遂置於像前其夜雷霆大震猛雨如注天火燒佛堂蓋龍卵也院外桞樹數百株皆倒植之其卵已失玉堂間話蜀庚午嵗金州刺史王宗朗奏洵水畔有青煙廟數日廟上煙雲昏晦日夜奏樂忽一旦水波騰躍有羣龍出水上大者數丈小者丈餘如五方之色如牛馬驢羊之形大小五百纍纍接迹行入漢江却過廟所復往數里或隱或見三日乃止録異記長安道中有行人倦息古松下回視巨蟒長丈餘宛轉荆棘間若傷病者諦視之見腦門上蟲大如粟粒色紅如丹取置地以足􅝌之逡巡蛇去行者覺足間微癢須臾愈劇毒氣俄升於股旬日潰爛遂墜股以死細微之物其毒至是終莫知其名墨客揮犀孟昶中書舍人劉光袵進桃核酒杯云得於華山張唐英後蜀紀事舊商山路多鷙獸害行旅適夫騾羣早行俄有虎自藂薄中躍出攫一夫而去其同羣者莫敢回顧逮至食時遭攫者却來衆驚異競問其由徐曰虎初銜至路左巖崕之上前有萬仞清溪溪南有洞洞口有小虎子數枚顧望其母欣欣然若有所待虎置某崖側靣溪洞呌吼以呼諸子某因便潛伸腳於虎背盡力一踏虎失腳墮於深澗不復可登是以脫身至此蓋虎欲生致此人按演諸子是以不傷真可謂脫身於虎口玉堂間話洵陽縣百姓柏君懷於漢江勒漠潭採得魚長數尺身上有字云三度過海兩度上漢行至勒漠命屬柏君録異記梁山有漢武帝廟至今有祭者往往有一二百蝴蝶降祠所享其食近之不驚徹饌然後羣去時謂武帝侍從捉之者病珍珠船王景源云有韓奉議為隴州通守家人得鸚歌忽語家人曰鸚歌數日來甚思量鄉地家人憐之曰放你甚易此去隴州數千里怎生歸得曰鸚歌亦自記得來時驛程道路家人即啓籠解縚且祝其好去遂振翼向西而去數月有經吏何忠者自隴州差至京師始出州城忽聞木杪有呼急足者仰視之鸚歌曰你記得我否我即韓通判家鸚歌也你到京師為我傳語通判家鸚歌已到鄉地深謝見放也忠至京具言所見舉家驚異且念其慧黠能偵候何忠傳達其言為可念者春浦紀聞有關中商得鸚鵡於隴山能人言商愛之偶以事下獄旬日歸歎恨不已鸚鵡曰郎在獄數日已不堪鸚鵡遭籠閉纍年奈何商感之攜往隴山泣涕放之去後每商之同輩過隴山鸚鵡必於林間問郎無恙託寄聲也聞見前録長安近城官道側有大古塜以當行人常所往來故獨久存不毁建炎初冦亂有人發之得古銅鐘鼎之屬甚多驗欵識皆三代物塜為隧道窟室土堅如石周匝皆刻成人物侍衛之狀其冠服大人則幞頭婦人則段紒衣皆寬袖乃知數千載前冠服已嘗如此暌車志長安人物繁習俗侈喪葬陳拽寓像其表以綾綃金銀者曰大脫空褚外而設色者曰小脫空製造列肆茅行俗謂之茅行家事陶穀清異録東坡云爛蒸同州羊灌以杏酪食以匕不以筯亦大快事澄懷録題鳳翔東院王畫壁云嘉祐癸卯上元夜來觀玉維摩詰筆時夜已闌殘燈耿然畫僧踽踽欲動恍然久之東坡題跋雙槐在鄠縣治大門內宋嘉祐間程明道先生為主簿時手植至今已數百年老幹扶踈狀若虬龍鄠縣志鄜州田氏作泥孩兒名天下態度無窮雖京師工效之莫能及一對直至十縑小者二三寸大者尺餘豫家舊藏一卧者有小字云鄜畤田玘製老學庵筆記豫官長安時或言杜鄠民家有江表傳英雄志因為外臺言之亟委官以取民驚懼焚之邵博聞見後録唐羯鼓曲惟邠州一父老能之有大合蟬滴滴泉之曲豫在鄜延時尚聞其聲筆談長安安信之為豫言舊藏韓退之集第二十六二十七二卷繭紙正書有退之親改定字後為張浮休取去聞見後録長安民契劵至有云某處至花萼樓某處至含元殿者蓋盡為禾黍矣興慶池偶存十三至今為弔古之地老學庵筆記馮蕘給事親仁坊有宅南靣山亭尤多養鵝鴨及雜禽之類極多常遣一家人掌之時人謂之雀省玉泉子沈存中帥鄜延日以石燭煙作墨堅重而黑在松煙之上東坡題跋蘇子由欒城集有岐下詩二十一韻寄詠子瞻稱鳳翔廨舍內有牡丹一叢四十餘枝枝大如斗是東坡以斗酒易之者在蓮池亭之北鳳翔縣志醴泉老軍營有蝎子塜人不動土無蝎如動土蝎出無數醴泉縣志棲霞觀中有至元間商州同知孟文昌碑光瑩如鏡可鑒碑趺之龜白色玉光嘗泚汗如珠上徹碑巔階除古柏周二十尺身枝俱旋理如蠣如螺謀伐者立致竒災所謂棲霞三異也雒南縣志寶雞縣有獨角獸樵者見其卧林間或搏虎而食之食輒餘其半山家每得殘虎以飽又云南山有蟒噓氣成雲人入其中輒僵陳貞父宗雜録興元府火飛燼落天慶觀殿下古柏上柏中空盡焚臭聞逺近明日得如羊肋骨者數百枚蓋大蛇也帥楊掌武每出以視客云聞見後録近嵗延州永寧關大河岸崩入地數十尺土下得竹筍一林凡百莖根幹相連悉化為石適有中人過亦取數莖去云欲進呈延郡素無竹此入在數十尺土下不知其何代物無乃曠古以前地卑氣濕而宜竹耶夢溪筆談中部縣雕窠窟去城十里雕鸇孕卵其間至今多出鷙鳥延安府志華山陳摶有靈豆服一粒四十九日不飢筋力如故顔色若嬰兒世罕得服之者貴耳録太平興國三年四月秦嶺石洞自開遣吏馮文則秉燭觀之入數丈得丹砂千二百粒獸形石六以獻雒南縣志鳳州妓女手皆纖白州境內所生柳翠色可愛與他處不同又公庫多美醖故世言鳳州有三出謂手柳酒也遁齋間覽今金絲柳猶有之元豐中常取百株植禁中隴蜀餘聞永樂有無核棗人不可得豫在岐下亦得食一枚蘇東坡集長安有寶貨行有購得名玉魚者亦名玉梁似今所佩魚袋有玉者銅者文丞相五千市一瑪瑙者府中莫知何用多云墓中得之薛俅比部慶成軍觀太寧宫醮見禮服劒室貫縚者形正相似江鄰幾雜志長安新豐市酒富平石凍春灞陵崔家酒馮翊含春酒鳳州清白酒酒小史陜西鳳翔府槖泉華州蓮花又氷堂上尊邠州靜照堂又玉泉同州清洛又清心堂金州清虛堂酒名記耀州陶匠創造一等平底深碗簡古號小海甌觥記注漢江金州上遊中零水第十三商州武關西洛水第十五煎茶水記終南山五老洞碑記墨菊其色如墨古用其汁以書字澄懷録石甕寺前有孔雀松下有赤茯苓入土千年則成琥珀長安志陜西民家有千里驢腰有腎六香祖筆記明正德十五年洋縣椒溪獲白鹿一項有銅牌上有鐫刻皆漫滅惟唐字可辨隴蜀餘聞石鼓在褒城縣北四十五里龍江側有石鼓形圍一丈擊之有聲相對有石蝦蟇髙六尺許其質生成儼如雕琢賈志萬厯丙辰蒲城簡某家有牛左脅下忽生銀剪一股其端有孔掣之則痛隴蜀餘聞嘉靖三十三年褒城龍潭壩民屋中有泉一夕夢曰吾明日當行須牢收雞犬至午有赤蛇蜿蜒水靣踰時漸長雲滃雷作則頭角髯爪俱全奮怒而去山崩石裂而此家獨存漢中府志上洛山田不知畎畝但以百尺繩量之曰某家種若干索以為田數天祿餘識蒲城白果一樹世傳仙人所擲枝埀生果出身樹腫成壘塊破之得二三斗或至石餘形差小味則不殊羣芳譜寶雞縣北二里蟠龍山有故相國少保黨公崇雅别業公好蒔花竹一日有樵人送牡丹一枝色如墨四邊作金線界道云得之棧中令人蹤迹之不復見矣隴蜀餘聞萬厯四十三年商州土門川地方李清溝有黑龍橫溝而伏圍徑丈餘鱗大如碗首尾埋兩山中訛傳肉能止痘土人爭取以食小兒旋割旋生盛暑懸屋中不生蟲不變臭商州志郿縣河灘上有亂石隨手碎之中有石魚可長二三寸天然鱗鬛或雙或隻不等云藏衣笥中能辟蠧魚金臺紀聞或按石魚出汧陽郿縣亦有之近渭地便於掘井渭城蕭𢎞士嘗竭資穿水車井九小井二十餘時關輔苦旱居人引以灌田收穫倍常時松軒遺聞陜西魯子京勇力過人日以樵獵為生有搏虎法見虎則先伏於地俟其來即以藥刀刺其喉虎應手而斃藥刀九曲五尖取歡舉山在商州劫律草搗汁淬其鋒虎當之則毛腐裂五喉食水風骨橫五喉九結無不穿破已瘧編順治五年興平河得一物色青黑頭角如鹿尾如馬之秃者目下别有二竅深寸餘夜能視物據類從云麋也興平志陳其年檢討遊紀云間愁疊疊紛於太華之旒歷劫綿綿多似櫟陽之韭蓋古諺櫟陽家家種韭也臨潼縣志葭州青龍岩居人姓名未詳其叟以積善為事修青龍岩羅漢殿工成立化於殿中老嫗煮粥饋食見叟狀亦立化隨一犬亦化土人將肉軀敷泥塑像至今猶存葭州志陜西通志卷九十九
