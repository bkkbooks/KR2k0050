五百餘頃因名曰白渠民得其饒歌之曰田於何所池陽谷口鄭國在前白渠起後舉臿為雲決渠為雨涇水一石其泥數斗且溉且糞長我禾黍衣食京師億萬之口漢書溝洫志鄭白之沃衣食之源提封五萬疆埸綺分溝塍刻鏤原隰龍鱗決渠降雨荷臿成雲五穀垂穎桑麻鋪棻西都賦浸決鄭白之渠西征賦苻堅以關中水旱不時依鄭白故事發其王侯已下豪望富室僮𨽻三萬人開涇水上源鑿山起堤通渠引瀆以溉岡鹵之田及春而成百姓賴其利晉書苻堅載紀白渠引涇水起谷口出於鄭渠南東徑宜春城南又東徑池陽城北枝瀆出焉水經注始皇元年鑿涇水為鄭國渠至漢武帝元鼎六年一百三十六歲兒寬為左內史又奏請穿六輔渠以益溉鄭渠旁髙卬之田後十六歲趙中大夫白公奏穿涇水注渭中溉田四千五百餘頃大白渠在涇陽縣東北十里中白渠首受大白渠東流入髙陵縣界南白渠首受中白渠東南流亦入髙陵界元和志河隄謁者六人涇渭白渠以京兆少尹一人督視唐書百官志雲陽縣有古白渠地理志涇陽有中白太白南白渠通典永徽六年雍州長史長孫祥奏言往日鄭白渠溉田四萬餘頃今為富商大賈競造碾磑堰遏費水渠流梗澀止溉一萬餘頃請修營此渠以便百姓至於鹹鹵亦堪為水田髙宗曰疏導渠流使通灌溉濟沃炎旱應大利益太尉無忌對曰白渠水帶泥淤灌田益其肥美又渠水發源本髙向下枝分極衆若流至同州則水饒足比為磑碾用水泄渠水隨入滑加以壅遏耗竭所以得利遂少於是遣祥等分檢渠上碾磑皆毀之白孔六帖開元元年李元紘擢京兆尹詔決三輔渠時王公權家皆傍渠立磑瀦遏爭利元紘敕吏盡毁之分溉渠下田唐書李元紘傳李栖筠進工部侍郎關中舊仰鄭白二渠溉田豪戚壅上遊取磑利且百所奪農用十七栖筠請皆撤毁嵗得租二百萬民賴其入李栖筠傳按此係廣德二年事黎幹為京兆尹涇水壅隔請開鄭白支渠復秦漢故道以溉民田廢碾磑八十餘所王縉傳薛王知柔為京兆尹始鄭白渠梗壅民不得歲知柔調三輔治復舊道灌浸如約遂無旱虞惠宣太子業傳昭懿公主始封升平下嫁郭曖寰內民訴涇水為磑壅不得溉田詔撤磑以水與民時主及曖家皆有磑乞留帝曰吾為蒼生若可為諸戚唱即日毁由是廢者八十所公主傳秦漢鄭渠溉田四萬頃白渠溉田四千五百餘頃永徽中兩渠灌浸不過萬頃大歷初減至六千畝畝朘一斛歲少四五百萬斛復兩渠之饒誘農夫趣耕屯田蓄力河隴可復突厥傳貞元四年涇陽三白渠限口準諸堰例置監十六年詔以東渭橋納給使徐班兼白渠使太和初內出水車樣令京兆造水車給鄭白渠百姓灌溉會要太和元年京兆府奏準御史中丞溫造等奏修渠堰貞元初以京兆少尹郭隆充渠堰使於涇陽縣衆善寺置院往來勾當今請差少尹韋文恪充渠堰使令自㨂擇清強官三人專令巡檢修造從之光啓元年詔曰關中鄭白兩渠古今同利四萬頃沃饒之業億兆人衣食之源比者豪權競相占奪堰髙磑下足明棄水之由稻浸稑澆乃見浸田之利今因流散尚可經營宜委京兆尹選強幹僚屬巡行鄉里逐便相度兼利公私後周顯德五年以工部郎中何幼沖充關西渠堰使命於雍耀間疏涇水以溉田册府元龜白渠在涇陽縣西北六十里堰涇水入焉西自雲陽縣來東入髙陵縣界十道志曰太白中白南白謂之三白渠渠上斗門四十八三限口在縣東北分南北中三渠處宋敏求長安志白渠灌涇陽髙陵櫟陽及耀州雲陽三原富平凡六縣斗門百七十餘所老學菴筆記白公渠今小龍潭是也上至宋豐利渠五十六步宋秉亮涇渠條陳在宋為豐利渠按宋元雖各有渠名而三白之名自漢後相沿不異三白渠在京兆涇陽縣淳化二年秋縣民杜思淵上書言涇河內舊有石翣以堰水入白渠溉雍耀田歲收三萬斛其後多歷年所石翣以堰水壞三白渠水少溉田不足民頗艱食乾德中節度判官施繼業率民用稍穰笆籬棧木截河為堰壅水入渠沿渠之民頗獲其利然凡遇暑雨山水暴至堰輒壞至秋治堰所用復取於民民煩數役終不能固乞依古制調丁夫修疊石翣可得數十年不撓所謂暫勞永逸矣詔從之遣將作監丞周約已等董其役以用功尤大不能就而止至道元年正月度支判官梁鼎陳堯叟上鄭白渠利害按舊史鄭渠原引涇水溉田四萬頃白渠亦引涇水溉田四千五百頃兩渠溉田凡四萬四千五百頃今所存者不及三千頃皆近代改修渠堰浸隳舊防由是灌溉之利絶少於古矣鄭渠難為興功今請遣使先詣三白渠行視復修舊迹於是詔大理寺丞皇甫選光祿寺丞何亮乘傳經度選等使還言周覽鄭渠之制用功最大並仲山而東鑿斷岡阜首尾三百餘里連亘山足岸壁頽壞堙廢已久度其制置之始涇河平淺直入渠口暨年代浸逺涇河陡深水勢漸下與渠口相懸水不能至峻崖之處渠岸摧毁荒廢歲久實難致力其三白渠溉涇陽櫟陽髙陵雲陽三原富平六縣田三千八百五十餘頃此渠衣食之源也望令增築堤堰以固護之舊設節水斗門一百七十有六皆壞請悉繕完渠口舊有六石門謂之洪門今亦隤圮若復議興置則其功甚大且欲就近度其岸勢别開渠口以通水道嵗令渠官行視岸之缺薄水之淤填即時浚治嚴豪民盜水之禁涇河中舊有石堰修廣皆百步捍水雄壯謂之將軍翣廢壞已久杜思淵嘗請興修而功不克就止造木堰凡用梢樁萬一千三百餘數歲出於緣渠之民涉夏水潦木堰遽壞漂流散失至秋復率民以戢之數斂重困無有止息欲令自今溉田既畢命水工拆堰木置於岸側可充二三嵗修堰之用所役緣渠之民計田出丁凡調萬三千人疏渠造堰各獲其利不憚勞也選能吏司其事置署於涇陽縣側以時行視往復甚便時著作佐郎孫冕總監三白渠詔冕依選等奏行之後自仲山之南移置涇陽縣景德三年鹽鐵副使林特度支副使馬景盛陳關中河渠之利請遣官行鄭白渠興修古制乃詔太常博士尚賔乘傳經度率丁夫治之賔言鄭渠久廢不可復今自介公廟回白渠洪口直東南合舊渠以畎涇河灌富平櫟陽髙陵等縣經久可以不竭工既畢而水利饒足民獲數倍宋史河渠志康定中三白渠久廢京兆府薦雷簡夫治渠事先時治渠嵗役六縣民四十日用梢木數百萬而水不足簡夫用三十日稍木比舊三之一而水有餘雷簡夫傳天聖六年二月都官員外郎李同言永興軍涇陽縣三白渠節約水勢宜立約以限水命同知涇陽縣領三白渠事景祐三年二月丁卯修陜西三白渠初漕臣王沿言三白渠漢溉田四萬頃唐永徽中亦灌田萬頃今才及三千餘頃請調兵夫修治之沿又言鄭白渠皆上源髙處為堰沿渠立斗門者至四十餘所所以分水勢其下别開小渠分以溉田其作堰之法宜用石錮以鐵積之於中流擁為雙派南流者仍為涇水東注者釃為二渠故雖駭浪不能壞其防熙寧五年涇陽令侯可議鑿小鄭渠引涇水髙與古鄭渠等十一月十七日都水丞周良孺言自石門北開二丈四尺堰涇水入新渠可溉田二萬餘頃開至臨涇就髙入白渠則水行二十五里利益廣開至三限口五十里接雲陽可溉田三萬餘頃詔如其議自石門至三限合白渠興修七年殿中丞侯可議自仲山旁鑿引涇水東南與小鄭渠會下流合白渠尋罷玉海鄭白渠秦漢以下皆獲其利熙寧中神宗講求治功興葺遺利先祖殿中丞建明鄭白之利神宗賜對便殿大稱聖心付其事興役踰年功已有敘害能者巧為沮止不終厥工今則又非昔比涇水低下渠口髙卬灌溉之功幾盡廢矣民用困乏職此之由今誠修濬使秦中歲增穀百萬斛豈不甚大程明道代人上宰相論鄭白渠書大觀元年閏十月主客員外郎穆京奉使陜西以白渠歲罷民堰水起十月盡次年四月其間水囓堰與堤防圮壞溉田之利名存而實廢者十居八九得獻計者宣德郎范鎬鄜州觀察推官穆卞謂熙寧間嘗命殿中丞侯可議自仲山傍鑿石渠引涇水東南與小鄭泉會下流合白渠鳩工自熙寧七年秋至次年春渠之已鑿者十之三當時以歲歉弛役今其迹可考按舊迹而𨗳建瓶之勢易若反掌乃謂本路提舉常平使者趙佺與獻説者相地計工二年七月詔可俾佺董其事經始以是年九月越明年四月土渠成廣一丈八尺深視地形髙下袤四千二百二十丈南與故渠合明年閏八月石渠成下廣一丈二尺上廣一丈四尺深視地形髙下袤三千一百四十有一尺南與土渠接又度渠北地勢髙峻通竇以防漲水凡溉涇陽醴泉髙陵櫟陽雲陽三原冨平七縣田三萬五千九十三頃賜名豐利渠侯蒙開渠記略永興軍耀州六縣民田舊資白渠灌溉之利歷時已久涇流寖低渠勢髙卬不能取水大觀元年今秦鳯經略使穆公京以太府少卿出使陜西宣德郎范鎬承直郎穆卞因言開修洪口石渠之利穆公具聞於朝提舉常平等事趙公佺被旨相視具陳可成之䇿朝廷命趙公總浚渠事初議鑿石與涇水適平然後立堰趙公謂立堰當為逺計使渠深下水面五尺則無修堰之弊而利溥且久既終功凡石土渠一千一百一十九尺石渠北自涇水上流鑿山尾南與土渠接土渠北自石渠口東南與故渠接石渠依涇之東岸不當水衝乃即渠口鑿二渠各開一丈南渠百尺北渠百五十尺又涇水漲溢不常乃即火燒嶺之北及嶺下因石為二洞曰回瀾曰澄波又其南為二閘曰靜浪曰平流以節湍激渠之東岸有三溝曰大王溝曰小王溝又其南曰透漕溝夏雨水集每與大石俱下壅遏渠水乃各即其處鑿地樹木為柱密布如櫺貫大木於其上橫當溝之衝暑雨暴至則水注而下大石盡格透槽之口與石棚接又其東且十里曰樊坑當白渠之南岸其北直大溝溝水暴則岸壞與渠流俱潰壅之則渠不能容而下流為田患乃疊石為渠岸東西四十尺北髙八尺上濶十七尺其南石尾相銜而下四十尺溝水至則渠之所受滿其堤而止泄餘水注坑中與涇合於是平𨗳涇水深五尺下泄㵼三白故渠增溉七縣田歲可三萬頃蔡溥洪口石渠記石棚者石隱地中上下皆土水從下過空如棚狀今所謂暗橋者是也大王溝小王溝透槽溝三溝皆在古白渠次北豐利渠東其溝皆從東來橫衝渠身開渠之時將上二溝下流穿斷惟透槽溝至渠上適有石棚渠水流於棚下暴雨則水石從棚上過流入涇河故當時樹木為柱以拒大石而沙礫尚入渠內至前金時有主簿荆姓者始搆兩石橋於涇水上使與溝口相接其制橋上外髙中低如槽狀遇溝水暴漲砂石皆從上過直入涇河而渠方免石壅之患今人猶呼曰澄水槽長安圖説白渠經歷唐宋至大觀初涇河日低渠不能引命提舉常平使者趙佺於白渠北鑿渠渠成名為豐利更借上流河中大石築大堰引涇水下接白渠復灌田三萬五千餘頃袁化中涇渠議金宣宗興定五年十一月議興水田敕令分治户部按州郡有可開者誘民赴功其租止依陸田仍以官激賞之陜西除三白渠設官外亦視例施行金史食貨志傅慎微同知京兆尹修三白龍首等渠以溉田傳愼微專在元為王御史新渠京兆三白渠自元伐金以來渠堰缺壞土地荒蕪陜西之人雖欲種蒔不獲水利太宗之十二年梁泰奏請差撥人户牛具一切種蒔等物比之旱地其收數倍太宗準奏就令梁泰佩元降金牌充宣差規措三白渠使郭時中副之直𨽻朝廷置司於雲陽縣所用種田户及牛畜别降旨付塔海紺不於軍前應付涇渠宋熙寧年間詔賜常平息錢助民興作自仲山旁開鑿石渠從髙㵼水名豐利渠元至元間立屯田府督治之大德八年涇水暴漲壞堰塞渠陜西行省命屯田府總管夾谷伯顔帖木兒及涇陽尹王琚疏𨗳之起涇陽髙陵三原櫟陽用水人户及渭南櫟陽涇陽三屯所人夫共三千餘人興作水流通如舊其制編荆為囤貯之以石復填以草以土為堰歲加葺理至大元年王琚為西臺御史建言於豐利渠上更開石渠五十一丈濶一丈深五尺積一十五萬三千工每方一尺為一工自延祐元年興工至五年渠成是年改堰至新口英宗至治元年十月陜西屯田府言自秦漢至唐宋年例八月差使水户自涇陽西仲山下截河築洪堰改涇水入白渠下至涇陽縣北白公斗分為三限井平石限蓋五縣分水之要所北限入三原櫟陽雲陽中限入髙陵南限入涇陽澆溉官民田七萬餘畝近至大三年陜西行臺御史王承德言涇陽洪口展修石渠為萬世之利由是會集奉元路三原涇陽臨潼髙陵諸縣洎涇陽渭南櫟陽諸屯官及耆老議展修八十五步計四百二十五尺深二丈廣一丈五尺計用石十二萬七千五百尺人日採石積方一尺工價二兩五錢石工二百丁夫三百金火匠二用火焚水淬日可鑿石五百尺官給其糧食用具丁夫就役使水之家顧匠傭值使水户均出陜西省議計所用錢糧不及二年之費可謂一勞永逸準所言委屯田府達魯花赤只里赤督工自延祐元年二月十日發夫匠入役至六月十九日委官言石性堅厚鑿僅一丈水泉湧出近前續展一十七步石積二萬五千六百尺添夫匠百人文宗天歷二年三月屯田總管兼管河渠司事郭嘉議言去歲六月三日驟雨涇水泛漲原修洪堰及小龍口盡圮水歸涇白渠內水淺為此計用十四萬九千五百十一工役丁夫一千六百度九十三日畢於使水户內差撥每夫就持麻一斤鐵一斤繫囤取泥索一草苫一陜西凖屯田府照洪口自涇陽下至臨潼五縣分流澆溉民田驗田出夫千六百人自八月一日修堰至十月放水溉田以為年例近因奉元亢旱五載失稔今差夫又令就出用物實不能辦集竊詳涇陽水利雖分三限引水溉田緣三原等縣地里遙逺不能依時周遍涇陽比近俱在上限並南限中限用水最便今次修堰除見在户依例差役其逃亡之家合出夫數冝令涇陽縣近水利户添差一人官日給米一升併工修治省準出鈔八百錠委耀州同知李承事洎本府總管郭嘉議及各處正官計工役照時值糴米給散李承事督夫修築至十一月十六日畢至正三年御史宋秉亮相視渠堰謂渠積年坎取淤土疊於岸極為髙崇力難送土於上因請就岸髙處開通鹿巷以便夫行廷議允可四年屯田同知牙八胡涇尹李克忠發丁夫開鹿巷八十四處削平土疊四百五十餘二十年陜西行省左丞相帖里帖木兒遣都事楊欽修治凡溉農田四萬五千餘頃元史河渠志洪口石堰當河中流直抵兩岸立石囷以壅水囷行東西長八百五十尺濶八十五尺總用囷一千一百六十六制囷之法每囷用椽四十八條劈稷兩條棗條六十擔編之實石其中但遇水漲損壞即修之見三原志石渠下廣一丈二尺上廣一丈四尺土渠下廣一丈八尺上廣五丈深視地之髙下兩岸各空地一丈四岸兩壁無得擋攔巡水道徑立三限閘以分水其北曰大白渠中曰中白渠南曰南白渠南白渠無分支其大白中白分水處詳見三原髙陵立斗門以均水總為斗一百三十有五此合五縣全渠而言渠兩岸各空地五尺限上斗門十九南限斗門十二中限斗門十北限斗門五此專指涇陽斗門而言共四十有六凡水出斗各户自以小渠引入其田委曲必達凡修渠堰自八月興工九月工畢春首則植榆柳以堅堤岸水廣尺深尺為一徼一百二十徼為凖守者以度量水日具尺寸申報所司慿以布水各有差等凡用水先令斗吏入狀官給由帖方許開斗自十月一日放水至六月遇漲水歇渠七月住罷每夫一名溉夏秋田二頃六十畝仍驗其工給水行水之序自下而上晝夜相繼不以公田越次霖潦輟功長安圖説洪口之利始於秦水工鄭國至漢大始中水利廢壞趙中大夫白公因其故迹徙開渠口降及隋唐以至於宋其利又廢大觀中復開石土渠名曰豐利逮今二百餘年其利又少至大間監察御史王承德言於豐利渠北更開石渠長五十一丈歲月已久吞水漸少入渠之水既微則築堰勞而民利寡矣嘗考古今渠利之廢蓋因河身漸低渠口漸髙水不能入是白公不容不繼於鄭渠豐利不得不開於白公之後也今豐利渠口水又已漸髙王御史現開之石渠又不盡功今若不增治豈惟漸失民利恐日就湮塞近親詣渠口一一相視遂採衆論酌以管見茍欲其利溥博其説有三一曰盡修渠堰之利二曰復置兩閘之防三曰開通出土之便今相視得涇水自仲山出由髙而下河岸去水漸髙今量得鄭渠口至水面計髙五十餘尺白渠口至水面計髙一丈一尺相懸如此雖欲不改不可得也今豐利渠至水亦髙七尺有餘方新渠未開之時每歲差民起立石囤堰水計用囤三百八十個髙丈餘費役甚廣而水益艱澀是以王御史乃於上流窄處疏鑿此渠止用囤一百十個宜其省費而水可通也然其底亦髙河水三尺所立囤堰厚止三重河流深處囤之髙者乃至一丈五尺浮坐於地每遇河水泛漲不禁衝突易於傾壞反不若宋渠之堰鑿石立樁猶以為固也詢諸衆皆言新石渠起於山腳地勢髙於接流其底猶有三尺未開宜再開鑿加深八尺如此不待囤堰之設先有五尺自然之水入渠其囤但比水髙五六尺則渠受水之多不言可知宜計舊堰廣狹新囤髙下即今三重之上截作九重堰既低且厚縱遇小漲只於囤上漫流而過不至衝激傾倒設使囤壞亦不防自然入渠之水一相視舊閘二所上下相去四十餘步中間原用退水舊槽至今現存靜浪一閘在退水槽近上三十餘步渠身兩壁開鑿切口二道當時設此及洪堰倒塌之時即下此閘以備濁水淤澱渠道平流一閘在退水槽近下十步渠身兩壁亦有切口四道蓋於注罷澆田之後水既無用遂用此閘乃退水由槽還河又當河漲之時或泛漲不能猝下或已下而漏漫濁水並下兩閘以防不虞此皆古人良法安可廢而不行合將二閘修治以時開閉則濁泥不得入渠穿淘之工可以減半又靜浪相離新渠窵逺濁水入渠必至淤澱宜將此閘移於渠口近下一二十步一相視得洪口以下石土渠十餘里自古穿淘兩岸積土如山舊時將所積髙岸開為通道名曰鹿巷凡穿淘泥沙由鹿巷運於岸外近年淘出泥土填滿鹿巷只於岸上堆積或遇霖雨其土崩塌復入於渠是以渠道益淺水來益小合於農務未忙天暖人間之時差遣五縣人夫將鹿巷開至平地搬運積土逺離渠岸以漸而去不得似前輒閉岸巷假以歲月積土漸除渠道自通人力既省官政亦簡民之受賜胡可勝言元宋秉亮涇渠條陳豐利渠利不數年渠又髙堰日壞水不入渠元至大間御史王承德建言更於其上開石渠五十一丈延祐元年興役至元五年功成引水下入故道名曰王御史新渠袁化中涇渠議在明先為廣惠渠洪武八年十月濬涇陽洪堰洪堰歲久壅塞不通灌溉命長興侯耿炳文督工濬之涇陽等五縣之田大獲其利續文獻通考永樂三年奉工部勘合差千户董暹於附近衛分撥軍民相參修理涇渠民夫一萬四千四百名軍士一萬五千名府志天順七年十月濬涇陽縣鄭白故渠二申野録王御史渠口歲久圮壞弗治成化改元之初副都御史項公忠請自舊渠上并石山開鑿一里餘就谷口上流引入渠集涇陽三原醴泉髙陵臨潼五縣就役穿小龍山大龍山役者咸篝燈以入遇石剛頑輒以火焚水淬或泉滴瀝下則戴笠披蓑焉功未就項召還朝戊子項復西征過陜命有司促工責成奏凱還亟以成功紀於石名其渠曰廣惠而渠實未通也丙申右都御史余子俊又經略之於大龍山鑿竅五以取眀疏其渠曲折淺狹者踰年余以兵部尚書召又弗克就訖其功者副都御史阮公勤也公下車三司諸君以渠為言且曰向者之費率徴於利及之民今民未獲利而復徴之恐不堪命公曰然可以帑藏金粟募工市財食役者用匠四百人五縣之民更畨供役以辛丑二月興工渠口有石卧水中巨甚乃堰水以西鑿石四尺水得深入又竅小龍山架板槽擱泉溜疏鑿深者至五尺淺者至三尺廣可八尺六月大雨河溢壞堤湧沙石壅渠俟少間即築堤堰水疏渠鑿石至十月水氷輟工明年正月復作始決去淤塞引涇入渠合渠中泉水深八尺餘下流入土渠汪洋如河又下流至所謂三限閘溉五縣田八千餘畝彭華廣惠渠記後又名通濟渠正德間巡撫陜西都御史蕭翀鑿石四十二丈名通濟渠萬歷間邠乾兵巡道沈子章親歷渠口督工疏補壅漏渠水廣深倍昔縣志萬歷時邑人欲開吊兒嘴引涇水議久不決三原縣志洪堰渠口漸改漸髙山勢漸狹水利日微撫臺項公請自舊渠上於龍山後崖劃開鑿石渠一里三分欲上收衆泉下通故道但山中石頑如鐵工作甚難日用炭炙醋淬乃舉鑿焉故名鐵洞洞深者百餘尺淺者亦不下五六十尺寬僅四尺工役仰視不見天日興工於成化初年暨余公阮公凡十有七載而工始成名曰廣惠渠渠成而官民之力竭矣河流而淤塞之患日甚矣後灌田僅八百頃此非計畫踈工力少也止以廣惠渠口直入涇河兼以廣惠渠身去河流不逺且北山之石堅徑難鑿鑿亦不甚濶故涇水洶湧沙石滚滚而來則渠口塞而不能入即入者流不百步水勢稍緩沙石並沈廣惠之渠身亦中滿而難通矧更上之吊兒嘴乎倘開此嘴而可另達一渠則勞一時利萬世豈不繼鄭國之美但鑿成之後勢必復由廣惠以行今廣惠之渠能引涇水而無用則吊兒嘴之修恐亦廢同廣惠也且今之所急者非水不足也龍洞以下有大泉如斗者數十昔皆入渠今涇水泛漲山麓衝決自天潦池而上水盡入涇入渠者不過小泉數眼耳倘以吊兒嘴之物力省十之一盡修諸岸以收北山之水則水本不小而四縣之利不亦溥乎涇陽令袁化中涇渠議明三原令張縉彥條議修渠八䇿一曰因水潄渠舊時修築之法掘泥貼岸岸窄堆土遇雨衝岸依然入渠壅塞今宜自渠口起至王屋斗先將下流決開由旱溝抵涇河夫役各持鍁钁將砂石攪起順水衝送其未盡用繩桶運出岸上所謂因勢利導也二曰就近取石舊時砌岸石塊皆取之後山夫運之費每石一尺四錢有餘閲碑隂所載谷口郭氏至欲以生鐵易石謂石價猶浮於鐵價昨審視渠岸傍山而鑿四面皆石雖石性頑硬鑿取稍難而隨鑿隨砌不必旁移一步何等省便三曰夫役包工渠口一帶深山窮谷人煙既少薪火亦艱每縣夫役千百名遇天隂雨每無立站之地今但約照地分工任土人包攬鄰近村落當農暇無事必樂為用土人既得營利各縣亦不至騷動也四曰分别砌岸近日渠水上溢下漏蓋由舊日修渠邊用方石中用圓石初若可觀水發即潰土人云舊拆豐利渠岸俱是大塊方石用鐵錠貫連中用糯米石灰灌滿今須照此修理庶可經久其漏者在渠底須拆到底在渠面止拆渠面蓋岸之經久不壞者必其舊時得法不可輕動也五曰添設截板涇水不能入渠以渠中土滿今渠中所受諸泉一塵不染其土沙乃涇水壅之耳涇水由廣惠渠及豐利通濟白渠王御史口漲入者居多由渠岸橫溢而入者亦數年一次是以舊渠口皆大石塞之惟恐不密古碑云四月閉涇口防濁水淤渠七月啓涇口引涇水灌地則古人用河不過數月今必多置木板截口因時啓閉庶無淤渠之患六曰隄防山水渠道淤塞不特涇水泛漲其暴雨山水尤甚觀水磨大王小王三渠俱有石橋駕渠上接山水後又修野狐橋趙家橋接旱北渠可謂得法今龍洞溝李家溝馬道等處山水仍舊入渠當令各地方無橋處築土堰堵截山水令入店子溝吕家枯沱庶山水有歸渠不受淤塞矣七曰木石堰水似不可行唐人於白渠口鑿孔樹樁下囤實石以堰水此洪堰之名所由起也今涇水上流其勢甚急奔雷怒霆數月之力不能當其一㵼似停之便也八曰相其地勢漸次開鑿前初至龍山見渠口壅填不可蹤迹涇比渠身可低數尺似不能引之入矣及後復至龍山見渠身因水衝開故趾宛然河水已與之平但龍山下塞而不透耳若掘渠去窒水入渠者可三四分從此遡流而上得尺則尺得寸則寸河身漸髙受水漸多直至吊兒嘴無難矣三原縣志本朝順治九年邑令金漢鼎重修廣惠渠就谷口上流分涇入渠後涇水奔㵼石堰遏之其怒逾甚土石承委不得不朒渠髙水低勢不能引後鑿石渠深入數丈得泉源瀵湧而出四時不竭涓涓滔滔經絡諸邑之壤殆無異乎涇也金漢鼎修渠記康熙八年邑令王際有又修之縣志己酉春子詣渠所相其形勢其經營壅潰不能悉數最要者則如腰堰非設舊截水不能下流也石隔子龍洞非身入其內搜掏積石水將中阻也小退水槽為上流咽喉必防其泄王御史口尤扼險石隄一圮水將立竭天潦池多磽確須煆煉以鑿之卧牛石以上堤岸滲漏渠水入河者大半米汁油灰灌其石縫方能久固大退水之補滲亦如之其退水槽宜重截鐵練以資啓閉也火燒橋砂石填積中流巨石盡起之而水斯行至旁岡渠趙家橋土與橋平而故道不通下此則為土渠條析中多淺隘乃同吾涇二尹張君躬率興作石堅者舉火煆開洞幽者引繩深入漏者補淤者疏始於季春朔次月終告竣王際有修渠記厥後日漸淤塞水利微細自雍正五年修濬後渠始流通共灌涇陽醴泉三原髙陵田七萬四千三十二畝內專灌本縣地六百三十七頃縣册按此渠上承涇水中受諸泉由髙趨下勢若建瓴誠秦民衣食之源關中膏腴之最也鄭國開渠之始渠與河平涇水順流而入又東合冶清濁三峪及簿臺石川諸河東北注洛故能溉田四萬餘頃自鄭渠廢而白渠興循涇而流東南注渭其所灌者才及鄭渠什一耳厥後河流日下渠身益髙宋之豐利元之王御史明之廣惠通濟等渠要皆刋山鑿石力爭上流其始未嘗不灌溉優渥而後卒不繼者總由涇水在山勢甚洶湧本石囤堰旋設旋衝兼之石渠狹隘涇水泥多一入之後遂致中滿此亦理勢之必然者也我皇上軫念民依興復古制特發庫帑以疏通又設專官以董理其為秦民謀樂利者至矣司其事者必須酌古準今相時度地勤修渠堰盡收兩岸之泉漸次鑿山再引上流之水則浸灌之利必有超軼宋元方駕秦漢者兹故備載歷代修濬之方並前賢利弊之議俾留心溝洫者有所考證焉上王公渠在縣北四十五里引冶峪水縣圖渠首於冶谷內二里許傍北鑿引一水出口溉河北之田曰上王公渠稍下一渠曰磨渠由磨渠東下六七里開一渠曰下王公渠又東三里曰上北泗渠又東五里曰下北泗渠又東四里曰仙里渠後於上王公渠上流分開一渠曰暢公渠以上七渠皆在冶峪河東北岸縣册冶峪河出峪南流復折而東故上流為東岸下流為南岸自下王公對岸開一渠溉河南之田曰天津渠東下七里開一渠曰髙門渠又東六里曰廣利渠據册報此渠今已堙廢又東四里曰海西渠又東四里曰海河渠南與雲陽直以上五渠皆在冶峪河南岸冶河初止九渠分為四堰上下王公磨渠為一堰天津髙門渠各自一堰上下北泗仙里河海渠為一堰渠專一堰者每月每日引水入渠數渠一堰者計各渠地之多寡而以一月之日差分之取月溉一周而已一渠閉然後一渠開後雖於王公渠內增暢公渠髙門渠內增廣利渠海河渠內增海西渠然非增堰也四堰逐月並開恐上堰分水多下堰無水可引故也縣志雲陽北境髙卬涇水不及故引冶谷水西北淳化界來分為七渠以溉近山之田長安圖説七渠東岸曰王公渠鹽渠仙里渠西岸曰天井渠成渠海西渠通一渠長安志渠圖今惟王公海西尚仍舊名餘皆異原成渠在縣東北四十里引清峪河水縣圖清峪水來自耀州至毛坊里入三原界故三原有毛坊堰此堰專灌三原縣田峪水南流出峪口為原成渠渠先在涇陽清涼原作堰後因河低渠髙乃移堰於三原之閭村在清河上流西岸灌涇陽李家莊田二百畝按此渠作堰處雖在三原而下流專溉涇田三原不霑其利峪水又南為工進渠渠首在三原縣楊杜村清峪水東岸作堰灌三原縣長孫等里田下流入縣界灌縣東盈村田三百畝其下流至魯橋鎮合下五渠峪水又南為下五渠一名五渠在本縣峪口清河東岸作堰東南流穿魯橋鎮灌本縣大陽丁梁西朱方南等村田二百畝其下流會工進渠水入三原縣界下流詳三原縣清峪水又南為木漲渠在本縣魯橋鎮西清河東岸作堰灌本縣孟店里田二百畝下流入三原界縣册按清河今共五渠惟毛坊專灌三原原成專溉涇陽工進下五木漲則二縣共之清峪河共四渠西岸曰光城渠東岸曰木漲渠城隍渠長平渠長安志渠圖今惟木漲渠仍昔名餘皆異又縣志載清河西岸原成渠下有廣惠廣濟二渠今亦廢三泉渠在縣東北四十里引三泉水灌田百餘畝其渠身即清峪河西岸廣濟渠故道廣濟渠久堙今借泉水灌溉縣册古渠堰附仇班渠太元十年苻堅與慕容沖戰於仇班渠大破之既而戰於白渠堅兵大敗晉書苻堅載紀茂農渠涇陽縣有茂農渠隋書地理志按茂農渠宋敏求長安志云疑即白渠然他書未載其説姑另列之以存疑三原縣大白渠即北白渠自涇陽北限分水至趙家橋東流過焦家堡又東入西關內支分南流者為石囤斗又東經縣南城至東關內支分為平臯小斗又東出東關外支分為平臯大斗又東北經林李堡為曲渠斗又東北經馬家髙家等堡至大召村為觀相斗共灌田二千九百五十二畝縣圖按此渠昔時東北入富平今至大召村止大白渠之下為邢堰堰不知起自何時蓋為北限地髙水勢不及遂引清冶二谷