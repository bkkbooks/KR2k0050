body:
  text: 陕西通志巻三十九水利一禹功稷教盡力澮溝矧兹沃野涇渭交流鄭白疏鑿畆鍾石收渼陂宋泊繼此講求千渠百堰灌溉盈疇雨露天降桔橰人謀曷若引導膏澤有秋烝民乃粒萬世綢繆作水利志第十七按秦地據百川上流導引甚易八水迴環於豐鎬百泉噴湧於邠岐延綏地處邊陲猶擅榆溪之利褒沔夙稱澤國更資江漢之波雍州所稱厥田上上而為陸海也明叅政劉麟云陜西無地不可興水利殆非虚語然利澤可資蓄洩宜備則順水性相土宜均門斗堅堤堰俾民永享樂利豈非良牧責哉兹者仰體皇仁勤思民事凡渠泉之可利田疇者悉為派别支分繪圖立說誠使流通者灌溉優渥而堙廢者亦漸次興修是則撰述之意也西安府長安縣太平峪水渠在縣西南四十里水自鄠縣來至南郭村入縣界分三𣲖灌田三百餘畝縣冊草堂堰在縣西南六十里引高官峪水在西岸開渠權田二百餘畝峪水又東北流為蕭家堰灌田三百餘畝峪水又東北流為新渠灌田一百餘畝其在東岸開渠者為陳家渠灌田一百餘畝縣冊髙橋渠一名韓家庄渠在縣西四十里引豐河水經流馬池頭槽房裏東西馬房至咸陽梁家庄入渭灌田二十餘畝豐水又北流一里許為閻家古渠經流席家村張家庄馬家村又自北而東仍入豐河渠西席家等村灌田千餘畝渠東党家橋等處灌田五百餘畝縣冊金家堰在縣南五十里引鎬水即石鱉峪水也峪水出峪口北流經過咸寧王渠鎭入縣界在西岸首為金家堰經流曹村水寨兒等處灌田五百餘畝河水又北流里許為校尉渠灌田九百八十畝河水又折而正西流南岸掘引灌田者有高渠灌田二百畝河水又西為吳家渠灌田六十三畝又西為劉家渠灌田七十畝又西為孟家渠灌田三十畝又西為張家渠灌田三十畝又西為梁家渠灌田三十五畝其北岸則首唐家渠灌田七十畝次田家渠灌田六十五畝次楊家渠灌田二十畝河水又西過夾肋村為馬家渠灌田七十畝河水又西至香積寺為頭道渠灌田五十畝又西為二道渠灌田三十畝河水又西合潏水為東交河縣冊碌軸堰在縣南二十里水磨堡潏河北岸砌碌軸為堰堰潏水北流復由東北轉西南七折兩岸共灌稻田八十餘畝下流入於皂皂河源出大義峪第三𣲖水經流咸寧義峪里㑹阿谷泉又西北流至木塔里㑹碌軸堰水又西流過杜城南又西流至沈家橋又西流至丈八溝立閘至閘口放水南下復自西折而北流者為皂河正身經漢故城入渭下流今淤自閘口逼水北上者為通濟渠水自閘北西行二里許折而北流過丈八頭小石橋又北至南窰頭皆係地渠又北過甘家寨轉東北流過糜家橋又北至解家村又北至外城郭俱係土堤高一丈二三尺濶倍之又轉東至安定門吊橋邊自閘口至此凡二十六里由洞口入甕城内南流由水門出甕城外沿城而南過一敵樓復入城東南流至白路灣折而東北流至牌樓南又正東流入地下磚渠分三派一從長安縣東流過廣濟街又東過大菜市眞武菴流出城注於東城壕今自廣濟街以東淤塞一從廣濟街北流過鐘樓折而西過永豐倉前入貢院現今流通一從廣濟街直北過麻家十字街口滙入蓮花池今淤縣冊陜西為西北巨藩西安府即宋永興軍大中祥符間知永興軍陳堯咨嘗引龍首渠水自城東入以便人用堤倚髙原日見削損城中軍民争汲汰清然後可用能望其環城而為金湯之固耶成化改元予忝廵撫父老詣予言曰去城西南十五里地名丈八溝俗名交皂二河按丈八溝乃皂水立閘處今並言交河者緣碌軸堰堰潏水入皂潏水下流一名交河也若能疏導自西入城人用之餘可泄之池以環厥城再餘泄經九龍池入於滻予聞而相視原隰具實疏聞上可其奏用是工役蝟攢畚鍤雲集地之髙者則掘而成渠地之卑者則築而起堰不三旬水遽入城命名曰通濟渠廵撫項忠通濟渠記通濟渠水出咸寧縣大義峪正𣲖合小義峪炭峪之水為潏河即交河支派第一派為龍首渠此派東北流第二派無名第三派為胡公堰乃按察司胡公所作引水經流咸寧義峪里與阿谷泉合流為皂河經流韋兆里韋村里社楊里髙望里韋曲里長安縣塔坡里社城里沈橋里木塔里至地名丈八頭作閘引水入西安府西城壕為通濟渠余子俊通濟渠記通濟渠乃兵部尚書余公子俊為西安知府時於成化初因龍首渠水不足用訪得義峪等河水經杜曲御宿川等處至丈八頭入皂河乃於丈八頭造一石閘穿渠引水西流至郭村轉東築堤為渠其渠自西關入城用磚甃砌一千五百五十丈甃未周處亦有損壊都御史周公季麟檄西安知府馬炳然相度議處於余公甃砌未周處以磚甃砌七百二十丈城外土渠亦疏濬修築二十五里王恕通濟渠記明末渠堙不通本朝康熈三年廵撫賈公漢復修築至六年復修渠水流通迄為永利縣志古渠堰附漆渠在縣西南二十里舊自坈河分水經縣界二十里入漕河漢書曰穿此渠通漆水故曰漆渠括地志曰胡亥築阿房宫開此渠而運南山之漆宋敏求長安志今豐河東岸普濟橋下直北十餘里逕漢城西渠形猶存蓋即漆渠入渭處也縣冊石闥堰在縣西南三十二里水經注曰交水西至石碣漢穿昆明池所造宋敏求長安志武帝作石闥堰堰交水為池昆明基髙故其下流尚可壅激為都城之用於是並疏列三派三派即下昆明故渠明渠堨水陂也城内外皆賴之唐太和後石闥堰廢而昆明池涸胡氏鑑注昆明故渠在縣西南古渠圖昆明故渠上承昆明池東口東逕河池北亦曰女觀陂又東合沈水亦曰漕渠又東逕長安縣南舊引水為辟雍處在鼎路門東南七里又東而北屈逕青門外與沈水枝渠㑹此渠即明渠分為二渠一水逕楊橋下即青門橋也側城北逕鄧艾祠西而北注渭今無水其一渠東逕奉明縣水經注以下别見咸寧明渠在縣西北即王渠一名明渠古渠圖哀帝為董賢治大第開門向北闕引王渠灌園地漢書董賢傳沈水枝渠上承沈水於章門西飛渠入城東為倉池又東逕未央宫北北即桂宫渠出二宫之門謂之明渠又東歴武庫北又東逕漢髙祖長樂宫北又東出城分為二渠即漢書所謂王渠也此渠出城即㑹昆明故渠蘇林曰王渠王宫家渠也猶今御溝矣晉灼曰渠名也在城東霸城門外水經注堨水陂在縣西古渠圖昆明渠水東北流注堨水陂陂水北出逕漢武帝建章宫東於鳯闕南東注沈水又北逕鳯闕東沈水又北分為二水一水東北流據長安圖經此東北流者即飛渠入城之水一水北逕神明臺東又逕漸臺東又北流注渭水經注未央據龍首山為基本髙四十丈故未央殿皆出長安城上其為地既髙安所得水為巨浸凡漢城之水皆取於昆明池而昆明之水自沈水以及樊杜諸水武帝皆堰壅入池水之既池而又北出也其下口釃為三渠以並城而行其先分一𣲖自西而東横亘城南之鼎路門已而東折以注青門水經謂之漕渠吕圖亦具著渠跡暨至清明門外合王渠以入於渭第二枝自都城西面南來第一門名章門者於其旁設為飛渠飛渠據雍録言明渠入城必有窪下之地中斷不接故架空設槽為渠使得超窪下而注滄池也東向入城注於未央宫之西以為大池是名滄池此池之中有漸臺則未央漸臺也已而滄池下流循殿之北向東而徃逕石渠天祿閣桂宫北宫長樂宫皆用此水也未央地勢甚髙而此渠能自西轉北以行是行乎未央山背窪下之處也滄池下流有石渠者礲石為之以導此水自此以徃水既周遍諸宫自清明門出城是為王渠王渠至清明門外與漕渠合而北入渭也第三枝則堨水陂自南而北徑趨建章先為唐中池周廻十里已而從東宫轉北則為太液池其中又有漸臺即建章宫漸臺也漸臺下流入渭雍録漕渠在縣南又東入咸寜界古渠圖元光中鄭當時為大農言曰異時關東漕粟從渭中上度六月而罷而漕水道九百餘里時有難處引渭穿渠起長安並南山下至河三百餘里徑易漕度可令三月罷而渠下民田萬餘頃又可得以溉田天子以為然令齊人水工徐伯表悉發卒數萬人穿漕渠三嵗而通通以漕大便利其後漕稍多而渠下之民頗得以溉田矣史記河渠書元光六年穿漕渠通渭漢書武帝紀漕渠漢大司農鄭當時所開也以渭難漕命齊水工徐伯發卒穿渠引渭今源自昆明池南傍山原東至於河且田且漕大以為便水經注開皇元年徴郭衍為開漕渠大監部率水工鑿渠引渭水經大興城北東至潼關漕運四百餘里關内賴之名富民渠隋書郭衍傳一作富人渠開皇四年六月自渭運門以通運九月幸霸水觀漕渠隋書文帝紀開皇四年宇文愷鑿渠引渭水自大興城東至潼關三百里名廣通渠漕運通利關内賴之隋書食貨志永通渠隋開皇四年開起縣西北渭水興成堰興成堰見咸陽縣初名富渠仁壽年改宋敏求長安志天寳三年左常侍兼陜州刺史韋堅開漕河自苑西引渭水因古渠至華隂入渭名曰廣運潭灞滻二水㑹於漕渠每夏大雨輒漲大歴之後漸不通舟元和志天寳二年京兆尹韓朝宗引渭水入金光門以貯材木大歴元年京兆尹黎幹自南山開漕渠抵景風延喜門入苑以漕薪炭唐書地理志永泰二年即大歴元年也七月鑿運木渠自京兆府直東至薦福寺東街北至國子監東至子城東街正北逾景風門延喜門入於苑濶八尺深丈餘京兆尹黎幹奏唐㑹要京師苦樵薪乏黎幹度開漕渠興南山谷口尾入於苑以便載運唐書黎幹傳永安渠在縣南引交水西北入城逕西市入苑沈水自南入焉有福堰分為二水流一里一水合交水一水西北流又東為瀆越沈水上過又名永安瀆入苑注渭西街永安渠隋開皇三年引交水西北流入城自大安坊經大通信義永安延福崇賢延康六坊之西又經西市之東又北流經布政頒政輔興崇徳四坊及興福寺之西又北流入芳林園又北流入苑注之於渭宋敏求長安志開皇開永安渠後交水沈水始入城入苑不與漢世流派相應蓋皆有堰壩之𩔖壓而入之雍録漢時皆西流然後北折此則徑從西北入城元和八年四月發神䇿軍士修城南交渠㑹要按長安縣志有香積渠隋開皇三年築引交水自赤欄橋經第五橋西北入城今考其地應即永安渠也清明渠東南自萬年縣界流入西北流又屈而東北入宫城東街清明渠開皇初引沈水西北流屈而東北流入城當大安坊南街又屈而東流至安樂坊之西南隅屈而北流經安樂昌明豐安宣義懐眞崇徳興化通義太平九坊之西又北流經布政坊之東右金吾衛之東南屈而東南流入皇城經大社北又東至含光門街又屈而北流經尚食局東又北流經將作監内侍省東又北流入宫城宋敏求長安志清渠在縣西五十里自鄠縣界來經縣界十里注渭宋敏求長安志其源即太平峪水見十道志至徳二載郭子儀與賊戰於清渠唐書肅宗紀按郭子儀傳子儀率師趨長安次潏水上賊安忠軍清渠左大戰則清渠乃近長安或以為涇陽之清渠者誤也豐河渠在縣西南四十里賈志豐水渠今名賀蘭渠東北流注交水溉田一萬餘畆括地志豐河渠自鄠縣流入今東岸斗門鎮北有渠逕馮三村馮黨村田村陶家莊許村喇家村又北合滮池俗名張王渠渠迹雖存堙廢日乆本朝康熙六十年居民自陶家莊開渠引水過許村北屈而東北流過喇家村合滮池水又北流二里退入漆渠故道又北注於渭渠長九里堰口髙三丈寛五尺傍渠田地因勢穿溉頗獲其利後因大雨豐水衝决渠復堙塞不通今許村佛寺有碑記其事縣冊國草渠灌田一百餘畝縣志今無考縣冊咸寧縣龍首渠在府城東南賈志永嘉坊有龍首渠一名滻水渠隋開皇初自東南龍首堰下支分滻水