合同官髙阜之水悉趨頻山分東西二河東河自趙老峪出分為二派東曰順陽渠灌兩門村磐石村城西村美原堡田六百畆縣冊西曰薛家渠南灌薛家溝東灌仁義坊莊子鎭五家坊西灌蓋村將軍村道賢村惠店荆家村東李村流曲堡丈八村縣志今渠口猶存而各村堡支分小渠大半圯廢利益無多縣冊西河出山南流其在河東者為孫家渠𢎞治間開濬灌小惠村田縣志昔時灌田三千五百畆今上流壅塞所灌甚㣲縣冊其在河西者為朝陽渠灌鄒村田縣志昔時灌田三百五十餘畝近因大雨衝决洞口坍塌灌溉無㡬縣冊古渠堰附鄭渠在縣北自三原縣流入又東入蒲城縣界古渠圖北白渠大統十六年涇州刺史賀蘭祥修富平堰開渠引水東注於洛周書文帝本紀在縣南二十里來自三原溉富平脾陽大澤豐潤三鄉民田四十里有斗門十五所其水東入漆沮河長安志三鄉今皆撥屬三原長安圖說龍門堰在縣南二十里石川堰在縣南二十里常平堰在縣東南二十五里長安志今廢縣冊冦萊公渠在縣東南又南入臨潼界渠在張閻良村經華陽張橋灌渭南田有故跡世傳萊公修者縣志潼河在縣北三尺嶺北說者謂𨗳潼河水而南由趙老峪出借順薛二渠灌山前田歲可一二千頃潦不灌時引水令歴蓋村而西從河故道至於後坡旱潦無恐其在此乎縣志明時知縣時泰議疏鑿未成而罷賈志醴泉縣龍洞渠在縣東北六十里縣圖醴泉本漢谷口治所在涇水西今猶有田在於涇東與其灌溉夫役不及宋修石渠六縣夫亦無醴泉長安圖說白渠灌醴泉仁義等里田府志醴泉在渠上游所溉之田甚少涇陽志今分涇陽王屋一二三四斗内水與涇陽共灌現灌本縣田三千三百九十畆縣冊古渠堰附安谷水在縣北二十里明嘉靖四年谷中出水居民引流灌田巴谷水在縣北八十里經昭陵右灌田數十頃萬歴間邑人趙云璧創一渠其利更溥縣志今廢縣冊屺峪河在縣南可資灌溉賈志觀音泉在縣東北與巴谷水合流溉田縣志今無灌溉利縣冊延安府膚施縣延利渠在縣南三里宋司馬光為麟州通判鑿引入城賈志按此渠一云宋龎藉知延州時所開支分清淺流縱横貫城市司馬光和龎籍詩渠乆廢今城南石洞中猶鐫延利渠三字雍正十年重修渠首在花石崖下引杏子河水鑿石渠七十八丈五尺土渠三里餘經流沙梁南寺灌田數百畆縣冊按延安萬山環列地氣頗寒諸水􅑀髙而來雨則奔衝旱即枯涸故修渠築堰視他郡較難然賈志載安塞之延洛諸水及安定之潘陵黒牛諸川俱云可資灌溉而府志亦言延安流水可以灌田而民惰於疏濬則延郡之水利未興亦不得盡諉於地也踵事經營其惠濟之大端歟陕西通志巻三十九
