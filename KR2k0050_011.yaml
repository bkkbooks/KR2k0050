body:
  text: 陜西通志卷十一山川四漢中府榆林府漢中府南鄭縣旱山旱一作􅦾在縣西南二十里寰宇記瞻彼旱麓榛楛濟濟詩經大雅旱山名毛傳南鄭縣旱山池水所出漢書地理志旱山下有祠列石十二不辨其由蓋社主之流百姓四時祈禱水經注山上有雲即雨傍有石牛十二頭下有石池水周地圖記一名􅦾山賈志漢山在縣西南三十里四峯八面東臨老渚河北距漢水南接巴山有池水雍大記山勢竒偉其右為鳩谷谷有棲真洞又有孤雲神女祠迤東不數里有茅溝山凌髙峻削明末席增光隱其上有茅溝山記府志鳩谷在縣南二十里輿地紀勝按南鄭治自唐宋以來未嘗移徙則寰宇記所云必非無據疑漢旱以音近而訛而後人遂分以為二山也又漢志池水出旱而雍大記池水出漢山益為可據寶山在縣北十餘里舊傳山中得寶珠又相近有白雲嶺嶺上有白雲屯聚故名輿地紀勝玊井洞在縣北十五里賈志玉井在玉井觀南水色白人謂飲此可療病雍勝略俗傳宋時大雷雨忽於汚泥中湧出老子石像因於此立祠有風洞在座下深不可測投草其中即吹出府志獅子山在縣北四十里形如獅子上有寶峯院下有佛洗潭雍勝略潭在獅子山西南水自懸崖下注其潭有三地險水深府志七峯山在縣北五十里七峯峭拔宋蘇軾曾遊於此又相近為王子山形如畫屏賈志聽山在縣西北西抵壻水小溪輿地紀勝壻水北發聽山水經注俗傳唐公房仙去壻歸惟聞空中歌管聲因名聽山賈志昉房一作天臺山在縣西北七十里頂平如臺郡治枕其岡脈有飛泉數百尺下為深潭號佛子潭賈志山谷石皆堅潤有金星者製硯甚佳俗號石碑谷又其上有楞伽谷縣册龍岡山在縣西十里相傳梁天監中有龍鬬於此輿地紀勝龍岡北臨漢水南帶廉津華陽國志南鄭縣有龍岡山隋書地理志中梁山在縣西十五里賈志南鄭縣有中梁山唐書地理志漢中記云以其鎮梁州之中故名輿地紀勝山脈西自沔縣定軍山來橫山之腹有乾明寺雍勝略一統志云在南鄭褒城之界潛確類書縣亦見褒城立石山在縣西南三十里又相近有玊泉嶺輿地紀勝並詳見褒城縣玊京山在縣西南四十里旱山之陽一峯尖聳又相近為鶴騰山賈志山接褒城界有鶴騰崖鶴騰泉縣册並詳見褒城縣黃牛山在縣西南五十里又相近有青銼山賈志華陽縣有黃牛山魏書地形志地後魏縣屬華陽南鄭縣有黃牛山隋書地理志山有石黃色逺望如牛因名山下有黃牛川十道記云黃牛川有再熟之稻土人重之寰宇記籠蓋山在縣西南五十里其南麓與巴山相接老渚河源出於此雍勝略寶頂山頂一作鼎在縣西南七十里與青銼山相接賈志褒詳見城縣金華山在縣西南七十里與巴山相接峭峯特起左右環繞傍有數泉合為一池輿地紀勝縣詳見褒城雙乳山在縣西南七十五里府志城詳見褒縣髙望山在縣南二十里縣圖峨公山在縣南六十里宋元嘉十一年蕭承之進據峨公山擊敗楊難當軍梁土民思承之功於峨公山立廟祀之縣册仙臺山一名玉女山一名米倉山在縣南百九十里一名玉女山髙峻不可登上有古城三門道經云仙人玊女所居之地故名寰宇記南鄭縣有玊女山唐書地理志仙臺山在南廉水縣一名米倉山與大巴山相連有韓信廟及截賢嶺云蕭何追韓信至此輿地紀勝城廉水縣今屬褒界米倉山髙聳摩雲登其巔則褒沔洋鳳俱歸一覽縣志大巴山一名巴嶺在縣南百九十里東濵漢江與三峽相接山南即古巴國元和志廉水出巴嶺山水經注孤雲山在廉水縣東南百七十里相連者曰兩角山輿地紀勝巴山綿亘深逺冬夏積雪不消中包孤雲兩角米倉諸山南與四川巴州之小巴山接縣志石臼嶺在縣東南八十里府志幞頭山在縣東南百里以形似名又蒿壩洞在縣東南小黃村髙崖壁立前臨深澗洞當半崖有飛橋洞中極寬廣巉巖萬狀石乳參差輿地紀勝梁州山一名梁山在縣東南百八十里其西與孤雲兩角諸山相接大山四圍其中三十里許甚平廣或云古梁州治也輿地紀勝梁州山一名梁山縣志武鄉谷在縣東北縣册在府東北三十里蜀封諸葛亮為侯國十道志門按府志云在城北內疑誤駱谷在縣東北百二十里自洋之真符至此屈曲八十里八十四盤薑維伐魏出此賈志駱谷在南鄭縣北通盩厔駱谷關雍勝略漢水在縣南三里自褒城界流入又東入城固界禹貢錐指沔至漢中東流為漢水書孔傳漢水自合褒水又東徑漢廟堆下又東過南鄭縣南合廉水又右合池水又東得長柳渡水經注漢水經縣南去縣一百步元和志詳見圖考褒水一名黑龍江在縣西二十里自褒城界來南流至龍江鋪西小柏鄉入漢縣册城詳見褒縣廉水在縣西南四里自褒城縣來東北流入于漢府志華陽縣有廉水魏書地形志廉水出巴嶺山北流徑廉川故水得其名又北注漢水水經注龍岡山北有廉津廉水所經寰宇記老渚河即池水一名獠子水一名老子溪在縣南十里源出籠蓋山經城東南十五里北流入漢府志旱山池水所出東北入漢漢書地理志池水出旱山俗謂之獠子水夾溉諸田散流左注漢水水經注旱山下有石池即池水之源寰宇記老子水在廉水縣源出米倉山下流合石劔等水號老子溪即酈道元所謂獠子水也輿地紀勝老按獠子既訛為子而老渚又即老子之訛則所云老溪者當亦即此水也冷水河源出漢山又紅花水亦出漢山合流入于老溪縣册壻水即左谷水一名聽水又名智鄉水在縣西北又東流入城固界一名聽水縣册左谷水出漢北即智水也北發聽山山下有穴水穴水東南流歷平川中謂之智鄉水曰智水川水經注玉女潭在縣西南二十八里源從褒城縣南梁山流入寰宇記東湖在城東南塔影映照湖中為郡佳景府志蓮花池在縣南十里府志白鹿池在縣東北三十里相傳曾有白鹿見於此雍勝略金龍井在城內相傳有黃龍見於此雍勝略湧泉在縣北六十一里天臺山其泉地中行人於泉上砌一井深一尺五寸水深四寸後欲請此水禱雨以瓶著井中水自湧起灌於瓶內因以名之雍勝略明珠井在縣西南三里縣册褒城縣雲霧山在縣西北七十里絶頂有崖高百尺橫數十步縣境高山此為第一上有水痕如龍黑白各四顛倒懸挂其東西橫截者為橫當山在縣西北百三十里乃雲霧北界也賈志伏虎山一名饅頭山在縣西北一里俗呼饅頭山又縣北一里曰黃土坡府志連城山一名漢王山在縣北六里下臨褒水相傳為漢王練兵處亦名漢王山賈志山內有甎塔髙一丈餘傍有水池俗傳漢王築雍大記山頂有十二峯連接如城壘皆平曠可居峯各有池其下有黑溝泉東麓又有龍潭瀦水深廣昔有於此得龍蛻者時或有巨蟹大魚出沒人莫敢近又縣北入谷十五里曰雞翁山即連城後山也突起髙峯狀類雞冠又縣北二十里有桃源坡府志箕山在縣北二十里縣册山上有池四時不涸俗呼秦王獵池山南有穴號丙穴有谷號道人谷即鄭子真所隱處又七盤坡在縣北二十里輿地紀勝丙穴出嘉魚常以三月出十月入地穴口廣五六尺去平地七八尺泉懸注魚自穴下透入水穴口向丙故曰丙穴下注褒水褒水又東南歷小石門石門穿山通道六丈有餘刻石言漢永平中司𨽻校尉楊厥所開建和二年大中大夫王升嘉厥開鑿之功琢石頌德以為石牛道即秦時所開厥蓋因而廣之蜀都賦曰岨以石門門在漢中之西褒中之北水經注世代綿逺通塞不恆自晉氏南遷斯路廢矣崖岸崩淪澗閣堙圯南北各數十里車馬不通正始元年漢中獻地褒斜始開至石門北一里西上鑿山為道峭阻盤迂行者苦之三年刺史羊公表求自回萬以東開創道路至永平二年畢工閣廣四丈路廣六丈皆沿溪棧壑砰險梁危自回萬至谷口二百餘里連輈駢轡莫不夷而通焉後魏王逺石門銘序蜀諸葛亮遣趙雲鄧芝等據箕谷即此又七盤山頂曰雞頭山出褒谷雍大記七盤山在縣北十里雞頭關下盤迥七轉方至山頂由此入連雲棧山頂有風洞山下有穴大如斗名魚洞自清明至穀雨有魚從穴中出府志石門在縣北十里雞頭關下此門通可避七盤之險又南三十步為手扒崖崖南五十步有一點油石縣志龍峯在縣北二十五里山下巨石崚嶒突出有如龍首直走烏龍江岸波濤吞吐如龍之吸浪其相近為麻坪左繞江流右倚林麓亦山市也又縣北二十六里有老君崖府志黃草山在縣北四十里東臨褒水即連雲棧諸山雍勝略青橋山在縣北五十里山形險峻緝木以度樹蘿蒙密嵗寒不凋又青橋河北岸有石突起叢薄中前昂後伏宛然若虎名曰虎石府志松尖山在縣北六十里青橋西山峯尖聳竒松挺植又石尖山在縣北七十里青橋山後石峯聳出與松山對亦即連雲棧諸山也府志衙嶺山在縣北縣册武功縣褒斜二水俱出衙嶺山漢書地理志褒水西北出衙嶺山水經注褒水出褒城縣西北九十八里衙嶺山括地志馬道山在縣北九十里馬道驛西其東溝巨石宛有馬迹又鳳凰山在馬道驛東北山張兩翼形如飛鳳一名太白山又縣北九十五里為燕子崖府志之按括地志所云衙嶺山今以道里計疑即馬道鳳凰石笋四州諸山也石笋山在縣北百二十里馬道山迤西山下有龍潭廣一畝許遊者至潭隈相戒毋聲咳有之則徹底清潭頃刻渾濁見者無不駭心又相近有回水洞在焦崖鋪南石崖下褒水至此一派潛入崖穴東通城固縣壻水河府志四州山在縣北入斜谷一百三十里與武關驛相對登之可望見褒沔洋鳳諸境故名又縣北二百里有九石坪在深山茂林之中其地平廣可種藝人罕至者府志雲夢山一名社壇嶺一名觀山在縣西北五十里牛頭山後與雲霧山並峙古名社壇嶺又名觀山陟頂二十里頂最平坦最髙處為雲夢觀觀東一里為飛仙崖石峯壁立高三百五十五丈相傳有仙女飛升於此崖之下曰白龍洞髙五丈濶倍之深數步許下有石池二水滴池中不溢不涸旱禱則應觀西三里有青龍洞深丈餘亦有石池三水自上滴入由洞口流出又後有聖水洞石井深丈餘水從底峽中出又觀南一里曰牡丹坪又相近者曰照壁山其陽岡嶺逶迤通雲霧諸山其陰峻峭方正形如屏風又縣西北六十里曰黃草坪府志赤崖一名赤岸在縣西北褒斜閣道之所經也亦曰赤岸蜀漢置赤岸庫以儲軍資又孔明與兄瑾書曰頃大水暴出赤崖以南橋閣悉壞即此縣志牛頭山一名戴笠山在縣西二十五里其相近有仙人洞臨漢水府志武鄉縣有牛頭山魏書地形志屬武鄉縣今屬南鄭魏褒中郡褒城縣有牛頭山唐書地理志山髙百仞其上雲覆如笠即雨故後人號為戴笠山寰宇記山有巨石似牛頭故名其下有靈液泉雍勝略石人山在縣西五十里上有石峯如人形故名府志赤谷嶺在縣西南十里又縣西南五十里有乾龍洞在娑羅關南洞髙數丈內有小溪自北壁下流出洞底禱雨者執火而入路多曲折約行三十里可達華山洞府志鶴騰巖在縣西南六十里縣册三巖相接狀類畫屏寶積院有殘碑載昔人於此駕鶴仙去巖半有三石洞深邃莫測其下有瀑布泉府志馬鞍山在縣西南九十里山麓有泉東流入廉水府志華山在縣西南百十里根盤百里許有華山洞在縣西南九十里髙大深邃內有靈湫禱雨輒應又山之相近者曰寶頂山中峯髙聳望雲之起滅可卜晴雨又縣西南百二十里有月崖其形如月府志中梁山在縣南三十五里麓擁髙陵勢若積穀為縣之屏山褒民從此入縣有三道最東曰相公嶺原名猴子嶺中曰土地埡最西曰石梯口石路﨑嶇自南而北如下井自北而南若登天巖半有石刻其略云一應鹽𣙜不得從山過蓋紹興五年