大理河徑縣境六十里縣册附考溫泉西北出沙溪而東南流注奢延水又鏡波水源出南邪山南谷東北流注奢延水水經注無按此二水考定邊縣冡嶺一名南梁山在縣東南六十里縣册在甎井堡南俗呼南梁山有洛水出焉又北極山與冡嶺相對一峯巋然望之若虬龍奮迅而上延安志黃羊嶺在縣東南九十里甎井堡南為要地又其西為鐫天嶺縣册白露山在縣東南百三十里又其東有桃林山又東有亂石山縣册桃林山在新安邊堡東又南十里為紅麋山延綏志洛水在縣東南百五十里縣圖晉文公攘戎居于河內圁洛之間史記丐奴傳洛水在冡嶺下延綏志洛水源出琉璃廟石縫中東南流徑頁水川合鐵鞭城水入保安界縣册源按洛水自慶陽府安化縣發則此蓋洛水之别源也三山水在縣西南百里源出三山兒東西二岔合石潦池水徑饒陽堡饒家水東注之又南入北蕭關合木瓜城水黑城子水跌角城水沙家掌梁家溝水汝麻臺水塔兒掌水入紅城子經環縣西南即馬嶺水上源也縣册鹽池在縣西北鹽場堡北縣圖長澤縣有胡落鹽池唐書地理志靖長澤縣今屬邊原屬靈夏衛嘉靖九年總制王瓊改屬本衛池周圍三里許中有井引水溉畦一夕視之若積雪此九種之一也又其東南有潦池鹽池水鹵不可飲潦池水可飲堡人汲者便之又二池之西為寧夏境延綏志兹按地理通釋漢於上郡龜縣置鹽官疑即此靖邊縣文昌山在縣治西北山脈自太白來上有文昌閣故名又太白山在縣西南里許文昌山西縣册與荍麥城相接皆宋范龍圖所築延綏志蓮花山在縣西南寧塞堡南十五里縣册宋范龍圖立塞於此山有駙馬洞相傳姬駙馬居此延綏志飲馬坡在縣西南四十里縣册鶯窩山在縣西南又其西有鳴羊山縣册鶯窩山在寧塞堡西南二十五里把都河北又有架炮山旗竿山俱在寧塞堡西南三十里把都河南二山崔嵬並峙立有亭燧延綏志牛頭坡在縣東南九十里杏子河經此縣圖蘆關嶺在縣東南九十里縣册在鎮靖堡東南接安塞縣界延水所出延綏志箭杆嶺在縣東南龍州堡東南縣册草場山在縣東八十里鎮靖堡西堡城所依縣册荍麥河在縣東南十里荍麥城下北流至營北有紅栁河自寧塞堡流入徑范老關西又東北至城北合流出邊東徑鎮羅鎮靖二堡北又東至龍州堡合滉忽都河或曰滉忽都河有别源出靖邊城西石頭溝東北流合城東之黑龍王溝而出邊入鎮羅界即此又有海棠河在鎮靖堡北塞外東流至威武堡東入滉忽都河縣册把都河在縣西南九十里源出栁樹澗至寧塞堡北合倪家溝水出邊徑寧塞塘至紅栁橋入沙縣册周水河在縣西南發源飲馬溝南流徑徐家臺入於保安之洛河流一百五十里縣圖杏子河在縣南三十里發源總管塔南流徑牛頭坡又徑杏子城西入保安界縣圖陜西通志卷十一
