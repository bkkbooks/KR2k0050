body:
  text: 陜西通志巻八十八藝文四賦上賦上林賦按舊志兼載子虚賦其中多託齊楚為辭兹惟専錄上林取其切於秦地也漢司馬相如亡是公听然而笑曰楚則失矣而齊亦未為得也夫使諸侯納貢者非為財幣所以述職也封疆畫界者非為守禦所以禁淫也今齊列為東藩而外私肅慎捐國踰限越海而田其於義固未可也且二君之論不務明君臣之義正諸侯之禮徒事爭㳺獵之樂苑囿之大欲以奢侈相勝荒淫相越此不可以揚名發譽而適足以貶君自損也且夫齊楚之事又焉足道耶君未覩夫巨麗也獨不聞天子之上林乎左蒼梧右西極丹水更其南紫淵徑其北終始灞滻出入涇渭酆鄗潦潏紆餘委蛇經營乎其内蕩蕩乎八川分流相背而異態東西南北馳騖往來出乎椒丘之闕行乎洲淤之浦徑乎桂林之中過乎泱漭之野汩乎混流順阿而下赴隘陿之口觸穹石激堆埼沸乎暴怒洶涌滂㵒滭浡滵汩湢測泌瀄横流逆折轉騰潎洌澎濞沆瀣穹隆雲撓蜿灗膠盭踰波趨浥涖涖下瀨批巖衝壅奔揚滯沛臨坁注壑瀺灂霣墜湛湛隠隠砰磅訇􅐀潏潏淈淈湁潗鼎沸馳波跳沫汩濦漂疾悠逺長懐寂漻無聲肆乎永歸然後灝溔潢漾安翔徐佪翯乎滈滈東注太湖衍溢陂池於是乎蛟龍赤螭䱎䲛螹文選作漸離鰅鱅鰬魠禺禺鱋魶揵鰭擢尾搌鱗奮翼潛處于深巖魚鼈讙聲萬物衆夥明月珠子玓瓅江靡蜀石黄碝水玉磊砢磷磷爛爛采色澔旰藂積乎其中鴻鵠鷫鴇鴐鵞鸀鳿鵁􅪦䴋目煩鶩鷛渠􅰌䳄漢書作箴疵鵁鸕羣浮乎其上汎滛泛濫隨風澹淡與波搖蕩掩薄草渚唼喋菁藻咀嚼蔆藕於是乎崇山巃嵸崔巍嵳峩深林巨木嶄巖嵾嵳九嵕嶻嶭南山峩峩巖陁甗錡摧崣崛﨑振溪通谷蹇産溝瀆谽呀豁閜阜陵别島文選作隝崴磈㟪瘣丘墟崫藟文選作壘隠轔鬰􅕲登降施靡陂池貏豸沇溶滛鬻散渙夷陸亭臯千里靡不被築揜以綠蕙被以江離糅以蘪蕪雜以流夷尃古布字結縷攅戾莎揭車衡蘭槀本射干茈薑蘘荷葴橙漢書作持若蓀鮮支黄礫蔣芧漢書作苧青薠布濩閎澤延㬅太原麗文選作離靡廣衍應風披靡吐芳揚烈郁郁斐斐漢書作菲衆香發越肸蠁布寫䁆瞹苾勃於是乎周覽泛觀瞋盻漢書作縝紛軋沕漢書作芴芒芒恍漢書作怳忽視之無端察之無崖日出東沼入于西陂其南則隆冬生長踊漢書作涌水躍波其獸則􅥠漢書作庸文選作㺎旄獏漢書作貘犛沈牛麈麋赤首圜題窮竒象犀其北則盛夏含凍裂地涉氷揭河其獸則麒麟角􅗧漢書作端騊駼槖駞漢書作駝蛩蛩驒騱駃騠驢騾漢書作䯁文選作羸於是乎離宫别館彌山跨谷高廊四注重坐曲閣華榱璧璫輦道纚屬步櫩周流長途中宿夷嵕築堂纍臺増成巖突漢書作突文選作窔洞房俛漢書作頫杳眇而無見仰攀漢書作艸文選作􅦁俱古攀字橑而捫天奔星更於閨闥宛虹拖於楯軒青虯漢書作龍蚴蟉於東箱文選作葙象輿婉蟬漢書作僤於西清靈圉燕於閒觀偓佺之倫暴於南榮醴泉涌於清室通川過乎漢書作於中庭槃文選作盤石祳文選作振崖嶔巖倚傾嵯峨磼礏漢書作㠎嶫刻削崢嶸玫瑰碧琳珊瑚叢生瑉玉旁唐璸斒漢書作玢豳文鱗赤瑕駮犖雜臿其間垂綏文選作晁采琬琰和氏出焉於是乎盧橘夏孰文選作熟黄甘橙楱枇杷橪柿楟㮏漢書作亭柰厚朴梬棗楊梅櫻桃蒲陶隠夫薁棣榙􅭭漢書作荅遝荔枝漢書作離支羅乎後宫列乎北園䝯丘陵下平原揚翠葉杌紫莖發紅華秀漢書作垂朱榮煌煌扈扈照曜鉅野沙棠櫟櫧華汜漢書作楓檘漢書作枰櫨留落胥餘仁頻并閭欃檀木蘭豫章女貞長千仭大連抱夸條直暢實葉葰茂漢書作楙欑文選作橬立叢倚連巻累漢書作欐佹崔錯癹骫古委字阬漢書作坑衡閜砢垂條扶於漢書作疏落英幡纚紛容漢書作溶蕭漢書作萷蔘旖旎漢書作猗柅文選作狔從風瀏莅芔吸漢書作歙蓋象金石之聲管籥之音柴文選作偨池茈虒旋環乎後宫雜遝漢書作襲絫輯被山縁谷循阪下隰視之無端究之無窮於是乎𤣥猨素雌蜼玃飛鸓蛭蜩蠗蝚漢書作玃猱螹漢書作獑胡豰蛫棲息乎其間長嘯哀鳴翩幡互經夭矯枝格偃蹇杪顛隃絶梁騰殊榛㨗垂條踔漢書作掉稀間牢落陸離爛曼漢書作漫文選作熳逺遷若此輩者數千百處嬉漢書作娛㳺往來宫宿館客漢書作舍庖厨不徙後宫不移百官備具於是乎背秋涉冬天子校獵乘鏤象六玉虯拖蜺旌靡雲旗前皮軒後道㳺孫叔奉轡衛公驂漢書作參乘扈從横行出乎四校之中鼔嚴簿縱獠者江河文選作河江為阹泰山為櫓車騎靁起隠天動地先後陸離離散别追滛滛裔裔緣陵流澤雲布雨施生貔豹搏豺狼手熊羆足野羊䝉鶡蘇絝白虎被豳漢書作班文跨野馬陵文選作凌三嵕之危下磧歴之坁俓陖漢書作徑峻赴險越壑厲水推文選作椎蜚亷弄獬豸格瑕漢書作蝦蛤鋋猛氏罥騕褭射封豕箭不茍害解脰陷腦弓不虚發應聲而倒於是乎乘輿弭節裴回漢書作徘徊翺翔往來睨部曲之進退覽將率漢書作帥之變態然後侵潭漢書作滛促節儵夐逺去流離輕禽蹴履狡獸轊漢書作􅗗文選作䡺白鹿捷狡兔軼赤電遺光耀追怪物出宇宙彎繁弱滿白羽射㳺梟櫟蜚虡漢書作遽擇肉而後發先中而命處弦矢分藝殪仆然後揚節而上浮陵文選作凌驚風歴駭飈漢書作焱乘虛無與神俱轔漢書作藺文選作躪元鶴亂昆鷄遒孔鸞促鵔鸃拂鷖漢書作翳鳥捎鳯凰捷鴛雛漢書作鵷鶵揜焦明道盡塗殫迴車而還招揺乎襄羊降集乎北紘率乎直指闇漢書作揜文選作晻乎反鄉蹷石闕歴封巒過鳷鵲望露寒下棠梨息宜春西馳宣曲濯鷁牛首登龍臺掩細栁觀士大夫之勤略鈞文選作均獵者之所得獲徒車之所轔文選作躪轢乘漢書無乘字文選作步騎之所蹂若人民漢書無民字文選作臣之所蹈藉與其窮極倦􅒵文選作􅓈驚憚慴漢書作讋伏不被創刄而死者佗佗漢書作它文選作他籍籍漢書作藉塡坑漢書作阬滿谷掩平彌澤於是乎㳺戯懈怠置酒乎昊漢書作顥天之臺張樂乎轇輵漢書作膠葛之宇撞千石之鐘立萬石之鉅漢書作虚建翠華之旗樹靈鼉之鼓奏陶唐氏之舞聽葛天氏之歌千人唱萬人和山陵為之震動川谷為之蕩波巴渝宋蔡淮南于漢書作干遮文成漢書作盛顚歌族舉遞奏金鼓迭起鏗鎗鐺䶀漢書作闛鞈洞心駭耳荆吳鄭衛之聲韶濩武象之樂隂滛案衍之音鄢郢繽紛激楚結風俳優侏儒狄鞮之倡所以娛耳目樂心意者麗靡爛漫於前靡曼美色於後若夫青琴宓妃之徒絶殊離俗姣漢書作妖冶􅈺漢書作閑都靚粧刻飾便嬛綽漢書作繛約柔橈嬛嬛文選作嫚嫚嫵媚姌漢書作􅏽嫋抴漢書作曵獨繭之褕袘漢書作袣文選作絏眇閻易以戌漢書作恤文選作䘏削媥姺徶㣯漢書作便姍嫳屑與世文選作俗殊服芬香漢書作芳漚鬰酷烈淑郁皓齒粲爛宜笑的皪長眉連娟㣲睇緜藐色授魂與漢書作予心愉於側於是酒中樂酣天子芒然而思似若有亡曰嗟乎此泰奢侈朕以覽聽餘閒無事棄日順天道以殺伐時休息於此恐後世文選作業靡麗遂往而不返非所以為繼嗣創業垂統也於是乎乃解酒罷獵而命有司曰地可以墾辟悉為農郊以贍萌𨽻隤墻填􅢾使山澤之民得至焉實陂池而勿禁虚宫觀漢書作館而勿仭發倉廩以振漢書作救貧窮補不足恤鰥寡存孤獨出徳號省刑罰改制度易服色更正朔與天下為文選多更字始於是歴吉日以齋戒襲朝衣漢書作服乘法駕建華旗鳴玉鸞㳺乎漢書作于六藝之囿漢書多馳字騖乎仁義之塗覽觀春秋之林射貍首兼騶虞弋元鶴建文選作舞干戚載雲䍐揜羣雅悲伐檀樂樂胥修容乎禮園翺翔于漢書作乎書圃述易道放怪獸登明堂坐清廟次羣臣奏得失四海之内靡不受獲於斯之時天下大説鄉風而聽隨流而化喟漢書作芔然興道而遷義刑錯而不用徳隆乎三王文選多而字功羨於五帝若此故獵乃可喜也若夫終日暴露漢書無此二字馳騁勞神苦形罷車馬之用抏士卒之精費府庫之財而無徳厚之恩務在獨樂不顧衆庶忘國家之政而漢書無而字貪雉之獲則仁者不由也從此觀之齊楚之事豈不哀哉地方不過千里而囿居九百是草木不得墾辟而民文選作人無所食也夫以諸侯之細而樂萬乘之所侈僕恐百姓被其尤也於是二子愀然改容超若自失逡巡避席曰鄙人固陋不知忌諱乃今日見教謹聞命矣按藝文諸家傳本不一或字句互異或意義迥别茲於上林一賦以史記為正文而以漢書文選參注其下長楊甘泉二賦以漢書為正文而以文選參注其下以例其餘後不復注請雨華山賦劉向崆巄巍崝㟪山清忽幽昧往曲勃林岑䒩崔一作雚竭離安連迎􅞸通谷曼服㦇奄草均阿阪殷紛聲沸路潦逺調修崪􅻟寒服嶼㝠㝠蘭蔓散峽崝崝㑣㑣溱溱路黍稷雲嵷忽傳天下為深壑旅請今深渥水谷宻請宜令所出百鏳鏳清池涌泉炎洲鳴一作烏鴦翔㘇㘇殊召診賞懸若神悲哀一作衷但往一作住不可語人鹿㑣他他野牛勝握觸熊蛬蛬律怒佛特林旅象犀庸逰山林天隂且雨員日聆棠柘梓桐樛梢母猴猿木戯手相持睠陽棼若風時憚鴛飄陽鸞孔翠文章明蜸一作螣苑倉游山旁惃狐狢臨水凝渾兮不觸果必方格可為惃陵鯉神龜春夏出逰冬自根聖人親之誠虞哉虢拖何不可勝亦路臨何為華山文按唐人所選古苑云此文闕訛難讀姑存其舊以俟識者長楊賦并序揚雄明年上將大誇胡人以多禽獸秋命右扶風發民入南山西自褒斜東至𢎞農南敺漢中張羅網罝罘捕熊羆豪豬虎豹狖玃狐麋鹿載以檻車輸長楊射熊館以㒺為周阹縱禽獸其中令胡人手搏之自取其獲上親臨觀焉是時農民不得收歛雄從至射熊館還上長楊賦聊因筆墨一有之字成文章故藉翰林以為主人子墨為客卿以諷其辭曰子墨客卿問於翰林主人曰葢聞聖主之養民也仁霑而恩洽動不為身今年獵長楊先命右扶風左太華而右褒斜㭬嶻嶭而為弋紆南山以為罝羅千乘於林莽列萬騎於山隅帥軍踤阹錫戎獲胡搤熊羆拖豪豬木擁搶纍以為儲胥此天下之窮覽極觀也雖然亦頗擾于農民三旬有餘其廑一作勤至矣而功不圖恐不識者外之則以為娯樂之遊内之則不以為乾豆之事豈為民乎哉且人君以𤣥黙為神澹泊為徳今樂逺出以露威靈數搖動以罷一作疲車甲本非人主之急務也䝉竊惑焉翰林主人曰吁客何謂茲邪若客所謂知其一未覩其二見其外不識其内者也僕嘗倦談不能一二其詳請略舉其凡而客自覽其切焉客曰唯唯主人曰昔有彊秦封豕其士一作土窫窳其民鑿齒之徒相與摩一作磨牙而爭之豪俊糜沸雲擾羣黎為之不康于是上帝眷顧高祖高祖奉命順斗極運天關横巨海票一作漂崑崙提劔而叱之所一有過字麾城搟一作摲邑下将降旗一日之戰不可殫記當此之勤頭蓬不暇梳饑不及餐鞮鍪生蟣蝨介胃被霑汗以為萬姓請命乎皇天廼展民之所詘振民之所乏䂓億載恢帝業七年之間而天下宻如也逮至聖文隨風乘流方垂意于至寧躬服節儉綈衣不敝革鞜不穿大厦不居木器無文於是後宫賤瑇瑁而疎一作疏珠璣郤翡翠之飾除雕瑑之巧惡麗靡而不近斥芬芳而不御抑止絲竹宴衍一作衎之樂憎聞鄭衛㓜𦕈之聲是以玉衡正而太階平也其後獯鬻作虐東夷横畔羌戎睚眥閩越相亂遐萌一作􅡦為之不安中國䝉被其難於是聖武勃怒爰整其旅廼命驃衛紛紜沸渭雲合電發猋騰波流機駭蠭軼疾如奔星擊如震霆砰一作碎轒輼破穹廬腦沙幕髓余吾遂躐乎王庭驅橐它燒一作熐蠡分梨單于磔裂屬國夷阬谷拔鹵莽刋山石蹂屍輿厮係累老弱兗一作鋋瘢耆金鏃淫夷者數十萬人皆稽顙樹頷一作頜扶服蛾伏二十餘年矣尚不敢惕息夫天兵四臨幽都先加迴戈邪指南越相夷靡節西征羌僰東馳是以遐方疏俗殊隣絶黨之域自上仁所不化茂徳所不綏莫不蹻足抗手一作首請獻厥珍使海内澹然永亡邊城之災金革之患今朝廷純仁遵道顯義并包書林聖風雲靡英華沈浮洋溢八區普天所覆莫不沾濡士有不談王道者則樵夫笑之意者以為事罔隆而不殺物靡盛而不虧故平不肆險安不忘危廼時以有年出兵整輿竦戎振師五柞習馬長楊簡力狡獸狡武票一作彯禽乃萃然登南山瞰烏弋西壓月􅒸東震日域又恐後世一作代迷於一時之事常以此敗一作為國家之大務滛荒田獵陵夷而不禦也是以車不安軌一作軔日未靡旃從者彷彿骩屬而還亦所以奉太宗一作尊之烈遵文武之度復三王之田反五帝之虞使農不輟耰工不下機婚姻以時男女莫違出愷一作凱弟行簡易矜劬勞休力役見百年存孤弱帥與之同苦樂然後陳鐘鼔之樂鳴鞀磬之和建碣磍之虡拮隔一作戛撃鳴球掉八列之舞酌允鑠肴樂胥聽廟中之雍雍受神人之福祜歌投頌吹合雅其勤若此故真神之所勞也方將俟元符以禪梁甫之基増泰山之高延光于将来比榮乎往號豈徒欲滛覽浮觀馳騁稉稻之地周流棃栗之林蹂踐芻蕘誇詡衆庻盛狖玃之收多麋鹿之獲哉且盲者不見咫尺而離婁燭千里之隅客徒愛胡人之獲我禽獸曽不知我亦已獲其王侯言未卒墨客降席再拜稽首曰大哉體乎允非小子之所能及也乃今日發矇廓然已昭矣甘泉賦并序前人成帝時客有薦雄文似相如者上方郊祀甘泉泰畤汾隂后土以求繼嗣召雄待詔承明之庭正月從上甘泉還奏甘泉賦以風其辭曰惟漢十世將郊上𤣥定泰畤雍神休尊明號同符三皇錄功五帝䘏𦙍錫羡拓迹開統於是廼命羣僚歴吉日協靈辰星陳而天行詔招搖與泰一作太隂兮伏鉤陳使當兵屬堪輿以壁壘兮梢䕫魖而抶獝狂八神奔而警蹕兮振殷轔而軍裝蚩尤之倫帶干將而秉玉戚兮飛䝉茸而走陸梁齊緫緫一有以字撙撙其相膠葛一作轕兮猋駭雲迅奮以方攘駢羅列布鱗以雜㳫兮柴虒參差魚頡而鳥䀪翕赫㫚霍霧集一有而字䝉合兮半散照爛粲以成章於是乘輿廼登夫鳯凰兮一有而字翳華芝駟蒼螭兮六素蚪蠖畧蕤綏灕虖幓一作襂纚帥爾隂閉霅然陽開騰清霄而軼浮景兮夫何旟旐郅偈之旖旎也流星旄以電燭一作爥兮咸翠葢而鸞旗敦一作屯萬騎於中營兮方玉車之千乗聲駍隠以陸離兮輕先疾雷而馺遺風陵一作凌高衍之嵱嵷兮超紆譎之清澄登椽欒而羾天門兮馳閶闔而入凌兢是時未轃夫甘泉也廼望通天之繹繹下隂潛以慘廩一作懍兮上洪紛而相錯直嶢嶢以造天兮厥高慶而不可乎疆一作彌度平原唐其壇曼兮列新雉於林薄攢并閭與茇䒷兮紛被麗其亡鄂崇丘陵之駊騀兮深溝嶔巖而為谷􅉨􅉨離宫般以相燭一作爥兮封巒石關施一作迤靡乎延一作連屬於是大夏雲譎波詭摧嗺而成觀仰撟首以高視兮目㝠眴而無見正瀏濫以𢎞惝兮指東西之漫漫徒囘回一作徊以徨徨兮魂固𦕈𦕈而昬亂㨿軨軒而周流兮忽軮軋一作坱圠而無垠翠玉樹之青葱兮璧馬犀之瞵一作璘㻞金人仡仡其承鐘虡兮嵌巖巖其龍鱗揚光曜之燎燭一作爥兮垂景炎之炘炘配帝居之縣圃兮象泰壹之威神洪臺掘一作崛其獨出兮㨖一作㮹北極之嶟嶟列宿廼施於上榮兮日月纔經於柍桭雷鬰律而一作於巖突兮電倐怱於牆藩鬼魅不能自還一作逮兮半長途而下顛歴倒景而絶飛梁兮浮蠛蠓而撇天左欃槍而右𤣥㝠兮前熛闕而後應門隂一作䕃西海與幽都兮涌醴汩以生川蛟龍連蜷於東厓兮白虎敦圉乎崐崘覽穋流於高光兮溶方皇於西清前殿崔巍兮和氏瓏玲一作玲瓏炕浮柱之飛榱兮神莫莫而扶傾閌閬閬其寥廓兮似紫宫之崢嶸駢交錯而曼衍兮㟎􅟬巍乎其相嬰乘雲閣而上下兮紛䝉籠以棍一作混成曵紅采之流離兮颺翠氣之宛延襲琁室與傾宫兮若登高眇一作邈逺肅乎臨淵迴猋肆其碭駭兮翍桂椒而鬰栘楊香芬茀以窮一作穹隆兮擊薄櫨而將榮薌呹肸以棍根一作披兮聲駍隠而歴鐘排玉户而颺金鋪兮發蘭蕙與芎藭帷弸彋其拂汨兮稍暗暗而靚深隂陽清濁穆羽相和兮若䕫牙之調琴般倕棄其剞劂兮王爾一作繭投其鈎繩雖方征僑與偓佺兮猶彷彿其若夢於是事變物化目駭耳囘葢天子穆然珍臺閒館琁題玉英蜵蜎蠖濩之中惟夫所以澄心清魂儲精垂思一作恩感動天地逆釐三神者廼搜逑索偶臯伊之徒冠倫魁能函甘棠之恵挾東征之意相與齊乎陽靈之宫靡薜荔而為席兮折瓊枝以為芳噏清雲之流霞兮飲若木之露英集乎禮神之囿登乎頌祇之堂建光曜之長旓兮昭華覆之威威攀璇璣而下視兮行遊目乎三危陳衆車於東阬兮肆玉􅎂一作車犬而下馳漂龍淵而還九垠兮窺地􅔄而上迴風傱傱一作漎而扶轄兮鸞鳯紛其御一作銜蕤梁弱水之濎濚一作濙兮躡不周之逶蛇想西王母欣然而上夀兮屏玉女而卻虙妃玉女亡所眺其清盧兮虙妃曽不得施其蛾眉方擥道徳之精剛兮侔神明與之為資於是欽祡宗祈燎薫皇天招一作臯搖泰壹舉洪頥樹靈旗樵蒸焜上配藜四施東燭滄海西燿一作耀流沙北爌一作爌幽都南煬丹厓𤣥瓚觩䚧秬鬯泔淡肸蠁豐融懿懿芬芬炎感黄龍兮熛訛碩麟選巫咸兮呌帝閽開天庭兮延羣神儐暗藹兮降清壇瑞穰穰兮委如山於是事畢功𢎞迴車而歸度三巒兮偈棠棃天閫决兮地垠開八荒協兮萬國諧登長平兮雷鼓磕一作􅐀天聲起兮勇士厲雲飛揚兮雨滂沛于胥徳兮麗萬世亂曰崇崇圜丘隆隠天兮登降峛崺單埢垣兮増宫㠁差駢嵯峨兮岭巆嶙峋洞無厓兮上天之縡載同杳旭卉兮聖皇穆穆信厥對兮徠祇郊禋神所依兮徘徊招搖靈遲一作迡兮煇光一作光煇眩燿隆厥福兮子子孫孫長無極兮甘泉宫賦劉歆軼凌隂之地室過陽谷之増城迴天門而鳯舉躡黄帝之明庭冠高山而為居乘崐崘而為宫按軒轅之舊處居北辰之關中背共工之幽都向炎神之祝融封巒為之東序緣石闕之天梯桂木雜而成行芳肸蠁之依斐翡翠孔雀飛而翺翔鳯凰止而集栖甘醴涌于中庭激清流之瀰瀰黄龍遊而宛蟺神龜沈於玉泥離宫特館接比相連雲起波駭星布彌山高巒峻阻臨洮廣衍深林蒲葦涌水清泉芙蓉菡蓞蓤荇蘋蘩豫章雜木楩松柞棫女貞烏勃桃李棗檍論都賦後漢杜篤皇帝以建武十八年二月甲辰升輿洛邑巡於西嶽推天時順斗極排閶闔入函谷觀阨於崤黽圖險於隴蜀其三月丁酉行至長安經營宫室傷愍舊京即詔京兆廼命扶風齋肅致敬告覲園陵悽然有懐祖之思喟乎以思諸夏之隆遂天旋雲逰造舟於渭北航涇流千乘方轂萬騎駢羅衍陳於岐梁東横乎大河瘞后土禮邠郊其嵗四月反於洛都明年有詔復函谷關作大駕宫六王邸高車廏於長安修理東都城門橋涇渭往往繕離觀東臨霸滻西望昆明北登長平規龍首撫未央覛平樂儀建章是時山東翕然狐疑意聖朝之西都懼關門之反拒也客有為篤言彼埳井之潢汙固不容夫吞舟且洛邑之渟瀯曷足以居乎萬乘哉咸陽守國利器不可乆虚以示姦萌篤未甚然其言也故因為述大漢之崇世據廱州之利而今國家未暇之故以喻客意曰昔在彊秦爰初開畔霸自岐廱國富人衍卒以并兼桀虐作亂天命有聖託之大漢大漢開基高祖有勲斬白蛇屯黒雲聚五星於東井提干將而呵暴秦蹈滄海跨崑崙奮彗光埽項軍遂濟人難蕩滌於泗沂劉敬建䇿初都長安太宗承流守之以文躬履節儉側身行仁食不二味衣無異采賑人以農桑率下以約已曼麗之容不恱於目鄭衛之聲不過於耳佞邪之臣不列於朝巧偽之物不鬻於市故能理升平而刑㡬措富衍於孝景功傳於後嗣是時孝武因其餘財府帑之蓄始有鉤深圖逺之意探冒頓之罪校平城之讐遂命票騎勤任衛青勇惟鷹揚軍如流星深之匈奴割裂王庭席巻漠北叩勒祁連横分單于屠裂百蠻燒罽帳繫閼氏燔康居灰珍竒椎鳴鏑釘鹿蠡馳阬岸獲昆彌擄􅬟侲驅騾驢馭宛馬鞭駃騠拓地萬里威震八荒肇置四郡據守敦煌并域屬國一郡領方立候隅北建䕶西羌捶驅氐僰寥狼卭莋東攠烏桓蹂轔濊貊南羈鉤町水劔强越殘夷文身海波沬血郡縣日南漂槩朱崖部尉東南兼有黄支連緩耳瑣雕題摧天督牽象犀椎蜯蛤碎瑠璃甲瑇瑁戕觜觹於是同穴裘褐之域共川鼻飲之國莫不袒跣稽顙失氣潛伏非夫大漢之盛世藉廱土之饒得御外理内之術孰能致功若斯故創業於高祖嗣傳於孝恵徳隆于太宗財衍於孝景威盛於聖武政行於宣元侈極於成哀祚缺於孝平傳世十一歴載三百徳衰而復盈道㣲而復章皆莫能遷於廱州而背於咸陽宫室寢廟山陵相望高顯𢎞麗可思可榮羲農已來無茲著明夫廱州本帝皇所以育業霸王所以衍功戰士角難之塲也禹貢所載厥田惟上沃野千里原隰彌望保殖五榖桑麻條暢濵據南山帶以涇渭號曰陸海蠢生萬𩔖楩柟檀柘蔬果成實畎瀆潤淤水泉灌溉漸澤成川粳稻陶遂厥土之膏畆價一金田田相如鐇鑊株林火耕流種功淺得深既有蓄積阸塞四臨西被隴蜀南通漢中北據谷口東阻嶔巖闗函守嶢山東道窮置列汧隴廱偃西戎拒守褒斜嶺南不通杜口絶津朔方無從鴻渭之流徑入於河大船萬艘轉漕相過東綜滄海西綱流沙朔南暨聲諸夏是和城池百尺阸塞要害關梁之險多所衿帶一卒舉礧千夫沈滯一人奮㦸三軍沮敗地埶便利介胄剽悍可與守近利以攻遠士卒易保人不肉袒肇十有二是為贍腴用霸則兼并先據則功殊修文則財衍行武則士要為政則化上簒逆則難誅進攻則百尅退守則有餘斯固帝王之淵囿而守國之利器也逮及亡新時漢之衰偷忍淵囿篡器慢違徒以埶便莫能卒危假之十八誅自京師天畀更始不能引維慢藏招㓂復致赤眉海内雲擾諸夏滅㣲羣龍並戰未知是非于時聖帝赫然申威荷天人之符兼不世之姿受命於皇上獲助於靈祇立號高邑搴旗四麾首䇿之臣運籌出竒虓怒之旅如虎如螭師之攸向無不靡披葢夫燔魚剸蛇莫之方斯大呼山東響動流沙要龍淵首鏌鋣命騰太白親發狼弧南禽公孫北背強胡西平隴冀東據洛都乃廓平帝宇濟蒸人於塗炭成兆庶之亹亹遂興復乎大漢今天下新定矢石之勤始瘳而主上方以邊垂為憂忿葭萌之不柔未遑於論都而遺思廱州也方躬勞聖思以率海内厲撫名将略地疆外信威於征伐展武乎荒裔若夫文身鼻飲緩耳之主椎結左衽鐻鍝之君東南殊俗不羈之國西北絶域難制之隣靡不重譯納貢請為藩臣上猶謙讓而不伐勤意以為獲無用之衆不如安有益之民略荒裔之地不如保殖五穀之淵逺救於已亡不若近而存存也今國家躬修道徳吐恵含仁湛恩沾洽時風顯宣徒垂意於持平守實務在愛育元元茍有便於王政者聖主納焉何則物罔益而不損道無隆而不移陽盛則運隂滿則虧故存不忘亡安不諱危雖有仁義猶設城池也客以利器不可乆虚而國家亦不忘乎西都何必去洛邑之渟瀯與西都賦班固有西都賓問於東都主人曰葢聞皇漢之初經營嘗有意乎都河洛矣輟而弗康實用西遷作我上都主人聞其故而覩其制乎主人曰未也願賔攄懐舊之蓄念發思古之幽情博我以皇道𢎞我以漢京賓曰唯唯漢之西都在於雍州實曰長安左據函谷二崤之阻表以太華終南之山右界褒斜隴首之險帶以洪河涇渭之川華實之毛則九州之上腴焉防禦之阻則天地之奥區焉是故横被六合三成帝畿周以龍興秦以虎視及至大漢受命而都之也仰寤東井之精俯協河圖之靈奉春建䇿留侯演成天人合應以發皇明乃眷西顧實惟作京於是睎秦嶺睋北阜挾酆霸據龍首圖皇基於億載度宏規而大起肇自高而終平世増飾以崇麗歴十二之延祚故窮泰而極侈建金城之萬雉呀周池而成淵披三條之廣路立十二之通門内則街衢洞逹閭閻且千九市開場貨别隧分人不得顧車不得旋闐城溢郭旁流百㕓紅塵四合煙雲相連於是既庻且富娛樂無疆都人士女殊異乎五方逰士擬於公侯列肆侈於姬姜鄉曲豪舉逰俠之雄則節慕原嘗名亞春陵連交合衆騁騖乎其中若乃觀其四郊浮遊近縣則南望杜霸北眺五陵名都對郭邑居相承英俊之域紱冕所興冠葢如雲七相五公與乎州郡之豪傑五都之貨殖三選七遷充奉陵邑葢以彊幹弱枝隆上都而觀萬國也封畿之内厥土千里卓躒諸夏兼其所有其陽則崇山隠天幽林穹谷陸海珍藏藍田美玉商洛緣其隈鄠杜濵其足原泉灌注陂池交屬竹林果園芳草甘木郊野之富號曰近蜀其隂則冠以九嵕陪以甘泉乃有靈宫起乎其中秦漢之所極觀淵雲之所頌歎於是乎存焉下有鄭白之沃衣食之源提封五萬疆埸綺分溝塍刻鏤原隰龍鱗决渠降雨荷臿成雲五穀垂穎桑麻鋪棻東郊則有通溝大漕潰渭洞河泛舟山東控引淮湖與海通波西郊則有上囿禁苑林麓藪澤陂池連乎蜀漢繚以周牆四百餘里離宫别館三十六所神池靈沼往往而在其中乃有九真之麟大宛之馬黄支之犀條枝之鳥踰崐崘越巨海殊方異𩔖至於三萬里其宫室也體象乎天地經緯乎隂陽據坤靈之正位倣太紫之圓方樹中天之華闕豐冠山之朱堂因瑰材而究竒抗應龍之虹梁列棼橑以布翼荷棟桴而高驤雕玉瑱以居楹裁金璧以飾璫發五色之渥彩光爓朗以景彰於是左墄右平重軒三階閨房周通門闥洞開列鐘虡於中庭立金人於端闈仍増崖而衡閾臨峻路而啓扉徇以離宫别寢承以崇臺閒館煥若列宿紫宫是環清凉宣溫神僊長年金華玉堂白虎麒麟區宇若茲不可殫論増盤崔嵬登降炤爛殊形詭制毎各異觀乘茵歩輦惟所息宴後宫則有掖庭椒房后妃之室合歡増城安處常寧茞若椒風披香發越蘭林蕙草鴛鸞飛翔之列昭陽特盛隆於孝成屋不呈材牆不露形裛以藻繡絡以綸連隨侯明月錯落其間金釭銜璧是為列錢翡翠火齊流耀含英懸黎垂棘夜光在焉於是𤣥墀釦砌玉階彤庭碝磩綵緻琳珉青熒珊瑚碧樹周阿而生紅羅颯纚綺組繽紛精曜華燭俯仰如神後宫之號十有四位窈窕繁華更盛迭貴處乎斯列者葢以百數左右廷中朝堂百寮之位蕭曹魏邴謀謨乎其上佐命則垂統輔翼則成化流大漢之愷悌蕩亡秦之毒螫故令斯人揚樂和之聲作畫一之歌功徳著乎祖宗膏澤洽乎黎庶又有天祿石渠典籍之府命夫惇誨故老名儒師傅講論乎六藝稽合乎同異又有承明金馬著作之庭大雅宏逹於兹為羣元元本本殫見洽聞啓發篇章校理祕文周以鉤陳之位衛以嚴更之署總禮官之甲科羣百郡之亷孝虎賁贅衣閹尹閽寺階㦸百重各有典司周廬千列徼道綺錯輦路經營修除飛閣自未央而連桂宫北彌明光而亘長樂陵隥道而超西墉混建章而連外屬設璧門之鳯闕上觚稜而棲金爵内則别風之嶕嶢眇麗巧而聳擢張千門而立萬戶順隂陽以開闔爾乃正殿崔巍層構厥高臨乎未央經駘盪而出馺娑洞枍詣以與天梁上反宇以葢戴激日景而納光神明鬰其特起遂偃蹇而上躋軼雲雨於太半虹霓迴帶於棼楣雖輕迅與僄狡猶愕眙而不能階攀井幹而未半目㫬轉而意迷舍櫺檻而卻倚若顛墜而復稽魂怳怳以失度巡迴塗而下低既懲懼於登望降周流以徬徨步甬道以縈紆又杳窱而不見陽排飛闥而上出若逰目於天表似無依而洋洋前唐中而後太液覽滄海之湯湯揚波濤於碣石激神岳之嶈嶈濫瀛洲與方壺蓬萊起乎中央於是靈草冬榮神木叢生巖峻崷崪金石峥嶸抗僊掌以承露擢雙立之金莖軼埃壒之混濁鮮顥氣之清英騁文成之丕誕馳五利之所刑庻松喬之羣𩔖時逰從乎斯庭實列僊之攸館非吾人之所寧爾乃盛娛逰之壯觀奮泰武乎上囿因茲以威戎夸敵耀威靈而講武事命荆州使起鳥詔梁野而驅獸毛羣内闐飛羽上覆接翼側足集禁林而屯聚水衡虞人修其營表種别羣分部曲有署罘網連紘籠山絡野列卒周匝星羅雲布於是乘鸞輿備法駕帥羣臣披飛廉入苑門遂繞酆鄗歴上蘭六師發逐百獸駭殫震震爚爚雷奔電激草木塗地山淵反覆蹂躪其十二三乃拗怒而少息爾乃期門佽飛列刄攢鍭要趹追蹤鳥驚觸絲獸駭値鋒機不虛掎弦不再控矢不單殺中必疉雙颮颮紛紛矰繳相纒風毛雨血灑野蔽天平原赤勇士厲猨狖失木豺狼懾竄爾乃移師趨險並蹈潛穢窮虎奔突狂兕觸蹶許少施巧秦成力折掎僄狡㧖猛噬脱角挫脰徒搏獨殺挾師豹拖熊螭曵犀犛頓象羆超洞壑越峻崖蹶巉巖鉅石隤松栢仆叢林摧草木無餘禽獸殄夷於是天子乃登屬玉之館歴長楊之榭覽山川之體勢觀三軍之殺獲原野蕭條目極四裔禽相鎭壓獸相枕藉然後收禽㑹衆論功賜胙陳輕騎以行炰騰酒車而斟酌割鮮野食舉烽命爵饗賜畢勞逸齊大輅鳴鑾容與徘徊集乎豫章之宇臨乎昆明之池左牽牛而右織女似雲漢之無涯茂樹䕃蔚芳草被堤蘭茞發色曄曄猗猗若摛錦布繡爥耀乎其陂鳥則𤣥鶴白鷺黄鵠鵁鸛鶬鴰鴇鶂鳬鷖鴻鴈朝發河海夕宿江漢沈浮往來雲集霧散於是後宫乘輚輅登龍舟張鳯葢建華旗祛黼帷鏡清流靡㣲風澹淡浮櫂女謳鼓吹震聲激越謍厲天鳥羣翔魚窺淵招白鷴下雙鵠揄文竿出比目撫鴻罿御矰繳方舟並騖俛仰極樂遂乃風舉雲搖浮逰溥覽前乘秦領後越九嵕東薄河華西涉岐雍宫館所歴百有餘區行所朝夕儲不改供禮上下而接山川究休祜之所用采逰童之歡謡第從臣之嘉頌於斯之時都都相望邑邑相屬國藉十世之基家承百年之業士食舊徳之名氏農服先疇之畎畝商循族世之所鬻工用高曽之規矩粲乎隠隠各得其所若臣者徒觀迹於舊墟聞之乎故老什分而未得其一端故不能徧舉也終南山賦前人伊彼終南巋嶻嶙囷槩青宫觸紫宸嶔崟鬰律萃于霞芬曖㬣晻靄若鬼若神傍吐飛瀨上挺修林立泉落落宻隂沈沈榮期綺李此焉恬心三春之季孟夏之初天氣肅清周覽八隅皇鸞鸑鷟警乃前驅爾其珍恠碧玉挺其阿蜜房溜其巔翔鳯哀鳴集其上清水泌流注其前彭祖宅以蟬蜕安期饗以延年唯至徳之為美我皇應福以來臻掃神壇以告誠薦珍馨以祈仙嗟茲介福永終億年西京賦張衡有憑虛公子者心奓體忲雅好博古學乎舊史氏是以多識前代之載言於安處先生曰夫人在陽時則舒在隂時則慘此牽乎天者也處沃土則逸處瘠土則勞此繫乎地者也慘則尠於歡勞則褊於恵能違之者寡矣小必有之大亦宜然故帝者因天地以致化兆人承上教以成俗化俗之本有與推移何以覈諸秦據雍而彊周即豫而弱高祖都西而泰光武處東而約政之興衰恒由此作先生獨不見西京之事歟請為吾子陳之漢氏初都在渭之涘秦里其朔實為咸陽左有崤函重險桃林之塞綴以二華巨靈贔屭高掌逺蹠以流河曲厥跡猶存右有隴坻之隘隔閡華戎岐梁汧雍陳寳鳴雞在焉於前則終南太一隆崛崔崪隠轔鬰律連岡乎嶓冢抱杜含鄠欱灃吐鎬爰有藍田珍玉是之自出於後則高陵平原據渭踞涇澶漫靡迤作鎭於近其逺則有九嵕甘泉涸隂沍寒日北至而含凍此焉清暑爾乃廣衍沃野厥田上上實惟地之奥區神臯昔者大帝説秦繆公而覲之饗以鈞天廣樂帝有醉焉乃為金䇿錫用此土而翦諸鶉首是時也並為彊國者有六然而四海同宅西秦豈不詭哉自我高祖之始入也五緯相叶以旅於東井婁敬委輅幹非其議天啓其心人惎之謀及帝圖時意亦有慮乎神祗宜其可定以為天邑豈伊不䖍思於天衢豈伊不懐歸於枌榆天命不滔疇敢以渝於是量徑輪考廣袤經城洫營郭郛取殊裁於八都豈稽度於往舊爾乃覽秦制跨周法狭百堵之側陋増九筵之迫脅正紫宫于未央表嶢闕於閶闔疏龍首以抗殿狀巍峩以岌嶪亘雄虹之長梁結棼橑以相接蔕倒茄於藻井披紅葩之狎獵飾華榱與璧璫流景曜之韡曄雕楹玉磶繡栭雲楣三階重軒鏤檻文㮰右平左墄青鎖丹墀刋層平堂設切厓隒坻崿鱗㫬棧齴巉嶮襄岸夷塗修路峻險重門襲固姦宄是防仰福帝居陽曜陰藏洪鐘萬鈞猛虡趪趪負筍業而餘怒乃奮翅而騰驤朝堂承東温調延北西有玉臺聨以昆徳嵯峨崨嶪罔識所則若夫長年神僊宣室玉堂麒麟朱鳥龍興含章譬衆星之環極叛赫戯以煇煌正殿路寢用朝羣辟大厦耽耽九戶開闢嘉木樹庭芳草如積高門有閌列坐銅狄内有常侍謁者奉命當御外有蘭臺金馬遞宿迭居次有天祿石渠校文之處重以虎威重溝嚴更之署徼道外周千廬内附衛尉八屯警夜巡晝植鍛懸􅚛用戒不虞後宫則昭陽飛翔増成合驩蘭林披香鳯凰駌鸞羣窈窕之華麗嗟内顧之所觀故其館室次舎采飾纎縟裛以藻繡文以朱緑翡翠火齊絡以美玉流懸黎之夜光綴隋珠以為燭金戺玉階彤庭煇煇珊瑚琳碧瓀珉璘彬珍物羅生煥若崑崙雖厥裁之不廣侈靡踰乎至尊於是鉤陳之外閣道穹隆屬長樂與明光徑北通乎桂宫命般爾之巧匠盡變態乎其中於是後宫不移樂不徙懸門衛供帳官以物辨恣意所幸下輦成燕窮年忘歸猶弗能徧瑰異日新殫所未見惟帝王之神麗懼尊卑之不殊雖斯宇之既坦心猶憑而未攄思比象於紫薇恨阿房之不可廬覛往昔之遺館獲林光於秦餘處甘泉之爽塏乃隆崇而𢎞敷既新作於迎風増露寒與儲胥託喬基於山岡直墆霓以高居通天訬以竦峙徑百常而莖擢上辬華以交紛下刻陗其若削翔鶤仰而弗逮况青烏與黄雀伏櫺檻而頫聽聞雷霆之相激柏梁既災越巫陳方建章是經用厭火祥營宇之制事兼未央圜闕竦以造天若雙碣之相望鳯騫翥於甍標咸遡風而欲翔閶闔之内别風嶕嶢何工巧之瑰瑋交綺豁以疏寮干雲霧而上達狀亭亭以苕苕神明崛其特起井幹疊而百増跱逰極於浮柱結重欒以相承累層構而遂隮望北辰而高興消雰埃於中宸集重陽之清瀓瞰宛虹之長鬐察雲師之所憑上飛闥而仰眺正睹瑶光與玉繩將乍往而未半怵悼慄而聳兢非都盧之輕趫孰能超而究升馺娑駘盪燾奡桔桀枍詣承光睽罛庨豁増桴重棼鍔鍔列列反宇業業飛檐䡾䡾流景内照引曜日月天梁之宫實開高闈旗不脱扄結駟方蘄櫟輻輕騖容於一扉長廊廣廡連閣雲蔓閈庭詭異門千戶萬重閨幽闥轉相踰延望􅌄窱以徑廷眇不知其所返既乃珍臺蹇産以極北墱道邐倚以正東似閬風之遐坂横西洫而絶金墉城尉不弛柝而内外潛通前開唐中彌望廣潒顧臨太液滄池漭沆漸臺立於中央赫昈昈以𢎞敞清淵洋洋神山峨峩列瀛洲與方丈夾蓬萊而駢羅上林岑以壘㠑下嶃巖以嵒齬長風激於别隯起洪濤而揚波浸石菌於重涯濯靈芝於朱柯海若逰於元渚鯨魚失流而蹉跎於是采少君之端信庶欒大之貞固立修莖之仙掌承雲表之清露屑瓊蘂以朝飱必性命之可度美往昔之松喬要羨門乎天路想升龍於鼎湖豈時俗之足慕若歴世而長存何遽營乎陵墓徒觀其城郭之制則旁開三門參塗夷庭方軌十二街衢相經㕓里端直甍宇齊平北闕甲第當道直啓程巧致功期不陁陊木衣綈錦土被朱紫武庫禁兵設在蘭錡匪石匪董疇能宅此爾乃廊開九市通闤帶闠旗亭五重俯察百遂周制大胥今也惟尉瓌貨方至鳥集鱗萃鬻者兼贏求者不匱爾乃商賈百族禆販夫婦鬻良雜苦蚩眩邊鄙何必昬於作勞邪贏優而足恃彼肆人之男女麗美奢乎許史若夫翁伯濁質張里之家擊鐘鼎食連騎相過東京公侯壯何能加都邑㳺俠張趙之倫齊志無忌擬跡田文輕死重氣結黨連羣實蕃有徒其從如雲茂陵之原陽陵之朱趫悍虓豁如虎如􅓔睚眦蠆芥屍僵路隅丞相欲以贖子罪陽石汙而公孫誅若其五縣逰麗辯論之士街談巷議彈射臧否剖析毫釐擘肌分理所好生毛羽所惡成瘡痏郊甸之内鄉邑殷賑五都貨殖既遷既引商旅聨槅隠隠展展冠帶交錯方轅接軫封畿千里統以京尹郡國宫館百四十五右極盩厔并巻酆鄠左暨河華遂至虢土上林禁苑跨谷彌阜東至鼎湖邪界細栁掩長楊而聨五柞繞黄山而欵牛首繚垣綿聨四百餘里植物斯生動物斯止衆鳥翩翻羣獸􅛖騃散似驚波聚似京峙伯益不能名𨽻首不能紀林麓之饒於何不有木則樅栝㯶柟梓棫楩楓嘉卉灌叢蔚若鄧林鬰蓊薆薱橚爽櫹槮吐葩颺榮布葉垂隂草則葴莎菅蒯薇蕨荔苀王芻莔臺戎葵懐羊苯䔿蓬茸彌臯被岡篠簜敷衍編町成篁山谷原隰泱漭無疆廼有昆明靈沼黒水元阯周以金堤樹以栁杞豫章珍館掲焉中峙牽牛立其左織女處其右日月於是乎出入象扶桑與濛汜其中則有黿鼉巨鼈鱣鯉鱮鮦鮪鯢鱨魦脩額短項大口折鼻詭𩔖殊種鳥則鷫鷞鴰鴇鴐鵞鴻鶤上春候來季秋就温南翔衡陽北棲雁門奮隼歸鳬沸卉砰訇衆形殊聲不可勝論於是孟冬作隂寒風肅殺雨雪飄揺氷霜慘烈百卉具零剛蟲搏擊爾乃振天維衍地絡蕩川瀆簸林薄鳥畢駭獸咸作草伏木棲寓居穴託起彼集此霍繹紛泊在彼靈囿之中前後無有垠鍔虞人掌焉為之營域焚萊平場柞木翦棘結罝百里迒杜蹊塞麀鹿麌麌駢田偪仄天子乃駕彫軫六駿駮戴翠帽倚金較璿弁玉纓遺光儵爚建元弋樹招揺棲鳴鳶曵雲梢弧旌枉矢虹旃蜺旄華葢承辰天畢前驅千乘雷動萬騎龍趨屬車之簉載獫獢匪唯翫好乃有秘書小説九百本自虞初從容之求實俟實儲於是蚩尤秉鉞奮鬛被般禁御不若以知神姦螭魅魍魎莫能逢旃陳虎旅於飛㢘正壘壁乎上蘭結部曲整行伍燎京薪駴雷鼓縱獵徒赴長莽迾卒清候武士赫怒緹衣韎韐睢盱跋扈光炎燭天庭囂聲震海浦河渭為之波盪吳嶽為之陁堵百禽㥄遽騤瞿奔觸䘮精亡魂失歸忘趨投輪闗輻不邀自遇飛䍐㩋箾流鏑􅚹㩧矢不虚舍鋋不茍躍當足見蹍値輪被轢僵禽斃獸爛若磧礫但觀罝羅之所羂結竿殳之所揘畢义蔟之所攙捔徒搏之所撞㧙白日未及移其晷已獮其什七八若夫游鷮高翬絶阬踰斥毚聨猭陵巒超壑比諸東郭莫之能獲乃使迅羽輕足尋影追括鳥不暇舉獸不得發青骹摰於韝下韓盧噬於􅔗末及其猛毅髬髵隅目高眶威懾兕虎莫之敢伉廼使中黄之士育獲之儔朱鬕􅡫髽植髪如竿袒裼㦸手䠑踽盤桓鼻赤象圏巨狿摣狒猬㧗㺠狻揩枳落突棘藩梗林為之靡拉撲叢為之摧殘輕鋭僄狡趫捷之徒赴洞穴探封狐陵重巘獵昆駼杪木末擭獑猢超殊榛摕飛鼯是時後宫嬖人昭儀之倫常亞於乘輿慕賈氏之如臯樂北風之同車盤于游畋其樂只且於是鳥獸殫目觀窮遷延邪睨集乎長楊之宫息行夫展車馬收禽舉胔數課衆寡置互擺牲頒賜獲鹵割鮮野饗犒勤賞功五軍六師干列百重酒車酌醴方駕授饔升觴舉燧既釂鳴鐘膳夫馳騎察貳㢘空炙炰夥清酤㩼皇恩溥洪徳施徒御恱士忘罷巾車命駕迴斾右移相羊乎五柞之館旋憩乎昆明之池登豫章簡矰紅蒲且發弋高鴻挂白鶴聨飛龍磻不特絓往必加雙於是命舟牧為水嬉浮鷁首翳雲芝垂翟葆建羽旗齊栧女縱櫂歌發引和校鳴葭奏淮南度陽阿感河馮懐湘娥驚蝄蜽憚蛟鼉然後釣魴鱧纚鰋鮋摭紫貝摶耆龜搤水豹􅎗潛牛澤虞是濫何有春秋擿漻澥搜川瀆布九罭設罜䍡摷鯤鮞殄水族蘧藕拔蜃蛤剥逞欲畋䱷效獲麑䴠摎蓼浶浪乾池滌藪上無逸飛下無遺走獲胎拾卵蚳蝝盡取取樂今日遑恤我後既定且寧焉知傾陁大駕幸平平樂張甲乙而襲翠被攅珍寳之玩好紛瑰麗以奓靡臨逈望之廣埸程角觝之妙戯烏獲扛鼎都盧尋橦衝狹鷰濯胷突銛鋒跳九劔之揮霍走索上而相逢華嶽峩峩岡巒參差神木靈草朱實離離總㑹僊倡戯豹舞羆白虎鼔瑟蒼龍吹箎女娥坐而長歌聲清暢而蜲蛇洪涯立而指麾被羽毛之襳襹度曲未終雲起雪飛初若飄飄後遂霏霏複陸重閣轉石成雷礔礰激而増響磅􅐀象乎天威巨獸百尋是為蔓延神山崔巍欻從背見熊虎升而挐攫猨狖超而高援恠獸陸梁大雀踆踆白象行孕垂鼻轔囷海鱗變而成龍状蜿蜿以蝹蝹含利颬颬化為仙車驪駕四鹿芝葢九葩蟾蜍與龜水人弄蛇竒幻儵忽易貌分形吞刀吐火雲霧杳冥畫地成川流渭通涇東海黄公赤刀粤祝冀厭白虎卒不能救挾邪作蠱於是不售爾乃建戯車樹修旃侲僮程材上下翩翻突倒投而跟絓譬隕絶而復聨百馬同轡騁足並馳橦末之伎態不可彌彎弓射乎西羌又顧發乎鮮卑於是衆變盡心酲醉盤樂極悵慄萃隂戒期門微行要屈降尊就卑懐璽藏紱便旋閭閻周觀郊遂苦神龍之變化章后皇之為貴然後歴掖庭適驩館捐衰色從嬿婉促中堂之陿坐羽觴行而無算祕舞更奏妙材騁伎妖蠱豔夫夏姬美聲暢於虞氏始徐進而羸形似不任乎羅綺嚼清商而却轉増嬋娟以此豸紛縱體而迅赴若驚鶴之羣羆振朱履於盤樽奮長袖之䬃纚要紹修態麗服颺菁眳藐流眄一顧傾城展季桑門誰能不營列爵十四競媚取榮盛衰無常惟愛所丁衛后興於鬒髮飛燕寵於體輕爾乃逞志究欲窮身極娛鑒戒唐詩他人是媮自君作故何禮之拘増昭儀於媫妤賢既公而又侯許趙氏以無上思致董於有虞王閎爭於坐側漢載安而不渝高祖創業繼體承基暫勞永逸無為而治耽樂是從何慮何思多歴年所二百餘朞徒以地沃野豐百物殷阜巖險周固衿帶易守得之者强據之者久流長則難竭柢深則難朽故奢泰肆情而馨烈彌茂鄙生生乎三百之外傳聞於未聞之者曽髣髴其若夢未一隅之能睹此何異於殷人屢遷前八而後五居相圯耿不常厥土盤庚作誥帥人以苦方今聖上同天號於帝皇掩四海而為家富有之業莫我大也徒恨不能以靡麗為國華獨儉嗇以齷齪忘蟋蟀之謂何豈欲之而不能将能之而不欲歟䝉竊惑焉願聞所以辯之之説也温泉賦前人陽春之月百草萋萋余在逺行顧望有懐遂適驪山觀温泉浴神井風中巒壯厥𩔖之獨美思在化之所原感洪澤之普施乃為賦云覽中域之珍恠兮無斯水之神靈控湯谷於瀛洲兮濯日月乎中營隂高山之比延處幽屏以閒清於是殊方跋涉駿奔來臻士女煜其鱗萃紛雜遝其如烟亂曰天地之徳莫若生兮帝育烝民懿厥成兮六氣淫錯有疾厲兮温泉汩焉以流穢兮蠲除苛慝服中正兮熈哉帝載保性命兮西征賦晉潘岳歲次𤣥枵月旅蕤賓丙丁統日乙未御辰潘子凴軾西征自京徂秦迺喟然嘆曰古往今來邈矣悠哉寥廓惚恍化一氣而甄三才此三才者天地人道唯生與位謂之大寳生有修短之命位有通塞之遇鬼神莫能要聖智弗能豫當休明之盛世託菲薄之陋質納旌弓於鉉台讚庶績於帝室嗟鄙夫之常累固既得而患失無栁季之直道佐士師而一黜武皇忽其升遐八音遏於四海天子寢於諒闇百官聽於冡宰彼負荷之殊重雖伊周其猶殆窺七貴於漢庭疇一姓之或在無危明以安位秖居逼以示専陷亂逆以受戮匪禍降之自天孔隨時以行藏蘧與國而舒巻茍蔽㣲以繆章患過辟之未逺悟山潛之逸士卓長往而不反陋吾人之拘攣飄萍浮而蓬轉寮位儡其隆替名節漼以隳落危素卵之累殻甚𤣥鷰之巢幕心戰懼以兢悚如臨深而履薄夕獲歸於都外宵未中而難作匪擇木以棲集尠林焚而鳥存遭千載之嘉㑹皇合徳於乾坤弛秋霜之嚴威流春澤之渥恩甄大義以明責反初服於私門皇覽揆余之忠誠俄命余以末班牧疲人於西夏攜老幼而入闗孔去魯而顧歎季過沛而涕零伊故鄉之可懐疚聖逹之幽情矧匹夫之安土邈投身於鎬京猶犬馬之戀主竊託慕於闕庭眷鞏洛而掩涕思纒綿於墳塋爾乃越平樂過街郵秣馬臯門稅駕西周逺矣姬徳興自高辛思文后稷厥初生民率西水滸化流岐豳祚隆昌發舊邦維新旋牧野而歴茲愈守柔以執競夜申旦而不寐憂天保之未定惟泰山其猶危祀八百而餘慶監亡王之驕淫竄南巢以投命坐積薪以待然方指日而比盛人度量之乖舛何相越之遼迥考土中於斯邑成建都而營築既定鼎於郟鄏遂鑽龜而啟繇平失道而來遷繄二國而是祐豈時王之無僻賴先哲以長懋望圉北之兩門感虢鄭之納恵討子頹之樂禍尤闕西之効戾重戮帶以定襄𢎞大順以霸世靈壅川以止鬭晉演義以獻説咨景悼以迄丐政凌遲而彌季俾庻朝之構逆歴兩王而干位踰十葉以逮赧邦分崩而為二竟横噬於虎口輸文武之神器澡孝水而濯纓嘉美名之在茲天赤子於新安坎路側而瘞之亭有千秋之號子無七旬之期雖勉勵於延吳實潛慟乎余慈眄山川以懐古悵攬轡於中途虐項氏之肆暴坑降卒之無辜激秦人以歸徳成劉后之來蘇事回泬而好還卒宗滅而身屠經澠池而長想停余車而不進秦虎狼之彊國趙侵弱之餘燼超入險而高㑹杖命世之英藺恥東瑟之偏鼓提西缶而接刅辱十城之虚夀奄咸陽以取儁出申威於河外何猛氣之咆勃入屈節於㢘公若四體之無骨處智勇之淵偉方鄙吝之忿悁雖改日而易歳無等級以寄言當光武之䝉塵致王誅於赤眉異奉辭以伐罪初垂翅於回谿不尤𤯝以掩徳終奮翼而高揮建佐命之元勲振皇綱而更維登崤坂之威夷仰崇嶺之嵯峨臯託墳於南陵文違風於北阿蹇哭孟以審敗襄墨縗以授戈曽隻輪之不反緤三帥以濟河値庸主之矜愎殆肆叔於朝市任好綽其餘裕獨引過以歸已明三敗而不黜卒陵晉以雪恥豈虚名之可立良致霸其有以降曲殽而憐虢託與國於亡虞貪誘賂以賣鄰不及臘而就拘垂棘反於故府屈産服於晉輿徳不建而民無援仲雍之祀忽諸我徂安陽言陟陜郛行乎漫瀆之口憩乎曹陽之墟美哉邈乎兹土之舊也固乃周召之所分二南之所交麟趾信於闗雎騶虞應乎鵲巢愍漢氏之剥亂朝流亡以離析卓滔天以大滌刼宫廟而遷迹俾萬乘之盛尊降遥思於征役顧請旋於􅔸汜既獲許而中惕追皇駕而驟戰望玉輅而縱鏑痛百寮之勤王咸畢力以致死分身首於鋒刅洞胸腋以流矢有褰裳以投岸或攘袂以赴水傷桴檝之褊小撮舟中而掬指升曲沃而惆悵惜兆亂而兄替枝末大而本披都耦國而禍結臧札飄其高厲委曺吳而成節何莊武之無恥徒利開而義閉躡函谷之重阻看天險之衿帶迹諸侯之勇怯筭嬴氏之利害或開關以延敵競遯逃以奔竄有噤門而莫啓不窺兵於山外連鷄互而不栖小國合而成大豈地勢之安危信人事之否泰漢六葉而拓畿縣𢎞農而逺闗厭紫極之閑敞甘㣲行以逰盤長傲賔於柏谷妻睹貌而獻餐疇匹婦其已泰胡厥夫之繆官昔明王之巡幸固清道而後往懼銜橜之或變峻徒御以誅賞彼白龍之魚服挂豫且之宻網輕帝重於天下奚斯漸之可長弔戾園於湖邑諒遭世之巫蠱探隠伏於難明委讒賊之趙虜加顯戮於儲貳絶肌膚而不顧作歸來之悲臺徒望思其何補紛吾既邁此全節兮又繼之以盤桓問休牛之故林感徴名於桃園發閿鄉而警䇿愬黄巷以濟潼眺華岳之隂崖覿高掌之遺蹤憶江使之反璧告亡期於祖龍不語怪以徴異我聞之於孔公愠韓馬之大憝阻關谷以稱亂魏武赫以霆震奉義辭以伐叛彼雖衆其焉用故制勝於廟筭砰揚桴以振塵繣瓦解而氷泮超遂遁而奔狄甲卒化為京觀倦狹路之迫隘軌踦􅛤以低仰蹈秦郊而始闢豁爽塏以宏壯黄壤千里沃野彌望華實紛敷桑麻條暢邪界褒斜右濱汧隴寶雞前鳴甘泉後湧面終南而背雲陽跨平原而連嶓冡九嵕􅏭嶭太乙巃嵸吐清風之飂戾納歸雲之鬱蓊南有元灞素滻湯井温谷北有清渭濁涇蘭池周曲浸决鄭白之渠漕引淮海之粟林茂有鄠之竹山挺藍田之玉班述陸海珍藏張叙神臯隩區此西賓所以言於東主安處所以聽於憑虚也可不謂然乎勁松彰於歳寒貞臣見於國危入鄭都而抵掌義桓友之忠規端股肱於昏主赴塗炭而不移世善職於司徒緇衣敝而改為履犬戎之侵地疾幽后之詭惑舉僞烽以沮衆淫嬖褒以縱慝軍敗戯水之上身死驪山之北赫赫宗周滅為亡國又有繼於此者異哉秦始皇之為君也傾天下以厚葬自開闢而未聞匠人勞而弗圖俾生埋以報勤外罹西楚之禍内受牧豎之焚語曰行無禮必自及此非其效歟乾坤以有親可乆君子以厚徳載物觀夫漢高之興也非徒聰明神武豁逹大度而已也乃實愼終追舊篤誠欵愛澤靡不漸恩無不逮率土且猶不遺而况於鄰里乎况於卿士乎于斯時也乃摹寫舊豐制造新邑故社易置枌榆遷立街衢如一庭宇相襲渾雞犬而亂放各識家而競入籍含怒於鴻門沛跼蹐而來王范謀害而弗許隂受劔以約莊撛白刃以萬舞危冬葉之待霜履虎尾而不噬實要伯於子房樊抗憤以巵酒咀彘肩以激揚忽蛇變而龍攄雄霸上而高驤増遷怒而横撞碎玉斗其何傷嬰罥組於軹途投素車而肉袒疎飲餞於東都畏極位之盛滿金墉鬱其萬雉峻嵃峭以繩直戾飲馬之陽橋踐宣平之清閾都中雜遝户千人億華夷士女駢闐偪側展名京之初儀即新館而莅職勵疲鈍以臨朝朂自强而不息於是孟秋爰謝聽覽餘日巡省農功周行廬室街里蕭條邑居散逸營宇寺署肆㕓管庫蕞芮於城隅者百不處一所謂尚冠修成黄棘宣明建陽昌隂北煥南平皆夷漫滌蕩亡其處而有其名爾乃階長樂登未央汎太液凌建章縈馺娑而欵駘盪轥枍詣而轢承光徘徊桂宫惆悵栢梁鷩雉雊於臺陂狐免窟於殿傍何黍苗之離離而余思之芒芒洪鐘頓於毁廟乘風廢而弗懸禁省鞠為茂草金狄遷於霸川懐夫蕭曹魏丙之相辛李衛霍之將銜使則蘇屬國震逺則張博望教敷而彛倫叙兵舉而皇威暢臨危而智勇奮投命而高節亮暨乎秺侯之忠孝淳深陸賈之優游宴喜長卿淵雲之文子長政駿之史趙張三王之尹京定國釋之之聴理汲長孺之正直鄭當時之推士終童山東之英妙賈生洛陽之才子飛翠緌拖鳴玉以出入禁門者衆矣或被髮左袵奮迅泥滓或從容傅㑹望表知裏或著顯績而嬰時戮或有大才而無貴仕皆揚清風於上烈垂令聞而不已想珮聲之遺響若鏗鏘之在耳當音鳯恭顯之任勢也乃薫灼四方震耀都鄙而死之日曽不得與夫十餘公之徒𨽻齒才難不其然乎望漸臺而扼腕梟巨猾而餘怒揖不疑於北闕軾樗里於武庫酒池鑒於商辛追覆車而弗悟曲陽僣於白虎化奢淫而無度命有始而必終孰長生而乆視武雄略其焉在近惑文成而溺五利侔造化以制作窮山海之奥秘靈若翔於神島奔鯨浪而失水曝鱗骼於漫沙隕明月以雙墜擢仙掌以承露干雲漢而上至致卭蒟其奚難惟余欲而是恣縱逸㳺於角觗絡甲乙以珠翠忍生民之減半勒東嶽以虛美超長懐以遐念若循環之無賜較面朝之煥炳次後庭之猗靡壯當熊之忠勇深辭輦之明智衛鬒髮以光鑒趙輕體之纎麗咸善立而聲流亦寵極而禍侈津便門以右轉究吾境之所暨掩細栁而撫劔快孝文之命帥周受命以忘身明戎政之果毅距華葢於壘和按乘輿之尊轡肅天威之臨顔率軍禮以長撎輕棘霸之兒戯重條侯之倨貴索杜郵其焉在云孝里之前號惘輟駕而容與哀武安以興悼爭伐趙以徇國定廟筭之勝負扞矢言而弗納反推怨以歸咎未十里於遷路尋賜劍以刎首嗟主闇而臣嫉禍於何而不有窺秦墟於渭城冀闕緬其堙盡覔陛殿之餘基裁岥岮以隠轔想趙使之抱璧瀏晲楹以抗憤燕圖窮而荆發紛絶袖而自引筑聲厲而高奮狙潜鈆以脱臏據天位其若茲亦狼狽而可愍簡良人以自輔謂斯忠而鞅賢寄苛制於捐灰矯扶蘇於朔邊儒林填於坑穽詩書煬而為煙國滅亡以斷後身刑轘以啓前商法焉得以宿黄犬何可復牽野蒲變而成脯苑鹿化以為馬假讒逆以天權鉗衆口而寄坐兵在頸而顧問何不早而告我願黔黎其誰聽惟請死而獲可逮子嬰之果决敢討賊以紓禍勢土崩而莫振作降王於路左蕭收圖以相劉料險易與衆寡羽天與而弗取冠沐猴而縱火貫三光而洞九泉曽未足以喻其高下也感市閭之菆井歎尸韓之舊處丞屬號而守闕人百身以納贖豈生命之易投誠惠愛之洽著訐望之以求直亦余心之所惡思夫人之政術實幹時之良具茍明法以釋憾不愛才以成務𢎞大體以高貴非所望於蕭傅造長山而慷慨偉龍顔之英主胸中豁其洞開羣善凑而必舉存威格乎天區亡墳掘而莫禦臨揜坎而累抃步毁垣以延佇越安陵而無譏諒恵聲之寂寞弔爰絲之正議伏梁劔於東郭訊景皇於陽丘奚信譖而矜謔隕呉嗣於局下葢發怒於一博成七國之稱亂飜助逆以誅錯恨過聽而無討茲沮善而勸惡呰孝元於渭塋執奄尹以明貶褒夫君之善行廢園邑以崇儉過延門而責成忠何辜而為戮陷社稷之王章俾幽死而莫鞠忲淫嬖之凶忍勦皇統之孕育張舅氏之姦漸貽漢宗以傾覆刺哀主於義域僣天爵於高安欲法堯而承羞永終古而不刋瞰康園之孤墳悲平后之専潔殃厥父之篡逆䝉漢恥而不雪激義誠而引决赴丹爓以明節投宫火而焦糜從灰熛而俱滅騖横橋而旋軫歴敝邑之南垂門磁石而梁木蘭兮構阿房之屈竒疏南山以表闕倬樊川以激池役鬼傭其猶否矧人力之所為工徒斵而未息義兵紛以交馳宗祧汚而為沼豈斯宇之獨隳由僞新之九廟夸宗虞而祖黄驅吁嗟而妖臨搜佞哀以拜郎誦六藝以飾姦焚詩書而面牆心不則於徳義雖異術而同亡宗孝宣於樂遊紹衰緒以中興不獲事於敬養盡加隆於園陵兆惟奉明邑號千人訊諸故老造自帝詢隠王母之非命縱聲樂以娛神雖靡率於舊典亦觀過而知仁凴高望之陽隈體川陸之汚隆開襟乎清暑之館㳺目乎五柞之宫交渠引漕激湍生風乃有昆明池乎其中其池則湯湯汗汗滉瀁瀰漫浩如河漢日月麗天出入乎東西旦似暘谷夕𩔖虞淵昔豫章之名宇披元流而特起儀景星於天漢列牛女以雙峙圖萬載而不傾奄摧落於十紀擢百尋之層觀今數仭之餘址振鷺于飛鳬躍鴻漸乘雲頡頏隨波澹淡瀺灂驚波唼喋菱芡華蓮爛於渌沼青蕃蔚乎翠㶑伊兹池之肇穿肄水戰於荒服志勤逺以極武良無要於後福而菜蔬芼實水物惟錯乃有贍乎原陸在皇代而物土故毁之而又復凡厥寮司既富而教咸帥貧惰同整檝櫂收罟課獲引繳舉效鰥夫有室愁民以樂徒觀其皷枻迴輪灑釣投網埀餌出入挺义來往纎經連白鳴桹厲響貫鰓􅙏尾掣三牽兩於是弛青鯤於網鉅解頳鯉於黏徽華魴躍鱗素鱮揚鬐雍人縷切鸞刀若飛應刄落爼靃靃霏霏紅鮮紛其初載賔旅竦而遲御既餐服以屬厭泊恬静以無欲迴小人之腹爲君子之慮爾乃端䇿拂茵彈冠振衣徘徊酆鎬如渴如饑心翹懃以仰止不加敬而自祇豈三聖之敢夢竊十亂之或希經始靈臺成之不日惟酆及鄗仍京其室庶人子來神降之吉積徳延祚莫二其一永惟此邦云誰之識越可略聞而難臻其極子贏鋤以借父訓秦法而著色耕讓畔以閑田沾姬化而生棘蘇張喜而詐騁虞芮愧而訟息由此觀之士無常俗而教有定式上之遷下猶均之埏埴五方雜㑹風流溷淆惰農好利不昬作勞宻爾獫狁戎馬生郊而制者必割實存操刀人之升降與政隆替仗信則莫不用情無欲則賞之不竊雖智弗能理明弗能察信此心也庶免夫戾如其禮樂以俟來哲華林園馬射賦并序北周庾信堯以仲春之月刻玉而遊河舜以甲子之朝披圖而巡洛夏后瑶臺之上或御二龍周王𤣥圃之前猶驂八駿我大周之創業也南正司天北正司地平九黎之亂定三危之罪雲紀御官鳥司從職皇王有秉厯之符𤣥珪有成功之瑞豈直天地合徳日月光華而已哉皇帝以上聖之姿膺下武之運通乾象之靈啓神明之徳夷典秩宗見之三禮䕫為樂正聞之九成克已備於禮容威風總於戎政加以卑躬菲食皂帳綈衣百姓為心四海為念西郊不雨即動皇情東作未登彌迴天眷兵革無㑹非有待於丹烏宫觀不移故無勞於白燕銀甕金船山車澤馬豈止竹葦兩草共垂甘露青赤二氣同為景星雕題鑿齒識海水而來王烏弋黄支騐東風而受吏於時𤣥鳥司厯蒼龍御行羔獻氷開桐花萍合皇帝幸於華林之園玉衡正而泰階平閶闔開而勾陳轉千軍雷動萬騎雲屯落花與芝葢同飛楊栁共春旗一色乃命羣臣陳大射之禮雖行祓禊之飲即同春蒐之儀止立行宫裁舒帳殿階無玉璧既異河間之碑户不金鋪殊非許昌之賦洞庭既張承雲乃奏騶虞九節貍首七章正飾五彩之雲壺寧百福之酒唐弓九合冬幹春膠夏箭三成青莖赤羽於是選朱汗之馬校黄金之埓紅陽飛鵲紫燕晨風唐成公之驌驦海西侯之千里莫不飲羽銜竿吟猿落鴈鐘鼓震地埃塵漲天酒以罍行餚由鼎進彩則錦市俱移錢則銅山合徙太史聽皷而論功司馬張旃而賞獲上則雲布雨施下則山藏海納寔天下之至樂景福之歡欣者也既而若木將低金波欲上天顔惟穆賓歌惟醉雖復暫離北闕聊晏西城即同酆水之朝更是岐山之㑹小臣不舉奉詔為文以管窺天以蠡酌海盛徳形容豈陳梗概歲次昭陽月在大梁其日上已其時少陽春史司職青祇效祥徴萬騎於平樂開千門於建章屬車釃酒複道焚香皇帝翊四圉於帝閑迴六龍於天苑對宣曲之平林望甘泉之長坂華葢平飛風烏細轉路直城遥林長騎逺帷宫宿設帳殿開筵傍臨細栁斜界祈年開鶴列之陣靡魚鬚之旃行漏抱刻前旌載鳶河湄薙草渭口澆泉堋雲五色的暈重圓陽管既調春絃實撫總章協律成均樹羽翔鳯為林靈芝為圃草銜長帶桐垂細乳鳥囀歌來花濃雪聚玉律調鐘金錞節皷於是咀銜拉鐡逐日追風并試長楸之埓俱下蘭池之宫鳴鞭則汗頳入埓則塵紅既觀賢於大射乃頒政於司弓變三驅而畫鹿登百尺而懸熊繁弱振地鐡驪踏空禮正六耦詩歌九節七札俱穿五豝同穴弓如明月對堋馬似浮雲向埓雁失羣而行斷猿求林而路絶控玉勒而搖星跨金鞍而動月乃有六郡良家五陵豪選新迴馬邑之兵始罷龍城之戰將軍戎服來叅武讌尚帶流星猶乘奔電始聽皷而唱籌即移竿而標箭馬噴沾衣塵驚灑面石堰水而澆園花乘風而繞殿熊耳刻杯飛雲畫罍水衡之錢山積織室之錦霞開司筵賞至酒正杯來至樂則賢乎秋水歡笑則勝上春臺既而日下澤宫筵䦨相圃悵徙蹕之留歡眷迴鑾之餘舞欲使石梁銜箭銅山飲羽横弧於楚水之蛟飛鏃於呉亭之虎况復恭已無為南風在斯非有心於蜓翼豈留情於㦸枝唯觀揖讓之禮葢取威雄之儀靈囿賦唐徐元弼代間秦餘地仍周舊俯皇都之近域有文王之古囿遙縈林麓之表逺抱川原之秀沼莫辨於窮流臺靡遺於層構徃往歸鳥依依顧獸逢時之慶雖鍾思古之懐亦疚當昔周徳資始靈臺是新繚以斯囿洽其至仁使芻牧畢入而獝狨皆馴目以靈知感通於異𩔖大其囿見恵洽於蒸人固以垂耿光本亭育無私公共而有俟勿亟子來而以築不麛不卵仁叶於羽毛以薪以蒸恵昭於郊牧覆露功博誠明感深遂天性於物性即人心於已心白鳥不驚匪觀於狎物非熊已兆奚事於從禽嗟乎遺址全平餘風可挹想千古之蹤未昧歎三代之英不及猶欲恣窺臨淹佇立㣲茫似隔乎煙水邐迤半臨於井邑見魚躍想坎窞於泉流聞鹿鳴訪陂阤於原隰竟以隂壑蕭條荒榛寂寥無人試問有路通樵悵望風煙之景沈吟黍稷之苗今國家以榮古為心宗周是繼且欲儲休祉降嘉惠園苑資靈囿之規宫室擬靈臺之制是以愛物之誠溥好生之徳均仁政潛施於上苑之内靈徳已播於率土之濵然簡闕逰於暇日縱芻詞於賤臣稽制度於盛王百里猶小嗣風流於前古千載為隣掌上蓮峰賦吕令問衆山邐迤曽何足仰未若太華崪為之長削成三峰壁立千丈伊昔太虚結而為山伊昔巨靈拓而為掌擘開𤣥象崛起原壤當少隂而徳合秋成據丁酉而氣涵金爽深沈其色菡萏其狀雲霞不映而其勢彌雄塵露將禆而其高靡讓掌形仙蹠石容天狀雖造次於自然若鐫磨於意匠晦夕霧而羣峰乍隠煦朝陽而衆壑相向繇是考圖籍高為四嶽之先盻靈竒勢出九天之上若乃雲搖羽葢鶴挂飛泉危峰並吐巨掌高懸異蓬萊之鼇泛海若崐崘之柱承天清露將零小為盤而仰漢陽烏假道疑拂日之孤蓮不但子先之霓裳時見羊公之石榻仍全况乎運啓皇家應河源而降望豈比詩歌周徳美嵩甫之生賢者哉既而嵐氣霽媚煙光晚濃林巒一色嵒㟧千重相清虛而可睹嘆攀陟兮無從歌曰苔生滑兮石無蹤道不可得僊不可逢倘賜一九生羽翼願輕舉於三峰駕幸華清宫賦韓休惟我皇御宇兮法象乾坤天步順動兮行幸斯存雨師灑路兮九門洞啓千旗火生兮萬乘雷奔紫雲霏㣲隨六龍而欲散還聚白日照耀候一人兮當寒却温葢上豫遊以叶運豈伊沐浴而足論若乃壯騎殿後鈎陳啓前度靈沼而魚不在藻出青門而龍見在田霜㦸森森以星布玉輅迢迢而天旋聲明動野文物藻川月落鳯城已涉於元灞日生暘谷俄届於甘泉於登三休兮憩神轡朝百辟兮禮容備玉堂憑艮面鶉野以髙明石溜象䝉遶龍宫之清毖處無為兮既端拱時或濯兮湯泉湧聖躬清兮聖徳廣四目明兮四聰朗與元氣之氛氲如晴空之滌蕩觀夫巍峩宫闕隠映煙霞盤薄鳥道經迴日車路臨八水砌比萬家樓觀排空時既知於降聖忠良在位諒勿疑於去邪儒有鵬無翼風有摶每俟命以居易尚愧身於才難觀國光以舉踵歴清華而展歡不𢋫歌以忭舞夫何足以自安乃為歌曰素秋歸兮元冬早王是時兮出西鎬幸清華兮順天道瓊樓駕虚兮靈仙保長生殿前兮樹難老甘液流兮聖躬可藻俾吾皇兮億千夀考灞橋賦王昌齡聖人以美利利天下作舟車禹乃開鑿百川紆餘舟不可以無水水不可以通輿遂各麗於所得非其安而不居横浮梁於極浦㑹有跡於通墟借如經綸淮海陶鼓仁義藏用於宻動物以智每因宜以制模則永代而取寄伊津梁之不設信要荒之莫致思未濟於中流視安危之如戲故可取於古今豈徒閱千乘與萬騎惟梁于灞惟灞於源當秦地之衝口束東衢之走轅拖偃蹇以横曵若長虹之未飜隘騰逐而水急忽須臾而聽繁雖曰其繁潰而不雜懐璧拔劍披離屯合當遊役之嗷嗷自洪波之納納客有居於東陵者接行埃之餘氛薄暮垂釣平明去耘傍連古木逺帶清濆昏曉一望還如陣雲乃臨川而嘆曰亡周霸秦舉目遺址前車覆軌不變流水嘆往事之誠非得茲橋之信美皇風不競佳氣常依既東幸而清道毎西臨以駐旂連袂挾轂烟闐雨飛嗟乎此橋且悦明盛徒結網於川隅視雲霞之暉暎聊倚柱以嘆息敢書橋以承命花萼樓賦并序高葢開元中歲天子築宫於長安東郛有以眷夫代邸之義舊者中宫起樓臨瞰於外乃以花萼相輝為名葢所以敦友悌之義也銀牓天題金扉御闕俯盡一國旁分萬里崇崇乎實帝城之壯觀也詞曰惟唐六代盛徳被於幽遐彌元都暨丹穴掩扶海與流沙莫不推福祚之攸永極威靈之所加敦夲既同夫羲軒之日睦親又比乎棠棣之花裂土苴茅以表慶錫珪分瑞以聨華信可以受無窮之祉而保乂我皇家者哉迺命有司濬池隍繕城郭將崇大壯之義載考方中之作繚垣牆周乎舊宫設井幹而為新閣既凖既繩以揆以度望馳道而通禁林走建章而抵長樂攢畫栱以交映列綺窻以相薄金鋪揺吹以玲瓏珠綴含煙而錯落飾以粉繪塗之丹雘飛梁迴遶於虹光藻井倒垂乎蓮萼信神明之保䕶亦列仙之憑託於是乘輿乃登夫翠輦而建華旒鈎陳警道兮環衛周命期門使按蹕將有事乎娛遊六龍驤首以啟路八駿騰光而夾輈且肅肅以穆穆幸夫花萼之樓然後層軒四敞聖情周顧遙窺函谷之雲近識昆池之樹綠野初霽分渭北之川原青門洞開覽山東之貢賦亦以崇友悌之徳勸農桑之務豈止唯臨鄠杜之郊空指邯鄲之路而已哉且壯麗難匹光華匪一馮禁掖以孤明隠垂楊而半出赫昈昈以𢎞敞肅隠隠而靜謐非匠氏之竒工梓人之妙術孰能至於是哉歲如何其嵗之首花萼樓兮對仙酒願比華封兮祝我聖君千萬夀歳如何其歲始正花萼樓兮開御營願同吉甫兮頌我聖君億載聲含元殿賦李華維皇高祖一作宗穆端命於元穹萬有千歳鍾景祚於洪裔建北宫之尊嚴上取治於天帝乃圖正殿之逌居規崇山而定制信神明幽贊而人謀襲契不然何前王曠此之雄麗也先是大司空帥其屬執度而相之曰美哉川原騖乎其大哉垣坤靈兮配乾剛坤順乾而為龍舒廣衍兮走羣山紛却面而朝宗陵正陽之奕奕鬱佳氣之葱葱葢昊天之作而黄祇授元聖獲以造新宫也乃審於龜筮龜筮協從太卜以告神人咸同皇曰欽哉是將宜於朕躬因以鴻稱含元建名易乾坤之説曰含𢎞光大又曰元亨利貞括萬象以為尊特巍巍乎上京則命徴盤石之匠下荆揚之材操斧執斤者萬人涉磧礫而登崔嵬擇一榦於千木規大壯於喬枚聲坎坎於青雲若神踣而顚摧勢動連崖拉風捽雷倒勁梢於窮谷斬巨柢於昭回時也山祗效靈波神作氣為桴為栰羽疉鱗萃朝沈江漢夕出河渭雲奔山横交積於作宫之地於是農事既收靈臺勿亟子來而就役者周邦畿而薄四海咸忘勞而獻力乃張為廣庭考正極星邦伯是經國工研精剗盤岡以為址太階積而三重因博厚而順高明築陵天之四墉四墉既列大階如截下上相嶔愕視沈沈其始也星鎚電交於萬堵霜鋸氷解於千尋擁材為山攢杵如林乃占日月之吉以成帝室虹梁勁於中極榱桷艥以礱宻析姑繇以為楹隳喬山以為礩飛重檐以切霞炯素壁以留日神標峻樀鬼疊層楣高卑迭作尋尺相持木從繩而後正棟操宇而不危陛瑩冰級瓦敷鱗差蕩晶景而升降歘睒眥以交輝聳大厦之竒傑勢將頓而復飛爰詔有司練日推時徴考室於周頌㑹公卿以落之丕赫哉如俯如跂若合若離森脩䆳以窅徼怳岌嶪而巖巍謂衝颷激海兮漩奫淪以無底奔雷觸山兮掉巘㟧而傾㩻石鮫拖一作拍首於堂廡狀出雲而撑鬐嵩高之制靈丘上盤隣斗極之光耀邇天漢之波瀾宻鑿枘之吞吐吸山藂而水攢建升龍之大斾邈不至於階端崢嶸孱顔下視南山照燭無間七耀迴環㰹欱赫以突兀攄閎𢎞以蕭摋捧帝座於三辰衝天街於九達進而仰之騫龍首而張鳯翼退而瞻之岌樹顛而崪雲末嶷兮峩峩巨鼇載仙山而出滄波劃兮煌煌燭龍折穹宂而臨北方排層城而廓帝居豁閶闔而面蒼蒼左翔鸞而右棲鳯翹兩闕而為翼環阿閣以周墀象龍行之曲直夾雙壺以鴻洞啓重閨之呀赩趨堂塗而未半望宸居而累息惟上聖之欽明爰聽政而崇徳去雕璣與金玉絀漢京之文飾熾丹雘於􅲠􅡳抗重霄而競色若乃紫㣲晨曀􅊮墀夜明雲薄萬栱風交四榮冬止其陽則釋裘而燠夏休其隂則捐絺巾以清旂獵風而振響葉墜露而成聲懸櫨駢湊竦柱奔列複檻曽綴高牕景爇黭翳日而罘連矐天開而中絶形持神而欲離足僂步而將跌眝昭訓之崇崇瞵光範之揭揭其南則丹鳯啓途遐矚荆吳十扇開閉隂陽睢盱容鼎九扄方駕五車示王者之無外不樹屏於清都望仙闢於巽維建福敞於坤隅偃朱旗而櫜元甲屯仡仡之驍夫其後則深闈祕殿曼宇疎楹瑞木交隂𤣥墀砥平鮮風歴廡凌霰飄英䕃藹武闈増華穆清玉燭内融則嘉盛豐備太陽臨照而天下文明古有六寢御兹一人今也三朝繇古是因布大命於宣政澹元心於紫宸羲和弭節於通乾望舒停景於觀象宻勿旒扆臣人是仰左黄閣而右紫微命伊臯以為長其下則鶡冠魚服良家茂族厲禁非宜金吾領之其前則置兩石以䘏刑張三侯以興武告善之旌登聞之皷節晷漏於鍾律架危樓之筍虡以辨内外之差以正東西之序天光流於紫庭倒影入於朱戶騰祥雲之郁靄映旭日之葱蘢清渠導於元氣玉樹生於景風平坦數里徘徊無窮羅千乘與萬騎曽不得半乎其中厥初經營天下既乂文物未周孤其壯麗葢重於施勞非不懐也乃眷睿孫睿孫開元萬物晏清而大和掩書契之所論既克廣於崇構聲明備而益尊葢聖皇之孝也輝焯變化兮動搖乾坤其東於是𢎞文教而開館對日華之清閾葢左學之遺制協前王之講徳其西於是延載筆之良史俯月華之峻扉集賢人於别殿朝命婦於中闈王風闡而成化隂教備而不虧加以詠周詩而展親睦魯衛而敦叙因合族而來晏置更衣之豐宇至於殿内諸曹則左右有局通軒並廡物有恒司供無廢舉又有銀璫珥貂寺人巷伯奉宣出納之令更踐宫中之役熊羆之旅董以龍武矛㦸森森材官羽林聲破丘山氣讋飛沈爪抉千鈞跟騰百尋克壯皇威協比其心其外則校人掌馬天駟在閑以備順逰放牧其間望我鑾和陟彼高山猶慮憲章或遺國容未備乃立掌匭之司館通事之吏職在逹下情於上天儆王言於有位堧通太極隥指龍池重門内注複道潛移幽峻肅以相屬光彤融以熺熺懸象著明帝座維三皇居設位俯察仰叅翼室正中游宫次南北起含光其容耽耽總而言之如山之夀則曰蓬萊如日之昇則曰大明自兹而北燕逰所經達於苑囿不可殫名周廬更呵匝以環衛南端百仭上極霄際却視㽎崟經途廣深繚以層城黕為重隂至若時雨膏田九農恞暢雲歸山穴儵以昭曠白日麗於宫隅混晶光而益壯於是風師歛威纎埃不升頴絶搖芒葉無飜稜自中徂外鏡洗川澄弦直閭閈井畫溝塍靡迤秦山陂陀漢陵知稼穡之艱難見皇王之廢興及乎元㝠戒寒海神飛雪瑤城粉野琪樹森列玉宇琁堦雲門露闕天華爽霽朗日朝徹赤旌降庭朱柱艷月仰白帝而金精開據河宫而銀燭發其或逺方不至帝用興戎降元帥於天上發神謀於禁中皇靈震耀殄厥渠凶矯矯武臣此焉獻功操俘馘以陳器械恢莫大之威容爾乃時殷仲冬日正南至上公奉斚羣后在位一人夀昌萬國承賜式燕以樂欣欣具醉乃撞宫懸砯碣天地及乎獻歳元辰東風發春懸法象魏與人惟新儼文物於王庭兼九伐而宿陳威儀之嚴嶽嶽振振若太一披絪縕而俯百神既而咸造勿褻㑹朝清明璿柄指寅寢闈發扃皇帝御衮龍之法服佩蒼璧之純精執鎮珪導朱紘降輦登階㣲聞玉聲於是典禮之官贊王就位南面穆然至君甸侯采衛要荒閩貊輸其方賮罔不來格統以千官六卿二伯司儀叙進象胥重譯肅肅委皮乾乾奠璧設以庭燎天烘地赫雷鼓殷殷朱干玉戚神簴如生熊羆愕眙危昻歇向歊爛歕射金根玉輅太常少伯火烈門旂霜交陛㦸乃進元元以觀禮珿億兆之増増金吾南首麾之以肱遞攀援而聳仰齊屢企而冠騰太史來告卿雲勃興灑豐澤於生人答上元之休徴申命司冦緩刑冡卿降徳秩山川而問耆老周雨露而均邦國華戎竭歡喜氣闐塞掲金鷄於太清炫晨光於正色慶忻之聲不踰晨而靁四域當斯時也驅周驟漢於廓煥爛王臨於朝天地貞觀靈宫巖巖上下交贊葢所以法乾道而遵帝度豈惟安體而明威者哉夫瑤臺之美不可以刑萬國土堦之陋不可以儀天下奢不遜而儉固久執中於大位洪範曰皇建其有極富哉上聖之宏議也詩歌楚室頌美泮宫諸侯之事也雲夢甘泉宴談景福辟王之志也論諸侯曷若以戴天子嘉辟王曷若以尊聖人烈烈盛唐祖武宗文五帝赧徳六王慚勛而政本乎慈用過乎儉夫蒼生所奉者惟君所愛者惟親寧有君親宅體於卑室而臣子得安其身乎故有熊明庭帝堯總期從人欲也天垂定星易有大壯君人法焉聖朝猶斥其華而憑其質今為是殿也惟鐵石丹素無加飾焉身居元𦕈心與萬姓同畎畆之勞以是臨衆何衆不賓以是亨神何神不若雖欲宫崑崙而館不周城八極而隍四海猶未足儲鴻猷而俯丕耀豈咸鎬一京之所能極哉䇿四瀆之前嵗勅懐鉛之小臣俾讎書於禁中正百代之遺文由是循環天造耳目日新敢頌成功告於神明無媿斯干之什式昭聖徳之容頌曰帝作含元含元言言崒若日觀呀為天門太階三層逺法崑崙鎮茲秦野揭以周原烈文祖宗永錫孝孫孝孫有慶于以施令奄甸萬姓受天休命歌之頌之管磬宜之穆穆皇君夀考無期既成斯文客有勸之上者對曰前王之宏祥詭瑞乃聖朝之細事今休徴已厭於聰明頌聲亦飫於天意夫私歌竊忭乃臣子之常志又焉足以薦聞哉客曰不然今至尊明發不寐永懐先皇周文之孝也克恭克讓光溢海内堯帝之謙也自即位以來上下之休嘉臣人之詠歌歌於睿躬則固辭頌於宗廟則無斁今吾子之文昭乎累聖之耿光美於大君之孝徳可進而退宜言而黙使雅頌之音巻而不舒猶坦蕩其胸臆無乃過歟為人之下者有可逹乎君親雖濵於死亦冒行之况宗廟或啓其心乎臣華嘗聞遷善之規願附升歌之末北斗城賦崔鎭昔炎漢之開國宅咸秦而設規闡都邑之壯麗紛制作而多儀像蓬島以疏岳擬天河而鑿池館倚南山㨖雲霞而上出城侔北斗仰星漢而曽披何爽鳩之代謝騐驪騵之運虧是以作之者不處居之者不為祚我神唐丹青焜煌峻址雲矗曽譙錦章羃赬壤以疊形凝皓粉以飛光門結黄金之石檐施白璧之璫堞盤紆於曲檻池徑復於圓塘城勢逶迤若台岑之隠映樓形宛轉似崑崙之相望接千門之宫闕通八達之康莊既而鸞駕西巡嚴扃晨啓羽衛咸集聲明克陳登睥睨以清夜聽畢逋而候春儼雄㦸以耀武振鵷行而拱辰夕沈煙雲之色曉流車馬之塵引祥昭之爛漫吐佳氣而輪囷於是歳發青道池隍煦早堞霧縈林岸風柔草暖懸竇以彌藹飾崇隅之増好映春水之澄澄納朝陽之杲杲惟壯勢之崢嶸達洪規而鎮京望浮雲之黒水對翔鳯之丹楹配宗子之永固等皇家之不傾俯賓庭而贊義終自惡其輕生封西嶽賦并序杜甫上既封泰山之後三十年間車轍馬跡至於太原遷於長安時或謁太廟祭南郊毎嵗孟冬巡幸温泉而已聖主以為王者之禮告厥成功止於岱宗可矣故不肯到崆峒訪具茨驅八駿於崑崙親射蛟於江水始為天子之能事壯觀焉爾况行在供給蕭然煩費或至作歌有慚於從官誅求坐殺於長吏甚非主上執元祖醇醲之道端拱御蒼生之意大哉聖哲垂萬代則葢上古之君皆用此也然臣甫愚竊以古者疆埸有常處贊見有常儀則備乎玉帛而財不匱乏矣動乎車輿而人不愁痛矣雖東岱五嶽之長足以勒崇垂鴻與山石無極伊太華最為難上至於封禪之事獨軒轅氏得之夫七十二君罕能兼之矣其餘或蹶踣風雲碑板祠廟終么麽不足追數今聖主功格軒轅氏業纂七十君風雨所及日月所照莫不砥礪華近甸也其可恧乎比歳鴻生巨儒之徒誦古史引時義云國家土徳與黄帝合主上本命與金天合而守闕者亦百數天子寢不報葢謙如也頃或詔厥郡國掃除曽巔雖翠葢可薄乎蒼穹而銀字未藏於金氣臣甫誠薄劣不勝區區吟詠之極故作封西嶽賦以勸賦之義預述上將展禮焚柴者實覬聖意因有感動焉為其詞曰惟時孟冬百工乃休上將陟西嶽覽八荒御白帝之都見金天之王既刋石乎岱宗又合符乎軒皇茲事體大越不可載已先是禮官草具其儀各有典司俯叶吉日欽若神祗而千乘萬騎已蠖略佁儗屈矯陸離唯君所之然後拭翠鳯之駕開日月之旗撞鳴鐘發雷輜辦格澤之修竿決河漢之淋漓彍天狼之威弧墜魍魎之霏霏赤松前驅彭祖後馳方明夾轂昌寓侍衣山靈秉鉞而踉蹡海若䕶蹕而參差風馭冉以縱􅑨雲螭縒而遲跜地軸軋軋殷以下折原隰草木儼而東飛岐梁閃倐涇渭反覆而天府載萬侯之玉尚方具左纛黄屋已焜煌於山足矣乗輿尚鳴鸞輿儲精澹慮華葢之大角低回北斗之七星皆去届蒼山而信宿屯絶壁之清曙既臻夫隂宫犀象硉兀戈鋋窸窣飄飄蕭蕭洶洶如也於是大乙抱式𤣥㝠司直天子迺宿祓齋就登陟駢素虬超崱屴天語秘而不可知代欲聞而不可得柴燎上達神光充塞泥金乎菡蓞之南刻石乎清㝠之北上意由是茫然延降天老與之相識問太㣲之所居稽上帝之遺則颯弭節以徘徊撫八紘而黬黑忽風飜而景倒澹殊狀而異色冏若褰袪開帷下辨宸極者久之雲氣蓊以迴復山嘑嶪而未息祀事孔明有嚴有翼神保是格時萬時億爾乃駐飛龍之秋秋詔王屬以中休覲羣后於高掌之下張大樂於洪河之洲芬樹羽林莽不可收千人舞萬人謳麒麟踆踆而在郊鳯皇蔚跋而來遊雷公伐鼓而揮汗地祗被震而悲愁樂師拊石而具發激越乎遐陬羣山為之相􅲞萬穴為之倒流又不可得載已乆而景移樂闋上悠然垂思曰嗟乎余昔歳封泰山禪梁父以爲王者成功已纂終古嘗鑒前史至於周穆漢武豫逰寥闊亦所不取惟此西嶽作鎭三輔非無意乎頃者猶恐百姓不足人所疾苦未暇瘞斯玉帛考乃鐘鼓是以視嶽於諸侯錫神以茅土豈惟壯設險於甸服報西成之農扈亦所以感一念之精靈答應時之風雨者矣今茲冡宰庻尹醇儒碩士僉曰黄帝顓頊乘龍遊乎四海發軔匝乎六合竹帛有云得非古之聖君而泰華最為難上故封禪之事鬱没罕聞以余在位發祥隤祉者焉可勝紀而不得已遂建翠華之旗用塞雲臺之議矧乎殊方奔走萬國皆至元元從助清廟歔欷也臣甫舞手蹈足曰大哉爍乎真天子之表奉天為子者矣不然何數千萬載獨繼軒轅氏之美彼七十二君又疇能臻此葢知明主聖罔不克正功㒺不克成放百靈歸華清朝元閣賦錢起上將恢帝宇壯神臯斷景山之松用而有節感子來之衆役不告勞成仙閣之𢎞敞配紫極之崇高先是徴規模宏大壯經始聖迹責成梓匠當桂戶而八水悠逺植玉堦而千巖相抗升陽烏於赤霄之表棲玉於翠㣲之上可以吞貝闕壓崑閬盛矣哉亦神明之化也不可得而稱狀觀乎儉以示徳高即因山虹梁天近丹陛雲還漢武求仙望蓬萊於海上吾君有道致方士於人間厥構既崇其寜惟永正色深沉於木末浮光嶙亂於山頂如翬斯飛獨出於頻農務暇霜氣澄天門闢龍輅升俯人烟於萬井小雲樹於五陵天臨宇宙日照黎蒸是時也靈仙響集品物交感因高載著於人風有象寧遺於睿覽聖人垂化稽古上清彼㑹昌之構宇得朝元之美名不奪穡地知庶心胥恱高標靈阜表聖夀長亨襟懷動植指掌寰瀛將九圍載廣與三光克明斯乃棟宇之大也雖前史莫之與京夫如是古之濬城隍飭宫苑孰比我君居高而致逺華山賦達奚珣華山惟嶽羣嶽之雄天開厥狀神致其功昔與襄山連岡不絶河水長注横流曲折神元再造拓崖而兩分仙掌常存倚天而迥列其後多歴年所至於夏王窮地絡正乾綱緑甲之功既就元圭之業有光定我祀典因為舊章同夫三事偉哉煌煌徒觀其倚伏而起削成而峻作秦塞之高標為豫州之巨鎮其南接楚其北臨晉嶔乎數都之間豈惟直上者五千餘仭逺疑將適近若將騰氤氲緑潤霮䨴青凝發地壁立連天石稜披重霄而自致與元氣而相陵旁望羣山兮盡為幽側猶夫南面兮用資峻極巍巍乎掩夏雲之竒峰蒼蒼然合秋天之正色近壓關輔載樞京國此其所以為嶽者也若乃人寰不逺勝氣常清石含古色泉落秋聲懸巖蔽虧謂乾坤之闔闢洞壑幽邃泛雷雨之滿盈怳怳乎又似龍虎潛伏鬼神含精伊彼崇林望之盡目參灝氣而森秀侔㫁山之搖矗仙草殊品靈花異族不以無人而不芳香風麗乎幽谷皆負靈造是潤是黷其物靈繁故難詳鞫蕭條世俗彷彿神仙玉女明祠星壇尚在羊公舊室石榻常穿霧雨迷處雲臺巍然則知大象所存何有於古列真攸萃寧獨於先國家南正司天北正司地人神不擾方嶽定位森森象設之若生憺憺威稜而可畏宗伯制禮巫咸視事殺氣每登騂剛必備葢所謂敬而無黷厲夫精意此則邦之禮物也受命如響依人而榮攸歆盛徳載答嘉生不愆旬時作為雲雨白漿既挹黄玉斯覩隤止如山永康中土此則神之叶贊也物被山嶽非無壯麗或隠峰於羣嶺或結根於荒裔空聞象外之談何貴人間之世而我直兩都之大道當三條之正中偏近日月高謝紛濛通天之氣成天之功鑾輅常幸聲明有融能事無爽颺言莫窮舉天下而爭長故難可而比崇渭水象天河賦劉珣昔我先王肇修人紀乃建邦國以立都鄙或處沃而稱奥或宅中而為美周兮景臺之測用㑹隂陽之擬漢據鶉首之分實為山河之理故右扶風而左馮翊距涇川而浮渭水潼函襟帶酆鄠巍峩下則崇岡於地險上乃取範於天河城雉周環而斗設宫觀駢牙而星羅轉曲江於前崖俯冀闕於中波車馬諠流渾𣲖聲之交錯風塵日夕與津霧而相和葢聖人垂則必天之象王者都㑹大洽斯享運璇衡以齊玉燭法露盤以崇金掌四方輻凑萬國攸仰風雲以之吸合日月於焉澄朗茍禎祥而應㑹則乾元之攸往何必河出圖洛出書然後為卜食之華壤者也懿哉作者元后中興後嗣同天之道順人之意横橋乃牽牛之設素滻則飲龍之謂晚光澹灔接鳳苑之祥煙曉色清明連斗城之佳氣樓臺傍而津涯隠伏鐘皷作而波濤汩沸不覩斯焉以取斯寧復知王者之貴不察所由於所以又安明坎徳之靈而主乎渭徒觀其逺界汧隴横截秦川沃長安之霞日浮京兆之雲天都邑傍於左右舟檝來而泝沿上林之煙開霧巻建章之户萬門千朝而望兮蓬瀛若留乎岸側夕而臨也河漢宛在乎目前是以婁敬云被山帶河四塞為固豈不謂天道無親惟徳是輔祥符不及瑞圖斯遇以登仁夀之理用表坤靈之喻請謂東周安處先生之徒與須知西翰林主人作賦華山賦楊敬之臣有意諷賦久不得發偶出東門三百里抵華嶽宿於址下明日試望其形容則縮然懼紛然樂蹙然憂歊然嬉快然欲追雲將浴乎天河浩然毁衣裳晞髮而悲歌怯欲深藏果欲必行熱若宅爐塞若室氷曛然以和怫然不平三復晦明以搖其精萬態既窮乃還其真形骸以安百鈞去肩然後知身之治而見其難焉於是既留無成辭以長嘆倐然一人下於崖金玉其聲霜雪其顔傳則有之代無其隣姑射之神䝉莊云始不敢視然得與言燦然笑曰用若之勇周大物用若之智窮無端三四日得無顛倒反側於胸中乎是非操其心而自别者耶雖然喜若之専而教若之聽無多傳維岳之初成二儀氣凝其間小積焉為丘大積焉為山山之大者為嶽嶽其數五予尸其一焉嶽之尊燭日月居乾坤諸山並馳附麗其根渾渾河流從禹以來自北而奔姑射九嵕荆巫梁岷道之云逺兮徒遙而賓嶽之形物𩔖不可階其上無齊其傍無依舉之千仭不為崇抑之千仭不為卑天雨初霽三峰相差虹霓出其中來飲河濵特立無朋似乎賢人守位北面而為臣望之如雲就之如天仰不見其巔肅何芊芊蟠五百里當諸侯田嶽之作鬼神反覆蛟龍不敢伏若歳大旱鞭之撲之走之馳之甘雨瀾漫百川東逝千里而散噫氣蹶然怒乎幽岩漸於人間其聲瀏瀏嶽之殊巧説不可窮見於中天挲挲而掌峨峨而蓮起者似人伏者似獸坳者似池洼者似臼欹者似弁呀者似口突者似距翼者似抱文乎文質乎質動乎動息乎息鳴乎鳴黙乎黙上乎上下乎下千品萬𩔖似是而非似非而是其無繕人事余安得畢議今作帝耳目相其聰明下矚九州在宥羣生初太易時其人俞俞其主人者始乎容成卒乎神農中間數其君姓氏可稱其徒以飲食為事未有仁義時哉時哉又何足涖是後敬乎天成乎人者必闢其心假其神與之齡降其仁故軒轅有盛徳蚩尤為賊生物不遂帝乃用力大事不可獨治降以后牧三人有心烈火就撲其子之子其孫之孫咸明且仁雖徳之衰物其所宜由夏以降湯武仁以王桀紂暴以亡太甲成康不敢有加唯遵其常享國遂長天事著矣莫見乎高而謂之茫茫余受帝命億有萬歳而不敢怠遑臣贊之曰若此古矣祖矣大矣廣矣富矣庶矣駭矣怖矣上古之事粗知之矣而神之言又聞之矣然神起居于上宫室于下如此而乆矣其所見何如也曰見若咫尺田千畆矣見若環堵城千雉矣見若杯水池百里矣見若蟻垤臺九層矣醯雞往來周西東矣蠛蠓紛紜秦速亡矣蜂巢聨聨起阿房矣俄而復然立建章矣小星奕奕焚咸陽矣纍纍繭栗祖龍藏矣其下千載改更興壞悲愁辛苦循其上矣臣又問曰古有封禪今讀書者云得其傳云失其傳語言紛綸於神何如也曰若知之乎聞聖人撫天下哀天下既信於天下則因山嶽而質於天不敢多物若秦皇漢武則率海内以奉祭祀圖福其身故廟祠相望壇墠迤邐盛氣臭夸金玉聚薪以燔積灰以封天下怠矣然猶歉歉不足秦由是替漢由是弱明天子得賢者在位能者在職廟堂之上垂衣裳而已其封禪存可也亡可也仙掌賦喻餗行盡煙蘿仙峯嶙兮高掌巍峩無得而踰扼金方之險固不言而信指秦地之山河觀其贔屭削成崟岑逺蹠斡開元氣剖破凝碧五千餘仭兮似假扶持百二之都兮如能指畫毎勞瞻望徂秦適洛之人誰可攀援駕鶴驂鸞之客勢比捫天形標一拳旁臨靄靄無際直上巉巉克全稍為動搖帶晨光而耀若如同拊擊聞石皷以轟然可以引羣生摩八極孤標承露之狀想蓄拔山之力霽雨飛盡見毛女同掌上之人嵐岫叢分封蓮峰為握中之色勢孤聳於巖巖形不𩔖於纎纎拆煙霧以斯出控關防而可瞻夕耀而丹桂輪低疑將裭佩晝短而六龍駕逸似欲攀髯拏攫難窮規模酷似莓苔剥緑以盈握葛藟駢青而繞指因罅裂以文成偶嵌空而脉起齊大道之悠久絜坤維之綱紀有客西逰時當凜秋始憑軾以遐睇惟攀雲而寫憂吾聞太華中立黄河西流有巨靈兮受天之命擘竒峰兮裂帛斯柔故得一帶東引致洪濤而直注千尋西峙標異跡以長留况乃豫鎭稱雄秦城是仰沈潛之在臂斯見示化之前蹤可賞豈非大壯皇都制遐荒而示諸掌通天臺賦任公叔武皇起雲陽之宫致崇臺於爽塏就山谷之交㑹得神明之所在近瞰八極周臨四海將端冕而不二必垂衣而有待是用迴載天路高摽地游依稀元圃想像丹丘嶝道邈以特立通天赫其無儔託神靈於秦甸結元氣於雍丘白日旁轉青雲上浮八垓可接於咫步萬象無逃於寸眸是獻歳春衆靈咸秩天子乃舉羣祠撰吉日郊上元禮太乙風伯陪乘蚩尤扈蹕向甘泉以整隊届通天而挺出既而越氛霧之途近星辰之境背麟衍之五畤面長安之萬井岐陽太華雙標象魏之形秦嶺終南遥樹軒墀之屏蹈煙霞而有慕㓗齋戒而思𤯝奉寶位之䖍恭佇神僊於光景當其宵衣待曙暘谷未開鈎陳匝乎營衛天漢列以昭回爟火周起神光迴來暨三山之遍登當仰侯於斯臺靄靄高躅神祇煜煜喜氣周慶旋雲迴復召安期於滄海降王母於黄屋樹翠玉以青葱草靈芝以芬馥上結綵幟高居耳目斯覽物以懐柔非取樂於幽獨觀乎層構凌空形勢作雄風起而纎埃不致雨過而瀑流潛通其載惟厚其覆惟洪所以大啓於皇祚豈徒峻極於蒼穹是以擁帶休徴感通純嘏㑹歌童之曲節彰從臣之風雅立極人望叶靈王者將大漢之可追願侍祠於臺下晨光麗仙掌賦潘存實晴天既曙峻嶽凝青仰熈熈之旭將吐見高高之掌呈形假彼晶光庶有分於清濁挺兹秀異示無雙於杳㝠燠矣而昇岧然相射浮艷華之爛爛靡大虚之奕奕寫乾坤之麗色先覺曈曨廓煙霧之餘姿轉見明白疑參若木似坼芙蕖杲杲之容漸積慘慘之狀不如下映而千巖共曉上照而丹霞共舒影曜人間毎當瞻瞻之早跡居物外長承煦煦之初昭昭以臨峩峩莫匹向空凝彩若月下之對金莖遶指流輝異樓上之呈素質既炫晃之旁達亦孤標而獨出幸當清浄之晨免敵沈隂之日佳氣或爍朝雲不還發明媚於紫霄之際擎彩翠於碧落之間自彰和朗寜俟躋攀遙揮六龍迴臨萬有初分焜燿訝彷彿以成文俯掬清光信爛漫而入手則知事不自妍理資相鮮因流光徳獲照金天想清風旁來宛其穆若視晴景中駐何愧拳然故得無私功博潤色道全當八極洞開之次明二儀交泰之先豈獨擘洪濛而干造化設形象以配神仙而已哉於是靈蹤長聳日華長捧不然何羣山邐迤而相奉陜西通志巻八十八
