農都尉治武關稅出入者以給關吏卒食漢書武帝本紀附王莽居攝於長安及五都立五均官更名長安東西市令東市稱京西市稱畿工商能採金銀銅連錫登龜取貝者皆自占司市錢府順時氣而取之諸取衆物鳥獸魚鱉百蟲於山林水澤及畜牧者嬪婦桑蠶織紝紡績補縫工匠醫巫卜祝及他方技商販賈人坐肆列里區謁舍謁舍今客舍也皆各自占所為於其所在之縣官除其本計其利十一分之而以其一為貢敢不自占占不以實盡沒入所採取漢書食貨志晉附苻堅永興中開山澤之利公私共之晉書苻堅載記姚興𢎞始中以國用不足增關津之稅鹽竹山木皆有賦焉羣臣咸諌以為天殖品物以養羣生王者子育萬邦不冝節約以奪其利興曰能踰關梁通利於山水者皆豪富之家吾損有餘以禆不足有何不可乃遂行之姚興載記唐髙祖武德二年以榖貴禁關內屠沽唐書髙祖本紀閏二月詔曰酒醪之用表節制於歡娛芻豢之滋致肥甘於豐衍然而沉湎之輩絶業亡資惰寙之民騁嗜奔欲方今烽燧尚警兵革未寧年數不登市肆騰踊趨末者衆浮冗尚多肴羞麴蘖重增其費救弊之術要在權宜關內諸州官民具斷屠沽册府元龜肅宗乾元元年京師酒貴肅宗以廪食方屈乃禁京城酤酒期以麥熟如初唐書食貨志德宗建中三年以京師四方所湊罷𣙜唐書食貨志閏正月初𣙜酒天下悉令官釀斛受直一千米雖賤不得減二千委州縣綜領醨簿私釀罪有差以京師王者都特免其𣙜册府元龜京兆尹韋貞取僦匱納質錢及粟麥糶於市者四取其一長安為罷市市民相率遮邀宰相哭欣盧杞疾驅而過韋貞懼乃請錢不及百緡粟麥不及五十斛者免而所獲裁二百萬緡趙贊請諸道津會置吏閲商賈錢每緡稅二十竹木茶漆稅十之一復請稅間架算除陌及涇原兵反大呼長安市中曰不奪爾商户僦質不稅爾間架除陌矣於是間架除陌竹木漆鐵之稅皆罷貞元二年復禁京城畿縣沽酒唐書食貨志十二月度支請於京城及畿縣𣙜酒之法每斗𣙜一百五十其酒户並蠲免差役從之册府元龜憲宗元和六年罷京師酤肆唐書食貨志京兆府奏𣙜酒錢除出正酒户外一切隨兩稅青苗錢據貫均率從之文獻通考文宗太和八年罷京師𣙜酒唐書食貨志二月詔京邑之內本無𣙜酤屬貞元用兵之後費用稍廣始定店户等第令辦納𣙜況萬方所聚私釀至多禁令既不可施𣙜利自無所入徒立課額殊非惠人其長安萬安兩縣見徴𣙜酒錢一萬五千一十貫八百文若先欠者並宜放免其𣙜酒錢起今亦宜停册府元龜昭宗世以用度不足易京畿邊鎮麴法復𣙜酒以贍軍鳯翔節度使李茂貞方顓其利按兵請入奏利害天子遽罷之唐書食貨志宋陜西雖𣙜酤而尚多遺利真宗咸平五年度支員外郎李士衡請增課以助邊費乃嵗增十一萬餘貫宋史食貨志景德四年詔陜西民以柴薪渡河津者勿稅文獻通考仁宗慶厯初三司言陜西用兵軍費不給尤資𣙜酤之利請較監臨官嵗課增者第賞之宋史食貨志神宗熙寧三年知慶州王廣淵言河東􅈨為利源之最請陜西别立􅈨法専置提舉官詔遣光祿丞楊蟠會議以聞蟠言坊州産􅈨官雖置場而商多私售請置鑊户定其數許於陜西北界黃河東限潼關南及京西等州令鑊户遞相保察或私賣越境禁如私白􅈨法仍增官獲私􅈨輒以夾雜減斤重之法從之熙寧以來陜西等路支移民以租賦齎貨至邊貿易以輸官者勿稅宋史食貨志十年以前商稅嵗額四十萬貫以上興元三務十萬貫以上漢二務五萬貫以上京兆十二務興二務洋八務五萬貫以下延十六務鳯翔十五務三萬貫以下同十務耀九務邠四務隴八務商四務乾八務一萬貫以下鄜五務坊四務五千貫以下鄜一務宜五務文獻通考酒課二十萬貫以上京兆二十三務延十二務鳯翔二十五務十萬貫以上華十務鄜六務漢十九務五萬貫以上同十一務耀五務邠五務隴十務興元三十六務商八務五萬貫以下坊四務鳯五務乾七務三萬貫以下丹三務興一務洋五務無定額沙苑監麟説郛元豐元年定陜西自潼關以西黃河以南售坊州􅈨宋史食貨志哲宗紹聖中以陜西沿邊官監酒務課入不足乃令邊郡非帥府並酌條制定釀酒數諸將並城寨止許於官務寄釀宋史食貨志金章宗明昌六年陜西提刑司言本路户民安水磨油栿所占步數在私地有稅官地則有租若更輸水利錢銀則是重併也乞除之省臣奏水利錢銀以輔本路之用未可除宜視實占地數除嵗租金史食貨志元世祖至元三年六月申嚴陜西竹禁陜西課程嵗辦萬九千錠元史世祖本紀竹之所産在陜西者京兆鳯翔皆有在官竹園國初皆立司竹監掌之每嵗令稅課所官以時採斫定其價為三等易於民間至元四年始命制國用使司印造竹引凡發賣皆給引元史食貨志十八年京兆等路嵗辦課額自一萬九千錠增至五萬四千錠世祖本紀二十三年命陜西竹課提領司差官於輝懷辦課食貨志成宗大德五年三月罷陜西路拘𣙜課稅所元史成宗本紀六年禁民釀酒惟安西王等許釀續文獻通考七年以嵗不登禁陜西等郡釀酒元史成宗本紀仁宗延祐七年弛陜西酒禁續文獻通考英宗至治二年弛陜西酒禁續文獻通考泰定帝泰定二年鳯翔府飢禁釀酒續文獻通考文宗大厯元年鐵課陜西行省一萬斤竹葦課奉元路三千七百四十六錠三兩六錢薑課興元路一百六十二錠二十七兩九錢酒課陜西行省一萬一千七百七十四錠三十四兩四錢醋課陜西行省一千五百七十三錠三十九兩二錢商稅額數陜西行省四萬五千五百七十九錠三十九兩二錢元史食貨志二年弛陜西山澤之禁三年免陜西行省今年商稅續文獻通考順帝至正六年陜西飢禁酒續文獻通考明初陜西稅課司局西安府稅課司三原縣稅課局同州朝邑縣稅課局延安府榆林稅課司明會典陜西布政司嵗辦藥材一萬一千七百四十四斤七兩續文獻通考太祖洪武三年陜西􅈨課一千一百六十貫一百一十文續文獻通考二十六年定陜西紙劄十五萬張鐵課一萬二千六百六十六斤明會典憲宗成化十三年五月户部尚書楊鼎等會議邊方事宜延安府鄜州及宜川中部宜君等縣舊有水磨嵗徴課鈔三千二百餘貫今磨廢課存民苦賠納乞即分豁以蘇民困上從之世法録孝宗𢎞治間議定各處嵗辦雜皮陜西三萬張又議定各處嵗辦翎毛陜西五十萬根明會典世宗嘉靖初陜西布政司商稅課程鈔折銀四千三百二十八兩九錢西安府商稅課程鈔折銀二千三百二十四兩三錢二分鳯翔府商稅課程鈔折銀二百一十九兩七錢三分漢中府商稅課程鈔折銀二百一十五兩四錢延安府商稅課程鈔折銀一百八十三兩八錢七分馬志十二年令陜西委官於潼關大慶關驗稅商貨以補王府拖欠祿米並賑濟邊儲等用四十一年題準行各司府該年班匠通行徴價類解陜西匠一萬六百八十五名每年徴銀四千七百六十兩六錢五分明會典神宗萬厯六年陜西課鈔一百七十二萬一千六百六貫六百七文課小麥二千四百九十三石四斗課銀四兩六錢五分六釐續文獻通考陜西魚課鈔二萬三千九百一十二貫九百四文明會典十一年題準陜西漢中府革稅咸陽縣皮布稅及涇咸靜平等一十七州縣並雲陽永樂二鎮店私立稅銀盡行裁革續文獻通考熹宗天啓初陜西一省共牲口銀二千八兩五錢房産稅契一萬兩典鋪酌分一萬兩世法録經費漢武帝太初元年祠后土春還受計於甘泉漢書武帝本紀師古曰受郡國所上計簿也若今之諸州計帳武帝紀注安帝永初三年天下水旱以用度不足三公奏請令吏民入錢榖得為關內侯晉書食貨志唐髙祖武德初京司及州縣皆有公廨田供公私之費其後以用度不足京官有俸賜而已唐書食貨志髙祖平京師傾府藏以賜勳人既而又患國用不足太原人劉義節進計曰今義師數十萬並在長安樵貴而布帛賤若伐街衢及苑中之樹為樵以易布帛嵗取數萬匹可立致也又藏內繒絹匹皆有餘軸之使申裁取剩物以供雜費動盈十餘萬段矣髙祖並從之大收其利册府元龜太宗貞觀初以地租春秋給京官嵗凡五十萬一千五百餘斛十八年以京兆府岐同華邠坊州隙地陂澤可墾者復給京官職田二十二年置京諸司公廨本錢捉以令史府史胥史永徽元年廢之以天下租腳直為京官俸料唐書食貨志髙宗永徽中置公廨本錢以典史主之收贏十之七以供佐史以下不賦粟者常食餘為百官俸料京兆等府錢三百八十萬京兆等府京縣一百四十三萬畿縣八十二萬五千唐書食貨志武后光宅元年以京官八品九品俸薄詔八品嵗給庶僕三人九品二人唐書食貨志玄宗開元十八年復給京官職田二十九年以京畿地狹計丁給田猶不足於是分諸司官在都者給職田於都畿以京師地給貧民唐書食貨志太倉令凡京官之祿發京倉以給六典肅宗乾元元年京官給手力課上元元年復令京官職田以時輸送受加耗者以枉法贓論其後籍為軍糧唐書食貨志代宗永泰元年分天下財賦置二使京畿關內以京兆尹判度支第五琦領之取州縣官及折衝府官苗子三之一市輕貨以賑京官大厯二年復給京兆府及畿縣官職田以三之一供軍餉唐書食貨志德宗以户部侍郎趙贊判度支代杜佑行借錢令約罷兵乃償之京兆尹韋貞長安丞薛萃搜督甚峻民有不勝其寃自經者家若被盜然總京師豪人田宅奴婢之估裁得八十萬緡減百官料錢以助軍唐書食貨志貞元元年自春大旱麥枯死禾無苗度支奏京師經費及關內外征討士馬月須米鹽五十三萬石錢六十萬貫草三百八十三萬圍春冬衣賜元日冬至立仗賜物不在其中時漕江東租賦百餘萬貫在江陵度支主吏宋棲桐無部置遇火焚之國用益窘關中百姓蒸蝗曝揚去翅足而食之人心大恐册府元龜關輔宿兵以永豐倉米給禁中三年李泌為相增百官及畿內官月俸復置手力資課嵗給錢六十一萬六千餘緡泌以度支有兩稅錢鹽鐵使有管𣙜錢可以擬經費中外給用每貫墊二十號户部除陌錢復有闕官俸料職田錢積户部號户部别貯錢御史中丞専掌之皆以給京官嵗費不及五十五萬緡京兆和糴度支給諸軍冬衣亦往往取之唐書食貨志初德宗居奉天儲蓄空窘嘗遣卒視賊以苦寒乞襦不能致剔親王帶金而鬻之朱泚既平乃屬意聚斂常賦之外進奉不息文獻通考憲宗元和中祠祭蕃夷賜宴别設皆長安萬年人吏主辦二縣置本錢配納質積户收息以供費唐書食貨志比部京師倉庫三日一比諸司諸使京都四時勾會於尚書省以後季勾前季百官志穆宗長慶四年五月敕近日訪聞京城米價稍貴須有通變以便公私宜令户部應給百官俸料其中一半合給匹段者回給官中所糴粟每斗折錢五十文其匹段委别收貯至冬糴粟填納大倉時人以為甚便册府元龜文宗開成元年正月一日赦詔其京兆府附一年所支用錢物斛斗草等並勒鹽鐵使以開成元年直進綾絹充還辛酉鹽鐵使左僕射令狐楚請以罷修曲江亭子絹一萬三千七百匹回修尚書省册府元龜宋仁宗天聖元年同華州請免支移帝以問輔臣對曰西鄙宿兵非移用民賦則軍食不足特詔量減支移寶元中陜西用兵調度百出縣官之費益廣三司使王堯臣取陜西等三路未用兵及用兵後嵗出入財用之數會計以聞寶元元年未用兵出入錢帛糧草陜西入一千九百七十八萬出二千一百五十一萬用兵後陜西入三千三百九十萬出三千三百六十三萬蓋視河東河北尤劇以兵屯陜西特多故也宋史食貨志范仲淹乞留陜西路公使錢疏略曰朝旨下陜西省罷同解乾耀等九州軍公使錢共一千八百貫文切以國家逐處置公使錢者蓋為士大夫出入及使命往還有行役之勞故令郡國饋以酒食或加宴勞蓋養賢之禮不可廢也謹按周禮地官有遺人掌郊里之委積以待賓客野鄙之委積以待羈旅三王之世已有厨傳之禮何獨聖朝顧小利而忘大體且今贍民兵一名嵗不下百貫今減省公用錢一千八百貫只養得兵士一十八人以十八人之資廢十餘郡之禮是朝廷未思之甚也況今逐州使命之外各有軍營每年春後邊兵歇泊動經半年軍中人員並無宴犒之具雖條貫有旬設之名逐州每月一次舉行軍員各給錢一百文已來官務薄酒二升既無公用更不赴筵亦不張樂豈朝廷宴饗將校之意州郡削弱道路咨嗟當全盛之朝豈宜如此伏望聖慈速降指揮下陜西路轉運司昨來經減廢公用錢處並令依舊庶協典禮稍息物論范文正公集神宗熙寧六年初陜西用兵凡費緡錢七百餘萬帝以問王安石安石曰楚建中考沈起簿書計一道半嵗費錢銀紬絹千二百萬貫匹兩帝因欲知陜西嵗用錢榖金帛及增虧凡數乃詔薛向條上王安石以為擾力請罷之宋史食貨志哲宗紹聖初陜西諸路連嵗興師費資糧不可勝計元符二年經略使章楶建曰伏見興師以來陜西府庫倉廪儲蓄內外一空前後資貸內藏金帛不知其幾千萬數即今所在糧草盡乏漕臣計無所出文移指空而已今者正休兵息民清心省事之時惟深察臣言裁決斯事若更詢主議大臣竊恐専務興師上誤聖聽主議大臣指章惇也時內藏空乏陜西諸路以軍賞銀絹數寡請給於內藏庫詔以絹五十萬匹豫之宋史食貨志徽宗宣和末饋餉空乏鄜延至不能支旬月宋史食貨志金百官俸給陜西葮州等處世襲藩巡檢月支錢粟一十貫石絹二匹綿一十兩續文獻通考哀宗正大三年十一月詔陜西省凡戎事三品以下官聽以功過賞罰付銀二十五萬兩從其給賞六年七月罷陜西省軍中浮費金史哀宗本紀元憲宗七年冬十一月遣阿拉克岱爾托音囊嘉特等詣陜西理算錢榖元史憲宗本紀命劉太平等會計京兆財賦大加鈎考其貧不能輸者帝為代償之續文獻通考世祖至元十年遣斷事官麥肖勾校陜省錢榖二十五年僧格請以參知政事實都等十二人理算安西等六省錢榖耗失之數給兵以衛其行詔皆從之元史世祖本紀文宗天厯元年惠民藥局官給鈔本月營子錢以備藥物陜西行省二百四十錠元史食貨志明成祖永樂元年令陜西布政司按察司官俸米鈔兼支及所屬府州縣等官俸全支鈔者俱仍舊令陜西各府州縣教官生員俸糧俱米鈔中半兼支明會典英宗正統五年令陜西王府審理工正等官照有司官例月支米二石餘折鈔明會典憲宗成化十年巡撫陜西都御史馬文升奏西安府供給秦庶人尚欣等男婦四十五口嵗支糧一百六十二石厨料銀四百八十六兩因無官錢坐派所屬人户出辦近輸運疲敝供給愈難乞以厨料銀總折米數與口糧按月於永豐倉支送詔從之世法録十三年令陜西三司並衛所首領及府州縣等官俱照甘肅例五品以上二八兼支六品以下三七兼支不彀二石者照舊支本色又令延綏巡撫官照甘肅例出巡每日支廪給米五升在倉支五升回日通在倉支一斗明會典穆宗隆慶元年查得陜西織絨遵奉遺詔既已停止其原行徴辨織造採買銀兩通應解部續文獻通考熹宗天啓初陜西巡按公費銀三千兩抽扣工食銀四萬一千二百一十五兩世法録陜西通志卷二十六
