body:
  text: 陜西通志卷二十六貢賦三更名地丁經雜課稅稅課費歷代田賦户役更名地丁陜西糧鹽道並鳯翔府屬及商州屬鎮安縣更名省總原額更名本折贍賜煙莊及隨磨並莊基共地玖千捌伯陸拾伍頃㭍拾一畝肆分二釐伍絲㭍忽山坡山場栗柿竹等園伍伯二拾一處段山場內地一拾一分及坐落商州屬山坡山場二處原無頃畝又莊基二伯叄間二拾㭍丈捌尺竹枝伍坡鮮笋伍伯把竹園叄處栗園肆處水旱碾磨一拾捌合水渠一道納課房玖伯伍拾叄間店房肆處除荒並豁免外實熟水旱各等共地捌千叄伯㭍拾一頃肆拾玖畝叄分一釐叄毫陸絲叄忽二微實徴本色糧除粟榖折米減額外並旱地改種水地加增本色共糧肆萬玖伯㭍拾肆石叄斗陸升肆合伍抄玖撮玖圭陸粟二粒折色銀及新增地租等項共銀伍千叄伯二拾肆兩伍錢陸分肆釐伍毫玖絲伍忽開墾地玖頃捌拾陸畝叄分二釐該徴本色糧二拾玖石捌斗二升玖合一勺叄抄㭍撮二圭一粟陸粒又折色銀叄兩㭍分捌釐一絲捌忽外山場內地一拾一分山坡山場肆伯二拾㭍處段並墾過山坡二段無頃畝共該徴本色糧捌拾㭍石玖斗肆升肆合肆勺折色銀陸伯陸拾伍兩一錢叄分一釐二毫伍絲莊基一伯肆拾一間二拾㭍丈捌尺該徴本色糧二石陸斗一升伍合又商州屬鎮安縣山坡山場二處原無頃畝內開墾熟地伍頃捌拾畝玖分捌釐陸毫玖絲共徴折色銀一拾二兩肆錢叄分二釐叄毫一絲玖忽伍微二纎㭍渺原額校丁二拾叄丁雍正伍年以糧載丁共均丁銀㭍千二伯一拾二兩玖錢㭍釐叄絲陸忽一微捌纎陸塵一渺外山坡竹枝肆坡鮮笋肆伯把栗園肆處水旱碾磨一拾叄合水渠一道納課房並隨磨大小房捌伯肆拾叄間果價油柿等項各徴不同該徴碾課本色糧一拾伍石二斗一升又折價共該銀㭍伯捌拾叄兩叄錢㭍分玖釐叄毫按此數項在載丁外起運本色糧肆萬一千玖拾玖石玖斗陸升二合伍勺玖抄㭍撮一圭㭍粟捌粒存留本色糧一拾石起運銀一萬叄千玖伯玖拾玖兩一錢玖分二釐伍毫一絲捌忽㭍微陸塵捌渺遇閏載丁內加增銀二伯二拾肆兩伍錢一分捌毫玖絲㭍忽捌微伍塵陸渺存留銀二兩叄錢糧鹽道屬廢秦藩原額更名本折及隨磨並莊基共地玖千陸伯捌拾叄頃肆拾二畝伍分伍釐玖毫伍絲㭍忽山場內地一拾一分山坡山場栗柿竹等園伍伯一拾玖處段無頃畝莊基二伯叄間二拾㭍丈捌尺竹枝伍坡鮮笋伍伯把竹園叄處栗園肆處水旱碾磨一拾捌合水渠一道納課房玖伯伍拾叄間店房肆處除荒并豁免外實熟水旱各等共地捌千二伯陸拾捌頃捌拾玖畝叄分肆釐陸毫伍絲叄忽二微實徴本色糧除粟榖折米減額外並旱地改種水地加增本色共糧肆萬二拾一石㭍斗伍升肆合二勺陸抄捌撮捌圭玖粟折色銀伍千二伯伍拾㭍兩叄錢玖分叄毫陸絲㭍忽開墾地玖頃二畝肆分㭍釐該徴本色糧二拾石㭍升㭍合肆勺叄抄㭍撮二圭一粟陸粒又折色銀叄兩㭍分捌釐一絲捌忽外山場內地一拾一分山坡山場肆伯二拾㭍處段並墾過山坡二段無頃畝共該徴本色糧捌拾㭍石玖斗肆升肆合肆勺又折色銀陸伯陸拾伍兩一錢叄分一釐二毫伍絲莊基一伯肆拾一間二拾柒丈捌尺該徴本色糧二石陸斗一升伍合雍正伍年以糧載丁共均丁銀㭍千伍拾叄兩叄錢叄分玖釐陸毫二絲二忽㭍微一纎伍塵陸渺外山坡竹枝肆坡鮮笋肆伯把栗園肆處水旱碾磨一拾叄合水渠一道納課房並隨磨大小房捌伯肆拾叄間果價油柿等項各徴不同該徴碾課本色糧一拾伍石二斗一升又折價共該銀㭍伯捌拾叄兩叄錢㭍分玖釐叄毫起運本色糧肆萬一伯叄拾㭍石陸斗一合一勺陸撮一圭陸粒內糯米一千肆伯一拾石玖斗伍升叄合㭍勺二抄一圭遞年照時價折估不等徴解司庫存留本色糧一拾石此項係起運內扣留冰窖人役口食起運銀一萬叄千㭍伯陸拾兩一分捌釐伍毫伍絲㭍忽㭍微一纎伍塵陸渺遇閏加徴銀二伯一拾玖兩伍錢肆分肆釐一毫伍絲玖忽二微㭍纎玖塵玖渺存留銀二兩叄錢此項係起運內扣留冰窖祭祀長安縣按長安等縣相沿舊無原額考之全書亦未刋列今照奏册實熟地糧開載廢秦藩更名水旱並河崩各等共實熟地一千一伯二拾叄頃伍畝捌分肆毫捌絲玖忽實徴本色糧陸千肆伯肆拾伍石肆升二合捌勺陸抄二撮伍圭叄粟陸粒伍顆折色銀一千叄伯玖拾陸兩一分捌釐一毫玖絲捌忽㭍微㭍纎開墾地二頃一拾一畝肆分並山坡二段莊基二拾伍間二拾㭍丈捌尺該徴本色糧捌石陸斗伍升陸合肆勺肆抄又開墾地折色銀一錢一分一釐玖毫一絲捌忽雍正伍年以糧載丁共均丁銀一千二伯二兩一錢二分陸釐一毫一忽玖微捌纎二塵伍渺外房玖拾肆間該徴課銀肆拾肆兩叄錢伍分又栗園肆處栗果並柿花共價銀一伯一拾陸兩叄錢二分一釐伍毫起運本色糧陸千肆伯伍拾叄石陸斗玖升玖合叄勺二撮伍圭叄粟陸粒伍顆內糯米叄伯㭍拾叄石二斗二升叄合陸勺叄抄陸撮遞年照時價折估不等徴解司庫起運銀二千㭍伯伍拾捌兩玖錢二分㭍釐㭍毫一絲捌忽㭍微伍纎二塵伍渺遇閏載丁內加增銀叄拾㭍兩肆錢一分㭍釐㭍毫二忽陸微玖塵捌渺咸寧縣廢秦藩更名水旱並河崩沙旱各等共實熟地玖伯捌拾陸頃二拾伍畝肆分捌釐一絲伍忽實徴本色糧伍千陸伯叄拾石肆斗捌升陸合捌勺捌抄二撮叄圭二粟陸粒折色銀捌伯玖拾二兩二錢㭍釐陸毫伍絲玖纎肆塵開墾地肆拾伍畝㭍釐並山坡一段莊基陸拾肆間該徴本色糧叄石肆斗㭍升一合陸勺捌抄又開墾地折色銀一錢伍分㭍毫雍正伍年以糧載丁共均丁銀玖百玖拾玖兩肆錢肆分二釐捌毫伍絲二忽玖微㭍纎玖