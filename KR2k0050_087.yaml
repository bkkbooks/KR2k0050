body:
  text: 陜西通志卷八十七藝文三表狀議策檄露布羣下上漢帝請先主為漢中王表漢諸葛亮昔唐堯至聖而四凶在朝周成仁賢而四國作難高后稱制而諸吕竊命孝昭幼沖而上官逆謀皆馮世寵藉履國權窮凶極亂社稷幾危非大舜周公朱虛博陸則不能流放禽討安危定傾伏惟陛下誕姿聖德統理萬邦而遭厄運不造之艱董卓首難蕩覆京畿曹操階禍竊執天衡皇后太子鴆殺見害剝亂天下殘毁民物久令陛下蒙塵憂危幽處虛邑人神無主遏絶王命厭昧皇極欲盜神器左將軍領司𨽻校尉豫荆益三州牧宜城亭侯備受朝爵秩念在輸力以殉國難覩其機兆赫然憤發與車騎將軍董承同謀誅操將安國家克寧舊都會承機事不密令操遊魂得遂長惡殘泯海內臣等每懼王室大有閻樂之禍小有安定之變夙夜惴惴戰栗纍息昔在虞書敦序九族周監二代封建同姓詩著其義歷載長久漢興之初割裂疆土尊王子弟是以卒折諸吕之難而成太宗之基臣等以備肺腑枝葉宗子藩翰心有國家念在弭亂自操破於漢中海內英雄望風蟻附而爵號不顯九錫未加非所以鎮衛社稷光昭萬世也奉辭在外禮命斷絶昔河西太守梁統等值漢中興限於山河位同權均不能相率咸推竇融以為元帥卒立效績摧破隗囂今社稷之難急於隴蜀操外吞天下內殘羣寮朝廷有蕭牆之危而禦侮未建可為寒心臣等輒依舊典封備漢中王拜大司馬董齊六軍糾合同盟掃滅凶逆以漢中巴蜀廣漢犍為為國所署置依漢初諸侯王故典夫權宜之制苟利社稷專之可也然後功成事立臣等退伏矯罪雖死無恨按梁州記先主為漢王權住沔陽城在今漢中沔縣界後出師表前人先帝慮漢賊不兩立王業不偏安故託臣以討賊也以先帝之明量臣之才固知臣伐賊才弱敵強也然不伐賊王業亦亡惟坐而待亡孰與伐之是故託臣而弗疑也臣受命之日寢不安席食不甘味思惟北征宜先入南故五月渡瀘深入不毛并日而食臣非不自惜也顧王業不可偏安於蜀都故冒危難以奉先帝之遺意也而議者謂為非計今賊適疲於西又務於東兵法乘勞此進趨之時也謹陳其事如左高帝明並日月謀臣淵深然涉險被創危然後安今陛下未及高帝謀臣不如良平而欲以長䇿取勝坐定天下此臣之未解一也劉繇王朗各據州郡論安言計動引聖人羣疑滿腹衆難塞胸今嵗不戰明年不征使孫策坐大遂并江東此臣之未解二也曹操智計殊絶於人其用兵也髣佛孫吳然困於南陽險於烏巢危於祁連逼於黎陽幾敗北山殆死潼關然後偽定一時爾況臣才弱而欲以不危而定之此臣之未解三也曹操五攻昌霸不下四越巢湖不成任用李服而李服圖之委任夏侯而夏侯敗亡先帝每稱操為能猶有此失況臣駑下何能必勝此臣之未解四也自臣到漢中中間期年耳然喪趙雲陽羣馬玉閻芝丁立白壽劉邰鄧銅等及曲長屯將七十餘人突將無前賨叟青羌散騎武騎一千餘人此等皆數十年之內所糾合四方之精鋭非一州之所有若復數年則損三分之二也當何以圖敵此臣之未解五也今民窮兵疲而事不可息事不可息則住與行勞費正等而不及早圖之欲以一州之地與賊持久此臣之未解六也夫難平者事也昔先帝敗軍於楚當此時曹操拊手謂天下已定然後先帝東連吳越西取巴蜀舉兵北征夏侯授首此操之失計而漢事將成也然後吳更違盟荆州毁敗秭歸蹉跌曹丕稱帝凡事如是難可逆見臣鞠躬盡瘁死而後已至於成敗利鈍非臣之明所能逆覩也由南歸魏自陳表北魏夏侯道遷臣聞知機其神趨利如響臣雖不武敢忘機利伏惟陛下澤被區宇德濟蒼生八表同欣品物咸賴臣頃亡蟻賊匹馬歸闕自斯搏噬罄竭丹欵但中於壽陽橫為韋纘所謗理之曲直並是楊集朗王秉所悉臣實愚短豈能自安便逃竄江吳茍存視息梁衍梁州刺史莊丘黑與臣早舊申臣為長史值黑亡殁専任天時素願機會在兹遇武興私署侍郎鄭洛生來此臣即披露誠欵與其共契機要報武興王楊紹先并其中叔集起等請其遣軍以為腹背即遣左天長由寒山路馳啓復會通直散騎常侍臣集朗還至武興臣聞其至知事必尅集朗果遣鄭右留使至臣間密參機舉會有蕭衍使人吳公之至知臣懷誠將歸大化遂與府司馬嚴思臧恭典籖吳宗肅王勝等共楊靈珍父子密相構結期當取臣臣幸先覺悉得戮思恭等臣即遣鄭猥馳告集朗急求軍援而武興軍未至之間蕭衍白馬戌主尹天寶不識天命固執愚迷乃率部曲驅掠民丁敢為不逞臣即遣軍主江悅之率諸軍主席靈坦龎樹等領義勇應時討撲而樹鋭氣難裁違悅之節度輕進失脫天寶因此直到南鄭重圍州城梁秦士庶僉云危棘以義逼臣勸為刺史須藉此威鎮靜內外臣赤誠奉國茍取濟事輒捐小迹且從權宜假當州位重遣皇甫選由斜谷道以事啓聞臣即親率士卒四日三夜交鋒苦戰武興之軍乘虛躡後天寶凶徒因宵鳥散進既摧破退失巢穴潛舍軍衆依山傍險突入白馬集朗與二弟躬擐甲胄率其所領登即擒斬戍內户口即放還民斯由皇威遐振罪人授首凶校時殄公私慶快非但梁秦竭力實關集朗赴接之機臣前已遣軍主杜法先還洵陽搆合徒黨誘結鄉落令晉壽土豪王僧承王文粲等還至西關共興大義當今庸蜀虛弱楚鄧懸危開拓九區掃清六合形要之利在於此時進趨之略願速處分臣以愚陋猥當推舉事定之後便即束身馳歸天闕但物情草創猶有參差蕭衍魏興太守范珣安康太守范泌共前巴西太守薑修屯聚川東尚規舉斧登遣討襲具於别啓集朗兄弟並議曰臣往日歸誠誓盡心力超蒙榮奬灰殞匪報但留臣權相綏奬須得撲滅珣等便即首路伏願聖慈特垂鑒照為鳯閣侍郎李元素進冬椹表唐李嶠臣某言聞京兆萬年縣大寧坊宅內有桑一株暮秋生子初冬椹熟今謹取得專輒進奉伏惟陛下惠覃區宇仁洎草木故得神蠶之樹發秀於寒露之辰帝女之林結實於繁霜之下出於萬年之界彰一人萬嵗之符生自大寧之坊表羣生大安之慶鴟梟已革見夷貊之懷音絲繭行豐知府藏之逾實殊禎薦委絶貺仍臻凡在含生孰不欣慶為太子請以家令寺地給貧人表崔融臣聞法天之道義屬於有餘象地之宜理存於益寡頃以咸城近縣鄜市傍州頗積風霜或侵苗稼天王兩儀合德百姓為心發倉廪以賑貧人垂雨露以滋微物俗荷裁成之施家懷亭毒之恩臣忝奉宗祧親承覆載嵗時衣服咸憑府藏之餘朝夕膳羞必佇饔餼之辦過此以往臣亦何求但知問豎寢門尊師胄序魏兩文儒之盛竊所係心漢儲湯沐之資未嘗留意但關輔之地萌庶孔殷丁壯受田罕能充足所以水旱之嵗家室未豐正末端本思有禆助臣家令寺有地九百餘頃特請回授關中貧下等邑雖地非安邑寧期千户之封而價等露臺虛費十家之産伏望皇恩逺及聖澤旁流矜臣愚效遂臣誠請為留守作慶山醴泉表張説臣聞至德洞微天鑒不逺休徴祕景時和則見是知綿代曠厯慶牒祥經帝王有必感之符神靈無虛出之瑞伏惟陛下金鏡御天璿衡考政欽若元象𢎞濟蒼氓茂功將大造混成純化與陽和俱扇朝百神之樂職宅萬國之歡心嘉氣內充淫雨外息豈止搖風紀月之草列蒔於階厨儀簫御籙之禽相鳴於户閣而已固有發禎厚載抽貺泉源表元德之潛通顯黃祗之昭報臣去六月二十五日得所部萬年縣令鄭國忠狀稱去六月十四日縣界霸陵鄉有慶山見醴泉出臣謹差司户參軍孫履直對山側百姓檢問得狀其山平地湧拔周回數里列置三峰齊高百仞山見之日天晴無雲異雷雨之遷徙非崖岸之騫震歘爾隆崇巍然蔥鬱阡陌如舊草樹不移驗益地之祥圖知太乙之靈化山南又有醴泉三道引注三池分流接潤連山對浦各深丈餘廣百步味色甘潔特異常泉比仙漿於軒后均愈疾於漢代臣按孫氏瑞應圖曰慶山者德茂則生臣又按白虎通曰醴泉者義泉也可以養老常出於京師禮斗威儀曰人君乘土而王其政太平則醴泉湧潛潭巴曰君臣和德道度叶中則醴泉出臣竊以五行推之六月土王神在未母之象也土為宫君之義也水為智土為信水伏於土臣之道也水相於金子之佐也今土以月王而高水從土制而靜天意若曰母王君尊良臣善相仁化致理德茂時平之應也臣又以山為鎮國水實利人縣有萬年之名山得三仙之類此蓋金契景福寶祚昌圖邦固不移之基君永無疆之壽自永昌之後迄於兹辰地寶屢升神山再聳未若連巖結慶並泌疏甘羣瑞同區二美齊舉高視今古曽無擬議信可以紀元立號薦廟登郊彰賁億齡愈衍萬宇臣辱司京尹忝寄留臺牧西土之疲人荷東蕃之餘寵遊泳鴻露震悚明神禧祉有歸光啓兹部喜覩殊觀實百恆流踴躍一隅馳誠雙闕伏請宣付史館頒示外廷無任鳬藻之至謹遣官並圖奉進再請封西嶽表崔翹臣翹等伏稽古訓上請增封再奉明旨未蒙允諾臣等承詔惶駭失圖臣聞省方展義君人之大典登封告成王者之丕業是以古先哲后道洽則封所以答神祗之功增兆庶之福無私於已故行之者不思必順於天故言之者難奪敢昧萬責竭誠終請伏惟陛下紹文武之丕烈合君臣於昌運均雨露和隂陽西海無波而靜默羣生自樂而仁壽由是德懷蠻貊澤洎昆蟲宗廟祀典罔不祗肅要荒殊俗亦莫不庭自皇王已來載籍所記未有混區宇窮禎祥地平天成德茂道洽若今日之盛者也固可告太平之功展封崇之禮故臣與王公侯伯黎老緇黃纍陳白奏備竭丹懇豈謂聖恩猶阻皇鑒未回伏奉癸丑詔書曰輕修大典所不願為臣等戰栗匪遑寧處實以陛下功成道洽理實升中且夫龜龍咸格天意也夷夏大同人事也時和年豐太平也無為清淨至理也允應大典豈謂輕修乎奉若靈命安可不為乎臣等敢冒宸極重明其義竊以西嶽華山實鎮京國皇虞之所循省靈仙之所依憑固可封也况金方正位合陛下本命之符白帝臨壇告陛下長生之籙發祥作聖抑有明徴又可封也昔周成王以剪桐為戲唐叔因是而定封蓋人君之言動有成憲斯事至細猶不忽也况陛下眷言封祀宿著神明道已洽於升平事未符於琬琰豈可抑至公於私讓棄誠信於神明乎固不可得而辭也日者封章纍奉嘉應必臻一獻而甘雨流再陳而瑞雪降則知人天之意影響合符若然者陛下安得稽天命以固辭違人事以久讓太平不告其若休祥何至理不答其若神祗何伏願仰答天心允祗靈貺上以揚祖宗之盛烈下以副億兆之懇誠克崇上報永光大典請封西嶽表李徹伏見禎祥委積河海澄清長瞻北極之尊屢獻西封之疏誠懇不達天鑒未從徘徊闕庭隕越無地陛下再造區宇肇康生人與天合符與道契合故得靈芝表瑞玉板呈文九榖嵗衍於京坻百蠻盡習其冠帶能事備於典策盛德光於祖宗升中告成是屬今日惟夫太華高冠羣山當其少隂鎮此西土自有虞巡狩歷祀三千夏殷以還罕能肆覲陛下雖加進寵號增崇廟宇而大禮未施精意空潔又陛下頃嵗建碑曰嘗勤報德之願未暇封崇之禮萬姓瞻豫言可復也臣以為天地之主豈徒信哉神祗候望故已久矣伏願俯順百辟兆人之請明徴刻石銘山之記暫遷萬乘降被三峰奠圭璧於中壇奏笙鏞於上帝使普天蒙福重賜無疆頻冒宸嚴並期必遂請頒示御製西嶽碑文表李禕臣伏見御製西嶽碑文來從上元光照下土羣臣捧戴遊聖難名臣聞天作高山氣雄兹嶽壓洪河而傑起凌蒼昊而孤標近當國門用固京邑自巨靈開拓往帝巡遊精意嘗聞頌聲則未非勝賞難就蓋詞翰無能不遇非常之君孰覩非常之事陛下知其若此金聲而玉振之乃發揮睿詞幽贊神化廣大極天地光明融日月至理洞精微至功含造化合而成體散而成章巍乎煥乎不可得而稱也又復親迂彩筆寫在香箋隨手生姿入神變態勢如飛動妙絶古今諒得之自然豈因之外物對揚天休臣子之常也美而無述過莫大焉請以御製碑文頒示四海使伊昔之后自愧不才率土之臣咸知所謂讓山南西道副元帥及山南節度使表李抱玉臣志誠有涯寄任過分嘗懼覆敗自貽譴責且授其旄節扞彼蕃戎所掌之兵須自訓練如臂使指若網在綱則人有固心前無強敵今以臣守在西鄙兼統漢中撫循實難威令不及况自壠坻達於扶文綿亘邊陲二千餘里雖山谷險阻足為藩蔽其中賊路不一皆要防虞加之夷狄無厭憑陵滋甚去年既侵右地復擾西山倘至前秋兩道俱下臣若固其􅊈隴則不救梁岷若進兵扶文恐患逼關輔首尾不應進退無從伏惟陛下居安慮危圖難於易其前件使及梁州刺史伏請别擇能者悉以委之令臣西備隴關竭其誠節國家大計敢不上陳李採訪請駕停金牛一日表常衮臣聞葵藿何稟猶每傾陽犬馬無知尚能戀主伏惟陛下回鑾巴蜀指斾咸秦萬乘雷奔經劒門之險阻六宫雲從歷棧道以﨑嶇恐天步有厭於登臨聖躬暫勞於行幸稍移玉輦將至金牛漢水梁城郡當所守蜀門秦塞路則居中乃微臣厠侍從之時宜陛下休羽儀之地伏望小停仙蹕寬一日之程暫奉宸居喜千年之遇臣忝陪宗室得備藩條懇欵之誠倍萬恆品無任攀戀屏營之至奉表陳情以聞為郭子儀讓華州及奉天縣請立生祠堂及碑第四表邵説伏以奉天華州耆壽請為臣立碑及生祠臣自揣功業至薄不足以當刋紀百姓至弊不可以興力役歷獻愚懇至於再三言不動天未蒙允納夙夜兢懼不遑寧止臣非有馬援南征之績竇憲北伐之功安敢飾詞以陳謙讓但以兵革不息十年於兹天下之人未獲其所臣幸備相位尚負憂責頃嵗之克復京都去冬之小却戎醜所有微效皆稟聖謀然未能使干戈盡銷郊甸罷警北有亡命之虜西有無厭之戎公卿大夫未免旰食臣幸而獲宥其榮已多豈可竊功僥名以圖不朽其若千古何昔漢為霍去病理第辭以胸奴未滅無以家為况今殘孽尚存而敢播美金石臣雖才不逮名竊慕古人之志所望再效駑蹇逺斥凶渠三虜之首必懸四海之波自定從兹偃伯可以息人然後紀功亦未為晚臣以誠願實在於斯伏乞聖恩特遂勤請無任惶布懇迫之至為同州顔中丞謝上表謝楚伏奉恩制授臣同州刺史本州防禦長春宫等使即以今月八日到任上訖載服明命叨塵寵光逾涯之榮滿覆是懼某誠幸逢昌時早獲入仕由乎邑吏參佐戎藩材謝中人官寧期達聖朝道廣菅蒯不遺遂得牧守連擢大郡徒以清心自約直質在公未申致命之誠久負竊位之責前秋屬姦凶搆禍譟動諸方臣所部當州首為劫脅乃藉天聲以告鄰境戮其偽將以阻姦謀蓋知無不為是臣職分陛下特録其微效超授方隅從政未洽於逺人進律俄遷於近輔非次之奬臣何以膺又臣伯父贈太師臣真卿在肅宗朝嘗典兹郡餘蹤遺事較然可徴臣以不腆之姿繼序官業誠比德非省陳力異能而代受國恩若未失墜臣不勝感涕榮荷之至當今德澤被於寰宇薰風襲於隱微俗臻大寧吏易為理臣專奉揚大化申報皇慈有未便於人者續具條奏以酬陛下子育之旨臣無任戴恩隕越之至為京兆第五尹請車駕回西京表于邵臣聞古公去邠初因避狄襄王出鄭終見興周故能成九五之尊享八百之祚載在前史昭然可知伏惟陛下道合四國威加八紘啓中興之運𢎞下武之功殊方異俗重譯交順惟犬戎小醜敢亂天常陵逼豐鎬震驚都邑陛下理兵陜服遣將秦川鴟張未幾狗遊自溺今八川底定萬姓怨思同懷捧日之誠共結屬車之望况地稱百二勢比咽喉足以橫制九圍裁成六合陛下豈可捨山川之固為巡省之遊臣雖至愚竊知不可伏願謀及百辟俯徇羣心回鑾舊宫駐蹕西夏庶百川有朝宗之所衆星復環拱之方凡在有形孰不幸甚無任懇欵涕戀之至謹遣官奉表陳情以聞為京兆韋尹謝許折糴表劉禹錫伏奉詔旨臣所請畿內折糴宣令度支計會定數奏來者天慈廣被人瘼是求中謝臣自理京邑不先刑威惟務便安所期富庶每因賜對常奉德音府縣之間巨細令奏伏以聖明在上風雨應時順成之年穀糴常賤若無輕重之法必利兼并之家輒敢上聞請行折糴天光下燭幽隱無遺宣付所司允臣所奏事關理本惠及生靈臣忝尹京倍百欣荷賀老人星見表令狐楚當道進奏院狀報司天臺奏八月十五日乙亥夜老人星見於井東色黃明潤敕旨宣付所司者率土咸觀際天同慶中賀臣聞上天不言而星垂象次舍隱見其指甚明伏惟陛下道冠帝先恩覃物表太和之氣上達萬壽之瑞下呈既在井東又當秦分色侔蒸栗光掩連珠彰爾寶圖類堯年之河出延長聖厯齊漢代之山呼凡百臣下歡心如一况臣等幸霑皇屬叨守國藩瞻望闕庭不勝慶忭之至賀櫟陽醴泉表獨孤及伏見京兆尹李勉奏櫟陽縣有醴泉出飲之者痼疾皆愈臣聞王者澤周庶類則神降百祥天地之心去人不逺陛下厚德載物與坤同符以善利人如水潤下故厚土獻瑞湧泉療疾靈源酌而不竭沉痼飲而皆痊勿藥之喜萬人是賴仰窺天意豈不以是彰陛下之德施乎不然何衆庶顒顒強名聖水彼丹甑朱草白麒赤雁徒稱太平之瑞未聞功施於人方之聖泉豈喻神異臣等無任喜慶之至請贈恤故鳯翔節度使鄭畋表李茂貞臣聞有勳不廢前代格言無美不稱先王令典是垂休於國牒將衍示於孫謀其有漢閣元勳岐山茂政霜露已雕於大樹蓬蒿將沒於豐碑歎泉扄而縟禮未加顧藩翰而清風盡在是敢敷陳往事啓迪前功庶雅頌而重興冀徽猷而復舉臣伏見故鳯翔尹同中書門下平章事鄭畋瑞應星精祥開日角建洪爐於聖代成庶類於明時鳯毛方浴於春池龍節忽移於右輔旋於羣鴟聚噪方蝟攢鋒蒼黃而玉輦省方次第而金門撤鎖九州相望初猶豫以從風百辟無歸半狐疑而委質鄭畋峩冠豎髮褒袖運籌羅將校於帳前列貔貅於麾下乃言曰封豕肆凶長鯨噴毒置生靈於塗燼委神器於腥羶我國家時運雖艱天厯方逺豈可以大朝簮紱當屈節於豺狼近甸籓籬欲輸誠於虺蜴由是埋牲誓衆釁鼓出師飛羽檄於四方會諸侯於萬里擎回地軸決驚波而盡入東溟抽轉天關驅列宿而咸尊北帝雷喧鼙鼓山轟旌旗五兵才入犬牙一陳盡塗龍尾值大憝建瓴之勢在元臣反掌之間不意天柱朝摧將星夜隕竹帛徒懸於皎日衣冠已隔於佳城始舉義師爰從指顧稟三令五申之訓職囊沙減竈之謀今則謬以微功叨居重鎮仰髙蹤而如在念遺烈而未書伏乞陛下顯舉舊勳榮加盛禮俯盡褒酬之典遐追鎔範之功俾四海有聞致九泉無恨謝充秦鳯路經略安撫招討使表宋韓琦伏蒙聖慈特授臣尚書禮部郎中依前充樞密直學士知秦州兼秦隴州鳯翔府階成州路馬步軍都部署兼經略安撫沿邊招討等使者秩進儀曹任專閫寄寵靈不次震栗無從中謝伏念臣稟識至卑賦才甚短早緣薄技濫竊雋科亟踐顯塗力陳拙效徒能辦職本不知兵屬羌落之背恩命王師而興伐俾參戎略猥二帥權慙無制勝之謀終抵敗軍之罪貶官以勸尚獲保邊乘障盡勤遽叨復職方思策勵少謝矜全豈謂廟算更張塞垣分制重遷官次增峻使名荷委注之至優懼虛孱之不振此蓋伏遇陛下本仁御俗貴恕使臣謂駑蹇之材或期於逺到庶朴忠之節可責於後圖遂此甄升許其輸藎謹當博訪碩畫講求善經明賞罰以御軍濟恩威而撫俗冀樹涓埃之績仰酬旒扆之施永興軍謝上表前人奉敕差判永興軍府充陜府西路經略安撫使兵馬都總管已於今月十一日上訖避賢而罷方獲典於鄉邦改帥以行復誤膺於聖寄易畫錦還家之樂為夕氷將命之憂雖已見於吏民懼不勝其責任臣某中謝竊以自陜而右惟雍處中昔日用兵嘗并制於諸路平時無事遂分總於中權然而勢不相維事難克協或左有防虞而右弗思於援助或彼專嚴戢而此姑尚於因循致邊備之寢隳實議臣之同病欲正元戎之法式欽睿算之精恭惟皇帝陛下稟大舜之聰明邁成湯之勇智謂堂上之兵必勝猶貴任人而閫外之制不專胡能制衆俾悉歸於節度當謹擇於材雄而臣久冒冢司積成衰疹適懇章之屢瀆得本郡以榮歸不圖乘障之臣驟有邀功之舉一開邊隙上軫旰宵命更領於麾符敢幸安於桑梓慨然就道遽爾之藩心目所經頗諳詳於舊事精神之用已耗竭於當年兹惟仗國威靈挺身忠義導天聲之震怒宣上德之寬仁外以圖疆場之亟寧內以務編齊之無擾關中安堵茍粗底於小康鄴下飬痾願祗還於故守荷諭言之無戲期病質之少休延州謝上表范仲淹伏奉敕命就差臣兼知延州軍州事已到任交割管勾訖討伐之秋委寄方重豈繄懦品可副聖憂臣中謝竊以延水極邊東夏雄屏控黠虜之衝要歷大臣之鎮臨范廷召出師於塞門向敏中移節於京兆斯為劇任曷在匪人況經侵軼之虞彌藉緝綏之政宿兵既盛為地可知臣職二統戎志存殄寇所宜盡瘁敢昧請行自薦老臣固慙於漢將誓平此賊詎擬於唐賢伏蒙陛下曲徇微忠亟頒成命寬其無狀用之弗疑臣夙夜敢寧奔馳罔暇刻時蒞事翌日興師庶牽制於戎心仍掩襲於邊落大軍已出中使聿臨不謂孱謀偶符睿算所期克勝少慰焦勞重念百姓屢驚體當招撫五兵久戢務在訓齊如治亂繩必期於耐事先除害馬亦假於行權仰賴聖威即紓邊患耀州謝上表前人伏奉敕命降授户部員外郎依前充職知耀州已到任禮上訖雷霆之威足加死責天地之造曲致生全臣中謝竊念臣運偶文明世專儒素靡學孫吳之法恥道桓文之事國家以西陲騷動之際起臣貶所特加奬用臣自知甚明豈堪其任但國家之急不敢不行自兼守延安莫遑寢食城寨未謹兵馬未精日有事宜處置不暇而復虞內應之患發於邊城或反間之言行於中國百憂具在數月於兹而方修完諸柵訓齊六將相山川利器械為將來之大備不幸昨者高延德來自賊廷求通中國之好其僣偽之稱即未削去臣以朝廷方命入討豈以未順之欵送於闕下此不可一也或送於闕下請朝廷處置又恐答以詔旨則降禮太甚若屏而不答則阻絶來意此不可二也兼慮詐為欵好以紿諸路之兵茍輕信而納之賊為得計此不可三也又寶元三年正月八日曽有宣旨今後賊界差人齎到文字如依前僣偽立便發遣出界不得收接臣所以却令髙延德回去仍諭與本人須候禮意遜順方可聞於朝廷亦已一面密奏臣又别奉朝旨依臣所奏留鄜延一路未加討伐容臣示以恩意嵗時之間或可招納臣方令韓周等在邊上探伺彼或有進奉之意即遣深入曉諭適會髙延德到來堅請使介同行況奉朝旨許臣示以恩意乃遣韓周等送髙延德過界以繫其意或未稟承則於臣為恥於朝廷無損及韓周等回且言初入界時見迎接之人叩頭為賀無何前行兩程便聞任福等有山外之敗去人沮氣無以為辭賊乃益驕勢使然矣其回來文字臣始不敢開封便欲進上都鈐轄張亢懇言曽有朝旨若得外界章表須先開視及僣偽文字應有辭涉悖慢者並須隨處焚毁勿使騰布臣相度事機誠合如此章表尚令先開況是與臣文字遂同張亢開封視之見其挾山外事後辭頗驕易亦有怨尤與賀九言齎來文字意度頗同非戎狄之能言皆漢家叛人所為枝葉之辭也恐上黷聖聰或傳聞於外為輕薄輩增飾而談有損無益臣尋便焚毁只存書後所求通好之言及韓周等别有劄到邀求數事並已納赴樞密院今於涇原路取得寶元二年七月十四日聖旨劄子一道並如張亢之言其所來文字果合焚毁則臣前之措置皆應得朝廷處分唐相李德裕與將帥王宰書為遊奕將收得劉稹章表悖慢無禮不便毁除令向後得賊中文字所在焚之亦與今來意合其劄到數事內一事如臣所諭取單于可汗故事欲稱兀卒以避中朝之號此大事稍順餘皆可與損益倘朝廷欲雪邊將之恥當振皇威大加討伐亦繫朝廷熟議必持重而緩圖之或朝廷欲息生民之敝屈一介之使重諭利害茍能聼服亦天下之幸也臣前所措置於此二道並未有妨然以臣之愚處兹寄任豈得無咎何敢自欺伏蒙皇帝陛下至仁廣度不欲彰臣子之惡特因此量行薄責斯天之造臣之幸也臣敢不夙夜思省進退惕厲犬馬有志曽未施為日月無私尚兹臨照讓觀察使第一表前人馬遞降到誥敕各一道特授臣邠州管內觀察使仍依前邠寧環慶路馬步軍都部署兼經略招討安撫等使非常之命既出於絲綸未盡之誠敢逃於斧鉞臣中謝臣聞先王爵以尚德祿以報功諸侯之失德者降其爵諸侯之有功者增其祿此百代不易之典也臣又聞貴貴者為其近於君也漢遣御史繡衣持斧出按二千石唐御史之出節度使以軍禮見所以表朝廷之重也學士丞郎出則居亷察刺史之任入則復其位自五代之亂措置乖失亷察刺史之位遂為武官學士丞郎一出為之謂之換過入朝則不復其位故士大夫寧甘薄祿而不樂換之者久矣况今用兵之際事繫安危今日之命理有利害臣倘默默而受一則失朝廷之重勢二則減議論之風采三則發將佐之怒四則鼓軍旅之怨五則取夷狄之輕六則貽國家之患何以言之臣與韓琦並命陜西初為經略安撫副使次則分領秦慶二州兼本路都部署司兵馬公事次則進秩為本路都部署兼領經略安撫招討等使皆以學士之職行都統之權是用內朝近臣出臨戎閫以節制諸將孰不以朝廷之勢而望風稟律臣輩亦以內朝之職每覩詔令之下或有非便必極力議論覆奏不已期於必正自以近臣當彌縫其闕而無嫌矣今一旦落內朝之職而補外帥前在左右丞諸行侍郎節度留後之上今降於知制誥待制之下使居方榮劉興之下列以外官而行都統之權此則失朝廷之重勢一也又既為外帥則今而後朝廷詔令之出或不便於軍中或有害於邊事豈敢區别是非與朝廷抗論自非近臣無彌縫其闕之理縱降詔丁寧須令奏覆而臣輩豈不鑒前代將帥驕亢之禍存國家內外指蹤之體此則減議論之風采二也臣又自至邊上常責將佐當圖實效上報國家勿樹虛聲妄求恩奬故得嵗年以來所奏邊效稍稍得實不至矯誣臣方經制補葺以救邊防之闕而西賊猖熾枝葉愈大臣則一年之中三換寵數將何面目責諸將之實效此則發將佐之怒三也又臣聞自古將帥與士旅同其安樂則可共其憂患而為國家之用故士未飲而不敢言渴士未食而不敢言飢今邊兵請給粗供樵㸑醋鹽之費食必粗糲經逾歲年不霑肉味至有軍行之時羸不勝甲棄而埋之負罪以逋未能逺去皆捕而斬之臣雖痛而不忍豈敢慢法或有危逼欲使此等之心同其憂患為國家之用不亦難哉昔祿山之亂河北三十餘城俱歸於賊者非皆攻而下之由衆心無恩當未危之時勉以從事及既危之後翻然改圖劫長吏以應賊皆此類也臣每思之則常寒心古之方侯獲其厚祿飬敢死之士以備寇患今之戰士飬有常廪賞有常格臣得千鍾之祿千金之賜豈敢私與死士哉徒聚之於家使彼目而銜之以待其釁爾臣恐此輩一日倉卒乘怒而發劫長吏以應賊不能為國家之用而能為國家之患矣此則鼓軍旅之怨四也又臣聞內列三公九卿外分五侯九伯所以安天下也臣自到邊上其熟户蕃部皆呼臣為龍圖老子至於賊界亦傳而呼之且不測其品位之高下也今賊界沿邊小可首領並偽署觀察團練使之名臣若受兹新命使蕃部聞之適足取夷狄之輕五也臣謂國家此舉使四路首帥失朝廷之重勢減議論之風采發將佐之怒鼓軍旅之怨取西夏之輕由斯以往必敗乃事寧不貽國家之後患哉此六者臣上為國體而辭之也再念臣世專儒素遭逢盛時以文藝登科陛下擢於祕館處之諫司歷天章龍圖之職可謂清切矣寒士至此大逾本望儒者報國以言為先如臣曩者不能練事效賈生慟哭長太息之説黷於聖聰以中外共棄屢經貶放亦已塞朝廷之薄責矣然今之狂士效唐人肆言朝市往往甚於臣者而朝廷容之直以臣於無事之秋先為之言故天下指之為狂矣而臣自追其咎未嘗怏怏此搢紳之所諒也前春延安之戰主將不利大挫國威朝廷有使愚使過之議遂及於臣逮臣至於延安竭心悉力而處置之間不合朝廷之意既廢復用無所逃遁臣顛沛十載灰而又燃者數四矣臣自知孑孑惴惴非將相之才豈了大事但國家急難之際邊鄙乏人臣以事君之心雖知屢困日勉一日俟將帥得人臣即引退丘園詠歌太平雖多難之夫有全歸之樂此臣之所期也臣粗守亷隅朝廷豈以貪夫畜臣落近職而增厚祿將令長居邊鄙永謝丘園非臣之所期也臣本有風眩之疾聞命以來心墮氣索不知其涯緣臣夙夜乃事精爽已乏量臣之力豈堪武帥長為荷戈之事乎此臣下為私心而辭之也伏望皇帝陛下垂日月之明發於獨斷追還新恩許存舊職則是以內朝近臣經略邊事節制諸將其體重矣而況儒臣武士所習不同所志亦異臣輩不願去清列而就亷察之厚祿者如方榮劉興輩必不願減厚祿以就學士之清列矣如使四路之帥上失其勢下撓其志沮喪不樂意衰神瘁則事有墮墮豈復能振謀發策為國家長城之倚哉恐非陛下推委使人人盡心之意也一昨宰臣堅讓三公雖已行之命蒙陛下特俞其請臣今冒犯天威為國體而辭之者六為私心而辭之者一茍不獲命臣當繫身慶州之獄自劾無功冒賞之咎又劾違制不受之罪以聼於朝廷假使朝廷極怒臣得死於君父之命猶勝貪此厚祿敗名速禍死於寇亂之手此臣之所以知其退而不知進也惟天鑒處之謝許讓觀察使守舊官表前人準樞密院劄子奉聖旨令臣却守舊官者寵祿固辭涉邀君之大咎聖言惟允推舍己之至仁臣中謝臣聞進人以禮退人以禮哲王之體也大讓如慢小讓如偽儒臣之行也上得其體足以寧家邦下興其行可以導風俗臣親逢盛美得不手之舞之足之蹈之與天下稱慶哉竊念臣少遊庠序長登科級周旋孤宦了無聞逹伏遇皇帝陛下金鑑臨御多士駿奔於千官百辟之中擢臣諫諍之列置臣圖書之府揚歷中外恩常異等自西陲用兵朝廷旰食遣臣經略邊事歲月無狀亦嘗得請示以招納之意期於平定而物議喧然禍在不測上賴日月垂照保全微生暨再委方面專此一路又無出竒之策惟知守禦而已日常自訟以待來者陛下濬發宸謀思欲崇諸路之寄例改亷車且從廪祿之優兼貴稱呼之重霈然渥澤被於弱質臣以今之觀察使列為武帥書生何力可堪此任幸以內朝之職為國家心腹耳目權節制之任其體甚重不煩改作願回寵異少寬憂栗三黷天聼義不容誅伏蒙陛下念進人退人之禮察如慢如偽之情特降俞旨許存舊秩臣且懼且喜不知所為懼者有不即從制之罪而尚屈彛典喜者以不奪稽古之志而復被儒紳臣敢不竭力悉心夙宵乃職謹疆埸之細事佇干羽之大猷退作頌聲仰答聖造謝授知邠州表前人伏蒙聖慈特授臣依前行右諫議大夫充資政殿學士知邠州軍州事及管內勸農使兼陜西四路沿邊安撫使改賜推誠保德功臣者陟降祕殿為寵甚隆撫按邊庭所寄至重臣中謝竊念臣涉道尚淺立身本孤偶緣英主之知獲厠邇臣之列進登二府參預萬機議刑賞則不避上疑革僥幸則多招衆怨心雖無愧迹已難安而况親奉德音逺憂邊患既此聞命誠合請行始塵宣慰之名來撫凋疲之俗才周晉地將適秦關屬府庫之已虛積兵旅之尚衆動費萬計理當三思願假一麾就兼四路亦可處其疆事庶不傷於國財詔旨弗從留居丞弼之位表章再露請陳疆場之機伏蒙皇帝陛下俯照臣心特回天聼罷政府之重責加仙殿之寵名往守要藩遙按諸部存兹國體簡於聖心臣敢不即日首塗奉詔行事生民疾苦可得詢求邊塞機宜更當籌慮用罄臣節以酬聖知知永興軍謝上表司馬光臣識慮暗淺規為闊踈唯知愚忠屢貢狂直奉事三世操守一心間以齒髮寖衰疾疹交集曽靡論思之效久汚侍從之班既無補於本朝祈自安於散地不圖睿澤更委名都雖要重之權自知不稱而煩劇之地難以固辭受命以還措躬無所朅來就道甫爾到官惟此咸秦昔為畿甸山川秀美土地膏腴論其平時誠為樂土在於今日適值凶年經夏亢陽苗青乾而不秀涉秋淫雨穗腐黑而無收廪食一空家乏藏蓋之粟襁負相屬道有流離之人老弱懷溝壑之憂姦猾蓄萑蒲之志正宜安靜不可動搖譬諸烹魚勿煩擾則免於糜爛如彼種木任生植則自然蕃滋謹當䇿勵疲駑雕磨朽鈍智力所及勤瘁無辭雖復失位危身終不病民負國庶幾小補用答大恩掾臣條屬臣準書佐臣謀𢎞農太守上祠西嶽乞差一縣賦發復華下十里以內民租田口算狀漢樊毅光和二年十二月庚午朔十三日壬午𢎞農太守臣毅頓首死罪狀書臣毅頓首頓首死罪死罪謹按文書臣以去元年十一月到官其十二月奉祠西嶽華山省視廟舍及齋衣祭器率皆久逺有垢故魯不修太室春秋示譏臣以神嶽至尊宜加恭肅輒遣行事荀班與華隂令先讜以漸繕治成就之後仍雨甘雪瀐潤宿麥惠兹黎庶臣即日以詔書齋祀雪未消釋時日晴和神清民喜誠聖朝勞神昃晏廣被四表覆育之德神人被施遐邇大小莫不幸甚臣毅頓首頓首死罪死罪讜書言縣當孔道加奉尊嶽一嵗四祠飬牲百日常常充肥用榖藳三十餘斛或有請雨齋禱役費兼倍每被詔書調發無差山高聼下恐近廟小民不堪役賦有飢寒之窘違宗神之敬乞差諸賦役復華下十里以內民租田口業以寵神靈廣祈多福降中興之祚臣輒聼行盡力奉宣詔書思惟惠利增異復上臣毅誠惶誠恐頓首頓首死罪死罪上尚書賀昭陵徴應狀唐張説右御史中丞徐惲從京使還向臣等説妖賊劉志誠四日從咸陽北原向南見昭陵山上有黑雲忽起志誠謂其凶徒云此雲將有暴風若衝頭立恐有破敗志誠久從軍伍頗解雜占其言未畢飄風果至直衝行首莫不昏迷衆心驚惶不知所出及至便橋之際並即散走又見父老云往年權梁山之徒將逞不軌當時亦有烈風暴雨發自昭陵北至京城賊還破滅謹參往事與今同符者伏以閭閻賤類竊敢猖狂而祖宗威靈亦已元鑒昔年感召若命蚩尤今日驅除更徴風伯所以妖氣自殄狡計莫施頃刻之間逃形無路此皆神功潛運昌厯無窮將俾孫謀用昭聖德事堪懲惡可以垂後無任慶悅之至仍望宣付史官并示朝列謝賜天寶寺額狀釋嗣安臣聞皇天以平安四時聖人以亭育萬物僧等何幸頓沐殊私但以王者封畿乃稱鄠杜之邑諸侯近甸是惟灃滈之濵頃者靈符發兆聖號輝煥百神慶答萬國惟新不謂惠澤旁流降仙毫之瑞札宸慈下被賜天寶之嘉名普潤緇黃齊霑寺觀而魚龍起伏來從日月之宫束帛戔戔更賁金繩之界雙林戴色紺苑增榮臣等不勝忭躍之至論關中事宜狀陸贄臣聞國家之立也本大而末小是以能固又聞理天下者若身之使臂臂之使指則小大適稱而不悖焉身所以能使臂者身大於臂故也臂所以能使指者臂大於指故也王畿者四方之本也京邑者又王畿之本也其勢當令京邑如身王畿如臂四方如指故用則不悖處則不危斯乃居重馭輕天子之大權也不獨為御諸夏而已抑又有鎮撫戎狄之術也是以前代之制轉天下租稅委之京師徙郡縣豪傑處之陵邑選四方壯勇實之邊城其賦役則輕近而重逺也其惠化則悅近以來逺也太宗文皇帝既定大業萬方砥乂猶務戎備不忘慮危列置府兵分𨽻禁衛大凡諸府八百餘所而在關中者殆五百焉舉天下不敵關中則居重馭輕之意明矣承平漸久武備寖微雖府衛具存而卒乘罕習故祿山竊倒持之柄乘外重之資一舉滔天兩京不守尚賴經制頗存典型強本之意則忘沿邊之備猶在加以諸牧有馬每州有糧故肅宗得以為資中復興運乾元之後大憝初夷繼有外虞悉師東討邊備既弛禁戍亦空吐蕃乘虛深入為寇故先皇帝莫與為禦避之東遊是皆失居重馭輕之權忘深根固柢之慮內寇則崤函失險外侵則汧渭為戎於斯之時朝市離析事變可慮須臾萬端雖有四方之師寧救一朝之患陛下追想及此豈不為之寒心哉尚賴宗社威靈先皇仁聖攘却醜類再安宸居城邑具全宫廟無霣此又非常之幸振古所未聞焉足以見天意之於皇家保佑深矣故示大警將𢎞永圖陛下誠宜上副天心下察時變逺考前代成敗近鑒國朝盛衰垂無疆之休建不拔之業今則勢可危慮又甚於前伏唯聖謀已有成算愚臣未達敢獻所憂先皇帝還自陜郛懲艾往事稍益禁衛漸修邊防是時關中有朔方涇原隴右三帥以扞西戎河東有太原全軍以控北虜此四軍者皆聲勢雄盛士馬精強又徴諸道戍兵每嵗乘秋備塞尚不能保固封守遏其奔衝京師戒嚴比比而有陛下嗣膺寶位威懾殊鄰蠢兹昆夷猶肆毒螫舉國來寇志吞岷梁貪冒既深覆亡幾盡遂求通好少息交侵蓋緣馬喪兵疲務以計謀相緩固非畏威懷德必欲守信結和所以歷年優柔竟未堅定要約息兵稍久育馬漸蕃必假小事忿爭因復大肆侵掠張光晟又於振武誘殺羣胡自爾以來絶無虜使其為嫌怨足可明徴借如吐蕃實和回紇無憾戎狄貪詐乃其常情茍有便利可窺豈肯端然自守今朔方太原之衆逺在山東神策六軍之兵繼出關外儻有賊臣啖寇黠虜窺邊伺隙乘虛微犯亭障此愚臣所竊為憂者也未審陛下其何以禦之側聞伐叛之初議者多易其事僉謂有征無戰役不逾時計兵未甚多度費未甚廣於事為無擾於人為不勞曾不料兵連禍結變故難測日引月長漸乖始圖故前志以兵為凶器戰為危事至戒至懼不敢輕用之者蓋為此也當勝而反敗當安而倒危變亡而為存化小而成大在覆掌之間耳何可不畏而重之乎近事甚明足以為鑒往歲為天下所患咸謂除之則可致升平者李正已李寶臣梁崇義田悅是也往歲為國家所信咸謂任之則可除禍亂者朱滔李希烈是也既而正已死李納繼之寶臣死惟嶽繼之崇義卒希烈叛惟嶽戮朱滔攜然則往歲之所患者四去其三矣而患竟不衰往歲之所信者今則自叛矣而又難保是知立國之安危在勢任事之濟否在人勢茍安則異類同心也勢茍危則舟中敵國也陛下豈可不追鑒往事惟新令圖循偏廢之柄以靖人復倒持之權以固國而乃孜孜汲汲極思勞神徇無己之求望難必之效其於為人除害之意則已至矣其為宗社自重之計恐未至焉自頃將帥徂征久未盡敵茍以藉口則請濟師陛下乃為之輟邊軍缺環衛虛內廄之馬竭武庫之兵占將家之子以益師賦私飬之畜以增騎猶且未戰則曰乏財陛下又為之算室廬貸商賈傾司府之幣設請𣙜之科關輔之間徴發已甚宫苑之內備衛不全萬一將帥之中又如朱滔希烈或負固邊壘誘致豺狼或竊發郊畿驚犯城闕此亦愚臣所竊為憂者也未審陛下復何以備之陛下盛德君臨率土欣戴非常之慮豈所宜言然居安備危哲王是務以言為諱中主不行若備之已嚴則言亦何害儻忽而未備又安可勿言臣是以罄陳狂愚無所諱避罔敢以中主不行之事有虞於聖朝也惟陛下熟察之過防之且今之關中即古者邦畿千里之地也王業根本於是在焉秦嘗用之以傾諸侯漢嘗因之以定四海蓋由憑山河之形勝宅田里之上腴弱則內保一方當天下之半可以飬力俟時也強則外制東夏據域中之大可以蓄威昭德也豪勇之在關中者與籍於營衛不殊車乘之在關中者與列於廄牧不殊財用之在關中者與貯於帑藏不殊有急而須一朝可取今執事者先拔其本棄重取輕所謂倒持太阿授人以柄議制置則強幹弱枝之術反語綏懷則悅近來逺之道乖求諸通方無適而可顧臣庸懦竊為陛下惜之往者不可追來者猶可補臣不勝懇懇憂國之至輒敢效其狂鄙以備采擇之一端陛下儻俯照微誠過聽愚計使李芃援東洛懷光救襄城希烈凶徒勢必退衄則所遣神䇿六軍士馬及點召節將子弟東行應援者悉可追還河北既有馬燧抱真固亦無藉李晟亦令旋斾完復禁軍明敕涇隴邠寧但令嚴備封守仍云更不徴發使知各保安居又降德音勞徠畿甸具言京輦之下百役殷繁且又萬方會同諸道朝奏恤勤懷逺理合優容其京城及畿縣所稅間架𣙜酒抽貫貸商點召等請如此類一切停罷則冀已輸者弭怨見處者獲寧人心不搖邦本自固禍亂無從而作朝廷由是益尊然後可以度時宜施教令弛張自我何有不從端本整棼無易於此謹奏請依京兆所請折納狀前人京兆府先奏當管蟲食豌豆全然不收請據數折納大豆奉敕宜依度支續奏稱據時估豌豆每斗七十價以上大豆每斗三十價以下京兆府所請將大豆替豌豆望令各據估計錢數折納則冀免損官司者求瘼救災國之令典求瘼在知其所患救災在恤其所無只如螟域為殃豌豆全損檢覆若非虛謬地稅固合免徴直道而行大體斯在司府折納充數已為尅下從權度支凖估計錢乃是幸災規利所得無幾其傷實多傷風得財非謂理道且豌豆為物入用甚微舊例所支唯充畜料凖數回給大豆諸司誰曰不然計價剩徴義將安在理無所據事不可從望依前敕處分未審可否論度支令京兆府折稅市草事狀前人度支奏緣當年稅草支用不充諸場和市所得又少所以每至秋夏常有欠闕請令京兆府折今年秋稅如市草一千萬束便令人户送入城輸納每束兼車腳與折錢二十五文既利貧人兼濟公用希顔奉宣進止宜依者伏以制事之體所貴有常順人之情尤重改作革而能當尚恐未孚動且非宜曷由無擾臣等每承睿旨常以百姓為憂審知事不可行安敢默而無述每年蓄聚芻藁所司素有恆規計料稅草不充即便開場和市既優價值復及農收人皆樂輸事不勞擾陛下追想往年之事豈嘗有緣草不足上關宸慮者乎延䶖欲衒已能頗隳舊制茍收經費之用以資贏羡之功遂使諸備空虛支計寥落廄圉告闕頻煩聖聰去嵗已然今夏尤甚此乃不遵舊制之過也舊制何害而變之哉臣等謹檢京兆府應徴地稅草數每年不過三百萬束其中除留供諸縣館驛及鎮軍之外應合入城輸納唯二百三十萬而已百姓搬運已甚艱辛常迫春農僅能得畢今若更徴一千萬束仍令並送入城即是一年之中併徴三年稅草計其所加車腳則又四倍常時物力有窮求取無藝其為騷怨理在不疑甸服且然四方安仰假使時當豐稔家悉阜殷有草可輸有車可載然於程途往復理須淹歷歲時牛廢耕犁人妨播植東作既闕西成曷期況蒸黎之間貧冨不等收穫之際豐耗靡均今忽併役車牛雇車傭必騰貴併徴稅草買草價必倍高是使豪冨之徒乘急令以邀其利窮乏之輩因暴斂以毁其家非所謂均節財物凖平賦法之術也臣等又勘度支京兆比來雇車估價及所載多少大率每一車載一百二束每一里給傭錢三十五文百束應輸二束充耗今京畿諸縣去城近者七八十里逺者向二百里設令逺近相補通以百里為程則雇車載草百束悉依官司常估猶用錢三千五百文即是一束之草唯計搬運已當三十有五文買草本價又更半之而度支曽不計量自我作古徑以胸臆斟酌限為二十五文謂之加徴則法度廢隳謂之和市則名實乖反倘可其奏人何以觀豈如官自置場要便收市欲少市則平其估以節費欲多市則優其價以招人買賣既和貧冨俱便有餘者趨加饒易售之利不足者免轉求貴賃之資比之抑徴固不同等幸有舊制足可遵行何必捨易而即難棄利而從害臣誠暗滯未見其宜伏望戒飭度支令依舊例和市承前既有恆用以後不得闕供稍峻隄防使知凛懼妄作但不施用嵗計必免愆違陛下若以軍廄之中馬畜漸衆度支所營藁芻才可供給當年或慮水旱不虞别須蓄積為備今屬嵗稔亦是其時但要收斂有方不宜科配致擾若度支併市延䶖必復辭難須有區分使之均濟望委京兆尹幹當别和市草五百萬束以充貯備其所和市並隨要便官自置場每場置錢旋付價值時估之外仍稍優饒交易往來一依市利勿令官吏催遣道路遮邀但不抑人自當趨利其市草價直並於年支留府錢數內以給用不盡者充每市滿十萬束一度聞奏便以府司郵遞車牛并更雇腳相添轉徙場所船載送付苑中輸納如蒙聖恩允許臣即依此宣行既免擾人又不增費以資儲蓄足禦凶災度支謹守恆規亦自不闕常用臣等商度將為合宜謹録奏聞伏聽進止諫駕幸溫湯狀元稹今月二十一日車駕欲幸溫湯右臣等伏以駕幸溫湯始自元宗皇帝乘開元致理之後當天寶盈羡之秋葺殿宇於驪山置官曹於昭應警蹕於繚垣之內周行於馳道之中萬乘齊驅有司盡去無妨朝會不廢戒嚴而猶物議喧囂財力耗悴數年之外天下蕭然纍聖已來深懲覆轍驪宫圮毁永絶修營官曹盡復於田萊殿宇半堙於巖谷深林有逸才之獸環山無匡衛之廬陛下若騎從輕馳則道途無拱辰之備若乘輿稍具則邑縣有駕肩之憂若帳殿宿張則原野非邀巡之所若鑾車夕入則門禁失啓閉之時六軍守衛於空宫百吏宴安於私室忝為臣子誰不惕然况陛下新御寶圖將行大典郊天之儀方設謁陵之禮未遑遽有溫泉之行恐失人神之望臣等謬居榮近冒死上言伏乞特罷宸遊曲回天眷稍待升平之後别卜遊幸之期則云亭之禪可登崆洞之駕非逺豈必驅馳一往竦駭羣情勝境未周聖躬徒倦臣等無任懇迫忘軀之至謹詣東上閣門奏狀以聞伏候敕旨三月三日謝恩賜曲江宴樂狀白居易右今日伏奉聖恩賜臣等於曲江宴樂并賜茶果者伏以暮春良月元已嘉辰獲侍宴於內庭又賜歡於曲水蹈舞局地歡呼動天况妓樂選於內坊茶果出於中庫榮降天上寵驚人間臣等謬列近司猥承殊澤捧觴知感終宴懷慙肉食無謀未展涓埃之效素餐有愧難勝醉飽之恩以此兢惶未知所報謹奉狀陳謝以聞謹奏陳乞邠州狀宋范仲淹右臣聞臣之事君也貴先勞而後祿朝之命官也患重內而輕外重內輕外何以收藩翰之功先勞後祿所以勵搢紳之志臣雖無似輒慕前修臣昨在朝日曽與韓琦同進陜西攻守䇿又覩手詔云今用何人鎮彼西方又去年秋曾有聖旨令韓琦與臣牙換往邊上照管臣遂面奏乞罷參知政事知陜西一郡兼沿邊安撫使乞不轉官及不帶招討部署之名尋蒙聖恩差充陜西宣撫使又以契丹舉兵西征元昊在河東接近復差臣兼河東宣撫使臣自至河東體量得邊上利害各已奏陳今余靖自北既回必見契丹無南牧之意臣久住州軍亦慮煩擾欲過陜西即又宣撫使所行諸軍須望特支恩澤緣南郊均賜之後陜西府庫已虛或更行特支又須費十數萬貫如不往陜西則前所上攻守之策復成空言伏望聖慈依臣前來面奏罷參知政事并安撫使只差臣於邠涇間知一州帶沿邊安撫使乞不轉官仍不帶招討部署之名如此則不銷更散特支自可就近處置邊事臣此直誠並守前奏俟二三年間邊事寧息攻守有備儻聖恩未移用臣不晚庶朝廷無內重外輕之失臣亦有先勞後祿之效進退始終良得其宜再論差中官為陜西鈐轄狀趙瞻帥臣處置蕃部乃是邊事萬分之一今以一事偶失即為添置中官將來復有事生又欲何以為計况彼各受密旨歲入朝謁邊臣疏逺日慮傾危軍政異同孰為主執外未制敵內先壞事昔程元振誣來瑱之罪魚朝恩間子儀之功故穆質諫用宦人為將而吐􅊳承璀終無功於鎮定裴度奏罷諸軍監陳而李訴逐賊於淮蔡至如本朝鄜延敗事則斬德和於河中麟府喪師則流元道於海裔豈非古今得失之明效哉然猶使議者惓惓疑宸衷之未斷怪輔臣之依違斯可謂事機之切不可不亟諫也論屈野河西修堡狀司馬光竊以為人臣者事君不避難有罪不逃刑臣先任通判并州軍州事日準經略司牒差往麟州勾當公事其屈野河西一帶田土積年以來為夏人所侵臣委曲詢訪本州當職官吏以夏人侵盜為日已久諭之以理則不肯退縮逼之以兵則動成戰鬬召之重定界至則偃蹇不來春種秋穫無有已期如何區處可以不戰而得所侵之地其本州官吏為臣言州城之西臨屈野河自河以西直抵界首五六十里並無堡障斥􅕤以此夏得恣耕其田遊騎往往直至城下或過城東州人不知去嵗已於河西置一小堡以處斥􅕤之人亦曽申經略司乞於其西增置二堡會今春以來寇騎屯聚遍滿河西經略司牒令候西人退散别申取指揮今夏衆盡已退去自州城以西至大橫水浪爽平數十里間絶無一人一騎若乘此際急於州西二十里左右增置二堡每堡不過十日可成比至夏人再行點集此堡已皆有備寇不能為害如此則麟州永無侵軼之虞州兵出入有所宿頓堡外先侵之田夏皆不能耕種臣之愚心亦為國家固爭屈野河西田者非少此尺寸之地蓋以夏侵耕至河則麟州孤危果能成此二堡以為麟州耳目藩蔽於事誠便遂歸具以官吏所言白於龎籍籍用臣言即牒麟州令依前申修築二堡仍令精加探候廣設隄備戒諭約束莫非丁寧蓋欲乘間急修故不暇取旨俟報但曾奏知而已不期牒到之後元未興修夏人已復大集於五月五日彼處兵官引一千許人夜開城門徑往屈野河西前無探候後無策應中無部伍但齎酒食不為戰備以此逢敵如何不敗遂令所謀之事悉皆無成此乃諸將恃勇輕敵臨事無備之所致本非修堡之過况自元昊納欵以來麟州修建堡寨及出兵過屈野河西前後非一雖與冦遇未嘗敗北明知今日之敗在於無備不在修堡與過河也然臣竊聞議者乃以龎籍為擅修堡寨引惹邊事臣伏自惟省本因臣與麟州官吏商量傳道其言逹於龎籍籍未嘗身至河西周知利害皆臣愚戇思慮不熟輕議大事當伏重誅今乃使議者悉歸咎於龎籍臣豈敢晏然不言茍求自脫上負聖朝死有餘責臣雖小人義不忍為伏望陛下察龎籍本心欲為國家保固疆圉發於忠赤不顧身謀過聽臣言以至於此獨治臣罪以正典型雖蹈鼎鑊亦無所恨乞罷修腹內城壁樓櫓及器械狀前人準熙寧三年十一月初七日準樞密院劄子節文檢會近為麟府路豐州及外堡寨官吏弛慢不職不修完城池樓櫓器甲等已奉聖旨降官等第斷遣及劄與三路轉運司遍牒轄下沿邊州軍知委去訖近又據陜西路提刑宣撫司奏華州甲仗庫弓弩不堪蓋是監官並本州官員全不用心點檢有誤緩急使用其鈐轄盧戭坐受優俸空占當直兵士略不營職朝廷已令鄜延路經略司舉官差替盧戭其華州甲庫弓弩不堪本州當職官員全不用心點檢仍宣撫司差官取勘聞奏竊慮諸路亦有不修完城壁器甲等去處奉聖旨令河東河北陜西經略安撫司指揮轄下州軍委官吏仔細點檢須管日近修完城壁樓櫓堅固器甲精利如將來朝廷專差官點檢得却有未修城壁樓櫓器甲等其應干官吏必當依此重行斷遣劄付本司者尋依準朝旨行下本路諸州軍施行近準虢州申州司勘會本州雖陜西路即不係近邊州軍其州城從來並不曽有敵樓戰棚為自來霖雨損壞摧塌及無兵功纍年不曽修築今來亦不敢專擅役夫修築已牒在城兵馬都監吕士宣重行檢計損壞城邑去處才候檢計到合使人功物料别具狀供申乞差兵夫次及據解州申準兵馬監押狀申準州牒備録到安撫使司牒內坐到聖旨指揮修完城壁樓櫓等尋將帶壕寨木匠作頭等檢計外羅城面上只有更屋二十三座並係年深倒塌及城壁墜倒久來亦不曽泥補修完伏乞據狀申上衙乞差官計料修城人工及創添樓櫓免致將來朝廷差官檢視見並不修完城壁及創蓋樓櫓虛負責降停替州司勘會舊來城上並無樓櫓即自城面上濶處只及四五尺以來今若指揮使行創造又緣合使人工材料數目不少今來未敢專擅創修伏候指揮右謹具如前勘會管下永興等一十州軍城壁內有久來已行安置樓櫓完備亦有城壁低下薄怯全未有樓櫓去處其逐州州官吏既準上項朝旨及見麟府豐州官吏以不修完城壁樓櫓器甲降官等第斷遣并華州官吏差替取勘仍恐朝廷非時差官點檢例各畏懼爭欲日近興功完葺以避譴責伏緣營造樓櫓須藉城基厚濶方可安置今來解虢兩州城壁皆稱濶處只及四五尺似此之類須是先貼築城基方可創修樓櫓若非大段興功無以辦濟况今本路州軍全闕廂軍應急差使官庫亦闕見錢收買材料若是差役人夫配率材料又緣陜西州軍已是去歲夏麥薄收秋苗旱傷當此飢饉人户流移之際若更加此差擾必是轉難存濟兼永興軍一路州軍盡在腹裏去沿邊絶逺設若蕃賊入寇亦未能便到逐州軍城下其樓櫓修下數年不用不免損壞今來若盡令與沿邊州軍一例須管日近修完城壁樓櫓堅固器甲精利顯見官私虛有勞費欲乞朝廷特降指揮其沿邊又次邊州軍即一依近降朝旨修完所有腹內州軍城壁樓櫓並候將來豐熟以漸營葺其器甲即據不堪數目逐旋勒作院人匠依程課修整務令精利所貴公私皆得辦濟薦張載奏狀吕大防伏見本州路鳯翔府寄居著作佐郎前崇文院校書郎張載學術精深性姿方毅昨因得告尋醫未蒙朝廷召命義難自進老於田間衆所共惜臣未敢别乞朝廷任使欲望聖慈且令召還書館舊職有不如臣所舉甘罔上不忠之罪乞封太白山神狀蘇軾伏見當府郿縣太白山雄鎮一方載在祀典按唐天寶八年詔封山神為神應公逮至皇朝始改封侯而加以惠民之號府界自去歲九月不雨徂冬及春農民拱手以待飢饉粒食將絶盜賊且興臣採之道途得於父老咸謂此山舊有湫水試加禱請必獲響應遂令擇日齋戒差官蒞取臣與百姓數千人待於郊外風色慘變從東南來隆隆獵獵若有驅道既至之日隂風凛然油雲蔚興始如車蓋既日不散遂彌四方化為大雨罔不周飫破驕陽於鼎盛起二麥於垂枯鬼神甚幽報答甚著竊以為功效甚大封爵未充使其昔公而今侯是謂自我而左降揆以人意殊為不安且此山崇髙足亞五嶽若賜公爵尚虛王稱校其有功實未為過伏乞更下所司詳酌可否特賜指揮昭陵寢宫議唐王仲舒右奉進止寢宫在山上置來多年曽經野火燒爇摧毁略盡其宫尋移在瑶臺寺左側今屬連年欲議修置緣舊宫本山上元無井泉每緣供水稍逺百姓非常勞弊今欲於見在行宫處修造所冀久逺便人又為改移舊制恐所見未周宜令中書門下及百寮同商量可否聞奏者右補闕王仲舒議曰伏詳敕旨以太宗陵廟衣冠所遊嚴上之誠重於改作實聖人之孝也但以既經焚毁舊制將來仙馭所經恐違虔奉之意其本地素無泉源日羞饋祀出於人力登降難為褻味又仲尼有言易墓非古臣庶兆域尚重芟夷園寢之間豈宜振擾不可再興版築理足明徴陛下聰明聖神德叶文祖寢宫廢墜嵗月滋深獨留其功以候聖旨伏惟精選信任大臣嚴重其禮昭告陵廟以通明靈令於柏城之中卜其近地略雕琢之費因耕稼之休務録愛人節用之心副文皇還郭之志天下幸甚謹議西伯受命稱王議梁肅太史公曰詩人道西伯以受命之年稱王而斷虞芮之訟遂追王太王王季改正朔易服色十年而崩或謂大雅序文王受命作周泰誓序十有一年武王伐殷妄徴二經以實其説豫以為反經非聖不可以訓莫此甚焉嘗試言之夫聖人無作作則為萬代法蓋仲尼美文王之德曰三分天下有其二以服事殷又曰內文明而外柔順以蒙大難文王以之未有南面稱王而謂之服事易姓創制而謂之柔順仲尼稱武王之烈曰湯武革命又曰武王末受命未有父受之而子復革命父為天子子云末受當武王之會孟津也告諸侯曰汝未知天命未可以誓師也曰惟我文考大統未集豫小子其承厥志孰有王者出征復俟天命天統既改而復云未集禮大傳稱牧之野既事而退柴於上帝追王太王王季文王改正朔書徽號若虞芮之歲稱王則不應復云追王王制既行則不應復云改物是皆反經者也夫大者天地其次君臣聖人知定位之不可易也故制為上下之禮裁成天地之道使各當其分而不相間若億兆之去留天命之與奪則存乎其時聖人順而行之故謳歌歸而舜禹揖讓桀紂惡而湯武放伐所謂後天而奉天時不得已而為之者也若殷道未絶紂惡未極而遂稱王以令天下則不可謂至德也此非其聖者也豫以為大雅作周之義蓋承夫積德纍仁為海內所歸往武王因之遂成大業非謂革命易姓為作周也泰誓紀年蓋武王周公追考前文陳王業之盛自虞芮始故斷為受命之嵗仲尼憲章文武故因而敘之曰十有一年武王伐殷非所謂自稱王而為之數也文王既沒經義斯在如曰不然以俟君子議攻宋范仲淹臣謂進討未利則又何攻臣竊見延安之西慶州之東有賊界百餘里侵入漢地中有金湯白豹後橋三寨阻延慶二州徑過道路使兵勢不接策應迂逺自來雖曽攻取無招降之恩據守之謀漢兵才回邊患如舊臣謂西賊更有大舉朝廷必令牽制則可攻之地其在於此可用步兵三萬騎兵五千鄜延路步兵一萬二千騎兵三千涇原路步兵九千騎兵一千環慶自選馬步一萬八千軍外番兵更可得七八千人軍行入界當先布號令生降者賞殺降者斬得精強者賞害老幼婦女者斬拒者併兵以戮之服者厚利以安之遁者勿追疑有質也居者勿遷俾安土也乃大為城寨以據其地如舊城已險因而增修非守地則别擇要害之處以錢召帶甲之兵􅍄户強壯兼其土役昨奉朝旨令修緣邊城寨臣以民方穡事將係官間雜錢並勸令近土人户以雇夫錢散與助功兵士充食錢其帶甲兵士翕然情願諸寨並已畢功俟城寨堅完當留土兵以守之方諸舊寨必倍其數使范全趙明以按撫之范全今為騏驥副使慶州北都巡檢趙明今為束頭供奉官柔逺寨蕃部巡檢必嚴其戒曰賊大至則明斥堠召援兵金湯東去德靖寨四十里西去東谷寨八十里西南去柔逺八十里白豹西去柔逺五十里南至慶州一百五十里堅壁清野以困之小至則扼險設伏以待之居常高估入中及置營田以助之如此則可分彼賊勢振此兵威通得延慶兩路軍馬易於應援所用主兵官員使勇決身先者居其前王信狄青劉極劉眙蓀張建侯范全可用策應者居其次任守臣王逹王遇張宗武談嘉震王文恩王文使臣中可當一隊者參於前後張信王遇張忠郭逵張懷寶有心力幹事者營立城寨周美張璨劉兼濟李緯張繼勳楊麟臣觀後漢段紀明以騎五千步萬人車三千兩錢五十四億三冬二夏大破諸羌又觀唐馬燧造戰車行則載甲兵止則為營陳或塞險以遏奔衝臣以此路山坡大車難進當用小車二十兩銀絹錢二十萬以賞有功將吏及歸降番部并就糴芻粟亦稍足用其環州之西鎮戎之東復有葫蘆泉一帶番部與明珠滅臧相接阻環州鎮戎徑過道路明珠滅臧之居北接賊疆多懷觀望義延州南安去故綏州四十里在銀夏川口今延州兵馬東渡黃河北入嵐石却西渡黃河倒來麟州策應蓋以故綏州一帶賊界阻斷徑過道路已上三處內麟府一路臣不曾到彼乞下本處訪問及畫圖即可見山川道路次第如取下一處城寨平定則更圖一處為據守之策比之朝去暮還此稍為便議守前人臣觀西戎居絶漢之外長河之北倚逺而險未易可取建官置兵不用祿食每舉衆犯邊一毫之物皆出其下風集雲散未嘗聚飬中國則不然逺戍之兵久而不代負星霜之苦懷鄉國之望又日給廪食月給庫緡春冬之衣銀鞋饋輸滿道千里不絶國用民力日以屈之軍情愁怨須務姑息此中原積兵之憂異於西戎也臣謂戎虜縱降塞垣須守當務經逺古豈無謀臣觀漢趙充國興屯田大獲地利遂破先零魏武於征伐之中分帶甲之士隨宜懇闢故下不甚勞大功克舉數年之中所在積粟倉廪皆滿唐置屯田天寶八年河西收二十六萬石隴西收四十四萬石孫武曰分建諸侯以其利而利之使食其土之毛實役其人氓之力故賦稅無轉徙之勞徭役無怨曠之嘆臣昨在延州見知青澗城种世衡言欲於本處漸興田利今聞僅獲萬石臣觀今之邊寨皆可使弓手土兵以守之因置營田據畝定課兵獲餘羡中糶於官人樂其勤公收其利則轉輸之患久可息矣且使其兵徙家寨下重田利習地勢父母妻子而堅其守比之東兵不樂田利不習地勢復無懷戀者功相逺矣少田處許蕃部進納荒田以遷資酬奬或量給價直倘朝廷許行此道則委臣舉擇官員約古之義進今之宜行於邊陲庶幾守愈久而備愈充雖戎狄時為邊患不能困我中國此臣所以言假土兵弓手之力以置屯田為守之利也然臣觀前漢高帝之盛臣有蕭張決勝千里下有百戰之師以四十萬之衆困於平城乃約丐奴和親至高后文景代代如之不絶其好丐奴屢變往往犯塞殺戮吏民不勝其酷至於書問傲慢下視中國而人主以生民之故屈己含容不為之動孝文即位將軍陳武請議征討以一封疆孝文曰兵凶器也雖克所願動亦耗病謂百姓逺方何今丐奴內侵軍吏無功邊民父子荷兵日久朕動心痛傷何日忘之未能消距願且堅邊設候結和通使休寧北陲為功多矣且無議兵故百姓無內外之徭得息肩於田畝天下冨實雞鳴犬吠煙火萬里可謂和樂者乎司馬遷以文帝能和樂天下協於大樂故著於律書為後代法臣謂國家用攻則宜取其近而兵勢不危用守則必圖其久而民力不匱然後取文帝和樂之德無孝武哀痛之悔則天下幸甚天下幸甚鹽法議明張鍊夫食鹽山澤自然之利天地所以飬民也上古無征近古薄征以佐國用要在先不病民而後利國為可貴耳關中食鹽一出於河東一出於花馬池一出於靈州一出於西章靈州西章去三輔絶逺專供靈夏洮岷西北兵民之用無容議矣花馬池鹽北供延慶平三府寧榆二鎮南與河東鹽並行於三輔間河東鹽上下公行謂之官鹽花馬池鹽私者貿易謂之私鹽民間便於私鹽不便於官鹽者百年於兹矣必欲行河東官鹽其弊有四蓋行鹽郡縣各有分界所司徒知紙上陳迹河東鹽行三省不可越縮若究其實在山西河南未知何如其在關中自長安以西河東美鹽絶迹不至間有至者皆泥滓苦惡中人不以入口惟耕夫寡婦黽勉食之計其所售無幾也名雖謂行其實未嘗行之一也往來商人慮惡鹽不售告發郡縣使所在輦運外加樣鹽包封印記之及以給民封者自佳輦者自惡唱户分鹽畏如飲鴆計賑徴價峻於正稅今雖暫止既為故事恐不能已二也商人賣鹽與販夫隨以小票鹽盡票不收毁官鹽不至西路則無票無票則通責店肆負販細人請東路自買未毁之票繳官公人亦幸免責不問由來互相欺抵三也買票日久姦人依式私製盜賣僥幸者冒利敗露者破家雖有防禁迄今未已四也必欲禁花馬池私鹽其弊有五關中民貧衣食驅遣賦稅催切罄家所有走北地販鹽冀侔斗升之利一為公人所獲則身入陷阱家計盡空一也貧人既為囚縶內無供餽冬月多斃於獄考驛遞囚賑鹽徒居半死者又居強半民命可恤二也小販懼捕結聚大夥經山溪要隘偶遇公人勢強則抵敵勢弱則冒險奔迸投崖落澗人畜死傷塗地三也公人與有力慣販者交關終嵗不捕反為盜護惟單弱貧瘠者捕之或以升斗惡鹽強入路人筐袋執以報功使無辜受害四也衆役工食悉有定例惟巡捕工食私幫公費嵗增十倍官吏比銷徒御勞悴動經時月候文曠職旅食空囊或罰或貸俱為無補五也夫物力不齊物之情也好美惡惡趨利就便民之情也所欲與聚所惡勿施裒多益寡因俗成務司國計者之情也以物力言河東舊商帶支坐困新商超納無幾澆晒徒勞增課未減公私俱稱歉矣河東一池雖差大供三省則不足花馬二池雖差小供三郡二鎮則有餘自然之勢也以人情言河東鹽百方督之使行至以泥沙勒售假票甘罪而終不能行花馬池鹽百方禁之使不得行至於比屋破産接踵喪生而終不能禁者民之大欲大惡不可強也以國計言河東嵗課一十九萬有竒花馬二池歲課不盈數千河東鹽一引三錢有竒二池鹽一石六分有竒如是相懸者意河東與天下六運自祖宗朝俱有定額由來久逺二池迫近塞垣棄取不時故課亦微眇後來因循取足原辦而止耳夫河東鹽既不能及逺二池鹽卒不能禁民間又不可一日無鹽而盜買盜賣終非常理今當直開二池鹽禁使西鳯漢中沛然通行計三府所當常食河東鹽一十二萬有竒嵗課即照河東責三府代辦以其事權統歸河東巡鹽御史則達觀無異督禁有程兩地歲徴四鎮年例保無纎爽而關中可少事矣夫居害者擇其寡興利者取其多儻今不弛二池鹽禁則愚民被逮供餽為費罪贖為費姦人騙詐為費兵民歲增工食為費官吏比銷為費一切顯隱猥雜不可會計財足抵河東花馬二池正課出於千瘡百痛徒然費之而下殘民命上損國體又餘殃也儻今一弛二池之禁則愚民被逮供餽可省罪贖可省姦人騙詐可省歲增工食可省官吏比銷可省一切顯隱猥雜不可會計財足抵河東花馬二池正課出於不識不知漠然省之而下活民命上全國體又餘福也夫人情不甚逺比聞鹽法侍御皆一時英碩表表長者使其聞見悉如關中人習知其利病則亦何憚而不為良處哉但其受命而來也惟以行官鹽禁私鹽為職而反是則駭矣地非素履事未前聞雖聖人有所不知者何可遽望改易其常耶雖然安國家利百姓大夫出疆義也究理從長議政從便人心不昧因革有時此又關斯民之幸不幸也豳防議文翔鳯三水同官耀州者畿輔之藩也寧州真寧宜君者又三邑之藩也盜自三水入者十之七自同耀入者十之三榆林定邊之直子午嶺而下也中部宜君之經子午嶺而西也皆會於劉家店子即杜詩所謂子午關者而一支可自馬蘭直入同官一支可自馬蘭直入耀之柳林鎮一支可自馬蘭出三水之石門關是馬蘭其一扼要區也而馬蘭河即吾三水之水源可沿川直至縣然谷側蹶近未有由此者劉家店一支又可自兩女寨直入三水之職田鎮則劉家店又大扼要區也而防者宜防此以遏其入勦者宜從此以從其所歸落此東盜之槩也故宜君寧州真寧之衛嚴則三水同耀靖三水同耀之衛嚴則涇陽三原富平又何從受兵耶余生長中豳少嘗北至慶陽西至鎮原東至三河鎮石門一道又其所屢出頗諳其要地之防特出胸中粉本為此議以代抵掌羣公可據按而坐策耳嘗謬為四道會勦之説欲以慶陽道駐寧州鄜州道駐宜君守道駐耀州巡道駐邠州以一府廳駐三水督餉其中為接應大掃除而就近勦則兩道分駐而亦可辦耀州為受盜之衝守道駐耀以逐其去三水為納盜之衝巡道駐邠以要其歸總之東防勦於劉家店西防勦於寧州中立防於真寧此地形之不可易者也兵太分則土兵客兵之相軋固不宜角立兵太合則東衝西衝之分據亦不便歸併兵少則將不給兵多則將驕而餉亦不易給倘兵委之將將委之敵而無監軍之司道則制將難無轉餉之府廳則兵飫飽難濫殺可虞橫斂誰馭而山深道曠即給行糧又於何處辦食耶則乾餱酒漿之具即他為取辦亦弗得太恤大略勦加於邊盜而撫加於內地之脅從勦行而後可撫盜定而後可防以久安耳必有全籌惠我西土來民秦商鞅地方百里者山林處什一藪澤處什一溪谷流水處什一都邑蹊道處什一惡田處什一良田處什四而民食作夫五萬其山林溪谷藪澤可以給其材都邑蹊道足以處其民先王制土分民之律也今秦之地方千里者五而榖土不能處二田數不滿百萬其藪澤溪谷名山大川之材物貨寶又不盡為用此人不稱土也秦之所與鄰者三晉也所欲用兵者韓魏也彼土狹而民衆其宅參居而并處民上無通名下無田宅而恃姦務末作以處人之復隂陽澤水者過半此其土之不足以生其民也以有過秦民之不足以實其土也意民之情其所欲者田宅也而晉之無有也信秦之有餘也必如此而民不西者秦士戚而民苦也臣竊以王吏之明為過見此其所以弱不奪三晉民者愛爵而重復也其説曰三晉之所以弱者其民務樂而復爵輕也今秦之所以強者其民務苦而務爵重也今多爵而久復是釋秦之所以強而為晉之所弱也此王吏重爵愛復之説也而臣竊以為不然夫所以為苦民而強兵者將以攻敵而成所欲也兵稱曰敵弱而兵強此言不失吾所以攻而敵失其所守也今三晉不勝秦四世矣自魏襄王以來野戰不勝守城必拔小大之戰三晉之所以亡於秦者不可勝數也若此而不服秦能取其地而不能奪其民也今王發明惠諸侯之士來歸義者今使復之三世無知軍事秦四境之內陵阪丘隰不起十年足以造作夫百萬曩者臣言曰意民之情其所生者田宅也晉之無有也信秦之有餘也必若此而民不西者秦士戚而民苦也今利其田宅而復之三世此必與其所欲而不使行其所惡也然即山東之民無不西者矣豈徒不失其所以攻乎夫秦之所患者興兵而伐則國家貧安居而農則敵息此王所不能兩成也故四世戰勝而天下不能以故秦事敵而使新民作本兵雖百宿於外境內不失須臾之時此富強兩成之效也臣之所謂兵者非謂悉興盡起也論境內所能給軍卒車騎令故秦民事兵新民給芻食天下有不服之國則王以此春圍其農夏食其食秋取其刈冬陳其寶以大武搖其本以廣文安其嗣王行此十年之內諸侯將無異民而王何為愛爵而重復乎周軍之勝華軍之勝秦斬首而東之東之無益亦明矣而吏猶以為大功為其損敵也今以草茅之地來三晉之民而使之事本此其損敵也與戰勝同實而秦得之以為粟此反行兩登之計也且周軍之勝華軍之勝長平之勝秦所以亡民者幾何民客之兵不得事本者幾何臣竊以為不可數矣假使王之羣臣有能用之費此之半弱晉強秦若三戰之勝者王必加大賞焉今臣之所言民無一日之繇官無數錢之費其弱晉強秦有過三戰之勝而王猶以為不可則臣愚竊不能知己齊人有東郭敞者猶多願願有萬金其徒請賙焉不與曰吾將以求封也其徒怒而去之宋曰此無益於愛也故不如與之有得也今晉有民而秦愛其復此愛非其有以失其有也豈異東郭敬之愛非其有以亡其徒乎且古有堯舜當時而見稱中世有湯武在位而民服此三王者萬世之所稱以為聖王也然其道猶不能取用於後今復之三世而三晉之民可盡也是非王賢力今時而使後世為王用乎然則非聖人之難用聖人難也問秦居上腴利號近蜀然都畿所理征賦不充故歲漕山東榖四百萬斛用給京師其間水旱不時賑貧貸乏今議者罷運榖而收腳價和糴粟而折稅錢但未知利於彼乎害於此乎唐白居易臣聞議者將欲罷漕運於江淮請和糴於關輔以省其費以便於人臣愚以為救一時之弊則可也若以為長久之法則不知其可也何者方今自淮以南逾年旱歉自洛而西仍歲豐稔彼人困於艱食此榖賤於傷農困則難於發租賤則易於乞糴斯則不便於彼而無害於此矣臣所謂救一時之弊則可也若舉而為法循以為常臣雖至愚知其不可何者夫都畿者四方所湊也萬人所會也六軍所聚也雖利稱近蜀之饒猶未能足其用雖田有上腴之利猶不得充其費况可日削其榖月朘其食乎故國家歲漕東南之粟以給焉時發中都之廪以賑焉所以贍關中之人均天下之食而古今不易之制也然則用舍利害可明徴矣夫齎斂糴之資省漕運之費非無利也蓋利小而害大矣故久而不勝其害挽江淮之租贍關輔之食非無害也蓋害小而利大矣故久而不勝其利大凡事之大害者不能無小利也事之大利者不能無小害也蓋恤小害則大害不去愛小利則大利不成也古之明王所以能興利除害者非他蓋棄小而取大耳今若恤泛舟之役忘移榖之用是知小計而不知大會矣此臣所以謂若以為長久之法則不知其可也陜西守策范仲淹元昊自來通順之時歲受恩賜朝廷撫納甚厚未嘗有失尚猶時擾邊境殺戮將吏暨叛命以來纍次大舉曽無沮敗乃求通順實蓄隂謀非屈伏之志也朝廷若以權宜許之更當嚴其備守其陜西久屯大兵供費殫竭減兵則守備不足不減則物力已困臣等請緣邊城寨愈加繕完使戎虜之心無所窺伺又久守之計須用土兵各諳山川多習戰鬬比之東兵戰守功倍然緣邊次邊土兵數少分守不足更當於要便城寨招置土兵若近裏土兵願改𨽻邊寨者即遷其家而團集之况昨來慶州創起大順城欲置振武保捷兵兩指揮仍於永興華耀土兵中召其願守寨者而應募甚衆何則關內諸州土兵多在邊上或得代歸營而數月之間復出逺戌豈徒星霜之苦極傷骨肉之恩征夫不保其家離婦頗多犯法人情不免久則怨起如得併遷其家於緣邊住營更免出軍父母妻子樂於完聚戰則相救守則相安或謂若土兵攜家居於寨下則全分請給其費尤多不然土兵月給差少又素號精強使之戍邊於東兵數復可減然於逐路漸為增益二年已來方能整習固非一朝可驟改也又陜西新刺保捷土兵其中尫弱不堪戰陳者宜沙汰之使歸於田畝既省軍費復增農力然後東兵三分中一分屯邊以助土兵之勢一分移入次邊或屯關輔以息餽餉之困一分歸京師以嚴禁衛之防彼如納欵未變則東兵三分中更可減退又緣邊無稅之地所招弓箭手必使聚居險要每一兩指揮共修一堡以完其家與城寨相應彼戎小至則使屬户蕃兵暨弓箭手與諸寨土兵共力禦捍彼戎大舉則二旬之前必聞舉集我之次邊軍馬盡可勾呼駐於堅城以待敵之進退緣邊山坂重復彼之重兵必循大川而行先求疾速俟其得勝使我師沮而不出方敢散兵虜掠過越險阻更無顧慮我若持重不戰則彼之重兵行川路中糧草無所給牛羊無所獲不數日人馬困敝彼之重兵更不敢越險又未能決勝必不得已而散兵虜掠我於山谷村落中伏精鋭以待之彼散掠之兵輕而寡弱可擊可逐使散無所掠聚不得戰欲長驅深入我則使諸將出竒以躡其後欲全師以歸我則使諸城出兵以乘其敝彼將進而有禍不三兩舉勢必敗亡此守策之要也陜西攻策前人元昊巢穴實在河外河外之兵懦而罕戰惟橫山一帶蕃部東至麟府西至原渭二千餘里人馬精徑慣習戰鬬與漢界相附每大舉入寇必為前鋒故西戎以山界蕃部為強兵漢家以山界屬户及弓箭為善戰以此觀之各以邊人為強理固明矣所以秦漢驅逐西戎必先得山界彼則逺遁然後以河為限寇不深入儻元昊歸欵則請假和策以待之如未通順或順而翻覆則有可攻之策非窮兵黷武角勝於絶漠之外也臣等嘗計陜西四路之兵總數幾三十萬非不多也然各分守城寨故每嵗戰兵大率不過二萬餘人坐食芻糧不敢動舉歲歲設備常如寇至不知賊人之謀果犯何路賊界則不然種落散居衣食自給忽爾點集併攻一路故犬羊之衆動號十餘萬人以我分散之兵拒彼專一之勢衆寡不敵遂及放敗且彼為客當勞而反逸我為主當逸而返勞我若復用此計彼勞我逸則取勝必矣臣等請於鄜延環慶涇原路各選將佐三五人使臣一二十人步兵二萬騎兵三千以為三軍以新定陳法訓練歲餘候其精勇然後觀賊之隙使三軍掠於橫山更進兵降者納質厚賞各令安土拒者併兵急擊必破其族假若鄜延一軍先出賊必大舉來應我則退守邊寨或據險要不與大戰不越旬日彼自困敝勢將潰歸則我環慶之軍復出焉彼若再圖點集來拒王師則又有涇原之師乘間而入使賊奔命不暇部落攜怨則我兵勢自振如宥州綏州金湯白豹折薑等寨皆可就而城之其山界蕃部去元昊且逺求援不及又我以堅城據之以精兵臨之彼既樂其土復逼以威必須歸附以圖安全三五年間山界可以盡取此春秋時吳用三帥破楚之策也元昊若失橫山之勢可謂斷其右臂矣矧漢唐之舊疆豈今日之生事也西陲禦備策慶厯八年魚周詢陛下患西陲禦備天下驛騷趨募兵士急調軍食雖常有增而經用不足臣以為唐季及五代強臣專地中國所制疆域非廣及祖宗有天下俘兵楚蜀晉北捍獯鬻中服戎羌所用甲兵所入租賦比之於今其數尚寡然而摧堅震敵府庫無空虛之弊縣官無煩費之勞蓋賞信罰必將選兵精之效也近元昊背惠四方宿師朝廷用空踈闒葺者為偏禆以遊惰怯懦者備行伍故大舉即大敗小戰輒小奔徒日費千金度支不給賣官鬻爵淆雜仕流以鐵為錢隳壞國法而又官立鹽禁驅民齎輦蕩析恆産怨咨盈路去秋水旱繼作今春飢饉相屬生靈重困於兹為劇今元昊幼子新立乃朝廷寬財用惜民力之時也速宜經度以紓匱乏願委安撫使與本路守邊掌計臣僚同議裁減冗兵節抑浮費禁止橫斂廪假貧民去武臣之庸懦出守宰之貪殘仍冀特發宸𠂻出內帑錢助關陜經費使通鹽商之利改錢幣之法宣布德澤與民休息然後勸勉農桑隱括稅籍收遺利抑兼并則公有羡財私有餘力矣榆問明張珩懷德公問於憂心子曰嘗聞王晉溪議余肅敏遷鎮失策何如憂心子曰鎮城原設綏德州本秦上郡地也其形勢則雕山疏屬嶕嶢橫峙無定大理瀲灎奔流有葭蘆府谷神木之險扼之於左有響水土門筆架之阻環之於右中自米脂魚河直抵河套一千二百餘里皆屬內地足堪戰守縱有猖獗中有榆林百里沙磧我主彼客我逸彼勞何能為哉懷德公曰晉溪以河套為內地果何所考憂心子曰河套古朔方郡地詩所謂天子命我城彼朔方者此也歷秦漢皆郡縣其地唐張仁願攝御史大夫代朔方總管築三受降城受降之外有青山迤邐東西二千餘里山之上置斥堠千八百座突厥不敢踰山牧馬減鎮兵數萬省費以億計是山之北方為境外至宋仁宗時為夏所併及元滅夏立西夏尚書省以𨽻之逮我洪武舍受降而衛東勝已失一面之險其棄東勝以就延綏則以一面之地遮千餘里之衝所幸者邊境帖然耳及正統十四年乘土木之變阿羅出等始入河南入犯敕都督王禎鎮守延綏提輕騎三千晝夜兼行五百里即追出境遂秦築榆林城南作延綏之屏翰北保河套之沃壤以為重險耳至成化七年巡撫王公鋭奏立榆林衛八年余肅敏代鋭始遷綏德鎮於榆林故晉溪謂失策正在於此何也天下之事有理有勢理可為也值勢有所阻雖豪傑不能以有濟今考自正統十四年一犯之後歷景泰以至肅敏遷鎮時十五年間絶無警報正所謂天未隂雨綢繆牖户之時也使肅敏果欲立萬世之業即復張仁願之所經略者掣榆鎮守哨之軍置青山見在墩臺則烽火明矣移榆鎮畚鍤之夫築沿河塞垣故址則保障固矣採套中之材木則公廨建矣因套中之鹽池則國課興矣治地分田則屯田舉矣立置設郵則王命傳矣豈不為久安長治之策哉奈肅敏智不及此顧乃屑屑以就河套之利置重鎮於沙磧之間譬如棄珠玉於道途終必為人所得河套之利又安可保哉果至𢎞治十四年和碩入套迄今濟農據為巢穴已為門庭之寇深抱蠶食之憂及覽肅敏奏議原議榆林將士耕種於套以省民運牧馬於套以省內帑今兩利俱失而且外困於兵內困於食皆肅敏失策之所致也公曰往事難咎矣套利既失通變宜民必有其道願吾子思之憂心子曰青山之北為境外彼既踰我青山復據我河套河套之南為墩臺彼既攻我墩臺復掠我樵牧又不時輒至我內地於東路侵三角城花石崖答兒山等處於西路侵白洛城蘆關嶺金湯寨等處於中路侵碎金驛銀州關魚河峁等處至秋髙馬壯輒為大舉如嘉靖七年入涇邠十九年入固靖二十二年入綏德清澗二十四年入保安二十五年入環慶榆林雖有防秋之備而侵軼之患不能一朝居也懷德公曰子今計將安出憂心子曰余觀今日榆鎮與前迥然不同茍不急為之圖必致燎原莫遏竊不自量會題城堡二官經畫腹裡遴選能幹武職處置臨邊使隨處堅壁人皆賈勇自為戰守以保身家亦唐府兵遺意也至於三十五城營堡每空四十餘里地勢平漫無墻可據則地利尚矣復於石門鎮石門子野豬硤禪梯嶺關背干川開光堡棗灣兒黃草墕白晝山順寧司五谷城俱有峻嶺深溝為大舉必經之路乃挑築城塹嚴兵伏遏庶得用少守險之要使彼不得南下更於各路選鋒令驍將統領預發通事夜不收監哨水頭如見大衆聚結分投飛報相機而擊之是我守險者步兵當鋒者精騎彼聚衆以攻我合兵以拒勢亦不分此防秋之計也若彼夜伏邊外伺旦竊掠我偵知要擊有功者即具題升賞以示鼓舞人皆爭戰彼自不敢近邊矣倘或陡逼塞垣覘我虗實哨探得實速發驍健擊之彼將膽落心寒必逺我邊三四百里不但樵牧之人可保無虞河套之利亦得少資萬一余昔撫榆林鎮嘗集議主勦大將劉文周尚文偏禆梁震白爵三年間頗多斬獲至於梁震直搗其營今彼中猶稱梁太師來以止兒啼云懷德公曰彼未入犯乘吭搗穴豈非搆怨啓釁乎憂心子曰考之别鎮出大邊為境外榆林青山之外為境外見載肅敏題準事例有馬官軍夏秋牧馬於套每軍復採秋青草以備春冬之用無馬官軍亦然嘉靖七年有神木參將王效入套奪馬百餘匹被豪民薛天祿者挾財不遂赴登聞鼓奏效隱匿邊釁下陜西撫按會勘有云果如薛天祿所奏王效當正典刑但不知所謂境外指何地而言若是河套乃我祖宗內地王效仍當論功行賞薛天祿從重發遣此余巡按陜西時事也且河套內地備載陜西通志官軍牧馬採草明載余肅敏奏議總督楊邃菴經略三疏亦論及之俱可考證夫以境外視河套者固失考國家故實其冒昧復套者又不察事機之會可勝嘆哉今彼據我河套使我耕牧樵採之利盡失在套則犯延寧出套則東犯宣大西犯甘涼猶為四肢之疾至二十九年東渡與諳達小王子糾衆數萬由古北口直犯畿輔上厪我皇上宵旰之憂以致調各鎮精兵入衛又於都門之外議築重關是腹心之病矣今日者臨邊斬獲逺振軍威而謂之搆怨啓釁可乎公改容曰子之言是宣三輔討姚萇檄晉郭質義感君子利動小人吾等生逢先帝堯舜之化纍世受恩非常伯納言之子即卿校牧守之裔而坐視豺狼忍害君父祼尸薦棘痛結幽泉山陵無松隧之兆靈主無清廟之頌賊臣莫大之罪自古所未聞雖茹荼之苦銜蓼之辛何以喻之姚萇窮凶肆害毒被神人於圖讖厯數萬無一分而敢妄竊重名厚顔瞬息日月固所不照二儀實亦不育皇天雖欲絶之亦將假手於忠節凡百君子皆夙漸神化有懷義方含耻而存孰若蹈道而沒乎傳藩鎮會復關中檄唐鄭畋夫屯亨有數否泰相沿如日月之蔽虧似隂陽之愆伏是以漢朝方盛則莽卓肆其姦凶夏道未衰而羿澆騁其殘酷不無僣越尋亦誅夷妖孽之生古今難免代有忠貞之士力為匡復之謀我國家應五運以乘乾躡三王之垂統綿區飲化匝宇歸仁十八帝之鴻猷銘於神鼎三百年之睿澤播在人謡加以政尚寬𢎞刑無枉濫翼翼勤行於王道孜孜務恤於生靈足可傳寶祚於無窮御瑶圖於不朽近歲螟蝗作害旱暵延災因令無賴之徒遽起亂常之暴雖加討逐猶肆猖狂草賊黃巢奴僕下才豺狼醜類寒耕熱耨不厲力於田疇偷食靡衣務偷生於剽奪結連凶黨驅迫平人始擾害於里閭遂侵陵於郡邑屬以蕃臣不武戎士貪財徒加討逐之名竟作遷延之役致令滋蔓纍有邀求聖上愛育情深含𢎞道廣指萬方而罪已用百姓以為心假以節旄委之藩鎮兾其悛革免困疲羸而殊無犬馬之誠但恣蟲蛇之毒虔劉我征鎮覆沒我京都凌辱我衣冠屠殘我士庶視人命有同於草芥謂大寶易取如奕棋而乃竊據宫闈偽稱名號爛羊頭而拜爵續狗尾以命官燕巢幕以誇安魚在鼎而猶戲殊不知五侯拗怒期分項羽之尸四冡既成待葬蚩尤之骨猶復廣侵田宅濫畜貨財比溪壑以難盈類烏鳶而縱攫茫茫赤縣僅同夷貉之鄉惴惴黔黎若在狴牢之內人神共怒行路傷心畋謬領藩垣榮兼將相每枕戈而待旦常泣血以忘飱誓與義士忠臣共剪狐嗚狗盜近承詔命會合諸軍皇帝親御六師即離三蜀霜戈萬隊鐵馬千羣雕虎嘯以風生應龍驤而雲起淮南髙相公會關東諸道百萬雄師計以初夏會於關內畋與涇原節度使程宗楚秦州節度使仇公遇等已驅組練大集關畿爭麾隴上之蛇矛待掃關中之蟻聚而吐蕃黨項以久濡皇化深憤國讐願以沙漠之軍共獻蕩平之捷此際華夷合勢藩鎮連衡旌旗煥爛於雲霞劔戟晶熒於霜雪莫不持繩待試賈勇爭先思垂竹帛之功誓雪朝廷之耻矧兹殘孽不足殄除况諸道世受國恩身縻好爵皆貯興邦之略咸傾致主之誠自函洛構氛鑾輿避狄莫不指銅駝而眥裂望玉壘以魂銷聞此勤王固宜投袂更希憤激速殄寇讐永圖社禝之勳以報君親之德迎鑾反正豈不休哉報西夏索割鄜延檄宋王庶金人初犯本朝嘗以金肅河清畀爾今誰與守國家以姦臣貪得不恤鄰好遂至於此貪利之臣何國無之豈意夏國躬蹈覆轍比聞金人欲自涇原徑搗興靈方切寒心不圖尚欲乘人之急幕府雖士卒單寡然類皆節制之師左支右吾尚堪一戰果能辦此何用多言西平王李晟收西京露布唐于公異臣聞春司生榮秋主殺伐若終始煦嫗則不能成歲功仁則順成暴則殘滅若一貫邪正則不能建大中是以春秋序行則通天和而母元氣德刑具舉則協王道而經彛倫亂由是除兵不可去堯舜禹湯之德統元立極之君或制五兵或張九伐蓋欲攘剔凶戾乂安生靈補雍熙之未洽佐聲教之不暨有以然者抑實為焉伏惟皇帝陛下溥博法於乾坤貞明侔於日月陶埏六籍表正萬邦揚髙祖太宗之耿光奉肅宗代宗之丕烈自纂承前緒髙居穆清率土承有截之風懷生無不遂之性頃者邊鄙或聳干戈爰設有征無戰許蔡傒首領之誅陸梁背誕涇原生肘腋之變逆賊朱泚所以委身凶德假翮姦徒熒惑我生人僣賊我神器聚為起穢之物腥彼宫闈散作旬始之妖孛於躔次先皇帝懷柔河朔敷佑下人録其率化之績優以登朝之禮恩澤汪濊集凡庶之門名器燻灼加闒茸之輩謂革桀跖將馴大和殊不知惡木生槎枿之荑瘈狗吠豢牢之主頃屬鑾輿順動郊畿駐驆而泚乃嘯凶命醜阻兵安忍長戟指闕流矢射天穿髙墉以鼠牙毒王師以蠆尾罪浮羿浞惡貫梟獍是以萬方糾怒九服囂騰思齒劔者投袂而興爭倳創者不期而會屬賊臣聞釁隂貸凶謀中緩雷霆之誅遂延頃刻之命臣是用祗承睿算恭行天罰攝衣登壇明君親之大義禡牙宜社假神祗之幽贊以今月草五日更總領師徒直趨都邑略灞滻而揚斾瞰囿遊而下營土濠雲舒木柵林植飬威畜鋭直殄元凶卧鼓偃旗猶輕小利賊初陵犯略以芟夷謂其氣竭而來歸尚敢尸居而作固敵若可縱師多奚為遂至草七日會諸將於中權占勝風於大斾未鼓而人心粗勵先庚而軍令凝嚴各懷報主之誠盡淬復讐之創臣知其可用遂此疾驅五月草八日寅時華州鎮國軍節度使駱元光神策行營商州節度使兼御史大夫尚可孤本軍副使都知兵馬使御史大夫吳詵都虞候兼御史大夫邢君牙京西行營都知兵馬使檢校工部尚書孟涉右廂兵馬使御史大夫康英俊隴州節度右廂兵馬使郭審全又權乂成神䇿行營商州節度都虞候彭元俊等受命於牙旗之下分麾於轅門之外將士等超乘賈勇免胄啓行夾川陸而左旋右抽抵丘陵而浸淫布濩聲塞宇宙氣雄鉦鼓陳兵於光泰門外悉鋭於神麚倉東繚垣岔以成塵滋水涸而為地左廣未離於舊壘前偏已交於賊鋒若降於天若出於地賊帥姚令言張芝等志懷剽狡心尚憑陵作忠盡謀力則不及怙亂賊義氣則有餘勢如飈馳衆若蜂集橫列堅陳勢連髙岡猶張蹭蹬之鱗更舉螳螂之臂衙前兵馬使兼御史大夫王必知牙官兼刀斧將兼御史中丞史萬頃等自相誓約又令軍行指麾而貔兕作威感激而風雲動色遂先登進擊深入合攻七擒連發而星馳兩翼旁張而雲合霜創吐光而揮霍鼉鼓騰聲而隱轔賊方土崩我乃霆擊乘其蹈籍遂至於上蘭取彼鯨鯢直通乎中禁段誠諫賊之心膂既就生擒涇原將賊之羽毛終制死命顧其係頸求活投戈乞降崩騰於蓁莽之間震懾於旌麾之下臣以其今染汙俗昔實平人推赤心以如初敷皇化而咸一姚令言等力扞王師退而復合惡烏將墜尚顧危巢妖狐就擒猶守舊穴自卯及申拒而復攻歡譟之聲山傾而河泄鼓鼙之氣霆鬪而電奔屏翳發向敵之風回祿扇燎原之熖馬逸不止人怒未舒既自北而徂南竟輿尸而折首又使決勝軍節度使工部尚書唐良臣右廂兵馬使御史大夫趙光鏟義武軍兵馬使楊萬榮左步軍使御史大夫孟曰華馬將軍田子竒霍去憞郝覲等華州節度使左廂先軍兵馬使馬英華右先鋒兵馬使董泚神䇿行營商州節度兵馬使賈值金右廂左都虞候張望都等領馬步為副勢均破浪攻若決河雖其盜武庫之五兵憑宫垣之萬雉及兹剪滅才欲乘陵曽無鐏創之鋒已失藩籬之固遂生擒偽署侍中董泰中書侍郎平章事蔣鎮左僕射同平章事張光晃兵馬使李倩敬釭等逆賊朱泚與同惡姚令言張芝等輕騎走出臣已遣兵馬使田子竒等追躡計即梟夷臣竊以此賊包藏逆謀參會凶德祲沴其氣豺武其心背先皇亭育之恩傷陛下元默之化漢之莽卓未足等夷晉有敦元自當超軼子暴其父隂侵於陽自古未有如泚之大者也或者上天之意申警於巨唐中興之期先啓於陛下不然何王師奮伐勢無駐於建瓴醜類搶攘功有輕於折箠猶逃密網尚反隻輪誠當盡敵之時更發追亡之騎且稽分體未即燃臍快億兆之歡心復宗社之深耻即當梟戮用申刑典今已肅清宫禁祗謁寢園鐘簴不移廟貌如故蓋宸極之所垂象列聖之所雄都神扶業業之傾天降穰穰之福不然豈免於毁圮之患崩剝之虞者哉此皆上天降鑒睿慮潛施制兵要於事先規雄武於彀內再造可封之俗因櫜不戰之功左武右文銷鋒鑄鏑淡乎華胥之代冥然葛天之風臣謬寄台司幸當統帥乏吉甫之文武缺郤縠之詩書此皆衆將叶心羣帥宣力非臣庸瑣敢自矜大臣不勝慶快之極謹差某官奉露布以聞收復京城奏捷露布中和三年楊復光頃者妖興霧市嘯聚叢祠而嶽牧藩侯備盜不謹謂大同之運常可容姦謂無事之秋縱其長惡賊首黃巢因得充盈窟穴蔓延萑蒲驅我蒸黎徇其凶􅊇展生鍔以成鋒刃殺耕牛以恣燔炮魑魅晝行虺蜴夜噬自南海失守湖外喪師飬虎災深馴梟逆大物無不害惡靡不為豺狼貽朝市之憂瘡痏及腹心之痛遂至毒流萬姓盜汚兩京衣冠銜塗炭之悲郡邑起丘墟之痛萬方共怒十道齊攻仗九廟之威靈殄積年之凶醜河中節度使王重榮神資壯烈天賦機謀誓立功名志安家國至於屯田待敵率士當衝收百姓十餘萬家降賊黨三萬餘衆法能持重功遂晚成久稽原野之刑未決雷霆之怒自收同華進逼京師夕烽髙照於國門遊騎頻臨於灞岸既知四隅斷絶百計奔衝如窮鳥觸籠似飛蛾赴熖雁門節度使李克用神傳將略天付忠貞機謀與武藝皆優臣節共本心相稱殺賊無非手刃入陳率以身先可謂雄才得名飛將統領本軍南下與臣同力前驅雖在寢興不忘寇孽今月八日遣牙隊將前鋒守宗河中騎將白志遷橫野軍使滿存雲躡將丁行存胡邑鎮將康思貞忠武黃頭軍使龎從等三十二都隨李克用自光泰門先入京師力摧凶逆又遣河中將劉讓王瓌兾軍武孫珙忠武大將喬從遇鄭滑將韓從威荆南大將申屠悰滄州大將賈滔易定大將張仲慶壽州大將張行方天德大將顧彥明左神策弩手甄君楚公孫佐橫衝軍使楊守亮躡雲都將髙周彛忠順都將胡貞絳州監軍毛宣伯聶𢎞裕等七十都繼進賊尚為堅陳來抗官軍李克用率勵驍雄整齊金革呌噪而聲將動瓦時咽而氣欲吞沙寬列戈矛麾軍夾擊自卯至申凶徒大敗自望春宫蹙殺至升陽殿合圍戈不濫揮矢無虛發其賊即時奔遁散入商山徒延漏刃之生停作飲頭之器伏自收平京國三面皆立大功若破敵摧鋒雁門實居其首其餘將佐同效馳驅兼臣所部二萬餘人數歲櫛風沐雨既兹蕩定並録以聞陜西通志卷八十七
