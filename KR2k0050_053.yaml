字白雲四川忠州人舉人順治四年任安塞令才智明敏遇事敢為殘疆大有起色六年王永強作亂瑤誓死守孤城力拒強敵卒殞於難事聞贈按察司僉事廕一子入監時變起倉猝郡邑守禦無資有洛川署令郭璨亦以守城力屈死徐之龍字仲升江隂人順治四年由恩貢授神木令逆辨王永強兵至之龍嬰城固守城陷之龍慨然曰吾受國恩當以死報誓不靦顏求生遂罵賊死之事聞贈按察司僉事賜祭葬之龍二子廷綸寵綸在署亦皆遇害姚欽明江寧人貢生順治四年宰澄城削平餘孽招集流亡以荒糧為澄民纍條悉諸弊申請再三得邀恩免至修文廟賑貧寒改陸運雪寃獄尤見愛民實政王儒濰縣人宰三水順治初冦氛未靖城西堡名雙槐者公署倉庫所在為一邑要地時經兵燹儒尅期修復守禦備至四境帖然民懷其德為建祠樹碑以志遺愛李溥字雷澤鄢陵人順治丙戌進士授三原令英爽有幹才時流氛未靖數窺縣城溥繕雉堞練鄉勇儲偫甚周九年春賊破西鄉王堡據嶻嶭山溥借兵鄰鎮直搗賊巢盡殱之四郊以寧內升户部主事三原人肖像祀之趙賓陽武人順治丙戌進士知淳化縣時冦氛未靖賓修城設險邑民安枕淳邑浮糧猶沿明季舊額賓哀籲上臺得疏請蠲數千石一時有更生之慶擢刑部主事去張舜舉順天籍進士綿竹人順治六年授蒲城知縣清明仁厚勇於任事先是王永強竊據蒲城及亂定城市一空舜舉招集流亡安撫備至慮兵民雜處不靖建立營房俱得安堵又請停舊逋免新荒民困獲蘇北山巨寇唐威方熾舜舉計斬之餘黨悉散邑境以寧政暇以風化為己任興賢育德士知敦行復裁定縣志捐俸刋行蔡祖庚字蓮西上元人進士順治七年任甘泉令甘泉在明季時兵疫頻仍田荒丁絶庚下車招流移革耗羡禁私沠豁荒糧禮士愛民殘疆始振康熙二十年甘泉令黃日煥復請除荒丁於是民纍永息日煥永定人順治辛丑進士後擢邳州牧王廷議翼城人順治己丑進士庚寅任清澗令時叛逆未靖大兵圍府谷人心皇皇廷議計安反側調度軍需整頓有法為政聽斷如流不事鞭朴催科不遣胥役輸納無後期者五年之間時和歲稔盜息民安臺司交章薦之擢户部主事老稚泣送於道者踵相接吳汝為霑化人順治己丑進士除麟遊令麟故小邑兵燹後户口凋殘汝為至殫力生聚教養有方至減荒地浮糧免鹽課積逋尤大有造於麟邑康熙四年入名宦祠邵伯蔭字子南閩縣人順治壬辰進士授高陵令嘗奉檄清丈田糧悉蠲浮額性精察剔蠧除姦無所容隱適渭南涇陽二令缺邑民爭赴撫軍乞邵令攝篆遂攝渭南縣事又攝篆藍田皆有惠政蘇就大交河人歲貢順治十年由教諭升藍田令歷任五載新學宫濬水道立墟市修橋梁易直子諒士民戴德為之建祠立碑王滙字彭濵儀封人順治壬辰進士十三年任安定令邑號雕敝滙下車撫綏不遺餘力詳革驛站浮費催科有方決獄無滯自奉尤儉居二年丁內艱去民立碑思之歲久碑圮復選石重勒焉范式金秀水人順治十三年由監生授宜川令宜川自前令報墾之後丁糧增舊數倍邑民流亡過半式金撫字催科心力交殫又詳請憲司備陳民力不堪狀得旨俱照舊科折正減田額四百餘頃由是民力稍完又鎮川魚河歸德三驛以宜邑民夫協辦多被勒索式金詳請定議以站銀解道民夫得免賠纍厯任十二年以老去職猶以揑報丁銀開除未盡為耿耿云李天敘安陽人拔貢順治十五年任洋縣令慈惠剛方時吳三桂駐漢中招買繁重民不堪命天敘不避利害痛哭力爭闔郡均得豁減以父憂去洋民立碑頌德駱鍾麟字挺生臨安人舉人順治十六年知盩厔縣性和易喜與士大夫相接時李顒講學里中鍾麟尊以師禮往復不倦邑城北去渭不十里鍾麟循行河畔知水勢將南侵議自覽家寨迤東開復古道衆難之不果康熙元年夏大雨渭水南溢將及城鍾麟率僚屬跽雨中為民請命願以身逐逝水久之雨漸止水亦頓減又徙而北流者數里人以為精誠所感鄭崑璧字崙輝文水人順治戊戌進士知富平縣富平故多水利崑璧因勢利導各疏支渠凡漆沮金定北溫泉諸河濵岸地悉成沃壤又編審均核里胥無得上下其手在任數年治績井井可紀羅人琮字紫蘿湖南桃源人順治辛丑進士除朝邑令剛方慈惠念切民瘼驛馬故派里民牧養又潼關衛弓兵工食私派朝邑人琮申革之河壖衝地千餘頃人琮勘實請豁額賦三千七百餘兩滇黔之變軍書旁午處置悉中機宜督臣奬其廉幹擢貴州道御史黃家鼎潁上人康熙初任咸寧知縣時冦逆未靖軍需孔亟家鼎幹濟有方兵民悉便自奉尤儉約嘗兼旬蔬食不厭會撫臣賈漢復修陜西通志家鼎延本邑陳生大經楊生生芝共成縣志八卷詳而潔簡而明允稱典則尋擢兵部主事士民遮道泣留得旨復任以勞瘁卒官吳樹聲江寧人進士任略陽令撫字催科聲績茂著略邑地當衝要時冦氛未靖樹聲設計防禦支應芻糧一以忠勤從事尋至殞身略人哀而慕之公舉祀名宦梅遇字品章南城人順治丙戌舉人康熙三年任郿令郿自明季屢經兵燹順治初設官招墾胥吏乘機揑報逋欠日積遇請於上官虛糧得減邑西北境多石田遇相度地勢於邑東南引古橫渠屈流四十里繞西北入渭由是石田盡成沃壤更設義倉建啓聖祠營文昌閣士民咸沐其德鄧永芳攸縣人順治戊戌進士康熙三年知蒲城縣徵糧斷獄以慈惠著稱蒲民咸感其德又有蒲令關琇者當辛未壬申間關輔大祲琇力行荒政全活甚衆蒲民尤德之琇河南新安人乙丑進士郭維藩奉天人廕生康熙三年任武功知縣邑當東西孔道郵政久弛每計畝責民市馬芻茭槽櫪諸費歲更不資維藩請復官馬之制民困獲蘇渭水為關中巨川邑南東皆臨渭又漆湋二水縈紆中貫民田歲多坍沒維藩曰奈何使田委洪流賦加赤子耶於是力請蠲除包賠之害始杜邑舊有王祿田如千頃多為豪強影占維藩親行勘丈尺寸無隱不致橫纍齊民在任六年擢監察御史朱尚義奉天義州人康熙五年由拔貢授安定令初安定民往石嘴驛應役守候淹久深以為苦尚義力請裁革又慮差役騷擾鄉村用木皂以代之隆冬煮粥以濟貧乏聽訟必開誠勸導有罪者蒲鞭示辱而已行取河南道御史文秉濂全州人順治丁酉舉人康熙七年知淳化甫下車即以廓清積弊為己任為政寬猛兼濟淳邑浮糧自國初蠲免後節年揑報新墾復多溢額逋賦秉濂泣訴臺使者以去就爭之事乃寢民感其德為建祠以祀之楊鑣河南舉人康熙八年任麟遊令有應變才滇黔之亂凡挽運重役極力擔荷為民籲免崛山賊嘯聚檄到縣鑣即夕定謀率鄉兵殱之以軍功升遼陽知州林逢泰晉江人舉人康熙八年由隴西令調三水釐姦剔弊志在澄清邑文廟公署久圮逢泰即捐俸修復城垣倉庫次第整理及王輔臣之變訓練鄉勇修飭城守邑賴以全至免荒糧豁逃丁及改徴折色房稅地稅諸議尤見其實心愛民云林世榕海陽人康熙己酉舉人任藍田令藍自兵燹後民多失業世榕招集流亡散給牛種由是農務大興田野大闢尤慎於讞獄情矜法疑多所全宥嘗捐資葺韓子祠以栁州祔享以栁嘗尉藍田故也解組之日圖書外無長物云陳瑹蘄水人康熙十年由舉人任臨潼知縣蒞事精敏興除有法甲寅之變徵輸如蝟瑹不事敲朴百姓急公恐後官兵駐西郊瑹布衣徒步手挈壺簞犒之民聞之芻茭器具無不立應其感孚如此擢耀州知州郭傳芳字九芝大同威逺衛人由選貢授咸寧縣佐攝郃陽長安篆俱有聲遷富平知縣滇逆之變涼寇竊發傳芳偵賊將入境乃乘霧搗巢斬獲有功時軍書旁午傳芳轉輸有法民不告勞嘗大聲語人曰為百姓即所以為朝廷聞者皆服張焜字大啓南昌人舉人授永壽縣令縣七被冦躪城舍煙蕪焜至僦居麻亭寨築城結茅民始寧宇邑故無井澗飲病渴焜披榛步尋得泉山巔疏導入城父老相傳此宋吕公大防惠民泉涸廢數百年一旦復之是歲田榖多雙穗至有六穗八穗者逆桂反莫洛經略漢中檄焜參贊軍務以勞成疾卒翟世琪字湛持益都人順治已亥進士任韓城知縣性嚴決人莫敢犯康熙十四年栁溝營遊擊李師膺以裁餉激變琪悉力撫慰勢不可制遂及二子皆遇害盧偀天門人商南知縣在任殉難康熙十七年贈陜西按察司僉事豫祭葬按商州志不載盧令姓氏楚志亦未詳殉難始末但以十七年恤典考之當係吳逆作亂時事張發辰字庚干把縣人康熙庚戌進士十八年除臨潼令禁黜科斂歲凡三千餘金時軍興旁午挽運豆米往來頻數雖年方強仕而鬚髮早衰平時聽斷明決庶政畢舉行取後念民有舊欠濵河地稅為捐貸以清之遲維城廣寧人康熙十九年任華隂令歷任五載嚴禁刁風奬拔善類創建朱子祠於華山雲臺觀之右春秋奉祀二十二年奉調各路兵馬回陜十州縣供運車輛俱集三河口值大風雪人畜凍餓有至斃者維城單騎赴關畫轉運䇿兵民兩便俞璉字商臣蕭山人令三原時值歲祲勞心撫字賑粥給貧全活甚衆又招徠流民數千户履畝勸墾不辭况瘁卒官杜俊章字芝圃扶溝人由舉人任扶風知縣慈惠廉明以維持風俗為先嘗有兄弟成訟者輒撫躬自責曰教化未及遂致鬩牆此司牧者之過也訟者尋皆悔悟和好如初湯應武直𨽻龍門人由教諭升漢隂令性不喜繁苛亦不以簡略廢公一日坐廳事民有小過當杖杖輒重謂行杖者曰彼罪當死耶忍令死汝手也立釋之民皆感泣陳昌言字禹欽山隂人知朝邑十年修舉廢墜學宫行署及村鎮社學皆次第營搆邑有大事必集衆詳議所舉行無絲毫病民遷信陽州牧邑人有去後思姚士孰字庠若桐城人歲貢由碭山教諭遷朝邑知縣教民敦行課農桑嚴賭博清理朝蒲兩邑地界植栁志之督民墾荒不避炎暑竟中疾告歸康熙五十七年祀名宦張如錦長洲人康熙壬戌進士初宰商河補長安未蒞任復調淳化精於吏治所行俱實政淳化邑志創自明隆慶間百數十年文獻無徵如錦搜羅軼事訂定成書鈕琇字玉樵吳江人拔貢康熙二十七年知白水多惠政三十一年歲大祲姦民乘機劫掠蒲城尤悍不可制臺司擇幹員署邑篆即以屬琇琇至立置蠧吏二人於法得羣盜訊實取亂首沈諸河邑中股栗解官後嘗摺扇單衣獨行蒲市中豪強見者猶斂手琇性坦易好遊覽所至輒録其風土著書名曰觚賸其秦觚則宰白水時筆也陳明經綏陽人康熙丙午舉人二十八年知咸寧值歲飢九重軫念民艱發帑出粟明經實力奉行以是雖遭歉歲民無失所三十年大蝗明經齋戒至田所祭之蝗不為災田禾無損秦中久經兵燹郡邑册籍無徵明經履畝核實兼并侵欺之弊為之一清今士民歌思不置周宣暘鄖西人進士康熙二十九年知臨潼歲祲盜起巨憝王金山嘯聚驪山西南又渭北布袋賊出沒櫟陽勢甚熾宣暘計擒之立置於法潼民以寧蔣陳錫常熟人康熙乙丑進士三十年授富平令甫至值關輔大飢流移載道陳錫立捐千金設厰煮粥以食飢者全活無算復捐資收瘞道殣又念富邑瀕河水利久弛於是躬行阡陌疏故玉帶直城文昌各渠咸享灌溉之利後歷官雲貴總督竇斯在沁氷人由教習授保安令攝靖邊同知所至有聲績康熙壬申癸酉間西醜跳梁斯在年逾七旬詣當事請自效不許乃固請或以其老卻之憤而起白髭盡張曰斯在男子也以老廢奈何當事壯之令督運斯在走塞外往還萬里口不言勞比得疾猶商榷邊事口條手畫咸中肯綮殁後貧不能殮士民賻之乃歸葬林礦字學海慈溪人康熙庚辰進士任宜君令邑當南北孔道往來厨傳盡取給於民礦大加裁捐又陋例編審丁賦豪猾率以賄免礦精心勾考酌定科則隱匿者輒摘示之民大畏服宜邑山林阻深虎狼接迹礦招集流亡樵採日廣雖擔夫牧豎不逢不若其歸也士民勒碑圖像比之召父范光曦鄞縣人拔貢康熙四十年任麟遊令為政不務虛名修文廟闢邑城南門表揚節孝禁同姓為婚及溺女者有樂户乘荒歲買良曦為除籍擇配士民誦之陜西通志卷五十三
