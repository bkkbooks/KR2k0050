body:
  text: 陜西通志巻五十三名宦四令長漢胡建字子孟河東人孝武天漢中為渭城令治甚有聲値昭帝幼皇后父上官將軍安與帝姊葢主私夫丁外人相善外人驕恣怨故京兆尹樊福使客射殺之客藏公主廬建將吏卒圍捕葢主聞之多從奴客徃犇射追吏吏散走主使僕射劾渭城令㳺徼傷主家奴建報無它坐葢主怒使人上書告建侵辱長公主射甲舍門知吏賊傷奴辟報故不窮審大將軍霍光寢其奏後光病上官氏代聽事下吏捕建建自殺吏民稱寃至今渭城立其祠漢書本傳魏相字弱翁濟陰定陶人徙平陵舉賢良以對䇿高第為茂陵令御史大夫桑𢎞羊客詐稱御史止傳丞不以時謁客怒縛丞相疑其有姦收捕案致其罪論棄客市茂陵大治漢書本傳龔勝楚人舉茂才為重泉令病去官大司空何武執金吾閻崇薦勝哀帝聞其名徵為諫大夫漢書本傳轅豐建始間為長安令治有能名擢司𨽻校尉舊志蔡勲陳留圉人平帝時為郿令王莽遣人授厭戎連帥勲仰天歎曰吾䇿名漢室死歸其正豈可事二姓哉遂攜家屬逃入深山續文獻通考韓棱字伯師潁川舞陽人為下邽令視事未周吏人愛慕時隣縣皆雹傷禾棱界獨無漢紀鄭興字少贛河南開封人建武九年左轉蓮勺令時郡縣荒殘興方欲築城郭修禮教以化之會以事免遂不復仕後漢書本傳孔僖字仲和魯人元和二年拜臨晉令崔駰以家林筮之謂為不吉止僖曰子盍辭乎僖曰學不為人仕不擇官吉凶由已而由卜乎在縣三年卒後漢書本傳楊琳為茂陵令比縣連歳蝗災曲折不入茂陵耆舊傳景毅字交堅梓潼人司徒舉治劇為高陵令立文學以禮讓化民梓潼士女志段熲字紀明武威姑臧人好古學舉孝廉為憲陵園丞陽陵令所在有能政後漢書本傳嚴遵長安令治政嚴明遷揚州刺史當遷民遮道止之凡三遷輒不得行四川通志王阜世公為重泉令吏民向化鸞止學館阜使授官掾公沙疊為張雅樂擊磬鸞乃舉足垂翅應聲而舞路史餘論王忳字少林廣漢新都人舉茂才除郿令到官至斄亭亭長曰亭有鬼數殺過客不可宿也忳即入亭止宿夜中聞有女子稱寃聲忳曰有枉狀可前求理女子曰無衣不敢進忳便投衣與之女子前訴曰妾夫為涪令之官過宿此亭亭長無狀枉殺妾家十餘口埋樓下悉盗取財貨忳問亭長姓名女子曰即今門下游徼者也忳曰當為汝理此寃勿復殺良善也因解衣於地忽然不見明旦召游徼詰問具服罪即收繫及同謀十餘人悉伏辜遣吏送其喪歸鄉里亭遂清安後漢書本傳任頵永和間郃陽令時東西羌㓂隴西掠關中殺長吏頵追擊戰死馬志曹全字景完敦煌人建寧二年舉孝廉除郎中遷右扶風槐里令遭同產弟憂棄官光和六年復舉孝廉拜郃陽令存慰高年撫育鰥寡以家錢糴米粟賜􅻏盲大女桃婓等合匕首藥神明膏與有疾者咸瘳百姓襁負及者如雲戢治牆屋市肆列陳風雨時節歳獲豐年縣前遭白茆谷水災興造城郭開南寺門承望華嶽鄉明而治廣聽事官舍廷曹廊閣費不出民役不干時門下掾王猷等刋石紀功漢郃陽令曹景完碑賈琮字孟堅東郡聊城人舉孝廉再遷為京兆令有政理迹後漢書本傳袁遺字伯業紹從兄為長安令河間張超嘗薦遺於太尉朱雋稱遺有冠世之懿幹時之量三國志本紀注魏倉慈字孝仁淮南人黃初末為長安令清約有方吏民畏而愛之三國志本傳晉杜軫字超宗成都人除池陽令為雍州十一郡最百姓生為立祠得罪者無怨言晉書本傳諸葛京亮孫隨才署吏後為郿令晉泰始起居注尚書僕射山濤啓事曰郿令諸葛京祖父亮遇漢亂分隔父子在蜀雖不達天命要為盡心所事京治郿復有稱臣以為宜以補東宫舍人以副梁益之論京位至廣州刺史三國志諸葛亮傳附張輔字世偉南陽西鄂人初補藍田令不為豪強所屈時彊弩將軍龎宗西州大姓䕶軍張浚宗婦族也僮僕放縱為百姓所患輔繩之殺其二奴又奪宗田二百餘頃以給貧户一縣稱之晉書本傳北魏宋稚字季豫敦煌人景明二年拜白水縣令在縣十一年頗得民和魏書宋繇傳常景字永昌河内人延昌初元萇為雍州刺史景除錄事㕘軍帶長安令甚有惠政民吏稱之魏書本傳北周張仁藴武帝時為醴泉令有徳政碑金石集隋房恭懿字慎言洛陽人性沈深有局量達於從政開皇初吏部尚書蘇威薦之授新豐令政為三輔之最上聞而嘉之賜物四百段恭懿以所得分給窮乏復賜米三百石恭懿又以賑貧人上聞而止之時雍州諸縣令每朔朝謁上見恭懿必呼至榻前訪以理人之術隋書本傳敬肅字𢎞儉蒲坂人開皇初為安陵令有能名北史本傳王伽河間章武人開皇末為雍令政有能名隋書本傳劉子翊彭城叢亭里人剛謇有吏幹為新豐令有能名北史本傳高世衡渤海人櫟陽令有恩惠大業之末長吏多贓汙衡清節逾勵風教大洽獄無繫囚為吏人所稱隋書魏徳深傳房彥謙字孝衞清河人大業九年監扶餘道軍隋政漸亂朝廷靡然變節彥謙直道守常介然孤立為執政者所嫉出為涇陽令未幾終於官時年六十七彥謙前後居官所得俸祿皆以周䘏親友家無餘財車服噐用務存素儉雖致屢空怡然自得嘗從容獨笑顧謂其子元齡曰人皆因祿富我獨以官貧所遺子孫在於清白耳隋書本傳唐王甫武徳初為醴泉令有善政賜帛五十段賞之冊府元龜楊徳幹萬年令高宗朝有宦官恃寵放鷂不避人禾稼徳幹杖之二十悉拔去鷂頭宦者涕泣袒背以示帝帝曰情知此漢獰何須犯他百姓世説新語郎餘慶定州新樂人為吏清而刻於法高宗時為萬年令道無拾遺累遷御史中丞唐書郎餘慶傳李嗣真字承胄趙州柏人人調露中為始平令風化大行唐書本傳薛訥絳州龍門人遷藍田令富民倪氏訟息錢於肅政臺中丞來俊臣受賕發義倉粟數十斛賞之訥曰義倉本備水旱安可私一家報上不與唐書薛仁貴傳虞獻武后時歴文昌左丞為來俊臣所陷出為西鄉令盡心邑事不以左遷介意賈志李令質萬年令有富人同行盜繫而按之駙馬韋擢䇿馬入縣救盜者令質不從擢乃譖之於中宗中宗怒臨軒召見令質奏曰臣必以韋擢與盜非親非故當以貨求耳臣豈不懼權勢但申陛下法死無所恨中宗怒解乃釋之朝列賀之曰設以獲譴流於嶺南亦為幸也大唐新語姜晦上邽人高陵令治有聲遷長安令人畏愛之唐書姜謩傳張敦江浦人自諸暨令轉重泉令民咸悦其化蒲城縣志韓遼咸陽令治興成渠渠當咸陽右十八里左直永豐倉秦漢故漕渠成起咸陽抵潼關三百里無車輓勞則轅下牛盡可耕永利秦中矣唐書李石傳韋濟鄭州陽武人開元初擢醴泉令修飭政事有治稱終馮翊太守唐書韋思謙傳崔皎長安令邠王守禮部曲數軰盜馬府縣莫敢言者皎設法擒捕羣奴潛匿王家皎命就擒之奴懼盡縊殺懸於街樹境内肅然大唐新語盧奕滑州黃門監懐慎少子天寶初為鄠令所治稱最唐書本傳薛播河中寶鼎人開元天寶間擢進士第授武功萬年令温敏而裕與人交有常李棲筠常衮崔祐甫並器之唐書本傳蔣沇萊州膠水人乾元中歴盩厔咸陽高陵令美政流行長老紀焉郭子儀軍出其縣敕麾下曰蔣沇賢令供億當有素得蔬飯足矣毋撓其清也遷長安令唐書蔣欽緒傳房武盩厔令吏民思之氏族大全人稱其幼為良子弟老為賢父兄舊志裴均河東人盩厔令蒞政寛平人被其徳馬志房啟河南人始為鳯翔府參軍尚少人吏望見咸曰真房太尉家子孫轉澄城丞益自飭理同官憚伏遷萬年令果辨敏絶賈志梁鎮昭應縣令李國楨者以術士顯廣徳初請度昭應南山作天華上宫露臺大地婆父祠并三皇道君太古天皇中古伏羲女媧等各為堂皇給百户掃除從之乃除地課工方歳饑人不堪命鎮上疏切諫以為有七不可即劾國楨等動衆則得人興工則獲利祭祀則受祚主執則市權人神胥怨災孽並至臣昨受命有所安輯陛下許以權宜今所興造臣謹以便宜悉停帝從之唐書王璵傳鄭叔敖滎陽人貞元元年授長安尉後宰澄城吏民信服訟簡役均人和歳稔民思慕之立石以識云賈志韋滌涇陽令貞元二年以滌起復饒州刺史滌理涇陽有政績故擢焉冊府元龜胡珦字潤博舉進士上第貞元十一年為奉先令以治辦遷膳部郎中馬志馮伉魏州元城人徙貫京兆第五經宏辭調長安尉三遷膳部員外於是醴泉令缺宰相高選徳宗曰前使澤潞不受幣者其人清可用也遂以授伉縣多嚚猾數犯法伉為著諭䝉書十四篇大抵勸之務農進學而教以忠孝鄉鄉授之使轉相教督居七年韋渠牟薦為給事中唐書本傳韋紳卿涇陽令破豪家水碾利民田萬餘頃馬志武元衡字伯蒼武后族曾孫舉進士累為華原令畿輔鎮軍督將皆驕横撓政元衡移疾去徳宗欽其才召拜比部員外郎唐書本傳薛珏字温如河中寶鼎人累遷乾陵臺令終歳以清白聞課第一改昭應令人請立石紀徳珏固讓唐書本傳裴寰之下邽令元和間毎歳冬以鷹犬出近畿習狩謂之外按宣徽院供奉官為其使令徒衆數百恃恩恣横郡邑皆厚禮迎犒之恣其所便止舍私邸百姓畏如冦盗每留旬月方更其所是年冬行次下邽寰之但據文供饋使處公館杜其侵擾使者歸譖寰之有慢言帝大怒將以不敬論裴度抗陳其事翼日釋之仍令視事冊府元龜王正雅字光謙幷州晉陽人擢進士累遷萬年令威震豪彊唐書王翊傳穆宗時京邑號為難理正雅抑強扶弱政甚有聲會栁公綽為京兆尹於帝前褒稱帝命以緋衣銀章就縣宣賜遷户部郎中冊府元龜劉仁師彭城人長慶間為高陵縣令有籌畫歴尹劇縣皆以能事見陟既令高陵初涇水東行注渠釃而為三以沃關中後或壅遏不行仁師同主簿譚孺直為民更水道杜私竇以成四渠民遂名渠曰劉公堰劉禹錫有碑記馬志李行言涇陽令大中八年秋九月上獵苑北遇樵夫問其縣曰涇陽人也令為誰曰李行言為政如何曰性執有強盜數人匿軍家索之竟不與盡殺之上歸帖其名於寢殿之柱十月除海州刺史入謝上賜之金紫取帖示之通鑑崔希高仁孝友悌遷馮翊令貧乏荷其仁恤時有雲氣如葢當其㕔事須臾五色錯雜遍於州郭狀聞勅編入史大唐新語李君奭醴泉令大中九年春二月上校獵城西漸入渭水見父老一二十人於村佛祠設齋上問之父老曰臣醴泉縣百姓本縣令李君奭有異政考秩已滿百姓借留詣府乞未替兼此祈佛力也上還宫於御扆上大書君奭名中書兩擬醴泉令上皆抹去之踰歳以懐州刺史闕請用人御筆曰醴泉令李君奭可懐州刺史莫測也君奭中謝宸㫖奬勵始聞其事東觀奏記李頻字徳新壽昌人擢進士第遷武功令畿民多籍神策軍吏不敢繩以法頻至神策士尚君慶逋賦六年不送悍然出入閭里頻宻擿比伍與競君慶叩縣廷質頻即械送獄盡條宿惡請於尹殺之督所負無少貸豪猾大驚屛息奉法縣大治有六門堰者廞廢百五十年方歳饑頻發官廥庸民浚渠按故道厮水溉田榖以大稔懿宗嘉之賜緋衣銀魚唐書本傳林慎思字處中莆田人歴興平尉為萬年縣令㑹黄巢䧟長安迫以偽祿不屈罵賊死賈志李康漢陰令黄巢亂僖宗廣明元年出幸興元道中無供膳康以騾負糗糧數百䭾獻之從行宫眷軍士始得食舊志張松壽為長安令時昆明池側有刼殺奉敕十日内須獲賊松壽至行刼處尋蹤緒見一老婆子樹下賣食以從騎䭾入縣供以酒食經三日還以馬送舊坐處令一腹心人看有人共婆語即以捉來須臾一人來問明府若何為推遂即被布衫籠頭送縣一問具承贓並獲時人以為神功朝野僉載宋何承裕晉天福進士為盩厔咸陽二縣令為治清而不煩民頗安焉每覽牒訴戲判以喻曲直訴者多心服引去開寶三年自涇陽令累知商州宋史趙鄰幾傳陳省華字善則閬中人累遷櫟陽令縣之鄭白渠為隣邑強族所據省華盡去壅遏水利均及民皆頼之宋史陳堯佐傳馬元方字景山濮州鄄城人淳化三年進士及第知萬年縣諸將討李繼遷關輔轉餉踰瀚海多失亡獨元方所部全十九以勞遷宋史本傳蔡黃裳字叔文晉江人大中祥符初第進士知鳯翔府虢縣郡守有親校招權受金者黃裳置之於法一府皆驚萬姓統譜張及舉進士為殿中丞祥符中出為武功令有政績喜文學及慕姚武功之為人於是刻姚武功縣居諸詩四十餘首於石馬志張龜年富平令明道二年秋七月丁丑詔知耀州富平縣事張龜年增秩再任以其治行風告天下宋史仁宗本紀种世衡字仲平洛陽人嘗知涇陽縣里胥王知謙以姦利事敗法當徙遁去北郊赦輒出世衡曰送府則會赦杖其脊而請罪於府知府李詰奏釋之通判鳯州州將王䝉正章獻后婣家也所為不法嘗干世衡以私不聽䝉正怒乃誘知謙訟寃而隂助之世衡坐流竇州龍圖學士李紘為辨其誣除鄜州判官西邊用兵守備不足世衡建言延安東北二百里有故寛州請因其廢壘而興之以當冦衝朝廷從之命董其役夏人屢出争世衡且戰且城之城成賜名清澗城遷内殿崇班知城事開營田二千頃募商賈貸以本錢使通貨嬴其利城遂富實間出行部族慰勞部長或解與所服帶嘗會客飲有得敵情來告者即以飲器與之由是屬羌皆樂為用宋史本傳世衡初至清澗城教吏民習射雖僧道婦人亦習之以銀為射的中者與之既而中者益多其銀重輕如故而的漸厚且小矣或争徭役優重亦使之射射中者得優處有過失亦使之射射中則釋之由是人人皆能射記聞吳元亨字子正歴馮翊令馮翊華隂以漆沮為境中間洲上有美田民相與争之五十餘年吏不能决元亨檄華隂令㑹境上盡按兩鄉之籍徧履其田執度以度之皆得其實自是民不敢復争司馬温公集楊緯字文叔濟州任城人以皇祐五年明經中第徙鳯州梁泉縣令教民以孝弟力田為先守史千之不知其能嘗薦其錄事㕘軍張革等數人革呼同列詣千之言梁泉循吏而公不薦革等以為愧千之踧踖曰吾過矣吾過矣因并薦之雞肋集黎公真嘉祐中甘泉知縣有仁政後去任民思之圖其像於學宫有贊其畧曰紀其本見諸竹帛傳其末覩乎丹青馬志穆衍字昌叔河内人徙河中第進士知淳化縣從韓絳宣撫陜西遇慶卒潰亂衍念母在耀亟謁歸信宿走七驛比至慶卒知衍名不敢近時諸郡捕賊兵糧糒無以給遂擅發常平倉且懼得罪衍曰饑之不恤則吾兵將為慶卒矣考課為一路最宋史本傳朱革紹聖元年為高陵令始至摧抑兼并強梁束手踰年政成境内安堵初建宣聖廟暨儒學落成之後士知向學邑民大悦馬志趙茂曾洛陽人建中靖國元年知武功崇寧元年春始至官用法平恕三年治成百姓咸服馬志劉幹汶陽人大觀四年知武功臨政不茍行已治事以身為先士民徳之賈志吳時字伸道卭州人舉進士知華州鄭縣轉運使檄州餫米五萬輸長安鄭獨當三萬時貽書使者曰會三萬斛之費以車則千五百乘以卒則五萬夫縣民可役者纔二百五十八户耳古者用師則贏糧以養兵無事則移兵以就食誠能移兵於華則前費可免華雍相去百六十里一旦欲用朝發而夕至矣使者從其言宋史本傳楊震字子發代州崞人知麟州建寧砦契丹亡將鞠䩮驅幽薊叛卒與夏人奚人圍建寧時城中守兵不滿百震與戰士約斬一級賞若干官帑竭繼以家人服珥吏士感激自奮越旬矢盡力乏城不守與子居中執中力戰没闔門俱喪詔贈武經郎諡恭毅宋史本傳孟通陽翟人為武功令以仁厚為治號得體修繕城郭官署學校不刑一人人趨事赴工唯恐不悦葢誠足感人也官至諫議大夫賈志高士徹開封人為武功令有治績遷監察御史馬志康傑權知扶風縣與金將馮宣戰宣愛而欲招之奮曰吾今也當死於陣不能降敵宣殺之宋吏彊霓傳李伸知天興縣堅守不下城陷曰吾豈使敵殺我遂自殺宋史彊霓傳李沐字公澤為三水尹興滯補弊庶務修舉奸蠧一投於前灼見情偽哀死恤刑獄無寃繫激貪勵俗稱為清白邑民思之馬志李宗大梁人舉進士為鄠簿歴岐山武功令所至有政聲後知慶陽馬志吕義山蘭谿人擢進士初為涇陽主簿遷知武功百姓親之馬志閻蒼舒太原人為城固縣令以禮義化民馬志薛可光字景孝河東人知城固縣有文學嘗率吏民拒冦興修水利民懐其徳名所築渠曰薛公渠城固縣志金梁襄字公贊絳州人大定三年進士調耀州同官主簿三遷邠州淳化令有善政金史本傳張翔字子翺淄川人大定間遷高陵令後為解鹽副使去高陵八年邑人曹璋率父老畫像構祠堂事之張建撰去思碑馬志李革字君美河津人大定二十五年進士遷韓城令同知州事納富商賂以歳課軍須配屬縣革獨不聽提刑司以為能遷河北東路轉運都勾判官金史本傳孔天監明昌間為郿令政事該博學問優長鑿渠灌溉郿人賴之賈志艾元老字長卿大興人承安間任澄城知縣寛而能斷嚴而不苛興廢脩墜百事具舉前主簿馬炳亨物故遺六女一孫甫幼咸擇配而婚之秩滿百姓為立祠記石賈志王若虚字從之藁城人擢承安二年經義進士調鄜州錄事歴管城門山二縣令皆有惠政秩滿老幼攀送數日乃得行後轉延州刺史金史本傳宋九嘉字飛卿夏津人至寧元年進士第歴藍田高陵扶風三水四縣令咸以能稱金史本傳張徳直字伯直平陽人貞祐三年進士釋褐新平簿辟藍田令秩滿父老詣行臺留再任去之日為立生祠中州集藍田張徳直清慎才敏金史王浩傳李獻甫字欽用河中人興定五年進士歴咸陽簿辟行臺令史尋辟長安令京兆行臺所在供億甚繁獻甫處之常若有餘縣民賴之以安金史本傳王浩由吏起身初辟涇陽令廉白為關輔第一時西臺檄州縣增植棗果督責嚴急民甚被擾浩獨無所問主司將坐之浩曰是縣所植已滿其數若欲增植必盜他人所有取彼置此未見其利其愛民多此類所在有善政民絲毫無所犯秦人為立生祠歳時思之初辟舉法行縣官多得人如咸寧令張天綱興平師䕫臨潼武天禎三原蕭邦傑皆清慎才敏極一時之選金史本傳元齊達勒為鄠縣達嚕噶齊莅政十二年政平訟理境内嘗產嘉禾瑞麥縣刻石為圖馬志楊朝列大定人大徳間為富平令首重民務勸課農桑諄諄以詩書古義誨諸士人愛戴之時關内多蝗獨不入富平境人以為徳政所召賈志李𢎞至大三年任汧陽知縣勤於政事杜絶私門勸課農桑導民以善賈志荆茂字仲昌覃懐人為藍田尹民有兄弟争水磑者茂化諭之皆叩頭更讓而悔賈志蒲庸字時中鄜延人為城固縣令興利除害民懐其惠為立生祠於斗山之麓馬志安圖字成之燕山人為藍田縣達嚕噶齊號令明信吏民畏服馬志聿思敬晉寧人泰定初為清澗尹先是邑民以旱災逃徙者甚衆思敬招撫復業他郡之民皆賴之舊志趙公諒臨潼人泰定初第進士為三原知縣有善政遺跡至今猶有存者官至工部尚書賈志辛榮扶風人至正間任本縣知縣為政有方勸民務本今入名宦祠鳯翔府志郭鈞字平叔至正間為郿令六事備具庶民樂業既去民立碑以紀徳馬志張玉字徳潤固始人至正中為蒲城令有文武才畧為政不事表暴不設防畛賦均訟簡時大軍縱掠民間蹂躪旁邑玉脩保伍嚴警備軍不犯境民賴以安賈志朱春至正末為三原令明兵克奉元春謂其妻曰吾當以死報國妻曰君盡忠妾豈不能盡節俱投崖死馬志明張三同南直吳縣人進士洪武初知白水草昧之初能相地宜從民便脩復城署定法令均徭賦民咸便之白水縣志嚴祀江南鳳陽人洪武初知武功臨事尚簡愛民以誠官署學校與壇壝祠廟皆所創作馬志譚衍四川人洪武二年由舉人任石泉令當國家初造招集流移勸課農桑廉明愷悌一時殘民倚為慈母祀名宦石泉縣志張著洪武三年知膚施邑民頻年避兵竄匿山谷著招諭撫循修舉廢墜民始安輯嘗有鄒二者以不孝弟聞著招諭化之二遂改為孝子馬志許訢開封人舉孝廉洪武中鄠縣知縣修㕔宇興學校撫民以惠措置得宜與正統間徐純並推賢令舊志張得先洪武中知富平時中原初定衆多艱食得先首建招福平臯頻陽永潤四鄉各社倉以贍貧乏民咸賴焉賈志陳榮祖洪武中知商縣時兵燹之餘縣治俱廢榮祖為政有方吏民畏服剏建祠宇壇壝百廢俱興西安府志李英字士竒河南祥符人舉人鳳翔府訓導立教嚴勤陞知朝邑至則樹良法剗夙弊庶政脩舉擢知乾州卒於官先是朝邑歳旱春夏不雨英齋戒禱三日而甘雨降歳大稔又黃河水至濠城幾没英築堤捍水患乃息鹹地淤為沃壤英又親詣其地為之驗冊分撥俾豪強者弗得侵焉賈志鄒宗彛洪武時任清澗令時亂初平規制未備縣治學舍皆殫力創建加惠黎庶勞心撫字邑人頌甘棠者不衰清澗縣志陳鑑四川資江人洪武中以進士知清澗時天下初定教化未行鑑勤撫字興學校民漸知禮義賢聲大起擢守霍州清澗縣志閻暠洪武末知長安時關中貧瘠暠以安養生息為己任惠愛及物化洽境内上嘉其績褒賚甚厚賈志尚英知寶雞奏本縣歳貢棉花棉布乞就本縣運赴漢州不必運布政司徒勞人力及陳倉東河等驛積草可二十餘年若將永樂九年草折鈔收支官民兩便從之馬志葉壽江南高郵人監生永樂十六年知城固時税糧久逋民鬻子不能完壽奏除浮費撫貧民逺邇戴之賈志劉綱字文紀禹州人登進士敦確有幹局初為縣得府谷政教兼舉頌聲大著三年遷寧州名山藏楊聰字彥達雄縣人舉人正綂初知三原剛果有為事無壅滯九年秩滿保留陞正六品俸仍知縣事民為立碑三原縣志國璧武邑人監生正綂初知渭南為政仁恕有方以憂去民泣送之後服闋渭民數百人赴闕奏求復任在渭九年徳政被民没世不忘賈志楊季琦交阯臨嘉人舉人正統初知澄城時聲教未融制度尚缺季琦至定法令布條約輕徭薄賦與民休息後陞延平府通判祀名宦澄城縣志張琦字鍾瀾山西安邑人正綂中舉人知高陵四年興利除害專以孝弟教人化洽境内琦天性忠廉剛正而儀貌蒼古人稱鐵臉病將死嚢無羨資丞欲啟庫取耗金以贈琦曰此豈人所為哉吾有數子耕者力田讀者力書足矣即取其管鑰并符籍付丞而卒賈志徐純字徳善澧州人正綂中知鄠縣刑清訟簡興學愛民且寛猛適宜市獄不擾鄠令前推許訢後推徐純士民愛戴頌不絶口賈志高應舉大足人正綂中以監生知富平愷悌慈祥刑省政脩多所建置至於扶弱鋤強不少假借奸豪莫不望風屏迹富平縣志張勉鉅野人正綂間由舉人知洵陽勤政愛民人盡悦服代之日百姓泣擁馬首遂家於洵洵陽縣志張璣文水人舉人正綂中知洛南廉恕公勤愛民若子九年秩滿百姓赴京保留加六品俸仍知縣事聲名甲於關西後貧不能歸里即邑居焉賈志魯玉字士潔四川涪州人正綂末知涇陽臨政廉謹深得民心保留再任前後二十餘年惠愛甚多賈志程章保定人景泰中監生任渭南知縣材幹剛果資性明敏歴九年以成績遷平定州同知邑民思之弗忘賈志葢緩舉人景泰間知白水政教兼脩不畏強禦邑人追思之祀名宦白水縣志張傑字文英臨清人舉人知高陵明法令有幹材增修學宫縣署上下以能吏稱任滿去百姓泣留賈志郭敏北直寶坻人舉人天順五年知吳堡恩加良善威震豪強脩學均役勸農賑饑民思其徳吳堡縣志王節號介菴河南太康人天順壬午舉人知盩厔縣為政外嚴内寛明法慎刑值歳歉閉糴節為立平糶法粟不騰貴民賴以安時倉廪空乏逾年積粟數千石為預備計鑿廣濟渠二十五里引水灌田若干頃更買田噐貨官牛給貧民耕種課生徒親為講解孀婦砥志者給米帛以示奬歳大旱流離入境者衆節日夜資給皆賴全活後卒於官百姓如喪慈母賈志周寧河南睢州人成化初舉人知渭南剛果明辨摘發如神事無大小迎刃而解尤善治奸宄振廢興利遷河州知州去之日百姓遮道泣留數日不得行馬志李景繁字邦泰儀封人進士成化六年知三原縣慈祥愷悌政務脩舉間至民家勞來勤苦民咸愛戴及去任民立石頌徳賈志韓睿河南陜州人舉人知白水以服闋補任鄠縣時年已六十然嚴明剛斷人無敢犯之邑中無賴子懼走匿南山不出犴狴為空祀名宦鄠縣志張俊汜縣人成化中知渭南有威惠人稱其性如烈火心如慈烏馬志撒俊字世美山西大同人貢士成化中知醴泉增築外城建立場市歴任九載剛方如一賈志王信字中孚北直順義人舉人授延川令延俗鷙獷信召其巨室戒諭不逾歳化洽俗變調知咸寧延民争擁車留之賈志婁鑑北直河間人成化間任延長令愛民如子親課農桑治壇壝修文廟嘗夜出巡聞讀書紡績聲記而賞之朔朢集諸生明倫堂親為講授考課故門下多名士政聲日著萬厯中祀名宦延長縣志陳以忠南直無錫人舉人知寶雞持身清約敷政寛平勸民無相鬭争百姓化之幾稱無訟革弊興利有百世之澤祀名宦寶雞縣志丘俊河南汝寧人舉人成化間知西鄉才猷倜儻政務精勤縣治舊在蒿坪山之陽頻罹水患俊改建於今治修金洋古堰水利永賴邑人立廟肖像祀名宦漢中府志李春北直滿城人成化間知西鄉留心國本經營有方金洋堰遭水衝圮稻田失溉春設法重脩岸堤堅固民沐其惠肖像祀之入名宦漢中府志張大綸四川成都人舉人初任扶風諭轉漢隂令時縣治未備大綸剔蠧植善樹表範俗崇廣學舍增修公署疏月河開渠堰剏縣志邑政一新後陞徽州知州民咸頌之賈志郝宗儒知商南修城池建軍營起集場興學校作士風民思不置馬志趙信平陽人成化丁酉以藍田令調任山陽閱歴險阻收拾獷悍士民懐之祀名宦山陽縣志楊隆大名人成化戊戌任山陽令時新集之衆頗難調度隆撫之以寛施之以恩講禮義明法令正名分期年上下交孚城池衙署學廟以次肇舉諸廢俱興百姓子來雖勞不怨後慕其遺愛請祀之山陽縣志崔珣東阿人成化中知蒲城廉明有威時關中大饑人相食蒲境内獨攘竊屏跡以誣去民甚惜之馬志陳潤山東泗水人知武功有幹才成化中歳大饑民相食流移者十六七潤集父老豪傑垂涕告諭發倉以賑士民賴以活命萬計且治盜有法奸跡屏絶武功縣志劉志河内人成化間除武功知縣凡所施行務存長者民服其教嘗值歳旱聞太白靈湫身徃禱之雨隨至百姓懽迎道左以萬計見雨來争以雨具授公公麾去曰此神貺我民者我何可䙝九年致仕老幼婦子扳號者不可勝數懐慶府志楊豫字素定北直清苑人舉人成化中知三水仁厚明敏值縣治新設累歳凶荒賑濟有方風俗丕變祀名宦三水縣志馬宗仁字本元北直新樂人恩貢知三水創修城垣門堞增修署舍法度森嚴賈志張悌山西岢嵐人成化中知中部縣性嚴重誠心愛民任九載始終一節歳大歉人相食悌賑救有方盜賊屏息陞寧州知州民皆號泣不忍其去賈志劉潔山西沁源人成化中知中部性慈仁有大畧興滯補弊遷廟學衙署廣積倉儲遇凶年活民甚衆賈志張鶴修武人舉人知郃陽成化乙巳歳大祲鶴悉心賑救捐俸以助不給多所全活郃陽縣志楊輝山東曹州人監生成化末知興平值歳凶總攝五縣事嚴明剛斷人不敢犯馬志王翼遼東人成化末知武功政尚寛易尊禮士夫焦上村逆旅主人陰殺旅人匿其貨置屍遍數井翼悉發治之時以為能賈志暢亨山西河津人進士任監察御史𢎞治初左遷涇陽令剛方明决未期年邑中大治開渠治水民尤賴之賈志宋學通字文淵湖廣永州人𢎞治初武功知縣性狷潔言笑不茍謹飭奉法嘗曰政在去其所害興其所利他皆細故毋足校也有貴勢受賂囑脱罪人者學通弗聽曰上負邦典下負無辜如鬼神何竟論去居九年以誣罷賈志何亮山東登州衞人湖廣進士𢎞治中咸寧知縣平易近人清白自愛縣俗婚姻尚財亮諭以禮士民負弗娶者與之娶貧弗塟者與之塟風俗為變擢給事中咸寧縣志朱璜字敷威山西陽曲人𢎞治中舉人知高陵剛方有為能鋤強暴以綏良善刁猾逺遁㕔署肅清仕至平凉苑馬寺丞賈志文昭字孔明垣曲人𢎞治中由舉人宰鄠縣勸農桑慎刑罰靖盜賊崇學校在任八載去官鄠人思之不置文氏世譜昭宰鄠徳政感孚數產嘉榖山西通志縣鋪舊在大門内昭移置東郭外改為養濟院孤寡咸被其惠鄠縣志張億知鄠縣常夜出微行民間婦姑紡績姑遣婦視所釀酒婦視之荅曰有如張縣君徹底清矣馬志蕭選字廷舉三河人𢎞治己未進士初尹盩厔摘發幽伏人以包孝肅稱之為立生祠因與巨璫抗禮左遷畿輔志左按鳯翔府志正徳七年選以都御史遷郿令非自盩厔令左遷也楊同字一仁河南新鄭人舉人𢎞治中知渭南外寛内嚴不形喜怒崇禮布教平獄省刑居九年始終不易比計典註以疾尚書見同貌顧謂郡司曰魁傑如此何以言疾郡司愕無以對同應曰同實疾郡司弗欺也尚書遲疑久之辭益懇乃聽致仕賈志李良字從善河南固始人𢎞治中以舉人為富平令擔當任事大有賢聲所建倉厫學舍醫學隂陽學修永興橋有視官如家之意富平縣志韓震山西人𢎞治時知安塞勞心撫字加意斯文城北逼大河暴水城壊震抗疏請命殫力修築水患以平民立碑紀之延安府志王溥北直遷安人𢎞治間舉人知安定縣政治公平牧民如子陞知寧羌州士民送者擁道不得行號泣而别馬志丁瑄山西岢嵐人舉人𢎞治間知寶雞鞫訊如神獄無繫囚公署圮壊無不營建後擢知潁州馬志許莊北直欒城人進士𢎞治間寶雞知縣博學有才以經義飾吏事民被其惠為建碑記徳官至㕘政賈志胡僎四川南溪人舉人𢎞治間知麟遊縣鳳翔府志遇事有為臨民不茍輕徭薄賦吏民愛之尤加意斯文改建文廟内植柏千餘株邑士人立石頌徳歴陞太僕寺丞賈志以按鳳翔府志岐山縣令無胡僎題名應麟遊為是賈志作岐山者恐誤蔣昺山東邱縣人進士𢎞治中以御史左遷洵陽令洵初設制度未舉者尚多昺勤於修葺廣儲務積興學育才愛民禮士其時年榖數登瑞應逓見尋陞山西按察司僉事洵人思之立望侯石於學宫洵陽縣志秦安麻城人舉人知洛南公廉勤慎平易近民俗尚告訐勸懲得宜民咸服之歴任五年致仕去民為立去思碑賈志劉玉大同人監生𢎞治間知郃陽性明敏善折獄事至剖决如流人無遁情同州志徐政濱州人舉人𢎞治中知澄城明敏莊毅處事皆有紀律教民植桑棗勤耕織暇則親歴原野凡坡陂畛隰率民修理夜則巡視街坊民之勤織業者旦即以所業勞之案無留牘獄無宿囚後歴陞山西僉事致仕歸值流賊陷濱州表其門曰此清吏也秋毫無所犯澄城縣志陳紀岳池人舉人𢎞治中白水知縣沖淡無欲剛方有為搏擊豪強政令嚴肅以才優調長安祀名宦白水縣志張含光西華人知武功清和鎮靜一毫不取於民時有盜警與民守之笑談自若城賴保全陞太原府同知武功縣志相邦教字蓮石山西安邑人𢎞治中知武功精明嚴毅不避權貴清賦役緩催科調停驛站設立學規綽有美政陞正定府通判祀名宦武功縣志任義四川人進士前庶吉士陞御史以言事左遷中部令文學高邁掄選才俊親為講授每夜必出巡聞讀書紡績記而賞之故門下多名士廉能有守政績最著賈志李信雙流人初授咸寧令調清澗興學校課農桑均徭役節租賦視官事若家事二年間時和年豐訟簡盜息教化大行後移疾去賈志程啓充嘉定人進士正徳初仕三原才敏識優妖人李午以術惑衆將舉兵充以微罪繫其黨午懼迯之洛川境内肅清擢監察御史賈志侯璽山西長子人舉人正徳初任白水以才堪治劇調澄城惡衣菲食教民種植桑棗課士勤篤學業人始畏而終慕之擢知商州澄城縣志劉紹字繼芳濮州人正徳初武功知縣端謹誠篤時蜀漢有警西征將士供億不可勝計他縣皆先期飭備人不堪命及至反多弗稱紹待其至始徐為之民不勞而具備尋以病告歸賈志丁珣大寧人監生正徳四年任漢隂令值流賊猖獗人心畏懼珣築城鑿池措置軍餉嚴為捍禦民獲保全舊志俞鼎洛陽人正徳五年知鎮安重建廟學築濬城池捕盜有方賊皆解散開墾山田地無遺利設立集場招商便民鎮民有甘棠之愛鎮安縣志張鍰北直滄州人正徳五年蒲城知縣邑習刁悍鍰盡反前政士民懾服修築城塹遷代州知州賈志張琴繁峙人正徳八年以選貢任紫陽令創立縣治營建廟學招商撫民功績最多有去思碑紫陽縣志劉一中山西蒲州人正徳九年由進士任澄城令賞明刑當有文武材喜治兵事澄城舊苦盜後畏一中屏息不敢發韓邦靖撰嘉禾碑記王秀字士英萊陽人正徳中進士除長安令至則延見父老問民疾苦一切以惠養為首務胥𨽻不得輕出入豪右不敢私謁先是賦税多逋秀為著令遂無敢後者獄訟久滯出片言立折之學宫圮及縣治燬皆以次修復而民忘其勞後拜監察御史賈志程鵬解州人進士正徳中知鄠縣和厚坦易居常無怒即怒亦未嘗過用威刑人以此徳之方聽訟頃有欲平者聽之歴遷知鄧州刑部郎中馬志王鑑北直霸州人舉人正徳中知渭南亢爽機辯有精力幹才振刷荒廢樹徳立威令行禁止吏民畏服一時稱能令焉馬志楊玳字文瑞太原人以監生官長安簿安定丞正徳十三年為縣令遇事風生剖决如流長於吏事廟學大工俱賴告竣富平縣志孫璽字廷信代州人舉於鄉令扶風賊至都御史藍章欲城畧陽謂畧陽知縣嚴順懦檄璽徃城之璽至順恥之甚邑人賂璽金求無城璽不聽始城三面賊卒至順曰城不可守矣曷亡璽又不聽順故令也城中人聞之譁欲亡璽抽佩刀砍坐杌曰敢言亡者如杌乃率城中人守之閲三日會賊執告急人殺之發公移知城中窘悉衆環攻自辰至晡順奔賊䧟城入執璽璽罵賊怒臠殺之大掠三日去順還報曰與扶風知縣同奔而溺水蕩扶風知縣尸都御史怒求屍順大窘與簿謀取江濱一屍棺還其鄉其家人啓視之多髯而碩體非璽也乃走京師投匭辨事下御史王廷相乃得實奏上制贈光祿寺卿廕子國生名山藏賈鉞山西石州人正徳間知汧陽縣操守清堅處事明敏以本境盜起赴難死賈志陳言諫四川内江人舉人正徳間知褒城縣果斷明允政無留滯暇為書生講解書義誅鋤土豪境内獲安賈志宋鋭山西臨縣人例貢知洋縣時藍鄢警擾羽檄旁午外給軍餉内撫民心邑賴以安漢中府志張綸陽城人舉人知石泉正徳間流賊為亂綸令子率軍民晝夜守城且請援兵賊遂遁去黎庶獲安民咸懐之馬志趙琮瀘州人知洛南舊柳林鋪路臨河夏秋水漲不便行人乃改於北高平地至今便之各行署并縣治門㕔狹隘且圮咸增修改觀昔演武無所為易地二十畆建㕔置垣築臺軍容以整馬志王道字純甫陵川人舉人朝邑知縣正徳戊寅大陽諸里民田圮於河幾萬餘畆道請於當事以糧折布又言朝邑為山陜要衝與蒲華等獨無驛所民不勝勞由是以郃陽朝邑恊濟民稍息焉賈志張綸黃縣人貢生正徳間知郃陽剛正有為㑹流賊陷洛川警報甚急鄰邑皆為避兵計綸獨矢死守備邑賴安堵同州志李豸山西陽城人進士正徳時知郃陽性狷介能治劇邑有豪横害人官莫敢問豸擒之邑謠曰郃陽縣虎為患天降豸除虎害賈志韓齊山東青城人舉人澄城知縣時妖賊李午擁衆陷洛川脅縣令妻子殺之屯兵彭衙漸逼澄城居民奔命齊告援於潼關兵憲張禴卒獲撲滅澄人徳之祀延恩祠澄城縣志李簡江西安仁人舉人知韓城潔已愛民好士九載保陞同知俸仍管縣事以守制去民稱頌之馬志郁琛北直清苑人舉人正徳末知洛川縣搏擊豪強禮士愛民邑人畏而愛之祀名宦洛川志孟邦直河南祥符人舉人正徳末知永壽廉介持已勤敏幹治振作士類裁革冗役歴四年卒於官士民流涕馬志王時雍垣曲人正徳丙子舉人授山陽知縣廉以律己仁以愛民歴華隂知縣門無私謁訟不淹滯倉庫有儲緩急有備終西安同知山西通志王科河南涉縣人進士嘉靖初任藍田知縣甫下車見縣治諸凡陋隘即圖改作先勸課農桑作興學校扶弱鋤強風俗丕變始請之當道多方建修凡城郭官署廟學規模煥然視舊制增十之五六後入名宦藍民歳時致祭懐思不絶賈志楊時泰號恒南正定人進士嘉靖初知富平勁節清修風裁凛凛邑田不井泰教民作桔橰更疏渠之淤者溉之歳不能災又發倉廪以賑貧窘期年之間邑稱大治富平縣志胡山富順人舉人嘉靖初以舉人令白水大有設施遇盤錯輒身任之調富平令時巨冦劉朝臣同大小馬暨遊俠者武斷縱横閭閻側目山首捕之置諸重典又法繩豪右四野肅然創經閣繕學宫增修新舊號舍邑中多士賴其作興富平縣志袁勲山東章丘人貢士嘉靖初同官知縣有才畧令在必行諸事立辦盜賊屏跡以能調渭南賈志曹崇樸山東冠縣人知武功沈潛渾厚接士大夫有禮均丈地糧矢公矢慎不失原額嘉靖甲申冬有巨盜刦岐陽崇樸廉捕之盜通衙蠧持有府檄府恐以此為累因托鄰縣尹徐求益於崇樸葢欲易其案以脱諸盜崇樸拒不與未幾徐陞本道監司遂被譖調東明賈志陳沂慶符人舉人嘉靖八年知延川廉謹仁恕不尚威嚴歳祲發廪賑貸全活者衆賈志嚴霜臨縣人嘉靖八年知褒城性温和儉約以儲蓄為急遇雨暘祈禱如響終始以亷潔稱褒城縣志楊博字惟約蒲州人嘉靖八年進士授盩厔知縣調長安為政精廉盩厔有劇盜博督土兵犁其穴在長安留心賑饑存活甚衆時博父瞻亦為扶風知縣父子並有惠政名山藏瞻字叔後以舉人授扶風令勸課農桑若家人父子去後民追思之城市鄉鎮俱為立祠扶風縣志宋大本直𨽻新城人舉人嘉靖十年知延川愷悌及人忠誠任事革羨餘剔弊竇一切興除事宜悉綜理無遺年饑為煮粥貸粟設法救荒饑民賴全活者數百人陞山西道御史賈志趙允亨字伯通北直安肅人嘉靖壬辰進士任長安令勤恤民隠三年道不拾遺教化大行有三異之謠奏績去士民為立石識之長安縣志冀鍊字純夫山東益都人嘉靖間進士長安知縣宅心端亮飭躬清謹愛民禮士綽有善績以治行冠三輔賈志蘇民牧字乃徯山西高平人嘉靖進士長安知縣慨然以民之父母自任寛刑罰薄征歛精明剛斷彰善懲惡吏畏民懐三載擢户部主事賈志齊宗道字叔魯遼左人嘉靖進士知咸寧才中肯綮力任繁劇威惠並著後以統領民兵為總督何棟所知累薦歴官巡撫大同右副都御史賈志馬佩字服玉山東徳州人嘉靖辛丑進士咸寧知縣明敏剛介潔已愛民省里甲清賦税抑強扶弱期月政成在縣六年考績為天下最賈志董汝漢字昭夫山西萬泉人嘉靖乙丑進士知咸寧邑衝民貧汝漢明政刑興教化税糧一清訟獄頓息且冰操凛凛不讓前人咸寧縣志李時芬北直安州人舉人嘉靖中任咸陽令政平訟理造士興學剏建尊經閣敬一亭四箴亭季考及朔朢臨學講書歳無一廢士民愛戴咸陽縣志周欽山西長治人監生嘉靖中咸陽知縣嚴而不煩莅咸五年均田丈地甚公民永賴之賈志李裔芳字崇徳山西陽城人舉人為臨潼令天性明達事無留滯一切官廨祠宇多所修葺擢知眉州去任士民思之言政事之善者必曰李南峰南峰裔芳别號臨潼志許汝登四川合縣人舉人嘉靖間臨潼知縣精明簡約政先徳化百姓愛之徃時糧多逋負登設法催徵不事鞭朴民争先輸納賈志范岡北直邯鄲人歳貢嘉靖間臨潼知縣為政寛猛相濟遇歳大祲賑救饑餒招撫流移全活甚衆賈志李翰字憲夫山西汾州人舉人嘉靖間高陵知縣存心平易遇事鍊達關中地震人民死者過半盜賊蜂起翰立法甚嚴間懲渠魁警衆盜息民安賈志馬呈圖四川内江人知鄠縣諳於治體調停均節動中機宜申免灞河役夫節省里中冗費民沐其澤陞御史鄠縣志韓瓚山西絳州人由教諭陞藍田令勤政愛民清操自勵人有以利凂者輒耳頰俱赤凡所行惟恐不便於民祀名宦賈志梁一道山西稷山人舉人藍田知縣孝以事親慈以字民嘗聽民訟置刑間有子願以身代者遂免之更奬勵焉百姓感之皆知行孝且毁淫詞崇正誼聞善讀書者輒躬詣其所以行嘉賞一時學校大興當道屢有薦剡後以疾卒民立祠於南關尸祝之藍田縣志張洗山東鄒縣人監生藍田知縣廉介自持雖一蔬不私取於民㑹審編差徭晝夜計算調停甚均即老胥猾吏莫能售其奸解綬之日琴劍而歸藍田縣志吕好古山西平定州人嘉靖間以孝廉任藍田令守如冰蘖悉民利病聽訟不事刑威得情則哀矜不已至於懲強抑暴復不少恕去之日百姓肖像尸祝焉賈志李春芳字元實山西沁水人由進士任盩厔令資性明爽能發奸摘伏值荒歳勸富人貸貧民種且為之營度計長久行取兵科給事中盩厔縣志何起鳴字應岐四川内江人由進士為盩厔令作集賢書院錄士之才者教之豐其廪餼又發奸摘伏若神境有偷盜株連數十人起鳴盡釋之獨杖殺盜者餘聽自新計畆均糧役無輕重歴三年民安盜息盩厔縣志李希雒字宗程太原人進士倜儻有大畧初令昌黎嘉靖中關中地大震獨渭尤烈遂移希雒知渭南至則吊僵仆恤孤煢省刑罰蠲逋負已而葺築城舍經始有方民不知勞又以田賦太重上記諸司力捐漢中暫借輕折鉅萬尋拜吏科給事中渭南縣志梁沂字企南臨潁人舉人嘉靖間渭南知縣有俊逸才政尚平易處事嚴整好賢下士暇即置酒吟詩若不知有簿書者吏畏民懐然性剛直是非曲直絲毫無所屈撓於是貴介枘鑿終以流言罷賈志高義葉縣人舉人嘉靖中為富平令外柔順内剛明尊禮師儒撫恤瘡痍有良吏風富平縣志劉煦霍州人舉人嘉靖間任富平令政尚慈惠聽訟得情催科不擾而人亦不敢欺洪水里積年逋賦至是始及額焉賈志崔舉唐山人舉人嘉靖中知富平古朴有道措置一出至誠均田覈地革里甲日支然恥為脂韋卒中萋斐去君子傷之賈志武鎮華字維揚山西石州人舉人嘉靖中任醴泉令治行有三善易馬站斷徑路通直轄皆不世之利官民至今賴之醴泉縣志韓弼字良佑蒲城人歳貢嘉靖間任安塞令愛民如子親課農桑治壇壝修文廟以邑城逼邊土基難久遂鳩工改築砌石十三層垜口磚甃儼然金湯祀名宦安塞縣志唐理河間人舉人知保安遇荒歳民有饑餓逃移者煮粥以救又延醫治瘟疫全活甚衆有死無棺者捐俸給之建時雨書院民不知學立社以教之卒於官百姓號泣如失慈母賈志張倫澤州人知宜川歴任未半載直指薦調蒲城民赴京奏保復留宜川愈加清慎勸課農桑興利除害政績卓異為當時最賈志張旭陽清源人嘉靖中任延長令愷悌及人忠誠任事延長舊土城歳久傾圮時北邊猖獗巡道方逺宜檄令修城旭陽率民修築易土以石是秋果入冦他方被殘延獨宴然邑人立碑頌徳延長縣志王命字將之安邑人嘉靖中知郿縣純厚耿介視民如子捐俸賑饑全活甚衆祀名宦鳯翔府志周鳯仁壽人嘉靖中以監生知郿縣才幹自喜不畏彊禦時有豪暴為閭里患鳯設方鋤治一時警若迅雷大計以罷軟論鳯聞之笑曰我豈罷軟者其司衡者之瞶且聾乎賈志楊守正良鄉人監生嘉靖中知城固廉介自矢新學校勸農桑雨暘應祈歳時豐稔賈志范時修成都人舉人嘉靖中知城固清廉愛民力勤堰務造祭噐於學宫建農亭於郊野漢中府志郭嘉文四川大足人嘉靖中鄉薦授盩厔教諭以身飭教遷白河知縣以徳化民未幾告休民泣不忍别四川志楊國卿河南考城人知石泉平易近民郡例送茶道路艱阻國卿酌從洋縣水路運送民力以紓賈志姚潤通州人舉人知雒南虛心勤政約己惠民凡上有所索皆不與曰吾不忍困民以媚人賈志楊應儒山東歴城人舉人知雒南單車莅任清操卓然禁止強悍慈惠窮簷又捐俸葺學課士人咸感之賈志郜相字立之山西澤州人舉人嘉靖間朝邑知縣㢘謹自持政平訟理役均盜息特建忠臣高翔劉烈女祠號知大體賈志任希祖字元孝四川蒼溪人進士嘉靖中知朝邑慈祥愷悌蕩滌煩苛建白塜鎮堡城至今為利賈志郭三仁字商賢山西蒲州人舉人嘉靖時知朝邑朝蒲壤接三仁渡河而西誓不受私謁有道士以縣田投獻蒲藩者藩宗利之三仁委曲斡旋竟以田還民陞葭州知州同州志王納䇿山東淄川人選貢任郃陽知縣為人果毅事無巨細區畫可垂久逺上官有橫索者正色以拒遂隂中之去郃邑士民談輒泣下賈志徐效賢字宗義四川江津人舉人嘉靖中知澄城勤恤民隠訪求利病簡催科息鬭訟興學校修武備有古循吏風時人有今鄭宛如古鄭後徐又似前徐之謠歴任四年卒於官祀名宦澄城縣志鄭光溥字伯公山東益都人進士嘉靖時以御史左遷澄城令文章政事皆可師法視篆未二年新縣治興學校具有成績擢知華州士民泣送如失慈母澄城縣志姒鼎字伯謙山西蒲州人舉人嘉靖間韓城知縣時吏胥多不檢鼎至則約束如濕薪兩造聽讞𨽻人不敢索一錢吏終歳食數斗粟抱文案趨承而已里甲飼馬外無别供上官遣胥役至韓則日給三飯飯之外不得竊逞役人轉相告後遂絶跡於韓韓人以姒青天呼之賈志何祥字子修四川内江人舉人華隂知縣地狹而壤衝公車絡繹歳無虚日小民疲於供億里胥滋弊祥洞察民瘼裁抑浮冗剔蠧裕民乙卯關中地震華山諸峪水北豬沃野祥冐暑疏渠築堰踰年工竣民大賴之學宫傾圮捐俸增構民不知費士獲肄業華州南為商洛子午道華陽川抵秦嶺中塗二十里屬華隂地使節經過供帳煩費檄請兩臺俾華州洛南分任竟獲免役陞襄陽府同知賈志楊仲瓊字子石洪洞人進士任蒲城令存心誠慤設法完逋負絲毫不染至營學繕城不事笞箠而士民樂其成歴三載陞户部員外賈志彭好古夏邑人舉人嘉靖四十五年知同官縣省事愛民清操絶俗不以家累自隨後卒於官囊無餘金邑人共治棺辦殮立祠祀之舊志亢慶鴻山西崞縣人貢士嘉靖中知同官建奎光樓修濟陽永寧諸寨為縣防守計甚宻莅政日久得民甚深賈志石叙山西渾源州人歳貢嘉靖間任白水令長厚端方布政和順歳大饑民多流散叙集父老開誠撫綏民皆感泣復聚為之請賑多所全活賈志劉相字元夫河南河内人知武功適均丈地糧相下令首田無敢隠者總括每畆僅得糧二升半邑人感之陞知綏徳州武功縣志楊永錫山東安東衛人舉人嘉靖中三水知縣倜儻不羣邑人巨奸大猾重置之法歳餘豪右帖服畏如神明賈志劉儀字來鳯湖廣安陸人舉人嘉靖間任三水令處官清約為政安静恩及黎庶威服豪強廟學公署多所建修繼楊豫之後一人而已三水縣志侯臣字世勲山西解州人監生嘉靖間三水知縣莅政公勤修舉廢墜創修石門巡檢司并預備倉厫二所調知中部為政務順民心舊諸税並征臣循次催徵不刑一人而税集善惡各有籍記擇其尤者榜於門民風丕變以憂去民垂泣攀留至今思之賈志志按解州無兩侯臣賈志誤列二傳故合之郭儒山西祁縣人舉人嘉靖間淳化知縣節省里甲調停徭役修文廟學舍及城堡墩臺不傷民財躬自儉約布衣蔬食去之日行李蕭然祀名宦淳化縣志王一賢四川南部人由舉人任洛川令催科酌定三限人服其信建二城樓規制宏達朔朢進諸生立程講學日夕不倦士林咸頌徳化洛川縣志石孟曜北直寧晉人嘉靖中知中部屬年饑後多方撫恤教民崇樸質尚禮讓矜宥疑獄保全善類賈志張仁覆字子旻邢臺人舉人任米脂令政治為諸邑最監互市者四總理貨物出入稽察嚴明隨機應變處分得體績奏特䝉厚賞時期大用未幾卒時人惜之賈志阮孝湖廣麻城人嘉靖中授清澗令甫下車念凋瘵遺民弗克供課加意愛養民感之争先輸納更招撫流移生聚日衆官舍倉庾皆為修葺賈志岳玉息縣人嘉靖中清澗知縣初清澗𨽻綏徳文移徃來北至州南至府置郵煩苦且稽延時日玉建議改𨽻府報可上下便之舊志崔士偉山東武安人舉人隆慶二年知三水謙冲自牧下車初即以利病訪諸紳士得其可者施行之嘗以均地糧為己任事將竣以艱去三水縣志薛綸字汝為天津衞人隆慶戊辰進士長安知縣以邑衝民貧為請於上裒鄰邑之簡僻而力有餘者濟之民得稍蘇㑹均田綸躬歴丘畆相田高下親自註記吏莫能上下其手邑稱平焉又念狡民匿投勢豪夤緣為利乃執投獻者數輩罪之無敢復踵故習張良弼等十一人誣陷大辟十餘年綸察其寃悉為伸理徵兵部主事官至陜西按察司副使賈志聶武字仁卿當陽人隆慶丁卯領鄉薦除陜西富平縣莅政精嚴發摘如神有僧匿民婦歴年無問者武廉得狀置之法立焚其寺一邑稱神君焉湖廣志李梓綿州人舉人隆慶六年知南鄭縣舊因山冦嘯聚當道者暫移金寧城洋褒沔之差於南鄭冦久平而差不返民甚苦之梓至即酌重役均徭賦民始解倒懸而釋重負立有安民碑賈志師祥字履卿安邑人進士隆慶中渭南知縣文雅英慧㬭然不滓臨民如保赤子會水旱為災畢力請蠲民獲實惠督撫與茶使者争奏茶馬事宜不恊直指奉簡命檄祥勘驗祥平心體察國法民情兩得其便三年徵為御史渭南縣志徐旭富順人貢士隆慶時知雒南好士恤民時白花嶺礦徒猖獗躬討之為賊所圍百姓俱棄家奔救其得民心如此雒南縣志史燦字鶴汀開州人舉人隆慶末知富平沈毅有逺畧愛善良以徳制強橫以法百姓畏而戴之縣有總里日醵金候尹措用燦悉除去民甚徳之賈志傅好禮北直固安人萬厯初以進士任涇陽令愛民禮士有古循吏風更葺官署學宫一時改觀延邑人魏恭襄作縣志陞工部主事民立祠祀之又蕭汝芳字豐源遼東鐵嶺衞人萬厯間以進士任涇陽令剛直有風裁又甯之翰字林閣山西聞喜人萬厯間以進士任涇陽令精察勤敏兼有子惠聲皆與好禮同祠焉涇陽縣志楊守川號濬源絳州人舉人萬厯初富平知縣動履謹飭不妄交與縣北山產石諸郡縣採者令民代運歳費數千金守川申白均𣲖民力為蘇賈志劉兌字景澤新安人舉人萬厯初知富平倡修邑志廣開渠道至今水利永賴賈志姚繼先字子敬成都人萬厯初以西鄉諭遷知郿縣隨俗為治善收人心告諭百姓若家人父子嘗夜出微行察民所為詰旦則誦讀者繼膏紡絍者給絮為非者各以輕重受法民出不意踴躍勸戒在任三年調靈臺賈志霍文玉武岡人萬厯初以明經授清澗令罷不急之務節無益之費與民休息有關政體民生者悉為舉行一切廢弛皆加修葺崇臺門闢道路酌山城扼要處可以避冦者徙民居之且清操有素始終一節賈志陳惟芝河南孟津人萬厯庚辰進士知洛川户口寥寥惟芝辟蒿萊集流氓均田寛賦裕常平立義學養教漸興㑹回冦雒邑嚴飭武備躬率鄉勇禦諸境上緝擒十八人回悔罪求解乃釋去後又蹂躪旁邑雒卒無患擢御史賈志王光祖字孝標南陽人舉人萬厯十七年授安定令建敬學書院著訓士編修縣志留心民瘼大有功於安定祀名宦安定縣志李字把縣人舉人萬厯十八年知漢隂持身廉潔嚬笑不茍申罷站役改折站銀凡可為民請命者極力行之有去思碑賈志劉字柘山莒州人知鄠縣萬厯乙巳冬至任是歳鄠自四月至七月不雨長吏遍走禱雨萬衆嗷嗷至承施粥之檄自輸粟五百為之倡於是義民王輔世等輸粟一千二百有竒民得全活先是回回倡亂盩厔之白龍溝鄠之龎家村聲勢相應窟穴其中前令捕沙倉等十一人寘於法而探囊穿窬之輩尚多為連環保甲法申嚴保伍每保壯丁二十人教師一人每月三日教習餘日歸農復舉社學教民間子弟又以社倉一事原額五千六百有竒内榖麥兼備貯榖猶易貯麥為難循行區畫常廢寢食刋為條例不期年犁然修舉又以鄠田沮洳額浮咸陽者一之四浮咸長者一之二欲亟正之而未及莅任五載擢監察御史賈志沈琦字仲玉吳江人萬歴二十三年乙未進士補高陵令踰月移三原時縣民黠猾難治或勸以宜震懾琦曰三尺固甚具也奈何以民命立吾名視事惟教喻風曉以徳意煦濡之境内無事三原縣志張應徵字元聘萬厯乙未進士授三原令時縣𨽻結郭西黠民為奸應徵至罪其首惡黨即解散未浹旬才望大著寮寀見憚性儉朴治事三載案無累牘農有餘積以課最遷南比部去三原縣志王正志字淑明河南祥符人萬厯二十六年戊戌進士授富平令㑹礦税役興中使乗傳四出為虐闗中中使梁永殘暴尤甚富平亡賴子弟及富民怨家多附永煽嚇富民強奪財產榜笞熱剌發屋椎埋百姓至不能保朝夕正志捕部民從永為奸者收治之姦民亦隂持縣事以求中永怒正志乃具疏列永貪虐狀永亦誣奏正志阻撓礦税有㫖逮械至京繫北寺獄三年卒祥符縣志戴章甫號以吾銅梁人舉人萬厯二十七年任韓城令鍊達明敏不多科贖凡所營建皆可久其催徵不擾尤為邑人所徳賈志李芳春字元馨山東昌樂人萬歴庚子舉於鄉歴郃陽令以廉惠著聲相國韓城薛國觀過其地供應甚簡畧薛異之及見乃驚曰古貌古心欲擢之㑹丁外艱遂寢昌樂縣志楊鶴字修齡武陵人萬厯甲辰進士知雒南才猷磊落下車除強暴陳礦病嚴詭糧善政大行雒人有畏壘之祝歴官總督賈志鶴初任雒南令以礦金抗中使除土豪首忤魏璫劾梁永以私陷咸寧令滿朝薦之奸湖廣通志宋時隆咸陽知縣萬厯三十四年税監梁永檄時隆取羢氊千五百時隆不予遂誣時隆刦税逮下獄閣臣揭沮不報紀事本末王邦才萬厯三十五年藍田知縣發奸剔蠧與税監梁永相左為永誣逮紀事本末滿朝薦字汝揚湖廣麻陽人萬厯中進士授咸寧令下車首詢利病扶弱抑強均賦役裁羨餘勾攝不擾訟牒紛沓一訊立決有從税使梁永附益者次第擒捕下之獄羣惡弗便以阻撓誣奏調廣西布政司都事束裝出關兩臺交章留之詔復職朝薦益厲志除奸是時多有大盜投永為爪牙朝薦捕治甚急盜欲假進貢潛出關朝薦遣人追捕之永使殺盜以滅口誣奏朝薦刦貢殺人上怒命逮赴對詔至士民哭聲遍巷市欲剚刃永腹朝薦百方省諭始解臨行送者萬人有裹糧䕶送至都門者既返乃相與建生祠祀於東門外長亭之左後歴官太僕寺卿咸寧縣志萬厯三十五年税監梁永誣奏朝薦承御史意伏兵渭南刦貢上怒命逮朝薦廷臣論救不聽時緹騎至灞上宗室士民毋慮數萬人圍永署朝薦間道始就檻車紀事本末許興學山東人舉人知咸陽平易近民聽訟不以言折必得其情乃止人視之如慈母尊師焉賈志王家瑞廣平人進士知咸陽愷悌愛民端方持己力阻開礦之害不畏權焰咸民感恩立祀賈志馬民牧號心棠直𨽻南和人舉人萬厯中知臨潼政善拊循御百姓如家人父子有情必盡時采金内使首事臨潼聲勢赫奕牧與抗禮不少折一切開採事宜調劑悉當百姓恃以不擾後以捕禁逃軍致激訟於上士民數千控白其寃上官主先入竟論謫去賈志楊四教河南磁州人監生萬厯中為臨潼丞倜儻豁達臨政井然歴署諸邑皆有政聲劉化國南皮人監生萬厯中為臨潼主簿不苛不擾與邑令馬民牧丞楊四教共事稱一時之良去之日士民遮道餞送不絶臨潼縣志劉憲字伯正山東益都人舉人萬厯間令高陵念縣衝疲申請當道掣囘本縣恊濟咸陽渭水驛馬驢牛站四十頭匹民少蘇焉鄉民桑澤民等為䜿審編驛傳碑邑人知府劉自化有記賈志袁化中字熙宇山東武定人萬厯間以進士任涇陽令愷悌樂易接士民若家人父子古召杜之流也百姓祠祀之涇陽縣志何朝宗湖廣道州人進士萬厯間授三原令疏濬三里渠斬木導水勞於民事有循吏風三原縣志穆甯中字允執進士授三原令甫下車廉知民瘼戚不自安日勸民力農桑尚節儉嚴學校絶請謁餽送供應之規民咸誦之三原縣志凃有祐字受伯銅梁人進士任三原令清慎勤敏政事之暇宏覽博物登山臨水不廢賡吟聽訟迎刃而解凡所剖斷兩造咸服至嚴城守除冦盜修學宫善政不可盡述賈志楊之璋字錫之河内人進士萬厯間授三原令時歳比不登璋緩徵平價民賴以蘇三原縣志之璋詧寃苦抑豪彊清介自持威惠大著比入覲過里貸於族以行懐慶府志李棲鳳字翀寰山西臨晉人進士萬厯間任三原令不弛不激按骩法者數人重置之罪奸宂股慄民愛士附五年以薦陞去三原縣志程訓河南郟縣人由進士為盩厔令廉平不苛以愛養為心兩造庭質多諭令和息各心服去性公正人不得干以私課試生徒終日黙坐士有離席語者輒面斥之吏多予告月以一人更直案牘邑吏民賢不肖及姦邪罪名市集物價俱有籍犯者披籍收取無不凛懾比卒老㓜悲哀歸襯之日號泣擁途至為罷市盩厔縣志梁克從號壺嶺河南鄢陵人進士萬厯間知盩厔縣寛嚴相濟持政有方士民咸頌其徳賈志克順字篆一即前令克從兄舉人知盩厔為政振刷有風望牘無停滯剖決如流每至夜分不倦修廢舉墜煥然改觀擢御史順治初邑人舉祀名宦盩厔縣志和震字起甫祥符人進士萬厯中知渭南明爽無機械為政務在釐奸剔蠧折獄不厭周詳得情後已退公庭如止水徵給事中渭南縣志崔邦亮字徳嚴東明人進士萬厯間知渭南豁逹明敏見事風生人莫敢欺至禮賢好士如恐弗及任六年徵御史歴順天府丞渭南縣志徐斗牛字光墟許州人進士萬厯間知渭南賦性渾樸治行端方民不擾而事理會監税内官魚肉細民斗牛不忍毅然以身捍之璫為所阻不遂輒窘辱之竟以憤卒賈志楊所修字脩白商城人進士萬厯中知渭南縣精明亢爽聽訟如神脩六司置器皿剏文昌閣增修萬里橋植路傍樹行人賴之旌善懲惡興文敦教居六年歴陞都御史賈志周維翰北直阜城人進士知宜川廉潔奉公奏記上官革恊濟甘泉之累民䝉其惠賈志趙永祿北直獻縣人為延長令實政感孚時有虎白晝噬人道無行客永祿祭祝逺徙他所延境賴以無患又值歳旱露體祈禱甘霖立沛延長縣志陳國柱山西猗氏人舉人為延長令甫下車即抑強暴懲貪墨豪猾歛跡振肅紀綱惟務實政學宫倉厫城堞皆為經營修葺延人感之立碑頌徳延長縣志李棨號景蒲平定州人舉人萬厯中知鳳翔縣有惠政興學校建南門邑人有掘地得金者或訐之棨曰彼自得金何與爾事何與我事居官數載人稱其廉陞南京兵部主事賈志王敬字蒼坪鹿邑人鳯翔縣知縣與知府沈自彰同心任事創條鞭興水利開小南門以通風氣人文益盛敬有心計能任人時鳯民以户口徵鹽課敬曰民非商奈何輸課於是貸公帑委役貿鹽官代民課立法詳宻除母錢歸帑外餘子錢為地方興作闔邑賴之及敬陞任去鹽本折而課仍累民矣鳯翔府志朱圻河南固始人舉人萬厯中自汧陽令調鳯翔明敏善斷精察過人凡所見姓名狀貌黙識不忘有因事逃匿者忽於門外共語圻於堂上輒辨其音曰此即某也執之果然人以為神賈志徐三畏字子敬北直任邱人進士萬厯中扶風知縣儀宇甚偉意㫖深逺人莫敢窺境内傳舍供帳辦具得宜過客盡悦接遇士大夫情誼藹然自處甚簡尤重更張奉詔均田恐滋蠧擾乃為之報罷及歳大祲郡下荒政條例曰救荒無竒予之可為者省事止訟與停徵爾與民休息歳不為災擢工部給事中賈志李茂春字蔚元把縣人進士萬厯中知扶風丰格嶄然清操如水毎於上官前為地方陳利病侃侃無所顧忌期於利民賈志王祈禎山東館陶人扶風知縣長於鈎距下無匿情扶邑錢糧加耗始自前令黄鉉嘗先取羨金而令收役補償至是禁絶俾民自投櫃胥役無能為奸延接士大夫以禮或有干凟者輒峻拒之為一郡最賈志劉朝繪四川大邑人萬厯中西鄉知縣重修金洋堰民沐其惠舊志劉應科山西垣曲人歳貢萬厯中麟遊知縣老成正直人不敢干以私至比之包孝肅時值寧夏之變賊勢甚厲應科登陴誓衆築壘固守嚙指自矢曰以死報國分也士民皆感泣尋賊滅以憂去瀕行惟冠葢圖書而已賈志張以謙字益吾河南洛陽人進士萬厯中洋縣知縣精鍊明敏宿弊盡釐减糧賑窮民立祠祀之賈志李用中把縣人進士萬厯中知洋縣資性英明才猷果敢力行均地條鞭法由西鄉路修飛槽斜堰洋人永利立祠祀之洋縣志程心傳仁壽人以舉人知西鄉縣申請茶法除民害商亦稱便至今誦之賈志李培樂陵人監生為畧陽令革排年之擾除副差之害發奸剔蠧盜息民安畧陽縣志鄧朝左南昌人萬厯時以舉人知紫陽仁慈廉潔編審以公又積榖備賑時稱循卓紫陽縣志張繼芳沁水人萬厯中以舉人知紫陽才能敏㨗修葺廟學纂集縣志勤考課均里甲有遺愛碑紫陽縣志賀貢山西崞縣人舉人知雒南明察有守以單騎出討礦冦為民除害又賑饑繕城垣徳政尤著民繪像奉之雒南縣志郭實字華伯高邑人進士萬厯間任朝邑令性嚴明有殊績歳大祲賑濟有方民無流亡召入為御史賈志史東昌山西蔚州人進士萬厯中知澄城性強毅敢言不畏權勢而喣喣拊民不異家人父子貧民輸賦牛羊花布粒麥之屬皆准入親視衡量不任左右有行貸者亦藉而付之故催科不擾陞刑部主事賈志黃榜綦江人舉人萬厯中知澄城勤於民事置學田立義倉又造木牛滾鋤以勸耕當事皆稱其才賈志髙一䕫陳留人舉人萬厯中知澄城精明仁厚善政宜民澄素苦徭役重累單户䕫申請條鞭徭役始均澄城縣志南邦化安邑人進士知澄城始立條鞭大便里甲後人被徳不衰賈志其按二傳俱云立條鞭法豈髙令發端而南令成其事乎合傳之以見其終始云馬攀龍號瑞洲四川巴縣人萬厯中授韓城令性慈惠介潔丁田賦多溢額逋負日甚攀龍親經釐正而溢派規避之端自此永杜又韓之水利工不勤易堙溉不勻易閼攀龍為酌田分期灌水堤堰疏濬曠工必懲遇旱輒涕泣拜禱焚爪自責每有膏雨之應終其任獄訟盜賊為之一清遷興國知州賈志王九疇字子範河南鄧州人舉人萬厯間華隂知縣均田弭盜多惠政嘗修學宫建北城樓立常平倉樹道傍栁復葱谷水故道與華牧力辨利害務期兩便民思之不置賈志劉澤逺祥符人萬厯間舉人知同官催科不擾建書院奎樓河堤諸公署併修縣志文風丕變規制一新賈志劉夢陽嘉州舉人萬厯間知白水恢新學宫重修邑志甚有功於士民賈志黃汝槐湖廣鄖縣人選貢萬厯中知白水撫疲邑災氓政多愷澤境有􅉰民歳出刼掠汝槐申請𠞰除邑為立碑與賈沈二令並祀白水縣志方本清字子任河南南陽人恩貢知三水有才識改建學宫補置俎豆修司院葺城樓濬水渠十餘所茂績丕著三水縣志陳王庭北直永平人任洛川令清慎儉約凡錢榖訟獄剖斷如流吏不敢干以私洛川夙號繁劇民玩吏刁前後令斯邑者􅉨􅉨禁令怠弛王庭有精力敏於裁决故令行禁止風俗一變賈志江之澨汶上人萬厯中知中部精明果敢力植善類邑俊秀孤弱不能自立者曲為保全多方誘掖務底於成其里中豪猾交通吏胥招納權賄武斷鄉曲者廉得其魁數人捕治之餘黨懾伏以艱歸復補中部加意恤民尤勵廉節前後六載民悦士服陞任去邑人泣送境外延安府志陳王道山西寧鄉人舉人令延川調繁清澗遇奸吏輒置之法理獄剖决如流四隣控籲者皆假籍以希聽斷且持躬介潔遇士大夫不阿士耑其業民樂其生循聲大起擢貳正定賈志孟希孔字于時山西蒲州人進士萬厯末知扶風簡重寡言笑望之凜然而冲懐可即初下車屏去文法曲為綏輯徵收羨餘寄之公帑凡營建公費即以充之不更加派於民招撫流移予以牛種民感其徳輸納莫敢後期賈志郅述中山西蒲州人舉人萬厯末知麟遊清介自矢一事病民如身受之邑故苦疲述中徐為料理不以督責擾民月三課士進以徳業後左遷去麟遊縣志張啟䝉霸州人舉人萬厯末知漢隂居寛行簡得為政體調停差役務從輕省修尊經閣文昌宫魁星樓八蜡廟築月河堤造城門橋歴任五年士民誦之賈志王之璽字符珍河南開封人舉人天啓初鳯翔知縣其言呐呐不出諸口而政事暇整立易知單毎户以賦丁多寡為次一甲給一單如甲不完限則乙不受單凡留單者責之民争輸賦單行若流催科不擾鳯翔縣志熊引豐字年玉四川富順人舉人天啓初知扶風機警夙成更饒幹畧先是邑多逋欠麥秋後追攝四出胥役復上下其手竊取嬴餘引豐廉得其狀無羈留需索之擾百姓争先輸納吏民莫敢侵欺且應變倉卒不畏強禦奸宄戢伏境内大治賈志姜兆張字省宇山東掖縣人天啓壬戌進士任三原令下車之日問疾苦鋤強暴有嫌其風節過峻者兆張曰稂莠不除嘉禾不植民害不去民安得寜越二年徙長安令士庶擁車悲涕賈志兆張為咸寧令時撫按批行會議為魏璫建祠兆張抗執不可遂削籍歸里頌天臚筆王慶逺山東臨邑人恩貢天啟三年任安定令清介絶倫精明果斷地方安堵有民耕得遺金百兩一人來告慶逺問曰是汝地金耶彼地金耶答曰是彼地非彼金也當入官慶逺曰汝耕汝地得金吾亦不以不入官罪汝也其人慚而退陞綏得知州民思慕之祀名宦安定縣志劉昌號瀛洲祥符人天啓乙丑進士授三原令撫民多惠政月課士講論不輟時議建魏忠賢生祠地上官意在三原昌力争得免祥符縣志昌精於吏治案無留牘民無伏奸值流冦猖獗所至攻陷邑人震恐昌乃明偵諜練土著慎封守綏輯持重境内無患三原縣志路振飛字皓月北直曲州人天啓進士涇陽知縣甫下車縉紳被奴誣訐奉㫖訊擬時已文致大獄屬四邑令會訊莫敢平反獨毅然判曰某必無死法當事咸難之振飛曰即有譴責某力任之既覆奏得减戊巳間歳大祲設法蠲賑撫集流移凡活數萬人未幾旁縣盜起延及雲陽振飛團練鄉勇人自為戰身先士卒殱其渠魁數十人冦相戒毋敢入境又以渭水通商舳艫滿望而涇至弗任舟楫親厯河滸量度深淺疏蕩泥石令可舟行乃先為小船試運之漸繼之以巨艦渭川百貨咸集於涇所省輦負費什之八復聽民自造船通貨不得以税擾民咸便之尋擢御史賈志張京字士將漢陽人舉人天啟中扶風知縣清約恬淡以文學飾吏治不用行户不取贖鍰禮賢愛士一意拊循嘗有武弁暨司掾騷擾驛站即按治如法值歳祲盜起設方畧殱渠魁四郊晏然又多方拯濟全活甚衆賈志蘓州俊山西曲沃人舉人知南鄭縣時常板子張義脱伍冦漢中州俊單騎請兵平之陞本府同知以守正不阿致仕歸賈志徐汝正號二寰宣城人萬厯己酉舉人西鄉知縣時瑞藩封漢中道西鄉舳艫相望民夫牽輓不勝驛騷汝正操小艇懐箋謁王為民請命風作舟溺求屍三日始得之湍水中猶衣冠端坐石上一門役捧足而跪邑民環哭失聲立祠祀之今相傳為漢江神江南通志亢孟檜陳鼎留溪外傳作孟元檜號似何臨汾舉人初授洋縣有惠政瑞王之國供應繁劇力請於王申飭從行宦侍旂尉不得擅騷民間閭井晏然王以此得賢聲而官民歌思孟檜不置又開堰浚渠民享其利續表忠記曹宗載字圮儒雲南臨安人舉人醴泉令以清廉調繁洋縣莅任五年講鄉約止刁訟修學宫勤課士風俗一變漢中府志胡上進北直藁城人以明經知鳳縣清介有守以憂去復補鳳縣未幾賊突至全家遇害撫按題請褒䘏賈志成材山西清源人崇禎初知宜川時饑饉枕藉盜賊四起材恩威兼用内撫饑民外捍強冦宜人賴以保全賈志羅爌山西清源人舉人崇禎初知延川時延屬土冦披猖孤城受圍爌訓練民壯誓衆死守城獲保全居北門城樓者五年終歳不返署厯陞户部郎中賈志鞠思讓山東文登人恩貢崇禎初以王种盜起自鎮安調令白水𠞰撫確有指畫值歳饑賑恤貧窮境内晏如賈志姚一麟山西太原人由舉人知中部值崇禎初兵戈擾攘饑饉頻仍廬舍灰燼民僅孑遺一麟加意軫恤撫殘黎復縣治漸有起色且嚴明果斷吏無骩法民獲寧宇歴陞漢中知府中部縣志楊天際號衝元四川龍安人恩貢崇禎五年任興平令當流冦猖獗訓練民兵料理火具保障一方士民思之興平縣志梁士淳字昭質北直正定人崇禎辛未進士為涇陽令莅任首崇學校政事稍暇即進諸生談經課藝孜孜不倦士風丕振時流賊方熾登城環視築堞濬池費計數千金不損公帑三月工竣又擇民勇敢者因鄉為伍連伍成營以諸生能騎射者分率之按時訓練以備不虞是以他邑多蹂躪而涇邑獲安堵撫按亟稱之其催科不擾杜絶火耗吏胥無得侵蝕尤留意貯榖備賑設法糴糶使倉有餘積故屢值水旱邑不為災調繁長安以外艱歸囊槖蕭然人比之琴鶴清風云賈志韓景芳北直長垣人舉人崇禎七年任醴泉令清嚴耿介不避豪強時流冦猖獗所在焚掠景芳修城池嚴守禦百姓賴以保全祀名宦醴泉縣志趙躋昌山西解州人舉人授咸陽令崇禎八年八月初五日遇賊死之咸陽縣志王國訓字振之山西解州人天啓進士崇禎中知扶風天性嚴毅剖决如流訟平政理自奉儉約恥為夤緣八年秋冦薄邑城四面攻之國訓繕修守具捍禦六十餘日力竭城陷被執不屈罵賊而死事聞贈光祿卿賜祭塟䕃一子賈志趙之琴字舜清遼東鐵嶺衛人舉人崇禎八年知淳化時七盤諸隘盜警豫儲火器完城櫓賊至躬冒矢石斬馘甚多賊始退創立馬神祠恤里甲馬頭之役民甚徳之節愛碑記吳從義字裕強浙江山陰人進士長安令初謁選者率營善地從義獨曰避危疆不就豈臣子分誼且吾貧若稱貸營之後不剝民以償耶卒得長安時流冦充斥詔三邊督師孫傅庭移鎮西安兵十餘萬糗糧芻茭咸取辦於令秦府宗室及縉紳佔業者居十之四名為寄庄無他役役獨累小民從義不憚強禦令豪族均輸民獲稍甦而兵亦無譁舉卓異督師陷陣殁長安勢如累卵從義佐撫軍誓死不貳繼娶胡至署家人以合巹請正色曰此何時也而為此浹三旬終不一顧分汛南門賊攻城西門先陷吏請攜印出走從義曰城亡與亡吾將安徃見一僕在側曰吾當以死報國汝素忠謹可奔訃吾家新閨人尚未成禮仍歸其母言畢入關帝廟卸戎服易冠帶望闕叩頭投井死年四十有三賊知從義死戒其下毋犯其署家人得全從義為童子時夢一長者拊其背曰歳寒松柏其在斯乎寤而誌之至是果驗後贈按察司僉事續表忠記從義崇禎庚辰進士辛巳筮仕長安有廉名癸未冬逆李入關城陷從義詣關帝廟易公服望闕泣拜如張睢陽之言曰生無以報國死當為厲鬼以殺賊遂引刀自裁為吏奪去未死徐歩殿後有井舉身赴之猶未死為賊邏者所覺欲引出謂爾何自苦肯更事富貴可保從義於井中厲罵賊怒推石瓦下擊死方學舜忠烈碑記按方碑記從義死事與續表忠微異故並識之張宗孟字泗源山西定襄人進士授鄠縣令未莅任冦薄城下宗孟聞警兼程而進至則四門皆土野服從間道登陴鼓勵守者賊宵遁乃治鄠城四隅建敵樓重葺四門創懸樓二十二座建堡六十六處各設火具賊過城下輒相戒毋敢犯又建市心樓重修大成殿移泮池櫺星門外居恒與人語煦煦可親而階庭肅穆吏胥奔走無錯趾諸臺横有徵調即拒不應左帥兵過處俱入城宗孟拒之一切供億置城外扄其門因誣譖於督院上其事奉㫖勘問士民保留乃以降級攝令事任八年陞刑部主事鄠縣志陳扆頌字我恂濟寧人進士崇禎間知三原志操清白不染一私緩催徴剔積蠧撫䘏瘡痍𠞰除強冦士民徳之三原縣志楊暄山西高平人由進士授渭南令老成厚重甚得民和歳大祲畢力拯救奸人乗機行刼斃之杖下民得稍安賊兵抵渭南暄已擢兵曹未行與學官蔡姓者同守會舉人王明誥開門迎賊暄被執罵賊死續表忠記柴國弼遼東人歳貢知安塞長於禦侮明戰守之法衝鋒破賊城賴以全以疾卒邑人思之祀名宦延安府志陳炳河南孟津人舉人知安塞時大饑道殣相望冦盜充斥炳煮粥活人以千計復力捍孤城邑人賴之延安府志蒲來舉籍失考知甘泉縣賊來犯守備孫守法等擁兵不救城破來舉手刃一賊傷六賊而死續表忠記郝鴻猷字勲甫北直霸州人崇禎時以舉人授延長令延長處賊窠中賊營蔓延數百里鴻猷單車之官既而賊環攻延長鴻猷設守具捍禦忠誠感人父老子弟效死弗去賊攻不勝遂引去圍既解冒雨巡城墮而折脇移病歸數月城遂陷延人尸祝之初學集鴻猷負偉才有膽畧時巨冦號一字王嘯聚延水關鴻猷預謀守禦凡作止部伍編成詩曲俾兵民習歌之不煩號令行壘肅然賊至列陣於前單騎至營諭以利害賊懼遁去孤城賴以無患延長縣志不按鴻猷二傳事跡微同由前傳可見其忠義由後傳可覘其謀畧故並錄之萬代芳遼東人崇禎時為延長令廉介自持慷慨有氣節時流賊犯境躬率士民修戰守之具及攻城晝夜堅守力盡城破乃退守上城用砲擊之砲未及燃賊蜂擁至乃北面再拜曰臣力竭矣自刎而死祀名宦延長縣志唐夢鯤字化卿番禺人萬厯乙卯舉人知寶鷄縣縣為三秦劇邑或謂夢鯤曰公年垂耳順逺宦崖疆為公危之夢鯤笑曰為朝廷臣子安所避甫入境潼關失守賊欲取道寶鷄夢鯤力禦之邑得無恙未幾李自成據西安三秦相繼陷没夢鯤知彈丸不能獨完一日晨起慷慨謂僕曰吾力竭矣唯一死以盡吾職悲憤痛哭縊於官署時崇禎癸未十二月十八日也上聞贈光祿寺少卿賜祭塟焉廣東通志魏權中山西武鄉人崇禎中貢生知郿縣長才大畧果於任事當流冦猖獗能練兵守城賊數環攻隨宜守禦時復破斬賊級陞西安同知賈志夏紹虞湖廣襄陽人崇禎中貢生知麟遊以新城未據形勝上疏改復古城剏造宏逺至今賴之賈志吕鳴世福建人由恩貢為麟遊知縣性介特以風教自任崇禎七年八月城陷被執賊聞其廉惠惜之未忍加害鳴世發憤絶食六日而卒續表忠記蔣汝艾字玉衡興安人以歳貢任洋縣訓導陞西鄉教諭崇禎時巨冦肆擾委署南鄭篆招流移恤困苦設法殱捕賊不敢近興安州志司五教字敬先内黃人以明經知城固縣時逆闖遣賊帥田見秀擁衆攻城五教以大義激士民固守閲四日力盡城陷被執賊帥逼之跪厲聲曰朝廷命官肯為賊屈耶索印曰印已還天子賊怒遂遇難畿輔志程謙字六吉山西岢嵐人崇禎中以舉人知西鄉勤敏廉肅吏胥畏法署洋縣城固值流賊四起鄰邑悉遭蹂躪千里内無堅城謙設法督民守禦三邑俱安堵無恙賈志郭鼎藩字翰宇涇陽人萬厯丙午舉人初為沔縣教諭適遇逆闖率賊數萬夜薄城下縣令恐懼鼎藩慨然以城守自任泣勵義勇親冒矢石賊被創以去沔人勒石紀績尋署事鳳縣寛賦税除強暴士民有一清徹底之謠賈志郭一龍山東曹縣人舉人崇禎中知洋縣清正剛介流冦逼城竭力捍禦以病卒士民哀之賈志張鵬翺北直臨城人貢士崇禎十一年知漢隂慷慨勤敏毅然以滅冦為事歴任五年治績煥然一新賈志劉廷徴北直樂亭人舉人崇禎間任洛南令博學能文莅治誠信剛正不阿時流冦數十萬攻城浹月廷徵殫力守禦賊引去人追思之賈志董三謨黎平人舉於鄉崇禎中授山陽知縣賊陷城三謨與其父嗣成弟三元妻李氏攜子女皆死三謨多惠政百姓素感其恩及全家殉難賊退百姓羣聚而哭之後贈光祿寺丞立祠嗣成三元並祀妻女建坊旌表續表忠記范志懋河南虞城人舉人郃陽知縣性剛毅尚名節甫至郃流冦環攻城十七日不下先是邑城設有韓郃營糜費民萬三千餘金力請撤去後以懐來㕘議殉國難賈志温素知字忠赤山西聞喜人貢士崇禎間任華隂令慈惠端方色笑不輕假有揮霍之才遇事直斷悉得其情調郃陽值歳大祲憂旱成疾遂卒俸餘數十金紳衿致賻僅得歸櫬賈志田臣山西忻州人舉人崇禎間知蒲城凡事務盡實心威嚴御下吏胥不敢為奸浚濠繕城有功保障邑人塑像祀之蒲城縣志朱一綂平度州人舉人初任蒲城西安破屬邑多降一綂獨曰吾家七世衣冠至我臣賊不墜我家聲耶體素肥令家人擴井口以待㑹衙兵叛奪印趨降一綂瞋目叱曰吾一日未死印不可得也日暮左右盡散從容赴井死縣丞姚啟崇亦死焉續表忠記王無逸寧陵人貢生崇禎間知白水明斷不撓大修城陴後㓂潛入城陷無逸猶著公服罵賊死賈志迴滼瀋府宗室由宗貢生知白水習法律吏不敢欺賊入城猶手弓射賊與學官魏箴典史劉進並被難續表忠記李麟禎北直深澤人貢生長