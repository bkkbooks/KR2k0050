body:
  text: 陜西通志巻六十六人物十二列女一上古任姒神農氏母有蟜氏女登為少典妃遊華陽有神龍首感生炎帝長於姜水史記五帝本紀注姜水在今寶鷄夏女志夏禹母有莘氏女是生髙宻史記夏本紀注有今郃陽南二十里古莘國周太姜者王季之母有邰氏之女太王娶以為妃生泰伯仲雍王季貞順率道淵智非常太王謀事必與太姜劉向列女傳太任文王之母摯仲氏中女王季娶以為妃太任之性端一誠莊惟德之行及其有娠目不視惡色耳不聽淫聲口不出敖言生文王而明聖君子謂太任為能胎教列女傳太姒者武王之母禹後姒氏之女在郃之陽在渭之涘仁而明道文王喜之親迎於渭及入旦夕勤勞以盡婦道號曰文母文王理外文母治内生十男自少及長未嘗見邪僻之事史記管蔡世家註穆姬者秦穆公之夫人晉獻公之女晉惠公立使納羣公子曰公族者君之根本秦與晉戰獲晉侯以歸穆姬聞之乃與太子罃公子𢎞女簡璧衰絰履薪以迎且告穆公曰上天降災使兩君匪以玉帛相見乃以興戎婢子娣姒不能相教以辱君命晉君朝以入婢子夕以死惟君其圖之公懼乃舍諸靈臺列女傳伯嬴者秦穆公之女楚平王夫人昭王之母也呉入郢昭王亡呉王闔閭盡妻其後宫次至伯嬴伯嬴持刀曰妾聞生而辱不若死而榮妾以死守不敢承命呉王退舍伯嬴與其保阿背永巷之門皆不釋兵三旬秦救至昭王復君子謂伯嬴勇而精一列女傳秦孟姜同官人適范植僅三日植赴役長城姜送寒衣至城下植已死姜尋夫骨無辨囓指血驗得之郡國志負遺骸歸至祋祤道中山巓渴甚號哭山忽出泉因名曰哭泉在今同官城北未㡬死西山石穴中邑人憐之并其夫遺骸偕葬有祠墓側馬志漢隨清娛太史司馬遷侍妾趙之平原人年十七事遷會遷有事去京縞居於同後遷故亦憂傷尋故褚遂良撰隨清娯墓誌銘楊敞夫人敞華陰人昌邑王淫亂大將軍光與車騎將軍張安世謀廢王更立議既定使大司農田延年報敞敞驚懼不知所言延年起至更衣敞夫人遽從東廂謂敞曰此國大事今大將軍議已定使九卿來報君侯君侯不疾應與大將軍同心猶豫無決先事誅矣延年從更衣還敞夫人與延年參語許諾請奉大將軍教令遂共廢昌邑王立宣帝前漢書楊敞傳遷按敞夫人司馬之女龍門人節女者長安大昌里人妻其夫有仇人欲報而無道徑聞其妻仁孝有義乃刼其妻之父使要其女為中詗父以告女女計念不聽則殺父不孝聽之則殺夫不義不孝不義皆不可行於世欲以身當之乃佯許諾曰旦日在樓上新沭東首卧則是矣請開户牖待之乃告其夫使卧他所因自沐居樓上東首開户而卧夜半仇家果至斷頭持去明而視之乃其妻之頭也仇人哀之以為有義遂釋不殺其夫列女傳賈逵姊平陵人逵年五歲明慧過人其姊韓瑶之婦嫁瑶無嗣而歸居焉亦以貞明見稱聞里中讀書旦夕抱逵隔籬而聽之逵靜聽不言姊以為喜至年十歲乃暗誦六經曰憶昔姊抱逵於籬間聽隣家讀書今萬不遺一拾遺記班昭扶風曹世叔妻同郡班彪之女昭字惠班一名姬博學髙才世叔早卒有節行法度兄固著漢書未竟而卒和帝詔就東觀踵成之數召入宫令皇后諸貴人師事焉號曰大家鄧太后臨朝與聞政事以出入之勤特封子成關中侯時漢書始出多未能通者同郡馬融伏於閣下從昭受讀作女誡七篇馬融善之令妻女習焉昭女妹曹豐生註昭婿之妹也亦有才慧為書以難之辭有可觀年七十餘卒皇太后素服舉哀使者監護喪事所著賦頌銘誄問注哀辭書論上疏遺令凡十六篇子婦丁氏為撰集之作大家讚焉後漢書列女傳孟光扶風平陵孟氏女肥醜而黑力能舉石臼擇對不嫁至年三十父母問其故曰欲得賢如梁伯鸞者鴻聞而聘之始以裝飾入門七日而鴻不答光乃跪請牀下鴻曰我欲裘褐之人可與偕隱者耳光曰以觀夫子之志耳妾自有隱居之服乃更為椎髻布衣操作而前鴻喜曰此眞梁鴻妻也能奉我矣字之曰德曜名孟光共入覇陵山中以耕織為業咏詩彈琴以自娯東出關過京師至呉依臯伯通居廡下為人賃春每歸光為具食不敢於鴻前仰視舉案齊眉伯通異之乃舍之於家鴻疾卒葬畢歸扶風後漢書梁鴻傳馬倫汝南袁隗妻扶風馬融之女也字倫少有才辯融家世豐豪裝遣甚盛隗問之曰婦奉箕帚而已何乃過珍麗乎對曰慈親垂愛不敢逆命君若欲慕鮑宣梁鴻之髙者妾亦請從少君孟光之事矣隗既寵貴當時倫亦有名於世年六十餘卒倫妹芝亦有才義少喪親長而追感乃作申情賦云後漢書列女傳友娣郃陽任延壽之妻字季兒兄季宗與延壽爭葬父事延壽與其友田建隂殺季宗建獨坐死延壽會赦乃以告季兒季兒曰殺夫不義事兄之仇亦不義與子同枕席而殺吾兄又縱兄之仇何靣目以生而戴天履地乎乃告其大女曰汝父殺吾兄義不可以留又終不復嫁矣吾去汝善視汝兩弟遂自經而死馮翊王讓聞之令縣復其三子而表其墓後漢書列女傳穆姜漢中陳文矩妻同郡李法姊字穆姜有二男而前妻四子文矩為安衆令喪於官四子以母非所生憎毁日積而穆姜慈愛温仁撫字益隆衣食資供皆兼倍所生長子興遇疾困篤親調藥膳恩情篤宻興疾乆乃瘳於是將三弟詣南鄭獄陳母之德狀己之過乞就刑辟縣言之於郡郡守表異其母蠲除家徭遣散四子許以修革自後訓導愈明並為良士穆姜年八十餘卒臨終勅諸子曰吾弟伯度智達士也所論薄葬其義至矣又臨亡遺令賢聖法也今汝曹遵承勿與俗同增吾之累諸子奉行焉後漢書列女傳女按穆姜漢中士志作安衆令程祇妻今從後漢書泰瑛南鄭楊相妻大鴻臚劉巨公女也有四男二女相亡教訓六子動有法矩長子元珍出行醉母十日不見之曰我在汝尚如此我亡何以帥羣弟子元珍叩頭謝過次子仲珍白母請客既至無賢者母怒責之仲珍乃革行交友賢人兄弟為名士泰瑛之教流於三世四子才官隆於先人故時人為語曰三苗止四珍復起漢中士女志杜泰姬南鄭人趙宣妻也生七男七女若元珪稚珪有望五人皆令德其教男也曰中人情性可上下也昔西門豹佩韋以自寛宓子賤帶弦以自急故能改身之恒為天下名士戒諸女及婦曰吾之孕身在乎正順及其生也恩自于撫愛其長之也威儀以先後之體貌以左右之恭敬以監臨之懃恪以勸之孝順以内之忠信以發之是以皆成而無不善汝曹庶幾勿忘吾法也後七子皆辟命察舉牧州守郡而漢中太守南鄭令多與七子同歲季考上計無不修敬泰姬執子孫禮漢中士女志李文姬南鄭趙伯瑛妻太尉李固女賢而有智聞固免宻與二兄謀豫藏弟燮託言還京師有頃難作下郡收固二子二兄受害文姬乃告父門生王成曰君執義先人有古人之節今委君以六尺之孤李氏存滅其在此矣成感其義乃將燮乘江東下入徐州界内令變姓名為酒家傭而成賣卜於市陰相往來十餘年間燮遇赦還後漢李固傳韓樹南南鄭人趙子賤妻也子賤初為郡功曹李固之誅二子託服藥死具棺器欲因出逃子賤畏法敕更驗實就殺之及固小子燮得還子賤慮燮報仇賃人刺之燮覺告郡殺子賤初樹南諫子賤子賤不從及臨死許共并命兄弟嫂侍婢視守之經百餘日乃怠曰兄嫂念一死萬不得生不敢復圖死也上下以為信然無㡬時於幕下自殺漢中士女志禮珪城固陳省妻也楊元珍之女生二男長娶張度遼女惠英少娶荀氏皆貴家豪富禮珪敕二婦曰吾先姑母師也常言聖賢必勞民者使之思善不勞則逸逸則不才吾家不為貧也所以粗食給吾者使知苦難耳二婦再拜奉教從孫奉上微慢珪抑絶之感悟革行遭亂流行宗表欲見之必自嚴飾從子孫侍婢乃引見之曰此先姑法也四時祭禮自親養牲釀酒曰夫祭禮之尊也年八十九卒惠英亦有淑訓母師之行者也漢中士女志陳順謙城固人適鄧令曹寧十九寡居長育遺孤八十餘卒兄弟陳規著書嘆述之惠謙適張亮則在扶風官下吏白欲重禁嚴防以肅非元修訪於惠謙惠謙曰恢𢎞德教養亷免耻五刑三千葢亦多矣又何加也兄弟伯思學仙道惠謙戒之曰君子疾殁世名不稱不患年不長也且夫神仙愚惑如繫風捕影非可得也伯思乃止陳伯臺稱云女尚書之後耳漢中士女志禮修趙嵩妻張氏女也姑酷惡無道遇之不以禮修終無愠色及寧父母父母問之但引咎不道姑卒感悟更慈愛之鄉人相訓曰作婦不當如趙伯髙婦乎使惡姑知變可謂婦師矣後姑病女來省疾姑却之曰我死固當絶於賢婦手中後遭米賊嵩死乃碧塗靣亂首懷刀託言病賊不逼也養遺生女依父叔立義終身者也漢中士女志蘇伯玉妻作盤中詩寄夫云姓者蘇字伯玉家住長安身在蜀漢詩評晉嚴氏杜有道妻字憲京兆人貞淑有識量年十三適杜氏十八而婺矛牙居子植女鞾並孤藐憲誓不改節撫育二子教以禮度植遂顯名於時鞾亦有淑德傅𤣥求為繼室憲許之時𤣥與何晏鄧颺不睦晏等每欲害之憲曰晏等驕侈必當自敗司馬太傅獸睡耳尋晏等果爲宣帝所誅元前妻子咸年六歲隨其繼母省憲謂咸曰汝千里駒也必當逺至以其妹之女妻之咸後有名於海内其知人之鑒如此年六十六而卒晉書列女傳蘇氏竇滔妻武功人陳留令蘇道賢之第三女也名蕙字若蘭善屬文智識精明儀容妙麗年十六歸於滔滔甚敬之苻堅時滔為秦州刺史被徙流沙蘇氏思之因織錦為迴文詞十六國春秋本傳張氏苻堅妾不知何許人明辨有才識堅將宼江左羣臣切諌不從張氏進曰妾聞聖王之馭天下有因成無因敗今朝臣上下皆言不可陛下復何所因也妾聞人君有伐國之志者必上觀乾象下採衆祥天道崇逺非妾所知以人事言之未見其可秋冬已來每夜犬嘷雞鳴廐馬驚逸武庫兵器作聲吉凶有兆願陛下詳而思之堅興兵張氏請從堅果大敗於壽春張氏乃自殺晉書列女傳楊氏苻丕妻征東左司馬楊膺之妹慕容永殺丕以楊氏為上夫人楊氏不從引劒刺永為永所殺十六國春秋毛氏苻登妻武都人河州牧毛興之女美而勇壯善騎射登為姚萇所襲營壘既陷毛氏猶彎弓跨馬率壯士數百與萇交戰殺賊七百餘人衆寡不敵為萇所執萇欲納之毛氏罵曰吾天子皇后安肯為賊羌所辱何不速殺我因仰天大哭曰姚萇無道先害天子今又欲辱皇后皇天后土寧汝容乎萇怒殺之十六國春秋裴氏杜乂妻嫠居養后以禮自防甚有德音裴氏壽考百姓號曰杜姥晉書杜乂傳皇杜乂杜陵人成恭后父楊氏吕纂妻𢎞農人美艷有義烈纂被吕超殺楊氏與侍婢十數人殯纂於城西將出宫超慮齎珍物出外使搜之楊氏厲聲曰爾兄弟不能和睦手刄相屠我旦夕死人何用金寶超又問玉璽所在楊氏怒曰盡毁之矣超將妻之謂其父桓曰后若自殺禍及卿宗桓以告楊氏楊氏曰大人賣女於氐以圖富貴一之已甚其可再乎遂自殺晉書列女傳梁王整姊覇城人嫁為衞敬瑜妻年十六而敬瑜亡父母舅姑咸欲嫁之誓而不許乃截耳置盤中為誓乃止遂手為亡婿種樹株墓前柏樹忽成連理一年許還復分散所住戸有燕巢常雙飛來去後忽孤飛女感其偏棲乃以纓繫脚為誌後歲果復來猶帶前縷雍州刺史西昌侯藻嘉其美節乃起樓於門題曰貞義衞婦之閭南史列女傳北魏趙氏武功縣孫道温妻万俟醜奴圍岐州乆之無援趙謂城中婦女曰州城方陷義在同憂遂相率負土晝夜培城城竟免賊北史列女傳北齊夏侯氏皇甫和母漢中人夏侯道遷之女才明有禮則親授和以經書和深沉有雅量尤明禮儀卒濟陰太守北齊書皇甫和傳隋于氏韓覬妻河南人也字茂德年十四適覬十八覬從軍没于氏哀毁骨立慟感行路每朝夕奠祭皆手自捧持及免喪其父以其幼少無子欲嫁之誓不許遂以夫孽子世隆為嗣身自撫育愛同己生訓導有方卒能成立自孀居以後親族之家絶不往來蔬食布衣不聽聲樂以此終身隋文帝聞而嘉嘆下詔褒美表其門閭長安中號為節婦門卒於家北史列女傳覬按于氏夫韓史未註籍但據長安中號為節婦門一語應是長安人覃氏上郡鍾氏婦夫死年十八事後姑以孝聞數年間姑及伯叔皆相繼死覃氏家貧無以葬躬自節儉晝夜紡績十年而葬八喪為州里所敬文帝聞而賜米百石表其門閭北史列女傳唐王氏新豐人楊慶妻世充兄之女慶以河間王子為郇王守滎陽䧟於世充故世充妻之用為管州刺史太宗攻洛陽慶謀與王歸唐謝曰鄭以我奉箕帚者綴公之心今負恩背義自為身謀可若何至長安則公家婢耳願送我還東都慶不聽王謂左右曰唐勝則鄭滅鄭安則吾夫死若是生何益乃飲藥死唐書列女傳李氏郿人王珪母始珪微時李嘗曰兒必貴然未知所與遊者何如人試與偕來會房元齡杜如晦過其家李闚大驚敕具酒食喜曰二客公輔才汝貴不疑唐書王珪傳李氏楊三安妻髙陵人舅姑亡三安又死子㓜孤窶晝田夜紡凡三年葬舅姑及夫兄弟凡七喪逺近嗟涕太宗聞而異之賜帛三百段遣州縣存問免其徭役唐書列女傳陽按册府元龜作涇人上官氏楚王靈龜妃下邽士族也靈龜出繼哀王後而舅姑在妃朝夕侍奉謹甚凡珍美非經獻不先嘗靈龜卒將葬前妃無近族議者欲不舉妃曰逝者有知魂可無託乎乃備禮合葬聞者嘉歎喪除兄弟共諭妃少又無子可不有行泣曰丈夫以義婦人以節我未能殉溝壑尚可御粧澤祭他胙乎將自劓刵衆遂不敢强唐書列女傳劉氏涇陽人田伯明之伯母伯明少孤劉氏年十九而孀居操行貞固撫育伯明恩義甚篤及劉以壽終伯明廬於墓側册府元龜姚女澄城人嫂李氏不得於姑每鞭笞輙以自蔽將適人忽危坐而逝嫂亦慟哭死里中立祠祀焉賈志王氏楊紹宗妻華陰人在褓而母亡繼母鞠愛父征遼殁繼母又卒王年十五乃舉二母柩而立父像招魂以塟廬墓左永徽中詔賜物段并粟以闕表門唐書列女傳韋氏雍州司法參軍楊諲故妻鄜州刺史吉甫之女其父初嬰疹疾累月不解衣而寢及父卒一慟而絶帝嘉其至行儀鳳三年特賜縑帛仍令編入國史册府元龜范氏宜君人夫死不嫁事姑孝姑患病乆不痊忽聞肉香欲食甚急氏割左膊肉深至骨以奉姑病隨愈事聞旌表鄉人以割骨名村馬志秦氏髙叡妻叡為趙州刺史黙啜攻州䧟示以寶帶異袍曰降我賜爾官不降自死叡視秦秦曰君受天子恩當以死報賊一品官安足榮自是皆瞑目不語黙啜知不可屈乃殺之唐書列女傳人按髙叡萬年殷氏顔眞卿長安人少孤母殷躬加訓導唐書顔眞卿傳紹蘭長安民郭行先女適巨商任宗為賈於湘中數年音信不達紹蘭見雙燕戲於梁間長吁淚下語燕欲憑附書於壻燕子飛鳴上下似有所諾遂飛泊膝上蘭乃吟詩小書其字繫於燕足燕遂飛鳴而去任宗時在荆州忽見一燕飛鳴泊於肩上見有書繫足上解而視之乃妻所寄也宗感而泣下遂歸首出詩示蘭後張説傳其事開元天寶遺事董氏金城女家無兄弟孝養不嫁父亡廬於墓側凡六載天寶四載二月表其門閭賜以粟帛册府元龜韓氏柳公綽妻公綽華原人氏韓臯女也善訓子仲郢幼嗜學嘗和熊膽丸使夜咀嚥以助勤唐書柳公綽傳竇氏奉天縣人竇氏二女伯娘仲娘幼有志操住邠州接界永泰中草賊數千人入村行刼聞二女有容色姊年十九妹年十六藏於巖窟間賊徒擬為汚辱乃先曵伯娘出行數十歩又曵仲娘出賊相顧自慰行臨深谷伯娘曰我豈受賊汚乃投於谷賊方驚駭仲娘又投於谷谷深數百尺姊尋卒仲娘脚折首破血流被體氣絶良乆而蘇賊義之而去京兆尹第五琦感其貞烈奏之詔旌表門閭仍長免丁役二女塟事官給京兆戸曹陸海首賦詩以美之舊唐書列女傳王霞卿藍田人才華清膽節行尤髙進士鄭殷彛旅於會稽寓唐安寺樓見壁間霞卿題詩云云霞卿乃邑宰韓嵩姬自京師挈之任所嵩遇宼而卒鄭子往謁霞卿辭疾不見令輕綃持詩贈之詩曰君是烟霄折桂身聖朝方切諮良臣正堪西上投知己何必留程見婦人鄭得詩慚而去侍兒小名錄長孫氏楊收母馮翊人七歲而孤母親授經十三通大義號神童唐書楊收傳鄭氏第五峯長安人婦鄭以孝著表闕於門唐書第五琦傳韋温女歸薛蒙工屬文續曹大家女訓行於世唐書韋温傳韋温杜陵人碧玉右司郎中馮翊喬知之妾曰碧玉武承嗣借以教諸姬遂留不還知之作綠珠怨詩以寄之碧玉赴井死侍兒小名錄封絢殷保晦妻封敖孫也名絢字景文能文章草𨽻保晦厯校書郎黃巢入長安共匿蘭陵里明日保晦逃賊悅封色欲取之固拒賊誘説萬詞不答賊怒勃然曰從則生不然正膏我劒封罵曰我公卿子守正而死猶生也終不辱逆賊手遂遇害保晦歸左右曰夫人死矣保晦號而絶唐書列女傳賀若婦藍田人姑有疾刲股肉奉姑疾遂愈府縣以聞勅旌表閭名其鄉曰節婦鄉藍田志五代貞女失其姓鳳縣人五代時為梁將所得義不受辱梁將亦不敢犯及卒葬於縣北名貞女墓後漢王仁裕為撰墓碑明一統志宋种放母放父詡長安主簿卒母與放隱終南山豹林谷之東明峯結草為廬僅庇風雨母樂道薄滋味淳化三年詔召放母恚曰嘗勸汝勿聚徒講學身既隱矣何用文為果為人知而不得安處我將棄汝深入窮山矣放稱疾不起母令取其筆硯焚之與放轉居窮僻人跡罕至太宗嘉其節詔賜緡錢使養母不奪其志宋史种放傳馬氏下邽李好義妻好義為興州正將呉曦反將攻之拜決於家廟囑馬氏曰當自為計生死從此決矣馬氏叱之曰汝為朝廷誅賊何以家為我決不辱李氏門户馬氏之母亦曰行矣勉之汝兄弟生為壯夫死為英鬼好義喜曰婦人女子尚念朝廷我軰當如何續文獻通考孟氏延安人父戍永樂城夏人攻城䧟之父死孟呼號徒歩亟入城中獲父屍大慟而斃夏人憐之并其父葬焉續文獻通考張伯威妹大安軍人嫁崔均其姑王疾妹剔左臂肉作粥以進達旦即愈知大安軍羅植即崔均所居立孝婦坊事聞詔賜束帛宋史張伯威傳李氏清澗人顯忠族妹顯忠南歸家屬悉遇害李氏國色金人欲私之不從乃縛手樹下命左右射其臍遂罵賊不已而死明一統志韓蘄王夫人本娼也嘗五更入府伺候賀朔忽於廟柱下見一虎蹲卧鼻息齁齁驚駭亟走出已而人至者衆復往視之乃一卒也因蹴之起問其姓名為韓世忠心異之宻告其母謂卒定非凡人乃邀至其家資以金帛約為夫婦蘄王後立殊功為中興名將封兩國夫人蘄王嘗邀烏珠於黄天蕩㡬成擒一夕鑿河遁去夫人奏疏言世忠失機縱敵乞加罪責舉朝為之動色其明智英偉𩔖此鶴林玉露張姓處子平涼人宋末饑荒就食於汧父母許字於丌姓後還里復許於富族處子號泣欲死其兄嫂憐之夜駕車奔汧適丌姓因事他往處子勢不能追又不敢歸遂自刃焉血痕化為石魚汧人為立廟忠孝錄金王氏涇陽人進士武師古妻師古早卒氏守節奉舅姑如初後旌其門續文獻通考史氏李文妻白水人夫亡服闋誓死弗嫁父强取之歸許邑人姚乙為妻史氏不聽姚訴之官被逮遂自縊死詔有司致祭其墓金史列女傳師氏適澄城雷氏至二十四歲未有子而夫亡誓不再嫁篤養舅姑姑病革潛刲股肉雜飲食以進姑病乃瘥後舅姑俱逝又二十餘年其兄師逵欲利其産私許楊珍婚訟於官氏度其難免投井而死明昌三年采訪使以事聞特旌貞潔續文獻通考劉氏許古妻定海軍節度使仲洙女也貞祐初古挈家僑居蒲城後留劉氏母子於蒲仕於朝既而兵圍蒲劉謂二女曰汝父在朝而兵勢如此事不可保若城破被驅一為所汚奈何不若俱死以自全已而攻城益急於是劉氏與二女相繼自盡有司以聞於朝四年五月追封劉氏為郡君諡曰貞潔其長女諡曰定姜次肅姜以其事付史館金史列女傳康住住鄜州人夫早亡服闋父取之歸家許嚴沂為妻康氏誓死弗聽欲還夫家不可得乃投崖而死詔有司致祭其墓金史列女傳馮妙眞適進士張慥興定五年慥為洛川主簿元兵入鄜延守臣以西路輸芻粟不時至檄慥詣平涼督慥欲偕妙眞以往妙眞辭曰舅姑老矣子行妾留奉養洛川破妙眞從舅姑匿窟室兵索得之妙眞泣與舅姑訣曰婦生不辰不得終執箕帚義不從辱即擕三子赴井中明年慥歸發井得屍殯於縣之東郭外死時年二十四金史列女傳蒲察氏字明秀鄜州人訥申之女完顔長樂之妻也哀宗遷歸德以長樂為總領將兵扈從長樂一子在幼出妻柴氏所生也明秀撫育如己出崔立之變驅從官妻子於省中蒲察氏聞以幼子付婢僕且與之金幣親具衣棺祭物與家人訣曰崔立不道强人妻女兵在城下吾何所逃惟一死不負吾夫耳汝等惟善養幼子遂自縊而死時年二十七金史列女傳元程鵬舉妻鵬舉在宋季被虜於興元張萬户家為奴以虜到宦家女某氏妻之既婚三日即竊謂其夫曰觀君才貌非乆在人後者何不為去計而甘心於此乎夫疑其試己也訴於張張命箠之越三日復告夫愈疑又訴於張張命出之遂鬻於市人家妻臨行以所穿綉鞋一易程一履泣而曰期執此相見矣程感悟奔歸宋以蔭補官元統一海内程為陜西行省叅知政事自與妻别三十餘年義其為人未嘗再娶至是遣人擕向之鞋往興元訪求之城南某菴中氏已為尼旋報程移文本省遣使檄興元路官為具禮委幙屬李克復防䕶車輿至陜重為夫婦續文獻通考楊氏安西人少寡守志割體肉療姑病元史列女傳崔氏奉元李郁妻有志節至順元年旌其門元史文宗本紀王氏李安道妻咸寧人年十九安道卒氏躬紡織事舅姑守節終身至正元年旌表續文獻通考楊氏鄠縣人閻禎妻禎卒楊甫二十二歲誓志守節五十年至正元年詔旌表其門續文獻通考劉氏張訥妻藍田人訥為監察御史早卒劉守志不二河東受兵劉氏二子衡衍俱以事出外度不能自脱遂與二婦孫氏姚氏決死盡發貲囊分給家人姑婦同縊焉元史列女傳李氏涇陽人符文進妻年二十六文進卒誓不再嫁紡績撫子守節終身至元中詔旌其門續文獻通考焦氏涇陽袁天祐妻天祐祖父始皆從軍役祖母楊氏母崔氏並家居守志至元中天佑從征死甘州焦氏年少宗族欲改嫁之焦氏哭曰袁氏不幸三世早寡自祖姑以來皆守節義豈可至吾而遂廢乎吾生為袁氏婦死則葬袁氏土爾終不能改容事他人也衆不敢復言又周氏澤州人嫁為安西張興祖妻年二十四興祖殁舅姑欲使再適周氏弗從曰妾家祖父皆早世妾祖母妾母並以貞操聞妾或中道易節是忘故夫而辱先人也夫忘故夫不義辱先人不孝不孝不義妾不為也遂嫠居三十年奉舅姑生事死葬無違禮其父與外祖皆無後葬祭之禮亦周氏主之有司以聞並賜旌異元史列女傳劉氏涇陽呉君錫妻夫亡貽語許更事以圖衣食劉氏誓死不從亂命夫亡後杜門不出甘貧守志以紡織為生三歴饑饉人相食劉氏草蔬木皮以度殘年終不失節馬志周氏涇陽人周氏適張李氏適吳王氏適朱賈氏適蔡俱元朝已旌表者見雲陽舊志其詳無可考馬志王氏幼適涇陽馮氏生一子守義不渝或有人勸别圖者王氏怒之再莫敢言者經天厯至正間處之恬然年九十有六聰明康健齒落更生馬志楊氏適李又楊氏適李二李父子也二楊姑婦也其家義方教子姑婦繼踵而全節兄弟同心而致孝二楊俱夫亡守節事聞旌表名士書其門曰貞節邑官改里西城街曰重節街馬志孫氏三原張德妻德亡孫年二十四誓死靡他子世享亦早卒妻王氏年二十九亦誓不再嫁世享子忠亦早卒妻劉氏年二十八亦能守義不渝事聞詔旌表其門續文獻通考李氏孫福妻扶風人夫亡守節延祐二年旌表明初猶存賈志䝉氏雷沂妻同州人沂殁於軍氏孀居三十年事舅姑撫孤幼以節孝著聞至元中詔旌其門賈志王氏馬宅妻朝邑人宅卒氏年十九守節延祐元年旌表賈志陳氏韓城人適邑人孫謙生子景仁甫一歲而謙卒氏方十九誓不易節至元十六年旌其門續文獻通考李氏王懋德妻華陰人李克忠女年十八適懋德未踰年夫亡人以少艾爭娶之李剪髮自誓元季兵亂擕嗣子入華山張超谷以避難事定乃歸人竒其節洪武八年旌表馬志張氏党通妻蒲城人通亡氏年二十五孝親撫孤終身不貳延祐五年旌表馬志井氏任輝妻蒲城人輝卒氏年二十一守節事姑育子孝慈兼盡年九十餘卒延祐五年旌表馬志劉氏耀州李子和妻夫年十九死氏誓不再嫁至大元年旌表其門事姑極孝後名其里曰孝姑里續文獻通考郝氏永壽人田大妻胥氏田二妻周氏田三妻兄弟三人俱死於兵郝年二十胥年十九周年十八俱堅心守節終身不嫁延祐二年旌表續文獻通考任氏邠州人氏一家三婦俱少寡誓不他適戮力蠶桑以奉舅姑事聞並命旌表續文獻通考關氏鄜州人孫世昌妻年二十三世昌卒守志不渝六十年延祐中旌表續文獻通考王氏鄜州康德明妻年二十而德明卒半月生遺腹子撫孤守節至正中旌表續文獻通考党氏中部王仲秦妻元統間夫卒氏年十八守節五十五年賈志張氏洛川人賀敏妻年二十四敏病篤謂張曰我若不諱汝年少無子可更適人張泣以死自誓敏尋卒張即自縊明一統志明王氏秦愍王妃洪武中以死殉諡愍烈續文獻通考盧氏咸寧毛士謙妻二十八而寡守節四十年洪武時旌表馬志石氏渭南譚五妻年十七適五踰年五卒遺腹生子舅姑憫其少貧命他適氏不從晝夜䌟績孝養舅姑洪武十六年旌表渭南志左氏渭南王卞妻卞亡氏年二十六舅姑老且病氏紡績奉養後舅姑相繼亡以禮合葬鄉里稱其節孝洪武十七年旌表馬志曹氏甘泉許舒妻年十九而寡守節撫孤洪武十八年旌表甘泉志卜氏略陽人夫姓名失傳洪武初夫死守節建坊表墓略陽志周氏鳳翔焦文友妻夫亡撫遺腹子苦節自守洪武十七年旌表賈志師氏朝邑張三妻年十九夫亡守節織紡以奉舅姑洪武中旌表賈志王氏梁孝恭妻澄城人年二十生一子而夫亡奉姑育子更元季兵亂節不少易卒年六十七洪武九年旌表馬志陳氏韓城楊庸妻年二十一而寡奉舅姑甚孝舅殁祭葬以禮姑瞽侍奉益勤洪武二十七年旌表馬志馬氏孫直甫妻尚氏李琳妻俱蒲城人馬年二十七而寡尚年二十四而寡俱守節撫孤終身不二馬於洪武中旌表尚於𢎞治時旌表蒲城志李氏白水江四妻夫亡年二十五守節不二洪武二十五年旌表賈志康氏賀谷榮妻鄜州人夫亡年二十五苦節撫孤父逼令改適投崖死洪武十八年旌表鄜州志趙氏張敏道妻洛川人名金定年二十夫卒自縊以殉同里李從義妻張氏名金香年十七夫卒守節以奉舅姑洪武中俱旌表馬志張氏中部任𢎞異妻夫死一子甫十歲張撫之躬親耘耨守節三十餘年有弋貞碑記其事中部志田氏宜君寗琮妻琮中鄉試入監卒於京氏年二十四扶襯歸葬撫孤守志洪武中旌表宜君志張氏臨潼張錦女適髙陵王九成年二十而寡又張氏髙陵呉仁妻亦年二十而寡孝親撫子守節終身永樂五年旌表賈志某氏翰林程濟妻朝邑人濟教諭岳池以熒惑守心將疏論之氏諫曰天道𣺌茫君非司天奈何越職言事濟卒言之逮繫廷訊妻亦隨至京後金川門破濟從亡氏自縊死朝邑志王蘭兒蒲城人永樂間隨母育於井姓者井欲以妻已子蘭兒執禮投泉泉為之涸蒲城志劉氏西安衞千戸劉鉞女副使馬應祥妾也應祥病亡氏自縊死馬志曹氏西安左衞進士周鉞妻鉞知輝縣舟次直沽溺水死氏欲投河以殉家人密防之不得遂乃斷髪守節事舅姑以孝聞後膺旌典馮志甄氏咸寧王彦中妻年十七夫亡勵志撫孤宣德中旌表賈志王氏長武魚志敏妻志敏亡氏不食死邑令周良士扁其門長武志田氏宜君賀恩妻恩病篤氏毁容侍湯藥晝夜不懈及卒自縊以殉又同邑王氏夫死於烈火自刎而死俱旌表宜君志樊氏藍田李壽妻夫亡年二十一守節撫子正統二年旌表藍田志張氏涇陽李秉妻年二十而寡守節撫子孝事舅姑正統時旌表賈志陳氏膚施人指揮王敏之妻夫亡自縊時年二十正統中旌表又同里陸立望妻張氏年二十而寡撫孤守志呉著妻董氏夫亡無子守節終身張於正統時旌表董於𢎞治時旌表延安府志張氏鳳翔劉榮妻年二十夫故守節撫子正統中旌表鳯翔志曹氏岐山李賜妻年二十四守節教子俊官叅政正統時旌表馬志趙氏郃陽李十一妻夫亡守節又輸粟賑饑正統時旌表郃陽志梁氏洪洞主簿李官妻華州人夫卒氏年二十四守節八十三歲卒同邑兵科給事中董思恭妻姜氏亦以守節稱正統中俱旌表馬志時氏綏德王淑妻淑為寧夏守備戰殁氏自縊死宣德九年旌表淑從孫敏妻趙氏夫亡亦自縊正統六年旌表綏德州志陳氏郝郁妻綏德人年二十夫亡守志孝親撫子正統五年旌表賈志柏氏延安衞指揮時清妻清陣亡氏年十八無子守節卒年八十三後旌表清弟源妻張氏米脂序班某女母亡痛哭出血而死延綏志董氏長安縣民妻夫亡事親鞠子誓不二事景泰中旌表馬志董氏咸陽趙潤妻潤亡守節景泰五年旌表咸陽志陳氏臨潼尚書吕震妾年二十震卒守節五十餘年景泰時旌表馬志田氏藍田兀雲妻雲亡氏年二十深處閨閣至親罕見其靣常懸一鈴於門楣遇人至即避之其守身嚴謹類此景泰中旌表藍田志呉氏仇秉陵妻費氏張翼軫妻皆三原人呉年二十六而寡費年二十五而寡俱奉姑育子誓不他適呉氏景泰時旌表費氏成化時旌表又王仲禮妻任氏夫亡年二十四守節四十年三原志許氏扶風李實妻夫亡事親至孝守節三十年景泰二年旌表賈志暢氏王瓚妻王氏安志和妻俱乾州人暢年二十夫亡無子守節終身王年二十七夫亡子幼守節至七十歲景泰時同旌乾州志孫氏咸寧趙聚妻年二十六守節孝親育子天順時旌表咸寧志趙氏南鄭李原妻年二十二而寡守節撫孤卒年八十有四漢中志劉氏城固湯銘妻銘亡氏年十九撫一歲子成立守節六十三年馬志任氏商州茍珖妻年十七夫亡守節四十年天順間旌表商州志趙氏同州王琛妻琛早逝氏撫孤守節天順間旌表同州志趙孟英長安人許字王敷典未婚敷典没英同母往弔觸棺而死賈志蔚氏長安王恭妻劉氏張進妻蔚年二十八而寡劉年二十六而寡俱守節終身成化二年旌表長安志朱氏咸寧舉人趙端妻年二十二而寡養親撫孤成化時旌表賈志宋氏咸寧人適歸德趙琳琳赴京暴得狂疾夜乘馬去家人物色無所得筮之曰死矣氏為位發喪以其衣冠葬焉時年十九一子甫晬餘氏誓與兒為存亡姑老病疽氏日一舐濯之竟愈姑死葬稱子事成化丙戌有司上其節詔旌其門李東陽集杜氏咸陽劉五妻年二十守節成化間旌表馬志作按賈志長安人劉氏富平惠敬妻年二十六而寡躬紡績事親撫子成化四年旌表又張傑妻宋氏夫亡守志事親教子苦節厯四十年賈志史氏潼關呉錦妻年二十八而寡事舅姑執婦道成化五年旌表賈志楊氏藍田李俊妻年十九夫亡翁姑哀其年少竊議更嫁氏知之欲自縊翁姑聞而止教子廷實任蒿縣訓導狀上詔旌表之藍田志李氏張福妻涇陽人福卒氏年二十三守節四十年以織紡嫁福三妹撫孤成立又同邑劉釗妻寗氏馬騋妻趙氏夫亡守節不渝成化中並旌其閭馬志王氏三原申瑾妻太宰端毅公恕女弟適瑾後敬事翁姑親操井臼瑾亡九熊課子矢志栢舟三十餘年如一日兄恕為表其墓三原志韓氏舉人靳希顔妻保安人年二十夫亡撫二遺孤苦節七十年賈志馮氏甘泉鄭旻妻夫亡子幼紡績養姑成化時旌表賈志劉氏李榮妻保安孝子劉俊之妹年十八適榮甫六月榮卒氏哀慟欲殉其姑防之宻氏婉言寛慰俟姑寢縊死柩前事聞旌表又同邑王榮妻朱氏亦以守節旌馮志髙氏生員楊光諭妻寶雞人氏年二十四夫亡撫孤養母艱辛備嘗壽七十五成化中旌表賈志黃坤貞南鄭林輝祥妻年二十二夫亡撫子惟聽官至推官次惟惠亦成立年七十終始一節成化中旌續文獻通考紀氏榆林衞生員謝欽妻年十九生子甫三月欽赴鄉試卒於西安氏聞即為同窆計以翁姑嚴備乃止後翁死事姑唐最孝鄉黨師之又監生范宣妻戴氏年二十七夫亡無子孀居五十餘年與紀氏同旌表延綏志周氏靖邊營千户張鏞妻鏞亡氏年十九子潔方二歲氏撫之成立七十餘歲卒潔厯官指揮延綏志梁氏舊安邊餘丁張紀妻年二十七紀死誓以身殉戚屬防之甚宻越三日竟自縊死事聞表其里宅延安府志姚氏王英妻商州人年十九英殁撫其子成立子亦殀氏與其婦姚氏並寡居後皆旌表馬志强氏馮雷妻雒南人雷亡强年二十九撫子仕政成立娶媳張氏政亦尋卒張年二十遺子甫三歲張欲引决姑曰乃翁亡時爾夫如爾子歲汝死弱子誰依耶姑婦同節成化中旌其門賈志張氏朝邑韓顯妻邦奇祖母也年二十七顯死守節五十年有司上其事旌表又王享妻靳氏年二十七守節卒年九十亦旌表馬志劉烈女朝邑人也字里舍兒未行而里舍兒死女聞易服不食涕泣請殉乃往就諸卞偉而質焉偉曰子志甚善然太過之行如衆笑何女曰天下之理是而已矣茍心之安何恤於人言乃改女飾易婦容縊而死焉范洛集孔氏華州生員東允妻讀書秉禮允卒守節撫子子亦死偕媳宋氏撫孫宋亦克盡婦道孝事厥姑督學扁其門為節孝雙全又東野妻王氏守節五十餘年有司旌表賈志蔡氏石愷妻澄城人愷卒氏年十九生子甫六月時祖父母及孀姑李氏俱年邁氏辛勤孝養孀居五十餘年成化十八年旌賈志張氏邠州劉晰妻劉氏曹剛妻夫亡守節成化時旌表賈志劉孝姑中部劉準女準以諸生死非辜女年十六取其書焚且泣曰今若此讀書何為抱父屍而絶有司為營葬旌表馮志程氏党爵妻中部人年十九夫亡撫遺腹子漢漢又早卒與媳王氏同心守節撫孤孫繼芳母道婦儀鄉里稱焉賈志李氏高俊妻綏德人年二十夫亡自縊成化六年旌表馬志李氏鄜州王讓妻夫亡守節成化十六年旌表李氏姜耀妻米脂人耀蚤卒氏無所出舅姑欲嫁之氏曰家貧親老婦往誰奉起居乎不然從夫乆矣善事舅姑送終盡禮苦守終身有司旌表賈志張氏神木張銳妻鋭為宣府叅將正統時扈從死於紅門兒氏年二十三守節撫孤子堅仕至大同總兵延綏志趙氏内江知縣張應登妻咸陽人夫亡守節屢膺優詔同邑巴縣知縣谷賑妻王氏孀居勵操至八十二卒生員張英妻杜氏年二十六守志至八十五卒俱於𢎞治中旌表又里民魏崇儒妻許氏年十九而寡守節終身賈志王氏藍田李髙妻髙死氏年十九誓死不嫁後舅姑及夫弟李田婦劉氏相繼亡遺二弟二姪長者提挈少者乳抱氏哀毁㡬絶盡易釵釧衣物躬親舉葬事寄居母家以績絍自給悽楚萬狀孀居五十餘年藍田志史氏梁茂妻岐山人年二十五茂卒孀居數十年終無異志茂弟倫妻謝氏年二十二倫卒誓不再適並立坊旌表馬志陳氏呉四妻洋縣人夫死於戰氏哀痛自傷足不出户者三十年𢎞治中旌表賈志王氏百户王舉女也適歸德堡韋芳芳亡氏年二十生一子世江氏日夜號泣將以身殉鄰婦勸以撫孤乃止世江稍長家益貧一日屋舍焚蕩灰中得鎔金一塊鄰里以為烈火眞金完節之祥也後世江以軍功晉秩指揮又榆林衞軍郭瑝妻張氏夫陣亡守節四十餘年延綏志岳氏户部主事王璒妻商州人少敏慧通孝經列女傳及唐宋諸詩十七歸璒二十璒亡守節五十餘年病革時猶能逺聽知其所製棺為樟木蓋靜極所致云𢎞治中旌表馬志薛氏朝邑人夫亡守節𢎞治中旌表賈志王氏澄城鄭伯玉妻年十七適玉生二子俱幼而玉亡姑魚氏孀居氏承順唯謹成化二十一年大饑有勸之他適者氏以死自誓苦節四十餘年邑令旌其門澄城志李氏邠州任𢎞妻馬氏三水生員呉重賢妻俱早年喪夫零丁孤苦守節終身𢎞治中旌表賈志丁氏鄜州張顔杲妻年二十六夫故守節以死自誓年至八十又生員劉璞妻任氏年二十三而寡守節三十餘年鄉人稱之鄜州志李氏綏德衞千户王大瀛妻年二十九大瀛死遺八子俱幼家徒壁立氏守節堅苦督撫院道咸旌其閭後八子以武起家長曰威任總兵又綏德衞千户史琅妻髙氏年二十九夫亡守節至七十餘卒延綏志髙氏艾某妻米脂人夫亡氏年十六有遺腹以死自誓其父以存嗣勸之氏泣而諾後生一子撫育成立苦節終身賈志陶氏李應元妻米脂人應元宦經歷卒陶即自縊死馮志郝氏清澗生員張鳳妻年十八張氏舉人王綱妻年二十二並以夫亡守節教子領鄉薦於𢎞治中旌表賈志郝氏苗實妻清澗人太守郝安女實亡氏年二十子甫晬餘伯氏欲强嫁之氏斷髪毁靣以死自誓享壽八十一而終賈志姬氏生員劉侍妻興平人侍亡有求婚者氏斷髮自誓後姑病割股和粥以獻官府屢表其門賈志張氏臨潼李萬庫妻居西門外暴雨自驪山下廬舍為圮其翁先登樹垂手挽張張不肯從遂衝激死賈志白氏鄭鼎妻髙陵人鼎死氏年未三十守志教子子侃鄉舉官知縣正德中旌表馬志王氏朱威妻鄠縣人知縣琰之女十九歸威四年威亡生一子甫晬姑已先卒舅有側室與其二子甚不惠共欲嫁焉誘之百方王誓死不易抱哺其子竟至成立正德二年旌表馬志魏氏生員王應元妻鄠縣人元死守志不二其子生員徵妻髙氏以徵病故毁容輟餐日夜悲號成疾歿於守制之八月年十九官為扁旌曰一門雙節鄠縣志張氏三原叚顯妻年十九而寡事親孝撫子思明娶婦孫氏思明及婦又早卒遺孫三人氏紡績撫育成立苦節四十年王恕温純俱為撰文勒石三原志員氏裴昌妻渭南人氏年二十而寡姑老家貧親鄰勸令改事員以死自誓躬䌟績養姑正德十六年旌表馮志馬氏張梅妻渭南人梅亡年二十舅姑父母並欲嫁之馬乃泣誓曰我若有他天必殛我若再逼我我亦必死自是無復敢逼者馬孝養舅姑訓女教子内外稱賢年八十終正德十六年旌表馬志郭氏知縣劉廷瑚妻宜川人隨任盧氏値流宼破城同小姑丁香俱赴井死里民郭景甫妻趙氏夫亡撫幼子維聘既長遂縊死夫塜上院道旌表賈志趙氏宜川張千妻千逝氏年二十無子兄逼之嫁則以死自矢壽八十二卒院道旌表賈志作縣志千遷王氏毛雄妻鳳翔人年二十三雄病劇氏籲天祈以身代雄卒堅志守節躬紡織事舅姑教子嚴而有方孀居三十一年子鷟領薦官知縣正德七年旌表馬志馮氏生員何慮妻鳳翔人年二十五慮卒遺孤五歲舅姑在堂氏紡績供養及殁䘮葬如禮教子成立鳳翔府志劉氏李惇妻惠氏梁雲鵬妻俱岐山人劉氏孀居苦節教子憲登進士正德中旌表惠氏年二十餘而寡事孀姑撫幼子慈孝備至年六十餘終賈志李氏陳情妻南鄭人正德辛未蜀寇至李從夫避兵至漢江未渡冦忽至其夫與衆驚散氏疑夫死於水遂抱幼子赴水死賈志徐氏榆林衞應襲何承爵妻年十七歸承爵三年而承爵死遺腹舉一子氏傭紉為事親撫孤資鄉人稱為何孝婦後數年翁姑相繼亡氏荷土成墳足不出閨門者三十餘年子成立襲職千户巡撫李尚智旌之又榆林衛應襲崔鎭妻文氏年二十六鎮亡子長浩長性俱幼文撫之成立官俱至叅將又衞應襲梅禎妻黃氏年二十禎卒勵志守節翁利豪右賂欲奪其志氏力拒之不克號呼四鄰控於巡撫張縉得以節終又衞諸生趙鉉妻錢氏鉉死子克紹方四歲錢勵志撫孤克紹登正德鄉試錢以壽終延綏志髙氏李承祖妻榆林人父汝楩官薊門副總承祖隨之官病死髙遂自縊薊鎮巡按題請旌表延綏志作按神木志髙氏李承祖弟李繼祖婦繼祖卒於兄任氏聞而自縊與鎮志微異未知孰是王氏屠阜民妻興安人年二十五民故乏嗣氏誓死不食自縊者數次隣婦以翁姑無依勸止紡績事親甘貧守節五十餘年卒正德中旌表賈志翟氏興安張价妾正德中价任孟縣令卒於官氏同嫡劉氏扶柩回籍葬時自縊以殉時年十八興安志王氏生員柏壽妻興安人壽亡氏年二十一家貧甚中外無依氏守節事親有勸令改適者氏斷髮自誓孀居六十餘年疾篤不容醫診視其守身嚴謹𩔖如此賈志劉氏梁廷臣妻興安人廷臣故氏年二十一遺二孤在襁褓家貧甚舅姑欲令改適即剪髮毁靣以死自誓有豪䜿强謀奪節氏執刀刺頸血流滿地舅姑亦為感泣貞節五十餘年興安志王氏户部主事張鳳翔妻洵陽人鳳翔卒母老子幼氏仰事俯育慈孝備至又同里御史許中妻周氏亦以守節著聞官俱給廩終身洵陽志常氏漢陰温德潤妻正德末年有謝姓者鬻産得二十金被酒亡失氏拾得之翌日謝酒醒索金不獲欲為自盡計氏知急取還謝封識如故章丘太常卿李開先為作還金傳漢陰志南氏山陽太學生郭邦屏妻屏卒氏年二十子未週氏抱子泣柩前累年不衰忽有杜鵑拂其首哀啼紅血旋繞竟日乃去賈志劉氏商州貢生王懋德妻夫卒於京氏撫孤守節正德中旌表賈志周氏姚連妻廉氏李吉妻皆澄城人周年二十夫亡零丁孤苦晝耕夜織孀居五十餘年亷年二十四夫亡誓不再醮孀居六十年正德中咸加旌奬焉馬志髙氏宋堯妻華州人堯卒氏年二十服砒霜死堯弟宰妻東氏年二十五宰卒守節五十二年里人稱為雙節云賈志嚴氏華州生員適逵妻逵卒氏矢志從葬親隣咸以子幼無托勸之氏曰吾死以明志安知其他遂自縊死馮志趙氏姜溢妻蒲城人溢為山陽掾正德戊寅八月賊䧟山陽擊傷溢將掠趙去趙抱溢痛哭罵不絶口遂遇害溢頃得蘇馮志王氏户部主事李世榮妻乾州人榮卒氏年二十五惟一女屢廹饑寒堅節不渝當道命本州月給廩餼又同邑周氏錦衣衞呉珩妻珩卒於官氏年二十六擕二孤負骸歸葬事姑以孝聞正德時旌丁氏武功人喬銓妻夫卒無子守節四十年正德八年旌武功志王氏長武郭惟通之母二十而寡守節育子終身如一日邑令馬如蛟旌其門長武志郝氏生員劉矯妻清澗人通子史善楷書矯卒氏年二十七無子以死自誓壽七十三終賈志徐氏右護衞百户呉滸妻徐氏右䕶衞陳大策妻施氏生員陳大敕妻姚氏韓俱妻皆長安人徐年十七胡年二十四施年二十六並以貞操著姚奉翁姑孝養特至子詢始四歲而孤課之登進士嘉靖時詔俱旌表賈志王氏生員顔訓妻長安人訓卒氏絶食死世宗朝旌表賈志闗氏生員濮仕通妻長安人仕通故氏哀毁骨立見為仕通治槨謂其姑曰大之容兩棺可也伺間自縊死後啟箧見所製衣衾皆兩乃知其志素定云馬志梁氏胡廣妻咸寧人廣卒氏年二十一孀居四十二年嘉靖中旌表又馬自髙妻周氏夫亡無子守節終身于廣福妻張氏年二十九史炳訓妻李氏年三十皆以守節稱李壽至七十卒賈志沈氏咸陽楊光斗妻年二十四甘貧守節撫孤鑨成立娶閻氏鑨又早亡閻守志撫子入黌序沈壽八十九閻亦七十卒河東李楷有世節詩序又陳經諒妻武氏年二十四韓澍妻王氏年二十九俱以守節著聞咸寧志常氏咸寧正誼女幼嫻女訓未及笄失怙哀毁㡬䘮明適翁氏事舅姑如事父母祖姑髙氏少寡守節壽八十五齒落不能嚙蔬果常每善調甘脆百方頤養髙語曰汝孝非尋常所及願汝生好子孫報汝後果衣冠不絶咸寧志葛氏興平生員閻伯仁妻夫䘮三子皆諸生相繼殂逝葛率諸婦守節終身邑令章評表曰一門四節興平志陳氏閻臣妻臨潼人臣病死陳悉力營葬事葬時自縊死馮志宋氏臨潼楊斯條繼妻年十四歸斯條甫半載夫亡持節四十餘年撫前妻子不異所生厥子亦敬事之終身無間焉臨潼志邢氏髙陵張得祿妻得祿死河州邢哭㡬絶舅姑欲奪其志邢曰婦事二夫禽獸行也使其無子尚不忍為况有孫可守耶後從叔妻龎氏隣人王鋭妻宋氏皆以新寡遇荒年不安其室謀諸邢以圖存邢曉之切至龎宋感其言皆守節無二髙陵志髙氏羅季士妻鄠縣人季士知永和縣氏適季士方八月而季士卒氏苦節二十餘年又里民曹曰龍妻王氏年二十三守節撫孤有求婚者氏持刀擕子以死自誓當道給糧旌表賈志張氏劉和妻韓氏趙玘妻涇陽節婦也張年二十五而寡事姑以孝聞姑殁三日不食孀居五十八年韓氏年二十五守節紡績以事舅姑取木葉野菜以自給孀居四十七年俱旌表馬志祈氏王朝妻涇陽人守節撫幼子値歲儉家人私語曰生之弗謀何節之顧氏初聞痛哭以頭觸柱曰吾忍死稱未亡人為王氏一凷肉耳令吾志不白者吾頭且與柱碎矣家驚起持止左靣青痕終身人謂烈氣所凝嘉靖二十年旌表馮志白氏涇陽舉人張朗妻朗因會試死於途遺子方七月氏年二十二孝事孀姑撫子成立嘉靖間有司表其閭又里民何瑚妻宗氏夫亡撫遺腹子成立至七十一終事聞旌表涇陽志何氏涇陽魏潔妻潔遊梁呉間何氏朝夕奉姑趙氏自上食歲時衣服皆希意先為之後姑老病癰親嘗湯藥起居扶侍夜即卧榻下如是者二年姑視之猶潔在也氏善自治生晝夜操作不怠嘉靖三十二年卒子學曾官至兵部尚書丘隅集閻氏涇陽周仁學妻年二十學亡親饋食於穿穴者語之曰穿必大其壙穿穴者應且笑謂少婦將欲從夫地下乎葬之先一日自經死涇陽志商州民盧清妻韓氏耀州生員成紹妻安氏俱夫亡製大棺棺成二氏皆自縊死遂合窆焉馬志李氏涇陽吕柟妻事繼姑侯氏甚謹躬操薪水朝夕上食每恨不及事嫡姑宋氏遇忌辰或悲思泣下翁姑卒時並哭至痛毁瘠撫叔氏遺孤成立為之娶叔氏子媳皆母事之壽七十二嘉靖三十三年卒丘隅集楊氏涇陽秦某妻關中饑饉盗賊横肆氏墜樓不死投井死雷禮吾女年十二避兵於樓從樓見被掠者醜之墜樓死雷氏適韓某早寡而貧兵至擕孤避樓上樓䧟棄孤亦墜樓死又有王三逺為人傭耕其妻兵欲汚之紿曰閉門投井竟死井中艾陵文鈔吕氏三原張鸞妻鸞卒吕年二十撫孤尚永克㡳成立娶常氏尚永亦早卒姑婦同居邑稱雙節常卒子元琛廬墓三年有司以節孝奏允旌表馬志王氏名蘭卿本娼家女盩厔張附翺妾翺為青州府推官病卒氏服毒以殉馬志辛氏王君玉妻任氏何器妻俱盩厔人辛年二十五甘貧守節六十餘年以子貴贈孺人任年二十三苦志撫孤至九十七終俱旌表賈志魏氏盩厔呉鈞雷妻夫死氏年二十二家貧甚織履以自給遺孤增光擇師教之登嘉靖辛酉鄉試為廉吏何司空表其里曰栢舟嫓美又諸生呉養蒙妻何氏王九功妻趙氏成九叔妻王氏俱無子守節終身盩厔志李氏張定妻渭南人年二十六定亡無嗣兄嫂納求者賄誘之百方不能奪氏素孝謹得舅姑心為立嗣終志及舅姑殁嫂奪其繼嗣備極困辱李志益堅嘉靖二十二年旌表馮志安氏張猷妻渭南人猷亡即自縊以殉嘉靖三十二年旌表馮志杜氏馬璉妻渭南人璉早亡杜營葬畢即自縊渭南志竇氏韓能妻惠氏劉五妻仇氏强果妻俱富平人也竇年二十五而寡事翁姑以孝聞孀居三十八年惠年二十三守節終身仇夫死無嗣守節至七十餘卒賈志楊氏李彦章妻富平人章亡紡績以鞠幼子姑憫其貧苦勸改節氏不可嘉靖乙卯饑巨室謀娶之氏皆痛罵慚去鄰婦哀而與食亦不食遂與子並餓死馮志常氏延安衞沙繼勲妻勲早亡氏年二十餘刻木於室事之如生垂四十年延綏志渭南王提衡妻張氏夫亡守節自塑夫像朝夕哭奠鄉里稱焉渭南志李氏楊于喬妻膚施人夫亡氏年十八欲以死殉家人宻防之成服畢暗入夫書室内自縊死嘉靖中旌表賈志李氏焦子學妻延長人夫亡撫孤辛苦萬狀嘉靖中奏聞建坊又董惟新妻王氏諸生李鏜妻趙氏並以年幼䘮夫撫遺腹子成立而王氏則䝉督學旌表焉賈志田氏鳳翔人田璋女適庠生杜文文早逝氏年十六子孟春甫兩歲教育成立翁姑相繼卒氏竭力以禮殯葬其兄勸其改適遂終身不登兄門嘉靖中旌其廬鳳翔縣志朱氏副千户應襲郭文妻鳳翔人年十七夫卒撫子成立子亦早卒媳周氏有遺腹子欲墮之他適朱百方調䕶郭氏之宗賴以不墜嘉靖中撫按旌表又邑庠生王某妻周氏夫亡守志撫子應元方二歲後以子貴贈孺人鳳翔府志劉氏鳳翔民李正芳妻年二十九守節奉姑姑病篤氏焚香黙禱願以身代姑尋愈人以為孝感所致事聞旌表鳳翔府志李氏岐山楊桂繼妻桂前娶生子三歲氏生子甫六月桂卒氏年二十四家計貧苦紡績自給撫二孤成立人皆不知為異出壽八十卒岐山志雙烈女者扶風張文玘之女文玘三女長名存兒次名桂華皆及笄季名𤓰女未笄里中惡少杜景花瞰文玘夫婦往田乃潛入求合逼其長者脅以白刄長不從殺之繼侵仲仲又不從亦殺之並殺季女以滅口殺而未死遂明其事萬厯時建坊旌表扶風志董氏胡宗顔妻扶風人夫亡年二十一甘貧撫孤五十年嘉靖中旌表又通判胡宗儒妻髙氏年二十四守志撫孤勤苦七十年撫按俱旌之賈志劉氏郿縣生員王麟妻嫁踰期而麟物故劉年二十五義不他適孀居教子六十餘年邑令旌表其門􅔛志王氏唐祿妻南鄭人祿故氏年二十七家貧鬻衣營葬誓死守節以紡績撫教二子成名孀居四十年又生員强振妻田氏振卒氏年二十遺孤一歲甘貧苦節四十餘年嘉靖中俱旌表馬志余氏褒城諸生馬安然妻年二十餘夫死遺孤甫八月撫摩成立為諸生旋又死復與婦撫諸孫年六十一卒褒城志方氏城固生員杜臣妻年二十三臣亡氏慟哭眥盡裂撫二子曰汝父死我不當生汝等在我又不當死忍痛存孤年七十九終城固志夏氏王善繼妻城固人年二十五夫亡撫遺孤與貧甥党傑一體教育俱得成立輿論美之賈志張氏庠生叚平妻洋縣人年二十而寡撫育遺孤自以詩書訓其子守節三十餘年嘉靖間建坊旌表洋縣志王氏呉天爵妻洋縣人年二十夫卒無嗣孝養舅姑舅姑殁廬墓三年築土成墳嘉靖中旌表節孝又楊仕妻王氏年十八夫亡家勢剝落撫育遺腹子竭力以事舅姑督學楊守謙表為節孝賈志陳氏西鄉符鉞妻年二十而寡事舅姑曲盡孝養壽八十五卒又張氏閻朝順妻年二十九而寡後三月生遺腹子家苦貧矢志不渝事聞並令建坊旌表西鄉志蔡氏太學生駱文彦妻寧羌人文彦遊太學氏傾奩給之年二十六彦逝一子甫數月家貧塵釜斷炊晏如也拮据撫子入泮子旋殀亡復撫二孫壽八十餘卒漢中志張氏鈕尚忠妻寧羌人聰明能文年十五夫故無子矢志守節善事翁姑嘉靖中奏旌其門賈志劉氏陳寛妻榆林人年二十七寛病語曰吾死後幸無他適劉應曰諾寛死遂自經柩前事聞詔旌其門曰貞烈馬志馬氏榆林衞千户張秉元妻秉元卒氏仰藥殉廵撫楊守謙捐俸葬焉旌其門曰貞烈榆林衞餘丁趙􅢫妻薛氏􅢫卒氏自縊死廵撫張問行旌其門延綏志趙氏榆林衞百戸王勤妻勤禦賊於建安堡為賊所殺氏聞之痛哭三日不食自縊而死時號為雙節詔旌異之馬志張氏榆林人總兵姜奭妻邊氏榆林衞應襲白豸妻俱撫孤守節四十餘年榆林衞舍餘馮敖妻麻氏年二十七敖死奉姑甚孝自以詩書課二子嘉靖中長子時吉領鄉薦延綏志李氏榆林衞指揮呉秉懿妻夫卒即飲藥死家人救之復甦自是茹檗自苦每晨起焚香禮觀音祈作清凈身聞者嘉其苦節又本衞武舉田畬妻史氏畬死撫幼女守節家貧無倚親屬周給多却而不受嘉靖中遭歲凶數日絶糧母子閉門待斃巡撫張珩聞之月給米贍焉又衞民李友梧妻陳氏年二十八夫亡家苦貧氏上奉姑嫜下撫幼孤備嘗艱苦年七十二卒巡撫張珩表其門延綏志丁氏太常丞紀世梁妻榆林人世梁卒丁無出有三妾各舉一子丁躬親撫鞠恩義備至三妾亦同以節稱諸子相繼登科第又榆林指揮謝戭繼妻唐氏戭先妻遺三子二女唐恩養備至戭卒長婦紀次婦田俱少寡唐率二婦守節者數十年又鎮羌所應襲張傑妻李氏年十九寡無子苦節五十年延綏志蕭氏王正蒙妻平利人䝉亡三日自縊死嘉靖四十二年也馮志黄氏張必竒妻漢陰人必竒病篤氏以無子許與俱死及卒營葬即為雙墓既殯召族人至盡推家貲散之以鐵斷門不食十二日死時嘉靖四十年也馮志白氏漢陰生員王一鳳妻年二十四鳳亡孝舅姑撫幼子苦節五十年又張世華妻陳民年二十七甘貧苦節四十七年里民劉仕倌妻王氏亦守節四十年賈志劉氏雒南生員李翠妻翠娶劉之夕夢門𥪡聯曰美玉輝光揚萬里眞金鍜鍊歴千廻後翠卒劉年二十三誓不再適舅姑欲奪其志氏佯許之至夜自經死有司以聞建坊旌表時直指贈聯即前所夢之句云事在嘉靖三十六年雒南志冀氏雒南張見龍妻年二十七矢節撫孤三十年其伯嫂郭氏仲嫂李氏並守志不貳里人稱之賈志翟氏雒南人夫亡典簮衣以供葬事遂自縊於墓側越三日靣色如生香氣芬襲事聞建坊旌表賈志巧兒王璋女同州人受州人長黑流聘未行而黑流死璋與妻往吊女遂自經於室與黑流同葬焉嘉靖二十五年旌表馮志閻氏任世威妻朝邑人嘉靖中世威病死舅姑利人聘以計强載其家氏不勝憤以被蒙靣自刎死又張騰霄妻王氏徐福妻岳氏韓廸妻楊氏王來召妻梁氏皆夫亡守節並膺旌典朝邑志党氏羅詢妻朝邑人嘉靖二十二年大饑窮民劉曹邦等為盜掠詢及富民數人於河濱盡殺之還刼其室詢子亦遇害氏匿積草中免後事寧諸被殺掠者皆畏不敢言氏獨憤訴當道初不為理氏愈益憤恨至以豕穢塗口靣肩夫脛骨號泣道旁寃聲動市人官為捕作亂者二十人置之法賈志李氏朝邑錦衣衞總旗李德澄女也父卒獨與生母張氏處烈女覺其汚也痛父無後哀母無依大哭三日服毒死時年十四苑洛集雷氏大名府同知雷爵之妹適朝邑韓繼宗年二十五繼宗卒遭繼姑之虐怒輙以簪刺其股肱流血淋漓又遭惡叔凌害百端晝理生事夜則閉門痛哭徹夜有司上其事勅賜旌表苑洛集許氏韓邦仁妻年二十四夫卒無子家用不足辛苦萬狀廵按下所屬辟節婦朝邑以十人應命巡按取年最少而無子者三人許氏其一也苑洛集屈氏朝邑韓邦靖汝慶之妻華陰都御史屈直之女也生十餘歲其父課諸兒讀經史安人刺繡其旁竊聽背誦通曉意義汝慶髻年以神童名弱冠舉進士與安人稱雙璧詩文倡和如良友焉汝慶早歿安人後十四年而殁有女異痛其父母繼亡父集既梓而母詩不傳以書貽滸西康太史之女為母詩乞序其詞酸楚願借皮為楮削骨代頴以傳母集太史感而為之序謂有女如異五泉子未為無子也列朝詩集小桂韓城烈女小桂劉氏伶籍也誓願從良每伶氏問聘輙涕泣不食既長復有伶氏來問父母納其聘擇日將歸小桂知不能已大哭服毒死苑洛集秦氏李光被妻郃陽人光被病篤秦許以死殉被曰若苐紿我耳秦曰妾請先君死頃之秦果死後八月光被死時嘉靖丙辰歲五月也馮志馬氏澄城亷仲祥繼室也年二十八亷亡氏撫育前妻子介過於所生曰非此無以承宗祀也茹苦含辛年踰七十未嘗一日去介介亦忘其為繼母也又孫氏同邑白洪妻洪早卒氏孀居四十餘年處妯娌以和睦育夫弟女如己出厚粧歸之邑令敖左並旌其門澄城志王氏韓城傅傑妻慶陽眞寧清江提舉司道女聰慧貞靜甫八歲授以内訓諸篇輙穎悟既歸傑姑李卧病十餘年侍奉周旋順適無方教子學禮幼出就外傅入則自示之以禮夜則口授句讀又親札影本以課倣書後學禮既登仕籍家稍裕氏尤以周貧濟急為務年七十一卒贈宜人苑洛集康氏武功康大史長女也通經史大義歸華州張之榘嘉靖丙戍榘卒氏守節撫孤四十年有司旌其門賈志東氏華州諸生李子健妻歸健方九月而健卒遺腹生子守節撫孤有司表之里民劉朝妻王氏年二十守節五十三年王錦繼妻陳氏守節四十餘年又李道妾陳氏道卒撫子聘又早卒洎婦劉氏撫教二孫以織絍自給苦節五十二年婦亦守節二十年賈志徐氏陳大宗妻張氏柴良妻黃氏楊信妻皆華陰節婦也徐年十九守節至八十七終張年二十三守節繼姑謀逼之氏引刀截髮逃父母家守節四十六年黄氏夫死亦守節不二嘉靖中撫按同旌焉賈志馮氏周儀妻同官人儀卒馮慟甚不食欲死家人强灌之則囓其杯破曰我自安此奈何苦我至六日不死乃自縊柩旁馮志景氏和順知縣白水武定繼妻定前妻遺一子尚知方五歲定殁時景氏守志撫孤視如己出延教勤劬俾至成立時稱繼母之賢賈志劉氏邠州進士席勤學妻王氏楊宗仁妻夫亡守志嘉靖時旌表馬志楊氏武功康栗繼室年十七歸康明年康遘疾不起氏堅心以死殉晨起紿言渴索醯湯飲砒三兩乃登厠歸又索醯湯令極熱連飲之姑入見其色大驚搜其袖遺砒在焉以藥與之不納逼之曰已矣吾所為以死為樂以生為苦也奈何以苦事逼我啟篋出衣皆手製以送死者為著之著畢而絶王渼陂集康氏武功郎中康汝女適靈寶生員楊宋宋疾康許殉舅姑百諭不能解乘間吞砒礵而死有司奏聞旌表馬志景氏馬萬衢妻柴氏康滿妻俱武功人景年二十三夫死守節三十年嘉靖十三年旌表柴年二十六夫死守節四十餘年嘉靖十七年旌表又張膍妻楊氏年二十五而寡守節三十年亦旌表馮志王氏武功郝讓妻讓少失怙母武氏年二十寡居辛苦萬狀至讓成立為取婦有子子夭讓亦卒其姑及王氏親黨皆勸之嫁氏曰姑昔値舅亡盛年艾容誓死不適人者為讓耳讓今不幸死無能終養妾忍更他適耶堅意自守力作養姑終身不衰又同邑李銳妻夫亡貧無依挈女居族兄家以織絍自給女既嫁壻復死乃更與女居節操凛然㡬四十年有司以聞於上云武功志齊氏淳化監生郭縉妻夫亡無子縉有二妾各生子俱改適齊年二十七以死自誓撫育妾子俱至成立嘉靖中巡按給帛米知縣題表其門又邑庠羅九淵妻袁氏年二十八夫卒甘貧撫孤年七十卒貢生羅雲鳳妻鄧氏年未三十苦志撫孤邑令並旌其門又里民王彦學妻楊氏夫亡守節撫孤至年七十卒子永壽嘉靖癸卯舉於鄉生員羅天祐妻郭氏夫亡守節三十年嘉靖時旌表淳化志王氏鄜州柳輴妻生女名瓊女年方十六嘉靖癸丑冦至諸婦女相與謀曰如為賊掠若之何瓊女曰惟死耳賊至女痛哭大罵伏地不起賊知不可奪殺之王氏尚抱幼男賊以皮索欲引去亦落崖死之後輴數日還收子母屍葬之其色如生又吉孝妻王氏亦為賊所掠氏罵不絶口賊怒殺之鄜州志忽氏中部舉人劉侃妻侃卒有子甫二歲忽自經柩前姑張氏泣諭曰孺子絶乳是斬夫嗣也忽氏乃撫孤守節厯五十餘年撫子芝成鄉進士嘉靖中芝自疏母苦節以聞詔旌其門賈志郭氏綏德衞指揮陶輔妻正德四年輔陣亡氏撫孤子世臣植節四十餘年綏德衞百户余林妻柳氏林戰死氏守節四十年巡撫楊守謙旌其門延綏志張氏喬遷妻葭州人年十八夫亡事孀姑盡孝姑有疾籲天祈以身代撫藐孤成立遊宦厯有政聲卒年八十六旌表賈志白氏廣威將軍鄭紀妻神木人夫死即自縊賴救不死跪泣柩前晝夜不起飲食不進七日死又髙氏神木趙元妻嘉靖五年元陣亡氏即柩前自縊死通判莞顔旌其門神木志劉氏長安馮友繼妻河南衞輝通判璽女也三歲喪母即知哀慕長事繼母邢媪甚孝適友奉姑田氏色養備至比臨終執氏手連呼曰我孝婦我孝婦云友官保定府同知致政歸前妻瞿氏父母貧甚氏為衣食之終其身以禮葬焉撫育諸從子女婚嫁悉厚遺之恤貧睦族備致其誼隆慶己巳四十六卒馮少墟集賀氏咸寧舉人趙斌妻斌死京師氏聞訃痛絶誓以死殉一日紿女取水遂自縊女亦奮投井中鄰人救免隆慶初旌表又黃運煜妾杜氏夫殂縊於柩前直指旌其門賈志許氏郭民德妻魏氏王施義妻張氏李宗儒妻員氏張崇祿妻劉氏王猷妻皆咸陽節婦也許氏年十九魏氏年二十並守志不二張氏員氏俱二十一而寡守節至五十年劉氏痛夫早逝茹蘖餐氷以終其身賈志宋氏張綸妻臨潼人綸死遺子女皆幼家貧甚氏甘貧守節叔翁逼令改適氏仰藥死里人傷之賈志劉氏臨潼宋瑗妻年十六適瑗踰六載瑗故守節四十餘年又張廷舉妻趙氏舉亡孝事翁姑守節五十年邑令旌表臨潼志王氏髙陵蕭憲妻夫亡氏矢志不貳子生員韶亦早卒妻髙氏同姑守節隆慶三年春旌為一門雙節婦續文獻通考王氏張文囊妻鄠縣人年二十三文囊病卒遺二孤俱在襁褓氏堅持貞節撫育成立當道給月糧旌表壽八十二終鄠縣志李氏舉人張初妻鄠縣人夫卒氏年十九子女無出日夜哭泣焚香告天誓不他從守節四十餘年事舅姑以孝聞賈志馮氏生員史宗直妻鄠縣人年十四歸直五年夫亡氏不食數日卒遺女甫一歲後三年忽奔哭於父母墓上家人抱之歸而氣絶人以為史氏節孝焉鄠縣志王氏涇陽縣民任盡孝妻夫亡守節隆慶元年旌續文獻通考吉氏盩厔武崇乂妻崇乂病尫數月氏夜不解衣目不交睫及亡絶粒數日不死解腰絰自縊絰又絶乃飲鴆死又劉氏同邑舉人張學詩妾學詩病死氏哀毁不食每哭輙絶而復甦若是者累旬家人防之宻不得死乆之防者稍懈遂潛啟柩帷自縊死盩厔志李氏延西衞生員張世勛妻世勛早故李誓不再適隆慶元年旌續文獻通考湯氏李光達妻膚施人十九而寡碎首刺目欲以身殉父母止之氏晝夜泣於柩前一日若見夫以車來迎溘焉而逝即同葬焉賈志呉氏劉啟業妻鳳翔人十六守節以織紡養姑姑殁喪葬盡禮卒年七十八申請建坊月給米布仍免其差役又同邑彭彦妻王氏夫亡撫子子復夭遺腹生孫媳復改嫁氏孤身以織絍撫之至於成立賈志宋氏岐山諸生張邦祚妻年二十夫卒誓不再醮以織紡自給年七十卒又楊棟妻宋氏夫亡守義以死自誓甘貧撫孤邑令馬彦卿並旌其門岐山志彭氏張附鳳妻寶雞人鳳任通判卒於官氏年二十四哀慟㡬絶生遺腹子誓以死守艱辛萬狀壽八十卒寶雞志彭氏寶雞强時修妻年二十三喪夫守節五十六年選貢强時進妻李氏年二十九喪夫守節五十一年院道扁曰一門雙節寶雞志髙氏寶雞諸生楊邁妻年十八夫亡翁姑俱老紡績供養三十年洎殁喪葬如禮又高氏同邑諸生强吉妻年二十夫亡守節四十八年院道俱表其門鳳翔府志李氏生員尹來聘妻南鄭人夫亡氏年二十九孝養翁姑殯葬如禮教子作賔登鄉試官通判壽八十有五賈志任氏賈廷臣妻洋縣人臣亡氏年二十六無子勵節孀居紡績以自給五十年如一日隆慶中旌表賈志楊氏畧陽庠生劉恢妻讀書明大義勸恢力學恢卒氏年二十生子栢舟自矢奉文旌表歲加給䘏縣志李氏榆林衞千户姬曉妻曉母病卧榻者三載氏事之甚謹鄉人稱為孝婦嘉靖初曉隨征大同死於敵氏年二十九遺孤爵方二歲氏撫之成立守節至七十八終又衛指揮傅潛妻張氏潛戰死氏守節三十餘年巡撫何東序表其門延綏志李氏商州人邵可立母翁老患癱姑殁六子俱貧營生於外氏晨昏供養數載不渝子可立登進士官至方伯商州志楊氏王思謙妻朝邑人夫亡誓不他適舅姑屢欲奪之故食以糠粃氏守益堅隆慶己巳舅姑陰納任姓之貲立逼就車氏抱幼子痛哭曰吾舍汝去矣遂自縊死賈志魏氏趙大彦妻郃陽人彦病殂氏自經死賈志陳氏杜冕妻澄城人冕任眉州判卒於官氏年二十七扶櫬歸家家計益索饑饉相繼堅貞茹苦四十餘年邑令陳力旌其門澄城志趙氏韓城晉四妻四死氏年二十二子昭方在抱兄弟欲嫁之氏矢志不從食貧撫孤每汲水河上必負其兒至水所則置之平地上汲已並負而歸率以為常後子生孫五人曾孫繁衍澄城志王氏蒲城張良玉妻年二十六夫亡無子盡以家事付仲兄自鎮閉一室蓬首垢面不與人接止留一婢一婦為炊助後以疾終鄭傑妻党氏年二十夫卒剪髮自誓以織紡養親撫遺腹子有成賈志雷氏同官馮宣妻宋氏王民妻王氏孫守忠妻俱早寡守志嘉靖時同旌又習啟䝉妻龎氏夫亡年二十一上事翁姑下撫遺孤艱辛萬狀至八十二卒有司旌其門同官志楊氏白水生員許昌言妻言故氏年二十一一子尚儒方在襁褓翁姑相繼亡仲兄利其産欲奪節氏坐卧佩刀以死自誓後尚孺及孫性皆補弟子員氏年八十卒白水志景氏邠州民池鳳鳴妻鳳鳴疾卒景氏矢志不貳以壽終隆慶四年旌續文獻通考張氏神木生員劉祚妻夫亡年二十四甘貧守節撫子克篤成選貢任蘭陽縣丞里民單汝科妻李氏年二十八夫故守節五十八年子單濤授秦府典儀兩院旌表給米帛焉神木志劉氏生員楊楠妻長安人楠卒氏視棺歛畢即入室自縊死萬厯中題旌賈志朱氏晉以正妻長安人以正卒氏年十九子幼孤寠以䌟紡自給守節四十九年巡按金毓峒特疏請旌賈志吕氏長安張濟妻濟亡氏年二十一遺孤甫二歲舅姑欲奪其志氏矢死守孤五十七年奉文建坊旌表孫鳳翼官潯甸太守人謂苦節之報云長安志馮氏長安從吾女生而言動不凡六七歲聞從吾讀書聲即願聽時或問其大義長適咸寧庠生王紹經相對如賓談必以道義從吾奪官歸家人有私悔從吾多言者氏曰士君子立朝不如此安所稱臣節從吾向紹經曰從此歸山惟有着實講學共肩斯道氏應曰父平日不曾虛講如何至今才去着實從吾聞之􅋏然其事祖姑及舅姑事無巨細無不殫力萬厯丁酉年二十二卒馮少墟集龎氏咸寧進士楊重熙之繼母也重熙生七歲而失其母蕭九歲而失其父翀氏適翀僅浹歲子女無出而翀卒氏撫棺且泣且誓曰傷哉天乎未亡人不難從夫於地下第有此孤在耳所不撫摩此孤而有異志者有如此棺于是茹荼孤闈㡬三十年以壽終至今鄉族稱慈繼母者必於龎母焉馮少墟集李氏咸寧王用相妻用相卒氏年十九生子方五月苦節自誓事翁姑存殁盡禮隆慶間採入世廟實錄萬厯三十三年賜粟帛旌其門壽九十卒又邑庠生曹言妻黃氏年二十一言亡哭踊不食誓以死殉翁姑泣諭始進饘粥撫孤成立守節四十八年道府咸旌其門又里民馬遵賢妻楊氏夫亡無子以守節著聞咸寧志韓氏咸寧人孝亷李昌齡祖母十五歸李孝養備至撫孤昌齡至通籍更厯艱辛屢經禍亂不少改文翔鳳有傳賈志許氏趙良漢妻咸陽人夫亡守節撫前室子與生子無異家貧矢死靡怨言萬厯十六年建坊旌奬馮志翟氏興平諸生楊休母年十八守節王某妻孔氏年二十守節又里民王璽妻姬氏亦二十守節家貧織絍為生萬􅔦中並旌賈志任氏臨潼趙仕東妻年二十三夫故無出誓不再嫁以紡績事舅姑苦節四十餘年邑令表其門又王務賢妻張氏歸三年而夫故有富室求娶氏舉刀自誓守節終身臨潼志趙氏史鸞妻臨潼人年二十夫故守節六十餘年其子永壽亦早故妻王氏年二十七守節三十餘年孫講又早逝妻潘氏亦守節三世貞操閭里重之賈志牟氏臨潼冉天敘妻年十八夫亡遺腹六月有巨室以多金賂婚氏剪髮毁靣以死自誓壽九十四卒冉一清者天敘堂弟也妻方氏年十六無子而夫卒哀痛欲自縊里黨為慰曰若死易耳如舅姑何乃擇族子士秋嗣之泣曰吾撫此奉舅姑生無愧於嫂牟死亦有以見冉氏兄弟於地下一門雙節鄉里重之縣志姜氏臨潼庠生王汝松妻夫故守節撫孤備極荼苦其父葢渭南孝亷早世無子母强氏伶仃孀居五十餘年而長女適蒲城張某亦少寡守義人謂其一脉貞操所遺云臨潼志周氏舉人王廷金妻臨潼人嘉靖中廷金就試禮部殁於旅舍氏擕幼子扶櫬歸守節終身賈志張氏王渼妻鄠縣人渼病誓與俱死及卒氏哭之正寢抵暮入室飲藥死事聞樹碑表其墓張太微為述烈婦傳鄠縣志仝氏李勤妻鄠縣人夫故氏年十八家甚貧遺孤未三月氏勤績絍奉孀姑姑稱其孝既殁竭蹶庀葬事成禮厥子亦成立鄠縣志榮氏藍田諸生張廷妻年二十六夫故遺孤甫三月姑及夫弟相繼淪亡榮力舉四喪紡績撫孤壽七十終有司旌之里民榮肇端妻韓氏孫澤妻李氏藺承賜妻謝氏皆守節終身賈志葛氏生員閻䅐妻藍田人年二十一䅐殂五日不食死萬厯二十六年旌表馮志樊氏藍田生員李髙枝妻蘇氏劉弟妻俱年二十五夫亡守節樊氏家苦貧以紡績撫孤壽七十卒蘇氏撫遺腹子成立壽八十餘當道賜粟帛給匾旌之藍田志張四桂涇陽張倉女倉早故四桂與母李氏居年十八隣惡少王宰以言挑之四桂心畏惡宻以語母已而母之田間從外扄其户宰知踰牆入强之四桂據炕欄欄毁身終不移宰用鍤斷其頭而去萬厯間崇祀烈女祠賈志張氏涇陽生員劉源潔妻年二十夫亡撫幼子丕基躬操蠶織娶媳魏氏丕基又早逝魏氏年十九欲死殉自以有疾當醫宻置砒藥器中將飲張氏覺即舉器碎之因泣曰癡兒何至是汝既有志偕吾守節可矣姑婦共守張六十餘卒魏七十餘卒又楊氏里民王元登妻段氏張友顔妻夫亡年少至戚勸以改適楊正色拒之段囓指以誓楊年八十二卒段守節三十八年卒涇陽志王氏涇陽諸生張紹祖妻年二十一夫故痛哭不食七日死魏龍光妻王氏年十九夫亡誓以必死舅姑極力勸慰厯一年値夫忌辰潛入室投繯死萬厯間並建坊入祠涇陽志李氏孔有孚妻三原人有孚諸生卒無子舅姑欲奪其志李以死自誓事舅姑益謹氷操五十餘年又秦岷妻王氏年十九夫亡繼母欲嫁之氏不從家貧績絍自給處之怡然萬􅔦中並旌馮志崔氏郝緒妻三原人夫亡家貧聞議婚者泣曰吾寧餓死誓不他適逾年竟餓而死里人立碑以表其節三原志王氏焦應選妻三原人事舅姑以孝聞夫亡守志聞父母將有别議乃囓指誓天欲自刎父母懼而止甘貧敎子子源溥成進士時同邑温誥妻韓氏年二十五守節撫孤四十年三子亦成立萬厯中並旌其門賈志劉氏三原秦根立妻年二十一夫亡取兄子為嗣尋亦早喪止遺一孫未離襁褓氏撫育成立孫復先亡氏偕孫婦共撫曾孫三世保孤遭逢尤困憊云又秦鍾莪妻張氏夫亡守節事翁姑克盡婦道萬厯中縣旌其門岳文魁妻梁氏年二十八夫喪長安扶櫬歸葬守志終身年七十六卒孫暎斗官翰林學士順治中旌表三原志王氏何大錢妻盩厔人年十七夫卒氏囑治墓者令容二棺發葬之辰自經柩側遂合葬焉賈志王氏張實妻盩厔人年二十二實卒無子家人勸更志氏囓中指誓不他適年九十三卒奏聞旌表賈志張氏渭南兵部主事劉鳳池妻也年二十五夫卒無嗣翁姑又先逝家徒壁立日居一敝樓足不踰閾者三十年縣民田守廕妻南氏年十六歸田六月而寡苦節四十餘年事翁姑以孝聞南軫妻武氏年二十四夫卒撫遺腹子企仲舉進士養舅姑以壽終萬厯時三婦俱加旌奬焉賈志較氏雷同妻渭南人適同時年十七隨同客居鄖陽同病卒無子一女在褓氏水漿不入口者三日扶櫬還葬叔翁轟吞氏産業幾盡復受張姓者賂為奪節計氏破靣剪髮以禦乃止一日自備衾木謂女曰往吾不死者以翁姑與若耳今翁姑就窆若又嫁此吾報夫地下時也絶粒數日而死萬厯中詔旌其門又東氏邑庠南養仲妻養仲亡氏年十八絶粒死又王氏邑庠曹鴻宇妻夫病籲天祈以身代及卒取兄子為夫立嗣畢自縊死知縣楊所修碑其墓賈志楊氏富平王志才妻年二十才亡遺腹生子氏堅志撫孤終身不出閫域賈志惠氏富平孟學孔妻萬厯間學孔為寧夏撫吏病卒氏候喪至葬祭禮畢即更衣自縊時年二十四事聞旌表又李㠋妻王氏萬厯中甫適㠋即病垂年病益篤王料夫必不起遂自經後園中頃之㠋甦婦已不救矣崇禎元年旌表富平志王氏張汝清妻醴泉人年二十六夫亡遺子二女一撫教以禮其後五世同居不言分析皆氏之家法賈志南氏醴泉諸生任引妻年十七守節七十年弟孝思妻劉氏亦早寡守節兩院並賜旌表舉人韓景妻袁氏年二十六夫故孝姑撫子孀居三十餘年有司表之又王橋妻陳氏生子方三日而夫故奉姑育子百苦備嘗表其門曰節孝曹登妻閻氏曹科妻張氏俱無子苦節終身表曰一門雙節又郭廷信妻髙氏夫亡後四月生遺腹子撫育成立鄭克勤繼妻程氏痛夫早逝撫前妻子如己出子感其慈亦克盡孝張桂妻晁氏劉業妻陳氏王廷坤妻髙氏俱芳年守志誓不二天有司咸加旌奬焉賈志李氏醴泉雷景妻夫早故守節家貧忍饑至死縣令姚燭旌其門又王大吉妻張氏年二十夫故家貧氏晝耕夜織遇歲大祲飡糠粃蕪菁以育孤苦節四十餘年醴泉志馬氏延安衞張世功妻綏德州侍郎汝驥女也年十九世功亡三日不勺飲且治凶器欲同死以親族勸止畢志守節至八十餘卒院道旌其門又延安衞百戸王國正妻李氏年二十九夫亡哀泣㡬絶水穀不入口者數日將死殉親鄰以撫孤勸之乃止卒撫子建德列黌序延綏志杜氏延安人贈特進漢之長女也年十六歸鎮撫丁一元相敬如賔乆而無子杜為置二妾服御一與已同妾生二子而一元卒杜年二十八誓以死殉弟桐及松以撫孤繼志為言杜日號泣不止未㡬二孤俱殤杜遂以哀毁卒翰林焦竑為立傳又延安衞指揮張經妻許氏經卒氏無所出媵杜氏有姙將免身應繼者爭立以其世職也氏佯許之後杜産得男氏抱示於族黨求長者名之曰淶尋聞於衞自是與媵殷勤撫摩及長教以義方後襲經職歴官協守宣府副總兵延綏志楊氏延安人哱拜反遣其將土文秀狥平虜叅將蕭如薰堅守不下如薰妻楊氏總督尚書兆之女也謂如薰曰若為忠臣吾何難為忠臣婦盡出簪珥勞軍士妻率之守城賊攻圍數日竟不能克紀事本末景氏生員李恭妻安定人孝子光裕母也年二十一夫亡遺腹生裕甘心守節撫育教訓裕年十六入鄉校享年七十五邑令扁其門又諸生郝效冉妻孫氏王恩妻李氏俱以守節稱按院給布粟焉安定志髙氏南征吉妻安定人年二十三夫亡家貧翁早世母白氏寡叔河圖負圖甚㓜氏上事孀姑下撫㓜叔殫竭心力後河圖萬厯間拔貢任雲南䝉目令負圖官守備撫按屢旌其門又生員白誥母李氏夫亡守志誥方七歲家甚窘以針紉供誥讀書入泮有司累旌之安定志李氏郭永寧妻賀氏馬陽妻俱延長人李年十九夫亡家貧時翁姑年俱八十且失明氏以紡績奉養撫孤成立賀氏亦少寡撫遺腹子苦節四十年萬厯中縣令並旌其門賈志曹氏生員楊一元妻延川人元疾不起氏誓以死殉既卒即自縊救而甦復七日不食死馮志袁氏鳳翔諸生楊一麟妻年二十三夫亡一女尚㓜苦志撫孤年五十一卒杜文妻田氏年二十四夫亡子幼孤寠舅姑欲嫁之氏以死自誓勤女紅孝翁姑撫按交旌其門縣民李仲春妻張氏年二十六夫故衆議他適氏曰餓死事小耳况未至餓死耶撫三子俱成立萬厯八年各道俱旌表賈志薛氏百戸翟亮寅妻鳳翔衞人寅亡氏年二十五遺孤璉甫五歲氏養姑育子孝慈克盡璉亦早亡無嗣孤苦伶仃與婦張氏同志守節萬厯八年關西道旌其門鳳翔府志俞氏呉份妻鳳翔人份卒氏年二十八生子山甫四歲氏守節自誓奉養舅姑舅卒葬祭以禮事姑彌篤氷霜之操人以為難萬厯八年關西道督學道俱扁其門鳳翔府志柳氏岐山生員范𢎞載妻夫亡年二十泣而就死者數次撫育前妻遺子至於成立守節六十餘年里民王得威妻羅氏夫卒年二十無子誓以死殉衆救得免毁容自守五十餘年萬厯中有司並旌其門賈志侯氏岐山諸生張自省妻夫亡生遺腹子氷雪自持事繼姑存殁盡禮有司累表之監生王恩妻李氏年二十九甘貧守節壽九十四卒縣民李彦明妻劉氏年二十七無子家甚貧惟織紡以糊口壽七十二卒岐志李小圓岐山人若梓之女許字王邦寧未歸邦寧自縊死小圓親臨赴吊一慟而絶乆救得甦入厨作粥奉姑曰聊盡婦禮從此尋夫地下端坐喪次是夜大雷震電屋瓦皆裂母姑驚視圓已逝矣殮三日靣色如生時萬厯乙巳三月十一日也狀聞勅建烈女祠樹坊旌表鳳翔府志趙氏生員張綸妻寶雞人綸殁時氏年二十二水漿不入口者三日自剔左目以示靡他守節五十九年建坊旌表賈志胡氏􅔛邑生員蘇宇妻貞靜淑愼事舅姑以孝聞宇死氷操自勵訓家嚴肅敎子必廷以明經顯享年八十王某妻孔氏年十六夫亡毁容自廢矢死靡他勤績絍以事舅姑曲盡其孝撫遺孤㡬三十年以壽終又諸生張景仲妻常氏張𦙍妻周氏趙琠祖母孫氏母柳氏楊銘母劉氏段乃成妻史氏俱茂年守節辛勤訓子女而劉氏則督學以苦節維風扁焉􅔛縣志劉氏麟遊諸生吕引年妻引年死於非命氏年二十止遺一女臨葬啟穴將投之家人覺而持止送歸母家復自縊以救免由是毁容守節孝養舅姑有欲奪志者氏噬指出血撾靣大痛人聞而止守節三十餘年以壽終又劉氏縣民侯禹臣妻禹臣卒氏年二十五即自謚救之得免葬時復自投穴中折其左膊㡬死輿歸以㓜子為解乃止家道素貧以耕織自給萬厯八年關西道並旌其門鳳翔府志張氏麟遊諸生甄柟妻武功人也柟卒氏哀號欲絶其季父喻以立孤死節難易氏遂勉力撫孤毁容杜門時年二十餘子生甫五月翁姑夫三喪在柩伶仃孤苦强自支持壽九十餘卒萬厯十三年詔旌其門又吕氏何謚妻從夫隨翁任夫殁氏年二十餘生子甫浹歲痛夫死異鄉嘔血幾死及歸扶櫬歩行每至逆旅抱子撫棺徹夜悲號聞者哀之扺家鳩形已不似人營葬畢一貧如洗苦節四十餘年萬厯二十年詔旌其門賈志董氏生員石可貞妻麟遊人夫卒遺子歲餘氏含辛鞠子後五年子殤遂取夫主於卧室焚香自縊萬厯中旌表馮志楊氏尹希顓妻俱氏姚度妻王氏姚守官妻張氏韋臣妻皆隴州節婦也楊氏年十九遺孤浹歲矢志六十一年俱氏甘貧奉姑守志六十五年俱奉文旌表王氏年二十四守節二十六年張氏守節四十二年院並旌之鳳翔府志楊氏史文載妻隴州人夫亡自縊以殉萬厯中旌表又生員閻可讓妻楊氏年二十二夫卒痛哭嘔血死賈志王氏南鄭諸生金簡妻嘉靖元年夫病氏割股以進夫故年二十四無子女可依孀居五十八年縣民馮朝江妻傅氏年二十七夫故生遺腹子善事翁姑年八十七卒任大經妻孟氏年二十八夫故欲自盡翁姑泣諭始勉為啜食苦節孝親撫子禄舉癸酉鄉試萬厯十二年詔旌其閭賈志朱氏監生王邦偉妻南鄭御史朱綬次女也邦偉故氏年二十三守節撫孤四十餘年後子復亡氏七日不食而死南鄭冊李氏褒城許襄隆妻年二十夫亡子欲摽甫一歲氏撫育入庠又早死復撫孫潘亦成諸生卒年八十五又康氏褒城開山驛魯志聰妻年二十餘夫死遺二子一女子幼不能支驛役以女贅壻子與壻俱死撫甥朝為諸生又死復撫外曾孫厯諸艱苦年九十三終漢中志王氏韓仲才妻城固人夫亡氏年二十六遺孤僅七月苦節教養及長以孝稱孀居五十七年賈志王氏杜春輝妻洋縣人春輝與兄春芳皆諸生春輝卒臨葬年十九王投壙内扶歸是夜自縊死後七年春芳病篤治棺妻康氏潛令併治一棺夫問所以泣曰妾欲不愧王氏耳比春芳卒哀痛消骨旬日不食飲藥死萬厯二十七年詔旌曰雙烈馮志王氏許天祥繼妻西鄉人年十六適祥是日祥父瓊病故祥守喪次既葬廬墓服闋始歸行夫婦禮無何祥卒氏年十九遺腹纔三月甘貧績紡以奉衰姑撫前子與己子俱成立苦節六十年御史題旌又十年始克葬甫下穴紼絶棺墮地破顔色如生柴菴疏集張氏西鄉監生朱騰霄妻年二十七而寡遺孤衮張撫育成立娶婦吉氏未㡬衮復殀吉欲以死殉賴張勸止同心守節人羡一門雙貞云西鄉志劉曇妻鳳縣人失其姓夫病調治備極篤摯及殁氏縊死漢中志靳氏生員王以諫妻寧羌人年十九夫亡無子氏就縊以姑救不死已念曰姑在我何敢死於是事姑益謹即憔悴哀毁而對姑未嘗一縐眉睫後三年姑亡遂自刎於柩側萬厯十九年也二十一年旌馮志賈氏陳弟妻畧陽人年十五遇强暴欲汚之氏罵不絶口自投漢江而死賈志羅氏榆林參將郭金妻金亡氏不食死又榆林衞指揮龔應龍妻姜氏年三十夫死方葬嘔血死榆林衞千户周冕妾失其姓夫卒自縊死妻劉氏亦守節終身阿捧比吉指揮僉事朶兒計臺吉妻也從套中内屬居榆林年二十六夫故痛哭不飲食尋自縊死榆林衞軍張應龍妻楊氏年三十夫故勺水不入口者六日踰歲姑與子相繼亡氏不食九日死又榆林衞軍楊守禮妻于氏年三十夫卒勺水不下咽悲號累三日死巡撫旌其門延綏志劉氏宜君女適延綏鎭楊國權年二十二喪夫無子甘貧苦節六十四年卒賈志袁氏靖邊學生查瑾妻年十八瑾以救父陣亡氏聞不食死建坊旌表延綏志杜氏張鳴逺妻興安人年十九夫卒族黨盡奪其貲産氏甘貧奉親矢志愈堅萬厯四十一年巡按畢賜扁旌其門賈志曹氏興安唐際嘉妻年二十夫故家貧氏上奉孀姑下撫遺腹子拮据紡績苦節四十餘年馬續光妻劉氏適光未踰年光卒遺腹纔數月氏杜門紡績奉姑課子卒以節終萬厯四十一年俱旌表興安志嚴氏任頊之妻孫氏任豫之妻俱紫陽人嚴氏年㓜喪夫號慟幾絶者數四矢志六十年課子以明經顯孫氏年二十三夫故哀慟欲自縊親族以衰姑弱子慰之乃忍死守節脫簪珥以奉姑孀居五十餘年縣令並旌其門紫陽志王氏石泉舉人安汝翼妻性莊嚴不事色笑夫殁斷親故往來嚴婢僕出入守志三十餘年事聞旌表石泉志王氏胡文煥妻漢陰人年二十煥卒氏枕尸泣血不食母嫂勸諭乃食至百日致奠盡哀次晨服始嫁衣縊於柩旁萬厯四十四年建坊賈志呉氏漢陰生員藍正元妻年二十四夫亡子幼竭力奉姑而已糟糠不厭二十年如一日里民孟學顔妻駱氏年二十七夫故守節有司申請當事並旌其門漢陰志周氏商州南伯謙妻年十九夫殁子女無出與堂嫂王氏同勵氷操有司累旌之邑庠雷始奮妻孔氏年十九夫故堅守撫孤五十餘年有司歲給米布殁後題請旌表南桓妻王氏年二十三夫故止一女撫猶子為嗣苦節四十二年司道各扁旌之給米絹者數十年商州志南氏商州庠生閻公述妻述故氏年十八毁容守志四十餘年常伴惟一蠢婢一日婢死曰天絶我也遂絶食七日卒商州志南氏商州南文蔚之季女適雒南生員薛厚倫未逾年厚倫病劇氏日夜侍湯藥不更二手厚倫殁氏匕勺不入口慟絶而蘇即以刀自剄衆持之不得遂引首觸柱又不得諸姆及眷屬環向泣慰曰爾為婦未期何倉遽乃爾氏正色曰夫妻寧計日耶吾義當死今惟勸我死者為愛我比漏三下鬟侍倦睡氏已就卧内縊死其時死炎歊中靣色如生蠅虻斂迹有司上聞旌表雒南志李氏趙進孝妻雒南人年十九夫亡哀毁骨立親黨欲奪其志李對姑號泣數日不食謀遂寢守節三十餘年又監生張以治妻王氏同邑人也少寡矢志孝事翁姑撫諸孤成立饑饉屢經節操愈勵年九十卒直指旌其門雒南志何氏雒南人張守分妻守分死何年三十妾蔡氏年二十二各遺一子俱幼同志守貞孝養翁姑死葬盡道勤紡績治家人業子永錫中萬厯癸巳鄉試守節四十餘年有司俱旌表賈志李氏江蘭妻商南人蘭卒李號哭不已至葬前一日服毒死馮志呉氏同州王遷妻遷為傭以餬口値歲凶無所售傭恥入養濟院僵卧而死氏枕屍哭一晝夜殉之同州志趙氏同州諸生王維德妻夫死其父母皆七十餘時二子既㓜而兄嫂復殁遺幼女子三人一門孤苦氏以弱齡任之老終孤養無不曲盡萬厯四十四年奏聞旌表又諸生張汝愚妻胡氏年二十而婺翁姑以家貧子幼勸令改適不聽乃潛謀奪節氏知即毁容歸母家撫子至冠而後還又生員董芳繼妻潘氏初適芳芳已病篤未幾殁潘年十五號泣幾死撫芳前妻子女如己出有謀奪節者即引刀自裁太守馬材作傳記其事賈志王氏潘思忠妻同州人思忠死氏甘貧苦節里豪爭欲謀娶而不得萬厯戊子歲饑餓死室中人皆憐之同州志雷氏郃陽人適同州胡珪珪卒氏無所出乃勵節撫前室子艱辛四十餘年賈志仇氏井繼妻朝邑人夫早亡遺子奈强甫三歲氏甘貧守志撫教有方强復早逝同子婦丑氏撫育孤孫至於成立李聯芳傳馬氏同州文莊公自强之孫女也適朝邑李芳春年十八而寡撫從子文郁為嗣娶其兄女為婦不數年文郁又死婦亦年十八姑婦守節終身有司旌其門朝邑志孫氏翟可教妻朝邑人幼嫺女訓適翟未幾而翟死非命時年二十欲以死殉家人勸曰有姑在汝死姑亦亡矣乃忍死事姑姑時怒氏婉以承之姑九十終襄事畢泣曰姑亡吾何待欲自經夢其姑救後卒以人救得不死守節七十餘年又邑庠生王之翰妻井氏年二十而寡姑以繼弗慈或勸之嫁矢以死愈孝謹姑亦化之初氏病夢見於神自禱親終養方敢死已而病愈其後親死葬畢未及禫而亡朝邑志翟氏朝邑翟可速女生員何大慶妻萬厯丁亥歲饑大慶出糴嬰疾還氏屢祈身代知不能輙自紉襚衣誓以同死何垂盡入室更衣自經時年十八逺近吊愍奏聞旌表附祀烈女祠朝邑志李氏謝登輔妻朝邑人早寡守節上事翁姑下撫幼子女咸有儀則四十年不復為容子自賢事母至孝李朴節壽全序雷氏王學讓繼妻朝邑人年十五歸讓五年讓死謂氏曰我死汝早自為計勿徒苦氏飲泣不能語因指天自誓必奉舅姑撫孤子時嘉靖丙寅歲也遂屏容飾勵操以堅其志撫王前妻子皥如如己出皥如既貴迎養官舍每食異味則謂皥如曰逺不能致爾祖父母奈何其慈孝出於天植如此卒建坊旌表王嗣美集張烈女朝邑人世强女萬厯初字市民魏珠已而珠故女年十六衣縞不食誓死殉以家人嚴防乃佯飲食又為履遺珠母尋乘閒自經越三日舁就魏合窆其靣如生賈志張氏楊專妻朝邑人萬厯丁亥歲大祲人相食專與一子先斃氏自投於河傍人出之氏曰我義不為乞丐故就溺耳從容結衣履投河而死朝邑志張氏郃陽李白妻白卒氏不食而死曹粉容者郃陽民女也未歸而壻死父母勸其改字粉容乃投繯而死縣聞為立石表其墓賈志孫氏澄城生員鄭炳妻年十八夫逝氏即墜井姑急救之得免矢志守節縣令表其門張邦俊傳路氏舉人關冕妻澄城人十五歸冕踰年生子方四月冕暴卒氏哀痛幾絶矢志撫孤以績絍孝親屢遭兵荒堅守不易賈志竇氏王伯占妻韓城人伯占亡氏年二十九家貧紡績事祖姑並姑極孝年八十四卒賈志李氏生員賈梧妻韓城人年十七夫故號泣幾死三日不食翁以姪孫繼烈承嗣事翁姑極孝苦節五十餘年壽七十四卒建坊旌表又趙楊芳妻薛氏年十九夫卒無子以姪為嗣家貧守節年八十二卒賈志薛氏李煥妻韓城人煥商死河南舁櫬歸里氏號呼幾絶粒米不入口一日發奩付櫛珥鞶帨於姑自飾衰麻坐夫右死時萬厯三十六年也賈志郭氏東羣芳妻華州人羣芳病亟謂郭曰我死汝擇人事之郭涕泣誓以死其妾王氏曰我非婦人耶何永訣弗及我耶羣芳死郭氏命將作二棺王亦乞一棺遂作三棺為羣芳立嗣行喪三日以代三年俱縊死於柩帷左右又同里曹士魁妻王氏郭𢎞祖妻東氏夫死時皆自縊死馮志李氏楊自卑妻華陰人夫卒年二十翁老子幼家計蕭然甘貧守節孝事繼姑督學按部屢表其門又生員楊訓妻張氏訓卒氏治大槨示必殉戚黨苦勸乃止終身垢靣足不及中庭賈志張氏賀約禮妻蒲城人約禮亡氏年三十撫男應科遊泮科娶亦張姓女後客死於京張年二十一有娠聞訃輙自經救免生遺腹子姑婦共凛氷霜育孤入學姑八十有一媳六十有六皆以壽終萬厯十八年旌表雙節賈志孫氏單偉妻蒲城人夫亡事姑以孝聞萬厯二十五年旌表同邑王啟勞妻夏氏夫亡守節事親鄉人稱為孝婦賈志郝氏葛寛妻蒲城人夫亡年二十一姑欲嫁之氏度不免遂自縊死萬厯三十年旌表馮志常氏米頤貞妻蒲城吏部澄之女給諫若桂之妹也夫見殺於㓂歸其屍自煎香湯沐浴凶服跪奠一日吉服臨焉几上設匕筋各二及晚自縊死王建績妻單氏蒲城單則遷之女年二十二夫故痛哭嘔血累自盡以人救得不死明年正月初四日乘閒自縊死萬厯四十六年旌表賈志劉氏潼關衛指揮使姚鎮妻夫卒氏年十七誓以死殉姑勸諭乃止以孝慈奏聞旌表又衞千户朱英妻張氏陳端妻李氏余翰明妻何氏賁炫妻張氏孫元妻韓氏俱夫死守節終身不渝賈志楊氏郭恒妻潼闗人年十六許恒恒以不能納幣遂客遊湖南乆不歸父議改盟女不可斷髮自守家有巖壁穴墻居之垂索以通飲食者二十六年恒歸氏年四十三矣乃成禮偕老焉副使張瀚為作貞女傳馮志左氏安裕妻耀州人年十五歸裕裕病卒左即剪髮大半破鏡大半置裕柩前餓十數日而死年十九萬厯十三年建坊旌表賈志王氏彭邦貴妻同官人貴卒氏年二十四哀毁踰禮事祖姑趙氏極誠敬待卑幼有恩禮趙憐其幼喻使改適氏剪髮自殘以示不二遂守節終身性好義樂施常思濟人不責償萬厯十年大饑輸雜糧一千石入官賑濟有司上其事詔旌曰節義同官志習氏李梅妻同官人夫亡無子家甚貧親黨勸之嫁氏曰有姑在可事遂堅貞自守有司扁其門曰節孝又張邦彦妻党氏年二十守節事姑甚孝有司旌表又李啓東妻梁氏年二十四夫亡孝姑撫子艱辛備嘗八十四卒賈志姜氏諸生王旂妻白水人萬厯末旂被毆辱赴井死氏聞亦投井中以殉白水志郭氏武功王繼祖妻繼祖早死撫遺孤乾明成立娶張氏生子受元甫襁褓乾明旋死郭與張雙節凛然受元長娶田氏不數年而受元又死遺子良臣田氏年少亦守節終身奏表其門曰三世孤孀後良臣歲貢田年七十八卒武功志李氏沈來聘妻武功人夫早逝氏年少有勸之嫁者氏曰姑在誰與為奉績紡以供甘㫖者四十餘年賈志侯氏生員馬璟妻武功人夫病篤侯知不起先夫自縊死賈志屈氏杜逢雲妻武功人歲大祲翁與夫皆就食漢南翁死夫歸亦死氏泣曰寧以夫死故而使翁之遺骸棄於原野乎遂徒歩往漢負骸歸葬未幾餓而死賈志牛氏武功生員陳懋謙妻夫卒氏年十九撫遺腹子守節五十餘年萬厯中建坊旌表舉人楊纘妻李氏年二十三纘卒止一女氏撫姪為嗣守節四十餘年萬厯十三年旌表里民耿認妻恭氏年十九夫卒二子尚在襁褓氏守節教子年七十八卒縣令旌之又耿氏適岐山生員李淑世生子四日夫死氏守節二十年歸寧卒於父家子亦尋卒邑人哀之賈志騫氏永壽生員張簡妻年十八夫卒妾趙氏一子方周歲騫撫育勤劬不啻己出事婺姑以孝聞壽七十五卒官旌其門劉宗樂妻王氏年十九夫亡撫遺腹子成立壽七旬卒王養忠妻師氏年二十二忠亡撫一歲孤成立壽六十卒賈志許氏生員樊希思妻永壽人善事翁姑妯娌無間言夫卒嘔血死賈志騫氏永壽九思女㓜字趙本初趙故富而騫家漸蕭索趙竟遺書罷婚九思頷之女曰不死奈辱先人何乃澡身整服强婢導至趙門呼寃自刎而死尸不僵目不瞑溽暑色澤如生邑令庀木以殮時天開日霽而雷雨驟至一邑震驚令為撰哀詞奠之復開霽如初永壽志王氏永壽爼登妻夫卒氏年二十五遺子三歲孤叔翁溺其子强氏他適幸有援者子得不死後子復早卒乃撫成諸孫備嘗艱苦以壽終又李油然妻魯氏年二十五夫卒叔翁强奪其志氏截髮自誓以織絍糊口守節三十一年賈志師矯姐永壽人師第女第因訟避逃捕者詣家偶牽女衣女不勝憤恚自縊死事在萬厯三十四年永壽志紀氏邠州生員席太初妻萬厯中夫卒縊死柩側奉文建坊賈志焦玉兒三水人有惡少夜至持斧迫氏不從遂遇害萬􅔦十六年旌表馮志葛節婦文氏三水人少白先生之女有君子亭詩賦三百餘首手鈔書六十巻少寡自誓作九騷九篇以見志辭義典雅稱其風烈列朝詩集在中女適淳化生員葛大受稱未亡人者四十年賈志武氏文太青妻天啟初太青督晉學考最屬予譔太青所著事略稱其妻武恭人之能詩也余譔制詞以秦風之女子為比太青書報予恭人讀之而喜可知也崇禎初太青以太僕少卿家居恭人殁繼室鄧氏寧河武郡王之裔也太青鰥居謀續娶家園有並頭蓮之瑞作嘉蓮詩四百餘首鄧之父才其女而告之曰此眞可以壻汝矣太青遂委禽焉既歸於文太青以謝韞徐淑視鄧而鄧則以孔孟伊周事太青交相得也太青好竒如子雲搆太𤣥經以鄧為童烏覃思少間相與論李詩韓筆太青喜而忘寐不知更漏之深淺春秋佳日奉太夫人版輿出遊訪未央之故丘弔城南之遺跡太青有三出西郊記讀者豔之甲戌喪太夫人過哀遂得風疾已而少差舌本間强鄧知其嗜邵詩吟邵句以引之太青喉吻喀喀乆之豁然應聲壬午春病劇不起鄧為文以祭敘致婉悉關中文士爭傳寫之踰年關陜躪鄧老矣迄不知其所終云三水縣志李氏鄜州王宗堯妻年二十八夫亡以死殉救甦家至貧誓不再嫁苦節四十年撫孤成立後以孫建屛貴贈淑人鄜州志劉氏中部人適鄜州生員宋承矩矩亡氏年二十遺腹六月乃潛縊柩側賴姑救得蘇勸以遺腹為念後生子吕值歲荒宗人强勸再適氏持刀自毁靣目苦節六十年事聞旌表鄜州志屈氏景載輝妻髙氏張應奎妻俱洛川人屈年二十三夫亡苦節撫子并撫二孤姪如己出壽七十五終髙年二十八夫卒事親終䘮撫孤成立苦節四十六年有司俱表其閭賈志郝拾翠洛川人年十七許聘諸生張三近納采而三近卒女聞訃以所納幣製為衣裳服之自縊萬厯二十二年旌表馮志任氏李元凱妻中部人歸數日而元凱卒父母令再嫁不從紡績以奉舅姑事聞旌表馮志王氏同知張士竒妻宜君人士竒殁内外無依氏躬督耕桑教子親良師友入夕則課其業三子俱成立次子應辰令肅寧績最加封太宜人三膺誥命孀節四十五年又同邑田養民妻韋氏年二十二夫故甘貧守節撫二孤成立賈志楊氏郭鐘竒妻宜君人竒早卒氏自縊死賈志楊氏米脂光祿寺署丞艾應鍾妻少保楊尚書之女萬厯初夫故氏年二十四孀居四十年米脂志劉氏白延慶妻清澗人延慶卒於旅劉年二十三聞訃奔京邸親負骸骨歸及葬投隧道以殉諸姑力出之遂矢志守節撫孤似科成立似科又早卒其妻劉氏年二十五欲投崖死幸救免事兩姑撫㓜子年五十餘卒賈志孫氏張彦昂妻清澗人年十八夫亡越三月舉一子矢志守節家貧忍饑以訓孤子年五十九終賈志劉氏生員白似玉妻清澗人夫亡氏年十七遺孤賁甫七月矢志守節躬績紡以自給賁年十九又卒其妻李氏年十八遺一歲孤尚文與姑相依克盡婦道無何姑見背伯兄欲奪其志李氏抱孤號泣者累月遂喪明知縣陳汝元表其門曰一門雙節賈志白氏惠道昌妻清澗人夫亡氏年十八有娠方六月欲死以殉衆諭之曰胡不少待舉子氏泣曰非不念良人無後但心痛不能須臾緩耳遂七日不食而死有司申請旌表又惠及科妻李氏夫亡年二十九即日縊於柩側有司旌其門配享烈女祠賈志劉氏葭州髙薦悅妻夫亡氏年二十七奉姑撫孤艱辛備嘗厯四十年又髙光鼎妻張氏馬喬遴妻張氏俱早年䘮夫守節終身焉葭州志王氏生員李淮妻葭州人淮卒氏年二十二遺孤五歲宗族謀奪其志氏誓死守節卒年五十有七葭州志某氏神木諸生辛維命妻年二十二夫亡即柩前自縊以救得免守節終身又王瑜妻張氏年二十五守節四十餘年里民張樞妻劉氏年二十六守節終身不渝神木志李氏府谷舉人繼志女也適蘇萬春未乆而蘇卒氏勵志守節壽九十三歲無疾而終府谷志馮氏楊六斤妻府谷人事舅姑竭誠盡孝後膺旌典府谷志陜西通志卷六十六
