body:
  text: 建置圖表秦中為周秦漢西魏北周隋唐歷代都會其地北暨朔方南環漢沔西抵隴坂東界潼津幅員廣袤數千里自肇州以來為國邑為郡縣為道府路為軍衛所制以代異名以時更紛如繡錯今自夏商以降各繪一圖使廢置分合星羅碁布明於指掌以象告也至圖不盡意又綴以兩表或臚列一代之郡縣使大小相維以為之緯或貫穿纍代之沿革使先後相承以為之經一縱一橫參伍錯綜又慮其説無徴復原本經史博採志乘一遵本朝府州縣定制遡夏商以逮元明代立一考以與圖表互相發明雖蜀漢魏周地志闕如亦必會萃衆説捃托遺文以存一代之概庶幾古今建置囊括靡遺矣本朝省府州縣統屬考夏商州國邑考周州國邑考秦郡縣考兩漢部郡縣統屬考總部郡縣魏晉州郡縣統屬考北魏州郡縣統屬考西魏州郡縣統屬考總部郡縣總部郡縣北周州郡縣統屬考陜西通志卷二
