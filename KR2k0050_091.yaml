body:
  text: 陜西通志巻九十一藝文七碑記西嶽華山廟碑延熹八年漢闕名周禮職方氏河南山鎭曰華謂之西嶽春秋傳曰山嶽則配天乾坤定位山澤通氣雲行雨施賦成萬物易之義也祀典曰日月星辰所昭仰也地理山川所生殖也功加於民祀以報之禮記曰天子祭天地及山川歲徧焉自三五迭興其奉山川或在天子或在諸侯是以唐虞疇咨四嶽五歲一巡狩皆以四時之中月各省其方親至其山柴祭燔燎夏商則未聞所損益周監於二代十有二歲王巡狩殷國亦有事於方嶽祀以圭璧樂奏六歌髙祖初興改秦淫祀太宗承循各詔有司其山川在諸侯者以時祀之孝武皇帝修封禪之禮思登假之道巡省五嶽禋祀豐備故立宫其下宫曰集靈宫殿曰存仙殿門曰望仙門中宗之世重使使者持節祀焉歲一禱而二祠後不承前至於亡新寖用丘墟迄今垣趾營兆猶存建武之元事舉其中禮從其省但使二千石以歲時往祠其有風旱禱請祈求靡不報應自是以來百有餘年有事西巡輒過亨祭然其所立碑石刻紀時事文字磨滅莫能存識延熹四年七月甲子𢎞農太守安國亭侯汝南袁逢掌華嶽之正位應古制修廢起頓閔其若兹深達和民事神之義精通誠至礿祭之福乃按經傳所載原本所由銘勒斯石垂之於後其辭曰巖巖西嶽峻極穹蒼奄有河朔遂荒華陽觸石興雲雨我農桑資糧品物亦相瑤光崇冠二州古曰雝梁馮于豳岐文武克昌天子展儀巡狩省方玉帛之贄禮與岱亢六樂之變舞以致康在漢中葉建設宇堂山嶽之守是秩是望侯惟安國兼命斯章尊修靈基肅共壇場明徳惟馨神歆其芳遏攘凶札揫斂吉祥歲其有年民説無疆西嶽華山亭碑衛覬惟光和元年歲在戊子名曰咸池季冬己巳𢎞農太守河南樊府君諱毅字仲徳下車之初恭肅神祀西嶽至尊詔書奉祠躬親自往省從勞謙即事有漸散齊華亭齊堂逼窄郡縣官屬清齊無處尊卑錯綜精誠不固畏天之威逢斯癉怒時雨不興甘澍不布念存黔首懼譏曠素於是與令巴郡朐䏰先讜公謀圖議繕故斷度樳廊立室異處左右趣之莫不競慕二年正月己卯興就既成有元休嘉啟寤各得竭情福禄是顧刻兹碑號吏卒俠路其辭曰巖巖西嶽五鎭次宗序徳之尊太華優隆皇帝永思祀典孔明髙神肻宴圭璧贄通赫赫在上以畜萬邦惟嶽降神實生羣公卿士百辟纉業攸䝉帝命不違歲事報功羣后命卿散齊外亭敬恭明祀以奉皇靈處所逼窄屑窣有聲神樂其靜翛翬無形尊卑有序潔心致誠因繕舊室整頓端平在其板屋孰不加精天人同道萬祚來迎既受帝祉延於後生為龍為光顯乂王庭為公為侯福禄來成刻石紀號永享利貞修西嶽廟碑樊毅山經曰太華之山削成四方其髙五千仞廣十里周禮職方氏華謂之西嶽祭視三公者以其能興雲雨産萬物通精氣有益於人則祀之故帝舜受堯厯數親自巡省設五鼎之奠柴燎煙致敬神祇乂用昭明百穀繁殖黎民時雍鳥獸率舞鳳凰來儀暨夏殷周末之有改也其徳休明則有禎祥荒淫臊穢篤災必降秦違其典璧遺鄗池二世以亡髙祖應運禮遵陶唐祭則獲福奕世克昌亡新滔逆鬼神不享建武之初彗掃頑凶更率舊章敢用元牡牲牷必充天惟純祐萬國以康光和二年有漢元舅五侯之胄謝陽之孫曰樊府君諱毅字仲徳承考讓國家於河南究職州郡辟公府除防東長中都令誅强虣撫瘠民二鄙以清命守斯邦威隆秋霜恩踰冬日景化既宣猶復夕惕惟窺禄之報順民之則孟冬十月齊祀西嶽以傳舍窄狹不足處尊卑廟舍舊久牆屋傾亞世室不修春秋作譏特部行事荀班與縣令先讜以漸補治設中外館圖珍竒畫怪獸嶽瀆之精所出禎秀役不干時而功已著暫勞久逸神永有憑自古太山邸邑猶存五嶽同尊哀此勤民獨不賴福乃上復十里内工商農賦克厭帝心嘉瑞仍畣風雨應起瀐潤品物君舉必書况乃盛徳惠及神人可無述焉於是功曹郭敏主簿魏襲户曹史許禮等遂刋元石銘勒鴻勛垂曜含靈軫存有識其詞曰二儀剖判清濁始分陽凝成山隂積為川泰氣摧否洪波汜臻堯命伯禹決江開汶川靈既定恩覆兆民乃開祀典辨於羣臣因瀆祭地嶽以配天世主遵循永享歴年赤鋭煌煌受兹介福京夏密清殊俗賓服令問不違可謂至徳徳音孔昭實惟我后出自中興大漢之舅本支惟百延慶長久俾守西嶽達奉神祀改傳飾廟靈有攸濟降瑞畣祚景風凱悌惟風及雨成我稷黍俊氏用章康乂室宇勒銘紀頌克配梁甫温湯碑隋書盩厔縣太乙山有温湯北周庾信咸池浴日先應緑甲之圖砥柱浮天始受𤣥夷之命仁則滌蕩埃氛義則激揚清濁勇則負山餘力弱則鴻毛不勝仲春則榆莢同流三月則桃花共下其色變者通為五雲之漿其味美者結為三危之露烟青於銅浦色白於鉛溪非神鼎而長浮異龍池而獨涌灑胃湔腸興羸起瘠秦皇餘石仍為雁齒之階漢武舊陶即用魚鱗之瓦山間湧水實表忠誠室内江流彌彰純孝豈若醴泉消疾聞乎建武之朝神水蠲疴在乎咸康之世嵩嶽二仙之館不孤擅於天池華隂百丈之泉豈獨髙於蓮井西嶽太華山碑有銘唐𤣥宗天有四序星辰辨其分地有五方山嶽鎭其域隂陽交暢則品物形矣精氣相射則神明著矣西嶽太華山者當少隂用事萬物生華故曰華山居中土西偏七宫正位是稱西嶽按圖以察削成而四方信焉立表以算其髙五千仞明焉石壁傑堅而雄竦衆山奔走而傾附其氣肅其威振其行配金其辰直酉前對華陽之谷後壓華隂之郡左抱桃林之塞右産藍田之玉諒少昊之下都蓐收之別館者也軒帝遊焉以㑹衆神虞舜柴焉以覲羣后爰自夏氏迄於隋室朝更五姓載歴三千祀典相因舊章未改壇場廟宇何代不修一禱三祀無歲而缺所以報生殖事靈神不有怠也故亦祚休明災淫慝未嘗爽也皇天眷佑馨我烈祖奄有萬方逮於六葉郊天地望山川精意必達墜典禮咸甄亦命州將四時告䖍加視王秩進號金天若是何者抑有由焉予小子之生也歲庚戌月仲秋膺少昊之盛徳協太華之本命故嘗寤寐靈嶽肸蠁神交玉帛未陳幽賛必先意而啟椒醴雖薄景福果應期而集𤣥感昭賽可一二而道耶記云下有方士眞人金鼎石室上有明星玉女仙草瓊漿茅龍一去毛女千祀前代帝王多所僥覬朕學犧文之道故靡斯人之徒憂在至道之不𢎞不憂富貴之無永患在蒼生之不理不患年夀之若流以功施四海為長生以業傳百代為不死焉羨置集靈之宫虚望非福立存仙之殿妄思輕舉哉於戲維嶽配天尚弼予志予欲布大政康兆人嶽翼予欲定禮樂諧神人嶽聽予思其維嶽降神生此多士無俾申甫專美於嵩語酌古訓心通神景善而不答誠而不應未之有也嶽其念哉十有二載孟冬之月步自京邑幸於洛師停鑾廟下清眺仙掌雲拂石狀霓裳可接風過松嶺仙駕如聞久勤報徳之願未暇封崇之禮遲迴刻石梗概銘山萬姓瞻予言可復也銘曰巖巖太華柱天直上青崖白谷仰見靈掌雄封峻削菡萏森爽是曰靈嶽衆山之長白帝西下黄河北來隂陽孕育精氣徘徊偶聖呈瑞逢昏降災玉池神挹石室仙開海絶瀛洲天遙𤣥圃偉哉此鎭崢嶸中土鬼神乍遊風雲忽聚髙標爀日半壁飛雨自古王者巡方必至龍駕帝服封天禪地南面㑹神西后在位待予治國安人然後徐思其事贈太尉段秀實紀功碑并序徳宗立人之道曰君與臣為臣之義曰忠與節忠莫極於衛國節莫大於忘身存其誠徳貫乎天地致其功用施於社稷獨斷勦凶慝之命沈謀安宇宙之危其智勇足以拯時其義烈足以𢎞教非昊穹錫慶敷佑皇家重振紀綱再激汙俗何遘屯之㑹而獲見斯人開府儀同三司檢校禮部尚書兼司農卿上柱國張掖郡王段氏名秀實字成功應期降生扶翼唐祚稟隂陽之粹氣備剛柔之全徳體正明道從時巻舒蓄為淳和發為功烈朕宅帝位之五載孟冬十月賊臣朱泚反天悖人因時多虞乘我無備誘聚叛卒作亂於京師朕深惟罪已之誠逺遵避狄之義駕自中禁狩於近埛賊隂謀為奸陽言示順以公嘗任涇帥素得士心採諸衆情引以自助公感時悲憤思定大業謂復國安人由已不可以顧私謂開物變化在權不可以虚死畧匹夫之褊介藴曠代之宏規内貞其心外混其跡且控察元惡情狀將因而圖之賊果不疑委以心腹遽發凶黨謀襲我師公詭説以詞止之不可乃竊取官印假為兵符急追㓂軍不逺而復銷禍紓難隂陽若神於時物情危疑忠邪莫辨卒乘未輯軍旅未完㣲公之謀吾幾蔑濟既而密結勇敢誓殱㓂讐決䇿尅期中外發應㑹賊泚召公計事引入閤中露其奸情言及僣竊公氣塡胸臆植髪衝冠仰天大呼帝鑒何昧孰為臣子而忍是心語未絶音奮笏前擊凶徒敗面既躓而奔左右駭然初未敢動繼者不至事遂無成逆徒交鋒因而遇害嗟乎天生萬物惟人最靈稟元氣之精鍾五行之秀是宜守正居順移孝資忠君君臣臣父父子子各履於達道同臻於太和天乎不融生彼狂悖神乎不惠喪我忠貞靜言思之輟饋忘寐詳求其理抑有以焉兹朕不明敗德招損故列聖垂佑儆戒於予則泚之亂所以懲既往勗將來禮教陵夷風訛俗敝故上帝降鑒聳動於人則段公之死所以勵當今傳不朽也訪彼前史稽諸昔賢全大節者不必成功建大功者或未立節非節不可以禆教非功不可以持危義實相須事難並備吉甫以文武翼周室宣王中興絳侯以智謀安劉氏文皇紹立茂功著矣而節未可稱董卓脇國以擅威伍孚刺之而不畏王敦擁衆以稱亂周顗折之而無疑奇節偉矣而功竟不就至若屈伸合變進退知機智以遂其謀勇以決其死功與時並節與名偕依古以還無公儔比貞烈之至通於神明桀驁聞之而動心仇讐感之而不怨死於義而義著忘其家而家全行路興悲懦夫増氣矧予之慟其可弭忘且人之所重者身也國之所重者位也公能殺身殉國朕得不以重位報之哉乃詔有司冊贈太尉諡曰忠烈賜實封五百戸莊宅各一所嗣子授三品正員官諸子各授五品正員官表其閭里䕶其喪葬官立祠宇史載忠勲哀榮之典備矣君臣之義極矣公始以天寳四載奮筆從戎才為時生官由才達得司馬戰陳之法叅將軍帷幄之籌累典方州更踐臺寺出擁旄節入為卿士位歴十七歳踰三紀封王列於異姓開府比於台司參職六官食賦百室言不伐善慮常下人恒持順信之規罔居疑悔之地利刃在手投節皆虚貞松有心老而彌勁吞大憝於方寸之内安危疑於晷刻之間力可屈而志不可遷身可殺而節不可奪所謂有始有卒為臣之極致者歟日月有期宅兆云畢身殁功在凜然如山勒銘傳芳終古不滅以志吾過且旌善人銘曰浩浩上天四序唯均氣或埋鬱過為災氛否不可終必復元亨洗以膏雨播之祥雲濟濟蒸人五常是則時或屯難乃生凶慝亂必有定允歸皇極拯以茂勲輔之明徳勲徳克崇兹惟段公實天降靈寧保朕躬日月蔽虧宇宙昏䝉冏然明誠獨誓深忠豺狼為羣㹞㹞逞惡咆哮奔突乘我未備公飛尺符横制醜𩔖變化若神邦家不墜元惡大憝誘奸作狂竊器僣名反易天常公獨挺身奮擊暴强烈烈英武殁而彌彰義振名教功存社稷贈極上台賞延眞食省咎祇畏懷賢憫惻刻銘豐碑昭示萬國西平王李晟東渭橋紀功碑有銘同前天有柱以正其傾地有維以紐其絶皇王有輔佐以濟其艱難非命厯所歸不得生良弼非君臣相合不能集大勲非暴亂𢎞多不足表忠節非奸猾熾熖不克展雄才天與事肆㑹然後功臣著而王業興焉髙祖太宗拓跡垂統掃乾坤之沴氣拯生靈之塗炭其受命也正其布澤也寛六宗丕承克廣前烈雖遇屯否化危成安二百年間五夷大難由内以正宸極者再自外而復都邑者三山嶽降神雲龍叶契繼生賢哲保定邦家神龍中諸武擅權甚間王室則有若扶陽王彦範等推戴中宗紹復𢎞業景龍末嬖韋窺國瀆紊乾綱則有若徐國公幽求等左右𤣥宗掃除凶穢天寳之季盜起幽陵翠華南征潼關不守廣徳之際戎軼邠郊皇輿東巡酆宫罷警則有若尚父子儀等殄殪醜逆冊肅宗於岐攘却蕃夷翊代宗於陜建中四祀冦發上京暴滅人神僣稱名器則有若西平王晟等剪滅大憝廓清中區惟兹數公異時同道徳濟於社稷勲書於鼎彞唐之得人於斯為盛東渭橋抵王城東北四十里而國之廩積在焉始晟於此駐孤軍糾羣帥俟時而動一舉成功予用是揚其美而紀其功以明事之有因謀之有素也粤若菲徳嗣膺大寳化乖柔逺明不燭幽淮右賊臣提兵犯順憑凌汝服震壓洛師朕憫將吏之受汙哀蒸黎之無訴罔思衛已姑務靖人亟發禁師東征不軌猶慮勝敵之未勇乃徵涇師以繼之賊泚畜奸覷隙乘便餌誘貪卒扇結暴徒伺其不虞譟聚犯闕朕引咎出次薄伐二畿封豕長虵穴處宫廟磨牙噴毒噬螫害人晟時總偏師逺戍河朔曾不俟召聞難駿奔鼓義勇仗順之師吞敗亡稔惡之㓂雄威勝勢疾若飈馳屬賊帥昏迷恃衆貪亂誘我蟊賊連謀内逼朝廷載遷闗河長擾豺狼塞路羿澆爭驅人烟絶於井邑隂燐交於田野物情大駭蕩然靡依晟乃設位軍門哭而誓衆國讐不滅無以身為遂發感激嗚咽流涕天地為之變色將帥為之動心軍中較然知有逆順晟乃度公積計私課程賞典定刑章行令自身録功先下由是勇者奮力智者効謀其氣倍增其心如一屹立堅壁於渭之陽奸逆畏威而震慴忠義奮氣而聳慕分羣凶之勢不敢相附為諸鎭之援俾得自堅晟之力也二月守暨乎夏五月晟知衆心可用乃揀日饗士乙未陳師於東郊如虎如豹如熊如羆凶徒接戰累合皆北倒戈棄甲罔敵我師乘而殪之摩壘而止戊戌方旭連營進攻賊衆相驚股戰魄駭登陴而不敢拒闔門而不敢窺晟仗鉞啟行執桴親鼓斂隍塹排牆垣勝氣兆於風雲威聲振於原野指顧摧靡蕩無孑遺布朝㫖以寛脅從勵臣節以誅同惡乾軸傾而復紐皇維弛而更張遷梟聲為好音變祅祲為和氣然後閑戎律釐軍容不諠不譁有嚴有翼搜苑圃殄遺冦清宫門授彼有司宣言於衆曰龔行天討將以遏亂畧去人害王師所至歌舞從之其或矜勇恃勲作威肆掠是則以暴易暴夫何賴焉懋功有恒賞違禁有常罰惟國之令典不得以贖論敢犯令者殺之無赦爰擇便地引軍出屯馬無錯羣士必成列尅敵彌日都人莫知徐命有地之官周諭鄽里士庶聞巨猾之殱殄而我師壺觴犒軍如恐不及者若赤子之保慈母涸鱗之起洪波或欣而呼或感而泣吾是以知列祖積徳人懐其深賢臣佐時功濟斯美晟有興運之畧有匪躬之忱有定亂之勲有禁暴之德俾予從乂垂拱仰成乃冊拜司徒兼中書令加實封一千户錄功第一叙位居首事業編乎史冊徳輝流乎頌聲入為䕫龍出作方召賛賀徽烈中外具瞻而晟居髙牧卑辭滿守約崇讓而勲閥彌耀惡盈而福祿攸歸斯又明哲之規愼終如始者也夫制敵在謀不在衆感人以義不以威當天地屯䝉邦家離析援孤者踣黨盛者强羣心囂囂靡所止戾若風動中野波騰滄𬈑從而拯之豈易為力於時馬不滿百駟兵不盈萬人無郡邑土田之資無城池險阻之固獨立不懼氣吞羣凶以盡忠誓心以必死勵已以大順率衆以至誠動天衆心攸同天意允答故措軍散地而不可拔致討勍冦而力有餘國危能安軍勝能整古所謂衛社稷者晟其當之播揚休風篆刻貞石俾厥後嗣無忘乃功銘曰赫矣我唐受天眷命祖功宗德浸澤儲慶窮海請吏遐荒稟令寧一九服惠康萬姓三五以還莫之與盛迨予不𩔖辱守丕圖燭理匪時立誠未孚蠢爾逆臣扇兹潰徒震驚朕師黷穢皇都宇宙沸騰人神睢盱重以統戎誘姦同貫播遷斯載歲聿云半天既悔禍人胥厭亂乃錫元臣夷凶剪叛昏祲茫茫横流湯湯挺然孤軍在渭之陽我城非完恃順為防我旅非衆同心為强由義率人人皆嚮方萬事如一爭先啟行抝憤求逞畜威斯張力足勢全時維鷹揚以戰則克以謀則臧指揮之間羣醜潜亡鯨鯢既平宫室既清軍伍無聲都人不驚成功禁暴自昔稀有實天生徳彰於厥後洋洋令名兹為不朽九成宫碑有銘魏徵維貞觀六年孟夏之月皇帝避暑乎九成之宫此則隋之仁夀宫也冠山抗殿絶壑為池跨水架楹分巖竦闕髙閣周建長廊四起棟宇膠葛臺榭參差仰視則迢百尋下臨則崢嶸千仞珠璧交暎金碧相輝照灼雲霞蔽虧日月觀其移山迴澗窮泰極侈以人從欲良足深尤至於炎景流金無鬱蒸之氣㣲風徐動有凄清之涼信安體之佳所誠養身之勝地漢之甘泉不能尚也皇帝爰在弱冠經營四方逮乎立年撫臨億兆始以武功壹海内終以文德懷逺人東越青丘南踰丹徼皆獻琛奉贄重譯來王西暨輪臺北距𤣥闕並地列州縣人充編戸氣淑年和邇安逺肅羣生咸遂靈貺畢臻雖藉二儀之功終資一人之慮遺身利物櫛風沐雨百姓為心憂勞成疾同堯肌之如腊甚禹足之胼胝針石屢加腠理猶滯爰居京室每弊炎暑羣下請建離宫庶可怡神養性聖上愛一夫之力惜十家之産深閉固拒未肻俯從以為隋氏舊宫營於曩代棄之則可惜毁之則重勞事貴因循何必改作於是斵雕為樸損之又損去其太甚葺其頹壞雜丹墀以砂礫間粉壁以塗泥玉砌接於土階茅茨續於瓊室仰觀壯麗可作鑒於既往俯察卑儉足垂訓於後昆此所謂至人無為大聖不作彼竭其力我享其功者也然昔之池沼咸引谷澗宫城之内本乏水源求而無之在乎一物既非人力所致聖心懷之不忘粤以四月甲申朔旬有六日己亥上及中宫厯覽臺觀閒步西城之隂躊躇髙閣之下俯察厥土㣲覺有潤因而以杖導之有泉隨而湧出乃承以石檻引為一渠其淸若鏡味甘如醴南注丹霄之右東流度於雙闕貫穿靑瑣縈帶紫房激揚淸波滌蕩瑕穢可以導養正性可以澂瑩心神鑒暎羣形潤生萬物同湛恩之不竭將元澤之常流匪惟乾象之精盖亦坤靈之寳謹案禮緯云王者刑殺當罪賞錫當功得禮之宜則醴泉出於闕庭鶡冠子曰聖人之德上及太清下及太寧中及萬靈則醴泉出瑞應圖曰王者純和飲食不貢獻則醴泉出飲之令人夀東觀漢記曰光武中元元年醴泉出於京師飲之者痼疾皆愈然則神物之來實扶明聖既可蠲兹沈痼又將延彼遐齡是以百辟卿士相趨動色我后固懷撝挹推而弗有雖休勿休不徒聞於往昔以祥為懼實取驗於當今斯乃上帝𤣥符天子令徳豈臣之末學所能丕顯但職在記言屬兹書事不可使國之盛美有遺典䇿敢陳實錄爰勒斯銘其詞曰惟皇撫運奄壹寰宇千載膺期萬物斯覩功髙大舜勤深伯禹絶後光前登三邁五握機蹈矩乃聖乃神武克禍亂文懷逺人書契未紀開闢不臣冠冕並襲琛贄咸陳大道無名上徳不徳元功潛運幾深莫測鑿井而飲耕田而食靡謝天功安知帝力上天之載無臭無聲萬物資始品物流形隨感變質從徳效靈介焉如響赫赫明明雜遝景福葳蕤繁祉雲氏龍官龜圖鳳紀日含五色烏呈三趾頌不輟工筆無停史上善降祥上知斯悦流謙潤下潺湲皎潔萍㫖醴甘冰凝鏡澈用之日新挹之無竭道隨時泰慶與泉流我后夕惕雖休勿休居崇茅宇樂不般遊黄屋非貴天下為憂人玩其華我取其實還淳反本代文以質居髙思墜持滿戒溢念兹在兹永保貞吉河瀆神靈源公祠廟碑王延昌中國經瀆河為長上應析木下朝扶桑演崑崙踰積石繚大漠經龍門灌注九州之間經營萬里之外鱗介所宅神靈所都𤣥𡨕總之以命官憑之以為伯唐堯觀諸龍圖肇見周公沈璧榮光發祥元符之末彪炳彰灼古先哲后罔不欽崇奠封居之儀修壇墠之制存乎祀典代以為常則班固序漢書所謂河祠臨晉是也偉其南直太華左臨中條渭水過其旁汾脽揭其後風雲相盪精氣交馳於以禮神事之宜也不然發源自逺地則多漫胡為不昭晰於他邦獨受享於兹土前賢經始抑有其由至於春以泮凍秋以涸流初以歲禱終以報祈嘗醪有加駵駒是薦蓋以在雍州之域通天子之都地既稱雄禮云異數與夫淮流桐柏江出岷山僻在遐方莫我京也幽賛之力實賴河公以潔為清瀾至於數四息昏墊之苦絶羨溢之憂濵河之人濶無大害此靈長之德上善之功也祈以正直享以精誠未嘗不誘其衷而降之吉也或進以便佞言以矯誣未嘗不奪其魄而貽之禍也歲大旱而作霖雨時大札以惠嘉生依仁而行惟徳是輔天寳歳安禄山稱兵朔裔肆逆東夏熖烻扇燥烝人爇焉宗社有綴旒之危士庶畜阽原之懼太上南幸肅宗北巡賊相張儒據有長安賊將崔乾祐固守蒲坂今闗内河東副元帥中書令汾陽郡王郭公時為兵部尚書門下平章事朔方節度使訓兵誓衆超百二之險謂此邦底定則京師可圖䖍禱於河潛軍以往金鼓掩夜渠魁出奔遂收蒲城神所導也及師次渭汭隂霧晦宴公假寢之際夢河神謂曰永豐倉側將有急變不如速退姑以避之比全軍及郊虜已雲合克違冦難神所扶也其後李國貞之遇禍公復總戎故絳僕固懷恩之逆命公又出鎮河東大君日旰食中外騷擾公獨奮無前之勇馳不測之深始按節而來終奠醑其邁所謀必克無往不平再安畔渙神所相也爰自兵亂以迄於今時更十年代歴二聖國之氛霾惟河公蕩滌國之土宇惟河公廓開國之忠良惟河公保佑國之奸慝惟河公殄摧誠靡幽而不應澤罔㣲而不該得一以靈不其宜哉汾陽王深維據我屢崇昭報奉牲玉莫敢愛也致精意未嘗怠也每蠲吉歴選自郊徂宫奠於堂户之間則神之昆弟具在酧於屋漏之内則神之伉儷攸居文墨相望男女無別公曰神人之主也禮政之源也人有上下則禮有内外之制人所謂否神具可考盍築館於後以安靈匹乃諮於副元帥副使太子賔客御史大夫知河中府事崔公寓量功命日而後役於河西縣大夫李開不徵貨財不殫日力曾不踰月克復於成大厦耽耽鬱其特起内寢既立神儀穆然於是齒危髪秃之老王端等進而稱曰大河浩蕩敝邑之望也自公仗鉞三至我里靈應肸蠁未嘗或欺國之克復實始於此安天步於臲卼定人心於驛騷大君成湯武之功賢相保桓文之業皆神之由也矧内寢棘翼今兹有成此而無述何以示後願刻樂石以彰厥庸公教曰諸公之辭固不可抑頌祗則可無推美於子墨客聞敢繫辭曰浩浩長河中國之紀洪流激射横致地理蒸雲吐霧薦圖効祉是曰經瀆斯為徳水聖唐六葉巨猾挻災搟邑靡城如霆如雷汾陽矯矯仗鉞而來乃臨蒲坂神實先導乃亂渭水一一胥告嗟我上相神之所勞汾陽之德温恭正直柔嘉維則忠勤是力秉心泉塞不測不克東西南北𠞰絶奸慝入登九命一人是毗出統三軍四方是維維言祐之河公降禧衆神在列曾未區別公為之節内寢攸設寢廟亭亭中外有經濯濯厥靈妃耦攸寧於戲祠宇焜耀中土在河之滸在城之下刋兹片石昭灼千古郭子儀家廟碑顏眞卿昔申伯翰周降神於維岳仲父匡晉演慶於筮淮而猶見美詩人騰芳史冊豈比夫神明積高之壤百二懸隔之都三峯發地而削成九派浮天而噴激炳靈毓粹奕葉生賢括宇宙而稟和總河山而藴秀莫與京者其唯郭宗乎其先盖出周之虢叔虢或為郭因而氏焉代為太原著姓漢有光禄大夫廣意生孟儒為馮翊太守子孫始自太原家焉後轉徙於華山之下故一族今為華州鄭縣人夫其築臺見師瘞子致養家承金穴之貴政有露晃之高或哲或謀或肅或乂皆海有珠而鳥有鳯也閥閲之盛其流益光隋有金州司倉諱履球府君懋其徳輝不憎下位克己復禮州邦化焉篤生唐凉州司法諱昶府君能世其業以伸其道逺近宗之不隕厥問生美原縣主簿贈兵部尚書通府君清識徹照博綜羣言始登王畿鬱有佳稱道悠運促靡及貴仕垂於後昆沒而見尊是生我諱敬之府君幼而好仁長有全徳身長八尺二寸行中絜矩聲如洪鐘河目電照虬鬚蝟磔進退閑雅望之若神以仲由之政事兼翁歸之文武始自涪州錄事參軍轉瓜州司倉雍北府右果毅加游擊將軍申王府典軍金吾府折衝兼左衛長上原州別駕遷扶州刺史未上除左威衞左郎將兼監牧南使渭吉二州刺史侍中牛仙客韙君清節奏授綏州遷夀州累加中大夫䇿勲上柱國以天寳三載春正月十日遘疾終於京師常樂坊之私第春秋七十有八乾元元年春二月以公之寳𦙍開府儀同三司司徒兼中書令上柱國汾陽郡王曰子儀有大勲於王室乃下詔曰故中大夫夀州刺史郭敬之累君子之行毓達人之徳才光文武政美中和生此大賢為我良弼頃以孽胡作亂黔首罹殃朕於是鬱興神武之師克掃欃槍之氣而子儀率彼勁卒赫然先驅取京洛如拾遺剪凶殘猶振槁功存社稷澤潤生人是用寵洽哀榮義申存殁累追贈太保於戲府君體含𢎞之素履秉冲邈之高烈言必主於忠信行不違於直方清白為吏者之師死生敦交友之分端一之操不以夷險槩其懷堅明之姿不以雪霜易其令用情不間於疎逺泛愛莫遺於賤貧拳拳服膺終始靡二故所至則化所去見思人到於今稱之斯不朽矣傳曰盛徳必百代祀其有後也宜哉恭惟令公先皇之佐命臣也少而美秀長而瓌偉姿性質直天然孝弟寛仁無比騎射絶倫所蒞以清白見稱居常以經濟自命弱冠以邦鄉之賦驟膺將帥之舉四擢高第有聲前朝三為將軍再守大郡累典兵要必聞休績天寳末安禄山反於范陽令公以節度使擁朔方之衆圍髙秀巖於雲中破史思明於嘉山先皇帝之幸朔方赴行在於靈武擊同羅於河曲走崔乾祐於蒲坂今上之為元帥也首副旄鉞㑹囘紇於扶風摧羯胡於渭水追餘孽於陜服長驅河洛弼成睿圖再造生靈克清天步乂函夏之未乂安天下之不安一年之間區宇大定丕休哉徒觀其元和降精間氣生徳感星辰而作輔應期運以濟時忠於國而孝於家威可畏而儀可象盛徳繄物寛身厚下用人由已從善如流沈謀祕於鬼神精義貫於天地推赤誠而許國冒白刃以率先霆擊於雷雨之初鷹揚乎廟堂之上凡二歴鼎司兩升都座四作元帥九年中書歴事三聖厥徳惟懋易相二十而受遇益深盖尅復上都者再戡定東京者一其餘麾城搟邑得雋摧鋒亦非遽數之所周也信可謂王國之虓虎生人之廕庥者歟非太保之邁種不孤則何以鍾美若是况乎友于著睦龍虎者十人貽厥有光紆青紫者八士勲庸舉集今古莫儔昔奮號尊榮紅粟纔霑於萬石惲家全盛朱輪不出於十人繇我觀之事不侔焉於戲清廟之典所以仁祖考鴻伐之刻亦以垂子孫爰剏制於舊居將永圖而觀徳中唐有侐丕構克崇感霜露而怵惕以増叙昭穆而敬恭斯在庶乎觀盥顒若既無斁於永懷入室僾然必有覿乎其位哀榮既極情禮用申仁人之所及逺哉孝子之事親終矣豈唯温温孔父逺稱讒鼎之銘穆穆魯侯獨美龍旂之祀其詞曰郭之皇祖肇允虢土逮乎後昆實守左輔徙華隂兮源長流光施於司倉涼州兵部克熾而昌載徳深兮篤生太保允懋厥道神之聽之永錫難老式如金兮於穆令公汾陽啟封文經武緯訓徒陟空簡帝心兮含一不二格於天地愷悌君子邦之攸塈貊徳音兮芝馥蘭芳羽儀公堂子子孫孫為龍為光鏘璆琳兮乃立新廟肅雍允邵神保是聽孝思孔炤亶居歆兮乃立髙碑盛美奚㩼日月有既徽猷永垂映來今兮諸葛武侯廟碑有銘沈迥皇帝御極貞元三祀時乘盛秋府主左僕射馮翊嚴氏總帥文武將佐洎䝉輪突鬢之旅疆理西鄙營軍沔陽先聲馳於種落伐謀息其狂狡於時威武震疊敵騎收跡塞垣蕭條烽爟滅熖士無保障之役馬無服轅之勞重闗弛柝邉轂棲野我師惟揚則有餘力乃昇髙訪古周覽原隰敬修兹廟式薦馨香光靈若存年祀寖逺雖簫鼓忻奏邑里祈禳而風雨飄颻祠堂落構土堦莫數尺之崇庭除無袤丈之隙登舉不能成禮牲玉不得備陳頽墉露肩灌木翳景樵蘇滿徑麋鹿走集馮翊曰丞相以命世令徳功存季漢遺風餘烈顯赫南方丘隴南山實在兹地荒祠偏欹廟貌詭裂非所以式先賢崇祀典也乃發泉府徵役徒撤編菅芟薙叢薄是營是葺衆工羣至繚以髙墉隔閡芻牧増以峻宇昭示威神靈英昔賢像設如在翼翼新廟日至而畢顧謂小子揚㩁前烈銘於廟門曰在昔君臣合徳興造功業有若伊尹相湯吕望興周夷吾覇齊樂毅昌燕是數君子皆風雲𤣥感垂裕來世嘗以為阿衡則尊立聖主天下樂推尚父則上讐獨夫諸侯同舉管氏藉强齊之力以宗周周無令主樂生因建國之資賛燕昭為奥主君臣同道僅能成功惟武侯遭時昏亂羣雄競起髙光之澤已竭桓靈之虐在人遇先主之短促値曹魏之雄富能以區區一州介在山谷驅羸卒輔孱主衡擊中原撑拒强敵論時則辛癸惡稔語地則燕齊勢勝遷夏殷者未可校功覇桓昭者不足侔力向使天假之年理兵渭汭其將席巻西邑底綏東周祀漢配天不失舊物矣洪伐彰彰宜冠古今卓軼前烈其誰曰不然武侯名跡存乎國志今之羣書姑務統論大畧叙我新意至於備載爵位追述史傳非作者至徳也今則不書其銘曰桓靈濟虐雲海横流羣雄蝟起毒蠚九州天既厭漢人思代劉沸渭交爭存亡之秋其誰存之時惟武侯伊昔武侯踠足南陽退藏於密不曜其光有時有君將排垢氛魚脱溪泉龍躍風雲先主纉緒天下三分馥馥徳馨悠悠青塵前哲後賢心跡暗淪建兹新廟式是梁氓姜嫄公劉廟碑髙郢姜嫄者炎帝之後有邰氏之女姓姜字嫄帝嚳之元妃后稷之母也公劉者后稷之曽孫周文王十一代之祖也姜嫄嘗出遊見巨人跡而履之載震載夙時維后稷以居然生子心所不康初寘之隘巷再寘之平林三寘之寒冰皆有以全度者既而收之遂名之曰棄生有赫靈之異長有躬稼之勤法施於人以濟粒食堯乃命為農師而封諸邰農師實后稷也古初造物首出羣理事必生成之本言必天地之際當虞舜之時稱禹平水土契布五教稷播百穀咎繇明五刑地平天成萬世永賴舜以奮庸乃命禹禹讓於稷契暨咎繇及以元后命禹禹獨讓於咎繇曰朕徳弗克人不依咎繇邁種徳徳乃降黎民懷之兹大禹所以言天意永命之所歸也夏有天下載祀四百禹之祚也商有天下載祀六百契之祚也周有天下載祀八百后稷之所祚也自時厥後百王澆季而咎繇之積累在天天祚永歸有所底止乃以無疆之厯命我盛唐盛徳大業與天地凖追視三代猶指掌矣昔者周文武之烈本於后稷后稷之生本於姜嫄故詩曰厥初生民時維姜嫄后稷之子曰不窋失官而奔於外土不窋之孫曰公劉往遷於邠居以平西土以篤前烈故詩曰篤公劉于邠斯館是知姜嫄有徳於周公劉有徳於邠先賢所出立祠舊矣我國家稱秩元祀咸秩無文山川鬼神亦莫不寧而姜嫄公劉之廟舊制卑陋湫隘在市非所以崇明祀敬鬼神也貞元四年邠寧節度觀察使檢校刑部尚書兼御史夫邠寧郡王張公獻甫外閫是膺授鉞而至肅肅王命維公將之烈烈征士維公成之畧地千里亭鄣嚴於外啟行一戰弓矢槖於内卒乘睦而知禮風俗康而狎野覩此二廟獨為匪安公曰嘻精潔莫重於神明喧囂莫甚於市鄽奈何雜處乎夫小人者知鼔舞之事神而不知䙝狎之慢神知事神之求佑而不知慢神之賈禍茂草一去遺塵萬祀使神而無知則已若曰有知喧囂瀆易之義札瘥夭昏之患者得非長吏慈惠之不足耶乃以不忍人之心行不忍人之政且為神告既而卜遷粤以貞元六年十一月九日作新廟於南郭焉地則郊野之閑左水右山有清謐之勝材則貿遷之至上棟下宇非徵斂之煩擇農之隙量功計日無妨奪之弊移嘉木而樹之考良辰而落之神於是嚴威而蠲乎所處人於是祗懼而逺乎所瀆是惠人於無過之地而寧神於不怒之境仁為己任不亦厚乎夫神聰明正直者也惟忠肅恭懿乃能承之順此而祭不必多品故雖澗谿之毛潢汙之水而君子率是四徳陳於二簋行之以禮奉之以慤潔之以齊逹之以和神可得而事焉祜可得而致焉孔夫子曰丘之禱久矣抑為尚書張公以文武之憲純一之良知無不為忠也正色率下肅也執事有恪恭也擇善而從懿也自先邠州大夫以來一門四人義方繼踵勲績為時心膂所資非他忠肅恭懿而已用能承天之寵獲神之勞以屏王室以揚家聲也宜哉祠成二歲矣而銘記尚闕將恐寖逺失其所由乃陳梗槩爰此刋刻詞曰何賢乎姜嫄曰克生后稷何賢乎后稷曰克降農殖后稷之道至今賴之姜嫄之徳如何勿思何賢乎公劉曰肇宅邠土何樂乎邠土曰平西之所乃今乃古有廟有宇宇亦既卑廟亦既摧闤闠朝合囂塵暮開蚩蚩羣甿屑屑徘徊瀆禮非敬祀神有災明寧戾止理化咸集財豐衆和暴禁兵戢惟此牆屋公私必葺矧伊明祠風雨所及是度是築乃遷乃立奉我皇親達於有神揚彼神威靜乎氛塵亦惟正直克賛忠純勒銘兹庭永示邑人周武王廟碑有銘宋盧多遜古者聖人體乾坤樹道徳功濟天下法施民生歴代咸欲稱其名美其事或樂章以歌之或畫像以讃之亦以為宣揚前烈敦摩王化其有濟黔首倒懸之命成域中太平之績盛徳洪業垂光典墳傳萬代而不朽者其惟周武王乎嘗觀樂音大武將闋其歌云於皇武王無競維烈又觀畫讃黄初舊文其詞云桓桓武王救世濟民皆謂追美褒揚遺徳歴被千祀止聞虚詞曾未若崇一時之典章振列聖之耿光訪陵寢以奉之祈户人以守之乃建祠廟乃崇祀典先王不能有其制前代未能行其事出自我應天廣運聖文神武明道至徳仁孝皇帝冠絶古今之聖徳也將以事實刋於貞珉乃命㣲臣對敭休烈謹再拜而稱曰伊昔皇風肇興西土磻溪協徳時雨降而山川出雲孟津會盟天機發而龍蛇起陸既而威加四海化成天下武王之徳可得言焉若乃戎車虎賁右旄左鉞赤烏止屋表天命也白魚入舟象人事也仗大義而平定依純誠而臨御旌賢人而示來者所以表商容之閭重烈士而悼云亡所以封比干之墓先濟民而後國用所以散鹿臺之財輕積廩而重物情所以發鉅橋之粟暴斂殘毒自我而息遂致羣心翕然義道斯應海内黎庶捨塗炭而登春臺寰中歌謠釋豐蔀而見白日及乎敦治本澄化源封五帝之後嗣削五虐之弊政命周公旦營成周而卜洛命太公望授賜履而封齊分治西陜委召伯之共功保釐東郊有畢公之繼徳宇内由是安泰民風所以和暢豈直放牛歸馬但美於偃兵保泰建功空歌於成徳者哉揚積世之大業成後嗣之丕基生民以來鮮能踰者我皇所以覽虎觀之史籍披職方之圖誌酆邑故地得其舊陵因命守臣躬往省視乃曰陵寢如故而荒榛之地弗禁於樵採廟宇甚陋而牲牢之奠無聞於俎饌上言至止帝曰吁哉以為修廢寢園無以褒聖王之徳教守無人戸無以奉古陵之封植既而封植有所守奉有戸必嚴肅於廟貌何崇重於瞻仰於是下明詔命有司梗楠杞梓集其材公輸匠石規其制將作圖畫永錫宸扆臨觀而命使廷臣受詔軺車載馳揆程鳩功不日而就徒觀其殿宇巍巍丹楹赤墀瑤軒藻井金堦寳砌迴廊環周彤亭對飛朱欄綺疏交錯光輝何修奉之所至而輪奐之若是則知武王以大聖之徳恩濟於人民我皇以不刋之典光揚於祭享使彼功不昧而我徳愈盛大牢致奠極崇重也二時行禮立典制也嗚呼天本無親惟有徳而能親之神非常享惟克誠而能享之足使隂助景福而明埀令典豈止犧象元酒江文通稱薦徳之辭簠簋香萁陳叔達動八齊之作徵諸舊典謹為銘云卜世其昌卜年其長以徳嗣徳天鍾武王景祚無疆神智無方以聖觀聖時惟我皇褒盛徳而振起追遺風而載揚讀武成於周書兮其功未彰歌下武於周頌兮其道未光不若因我朝崇廟享億萬世與國史而同芳四皓廟碑王禹偁易稱知進退存亡而不失其正者其惟聖人乎先生避秦知亡也安劉知存也應孝惠之聘知進也拒髙祖之命知退也四者俱備而正在其中矣先生非聖而孰為聖乎若其秦亂而不避則焚書坑儒髙斯之流也漢危而不出則索隠行怪巢由之徒也應髙祖之命則溺其冠而騎其項矣拒孝惠之聘則功不立而名不稱矣引而伸之先生可謂全徳矣嘗試論之曰古稱周公聖人也鞭伯禽教孺子居攝六年明辟未復而召公不悦於内三叔流言於外盛徳大業幾於墜地其輔幼君秉大政之難也有如是哉觀乎戚姬之嬖如意之寵以妾並后以孽代宗本根一搖社稷將墜咸謂扶蘇之賜死胡亥之亡國可翹足而待也何止炎靈之不祀抑亦黔首之罹禍豈無留侯陳八難罷六國則可議主鬯則以水而投石也豈無曲逆諫强楚解長平則可言立嫡則圓鑿而方柄也先生一出而助之一言而定之漢廷公卿皆出其下而能錙銖鐘鼎桎梏衣冠安萬乘而不有其功抗匹夫而不食其禄此非至人達識孰與於此乎向使先生定漢嗣為漢臣報徳崇功必在平勃之右當以左輔右弼前凝後承而處之居是時也以四鉅賢事一少帝挾震主之威負不賞之功又何止流言不悦之事哉欲望其茹紫芝卧商顔其可得乎是知先生之出非獨謀漢也實將救時也先生之退非獨全身也亦將矯世也危而䕶之不晏安於獨善可謂救乎時矣定而去之不乘時以糜禄可謂矯乎世矣用是警民猶有建桓立順之徒也嗚呼世為人臣議廢立者可勝道哉或因定䇿而專國或因援立而無君戕殺凶殘何莫由此其後滔天於莽卓盜國於曹馬移徙龜鼎於奕棋纍纍簡編可為太息是以先生危則助之安則去之其來也至公於萬民其往也無私乎一身此所謂知進退存亡而不失其正者千古四人而已辛卯歲余坐事解制誥職翌日有商於二使之命下車拜廟於西山之側退立廊廡古碑在焉自唐御史大夫賛皇李公而下作者若干人因歴覽之美則美矣叙先生之道似有未盡就館濡筆申之以碑其辭曰猗與先生時行則行髙眠商顔辟難抗秦知秦之祚亡於子嬰知漢之祚存於惠盈一言悟主萬邦以禎不有其功不食其禄逺害全身矯世厲俗清泉洗耳紫芝充腹獵犬自烹𡨕鴻不復矯矯髙節悠悠從來漢之戾園晉之愍懷江充厚誣賈后雄猜先生不至孰為來哉昏亂之世廢立不已操欺孤兒莽抱孺子成既自我權亦歸已先生不來大事去矣蒼野峩峩祠荒薜蘿遺像在斯徳音可歌清風凜凜素髪皤皤永懷貞遯刻石山阿西嶽廟碑有銘楊昭儉惟天惠民五嶽分其職辨方正位太華鎭乎西所以四象平興金徳應收成之令八卦迭代兑宫開潤澤之門太白明而寰海烟收涼風至而乾坤氣爽觀其三峯如畫羣山若拱峭壁直立仰之者不覺神驚秀氣下廕望之者惟知目眩髙掌逺蹠出函谷之東闗少隂用事祐全秦之大野膏腴具而三川綺錯潤澤流而八水星馳雲霞噴薄而垂隂金石晶熒而發彩仲秋出狩明標乎舜典四望展祀光揚乎周禮西成告瑞生民繫造化之權一禱䖍誠歴代重馨香之薦荷我應天廣運聖文神武明道至徳仁孝皇帝以文明清四海以勤儉示天下仁如愛日其恩煦嫗焉惠如甘露其澤普濟焉百揆無擁而振舉五刑不撓而欽䘏授民以時令神實助之勸民以農耕神得佑之太平之基不勞而致然後舉墜典秩無文首議廟貌特加修建闡舊規而從新製起卑陋而為顯敞土木之制盡其壯麗帝曰以人民受賜而推謝於神貺為人民祈福而嚴奉於神府乃益罇罍乃盛俎饌豆籩之品加其等脯醢之列増其數薦奠之誠古無與比將命實録掲於豐碑夫何㣲臣䖍應上命但欲使徳垂聖主岸為谷以無遷祀貴明神海為壑以不變碩言柔翰徒用厚顔為銘曰明星之下太華之疆聳躍萬仞神明一方兑曰麗澤秩為白藏奠我西夏實流耿光爰有神明宅於􅔬嶽惟正直兮斯在故蒸黎兮所托我后所以搜墜典秩無文撒卑陋之舊制兮繚垣匝野構顯敞之新規兮髙楹窣雲神兮神兮所當揚厥職而顯吾君禦災捍患兮福吾生民重興岐山文憲王廟碑有銘游淑乾道儲精星辰闡其耀坤元孕秀嶽瀆成其形稟其精鍾其秀不星辰不嶽瀆化而為人是為聖者則憲王其人也王徳巍巍道恢恢周流乎百行範圍乎衆善如其聖如其聖方其為子篤仁而孝突而弁兮冠冕諸子近事武王乃清王室謂天討不得不行大鉞一麾則諸侯爭先馘紂矣謂寳命不得不救植璧昭告則王疾翼日乃瘳矣至其後武考既崩而鼎業未安旌搖斾贅王乃慨然為憂攝政踐祚而治奈何讒飄山謗薫天謂弗利孺子而四國流言市虎之疑既成東山之征莫返桃蟲肇而集于蓼䲭鴞悲而毁我室然忠赤在己不厄不昭天變俄彰朝廷盡弁金滕既啟王泣賜還豈嵗寒然後知松柏之後彫也至如伊摯聖臣也殊勲丕業格于皇天而王與之比肩故世稱伊周伊周在嗣君與在社稷亡伊周先亡既周既伊變亂潛襄不伊不周姦逆横流孔子聖人也金聲玉振集厥大成而王與之齊名故世稱周孔周而孔作之述之孔而周王道誕章周孔道行天下文明周孔道謝萬古如夜吁大哉之至於斯也子則孝弟則悌臣則忠道隆乎一代言楷乎萬世天下之能事畢矣聖人之人倫至矣記曰後世雖有作者虞舜弗可及矣淑請續其説曰後世雖有人臣文憲弗可及矣信夫岐山太王邑周之地也以其故邦為建王廟旁按鳳鳴之崗中穴潤徳之泉地幽勢阻萬木森列憑高縱觀寸寸古色其神宇之所宜處也往年安定御史李公守節嘗宰是邑公龍游學海虎守聖門嫉誕説若探湯尊王道比軻愈先是有贍廟田十餘頃久之耕者侵之既公患之未有以覺舉適有黄冠者私詣上府市斯廟以作道觀行且以牓公聞之大怒曰吾可以并按若屬矣呼黄冠至責曰若敢唐突底柱耶叱吏縳冠繫於嶽言狀聞府府以聞按察司按察是公下其事令理决之公即正冠之罪而褫其牓並贍田一為改正其具存焉今縣令岐陽侯兖心先聖學胸良吏才三輔藹仁化之稱朝廷屬表選之望矣下車之初悉聞其事乃歎曰王之廟日月也不幸而為冠所毁日月之蝕也幸而為公所復蝕而更明也使他日復有毁之若冠者則縣令之責也縣令之責而不先刻之石終無以為質也於是錄其本末咸刻諸碑將使膺是責者以李公去邦為己任以黄冠肆欺為常誡三軍之帥可奪也去邦之志不可奪八佾之僣可忍也肆欺之罪不可忍斯張侯之心歟遂得新廟貌緝殿廡構三門而隆威嚴建碑亭而萃衆作俾淑鋪辭以垂不朽淑也才㣲識淺敢辱斯述伏顧諛鬼神以空文佞佛老而曲筆較其所取猶無媿焉則何敢辭銘曰曲阜舊宅魯王欲毁一聞天音驚悸而止文憲廟貌黄冠潜移李公力拯扑而植之莫耶指日物不可蝕飛㢘決氛復見太極猗歟張侯克大芳猷著於貞石何千萬秋凡百為令勿忘翼聖尚監兹文以為龜鏡毋使廟汚毋容冠欺李公之志張侯之規岐山蒼蒼渭流洋洋神宇儼然岐渭之陽吳嶽廟碑閻仲卿惟汧隴之南極有山曰吳嶽五峯削成屏列環異雲霞韜映秀氣中出且咸秦奥邑西望益都羣阜交立形勢多殊噫混元融結之意於兹而拔乎其萃也其下東設巖祠古今常享𡨕符幽賛誠非溢語而又尊嶽之號顯諸方志故畧而不述在昔李唐天寳中封成徳公淸泰二年備冊命昇靈應王至今文簡存焉洎乎聖朝毎歲立秋降服次方嶽之禮以三獻祭之仲卿景徳四年冬罷太華守奉詔復理於是邦來年秋躬詣廟宇躡階之際四顧蕭條堂殿傾摧風雨不蔽况人寰之内綽有嘉名水旱之患民所翳賴何斯陋矣豈弗欽哉歴代相承但因循而已興替之道諒偶時焉仲卿敢不潜啟精誠覼縷事狀奏發聞上尋乃允俞衆選攝州司馬范秀兼廟令以專掌之及諸工雲集月無虚日鑿山就平累土成室惟新制度經營倍力數邑供用餘􅑤方畢自大殿周於廊廡等別創一百五十三間無大無小以丹以雘飛甍架空忩牖如織至於奇花異草之栽珍禽怪石之𩔖率非舊物亦自逺而致盖規模於金天氏之下館耶而後瞻仰之徒俱駭心目聰明之貴不染風埃儼如在之容助鴻鈞之化重樓向日與金碧以兼高綵帳凝烟對風光而永固足使清風凜然徽音不墜雖陵谷亦云變勒貞珉之可觀仲卿遂操觚染翰恭而書之庶知來者表一時之事耳修太史公祠碑尹陽太史公為記錄之宗表表而矜文辭者皆不能出其囿吾得觀其書矣至於廟像冢藏之古吾弗得而見之宣和七年秋予始官韓城尋遺訪古乃在少梁之南芝川之西得太史公之遺像焉予咨嗟而致式之因低徊周覽則棟宇其傾頽階戺其卑壞埏隧其荒茀惟是享嘗缺然不至予乃愀然發喟屬其耆老而告之曰司馬公文為百世之英而所居不能蔽風雨學為繼述之源而所藏不能去荆榛今洪河汩流漾乎前也中條崛起峙乎東也河嶽深崇氣象雄渾公文實似之而冢廟卑庳如此其不稱公之辭與學也甚矣猶不為邦人之恥與予乃率芝川之民擇其淑韙而好事者凡一楹一桷至於瓦甓門疏之用悉以資之即公墓為五架四楹之室又為複屋以崇之既宏既完矣於是直榮光之奥覘禹鑿之山面汾隂之脽縱望遐觀豈不快哉嗚呼惟公之文大肆於炎漢之間馳騁於千世之前其力贔屭實斡造物欲舉而悉之吾所不敢動吾喙觀其下葬於兹豈非洪河巨嶽實稱公之文也哉乃作述事享神之歌俾邦人習之歲時以樂公之神其詞曰公詞有如黄河流黄河吐溜崑崙丘上貫星躔經斗牛下連地軸横九州崩崖摶石轉洑流騰烟跐霧飛蛟虬邇來宏放三千秋班沿范襲非公儔公鑿混沌開雙眸力敵造化窮𡨕搜公祠慘淡連古坵甍摧瓦落風蕭颼我獨來兮為公愁新公祠兮去榛杞殽甚豐兮酒甚㫖民髣髴兮公燕喜韓之原兮山之趾雲亭亭兮河瀰瀰公之來兮歲豐美雲為車兮飈為轡公之來兮福滂被雲滅没兮風不留公曷往兮俾我憂鄠縣明道先生廟碑有銘明王鏊聖賢道被天下萬世而深於過化之地鄠為縣介京兆西南宋嘉祐間明道程先生嘗主其簿其南山白雲紫閣高冠谷長嘯巖凌霄峰皆嘗徧覽題咏遺刻往往猶在庭有巨槐相傳為先生手植其辨藏錢止佛怪興水利諸政猶赫赫在人自今而言先生之道在萬世不獨行於鄠自當時而言先生之道不得行於天下猶幸行於鄠鄠固先生過化之地哉自宋理宗朝從祀之典徧天下亦非獨鄠也而其流風餘惠在鄠尤深迄今三百餘年鄠之一草樹一禽魚一泉石猶起敬生愛詩云蔽芾甘棠勿翦勿伐而廟無專祀人奚以慰𢎞治二年沁水李君瀚以監察御史按陜行縣至鄠則命所司治之八年復莅兹邑顧瞻廟宇庳隘桷樸弗稱初意時邑陵楊君一清以憲副董學正於陜議以克合命知鄠縣事房嵩撤文昌舊祠以拓其址作祠五室周垣外繚重門中伉黝堊圭潔像設孔肖憲副謂予文其事於碑以示來者盖自孟子沒而斯道絶先生兄弟起千四百歲之後獨得不傳之妙至於今雖遐荒絶徼咸知誦程氏之書而先生所得之妙則有不在言語者矣固非鏊之所能賛述也獨二君協心一力表尚正學激起頽俗使鄠之人穆然如復覩卿雲霽月之度被和風甘雨之澤其無異於親臨而炙之者乎二君可謂知所重矣故附書之銘曰有嚴學宫祀事孔時新廟再登維鄠之思伊昔夫子蒞我鄠人辨奸折獄唯誠與仁孔孟既没道墜何啟天續斯文生兩夫子唯兩夫子尊自遐方豈伊鄠人俾也可忘南山巖巖白雲在天夫子逺矣何日來還修周文武陵寢及周公太公墓祠碑有銘孔天𦙍咸陽之北畢原之上周文王武王之陵在焉而周公太公之墓亦在於是盖自歴代以來世世崇祀載在典册舉莫敢廢元季弗紘典禮堙昧兵燹之後畧存遺蹟而已明興統天範世咸五登三惇禮右文鑒周為烈故洪武之初於天地帝王山川岳瀆賢聖功勲之祀咸事表章升中告望百神允懷維是陵寢實𢎞創構兼置守塚四家爰勅有司奉守勿替憲臣省覽務時脩葺所以昭當代禮樂之光而保先王本源之舊洪熙中嘗葺寢廟增建殿門齋宫歴成化𢎞治正徳之間累有修増而祠祀周公則成化十六年始祠祀太公則正徳九年始云嗣時厥後有司因循成事漸致傾圮嘉靖二十八年監察御史桐城盛公汝謙令縣吏補治明年監察御史濡須劉公崙代至飭興茶馬宣闡風猷訪豐鎬之故墟追雅頌之遐業展禮陵墓徘徊屋垣謂頹簷壞壁逼陋被野甚非所以幽妥神靈明肅禋祀内之周旋駿奔外之禁防樵牧乃自發公府之藏若干金檄分巡道行縣悉修蕆之於是文陵丕顯之殿武陵丕承之殿及門廡坊牌咸撒易舊敝加飾新美二陵周圍繚以廣垣比舊增廓通計百餘丈沿東故址建更衣亭三間西建庖㕑一所又因故齋壇建道院房九間其軒廊嚴靜盖儼乎若二聖雝雝然肅肅然競競然之在其上也又表周公太公之墓各題一碑墓上周故有祠隘乃修廣之而扁其堂曰太和宇宙其大門坊牌無弗整葺周圍垣之計丈百有七十而魯公伯禽之塚入焉太公祠圮矣乃更建堂三間而扁曰武成門垣之築盖差簡於周有俟於後云要之軒廊嚴靜亦儼乎若二公几几然桓桓然之在其旁也功不干時財不損下經始落成無廢多日尚亦靈臺之意矣落成之辰七月初吉適公按節來縣乃精意潔牲躬申祭告時分巡副使張渙方督視厥成及分守叅政天引咸以執事得附拜瞻郡縣吏民學官弟子咸從樂嘉觀知縣孫湛礱石請銘用紀鴻造公以天引嘗祇文學之役遂令述之子貢有言文武之道在人賢者識其大者夫不識其大孰能修舉之如斯其辭曰洪荒既判神聖有作遐哉莫考二帝維鑠守道執中三王一之禮樂明備維周緝熙是為顯承佑啟無疆成以元聖翊以鷹揚開世淑民以養以訓正徳厚生大化大順幽厲弗繇降於戰國及無道秦禮器猶識文不喪天代纂其徽之綱之紀是馮是依我明時憲萬邦作孚肇禋弗替奕寢勿渝敬恭侍史肅將有䖍省覽墮缺乂用植埏門墉崇崇殿堂業業祀有攸容靈罔弗愜純嘏况臻敷錫保和民用秩秩士也峩峩維畢之原維周之道君子式尊式修維好曰識其大典禮㑹焉紀載勒銘以啟後賢梁敏壯公崇祀名臣祠碑本朝李因篤粤稽古褒徳酬庸之典榮哀備極廟朝而生有方蒞官有地士大夫追叙生平遺烈祀之瞽宗曰鄉賢曰名宦世世勿絶尤鉅者則特陟名臣祠比隆孔庭有堂上之豆籩合享宗功有配食之元佐也獲與其列代止數人必身繫安危任兼將相名徳至重為當代所景行捍患禦災奕􅑤永賴徵諸祭義而不愧乃今得少保梁公焉公諱化鳯字翀天一字灃源吾陜西長安人弱冠補諸生聲噪甚値有明末造流羽日張慷慨棄儒自請學使者改𨽻武籍隨舉於鄉大清受命肇科成順治三年進士授山西大同府陽和髙山衛守備陞大同掌印都司加三級遷遊擊進副總兵都督僉事江南蕪萊副將管叅將事遷寧國副將陞蘇松總兵進左都督太子太保授三等阿達哈哈番世職陞提督進江南全省提督授三等阿思哈哈畨世襲八次公長身倜儻音吐甚宏雄鷙沈深好謀善斷初繇禆校戮力戎行剪逆渠平逋㓂能以少擊衆所向無前南北並宜戰攻互用積其功閥史不勝書畧載吳學士駿公所撰壯猷紀中姑不具述惟是雲中姜瓖之叛値版圖初定山西為京師右臂大同被邊變起倉惶全晉皆搖公乘塞上一小障所將不過數百非有葭莩之契爪牙之足憑也而奮其孤忠披荆棘以從諸王䝉知旅謁遂叅宻畫委前茅摧鋒陷堅諸將咸出其後期年之内大憝就誅飈發電馳大小七十七戰晉地悉定夫晉與秦脣齒之國河上揚氛矢逸及闗不逞之徒潛相扇誘賊壘去西安三百里㣲公即嶽輔間伏莽堪虞捲西北以踞上游事尚可言哉故論公血戰之勲著於山西而受庇在秦晉磐石在社稷矣比公建牙江表仍際海波鄭成功張名振狡焉狂謀先後連數十萬艘空巢穴入犯公初入蘇特攝而換任淛東業奉新綸既至崇明有高橋土城之捷已足謝三吳而去公則曰緩追佚獲藉口越之簡書是便已自營也而搜勦平沙之䇿始决故舟山之内指不詭於浮言小洪之築隄不諮於制府及鎭蘇有命帥水師進階横海一軍屹然勁旅其後成功親驅風鷁直闚江寧賴公鼓擢飛臨用三千人破賊數十萬成功僅以身免艍􅙔焚湯無遺嗟乎賊沮洳跳梁萬分何慮然茍將牢弗擊致倔彊江湖詿誤吏民必多至於不獲已而用兵則東南勞費巨億肝腦塗地又不知幾何故遡公之功方諸光弼中潬而識者謂崇明墨守永奠江淮不徒繫一城也善乎吳學士之論曰公之渡桑乾下句注揚武青陂白道之上張耳之禽夏説絳侯之斬陳豨也定西河平上黨耀兵雀䑕之谷振旅天井之闗武安君之走馮亭淮隂侯之襲魏豹也大航救至東府城開白石鑱其空屯赭圻掃其餘燼陶士行之誅蘇峻李藥師之破輔公祏也龍江戰氣鴉浦軍聲窮冦逞五火之攻孤城保三沙之固楊越國之追髙智慧王少保之取邵靑也又稱公智勇有餘畧不世出而歴舉古之名將若莫罄於名言予猶備考其勲猷觀其所樹立而推本於用心之獨至曰忠曰誠夫忠者事君之先資而誠者臣子所以貫金石孚君親洋溢乎智名勇功之間率是物也公為禆校聲出大將之右為大將身在士卒之先良由自矢忠貞屢鬭畢勝而究其涉水不濡入火不焚冐礟石而不傷刀箭之瘢徧體犁犁若畫汔於脱險而必濟則一誠為之根柢緬仰公之徳音槩此矣至孝友端亮萬鍾之禄養渥二人五色之光恩貤三世而公兄翀霄君優游泉石拊背暮年四子長君鼎御前侍衞予告仲君鼐蘇松水師總兵都督同知叔君鼒廣東惠潮兵巡道按察司僉事季君鼑官䕃候選諸孫長祚昌世襲三等阿思哈尼哈番仲祚晟長安庠生餘俱幼庠序黨塾之中彬彬矣極人世之遭逢擅天倫之樂事亦孰非積誠之效作忠之基哉公薨皇上震悼輟朝贈少保賜諡敏壯山西江南兩省祀名宦者數十區陜西祀鄉賢士大夫謂未足酬公休烈也合詞上請進主祏於名臣之楹萬人歌泣相聞信稽之輿誦而孚徵諸祭義而不爽者子叨長君宿契屬記豐碑若公自盛壯登壇老於戰陣干戈既靖輕裘緩帶日與賔客飲酒賦詩著作等身又諸疏草條議禁令並已刋行世而崇儒重士月課觀風咸有成書與前後所得誥勅奬勞之文俱藏於家其築平沙隄因得壖田千餘頃資灌溉並收其薪芻佐軍金山衞一帶捐俸修堤數十里而遙農桑歲稔嗣憫淮揚水患捐米千餘石賑飢各載貞珉不能備錄也予更撮其大指賦古體以妥公靈其詞曰於維少保世系吾秦三峰鍾異乃降偉人涵輝東序衎國之賔遭時不造小絀大伸艱難用武敢庀其倫前繻可棄雜珮為親遂掇鄉射公車在旬天眷初輯肇科俊民乃叱戎車髙山紫塞蒞事崇朝隂雲晝晦夫何狂且肆彼頑悖千里傳烽蠢兹宵蠆帝赫斯怒諸王畢㑹儔奮顔行獨公入對策險臣趨搴旗致艾羣目攸屬迅飈掃介公戈所指電激星煌如哮猛虎駭束羊獐殺賊如草無聲有光徐瞻公至漬血盈裳七十餘戰爰綏晉疆王朝行壘徧親敵場稱公之勇信不可當露布夕奏恩綸是彰起騎都尉超遷督弁暨王軍中頻錫寵讌賚之章服爰及錦帣寳馬麗刀如金篦箭樞曹推轂未竟厥撰謂公壯畧南北皆擅濟川須才卜諸衆彥將舒培風歴試乃見海陬遺孽鼓浪跳澌張帆入冦震我嘉師公適改淛㑹逢其時拯危自任遑飾於辭敵舟雨集公曰驅之燎原何懼葭葦在兹􅙔艚立盡鷹䳱同嗤江淮遐奠永繫我思公賀賊平疊聞優詔進公宫銜帥週南奥世掌虎旅親居前導彤盧文駟燦列七校殁為明神陪食太廟遡初暨官宗祏同耀載叙膚功名臣肅告長修豆籩不毁不祧東山記唐張説兵部尚書同中書門下三品修文館大學士韋公體含貞靜思叶幽曠雖翊亮廊廟而緬懷林藪東山之曲有別業焉嵐氣入野榛煙出谷石潭竹岸松齋藥畹虹泉電射雲木虚吟恍忽疑夢間闗忘術兹所謂丘壑䕫龍衣冠巢許幸温泉之歳皇上聞而賞之乃命掌舍設帟金吾劃次太官載酒奉常抱樂停輿輦於靑靄佇翬䄖於紫氛百神朝於谷中千官飲乎池上緹騎環山朱斾焰野縱觀空巷途歌傳壑是日即席拜公逍遙公名其居曰淸虚原幽棲谷景移樂極天子賦詩王后帝女宫嬪邦媛歌焉和焉以寵徳也加以中宫敦序謂我諸兄引内子於重幄見兒童於行殿家人之禮優棠棣之詩作於是實其筐筥下以昭忠信之獻賁其束帛上以示慈惠之恩朝野歡并君臣義洽夫飛翠華歴茨嶺至道之主也紆紫綬期赤松素履之輔也千載一時難乎此遇故兩耀合舎衆星聚徳雅道光華髙風允塞寒谷煦景竅崖潤色猗歟盛事振古未有篆之元石貽代厥後司徒岐公杜城郊居記權徳輿司徒岐國公以盛徳相三朝以大中敷五敎帝載叶龢太階躋平既致用於方内亦宅心於事外神京善地啟夏南出凡十有六里而仁智之居在焉縈迴巖巘左右勝勢徑術委迤於木杪臺亭􅑬嵼於山腹下崇岡冐青蒼步履平夷以至於堂皇四敞賔榻中容宴豆孤齋閒館幽槩隨之乃開洞穴以導泉脉其流泠泠或决或渟激而杯行瀑為玉聲初䝉於山下終匯於池際白波淪漣繚以方塘輕艫緩棹㳂洄上下見烟霞澄霽之狀魚鳥飛沈之適濯於潺湲風於碧鮮紅葩火燃素英雪翻芊綿䓤蒨杳窱迴合含虚籟以四達遡清輝而交映故其休沐燕息盍簪投轄則有鳴珮拖紳宗公雋人金閨玉堂之賔淑姿修態流光含睇迴風遏雲之藝中飲笑抃交歡擊節不知公相之為貴適其適故也易坤之説曰君子以厚徳載物詩曰愷悌君子求福不囘惟公以徳受福故光明昌大毎温室宴見一人尊禮而不名故其代天工斷國論卓爾以冠羣后暨夫暇日之戾止於斯也則暢天理棲顥氣翛然以遺萬物其無方歟其不器歟昔子房赤松子之遊且非代教安石東山之賞僻在下國豈若公宻贊化育内諧恬曠如春之仁如樂之和以君臣之交感兼動靜之極摯從古已還無公比焉公之華宗自漢建平侯徙杜陵三守本封幾乎千祀故城南墟里多以杜為名逮今郊居不忘厥初又以見積厚流澤此焉囘復且公之心無町畦夀若岡陵昭融烜赫未始有極徳輿謬陪衆君子升公之堂嘉招盛集靡間弦晦以衆美之不可以不紀也承命遽書刻於巖石云館驛使壁記柳宗元凡萬國之㑹四方之來天下之道塗畢出於邦畿之内奉貢輸賦修職於王都者入於近闗則皆重足錯轂以聽有司之命徵令賜予布政於下國者出於甸服而後按行成列以就諸侯之館故館驛之制於千里之内尤重自萬年至於渭南其驛六其蔽曰華州其闗曰潼闗自華而北界於櫟陽其驛六其蔽曰同州其闗曰蒲津自灞而南至於藍田其驛六其蔽曰商州其闗曰武闗自長安至於盩厔其驛十有一其蔽曰洋州其闗曰華陽自武功西至於好畤其驛三其蔽曰鳳翔府其闗曰隴闗自渭而北至於華原其驛九其蔽曰坊州自咸陽而西至於奉天其驛六其蔽曰邠州由四海之内總而合之以至於闗由闗之内束而會之以至於王都華人夷人往復而授館者旁午而至傳吏奉符而閲其數縣吏執牘而書其物告至告去之役不絶於道寓望迎勞之禮無曠於日而春秋朝陵之邑皆有傳館其飲飫餼饋咸出於豐給繕完築復必歸於整頓列其田租布其貨利權其入而用其積於是有出納奇贏之數勾㑹考校之政大厯十四年始命御史為之使俾考其成以質於尚書季月之晦必合其簿書以視其等列而校其信宿必稱其制有不當者反之於官尸其事者有勞焉則復於天子而優升之勞大者増其官其次者降其調之數又其次猶異其考績官有不職則以告而罪之故月受俸二萬於太府吏五人承符者二人皆有食焉先是假廢官之印而用之貞元十九年南陽韓泰告於上始鑄使印而正其名然其嗣當斯職未嘗有記之者追而求之盖數歲而往則失之矣今余為之記遂以韓氏為首且曰修其職故首之也興州江運記前人御史大夫嚴公礪牧於梁五年嗣天子用周漢進律增秩之典以親諸侯謂公有功徳理行就加禮部尚書是年四月使中謁者來錫公命賔僚吏屬將校卒士黧老童孺塡溢公門舞躍歡呼願建碑紀徳垂億萬祀公固不許而相與怨咨遑遑如不飲食於是西鄙之人密以刋山導江之事願刻巖石曰維梁之西其蔽曰某山其守曰興州興州之西為戎居歲備亭障實以精卒以道之險隘兵困於食守用不固公患之曰吾嘗為興州凡其土地之故吾能知之自長舉北至於青泥山又西抵於成州過栗亭川踰寳井堡崖谷峻隘十里百折負重而上若蹈利刃盛秋水潦窮冬雨雪深泥積水相輔為害顚踣騰藉血流棧道糗糧芻藁塡谷委山牛馬羣畜相藉物故運夫畢力守卒延頸嗷嗷之聲甚可哀也若是者綿三百里而餘自長舉而西可以導江而下二百里而至昔之人莫得知也吾受命於君而育斯人其可已乎乃出軍府之幣以備器用即山僦工由是轉巨石仆大木焚以炎火沃以食醯摧其堅剛化為灰燼畚鍤之下易甚朽壤乃闢乃墾乃宣乃理隨山之曲直以休人力順地之髙下以殺湍悍厥功既成咸如其素於是决去壅土疏導江濤萬夫呼抃莫不如志雷騰雲奔百里一瞬既㑹既逺澹為安流烝徒謳歌枕卧而至戍人無虞專力待㓂惟我公之功疇可侔也而無以酧徳致其大願又不可得命矧公之始來屬當惡歲府庾甚虚器備甚殫饑饉昏札死徙充路賴公節用愛人克安而生老窮有養幼乳以遂不問不使咸得其志公命鼓鑄庫有利兵公命屯田師有餘糧選徒練旅有衆孔武平刑議獄有衆不黷増石為防膏我稻粱歲無凶災家有積倉傳館是飾旅忘其歸杠梁以成人不履危若是者皆以戎隙帥士而為之不出四人之力而百役以就且我西鄙之職官故不能具舉惟公和恒直方㢘毅信讓敦尚儒學挹損貴位率忠與仁以厚其誠有可以安利於人者行之堅勇不俟終日其興功濟物宜如此其大也昔之為國者惟水事為重故有障大澤勤其官而受封國者矣西門遺利史起興歎白圭壑鄰孟子不與公能平險休勞以惠萬代其功烈尤章章焉不可盖也是用假辭碣工勒石存之用永憲於後祀曲江池記歐陽詹水不注川者在藪澤則曰陂曰湖在苑囿則為池為沼苑之沼囿之池力墾而成則多天然而有則寡兹池者其天然歟循原北峙迴岡北轉圓環四帀中成坎窙窌港洞生泉噏源東西三里而遙南北三里而近當天邑別卜繚垣未繞乃空山之濼曠野之湫然黄河作其左塹清渭為其後洫襃斜右走太一前横崇山濬川鈎結蟠䕶不南不北湛然中渟西北有地平坦彌望五六十里而無窪㘭紫盖凝而不散黄旗鬱以常在實陶鈞之至造化之工沙汰一氣之辰財成六合之日既以磽确外為寰宇敞無垠堮以居億兆又選英精内為區城東以襟帶用宅君長若人斯生支體具矣有心以繫其神焉若堂斯考廊廡設矣有室以處其尊焉彼如紫盖黄旗之氣盖陶鈞造化者用宅君長英精之所耶夫物茍相表裏制必同象泄夫外則廓以靈海導夫内則融乎此湫歴代帝王未得而有豈降巢室土之後聯綿千百之代建卜都邑不欲合夫天意而居乎將天意尚同根深蔕固可與終畢者而命處乎故涸於有隋比我皇唐之存孕詔其季主營之以須焉揆北辰以正方度南端而制極墉隍劃趾勾陳定位地迴帝室湫成厥池既由我署纔成伊去眞主巍巍龍蟠虎踞爰自中而軌物取諸象以正名字曰曲江儀形也觀夫妙用在人豐功及物則總天府之津液疏皇居之墊隘潢汙入其洞澈銷涎漦以下澄汙㕎隨其佳氣蕩鬱攸而上滅萬戸無重膇之患千門就爽塏之致其流惡含和厚生蠲疾有如此者皎皛如練清明若空俯睇沖融得渭北之飛雁斜窺澹泞見終南之片石珍木周庇奇花中縟重樓夭矯以縈映危榭巉巖以輝燭芬芳䕃潛滉瀁電烻凝烟吐靄泛羽遊鱗斐郁郁以閑麗謐徽徽而清肅其涵虚抱景氣象澄鮮有如此者皇皇后辟振振都人遇良辰於令月就妙賞乎勝趣九重繡轂翼六龍而畢降千門錦帳同五侯以偕至泛菊則因髙乎斷㟁祓禊則就潔乎芳沚戯舟載酒或在中流清芬入襟沈昏以滌寒光眩目貞白以生絲竹駢羅緹綺交錯五色結章於下地八音成文於上空砰鞫沸渭神仙奏鈞天於赤水黤藹敷俞天人曳雲霓於𤣥都其洗慮延歡俾人怡懌有如此者至若嬉遊以節宴賞有經則纎埃不動㣲波以寧熒熒渟渟瑞見祥形其或淫湎以情泛覽無斁則飄風暴振洪濤噴射崩騰駱驛妖生禍覿其棲神育靈興善懲惡有如此者某幸因受遣觀光上國身不佞而自棄日無名以多暇訽奇覽物得之於斯矚太始之元造訪前聞於碩老天生地成之理識之於性情物儀人事之端徵之於耳目夫流惡含和厚生蠲疾則去隂之慝輔陽之徳也涵虚抱影氣象澄鮮則藻飾神州芳榮帝宇也洗慮延歡俾人怡悦則致民樂土而安其志也棲神育靈興善懲惡則俗知所勸而重其教也號惟天邑非可謬創一山一水拳石草樹皆有所謂兹池者其有謂之雄焉意我皇唐須有此地以居之有此地須有此池以毗之佑不仁之亭毒賛無言之化育至矣哉以其廣狹而方於大則小矣以其淵洞而論夫深則淺矣而有功如彼有徳若此代之君子盖有知之而不述令民無得而稱焉輒粗陳其㫖刋諸石庶元元荷日用之力也貞元五年歲在己巳夏五月十五日記邠州節度使院壁記李直方自西漢始置幕府得顓辟士其聘舉之盛與公府置吏王國命官為比於是有班固傳毅崔駰蔡邕陳琳阮瑀之徒出焉大抵多巡禦封畧經叅戎事居無恒處秩靡常品故命之曰賔國朝篤方岳之任愼求其佐班以職貢為之定制或辟自諸侯或降於朝廷皆命於天子其所司也調政教之和策軍算之秘出入聘覲應對賔客其立署也行有戎次處有公堂與方伯周旅彌縫潤色而已王畿之腋劃為巨防外殿朝那作捍西疆中拱皇都以臨諸夏漆沮之仁既逺華夷之俗相猾非瓌材英傑莫典封守非莊明純固莫叅甿佐六年春皇帝勞韓侯牧圉之勤俾尹西夏申命御史中丞王君等九人為之使介既而師貞於律農勤其功惠和威武澤浸火烈孟秋述職耀兵河塞亭障蕭條千里宴清然後用虎旗虵矛定功於蒲入覲皇都增秩受賜旋師舊服勲明徳舉非元臣雄畧能賢嘉績蔑用濟此先是尚父郭公開府是邦搜賢勿貳駿乂咸集不十數年持樞衡治邦憲司誥命者咸布職於清朝今韓侯亦能詳延端士輔相威徳是府將來宜為俊賢之郊藪榮達之閫閾衛多君子邠其有之夫敬其事則命始春秋之誼也是邦當徵號朔方而以名師建為三郡肇基於我師事舉徳宜始韓侯此記舊題於堂之北牖慮他日文字湮滅作者之文莫傳遂刻石以紀之中渭橋記喬潭自鳥䑕穴者兹水廣矣依鳳凰城者兹橋壯矣水朝巨海而不竭橋通大路而居要不然豈自秦至我唐六千甲子而獨存也稽厥𢎞道率兹帝圻候天根之見當農務之隙司金司木鳩而積也水工木工速而至也揮刃落雪荷鍤成雲京兆尹紫綬而董之邑吏墨綬以臨之逺邇子來結構勿亟無小無大咸稱天休經之營之不愆於素丹柱揷於坎陷朱欄赩而電炫乃虹引成勢猶雀塡就功連横門抵禁苑南馳終嶺商洛北走滇池鄜畤濟濟有衆憧憧往來車馬載馳而不危水潦起漲而轉固人思啟者吾其能濟赩赩赫赫轟轟闐闐且周穆之駕黿鼉振千祀也東明之聚魚鱉稱一時也孰若我由之而必達憑之而必安若以匹敵夫何逺矣潭遂因行邁覩兹崇飾將刋石以表迹敢搦札以紀事赤奮歲流火之月也重修漢未央宫記裴素皇帝嗣位之年衆靈悦附日月所照莫不砥礪是以逺夷慕義琛賮鼎來用文明以為理洞風露之所啟草木茂暢山川景清擊壤鼓腹莫識由乎帝力嘗因勝日聖思閒逺倦大厦之講習想鮮原之遊衍乃命法駕備宫馭細草迎輦神飈引衣超然肆行造適自得視往昔之遺館獲漢京之餘址邈風光以遐矚眇思古以論都襟靈洋洋周視若感者久之於是召左䕶軍中尉志𢎞指示之曰此漢遺宫也其金馬石渠神池龍闕往往而在朕嘗以古事况今亦欲順考古道訓齊天下也至是遐歴恍然深念且欲存列漢事悠揚古風耳昔人有思其人猶愛其樹况悦其風登其址乎吾欲崇其頽基建斯餘構勿使華麗爰舉舊規而已庶得認其風烟時有以凝神於此也於是命工度材審曲面勢裁成法度以就斯宫攅櫨栱宻玉石碧瓦龍錯層軒烏跂崇墉粉靜璇題月照舒廊四注以雲委隆臺分據而山屹蟠虬蜿蜒鱗動梠桷蹲獸却騁姿雄欄檻宏袤乎豁達跨臨乎涇渭綠竹凝逺繁松藹深竒樹流光丹墀迴繞於是辟戲馬之廣場開逺日之閒館天地景新山川勢重迴大華之秀氣列終南之翠屏九嵕􅏭􅙙而固䕶八水分流以縈帶而又揚太液之波繚周帝之垣原隰成文丹素含華翼樓杳以分飛雄虹直而中跱神機一發廓若懸㝢祥煙瑞彩鬱鬱葱葱瞻迴途以下濟撫璇璣而高視見秦川風物漢原邐迤感前王興廢稼穡艱難吾君用此鏡是非閲思慮豈獨恣耳目縱遊翫也凡殿宇成構揔三百四十九間工徒役指萬計武夫奮力將有成規然而材匪藻棁塗惟儉静經之營之不日而成也按漢史髙祖初定天下悦卜洛之邑為天地之中有周室遺風將都之婁敬諫曰陛下取天下與周室異不可居也夫洛陽四戰之地豈若秦川天府之國山河形勝正百二之勢乎髙祖是日駕如長安其後七年北擊韓王信相國蕭何居守營未央宫因龍首山作前殿建觀闕街道周圍七十里臺殿四十所帝還見之怒曰何治宫室之過度也何曰天子以四海為家非壯麗無以重威徳帝悦而就居焉自漢元年乙未歲至聖唐㑹昌元年之辛酉凡一千四十有七年矣其傾頹毁圮悠然邈然竟無有存焉者我后緬慕古昔之興時即其舊而新是圖築摧基而繩修木不侈不約巍然嶷然時以通覽無方周視有截則有若志𢎞奉聖君之㫖也明年上親見祖考郊天神雪灑川原塵清城闕陽和風扇緑野烟澹是月也三辰承初以表無事上乃顧新宫迴玉輦列騎雲動彩仗天旋造於未央俯仰周視肅威神而煌煌遊焉息焉容與説懌晴山屏開以四達故城巉然而隠嶙鮮風美景薰然入座上從容言曰吾今建是殿且錫之以嘉名名其殿曰通光其東曰韶芳亭其西曰凝思亭乃立臯門曰端門其應門題曰未央宫不忘好古也乃命侍臣曰爾為我記之刻以貞石傳示乎不朽臣素任當承㫖不敢固讓拜舞而文之時㑹昌元祀濡大澤之明月也新開白水路記宋雷簡夫至和二年冬利州路轉運使主客郎中李虞卿以蜀道靑泥嶺舊路髙峻請開白水路自鳳州河池驛至長舉驛五十里有半以便公私之行具上未報即預畫材費以待其可明年春迺與州巡轄馬遞舖殿直喬達領橋閣并郵兵五百餘人因山伐木積於路處遂藉其人用訖是役又請知興州軍州事虞部員外郎劉拱總䕶督作一切仰給悉令為長命簽署興州判官㕔公事太子中舍李良祜權知長舉縣事順政令商應程度逺近按事險易同督斯衆知鳳州河池縣事殿中丞王令圖首建路議路古縣地且十五餘里部屬陜西即移文令圖通幹其事至秋七月始可其奏然八月行者已走斯路矣十二月諸功告畢作閣二千三百九間郵亭營屋綱院三百八十三間減舊路三十三里廢青泥一驛除郵兵驛馬一百五十六人騎歲省驛廩舖糧五千石畜草一萬束故事役夫三十餘人路未成㑹李遷東川路今轉運使工部郎中集賢校理田諒至審其續狀可成故喜猶已出事益不懈於是斯役實肇於李而遂成於田也嘉祐二年三月田以狀上且曰虞卿以至和二年仲春興是役仲夏移去其經營建樹之狀本與令圖同臣雖承乏在臣何力願朝廷旌虞卿令圖之勞用勸來者又拱之督役應用良祜應之按視修創達之採造監領皆有著效亦已陞擢至軍士什長而下並望賜與以慰逺心朝廷議依其請初景徳元年嘗通此路未幾而復廢者盖青泥土豪輩唧唧巧語以疑行路且驛廢則客邸酒壚為棄物矣浮食遊手安所仰耶小人居常嘗爭半分之利或睚眦抵死况望要路無有在家遲行人一切之急射一日十倍之資顧肻黙黙耶造作百端理當然爾嚮使愚者不怖其誕説賢者不惑其風聞則斯路初亦不廢也大抵蜀道之難自昔青泥嶺稱首一旦避險即安寛民費斯利害斷然易曉烏用聽其悠悠之談耶而後之人見已成之易不念始成之難茍念其難則斯路永期不廢矣簡夫之文雖磨崖鏤石亦恐不足其請附於尚書職方之籍之圖則將久其傳也游玉華山記張岷宜君縣西南四十里有夾道而來者玉華也其南曰野火谷望之如爨烟而莫知其所自也野火之西曰鳳凰谷則唐置宫之故地也盖其初有九殿五門而可記其名與處者六其正殿為玉華其上為排雲又其上為慶雲其正門為南風南風之東為太子之居其殿曰耀和門曰嘉禮知其名失其處者一曰金飈門也過而覽之惟野田荒草而已其西曰珊瑚谷盖嘗有別殿在焉珊瑚之北蘭芝谷昔唐太宗詔沙門𤣥裝者譯經於此其始曰肅成殿後廢而為寺云中有石巖嶄然天成下有鑿室可容數十人有泉懸勢若飛雨有松十八環其側皆生石上髙可十尋端如植筆其西南有崖曰駐鑾其始入也雙壁屹然如削石而成既至其處若視甕側有泉飛而下如懸雨噴珠其名曰水簾稍北有崖與泉亦若是而差小治平三年夏余與六人者來遊乃相與坐石䕃松聽泉而飲之已而覽故宫以徘徊問遺事於田老方囂然不欲歸而余與六人者各以事牽不可久留咸相視有不懌之色余為之言曰夫山林泉石竒偉之觀常在乎窮僻之處而去人跡甚逺故必為野僧方士與夫幽潛之人所據而有也然幽潛之人知好之而力不足以營之惟佛老之説可以動人其徒常獨力而危亭廣厦之娛莫不為其所擅也夫以唐有天下之盛窮天下之富建宫於此隨而廢沒而杜甫乃其時人過之且有悲傷之感至或形於歌詩獨寺僧之徒更相傳而不息迄於今而尚存則雖天下之力亦有屈於此與以太宗之賢致治之美宜其久而彌傳也今諸遺老無所稱道而彼𤣥裝者不過一浮屠耳然説者至為荒怪難知之語以增大其事豈常人之情樂於放肆而易忘於中正哉豈物之盛衰廢興亦各有時而此特其盛也與斯可為之太息也已若夫太宗之賢天下之力猶不長有此也則吾曹可以一寓目而足矣又何必以不久為悵哉然荒崖窮谷﨑危廢宫𩔖此之蕭條雖累歳月未嘗有一二人遊焉而余與六人者同時而來亦可謂之盛哉凌虚臺記蘇軾國於南山之下宜若起居飲食與山接也四方之山莫髙於終南而都邑之近於山者莫近於扶風以至近求最髙其勢必得而太守之居未嘗知有山焉雖非事之所以損益而物理有不當然者此凌虚之所為築也方其未築也太守陳公杖履逍遙於其下見山之出於林木之上者纍纍如人之旅行於牆外而見其髻也曰是必有異使工鑿其前為方池以其土築臺髙出於屋之簷而止然後人之至於其上者恍然不知臺之髙而以為山之踴躍奮迅而出也公曰是宜名凌虚以告其從事蘇軾而求文以為記軾復於公曰物之興廢成毁皆不可得而知也昔者荒草野田霜露之所䝉翳狐虺之所竄伏方是時豈知有凌虚臺邪廢興成毁相尋於無窮則臺之復為荒草野田亦不可知也嘗試與公登臺而望其東則秦穆之祈年槖泉也其南則漢武之長楊五柞而其北則隋之仁夀唐之九成也計其一時之盛宏傑詭麗堅固而不可動者豈特百倍於臺而已哉然而數世之後欲求其髣髴而破瓦頹垣無復存者既已化為荆棘禾黍丘墟壠畝矣而况於此臺歟夫臺猶不足恃以長久而况於人事之得喪忽往而忽來者歟而或者欲以夸世而自足則過矣盖世有足恃者而不在乎臺之存亡也既以言於公退而為之記文與可畫篔簹谷偃竹記前人竹之始生一寸之萌耳而節葉具焉自蜩腹虵蚹以至於劒拔十尋者生而有之也今畫者乃節節而為之葉葉而累之豈復有竹乎故畫竹者必先得成竹於胸中執筆熟視乃見其所欲畫者急起從之振筆直遂以追其所見如兔起鶻落少縱則逝矣與可之教予如此予不能然也而心識其所以然夫既心識其所以然而不能然者内外不一心手不相應不學之過也故凡有見於中而操之不熟者平居自視了然而臨事忽焉喪之豈獨竹乎子由為墨竹賦以遺與可曰庖丁解牛者也而養生者取之輪扁斵輪者也而讀書者與之今夫夫子之託於斯竹也而以子為有道者則非耶子由未嘗畫也故得其意而已若予者豈獨得其意并得其法與可畫竹初不自貴重四方之人持縑素而請者足相躡於其門與可厭之投諸地而罵曰吾將以為韈士大夫傳之以為口實及與可自洋州還而余為徐州與可以書遺余曰幸語士大夫吾墨竹一𣲖近在彭城可往求之韈材當萃於子矣書尾復寫一詩其畧曰擬將一段鵞谿絹埽取寒梢萬尺長予謂與可竹長萬尺當用絹二百五十匹知公倦於筆研願得此絹而已與可無以答則曰吾言妄矣世豈有萬尺竹哉余因而實之答其詩曰世間亦有千尋竹月落庭空影許長與可笑曰蘇子辯則辯矣然二百五十匹吾將買田而歸老焉因以所畫篔簹谷偃竹遺余曰此竹數尺耳而有萬尺之勢篔簹谷在洋州與可嘗令予作洋州三十詠篔簹谷其一也予詩云漢川修竹賤如蓬斤斧何曾赦籜龍料得清貧饞太守渭濵千畝在胸中與可是日與其妻遊谷中燒筍晚食發函得詩失笑噴飯滿案元豐二年正月二十日與可沒於陳州是歳七月七日予在湖州曝書畫見此竹廢巻而哭失聲昔曹孟徳祭橋公文有車過腹痛之語而予亦載與可疇昔戯笑之言者以見與可於予親厚無間如此也張横渠先生祠記宋文禮愷延祐四年冬十有二月朔陽陵李中從政奉紫㣲檄赴郿文學掾道横渠進謁故宋張獻公祠下盥薦畢禮徘徊瞻顧内則䑕穴雀穿榱棟霖毁寖危神位外則豕囿蛇藪蔓葛叢棘牆壁悉傾歎息良久乃詣縣諗主簿劉公楫請重葺以副具瞻適廣宣聖廟廡董役孔亟力不暇及越明年春始鳩工徵材祠之故壞腐者咸易之㑹劉丁内艱旋復中畫洎今尉楊侯粹至欣然協規僦力迄歲而功成甍楶扉牖煥然一新囑記於走且曰是鎭之南先生故居今皆蕪沒疑為緇黄有欲髣髴一覽不可得是祠元貞初所建陋復若此向非嗣葺日就廢矣予居郿積年悉其事盍筆以詔永久竊惟先生以道學鳴於嘉祐熈寧間河南兩程夫子從濂溪周子學而先生適相後先羽翼孔孟淵源洙泗著書立説垂範後世從祀清廟以來尚矣矧其一時徳業之盛則昔儒記述之詳盖已備列簡冊而布之天下學者至今稱闗中之横渠與舂陵之濂溪河南之伊洛擬聖賢鄒魯兹固可畧矣病夫俗學之士猶吝舊習或局於辭藻或馳鶩詭怪既自逺乎正大之域斯先生之書容有覆瓿之議者天相斯文無往不復今聖天子龍飛乾造恢崇儒雅科舉定制摭實去華源本道學體用該具天下之學翕然向風則向之覆瓿者匪徒珍而誦之第將行其所知矣君等乃能上體國家崇儒復古之意一新是祠展鄉曲之敬申歲時祀事郿人不徒擅其處吾儒亦以之而增輝焉若夫窮神化一天人立大本斥異端同志之士瞻拜遺像於以想見先生之丰采則其胸次興起者又當何如也走不敢辭而辱為其記亦附管見方與君子共勉之云遊城南記張禮元祐改元季春戊申明㣲茂中同出京兆之東南門歴興道務本二坊由務本西門入聖容院觀薦福寺塔南行至永樂坊東南至慈恩寺少遲登塔觀唐人留題倚塔下瞰曲江宫殿樂遊燕喜之地皆為野草不覺有黍離麥秀之感出寺涉黄渠上杏園望芙蓉園西行過杜祁公家廟出啟夏門覽南郊百神靈星三壇次杜光村東南歴仇家庄過髙望西南行至蕭灌墓讀碑由趙村訪章敬寺基經撥川王論弓仁墓下勲䕃坡入牛頭寺登長老文公禪堂夜宿寺之南軒己酉謁龍堂循清明渠而西至皇子陂徘徊久之覽韓鄭郊居至韋曲扣堯夫門上逍遙公讀書臺尋所謂何將軍山林而不可見因思唐人之居城南者往往舊蹟湮沒無所考求豈勝遺恨哉晚抵申店李氏園亭夜宿祁子虚書舎庚戌子虚邀飲韋氏㑹景堂及門主人出迓明㣲以為不足子虚道其景且誦其詩明㣲聞始入其奥復相率濟潏水陟神禾原西望香積寺塔原下有樊川御宿之水交流謂之交水西合於豐北入於渭下原訪劉希古過瓜洲村復涉潏水遊范公五居東上朱坡憩華巖寺下瞰終南之勝霧巖玉案圭峰紫閣粲在目前不徒足履而盡也已而子虚希古開樽三門寺僧子齊出詩凡數百篇皆詠寺焉予賞蘇子美詩明㣲吟唐僧子蘭詩疎鐘搖雨脚積雨浸雲容之句及讀相國陳公悔把吾廬寄杜城之言則又知華巖之為勝也酒闌過東閣閣以華巖有所蔽而登覽勝之眞如塔在焉謂之東閣以西有華巖寺故也今為草堂別院下閣至澄襟院院引北岩泉水架竹落庭注石盆中瑩徹可挹使人不覺頓忘俗意時子虚希古先歸院之東元醫之居也予與明㣲宿焉辛亥歴廢延興寺過夏侯村王白二庄林泉東次杜曲前瞻杜固盤桓移時越姜堡至興教寺上玉峰軒南望龍池廢寺過塔院抵韋趙覽牛相公樊鄉郊居迺登少陵原西過司馬村穿三像院尋舊路暮歸孫君中復之廬壬子渡潏水而南上原觀乾湫憩塗山寺望翠㣲百塔子虚約有五臺而與僕夫負行李者相失遂飲於御宿川之王渠醉還申店幾半夜矣癸丑詣張思道循原而來詣蓮花洞經裴相舊居越幽州庄上道安洞抵炭谷既行小雨而還復尋㑹景堂清談終日甲寅北歸及内家橋子虚別焉予與明㣲自翠臺庄由天門街上畢原西望三㑹寺定昆池迤邐入明徳門歴延祚光行道徳永達四坊之地至崇業坊覽𤣥都觀之遺基過岡論唐昌觀故事既而北行數里入含光門而歸焉實閏月十六也京兆府學石經記黎持汲郡吕公龍圖領漕陜右之日持適承乏雍學一日謁公公喟然謂持曰京兆闤闠間有唐國子監存焉其間石經乃開成中䥴刻唐史載文宗時太學勒石而鄭覃與周墀等校定九經文字上石及覃以宰相兼祭酒於是進石壁九經一百六十巻即今之石經是已舊在務本坊自天祐中韓建築新城而六經石本委棄於野至朱梁時劉鄩守長安有幕吏尹玉羽者白鄩請輦入城鄩方備岐軍之侵軼謂此非急務玉羽紿之曰一旦敵兵臨城碎為矢石亦足以助賊為虐鄩然之乃遷置於此即唐尚書省之西隅也地襍民居其處窪下霖潦衝注隨立輒仆埋沒腐壤歲久折缺予欲徙置於府學之北墉子且伻圖來視厥既視圖則命徒役凡石刻偃仆者悉輦置於其地東西陳列明皇注孝經及建學碑則立之中央顔褚歐陽徐柳之書逮偏旁字源之𩔖則分布於庭之左右如入東序河圖洛書大璧琬琰爛然盈目先是有興平僧誕妄惑衆取索無厭大尹劉公希道沒入其貲有欲請於朝以修慈恩浮圖者公即建言崇飾塔廟非古而興建學校為急朝廷乃以五百千畀之經始於元祐二年初秋盡孟冬而落成門序旁啟雙亭中峙廟廡囘環不崇不卑誠故都之壯觀翰墨之淵藪也竊惟六經大人之道備聖人所以遺天下來世之意盡在於是自周末至隋千餘載之間已遭五厄道雖無窮而器則有敝唯鑱之金石庶可以久有唐之君相知物之終始而憂後世之慮深故石經之立殆以此也然以洛陽蔡邕石經四十六碑觀之其始立也觀視摹冩者車乘日千餘兩塡塞街陌可謂盛矣乃范蔚宗所見其存者纔有十六枚餘皆毁壞磨滅然後知不得其人以䕶持雖金石之固亦難必其可久此吕公所以為有功於聖人之經而不可不書也元祐五年歲次庚午九月壬戌朔二十日記驪山圖記㳺師雄驪山温泉自秦漢周隋相繼崇飾唐貞觀初始營御湯天寳六載築羅城於湯所置百司公卿邸第治湯為池沼增起臺殿環列山谷因改温泉宫為華清宫明皇歲幸焉殿曰九龍以待上浴曰飛霜以奉御寢曰長生以備齋祀其他殿閣樓觀不可勝數維披圖然後可盡述焉逮禄山亂天子遊幸益鮮唐末遂廢晉天福中改曰靈泉觀以賜道士本朝因之盖百有餘年矣府從事李彥博始諭邑宰王注刋故宫圖於石盖欲後人知昔之全盛焉時元祐三年中秋日武功㳺景淑識龍門洞記蘇在廷自蜀至京行四千餘里幾半天下山水之可喜者莫如利三泉興自利至興行五百里幾半蜀道巖洞之可喜者莫如龍洞自三泉西行大道不能二里又自大道南行支徑不能百步山舒水湧無他異少焉突有若觀闕者當其前迫而視之則洞也其深七十三步廣半之其兩旁石壁之嵌空突怒者若耳目鼻口鱗甲跟跗甚具其下皆石為底水文其上若鋪筦簟石墮其間若設俎豆其兩巖皆瘦木翠蔓附石而生葳蕤下覆若綴纓絡木蔓之間布水十道後先交映若垂冕旒水落石底其勢跳瀉與石相鬭若濺霜雪其聲鏘鳴與洞相應若響琴筑寒峭邃幽殆非人境予不能盡名其狀盖造物者專為是瑰詭以聳世俗天地間一尤物循洞南升石斷而山分棄奇為平有土田甚沃有竹箭檜柏松柟襍他卉木甚茂野人或居焉若世所謂桃花源者少西而升不能百步泉湧地中清泠滑甘委蛇東下及洞之額而落向之為布水者此也洞不知本所出相傳以為往有蟄龍騰去擘巖掀麓而為此也故以云淳化中縣令錢侯泳始開為游晏之所水自洞出北合嘉陵大江深不可涉橋於洞北閣於洞下館於洞東又橋於洞南亭榭臺圃於洞西以便遊者又南而升能三里路益險山水益秀復得洞焉若重簷夏屋深不可窮有石牀甚古水出洞中既冽且清然以道惡故絶無遊人歲大旱取湫水輒應疑龍之所家以前洞為門閭而此其堂奥也予蜀人去鄉里生長道路往來京蜀凡十數過過未嘗不遊遊未嘗不飲酒賦詩而去洞中水石草木皆若舊識雖使予自有而賞之不若是數也予同年友李侯山父為令於此予弟䝉父又為尉於此書來告曰願有記也子聞之山水之無知也以人為榮辱故峴山雖卑以叔子而顯冉溪雖秀以子厚而愚今兹洞之奇冠天下非得奇文無以稱之且文人之過其下者相躡也而獨以屬愚何哉嗟夫靈壁之石天下奇翫也盖僅有巖穴處耳徒以其近於中都故取重當世甚至一拳之㣲價累千金而彌不可得其亦巧於效技也今此洞豈特百倍於靈壁惟蒼然獨秀於逺方不效技於王公貴人之前而獨為田夫漁父之所簡賤髙人逸士之所躭翫盖其拙有𩔖予者而予又與洞舊識則雖辱之以予文可也予之拙滋甚終若洞之不可變遷當歸老於故山過洞而留益飲酒賦詩將水石草木一一而辱之不知山靈尚許之乎陜西通志巻九十一
