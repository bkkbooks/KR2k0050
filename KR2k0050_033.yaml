body:
  text: 陜西通志卷三十三選舉四武科將材封蔭掾吏武科唐按唐志長安二年始置武舉郭子儀華州人以武舉異等補衛長史張仁願渭南人武舉宋按宋史咸平三年詔兩制館閣詳定武舉武選入官資序天聖七年詔置武舉以待智勇方略之士張伯威大安軍人紹熙元年武舉進士元王仁卿咸寧人由武科歷官荆湖北道宣慰使明武舉按明會典武舉之法試其謀略藝能列其等第而推用之纍朝不同又天順八年令天下文武衙門各詢訪所屬官員軍民人等有通曉兵法謀略出衆者從公保舉從巡撫巡按會同三司官考試直𨽻從巡按御史考試中者禮送兵部會同總兵官于帥府內試策略教場內試弓馬答策二問騎中四矢步中二矢以上者為中式若答策二問騎中二矢步中一矢以上者次之此明代開設武科之始正德六年辛未鄉試武城榆林人管本鎮都司死節嘉靖元年壬午科劉瓚興安人嘉靖四年乙酉科任傑西安左衛人歷延綏總兵嘉靖十年辛卯科劉維琥清澗人參將嘉靖二十五年丙午科按明會典注嘉靖二十二年武舉不拘名數照會試南北卷例分别邊方腹裏以陜西延綏為邊方取三十名惠堯相清澗人嘉靖二十八年己酉科王檄陳璧許揆俱咸寧人劉葵西安左衛人參將史經西安後衛人歷任操守嘉靖三十一年壬子科按明會典注嘉靖三十二年議準三次鄉試中式武舉官生查照文舉會試事例免其再試徑許赴京會試楊餘慶咸寧人溫州參將嘉靖三十七年戊午科蔣士隆清澗人清澗志作孟隆嘉靖四十年辛酉科王永昌長安人劉大同劉大旅俱清澗人嘉靖四十三年甲子科朱世臣西安左衛人湖廣都司僉事隆慶元年丁卯科王朝邑人萬厯四年丙子科趙至善董獻策俱涇陽人萬厯十年壬午科劉應聘富平人萬厯二十一年甲午科鄭養氣興安州人萬厯二十八年庚子科巢丕振涇陽人薛蒞渭南人萬厯三十年壬寅鄉試張珒渭南人萬厯三十四年丙午科鄒紹光長安人孫啓祥渭南人總兵萬厯三十七年己酉科南國勳渭南人劉威民興安州人張可畏雒南人楊希鎮華隂人師奏凱清澗人己酉壬子乙卯三科中式榆林武學教諭萬厯四十年壬子科王綦業單養心俱長安人巢丕昌郭中龍俱涇陽人王蘭芳盩厔人聨中壬子等三科任巨責薛洪疇俱渭南人萬厯四十三年乙卯科吉斌馬中傑張國憲楊楫俱長安人姚玉璽乙卯戊午天啓甲子三科中式逰擊鄧起鵾俱涇陽人解允璽韓城人乙卯戊午兩科中式守備師勳臣清澗人萬厯四十六年戊午科吳從哲李成龍巢拱極俱涇陽人劉符璽渭南人天啓元年辛酉科王紹祚長安人姚王篆涇陽人辛酉甲子崇禎庚午三科中式天啓四年甲子科效良夫涇陽人秦鏡清澗人天啓七年丁卯科張總斌咸寧人丁卯癸酉丙子三科中式柏可相姚之正俱涇陽人李尚和盩厔人潘國俊漢中衛人副將趙𢎞基韓城人丁卯庚午二科中式守備崇禎三年庚午科徐文進長安人樊育聖吕飛熊俱涇陽人孟興邦王璿何能飛段天挺俱涇陽人庚午丙子中式二科又癸酉解元守備趙國將渭南人守備宋裔繩乾州人守備崇禎六年癸酉科李三竒李呈蔚陳振國翟文煥俱長安人王𥪡極熊飛韓經邦蹇叔武武珍孟昌國俱涇陽人總兵王之杰雒南人宋一馬乾州人鎮撫崇禎九年丙子科王天良鄠縣人李𢎞基王烈孟巖胡守璽許國祚李𢎞猷俱涇陽人蘇鯤化盩厔人師統世清澗人崇禎十二年己卯科趙謙長安人賈子珖王傑士都司王允昌吳中英俱涇陽人司直盩厔人趙希魁參將王欽孟登俊甘振世朱文錦俱渭南人劉揚武雒南人王履祚李繼牧張其寵千總俱朝邑人馬騰驤郃陽人程芳韓城人楊先彩鄜州人崇禎十五年壬午科黨廷俊澄城人解元梁化鳯張藴素俱長安人郭域涇陽人解引桓韓城人守備宋國璋鄜州人科分無考林雨馬一元朱衮管榮祖董仕元把斌髙品張鶴劉菊錢登張我英任中英張震夏珵器錢養民張寵孫守宜蕭鳯張策勳田霖馬應科朱光宇張光煥商光顯夏璿器張國威孫鳯岐以上西安左衛人武備王世爵吳從周王之禎辛標屈養氣吳一貫吳之模劉可大髙允第杜希美桑廷梧桑可綸張一元以上西安前衛人余德榮石藴玉陳緯王賦業董獻策鄭夢麟吳承恩翁大相史宗道孫光祖吳養性施卜劉漢王撫民王又愈白璋尤三省雲鸞翟忠雲鳯王撫字曹芳李春張純張雲鳯髙引沈在郭成劉秩音史守道髙繼照雲斗璧葛似松湯新髙俊士李銓傅佐湯純髙鳴鳯朱仕魁雲斗奎韋永昌王道顯史策以上西安後衛人張夢龍趙進賢丁光祖楊宏周尚文林成棟梁策胡徵麻冕梁國璋王國昌任養志張在武吕之英王興業許引弓王紹禹王都胡遵義許丹𠂻守備田貞任其龍丁圖昌張我賢馮升以上咸寧人薛來引中三科左都督薛來行薛來徵中三科副總兵張致雍以上咸陽人王家珍何珍黃松髙文錦翟象衡李維嶽王象震以上臨潼人李棲鳯張𠂻綺俱髙陵人郗郁王可興李成棟董學易安鎮國王好問杜元勳巢茂桂李日賢張象燦以上涇陽人李克勤李安泰李維喬李梅王承運遊聖門李維翰雒可仕李引夔秦所載雒有策都司劉繼善蓋國龍李長林以上三原人髙國治盩厔人劉應徵李芳楊衛國惠可行楊定國宋復振樊登選田攀龍路雲程宋鎮強李王翰王本治李捍芳田鎮國劉耀武李希聖楊啓元楊廷佐宋登雲李希賜秦國棟楊良翰李王佐李王宣李承翰王宗禹劉起龍沈抱珠黨王捍王靖國李國柱以上富平人蕭如芷提督南京嶽可逰擊以上延安人李賦蒙膚施人參將杜國楣守備杜國橋周叔竒彭康運陳竒劉鳯標以上鳯翔縣人楊淳楊威守備以上寶雞人李唐勳張英鍾田萬年歷中四科以上扶風人劉𢎞規趙武策以上麟逰人王夢熊守備潘雲騰以上漢中人