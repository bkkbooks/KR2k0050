body:
  text: 陜西通志巻七十八紀事第三晉惠帝元康元年秋九月以趙王倫鎮關中倫字子彛宣帝第九子也武帝受禪封琅琊郡王咸寧中改封於趙元康初遷征西将軍開府儀同三司鎮關中倫刑賞失中氐羌反叛徴還京師晉書趙王倫傳按晉室諸王鎮關中者率以先後代如漢度遼将軍之類故不悉書其書者必其有事於陜或行軍屯兵足係地方安危始特著之後倣此例四年夏五月匃奴入上郡據其城匃奴郝散攻上黨殺長史入守上郡晉書北狄傳六年夏匃奴郝度元反匃奴郝散弟度元帥馮翊北地馬蘭羌盧水胡反攻北地太守張損死之馮翊太守歐陽建與度元戰建敗績晉書惠帝紀張光為北地都督氐羌叛太守張損戰没光以百餘人戍馬蘭山北賊圍之百餘日光撫屬将士屢出奇兵擊賊破之張光傳郝散弟度元率馮翊北地羌胡攻破二郡自此以後北狄漸盛北狄傳詔復以梁王彤鎮關中彤元康初轉征西将軍代秦王柬都督關中軍事尋徴為衛将軍録尚書事行太子太保乆之復為征西大将軍代趙王倫鎮關中都督凉雍諸軍事置左右長史司馬又領西戎校尉晉書梁王彤傳初趙王倫為鎮西将軍撓亂關中氐羌反叛乃以梁王彤代之或說華曰趙王貪昧信用孫秀所在為亂而秀變詐奸人之雄今可遣梁王斬秀刈趙之半以謝關右華從之彤許諾秀友人辛冉從西來言于彤曰氐羌自反非秀之為故得免死張華傳秋八月秦雍氐羌齊萬年反冬十一月遣将軍周處等討之八月雍州刺史觧系又為度元所破秦雍氐羌悉叛推氐帥齊萬年僣號稱帝圍涇陽十一月遣安西将軍夏侯駿建威将軍周處等討齊萬年梁王彤屯好畤晉書惠帝紀周處遷御史中丞凡所紏劾不避權貴梁王彤犯法處深文按之及齊萬年反朝臣惡處强直皆曰處吴之名将子也忠烈果毅乃使𨽻夏侯駿西征萬年聞之曰周府君才兼文武若專斷而來不可當也如受制于人此成擒耳既而梁王彤為征西大将軍都督關中諸軍事陳凖知彤将逞宿憾乃言于朝曰駿及梁王皆是貴戚非将帥之才進不求名退不畏咎周處忠勇果勁有怨無援将必喪身宜詔孟觀以精兵萬人為處前鋒必能殄冦不然彤當使處先驅其敗必也朝廷不從周處傳七年春正月将軍周處及齊萬年戰于梁山死之時賊屯梁山有衆七萬駿逼處以五千兵擊之處曰軍無後繼必至覆敗雖在亡身為國取恥彤復命處進討乃與振威将軍盧播雍州刺史觧系攻萬年於六陌今乾州北有六陌鎮将戰處軍士未食彤促令速進而絶其後繼自旦及暮斬首萬計絃絶矢盡播系不救左右勸退處按劍曰是吾効節授命之日何退之為今諸軍負信勢必不振我為大臣以身殉國不亦可乎遂力戰而殁晉書周處傳西按梁山在乾州城北八年秋遣侍御史李苾慰勞漢川流民元康中氐齊萬年反關西擾亂頻嵗大飢百姓流移就榖相與入漢川者數萬家既至漢中上書求寄食巴蜀朝議不許遣侍御史李苾持節慰勞且監察之不令入劔閣苾至漢中受流人賂反為表曰流民十萬餘口非漢中一郡所能振贍蜀有倉儲宜令就食朝廷從之由是散在梁益不可禁止晉書後蜀載記遣将軍孟觀討齊萬年九年春正月觀擊萬年獲之氐帥齊萬年反於關中衆數十萬諸将覆敗相繼中書令陳凖監張華以趙梁諸王在關中雍容貴戚進不貪功退不懼罪士卒雖衆不為之用周處喪敗職此之由上下離心難以勝敵以觀沉毅有文武才用乃啟觀討之觀所領宿衛兵皆趫捷勇悍并統關中士卒身當矢石大戰十數皆破之生擒萬年威慴氐羌晉書孟觀傳元康中西戎反叛拜靖為大将軍梁王彤左司馬加蕩㓂将軍屯兵栗邑擊賊敗之遷始平内史索靖傳以河間王顒鎮關中河間王顒元康九年代梁王彤為平西将軍鎮關中石函之制非親親不得都督關中顒於諸王為踈特以賢舉晉書河間王顒傳永寧元年夏侯奭起兵始平討趙王倫不克死之趙王倫簒位齊王冏謀討之前安西叅軍夏侯奭自稱侍御史在始平合衆得數千人以應冏遣信要顒顒遣主簿房陽河間國人張方討擒奭及其黨十數人于長安市腰斬之及冏檄至顒執冏使送之于倫倫徴兵于顒顒遣方率關右健将赴之方至華隂顒聞二王兵盛乃加長史李含龍驤将軍領督䕶席薳等追方軍廻以應二王義兵至潼關而倫秀已誅天子反正含方各率衆還晉書河間王顒傳太安二年秋七月顒舉兵反冬十一月詔雍州刺史劉沉討之太安二年河間王顒成都王頴舉兵討長沙王乂帝以乂為大都督帥軍禦之晉書惠帝本紀劉沉字道真李流亂蜀詔沉以侍中假節討流行次長安河間王顒請留沉為軍司後領雍州刺史及張昌作亂詔顒遣沉将州兵萬人征西府五千人自藍田關討之顒不奉詔沉自領州兵至藍田顒又逼奪其衆長沙王乂命沉将武吏四百人還州張方既逼京都王師屢敗王湖祖逖言于乂曰劉沉忠義果毅雍州兵力足制河間宜啟上詔沉發兵襲顒顒窘急必詔張方以自救此計之良也乂從之沉奉詔馳檄四境合七郡之兵及守防諸軍塢壁甲士萬餘人以安定太守衛博新平太守張光安定功曹皇甫澹為先登襲長安晉書劉沉傳永興元年春正月雍州刺史劉沉及顒戰敗死之顒時頓於鄭縣之髙平亭為東軍聲援聞沉兵起還鎮渭城遣都䕶虞䕫率歩騎萬餘人逆沉于好畤接戰䕫衆敗顒大懼退入長安果急呼張方沉渡渭而壘顒每遣兵出鬭輙不利沉乘勝攻之使澹博以精甲五千從長安門而入力戰至顒帳下沉兵來遲顒軍見澹等無繼氣益倍馮翊太守張輔率衆救顒横擊之大戰于府門博父子皆死澹又被擒顒竒澹勇壮将活之澹不為之屈於是見殺沉軍遂敗與麾下百餘人南遁為陳倉令所執沉謂顒曰知已之顧輕在三之節重不可違君父之詔量彊弱以茍全投袂之日期之必死葅醢之戮甘之如薺顒怒鞭之而後腰斬晉書劉沉傳劉沉被密詔討河間王顒光起兵助沉謀多不用及二州軍潰為顒所擒顒謂光曰前起兵欲作何䇿光曰劉雍州不用鄙計故令大王得有今日也顒壮之表為右衛司馬張光傳冬十一月張方遷帝于長安冬十一月乙未方請帝謁廟因刼帝幸長安方以所乘車入殿中帝馳避後園竹中方逼帝升車帝令方具車載宫人寳物軍人因妻略後宫分争府藏魏晉已來之積掃地無遺矣河間王顒帥官屬率騎三萬迎於覇上顒前拜謁帝下車止之以征西府為宫晉書惠帝紀髙光為廷尉惠帝為張方所逼幸長安朝臣奔散莫有從者光獨侍帝而西髙光傳光熈元年春正月顒殺張方東海王越起兵徐州西迎大駕關中大懼方謂顒曰方所領猶有十餘萬衆奉送大駕還洛宫公自留鎮關中方北討博陵如此天下可小安無復舉手者顒慮事大難濟不許乃遣成都王頴總統諸軍據河橋以距越初越以張方刼遷車駕天下怨憤唱義與山東諸侯尅期奉迎先遣說顒令送帝還都與顒分陜而居顒欲從之而方不同及東軍大㨗成都等敗顒乃令方親信将郅輔夜斬方送首以示東軍晉書河間王顒傳夏四月東海王越遣将祁𢎞入長安奉帝東還顒遣𢎞農太守彭隨北地太守刁黙距祁𢎞等於湖𢎞等與刁黙戰黙大敗顒走南山𢎞等所部鮮卑大掠長安殺二萬餘人𢎞等奉帝還洛陽帝乘牛車行宫籍草晉書惠帝紀顒既殺張方尋變計更遣刁黙守潼關東軍破刁黙入關顒懼又遣馬瞻郭愇於覇水禦之瞻等戰敗散走顒乘單馬逃于太白山東軍入長安大駕旋以太弟太保梁柳為鎮西将軍守關中馬瞻等出詣柳因共殺柳於城内瞻等與始平太守梁邁合從迎顒於南山顒初不肯入府長安令蘇衆記室督朱永勸顒表稱柳病卒輙知方事𢎞農太守裴廙秦國内史賈龕安定太守賈疋等起義討顒斬馬瞻梁邁等東海王越遣督䕶麋晃率國兵伐顒至鄭顒将牽秀距晃晃斬秀并其二子義軍據有關中顒保城而已河間王顒傳惠帝西幸長安以牽秀為尚書關東諸軍奉迎大駕以秀為平北将軍鎮馮翊秀與顒将馬瞻等将輔顒以守關中顒宻遣使就東海王越求迎越遣将麋晃等迎顒時秀擁衆在馮翊晃不敢進顒長史楊騰前不應越軍懼越討之欲取秀以自効與馮翊大姓諸嚴詐稱顒命使秀罷兵秀信之騰遂殺秀于萬年牽秀傳懐帝永嘉元年春三月以南陽王模鎮關中模永嘉初轉征西大将軍開府都督秦雍梁益諸軍事代河間王顒鎮關中時關中饑荒百姓相噉加以疾癘盗賊公行模力不能制乃鑄銅人鐘鼎為􅚚器以易榖議者非之東海王越表徴模為司空遣中書監傅祇代之模謀臣淳于定說模曰關中天府之國覇王之地今以不能綏撫而還既於聲望有虧又公兄弟唱起大事而并在朝廷若自强則有専權之罪弱則受制于人非公之利也模納其言不就徴晉書南陽王模傳夏五月秦州流人鄧定反冦漢中梁州刺史張殷討之不克定等反據城固冦掠漢中刺史張殷遣巴西太守張燕討之定等饑窘詐降宻遣訇氏求救於成成主雄遣其太尉離等将兵二萬救定與燕戰大破之殷及漢中太守杜孟治棄城走積十餘日離等引還盡徙漢中民於蜀漢中人句方白落帥吏民還守南鄭晉書後蜀記三年秋七月關中支胡作亂南陽王模討平之平陽人劉芒蕩自稱漢後誑誘羌戎僣帝號于馬蘭山支胡五斗叟郝索聚衆數千為亂屯新豐與芒蕩合黨征西大将軍南陽王模使其将淳于定破芒蕩五斗叟並斬之晉書懐帝紀官按馬蘭山在今同縣北四年王如掠沔漢王如自號大将軍領司雍二州牧大掠沔漢晉書王如傳五年漢主聰嘉平元年春二月梁州刺史張光復漢中張光遷材官将軍梁州刺史先是秦州人鄧定等二千餘家饑餓流入漢中保于城固漸為抄盗刺史張殷遣巴西太守張燕討之定饋燕金銀燕喜為之緩師定宻結李雄雄遣衆救定燕退定遂進逼漢中太守杜正沖東奔魏興一統志云漢西城縣魏改魏興郡殷亦棄官而遁光不得赴州止于魏興乃結諸郡守共謀進取燕唱言曰漢中荒敗迫近大賊克復之事當俟英雄正沖曰張燕受賊金銀不時進討阻兵緩冦致喪漢中實燕之罪也光于是發怒呵燕令出斬之綏撫荒殘百姓恱服光于是却鎮漢中晉書張光傳秋八月漢劉曜冦長安南陽王模出降曜斬之遂據長安八月劉聰使子粲攻陷長安太尉征西将軍南陽王模遇害長安遺人四千餘家奔漢中晉書懐帝紀模使牙門趙染戍蒲坂染求馮翊太守不得怒率衆降于劉聰聰使其子粲及染攻長安模使淳于定拒之為染所敗士衆離叛倉庫虚竭軍祭酒韋輔曰事急矣早降可以免模從之染箕踞攘袂數模之罪送詣粲粲殺之南陽王模傳劉聰遣趙染劉雅率騎二萬攻南陽王模於長安粲曜率大衆繼之染敗王師於潼關将軍吕毅死之軍至於下邽模乃降染染送模於粲粲害模及其子范陽王黎署劉曜為車騎大将軍開府儀同三司雍州牧改封中山王鎮長安前趙載記冬十月馮翊太守索綝雍州刺史賈疋等擊破劉曜於長安索綝為南陽王模從事中郎劉聰侵掠關東以綝為奮威将軍以禦之斬聰将吕逸又破聰黨劉豐遷新平太守聰将蘇鐵劉五斗等掠刼三輔除綝安西将軍馮翊太守綝有威惠華夷向服賊不敢犯及懐帝䝉塵長安又陷模被害綝泣曰與其俱死寧為伍子胥乃赴安定與雍州刺史賈疋扶風太守梁綜安夷䕶軍麴允等紏合義衆頻破賊黨修復舊館遷定宗廟進救新平綝手擒賊帥李羌與閻鼎立秦王為皇太子晉書索靖傳附劉曜既據長安安定太守賈疋及諸氐羌皆送質任唯雍州刺史麴特新平太守竺恢固守不降䕶軍麴允平陽令梁肅自京兆南山将奔安定遇疋任子於隂宻擁還臨涇推疋為平西将軍率衆五萬攻曜於長安扶風太守梁綜及麴特竺恢等亦率衆十萬會之曜遣劉雅趙染來距敗績而還曜又盡長安銳卒與諸軍戰於黄邱曜衆大敗退保甘渠杜人王秃紀特等攻劉粲於新豐粲還平陽曜攻陷池陽掠萬餘人歸於長安前趙載記十二月秦王業入於雍城閻鼎天水人初為豫州刺史屯許昌遭母喪乃於宻縣鳩聚西州流人數千欲還鄉里值京師失守秦王出奔宻中司空荀藩藩弟司𨽻校尉組及左長史劉疇太傅參軍騶㨗僉以鼎有才用且手握强兵假鼎冠軍将軍豫州刺史鼎少有大志因西土人思歸欲立功郷里乃與撫軍長史王毗司馬傅遜懐翼戴秦王之計謂疇捷等曰山東非覇王處不如關中河陽令傅暢遺鼎書勸奉秦王過洛陽謁拜山陵徑據長安綏合夷晉興起義衆尅復宗廟雪社稷之恥鼎得書便欲詣洛流人謂北道近河懼有抄截欲南自武關向長安疇等皆山東人不願西入並逃散鼎遂奉秦王行止上洛為山賊所襲殺百餘人率餘衆西至藍田時劉聰向長安為雍州刺史賈疋所逐走還平陽疋遣人奉迎秦王遂至長安晉書閻鼎傳鼎與業至藍田遣人告疋疋遣兵迎之入於雍城使梁綜以兵衛之綱目鳯按雍城故城在今翔府西南六年漢嘉平二年春二月張軌遣兵詣長安張軌聞秦王入關乃馳檄關中曰主上遘危遷幸非所普天分崩率土喪氣秦王天挺聖徳神武應期世祖之孫王今為長凡我晉人食土之𩔖龜筮克從幽明同欵宜簡令辰奉登皇位今遣前鋒督䕶宋配歩騎二萬徑至長安翼衛乘輿折衝左右西中郎實中軍三萬武威太守張琠胡騎二萬駱驛繼發仲秋中旬會於臨晉俄而秦王為皇太子遣使拜張軌為驃騎大将軍儀同三司固辭晉書張軌傳夏雍州刺史賈疋等進圍長安劉曜敗走秦王業入長安六年辛巳雍州刺史賈疋敗劉粲長安王通元經賈疋太尉詡之孫也累遷雍州刺史率兵三萬復長安劉粲聞之使劉曜來戰疋破之曜中流矢追至甘泉薛收元經傳麴特等圍長安劉曜連戰敗績乃驅掠士女八萬餘口退還平陽晉書前趙載記劉曜敗走秦王業入長安網目秋九月賈疋閻鼎等奉秦王業為皇太子建行臺閻鼎賈疋與大司馬南陽王保衛将軍梁芬京兆尹梁綜等并同心推戴立王為皇太子登壇告天立社稷宗廟晉書閻鼎傳冬十二月盗殺賈麴允領雍州刺史與胡彭蕩仲結為兄弟旋自渭橋襲蕩仲殺之後蕩仲子夫䕶帥群胡攻之疋敗走夜墮於澗為夫䕶所害晉書賈傳閻鼎等立秦王為皇太子於長安鼎總攝百揆允時為安夷䕶軍始平太守心害鼎功且䂓權勢因鼎殺京兆太守梁綜乃與綜弟馮翊太守緯等攻鼎走之會雍州刺史賈疋為屠各所殺允代其任麴允傳羌酋姚弋仲自稱扶風公姚弋仲南安赤亭羌人也永嘉之亂東徙榆眉通鑑注榆眉即漢之隃麋縣晉省宋白曰隴州汧源縣東有隃麋澤戎夏襁負隨之者數萬自稱䕶羌校尉雍州刺史扶風公晉書後秦載記愍帝建興元年漢嘉平三年夏四年皇太子即位於長安懐帝凶問至長安皇太子舉哀因加元服即帝位以梁芬為司徒麴允索綝為僕射是時長安城中户不盈百蒿荆成林公私有車四乘百官無章服印綬唯桑版署號而已尋以綝為衛将軍領太尉軍國之事悉以委之通鑑劉曜冦長安僕射麴允将軍索綝拒却之愍帝即尊位以允為尚書左僕射領軍持節西戎校尉錄尚書事雍州如故時劉曜殷凱趙染數萬衆逼長安允擊破之擒凱於陣晉書麴允傳劉曜侵逼王城以綝為都督征東大将軍持節討之破曜呼日逐王呼延莫以功封上洛郡公食邑萬户索靖傳附五月詔南陽王保督陜西諸軍討賊五月壬辰以大司馬南陽王保為右丞相都督陜西諸軍事詔曰夫陽九百六之灾雖在盛世猶或遘之朕以冲幼纂承洪緒庶慿祖宗之靈羣公義士之力蕩滅凶冦今右丞相懋徳齊聖當掃除鯨鯢奉迎梓宫克復中興宜帥秦凉梁雍武旅三十萬徑詣長安克成元勲晉書愍帝本紀冬十月氐楊難敵陷梁州張光遷材官将軍梁州刺史時逆賊王如餘黨李運楊武等自襄陽将三千餘家入漢中光遣參軍晉邈率衆於黄金距之邈受運重賂勸光納運光從邈言使居城固既而邈以運多珍貨又欲奪之復言於光曰運之徒屬不事佃農但營器杖意在難測可掩而取之光又信焉遣邈討運不剋光乞師於氐王楊茂捜茂捜遣子難敵助之難敵求貨於光光不與楊武乃厚賂難敵難敵聲言助光内與運同光弗之知也遣息援率衆助邈運與難敵夾攻邈等援為流矢所中死賊遂大盛光嬰城固守自夏迄冬憤激成疾佐吏及百姓咸勸光退據魏興光按劔曰吾受國厚恩不能剪除冦賊今得自死便如登仙何得退還也聲絶而卒子邁多才略有父風州人推權領州事與賊戰殁别駕范曠等率其遺衆還據魏興晉書張光傳劉曜冦長安十一月麴允破走之劉聰遣劉曜及司𨽻喬智明武牙李景年等冦長安命趙染率衆赴之時大都督麴允據黄白城累為曜染所敗染謂曜曰麴允率大衆在外長安可襲而取之得長安黄白城自服願大王以重衆守此染請輕騎襲之曜乃承制加染前鋒大都督安南大将軍以精騎五千配之而進王師敗於渭陽将軍王廣死之染夜入長安外城帝奔射鴈樓染焚燒龍尾及諸軍營殺掠千餘人且退屯逍遥園麴允率衆襲曜連戰敗之曜入栗邑遂歸平陽晉書前趙載記原按郡縣志黄白城在三縣西南二年漢嘉平四年成主李雄玉衡二年春二月成取漢中玉衡二年春正月流民楊武大略漢中吏民來奔梁州人張咸等起兵逐氐王楊茂捜茂捜去咸以其衆歸雄於是南陽漢嘉涪陵逺人相繼而至漢中之地皆為雄有十六國春秋夏六月劉曜冦長安索綝大破之曜復屯渭汭趙染屯新豐索綝自長安東討染染狃於累㨗有輕綝之色長史魯徽曰今司馬鄴君臣自相逼僣王畿雄劣不同必致死距我将軍宜整陣案兵以擊之弗可輕也染曰以司馬模之强吾取之如拉朽索綝小䜿豈能汙吾馬蹄刀刃邪必擒之而後食晨帥輕騎數百逆之戰於城西敗績而歸悔曰吾不用魯徽之言以至於此何面見之於是斬徽徽臨刑謂染曰死者無知則已若其有知當訴将軍於黄泉使将軍不得服牀枕而死曜還師趙染冦北地夢魯徽大怒引弓射之染驚悸而寤旦将攻城中弩而死晉書前趙載記劉曜冦北地軌又遣叅軍麴陶領三千人衛長安帝遣大鴻臚辛攀拜軌侍中太尉凉州牧西平公軌又固辭張軌傳三年漢建元元年春正月遣兵偹華隂正月以侍中宋哲為平東将軍屯華隂晉書愍帝紀夏六月盜發覇杜二陵盜發漢覇杜二陵及薄太后陵得金玉綵帛不可勝紀時以朝廷草創服章多闕勅收其餘以實内府辛巳勅雍州掩骼埋胔修復陵墓有犯者誅及三族晉書愍帝紀時三秦人尹桓觧武等數千家盗發漢覇杜二陵多獲珍寳帝問綝曰漢陵中物何乃多邪綝對曰漢天子即位一年而為陵天下供賦三分之一供宗廟一供賔客一充山陵漢武帝享年長乆比崩而茂陵不復容物其樹皆已可拱赤眉取陵中物不能减半於今猶有朽帛委積珠玉未盡此二陵是儉者耳亦百世之戒也索綝傳秋九月劉曜冦北地命領軍将軍麴允討之曜復攻北地允為大都督驃騎将軍次於青白城以救之晉書麴允傳冬十月劉曜陷馮翊劉曜陷馮羽立太守梁肅奔萬年晉書愍帝紀劉曜復率衆入馮翊帝累徴兵於南陽王保保以胡崧行前鋒都督須諸軍集乃發麴允欲挾天子趣保綝以保必逞私欲乃止自長安以西不復奉朝廷百官饑乏採梠自存索綝傳劉曜冦上郡曜進攻上郡太守張禹與馮翊太守梁肅奔於允吾於是關右翕然所在應曜曜進據黄阜晉書前趙載記四年漢麟嘉元年夏四月劉曜陷上郡劉曜冦上郡太守韋藉率其衆奔於南鄭晉書愍帝紀張實遣兵入援張實遣都䕶王該送諸郡貢計獻名馬方珍經史圖籍於京師會劉曜逼長安實遣将軍王該率衆以援京城帝嘉之拜都督陜西諸軍事晉書張實傳秋七月劉曜陷北地偪涇陽曜復攻北地太守麴昌遣使求救允率歩騎赴之去城數十里羣賊繞城放火烟塵蔽天縱反間詐允曰郡城已陷焚燒向盡無及矣允信之衆懼而潰後數日麴昌突圍赴長安北地遂陷允性仁厚無威斷吴皮王隠之徒無頼凶人皆加重爵新平太守竺恢始平太守楊像扶風太守竺爽安定太守焦嵩皆征鎮仗節加侍中常侍村塢主帥小者猶假銀青将軍之號欲以撫結衆心然諸将驕恣恩不及下羌胡因此䟦扈關中擾亂晉書麴允傳曜取北地進至涇陽渭北諸城悉潰曜獲将軍魯充梁緯飲之酒曰吾得子天下不足定也充曰國家喪敗不敢求生速死為幸曜曰義士也與之劍令自殺緯妻辛氏美色曜将妻之辛氏大哭曰妾夫已死義不獨生曜曰貞女也亦聴自殺皆以禮葬之綱目冬十一月劉曜陷長安劉曜又率衆圍京城綝與麴允固守長安小城胡崧承檄奔命破曜於靈臺崧慮國家威舉則麴索功盛乃案兵渭北遂還槐里城中饑窘人相食死亡逃奔不可制惟涼州義衆千人守死不移帝使侍中宋敞送牋降於曜綝潜留敞使其子說曜曰今城中食猶足支一嵗未易可尅也若許綝以車騎儀同萬户郡公者請以城降曜斬而送之曰帝王之師以義行也孤将軍十五年未嘗以譎詭敗人必窮兵極勢然後取之今索綝所說如是天下之惡一也輙相為戮之若審兵食未盡者便可勉强固守如糧竭兵微亦宜早悟天命孤恐霜威一震玉石俱摧及帝出降綝隨帝至平陽劉聰戮之於東市晉書索綝傳帝乘羊車出降羣臣號泣攀車御史中丞吉朗嘆曰吾智不能謀勇不能死何忍君臣相隨北面事賊虜乎乃自殺綱目元帝太興二年漢改號趙劉曜光初二年夏四月趙徙都長安曜僣即皇帝位徙都長安起光世殿於前紫光殿於後繕宗廟社稷南北郊國號曰趙晉書前趙載記三輔兵起趙主曜擊之不克劉曜時黄石屠各路松多起兵於新平扶風聚衆數千附於南陽王保保以其将楊曼為雍州刺史王連為扶風太守據陳倉張顗為新平太守周庸為安定太守據隂宻松多下草壁秦隴氐羌多歸之曜遣其車騎劉雅平西劉厚攻楊曼於陳倉二旬不尅曜率中外精銳以赴之行次雍城太史令弁廣明言於曜曰昨夜妖星犯月師不宜行乃止勅雅等攝圍固壘以待大軍晉書前趙載記三年趙光初三年趙攻陳倉三輔兵皆破滅三年曜發雍攻陳倉曼連謀曰諜者適還云其五牛旗建多言胡主自來其鋒恐不可當也吾糧廪既少無以支乆若頓軍城下圍之百日不待兵刃而吾自滅不如率見衆以一戰如其勝也關中不待檄而至如其敗也一等死早晚無在遂盡衆背城而陣為曜所敗王連死之楊曼奔於南氐曜進攻草壁又陷之松多奔隴城進陷安定保愳遷於桑城氐羌悉從之曜振旅歸於長安晉書前趙載記夏五月關中氐羌亂趙遣兵擊降之長水校尉尹車謀反潜結巴酋徐庫彭曜乃誅車囚庫彭等五十餘人於阿房将殺之光禄大夫游子逺固諫曜大怒幽子逺而盡殺庫彭等於是巴氐盡叛推巴歸善王句渠知為主四山羌氐巴羯應之者三十餘萬關中大亂城門晝閉子逺又從獄中表諫曜怒甚毁其表叱左右速殺之劉雅朱紀呼延宴等諫曰子逺幽而尚諫者所謂忠於社稷不知死之将至陛下縱弗能用奈何殺之若子逺朝誅臣等亦暮死以彰陛下之咎天下之人皆當去陛下蹈東海而死耳陛下復與誰居乎曜意觧乃赦之敕内外戒嚴将親討渠知子逺進曰彼匪有大志希竊非望也但逼於陛下峻網耳莫若赦諸逆人之家聴其復業與之更始彼生路既開不降何待若渠知自以罪重不即下者願假臣弱兵五千以為陛下梟之不敢勞陛下之将帥也曜大恱以子逺為車騎大将軍都督雍秦征討諸軍事大赦境内子逺次於雍城降者十餘萬先是上郡氐羌十餘萬落保嶮不降酋大虚除權渠自號秦王子逺進師至其壁下權渠率衆來拒五戰敗之權渠恐将降其子伊餘大言於衆曰徃劉曜自來猶無若我何况此偏師而欲降之率勁卒五萬晨壓壘門左右勸戰子逺曰吾聞伊餘之勇當今無敵又其父新敗怒氣甚盛不如緩之使氣竭而擊之乃堅壁不戰伊餘有驕色子逺候其無偹夜警衆蓐食晨大風霧子逺曰天贊我也躬先士卒掃壁而出遲明覆之生擒伊餘悉俘其衆權渠大懼被髪割面而降子逺啟曜以權渠為征西将軍西戎公分徙伊餘兄弟及其部落二十餘萬口於長安晉書前趙載記趙作鄷明觀陵霄臺曜命起鄷明觀立西宫建陵霄臺於滈池又将於覇陵西南營壽陵侍中喬豫和苞上䟽諫曰奉詔書将營鄷明觀市道蒭蕘咸以非之曰一觀之功可以平凉州矣又奉勅㫖復欲擬阿房而建西宫模瓊臺而起陵霄此則費萬鄷明功億前役也以此功費亦可以吞吴蜀剪齊魏矣又伏聞勅㫖将營建壽陵周廻四里下深二十五丈以銅為棺槨黄金飾之恐此功費非國内所能辦也自古無不亡之國不掘之墓故聖人知厚葬之招害也故不為之臣子之於君父陵墓豈不欲髙廣如山嶽哉但以保全始終安固萬世為優耳曜下書曰二侍中懇懇有古人之風烈矣今勅悉停壽陵制度一遵覇陵之法省鄷水囿以與貧民晉書前趙載記永昌元年趙光初五年陳安叛趙襲汧城破之陳安請朝曜以疾篤不許安怒且以曜為死也遂大掠而歸使其将劉烈趙罕襲汧城㧞之隴上氐羌悉從安士馬雄盛衆十餘萬自稱使持節大都督假黄鉞大将軍雍涼秦梁四州牧涼王晉書前趙載記保按陳安南陽王故将太興二年上邽諸将殺保安降曜以為秦州刺史明帝太寧元年趙光初六年楊難敵奔漢中楊難敵以陳安既平内懐危懼奔於漢中鎮西劉厚追擊之獲其輜重千餘兩士女六千餘人晉書前趙載記三年趙光初八年後趙石勒七年春三月趙遣其将劉岳及石他戰於河濵敗之石勒将石他襲安國将軍北羌王盆句除俘三千餘落獲牛馬羊百餘萬而歸曜大怒投袂而起是日次於渭城遣劉岳追之曜次於富平為岳聲援岳及石他戰於河濵敗之斬他及其甲士一千五百級赴河死者五千餘人悉收所虜振旅而歸晉書前趙載記成帝咸和四年趙光初十二年是年趙亡後趙太和二年春正月石生入長安曜為石堪所執送於勒所勒諭曜與其太子熙書令速降之曜但勅熙匡維社稷勿以吾易意也熙及劉𦙍劉咸等謀西保秦州尚書胡勲曰今雖喪主國尚全完将士情一未可離叛可共并力拒險走未晚也引不從怒其沮衆斬之遂率百官奔於上邽關中擾亂将軍蔣英辛恕擁衆數十萬據長安遣使招勒勒遣石生率洛陽之衆以赴之晉書前趙載記秋八月劉引趣長安石虎擊破滅之引及劉遵帥衆數萬自上邽将攻石生於長安隴東武都安定新平北地扶風始平諸郡皆起兵應引引次於仲橋宋白曰雍州醴泉縣城即仲橋城石生固守長安勒使石季龍帥騎二萬拒引戰於義渠為季龍所敗引奔上邽季龍執其偽太子熙南陽王劉引等皆殺之晉書前趙載記八年趙建平四年冬十月石虎克長安石生走死石生鎮關中季龍留子䆳守襄國進師攻長安以石挺為前鋒大都督生遣将軍郭權率鮮卑渉璝部衆二萬為前鋒拒之生統大軍繼發次於蒲坂前鋒及挺大戰潼關挺及丞相左長史劉隗皆戰死季龍退奔澠池鮮卑宻通於季龍背生而擊之生時停蒲坂不知挺之死也懼單馬奔長安郭權乃復收衆三千與石廣相持於渭汭生遂去長安潛於雞頭山一統志云雞頭山在鳯翔寳雞縣将軍蒋英固守長安季龍聞生之奔也進師入關進攻長安旬餘㧞之斬蒋英等分遣諸将屯於汧徙雍秦華戎十餘萬户於關東生部下斬生於雞頭山晉書後趙載記十二月石生故将郭權遣使來降郭權以生敗據上邽以歸順詔以權為鎮西将軍秦州刺史於是京兆新平扶風馮翊北地皆應之晉書後趙載記九年夏四月石𢎞将石斌攻郭權於郿陷之𢎞鎮西石廣與權戰敗績季龍遣郭敖及其子斌率歩騎四萬討之次於華隂上邽豪族害權以降晉書後趙載記趙将郭敖及羌戰於馬蘭山敗績長安陳良夫奔於黒羌招誘北羌四角王薄句大等擾北地馮翊與石斌相持石韜等率騎掎句大之後與斌夾擊之句大奔於馬蘭山郭敖等懸軍逐北為羌所敗死者十七八季龍聞而大怒遣使殺郭敖晉書後趙載記咸康二年成主李期玉恒二年成将李壽陷漢中十一月晉遣建威将軍司馬勲安集漢中期遣漢王壽攻之城陷遂置守宰戍南鄭而還十六國春秋三年趙主石虎建武三年妖人侯子光作亂杜南山趙将石廣擊斬之安定人侯子光弱冠美姿儀自稱佛太子從大秦國來當王小秦國易姓名為李子楊游於鄠縣爰赤眉家頗見其妖状事微有驗赤眉信敬之妻以二女轉相扇惑京兆樊經竺龍嚴諶謝樂子等聚衆數千人於杜南山下子楊稱大黄帝建元曰龍興赤眉與經為左右丞相龍諶為左右大司馬樂子為大将軍鎮西石廣擊斬之子楊頸無血十餘日而面色無異於生晉書後趙載記四年趙建武四年夏五月趙石宣大破鮮卑於朔方五月使太子宣率歩騎二萬擊朔方鮮卑斛摩頭破之斬首四萬餘級十六國春秋趙置戍長安虎使襄城公渉歸上庸公曰歸率衆戍長安二歸告鎮西石廣私樹恩澤潛謀不軌季龍大怒追廣至鄴殺之十六國春秋八年冬十二月石虎作長安宫虎盛興宫室營長安洛陽二宫作者四十餘萬人又勅秦雍嚴西討之資三五發卒諸州造甲者五十餘萬人晉書後趙載記穆帝永和元年趙建武十一年春正月趙大發兵治長安宫虎發雍洛秦并州十六萬人城長安未央宫晉書後趙載記五年趙大寧元年春正月趙關中謫戍梁犢反敗石苞於長安季龍僣即皇帝位大赦境内故東宫謫卒髙力等萬餘人當戍凉州行達雍城既不在赦例又勅雍州刺史張茂送之茂皆奪其馬令歩推鹿車致糧戍所髙力督定陽梁犢等因衆心之怨謀起兵東還隂令胡人頡獨鹿微告戍者戍者皆踊抃大呼梁犢乃自稱晉征東大将軍率衆攻陷下辨逼張茂為大都督大司馬載以軺車安西劉寧自安定擊之大敗而還秦雍間城戍無不摧陷斬二千石長史長驅而東高力等皆多力善射一當十餘人雖無兵甲所在掠百姓大斧施一丈柯攻戰如神所向崩潰戍卒皆隨之比至長安衆已十萬其樂平王石苞時鎮長安盡銳拒之一戰而敗犢遂東出潼關晉書後趙載記秋九月梁州刺史司馬勲經畧關中不克而還司馬勲以梁州刺史初屯西城退守武當時後趙石季龍死中國亂雍州諸豪帥馳告勲勲率衆出駱谷壁於懸鈎去長安二百里遣部将劉煥攻長安又㧞賀城於是關中皆殺季龍太守令長以應勲勲兵少未能自固復還梁州晉書濟南惠王遂傳六年夏五月杜洪據長安苻健擊敗之冬十一月健入長安初季龍以麻秋鎮枹罕冉閔之亂秋歸鄴洪使子雄擊而獲之以秋為軍師将軍秋說洪西都長安洪深然之既而秋因宴鴆洪将并其衆世子健收而斬之洪将死謂健曰所以未入關者言中州可指時而定今見困䜿子中原非汝兄弟所能辦關中形勝吾亡後便可鼓行而西及洪死健嗣位去秦王之號稱晉爵遣使告喪於京師且聴王命時京兆杜洪竊據長安自稱晉征北将軍雍州刺史戎夏多歸之健宻圖關中懼洪知之乃偽受石祇官繕宫室於枋頭課所部種麥示無西意有知而不種者健殺之以狥既而自稱晉征西大将軍都督關中諸軍事雍州刺史盡衆西行起浮橋於盟津以濟遣其弟雄率歩騎五千入潼關兄子菁自軹關入河東健執菁手曰事若不捷汝死河北我死河南比及黄泉無相見也既濟焚橋自統大衆繼雄而進杜洪遣其将張先要健於潼關健逆擊破之健雖戰勝猶修牋於洪并送名馬珍寳請至長安上尊號洪曰幣重言甘誘我也乃盡召關中之衆來拒健筮之遇泰之臨健曰小徃大來吉亨昔徃東而小今還西而大吉孰大焉是時衆星夾河西流占者以為百姓還西之象健遂進軍次赤水遣雄略地渭北又敗張先於隂槃擒之諸城盡陷菁所至無不降者三輔畧定健引兵至長安洪奔司竹健入而都之晉書前秦載記七年秦主苻健皇始元年春正月苻健自稱秦天王健軍師将軍賈元碩等表健為侍中大都督關中諸軍事大單于秦王健怒曰我官位輕重非若等所知既而潜使諷元碩等使上尊號僣稱天王大單于始繕宗廟社稷置百官於長安晉書前秦載記夏四月梁州刺史司馬勲與苻健戰五丈原不利而還夏四月杜洪張琚遣使招晉梁州刺史司馬勲勲率歩騎三萬自漢中入秦川健禦之於五丈原勲屢戰皆敗退歸南鄭十六國春秋八年秦皇始二年春正月苻健稱帝於長安健僣即皇帝位於太極前殿以大單于授其子萇晉書前秦載記杜洪将張琚殺洪自稱秦王司馬勲既還漢中杜洪張琚屯宜秋水經注鄭渠自中山西瓠口東流逕宜秋城北又東逕池陽縣故城北洪自以右族輕琚琚遂殺洪自立為秦王五月苻健攻琚於宜秋斬之通鑑秦按晉書前載記及朱子綱目并稱張琚殺洪自立惟司馬勲傳及十六國春秋云洪使司馬勲殺琚與此互異九年秦皇始三年秋七月秦殺其司空張遇關中亂初張遇自許昌來降健納遇後母韓氏為昭儀每於衆中謂遇曰卿吾子也遇慙恨引關中諸将欲以雍州歸順乃與健中黄門劉晃謀夜襲健事覺遇害於是孔特起池陽劉珍夏侯顯起鄠喬景起雍胡陽赤起司竹呼延毒起覇城衆數萬人並遣使詣征西桓温中軍殷浩請救晉書前秦載記秦遣兵冦上洛苻雄遣菁掠上洛郡於豐陽縣立荆州以引南金竒貨弓幹漆蠟通關市來逺商於是國用充足而異賄盈積矣晉書前秦載記冬秦冦池陽及鄠陷之冬十月丞相雄與清河王法及左衛将軍飛分討孔特等健兄子輔國将軍黄眉自洛陽來奔十一月雄克池陽斬孔特十二月清河王法與左衛将軍飛克鄠斬劉珍夏侯顯十六國春秋十年秦皇始四年春二月桓温帥師伐秦温統歩騎四萬發江陵水軍自襄陽入均口歩兵自淅川趣武關命司馬勲出子午道以伐秦温别将攻上洛進擊青泥破之司馬勲掠秦西鄙秦凉州刺史王擢攻陳倉以應温通鑑在按明一統志青泥關名藍田縣南即嶢關夏四月温及苻健兵戰於藍田大敗之健遣子生弟雄衆數萬屯嶢柳愁思墩以拒温遂大戰生親自陷陣殺温将應誕劉泓死傷千數温軍力戰生衆乃散雄又與将軍桓沖戰白鹿原又為沖所破雄遂馳襲司馬勲勲退次女媧堡温進至覇上健以五千人深溝自固居人皆安堵復業持牛酒迎温於路者十八九耆老感泣曰不圖今日復見官軍晉書桓温傳五月温及健兵戰不利六月師還健别使雄領騎七千餘人與桓沖戰於白鹿原王師敗績又破司馬勲於子午谷初健聞温之來也收麥清野以待之故温衆大饑至是徙關中三千餘户而歸及至潼關又為萇等所敗司馬勲奔還漢中晉書前秦載記桓石䖍從温入關沖為苻健所圍垂没石䖍躍馬赴之㧞沖於數萬衆之中而還莫敢抗者三軍嘆息威震敵人桓石䖍傳王猛隠於華隂山桓温入關猛被褐而詣之一面談當世之事捫虱而言旁若無人温察而異之問曰吾奉天子之命率銳師十萬仗義討逆為百姓除殘賊而三秦豪傑未有至者何也猛曰公不逺數千里深入冦境長安咫尺而不渡㶚水百姓未見公心故也所以不至温黙然無以酬之温之将還賜猛車馬拜髙官督䕶請與俱南猛還山諮師師曰卿與桓温豈並世哉在此自可富貴何為逺乎猛乃止前秦載記十一年秦主苻生壽光元年秦苻菁作亂討斬之初桓温之入關也其太子萇與温戰為流矢所中死至是立其子生為太子健寝疾菁勒兵入東宫将殺苻生時生侍健疾菁以健為死廻攻東掖門健聞變升端門陳兵衆皆舍杖逃散執菁殺之數日健死子生僣即皇帝位晉書前秦載記升平元年秦主苻堅永興元年夏五月秦将苻黄眉等及姚襄戰三原擊斬之姚襄将圖關中進兵屯杏城羌胡及秦民歸之者五萬餘户秦遣廣平王黄眉東海王堅将軍鄧羌禦之襄堅壁不戰羌謂黄眉曰襄為桓温所敗銳氣喪矣然其為人彊狠若鼔譟揚旗直壓其壘彼必忿而出可一戰擒也乃率騎三千壓其壘門而陳襄怒出戰羌陽敗走襄追至三原苻堅於嶻嶭北置三原䕶軍羌廻騎擊之黄眉等大軍繼至襄大敗擒斬之弟萇帥其衆降通鑑六月苻堅殺苻生自立為秦天王生少凶暴嗜酒宗室勲舊親戚忠良殺害畧盡生夜對侍婢曰阿法兄弟亦不可信明當除之是夜清河王符法夢神告之曰旦将禍集汝門寤而心悸會侍婢來告乃與特進梁平老强注等率壮士數百人潜入雲龍門堅與吕婆樓率麾下三百餘人鼓譟繼進宿衛将士皆捨杖歸堅生猶昏寐未寤堅遂弑生以偽位讓其兄法法自以庶孽不敢當堅乃以升平元年僣稱大秦天王晉書前秦載記五年秦甘露二年冬十月秦遷并州民於長安張平以并州叛堅率衆討之平懼乃降於堅堅赦其罪徙其所部三千餘户於長安堅自臨晉登龍門顧謂其羣臣曰美哉山河之固婁敬有言關中四塞之國真不虚也權翼薛讚對曰臣聞夏殷之都非不險也周秦之衆非不多也終於身竄南巢首懸白旗驅殘於犬戎國分於項籍者何也徳之不修故耳吴起有言在徳不在險深願陛下追蹤唐虞懐逺以徳山河之固不足恃也堅大恱乃還長安晉書前秦載記哀帝興寧三年秦建元元年秋七月匃奴侵杏城秦主堅擊降之匃奴右賢王曹轂左賢王衛辰舉兵叛率衆二萬攻杏城以南郡縣屯於馬蘭山堅率中外精銳以討之以其前将軍楊安鎮軍毛盛等為前鋒都督轂遣弟活拒戰於同州安大敗之斬活并四千餘級轂懼而降堅徙其酋豪六千餘户於長安鄧羌討衛辰擒之於木根山堅自驄馬城如朔方巡撫夷狄以衛辰為夏陽公以統其衆晉書前秦載記縣按杏城在中部冬十月梁州刺史司馬勲反永和中勲遷征虜将軍監關中軍事領西戎校尉賜爵通吉亭侯為政暴酷至於治中别駕及州之豪右言語忤意即於坐梟斬之或引弓自射西土患其凶虐在州常懐僣偽之意桓温聞之務相綏懐以其子康為漢中太守勲逆謀已成憚益州刺史周撫未發及撫卒遂擁衆入劍閣梁州别駕雍端西戎司馬隗粹並切諫勲皆誅之自號梁益二州牧成都王桓温遣朱序討勲勲兵潰為序所獲送於温温斬之傳首京師晉書司馬勲傳廢帝太和元年春三月遣兵攻南鄭荆州刺史桓豁遣督䕶桓羆攻南鄭魏興人畢欽舉兵以應羆晉書廢帝紀二年秦建元三年羌叛秦遣兵擊獲之羗歛岐叛堅自稱益州刺史堅遣王猛與隴西太守姜衡南安太守邵羗討歛岐於畧陽猛攻破畧陽歛岐奔白馬猛遣邵羗追歛岐邵羗擒歛岐於白馬送之長安十六國春秋白按縣道記西縣本名馬城冬十月匃奴劉衛辰奔長安什翼犍擊衛辰河冰未合命以葦絙約流澌俄而冰合然猶未堅乃散葦於其上冰草相結有如浮梁兵乘以度衛辰不意兵猝至遂西走什翼犍收其部落什六七而還衛辰奔秦秦送還朔方遣兵戍之綱目三年秦建元四年春二月秦遣兵偹華隂秦苻堅将苻庾據陜城來降請兵應接時有圖䜟云燕馬當飲渭水堅恐暐乘釁入關大懼乃盡精銳以偹華隂十六國春秋五年秦建元六年冬十二月秦遷鮮卑四萬餘户於長安十二月堅入鄴宫徙暐及后妃王公以下并鮮卑四萬餘户於長安十六國春秋簡文帝咸安元年秦建元七年春正月秦徙關東豪傑及雜夷於關中堅徙關東豪傑及諸雜夷十萬户於關中處烏丸雜𩔖於馮翊北地晉書前秦載記孝武帝寧康元年秦建元九年秦陷漢中晉梁州刺史楊亮遣子廣襲仇池與堅将楊安戰廣敗績晉沮水諸戍皆委城奔潰安遂進冦漢川堅使王統朱彤帥卒二萬冦蜀楊亮帥巴獠萬餘拒之戰於青谷王師不利亮奔固西城西城屬漢中府彤乘勝陷漢中堅以毛當為鎮西将軍鎮漢中晉書前秦載記太元三年秦建元十四年秋七月秦冦魏興堅遣其梁州刺史韋鍾冦魏興攻太守吉挹於西城晉書前秦載記四年秦建元十四年夏四月堅兵陷魏興太守吉挹死之挹為魏興太守苻堅将韋鍾攻魏興挹遣衆拒之斬七百餘級鍾欲趨襄陽挹又邀擊斬五千餘級鍾怒廻軍圍之挹又屢挫其銳其後賊衆繼至挹力不能抗城将陷引刀欲自殺友人逼奪其刀會賊執之挹閉口不言不食而死晉書吉挹傳魏興陷挹死堅嘆曰周孟威不屈於前丁彦逺潔己於後吉祖冲閉口而死何晉氏之多忠臣也十六國春秋九年秦建元二十年後秦姚萇白雀元年春正月復魏興桓冲遣上庸太守郭寳伐堅魏興太守褚垣降之晉書桓冲傳三月慕容泓起兵華隂慕容暐弟燕故濟北王泓先為北地長史聞垂攻鄴亡命奔關東收諸馬牧鮮卑衆至數千還屯華隂堅遣将軍强永率衆擊之為泓所敗泓衆遂盛自稱使持節大都督陜西諸軍事大将軍雍州牧濟北王晉書前秦載記秦遣其子叡擊泓敗死堅謂權翼曰鮮卑至是關東之地吾不復與之争将若泓何翼曰冦不可長今暐及宗族種𩔖盡在京師鮮卑之衆布於畿甸實社稷之先憂宜遣重将討之堅乃以廣平公苻熙鎮蒲坂徴苻叡為都督中外諸軍事配兵五萬以左将軍竇衝為長史龍驤姚萇為司馬討泓於華澤苻叡勇果輕敵不恤士衆泓聞其至也懼率衆将奔關東叡馳兵要之姚萇諫曰鮮卑有思歸之心宜驅出關不可遏也叡弗從戰於華澤叡敗績被殺堅大怒萇懼誅遂叛晉書前秦載記夏四月姚萇起兵北地自稱秦王叡為泓所敗死萇遣龍驤長史趙都詣堅謝罪堅怒殺之萇懼奔於渭北遂如馬牧通鑑注渭北牧馬之地西州豪族尹詳等率五萬餘家咸推萇為盟主萇以太元九年自稱大将軍單于萬年秦王與慕容冲通和進屯北地羌胡降者十餘萬後秦載記五月秦上洛郡内附秦洛州刺史張五虎據豐陽來降通鑑故按明一統志豐陽城在鎮安慕容沖奔華隂泓遂進逼長安竇衝擊慕容沖於河東大破之沖率騎八千奔於泓軍泓衆至十餘萬遣使謂堅曰吴王已定關東可速偹資大駕奉送家兄皇帝泓當率關中燕人翼衛皇帝還返鄴都與秦以虎牢為界分王天下永為鄰好堅大怒召慕容暐責之命暐以書招諭垂及泓沖使息兵還長安恕其反叛之咎而暐宻遣使者謂泓曰吾既籠中之人必無還理不足復顧勉建大業以興復為務聴吾死聞汝便即尊位泓於是進向長安晉書前秦載記六月秦主堅擊後秦於北地敗績堅率歩騎二萬討姚萇于北地次于趙氏塢使䕶軍楊璧游騎三千斷其奔路右軍徐成左軍竇衝鎮軍毛盛等屢戰敗之仍斷其運水之路馮翊游欽聚衆數千保據頻陽遣軍運水及粟以饋姚萇楊璧盡獲之萇軍渇甚遣其弟尹買率勁卒二萬决堰竇衝斬尹買及首級萬三千萇衆危懼人有渇死者俄而降雨於萇營營中水三尺周營百歩之外寸餘而已於是萇軍大振堅怒曰天其無心何故降澤賊營萇率衆七萬來攻堅堅遣楊璧等擊之為萇所敗獲楊璧毛盛徐成及前軍齊午等數十人皆禮而遣之苻暉率洛陽陜城之衆七萬歸于長安益州刺史王廣遣将軍王蚝率蜀漢之衆來赴難堅聞慕容冲去長安二百餘里引師而歸使撫軍苻方戍驪山晉書前秦載記慕容沖大破秦兵遂據阿房城泓謀臣髙葢宿勤崇等以泓徳望後冲且持法苛峻乃殺泓立沖為皇太弟承制行事堅拜苻暉大将軍司𨽻校尉配兵五萬拒沖沖令婦人乘牛為衆掲竿為旗揚土為塵督厲其衆晨攻暉營於鄭西暉出距戰冲揚塵鼓譟暉師敗績堅又以尚書姜宇為前将軍與苻琳率衆三萬擊冲于㶚上為冲所敗宇死之琳中流矢冲遂據阿房城初堅之滅燕冲姊為清河公主年十四有殊色堅納之寵冠後庭冲年十二亦有龍陽之姿堅又幸之姊弟専寵宫人莫進長安歌之曰一雌復一雄雙飛入紫宫咸懼為亂王猛切諫堅乃出冲長安又謡曰鳯凰鳯凰止阿房堅以鳯凰非梧桐不栖非竹實不食乃植桐竹數十萬株于阿房城以待之沖小字鳯凰至是終為堅賊入止阿房城焉晉書前秦載記秋九月慕容沖進逼長安慕容沖進逼長安堅登城觀之嘆曰此虜何從出也其彊若斯大言責沖曰爾輩羣奴正可牧牛羊何為送死沖曰奴則奴矣既厭奴苦復欲取爾見代堅遣使送錦袍一領遺沖稱詔曰古人兵交使在其間卿逺來草創得無勞乎今送一袍以明本懐朕于卿恩分如何而于一朝忽為此變沖命詹事荅之亦稱皇太弟有令孤今心在天下豈顧一袍小惠茍能知命便可君臣束手早送皇帝自當寛貸苻氏以酬曩好終不使既徃之施獨美于前堅大怒曰吾不用王景畧陽平公之言使白虜敢至於此晉書前秦載記冬十月後秦王萇攻新平姚萇聞慕容沖攻長安議進取之計羣下咸曰宜先據咸陽以制天下萇曰燕因懐奮之士而起兵若功成事㨗咸有東歸之思安能乆固秦川吾欲移兵嶺北廣收資實須秦弊燕廻然後垂拱取之兵不血刄坐定天下此卞荘得貳之義也堅寧朔将軍宋方率騎三千從雲中将赴長安萇自二縣要破之方單馬奔免其司馬田晃降萇萇遣諸将攻新平尅之晉書後秦載記十二月秦殺其新興侯慕容暐時鮮卑在城者猶有千餘人暐乃宻結鮮卑之衆謀伏兵請堅因而殺之北部人突賢與其妹别妹為左将軍竇衝小妻聞以告衝衝馳入白堅堅乃誅暐父子及其宗族城内鮮卑無少長及婦女皆殺之晉書前秦載記秦梁州刺史潘猛棄漢中走猛棄漢中奔長安梁州之地自此復歸於晉通鑑十年秦苻丕大安元年後秦白雀二年西燕主慕容冲更始元年春正月慕容沖稱帝于阿房沖稱帝改元頗有自得之志賞罰任情慕容盛年十三謂慕容柔曰十人之長亦須才過九人然後得安今中山王才不逮人功未成而驕已甚殆難濟乎綱目西燕主沖襲長安秦王堅與戰破之慕容沖僣稱尊號于阿房改年更始堅與沖戰各有勝負常為沖軍所圍殿中上将軍鄧邁左中郎将鄧綏尚書郎鄧瓊相謂曰吾門世荷榮寵先君建殊功于國家不可不立忠効節以成先君之志且不死君難者非丈夫也于是與毛萇樂等䝉獸皮奮矛而擊沖軍沖軍潰堅獲免嘉其忠勇並拜五校加三品将軍賜爵關内侯沖遣其尚書令髙葢率衆夜襲長安攻陷南門入于南城右将軍竇衝前禁将軍李辯等擊敗之斬首千八百級分其尸而食之堅尋敗沖于城西追奔至于阿城諸将請乘勝入城堅懼為沖所獲乃擊金以止軍關中堡壁三千餘所推平逺将軍馮翊趙敖為統主相率結盟遣兵粮助堅左将軍茍池右将軍俱石子率騎五千與沖争麥戰于驪山為沖所敗池死之石子奔鄴堅大怒復遣領軍楊定率左右精騎二千五百擊沖大敗之俘掠鮮卑萬餘而還堅怒悉坑之晉書前秦載記夏四月後秦王萇㧞新平姚萇攻新平新平太守茍輔将降之郡人遼西太守馮傑蓮勺令馮羽等諫曰天下喪亂忠臣乃見昔田單守一城而存齊今秦之所有猶連城累鎮郡國百城臣子之于君父死而後已豈宜貳哉輔大悅于是凴城固守萇為土山地道輔亦為之或戰山峰萇衆死者萬有餘人輔乃詐降萇将入覺之引衆而退輔馳出擊之斬獲萬計至是糧竭矢盡外救不至萇遣吏謂輔曰吾方以義取天下豈仇忠臣乎卿但率見衆男女還長安吾須此城置鎮輔以為然率男女萬五千口出城萇圍而坑之男女無遺初石季龍末清河崔恱為新平相為郡人所殺恱子液後仕堅為尚書郎自表父仇不同天地請還冀州堅愍之禁錮新平人缺其城角以恥之新平酋望深以為慚故相率距萇以立忠義晉書前秦載記五月西燕主沖攻長安秦王堅奔五将山沖率衆登城堅身貫甲胄督戰拒之飛矢滿身血流被體時雖兵冦危逼馮翊諸堡壁猶有負糧冒難而至者多為賊所殺三輔人為沖所畧者咸遣使告堅請放火以為内應堅曰哀卿等忠誠但時運圮喪恐無益于國空使諸卿坐自夷滅吾所不忍也每夜有人周城大呼曰楊定健兒應屬我宫殿臺觀應坐我父子同出不共汝旦尋而不見人跡城中有書曰古符傳賈錄載帝出五将乆長得先是又謡曰堅入五将山長得堅大信之告其太子宏曰脫如此言天或導予今留汝兼總戎政勿與賊争利吾當出隴收兵運糧以給汝天其或者正訓予也於是遣衛将軍楊定擊沖於城西為沖所擒堅彌懼付宏以後事将中山公詵張夫人率騎數百出如五将宣告州郡期以孟冬救長安晉書前秦載記山按五将山在鳯翔府岐縣北六月西燕主沖入長安堅奔五将山宏尋将母妻宗室男女數千騎出奔百寮逃散慕容沖入據長安縱兵大掠死者不可勝計晉書前秦載記秋七月後秦王萇圍五将山執秦王堅以歸堅至五将山姚萇遣将軍吴忠圍之堅衆奔散獨侍御十數人而己神色自若坐而待之召宰人進食俄而忠至執堅以歸新平幽之於别室萇求傳國璽於堅曰萇次膺符歴可以為惠堅瞋目叱之曰小羌乃敢干逼天子豈以傳國璽授汝羌也圖緯符命何所依據五胡次序無汝羌名違天不祥其能乆乎璽已送晉不可得也萇又遣尹緯說堅求為堯舜代禪之事堅責緯曰禪代者聖賢之事姚萇叛賊奈何擬之古人堅既不許萇以禪代罵而求死萇乃縊堅於新平佛寺中晉書前秦載記冬十月後秦及西燕兵戰於新平大破之後秦白雀二年冬十月慕容沖遣尚書令車騎大将軍髙葢率衆五萬來侵戰於新平南大破之葢帥麾下數千人來降拜散騎常侍十六國春秋十一年秦主苻登太初元年後秦建初元年夏四月後秦王萇取長安稱帝冲既率衆東下長安空虚盧水郝奴稱帝於長安渭北盡應之扶風王驎有衆數千堡據馬嵬奴遣弟多攻驎萇伐驎破之驎走漢中執多而進攻奴降之以太元十一年萇僣即皇帝位於長安大赦改元曰建初國號大秦改長安曰常安徙安定五千餘户於長安以弟征虜緒為司𨽻校尉鎮長安晉書後秦載記六月關隴諸郡復起兵應秦苻丕僣即帝位於晉陽王永檄州郡以孟冬上旬會大駕於臨晉於是馮翊冦明新平張宴京兆杜敏扶風馬郎建忠髙平牧官都尉王敏等咸承檄起兵各有衆數萬遣使應丕晉書前秦載記冬十二月秦主登伐後秦苻丕敗尚書冦遺奉丕子懿自杏城奔登登為丕發喪行服三軍縞素登請立懿為主衆咸曰渤海王雖先帝之子然年在幼沖未堪多難國難而立長君春秋之義也登於是以太元十一年僣即皇帝位立堅神主於軍中凡欲所為啟主而後行繕甲纂兵将引師而東乃告堅神主歔欷流涕将士莫不悲慟皆刻鉾鎧為死休字示以戰死為志每戰以長矟鉤刃為方圓大陣知有厚薄從中分配故人自為戰所向無前晉書前秦載記十二年秦太初二年後秦建初二年春正月苻纂起兵杏城初纂自長安奔晉陽襄陵之敗奔杏城至是秦主登遣使拜纂為大司馬封魯王纂怒曰渤海王先帝之子南安王何以不立而自立乎長史王旅諫曰南安王已立理無中改今冦虜未滅不可宗室中自為仇敵也纂乃受命於是盧水胡彭沛榖新平羌雷惡地等皆附於纂有衆十餘萬綱目苻纂攻上郡羌破之纂遣師奴攻上郡羌酋金大黑洛生等逆戰大破之斬首五千八百級十六國春秋夏五月秦陷後秦汧雍二城登以竇衝為車騎将軍纂攻姚碩徳於涇陽敗之姚萇自隂宻救之纂退屯敷陸竇衝攻萇汧雍二城克之斬其将姚元平張畧等又與萇戰於汧東為萇所敗十六國春秋敷陸在今鄜州八月苻師奴殺其兄纂於敷陸姚萇擊走之馮翊太守蘭櫝帥衆二萬自頻陽入和寧和寧在杏城東南與纂首尾将圖長安朔方公師奴勸其兄纂稱尊號不從乃殺纂自立為秦公櫝遂與師奴絶九月姚萇軍於泥源漢書地理志北地郡有泥陽師奴遂戰大敗亡奔鮮卑十六國春秋冬十月後秦王萇擊慕容永於河西走之蘭櫝與苻師奴離二慕容永攻之櫝遣使請救萇将赴救之尚書令姚旻等曰苻登近在瓦亭陛下未宜輕舉萇曰登遲重少决必不敢輕軍深入比兩月間吾必破賊而返登雖至無能為也冬十月進擊永於河西永走蘭櫝復列兵拒守萇攻之十二月擒櫝收其士馬遂如杏城十六國春秋河按鑑注龍門至華隂之西也十二月姚萇㧞将軍徐嵩壘嵩死之嵩守始平郡甚有威惠及壘陷萇将姚方成執而數之嵩厲色謂方成曰汝姚萇罪應萬死主上止黄眉之斬而宥之叨據内外位為列将無犬馬識養之誠首為大逆汝曹羌軰豈可以人理期也何不速殺我早見先帝取姚萇於地下方成怒三斬嵩漆其首為便器悉坑其士卒以妻子賞軍晉書前秦載記十四年秦太初四年後秦建初四年冬十月秦主登大會兵於長安太初四年十月遣使齎書加竇衝大司馬驃騎大将軍楊定為左丞相遣衝率見衆為先驅自繁川趨長安登帥衆從新平逕據新豐之千户因使定率隴上之軍為其後繼又約監河西諸軍事并州刺史楊改都督河州諸軍事冀州刺史楊楷各率所統大會長安十六國春秋十五年秦太初五年後秦建初五年夏四月秦将軍魏褐一作掲飛攻後秦杏城後秦主萇擊斬之苻登将雷惡地率衆降萇拜為鎮東将軍魏褐飛自稱大将軍衝天王率氐胡數萬人攻安北姚當城於杏城雷惡地應之攻鎮東姚漢得於李閏在今同州西北萇議討之羣臣咸曰陛下不憂六十里苻登乃憂六百里褐飛萇曰登非可卒殄吾城亦非登所能卒圖惡地多智南引褐飛東結董成甘言美說以成奸謀若得杏城李閏控制逺近長安東北非復吾有於是潛軍赴之萇時衆不滿二千褐飛惡地衆至數萬氐胡赴之者首尾不絶萇每見一軍至輙有喜色羣下怪而問之萇曰今同惡相濟皆來會集吾得乘勝席巻一舉而覆其巢穴東北無復餘也褐飛等以萇兵少盡衆來攻萇固壘不戰示之以弱潛遣子崇率騎數百出其不意以乘其後褐飛兵擾亂萇遣鎮逺王超平逺譚亮率歩騎擊之褐飛衆大潰斬褐飛及首級萬餘晉書後秦載記秋七月馮翊人郭質起兵應秦不克馮翊郭質起兵廣郷魏志鄭縣有廣郷原鄭縣時屬京兆移檄三輔曰吾等生逢先帝堯舜之化累世受恩姚萇窮凶肆毒妄竊重名皇天雖欲絶之亦将假手於忠節凡百君子含恥而存孰若蹈道而没乎衆咸然之唯鄭縣人茍曜不從聚衆數千應姚萇質遣部将伐曜大敗而歸又與曜戰於鄭東為曜所敗衆皆潰散晉書前秦載記十六年秦太初六年後秦建初六年夏五月秦主登及後秦主萇戰於馬頭原秦師敗績登自雍攻萇将金温於范氏堡尅之遂渡渭水攻萇京兆太守韋范於段氏堡不尅進據曲牢茍曜宻應登登去曲牢繁川通鑑註繁川在杜陵縣次於馬頭原萇率騎來距大戰敗之斬其尚書吳忠晉書前秦載記鎮東茍曜據逆萬堡宻引苻登萇與登戰敗於馬頭原收衆復戰姚碩徳謂諸将曰上慎於輕戰每欲以計取之今戰既失利而更逼賊者必有由也萇聞而謂碩徳曰登用兵遲緩不識虚實今輕兵直進逕據吾東必曜䜿子與之連結也事乆變成其禍難測所以速戰者欲使䜿子謀之未就好之未深散敗其事耳進戰大敗之登退屯於郿後秦載記十九年秦主苻崇延初元年後秦主姚興皇初元年夏四月秦主登及後秦戰於廢橋敗績姚萇死登聞之喜曰姚興小兒吾将折杖笞之於是盡衆而東攻屠各姚奴帛蒲二堡尅之自甘泉向關中興追登不及數十里登從六陌趨廢橋興将尹緯據橋以待之登争水不得衆渇死者十二三與緯大戰為緯所敗其夜衆潰登單馬奔雍晉書前秦載記五月姚興稱帝於槐里姚興字子畧萇之長子也苻堅時為太子舍人萇之在馬牧興自長安冒難奔萇立為太子萇出征討常留統後事及鎮長安甚有威惠萇死太元十九年僣即帝位於槐里大赦境内改元曰皇初晉書後秦載記秋七月後秦主興滅秦遷隂宻三萬戸於長安興自安定如涇陽與登戰於山南斬登散其部衆歸復農業徙隂宻三萬户於長安分大營户為四置四軍以領之晉書後秦載記安帝隆安元年秦皇初四年後秦亡於太和十九年以下秦止稱秦秋九月秦冦上洛姚興遣其子畧攻湖城及上洛恢遣梁州刺史王正引率衆出子午谷以為聲援畧懼而退恢以功進征虜将軍領秦州刺史晉書郄恢傳秦武都氐據方山叛遣兵討平之武都氐屠飛啖鐵等殺隴東太守姚迴畧三千餘家據方山以叛興遣姚紹等討之斬飛鐵遣狄伯支迎流人曹會牛壽萬餘户於漢中晉書後秦載記元興二年秦𢎞始五年秋七月秦徙凉州民於長安興遣姚碩徳姚穆率歩騎六萬伐吕隆大敗吕隆之衆隆懼遂降興徙河西豪右萬餘户於長安晉書後秦載記義熙二年秦𢎞始八年将軍苻宣入漢中晉義熙二年平北将軍梁州督䕶苻宣入漢中興梁州别駕吕營漢中徐逸席難起兵應宣求救於楊盛盛遣軍臨濜口南梁州刺史王敏退守武興楊盛復通於晉晉書後秦載記三年秦𢎞始九年夏主赫連勃勃龍升元年夏六月赫連勃勃自稱大夏天王勃勃魁岸美風儀性辯慧秦王興見而竒之配以雜虜二萬餘落使鎮朔方會魏主珪歸所虜秦将於秦興歸賀狄干以報之勃勃怒遂謀叛秦柔然獻馬於秦勃勃掠取之襲殺没奕于而并其衆自為夏后氏之苗裔稱大夏天王置百官綱目七年秦𢎞始十三年春正月夏攻秦杏城獲其守将姚詳姚詳時鎮杏城為赫連勃勃所逼糧盡委守南奔大蘇勃勃要之兵散為勃勃所執時遣衛大将軍顯迎詳詳敗遂屯杏城晉書後秦載記九年秦𢎞始十五年夏鳯翔元年春夏築統萬城勃勃以叱干阿利領将作大匠發嶺北夷夏十萬人於朔方黑水之南營起都城勃勃自言朕方統一天下君臨萬邦可以統萬為名阿利性工巧然殘忍刻薄蒸土築城錐入一寸即殺作者而并築之勃勃以為忠故委以營繕之任晉書夏載記十一年秦𢎞始十七年春夏攻秦杏城㧞之勃勃攻姚興将姚逵於杏城二旬尅之執逵及其将姚大用姚安和姚利僕尹敵等坑戰士二萬人晉書夏載記赫連勃勃攻杏城興遣姚弼救之至冠泉而杏城陷興入北地弼次於三樹遣弼及斂曼嵬向新平興還長安後秦載記秋九月夏遣兵入秦新平姚弼敗之勃勃遣其将赫連建率衆冦二縣遂入新平姚弼討之戰於龍尾堡大破之擒建送於長安晉書後秦載記秦将康宦作亂赦不誅楊武安鄉侯康宦驅略白鹿原氐胡數百家奔上洛太守宋林距之商洛人黄金等起義兵以掎宦宦乃率衆歸罪興赦之復其爵位晉書後秦載記十二年秦主姚泓永和元年春三月夏克秦雍城秦主泓擊却之勃勃進兵侵雍嶺北雜户悉奔五将山征北姚恢率户五千奔新平鎮西姚諶委鎮東走勃勃遂據雍抄掠郿城姚紹及征虜尹昭鎮軍姚洽等率歩騎五萬討勃勃姚恢以精騎一萬繼之軍次横水勃勃退保安定晉書後秦載記夏五月楊盛遣兵攻長虵秦兵討走之楊盛遣兄子倦入㓂長虵平陽氐茍渇聚衆千餘據五丈原以叛遣鎮逺姚萬恢武姚難討之為渇所敗姚諶討渇擒之泓使輔國歛曼嵬前将軍姚光兒討楊倦於陳倉倦奔於散關晉書後秦載記六月夏遣兵侵秦池陽勃勃遣兄子提南侵池陽車騎姚裕前将軍彭白狼建義虵元距却之晉書後秦載記十三年秦永和二年春正月秦将姚恢反逼長安討平之姚恢率安定鎮户三萬八千焚燒室宇以車為方陣自北雍州趣長安自稱大都督建義大将軍移檄州郡欲除君側之惡乃南攻郿城鎮西姚諶為恢所敗恢軍勢彌盛長安大震泓馳使徴紹遣姚裕及輔國胡翼度屯於澧西姚紹率輕騎先赴難使姚洽司馬國璠将歩卒三萬赴長安恢從曲牢進屯杜城紹與恢相持於靈臺姚讚聞恢漸逼留寧朔尹雅為𢎞農太守守潼關率諸軍還長安恢衆見諸軍悉集咸懼其将齊黄等棄恢而降恢進軍逼紹讚自後要擊大破之殺恢及其三弟晉書後秦載記三月将軍王鎮惡攻潼關與秦太宰姚紹戰大破之義熙十二年髙祖領平北将軍沈林子參平北軍事時偽河東太守尹昭據蒲坂林子與冠軍檀道濟同攻蒲坂龍驤王鎮惡攻潼關姚泓聞大軍至遣偽東平公姚紹争據潼關林子謂道濟曰蒲坂城堅池深不可旬日而尅不如棄之還援潼關且潼關天阻所謂形勝之地鎮惡孤軍勢危力屈若使姚紹據之則難圖也及其未至當并力争之若潼關事㨗尹昭可不戰而服道濟從之既至紹設重圍圍林子及道濟鎮惡等時懸師深入三軍疑阻莫有固志道濟議欲渡河避其鋒或欲棄捐輜重還赴髙祖林子塞井焚舍示無全志率麾下數百人犯其西北紹衆小靡乗其亂而薄之紹大潰俘虜千數悉獲紹器械資實紹退走復留偽武衛将軍姚鸞精兵守險林子衘枚夜襲即屠其城紹復遣撫軍将軍姚讚将兵屯河上絶水道讚壘塹未立林子邀擊連破之讚衆皆奔散紹又遣長史領軍将軍姚伯子寧朔将軍安鸞䕶軍姚黙騾平逺将軍河東太守唐小方率衆三萬屯據九泉憑河固險以絶糧援髙祖以通津阻要兵糧所急復遣林子争據河源林子巻甲進討累戰大破之尋紹忽死讚統後事鳩集餘衆復襲林子林子率師禦之讃輕騎遁走既連戰皆㨗士馬旌旗甚盛髙祖賜書勸勉之宋書序傳秋七月将軍沈田子入武關義熙十二年髙祖北伐田子與順陽太守傅𢎞之各領别軍從武關屯據青泥姚泓欲自禦大軍慮田子襲其後欲先平田子然後傾國東出乃率軍數萬奄至青泥田子所領裁數百欲擊之傅𢎞之曰彼衆我寡難可與敵田子曰師貴用竒不必在衆便獨率所領鼓而進合圍數重田子撫慰士卒棄糧毁舍前後奮擊所向摧陷賊衆一時潰散所殺萬餘人長安既平髙祖燕於文昌殿舉酒賜田子曰咸陽之平卿之功也即以咸陽相賞授咸陽始平二郡太守宋書序傳初劉裕以沈田子等衆少遣沈林子将兵自秦嶺往助之至則已破相與追之關中郡縣多濳送欵於田子十六國春秋八月王鎮惡帥師自河入渭大破秦兵劉裕至潼關東平公讃拒裕於關西姚難屯於香城裕遣王鎮惡王敬自秋社西渡渭以逼難軍難既為鎮惡所逼引兵而西時大霖雨渭水泛溢讃等不得北渡鎮惡水陸兼進追及難軍泓自㶚上引兵次石橋以為之援讃退屯鄭城鎮北姚疆率部人數千與難合陣於涇上以拒鎮惡鎮惡遣毛徳祖進擊破疆疆力戰死之難遁還長安裕進據鄭城泓使姚裕尚書龎統屯兵營中陳留公洸屯兵澧西尚書姚白𤓰徙四軍雜户入長安姚丕守渭橋胡翼度屯石積姚讃屯覇東泓軍逍遥園王鎮惡率水軍自河入渭泝流而上所乘皆䝉衝小艦行船者悉在艦内北土素無舟檝泓軍見艦進而外無有行船人莫不驚以為神鎮惡至渭橋令軍士食畢皆持杖登岸後登者斬既登岸渭水流急艦皆隨流逐去倐忽不知所在鎮惡諭士卒曰此是長安城北門去家萬里而遥舟檝衣糧並已隨流今進而戰勝則功名俱顯不勝則骨骸不返乃身先士卒衆隨騰躍争進大破丕軍於渭橋泓引兵赴之逼水地狹為丕敗兵所蹂踐不戰而潰鎮西将軍諶等皆死於陣泓單馬還宫鎮惡入自平朔門泓與裕等數百騎出奔石橋東平公讃聞泓敗召将士告之衆皆以刀擊地攘袂大泣讃夜帥諸軍将會泓於石橋晉師已固圍之讃軍不得入衆皆驚散泓計無所出謀欲詣軍門降泓子佛念年十二謂泓曰晉人将逞其欲終必不全願自裁決泓憮然不答佛念登宫牆自投死八月癸亥泓将妻子羣臣詣壘門降鎮惡乃以屬吏城内夷晉六萬餘户皆以國恩撫慰之號令嚴肅百姓安堵十六國春秋九月太尉裕入長安九月裕至長安鎮惡迎於㶚上裕勞之曰成吾覇業者真卿也謝曰此明公之威諸将之力鎮惡何功之有焉裕笑曰卿學馮異耶鎮惡性貪秦府庫盈積鎮惡盗取不可勝紀裕以其功大不問裕收秦彛器渾儀土圭紀里鼓指南車及秦玉璽送建康餘金帛珍寳頒将士送泓建康市戮之十六國春秋十二月太尉裕東還留子義真鎮關中義真初封桂陽公從北征及關中平定髙祖議欲東還而諸将行役既乆咸有歸願止留偏将不足鎮固人心乃以義真行都督雍梁秦三州諸軍事安西将軍領䕶西戎校尉雍州刺史太尉諮議參軍京兆王脩為長史委以關中之任髙祖将還三秦父老詣門流涕訴曰殘民不沾王化於今百年矣始觀衣冠方仰聖澤長安十陵是公家墳墓咸陽宫殿數千間是公家屋宅捨此欲何之髙祖為之愍然慰辭曰受命朝廷不得擅留感諸君戀本之意今留第二兒令文武賢才共鎮此境臨還自執義真手以授王脩令脩執其子孝孫手以授髙祖義真尋除正加節又進督并東秦二州司州之東安定新平二郡諸軍事領東秦州刺史宋書武三王傳夏遣兵向長安裕留子義真鎮長安而還勃勃聞之大恱謂王買徳曰朕将進圖長安卿試言取之方畧買徳曰劉裕滅秦所謂以亂平亂朱有徳政以濟蒼生關中形勝之地而以弱才小兒守之非經逺之規也狼狽而返者欲速成簒事耳無暇有意於中原陛下以順伐逆義貫幽顯百姓望義旗之至以日為嵗矣青泥上洛南師之衝要宜置游兵斷其去來之路然