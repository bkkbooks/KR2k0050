子賊署南平王烏過仁魏書楊播傳附三月復潼關二月賊據潼關三月詔将西討中外戒嚴賊走復潼關魏書孝明帝紀冬十月雍州刺史蕭寳夤據州反遣行臺長孫稚討之椿為遇暴疾頻啟乞觧詔以蕭寳夤代椿為刺史行臺椿還鄉里遇子昱将還京師因謂曰當今雍州刺史亦不賢於寳夤但其上佐朝廷應遣心膂重人何得任其牒用且寳夤不藉刺史為榮吾觀其得州喜恱不少至於賞罰云為不依常憲恐有異心汝今赴京稱吾此意以啟二聖並白宰輔更遣長史司馬防城都督欲安關中正須三人耳不然必成深憂昱還面啟肅宗及靈太后並不信納及寳夤邀害御史中尉酈道元猶上表自理稱為椿父子所謗魏書楊播傳附寳夤除雍州刺史十月復其舊封時關西冦賊充斥人情沮喪寳夤自念出軍累年糜費尤廣一旦覆敗慮見猜責内不自安朝廷頗亦疑阻乃遣中尉酈道元為關中大使寳夤謂宻欲圖已彌以憂懼而長安輕薄之徒因相說動道元行達隂盤驛宋白曰京兆昭應縣東三十二里有隂盤故城寳夤宻遣其将郭子恢等攻殺之遂反僣舉大號稱隆緒元年遣郭子恢東冦潼關行臺張始榮圍華州刺史崔襲詔尚書僕射行臺長孫稚討之蕭寳夤傳寳夤以湛為行臺郎中寳夤稱兵反時湛疾卧於家寳夤令姜儉報湛云道元之來事不可測吾不能坐受死亡不復作魏臣也湛大哭曰王本以窮鳥投人朝廷假王羽翼榮寵至此屬國歩多虞不能竭忠報國乃欲乗人間隙守關問鼎湛不能以百口居家為王族滅願賜骸骨還鄉里寳夤素重湛知不為已用聽還武功蘇湛傳武泰元年春正月長孫稚克潼關蕭寶夤敗走正月丙子長孫稚平潼關丁丑雍州城人侯終徳相率攻寳夤寳夤攜南陽公主及子與百餘騎渡渭而走雍州平魏書孝明帝紀時北地人毛鴻賓與其兄遐率鄉義将討寶夤寶夤遣其大将軍盧祖遷等擊遐為遐所殺又遣其将侯終徳往攻遐會子恢為官軍所敗長孫稚又遣子子彦破始榮於華州終徳因此勢挫還圖寳夤軍至白門寳夤始覺與終徳交戰戰敗出走尋奔醜奴蕭寳夤傳羊深為尚書左丞蕭寳夤反攻圍華州正平薛鳯賢等作逆勅深兼給事中黄門侍郎與大行臺僕射長孫承業共會潼關規模進止事平以功賜爵新泰男北史羊深傳孝荘帝永安二年秋九月万俟醜奴陷東秦州万俟醜奴攻東秦城陷之殺刺史髙子朗魏書孝荘帝紀三年春三月醜奴冦岐州都督賀㧞岳大破之賊帥万俟醜奴蕭寳夤擁衆豳涇凶勢日盛榮遣其從子天光為雍州刺史率都督賀㧞岳侯莫陳恱等總衆入關討之天光既至雍州以衆少不敵逡廵未集榮大怒遣其騎兵參軍劉貴馳驛詣軍加天光杖罰天光等大懼乃進討連破之魏書爾朱榮傳時万俟醜奴僭稱大號關中騷動榮遣岳討之榮乃以天光為驃騎大将軍雍州刺史以岳為左大都督及軍次潼關天光有難色岳曰蜀賊草竊而已公尚遲疑若遇大敵将何以戰天光曰今日之事一以相委公宜為吾制之於是進軍拒戰於渭北破之軍威大振天光與岳進至雍州榮又續遣兵至時醜奴自率大衆圍岐州遣其大行臺尉遲菩薩向武功南渡渭水菩薩攻柵已尅還岐州岳以輕騎八百北渡渭擒其縣令二人獲甲首四百級殺掠其民以挑菩薩菩薩率歩騎二萬至渭北岳以輕騎數千與菩薩隔水交言岳稱揚國威菩薩自言强盛往復數返菩薩乃自驕踞令省事傳語岳怒曰我與菩薩言卿是何人與我對語省事恃隔水應答不遜岳舉弓射之應弦而倒時已逼暮於是各還岳宻於渭南傍水分置精騎數十為一處隨地形便置之明日自将百餘騎隔水與賊相見岳漸前進先所置騎隨岳而集騎既漸増賊不復測其多少行二十里許便至淺水可濟之處岳便馳馬東出以示奔遁賊謂岳走乃棄歩兵南渡渭水輕騎追岳東行十餘里依横崗設伏兵以待之賊以路險不得前進前後繼至半度崗東岳乃廻戰身先士卒急擊之賊便退走岳號令所部賊下馬者皆不聽殺賊顧見之便悉投馬俄而虜獲三千人馬亦無遺遂擒菩薩仍渡渭北降歩卒萬餘收其輜重醜奴棄岐州北走周書賀㧞岳傳夏四月爾朱天光大破醜奴於岐州涇州天光發雍至岐與岳合勢軍於汧渭之間宣言逺近曰今時将熱非可征討待至秋凉别量進止醜奴謂以為實分遣諸軍散營農稼在岐州之北百里涇州遣其太尉侯伏侯元進領兵五千據險立柵且耕且守在其左右千人已下為一柵者乃復數處天光知其勢分遂宻嚴備晡時潛遣輕騎先行斷路以防賊知於後諸軍盡發昧旦攻圍元進大柵㧞之諸所俘執並皆放散須臾之間諸柵悉來歸欵魏書爾朱天光傳孝武帝永熈元年夏四月賀㧞岳襲長安殺爾朱顯壽天光之東下也留其弟顯壽鎮長安召侯莫陳恱欲與俱東岳知天光必敗欲留恱共圖顯夀宇文泰曰恱雖為将不能制物若先說其衆必人有留心恱進失爾朱之期退恐人情變動乘此說之事無不濟岳喜從之恱與岳襲長安歡以岳為關西大行臺岳以泰為左丞事無巨細皆委之綱目二年夏四月以宇文泰為關西大都督宇文泰討侯莫陳恱誅之遂定秦隴長史于謹言於泰曰明公據關中險固之地将士驍勇土地膏腴今天子在洛廹於羣凶若公陳懇誠請都關右挾天子以令諸侯奉王命以討暴亂此桓文之業千載一時也泰善之髙歡復遣使甘言厚禮以紿泰泰不受封其書以聞魏主命泰引軍而東泰使雍州刺史梁禦入據長安魏主以泰為關西大都督略陽縣公承制封拜通鑑三年春二月東梁州民作亂討平之二月東梁州為夷民侵逼詔使持節車騎大将軍行東雍州五代志曰雍州鄭縣後魏置東雍州事泉企為東梁州行臺都督以討之魏書出帝紀後周泉企為東雍州刺史蜀人張國雋聚黨剽刼州郡不能制企命收而戮之闔郡清肅冊府元龜秋七月帝奔長安齊神武稍逼京師帝輕騎入關太祖備儀衛奉迎謁見東陽驛水經志渭水過新豐合西陽水又東合東陽水太祖免冠泣涕謝曰臣不能式遏冦虐使乘輿遷幸請拘司敗以正刑書帝曰公之忠節曝於朝野朕以不徳負乘致冦今日相見深用厚顔乃奉帝都長安披草萊立朝廷軍國之事咸取决焉仍受大将軍雍州刺史兼尚書令進封略陽郡公周書文帝紀八月髙歡進屯華隂齊神武襲陷潼關侵華隂太祖率諸軍屯霸上以待之齊神武留其将薛瑾守關而退周書文帝紀泉企魏孝武初加車騎大将軍左光祿大夫齊神武専政魏帝有西鎮之心欲委企以山南之事乃除洛州刺史未幾帝西遷神武率衆至潼關企遣其子元禮督鄉里五千人北出太谷以禦之齊神武不敢進泉企傳冬十月大都督泰克潼關齊薛瑾守關太祖乃進軍討瑾虜其卒七千還長安進位丞相周書文帝紀文帝大統元年春正月東魏襲華州刺史王羆擊之王羆鎮華州嘗修州城未畢梯在外齊神武遣韓軌司馬子如從河東宵濟襲羆羆不之覺比曉軌衆已乘梯入城羆尚卧未起聞閤外洶洶有聲便袒身露髻徒跣持一白梃大呼而出敵見之驚逐至東門左右稍集合戰破之軌衆遂投城遁走周書王羆傳遷靈州豪帥於咸陽太祖遣李虎李弼趙貴等討曹泥於靈州遷其豪帥於咸陽周書文帝紀二年春三月東魏陷夏州髙歡自将萬騎襲魏夏州不火食四日而至縛矟為梯夜入其城擒刺史斛㧞俄彌突因而用之留張瓊将兵鎮守遷其部落以歸綱目三年春三月大丞相泰及東魏戰于潼關斬其大将竇泰東魏冦龍門屯軍蒲坂造三道浮橋渡河又遣其将竇泰趣潼關太祖出軍廣陽召諸将曰賊今掎吾三面又造橋于河示欲必度是欲綴吾軍使竇泰得西入耳泰屢勝而驕今出其不意襲之必克克泰則歡不戰而自走矣庚戍太祖率騎六千還長安聲言欲保隴右辛亥潜出軍癸丑旦至小關竇泰猝聞軍至惶懼依山為陣未及成列太祖縱兵擊破之盡俘其衆萬餘人斬泰傳首長安齊神武亦撤橋而退周書文帝紀東魏将髙敖曹陷洛州執刺史泉企以歸髙敖曹率衆圍逼州城杜窋為其鄉導企拒守旬餘矢盡援絶城乃陷焉企謂敖曹曰泉企力屈志不服也及竇泰被擒敖曹退走遂執企而東以窋為刺史企臨發宻戒子元禮仲遵曰幸逢聖運位亞臺司爵禄既隆年齒又暮前途夷險抑亦可知汝等志業方强堪立功效但得致力本朝吾無餘恨不得以我在東遂虧臣節也乃揮涕而訣元禮與企俱被執而東元禮逃歸與仲遵結豪右襲州城斬窋傳首長安朝廷嘉之世襲洛州刺史周書泉企傳上按鑑注洛州治洛秋八月大丞相泰伐東魏次潼關誓師七月徴兵會咸陽八月丁丑太祖率李弼等十二将東伐至潼關太祖乃誓於師曰與爾有衆奉天威誅暴亂惟爾士整爾甲兵戒爾戎事無貪財以輕敵無暴民以作威用命則有賞不用命則有戮爾衆士其勉之齊神武率衆十萬趨蒲坂将自后土濟太祖既平𢎞農聞齊神武将度乃引兵入關周書文帝紀九月東魏侵華州不克沙苑之役齊神武士馬甚盛太祖以華州衝要遣使勞羆令加守偹羆語使人曰老羆當道卧貆子安得過太祖聞而壮之及齊神武至城下謂羆曰何不早降羆乃大呼曰此城是王羆冡生死在此欲死者來齊神武遂不敢攻周書王羆傳冬十月大丞相泰及東魏戰于渭曲大敗之齊神武逼華州知不可攻乃渉洛軍于許原西一統志云許原在同州城北五十里沮水之滸太祖據渭南徴諸州兵皆會乃召諸将謂之曰髙歡越山度河逺來至此天亡之時也吾欲擊之何如諸将咸以衆寡不敵請待歡更西以觀其勢太祖曰歡若得至咸陽人情轉駭擾今及其新至便可擊之即造浮橋於渭令軍人齎三日糧輕騎渡渭輜重自渭南夾渭而西冬十月壬辰至沙苑一統志云沙苑在同州城南一十二里距齊神武軍六十餘里齊神武聞太祖至引軍來會癸巳旦候騎告齊神武軍且至太祖召諸将謀之李弼曰彼衆我寡不可平地置陣此東十里有渭曲可先據以待之遂進軍渭曲背水東西為陣命将士皆偃戈葭蘆中聞鼓聲而起申時齊神武至望太祖軍少競馳而進不為行列太祖鳴鼓士皆奮起于謹等六軍與之合戰李弼等率鐵騎横擊之絶其軍為二隊大破之斬六千餘級臨陣降者二萬餘人齊神武夜遁追至河上復大克獲前後虜其卒七萬留其甲士二萬收其輜重兵甲獻俘長安還軍渭南乃於戰所人種樹一株以旌武功周書文帝紀斛律羌舉髙祖西討大軍濟河集諸将議進趣之計羌舉曰黒獺聚兇黨强弱可知若欲固守無粮援可恃今揣其情已同困獸若不與其戰而逕趣咸陽咸陽空虚可不戰而剋㧞其根本彼無所歸則黒獺之首懸於軍門矣諸将議有異同遂戰于渭曲大軍敗績齊書斛律羌舉傳初髙祖将圖關右與榮宻謀榮盛稱未可及渭曲失利神武悔之曰吾不用段榮之言以至於此段榮傳北齊将彭樂勇猛無雙時神武率樂等十餘萬人於沙苑與宇文䕶戰時樂飲酒乘醉深入被刺肝膽俱出内之不盡截去之復入戰獨異志四年秋八月長安亂大丞相泰討平之大軍之東伐也關中留守兵少而前後所虜東魏士卒皆散在民間乃謀為亂及李虎等至長安計無所出乃與公卿輔魏太子出次渭北關中大震恐百姓相剽刼于是沙苑所俘軍人趙青雀雍州民于伏徳等反青雀據長安子城伏徳保咸陽與太守慕容思慶各收降卒以拒還師長安大城民皆相率拒青雀每日接戰魏帝留止閿鄉遣太祖討之長安父老見太祖至咸相賀華州刺史導率軍襲咸陽斬思慶擒伏徳南度渭與太祖會攻青雀破之太傅梁景睿先以疾留長安遂與青雀通謀至是亦伏誅關中乃定魏帝還長安太祖復屯華州周書文帝紀五年冬治兵大閱于華隂周書文帝紀六年春二月柔然入冦召諸軍屯沙苑以備之時茹茹渡河南冦候騎已至豳州朝廷慮其深入乃徴發士馬屯守京城塹諸街巷以備侵軼僕射周惠達召羆議之羆不應命謂其使曰若茹茹至渭北者王羆帥鄉里自破之不煩國家兵馬何為天子城中作如此驚擾由周家小兒恇怯致此柔然未㡬還周書王羆傳七年春三月稽胡據上郡叛討平之稽胡帥夏州刺史劉平伏據上郡反遣開府于謹討平之周書文帝紀八年冬十二月突厥冦綏州刺史宇文測破走之宇文測仕魏行綏州事每嵗河氷合後突厥即來冦掠嘗預遣居民入城堡以避之測至皆令安堵如舊乃於要路數百處并多積柴仍逺道斥候知其動静是年十二月突厥從連谷入冦去界數十里測命積柴之處一時縱火突厥謂有大軍至懼而遁走自相蹂踐委棄雜畜及輜重不可勝數測徐率所部收之分給百姓自是突厥不敢復至測因請置戍兵以備之周書宇文測傳帝如華隂魏帝狩於華隂大饗将士太祖率諸将朝於行在所周書文帝紀作萬壽宫起萬壽殿於沙苑北通鑑九年冬十月治兵太祖以邙山之戰諸将失律於是廣募關隴豪右以増軍旅冬十月大閱于櫟陽還屯華州周書文帝紀氐人叛遣使諭降之後周趙昶為中都督氐梁道顯叛攻南繇太祖遣昶慰諭之道顯等皆即欵附東秦州刺史因徙其豪帥三十餘人并部落於華州太祖即以昶為都督領之冊府元龜十年冬十月治兵十月大閱於白水周書文帝紀十一年冬十月治兵十月大閱於白水遂西狩岐陽周書文帝紀十二年夏五月徙河西民於長安獨孤信平凉州遷其民六千餘家于長安周書文帝紀秋七月觀兵於咸陽七月太祖大會諸軍於咸陽周書文帝紀十三年冬十一月帝如岐陽冬太祖奉魏帝西狩於岐陽周書文帝紀十四年夏五月太師泰奉太子西廵太祖奉魏太子廵撫西境自新平出安定登隴刻石紀事歴北長城而還周書文帝紀廢帝元年梁元帝繹承聖元年春将軍王雄取梁上津魏興魏大統十七年太祖遣大将軍王雄出子午伐上津魏興廢帝元年春王雄平上津魏興以其地置東梁州周書文帝紀夏四月将軍達奚武取梁漢中達奚武拜驃騎大将軍率兵三萬經畧漢川梁将楊賢以武興降梁深以白馬降武分兵守其城梁梁州刺史蕭循固守南鄭武圍之數旬循乃請服會梁武陵王紀遣其将楊乾運等将兵萬餘人救循循於是更據城不出恐援軍之至表裏受敵乃簡精騎三千逆擊乾運於白馬大破之循乃降率所部男女二萬口入朝周書逹奚武傳王悅從達奚武征梁漢軍出武令恱說其城主楊賢恱貽之書賢遂降恱白武云白馬衝要是必争之地今城守寡弱易可圖也若蜀兵更至攻之實難武然之即令恱率輕騎徑趣白馬恱先示其禍福其将梁深遂以城降時梁武陵王杲遣其将任奇率歩騎六千欲先據白馬行次闕城聞已降乃還梁州平王恱傳劉璠降於武時南鄭尚堅守未下達奚武請屠之太祖将許焉唯全璠一家而已璠請之于朝太祖怒而不許璠泣而固請移時不退柳仲禮侍側曰此烈士也太祖曰事人當如此遂許之城竟獲全劉璠傳楊紹從達奚武征漢中時梁蕭循固守梁州紹以為懸軍敵境圍守堅城曠日持乆糧饟不繼城中若致死於我懼不能歸請為計以誘之城降以功授輔國将軍楊紹傳赫連達從達奚武攻漢中蕭循送欵賀蘭願徳等以其食盡欲急攻取之達曰不戰而獲城䇿之上者無容利其子女貪其財帛窮兵極武仁者不為且觀其士馬猶彊城池尚固攻之縱克必彼此俱損如困獸猶鬭則成敗未可知况行師之道以全軍為上武曰公言是也遂受循降赫連達傳秋八月叛民黄衆寳圍東梁州太守柳檜死之柳檜除魏興華陽二郡守安康人黄衆寳反圍檜郡城力屈城陷為賊所獲既而衆寳等進圍東梁州縛檜置城下欲令檜誘說城中檜乃大呼曰羣賊烏合糧食已罄行即退散各宜勉之衆寳大怒臨檜以兵曰速更汝辭不爾便就戮矣檜守節不變遂害之棄屍水中城中人皆為之流涕周書柳檜傳二年春二月東梁州平東梁州民叛圍州城太祖遣王雄討之二年二月東梁州平遷其豪帥于雍州周書文帝紀檜子雄亮年十二遭父艱志在復讎後竟手刄衆寳於京城朝野重其志節太祖特恕之柳檜傳陸騰為車騎大将軍安康賊黄衆寳等作亂結衆數萬攻圍東梁州城中糧盡詔騰率軍自子午谷以援之騰乃星言就道至便與戰大破之冊府元龜恭帝元年五月直州洋州金州人作亂将軍李遷哲討平之魏恭帝初直州人樂熾洋州人田越金州人黄國等連結為亂遣田𢎞出梁漢賀若敦趨直谷熾聞官軍至乃燒絶棧道據守直谷敦衆不得前太祖以遷哲信著山南乃令與敦同徃經畧熾等平之或降或獲尋並平蕩周書李遷哲傳茹茹冦廣武遣兵擊破之茹茹乙旃達官冦廣武五月遣柱國趙貴追擊斬首數千級收其輜重而還周書文帝紀後按五代志延安郡豐林縣魏置廣武縣秋九月開回車路以通漢中魏恭帝元年太祖欲開梁漢舊路乃命猷督儀同劉道通陸騰等五人率衆開回車路鑿山堙谷五百餘里至於梁州北史崔猷傳陜西通志巻七十八
