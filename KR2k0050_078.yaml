姚興遣兵救魏至是亦至燕魏相持積旬趙王麟将慕輿嵩以垂為實死潜謀作亂奉麟為主事洩嵩等皆死寳麟等内自猜疑冬十月辛未燒舩夜遁十六國春秋郡按明一統志臨河縣名屬上隋改為延川縣天興元年夏四月關中羌來降鄜城屠各董羌杏城盧水郝奴各率其種内附魏書太祖紀太宗永興五年夏六月帝如五原六月西幸五原校獵于骨羅山獲獸十萬魏書太宗紀泰常二年冬十二月雍氐内附氐豪徐騃奴齊元子等擁部落三萬於雍遣使内附詔将軍王洛生及河内太守楊聲等西行以應之魏書太宗紀四年夏六月馮翊羌降馮翊羌酋黨道子遣使内屬魏書太宗紀冬十二月帝如薛林山校獵十二月西廵至于黄河從君子津西渡大狩于薛林山魏書太宗紀府按薛林山在今榆林北套内五年秋七月帝如五原七月丁酉西至於五原魏書太宗紀冬十二月杏城羌酋率衆來歸十有二月丁亥杏城羌酋狄温子率三千餘家内附魏書太宗紀七年秋九月帝如橋山九月辛酉幸橋山遣使者祠黄帝唐尭廟魏書太宗紀太武帝始光三年夏赫連昌承光二年夏六月帝如五原校獵六月幸雲中西至五原田於隂山魏書太武帝紀冬十月帝西廵伐赫連昌十一月入統萬城十月丁巳車駕西伐臨君子津㑹天暴寒數日氷結十有一月戊寅帝率輕騎二萬襲赫連昌壬午至其城下魏書太武帝紀世祖聞屈孑死諸子相攻關中大亂於是西伐以輕騎一萬八千濟河襲昌時冬至之日昌方宴饗王師奄到上下驚擾車駕次於黒水今懐逺縣去城三十里昌乃出戰世祖馳擊之昌退走入城未及閉門軍士乘勝入其西宫焚其西門夜宿城北明日分軍四出畧居民殺獲數萬徙萬餘家而還魏書屈孑昌傳十二月遣兵取長安魏師乗勝長驅遂入三輔夏主之弟助興自長安奔安定十二月魏司空奚斤入長安秦雍氐羌皆降氐王楊元聞之亦遣使内附四年夏承光二年春正月夏遣兵向長安赫連昌遣其弟平原公定率衆二萬向長安帝聞之乃遣就隂山伐木大造攻具三月丙子遣髙凉王禮鎮長安魏書太武帝紀夏六月帝西伐及赫連昌戰於統萬昌敗走遂取其城昌遣弟定與司空奚斤相持於長安世祖乘虚西伐濟君子津輕騎三萬倍道兼行羣臣咸諫曰統萬城堅非十日可㧞今輕軍赴之進不可克退無所資不若歩軍攻具一時俱往世祖曰夫用兵之術攻城最下不得已而用之如其攻具一時俱徃賊必懼而堅守若攻不時㧞則食盡兵疲外無所掠非上䇿也朕以輕騎至其城下彼先聞有歩軍而徒見騎至必當心閒朕且羸師以誘之若得一戰擒之必矣所以然者軍士去家二千里復有黄河之難所謂置之死地而後生也遂行次於黒水分軍伏於深谷而以少衆至其城下昌将狄子玉來降說昌使人追其弟定定曰城既堅峻未可攻㧞待擒斤然後徐往内外擊之何有不濟世祖惡之退軍城北示昌以弱遣永昌王健及娥清等分騎五千西掠居民會軍士負罪亡入昌城言官軍糧盡歩兵未至擊之為便昌信其言引衆出城世祖收軍偽北引而疲之昌以為退鼓譟而前行五六里世祖衝之賊陣不動稍復前行乃分騎為左右以掎之世祖墜馬賊已逼接世祖騰馬刺殺其尚書斛黎又殺賊騎十餘人流矢中掌奮擊不輟昌軍大潰不及入城奔於上邽遂克其城魏書屈孑昌傳神䴥元年夏赫連定勝光元年春二月髙凉王禮棄長安走夏取長安赫連定據平涼僣即皇帝位魏宜城王奚斤追定於平凉定分兵邀擊魏兵大潰斤為定所執丘堆守輜重在安定聞奚斤敗棄輜重奔長安尋與髙凉王禮棄長安偕奔蒲坂定復取長安十六國春秋秋上郡上洛夷來附八月上郡休屠胡酋金崖率部内屬九月上洛巴渠泉午觸等萬餘家内附魏書太武帝紀冬閏十月上郡氐内附閏月上郡屠各隗詰率萬餘家内屬魏書太武帝紀三年夏勝光三年秋九月夏遣兵冦鄜城九月己丑赫連定遣弟謂以代冦鄜城平西将軍始平公隗歸等率諸軍討之擒賊将王卑殺萬餘人謂以代遁走魏書太武帝紀冬十二月關中平魏克平凉夏長安臨晉武功守将皆走關中悉入於魏以鎮西将軍王斤鎮長安通鑑延和二年夏六月築長安小城六月辛巳詔樂安王範發雍秦兵萬人築小城於長安城内魏書太武帝紀三年秋七月命諸軍討山胡於西河七月壬午行幸美稷命諸軍討山胡白龍於西河九月戊子克之斬白龍及其将帥屠其城冬十月破白龍餘黨於五原魏書太武帝紀太平真君元年春二月浚昆明池二月己巳發長安五千人浚昆明池魏書太武帝紀三年閏四月宋人入南秦楊難當敗走劉義隆龍驤将軍裴方明梁州刺史劉康祖冦南秦南秦王楊難當敗奔於上邽七月詔安西将軍古弼督隴右諸軍及殿中虎賁與武都王楊保宗等從祁山南入征西将軍皮豹子與琅琊王司馬楚之等督關中諸軍從散關西入俱會仇池邀方明歸路魏書太武帝紀治按魏南秦州褒城六年春三月酒泉公郝温反於杏城伏誅酒泉公郝温反於杏城殺守将王幡縣吏蓋鮮率宗族討温温棄城走自殺家屬伏誅魏書太武帝紀秋九月盧水胡葢吳據杏城反冬遣将討破之九月盧水胡葢吳聚衆反於杏城冬十月戊子長安鎮副将元紇率衆討之為吳所殺呉黨遂盛民皆渡渭奔南山於是詔發髙平勅勒騎赴長安詔将軍叔孫技乘傳領攝並秦雍兵屯渭北十一月葢吳遣其部落帥白廣平西掠新平殺汧城守将呉遂進軍李閏堡分兵掠臨晉巴東将軍章直與戰大敗之兵溺死於河者三萬餘人吳又遣兵西掠至長安将軍叔孫技與戰於渭北大破之斬首三萬餘級河東蜀薛永宗聚黨西通葢吳受其位號吳自號天臺王署置百官魏書太武帝紀七年春正月帝自将討葢吳臨洛水吳退走北山世祖西廵車駕濟河前驅告賊在渭北帝至雒水橋賊已夜遁詔問浩曰葢吳在長安北九十里渭北地空榖草不偹欲渡渭南西行何如浩對曰葢吳營去此六十里賊魁所在擊虵之法當先破頭頭破則尾豈能復動宜乘勢先擊吳今軍往一日便到平吳之後廻向長安亦一日而至一日之内未便損傷愚謂宜從北道若從南道則葢吳徐入北山卒未可平世祖不從乃渡渭南吳聞世祖至盡散入北山果如浩言軍無所尅世祖悔之魏書崔浩傳二月帝如長安二月丙戍幸長安丁亥幸昆明池丙申幸盩厔誅叛民耿青孫温二壘與葢吳通謀者軍次陳倉誅散關氐害守将者還幸雍城田於岐山之陽魏書太武帝紀三月誅長安沙門魏帝至長安入佛寺沙門飲從官酒入其室見大有兵器出以白魏帝帝曰此非沙門所用必與葢吳通謀欲為亂耳命有司案誅闔寺沙門閱其財産大得釀具及窟室多婦女崔浩因說魏帝悉誅境内沙門焚毁經像從之通鑑秋八月長安鎮将陸俟討葢吳斬之世祖以陸俟都督秦雍二州諸軍事平西将軍長安鎮都大将與髙梁王那擊葢吳於杏城大破之獲吳二叔諸将欲送京師俟獨不許曰夫長安一都險絶之土民多剛强𩔖乃非一清平之時仍多叛動今雖良民猶以為愳况其黨與乎若不斬吳恐長安之變未已吳一身藏竄非其親信誰能獲之若停十萬之衆以追一人非上䇿也不如私許吳叔免其妻子使自追吳擒之必也諸将咸曰今來討賊既破之獲其二叔惟吳一人何所復至俟曰吳之悖逆本自天性今若獲免必誑惑愚民稱王者不死妄相扇動為患必大諸君不見毒蛇乎不斷其頭猶能為害况除腹心之疾而曰必遺其𩔖其可乎諸将曰公言是也遂遣吳二叔與之期及期吳叔不至諸将各咎於俟俟曰此未得其便耳必不背也後數日果斬吳以至魏書陸俟傳文成帝和平三年夏六月雍州氐反討平之六月庚申詔将軍陸真討雍州叛氐仇傉檀等平之魏書文成帝紀魏帝命長安鎮将陸真城長蛇鎮氐豪仇傉檀反真討平之卒城而還通鑑咸陽郡民作亂遣使慰安之咸陽郡民趙昌聚衆作亂百姓騷動詔靈符宣㫖慰民民乃復業魏書張靈符傳獻文帝皇興元年春正月長安鎮将元道符反伏誅四月以李惠鎮長安正月庚子東平王道符謀反於長安殺副将駙馬都尉萬古真鉅鹿公李恢雍州刺史魚元明丙午詔司空平昌公和其奴東陽公元丕等討道符丁未道符司馬段太陽攻道符斬之傳首京師道符兄弟皆伏誅魏書獻文帝紀孝文帝延興二年春正月統萬鎮民作亂討平之正月乙卯統萬鎮胡民相率北叛詔寧南将軍交阯公韓㧞等追滅之魏書孝文帝紀冬十月蠕蠕冦五原蠕蠕犯塞及於五原魏書孝文帝紀太和四年春正月雍州氐反討誅之雍州氐齊男王反殺美陽令州郡捕斬之魏書孝文帝紀秋八月齊遣兵攻武興不克蕭道成梁州刺史崔慧景遣長史裴叔保率衆攻武興關城氐帥楊䑕擊破之叔保還南鄭魏書孝文帝紀十七年九月關中民作亂討平之北地民支酉聚衆數千起兵於長安北遣使告齊梁州刺史隂智伯智伯遣兵數千應之秦雍七州民皆響震衆至十萬各守壁堡以待齊師魏河南王幹及穆亮與戰皆不利支酉進至長安盧淵薛引等拒擊大破之降者數萬口淵唯誅首惡餘悉不問獲酉斬之通鑑二十一年夏四月帝如長安四月辛未行幸長安親見髙年問所疾苦戊寅幸未央殿阿房宫及昆明池丙戍遣使者以太牢祀漢帝諸陵五月壬辰遣使者以太牢祭周文王於豐祭武王於鎬癸卯遣使祭華嶽六月庚申車駕至自長安魏書孝文帝紀宣武帝景明元年齊東昏侯永元二年武興氐楊集始來降椿為寧朔将軍梁州刺史初武興王楊集始為楊靈珍所破降於蕭鸞至是率賊萬餘自漢中而北規復舊土椿領歩騎五千出頓下辯貽書集始開以利害集始執書對使者曰楊使君此書除我心腹之疾遂領其部曲千餘人來降魏書楊椿傳正始二年梁武帝天監四年春正月梁漢中太守夏侯道遷以郡來降遣将軍邢巒入漢中遂取梁州初梁夏侯道遷從裴叔業鎮壽陽與叔業有隙單騎奔魏魏王肅使守合肥肅卒奔梁梁以為漢中太守復叛降魏魏邢巒為鎮西将軍将兵赴之巒至漢中所向摧破魏以巒為梁秦二州刺史梁州十四郡地東西七百里南北千里皆入於魏綱目楊集始死子紹先立紹先年幼委事二叔集起集義夏侯道遷以漢中歸順也蕭衍白馬戍主尹天保率衆圍之道遷求援於集起集義二人貪保邉藩不欲救之唯集始弟集朗心願立功率衆破天保全漢川集朗之力也魏書氐傳冬十月武興氐楊紹先反遣兵討之集義見梁益既定恐武興不得乆為外藩遂扇動諸氐推紹先僣稱大號集起集義並稱王外引蕭衍為援魏書氐傳三年春正月邢巒討武興氐滅之楊集義攻圍魏關城鑑注即陽平關城也邢巒遣䜿眼討之集義衆逆戰頻破走之乗勝追北克武興魏書傅監眼傳邢巒遣建武将軍傅䜿眼攻武興尅之執紹先送於京師遂滅其國以為武興鎮復改鎮為東益州其後紹先奔還武興復自立為王氐傳秋九月南鄭鎮将趙遐擊梁兵大破之趙遐以左将軍督巴東諸軍事鎮南鄭時蕭衍冠軍将軍軍主姜脩衆二萬屯羊口輔國将軍姜白龍據南城龍驤将軍泉建率土民北入桑坯姜脩又分軍據興勢司州刺史王僧炳頓南安並扇動夷獠規翻南鄭遐率甲士九千所在衝擊數百里之中莫不摧靡前後斬首五千餘級魏書趙遐傳延昌四年夏四月破氐於沮水正月孝明帝即位夏四月梁州刺史薛懐吉破反氐於沮水五月甲寅南秦州刺史崔暹擊破氐賊解武興圍魏書孝明帝紀孝明帝熙平元年夏四月梁圍武興将軍傅䜿眼擊敗之梁張齊圍武興法僧嬰城自守境内皆叛遣使告急於魏魏以傅䜿眼為益州刺史赴之䜿眼入境轉戰三日行二百里九遇皆㨗民獠皆喜迎拜於路者相繼綱目正光二年春