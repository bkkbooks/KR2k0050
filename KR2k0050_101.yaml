body:
  text: 後序皇上御極之六年纂修一統志總裁官請敕直省督撫增修志書各將本省名宦鄉賢孝子節婦一應事實詳細查核尅期一年保送到館皇上睿思𢎞逺恐時日太促草率從事特命寬其期限務期考據詳明托採精當無闕無濫以成完善之書聖天子至公至當循名核實之心何詳慎也秦於域中為形勝之地沃野千里名山大川土宜物産甲於他省又自周以來名卿碩輔賢人君子比肩接迹指不勝屈當此重熙纍洽化行俗美之時其砥節礪行確有徴據足以感人心而維風化所當發潛德之幽光者應更不可勝數若使淹沒無聞或冒濫失實誰職其咎司其事者可不慎歟臣於雍正七年奉命到蘭所過西鳳邠乾諸屬凡遇山川人物兵屯馬驛諸政靡不究心思欲有所發明或可為修志一助秦中幅􅊷遼濶足迹所至十未歷一又車塵馬足見聞不廣終亦無所禆補雍正十年恭膺簡命署理督篆兼經紀西師移駐酒泉不獲親與較讐之事惟有仰體聖天子詳慎之意叮嚀告誡使司其事者務出於公當而已十三年春志書告成臣詳加披閲為星野為建置為疆域為山川為城池為公署為關梁為封爵為職官為貢賦為學校為祠祀為選舉為兵防為驛傳為屯運為水利為鹽法為茶馬為物産為風俗為祥異為帝系為名宦為人物為陵墓為古迹為經籍為紀事為德音為藝文為拾遺為卷有百為類三十有二按其凡例考其紀載雖未敢信為完善之書而所謂詳且慎者或庶乎其有合也夫山川土田貢賦物産以及兵屯驛鹽茶馬諸政俱有定制獨至聖明之世百物繁昌諸政興舉無不超軼前代而况德政之所涵濡教化之所興起唯願官兹土者人人勉為循吏生兹土者人人勉為善良父子勉為孝慈夫婦勉為節義生聚日益繁土田日益闢才俊日益升風俗日益厚淳朴渾穆比戶可封庶幾仰副聖天子陶成樂育之心而成一道同風之盛也是則臣之所厚望也夫峕雍正十三年二月初一日賜進士出身光祿大夫吏部尚書署理陜西總督印務并辦理軍需事件臣劉於義謹序
