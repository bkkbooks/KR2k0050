body:
  text: 陜西通志卷八十紀事第五唐德宗建中元年夏六月築奉天城術士桑道茂待詔翰林上言國家不出三年有厄會奉天有王氣宜髙垣堞為王者居使可容萬乘者德宗素驗其術詔京兆尹嚴郢發衆數千及神策兵城之時當盛夏趨功人莫知其故及朱泚反帝蒙難奉天賴以濟白孔六帖二年春二月帝御望春樓勞師田悅加兵河上河南大擾詔移京西戎兵萬二千人備關東帝御望春樓親誓師以遣之及賜宴諸將列坐酒至神策將士皆不飲帝使問之惠元時為都將對曰臣初發奉天軍帥張巨濟與臣等約曰斯役也將策大勳建大名凱旋之日當共為歡茍未捷無以飲酒故臣等不敢違約上稱歎久之降璽書慰勞舊唐書陽惠元傳四年冬十月涇原節度使姚令言犯京師帝如奉天姚令言為涇原節度使李希烈叛圍襄城甚急十月詔令言率本鎮兵五萬赴援涇士多攜子弟而來望京師獲厚賞及師上路一無所賜時詔京兆尹王翊犒軍士惟糲食菜餤而已軍士覆而不顧曰吾輩將死於難而食且不飽安能以草命捍白刃耶國家瓊林大盈寶貨堆積不取此以自活何往耶行至滻水乃返戈大呼鼓譟而還以戈環令言令言急奏之上恐令內庫出繒綵二十車馳賜之軍聲浩浩令言不能戢街市居人狼狽走竄亂兵呼曰勿走不稅汝間架矣德宗令普王與學士薑公輔往撫勞之才出內門賊已斬關陳於丹鳳樓下是日德宗倉卒出幸賊縱入府庫輦運極力而止舊唐書姚令言傳上與太子諸王公主自苑北門出王貴妃以傳國寶繫衣中宦官竇文場霍仙鳴帥宦官左右僅百人以從薑公輔扣馬言曰朱泚嘗為涇帥坐弟滔之故廢處京師心常怏怏亂兵若奉以為主則難制矣請召使從行上曰無及矣遂行夜至咸陽飯數匕而過羣臣皆不知乘輿所之白志貞王翊陸贄等追及上於咸陽上思桑道茂之言幸奉天金吾大將軍渾瑊至衆心恃之稍安通鑑德宗幸奉天郭曙方領家兵獵苑北聞蹕至伏謁道左遂從乘輿入駱谷白孔六帖德宗將幸奉天自攜火精劒出內殿因歎曰千萬年社稷豈為狗鼠所竊耶遂以劒斫楹上鐵狻猊應手而碎左右皆呼萬嵗及乘輿遇夜侍從皆見上仗數尺光明即火精劒也杜陽雜編德宗欲西幸有知星者奏云逢林即住帝曰豈欲令朕止於林木間薑公輔曰不然但地亦應乃奉天尉賈隱林謁帝於行在帝觀隱林氣色雄傑兼是忠烈之家而名叶星者所奏帝因召於卧內以探籌略之淺深隱林於御榻前以手板畫地陳攻守之策帝甚異之隱林奏曰臣昨夢日墮於地臣以頭戴日上天帝曰朕此來也乃已前定遂拜隱林為侍御史糾劾行在神異鏦朱泚據長安時太尉朱泚罷鎮居晉昌里第是夜叛卒謀曰朱太尉久囚於宅若迎為主大事濟矣泚嘗節制涇州衆知其失權廢居怏怏又幸泚寬和乃請令言率騎迎泚於晉昌里泚初遲疑以食飼之徐觀衆言既而諸校齊至乃自第張炬火入居含元殿舊唐書姚令言傳朱泚反以秀實失兵必恨憤且素有人望使騎往迎秀實與子弟訣而入泚喜曰公來吾事成矣秀實曰將士東征宴賜不豐有司過耳人主何與知公本以忠義聞天下今變起倉卒當諭衆以禍福掃清宫室迎乘輿公之職也泚默然秀實知不可乃陽與合唐書段秀實傳朱泚擁徒居白華殿或教以迎天子泚顧望愕然光祿卿源休至請間教以不臣詭稱符命泚悅張光晟李忠臣皆新失職怨望亦勸成之朱泚傳泚反盧把白志貞皆謂泚有功不宜首難得大臣一人持節慰曉惡且悛德宗顧左右無敢行漵曰陛下不以臣亡能願至賊中諭天子至意帝大悅漵退謂人曰吾知死無益而決見賊者人臣食祿死其難所也方危時安得自計即日齎詔見泚泚業僣逆故留漵客省不遣卒被害吳漵傳司農卿段秀實謀誅朱泚不克死之秀實隂結將軍劉海賔姚令言都虞候何明禮欲圖泚會源休教泚偽迎天子遣將韓旻領鋭師三千疾馳奉天秀實以為宗社之危不容喘遣人諭大吏岐靈嶽竊取令言印不獲乃倒用司農印追其兵旻至駱繹得符還秀實謂海賔曰旻之來吾等無遺類我當直搏殺賊不然則死乃約事急為繼而令明禮應於外翌日泚召秀實計事源休姚令言李忠臣李子平皆在座秀實戎服與休並話至僣位勃然起奪其象笏奮而前唾泚面大罵曰狂賊可磔萬段我豈從汝反邪遂擊之中顙流血衊面匍匐走賊衆未敢動而海賔等無至者秀實大呼曰我不同反胡不殺我遂遇害海賔明禮靈嶽皆繼為賊害帝在奉天恨用秀實不極才垂涕悔悵唐書段秀實傳朱泚遣使出潼關徵兵關將元光誅之李夷簡為鄭縣丞遇朱泚僣逼德宗避難於奉天泚初揚言將迎車駕逆順未辨俄而遣使速出潼關行至華州郵吏李翼縱之不問夷簡謂翼曰朱泚必有異謀前發豳隴兵五千救援襄城皆泚之部曲也今所遣使是必遣往襄城耳上越在外未有防虞若五千之兵倍道兼行不數日而至助泚為逆其為禍也非細不如徑追其使若果挾徵兵之符便宜戮之翼馳往潼關及之鞫驗果有泚符實追襄城之兵也翼言於關將元光光立斬泚使收其符遣使間道獻於行在遂以元光為華州刺史元光不舉翼之功罕知者册府元龜鳳翔衙將李楚琳叛殺其節度使張鎰以應朱泚張鎰為鳳翔節度帝幸奉天鎰罄家資將自獻行在而營將李楚琳者嘗事朱泚得其心軍司馬齊映等謀曰楚琳必為亂乃遣屯隴州楚琳知之稽故未行鎰以帝在外心憂惑謂已亟去不為備楚琳夜率其黨王玢李卓牛僧伽等作亂鎰縋城走不及逺與二子皆為候騎所執楚琳殺之唐書張鎰傳映為行軍司馬德宗出奉天鎰儒緩不知兵部將李楚琳素剽悍欲介賊為亂映與齊抗請先事誅之鎰不用更示寬大徐謂楚琳曰欲以君使外若何楚琳恐夜殺鎰以應賊映雅為軍中慕賴故得免奔奉天授御史中丞齊映傳建中四年帝避難遷於奉天以城隘不可久議幸鳳翔且依張鎰户部尚書蕭復聞之遽請見曰竊聞移幸鳳翔未審虛實帝曰有之復曰陛下大誤鳳翔將士皆朱泚舊兵今泚悖逆此中必有同惡相濟者臣尚慮張鎰不能久奈何擬幸鳳翔帝曰朕行計已決試為卿駐駕一日屬鳯翔後營將李楚琳殺張鎰自為節度使乃止册府元龜朱泚僣號於長安泚大陳旗章金石於廷傳言立宗室王監國士庶競往觀泚僣即皇帝位於宣政殿號大秦建元應天侍衛皆卒伍諸臣在位者才十餘逼太常卿樊系為册册成仰藥死唐書朱泚傳朱泚僣位長安既據府庫之富不愛金帛以悅將士公卿家屬在城者皆給月俸神策及六軍從車駕及哥舒曜李晟者皆給其衣糧加以繕完器械日費甚廣及長安平府庫尚有餘蓄見者皆追怨有司之橫斂焉文獻通考涇原留後馮河清發甲兵輸奉天姚令言討關東以河清知留後幕府侍御史姚况領州而行師過闕有急變德宗走奉天河清况聞問召諸將計事東向哭相厲以忠義衆義其為無敢異言即發儲鎧完仗百餘乘獻行在初帝之出六軍倉卒無良兵士氣沮及河清輸械至被堅勒兵軍聲大振拜河清涇原節度使唐書馮河清傳李觀為右龍武將軍領兵千餘扈德宗奉天詔盡察諸軍整飭誰邏增募五千人鼙旝歡豎士氣益振李觀傳李懷光率衆赴長安帝狩奉天懷光率所部奔命方雨淖奮厲軍士倍道進自蒲津絶河敗泚軍於醴泉唐書李懷光傳崔縱為運使德宗出奉天方鎮兵未至縱勸李懷光奔命悉軍財稱所須懷光兵疲久戰次河中遷延不進縱以金帛先渡曰濟者即賜衆趨利爭西崔縱傳朱泚犯奉天留後韓遊瓌及都虞候渾瑊拒之韓遊瓌為邠寧節度留後奉天之狩遊瓌與慶州刺史論惟明以兵三千來赴自乾陵北趨醴泉未至有詔引兵屯便橋次泥泉與泚兵值遊瓌欲還奉天監軍翟文秀曰吾壁於此賊敢踰我而西夾攻取之今入奉天賊亦隨至是引賊迫天子也遊瓌曰我寡賊衆彼分以亢我猶能鼓而西也不如先入衛天子且奉天無強卒安得夾攻遂還奉天泚兵攝攻之戰不利泚兵奪門遊瓌殊死戰乃解泚大治戰棚雲橋士皆懼遊瓌曰賊取佛祠乾木為攻具可以火之唐書韓遊瓌傳渾瑊為都虞候帝狩奉天瑊率家人子弟以從授京畿渭北節度使朱泚兵薄城戰譙門晨至日中不解或以芻車至瑊曵車塞門焚以戰賊乃解渾瑊傳泚自是日來攻城瑊遊瓌晝夜力戰豳州兵救襄城者聞泚反突入潼關歸泚於奉天普潤戍卒亦歸之有衆數萬通鑑將軍吕希倩髙重傑戰死賊三面攻奉天渾瑊力戰禦之方退大將吕希倩死之賊自丁未攻城至己巳二十餘日矢石不絶舊唐書德宗本紀帝使髙重傑屯梁山禦賊賊將李日月殺之帝拊尸哭盡哀結蒲為首以葬泚得首亦哭曰忠臣也用三品葬焉日月鋭甚自謂無前乃燒陵廟鹵御物帝患之渾瑊伏兵漠谷引數千騎跳攻長安泚大警踣榻前瑊引却日月尾追遇伏鬬射日月殺之泚悵恨其母不哭罵曰奚奴天子負爾何事死且晚唐書朱泚傳城按鑑注梁山在奉天北五里乾陵在焉將軍劉德信破賊衆於見子陵進軍東渭橋汝鄭應援使劉德信將子弟軍在汝州通鑑注云是年募嘗為節度等使子弟從軍使劉德信將之救襄城聞難引兵入援與泚衆戰於見子陵破之以東渭橋有轉輸積粟進屯東渭橋通鑑按鑑注漢薄太后陵近文帝陵俗呼為見子陵十一月隴州戍將叛歸朱泚行營留事韋臯討誅之初泚鎮鳳翔既歸節而留兵五百戍隴上以部將牛雲光督之至是雲光謀請臯為帥將劫以臣泚别將翟煜伺知以白臯雲光懼不克率衆出奔汧陽遇泚奴使臯所謂雲光曰太尉已為天子使我以御史中丞授臯若聽固吾人也不受遂可誅之請以兵俱許之臯迎勞先納奴偽受泚詔即讓雲光曰既去而復何也對曰向未知公之命故去今還願與公同生死臯曰大使茍無他圖請釋甲安衆而後可入雲光以臯諸生無能為乃命士委仗鎧臯受而納其卒明日置酒大會奴雲光與其卒至臯伏兵殺之以其首徇泚復使他奴拜臯鳳翔節度使臯亦斬之唐書韋臯傳官軍及賊戰於漠谷敗績建中四年十月在奉天靈武留後杜希全鹽州刺史戴休顔夏州刺史時嘗春合率兵六千赴難將至帝召宰相盧把關播與白志貞渾瑊同議來路利害把與志貞以漠谷路為便瑊曰漠谷險隘必為賊所邀若取乾陵北適附柏城守固而行便取城東北雞子堆下與城中掎角相應且分賊勢朱泚必不敢更於陵寢往來杞曰漠谷路近若慮逆賊邀擊即此出兵應接更取乾陵路過恐驚陵寢瑊曰今朱泚圍城斬伐松柏以夜繼日驚動多矣况又城中事危諸道救兵不至唯希全等率兵赴難所繫不輕若此軍得於雞子堆下營固守善地則朱泚可以計破杞曰陛下以順討逆豈同逆賊乎若令希全等北來即是自驚陵寢白志貞復贊其言帝重違之遂命取漠谷路丙子希全等軍至漠谷果為逆賊邀擊乘髙以大弩巨石左右連擊殺傷頗甚册府元龜天按鑑注漠谷在奉城西北李晟尚可孤入援帝出奉天有詔召晟拜神策行營節度使進臨渭北壁東渭橋唐書李晟傳晟聞上幸奉天引兵出飛狐道晝夜兼行自蒲津濟軍於東渭橋有卒四千晟善於撫御與士卒同甘苦人樂從之旬月間至萬餘人神策兵馬使尚可孤將三千人在襄陽自武關入援軍於七盤七盤即古繞霤之險敗泚將仇敬忠遂取藍田通鑑潼關守將李元諒克華州李元諒為太子詹事李懷讓節度鎮國署奏以自副德宗出奉天賊遣將何望之襲華州刺史董晉棄城走望之欲聚兵以絶東道元諒自潼關引兵徑薄其城拔之時兵興倉卒裹罽為鎧剡蒿為矢募兵數日至萬餘軍氣乃振時尚可孤守藍田元諒屯昭應王權壁中渭橋賊兵不能逾渭南唐書李元諒傳馬燧遣兵赴長安燧遣軍司馬王權以兵五千走奉天又遣子彚與諸將子壁中渭橋唐書馬燧傳渾瑊擊泚破走之奉天圍解泚治攻具矢石四集如雨晝夜不息凡浹日鑿塹圜城城中死者可藉人心危惴或夜縋出掇蔬本供御帝與瑊相泣泚方據乾陵下瞰城翠翟紅袍左右宦人趨走宴賜拜舞又縱慢辭戲斥天子以為勝在景刻使騎環馳責大臣不識天命造雲梁廣數十丈施大輪濡氈及革冒之周布水囊為鄣指城東北構水廬蒙革周置之運薪土其下將塞隍帝召瑊授以詔書千餘自御史大夫實封五百户而下募突將死士當賊賜瑊筆使量功署詔不足則署衣以授因曰朕與公訣矣令馬承倩往有急可奏瑊俯伏嗚咽帝撫而遣之瑊前與防城使侯仲莊揣雲梁所道掘大隧積馬矢及薪然之賊乘風推梁以進載數千人王師乘城者皆凍餒甲敝兵鈍瑊但以忠義感率使當賊人憂不支羣臣號天以禱瑊中矢自揠去被血而戰愈厲雲梁及隧而陷風返悉焚賊皆死舉城歡譟是日詔授瑊二子官乃第賞將校泚攻城益急會李懷光奔難賊乃去唐書渾瑊傳李懷光將抵奉天前遣禆將張韶以蠟韜表隨賊攻城叩壘呼曰我朔方使也縋而上比登身被數十矢時帝被圍急聞之喜即持韶大號城上人心乃安又敗賊於魯店解圍去李懷光傳幸順天時順宗為太子倉卒間嘗親執弓矢率禁軍先後導衛備嘗辛苦及賊來攻奉天城中危迫人人恂栗不自保帝朝夕自巡城傳宣慰勞督勵戰士其有用命及死事者登時與入陳奏隨加賞贈故戰士無不感激奮發氣益百倍册府元龜李懷光至奉天詔引軍還取長安李懷光來赴難數與人言盧杞趙贊白志貞之姦佞且曰吾見上當請誅之把聞之懼言於上曰懷光勳業賊徒破膽若使之乘勝取長安此破竹之勢也今聽入朝留連纍日使賊得成備恐難圖矣上以為然詔懷光直引軍屯便橋與李建徽李晟陽惠元共取長安懷光自以數千里赴難咫尺不得見天子意殊怏怏曰吾今已為姦臣所排遂引兵行綱目興元元年春二月詔李晟引兵會李懷光於咸陽李晟壁東渭橋劉德信自扈澗敗歸軍囂無制德信入謁晟晟責所以敗斬之以數騎入壁勞其軍無敢動晟已并兵軍益振李懷光軍咸陽不欲晟當一面請與晟合有詔徙屯乃引趨陳濤斜與懷光聨壘晟每與賊戰必錦裘繡帽自表指顧陳前懷光望見惡之戒曰將務持重豈宜自表襮為賊餌哉晟曰昔在涇原士頗相畏欲令見之奪其心爾晟説懷光進兵懷光不納每兵至都城下懷光軍多虜掠晟軍整戢懷光使分所獲遺之又辭不敢受唐書李晟傳李懷光屯咸陽李晟會陳濤斜壁壘未具賊大至晟説懷光曰賊保宫苑攻之良難今敢離窟穴與公薄戰此天以賊賜公也懷光曰吾馬未秣士未飯可遽戰哉晟不得已閉壁不出李懷光傳李晟還軍東渭橋晟説懷光進兵不納懷光謀沮撓其軍即奏言神策兵給賜比方鎮獨厚今桀逆未平軍不可以異且衆以為言臣無以解惟陛下裁處懷光欲晟自削其軍則士怨易撓晟曰公元帥軍政得專之晟將一軍惟所命懷光默然乃止懷光屯咸陽凡八旬帝數促戰以伺賊隙為言卒不出兵隂通朱泚反亦寢露晟懼為所并上言當先變制備未報會帝議幸咸陽督戰懷光大駭疑帝奪其軍圖反益急晟與李建徽陽惠元皆聨屯適有使者到晟軍晟乃令曰有詔徙屯即結陳趨東渭橋後數日懷光并建徽惠元兵惠元死之唐書李晟傳陸贄為翰林學士李懷光異志已萌欲激怒諸軍表論諸軍衣糧薄神策衣糧厚意在撓沮李晟密奏恐其有變帝憂之遣贄使懷光宣諭使還贄奏事曰賊泚勢窮援絶引日偷生懷光總仗順之軍乘制勝之氣鼓行芟翦易若摧枯乃諸帥每欲進取懷光輒沮其謀據兹事情殊不可解陛下意在全護委曲聽從觀其所為亦未知感若不别為規略漸相制持終恐變故難測今李晟奏請移軍適遇臣銜命宣諭懷光懷光大自矜誇已肆輕言不可中變伏望以李晟表出付中書敕下依奏别賜懷光手詔示以移軍事雖蓄異端何繇起怨臣初奉使諭旨本緣糧料不均偶屬移軍事相諧會幸懷光詭對且無阻絶之言機宜合并若有幽贊一失其便後何可追幸垂裁察德宗初望懷光回意破賊故晟纍奏移軍不許及贄纍陳懷光反狀乃可晟之奏遂移軍渭橋而鄜坊節度李建徽神策行營陽惠元猶在咸陽贄慮懷光并建徽等軍又奏曰懷光當管師徒足以獨制凶冦逗留未進抑有他繇所患太強不資傍助比者李晟請移軍就東建徽惠元勢轉孤弱為其吞噬理在必然今因李晟願行便遣合軍同往託言晟兵素少慮為賊所邀藉此兩軍迭為掎角仍先諭旨密使促裝詔書至營即日進路懷光意雖不欲然亦計無所施是謂先人有奪人之心疾雷不及掩耳德宗曰卿所料極善然李晟移軍懷光必已惆悵若遣建徽惠元就東則足得為辭且俟旬時晟至東渭橋不旬日懷光果得兩節度兵建徽單騎遁而獲免惠元中路被執害之報至行在人情大恐翌日移幸山南册府元龜李懷光城咸陽移軍據之李晟以為懷光反狀已明緩急宜有備詔加懷光太尉賜鐵券遣使諭旨懷光對使者投鐵券於地曰人臣反賜鐵券懷光不反今賜鐵券是使之反也辭氣甚悖左兵馬使張名振當軍門大呼曰太尉視賊不擊待天使不敬果欲反邪懷光曰我不反欲蓄鋭以候時耳懷光又發卒城咸陽移軍據之名振曰乃者言不反今不攻長安殺朱泚取富貴而拔軍此來何邪懷光殺之懷光潛與朱泚通謀其養子石演芬遣客詣行在告之事覺懷光召演芬責之曰我以爾為子奈何負我死甘心乎演芬曰天子以太尉為股肱太尉以演芬為心腹太尉既負天子演芬安得不負太尉乎茍免賊名而死死甘心矣懷光使左右臠食之皆曰義士也以刀斷其喉而去綱目梁州迎駕使張用誠叛牙將馬勛擒殺之德宗欲幸梁洋嚴振遣兵五千至盩厔以俟南幸其將張用誠隂謀叛背輸欵於李懷光朝廷憂之會梁州將馬勛至上臨軒與之謀勛曰臣請計日至山南取節度符召之即不受召臣當斬其首以復命上喜曰幾日當至勛尅日時而奏上勉勞而遣之勛既得振符乃與壯士五十人偕行出駱谷用誠以為未知其叛以數百騎迓勛勛與俱之傳舍用誠左右森然勛曰天寒且休軍士左右皆退勛乃令人多焚其草以誘之軍士爭附火勛乃令人從容出懷中符示之曰大夫召君用誠惶駭起走壯士自背束其手而擒之不虞用誠之子居後引刀斫勛勛左右遽承其背刀不甚下微傷勛首遂格殺其子而仆用誠於地令壯士跨其腹以刃擬其喉曰聲則死之勛馳就其軍營士已被甲執兵勛大言曰汝等父母妻孥皆在梁州棄之從人反逆將欲滅汝族耶大夫使我取張用誠不問汝輩乃何為乎衆讋伏於是縛用誠遣送洋州振杖殺之拔其二使總其衆勛以藥自封其首來復命愆約半日談賔録李懷光反帝狩梁州二月甲子李懷光反丁卯如梁州懷光將孟廷保以兵來追左衛大將軍左仲莊敗之於驛店唐書德宗本紀時部將韓遊瓌將兵衛奉天懷光約令為變遊瓌以聞數日又密書趣之門者捕送又遣將趙升鸞諜於奉天升鸞告渾瑊曰懷光遣達奚承俊火乾陵使我為內應以脅乘輿瑊白發其姦請帝決幸梁州帝令瑊戒嚴未畢帝自西門出詔戴休顏守奉天懷光遣將孟廷寶惠靜夀孫福率輕騎趣南山糧料使張增遇之三人計曰吾屬以叛聞不如緩兵彼怒不過不吾將耳使增紿衆曰由此東吾有見糧可食也廷寶等引而東縱卒大掠百官遂入駱谷追帝不及還白懷光懷光怒悉罷其兵李懷光傳李懷光叛誘遊瓌為變遊瓌白發其書帝曰卿可謂忠義矣對曰臣安知忠義但懷光誣臣使震驚乘輿後持臣自解帝嘉其誠從問計欲安出對曰懷光總諸府兵怙以為亂今邠有張昕靈武有寧景璿河中有吕鳴嶽振武有杜從政潼關有李朝臣渭北有竇覦皆守將也陛下以其衆與地授之罷懷光權而尊以元功諸將仰首各聽其帥彼安能以亂帝曰罷懷光權而泚益張若何對曰陛下約士以不次之賞今貢賦方至發而酬之其守自固邠有萬精甲臣得將之可以誅賊四方仗義而起賊不足慮帝美其言會懷光誘復至渾瑊得書稍嚴卒以警遊瓌不知發怒嫚罵瑊帝疑有變即日幸梁州遊瓌使子從帝韓遊瓌傳三月兵馬使韓遊瓌率兵入邠州留後張昕叛討斬之懷光檄假遊瓌邠州刺史欲因張昕殺之遊瓌既失兵不知所圖有客劉南金説曰邠有留甲可以立功殆天假也遊瓌悟誘舊部兵八百馳入邠説昕曰懷光自蹈禍機公今可取富貴無共汚不義也我願以麾下為公先驅昕不聽遊瓌移疾不出隂結其將髙固等昕欲殺遊瓌戒左右𠂻甲入昕小吏李岌潛白遊瓌伏甲先起髙固等應之斬昕首以聞時懷光子玫在邠遊瓌衛出之曰殺之祗以怒敵至必遽不如捨之唐書韓遊瓌傳懷光遣使詣邠州令張昕悉發所留兵萬餘人及行營將士家屬會涇陽仍遣其將劉禮等將三千餘騎脅遷之遊瓌隂與諸將髙固楊懷賔等相結時崔漢衡以吐蕃兵營於邠南髙固曰昕以衆去則邠城空矣乃詐為渾瑊書詔吐蕃使稍逼邠城昕等懼不敢出昕謀殺諸將之不從者遊瓌知之先與髙固舉兵殺昕通鑑詔加李晟同平章事諸軍分屯討賊帝自行在遣晟將張少𢎞口詔進晟尚書左僕射同中書門下平章事晟受命拜且泣曰京師天下本若皆執羈靮誰將復之乃繕甲兵治陴隍以圖收復是時晟提孤軍橫當冦鋒恐二盜合以軋之則卑詞厚幣偽致誠於懷光者時厫廥單覂乃使張或假京兆少尹多署吏調畿內賦不淹旬芻米告具乃陳兵下令曰國家多難見危死節自吾之分公等此時不誅元凶取富貴非英豪也渭橋斷賊首尾吾欲與公戮力一心建不世之功可乎士皆雪泣曰惟公命於是駱元光以華州之衆守潼關尚可孤以神策兵保七盤皆受晟節度戴休顔舉奉天韓遊瓌悉邠寧軍從晟懷光始懼奔河中唐書李晟傳李懷光大掠涇陽等縣李懷光奪李建徽陽惠元等軍屯好畤然其下稍稍攜二泚始憚之至是遂欲臣懷光懷光怒告絶益不安乃引兵掠涇陽三原富平遂如河中唐書李懷光傳夏四月李懷光部將趙貴先來降建中初裴向為同州刺史李紓從事李懷光叛河中使其將趙貴先築壘於同州紓奔奉天向領州務詣貴先軍壘以順逆之理責之貴先感悟遂來降故同州不陷向由是知名册府元龜李懷光陷坊州渭北守將竇覦復之懷光使其將符嶠襲坊州據之渭北守將竇覦帥獵團七百圍之嶠請降詔以覦為渭北行軍司馬通鑑車駕次梁州三月庚寅車駕次城固壬申至梁州舊唐書德宗本紀德宗鑾駕之幸梁洋中書舍人齊映為之御下洋州青源川見旌旗蔽野上心方駭謂泚兵有諳疾路者透秦嶺而要焉俄見梁帥嚴震具櫜鞬拜御馬前具言君臣亂離嗚咽流涕上大喜敕令震上馬前去與朕作主人映身本短小聲氣抑揚乃曰嚴震合與至尊導馬御膳自有所司頃之上次洋州行在召映責以儒生不達時變煙塵時須姑息戎帥映伏奏曰山南士庶只知有嚴震不知有陛下今者天威親臨令巴蜀士民知天子之尊亦足以盡震為臣子之節上深嘉歎震聞特拜謝映時議許映乾􅍧子嚴震為山南西道節度觀察等使及朱泚竊據京城泚令腹心穆廷光宋瑗等齎帛書誘結震震集衆斬廷光等仍發兵出界至盩厔以東守禦賊竟不能為害車駕入駱谷且無驚擾帝匆遽行幸梁州山南地素貧褊又連遭山賊剽衄之後雖云十五州之地其實未敵江南三數縣户口震悉心供應人既不擾事亦不闕册府元龜陸贄為翰林學士從狩奉天恆居中參裁可否時號內相從幸梁州帝偶與相失夜召不得詔得贄者賞千金及來謁太子以下皆賀時機務填委書詔日數百他學士筆閣不得下贄沛然有餘吏承寫不給皆周盡事情人人可曉常勸帝痛自咎悔以謝天下庶叛者革心贄所行制書雖武夫悍卒無不感泣思奮嘉興府志夏四月渾瑊以吐蕃兵拔武功渾瑊遷奉天行營副元帥帝臨軒授鉞用漢拜韓信故事制曰冦賊干紀授爾節鉞以戢多難往欽哉瑊頓首曰敢不畢力以對揚天子休命乃率諸軍趨京師賊韓旻拒武功瑊率吐蕃論莽羅兵破之武亭川斬首萬級遂屯奉天以抗西面唐書渾瑊傳渾瑊率諸軍出斜谷崔漢衡勸吐蕃出兵助之尚結贊曰邠軍不出將襲我後韓遊瓌聞之遣其將曹子達將兵三千往會瑊軍吐蕃遣兵二萬從之李楚琳遣將石鍠將卒七百從瑊拔武功朱泚將韓旻攻武功鍠以其衆迎降瑊戰不利收兵登西原在武功縣西會曹子達以吐蕃至擊旻大破之於武亭川在武功縣南漆渭交合處斬首萬餘級旻僅以身免瑊遂引兵屯奉天與李晟東西相應以逼長安通鑑五月韓滉遣使貢獻至梁州韓滉為鎮海軍節度使帝狩梁州獻縑十萬匹請以鎮兵三萬助討賊有詔嘉勞唐書韓滉傳山南地熱上以軍士未有春服亦自御夾衣五月鹽鐵判官王紹以江淮繒帛來至上命先給將士然後御衫韓滉欲遣使獻綾羅四十擔詣行在幕僚何士幹請行滉喜曰君能相為行請今日過江士幹歸别家則家之薪米儲偫已羅門庭矣登舟則資裝器用已充舟中矣每擔夫與白金一版置腰間又運米百艘以餉李晟自負囊米置舟中將佐爭舉之須臾而畢艘置五弩手以為防援有冦則叩舷相警五百弩已彀矣比至渭橋盜不敢近時關中兵荒斗米五百及滉米至減五之四通鑑神策軍節度使尚可孤及賊戰於藍田西破之會師圍長安五月壬辰尚可孤破賊於藍田舊唐書德宗本紀尚可孤遷神策京畿渭南商州節度使仇敬復來寇可孤率兵擊擒敬斬之遂進軍與副元帥李晟決策攻討可孤之師為先鋒尚可孤傳副元帥李晟等收復京師朱泚敗走晟邏士得姚令言崔宣諜者晟命飯飲之遣還敕曰為我謝令言等善為賊守乃引兵叩都門賊不敢出振旅而還明日會諸將圖所向衆對先拔外城然後清宫晟曰外城有里閈之隘若設伏格戰居人囂潰非計也賊重甲精兵聚苑中今直擊之是披其心腹將圖走不暇諸將曰善乃自東渭橋移壁光泰門以薄都城連溝柵而賊將張庭芝李希倩求戰晟曰賊不出是吾憂也今乃冒死來天誘之矣勒吳銑等縱兵鏖擊賊攻華師急晟以精騎馳救中軍譟而從大破之乘勝入光泰門再戰賊却僵尸相藉餘衆走白華賊大哭終夜不息翌日將復戰或請待西師晟曰賊既敗當乘機撲殄茍俟西軍是容其為計豈吾利耶乃悉軍軍光泰門使王佖李演將騎史萬頃將步抵苑北晟先夜隤苑垣為道二百步比兵至賊已伐木塞以拒戰晟叱諸將曰安得縱賊今先斬公矣萬頃懼先登拔柵以入佖督騎繼之賊崩潰執其將假誠諫大兵分道進雷譟震地令言庭芝希倩等殊死鬬晟令唐良臣等步騎奔突賊陳成輒北十餘遇皆不勝蹙入白華賊伏千騎出官軍背晟以麾下百騎自馳之左右呼曰相公來賊驚潰禽馘略盡泚率殘卒萬人西走田子奇追之餘黨悉降晟引軍屯含元外庭令軍中曰五日內不得輒通家問違者斬遣京兆尹李齊運部長安萬年令分慰居人秋毫無所擾坊人之逺者宿昔乃知王師之入也明日孟涉屯白華尚可孤屯望仙門駱元光屯章敬寺晟屯安國寺斬賊用事者及臣賊宦豎於市表著節不屈者擇文武攝臺省官以俟乘輿露布至梁帝感泣唐書李晟傳始張光晟以精兵壁九曲距東渭橋十里密約降於晟晟之入光晟勸泚等出奔故泚挾令言庭芝休子平朱遂西走光晟衛出之因詣晟降朱泚傳王佖者晟之甥晟在師佖無不從攻朱泚於光泰門賊方鋭佖與李演鏖戰蹀血賊數北諸軍乘之遂大振王佖傳李晟破賊瑊與韓遊瓌戴休顔以西軍收咸陽進屯延秋門渾瑊傳戴休顔遷奉天行營節度使合渾瑊兵破泚偏師追至中渭橋京師平又與瑊率兵趨岐陽邀泚殘黨加檢校尚書右僕射戴休顔傳李晟收京師次滻西元諒先奮鏖賊敗之進屯苑東晟使壞苑垣入泚連戰皆北遂大潰京師平李元諒傳朱泚為晟等所敗走涇州晟遣衙前將兼御史大夫張少烈上收京師露布至百僚稱賀帝覽之感泣百官皆出涕稱萬嵗曰晟虔奉聖謨蕩滌凶惡古之樹勳力復都邑者往往有之至於不驚宗廟不易市肆長安人不識旌旗安堵如初三代以來未之有也帝笑曰天生李晟為社稷萬民不為朕也册府元龜秋七月車駕次鳳翔上問陸贄今至鳳翔有迎駕諸軍形勢甚盛因此遣人代李楚琳何如贄上奏以為如此則事同脅執以言乎除亂則不武以言乎務理則不誠不如俟奠枕京邑徴授一官彼將奔走不暇安敢復勞誅鉏哉戊午車駕發漢中秋七月丙子至鳳翔斬喬琳蔣鎮張光晟等李晟以光晟雖臣賊而滅賊亦頗有力欲全之上不許通鑑車駕還長安晟遣大將吳詵以兵三千到寶雞清道自請迎扈不許帝至自梁晟以戎服見三橋帝駐馬勞之晟再拜頓首賀克殄大盜廟朝安復已即跪陳不能指日破賊至乘輿再狩乃臣不職之咎請死伏道左帝為掩涕命給事中齊映起之使就位有詔賜第永崇里涇陽上田延平門之林園女樂一列晟入第京兆供帳教坊鼓吹迎導詔將相送之帝紀其功自文於碑敕皇太子書立於東渭橋以示後世又令太子録副以賜始晟屯渭橋也熒惑守嵗久乃退府中皆賀曰熒惑退國家之利速用兵者昌晟曰天子暴露人臣當力勤死難安知天道耶至是乃曰前士大夫勸晟出兵非敢拒也且人可用而不可使之知也夫惟五緯盈縮不常晟懼復守嵗則我兵不戰自屈矣皆曰非所及也唐書李晟傳七月壬午至長安渾瑊韓遊瓌戴休顔以其衆扈從李晟駱元光尚可孤以其衆奉迎步騎十餘萬旌旗數十里晟謁見上於三橋上駐馬慰撫至宫每間日輒宴勳臣李晟為首渾瑊次之諸將相又次之通鑑八月遣渾瑊等討李懷光軍於同州上命渾瑊駱元光討李懷光懷光遣其將徐庭光以精卒六千軍長春宫以拒之通鑑冬十月懷光遣兵冦同州官軍敗績丙辰李懷光將閻宴冦同州官軍敗於沙苑詔徵邠州之兵韓遊瓌將甲士六千赴之通鑑十二月渾瑊及李懷光戰於乾坑敗績十二月乙酉渾瑊及李懷光戰於乾坑敗績唐書德宗本紀今按乾坑在同州境貞元元年夏四月馬燧渾瑊破李懷光兵於長春宫四月壬午馬燧渾瑊破懷光兵於長春宫南遂掘塹圍宫城懷光諸將相繼來降詔以燧瑊為招撫使韓遊瓌請兵於渾瑊共取朝邑懷光將閻宴欲爭之士卒指邠軍曰彼非吾父兄則吾子弟奈何以白刃相向乎語甚囂宴遽引兵去懷光知衆心不從乃詐稱欲歸國聚貨財飾車馬云俟路通入貢由是得復踰旬月時連年旱蝗資糧匱竭言者多請赦懷光李晟上言赦懷光有五不可但敇諸道圍守旬時必有內潰之變何必養腹心之疾為他日之悔哉馬燧入朝奏稱懷光凶逆尤甚赦之無以令天下願得一月糧必為陛下平之上許之通鑑秋八月馬燧取長春宫賊將徐庭光守長春宫城燧度長春不下則懷光固守久攻所傷必衆乃挺身至城下見庭光庭光再拜燧曰公等朔方士自祿山以來功髙天下奈何棄之為滅族計若從吾言非止免禍富貴可遂也未對燧曰爾以吾為欺耶今不逺數步可射我披而示之心庭光感泣一軍皆流涕即率衆降燧以數騎入其城衆大呼曰吾輩等更為王人矣渾瑊亦自以為不及也嘗疑馬公能窘田悅今觀其制敵有過人者吾不逮逺矣進營焦籬堡堡將降餘戍望風遁去燧濟河賊將牛名俊斬懷光降河中平唐書馬燧傳二年夏四月韓滉運米至關中給軍關中倉庫竭禁軍或自脫巾呼於道曰拘吾於軍而不給糧吾罪人也會韓滉運米三萬斛至陜上喜至東宫謂太子曰米至陜吾父子得生矣時禁中不釀命於坊市取酒為樂至是麥始熟市有醉人當時以為嘉瑞通鑑秋八月吐蕃入冦遣兵屯咸陽貞元二年八月吐蕃冦涇隴邠寧數道掠人畜取禾稼西境騷然諸道節度及軍鎮咸閉壁自守而已京師戒嚴上遣左將軍張獻甫與神策將李升曇蘇清沔等屯於咸陽召節度駱元光率衆戍咸陽以援之舊唐書吐蕃傳九月吐蕃逼好畤鳳翔節度使李晟遣兵於汧陽敗之九月以吐蕃遊騎及好畤上復遣張獻甫屯於咸陽鳳翔節度使李晟以吐蕃侵軼遣其將王佖夜襲賊營率驍勇三千人入汧陽戒之曰賊之大衆當過城下甚勿擊其首尾首尾雖敗中軍力全若合勢攻之汝必受其弊候其前軍已過見五方旗虎豹衣則其中軍也出其不意乃是奇功佖如其言擊之衆果敗副將史廷光力戰死之又冦鳳翔城下李晟出兵禦之一夕而退十月李晟遣兵襲吐蕃之堆沙堡大破之焚其儲積斬蕃首扈屈律設贊等七人傳首京師舊唐書吐蕃傳十二月吐蕃寇陷緣邊諸州以馬燧為招討使吐蕃陷夏州刺史托拔乾暉率衆而去據其城又寇麟州州素無城壁人皆奔散舊唐書吐蕃傳十二月馬燧為綏銀麟勝招討使唐書德宗本紀三年春正月淮西戌兵自鄜州叛歸討斬之陳􅋖奇舉淮西降詔發其兵於京西防秋會仙奇為吳少誠所殺少誠密遣人召門槍兵馬使吳法超等使引兵歸蒲不之知法超等遂引步騎四千自鄜州叛歸渾城使其將白娑勒追之反為所敗上急遣中使敕陜虢觀察使李泌發兵防遏泌遣將伏隘擊之通鑑二月復夏州二月己卯華州潼關節度使駱元光克夏州唐書德宗本紀八月吐蕃冦隴州刺史韓清沔敗之吐蕃率羌渾之衆犯塞分為三道其一趨隴州一趨汧陽之東一趨釣竿原連營數十里其汧陽賊營距鳳翔四十里士庶奔駭賊遣羌渾之衆衣漢戎服假稱邢君牙之衆奄至吳山及寶雞北界焚燒廬舍驅掠人畜百姓丁壯者驅之以歸羸老者咸殺之或斷手鑿目棄之而去初李晟在鳳翔令伐大木塞安化峽及是賊並焚之九月詔神策軍將石季章以衆三千戍武功唐良臣戍百里城是月吐蕃大掠汧陽吳山通鑑注吳山縣屬隴州隋長蛇縣地等界人庶男女萬餘口渾瑊遣其將任蒙王以衆三千戌好畤吐蕃復至圍隴州刺史韓清沔與蘇太平夜出兵伏於大像龕及夜半令城中及龕各舉火相應賊大驚因襲其營賊乃退散舊唐書吐蕃傳冬十月吐蕃冦長武城十月吐蕃數千騎復至長武城韓全義率衆禦之韓遊瓌之將請以衆助之遊瓌不許及暮賊退全義亦引還自是賊之騎常往來邠涇之間諸城西門無敢啓者舊唐書吐蕃傳四年夏五月吐蕃入冦韓全義禦之於長武四年五月蕃三萬騎略涇邠寧慶鄜五州之鄙焚吏舍民閻係執數萬韓全義以陳許兵戰長武無功初吐蕃盜塞畏春夏疾疫嘗以盛秋及是得唐俘多厚給産質其孥故盛夏入邊唐書吐蕃傳盜韋士元等劫掠京城六月捕誅之韋士元貞元四年四月與盧寧等四人白晝挾弓操劒於萬年縣常樂坊盜縣吏捕之士元等突殺吏步相自延興門逸焉六月士元棄市居賊人豳王孫湛絞士元既死其黨盧寧梁劒等三人劫近城村盧射殺捕吏居人多棄業投城德宗乃發神策善弩騎與長安萬年縣官率人吏具器械急捕之又射殺神策將及縣吏二十餘人以刃殺一人奪弩犯圍而逸又遣神策兵二百人助之居數日偷長梁劒以中矢死南山下得其尸送之盧寧等二十人竟失所在册府元龜五年夏吐蕃冦長武吐蕃冦長武城韓全義敗之於佛堂原唐書德宗本紀六年春二月詔葬佛骨於岐陽初岐陽有佛指骨寸餘葬於無憂王寺或奏請出之以示衆帝乃出之置於禁中精舍又送於京師佛寺傾都瞻拜施財物纍巨萬是日命中官送歸岐陽神策行營節度使鳳翔尹邢君牙迎護葬於舊所册府元龜十二年秋九月帝如魚藻宫貞元十二年九月癸卯幸魚藻宫即日還宫册府元龜十三年夏四月帝如興慶宫貞元十三年四月壬戍幸興慶宫龍堂求雨七月幸魚藻宫池先深一丈更掏加四尺册府元龜十四年夏閏五月長武城軍亂都虞候髙崇文討平之閏五月庚申以神策行營節度使韓全義為夏綏銀宥節度使全義時屯長武城詔率其衆赴鎮士卒以夏州磧鹵又盛夏不樂徙居辛酉軍亂殺大將軍王栖巖全義踰城走都虞候髙崇文誅首亂者衆然後定崇文幽州人也丙子以崇文為長武城都知兵馬使不降敕令中使口宣授之通鑑秋七月吐蕃陷麟州吐蕃陷麟州殺刺史郭鋒湮湟墮陴係居人掠黨項諸部屯橫槽峯唐書吐蕃傳十八年冬十月鄜坊軍亂都虞候裴玢討平之十月己酉鄜坊節度使王栖曜薨中軍將何朝宗謀作亂夜縱火都虞候裴玢潛匿不救火旦擒朝宗斬之以同州刺史劉公濟為鄜坊節度使以玢為行軍司馬通鑑憲宗元和元年春三月夏綏留後楊惠琳作亂伏誅初韓全義入朝以其甥楊惠琳知夏綏留後杜元裳以全義出征無功以將軍李演為夏綏節度使惠琳勒兵拒之河東節度使嚴綬表請討之遣牙將阿跌光進及弟光顏將兵赴之夏州兵馬使張承金斬惠琳傳首京師通鑑冬十月梁州戌兵謀作亂節度使栁晟慰安之十月以栁晟為山南西道節度使晟至漢中府兵討劉闢還未至城詔復遣戌梓州軍士怨怒脅監軍謀作亂晟聞之疾驅入城慰勞之曰汝曹何以得成功對曰誅反者劉闢耳晟曰闢以不受詔命故汝曹得以立功豈可復使他人誅汝以為功乎衆皆拜謝咸詣戌所軍府由是獲安通鑑十年夏六月盜殺武元衡於都城上悉以兵事委宰相武元衡李師道客曰天子所以鋭意誅蔡者元衡贊之也請密往刺之元衡死則他相不敢主其謀爭勸天子罷兵矣師道資給遣之至是元衡入朝有賊自暗中射殺之取其顱骨而去又入通化坊擊裴度傷其首墜溝中度氈帽厚得不死京城大駭於是詔宰相出入加金吾騎士張弦露刃以衛之賊遺紙於金吾府縣曰毋急捕我先殺汝故捕賊者不敢過急而師道客竟潛匿亡去通鑑冬十一月盜焚獻陵十一月戊寅盜焚獻陵舊唐書憲宗本紀十一年春正月盜犯建陵正月甲申盜斷建陵門戟唐書憲宗本紀夏五月宥州軍亂討平之五月丁卯宥州軍亂逐其刺史駱怡夏綏銀節度使田縉敗之唐書憲宗本紀漢按宋白鑑注宥州治長澤本三封縣地十三年冬十二月迎佛骨於鳳翔元和十三年十二月庚戌僧惟應等辭赴鳳翔法門寺迎佛骨命髙品中使杜英琦監焉是月癸卯命中使齎香監領宫人十三人赴臨皋驛迎佛骨先是功德使奏鳳翔府法門寺有護國正身塔塔內有釋迦牟尼佛指骨一節其本傳以為當三十年一開開則嵗豐人安至來年合發詔許之及至又命中使領禁兵與僧徒迎護開光順門以納之留禁中二日乃送京城佛寺册府元龜刑部侍郎韓愈上表切諌上怒將加極刑裴度崔羣言愈雖狂發於忠懇宜寬容以開言路乃貶潮州刺史通鑑十五年秋八月帝如魚藻宫冬十月如華清宫十二月如城外校獵是年閏五月穆宗即位九月辛丑觀競渡角抵於魚藻宫用樂十二月庚辰獵於城南壬子擊鞠於右神策軍遂獵於城西甲申獵於苑北唐書穆宗紀上將幸華清宫宰相率兩省官詣延英門三上表切諫皆不聽諫官伏門下至暮乃退明日上自復道出城幸華清宫獨宫主駙馬中尉兵千人扈從晡時還宫通鑑穆宗長慶二年夏六月羌冦渭北黨項羌冦渭北掠官馬通鑑冬十月帝如咸陽十一月如華清宫長慶二年十月己卯帝由復道出城狩於咸陽即日還宫十一月癸酉幸華清宫遂狩於驪山即日還宫册府元龜三年秋八月帝如興慶宫上由復道幸興慶宫至通化門賜持盂僧絹二百匹因幸五方賜從官金銀鋌有差舊唐書穆宗本紀四年夏四月盜入清思殿中尉馬存亮討平之正月敬宗即位夏四月丙申賊張韶等百餘人至右銀臺門殺閽者揮兵大呼進至清思殿登御榻而食弓箭庫右神策軍兵馬使康藝全率兵入宫討平之是日上間變急幸左軍舊唐書敬宗本紀卜者蘇玄明與染坊供人張韶善謂之曰我為子卜當升殿坐與我共食今主上晝夜毬獵多不在宫大事可圖也韶以為然乃謀結染工無賴者百餘人匿兵於紫草車載以入有疑其重而詰之者韶急殺之斬關而入先是右軍中尉梁守謙有寵每兩軍角伎上常佑右軍至是上狼狽欲幸右軍以逺不能遂幸左軍左軍中尉馬存亮走出迎自負上入軍遣大將康藝全將騎卒入宫討賊上憂二太后隔絶存亮復以騎迎至軍韶升清思殿與玄明同食曰果如子言玄明驚曰事至此耶韶懼而走藝全兵至擊殺之餘黨悉獲上乃還宫盜所歷諸門監門宦者法當死詔並杖之使仍舊職存亮不自矜委權求出監淮南軍綱目敬宗寶歷元年夏五月帝如魚藻宫五月庚戍觀競渡於魚藻宫唐書敬宗本紀冬十一月帝如溫湯寶歷元年十一月庚寅幸溫湯即日還宫舊唐書敬宗本紀初上欲幸驪山溫湯左僕射李綘諫議大夫張仲方等屢諫不聽拾遺張權輿伏紫宸殿下叩頭諫曰昔周幽王幸驪山而為犬戎所殺秦始皇幸驪山而國亡玄宗宫驪山而祿山亂先帝幸驪山而享年不長帝曰驪山若此之凶耶我宜一往以驗彼言幸溫湯還謂左右曰彼叩頭者之言安足信哉綱目二年春三月帝如魚藻宫寶歷二年三月戊寅幸魚藻宫觀競渡己卯賜魚藻宫從官左右神策中尉諸司使翰林學士等錦綵銀器有差册府元龜文宗太和四年春二月興元軍亂殺其節度使李綘二月乙卯興元軍亂殺其節度使李綘唐書文宗本紀南蠻冦蜀道詔綘募兵千人往赴不半道蠻已去兵還監軍使楊叔元者素疾綘遣人迎説軍曰將收募直而還為民士皆怒乃譟而入劫庫兵綘方宴不設備遂握節登陴或言縋城可以免綘不從牙將王景延力戰歿綘遂遇害幕府趙存約薛齊皆死事聞諫官崔戎等列綘寃唐書李綘傳命崔琯等宣慰山南太和四年二月興元三軍作亂節度使李綘及家並被處置訖命給事中崔琯充山南西道宣慰使户部員外郎嚴謇為副又命中使先義逸赴興元宣慰册府元龜詔以溫造鎮興元討亂兵誅之興元軍亂殺節度使李綘文宗以造氣豪嫉惡乃授檢校右散騎常侍興元尹山南西道節度使造辭赴鎮以興元兆亂之狀奏之文宗許以便宜從事造行至褒城會興元都將衛志忠征蠻回謁見造即留以自衛密與志忠謀又召亞將張丕李少直各諭其旨暨發褒城以八百人為衙隊五百人為前軍前軍入府分守諸門造下車置宴牙門造曰吾欲問新軍去住之意可悉前勞問既畢因令舁酒巡行酒匝未至者皆至牙兵圍之亦合坐卒詰以殺綘之狀志忠張丕夾階立拔劒呼曰殺圍兵齊奮其賊首教練使丘鑄等並官健千人皆斬首於地血流四注監軍楊叔元遽起求哀擁造靴以請命遣兵衛出之以俟朝旨敕旨流配康州其親刃綘者斬一百斷號令者斬三斷餘並斬首內一百首祭綘三十首祭王景延趙存約等並投尸於江舊唐書溫造傳九年春二月浚曲江二月丁亥發神䇿軍一千五百人修淘曲江如諸司要於曲江置亭館者宜給與間地舊唐書文宗本紀冬十一月李訓等謀誅中宦不克訓及舒元輿王涯等皆死殺鄭注於鳳翔鄭注先顯訓藉以進及勢相埒賴寵爭功不兩立然方事未集乃出注使鎮鳳翔外為助援內實猜克待逞且殺之擢所厚善分總兵柄於是王璠為太原節度使郭行餘為邠寧節度使羅立言權京兆尹韓約金吾將軍李孝本權御史中丞隂許璠行餘多募士及金吾臺府卒劫以為用十一月壬戍帝御紫宸殿約奏甘露降金吾左仗樹詔宰相羣臣往視訓奏言非甘露帝顧中尉仇士良魚志𢎞等驗之訓因欲閉止諸宦人使無逸者時璠行餘列兵丹鳳門外訓呼兩鎮軍入邠寧軍不至璠懼弗能前獨行餘拜殿下宦人至仗所約汗流不能舉首士良等怪之會風動廡幕見執兵者士良等驚走訓連呼金吾兵宦人曰急矣上當還內即扶輦決罘罳下殿趨訓攀輦曰陛下不可去士良手搏訓而躓立言孝本領衆四百東西來上殿與金吾士縱擊宦官死者數十人訓持輦愈急至宣政門宦人郗志榮揕訓仆之輦入宫舒元輿雖知謀不以告王涯曰上將開延英邪會士良遣神䇿衛士五百出所值輒殺涯等惶懼易服出殺諸司史六七百人復分兵屯諸宫門捕訓黨千餘人斬四方館流血成渠俄而元輿涯皆為兵所執涯實不知謀士良榜笞急乃自署反狀詔出衛騎千餘馳咸陽奉天捕亡者大索都城明日京城剽劫未止訓奔鳳翔為盩厔將所執傳其首餘黨悉擒皆腰斬梟首以徇唐書李訓傳王守澄死注奏言守澄國勞舊願身護喪因羣宦者臨送欲以鎮兵擒誅之訓畏注專其功乃先五日舉事注率五百騎至扶風聞訓敗乃還監軍張仲清用其將李叔和策訪注計事斬其首兵皆潰去鄭注傳開成三年春正月京城大索正月甲子宰臣李石遇盜於親仁里中劎斷其馬尾又中流矢不甚傷是時京城大恐捕盜不獲既而知仇士良所為乙丑常參官入朝者九人而已餘皆潛竄纍日方安舊唐書文宗本紀五年冬十月回鶻冦邊詔屯兵雲迦關以備之是年四月武宗即位可汗牙部十三姓奉烏介特勒為可汗南保錯子山黠戞斯已破回鶻得太和公主又自以李陵後與唐同宗故遣使者達干奉主來歸烏介怒追擊達干殺之劫主南渡磧邊人大恐進攻天德城振武節度使劉沔屯雲迦關拒却之唐書回鶻傳今按錯子山天德軍皆在榆林套內十二月帝如雲陽十二月癸酉上幸雲陽校獵通鑑武宗會昌元年冬十月帝如咸陽十月車駕校獵咸陽舊唐書武宗本紀武宗喜畋遊角武抃擇五方小兒得出入禁中他日問后起居從容請曰如何可為盛天子后曰諫臣章疏宜審覽毋拒直言帝再拜還索諫章閲之往往道遊畋事自是畋幸稀小兒武抃等不復橫賜矣唐書懿安郭太后傳二年冬十一月帝如涇陽帝幸涇陽校獵白鹿原諫議大夫髙少逸鄭朗等於內閣論陛下校獵太頻出城稍逺萬幾廢弛星出夜歸方今用兵且宜停止上優勞之諫官出謂宰相曰諫官甚要朕時聞其言庶幾改過舊唐書武宗本紀三年十一月羌冦邠寧黨項冦邠寧兖王岐為靈夏六道元帥安撫黨項大使御史中丞李回副之唐書武宗本紀四年冬十月帝如鄠十二月如雲陽十月獵於鄠縣十二月獵於雲陽唐書武宗本紀五年夏六月作望仙樓六月甲申作望仙樓於神策軍唐書武宗本紀六年春二月以米暨為招討黨項使討黨項朝廷雖為黨項置使黨項侵盜不已攻陷邠寧鹽州界城堡屯叱利寨宰相請遣使宣諭上決意討之二月庚辰以夏州節度使米暨為東北道招討黨項使通鑑宣宗大中四年冬十一月羌入冦詔諸道兵討之十一月黨項羌冦邠寧十二月鳳翔節度使李安業河東節度使李栻為招討黨項使唐書宣宗本紀五年春三月以白敏中充招討黨項都統秋八月黨項降上以南山平夏黨項久未平趙珣聚米閻經曰黨項部落在銀夏以北居川澤者號平夏部在安鹽以南居山谷者謂之南山黨項頗厭用兵崔鉉建議宜遣大臣鎮撫乃以敏中為制置等使四月定逺城使史元破黨項九千餘帳於三交谷三交谷在夏州界敏中奏黨項平詔平夏黨項已就安帖南山黨項猶行抄掠宜委李福存諭於銀夏境內授以間田或復入山林不受教令誅討無赦八月敏中奏南山黨項亦請降赦之通鑑懿宗咸通七年春閏三月吐蕃冦邠寧閏三月吐蕃冦邠寧節度使薛𢎞宗拒却之通鑑十二年夏五月帝如安國寺上幸安國寺賜講經僧沈香髙座舊唐書懿宗本紀沈檀講座二各髙二丈設萬人齋綱目十四年春三月迎佛骨於鳳翔上遣敕使迎佛骨於鳳翔乃以金銀為剎珠玉為帳孔鷸周飾之白孔六帖咸通十四年三月詔曰兩街僧道於鳳翔法門寺迎佛骨四月八日佛骨至京自開逺門達安福門迎禮之迎入內道場二日出於京城諸寺士女雲合威儀盛飾古無其比遂下制赦京畿及天下見禁囚徒册府元龜咸通十四年詔自鳳翔迎佛骨至於輦下都城士庶奔走雲集自開逺門達於岐川車馬晝夜相屬飲饌盈溢路衢謂之無礙檀施至京日上與諸王親御城樓坊市以繒綵結為龍鳳象馬之形紙竹作僧佛鬼神之狀幡花幢蓋之屬羅列二十餘里間之歌舞管絃雜以禁軍兵仗緇徒梵誦之聲沸聒天地民間有嬉笑踴躍者有悲愴涕泣者以寶輿舁之居於內殿數月屬懿皇厭代密使送於鳳翔劇談録僖宗乾符元年冬十二月商州民作亂討平之商州刺史王樞以軍州空窘減折糴錢民相率以白梃毆之又毆殺官吏二人朝廷更除刺史李誥到官收捕民李叔汶等三十餘人斬之通鑑廣明元年冬十一月遣將軍張承範等守潼關黃巢欲薄東都時宰相建言悉神策并關內諸節度兵十五萬守潼關田令孜請自將而東帝幸神策軍擢左軍騎將張承範為先鋒右軍步將王師會督糧道以飛龍使楊復恭副令孜於是募兵京師得數千人帝餞令孜章信門賚遺豐優然衛兵皆長安髙資世籍兩軍得廩賜侈服怒馬以詫權豪初不知戰聞科選皆哭於家隂出資雇販區病坊以備行陳不能持兵觀者寒毛以栗承範以強弩三千防關辭曰祿山率兵五萬陷東都今賊衆六十萬過祿山逺甚恐不足守帝不許賊進取陜虢檄關戍曰吾道淮南逐髙駢如鼠走穴爾無我拒神策軍過華裹三日糧不能飽無鬭志唐書黃巢傳十二月黃巢入潼關十二月巢攻關齊克讓以其軍戰關外賊少郤俄而巢至師大呼川谷皆震時士飢甚潛燒克讓營克讓走入關承範出金諭軍中曰諸君勉報國救且至士感泣拒戰賊見師不繼急攻關王師矢盡飛石以射巢驅民內塹火關樓皆盡始關左有大谷禁行人號禁谷賊至令孜屯關而忘谷之可入尚讓引衆趨谷承範惶遽使師會以徑弩八百邀之比至而賊已入明日夾攻關王師潰師會欲自殺承範曰吾二人死熟當辨者不如見天子以實聞乃羸服逃唐書黃巢傳初田令孜之起神策軍也衆號七萬皆長安豪民以貨賂求隸六軍不能負戈戟鎧甲之重乃祈於官執事者厚以直傭兩市之負販者以備其行其實不過三萬人但飾其旌旄鉦鼓而已及守潼關賊已他道而入一時狼狽回至輦下册府元龜黃巢入長安帝走興元黃巢陷華州河口節度使李侃表降於賊朝廷使田令孜率神策軍拒之賊以王鐸失守乃自潼關谷路入遂冦京師時前夏州節度使諸葛爽亦統禁軍聞賊盛退保櫟陽及黃巢至乃降册府元龜始博野鳳翔軍過渭橋見募軍服鮮燠怒曰是等何功遽然至是更為賊鄉導前賊焚西市帝類郊祈哀會承範至具言不守狀帝黜宰相盧攜方朝而傳言賊至百官奔令孜以神策兵五百奉帝趨咸陽惟福穆潭夀四王與妃御一二從中人西門匡範統右軍以殿巢以尚讓為平唐大將軍金吾將軍張直方與羣臣迎賊灞上巢陷京師入自春明門升太極殿宫女數千迎拜稱黃王巢喜曰殆天意歟數日因大掠縛箠居人索財號淘物捕得官吏悉斬之火廬舍不可資宗室侯王屠之無類矣唐書黃巢傳上趣駱谷鳳翔節度使鄭畋謁於道次請留鳳翔上曰朕不欲密爾巨冦且幸興元徵兵以圖收復卿可糾合鄰道勉建大勳畋曰道路梗澀奏報難通請得便宜從事許之綱目黃巢僣號於長安巢入宫自稱大齊皇帝改元金統唐官三品以上悉停四品以下如故巢將碭山朱溫屯東渭橋溫少孤貧與兄存昱依蕭縣劉崇家崇數笞辱之崇母獨憐之戒家人曰朱三非常人汝曹善遇之豆盧瑑崔沆于琮劉鄴匿民間巢搜獲皆殺之廣德公主曰我唐室之女誓與于僕射俱死賊皆殺之將作監鄭綦庫部郎中鄭係義不降賊舉家自殺張直方多納亡命匿公卿於復壁巢殺之綱目鳳翔節度使鄭畋合鄰道兵討賊畋還鳳翔召將佐議拒賊皆曰賊勢方熾且宜從容以俟兵集乃圖收復畋曰諸君勸畋臣賊乎因悶絶仆地不能言會巢使者以詔書至監軍與之宴樂奏將佐以下皆哭使者怪之幕客靳儲曰以相公風痺不能來故悲耳民間聞者莫不泣畋聞之曰吾固知人心尚未厭唐賊授首無日矣乃刺指血為表遣使詣行在召將佐諭以逆順皆聽命刺血與盟完城塹繕器械訓士卒密約鄰道合兵討賊鄰道皆許諾發兵時禁軍分鎮關中者尚數萬畋使人招之皆至軍勢大振巢遣人齎詔召畋畋斬之綱目車駕至興元義武節度使王處存以兵來衛帝幸興元道中無供頓衛士食不給漢隂令李康獻糗餌數百馱士皆厭給帝異之曰爾乃及是乎對曰臣安知為此張濬教臣也乃急召濬至行在以為兵部郎中再進諌議大夫白孔六帖王處存纍遷義武節度使黃巢陷京師處存號哭不俟詔分麾下兵間道至山南衛乘輿唐書王處存傳王景崇進同中書門下平章事黃巢反帝西狩偽使齎詔至景崇斬以徇因發兵馳徼諸道合定州王處存連師西入關問行在貢輸相踵五代史王景崇傳河中節度使王重榮引兵入援進屯渭北巢遣使調發河中吏民不勝其苦王重榮謂衆曰始吾屈節以紓患今調發不已亡無日矣悉驅巢使者殺之巢遣朱溫擊河中重榮與戰大破之遣使與王處存結盟引兵營於渭北綱目中和元年春正月詔諸道兵討賊帝在興元詔太原節度使鄭從讜發本道之師與北面行營招討使諸葛爽代州刺史北面行營馬步都虞候朱玫夏州將李思恭等行營諸軍並赴京師討賊册府元龜三月黃巢遣兵冦鳳翔都統鄭畋擊敗之賊將王璠率衆三萬來攻畋使𢎞夫時唐𢎞夫為畋行軍司馬設伏以待璠內輕畋儒柔縱步騎鼓而前畋以鋭卒數千當賊疏陳而多旗幟乘髙伐鼓賊不測衆寡陳未整伏發衆皆囂日暮軍四合鏖戰龍尾坡鑑注龍尾坡在岐山縣東斬首二萬級積尸數十里多獲鎧仗璠遁去擒璠子斬之威動京師唐書鄭畋傳夏四月黃巢遣將據邠州鎮將朱玫討誅之邠將朱玫陽為賊將王玫裒兵俄而殺玫引軍入於王師唐書黃巢傳官軍入長安黃巢走還襲之復據長安詔涇原節度使程宗楚為諸軍行營副都統前朔方節度使唐𢎞夫為行營司馬數擊賊𢎞夫進屯渭北王重榮屯沙苑王處存次渭橋李孝昌拓拔思恭壁武功𢎞夫拔咸陽筏渭水破尚讓軍乘勝入京師巢竊出至石井宗楚入自延秋門𢎞夫傳城舍都人共譟曰王師至處存遣鋭卒五千以白􅣎自志夜入殺賊都人傳言巢已走邠涇軍爭入京師諸軍亦解甲休競掠貨財子女市少年亦冒作􅣎肆為剽巢伏野使覘城中弛備遣孟楷率賊數百掩邠涇軍都人猶謂王師歡迎之時軍士得珍賄不勝載聞賊至負重不能走賊執𢎞夫害之處存走營始王璠破奉天引衆數千隨𢎞夫諸將敗獨一軍戰尤力巢復入京師怒民迎王師縱擊殺八萬人血流於路可涉也謂之洗城諸軍退保武功唐書黃巢傳五月官軍克華州昭義節度使髙潯會王重榮攻華州克之通鑑六月西川黃頭軍使李鋋等與賊戰於興平敗之邠寧節度副使朱玫屯興平黃巢將王璠圍興平玫退屯奉天及龍尾坡西川黃頭軍使李鋋將萬人鞏咸將五千人屯興平為二寨與黃巢戰屢捷陳敬瑄遣神機營使髙仁厚將二千人益之通鑑黃巢陷京師陳敬瑄遣黃頭軍部將李鋋鞏咸以兵萬五千屯興平數敗巢軍賊號蜀兵為鴉兒每戰輒戒曰毋與鴉兒鬭白孔六帖秋七月李孝昌拓跋思恭進軍東渭橋鄜延節度使李孝昌權夏州節度使拓跋思恭屯東渭橋黃巢遣朱溫拒之是月以義武節度使王處存為東南面行營招討使以邠寧節度副使朱玫為節度使通鑑八月髙潯及賊戰於石橋敗績髙潯與黃巢將李詳戰於石橋潯敗奔河中詳乘勝復取華州是年五月髙潯克華州巢以詳為華州刺史通鑑延夏兵及賊戰於東渭橋敗績李孝昌拓跋思恭與尚讓朱溫戰於東渭橋不利引去通鑑九月忠武監軍楊復光屯武功黃巢之陷長安也忠武節度使周岌降之嘗夜宴召復光酒酣言及本朝復光泣下良久曰公自匹夫為公侯奈何捨十八葉天子而臣賊乎岌亦流涕曰吾不能獨拒賊故貌奉而心圖之今日召公正為此耳因瀝酒為盟命復光將兵三千詣蔡州説秦宗權同舉兵討賊宗權遣其將王淑將兵三千從復光淑逗留不進復光斬之并其軍分忠武八千人為八都遣牙將王建韓建等八人將之帥八都與朱溫戰敗之克鄧州逐北至藍橋通鑑注云藍橋在藍田關南八月復光屯武功通鑑冬十月鳳翔行軍司馬李昌言作亂鄭畋赴行在行軍司馬李昌言屯興平遣麾下求為南面都統輒引兵趣府畋不意見襲登城好語曰吾方入朝公能戢兵愛人為國滅賊乎能則守此矣遂委軍去昌言自為留後衛畋出境既半道內慚負即辭疾詔授太子少傅分司東都便醫於興元明年召至行在拜司空門下侍郎平章事軍務一以咨決唐書鄭畋傳十一月賊襲敗李孝昌拓跋思恭於富平十一月乙巳孟楷朱溫襲鄜夏二軍於富平二軍敗奔歸本道通鑑二年春正月以王鐸為諸道行營都統討賊王鐸以髙駢無心討賊自以身為首相發憤請行上許之以鐸充義成軍節度使兼京城四面行營兵馬都統以太子太師崔安潛為副忠武軍監楊復光為天下兵馬行營都監以河中節度使王重榮為司馬義武軍節度使王處存鄜延節度使李孝昌夏綏節度使拓跋思恭為京城東北西面都統册府元龜二月朱溫據同州黃巢以朱溫為同州刺史令溫自取之二月同州刺史米誠奔河中溫遂據之通鑑夏四月王鐸以諸道兵逼長安鐸將兩川興元之軍屯靈感寺一統志云靈感寺在西安府富平縣治西涇原屯京西易定河中屯渭北邠寧鳳翔屯興平保大定難屯渭橋中武屯武功官軍四集巢勢日蹙號令所行不出同華綱目五月賊冦興平秋七月冦宜君黃巢攻興平興平諸軍退屯奉天七月尚讓攻宜君寨唐併宜君縣入華原縣是時勤王之師蓋于宜君故縣立寨也會大雪盈尺賊凍死者什二三通鑑秋九月朱溫以同州降巢以溫為同州防禦使時諸鎮會兵討賊溫數為王重榮所敗屢請益兵於巢巢中尉孟楷抑而不通溫客謝曈説溫曰黃家起於草莽幸唐衰亂直投其隙而取之爾非有功德興王之業也豈足與成事哉今天子在蜀諸鎮之兵日集以謀興復是唐德未厭於人也且將軍力戰於外而庸人制之於內此章邯所以背秦而歸楚也溫以為然乃殺其監軍嚴實因王重榮以降都統王鐸承制拜溫左金吾衛大將軍河中行營招討副使天子賜名全忠五代史梁太祖本紀冬十一月賊將王遇以華州降李詳以重榮待溫厚亦欲歸之為監軍所告巢殺之以其弟思鄴為華州刺史詳舊卒共逐思鄴推華隂鎮使王遇為主以華州降於王重榮王鐸承制以遇為刺史通鑑三年春三月李克用大破賊衆於梁田陂李克用以步騎萬七千赴京師進屯乾坑巢黨驚曰鴉兒軍至矣二月敗巢將黃鄴於石隄谷三月又敗趙章尚讓於梁田陂橫尸三十里五代史後唐莊宗本紀李克用圍華州黃巢遣尚讓救之克用逆戰破之李承嗣為河東軍校中和三年承嗣為前鋒討黃巢於華隂黃巢令偽客省使王汗會軍機於黃揆承嗣擒之以獻册府元龜王璠與黃揆襲華州據之克用掘塹環州分騎屯渭北命薛志勤康君立夜襲京師火聚俘賊而還巢數戰不利軍食竭下不用命隂有遁謀即發兵三萬扼藍田道使尚讓援華州克用率重榮迎戰零口破之遂拔其城唐書黃巢傳五月李克用破黃巢收復長安克用與忠武將龎從河中將白志遷等引兵先進與黃巢軍戰於渭南一日三捷義成義武等諸軍繼之賊衆大奔克用等入京師巢焚宫室遁去多遺珍寶於路官軍爭取之不急追賊遂逸詔克用同平章事克用時年二十八於諸將最少破黃巢復長安功第一通鑑克修武皇從父弟武皇入關討黃巢克修為先鋒破黃揆於華隂敗尚讓於梁田陂戰黃巢於光順門每戰皆捷册府元龜十二月忠武將鹿晏𢎞據興元晏𢎞帥所部自河中南掠襄鄧金洋宋白曰金州漢漢中郡之西城縣洋州漢城固縣地所過屠滅聲云西赴行在至興元遂逐節度使牛朂自稱留後綱目王建鹿晏𢎞從監軍楊復光率師入援復光以忠武軍八千人立為八都晏𢎞與建各一都校也復光死晏𢎞率八都迎扈行在至山南乃攻剽金商諸郡縣得兵數萬進逼興元節度使牛朂棄城而去晏𢎞因自為留後以建等屬郡刺史不令之任册府元龜四年冬十一月鹿晏𢎞棄興元走鹿晏𢎞之去河中王建韓建張造晉暉李師泰各帥其衆與之俱及據興元以建等為巡內刺史晏𢎞猜忌衆心不附王建韓建素相親善晏𢎞尤忌之田令孜密遣人以厚利誘之十一月二建與張造晉暉李師泰帥衆數千逃奔行在令孜皆養為假子賜與巨萬拜諸衛將軍使各將其衆號隨駕五都又遣禁兵討衛𢎞衛𢎞棄興元走通鑑田令孜殺常侍曹知慤於嵯峨山初宦者曹知慤有膽略黃巢陷長安知慤集壯士據嵯峨山嵯峨山在涇陽縣北五十里數遣人變服夜入長安攻賊營賊驚疑不自安朝廷聞而嘉之就除內常侍田令孜惡之矯詔使邠寧節度使王行瑜襲殺之令孜由是益驕橫綱目光啓元年春三月車駕至京師二月丙申車駕至鳳翔三月丁卯至京師荆棘滿城狐兔縱橫上凄然不樂己巳大赦改元時朝廷號令所在惟河西山南劒南嶺南數十州而已通鑑冬十月田令孜遣兵屯沙苑攻河中李克用救之時朱玫李昌符亦隂附朱全忠克用上言玫昌符與全忠相表裏欲共滅臣臣不得不自救已集蕃漢兵十五萬決以來年濟河北討二鎮不近京城保無驚擾玫欲朝廷討克用數遣人潛入京城燒積聚殺近侍聲云克用所為於是京師震恐令孜遣玫昌符將本軍及神䇿等軍合三萬人屯沙苑以討王重榮重榮發兵拒之告急於克用克用引兵赴之綱目十一月王重榮攻同州刺史郭璋死之重榮遣兵攻同州刺史郭璋出戰敗死重榮與玫等相守月餘克用兵至與重榮俱壁沙苑表請誅令孜及玫昌符詔和解之克用不聽通鑑十二月李克用大破朱玫於沙苑帝奔鳳翔十二月癸酉官軍合戰為沙陀所敗朱玫走還邠州神策軍潰散遂入京師肆掠乙亥沙陀逼京師田令孜奉僖宗出幸鳳翔初黃巢據京師九衢三內宫室宛然及諸道兵破賊爭貨相攻縱火禁剽宫室居市閭里十焚六七賊平之後令京兆尹王徽經年補葺僅復安堵至是亂兵復焚宫闕蕭條鞠為茂草矣舊唐書僖宗本紀二年春二月田令孜劫帝如寶雞正月辛巳朔車駕在鳳翔李克用旋師河中與朱玫王重榮同上表請駕駐蹕鳳翔仍數田令孜之罪戊子田令孜迫乘輿請幸興元庚寅車駕次寶雞舊唐書僖宗本紀田令孜劫上幸寶雞從者才數百人宰相朝臣皆不知翰林承旨杜讓能宿直禁中聞之步追乘輿得遺馬無羈勒解帶繫頸而乘之獨追及上於寶雞明日乃有太子少保孔緯等數人繼至太廟神主皆失之通鑑帝避朱玫次陳倉詔拜孔緯御史大夫令趣百官至行在緯召御史曰吾等身被恩誼不辭難今詔羣臣皆不至夫與人布衣遊猶緩急相恤况於君乎且泣下御史辭請辦一日費而行緯曰吾妻疾旦暮盡丈夫豈以家事後國事乎公善自謀吾行決矣緯既及行在緯䇿玫必反建言關邑厄狹不足駐六師請幸梁州即日去陳倉而玫兵至白孔六帖朱玫等追逼車駕帝復走入大散關宰相蕭遘惡令孜劫質天子生方鎮之難使玫進迎乘輿玫引兵追行在敗興鳳楊晟軍帝次梁洋稍引而南玫兵及中營左右被剽戮者不勝計令孜懼人圖已蒙面以行使王建長劒五百清道囊傳國璽授之次大散關道險澀帝危及難數矣唐書田令孜傳邠岐兵追逼乘輿田令孜奉上登大散嶺李昌符焚閣道丈餘將摧折矣王建掖上自煙焰中躍過夜宿坂下玫攻散關不克嗣襄王熅為玫所得與之俱還鳳翔綱目三月帝至興元朱玫李昌符使山南西道節度使石君涉柵險要燒郵驛上由他道進山谷﨑嶇邠軍迫其後危殆者數四僅得達山南君涉棄鎮逃歸鳳翔監軍嚴遵美迎上於西縣宋白曰西縣本名白馬城魏置嶓冢隋改為西縣在府西百里丙申車駕至興元保鑾都將李鋋敗邠兵於鳳州詔以晉暉及神策軍使張造帥兵屯黑水黑水在城固縣西北太白山南流入漢修棧道以通往來通鑑杜讓能當帝狩梁時間關險澀未嘗暫去帝側勞曰朕失道再違宗廟方艱難時卿不少捨朕蓋古所謂忠於所事邪白孔六帖夏四月朱玫奉襄王熅權監軍國事還長安四月壬子朱玫李昌言追宰相蕭遘等於鳳翔驛舍請嗣襄王熅權監軍國事玫自為大丞相兼左右神策十軍使遂驅率文武百寮奉襄王還京師舊唐書僖宗本紀玫怒令孜專權又以天子不諒其忠乃訴於遘曰昨奉指蹤徑來奔問不蒙見信翻類脅君吾等報國之心極矣安能垂頭疊翼喘喘於閽寺之手哉相公徐思其宜改圖可也遘曰足下乃心王室止有歸兵還鎮拜表迎鑾功名德業益光圖史改圖之言未敢聞命玫退而宣言曰我册個王子為主不從者斬及立襄王請遘為册文遘竟不措筆乃命鄭昌圖為之蕭遘傳六月詔都將楊守亮與王重榮李克用共討朱玫初李昌符與朱玫謀立襄王既而玫自為宰相昌符怒更通表興元玫遣王行瑜將兵五萬追乘輿屯鳳州是時諸道貢賦多之長安興元從官衛士皆乏食上涕泣不知為計杜讓能曰楊復光與王重榮同破黃巢相親善復恭其兄也若遣重臣往諭且致復恭之意宜有回慮上從之遣右諫議大夫劉崇望齎詔諭重榮重榮即聽命請討玫以自贖李克用移檄鄰道進討凶逆共立大功六月以扈蹕都將楊守亮將兵二萬出金州與重榮克用共討朱玫克用奉表稱方發濟河除逆黨迎車駕願詔諸道與臣協力先是山南之人皆言克用與玫合人情恟懼表至上出示從官并諭山南諸鎮由是帖然通鑑秋七月王行瑜冦興州楊守亮擊敗之六月朱玫遣將王行瑜率邠寧河西之師五萬屯鳳州保鑾都將李鋋李茂貞陳佩等抗之於大唐峰七月以金商節度使楊守亮檢校司徒兼興元尹王行瑜急攻興州守亮出師擊敗之舊唐書僖宗本紀九月李鋋等及邠軍戰於大唐峰擊破之九月楊守亮復敗邠州軍於鳳州舊唐書僖宗本紀朱玫將張行實攻大唐峰李鋋等擊却之金吾將軍滿存與邠軍戰破之復取興州進守萬仞寨通鑑冬十月朱玫立襄王熅稱帝改元長安百官太子太師裴璩等勸進於襄王熅十月熅即皇帝位改元建貞遙尊上為太上元皇聖帝通鑑十二月王行瑜還長安討朱玫誅之九月楊復恭密遣人説王行瑜令謀歸國十二月王行瑜受密詔自鳳州率衆還長安辛酉行瑜斬朱玫鄭昌圖奉襄王奔河中王重榮紿稱奉迎執李熅斬之舊唐書僖宗本紀王行瑜敗於大唐峰懼歸且見殺又聞購能得玫者以邠寧節度畀之行瑜謂其下曰今敗歸必以無功死若斬玫與北軍迎天子取富貴可乎衆曰諾即勒兵倍道趨長安玫居孔緯第方據几署事聞兵入趨召行瑜叱曰公擅歸反邪行瑜厲聲曰我非反者將得君首為邠寧節度耳玫遽起左右斬之殺其徒數百諸軍遂大亂燒京師時盛寒吏民被剽敓僵死尸相藉即傳首興元唐書朱玫傳三年春三月車駕至鳳翔三月甲申車駕還京次鳳翔以宫室未完李昌符請駐蹕以俟畢工河中械送偽宰相裴徹鄭昌圖命斬之於岐山縣舊唐書僖宗本紀夏六月李昌符作亂詔李茂貞討之天威都頭楊守立與李昌符爭道麾下相毆帝命中使諭之不止昌符遂擁兵燒行營守立與戰昌符敗走保隴州詔遣茂貞討之綱目僖宗還次鳳翔李昌符亂興倉卒昭度質家族於禁軍誓共討賊士感動乃平昌符唐書韋昭度傳李茂貞扈蹕東歸至鳳翔鳳翔節度使李昌符與天威都頭楊守立爭道以兵相攻昌符不勝走隴州僖宗遣茂貞追擊殺昌符以功拜鳳翔隴右節度使五代史李茂貞傳文德元年春二月帝至自鳳翔三月昭宗即位二月己丑至自鳳翔庚寅謁於太廟大赦改元唐書僖宗本紀昭宗大順二年冬十月楊復恭反遣天威都頭李順節討之走興元與楊守亮舉兵拒命大順二年罷復恭兵出為鳳翔監軍不肯行因丐致仕詔可遷上將軍賜几杖使者還遣腹心殺使者於道遁居商山俄入居昭化坊第第近玉山營而子守信為軍使數省候出入或告父子且謀亂時順節即復恭養子守立也昭宗賜姓名李順節遙領鎮海軍節度使詔與神策軍使李守節率衛兵攻復恭治殺使者罪帝御延喜樓須之家人拒戰守信亦率兵至昌化里陳以待會日入復恭與守信舉族出奔遂走興元唐書楊復恭傳守信與復恭挈其族趣興元與楊守亮等同舉兵拒朝廷以討李順節為名綱目玉山都頭楊守信稱兵闕下上陳兵於延喜門是夜命崇望守度支庫明日曉入含光門未開禁軍列於左右俟門開即劫掠兩市及聞傳呼宰相來門方啓崇望駐馬慰諭之曰聖上在街東親總戎事公等禁軍何不樓前殺賊立取功名切不可剽掠街市圖小利以成惡名也將士唯唯從崇望至長樂門守信見兵來即遁去軍士呼萬嵗舊唐書劉崇望傳冬十二月殺天威都將李順節天威軍士大掠順節已斥復恭則橫暴出入以兵從兩軍中尉劉景宣西門重遂察其意非常以狀聞有詔召順節輒以甲士三百人入至銀臺門景宣引順節坐殿廡部將嗣光審出斬之從者大譟出延喜門剽永寧里盡夕止唐書楊復恭傳昭信防禦使馮行襲大破楊守亮於金州馮行襲唐末為金州防禦使時興元楊守亮將襲京師道出金商行襲逆擊大破之升金州為節鎮以戎昭軍為額即以行襲為節度使册府元龜漢按明一統志金州西城縣唐天寶改安康郡乾元初復為金州景福元年春二月以李茂貞為山南西道招討使討楊守亮先是鳳翔李茂貞靜難王行瑜鎮國韓建同州王行約秦州李茂莊五節度使上言楊守亮容匿叛臣請出兵討之乞加茂貞山南西道招討使朝議以茂貞得山南不可復制下詔和解之皆不聽茂貞行瑜擅舉兵擊興元表請不已遺杜讓能西門君遂書陵蔑朝廷上意不能容召宰相諫官議之時宦官有隂與二鎮相表裏者宰相不敢言給事中牛徽曰先朝多難茂貞誠有翼衛之功諸楊阻兵亟出攻討其志亦在疾惡但不當不俟詔命耳比聞兵過山南殺傷至多陛下倘不以招討使授之使用國法約束則山南之民盡矣上乃從之綱目夏六月李茂貞取鳳興洋州六月己巳李茂貞陷鳳州感義軍節度使滿存奔於興元遂陷興洋二州唐書昭宗本紀冬十一月李茂貞取興元十一月辛丑鳳翔邠寧之衆攻興元府陷之楊守亮楊復恭突圍而遁茂貞表其子繼密權知興元府事十二月華州節度使韓建奏於乾元縣遇興元潰散兵士擊敗之楊守亮楊復恭並已處斬傳首京師舊唐書昭宗本紀二年春正月以李茂貞鎮興元茂貞不奉詔茂貞自請鎮興元故有是命茂貞欲兼得鳳翔不奉詔綱目秋八月以覃王嗣周為京西招討使討李茂貞茂貞上表自論曰但慮軍情忽變戎馬難羈徒令甸服生靈因兹受弊未審乘輿播越自此何之昭宗以茂貞表辭不遜不能忍以問宰相杜讓能讓能以謂茂貞地大兵強而唐力未可以致討鳳翔又近京師易以自危而難於後悔他日雖欲誅朝錯以謝諸侯恐不能也昭宗怒曰吾不能孱孱坐受凌弱乃責讓能治兵而以覃王嗣周為京西招討使令下京師市人皆知不可相與聚承天門遮宰相請無舉兵爭投瓦石擊宰相宰相下輿而走亡其堂印人情大恐昭宗意益堅五代史李茂貞傳上命讓能留中書計畫調度月餘不歸崔昭緯隂結邠岐為之耳目讓能朝發一言二鎮夕必知之茂貞使其黨糾合市人數百千人邀西門君遂馬及崔昭緯鄭延昌肩輿訴之二相曰兹事主上專委杜太尉吾曹不預知市人因亂投瓦石二相走匿僅免上命捕其唱帥者誅之用兵之意益堅遂有是命綱目九月李茂貞犯京師九月乙亥覃王率扈駕五十四軍進攻岐陽屯於興平李茂貞以兵逆戰屯於盩厔壬午岐兵進迫興平王師自潰茂貞乘勝逼京師進屯三橋甲申昭宗御安福門斬觀軍容使西門重遂內樞密使李周潼遣中使賜茂貞詔令收兵歸鎮茂貞陳兵臨臯驛數宰臣杜讓能之罪請誅之制貶讓能為雷州司戶十月賜讓能自盡舊唐書昭宗本紀茂貞逆戰王師敗於盩厔岐兵乘勝至三橋讓能奏曰臣固預言之矣請歸罪於臣可以紓國難上涕下不能已曰與卿訣矣是日貶為雷州司戶茂貞在臨臯請誅讓能尋賜死杜讓能傳十月讓能賜自盡於臨臯驛復以茂貞領兩道於是茂貞盡有鳳翔興元洋隴十五州之地册府元龜驛按鑑注臨臯在長安城西乾寧二年夏五月王行瑜李茂貞韓建舉兵犯闕行瑜求為尚書令韋昭度奏太宗以尚書令登大位自是不以授人行瑜以不得尚書令怨朝廷畿內有八鎮兵隸左右軍郃陽鎮近華州韓建求之良原鎮近邠州王行瑜求之宦官曰此天子禁軍何可得也王珂王珙爭河中行瑜建及茂貞皆為珙請不能得耻之行瑜使其弟同州刺史行約攻河中而自與茂貞建各將精騎數千入朝市人竄匿上御安福門以待之三帥盛陳甲兵拜伏舞蹈上詰之曰卿輩不奏請輒稱兵入京城其志欲何為乎行瑜茂貞流汗不能言獨建粗述入朝之由上與之宴三帥奏稱韋昭度討西川失策李溪作相不合衆心請誅之上未之許行瑜等輒殺之及樞密使康尚弼等數人李克用聞三鎮犯闕即日遣使發北部兵期以來月渡河入關始三帥謀廢上立吉王保及聞克用起兵行瑜茂貞各留兵二千人宿衛京師與建皆還本鎮綱目秋七月指揮使王行實李繼鵬反帝如石門李克用大舉蕃漢兵南下上表稱王行瑜李茂貞韓建稱兵犯闕賊害大臣請討之又移檄三鎮數其罪行瑜等大懼王行約棄同州走弟行實時為左軍指揮使奏請幸邠州樞密使駱全瓘請幸鳳翔上曰克用至此朕有以枝梧卿等但各撫本軍勿令搖動右軍指揮使李繼鵬茂貞假子也謀劫上幸鳳翔中尉劉景宣與王行實知之欲劫上幸邠州孔緯面折以為不可輕離宫闕向晚行約引左軍攻右軍鼓譟震地上聞亂登承天樓捧日都頭李筠將本軍於樓前侍衛繼鵬以鳳翔兵攻筠矢拂御衣左右扶上下樓繼鵬復縱火焚宫門煙焰蔽天時有鹽州六都兵屯京師素為兩軍所憚上急召入入衛兩軍退走上幸李筠營護蹕都頭李居實帥衆繼至或傳行瑜茂貞欲自來迎車駕上懼為所迫以筠居實兩都兵自衛幸石門鎮克用遣判官王環奉表問起居遣兵攻華州韓建登城呼曰僕於李公未嘗失禮何為見攻克用使謂之曰公為人臣逼逐天子公為有禮孰為無禮者乎會聞邠岐欲迎車駕乃移兵營渭橋遣其將李存貞為前鋒又遣史儼將三千騎詣石門侍衛遣存信存審會保大節度使李思孝攻王行瑜梨園寨九域志曰梨園寨在京兆雲陽縣擒其將王令陶等獻於行在李茂貞懼斬李繼鵬傳首行在上表請罪且遣使求和於克用上復遣延王戒丕諭克用令且赦茂貞併力討行瑜綱目縣按石門在今淳化北六十里帝至自石門壬寅克用遣子存貞奉表行在請車駕還宫詔答曰朕欲取今月二十四日却復都城冀寧兆庶倚我勳德有若長城速伸剪蕩之謀以慰黔黎之望癸巳又令延王傳詔令克用發騎軍三千赴三橋屯駐以備回鑾辛亥車駕還宫舊唐書昭宗本紀後唐史儼唐乾寧中從討王行瑜儼率五百騎護駕石門比駕還京以功簡較右散騎常侍屯於三橋者纍月昭宗寵錫優異册府元龜冬十一月李克用克邠州王行瑜伏誅行瑜屯梨園克用與戰破行實等軍執其母及行瑜子俘大校帝下詔削行瑜官爵行瑜以鋭卒五千營龍泉質實云鳳翔府汧陽縣東有龍泉山茂貞壁其西克用夜發精騎擾餉道岐軍走行瑜歸邠州嬰城守厚賂克用求自歸克用軍環其城行瑜窮登城哭語克用曰我無罪昨殺大臣脅天子岐人也行實止宿衛而有司妄以劫遷歸之今公討亂者當問茂貞願束身歸聽命天子克用曰尚父何自卑吾被命討二賊公其一也如歸國當從中決老夫敢專之耶行瑜度不免悉族奔為麾下斬於路傳首京師唐書王行瑜傳李克用破邠州還軍雲陽請擊茂貞昭宗慰勞克用使與茂貞解仇以紓難封晉王是時晉軍渭北遇雨六十日或勸克用入朝克用未決都押衙蓋寓曰天子還自石門寢未安席若晉兵渡渭人情豈復能安勤王而已何必朝哉克用笑曰蓋寓猶不信我况天下乎乃收軍而還五代史後唐莊宗本紀三年秋七月李茂貞舉兵犯闕帝如華州初李克用屯渭北李茂貞韓建憚之事朝廷禮甚恭克用去二鎮貢獻漸疏表章驕慢上自石門還置殿後四軍使延王戒丕等將之茂貞遂表言延王無故稱兵討臣臣今勒兵入朝請罪遂引兵逼京畿覃王嗣周與戰敗績戒丕曰今關中藩鎮無可依者不若自鄜州濟河幸太原上至渭北韓建奉表請幸華州不許既而上復憚逺適至富平召建面議去留建言藩臣跋扈者非止茂貞陛下若逺巡邊鄙臣恐無復還朝華州兵力雖微亦足自固願臨之以圖興復上乃從之至華州茂貞入長安燔燒殆盡綱目四年夏六月李茂貞圍覃王嗣周於奉天六月乙卯以李茂貞為西川節度使以覃王嗣周為鳳翔節度使覃王赴鎮茂貞不受代圍覃王於奉天韓建移書茂貞解奉天之圍覃王歸華州上欲幸奉天親討茂貞宰相切諫乃止通鑑秋八月韓建作亂殺諸王於石隄谷韓建與邠岐三鎮素有無君之心及李克用誅行瑜心常切齒去嵗車駕將幸河東乃令延王戒丕使太原見克用陳省方之意是月延王還韓建奏曰陛下即位以來與近輔交惡皆因諸王典兵凶徒樂禍遂致輿駕不安比者臣奏罷兵權實慮有不測之變今聞延王覃王尚苞隂計願陛下宸斷不疑制於未亂上曰豈至是耶數日以上無報乃與知樞密劉季述矯制發兵圍十六宅諸王懼披髮沿垣而呼曰官家救兒命是日通王覃王已下十一王并其侍者皆為建兵所擁至石隄谷無少長皆殺之而建以謀逆聞舊唐書昭宗本紀州按鑑注石隄谷在華西冬十月同州刺史李瑭棄州走命王建兼領同州乾寧四年十月癸卯制韓建兼匡國軍節度使長春宫使初李瑭領同州瑭茂貞之養子也時帝自播遷已來怒茂貞未巳將遣宰臣孫偓理駕下車及率諸鎮討之韓建纍諫故未果行瑭知之逃鳳翔及是命建兼之時建亦陳讓詔曰卿才本濟時道惟師古備見忠勤之效莫非傾盡之心允謂良臣宜膺重寄會同州元戎失職軍旅不安况接行朝尤思得師是用資爾兼領鎮乎危邦冀疲療之漸蘇而煙塵之徹警何乃遽陳章表過有撝沖方藉當仁豈宜多讓固難依允無至再三尋遣供奉官祁彥祥宣賜旌節官告至建理所尋授焉建已兼判京兆尹有跋扈之志而致瑭之去鎮人亦意建所搖動也册府元龜建既殺諸王乃營南莊起樓閣欲邀昭宗遊幸因以廢之其父叔豐謂建曰汝陳許間一田夫爾遭時之亂蒙天子厚恩至此欲以兩州百里之地行大事覆族之禍吾不忍見不如先死因泣下歔欷李茂貞梁太祖皆欲發兵迎天子乃止五代史韓建傳置鳳翔行營討李茂貞以彰義節度使張璉為鳳翔西北行營招討使以討李茂貞削奪新西川節度李茂貞官爵姓名宋文通通鑑光化元年春正月罷諸道行營兵上下詔罪已息民復李茂貞姓名官爵應諸道討鳳翔兵皆罷之茂貞韓建皆致書於李克用言大駕出幸纍年乞修和好同奬王室兼乞丁匠助修宫室克用許之通鑑夏四月帝如陟屺六月如西溪昭宗光化元年車駕在華州四月幸陟屺寺宴從官於韓建所獻御莊六月幸西溪觀競渡册府元龜秋八月帝至自華州八月壬戍至自華州甲子大赦改元唐書昭宗本紀三年冬十一月中尉劉季述王仲先等反幽帝於東宫而立太子裕時昭宗委崔胤以政胤恃全忠之助稍抑宦官而帝自華還宫後頗以禽酒肆志喜怒不常自宋道弼等得罪黃門尤懼至是上獵苑中醉甚是夜手殺黃門侍女數人庚寅日及辰巳內門不開劉季述詣中書謂宰相崔胤曰宫中必有不測之事人臣安得坐觀即以禁兵千人破關而入問訊中人具知其故出與宰臣謀曰主上所為如此非社稷之主也廢昏立明具有故事國家大故非逆亂也即召百官署狀崔胤等不獲已署之季述仲先與汴州奏官程巖等十三人請對對訖季述上殿次左右將士齊唱萬嵗聲遂突入宣化門行至思政殿便行殺戮徑至乞巧樓下帝遽見兵士驚墮牀下起而將去季述仲先掖而令坐何皇后遂出拜曰軍容長官護官家勿至驚恐有事取容商量季述即出百官合同狀曰陛下倦臨寶位中外羣情願太子監國請陛下頤養於東宫何皇后曰聖人依他軍容語即於御前取國寶付季述即時帝與皇后共一輦並常所侍從十餘內人赴東宫季述手自扄鎖院門日於窗中通食器是日迎太子監國矯宣昭宗命稱上皇舊唐書昭宗本紀十一月左右神策軍中尉劉季述王仲先樞密使王彥範薛齊偓作亂皇帝居於少陽院季述以皇太子裕為皇帝唐書昭宗本紀天復元年春正月朔神策指揮使孫德昭等討劉季述等皆伏誅上復於位黜太子裕為德王神策指揮使孫德昭自季述等廢立常憤惋不平崔胤聞之遣判官石晉説之曰今反者獨季述仲先爾公誠能誅此二人迎上皇復位則富貴窮一時忠義流千古茍狐疑不決則功落他人之手矣德昭曰相公有命不敢愛死遂結右軍都將董彥弼周承誨謀以除夜伏兵安福門外以俟之正旦仲先入朝德昭擒斬之馳詣少陽院叩門呼曰逆賊已誅請陛下出勞將士何后不信曰果爾以其首來德昭獻其首上乃與后毁扉而出崔胤迎上御長樂門樓率百官稱賀周承誨擒劉季述王彥範繼至方詰責已為亂梃所斃薛齊偓赴井死出而斬之滅四人之族並誅其黨二十餘人上曰裕幼弱非其罪黜為德王賜德昭姓名李繼昭承誨姓名李繼誨彥弼亦賜姓皆以使相留宿衛賞賜傾府庫時人謂之三使相上寵待胤益厚綱目李愚唐末隨計之長安劉季述廢立愚痛憤乃求見華帥韓建致書曰明公地處要衢位兼將相自宫圍變故已涉旬時若不號令率先以圖反正一朝山東侯伯唱義連衡鼓行而西明公求欲自安如何決策不如馳檄四方喻以順逆軍聲一振則元凶破膽而浹旬之間二豎之首傳於天下計無便於此者建深禮遇之堅辭還山墅建草檄欲布於諸鎮事未集而崔中書殺二凶昭宗反正册府元龜冬十一月韓全誨劫帝如鳳翔朱全忠取同華二州韓全誨聞朱全忠將至令李繼麟李彥弼等勒兵劫上請幸鳳翔是日開延英全誨等侍側李繼筠遣兵掠內庫寶貨法物全誨遣人密送諸王宫人先之鳳翔上遣中使召百官皆辭不至全誨陳兵殿前言於上曰全忠欲劫天子幸洛陽求傳禪臣等請奉陛下幸鳳翔收兵拒之上不許拔劒登乞巧樓全誨等逼上下樓李彥弼即於御院縱火上不得已與后妃諸王百餘人皆上馬慟哭而出李茂貞出迎上下馬慰接之還入鳯翔全忠議引兵還張濬説之曰韓建茂貞之黨不取之必為後患乃引兵逼其城建單騎迎謁全忠以建為忠武節度使以兵送之車駕之在華州也商賈輻輳建重征之得錢九百萬緡至是全忠盡取之是時京師無天子行在無宰相崔胤等請全忠西迎車駕全忠復書曰進則懼脅君之謗退則懷負國之慚然不敢不勉綱目梁太祖天復元年十月戊戍奉密詔赴長安是時軍國大政專委宰相崔胤每事裁抑宦官宦官側目崔一日於便殿奏欲盡去之全誨等於昭宗前訴之昭宗不得已罷崔知政事崔怒急召帝請以兵入輔故有是行戊申行次河中同州留後司馬鄴華之幕吏也舉郡來降辛亥駐軍於渭濵華帥韓建遣使奉箋納欵又以銀三萬兩助軍是日行次零口癸丑聞長安亂昭宗為閹官韓全誨等劫遷西幸鳳翔蓋避帝之兵鋒也翼日遂命旋師夕次於赤水乙卯大軍集於華州城下韓建惶駭失措即以城降丙辰帝表建權知忠武軍事促令赴任同華二州平册府元龜朱全忠引兵逼鳳翔還取邠州全忠軍駐赤水崔胤令户部侍郎王溥至赤水寨促全忠以兵迎駕戊午全忠自赤水趨長安崔胤率文武百寮太子太師盧知猷己下迎於坡頭庚申汴軍趨鳳翔戊辰至岐下全忠令判官李擇裴鑄入城奏事言臣在河中得崔胤書言奉密詔令臣以兵士迎駕臣不敢擅自迎鑾昭宗怒胤矯命連詔全忠以兵士還鎮辛未全忠引軍離鳳翔退攻邠州甲戌制崔引可責授朝散大夫邠州節度使李繼徽以城降舊唐書昭宗本紀全忠至鳳翔軍於城東茂貞登城謂曰天子避災非臣下無禮讒人誤公至此全忠報曰韓全誨劫遷天子今來問罪迎扈還宫岐王若不預謀何煩陳諭上屢詔全忠還鎮全忠乃拜表奉辭移兵趣邠州李繼徽請降綱目梁兵攻李茂貞於岐以懷英為先鋒至武功擊殺岐兵萬餘人太祖喜曰邑名武功真武功也以名馬賜之五代史康懷英傳十二月朱全忠屠盩厔全忠遣朱友寧攻盩厔不下全忠自往督戰盩厔降屠之令崔胤率百官及京城居民遷於華州通鑑二年春正月以嚴龜為汴岐和協使朱全忠屯三原又移軍武功丙子以給事中嚴龜充岐汴和協使賜全忠姓李與茂貞為兄弟全忠不從通鑑二月戊寅上以久駐兵車於三原乃議東歸遂取髙陵櫟陽左馮翊入於蒲津編遺録夏四月梁將朱友寧大敗岐兵於武功天復二年四月友寧引兵西至興平及李茂貞戰於武功大敗之五代史梁太祖本紀夏六月朱全忠圍鳳翔崔胤詣河中泣訴於全忠恐茂貞劫天子幸蜀宜以時奉迎勢不可緩鳳翔人聞朱全忠且來皆懼城外居民皆遷入城六月丁丑全忠軍於虢縣甲申李茂貞大出兵自將之與朱全忠戰大敗丙戍全忠遣其將孔勍出散關攻鳳州拔之丁亥全忠進軍鳳翔城下全忠朝服嚮城而泣曰臣但欲迎車駕還宫耳不與岐王角勝也遂為五寨環之秋七月孔勍取成隴二州通鑑天復二年四月符道昭復領大軍屯於虢縣之漠谷其建寨之所前臨巨澗後倚峻阜險不可升太祖遣懷英提騎數千急擊之道昭以懷英兵寡有俯視之意乃率甲士萬人絶澗以挑戰懷英始以千騎交鬬戰酣發伏以擊之岐軍大敗册府元龜秋八月鄜帥李周彝救鳳翔朱全忠遣兵擊敗之秋八月鄜帥李周彝屯軍於三原以援鳳翔太祖命懷英討之周彞拔軍而遁追至梨園因攻下翟州擒其守來獻俄而岐軍屯奉天太祖令懷英寨於岐軍之東北以備敵人一夕岐軍大至急攻其營懷英獨以三千餘人抗數萬之衆自乙夜至四鼓岐軍不勝而退册府元龜是時李周彝以鄜坊兵救岐屯於三原懷英擊走之因取其翟州而還岐兵屯奉天懷英柵其東北夜半岐兵攻之懷英以為夜中不欲驚它軍獨以二千人出戰遲明岐兵解去身被十餘瘡李茂貞與梁和昭宗還京師賜懷英迎鑾毅勇功臣五代史康懷英傳王建取興元西川軍假道於興元節度使李繼密遣兵拒之西川前鋒將王宗播攻之遂破金牛黑水西縣褒城四寨繼密戰敗奔還漢中西川軍乘勝至城下王宗滌率衆先登遂克之繼密請降得兵三萬騎五千詔以宗滌為山南西道節度使通鑑天復初李茂貞韓全誨劫遷車駕在鳳翔梁祖攻圍歷年建外修好於汴指茂貞罪狀又隂與茂貞問使往來且言堅壁勿和許以出師赴援因分命諸軍攻取興元比及梁祖解圍茂貞山南諸州皆為建所有因自置守將册府元龜九月李茂貞攻朱全忠營岐兵大敗梁祖宿兵岐下以迎昭宗敵壘尚堅且思班退親從指揮使髙季昌抗言曰天下雄傑窺此舉者一載矣今姦黨已窘奈何更少俟之季昌乃密募人入岐為告事者有騎卒馬景應命因朱友倫總騎軍且至將大出兵迓之景請因其時給駿駟雜出隊中十許里躍馬西走逸岐闉以軍怨東遁為告言列寨留卒尚萬候夕將逝宜速掩之當落我機內矣是往也必無生理願録其孥梁祖凄然止其行景固請乃徇之明日軍出諸寨屏匿如無人不十里果策騎却走岐人納之不失厥料岐軍啓兩扉悉衆來我師宿已秣馬飽士中軍一鼓百營俱進岐軍十不存三四李茂貞喪膽北夢瑣言洋州降於王建冬十月建取興州武定節度使李思敬以洋州降王建冬十月建攻拔興州以軍使王宗浩為興州刺史通鑑鳳翔食盡朱全忠奉表迎車駕朱全忠遣幕僚司馬鄴奉表入城獻食物繒帛復遣使請與茂貞連和修宫闕迎車駕上亦遣使齎詔賜之鳳翔軍夜縋降汴軍者甚衆茂貞疑上與全忠有密約增兵防禦是冬大雪城中食盡凍餓死者不可勝計或卧未死肉已為人所剮茂貞儲偫亦竭以犬彘供御膳上鬻御衣及小皇子衣於市以充用綱目昭宗在鳳翔宴侍臣捕池魚為饌李茂貞曰本畜此魚以候車駕又以巨杯勸帝酒帝不欲飲茂貞杯叩帝頤頷坐皆憤其無禮汴人列十餘棚攻岐城掘蚰蜒濠時城中大窘燒人糞煮人肉而食李茂貞不肯與梁和昭宗諭曰在內公主美人等一日食粥一日食不托今已竭矣願速與梁和大中遺事十一月朱全忠遣兵襲鄜州取之十一月鄜坊李周彝以兵救鳳翔王遣孔勍襲鄜州虜周彝之族徙於河中周彝乃降是時岐兵屢敗而圍久城中食盡自天子至後宫皆凍餒五代史梁太祖本紀孔勍李暉領兵襲鄜州以牽周彝之兵攻陷鄜牆獲周彝親族遂令李暉權知鄜畤軍事不數日周彝遣幕賔投分通好然後上許抽兵編遺録三年春正月平盧節度使王師範遣兵襲華州韓全誨等矯詔召諸鎮兵擊梁詔至青州師範泣曰諸鎮有兵所以藩扞天子今天子危辱而諸鎮反以兵自衛吾力雖不足當成敗以之乃遣張居厚以壯士二百為輿夫伏兵輿中西馳梁軍稱師範使者聘梁欲劫梁太祖居厚至華州東城華州將婁敬思疑其有異剖視之見其兵居厚遂擊殺敬思以兵攻西城不克而反五代史王師範傳車駕發鳳翔正月甲子車駕出鳳翔幸全忠軍乙丑扶風令朱友倫總兵侍衛丙寅次武功丁卯次興平宰臣崔胤率百官迎謁舊唐書昭宗紀茂貞請遣使諭全忠軍詔崔構挾中人郭遵誨往既行又命宫人寵顏馳見全忠諭密旨乃以蔣元暉入衛二日茂貞獨見至日旰全誨恨甚自見勢去計無所用帝召韓偓執手涕泗曰今先去四大惡餘以次誅矣於是內養八輩候廷中授命每二輩以衛士十人取一首俄而全誨等皆死是夜誅韋處廷等二十二人悉以首納布囊詔送全忠曰是皆不肯使乘輿東者既斬之矣全忠大喜遍告軍中茂貞復誅小使李繼彝等十人於是開壘門全忠猶攻北壘帝遣寵顔賜御巾箱寶器使罷兵又捕殺中官七十人全忠亦使京兆誅黨與百餘人天子入全忠軍全忠泥首素服待罪客省傳呼徹三仗有詔釋全忠罪使朝服見全忠伏地泣曰老臣位將相勤王無狀使陛下及此臣之罪也帝亦嗚咽命韓偓起之解玉帶以賜召之食帝顧衛兵或有憤發者因履係解目全忠為吾繫之全忠跪結履汗浹於背而左右莫敢動唐書韓全誨傳天子出幸梁軍遣使馳詔崔胤胤託疾不至王使人戲胤曰吾未識天子懼其非是子來為我辨之天子還至興平胤率百官奉迎王自為天子執轡且泣且行行十餘里止之見者咸以為忠五代史梁太祖傳帝至自鳳翔天復三年正月己巳天子至自鳳翔素服哭於太廟而後入殺宦者七百餘人五代史梁太祖本紀車駕入長安崔胤奏以宦官典兵預政傾危國家不剪其根禍終不已上從之全忠遂以兵驅第五可範已下數百人盡殺之寃號之聲徹於內外其出使外方者詔所在誅之止留黃衣幼弱者三十人以備灑掃其兩軍八鎮兵悉屬六軍以胤兼判六軍十二衛事綱目梁趙珝昭宗天復元年徵為同州節度留後時太祖統軍岐下珝在馮翊輸挽調發旁午道途俄而昭宗還長安詔徵入覲錫迎駕功臣之號册府元龜冬十月李茂貞李繼徽舉兵逼京畿朱全忠之克邠州也執靜難節度使楊崇本妻於河中而私焉崇本怒使謂茂貞曰唐室將滅父忍坐視之乎遂相與連兵侵逼京畿復姓名李繼徽全忠恐其復有劫遷之謀乃發兵屯河中綱目天祐元年春正月朱全忠表請遷都帝發長安正月己酉全忠率師屯河中遣牙將冦彥卿奉表請車駕遷都洛陽全忠令長安居人按籍遷居徹屋木自渭浮河而下連甍號哭月餘不息秦人大罵於路曰國賊崔胤召朱溫傾覆社稷俾我及此天乎天乎丁巳車駕發京師舊唐書昭宗本紀汴人擁兵殺宰相崔胤京兆尹鄭元規劫遷車駕移都東洛既入華州百姓呼萬嵗帝泣曰百姓勿唱萬嵗朕勿能與爾等為主也沿路有思帝鄉之詞乃曰紇干山頭凍死雀何不飛去生處樂况我此去悠悠未知落在何所言訖泫然流涕北夢瑣言太祖謀欲遷都洛陽遣彥卿奉表請遷都昭宗顧瞻陵廟倣徨不忍去行至華州遣人告太祖以何皇后有娠願留華州待冬而行太祖大怒顧彥卿曰汝往趣官家來不可一日留也彥卿復馳至華即日迫昭宗上道五代史冦彥卿傳二月王建遣兵迎車駕至興平而還上遣間使以御劄告難於王建建遣王宗祐將兵會鳳翔兵至興平遇汴兵不得進而還建始自用墨制除官云俟車駕還長安表聞綱目夏六月邠岐蜀傳檄討朱全忠遣兵屯同州以拒之六月李茂貞王建李繼徽傳檄合兵以討朱全忠全忠以鎮國節度使朱友裕為行營都統將步騎擊之命保大節度使劉鄩棄鄜州引兵屯同州通鑑哀帝天祐二年秋八月王建取金州建遣王宗賀等將兵擊昭信節度使馮行襲於金州所向皆捷行襲奔均州其將全師朗以城降更師朗姓名曰王宗朗補金州觀察使通鑑三年秋九月劉知俊陷坊州九月乙亥梁匡國節度使劉知俊邀擊坊州之兵斬首三千餘級擒坊州刺史劉彥暉五代史劉知俊傳冬十月楊崇本起兵討朱全忠戰於美原敗績太祖天祐三年十月辛巳邠州楊崇本以鳳翔邠寧涇鄜秦隴之衆合五六萬來冦屯於美原列十五寨其勢甚盛帝命同州節度使劉知俊都將康懷英帥師禦之知俊等大破邠冦殺二萬餘衆奪馬三千餘匹擒其列校百餘人楊崇本胡章僅以身免十一月庚戍康懷英乘勝進軍遂收鄜州册府元龜李茂貞西連蜀兵會崇本攻雍華關西大震太祖以兵西至河中遣郴王友裕擊之友裕至永夀而卒梁兵乃旋崇本屯美原太祖復遣劉知俊康懷英等擊之崇本大敗自此不復東五代史楊崇本傳五年夏六月邠岐蜀連兵攻長安不克而還天祐五年六月鳳翔李茂貞邠州楊崇本會西川王建之師五萬攻長安汴將同州刺史劉知俊西京尹王重師以兵逆戰於漠谷邠岐不戰而退册府元龜陜西通志卷八十
