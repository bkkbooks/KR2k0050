body:
  text: 陜西通志巻十三山川六華州徳州耀州葭州乾州邊外邠州鄜州綏華州少華山在州南十四里連接太華雍大記太華山西八十里曰小華山山海經小華即少華郭璞注綴以二華張衡西京賦華山西南有少華山水經注鄭縣有少華山隋書地理志在鄭縣故城州北少華山在鄭縣東南十里元和志山之中峰即少華峰東為獨秀峰一名玉女峰又東為小敷峪宋元祐間小敷峪崩入峪二十三里玉女廟東有金壺峽又十里曰蒼坪又十里有仙人洞乃張三丰與華陽真人隱居處其迤北近敷峪口之峰曰阜頭峰即宋天禧五年崩處有石子坡今名石灘東西五里南北十里其崩摧遺址名半截山亦名復成山因崩而餘半故名詳見後又東為構峪又南四十里至構嶺又三十里即秦嶺也詳見後構峪口東為鳳谷山詳見後山接秦嶺南來之脉突立一峰左右兩山如舒翼然又東為三甲山又東為方山接華陰境自少華峰而西為白石峪又西為潭峪即白龍潭也又西為水峪又西為鄭南峰在州西南十里以古鄭縣名也又西為太平峪又西為飛来峰又西為小山詳見後又西為石隄峪在州西南十二里乾寧四年韓建矯殺諸王於此自南入峪曰五里泉又五里曰東岐溝又十里曰灰池又六里為千崖二岔又二里為東西石門又十五里至秦嶺度嶺十五里曰黑龍潭峽又五里為青岡坪詳見後又東南十五里為金堆城又南二十里為五勝溝接洛南境自石隄峪而西為栲栳山又西為赤隄峪入峪有葫蘆潭峪南二十五里即秦嶺嶺之南曰桃坪亦接洛南境自赤隄峪之西南為小柿原又南為短嶺自小柿原迤西曰栁村原其北曰𤓰坡古𤓰田也自𤓰坡而西南曰平原又南曰金堆峪可逹秦嶺南之金堆城自瓜坡而西北有三岔坪其右曰喬峪喬峪之麓有白龍泉黑龍泉又下曰千頃漫又迤北有原曰龍王嘴有白泉在龍王廟中噴玉濺珠澄清見底又西南有髙堂嶺下有靈湫嶺以南有李峪又西曰澗峪澗峪之北曰江村原西曰牛耳峪又西曰龍耳山詳見後又西曰箭峪又西為獨孤氏坡接渭南界州志梁田陂在州西三十里通鑑注中和三年李克用進軍乾阬黄巢將尚譲等屯軍於梁田陂太祖紀年録州乾阬在今同豐原在州西南二十里又州西南四十五里有孤相原州册小赤水流於孤相原西水經注孤相原亦謂之孤柏原又細腰原在鄭縣西南十六里以其中狹而名寰宇記孤相原在江村原北突起隆阜俗名蔚家原州新志聖山在州西南三十里赤水遵山而北曰聖山川川以山名也州册永昌中赤水南岸大山移東數百步㙲赤水漲壓張村民三十餘家唐書五行志舊圖經云垂拱四年飛土掩谷為山忽踊四峰髙二百餘丈東西五六里南北七里後立聖山廟於其上寰宇記相傳陳摶賣卜於此賈志喬峪即英山一名王喬谷一名太公谷在州西南三十里𤓰坡西州册石脆山西七十里曰英山山海經禺水出英山水經注王喬谷俗謂之太公谷即王喬隱處寰宇記喬谷即古之英山山有招谷訛招為喬也州志龍耳山在州西南四十里峰巒秀立有如龍耳賈志澗谷即符禺山在州西南四十里龍耳山北州册小華山之西八十里曰符禺之山山海經符禺水出符禺山水經注符禺山在鄭縣西南髙一百丈寰宇記符禺山即今之澗谷州志箭谷即竹山在州西南五十里州圖英山西五十二里曰竹山山海經竹水南出竹山水經注山在鄭縣西南髙一千二百六丈又竹水一名箭谷水寰宇記箭峪在龍耳山西為竹木繁植之區峪下為華州原峪西為渭南界即古竹山州志里亦見渭南縣按山海經符禺山西六十曰石脆山水經注云小赤水源出石脆山然箭峪乃大赤水所出也新志以箭峪為即石脆山恐誤青岡坪在州西南七十五里秦嶺南坪東南十五里抵金堆城為洛南界州志五龍山一名小山在州南十里山巖有風穴風出傷稼土人祀之賈志小山在飛来峰西西安府志五龍山為少華迤西之枝山石隄峪之東山五峰蜿蜒相聚峰下巖間舊有鎮風塔州新志馬嶺山在州南二十里州圖西石橋水南出馬嶺山積石據其東驪山距其西與華嶽同體水經注秦嶺在州南州圖宋太平興國三年華州言秦嶺南石洞自開遣吏馬文則秉炬視之入數十步得丹砂千二百粒獸形石六以獻文獻通考阜頭山一名半截山在州東南十五里又名半截山山册天禧五年五月華州少華山前阜頭峰越八盤嶺摧陷於石子坡東西五里南北十里潰散墳裂踊起堆阜各髙數丈長若隄岸至陷民居六社凡數百户宋史五行志寧山在州東南二十里小敷峪東以宋時山摧下建浮圖鎮之賈志山之東有獮虎峪西安府志鳳居山一名鳳谷山在州東南三十里栁子鎮南州册開元中有鳳逐二龍龍墮地化清泉二道鳳憤而死山僧以石函瘞其骨為塔覆之景泰癸酉鄉民因築城取塔磚石函始露上有刻字景祐四年重修啓函鳳脛骨長二尺圍可六寸股骨長尺五寸圍如脛骨其潔如玉語云鳳喜食龍腦故龍畏之偃曝談餘東漢辛繕隱此光武徵不至有大鳥髙五尺鷄頭鷰頷蛇頸魚尾五色備具而多青棲繕槐樹旬時不去𢎞農太守以聞百官咸以為鳳太史令蔡衡曰此鳥多青乃鸞非鳳也三公聞之咸避位辟繕不起後人因以名山縣志山上有竹泉西安府志蟠龍山一作潛龍山在州東南四十里一名潛龍山明知州桑溥甘為霖遊咏處人以其有惠政因名後山曰甘公山右一峯曰桑公臺云賈志兩山環列甲於諸山可通白崖峪白崖之東即構峪也西安府志渭水在州北十五里自渭南界來又東入華陰界西安府志渭水自白渠口東逕巒都城北又東灌水注之又東合沙溝水又東合西石橋水又東逕鄭縣故城北又東與石橋水會又東合敷水水經注在詳見圖考巒都城州西北小赤水即灌水一名高谷水在州西三十里賈志小赤水即山海經之灌水也水出石脆之山北逕蕭加谷於孤相原西東北流與愚水合又北注於渭水經注小赤水今名髙谷水寰宇記聖按州志赤水源出箭谷俗名箭谷水北流經山亦謂之聖山川又北逕州西入於渭然考箭谷水乃大赤水非小赤水也辨見渭南縣喬峪水即愚水今名遇仙橋河在州西州圖禺水出英山北流注於招水山海經禺水出英山北流與招水相得亂流西北注於灌水經注愚水出孤相原寰宇記愚水亦名喬峪水先時西自龍灣北逕杜家灣又北逕聖山村入灌水明永樂間水暴漲始東折自漁村川而下又北逕遇仙橋而北入渭因名遇仙橋河故道在今髙塘朱渠村諸處又有漁村川水舊自州西南金堆谷西北流入喬峪水後亦因水漲遂東折北流逕毛家溝又西折經車徒里入遇仙橋河或疑即古之招水也又有短嶺水源出短嶺亦流入於遇仙橋河州志即按金志鄭縣有符禺水山海經所云出符禺山者也而州志以符禺山即今澗谷則澗谷之水疑亦當合於喬峪水也西石橋水一名新鄭水今名石隄谷水又名五港河在州西十里州圖西石橋水南出馬嶺山源泉上通縣流數十丈北流注於渭闞駰謂之新鄭水水經注石隄谷水源出石隄谷北流至良侯村之北名五港河合赤隄谷水入沙澗經石橋鋪名石橋鋪河以逹於渭葢即西石橋水矣州志西溪水一名小曲江在州西南州圖西溪在華州時人目之為小曲江以杜甫為州司功時所嘗遊也潛確𩔖書西溪水源出州南山澗經故縣沙澗諸村又太平橋水在州東逕州北故興徳宫南亦謂之泥河亦謂之北溪水合西溪水入於渭州志南溪水即太平峪水一名五眼泉又名海眼泉在州城南門外源出太平峪五眼泉一名海眼泉引細流入於州城州志羅紋橋水即小敷谷水在州東南十五里源出小敷谷流經州北合於渭州册羅紋橋水源出白石峪蓋即小敷峪也州志移山潭水一名白厓湖在州東南十五里阜頭峰下即宋天禧五年崩裂處水深不測亦謂之白厓湖其潭水又滙為數區名蓮花池賈志湖之側有眠雲石州新志構峪水即沈水一名東石橋水在州東州圖石橋水故沈水也水亦南出馬嶺山北流逕武平城東又逕鄭縣東又北逕沈城北入渭水經注即武平即武城縣在州東沈城沈陽縣在州東北東石橋水源出構峪俗名構峪水北流逕石橋入渭州志新按州志構當作榖即楮木也皮可為紙今華峪多榖人以造紙作構者非方山谷水在州東與華陰接界正徳七年知州桑溥導之北流入於渭州志陰亦見華縣仰天池在州西南龍耳山西嶺有二池碧水渟泓深不可測又其一在太平峪州新志天鵝池在州東北十里東西亘三十里賈志甘泉在州學右栁巷街側深四五尺甘冽異常水旱無盈縮州册白泉在州西南四十里自沙石湧出浣衣潔白西安府志泉在良侯寺東州志馬跑泉在州西南五十里州圖在理寺村西南相傳為漢光武飲馬處州新志孝感泉在州南少華山北溝畔水極清以郡舉人張之榘名也州志龍泉井在州東南四十五里蟠龍南嶺之東深二尺許極旱不涸州册華陰縣華嶽在縣南十里縣志太華山在華陰縣南有祠漢書地理志華陰縣有華山隋書地理志關内道名山曰華山唐書地理志圖詳見考好漢山在縣西南十五里縣册在仙谷西以山勢雄壯名縣志車箱谷在縣西南二十五里一名車子渦去敷水谷七里深不可測祈雨者以石投之其中有一鳥飛出應時獲雨寰宇記車箱入谷無多路唐杜甫詩良餘山一作餘良在縣西南縣圖良餘水出良餘山水經注餘良山在縣西南三十里寰宇記大敷谷一名羅敷谷在縣西南三十里一名羅敷谷曰大敷者别於小敷也入谷十三里為相公嶺縣志其相近者曰天台山曰竹谷縣册蔥谷在縣西南三十五里又其西有大谷縣册秦嶺在縣南屬華洛分壌之界西接華郡東抵潼關懸崖叠嶂髙不可攀通行者皆曲徑實終南一脉縣志松果山在縣東南縣圖在縣東南二十七里寰宇記錢来之山西四十五里曰松果山濩水出焉北流注於渭山海經有灌水出松果之上即今潼谷水水經注華陰縣有松果山金史地理志山通襄鄧之間道上有佛頭崖雲覆其頂輒雨其西曰水谷又西曰靈谷泥泉水所出也縣志瑞村原在縣東南二十八里縣册在潼關西南十里其稍北為金盆原其稍南為孟村原潼關衞舊志朝陽山一名留翎巑在縣東南三十里又相近有龍文山縣册世傳楊伯起葬時大鳥落羽於此又名留翎巑賈志山勢嵯峨有大郎廟有二泉禱雨多應又其西曰蒲谷縣志黄河在縣東北四十里自朝邑界南逕縣東北與渭水合又東入潼關界縣圖河水南至華陰潼關歴船司空與渭水會水經注縣船司空故城在東北黄河自龍門南下經本縣東北葫蘆灘寺南至潼關折而東注寺南即渭亂河處縣志考詳見圖渭水在縣北二十里自華州界来與同州朝邑接界又東流入於河是曰渭口縣圖渭水東入河水之隈曲曰汭杜預左傳注渭水自合石橋水又東敷水注之又東良餘水注之又東合黄酸之水又東逕平舒城北又東逕長城北長澗水注之又東逕華陰縣北洛水入焉闞駰以為漆沮之水又東沙渠水注之又東逕定城北又東泥泉水注之又東入於河春秋之渭芮也水經注定平舒故城在縣西北城在縣東葫蘆灘在縣東北舊洛水入渭處縣册蘆按禹貢錐指洛水自朝邑界来歴華陰之葫灘入渭今則東過朝邑之趙渡鎮徑入於河不復至華陰入渭矣並詳見圖考蔥谷水在縣西三十五里源出蔥谷經臺頭村東北至庄子村入渭又有方山谷水在縣西水不常有潦則直北兼受華州諸水浸溢而東合於蔥谷水縣志敷水在縣西二十五里源出大敷谷入谷三里有百索潭又南有撾鼓潭皆敷水之源也其谷受秦嶺以北東西諸水故其流最大經敷水鎮東