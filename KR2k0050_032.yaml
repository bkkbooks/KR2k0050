body:
  text: 陜西通志卷三十二選舉三舉人貢生館學生舉人下本朝會典鄉試中額順治二年陜西省中式七十九名內寧夏丁字號中二名甘肅聿字號中二名八年恩詔陜西加十名十一年陜西加中五名十七年鄉試照舊額減半陜西中四十名內丁字號聿字號各中一名康熙八年陜西加中七名十六年特行鄉試陜西會在河南考試科舉十五名取中一名二十年恩詔加二十三年鄉試中額小省三名按陜西例入小省則例全書康熙三十五年各省鄉試增額陜西增十三名共取中五十三名四十二年恩詔加四十四年鄉試舉人小省三名按陜西例入小省五十年鄉試廣額陜西增十名五十二年萬壽開科照順治丙戌科例於二月內舉行鄉試康熙六十一年禮部等議準於雍正元年特開恩科四月舉行鄉試癸卯科鄉試改期於雍正二年二月舉行恩詔內鄉試大省廣三十名次省廣二十名小省廣十名陜西例入小省於雍正元年廣額一次其癸卯正科仍照定例取中雍正八年恩詔加十一年直省鄉試舉人每中額十名加中一名陜西加中七名又題定神木等八縣另編木字號於本省額內取中一名五經中額康熙四十一年鄉試各省加中三名五十年各省再加中額一名至五十六年而罷雍正二年以入場卷數擬定計中額十九名五分加五經中額一名陜西加五經三名順治二年乙酉科劉鴻磐韓城人王孫蔚臨潼人進士曹連擢三原人進士髙而明臨潼人御史權持世三原人同知孔庭訓三原人李魯西安人李彥珂三原人進士王鼎新洋縣人知縣王連壁興平人談公鼎城固人知縣朱賚涇陽人知府張飬元乾州人馮步京三原人解體健韓城人進士竇士範蒲城人進士孟化龍渭南人知州馬以懋乾州人知縣劉珂武功人知縣蕭居善長安人王演碧三原人雷虹玉西安人許應鯤褒城人知縣李昌年涇陽人孟孔脈富平人知縣周世昌三原人知縣趙昌期臨潼人知縣李𢎞祚涇陽人每可薦長安人侯于唐三原人進士王元士臨潼人進士唐引嚳渭南人知縣王克敬蒲城人王繼佑富平人王報春朝邑人田緝馨渭南人推官薛胤隆韓城人進士梁天植城固人趙景武三原人秦養亷三原人田萃禎富平人進士陳于宸漢中人同知米襄蒲城人進士王道隆富平人進士溫樹珖三原人進士吕貫一城固人王一麟臨潼人李振藻安定人張映奎涇陽人王名世涇陽人劉在宸富平人楊本春澄城人進士朱士淳漢中人趙王堂麟遊人御史劉儀恕涇陽人知府史具勳華隂人進士劉培引三原人李引重同州人馬仲融綏德人進士李復元寶雞人知府熊焯南昌人咸寧籍進士劉禆中部人進士管抒素咸寧人進士雷噓和華隂人進士馬獻墀同州人郭嶷然朝邑人知縣王廷機岐山人進士李映曇咸寧人進士雷豫蒲城人李鵬鳴富平人給事中馬軼倫三原人吳用光髙陵人進士田俊民三原人張鯤翔華州人進士孫文燦三原人王瑞徴西安人魏象引富平人張奠乾藍田人史三榮欣州籍華隂人進士郭礎江都籍涇陽人進士李遵度山西籍韓城人進士順治三年丙戌科劉綋洛川人進士趙九齡涇陽人雷景遇郃陽人知縣張璿三原人王珏淳化人知縣李巢鳯咸寧人髙向盩厔人趙鶚薦涇陽人進士薑修仁三原人答思表三原人王日升扶風人李文芳三原人陳有虞富平人進士郭行義咸寧人進士賈𢎞祚韓城人進士郗翼宸華隂人南廷鉉渭南人松威道趙曬盩厔人進士馬維騏髙陵人咱文燦三原人李子燮同州人進士王鏷朝邑人任湛然華隂人張星燦髙陵人周皥宇朝邑人知縣王汝清韓城人張文士咸陽人朱廷璟富平人進士黨之煌三原人吉允迪洋縣人進士劉彥明三原人張珥同州人進士簡敬蒲城人黃正色乾州人王家任三原人栁作棟同州人張蘭階三原人魏墀蒲城人進士韓文富平人魚飛漢髙陵人進士劉繼佑涇陽人進士潘珫華州人宋學朱漢中人知縣張之鳯華隂人知縣劉耀咸寧人朱國傑臨潼人知縣何翊漢西安人和鹽鼎城固人御史楊在階三原人知縣王秉直南鄭人進士劉璽朝邑人進士南儀安定人進士王承祖渭南人侍郎袁沛三原人李奎璧咸寧人孫爾思西安人郭如儼涇陽人進士石朗三原人孫自俊同州人知縣王慎蒲城人張顧恆韓城人蔣如松渭南人知縣范應侯富平人李振鱗韓城人萬户侯咸寧人王丕振朝邑人盧開象盩厔人徐可言同州人張鳴珂同州人知縣王士魁三原人巢逵翔涇陽人張四明涇陽人劉鴻名長安人邢祥涇陽人同起禎蒲城人張聖溥富平人胡焜咸寧人知縣嶽徴珽宣府籍延安人郝惟訥霸州籍綏德人進士順治五年戊子科王帷籌華州人知縣龔廷擢南鄭人推官劉生韻洛川人髙上臨潼人許洪範白水人王應運三原人李濟富平人知縣劉希孔咸寧人薛侯咸寧人一云三原人張象燦西安人張重齡涇陽人主事盧世傳西安人邢惟範遼學白意澄城人知縣荆彥涇陽人進士張寅陽甘泉人張謐扶風人索景淑蒲城人索景藻蒲城人進士姚運昌咸陽人進士杜希旦長安人進士張衛獻渭南人劉運昌三原人王廷閣三原人進士趙雲龍雒南人進士韓斗耀蒲城人黃士英漢中人尚達涇陽人劉璿西安人黃玉鉉洋縣人進士魏翰遼學張鐸朝邑人強體道涇陽人衛運揚韓城人進士原合瑾蒲城人劉可盈富平人雷鏡蒲城人知州王孫盛臨潼人知府趙天錫膚施人王者都韓城人進士薛訥渭南人王元衡臨潼人進士吳國玥渭南人劉矩宗渭南人田徵瑞富平人陳正已富平人趙之忭涇陽人黃如暗綏德州人李可喬城固人進士王允纘涇陽人知縣趙子三乾州人王自修涇陽人進士解士秀延安人白昌宸清澗人楊紹武富平人進士吳有善府谷人魯克念漢中人蘇仁蒲城人張好竒朝邑人進士郭璜華州人王函朝