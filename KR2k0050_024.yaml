body:
  text: 陜西通志卷二十四貢賦一民地民丁黃壤之區厥田上上􅖽秸輸將用答井養緬懷豳岐徹法是創九式聿頒勞民勸相慨租庸調徴書並降仁牧鑒兹憫農瘁况經費實邉出入凖量薄斂輕徭秦封保障作貢賦志第十民地民丁國朝陜西布政使司所屬原額民地並王駙馬太府遺留各等共地叁拾捌萬玖千捌伯肆拾叁頃㭍拾㭍畝肆分捌釐叁毫㭍絲肆忽二微二纎陸塵內除荒并包賠折正永豁衝崩外實熟地二拾伍萬伍千叁伯陸頃伍拾伍畝伍分㭍釐㭍毫捌絲捌忽叁微捌纎伍塵二渺實徴本色糧叁萬一千捌伯㭍拾一石玖斗叁升㭍合二勺叁抄一撮玖圭伍粟捌粒叁顆㭍粳啇南縣本色糧折價銀二拾一兩伍錢玖分肆釐陸忽㭍微一纎捌渺叁漠玖沙本色官學倉糧折徴銀叁千一伯伍拾㭍兩陸錢叁分㭍釐㭍毫玖絲二微伍纎叁塵肆渺捌漠折色糧徴銀除停緩停徴外止該銀一伯一拾伍萬玖千伍伯二拾叁兩一錢一分二釐叁毫肆絲一忽捌微捌纎玖塵叁渺玖漠一沙叁洙本色草陸千一拾捌束一拾玖斤㭍兩捌錢伍分叁釐陸毫歷年開墾地一千捌伯陸拾㭍頃捌拾畝伍分玖釐叁毫肆絲肆忽二微叁纎玖塵肆渺該徴本色糧捌石陸升㭍合捌勺伍抄二撮捌圭叁粟㭍粒伍顆叁粳捌粃啇南縣本色糧折價銀叁兩一錢玖分肆釐叁毫伍絲二忽陸纎玖塵一渺陸漠㭍沙本色官學倉糧折徴銀二兩一錢叁分伍釐玖毫陸絲捌忽肆微陸纎陸塵肆渺㭍漠叁沙折色糧徴銀㭍千捌伯捌拾兩二錢叁分叁釐捌毫捌絲伍忽一微玖纎捌塵㭍渺肆漠二沙肆洙肆涯又本色草一拾捌斤一拾兩陸錢一分外新收續收勳田等項共地肆伯叁拾一頃叁拾捌畝玖分二毫捌絲該徴本色糧伍斗㭍升玖合折色並租課等項糧折徴銀叁千叁伯肆拾叁兩肆錢捌分一釐玖毫一絲捌忽㭍微㭍纎叁塵伍渺額外清丈自首開墾河灘沙淤溝坡共地一千一伯二拾叁頃一拾捌畝一分伍釐肆毫叁絲叁忽伍微除衝決并荒免外實在地捌伯二頃捌拾一畝玖分二釐一毫伍絲肆忽叁微實徴本色糧叁拾㭍石叁斗肆升伍合㭍勺肆抄肆粟㭍粒㭍顆折色糧徴銀二千陸伯一拾伍兩捌錢陸釐一毫叁絲二忽伍微一纎肆塵玖渺叁漠又退灘地捌頃伍拾陸畝㭍分零該徴租糧叁拾叁石捌升肆合肆勺又首報糧條銀叁兩二錢叁分一釐又火者小麥變價銀玖拾二兩一錢伍分又額協鞏昌驛站銀肆兩玖錢㭍釐伍毫一絲二忽伍微肆纎伍渺停免並軍籍糧銀二萬一千陸伯玖拾玖兩二分玖釐捌毫一忽一微捌塵捌渺二漠原額均徭銀一拾伍萬二千二伯陸拾肆兩捌釐捌毫陸絲㭍忽㭍纎叁塵玖渺內除荒並包賠折正永豁衝崩及停徴停緩外止實徴銀一拾萬捌千捌伯㭍拾捌兩玖錢二分一毫一絲玖忽捌微肆塵叁渺陸漠玖沙捌洙歷年開墾地畝清丈自首河淤溝坡等地並停免均徭銀共二千伍伯玖拾玖兩二錢玖分㭍釐㭍毫㭍絲肆忽叁微一纎一渺伍漠肆沙一洙一涯協濟膚施縣額解本府儒學廪生月糧並自首全裁充餉及中部縣裁舉人花盤銀除荒外實徴銀伍拾捌兩肆錢肆分肆釐肆毫一絲陸忽肆微二纎玖塵㭍渺年例盤纒銀除荒外實徴銀二拾玖兩一錢玖釐伍毫一絲肆忽陸微肆纎捌塵肆渺山谷陵租並牌坊花盤鞘價各項共銀玖拾二兩叁錢一分㭍釐㭍毫陸絲二微叁纎捌塵伍渺又茅香細辛地骨皮郁李仁增折價銀不等並藥味撥餉共銀叁拾叁兩叁錢叁分㭍毫二絲肆忽㭍微玖纎肆塵伍渺又柴山祭祀招民開墾青陽等驛地糧銀二伯二拾㭍兩伍錢一分捌釐叁毫伍絲二忽陸微叁纎㭍塵二渺興安州丈出水淤地內本色祿米二斗陸升叁勺一抄又漢興二府州屬本色祿米除荒免並停徴停緩外及歷年新墾祿米伍伯一石肆斗陸升叁合陸勺㭍抄二撮叁圭㭍粟玖粒肆顆按本色祿米新懇祿米本係兩項今統敘後倣此外開山等十驛地畝玖釐銀除停徴外並歷年新懇銀一伯㭍兩二錢二分二釐捌毫㭍絲捌忽二微陸纎伍塵叁渺開山等驛折色糧徴銀除豁免並停徴外及厯年新墾銀一伯伍拾玖兩玖錢陸分㭍釐一絲捌忽捌微一纎二塵二渺又折色草除豁免並停徴外及厯年新墾草銀一拾玖兩叁錢一分二釐㭍毫玖絲㭍忽伍微又開山等驛本色糧除豁免並停徴外及厯年新墾糧伍伯二拾玖石陸斗㭍合肆勺玖抄二撮㭍圭陸粟原額民丁共折下下丁二伯陸拾㭍萬伍千肆拾㭍丁除優免逃亡包賠並停緩外止該丁二伯玖萬陸千玖伯陸拾肆丁厯年招回編審清查自首除豁免太監王忠孝丁外共肆萬叁千捌伯肆拾伍丁雍正伍年以糧載丁共均丁銀二拾萬伍千㭍伯伍拾肆兩伍錢伍分陸釐玖毫肆絲伍忽㭍微肆塵陸渺捌漠永不加賦丁肆千肆伯陸拾玖丁額外匠價盤纒并課程及延安府稅課司課程共銀肆千㭍伯捌拾二兩一錢叁分㭍釐陸毫陸絲按匠價盤纒課程非地丁所出未載丁銀故列於後起運本色糧二萬玖千㭍拾玖石伍升陸勺陸撮伍圭伍粟一粒玖顆一粳存留本色糧叁千玖伯叁石二斗玖升伍合玖抄叁撮肆圭叁粟一粒玖粳捌粃起運本色草陸千一拾玖束一拾捌斤二兩肆錢陸分叁釐陸毫按民地內本色草每束以二拾斤為率後倣此起運銀一伯二拾陸萬玖千一拾叁兩㭍錢㭍分陸釐玖毫㭍絲一忽捌微二纎伍塵伍渺叁漠㭍沙㭍洙伍涯遇閏加徴銀㭍千二伯叁拾捌兩玖分㭍釐肆毫伍絲㭍忽玖微捌纎㭍塵捌渺伍漠伍洙按起運省總入延安府額外課程銀方合遇閏銀倣此存留銀二拾伍萬二千㭍拾肆兩捌錢㭍分叁釐㭍毫捌微肆纎伍塵叁渺捌沙玖洙遇閏加徴銀捌千陸伯一拾叁兩二錢肆分二釐㭍絲二忽陸微捌塵二渺捌漠叁沙伍洙又遇閏存留不敷在起運正項內撥銀叁伯陸拾捌兩伍錢一分陸釐陸亳玖絲㭍微㭍纎二塵叁渺伍漠西安府屬原額民地各等共地一拾萬一千一伯一拾捌頃一分伍釐一毫伍絲捌忽一纎內除拋荒豁免外實熟地玖萬捌千㭍伯陸拾捌頃伍拾一畝陸分叁釐㭍絲肆忽叁微一纎實徴本色糧陸千捌伯叁拾二石二斗㭍升伍合陸勺伍抄肆撮叁圭叁粟二粒陸顆伍粳折色糧徴銀肆拾玖萬伍千伍伯玖拾肆兩叁錢捌分叁釐玖毫二絲玖忽捌微叁纎捌塵捌渺叁沙伍洙歷年開墾共地叁頃二拾叁畝伍分叁毫該徴折色糧銀一拾伍兩㭍錢陸分捌釐玖毫㭍絲㭍忽叁微肆纎肆塵肆渺又新收續收並勳田等項共地陸拾一頃叁拾一畝二分陸釐捌絲該徴本色糧伍斗㭍升玖合保安府莊基並租課及折色各項共折徴銀捌伯玖拾叁兩一分伍釐捌毫肆絲玖忽二徴伍纎陸塵二渺外清丈自首溢額並首報租地共肆伯㭍頃叁拾一畝叁分二釐玖絲伍忽該徴本色並耗糧叁拾陸石陸斗肆升肆合叁勺玖抄伍圭捌粟㭍粒㭍顆折色糧徴銀㭍伯伍拾肆兩伍錢捌分陸釐伍毫玖絲陸忽㭍微㭍纎陸塵伍渺叁漠停免並軍籍糧銀一萬二千捌伯伍拾兩叁錢二分叁釐二毫玖絲叁忽肆微叁纎肆塵伍渺停免軍籍本係兩項今統敘一項後皆倣此均徭銀除拋荒豁免外並歷年開墾自首停免銀共伍萬二千陸伯叁拾二兩肆錢陸分叁毫玖絲陸忽捌微㭍纎二塵㭍渺陸沙二洙山谷陵租銀捌拾㭍兩叁錢二分玖釐肆毫年例盤纒銀一拾二兩富平咸陽二縣軍器鞘價銀二兩肆錢一分一釐二毫茅香細辛地骨皮增折價銀二拾捌兩一錢伍釐一毫玖絲陸忽捌微肆塵陸渺原額民丁共折下下丁一伯伍萬捌千㭍伯一拾肆丁除優免並逃亡外實在丁一伯一萬叁千肆拾㭍丁歷年編審出溢額丁除豁免太監王忠孝丁差外一萬陸千陸伯二拾二丁又編審出丁肆伯二拾叁丁雍正伍年以糧載丁共均丁銀捌萬㭍千二伯伍拾兩二錢㭍分一毫二絲二忽㭍微伍纎肆塵肆渺永不加賦丁一千捌伯二拾二丁額外匠價並盤纒及課程等項共該銀一千肆伯㭍拾二兩伍釐陸毫起運本色糧叁千陸伯一拾肆石捌斗二升捌合玖勺肆抄叁粟捌粒叁顆伍粳起存本色糧石不加閏存留本色糧叁千二伯伍拾肆石陸斗㭍升一勺肆撮捌圭捌粟二粒起運銀伍拾㭍萬肆千二伯玖拾肆兩玖錢二分叁釐叁絲玖忽二纎玖塵一渺㭍漠叁沙㭍洙遇閏加徴銀叁千陸伯伍拾㭍兩肆分二釐㭍毫一忽伍纎捌塵伍渺存留銀㭍萬㭍千二伯玖拾㭍兩㭍錢叁分㭍釐伍毫二絲肆忽伍纎二塵玖渺陸漠陸沙遇閏加徴銀叁千叁伯叁拾陸兩陸錢二分二釐二絲捌忽捌微一纎二塵伍漠長安縣原額民地肆等共地陸千玖伯捌拾肆頃捌畝二釐一毫肆絲一忽內除荒外實熟地陸千二伯二拾捌頃叁拾叁畝叁分一釐叁毫肆絲一忽實徴本色糧叁千一伯肆拾叁石陸斗一升肆合伍勺玖抄二粟㭍粒折色糧徴銀叁萬叁伯捌拾㭍兩一錢二分玖釐二毫伍絲伍忽二微叁纎㭍塵㭍渺額外定府勳田一頃捌拾畝額徴本色糧伍斗㭍升玖合折色糧徴銀陸兩㭍錢叁分捌釐肆毫又首報潦池河灘地伍拾玖畝叁分玖釐㭍毫捌絲該徴本色糧一拾石捌斗一升捌合叁勺二抄二撮㭍圭伍粟陸顆折色糧徴銀二錢叁分伍釐陸絲陸忽二微肆纎捌塵玖漠停免並軍籍糧銀二伯叁拾一兩一錢一釐㭍毫均徭銀除荒免外實徴銀伍千陸伯一拾陸兩捌錢一釐二毫二絲一忽㭍微捌纎伍塵玖渺原額民丁共折下下丁一拾萬㭍千叁拾丁除優免外實在丁一拾萬伍千捌伯玖拾二丁歷年編審出溢額丁一伯一拾捌丁雍正伍年以糧載丁共均丁銀陸千叁拾叁兩二錢㭍分伍釐肆毫伍絲二忽捌微二纎捌塵二渺永不加賦丁玖拾一丁額外匠價並課程共銀一伯二拾伍兩叁錢陸分伍釐起運本色糧一千二拾二石陸斗陸升㭍合一勺肆撮叁圭㭍粟㭍粒陸顆存留本色糧二千一伯叁拾二石叁斗肆升肆合捌勺捌撮肆圭起運銀叁萬叁千二伯伍拾肆兩伍錢一分一釐叁毫捌絲玖忽玖微㭍纎㭍塵玖漠遇閏加徴銀叁伯二拾兩叁錢二分㭍釐伍毫二絲伍忽一纎玖塵伍渺存留銀玖千一伯肆拾陸兩一錢叁分肆釐㭍毫陸忽一微二纎二塵捌渺遇閏加徴銀二伯叁拾二兩玖錢㭍分一釐一毫叁忽㭍微伍纎捌塵咸寧縣原額民地各等共地一萬二千肆伯伍拾叁頃肆畝叁分捌釐伍毫除豁免外實熟地一萬二千肆伯伍拾一頃玖拾叁畝二毫實徴本色糧陸伯玖拾叁石捌升玖合玖勺一抄肆撮叁粟㭍粒陸顆伍粳折色糧徴銀叁萬伍伯㭍拾捌兩肆錢捌分一釐伍毫捌絲㭍忽陸微二纎陸塵一渺叁沙伍洙山谷租糧並額外首報糧銀一伯叁拾二兩二錢二分玖釐肆毫又查首出並首報租地共肆拾一畝一分該徴本色糧叁升伍合叁勺肆抄陸圭伍粟折色糧徴銀㭍兩肆錢叁分玖釐一毫玖絲陸忽伍微叁纎伍塵捌渺停免並軍籍糧銀肆伯捌拾一兩伍錢二分肆釐肆毫伍絲㭍忽一微二纎玖渺均徭銀除豁免外並額外查首出銀伍千二伯捌拾兩二錢陸分捌釐玖毫叁絲陸忽叁微捌纎二塵肆渺肆漠陸沙二洙地骨皮增折價銀二錢叁分伍釐原額民丁共折下下丁一拾陸萬二千伍拾㭍丁除優免匠價並逃亡外實在丁一拾伍萬肆千玖伯㭍拾伍丁又編審除丁二拾叁丁雍正伍年以糧載丁共均丁銀伍千陸伯玖拾二兩㭍錢叁分伍釐一絲玖忽陸微㭍纎玖塵㭍渺永不加賦丁陸拾二丁額外匠價並課程共銀二伯玖拾玖兩一分起運本色糧陸伯玖拾叁石一斗二升伍合二勺伍抄肆撮陸圭捌粟㭍粒陸顆伍粳起運銀叁萬叁千玖伯一拾玖兩陸錢肆分捌毫玖絲二微一纎陸塵陸渺肆漠玖沙㭍洙遇閏加徴銀叁伯二拾伍兩捌錢肆分肆釐二毫捌忽肆微一纎玖渺存留銀捌千伍伯伍拾