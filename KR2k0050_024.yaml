body:
  text: 陜西通志巻二十四貢賦一民地民丁黄壤之區厥田上上􅖽秸輸將用答井養緬懷豳岐徹法是創九式聿頒勞民勸相慨租庸調徴書並降仁牧鑒兹憫農瘁况經費實邉出入凖量薄斂輕徭秦封保障作貢賦志第十民地民丁國朝陜西布政使司所屬原額民地並王駙馬太府遺留各等共地叁拾捌萬玖千捌伯肆拾叁頃㭍拾㭍畝肆分捌釐叁毫㭍絲肆忽貳微貳纎陸塵内除荒并包賠折正永豁衝崩外實熟地貳拾伍萬伍千叁伯陸頃伍拾伍畝伍分㭍釐㭍毫捌絲捌忽叁微捌纎伍塵貳渺實徴本色糧叁萬壹千捌伯㭍拾壹石玖斗叁升㭍合貳勺叁抄壹撮玖圭伍粟捌粒叁顆㭍糠啇南縣本色糧折價銀貳拾壹兩伍錢玖分肆釐陸忽㭍微壹纎捌渺叁漠玖沙本色官學倉糧折徴銀叁千壹伯伍拾㭍兩陸錢叁分㭍釐㭍毫玖絲貳微伍纎叁塵肆渺捌漠折色糧徴銀除停緩停徴外止該銀壹伯壹拾伍萬玖千伍伯貳拾叁兩壹錢壹分貳釐叁毫肆絲壹忽捌微捌纎玖塵叁渺玖漠壹沙叁洙本色草陸千壹拾捌束壹拾玖斤㭍兩捌錢伍分叁釐陸毫歴年開墾地壹千捌伯陸拾㭍頃捌拾畝伍分玖釐叁毫肆絲肆忽貳微叁纎玖塵肆渺該徴本色糧捌石陸升㭍合捌勺伍抄貳撮捌圭叁粟㭍粒伍顆叁糠捌粃啇南縣本色糧折價銀叁兩壹錢玖分肆釐叁毫伍絲貳忽陸纎玖塵壹渺陸漠㭍沙本色官學倉糧折徴銀貳兩壹錢叁分伍釐玖毫陸絲捌忽肆微陸纎陸塵肆渺㭍漠叁沙折色糧徴銀㭍千捌伯捌拾兩貳錢叁分叁釐捌毫捌絲伍忽壹微玖纎捌塵㭍渺肆漠貳沙肆洙肆涯又本色草壹拾捌斤壹拾兩陸錢壹分外新收續收勲田等項共地肆伯叁拾壹頃叁拾捌畝玖分貳毫捌絲該徴本色糧伍斗㭍升玖合折色並租課等項糧折徴銀叁千叁伯肆拾叁兩肆錢捌分壹釐玖毫壹絲捌忽㭍微㭍纎叁塵伍渺額外清丈自首開墾河灘沙淤溝坡共地壹千壹伯貳拾叁頃壹拾捌畝壹分伍釐肆毫叁絲叁忽伍微除衝决并荒免外實在地捌伯貳頃捌拾壹畝玖分貳釐壹毫伍絲肆忽叁微實徴本色糧叁拾㭍石叁斗肆升伍合㭍勺肆抄肆粟㭍粒㭍顆折色糧徴銀貳千陸伯壹拾伍兩捌錢陸釐壹毫叁絲貳忽伍微壹纎肆塵玖渺叁漠又退灘地捌頃伍拾陸畝㭍分零該徴租糧叁拾叁石捌升肆合肆勺又首報糧條銀叁兩貳錢叁分壹釐又火者小麥變價銀玖拾貳兩壹錢伍分又額協鞏昌驛站銀肆兩玖錢㭍釐伍毫壹絲貳忽伍微肆纎伍渺停免並軍籍糧銀貳萬壹千陸伯玖拾玖兩貳分玖釐捌毫壹忽壹微捌塵捌渺貳漠原額均徭銀壹拾伍萬貳千貳伯陸拾肆兩捌釐捌毫陸絲㭍忽㭍纎叁塵玖渺内除荒並包賠折正永豁衝崩及停徴停緩外止實徴銀壹拾萬捌千捌伯㭍拾捌兩玖錢貳分壹毫壹絲玖忽捌微肆塵叁渺陸漠玖沙捌洙歴年開墾地畝清丈自首河淤溝坡等地並停免均徭銀共貳千伍伯玖拾玖兩貳錢玖分㭍釐㭍毫㭍絲肆忽叁微壹纎壹渺伍漠肆沙壹洙壹涯協濟膚施縣額解本府儒學廪生月糧並自首全裁充餉及中部縣裁舉人花盤銀除荒外實徴銀伍拾捌兩肆錢肆分肆釐肆毫壹絲陸忽肆微貳纎玖塵㭍渺年例盤纒銀除荒外實徴銀貳拾玖兩壹錢玖釐伍毫壹絲肆忽陸微肆纎捌塵肆渺山谷陵租並牌坊花盤鞘價各項共銀玖拾貳兩叁錢壹分㭍釐㭍毫陸絲貳微叁纎捌塵伍渺又茅香細辛地骨皮郁李仁増折價銀不等並藥味撥餉共銀叁拾叁兩叁錢叁分㭍毫貳絲肆忽㭍微玖纎肆塵伍渺又柴山祭祀招民開墾青陽等驛地糧銀貳伯貳拾㭍兩伍錢壹分捌釐叁毫伍絲貳忽陸微叁纎㭍塵貳渺興安州丈出水淤地内本色祿米貳斗陸升叁勺壹抄又漢興二府州屬本色祿米除荒免並停徴停緩外及歴年新墾祿米伍伯壹石肆斗陸升叁合陸勺㭍抄貳撮叁圭㭍粟玖粒肆顆按本色祿米新懇祿米本係兩項今統叙後倣此外開山等十驛地畝玖釐銀除停徴外並歴年新懇銀壹伯㭍兩貳錢貳分貳釐捌毫㭍絲捌忽貳微陸纎伍塵叁渺開山等驛折色糧徴銀除豁免並停徴外及厯年新墾銀壹伯伍拾玖兩玖錢陸分㭍釐壹絲捌忽捌微壹纎貳塵貳渺又折色草除豁免並停徴外及厯年新墾草銀壹拾玖兩叁錢壹分貳釐㭍毫玖絲㭍忽伍微又開山等驛本色糧除豁免並停徴外及厯年新墾糧伍伯貳拾玖石陸斗㭍合肆勺玖抄貳撮㭍圭陸粟原額民丁共折下下丁貳伯陸拾㭍萬伍千肆拾㭍丁除優免逃亡包賠並停緩外止該丁貳伯玖萬陸千玖伯陸拾肆丁厯年招回編審清查自首除豁免太監王忠孝丁外共肆萬叁千捌伯肆拾伍丁雍正伍年以糧載丁共均丁銀貳拾萬伍千㭍伯伍拾肆兩伍錢伍分陸釐玖毫肆絲伍忽㭍微肆塵陸渺捌漠永不加賦丁肆千肆伯陸拾玖丁額外匠價盤纒并課程及延安府稅課司課程共銀肆千㭍伯捌拾貳兩壹錢叁分㭍釐陸毫陸絲按匠價盤纒課程非地丁所出未載丁銀故列於後起運本色糧貳萬玖千㭍拾玖石伍升陸勺陸撮伍圭伍粟壹粒玖顆壹糠存留本色糧叁千玖伯叁石貳斗玖升伍合玖抄叁撮肆圭叁粟壹粒玖糠捌粃起運本色草陸千壹拾玖束壹拾捌斤貳兩肆錢陸分叁釐陸毫按民地内本色草毎束以貳拾斤為率後倣此起運銀壹伯貳拾陸萬玖千壹拾叁兩㭍錢㭍分陸釐玖毫㭍絲壹忽捌微貳纎伍塵伍渺叁漠㭍沙㭍洙伍涯遇閏加徴銀㭍千貳伯叁拾捌兩玖分㭍釐肆毫伍絲㭍忽玖微捌纎㭍塵捌渺伍漠伍洙按起運省總入延安府額外課程銀方合遇閏銀倣此存留銀貳拾伍萬貳千㭍拾肆兩捌錢㭍分叁釐㭍毫捌微肆纎伍塵叁渺捌沙玖洙遇閏加徴銀捌千陸伯壹拾叁兩貳錢肆分貳釐㭍絲貳忽陸微捌塵貳渺捌漠叁沙伍洙又遇閏存留不敷在起運正項内撥銀叁伯陸拾捌兩伍錢壹分陸釐陸亳玖絲㭍微㭍纎貳塵叁渺伍漠西安府屬原額民地各等共地壹拾萬壹千壹伯壹拾捌頃壹分伍釐壹毫伍絲捌忽壹纎内除抛荒豁免外實熟地玖萬捌千㭍伯陸拾捌頃伍拾壹畝陸分叁釐㭍絲肆忽叁微壹纎實徴本色糧陸千捌伯叁拾貳石貳斗㭍升伍合陸勺伍抄肆撮叁圭叁粟貳粒陸顆伍糠折色糧徴銀肆拾玖萬伍千伍伯玖拾肆兩叁錢捌分叁釐玖毫貳絲玖忽捌微叁纎捌塵捌渺叁沙伍洙歴年開墾共地叁頃貳拾叁畝伍分叁毫該徴折色糧銀壹拾伍兩㭍錢陸分捌釐玖毫㭍絲㭍忽叁微肆纎肆塵肆渺又新収續収並勲田等項共地陸拾壹頃叁拾壹畝貳分陸釐捌絲該徴本色糧伍斗㭍升玖合保安府庄基並租課及折色各項共折徴銀捌伯玖拾叁兩壹分伍釐捌毫肆絲玖忽貳徴伍纎陸塵貳𣺌外清丈自首溢額並首報租地共肆伯㭍頃叁拾壹畝叁分貳釐玖絲伍忽該徴本色並耗糧叁拾陸石陸斗肆升肆合叁勺玖抄伍圭捌粟㭍粒㭍顆折色糧徴銀㭍伯伍拾肆兩伍錢捌分陸釐伍毫玖絲陸忽㭍微㭍纎陸塵伍𣺌叁漠停免並軍籍糧銀壹萬貳千捌伯伍拾兩叁錢貳分叁釐貳毫玖絲叁忽肆微叁纎肆塵伍渺停免軍籍本係兩項今統叙壹項後皆倣此均徭銀除抛荒豁免外並歴年開墾自首停免銀共伍萬貳千陸伯叁拾貳兩肆錢陸分叁毫玖絲陸忽捌微㭍纎貳塵㭍渺陸沙貳洙山谷陵租銀捌拾㭍兩叁錢貳分玖釐肆毫年例盤纒銀壹拾貳兩富平咸陽二縣軍器鞘價銀貳兩肆錢壹分壹釐貳毫茅香細辛地骨皮增折價銀貳拾捌兩壹錢伍釐壹毫玖絲陸忽捌微肆塵陸渺原額民丁共折下下丁壹伯伍萬捌千㭍伯壹拾肆丁除優免並逃亡外實在丁壹伯壹萬叁千肆拾㭍丁歴年編審出溢額丁除豁免太監王忠孝丁差外壹萬陸千陸伯貳拾貳丁又編審出丁肆伯貳拾叁丁雍正伍年以糧載丁共均丁銀捌萬㭍千貳伯伍拾兩貳錢㭍分壹毫貳絲貳忽㭍微伍纎肆塵肆渺永不加賦丁壹千捌伯貳拾貳丁額外匠價並盤纒及課程等項共該銀壹千肆伯㭍拾貳兩伍釐陸毫起運本色糧叁千陸伯壹拾肆石捌斗貳升捌合玖勺肆抄叁粟捌粒叁顆伍糠起存本色糧石不加閏存留本色糧叁千貳伯伍拾肆石陸斗㭍升壹勺肆撮捌圭捌粟貳粒起運銀伍拾㭍萬肆千貳伯玖拾肆兩玖錢貳分叁釐叁絲玖忽貳纎玖塵壹渺㭍漠叁沙㭍洙遇閏加徴銀叁千陸伯伍拾㭍兩肆分貳釐㭍毫壹忽伍纎捌塵伍渺存留銀㭍萬㭍千貳伯玖拾㭍兩㭍錢叁分㭍釐伍毫貳絲肆忽伍纎貳塵玖渺陸漠陸沙遇閏加徴銀叁千叁伯叁拾陸兩陸錢貳分貳釐貳絲捌忽捌微壹纎貳塵伍漠長安縣原額民地肆等共地陸千玖伯捌拾肆頃捌畝貳釐壹毫肆絲壹忽内除荒外實熟地陸千貳伯貳拾捌頃叁拾叁畝叁分壹釐叁毫肆絲壹忽實徴本色糧叁千壹伯肆拾叁石陸斗壹升肆合伍勺玖抄貳粟㭍粒折色糧徴銀叁萬叁伯捌拾㭍兩壹錢貳分玖釐貳毫伍絲伍忽貳微叁纎㭍塵㭍渺額外定府勲田壹頃捌拾畝額徴本色糧伍斗㭍升玖合折色糧徴銀陸兩㭍錢叁分捌釐肆毫又首報澇池河灘地伍拾玖畝叁分玖釐㭍毫捌絲該徴本色糧壹拾石捌斗壹升捌合叁勺貳抄貳撮㭍圭伍粟陸顆折色糧徴銀貳錢叁分伍釐陸絲陸忽貳微肆纎捌塵玖漠停免並軍籍糧銀貳伯叁拾壹兩壹錢壹釐㭍毫均徭銀除荒免外實徴銀伍千陸伯壹拾陸兩捌錢壹釐貳毫貳絲壹忽㭍微捌纎伍塵玖渺原額民丁共折下下丁壹拾萬㭍千叁拾丁除優免外實在丁壹拾萬伍千捌伯玖拾貳丁歴年編審出溢額丁壹伯壹拾捌丁雍正伍年以糧載丁共均丁銀陸千叁拾叁兩貳錢㭍分伍釐肆毫伍絲貳忽捌微貳纎捌塵貳渺永不加賦丁玖拾壹丁額外匠價並課程共銀壹伯貳拾伍兩叁錢陸分伍釐起運本色糧壹千貳拾貳石陸斗陸升㭍合壹勺肆撮叁圭㭍粟㭍粒陸顆存留本色糧貳千壹伯叁拾貳石叁斗肆升肆合捌勺捌撮肆圭起運銀叁萬叁千貳伯伍拾肆兩伍錢壹分壹釐叁毫捌絲玖忽玖微㭍纎㭍塵玖漠遇閏加徴銀叁伯貳拾兩叁錢貳分㭍釐伍毫貳絲伍忽壹纎玖塵伍渺存留銀玖千壹伯肆拾陸兩壹錢叁分肆釐㭍毫陸忽壹微貳纎貳塵捌渺遇閏加徴銀貳伯叁拾貳兩玖錢㭍分壹釐壹毫叁忽㭍微伍纎捌塵咸寜縣原額民地各等共地壹萬貳千肆伯伍拾叁頃肆畝叁分捌釐伍毫除豁免外實熟地壹萬貳千肆伯伍拾壹頃玖拾叁畝貳毫實徴本色糧陸伯玖拾叁石捌升玖合玖勺壹抄肆撮叁粟㭍粒陸顆伍糠折色糧徴銀叁萬伍伯㭍拾捌兩肆錢捌分壹釐伍毫捌絲㭍忽陸微貳纎陸塵壹渺叁沙伍洙山谷租糧並額外首報糧銀壹伯叁拾貳兩貳錢貳分玖釐肆毫又查首出並首報租地共肆拾壹畝壹分該徴本色糧叁升伍合叁勺肆抄陸圭伍粟折色糧徴銀㭍兩肆錢叁分玖釐壹毫玖絲陸忽伍微叁纎伍塵捌渺停免並軍籍糧銀肆伯捌拾壹兩伍錢貳分肆釐肆毫伍絲㭍忽壹微貳纎玖渺均徭銀除豁免外並額外查首出銀伍千貳伯捌拾兩貳錢陸分捌釐玖毫叁絲陸忽叁微捌纎貳塵肆𣺌肆漠陸沙貳洙地骨皮增折價銀貳錢叁分伍釐原額民丁共折下下丁壹拾陸萬貳千伍拾㭍丁除優免匠價並逃亡外實在丁壹拾伍萬肆千玖伯㭍拾伍丁又編審除丁貳拾叁丁雍正伍年以糧載丁共均丁銀伍千陸伯玖拾貳兩㭍錢叁分伍釐壹絲玖忽陸微㭍纎玖塵㭍渺永不加賦丁陸拾貳丁額外匠價並課程共銀貳伯玖拾玖兩壹分起運本色糧陸伯玖拾叁石壹斗貳升伍合貳勺伍抄肆撮陸圭捌粟㭍粒陸顆伍糠起運銀叁萬叁千玖伯壹拾玖兩陸錢肆分捌毫玖絲貳微壹纎陸塵陸渺肆漠玖沙㭍洙遇閏加徴銀叁伯貳拾伍兩捌錢肆分肆釐貳毫捌忽肆微壹纎玖渺存留銀捌千伍伯伍拾