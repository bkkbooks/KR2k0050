body:
  text: 陜西通志巻二十三職官四本朝文職總督陜西部院舊轄山陜二省後改轄川陜甘三省雍正元年定兵部尚書衘九年改轄陜甘二省筆帖式六員現設四員巡撫陜西部院舊有巡撫延綏都御史一員康熙元年裁筆帖式四員現設三員按賈志舊有巡按陜西御史一員順治十八年撤回又延綏舊有糧儲郎中一員今裁提督陜西學院舊設提學道後學道學院兼出康熙五十年後俱為學院移駐三原巡視河東鹽院陜西鹽政𨽻之承宣布政使司布政使舊有左右二布政康熙二年以右布政歸甘肅改左布政為陜西布政司經歴理問廣積庫大使按會典舊有筆帖式二員檢校副理問司獄各一員今裁照磨一員廣積庫副使一員改歸甘省督理糧儲道康熙二十一年兼管驛務三十三年仍專設驛道併入鹽務為糧鹽道雍正十二年復改為督糧道永敬倉大使雍正九年自西安府改屬分守潼商道駐劄潼關按賈志舊有分守關内道一員管西安一府駐劄耀州撫治商雒道一員管屯田驛傳駐劄商州分守關南道一員管漢中一府駐劄興安分守關西道一員管鳯平二府駐劄隴州今俱裁提刑按察使司按察使經歴司獄按會典舊有筆帖式二員檢校一員今俱裁照磨一員改𨽻甘省分巡驛鹽道舊為驛傳道康熙二十一年裁事務悉歸糧道三十三年復設雍正十二年併入鹽務改為驛鹽道分巡漢興道駐劄漢中府分巡榆葭道舊為榆林中路道轄榆林中路等處雍正九年改轄榆林府葭州駐榆林府分巡延綏鄜道舊為榆林東路道轄黄甫川等處駐劄神木雍正九年改為延綏鄜道移駐綏徳州按賈志舊有分巡關内道一員整飭邠乾駐劄邠州潼關兵備道一員管華州等九縣河南靈寳等處駐劄潼關整飭漢羌道一員兼管撫民屯田水利驛傳駐劄漢中分巡河西道一員督理延慶屯田兼管學政駐劄鄜州榆林西路兵備道一員管屯田馬政駐劄靖邊今俱裁西安府知府領縣十四延安府知府領縣八鳯翔府知府領縣七州一漢中府知府領縣八州一榆林府知府舊為榆林衞雍正八年改為府領縣四同知西安理事清軍撫民西延捕盗四員延安神木一員雍正九年改屬榆林漢中清軍一員通判西安管糧一員雍正七年改為水利移駐涇陽王橋鎮鳯翔管糧漢中督捕各一員經歴延安經歴雍正三年移駐靖邊九年撤回知事惟西安府有照磨榆林照磨雍正八年以延安廣有倉大使改置司獄儒學教授訓導榆林無倉大使漢中廣積倉一員榆林廣有倉一員改照磨仍兼管倉務隂陽正術醫學正科僧綱司道紀司以上官屬各府皆同按會典各府舊有理刑推官一員康熙六年裁西安府舊有京兆驛驛丞一員康熙五十年裁又賈志西安府税課大使一員今俱裁再延安有榆林同知一員雍正八年改為榆林知縣靖邊同知一員雍正八年裁又延安鎮靖威武二堡各有巡檢一員雍正八年改堡屬縣俱裁興安州知州領縣六商州知州領縣四舊與同華耀乾邠六州屬西安府管轄雍正三年俱改為直𨽻州同州知州領縣四華州知州領縣三耀州知州領縣二乾州知州領縣二邠州知州領縣三鄜州知州領縣三舊與綏葭三州屬延安府管轄雍正三年俱改為直𨽻州綏徳州知州領縣二葭州知州領縣三隴州知州𨽻鳯翔府寧羌州知州𨽻漢中府同知興同華綏隴寜羌等州各一員綏徳同知舊駐安邊鄜州同知舊駐榆林雍正九年裁州判乾邠各一員吏目儒學學正訓導葭州無驛丞鄜州三川驛隴州長寧驛寧羌留壩驛各一員隂陽典術醫學典科僧正司道正司以上官屬各州皆同按賈志葭州有同知一員分駐靖邊商州武關秦嶺有巡檢二員華州華山驛驛丞逓運大使各一員耀州順義驛驛丞一員邠州新平驛乾州威勝驛驛丞逓運所各一員鄜州鄜城驛綏徳青陽驛義合驛驛丞各一員鄜州直羅綏徳官菜園渡口巡檢各一員今俱裁又按商同華耀乾邠鄜綏徳葭九州明代分𨽻西安延安二府至雍正三年俱改為直𨽻故題名與各府一體編入知縣縣丞長安咸寧咸陽興平臨潼涇陽三原盩厔渭南富平鳯翔扶風寳鷄洋縣郃陽澄城韓城華隂蒲城有典史驛丞興平㡳張驛寳鷄東河驛褒城馬道驛青橋驛鳯縣松林驛草凉驛三岔驛留壩驛武關驛沔縣大安驛黄沙驛潼關潼關驛各一員巡檢寳鷄益門散關虢川司南鄭青石關西鄉鹽塲關大巴山鳯縣清風閣留壩司朝邑大慶關潼關風陵渡永樂鎮各一員儒學教諭長安咸寧咸陽興平臨潼髙陵鄠縣藍田涇陽三原盩厓渭南富平醴泉膚施安塞甘泉鳯翔岐山扶風郿縣寳鷄汧陽麟遊南鄭城固洋縣西鄉沔縣洵陽朝邑郃陽澄城韓城華隂蒲城潼關武功三水淳化雒川清澗吳堡府谷各一員訓導長安咸寜咸陽興平臨潼髙陵鄠縣藍田涇陽三原盩厔渭南富平醴泉膚施安定保安宜川延川延長鳯翔岐山扶風郿縣寳鷄汧陽麟遊南鄭褒城城固洋縣西鄉鳯縣沔縣畧陽榆林懐逺定邊靖邊平利洵陽白河紫陽石泉漢隂鎮安雒南山陽商南朝邑郃陽澄城韓城華隂蒲城潼關同官白水武功永壽三水淳化長武雒川中部宜君米脂清澗吳堡神木府谷各一員隂陽訓術醫學訓科僧㑹司道㑹司以上官屬各縣皆同按賈志咸陽渭水驛興平白渠驛臨潼新豐驛三原建忠驛渭南豐原驛甘泉撫安驛保安園林驛延川文安驛延長干谷驛鳯翔岐陽驛岐山岐周驛扶風鳯泉驛寳鷄陳倉驛華隂潼津驛同官漆水驛武功邰城驛永夀永安驛長武宜禄驛中部翟道驛宜君雲陽驛米脂銀川驛吳堡河西驛各有驛丞一員盩厔十八盤安塞敷政畧陽罝口麟遊石窰舖懐逺威武堡平利鎮坪石泉饒峯嶺洵陽三岔雒南東石坡鎮安舊縣關商南富水堡山陽竹林關同官金鎻關白水馬蓮灘永壽土副三水石門長武窰店洛川黄龍堡各有巡檢