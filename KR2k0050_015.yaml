body:
  text: 欽定四庫全書陜西通志巻十五公署周官三百各建厥宅臯應之旁市㕓逺隔華省薫香直廬樹㦸鶉野龍山棟宇奕奕甘棠召公黍苗郇伯攸躋攸寧用敷德澤麗譙審時郊館候客列峙秦疆規模邁昔作公署志第六西安府總督部院署在布政司西南舊駐固原鎮後移西安順治初總督孟喬芳創建制府康熈元年總督白如梅以門堂隘淺拓正學書院舊址增廓堂宇髙其閈閎建標績坊樹表臺鼓角麗譙將校亭廬悉備自為文記之二十三年以漢中為川陜適中地移建制府以便兼轄後寇平仍還原署四十二年聖祖仁皇帝西廵賜總督博濟保釐秦隴匾額督標中軍副將署在長安水池三坊廵撫部院署在布政司西北明宣德七年建嘉靖二十一年廵撫趙廷瑞新後堂闢後軒為北向前作思濟亭於五栢之間又曰五栢亭建樓七楹顔曰仰辰翼以兩廂十楹葺節鎮坊導通濟渠由西垣入束垣出左右亭各一左以覆井右以藏碑自為記本朝康熙二十四年廵撫鄂愷重修左僉都房廷禎記之四十二年聖祖仁皇帝西巡賜巡撫鄂海匾曰為政寛恕聨曰三秦地濶榮開府二華峰髙比重臣撫標中軍㕘將署在咸寧所二坊布政使司署在府城東鐘樓西相傳為秦穆公故府唐為尚書省一云為于志寧郭汾陽宅基有顔真卿郭太保廟碑尚存署中金即其地為行署元設為行省延祐間修之明初洪武七年改為司署設僚屬廨舍基宇周羅十七年增置廨宇正統八年左布政郭堅增置後堂厨庫右布政王暹記嘉靖二十九年左布政葛守禮建後堂顔曰誠心堂右布政孔天𦙍記本朝順治五年左布政劉𢎞遇大加修葺前後堂及厨庫吏舍重門繚垣悉新之右叅議朱國夀為記康熙四年布政使顔敏以宅門湫隘增建六楹大堂五楹顔曰寅清翼以壁廊内堂凡三楹壁廊數悉如之自為記廣積庫在大堂旁四十二年聖祖仁皇帝西巡賜布政使鄂洛雲峰及清慎勤二匾額經歴司理問所廣積庫大使廨俱在本司大門内東偏舊有檢校副理問司獄司廨俱裁缺照磨廣積庫副使改甘省糧鹽道署在布政司東北按碑圖即左參政署康熙四十二年聖祖仁皇帝西巡賜叅議黄明清慎勤匾額五十四年恭議祖允焜葺東園於署左自為文記之永敬倉大使廨在永豐倉内按察司署在布政司西明洪武初因元御史臺為治在布政司東後併入秦府移建今署正統十年按察使鄧棨新正堂中門廊廡副使張楷記之成化十年按察使王朝逺建官廐十三年按察使劉福貿民地拓修東構屋四十八楹西二十餘楹僚屬廨宇以次就緒復繚以穹垣提學伍福記嘉靖壬戍按察使劉自强濬井於廨舍東南號曰劉公井提學孫應鰲記本朝順治十六年按察使翟鳳翥顔其堂曰如氷堂自為記康熙四十二年聖祖仁皇帝西巡賜按察使何嘏清慎勤匾額四十八年按察使滿普重建兩廡獄在署西偏雍正七年按察使碩色修葺自為記經歴司司獄司俱在本司内舊有檢校廨缺裁照磨改移甘省驛傳道署在布政司西北本察院舊址先是道署在按察司内明成化十三年建本朝康熙二十一年裁缺署廢三十一年復設副使張霖徙今治重建内署門廡㕔事射堂賔館自為文記之城守營叅將署在布政司北長安所一坊貢院在布政司西近安定門明景泰間左布政使許資奏建嘉靖四年巡撫王藎巡按鄭氣建搜閱堂四楹新屋宇號舍舊為蓆棚悉易以木又拓增數百間築内外繚垣顔大門樓曰騰蛟起鳳又引通濟渠於五星堂下檢討段靈為記十九年巡按張光祖重修改建門坊暸望樓峙四隅明逺樓在中北為至公堂堂北為四所收掌所南有為國薦賢堂其北為外簾匾以精白一心又匾曰明公皆居文衡門南北則聚奎堂舊止三檼增為五檼又其北為主考㕔五經房列左右咸更新焉有侍郎吕柟記本朝康熙五十六年布政使薩穆哈增建南號舍雍正元年巡撫噶世圖續建悉易以瓴甓舊有按院署在布政司西北順治十八年裁缺今改為驛傳道署督學署舊在闗中書院康熙六十一年改駐三原舊行署右布政署在布政司西康熙六年移駐蘭州都司在布政司東南雍正元年裁缺闗内道在布政司西提學道在按察司内今俱裁缺知府署在布政司西本元奉元路址明洪武二年建永樂間補葺正統四年知府鄧晟改建中門訓導董懋為記天順四年知府余子俊新後堂復拓修八年重建正堂退徙於北吏舍退徙於東西移常濟庫於中門之東自為記𢎞治十五年知府馬炳然拓修後堂顔曰絜矩内署吏舍悉新之亦自為記嘉靖十三年知府夏雷易西隅民房改建僚佐廨舍堂後建東西棚屋各三楹堂東建冊庫六楹復建坊門外匾曰闗中首郡檢討王九思記二十四年知府吴孟祺分建廨舍中判二區繚垣分坊門徑殊軌丞御其東倅處其西有右僉都許宗魯記獄在堂西南二十六年知府胡汝輔濬渠砌隂溝於丹墀東鑿石為井自為文記之理事同知署在府署西長安鐵爐一坊係舊分守道署清軍同知署在府署内東偏舊有刑㕔署在府治南缺裁後改為管糧㕔署雍正七年更名水利通判移駐涇陽王橋鎮經歴司在府堂西照磨所在經歴司南知事㕔在府堂西北司獄司在府署中門西偏舊有稅課司在府治東京兆驛丞廨在府治東南西安逓運所在府城西㶚橋逓運所在城東二十里今俱裁缺教授訓導廨在府治東南明倫堂後隂陽學在府治東醫學在府治西長安縣署在布政司西唐天祐間韓建築西郭小城為縣治宋金元皆因之明洪武四年移建今治明末頹圮本朝康熈元年知縣梁禹甸修葺改建重門新前軒自為記堂西為庫獄在堂西南禹甸復建小倉以羈輕犯丞廨在縣堂東舊有主簿廨在縣堂西缺裁典史廨在丞廨南教諭訓導廨在府學西接官㕔在西闗外養濟院在其側咸寧縣署在布政司東南三里許即唐宣陽坊萬年舊址天祐間韓建築東郭小城為縣治宋金因之元泰定至正間縣尹唐兀王義相繼增修明洪武初因拓城移建今治嘉靖二十三年知縣馬佩重修前後㕔堂重門吏舍悉新之堂西為庫獄在儀門西因鄰舊養濟院闗防弗便廼築圜堵九十四丈建屋十九楹給事王凖記萬厯十二年知縣李生芳復修三十四年知縣滿朝薦更為拓修崇禎五年知縣閻思學於退食堂後市民地構大生樓五楹左右廂各三楹前建退食軒易舊宅為幕館長安知縣張希夏為記土地祠舊在儀門外賔館之左知縣宋屺移置儀門右本朝康熙三年知縣黄家鼎以獄分輕重度獄東南隙地建倉一所養濟院在城内西北丞廨在縣堂右典史廨在丞廨南舊有主簿廨順治間缺裁教諭廨在學宫敬一亭後訓導廨在敬一亭左接官㕔三所二在東關外一在北關外㑹府在滿城内鐘樓東將軍署在滿城吉茂巷康熈四十二年聖祖仁皇帝西巡賜將軍博濟匾曰列雅著贊聫曰長為士心思鼓舞肯因國事惜勤勞左翼滿洲副都統署在滿城金谷府故址右翼滿洲副都統署在滿城西華門街左翼漢軍副都統署在滿城郃陽府故址右翼漢軍副都統署在滿城天地壇故址咸陽縣署舊在城内西北今在中央明洪武四年縣丞孔文郁建中為正堂五楹抱厦一楹東有庫樓西南為獄本朝順治中知縣江山秀修葺建馬廐二十楹養濟院在縣治東北縣丞廨在縣堂東典史廨在縣堂西舊有咸陽逓運所渭水驛丞廨在縣治内俱裁缺教諭廨在儒學明倫堂西訓導廨圮隂陽學在縣治西南醫學在縣治西南舊有東西南三察院又司署在縣治西闗内道署在司署東府館在縣治東北俱廢興平縣署在城内東南元至正十二年建明洪武十二年知縣沈訥修葺成化中知縣王琮改修嘉靖中知縣郭孔完增修乙卯地震傾圮知縣朱文修葺有劉永吉記正堂知縣章評修顔曰琴堂建可為敦仁二堂自為記又建喜中樓陶梓記修儀門戒石亭左右吏舍建五喜亭御史陳講少卿記庫在堂左獄在儀門内東偏養濟院在縣西街丞廨在縣堂東典史廨在縣堂西底張驛丞廨在縣東北三十里舊有白渠驛丞廨在縣治北底張逓運所在縣治東俱裁缺教諭訓導廨在學宫敬一亭後隂陽醫學俱在縣治前舊有察院布政司署俱在縣治東按察司署在縣治東南長寜分司即古長寧驛西司在縣治西南臨潼縣署在城内中街之東明洪武二年建𢎞治癸亥重修嘉靖甲辰知縣李裔芳增修自為記正㕔六楹匾曰節愛堂左庫右幕㕔後為退思堂堂内東偏為藕葉山房北曰嚮用堂獄在儀門内西偏本朝康熙二年知縣孟長人改建大門移門樓於内署三十七年知縣趙于京建外廐自為記養濟院二一在城隍廟左側一在縣東南抵城下丞廨在縣堂西典史廨在縣堂西舊有新豐驛丞在縣治西逓運所在縣東北缺裁教諭廨訓導廨隂陽學俱在縣治北醫學在縣治東舊有布政分司按察分司俱在縣治東知縣趙于京改為横渠書院有㕔二一在縣治東改居汛兵一在縣治西迎候所二一在集鳳門外一在永豐門外今俱廢髙陵縣署在城内正中宋政和間知縣李文開建不欺堂主簿焦􅍬為記元延祐元年知縣盧佐建正㕔五楹立戒石亭於儀門北明正統十四年知縣張錦重建正㕔五楹東西俱有庫景泰三年楊清建諸廨舍及土地祠成化十年知縣張傑重修𢎞治初知縣劉安建退思堂正德十四年知縣翟清建馬廐嘉靖四年知縣鄧興仁改建正堂重門徙獄神祠及獄門於儀門外乙卯地震傾圮知縣李翰重加修葺本朝知縣胡昌期撤退思堂于後堂前為榭署内樓五檼康熙三十四年知縣王綦溥重修養濟院在縣東門内迤南城下典史廨在縣堂西教諭廨在明倫堂後訓導廨在教諭廨後隂陽醫學俱在縣治東舊有布政司署在縣治西按察司署在預偹倉東府㕔在中街南鄠縣署在城内東隅明洪武八年知縣許訢重建中為正堂五楹東西俱有庫後為思補堂西南為獄賔館前有雙槐宋程明道先生手植正統中知縣徐純修葺崇禎中知縣張宗孟重修寅賔館本朝康熙二十一年知縣康如璉改建大門四明樓典史廨在縣署西南教諭訓導廨在文廟北隂陽學在縣治北醫學在縣治西千總署在縣治東舊有察院在西門内按察司署在縣治東布政司府署俱在縣治西今廢藍田縣署在城内正中明洪武四年知縣徐誠建嘉靖二年知縣王科增建堂廨堂東幕㕔兩腋為庫獄在儀門外二十二年知縣趙師道建糧房及廐二十楹於儀門外二十七年知縣吕好古悉鼎新之萬厯初知縣何思建寅賔館三十一年知縣王邦才移旌善亭於大門内四十四年知縣沈國華重修廨署養濟院在南闗街西典史廨在縣堂東南教諭廨訓導廨隂陽醫學俱在縣治南舊有察院布政司署俱在縣治西按察司署在縣治南偏西今廢涇陽縣水利通判署在縣北五十里王橋鎮内雍正七年改糧㕔為水利㕔移駐於此舊有水利僉事署在洪口古洪門監乆廢舊有東西北三察院縣治南則為南司今廢知縣署在縣城南門内迤東創建無考元大德問集賢學士蕭㪺修葺明𢎞治間知縣宋鑑重修萬厯初知縣傅好禮復新之大門重樓建於知縣屈諫崇禎中知縣髙去奢以隂陽家言稍抑焉庫在堂左西南為獄養濟院在城隍廟西縣丞廨在縣堂東典史廨在丞廨南教諭廨在儒學明倫堂西舊有訓導廨在教諭廨南今廢三原縣督學署在縣治北大街西舊闗内道行署明洪武二年縣丞仰山建十年知縣吳自當重修天順六年知縣莫謙復修後改督學行署稍西為考院内門相通本朝康熙四十二年知縣李瀛詳請修葺六十一年改在省原署正學書院為義學移駐於此舊有布政分司在縣治北府㕔在縣治西今廢知縣署在縣城南門内東街元至元二十四年縣尹郭真建明洪熙元