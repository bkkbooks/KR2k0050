body:
  text: 陜西通志巻六十八人物十四列女三本朝黄氏長安庠生張訥妻訥卒時氏年二十七矢志守節撫幼子大齡備嘗艱苦歴五十餘載以壽終康熈四十三年旌表汪氏長安民王林妻二十二歳而寡時翁姑年邁色養無缺鞠育幼子克底有成守節五十一年雍正七年旌表張氏長安民徐守仁妻夫故時氏年甫二十一截髪自誓篤志不移翁姑繼亡盡哀盡禮卒年六十三雍正八年旌表王氏長安民郭進節妻年二十八夫亡欲自縊舅姑力勸乃止孝養無虧每焚香祝天願損己年以延親算後二親俱上壽訓子甚嚴悉列成均年六十四卒雍正八年旌表王氏長安民楊佩霦妻年二十四而寡髙堂衰邁幼子伶仃氏仰事俯育艱辛守節雍正八年旌表韓氏長安人郡庠生王維垣繼室年二十二垣卒氏無子鞠前妻二子如己子勤瘁持家冰心不二雍正八年旌表李氏長安民蕭守成妻年二十九夫亡欲自刎以殉族黨力勸乃止堅守清貧晝夜紡績奉事衰翁養葬咸成禮雍正八年旌表時年古稀矣髙氏長安國學生雷溥妻溥卒氏年二十二矢死靡他養親鞠子孝慈兩盡守節三十一年卒雍正九年旌表劉氏長安民謝天寵妻郝氏天寵弟天隆妻劉年二十一夫亡痛不欲生念姑老無依黽勉承順無忝婦職郝年十九而寡無子姑已殁二寡相依式好無間言郝年四十三先劉卒將逝劉撫衾慟哭郝張目謂曰未亡人二十五年常懼鮮終而今知免姒何慟耶遂含笑而瞑劉苦節四十六年病革其子欲肖形以示子孫劉謂婦人不應令畫工見不許其守正不亂如此並雍正九年旌表髙氏長安生員張洪泗妻年二十三泗亡氏曲意養親存歿悉中禮度教二子皆成立苦節三十一年而終又髙氏張積雲妻年二十一孀居其艱苦亦相埒歴今三十九年三子皆成家能養母矣並雍正九年旌表韓氏長安生員張嘉士繼妻年二十七夫殁撫前妻子惟謹姑疾篤躬侍湯藥衣不解帶者七旬性習勞操作至老不懈嘗語諸婦曰人生不可坐食吾欲汝曹學吾勤不欲汝曹服吾勞也雍正九年旌表盧氏長安民張學盛妻年二十五夫亡子幼家貧親族有諷改適者氏以死自誓紡績鞠育艱辛萬狀雍正九年旌表年六十有四朱氏長安民閻復朝妻年二十七而寡毁容截髪誓以身殉姑與母諭止之不從乃痛哭向氏曰天乎彼少婦且死我兩老婦乃不死何哉氏聞言矍然起訴曰兒自今乃不敢復言死晝夜操作教子有成今年已六十餘孫景福方數嵗有至性日繞側不去氏含飴弄孫晚景足樂雍正九年旌表湯氏長安郭孝篤妻年二十三而寡誓不二志姑年老以哭子致脾疾氏寢處與俱每食必市甘脆以進姑喜輙致飽苦節三十五年雍正九年旌表李氏長安民朱存樸妻年十八夫亡無子姪輔焞方幼伯氏夫婦乆嬰痼疾氏事之盡禮焞稍長課使讀書竭力以供修脯得成髦士雍正九年旌表時年五十有六魏氏長安胡元功妻年十八歸元功事舅姑克盡婦道夫殁氏年二十六厲志守節連遭二喪葬祭以禮雍正九年旌表年五十有六蔣氏長安王子免妻夫病疫死父母欲奪其志氏擯媒氏不與接苦節歴三十七年雍正九年旌表姜氏長安楊三台妻年二十二歳三台殁室如懸磬家無次丁氏隻身搘柱以供薪水姑與母諷使改節氏泣拒不從守節歴三十八年雍正九年旌表唐氏長安民俞學文妻年二十六而夫殁遺孤甫週氏養姑守節叔翁欲奪其志因刺面哀號乃止卒年六十七歳雍正十年旌表趙氏長安人陜西督標前營千總劉登龍繼妻登龍以從征吴逆功委署千總迨殁氏年二十有七前子二己子一俱幼氏宵旦撫視相依為命一夕有羣盜入室欲斃諸孤氏挺身告哀乞存弱息卒保無恙自此躬親績紡延師訓子今蘭玉森森連掇科第皆氏教也雍正十年旌表年六十有七毛氏長安人督標右營兵丁劉漢勲妻康熈十四年漢勲戰殁平涼氏年二十有七聞訃欲不食死以姑老强存視息拮据奉養姑得壽終今二子成立五世同堂氏年已八十有四矣雍正十年旌表朱氏長安黄用福妻年二十六夫遇賊死于西鄉氏奉孀姑歸寓母家卒能扶櫬理寃鄉人重之姑病亡晝夜泣不止適為幼女縫衣淚血糢糊誤刺右目見者皆隕涕撫族子為嗣未㡬子婦繼夭苦節四十二年卒王氏長安生員韓仲宷繼妻年二十七歳宷亡謹嚴守節之死靡他課子璋母而兼師璋年少游庠偕婦李氏克盡孝養氏始困終亨獲臻上壽殁時年九十二劉氏長安庠生蔡時盛妻年二十七而寡上事七旬翁姑下撫四齡幼子拮据苦守子馨由貢任鄜州訓導性至孝事母盡誠竭力氏年七十一歳卒馨居喪三年不茹葷不入内室人羡其節孝萃于一門張氏長安候選知州梁鼐繼妻婚三載鼐亡氏時年二十三歳無子女奉孀姑鞠前妻子孝慈兼篤有勸之嫁者嚴詞拒絶守節四十五年子孫皆列黌序殁年六十八徐氏長安民李爵妻年二十八夫亡事孀姑貧能盡禮姑殁無依每並日而食誓死不移遺孤又殀撫孫成立年七十七歲而卒孫氏長安生員崔汝嵐繼妻年十七適崔崔得痰疾經數載氏滌穢嘗藥不少倦崔歿前妻子方十歳氏子生未朞氏慟絶剪髪剺面以自勵卒之日短鬂蓬飛頰上刀瘢歴歴可指年六十七歳苦節四十一年而殁杜氏長安民戴琮繼妻年十九歸戴事病姑克盡婦道越五載夫亡矢志撫孤服縞茹素姻戚不敢以非禮語進子王祐宦安陽潘輿迎養跪進酒肉氏堅却弗御年七十六卒王祐事祖母及母俱以孝聞作吏亦多善政宋氏長安民李金秀妻年二十四秀亡遺孤甫四歳翁早逝姑老多病氏奉侍湯藥五載如一日教子慈嚴並至諸孫耕讀成家年八十五卒張氏長安人署千總趙連城妻年二十九而寡侍姑以養志聞歳荒就食興安艱苦萬狀歸里後姑殁貧不能殮氏拮据成禮教子義方守節四十一年卒白氏長安人王運旦妻夫卒氏年二十七歳守節歴五十三年楊氏咸寜庠生荔松妻年二十六松亡氏勵志守節康熈二十六年旌表年九十一歳卒劉氏咸寜生員王之翼妻年二十五夫亡奉老姑撫幼子足不踰閫者四十餘年康熈二十六年旌表胡氏咸寜民傅宷妻年二十七夫亡子幼守節不渝事舅姑曲盡其禮姑疾侍湯藥無間寒暑歳荒二親繼逝典釵營葬鄉黨為之流涕守節四十餘年卒雍正七年旌表王氏咸寜人武進縣主簿何噐妻噐卒於官氏時年二十四歳攜子扶柩而歸哭不絶聲行道傷之教子慈不廢義二子俱成立堅操歴四十餘載雍正七年旌表鄭氏咸寜民王明學妻年二十七而寡家甚寒氏竭力女紅撫誨三子備嘗艱苦卒年六十六雍正八年旌表王氏咸寜民劉顯妻年二十七而寡遺孤甫週堅心苦守姑欲嫁之氏剪髪毁容以誓雍正八年旌表翁氏咸寜民王臣妻年二十六歳夫亡事舅姑以禮姑病禱北辰求代矢志完節訓子有成雍正八年旌表韓氏咸寜諸生任徵妻年二十九歳徵殁氏夙嫻禮訓撫孤守節閫範肅然教子讀書有成年六十七卒雍正九年旌表師氏咸寜民張宗孔繼妻婚甫期而寡撫前妻子洙泗艱難備歴守節五十七年雍正九年旌表張氏咸寜民李環妻年二十七而寡誓死守節姑年踰九旬卧疾三載氏奉養不衰康熙二十九年陜大饑夫兄某暨夫叔祖母郭氏叔母吉氏俱年邁無子氏迎養於家及殁殮葬皆如禮雍正九年旌表年七十四歳程氏咸寜國學生徐伯齡妻齡歿氏年甫十九矢志不二事姑以孝處妯娌以和教養子姪以慈雍正九年旌表時年六十有五姚氏咸寜民唐雯妻年二十七歳夫亡氏紡績餬口堅志不移因生計艱難子稍長知書即令逐什一以謀衣食家業漸裕訓飭子婦門庭肅然雍正九年旌表年六十矣蘇氏咸寜民鄭君芳妻夫亡年二十六子文斗丈升俱幼舅失明氏扶持保抱朝夕罔倦康熈三十年大祲以木實草根自給卒無異志年七十七終次子文昇亦早殁婦朱氏守節撫子仁克底成立姑夙患痰喘親侍湯藥二十餘年不少怠姑殁設木主朝夕哭奠歴四十四年終子仁亦以孝顯並雍正十年旌表牛氏咸寜民紀之冕妻冕亡氏年二十二矢志守節代夫養親頻遭歉歳不致失所喪葬尤盡禮雍正十年旌表年八十歳盖氏富平人咸寜民髙繼藩妻年二十一而寡㡬死者數矣以舅姑在乃强起奉事鄉黨稱其節孝撫一女既長適諸生劉瑅又乞族子成勲為嗣亦成立雍正十年旌表時年五十三歳齊氏咸寜民魏禮妻年二十三而寡遺孤在襁褓守節四十餘年值逆李破城投身井中三日其子被掠逃囘覔母至井旁聞有聲息拯之出得不死後數年以壽終侯氏咸寜民崔光惠妻夫亡氏年二十二遺腹生子安貧力作撫孤成人守節三十九年而殁王氏咸寜民侯一龍妻年二十七而寡壽歴八旬卒孫氏咸寜民曹振聲妻年二十八夫亡堅心守節繼姑性嚴厲婉容敬事始終無間值歳不登茹茶集蓼撫誨幼子成人歿年六十七歳宋氏咸寜民牛志善妻婚三載夫亡氏年甫十八矢志不二侍養翁姑始終盡禮鞠遺腹子艱辛備至壽六十五卒盧氏咸寜人福建甌寜廵檢徐崇勲妻徐亡時氏年二十六翁姑早逝家計維艱堅志撫孤子琮登雍正丙午賢書卒年六十有四辜氏咸寜生員王有章妻早寡祇一子未㡬殤氏哀痛不欲生㑹山冦亂慨然曰此吾從夫地下時也至山中投崖而死席氏咸寜民楊酉妻夫亡氏慟哭三日不食以剪刀自刺死御史梁熙碑表其墓夏氏咸寜民家女許字未嫁年十七有狂暴艷氏色强投以聘家人不能却里黨畏𫝑咸莫敢攖氏度不免從容訣父母姻戚自縊死鄉人哀之為立碑於城東葬所馮氏咸陽民王興京妻年二十三而寡姑失明晨昏奉事無違值歳祲苦守不二卒年七十二歳雍正三年旌表茍氏咸陽歳貢劉曰鐸妻鐸亡時氏甫二十一歳翁病湯藥親嘗以婦兼子後撫兩姪為嗣朂之學皆獲遊庠雍正六年旌表許氏咸陽民楊梓妻年二十七舅與夫俱客死時祖姑在堂氏親操井臼養老撫孤同居五世人無間言歴三十四年卒雍正十年旌表李氏咸陽人户部員外郎劉元勲母羅氏其庻母也元勲父疾革時二氏環泣許從死李時年二十八羅年纔十九既歿爭願以身殉已而羅挽元勲前謂李曰誰與為育此􅈱􅈱者人言死易立孤難妾請獨為其易李黙念殊未決頃之羅自經死矣李撫哭盡哀於是上奉舅姑下撫孩稚百憂俱萃劉氏不絶如綫越十年而翁復逝婦姑惸惸一燈對績督課元勲無少懈歳己亥元勲成進士入詞林二母之節大著士大夫爭為詩歌以遺之今所傳雙節編是也王氏咸陽人永新令薛人龍妻年二十五夫亡悲不欲生有妾子方二週生母歿氏撫育遺孤決志堅守苦節至六十七歳卒王氏咸陽民劉建貴妻年二十六而寡服闋翁姑以家貧議嫁之媒妁至氏毁唇傷目矢死不從膳親育子年六十六歳卒南氏咸陽民郭文華妻年二十一歳夫殁氏敬奉髙堂遺孤甫二齡誨育備至食貧苦守歿時年五十八歳谷氏咸陽民侯昭妻年二十八歳夫亡氏御窮操作事二老親撫二幼子矢志不奪卒時年七十有八趙氏諸生魏國鼐妻陳氏諸生張翼軫妻康氏諸生張所知妻皆咸陽人夫亡時趙與陳年二十七康年二十八趙守節三十九年陳守節三十七年康守節三十一年學政覺羅逢泰並給匾以旌其門趙氏涇陽人咸陽程君濓妻夫亡氏年二十七苦節自守敎子有成尤好施與遇歉歳周恤不􅌒年九十餘而終董氏咸陽生員王鼐妻年二十五歳鼐亡家貧姑老滫瀡無虧課子讀書以績紡自給守節五十八年卒魏氏興平民岳登顯妻年二十九而寡繼姑欲奪其志屢加箠楚氏終始不變食貧力作略無怨辭歴五十四年而終雍正九年旌表趙氏興平人吕宗端妻夫故時氏年二十三翁痛子成疾數載亦逝祖姑暨姑俱年邁氏奉養惟謹教子力學為名諸生守節凡三十五年卒雍正九年旌表康氏興平民吉正廸妻年二十夫與舅姑相繼逝氏無子欲繼姪為嗣夫有三兄皆不欲輾轉二十年氏憤鬰成疾㡬不起戚屬來唁氏嗚咽良乆曰未亡人不死者兾為夫立後耳今且死然竟無後死晚矣言訖慟絶室中人皆哭失聲頃之甦夫兄允廸立命次子瑞嗣之自此疾愈今瑞已成諸生氏年亦六十七矣雍正九年旌表陳氏興平民符玉妻年二十三歳夫亡同姓皆利其再適氏矢死靡他朝夕紡績以事髙堂育㓜子現年六十五嵗雍正九年旌表何氏興平民孟伯芝繼妻年甫十八婚四月而夫亡鞠前妻子學孔成人娶婦范氏學孔又亡范氏年二十五事孀姑撫幼子一門雙節壽皆踰八旬而卒張氏興平民于天良妻天良業農與再從叔存娃者比屋而居存娃艷氏色欲圗之未有間也雍正九年夏存娃父囑其子蚤起于田存娃乘天未曙呼天良同出堡復潜入天良室氏驚起遽取㸑下刀欲斫之存娃度不能脱奪刀斫氏氏立殞十年存娃正法氏建坊入祠張氏興平吴某妻年十六夫亡誓必死父母曉譬百端矢志不二至百日防之愈宻氏忽飲食如平時朝夕與家人處無忤色父母以為歴時既乆無意於死稍防疎氏中夜自縊死李氏臨潼民朱康國妻年二十二歳夫死子甫一週家貧甚或諷之嫁氏以死誓舅亡事姑益謹晝夜勤紡織子八歳就傅於外祖李顯春學乃有獲姑年八十五卒臨終執氏手不忍釋其孝慈相倚為命如此有司以聞建坊旌表鄭氏臨潼民王運正妻年二十四生女乏乳寄哺于鄰人李如城妻如城瞷妻外出紿以哺乳招鄭氏氏入室不見乳婦急奔避如城扄户調之氏忿罵不從如城奪女摔死舉車木甌氏殞命有司以聞寘城大辟氏奉詔旌表宋氏臨潼民馮璧喜妻璧喜家貧早逝兄嫂令他適氏時方二十嵗乃抱子泣辭而止守節四十年終劉氏臨潼李師白妻師白苦學成疾年未二十而夭氏痛夫無子早喪撫姪為嗣苦節堅守壽八十三終屈氏髙陵民劉文魁妻年二十八嵗夫亡姑老子幼氏紡績事姑年荒奉姑就食南陽姑死氏鬻髪扶櫬歸葬撫子成立守節四十餘年雍正五年旌表蠟梅姓趙氏髙陵人父明道早卒雍正九年八月母仝氏適他往鄰人阮廷義者知蠟梅獨與幼妹小娃在室欲誘之懐棗至其家入厨中蠟梅方持刀理蔬廷義好語之投以棗隨挑之蠟梅覺怒叱之廷義遽前擁求合蠟梅峻拒恐不免即以手中刀斫廷義指廷義奪刀還斫遂殞小娃聞姊聲趨至大驚呼姊死廷義斫之亦仆地廷義隨趨屋後將遁去為鄰人所獲頃之仝氏歸小娃猶張目視指廷義殺人賊語畢亦殞命事聞廷義伏法蠟梅入節義祠建坊旌表李氏鄠縣民王忻妻莊敬孝友鄉里重之年三十夫歿矢志撫孤勤苦備嘗鞠養二幼姪無異已出聞盩厔李顒學術醇正命子心敬從學務使禆益身心時人比之陶孟苦節五十餘載壽八十二卒雍正三年旌表王氏鄠縣生員陳調元妻幼失恃事繼母盡孝年十六歸陳夫亡子生纔六月誓以死守值歳荒傾貲賑濟其子為仇人誣搆氏鬻産營救得免後子列成均孫㨗南宫皆氏六十年苦節所致雍正六年旌表戴氏鄠縣民王收妻年二十八夫亡撫孤守節姑性嚴事之惟謹節衣縮食稍能自給憐姪奇窘與己子均析家貲卒年七十有九雍正八年旌表戴氏鄠縣民王模妻年二十三而寡翁姑憐其少欲嫁之氏聞即自縊頼救獲甦孝親育子荼苦備嘗卒年七十六歳雍正八年旌表王氏鄠縣民劉創業妻結褵甫數月而寡生遺腹子匏聲舅姑懼氏有異志具酒醴至氏家懇氏父母乞令弗再醮俟一二年後子能飲食始議之氏聞言慟絶復甦誓死不二舅姑喜慰過望愛之如己女氏亦曲意承歡孝養備至舅姑俱年八十五而卒氏卒年七十四歳雍正九年旌表髙氏鄠縣民牛義心妻年二十二夫亡氏長齋繡佛矢志撫孤孤既長娶媳生孫子婦又相繼殁孫騰雲生未朞氏辛苦鞠育迄於成立雍正九年旌表時年六十有七張氏鄠縣民李哲妻性孝謹事舅姑能得歡心夫亡後薄産盡鬻頼紡績以供朝夕雍正十年旌表時年六十有六李氏鄠縣民楊孟弼妻秉性端嚴夫有堂弟楊孟重逞暴强姦氏堅拒不從以致殞身雍正八年旌表陳氏鄠縣民張岸妻婚六載岸故子生甫三月翁姑俱老值歳饑氏脱簮珥勤紡績以為養子惰學輙涕泣不食自二十七孀居苦節三十餘年卒王氏鄠縣民魏聲一繼妻年二十五而寡無子父母欲奪其志氏不從撫姪為嗣苦節歴四十年聲一弟儀一妻亦王氏年二十一孀居生子甫三月教育成人備嘗艱苦年五十七歳卒一門雙節有司咸表其閭劉氏鄠縣民騫炯斗妻年二十三嵗夫亡越翼日遺腹生子氏零丁孤苦奉孀姑鞠孤子艱辛備嘗垂殁時五孫繞膝壽七十有六温氏鄠縣民何騰蛟妻年二十四嵗而寡家故赤貧向恃騰蛟樵採以給朝夕騰蛟殁益㷀㷀無倚踰年舅姑繼殂氏艱辛營葬撫孤成立志操彌堅年七十餘卒王氏鄠縣民杜宗韓妻年甫十九而寡翁姑髙年又生長邑城飲食皆有常性夫亡後資生計窮氏力勤織紉或製韈履帶囊之屬鬻市以供甘脆苦守至六十二嵗卒張氏鄠縣生員魏棨妻年二十四歳棨亡子甫三齡氏撫孤操作不輟苦節三十三年而殁崔氏鄠縣民劉孔蔚妻年二十六嵗夫殁無子女慟不欲生私念有姑當養乃止及姑終絶粒數日不死又自縊叔孔芬夫婦救甦迎養於家年七十五卒陳氏鄠縣民王永年妻性聰頴精女紅善書畵年十九夫亡杜門守禮苦節彌堅卒年六十五歳魏氏生員陳治徵妻朱氏民劉于陛妻皆鄠人順治二年賀賊至鄠二氏皆被掠逼之不從遂見殺又王郢妻趙氏王鄆妻史氏居平妯娌相愛聞賊警共誓必死既被掠趙投火死史投井死邢氏鄠縣王敎成妾賀賊自漢中冦西安所經郡邑靡不殘破鄠城陷教成遇害氏見夫死大慟與十四嵗女同投井死彭氏鄠縣民王鷺妻賀珍之亂聞賊至避兵城樓賊登城氏知不免墜城死王氏鄠縣生員仝調鼎妻順治初流孽未靖刼掠時聞調鼎率鄉人與賊格鬭以衆寡不敵被殺氏哭泣嘔血死李氏鄠縣民韓光隆妻為山賊所掠逼之氏罵不絶口因殺死劉氏鄠縣屈崇山妻夫死無子女矢志養姑康熙三十年嵗荒姑勸之嫁不從未㡬饑益甚鄉人多鬻身以乞活姑泣謂氏曰我死在旦夕盍自鬻尚可活我氏泣不應良乆姑大慟曰死耳夫何言氏復哽咽乆之忽起曰如姑命遂鬻于豪家得銀審實付姑乃號泣登車而去入豪家親鄰競釃酒稱賀家人懽呼氏乘間入厠自縊比覺則死已乆賀者相顧驚歎去豪家大恨以敗藁褁尸棄野外積骸中鄉人聞者多泣下王氏鄠縣民王可吉妻年二十六嵗夫歿一子甫生含哀鞠育備歴艱辛子四嵗而殤氏零丁無倚浹旬後值夫喪三週悲哀致祭翼日沐浴自縊死王氏藍田生員張慈妻慈歿二孤俱幼氏痛絶親族憐而慰之少甦泣曰吾不及從夫地下者姑老與子幼耳遂一意事姑毎語及夫平日事輙哽咽不敢對恐滋姑痛也姑歿殯送如儀撫二子俱成立氏年九十六卒順治十一年旌表靳氏藍田廪生臧魁選妻事繼祖姑及舅姑皆能色養夫故氏年二十八翁姑又相繼逝惟繼祖姑在堂孝養愈篤長子教以力田仲叔俱業儒入泮雍正二年旌表李氏藍田民李加封妻年十六歸李越三載夫故子方週家業蕭條氏苦守織紡事姑孝養撫子成立雍正四年旌表康氏藍田民張光宗妻年二十四而寡上有邁姑下有三子扶哀字幼篤志靡他雍正八年旌表李氏藍田民韋錫疇妻年二十四而寡踰年子女皆殤老姑復失明旁無依倚氏食貧力作勁節彌堅年六十二病革時姑年八十有三氏悲不獲終養丁寜堂叔託以尸饔其孝思可憫如此雍正八年旌表王氏藍田民韓雲燦妻生一子雲燦病革語氏曰吾親死囑我以幼弟我死將誰囑乎氏泣而頷之暨殁撫其叔與己子無二視苦節四十九年年六十八嵗雍正九年旌表陳氏藍田民尚隅妻年二十八而寡所遺薄田十數畝姑老子幼屢經歉歳氏朝耕夕紡艱苦百出卒無他虞今二子四孫森森玉立氏年亦届古稀矣雍正九年旌表張氏藍田舉人榮鳴珂繼妻韓氏鳴珂子廩生衮妻康熙三十一年鳴珂歿明年衮又歿二氏各撫一孤相依為命家素貧敝廬數椽不蔽風日值冬夜各置子懐中背倚坐敗草上寒聲􅉡􅉡恒逹曙康熙四十六年大疫母子俱病卧二氏仰天號曰我姑婦可死我子不可死也翼日果瘳鄉人以為誠感張氏現年六十二嵗苦節三十九年韓氏現年六十四嵗苦節三十八年並雍正九年旌表李氏藍田民張守爵妻年二十五嵗夫亡撫孤堅操不二守節三十有八載劉氏藍田民蕭翀妻年二十四而寡子女俱無氏專心孝養二親冰操終始如一卒時年六十有八李氏涇陽儒士張士傑妻婚二年夫死無子氏甫十九苦心守節毎夜藏利刃於枕側以厲清白嗣子早殤復求夫伯兄子為嗣伯兄欲堅其撡曰俟十年後當以吾孫繼之氏益厲冰霜不渝初志卒嗣之守節三十餘年康熙四十四年旌表李氏涇陽儒士牛光璿妻歸未三載璿歿氏矢志守節事孀姑撫嗣子霜操彌勁年六十一嵗卒岳氏涇陽生員髙鼎新妻年十八而寡氏奉老字幼孝慈無愧子遊庠孫曾環膝氏終時七十有一嵗丁氏涇陽民康運晟妻年二十三嵗夫亡子兆吉甫週氏御窮鞠育身心俱瘁兆吉念母苦節奮志勲名隨征西陲以軍功議叙孫亦採芹人皆謂氏四十年冰操之報袁氏涇陽民張體仁妻婚時年甫十四踰三月體仁逺出服賈卒於滇黔間氏旦夕哀號矢志不二所親憐其年少且乏嗣勸改適氏毅然曰夫死當守節未聞以有後無後異也乃鬻衣飾為紡織資終身茹素備歴艱辛年七十七卒里人重其節立碑紀之朱氏涇陽庠生温如玉妻夫歿時氏年甫二十事姑盡禮教子慈嚴兼至紡聲書聲寒暑無間子獲有文名氏年七十一卒王氏涇陽民程雲路妻二十八嵗而寡偕侍妾共守事二親撫二子十年後妾去氏冰操益勵年五十九而終劉氏涇陽民李一鵾妻年二十五而寡家貧甚晝夜勤作以膳翁姑身歴饑寒冰操不改子嗣白少傭耕養母弱冠就學四旬得入泮氏年六十八卒嗣白以孝行舉鄉飲賔劉氏涇陽舉人趙九成妻崇禎十年九成以計偕歸卒氏年二十五誓以身殉以翁姑痛子方深慮重傷二人意遂輟死十六年翁歿於京嗣值闖變閲數年始克歸葬氏流離顛沛奉姑課子室中有孤燕巢梁歴年不易人以為苦節所感又族人趙凱繼者方歿時繼妻梁氏年二十六撫前室子女如巳出奉姑尤盡禮所居室亦有燕巢之異云王氏涇陽人户部郎中韓望妾家本順天㓜嫻詩禮望𣙜關浙省歿於署氏即絶粒誓以身殉六日後扄户自經時康熙壬子十一月也侍女紫燕亦悲慟不食縊于别室嫡子韓端呈明浙中當事各有褒揚紳士歌咏成帙李氏三原人趙思敬妻年二十二敬亡痛絶復蘓遭明末兵荒親屬共强之嫁乃扄户引決排闥救免家甚貧翁姑老子幼氏躬勤績紡𬞞食或不繼兩親甘㫖常充孤稍長就外傅訓誨惟謹雍正三年旌表楊氏三原人魏麟祖妻年十八夫亡撫孤守志孤稍長延師誨之事舅姑以孝聞養葬咸中禮雍正三年旌表徐氏三原人盧星燦妻年二十三燦亡遺腹生子澐氏撫孤堅守父母欲奪其志矢死靡他家範甚嚴澐亦奉教惟謹迄能成立雍正三年旌表楊氏三原民劉卓然妻年二十五夫故家貧歳歉氏質衣殮葬撫孤守節雖資生艱苦終無懈志雍正三年旌表王氏三原民趙鼎臣繼妻夫亡氏年二十六前妻子已成童氏二子俱襁褓教養辛勤杜門守約㓜子獲遊庠雍正八年旌表田氏三原民張玳妻年二十一而玳亡子生甫三月舅姑俱髙年氏堅志守節荼苦備嘗雍正八年旌表時年五十六歳來氏三原民王大任妻年二十四而寡事後姑鞠幼子甘貧守約堅志不移卒年七十有六雍正九年旌表程氏三原民李慎妻年十八適李時翁姑已歿祖翁姑方髙年多恙氏奉養無缺年二十八而寡事二老益勤二老以為吾孫不死也教子極嚴迄能成立現年七十二歳雍正九年旌表王氏三原民顧世公妻世公亡氏年十八矢志一節養老存孤夫弟某夫婦蚤逝所遺子女氏撫如已出性習勤康熙六十年陜大饑氏晝夜織紡生計裕如現年五十七嵗雍正九年旌表張氏三原儒童申效明妻年二十一歳夫亡守節歴明季凶荒迄無二志事孀姑養葬盡禮撫孤世傑以副榜列明經氏年五十七卒李氏三原生員梁應運妻子鎰婦劉氏姑媳皆年三十而寡壽皆至七十五而卒兩世孀居畢生艱苦後鎰子㴻之餼於庠魏氏三原民王伉妻年二十四歳夫歿事姑曲體承歡孤大業既長復娶兄女為婦婦年二十六大業亡㷀㷀姑媳共鞠孫雛身心兼瘁姑七十壽終媳卒時六十有五孔氏三原民晁周鼎妻年二十七而寡敬奉翁姑辛勤教子子瑜既入泮旋亡又撫孤孫亦游黌序苦節髙齡終時八十有三何氏三原張斗煇妻年二十六煇亡遺子女各一家貧甚值歳歉半菽恒不飽教子極嚴子出外見群兒嬉偶隨觀隣翁俱姓者呼而詰之謂汝節婦子當念母氏艱苦何戲為氏知之令子泣謝過後其子卒成立氏年六十有二而卒劉氏三原監生來淑沂妻沂歿時氏年二十一事姑鞠子冰節無虧年五十四歳卒王氏三原生員房大任繼妻年二十三歳夫歿二子暨前妻子世勲俱幼氏撫誨兼至越二十餘載世勲入泮未㡬殀婦楊氏年二十四同守霜幃冰操不二撫四子俱成立氏年五十八嵗終楊氏卒時五十三嵗侯氏三原貢生樊遂妻父觀察惲翁廷尉咸修名門令質善事舅姑年甫十九而夫夭舉遺腹子弱嵗又殤霜閨荼苦堅志不移撫姪芬為諸生氏年五十一卒楊氏三原穆登醴妻醴任揭陽尉卒於官子甫三齡氏時年二十四安貧守節事衰翁撫孤子年八十五歳卒王氏三原民張成德繼妻年二十三嵗而夫亡矢志堅守撫前妻子恩勤提命克底有成隣邑巨室慕其母賢子孝因以女締姻焉年六十三而歿雒氏三原儒童李慥妻夫亡時年甫二十一事舅姑養葬皆中禮撫姪為嗣年五十九而終李氏三原民王繼厚妻繼厚貿易粤東卒時氏年二十一哀慟絶粒既以舅姑垂老兒女方孩而止扶衰鞠幼備極辛勤子既長赴粤扶櫬歸葬氏悲哀致疾尋歿年五十歳趙氏三原民李瑾妻年二十六嵗而孀諸孤在抱就食母家訓子耕讀勤業年七十九卒焦氏三原民張諌陞妻諌陞歿於蜀焦氏年十七甘貧守志以事舅姑撫遺腹子𢎞鰲成立娶媳生孫鰲尋父櫬又亡於蜀焦與媳胡氏鞠二孤苦節終身焦年九十五胡年七十七而終張氏三原民劉作棟繼妻夫亾氏年十九家赤貧鞠三嵗遺孤兼撫前妻子以絍績舂臼為生計後前妻子亡己子復夭偕子婦任氏復撫孤孫荼苦閲六十年而卒王氏三原民秦鄰楚妻年二十一夫亡遺孤甫七月艱辛撫育及娶婦方慶得孫子又亡氏哀痛成疾而卒年五十九嵗馬氏三原民秦大用妻年十九夫亡客邸痛欲捐軀為翁姑勸止食貧操作鞠孤成立壽八十有三而終蕭氏三原民王惟垓妻年二十四而寡撫姪為嗣艱辛食力完節無渝終時七十一嵗仇氏三原庠生員可群繼妻可群賫志早亡氏年甫二十事兩世髙堂養葬均中禮鞠養孤子克繼書香守節二十六年而歿髙氏三原監生李思義繼妻夫歿時氏年二十二嵗撫前妻子璋鞠遺腹子璨教養辛勤咸就成立年五十二嵗卒楊氏三原監生申效祖繼妻年二十三嵗夫歿奉孀姑字幼子屢經艱苦壽七十六而終康氏三原民馮瑾妻夫歿他鄉氏時甫十九嵗事髙堂撫遺孤謹循禮法守節至六十八嵗申氏三原民張古雅妻年二十六而寡值歳祲養親鞠子苦守御窮子獲遊庠氏卒時六十有六焦氏三原人性幽靜父夏常教以古賢媛遺事年十七歸臨潼鄉舉王天寵寵卒絶食累日而病父强之歸氏泣語父曰兒幼奉父教得從王郎地下足矣一夕夢王來迎已遂起櫛沐含笑而逝計為婦僅一年也秦氏三原人適張姓康熙三十一年歳大祲邑民多流亡氏内外皆無倚至龍橋河北見岸土有坼可隠身遂入焉里老吳姓者憫其饑遺以食不食次日復遺之則所遺固在也勸之食且問以故至再乃言曰多翁厚意然不可為常先後等死耳但坐此土坼中令身後不至暴露足矣遂饑死年纔二十餘里老哀之封以土同時李烈女者從親逐食於楚至漢鎮二親俱疫死女年十六貌甚麗其地有市儈薄聘之曰買妾實將鬻女平康以謀重利女至得其情因唾罵求死不獲比鄰傳其事三原之行賈於漢者公忿致詰市儈隂殺之以滅口聞者哀之李氏三原民昝一輪妻一輪貿易蜀中氏年二十三聞夫訃哭三日夜不絶聲卒自縊死雷氏三原民吕承謨繼妻年二十嵗夫亡撫前妻子厲志不移父母憐其少勸之嫁不許因歸寜時潜匿議娶者窺之氏弗覺也返於家其子以告氏閉户痛哭自經死江氏盩厔生員髙㨗妻年十九夫亡誓欲身殉姑以撫孤勉之乃忍死養親鞠子慈孝無虧子嗣昌食餼後復夭氏又撫誨二孫向登順治丙戌鄉榜合廩於庠曽孫列弟子員氏始解頤曰此未亡人所以報吾姑也卒年八十五建坊旌表翟氏盩厔民趙瑞徵妻年二十而夫歿二孤襁褓氏絶粒不欲生既而念髙堂垂白雛幼無依因斷髪以示無他養親鞠子備歴勤勞卒年六十九雍正四年旌表孫氏盩厔民薛培生妻培生病亟顧其子泣曰窮貧蚤逝此子可保耶氏雨泣以撫孤自誓子稍長延師訓之毎躬親績紡午夜課讀或時且課且泣兒止之曰我五内慘裂恒不自知汝苐誦書勿以我為念後其子亦登鄉薦氏年六十餘雍正十年旌表趙氏盩厔民邵秉業妻年二十九而孀家酷貧又當歉嵗母家數迎之不肯歸間遺以粟必以奉舅姑姑常患腹疾醫云用烏蛇治之恐難致耳氏求之應手輙獲姑疾愈人以為孝感雍正十年旌表氏年適届古稀矣諸孫俱學業有成以孝聞彭氏盩厔李可從妻明末可從隨總制汪喬年勦闖軍敗歿於襄城氏聞難絶粒五日因子顒幼穉乃忍死撫孤家素貧𬞞薪不繼終不告貸於人顒稍長殫心理學不事帖括人或謂無補貧寠氏怡然安之及顒學成名著論者多歸功母教焉同氏盩厔民范疇妻明季流賊入境疇被殺掠氏以行氏據井大罵賊逼之氏投入井賊下巨石擊之氏伏坎旁石不能中賊謂其已死遂舍去遇救得出時年二十七乃飲冰茹蘗以育遺孤未㡬疇兄若弟夫婦俱連喪所存幼子弱女氏悉撫育之及長婚嫁咸如禮卒年七十四嵗郭氏盩厔民温成章妻年二十一而寡一子旋殤姑勸其自為計氏泣涕自矢以伯氏子廷掄為嗣後廷掄入泮復夭遺一女氏又撫之暨長甫嫁旋亡氏含哀茹素年六十有四卒卓氏盩厔民史尚質妻夫亡時氏甫二十一嵗姑勸之嫁氏斷髮為誓鞠二子安貧守節二十八年而歿又生員盧思誠妻張氏袁珽妾楊氏田玉起妻李氏皆夫亡守志教子克成孟氏盩厔民趙之璁繼妻年二十三而寡守節撫孤值嵗祲夫兄逃荒於外氏獨奉翁嫜俾得安飽翁嫜歿冡婦李欲奪其志氏堅拒不從至於赴井頼鄰嫗救免教子耕讀克底有成守節四十四年又同里何噐妻任氏袁某妻侯氏皆以守節著聞趙氏盩厔民張靈妻年甫二十翁適南畝命僕張有福歸促饁以餉耕者值靈他適福見氏獨居輙調氏氏大怒疾呼曰䑕子敢爾我何面目生天地間遂舉厨刀自刎隣婦聞呼聲疾往視之則氏己仆地死矣有福見氏死亦自刎未殊知縣駱鍾麟鞫其實為文祭氏寘福於法金氏盩厔生貟任景舜妻孫氏民趙進善妻順治初山賊入堡被掠皆罵賊不屈遇害劉氏盩厔生員吴宗聖妻陳氏儒童張爾立妻賊至俱被掠義不受辱劉投河中陳躍池内賊怒皆以戈殺之費氏盩厔生員孫文光妻彭氏生員劉振風妻順治初年遇冦被掠逼之不從皆投井死劉氏盩厔民郭潤妻年二十嵗夫歿舅姑俱衰一子㓜氏苦節自守舅卒奉姑愈謹姑亦尋逝親族勸其改適氏毅然曰我不早從夫地下者以有舅姑在也今舅姑歿而勸以失節其以我為貪生耶遂自刎死侯氏盩厔傭人辛九榮妻美姿容年十八于歸九榮榮貌陋而癡家貧甚氏織絍供養以孝聞於閭里值嵗大祲閤户待斃舅姑憐氏孝託隣嫗勸他適以求生氏堅拒不從後舅姑與夫相繼歿氏營葬畢以幼子皂娃屬劉姓遂閉户絶食死徵士李顒為之傳李氏渭南民裴子煇妻十五于歸夫妻相敬如賔年二十六裴故撫孤孀居三十餘年如一日事舅姑甚孝養生送死必誠必敬雍正三年旌表石氏渭南民郭栖鳳妻夫歿氏年二十二舅姑念其少欲嫁之氏日跪舅姑前哽咽泣下若不能生舅姑亦潸然而罷舅姑歿喪祭以禮子二人咸授室生子無何次子天祐亡婦宜氏年二十五氏泣謂曰汝子我撫勿效汝姑稱未亡人也婦退而就縊氏抉户救之乃甦自是二寡同心慈孝益篤暨氏殁婦哀痛欲絶每食必祭迄今不改石氏年六十九卒冝氏現年五十八歳雍正九年旌表薛氏渭南民譚嘉謨妻嘉謨歿翁姑以氏無子令改適氏堅志不從乞伯氏子九如為嗣稍長即延師課讀迄於有成苦節六十四年年八十七雍正九年旌表王氏渭南舉人李元祚繼妻性孝謹撫前室女如已出待婢妾尤有恩夫亡無子撫從孫景彪為嗣守節四十六年卒年七十有四雍正十年旌表楊氏渭南民劉𢡟賞妻夫亡翁亦繼逝氏以寡弱無依擕孤寄居父家父無子欲以氏子承基為後氏難之念非此無以慰父乃勉從之父歿即别立楊氏子葬父畢引遺孤復歸劉氏以遺孤成立告於家廟時承基已為諸生人謂兩家宗緒賴以不墜者皆氏力也年五十三而終雍正十年旌表楊氏渭南儒童吴荃妻荃亡氏年甫二十二遺一女甚穉先是荃兄夫婦相繼逝遺子女各一氏并撫之事舅姑尤盡孝雍正十年旌表時年五十有八劉氏渭南孫錫光妻年二十鍚光歿三子皆襁褓氏泣曰以是藐諸孤致不得從夫地下痛哉家赤貧父母勸别議氏正色止之晝夜績紡自給糠籺猶不飽晚年兩目矇矇衣裙不完冬寒指掌皆龜坼見者傷之苦節歴三十餘年卒時氏渭南民段補聖妻郭氏民陳聖典妻順治初冦陷堡被擄不從時投崖而死郭為亂刃所斃李氏渭南民張惺妻烈女寗氏寗邦舉女順治初賀冦肆掠李投井寗自縊死南氏渭南孝亷劉懿宗繼室馬氏其側室也各生一女一名靜年十三一名正年十四時杆賊千餘攻堡懿宗紏衆禦之堡陷被擄二氏懼汚投井死二女隨之有乳母梁氏守井旁賊勢逼亦赴井死數日後懿宗脱歸出其尸面色皆如生稱一門五烈云張氏渭南王仁寰次子某妻年十九夫亡無子欲以身殉兄囑其嫂宻防之氏故為釋然狀欲歸寜實訣其父母也既乃復與嫂歸其家抵暮抱兄子入室以寢子熟寐氏即自殺子驚啼其嫂立至氏急以手絶脰死古氏富平生員竇允陞妻夫亡守節康熈十九年旌表其坊見存本邑竇村唐氏富平温九鵬妻鵬隨外父之任江南值危疾氏截指和藥以進疾始獲痊閲三載鵬亡氏年二十二嵗擕持孩㓜扶櫬西歸茹荼堅守壽五十六而終康熙二十五年旌表王氏富平民常名顯妻婚七載夫亡安貧堅守四十餘年孝養翁姑歿後薦饗務極誠敬翁有妾無出年及七旬氏亦推心奉侍撫子成立今已一門四世康熙四十三年旌表紀氏富平民武承堯妻承堯逝後氏嚴正自律勤瘁逾初嘗語親族婦女曰女德只在一謹字守節則更須茹茶如薺歴五十三載冰操如一康熙四十三年旌表竇氏富平民王昻妻昻客死蜀中氏年甫二十二矢志守節孝養翁姑鞠育幼子荼苦終身康熙四十五年旌表趙氏富平民竇公朗妻夫亡氏二十二歳子甫二齡家徒四壁事翁姑克殫誠敬撫孤成立康熙五十四年旌表劉氏富平民韓養京妻年二十二而寡矢志苦守孝養衰姑撫育孤子康熙五十四年旌表陳氏富平民鍾鳴振妻年二十七而寡家貧甚矢志不移侍病姑衣不解帶者三月朂二子以耕讀雍正二年旌表党氏富平民程文琅妻年二十七夫歿事親鞠子備經荼苦卒時六十八嵗雍正三年旌表陳氏富平民孟𢎞道妻年二十二而寡撫姪為嗣服縞茹素守節歴四十餘載雍正三年旌表樊氏富平民孫自慎妻歸孫時慎客滇未還滇中娶婦生子寄書歸令其改適氏勵志不從事舅姑養葬俱盡禮後慎卒雍正三年子文逹隨生母李扶櫬旋家氏時已五十八嵗哀慟不已待李如同懐視文逹如已出雍正四年旌表王氏富平民張鳳舉妻順治元年鳳舉殁氏甫十九齡家業蕭然氏辛勤力作不致凍餒壽踰耄耋得見曽孫入泮雍正五年旌表李氏富平民張瓚妻年二十一夫亡痛不欲生念夫遺命因殫力奉姑撫子和妯娌睦親族生平無疾言遽色殁年五十三歳雍正五年旌表秦氏富平民汝任妻年二十五嵗翁與夫在粤相繼而殂氏無子痛絶不食戚族感之助金扶櫬守節十五年始獲立姪為嗣鞠字辛勤克底成立雍正五年旌表劉氏富平民孫三哲妻哲亡時遺孤甫兩月繡佛長齋冰霜自矢祭先必敬訓子有方雍正五年旌表楊氏富平民郝世川妻夫歿氏年二十五誓天截髪以示靡他姑臨終囑其改適涕泣不從誨子慈嚴兼至雍正五年旌表潘氏富平民袁之崔妻夫亡堅心守節又艱苦備嘗奉二親悉中禮雍正五年旌表樊氏富平民王祥妻夫歿他鄉獨攜藐孤歸里勤劬自守備歴艱辛子弱冠遊庠雍正五年旌表党氏富平民孫越妻婚三載而夫亡踰四月生遺腹子氏恪奉舅姑不辭艱瘁鞠子成人雍正七年旌表王氏富平民曹栻妻年二十四而寡事祖姑及姑敬謹無違撫孤盡力二子一孫皆列庠序雍正七年旌表田氏富平民張秉乾妻夫殁時氏年二十七痛不欲生投繯者再俱以救免育子慈嚴交盡克㡳成立雍正七年旌表劉氏富平民唐宗義妻宗義亡氏鞠遺孤㡬克成立旋夭撫姪為嗣安窮茹苦堅守清貧雍正七年旌表楊氏富平民劉世鼐妻二十三嵗而夫殁時逢大祲藜藿不充營喪葬咸如禮鞠㓜子撫孤姪守節三十餘載雍正七年旌表惠氏富平民李源妻夫負疴經年奉侍不懈及殁氏甫二十嵗事孀姑鞠猶子堅志完操雍正八年旌表王氏富平民魏之玉妻年二十二而寡侍奉髙堂撫育藐孤拮据井臼霜節彌堅雍正八年題旌時年六十三嵗惠氏富平生員胡之藩妻年二十四之藩卒喪葬成禮訓子以治生為急植品為要子涓經啇江南道拾遺金訪還於主皆氏教也年七十卒雍正九年旌表李氏富平民惠化舉妻年二十一夫殁欲以死殉姑泣諭乃止家甚貧朝夕以女紅自給舅姑復繼逝典衣鬻釵始克成禮孀居歴三十六年雍正九年旌表牛氏富平民程世武妻秉性堅正克盡婦道强暴程尚榮逼姦之氏不從被殺獄成尚榮寘重典康熙五十八年旌表李氏富平楊㬇世妻年二十三而寡育子師遐成立師遐妻蚤故撫遺孫一殿入泮食餼不墜先緒年八十七而卒孟氏富平民韓誾妻年三十而寡事舅姑鞠遺腹子艱辛餬口值明季流離迄無二志卒時年七十八趙氏富平民張我積妻年二十五歳夫亡奉事舅姑存殁皆盡禮率子力田艱辛餬口守節四十六年而殁又田氏同里民孫煊妻夫殁時氏年二十嵗守節四十三年鄧氏富平民孟建業妻年二十三嵗夫為逸獸所傷卒兒又歿於水幼子生甫週㷀㷀苦守五十餘年如一日楊氏富平生員趙有御妻年十九夫亡氏厲志撫孤翁病革諭氏年少當改適氏截髮以明不二姑老患痰疾氏櫛沐俱廢暨疾愈理髮髮盡脱子稍長課讀父書有丸熊畫荻之風守節三十二年而殁何氏醴泉生員髙憲妻子女俱無出堅守五十餘載順治初旌表劉氏醴泉生員袁大壯妻年二十四而寡數欲投繯以殉賴救得免苦節五十年卒一女適生員寗贊衛年二十五歳衛亡安貧堅守撫子成立今已七十矣吕氏醴泉廩生駱善為妻年十七于歸相夫勤學克盡婦道夫病革諄諄以存孤為托時子錦方五齡及殁氏慟絶親族以遺命止之氏斷指截髪誓無二志子既長遊庠食餼克繼父志氏年七十一卒馬氏醴泉民寗増福妻年二十三而寡家貧無依二子方幼或勸以改適氏斥之以死自誓卒時年已七十及見其兩孤成立云趙氏醴泉民魏姬印妻年二十四夫亡生遺腹子世興氏撫孤事姑克盡孝養後子長授室成家不墜宗祀年七十一終郭氏醴泉民張人傑妻夫殁氏年二十四誓以身殉翁姑諭以節哀氏强起養親代夫盡孝翁姑殁泣血三年以婦兼子年五十九終劉氏醴泉生員王孫瑋妻瑋病醫藥罔效氏籲天願以身代及殁氏痛不欲生親族環勸之乃撫姪為子紡績以供衣食歴三十五年五十三而終王氏醴泉民張脩詞妻年二十夫亡矢志同穴長子莪覺之日抱母而泣氏痛其子之無依也黽勉撫孤甘貧自守年六十一而終雒氏醴泉生員于文德妻夫亡氏年二十二翁老子㓜家貧無依父母憐其少欲奪其節氏毁容流血以死自誓聞者傷之年七十一卒張氏醴泉民閻繩祖妻年十八夫亡子士恂生未彌月氏忍痛茹荼子漸長且娶婦僉謂張氏有後矣未㡬士恂亡無子婦南氏立從子為嗣薄田數𤱔婦姑終嵗耕作佐以女紅得免凍餒鄰婦有家貧告貸者更節縮以周之無德色張氏年六十三而終南氏年七十而終南氏守節歴五十一年馮氏醴泉民孫纘妻年二十孀居子如瑜方在抱辛勤撫育克底成立未㡬娶婦生孫如瑜復病殀婦唐氏年二十一誓與姑同守馮語之曰守節難貧家守節更難盍熟思之唐泣曰姑勿言姑為孫氏婦婦獨非孫氏婦乎乃忍死撫孤艱辛備歴馮年八十五而終唐現年六十有三守節歴四十餘年矣任氏膚施民趙冨有妻年二十二夫亡家貧嵗歉氏茹荼飲冰孝事翁姑教子成立雍正四年旌表左氏膚施民吴大年妻年十七大年亡痛不欲生父母慰之曰獨不念白頭翁與藐諸孤乎乃忍淚强進一餐家甚貧老親甘㫖孤子膏火以十指給之弗缺也孤卒成立子孫繁盛雍正四年旌表趙氏膚施民解文鸞妻年二十二文鸞故甘貧守節孝養翁姑勤儉持家撫孤子迄成立雍正四年旌表趙氏膚施生員楊捷春妻㨗春夙嬰痼疾氏敬戒無違年十九㨗春故氏甘貧守節翁哭子喪明氏事之益恭謹及殁喪葬如禮嗣子既長而殞復為亡兒立嗣撫之益篤年四十九嵗卒雍正四年旌表党氏膚施民韓武統妻劉氏武統弟武緒妻党年二十七嵗武統故家貧無子党拮据經營為武緒完娶暨劉舉一子未周武緒亦故劉年二十三嵗兩婦皆守志不嫁奉姑惟謹姑殁盡哀盡禮劉事党如事姑所生子生二孫以長嗣長以次嗣次俱成立劉年五十七卒党現年八十俱雍正四年旌表郭氏膚施民張爾志妻年二十爾志亡氏甘貧苦節孝事翁姑教子成立守節至八十五嵗卒雍正四年旌表杜氏膚施廪生武定邦妻年二十一定邦亡氏茹荼飲冰教子成立年六十八嵗卒雍正四年旌表王氏膚施民夏朝伯妻生長儒素淡泊自甘夫亡矢志守節事親克孝教子惟嚴待姻婭有禮接里黨以和孀居四十年年六十卒雍正九年旌表劉氏膚施民尉諌元妻年二十四而孀子成良方幼氏飲冰茹蘗備極艱辛屢值兵荒卒能自保壽八十六卒雍正九年旌表尉氏膚施儒童朱文鳳妻年十八而寡子鋐生甫四月艱辛撫字稍長督課不懈弱冠遊庠蚤見成立雍正九年旌表年五十八嵗温氏膚施王日昇妻日昇亡矢志守貞備嘗荼苦子令由選貢歴官廣東按察使贈日昇如其官累封氏太恭人暮景恩榮人爭羡之卒年八十有一崔氏膚施生員田呈藩妻夫亡氏年二十一嵗親黨以年少勸改適氏正色拒却之歴五十四年年七十五嵗卒王氏膚施生員夏嗣茂妻年二十五歳嗣茂亡氏誓不再適守節五十八年卒年八十三嵗史氏膚施民田徹妻年二十五嵗夫亡家貧甚氏上事翁姑孝養備至堅正之操始終不渝張氏膚施民何長清妻夫亡時氏年二十二嵗撫孤成立守節六十二年卒董氏膚施民楊文秀妻年二十五嵗夫亡姑老三子年俱幼氏仰事俯育守節四十八年卒魏氏膚施民張名世妻年二十三名世亡氏守節養姑能得歡心姑病篤呼天號泣願以身代及殁盡哀盡禮年七十六嵗卒何氏膚施民李之正妻年十七之正亡欲以身殉翁姑泣諭之乃已家甚貧資績紡以自給終身無間言田氏膚施縣生員薛之光妻事舅姑以孝聞康熙十六年朱龍叛擄氏縛馬上氏罵不絶聲遂遇害時年二十嵗髙氏安塞生員馬應龍妻年二十應龍亡氏典衣營葬明末兵祲頻仍或勸之嫁氏截髪自誓教育二子復早逝氏守志不變年八十卒順治十二年旌表宋氏安塞貢生馬正吉妻正吉少力學氏篝燈佐讀徹夜不寐年二十七正吉亡氏撫孤守志孝養翁姑後二子諸孫俱有聲庠序七十七卒雍正五年旌表宋氏安塞生員馬㢲吉妻年二十九㢲吉亡撫孤守節勤力操作為二子從師費值歉歳絶糧數日終無怨言雍正五年旌表時年七十嵗李氏安塞縣民張大美妻㓜織大義動止皆有禮法于歸後敬戒無違年十九大美客死四川氏聞之痛絶復蘇及櫬歸欲以身殉人以親老子㓜勸止歳歉絶糧或諷其他適氏矢死不二衆感其義共周之雍正五年旌表時年六十餘劉氏安塞民馮友亷妻馮貧甚舅姑甘㫖氏以女紅給之翁殁脫簮珥殯葬年二十八友亷亡姑老子㓜氏仰事撫育艱苦萬狀終無怨悔年七十五卒雍正六年旌表宋氏安塞儒童李大正妻大正亡氏年二十四家貧無依矢志不移姑卧疾二載氏持侍牀榻始終勿懈子三人伯仲業農季子有聲庠序嫁娶皆名族門庭肅然雍正九年旌表守節歴四十七年王氏安塞人延安營兵李天保妻康熙十八年調延安兵駐平涼天保挈家以往二十三年從勦四川牛頭山賊卒於軍時氏方二十八嵗舅姑復相繼殁拮据經營殯葬以禮既終喪復歸鄉井卒年六十二嵗諸子皆成立雍正六年旌表宋氏安塞生員何繼秀妻未筓以孝名父得不起疾思肉食氏割股啖之病遂愈咸謂孝德所感既適何善事翁姑未㡬夫故氏年二十三嵗遺腹生子龍騰拮据經營教之成立年七十卒王氏保安生員牛重輪妻重輪卒年二十二守志不移時翁姑俱年登上壽氏養生送死情文無缺先是氏有子印金方二嵗繼夫兄為後至是氏乞子同養夫兄感其誠亦許之未㡬授室生子兩家宗祀頼以不墜卒時年六十一雍正九年旌表王氏保安生員牛紹孔妻年十七而寡無子乞從子世禄為嗣辛勤鞠育卒能成家舅姑繼亡喪葬咸中禮年五十八卒雍正九年旌表南氏安定太學生强勷妻年十九夫亡勺水不入口者數日未㡬翁殁夫弟某及妻又殁諸孤咸㓜生計維艱事姑仍孝養不衰年五十而終雍正三年旌表張氏安定學生王運起妻年二十六嵗運起卒家貧以針紉為生嗣子不慧氏盡心撫育為之娶婦生孫嚴課家衆長㓜不敢嬉遊比鄰莫不髙其節義雍正五年旌表吴氏安定民强貴妻年二十六夫故時翁姑年近六旬氏孝養彌篤翁姑俱以壽終方姑病篤時氏侍奉湯藥備極辛苦戚族見者莫不稱頌教育三子以務本耕讀為業年六十九卒雍正五年旌表石氏安定廪生南苞妻苞卒氏年二十四時翁殁姑老叔氏皆㓜氏紡績以資誦讀俱能有成嘗語家人曰生子不足繼書香猶無子也長子光烈食餼次承烈舉孝亷孫曾繩繩門户不墜年七十有七卒雍正九年旌表南氏安定廪生任覺民妻年二十七而寡初覺民得狂疾每發輙挺刄奔呼家人辟易氏奮身䕶之勿恤也暨殁痛夫惡死欲以身殉為絶粒者三投繯者再觸柱者一繼以二老無依苦志守節課子𢡟徳童年入泮年五十六而終雍正九年旌表石氏安定生員張文藻妻年二十二夫亡事老姑撫弱子數十年如一日無何姑卒孤亦亡氏艱辛萬狀復撫遺孫成立壽八十卒雍正十年旌表薛氏安定廪生史頴妻年二十六頴故氏撫孤守志事姑尤純孝每哭其夫飲泣無聲或怪之曰恐髙堂慟耳年五十一嵗卒蘇氏安定民史操妻年三十夫亡遺孤道行甫七嵗家極貧苦節三十六年卒白氏安定民李人藩妻年二十三夫亡家甚貧事親撫孤矢志不懈親亡遺㓜叔甫三嵗氏撫之成立年八十卒白氏安定生員張旬妻年二十三夫亡遺孤二家貧不支氏備歴艱辛撫育成立年六十一嵗卒强氏安定廩生李憲邦妻年二十六夫亡家赤貧人數勸之嫁堅不從拮据撫孤雖食粗衣惡不怨邑令聞而重之復其子煥終身年七十七嵗卒雷氏安定民郭帝輔妻白氏郭祚逺妻楊氏郭世蘭妻俱夫亡守志撫孤成立雷得年五十五白得年六十一楊得年㡬八十强氏安定生員楊撫民妻三十而寡遺孤承基甫十嵗撫之成立承基慷慨好施家聲克振氏年六十二嵗卒張氏冝川生員劉秉信妾年二十夫亡苦節六十年撫子夢蛟成立子孫䌓衍楊氏宜川監生劉郡妻年二十八守節撫孤歴四十六年卒馬氏宜川民白玉璜妻年二十五而寡玉璜殁氏罄貲營葬盡哀盡禮翁年老遘疾氏晝耕夜紡以供湯藥旁觀嘖嘖稱孝教育孤子克繼家風守節三十九年卒呼氏宜川生員劉玉璽妻夫亡氏年二十五矢志不二每嵗時奠享恒手挈遺孤伏地長號不起聞者咸為酸鼻時孀姑在堂晨昏奉事必誠必敬暨殁尤盡禮教子極嚴卒底成立歴三十年而終黑氏宜川武生張宗妻年二十夫故姑以其少欲遣去氏囓指自誓姑悔之氏承歡朝夕白首無間氏系本農家孀居後以禮法自持雖應門之童不命入不敢入也子既長娶婦生孫子復殀伶仃困苦視昔有加年六十七卒趙氏宜川民王懋郁妻夫殁時年二十五家貧親老氏義命自安誓不改節卒能教子成立不墜家聲殁年五十五嵗袁氏宜川生員張台範妻㓜嫻女則年十五于歸事翁姑能色養夫殁氏年二十七痛夫早喪欲以身殉未㡬姑繼亡兩喪並舉備物盡禮里人稱之夫有叔暨從弟皆别葬氏念其無嗣改窆祖塋命其子祭掃無缺族黨咸以為難年五十八卒子黄甲善承母訓弱冠遊庠有聲白氏延長民郭運隆妻于歸後翁老姑病曲意承歡年二十二運隆殁家貧無依氏晝耕夜織苦節撫孤每汲水採薪負兒於背見者傷之守節四十五年雍正八年旌表羅氏朱秉寅妻鄭氏李曰福妻並延長人夫死守節甘貧終老羅撫遺腹子李撫彌月子皆成立迄今孫曾蕃衍羅苦節六十二年年八十二卒李苦節三十一年年六十一卒俱雍正九年旌表董氏延長生員馮仕萃妻年二十三夫殁親老子㓜家貧無資賴織紡以給朝夕子世臣稍長延師課讀從子世昌來就學嗣因家窘令世臣務農世昌仍肄業不輟卒成諸生皆氏教也性淡泊敝衣蔬食終身不厭現年七十餘雍正九年旌表沙氏延長捐貢王大臣妻夫婦從翁宦永年事翁及後姑咸盡孝夫染疾方篤翁忽故氏扶柩抵家傾貲具葬未㡬姑又殁夫繼之營葬皆如禮夫弟世臣方㓜撫育恩勤過於己子家門雍穆庭無間言雍正九年旌表年六十六嵗馮氏延長民董閑妻夫亡氏年二十七嵗家徒四壁餬口不周親族有勸再醮者氏引刀誓無他志卒教子成立以承宗祀髙氏延長民劉進義妻年二十三嵗夫亡氏歴四十餘年備極艱苦誓不易節董氏延長民蘓棲鴻妻年二十七嵗夫亡家計蕭然值嵗饑擕子採薇得不死翁姑殁貧無以殮氏傭工隣家得畢葬事康氏延長民賀九成妻夫亡氏年三十五嵗姑老子㓜矢志靡他里黨咸以節孝稱之白氏延長民郭運隆妻年二十二嵗夫亡子未彌月㷀㷀無依誓死自守歴四十五年卒髙氏延川儒童髙恒嶽妻年二十一恒嶽亡舅姑哀其年少無子將嫁之氏誓死不二苦節養親撫從子為嗣教之入泮復早世氏哀痛不已卒時年四十一嵗里黨欽其節而悲其遇焉毛氏董其士妻年二十四而寡髙氏甄奇玉妻年二十五而寡俱延川人養親撫孤苦節終身毛年七十八卒髙年六十九卒郝氏延川民髙爾光妻年二十一爾光亡矢志砥節有貴族議聘氏正色叱之事孀姑撫弱子歴二十年如一日劉氏生員關漢鼎妻楊氏李文魁妻袁氏甄復興妻俱延川人夫亡遺子㓜並守志撫孤成立劉年六十九卒楊年七十四卒袁年八十卒梁氏延川民髙萬舉妻年二十六萬舉亡養親教子矢志不渝年七十五卒又萬全妻梁氏年二十八嵗萬國妻樊氏年二十九嵗夫亡俱撫孤成立梁年七十六卒樊年六十七卒梁氏延川民劉姚舜妻年二十姚舜病故遺一子目盲氏日夜焚香祝天祈愈子疾未幾子目重明教養成立氏年八十三卒程氏鳳翔民張必迥妻迥殁氏年二十二奉養翁姑不愧子職二老殁喪葬咸如禮撫叔教子克底有成年五十七而卒雍正四年旌表甄氏鳳翔民楊徽猷妻歸三載而楊殁奉姑教子心力俱瘁後家業漸起子孫稱温飽皆氏拮据所致也雍正四年題旌時年七十三李氏鳳翔監生盧傳第妻氏年十四適盧甫七載夫病脾氏躬親浣濯藥餌飲食皆手進夫卒氏絶食數日翁姑强之淚涔涔下曰本欲從夫地下奈親老子㓜何遂勵志堅守撫子女恩勤備至雍正四年旌表時年六十六嵗杜氏鳳翔民劉鳳妻年十四歸劉少而知禮舅姑早殁哭奠必誠劉卒家計蕭條氏晝夜紡織課子讀書嚴如師傅子孫多遊庠序守節三十五年雍正四年旌表白氏鳳翔民張鈞妻年十七歸張越六載張病臨終囑氏曰吾親未殯吾子在抱死不瞑矣氏飲泣不能言及鈞亡備嘗艱苦為舅姑營葬課子撫姪守節三十七年雍正四年旌表嚴氏鳳翔民白孕樸妻年十七歸白越八載夫死氏雖農家婦事姑盡孝教子有方年七十三卒雍正四年旌表李氏鳳翔杜少亭繼妻少亭卒氏年三十叔翁欲奪其志氏恚甚欲自刎叔翁駭止撫前妻子關賢如已出後果以文名且克盡孝道焉劉氏鳳翔生員劉養吾妻養吾臨終絶而復甦謂氏曰適見吾門有三異人家四字匾額言畢而逝時子梁棟方二嵗有豪强謀攘其家貲備肆侵蝕氏甘心苦守紡織教子及生孫即以三異名之後三異果成康熙丁丑進士氏孀居三十餘年而卒王氏鳳翔太學生汪𢎞量妻𢎞量遊閩中數年不歸氏事姑不少怠姑病醫云年老血衰得人血合藥方可治氏即引刀割臂流血升許不覺痛楚數日創平如初姑亦尋愈人以為至孝所感李氏鳳翔朱緩之妻夫故氏年二十五子女俱㓜翁姑老憊家素貧氏勤組織事尊育㓜咸取給於十指或勸改適氏以死自誓撫子女皆成立郝氏鳳翔太學生趙承先妻承先逝氏痛哭㡬絶事親以孝撫子以慈有貴族遣媒求聘氏唾其面麾之去至年七旬卒子之桂妻劉氏亦早寡痛姑苦節同矢栢舟撫養遺孤兩世冰操鄉黨嘆服薛氏鳳翔庠生孫妻夫亡氏年二十一遺孤僅二嵗氏痛哭絶而復甦者再四既而撫膺嘆曰與其偕夫同逝豈若撫孤成立以承宗祀乎乃勵志苦守教子毓英列於庠胡氏鳳翔庠生强恕妻恕故氏年十九有妊歴五月生男翁以氏年少欲令改嫁氏聞之籲天自誓乃弗復言氏為冡婦凡中饋勞苦之事卒以身先事繼姑惟謹姑獨鍾愛氏而妯娌亦無間言李氏鳳翔生員袁有熊妻年十八而寡無出側室生子輱氏曰妾子即吾子也教之入成均守節三十餘年卒徐氏鳳翔彭雲衢妻李氏彭雲冲妻徐相夫治家以孝友著聞夫卒守節訓子歴四十年李年未三旬夫故有逼氏再適者氏剨面斷髪誓完節操年八十三卒李氏鳳翔生員彭嘉世繼妻前妻子汝翼方數月撫如已出年二十八夫亡矢冰蘗者三十餘年張氏鳳翔人千總李馠妻年十九夫亡舅姑老且病二子方在襁褓家赤貧辛勤織紡俯仰無憾舅姑殁喪葬咸如禮刻像朝夕奉之教二子俱成名守節三十餘年而卒王氏鳳翔朱良乾妻乾卒氏年二十九遺孤二嵗家貧守節備嘗艱苦子文傑以軍功歴守備氏年八十餘嵗崔氏鳳翔生員劉繼南妻夫故氏年甫十八家貧紡績自給撫遺腹子餘惠教之成立為郡廪生苦節歴三十年趙氏鳳翔劉暹妻年二十而寡遺孤宏績方數嵗氏教之讀書貢於成均氏守節凡四十八年薛氏鳳翔翰林檢討盧熙妾盧典試滇南歸卒旅邸妻子復相繼歿薛年甫二十生一女為立嗣以主喪葬守節二十五年先是有張氏楊氏者運司程雲翼側室也程卒張子鍾瑞楊子毓瑞皆㓜二氏矢志撫孤楊卒張撫其子如已出聞者髙之蒲氏鳳翔生員劉印坤妻年二十七而寡撫子善世既長入成均復早亡遺女孫一氏撫養備至卒時年六十七嵗王氏鳳翔生員吴南謹妻事姑盡孝夫亡氏年二十八家貧守志兩手拮据撫四子皆成立長烜次炘入泮季炇選㧞守節三十八年又舉人王鼎安妻程氏年二十守節歴三十年俞氏鳳翔人吴份妻份卒氏年二十有八子山甫四齡守節自誓竭力奉親有司旌其閭常氏鳳翔生員茍自新妻夫殁哀毁骨立事翁姑以孝聞撫育遺孤慈不掩義及長補弟子員守節三十八年程氏鳳翔張文星妻年十六歸張克嫻婦道張亡氏年二十六痛夫㡬絶以遺孤方㓜堅志誓守年五十餘卒張氏鳳翔張福妻福臨終囑氏改適氏引刀截髪曰妾頗知義豈肯從一不終以為君辱況姑老子㓜乎夫殁紡績事姑不少怠卒撫其子文甲為邑弟子員何氏鳳翔王鏡繼妻鏡卒呼天誓守撫前妻子女恩義兼至理家有法門庭肅然長子廷楹入庠克繼家聲孟氏興濟令王者賔繼妻鳳翔人性勤儉恪循婦職值賀冦變被擄罵賊不屈路經石河灘氏從馬上撲跌數十次目鼻口齒俱毁賊怒殺之其夫亦罵賊被害學使旌其門至今鄉人稱夫婦雙節云耿氏武功人岐山生員李淑世妻淑世死守節二十年卒强氏寳雞監生髙協緒妻髙宦族也氏儉樸自持紡績不輟姑舉一子而病劇氏湯藥之餘兼乳㓜叔夫抱病寢食俱廢及殁哀毁異常時年二十七舅姑憐其早寡無子將嫁之氏誓死不貳以姪為嗣教養備至雍正五年旌表時年五十六嵗王氏寳雞民李茂華妻氏有緦服弟王一位惡少也欲加無禮於氏乘間入氏室逼之氏堅拒不從竟被殺讞定寘一位於法康熙五十四年旌表楊氏扶風生員王秉銓妻年二十九孀居值流冦陷城氏保孤誓守備歴險難子孫俱入庠年七十三卒唐氏扶風民張英侣妻英侣亡氏年二十二矢志完操教子成立年八十四嵗而殁喬氏扶風髙其行妻孀居四十餘載邑令杜俊章表之張氏扶風王憲孔妻憲孔殁遺孤甫週嵗家赤貧孝事孀姑克盡婦道辛勤育孤以至成立四十年無變志陳氏扶風吴鳳妻年二十五而寡家貧無倚氏拮据葬夫事老姑孝養尤謹辛勤撫孤克至成立年七十餘卒邑令毛士儲旌其門申氏扶風于中貴妻夫亡守志訓子有成苦節歴四十餘年鄭氏扶風民楊樸繼妻年二十六而寡無所出撫前室子錦成立娶婦賈生孫涇賈即亡氏撫涇亦成立涇妻康生曽孫鼎彛甫數月而康又亡氏衰年撫鼎彛愈篤氷蘗一心劬勞三世年七十二嵗而殁艷雪姓田氏山西馬邑人年十二為翰林侍讀扶風王豫嘉侍兒從官京邸歴數載無忤色豫嘉悅之生子一殤豫嘉亦以病家居九載艷雪侍醫藥不少間及歿慟不欲生家人覺之艷雪知家人覺之也慮不得死慨然曰吾固不死乃日縫澣滌瀡如平時顧時時亦示笑容又屢以己身後事語人約計棺衾斂葬之具甚悉人詰之且顧而嘻曰若不知吾戯乎人亦戯應之既月餘晨興持女紅至主婦所㑹主婦泣艷雪慰止者乆之日已旰忽持盂水入室紿言櫛沐頃之則自經絶矣時年三十有二先是一月中每入室恒闔户踰時人窺之多料簡衣笥針帖中物不虞其竟死也既畢命粧梳儼然容色恬如含襚所須一一裹置几上若素習者人以是益異之魏氏麟遊生員吕擢妻年二十七而寡翁姑衰老稚子孱弱氏仰事俯育孝慈兼盡後翁姑俱以壽終二子並入學校氏年六十五卒趙氏麟遊民李儀鳳妻年二十四嵗鳳亡家徒四壁氏晝夜績紡易粟而食拾薪而炊歴五十載撫子女皆婚嫁更貽厥孫謀焉李氏麟遊生貟劉寜繼妻年十七歸劉二十一而夫殁母家憐其少微言改嫁事氏剪髪誓守幽居一室親族罕覯其面撫前室遺子紡績以資讀書獲入泮沈氏麟遊民劉元命妻年二十二嵗寡居家甚貧誓不改適姑亡舅存竭力奉事克盡婦道本生父年老無子氏迎養於家十數年晨昏不怠殁葬以禮與生男無異田氏麟遊生貟魏大經妻年二十餘嵗夫亡守志翁姑生養死葬俱能盡禮并善事繼母撫一女一子俱成人苦節二十九年而卒鄉里憐之李氏麟遊民母興妻興死時氏年二十七嵗子女無出家貧守志書夜紡績自給遇荒嵗嘗數日不舉火有勸他適者即怒絶之後抱養棄兒得成立為嗣歴三十六年卒王氏麟遊嵗貢張鼎甲妻事姑盡婦道年二十七嵗稱未亡人撫二孤理家務艱苦備嘗年七十四嵗卒趙氏麟遊御史趙玉堂妻初玉堂為諸生家貧甚氏五夜紡績佐讀遭流㓂刼掠義不受汚墮崖死後玉堂官御史贈孺人玉堂性純篤父病嘗糞視藥人稱其孝登順治乙酉鄉薦擢御史廵鹽兩淮啇人勒石頌之蒲氏汧陽民李輔仁妻年二十三夫亡無嗣矢志守節事舅姑以孝稱撫養㓜叔心力俱殫未㡬姑亡叔夭承翁命撫甥為嗣教訓有方雍正三年旌表時年六十餘矣鄭氏隴州生員徐良翰妻年二十五夫亡哀毁踰禮哭泣頓絶者數次良翰有孝行其殁也父母痛甚氏體夫志以事舅姑甘㫖竭誠祭葬盡慎家有薄産氏以紡織所蓄早完正課教子超慈不掩義為名諸生雍正四年旌表鄭氏隴州生員李春芳妻年三十夫亡守節教子慈嚴並至家貧屢丁兵祲終始不渝卒年七十餘嵗李氏隴州民李崇榮妻年二十六崇榮故氏斷髪誓守孝奉翁姑教遺孤琚克兼父道孀居三十八載苦節彌堅蒲氏隴州庠生馬千乘妻年十九夫亡遺孤在襁褓立誓守節孝事舅姑教子錫庶成明經年踰七十郝氏南鄭民李盤銘妻夫故氏年二十三子甫三嵗親老家貧氏操作度日值翁姑踵逝克盡喪禮訓子勤儉成家雍正三年旌表時年六十餘唐氏南鄭儒士王經世妻年十八適王越三載夫亡子㓜家計蕭然氏力勤機杼事繼姑得其歡心撫子克底成立守節四十餘年雍正四年旌表李氏南鄭民楚之竒妻年二十五之奇亡氏上奉二親下撫㓜子今子克成立翁年九旬猶康强無恙也雍正十年旌表時年六十餘武氏褒城民李彦碩妻年二十夫死守節撫孤遭兵燹逆㓂賀珍欲汚之氏引刀自刎不得死尋剪髪毁容以免年七十餘卒謝氏褒城民何邦海妻夫故時氏年二十三家貧子㓜苦節撫孤年七十五卒張氏褒城諸生歐材妻年二十四夫亡遺子世逷甫三嵗紡績撫孤稍長教之力學十嵗為弟子員兩孫亦入泮守節終身徐氏褒城民何謙妻年二十二康熈十八年冬大兵下漢興逆㓂潰走道經谷口氏避㓂為遊騎所掠縛馬上罵不絶口脅之以刃曰頭可斷身不可辱罵益厲賊怒磔殺之党氏城固諸生王鉉妻年十九鉉故時有勸其再嫁者誓死不從兄珫憐其志為築室居之以終其節卒年七十五鄢氏城固庠生叚陞妻夫亡氏年二十子衮方三嵗安貧守志教子成立卒年七十趙氏城固杜完妻年二十餘夫死子毓鳳方三嵗舅意欲再嫁之氏嚼指以拒曰我不死者為杜氏孤耳後毓鳳列諸生又與婦相繼殁復育遺孫棠成立為諸生年九十卒胡氏城固庠生杜運緯妻夫亡年十七無子撫伯氏彌月子長書為嗣迨書逰泮忽語家人曰我事已了當從夫地下矣無疾而逝時年三十七党氏城固許無愆妻夫亡氏年二十九欲死者再念子㓜無依厲志撫孤内外無間子琯成順治己亥科進士年八十一卒李氏城固人前萊陽令梁衡妻年十七隨夫之任值冦至氏相衡為守禦計萊邑得全後歸里夫亡氏年二十二兵荒迭起氏拮据撫育子復震為弟子員卒年七十亷氏城固生員党瑢妻年二十夫死孤兒以諗甫五月氏自經者再有僕婦勸之曰主死是􅈱􅈱者將誰托氏感動乃不死勤儉自持教子成立守節五十餘年張氏城固諸生譚明議妻年二十二夫亡姑老遺孕生子體質體實氏孝慈兼盡二子相繼為孝亷氏年登耄耋人以為苦節之報陳氏城固李應麟妻年二十夫死仰事俯育一身肩之後翁姑繼殁子亦尋亡又撫其孫文輝為弟子員壽九十餘吕氏城固諸生韓之荆妻荆壯嵗遊學不歸生死無的耗氏歴經兵火事姑孝律身嚴教其子詩莪成名氏年七十有餘王氏城固王懋功女許字同里蔡起麟將嫁喪母服闋起麟又死氏欲奔喪父不許且諷以改適氏乘父他出易服往起麟家執喪盡禮孝養舅姑終其身陳氏城固黎廷鐸妻性至孝姑遘奇疾醫藥罔效氏割股作食以進姑疾忽愈署令王穆旌其門秦氏城固庠生鄭以徳妻年二十二夫亡翁老氏孝養以終其年教二子俱成名守節四十餘載張氏城固鄭啓泰妻夫亡欲以身殉家人防甚宻至虞祭遂自刎死又張氏黄鍾妻夫殁哀痛不已亦自殺党氏城固王爾麟妻年十九而寡逆藩有賊將欲娶之不從將刼之氏沐浴紉裳再拜夫柩前從容自縊閻氏城固貢士張士英妾士英自鄜州訓導歸猝遇冦家人俱被擄氏義不受汚投崖死戴氏城固李沐潤妾隨夫入蜀夫死氏哀痛欲絶扶櫬歸泣拜自縊死饒氏城固劉振祚妻年二十二吴逆犯境人驚避氏與夫相失抱兒投水死王氏洋縣生員李迥知妻迥知亡氏年二十事姑盡孝撫養孤姪苦節五十年順治間旌表李氏洋縣儒士楊暄妻年十六未婚而暄殀氏聞訃欲奔喪父母不許輙自刎不得已令適楊氏姑難之氏誓死不二翁殁於蜀氏多方稱貸扶櫬歸葬康熈二十八年旌表趙氏洋縣諸生楊宜經妻年二十夫亡翁痛子復殁氏殯葬咸如禮值嵗荒姑令改適氏秉節弗衰建坊旌表汪氏洋縣王國紀妻年二十歸王時翁年七旬有四子皆前殁無嗣氏夫其季子也越二載夫又亡遺孤方五月氏誓於夫靈以養老存孤為志翁年至八十六卒喪葬以禮復以先世葬地不吉恐不利於姑晝夜拮据襄事得改殯戚屬以貲助者咸謝去現年六十三嵗雍正七年旌表王氏洋縣庠生周公輔妻賊擄氏欲挾以行不從被創十餘置而去氏斃而復甦壽登八十傷痕宛然張氏洋縣吉聮婁妻夫亡氏年二十二遺孤方在襁褓氏志凛冰霜心勞撫育守節三十餘年張氏洋縣庠生强百福妾强殁嫡令改嫁氏堅守撫孤娶婦生孫越數年子殁孫亦夭强氏無後氏復養他姓嗣之撫之成立苦節數十年如一日周氏洋縣儒士馬汧勛妻年二十五而寡遺孤未週家貧織紡以佐菽水舅姑繼逝喪葬備禮子復逰庠守節五十餘年楊氏洋縣閻龍翼妻夫亡氏年二十無子堅志守節歴五十餘年李氏洋邑紳王竒瑾妾薛氏竒瑾孫啓睿妻瑾疾革以李年㓜無出命再適氏曰妾分固賤然從一而終婦道也泣不承命瑾憐之遂以孫啓睿立為嗣孫瑾故氏為啓睿娶薛氏生子未㡬啓睿故子亦夭李勸薛嫁薛泣云祖姑撫我夫成人今夫亡子殁忍舍而他適耶紡績奉養三十餘年邑令謝景安以節慈貞孝旌其門杜氏洋縣庠生李國宣妻張氏庠生國宁妻俱年十八而寡無子女值冦亂間闗竄徙翁姑慮不免諷之嫁二氏矢志固守屢遭兵火困苦備嘗並歴四十餘年卒王氏洋縣楊仁聲妻年十八寡居甘貧守節育子成人壽七十餘王氏洋縣庠生李國士妻夫亡賊將譚𢎞欲奪之氏斷髪毁容以拒乃止李氏洋縣張兆驄妻避賊入山被掠投崖死叚氏洋縣翟冲雯妻雯死氏年二十二矢志栢舟其翁欲奪而嫁之氏聞自縊死張氏洋縣庠生李躍龍妻賊至夫婦被執欲汚之氏罵賊被害王氏西鄉庠生許天祥妻年十八夫歿苦節六十年旌表氏亡後十年始克葬入壙時紼斷棺墮地其屍顔色如生觀者驚為完節所致李氏西鄉民張宗之妻年二十二而寡子永福甫四嵗氏茹荼飲蘗撫孤成立守節五十餘年子亦備極孝養克順親心李氏西鄉王紹堯妻年二十五嵗夫殁氏守節撫三子皆入泮壽六十八而卒馬氏西鄉穆魁妻年二十二孀居家赤貧事姑盡孝撫五嵗孤映芝成立卒時年八十八劉氏西鄉諸生劉繼錫女王氏諸生王武周女諸生譙之琦先聘於劉繼錫以之琦有疾欲遲㛰之琦父譙璽恐乏嗣復聘於王繼錫控府斷令同歸未一載琦故二氏年俱未二十娩身各舉一子守志撫孤劉子芳蘭王子芳蕙俱遊庠一門雙節闔邑稱之唐氏西鄉儒士龎文章妻年十八而寡撫孤入庠氏病子割股療母有司表其門曰母節子孝金氏西鄉庠生米萬鍾妻年二十而寡善事舅姑貞操不二年六十二卒曲氏鳳縣諸生張鳳儀妻張亡氏年二十哀痛如不欲生翁姑諭之曰汝死如二嵗遺孤何遂勵志誓守事親教子苦節三十餘年建坊旌表謝氏沔縣民姚璋妻年十八歸姚二十五而姚殁哀痛欲殉親族以翁姑老子㓜勸之遂誓守家貧織紡以供堂上甘㫖翁姑相繼殁殯葬有禮撫孤松齡慈嚴並篤得列黌序守節四十四年卒有司以請旌表章氏沔縣民張試之妻年十九適張孝事翁姑夫亡氏年二十七盡鬻衣飾以葬負土成坆血流指掌見者無不墮淚撫子源赤拮据萬狀有諷之改適者氏厲色拒之苦節三十年旌表趙氏沔縣儒士李聖極妻年十九適李紡績佐讀事翁姑以孝稱聖極忽患癖疾憤入井氏隨之俱救免後聖極卒自經死氏義不獨生遂更衣亦縊夫旁時年二十二嵗旌表玉姐沔縣民吴顯章女生有令姿有虞傑倫者素無賴竊入室調之玉姐與婢沙氏厲罵不從被殺死此康熈五十五年事也旌表髙氏畧陽貢生陳伊訓妻陳故氏年三十甘貧守節晝夜績紡每遇祭祀必盡誠致敬教子慈不掩義曰汝曹當勤讀以承先志後三子皆入泮有司以請旌表劉氏畧陽王世業妻年十九夫亡守志撫遺腹子早殤氏年九十餘卒又生員劉起敬妻芮氏亦以守節撫孤著聞鄉里李氏畧陽髙映碧妻孀居有豪右欲强娶氏氏剪髪毁面誓死以拒守節至六十餘知府滕天綬表其門張氏畧陽梁天培妻年二十三夫死甘貧守節吴逆變起賊將欲逼之氏引刀毁容賊駭而走撫育二孤俱成立苦節至五十餘知府滕天綬表其門曰毁容立節潘氏畧陽李應登妻王氏王丹所妻各避冦居砦中賊攻砦將破二氏束衣䝉面投崖死知府滕天綬俱表其門羅氏畧陽梁貢妻年二十一夫亡有遺腹子氏日夜泣撫兾其成立值姑病祝天願以身代翁姑相繼逝殮葬如禮俄而子又夭泣曰梁氏絶矣何生為遂不食死金氏延綏營兵張問禮妻康熙七年問禮隨伍出征物故氏時年二十一嵗聞訃痛絶以翁姑年老强飯侍養不數月翁姑俱逝殯葬如禮遺腹生子基生教養備至艱辛萬狀卒無怨悔年六十九卒雍正五年旌表黄氏榆林民任則榮妻年二十四夫亡甘貧守節孝養翁姑撫孤成立年六十三卒雍正五年旌表王氏定邊民陶魁妻年十八夫亡叔俊以氏年少令改適氏剪髮刺指誓不再醮撫孤成立雍正四年旌表郭氏定邊營人賀麟妻麟故武宦子康熙十八年冦擾定邊麟被掠至秦州亡氏年二十三嵗上事衰姑下撫孤子歴五十餘年雍正初年旌表謝氏定邊民賈世虎妻年二十夫亡子生甫三月家計甚艱從堂兄賈世民陽托矜恤移氏同居氏年少世民欲以為利因逼令改適氏仍歸舊居以避之栢舟之操終始不渝雍正四年旌表許氏定邊民亢孝妻夫亡氏年甫二十一茹荼飲蘗志不稍易雍正四年旌表陜西通志巻六十八
