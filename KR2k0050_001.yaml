body:
  text: 陜西通志巻一星野維天垂象應兹分壤表裏闗河鶉首炳朗兩界劃開雍為吭顙地脊中衡諸州雄長南北之紀脈絡攸昉右軫左參繋綱若網斗樞照臨三秦咸仰術溯甘公龍門世掌作星野志第一鶉首之次秦為鶉首天官家皆言之至泠州鳩有嵗在鶉火我周分野之言而易氏遂疑鶉火為西周岐豐之地今考唐厯志云武王嗣位克商嵗進及鬼而退守井明年周始革命嵗進留於張據此則周語以嵗所在為周分盖以其厯鶉首而至鶉火非即以鶉火為西周也今一以鶉首井鬼分野為凖而凡鶉首之次所麗之雜座皆依丹元子步天歌纂入鶉首秦也鄭氏周禮註東井輿鬼雍州史記天官書秦地於天官東井輿鬼之分野也其界自𢎞農故闗以西京兆扶風馮翊北地上郡西河皆屬焉自井十度至栁三度謂之鶉首秦之分也漢書地理志東井輿鬼秦淮南子東井鬼星散為雍州分為秦國東距殽函西有漢中南含髙山北阻居庸得東井動深之萌其氣險也春秋元命苞鶉首井十至栁三芒種夏至秦劉昭月令章句昔者大帝悅秦穆公而覲之響以鈞天廣樂帝有醉焉乃為金䇿錫用此土而剪諸鶉首張衡西京賦自井至栁謂之鶉首之次秦之分也言盡取鶉首之分為秦之境六臣文選註仰東井之輿鬼覽西秦之伯邑張衡周天大象賦東井謂之鶉首博雅鶉首之次於辰在未謂之洽協於律為㽔賔斗建在午今秦分野帝王世紀自井十六度至栁八度為鶉首秦之分野屬雍州費直起井十二度蔡邕起井十度陳卓范蠡鬼谷先生張良諸葛亮並云東井輿鬼雍州晉書天文志東井輿鬼鶉首也初東井十二度餘二千一百七十二秒十五太中東井二十七度終栁六度自漢三輔及北地上郡西自隴坻至河右西南盡漢中之地古秦梁豳芮豐畢駘杠有扈之國唐書天文志鶉首當河山之右太王以興后稷封焉而宗周之所宅也唐書厯志闗内道古雍州之域漢三輔北地上郡及𢎞農隴西五原西河雲中之境京兆華同鳯翔邠隴鄜坊丹延綏宥為鶉首分山南道興元金洋鳯興為鶉首分唐書地理志東井八星鉞一星鬼四星質一星為鶉首皆秦之分野張守節史記正義鶉首秦此係之二十八宿者也地理通釋井鬼在未自井九度至栁三度屬秦分雍州則陜西永興鳯翔鳯隴邠丹同華耀坊延鄜興元及西夏之西偏秦鳯之西北皆秦分也清𩔖天文分野書自井八度三十三分三十八秒起歴井二十三度鬼二度栁五度一十二分三十八秒共二十九分一秒為鶉首之次其辰在未斗柄建午律應㽔賔明世法錄井宿東井為水事禍成井史記天官書東井秦地漢王入闗五星從嵗星聚五年遂定天下此東井為秦地之明效也漢書天文志東井三輔宿後漢書天文志西南方曰朱天其星曰東井淮南子東井八星主水衡也春秋元命苞秦故治雍今内史也隴西漢中東井也越絶書鎮星主東井木守東井有土功之事一曰大水五星及客星在井皆為水黄帝星經太白守井五糓不成巫咸占鎮星在東井天下大水其大出流殺人太白入東井留一日以上乃占期三月若一年逺五年石氏星經客星干犯東井則大臣誅彗星在東井國大人死七十日主當之五十日相當之三十日兵将當之流星出東井所之國大水荆州星經東井八星天之南門黄道所經天之亭候主水衡事王者用法平則井星明而端月宿井有風雨晉書天文志舊經東井去極七十度渾天儀測東井去極六十八度東井居兩河之隂自山河上流當地絡之西北唐書天文志傅奕曰天上東井黄道經其中正是熒惑行路所涉不為怪異若熒惑入地上井是為災也舊唐書傳奕傳南方東井八星天之南門黄道七曜常行其中為天之亭候主水衡事法令所取平也武密占曰井中為三光正道五緯留守若經之皆為天下無道不欲明明則大水又占曰用法平井宿明月宿其分有風雨日食秦地旱民流暈則多風雨有青白赤氣在日為冠天子立侯王月食有内亂大臣黜后不安五穀不登分有兵喪月暈為旱為兵為民流國有憂一曰有赦隂陽不和則暈暈及三重在三月為大水在十二月壬癸為大赦月犯之將死於兵水官黜刑不平嵗星犯之主急法多獄訟水溢将軍惡之逆行入井川流壅塞熒惑犯之兵先起者殃入守經旬下有兵貴人不安守三十日成勾巳角動色赤黑貴人當之百川溢兵起填星入犯之兵起東北大臣憂在觜而去東井其下亡地太白犯之咎在将乆守其分君失政臣為亂辰星犯之星進則兵進退則兵退刑法平又曰北兵起嵗惡芒角動揺色赤黑為水為兵起客星犯之榖不登大臣誅有土功小兒妖言彗星犯之民讒言國失政一曰大臣誅其分兵災流星犯之在春夏則秦地謀叛在秋冬則宫中有憂乙巳占流星色黄潤國安赤黑秦分民流水災漢永元銅儀井宿三十度唐開元遊儀三十三度去極七十度景祐測驗亦三十三度距西北景去極六十九度宋史天文志漢洛下閎測井三十三度宋崇寧測井三十三度少志元測井三十三度三十分元史厯志井三十一度井八星以近鉞一星為距三十四度井南方七宿之一八星如井横列河中參旁之東有玉井故井宿曰東井明世法錄南方七宿井喙鬼目井主秦雍也天星訂考井主水衡法令中平之事物之平者莫如水故營國制城畫野分州皆取象焉東井一曰天府一曰東陵一曰天井一曰天門一曰天渠一曰天候一曰天齊一曰天池水星也主水泉亦為天之南門日月五星貫之為中道又主酒食女主之象主三公之位為天之亭候主水衡法令之所取平也三光行不由其中道為下無道雖經之不得留之王者心正則井星正明則法度正號令明大盛則多風雨有大水暗中不正則國弱兵亂動揺變色則諸侯帝移徙則國亂君憂决水為災又曰井為天子府暗芒角日月食五星犯逆大臣謀亂兵起中有六星不欲大明明即火災井八星距西扇北第一星去極六十九度井八星三十一度為水患為行舟在氣為木在肖為犴圖書編鬼宿輿鬼鬼祠事史記天官書輿鬼秦也漢書天文志輿鬼五星天府也後漢書天文志熒惑主輿鬼星經南方曰炎天其星曰鬼淮南子輿鬼謂之天廟博雅輿鬼天目也朱雀頭也嵗守鬼十日金錢散諸侯熒惑犯守鬼國有大喪有女喪大将有死者土犯鬼后有憂失亡其勢鎮入鬼中大臣誅黄帝星經嵗星入留輿鬼五十日不下民有大喪百日不下民半死太白入鬼一曰病在女主一曰将戮死石氏星經月五星入輿鬼大臣誅嵗入鬼五糓多傷民以飢死者無數辰星入輿鬼以罪誅大臣一曰后疾一曰大人憂郄萌占鎮入鬼中有土功事巫咸占太白入鬼亂臣在内韓楊占熒惑犯鬼忠臣戮死不出一年中荆州星占輿鬼五星天目也主視明察姦謀東北星主積馬東南星主積兵西南星主積布帛西北星主積金玉隨變占之鬼星明大則糓成不明則百姓散晉書天文志渾天銅儀測輿鬼去極六十八度輿鬼居兩河之陽自漢中東盡華陽與鶉火相接當地絡之東南唐書天文志輿鬼主觀察姦謀日食國不安有大喪貴人憂暈則其分有兵大臣有誅廢者月食貴臣皇后憂期一年暈為旱為赦月犯之秦分君憂一曰軍将死貴臣女主憂民疫嵗星犯之國傷民饑君不聽事熒惑犯之忠臣誅一曰兵起后失勢入則后及相憂一曰賊在君側有兵喪勾已國有赦留守十日諸侯當之二十日太子當之勾已環繞天子失廟填星犯之大臣女主憂守之憂在後宫為旱為土功太白入犯之為兵亂臣在内一曰将有誅貫之而怒下有叛臣久守之下有兵為旱為火萬物不成辰星犯之五糓不登守為有喪憂在貴人客星犯之國有自立者敗一曰多土功入之有詛盟祠鬼事彗星犯之兵起國不安星孛其下有喪兵起宜修徳禳之漢永元銅儀輿鬼四度舊去極六十八度景祐測驗輿鬼三度距西南星去極六十八度宋史天文志漢洛下閎測鬼四度唐一行測鬼三度宋皇祐測鬼二度崇寧測鬼二度半至元測鬼二度二十分元史厯志鬼宿四星曰輿鬼一曰天目主視明察姦偽朱雀頭眼一曰天鐵鑕主誅殺一曰天廟主祀事一曰天松一曰天匱一曰天壙主疾病死喪土星也其中為日月五星中道觀象玩占鬼四星以右二星為距二度明世法錄鬼四星距西南星去極六十九度半鬼三度為淫辭為妖孽在氣為金在肖為羊其餘氣為暗金圖書編鬼四星欲其明明則五糓成動揺則疾病水災人死如麻月犯鬼人疾疫入鬼人多病死羣芳譜井鉞以下係井宿雜座井西曲星曰鉞傷成鉞史記天官書晉灼曰賊傷之占先成形於鉞史記注敗成鉞春秋文耀鈎鉞淬水而刑及張衡周天大象賦鉞一星附井之前主伺淫奢而斬之故不欲明明與井齊則天子用鉞於大臣晉書天文志鉞一星附井宿前月犯井鉞大臣誅有水事嵗星犯井鉞近臣為亂兵起填星入井鉞王者惡之宋史天文志鉞一星在井邊二寸明世法錄鉞附於井所以斷也鉞一星附井口第一星主邊兵起主伺淫奢而斬之不欲其明大大而明則鈇鉞用事兵起揺動芒角則大臣多死於法者星芒則天下大水鉞一星去極六十九度少入參半度圖書編南河北河鉞北北河南南河火守南北河兵起糓不登史記天官書兩河占胡越之域張衡周天大象賦南河北河各三星夾東井一曰天髙之闗門也主闗梁南河曰南戍一曰南宫一曰陽門一曰越門一曰權星主火北河曰北戍一曰北宫一曰隂門一曰胡門一曰衡星主水日月五星之常道也晉書天文志兩河夾井以相望張淵觀象賦南河三星與北河夾東井河戍動揺中國兵起河星不具則路不通水泛溢月出入兩河間中道民安嵗美無兵出中道之南君惡之大臣不附星明為吉昏昧動揺則邊兵起逺人叛主憂月犯之為中邦憂一曰為兵為喪為旱為疫行西南為兵旱入南戍則民疫暈則為土功乘之四方兵起經南戍南則為刑罰失嵗星犯之北主憂熒惑犯兩河為兵守三十日以上川溢守南河糓不登女主憂守南戍西果不成在東則有攻戰填星守兩河為旱民憂守之為兵道不通太白舍三十日川溢一曰有姦謀守兩河為兵起客星守之為旱為疫彗孛出為兵守為旱流星出為兵喪邊戍有憂北河亦三星五星出入留守之為兵起犯之為女喪乗之為北主憂嵗星入北戍大臣誅熒惑從西入北戍六十日有喪從東入九十日有兵一曰出北戍北守之邊将有不請於上而用兵外國者勝填星守之兵起六十日内有赦一曰有土功若守戍西五糓不實太白舍北戌三十日為女喪有内謀守隂門不出百日天下兵悉起辰星守之外兵起邊臣有謀留止則兵起四方客星入犯之有喪於外姦人在中入自東兵起期九十日入自西有喪期六十日守之為大水流星經兩河間天下有難入為北兵入中國關梁不通宋史天文志南北兩河地之關門南北兩界逆斜彗客犯南河為旱北河為水厯學會通北河為隂國主攻伐之政南河為陽國主禮樂之政南北二河所以分諸夏而定夷貊北河三星距東大星去極六十一度半入井宿二十度南河三星距東大星去極八十三度半入井宿二十一度圖書編兩河間為天中道七曜常行而過之則吉久留則殃咎生羣芳譜天樽天樽奠饌而翕集張衡周天大象賦天樽主盛饘粥以給貧餒晉書天文志天樽三星樽器也明為豐暗則嵗惡宋史天文志天樽主樽罍天子酒器厯學會通天樽三黑星在井北五諸侯南三星鼎足立明世法錄天樽三星距西星去極六十度入井宿十六度圖書編五諸侯五侯疑議而衡立張衡周天大象賦五諸侯五星在東井北主刺舉戒不虞又曰理隂陽察得失亦曰主帝心一曰帝師二曰帝友三曰三公四曰博士五曰太史此五者常為帝定疑議晉書天文志五諸侯五星斷疑刺舉戒不虞星明大潤澤則天下治五禮備則光明不相侵陵暗則貴人謀上芒角禍在中嵗星犯之兵起三年熒惑犯之大臣叛不成太白犯之諸侯興兵亡國經天晝見則諸侯受誅客星犯王室亂諸侯亡地秦國殃守之諸侯親屬失位彗孛犯之執法臣誅又曰貴臣當之期一年宋史天文志五諸侯畿外諸侯也聖王所以建國而養民者也五諸侯决疑斷獄五諸侯距西星去極五十六度半入井宿六度半圖書編積水熒惑入積水水兵起入積薪旱兵起守之亦然積水在北戍東北漢書天文志積水醖燕酎之勞張衡周天大象賦積水一星在河西北水河也所以供酒食之正也晉書天文志積水候水災隋書天文志積水一星在北河西北不見為災嵗星犯之水物不成魚鹽貴民饑熒惑犯之為兵為水辰星犯之為水旱客星犯之兵起大水大臣憂期一年宋史天文志積水積薪六府之首事也積水積薪主水火之齊以給烹餁積水一星去極五十四度半入井宿五度圖書編積水一星在北河上主聚美水給天子酒食明則天下大安宴享行暗則五糓不登人民憂明大動揺河海溢决津梁不通五星犯守有水災火犯之主旱流星抵積水若入之大水羣芳譜積薪積薪在北戍西北漢書天文志積薪備牲庖之給張衡周天大象賦積薪一星在積水東北供庖厨之正也晉書天文志積薪一星不明五糓不登熒惑犯之為旱為兵為火災客星守之薪貴宋史天文志積薪一星去極六十五度半入井宿七度半圖書編積薪聚薪也給享祀供庖厨星明則五糓熟享祀修庖厨足暗則庖厨空天下旱嵗歉人饑積水積薪相去五尺以内則天下平五糓登一丈内則天下饑荒人民流亡火守之旱水守之大水五星犯積薪若守之五穀不成民饑流亡羣芳譜水府水府司乎百川張衡周天大象賦東井西南四星曰水府主水之官也晉書天文志水府四星主隄塘道路梁溝以設隄防之備熒惑入之有謀臣辰星入為水客星入天下大水流星入色青所主之邑大水赤為旱宋史天文志水府四黑星在井西南鉞下明世法錄水府天子宫内水官厯學㑹通水府主隄防溝洫之事水府四星距西星云極七十六度半入井宿十度半圖書編水位水位四星㵼溢流移流近河北則國没巫咸占水位㵼流而迅崩張衡周天大象賦水位四星在積薪東主水衡晉書天文志水位四星在積薪東一曰在東井東北主水衡嵗星犯之為大水一曰出南為旱熒惑守之田不治客星犯之水道不通伏兵在水中一曰客星若水火守犯之百川流溢彗孛出為大水糓不成流星入之天下有水糓敗民饑宋史天文志水位四星東井西南列主水衡瀉淫溢水官也石氏曰衡平象水水平而後流觀象玩占水位四星距西星去極七十三度半入井宿十八度圖書編水位以㵼淫溢水官也微小如常則雨澤時天下安明則大水横流五糓傷民饑五星犯之大水入城郭傷人五星守之北大水南大旱客星守之百川泛溢彗孛犯之水路不通羣芳譜四瀆四瀆斷江淮之候張衡周天大象賦東井南垣之東四星四瀆江河淮濟之精也晉書天文志四瀆四星明大則百川决宋史天文志四瀆四黑星在南河之裏東井之南軒轅之東明世法錄四瀆四星距西南星去極八十六度入井宿二度圖書編軍市軍市通貨以圓綴張衡周天大象賦軍市十三星在參東南天軍貿易之市使通有無也晉書天文志軍市十三星狀如天錢中星衆則軍餘糧小則軍饑月入為兵起主不安五星守之軍糧絶客星入則刺客起將離卒亡流星出為大將出宋史天文志軍市天軍貨物之市水官也觀象玩占軍市十三星距西北星去極一百七度半入井宿初度圖書編野雞精野鷄俟兵而據市張衡周天大象賦野鷄一星主變怪在軍市中晉書天文志野鷄伺晨於參墟張淵觀象賦野鷄一星在軍市中主變怪出市外天下有兵守静為吉芒角為凶宋史天文志野鷄主知變怪虞伏奸又曰野雞大將也主屯營軍之號令警急設備觀象玩占野雞在軍市中掌野外之禽鳴則天下野鷄盡雊一曰知夜辰鳴則凡鷄始鳴也厯學會通野鷄雉也與狼俱山野物也雉性剛决狼性貪戾狼之盗主西北之國盖井在斗魁之西北也天星訂考軍市行軍之市野鷄精主知物價察姦慝賈師也野鷄一星去極一百九度半入井宿四度半圖書編孫孫孕緒而連綿張衡周天大象賦子東二星曰孫晉書天文志孫二星在子星東以天孫侍丈人側相扶而居以孝慈不見為災居常為無咎宋史天文志孫子主孝愛以侍丈人孫二星距西星去極一百一十五度入井宿六度圖書編子子扶尊而渺邈張衡周天大象賦丈人東二星曰子晉書天文志子孫嘒嘒於參隅張淵觀象賦子二星侍丈人側不見為災宋史天文志子二星距西星去極一百二十八度入星宿四度圖書編丈人丈人通臣而夜懸張衡周天大象賦軍市西南二星曰丈人晉書天文志丈人極陽而恍惚張淵觀象賦丈人二星主夀考悼耄矜寡以哀窮人星亡人臣不得自通宋史天文志丈人國之老臣也又曰主夀考而哀孤窮觀象玩占丈人二星距西星去極一百二十八度入參宿四度圖書編闕邱兩河天闕間為關梁史記天官書正義曰闕邱二星在河南史記天官書註闕邱擬乎兩觀張衡周天大象賦南河南三星曰闕邱主宫門外象魏也晉書天文志西河之濵所以設險限秦晉故其地上應天闕其南曲之隂在晉地衆山之陽南曲之陽在秦地衆山之隂隂陽之氣并與東井通河東永樂芮城河北縣及河曲豐勝夏州皆東井之分唐書天文志闕邱三星在南河南宋史天文志闕邱三星在南河東主象魏天子之雙闕諸侯之兩觀也金火守之兵戰闕下文獻通考闕邱二星距大星去極九十步少入井宿十五度圖書編狼參星東有大星曰狼狼角變色多盗賊史記天官書狼援戈而野戰張衡周天大象賦狼一星在東井東南狼為野将主侵掠色有常不欲動也晉書天文志狼星揺動於霄端張淵觀象賦秦人占狼弧乙巳占鶉首之外雲漢潛流而未達故狼星在江河上源之西西羌吐蕃吐谷渾及西南徼外夷人皆占狼星唐書天文志狼一星芒角動揺則兵起明盛兵器貴移位人相食色黄白為凶赤為兵月犯之有兵不戰一曰有水事月食在狼外國有謀五星犯之兵大起多盗彗孛犯之盗起客星守之色黄潤為喜黑則有憂宋史天文志狼主殺掠一曰夷将一曰天陵主南夷主盗賊金官也觀象玩占狼一星去極一百七度半入井宿十度圖書編弧矢仲春之月昏弧中禮記月令昏旦中星皆舉二十八宿此云弧星中以弧星近井度多星體廣不可的指故舉弧以定其中也禮記月令疏狼下有四星曰弧直狼史記天官書弧屬矢而承天張衡周天大象賦弧九星在狼東南天弓也主備盗賊常向於狼弧矢動移不如常者多盗賊邊兵大起狼弧張害及民天下乖亂又曰天弓張天下盡兵晉書天文志弧精引弓而持滿張淵觀象賦弧矢鷄犬皆徼外之備也唐書天文志弧矢九星主行隂謀以備盗常屬矢以向狼武宻曰天弓張則北兵起動揺明大則多盗矢不直狼為多盗引滿則天下盡為盗月入弧矢臣逾主月暈其宿兵大起客星入南夷來降若舍其分秋雨雪穀不成守之外夷饑出入之為兵出入流星入北兵起屠城殺将宋史天文志弧矢主備非常觀象玩占弧主天子弓以備盗賊矢主羽箭厯學會通弧矢天弓也狼為奸冦弧司其非故常注矢以向狼矢端直則狼不敢動明世法錄弧與矢備盜防私弧矢九星去極一百十四度入井宿十五度圖書編老人秋分日饗夀星於南郊月令夀星南極老人也月令註狼比地有大星曰南極老人老人見治安常以秋分時候之於南郊史記天官書老人作主而秋煥張衡周天大象賦老人星一名夀星色黄明大則主夀昌天下多賢士黄帝星占王者承天則老人星見臨其國孫氏瑞應圖王者安静則老人星見春秋文曜鈎老人一星在弧南一曰南極常以秋分之旦見於景春分之夕没於丁見則治平主夀昌晉書天文志即長春而隱見當丙丁而的皪晃如金粟燦若銀燭其光如丹其大如李唐老人星賦老人一星在弧矢南見則治平天子夀昌不見則兵起嵗荒君憂客星入為民疫一曰兵起老人憂流星犯之老人多疾宋史天文志南極老人在弧矢南司天下人民夀算盖北極在丑艮故南極在未坤南極入地三十六度不可得而見也故其精神出地以見乎南謂之南極老人然其出地亦不甚逺故隱見不常見則為祥其勢位等威盖與中斗相埒以輔上帝故雖在井分井不得而司之也宋中興天文志老人主夀考去疾疫除毒氣一曰夀星巫咸曰老人木官也觀象玩占老人所以占大人夀考者也老人一星去極一百四十三度入井宿三度圖書編鬼積尸氣以下係鬼宿雜座輿鬼鬼祠事中白者為質誅成質史記天官書晉灼曰輿鬼五星其中白者為質正義曰鬼中一星為積屍一名質主喪死祠事熒惑入鬼天質占曰大臣有誅史記註輿鬼中央星如粉絮鬼為變害故言天尸斧鉞或以病亡或以誅斬火剋金天以制黄帝星經輿鬼者天之尸也弧射狼誤中參左肩舉尸之東井治留尸輿鬼故曰天尸鬼之為言歸也又占月五星有干鉞乗質者君貴人金玉用民人多死從南入為男子從北入為女從西入為老人從東入為壯丁棺木倍價郄萌占質明祀而變生張衡周天大象賦輿鬼中央星為積尸主死喪祠祀一曰鈇鑕主誅斬質欲其忽忽不明明則兵起大臣誅晉書天文志嵗犯鬼鑕執法臣誅填星入鑕王者惡之犯積尸在陽為君在隂為后左為太子右為貴臣隨所守惡之流星犯鬼鑕有戮死者入則四國來貢積尸氣一星在鬼宿中孛孛然入鬼一度半去極六十九度在赤道内二十二度主死喪祠祀宋史天文志中央色白如粉絮者謂之積尸氣一曰天尸主死喪祠祀一曰鐵鑕主刑罰主誅斬如雲非雲如星非星見氣而已觀象玩占鬼主祀事祖考之象中央積尸所以象神也甘氏云積尸搖動則疾病鬼哭人荒圖書編天漢新法測以逺鏡始知是無算小星攅聚成形積尸氣亦然湯若望新法表異爟爟含烽而喋冦實防邊之有候張衡周天大象賦軒轅西四星曰爟爟者烽火之爟也邊亭之警候晉書天文志爟四星在鬼宿西北一曰在軒轅西主烽火備邊之警急以不明為安明大則邊有警宋史天文志爟主烽火備急行邊庭掌四時火變厯學會通爟火也夏官行火令四時變火以救民疾春榆柳青夏棗杏赤秋柞楢白冬槐檀黑天星訂考爟四星距西北星去極六十度半入井宿二十九度圖書編天狗天狗吠盗而映漣張衡周天大象賦狼北七星曰天狗主守財晉書天文志天狗接狼以吠守張淵觀象賦天狗七星在狼星北動移為兵為饑多冦盗有亂兵填星守之人相食客彗守之則羣盗起宋史天文志天狗七星在鬼西南狼之北横河中以守賊也移徙則兵起金火守之人相食文獻通考天狗守禦以防奸也亦祭宴之牲也天星訂考天狗七星距西星去極一百二度入井宿二度圖書編外厨外厨調列膳之滋張衡周天大象賦栁南六星曰外厨晉書天文志外厨六星為天子之外厨主烹宰以供宗廟宋史天文志外厨六星祭祀烹宰之屠也觀象玩占外厨曰外者對紫宫内厨言也以享以祀而烹宰也天星訂考外厨六星距大星去極九十二度半入鬼宿二度圖書編天社惟天社之赫若實勾龍之神焉張衡周天大象賦弧南六星為天社昔共工氏之子勾龍能平水土故祀以配社其精為星晉書天文志天社六星明則社稷安不明揺動則下謀上太白熒惑犯之社稷不安客星入有祀事於國内出則有祀事於國外宋史天文志天社在老人星東南似栁直明則吉文獻通考天社弧東南社神也觀象玩占天社祝祠之官厯學會通天社春社以興農事秋社以報秋成后土之精也鄭氏曰天社者東井輿鬼之外地神也即社稷之社也勾龍者侑食之人鬼也天星訂考天社六星距西南星去極一百三十四度入井宿十二度圖書編天紀天紀錄禽而獻齒張衡周天大象賦厨南一星曰天紀主禽獸之齒晉書天文志天紀一星在外厨南太白熒惑守犯之禽獸死民不安客星守之則政墮宋史天文志天紀知禽獸嵗齒應天子御馬醫獸之吏厯學會通天紀一星去極一百一度半入栁宿三度圖書編尾箕折木之次以下係陜西邊境之分屬各宿者凡所應無多非全秦分野可比槩不圖形凉州入箕十度西河上郡北地入尾十度晉書天文志按晉書地理志凉州金城郡榆中白土即今榆林亦涉晉時凉州邊界故并載箕宿觜參實沈之次魏地觜參之分野也髙陵以東皆魏分漢書地理志漢中入參九度晉書天文志魏地西距髙陵觜觽參伐實沈也自河東盡西河之地唐書天文志闗内道麟豐勝銀夏單于安北為實沈分唐書地理志按左傳子産曰髙辛氏遷季子實沈於大夏主參故參為晉星魏本晉地髙陵河西其為參分無疑惟史記天官書云觜參益州星經云觜參魏益州而晉天文志遂云漢中入參九度夫魏與益州隔絶數千里豈參既主晉復越秦而主蜀歟抑列國分野果以受封時嵗星所次為言歟晉書必有定見未可輕非姑並存之以俟知者昴畢大梁之次趙地昴畢之分野也西有五原漢書地理志五原在今榆林邊外柳星張鶉火之次鶉火分野自河華之交北負河南及漢柳在輿鬼東又接漢源當商洛之陽接南河上流唐書天文志闗内道商為鶉火分唐書地理志栁星張在午自栁四度至張十四度屬周分商洛周分也清類天文分野翼軫鶉尾之次楚地翼軫之分野也漢中楚分漢書地理志國星屬女宿以下係他宿之雜座主秦分者秦二星在周星東南甘石星經東西兩周次二秦隋丹元子步天歌十二國十六星在牛女南近九坎各分土居列國之象周東南北列二星曰秦有變動以其國占之宋史天文志五車屬畢宿五潢五帝車舍史記天官書正義曰五車五星在畢東北西北大星曰天庫主秦史記註五車者五帝舍也西北大星曰天庫主太白主秦晉書天文志五車五星在畢宿北五帝坐也西北大星曰天庫主太白秦分及雍州主豆宋史天文志北斗屬紫㣲垣以下係三垣中之星主秦分者杓自華以西南史記天官書正義曰杓北斗第七星也華華山也杓華山西南之地也史記註按晉隋天文志斗七星一至四為魁五至七為杓北斗惟魁主秦天官書則以魁主海岱杓自華以西南春秋文耀鈎以第一星主秦第六星主梁然則所謂杓自華以西南者或指梁而言歟而華之西南半屬秦地則又有難以臆斷者矣玉衡第二星主益州常以五亥日候之乙亥日為漢中後漢書天文志按史記天官書北斗七星所謂璿璣玉衡後漢書則以璇璣為北辰玉衡為斗九星而以弟二星主益州漢中各史天文志未有宗其說者然漢書必非無據姑存之備考華岐龍門積石至三危之野雍州屬魁星春秋文耀鈎北斗樞為雍州廣雅魁第一星曰天樞主秦晉書天文志魁第一星曰天樞正星主天又曰樞為天主陽徳天子象其分為秦宋史天文志雍州主魁此係之北斗者也地理通釋三台屬太微垣三台六星中台上星主梁雍宋史天文志秦星屬天市垣天市垣二十二星在氐房心尾箕斗内西蕃十一星六曰秦宋史天文志太白以下係緯星主秦者秦之彊也候在太白占於狼弧史記天官書正義曰太白狼弧皆西方之星故秦占候也史記註星經曰太白主華隂山雍州後漢書天文志鶉首實沈以負西海其神主於華山太白位焉唐書天文志太白主梁雍之地圖書編辰星北方水位自河曲黄甫川西經榆林寰宇記秦地界連楚蜀晉豫故分野間有入他宿者然禨祥休咎終難以秦地之邊隅占他省之分宿至畢女三垣特一星主秦未可因其一遂占其全也太白辰星其變動在井鬼者載之否則槩從略焉天漢星家皆言漢屬金水李淳風述天漢起止則東井為漢必麗之辰僧一行論雲漢升沉則井鉞應漢方升之氣而谿田馬氏亦以陜應天漢故備列衆說以備考焉漢者金之散氣其本曰水史記天官書河精上為天漢河圖括地象天河從北極分為兩頭其一經東井抱樸子天漢起東方經尾箕之間分為二道至天津下而合經北河之南入東井水位而東南行絡南河闕邱天狗天紀天稷在七星南而没晉書天文志易五月一隂生而雲漢潛萌於天稷之下進及井鉞得坤維之氣隂始達於地上而雲漢上升東井據百川上流故鶉首為秦墟得兩戒河山之首鶉首之外雲漢潛流而未達故狼星在江河上源之西唐書天文志天河亦一名天漢東井水位入吾驂水位過了東南遊經次南河向闕邱天狗天紀與天稷七星南畔天河没步天歌古人有以天河斷兩界者秦雖西而位坤維之鶉首雲漢之升兩界之首也鬳齋十一稿石氏云天漢天一所生天下河漢之源出乎此故河漢者亦地所以為東西南北之限也張衡云漢津者金之精氣也其本曰水按陜西乃金水之位而河漢之源並出乎此馬志河山兩戒按舊志河山兩戒繪圖分劃但細繹一行之說兩戒起訖俱不在境内圖之恐近於鑿故不敢循舊也中國山川東北流其維首在隴蜀史記天官書正義曰言中國山及川東北流行若南山首在崑崙連隴山至南山華山渡河黄河首起崑崙渭水岷江發源出隴山史記註天下河山之象存乎兩戒北戒自三危積石負終南地絡之隂東及太華逾河是為北紀南戒自岷山嶓冡負地絡之陽東及太華連商山熊耳自上洛南逾江漢是為南紀星傳謂北戒為寒門南戒為越門河源自北紀之首循雍州北徼達華隂而與地絡相㑹謂之北河江源自南紀之首循梁州南徼達華陽而與地絡相㑹謂之南河故於天象則𢎞農分陜為兩河之㑹自陜而西為秦負險用武之國也唐書天文志干支分野庚秦午秦淮南子庚之與未皆主於秦魏書崔浩傳按淮南以午主秦未主宋崔浩言未為秦意者崔浩之說以鶉首於辰在未歟北極出地度數安西府北極出地三十四度半强興元府北極出地三十三度半强元史天文志各省日出入晝夜時刻俱以本處之北極髙度立算陜西北極髙三十四度一十六分厯象考成推節氣時刻各省節氣時刻皆以京師為主視各省東西之偏度加减之每一度當四分陜西偏西七度三十三分四十秒減三十分一十五秒厯象考成井鬼赤道黄道度數赤道井三十三鬼四漢書律厯志東井三十三鬼三唐書厯志井三十三鬼三紀元厯作井三十三少鬼二半宋史律厯志井三十四度鬼三度圖書編黄道井三十鬼四漢書律厯志東井三十輿鬼二太唐書厯志井三十鬼二太紀元厯作井三十半鬼二半宋史律厯志井三十度鬼二度太圖書編赤道黄道過宫赤道井十度四十六分抄四十四黄道井九度四十二分抄八十九入秦分鶉首之次在未用艮巽坤乾宋史律厯志日月蝕占庚辛華山以西日蝕國君月蝕將相當之史記天官書雲氣占自華以南氣下黑上赤史記天官書渭水氣如狼白尾秦雲如行人晉書天文志蒼黑雲氣入犯井宿民有疾疫黄白潤澤有客來言水澤事黒氣入為大水常以正月朔日入時候之井宿上有雲嵗多水潦五諸侯雲氣犯之色蒼白諸侯有喪不則臣有誅戮天下有大水積水蒼白雲氣入犯之天下有水積薪赤雲氣入犯之為水災南河蒼白雲氣入之河道不通出而色赤天子兵向諸侯黄氣入之有徳令出為災北河雲氣蒼白入犯之邊有兵疾疫水位赤雲氣入為旱饑狼赤雲氣入有兵輿鬼五星白雲氣入有疾疫黒后有疾憂赤為旱黄為土功入犯積尸貴臣有憂青為病爟赤雲氣入天下烽火皆動宋史天文志南河主越門青氣入水傷人北河主胡門白氣入邊境有兵積水主水官供給酒食白氣入憂水積薪主外厨以給烹餁之事赤氣入憂火水位主水衡赤氣入大人憂旱嵗饑荒狼星主野将侵掠赤氣入有兵革民驚弧矢天弓也主備盗賊赤氣入民驚老人星主夀白氣老入憂明世法錄積薪赤氣火焚薪羣芳譜陜西通志巻一
