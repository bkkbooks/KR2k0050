body:
  text: 陜西通志卷二十五貢賦二民地民丁興安州屬原額民地一萬捌千㭍伯肆拾陸頃陸拾一畝肆分捌釐二忽陸纎陸塵除荒並蠲免外實熟地一千肆伯陸拾頃一拾肆畝伍分㭍釐伍毫玖絲捌忽㭍微陸纎陸塵二渺本色官學倉糧折徵銀叁兩㭍錢肆分陸釐陸毫一忽伍微玖纎陸塵伍渺折色糧除停緩外止該銀肆千伍伯陸拾玖兩肆錢叁釐玖毫捌絲㭍忽玖微㭍纎肆塵二渺陸漠歷年開墾地玖拾㭍頃伍拾伍畝伍分伍釐伍毫肆絲陸忽二微叄纎玖塵肆渺本色官學倉糧折徴銀玖錢肆分伍釐一毫肆絲伍忽伍微伍纎㭍塵陸渺折色糧徴銀陸伯一拾玖兩捌錢伍分一釐叄毫一絲伍忽肆微二纎陸塵陸渺伍漠陸沙肆洙陸涯額外丈出水淤地伍拾畝伍分叄釐一毫該折徵銀二兩肆錢二分玖釐叄毫捌絲叄忽陸微叄纎停免糧銀二伯二拾一兩伍錢一分㭍釐叄毫捌絲陸忽㭍微㭍纎伍塵均徭銀除荒免停緩外並歷年開墾及丈出水淤地銀二千陸伯伍拾二兩肆錢玖分玖毫二絲玖忽陸微伍纎玖塵二渺肆漠一沙一洙㭍涯本色祿米除荒免停緩外並額外丈出水淤地及厯年開墾米共肆伯捌拾叄石二斗二升㭍合二勺叄抄伍撮一圭捌粟伍粒一顆肆粳原額民丁共折下下丁一拾肆萬一千玖伯㭍拾二丁除優免及停緩外止該丁二萬伍千捌伯二拾肆丁歷年招回并編審出丁一千伍伯陸拾伍丁雍正伍年以糧載丁共均丁銀一千叄伯一拾一兩捌錢叄分陸釐伍毫捌絲二忽陸微伍纎玖塵伍渺永不加賦丁一伯一拾叄丁額外匠價并課程共銀伍拾伍兩捌錢捌分伍釐起運本色糧肆伯捌拾叄石二斗二升㭍合二勺叄抄伍撮一圭捌粟伍粒一顆肆粳起運銀肆千叄伯叄拾肆兩㭍錢玖釐叄毫叄絲捌忽叄微一纎㭍塵二渺一漠一沙一洙叄涯遇閏加徴銀陸拾陸兩肆錢二分一絲陸忽㭍微叄塵一渺肆漠㭍沙伍洙存留銀伍千一伯叄兩叄錢玖分陸釐玖毫玖絲肆忽玖微陸纎一塵伍渺肆漠陸沙伍洙遇閏加徴銀二伯一拾叄兩二錢二分捌釐叄毫肆絲二忽玖微肆纎二塵捌渺陸漠㭍沙伍洙遇閏存留不敷在起運正項內撥銀叄拾玖兩㭍錢陸分玖釐伍毫㭍絲玖忽玖微二纎肆塵一渺二漠興安州原額民地一等共地一千肆伯陸拾叄頃捌拾肆畝肆分一釐二毫除荒并豁免外實熟地伍伯玖頃一拾一畝伍分伍釐叄毫玖絲二忽實徵折色糧銀二千肆伯肆拾陸兩叄錢㭍分玖釐一毫一絲叄忽一微二纎陸塵捌渺厯年開墾地伍拾一頃二畝肆分玖釐伍毫肆絲玖忽該徵折色糧銀二伯肆拾伍兩二錢玖分陸釐肆毫捌絲伍忽㭍纎伍塵玖渺肆漠伍沙額外水淤地伍拾畝伍分叄釐一毫該徵折色糧銀二兩肆錢二分玖釐叄毫捌絲叄忽陸微叄纎停免糧銀㭍拾肆兩㭍錢伍分叄釐一毫均徭銀除荒免外並歷年開墾額外水淤地銀共叄伯伍拾叄兩玖錢捌分一釐肆毫玖絲伍忽伍微二纎陸渺捌漠一沙捌洙捌涯本色祿米除荒免外並額外水淤地及歷年開墾米共二伯二拾捌石捌斗伍升伍合叄勺一抄一撮㭍圭伍粟伍粒叄顆二粳伍粃原額民丁共折下下丁玖萬陸千二伯一拾一丁除豁免并匠價外實在丁二萬一伯伍拾伍丁歷年招回并編審出丁玖伯伍拾玖丁雍正伍年以糧載丁共均丁銀伍伯一拾叄兩伍錢叄分㭍釐伍毫㭍絲玖忽叄微陸纎陸塵玖渺永不加賦丁肆拾㭍丁額外匠價並課程共銀一拾伍兩一錢捌分伍釐起運本色糧二伯二拾捌石捌斗伍升伍合叄勺一抄一撮㭍圭伍粟伍粒叄顆二粳伍粃起運銀一千玖伯肆拾一兩伍錢伍分一釐伍毫捌絲肆忽㭍微二塵陸渺玖沙捌洙捌涯遇閏加徴銀一兩二錢陸分伍釐肆毫一絲陸忽陸微陸纎存留銀一千㭍伯一拾兩一分伍毫㭍絲二忽一纎㭍塵㭍渺一漠㭍沙遇閏加徴銀伍拾兩玖錢㭍分㭍釐肆毫㭍絲陸忽一微陸纎捌塵捌漠錢遇閏存留不敷在起運正項內撥銀一拾捌兩肆肆分㭍釐二毫伍絲一忽㭍微㭍纎陸塵叄渺㭍漠平利縣原額民地九等共地一伯㭍頃㭍拾陸畝肆分肆釐二毫捌絲叄忽陸纎陸塵除荒並豁免外實熟地一拾捌頃伍拾一畝㭍分㭍釐㭍絲實徵折色糧銀一伯伍拾玖兩伍錢二分肆釐捌毫一絲捌忽叄微一纎二塵歷年開墾地二頃捌拾二畝該徵折色糧銀二拾叄兩捌錢捌分陸釐二毫伍絲一忽柒微一纎一塵柒渺伍漠均徭銀除荒并豁免外及歷年開墾銀二伯一拾二兩肆錢玖分柒釐玖忽㭍微一纎玖塵伍渺額外本色祿米除荒并豁免外及歷年開墾米一拾陸石二斗二升玖合肆勺玖抄捌圭肆粒叄顆原額民丁共折下下丁伍千伍拾柒丁除優免逃亡外實在丁玖拾捌丁歷年招回編審出丁叄拾玖丁雍正伍年以糧載丁共均丁銀陸拾叄兩肆錢陸分肆釐玖毫伍絲二忽捌纎陸塵陸渺永不加賦丁玖丁額外課程銀肆兩起運本色糧一拾陸石二斗二升玖合肆勺玖抄捌圭肆粒叄顆起運銀二伯玖拾伍兩一錢捌分叄釐柒絲玖微捌纎陸塵肆渺伍漠遇閏加徴銀柒兩捌分陸釐二毫捌絲二忽一微捌纎柒塵叄渺存留銀一伯陸拾捌兩一錢捌分玖釐玖毫陸絲捌微肆纎叄塵肆渺遇閏加徴銀一拾一兩叄錢伍分陸釐叄毫二絲捌忽伍纎二塵㭍渺洵陽縣原額民地三等共地叄伯頃陸拾陸畝叄分叄釐伍絲陸忽除荒并豁免外實熟地叄拾二頃伍拾二畝伍分一釐一絲㭍忽陸微實徵折色糧銀叄伯玖拾㭍兩玖錢㭍分玖釐二毫陸忽叄微二纎肆渺陸漠歷年開墾地一拾二頃二畝捌分㭍釐伍毫伍絲該徵折色糧銀一伯叄拾捌兩陸錢一分伍釐捌毫伍絲肆忽玖微一纎伍塵叄渺叄漠伍沙額外停免糧銀叄拾一兩㭍錢㭍釐㭍絲一忽陸微均徭銀除荒並豁免外及歷年開墾銀一伯玖兩玖錢伍分柒釐一毫一絲玖忽捌微陸纎叄塵玖渺